translation:
  language: es
  text: Entonces buscaban de nuevo prenderlo, pero salió de su mano[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de sus manos» o «de su poder». El griego dice literalmente «de su mano», un modismo para indicar poder o control.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐζήτουν
  english_pob_choice: they were seeking
  chosen_spanish: buscaban
  alternatives_spanish:
  - estaban buscando
  - trataban de
  lexicon: BDAG
  rationale: El imperfecto griego expresa una acción en curso; en español, «buscaban» comunica de forma natural esa continuidad y el intento repetido sin sonar forzado. Mantiene el matiz de persecución hostil del contexto.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Entonces
  alternatives_spanish:
  - Así que
  - Por tanto
  lexicon: BDAG
  rationale: Introduce la consecuencia narrativa de lo anterior. «Entonces» es fluido en español bíblico moderno y conserva la conexión discursiva sin excesiva formalidad.
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: de nuevo
  alternatives_spanish:
  - otra vez
  - nuevamente
  lexicon: BDAG
  rationale: Expresa repetición de manera natural en español y corresponde al sentido de reiteración del adverbio.
- source_word: πιάσαι
  english_pob_choice: to seize
  chosen_spanish: prenderlo
  alternatives_spanish:
  - aprehenderlo
  - agarrarlo
  lexicon: BDAG
  rationale: En contexto de hostilidad contra Jesús, «prender» comunica mejor la intención de capturarlo que un simple «agarrar». Evita el tecnicismo legal de «arrestar» y mantiene la fuerza física del verbo griego.
- source_word: ἐξῆλθεν
  english_pob_choice: he escaped
  chosen_spanish: salió
  alternatives_spanish:
  - escapó
  - se fue
  lexicon: BDAG
  rationale: El verbo griego significa literalmente «salió»; aunque el contexto implica que no pudieron capturarlo, el texto no usa un verbo explícito de escape. «Salió» preserva la forma narrativa y deja la implicación al lector, siguiendo la tensión documentada en el audit trail.
- source_word: ἐκ τῆς χειρὸς αὐτῶν
  english_pob_choice: from their hand
  chosen_spanish: de entre sus manos
  alternatives_spanish:
  - de su mano
  - de su poder
  lexicon: BDAG
  rationale: El griego tiene singular («de su mano»), pero en español «de entre sus manos» expresa mejor la imagen idiomática de no quedar bajo su control y suena más natural. Conserva la referencia al fracaso de su intento sin forzar una paráfrasis interpretativa excesiva.
theological_decisions:
- issue: Si explicitar la liberación de Jesús como escape o mantener la expresión más literal del griego
  english_pob_reading: Retain the literal wording 'he went out from their hand' rather than interpretively rendering 'he escaped from them.'
  chosen_spanish_reading: Mantener una formulación verbal de salida y no un verbo explícito de escape en el cuerpo principal.
  alternative_spanish_readings:
  - escapó de ellos
  - se les escapó
  rationale: La escena comunica que no pudieron aprehenderlo, pero el griego lo dice con el giro idiomático de salir de su mano. La redacción española conserva esa discreción textual y evita añadir más interpretación de la que el pasaje da directamente.
  doctrine_reference: Principio de primacía del original y preservación de la tensión textual sin resolverla de antemano.
translation_notes:
  revision_awareness: 'El audit trail inglés muestra una revisión desde una formulación más literal (''he went out from their hand'') hacia ''he escaped from their hand'' por naturalidad, pero también documenta la preferencia teológica por preservar la expresión idiomática. En español, se ha optado por una solución intermedia: «salió de entre sus manos», que suena natural y mantiene visible la imagen del original sin resolverla del todo como ''escapó''.'
  spanish_consistency_notes:
  - Se mantiene 'Jesús' implícito por el pronombre, como en el griego.
  - «Prender» se usa por su fuerza hostil y narrativa en este contexto.
  - La nota al pie conserva la ambigüedad idiomática del singular griego y sus equivalentes españoles.
