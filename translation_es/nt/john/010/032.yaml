translation:
  language: es
  text: 'Jesús les respondió: «Muchas obras buenas les mostré del Padre[a]; ¿por cuál de ellas[b] me apedrean?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunas traducciones leen «de mi Padre», pero el griego aquí dice simplemente «del Padre».
    reason: alternative_reading
  - marker: b
    text: 'O: «¿a causa de cuál de estas obras…?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: BDAG
  rationale: En español, «respondió» transmite bien el verbo narrativo de réplica sin sonar forzado. «Contestó» también sería posible, pero «respondió» mantiene un registro más sobrio y natural en diálogo bíblico.
- source_word: Πολλὰ ἔργα καλὰ
  english_pob_choice: many good works
  chosen_spanish: muchas obras buenas
  alternatives_spanish:
  - muchas buenas obras
  - muchas obras nobles
  lexicon: BDAG
  rationale: «ἔργα» se rinde aquí como «obras», que en Juan puede abarcar actos/deeds con peso revelatorio. «καλά» se traduce con «buenas», preservando la valoración positiva y evitando una paráfrasis más interpretativa.
- source_word: ἔδειξα
  english_pob_choice: I showed
  chosen_spanish: les mostré
  alternatives_spanish:
  - les he mostrado
  - les exhibí
  lexicon: BDAG
  rationale: El aoristo se expresa de manera natural con pretérito simple en español. «Mostré» conserva la acción completa del texto griego sin introducir un matiz aspectual ajeno al enunciado.
- source_word: ἐκ τοῦ πατρός
  english_pob_choice: from the Father
  chosen_spanish: de parte del Padre
  alternatives_spanish:
  - del Padre
  - procedentes del Padre
  lexicon: BDAG
  rationale: La preposición ἐκ expresa origen o procedencia. «De parte del Padre» comunica fuente/origen de modo claro en español y evita añadir el posesivo «mi» que no está en el griego. «Del Padre» también es posible, pero «de parte del Padre» hace más explícita la procedencia.
- source_word: διὰ ποῖον αὐτῶν ἔργον
  english_pob_choice: for which of them
  chosen_spanish: por cuál de ellas
  alternatives_spanish:
  - por cuál de esas obras
  - a causa de cuál de ellas
  lexicon: BDAG
  rationale: διά con acusativo aquí puede expresar causa o motivo; en este contexto de acusación, «por cuál de ellas» suena natural y conserva la referencia a las obras ya mencionadas. El singular griego ἔργον se deja reflejado en la pregunta distributiva española.
- source_word: λιθάζετε
  english_pob_choice: are you stoning me
  chosen_spanish: me apedrean
  alternatives_spanish:
  - me están apedreando
  - me quieren apedrear
  lexicon: BDAG
  rationale: El presente indica una acción presente/inminente; en español, el presente simple funciona bien en una pregunta de confrontación. «Apedrear» es el equivalente verbal más natural y preciso para λιθάζω.
theological_decisions:
- issue: Referencia de «el Padre» sin posesivo explícito
  english_pob_reading: Retain 'the Father' as spoken, without expanding to 'my Father'
  chosen_spanish_reading: «el Padre» sin añadir «mi»
  alternative_spanish_readings:
  - mi Padre
  - del Padre
  rationale: El griego no incluye μου. Mantener simplemente «el Padre» preserva la tensión cristológica y evita intensificar la relación filial más allá del texto. «De parte del Padre» comunica origen sin resolver la relación con un posesivo no atestiguado.
  doctrine_reference: Primacía del original y preservación de la tensión textual; la traducción no debe ampliar el alcance cristológico más allá del griego.
translation_notes:
  revision_awareness: 'El pasaje coincide con el estado de revisión más reciente: no hay revisiones aplicadas y la valoración de acuerdo es alta. La redacción española se ajusta al texto griego y al rastro auditado en inglés, especialmente en la ausencia del posesivo con «el Padre» y en la causalidad de διά con acusativo.'
  spanish_consistency_notes:
  - Se mantuvo «Padre» con mayúscula por referencia divina.
  - Se prefirió «obras» para ἔργα, coherente con el uso joánico y con el audit trail inglés.
  - Se evitó añadir «mi» antes de «Padre» para no resolver una tensión textual ausente en el griego.
  - «Apedrean» se usó para dar naturalidad a la pregunta en presente, sin introducir un matiz de intento que el verbo no expresa explícitamente.
