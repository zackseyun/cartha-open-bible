translation:
  language: es
  text: '¿Dicen ustedes del que el Padre santificó[a] y envió al mundo: «Tú blasfemas», porque dije: «Yo soy el Hijo de Dios»?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «consagró» o «apartó» para ἡγίασεν.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡγίασεν
  english_pob_choice: sanctified
  chosen_spanish: santificó
  alternatives_spanish:
  - consagró
  - apartó
  lexicon: BDAG
  rationale: En español, «santificó» conserva el vínculo verbal con ἁγιάζω y mantiene la tensión teológica del texto sin explicarla en exceso. «Consagró» y «apartó» son alternativas válidas, pero «santificó» es la opción más cercana al audit trail inglés y a la carga johánica del término.
- source_word: ἀπέστειλεν
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - comisionó
  lexicon: BDAG
  rationale: «Envió» reproduce con naturalidad el lenguaje de misión de Juan. «Comisionó» explicita la idea de encargo, pero es más interpretativo; «mandó» suena menos preciso en este contexto.
- source_word: κόσμον
  english_pob_choice: world
  chosen_spanish: mundo
  alternatives_spanish:
  - mundo creado
  - humanidad
  lexicon: BDAG
  rationale: «Mundo» es la equivalencia directa y estable en Juan para κόσμος. Las alternativas explicitan matices posibles, pero aquí el término funciona con su fuerza teológica habitual y no conviene estrecharlo.
- source_word: Βλασφημεῖς
  english_pob_choice: You are blaspheming
  chosen_spanish: blasfemas
  alternatives_spanish:
  - estás blasfemando
  - blasfemas tú
  lexicon: BDAG
  rationale: En español, la acusación directa queda más natural como «blasfemas». Aunque el inglés POB usa una forma progresiva, el presente simple español transmite la misma acusación sin sonar forzado. «Estás blasfemando» también sería posible, pero es menos sobrio en este contexto.
- source_word: Υἱὸς τοῦ θεοῦ
  english_pob_choice: the Son of God
  chosen_spanish: el Hijo de Dios
  alternatives_spanish:
  - Hijo de Dios
  - el Hijo de Dios
  lexicon: BDAG
  rationale: Se conserva la forma titular «el Hijo de Dios» para mantener la fuerza cristológica del pasaje. «Hijo de Dios» sin artículo podría sonar menos marcado en español; la forma con artículo refleja mejor la función identificadora del original y del audit trail inglés.
- source_word: ὃν ὁ πατὴρ
  english_pob_choice: the one whom the Father
  chosen_spanish: del que el Padre
  alternatives_spanish:
  - del que el Padre
  - a quien el Padre
  lexicon: BDAG
  rationale: La relativa griega se vuelve más idiomática en español con «del que el Padre» dentro de la pregunta. «A quien el Padre» es posible, pero aquí la construcción exigida por «decir de» hace más natural la forma elegida.
- source_word: ὅτι ... ὅτι
  english_pob_choice: do you say ... because I said
  chosen_spanish: ¿ustedes dicen ... porque dije
  alternatives_spanish:
  - ¿dicen ... porque dije
  - ¿ustedes dicen ... porque yo dije
  lexicon: BDAG
  rationale: 'Se conserva la lógica doble de ὅτι: la primera cláusula introduce la acusación, y la segunda expresa la causa. «Porque dije» reproduce con sencillez la relación argumentativa sin añadir un «que» innecesario en español.'
theological_decisions:
- issue: Rendering ἡγίασεν in relation to the Son
  english_pob_reading: sanctified
  chosen_spanish_reading: santificó
  alternative_spanish_readings:
  - consagró
  - apartó
  rationale: En este versículo, el verbo no sugiere que el Hijo necesitara purificación moral, sino que el Padre lo apartó/consagró para su misión. «Santificó» mantiene la tensión del texto y la conexión bíblica con el campo semántico de ἁγιάζω sin suavizarla doctrinalmente.
  doctrine_reference: Translation philosophy §§1, 3, 5; Affirmations on Nicene and Chalcedonian orthodoxy
- issue: Christological force of 'Son of God'
  english_pob_reading: the Son of God
  chosen_spanish_reading: el Hijo de Dios
  alternative_spanish_readings:
  - Hijo de Dios
  - el Hijo de Dios
  rationale: La expresión funciona como título cristológico en el contexto inmediato de la acusación de blasfemia. Mantener el artículo ayuda a conservar esa fuerza identificadora y evita banalizar la afirmación de Jesús.
  doctrine_reference: Affirmations on Nicene and Chalcedonian orthodoxy; Translation philosophy §1
translation_notes:
  revision_awareness: El texto sigue de cerca el audit trail inglés, sin cambios editoriales posteriores en la revisión más reciente; la redacción española se ajusta a la sintaxis natural del español sin perder la estructura interrogativa y la relación causal del original.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto cuando aparezca el nombre divino; aquí no aparece el tetragrámaton, así que no aplica.
  - Se preservó «Hijo de Dios» como título cristológico, en concordancia con la práctica del proyecto para expresiones fijas y con el contexto de Juan.
  - No se introdujeron notas doctrinales ajenas al pasaje; la única nota léxica cubre la alternativa reconocida para ἡγίασεν.
