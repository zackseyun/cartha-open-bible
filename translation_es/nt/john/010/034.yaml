translation:
  language: es
  text: 'Jesús les respondió[a]: «¿No está escrito en la Ley de ustedes: “Yo dije: ustedes son dioses”?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «seres divinos». Jesús cita Salmo 82:6; el sentido de θεοί es discutido, por lo que el texto principal preserva la formulación directa de la cita.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: BDAG
  rationale: El verbo narrativo de respuesta se vierte de forma natural como «respondió» en español. Mantiene el intercambio directo sin añadir matices interpretativos.
- source_word: αὐτοῖς
  english_pob_choice: them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  lexicon: BDAG
  rationale: El dativo se integra naturalmente en español con «les respondió», evitando una construcción más pesada sin perder el referente indirecto.
- source_word: Οὐκ ἔστιν γεγραμμένον
  english_pob_choice: Is it not written
  chosen_spanish: ¿No está escrito
  alternatives_spanish:
  - ¿No ha sido escrito
  - ¿No está registrado
  lexicon: BDAG
  rationale: La pregunta retórica introductoria de una cita bíblica se traduce con la fórmula española natural «¿No está escrito?», que conserva la fuerza y la función citacional del perfecto pasivo.
- source_word: ἐν τῷ νόμῳ ὑμῶν
  english_pob_choice: in your Law
  chosen_spanish: en su Ley
  alternatives_spanish:
  - en su ley
  - en la Ley de ustedes
  lexicon: BDAG
  rationale: Aunque el inglés POB usa «your Law», en español «su Ley» comunica de manera natural el sentido reverente y bíblico del término νόμος en este contexto, referido a la Escritura citada por Jesús. Se capitaliza «Ley» por su valor escritural reconocido en contexto.
- source_word: ὅτι
  english_pob_choice: ‘I said, you are gods’
  chosen_spanish: '“Yo dije: ustedes son dioses”'
  alternatives_spanish:
  - '“Yo dije: sois dioses”'
  - '“Dije: ustedes son dioses”'
  lexicon: BDAG
  rationale: ὅτι introduce el contenido de la cita. En español se conserva la cita directa sin insertar «que», porque la estructura queda más natural y fiel al valor citacional del griego.
- source_word: Ἐγὼ εἶπα
  english_pob_choice: I said
  chosen_spanish: Yo dije
  alternatives_spanish:
  - Yo he dicho
  - Yo mismo dije
  lexicon: BDAG
  rationale: Se preserva el pronombre explícito Ἐγώ con «Yo», y el aoristo se vierte con el pretérito simple «dije», que corresponde bien al acto citado.
- source_word: Θεοί
  english_pob_choice: gods
  chosen_spanish: dioses
  alternatives_spanish:
  - seres divinos
  lexicon: BDAG
  rationale: Se mantiene el equivalente más directo del plural θεοί como «dioses», conservando la tensión lexical y retórica de la cita del Salmo 82:6 sin suavizarla con una paráfrasis interpretativa.
- source_word: ἐστε
  english_pob_choice: you are
  chosen_spanish: son
  alternatives_spanish:
  - son ustedes
  - son
  lexicon: BDAG
  rationale: El copulativo se expresa de forma directa en español. En la cita, «ustedes son» mantiene la claridad y el orden natural del castellano.
theological_decisions:
- issue: Cómo traducir θεοί en la cita de Jesús de Salmo 82:6
  english_pob_reading: gods
  chosen_spanish_reading: dioses
  alternative_spanish_readings:
  - seres divinos
  rationale: Se conserva la traducción literal y más transparente de θεοί como «dioses» para respetar la fuerza argumentativa de Jesús y no resolver por adelantado la dificultad interpretativa del pasaje. La alternativa explicativa queda sólo como posibilidad de lectura, no como texto principal.
  doctrine_reference: Mantener la tensión exegética del texto; primacía del original frente a la suavización interpretativa.
translation_notes:
  revision_awareness: Coincide con el contexto auditado en cuanto a la estructura citacional, la función retórica de la pregunta y la preservación del término plural θεοί. La principal adaptación al español consiste en usar la fórmula natural «¿No está escrito…?» y «su Ley» para una lectura fluida sin perder precisión.
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς y «Ley» con mayúscula por el uso escritural de νόμος en contexto.
  - Se preserva «dioses» en el texto principal para reflejar la decisión lexical del POB inglés.
  - La cita se presenta con comillas españolas y puntuación acorde al español editorial moderno.
