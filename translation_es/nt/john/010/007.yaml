translation:
  language: es
  text: 'Entonces Jesús les dijo otra vez[a]: «En verdad, en verdad les digo: Yo soy la puerta para las ovejas.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la puerta de las ovejas». El griego θύρα puede significar «puerta» o «portón», especialmente en la imaginería pastoril.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - Entonces
  - Por tanto
  lexicon: BDAG
  rationale: Marca la continuación narrativa y lógica con naturalidad en español moderno, sin endurecer el tono con una causalidad más fuerte de la que exige el griego.
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: de nuevo
  alternatives_spanish:
  - otra vez
  - nuevamente
  lexicon: BDAG
  rationale: Expresa repetición de modo claro y natural; «de nuevo» conserva bien el sentido adverbial sin resultar pesado.
- source_word: Ἀμὴν ἀμὴν
  english_pob_choice: Truly, truly
  chosen_spanish: De cierto, de cierto
  alternatives_spanish:
  - Amén, amén
  - En verdad, en verdad
  lexicon: BDAG
  rationale: Reproduce la fórmula solemne y repetida de Juan con una expresión bíblica y transparente en español. «Amén, amén» es más literal pero menos comunicativo para muchos lectores; «en verdad, en verdad» también es viable, pero «de cierto» mantiene un registro reverente y tradicionalmente entendible.
- source_word: λέγω ὑμῖν
  english_pob_choice: I say to you
  chosen_spanish: les digo
  alternatives_spanish:
  - les digo a ustedes
  - les afirmo
  lexicon: BDAG
  rationale: Conserva la fórmula directa de habla de Jesús en español natural. El pronombre de objeto indirecto plural comunica bien el destinatario sin sobrecargar el ritmo.
- source_word: ὅτι
  english_pob_choice: —
  chosen_spanish: (sin traducción explícita en la cita)
  alternatives_spanish:
  - que
  lexicon: BDAG
  rationale: Después de la fórmula introductoria, el español puede introducir directamente la proposición citada sin un «que» explícito. Esto sigue el patrón del POB inglés y evita una cláusula innecesariamente pesada.
- source_word: ἐγώ εἰμι
  english_pob_choice: I am
  chosen_spanish: Yo soy
  alternatives_spanish:
  - Yo mismo soy
  - Soy
  lexicon: BDAG
  rationale: La traducción normal y transparente de la autodeclaración enfática. El pronombre explícito preserva el énfasis del griego en un castellano natural.
- source_word: θύρα
  english_pob_choice: door
  chosen_spanish: la puerta
  alternatives_spanish:
  - la puerta de entrada
  - la entrada
  - la puerta/portón
  lexicon: BDAG
  rationale: Se mantiene el equivalente léxico directo en el texto principal, como hace el POB inglés con «door». Aunque «puerta» puede abarcar la idea de acceso o abertura, es la opción más cercana y clara; «portón» o «entrada» explicarían más de lo que el griego exige.
- source_word: τῶν προβάτων
  english_pob_choice: for the sheep
  chosen_spanish: para las ovejas
  alternatives_spanish:
  - de las ovejas
  - de las ovejas del redil
  lexicon: BDAG
  rationale: El genitivo se expresa de manera natural en español con una relación de finalidad/asociación, siguiendo la revisión inglesa que prefirió «for» sobre «of». «Para las ovejas» conserva la imagen y la relación funcional sin cerrarla a una sola lectura.
theological_decisions:
- issue: La metáfora de Jesús como la puerta en el discurso del pastor
  english_pob_reading: I am the door for the sheep
  chosen_spanish_reading: Yo soy la puerta para las ovejas
  alternative_spanish_readings:
  - Yo soy la puerta de las ovejas
  - Yo soy el portón para las ovejas
  rationale: Se conserva la metáfora sin explicarla doctrinalmente. «Puerta para las ovejas» mantiene la idea de acceso y protección, y deja abierta la tensión interpretativa entre pertenencia, función y entrada exclusiva, tal como el POB inglés evita resolverla de forma paraprástica.
  doctrine_reference: Mantener la tensión metafórica; equivalencia óptima
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que pasó de «of the sheep» a «for the sheep» para reflejar mejor el genitivo sin perder la imagen. En español se adopta la misma orientación con «para las ovejas», manteniendo «la puerta» como equivalente léxico principal y conservando la nota alternativa sobre θύρα.
  spanish_consistency_notes:
  - Se usa «Jesús» como nombre propio sin variación.
  - Se conserva la fórmula solemne duplicada «De cierto, de cierto».
  - Se mantiene «la puerta» en el texto principal para respetar la decisión léxica central del POB.
  - La nota al pie ofrece la alternativa contextual «portón/entrada» sin desplazar el texto principal.
  - El sintagma «para las ovejas» sigue la revisión inglesa y evita una lectura posesiva demasiado cerrada.
