- from: 'Así que Jesús les dijo de nuevo[a]: «De cierto, de cierto les digo: Yo soy la puerta para las ovejas.»'
  to: 'Entonces Jesús les dijo otra vez[a]: «En verdad, en verdad les digo: Yo soy la puerta para las ovejas.»'
  rationale: Se ajustó οὖν a «Entonces» para una continuación narrativa más natural en español; se cambió «de nuevo» por «otra vez» por fluidez idiomática; y «De cierto, de cierto» por «En verdad, en verdad» para mantener la solemnidad joánica en un registro moderno y digno. La nota al pie se pulió para expresar con mayor claridad la alternativa léxica documentada sin añadir explicación innecesaria.
