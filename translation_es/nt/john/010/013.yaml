translation:
  language: es
  text: porque es un jornalero y no le importan las ovejas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: En contexto introduce la razón de la conducta previa; «porque» expresa con claridad la causalidad sin añadir matiz extra.
- source_word: μισθωτός
  english_pob_choice: a hired hand
  chosen_spanish: jornalero
  alternatives_spanish:
  - asalariado
  - peón contratado
  - sirviente pagado
  lexicon: BDAG
  rationale: El término griego señala a alguien que trabaja por paga y no por responsabilidad propia sobre el rebaño. «Jornalero» comunica bien esa dependencia salarial en español natural y conserva la distancia con el pastor verdadero.
- source_word: μέλει αὐτῷ περὶ
  english_pob_choice: does not care about
  chosen_spanish: no le importan
  alternatives_spanish:
  - no se preocupa por
  - no le interesa
  lexicon: BDAG
  rationale: La construcción impersonal μέλει con dativo expresa preocupación o cuidado. «No le importan» reproduce la falta de interés/responsabilidad de forma idiomática y fuerte en español.
- source_word: τῶν προβάτων
  english_pob_choice: the sheep
  chosen_spanish: las ovejas
  alternatives_spanish:
  - el rebaño
  lexicon: BDAG
  rationale: El griego usa el sustantivo literal en plural; «las ovejas» mantiene la imagen pastoral concreta. «El rebaño» sería más interpretativo y menos preciso respecto al sustantivo.
theological_decisions:
- issue: Caracterización moral del μισθωτός frente al buen pastor
  english_pob_reading: Render the clause in straightforward ethical terms without importing broader doctrinal conclusions beyond the text.
  chosen_spanish_reading: Presentar la afirmación de manera directa, sin ampliar la identificación del jornalero más allá de lo que el versículo dice.
  alternative_spanish_readings:
  - Identificar al jornalero como una clase específica de líderes falsos
  - Suavizar el contraste hasta dejar solo una distancia profesional
  rationale: 'El texto ofrece una razón simple y moral: al ser jornalero, no cuida del rebaño. La traducción debe conservar ese contraste con el buen pastor sin especificar más de lo que el pasaje afirma.'
  doctrine_reference: Principios de traducción 1 y 3
translation_notes:
  revision_awareness: El pasaje muestra alta concordancia entre el griego, la traducción inglesa auditada y la revisión más reciente; no se registran cambios aplicados, por lo que el borrador español sigue la lectura causal y la imaginería pastoral de manera directa.
  spanish_consistency_notes:
  - Se usa «las ovejas» para preservar el plural concreto del griego.
  - Se evita «siervo» porque μισθωτός no describe servicio leal sino trabajo remunerado.
  - Se evita «Cristo/Señor» porque el versículo no contiene cristología ni el nombre divino.
