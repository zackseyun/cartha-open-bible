  spanish_quality_summary: El español es claro y comprensible, pero «no son de mis ovejas» resulta algo duro e idiomáticamente menos elegante en contexto. «No están entre mis ovejas» expresa con más naturalidad la idea de pertenencia al grupo sin perder fidelidad. La nota al pie es buena y legible.
