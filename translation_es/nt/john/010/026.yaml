translation:
  language: es
  text: Pero ustedes no creen[a], porque no están entre mis ovejas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «Pero ustedes no creen que no están entre mis ovejas». La conjunción griega también puede leerse como introduciendo el contenido de la afirmación, no su causa.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀλλὰ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sin embargo
  - Mas
  lexicon: BDAG
  rationale: La conjunción adversativa introduce contraste con lo dicho antes; en español, «Pero» es la equivalencia natural y clara en este contexto.
- source_word: ὑμεῖς
  english_pob_choice: you
  chosen_spanish: ustedes
  alternatives_spanish:
  - ustedes mismos
  - vosotros
  lexicon: BDAG
  rationale: El pronombre es explícito y enfático en griego. «Ustedes» mantiene el énfasis sin recargar la frase; «vosotros» no es el español objetivo.
- source_word: οὐ πιστεύετε
  english_pob_choice: do not believe
  chosen_spanish: no creen
  alternatives_spanish:
  - no están creyendo
  - no tienen fe
  lexicon: BDAG
  rationale: El presente indicativo negativo se expresa de forma natural con «no creen». Conserva el valor de incredulidad/rechazo de la declaración de Jesús en el discurso joánico.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - que
  lexicon: BDAG
  rationale: 'En este contexto, la lectura causal encaja con la línea del argumento: su incredulidad se explica por no pertenecer al grupo de las ovejas de Jesús. Se conserva la alternativa en nota por la ambigüedad sintáctica real.'
- source_word: ἐκ τῶν προβάτων τῶν ἐμῶν
  english_pob_choice: among my sheep
  chosen_spanish: de mis ovejas
  alternatives_spanish:
  - entre mis ovejas
  - de las ovejas que son mías
  lexicon: BDAG
  rationale: ἐκ indica pertenencia/origen desde un grupo; en español, «de mis ovejas» comunica de modo breve y natural que no pertenecen al rebaño de Jesús. «Entre mis ovejas» sería más interpretativo y menos directo en esta estructura.
theological_decisions:
- issue: 'Valor de ὅτι: causal o de contenido'
  english_pob_reading: 'causal: ''because you are not among my sheep'''
  chosen_spanish_reading: 'causal: «porque no son de mis ovejas»'
  alternative_spanish_readings:
  - «que no son de mis ovejas»
  rationale: La traducción principal conserva la explicación del rechazo/unbelief dentro del contraste entre las ovejas de Jesús y quienes no responden a su voz. Se mantiene la alternativa de contenido en nota porque la sintaxis griega puede leerse de ambas maneras y esa tensión debe quedar visible.
  doctrine_reference: Preservar la tensión teológica sin resolverla de manera excesiva.
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin traducir mecánicamente: se mantuvo la lectura causal principal de ὅτι, pero se preservó la alternativa de contenido en nota. No se introdujeron glosas doctrinales ajenas al texto.'
  spanish_consistency_notes:
  - Se usó «ovejas» para πρόβατα, manteniendo la imagen pastoral del pasaje.
  - Se evitó «Cristo» o «Señor» porque el verso no los contiene.
  - La frase «de mis ovejas» refleja pertenencia de grupo con naturalidad en español, sin forzar una preposición más interpretativa.
