translation:
  language: es
  text: Y Jesús estaba caminando en los atrios del templo,[a] en el pórtico[b] de Salomón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Griego ἱερόν se refiere al complejo o recinto del templo, no específicamente al santuario interior.
    reason: cultural_note
  - marker: b
    text: O «columnata»; el griego στοά se refiere a una galería cubierta con columnas.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Ahora
  lexicon: BDAG
  rationale: La conjunción coordinante simple reproduce la coordinación griega sin añadir matiz temporal que el texto no expresa explícitamente.
- source_word: περιεπάτει
  english_pob_choice: was walking
  chosen_spanish: estaba caminando
  alternatives_spanish:
  - caminaba
  - andaba
  - estaba andando
  lexicon: BDAG
  rationale: El imperfecto indica acción continua o en desarrollo en tiempo pasado; «estaba caminando» conserva mejor ese aspecto que un pretérito simple.
- source_word: Ἰησοῦς
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - Jesús el Mesías
  lexicon: N/A
  rationale: Nombre propio estándar y directo del texto griego.
- source_word: ἐν τῷ ἱερῷ
  english_pob_choice: temple courts
  chosen_spanish: en el templo
  alternatives_spanish:
  - en los atrios del templo
  - en el recinto del templo
  lexicon: BDAG
  rationale: ἱερόν designa el complejo o recinto del templo, no específicamente el santuario interior. En español, «en el templo» es la forma más natural y fiel; la nota aclara que no se trata del interior sagrado.
- source_word: ἐν τῇ στοᾷ
  english_pob_choice: Portico
  chosen_spanish: en el pórtico
  alternatives_spanish:
  - en la columnata
  - en la galería cubierta
  lexicon: BDAG
  rationale: στοά refiere a una galería cubierta con columnas; «pórtico» comunica bien esa arquitectura en español moderno y sirve para el lugar nombrado.
- source_word: τοῦ Σολομῶνος
  english_pob_choice: Solomon’s
  chosen_spanish: de Salomón
  alternatives_spanish:
  - de Salomón
  lexicon: BDAG
  rationale: 'La construcción genitiva se vierte naturalmente como complemento de nombre propio en español: «de Salomón».'
theological_decisions:
- issue: Alcance de ἱερόν
  english_pob_reading: Greek ἱερόν refers to the temple complex or precincts, not specifically the inner sanctuary.
  chosen_spanish_reading: «en el templo» se entiende como el recinto o complejo del templo, no como el santuario interior.
  alternative_spanish_readings:
  - «en los atrios del templo»
  - «en el recinto del templo»
  rationale: Se conserva el sentido amplio documentado por el análisis inglés sin forzar una especificación arquitectónica innecesaria en el cuerpo del texto. La precisión se deja en la nota para no perder la distinción entre ἱερόν y ναός.
  doctrine_reference: Juan 10:23; distinción léxica entre ἱερόν y ναός
- issue: Naturaleza del lugar llamado στοά
  english_pob_reading: στοά denotes a covered colonnade or portico.
  chosen_spanish_reading: «pórtico» como término arquitectónico para una galería cubierta con columnas.
  alternative_spanish_readings:
  - «columnata»
  - «galería cubierta»
  rationale: 'No hay tensión doctrinal, pero sí una elección terminológica relevante: «pórtico» es comprensible, sobrio y cercano al valor arquitectónico del griego.'
  doctrine_reference: Juan 10:23; término arquitectónico histórico
translation_notes:
  revision_awareness: Se siguió el acuerdo alto del control previo y no hubo cambios sustantivos respecto del análisis inglés. La principal decisión fue conservar el imperfecto con valor progresivo y traducir ἱερόν de manera amplia y natural en español.
  spanish_consistency_notes:
  - Se mantiene «Jesús» como nombre propio.
  - Se conserva «pórtico» para στοά, en línea con el valor arquitectónico indicado por el audit trail.
  - No se introduce lenguaje litúrgico como «SEÑOR» ni se amplía el texto con información no presente en el griego.
