    reason: cultural_note
  - marker: b
    text: O «columnata»; el griego στοά se refiere a una galería cubierta con columnas.
    reason: lexical_alternative
  revision_rationale: Se ajusta ἐν τῷ ἱερῷ a «en los atrios del templo» para reflejar en el cuerpo del texto la distinción léxica que el POB inglés documenta entre ἱερόν y ναός, sin sacrificar naturalidad en español bíblico moderno. Se mantiene «pórtico de Salomón» y se añade la nota alternativa para στοά, alineando el español con el expediente léxico inglés.
