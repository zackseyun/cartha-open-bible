  glossary_alignment: No hay términos del glosario mayor en conflicto. La traducción mantiene adecuadamente αὐλή como 'redil' y ποίμνη como 'rebaño', en línea con la decisión teológica documentada. 'Pastor' para ποιμήν y 'ovejas' para πρόβατα también están bien. La revisión propuesta sólo afina ἀκούω hacia 'escucharán' para corresponder al POB auditado.
