revisions:
- from: Y tengo otras ovejas que no son de este redil[a]. A esas también debo traer, y oirán mi voz. Entonces habrá un solo rebaño[b], un solo pastor.
  to: Y tengo otras ovejas que no son de este redil. A esas también debo traer, y escucharán mi voz.[a] Entonces habrá un solo rebaño,[b] un solo pastor.
  rationale: 'Se cambia ''oirán'' por ''escucharán'' para preservar mejor el matiz de ἀκούω según la decisión lexical auditada del POB. También se reubican las notas al lugar correspondiente: la nota sobre ''oír/escuchar'' debe anclarse en ''voz'', y la nota sobre ''rebaño'' en la frase final, no en ''redil''. Se simplifica el texto principal quitando la nota en ''redil'', ya que la alternativa puede explicarse mejor en la nota comparativa final.'
