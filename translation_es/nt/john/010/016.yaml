base_translation:
  language: en
  yaml_path: translation/nt/john/010/016.yaml
  text: And I have other sheep that are not from this sheepfold[a]. I must bring them also, and they will listen to my voice. Then there will be one flock[b], one shepherd.
  footnotes:
  - marker: a
    text: Or 'they will hear my voice.' The Greek verb can mean either 'hear' or 'listen,' but here likely includes the sense of responsive hearing.
    reason: lexical_alternative
  - marker: b
    text: Greek distinguishes 'sheepfold' (αὐλή, an enclosure) from 'flock' (ποίμνη, the group of sheep). Some translations render the final phrase 'one fold,' but 'one flock' better reflects the Greek wording here.
    reason: alternative_reading
