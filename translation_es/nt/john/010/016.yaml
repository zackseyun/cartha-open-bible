translation:
  language: es
  text: Y tengo otras ovejas que no son de este redil. A esas también debo traer, y escucharán mi voz.[a] Entonces habrá un solo rebaño,[b] un solo pastor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'oirán mi voz'. El verbo griego puede significar 'oír' o 'escuchar', pero aquí probablemente incluye la idea de una escucha que responde a la voz del pastor.
    reason: lexical_alternative
  - marker: b
    text: El griego distingue aquí entre αὐλή ('redil/aprisco', un recinto) y ποίμνη ('rebaño', el grupo de ovejas). Traducir la frase final como 'un solo redil' no refleja bien esa distinción.
    reason: alternative_reading
lexical_decisions:
- source_word: ἄλλα πρόβατα
  english_pob_choice: other sheep
  chosen_spanish: otras ovejas
  alternatives_spanish:
  - otras ovejas más
  - otras reses
  lexicon: BDAG
  rationale: πρόβατα designa ovejas; en español, 'ovejas' conserva el sentido pastoral sin añadir una concreción ajena como 'corderos'. 'Otras' refleja ἄλλα como adición a las ya mencionadas.
- source_word: αὐλή
  english_pob_choice: sheepfold
  chosen_spanish: redil
  alternatives_spanish:
  - corral
  - recinto
  - apriscadero
  lexicon: BDAG
  rationale: En este contexto de pastor y ovejas, αὐλή nombra un recinto para el rebaño. 'Redil' es el equivalente español natural y transparente para ese tipo de resguardo, sin perder la imagen de encierro/enclosure.
- source_word: κἀκεῖνα
  english_pob_choice: them also
  chosen_spanish: a esas también
  alternatives_spanish:
  - también a esas
  - a ellas también
  lexicon: BDAG
  rationale: El pronombre neutro plural se refiere a 'otras ovejas'; en español, aludir a ellas con 'esas' mantiene la referencia y 'también' conserva el valor aditivo de κἀκεῖνα.
- source_word: δεῖ με ἀγαγεῖν
  english_pob_choice: I must bring
  chosen_spanish: debo traer
  alternatives_spanish:
  - tengo que traer
  - me es necesario traer
  - debo llevar
  lexicon: BDAG
  rationale: δεῖ expresa necesidad; 'debo' conserva esa fuerza. ἀγαγεῖν puede significar traer/llevar/conducir; 'traer' funciona bien en español con la imagen del pastor que reúne a las ovejas y evita una paráfrasis excesiva.
- source_word: τῆς φωνῆς μου ἀκούσουσιν
  english_pob_choice: they will listen to my voice
  chosen_spanish: oirán mi voz
  alternatives_spanish:
  - escucharán mi voz
  - prestarán oído a mi voz
  lexicon: BDAG
  rationale: 'ἀκούω puede ser ''oír'' o ''escuchar''. Aquí el contexto sugiere respuesta a la voz del pastor, pero en español ''oirán mi voz'' conserva ambas posibilidades: recepción auditiva y la expectativa de obediencia implícita, sin forzar una glosa interpretativa.'
- source_word: γενήσονται μία ποίμνη
  english_pob_choice: there will be one flock
  chosen_spanish: habrá un solo rebaño
  alternatives_spanish:
  - serán un solo rebaño
  - habrá un solo rebaño
  lexicon: BDAG
  rationale: ποίημνη es el grupo de ovejas; 'rebaño' expresa bien el conjunto. 'Un solo' refuerza la unidad de μία sin cambiar el sentido. 'Habrá' reproduce con naturalidad el futuro de γίνομαι en este resultado.
- source_word: εἷς ποιμήν
  english_pob_choice: one shepherd
  chosen_spanish: un solo pastor
  alternatives_spanish:
  - un pastor
  - un mismo pastor
  lexicon: BDAG
  rationale: ποιμήν significa pastor. 'Un solo pastor' mantiene la singularidad enfática de εἷς y su vínculo con la unidad del rebaño.
theological_decisions:
- issue: Distinción entre αὐλή y ποίμνη
  english_pob_reading: this sheepfold ... one flock
  chosen_spanish_reading: este redil ... un solo rebaño
  alternative_spanish_readings:
  - este redil ... un rebaño
  - este corral ... un solo rebaño
  rationale: El griego distingue entre el recinto (αὐλή) y el grupo reunido (ποίμνη). 'Redil' y 'rebaño' preservan esa diferencia lexical en español, evitando que ambas expresiones se aplasten en una sola palabra.
  doctrine_reference: 'Translation philosophy #1, #5'
- issue: Fuerza de δεῖ
  english_pob_reading: I must bring them also
  chosen_spanish_reading: debo traer
  alternative_spanish_readings:
  - tengo que traer
  - me es necesario traer
  rationale: δεῖ comunica necesidad obligante. 'Debo' preserva esa obligatoriedad sin introducir una explicación doctrinal adicional; deja abierta la lectura de necesidad salvífica y missioneal propia del contexto joánico.
  doctrine_reference: 'Translation philosophy #3'
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego y el audit trail en inglés. Mantiene la distinción entre αὐλή y ποίμνη, conserva la fuerza de δεῖ como obligación, y evita una calca de 'hear'/'listen' al usar una formulación española idiomática que sigue permitiendo la lectura de respuesta obediente.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo exige; aquí no aparece.
  - '''Mesías/Cristo'' no aplica en este versículo.'
  - Se eligió 'redil' y 'rebaño' para mantener la diferencia entre recinto y grupo, siguiendo el contraste del griego.
  - '''Oirán mi voz'' conserva la ambigüedad relevante de ἀκούσουσιν sin añadir explicaciones al texto principal.'
  - '''Un solo'' reproduce la fuerza enfática de μία y εἷς en la unidad final.'
