  glossary_alignment: No hay términos del glosario mayor en juego salvo la identificación de τὰ ἐγκαίνια. 'Fiesta de la Dedicación' sigue correctamente la decisión POB de mantener la designación descriptiva en el texto principal y dejar 'Janucá' en nota cultural.
