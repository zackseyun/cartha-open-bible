translation:
  language: es
  text: En aquel tiempo tuvo lugar la Fiesta de la Dedicación[a] en Jerusalén. Era invierno,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Janucá», la festividad judía que conmemora la rededicación del templo.
    reason: cultural_note
lexical_decisions:
- source_word: Ἐγένετο
  english_pob_choice: took place
  chosen_spanish: se celebraba
  alternatives_spanish:
  - tuvo lugar
  - ocurría
  lexicon: BDAG
  rationale: En este contexto γίνομαι introduce un acontecimiento situado en el tiempo. En español, «se celebraba» conserva el carácter eventivo y la idea de una festividad en curso sin sonar forzado. «Tuvo lugar» sería correcto, pero menos natural para una fiesta.
- source_word: τότε
  english_pob_choice: At that time
  chosen_spanish: En aquel tiempo
  alternatives_spanish:
  - Entonces
  - En ese tiempo
  lexicon: BDAG
  rationale: τότε marca transición temporal. «En aquel tiempo» mantiene la referencia temporal con un tono narrativo natural en español bíblico contemporáneo.
- source_word: τὰ ἐγκαίνια
  english_pob_choice: the Feast of Dedication
  chosen_spanish: la Fiesta de la Dedicación
  alternatives_spanish:
  - la Dedicación
  - Janucá
  lexicon: BDAG
  rationale: ἐγκαίνια designa la fiesta judía de la dedicación del templo. «Fiesta de la Dedicación» traduce el sentido del término griego de forma transparente. «Janucá» se conserva como posible identificación cultural, pero no como término principal porque el texto griego presenta la designación descriptiva.
- source_word: ἐν τοῖς Ἱεροσολύμοις
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - a Jerusalén
  lexicon: BDAG
  rationale: La expresión locativa es directa. «En Jerusalén» es la equivalencia natural y fiel en español moderno.
- source_word: χειμὼν ἦν
  english_pob_choice: It was winter
  chosen_spanish: Era invierno
  alternatives_spanish:
  - Estaba nevando
  - Era la estación de invierno
  lexicon: BDAG
  rationale: La cláusula es simple y descriptiva. «Era invierno» reproduce la sobriedad del griego y la lectura idiomática en español.
theological_decisions:
- issue: Identificación de τὰ ἐγκαίνια como fiesta judía concreta
  english_pob_reading: Rendered as 'the Feast of Dedication' in the main text, with 'Hanukkah' in a note
  chosen_spanish_reading: Fiesta de la Dedicación en el texto principal, con «Janucá» en nota
  alternative_spanish_readings:
  - la Dedicación
  - Janucá
  rationale: No hay disputa doctrinal, pero sí una identificación cultural importante. Mantener la traducción descriptiva en el texto principal conserva la primacía del término original y la claridad para lectores generales; la nota preserva el nombre común de la festividad judía.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; readability and cultural transparency'
translation_notes:
  revision_awareness: 'El texto inglés del POB y su auditoría coinciden en la lectura básica: una referencia temporal, la Fiesta de la Dedicación en Jerusalén y una nota ambiental de estación. No se registran revisiones textuales; el borrador español sigue esa misma línea sin añadir o suavizar matices no presentes en el griego.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» o terminología de sustitución porque no aparece el nombre divino en el versículo.
  - «Fiesta de la Dedicación» preserva el valor descriptivo del griego; la nota mantiene la identificación cultural común sin desplazar el texto principal.
  - «Era invierno» conserva la brevedad y sencillez de la cláusula final griega.
