revisions:
- from: Todos los que han venido[a] antes de mí son ladrones y robadores; pero las ovejas no los escucharon.
  to: Todos los que vinieron[a] antes de mí son ladrones y salteadores; pero las ovejas no los escucharon.
  rationale: Se ajusta el tiempo verbal aorístico a «vinieron» para alinearlo con el griego y la auditoría inglesa. Se reemplaza «robadores» por «salteadores», que es español natural y mantiene la distinción entre κλέπται y λῃσταί. Se conserva la nota interpretativa sobre πρὸ ἐμοῦ, con formulación más idiomática en español.
