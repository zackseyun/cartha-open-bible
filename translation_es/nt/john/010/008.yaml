  - severity: high
    issue: «robadores» para λῃσταί
    rationale: Aunque intenta distinguirlo de «ladrones», «robadores» no es una opción natural ni ampliamente aceptable en español bíblico moderno. Debe reemplazarse por un término idiomático que preserve la distinción, como «salteadores».
