  glossary_alignment: No hay conflictos con la terminología teológica principal del proyecto. La distinción κλέπται / λῃσταί debe mantenerse con una pareja española natural, preferiblemente «ladrones y salteadores» o «ladrones y bandidos». «Salteadores» preserva mejor la distinción sin perder dignidad bíblica.
