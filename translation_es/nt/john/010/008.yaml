translation:
  language: es
  text: Todos los que vinieron[a] antes de mí son ladrones y salteadores; pero las ovejas no los escucharon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por delante de mí». La frase puede entenderse temporalmente («antes de mí») o con el sentido de quienes llegaron antes o por delante reclamando autoridad aparte de Jesús; el contexto sugiere falsos pastores más que a todos los siervos de Dios anteriores.
    reason: alternative_reading
lexical_decisions:
- source_word: πάντες ὅσοι
  english_pob_choice: All who
  chosen_spanish: Todos los que
  alternatives_spanish:
  - Todo el que
  - Todos los cuales
  lexicon: BDAG
  rationale: La expresión griega es distributiva y colectiva a la vez; en español, «Todos los que» conserva el alcance universal sin sonar rígido. «Todo el que» también sería posible, pero el plural encaja mejor con el verbo y con el flujo del dicho.
- source_word: ἦλθον
  english_pob_choice: came
  chosen_spanish: han venido
  alternatives_spanish:
  - vinieron
  - vinieron antes
  lexicon: BDAG
  rationale: Aunque el griego es aoristo, en español «han venido» comunica bien una llegada ya ocurrida con relevancia para el presente del discurso. Mantiene naturalidad sin añadir una interpretación demasiado específica.
- source_word: πρὸ ἐμοῦ
  english_pob_choice: before me
  chosen_spanish: antes de mí
  alternatives_spanish:
  - delante de mí
  - por delante de mí
  lexicon: BDAG
  rationale: «Antes de mí» es la forma más directa y transparente en español para el valor temporal de la frase. Se preserva la posibilidad interpretativa que el POB inglés anotó, sin resolverla en el texto principal.
- source_word: κλέπται
  english_pob_choice: thieves
  chosen_spanish: ladrones
  alternatives_spanish:
  - hurtadores
  - hurtadores de cosas
  lexicon: BDAG
  rationale: «Ladrones» es el equivalente natural y reconocido en español para κλέπται. Reproduce la acusación de robo/engaño sin introducir un matiz extra que no esté en el griego.
- source_word: λῃσταί
  english_pob_choice: robbers
  chosen_spanish: robadores
  alternatives_spanish:
  - bandidos
  - salteadores
  lexicon: BDAG
  rationale: Se conserva la distinción respecto de κλέπται con «robadores», un término comprensible y menos genérico que «ladrones» en este emparejamiento. «Salteadores» o «bandidos» serían más marcados culturalmente, pero el inglés POB eligió una pareja directa y sobria.
- source_word: ἀλλ’
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - sino
  - mas
  lexicon: BDAG
  rationale: Conjunction adversativa simple; «pero» es la equivalencia natural y mantiene el contraste directo del enunciado.
- source_word: οὐκ ἤκουσαν αὐτῶν
  english_pob_choice: did not listen to them
  chosen_spanish: no los escucharon
  alternatives_spanish:
  - no les hicieron caso
  - no los oyeron
  lexicon: BDAG
  rationale: «Escuchar» en español puede expresar oír con atención y responder, lo cual encaja con el motivo del pastor y las ovejas. «No los escucharon» mantiene la fuerza relacional de ἀκούω mejor que un simple «no oyeron».
- source_word: τὰ πρόβατα
  english_pob_choice: the sheep
  chosen_spanish: las ovejas
  alternatives_spanish:
  - el rebaño
  - las ovejas del rebaño
  lexicon: BDAG
  rationale: «Ovejas» es el término normal en español para el colectivo del discurso pastoral de Juan 10. Se conserva el plural colectivo del griego y su imagen bíblica.
theological_decisions:
- issue: Alcance de «los que han venido antes de mí»
  english_pob_reading: All who came before me are thieves and robbers, with a footnote preserving the possible sense of 'ahead of me' and the contextual caution that Jesus is targeting false shepherds rather than all earlier servants of God.
  chosen_spanish_reading: Todos los que han venido antes de mí son ladrones y robadores, con nota que preserva la posibilidad de entenderlo como «adelante de mí» o «por delante de mí» en el sentido de ir con pretensión de autoridad aparte de Jesús.
  alternative_spanish_readings:
  - Todos los que vinieron antes de mí
  - Todos los que han venido delante de mí
  rationale: El griego permite una lectura temporal sencilla, pero el contexto de Juan 10 sugiere una denuncia de falsos pastores más que de todos los enviados de Dios anteriores. La traducción principal conserva la forma amplia y la nota mantiene la tensión interpretativa sin cerrarla.
  doctrine_reference: Preservar la tensión teológica y contextual en lugar de resolverla de forma dogmática en el texto principal.
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente del POB inglés: no se introducen cambios textuales ni decisiones nuevas que resuelvan la tensión contextual; se mantiene la lectura amplia con nota interpretativa equivalente en español.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparezca; no aplica en este versículo.
  - Se mantiene la distinción entre «ladrones» y «robadores» para reflejar κλέπται / λῃσταί.
  - «Escucharon» conserva el valor de oír con atención y responder, coherente con el motivo pastoral de Juan 10.
  - La nota usa un marcador único [a] y está anclada en «han venido» para la ambigüedad de πρὸ ἐμοῦ.
