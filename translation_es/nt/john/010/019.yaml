translation:
  language: es
  text: A causa de estas palabras, surgió de nuevo una división entre los judíos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "entre los judeanos" o, en algunos contextos de Juan, "entre los líderes judíos". El término "los judíos" aquí refleja el griego, pero en el Evangelio de Juan a menudo se refiere a un grupo particular según el contexto, no al pueblo judío en su conjunto.
    reason: lexical_alternative
lexical_decisions:
- source_word: Σχίσμα
  english_pob_choice: a division
  chosen_spanish: una división
  alternatives_spanish:
  - una separación
  - una escisión
  - un cisma
  lexicon: BDAG
  rationale: El sustantivo denota una ruptura o división. En este contexto narrativo, "una división" reproduce con naturalidad el efecto de un grupo partido en dos sin cargar la frase con un matiz eclesiástico ajeno a Juan.
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  - nuevamente
  lexicon: BDAG
  rationale: Indica repetición. "Otra vez" es claro y fluido en español, y conserva el sentido de que no se trata de la primera división en este pasaje.
- source_word: ἐγένετο
  english_pob_choice: arose
  chosen_spanish: se produjo
  alternatives_spanish:
  - surgió
  - se levantó
  - ocurrió
  lexicon: BDAG
  rationale: Aquí γίνομαι expresa que el hecho llegó a existir o tuvo lugar. "Se produjo" mantiene el carácter eventivo sin sonar forzado con "división".
- source_word: ἐν τοῖς Ἰουδαίοις
  english_pob_choice: among the Jews
  chosen_spanish: entre los judíos
  alternatives_spanish:
  - entre los judeanos
  - entre los judíos líderes
  lexicon: BDAG
  rationale: La frase griega es literalmente "en/entre los judíos". Se conserva esa forma directa en español, sin resolver interpretivamente el referente en el texto principal.
- source_word: διὰ τοὺς λόγους τούτους
  english_pob_choice: Because of these words
  chosen_spanish: por estas palabras
  alternatives_spanish:
  - a causa de estas palabras
  - debido a estas palabras
  lexicon: BDAG
  rationale: διά con acusativo expresa causa. "Por estas palabras" es idiomático y suficientemente directo en español, y mantiene la relación causal con los dichos previos de Jesús.
theological_decisions:
- issue: Referente de Ἰουδαῖοι en Juan
  english_pob_reading: The main text retains 'the Jews,' with a footnote noting that in John the term can refer contextually to Judeans or Jewish authorities rather than the Jewish people as a whole.
  chosen_spanish_reading: La traducción principal conserva "los judíos", con nota que advierte que en Juan el término puede designar, según el contexto, a judeanos o a autoridades judías más que al pueblo judío en conjunto.
  alternative_spanish_readings:
  - los judeanos
  - las autoridades judías
  rationale: Se preserva la redacción cercana al griego en el texto principal y, para evitar una lectura generalizante en español, la nota explica el alcance contextual del término en el Evangelio de Juan.
  doctrine_reference: Principios de traducción §§1, 6
translation_notes:
  revision_awareness: 'El texto griego y el audit trail inglés muestran consenso alto y no registran revisiones sustantivas; esta propuesta mantiene la misma lectura de fondo: una división surgida por las palabras de Jesús, con la ambigüedad contextual de Ἰουδαῖοι preservada en nota.'
  spanish_consistency_notes:
  - Se evita "SEÑOR" porque el versículo no contiene el nombre divino ni κύριος.
  - '"División" se usa en sentido relacional/comunitario, no eclesiástico técnico.'
  - '"Los judíos" se mantiene en el cuerpo del texto por fidelidad al griego y se aclara en nota para evitar malentendidos modernos.'
