  rationale: Se ajusta el español para una causalidad más natural y un tono más fluido ('A causa de estas palabras', 'surgió de nuevo'), y se corrige el lugar del marcador de nota para que quede anclado al término Ἰουδαῖοι, que es el elemento realmente explicado por la nota.
