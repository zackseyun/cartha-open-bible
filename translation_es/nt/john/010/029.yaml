review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta la estructura general del versículo, pero no sigue bien la decisión auditada del POB inglés en el punto central difícil: ὃ δέδωκέν μοι. El inglés optó por explicitar el referente contextual de las ovejas (''who has given them to me'') y preservar la alternativa más literal en nota. El español principal, en cambio, introduce ''lo'' y además mezcla singular y plural con ''arrebatárselos'', creando incoherencia referencial que no refleja fielmente ni el griego ni la decisión documentada. También la nota a dice ''lo que me corresponde'', expresión sin base en la evidencia fuente.'
  spanish_quality_summary: La redacción es generalmente natural, pero 'quien me lo ha dado ... arrebatárselos' suena internamente contradictoria. 'Quien' para el Padre es posible, pero la construcción completa resulta menos clara que una formulación directa. Las notas actuales sobrecargan el texto con ambigüedad artificial en vez de aclarar la ambigüedad real documentada. Una revisión breve puede dejar un español claro, digno y fiel.
  glossary_alignment: No hay conflictos con la terminología mayor del proyecto. 'Mi Padre', 'mayor que todos' y 'arrebatar' son adecuados. El problema principal no es glosario sino la gestión del neutro ὃ y la coherencia del referente en español.
  issues:
  - severity: high
    issue: El texto principal no sigue la decisión principal del POB para ὃ δέδωκέν μοι
    rationale: El audit trail inglés eligió explícitamente 'who has given them to me' por el contexto de las ovejas; el español 'quien me lo ha dado' revierte esa decisión y cambia el sentido pragmático del versículo.
  - severity: high
    issue: Incoherencia referencial entre 'lo' y 'arrebatárselos'
    rationale: El borrador usa singular neutro para el don y luego plural para lo arrebatado. Esa mezcla no preserva una ambigüedad griega; crea una ambigüedad nueva y confusa en español.
  - severity: high
    issue: La nota [a] introduce 'lo que me corresponde' sin base textual
    rationale: Ni el griego ni el POB inglés sugieren 'lo que me corresponde'. La alternativa auditada es 'lo que me ha dado', no una idea de pertenencia o derecho.
  - severity: medium
    issue: Exceso de notas para una dificultad ya documentada de otra manera
    rationale: Basta conservar la alternativa literal real en una nota. Las notas b y c duplican y complican innecesariamente la lectura.
  revised_spanish_text: Mi Padre[a], que me las ha dado, es mayor que todos, y nadie puede arrebatarlas de la mano del Padre.
  revised_footnotes:
  - marker: a
    text: 'O, más literalmente: «Mi Padre, lo que me ha dado, es mayor que todos». El griego aquí es difícil, y algunos entienden que el sujeto de la comparación es el don mismo, y no las personas dadas.'
    reason: alternative_reading
  revision_rationale: 'Se ajusta el texto principal a la decisión contextual documentada en el POB inglés: las ovejas dadas por el Padre al Hijo. Se elimina la incoherencia singular/plural, se conserva la nota sobre la lectura más literal realmente atestiguada, y se corrige una formulación española más clara y fiel sin perder la tensión textual auditada.'
