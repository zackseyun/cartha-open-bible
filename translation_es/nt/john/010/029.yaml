translation:
  language: es
  text: Mi Padre[a], que me las ha dado, es mayor que todos, y nadie puede arrebatarlas de la mano del Padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Mi Padre, lo que me ha dado, es mayor que todos». El griego aquí es difícil, y algunos entienden que el sujeto de la comparación es el don mismo, y no las personas dadas.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὁ πατήρ μου
  english_pob_choice: My Father
  chosen_spanish: Mi Padre
  alternatives_spanish:
  - el Padre mío
  - el Padre de mí
  lexicon: BDAG
  rationale: La expresión posesiva es una forma relacional idiomática; en español natural y reverente, "Mi Padre" comunica la relación filial sin agregar explicación. Se evita "SEÑOR" porque aquí el griego dice πατήρ, no κύριος.
- source_word: ὃ δέδωκέν μοι
  english_pob_choice: who has given them to me
  chosen_spanish: quien me lo ha dado
  alternatives_spanish:
  - lo que me ha dado
  - aquello que me ha dado
  - quien me los ha dado
  lexicon: BDAG
  rationale: 'El relativo neutro singular ὃ conserva una ambigüedad real: puede apuntar al don mismo o, por contexto, al conjunto de los que han sido dados. En español, "me lo ha dado" mantiene esa ambigüedad sin forzar una interpretación explícita de personas o cosas, y respeta el perfecto con valor de resultado permanente.'
- source_word: πάντων μεῖζων
  english_pob_choice: greater than all
  chosen_spanish: es mayor que todos
  alternatives_spanish:
  - es mayor que todo
  - es mayor que todas las cosas
  lexicon: BDAG
  rationale: '"Mayor que todos" reproduce la comparación amplia sin especificar si el genitivo es de personas o de cosas. Se conserva la amplitud del griego πάντων y la fuerza comparativa de μεῖζων con una formulación natural en español.'
- source_word: οὐδεὶς δύναται
  english_pob_choice: no one is able
  chosen_spanish: nadie puede
  alternatives_spanish:
  - nadie es capaz de
  - nadie tiene poder para
  lexicon: BDAG
  rationale: '"Nadie puede" expresa de manera natural la capacidad o imposibilidad inherente de δύναμαι en español, sin perder el sentido de incapacidad explícita que el griego resalta.'
- source_word: ἁρπάζειν
  english_pob_choice: to snatch
  chosen_spanish: arrebatar
  alternatives_spanish:
  - robar
  - apoderarse de
  - sustraer
  lexicon: BDAG
  rationale: '"Arrebatar" conserva la idea de arrancar con fuerza y rapidez, cercana a la imagen de ἁρπάζω y a su uso joánico inmediato. En español suena más natural que un calco como "snatchear" o que "tomar por fuerza".'
- source_word: ἐκ τῆς χειρὸς τοῦ πατρός
  english_pob_choice: out of the Father's hand
  chosen_spanish: de la mano del Padre
  alternatives_spanish:
  - fuera de la mano del Padre
  - de la mano del Padre
  lexicon: BDAG
  rationale: La metáfora de la mano como posesión protectora se mantiene con "de la mano del Padre". Se evita sobrecargar el español con una reconstrucción literal de ἐκ si entorpece la lectura, pero la imagen de seguridad y dominio permanece clara.
theological_decisions:
- issue: 'Texto difícil en ὃ δέδωκέν μοι: referente del don'
  english_pob_reading: 'Render the clause in line with the contextual referent of the sheep: ''who has given them to me'''
  chosen_spanish_reading: '"quien me lo ha dado" conserva la ambigüedad del neutro y evita decidir si el referente explícito son las ovejas o el don mismo'
  alternative_spanish_readings:
  - quien me las ha dado
  - lo que me ha dado
  - aquello que me ha dado
  rationale: El griego es sintácticamente difícil y el valor de ὃ puede ser colectivo o cosa/don. Como el audit trail inglés opta por explicitar "them" para claridad, en español se prefirió una forma neutra que preserve la tensión textual y no elimine la ambigüedad documentada.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Alcance de πάντων μεῖζων
  english_pob_reading: Use the broad expression 'greater than all' without specifying persons or things
  chosen_spanish_reading: '"es mayor que todos" mantiene el alcance amplio sin decidir entre personas o cosas'
  alternative_spanish_readings:
  - es mayor que todas las cosas
  - es mayor que toda persona
  rationale: La comparación permanece abierta, como en el griego. No se introduce una restricción doctrinal o cosmológica que el texto no obliga a fijar.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: Se revisó el expediente inglés y la última pasada indica que no hubo cambios; el punto crítico sigue siendo la cláusula difícil ὃ δέδωκέν μοι. La versión española fue ajustada para preservar esa tensión sin resolverla artificialmente.
  spanish_consistency_notes:
  - Se usa «Padre» para πατήρ, en coherencia con el tratamiento relacional del texto.
  - Se evita «Cristo» y «SEÑOR» porque no aparecen en el versículo y no corresponden al léxico de esta unidad.
  - Se prefirió una sintaxis española natural, pero manteniendo el valor comparativo amplio de πάντων μεῖζων.
  - La metáfora de la mano se conserva sin explicarla de más, para respetar la imagen de protección y posesión.
