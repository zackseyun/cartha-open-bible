translation:
  language: es
  text: Pero si las hago, aunque ustedes no me crean[a], créanles a las obras, para que conozcan y sigan conociendo[b] que el Padre está en mí, y yo en el Padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'aunque ustedes no crean en mí'. El griego usa πιστεύω con dativo de persona, que puede significar 'creerme' o 'creer en mí'; aquí 'no me crean' encaja mejor con el contraste con 'créanles a las obras'.
    reason: lexical_alternative
  - marker: b
    text: La expresión 'conozcan y sigan conociendo' refleja dos formas verbales griegas distintas, probablemente para marcar tanto el llegar a conocer como el conocimiento continuo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ποιῶ
  english_pob_choice: I do them
  chosen_spanish: yo lo hago
  alternatives_spanish:
  - yo las hago
  - yo hago eso
  lexicon: BDAG
  rationale: El verbo está en presente y retoma las obras/señales mencionadas en el contexto inmediato. En español, el objeto queda implícito y se recupera por el contexto; 'lo hago' mantiene la referencia sin forzar un sustantivo explícito que el griego omite.
- source_word: κἂν ἐμοὶ μὴ πιστεύητε
  english_pob_choice: even if you do not believe me
  chosen_spanish: aunque ustedes no me crean
  alternatives_spanish:
  - aunque ustedes no crean en mí
  - aunque no me tengan confianza
  lexicon: BDAG
  rationale: Con πιστεύω + dativo, el sentido puede ser 'creerme' o 'creer en mí'. Aquí el contraste con 'crean en las obras' favorece 'crean/creanme' como aceptación del testimonio de Jesús. 'No me crean' es natural en español y conserva esa tensión.
- source_word: τοῖς ἔργοις πιστεύετε
  english_pob_choice: believe the works
  chosen_spanish: crean en las obras
  alternatives_spanish:
  - crean las obras
  - crean a las obras
  - crean en las obras mismas
  lexicon: BDAG
  rationale: El dative con πιστεύω puede expresar el objeto que se cree. En español, 'crean en las obras' comunica la idea de aceptar su testimonio, sin sugerir fe depositada en las obras como objeto último. Se conserva el lenguaje joánico de 'obras'.
- source_word: ἔργοις
  english_pob_choice: works
  chosen_spanish: obras
  alternatives_spanish:
  - hechos
  - obras/señales
  lexicon: BDAG
  rationale: '''Obras'' es el equivalente natural y fiel de ἔργα en Juan, preservando la terminología característica del evangelio. ''Señales'' sería interpretativo porque el texto usa ἔργα, no σημεῖα.'
- source_word: ἵνα γνῶτε καὶ γινώσκητε
  english_pob_choice: so that you may know and continue to know
  chosen_spanish: para que conozcan y sigan conociendo
  alternatives_spanish:
  - para que conozcan y continúen conociendo
  - para que lleguen a conocer y conozcan
  - para que sepan y sigan sabiendo
  lexicon: BDAG
  rationale: El aoristo subjuntivo γνῶτε sugiere un llegar a conocer o darse cuenta, mientras que el presente subjuntivo γινώσκητε apunta a un conocer continuo. 'Conozcan y sigan conociendo' preserva la distinción aspectual en español de forma natural.
- source_word: ἐν ἐμοὶ ὁ πατὴρ κἀγὼ ἐν τῷ πατρί
  english_pob_choice: the Father is in me, and I am in the Father
  chosen_spanish: que el Padre está en mí, y yo en el Padre
  alternatives_spanish:
  - que el Padre está en mí, y yo estoy en el Padre
  - que el Padre habita en mí, y yo en el Padre
  lexicon: BDAG
  rationale: '''Está en'' reproduce de manera directa el ἐν recíproco y preserva el lenguaje de mutua inhabitación sin ampliarlo a una paráfrasis doctrinal. En español, la elipsis del segundo ''está'' es natural y mantiene el paralelismo griego.'
- source_word: πατήρ
  english_pob_choice: the Father
  chosen_spanish: el Padre
  alternatives_spanish:
  - mi Padre
  - Padre
  lexicon: BDAG
  rationale: El griego dice el artículo con 'Padre', no 'mi Padre'. 'El Padre' conserva la forma articular y la referencia relacional propia del pasaje.
theological_decisions:
- issue: Mutua inhabitación del Padre y del Hijo
  english_pob_reading: Retain the literal relational language 'the Father is in me, and I am in the Father' without explanatory paraphrase.
  chosen_spanish_reading: 'Mantener el lenguaje relacional literal: ''que el Padre está en mí, y yo en el Padre''.'
  alternative_spanish_readings:
  - que el Padre se une conmigo, y yo con el Padre
  - que el Padre mora en mí, y yo moro en el Padre
  rationale: La frase joánica comunica una afirmación cristológica alta mediante lenguaje relacional directo. La traducción no debe sustituirlo por una explicación doctrinal posterior; conservar 'en' mantiene la tensión teológica y la fuerza literaria del texto.
  doctrine_reference: 'Afirmaciones; filosofía de traducción #3'
translation_notes:
  revision_awareness: La base inglesa fue revisada para suavizar 'come to know and understand' a 'know and continue to know' con el fin de reflejar más de cerca el contraste aspectual griego entre γνῶτε y γινώσκητε. La versión española sigue esa decisión mediante 'conozcan y sigan conociendo', evitando una paráfrasis interpretativa más amplia.
  spanish_consistency_notes:
  - Se mantiene 'obras' para ἔργα, coherente con el uso joánico y con el POB inglés.
  - Se usa 'el Padre' con artículo, respetando la forma griega articular.
  - Se conserva el paralelismo final 'en mí... en el Padre' sin explicación doctrinal añadida.
  - Se evita 'Cristo' porque el texto no lo usa; el nombre y la relación son cristológicos, pero el pasaje nombra a Jesús por su discurso directo implícito.
