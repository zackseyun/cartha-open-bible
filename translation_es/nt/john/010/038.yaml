review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura griega principal: condición (''si yo hago''), contraste con no creer a Jesús, llamado a creer las obras, propósito doble de conocer, y la mutua inhabitación del Padre y del Hijo. Sin embargo, hay dos desajustes importantes con el sentido y con la auditoría POB: (1) ''yo lo hago'' no recoge bien el objeto implícito plural referido a las obras; en español suena singular y ambiguo. (2) ''crean en las obras'' cambia el valor de πιστεύω + dativo aquí, donde la auditoría inglesa defendió ''believe the works'', no fe puesta ''en'' las obras. Conviene reparar ambos puntos.'
  spanish_quality_summary: El español es claro y digno, pero 'yo lo hago' resulta menos natural y menos preciso que una forma que recupere el referente plural contextual. Además, 'crean en las obras' puede sugerir confiar en las obras como objeto de fe, algo que el texto no pretende. 'Para que conozcan y sigan conociendo' es aceptable y bastante natural; la línea final 'que el Padre está en mí, y yo en el Padre' está bien lograda.
  glossary_alignment: 'No hay conflicto con los términos doctrinales principales. ''El Padre'' y la fórmula ''en mí... en el Padre'' preservan bien la decisión teológica documentada. El punto léxico que sí necesita ajuste es πιστεύετε τοῖς ἔργοις: el proyecto favorece aquí una formulación equivalente a ''crean a las obras'' / ''créanles a las obras'' más que ''crean en las obras''.'
  issues:
  - severity: high
    issue: '''yo lo hago'' para ποιῶ'
    rationale: El griego retoma implícitamente las obras del contexto; el inglés auditado las hace explícitas con 'them'. En español, 'lo' singular desorienta y no refleja bien ese referente plural. Una formulación como 'si las hago' es más fiel y natural.
  - severity: high
    issue: '''crean en las obras'' para τοῖς ἔργοις πιστεύετε'
    rationale: La auditoría POB rechazó 'believe in the works' porque puede sugerir fe depositada en las obras. En español, 'crean en las obras' crea esa misma desviación. Debe expresarse aceptación del testimonio de las obras, p. ej. 'créanles a las obras'.
  - severity: low
    issue: La nota a no coincide con el anclaje textual
    rationale: La nota a explica la alternativa de 'no me crean', pero el ancla está colocada en 'hago'. El marcador debe ir junto a la frase relevante para mantener trazabilidad correcta.
  revised_spanish_text: Pero si las hago, aunque ustedes no me crean[a], créanles a las obras, para que conozcan y sigan conociendo[b] que el Padre está en mí, y yo en el Padre.
  revised_footnotes:
