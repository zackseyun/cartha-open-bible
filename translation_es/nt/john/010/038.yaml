  text: εἰ δὲ ποιῶ, κἂν ἐμοὶ μὴ πιστεύητε τοῖς ἔργοις ⸀πιστεύετε, ἵνα γνῶτε καὶ ⸀γινώσκητε ὅτι ἐν ἐμοὶ ὁ πατὴρ κἀγὼ ἐν ⸂τῷ πατρί⸃.
base_translation:
  language: en
  yaml_path: translation/nt/john/010/038.yaml
  text: But if I do them[a], even if you do not believe me, believe the works, so that you may know and continue to know that the Father is in me[c][b], and I am in the Father.
  footnotes:
  - marker: a
    text: Or 'even if you do not believe in me.' The Greek more literally uses 'believe' with a dative pronoun, which can mean 'believe me' or 'believe in me'; here 'believe me' best fits the contrast with 'believe the works.'
    reason: lexical_alternative
  - marker: b
    text: The expression 'know and continue knowing' reflects two different Greek verb forms, likely emphasizing both coming to know and ongoing recognition.
    reason: lexical_alternative
  - marker: c
    text: Or 'so that you may know and continue knowing'.
    reason: previous_rendering
