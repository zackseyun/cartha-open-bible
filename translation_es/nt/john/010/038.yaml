revisions:
- from: Pero si yo lo hago[a], aunque ustedes no me crean, crean en las obras, para que conozcan y sigan conociendo[b] que el Padre está en mí, y yo en el Padre.
  to: Pero si las hago, aunque ustedes no me crean[a], créanles a las obras, para que conozcan y sigan conociendo[b] que el Padre está en mí, y yo en el Padre.
  rationale: Se corrigió el objeto implícito de ποιῶ a plural ('las') para reflejar las obras del contexto, se cambió 'crean en las obras' por 'créanles a las obras' para preservar el sentido evidencial de πιστεύω con dativo sin sugerir fe puesta en las obras, y se movió la nota lexical al lugar correcto en el texto.
