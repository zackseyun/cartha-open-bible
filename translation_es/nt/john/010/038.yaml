    text: O 'aunque ustedes no crean en mí'. El griego usa πιστεύω con dativo de persona, que puede significar 'creerme' o 'creer en mí'; aquí 'no me crean' encaja mejor con el contraste con 'créanles a las obras'.
    reason: lexical_alternative
  - marker: b
    text: La expresión 'conozcan y sigan conociendo' refleja dos formas verbales griegas distintas, probablemente para marcar tanto el llegar a conocer como el conocimiento continuo.
    reason: lexical_alternative
  revision_rationale: Se corrigió el objeto implícito de ποιῶ a plural ('las') para reflejar las obras del contexto, se cambió 'crean en las obras' por 'créanles a las obras' para preservar el sentido evidencial de πιστεύω con dativo sin sugerir fe puesta en las obras, y se movió la nota lexical al lugar correcto en el texto.
