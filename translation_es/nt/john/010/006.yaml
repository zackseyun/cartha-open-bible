- from: Jesús les habló de esta figura de lenguaje[a], pero ellos no entendieron lo que les estaba diciendo.
  to: Jesús les dijo este dicho figurado[a], pero ellos no entendieron lo que les estaba diciendo.
  rationale: Se corrige la sintaxis para reflejar que Jesús pronunció la παροιμία, no que habló acerca de ella, y se reemplaza 'figura de lenguaje' por 'dicho figurado', que comunica mejor el valor amplio y no técnico del término griego en este contexto joánico.
