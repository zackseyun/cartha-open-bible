review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien el sentido general: Jesús comunica una παροιμία y ellos no comprenden lo que les dice. Sin embargo, ''les habló de esta figura de lenguaje'' no refleja con precisión εἶπεν ... ταύτην τὴν παροιμίαν, porque introduce ''de'' como si Jesús hablara acerca de la figura, no como si pronunciara la figura misma. Además, ''figura de lenguaje'' suena menos idiomático y un poco técnico frente al matiz más amplio de παροιμία.'
  spanish_quality_summary: El español es claro, pero 'les habló de esta figura de lenguaje' resulta menos natural y ligeramente desviado en sentido. 'Jesús les dijo esta figura retórica' sería demasiado literal; una solución más natural y fiel es 'Jesús les dijo esta figura de expresión' o mejor 'este dicho figurado'. El resto de la oración fluye bien.
  glossary_alignment: 'No hay conflictos con la terminología teológica del proyecto. La decisión clave es παροιμίαν: conviene evitar tanto el tecnicismo excesivo como una formulación poco idiomática. ''Dicho figurado'' se alinea mejor con la nota léxica y con el uso en Juan que ''figura de lenguaje''.'
  issues:
  - severity: high
    issue: La construcción 'les habló de esta figura de lenguaje' altera la relación sintáctica del original.
    rationale: El griego dice que Jesús 'dijo/habló esta παροιμία' a ellos, no que habló acerca de ella. La preposición 'de' cambia el sentido.
  - severity: medium
    issue: '''Figura de lenguaje'' es poco idiomático y demasiado técnico en español bíblico general.'
    rationale: Aunque comprensible, suena calcado y menos natural que 'dicho figurado' o 'figura retórica'. La nota ya preserva las alternativas técnicas.
  - severity: low
    issue: La nota puede pulirse para un español más natural.
    rationale: '''También:'' funciona, pero ''También puede traducirse:'' integra mejor las alternativas léxicas.'
  revised_spanish_text: Jesús les dijo este dicho figurado[a], pero ellos no entendieron lo que les estaba diciendo.
  revised_footnotes:
  - marker: a
    text: 'También puede traducirse: «parábola», «ilustración» o «proverbio». El término griego puede referirse en general a un dicho figurado; aquí introduce el discurso del pastor en forma no literal.'
    reason: lexical_alternative
