translation:
  language: es
  text: Jesús les dijo este dicho figurado[a], pero ellos no entendieron lo que les estaba diciendo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede traducirse: «parábola», «ilustración» o «proverbio». El término griego puede referirse en general a un dicho figurado; aquí introduce el discurso del pastor en forma no literal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: παροιμίαν
  english_pob_choice: figure of speech
  chosen_spanish: figura de lenguaje
  alternatives_spanish:
  - parábola
  - ilustración
  - proverbio
  lexicon: BDAG
  rationale: παροιμία puede abarcar un dicho figurado, proverbio o una expresión velada. En Juan no coincide exactamente con la parábola sinóptica, sino que introduce el discurso del pastor en forma no literal. 'Figura de lenguaje' conserva ese carácter figurado sin forzar el término técnico 'parábola' ni reducirlo a 'proverbio'.
- source_word: εἶπεν
  english_pob_choice: spoke
  chosen_spanish: les habló
  alternatives_spanish:
  - les dijo
  lexicon: BDAG
  rationale: El verbo λέγω puede traducirse por 'decir' o 'hablar'. Como el objeto es una expresión figurada, 'les habló de' suena natural en español y conserva el acto de comunicarles ese dicho.
- source_word: οὐκ ἔγνωσαν
  english_pob_choice: did not understand
  chosen_spanish: no entendieron
  alternatives_spanish:
  - no supieron
  - no reconocieron
  lexicon: BDAG
  rationale: γινώσκω puede significar 'conocer' o 'llegar a entender'. Aquí el problema es que no captaron el sentido del dicho de Jesús, por lo que 'no entendieron' comunica mejor la idea que 'no conocieron'.
- source_word: τίνα ἦν ἃ ἐλάλει αὐτοῖς
  english_pob_choice: what he was saying to them
  chosen_spanish: lo que les estaba diciendo
  alternatives_spanish:
  - qué era lo que les hablaba
  - qué quería decir con lo que les hablaba
  lexicon: BDAG
  rationale: La cláusula griega es algo enrevesada; el sentido es que no comprendieron el contenido de lo que Jesús les decía. 'Lo que les estaba diciendo' preserva ese sentido de manera clara y fiel, sin volver la frase innecesariamente rígida.
- source_word: αὐτοῖς
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  lexicon: BDAG
  rationale: El dativo funciona como complemento indirecto de la palabra de Jesús; en español, el clítico 'les' reproduce de forma natural esa relación y mantiene la referencia al final de la frase.
translation_notes:
  revision_awareness: El pasaje coincide plenamente con el sentido del texto griego y con el juicio de alta concordancia del audit trail inglés. Se conservó la ambigüedad lexical de παροιμία mediante una nota, sin imponer 'parábola' como equivalente exclusivo.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' porque no aparece el nombre divino en este versículo.
  - Se mantiene un registro sobrio y eclesial, con español natural y sin calcos innecesarios.
  - '''Figura de lenguaje'' se eligió para respetar la amplitud semántica de παροιμία en Juan.'
