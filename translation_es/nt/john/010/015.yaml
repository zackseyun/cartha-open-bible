review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: la comparación introducida por καθὼς, el paralelismo relacional de γινώσκω, y la referencia sacrificial de ψυχήν μου ... ὑπὲρ τῶν προβάτων. Sin embargo, ''pongo mi vida'' no preserva de forma suficientemente idiomática ni precisa el modismo joánico τίθημι + ψυχήν; en español bíblico-natural la opción fiel es ''doy mi vida'' o ''entrego mi vida''.'
  spanish_quality_summary: El texto es claro y legible, pero 'pongo mi vida por las ovejas' suena poco natural en español actual y debilita una expresión muy establecida en Juan 10. 'Doy mi vida por las ovejas' mejora notablemente la fluidez y la inteligibilidad sin perder el contenido fuente.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. 'el Padre', 'vida', 'por', y 'las ovejas' están bien alineados. La única corrección necesaria es ajustar la representación de τίθημι a un español idiomático y fiel al uso contextual documentado.
  issues:
  - severity: medium
    issue: '''Pongo mi vida'' para τίθημι + ψυχήν es poco idiomático en español'
    rationale: Aunque 'poner' reproduce de cerca el verbo griego, en este contexto joánico el sentido establecido es el de entregar/dar la vida. 'Pongo mi vida' suena forzado y menos claro para lectores hispanos.
  - severity: low
    issue: La nota al pie anclada en 'pongo' queda mal enfocada
    rationale: La alternativa documentada en el inglés POB contrasta 'vida' con 'alma', no el verbo principal. El anclaje natural en español debe ir sobre 'vida', no sobre 'doy/entrego'.
  revised_spanish_text: Así como el Padre me conoce y yo conozco al Padre, y doy mi vida[a] por las ovejas[b].
