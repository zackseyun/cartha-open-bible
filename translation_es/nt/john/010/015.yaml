translation:
  language: es
  text: Así como el Padre me conoce y yo conozco al Padre, y doy mi vida[a] por las ovejas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "mi alma". Aquí el sentido es "mi vida" en el contexto de la autoentrega sacrificial.
    reason: lexical_alternative
  - marker: b
    text: O "en favor de las ovejas". El griego puede expresar una fuerza representativa o sacrificial.
    reason: alternative_reading
lexical_decisions:
- source_word: καθὼς
  english_pob_choice: just as
  chosen_spanish: Así como
  alternatives_spanish:
  - como
  - de la misma manera que
  lexicon: BDAG
  rationale: Expresa comparación directa y fuerte, de manera natural en español, preservando el paralelo entre ambas cláusulas.
- source_word: γινώσκει / γινώσκω
  english_pob_choice: knows / know
  chosen_spanish: me conoce / conozco
  alternatives_spanish:
  - sabe de mí / sé del Padre
  - tiene conocimiento de mí / tengo conocimiento del Padre
  lexicon: BDAG
  rationale: '"Conocer" mantiene la relación personal e ինտimidad del verbo griego sin diluirlo en una formulación más abstracta.'
- source_word: ὁ πατὴρ / τὸν πατέρα
  english_pob_choice: the Father
  chosen_spanish: el Padre
  alternatives_spanish:
  - mi Padre
  lexicon: BDAG
  rationale: Se conserva el artículo y el paralelismo formal del griego y del inglés auditado; no se añade el posesivo, que el texto no usa.
- source_word: κἀγὼ
  english_pob_choice: and I
  chosen_spanish: y yo
  alternatives_spanish:
  - y también yo
  lexicon: BDAG
  rationale: Reproduce la coordinación simple del crasis y mantiene el equilibrio entre las dos cláusulas.
- source_word: ψυχήν μου
  english_pob_choice: my life
  chosen_spanish: mi vida
  alternatives_spanish:
  - mi alma
  lexicon: BDAG
  rationale: En este contexto de entrega sacrificial, ψυχή significa la vida entregada, no solo el alma en sentido interior o inmaterial.
- source_word: τίθημι
  english_pob_choice: lay down
  chosen_spanish: pongo
  alternatives_spanish:
  - entrego
  - dejo
  lexicon: BDAG
  rationale: En español, "poner" con "la vida" puede sonar menos idiomático que en inglés; sin embargo, aquí conserva la imagen verbal básica de τίθημι y permite enlazar con el sentido establecido en Juan 10 de dar la vida.
- source_word: ὑπὲρ
  english_pob_choice: for
  chosen_spanish: por
  alternatives_spanish:
  - en favor de
  - en beneficio de
  - en lugar de
  lexicon: BDAG
  rationale: '"Por" es breve y natural en español, y puede abarcar el sentido benefactivo/representativo del griego sin imponer una fórmula doctrinal más estrecha.'
- source_word: τῶν προβάτων
  english_pob_choice: the sheep
  chosen_spanish: las ovejas
  alternatives_spanish:
  - el rebaño
  lexicon: BDAG
  rationale: Se conserva la metáfora pastoral literal del sustantivo griego; "rebaño" suavizaría demasiado la imagen.
theological_decisions:
- issue: Fuerza de ὑπὲρ en la entrega de Jesús
  english_pob_reading: Rendered 'for' to preserve the text's sacrificial, representative sense without narrowing it to a single doctrinal formula in translation.
  chosen_spanish_reading: Se traduce "por" para mantener el alcance sacrificial y representativo sin cerrarlo a una sola formulación doctrinal.
  alternative_spanish_readings:
  - en favor de
  - en lugar de
  rationale: El griego permite un matiz benefactivo y posiblemente representativo; el español "por" conserva esa amplitud y deja visible la tensión teológica.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla prematuramente.
- issue: Sentido de ψυχή en este contexto
  english_pob_reading: Rendered as 'life' rather than 'soul.'
  chosen_spanish_reading: Se traduce "vida" en vez de "alma".
  alternative_spanish_readings:
  - alma
  rationale: El contexto inmediato es la entrega voluntaria de Jesús por las ovejas; aquí ψυχή se refiere a la vida que se entrega, no a una facultad interior separable.
  doctrine_reference: Evitar una carga antropológica indebida y seguir el uso contextual del término.
translation_notes:
  revision_awareness: 'El texto inglés auditado permanece estable en la última pasada; no hubo cambios aplicados. La redacción española sigue esa lectura y conserva las dos tensiones documentadas: ψυχή como "vida" y ὑπέρ como "por" con posible matiz representativo/sacrificial.'
  spanish_consistency_notes:
  - Se mantuvo "Padre" con artículo definido, en paralelo con el audit trail inglés.
  - Se conservó la metáfora de "ovejas" en lugar de "rebaño" para no aplanar el sustantivo griego.
  - La puntuación sigue la división de las dos cláusulas coordinadas del versículo.
  - Se usó "vida" como decisión principal para ψυχή y se dejó la alternativa en nota.
  - Se usó "por" como solución principal para ὑπέρ y se dejó abierta su amplitud semántica en nota.
