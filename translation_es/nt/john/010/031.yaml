translation:
  language: es
  text: Así que los judíos tomaron otra vez piedras para apedrearlo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, según el contexto, «las autoridades judías» o «los judeanos». En Juan, la expresión «los judíos» a menudo se refiere a opositores concretos de Jesús, no al pueblo judío en su totalidad.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἐβάστασαν
  english_pob_choice: picked up
  chosen_spanish: recogieron
  alternatives_spanish:
  - levantaron
  - tomaron
  lexicon: BDAG
  rationale: βαστάζω puede significar 'tomar/levantar/cargar'; en este contexto hostil, 'recogieron' comunica de modo natural que tomaron piedras para usarlas de inmediato, sin añadir más de lo que dice el griego.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - Por tanto
  - Entonces
  lexicon: BDAG
  rationale: οὖν marca continuación/inferencia narrativa. 'Así que' suena natural en español moderno y conserva la conexión con el contexto inmediato.
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  - nuevamente
  lexicon: BDAG
  rationale: πάλιν expresa repetición. 'Otra vez' es directo y natural en español.
- source_word: λίθους
  english_pob_choice: stones
  chosen_spanish: piedras
  alternatives_spanish:
  - piedrezas
  - guijarros
  lexicon: BDAG
  rationale: λίθος designa 'piedra' de manera simple. 'Piedras' mantiene el sustantivo sin introducir interpretaciones adicionales en el verbo.
- source_word: οἱ Ἰουδαῖοι
  english_pob_choice: the Jews
  chosen_spanish: los judíos
  alternatives_spanish:
  - las autoridades judías
  - los judeanos
  lexicon: BDAG
  rationale: La frase griega dice literalmente 'los judíos'. La versión principal conserva ese enunciado para mantener la primacía del texto original; la nota deja abierta la posible referencia contextual más estrecha sin sustituirla en el cuerpo del versículo.
- source_word: ἵνα
  english_pob_choice: to
  chosen_spanish: para
  alternatives_spanish:
  - a fin de
  - con el fin de
  lexicon: BDAG
  rationale: ἵνα con subjuntivo expresa propósito. En español, 'para apedrearlo' es la forma más natural y fiel del valor final.
- source_word: λιθάσωσιν
  english_pob_choice: stone
  chosen_spanish: apedrearlo
  alternatives_spanish:
  - apedrearlo hasta matarlo
  - lanzarle piedras
  lexicon: BDAG
  rationale: λιθάζω significa 'apedrear'. En español, el verbo 'apedrear' comunica de forma precisa la acción violenta sin explicitar de más el resultado letal.
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El pronombre de objeto directo en español requiere 'lo'. El referente es Jesús, ya claro en el contexto, por lo que no hace falta repetir el nombre.
theological_decisions:
- issue: Referencia de οἱ Ἰουδαῖοι en Juan
  english_pob_reading: Render literally as 'the Jews' in the main text, with a contextual alternative in a footnote.
  chosen_spanish_reading: Mantener 'los judíos' en el texto principal y añadir una nota sobre la posible referencia contextual más estrecha.
  alternative_spanish_readings:
  - las autoridades judías
  - los judeanos
  rationale: El griego es explícito y no debe estrecharse en el texto principal. Al mismo tiempo, en Juan la expresión suele referirse contextualmente a oponentes particulares de Jesús, no al pueblo judío en general; la nota preserva esa tensión interpretativa sin borrarla.
  doctrine_reference: Translation philosophy §1 (primacía del original), §3 (preservar la tensión en vez de resolverla)
translation_notes:
  revision_awareness: Revisado contra el texto griego SBLGNT y el audit trail en inglés. La redacción española sigue la lectura ya validada en el contexto de trabajo y no introduce cambios sustantivos.
  spanish_consistency_notes:
  - Se conservó 'los judíos' en el cuerpo del texto para reflejar el griego οἱ Ἰουδαῖοι.
  - '''Apedrearlo'' traduce el infinitivo de propósito λιθάσωσιν sin sobreexplicar el resultado.'
  - '''Otra vez'' mantiene la repetición de πάλιν.'
  - La nota al pie preserva la alternativa contextual documentada en el POB inglés.
