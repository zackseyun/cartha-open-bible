translation:
  language: es
  text: Si llamó “dioses” a aquellos a quienes vino la palabra de Dios, y la Escritura no puede ser anulada[a][b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “seres divinos”. El griego dice “dioses”, en eco de Salmo 82:6; algunos intérpretes entienden que se refiere a jueces humanos.
    reason: lexical_alternative
  - marker: b
    text: O “no puede ser quebrantada” o “no puede ser dejada de lado”.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰ
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Si es que
  - En caso de que
  lexicon: BDAG
  rationale: Introduce una condición retórica en la argumentación de Jesús. En español, "Si" reproduce con naturalidad la estructura condicional sin añadir interpretación.
- source_word: ἐκείνους
  english_pob_choice: those
  chosen_spanish: aquellos
  alternatives_spanish:
  - esos
  - aquellos hombres
  lexicon: BDAG
  rationale: Retoma a las personas mencionadas en el argumento previo. "Aquellos" conserva la distancia referencial sin añadir "hombres", que no está explícito en el griego.
- source_word: εἶπεν
  english_pob_choice: he called
  chosen_spanish: llamó
  alternatives_spanish:
  - dijo
  - designó como
  lexicon: BDAG
  rationale: Aquí el sentido predicativo es que los denominó como "dioses". "Llamó" expresa mejor ese valor que el simple "dijo" en español.
- source_word: θεοὺς
  english_pob_choice: gods
  chosen_spanish: “dioses”
  alternatives_spanish:
  - “seres divinos”
  - “divinidades”
  lexicon: BDAG
  rationale: Se conserva el término directo del griego y del Salmo 82:6 citado por Jesús. El plural en minúscula evita confundirlo con el único Dios y preserva la tensión teológica del pasaje.
- source_word: πρὸς οὓς
  english_pob_choice: to whom
  chosen_spanish: a quienes
  alternatives_spanish:
  - para quienes
  - hacia quienes
  lexicon: BDAG
  rationale: En esta construcción con ἐγένετο, la relación natural en español es "a quienes". Mantiene la dirección del venir de la palabra sin volverlo una paráfrasis.
- source_word: ὁ λόγος τοῦ θεοῦ
  english_pob_choice: the word of God
  chosen_spanish: la palabra de Dios
  alternatives_spanish:
  - la Palabra de Dios
  - el mensaje de Dios
  lexicon: BDAG
  rationale: '"Palabra de Dios" es la forma transparente y fiel al contexto. Con artículo, el griego apunta a una expresión escritural/autoritativa, no necesariamente al Logos de Juan 1.'
- source_word: ἐγένετο
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - les vino
  lexicon: BDAG
  rationale: En español, "vino" reproduce bien el movimiento hacia las personas receptoras y corresponde al uso idiomático de la expresión bíblica.
- source_word: οὐ δύναται λυθῆναι
  english_pob_choice: cannot be broken
  chosen_spanish: no puede ser quebrantada
  alternatives_spanish:
  - no puede ser anulada
  - no puede ser invalidada
  lexicon: BDAG
  rationale: '"Quebrantada" conserva la imagen tradicional de ruptura que sigue de cerca el griego y mantiene la fuerza de autoridad inviolable. Se prefieren alternativas más explícitas solo como matiz interpretativo.'
- source_word: ἡ γραφή
  english_pob_choice: the Scripture
  chosen_spanish: la Escritura
  alternatives_spanish:
  - la Escritura Sagrada
  - las Escrituras
  lexicon: BDAG
  rationale: Con artículo singular, el griego se refiere a la Escritura como autoridad textual concreta. "La Escritura" refleja mejor esa precisión que el plural.
theological_decisions:
- issue: Significado de “dioses” en la cita de Jesús
  english_pob_reading: Retain the literal term 'gods' in lowercase for those addressed in Scripture, without explaining or softening it in the main text.
  chosen_spanish_reading: Mantener “dioses” en minúscula para los destinatarios del texto citado, sin sustituirlo por “jueces” en el cuerpo principal.
  alternative_spanish_readings:
  - jueces
  - seres divinos
  rationale: La cita depende del término exacto del Salmo 82:6. Traducirlo como “jueces” introduciría una interpretación no explícita en el griego y debilitaría el argumento de Jesús. La minúscula distingue estos “dioses” del único Dios.
  doctrine_reference: Preservar la tensión textual sin resolverla; primacía del original sobre la tradición interpretativa.
- issue: Fuerza de “la Escritura no puede ser quebrantada”
  english_pob_reading: 'Render as a statement of Scripture''s inviolable authority: ''the Scripture cannot be broken.'''
  chosen_spanish_reading: 'Renderizarlo como afirmación de la autoridad inviolable de la Escritura: “la Escritura no puede ser quebrantada”.'
  alternative_spanish_readings:
  - la Escritura no puede ser anulada
  - la Escritura no puede ser invalidada
  rationale: La cláusula funciona como base del razonamiento de Jesús sobre la autoridad de la Escritura. “Quebrantada” conserva la concisión y la imagen del original, mientras que las alternativas explicitan el matiz jurídico/autoritatativo.
  doctrine_reference: Afirmación compatible con la ortodoxia histórica; sin importar una lectura confesional específica.
translation_notes:
  revision_awareness: Basado directamente en el griego SBLGNT y contrastado con el aparato de auditoría en inglés; no se detectaron revisiones aplicadas en la versión más reciente, y el consenso de revisión indicó acuerdo alto sin cambios.
  spanish_consistency_notes:
  - Se mantiene “Dios” con mayúscula para θεοῦ en la expresión fija “palabra de Dios”.
  - Se preserva “Escritura” en singular con artículo definido, conforme al valor del griego.
  - Se usa “dioses” en minúscula para evitar confusión con el único Dios y conservar la tensión teológica del pasaje.
  - Se evita “Cristo” o terminología confesional ajena al versículo.
  - La puntuación con raya no se usa; se optó por coma y fluidez natural en español, con notas para las alternativas de sentido.
