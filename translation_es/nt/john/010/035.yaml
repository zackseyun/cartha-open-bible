  glossary_alignment: 'Buena alineación con la terminología del proyecto: θεός/θεοὺς se maneja como «Dios/dioses» según contexto; «la palabra de Dios» evita confusión con el Logos personal; «la Escritura» conserva el singular articulado. No hay conflicto con los defaults principales del proyecto.'
