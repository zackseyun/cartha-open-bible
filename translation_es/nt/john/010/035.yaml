  source_alignment_summary: 'El borrador español sigue bien el griego y el rastro de auditoría inglés en los puntos principales: mantiene la condición con «Si», conserva «dioses» para θεούς, traduce πρὸς οὓς…ἐγένετο como «a quienes vino la palabra de Dios», y refleja la autoridad de ἡ γραφή con «la Escritura». También preserva correctamente las notas alternativas sobre «seres divinos» y sobre λυθῆναι como anular/invalidar. Sin embargo, «Si él llamó» introduce un pronombre innecesario y algo marcado en español, y «quebrantada» para Escritura suena más rígido y menos idiomático aquí que una opción como «anulada», especialmente dado que la nota ya documenta el campo semántico legal de λυθῆναι.'
