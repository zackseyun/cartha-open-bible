- from: Si él llamó “dioses” a aquellos a quienes vino la palabra de Dios, y la Escritura no puede ser quebrantada[a][b],
  to: Si llamó “dioses” a aquellos a quienes vino la palabra de Dios, y la Escritura no puede ser anulada[a][b],
  rationale: Se elimina el pronombre «él» para un español más natural y se ajusta λυθῆναι a «no puede ser anulada», que comunica con más claridad contemporánea la idea de que la Escritura no puede ser invalidada o dejada sin efecto. Se conserva «quebrantada» como alternativa en nota para reflejar la formulación más tradicional y cercana a traducciones heredadas.
