translation:
  language: es
  text: 'Y muchos vinieron a él y decían: «Juan no hizo ninguna señal[a], pero todo lo que Juan dijo acerca de él[b] era verdad.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Juan no realizó ninguna señal».
    reason: lexical_alternative
  - marker: b
    text: O «acerca de este». El griego dice «acerca de este/este hombre».
    reason: lexical_alternative
lexical_decisions:
- source_word: πολλοὶ
  english_pob_choice: many
  chosen_spanish: muchos
  alternatives_spanish:
  - mucha gente
  - muchas personas
  lexicon: BDAG
  rationale: El adjetivo plural funciona sustantivado; «muchos» reproduce la referencia amplia sin añadir un sustantivo que el griego no expresa.
- source_word: ἦλθον πρὸς αὐτὸν
  english_pob_choice: came to him
  chosen_spanish: vinieron a él
  alternatives_spanish:
  - fueron a él
  - llegaron a él
  lexicon: BDAG
  rationale: «Venir a él» es natural en español narrativo y conserva la dirección hacia la persona indicada por πρός + acusativo.
- source_word: ἔλεγον
  english_pob_choice: were saying
  chosen_spanish: decían
  alternatives_spanish:
  - iban diciendo
  - seguían diciendo
  lexicon: BDAG
  rationale: El imperfecto marca acción en desarrollo o repetida; en español «decían» transmite ese matiz sin volverse forzado.
- source_word: σημεῖον
  english_pob_choice: sign
  chosen_spanish: señal
  alternatives_spanish:
  - signo
  - milagro
  lexicon: BDAG
  rationale: En Juan, σημεῖον tiene carga teológica. «Señal» preserva mejor la idea de un hecho que apunta más allá de sí mismo que «milagro», que puede reducir el sentido.
- source_word: ἐποίησεν οὐδέν
  english_pob_choice: did no sign
  chosen_spanish: no hizo ninguna señal
  alternatives_spanish:
  - no realizó ninguna señal
  - no hizo señal alguna
  lexicon: BDAG
  rationale: La frase griega es simple y enfática. «No hizo ninguna señal» refleja con claridad la negación total sin añadir énfasis interpretativo.
- source_word: πάντα δὲ ὅσα
  english_pob_choice: everything that
  chosen_spanish: pero todo lo que
  alternatives_spanish:
  - sino todo lo que
  - mas todo lo que
  lexicon: BDAG
  rationale: «Todo lo que» conserva el alcance totalizante de la construcción. «Pero» traduce δέ de manera natural en el contraste del contexto.
- source_word: περὶ τούτου
  english_pob_choice: about him
  chosen_spanish: acerca de él
  alternatives_spanish:
  - sobre él
  - acerca de este
  lexicon: BDAG
  rationale: El demostrativo griego apunta a Jesús; en español, el antecedente ya es claro en el contexto, así que «acerca de él» mantiene naturalidad y evita una repetición pesada.
- source_word: ἀληθῆ ἦν
  english_pob_choice: was true
  chosen_spanish: era verdadero
  alternatives_spanish:
  - era verdad
  - resultaba verdadero
  lexicon: BDAG
  rationale: El predicado neutro plural con verbo singular se traduce de forma natural con «era verdadero». En español mantiene la valoración de veracidad sin alterar el tiempo verbal.
theological_decisions:
- issue: Terminología joánica de σημεῖον
  english_pob_reading: sign
  chosen_spanish_reading: señal
  alternative_spanish_readings:
  - milagro
  - signo
  rationale: 'Se conserva la carga teológica propia de Juan: no se trata sólo de un prodigio, sino de una obra con función reveladora. «Señal» evita reducir el término a un hecho extraordinario sin significado.'
  doctrine_reference: Consistencia terminológica joánica; primacía del griego sobre equivalencias tradicionales.
translation_notes:
  revision_awareness: La auditaría inglesa mantuvo la construcción simple de ἔλεγον como aspecto imperfectivo y conservó σημεῖον como «sign». Aunque una revisión inglesa optó por «about him» por naturalidad, el griego literal sigue apuntando a «este»; en español se resolvió con «acerca de él» dentro del contexto inmediato, preservando naturalidad y referencia.
  spanish_consistency_notes:
  - Se mantiene «señal» para σημεῖον, en consonancia con la terminología joánica preferida y con el valor teológico del término.
  - Se usa «acerca de él» como solución natural para περὶ τούτου, sin perder la referencia a Jesús ya establecida en el contexto.
  - El imperfecto «decían» refleja el valor durativo/reiterativo de ἔλεγον.
  - Se evita «Cristo» o «SEÑOR» porque el versículo no contiene esos términos y no se requiere armonización doctrinal.
