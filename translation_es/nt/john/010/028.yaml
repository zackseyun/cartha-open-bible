base_translation:
  language: en
  yaml_path: translation/nt/john/010/028.yaml
  text: And I give them eternal life[a], and they will certainly never perish, and no one will snatch them out of my hand.
  footnotes:
  - marker: a
    text: Or 'they shall never perish' or 'they will by no means perish.' The Greek uses a strong double negative for emphatic denial.
    reason: lexical_alternative
