translation:
  language: es
  text: Y yo les doy vida eterna[a], y de ningún modo perecerán jamás, y nadie las arrebatará de mi mano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «jamás perecerán» o «ciertamente nunca perecerán». El griego usa una negación doble muy fuerte para negar enfáticamente la posibilidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: κἀγὼ
  english_pob_choice: And I
  chosen_spanish: Y yo
  alternatives_spanish:
  - Y yo mismo
  - Y también yo
  lexicon: BDAG
  rationale: La contracción καὶ ἐγώ conserva la conexión discursiva y un leve énfasis del sujeto. En español, «Y yo» expresa de forma natural esa unión con la frase previa sin forzar un pronombre redundante; el valor enfático queda suficiente en el contexto.
- source_word: δίδωμι
  english_pob_choice: give
  chosen_spanish: doy
  alternatives_spanish:
  - estoy dando
  - doy continuamente
  lexicon: BDAG
  rationale: El presente indicativo comunica la acción de Jesús de manera directa y natural. «Doy» mantiene el tiempo y el aspecto sin añadir una perífrasis innecesaria.
- source_word: αὐτοῖς
  english_pob_choice: them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - a estas ovejas
  lexicon: BDAG
  rationale: El dativo indirecto se expresa mejor en español con clítico («les») unido a «doy». Evita una construcción pesada y conserva el destinatario del don.
- source_word: ζωὴν αἰώνιον
  english_pob_choice: eternal life
  chosen_spanish: vida eterna
  alternatives_spanish:
  - vida eterna
  - vida del siglo venidero
  lexicon: BDAG
  rationale: «Vida eterna» es la equivalencia estable y fiel en Juan. Mantiene tanto la duración como la carga teológica habitual de la expresión, sin volverla un calco extraño como «vida del siglo».
- source_word: οὐ μὴ ἀπόλωνται
  english_pob_choice: they will certainly never perish
  chosen_spanish: ciertamente no perecerán
  alternatives_spanish:
  - de ningún modo perecerán
  - nunca perecerán
  lexicon: BDAG
  rationale: La construcción οὐ μή con subjuntivo aoristo expresa una negación enfática muy fuerte. «Ciertamente no perecerán» preserva esa fuerza en español claro; la negación se mantiene abierta y firme, sin suavizarla.
- source_word: εἰς τὸν αἰῶνα
  english_pob_choice: forever
  chosen_spanish: jamás
  alternatives_spanish:
  - para siempre
  - por los siglos
  lexicon: BDAG
  rationale: La expresión idiomática puede quedar absorbida en la negación enfática en español. «Jamás» transmite bien la idea de permanencia absoluta y evita una redundancia poco natural junto con «ciertamente no perecerán».
- source_word: οὐχ ἁρπάσει
  english_pob_choice: will snatch
  chosen_spanish: arrebatará
  alternatives_spanish:
  - arrancará
  - quitará por fuerza
  lexicon: BDAG
  rationale: ἁρπάζω connota tomar por la fuerza, arrebatar violentamente. «Arrebatará» conserva ese matiz más claramente que un simple «quitará» y suena natural en español.
- source_word: τις
  english_pob_choice: no one
  chosen_spanish: nadie
  alternatives_spanish:
  - ninguno
  - ninguna persona
  lexicon: BDAG
  rationale: Con la negación previa, el valor universal es «nadie». Es la forma más natural y precisa en español.
- source_word: αὐτὰ
  english_pob_choice: them
  chosen_spanish: las
  alternatives_spanish:
  - las ovejas
  - ellas
  lexicon: BDAG
  rationale: Aunque el pronombre griego es neutro, el referente discursivo son las ovejas. En español, el pronombre femenino plural concuerda con el referente natural y evita una formulación despersonalizada.
- source_word: ἐκ τῆς χειρός μου
  english_pob_choice: out of my hand
  chosen_spanish: de mi mano
  alternatives_spanish:
  - de mi mano fuera
  - de entre mis manos
  lexicon: BDAG
  rationale: La imagen de posesión y protección se expresa naturalmente en español con «de mi mano». Es fiel al valor metafórico de la expresión griega y evita una literalidad artificial.
theological_decisions:
- issue: Intensidad de la negación en la promesa de Jesús
  english_pob_reading: 'The Greek strong double negative was rendered emphatically: ''they will certainly never perish.'''
  chosen_spanish_reading: «ciertamente no perecerán» conserva la negación enfática sin debilitarla ni convertirla en una mera posibilidad.
  alternative_spanish_readings:
  - no perecerán jamás
  - de ningún modo perecerán
  - nunca perecerán
  rationale: οὐ μή expresa una negación muy fuerte de posibilidad futura. La traducción debe reflejar ese peso sin introducir una construcción recargada. Un adverbio como «ciertamente» ayuda a comunicar la fuerza de la estructura griega.
  doctrine_reference: Preservar la fuerza del texto sin resolver tensiones doctrinales externas al versículo.
- issue: Relación entre la segunda cláusula negativa y εἰς τὸν αἰῶνα
  english_pob_reading: The revision removed a redundant 'forever' in English because the emphatic negation already conveyed the sense.
  chosen_spanish_reading: «jamás» integra el valor de εἰς τὸν αἰῶνα de manera idiomática y evita duplicación innecesaria.
  alternative_spanish_readings:
  - para siempre
  - por los siglos
  rationale: En español, la combinación «ciertamente no perecerán jamás» expresa con naturalidad la duración indefinida y la imposibilidad absoluta. Así se conserva el énfasis sin sonar redundante.
  doctrine_reference: Mantener la totalidad del énfasis del griego con una formulación española idiomática.
- issue: Referencia del pronombre αὐτὰ
  english_pob_reading: The neuter pronoun was translated as 'them' referring to the sheep.
  chosen_spanish_reading: «las» sigue el referente de las ovejas, no la forma neutra del griego.
  alternative_spanish_readings:
  - ellas
  - las ovejas
  rationale: La referencia discursiva es personal y animada. En español conviene reflejar el referente natural, no la forma gramatical neutra del griego, para evitar una lectura extraña o despersonalizada.
  doctrine_reference: Decisión gramatical y discursiva, no doctrinal.
translation_notes:
  revision_awareness: 'La versión inglesa revisada eliminó un ''forever'' redundante después de ''they will certainly never perish'', porque οὐ μή ... εἰς τὸν αἰῶνα ya estaba suficientemente expresado por la negación enfática. La presente propuesta española adopta una solución equivalente: integra εἰς τὸν αἰῶνα en «jamás» para evitar redundancia y conservar la fuerza total del griego.'
  spanish_consistency_notes:
  - Se mantiene «vida eterna» como término joánico estándar, en concordancia con el uso POB y con la semántica estable de ζωὴ αἰώνιος.
  - Se usa «Yahvé» solo cuando el texto lo requiera explícitamente; este versículo no lo contiene.
  - Se evita «señor»/«SEÑOR» porque no aparece ningún término correspondiente en el versículo.
  - Se prefiere «arrebatará» para ἁρπάζω por su matiz de fuerza, coherente con la decisión inglesa de 'snatch'.
  - Se conserva el pronombre femenino plural «las» por concordancia con el referente de las ovejas en el discurso.
