  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: salida, repetición, cruce del Jordán, referencia al lugar del ministerio previo de Juan, y permanencia allí. Sin embargo, τὸ πρῶτον se entiende mejor aquí como «primero/antes» que como «al principio», y falta preservar la alternativa léxica documentada para πέραν τοῦ Ἰορδάνου.'
  spanish_quality_summary: El español es natural y claro. «Se fue», «al otro lado del Jordán» y «se quedó allí» leen bien en español eclesial contemporáneo. La única mejora importante es reemplazar «al principio», que en español puede sugerir el comienzo de algo en general más que el sentido comparativo-temporal «antes/primero» del griego en este contexto narrativo.
  glossary_alignment: No hay términos del glosario mayor en disputa. El tratamiento de «Jordán», «Juan» y los verbos es adecuado. Se debe añadir una nota para la alternativa «más allá del Jordán» en correspondencia con la auditoría inglesa.
  issues:
