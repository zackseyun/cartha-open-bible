translation:
  language: es
  text: Y se fue otra vez al otro lado[a] del Jordán, al lugar donde Juan había estado bautizando primero, y se quedó allí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «más allá del Jordán».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ ἀπῆλθεν
  english_pob_choice: And he went away
  chosen_spanish: Y se fue
  alternatives_spanish:
  - Y partió
  - Y se marchó
  lexicon: BDAG
  rationale: ἀπέρχομαι expresa salida o alejamiento del lugar; en español, «se fue» comunica con naturalidad el cambio de ubicación sin añadir intensidad no presente en el griego.
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  - nuevamente
  lexicon: BDAG
  rationale: El adverbio indica repetición del movimiento; «otra vez» es claro y natural en español, conservando la idea de retorno.
- source_word: πέραν τοῦ Ἰορδάνου
  english_pob_choice: across the Jordan
  chosen_spanish: al otro lado del Jordán
  alternatives_spanish:
  - más allá del Jordán
  - al otro lado del río Jordán
  lexicon: BDAG
  rationale: πέραν con genitivo señala el lado opuesto o la región transjordana. «Al otro lado del Jordán» es idiomático en español y mantiene la referencia espacial sin imponer una lectura técnica innecesaria.
- source_word: εἰς τὸν τόπον
  english_pob_choice: to the place
  chosen_spanish: al lugar
  alternatives_spanish:
  - hacia el lugar
  - a ese lugar
  lexicon: BDAG
  rationale: εἰς marca dirección hacia un destino; «al lugar» reproduce esa orientación de manera natural en español.
- source_word: ὅπου ἦν Ἰωάννης τὸ πρῶτον βαπτίζων
  english_pob_choice: where John had first been baptizing
  chosen_spanish: donde Juan había estado bautizando al principio
  alternatives_spanish:
  - donde Juan bautizaba primero
  - donde Juan había bautizado antes
  lexicon: BDAG
  rationale: El imperfecto ἦν con el participio presente βαπτίζων describe una acción en curso en un momento anterior; «había estado bautizando» conserva el valor durativo. τὸ πρῶτον aquí funciona adverbialmente como «al principio», preferible en español para evitar una construcción extraña con «primero».
- source_word: ἔμεινεν
  english_pob_choice: and he stayed there
  chosen_spanish: y se quedó allí
  alternatives_spanish:
  - y permaneció allí
  - y permaneció ahí
  lexicon: BDAG
  rationale: μένω en aoristo indica permanecer o quedarse; «se quedó» es una opción natural y fiel al sentido básico de permanencia.
- source_word: ἐκεῖ
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - allá
  lexicon: BDAG
  rationale: Adverbio locativo simple; «allí» mantiene el valor de ubicación con estilo sobrio y claro.
translation_notes:
  revision_awareness: La redacción española sigue de cerca el orden y el sentido del griego SBLGNT, alineándose con la traducción inglesa POB solo como apoyo auditado. Se evitó añadir notas porque el único matiz léxico relevante (πέραν τοῦ Ἰορδάνου) puede integrarse en el texto principal de forma natural sin ambigüedad que requiera nota.
  spanish_consistency_notes:
  - Se mantuvo «Jordán» con artículo y sin capitalización especial adicional, conforme al uso español estándar.
  - Se prefirió «bautizando» sobre una perífrasis más interpretativa para conservar la acción continua del participio griego.
  - No se introdujo terminología eclesiástica ajena al texto; el versículo es narrativo y la sintaxis española busca claridad sin perder correspondencia con el original.
