    issue: «al principio» para τὸ πρῶτον
    rationale: Aunque posible, «al principio» puede sonar menos preciso en este contexto que «primero» o «antes», ya que el griego señala que Juan bautizaba allí anteriormente, no necesariamente «al principio» de toda la historia.
  - severity: low
    issue: Falta la nota de alternativa para πέραν τοῦ Ἰορδάνου
    rationale: 'La auditoría inglesa conservó la alternativa léxica «beyond the Jordan». En español conviene preservar esa posibilidad con una nota como «O: “más allá del Jordán”».'
