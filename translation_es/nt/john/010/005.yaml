translation:
  language: es
  text: Pero de ningún modo seguirán a un extraño[a]; más bien huirán de él, porque no conocen[b] la voz de los extraños.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nunca seguirán a un extraño». La expresión griega usa una negación enfática (οὐ μή).
    reason: lexical_alternative
  - marker: b
    text: «No conocen» también puede entenderse como «no reconocen».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλοτρίῳ
  english_pob_choice: a stranger
  chosen_spanish: el extraño
  alternatives_spanish:
  - un desconocido
  - un forastero
  - otro
  lexicon: BDAG
  rationale: En el contexto pastoral, ἀλλότριος designa a quien no pertenece al rebaño ni al pastor. «El extraño» conserva la idea de alguien ajeno y no reconocido, sin cargar el término con matices étnicos como «forastero» ni debilitarlo como «otro».
- source_word: οὐ μὴ ἀκολουθήσουσιν
  english_pob_choice: will certainly not follow
  chosen_spanish: no seguirán de ningún modo
  alternatives_spanish:
  - nunca seguirán
  - de ningún modo lo seguirán
  - no lo seguirán en absoluto
  lexicon: BDAG
  rationale: La construcción οὐ μή con futuro expresa negación enfática. «No seguirán de ningún modo» preserva esa fuerza en español natural, sin recurrir a un giro demasiado arcaico.
- source_word: ἀκολουθήσουσιν
  english_pob_choice: follow
  chosen_spanish: seguirán
  alternatives_spanish:
  - irán detrás de
  - acompañarán
  lexicon: BDAG
  rationale: En la metáfora de ovejas y pastor, «seguir» es la correspondencia más clara y directa en español.
- source_word: φεύξονται ἀπ’ αὐτοῦ
  english_pob_choice: will flee from him
  chosen_spanish: huirán de él
  alternatives_spanish:
  - escaparán de él
  - saldrán huyendo de él
  - se apartarán de él
  lexicon: BDAG
  rationale: El futuro medio de φεύγω con ἀπό indica evasión o huida. «Huirán de él» conserva el sentido fuerte y la concisión del griego.
- source_word: οἴδασι
  english_pob_choice: do not know
  chosen_spanish: no conocen
  alternatives_spanish:
  - no reconocen
  - no saben
  lexicon: BDAG
  rationale: Aunque οἶδα puede implicar reconocimiento, aquí el objeto es «la voz». «No conocen» mantiene la relación personal y auditiva ya establecida en el contexto, sin interpretar de más.
- source_word: τῶν ἀλλοτρίων
  english_pob_choice: of strangers
  chosen_spanish: de los extraños
  alternatives_spanish:
  - de extraños
  - de los desconocidos
  lexicon: BDAG
  rationale: El genitivo plural expresa la clase de quienes son ajenos al rebaño. «De los extraños» es natural en español y conserva la referencia a un grupo.
- source_word: φωνήν
  english_pob_choice: voice
  chosen_spanish: voz
  alternatives_spanish:
  - sonido
  - llamado
  lexicon: BDAG
  rationale: En este discurso, φωνή alude a la voz identificable del pastor o del extraño. «Voz» mantiene el valor literal y relacional.
- source_word: δὲ ... ἀλλὰ
  english_pob_choice: But ... instead
  chosen_spanish: Pero ... más bien
  alternatives_spanish:
  - Y ... sino
  - Pero ... sino más bien
  lexicon: BDAG
  rationale: La combinación de partículas marca contraste fuerte. «Pero ... más bien» reproduce esa oposición de forma fluida en español.
theological_decisions:
- issue: Fuerza de la negación enfática οὐ μή
  english_pob_reading: will certainly not follow
  chosen_spanish_reading: no seguirán de ningún modo
  alternative_spanish_readings:
  - nunca seguirán
  - no lo seguirán en absoluto
  rationale: Se conserva la intensidad de la negación sin añadir contenido interpretativo. El texto expresa rechazo seguro, no una explicación adicional del motivo.
  doctrine_reference: 'Translation philosophy: preserve textual force and tension; do not soften emphatic negation.'
- issue: Metáfora del rebaño y el extraño
  english_pob_reading: Retain the metaphor straightforwardly without allegorical expansion.
  chosen_spanish_reading: Conservar la metáfora sin identificar explícitamente al extraño como falso maestro.
  alternative_spanish_readings:
  - el falso maestro
  - el impostor
  rationale: El verso no identifica al referente; traducirlo como «el extraño» mantiene abierta la metáfora como en el griego y evita una interpretación no formulada aquí.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El texto sigue de cerca el griego de SBLGNT y coincide sustancialmente con la línea auditada en inglés: negación enfática, contraste adversativo, y preservación de la metáfora pastoral sin expansión interpretativa. No se detectaron cambios recientes en la revisión de referencia.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponda al tetragrámaton; este versículo no lo contiene.
  - Se mantiene «voz» para φωνή, en continuidad con la decisión auditada en inglés.
  - Se evita «Cristo»/«Mesías» por no ser pertinente en este versículo.
  - Se conserva el orden contrastivo con «Pero ... más bien» para reflejar δὲ ... ἀλλὰ.
  - La nota [b] se ancla en «no conocen» porque en español puede sugerir tanto conocimiento como reconocimiento.
