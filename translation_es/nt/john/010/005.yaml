revisions:
- from: Pero al extraño no seguirán de ningún modo[a]; más bien huirán de él, porque no conocen la voz de los extraños[b].
  to: Pero de ningún modo seguirán a un extraño[a]; más bien huirán de él, porque no conocen[b] la voz de los extraños.
  rationale: La revisión conserva íntegramente el sentido del griego y las decisiones auditadas del POB, pero mejora la naturalidad del español y la precisión del anclaje de las notas. «De ningún modo seguirán a un extraño» expresa con claridad la negación enfática οὐ μή y suena más idiomático que «al extraño no seguirán de ningún modo». La nota [b] se ancla directamente en «conocen», que es el punto léxico realmente alternativo.
