    text: Or 'they will never follow a stranger.' The Greek uses an emphatic negation (οὐ μὴ).
    reason: lexical_alternative
  - marker: b
    text: '''Know the voice'' can also be understood as ''recognize the voice.'''
    reason: lexical_alternative
