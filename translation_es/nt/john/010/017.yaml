translation:
  language: es
  text: Por esta razón el Padre me ama[a], porque yo entrego mi vida, para volver a tomarla.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'mi alma'. Aquí ψυχή significa más naturalmente 'vida', en el sentido de la vida que Jesús entrega en la muerte y vuelve a tomar.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τοῦτο
  english_pob_choice: For this reason
  chosen_spanish: Por esta razón
  alternatives_spanish:
  - Por eso
  - Debido a esto
  lexicon: BDAG
  rationale: Expresa la relación causal-retrospectiva de forma natural en español y conserva el enlace discursivo del texto.
- source_word: ὁ πατὴρ
  english_pob_choice: the Father
  chosen_spanish: el Padre
  alternatives_spanish:
  - mi Padre
  lexicon: BDAG
  rationale: El griego tiene sujeto articular, no posesivo. 'El Padre' mantiene la formulación joánica y la relación explícita sujeto-objeto.
- source_word: ἀγαπᾷ
  english_pob_choice: loves
  chosen_spanish: ama
  alternatives_spanish:
  - ama profundamente
  - quiere
  lexicon: BDAG
  rationale: '''Amar'' es la equivalencia natural y fiel para ἀγαπάω en este contexto teológico.'
- source_word: τίθημι
  english_pob_choice: lay down
  chosen_spanish: poner
  alternatives_spanish:
  - dar
  - entregar
  - depositar
  lexicon: BDAG
  rationale: En Juan 10, la imagen es la de 'poner' o 'poner abajo' la vida. En español, 'poner mi vida' preserva la metáfora sin introducir una expresión demasiado idiomática o interpretativa como 'entregar' si no se explicita el matiz de la acción voluntaria en el mismo verbo.
- source_word: τὴν ψυχήν μου
  english_pob_choice: my life
  chosen_spanish: mi vida
  alternatives_spanish:
  - mi alma
  lexicon: BDAG
  rationale: En este contexto, ψυχή se refiere a la vida que Jesús entrega en la muerte y luego recupera. 'Mi vida' evita una lectura antropológica ajena al pasaje.
- source_word: ἵνα πάλιν λάβω αὐτήν
  english_pob_choice: so that I may take it up again
  chosen_spanish: para volver a tomarla
  alternatives_spanish:
  - para recuperarla otra vez
  - para tomarla de nuevo
  lexicon: BDAG
  rationale: La finalidad se expresa de modo natural con 'para'. 'Volver a tomarla' comunica la idea de resurrección/resumen de la vida sin forzar un calco impropio; el complemento pronominal 'la' remite a 'mi vida'.
theological_decisions:
- issue: Sentido de ψυχή en un contexto de muerte y resurrección
  english_pob_reading: Rendered as 'my life' rather than 'my soul'
  chosen_spanish_reading: '''mi vida'' en lugar de ''mi alma'''
  alternative_spanish_readings:
  - mi alma
  rationale: El contexto inmediato trata de la vida de Jesús entregada en la muerte y retomada después. 'Mi vida' preserva el sentido contextual y evita importar una dicotomía alma/cuerpo no destacada aquí.
  doctrine_reference: Translation philosophy §1, §3
- issue: Relación entre ἵνα y λάβω en la clausula final
  english_pob_reading: Purpose/result nuance preserved as 'so that I may take it up again'
  chosen_spanish_reading: Finalidad preservada como 'para volver a tomarla'
  alternative_spanish_readings:
  - para que la vuelva a tomar
  - con el fin de volver a tomarla
  rationale: '''Para'' mantiene el valor final de ἵνα de manera sobria y fluida. ''Volver a tomarla'' conserva la tensión teológica entre la entrega voluntaria de la vida y su recuperación posterior.'
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'El contexto inglés fue revisado para eliminar dos puntos y dejar una coma: la estructura causal se mantuvo sin cambios léxicos. La redacción española sigue esa misma relación causal sin marcar una pausa fuerte innecesaria.'
  spanish_consistency_notes:
  - Se mantiene 'Padre' con artículo definido para reflejar el sujeto griego articular.
  - Se usa 'vida' para ψυχή, coherente con el sentido contextual documentado.
  - La cláusula final conserva finalidad con 'para' y el giro 'volver a tomarla' para evitar una paráfrasis excesiva.
  - El tono es sobrio y publicable, con sintaxis española natural y sin depender del inglés como plantilla mecánica.
