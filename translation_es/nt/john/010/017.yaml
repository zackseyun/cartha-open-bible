revisions:
- from: Por esta razón el Padre me ama[a], porque yo pongo mi vida, para volver a tomarla.
  to: Por esta razón el Padre me ama[a], porque yo entrego mi vida, para volver a tomarla.
  rationale: 'Se reemplaza ''pongo mi vida'' por ''entrego mi vida'' porque expresa de manera más natural y fiel en español el sentido contextual de τίθημι τὴν ψυχήν μου en Juan 10: la entrega voluntaria de la vida en muerte, con posterior recuperación. Se conserva la estructura causal, ''el Padre'', ''vida'' para ψυχή, y la nota alternativa sobre ''alma''.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:04:31Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura causal del griego: διὰ τοῦτο → ''Por esta razón'', ὁ πατὴρ → ''el Padre'', ὅτι → ''porque'', y ψυχή → ''vida'' con nota alternativa adecuada. Sin embargo, ''pongo mi vida'' no refleja de manera idiomática ni suficientemente precisa el giro τίθημι τὴν ψυχήν μου en Juan 10, donde el sentido es ''dar/entregar/poner la vida'' en muerte voluntaria. Además, la cláusula final ''para volver a tomarla'' es comprensible, pero queda mejor anclada si el primer verbo expresa claramente esa entrega sacrificial.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero 'pongo mi vida' suena poco natural en español bíblico general y puede resultar ambiguo. 'Entrego mi vida' es más idiomático, claro y fiel al contexto de autoentrega de Jesús. El resto del versículo lee bien en español neutral eclesial.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. 'el Padre', 'vida' y la nota sobre ψυχή están bien alineadas. La única corrección léxica importante es reemplazar 'pongo' por 'entrego' para representar mejor τίθημι en este contexto joánico, con una excepción contextual razonada frente a una equivalencia demasiado literal.
  issues:
  - severity: medium
    issue: '''pongo mi vida'' es una traducción poco idiomática de τίθημι τὴν ψυχήν μου'
    rationale: Aunque intenta preservar la metáfora verbal, en español 'poner mi vida' no expresa con claridad el modismo joánico de entregar voluntariamente la vida hasta la muerte. Puede sonar incompleto o extraño para lectores generales.
  - severity: low
    issue: La decisión léxica documentada para τίθημι privilegia una literalidad que empeora la naturalidad en español
    rationale: La filosofía del proyecto permite evitar calcos de madera cuando el español resultaría antinatural. Aquí 'entrego mi vida' preserva el sentido mejor que 'pongo mi vida'.
  revised_spanish_text: Por esta razón el Padre me ama[a], porque yo entrego mi vida, para volver a tomarla.
  revised_footnotes:
  - marker: a
    text: O 'mi alma'. Aquí ψυχή significa más naturalmente 'vida', en el sentido de la vida que Jesús entrega en la muerte y vuelve a tomar.
    reason: lexical_alternative
  revision_rationale: 'Se reemplaza ''pongo mi vida'' por ''entrego mi vida'' porque expresa de manera más natural y fiel en español el sentido contextual de τίθημι τὴν ψυχήν μου en Juan 10: la entrega voluntaria de la vida en muerte, con posterior recuperación. Se conserva la estructura causal, ''el Padre'', ''vida'' para ψυχή, y la nota alternativa sobre ''alma''.'
