translation:
  language: es
  text: 'Así que los judíos lo rodearon y le decían[a]: «¿Hasta cuándo nos mantendrás en suspenso? Si tú eres el Mesías[b], dínoslo con claridad.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O más literalmente: «¿Hasta cuándo mantienes nuestra alma en vilo?», un modismo que significa dejar a alguien en incertidumbre o en suspenso.'
    reason: lexical_alternative
  - marker: b
    text: En Juan, «los judíos» puede referirse en contexto de manera más específica a las autoridades judeanas o a los opositores de Jesús, no necesariamente al pueblo judío en su conjunto.
    reason: cultural_note
lexical_decisions:
- source_word: ἐκύκλωσαν
  english_pob_choice: surrounded
  chosen_spanish: rodearon
  alternatives_spanish:
  - encerraron
  - cercaron
  lexicon: BDAG
  rationale: κυκλόω expresa la acción de rodear o encerrar alrededor de alguien. En español, “rodearon” conserva la imagen física y el tono confrontativo con naturalidad.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - Entonces
  - Por tanto
  lexicon: BDAG
  rationale: οὖν marca transición narrativa e inferencia. “Así que” suena natural en español y preserva la continuidad del relato.
- source_word: οἱ Ἰουδαῖοι
  english_pob_choice: the Jews
  chosen_spanish: los judíos
  alternatives_spanish:
  - los líderes judíos
  - los judeanos
  lexicon: BDAG
  rationale: La expresión griega dice literalmente “los judíos”. Sin restringir el referente más de lo que el verso expresa, el texto principal mantiene esa forma; la posible referencia más específica queda para nota.
- source_word: ἔλεγον
  english_pob_choice: were saying
  chosen_spanish: le decían
  alternatives_spanish:
  - le decían repetidamente
  - seguían diciéndole
  lexicon: BDAG
  rationale: El imperfecto sugiere acción continuada o repetida. En español, “le decían” comunica de forma idiomática esa insistencia sin sonar forzado.
- source_word: Ἕως πότε
  english_pob_choice: How long
  chosen_spanish: ¿Hasta cuándo?
  alternatives_spanish:
  - ¿Por cuánto tiempo?
  - ¿Hasta qué momento?
  lexicon: BDAG
  rationale: La pregunta idiomática se expresa de manera natural como “¿Hasta cuándo?” en español.
- source_word: τὴν ψυχὴν ἡμῶν αἴρεις
  english_pob_choice: will you keep us in suspense
  chosen_spanish: nos mantendrás en suspense
  alternatives_spanish:
  - nos dejarás en incertidumbre
  - nos tendrás colgando
  lexicon: BDAG
  rationale: La frase es idiomática y no debe traducirse mecánicamente como “levantas nuestra alma”. “Nos mantendrás en suspense” conserva el sentido de incertidumbre/suspenso reconocido por el POB inglés, con una formulación natural en español. La imagen más literal queda en nota.
- source_word: ὁ χριστός
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - el Cristo
  lexicon: BDAG
  rationale: Como título, Χριστός se traduce normalmente “Mesías” según la guía del proyecto. En este contexto interrogativo, preserva mejor el trasfondo judío del reclamo.
- source_word: εἰπὲ ἡμῖν
  english_pob_choice: tell us
  chosen_spanish: dínoslo
  alternatives_spanish:
  - háblanos
  - dinos
  lexicon: BDAG
  rationale: El imperativo pide una declaración directa. “Dínoslo” es una forma natural y enfática que conserva la fuerza del mandato.
- source_word: παρρησίᾳ
  english_pob_choice: plainly
  chosen_spanish: con claridad
  alternatives_spanish:
  - abiertamente
  - sin rodeos
  - con franqueza
  lexicon: BDAG
  rationale: παρρησία aquí apunta a una declaración pública, inequívoca y sin ambigüedad. “Con claridad” transmite bien esa exigencia de habla directa en español contemporáneo.
theological_decisions:
- issue: Rendering of Χριστός as a title
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - el Cristo
  rationale: Se mantiene el valor titular y mesiánico del término, evitando convertirlo en un nombre litúrgico poco transparente en este contexto interrogativo.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Mesías (when title)'
- issue: Referent of οἱ Ἰουδαῖοι
  english_pob_reading: the Jews
  chosen_spanish_reading: los judíos
  alternative_spanish_readings:
  - los líderes judíos
  - los judeanos
  rationale: El verso no explicita una restricción a dirigentes. Traducir literalmente conserva la tensión contextual y evita resolverla sin base textual adicional.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve theological tension rather than flattening context-specific referents'
translation_notes:
  revision_awareness: Se corrigió la validación anterior incorporando los anclajes exactos [a] y [b] en el texto español, sin crear notas sin ancla. La redacción mantiene la decisión del POB inglés de traducir Χριστός como “Mesías” y conserva la ambigüedad contextual de “los judíos”.
  spanish_consistency_notes:
  - Se usó “Mesías” para Χριστός conforme a la política terminológica del proyecto.
  - Se evitó “SEÑOR” u otras sustituciones no presentes en el verso.
  - “Con claridad” refleja la exigencia de habla abierta/inequívoca de παρρησίᾳ.
  - Los corchetes de nota aparecen exactamente donde se anclan en el texto principal.
