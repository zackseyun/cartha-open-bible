base_translation:
  language: en
  yaml_path: translation/nt/john/010/024.yaml
  text: So the Jews surrounded him and were saying to him[a], “How long will you keep us in suspense? If you are the Messiah[b], tell us plainly.”
  footnotes:
  - marker: a
    text: Or more literally, “How long do you keep our soul hanging?”—an idiom meaning to keep someone in uncertainty or suspense.
    reason: lexical_alternative
  - marker: b
    text: In John, “the Jews” can in context refer more specifically to the Judean authorities or opponents of Jesus, not to the Jewish people as a whole.
    reason: cultural_note
