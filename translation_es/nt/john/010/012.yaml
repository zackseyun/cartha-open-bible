translation:
  language: es
  text: El asalariado, que no es pastor y cuyas ovejas no son suyas, ve venir al lobo y deja[a] las ovejas y huye—y el lobo las arrebata y las dispersa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «abandona las ovejas». El verbo «deja» puede llevar aquí el sentido más fuerte de desampararlas en peligro.
    reason: lexical_alternative
lexical_decisions:
- source_word: μισθωτός
  english_pob_choice: hired hand
  chosen_spanish: asalariado
  alternatives_spanish:
  - jornalero
  - contratado
  lexicon: BDAG
  rationale: Denota a quien trabaja por paga. «Asalariado» conserva la idea de servicio remunerado y, en español, suena más natural y sobrio que un calco como «mano contratada».
- source_word: οὐκ ὢν ποιμήν
  english_pob_choice: who is not a shepherd
  chosen_spanish: que no es pastor
  alternatives_spanish:
  - no siendo pastor
  - que no es un pastor
  lexicon: BDAG
  rationale: La estructura participial se vierte con una relativa clara en español. «Pastor» mantiene la imagen pastoral del pasaje sin abstraerla.
- source_word: οὗ οὐκ ἔστιν τὰ πρόβατα ἴδια
  english_pob_choice: whose sheep are not his own
  chosen_spanish: cuyas ovejas no son suyas
  alternatives_spanish:
  - a quien las ovejas no pertenecen
  - cuyas propias ovejas no son
  lexicon: BDAG
  rationale: «Suyas» expresa pertenencia personal y reproduce bien ἴδια. Se mantiene la tensión de propiedad/personal relación que el contexto subraya.
- source_word: θεωρεῖ
  english_pob_choice: sees
  chosen_spanish: ve
  alternatives_spanish:
  - observa
  - advierte
  lexicon: BDAG
  rationale: En el contexto basta una percepción directa del peligro. «Ve» es la forma más natural y no añade matices interpretativos.
- source_word: τὸν λύκον ἐρχόμενον
  english_pob_choice: the wolf coming
  chosen_spanish: venir al lobo
  alternatives_spanish:
  - al lobo que viene
  - al lobo acercándose
  lexicon: BDAG
  rationale: Se invierte el orden para una sintaxis natural en español, conservando la imagen de movimiento inminente. La participialidad queda reflejada por el sentido progresivo de «venir».
- source_word: ἀφίησιν
  english_pob_choice: leaves
  chosen_spanish: deja
  alternatives_spanish:
  - abandona
  - desampara
  lexicon: BDAG
  rationale: «Deja» es el equivalente más directo y neutro; el contexto mismo comunica la culpa de abandonar en peligro. En nota se preserva la alternativa más fuerte donde el español puede sugerirla mejor.
- source_word: φεύγει
  english_pob_choice: flees
  chosen_spanish: huye
  alternatives_spanish:
  - se escapa
  - sale corriendo
  lexicon: BDAG
  rationale: «Huye» es breve, idiomático y transmite la idea de escapar ante el peligro sin coloquialidad excesiva.
- source_word: ἁρπάζει
  english_pob_choice: snatches
  chosen_spanish: arrebata
  alternatives_spanish:
  - sustrae
  - agarra violentamente
  lexicon: BDAG
  rationale: «Arrebata» comunica el sentido violento de tomar de golpe y suena natural en español bíblico contemporáneo.
- source_word: σκορπίζει
  english_pob_choice: scatters them
  chosen_spanish: las dispersa
  alternatives_spanish:
  - las esparce
  - las dispersa a todas
  lexicon: BDAG
  rationale: Se conserva el plural femenino implícito por «ovejas». «Dispersa» refleja el efecto de desorden y separación con buena precisión semántica.
theological_decisions:
- issue: Imagen pastoral sin reinterpretación alegórica
  english_pob_reading: Retain 'shepherd' and 'hired hand' as literal pastoral terms within the metaphor, without importing interpretive explanation into the text.
  chosen_spanish_reading: Mantener «pastor» y «asalariado» como términos literales de la metáfora, sin convertirlos en abstracciones explicativas.
  alternative_spanish_readings:
  - usar «líder» o «cuidador»
  - parafrasear como relación de autoridad y protección
  rationale: Juan 10 sostiene una metáfora pastoral continua. Traducir con términos abstractos diluiría la fuerza de la imagen y añadiría interpretación no presente en el griego.
  doctrine_reference: 'Translation philosophy: original-language primacy; never paraphrase beyond what the source text warrants.'
translation_notes:
  revision_awareness: El pasaje fue cotejado con el texto griego SBLGNT y con el rastro de decisión de la POB en inglés; no se detectaron cambios de revisión recientes que alteren la solución española propuesta.
  spanish_consistency_notes:
  - Se usa «ovejas» de manera consistente para πρόβατα, evitando «rebaño» porque el singular colectivo no corresponde al plural concreto del griego.
  - Se evita «Cristo» o terminología confesional ajena al verso, pues el pasaje depende de la metáfora pastoral y no de un título mesiánico explícito.
  - Se conserva la violencia léxica de ἁρπάζει con «arrebata» y no se suaviza a un mero «toma».
