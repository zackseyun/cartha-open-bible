translation:
  language: es
  text: Después de estas cosas, Jesús y sus discípulos fueron a la región de Judea[a], y allí permanecía con ellos[b] y bautizaba[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a la tierra de Judea» o simplemente «a Judea».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «se estaba quedando allí con ellos».'
    reason: lexical_alternative
  - marker: c
    text: Juan 4:2 aclara más adelante que Jesús mismo no bautizaba personalmente, sino sus discípulos.
    reason: cross_reference
lexical_decisions:
- source_word: Μετὰ ταῦτα
  english_pob_choice: After these things
  chosen_spanish: Después de estas cosas
  alternatives_spanish:
  - Después de esto
  - Luego
  lexicon: BDAG
  rationale: Conserva el plural demostrativo y la transición narrativa formal de Juan sin suavizarla demasiado. "Después de estas cosas" es natural en español bíblico y refleja mejor el matiz del original que una simple reducción a "Después de esto".
- source_word: ἦλθεν
  english_pob_choice: went
  chosen_spanish: fueron
  alternatives_spanish:
  - fue
  - vino
  lexicon: BDAG
  rationale: En español, con un sujeto coordinado plural, "fueron" expresa el movimiento hacia el destino de manera natural. Aunque el griego es singular con Jesús como sujeto principal, el español puede mantener el movimiento del conjunto Jesús y sus discípulos sin perder el evento narrativo.
- source_word: οἱ μαθηταὶ αὐτοῦ
  english_pob_choice: his disciples
  chosen_spanish: sus discípulos
  alternatives_spanish:
  - los discípulos de él
  lexicon: BDAG
  rationale: La construcción posesiva se vierte con la forma posesiva natural del español. "Sus discípulos" es claro, idiomático y conserva la relación de pertenencia/discípulado.
- source_word: εἰς τὴν Ἰουδαίαν γῆν
  english_pob_choice: the land of Judea
  chosen_spanish: la tierra de Judea
  alternatives_spanish:
  - el país de Judea
  - la región de Judea
  lexicon: BDAG
  rationale: '"γῆ" admite "tierra" o "región"; "la tierra de Judea" refleja con fidelidad la formulación del griego y la decisión inglesa revisada, sin imponer una interpretación más específica que el texto no exige. Se evita "Judea" a secas para no perder el sustantivo geográfico explícito.'
- source_word: διέτριβεν
  english_pob_choice: was spending time
  chosen_spanish: permanecía
  alternatives_spanish:
  - se quedaba
  - estaba pasando tiempo
  lexicon: BDAG
  rationale: El imperfecto indica acción continuada. En español, "permanecía" comunica la duración en el lugar con mayor naturalidad que una perífrasis larga, aunque la frase inglesa subraya "spending time". La decisión mantiene la idea de estancia prolongada sin sobrecargar la línea.
- source_word: μετ’ αὐτῶν
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - entre ellos
  lexicon: BDAG
  rationale: Traducción directa y natural del complemento preposicional. "Con ellos" mantiene la referencia a sus discípulos y no añade un matiz inexistente en el griego.
- source_word: ἐβάπτιζεν
  english_pob_choice: baptizing
  chosen_spanish: bautizaba
  alternatives_spanish:
  - sumergía
  - estaba bautizando
  lexicon: BDAG
  rationale: '"Bautizaba" conserva el valor imperfectivo y el acto religioso reconocido por el uso cristiano en español. Se evita añadir una perífrasis innecesaria, ya que el imperfecto simple transmite la acción en curso.'
theological_decisions:
- issue: Relación entre este versículo y la aclaración posterior de Juan 4:2 sobre quién bautizaba
  english_pob_reading: Retain the grammatical sense that Jesus was baptizing in this verse, while recognizing the later clarification that Jesus himself did not personally baptize but his disciples did.
  chosen_spanish_reading: Se mantiene que el texto presenta a Jesús como sujeto gramatical de "bautizaba", y se aclara en nota que Juan 4:2 después especifica que Jesús mismo no bautizaba personalmente, sino sus discípulos.
  alternative_spanish_readings:
  - Reformular el sujeto en el texto principal para referir el bautismo a los discípulos
  - Hacer impersonal la acción de bautizar
  rationale: El griego de este versículo atribuye la acción a Jesús mediante el verbo singular, y el español debe conservar esa lectura primaria. La nota permite respetar la aclaración narrativa posterior sin borrar la tensión textual.
  doctrine_reference: Preservar la tensión narrativa; Juan 4:2 como aclaración contextual, no corrección del versículo.
translation_notes:
  revision_awareness: La versión inglesa pasó de «the Judean countryside» a «the land of Judea» para reflejar con más precisión τὴν Ἰουδαίαν γῆν. La redacción española sigue esa revisión con «la tierra de Judea». También se preservó la tensión exegética sobre el sujeto de «bautizaba», reflejada en la nota de referencia cruzada.
  spanish_consistency_notes:
  - Se emplea «Jesús» como forma fija del nombre propio.
  - Se traduce γῆ con «tierra» para mantener el sustantivo geográfico explícito.
  - Se mantiene el imperfecto narrativo con «permanecía» y «bautizaba» para conservar el aspecto continuo.
  - Las notas usan marcadores únicos y aparecen ancladas en el texto principal.
