revisions:
- from: Después de estas cosas[a], Jesús y sus discípulos fueron a la tierra de Judea[b], y allí permanecía con ellos[c] y bautizaba.
  to: Después de estas cosas, Jesús y sus discípulos fueron a la región de Judea[a], y allí permanecía con ellos[b] y bautizaba[c].
  rationale: Se reemplaza «la tierra de Judea» por «la región de Judea» para lograr un español más natural sin perder el sentido geográfico explícito de γῆ. Se reordenan y reubican las notas para que la alternativa geográfica quede anclada en la expresión geográfica, la alternativa de διέτριβεν en «permanecía», y la aclaración de Juan 4:2 en «bautizaba», donde realmente corresponde. El resto del versículo puede mantenerse.
