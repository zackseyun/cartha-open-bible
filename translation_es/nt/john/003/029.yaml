source:
  edition: SBLGNT
  text: ὁ ἔχων τὴν νύμφην νυμφίος ἐστίν· ὁ δὲ φίλος τοῦ νυμφίου ὁ ἑστηκὼς καὶ ἀκούων αὐτοῦ, χαρᾷ χαίρει διὰ τὴν φωνὴν τοῦ νυμφίου. αὕτη οὖν ἡ χαρὰ ἡ ἐμὴ πεπλήρωται.
base_translation:
  language: en
  yaml_path: translation/nt/john/003/029.yaml
  text: The one who has the bride is the bridegroom[a]. But the friend of the bridegroom, who stands and hears him, rejoices greatly because of the bridegroom’s voice[c][b]. Therefore this joy of mine has been made complete.
  footnotes:
  - marker: a
    text: Or 'the bridegroom’s friend'; culturally, this role may resemble a 'best man,' but the Greek expression is literally 'friend of the bridegroom.'
    reason: cultural_note
  - marker: b
    text: Or 'rejoices with joy'—a more literal rendering of the emphatic Greek expression.
    reason: lexical_alternative
  - marker: c
    text: Or 'has been fulfilled.' The Greek can denote being brought to fullness or completion.
    reason: lexical_alternative
