translation:
  language: es
  text: El que tiene la novia es el novio. Pero el amigo del novio[a], el que está de pie y lo oye, se alegra mucho[b] por la voz del novio[c]. Por tanto, este gozo mío se ha completado[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el amigo del novio» dicho de otro modo, «el amigo del novio». Culturalmente, esta función puede asemejarse a la de un «padrino» de boda, pero la expresión griega es literalmente «amigo del novio».
    reason: cultural_note
  - marker: b
    text: O «se alegra con gozo»; el griego usa una expresión enfática con sustantivo y verbo de la misma raíz.
    reason: lexical_alternative
  - marker: c
    text: O «a causa de la voz del novio»; también puede entenderse como «al oír la voz del novio».
    reason: lexical_alternative
  - marker: d
    text: O «ha sido cumplido» o «ha sido llevado a plenitud»; el griego puede denotar plenitud o completitud alcanzada.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ἔχων
  english_pob_choice: The one who has
  chosen_spanish: El que tiene
  alternatives_spanish:
  - El que posee
  - Quien tiene
  lexicon: BDAG
  rationale: Participio articular con valor sustantivo; «el que tiene» conserva la fuerza genérica natural del español y evita una paráfrasis excesiva.
- source_word: τὴν νύμφην
  english_pob_choice: the bride
  chosen_spanish: la novia
  alternatives_spanish:
  - la prometida
  - la esposa
  lexicon: BDAG
  rationale: En el español actual, «novia» comunica mejor la imagen nupcial inmediata. «Esposa» debilitaría el contraste metafórico con «novio»; «prometida» sería más restrictivo de lo que el contexto exige.
- source_word: νυμφίος
  english_pob_choice: the bridegroom
  chosen_spanish: el novio
  alternatives_spanish:
  - el esposo
  - el desposado
  lexicon: BDAG
  rationale: Aunque «novio» es menos formal que «bridegroom», en español bíblico moderno mantiene la relación natural con «novia» y evita un arcaísmo pesado. La metáfora matrimonial sigue clara.
- source_word: φίλος τοῦ νυμφίου
  english_pob_choice: the friend of the bridegroom
  chosen_spanish: el amigo del novio
  alternatives_spanish:
  - el amigo del esposo
  - el amigo del desposado
  lexicon: BDAG
  rationale: La expresión griega dice literalmente «amigo». Se mantiene esa forma en el texto principal y se deja la posible función cultural para nota, sin importar «best man» al cuerpo del texto.
- source_word: ὁ ἑστηκὼς
  english_pob_choice: who stands
  chosen_spanish: el que está de pie
  alternatives_spanish:
  - el que permanece
  - el que se mantiene
  lexicon: BDAG
  rationale: El participio perfecto de ἵστημι sugiere postura de estar/estar en pie con relevancia presente. «Está de pie» es natural y visual en español.
- source_word: καὶ ἀκούων αὐτοῦ
  english_pob_choice: and hears him
  chosen_spanish: y lo oye
  alternatives_spanish:
  - y escucha su voz
  - y lo escucha
  lexicon: BDAG
  rationale: «Oye» reproduce de forma sobria ἀκούω con pronombre genitivo. Se evita añadir «voz» aquí porque el texto la menciona después.
- source_word: χαρᾷ χαίρει
  english_pob_choice: rejoices greatly
  chosen_spanish: se alegra
  alternatives_spanish:
  - se alegra mucho
  - goza con gozo
  lexicon: BDAG
  rationale: El griego es enfático por el sustantivo cognado, pero en español «se alegra mucho» o una fórmula similar puede sonar recargada. Se conserva la naturalidad y se explica la intensidad en nota.
- source_word: διὰ τὴν φωνὴν τοῦ νυμφίου
  english_pob_choice: because of the bridegroom’s voice
  chosen_spanish: por la voz del novio
  alternatives_spanish:
  - a causa de la voz del novio
  - al oír la voz del novio
  lexicon: BDAG
  rationale: διά con acusativo expresa causa; «por la voz» es conciso y fiel. No se explicita «al oír» en el texto para no interpretar más de lo que dice el griego.
- source_word: αὕτη οὖν
  english_pob_choice: Therefore this
  chosen_spanish: Por tanto, este
  alternatives_spanish:
  - Así pues, este
  - Entonces, este
  lexicon: BDAG
  rationale: «Por tanto» expresa bien la inferencia de οὖν y funciona con dignidad en español bíblico contemporáneo.
- source_word: ἡ χαρὰ ἡ ἐμὴ
  english_pob_choice: this joy of mine
  chosen_spanish: este gozo mío
  alternatives_spanish:
  - mi gozo
  - este gozo que es mío
  lexicon: BDAG
  rationale: Se conserva el demostrativo y el énfasis posesivo. «Gozo» refleja con buen registro el tono bíblico y permite la repetición con χαρά.
- source_word: πεπλήρωται
  english_pob_choice: has been made complete
  chosen_spanish: se ha completado
  alternatives_spanish:
  - ha sido completado
  - ha llegado a su plenitud
  lexicon: BDAG
  rationale: El perfecto pasivo/resultativo expresa un estado ya alcanzado. «Se ha completado» comunica adecuadamente la plenitud lograda sin forzar una lectura profética de «cumplimiento».
theological_decisions:
- issue: Imaginario matrimonial y posible carga eclesiológica
  english_pob_reading: The verse is rendered to preserve the metaphor of Jesus as bridegroom and John as the bridegroom's friend without importing later ecclesiological conclusions into the wording.
  chosen_spanish_reading: 'Se conserva la metáfora nupcial: Jesús como novio y Juan como el amigo del novio, sin añadir en el texto una identificación explícita de la novia con la iglesia u otro referente teológico posterior.'
  alternative_spanish_readings:
  - Traducir φίλος τοῦ νυμφίου como «el padrino» o «el mejor amigo del novio»
  - Explicitar «la novia» como «el pueblo de Dios» o «la iglesia»
  rationale: El versículo usa lenguaje metafórico, pero no define aquí la identidad teológica de la novia. La traducción debe preservar esa tensión y dejar la inferencia al comentario, no incrustarla en la redacción.
  doctrine_reference: Preservar la tensión teológica sin resolverla prematuramente.
translation_notes:
  revision_awareness: El pasaje coincide de manera alta con el texto fuente y con el trazado auditado en inglés. Se mantuvo la imagen nupcial, la referencia causal de διά, y el cierre resultativo de πεπλήρωται. Se optó por un español natural y publicable, sin introducir una equivalencia eclesiológica explícita ni resolver la metáfora más allá de lo que el griego permite.
  spanish_consistency_notes:
  - Se usó «novia/novio» para mantener una pareja léxica clara y comprensible en español, aunque el inglés POB prefiere «bridegroom» como término técnico; la nota conserva la literalidad griega.
  - «Gozo» y «se ha completado» mantienen el tono bíblico sin caer en arcaísmos innecesarios.
  - Las notas distinguen entre alternativa cultural y alternativa estrictamente lexical, para preservar la trazabilidad auditada.
