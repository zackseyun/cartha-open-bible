revisions:
- from: El que tiene la novia[a] es el novio. Pero el amigo del novio, el que está de pie y lo oye, se alegra[b] por la voz del novio[c]. Por tanto, este gozo mío se ha completado.
  to: El que tiene la novia es el novio. Pero el amigo del novio[a], el que está de pie y lo oye, se alegra mucho[b] por la voz del novio[c]. Por tanto, este gozo mío se ha completado[d].
  rationale: 'Se corrigen las notas para alinearlas con el griego y con el expediente POB inglés: la nota cultural se traslada a «amigo del novio» y se elimina la alternativa errónea «la novia del novio»; se recupera la nota para πεπλήρωται; y se mantiene la nota causal sobre «voz». En el texto principal, «se alegra mucho» refleja mejor la intensidad de χαρᾷ χαίρει sin perder naturalidad en español.'
