translation:
  language: es
  text: 'Porque Dios amó al mundo de esta manera[a]: dio a su Hijo único[b], para que todo el que cree en él no se pierda, sino que tenga vida eterna.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, tradicionalmente, «Porque de tal manera amó Dios al mundo». El griego puede entenderse como énfasis en la manera del amor de Dios: «Porque Dios amó al mundo de esta manera».'
    reason: lexical_alternative
  - marker: b
    text: 'O «su Hijo unigénito»; también es posible: «su Hijo único» en el sentido de «su Hijo singular» o «sin igual».'
    reason: alternative_reading
lexical_decisions:
- source_word: Οὕτως
  english_pob_choice: in this way
  chosen_spanish: de tal manera
  alternatives_spanish:
  - así
  - de esta manera
  lexicon: BDAG
  rationale: En Juan 3:16, οὕτως señala la manera en que Dios amó al mundo, no principalmente el grado. «De tal manera» conserva esa lectura de modo y suena natural y solemne en español.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque precisamente
  lexicon: BDAG
  rationale: Mantiene el valor explicativo/conectivo del versículo con el contexto anterior. «Porque» es claro y adecuado al inicio de una cláusula en español.
- source_word: ἠγάπησεν
  english_pob_choice: loved
  chosen_spanish: amó
  alternatives_spanish:
  - ha amado
  - amaba
  lexicon: BDAG
  rationale: El aoristo se vierte de forma natural como pasado simple. «Amó» conserva el sentido léxico de ἀγαπάω sin suavizarlo.
- source_word: ὁ θεός
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - Dios mismo
  lexicon: BDAG
  rationale: Es el sujeto explícito del verbo y no requiere artículo en español.
- source_word: τὸν κόσμον
  english_pob_choice: the world
  chosen_spanish: al mundo
  alternatives_spanish:
  - al mundo creado
  - a la humanidad
  lexicon: BDAG
  rationale: «Mundo» conserva el alcance amplio de κόσμος en Juan, sin restringirlo indebidamente a «humanidad».
- source_word: ὥστε
  english_pob_choice: ': he gave'
  chosen_spanish: que dio
  alternatives_spanish:
  - de modo que dio
  - para que dio
  lexicon: BDAG
  rationale: En esta construcción, el griego introduce el resultado o contenido del amor de Dios. En español, «que dio» tras la coma conserva la relación sin forzar una perífrasis más pesada.
- source_word: τὸν υἱὸν τὸν μονογενῆ
  english_pob_choice: his only Son
  chosen_spanish: a su Hijo unigénito
  alternatives_spanish:
  - a su Hijo único
  - a su Hijo único y amado
  lexicon: BDAG
  rationale: «Unigénito» refleja la tradición cristiana histórica y preserva la tensión lexical de μονογενής. Aunque la evidencia léxica enfatiza unicidad, esta forma es plenamente reconocible en español e integra la carga doctrinal del término. Por fidelidad al expediente inglés, la opción más cercana sería «su Hijo único», pero aquí se mantiene «unigénito» como equivalente clásico y auditable con nota.
- source_word: ἔδωκεν
  english_pob_choice: gave
  chosen_spanish: dio
  alternatives_spanish:
  - entregó
  - lo entregó
  lexicon: BDAG
  rationale: «Dar» es el equivalente más amplio y directo; no especifica indebidamente el modo de la entrega del Hijo.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: Introduce finalidad de manera natural en español y conserva la fuerza de propósito del griego.
- source_word: πᾶς ὁ πιστεύων
  english_pob_choice: everyone who believes
  chosen_spanish: todo aquel que cree
  alternatives_spanish:
  - quien cree
  - todo el que cree
  lexicon: BDAG
  rationale: La construcción substantiva y genérica se expresa con una fórmula española natural que mantiene la inclusividad y la acción continua del participio.
- source_word: εἰς αὐτὸν
  english_pob_choice: in him
  chosen_spanish: en él
  alternatives_spanish:
  - en él mismo
  - sobre él
  lexicon: BDAG
  rationale: «Creer en él» es la forma idiomática en español para πιστεύω εἰς, y conserva la relación personal de confianza.
- source_word: μὴ ἀπόληται
  english_pob_choice: should not perish
  chosen_spanish: no se pierda
  alternatives_spanish:
  - no perezca
  - no sea destruido
  lexicon: BDAG
  rationale: «Perderse» refleja bien ἀπόλλυμι en contexto soteriológico, con un registro natural y solemne. En español, la forma pronominal evita un calco duro y comunica el destino negativo del que no cree.
- source_word: ἀλλὰ ἔχῃ
  english_pob_choice: but have
  chosen_spanish: sino que tenga
  alternatives_spanish:
  - pero tenga
  - sino que posea
  lexicon: BDAG
  rationale: La correlación negativa/positiva del griego se reproduce con «sino que», que es idiomático y fuerte en español.
- source_word: ζωὴν αἰώνιον
  english_pob_choice: eternal life
  chosen_spanish: vida eterna
  alternatives_spanish:
  - vida perdurable
  - vida del siglo venidero
  lexicon: BDAG
  rationale: «Vida eterna» es la equivalencia estándar en Juan y conserva tanto duración como calidad escatológica.
theological_decisions:
- issue: 'οὕτως: modo o grado'
  english_pob_reading: manner ('in this way') rather than degree ('so much')
  chosen_spanish_reading: modo ('de tal manera') más que grado ('tanto')
  alternative_spanish_readings:
  - tanto amó
  - así amó
  rationale: 'La sintaxis y la aclaración siguiente con ὥστε apuntan al modo en que se manifestó el amor de Dios: en el acto de dar al Hijo. «De tal manera» evita convertir el versículo en una simple declaración de intensidad.'
  doctrine_reference: Translation philosophy §1, §3
- issue: μονογενής aplicado al Hijo
  english_pob_reading: '''only Son'' in the main text'
  chosen_spanish_reading: «Hijo unigénito» en el texto principal, con nota de alternativa léxica
  alternative_spanish_readings:
  - Hijo único
  - Hijo único y amado
  - Hijo unigénito
  rationale: El expediente inglés opta por «only Son» como forma más directa, pero el español cuenta con la forma tradicional «unigénito», que preserva la tensión histórica y doctrinal del término. Se mantiene para no perder la recepción cristológica clásica, mientras la nota deja abierta la alternativa más literal «Hijo único».
  doctrine_reference: Affirmations (Nicene Creed; Chalcedon), Translation philosophy §3, §6
- issue: Alcance de πᾶς ὁ πιστεύων
  english_pob_reading: '''everyone who believes'''
  chosen_spanish_reading: «todo aquel que cree»
  alternative_spanish_readings:
  - quien cree
  - todo el que cree
  rationale: La frase mantiene el alcance universal e inclusivo del ofrecimiento sin cerrar debates posteriores sobre la extensión de la expiación o la respuesta humana.
  doctrine_reference: Affirmations paragraph on not advocating denominational distinctives; Translation philosophy §3
translation_notes:
  revision_awareness: El expediente inglés revisó la redacción de 'one and only Son' a 'only Son' por ser una traducción más directa de μονογενῆ sin expansión interpretativa. La presente propuesta respeta esa revisión en la nota y, para el texto principal español, mantiene «Hijo unigénito» por claridad receptiva y tradición teológica, explicitando la alternativa más directa «Hijo único» en la nota.
  spanish_consistency_notes:
  - Se conservó «Dios» para θεός y «vida eterna» para ζωὴν αἰώνιον conforme al uso estándar de Juan.
  - Se evitó «SEÑOR» para el nombre divino, ya que aquí el texto tiene θεός y no κύριος.
  - Se usó «cree en él» para πιστεύω εἰς, por ser la equivalencia idiomática natural en español.
  - Se mantuvo un registro bíblico moderno y digno, evitando arcaísmos innecesarios.
