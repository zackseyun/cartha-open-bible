revisions:
- from: Porque de tal manera amó Dios al mundo, que dio a su Hijo unigénito[a], para que todo aquel que cree en él no se pierda, sino que tenga vida eterna.
  to: 'Porque Dios amó al mundo de esta manera[a]: dio a su Hijo único[b], para que todo el que cree en él no se pierda, sino que tenga vida eterna.'
  rationale: Se corrigió Οὕτως a «de esta manera» para preservar el sentido de modo establecido por el expediente fuente y evitar la lectura predominante de intensidad asociada con «de tal manera». Se cambió «Hijo unigénito» a «Hijo único» en el texto principal para alinearse con la revisión auditada del POB inglés ('his only Son'), preservando «unigénito» en nota por su importancia tradicional y teológica. También se dividieron y ordenaron las notas para que cada una corresponda a su punto léxico específico, y se usaron dos puntos tras «de esta manera» para reflejar la función explicativa/resultativa de ὥστε con mejor español.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:02:46Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite correctamente la estructura básica del versículo y conserva bien Dios, mundo, creer en él, no perecer/perderse y vida eterna. Sin embargo, no sigue de forma suficientemente fiel el expediente auditado en dos puntos clave: (1) Οὕτως fue decidido en el POB inglés como sentido de modo (''in this way''), mientras que «de tal manera» en español tiende a oírse como intensidad y además la nota actual invierte la relación entre texto principal y alternativa; (2) μονογενής fue revisado en el POB inglés a ''his only Son'' en texto principal, con nota para ''only begotten/unique'', pero el borrador pone «Hijo unigénito» en el texto principal, contrariando la decisión auditada. Esto requiere ajuste, pero no hay una dificultad doctrinal o textual que impida una corrección directa.'
  spanish_quality_summary: 'El español es legible y digno, pero está demasiado influido por la tradición RV en «de tal manera» y «unigénito», lo que aquí enturbia la precisión semántica buscada por el proyecto. Una redacción como «Porque Dios amó al mundo de esta manera: dio a su Hijo único...» suena natural en español contemporáneo, refleja mejor el sentido de modo, y armoniza con la puntuación/resultativo del expediente inglés. «Todo el que cree en él» o «todo aquel que cree en él» son ambos naturales; se puede mantener una forma inclusiva y fluida.'
  glossary_alignment: 'No hay conflicto con términos de glosario mayor como Dios, Jesús, Mesías, Yahvé, etc. El problema principal es de alineación léxica auditada: μονογενής debe representarse en español preferentemente como «único» en el texto principal, con «unigénito» en nota por su peso tradicional. Οὕτως debe reflejar modo, mejor con «de esta manera»/«así».'
  issues:
  - severity: high
    issue: El texto principal traduce Οὕτως como «de tal manera»
    rationale: 'Aunque puede admitir lectura de modo, en español contemporáneo esta frase se entiende fácilmente como grado/intensidad («tanto»), mientras que el expediente POB decidió explícitamente el sentido de modo: ''in this way''.'
  - severity: high
    issue: El texto principal usa «Hijo unigénito» para μονογενής
    rationale: El expediente auditado revisó el inglés a 'his only Son' en el texto principal y dejó 'only begotten/unique' como alternativas de nota. Mantener «unigénito» en el texto principal contradice esa decisión documentada.
  - severity: medium
    issue: La nota al pie combina y confunde dos decisiones distintas
    rationale: La nota actual presenta como alternativa tradicional la misma lectura del texto principal y mezcla allí también la alternativa de μονογενής. Conviene separar la nota sobre Οὕτως de la nota sobre «Hijo único/unigénito», como hace el expediente inglés.
  - severity: low
    issue: La puntuación puede reflejar mejor la relación explicativa de ὥστε
    rationale: Tras «de esta manera», dos puntos introducen con claridad el acto concreto por el cual Dios amó al mundo, en línea con la decisión estilística del POB inglés.
