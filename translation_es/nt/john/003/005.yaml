translation:
  language: es
  text: 'Jesús respondió: «En verdad, en verdad te digo: si alguien no nace de agua y del Espíritu[a], no puede entrar en el reino de Dios».[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «espíritu». El griego puede leerse con minúscula, aunque en este contexto la referencia al Espíritu Santo es la más probable.
    reason: alternative_reading
  - marker: b
    text: «De agua y del Espíritu» se ha entendido de distintas maneras, incluso como imagen de limpieza y renovación, como referencia al nacimiento físico y al nacimiento espiritual, o como referencia al bautismo. La traducción conserva la redacción griega sin decidir la cuestión interpretativa en el texto principal.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: BDAG
  rationale: En diálogo narrativo, ἀποκρίνομαι se vierte naturalmente como una respuesta verbal. «Respondió» conserva la función de réplica sin añadir matices innecesarios.
- source_word: Ἀμὴν ἀμὴν
  english_pob_choice: Truly, truly
  chosen_spanish: De cierto, de cierto
  alternatives_spanish:
  - Amén, amén
  - En verdad, en verdad
  lexicon: BDAG
  rationale: Se preserva la fórmula enfática doble con una expresión española solemne y clara. «De cierto, de cierto» es reconocible en registro bíblico y comunica la solemnidad del original sin transliteración.
- source_word: λέγω σοι
  english_pob_choice: I say to you
  chosen_spanish: te digo
  alternatives_spanish:
  - les digo
  - os digo
  lexicon: BDAG
  rationale: El dativo singular σοι se expresa de modo directo con «te». En español la fórmula resulta más natural como parte de la locución solemne completa.
- source_word: ἐὰν μή τις
  english_pob_choice: unless someone
  chosen_spanish: si alguien no
  alternatives_spanish:
  - a menos que alguien
  - a menos que uno
  lexicon: BDAG
  rationale: La combinación condicional negativa se vierte con una estructura natural en español que conserva la fuerza universal e indefinida de τις sin forzar género ni especificidad.
- source_word: γεννηθῇ
  english_pob_choice: is born
  chosen_spanish: nace
  alternatives_spanish:
  - es engendrado
  - vuelve a nacer
  - nace de nuevo
  lexicon: BDAG
  rationale: Aquí γεννάω funciona como pasivo de nacer/ser nacido. Se evita «de nuevo» o «nacer otra vez» porque el verso no contiene ἄνωθεν; la traducción se mantiene en el significado inmediato del texto.
- source_word: ἐξ ὕδατος
  english_pob_choice: of water
  chosen_spanish: de agua
  alternatives_spanish:
  - a partir de agua
  - del agua
  lexicon: BDAG
  rationale: «De agua» reproduce de manera natural la relación originaria expresada por ἐκ/ἐξ en español y evita sobredeterminar el sentido.
- source_word: καὶ πνεύματος
  english_pob_choice: and the Spirit
  chosen_spanish: y del Espíritu
  alternatives_spanish:
  - y del espíritu
  - y del Espíritu Santo
  lexicon: BDAG
  rationale: Se capitaliza «Espíritu» siguiendo la lectura probable del Espíritu Santo en este contexto joánico, pero se conserva el artículo genérico en español para reflejar la fluidez natural de la frase y no imponer una formulación confesional más amplia.
- source_word: οὐ δύναται
  english_pob_choice: is not able
  chosen_spanish: no puede
  alternatives_spanish:
  - no es capaz de
  - no tiene poder para
  lexicon: BDAG
  rationale: «No puede» es la forma más natural en español y expresa la incapacidad explícita de δύναμαι. Se mantiene el sentido de imposibilidad, no solo de falta de permiso.
- source_word: εἰσελθεῖν
  english_pob_choice: to enter
  chosen_spanish: entrar
  alternatives_spanish:
  - ingresar
  - entrar en
  lexicon: BDAG
  rationale: «Entrar» es el equivalente usual de εἰσέρχομαι. La construcción con «en» aparece después para conservar el movimiento hacia la esfera indicada por el sustantivo final.
- source_word: βασιλείαν τοῦ θεοῦ
  english_pob_choice: the kingdom of God
  chosen_spanish: el reino de Dios
  alternatives_spanish:
  - el reinado de Dios
  - la realeza de Dios
  lexicon: BDAG
  rationale: Se conserva la forma tradicional y transparente «reino de Dios», que comunica bien tanto el aspecto de ámbito como el de gobierno divino sin introducir una paráfrasis interpretativa.
theological_decisions:
- issue: Sentido de πνεύματος en ἐξ ὕδατος καὶ πνεύματος
  english_pob_reading: Spirit, referring to the Holy Spirit
  chosen_spanish_reading: Espíritu, probablemente el Espíritu Santo
  alternative_spanish_readings:
  - espíritu, entendido como principio espiritual humano
  - Espíritu, sin precisar explícitamente al Espíritu Santo
  rationale: La mayúscula en «Espíritu» sigue la lectura más probable del contexto joánico y la auditoría inglesa, pero el español no fuerza una glosa interpretativa en el cuerpo del texto. Se preserva la tensión entre la probable referencia pneumatológica y la falta de artículo en griego mediante una nota.
  doctrine_reference: Preservar la tensión interpretativa sin resolverla de manera confesional en el texto principal
- issue: Alcance de «nace de agua y del Espíritu»
  english_pob_reading: A unified expression for the cleansing and renewing birth required for entry into God's kingdom
  chosen_spanish_reading: Expresión unitaria para el nacimiento requerido para entrar en el reino de Dios, con posible trasfondo de limpieza y renovación
  alternative_spanish_readings:
  - agua como nacimiento físico y Espíritu como nacimiento espiritual
  - referencia específica al bautismo cristiano
  rationale: La redacción española mantiene la frase compacta y no decide entre lecturas bautismales, antropológicas o simbólicas. Así se conserva la ambigüedad documentada por la POB inglesa y por la discusión exegética.
  doctrine_reference: No fijar una lectura sacramental o alegórica donde el griego permite más de una lectura
- issue: Fórmula solemne «Ἀμὴν ἀμὴν λέγω σοι»
  english_pob_reading: Truly, truly, I say to you
  chosen_spanish_reading: De cierto, de cierto te digo
  alternative_spanish_readings:
  - Amén, amén te digo
  - En verdad, en verdad te digo
  rationale: Se emplea una fórmula bíblica solemne y comprensible que reproduce la intensidad del doble ἀμήν sin depender de transliteración. Esto mantiene el registro de revelación solemne propio del Evangelio de Juan.
  doctrine_reference: Mantener la función retórica y revelatoria del doble amén
translation_notes:
  revision_awareness: La versión española sigue la última revisión inglesa que añadió «the Spirit» y la refleja como «del Espíritu», manteniendo a la vez la posibilidad gramatical de una lectura con minúscula en nota. También conserva la no-importación de «again/from above», ya que ἄνωθεν no aparece en este versículo. Se mantiene la fórmula doble solemne y la estructura condicional negativa sin resolver interpretaciones sacramentales.
  spanish_consistency_notes:
  - Se usa «Jesús» para Ἰησοῦς, «Dios» para θεοῦ y «reino de Dios» para βασιλείαν τοῦ θεοῦ.
  - Se prefiere «Espíritu» con mayúscula en el texto principal por coherencia con la lectura probable del Espíritu Santo, pero se documenta la alternativa con minúscula.
  - Se evita «Cristo» porque no aparece en el versículo y no hay justificación para introducirlo.
  - Se usa «de cierto, de cierto» para reflejar la fórmula solemne sin calco mecánico.
  - Se evita añadir «nacer de nuevo» o «nacer otra vez» porque el griego de este versículo no contiene ἄνωθεν.
