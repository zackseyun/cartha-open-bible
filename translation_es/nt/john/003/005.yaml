base_translation:
  language: en
  yaml_path: translation/nt/john/003/005.yaml
  text: Jesus answered[a], “Truly, truly, I say to you, unless someone is born of water and the Spirit[b], he is not able to enter the kingdom of God.”
  footnotes:
  - marker: a
    text: Or 'water and spirit.' The Greek can be read with a lower-case 'spirit,' though 'Spirit' is likely here.
    reason: alternative_reading
  - marker: b
    text: '''Of water and Spirit'' has been understood in different ways, including as imagery of cleansing and renewal, as a reference to physical birth and spiritual birth, or as a reference to baptism. The translation preserves the Greek wording without deciding the interpretive question in the main text.'
    reason: lexical_alternative
