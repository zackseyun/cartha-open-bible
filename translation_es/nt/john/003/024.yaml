lexical_decisions:
- source_word: οὔπω
  english_pob_choice: not yet
  chosen_spanish: aún no
  alternatives_spanish:
  - todavía no
  lexicon: BDAG
  rationale: La idea es una negación temporal de cumplimiento hasta el punto narrativo presente. «Aún no» reproduce bien ese valor en español, con naturalidad y precisión.
- source_word: γὰρ
  english_pob_choice: for
  chosen_spanish: Porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Aquí γάρ introduce explicación de fondo. «Porque» comunica esa relación explicativa de manera clara en español, sin añadir matices causales más fuertes de los que el griego exige.
- source_word: ἦν βεβλημένος
  english_pob_choice: had ... been thrown
  chosen_spanish: había sido arrojado
  alternatives_spanish:
  - había sido echado
  - había sido puesto
  lexicon: BDAG
  rationale: La perífrasis griega expresa una acción completada antes del punto de referencia. El pluscuamperfecto pasivo «había sido arrojado» conserva ese tiempo/aspecto y refleja con más fuerza verbal la base de βάλλω que «puesto».
- source_word: εἰς τὴν φυλακήν
  english_pob_choice: into prison
  chosen_spanish: a la cárcel
  alternatives_spanish:
  - en la cárcel
  - a prisión
  - en prisión
  lexicon: BDAG
  rationale: En español, «cárcel» es la forma más natural y comprensible para φυλακή en este contexto. El valor direccional de εἰς queda bien expresado con «a» en un pasivo de traslado/incarcelación; «prisión» también sería posible, pero «cárcel» suena más directo y menos técnico.
- source_word: ὁ Ἰωάννης
  english_pob_choice: John
  chosen_spanish: Juan
  alternatives_spanish:
  - Juan el Bautista
  lexicon: BDAG
  rationale: El texto griego nombra simplemente a «Juan». En el contexto narrativo se entiende que es Juan el Bautista, pero el nombre compuesto no está en el versículo. Por fidelidad al texto, se mantiene solo «Juan» y se deja la aclaración en nota.
theological_decisions:
- issue: Identificación de Juan
  english_pob_reading: 'John; footnote: That is, John the Baptist.'
  chosen_spanish_reading: Juan[a]
  alternative_spanish_readings:
  - Juan el Bautista
  rationale: El texto fuente no añade el identificador «el Bautista»; la identificación es contextual. Para no introducir información no expresada en la línea principal, se conserva «Juan» y se explica en nota.
  doctrine_reference: 'Translation philosophy: Never paraphrase beyond what the source text warrants.'
translation_notes:
  revision_awareness: El testigo fuente y el control cruzado concuerdan ampliamente; no se requieren revisiones textuales ni de sentido. La versión inglesa auditada también evita expandir el nombre en el cuerpo del versículo, y esa decisión se conserva en español.
  spanish_consistency_notes:
  - Se mantiene el nombre «Juan» sin expandirlo en el texto principal, siguiendo la restricción de no añadir material contextual al versículo.
  - «Aún no» conserva el matiz aspectual de οὔπω de manera natural en español.
  - «Había sido arrojado» preserva el pluscuamperfecto pasivo de ἦν βεβλημένος.
  - Se prefirió «cárcel» por idiomaticidad; «prisión» queda como alternativa válida pero menos coloquial en español bíblico moderno.
