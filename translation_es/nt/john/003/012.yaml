translation:
  language: es
  text: Si les hablé de cosas terrenales[a] y no creen, ¿cómo creerán si les hablo de cosas celestiales[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'cosas de la tierra' para 'cosas terrenales'.
    reason: lexical_alternative
  - marker: b
    text: O 'cosas en el cielo' para 'cosas celestiales'.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὰ ἐπίγεια
  english_pob_choice: earthly things
  chosen_spanish: cosas terrenales
  alternatives_spanish:
  - cosas de la tierra
  - cosas terrestres
  lexicon: BDAG
  rationale: El adjetivo neutro plural funciona sustantivado y contrasta con τὰ ἐπουράνια. 'Cosas terrenales' mantiene ese contraste y suena natural en español sin concretar indebidamente si se trata de realidades en la tierra o de ilustraciones tomadas de lo terrenal.
- source_word: εἶπον
  english_pob_choice: I told
  chosen_spanish: les hablé
  alternatives_spanish:
  - les dije
  - les hablé de
  lexicon: BDAG
  rationale: El aoristo de λέγω remite a una declaración previa de Jesús dirigida al mismo grupo. En español, 'les hablé' conserva el sentido de comunicación previa y permite la relación directa con el complemento implícito de las 'cosas terrenales'.
- source_word: πιστεύετε
  english_pob_choice: you do not believe
  chosen_spanish: no creen
  alternatives_spanish:
  - no creen ustedes
  - no están creyendo
  lexicon: BDAG
  rationale: El presente con οὐ expresa una respuesta actual y sostenida. 'No creen' reproduce con naturalidad el valor verbal sin forzar una perífrasis aspectual en español.
- source_word: πῶς
  english_pob_choice: how will you believe
  chosen_spanish: ¿cómo creerán?
  alternatives_spanish:
  - ¿cómo podrán creer?
  - ¿cómo creerían?
  lexicon: BDAG
  rationale: La pregunta retórica conserva el sentido de imposibilidad o fuerte improbabilidad ante la falta de fe. '¿Cómo creerán?' sigue de cerca el futuro griego y resulta idiomático en español.
- source_word: ἐὰν εἴπω
  english_pob_choice: if I tell
  chosen_spanish: si les hablo
  alternatives_spanish:
  - si les dijera
  - si les dijese
  lexicon: BDAG
  rationale: La construcción condicional futura más vívida puede expresarse de forma natural con 'si les hablo' en español. El matiz no exige una forma hipotética en castellano para transmitir la relación temporal y condicional.
- source_word: τὰ ἐπουράνια
  english_pob_choice: heavenly things
  chosen_spanish: cosas celestiales
  alternatives_spanish:
  - cosas del cielo
  - realidades celestiales
  lexicon: BDAG
  rationale: El neutro plural sustantivado conserva el paralelo con τὰ ἐπίγεια. 'Celestiales' mantiene el contraste con 'terrenales' y evita limitar el sentido a 'cosas en el cielo' cuando el griego es más amplio.
theological_decisions:
- issue: Contraste entre realidades terrenales y celestiales
  english_pob_reading: Render the contrast straightforwardly without specifying whether 'earthly things' means earthly analogies or matters occurring on earth, and without defining 'heavenly things' beyond the text.
  chosen_spanish_reading: Mantener el contraste de dos ámbitos o clases de realidades sin precisar más de lo que dice el texto.
  alternative_spanish_readings:
  - '''cosas terrenales'' como ejemplos tomados de la experiencia humana'
  - '''cosas celestiales'' como misterios divinos más profundos'
  rationale: El pasaje opone dos categorías de enseñanza, pero no obliga a resolver cuál es el alcance exacto de cada una. La traducción preserva la tensión interpretativa en vez de explicarla de antemano.
  doctrine_reference: 'Translation philosophy §3: Preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: Coincide con la revisión más reciente sin cambios necesarios; se mantiene el acuerdo alto del control cruzado y la formulación evita resolver el alcance de la oposición 'terrenales/celestiales'.
  spanish_consistency_notes:
  - Se usa 'les' por el plural de ὑμῖν en ambos casos.
  - Se conserva el paralelismo entre 'cosas terrenales' y 'cosas celestiales' para reflejar τὰ ἐπίγεια / τὰ ἐπουράνια.
  - La puntuación interrogativa española sigue la estructura retórica del griego.
