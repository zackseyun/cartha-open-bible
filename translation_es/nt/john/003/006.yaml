translation:
  language: es
  text: Lo que ha nacido de la carne es carne[a], y lo que ha nacido del Espíritu es espíritu[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «Lo que ha nacido de la carne es naturaleza humana»; la palabra griega «carne» puede, en algunos contextos, llevar el sentido de naturaleza humana caída o pecaminosa, pero aquí el contraste es principalmente con el nacimiento del Espíritu.
    reason: lexical_alternative
  - marker: b
    text: O, «lo que ha nacido del Espíritu es espiritual». El griego dice «es espíritu», preservando un contraste cualitativo con «carne».
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸ γεγεννημένον
  english_pob_choice: what is born
  chosen_spanish: lo que ha nacido
  alternatives_spanish:
  - el que ha nacido
  - aquello que ha nacido
  - lo engendrado
  lexicon: BDAG
  rationale: El neutro singular con participio perfecto pasivo funciona de manera genérica/categorial. En español, «lo que ha nacido» conserva ese valor impersonal y evita personalizar innecesariamente el sujeto.
- source_word: ἐκ
  english_pob_choice: of
  chosen_spanish: de
  alternatives_spanish:
  - desde
  - a partir de
  - por
  lexicon: BDAG
  rationale: En un contexto de origen/nacimiento, «de» es la preposición más natural en español y preserva la idea de procedencia sin sobrecargar el texto.
- source_word: σάρξ / σαρκὸς
  english_pob_choice: flesh
  chosen_spanish: carne
  alternatives_spanish:
  - naturaleza humana
  - naturaleza pecaminosa
  - humanidad
  lexicon: BDAG
  rationale: «Carne» mantiene la correspondencia más directa con σάρξ y conserva la tensión joánica. «Naturaleza humana» aclara, pero interpreta más de lo que el texto inmediato exige; «naturaleza pecaminosa» estrecha el sentido demasiado pronto.
- source_word: πνεύματος / πνεῦμά
  english_pob_choice: Spirit / spirit
  chosen_spanish: Espíritu / espíritu
  alternatives_spanish:
  - Espíritu / espiritual
  - Espíritu / aliento
  lexicon: BDAG
  rationale: La primera ocurrencia se refiere al Espíritu Santo y por eso va con mayúscula. En la segunda, «espíritu» en minúscula conserva el valor cualitativo del predicado y reproduce la forma anartrosa del griego sin interpretarla como «espiritual».
- source_word: ἐστιν
  english_pob_choice: is
  chosen_spanish: es
  alternatives_spanish:
  - consiste en
  - resulta ser
  lexicon: BDAG
  rationale: El verbo copulativo simple preserva la estructura sentenciosa y definicional del dicho, sin añadir explicaciones.
theological_decisions:
- issue: Sentido de σάρξ en la primera cláusula
  english_pob_reading: flesh as human/natural sphere rather than explicitly 'sinful nature'
  chosen_spanish_reading: «carne» como esfera de origen natural, no como «naturaleza pecaminosa» explícita
  alternative_spanish_readings:
  - naturaleza humana
  - naturaleza pecaminosa
  rationale: El contraste inmediato es entre nacimiento natural y nacimiento del Espíritu. «Carne» deja abierta la resonancia bíblica de σάρξ sin imponer una lectura moralizante más estrecha de la que el contexto demanda.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for σάρξ; Translation philosophy #3'
- issue: Valor predicativo de πνεῦμα en la segunda cláusula
  english_pob_reading: lowercase 'spirit' in 'is spirit'
  chosen_spanish_reading: «espíritu» en minúscula
  alternative_spanish_readings:
  - Espíritu
  - espiritual
  rationale: El griego usa πνεῦμα sin artículo en el predicado, lo que favorece una cualidad o tipo. La minúscula evita confundirlo con una referencia directa al Espíritu Santo y conserva el paralelismo con «carne».
  doctrine_reference: 'DOCTRINE.md: Translation philosophy #3'
translation_notes:
  revision_awareness: El inglés auditado ya fue revisado y quedó sin cambios; la traducción española sigue de cerca ese estado final, manteniendo la distinción entre la fuente del nacimiento («Espíritu») y la cualidad resultante («espíritu»).
  spanish_consistency_notes:
  - Se preservó «carne» para σάρξ, en coherencia con la terminología POB y con la tensión lexical documentada.
  - Se usó «Espíritu» con mayúscula para la fuente divina del nuevo nacimiento y «espíritu» en minúscula para el predicado cualitativo.
  - La construcción impersonal «lo que ha nacido» mantiene el tono gnómico del griego y evita personalizar el participio neutro.
