base_translation:
  language: en
  yaml_path: translation/nt/john/003/006.yaml
  text: What is born of the flesh is flesh[b][a], and what is born of the Spirit is spirit.
  footnotes:
  - marker: a
    text: Or, 'What is born of the flesh is human nature'; the Greek word 'flesh' can, in some contexts, carry the sense of fallen or sinful human nature, but here the contrast is primarily with birth from the Spirit.
    reason: lexical_alternative
