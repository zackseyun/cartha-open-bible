  to: 'Jesús respondió y le dijo: «En verdad, en verdad te digo que, a menos que alguien nazca de arriba[a], no puede ver el reino de Dios».'
  rationale: Se ajusta la fórmula enfática a un español más moderno y digno, se mejora la condición para reflejar mejor ἐὰν μή, se usa subjuntivo tras «a menos que», y se mueve la nota al punto exacto de la ambigüedad léxica de ἄνωθεν. No se requiere adjudicación adicional porque la evidencia fuente y el rastro POB son claros.
