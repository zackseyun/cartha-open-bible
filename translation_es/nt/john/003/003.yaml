translation:
  language: es
  text: 'Jesús respondió y le dijo: «En verdad, en verdad te digo que, a menos que alguien nazca de arriba[a], no puede ver el reino de Dios».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de nuevo». El adverbio griego puede significar tanto «de arriba» como «de nuevo»; el diálogo del versículo siguiente juega con esa doble posibilidad.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀπεκρίθη
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: BDAG
  rationale: En español, «respondió» comunica bien el verbo narrativo de réplica en un diálogo y conserva el movimiento de contestar a alguien. «Contestó» también sería posible, pero «respondió» es más natural aquí con el siguiente «le dijo».
- source_word: εἶπεν
  english_pob_choice: said
  chosen_spanish: le dijo
  alternatives_spanish:
  - dijo
  - habló
  lexicon: BDAG
  rationale: La combinación «respondió ... y le dijo» refleja adecuadamente el par verbal griego sin añadir contenido. «Le dijo» conserva el destinatario explícito del dativo αὐτῷ.
- source_word: Ἀμὴν ἀμὴν
  english_pob_choice: Truly, truly
  chosen_spanish: De cierto, de cierto
  alternatives_spanish:
  - Amén, amén
  - Verdaderamente, verdaderamente
  lexicon: BDAG
  rationale: «De cierto, de cierto» es una fórmula española tradicional y clara que comunica la solemnidad enfática del doble ἀμήν. «Amén, amén» sería más transparente al hebraísmo, pero menos fluida para lectura pública.
- source_word: ἐὰν μή τις
  english_pob_choice: unless someone
  chosen_spanish: si alguien no
  alternatives_spanish:
  - a menos que alguien
  - si una persona no
  lexicon: BDAG
  rationale: La construcción condicional negativa en español se expresa con naturalidad como «si alguien no». Mantiene el valor indefinido y evita sobrecargar el enunciado.
- source_word: γεννηθῇ
  english_pob_choice: is born
  chosen_spanish: nace
  alternatives_spanish:
  - es engendrado
  - viene al mundo
  lexicon: BDAG
  rationale: Aunque el griego está en pasiva, en español la idea se expresa con naturalidad mediante «nace» en este contexto idiomático. «Es engendrado» suena técnico y desvía la atención del sentido de nacimiento.
- source_word: ἄνωθεν
  english_pob_choice: from above
  chosen_spanish: de arriba
  alternatives_spanish:
  - de nuevo
  - otra vez
  lexicon: BDAG
  rationale: Se conserva el sentido principal «de arriba» por el trasfondo joánico de lo celestial. La alternativa «de nuevo/otra vez» queda implícitamente disponible en la nota, porque el término también puede oírse así en la conversación.
- source_word: οὐ δύναται
  english_pob_choice: is not able to
  chosen_spanish: no puede
  alternatives_spanish:
  - no es capaz de
  - no tiene posibilidad de
  lexicon: BDAG
  rationale: «No puede» comunica la incapacidad expresada por δύναται con economía y naturalidad en español, sin perder fuerza semántica.
- source_word: ἰδεῖν
  english_pob_choice: to see
  chosen_spanish: ver
  alternatives_spanish:
  - percibir
  - contemplar
  lexicon: BDAG
  rationale: «Ver» es el equivalente directo y preserva la posible amplitud del verbo, tanto perceptiva como comprensiva, sin forzar una interpretación más específica.
- source_word: βασιλείαν τοῦ θεοῦ
  english_pob_choice: the kingdom of God
  chosen_spanish: el reino de Dios
  alternatives_spanish:
  - el reino de Yahvé
  - el reinado de Dios
  lexicon: BDAG
  rationale: Se mantiene la fórmula estable y fiel «reino de Dios». Aunque el nombre divino suele vertirse como «Yahvé» en este proyecto, aquí el griego θεοῦ corresponde naturalmente a «Dios» y no requiere sustitución.
theological_decisions:
- issue: Ambigüedad de ἄνωθεν
  english_pob_reading: from above, with 'again' preserved in a note
  chosen_spanish_reading: de arriba, con posibilidad de oír 'de nuevo'
  alternative_spanish_readings:
  - otra vez
  - de nuevo
  rationale: La traducción principal conserva la lectura vertical/celestial que encaja con el contexto joánico, pero no elimina la ambigüedad que el diálogo explota. La nota permite al lector español captar la doble posibilidad sin resolverla prematuramente.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: Sin cambios respecto del último pase de revisión; la lectura principal y la nota conservan la ambigüedad documentada de ἄνωθεν y siguen el audit trail inglés sin añadir interpretaciones no atestiguadas.
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς y «Dios» para θεοῦ, conforme a las normas del proyecto.
  - Se evita «Cristo» porque el versículo no lo contiene ni lo requiere.
  - La nota usa un marcador único [a] anclado en «nace[a]» para preservar la alternativa lexical sin interrumpir la fluidez.
  - «Reino de Dios» se conserva como término establecido y auditable; no se sustituye por «reinado» en el texto principal.
