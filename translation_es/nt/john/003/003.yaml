  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: Jesús responde, introduce la fórmula enfática doble, presenta la condición con valor genérico, mantiene ἄνωθεν como sentido principal vertical, y conserva la alternativa en nota. Sin embargo, «si alguien no nace de arriba» suena menos fiel al matiz condicional de ἐὰν μή que «a menos que alguien nazca de arriba», y el anclaje de la nota debe colocarse sobre la expresión ambigua ἄνωθεν, no sobre «nace».'
  spanish_quality_summary: La redacción es clara y eclesialmente legible, pero «De cierto, de cierto» suena marcadamente tradicional/reina-valerista frente al objetivo de español moderno y digno; «En verdad, en verdad» comunica mejor el énfasis sin arcaísmo. Además, «nazca» mejora la sintaxis con «a menos que».
  glossary_alignment: 'No hay conflicto con la glosa del proyecto: θεοῦ está bien como «Dios», Ἰησοῦς como «Jesús», y «reino de Dios» preserva βασιλεία. La decisión principal sobre ἄνωθεν como «de arriba» está bien alineada con el rastro POB, pero la nota debe anclarse en esa frase ambigua.'
  issues:
  - severity: medium
    issue: Construcción condicional española mejorable
    rationale: El griego ἐὰν μή τις se refleja con más precisión y naturalidad formal como «a menos que alguien...», no «si alguien no...», especialmente en un dicho solemne.
  - severity: medium
    issue: Fórmula «De cierto, de cierto» demasiado arcaizante
    rationale: Aunque comprensible, se inclina innecesariamente al registro Reina-Valera. «En verdad, en verdad» mantiene solemnidad y claridad moderna, en línea con el estilo meta del proyecto.
  - severity: high
