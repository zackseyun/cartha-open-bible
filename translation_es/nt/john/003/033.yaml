translation:
  language: es
  text: El que ha recibido su testimonio ha certificado[a] que Dios es verdadero.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «ha puesto su sello a que Dios es verdadero».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ λαβὼν
  english_pob_choice: Whoever has received
  chosen_spanish: El que ha recibido
  alternatives_spanish:
  - Quien ha recibido
  - Cualquiera que ha recibido
  lexicon: BDAG
  rationale: El participio con artículo funciona de manera sustantiva y genérica. «El que ha recibido» conserva el sentido de cualquier persona que recibe el testimonio, con un español natural y digno.
- source_word: αὐτοῦ
  english_pob_choice: his
  chosen_spanish: su
  alternatives_spanish:
  - de él
  - de este
  lexicon: BDAG
  rationale: El pronombre posesivo se refiere naturalmente al testimonio inmediatamente mencionado en el contexto de Juan. «Su» mantiene la referencia sin sobrecargar la frase.
- source_word: τὴν μαρτυρίαν
  english_pob_choice: testimony
  chosen_spanish: testimonio
  alternatives_spanish:
  - testimonio / testigo
  - declaración
  lexicon: BDAG
  rationale: «Μαρτυρία» en Juan tiene fuerza jurídico-testimonial. «Testimonio» es la equivalencia más clara en español y preserva ese matiz.
- source_word: ἐσφράγισεν
  english_pob_choice: has certified
  chosen_spanish: ha puesto su sello
  alternatives_spanish:
  - ha certificado
  - ha confirmado
  lexicon: BDAG
  rationale: El verbo conserva la imagen de sellar. En español, «ha puesto su sello» comunica la fuerza metafórica de ratificar o dar plena aprobación, sin perder la base literal del término. Se evita una formulación demasiado interpretativa en el texto principal.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: a que
  alternatives_spanish:
  - que
  - de que
  lexicon: BDAG
  rationale: Aquí introduce el contenido de lo que se sella/ratifica. «A que» suena natural después de «poner su sello» en español y expresa que el sello se aplica al contenido de la afirmación.
- source_word: ὁ θεὸς
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios mismo
  lexicon: BDAG
  rationale: El sujeto es inequívoco y no requiere expansión. «Dios» es la equivalencia directa y normativa.
- source_word: ἀληθής
  english_pob_choice: 'true'
  chosen_spanish: verdadero
  alternatives_spanish:
  - veraz
  - fiel
  lexicon: BDAG
  rationale: En este contexto, la afirmación se refiere a la verdad/veracidad de Dios. «Verdadero» es la opción más natural en español y conserva el valor amplio de la palabra en Juan.
theological_decisions:
- issue: Fuerza metafórica de 'sellar'
  english_pob_reading: has certified / has set his seal to
  chosen_spanish_reading: ha puesto su sello
  alternative_spanish_readings:
  - ha certificado
  - ha confirmado
  rationale: El texto comunica que quien recibe el testimonio de Jesús da su asentimiento público y formal a la veracidad de Dios. «Ha puesto su sello» mantiene la metáfora original que el audit trail preserva en nota, sin oscurecer el sentido para el lector español.
  doctrine_reference: Translation philosophy §6; consistencia léxica en lenguaje de testimonio
- issue: Relación entre recibir el testimonio y afirmar la verdad de Dios
  english_pob_reading: Whoever has received his testimony has certified that God is true
  chosen_spanish_reading: El que ha recibido su testimonio ha puesto su sello a que Dios es verdadero
  alternative_spanish_readings:
  - Quien recibe su testimonio certifica que Dios es verdadero
  - El que ha recibido su testimonio ha confirmado que Dios es verdadero
  rationale: 'Se conserva la relación lógica del griego: recibir el testimonio de Jesús implica ratificar la verdad de Dios. No se suaviza la afirmación ni se diluye el alcance de la declaración.'
  doctrine_reference: Juan 3:33; teología joánica del testimonio
- issue: Traducción de ἀληθής aplicado a Dios
  english_pob_reading: God is true
  chosen_spanish_reading: Dios es verdadero
  alternative_spanish_readings:
  - Dios es veraz
  - Dios es fiel
  rationale: «Verdadero» comunica de forma breve y natural que Dios es confiable y veraz. Se evita «fiel» porque desplaza el foco hacia fidelidad covenantal, que no es la formulación principal aquí.
  doctrine_reference: Uso joánico de la verdad; doctrina de la veracidad divina
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin depender mecánicamente de él: se conservó la imagen de sellar en el texto principal español, mientras que la nota recoge la alternativa más literal. No hay revisiones previas aplicadas; el borrador mantiene alta concordancia con la fuente griega y con la decisión inglesa sobre ἐσφράγισεν.'
  spanish_consistency_notes:
  - Se usa «Dios» de forma directa, sin sustitución por «Señor».
  - «Verdadero» conserva el juicio predicativo sobre Dios y evita introducir matices no exigidos por el texto.
  - La nota al pie usa el mismo marcador [a] en el lugar correspondiente y mantiene una alternativa literal compatible con el griego.
  - El español sigue un registro bíblico moderno, claro y publicable, sin depender de formulaciones eclesiásticas fijas.
