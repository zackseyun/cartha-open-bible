  text: αὕτη δέ ἐστιν ἡ κρίσις ὅτι τὸ φῶς ἐλήλυθεν εἰς τὸν κόσμον καὶ ἠγάπησαν οἱ ἄνθρωποι μᾶλλον τὸ σκότος ἢ τὸ φῶς, ἦν γὰρ ⸂αὐτῶν πονηρὰ⸃ τὰ ἔργα.
base_translation:
  language: en
  yaml_path: translation/nt/john/003/019.yaml
  text: 'And this is the judgment: that the light has come into the world[a], and people loved the darkness rather than the light, because their works were evil.'
