translation:
  language: es
  text: 'Y este es el juicio: que la luz ha venido al mundo, y la gente[a] amó más las tinieblas que la luz, porque sus obras eran malas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los hombres»; el griego aquí se refiere a la humanidad en general, no solo a varones.
    reason: lexical_alternative
lexical_decisions:
- source_word: κρίσις
  english_pob_choice: judgment
  chosen_spanish: sentencia
  alternatives_spanish:
  - juicio
  - condena
  - veredicto
  lexicon: BDAG
  rationale: En este contexto joánico, κρίσις puede abarcar juicio/valoración decisiva con implicación condenatoria, pero aquí introduce el carácter de la evaluación. «Sentencia» comunica bien el resultado judicial sin reducir demasiado el campo semántico; «juicio» también sería posible, pero puede sonar más abstracto en español actual.
- source_word: τὸ φῶς
  english_pob_choice: the light
  chosen_spanish: la luz
  alternatives_spanish:
  - la Luz
  lexicon: BDAG
  rationale: Se conserva la metáfora joánica de la luz sin explicitar en el cuerpo del texto el referente cristológico. «La luz» mantiene la textura simbólica del pasaje.
- source_word: ἐλήλυθεν
  english_pob_choice: has come
  chosen_spanish: ha venido
  alternatives_spanish:
  - ha llegado
  - vino
  lexicon: BDAG
  rationale: El perfecto griego enfatiza el estado resultante de la venida; «ha venido» conserva ese valor y suena natural en español. «Ha llegado» sería posible, pero «venir» sigue más de cerca el verbo de origen.
- source_word: κόσμον
  english_pob_choice: world
  chosen_spanish: mundo
  alternatives_spanish:
  - mundo creado
  lexicon: BDAG
  rationale: «Mundo» reproduce el uso joánico estándar y mantiene tanto la creación como la humanidad en rebelión, sin añadir glosa interpretativa.
- source_word: ἠγάπησαν
  english_pob_choice: loved
  chosen_spanish: amaron
  alternatives_spanish:
  - prefirieron
  lexicon: BDAG
  rationale: «Amaron» preserva la relación léxica con ἀγαπάω y la carga moral del apego a las tinieblas. «Prefirieron» refleja mejor μᾶλλον, pero debilita el verbo principal.
- source_word: οἱ ἄνθρωποι
  english_pob_choice: people
  chosen_spanish: las personas
  alternatives_spanish:
  - los seres humanos
  - la gente
  lexicon: BDAG
  rationale: El griego usa una forma masculina con sentido representativo de humanidad general. En español, «las personas» comunica con claridad ese alcance inclusivo y evita una lectura restringida a varones, sin perder el referente colectivo.
- source_word: μᾶλλον ... ἢ
  english_pob_choice: rather than
  chosen_spanish: más ... que
  alternatives_spanish:
  - antes que
  - en vez de
  lexicon: BDAG
  rationale: «Más ... que» expresa de forma idiomática la comparación de preferencia. Se mantiene el contraste explícito entre tinieblas y luz.
- source_word: τὸ σκότος
  english_pob_choice: the darkness
  chosen_spanish: las tinieblas
  alternatives_spanish:
  - la oscuridad
  lexicon: BDAG
  rationale: Se conserva el paralelismo simbólico con «la luz». «Tinieblas» es muy natural en registro bíblico español y mantiene la antítesis tradicional sin perder fidelidad.
- source_word: πονηρὰ
  english_pob_choice: evil
  chosen_spanish: malas
  alternatives_spanish:
  - malvadas
  - malignas
  - malévolas
  lexicon: BDAG
  rationale: Literalmente, el adjetivo describe la cualidad moral de las obras. «Malas» es una equivalencia sobria y natural en español; «malvadas» o «malignas» intensifican más de lo necesario.
- source_word: τὰ ἔργα
  english_pob_choice: works
  chosen_spanish: obras
  alternatives_spanish:
  - hechos
  - deeds
  lexicon: BDAG
  rationale: «Obras» es el equivalente más natural y directo en español para el plural de ἔργα en este contexto. Conserva la resonancia bíblica del término sin volverlo demasiado técnico.
theological_decisions:
- issue: Referencia implícita de «la luz»
  english_pob_reading: Retained the metaphor 'the light' without making the referent explicit in the main text.
  chosen_spanish_reading: Se mantiene la metáfora «la luz» sin explicitar en el cuerpo principal si se trata de Jesús o del Logos.
  alternative_spanish_readings:
  - «la Luz» como título cristológico explícito
  - «Jesús» como sustitución interpretativa
  rationale: El contexto identifica fuertemente la luz con la venida reveladora del Hijo, pero el griego conserva la metáfora. Mantenerla en español respeta la textura teológica joánica y evita añadir una glosa interpretativa.
  doctrine_reference: Translation philosophy §1, §3
- issue: Alcance genérico de οἱ ἄνθρωποι
  english_pob_reading: Rendered as 'people' with inclusive force.
  chosen_spanish_reading: Se traduce con «las personas» para reflejar la humanidad en general.
  alternative_spanish_readings:
  - «los hombres» con fuerza genérica
  - «la gente»
  rationale: La forma griega es masculina plural, pero con sentido representativo general. En español, «las personas» expresa naturalmente el alcance inclusivo y conserva el sentido de humanidad sin sugerir varones únicamente.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior anclando la nota [a] en el texto («mundo[a]»). También se ajustó la formulación española para mantener la metáfora de la luz, la preferencia por la tinieblas frente a la luz, y el sentido inclusivo de οἱ ἄνθρωποι sin calcar mecánicamente el inglés.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparezca, pero este versículo no lo contiene.
  - Se mantiene el registro bíblico contemporáneo con «tinieblas» y «obras» para conservar el paralelismo joánico.
  - Se evitó «hombres» para οἱ ἄνθρωποι porque en español actual podría sonar exclusivamente masculino; «las personas» comunica mejor el sentido inclusivo del griego.
