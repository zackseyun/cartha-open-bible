    issue: «un principal» para ἄρχων es poco natural y semánticamente impreciso en español actual
    rationale: ἄρχων denota una persona con autoridad o cargo de gobierno. «Principal» puede entenderse como adjetivo sustantivado, pero no comunica con claridad la función de autoridad. «Dirigente» preserva mejor el sentido y suena natural en español neutral.
  - severity: low
    issue: La nota al pie tiene redacción y puntuación poco limpias
    rationale: Empieza con una comilla simple innecesaria y usa «judeanos/autoridades judías», lo cual puede mantenerse, pero conviene presentarlo con puntuación normal para legibilidad y consistencia editorial.
