translation:
  language: es
  text: Había un hombre de entre los fariseos, llamado Nicodemo, un dirigente de los judíos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de los judeanos». El término griego puede referirse a los judíos en general o, en algunos contextos, más específicamente a los judeanos o a las autoridades judías.'
    reason: alternative_reading
lexical_decisions:
- source_word: Ἦν δὲ
  english_pob_choice: Now there was
  chosen_spanish: Había
  alternatives_spanish:
  - Y había
  - Ahora bien, había
  - Había entonces
  lexicon: BDAG
  rationale: El griego introduce una nueva escena con ἦν δὲ. En español, «Había» comunica de manera natural la apertura narrativa sin sobrecargar con un conector explícito. Se evita un calco como «Y había» porque suena menos fluido en esta construcción.
- source_word: ἄνθρωπος
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - un ser humano
  lexicon: BDAG
  rationale: El sustantivo es masculino singular y se refiere a un individuo concreto. «Un hombre» reproduce con precisión el referente y mantiene la sencillez del texto.
- source_word: ἐκ τῶν Φαρισαίων
  english_pob_choice: from the Pharisees
  chosen_spanish: de entre los fariseos
  alternatives_spanish:
  - de los fariseos
  - entre los fariseos
  lexicon: BDAG
  rationale: ἐκ con genitivo expresa procedencia o pertenencia dentro del grupo. «De entre los fariseos» conserva mejor esa idea de procedencia/afiliación que un simple «de los fariseos», que en español puede sonar más posesivo que relacional.
- source_word: Νικόδημος ὄνομα αὐτῷ
  english_pob_choice: named Nicodemus
  chosen_spanish: llamado Nicodemo
  alternatives_spanish:
  - de nombre Nicodemo
  - su nombre era Nicodemo
  - nombrado Nicodemo
  lexicon: BDAG
  rationale: La construcción semítica/grecohebraica de nombre propio se expresa de forma natural en español con «llamado Nicodemo». Mantiene la información nominal sin introducir una perífrasis más pesada.
- source_word: ἄρχων
  english_pob_choice: a ruler
  chosen_spanish: un principal
  alternatives_spanish:
  - un gobernante
  - un dirigente
  - un miembro del consejo
  lexicon: BDAG
  rationale: ἄρχων indica una persona con autoridad. En este contexto, «un principal» es un español bíblico comprensible que deja abierta la identificación institucional exacta, sin forzar una especificación que el griego no explicita directamente. Se evita fijarlo de antemano como «miembro del consejo» porque esa precisión viene del trasfondo interpretativo, no del enunciado mismo.
- source_word: τῶν Ἰουδαίων
  english_pob_choice: of the Jews
  chosen_spanish: de los judíos
  alternatives_spanish:
  - de los judeanos
  - de la autoridad judía
  - de los judíos/Judeanos
  lexicon: BDAG
  rationale: La forma griega admite un alcance étnico, religioso o, en ciertos contextos, más específicamente judeano. Aquí la opción más directa y fiel al texto recibido es «de los judíos». Se mantiene la amplitud del término sin cerrar indebidamente la referencia.
theological_decisions:
- issue: Alcance de Ἰουδαίων en Juan 3:1
  english_pob_reading: of the Jews, with a footnoted alternative 'of the Judeans.'
  chosen_spanish_reading: de los judíos, con la posibilidad alternativa de 'de los judeanos'
  alternative_spanish_readings:
  - de los judeanos
  - de la autoridad judía
  rationale: En Juan, Ἰουδαῖοι puede abarcar pueblo, identidad religiosa o liderazgo judío, según el contexto. Como Nicodemo aparece aquí como fariseo y figura de autoridad, «de los judíos» es una traducción amplia y natural. La alternativa «judeanos» se conserva conceptualmente en nota porque la ambigüedad del griego es real y no debe borrarse.
  doctrine_reference: Translation philosophy §3; §4
translation_notes:
  revision_awareness: El texto inglés auditado no requirió revisiones en la última pasada; la versión española se alinea con esa estabilidad y refleja las mismas decisiones semánticas principales, adaptadas a la naturalidad del español y a la amplitud interpretativa del griego.
  spanish_consistency_notes:
  - Se mantuvo «fariseos» como transliteración estable del grupo religioso, conforme al uso bíblico estándar.
  - Se evitó «SEÑOR» u otras sustituciones no relevantes; no aparece el tetragrámaton en este versículo.
  - «Principales» conserva la indeterminación de ἄρχων mejor que una especificación institucional no explícita en el griego.
  - La nota con [a] está anclada solo a «Nicodemo» porque la ambigüedad textual recae en la frase nominal completa y su referencia contextual.
