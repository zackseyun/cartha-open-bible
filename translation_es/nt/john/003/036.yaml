translation:
  language: es
  text: El que cree en el Hijo tiene vida eterna; pero el que no obedece al Hijo[a] no verá vida, sino que la ira de Dios permanece sobre él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el que rehúsa creer en el Hijo». El verbo griego puede expresar tanto desobediencia como negativa a creer.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὁ πιστεύων
  english_pob_choice: the one who believes
  chosen_spanish: el que cree
  alternatives_spanish:
  - el que cree en
  - quien cree
  lexicon: BDAG
  rationale: El participio articular funciona como sujeto genérico. «El que cree» conserva el valor verbal y suena natural en español sin nominalizarlo en exceso.
- source_word: εἰς τὸν υἱόν
  english_pob_choice: in the Son
  chosen_spanish: en el Hijo
  alternatives_spanish:
  - hacia el Hijo
  - en el Hijo de Dios
  lexicon: BDAG
  rationale: Con πιστεύω + εἰς, el sentido es confianza dirigida a una persona. «En el Hijo» es la forma española más natural y mantiene la relación personal sin añadir posesivos no presentes.
- source_word: τὸν υἱόν / τῷ υἱῷ
  english_pob_choice: the Son
  chosen_spanish: el Hijo
  alternatives_spanish:
  - el Hijo de Dios
  - su Hijo
  lexicon: BDAG
  rationale: El griego presenta el título con artículo; «el Hijo» preserva la formulación joánica sin expandir el texto.
- source_word: ἔχει
  english_pob_choice: has
  chosen_spanish: tiene
  alternatives_spanish:
  - posee
  - goza de
  lexicon: BDAG
  rationale: El presente indica posesión actual. «Tiene» es directo, idiomático y conserva esa fuerza presente.
- source_word: ζωὴν αἰώνιον
  english_pob_choice: eternal life
  chosen_spanish: vida eterna
  alternatives_spanish:
  - vida eterna
  - vida del siglo venidero
  lexicon: BDAG
  rationale: «Vida eterna» es la equivalencia española estable en Juan y expresa tanto duración como cualidad escatológica.
- source_word: ὁ δὲ ἀπειθῶν
  english_pob_choice: the one who does not obey
  chosen_spanish: el que no obedece
  alternatives_spanish:
  - el que desobedece
  - el que se niega a creer
  lexicon: BDAG
  rationale: ἀπειθέω puede significar desobedecer y también rechazar la fe. La redacción principal sigue la revisión inglesa más reciente y mantiene el contraste con «cree» sin resolver demasiado el matiz; la alternativa de incredulidad queda registrada en la nota.
- source_word: οὐκ ὄψεται ζωήν
  english_pob_choice: will not see life
  chosen_spanish: no verá la vida
  alternatives_spanish:
  - no tendrá vida
  - no experimentará vida
  lexicon: BDAG
  rationale: «Ver la vida» conserva el giro joánico y la imagen verbal del griego; no se reduce a mera posesión.
- source_word: ἡ ὀργὴ τοῦ θεοῦ
  english_pob_choice: the wrath of God
  chosen_spanish: la ira de Dios
  alternatives_spanish:
  - el enojo de Dios
  lexicon: BDAG
  rationale: «Ira» es el equivalente léxico directo de ὀργή y mantiene la fuerza judicial del enunciado.
- source_word: μένει
  english_pob_choice: remains
  chosen_spanish: permanece
  alternatives_spanish:
  - permanece en
  - queda
  lexicon: BDAG
  rationale: μένω en Juan suele conservar la idea de continuidad. «Permanece» reproduce bien esa permanencia actual.
- source_word: ἐπ’ αὐτόν
  english_pob_choice: on him
  chosen_spanish: sobre él
  alternatives_spanish:
  - en él
  - sobre esa persona
  lexicon: BDAG
  rationale: La preposición con acusativo indica una carga o estado que recae sobre la persona. «Sobre él» refleja mejor esa imagen que un simple «en él».
theological_decisions:
- issue: Sentido de ἀπειθῶν frente a πιστεύων
  english_pob_reading: the one who does not obey; footnote preserves 'the one who refuses to believe the Son.'
  chosen_spanish_reading: el que no obedece al Hijo; la nota conserva 'el que se niega a creer al Hijo'.
  alternative_spanish_readings:
  - el que rechaza al Hijo
  - el incrédulo
  rationale: El contraste con creer y el valor del verbo permiten ambos matices. Se mantiene en el cuerpo el sentido de desobediencia, pero sin borrar la lectura alternativa de rechazo a creer, que refleja la tensión léxica documentada.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; document contested interpretive choices.'
- issue: Tiempo presente de vida eterna e ira de Dios
  english_pob_reading: present possession of eternal life and present continuance of God's wrath are retained.
  chosen_spanish_reading: presente posesión de vida eterna y permanencia actual de la ira de Dios.
  alternative_spanish_readings:
  - solo referencia futura
  - solo consecuencia futura
  rationale: Los presentes ἔχει y μένει deben reflejarse como estados actuales, sin borrar que «no verá la vida» proyecta un resultado futuro.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: This draft follows the latest English POB revision that changed 'disobeys' to 'does not obey' while retaining the footnoted alternative sense of refusing belief. It also preserves the present-force tension in 'tiene' and 'permanece' and the Johannine image 'ver la vida'.
  spanish_consistency_notes:
  - Se usa «Hijo» de forma uniforme para τὸν υἱόν / τῷ υἱῷ, conforme al título cristológico del original.
  - Se conserva «vida eterna» como término joánico estable y «ira de Dios» para ὀργὴ τοῦ θεοῦ, sin suavizar el juicio divino.
  - La nota usa una alternativa verbal española que no introduce doctrina nueva, sino que documenta el matiz léxico de ἀπειθέω.
