revisions:
- from: El que cree en el Hijo tiene vida eterna; pero el que no obedece al Hijo[a] no verá la vida, sino que la ira de Dios permanece sobre él.
  to: El que cree en el Hijo tiene vida eterna; pero el que no obedece al Hijo[a] no verá vida, sino que la ira de Dios permanece sobre él.
  rationale: 'Se hace una corrección menor para ajustar más de cerca el español al griego y al audit trail inglés: «no verá vida» en lugar de «no verá la vida». También se mejora la nota para que la alternativa léxica suene más natural en español, sin resolver la tensión entre desobedecer y negarse a creer.'
