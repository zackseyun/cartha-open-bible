  text: ὁ πιστεύων εἰς τὸν υἱὸν ἔχει ζωὴν αἰώνιον· ὁ δὲ ἀπειθῶν τῷ υἱῷ οὐκ ὄψεται ζωήν, ἀλλ’ ἡ ὀργὴ τοῦ θεοῦ μένει ἐπ’ αὐτόν.
base_translation:
  language: en
  yaml_path: translation/nt/john/003/036.yaml
  text: The one who believes in the Son has eternal life; but the one who does not obey the Son will not see life[a], but the wrath of God remains on him.
  footnotes:
  - marker: a
    text: Or 'the one who refuses to believe the Son.' The Greek verb can carry the sense of refusing belief as well as disobeying.
    reason: alternative_reading
