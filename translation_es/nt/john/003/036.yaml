review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del griego: presente de «tiene» y «permanece», contraste entre creer y ἀπειθῶν, y conservación de «ver vida». Sin embargo, «no verá la vida» añade el artículo que no está en el griego ni en el rastro POB, y la nota «creer al Hijo» suena menos natural y ligeramente más ambigua en español que una formulación con «creer en el Hijo» o «rehúsa creerle al Hijo».'
  spanish_quality_summary: 'El español es claro, natural y de registro digno. La frase principal funciona bien. La mejora necesaria es pequeña: quitar el artículo en «vida» para ajustarse al original y pulir la nota para mayor naturalidad y claridad en español eclesial general.'
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto: «Hijo», «vida eterna», «ira de Dios» y «permanece» están bien. La elección «no obedece» es aceptable y preserva la tensión teológica documentada con una nota alternativa.'
  issues:
  - severity: medium
    issue: «no verá la vida» añade artículo no presente en οὐκ ὄψεται ζωήν
    rationale: El griego dice simplemente «vida» sin artículo. En este contexto joánico, «no verá vida» suena natural y preserva mejor el paralelismo con «tiene vida eterna» y con la decisión inglesa «will not see life». Añadir «la» no destruye el sentido, pero sí se aparta del original y del audit trail.
  - severity: low
    issue: La nota «el que se niega a creer al Hijo» es algo poco natural en español
    rationale: «Creer al Hijo» puede entenderse como creerle al Hijo, pero en el flujo de esta frase suena menos idiomático que «rehúsa creer en el Hijo» o «rehúsa creerle al Hijo». Conviene pulirla para legibilidad sin perder la alternativa léxica documentada.
  revised_spanish_text: El que cree en el Hijo tiene vida eterna; pero el que no obedece al Hijo[a] no verá vida, sino que la ira de Dios permanece sobre él.
  revised_footnotes:
  - marker: a
    text: 'O: «el que rehúsa creer en el Hijo». El verbo griego puede expresar tanto desobediencia como negativa a creer.'
    reason: alternative_reading
  revision_rationale: 'Se hace una corrección menor para ajustar más de cerca el español al griego y al audit trail inglés: «no verá vida» en lugar de «no verá la vida». También se mejora la nota para que la alternativa léxica suene más natural en español, sin resolver la tensión entre desobedecer y negarse a creer.'
