  to: Pues Dios no envió al Hijo al mundo para que juzgara al mundo[a], sino para que el mundo fuera salvo por medio de él.
  rationale: Se ajusta el conector discursivo para reflejar más naturalmente γάρ en español, y se mejora la naturalidad de la cláusula final con «fuera salvo», manteniendo intacto el sentido fuente, la decisión teológica sobre κρίνῃ, y la nota alternativa del POB.
