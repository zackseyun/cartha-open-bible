    text: O, «para que lo condenara». El verbo griego puede traducirse de manera más estrecha en este contexto, pero su sentido básico es «juzgar».
    reason: alternative_reading
  revision_rationale: Se ajusta el conector discursivo para reflejar más naturalmente γάρ en español, y se mejora la naturalidad de la cláusula final con «fuera salvo», manteniendo intacto el sentido fuente, la decisión teológica sobre κρίνῃ, y la nota alternativa del POB.
