translation:
  language: es
  text: Pues Dios no envió al Hijo al mundo para que juzgara al mundo[a], sino para que el mundo fuera salvo por medio de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «para que lo condenara». El verbo griego puede traducirse de manera más estrecha en este contexto, pero su sentido básico es «juzgar».
    reason: alternative_reading
lexical_decisions:
- source_word: οὐ γὰρ
  english_pob_choice: For ... not
  chosen_spanish: Porque ... no
  alternatives_spanish:
  - Pues ... no
  - Porque ... no
  lexicon: BDAG
  rationale: γάρ da una relación explicativa con el contexto anterior; en español, «Porque» conserva naturalmente esa conexión. La negación se mantiene de forma directa con «no».
- source_word: ἀπέστειλεν
  english_pob_choice: did not send
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: BDAG
  rationale: ἀποστέλλω se traduce de manera natural por «enviar». En Juan, este verbo sostiene el tema del envío del Hijo por el Padre, y «envió» lo preserva sin sobrecargar el sentido.
- source_word: ὁ θεὸς
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: BDAG
  rationale: El artículo con θεός suele omitirse idiomáticamente en español. «Dios» es la equivalencia normal y clara.
- source_word: τὸν υἱὸν
  english_pob_choice: the Son
  chosen_spanish: el Hijo
  alternatives_spanish:
  - su Hijo
  lexicon: BDAG
  rationale: El griego dice «el Hijo» sin posesivo expreso. «El Hijo» conserva el título y el paralelismo joánico; el vínculo filial con Dios queda claro por el contexto.
- source_word: εἰς τὸν κόσμον
  english_pob_choice: into the world
  chosen_spanish: al mundo
  alternatives_spanish:
  - dentro del mundo
  - hacia el mundo
  lexicon: BDAG
  rationale: εἰς con acusativo expresa movimiento hacia el ámbito del mundo. En español, «al mundo» es natural y fiel; «en el mundo» perdería el matiz direccional.
- source_word: ἵνα κρίνῃ τὸν κόσμον
  english_pob_choice: so that he might judge the world
  chosen_spanish: para que juzgara al mundo
  alternatives_spanish:
  - para que condenara al mundo
  - para que juzgase al mundo
  lexicon: BDAG
  rationale: κρίνω tiene un campo semántico más amplio que «condenar». «Juzgara» conserva ese alcance y evita resolver prematuramente la tensión teológica. Se mantiene el valor final de ἵνα con «para que».
- source_word: ἀλλ’ ἵνα
  english_pob_choice: but so that
  chosen_spanish: sino para que
  alternatives_spanish:
  - pero para que
  - sino que para que
  lexicon: BDAG
  rationale: La construcción contrasta dos propósitos. «Sino para que» expresa con naturalidad la oposición y el segundo propósito en español.
- source_word: σωθῇ
  english_pob_choice: might be saved
  chosen_spanish: fuera salvado
  alternatives_spanish:
  - fuese salvado
  - sea salvado
  lexicon: BDAG
  rationale: El pasivo aoristo subjuntivo de σῴζω se puede expresar en español con un pasivo perifrástico o sintético. «Fuera salvado» suena natural en una subordinada final y mantiene la pasividad del verbo.
- source_word: ὁ κόσμος
  english_pob_choice: the world
  chosen_spanish: el mundo
  alternatives_spanish:
  - el cosmos
  - la humanidad
  lexicon: BDAG
  rationale: Se conserva la repetición de κόσμος como «mundo», sin estrecharlo a «humanidad» ni ampliarlo a «cosmos».
- source_word: δι’ αὐτοῦ
  english_pob_choice: through him
  chosen_spanish: por medio de él
  alternatives_spanish:
  - a través de él
  - mediante él
  lexicon: BDAG
  rationale: διά con genitivo expresa medio o agencia. «Por medio de él» es claro y mantiene el sentido mediador del texto sin volverlo demasiado técnico.
theological_decisions:
- issue: Sentido de κρίνῃ frente a σωθῇ
  english_pob_reading: judge
  chosen_spanish_reading: juzgara
  alternative_spanish_readings:
  - condenara
  rationale: Se conserva el sentido básico de κρίνω como «juzgar», en vez de estrecharlo a «condenar». Esto mantiene la amplitud léxica del griego y la tensión del contraste con el propósito salvador.
  doctrine_reference: Preservar la tensión léxica sin imponer una conclusión doctrinal más estrecha que la del texto.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego de SBLGNT y la auditoría inglesa de POB, sin cambios revisionales aplicados en el expediente. Se preserva la nota interpretativa sobre κρίνω para no resolver la tensión entre «juzgar» y «condenar».
  spanish_consistency_notes:
  - Se usa «Dios» para θεός y «el Hijo» para υἱός, en coherencia con el estilo joánico.
  - Se traduce κόσμος de forma consistente como «mundo» en toda la cláusula.
  - Se evita «SEÑOR» para el nombre divino porque aquí el texto griego dice θεός, no κύριος.
  - «Por medio de él» conserva el valor instrumental de διά con genitivo sin forzar una lectura teológica adicional.
