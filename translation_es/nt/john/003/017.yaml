review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite correctamente el sentido básico del griego: Dios no envió al Hijo al mundo con el propósito de juzgar al mundo, sino para que el mundo sea salvado por medio de él. Conserva bien «el Hijo», la repetición de «mundo», y la nota que preserva la alternativa «condenar» para κρίνῃ. Sin embargo, «Porque» al inicio suena menos natural en español bíblico corrido cuando γάρ enlaza explicativamente con el versículo previo; «Pues» suele funcionar mejor. Además, «fuera salvado» es fiel pero menos idiomático y algo pesado frente a «fuera salvo», que expresa de manera más natural el pasivo/resultativo teológico de σωθῇ en español eclesial claro.'
  spanish_quality_summary: La redacción es clara y mayormente natural, pero admite una mejora de fluidez. «Pues Dios no envió...» suena más natural que «Porque Dios no envió...» en inicio de versículo como conexión discursiva. «Fuera salvo» es más idiomático y digno que «fuera salvado» en este contexto, sin pérdida de sentido. La nota al pie está bien formulada y el español general es legible y sobrio.
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto: θεός = «Dios», υἱός = «el Hijo», κόσμος = «mundo». La decisión clave κρίνῃ = «juzgara» está alineada con la justificación léxica y teológica del POB, y la alternativa «condenara» se conserva correctamente en nota. δι’ αὐτοῦ = «por medio de él» también está bien.'
  issues:
  - severity: medium
    issue: Conector inicial «Porque»
    rationale: Aunque es posible, en español de lectura bíblica continua «Pues» suele reflejar mejor el valor explicativo de γάρ al inicio de un versículo sin sonar tan causal-subordinante como «Porque».
  - severity: low
    issue: «fuera salvado» suena menos idiomático que «fuera salvo»
    rationale: Ambas opciones son fieles al pasivo de σωθῇ, pero «fuera salvo» es más natural, más compacto y muy comprensible en español eclesial contemporáneo.
  revised_spanish_text: Pues Dios no envió al Hijo al mundo para que juzgara al mundo[a], sino para que el mundo fuera salvo por medio de él.
  revised_footnotes:
