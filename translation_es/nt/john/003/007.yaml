translation:
  language: es
  text: 'No te asombres de que te dije[a]: «Es necesario que ustedes nazcan de arriba[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El primer «te» es singular («te dije»), pero «ustedes» en «ustedes nazcan» es plural en griego.
    reason: lexical_alternative
  - marker: b
    text: O «de nuevo» o «otra vez». El griego ἄνωθεν puede significar «de arriba» o «de nuevo».
    reason: alternative_reading
lexical_decisions:
- source_word: μὴ θαυμάσῃς
  english_pob_choice: Do not be amazed
  chosen_spanish: No te asombres
  alternatives_spanish:
  - No te maravilles
  - No te asombres ni te extrañes
  lexicon: BDAG
  rationale: θαυμάζω expresa asombro o sorpresa; en español, «asombrarse» comunica bien la prohibición sin sonar arcaico. Mantiene el tono natural y la fuerza de la negación.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: de que
  alternatives_spanish:
  - que
  - porque
  lexicon: BDAG
  rationale: Aquí ὅτι introduce el contenido de lo dicho; «de que» suena más natural en español después de «te dije» y conserva la relación de contenido sin volver causal la cláusula.
- source_word: εἶπόν σοι
  english_pob_choice: I told you
  chosen_spanish: te dije
  alternatives_spanish:
  - te lo dije
  - te hablé
  lexicon: BDAG
  rationale: λέγω con objeto indirecto se expresa de forma directa y natural como «te dije». Evita añadir un objeto inexistente y mantiene la referencia a una comunicación previa.
- source_word: Δεῖ
  english_pob_choice: must
  chosen_spanish: Es necesario
  alternatives_spanish:
  - debe
  - tiene que
  lexicon: BDAG
  rationale: Δεῖ expresa necesidad u obligación. «Es necesario» preserva esa fuerza con un registro sobrio y claro; en español evita hacer demasiado personal un verbo impersonal en el original.
- source_word: ὑμᾶς
  english_pob_choice: you
  chosen_spanish: ustedes
  alternatives_spanish:
  - vosotros
  - todos ustedes
  lexicon: BDAG
  rationale: El griego pasa de un singular («te») a un plural («ustedes/you all»). Se explicita el plural en el texto principal para no perder la tensión numérica del original.
- source_word: γεννηθῆναι
  english_pob_choice: be born
  chosen_spanish: nazcan
  alternatives_spanish:
  - sean nacidos
  - nazcan de nuevo
  lexicon: BDAG
  rationale: γεννάω en este contexto joánico se traduce naturalmente por «nacer». Como el sujeto es plural y el verbo está en voz pasiva/intransitiva en sentido de nuevo nacimiento, «nazcan» da una españolización fluida y fiel.
- source_word: ἄνωθεν
  english_pob_choice: from above
  chosen_spanish: de arriba
  alternatives_spanish:
  - otra vez
  - de nuevo
  - nuevamente
  lexicon: BDAG
  rationale: ἄνωθεν puede significar «de arriba» o «de nuevo/anew». Se conserva «de arriba» en el texto principal para retener el énfasis en el origen celestial; se mantiene abierta la lectura alternativa sin resolver la ambigüedad.
theological_decisions:
- issue: Sentido de ἄνωθεν en el nuevo nacimiento
  english_pob_reading: from above
  chosen_spanish_reading: de arriba
  alternative_spanish_readings:
  - de nuevo
  - otra vez
  - nuevamente
  rationale: En Juan 3 la expresión es deliberadamente ambigua, pero la lectura «de arriba» resalta el origen divino del nuevo nacimiento y coincide con la orientación teológica del contexto. La alternativa temporal/repetitiva no se borra; queda preservada como posibilidad semántica.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'La redacción sigue el texto griego SBLGNT y el audit trail inglés: se mantiene la prohibición, el contenido de la cita, el matiz de necesidad y la tensión semántica de ἄνωθεν. No se adoptaron revisiones posteriores porque el último pass indicó que no había cambios necesarios.'
  spanish_consistency_notes:
  - Se usa «Dios» implícitamente en el contexto teológico sin introducirlo en el versículo, porque el griego no lo nombra explícitamente aquí.
  - Se evita «Cristo» porque el versículo no contiene Χριστός.
  - Se usa «nazcan» en plural para reflejar ὑμᾶς, mientras «te dije» conserva el singular de σοι.
  - Se prefiere «de arriba» sobre «nuevamente» en el texto principal para no apagar la lectura teológica del origen celestial.
