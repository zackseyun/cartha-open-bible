  text: τὸ πνεῦμα ὅπου θέλει πνεῖ, καὶ τὴν φωνὴν αὐτοῦ ἀκούεις, ἀλλ’ οὐκ οἶδας πόθεν ἔρχεται καὶ ποῦ ὑπάγει· οὕτως ἐστὶν πᾶς ὁ γεγεννημένος ἐκ τοῦ πνεύματος.
base_translation:
  language: en
  yaml_path: translation/nt/john/003/008.yaml
  text: The wind blows where it wishes[a], and you hear its sound, but you do not know where it comes from and where it goes[b]. So it is with everyone who has been born of the Spirit.
  footnotes:
  - marker: a
    text: Greek pneuma can mean either 'wind' or 'spirit.' Jesus uses the same word in both halves of the verse, creating a wordplay that English cannot fully reproduce.
    reason: lexical_alternative
  - marker: b
    text: Or 'voice' for 'sound'; the Greek word can mean either, but here it refers to the audible effect of the wind.
    reason: lexical_alternative
