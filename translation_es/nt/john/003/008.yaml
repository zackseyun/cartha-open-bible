translation:
  language: es
  text: El viento[a] sopla donde quiere, y oyes su sonido, pero no sabes de dónde viene ni adónde va[b]. Así es todo el que ha nacido del Espíritu.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego πνεῦμα puede significar tanto 'viento' como 'espíritu'. Jesús usa la misma palabra en ambas mitades del versículo, creando un juego de palabras que el español no puede reproducir por completo.
    reason: lexical_alternative
  - marker: b
    text: O 'voz' para 'sonido'; la palabra griega puede significar ambas cosas, pero aquí se refiere al efecto audible del viento.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸ πνεῦμα (v. 8a)
  english_pob_choice: wind
  chosen_spanish: viento
  alternatives_spanish:
  - Espíritu
  lexicon: BDAG
  rationale: En la primera mitad del versículo, πνεῦμα va unido a πνεῖ ('sopla') y a la percepción de su φωνή, lo que favorece con fuerza el sentido concreto 'viento'. En español, 'viento' comunica la imagen natural con claridad y preserva el juego de palabras con el segundo πνεῦμα, que aquí sí apunta al Espíritu.
- source_word: ὅπου θέλει
  english_pob_choice: where it wishes
  chosen_spanish: donde quiere
  alternatives_spanish:
  - donde desea
  - donde quiere ir
  lexicon: BDAG
  rationale: θέλει expresa voluntad. 'Donde quiere' es natural en español y conserva la personificación del viento sin introducir un matiz más interpretativo.
- source_word: πνεῖ
  english_pob_choice: blows
  chosen_spanish: sopla
  alternatives_spanish:
  - sopla el viento
  - brota
  lexicon: BDAG
  rationale: Con πνεῦμα entendido como viento, πνεῖ se rinde de forma más idiomática como 'sopla'. 'Brota' o equivalentes serían menos precisos para la imagen meteorológica.
- source_word: τὴν φωνὴν αὐτοῦ
  english_pob_choice: its sound
  chosen_spanish: su sonido
  alternatives_spanish:
  - su voz
  - su ruido
  lexicon: BDAG
  rationale: φωνή puede significar 'sonido' o 'voz'. Aquí se trata del efecto audible del viento, por lo que 'sonido' es la opción más natural en español. 'Voz' preservaría más el paralelismo léxico, pero sonaría demasiado personalizante.
- source_word: οὐκ οἶδας πόθεν ἔρχεται καὶ ποῦ ὑπάγει
  english_pob_choice: you do not know where it comes from and where it goes
  chosen_spanish: no sabes de dónde viene ni adónde va
  alternatives_spanish:
  - no sabes de dónde viene ni hacia dónde va
  - no sabes de dónde procede ni adónde se dirige
  lexicon: BDAG
  rationale: La secuencia de adverbios y verbos se expresa con naturalidad en español como 'de dónde viene ni adónde va'. 'Viene' y 'va' preservan el movimiento sin sobrecargar el estilo.
- source_word: οὕτως ἐστὶν
  english_pob_choice: So it is with
  chosen_spanish: Así es
  alternatives_spanish:
  - Así sucede
  - De ese modo es
  lexicon: BDAG
  rationale: La fórmula comparativa se recoge con la locución española simple 'Así es', que funciona de manera clara y sobria para introducir la aplicación de la analogía.
- source_word: πᾶς ὁ γεγεννημένος
  english_pob_choice: everyone who has been born
  chosen_spanish: todo el que ha nacido
  alternatives_spanish:
  - todo aquel que ha nacido
  - cada uno que ha nacido
  lexicon: BDAG
  rationale: El participio perfecto γεγεννημένος expresa un estado presente derivado de un nacimiento previo. 'Ha nacido' comunica bien ese resultado sin volverse artificial. 'Todo el que' conserva el valor genérico de πᾶς ὁ.
- source_word: ἐκ τοῦ πνεύματος (v. 8b)
  english_pob_choice: of the Spirit
  chosen_spanish: del Espíritu
  alternatives_spanish:
  - del Espíritu Santo
  - por el Espíritu
  lexicon: BDAG
  rationale: En el contexto de nuevo nacimiento, πνεύματος se refiere al Espíritu de Dios. 'Del Espíritu' mantiene la relación de origen señalada por ἐκ y es idiomático en español. Se evita 'Espíritu Santo' porque el texto griego no lo explicita.
theological_decisions:
- issue: Juego de palabras con πνεῦμα entre 'viento' y 'Espíritu'
  english_pob_reading: Translate the first occurrence as 'wind' and the final occurrence as 'Spirit.'
  chosen_spanish_reading: Traducir la primera ocurrencia como 'viento' y la final como 'Espíritu'.
  alternative_spanish_readings:
  - traducir ambas como 'Espíritu'
  - traducir ambas como 'viento'
  - traducir la primera como 'Espíritu' con nota 'o viento'
  rationale: El griego explota intencionalmente la amplitud semántica de πνεῦμα. En la primera cláusula el referente es el viento real; en la última, el nacimiento procedente del Espíritu. El español no puede sostener una sola palabra con el mismo doble alcance sin oscurecer el sentido, así que conviene distinguir los dos valores y preservar el juego con una nota.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: No hubo cambios en la última pasada revisada; el consenso de control cruzado fue de alta concordancia con observaciones menores. Se mantuvo la solución principal de diferenciar 'viento' y 'Espíritu' y de traducir φωνή como 'sonido' en el primer hemistiquio.
  spanish_consistency_notes:
  - Se usa 'Espíritu' con artículo implícito en 'del Espíritu' para mantener la referencia al Espíritu Santo sin introducir una explicitación que el griego no da.
  - Se evita 'SEÑOR' o equivalentes no presentes en el texto; no hay un tetragrámaton ni κύριος en este versículo.
  - La puntuación reproduce la cadencia del original con pausa fuerte tras 'va' y cierre sentencioso en 'Espíritu'.
