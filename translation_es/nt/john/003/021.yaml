  text: ὁ δὲ ποιῶν τὴν ἀλήθειαν ἔρχεται πρὸς τὸ φῶς, ἵνα φανερωθῇ αὐτοῦ τὰ ἔργα ὅτι ἐν θεῷ ἐστιν εἰργασμένα.
base_translation:
  language: en
  yaml_path: translation/nt/john/003/021.yaml
  text: But the one who does the truth comes to the light[a], so that his works may be revealed[d][c][b], because they have been done in God.
  footnotes:
  - marker: a
    text: Or 'practices the truth' or 'does what is true.' The Greek expression is literally 'does the truth.'
    reason: lexical_alternative
  - marker: b
    text: Or 'because they have been done in God.' The conjunction can be taken as introducing either the content of what is revealed or the reason for it.
    reason: alternative_reading
  - marker: c
    text: '''In God'' may also be understood as ''by God'' or ''through God,'' but the Greek wording is left more open.'
    reason: lexical_alternative
  - marker: d
    text: Or 'that they have been done in God'.
    reason: previous_rendering
