translation:
  language: es
  text: Pero el que hace la verdad[a] viene a la luz, para que sus obras queden al descubierto[b][c], porque han sido hechas en Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «practica la verdad» o «hace lo que es verdadero». La expresión griega, literalmente, dice «hace la verdad».
    reason: lexical_alternative
  - marker: b
    text: O «porque han sido hechas en Dios». La partícula puede entenderse como introduciendo la razón de la revelación o el contenido de lo revelado.
    reason: alternative_reading
  - marker: c
    text: «En Dios» también puede entenderse como «por Dios» o «mediante Dios», pero el texto griego se deja más abierto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δὲ ποιῶν
  english_pob_choice: But the one who does
  chosen_spanish: Pero el que hace
  alternatives_spanish:
  - Pero quien hace
  - Pero el que practica
  lexicon: BDAG
  rationale: El participio articular funciona de manera sustantiva y describe a una persona caracterizada por esta acción. «El que hace» conserva la estructura griega y el contraste suave de δέ con «pero». Se evita «practica» en el texto principal para no perder la fuerza literal del giro idiomático.
- source_word: τὴν ἀλήθειαν
  english_pob_choice: the truth
  chosen_spanish: la verdad
  alternatives_spanish:
  - lo verdadero
  - la verdad en práctica
  lexicon: BDAG
  rationale: Se mantiene la equivalencia transparente de ἀλήθεια como «verdad». En Juan, el término tiene peso moral y revelatorio, no solo de exactitud factual. La expresión completa se deja suficientemente literal para respetar el idiomismo griego.
- source_word: ἔρχεται πρὸς τὸ φῶς
  english_pob_choice: comes to the light
  chosen_spanish: viene a la luz
  alternatives_spanish:
  - se acerca a la luz
  - viene hacia la luz
  lexicon: BDAG
  rationale: «Viene a la luz» es natural en español y conserva la imagen de aproximación a la revelación. «A la luz» mantiene bien la fuerza de πρός sin añadir la interpretación más cerrada de «dentro de la luz».
- source_word: ἵνα φανερωθῇ
  english_pob_choice: so that ... may be revealed
  chosen_spanish: para que ... sean reveladas
  alternatives_spanish:
  - a fin de que ... sean mostradas
  - para que ... se manifiesten
  lexicon: BDAG
  rationale: ἵνα expresa propósito, y φανερωθῇ en voz pasiva se refleja bien con «sean reveladas». En español, la pasiva perifrástica conserva mejor la idea de que las obras quedan expuestas por la luz sin volverlo demasiado explicativo.
- source_word: αὐτοῦ τὰ ἔργα
  english_pob_choice: his works
  chosen_spanish: sus obras
  alternatives_spanish:
  - sus hechos
  - sus acciones
  lexicon: BDAG
  rationale: «Obras» conserva la correspondencia léxica con ἔργα y permite mantener el eco joánico. «Hechos» o «acciones» suenan más explicativos y pueden debilitar la conexión textual.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - pues
  lexicon: BDAG
  rationale: 'Se adopta la lectura causal que el propio audit trail reconoce como posible y que en español fluye naturalmente: las obras son reveladas porque su origen y esfera son Dios. Esto evita forzar una construcción de contenido menos idiomática en español.'
- source_word: ἐν θεῷ
  english_pob_choice: in God
  chosen_spanish: en Dios
  alternatives_spanish:
  - por Dios
  - de parte de Dios
  - en unión con Dios
  lexicon: BDAG
  rationale: '«En Dios» preserva la abertura semántica del griego: puede sugerir esfera, relación o agencia sin resolverla de antemano. No se reemplaza por una formulación más interpretativa para no borrar la tensión teológica documentada.'
- source_word: ἐστιν εἰργασμένα
  english_pob_choice: have been done
  chosen_spanish: han sido hechas
  alternatives_spanish:
  - han sido realizadas
  - han sido obradas
  lexicon: BDAG
  rationale: La perífrasis perfecto pasiva se refleja con «han sido hechas», que en español conserva la pasividad y el resultado cumplido. Se evita «obradas» por sonar arcaico y «realizadas» por ser menos transparente al léxico verbal del pasaje.
theological_decisions:
- issue: Sentido de la expresión idiomática ποιεῖν τὴν ἀλήθειαν
  english_pob_reading: Rendered literally as 'does the truth' rather than interpretive paraphrase.
  chosen_spanish_reading: «Hace la verdad» en el texto principal, con nota de alternativa idiomática.
  alternative_spanish_readings:
  - practica la verdad
  - hace lo verdadero
  - vive en la verdad
  rationale: Se conserva la literalidad del giro idiomático para mantener la textura joánica y no estrechar su alcance. En español, «hacer la verdad» resulta comprensible aunque algo marcado; la nota ofrece las alternativas naturales sin reemplazar el texto principal.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it.'
- issue: Alcance teológico de ἐν θεῷ
  english_pob_reading: Rendered as 'in God' in the main text, without specifying instrumentality or mystical union.
  chosen_spanish_reading: «en Dios», sin explicitar «por Dios» ni «mediante Dios».
  alternative_spanish_readings:
  - por Dios
  - mediante Dios
  - en unión con Dios
  rationale: 'La frase queda abierta como en el griego: puede implicar esfera, relación o agencia. La versión española evita cerrar el sentido y preserva la ambigüedad teológica auditada.'
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La redacción española sigue el último estado revisado del audit trail inglés, especialmente la decisión de entender ὅτι de manera causal en esta cláusula y mantener «in God» sin especificar instrumentación. También preserva la tensión documentada en ποιεῖν τὴν ἀλήθειαν y en la relación semántica de ἐν θεῷ, sin resolverlas con paráfrasis doctrinales.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός conforme a la terminología del proyecto.
  - Se usa «obras» para ἔργα para preservar la conexión léxica con el griego y con el audit trail inglés.
  - Se evita «SEÑOR» y otras sustituciones no pertinentes en este versículo.
  - La puntuación y la capitalización siguen el uso estándar del español, con coma antes de la cláusula final causal.
