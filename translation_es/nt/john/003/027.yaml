revisions:
- from: 'Juan respondió y dijo[a]: «Un hombre no puede recibir ni una sola cosa, si no le es dada del cielo».'
  to: 'Juan respondió y dijo[a]: «Un hombre no puede recibir ni una sola cosa si no le ha sido dada del cielo»'
  rationale: Se mantiene la fidelidad general del borrador, pero se ajusta «le es dada» a «le ha sido dada» para reflejar mejor el perfecto pasivo griego y la decisión lexical del POB inglés. También se elimina la coma antes de «si no» para mejorar la naturalidad del español.
  reviewer_model: gpt-5.4
