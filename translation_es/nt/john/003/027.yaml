translation:
  language: es
  text: 'Juan respondió y dijo[a]: «Un hombre no puede recibir ni una sola cosa si no le ha sido dada del cielo»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «persona». El griego dice literalmente «hombre» (ἄνθρωπος) con sentido genérico y representativo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió en respuesta
  lexicon: BDAG
  rationale: En español, «respondió» conserva el valor narrativo de ἀπεκρίθη y suena natural en la fórmula introductoria del diálogo. «Contestó» sería posible, pero «respondió» mantiene mejor la correspondencia con el uso joánico y la transición al discurso directo.
- source_word: Ἰωάννης
  english_pob_choice: John
  chosen_spanish: Juan
  alternatives_spanish:
  - Juan el Bautista
  lexicon: nombre propio estándar
  rationale: El nombre propio se vierte como «Juan». El contexto ya identifica al hablante; añadir «el Bautista» sería interpretativo y no está en el griego de este versículo.
- source_word: καὶ εἶπεν
  english_pob_choice: and said
  chosen_spanish: y dijo
  alternatives_spanish:
  - y habló
  - y añadió
  lexicon: BDAG
  rationale: La doble fórmula narrativa se conserva de forma directa como «y dijo». En español mantiene la estructura fuente sin sonar forzado.
- source_word: Οὐ δύναται
  english_pob_choice: is not able
  chosen_spanish: no puede
  alternatives_spanish:
  - no es capaz de
  - no tiene poder para
  lexicon: BDAG
  rationale: «No puede» comunica la incapacidad explícita de δύναται con naturalidad en español. Aunque «no es capaz de» sería más analítico, «no puede» es más idiomático y suficiente para la fuerza del verbo.
- source_word: ἄνθρωπος
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - un ser humano
  - alguien
  lexicon: BDAG
  rationale: Se mantiene el sustantivo masculino singular como en el griego y como decidió la POB inglesa. En español puede leerse de forma genérica y representativa, sin restringirlo solo a varones individuales.
- source_word: λαμβάνειν
  english_pob_choice: to receive
  chosen_spanish: recibir
  alternatives_spanish:
  - tomar
  - obtener
  lexicon: BDAG
  rationale: Aquí λαμβάνειν expresa recibir algo concedido, no tomarlo por la fuerza. «Recibir» preserva esa lógica de don.
- source_word: οὐδὲ ἓν
  english_pob_choice: even one thing
  chosen_spanish: ni una sola cosa
  alternatives_spanish:
  - ni una sola
  - nada
  lexicon: BDAG
  rationale: «Ni una sola cosa» reproduce el énfasis de mínima cantidad de οὐδὲ ἓν con naturalidad en español. «Nada» sería más libre y perdería el matiz de cuantificación mínima.
- source_word: ἐὰν μὴ
  english_pob_choice: unless
  chosen_spanish: si no
  alternatives_spanish:
  - a menos que
  - excepto si
  lexicon: BDAG
  rationale: En esta estructura condicional, «si no» reproduce con claridad la idea exceptiva de ἐὰν μὴ. «A menos que» también sería válido, pero «si no» sigue de cerca la relación lógica del griego.
- source_word: ᾖ δεδομένον
  english_pob_choice: it has been given
  chosen_spanish: le es dada
  alternatives_spanish:
  - le ha sido dada
  - le haya sido dada
  - le es concedida
  lexicon: BDAG
  rationale: La construcción pasiva perfectiva se vierte con un presente de estado, «le es dada», para conservar la pasividad y la relevancia actual del don. Aunque «le ha sido dada» expresa el resultado pasado, «le es dada» suena más natural en español y mantiene la dependencia del regalo.
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - a esa persona
  lexicon: BDAG
  rationale: El dativo indirecto se incorpora como clítico español. Dado que «un hombre» funciona genéricamente, «le» evita una repetición pesada y conserva la referencia indirecta.
- source_word: ἐκ τοῦ οὐρανοῦ
  english_pob_choice: from heaven
  chosen_spanish: del cielo
  alternatives_spanish:
  - de Dios
  - desde el cielo
  lexicon: BDAG
  rationale: Se conserva la imagen literal «del cielo» que la POB inglesa retuvo. Aunque en contexto joánico apunta a la fuente divina, traducir «de Dios» interpretaría más de lo que el texto dice explícitamente.
theological_decisions:
- issue: Alcance de la afirmación sobre el origen divino de lo recibido
  english_pob_reading: The verse states that any received thing comes only if it has been given from heaven, without specifying a full doctrine of determinism or denying human agency.
  chosen_spanish_reading: El versículo afirma que nada puede recibirse si no le es dado del cielo, sin convertir la frase en una doctrina cerrada sobre determinismo ni negar la agencia humana.
  alternative_spanish_readings:
  - Nada recibe el ser humano por sí mismo; todo está absolutamente predeterminado.
  - La frase se limita solo al cargo ministerial inmediato de Juan.
  rationale: La escena inmediata trata de Juan el Bautista y del ascenso de Jesús, así que el dicho tiene una referencia concreta al ministerio y al lugar asignado. Pero la formulación es suficientemente amplia para sostener un principio general de don divino. La redacción española conserva esa tensión sin resolverla en una dirección doctrinal ajena al texto.
  doctrine_reference: Preservar la tensión teológica, no resolverla.
translation_notes:
  revision_awareness: El texto inglés y la revisión más reciente coinciden en no introducir cambios; la versión española sigue ese nivel de acuerdo alto y conserva la estructura fuente sin ampliaciones interpretativas.
  spanish_consistency_notes:
  - Se mantuvo «del cielo» en lugar de «de Dios» para respetar el paralelismo con el audit trail inglés y la literalidad del griego.
  - Se preservó «un hombre» en el texto principal, con nota para la lectura genérica, siguiendo la decisión lexical documentada.
  - Se evitó «SEÑOR» y no hay términos de Cristo/Mesías en este versículo.
  - La construcción pasiva se expresó de modo natural en español sin perder la dependencia del don.
