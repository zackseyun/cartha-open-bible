review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: conserva «respondió y dijo», la negación de capacidad, el énfasis de «ni una sola cosa», y «del cielo» como fuente divina no interpretada. También mantiene correctamente la nota sobre ἄνθρωπος con sentido genérico. Sin embargo, «le es dada» no representa tan bien como podría la perífrasis perfecta pasiva ᾖ δεδομένον, que en este contexto se expresa mejor en español como «le ha sido dada».'
  spanish_quality_summary: El español es claro y eclesialmente legible. La frase fluye bien, pero «si no le es dada» suena algo menos natural y menos preciso aspectualmente que «si no le ha sido dada». Además, en una cita sentenciosa como esta, conviene omitir la coma antes de «si no», lo que mejora la naturalidad del español sin alterar el sentido.
  glossary_alignment: No hay conflictos con la terminología del proyecto. «Juan», «cielo», y el tratamiento de ἄνθρωπος con nota alternativa están alineados. La decisión clave a corregir es aspectual/gramatical, no terminológica.
  issues:
  - severity: medium
    issue: La perífrasis griega ᾖ δεδομένον está subrepresentada por «le es dada».
    rationale: El inglés auditado eligió «it has been given» para preservar el valor resultativo del perfecto pasivo. En español, «le ha sido dada» comunica mejor la acción completada con relevancia presente que «le es dada», que tiende a leerse como presente simple o gnómico.
  - severity: low
    issue: La coma antes de «si no» es innecesaria y hace la frase ligeramente menos natural.
    rationale: 'En español, la subordinada condicional breve pospuesta aquí fluye mejor sin coma: «no puede recibir ni una sola cosa si no…».'
  revised_spanish_text: 'Juan respondió y dijo[a]: «Un hombre no puede recibir ni una sola cosa si no le ha sido dada del cielo»'
  revised_footnotes:
  - marker: a
    text: O «persona». El griego dice literalmente «hombre» (ἄνθρωπος) con sentido genérico y representativo.
    reason: lexical_alternative
  revision_rationale: Se mantiene la fidelidad general del borrador, pero se ajusta «le es dada» a «le ha sido dada» para reflejar mejor el perfecto pasivo griego y la decisión lexical del POB inglés. También se elimina la coma antes de «si no» para mejorar la naturalidad del español.
