revisions:
- from: De cierto[a], de cierto, te digo que lo que sabemos hablamos y damos testimonio de lo que hemos visto, y no reciben nuestro testimonio.[c][b]
  to: En verdad[a], en verdad te digo que hablamos de lo que sabemos y damos testimonio de lo que hemos visto[b], y ustedes no reciben[c] nuestro testimonio.
  rationale: Se corrige la persona verbal final a segunda plural para reflejar οὐ λαμβάνετε, se reemplaza la fórmula inicial por una opción más natural y moderna («En verdad, en verdad») acorde con el estilo meta, se mejora la fluidez de la cláusula central con «hablamos de lo que sabemos», y se reubican las notas al lugar semánticamente correcto.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:03:35Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura principal del griego: fórmula enfática inicial, plural deliberadamente no resuelto en «sabemos / hablamos / hemos visto / damos testimonio», y la coordinación final simple con «y». Sin embargo, falla en un punto importante de alineación gramatical: οὐ λαμβάνετε es segunda persona plural («ustedes no reciben»), pero el borrador usa tercera persona plural («no reciben»), lo que borra la confrontación directa del original y además produce desajuste con «te digo».'
  spanish_quality_summary: El texto es mayormente comprensible, pero «De cierto, de cierto» suena marcadamente arcaizante y menos natural para el objetivo de español moderno y digno. También la secuencia «lo que sabemos hablamos» es entendible pero algo rígida; «hablamos de lo que sabemos» o «hablamos lo que sabemos» mejora la naturalidad. Además, la nota [c] está anclada al final de la oración aunque explica «reciben/aceptan»; debe anclarse en el verbo correspondiente.
  glossary_alignment: No hay conflictos con la terminología doctrinal principal del proyecto. «Testimonio» para μαρτυρία/μαρτυροῦμεν y la conservación del plural no resuelto están bien. La principal corrección requerida es pronominal y de estilo, no de glosario teológico.
  issues:
  - severity: high
    issue: «no reciben» traduce οὐ λαμβάνετε en tercera persona plural en vez de segunda persona plural
    rationale: 'El griego confronta directamente al interlocutor plural: «ustedes no reciben». Mantener tercera persona cambia el sujeto y debilita el sentido retórico del versículo.'
  - severity: medium
    issue: «De cierto, de cierto» es demasiado arcaizante para el estilo meta
    rationale: Aunque comprensible, suena a calco tradicional más propio de Reina-Valera que de un español moderno y ampliamente legible. «En verdad, en verdad» o «Verdaderamente, verdaderamente» representa mejor la meta estilística y la decisión inglesa «Truly, truly».
  - severity: medium
    issue: La nota [c] está mal anclada
    rationale: La alternativa «aceptan» corresponde al verbo «reciben», no al punto final. Debe colocarse junto al verbo o frase verbal pertinente.
  - severity: low
    issue: «lo que sabemos hablamos» suena rígido en español
    rationale: No es incorrecto, pero «hablamos de lo que sabemos» fluye mejor y sigue expresando ὃ οἴδαμεν λαλοῦμεν sin pérdida semántica.
  revised_spanish_text: En verdad[a], en verdad te digo que hablamos de lo que sabemos y damos testimonio de lo que hemos visto[b], y ustedes no reciben[c] nuestro testimonio.
  revised_footnotes:
