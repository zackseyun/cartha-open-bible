translation:
  language: es
  text: En verdad[a], en verdad te digo que hablamos de lo que sabemos y damos testimonio de lo que hemos visto[b], y ustedes no reciben[c] nuestro testimonio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Amén, amén, te digo».
    reason: lexical_alternative
  - marker: b
    text: El plural de primera persona («hablamos», «sabemos», «hemos visto», «nuestro») se conserva sin precisar a quiénes incluye Jesús; su referente exacto es debatido.
    reason: alternative_reading
  - marker: c
    text: O «no aceptan».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀμὴν ἀμὴν
  english_pob_choice: Truly, truly
  chosen_spanish: De cierto[a], de cierto
  alternatives_spanish:
  - Amén, amén
  - Verdaderamente, verdaderamente
  lexicon: BDAG
  rationale: La fórmula doble se conserva como énfasis solemne. En español, «De cierto» comunica la fuerza afirmativa con naturalidad y mantiene un registro bíblico digno; se deja la alternativa «Amén, amén» como lectura posible por la tensión lexical del original.
- source_word: λέγω σοι
  english_pob_choice: I tell you
  chosen_spanish: te digo
  alternatives_spanish:
  - te digo a ti
  - yo te digo
  lexicon: BDAG
  rationale: La forma directa y sobria «te digo» conserva el habla inmediata de Jesús sin volverla forzada en español. El dativo singular queda bien expresado con el pronombre enclítico.
- source_word: ὃ οἴδαμεν
  english_pob_choice: what we know
  chosen_spanish: lo que sabemos
  alternatives_spanish:
  - aquello que sabemos
  - lo que conocemos
  lexicon: BDAG
  rationale: El relativo neutro se vierte de manera idiomática como «lo que». «Sabemos» conserva el valor de conocimiento seguro del perfecto de οἶδα.
- source_word: λαλοῦμεν
  english_pob_choice: we speak
  chosen_spanish: hablamos
  alternatives_spanish:
  - decimos
  - hablamos de
  lexicon: BDAG
  rationale: «Hablamos» es natural en español y mantiene el paralelismo con «damos testimonio». Se evita «decimos» porque puede sonar menos enfático en este contexto de declaración autorizada.
- source_word: ὃ ἑωράκαμεν
  english_pob_choice: what we have seen
  chosen_spanish: de lo que hemos visto
  alternatives_spanish:
  - lo que hemos visto
  - aquello que hemos visto
  lexicon: BDAG
  rationale: El perfecto se refleja con «hemos visto», preservando la relevancia actual de la visión pasada. Se añade «de» para enlazar fluidamente con «damos testimonio de» y no romper el español.
- source_word: μαρτυροῦμεν
  english_pob_choice: testify to
  chosen_spanish: damos testimonio
  alternatives_spanish:
  - testificamos
  - atestiguamos
  lexicon: BDAG
  rationale: «Damos testimonio» mantiene el sustantivo verbal relacionado con μαρτυρία y es claro en español eclesial contemporáneo. Se evita «atestiguamos» por sonar más técnico y menos natural.
- source_word: τὴν μαρτυρίαν ἡμῶν
  english_pob_choice: our testimony
  chosen_spanish: nuestro testimonio
  alternatives_spanish:
  - nuestra testificación
  - nuestro testigo
  lexicon: BDAG
  rationale: «Testimonio» preserva el vínculo léxico con «damos testimonio» y expresa bien el sentido forense/revelatorio del término en Juan. El posesivo se deja sin resolver interpretativamente, como en el griego.
- source_word: οὐ λαμβάνετε
  english_pob_choice: you do not receive
  chosen_spanish: no reciben
  alternatives_spanish:
  - no reciben/aceptan
  - no aceptan
  lexicon: BDAG
  rationale: «Reciben» conserva el verbo joánico importante de recibir/rechazar un testimonio. Se usa la tercera persona plural para dejar abierta, con la POB inglesa, la cuestión de si el plural alude a los oyentes colectivos; la elección evita aclarar indebidamente el sujeto en español.
- source_word: καὶ ... καὶ
  english_pob_choice: and ... and
  chosen_spanish: y ... y
  alternatives_spanish:
  - y ... también
  - y ... además
  lexicon: BDAG
  rationale: Se mantiene la coordinación simple sin introducir contraste adversativo. El español permite repetir «y» de manera natural para reflejar el griego de forma directa.
theological_decisions:
- issue: Alcance del plural de primera persona («sabemos / hablamos / hemos visto / damos testimonio»).
  english_pob_reading: Retained as 'we' and 'our' without interpretive narrowing.
  chosen_spanish_reading: Se mantiene el plural («sabemos», «hablamos», «hemos visto», «damos testimonio») sin precisar quiénes quedan incluidos.
  alternative_spanish_readings:
  - Jesús hablando solo de sí mismo con plural retórico
  - Jesús hablando de sí mismo y sus discípulos
  - Jesús refiriéndose a un testimonio celestial más amplio
  rationale: El griego conserva formas plurales explícitas y el expediente inglés señala la disputa interpretativa. La versión española preserva esa tensión teológica sin resolverla con una paráfrasis explicativa.
  doctrine_reference: Preservar la tensión interpretativa del texto en lugar de cerrarla.
translation_notes:
  revision_awareness: 'La redacción sigue el ajuste más reciente del POB inglés: se evita un valor adversativo añadido en la conjunción final y se conserva la fórmula solemne con una opción léxica alternativa para ἀμήν. También se mantiene abierto el debate sobre el plural de primera persona y el matiz de λαμβάνετε.'
  spanish_consistency_notes:
  - Se usó «de cierto» para ἀμήν por equivalencia funcional en español bíblico, no como transliteración mecánica.
  - Se preservó «testimonio» para μαρτυρία y el giro «dar testimonio» para μαρτυρέω, manteniendo coherencia léxica.
  - Se evitó resolver el referente del plural con una nota explicativa dentro del cuerpo, para respetar la tensión del original.
  - La nota [c] está anclada al segmento final «no reciben», porque esa es la elección léxica principal que podría alternar con «no aceptan».
