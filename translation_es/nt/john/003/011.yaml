    text: O «Amén, amén, te digo».
    reason: lexical_alternative
  - marker: b
    text: El plural de primera persona («hablamos», «sabemos», «hemos visto», «nuestro») se conserva sin precisar a quiénes incluye Jesús; su referente exacto es debatido.
    reason: alternative_reading
  - marker: c
    text: O «no aceptan».
    reason: lexical_alternative
