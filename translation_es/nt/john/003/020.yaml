translation:
  language: es
  text: Porque todo el que practica lo malo odia la luz y no viene a la luz, para que sus obras[b] no sean expuestas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «No sean expuestas» sigue el valor de ἐλέγχω en este contexto; también puede entenderse como «no sean reprendidas» o «no sean puestas en evidencia».
    reason: lexical_alternative
  - marker: b
    text: El griego usa aquí una forma singular masculina genérica para referirse a cualquiera que practica lo malo.
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶς γὰρ ὁ
  english_pob_choice: For everyone who
  chosen_spanish: Porque todo el que
  alternatives_spanish:
  - Porque cualquiera que
  - Pues todo el que
  lexicon: BDAG
  rationale: La construcción con artículo + participio es una expresión genérica que abarca a toda persona caracterizada por la acción. «Porque» conserva la función explicativa de γάρ, y «todo el que» suena natural y preciso en español para este valor distributivo.
- source_word: φαῦλα
  english_pob_choice: evil
  chosen_spanish: lo malo
  alternatives_spanish:
  - el mal
  - cosas malas
  - lo perverso
  lexicon: BDAG
  rationale: Aquí φαῦλα expresa conducta moralmente mala en contraste con la luz. «Lo malo» mantiene el valor ético sin sonar excesivamente abstracto ni introducir una carga técnica ajena al contexto inmediato.
- source_word: πράσσων
  english_pob_choice: practices
  chosen_spanish: practica
  alternatives_spanish:
  - hace
  - comete
  - realiza
  lexicon: BDAG
  rationale: El participio presente indica acción característica y continua. «Practica» reproduce bien la idea de conducta habitual y evita reducir el verbo a un acto aislado.
- source_word: μισεῖ
  english_pob_choice: hates
  chosen_spanish: odia
  alternatives_spanish:
  - detesta
  lexicon: BDAG
  rationale: «Odia» es la correspondencia directa y fuerte de μισέω, y preserva la oposición moral frontal entre la conducta mala y la luz.
- source_word: τὸ φῶς
  english_pob_choice: the light
  chosen_spanish: la luz
  alternatives_spanish:
  - la claridad
  - la luz divina
  lexicon: BDAG
  rationale: Se conserva la metáfora joánica de «la luz», cargada de revelación y verdad. No se sustituye por una paráfrasis, para mantener el vínculo con el lenguaje del evangelio.
- source_word: οὐκ ἔρχεται πρὸς τὸ φῶς
  english_pob_choice: does not come to the light
  chosen_spanish: no viene a la luz
  alternatives_spanish:
  - no se acerca a la luz
  - no va a la luz
  lexicon: BDAG
  rationale: «Viene a la luz» es una formulación natural en español y conserva el movimiento metafórico hacia la revelación. «No viene» reproduce la sencillez del griego y la cadencia del pasaje.
- source_word: ἵνα μὴ
  english_pob_choice: lest
  chosen_spanish: para que no
  alternatives_spanish:
  - a fin de que no
  - no sea que
  lexicon: BDAG
  rationale: En español, «para que no» expresa bien el propósito negativo o la evitación intencional. Se evita una construcción arcaizante y se mantiene la relación de finalidad.
- source_word: ἐλεγχθῇ
  english_pob_choice: be exposed
  chosen_spanish: sean expuestas
  alternatives_spanish:
  - sean reprendidas
  - sean puestas en evidencia
  - sean convictas
  lexicon: BDAG
  rationale: El verbo ἐλέγχω puede implicar exponer, refutar, reprender o dejar en evidencia. En este contexto de la luz que revela obras, «sean expuestas» conserva la imagen de sacar a la luz sin forzar el sentido hacia una condena judicial.
- source_word: τὰ ἔργα αὐτοῦ
  english_pob_choice: his works
  chosen_spanish: sus obras
  alternatives_spanish:
  - sus hechos
  - sus acciones
  lexicon: BDAG
  rationale: «Obras» mantiene la continuidad léxica habitual del lenguaje joánico para ἔργα. «Sus» refleja el posesivo singular genérico del griego sin marcar cambio de número.
theological_decisions:
- issue: Valor de la luz como metáfora reveladora
  english_pob_reading: the light
  chosen_spanish_reading: la luz
  alternative_spanish_readings:
  - la claridad
  - la luz de Dios
  rationale: La frase conserva la metáfora teológica joánica de la luz como revelación y verdad. Traducirla literalmente permite que el lector perciba su carga simbólica sin reducirla a una explicación interpretativa.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
- issue: Sentido de ἐλεγχθῇ en relación con las obras
  english_pob_reading: be exposed
  chosen_spanish_reading: sean expuestas
  alternative_spanish_readings:
  - sean reprendidas
  - sean convictas
  - sean puestas en evidencia
  rationale: La idea principal no es solo condena formal, sino el descubrimiento público de las obras ante la luz. «Sean expuestas» preserva esa tensión entre revelación y juicio sin estrechar el verbo a un único matiz.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
- issue: Construcción genérica singular
  english_pob_reading: his works
  chosen_spanish_reading: sus obras
  alternative_spanish_readings:
  - sus obras de ellos
  - sus obras de esa persona
  rationale: El griego usa un singular masculino genérico. En español, «sus obras» comunica correctamente la referencia representativa sin imponer pluralidad ni cambiar el sentido inclusivo del enunciado.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: 'La redacción se mantiene en alta concordancia con el audit trail inglés y con el griego SBLGNT. No se detectaron revisiones aplicadas en el paquete fuente, y el pasaje confirma la lectura estable: conducta habitual, oposición a la luz y exposición de las obras.'
  spanish_consistency_notes:
  - Se mantiene «la luz» de forma literal para conservar la metáfora joánica.
  - Se usa «obras» para ἔργα, coherente con el uso bíblico-teológico habitual y con el audit trail.
  - Se evita «SEÑOR» u otras sustituciones no presentes en el texto.
  - La construcción genérica en español conserva el valor singular representativo del griego sin ambigüedad doctrinal.
