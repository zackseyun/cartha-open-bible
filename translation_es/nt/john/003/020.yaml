    text: Or 'be reproved' or 'be convicted'; the Greek verb can carry the sense of exposing wrongdoing, showing guilt, or bringing something to light.
    reason: lexical_alternative
  - marker: b
    text: Greek 'his works' uses a singular masculine form generically for any person who practices evil.
    reason: lexical_alternative
