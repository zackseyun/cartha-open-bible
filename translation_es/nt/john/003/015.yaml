review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la sintaxis y el sentido del griego: ἵνα → «para que», πᾶς ὁ πιστεύων → «todo el que cree», ἐν αὐτῷ → «en él», ἔχῃ → «tenga», ζωὴν αἰώνιον → «vida eterna». También conserva correctamente la decisión auditada de no sustituir ἐν por una lectura direccional. Sin embargo, la nota [a] no preserva la alternativa inglesa «whoever believes», porque repite esencialmente el mismo texto principal («todo el que cree»).'
  spanish_quality_summary: 'El español principal es natural, claro y digno: «para que todo el que cree en él tenga vida eterna». No requiere cambio en el cuerpo del versículo. La única reparación necesaria está en la nota léxica [a], para que ofrezca una alternativa real y legible en español. La nota [b] es comprensible y adecuada, aunque «ponen» podría sonar menos preciso que «traducen»; no es un problema mayor.'
  glossary_alignment: No hay conflicto con la terminología del proyecto. No aparecen términos sensibles como Yahvé, Mesías, Cristo, Espíritu, etc. «Vida eterna» y «en él» siguen fielmente las decisiones léxicas y teológicas documentadas.
  issues:
  - severity: medium
    issue: La nota [a] no preserva la alternativa del inglés.
    rationale: 'El inglés ofrece una alternativa genuina: «Or ''whoever believes.''» En español, «O «todo el que cree»» duplica prácticamente la redacción principal y no añade una variante real. Debe reemplazarse por una alternativa como «O «quien cree»» o «O «quien crea»». Preferible «quien cree» por cercanía al aspecto genérico del presente.'
  - severity: low
    issue: La nota [b] usa «ponen» en lugar de un verbo más preciso de traducción.
    rationale: «Algunas traducciones ponen...» se entiende, pero «traducen» sería más exacto y natural en una nota de crítica de traducción. Es una mejora de estilo menor, no un problema de fidelidad.
  revised_spanish_text: para que todo el que cree en él tenga vida eterna[a][b].
  revised_footnotes:
  - marker: a
    text: O «quien cree».
    reason: lexical_alternative
  - marker: b
    text: Algunas traducciones traducen esta frase «hacia él», pero el griego aquí dice «en él» (ἐν αὐτῷ).
    reason: lexical_alternative
  revision_rationale: El texto principal ya es fiel y natural; solo se corrigen las notas para que preserven de verdad las alternativas documentadas en la auditoría inglesa y mejoren la precisión del español.
