translation:
  language: es
  text: El Padre ama al Hijo y ha dado todas las cosas en su mano[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'en su mano'. La expresión griega es literalmente 'en su mano', un modismo para confiar autoridad o posesión.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ πατὴρ
  english_pob_choice: The Father
  chosen_spanish: el Padre
  alternatives_spanish:
  - el padre
  lexicon: BDAG
  rationale: En este contexto joánico se trata de un título personal para Dios en relación con el Hijo; por eso se usa mayúscula en español para reflejar el valor titular, no una referencia genérica a un padre humano.
- source_word: ἀγαπᾷ
  english_pob_choice: loves
  chosen_spanish: ama
  alternatives_spanish:
  - ama con amor
  - quiere
  lexicon: BDAG
  rationale: El presente expresa una realidad continua; en español, 'ama' comunica de manera natural esa acción vigente sin introducir una paráfrasis innecesaria.
- source_word: τὸν υἱόν
  english_pob_choice: the Son
  chosen_spanish: el Hijo
  alternatives_spanish:
  - el hijo
  lexicon: BDAG
  rationale: Se conserva la mayúscula como título cristológico, porque el contexto se refiere específicamente a Jesús en su relación filial con el Padre.
- source_word: πάντα
  english_pob_choice: all things
  chosen_spanish: todas las cosas
  alternatives_spanish:
  - todo
  - todo cuanto
  lexicon: BDAG
  rationale: El plural neutro se mantiene de forma explícita para no reducir el alcance del enunciado; 'todas las cosas' preserva la amplitud del original mejor que un 'todo' más abstracto.
- source_word: δέδωκεν
  english_pob_choice: has given
  chosen_spanish: ha entregado
  alternatives_spanish:
  - ha dado
  - dio
  lexicon: BDAG
  rationale: El perfecto indica una acción cumplida con resultado vigente. 'Ha entregado' conserva esa fuerza y además encaja bien con la idea de confiamento de autoridad o posesión que el contexto sugiere.
- source_word: ἐν τῇ χειρὶ αὐτοῦ
  english_pob_choice: into his hand
  chosen_spanish: en su mano
  alternatives_spanish:
  - en la mano de él
  - en su poder
  lexicon: BDAG
  rationale: Se sigue de cerca la expresión griega, que literalmente dice 'en su mano'. Se conserva la imagen corporal y la posible carga idiomática de autoridad o posesión, sin forzar una explicación en el texto principal.
theological_decisions:
- issue: Relación entre el Padre y el Hijo
  english_pob_reading: Retained the personal and relational titles 'Father' and 'Son' without reduction or paraphrase.
  chosen_spanish_reading: Se mantienen los títulos personales 'Padre' e 'Hijo' sin reducirlos a lenguaje familiar genérico.
  alternative_spanish_readings:
  - el padre y el hijo
  - Dios y Jesús
  rationale: El versículo presenta una relación cristológica específica; la mayúscula ayuda a señalar el uso titular sin añadir interpretación doctrinal más allá del texto.
  doctrine_reference: Affirmations; Translation philosophy §2
- issue: Alcance de lo entregado al Hijo
  english_pob_reading: Rendered δέδωκεν as 'has given' and πάντα as 'all things' to preserve both comprehensive scope and ongoing result.
  chosen_spanish_reading: Se traduce con 'ha entregado todas las cosas' para conservar tanto el alcance total como el resultado permanente de la acción.
  alternative_spanish_readings:
  - entregó todas las cosas
  - le dio todo
  rationale: El perfecto griego no se aplana a un pasado simple; el español perfecto compuesto expresa mejor una acción concluida con efecto presente, sin introducir formulaciones doctrinales ajenas al versículo.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Valor idiomático de 'en su mano'
  english_pob_reading: '''in his hand,'' an idiom for entrusting authority or possession.'
  chosen_spanish_reading: '''en su mano'' se conserva como posible modismo de autoridad, dominio o posesión confiada.'
  alternative_spanish_readings:
  - bajo su autoridad
  - en su poder
  rationale: La imagen griega es literal y, a la vez, idiomática. Mantenerla en el texto principal respeta la forma del original; el sentido de autoridad queda disponible por la nota sin borrar la tensión lexical.
  doctrine_reference: Translation philosophy §5
translation_notes:
  revision_awareness: El pasaje muestra alto acuerdo entre los controles de revisión y no presenta cambios aplicados; por eso la redacción española sigue de cerca la lectura auditada del griego y del POB inglés, manteniendo la imagen idiomática de 'mano' y el valor aspectual del perfecto.
  spanish_consistency_notes:
  - Se mantiene 'Padre' e 'Hijo' con mayúscula como títulos relacionales en contexto joánico.
  - '''Ha entregado'' conserva el perfecto con efecto presente, coherente con ''has given''.'
  - '''Todas las cosas'' preserva el neutro plural πάντα sin reducirlo a una abstracción.'
  - La nota al pie conserva la alternativa literal 'en su mano' y su valor idiomático.
  - El registro es bíblico pero contemporáneo, sin caer en arcaísmos innecesarios.
