revisions:
- from: El Padre ama al Hijo y ha entregado todas las cosas en su mano[a].
  to: El Padre ama al Hijo y ha dado todas las cosas en su mano[a].
  rationale: Se cambia 'ha entregado' por 'ha dado' para reflejar con mayor fidelidad el verbo griego δίδωμι y alinearse con la decisión auditada en inglés, mientras se conserva el perfecto ('ha dado') y la nota que explica el valor idiomático de 'en su mano'.
  reviewer_model: gpt-5.4
