review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido básico del griego: ''El Padre'', ''ama'', ''al Hijo'', ''todas las cosas'' y la construcción idiomática ''en su mano''. Sin embargo, ''ha entregado'' se aparta innecesariamente de la decisión auditada en inglés (''has given'') y en español sugiere más fuertemente un acto de transferencia o rendición que el griego δίδωμι requiere aquí. ''Ha dado'' preserva mejor el verbo fuente y el perfecto con resultado vigente.'
  spanish_quality_summary: El texto es claro y digno, pero 'ha entregado todas las cosas en su mano' suena algo rígido y menos natural que 'ha dado todas las cosas en su mano' o 'ha puesto... en su mano'. Dado el rastro auditado, conviene mantener la cercanía léxica con 'dar' y dejar la explicación idiomática en la nota. La redacción de la nota es buena y legible.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. Se conservan correctamente ''Padre'' e ''Hijo'' como títulos. La principal corrección es léxica: δίδωμι aquí debe alinearse mejor con ''dar'' que con ''entregar'', salvo razón contextual más fuerte, que no se documenta suficientemente.'
  issues:
  - severity: medium
    issue: '''ha entregado'' para δέδωκεν es demasiado interpretativo'
    rationale: Aunque puede funcionar en contexto de autoridad confiada, δίδωμι significa básicamente 'dar', y el inglés auditado escogió 'has given'. En español, 'entregar' puede intensificar la idea de transferencia más allá de lo necesario.
  - severity: low
    issue: La justificación lexical de 'ha entregado' habla de 'confiamento'
    rationale: La formulación es poco natural en español; 'acto de confiar' o 'entrega confiada' serían más idiomáticos. Esto no exige nota nueva, pero confirma que la elección verbal puede mejorarse.
  revised_spanish_text: El Padre ama al Hijo y ha dado todas las cosas en su mano[a].
  revised_footnotes:
  - marker: a
    text: O 'en su mano'. La expresión griega es literalmente 'en su mano', un modismo para confiar autoridad o posesión.
    reason: lexical_alternative
  revision_rationale: Se cambia 'ha entregado' por 'ha dado' para reflejar con mayor fidelidad el verbo griego δίδωμι y alinearse con la decisión auditada en inglés, mientras se conserva el perfecto ('ha dado') y la nota que explica el valor idiomático de 'en su mano'.
