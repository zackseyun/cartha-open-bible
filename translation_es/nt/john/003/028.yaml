translation:
  language: es
  text: 'Ustedes mismos dan testimonio a mi favor de que yo dije: «Yo no soy el Mesías[a], sino que he sido enviado delante de él[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «el Cristo».
    reason: alternative_reading
  - marker: b
    text: O, «soy enviado delante de él» o «fui enviado delante de él».
    reason: lexical_alternative
lexical_decisions:
- source_word: αὐτοὶ ὑμεῖς
  english_pob_choice: You yourselves
  chosen_spanish: Ustedes mismos
  alternatives_spanish:
  - Ustedes mismos en persona
  - Ustedes mismos, precisamente
  lexicon: BDAG
  rationale: 'El griego es enfático: los oyentes mismos son los testigos. «Ustedes mismos» conserva esa fuerza de énfasis de forma natural en español, sin añadir partículas innecesarias.'
- source_word: μοι
  english_pob_choice: me
  chosen_spanish: me
  alternatives_spanish:
  - para mí
  - a mí
  lexicon: BDAG
  rationale: Con μαρτυρεῖτε, el dativo señala a la persona a quien se rinde testimonio. «Me dan testimonio» mantiene esa relación de modo idiomático en español.
- source_word: μαρτυρεῖτε
  english_pob_choice: bear me witness
  chosen_spanish: me dan testimonio
  alternatives_spanish:
  - testifican de mí
  - dan testimonio de mí
  lexicon: BDAG
  rationale: La fórmula preserva el matiz testimonial/jurídico de Juan mejor que un «dicen» o «atestiguan» demasiado técnico, y suena natural en español bíblico contemporáneo.
- source_word: ὁ χριστός
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - el Cristo
  lexicon: BDAG
  rationale: Aquí Χριστός funciona como título, no como nombre propio. Por la guía del proyecto, se traduce como «Mesías», que comunica el sentido del título al lector en español.
- source_word: Ἀπεσταλμένος εἰμὶ
  english_pob_choice: I have been sent
  chosen_spanish: he sido enviado
  alternatives_spanish:
  - soy enviado
  - fui enviado
  lexicon: BDAG
  rationale: La construcción perifrástica expresa un estado presente resultante de un envío previo. «He sido enviado» refleja bien esa pasiva perfecta sin perder naturalidad en español.
- source_word: ἔμπροσθεν ἐκείνου
  english_pob_choice: ahead of him
  chosen_spanish: delante de él
  alternatives_spanish:
  - antes que él
  - por delante de él
  lexicon: BDAG
  rationale: «Delante de él» conserva la relación espacial y preparatoria del griego. «Antes que él» podría sonar excesivamente temporal; aquí el énfasis es la precedencia en la misión.
theological_decisions:
- issue: Título Χριστός
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - el Cristo
  rationale: En este contexto Juan niega ser la figura mesiánica esperada. La traducción como título («Mesías») preserva el sentido del original y sigue la orientación terminológica del proyecto.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Messiah (where title; Christ where name-like)'
- issue: Relación de envío en Ἀπεσταλμένος εἰμὶ ἔμπροσθεν ἐκείνου
  english_pob_reading: I have been sent ahead of him
  chosen_spanish_reading: he sido enviado delante de él
  alternative_spanish_readings:
  - soy enviado delante de él
  - fui enviado delante de él
  rationale: La frase debe retener la comisión recibida y su carácter preparatorio, sin añadir más contenido doctrinal del que ofrece el texto. La pasiva compuesta en español expresa bien ese estado derivado de un envío ya realizado.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve source text''s plain sense; do not import doctrinal claims the text does not make'
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con la última revisión inglesa aprobada; no se detectan cambios necesarios respecto del sentido, la puntuación ni las decisiones léxicas principales.
  spanish_consistency_notes:
  - Se mantiene «Mesías» para Χριστός conforme a la terminología del proyecto.
  - Se usa «he sido enviado» para preservar la fuerza de la construcción perifrástica y su sentido de comisión previa con relevancia presente.
  - La frase «delante de él» conserva la precedencia/preparación sin introducir una paráfrasis temporal más fuerte que el griego.
  - El registro es bíblico contemporáneo y publicable, sin calcos innecesarios ni arcaísmos de estilo tradicional.
