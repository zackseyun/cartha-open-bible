    issue: «ha subido» debilita la alineación con la decisión POB para ἀναβέβηκεν
    rationale: Aunque es comprensible y natural, el expediente inglés justificó «has ascended» por aspecto perfecto y registro elevado. «Ha ascendido» preserva mejor ese matiz en español bíblico-digno.
  - severity: low
