translation:
  language: es
  text: Y nadie ha ascendido al cielo, excepto el que descendió del cielo, el Hijo del Hombre[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el que vino del cielo».'
    reason: lexical_alternative
  - marker: b
    text: «El Hijo del Hombre» es la autodesignación característica de Jesús y evoca Daniel 7:13–14.
    reason: cross_reference
lexical_decisions:
- source_word: οὐδεὶς
  english_pob_choice: no one
  chosen_spanish: nadie
  alternatives_spanish:
  - ninguna persona
  - no uno
  lexicon: BDAG
  rationale: El pronombre indefinido negativo se expresa de forma natural y plena en español con «nadie». Conserva el alcance universal de la negación sin introducir matices de género o registro innecesarios.
- source_word: ἀναβέβηκεν
  english_pob_choice: has ascended
  chosen_spanish: ha subido
  alternatives_spanish:
  - ha ascendido
  - ha ido arriba
  lexicon: BDAG
  rationale: El perfecto griego pide una acción completada con relevancia presente. «Ha subido» es natural en español y conserva el movimiento de elevación; «ha ascendido» es posible, pero suena algo más marcado y menos inmediato en un contexto narrativo-teológico.
- source_word: εἰς τὸν οὐρανόν
  english_pob_choice: into heaven
  chosen_spanish: al cielo
  alternatives_spanish:
  - en el cielo
  - hacia el cielo
  lexicon: BDAG
  rationale: Aunque el griego expresa movimiento hacia adentro, en español bíblico «al cielo» comunica con claridad la dirección sin sonar forzado. «En el cielo» pierde el matiz direccional; «hacia el cielo» debilita la fuerza de la llegada.
- source_word: εἰ μὴ
  english_pob_choice: except
  chosen_spanish: excepto
  alternatives_spanish:
  - salvo
  - a menos que
  lexicon: BDAG
  rationale: En esta construcción exclusiva, «excepto» reproduce bien la excepción única frente a la negación precedente. «Salvo» también sería viable, pero «excepto» es más directo y transparente.
- source_word: ὁ ἐκ τοῦ οὐρανοῦ καταβάς
  english_pob_choice: the one who descended from heaven
  chosen_spanish: el que descendió del cielo
  alternatives_spanish:
  - el que bajó del cielo
  - el que vino del cielo
  lexicon: BDAG
  rationale: La frase participial se vuelve naturalmente sustantiva en español con «el que descendió». «Descendió» preserva la correspondencia formal con «subido»/«ha subido» y mantiene el contraste verbal. «Del cielo» refleja de forma idiomática el genitivo de origen.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  english_pob_choice: the Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - el Hijo del hombre
  - el Hombre
  lexicon: BDAG
  rationale: Se conserva el título cristológico establecido «Hijo del Hombre», porque funciona como auto-designación de Jesús y mantiene la resonancia intertextual. En español, la mayúscula ayuda a reconocer su carácter titular.
theological_decisions:
- issue: Título cristológico «ὁ υἱὸς τοῦ ἀνθρώπου»
  english_pob_reading: Render as the recognized title 'the Son of Man' without paraphrasing.
  chosen_spanish_reading: «el Hijo del Hombre» como título reconocido de Jesús, sin sustituirlo por una paráfrasis interpretativa.
  alternative_spanish_readings:
  - el Hombre
  - el ser humano
  rationale: La frase conserva la tensión teológica e intertextual del original; no se debe resolver a una expresión genérica. Mantener el título protege la alusión bíblica y el uso característico de Jesús en los evangelios.
  doctrine_reference: Affirmations; Translation philosophy §3, §5
- issue: Lenguaje de ascenso/descenso celestial
  english_pob_reading: Use 'has ascended' and 'descended' to preserve the verse's claim about heavenly origin and unique access without expanding it interpretively.
  chosen_spanish_reading: «ha subido» / «descendió» para preservar el contraste de movimiento y la afirmación sobre el origen celestial único del Hijo del Hombre.
  alternative_spanish_readings:
  - ha ascendido / ha bajado
  - subió / bajó
  rationale: La traducción mantiene la afirmación cristológica sin añadir explicación doctrinal. El contraste de movimiento es central para el sentido del versículo y debe quedar visible en español.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
translation_notes:
  revision_awareness: Se revisó el contexto de Juan 3:13 y el audit trail inglés. No hubo revisiones aplicadas en la última pasada; la redacción española sigue de cerca la estructura y las decisiones léxicas auditadas, ajustándolas a un español natural sin perder el contraste subir/descender ni el valor titular de «Hijo del Hombre».
  spanish_consistency_notes:
  - Se mantiene «cielo» en lugar de «cielos» para reflejar el singular del griego οὐρανός y el uso idiomático del español bíblico.
  - Se conserva la mayúscula en «Hijo del Hombre» por tratarse de un título cristológico.
  - La sintaxis reproduce la exclusión absoluta de οὐδείς + εἰ μή sin agregar matices causales o condicionales.
