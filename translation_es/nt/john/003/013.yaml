  glossary_alignment: No hay conflicto con la terminología troncal del proyecto. «el Hijo del Hombre» respeta la decisión cristológica documentada. No intervienen Yahvé/Mesías/etc. El ajuste de «ha ascendido» fortalece la alineación con la decisión léxica inglesa para ἀναβέβηκεν.
  issues:
