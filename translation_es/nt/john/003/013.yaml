    rationale: El inglés documenta «the one who came down from heaven». En español, «el que vino del cielo» es aceptable, pero conviene mantener la forma exacta y pulida en nota con comillas españolas.
  revised_spanish_text: Y nadie ha ascendido al cielo, excepto el que descendió del cielo, el Hijo del Hombre[a][b].
