translation:
  language: es
  text: Y así como Moisés levantó la serpiente en el desierto[b], así es necesario que el Hijo del Hombre sea levantado[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sea exaltado'. El verbo griego puede referirse tanto a ser levantado físicamente como a ser exaltado; Juan probablemente quiere ambos sentidos aquí.
    reason: lexical_alternative
  - marker: b
    text: Véase Números 21:8–9 para el relato de Moisés levantando la serpiente en el desierto.
    reason: cross_reference
lexical_decisions:
- source_word: καθὼς
  english_pob_choice: just as
  chosen_spanish: y así como
  alternatives_spanish:
  - así como
  - tal como
  lexicon: BDAG
  rationale: En español, 'y así como' reproduce con naturalidad la comparación correlativa del griego y conserva el paralelo tipológico entre Moisés y el Hijo del Hombre.
- source_word: ὕψωσεν
  english_pob_choice: lifted up
  chosen_spanish: levantó
  alternatives_spanish:
  - alzó
  - elevó
  lexicon: BDAG
  rationale: Para la serpiente de Números 21:8–9, el sentido concreto es ponerla en alto; 'levantó' comunica bien esa acción física sin perder la relación con el verbo repetido en la segunda mitad del versículo.
- source_word: ὄφιν
  english_pob_choice: serpent
  chosen_spanish: la serpiente
  alternatives_spanish:
  - la culebra
  - la víbora
  lexicon: BDAG
  rationale: '''Serpiente'' conserva el registro bíblico y la alusión reconocible a Números 21, y es más adecuado que términos más coloquiales o localizados.'
- source_word: ἐν τῇ ἐρήμῳ
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en la estepa
  - en el yermo
  lexicon: BDAG
  rationale: '''Desierto'' es la equivalencia natural y clara en español para el escenario del Éxodo; mantiene inteligible la referencia bíblica sin necesidad de un calco más marcado.'
- source_word: οὕτως
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de esta manera
  - de igual modo
  lexicon: BDAG
  rationale: '''Así'' es la correspondencia breve y idiomática del correlativo ''y así como ... así ...''.'
- source_word: ὑψωθῆναι
  english_pob_choice: be lifted up
  chosen_spanish: sea levantado
  alternatives_spanish:
  - sea alzado
  - sea exaltado
  lexicon: BDAG
  rationale: '''Sea levantado'' conserva la ambigüedad joánica entre elevación física y exaltación, igual que el inglés POB. ''Sea exaltado'' resolvería demasiado pronto la tensión, mientras que ''sea alzado'' es posible pero menos natural en este contexto.'
- source_word: δεῖ
  english_pob_choice: must
  chosen_spanish: es necesario que
  alternatives_spanish:
  - debe
  - tiene que
  lexicon: BDAG
  rationale: '''Es necesario que'' expresa con claridad la necesidad divina o salvífica del acontecimiento, sin reducirlo a simple obligación humana.'
- source_word: υἱὸν τοῦ ἀνθρώπου
  english_pob_choice: the Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - el Hijo del ser humano
  - el Hijo del hombre
  lexicon: BDAG
  rationale: Se mantiene el título cristológico tradicional y reconocido, que conserva mejor las resonancias daniélicas y joánicas que una paráfrasis explicativa.
theological_decisions:
- issue: Doble sentido de ὑψόω en Juan
  english_pob_reading: Render both occurrences with 'lifted up' in the main text.
  chosen_spanish_reading: Traducir ambos casos con 'levantó / sea levantado' en el texto principal.
  alternative_spanish_readings:
  - alzó / sea alzado
  - elevó / sea elevado
  - exaltó / sea exaltado
  rationale: La frase de Juan vincula la elevación física de la serpiente con lo que debe suceder al Hijo del Hombre, y al mismo tiempo deja abierta la lectura de exaltación. Mantener 'levantó / sea levantado' preserva esa tensión en lugar de resolverla prematuramente hacia crucifixión o exaltación solamente.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto permanece en alta concordancia con la auditoría inglesa y con el control cruzado.
  spanish_consistency_notes:
  - Se mantiene 'Hijo del Hombre' como título cristológico fijo.
  - Se preserva 'serpiente' en un registro bíblico natural, acorde con la alusión a Números 21.
  - '''Desierto'' se usa como equivalente estándar de ''wilderness'' en este contexto narrativo y tipológico.'
  - La pareja 'levantó / sea levantado' conserva la repetición verbal y la tensión semántica del original.
  - Se evita traducir ὑψόω como 'exaltar' en el texto principal para no perder la referencia concreta a la crucifixión/levantamiento.
