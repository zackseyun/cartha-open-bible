translation:
  language: es
  text: 'Nicodemo le dijo[a]: «¿Cómo puede nacer un hombre cuando ya es anciano? ¿Acaso puede entrar por segunda vez en el vientre de su madre y nacer[b]?».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Cómo puede alguien nacer cuando ya es anciano?». El griego dice «un hombre», con forma masculina singular de valor genérico.'
    reason: lexical_alternative
  - marker: b
    text: 'Griego: «por segunda vez». Nicodemo entiende las palabras de Jesús en sentido literal.'
    reason: cross_reference
lexical_decisions:
- source_word: λέγει πρὸς αὐτὸν
  english_pob_choice: said to him
  chosen_spanish: le dijo
  alternatives_spanish:
  - le dijo a él
  - le habló
  lexicon: BDAG
  rationale: El presente histórico griego se conserva naturalmente en pasado narrativo en español. La preposición πρός con dativo se expresa de forma idiomática con «le dijo».
- source_word: Νικόδημος
  english_pob_choice: Nicodemus
  chosen_spanish: Nicodemo
  alternatives_spanish:
  - Nicodemos
  lexicon: Convención onomástica cristiana
  rationale: Nombre propio transliterado según el uso estándar en español bíblico.
- source_word: Πῶς δύναται
  english_pob_choice: How can
  chosen_spanish: ¿Cómo puede
  alternatives_spanish:
  - ¿Cómo es posible que...
  - ¿Cómo puede ser...
  lexicon: BDAG
  rationale: La pregunta de posibilidad se expresa de manera directa y natural con «¿Cómo puede...?».
- source_word: ἄνθρωπος
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: BDAG
  rationale: El griego usa ἄνθρωπος en singular con fuerza genérica. Se mantiene «un hombre» para conservar ese valor masculino genérico que la POB inglesa documenta, sin neutralizarlo.
- source_word: γεννηθῆναι
  english_pob_choice: be born
  chosen_spanish: nacer
  alternatives_spanish:
  - ser nacido
  - volver a nacer
  lexicon: BDAG
  rationale: En este contexto el infinitivo pasivo de γεννάω remite al acto de nacer. «Nacer» es la forma más natural en español y no introduce la lectura interpretativa de «volver a nacer».
- source_word: γέρων ὤν
  english_pob_choice: when he is old
  chosen_spanish: cuando ya es anciano
  alternatives_spanish:
  - siendo anciano
  - cuando está viejo
  lexicon: BDAG
  rationale: La construcción participial temporal se vierte idiomáticamente. «Anciano» comunica con dignidad el sentido de γέρων; «ya» refuerza el estado alcanzado en el contexto de la pregunta.
- source_word: μὴ δύναται
  english_pob_choice: He cannot ... can he?
  chosen_spanish: ¿Acaso puede...?
  alternatives_spanish:
  - ¿No puede...?
  - ¿Podrá...?
  lexicon: BDAG
  rationale: La partícula μή en esta pregunta expresa incredulidad con expectativa negativa. En español, una interrogativa retórica con «¿Acaso puede...?» preserva bien ese matiz sin añadir una tag question artificial.
- source_word: εἰς τὴν κοιλίαν τῆς μητρὸς αὐτοῦ
  english_pob_choice: enter his mother’s womb
  chosen_spanish: entrar por segunda vez en el vientre de su madre
  alternatives_spanish:
  - entrar en el vientre de su madre
  - meterse en el vientre de su madre
  lexicon: BDAG
  rationale: κοιλία con «madre» se entiende como el vientre materno; en español «vientre» resulta más natural y claro que «vientre de su madre» reproduce con fidelidad la relación posesiva. Se evita «útero» por ser demasiado técnico para este registro.
- source_word: δεύτερον
  english_pob_choice: a second time
  chosen_spanish: por segunda vez
  alternatives_spanish:
  - una segunda vez
  - de nuevo
  lexicon: BDAG
  rationale: δεύτερον significa literalmente «segunda vez». «Por segunda vez» preserva el valor explícito y la comprensión literal de Nicodemo.
- source_word: εἰσελθεῖν καὶ γεννηθῆναι
  english_pob_choice: enter ... and be born
  chosen_spanish: entrar ... y nacer
  alternatives_spanish:
  - entrar ... y ser nacido
  - entrar ... y volver a nacer
  lexicon: BDAG
  rationale: 'Se conservan los dos infinitivos con paralelismo claro en español: primero «entrar», luego «nacer».'
theological_decisions:
- issue: Tratamiento del masculino genérico ἄνθρωπος
  english_pob_reading: a man
  chosen_spanish_reading: un hombre
  alternative_spanish_readings:
  - una persona
  - alguien
  rationale: La POB inglesa documenta el singular masculino genérico del griego y opta por conservarlo. En español, «un hombre» mantiene ese valor representativo sin convertirlo en neutro.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Relación entre γεννηθῆναι aquí y la idea de «nacer de nuevo» del contexto anterior
  english_pob_reading: be born ... a second time
  chosen_spanish_reading: nacer ... por segunda vez
  alternative_spanish_readings:
  - volver a nacer
  - nacer otra vez
  rationale: Este versículo contiene δεύτερον, no ἄνωθεν. Se evita importar a este miembro la formulación interpretativa «de nuevo»; así se preserva la incomprensión literal de Nicodemo y la tensión narrativa del pasaje.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
translation_notes:
  revision_awareness: El análisis revisado de la POB inglesa no introdujo cambios; el pasaje permaneció sin modificaciones en el último pase de revisión. La presente redacción sigue de cerca ese estado estable y conserva las decisiones lexicográficas documentadas.
  spanish_consistency_notes:
  - Se mantiene «Dios/Yahvé» según corresponda en el proyecto, aunque este versículo no los contiene.
  - Se conserva el estilo narrativo sobrio y publicación-readable de la POB, evitando una paráfrasis explicativa excesiva.
  - «Vientre» se usa en sentido maternal, no anatómico técnico, para corresponder a κοιλία en contexto.
