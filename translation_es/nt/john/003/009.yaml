- from: 'Nicodemo respondió y le dijo[a]: «¿Cómo pueden suceder estas cosas?»'
  to: 'Nicodemo respondió y le dijo[a]: «¿Cómo es posible que sucedan estas cosas?»'
  rationale: Se ajusta la pregunta para reflejar mejor el singular de δύναται sin perder el plural de ταῦτα ni la naturalidad del español. Se conserva «suceder» para γενέσθαι y la nota alternativa con «ser», en línea con el rastro auditado en inglés.
