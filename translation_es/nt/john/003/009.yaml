lexical_decisions:
- source_word: ἀπεκρίθη
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: BDAG
  rationale: El aoristo de ἀποκρίνομαι funciona de manera formularia en narrativa de diálogo. En español, «respondió» mantiene ese valor discursivo con naturalidad y sin añadir matiz innecesario.
- source_word: Νικόδημος
  english_pob_choice: Nicodemus
  chosen_spanish: Nicodemo
  alternatives_spanish:
  - Nicodemo
  lexicon: convención onomástica
  rationale: El nombre propio se translitera al español como «Nicodemo», conforme al uso bíblico estándar y al criterio del proyecto para nombres propios.
- source_word: εἶπεν αὐτῷ
  english_pob_choice: said to him
  chosen_spanish: le dijo
  alternatives_spanish:
  - le dijo
  - dijo a él
  lexicon: BDAG
  rationale: El griego conserva el pronombre indirecto sin nombrar explícitamente a Jesús. «Le dijo» reproduce esa referencia sin importar un nombre que el texto no expresa.
- source_word: Πῶς
  english_pob_choice: How
  chosen_spanish: ¿Cómo
  alternatives_spanish:
  - ¿De qué manera?
  - ¿Cómo?
  lexicon: BDAG
  rationale: «Cómo» es la interrogativa natural en español y preserva la pregunta por modo o posibilidad.
- source_word: δύναται
  english_pob_choice: can
  chosen_spanish: pueden
  alternatives_spanish:
  - puede
  - son posibles
  lexicon: BDAG
  rationale: 'Aunque el verbo es singular, en español la concordancia natural con «estas cosas» pide plural: «pueden». Así se conserva el sentido modal de posibilidad/aptitud del griego.'
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  - tales cosas
  lexicon: BDAG
  rationale: El demostrativo neutro plural apunta a las realidades mencionadas por Jesús y su pluralidad se conserva mejor con «estas cosas».
- source_word: γενέσθαι
  english_pob_choice: happen
  chosen_spanish: suceder
  alternatives_spanish:
  - ser
  - llegar a ser
  - acontecer
  lexicon: BDAG
  rationale: γίνομαι en este contexto puede expresar ocurrencia o llegada a ser. «Suceder» ofrece una equivalencia natural en español sin cerrar indebidamente el alcance del verbo.
theological_decisions:
- issue: Cómo traducir la pregunta de Nicodemo sin resolver su alcance teológico
  english_pob_reading: How can these things happen? / be?
  chosen_spanish_reading: ¿Cómo pueden suceder estas cosas?
  alternative_spanish_readings:
  - ¿Cómo pueden ser estas cosas?
  - ¿Cómo pueden llegar a ser estas cosas?
  rationale: El verso no formula una doctrina explícita, pero sí expresa la perplejidad de Nicodemo ante lo dicho por Jesús. «Suceder» mantiene abierta la pregunta sobre el modo de realización sin reducirla a una afirmación meramente ontológica.
  doctrine_reference: Juan 3:3-9; filosofía de traducción §3, §6
translation_notes:
  revision_awareness: El audio textual disponible muestra alta concordancia y no registra revisiones aplicadas; por eso se mantiene una solución directa y conservadora, con una sola nota alternativa donde el griego permite la oscilación entre «ser» y «suceder».
  spanish_consistency_notes:
  - Se conservó el pronombre indirecto «le» para reflejar αὐτῷ sin explicitar a Jesús.
  - Se eligió «estas cosas» para preservar el plural del neutro griego.
  - Se evitó «Cristo» o «Señor» porque el versículo no los contiene.
  - La pregunta se formuló con signo de apertura español y comillas angulares para estilo bíblico publicable.
