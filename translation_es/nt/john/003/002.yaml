  text: οὗτος ἦλθεν πρὸς αὐτὸν νυκτὸς καὶ εἶπεν αὐτῷ· Ῥαββί, οἴδαμεν ὅτι ἀπὸ θεοῦ ἐλήλυθας διδάσκαλος· οὐδεὶς γὰρ ⸂δύναται ταῦτα τὰ σημεῖα⸃ ποιεῖν ἃ σὺ ποιεῖς, ἐὰν μὴ ᾖ ὁ θεὸς μετ’ αὐτοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/john/003/002.yaml
  text: This man came to him by night and said to him[a], “Rabbi, we know that you have come from God as a teacher[c][b], for no one is able to do these signs that you do unless God is with him.”
  footnotes:
  - marker: a
    text: Or “at night.” The phrase may also carry thematic resonance in John, where night/darkness can have symbolic force.
    reason: lexical_alternative
  - marker: b
    text: Or “these miraculous signs.” Greek σημεῖα is rendered “signs” in John to preserve their function as acts that point beyond themselves.
    reason: lexical_alternative
  - marker: c
    text: 'Greek: “unless God is with him,” retaining the third-person wording of Nicodemus’s statement.'
    reason: lexical_alternative
