translation:
  language: es
  text: 'Este hombre vino a él de noche y le dijo[a]: «Rabí, sabemos que has venido de Dios como maestro[c][b], porque nadie puede hacer estas señales que tú haces, si Dios no está con él».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por la noche». La expresión puede también tener resonancia temática en Juan, donde la noche/oscuridad suele tener fuerza simbólica.
    reason: lexical_alternative
  - marker: b
    text: O «estas señales milagrosas». El griego σημεῖα se traduce aquí como «señales» para preservar su función de actos que remiten a algo más allá de sí mismos.
    reason: lexical_alternative
  - marker: c
    text: 'Griego: «si Dios no está con él», conservando la tercera persona de la declaración de Nicodemo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὗτος
  english_pob_choice: This man
  chosen_spanish: Este hombre
  alternatives_spanish:
  - Él
  - Este
  lexicon: BDAG
  rationale: El demostrativo griego señala de nuevo a Nicodemo. «Este hombre» conserva esa fuerza demostrativa sin volver el español forzado; «él» perdería el matiz, y «este» sería menos claro en lectura aislada.
- source_word: ἦλθεν πρὸς αὐτὸν
  english_pob_choice: came to him
  chosen_spanish: vino a él
  alternatives_spanish:
  - fue a él
  - se acercó a él
  lexicon: BDAG
  rationale: «Vino a él» reproduce con naturalidad el movimiento narrativo de πρὸς αὐτόν. «Fue a él» es posible, pero menos idiomático en este contexto; «se acercó» añade un matiz no explícito.
- source_word: νυκτός
  english_pob_choice: by night
  chosen_spanish: de noche
  alternatives_spanish:
  - por la noche
  - en la noche
  lexicon: BDAG
  rationale: La genitiva temporal se expresa de forma natural como «de noche». Mantiene la referencia temporal y deja abierto el posible eco temático joánico de noche/oscuridad sin sobrecargar el texto.
- source_word: Ῥαββί
  english_pob_choice: Rabbi
  chosen_spanish: Rabí
  alternatives_spanish:
  - Rabbi
  - Maestro
  lexicon: BDAG
  rationale: Se conserva el préstamo semítico, adaptado a la forma usual en español bíblico «Rabí». Traducirlo como «Maestro» borraría el tono histórico y la forma de tratamiento del texto griego.
- source_word: οἴδαμεν
  english_pob_choice: we know
  chosen_spanish: sabemos
  alternatives_spanish:
  - yo sé
  - conocemos
  lexicon: BDAG
  rationale: Se mantiene la primera persona plural. «Sabemos» preserva el posible plural representativo del hablante y no individualiza indebidamente la afirmación.
- source_word: ἀπὸ θεοῦ ἐλήλυθας
  english_pob_choice: you have come from God
  chosen_spanish: has venido de parte de Dios
  alternatives_spanish:
  - has venido de Dios
  - vienes de Dios
  lexicon: BDAG
  rationale: «De parte de Dios» expresa bien el origen/fuente con un español natural y evita importar explícitamente la idea de envío, que el verbo griego no dice aquí. «Has venido de Dios» sería más literal, pero menos idiomático; «vienes» debilita el aspecto perfecto.
- source_word: διδάσκαλος
  english_pob_choice: as a teacher
  chosen_spanish: como maestro
  alternatives_spanish:
  - como un maestro
  - de maestro
  lexicon: BDAG
  rationale: El predicativo se vierte naturalmente con «como maestro», que expresa función/rol sin añadir artículo innecesario. «Maestro» solo podría sonar menos completo en español, y «de maestro» sería artificial.
- source_word: οὐδεὶς γὰρ δύναται
  english_pob_choice: for no one is able
  chosen_spanish: porque nadie puede
  alternatives_spanish:
  - porque nadie es capaz
  - pues nadie puede
  lexicon: BDAG
  rationale: «Nadie puede» conserva el sentido de δύναται con fluidez. No se pierde el valor de capacidad/posibilidad, y en español suena más natural que «nadie es capaz».
- source_word: ταῦτα τὰ σημεῖα
  english_pob_choice: these signs
  chosen_spanish: estas señales
  alternatives_spanish:
  - estos signos
  - estos milagros
  lexicon: BDAG
  rationale: Se opta por «señales» para mantener el término joánico σημεῖα como actos significativos que apuntan a algo más allá de sí mismos. «Milagros» explicita lo prodigioso pero reduce la carga semántica; «signos» es correcto, pero «señales» resulta más natural en español bíblico contemporáneo.
- source_word: ποιεῖν ἃ σὺ ποιεῖς
  english_pob_choice: to do these signs that you do
  chosen_spanish: hacer estas señales que tú haces
  alternatives_spanish:
  - realizar estas señales que tú realizas
  - hacer estas señales que haces
  lexicon: BDAG
  rationale: Se preserva la repetición de ποιέω con «hacer». Esto mantiene la textura retórica del griego. Se explicita «tú» para reflejar el cambio de persona y evitar ambigüedad en español.
- source_word: ἐὰν μὴ ᾖ ὁ θεὸς μετ’ αὐτοῦ
  english_pob_choice: unless God is with him
  chosen_spanish: si Dios no está con él
  alternatives_spanish:
  - a menos que Dios esté con él
  - si no está Dios con él
  lexicon: BDAG
  rationale: La cláusula condicional se vierte de forma natural en español. Se conserva la tercera persona «él», como en el griego, para no suavizar la forma indirecta del discurso de Nicodemo.
theological_decisions:
- issue: Cómo renderizar σημεῖα en Juan sin perder su peso teológico
  english_pob_reading: signs
  chosen_spanish_reading: señales
  alternative_spanish_readings:
  - signos
  - milagros
  rationale: En Juan, σημεῖα no son solo prodigios, sino actos que señalan la identidad y la misión de Jesús. «Señales» conserva ese carácter referencial sin reducirlo a «milagros» ni volverlo demasiado técnico con «signos».
  doctrine_reference: Juan 2:11; filosofía de traducción §1, §5
- issue: Si conviene normalizar el cambio de segunda a tercera persona en la última cláusula
  english_pob_reading: retain 'unless God is with him'
  chosen_spanish_reading: si Dios no está con él
  alternative_spanish_readings:
  - si Dios no está contigo
  - a menos que Dios esté contigo
  rationale: Se mantiene la tercera persona del griego para no borrar la textura del discurso. Pasarlo a segunda persona armonizaría demasiado la frase, pero ya no reflejaría el texto fuente.
  doctrine_reference: Fidelidad al texto fuente; filosofía de traducción §1, §3
- issue: Si ἀπὸ θεοῦ ἐλήλυθας debe explicitar comisión o envío
  english_pob_reading: you have come from God
  chosen_spanish_reading: has venido de parte de Dios
  alternative_spanish_readings:
  - has sido enviado por Dios
  - has venido de Dios
  rationale: El griego dice origen o procedencia desde Dios, no usa el verbo «enviar». «De parte de Dios» comunica procedencia con suficiente claridad sin añadir una noción doctrinal más fuerte que la del texto.
  doctrine_reference: Juan 3:2; afirmaciones cristológicas; filosofía de traducción §1, §3
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacían falta cambios adicionales; se mantuvo la lectura ya acordada con alta concordancia entre revisiones y control cruzado.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός, sin máscara litúrgica.
  - Se conserva «Rabí» como vocativo semítico en lugar de sustituirlo por «Maestro».
  - Se usa «señales» para σημεῖα, consistente con el tratamiento joánico del término.
  - Se conserva la tercera persona en la cláusula final para respetar la textura del griego.
  - «De parte de Dios» se eligió por claridad natural en español sin añadir la idea de envío explícito.
