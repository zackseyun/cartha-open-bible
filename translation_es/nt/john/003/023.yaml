revisions:
- from: Ahora Juan también estaba bautizando en Ainón, cerca de Salim[a], porque allí había muchas aguas[b], y la gente venía y era bautizada.
  to: Ahora Juan también estaba bautizando en Ainón, cerca de Salim, porque allí había muchas aguas[a], y venían y eran bautizados.
  rationale: Se elimina la nota innecesaria sobre el nombre propio y se corrige la cláusula final para reflejar con más fidelidad y naturalidad los imperfectos plurales del griego. Se conserva 'muchas aguas' con nota, porque esa decisión está documentada en el rastro inglés y sigue siendo comprensible en español.
