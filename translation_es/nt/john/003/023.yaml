translation:
  language: es
  text: Ahora Juan también estaba bautizando en Ainón, cerca de Salim, porque allí había muchas aguas[a], y venían y eran bautizados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. 'porque muchas aguas estaban allí'. El griego conserva el plural 'aguas'; la traducción mantiene ese rasgo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦν δὲ καὶ
  english_pob_choice: Now ... also was
  chosen_spanish: Ahora ... también estaba
  alternatives_spanish:
  - Y ... también estaba
  - Ahora ... igualmente estaba
  lexicon: BDAG
  rationale: δέ introduce un giro discursivo leve, mejor expresado en español con 'Ahora'; καί añade que Juan, además de la actividad contextual previa, también estaba bautizando. El imperfecto perifrástico se reproduce con 'estaba' para conservar la acción continua en pasado.
- source_word: ὁ Ἰωάννης
  english_pob_choice: John
  chosen_spanish: Juan
  alternatives_spanish:
  - Juan el Bautista
  lexicon: BDAG
  rationale: El artículo con el nombre propio no se refleja en español. Se conserva solo el nombre 'Juan', sin añadir el identificador 'el Bautista', que no está en el griego de este versículo.
- source_word: βαπτίζων
  english_pob_choice: was baptizing
  chosen_spanish: estaba bautizando
  alternatives_spanish:
  - estaba inmersando
  - estaba sumergiendo
  lexicon: BDAG
  rationale: El participio presente con ἦν forma una acción continua en pasado. Se mantiene el verbo establecido 'bautizar' en lugar de sustituirlo por una paráfrasis de modo no exigida por el texto.
- source_word: ἐν Αἰνὼν
  english_pob_choice: at Aenon
  chosen_spanish: en Ainón
  alternatives_spanish:
  - en Aenón
  - en Ainon
  lexicon: BDAG
  rationale: El nombre del lugar se translitera de manera coherente al español. 'En' comunica ubicación de forma natural en español, mientras el nombre propio se conserva sin traducción.
- source_word: ἐγγὺς τοῦ Σαλείμ
  english_pob_choice: near Salim
  chosen_spanish: cerca de Salim
  alternatives_spanish:
  - junto a Salim
  - próximo a Salim
  lexicon: BDAG
  rationale: ἐγγύς con genitivo expresa proximidad; 'cerca de' es la opción más natural y precisa en español.
- source_word: ὅτι ὕδατα πολλὰ ἦν ἐκεῖ
  english_pob_choice: because there were many waters there
  chosen_spanish: porque allí había muchas aguas
  alternatives_spanish:
  - porque allí había mucho agua
  - porque allí había abundancia de agua
  lexicon: BDAG
  rationale: Se conserva el plural griego ὕδατα con 'muchas aguas', como en la revisión inglesa más cercana al original. En español suena algo más marcado que 'mucho agua', pero refleja mejor la forma plural del texto fuente.
- source_word: παρεγίνοντο
  english_pob_choice: were coming
  chosen_spanish: venían
  alternatives_spanish:
  - seguían llegando
  - iban llegando
  lexicon: BDAG
  rationale: El imperfecto medio indica llegada continuada o repetida. 'Venían' es breve y natural en español, sin perder la idea de movimiento reiterado hacia el lugar.
- source_word: ἐβαπτίζοντο
  english_pob_choice: were being baptized
  chosen_spanish: era bautizada
  alternatives_spanish:
  - eran bautizados
  - se bautizaban
  lexicon: BDAG
  rationale: El pasivo imperfecto se conserva con 'era bautizada' para mantener la voz pasiva del griego. Aunque el plural colectivo 'la gente' puede hacer oscilar la concordancia, la lectura de conjunto queda clara en español y no introduce una voz media que el texto no exige.
theological_decisions:
- issue: Renderizado de βαπτίζω sin imponer una decisión sobre el modo
  english_pob_reading: baptizing / being baptized
  chosen_spanish_reading: bautizando / era bautizada
  alternative_spanish_readings:
  - inmersando / era sumergida
  - sumergiendo / era sumergida
  rationale: El verbo βαπτίζω puede aludir a inmersión, pero en el uso del Nuevo Testamento funciona también como término religioso establecido. Se conserva 'bautizar' para no convertir la traducción en una toma de postura denominacional sobre el modo.
  doctrine_reference: 'Translation philosophy: no promover un distintivo denominacional cuando el griego no lo exige de forma inequívoca.'
- issue: Pluralidad de ὕδατα πολλὰ
  english_pob_reading: many waters
  chosen_spanish_reading: muchas aguas
  alternative_spanish_readings:
  - mucho agua
  - abundancia de agua
  rationale: El griego usa un plural literal; se conserva en español para no borrar el rasgo formal del original. Al mismo tiempo, la expresión sigue siendo inteligible y no requiere reinterpretar el pasaje.
  doctrine_reference: Fidelity to source form where it does not produce obscurity in target language.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que prefirió 'there were many waters there' para reflejar más de cerca el plural ὕδατα πολλὰ. Por eso el español retiene 'muchas aguas' en el texto principal y explica la alternativa idiomática en nota.
  spanish_consistency_notes:
  - Se mantiene 'bautizar' como término estable del POB, sin sustituirlo por 'sumergir' en el texto principal.
  - 'Los nombres propios se transliteran de forma consistente: ''Juan'', ''Ainón'', ''Salim''.'
  - La concordancia verbal en la clausula final sigue la construcción colectiva 'la gente' implícita en el contexto, sin forzar una reescritura interpretativa.
  - Se usa puntuación española estándar y un estilo moderno, sobrio y publicable.
