translation:
  language: es
  text: Entonces surgió una disputa entre los discípulos de Juan y un judío[a] acerca de la purificación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «acerca de la limpieza» o «acerca de la purificación ceremonial». El término griego puede referirse de manera general a una limpieza y, en este contexto, probablemente lleva matiz ritual.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐγένετο
  english_pob_choice: arose
  chosen_spanish: surgió
  alternatives_spanish:
  - apareció
  - se originó
  - se produjo
  lexicon: BDAG
  rationale: γίνομαι introduce la aparición de un hecho; «surgió» expresa en español el comienzo de la disputa de forma natural y mantiene el sentido de evento que llega a existir.
- source_word: οὖν
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - por tanto
  - así que
  - pues
  lexicon: BDAG
  rationale: La partícula marca progresión narrativa. «Entonces» conserva la transición sin cargar una inferencia demasiado fuerte.
- source_word: ζήτησις
  english_pob_choice: dispute
  chosen_spanish: disputa
  alternatives_spanish:
  - discusión
  - debate
  - controversia
  lexicon: BDAG
  rationale: El contexto muestra tensión real entre los grupos; «disputa» reproduce mejor esa fuerza que una palabra más débil como «discusión».
- source_word: ἐκ τῶν μαθητῶν Ἰωάννου
  english_pob_choice: between John's disciples
  chosen_spanish: entre los discípulos de Juan
  alternatives_spanish:
  - de entre los discípulos de Juan
  - por parte de los discípulos de Juan
  lexicon: BDAG
  rationale: 'Aunque el griego dice literalmente «de entre los discípulos de Juan», el valor contextual con ζήτησις y la frase siguiente exige una formulación relacional natural en español: la disputa fue entre dos partes, una de ellas los discípulos de Juan.'
- source_word: μετὰ Ἰουδαίου
  english_pob_choice: and a Jew
  chosen_spanish: y un judío
  alternatives_spanish:
  - con un judío
  - y un hombre judío
  lexicon: BDAG
  rationale: μετά con genitivo significa «con», pero tras «entre» en español el enlace natural es «y». Se mantiene el singular para reflejar que se trata de un interlocutor individual.
- source_word: περὶ καθαρισμοῦ
  english_pob_choice: about purification
  chosen_spanish: acerca de la purificación
  alternatives_spanish:
  - sobre el lavado ritual
  - acerca de la limpieza
  - sobre la purificación ceremonial
  lexicon: BDAG
  rationale: καθαρισμός puede referirse a limpieza o purificación, y en este contexto probablemente tiene matiz ritual. «Purificación» preserva esa amplitud sin sobreespecificar más que el griego.
theological_decisions:
- issue: Si καθαρισμός debe explicitarse como rito religioso en el texto principal
  english_pob_reading: purification
  chosen_spanish_reading: la purificación
  alternative_spanish_readings:
  - la limpieza
  - la purificación ceremonial
  rationale: El contexto joánico sugiere prácticas judías de limpieza ritual, pero el verso no define el alcance exacto de la controversia. El texto principal mantiene la forma general «purificación»; la posible carga ritual queda abierta sin añadir una glosa interpretativa obligatoria.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El pasaje muestra alto grado de acuerdo con el texto base y no presenta revisiones aplicadas en el audit trail. La formulación española sigue la lectura aprobada sin introducir cambios textuales adicionales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiera; aquí no aparece.
  - «Jesús», «Dios» y otras terminologías doctrinales estándar no intervienen en este versículo.
  - Se usa «purificación» como equivalente principal de καθαρισμός, preservando la ambigüedad entre limpieza general y sentido ritual.
  - La puntuación y el orden siguen el flujo narrativo natural del español, sin alterar el contenido semántico del griego.
