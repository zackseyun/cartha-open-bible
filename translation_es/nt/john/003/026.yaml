  text: καὶ ἦλθον πρὸς τὸν Ἰωάννην καὶ εἶπαν αὐτῷ· Ῥαββί, ὃς ἦν μετὰ σοῦ πέραν τοῦ Ἰορδάνου, ᾧ σὺ μεμαρτύρηκας, ἴδε οὗτος βαπτίζει καὶ πάντες ἔρχονται πρὸς αὐτόν.
base_translation:
  language: en
  yaml_path: translation/nt/john/003/026.yaml
  text: And they came to John and said to him[a], “Rabbi, the one who was with you beyond the Jordan, to whom you have borne witness—look, he is baptizing[b], and everyone is going to him.”
  footnotes:
  - marker: a
    text: Or “about whom you testified.” The Greek dative construction can be rendered either way in English.
    reason: lexical_alternative
  - marker: b
    text: Or “he is baptizing.” Greek οὗτος more explicitly says “this one,” which may convey the speakers’ pointed emphasis.
    reason: lexical_alternative
