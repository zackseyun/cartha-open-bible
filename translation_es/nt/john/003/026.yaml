translation:
  language: es
  text: 'Y vinieron a Juan y le dijeron: «Rabí, el que estaba contigo al otro lado del Jordán, de quien tú has dado testimonio, mira, él[a] está bautizando, y todos van a él».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «este está bautizando» o «este bautiza». El griego οὗτος expresa más explícitamente «este», lo que puede añadir un matiz señalador o enfático en la queja de los hablantes.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦλθον πρὸς τὸν Ἰωάννην
  english_pob_choice: they came to John
  chosen_spanish: vinieron a Juan
  alternatives_spanish:
  - fueron a Juan
  - llegaron a Juan
  lexicon: BDAG
  rationale: ἔρχομαι admite 'venir/ir' según el punto de vista. En español, 'vinieron a Juan' conserva bien el movimiento hacia él y suena natural en narración.
- source_word: εἶπαν αὐτῷ
  english_pob_choice: said to him
  chosen_spanish: le dijeron
  alternatives_spanish:
  - le hablaron
  - le dijeron a él
  lexicon: BDAG
  rationale: La construcción de habla directa se expresa de forma normal y sobria con 'le dijeron', sin añadir matices ajenos al griego.
- source_word: Ῥαββί
  english_pob_choice: Rabbi
  chosen_spanish: Rabí
  alternatives_spanish:
  - Rabbi
  - Maestro
  lexicon: BDAG
  rationale: Se mantiene el vocativo semítico como término transliterado adaptado al español. 'Rabí' es claro, tradicional y preserva el entorno judío del relato mejor que 'Maestro'.
- source_word: ὃς ἦν μετὰ σοῦ πέραν τοῦ Ἰορδάνου
  english_pob_choice: the one who was with you beyond the Jordan
  chosen_spanish: el que estaba contigo al otro lado del Jordán
  alternatives_spanish:
  - el que estaba contigo más allá del Jordán
  - el que estaba contigo del otro lado del Jordán
  lexicon: BDAG
  rationale: '''ὃς'' se vierte con una relativa natural (''el que''). ''πέραν τοῦ Ἰορδάνου'' se traduce idiomáticamente como ''al otro lado del Jordán'', manteniendo la referencia geográfica sin sobreparáfrasis.'
- source_word: ᾧ σὺ μεμαρτύρηκας
  english_pob_choice: to whom you have borne witness
  chosen_spanish: a quien tú has dado testimonio
  alternatives_spanish:
  - de quien tú has testificado
  - sobre quien tú has dado testimonio
  lexicon: BDAG
  rationale: El valor de μαρτυρέω en Juan es el de testificar/dar testimonio. En español, 'dar testimonio' conserva ese peso semántico y resulta más natural que una calca como 'has testificado'.
- source_word: ἴδε
  english_pob_choice: look
  chosen_spanish: mira
  alternatives_spanish:
  - mira allí
  - ve
  lexicon: BDAG
  rationale: Como interjección de atención, 'mira' reproduce bien la fuerza inmediata y evita el tono arcaizante de 'he aquí' o 'mirad'.
- source_word: οὗτος
  english_pob_choice: he / this one
  chosen_spanish: este
  alternatives_spanish:
  - éste
  - él
  - este hombre
  lexicon: BDAG
  rationale: El demostrativo puede sonar marcado o señalador. En español, 'este' conserva la deixis y permite un tono natural en la acusación implícita del contexto.
- source_word: βαπτίζει
  english_pob_choice: he is baptizing
  chosen_spanish: bautiza
  alternatives_spanish:
  - está bautizando
  - está bautizando él
  lexicon: BDAG
  rationale: El presente simple español puede expresar acción en curso sin perder naturalidad. 'Bautiza' mantiene la sobriedad del relato y evita una progresividad demasiado explícita si no es necesaria.
- source_word: πάντες
  english_pob_choice: everyone
  chosen_spanish: todos
  alternatives_spanish:
  - todo el mundo
  - todos ellos
  lexicon: BDAG
  rationale: '''πάντες'' aquí funciona como generalización retórica. ''Todos'' reproduce esa amplitud de manera directa y fluida en español.'
- source_word: ἔρχονται πρὸς αὐτόν
  english_pob_choice: are going to him
  chosen_spanish: van a él
  alternatives_spanish:
  - vienen a él
  - se están yendo a él
  lexicon: BDAG
  rationale: Con 'todos' como sujeto colectivo, 'van a él' suena natural en español y conserva la idea de desplazamiento hacia Jesús desde la perspectiva de quienes hablan.
theological_decisions:
- issue: Lenguaje de testimonio en Juan
  english_pob_reading: borne witness
  chosen_spanish_reading: has dado testimonio
  alternative_spanish_readings:
  - has testificado
  - has sido testigo
  rationale: El verbo μαρτυρέω en Juan tiene carga teológica de testimonio. 'Dar testimonio' conserva ese campo semántico en español y evita debilitar el motivo joánico del testigo.
  doctrine_reference: Consistencia de términos clave en la traducción del cuarto evangelio
translation_notes:
  revision_awareness: La redacción sigue la lectura revisada del POB en inglés que prefirió 'he is baptizing' frente a 'this one is baptizing'. En español se optó por una solución natural equivalente ('este bautiza') que conserva el énfasis demostrativo de οὗτος sin sonar forzada, y se mantuvo el valor testimonial de μεμαρτύρηκας con 'has dado testimonio'.
  spanish_consistency_notes:
  - Se usa 'Rabí' para el título judío, en lugar de 'Maestro', para preservar la marca cultural del texto.
  - Se traduce el lugar geográfico como 'al otro lado del Jordán', fórmula natural en español y fiel a πέραν.
  - No se emplea 'Cristo' ni 'SEÑOR' porque no aparecen en este versículo ni son necesarios por contexto.
  - Se conserva el presente 'bautiza' como traducción sobria del presente griego, sin introducir una progresividad obligatoria.
