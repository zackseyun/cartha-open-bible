translation:
  language: es
  text: Porque el que Dios envió habla las palabras de Dios[a], pues da el Espíritu sin medida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «pues da el Espíritu sin medida», con el sujeto de «da» entendido como el que Dios envió.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὃν
  english_pob_choice: the one whom
  chosen_spanish: el que
  alternatives_spanish:
  - aquel a quien
  - el que fue enviado
  lexicon: BDAG
  rationale: El relativo sustantivado en acusativo se refiere a la persona enviada por Dios. En español, «el que» expresa de manera natural esa función y mantiene el valor referencial sin forzar una construcción más pesada.
- source_word: ἀπέστειλεν
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - ha enviado
  - comisionó
  lexicon: BDAG
  rationale: El aoristo se vierte con pasado simple en un contexto de envío joánico. «Envió» es directo y conserva el lenguaje bíblico de misión sin introducir matices innecesarios.
- source_word: τὰ ῥήματα τοῦ θεοῦ
  english_pob_choice: the words of God
  chosen_spanish: las palabras de Dios
  alternatives_spanish:
  - los dichos de Dios
  - las palabras que son de Dios
  lexicon: BDAG
  rationale: ῥήματα es plural y remite a palabras/expresiones habladas. «Las palabras de Dios» preserva la pluralidad y la relación genitiva de forma clara en español.
- source_word: λαλεῖ
  english_pob_choice: speaks
  chosen_spanish: habla
  alternatives_spanish:
  - dice
  - pronuncia
  lexicon: BDAG
  rationale: λαλέω suele significar «hablar». «Habla» conserva el aspecto verbal continuo y resulta más natural que «dice» en esta construcción.
- source_word: ἐκ μέτρου
  english_pob_choice: without measure
  chosen_spanish: sin medida
  alternatives_spanish:
  - sin límite
  - no en medida limitada
  lexicon: BDAG
  rationale: La expresión con negación comunica ausencia de medida o limitación. «Sin medida» reproduce bien el giro idiomático en español y evita una paráfrasis excesiva.
- source_word: δίδωσιν
  english_pob_choice: gives
  chosen_spanish: da
  alternatives_spanish:
  - concede
  - otorga
  lexicon: BDAG
  rationale: El presente gnómico se traduce con presente simple. «Da» es el equivalente más directo y mantiene la sencillez del griego.
- source_word: τὸ πνεῦμα
  english_pob_choice: the Spirit
  chosen_spanish: el Espíritu
  alternatives_spanish:
  - el espíritu
  lexicon: BDAG
  rationale: En el contexto joánico, πνεῦμα se refiere más naturalmente al Espíritu Santo. La mayúscula en español señala ese referente, como en el texto inglés auditado.
theological_decisions:
- issue: Sujeto implícito de δίδωσιν
  english_pob_reading: 'The implied subject is God: ''for he gives the Spirit without measure.'''
  chosen_spanish_reading: 'Se mantiene la ambigüedad: «no da el Espíritu sin medida», dejando que «da» pueda referirse a Dios o al enviado según el contexto.'
  alternative_spanish_readings:
  - porque él da el Espíritu sin medida
  - pues Dios da el Espíritu sin medida
  - pues el enviado da el Espíritu sin medida
  rationale: El griego no expresa de manera explícita el sujeto de δίδωσιν. En español, introducir «Dios» o «él» resolvería la tensión demasiado pronto. La redacción conserva la ambigüedad documentada por el POB en inglés y permite que el flujo contextual determine la referencia.
  doctrine_reference: Preservar la tensión teológica sin resolverla dogmáticamente.
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia entre el griego y el borrador inglés. La revisión más importante es mantener en español la ambigüedad del sujeto de «da», tal como el audit trail inglés la preserva en nota, sin añadir un sujeto explícito en el texto principal.
  spanish_consistency_notes:
  - Se usa «Dios» para θεός y «Espíritu» para τὸ πνεῦμα, coherente con el contexto joánico.
  - Se conserva «sin medida» como equivalente idiomático de ἐκ μέτρου con negación.
  - No se introduce «Cristo» ni terminología eclesial adicional, porque el verso no lo exige.
  - «Envió» mantiene el lenguaje de misión característico de Juan sin hacer paráfrasis.
