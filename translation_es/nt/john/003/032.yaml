  glossary_alignment: No hay conflicto con la terminología base del proyecto. «testimonio» es adecuado para μαρτυρίαν y conviene mantener coherencia léxica con el verbo mediante «da testimonio». «recibe» preserva bien λαμβάνει en sentido joánico y no debe cambiarse a «acepta».
