translation:
  language: es
  text: Lo que ha visto y oído, de eso da testimonio[a], y nadie recibe su testimonio[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «testifica»; el verbo griego puede traducirse también como «da testimonio de».
    reason: lexical_alternative
  - marker: b
    text: «Nadie recibe su testimonio» es una generalización fuerte; el versículo siguiente habla de quien sí lo recibe.
    reason: cross_reference
lexical_decisions:
- source_word: ὃ
  english_pob_choice: What
  chosen_spanish: Lo que
  alternatives_spanish:
  - Eso que
  - Aquello que
  lexicon: BDAG
  rationale: El relativo neutro singular apunta al contenido de lo visto y oído, no a una persona. «Lo que» conserva ese valor contenido y suena natural en español.
- source_word: ἑώρακεν
  english_pob_choice: he has seen
  chosen_spanish: ha visto
  alternatives_spanish:
  - vio
  lexicon: BDAG
  rationale: El perfecto griego expresa una acción cumplida con relevancia presente; «ha visto» lo refleja mejor que un pretérito simple.
- source_word: ἤκουσεν
  english_pob_choice: heard
  chosen_spanish: oído
  alternatives_spanish:
  - ha oído
  lexicon: BDAG
  rationale: Se coordina con «ha visto» en una construcción natural en español. Aunque el griego usa aoristo, aquí la coordinación idiomática mantiene bien la secuencia perceptiva sin forzar el estilo.
- source_word: τοῦτο
  english_pob_choice: this
  chosen_spanish: eso
  alternatives_spanish:
  - esto
  - lo mismo
  lexicon: BDAG
  rationale: El demostrativo retoma el contenido inmediatamente mencionado; «eso» funciona bien en una cláusula resumptiva y evita una repetición pesada.
- source_word: μαρτυρεῖ
  english_pob_choice: he testifies to
  chosen_spanish: testifica
  alternatives_spanish:
  - da testimonio de
  - bears witness to
  lexicon: BDAG
  rationale: «Testifica» preserva el verbo de testimonio y el tono forense/juanino. En español el objeto puede quedar implícito en la estructura resumptiva («eso testifica»), de modo que no hace falta añadir una preposición que el griego no exige explícitamente.
- source_word: μαρτυρίαν
  english_pob_choice: testimony
  chosen_spanish: testimonio
  alternatives_spanish:
  - testificación
  - declaración
  lexicon: BDAG
  rationale: «Testimonio» mantiene la familia léxica con «testifica» y conserva la fuerza legal/de testigo del término griego.
- source_word: οὐδεὶς
  english_pob_choice: no one
  chosen_spanish: nadie
  alternatives_spanish:
  - ninguno
  lexicon: BDAG
  rationale: Equivalente idiomático claro y directo para la negación universal.
- source_word: λαμβάνει
  english_pob_choice: receives
  chosen_spanish: recibe
  alternatives_spanish:
  - acepta
  lexicon: BDAG
  rationale: «Recibe» reproduce el valor literal y mantiene abierta la resonancia joánica de recibir un testimonio/revelación; «acepta» sería más interpretativo.
theological_decisions:
- issue: Alcance de la negación universal «nadie recibe su testimonio»
  english_pob_reading: Retain the rhetorical/general statement 'no one receives' without softening it.
  chosen_spanish_reading: 'Mantener la afirmación general y enfática: «nadie recibe su testimonio».'
  alternative_spanish_readings:
  - Muy pocos reciben su testimonio
  - Nadie en sentido absoluto recibe su testimonio
  rationale: El griego presenta una negación universal tajante. En contexto joánico funciona como generalización retórica y no debe suavizarse; la siguiente cláusula y el versículo siguiente muestran que la frase no pretende borrar toda excepción posible. La traducción debe conservar esa tensión.
  doctrine_reference: Preservar la tensión retórica y contextual sin resolverla por paráfrasis.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego y el audit trail inglés, manteniendo el perfecto de «ha visto», el contenido resumido con «lo que/eso», el léxico testimonial (testifica/testimonio) y la negación fuerte sin atenuarla. No se registraron revisiones previas pendientes en el expediente en inglés.
  spanish_consistency_notes:
  - Se emplea «testifica/testimonio» para mantener cohesión léxica en la familia μαρτυρ-.
  - Se evitó «Cristo», «Señor» o formulaciones eclesiásticas no presentes en el versículo.
  - «Nadie» conserva la universalidad de οὐδείς sin agregar matices no sustentados por el texto.
