base_translation:
  language: en
  yaml_path: translation/nt/john/003/031.yaml
  text: The one who comes from above is above all[a]. The one who is from the earth is from the earth and speaks from the earth[b]. The one who comes from heaven is above all.
  footnotes:
  - marker: a
    text: Or 'from heaven' for 'from above' in the first clause; the Greek ἄνωθεν denotes origin from above and is clarified by the later phrase 'from heaven.'
    reason: lexical_alternative
  - marker: b
    text: Or 'speaks of the earth.' The Greek more literally repeats 'from the earth,' which may indicate source, sphere, or subject matter.
    reason: lexical_alternative
