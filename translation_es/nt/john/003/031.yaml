translation:
  language: es
  text: El que viene de arriba está por encima de todos[a]. El que es de la tierra es de la tierra y habla desde la tierra[b]. El que viene del cielo está por encima de todos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘del cielo’ para ‘de arriba’ en la primera cláusula; ἄνωθεν denota origen desde arriba y queda aclarado por la frase posterior ‘del cielo’.
    reason: lexical_alternative
  - marker: b
    text: O ‘habla de la tierra’. El griego repite más literalmente ‘de la tierra’, lo cual puede sugerir fuente, ámbito o tema del habla.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄνωθεν
  english_pob_choice: from above
  chosen_spanish: de arriba
  alternatives_spanish:
  - del cielo
  - de lo alto
  lexicon: BDAG
  rationale: En Juan, ἄνωθεν puede significar ‘de nuevo’ o ‘de arriba’; aquí, con ἐρχόμενος, señala origen, no repetición. ‘De arriba’ conserva el contraste vertical con ‘de la tierra’ y deja visible el paralelo con ‘del cielo’ al final del verso.
- source_word: ἐρχόμενος
  english_pob_choice: who comes
  chosen_spanish: el que viene
  alternatives_spanish:
  - el que llega
  - que viene
  lexicon: BDAG
  rationale: El participio articular funciona como sustantivo. ‘El que viene’ es natural en español y mantiene el valor descriptivo y presente del griego sin forzarlo a una forma más abstracta.
- source_word: ἐπάνω πάντων
  english_pob_choice: above all
  chosen_spanish: por encima de todos
  alternatives_spanish:
  - sobre todos
  - por sobre todos
  lexicon: BDAG
  rationale: La expresión comunica supremacía/exaltación. ‘Por encima de todos’ es idiomática en español y conserva el sentido espacial y jerárquico de la frase.
- source_word: ὁ ὢν ἐκ τῆς γῆς
  english_pob_choice: the one who is from the earth
  chosen_spanish: el que es de la tierra
  alternatives_spanish:
  - el que procede de la tierra
  - el terrenal
  lexicon: BDAG
  rationale: Se mantiene la construcción participial con énfasis en origen/pertenencia. ‘De la tierra’ reproduce el contraste con el origen celestial sin introducir una interpretación más libre como ‘terrenal’.
- source_word: γῆ
  english_pob_choice: earth
  chosen_spanish: tierra
  alternatives_spanish:
  - mundo
  - suelo
  lexicon: BDAG
  rationale: Aquí γῆ contrasta con el cielo, pero en español ‘tierra’ permite conservar el juego de repetición con la frase siguiente y sugiere el origen/sfera terrenal de manera clara.
- source_word: ἐκ τῆς γῆς ἐστιν
  english_pob_choice: is from the earth
  chosen_spanish: es de la tierra
  alternatives_spanish:
  - procede de la tierra
  - es terrenal
  lexicon: BDAG
  rationale: La repetición del griego se conserva en español para no suavizar el énfasis en procedencia y esfera. ‘Es de la tierra’ mantiene la literalidad relativa y la resonancia retórica.
- source_word: ἐκ τῆς γῆς λαλεῖ
  english_pob_choice: speaks from the earth
  chosen_spanish: habla de la tierra
  alternatives_spanish:
  - habla desde la tierra
  - habla como de la tierra
  lexicon: BDAG
  rationale: La POB en inglés deja abierta la posible relación de origen, esfera o contenido del habla. En español, ‘habla de la tierra’ conserva esa apertura mejor que una paráfrasis interpretativa, y reproduce la repetición de ἐκ sin sonar forzado.
- source_word: οὐρανός
  english_pob_choice: heaven
  chosen_spanish: cielo
  alternatives_spanish:
  - cielo
  - cielos
  lexicon: BDAG
  rationale: En este contexto joánico, οὐρανός designa la esfera divina. ‘Cielo’ es el equivalente natural y reverente en español, y permite mantener la correspondencia con ‘de arriba’ sin convertir ambas expresiones en una sola.
theological_decisions:
- issue: Relación entre ‘de arriba’ y ‘del cielo’
  english_pob_reading: The POB renders ἄνωθεν as 'from above' and later ἐκ τοῦ οὐρανοῦ as 'from heaven,' preserving the rhetorical parallel without collapsing the expressions into identical English.
  chosen_spanish_reading: Se traduce ἄνωθεν como ‘de arriba’ y ἐκ τοῦ οὐρανοῦ como ‘del cielo’, manteniendo la distinción retórica y el desarrollo del argumento.
  alternative_spanish_readings:
  - traducir ambas expresiones como ‘del cielo’
  - traducir ambas como ‘de arriba’
  rationale: El griego usa dos expresiones relacionadas pero no idénticas. Mantenerlas distintas en español conserva la progresión del verso y la claridad del contraste entre origen celestial y procedencia terrenal.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Fuerza de la repetición terrenal
  english_pob_reading: Preserve the repetition 'from the earth ... from the earth ... from the earth' rather than smoothing it into a single descriptive phrase.
  chosen_spanish_reading: Se conserva la repetición ‘de la tierra ... de la tierra ... de la tierra’ para no aplanar el contraste retórico.
  alternative_spanish_readings:
  - ‘el terrenal habla de manera terrenal’
  - ‘el que es de la tierra habla como de la tierra’
  rationale: La repetición griega es deliberada y subraya la oposición entre el origen terrenal y el celestial. Mantenerla evita una interpretación más pulida pero menos transparente.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: 'El pasaje coincide con la revisión más reciente indicada como sin cambios; no se requieren ajustes por revisiones posteriores. La redacción española sigue el mismo trazado interpretativo del POB inglés: distinguir ἄνωθεν de ἐκ τοῦ οὐρανοῦ, y conservar la repetición de ἐκ τῆς γῆς.'
  spanish_consistency_notes:
  - Se usa ‘de arriba’ para ἄνωθεν y ‘del cielo’ para οὐρανοῦ, siguiendo la distinción del audit trail.
  - Se emplea ‘la tierra’ de forma repetida para reflejar la insistencia del griego en el origen/esfera terrenal.
  - ‘Habla de la tierra’ conserva la ambigüedad entre fuente, esfera y contenido del habla, sin resolverla de antemano.
  - ‘Por encima de todos’ mantiene la idea de supremacía con un español natural y bíblicamente claro.
