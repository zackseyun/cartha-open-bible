translation:
  language: es
  text: Y sé que su mandamiento es vida eterna[a]. Por lo tanto, lo que hablo, lo hablo tal como el Padre me ha dicho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su mandamiento conduce a la vida eterna» o «su mandamiento concierne a la vida eterna». El griego dice más literalmente: «su mandamiento es vida eterna».'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐντολή
  english_pob_choice: commandment
  chosen_spanish: mandamiento
  alternatives_spanish:
  - mandato
  - comando
  - instrucción
  lexicon: BDAG
  rationale: «Mandamiento» conserva el valor de una orden o precepto autorizado y corresponde de manera más estrecha al matiz formal de ἐντολή en el registro teológico de Juan. «Mandato» sería posible, pero en español suele sonar menos natural en este contexto; «instrucción» debilita la fuerza normativa.
- source_word: ζωὴ αἰώνιος
  english_pob_choice: eternal life
  chosen_spanish: vida eterna
  alternatives_spanish:
  - vida duradera
  - vida perpetua
  lexicon: BDAG
  rationale: «Vida eterna» es la expresión joánica estable y comunica tanto duración como la cualidad de la vida perteneciente al siglo venidero. Se evita una paráfrasis explicativa para conservar la fuerza teológica de la cláusula equativa.
- source_word: ἃ
  english_pob_choice: what
  chosen_spanish: lo que
  alternatives_spanish:
  - las cosas que
  - todo lo que
  lexicon: BDAG
  rationale: El relativo neutro plural se vierte naturalmente como «lo que» en español, manteniendo el objeto del hablar de Jesús sin forzar un plural poco idiomático.
- source_word: λαλέω
  english_pob_choice: I speak
  chosen_spanish: hablo
  alternatives_spanish:
  - digo
  - pronuncio
  lexicon: BDAG
  rationale: «Hablo» preserva la repetición verbal del griego y sugiere el acto de hablar en general, no solo el contenido dicho. «Digo» sería posible, pero reduciría la consistencia léxica entre las dos ocurrencias de λαλέω.
- source_word: καθώς
  english_pob_choice: just as
  chosen_spanish: tal como
  alternatives_spanish:
  - así como
  - como
  lexicon: BDAG
  rationale: «Tal como» marca correspondencia directa entre lo que el Padre le ha dicho a Jesús y lo que Jesús habla, con un español natural y preciso.
- source_word: εἴρηκέν μοι
  english_pob_choice: has told me
  chosen_spanish: me lo ha dicho
  alternatives_spanish:
  - me ha dicho
  - me lo ha hablado
  lexicon: BDAG
  rationale: El perfecto transmite una palabra ya pronunciada con vigencia presente. «Me lo ha dicho» conserva ese valor y hace explícito el objeto implícito de la comunicación sin agregar contenido ajeno al texto.
- source_word: πατήρ
  english_pob_choice: the Father
  chosen_spanish: el Padre
  alternatives_spanish:
  - mi Padre
  lexicon: BDAG
  rationale: El griego usa el sustantivo articular «el Padre», no «mi Padre». Se mantiene la forma relacional joánica sin introducir un posesivo que el texto no da.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - por tanto
  - entonces
  lexicon: BDAG
  rationale: «Así que» expresa la inferencia de modo natural en español y conserva la conexión lógica con lo anterior sin sonar excesivamente formal.
- source_word: οἶδα
  english_pob_choice: I know
  chosen_spanish: sé
  alternatives_spanish:
  - yo sé
  - conozco
  lexicon: BDAG
  rationale: «Sé» es la forma idiomática y directa de οἶδα en español; comunica certeza establecida sin añadir matices ajenos.
theological_decisions:
- issue: Predicado equativo «ἡ ἐντολὴ αὐτοῦ ζωὴ αἰώνιός ἐστιν»
  english_pob_reading: The Father's commandment is eternal life.
  chosen_spanish_reading: Su mandamiento es vida eterna.
  alternative_spanish_readings:
  - Su mandamiento conduce a la vida eterna.
  - Su mandamiento concierne a la vida eterna.
  rationale: Se conserva el predicado literal para no resolver la tensión semántica del griego. El texto afirma de forma directa que el mandamiento «es vida eterna»; la traducción no lo expande a una explicación causal o temática, dejando que el contexto haga el trabajo interpretativo.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del POB inglés al preferir una equivalencia más estrecha para ἐντολή («mandamiento») y mantener la cláusula final sin expansión interpretativa, pero adapta el resto con español natural y auditado desde el griego.
  spanish_consistency_notes:
  - Se mantiene «el Padre» para reflejar el artículo griego y el uso joánico relacional.
  - Se conserva la repetición de λαλέω con «hablo» en ambas ocurrencias.
  - La nota al pie marca la tensión semántica del predicado equativo sin alterar el texto principal.
