revisions:
- from: Y sé que su mandamiento[a] es vida eterna. Así que lo que yo hablo, lo hablo tal como el Padre me lo ha dicho.
  to: Y sé que su mandamiento es vida eterna[a]. Por lo tanto, lo que hablo, lo hablo tal como el Padre me ha dicho.
  rationale: 'Se hizo una reparación menor: se movió el marcador de nota para que corresponda a la cláusula completa que la nota explica, se sustituyó «Así que» por «Por lo tanto» para un registro más digno, y se eliminó el pronombre explícito «yo» en la segunda cláusula para mejorar la naturalidad del español sin perder la repetición de λαλέω ni la fidelidad al sentido griego.'
