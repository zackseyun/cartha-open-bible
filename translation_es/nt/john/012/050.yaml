review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del griego: conserva el predicado equativo «su mandamiento es vida eterna», mantiene «el Padre» y reproduce la repetición de λαλέω. También preserva la nota de alternativa interpretativa. Sin embargo, «lo que yo hablo, lo hablo» suena poco natural en español y no expresa de la mejor manera el objeto neutro relativo ἃ con la dignidad requerida.'
  spanish_quality_summary: La primera cláusula está bien lograda y es fiel. La segunda necesita una reparación estilística menor para sonar natural y clara en español eclesial moderno. «Lo que yo digo, eso digo…» sería más idiomático, pero cambiaría la consistencia léxica documentada para λαλέω. La solución más equilibrada es «Por lo tanto, lo que hablo, lo hablo tal como el Padre me ha dicho», que conserva la repetición de «hablo» y mejora la cadencia. También conviene anclar la nota al sintagma completo «su mandamiento es vida eterna», no solo a «mandamiento», porque la nota explica la cláusula entera.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Mandamiento», «vida eterna», «el Padre» y la ausencia de expansión doctrinal concuerdan con el expediente inglés. La decisión de mantener «hablo» para λαλέω respeta la rationale léxica auditada.
  issues:
  - severity: medium
    issue: Anclaje de la nota en una sola palabra
    rationale: La nota no trata solo de «mandamiento», sino de la relación predicativa completa «su mandamiento es vida eterna». En español conviene anclarla al sintagma relevante para evitar que parezca una nota léxica sobre «mandamiento» solamente.
  - severity: low
    issue: «Así que» puede mejorarse
    rationale: «Así que» es aceptable para οὖν, pero «Por lo tanto» encaja mejor con el registro digno pedido y mantiene la inferencia sin coloquialidad.
  - severity: medium
    issue: Cadencia poco natural en «lo que yo hablo, lo hablo»
    rationale: Aunque es formalmente fiel, la repetición con «yo» suena trabada en español. Omitir «yo» mejora la naturalidad sin pérdida semántica, ya que el verbo ya marca primera persona y la repetición de λαλέω se conserva.
  revised_spanish_text: Y sé que su mandamiento es vida eterna[a]. Por lo tanto, lo que hablo, lo hablo tal como el Padre me ha dicho.
  revised_footnotes:
  - marker: a
    text: 'O: «su mandamiento conduce a la vida eterna» o «su mandamiento concierne a la vida eterna». El griego dice más literalmente: «su mandamiento es vida eterna».'
    reason: alternative_reading
  revision_rationale: 'Se hizo una reparación menor: se movió el marcador de nota para que corresponda a la cláusula completa que la nota explica, se sustituyó «Así que» por «Por lo tanto» para un registro más digno, y se eliminó el pronombre explícito «yo» en la segunda cláusula para mejorar la naturalidad del español sin perder la repetición de λαλέω ni la fidelidad al sentido griego.'
