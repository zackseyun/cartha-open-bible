translation:
  language: es
  text: Había entonces algunos griegos[a] de entre los que subían para adorar en la fiesta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ciertos griegos»; posiblemente no judíos que habían subido para adorar en la fiesta.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἦσαν δὲ
  english_pob_choice: Now there were
  chosen_spanish: Había entonces
  alternatives_spanish:
  - Y había entonces
  - Ahora había
  lexicon: BDAG
  rationale: Ἦσαν expresa existencia, y δὲ marca un cambio suave de escena. En español, «había entonces» suena natural y conserva el avance discursivo sin volverlo mecánico.
- source_word: Ἕλληνές τινες
  english_pob_choice: some Greeks
  chosen_spanish: algunos griegos
  alternatives_spanish:
  - ciertos griegos
  - unos griegos
  lexicon: BDAG
  rationale: Ἕλληνες conserva su sentido más directo como designación étnica/cultural, y τινες añade indefinición. «Algunos griegos» es la forma más clara y sobria en español; «griegos» se mantiene sin generalizar a «gentiles».
- source_word: ἐκ τῶν ἀναβαινόντων
  english_pob_choice: among those going up
  chosen_spanish: de entre los que subían
  alternatives_spanish:
  - entre los que subían
  - de entre los que iban subiendo
  lexicon: BDAG
  rationale: La construcción con ἐκ y el participio indica que estos griegos pertenecían al grupo que subía. «De entre los que subían» preserva esa inclusión dentro del grupo y mantiene la imagen de peregrinación hacia Jerusalén.
- source_word: ἵνα προσκυνήσωσιν
  english_pob_choice: to worship
  chosen_spanish: para adorar
  alternatives_spanish:
  - para rendir culto
  - para postrarse en adoración
  lexicon: BDAG
  rationale: ἵνα con subjuntivo expresa propósito. «Adorar» comunica bien el sentido religioso de προσκυνέω en este contexto; «rendir culto» sería posible, pero menos natural aquí.
- source_word: ἐν τῇ ἑορτῇ
  english_pob_choice: at the feast
  chosen_spanish: en la fiesta
  alternatives_spanish:
  - durante la fiesta
  - en la celebración
  lexicon: BDAG
  rationale: ἑορτή en Juan suele referirse a una fiesta judía concreta. «En la fiesta» es fiel y natural en español; no se introduce una especificación adicional que el versículo no da.
theological_decisions:
- issue: Identidad de Ἕλληνες
  english_pob_reading: '''Greeks'' is retained as an ethnic/cultural designation rather than generalized to ''Gentiles.'''
  chosen_spanish_reading: Se conserva «griegos» como designación étnica/cultural, no se generaliza a «gentiles».
  alternative_spanish_readings:
  - gentiles
  - no judíos
  rationale: El término griego es Ἕλληνες, cuyo sentido llano es «griegos». El texto no especifica si eran prosélitos, temerosos de Dios o simplemente griegos subiendo a la fiesta; traducir «griegos» preserva esa tensión interpretativa en vez de resolverla.
  doctrine_reference: 'Translation philosophy: preservar la tensión teológica y lexical cuando el texto no la resuelve.'
translation_notes:
  revision_awareness: La versión actual coincide con el juicio de alta concordancia del control más reciente; no se reportan cambios necesarios tras la última revisión.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» u otra sustitución convencional porque este versículo no contiene el Nombre divino.
  - Se mantuvo «griegos» y no «gentiles» para respetar el valor léxico de Ἕλληνες.
  - «Fiesta» se eligió como equivalente natural y bíblicamente adecuado para ἑορτή en este contexto.
  - El ancla [a] en el texto corresponde a la nota sobre la posible lectura alternativa de indefinición y sobre la identidad no especificada de estos griegos.
