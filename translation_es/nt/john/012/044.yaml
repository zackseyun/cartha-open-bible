translation:
  language: es
  text: 'Pero Jesús clamó y dijo: «El que cree en mí no cree en mí[b], sino en el que me envió».[a]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Quien cree en mí».'
    reason: lexical_alternative
  - marker: b
    text: Esto no niega que Jesús sea el objeto propio de la fe; expresa que creer en él es inseparable de creer en el que lo envió.
    reason: cross_reference
lexical_decisions:
- source_word: ἔκραξεν
  english_pob_choice: cried out
  chosen_spanish: clamó
  alternatives_spanish:
  - gritó
  - proclamó
  lexicon: BDAG
  rationale: κράζω expresa una alocución fuerte y pública. «Clamó» conserva la intensidad y el tono solemne sin sonar tan coloquial como «gritó».
- source_word: Ὁ πιστεύων
  english_pob_choice: The one who believes
  chosen_spanish: El que cree
  alternatives_spanish:
  - Quien cree
  - El que tiene fe
  lexicon: BDAG
  rationale: El participio con artículo tiene fuerza genérica y sustantiva. «El que cree» refleja bien esa forma y es natural en español bíblico actual.
- source_word: πιστεύει / πιστεύων
  english_pob_choice: believes
  chosen_spanish: cree
  alternatives_spanish:
  - cree en
  - tiene fe en
  - confía en
  lexicon: BDAG
  rationale: En Juan, πιστεύω con εἰς se vierte normalmente como «creer en». Aquí se mantiene el verbo «cree» con la preposición implícita en la construcción española, preservando la repetición del argumento verbal.
- source_word: εἰς ἐμέ
  english_pob_choice: in me
  chosen_spanish: en mí
  alternatives_spanish:
  - hacia mí
  - contra mí
  lexicon: BDAG
  rationale: Con πιστεύω, εἰς expresa la dirección de la fe hacia la persona de Jesús. «En mí» es la equivalencia idiomática natural en español.
- source_word: ἀλλὰ εἰς τὸν πέμψαντά με
  english_pob_choice: but in the one who sent me
  chosen_spanish: sino en el que me envió
  alternatives_spanish:
  - sino en el que me ha enviado
  - sino en el que me mandó
  lexicon: BDAG
  rationale: «El que me envió» preserva el participio agente sin especificar de antemano «el Padre» en el texto principal, tal como hace el inglés POB. «Sino» reproduce bien la corrección contrastiva de ἀλλά.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ introduce transición con contraste leve. «Pero» corresponde de forma natural al movimiento discursivo en español.
theological_decisions:
- issue: La frase podría entenderse como si creer en Jesús quedara excluido por completo.
  english_pob_reading: The wording is retained as a rhetorical/theological assertion that faith in Jesus is inseparable from and directed toward the Father who sent him, not as a denial of Jesus' proper objecthood of faith.
  chosen_spanish_reading: 'La redacción se conserva como una afirmación retórica y teológica: creer en Jesús va inseparablemente unido a creer en el que lo envió, no como una negación de que Jesús sea objeto propio de fe.'
  alternative_spanish_readings:
  - «El que cree en mí, en realidad cree también en el Padre»
  - «El que cree solo en mí no cree en mí»
  rationale: El griego no dice «solo». Añadirlo resolvería la tensión en vez de preservarla. La traducción debe mantener la relación joánica entre el Hijo y el Padre sin suavizarla.
  doctrine_reference: 'Afirmaciones; filosofía de traducción: preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: No se registraron revisiones aplicadas en el paquete fuente; el pasaje fue verificado con alto grado de concordancia y sin cambios pendientes.
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς y no se usa un título añadido.
  - Se conserva «el que me envió» para reflejar el participio agente sin explicitar «el Padre» en el cuerpo principal.
  - La nota a evita duplicar el matiz genérico del participio articular.
  - Se usa la puntuación de cita española con comillas angulares para publicación-readable.
  - No se introduce vocabulario doctrinal adicional que no esté sustentado por el texto griego o el audit trail inglés.
