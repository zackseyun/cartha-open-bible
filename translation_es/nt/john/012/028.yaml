translation:
  language: es
  text: '«Padre, glorifica tu nombre.» Entonces vino una voz desde el cielo: «Lo he glorificado[a], y lo glorificaré otra vez.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Lo glorifiqué, y lo glorificaré otra vez.»'
    reason: lexical_alternative
lexical_decisions:
- source_word: πάτερ
  english_pob_choice: Father
  chosen_spanish: Padre
  alternatives_spanish:
  - Mi Padre
  lexicon: BDAG
  rationale: Es vocativo directo a Dios. En español, «Padre» comunica con naturalidad la apelación sin añadir el posesivo «mi», que no está en el griego.
- source_word: δόξασόν
  english_pob_choice: glorify
  chosen_spanish: glorifica
  alternatives_spanish:
  - honra
  - magnifica
  lexicon: BDAG
  rationale: El imperativo aoristo de δοξάζω se vierte mejor con «glorifica», que conserva el campo semántico joánico de manifestar la gloria divina. «Honra» debilita el sentido y «magnifica» suena menos natural aquí.
- source_word: σου τὸ ὄνομα
  english_pob_choice: your name
  chosen_spanish: tu nombre
  alternatives_spanish:
  - el nombre que es tuyo
  lexicon: BDAG
  rationale: La expresión es idiomática y se refiere al nombre revelador de Dios, no solo a una etiqueta. «Tu nombre» es la forma natural en español y preserva ese peso bíblico-teológico.
- source_word: ἦλθεν οὖν
  english_pob_choice: Then ... came
  chosen_spanish: Entonces vino
  alternatives_spanish:
  - Así que vino
  - Por tanto vino
  lexicon: BDAG
  rationale: «Entonces» reproduce bien la progresión narrativa de οὖν y suena natural en español. «Por tanto» sería más formal y más pesado en este contexto narrativo.
- source_word: φωνὴ
  english_pob_choice: a voice
  chosen_spanish: una voz
  alternatives_spanish:
  - un sonido
  lexicon: BDAG
  rationale: Aunque φωνή puede significar «sonido», el discurso directo que sigue exige «voz» como equivalente más preciso.
- source_word: ἐκ τοῦ οὐρανοῦ
  english_pob_choice: from heaven
  chosen_spanish: desde el cielo
  alternatives_spanish:
  - del cielo
  - desde los cielos
  lexicon: BDAG
  rationale: «Desde el cielo» mantiene el sentido teológico de procedencia divina y es idiomático en español. «Del cielo» también sería posible, pero «desde» expresa mejor el movimiento/origen de la voz.
- source_word: Καὶ ἐδόξασα καὶ πάλιν δοξάσω
  english_pob_choice: I have glorified it, and I will glorify it again
  chosen_spanish: Lo he glorificado, y lo glorificaré otra vez.
  alternatives_spanish:
  - Lo glorifiqué, y lo glorificaré otra vez.
  - Lo he glorificado, y volveré a glorificarlo.
  lexicon: BDAG
  rationale: En español, el perfecto compuesto («lo he glorificado») comunica mejor que el pretérito simple una acción completada con relevancia presente, y conserva la fuerza del aoristo en esta respuesta divina. «Otra vez» traduce πάλιν con naturalidad y mantiene la repetición futura; el objeto implícito se expresa con «lo» para referirlo de vuelta a «tu nombre».
theological_decisions:
- issue: Referente del objeto implícito en la respuesta divina
  english_pob_reading: Supply 'it' to refer back to 'your name'
  chosen_spanish_reading: Explicitar «lo» como referencia a «tu nombre»
  alternative_spanish_readings:
  - 'Dejar el objeto implícito: «Lo he glorificado, y lo glorificaré otra vez»'
  - «He glorificado, y glorificaré otra vez»
  rationale: El griego permite omitir el objeto porque se recupera del contexto, pero el español exige un pronombre explícito para una lectura natural. «Lo» evita introducir un nuevo referente y mantiene claro que Dios habla de glorificar su propio nombre.
  doctrine_reference: Translation philosophy §1, §6
- issue: Renderizado de δοξάζω en un contexto joánico cargado teológicamente
  english_pob_reading: glorify
  chosen_spanish_reading: glorificar
  alternative_spanish_readings:
  - honrar
  - dar gloria a
  rationale: Juan usa el lenguaje de gloria de forma técnica para la revelación de Dios y del Hijo. «Glorificar» conserva esa red semántica y evita reducir la frase a mera honra o reputación.
  doctrine_reference: Translation philosophy §5
translation_notes:
  revision_awareness: El texto se mantiene en alta concordancia con el audit trail inglés y no requiere revisiones sustantivas; se conserva la decisión de traducir δοξάζω por «glorificar» y de expresar el objeto implícito en la respuesta divina para claridad en español.
  spanish_consistency_notes:
  - Se mantiene «Padre» como vocativo directo sin añadir posesivos.
  - Se conserva «glorifica»/«glorificaré» para el campo semántico de gloria en Juan.
  - «Desde el cielo» se usa de forma natural en español y preserva el origen divino de la voz.
  - El pronombre «lo» remite a «tu nombre» y no introduce un referente nuevo.
  - «Otra vez» mantiene el valor de πάλιν sin sobrecargar el estilo.
