review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del griego: mantiene la repetición de θεωρέω con «ve ... ve», conserva el participio sustantivado con «el que», y expresa correctamente la relación «al que me envió». Sin embargo, la decisión léxica para ὁ θεωρῶν está documentada de forma imprecisa en el borrador, porque atribuye «me» al segmento participial en vez de al pronombre separado ἐμέ; además, el texto español puede mejorarse levemente para acercarse mejor a la fuerza aspectual/atenta de θεωρέω según la nota inglesa.'
  spanish_quality_summary: «Y el que me ve, ve al que me envió[a]» es natural y claro en español, pero la nota «contempla» encaja mejor si el verbo principal también se ajusta a «mira» en vez de «ve», evitando una posible sensación demasiado física de «ver». «El que me mira, ve al que me envió[a]» suena idiomático, conserva la diferencia entre observación y percepción, y sigue siendo digno y ampliamente legible.
  glossary_alignment: No hay términos del glosario de alto impacto (Yahvé, Mesías, esclavo, etc.) en este versículo. La elección «envió» para πέμψαντά es adecuada. La nota sobre θεωρέω debe seguir señalando la alternativa de percepción atenta; en español, «contempla» funciona bien como alternativa lexical.
  issues:
  - severity: medium
    issue: El texto principal con «ve» puede subrepresentar el matiz de θεωρέω señalado en la auditoría inglesa.
    rationale: La nota inglesa preserva el valor de percepción atenta («beholds»). Aunque «ve» no es incorrecto, «mira ... ve» en español conserva mejor la progresión entre observación de Jesús y percepción del que lo envió, sin caer en arcaísmo.
  - severity: low
    issue: La documentación léxica para ὁ θεωρῶν en el borrador mezcla el participio con el pronombre ἐμέ.
    rationale: Esto no altera el texto principal, pero sí muestra una segmentación menos precisa del griego. La revisión del texto puede dejar más clara la correspondencia participio + pronombre separado.
  revised_spanish_text: Y el que me mira, ve al que me envió[a].
  revised_footnotes:
  - marker: a
    text: O «contempla»; el verbo griego puede sugerir ver con percepción atenta, no solo la visión física.
    reason: lexical_alternative
  revision_rationale: La revisión es pequeña y mejora la correspondencia con θεωρέω y con la nota léxica conservada en la auditoría inglesa. «Mira» sigue siendo natural y claro, mientras que la nota «contempla» preserva la alternativa de percepción atenta sin volver el texto principal demasiado literario.
