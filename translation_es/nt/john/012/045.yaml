revisions:
- from: Y el que me ve, ve al que me envió[a].
  to: Y el que me mira, ve al que me envió[a].
  rationale: La revisión es pequeña y mejora la correspondencia con θεωρέω y con la nota léxica conservada en la auditoría inglesa. «Mira» sigue siendo natural y claro, mientras que la nota «contempla» preserva la alternativa de percepción atenta sin volver el texto principal demasiado literario.
