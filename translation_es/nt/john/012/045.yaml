translation:
  language: es
  text: Y el que me mira, ve al que me envió[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «contempla»; el verbo griego puede sugerir ver con percepción atenta, no solo la visión física.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Y también
  - Además
  lexicon: BDAG
  rationale: Conecta esta afirmación con el contexto inmediato de manera directa y natural en español. 'Y' preserva la simple continuidad del griego sin añadir énfasis no explicitado.
- source_word: ὁ θεωρῶν
  english_pob_choice: the one who sees
  chosen_spanish: el que me ve
  alternatives_spanish:
  - quien me ve
  - el que me contempla
  - el que me mira
  lexicon: BDAG
  rationale: '''ὁ θεωρῶν'' funciona como participio articular sustantivado; en español, ''el que me ve'' conserva bien el valor genérico y el sujeto representativo. ''Ve'' mantiene la relación verbal con ''ve'' en la segunda mitad del verso, reflejando la repetición del griego.'
- source_word: ἐμὲ
  english_pob_choice: me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  lexicon: BDAG
  rationale: Pronombre de objeto directo de primera persona singular. 'Me' es la forma natural y directa en español; no requiere mayor marcación de énfasis en esta oración.
- source_word: θεωρεῖ
  english_pob_choice: sees
  chosen_spanish: ve
  alternatives_spanish:
  - contempla
  - observa
  - mira
  lexicon: BDAG
  rationale: '''θεωρέω'' puede significar ver, observar o contemplar. En español, ''ve'' es la opción más natural y conserva la correspondencia verbal con el participio inicial. ''Contempla'' o ''observa'' podrían reflejar un matiz de atención, pero son menos transparentes aquí.'
- source_word: τὸν πέμψαντά
  english_pob_choice: the one who sent
  chosen_spanish: al que me envió
  alternatives_spanish:
  - al que me mandó
  - al que me ha enviado
  - al que me envió
  lexicon: BDAG
  rationale: El participio aoristo articular designa al que realizó la acción de enviar; en este contexto se refiere al Padre. 'Al que me envió' reproduce con claridad la referencia relacional sin añadir un título que el griego no expresa explícitamente.
- source_word: με
  english_pob_choice: me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  lexicon: BDAG
  rationale: Objeto directo de πέμψαντά. Se traduce simplemente como 'me' para mantener la naturalidad y la relación directa con el verbo.
theological_decisions:
- issue: Relación entre ver a Jesús y ver al que lo envió
  english_pob_reading: 'Rendered straightforwardly as a representative statement of revelatory unity: seeing Jesus is seeing the one who sent him.'
  chosen_spanish_reading: 'Se expresa de forma directa como una declaración de unidad reveladora: ver a Jesús es ver al que lo envió.'
  alternative_spanish_readings:
  - ver a Jesús permite conocer al que lo envió
  - ver a Jesús equivale a ver al Padre
  - ver a Jesús es ver a Dios
  rationale: El griego afirma una correspondencia directa entre ver a Jesús y ver al que lo envió, sin necesidad de ampliar o suavizar el enunciado. La traducción conserva esa fuerza reveladora sin introducir una glosa doctrinal fuera del texto.
  doctrine_reference: Credo Niceno-Constantinopolitano (381); Definición de Calcedonia (451); principio de mantener la tensión teológica del texto sin resolverla por paráfrasis.
translation_notes:
  revision_awareness: El borrador sigue de cerca el paquete fuente griego y el criterio auditado en inglés; no se requerían revisiones recientes adicionales según el expediente, y se preserva la equivalencia verbal y la fuerza teológica del dicho.
  spanish_consistency_notes:
  - Se usó 've' dos veces para reflejar la repetición de θεωρῶν / θεωρεῖ.
  - Se prefirió 'al que me envió' para mantener una sintaxis natural en español y la referencia implícita al Padre sin explicitarla en el texto principal.
  - Se evitó 'beholds'/'contempla' en el cuerpo principal para no sobrecargar el registro; esa alternativa queda reservada a la nota.
  - La construcción 'el que' mantiene el valor genérico del participio articular griego en un español claro y publicable.
