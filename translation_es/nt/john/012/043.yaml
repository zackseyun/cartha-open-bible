    rationale: Aunque es posible, en español una oración suelta iniciada con 'Porque' suele sentirse subordinada o menos elegante. γάρ en este contexto funciona bien como 'Pues', que suena más natural y mantiene el valor explicativo.
  - severity: low
    issue: Puntuación y formato de la nota al pie
    rationale: 'La fórmula "''O: «...»." es poco natural en español editorial. Conviene simplificar a "O ''...'' / ''...''" o equivalente, sin comillas redundantes ni puntuación innecesaria.'
