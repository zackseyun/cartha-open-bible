lexical_decisions:
- source_word: ἠγάπησαν
  english_pob_choice: loved
  chosen_spanish: amaron
  alternatives_spanish:
  - prefirieron
  - quisieron
  lexicon: BDAG
  rationale: 'El aoristo de ἀγαπάω expresa una acción completa: aquí se conserva con el pasado simple ''amaron'', que mantiene la fuerza volitiva y afectiva del verbo sin reducirlo a una mera preferencia.'
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: γάρ introduce la razón de la afirmación anterior; 'Porque' es natural en español y preserva la relación causal sin añadir interpretación.
- source_word: τὴν δόξαν
  english_pob_choice: the glory
  chosen_spanish: la gloria
  alternatives_spanish:
  - el honor
  - la aprobación
  - la alabanza
  lexicon: BDAG
  rationale: δόξα aquí mantiene el contraste joánico entre estimación humana y divina. 'Gloria' conserva el campo semántico y la repetición del término, sin estrecharlo indebidamente a 'aprobación'.
- source_word: τῶν ἀνθρώπων
  english_pob_choice: of men
  chosen_spanish: de los hombres
  alternatives_spanish:
  - de las personas
  - de la gente
  - de los seres humanos
  lexicon: BDAG
  rationale: El genitivo puede expresar pertenencia u origen. 'De los hombres' sigue de cerca la estructura griega y refleja el uso genérico de ἄνθρωποι; se conserva el valor representativo tradicional, con posible lectura inclusiva en contexto.
- source_word: μᾶλλον ἤπερ
  english_pob_choice: rather than
  chosen_spanish: más que
  alternatives_spanish:
  - antes que
  - en vez de
  lexicon: BDAG
  rationale: La pareja comparativa marca preferencia entre dos objetos. 'Más que' expresa de forma clara y natural la comparación preferencial del griego.
- source_word: τοῦ θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - procedente de Dios
  - que viene de Dios
  lexicon: BDAG
  rationale: Se conserva el paralelismo con 'de los hombres' y la amplitud semántica del genitivo, sin forzar una interpretación restrictiva de posesión o procedencia.
theological_decisions:
- issue: Sentido de δόξα en el contraste humano/divino
  english_pob_reading: glory
  chosen_spanish_reading: gloria
  alternative_spanish_readings:
  - honor
  - aprobación
  - alabanza
  rationale: En Juan, δόξα tiene resonancia teológica amplia. 'Gloria' preserva esa red lexical y permite entender el contraste sin convertirlo en un simple 'reconocimiento social'.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Valor genérico de ἀνθρώπων
  english_pob_reading: men
  chosen_spanish_reading: los hombres
  alternative_spanish_readings:
  - las personas
  - la gente
  - los seres humanos
  rationale: El griego usa un plural masculino con valor genérico. 'Los hombres' mantiene la correspondencia formal y el registro bíblico, sin negar que el referente sea humano en general.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: El texto griego y el audit trail en inglés muestran consenso alto y sin revisiones aplicadas; por eso se mantiene una traducción breve y directa que conserva el contraste de δόξα y la comparación μᾶλλον ἤπερ.
  spanish_consistency_notes:
  - Se usa 'gloria' de forma consistente para δόξα, siguiendo el patrón joánico y la decisión inglesa auditada.
  - Se conserva 'los hombres' como equivalente genérico de ἀνθρώπων, con alternativa inclusiva en nota para lectores modernos.
  - Se mantiene un orden natural en español ('amaron más... que...') sin perder la relación comparativa del original.
