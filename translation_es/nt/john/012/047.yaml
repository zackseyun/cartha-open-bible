translation:
  language: es
  text: Y si alguien oye mis palabras y no las guarda[a], yo no lo juzgo; porque no vine para juzgar al mundo[b], sino para salvar al mundo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las observa». El verbo griego puede significar «guardar», «vigilar» u «observar»; aquí se mantiene «guardar» por su amplitud.
    reason: lexical_alternative
  - marker: b
    text: 'El griego dice «lo» con fuerza genérica: la declaración se aplica a cualquiera que oiga y no guarde mis palabras.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐάν τίς
  english_pob_choice: if anyone
  chosen_spanish: si alguien
  alternatives_spanish:
  - si cualquiera
  - si alguna persona
  lexicon: BDAG
  rationale: La construcción condicional indefinida introduce un caso general. «Si alguien» suena natural en español y conserva el alcance abierto y representativo del griego.
- source_word: ἀκούσῃ
  english_pob_choice: hears
  chosen_spanish: oye
  alternatives_spanish:
  - escucha
  - oye y atiende
  lexicon: BDAG
  rationale: «Oye» reproduce el acto de percibir el խոսido sin añadir, como glosa principal, una respuesta interior más fuerte que la que el verbo exige por sí solo.
- source_word: τῶν ῥημάτων
  english_pob_choice: my words
  chosen_spanish: mis palabras
  alternatives_spanish:
  - mis dichos
  - lo que digo
  lexicon: BDAG
  rationale: ῥήματα se refiere a palabras dichos/expresiones pronunciadas. «Mis palabras» es natural y suficientemente preciso en español.
- source_word: φυλάξῃ
  english_pob_choice: keep them
  chosen_spanish: las guarda
  alternatives_spanish:
  - las guarda fielmente
  - las observa
  - las obedece
  lexicon: BDAG
  rationale: φυλάσσω puede significar guardar, conservar, observar o mantener fielmente. En contexto joánico, la idea incluye fidelidad obediente; «guardar» preserva ese campo semántico sin estrecharlo a «obedecer».
- source_word: οὐ κρίνω αὐτόν
  english_pob_choice: I do not judge him
  chosen_spanish: yo no lo juzgo
  alternatives_spanish:
  - yo no lo condeno
  - yo no juzgo a esa persona
  lexicon: BDAG
  rationale: «Juzgar» mantiene la repetición léxica con la cláusula final y preserva la tensión joánica. «Condenar» interpreta el resultado adverso y sería más específico de lo que el verbo por sí solo requiere.
- source_word: ἦλθον
  english_pob_choice: I did not come
  chosen_spanish: no he venido
  alternatives_spanish:
  - no vine
  lexicon: BDAG
  rationale: En español, el perfecto compuesto expresa bien la llegada/venida en relación con la misión presente de Jesús y su resultado vigente, sin perder el sentido retrospectivo del aoristo.
- source_word: ἵνα κρίνω
  english_pob_choice: to judge
  chosen_spanish: para juzgar
  alternatives_spanish:
  - con el fin de juzgar
  - a juzgar
  lexicon: BDAG
  rationale: «ἵνα» con subjuntivo expresa finalidad. «Para juzgar» es la equivalencia natural en español y conserva la relación de propósito.
- source_word: κόσμον
  english_pob_choice: the world
  chosen_spanish: al mundo
  alternatives_spanish:
  - el mundo
  lexicon: BDAG
  rationale: κόσμος en Juan suele designar el mundo humano en su orden caído. La forma «al mundo» sigue la sintaxis española del complemento directo personal sin cambiar el referente.
- source_word: σώσω
  english_pob_choice: save
  chosen_spanish: salvar
  alternatives_spanish:
  - rescatar
  lexicon: BDAG
  rationale: σῴζω es un verbo soteriológico central. «Salvar» conserva el peso teológico establecido y es el equivalente más estable en español bíblico contemporáneo.
theological_decisions:
- issue: Sentido de κρίνω en relación con el juicio en Juan
  english_pob_reading: Render κρίνω consistently as 'judge' and leave the temporal/missional nuance implicit in context.
  chosen_spanish_reading: Traducir κρίνω consistentemente como «juzgar» y dejar implícita en el contexto la relación con el juicio.
  alternative_spanish_readings:
  - «condenar»
  - «juzgar en este momento»
  rationale: Mantener «juzgar» conserva la conexión verbal con la cláusula de propósito y no resuelve la tensión teológica de manera prematura. «Condenar» estrecha indebidamente el verbo; explicitar el momento introduciría paráfrasis no sustentada por el texto.
  doctrine_reference: Preservar la tensión teológica sin armonizarla artificialmente.
- issue: Pronombre singular masculino αὐτόν con fuerza genérica
  english_pob_reading: Use 'him' in the main text.
  chosen_spanish_reading: Usar «lo» en el texto principal.
  alternative_spanish_readings:
  - «esa persona»
  - «le»
  rationale: El griego usa singular masculino con valor representativo tras τίς. «Lo» conserva el referente singular sin neutralizar el género del original; las alternativas inclusivas pueden considerarse, pero no son necesarias en el texto principal.
  doctrine_reference: Fidelidad gramatical y semántica al singular representativo del original.
translation_notes:
  revision_awareness: El borrador sigue el pasaje griego SBLGNT y concuerda con el audit trail en mantener κρίνω como «juzgar», σῴζω como «salvar» y el valor genérico de τίς/αὐτόν. Se ajustó el español para fluidez natural, usando «oye» y «no he venido» sin alterar el contenido semántico documentado.
  spanish_consistency_notes:
  - 'Se conserva la terminología joánica central: «juzgar», «salvar», «mundo», «palabras».'
  - Se evita sustituir «juzgar» por «condenar» en el texto principal para no borrar la tensión documentada.
  - La nota sobre αὐτόν preserva la fuerza genérica del singular masculino sin cambiar el cuerpo del texto.
  - «Guardar» mantiene la amplitud semántica de φυλάσσω en lugar de estrecharla a «obedecer».
