base_translation:
  language: en
  yaml_path: translation/nt/john/012/047.yaml
  text: And if anyone hears my words and does not keep them[a], I do not judge him; for I did not come to judge the world[b], but to save the world.
  footnotes:
  - marker: a
    text: Or 'I do not condemn him.' The Greek verb can mean 'judge' or, in context, carry the sense of adverse judgment.
    reason: lexical_alternative
  - marker: b
    text: 'Greek ''him,'' with generic force: the statement applies to anyone who hears and does not keep Jesus'' words.'
    reason: lexical_alternative
