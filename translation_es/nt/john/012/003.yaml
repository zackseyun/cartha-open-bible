translation:
  language: es
  text: Entonces María tomó una litra[a] de perfume de nardo[c] puro[b] y muy costoso, ungió los pies de Jesús y se los enjugó con su cabello. Y la casa se llenó de la fragancia del perfume.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Una litra era una unidad romana de peso, de aproximadamente doce onzas, o cerca de un tercio de kilogramo.
    reason: cultural_note
  - marker: b
    text: O «genuino»; el adjetivo πιστικῆς es lexicográficamente debatido.
    reason: lexical_alternative
  - marker: c
    text: Tradicionalmente, «espicanardo».
    reason: lexical_alternative
lexical_decisions:
- source_word: οὖν
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Así que
  - Luego
  lexicon: BDAG
  rationale: Marca continuidad narrativa/inferencial; «Entonces» preserva la función discursiva sin sonar forzado en español.
- source_word: λαβοῦσα
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - habiendo tomado
  - tomando
  lexicon: BDAG
  rationale: El participio aoristo se integra naturalmente en una secuencia narrativa con un verbo finito en español.
- source_word: λίτραν
  english_pob_choice: a litra
  chosen_spanish: una litra[a]
  alternatives_spanish:
  - una libra
  - unos doce onzas
  lexicon: BDAG
  rationale: Se conserva la unidad antigua por transliteración para no perder la especificidad del texto fuente; la aclaración va en nota.
- source_word: μύρου
  english_pob_choice: perfume
  chosen_spanish: perfume
  alternatives_spanish:
  - ungüento
  - aceite perfumado
  lexicon: BDAG
  rationale: En este contexto de unción, «perfume» comunica bien el valor aromático del μύρον y conecta con la mención final del aroma.
- source_word: νάρδου
  english_pob_choice: nard
  chosen_spanish: nardo
  alternatives_spanish:
  - espicanardo
  lexicon: BDAG
  rationale: «Nardo» es el término natural y fiel en español; «espicanardo» es tradicional pero menos común.
- source_word: πιστικῆς
  english_pob_choice: pure
  chosen_spanish: genuino
  alternatives_spanish:
  - puro
  - auténtico
  lexicon: BDAG
  rationale: El adjetivo es lexicalmente debatido. «Genuino» conserva la idea de autenticidad sin cerrar indebidamente la ambigüedad del griego.
- source_word: πολυτίμου
  english_pob_choice: costly
  chosen_spanish: muy costoso
  alternatives_spanish:
  - precioso
  - carísimo
  lexicon: BDAG
  rationale: Expresa con claridad el alto valor económico; la intensificación «muy» refuerza la valoración del compuesto griego.
- source_word: ἤλειψεν
  english_pob_choice: anointed
  chosen_spanish: ungió
  alternatives_spanish:
  - aplicó
  - untó
  lexicon: BDAG
  rationale: «Ungió» reproduce el acto de aplicar perfume/aceite con la dignidad y fuerza del verbo, sin imponer una lectura sacramental.
- source_word: τοὺς πόδας τοῦ Ἰησοῦ
  english_pob_choice: Jesus's feet
  chosen_spanish: los pies de Jesús
  alternatives_spanish:
  - los pies de Jesús
  lexicon: BDAG
  rationale: Construcción posesiva natural en español, clara y fiel al objeto directo del acto.
- source_word: ἐξέμαξεν
  english_pob_choice: wiped
  chosen_spanish: los secó
  alternatives_spanish:
  - los limpió
  - los secó al limpiarlos
  lexicon: BDAG
  rationale: Con el complemento instrumental «con sus cabellos», «secar» expresa bien la acción de retirar el líquido con el cabello.
- source_word: ταῖς θριξὶν αὐτῆς
  english_pob_choice: with her hair
  chosen_spanish: con sus cabellos
  alternatives_spanish:
  - con el cabello de ella
  - con su pelo
  lexicon: BDAG
  rationale: «Cabellos» es natural y elegante en español bíblico, y mantiene el plural del griego con dignidad estilística.
- source_word: ἐπληρώθη
  english_pob_choice: was filled
  chosen_spanish: se llenó
  alternatives_spanish:
  - quedó llena
  - se impregnó
  lexicon: BDAG
  rationale: Pasivo natural en español que refleja el efecto expansivo del aroma en la casa.
- source_word: ὀσμῆς
  english_pob_choice: fragrance
  chosen_spanish: aroma
  alternatives_spanish:
  - fragancia
  - olor
  lexicon: BDAG
  rationale: «Aroma» conserva el matiz positivo del contexto; «fragancia» también sería viable, pero «aroma» fluye mejor junto a «perfume».
- source_word: ἡ οἰκία
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - el hogar
  lexicon: BDAG
  rationale: Traducción directa y transparente del lugar de la escena.
theological_decisions:
- issue: Posible sobrelectura del lenguaje de unción
  english_pob_reading: Rendered ἤλειψεν as 'anointed' in its narrative sense without importing sacramental or coronation theology.
  chosen_spanish_reading: «Ungió» en sentido narrativo, sin importar teología sacramental o de coronación.
  alternative_spanish_readings:
  - «untó»
  - «aplicó perfume a»
  rationale: El contexto describe una acción real de perfumar/ungir; «ungió» es la equivalencia más fiel y digna, pero la formulación evita añadir interpretaciones doctrinales no presentes en el versículo.
  doctrine_reference: 'Principio POB: no resolver ni introducir afirmaciones doctrinales que el texto no formula explícitamente.'
translation_notes:
  revision_awareness: La revisión inglesa más reciente dejó el texto sin cambios; esta propuesta sigue la forma auditada final y solo adapta las decisiones léxicas al español con equivalencias transparentes.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva la distinción entre el acto de ungir y cualquier lectura sacramental, siguiendo la cautela del audit trail en inglés.
  - «Nardo» y «perfume» se coordinan para reflejar tanto la sustancia como el carácter aromático del μύρον sin duplicar innecesariamente el significado.
