revisions:
- from: Entonces María tomó una litra[a] de perfume[b] de nardo genuino y muy costoso, ungió los pies de Jesús y los secó con sus cabellos. Y la casa se llenó con el aroma del perfume.
  to: Entonces María tomó una litra[a] de perfume de nardo[c] puro[b] y muy costoso, ungió los pies de Jesús y se los enjugó con su cabello. Y la casa se llenó de la fragancia del perfume.
  rationale: Se ajusta πιστικῆς a «puro» para alinearlo con la decisión principal auditada del POB, dejando «genuino» como alternativa en nota; se añade la nota tradicional «espicanardo» para conservar el rastro lexical del inglés; y se mejora ἐξέμαξεν con «se los enjugó con su cabello», que refleja mejor la acción de limpiar/enjugar y suena más natural en español.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:04:38Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la secuencia y el sentido general del griego: María toma una litra de perfume de nardo costoso, unge los pies de Jesús, los limpia con su cabello y la casa se llena de la fragancia. Sin embargo, no preserva del todo el rastro auditado del POB en dos puntos léxicos importantes: πιστικῆς fue documentado en inglés como ''pure'' con alternativa ''genuine'', pero el español principal eligió ''genuino'' sin reflejar la decisión principal; y ἐξέμαξεν significa más precisamente ''secó/limpió al pasar'' o ''enjugó'', no simplemente ''secó'', por lo que conviene una forma que conserve la acción de limpiar con el cabello.'
  spanish_quality_summary: El español es natural y claro, con buen tono bíblico moderno. No obstante, 'de perfume de nardo genuino y muy costoso' suena algo pesado, y 'los secó con sus cabellos' puede sugerir solo secado físico más que la acción de enjugar. Una redacción más fluida y precisa sería 'de perfume de nardo puro y muy costoso' y 'se los enjugó con su cabello'. También conviene añadir la nota tradicional sobre 'espicanardo', ya preservada en el POB inglés.
  glossary_alignment: 'No hay conflictos con la terminología principal del proyecto (Jesús, Dios, etc.). La principal observación es de alineación lexical con el POB auditado: νάρδου debe conservar ''nardo'' en el texto y la alternativa tradicional ''espicanardo'' en nota; πιστικῆς debe reflejar mejor la opción principal auditada (''puro'') y dejar ''genuino'' como alternativa en nota.'
  issues:
  - severity: medium
    issue: πιστικῆς se tradujo como 'genuino' en el texto principal.
    rationale: El POB inglés escogió 'pure' como lectura principal, con 'genuine' como alternativa en nota. En español, 'puro' preserva mejor esa decisión documentada, mientras que 'genuino' puede quedar como alternativa lexical.
  - severity: medium
    issue: Falta la nota sobre la alternativa tradicional 'espicanardo'.
    rationale: El rastro auditado del POB conserva esta alternativa lexical; el español debería preservarla también, especialmente porque 'nardo' puede beneficiarse de esa aclaración tradicional en contexto bíblico.
  - severity: low
    issue: '''los secó con sus cabellos'' no refleja del modo más preciso ἐξέμαξεν.'
    rationale: El verbo griego denota limpiar/enjugar; 'enjugó' o 'los enjugó con su cabello' conserva mejor la acción que simplemente 'secó'.
  - severity: low
    issue: Uso de 'cabellos' en plural.
    rationale: Es comprensible y digno, pero 'con su cabello' suena más natural en español general contemporáneo sin perder fidelidad al sentido instrumental.
  revised_spanish_text: Entonces María tomó una litra[a] de perfume de nardo[c] puro[b] y muy costoso, ungió los pies de Jesús y se los enjugó con su cabello. Y la casa se llenó de la fragancia del perfume.
  revised_footnotes:
