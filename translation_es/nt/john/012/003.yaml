  text: ἡ οὖν ⸀Μαριὰμ λαβοῦσα λίτραν μύρου νάρδου πιστικῆς πολυτίμου ἤλειψεν τοὺς πόδας τοῦ Ἰησοῦ καὶ ἐξέμαξεν ταῖς θριξὶν αὐτῆς τοὺς πόδας αὐτοῦ· ἡ δὲ οἰκία ἐπληρώθη ἐκ τῆς ὀσμῆς τοῦ μύρου.
base_translation:
  language: en
  yaml_path: translation/nt/john/012/003.yaml
  text: Then Mary took a litra of costly pure nard perfume[a], anointed Jesus's feet, and wiped his feet with her hair[c][b]. And the house was filled with the fragrance of the perfume.
  footnotes:
  - marker: a
    text: A litra was a Roman unit of weight, roughly twelve ounces or about a third of a kilogram.
    reason: cultural_note
  - marker: b
    text: Or 'genuine nard'; the adjective translated 'pure' (πιστικῆς) is lexically debated.
    reason: lexical_alternative
  - marker: c
    text: 'Traditional English: ''spikenard.'''
    reason: lexical_alternative
