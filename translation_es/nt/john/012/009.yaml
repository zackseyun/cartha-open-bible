translation:
  language: es
  text: Así que una gran multitud de entre los judíos supo que él estaba allí[a], y vinieron no solo a causa de Jesús, sino también para ver a Lázaro, a quien había levantado de entre los muertos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de entre los judeanos». El término griego puede referirse tanto a judíos en general como, en algunos contextos de Juan, de manera más específica a los judeanos.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἔγνω
  english_pob_choice: learned
  chosen_spanish: supo
  alternatives_spanish:
  - llegó a saber
  - se enteró
  lexicon: BDAG
  rationale: El aoristo de γινώσκω aquí expresa que la multitud llegó a conocer una जानकारी nueva. En español, «supo» comunica ese descubrimiento de manera natural y sobria; «se enteró» también sería posible, pero suena más conversacional.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - por tanto
  - entonces
  lexicon: BDAG
  rationale: Marca continuidad narrativa e inferencia respecto del contexto previo. «Así que» preserva esa conexión en un español fluido sin volver el texto demasiado formal.
- source_word: ὄχλος πολὺς
  english_pob_choice: a large crowd
  chosen_spanish: mucha gente
  alternatives_spanish:
  - una gran multitud
  - una gran gente
  lexicon: BDAG
  rationale: La expresión describe una masa numerosa. «Mucha gente» conserva la idea de abundancia de personas y suena natural; «una gran multitud» es más literal, pero en este contexto resulta menos idiomática.
- source_word: ἐκ τῶν Ἰουδαίων
  english_pob_choice: of the Jews
  chosen_spanish: de entre los judíos
  alternatives_spanish:
  - de los judíos
  - entre los judíos
  lexicon: BDAG
  rationale: ἐκ con genitivo resalta procedencia o pertenencia a un subconjunto. «De entre los judíos» preserva mejor ese matiz que un simple «de los judíos» y mantiene abierta la sensibilidad contextual de Ἰουδαῖοι en Juan.
- source_word: ὅτι ἐκεῖ ἐστιν
  english_pob_choice: that he was there
  chosen_spanish: que él estaba allí
  alternatives_spanish:
  - que está allí
  lexicon: BDAG
  rationale: El texto griego usa presente, pero en español narrativo pasado «estaba» es natural después de un verbo de conocimiento en pasado. Se conserva el referente implícito a Jesús con el pronombre explícito para claridad.
- source_word: ἦλθον
  english_pob_choice: they came
  chosen_spanish: vinieron
  alternatives_spanish:
  - vinieron allí
  - fueron
  lexicon: BDAG
  rationale: El verbo de movimiento se vierte con «vinieron», que mantiene la perspectiva de llegada al lugar del relato. «Fueron» perdería esa deíxis narrativa.
- source_word: οὐ διὰ τὸν Ἰησοῦν μόνον
  english_pob_choice: not only because of Jesus
  chosen_spanish: no solo por Jesús
  alternatives_spanish:
  - no solo a causa de Jesús
  - no solo por causa de Jesús
  lexicon: BDAG
  rationale: διά con acusativo expresa causa o motivo. «Por Jesús» comunica esa motivación de forma breve y natural; el «solo» enfatiza exclusividad según el griego.
- source_word: ἀλλ’ ἵνα καὶ
  english_pob_choice: but also so that
  chosen_spanish: sino también para
  alternatives_spanish:
  - sino también para que
  - sino también a fin de
  lexicon: BDAG
  rationale: La construcción contrasta motivos y introduce propósito. En español, «sino también para» resulta conciso y válido porque el infinitivo siguiente expresa el fin; si se quisiera hacer más explícito el propósito, «para que» también sería posible.
- source_word: ἴδωσιν
  english_pob_choice: they might see
  chosen_spanish: ver
  alternatives_spanish:
  - que vieran
  - para ver
  lexicon: BDAG
  rationale: El subjuntivo de propósito puede expresarse naturalmente en español con un infinitivo tras «para». Aquí «para ver» mantiene la finalidad sin forzar un subjuntivo donde el español prefiere una construcción más directa.
- source_word: Λάζαρον
  english_pob_choice: Lazarus
  chosen_spanish: Lázaro
  alternatives_spanish:
  - Lázaro
  lexicon: BDAG
  rationale: Nombre propio transliterado según la norma del proyecto. La forma castellana común «Lázaro» es la más inteligible.
- source_word: ὃν ἤγειρεν ἐκ νεκρῶν
  english_pob_choice: whom he had raised from the dead
  chosen_spanish: a quien había levantado de entre los muertos
  alternatives_spanish:
  - a quien había resucitado de entre los muertos
  - a quien levantó de entre los muertos
  lexicon: BDAG
  rationale: ἐγείρω aquí tiene el sentido de devolver a la vida. «Había levantado» conserva el eco léxico de ἐγείρω sin perder claridad; «resucitado» es una alternativa natural, pero suaviza la conexión verbal con el griego. «De entre los muertos» reproduce bien ἐκ νεκρῶν.
theological_decisions:
- issue: Sentido de Ἰουδαίων en Juan
  english_pob_reading: of the Jews
  chosen_spanish_reading: de entre los judíos
  alternative_spanish_readings:
  - de los judíos
  - de entre los judeanos
  rationale: En Juan, Ἰουδαῖοι puede referirse a judíos en general o, según el contexto, a judeanos. Aquí el contexto narrativo no exige resolver la tensión de forma rígida. «De entre los judíos» mantiene la lectura de pertenencia/subconjunto sin introducir una glosa interpretativa más fuerte de lo necesario.
  doctrine_reference: 'Principio POB: primacía del texto original y preservación de tensiones contextuales'
- issue: Valor de ἤγειρεν aplicado a Lázaro
  english_pob_reading: had raised from the dead
  chosen_spanish_reading: había levantado de entre los muertos
  alternative_spanish_readings:
  - había resucitado de entre los muertos
  - había despertado de entre los muertos
  rationale: El verbo griego enfatiza la acción de levantar/restaurar a la vida. «Levantado» conserva el vínculo léxico con ἐγείρω; «resucitado» aclara el sentido teológico pero pierde ese matiz verbal. Se mantiene la referencia a la victoria sobre la muerte sin añadir más explicación que la del texto.
  doctrine_reference: Cristología y milagros en Juan; fidelidad léxica sin borrar el matiz verbal
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no se registraron cambios pendientes y la traducción sigue de acuerdo con el audit trail inglés de alta concordancia.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, aunque este versículo no contiene el nombre divino.
  - Se usa «Lázaro» para el nombre propio, conforme a la transliteración castellana habitual y a la política del proyecto.
  - Se evita «SEÑOR» porque no hay un divino κύριος en este versículo; el sujeto implícito del relato se expresa con «él» para claridad narrativa.
  - Se conserva una construcción natural en español para el propósito («para ver») sin perder el valor final del ἵνα griego.
