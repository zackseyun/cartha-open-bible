review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del griego: una multitud grande entre los judíos supo que Jesús estaba allí, vinieron no solo por Jesús sino también para ver a Lázaro, a quien él había levantado de entre los muertos. Sin embargo, hay un pequeño desajuste en la expresión de ὄχλος πολὺς: «mucha gente» es comprensible, pero atenúa el valor de «multitud/crowd» como colectivo numeroso más definido. También conviene afinar «por Jesús» a una formulación causal más explícita para reflejar mejor διὰ con acusativo.'
  spanish_quality_summary: El español es natural y claro, con buena legibilidad e inserción correcta de la nota [a]. No obstante, «mucha gente» suena algo menos preciso que «una gran multitud», y «vinieron no solo por Jesús» puede leerse como finalidad o apoyo personal más que como motivo causal. Una leve revisión mejora precisión y dignidad sin volver el texto rígido.
  glossary_alignment: 'La terminología principal está bien alineada: «Jesús», «Lázaro», «judíos» con nota alternativa a «judeanos», y «de entre los muertos». No hay conflictos con las políticas globales. La decisión «había levantado» es defendible por fidelidad a ἐγείρω, aunque «había resucitado» también sería posible; no requiere cambio.'
  issues:
  - severity: medium
    issue: «mucha gente» debilita ὄχλος πολὺς
    rationale: El griego habla de una multitud grande o gran muchedumbre, no solo de mucha gente en general. «Una gran multitud» o «una gran muchedumbre» conserva mejor el sustantivo colectivo.
  - severity: low
    issue: «por Jesús» puede sonar menos causal de lo que expresa διὰ τὸν Ἰησοῦν
    rationale: Aunque es posible, en español bíblico claro «a causa de Jesús» o «por causa de Jesús» refleja con mayor precisión el motivo de su venida.
