revisions:
- from: 'para que se cumpliera la palabra del profeta Isaías, la que él dijo: «Señor, ¿quién ha creído a nuestro informe[a]? ¿Y a quién se ha revelado el brazo del Señor?».'
  to: 'para que se cumpliera la palabra del profeta Isaías, que él dijo: «Señor, ¿quién ha creído a nuestro mensaje[a]? ¿Y a quién se ha revelado el brazo de Yahvé?»'
  rationale: Se ajusta el texto para mejorar la legibilidad eclesial del español, alinear mejor ἀκοή con un equivalente natural en español, y seguir la terminología del proyecto para el nombre divino en la cita de Isaías, mientras se conserva «Señor» como vocativo inicial.
