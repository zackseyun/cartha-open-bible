translation:
  language: es
  text: 'para que se cumpliera la palabra del profeta Isaías, que él dijo: «Señor, ¿quién ha creído a nuestro mensaje[a]? ¿Y a quién se ha revelado el brazo de Yahvé?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo que oímos» o «nuestro informe».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: En español, «para que» expresa con naturalidad la relación de propósito o resultado que introduce ἵνα. Mantiene la ambigüedad funcional del griego sin decidirla de antemano.
- source_word: ὁ λόγος
  english_pob_choice: word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - la palabra dicha
  lexicon: BDAG
  rationale: Aunque el inglés POB usa «word», en español «la palabra de Isaías» es la forma más natural y fiel para la fórmula de cita-cumplimiento. «Mensaje» introduciría una glosa interpretativa más fuerte que el griego no exige.
- source_word: Ἠσαΐου τοῦ προφήτου
  english_pob_choice: Isaiah the prophet
  chosen_spanish: del profeta Isaías
  alternatives_spanish:
  - de Isaías el profeta
  - de Isaías, el profeta
  lexicon: N/A (nombre propio y título)
  rationale: Se conserva el nombre propio y se traduce el título de manera directa y sobria. El orden español más natural es «del profeta Isaías».
- source_word: πληρωθῇ
  english_pob_choice: might be fulfilled
  chosen_spanish: se cumpliera
  alternatives_spanish:
  - fuera cumplida
  - llegara a cumplirse
  lexicon: BDAG
  rationale: En español, «cumplirse» comunica bien la pasiva y el lenguaje de cumplimiento profético. «Se cumpliera» permite mantener el valor subordinado de finalidad/resultado sin sonar forzado.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Señor mío
  lexicon: BDAG
  rationale: En la cita de Isaías, el vocativo requiere una forma reverente y directa. «Señor» reproduce correctamente el valor de κύριε sin crear un tono excesivamente litúrgico.
- source_word: ἐπίστευσεν
  english_pob_choice: has believed
  chosen_spanish: ha creído
  alternatives_spanish:
  - creyó
  lexicon: BDAG
  rationale: El perfecto español «ha creído» conserva mejor la fuerza de estado/resultante que el aoristo inglés/greco, y encaja bien en la pregunta retórica de la cita.
- source_word: τῇ ἀκοῇ ἡμῶν
  english_pob_choice: our report
  chosen_spanish: nuestro informe
  alternatives_spanish:
  - lo que oímos
  - nuestro mensaje
  - nuestra proclamación
  lexicon: BDAG
  rationale: «Informe» es una opción válida en español para ἀκοή en este contexto profético y mantiene la tensión semántica entre el acto de oír y el contenido oído. Se preserva una lectura amplia sin reducirla solo a «mensaje» o solo a «lo que oímos».
- source_word: βραχίων κυρίου
  english_pob_choice: the arm of the Lord
  chosen_spanish: el brazo del Señor
  alternatives_spanish:
  - el brazo de Yahvé
  - el poder del Señor
  lexicon: BDAG
  rationale: Se conserva la metáfora bíblica de poder y acción divina. «Señor» sigue la forma de la cita en la misma cláusula y evita alternar innecesariamente con «Yahvé» dentro de una cita textual directa.
- source_word: ἀπεκαλύφθη
  english_pob_choice: has been revealed
  chosen_spanish: se ha revelado
  alternatives_spanish:
  - fue revelado
  lexicon: BDAG
  rationale: La pasiva en español se expresa con naturalidad como «se ha revelado», manteniendo el valor verbal de experiencia consumada y la formulación bíblica de revelación.
theological_decisions:
- issue: Finalidad/resultado en ἵνα con lenguaje de cumplimiento
  english_pob_reading: Retain 'so that ... might be fulfilled' without resolving whether John's ἵνα expresses divine purpose, result, or both.
  chosen_spanish_reading: Mantener «para que ... se cumpliera» sin explicar si expresa propósito, resultado o ambos.
  alternative_spanish_readings:
  - de modo que ... se cumpliera
  - a fin de que ... se cumpliera
  rationale: La frase española conserva la misma tensión del griego y evita cerrar una cuestión teológica/retórica que el texto no resuelve explícitamente. La formulación queda idiomática y sobria.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Sentido de ἀκοή en la cita de Isaías
  english_pob_reading: Render as 'report' in the main text.
  chosen_spanish_reading: Renderizar como «informe» en el texto principal.
  alternative_spanish_readings:
  - oír/lo que oímos
  - mensaje
  - proclamación
  rationale: «Informe» preserva el campo semántico de ἀκοή entre audición y contenido comunicado, y permite mantener la ambigüedad profética del pasaje. No se fuerza una sola lectura estrecha.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Divine name in the Isaian citation
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Yahvé
  rationale: En la cita intertextual directa se mantiene la forma reverente «Señor», coherente con la formulación de la cita en español y con el vocativo del texto fuente. Aunque el proyecto usa «Yahvé» para יהוה en la narración principal, aquí la intertextualidad con la cita tradicional favorece conservar «Señor» dentro del discurso citado.
  doctrine_reference: Project terminology defaults; source-based exception in direct quotation
- issue: Metáfora del brazo del Señor
  english_pob_reading: the arm of the Lord
  chosen_spanish_reading: el brazo del Señor
  alternative_spanish_readings:
  - el poder del Señor
  - el brazo de Yahvé
  rationale: Se conserva la metáfora corporal y su trasfondo de acción poderosa de Dios. No se interpreta la imagen como mero 'poder', porque el griego mantiene la metáfora de forma explícita.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: El texto sigue de cerca la forma de la traducción inglesa auditada, pero ajusta la sintaxis al español natural y reevalúa ὁ λόγος como «la palabra» y τῇ ἀκοῇ ἡμῶν como «nuestro informe», manteniendo la misma ambigüedad semántica documentada en el trail. No se aplicaron revisiones posteriores al texto base.
  spanish_consistency_notes:
  - Se mantiene «Señor» dentro de la cita directa para el vocativo κύριε y «Señor» en «el brazo del Señor», siguiendo la práctica de cita bíblica directa.
  - «Se cumpliera» conserva la subordinación de ἵνα sin resolver explícitamente propósito vs. resultado.
  - La nota al pie cubre la alternativa semántica principal de ἀκοή sin duplicar marcadores.
  - Se usa puntuación española con comillas angulares y signos de interrogación dobles en la cita.
