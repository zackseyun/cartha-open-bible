translation:
  language: es
  text: Mientras tengan la luz, crean en la luz, para que lleguen a ser hijos de la luz[a]. Jesús habló estas cosas, y se fue y se escondió de ellos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hijos de luz». El griego dice «hijos de luz», un modismo para personas caracterizadas por la luz.
    reason: lexical_alternative
  - marker: b
    text: O «y después de irse, se escondió de ellos».
    reason: previous_rendering
lexical_decisions:
- source_word: ὡς
  english_pob_choice: While
  chosen_spanish: Mientras
  alternatives_spanish:
  - As lo tengas
  - Mientras que
  lexicon: BDAG
  rationale: 'En esta construcción temporal con presente, el sentido es de duración: “mientras / mientras tengan”. “Mientras” es natural en español y conserva la urgencia del contexto sin añadir una glosa interpretativa.'
- source_word: τὸ φῶς
  english_pob_choice: the light
  chosen_spanish: la luz
  alternatives_spanish:
  - la Luz
  lexicon: BDAG
  rationale: Se conserva el artículo definido y el sustantivo en sentido enfático. En Juan, “la luz” mantiene el valor teológico sin forzar una mayúscula que el griego no exige.
- source_word: πιστεύετε εἰς τὸ φῶς
  english_pob_choice: believe in the light
  chosen_spanish: crean en la luz
  alternatives_spanish:
  - crean a la luz
  - tengan fe en la luz
  lexicon: BDAG
  rationale: En español, “creer en” expresa de modo directo πιστεύω εἰς. Se evita “tener fe en” por ser más explicativo de lo que el verbo griego requiere, y se mantiene la fuerza joánica del llamado a confiar en la luz.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  lexicon: BDAG
  rationale: La cláusula expresa finalidad; “para que” es la forma más natural y fiel en español moderno.
- source_word: υἱοὶ φωτός
  english_pob_choice: sons of light
  chosen_spanish: hijos de la luz
  alternatives_spanish:
  - hijos de luz
  - hijos de la luz
  lexicon: BDAG
  rationale: Aunque el griego dice literalmente “hijos/varones” (υἱοί), en español “hijos de la luz” reproduce mejor el modismo semítico y resulta más idiomático que “hijos varones de la luz” o “hijos de luz”. Se conserva la imagen relacional sin neutralizarla con un término ajeno al giro idiomático.
- source_word: γένησθε
  english_pob_choice: may become
  chosen_spanish: lleguen a ser
  alternatives_spanish:
  - sean
  - se conviertan en
  lexicon: BDAG
  rationale: El aoristo subjuntivo de γίνομαι aquí comunica llegar a ser, no solo ser. “Lleguen a ser” conserva el matiz de proceso/resultación mejor que un simple “sean”.
- source_word: Ταῦτα ἐλάλησεν
  english_pob_choice: Jesus spoke these things
  chosen_spanish: Jesús habló estas cosas
  alternatives_spanish:
  - Jesús dijo estas cosas
  lexicon: BDAG
  rationale: λαλέω se traduce aquí por “habló”, reflejando el acto de hablar más que el contenido puntual de “decir”. “Estas cosas” reproduce el demostrativo neutro plural con naturalidad en español bíblico contemporáneo.
- source_word: ἀπελθὼν
  english_pob_choice: and he departed
  chosen_spanish: se fue
  alternatives_spanish:
  - después de irse
  - habiéndose ido
  lexicon: BDAG
  rationale: El participio aoristo anterior al verbo principal indica acción previa; en español, la coordinación natural “se fue y se escondió” comunica esa secuencia sin sonar forzada. “Se fue” es la manera más fluida de expresar ἀπελθών en este contexto narrativo.
- source_word: ἐκρύβη ἀπ’ αὐτῶν
  english_pob_choice: he hid from them
  chosen_spanish: se escondió de ellos
  alternatives_spanish:
  - se ocultó de ellos
  - se escondió de su presencia
  lexicon: BDAG
  rationale: Aunque la forma es pasiva, el uso contextual funciona con sentido intransitivo/reflexivo. “Se escondió de ellos” evita una pasiva artificial en español y conserva la acción narrativa.
theological_decisions:
- issue: 'υἱοὶ φωτός: preservación del modismo con fuerza representativa'
  english_pob_reading: sons of light
  chosen_spanish_reading: hijos de la luz
  alternative_spanish_readings:
  - hijos de luz
  rationale: El griego emplea el masculino plural υἱοί. En español, “hijos de la luz” conserva la imagen idiomática y el vínculo de pertenencia/identidad sin perder la claridad. Se evita “personas de la luz” porque diluye el giro del texto y borra la forma léxica del original.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (gender-accurate over gender-neutral, with idiomatic Spanish when required)
- issue: 'πιστεύετε εἰς τὸ φῶς: llamada a la fe/confianza'
  english_pob_reading: believe in the light
  chosen_spanish_reading: crean en la luz
  alternative_spanish_readings:
  - tengan fe en la luz
  - confíen en la luz
  rationale: “Creer en” es la equivalencia más directa de πιστεύω εἰς en Juan y mantiene el llamado a una respuesta de fe. No se expande a “confiar” o “tener fe” porque eso introduce una paráfrasis que no añade claridad necesaria al español.
  doctrine_reference: 'DOCTRINE.md Contested terms: πίστις → faith; preserve alternatives where contested'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el griego y el audit trail inglés: conserva el valor temporal de ὡς, el llamado joánico πιστεύετε εἰς τὸ φῶς, la finalidad de ἵνα y la secuencia narrativa de ἀπελθών + ἐκρύβη. También toma en cuenta la revisión inglesa que prefirió una coordinación verbal más natural; por eso el español usa ‘se fue y se escondió’ en lugar de una subordinación más pesada.'
  spanish_consistency_notes:
  - Se usa ‘la luz’ de forma consistente con el motivo joánico sin mayúscula no requerida por el texto base.
  - Se prefirió ‘hijos de la luz’ como equivalente idiomático de υἱοὶ φωτός, manteniendo el matiz representativo masculino del griego pero expresándolo en un español natural.
  - ‘Crean en’ conserva la sintaxis bíblica de πιστεύω εἰς sin cargarla con una glosa doctrinal adicional.
  - La secuencia verbal final evita una pasiva poco natural en español y preserva el matiz narrativo del participio aoristo seguido del verbo principal.
