review_pass:
  verdict: revise
  source_alignment_summary: 'La estructura condicional doble, el mandato «que me siga», la promesa locativa «donde yo estoy, allí también estará…», y «el Padre lo honrará» están bien reflejados. Sin embargo, el borrador se desvía en un punto léxico importante: διάκονος aquí, según el expediente auditado en inglés, significa «servant/servidor/siervo» en sentido general, no «esclavo». El griego usa διακονέω/διάκονος, no δοῦλος; por tanto, «esclavo» introduce una fuerza semántica ajena al término fuente en este versículo.'
  spanish_quality_summary: El español es claro y natural, con buena fluidez y puntuación. «Si alguien me sirve… que me siga» y «allí también» funcionan bien. La única aspereza relevante es «mi esclavo», que suena más duro de lo que el contexto y el léxico griego justifican aquí; «mi servidor» o «mi siervo» mejora la fidelidad y la lectura.
  glossary_alignment: 'Buena alineación general con terminología del proyecto: «Padre», «honrará», «sirve». No obstante, la preferencia del proyecto por «esclavo» aplica cuando la base léxica es δοῦλος o cuando el inglés POB ya documentó «slave»; aquí el expediente inglés documenta explícitamente διάκονος = «servant», no oficio eclesiástico ni esclavitud. Por eso debe corregirse a «servidor» o «siervo»; «servidor» es más natural y moderno en español neutro.'
  issues:
  - severity: high
    issue: «διάκονος» fue traducido como «esclavo»
    rationale: El término fuente es διάκονος, y el POB en inglés lo fijó como «servant» con rechazo explícito de lecturas más técnicas. «Esclavo» corresponde normalmente a δοῦλος y cambia indebidamente el matiz semántico, intensificando la relación de servidumbre más allá del texto.
  - severity: medium
    issue: La justificación léxica española para «esclavo» contradice el expediente auditado
    rationale: La nota de decisión apela a una preferencia general del proyecto, pero aquí esa preferencia no aplica porque el expediente inglés ya delimitó el sentido contextual de διάκονος. Conviene alinear la decisión española con la evidencia de fuente y la racionalidad documentada.
  revised_spanish_text: Si alguien me sirve[a], que me siga; y donde yo estoy, allí también estará mi servidor. Si alguien me sirve, el Padre lo honrará.
  revised_footnotes:
  - marker: a
    text: 'El griego usa una construcción genérica en singular masculino: «si alguien me sirve ... el Padre lo honrará».'
    reason: lexical_alternative
  revision_rationale: Se corrige únicamente «mi esclavo» a «mi servidor» para reflejar con precisión διάκονος, en conformidad con el expediente inglés («servant») y evitando importar el matiz de δοῦλος. El resto del versículo es fiel, natural y teológicamente adecuado. No se requieren cambios en la nota, porque la observación sobre el singular masculino genérico sigue siendo válida.
