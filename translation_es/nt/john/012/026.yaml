translation:
  language: es
  text: Si alguien me sirve[a], que me siga; y donde yo estoy, allí también estará mi servidor. Si alguien me sirve, el Padre lo honrará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego usa una construcción genérica en singular masculino: «si alguien me sirve ... el Padre lo honrará».'
    reason: lexical_alternative
lexical_decisions:
- source_word: διακονῇ
  english_pob_choice: serves
  chosen_spanish: sirve
  alternatives_spanish:
  - presta servicio
  - ministeria a
  lexicon: BDAG
  rationale: διακονέω aquí expresa prestar servicio a Jesús. «Sirve» es natural en español moderno y conserva el valor relacional sin restringirlo a un oficio eclesiástico. «Presta servicio» es más explícito pero menos fluido; «ministeria a» suena demasiado técnico o litúrgico.
- source_word: ἀκολουθείτω
  english_pob_choice: let him follow
  chosen_spanish: que me siga
  alternatives_spanish:
  - que siga siguiéndome
  - debe seguirme
  lexicon: BDAG
  rationale: El imperativo presente pide discipulado continuo. «Que me siga» reproduce bien la fuerza exhortativa en español idiomático. «Que siga siguiéndome» explicita la continuidad, pero resulta pesado; «debe seguirme» añade obligación más fuerte de la que el griego exige.
- source_word: διάκονος
  english_pob_choice: servant
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - servidor
  lexicon: BDAG
  rationale: Aunque διάκονος puede significar «siervo» o «servidor», el marco auditado de la POB privilegia «esclavo» cuando el término de servicio tiene fuerza lexical marcada y personal. Aquí mantiene la relación de pertenencia y servicio al Señor con mayor intensidad que «siervo».
- source_word: ὅπου εἰμὶ ἐγὼ
  english_pob_choice: where I am
  chosen_spanish: donde yo estoy
  alternatives_spanish:
  - donde estoy yo
  lexicon: BDAG
  rationale: «Donde yo estoy» es la forma más natural en español y conserva el énfasis de ἐγώ sin sobrecargar la sintaxis. «Donde estoy yo» también es posible, pero la colocación elegida suena más fluida.
- source_word: ἐκεῖ καὶ
  english_pob_choice: there ... also
  chosen_spanish: allí también
  alternatives_spanish:
  - allí igualmente
  - allí asimismo
  lexicon: BDAG
  rationale: La combinación de adverbio locativo y καί aditivo se refleja con «allí también». Mantiene el paralelismo con el griego sin forzar un calco rígido.
- source_word: τιμήσει
  english_pob_choice: will honor
  chosen_spanish: lo honrará
  alternatives_spanish:
  - lo valorará
  - le rendirá honor
  lexicon: BDAG
  rationale: τιμάω aquí significa honrar o conceder honor. «Lo honrará» es directo y fiel. «Le rendirá honor» es más explícito, pero menos natural; «lo valorará» estrecha indebidamente el sentido.
- source_word: ὁ πατήρ
  english_pob_choice: the Father
  chosen_spanish: el Padre
  alternatives_spanish:
  - su Padre
  lexicon: BDAG
  rationale: 'El griego dice simplemente «el Padre», sin añadir posesivo. Se conserva la forma precisa del texto y la referencia joánica habitual sin introducir «su». '
- source_word: τις
  english_pob_choice: anyone
  chosen_spanish: alguien
  alternatives_spanish:
  - cualquiera
  - si alguno
  lexicon: BDAG
  rationale: El indefinido es masculino en la forma, pero genérico en función. «Alguien» comunica bien el sentido inclusivo en español y evita una formulación demasiado rígida. «Si alguno» es posible, pero más arcaizante.
- source_word: αὐτὸν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - le
  - a esa persona
  lexicon: BDAG
  rationale: El pronombre retoma el sujeto genérico singular; en español, el objeto directo normal es «lo». Aunque el referente sea humano y genérico, «lo» preserva la referencia singular del original sin introducir una paráfrasis.
theological_decisions:
- issue: Referencia genérica masculina en el condicional
  english_pob_reading: Use 'anyone' for τις but retain 'him' for the subsequent masculine pronouns.
  chosen_spanish_reading: Usar «alguien» para τις y conservar un referente singular masculino/gramatical en el verbo y el pronombre objeto («lo»).
  alternative_spanish_readings:
  - «Si alguien me sirve, ellos deberían seguirme ... el Padre los honrará»
  - «Si cualquiera me sirve, esa persona me seguirá ... el Padre la honrará»
  rationale: El griego usa un indefinido genérico con concordancias masculinas singulares. En español, «alguien» hace natural la introducción, pero el referente singular del original se conserva en la continuidad pronominal. La formulación evita neutralizar artificialmente la estructura del texto.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
- issue: Naturaleza del honor prometido
  english_pob_reading: Render the promise straightforwardly as 'the Father will honor him' without expanding its nature.
  chosen_spanish_reading: Traducir sencillamente «el Padre lo honrará» sin especificar la clase de honor.
  alternative_spanish_readings:
  - «el Padre lo glorificará»
  - «el Padre le dará recompensa»
  rationale: El versículo promete honor divino, pero no define aquí la forma exacta. La traducción conserva la amplitud teológica del griego y no resuelve indebidamente la promesa en una sola categoría doctrinal.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'Revisión más reciente: sin cambios necesarios; acuerdo alto con la auditoría inglesa y el control cruzado.'
  spanish_consistency_notes:
  - Se mantuvo un registro digno y moderno, sin calcos innecesarios.
  - Se preservó la fuerza relacional de διακονέω y el seguimiento discipular de ἀκολουθέω.
  - Se conservó la referencia al Padre sin posesivo añadido, conforme al griego.
  - Se respetó la tensión del singular genérico sin neutralizarla artificialmente.
