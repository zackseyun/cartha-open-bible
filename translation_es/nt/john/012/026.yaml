revisions:
- from: Si alguien me sirve[a], que me siga; y donde yo estoy, allí también estará mi esclavo. Si alguien me sirve, el Padre lo honrará.
  to: Si alguien me sirve[a], que me siga; y donde yo estoy, allí también estará mi servidor. Si alguien me sirve, el Padre lo honrará.
  rationale: Se corrige únicamente «mi esclavo» a «mi servidor» para reflejar con precisión διάκονος, en conformidad con el expediente inglés («servant») y evitando importar el matiz de δοῦλος. El resto del versículo es fiel, natural y teológicamente adecuado. No se requieren cambios en la nota, porque la observación sobre el singular masculino genérico sigue siendo válida.
