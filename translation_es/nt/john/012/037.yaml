translation:
  language: es
  text: Aunque había hecho tantas señales delante de ellos, no creían[a] en él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no creyeron en él»; el verbo griego está en imperfecto, lo que puede sugerir incredulidad continua o repetida.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοσαῦτα
  english_pob_choice: so many
  chosen_spanish: tantas
  alternatives_spanish:
  - tan numerosas
  - tantas y tantas
  lexicon: BDAG
  rationale: τοσαῦτα expresa cantidad grande e intensiva; «tantas» comunica de manera natural la abundancia de señales sin sobreexplicar ni sonar forzado en español.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Aunque
  alternatives_spanish:
  - Pero
  - Y sin embargo
  lexicon: BDAG
  rationale: La relación adversativa se integra mejor en español mediante una concesiva. «Aunque» conserva el giro de contraste entre las señales y la incredulidad, como en la lectura inglesa revisada.
- source_word: σημεῖα
  english_pob_choice: signs
  chosen_spanish: señales
  alternatives_spanish:
  - milagros
  - signos
  lexicon: BDAG
  rationale: En Juan, σημεῖα conserva valor teológico de acto revelador. «Señales» es el equivalente más natural y también mantiene la idea de que los hechos apuntan más allá de sí mismos.
- source_word: πεποιηκότος
  english_pob_choice: had done
  chosen_spanish: había hecho
  alternatives_spanish:
  - había realizado
  - habiendo hecho
  lexicon: BDAG
  rationale: El participio perfecto en genitivo absoluto indica acción previa con relevancia presente. «Había hecho» reproduce bien ese trasfondo temporal y la concesión implícita en el contexto.
- source_word: ἔμπροσθεν αὐτῶν
  english_pob_choice: before them
  chosen_spanish: delante de ellos
  alternatives_spanish:
  - en su presencia
  - ante ellos
  lexicon: BDAG
  rationale: La frase señala publicidad y visibilidad. «Delante de ellos» es idiomático en español y mantiene la idea de que las señales fueron hechas abiertamente.
- source_word: οὐκ ἐπίστευον
  english_pob_choice: did not believe
  chosen_spanish: no creían
  alternatives_spanish:
  - no creyeron
  - seguían sin creer
  lexicon: BDAG
  rationale: El imperfecto sugiere incredulidad continua o reiterada. «No creían» preserva mejor ese aspecto durativo que un simple pretérito, sin cargar el texto con una paráfrasis excesiva.
- source_word: εἰς αὐτόν
  english_pob_choice: in him
  chosen_spanish: en él
  alternatives_spanish:
  - hacia él
  lexicon: BDAG
  rationale: La construcción joánica πιστεύω + εἰς se rinde de forma estable como «creer en». «En él» preserva la relación de confianza y adhesión hacia Jesús.
theological_decisions:
- issue: Valor aspectual del imperfecto en la incredulidad
  english_pob_reading: They did not believe in him
  chosen_spanish_reading: no creían en él
  alternative_spanish_readings:
  - no creyeron en él
  - seguían sin creer en él
  rationale: El texto subraya una incredulidad persistente frente a muchas señales. «No creían» deja abierta esa continuidad aspectual sin añadir una intención psicológica más fuerte de la que el griego explicita.
  doctrine_reference: Preservar la tensión textual; no suavizar ni intensificar más allá del griego.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente que prefirió un pretérito simple por naturalidad («did not believe»), pero el español puede preservar con mayor naturalidad el matiz imperfectivo mediante «no creían». Se mantuvo la concesiva inicial con «Aunque» para reflejar el contraste sin repetir una conjunción adversativa redundante.
  spanish_consistency_notes:
  - Se usó «señales» para σημεῖα, conforme al uso joánico y a la terminología POB.
  - Se mantuvo «creer en» como equivalente estable de πιστεύω εἰς.
  - Se evitó «SEÑOR» o sustituciones litúrgicas no justificadas por el texto.
  - El estilo es publicable y fluido en español, sin mecanicismos innecesarios.
