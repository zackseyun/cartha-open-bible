translation:
  language: es
  text: Entonces la multitud que había estado con él cuando llamó a Lázaro fuera del sepulcro y lo levantó de entre los muertos daba testimonio[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «testificaba»; el verbo griego puede denotar dar testimonio o testificar, un tema recurrente en Juan.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμαρτύρει
  english_pob_choice: was bearing witness
  chosen_spanish: daba testimonio
  alternatives_spanish:
  - testificaba
  - seguía dando testimonio
  lexicon: BDAG
  rationale: El imperfecto griego expresa una acción en curso o repetida; en español, «daba testimonio» conserva ese valor aspectual con un verbo natural y además mantiene el campo semántico johánico de μαρτυρέω. «Testificaba» es posible, pero suena más jurídico y menos idiomático aquí.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Entonces
  alternatives_spanish:
  - Por tanto
  - Así que
  lexicon: BDAG
  rationale: Marca la continuidad narrativa e inferencial. «Entonces» es natural en español moderno y reproduce el flujo del relato sin añadir solemnidad excesiva.
- source_word: ὁ ὄχλος
  english_pob_choice: the crowd
  chosen_spanish: la multitud
  alternatives_spanish:
  - la gente
  - el gentío
  lexicon: BDAG
  rationale: ὄχλος puede ser «multitud» o «muchedumbre». «Multitud» es claro, culto y plenamente apto en un registro bíblico contemporáneo. Se evita «gente» por ser más vago.
- source_word: ὁ ὢν μετ’ αὐτοῦ
  english_pob_choice: that had been with him
  chosen_spanish: que estaba con él
  alternatives_spanish:
  - que había estado con él
  - que se hallaba con él
  lexicon: BDAG
  rationale: El participio articular identifica a ese grupo específico. En español, la forma natural es «que estaba con él»; aunque el inglés POB usa una referencia retrospectiva clara, el contexto ya sitúa el recuerdo del evento anterior, de modo que la simple copresencia resulta suficiente y fiel. «Había estado» enfatizaría más explícitamente la anterioridad, pero no es obligatoria por el griego.
- source_word: ὅτε
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - al tiempo que
  - en el momento en que
  lexicon: BDAG
  rationale: Conjunción temporal directa y estándar.
- source_word: ἐφώνησεν
  english_pob_choice: he called
  chosen_spanish: llamó
  alternatives_spanish:
  - clamó
  - gritó
  lexicon: BDAG
  rationale: φωνέω aquí indica que Jesús llamó a Lázaro; «llamó» es la opción más directa y sobria en español. «Clamó» o «gritó» agregarían intensidad no exigida por el verbo.
- source_word: ἐκ τοῦ μνημείου
  english_pob_choice: out of the tomb
  chosen_spanish: desde el sepulcro
  alternatives_spanish:
  - del sepulcro
  - fuera del sepulcro
  - de la tumba
  lexicon: BDAG
  rationale: El sustantivo μνημεῖον puede rendirse como «sepulcro» o «tumba». Aquí, «desde el sepulcro» preserva la idea de movimiento desde el lugar funerario al responder al llamado. «Tumba» también sería posible, pero «sepulcro» suena más solemne y cercano al registro bíblico.
- source_word: ἤγειρεν
  english_pob_choice: raised
  chosen_spanish: levantó
  alternatives_spanish:
  - resucitó
  - lo hizo salir
  lexicon: BDAG
  rationale: ἐγείρω en contextos de resurrección puede traducirse como «levantó» para mantener la imagen verbal básica de levantar/despertar y evitar una paráfrasis excesiva. En español, «resucitó» es teológicamente claro, pero aquí la construcción griega es más concreta y coordinada con el llamado previo. «Levantó» también conserva la tensión narrativa sin expandirla.
- source_word: ἐκ νεκρῶν
  english_pob_choice: from the dead
  chosen_spanish: de entre los muertos
  alternatives_spanish:
  - de los muertos
  - entre los muertos
  lexicon: BDAG
  rationale: La locución idiomática española «de entre los muertos» preserva mejor la fuerza del plural griego y la imagen de salida desde la esfera de los muertos. «De los muertos» sería menos expresiva; «entre los muertos» sin «de» suena incompleta.
theological_decisions:
- issue: Expresión de la acción milagrosa de Jesús sobre Lázaro
  english_pob_reading: raised him from the dead
  chosen_spanish_reading: lo levantó de entre los muertos
  alternative_spanish_readings:
  - lo resucitó de entre los muertos
  - lo levantó de los muertos
  rationale: El griego afirma claramente el acto milagroso sin detallar una explicación doctrinal adicional. «Lo levantó de entre los muertos» conserva la imaginería de ἐγείρω y la salida desde la esfera de la muerte, sin perder la afirmación de resurrección. «Resucitó» es una alternativa válida, pero en este versículo la coordinación con el llamado y el verbo específico favorecen una solución más literal-concreta.
  doctrine_reference: Afirmaciones; Traducción por equivalencia óptima §§1, 3, 6
- issue: Testimonio continuo de la multitud
  english_pob_reading: was bearing witness
  chosen_spanish_reading: daba testimonio
  alternative_spanish_readings:
  - testificaba
  - seguía dando testimonio
  rationale: El imperfecto presenta una acción en curso o reiterada. En el contexto de Juan, el lenguaje de testimonio es teológicamente importante; «daba testimonio» conserva esa dimensión sin convertir el verbo en un tecnicismo jurídico ajeno al estilo del pasaje.
  doctrine_reference: Tema joánico del testimonio; Traducción por equivalencia óptima §§1, 4
translation_notes:
  revision_awareness: El texto base en inglés y la revisión más reciente coinciden en sentido y no requieren cambios; la elección española sigue de cerca el griego y el análisis auditado, evitando tanto la paráfrasis como el calco rígido. Se mantuvo la progresión narrativa, el imperfecto de μαρτυρέω y la imagen concreta de ἐγείρω con una solución española natural.
  spanish_consistency_notes:
  - Se usa «sepulcro» en lugar de «tumba» por registro bíblico y por la posibilidad de mantener la preposición de origen («desde»).
  - Se mantiene «de entre los muertos» para reflejar el plural griego νεκρῶν y evitar una simplificación singularizante.
  - «Daba testimonio» conserva la red semántica joánica de μαρτυρέω sin forzar un estilo arcaizante.
