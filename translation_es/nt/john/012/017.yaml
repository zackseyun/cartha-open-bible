revisions:
- from: Entonces la multitud que estaba con él cuando llamó a Lázaro desde el sepulcro y lo levantó de entre los muertos daba testimonio[a].
  to: Entonces la multitud que había estado con él cuando llamó a Lázaro fuera del sepulcro y lo levantó de entre los muertos daba testimonio[a].
  rationale: Se ajusta la referencia temporal de la multitud para reflejar mejor el contexto retrospectivo del participio articular, y se corrige «desde el sepulcro» a «fuera del sepulcro» para representar con fidelidad y naturalidad el ἐκ τοῦ μνημείου. Se conserva «daba testimonio» por su buen ajuste al imperfecto y al vocabulario joánico, así como «lo levantó de entre los muertos», que sigue siendo una opción española aceptable y fiel.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:04:57Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura general del griego y preserva el valor imperfectivo de ἐμαρτύρει con «daba testimonio». También mantiene adecuadamente «de entre los muertos». Sin embargo, dos elecciones no reflejan bien el sentido fuente: «que estaba con él» atenúa la anterioridad implícita del participio en este contexto narrativo, y «desde el sepulcro» no expresa con naturalidad ni precisión el movimiento de ἐκ τοῦ μνημείου, que aquí pide «fuera del sepulcro» o «del sepulcro».'
  spanish_quality_summary: El español es claro y digno, pero «desde el sepulcro» suena poco idiomático en este contexto. «Que había estado con él» y «llamó a Lázaro fuera del sepulcro» mejoran la naturalidad y la precisión. El resto del versículo fluye bien y conserva el tono bíblico contemporáneo.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Daba testimonio» se alinea bien con el tema joánico de μαρτυρέω. «Levantó» es aceptable aquí, aunque «resucitó» también sería posible; no requiere cambio obligado. «Sepulcro» encaja en registro bíblico, pero debe construirse mejor con ἐκ.
  issues:
  - severity: medium
    issue: «que estaba con él»
    rationale: Aunque formalmente posible, en este contexto retrospectivo el español necesita expresar mejor que se trata de la multitud que había acompañado a Jesús en el evento previo. «Que había estado con él» refleja mejor la referencia narrativa sin sobretraducir.
  - severity: high
    issue: «llamó a Lázaro desde el sepulcro»
    rationale: La preposición «desde» sugiere el punto de origen de la voz de Jesús, no el movimiento de salida de Lázaro que expresa ἐκ τοῦ μνημείου con el verbo «llamar». En español natural y fiel conviene «llamó a Lázaro fuera del sepulcro».
  revised_spanish_text: Entonces la multitud que había estado con él cuando llamó a Lázaro fuera del sepulcro y lo levantó de entre los muertos daba testimonio[a].
  revised_footnotes:
  - marker: a
    text: O «testificaba»; el verbo griego puede denotar dar testimonio o testificar, un tema recurrente en Juan.
    reason: lexical_alternative
  revision_rationale: Se ajusta la referencia temporal de la multitud para reflejar mejor el contexto retrospectivo del participio articular, y se corrige «desde el sepulcro» a «fuera del sepulcro» para representar con fidelidad y naturalidad el ἐκ τοῦ μνημείου. Se conserva «daba testimonio» por su buen ajuste al imperfecto y al vocabulario joánico, así como «lo levantó de entre los muertos», que sigue siendo una opción española aceptable y fiel.
