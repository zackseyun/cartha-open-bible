translation:
  language: es
  text: ¿Por qué no se vendió este perfume por trescientos denarios[a] y se dio a los pobres?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Un denario era el salario diario normal de un trabajador; trescientos denarios equivalían aproximadamente a las ganancias de un año, descontando los días no trabajados.
    reason: cultural_note
lexical_decisions:
- source_word: Διὰ τί
  english_pob_choice: Why
  chosen_spanish: ¿Por qué... ?
  alternatives_spanish:
  - ¿Por qué razón... ?
  - ¿A qué viene que... ?
  lexicon: BDAG
  rationale: La pregunta griega es una interrogativa idiomática de causa o motivo; «¿Por qué...?» reproduce de manera natural y directa la fuerza retórica en español sin añadir matiz explicativo innecesario.
- source_word: μύρον
  english_pob_choice: perfume
  chosen_spanish: perfume
  alternatives_spanish:
  - ungüento
  - aceite aromático
  lexicon: BDAG
  rationale: En este contexto se trata de una sustancia aromática costosa para ungir; «perfume» es natural en español contemporáneo y conserva el valor de producto aromático valioso que la POB ya documentó en inglés.
- source_word: ἐπράθη
  english_pob_choice: was sold
  chosen_spanish: no se vendió
  alternatives_spanish:
  - fue vendido
  - no fue vendido
  lexicon: BDAG
  rationale: El aoristo pasivo de πιπράσκω expresa la venta del perfume. En español, la pasiva refleja es la forma más natural y clara para conservar el valor pasivo del griego.
- source_word: τριακοσίων δηναρίων
  english_pob_choice: for three hundred denarii
  chosen_spanish: por trescientos denarios
  alternatives_spanish:
  - por trescientos días de salario
  - por trescientos monedas de denario
  lexicon: BDAG
  rationale: Se mantiene el término histórico «denarios» para no aplanar la referencia monetaria. La preposición «por» expresa el precio de manera idiomática en español y sigue de cerca la estructura del griego.
- source_word: ἐδόθη
  english_pob_choice: given
  chosen_spanish: se dio
  alternatives_spanish:
  - fue dado
  - se entregó
  lexicon: BDAG
  rationale: El aoristo pasivo de δίδωμι se expresa de forma natural con la pasiva refleja «se dio», que conserva la sencillez del original y funciona bien con el complemento dativo implícito en la frase.
- source_word: πτωχοῖς
  english_pob_choice: to the poor
  chosen_spanish: a los pobres
  alternatives_spanish:
  - a los necesitados
  - a los pobres de entre ellos
  lexicon: BDAG
  rationale: «A los pobres» es la equivalencia idiomática directa para el plural sustantivado y preserva la categoría social marcada por el griego sin ampliar el significado.
translation_notes:
  revision_awareness: La revisión más reciente del texto en inglés no introdujo cambios; el punto de control final indica alta coincidencia con el original y sin revisiones necesarias. Por eso la redacción española mantiene la misma estructura semántica básica del pasaje, sin ampliar ni suavizar el reproche implícito.
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque aquí no aparece el nombre divino ni un título que lo requiera.
  - Se conserva la unidad monetaria histórica «denarios» en el cuerpo principal y se reserva la explicación equivalente para la nota.
  - La pasiva refleja española se usa en ambos verbos principales para reflejar el pasivo griego sin forzar un orden artificial.
  - «Pobres» se mantiene como categoría sustantivada, en paralelo con el griego πτωχοῖς.
