- from: Por este motivo también la multitud salió a su encuentro[a], porque habían oído que Jesús había hecho este signo[b].
  to: Por este motivo también la multitud fue a su encuentro[a], porque habían oído que él había hecho este signo[b].
  rationale: Se corrige una explicitación innecesaria («Jesús») para ceñirse mejor al griego, y se mejora la naturalidad de ὑπήντησεν con «fue a su encuentro», que mantiene el matiz direccional sin sonar forzado. También se pule la nota léxica correspondiente para que las alternativas sean idiomáticas en español.
