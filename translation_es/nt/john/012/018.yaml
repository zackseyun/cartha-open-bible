  - severity: low
    issue: 'La nota [a] contiene una alternativa algo forzada: «salió al encuentro de él».'
    rationale: En español natural sería «salió a su encuentro» o «salió a encontrarlo». La forma actual es comprensible, pero poco idiomática.
