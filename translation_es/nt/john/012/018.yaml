translation:
  language: es
  text: Por este motivo también la multitud fue a su encuentro[a], porque habían oído que él había hecho este signo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la multitud se encontró con él» o «la multitud salió a su encuentro». El verbo griego incluye la idea de ir hacia alguien para encontrarlo.'
    reason: lexical_alternative
  - marker: b
    text: «Signo» es el término característico de Juan para una obra milagrosa que apunta más allá de sí misma a la identidad y la misión de Jesús; alternativamente, «milagro».
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τοῦτο
  english_pob_choice: For this reason
  chosen_spanish: Por este motivo
  alternatives_spanish:
  - Por esta razón
  - Por eso
  lexicon: BDAG
  rationale: διά con acusativo y demostrativo expresa una relación causal con el contexto anterior. «Por este motivo» conserva esa fuerza causal de manera natural en español y mantiene la referencia retrospectiva.
- source_word: καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - además
  - incluso
  lexicon: BDAG
  rationale: El valor aditivo de καί encaja bien con «también», que conserva el énfasis sin exagerarlo.
- source_word: ὑπήντησεν
  english_pob_choice: went to meet
  chosen_spanish: salió a su encuentro
  alternatives_spanish:
  - fue a encontrarlo
  - lo fue a ver
  lexicon: BDAG
  rationale: ὑπαντάω incluye la idea de ir al encuentro de alguien. «Salió a su encuentro» comunica de forma natural la dirección implícita sin perder el matiz del verbo.
- source_word: αὐτῷ
  english_pob_choice: him
  chosen_spanish: a su
  alternatives_spanish:
  - a él
  - de él
  lexicon: BDAG
  rationale: El dativo se integra naturalmente en español con la construcción fija «salir al encuentro de alguien»; el referente es Jesús, ya implícito en el contexto inmediato.
- source_word: ὁ ὄχλος
  english_pob_choice: the crowd
  chosen_spanish: la multitud
  alternatives_spanish:
  - la gente
  - el gentío
  lexicon: BDAG
  rationale: ὄχλος puede traducirse como «multitud» en un registro bíblico claro y digno. Aunque «multitud» es algo más tradicional que «crowd», aquí mantiene la referencia a un grupo numeroso reunido en torno a Jesús.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - pues
  lexicon: BDAG
  rationale: Aquí ὅτι introduce la causa de la acción de la multitud. «Porque» expresa directamente ese valor causal.
- source_word: ἤκουσαν
  english_pob_choice: they heard
  chosen_spanish: habían oído
  alternatives_spanish:
  - oyeron
  - escucharon
  lexicon: BDAG
  rationale: 'Aunque el aoristo puede reflejarse con pretérito simple, el contexto causal queda más claro en español con pluscuamperfecto: el oído del hecho precede lógicamente a la salida de la multitud.'
- source_word: τοῦτο
  english_pob_choice: this
  chosen_spanish: este
  alternatives_spanish:
  - eso
  - aquello
  lexicon: BDAG
  rationale: El demostrativo señala el hecho inmediatamente referido en el contexto. «Este» conserva esa proximidad deíctica en español.
- source_word: πεποιηκέναι
  english_pob_choice: had done
  chosen_spanish: había hecho
  alternatives_spanish:
  - había realizado
  - había obrado
  lexicon: BDAG
  rationale: El infinitivo perfecto comunica una acción completada con relevancia presente. «Había hecho» es la forma más natural y directa en español.
- source_word: τὸ σημεῖον
  english_pob_choice: this sign
  chosen_spanish: este signo
  alternatives_spanish:
  - este milagro
  - esta señal
  lexicon: BDAG
  rationale: 'En Juan, σημεῖον conserva su valor teológico de «signo»: un acto milagroso con sentido revelador. «Signo» es preferible a «milagro» porque mantiene esa carga joánica sin reducir el término a lo portentoso.'
theological_decisions:
- issue: Valor joánico de σημεῖον
  english_pob_reading: sign
  chosen_spanish_reading: signo
  alternative_spanish_readings:
  - milagro
  - señal
  rationale: El Evangelio de Juan usa σημεῖον para resaltar la función reveladora de las obras de Jesús. «Signo» transmite mejor esa dimensión teológica que «milagro», que enfatizaría solo el carácter extraordinario del acto.
  doctrine_reference: Juan 2:11; 20:30-31; filosofía de traducción §1, §5
translation_notes:
  revision_awareness: Este borrador sigue de cerca el texto griego de SBLGNT y toma como contexto auditado la decisión inglesa de priorizar la fuerza causal de διὰ τοῦτο, el matiz direccional de ὑπαντάω y el valor teológico de σημεῖον. Se ajusta el tiempo verbal a un pluscuamperfecto español natural y se mantiene la lectura joánica de «signo».
  spanish_consistency_notes:
  - Se conserva «Jesús» como referente implícito del pronombre dativo, en armonía con el contexto joánico inmediato.
  - «Signo» se usa de modo consistente con la terminología POB para σημεῖον en Juan.
  - La construcción «salió a su encuentro» comunica el movimiento implícito de ὑπήντησεν sin añadir detalles no presentes en el verso.
