translation:
  language: es
  text: 'Entonces Jesús, habiendo encontrado un asno joven[a], se sentó sobre él, tal como está escrito:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un pollino». El griego ὀνάριον se refiere a un asno, a menudo joven.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὑρὼν
  english_pob_choice: having found
  chosen_spanish: habiendo encontrado
  alternatives_spanish:
  - después de encontrar
  - encontrado
  lexicon: BDAG
  rationale: El participio aoristo modificado al inicio indica una acción previa a la del verbo principal. «Habiendo encontrado» conserva esa secuencia temporal en un español natural y formal.
- source_word: δὲ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Ahora
  - Pero
  lexicon: BDAG
  rationale: Aquí δέ enlaza el relato y lo hace avanzar; «Entonces» reproduce ese matiz narrativo sin forzar contraste.
- source_word: ὀνάριον
  english_pob_choice: a young donkey
  chosen_spanish: un burrito
  alternatives_spanish:
  - un asnillo
  - un potrillo de burro
  - un asno joven
  lexicon: BDAG
  rationale: ὀνάριον es un diminutivo de ὄνος y suele referirse a un burro joven. «Burrito» comunica de manera natural la idea de tamaño/juventud en español, aunque puede sonar afectivo; se mantiene por claridad y por su equivalencia funcional. Se evita «donkey» transliterado o una paráfrasis excesivamente técnica.
- source_word: ἐκάθισεν ἐπ’ αὐτό
  english_pob_choice: sat on it
  chosen_spanish: se sentó sobre él
  alternatives_spanish:
  - se montó en él
  - se sentó encima de él
  lexicon: BDAG
  rationale: El giro griego es directo. «Se sentó sobre él» conserva la sencillez del original sin convertirlo en una interpretación más específica como «se montó».
- source_word: καθώς ἐστιν γεγραμμένον
  english_pob_choice: just as it is written
  chosen_spanish: tal como está escrito
  alternatives_spanish:
  - como está escrito
  - justamente como está escrito
  lexicon: BDAG
  rationale: La fórmula de cita bíblica se expresa de forma natural con «tal como está escrito», que preserva el valor comparativo de καθώς y la referencia escrituraria de γεγραμμένον.
- source_word: ὁ Ἰησοῦς
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - el Jesús
  lexicon: BDAG
  rationale: Nombre propio; en español no se conserva el artículo griego en el texto narrativo corriente.
theological_decisions:
- issue: Correspondencia entre la acción de Jesús y la Escritura citada
  english_pob_reading: The verse presents Jesus' action and then introduces the written citation formula without explicitly stating motive, preserving prophetic correspondence without over-explaining intent.
  chosen_spanish_reading: La traducción mantiene la relación de correspondencia entre la acción y la Escritura, sin añadir que Jesús la ejecutó explícitamente como una representación profética consciente.
  alternative_spanish_readings:
  - Jesús hizo esto para cumplir la profecía
  - Jesús actuó deliberadamente para cumplir lo escrito
  rationale: El griego solo afirma la secuencia de hechos y la fórmula citacional. No conviene sobretraducir la intención de Jesús más allá de lo que el texto dice.
  doctrine_reference: Preservar la tensión textual sin resolverla de manera interpretativa.
translation_notes:
  revision_awareness: El texto coincide sustancialmente con la tradición auditada en inglés; no se observan revisiones materiales que alteren la equivalencia. Se conserva la misma cautela teológica sobre la relación entre la acción de Jesús y la cita escritural.
  spanish_consistency_notes:
  - Se usa «Jesús» sin artículo, como nombre propio en español.
  - Se mantiene «escrito» en fórmula bíblica estándar, evitando una paráfrasis más libre.
  - «Burrito» se eligió por naturalidad y cercanía semántica; la nota ofrece la alternativa más literal.
  - No se introduce «cumplir» en el cuerpo del versículo para no cargar la intención del texto.
