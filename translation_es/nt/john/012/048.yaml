translation:
  language: es
  text: 'El que me rechaza y no recibe mis palabras[a] ya tiene quien lo juzgue: la palabra que yo hablé, esa lo juzgará en el último día[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no acepta mis palabras». El verbo griego puede implicar recibir, acoger o aceptar.
    reason: lexical_alternative
  - marker: b
    text: O «el mensaje que yo di». λόγος puede significar «palabra» o «mensaje» según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀθετῶν
  english_pob_choice: rejects
  chosen_spanish: rechaza
  alternatives_spanish:
  - deshecha
  - desecha
  - rechaza
  lexicon: BDAG
  rationale: ἀθετέω aquí expresa repudiar o rechazar a una persona o su mensaje. «Rechaza» es natural en español y conserva la fuerza personal dirigida contra Jesús mejor que opciones más débiles o demasiado literales.
- source_word: λαμβάνων τὰ ῥήματά μου
  english_pob_choice: does not receive my words
  chosen_spanish: no recibe mis palabras
  alternatives_spanish:
  - no acepta mis palabras
  - no acoge mis palabras
  - no recibe mis palabras
  lexicon: BDAG
  rationale: En el contexto joánico, λαμβάνω puede implicar recibir con aceptación o acogida. «Recibe» preserva esa amplitud y suena más cercano al patrón bíblico de recepción de revelación que «acepta», aunque esta última sigue siendo una alternativa válida.
- source_word: ῥήματά
  english_pob_choice: words
  chosen_spanish: palabras
  alternatives_spanish:
  - palabras
  - dichos
  - expresiones
  lexicon: BDAG
  rationale: ῥῆμα enfatiza palabras pronunciadas. «Palabras» es la forma más natural en español y mantiene el plural de lo dicho por Jesús sin añadir matices innecesarios.
- source_word: ἔχει τὸν κρίνοντα αὐτόν
  english_pob_choice: has one who judges him
  chosen_spanish: ya tiene quien lo juzgue
  alternatives_spanish:
  - tiene a quien lo juzga
  - tiene su juez
  - ya tiene quien lo juzgue
  lexicon: BDAG
  rationale: La construcción es algo elíptica. «Ya tiene quien lo juzgue» conserva la idea de que el rechazador ya cuenta con un juez, y permite en español una frase más fluida que «tiene uno que lo juzga», sin perder el participio sustantivado.
- source_word: ὁ λόγος
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - la palabra
  - el mensaje
  - la palabra pronunciada
  lexicon: BDAG
  rationale: λόγος puede significar «palabra» o «mensaje». Aquí «la palabra» preserva la fuerza singular y casi personificada del término, y mantiene la conexión con las palabras habladas de Jesús en la cláusula anterior.
- source_word: ὃν ἐλάλησα
  english_pob_choice: that I spoke
  chosen_spanish: que yo he hablado
  alternatives_spanish:
  - que yo hablé
  - que yo he hablado
  - que yo pronuncié
  lexicon: BDAG
  rationale: Aunque ἐλάλησα es aoristo, en español «he hablado» suena más natural en un dicho de Jesús con valor vigente. Se mantiene el hecho de la palabra pronunciada sin volver la frase rígida o arcaizante.
- source_word: ἐκεῖνος
  english_pob_choice: that
  chosen_spanish: esa
  alternatives_spanish:
  - esa
  - esa misma
  - esa precisamente
  lexicon: BDAG
  rationale: ἐκεῖνος es enfático y retoma «la palabra». En español, «esa» conserva la referencia demostrativa con brevedad y evita la redundancia de repetir «la palabra».
- source_word: κρινεῖ
  english_pob_choice: will judge
  chosen_spanish: juzgará
  alternatives_spanish:
  - juzgará
  - condenará
  - emitirá juicio sobre
  lexicon: BDAG
  rationale: κρίνω abarca juzgar y, por contexto, juicio escatológico. «Juzgará» mantiene la amplitud del verbo sin especificar más de lo que el griego dice.
- source_word: ἐν τῇ ἐσχάτῃ ἡμέρᾳ
  english_pob_choice: on the last day
  chosen_spanish: en el último día
  alternatives_spanish:
  - en el último día
  - en el día postrero
  - el último día
  lexicon: BDAG
  rationale: Es la expresión escatológica joánica estándar. «En el último día» es idiomático en español y conserva el marco temporal final sin sobrecargarlo doctrinalmente.
theological_decisions:
- issue: Identidad del agente que juzga
  english_pob_reading: The verse presents Jesus' spoken word/message as the instrument or basis of final judgment, without denying Jesus' own role in judgment elsewhere.
  chosen_spanish_reading: El texto presenta la palabra hablada por Jesús como la que juzgará, sin borrar otras afirmaciones joánicas sobre el juicio del Hijo.
  alternative_spanish_readings:
  - Jesús mismo es el juez exclusivo y «la palabra» sólo resume su معیار
  - La palabra es el juez directo personificado
  rationale: La sintaxis primero dice que el rechazador «ya tiene quien lo juzgue» y luego identifica ese juez con «la palabra que yo he hablado». La traducción conserva esa secuencia sin armonizarla con otros pasajes de Juan, preservando la tensión teológica documentada.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La fuente y el audit trail inglés muestran alta concordancia y sin revisiones aplicadas; se mantiene la solución óptima ya validada, ajustando sólo el español para fluidez natural y fidelidad léxica al griego.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto sólo cuando aparezca el nombre divino; aquí no aplica.
  - Se mantiene «juzgará» para κρίνω y no «condenará», para no sobreespecificar el resultado.
  - «Palabras» traduce ῥήματα en plural y evita singularizar indebidamente.
  - 'La referencia temporal se conserva como fórmula joánica habitual: «en el último día».'
