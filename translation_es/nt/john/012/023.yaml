base_translation:
  language: en
  yaml_path: translation/nt/john/012/023.yaml
  text: But Jesus answered them[a], saying[b], “The hour has come for the Son of Man to be glorified.”
  footnotes:
  - marker: a
    text: Or “The time has come.” The Greek says “hour,” a recurring Johannine term for Jesus’ appointed moment of suffering and glory.
    reason: lexical_alternative
  - marker: b
    text: Or “the Human One.” The Greek title “the Son of Man” echoes Daniel 7 and is retained here for its theological and intertextual force.
    reason: alternative_reading
