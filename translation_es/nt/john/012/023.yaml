translation:
  language: es
  text: 'Pero Jesús les respondió, diciendo: «La hora[a] ha llegado para que el Hijo del Hombre[b] sea glorificado».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el tiempo ha llegado». El griego dice «hora», un término recurrente en Juan para el momento señalado de sufrimiento y gloria de Jesús.
    reason: lexical_alternative
  - marker: b
    text: O «el Ser Humano». El título griego «el Hijo del Hombre» evoca Daniel 7 y se conserva aquí por su fuerza teológica e intertextual.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀποκρίνεται
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: BDAG
  rationale: En español, «respondió» comunica con naturalidad la acción discursiva de ἀποκρίνομαι en un relato; «contestó» también sería posible, pero «respondió» es más sobrio y cercano al valor narrativo del texto.
- source_word: αὐτοῖς
  english_pob_choice: them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  lexicon: BDAG
  rationale: El dativo plural se expresa de forma natural en español con el pronombre átono «les» después de «respondió», evitando una construcción más pesada.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - al decir
  lexicon: BDAG
  rationale: «Diciendo» preserva la relación participial del griego y funciona fluidamente antes de la cita directa.
- source_word: Ἐλήλυθεν
  english_pob_choice: has come
  chosen_spanish: ha llegado
  alternatives_spanish:
  - ha venido
  - ha llegado el momento
  lexicon: BDAG
  rationale: El perfecto griego expresa un hecho ya consumado con resultado presente. En español, «ha llegado» conserva ese valor y suena más natural que un calco como «ha venido».
- source_word: ὥρα
  english_pob_choice: hour
  chosen_spanish: hora
  alternatives_spanish:
  - tiempo
  - momento
  lexicon: BDAG
  rationale: Se mantiene «hora» porque en Juan es un término teológicamente cargado y recurrente; «tiempo» o «momento» diluirían esa resonancia.
- source_word: ἵνα
  english_pob_choice: for
  chosen_spanish: para que
  alternatives_spanish:
  - para
  - de modo que
  lexicon: BDAG
  rationale: Con el subjuntivo pasivo, «para que» expresa con claridad la finalidad o resultado asociado con la llegada de la hora sin forzar la sintaxis española.
- source_word: δοξασθῇ
  english_pob_choice: to be glorified
  chosen_spanish: sea glorificado
  alternatives_spanish:
  - reciba gloria
  - sea honrado
  lexicon: BDAG
  rationale: «Sea glorificado» reproduce directamente el pasivo de δοξάζω y conserva el peso teológico joánico de exaltación/vindicación.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  english_pob_choice: the Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - el Hijo del hombre
  - el Ser Humano
  lexicon: BDAG
  rationale: Se conserva el título tradicional «el Hijo del Hombre» porque en Juan funciona como designación cristológica estable, con eco de Daniel 7; una traducción interpretativa lo debilitaría.
theological_decisions:
- issue: Título cristológico ὁ υἱὸς τοῦ ἀνθρώπου
  english_pob_reading: the Son of Man
  chosen_spanish_reading: el Hijo del Hombre
  alternative_spanish_readings:
  - el Ser Humano
  - el Hijo del hombre
  rationale: La frase no se entiende aquí como una simple referencia a la humanidad, sino como un título cristológico con resonancia intertextual. Mantener la forma tradicional preserva esa fuerza teológica.
  doctrine_reference: Affirmations; Translation philosophy §2, §3, §4
- issue: Valor teológico de Ἐλήλυθεν ἡ ὥρα
  english_pob_reading: The hour has come
  chosen_spanish_reading: La hora ha llegado
  alternative_spanish_readings:
  - Ha llegado el tiempo
  - La hora está aquí
  rationale: Juan usa «la hora» como motivo teológico del momento señalado para la glorificación de Jesús. «Ha llegado» conserva el perfecto y comunica que el momento decisivo ya se ha presentado.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'La versión revisada corrige la validación anterior: ahora ambos marcadores de nota aparecen explícitamente en el texto español, y las notas se anclan a palabras efectivas de la traducción. Se conservó la terminología joánica clave («hora», «Hijo del Hombre») sin diluir su carga teológica.'
  spanish_consistency_notes:
  - Se mantiene «hora» como término técnico joánico, coherente con el uso del POB en inglés.
  - Se conserva «Hijo del Hombre» por su función cristológica estable y su eco de Daniel 7.
  - Se evita «Señor» o un sustituto interpretativo para el nombre divino, ya que este versículo no contiene el Tetragrámaton ni κύριος como cita divina.
