translation:
  language: es
  text: 'Entonces Jesús les dijo[a]: «Todavía la luz está entre ustedes por poco tiempo. Caminen mientras tienen la luz, para que la oscuridad no los sorprenda, y el que camina en la oscuridad no sabe adónde va».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en ustedes» o «con ustedes». La frase griega puede entenderse de más de una manera, aunque «entre ustedes» encaja mejor con la presencia pública inmediata de Jesús.
    reason: alternative_reading
lexical_decisions:
- source_word: εἶπεν οὖν αὐτοῖς ὁ Ἰησοῦς
  english_pob_choice: So Jesus said to them
  chosen_spanish: Entonces Jesús les dijo
  alternatives_spanish:
  - Así que Jesús les dijo
  - Jesús, entonces, les dijo
  lexicon: SBLGNT / BDAG
  rationale: «Entonces» funciona como conector discursivo natural en español y refleja οὖν sin sobrerrepresentar la inferencia lógica. Se conserva el sujeto explícito para claridad narrativa.
- source_word: Ἔτι μικρὸν χρόνον
  english_pob_choice: still ... for a little while
  chosen_spanish: Todavía ... por un poco de tiempo
  alternatives_spanish:
  - Aún ... por un breve tiempo
  - Todavía ... por un corto tiempo
  lexicon: BDAG
  rationale: «Todavía» comunica el valor de ἔτι (‘aún/todavía’) y «por un poco de tiempo» transmite μικρὸν χρόνον de forma natural y fiel, sin intensificar innecesariamente la brevedad.
- source_word: τὸ φῶς
  english_pob_choice: the light
  chosen_spanish: la luz
  alternatives_spanish:
  - la luz
  - esa luz
  lexicon: BDAG
  rationale: Se mantiene literalmente la imagen joánica de la luz, que aquí tiene peso metafórico y cristológico. En español «la luz» es la forma más natural y transparente.
- source_word: ἐν ὑμῖν
  english_pob_choice: among you
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - en ustedes
  - con ustedes
  lexicon: BDAG
  rationale: 'La opción principal sigue el contexto público y relacional del dicho de Jesús: la luz está presente en relación con el grupo, no primero como realidad interior. «Entre ustedes» preserva esa presencia colectiva sin cerrar la ambigüedad del griego.'
- source_word: περιπατεῖτε
  english_pob_choice: Walk
  chosen_spanish: Caminen
  alternatives_spanish:
  - Anden
  - Vivan
  lexicon: BDAG
  rationale: El imperativo plural se naturaliza como «Caminen», que conserva la metáfora bíblica del andar/conducta y resulta idiomático en español contemporáneo.
- source_word: ὡς τὸ φῶς ἔχετε
  english_pob_choice: while you have the light
  chosen_spanish: mientras tienen la luz
  alternatives_spanish:
  - mientras poseen la luz
  - mientras aún tienen la luz
  lexicon: BDAG
  rationale: «Mientras» expresa la fuerza temporal de ὡς en este contexto, y «tienen la luz» reproduce ἔχετε sin artificio. Se evita «como» porque aquí no introduce modo sino tiempo.
- source_word: ἵνα μὴ σκοτία ὑμᾶς καταλάβῃ
  english_pob_choice: so that darkness may not overtake you
  chosen_spanish: para que la oscuridad no los alcance
  alternatives_spanish:
  - para que la oscuridad no los sorprenda
  - para que la oscuridad no los invada
  lexicon: BDAG
  rationale: «Oscuridad» conserva el contraste joánico con «luz». «Los alcance» expresa bien καταλάβῃ como llegar/coger a alguien por sorpresa, sin perder la imagen de ser alcanzados por la oscuridad.
- source_word: ὁ περιπατῶν ἐν τῇ σκοτίᾳ
  english_pob_choice: The one who walks in the darkness
  chosen_spanish: el que camina en la oscuridad
  alternatives_spanish:
  - quien camina en la oscuridad
  - el que anda en la oscuridad
  lexicon: BDAG
  rationale: Se mantiene la construcción sustantivada con «el que» y el verbo «camina» para conservar el paralelismo con el imperativo anterior. «En la oscuridad» refleja la preposición y la escena moral/metafórica.
- source_word: οὐκ οἶδεν ποῦ ὑπάγει
  english_pob_choice: does not know where he is going
  chosen_spanish: no sabe a dónde va
  alternatives_spanish:
  - no sabe adónde va
  - no sabe dónde va
  lexicon: BDAG
  rationale: «No sabe a dónde va» es idiomático y claro en español. Se conserva la idea direccional de ὑπάγει, que implica destino/movimiento, no mera ubicación.
theological_decisions:
- issue: Sentido de ἐν ὑμῖν respecto de la presencia de la luz
  english_pob_reading: among you
  chosen_spanish_reading: entre ustedes
  alternative_spanish_readings:
  - en ustedes
  - con ustedes
  rationale: El contexto inmediato es la presencia pública de Jesús como luz ante la multitud. «Entre ustedes» evita resolver prematuramente la tensión semántica de ἐν y conserva la lectura relacional/visible que mejor encaja con la escena. Las alternativas quedan abiertas porque el griego puede soportarlas.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Valor metafórico de la luz y la oscuridad
  english_pob_reading: light / darkness
  chosen_spanish_reading: luz / oscuridad
  alternative_spanish_readings:
  - luz / tinieblas
  rationale: Se prefiere «oscuridad» por claridad moderna y porque conserva bien el contraste joánico sin sonar arcaico. No se fuerza una equivalencia doctrinal distinta; la oposición metafórica permanece intacta.
  doctrine_reference: Juan 8:12; 12:46; contraste joánico luz/tinieblas
translation_notes:
  revision_awareness: Se revisó el pasaje a la luz del audit trail inglés y no hubo revisiones recientes aplicadas; la redacción conserva la lectura de alta concordancia y mantiene abierta la ambigüedad de ἐν ὑμῖν mediante nota.
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς según el estándar del proyecto.
  - Se usa «luz» y «oscuridad» de manera consistente con el contraste joánico y con el español natural.
  - Se prefiere «entre ustedes» frente a «en ustedes» para reflejar la decisión auditada del POB inglés sin cerrar la posibilidad alternativa.
  - El imperativo plural «Caminen» conserva la metáfora de περιπατέω sin caer en una paráfrasis como «vivan».
