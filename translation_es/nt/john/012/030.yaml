translation:
  language: es
  text: 'Jesús respondió y dijo[a]: «Esta voz no vino para mí, sino para ustedes».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Esta voz no ocurrió por mí, sino por ustedes». La preposición griega también puede entenderse en sentido causal, aunque el contexto favorece «para mí» / «para ustedes» en sentido de beneficio o propósito.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió y dijo
  lexicon: BDAG
  rationale: En español, «respondió» reproduce de forma natural la función discursiva de ἀποκρίνομαι en un diálogo. Aquí se mantiene además la fórmula completa junto con «dijo» para reflejar el patrón joánico sin sonar forzado.
- source_word: εἶπεν
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  lexicon: BDAG
  rationale: «Dijo» es el equivalente idiomático más directo y conserva la doble verbalidad del griego («respondió... y dijo»), que el POB inglés también preserva.
- source_word: φωνή
  english_pob_choice: voice
  chosen_spanish: voz
  alternatives_spanish:
  - sonido
  lexicon: BDAG
  rationale: El contexto inmediato es la manifestación audible del cielo, por lo que «voz» es más preciso que el más general «sonido».
- source_word: γέγονεν
  english_pob_choice: has not come
  chosen_spanish: ha sido
  alternatives_spanish:
  - ha ocurrido
  - ha acontecido
  - ha venido
  lexicon: BDAG
  rationale: El griego usa γίνομαι en referencia a la voz como evento ya producido. En español, «ha sido» resulta más natural con «voz» y conserva la idea de que la voz no tuvo como destinatario a Jesús. Se evita fijar demasiado una sola equivalencia causal en el texto principal.
- source_word: δι’ ἐμέ
  english_pob_choice: for my sake
  chosen_spanish: para mí
  alternatives_spanish:
  - por mí
  - en beneficio de mí
  lexicon: BDAG
  rationale: La preposición διά con acusativo puede expresar relación causal o benefactiva. En este contexto, «para mí» es breve, natural y mantiene la tensión interpretativa que el POB inglés anotó en la nota.
- source_word: δι’ ὑμᾶς
  english_pob_choice: for yours
  chosen_spanish: para ustedes
  alternatives_spanish:
  - por ustedes
  - en beneficio de ustedes
  lexicon: BDAG
  rationale: Se conserva el paralelo con la primera cláusula y la referencia benefactiva al auditorio. «Para ustedes» es idiomático en español y suficientemente amplio para abarcar el matiz de propósito o beneficio.
- source_word: Οὐ ... ἀλλὰ
  english_pob_choice: not ... but
  chosen_spanish: no ... sino
  alternatives_spanish:
  - no ... pero
  lexicon: BDAG
  rationale: La correlación adversativa se traduce de manera directa con «no ... sino», la opción más natural y fiel en español.
theological_decisions:
- issue: Sentido de la voz celestial y relación con Jesús y los oyentes
  english_pob_reading: The voice was not given for Jesus' benefit but for the benefit of the surrounding hearers.
  chosen_spanish_reading: La voz no fue dada para el beneficio de Jesús, sino para el de los oyentes presentes.
  alternative_spanish_readings:
  - La voz no ocurrió a causa de Jesús, sino a causa de ustedes.
  - La voz no fue por Jesús, sino por ustedes.
  rationale: La construcción διά + acusativo admite tanto un sentido causal como benefactivo. El texto principal adopta la lectura benefactiva, que el contexto favorece, sin eliminar la posibilidad causal indicada en la nota. Así se preserva la tensión semántica sin resolverla artificialmente.
  doctrine_reference: Preservar la tensión lexical y contextual del original; priorizar la evidencia griega sobre la tradición de traducción.
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el expediente inglés; el texto inglés más reciente permanece sin cambios, y la traducción española sigue de cerca esa lectura estable.
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς conforme al estándar del proyecto.
  - Se usa «voz» y no «sonido» porque el evento es la declaración celestial oída por la multitud.
  - Se conserva la ambigüedad benefactiva/causal de διά + acusativo en la nota, mientras que el texto principal opta por una formulación natural en español.
  - Se evita introducir terminología eclesiástica no presente en el original; el registro es bíblico y sobrio.
