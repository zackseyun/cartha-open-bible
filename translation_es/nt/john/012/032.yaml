base_translation:
  language: en
  yaml_path: translation/nt/john/012/032.yaml
  text: And I[a], when I am lifted up from the earth[c][b], will draw all people to myself.
  footnotes:
  - marker: a
    text: Or 'if I am lifted up.' The Greek uses a conditional form, but in context it refers to the impending certainty of Jesus' death.
    reason: alternative_reading
  - marker: b
    text: '''Lifted up'' can also carry the sense ''exalted,'' preserving John''s double meaning of crucifixion and glorification.'
    reason: lexical_alternative
  - marker: c
    text: Or simply 'all.' The Greek likely means all people, not necessarily making explicit how this relates to later theological debates about the extent of salvation.
    reason: lexical_alternative
