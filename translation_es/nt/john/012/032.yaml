    reason: alternative_reading
  - marker: b
    text: «Levantado» también puede llevar el sentido de «exaltado», conservando el doble significado joánico de crucifixión y glorificación.
    reason: lexical_alternative
  - marker: c
    text: O simplemente «a todos». El griego probablemente significa a todas las personas, sin precisar por sí mismo cómo se relaciona esto con debates teológicos posteriores sobre el alcance de la salvación.
    reason: lexical_alternative
  revision_rationale: 'Se ajusta la frase final para un español más natural y claro: «a todas las personas» refleja mejor el objeto humano de πάντας según la auditoría inglesa, y «hacia mí» evita la rigidez de «hacia mí mismo» sin perder el sentido direccional personal. También se pule la nota [a] para español más idiomático.'
