translation:
  language: es
  text: Y yo[a], cuando sea levantado[b] de la tierra, atraeré a todas las personas[c] hacia mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «si soy levantado». El griego usa una forma condicional, pero en el contexto se refiere a la certeza inminente de la muerte de Jesús.
    reason: alternative_reading
  - marker: b
    text: «Levantado» también puede llevar el sentido de «exaltado», conservando el doble significado joánico de crucifixión y glorificación.
    reason: lexical_alternative
  - marker: c
    text: O simplemente «a todos». El griego probablemente significa a todas las personas, sin precisar por sí mismo cómo se relaciona esto con debates teológicos posteriores sobre el alcance de la salvación.
    reason: lexical_alternative
lexical_decisions:
- source_word: κἀγὼ
  english_pob_choice: And I
  chosen_spanish: Y yo
  alternatives_spanish:
  - Y también yo
  - Yo también
  lexicon: BDAG
  rationale: La crasis καί + ἐγώ expresa enlace discursivo con énfasis personal. En español, «Y yo» conserva la conexión y la prominencia del sujeto sin añadir un matiz que el griego no exige.
- source_word: ἐὰν
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - si
  lexicon: BDAG
  rationale: Aunque ἐάν con subjuntivo tiene forma condicional, el contexto joánico presenta este hecho como inminente y seguro. «Cuando» comunica mejor esa certeza narrativa en español, sin negar la forma condicional del griego.
- source_word: ὑψωθῶ
  english_pob_choice: am lifted up
  chosen_spanish: sea levantado
  alternatives_spanish:
  - sea exaltado
  - sea alzado
  lexicon: BDAG
  rationale: 'ὑψόω en Juan mantiene una doble referencia: elevación física en la cruz y exaltación/glorificación. «Sea levantado» preserva esa ambigüedad mejor que «exaltado», y suena natural en español.'
- source_word: ἐκ τῆς γῆς
  english_pob_choice: from the earth
  chosen_spanish: de la tierra
  alternatives_spanish:
  - desde la tierra
  - del suelo
  lexicon: BDAG
  rationale: γῆ aquí se refiere de modo natural a la tierra/terreno en contraste con ser levantado. «De la tierra» reproduce bien la imagen y permite la resonancia del contexto inmediato.
- source_word: πάντας
  english_pob_choice: all people
  chosen_spanish: a todos
  alternatives_spanish:
  - a todas las personas
  - a todos los hombres
  lexicon: BDAG
  rationale: El plural masculino puede funcionar genéricamente para personas. En español, «a todos» mantiene la amplitud del griego sin forzar una explicitación que el texto no añade.
- source_word: ἑλκύσω
  english_pob_choice: will draw
  chosen_spanish: atraeré
  alternatives_spanish:
  - arrastraré
  - jalaré
  lexicon: BDAG
  rationale: Aunque ἕλκω puede implicar arrastre o movimiento fuerte, en este contexto joánico la idea de atracción hacia Jesús es central. «Atraeré» comunica esa fuerza relacional de manera natural en español, sin perder el movimiento hacia él.
- source_word: πρὸς ἐμαυτόν
  english_pob_choice: to myself
  chosen_spanish: hacia mí mismo
  alternatives_spanish:
  - a mí mismo
  - para mí mismo
  lexicon: BDAG
  rationale: El reflexivo ἐμαυτόν refuerza la dirección hacia la propia persona de Jesús. «Hacia mí mismo» preserva tanto la orientación como el énfasis reflexivo de forma clara en español.
theological_decisions:
- issue: Alcance de πάντας en relación con la salvación
  english_pob_reading: all people
  chosen_spanish_reading: a todos
  alternative_spanish_readings:
  - a todas las personas
  - a todos sin excepción
  - a todos sin distinción
  rationale: El objeto gramatical es plural masculino y naturalmente puede referirse a personas. «A todos» preserva la amplitud del texto sin resolver de antemano debates teológicos posteriores sobre si significa todos sin excepción o todos sin distinción.
  doctrine_reference: 'Affirmations; Translation philosophy #3'
- issue: Doble sentido joánico de ὑψωθῶ
  english_pob_reading: lifted up
  chosen_spanish_reading: sea levantado
  alternative_spanish_readings:
  - sea exaltado
  rationale: Juan usa esta expresión para sostener a la vez crucifixión y glorificación. «Sea levantado» retiene esa tensión; traducir solo «exaltado» desplazaría el peso del gesto físico y de la cruz.
  doctrine_reference: 'Translation philosophy #3'
translation_notes:
  revision_awareness: 'El pasaje se mantiene sin cambios respecto del último repaso del texto fuente en inglés: no hubo revisiones aplicadas y el veredicto de comparación fue de alta concordancia.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, aunque este versículo no contiene el nombre divino.
  - Se evita «Cristo» porque el griego aquí no usa Χριστός; el sujeto es Jesús implícito por contexto narrativo.
  - «Todos» conserva la amplitud del griego πάντας sin imponer una lectura doctrinal cerrada.
  - Se prefirió «de la tierra» para la imagen de ἐκ τῆς γῆς, por ser natural y fiel al paralelo joánico.
