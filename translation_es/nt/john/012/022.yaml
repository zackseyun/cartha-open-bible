translation:
  language: es
  text: Felipe viene y le dice a Andrés[a]; Andrés y Felipe vienen y le dicen a Jesús.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego usa presente histórico en toda la oración («viene ... dice ... vienen ... dicen»), un rasgo narrativo que intensifica la inmediatez. En español puede mantenerse con presente sin perder naturalidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔρχεται
  english_pob_choice: comes
  chosen_spanish: viene
  alternatives_spanish:
  - llega
  - va
  lexicon: BDAG
  rationale: Conservo el presente histórico del griego con «viene», que suena natural en español y mantiene la vivacidad narrativa. «Llega» enfatiza arribo más que movimiento, y «va» invierte el sentido.
- source_word: λέγει
  english_pob_choice: tells
  chosen_spanish: le dice
  alternatives_spanish:
  - le cuenta
  - le habla a
  lexicon: BDAG
  rationale: Para λέγω + dativo, «le dice» reproduce de forma directa la comunicación dirigida a una persona. «Le cuenta» añade matiz de relato; «le habla a» es más amplio de lo que exige el contexto.
- source_word: Ἀνδρέᾳ
  english_pob_choice: Andrew
  chosen_spanish: Andrés
  alternatives_spanish:
  - Andreo
  lexicon: nombre propio
  rationale: Nombre propio transliterado al uso español bíblico habitual. «Andreo» no corresponde al uso ni a la forma normal del nombre.
- source_word: λέγουσιν
  english_pob_choice: tell
  chosen_spanish: le dicen
  alternatives_spanish:
  - le hablan
  - le cuentan
  lexicon: BDAG
  rationale: El plural también conserva el presente histórico con «dicen». El complemento dativo se expresa naturalmente con «le». «Le cuentan» añade especificidad no presente en el verbo.
- source_word: τῷ Ἰησοῦ
  english_pob_choice: Jesus
  chosen_spanish: a Jesús
  alternatives_spanish:
  - a Jesús, el Mesías
  lexicon: nombre propio
  rationale: El dativo se vierte con la preposición idiomática «a». Mantengo solo el nombre propio porque el texto no añade aquí un título ni un matiz adicional.
- source_word: καί
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: BDAG
  rationale: Se conserva la simple coordinación paratáctica del griego. «E» no es necesaria antes de nombres que comienzan con /i/ consonántica y no mejora la naturalidad aquí.
translation_notes:
  revision_awareness: 'El texto griego y el contexto auditado en inglés muestran acuerdo alto: la única decisión destacada es conservar el presente histórico en español, sin suavizarlo a pasado.'
  spanish_consistency_notes:
  - Mantengo nombres propios transliterados según el uso bíblico estándar en español.
  - Conservo la repetición de «viene / dicen» para reflejar el paralelismo del griego y la secuencia narrativa.
  - Uso «le dice» y «le dicen» para expresar el dativo personal de manera idiomática y transparente.
