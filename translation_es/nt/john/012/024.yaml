translation:
  language: es
  text: 'En verdad, en verdad, les digo: si el grano de trigo no cae en la tierra y muere, queda solo[a]; pero si muere[b], da mucho fruto.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «permanece solo».'
    reason: lexical_alternative
  - marker: b
    text: La imagen se refiere a un grano que debe morir en la tierra para llegar a ser fructífero; en el contexto, Jesús aplica este patrón a su propia muerte y a los que lo siguen.
    reason: cross_reference
lexical_decisions:
- source_word: ἀμὴν ἀμὴν
  english_pob_choice: Truly, truly
  chosen_spanish: En verdad, en verdad
  alternatives_spanish:
  - Amén, amén
  - Ciertamente, ciertamente
  lexicon: BDAG
  rationale: La doble fórmula ἀμήν funciona en Juan como marcador solemne del discurso. «En verdad, en verdad» conserva la repetición y el énfasis con naturalidad en español moderno; «Amén, amén» es posible, pero suena menos transparente para lectores generales.
- source_word: λέγω ὑμῖν
  english_pob_choice: I say to you
  chosen_spanish: les digo
  alternatives_spanish:
  - les digo a ustedes
  - les hablo
  lexicon: BDAG
  rationale: El griego usa una fórmula directa de خطاب a los oyentes. «Les digo» comunica esa función en español con fluidez; «les digo a ustedes» es más explícito pero menos ágil.
- source_word: ὁ κόκκος τοῦ σίτου
  english_pob_choice: the grain of wheat
  chosen_spanish: el grano de trigo
  alternatives_spanish:
  - la semilla de trigo
  - el grano de cereal
  lexicon: BDAG
  rationale: κόκκος designa un grano o semilla; en español «grano de trigo» es la forma más idiomática y fiel al cuadro agrícola. «Semilla de trigo» es posible, pero cambia ligeramente el foco del término.
- source_word: πεσὼν εἰς τὴν γῆν
  english_pob_choice: falls into the ground
  chosen_spanish: cae en la tierra
  alternatives_spanish:
  - cae en el suelo
  - habiendo caído en la tierra
  lexicon: BDAG
  rationale: Aquí γῆ puede traducirse como «tierra» o «suelo». En español, «cae en la tierra» mantiene bien la imagen agrícola y es más natural que «cae en el suelo» en este contexto.
- source_word: ἀποθάνῃ
  english_pob_choice: dies
  chosen_spanish: muere
  alternatives_spanish:
  - debe morir
  - llegue a morir
  lexicon: BDAG
  rationale: 'El aoristo subjuntivo en la cláusula condicional se expresa de modo natural con el presente español: «muere». «Debe morir» añadiría una obligación no presente en el griego.'
- source_word: αὐτὸς μόνος μένει
  english_pob_choice: it remains by itself
  chosen_spanish: queda solo
  alternatives_spanish:
  - permanece por sí mismo
  - permanece solo
  lexicon: BDAG
  rationale: La combinación αὐτός + μόνος subraya que el grano queda aislado. «Queda solo» es una traducción concisa y natural; «permanece por sí mismo» suena más literal pero menos idiomático.
- source_word: ἐὰν δὲ ἀποθάνῃ
  english_pob_choice: but if it dies
  chosen_spanish: pero si muere
  alternatives_spanish:
  - pero si llega a morir
  - pero si llegara a morir
  lexicon: BDAG
  rationale: δέ introduce contraste. «Pero si muere» conserva ese giro y el paralelismo con la cláusula anterior sin sobrecargar el español con perífrasis.
- source_word: πολὺν καρπὸν φέρει
  english_pob_choice: it bears much fruit
  chosen_spanish: lleva mucho fruto
  alternatives_spanish:
  - da mucho fruto
  - produce mucho fruto
  lexicon: BDAG
  rationale: φέρω con καρπός es un modismo de dar/llevar fruto. «Lleva mucho fruto» mantiene el valor figurado y respeta el paralelismo agrícola; «da mucho fruto» también es posible, pero «lleva» conserva mejor el matiz de carga/resultado del griego.
theological_decisions:
- issue: Imagen agrícola con aplicación cristológica implícita
  english_pob_reading: Retain the literal agricultural metaphor in the main text without making its theological application explicit.
  chosen_spanish_reading: Conservar la metáfora agrícola en el texto principal sin explicitar su aplicación teológica.
  alternative_spanish_readings:
  - Hacer explícito en la traducción que Jesús habla de su muerte y del fruto que produce.
  - Parafrasear la imagen para indicar directamente el efecto redentor.
  rationale: El contexto inmediato sugiere la referencia a la muerte de Jesús y al fruto que resultará, pero el versículo en sí presenta la imagen. La traducción española conserva esa tensión y deja que el contexto haga la interpretación, sin añadir una explicación que el griego no formula aquí.
  doctrine_reference: 'Principio POB: preservar la tensión teológica y no importar afirmaciones doctrinales que el texto no expresa explícitamente.'
translation_notes:
  revision_awareness: 'El pasaje coincide sustancialmente con la revisión más reciente: no se requieren cambios de sentido, y la formulación española mantiene la metáfora agrícola, la repetición solemne de ἀμήν y el contraste entre permanecer solo y dar fruto.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponda al nombre divino; este versículo no lo contiene.
  - Se mantiene «fruto» en singular, en paralelo con el griego καρπὸν y con el uso johánico habitual.
  - «Tierra» se prefirió a «suelo» por coherencia agrícola y por el registro bíblico natural en español.
  - La nota [a] preserva la alternativa semántica principal de μόνος sin duplicar el sentido de la frase principal.
  - La nota [b] conserva la lectura contextual sugerida por el audit trail inglés sin convertirla en glosa dentro del texto principal.
