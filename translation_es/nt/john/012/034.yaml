id: JHN.12.34
reference: John 12:34
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: SBLGNT
  text: ἀπεκρίθη ⸀οὖν αὐτῷ ὁ ὄχλος· Ἡμεῖς ἠκούσαμεν ἐκ τοῦ νόμου ὅτι ὁ χριστὸς μένει εἰς τὸν αἰῶνα, καὶ πῶς ⸂λέγεις σὺ⸃ ⸀ὅτι δεῖ ὑψωθῆναι τὸν υἱὸν τοῦ ἀνθρώπου; τίς ἐστιν οὗτος ὁ υἱὸς τοῦ ἀνθρώπου;
base_translation:
  language: en
  yaml_path: translation/nt/john/012/034.yaml
  text: So the crowd answered him[a], "We have heard from the Law that the Messiah remains forever[b], and how can you say that the Son of Man must be lifted up? Who is this Son of Man?"
  footnotes:
  - marker: a
    text: Or "be exalted." In John, "lifted up" can carry both the sense of being raised up physically and being exalted.
    reason: lexical_alternative
  - marker: b
    text: Greek "the Christ"; here rendered "the Messiah" because the term functions as a title.
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4-2026-03-05
    prompt_id: nt_draft_v1
    prompt_sha256: f34967dad83d10c7da7b6ae20dde18f426f8ba04019fd6e12bee8834e127c16b
    timestamp: '2026-04-18T21:29:36Z'
    output_hash: 3b7371378eeba05cbf997fc8f8d6babf44176938f66cd3c47189ed3987a9d705
    temperature: 0.2
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T09:47:00Z'
    unchanged: false
    changes_summary: 'Changed ''Messiah'' to ''Christ'' to reflect ὁ χριστός more directly and maintain Johannine terminology; otherwise retained the draft. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: 'Entonces la multitud le respondió: «Nosotros hemos oído de la Ley que el Mesías permanece para siempre[b], y ¿cómo puedes decir que es necesario que el Hijo del Hombre sea levantado[a]? ¿Quién es este Hijo del Hombre?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sea exaltado». En Juan, «ser levantado» puede llevar tanto el sentido de ser alzado físicamente como el de ser exaltado.
    reason: lexical_alternative
  - marker: b
    text: «Mesías» traduce el griego «el Cristo» aquí por tratarse de un título; la elección preserva el sentido judío del término.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη οὖν
  english_pob_choice: So ... answered
  chosen_spanish: Entonces ... respondió
  alternatives_spanish:
  - Y ... respondió
  - Así que ... respondió
  lexicon: BDAG
  rationale: οὖν marca continuación discursiva; «Entonces» conserva esa conexión en español con naturalidad y sin volverlo demasiado interpretativo.
- source_word: ὁ ὄχλος
  english_pob_choice: the crowd
  chosen_spanish: la multitud
  alternatives_spanish:
  - la gente
  - el pueblo
  lexicon: BDAG
  rationale: ὄχλος designa aquí al grupo reunido en torno a Jesús. «Multitud» es natural en español bíblico y conserva el sentido colectivo neutral.
- source_word: ἐκ τοῦ νόμου
  english_pob_choice: from the Law
  chosen_spanish: de la Ley
  alternatives_spanish:
  - de la ley
  - en la Ley
  - de la Escritura
  lexicon: BDAG
  rationale: Se mantiene «Ley» como referencia al uso judío de la Torá/Escritura en este contexto, siguiendo la claridad del texto griego y la auditoría inglesa.
- source_word: ὁ χριστός
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - el Cristo
  lexicon: BDAG
  rationale: Como título, Χριστός se vierte mejor con «Mesías» en español para preservar el sentido mesiánico judío; además, la auditoría inglesa documenta esa preferencia como decisión teológica/lexical.
- source_word: μένει εἰς τὸν αἰῶνα
  english_pob_choice: remains forever
  chosen_spanish: permanece para siempre
  alternatives_spanish:
  - permanece por siempre
  - permanece eternamente
  - permanece para el siglo
  lexicon: BDAG
  rationale: La expresión idiomática comunica permanencia indefinida. «Para siempre» es la forma más clara y fiel en español contemporáneo.
- source_word: πῶς λέγεις σὺ
  english_pob_choice: how can you say
  chosen_spanish: ¿cómo dices tú?
  alternatives_spanish:
  - ¿cómo puedes decir?
  - ¿cómo es que dices tú?
  lexicon: BDAG
  rationale: El griego expresa sorpresa y desafío. En español, la secuencia «¿cómo dices tú que…?» conserva el tono confrontativo sin sobretraducirlo con una modalidad ajena al texto.
- source_word: δεῖ
  english_pob_choice: must
  chosen_spanish: es necesario que
  alternatives_spanish:
  - debe
  - tiene que ser necesario que
  lexicon: BDAG
  rationale: δεῖ expresa necesidad impersonal. «Es necesario que» conserva mejor ese matiz que un simple «debe», y encaja con la sintaxis española subordinada.
- source_word: ὑψωθῆναι
  english_pob_choice: be lifted up
  chosen_spanish: sea levantado
  alternatives_spanish:
  - sea alzado
  - sea exaltado
  - sea levantado en alto
  lexicon: BDAG
  rationale: Se preserva la ambigüedad joánica entre elevación física y exaltación. «Sea levantado» permite ambas lecturas y evita resolver prematuramente la tensión textual.
- source_word: τὸν υἱὸν τοῦ ἀνθρώπου
  english_pob_choice: the Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - el hijo del hombre
  lexicon: BDAG
  rationale: Es la equivalencia establecida en español para el título cristológico. La mayúscula ayuda a señalar que no es una referencia genérica.
- source_word: τίς ἐστιν οὗτος ὁ υἱὸς τοῦ ἀνθρώπου
  english_pob_choice: Who is this Son of Man?
  chosen_spanish: ¿Quién es este Hijo del Hombre?
  alternatives_spanish:
  - ¿Quién es este hijo del hombre?
  lexicon: BDAG
  rationale: Se conserva la referencia titulada y el interrogante de identificación. La formulación española sigue de cerca el griego y el audit trail inglés.
theological_decisions:
- issue: Título mesiánico Χριστός / ὁ χριστός
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - el Cristo
  rationale: La auditoría inglesa revierte un cambio a «Christ» y restituye «Messiah» por ser título; en español, «Mesías» expresa mejor ese valor titular y evita una transliteración eclesiástica menos transparente para este pasaje.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Messiah (where title; Christ where name-like)'
- issue: ὑψωθῆναι en Juan
  english_pob_reading: be lifted up
  chosen_spanish_reading: sea levantado
  alternative_spanish_readings:
  - sea exaltado
  - sea alzado
  rationale: 'En Juan, el verbo conserva doble sentido: elevación física en la crucifixión y exaltación. «Sea levantado» mantiene esa tensión sin decidirla por anticipado.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La auditoría inglesa muestra una oscilación documentada entre «Christ» y «Messiah», finalmente resuelta a favor de «Messiah». El español sigue esa resolución con «Mesías», alineándose con la política terminológica del proyecto y manteniendo el carácter titular del griego ὁ χριστός. También se preserva la ambigüedad de ὑψωθῆναι, evitando una interpretación exclusivamente cristológica o exclusivamente física.
  spanish_consistency_notes:
  - Se usa «Mesías» para Χριστός como título, coherente con la política de terminología del proyecto.
  - Se usa «Ley» para νόμος en este contexto judío-scriptural.
  - Se conserva «Hijo del Hombre» como título cristológico reconocido en español.
  - La expresión «sea levantado» mantiene la ambigüedad joánica sin aclararla indebidamente.
  - Se emplea puntuación española y comillas angulares para un texto publicable.
