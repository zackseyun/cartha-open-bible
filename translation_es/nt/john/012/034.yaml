    issue: La nota [a] está anclada a «le respondió» y propone «les respondió».
    rationale: El griego αὐτῷ es singular («a él»), y la auditoría inglesa no documenta ninguna alternativa de número aquí. La nota existente añade confusión y no preserva el aparato auditado.
  - severity: medium
    issue: Falta en español la nota léxica sobre «levantado» como posible «exaltado».
    rationale: La auditoría inglesa conserva explícitamente la tensión semántica de ὑψωθῆναι en Juan. Esa nota debe preservarse también en español, anclada al verbo correspondiente.
  - severity: low
    issue: «¿cómo dices tú que…?» es comprensible, pero suena menos natural y menos incrédulo que «¿cómo puedes decir…?»
    rationale: La decisión léxica inglesa explica que πῶς aquí expresa incredulidad más que una pregunta meramente informativa. «Puedes» comunica mejor ese matiz en español sin alejarse del sentido.
