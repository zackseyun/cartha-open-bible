base_translation:
  language: en
  yaml_path: translation/nt/john/012/013.yaml
  text: They took the palm branches and went out to meet him[a], and they were crying out, “Hosanna! Blessed is the one who comes in the name of the Lord[c][b], even the King of Israel!”
  footnotes:
  - marker: a
    text: Hosanna is a Hebrew-derived acclamation meaning 'save now' or 'please save,' which by this period also functioned as a shout of praise.
    reason: lexical_alternative
  - marker: b
    text: This line echoes Psalm 118:26.
    reason: cross_reference
  - marker: c
    text: Or 'and the King of Israel.'
    reason: alternative_reading
