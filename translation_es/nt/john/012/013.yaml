translation:
  language: es
  text: 'Tomaron las ramas de palma y salieron a su encuentro, y gritaban: «¡Hosanna![a] ¡Bendito el que viene en el nombre del Señor,[b] y[c] el Rey de Israel!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hosanna» es una aclamación derivada del hebreo que significa «salva ahora» o «por favor, salva», y para esta época también funcionaba como un grito de alabanza.
    reason: lexical_alternative
  - marker: b
    text: Esta línea hace eco del Salmo 118:26.
    reason: cross_reference
  - marker: c
    text: 'O: «y el Rey de Israel».'
    reason: alternative_reading
lexical_decisions:
- source_word: βαΐα τῶν φοινίκων
  english_pob_choice: the palm branches
  chosen_spanish: las ramas de palma
  alternatives_spanish:
  - las palmas
  - las ramas de las palmeras
  lexicon: BDAG
  rationale: βάϊα señala ramas/ramitas, y τῶν φοινίκων especifica que son de palma. «Ramas de palma» conserva el contenido léxico sin sonar rígido en español; «palmas» sería más breve pero menos explícito respecto a las ramas.
- source_word: ἐξῆλθον εἰς ὑπάντησιν αὐτῷ
  english_pob_choice: went out to meet him
  chosen_spanish: salieron a su encuentro
  alternatives_spanish:
  - fueron a recibirlo
  - salieron para encontrarse con él
  lexicon: BDAG
  rationale: ὑπάντησις denota ir al encuentro de alguien. «Salir a su encuentro» es idiomático en español y mantiene la dirección y finalidad de la acción sin añadir el matiz interpretativo de «recibirlo».
- source_word: ἐκραύγαζον
  english_pob_choice: were crying out
  chosen_spanish: gritando
  alternatives_spanish:
  - clamando
  - gritaban
  lexicon: BDAG
  rationale: El imperfecto expresa acción en curso o repetida. «Gritando» conserva esa continuidad de manera natural en español; «gritaban» también sería posible, pero la forma gerundiva integra mejor la escena en la oración principal.
- source_word: Ὡσαννά
  english_pob_choice: Hosanna
  chosen_spanish: Hosanna
  alternatives_spanish:
  - ¡Sálvanos ahora!
  - ¡Por favor, salva!
  lexicon: BDAG
  rationale: Se mantiene la transliteración porque funciona como aclamación reconocible en el contexto litúrgico y narrativo. Su sentido de fondo, ligado a una súplica de salvación, se conserva en nota.
- source_word: εὐλογημένος ὁ ἐρχόμενος
  english_pob_choice: Blessed is the one who comes
  chosen_spanish: Bendito el que viene
  alternatives_spanish:
  - Bendito el que viene
  - Bendito es el que viene
  - Bendito el que está por venir
  lexicon: BDAG
  rationale: La construcción participial se vierte con un relativo natural en español. «El que viene» reproduce el sentido de ὁ ἐρχόμενος sin forzar una forma más arcaica.
- source_word: ἐν ὀνόματι κυρίου
  english_pob_choice: in the name of the Lord
  chosen_spanish: en el nombre del Señor
  alternatives_spanish:
  - en nombre del Señor
  - con la autoridad del Señor
  lexicon: BDAG
  rationale: Es una expresión bíblica estable y debe mantenerse formalmente. Aunque el proyecto suele usar «Yahvé» para el nombre divino, aquí κυρίου reproduce la cita/alusión del Salmo y se conserva «Señor» en el texto principal según el valor inmediato del griego y la formulación tradicional de la aclamación.
- source_word: καὶ ὁ βασιλεὺς τοῦ Ἰσραήλ
  english_pob_choice: even the King of Israel
  chosen_spanish: y el Rey de Israel
  alternatives_spanish:
  - e incluso el Rey de Israel
  - sí, el Rey de Israel
  - y también el Rey de Israel
  lexicon: BDAG
  rationale: καί aquí añade la titulación regia final dentro de la aclamación. En español, «y el Rey de Israel» conserva la coordinación simple del griego sin introducir una intensificación inexistente en el texto base. Se mantiene «Rey de Israel» como título explícito.
theological_decisions:
- issue: κύριος en la cita de Salmo 118:26 y la alusión al nombre divino
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Yahvé
  - SEÑOR
  rationale: El griego dice κυρίου, y el testimonio POB en inglés también mantiene «Lord». Aunque el trasfondo salmódico remite al nombre divino, la forma griega citada en el versículo es la de κύριος; por eso se traduce «Señor» en el texto principal y no se sustituye por «Yahvé» en esta línea.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Señor'
- issue: La fuerza mesiánica y real de la aclamación final
  english_pob_reading: Retain the royal title 'the King of Israel' without softening or expanding it
  chosen_spanish_reading: Mantener «el Rey de Israel» como título real explícito
  alternative_spanish_readings:
  - el rey de Israel
  - Israel es su rey
  rationale: El versículo presenta a Jesús en términos reales y mesiánicos. La traducción conserva el título tal como aparece, sin explicarlo ni atenuarlo, para respetar la fuerza confesional de la escena.
  doctrine_reference: DOCTRINE.md Affirmations; Translation philosophy §1 and §3
translation_notes:
  revision_awareness: El paquete inglés revisó una versión más literal («branches of the palm trees») hacia la más natural «palm branches». La redacción española adopta una solución igualmente natural y fiel («ramas de palma»), manteniendo la explicitud léxica del griego sin sonar acartonada. También se conserva la decisión auditada de traducir κύριος como «Señor» en esta cita salmódica, y se preserva la posibilidad alternativa de leer la cláusula final como simple coordinación («y el Rey de Israel»).
  spanish_consistency_notes:
  - Se usa «Señor» para κύριος en la cita del Salmo, coherente con la decisión inglesa y con el valor inmediato del griego en este versículo.
  - Se conserva «Hosanna» transliterado por su carácter de aclamación reconocible; su sentido etimológico queda restringido a la nota.
  - «Rey de Israel» se capitaliza como título en mayúscula inicial por coherencia reverencial y editorial.
  - El gerundio «gritando» refleja el imperfecto griego sin añadir contenido aspectual extra.
  - La puntuación mantiene una sola cita directa con exclamaciones para reproducir el tono litúrgico de la escena.
