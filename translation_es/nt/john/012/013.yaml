review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del griego: tomar ramas de palma, salir al encuentro de Jesús, y aclamarlo con una cita/alusión al Salmo 118:26 culminada por el título real «el Rey de Israel». Sin embargo, hay dos desajustes relevantes con la evidencia y la estela POB: (1) ἐκραύγαζον es imperfecto y conviene expresarlo mejor que con el gerundio «gritando», que suena más subordinado que iterativo/progresivo; (2) la nota [a] justifica una preferencia que ya no coincide con la revisión inglesa final, que adoptó la forma más natural «palm branches».'
  spanish_quality_summary: 'El español es claro y eclesialmente legible, pero puede mejorar en naturalidad y precisión. «Ramas de palma» es comprensible, aunque «ramas de palmera» o simplemente «ramas de palma» ambas sirven; aquí el problema principal no es léxico sino la nota asociada. «Salieron a su encuentro» es excelente. «Gritando» funciona, pero «y gritaban» representa mejor el imperfecto. También hay un detalle de corrección idiomática: «ecoa» debe corregirse a «hace eco de» o «evoca».'
  glossary_alignment: Buena alineación general con la terminología del proyecto. «Hosanna» preserva la aclamación tradicional; «Señor» para κυρίου en esta cita griega está bien justificado pese al trasfondo del nombre divino; «Rey de Israel» mantiene adecuadamente la fuerza mesiánico-real. No hay conflicto serio de glosario, salvo que la nota [a] debe alinearse con la decisión inglesa final y la nota [c] debe seguir anclada al «y» como alternativa de lectura.
  issues:
  - severity: medium
    issue: «gritando» no representa tan bien el imperfecto ἐκραύγαζον como una forma finita
    rationale: El griego imperfecto sugiere acción en curso o repetida. En español, «y gritaban» o «y clamaban» lo preserva mejor que el gerundio, que puede leerse solo como modo concomitante.
  - severity: medium
    issue: La nota [a] contradice la revisión inglesa final sobre βαΐα τῶν φοινίκων
    rationale: El audit trail en inglés revisó explícitamente «the branches of the palm trees» a «the palm branches» por naturalidad. La nota española actual defiende evitar la compresión tradicional, pero esa ya no es la decisión POB vigente.
  - severity: low
    issue: La nota [b] usa «ecoa», forma poco natural en español estándar
    rationale: Es preferible «hace eco de» o «evoca», que son expresiones naturales y claras en español general.
