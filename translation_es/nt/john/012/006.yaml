translation:
  language: es
  text: Ahora dijo esto, no porque le importaran los pobres, sino porque era un ladrón, y teniendo la caja del dinero[a], solía llevarse[b] lo que se ponía en ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más tradicionalmente, «la bolsa del dinero». El término griego puede referirse a un recipiente para guardar dinero.
    reason: lexical_alternative
  - marker: b
    text: O «se lo llevaba» o «solía robar lo que se ponía en ella». El verbo a menudo significa «cargar» o «llevar», pero aquí el contexto («era un ladrón») indica apropiación indebida.
    reason: alternative_reading
lexical_decisions:
- source_word: εἶπεν δὲ τοῦτο
  english_pob_choice: Now he said this
  chosen_spanish: Ahora dijo esto
  alternatives_spanish:
  - Y dijo esto
  - Entonces dijo esto
  lexicon: BDAG
  rationale: δέ aquí es una conexión suave del discurso, no una oposición fuerte. «Ahora» conserva la fluidez narrativa sin añadir contraste indebido, y «dijo esto» sigue de cerca εἶπεν ... τοῦτο.
- source_word: οὐχ ὅτι
  english_pob_choice: not because
  chosen_spanish: no porque
  alternatives_spanish:
  - no que
  - no es que
  lexicon: BDAG
  rationale: La construcción introduce el motivo negado. «No porque» es la forma natural y fiel en español para marcar la causa rechazada.
- source_word: περὶ τῶν πτωχῶν
  english_pob_choice: about the poor
  chosen_spanish: los pobres
  alternatives_spanish:
  - acerca de los pobres
  - por los pobres
  lexicon: BDAG
  rationale: Con μέλει, περί + genitivo expresa preocupación por alguien. En español, el sentido se comunica con la expresión verbal «le importaran los pobres», que absorbe naturalmente la relación semántica sin perder el referente.
- source_word: ἔμελεν αὐτῷ
  english_pob_choice: he cared
  chosen_spanish: le importaran
  alternatives_spanish:
  - se preocupara
  - le importaban
  lexicon: BDAG
  rationale: μέλει con dativo expresa interés o preocupación personal. La perífrasis «le importaran» reproduce bien esa carga afectiva en un giro español idiomático y evita una formulación rígida.
- source_word: κλέπτης
  english_pob_choice: a thief
  chosen_spanish: un ladrón
  alternatives_spanish:
  - un furtivo
  - un ratero
  lexicon: BDAG
  rationale: κλέπτης es «ladrón» en español común y digno. «Robador» sería antinatural; «ladrón» mantiene la fuerza moral de la acusación.
- source_word: τὸ γλωσσόκομον
  english_pob_choice: the money box
  chosen_spanish: la caja del dinero
  alternatives_spanish:
  - la bolsa del dinero
  - el monedero
  lexicon: BDAG
  rationale: El término designa un recipiente para guardar dinero. Siguiendo la decisión inglesa de no ocultar el objeto bajo una tradición fija, «caja del dinero» comunica el valor básico del sustantivo y conserva la posibilidad de una alusión a un receptáculo portátil sin imponer «bolsa» como único sentido.
- source_word: ἔχων
  english_pob_choice: having
  chosen_spanish: teniendo
  alternatives_spanish:
  - habiendo
  - y teniendo
  lexicon: BDAG
  rationale: El participio expresa circunstancia concomitante. «Teniendo» mantiene la relación sintáctica con lo siguiente y refleja la posesión/control del dinero de manera directa.
- source_word: τὰ βαλλόμενα
  english_pob_choice: what was put into it
  chosen_spanish: lo que se ponía en ella
  alternatives_spanish:
  - lo que se metía en ella
  - lo depositado en ella
  lexicon: BDAG
  rationale: El participio pasivo de βάλλω aquí se refiere a lo que se iba introduciendo en la caja. «Se ponía en ella» conserva el movimiento repetido y la referencia al contenedor femenino («la caja»).
- source_word: ἐβάσταζεν
  english_pob_choice: he used to take
  chosen_spanish: solía llevarse
  alternatives_spanish:
  - solía sustraer
  - solía robar
  lexicon: BDAG
  rationale: Aunque βαστάζω suele significar «llevar/cargar», el contexto inmediato («era un ladrón») obliga a un sentido de apropiación indebida. «Solía llevarse» comunica la acción continuada sin convertir el texto en una glosa más fuerte de lo que exige el griego.
theological_decisions:
- issue: Sentido de ἐβάσταζεν en relación con la acusación de robo
  english_pob_reading: 'Render as ongoing misappropriation: ''he used to take what was put into it'''
  chosen_spanish_reading: «solía llevarse lo que se ponía en ella»
  alternative_spanish_readings:
  - «solía robar lo que se ponía en ella»
  - «lo que se ponía en ella, se lo llevaba»
  rationale: El contexto inmediato interpreta a Judas como ladrón, de modo que el verbo debe entenderse como apropiación indebida continua. «Solía llevarse» conserva el aspecto imperfectivo y la acusación, pero deja que sea el contexto el que determine la fuerza exacta del verbo, sin sobrecargar la traducción principal.
  doctrine_reference: Preservar la tensión contextual y la primacía del original sobre la tradición interpretativa.
translation_notes:
  revision_awareness: El borrador sigue de cerca el último pass de revisión, que indicó high agreement y no requirió cambios sustantivos. Se mantuvo la solución de traducir γλωσσόκομον con un término transparente y de reflejar ἐβάσταζεν como acción continua de apropiación indebida, sin resolver la tensión léxica a favor de un equivalente más fuerte que el texto no exige.
  spanish_consistency_notes:
  - Se conserva «Dios/Yahvé/Cristo» sin intervención porque no aparecen en este versículo.
  - Se mantiene un estilo formal y publicable, con sintaxis natural en español latinoamericano.
  - La nota de pie para γλωσσόκομον preserva la alternativa tradicional sin imponerla en el texto principal.
  - 'La nota sobre ἐβάσταζεν conserva la ambigüedad léxica útil: el verbo puede significar cargar, pero el contexto de robo inclina la lectura hacia apropiación indebida.'
