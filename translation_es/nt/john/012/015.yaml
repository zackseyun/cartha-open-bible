translation:
  language: es
  text: No temas[a], hija de Sion[b]. Mira[c], tu Rey viene[e], sentado sobre un pollino de una burra[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No tengas miedo».'
    reason: lexical_alternative
  - marker: b
    text: «Hija de Sion» es una personificación profética de Sion/Jerusalén.
    reason: cultural_note
  - marker: c
    text: 'O: «He aquí» o «Ve».'
    reason: lexical_alternative
  - marker: d
    text: Literalmente, «sobre un pollino de asna».
    reason: lexical_alternative
  - marker: e
    text: Esta redacción evoca Zacarías 9:9 y presenta a Jesús como el Rey prometido de Sion.
    reason: cross_reference
lexical_decisions:
- source_word: Μὴ φοβοῦ
  english_pob_choice: Do not be afraid
  chosen_spanish: No temas
  alternatives_spanish:
  - No tengas miedo
  - No temas, no
  lexicon: BDAG
  rationale: El imperativo negativo de φοβέομαι se expresa naturalmente en español con «No temas», que conserva la fuerza exhortativa y el tono directo sin volverse demasiado explicativo.
- source_word: θυγάτηρ Σιών
  english_pob_choice: daughter of Zion
  chosen_spanish: hija de Sion
  alternatives_spanish:
  - hija de Jerusalén
  - hija Sion
  lexicon: BDAG
  rationale: Se mantiene la personificación profética en forma transparente. «Sion» conserva el referente bíblico y «hija de Sion» reproduce el giro vocativo de la fuente griega.
- source_word: ἰδοὺ
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - He aquí
  - Mira bien
  - Ve
  lexicon: BDAG
  rationale: La partícula deíctica pide atención. «Mira» comunica esa función en español moderno con menos arcaísmo que «He aquí» y más naturalidad que una traducción rígida.
- source_word: ὁ βασιλεύς σου
  english_pob_choice: your King
  chosen_spanish: tu Rey
  alternatives_spanish:
  - tu rey
  lexicon: BDAG
  rationale: Se conserva el posesivo y el valor titular del sustantivo en contexto mesiánico. La mayúscula en «Rey» refleja la referencia real/mesiánica a Jesús, siguiendo la decisión editorial del POB en inglés.
- source_word: ἔρχεται
  english_pob_choice: is coming
  chosen_spanish: viene
  alternatives_spanish:
  - está viniendo
  - llega
  lexicon: BDAG
  rationale: El presente histórico/imperfectivo griego se puede verter de manera natural con «viene», que en español comunica movimiento inminente sin añadir perífrasis innecesaria.
- source_word: καθήμενος
  english_pob_choice: seated
  chosen_spanish: sentado
  alternatives_spanish:
  - seated
  - montado
  lexicon: BDAG
  rationale: El participio describe la manera del avance. «Sentado» es fiel y sobrio; evita introducir la idea interpretativa de «montado», que no está explícita en el participio.
- source_word: ἐπὶ πῶλον ὄνου
  english_pob_choice: on a donkey’s colt
  chosen_spanish: sobre un pollino de asna
  alternatives_spanish:
  - sobre un pollino de burra
  - sobre un pollino de una asna
  - sobre un joven asno
  lexicon: BDAG
  rationale: «Pollino» conserva el sentido de πῶλος como animal joven. «De asna» refleja el genitivo ὄνου sin suavizar la especificación zoológica; aunque suena más literal que idiomático, preserva la forma de la fuente y la relación con Zacarías 9:9.
theological_decisions:
- issue: Eco mesiánico de Zacarías 9:9 y título regio
  english_pob_reading: Retain the prophetic address 'daughter of Zion' and royal title 'your King' in straightforward English without expanding the allusion in the main text.
  chosen_spanish_reading: Mantener «hija de Sion» y «tu Rey» sin ampliar el comentario dentro del versículo.
  alternative_spanish_readings:
  - «hija de Jerusalén» y «tu rey» con glosa explicativa
  - paráfrasis que identifique explícitamente a Jesús en el texto principal
  rationale: La línea española debe conservar la alusión profética sin convertirla en explicación. La forma elegida deja visible el eco bíblico y permite que la cita/eco de Zacarías permanezca auditable en el texto mismo.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Mayúscula reverencial/titular en 'Rey'
  english_pob_reading: Capitalize 'King'
  chosen_spanish_reading: Escribir «Rey» con mayúscula
  alternative_spanish_readings:
  - escribir «rey» en minúscula
  - evitar toda capitalización distintiva
  rationale: Aunque el griego no marca mayúsculas de modo relevante, la mayúscula española sigue una decisión editorial equivalente a la del POB en inglés para señalar el valor titular y mesiánico del referente, sin añadir contenido doctrinal nuevo.
  doctrine_reference: Affirmations; Translation philosophy §6
translation_notes:
  revision_awareness: No se registraron revisiones aplicadas en el paquete fuente; el estado más reciente indica que el texto quedó sin cambios necesarios y hubo alto acuerdo en la verificación cruzada.
  spanish_consistency_notes:
  - Se mantiene «Sion» y no «Sión» para seguir la forma bíblica usual en español del proyecto y evitar oscilación gráfica dentro del verso.
  - Se prefirió «Rey» con mayúscula por coherencia con la decisión editorial del POB en inglés, sin alterar el contenido léxico.
  - «pollino de asna» conserva el paralelismo con el griego y la referencia indirecta a Zacarías 9:9, aunque suene menos idiomático que otras opciones.
