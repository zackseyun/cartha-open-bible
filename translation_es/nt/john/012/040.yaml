  text: Τετύφλωκεν αὐτῶν τοὺς ὀφθαλμοὺς καὶ ⸀ἐπώρωσεν αὐτῶν τὴν καρδίαν, ἵνα μὴ ἴδωσιν τοῖς ὀφθαλμοῖς καὶ νοήσωσιν τῇ καρδίᾳ καὶ ⸀στραφῶσιν, καὶ ⸀ἰάσομαι αὐτούς.
base_translation:
  language: en
  yaml_path: translation/nt/john/012/040.yaml
  text: He has blinded their eyes and hardened their heart[a], so that they may not see with their eyes and understand with their heart and turn[c][b], and I would heal them.
  footnotes:
  - marker: a
    text: Or 'be converted' for 'turn.'
    reason: lexical_alternative
  - marker: b
    text: Some translations read 'I will heal them'; the Greek form is future, but 'I would heal them' fits the quoted purpose/result construction in English.
    reason: lexical_alternative
  - marker: c
    text: This line echoes Isaiah 6:10.
    reason: cross_reference
