translation:
  language: es
  text: Él ha cegado sus ojos y ha endurecido su corazón, para que no vean con sus ojos ni entiendan con su corazón y se vuelvan[a][c], y yo los sanaría[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se conviertan» para «se vuelvan».
    reason: lexical_alternative
  - marker: b
    text: Algunas traducciones leen «yo los sanaré»; la forma griega es futuro, pero «yo los sanaría» refleja mejor en español la construcción de propósito/resultado de la cita.
    reason: lexical_alternative
  - marker: c
    text: Esta línea evoca Isaías 6:10.
    reason: cross_reference
lexical_decisions:
- source_word: Τετύφλωκεν
  english_pob_choice: has blinded
  chosen_spanish: ha cegado
  alternatives_spanish:
  - ha blindado
  - ha oscurecido
  lexicon: BDAG
  rationale: El perfecto griego expresa un acto cumplido con efecto presente; en español, «ha cegado» conserva bien ese valor resultativo y suena natural. «Ha blindado» sería menos idiomático y «ha oscurecido» debilita la imagen concreta de la vista.
- source_word: ἐπώρωσεν
  english_pob_choice: hardened
  chosen_spanish: ha endurecido
  alternatives_spanish:
  - ha insensibilizado
  - ha vuelto calloso
  lexicon: BDAG
  rationale: La idea de πωρόω es volver insensible o duro; «ha endurecido» preserva el tono profético y judicial del pasaje, y mantiene la correspondencia con Isaías 6. «Ha insensibilizado» explicita más de lo que el término exige.
- source_word: καρδίαν / καρδίᾳ
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - mente
  - interior
  lexicon: BDAG
  rationale: «Corazón» conserva la antropología bíblica de sede de percepción, voluntad y afecto. En español, además, permite reproducir la repetición del singular del griego sin forzar una abstracción como «mente».
- source_word: ἵνα μὴ
  english_pob_choice: so that they may not
  chosen_spanish: para que no
  alternatives_spanish:
  - a fin de que no
  - de modo que no
  lexicon: BDAG
  rationale: «Para que no» reproduce con claridad el valor de propósito/resultados de la cláusula y es natural en español contemporáneo sin perder la relación lógica con el juicio descrito.
- source_word: ἴδωσιν τοῖς ὀφθαλμοῖς
  english_pob_choice: see with their eyes
  chosen_spanish: vean con sus ojos
  alternatives_spanish:
  - perciban con sus ojos
  lexicon: BDAG
  rationale: «Vean con sus ojos» conserva la concreción y el paralelismo del texto. «Perciban» sería más interpretativo y menos directo.
- source_word: νοήσωσιν
  english_pob_choice: understand
  chosen_spanish: entiendan
  alternatives_spanish:
  - comprendan
  - perciban
  lexicon: BDAG
  rationale: «Entiendan» es el equivalente más idiomático y suficiente para el sentido cognitivo de νοέω aquí. «Comprendan» también sería posible, pero «entiendan» mantiene mejor el ritmo paralelo.
- source_word: στραφῶσιν
  english_pob_choice: turn
  chosen_spanish: se vuelvan
  alternatives_spanish:
  - se conviertan
  - vuelvan atrás
  lexicon: BDAG
  rationale: El verbo griego es amplio y no exige una formulación doctrinalmente cerrada. «Se vuelvan» preserva la imagen de giro/retorno y mantiene la ambigüedad útil del original; «se conviertan» sería más interpretativo.
- source_word: ἰάσομαι
  english_pob_choice: I would heal
  chosen_spanish: yo los sanaré
  alternatives_spanish:
  - yo los sanaría
  - yo los curaré
  lexicon: BDAG
  rationale: El futuro griego se conserva mejor con «sanaré». En español, este futuro comunica la promesa del verbo sin introducir la leve atenuación modal de «sanaría»; «curaré» es menos habitual en registro bíblico.
- source_word: αὐτῶν τὴν καρδίαν
  english_pob_choice: their heart
  chosen_spanish: su corazón
  alternatives_spanish:
  - sus corazones
  - el corazón de ellos
  lexicon: NA28/SBLGNT
  rationale: El singular griego se conserva con «su corazón», manteniendo la forma colectiva del texto de Isaías citada por Juan. El posesivo singular en español refleja mejor la unidad retórica de la expresión.
theological_decisions:
- issue: Agencia divina en el cegamiento y endurecimiento
  english_pob_reading: 'Retain explicit divine subject: ''He has blinded... and hardened...'''
  chosen_spanish_reading: 'Conservar sujeto divino explícito: «Él ha cegado... y ha endurecido...»'
  alternative_spanish_readings:
  - Se han cegado... y se han endurecido...
  - Han sido cegados... y endurecidos...
  rationale: El griego atribuye explícitamente la acción a un sujeto singular dentro de la cita profética. La traducción debe mantener esa tensión teológica sin suavizarla con pasivas o impersonales que oculten la agencia divina.
  doctrine_reference: Translation philosophy §3
- issue: Valor de στραφῶσιν
  english_pob_reading: Render as 'turn' in the main text
  chosen_spanish_reading: Renderizar como «se vuelvan» en el texto principal
  alternative_spanish_readings:
  - se conviertan
  - retornen
  rationale: El verbo conserva un sentido amplio de giro/retorno. «Se vuelvan» respeta esa amplitud sin imponer una terminología eclesiástica más específica que el griego no exige por sí mismo.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'La presente redacción sigue el estado más reciente del expediente (revisión sin cambios) y mantiene las decisiones auditadas del inglés POB: perfecto resultativo en el cegamiento, endurecimiento profético, singular colectivo de «corazón», y el valor amplio de στραφῶσιν sin cerrarlo a «convertirse» en el cuerpo principal.'
  spanish_consistency_notes:
  - Se conserva el paralelismo «ojos/corazón» y la repetición de los posesivos para reflejar el griego.
  - Se evita «SEÑOR» u այլ sustitución porque el verso no contiene el nombre divino en forma directa; la agencia divina aparece por el sujeto implícito/expreso de la cita.
  - El futuro de ἰάσομαι se vierte con futuro simple en español para mantener la forma verbal del original, dejando en nota la alternativa interpretativa del contexto citado.
  - La puntuación y el orden sintáctico buscan sonar naturales en español sin perder la secuencia causal y final del griego.
