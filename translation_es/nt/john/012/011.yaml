translation:
  language: es
  text: porque muchos de los judíos[a] se iban[b] a causa de él y creían en Jesús[c][d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «muchos de los judeanos». En Juan, «los judíos» a veces puede referirse con más precisión a los judeanos o a las autoridades judías, según el contexto.
    reason: alternative_reading
  - marker: b
    text: O «se apartaban» o «se retiraban». El verbo griego sugiere una acción continua o repetida de irse, probablemente apartándose de la postura o influencia de las autoridades opuestas a Jesús.
    reason: lexical_alternative
  - marker: c
    text: O «ponían su fe en Jesús» o «confiaban en Jesús».
    reason: lexical_alternative
  - marker: d
    text: O «porque muchos de los judíos se iban a causa de él».
    reason: previous_rendering
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Introduce la causa de la afirmación previa; «porque» expresa con naturalidad la relación causal en español sin añadir matices no presentes en el griego.
- source_word: πολλοὶ
  english_pob_choice: many
  chosen_spanish: muchos
  alternatives_spanish:
  - una gran cantidad de
  lexicon: BDAG
  rationale: Adjetivo cuantitativo directo y natural; conserva la amplitud del griego sin exagerarla.
- source_word: δι’ αὐτὸν
  english_pob_choice: because of him
  chosen_spanish: a causa de él
  alternatives_spanish:
  - por él
  - por causa de él
  - debido a él
  lexicon: BDAG
  rationale: La construcción con διά + acusativo tiene valor causal aquí. «A causa de él» comunica la causa de manera clara y sobria en español.
- source_word: ὑπῆγον
  english_pob_choice: were going away
  chosen_spanish: se estaban yendo
  alternatives_spanish:
  - se iban
  - se apartaban
  - se retiraban
  lexicon: BDAG
  rationale: El imperfecto expresa acción continua o repetida. «Se estaban yendo» mantiene el aspecto progresivo sin forzar una interpretación más específica que el texto no explicita.
- source_word: τῶν Ἰουδαίων
  english_pob_choice: of the Jews
  chosen_spanish: de los judíos
  alternatives_spanish:
  - de los judeanos
  - entre los judíos
  lexicon: BDAG
  rationale: Se conserva la forma más cercana al griego en el texto principal. En Juan, el término puede tener matices contextuales; se evita resolverlo de modo excesivamente restrictivo en la línea principal.
- source_word: ἐπίστευον εἰς τὸν Ἰησοῦν
  english_pob_choice: were believing in Jesus
  chosen_spanish: estaban creyendo en Jesús
  alternatives_spanish:
  - creían en Jesús
  - ponían su fe en Jesús
  - confiaban en Jesús
  lexicon: BDAG
  rationale: El imperfecto sugiere una respuesta en curso. «Estaban creyendo» conserva el valor aspectual y refleja la dirección personal de πιστεύω εἰς sin añadir conclusiones doctrinales.
theological_decisions:
- issue: Sentido de τῶν Ἰουδαίων en Juan
  english_pob_reading: Rendered as 'the Jews' in the main text, referring here to many people within the Jewish population rather than making it a blanket ethnic condemnation.
  chosen_spanish_reading: «de los judíos» en el texto principal, entendiendo el grupo como un subconjunto del pueblo judío en el contexto inmediato, no como una generalización universal.
  alternative_spanish_readings:
  - de los judeanos
  - de las autoridades judías
  rationale: Juan usa Ἰουδαῖοι con referencias variables. Aquí el sintagma partitivo apunta a un grupo numeroso dentro de ese conjunto. La traducción conserva la forma del original y deja abierta la matización contextual.
  doctrine_reference: Principio de primacía del texto original; preservar la tensión interpretativa sin resolverla prematuramente
- issue: Fuerza de πιστεύω εἰς
  english_pob_reading: Rendered as 'were believing in Jesus' rather than a stronger doctrinal paraphrase such as 'were becoming disciples' or 'were being saved.'
  chosen_spanish_reading: «estaban creyendo en Jesús» sin ampliar el enunciado a discipulado, salvación o pertenencia plena.
  alternative_spanish_readings:
  - ponían su fe en Jesús
  - confiaban en Jesús
  rationale: El versículo afirma fe/belief dirigida a Jesús, pero no desarrolla aquí todas sus implicaciones. La redacción mantiene la afirmación textual sin importar conclusiones teológicas posteriores.
  doctrine_reference: No añadir al texto lo que el texto no dice; mantener la precisión semántica de πιστεύω
translation_notes:
  revision_awareness: 'El texto español sigue el último estado revisado del audit trail: mantiene la causalidad de ὅτι con «porque», conserva la relación causal de δι’ αὐτόν con una expresión natural en español, y refleja el imperfecto de ὑπῆγον y ἐπίστευον como acciones en curso. Se incorporan notas para las alternativas documentadas sin añadir interpretaciones ajenas al contexto.'
  spanish_consistency_notes:
  - Se usa «Jesús» para Ἰησοῦς, de manera consistente con el estándar del proyecto.
  - Se evita «Mesías» porque no aparece Χριστός ni lenguaje mesiánico explícito en este versículo.
  - Se mantiene «judíos» en el cuerpo principal y se documenta la alternativa contextual «judeanos» en nota.
  - No se emplea lenguaje eclesiástico tradicional que oscurezca el sentido aspectual del imperfecto griego.
