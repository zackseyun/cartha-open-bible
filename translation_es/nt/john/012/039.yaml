translation:
  language: es
  text: 'Por esta razón no podían creer, porque Isaías dijo otra vez:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: διὰ τοῦτο
  english_pob_choice: For this reason
  chosen_spanish: Por esta razón
  alternatives_spanish:
  - Por eso
  - Debido a esto
  - Así que
  lexicon: BDAG
  rationale: La construcción causal se expresa de forma natural en español con «Por esta razón». Conserva el vínculo explícito con el contexto previo sin volverlo meramente inferencial.
- source_word: οὐκ ἠδύναντο
  english_pob_choice: they were not able
  chosen_spanish: no podían
  alternatives_spanish:
  - no eran capaces de
  - no pudieron
  lexicon: BDAG
  rationale: El imperfecto de δύναμαι señala incapacidad continua; «no podían» comunica esa imposibilidad de modo natural en español y preserva la fuerza de incapacidad sin suavizarla a mera falta de voluntad.
- source_word: πιστεύειν
  english_pob_choice: to believe
  chosen_spanish: creer
  alternatives_spanish:
  - tener fe
  lexicon: BDAG
  rationale: En Juan, πιστεύω se expresa con naturalidad como «creer». «Tener fe» es posible, pero menos idiomático en esta construcción y menos consistente con el uso joánico repetido.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - que
  lexicon: BDAG
  rationale: Aquí ὅτι introduce la razón vinculada a la cita que sigue; «porque» reproduce mejor esa relación causal inmediata en español.
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  - nuevamente
  lexicon: BDAG
  rationale: «Otra vez» es la forma más directa y natural en español para marcar una nueva cita de Isaías, manteniendo el valor adverbial de repetición.
- source_word: εἶπεν
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  lexicon: BDAG
  rationale: En una fórmula introductoria de cita, «dijo» es la equivalencia más natural y precisa para λέγω.
- source_word: Ἠσαΐας
  english_pob_choice: Isaiah
  chosen_spanish: Isaías
  alternatives_spanish:
  - Isaías el profeta
  lexicon: BDAG
  rationale: Nombre propio transliterado de forma estándar al español; no se añade glosa porque el contexto ya identifica al autor citado.
theological_decisions:
- issue: Naturaleza de la incapacidad para creer
  english_pob_reading: Render the text straightforwardly as inability ('they were not able to believe') without importing a doctrinal explanation of why or how this inability operates.
  chosen_spanish_reading: 'Traducir de manera directa la incapacidad: «no podían creer», sin convertirla en mera negativa de voluntad ni resolver el trasfondo teológico.'
  alternative_spanish_readings:
  - no querían creer
  - no podían llegar a creer
  - no estaban en condiciones de creer
  rationale: El griego expresa incapacidad real, no simple resistencia moral. La traducción conserva esa tensión sin interpretar el mecanismo de la incapacidad; el pasaje por sí solo no obliga a una lectura doctrinal específica.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: Sin revisiones adicionales en el paquete fuente; la redacción sigue la lectura auditada de alta concordancia y conserva el valor causal, la incapacidad y la introducción de la cita sin ampliaciones interpretativas.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como terminología general del proyecto, pero este versículo no contiene el Tetragrámaton ni un equivalente directo.
  - Se eligió «creer» para πιστεύειν por consistencia joánica y naturalidad en español.
  - La puntuación con dos puntos conserva la fórmula introductoria de cita que queda abierta hacia el versículo siguiente.
