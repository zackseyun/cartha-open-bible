translation:
  language: es
  text: 'Entonces Jesús dijo[a]: «Déjala en paz[b], para que guarde el perfume para el día de mi sepultura».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Déjala en paz; ella lo ha guardado para el día de mi sepultura». Algunos entienden la cláusula como una descripción de lo que ella ya hizo, en vez de lo que todavía podría hacer.'
    reason: alternative_reading
  - marker: b
    text: 'O: «Déjala en paz, para que guarde el perfume hasta el día de mi sepultura». La construcción griega también puede leerse con un sentido temporal más explícito.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Entonces
  alternatives_spanish:
  - Así que
  - Por tanto
  lexicon: BDAG
  rationale: En narración, οὖν marca continuidad inferencial o secuencial. «Entonces» comunica esa transición de manera natural en español sin endurecerla como conclusión lógica formal.
- source_word: Ἄφες αὐτήν
  english_pob_choice: Leave her alone
  chosen_spanish: Déjala
  alternatives_spanish:
  - Déjenla
  - Permítela
  lexicon: BDAG
  rationale: El imperativo de ἀφίημι aquí funciona como una orden de no intervenir. En español, «Déjala» conserva la fuerza directa y resulta más idiomático que una paráfrasis más larga.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: La cláusula expresa propósito o resultado previsto. «Para que» mantiene esa relación con claridad y naturalidad en español.
- source_word: εἰς τὴν ἡμέραν
  english_pob_choice: for the day
  chosen_spanish: para el día
  alternatives_spanish:
  - hasta el día
  - para el día de
  lexicon: BDAG
  rationale: La construcción con εἰς y τηρέω apunta hacia una fecha u ocasión futura en vista. «Para el día» preserva esa orientación sin fijar demasiado el matiz temporal en el texto principal.
- source_word: ἐνταφιασμοῦ
  english_pob_choice: burial
  chosen_spanish: sepultura
  alternatives_spanish:
  - entierro
  - enterramiento
  lexicon: BDAG
  rationale: «Sepultura» es un equivalente natural y digno en español para el acto o circunstancia del enterramiento, y puede abarcar el matiz de burial/entombment sin sonar técnico.
- source_word: τηρήσῃ
  english_pob_choice: may keep
  chosen_spanish: la guarde
  alternatives_spanish:
  - la conserve
  - la reserve
  lexicon: BDAG
  rationale: τηρέω puede significar guardar o preservar para un momento concreto. «La guarde» mantiene el valor de reservarla con vista al día indicado y encaja bien con la forma subjuntiva del griego.
- source_word: αὐτό
  english_pob_choice: it
  chosen_spanish: la
  alternatives_spanish:
  - lo
  - eso
  lexicon: BDAG
  rationale: Aunque el pronombre griego es neutro, el referente implícito es el perfume/ungüento, que en español suele expresarse con femenino por concordar con el objeto subentendido en este contexto narrativo. Se mantiene la referencia sin añadir una glosa explícita.
theological_decisions:
- issue: Interpretación de la cláusula de propósito en relación con la sepultura de Jesús
  english_pob_reading: Render the clause as Jesus directing that the perfume be kept for the day of his burial, preserving the forward-looking connection to his impending death.
  chosen_spanish_reading: La traducción principal presenta a Jesús mandando que el perfume quede reservado para el día de su sepultura, manteniendo la referencia anticipada a su muerte.
  alternative_spanish_readings:
  - Déjala; ella lo ha guardado para el día de mi sepultura
  - Déjala, para que lo guarde hasta el día de mi sepultura
  rationale: El griego admite más de una lectura sintáctica real. La redacción principal sigue la fuerza más directa de Ἄφες... ἵνα... τηρήσῃ, pero sin eliminar la ambigüedad subyacente. Las alternativas se conservan para no resolver artificialmente la tensión textual.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no se registraron cambios y el nivel de acuerdo interrevisor fue alto. La versión española conserva esa estabilidad, trasladando al español la misma ambigüedad sintáctica y la referencia a la sepultura de Jesús.'
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς, conforme al estándar del proyecto.
  - Se usa «sepultura» para ἐνταφιασμοῦ por claridad y dignidad estilística, sin perder el sentido de burial.
  - Se evita traducir mecánicamente «may keep» por una forma demasiado técnica; «la guarde» transmite mejor la función de reservar.
  - Se conserva la ambigüedad del pronombre y de la cláusula de ἵνα mediante notas, en vez de fijar una sola interpretación en el texto principal.
