  glossary_alignment: No hay conflicto con los términos teológicos por defecto del proyecto. «Jesús» y «sepultura» son adecuados. La revisión propuesta mantiene la decisión POB de no sobreinterpretar τηρήσῃ y conserva las alternativas en notas. Se ajusta mejor al razonamiento léxico documentado al evitar un pronombre español potencialmente confuso para αὐτό.
