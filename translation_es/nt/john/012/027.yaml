translation:
  language: es
  text: Ahora mi alma[a] está turbada, ¿y qué diré? Padre, sálvame de esta hora. Pero para esto vine a esta hora.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Y qué diré? “Padre, sálvame de esta hora”?». El griego también puede leerse como una pregunta retórica más que como una petición directa.'
    reason: alternative_reading
lexical_decisions:
- source_word: Νῦν
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - En este momento
  - Ahora mismo
  lexicon: BDAG
  rationale: El adverbio marca inmediatez temporal y dramática. «Ahora» es natural en español y conserva la urgencia del contexto sin añadir énfasis innecesario.
- source_word: ψυχή
  english_pob_choice: soul
  chosen_spanish: alma
  alternatives_spanish:
  - vida
  - ser
  - yo interior
  lexicon: BDAG
  rationale: «Alma» preserva el peso antropológico y la fuerza tradicional del término, sin reducirlo a «vida» ni disolverlo en una paráfrasis más abstracta.
- source_word: τετάρακται
  english_pob_choice: is troubled
  chosen_spanish: está turbada
  alternatives_spanish:
  - está perturbada
  - está angustiada
  - está conmovida
  lexicon: BDAG
  rationale: El perfecto describe un estado presente resultante de agitación. «Está turbada» suena natural en español bíblico y conserva la tensión emocional y existencial.
- source_word: τί εἴπω
  english_pob_choice: what should I say?
  chosen_spanish: ¿y qué diré?
  alternatives_spanish:
  - ¿qué debo decir?
  - ¿qué he de decir?
  lexicon: BDAG
  rationale: La forma deliberativa expresa vacilación reflexiva. «¿Y qué diré?» reproduce bien el giro interrogativo y mantiene la conexión con la cláusula anterior.
- source_word: πάτερ
  english_pob_choice: Father
  chosen_spanish: Padre
  alternatives_spanish:
  - Oh, Padre
  - Padre mío
  lexicon: BDAG
  rationale: Es un vocativo dirigido a Dios. «Padre» es la forma natural y fiel en español contemporáneo.
- source_word: σῶσόν με ἐκ τῆς ὥρας ταύτης
  english_pob_choice: save me from this hour
  chosen_spanish: sálvame de esta hora
  alternatives_spanish:
  - líbrame de esta hora
  - rescátame de esta hora
  lexicon: BDAG
  rationale: «Salvar» conserva el valor básico de σῴζω y la solicitud directa. «Esta hora» mantiene el término joánico con su carga teológica de momento señalado.
- source_word: ὥρα
  english_pob_choice: hour
  chosen_spanish: hora
  alternatives_spanish:
  - tiempo
  - momento
  lexicon: BDAG
  rationale: Juan usa «hora» como término teológicamente cargado para el momento decisivo de la pasión y glorificación. Se conserva el sustantivo literal para no perder ese motivo.
- source_word: ἀλλὰ διὰ τοῦτο
  english_pob_choice: But for this reason
  chosen_spanish: Pero para esto
  alternatives_spanish:
  - Mas para esto
  - Pero por esta razón
  lexicon: BDAG
  rationale: La frase introduce contraste y propósito. «Pero para esto» es breve, natural y refleja la finalidad implícita sin recargar el español.
- source_word: ἦλθον εἰς τὴν ὥραν ταύτην
  english_pob_choice: I came to this hour
  chosen_spanish: he venido a esta hora
  alternatives_spanish:
  - vine a esta hora
  - he llegado a esta hora
  lexicon: BDAG
  rationale: El aoristo puede expresarse de manera natural en español con presente perfecto para subrayar la relevancia del acto consumado en relación con el momento presente. «He venido» suena idiomático y conserva la idea de llegada al momento señalado.
theological_decisions:
- issue: Si la frase «Padre, sálvame de esta hora» debe leerse como petición directa o como parte de una pregunta retórica que continúa desde «¿y qué diré?», conservando la tensión del texto griego.
  english_pob_reading: The main text renders it as a direct plea, while the footnote preserves the rhetorical-question alternative.
  chosen_spanish_reading: 'Se traduce como una súplica directa: «Padre, sálvame de esta hora».'
  alternative_spanish_readings:
  - «¿Y qué diré? “Padre, sálvame de esta hora”?»
  - «¿Y qué diré? ¿Padre, sálvame de esta hora?»
  rationale: 'La puntuación antigua no es original, así que el griego admite más de una segmentación. La lectura directa coincide con el texto base SBLGNT y mantiene la tensión: Jesús expresa genuina repugnancia ante la hora, pero no se desvía de la misión para la cual vino. La nota preserva la alternativa retórica sin resolverla dogmáticamente.'
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en vez de resolverla.'
translation_notes:
  revision_awareness: 'Concordancia alta con la revisión más reciente: no se requirieron cambios respecto del acuerdo de alta coincidencia; se conserva la división interpretativa señalada en el audio-trazado inglés y se adapta al español con puntuación natural.'
  spanish_consistency_notes:
  - Se mantiene «hora» para preservar el motivo joánico, no «tiempo» ni «momento».
  - Se usa «alma» para ψυχή por su fuerza antropológica y para evitar una paráfrasis demasiado interpretativa.
  - Se conserva la tensión entre súplica directa y lectura retórica mediante nota, sin suavizarla.
  - Se emplea español digno y claro, evitando calcos innecesarios del inglés.
