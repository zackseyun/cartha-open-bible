translation:
  language: es
  text: Sin embargo, incluso entre los gobernantes muchos creyeron en él, pero a causa de los fariseos no lo confesaban, para no ser excluidos[a] de la sinagoga.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ser expulsados de la sinagoga» o «ser puestos fuera de la sinagoga». El griego expresa exclusión de la comunidad sinagogal.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅμως μέντοι
  english_pob_choice: Nevertheless
  chosen_spanish: Sin embargo
  alternatives_spanish:
  - No obstante
  - Sin embargo,
  - Con todo
  lexicon: BDAG
  rationale: La pareja de partículas expresa contraste concesivo. «Sin embargo» transmite con naturalidad esa oposición en español y mantiene el tono de transición adversativa sin sobrecargar el texto.
- source_word: ἐκ τῶν ἀρχόντων πολλοὶ
  english_pob_choice: even among the rulers many
  chosen_spanish: incluso entre los gobernantes muchos
  alternatives_spanish:
  - también muchos de los gobernantes
  - muchos aun de los gobernantes
  lexicon: BDAG
  rationale: ἐκ con genitivo marca procedencia o pertenencia al grupo; «entre los gobernantes» conserva esa idea. «Gobernantes» funciona bien en contexto joánico para ἄρχοντες como autoridades dirigentes.
- source_word: ἐπίστευσαν εἰς αὐτόν
  english_pob_choice: believed in him
  chosen_spanish: creyeron en él
  alternatives_spanish:
  - pusieron fe en él
  - creyeron hacia él
  lexicon: BDAG
  rationale: En Juan, πιστεύω εἰς expresa confianza dirigida a Jesús. «Creyeron en él» es la forma española más natural y fiel sin introducir una paráfrasis interpretativa.
- source_word: διὰ τοὺς Φαρισαίους
  english_pob_choice: because of the Pharisees
  chosen_spanish: a causa de los fariseos
  alternatives_spanish:
  - por los fariseos
  - por temor a los fariseos
  lexicon: BDAG
  rationale: διά con acusativo indica causa. «A causa de» evita añadir explícitamente el temor, que el contexto sugiere pero no formula en esta frase.
- source_word: οὐχ ὡμολόγουν
  english_pob_choice: they were not confessing him
  chosen_spanish: no lo confesaban
  alternatives_spanish:
  - no lo declaraban abiertamente
  - no lo reconocían
  lexicon: BDAG
  rationale: El imperfecto sugiere una negativa continua o habitual. «No lo confesaban» conserva el valor de ὁμολογέω en sentido público/religioso y mantiene la referencia implícita a Jesús de modo fluido en español.
- source_word: ἵνα μὴ ἀποσυνάγωγοι γένωνται
  english_pob_choice: so that they might not become excluded from the synagogue
  chosen_spanish: para no ser excluidos de la sinagoga
  alternatives_spanish:
  - para no ser expulsados de la sinagoga
  - para no quedar fuera de la sinagoga
  lexicon: BDAG
  rationale: ἀποσυνάγωγος denota exclusión de la comunidad sinagogal. «Ser excluidos de la sinagoga» conserva el matiz comunitario y evita precisar un procedimiento disciplinario que el término por sí solo no exige.
theological_decisions:
- issue: Estado de la fe de los gobernantes y la tensión entre creer y no confesar
  english_pob_reading: Render ἐπίστευσαν straightforwardly as 'believed' without weakening it to 'professed belief' or strengthening it to 'were truly saved.'
  chosen_spanish_reading: Traducir ἐπίστευσαν de manera directa como «creyeron», sin rebajar ni intensificar su alcance salvífico.
  alternative_spanish_readings:
  - muchos fingían creer
  - muchos llegaron a una fe salvadora plena
  rationale: El versículo afirma que muchos creyeron, pero también que no lo confesaban. La traducción debe conservar esa tensión sin resolverla teológicamente más allá del texto.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del audit trail: la referencia implícita de οὐχ ὡμολόγουν se refleja como «no lo confesaban», en línea con la corrección aprobada frente a la forma anterior «no confesaban eso».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando el texto lo requiera; este versículo no contiene el tetragrámaton.
  - «Fariseos» y «sinagoga» se conservan como términos establecidos y transparentes en español eclesial.
  - La voz verbal en imperfecto («confesaban») preserva la acción continua del griego.
  - La nota al pie está anclada en «sinagoga» porque en español surge una posible ambigüedad entre exclusión comunitaria y expulsión formal.
