translation:
  language: es
  text: Al día siguiente, la gran multitud que había venido a la fiesta[a], al oír que Jesús venía a Jerusalén[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «festival» para ἑορτή.
    reason: lexical_alternative
  - marker: b
    text: 'El griego usa un presente histórico: «Jesús viene a Jerusalén».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Τῇ ἐπαύριον
  english_pob_choice: The next day
  chosen_spanish: Al día siguiente
  alternatives_spanish:
  - El día siguiente
  - Al otro día
  lexicon: BDAG
  rationale: La expresión temporal funciona de manera idiomática como marcador narrativo; en español, «Al día siguiente» comunica con naturalidad la secuencia sin endurecer el estilo.
- source_word: ὁ ὄχλος πολὺς
  english_pob_choice: the large crowd
  chosen_spanish: la gran multitud
  alternatives_spanish:
  - la gran muchedumbre
  - la multitud grande
  lexicon: BDAG
  rationale: ὄχλος puede ser «multitud» o «muchedumbre»; el adjetivo πολὺς intensifica tamaño. «Gran multitud» conserva el valor colectivo y la amplitud del grupo con un registro bíblico claro y moderno.
- source_word: ὁ ἐλθὼν εἰς τὴν ἑορτήν
  english_pob_choice: that had come to the feast
  chosen_spanish: que había venido a la fiesta
  alternatives_spanish:
  - que había acudido a la fiesta
  - que había llegado a la fiesta
  lexicon: BDAG
  rationale: El participio articular funciona atributivamente y pide una relativa en español. «Había venido» refleja anterioridad respecto del momento narrativo. «Fiesta» es una buena equivalencia de ἑορτή en este contexto joánico; «festival» es posible, pero menos natural en español bíblico corriente.
- source_word: ἀκούσαντες
  english_pob_choice: when they heard
  chosen_spanish: al oír
  alternatives_spanish:
  - cuando oyeron
  - después de oír
  lexicon: BDAG
  rationale: Aunque formalmente es participio aoristo plural, aquí aporta circunstancia temporal. «Al oír» suena natural en español y mantiene el valor de simultaneidad inmediata con la reacción del grupo.
- source_word: ὅτι ἔρχεται
  english_pob_choice: that Jesus was coming
  chosen_spanish: que Jesús venía
  alternatives_spanish:
  - que Jesús estaba viniendo
  - que Jesús estaba llegando
  lexicon: BDAG
  rationale: El presente histórico ἔρχεται puede traducirse con imperfecto en narración española. «Venía» preserva el matiz de acción en curso sin forzar un calco del presente.
- source_word: ὁ Ἰησοῦς
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  lexicon: BDAG
  rationale: Nombre propio transliterado según la norma del proyecto.
- source_word: εἰς Ἱεροσόλυμα
  english_pob_choice: to Jerusalem
  chosen_spanish: a Jerusalén
  alternatives_spanish:
  - hacia Jerusalén
  - hasta Jerusalén
  lexicon: BDAG
  rationale: Con verbo de movimiento, εἰς indica dirección. En español, «a Jerusalén» es natural y fiel; evita una sobreexplicación que alteraría el flujo narrativo.
theological_decisions:
- issue: Valor del tiempo verbal histórico en ἔρχεται
  english_pob_reading: 'Greek uses a historical present: ''Jesus is coming to Jerusalem.'''
  chosen_spanish_reading: 'Se conserva con un imperfecto narrativo: «Jesús venía a Jerusalén».'
  alternative_spanish_readings:
  - Jesús viene a Jerusalén
  - Jesús estaba viniendo a Jerusalén
  rationale: No hay diferencia doctrinal, pero sí una decisión estilística y de aspecto verbal. El imperfecto español transmite bien la escena en desarrollo dentro del relato pasado, sin perder la observación auditada sobre el presente histórico griego.
  doctrine_reference: Aspecto verbal narrativo; no implica diferencia doctrinal.
translation_notes:
  revision_awareness: El texto sigue el pasaje base sin revisiones aplicadas; se conserva la alta concordancia del control cruzado y la observación auditada sobre el presente histórico griego en ἔρχεται.
  spanish_consistency_notes:
  - Se mantiene «Jesús» como nombre propio y «Jerusalén» como topónimo estándar.
  - «Fiesta» se usa para ἑορτή según el contexto pascual/fiestal joánico y la tradición lexical auditada.
  - Se evitó «SEÑOR» porque no aparece el nombre divino en este versículo.
  - La sintaxis española sigue la secuencia temporal del griego con una cláusula principal y una subordinada circunstancial natural.
