revisions:
- from: Sus discípulos no entendieron estas cosas al principio[a], pero cuando Jesús fue glorificado[b], entonces recordaron que estas cosas estaban escritas acerca de él[c] y que le habían hecho estas cosas.
  to: Sus discípulos no entendieron estas cosas al principio[a], pero cuando Jesús fue glorificado[b], entonces recordaron que estas cosas habían sido escritas acerca de él[c] y que habían hecho estas cosas a él.
  rationale: Se ajusta la cláusula final para mejorar la claridad y la naturalidad del español, evitando el dativo pronominal «le» en una construcción que suena torpe. También se adopta «habían sido escritas» para reflejar mejor la anterioridad del testimonio escrito en relación con el recuerdo posterior de los discípulos. Se conservan las decisiones léxicas y teológicas principales del borrador.
