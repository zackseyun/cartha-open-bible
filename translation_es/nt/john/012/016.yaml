translation:
  language: es
  text: Sus discípulos no entendieron estas cosas al principio[a], pero cuando Jesús fue glorificado[b], entonces recordaron que estas cosas habían sido escritas acerca de él[c] y que habían hecho estas cosas a él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no conocieron estas cosas al principio».'
    reason: lexical_alternative
  - marker: b
    text: En Juan, «fue glorificado» suele referirse a la glorificación de Jesús mediante su muerte, resurrección y exaltación.
    reason: cross_reference
  - marker: c
    text: 'O: «estaban escritas acerca de él».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔγνωσαν
  english_pob_choice: did not understand
  chosen_spanish: no entendieron
  alternatives_spanish:
  - no supieron
  - no conocieron
  lexicon: BDAG
  rationale: En este contexto narrativo, γινώσκω no expresa mera ausencia de información, sino falta de comprensión del sentido de los hechos. «No entendieron» comunica bien ese valor sin perder fidelidad al griego.
- source_word: αὐτοῦ οἱ μαθηταί
  english_pob_choice: his disciples
  chosen_spanish: sus discípulos
  alternatives_spanish:
  - los discípulos de él
  lexicon: BDAG
  rationale: El genitivo pronominal funciona naturalmente como posesivo en español. «Sus discípulos» es la forma más clara y fiel en registro normal.
- source_word: τὸ πρῶτον
  english_pob_choice: at first
  chosen_spanish: al principio
  alternatives_spanish:
  - primero
  - inicialmente
  lexicon: BDAG
  rationale: La expresión temporal idiomática se vierte de forma natural como «al principio», que conserva el sentido de inicio de la incomprensión.
- source_word: ἐδοξάσθη
  english_pob_choice: was glorified
  chosen_spanish: fue glorificado
  alternatives_spanish:
  - fue exaltado
  - fue honrado
  lexicon: BDAG
  rationale: «Fue glorificado» mantiene el verbo técnico y teológicamente cargado de Juan. No se reduce a «honrado», y deja abierta la tensión joánica sobre pasión, resurrección y exaltación.
- source_word: ἐμνήσθησαν
  english_pob_choice: they remembered
  chosen_spanish: recordaron
  alternatives_spanish:
  - se acordaron
  - trajeron a la memoria
  lexicon: BDAG
  rationale: El sentido narrativo pide una acción mental pasada y simple. «Recordaron» es natural en español y conserva el valor de rememoración.
- source_word: ἐπ’ αὐτῷ γεγραμμένα
  english_pob_choice: had been written about him
  chosen_spanish: estaban escritas acerca de él
  alternatives_spanish:
  - habían sido escritas acerca de él
  - estaban escritas sobre él
  lexicon: BDAG
  rationale: La preposición ἐπί con dativo aquí significa «acerca de/con respecto a», no un valor espacial. Para el español, la pasiva resultante se expresa con «estaban escritas», que conserva el antecedente textual sin forzar un pluscuamperfecto innecesario.
- source_word: ταῦτα ἐποίησαν αὐτῷ
  english_pob_choice: they had done these things to him
  chosen_spanish: le habían hecho estas cosas
  alternatives_spanish:
  - le hicieron estas cosas
  - le habían hecho esto
  lexicon: BDAG
  rationale: El dativo αὐτῷ se refleja naturalmente con «le». «Habían hecho» coordina bien con el valor previo de las Escrituras ya escritas y mantiene la relación con los actos de la entrada triunfal.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  lexicon: BDAG
  rationale: El neutro plural se conserva con «estas cosas» para retener la repetición y la referencia colectiva a los hechos narrados.
theological_decisions:
- issue: Sentido de «glorificado» en Juan
  english_pob_reading: Retain the wording 'was glorified' without specifying whether this refers narrowly to resurrection/exaltation or more broadly to the whole passion-resurrection-exaltation complex.
  chosen_spanish_reading: Mantener «fue glorificado» sin precisar si apunta solo a la resurrección/exaltación o al complejo pasión-resurrección-exaltación.
  alternative_spanish_readings:
  - fue exaltado
  - fue honrado
  rationale: Juan usa el lenguaje de la glorificación con densidad teológica. La traducción preserva esa tensión en vez de resolverla con una paráfrasis más estrecha.
  doctrine_reference: Preservar la tensión teológica joánica.
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el audit trail inglés y el griego: mantiene el contraste temporal, la pasiva teológica de «glorificado» y la relación escritural/accional del final, sin suavizar la tensión joánica ni introducir explicaciones ajenas al texto.'
  spanish_consistency_notes:
  - Se eligió «glorificado» en lugar de «exaltado» para conservar la terminología joánica estándar del proyecto.
  - «Estas cosas» se repite dos veces para reflejar el paralelismo del griego.
  - Se prefirió «le habían hecho estas cosas» a una reformulación más libre para conservar el dativo y el eco narrativo de la entrada triunfal.
