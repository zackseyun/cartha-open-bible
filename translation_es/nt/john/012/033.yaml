translation:
  language: es
  text: Con esto indicaba qué clase de muerte iba a morir[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de qué clase de muerte». La expresión griega puede enfatizar la manera de la muerte.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦτο
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - eso
  - aquello
  lexicon: BDAG
  rationale: El demostrativo neutro singular apunta a la declaración inmediata de Jesús; en español, «esto» conserva esa referencia cercana y natural.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y
  - Pero
  lexicon: BDAG
  rationale: δέ funciona como transición narrativa leve; «Ahora» mantiene el giro discursivo sin cargar un contraste que el griego no exige.
- source_word: ἔλεγεν
  english_pob_choice: was saying
  chosen_spanish: decía
  alternatives_spanish:
  - estaba diciendo
  - dijo
  lexicon: BDAG
  rationale: El imperfecto expresa acción en desarrollo o reiterada en el pasado; «decía» reproduce bien ese valor aspectual en español natural.
- source_word: σημαίνων
  english_pob_choice: to signify
  chosen_spanish: significando
  alternatives_spanish:
  - indicando
  - mostrando
  - señalando
  lexicon: BDAG
  rationale: El participio presente expresa modo o circunstancia concomitante; «significando» conserva la relación semántica de dar a entender, aunque suene más formal que «indicando». Se evita explicitar más de lo que el texto dice.
- source_word: ποίῳ θανάτῳ
  english_pob_choice: what kind of death
  chosen_spanish: qué clase de muerte
  alternatives_spanish:
  - por qué clase de muerte
  - de qué clase de muerte
  - qué muerte
  lexicon: BDAG
  rationale: El dativo con ποῖος señala el tipo o modo de muerte. «Qué clase de muerte» comunica esa idea con claridad en español y mantiene la ambigüedad del griego entre tipo y manera.
- source_word: ἤμελλεν
  english_pob_choice: was about to
  chosen_spanish: iba a
  alternatives_spanish:
  - estaba a punto de
  - estaba por
  - estaba destinado a
  lexicon: BDAG
  rationale: μέλλω indica inminencia o futuro próximo; «iba a» es la forma más natural en español para expresar ese valor sin añadir una nota de destino que el verbo por sí solo no obliga.
- source_word: ἀποθνῄσκειν
  english_pob_choice: die
  chosen_spanish: morir
  alternatives_spanish:
  - estar muriendo
  lexicon: BDAG
  rationale: El infinitivo complementario exige un verbo simple en español; «morir» es la equivalencia directa y sobria.
theological_decisions:
- issue: Si debe hacerse explícita la crucifixión en la traducción principal
  english_pob_reading: 'Retain the text''s indirect wording: ''what kind of death he was about to die'''
  chosen_spanish_reading: 'Conservar el lenguaje indirecto: «qué clase de muerte iba a morir»'
  alternative_spanish_readings:
  - qué clase de muerte iba a morir en una cruz
  - cómo iba a ser ejecutado
  rationale: El evangelista solo dice aquí que las palabras de Jesús señalaban el tipo de muerte; no nombra la crucifixión en esta frase. Explicitarla en el cuerpo principal interpretaría correctamente el contexto, pero iría más allá del alcance verbal del versículo.
  doctrine_reference: 'Principio de fidelidad textual: no paraphrase beyond what the source text warrants; preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El texto inglés final no requirió cambios en la última revisión; se mantuvo la decisión de conservar la formulación indirecta y la nota sobre la posible lectura alternativa de la expresión griega.
  spanish_consistency_notes:
  - Se conserva «Yahvé» para el nombre divino cuando corresponda, pero este versículo no lo contiene.
  - Se prefirió «morir» en vez de una paráfrasis más explicativa para no introducir crucifixión explícita en el texto principal.
  - «Significando» es formal, pero aquí refleja mejor la relación de participio presente con el verbo principal que una coordinación libre.
