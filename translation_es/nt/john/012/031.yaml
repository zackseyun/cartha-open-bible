translation:
  language: es
  text: Ahora es el juicio de este mundo[a]; ahora el gobernante de este mundo[b] será echado fuera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión «el gobernante de este mundo» suele entenderse aquí como referencia a Satanás.
    reason: theological_note
  - marker: b
    text: O «el príncipe de este mundo».
    reason: lexical_alternative
lexical_decisions:
- source_word: νῦν
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Ahora mismo
  - En este momento
  lexicon: BDAG
  rationale: «Ahora» conserva la fuerza temporal enfática de νῦν y permite mantener el paralelismo retórico de las dos cláusulas.
- source_word: κρίσις
  english_pob_choice: judgment
  chosen_spanish: juicio
  alternatives_spanish:
  - sentencia
  - condena
  lexicon: BDAG
  rationale: «Juicio» reproduce bien la amplitud de κρίσις en un contexto joánico de acto decisivo sobre el mundo; «condena» estrecharía demasiado el sentido.
- source_word: κόσμου τούτου
  english_pob_choice: this world
  chosen_spanish: de este mundo
  alternatives_spanish:
  - de este mundo presente
  - de este orden mundial
  lexicon: BDAG
  rationale: La construcción «de este mundo» preserva el demostrativo τούτου y el contraste joánico entre el orden actual y el reino de Dios.
- source_word: ἄρχων
  english_pob_choice: ruler
  chosen_spanish: gobernante
  alternatives_spanish:
  - ruler
  - príncipe
  - señor
  lexicon: BDAG
  rationale: «Gobernante» comunica con claridad moderna la idea de alguien que ejerce autoridad. En español, «príncipe» suena tradicional pero puede ocultar la fuerza política del término; se mantiene la lectura básica sin forzar el tono.
- source_word: ἐκβληθήσεται ἔξω
  english_pob_choice: will be cast out
  chosen_spanish: será expulsado
  alternatives_spanish:
  - será echado fuera
  - será arrojado afuera
  lexicon: BDAG
  rationale: «Será expulsado» transmite el pasivo futuro de ἐκβάλλω y la idea de remoción/exclusión que intensifica ἔξω, con un español natural y sobrio.
theological_decisions:
- issue: Identidad de «el gobernante de este mundo»
  english_pob_reading: Left implicit in the main text as 'the ruler of this world' without interpretive expansion.
  chosen_spanish_reading: Se deja implícita en el cuerpo principal como «el gobernante de este mundo», sin nombrar explícitamente a Satanás.
  alternative_spanish_readings:
  - Satanás, el gobernante de este mundo
  - el diablo, el gobernante de este mundo
  - el príncipe de este mundo
  rationale: El griego usa un título y no un nombre propio; la versión principal conserva esa precisión. La identificación con Satanás es una lectura ampliamente reconocida en Juan, pero se reserva para nota para no resolver en el texto principal una tensión que el original no explicita.
  doctrine_reference: Preservar la tensión teológica y no importar una identificación interpretativa al texto principal.
translation_notes:
  revision_awareness: 'Coincide con el último pase revisado: no hubo cambios necesarios según el audit trail; se preserva la estructura paralela y la ambigüedad teológica documentada.'
  spanish_consistency_notes:
  - Se mantiene «mundo» para κόσμος con el mismo valor demostrativo de «este mundo» en ambas cláusulas.
  - «Gobernante» evita el falso amigo de una lectura demasiado cortesana de «príncipe» y mantiene la claridad semántica.
  - «Será expulsado» conserva el pasivo futuro y el matiz de expulsión/exclusión reforzado por ἔξω.
  - La nota a ofrece la alternativa léxica tradicional documentada por el POB en inglés; la nota b conserva la identificación teológica sin convertirla en interpretación obligatoria del texto.
