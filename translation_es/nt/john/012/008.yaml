translation:
  language: es
  text: Porque siempre tienen a los pobres con ustedes[a], pero no siempre me tienen a mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «las personas pobres». El adjetivo griego se usa sustantivamente: «los pobres».'
    reason: lexical_alternative
lexical_decisions:
- source_word: πτωχούς
  english_pob_choice: the poor
  chosen_spanish: a los pobres
  alternatives_spanish:
  - a los pobres necesitados
  - a las personas pobres
  lexicon: BDAG
  rationale: El adjetivo se usa sustantivamente para designar a las personas pobres. En español, «a los pobres» conserva la referencia genérica y la concisión del original sin expandir innecesariamente el sintagma.
- source_word: γάρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: La partícula introduce la razón o fundamento de la afirmación anterior. «Porque» comunica con naturalidad esa relación causal/explicativa en español.
- source_word: πάντοτε
  english_pob_choice: always
  chosen_spanish: siempre
  alternatives_spanish:
  - en todo tiempo
  - constantemente
  lexicon: BDAG
  rationale: El adverbio expresa continuidad o constancia. «Siempre» es el equivalente más natural y mantiene la repetición en ambas cláusulas.
- source_word: ἔχετε
  english_pob_choice: have
  chosen_spanish: tienen / me tienen
  alternatives_spanish:
  - tienen
  - poseen
  - mantienen
  lexicon: BDAG
  rationale: Aquí ἔχετε expresa presencia o disponibilidad continua, no posesión. En español, «tener» reproduce bien ese valor. Se mantiene el pronombre explícito en la segunda cláusula para claridad y contraste.
- source_word: μεθ’ ἑαυτῶν
  english_pob_choice: with you
  chosen_spanish: con ustedes
  alternatives_spanish:
  - entre ustedes
  - en su compañía
  lexicon: BDAG
  rationale: La frase indica compañía o presencia cercana. «Con ustedes» es idiomático en español y conserva el sentido relacional sin literalidad extraña.
- source_word: ἐμέ
  english_pob_choice: me
  chosen_spanish: a mí
  alternatives_spanish:
  - me
  lexicon: BDAG
  rationale: 'El objeto directo se expresa de forma natural con pronombre tónico para reforzar el contraste: «a mí». Esto evita ambigüedad y refleja la oposición enfática del griego.'
- source_word: δέ
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - mas
  - sino
  lexicon: BDAG
  rationale: Marca contraste entre la presencia permanente de los pobres y la presencia temporal de Jesús. «Pero» es la forma más clara y natural en español.
- source_word: οὐ πάντοτε
  english_pob_choice: do not always
  chosen_spanish: no siempre
  alternatives_spanish:
  - no en todo momento
  - no siempre me tienen
  lexicon: BDAG
  rationale: El español no necesita auxiliar explícito para esta negación adverbial. «No siempre» conserva la limitación temporal sin sobrerrepresentarla.
theological_decisions:
- issue: Posible lectura que disminuya la importancia de los pobres
  english_pob_reading: Render the statement straightforwardly as a contrast of presence and timing, without implying that care for the poor is unimportant.
  chosen_spanish_reading: Traducir la afirmación como un contraste de presencia y tiempo, sin sugerir que los pobres importan menos.
  alternative_spanish_readings:
  - Una paráfrasis que haga parecer que los pobres cuentan menos que Jesús
  - Una suavización que oculte el contraste temporal
  rationale: 'El griego presenta un contraste factual: los pobres permanecen siempre accesibles, mientras que la presencia física de Jesús con los discípulos es temporal. La traducción debe conservar ese contraste sin añadir una desvalorización teológica de los pobres que el texto no expresa.'
  doctrine_reference: 'Principio de traducción POB: no imponer afirmaciones doctrinales ausentes del texto; preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: 'El pasaje coincide con la revisión más reciente del texto inglés POB: no se detectaron cambios posteriores ni observaciones que alteren la lectura base. La versión española sigue la misma decisión semántica principal: contraste entre la presencia continua de los pobres y la presencia no permanente de Jesús.'
  spanish_consistency_notes:
  - Se mantiene la distinción entre permanencia («siempre») y temporalidad («no siempre»).
  - Se conserva el valor sustantivo de πτωχούς mediante «a los pobres».
  - Se usa tratamiento plural «ustedes» coherente con el auditorio implícito del pasaje.
  - No se introduce lenguaje eclesiástico tradicional que oscurezca la relación directa del enunciado.
