translation:
  language: es
  text: Porque yo no he hablado por mi propia cuenta[a][b], sino que el Padre que me envió me ha dado él mismo un mandato sobre lo que debo decir y lo que debo hablar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de mí mismo» o «por mi propia autoridad».'
    reason: lexical_alternative
  - marker: b
    text: El griego usa dos verbos distintos, «decir» y «hablar»; la traducción conserva esa distinción.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξ ἐμαυτοῦ
  english_pob_choice: from myself
  chosen_spanish: por mi propia cuenta
  alternatives_spanish:
  - de mí mismo
  - por mi propia autoridad
  lexicon: BDAG
  rationale: La expresión griega idiomática no debe reducirse a una simple negación de origen espacial. En español, «por mi propia cuenta» comunica de manera natural la idea de actuar o hablar independientemente, sin borrar el matiz de iniciativa propia que el POB inglés conserva con «from myself». «Por mi propia autoridad» es posible, pero añade más interpretación que el texto exige.
- source_word: ἐλάλησα
  english_pob_choice: have not spoken
  chosen_spanish: no he hablado
  alternatives_spanish:
  - no hablé
  lexicon: BDAG
  rationale: Se usa el perfecto compuesto para reflejar bien el valor discursivo del enunciado en español y mantener la fuerza de una afirmación sobre la totalidad de la misión/ministerio hasta este punto. «Hablé» sería posible, pero suena más cerrado y menos adecuado al contexto.
- source_word: ὁ πέμψας με πατὴρ
  english_pob_choice: the Father who sent me
  chosen_spanish: el Padre que me envió
  alternatives_spanish:
  - el Padre, el que me envió
  - mi Padre que me envió
  lexicon: BDAG
  rationale: La construcción participial se vierte de forma directa y natural en español. «Padre» se mantiene con mayúscula por tratarse del título divino en contexto joánico. «Mi Padre» es gramaticalmente posible, pero el griego aquí resalta la relación del que envía con el enviado mediante la frase relativa.
- source_word: αὐτός μοι
  english_pob_choice: has himself given me
  chosen_spanish: me ha dado él mismo
  alternatives_spanish:
  - él mismo me ha dado
  - me ha dado
  lexicon: BDAG
  rationale: El pronombre intensivo se conserva explícitamente para no perder el énfasis del griego. El orden «me ha dado él mismo» suena natural en español y mantiene la focalización sobre el Padre. Omitir «él mismo» debilitaría un rasgo textual relevante.
- source_word: ἐντολήν
  english_pob_choice: a command
  chosen_spanish: un mandato
  alternatives_spanish:
  - un mandamiento
  - una orden
  lexicon: BDAG
  rationale: «Mandato» comunica la fuerza autoritativa de ἐντολή sin cargar la frase con el matiz más legal o catequético de «mandamiento». «Orden» es posible, pero en español puede sonar más militar o abrupto. El POB inglés eligió «command», y «mandato» reproduce bien esa autoridad.
- source_word: τί εἴπω
  english_pob_choice: what I should say
  chosen_spanish: qué debo decir
  alternatives_spanish:
  - qué debería decir
  - qué he de decir
  lexicon: BDAG
  rationale: La pregunta indirecta tras «mandato» se expresa de forma natural con obligación en español. «Qué debo decir» comunica la fuerza directiva sin recargar el texto. «Qué debería decir» suaviza demasiado la obligación.
- source_word: καὶ τί λαλήσω
  english_pob_choice: and what I should speak
  chosen_spanish: y qué debo hablar
  alternatives_spanish:
  - y qué debo decir
  - y qué he de hablar
  lexicon: BDAG
  rationale: Se mantiene la distinción entre los dos verbos griegos, como hizo el POB inglés. «Hablar» conserva visible la diferencia con «decir», aunque en español pueda sonar algo repetitivo. Esto evita aplanar el contraste léxico del original.
theological_decisions:
- issue: Relación entre la misión del Hijo y el mandato del Padre
  english_pob_reading: Jesús no habla de manera independiente, sino bajo la comisión del Padre, sin implicar inferioridad de naturaleza.
  chosen_spanish_reading: Jesús no habla por iniciativa propia, sino bajo el mandato del Padre que lo envió, sin que esto implique inferioridad de naturaleza.
  alternative_spanish_readings:
  - Jesús habla simplemente como profeta humano
  - Jesús actúa independiente pero en acuerdo con el Padre
  rationale: 'La frase española conserva las dos afirmaciones del versículo: negación de autonomía en el hablar y recepción de un mandato del Padre. No se amplía hacia una cristología meramente profética ni se elimina la dependencia funcional que el texto afirma. La redacción se mantiene compatible con la ortodoxia nicena y calcedoniana.'
  doctrine_reference: Credo niceno-constantinopolitano (381) y definición de Calcedonia (451)
- issue: Uso de «Padre» como título divino
  english_pob_reading: Father
  chosen_spanish_reading: Padre
  alternative_spanish_readings:
  - padre
  rationale: En el contexto joánico, «Padre» funciona como título divino y debe conservarse con mayúscula en español. Esto sigue la lectura teológica del POB inglés y evita despersonalizar la referencia.
  doctrine_reference: Ortodoxia cristiana histórica
translation_notes:
  revision_awareness: El texto se alinea con el último pase de revisión, que no requirió cambios y fue confirmado con alto acuerdo entre revisores. Se preserva la distinción léxica entre λέγω y λαλέω, así como el énfasis de αὐτός y la fuerza directiva de ἐντολή.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo exija; aquí no aparece el nombre divino.
  - Se mantuvo «Padre» con mayúscula por tratarse de un título divino contextualmente claro.
  - Se distinguieron «decir» y «hablar» para reflejar los dos verbos griegos sin aplanarlos.
  - Se evitó traducir mecánicamente como calco de inglés cuando el español natural pedía una formulación idiomática como «por mi propia cuenta».
