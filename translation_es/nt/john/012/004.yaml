translation:
  language: es
  text: 'Pero Judas Iscariote[a], uno de sus discípulos—el que estaba a punto de traicionarlo—dijo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, 'el que estaba a punto de entregarlo'.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - dice
  lexicon: BDAG
  rationale: Aunque el griego usa presente histórico, en español narrativo la forma natural y fiel es el pretérito simple 'dijo', que conserva la función discursiva sin sonar forzado. 'Dice' también sería posible, pero aquí la fluidez del relato favorece 'dijo'.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: '''δέ'' introduce desarrollo o contraste suave. ''Pero'' comunica bien el giro narrativo respecto de la escena anterior y es natural en español. ''Y'' o ''Ahora bien'' serían posibles, pero menos precisos para este contexto.'
- source_word: Ἰούδας ὁ Ἰσκαριώτης
  english_pob_choice: Judas Iscariot
  chosen_spanish: Judas Iscariote
  alternatives_spanish:
  - Judas el Iscariote
  lexicon: BDAG
  rationale: Se conserva el nombre propio en su forma asentada en español. 'Iscariote' reproduce el epíteto identificador sin añadir una perífrasis innecesaria.
- source_word: εἷς τῶν μαθητῶν αὐτοῦ
  english_pob_choice: one of his disciples
  chosen_spanish: uno de sus discípulos
  alternatives_spanish:
  - uno de sus seguidores
  lexicon: BDAG
  rationale: '''μαθητής'' en los Evangelios se traduce con precisión por ''discípulo'', porque mantiene la relación maestro-discípulo propia del relato. ''Seguidores'' es más amplio y menos exacto.'
- source_word: ὁ μέλλων
  english_pob_choice: the one who was about to
  chosen_spanish: el que estaba a punto de
  alternatives_spanish:
  - el que iba a
  - el que iba a estar por
  lexicon: BDAG
  rationale: La construcción con μέλλω expresa inminencia o intención cercana. 'Estaba a punto de' preserva bien ese valor anticipatorio en español y encaja con la apposición del participio.
- source_word: παραδιδόναι
  english_pob_choice: betray
  chosen_spanish: entregarlo
  alternatives_spanish:
  - traicionarlo
  - ponerlo en manos de
  lexicon: BDAG
  rationale: En este contexto, el sentido más literal de 'παραδιδόναι' es 'entregarlo' o 'ponerlo en manos de'. Se evita 'traicionarlo' en el texto principal porque la forma griega resalta primero el acto de entrega, mientras que la valoración de traición queda implícita por el contexto de Judas. Esta elección conserva la tensión léxica documentada en el audit trail inglés y evita sobrecargar el verbo con una interpretación más específica de la que el griego exige aquí.
theological_decisions:
- issue: Valor moral del acto expresado por παραδιδόναι respecto de Judas y Jesús
  english_pob_reading: betray
  chosen_spanish_reading: entregarlo
  alternative_spanish_readings:
  - traicionarlo
  - entregarlo/traicionarlo en nota
  rationale: El inglés POB toma 'betray' como sentido contextual, pero el griego admite la lectura más literal 'entregar'. En español, 'entregarlo' preserva mejor la consistencia verbal y la ambigüedad controlada del verbo, dejando que el contexto de Judas aporte la valoración moral. Así se mantiene la tensión fuente-textual entre el acto de entregar y la interpretación de traición.
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave o excepción documentada)
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; el borrador español sigue de cerca el griego y respeta el criterio auditado del inglés POB, pero ajusta el verbo final a la literalidad fuente para mantener la tensión léxica entre 'entregar' y 'traicionar'.
  spanish_consistency_notes:
  - Se mantiene 'discípulos' para μαθηταί conforme al uso del Evangelio.
  - Se conserva el nombre propio 'Judas Iscariote' como forma natural en español.
  - El participio de inminencia se vierte con 'estaba a punto de' para reflejar μέλλων.
  - Se usa un verbo de entrega en el texto principal y se reserva la lectura moral de traición para la nota, siguiendo la advertencia de no borrar tensiones léxicas documentadas.
