review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: hicieron una cena para Jesús allí; Marta servía; Lázaro estaba entre los comensales recostados con él. Sin embargo, la nota al pie está mal anclada y además no corresponde exactamente al punto que el inglés documenta sobre ἀνακειμένων.'
  spanish_quality_summary: El español es claro y natural. No obstante, «le hicieron allí una cena» suena algo menos idiomático que «le prepararon una cena allí» o «hicieron una cena para él allí». Además, el punto y coma antes de «pero» no es necesario. La mejora principal es reubicar la nota cultural al sintagma de los recostados y ajustar levemente la redacción para mayor naturalidad.
  glossary_alignment: 'No hay términos teológicos sensibles en este versículo. Las decisiones léxicas principales son adecuadas: «cena» por δεῖπνον, «servía»/«estaba sirviendo» por διηκόνει, y «recostados» por ἀνακειμένων preservan bien el sentido. La única desalineación real con el rastro de auditoría inglés está en la nota, que debe ir con «recostados» y explicar la postura en la mesa.'
  issues:
  - severity: medium
    issue: La nota [a] está colocada en «cena» en vez de en «recostados».
    rationale: El English POB pone la nota en «there[a]», pero su contenido explica más literalmente «one of those reclining with him» y la costumbre de recostarse en comidas formales. En español, anclar esa nota en «cena» crea incoherencia y puede confundir al lector.
  - severity: low
    issue: «Le hicieron allí una cena» es comprensible pero algo menos idiomático en español bíblico natural.
    rationale: Aunque fiel al griego, «le prepararon una cena allí» suena más natural en español sin perder el matiz de ποιέω + δεῖπνον.
  - severity: low
    issue: «Pero» después de punto y coma puede suavizarse con coma para una fluidez más natural.
    rationale: La relación contrastiva de δέ es leve; una coma mantiene la dignidad del estilo sin sobrecargar la puntuación.
  revised_spanish_text: Así que le prepararon una cena allí, y Marta estaba sirviendo, pero Lázaro era uno de los que estaban recostados[a] con él.
  revised_footnotes:
  - marker: a
    text: O, más literalmente, «uno de los que estaban recostados con él». El recostarse era la postura habitual en una comida formal.
    reason: cultural_note
  revision_rationale: La revisión conserva el sentido fuente y las decisiones léxicas centrales, pero corrige la ubicación de la nota cultural para que coincida con ἀνακειμένων y mejora ligeramente la naturalidad del español con «le prepararon una cena allí». No se requiere adjudicación adicional.
