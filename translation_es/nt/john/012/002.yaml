base_translation:
  language: en
  yaml_path: translation/nt/john/012/002.yaml
  text: So they made a dinner for him there[a], and Martha was serving, but Lazarus was one of those reclining at the table with him.
  footnotes:
  - marker: a
    text: Or, more literally, 'one of those reclining with him.' Reclining was the customary posture for a formal meal.
    reason: cultural_note
