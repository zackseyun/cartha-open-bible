translation:
  language: es
  text: Así que le prepararon una cena allí, y Marta estaba sirviendo, pero Lázaro era uno de los que estaban recostados[a] con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «uno de los que estaban recostados con él». El recostarse era la postura habitual en una comida formal.
    reason: cultural_note
lexical_decisions:
- source_word: ἐποίησαν
  english_pob_choice: made
  chosen_spanish: le hicieron
  alternatives_spanish:
  - prepararon
  - le prepararon
  lexicon: BDAG
  rationale: ποιέω con δεῖπνον expresa la acción de hacer/preparar una comida. En español, «le hicieron una cena» conserva el sentido sin forzar una formulación demasiado literal o artificial; el sujeto implícito queda natural en contexto.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - Entonces
  - Por tanto
  lexicon: BDAG
  rationale: οὖν marca continuidad narrativa. «Así que» reproduce bien la transición causal/narrativa en español actual sin sobreactuar la inferencia.
- source_word: αὐτῷ
  english_pob_choice: for him
  chosen_spanish: le
  alternatives_spanish:
  - para él
  lexicon: BDAG
  rationale: Con ἐποίησαν + δεῖπνον, el dativo expresa beneficiario/referencia. En español, el clítico «le» comunica naturalmente que la cena fue hecha para Jesús.
- source_word: δεῖπνον
  english_pob_choice: dinner
  chosen_spanish: una cena
  alternatives_spanish:
  - una comida
  - un banquete
  lexicon: BDAG
  rationale: δεῖπνον designa la comida principal, a menudo vespertina. «Una cena» es la equivalencia más natural y fiel en español; «banquete» exageraría el término.
- source_word: ἐκεῖ
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - en ese lugar
  lexicon: BDAG
  rationale: El adverbio locativo se mantiene con «allí», que es claro y sobrio en español narrativo.
- source_word: διηκόνει
  english_pob_choice: was serving
  chosen_spanish: estaba sirviendo
  alternatives_spanish:
  - servía
  - estaba atendiendo
  lexicon: BDAG
  rationale: El imperfecto griego expresa acción en curso; «estaba sirviendo» conserva el aspecto mejor que un pretérito simple. «Atendiendo» podría sugerir matices adicionales no explícitos en el texto.
- source_word: δὲ
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - y
  - ahora bien
  lexicon: BDAG
  rationale: δέ introduce un contraste suave entre la actividad de Marta y la posición de Lázaro. «Pero» expresa ese contraste de modo natural en español.
- source_word: εἷς ἦν ἐκ
  english_pob_choice: was one of
  chosen_spanish: era uno de
  alternatives_spanish:
  - era uno entre
  - estaba entre
  lexicon: BDAG
  rationale: El giro idiomático identifica a Lázaro como miembro de un grupo mayor. «Era uno de» es la forma más directa y idiomática en español.
- source_word: ἀνακειμένων
  english_pob_choice: those reclining at the table
  chosen_spanish: los que estaban recostados
  alternatives_spanish:
  - los que se recostaban
  - los que estaban reclinados a la mesa
  lexicon: BDAG
  rationale: ἀνάκειμαι en contexto de comida alude a la postura de recostarse/reclinarse en un banquete formal. «Los que estaban recostados» conserva el rasgo cultural sin obligar a una glosa dentro del texto principal.
- source_word: σὺν αὐτῷ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - junto con él
  lexicon: BDAG
  rationale: La preposición σύν expresa compañía. «Con él» es la correspondencia natural y suficiente; el referente es Jesús por el contexto inmediato.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el griego SBLGNT y el audit trail inglés: conserva la secuencia narrativa, el imperfecto de διηκόνει, y el matiz cultural de ἀνακειμένων sin trasladarlo de forma pesada al cuerpo principal del versículo.'
  spanish_consistency_notes:
  - Se usa «cena» para δεῖπνον según el registro natural del español y la decisión inglesa de «dinner».
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el Tetragrámaton ni un equivalente directo.
  - No se introduce «Cristo» ni otras fórmulas litúrgicas; el referente de «él» queda claro por el contexto joánico inmediato.
  - La cláusula final evita «mesa» en el texto principal para no añadir una imagen no explicitada por el griego, y la nota preserva la alternativa más literal.
