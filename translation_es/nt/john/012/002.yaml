revisions:
- from: Así que le hicieron allí una cena[a], y Marta estaba sirviendo; pero Lázaro era uno de los que estaban recostados con él.
  to: Así que le prepararon una cena allí, y Marta estaba sirviendo, pero Lázaro era uno de los que estaban recostados[a] con él.
  rationale: La revisión conserva el sentido fuente y las decisiones léxicas centrales, pero corrige la ubicación de la nota cultural para que coincida con ἀνακειμένων y mejora ligeramente la naturalidad del español con «le prepararon una cena allí». No se requiere adjudicación adicional.
