revisions:
- from: 'Así que los fariseos se dijeron unos a otros[a]: «Ven que no consiguen nada. Mira, el mundo se ha ido tras él» .'
  to: 'Así que los fariseos se dijeron unos a otros[a]: «Ustedes ven que no consiguen nada. Miren, el mundo se ha ido tras él».'
  rationale: Se corrige el valor de Θεωρεῖτε a una forma indicativa plural clara en español («Ustedes ven»), se ajusta ἴδε a plural retórico («Miren») para concordar con el grupo de hablantes, y se arregla la puntuación final. Se mantiene «el mundo» con nota, en línea con el audit trail inglés y la resonancia joánica del original.
