review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura general y las decisiones clave del griego: οὖν como transición consecutiva, πρὸς ἑαυτούς con sentido recíproco, κόσμος como «el mundo» con nota de hipérbole, y ὀπίσω αὐτοῦ ἀπῆλθεν como ir tras Jesús. Sin embargo, hay un desajuste importante en Θεωρεῖτε: el griego es indicativo presente plural («ustedes ven/se dan cuenta»), no imperativo singular. En español, «Ven» además introduce ambigüedad con el verbo venir y pierde la concordancia plural. «Mira» también queda en singular frente al discurso entre varios fariseos. Conviene ajustar ambas formas al plural para reflejar mejor el original y la escena.'
  spanish_quality_summary: 'El español es mayormente claro, pero presenta detalles de naturalidad y corrección: «Ven» suena incorrecto o ambiguo en este contexto; «Miren» funciona mejor para la apelación retórica plural, y «ustedes ven» o «ven» en plural sin ambigüedad requiere contexto claro. También hay un espacio incorrecto antes del punto final. «Se ha ido tras él» es comprensible, pero «se ha ido detrás de él» sería menos idiomático para seguimiento; «se ha ido tras él» está bien. La frase revisada suena natural y digna en español eclesial general.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «el mundo» preserva κόσμος como en el POB inglés; la nota alternativa «todos se han ido tras él» mantiene la hipérbole interpretativa fuera del texto principal. No intervienen términos sensibles como Yahvé, Mesías, esclavo, etc.
  issues:
  - severity: high
    issue: Θεωρεῖτε está mal representado por «Ven».
    rationale: El griego es presente indicativo plural, no imperativo singular. «Ven» en español puede leerse como mandato singular o como forma de «venir», y no refleja el sentido «ustedes ven / se dan cuenta» documentado por el POB inglés.
  - severity: medium
    issue: ἴδε está vertido como «Mira» en singular.
    rationale: Aunque puede usarse discursivamente, aquí hablan varios fariseos entre sí; «Miren» conserva mejor la apelación retórica en plural y armoniza con el contexto grupal.
  - severity: low
    issue: Hay un espacio tipográfico antes del punto final.
    rationale: «» .» es puntuación incorrecta en español; debe cerrarse sin espacio antes del punto.
  revised_spanish_text: 'Así que los fariseos se dijeron unos a otros[a]: «Ustedes ven que no consiguen nada. Miren, el mundo se ha ido tras él».'
  revised_footnotes:
  - marker: a
    text: O «todos se han ido tras él». El griego dice «el mundo», probablemente como exageración retórica.
    reason: lexical_alternative
  revision_rationale: Se corrige el valor de Θεωρεῖτε a una forma indicativa plural clara en español («Ustedes ven»), se ajusta ἴδε a plural retórico («Miren») para concordar con el grupo de hablantes, y se arregla la puntuación final. Se mantiene «el mundo» con nota, en línea con el audit trail inglés y la resonancia joánica del original.
