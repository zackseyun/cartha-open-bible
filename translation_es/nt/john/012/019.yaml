translation:
  language: es
  text: 'Así que los fariseos se dijeron unos a otros[a]: «Ustedes ven que no consiguen nada. Miren, el mundo se ha ido tras él».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todos se han ido tras él». El griego dice «el mundo», probablemente como exageración retórica.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - Entonces
  - Por eso
  lexicon: BDAG
  rationale: Marca una transición inferencial o consecutiva desde la escena anterior. «Así que» suena natural en español y conserva la conexión discursiva sin endurecer el tono.
- source_word: πρὸς ἑαυτούς
  english_pob_choice: to one another
  chosen_spanish: unos a otros
  alternatives_spanish:
  - entre ellos
  - entre sí
  lexicon: BDAG
  rationale: 'La fuerza recíproca es idiomática: hablan dentro del grupo. «Unos a otros» es claro y mantiene la relación mutua sin volverse demasiado literal con «a sí mismos».'
- source_word: Θεωρεῖτε
  english_pob_choice: You see
  chosen_spanish: Ven
  alternatives_spanish:
  - Miren
  - Ustedes ven
  lexicon: BDAG
  rationale: Aunque la forma gramatical puede leerse como indicativa plural, el valor retórico en este contexto es exclamativo y exhortativo. «Ven» reproduce en español la fuerza de apelación breve y exasperada del enunciado.
- source_word: οὐκ ὠφελεῖτε οὐδέν
  english_pob_choice: you are accomplishing nothing
  chosen_spanish: no consiguen nada
  alternatives_spanish:
  - no logran nada
  - no obtienen nada
  - no están logrando nada
  lexicon: BDAG
  rationale: La expresión comunica fracaso o inutilidad de los esfuerzos. «Conseguir nada» expresa bien la inutilidad práctica en español contemporáneo sin perder el alcance negativo absoluto de οὐδέν.
- source_word: ἴδε
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Miren
  - Vean
  - Fíjate
  lexicon: BDAG
  rationale: Es una interjección para llamar la atención. «Mira» conserva la brusquedad retórica y es natural en español.
- source_word: κόσμος
  english_pob_choice: the world
  chosen_spanish: el mundo
  alternatives_spanish:
  - todos
  - la gente
  - la multitud
  lexicon: BDAG
  rationale: Se conserva el sustantivo «el mundo» porque el griego dice literalmente κόσμος y el contexto usa hipérbole retórica. No se aplana en el texto principal a «todos»; esa posibilidad queda anotada en la nota.
- source_word: ὀπίσω αὐτοῦ
  english_pob_choice: after him
  chosen_spanish: tras él
  alternatives_spanish:
  - detrás de él
  - siguiéndolo
  lexicon: BDAG
  rationale: Es una locución idiomática de seguir o ir detrás de alguien. «Tras él» reproduce la imagen con buen español y mantiene la dirección del movimiento.
- source_word: ἀπῆλθεν
  english_pob_choice: has gone
  chosen_spanish: se ha ido
  alternatives_spanish:
  - se fue
  - ha marchado
  lexicon: BDAG
  rationale: 'El aoristo se vierte de manera natural en pasado perfecto de resultado en español para expresar el efecto visible que los fariseos constatan: la gente ya se ha pasado a Jesús.'
theological_decisions:
- issue: Alcance de κόσμος en la queja de los fariseos
  english_pob_reading: Retain 'the world' as hyperbolic speech rather than interpretively narrowing it in the main text.
  chosen_spanish_reading: Conservar «el mundo» como hipérbole retórica, sin reducirlo en el texto principal a «todos».
  alternative_spanish_readings:
  - todos
  - toda la gente
  - la multitud
  rationale: El término tiene peso joánico y la frase es una exageración frustrada, no una afirmación doctrinal literal sobre cada ser humano. Mantener «el mundo» deja ver la hipérbole del original y preserva la tensión interpretativa.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: 'La versión sigue de cerca el griego y el audit trail en inglés: mantiene la conexión inferencial de οὖν, el habla recíproca del grupo, la exclamación breve y la hipérbole de κόσμος. Se eligieron equivalentes españoles naturales sin borrar la tensión entre literalidad y sentido retórico.'
  spanish_consistency_notes:
  - Se usa «el mundo» para κόσμος, coherente con el criterio POB de conservar la forma lexical y explicar la hipérbole en nota.
  - «Tras él» mantiene la imagen direccional de ὀπίσω αὐτοῦ sin sobreexplicar.
  - La puntuación intenta reflejar el tono abrupto del discurso directo, con coma breve y guion largo en la exclamación.
