translation:
  language: es
  text: Isaías dijo estas cosas porque vio su gloria y habló acerca de él[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Isaías dijo estas cosas porque vio la gloria de Dios y habló acerca de él». En el contexto de Juan, los pronombres probablemente se refieren a Jesús; pero el trasfondo isaiano más amplio es la visión de la gloria del Señor en Isaías 6:1.'
    reason: alternative_reading
lexical_decisions:
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  lexicon: BDAG
  rationale: El plural neutro se refleja naturalmente con el plural demostrativo español 'estas cosas', que conserva la referencia a lo dicho antes y evita aplanarlo en un singular más vago.
- source_word: εἶπεν
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  lexicon: BDAG
  rationale: '''Dijo'' es la forma más directa para el aoristo de λέγω y permite mantener la distinción con ἐλάλησεν, que en español queda mejor como ''habló''.'
- source_word: Ἠσαΐας
  english_pob_choice: Isaiah
  chosen_spanish: Isaías
  lexicon: transliteration
  rationale: Nombre propio estándar en español, equivalente al uso inglés auditado.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - que
  lexicon: BDAG
  rationale: Aquí ὅτι introduce la razón de lo dicho; 'porque' expresa mejor la relación causal que 'que' en español contemporáneo.
- source_word: εἶδεν
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - alcanzó a ver
  lexicon: BDAG
  rationale: Aoristo simple de ὁράω, con el verbo directo 'vio'.
- source_word: δόξαν
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - esplendor
  lexicon: BDAG
  rationale: '''Gloria'' es el equivalente español más estable para δόξα en el marco joánico y preserva la densidad teológica del término.'
- source_word: αὐτοῦ
  english_pob_choice: his
  chosen_spanish: su
  alternatives_spanish:
  - de él
  lexicon: BDAG
  rationale: El posesivo español 'su' reproduce la relación genitiva de forma natural. En contexto, el antecedente es Jesús; la nota mantiene abierta la tensión con la posible referencia al Señor/Yahvé del trasfondo de Isaías.
- source_word: ἐλάλησεν
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  lexicon: BDAG
  rationale: '''Habló'' preserva mejor el matiz verbal de λαλέω y la distinción con εἶπεν ya rendido como ''dijo''.'
- source_word: περὶ αὐτοῦ
  english_pob_choice: about him
  chosen_spanish: acerca de él
  alternatives_spanish:
  - sobre él
  - con respecto a él
  lexicon: BDAG
  rationale: '''Acerca de él'' es natural en español y conserva el sentido de περί con genitivo sin introducir una interpretación excesiva.'
theological_decisions:
- issue: Referente de los pronombres αὐτοῦ / αὐτοῦ
  english_pob_reading: Both pronouns refer to Jesus, so the verse states that Isaiah saw Jesus' glory and spoke about Jesus.
  chosen_spanish_reading: Los pronombres se leen en referencia a Jesús, de modo que el versículo dice que Isaías vio su gloria y habló acerca de él.
  alternative_spanish_readings:
  - Los pronombres se refieren a Dios/el Señor en sentido más amplio, por lo que Isaías vio la gloria de Yahvé y habló de él.
  rationale: El contexto inmediato de Juan 12:37–41 aplica Isaías a Jesús; por eso la redacción principal deja que el español siga esa lectura. Al mismo tiempo, la nota conserva el trasfondo isaiano de Isaías 6:1, donde la visión es de la gloria del Señor/Yahvé, para no borrar la tensión textual y teológica.
  doctrine_reference: Juan 12:37–41; Isaías 6:1; Nicene Creed (381 AD); traducción con tensión teológica preservada
translation_notes:
  revision_awareness: 'Coincide con el pasaje auditado en la versión inglesa: no hubo revisiones aplicadas en el último pase, y el consenso de revisión fue alto. La traducción española sigue la misma lectura óptima, manteniendo la ambigüedad teológica documentada entre la aplicación joánica a Jesús y el trasfondo de Isaías 6:1.'
  spanish_consistency_notes:
  - Se mantuvo 'gloria' para δόξα por consistencia joánica.
  - Se usó 'dijo' / 'habló' para distinguir εἶπεν / ἐλάλησεν.
  - Se evitó 'SEÑOR' en el texto principal; la nota explica el trasfondo de Yahvé sin enmascararlo.
  - '''Su'' conserva la referencia posesiva sin forzarla en el cuerpo principal, y la nota aclara el posible referente.'
