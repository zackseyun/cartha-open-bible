base_translation:
  language: en
  yaml_path: translation/nt/john/012/025.yaml
  text: The one who loves his life loses it[b][a], and the one who hates his life in this world will keep it for eternal life.
  footnotes:
  - marker: a
    text: Or 'soul'; Greek ψυχή can mean 'life,' 'self,' or 'soul' depending on context.
    reason: lexical_alternative
  - marker: b
    text: '''Hates his life'' is a deliberate paradox about rejecting attachment to one''s life in the present world-order; compare Luke 14:26 for similar idiom. It does not commend self-hatred.'
    reason: cross_reference
