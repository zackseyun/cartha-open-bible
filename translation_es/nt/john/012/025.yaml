translation:
  language: es
  text: El que ama su vida la pierde[a][b], y el que odia su vida en este mundo la guardará para vida eterna.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «alma»; el griego ψυχή puede significar «vida», «yo mismo» o «alma» según el contexto.
    reason: lexical_alternative
  - marker: b
    text: «Odia su vida» conserva el fuerte contraste retórico del dicho y no manda odiarse a sí mismo; compárese Lucas 14:26 para un giro semejante.
    reason: cross_reference
lexical_decisions:
- source_word: ὁ φιλῶν
  english_pob_choice: the one who loves
  chosen_spanish: el que ama
  alternatives_spanish:
  - quien ama
  - la persona que ama
  lexicon: BDAG
  rationale: El participio articular funciona de manera sustantiva y expresa una generalidad singular. «El que ama» conserva el valor genérico y suena natural en español sin perder el matiz aspectual.
- source_word: ψυχὴν
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - alma
  - ser
  lexicon: BDAG
  rationale: En este contexto de perder y guardar, ψυχή designa la vida propia, no principalmente el alma inmortal. «Vida» mantiene el contraste inmediato y evita introducir una antropología dualista no exigida por el texto.
- source_word: ἀπολλύει
  english_pob_choice: loses
  chosen_spanish: la pierde
  alternatives_spanish:
  - la destruye
  - la arruina
  - perece
  lexicon: BDAG
  rationale: «La pierde» reproduce con naturalidad la relación entre amar la propia vida y perderla. En español comunica el resultado sin volver demasiado activa o extraña la acción.
- source_word: ὁ μισῶν
  english_pob_choice: the one who hates
  chosen_spanish: el que odia
  alternatives_spanish:
  - quien odia
  - la persona que odia
  lexicon: BDAG
  rationale: Se conserva el verbo fuerte «odiar» para no suavizar el paradoxo retórico del dicho. La frase posterior «en este mundo» ayuda a entender el alcance idiomático de esta oposición.
- source_word: ἐν τῷ κόσμῳ τούτῳ
  english_pob_choice: in this world
  chosen_spanish: en este mundo
  alternatives_spanish:
  - en esta era
  - en este siglo
  lexicon: BDAG
  rationale: «En este mundo» es la equivalencia más natural y mantiene la referencia al orden presente en contraste con la vida eterna.
- source_word: φυλάξει
  english_pob_choice: will keep
  chosen_spanish: la guardará
  alternatives_spanish:
  - la conservará
  - la preservará
  lexicon: BDAG
  rationale: «Guardará» conserva el valor de custodia/protección de φυλάσσω y suena bien en español con el objeto «vida». Además mantiene el contraste verbal con «la pierde».
- source_word: εἰς ζωὴν αἰώνιον
  english_pob_choice: for eternal life
  chosen_spanish: para vida eterna
  alternatives_spanish:
  - hacia vida eterna
  - para la vida eterna
  lexicon: BDAG
  rationale: «Para vida eterna» expresa con claridad finalidad o resultado. Se evita una construcción más pesada y se preserva la formulación bíblica natural en español.
- source_word: αὐτοῦ
  english_pob_choice: his
  chosen_spanish: su
  alternatives_spanish:
  - su propia
  - de él
  lexicon: BDAG
  rationale: El posesivo singular reproduce el valor del pronombre masculino singular genérico. En español, «su» es lo más idiomático y no obliga a explicitar género.
theological_decisions:
- issue: Significado de «odia su vida»
  english_pob_reading: Retain the stark wording 'hates his life' as a call to renounce self-preservation in the present world-order, not as a command toward self-loathing or denial of life's goodness.
  chosen_spanish_reading: Conservar la dureza de «odia su vida» como una llamada a renunciar a la auto-preservación en el orden presente, no como un mandato a despreciarse a sí mismo ni a negar que la vida sea un bien.
  alternative_spanish_readings:
  - ama menos su vida
  - se desprende de su vida
  rationale: El griego usa μισέω y la tensión retórica debe permanecer en el texto principal. La cláusula «en este mundo» orienta la interpretación hacia la renuncia al apego presente, mientras que una suavización interpretativa se reservó para nota en la tradición inglesa; en español no se resuelve la paradoja en la línea principal.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it; §6, Readable modern English
- issue: Valor de ψυχή
  english_pob_reading: Translate ψυχή as 'life' in both clauses.
  chosen_spanish_reading: Traducir ψυχή como «vida» en ambas cláusulas.
  alternative_spanish_readings:
  - alma
  - ser
  rationale: En el marco inmediato del dicho, «vida» encaja con «pierde» y «guardará» y evita cargar el versículo con una antropología que el texto no exige. La amplitud semántica de ψυχή queda reconocida en la decisión léxica.
  doctrine_reference: Translation philosophy §1, Original-language primacy over translation tradition
translation_notes:
  revision_awareness: La revisión más reciente del texto base no introdujo cambios; se mantiene el acuerdo alto con la evaluación cruzada y no hubo modificaciones posteriores aplicadas al pasaje.
  spanish_consistency_notes:
  - Se mantuvo «vida» para ψυχή en ambas apariciones para preservar el paralelismo.
  - Se usó «guardará» para φυλάξει por su valor de custodia y por la simetría verbal con «pierde».
  - Se conservó la fuerza de «odia» sin atenuarla a «ama menos», siguiendo la tensión retórica documentada en el audit trail.
  - Se prefirió «para vida eterna» como solución natural y fiel a εἰς ζωὴν αἰώνιον.
  - La puntuación reproduce la antítesis del griego con dos miembros paralelos claramente separados.
