translation:
  language: es
  text: Yo he venido al mundo como luz[a], para que todo el que cree en mí no permanezca en la oscuridad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una luz». El griego no tiene artículo; la frase puede entenderse de modo cualitativo («como luz») o más literalmente («una luz»).
    reason: lexical_alternative
  - marker: b
    text: O «tinieblas». El singular con artículo apunta a la oscuridad como esfera reconocible en el vocabulario joánico; «oscuridad» la expresa de forma natural en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: φῶς
  english_pob_choice: light
  chosen_spanish: luz
  alternatives_spanish:
  - una luz
  lexicon: BDAG
  rationale: El griego carece de artículo; en español, «como luz» transmite bien el valor cualitativo y mantiene la metáfora joánica sin forzar un artículo. «Una luz» queda como alternativa posible, pero en la línea principal «luz» suena más natural y fiel al matiz funcional/identitario.
- source_word: εἰς τὸν κόσμον
  english_pob_choice: into the world
  chosen_spanish: al mundo
  alternatives_spanish:
  - en el mundo
  - hacia el mundo
  lexicon: BDAG
  rationale: La idea es de llegada a la esfera del mundo. En español, «al mundo» conserva el movimiento hacia esa esfera de manera natural y sobria; «en el mundo» podría perder el matiz de entrada.
- source_word: ἐλήλυθα
  english_pob_choice: I have come
  chosen_spanish: he venido
  alternatives_spanish:
  - vine
  lexicon: BDAG
  rationale: El perfecto griego expresa una venida con efecto presente. «He venido» reproduce mejor esa fuerza que el pretérito simple «vine».
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: Introduce propósito. «Para que» es la opción más natural en español y conserva la finalidad del enunciado.
- source_word: πᾶς ὁ πιστεύων
  english_pob_choice: everyone who believes
  chosen_spanish: todo el que cree
  alternatives_spanish:
  - quien cree
  - todos los que creen
  lexicon: BDAG
  rationale: El participio presente sustantivado comunica una clase general y continua. «Todo el que cree» mantiene el valor genérico sin sonar forzado; «quien cree» también sería posible, pero la forma elegida es más idiomática en este contexto.
- source_word: πιστεύων εἰς ἐμὲ
  english_pob_choice: believes in me
  chosen_spanish: cree en mí
  alternatives_spanish:
  - confía en mí
  lexicon: BDAG
  rationale: En Juan, πιστεύω con εἰς y objeto personal expresa fe dirigida a Jesús. «Cree en mí» es la formulación estándar y fiel; «confía en mí» capta una faceta válida, pero no hace falta en el texto principal.
- source_word: ἐν τῇ σκοτίᾳ
  english_pob_choice: in the darkness
  chosen_spanish: en la oscuridad
  alternatives_spanish:
  - en las tinieblas
  lexicon: BDAG
  rationale: El artículo griego señala la oscuridad como esfera reconocible. «La oscuridad» conserva bien ese valor; se evita «tinieblas» porque en español puede sonar más literario o arcaizante, aunque sigue siendo una alternativa viable.
- source_word: μὴ μείνῃ
  english_pob_choice: may not remain
  chosen_spanish: no permanezca
  alternatives_spanish:
  - no siga
  - no se quede
  lexicon: BDAG
  rationale: El aoristo subjuntivo con ἵνα y μή expresa resultado/pósito negativo. «No permanezca» comunica con claridad la idea de continuar en un estado, sin añadir matices no presentes en el griego.
theological_decisions:
- issue: Imagen cristológica de la luz
  english_pob_reading: Rendered φῶς as 'light' in a way that presents Jesus as the revelatory and saving light entering the world, without adding interpretive expansion.
  chosen_spanish_reading: Traducido como «luz», manteniendo a Jesús como la luz reveladora y salvadora que entra al mundo, sin ampliar el texto con explicación doctrinal.
  alternative_spanish_readings:
  - «como una luz»
  - «para traer luz al mundo»
  rationale: El pasaje presenta la metáfora joánica tal como está. «Como luz» conserva la imagen sin convertirla en paráfrasis interpretativa, y deja intacta la alta cristología implícita en el dicho.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 6
- issue: Alcance de πᾶς ὁ πιστεύων
  english_pob_reading: Translated as 'everyone who believes' without importing a denominationally specific doctrine of election or free will.
  chosen_spanish_reading: «todo el que cree», sin introducir una lectura confesional sobre elección o libre albedrío.
  alternative_spanish_readings:
  - «quien cree»
  - «todos los que creen»
  rationale: La frase griega presenta una clase general de creyentes y el propósito de la venida de Jesús. La traducción debe preservar ese alcance universal sin resolver debates teológicos que el versículo no aborda.
  doctrine_reference: Affirmations; Translation philosophy §3
translation_notes:
  revision_awareness: Sin revisiones aplicadas en el expediente; se mantiene la lectura aprobada por el control cruzado de alta concordancia.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente exige el nombre divino; aquí no aparece.
  - Se conserva «luz» como término joánico central y «oscuridad» para la esfera moral/espiritual, evitando una paráfrasis explicativa.
  - «Cree en mí» mantiene el lenguaje de fe personal dirigido a Jesús, en paralelo con el audit trail inglés.
