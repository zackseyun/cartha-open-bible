translation:
  language: es
  text: Así que los sumos sacerdotes decidieron[a] matar también a Lázaro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «planearon matar también a Lázaro»
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐβουλεύσαντο
  english_pob_choice: decided
  chosen_spanish: decidieron
  alternatives_spanish:
  - planearon
  - tomaron la decisión
  - resolvieron
  lexicon: BDAG
  rationale: βουλεύομαι expresa deliberación que culmina en una resolución. «Decidieron» comunica bien ese paso a una decisión firme en español actual sin exagerar hacia «conspiraron» o «tramaron».
- source_word: δὲ
  english_pob_choice: So
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Pero
  - Ahora bien
  lexicon: BDAG
  rationale: Aquí δέ enlaza la acción con el contexto narrativo previo. «Entonces» transmite continuidad temporal y lógica de manera natural en español.
- source_word: οἱ ἀρχιερεῖς
  english_pob_choice: the chief priests
  chosen_spanish: los sumos sacerdotes
  alternatives_spanish:
  - los principales sacerdotes
  - los jefes de los sacerdotes
  lexicon: BDAG
  rationale: En español bíblico, «sumos sacerdotes» es la forma estable para ἀρχιερεῖς y comunica con claridad el liderazgo sacerdotal plural, sin reducirlo al singular litúrgico de «sumo sacerdote».
- source_word: ἵνα
  english_pob_choice: to
  chosen_spanish: matar
  alternatives_spanish:
  - para matar
  - a fin de matar
  lexicon: BDAG
  rationale: Con verbos de decisión o deliberación, ἵνα + subjuntivo expresa propósito o contenido de la resolución. En español, el infinitivo directo después de «decidieron» resulta natural y fiel.
- source_word: καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - incluso
  - además
  lexicon: BDAG
  rationale: καί añade a Lázaro al objetivo ya implícito en el contexto. «También» reproduce la fuerza aditiva sin introducir énfasis extra.
- source_word: τὸν Λάζαρον
  english_pob_choice: Lazarus
  chosen_spanish: a Lázaro
  alternatives_spanish:
  - Lázaro
  - al Lázaro
  lexicon: BDAG
  rationale: Los nombres propios se transliteran de forma estándar; el objeto directo personal lleva la preposición «a» en español.
- source_word: ἀποκτείνωσιν
  english_pob_choice: kill
  chosen_spanish: matar
  alternatives_spanish:
  - dar muerte a
  - poner a muerte
  - asesinar
  lexicon: BDAG
  rationale: ἀποκτείνω significa «matar» o «dar muerte». «Matar» es la opción más directa y no añade una valoración moral más fuerte como «asesinar».
theological_decisions:
- issue: Gravedad de la intención contra Lázaro
  english_pob_reading: Render the clause straightforwardly as a hostile decision to kill Lazarus, without adding explanatory motive beyond the immediate context.
  chosen_spanish_reading: Presentar la decisión hostil de forma directa, sin ampliar la motivación ni intensificarla más allá del texto.
  alternative_spanish_readings:
  - Con «tramaron matar»
  - Con «conspiraron para matar»
  rationale: El griego describe una decisión deliberada, pero no usa un verbo técnico para conspiración. Mantener «decidieron» conserva la tensión narrativa y evita sobreinterpretar.
  doctrine_reference: 'Principio de traducción: no importar matices interpretativos que el texto no exige.'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; la formulación española se mantiene alineada con el texto griego y con el auditorio inglés aprobado.
  spanish_consistency_notes:
  - Se mantuvo «sumos sacerdotes» para ἀρχιερεῖς, en coherencia con el uso bíblico español común y con la precisión del plural.
  - Se eligió «matar» en lugar de «asesinar» o «dar muerte» para conservar la fuerza directa del verbo griego sin cargar el juicio moral.
  - No se añadió nota al pie porque la alternativa inglesa («planned to kill Lazarus too») queda suficientemente reflejada en «decidieron matar también a Lázaro».
