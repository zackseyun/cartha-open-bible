revisions:
- from: Pero todas estas cosas les harán a ustedes a causa de mi nombre[a], porque no conocen al que me envió.
  to: Pero harán todas estas cosas contra ustedes[a] a causa de mi nombre, porque no conocen al que me envió.
  rationale: Se revisa la cláusula verbal para lograr un español natural y a la vez reflejar mejor la construcción griega completa. Se adopta «contra ustedes» en el texto principal porque el contexto inmediato es de hostilidad y persecución, mientras que la alternativa más amplia «a ustedes» se conserva en nota. El resto del versículo es fiel y no requiere cambios.
