review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien el sentido general del griego: contraste fuerte («Pero»), totalidad de «todas estas cosas», causa en «a causa de mi nombre», y referente implícito en «al que me envió». También preserva adecuadamente la nota alternativa de εἰς ὑμᾶς como posible sentido hostil («contra ustedes»). Sin embargo, la combinación «les harán a ustedes» es poco natural y además no representa con suficiente claridad la doble estructura griega de objeto + dirección («todas estas cosas» ... «contra/a ustedes»).'
  spanish_quality_summary: La redacción es en general clara y digna, pero «les harán a ustedes» suena forzada en español y puede percibirse redundante. Una formulación como «harán todas estas cosas contra ustedes» o «les harán todas estas cosas» sería más idiomática. Dado que el texto ya conserva la nota alternativa «contra ustedes», conviene reflejar en el cuerpo una redacción natural que mantenga la dirección de la acción sin perder el matiz potencialmente hostil.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «nombre», «conocen» y «al que me envió» están alineados con las decisiones léxicas y teológicas auditadas. La única corrección necesaria es estilístico-sintáctica en la representación de ποιήσουσιν + εἰς ὑμᾶς.
  issues:
  - severity: medium
    issue: «les harán a ustedes» es una construcción poco natural
    rationale: En español amplio suena redundante y torpe. La cláusula necesita una formulación más idiomática sin perder la dirección de la acción hacia los discípulos.
  - severity: medium
    issue: La relación entre «todas estas cosas» y «a ustedes» queda sintácticamente débil
    rationale: El griego expresa ‘harán todas estas cosas a/contra ustedes’. En el borrador, el orden y la selección verbal oscurecen un poco esa relación y afectan la fluidez.
  revised_spanish_text: Pero harán todas estas cosas contra ustedes[a] a causa de mi nombre, porque no conocen al que me envió.
