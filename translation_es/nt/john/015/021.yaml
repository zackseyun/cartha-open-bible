translation:
  language: es
  text: Pero harán todas estas cosas contra ustedes[a] a causa de mi nombre, porque no conocen al que me envió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a ustedes». La expresión griega puede referirse a acciones dirigidas a los discípulos en sentido hostil.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Mas
  - Sin embargo
  lexicon: BDAG
  rationale: La conjunción marca contraste fuerte con lo anterior; «Pero» es natural en español y conserva esa oposición sin volverse arcaica.
- source_word: ταῦτα πάντα
  english_pob_choice: all these things
  chosen_spanish: todas estas cosas
  alternatives_spanish:
  - todo esto
  - todas estas cosas aquí
  lexicon: BDAG
  rationale: La combinación del demostrativo con πᾶς pide en español una formulación explícita de totalidad y cercanía; «todas estas cosas» preserva ambos valores.
- source_word: ποιήσουσιν
  english_pob_choice: they will do
  chosen_spanish: les harán
  alternatives_spanish:
  - harán
  - les harán estas cosas
  lexicon: BDAG
  rationale: En este contexto, ποιέω con objeto humano expresa cómo tratarán a los discípulos. «Les harán» conserva la referencia directa a lo que se les hará, sin forzar una glosa más interpretativa.
- source_word: εἰς ὑμᾶς
  english_pob_choice: to you
  chosen_spanish: a ustedes
  alternatives_spanish:
  - contra ustedes
  - hacia ustedes
  lexicon: BDAG
  rationale: La frase puede indicar acción dirigida a los discípulos en sentido hostil. «A ustedes» es idiomático y suficientemente amplio; evita intensificar a «contra ustedes» sin necesidad textual.
- source_word: διὰ τὸ ὄνομά μου
  english_pob_choice: because of my name
  chosen_spanish: a causa de mi nombre
  alternatives_spanish:
  - por mi nombre
  - por causa de mi nombre
  lexicon: BDAG
  rationale: διά con acusativo expresa causa o motivo. «A causa de» mantiene el valor causal y, en español, suena claro y digno. «Nombre» conserva la carga representativa y teológica del término.
- source_word: ὄνομά
  english_pob_choice: name
  chosen_spanish: nombre
  alternatives_spanish:
  - reputación
  lexicon: BDAG
  rationale: Se conserva «nombre» porque en Juan no se reduce a reputación, sino que representa identidad, autoridad y relación.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Introduce la base explicativa del rechazo; «porque» es directo y natural en español contemporáneo.
- source_word: οὐκ οἴδασιν
  english_pob_choice: they do not know
  chosen_spanish: no conocen
  alternatives_spanish:
  - no saben
  - no han conocido
  lexicon: BDAG
  rationale: En Juan, οἶδα suele implicar conocimiento relacional. «No conocen» preserva ese matiz mejor que «no saben».
- source_word: τὸν πέμψαντά με
  english_pob_choice: the one who sent me
  chosen_spanish: al que me envió
  alternatives_spanish:
  - al que me mandó
  - al que me ha enviado
  lexicon: BDAG
  rationale: El participio articular se vierte de forma natural como una relativa sustantivada. «Al que me envió» conserva el referente implícito sin añadir explícitamente «el Padre».
theological_decisions:
- issue: Referente implícito de «al que me envió»
  english_pob_reading: An implicit reference to the Father is preserved as 'the one who sent me' rather than made explicit as 'the Father who sent me.'
  chosen_spanish_reading: Se mantiene «al que me envió» sin explicitar «el Padre».
  alternative_spanish_readings:
  - al Padre que me envió
  - al Padre que me ha enviado
  rationale: El contexto joánico identifica claramente al remitente, pero el griego usa un participio sustantivado y no el sustantivo «Padre». La traducción conserva esa primacía del original y evita resolver de más la formulación.
  doctrine_reference: Primacía del texto original; conservar la tensión teológica y referencial sin añadir títulos no presentes.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el consenso del audit trail en inglés: conserva la causalidad de διὰ τὸ ὄνομά μου, mantiene la referencia implícita de τὸν πέμψαντά με y evita intensificar εἰς ὑμᾶς a una traducción exclusivamente adversativa.'
  spanish_consistency_notes:
  - Se mantiene «nombre» como término teológico estable en Juan, no «reputación».
  - Se usa «no conocen» para reflejar el valor relacional de οἶδα.
  - «A causa de» conserva el matiz causal de διά con acusativo.
  - La nota al pie marca la alternativa hostil de εἰς ὑμᾶς sin imponerla en el texto principal.
