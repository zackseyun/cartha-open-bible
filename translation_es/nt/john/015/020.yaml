translation:
  language: es
  text: 'Recuerden la palabra que les dije: «Ningún esclavo[a] es mayor que su amo». Si me persiguieron a mí, también a ustedes los perseguirán; si guardaron mi palabra[b], también guardarán la de ustedes.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «siervo»: el griego δοῦλος puede significar «esclavo» o «siervo» según el contexto; aquí se usa «esclavo» porque el contraste con «amo» destaca la condición subordinada.'
    reason: lexical_alternative
  - marker: b
    text: 'O «obedecieron»: «guardaron mi palabra» en Juan puede incluir tanto recibir el mensaje de Jesús como vivir en obediencia a él.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μνημονεύετε
  english_pob_choice: Remember
  chosen_spanish: Recuerden
  alternatives_spanish:
  - Acuérdense
  - Recuerden siempre
  lexicon: BDAG
  rationale: El imperativo presente pide una acción continua de memoria activa. «Recuerden» expresa con naturalidad la exhortación sin añadir contenido no presente en el griego.
- source_word: λόγου
  english_pob_choice: word
  chosen_spanish: palabra
  alternatives_spanish:
  - mensaje
  - declaración
  lexicon: BDAG
  rationale: En Juan, λόγος puede referirse a una palabra/decir concreto de Jesús. «Palabra» conserva el enlace léxico con las dos apariciones de λόγος en el versículo y funciona bien en español bíblico actual.
- source_word: οὗ ἐγὼ εἶπον ὑμῖν
  english_pob_choice: that I said to you
  chosen_spanish: que les dije
  alternatives_spanish:
  - que les hablé
  - que yo les dije
  lexicon: BDAG
  rationale: La cláusula relativa remite a lo dicho por Jesús a los discípulos. «Les dije» es una equivalencia directa y natural; el complemento «a ustedes» queda implícito por el pronombre átono, y en la cita siguiente se mantiene el registro conversacional del discurso.
- source_word: δοῦλος
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - criado
  lexicon: BDAG
  rationale: La contraposición con «señor» exige preservar la relación jerárquica fuerte del término. «Esclavo» mantiene la fuerza social del contraste y evita suavizarla con «siervo».
- source_word: μείζων
  english_pob_choice: greater
  chosen_spanish: mayor
  alternatives_spanish:
  - más importante
  - superior
  lexicon: BDAG
  rationale: El comparativo de tamaño/estatus se vierte de manera natural como «mayor». En español conserva la idea de rango sin restringirla innecesariamente a valor moral.
- source_word: κυρίου
  english_pob_choice: master
  chosen_spanish: señor
  alternatives_spanish:
  - amo
  - dueño
  lexicon: BDAG
  rationale: Aunque el contexto esclavo/señor podría admitir «amo», «señor» reproduce mejor la relación de autoridad del dicho proverbial en español y permite conservar el paralelismo tradicional con «esclavo» sin confundirlo con el título divino cuando el contexto es claramente humano.
- source_word: ἐδίωξαν / διώξουσιν
  english_pob_choice: persecuted / will also persecute
  chosen_spanish: persiguieron / también ... perseguirán
  alternatives_spanish:
  - hostigaron / hostigarán
  - perseguían / perseguirán
  lexicon: BDAG
  rationale: En este contexto de hostilidad hacia Jesús y sus discípulos, διώκω expresa persecución. «Perseguir» mantiene la continuidad verbal entre pasado y futuro y conserva la fuerza del conflicto.
- source_word: ἐτήρησαν / τηρήσουσιν
  english_pob_choice: kept / will also keep
  chosen_spanish: guardaron / también guardarán
  alternatives_spanish:
  - obedecieron / obedecerán
  - observaron / observarán
  lexicon: BDAG
  rationale: τηρέω en Juan puede incluir recibir y obedecer la palabra. «Guardar» es un equivalente español estable que conserva el vínculo con la palabra y deja abierta la doble idea de acogerla y obedecerla.
- source_word: τὸν λόγον μου ... τὸν ὑμέτερον
  english_pob_choice: my word ... yours
  chosen_spanish: mi palabra ... la de ustedes
  alternatives_spanish:
  - mi mensaje ... el de ustedes
  - mi palabra ... vuestra
  lexicon: BDAG
  rationale: Se mantiene la repetición de λόγος mediante «palabra». «La de ustedes» evita una expresión poco natural como «su palabra» cuando el contraste con «mi palabra» podría resultar ambiguo en español.
theological_decisions:
- issue: δοῦλος / κύριος como relación social de subordinación
  english_pob_reading: slave ... master
  chosen_spanish_reading: esclavo ... señor
  alternative_spanish_readings:
  - siervo ... señor
  - esclavo ... amo
  rationale: La lectura inglesa privilegia la asimetría social marcada. En español, «esclavo ... señor» conserva esa tensión sin diluirla. «Amo» sería muy explícito en lo jurídico, pero «señor» encaja mejor con el proverbio y con el ritmo del versículo.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος; Translation philosophy §1'
- issue: τηρέω en relación con la palabra de Jesús
  english_pob_reading: kept my word
  chosen_spanish_reading: guardaron mi palabra
  alternative_spanish_readings:
  - obedecieron mi palabra
  - observaron mi palabra
  rationale: La elección inglesa preserva el doble sentido de recibir y obedecer. «Guardar» mantiene esa amplitud semántica en español y evita reducir el verbo solo a obediencia formal.
  doctrine_reference: BDAG; Johannine usage of τηρέω
translation_notes:
  revision_awareness: Esta versión sigue de cerca el texto griego y el audit trail inglés, manteniendo el paralelismo de λόγος/word, la tensión social de δοῦλος con κυρίου, y el sentido amplio de τηρέω en Juan. No se introdujeron revisiones respecto del pase más reciente en inglés; la redacción española solo adapta con naturalidad y fidelidad los mismos juicios léxicos.
  spanish_consistency_notes:
  - Se usa «palabra» para λόγος de manera consistente dentro del versículo.
  - Se mantiene «esclavo» para δοῦλος y «señor» para κυρίου en el dicho proverbial.
  - Se usa «perseguir» para διώκω en ambos miembros de la frase.
  - Se usa «guardar» para τηρέω, conservando el paralelismo entre «mi palabra» y «la de ustedes».
