translation:
  language: es
  text: Si no hubiera venido y les hubiera hablado, no tendrían pecado[a]; pero ahora no tienen excusa[b] por su pecado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no tendrían culpa» o «no serían culpables de pecado». El griego, más literalmente, dice: «no tendrían pecado».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «pretexto».'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰ μὴ
  english_pob_choice: If ... not
  chosen_spanish: Si no hubiera...
  alternatives_spanish:
  - A menos que...
  lexicon: BDAG
  rationale: La construcción introduce una condición contraria a la realidad; en español, «Si no hubiera...» comunica con naturalidad ese valor contrafactual.
- source_word: ἦλθον
  english_pob_choice: had come
  chosen_spanish: hubiera venido
  alternatives_spanish:
  - viniera
  - habría venido
  lexicon: BDAG
  rationale: El aoristo en una apódosis/protasis contraria a la realidad se expresa mejor en español con pluscuamperfecto de subjuntivo.
- source_word: ἐλάλησα
  english_pob_choice: spoken
  chosen_spanish: les hubiera hablado
  alternatives_spanish:
  - les hubiera hablado a ellos
  - les hubiera hablado con ellos
  lexicon: BDAG
  rationale: λαλέω con dativo aquí significa hablar a alguien; «les hubiera hablado» conserva el paralelismo verbal sin perder el destinatario.
- source_word: αὐτοῖς
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  lexicon: BDAG
  rationale: 'El dativo de destinatario se vuelve naturalmente pronominal en español: «les».'
- source_word: ἁμαρτίαν
  english_pob_choice: sin
  chosen_spanish: pecado
  alternatives_spanish:
  - culpa
  - falta
  lexicon: BDAG
  rationale: La palabra griega es ἁμαρτία; «pecado» preserva el peso léxico y teológico del sustantivo sin interpretarlo como mera culpabilidad.
- source_word: οὐκ εἴχοσαν
  english_pob_choice: would not have
  chosen_spanish: no tendrían
  alternatives_spanish:
  - no habrían tenido
  lexicon: BDAG
  rationale: La forma imperfecta en una condición contraria a la realidad se comunica de modo idiomático con «no tendrían», manteniendo la fuerza condicional.
- source_word: νῦν δὲ
  english_pob_choice: but now
  chosen_spanish: pero ahora
  alternatives_spanish:
  - mas ahora
  - ahora bien
  lexicon: BDAG
  rationale: Marca contraste directo entre la condición hipotética pasada y la realidad presente.
- source_word: πρόφασιν
  english_pob_choice: excuse
  chosen_spanish: excusa
  alternatives_spanish:
  - pretexto
  - coartada
  lexicon: BDAG
  rationale: En este contexto, la idea es falta de una justificación o defensa; «excusa» es la opción más clara y natural en español.
- source_word: οὐκ ἔχουσιν
  english_pob_choice: they have no
  chosen_spanish: no tienen
  alternatives_spanish:
  - carecen de
  - no poseen
  lexicon: BDAG
  rationale: Presente simple negativo para la condición actual; «no tienen» es la forma más idiomática.
- source_word: περὶ τῆς ἁμαρτίας αὐτῶν
  english_pob_choice: for their sin
  chosen_spanish: por su pecado
  alternatives_spanish:
  - acerca de su pecado
  - con respecto a su pecado
  lexicon: BDAG
  rationale: περί con genitivo puede matizar relación/contenido; en español, con «excusa» la preposición natural es «por», que mantiene la idea de justificación respecto del pecado sin volverlo pesado.
theological_decisions:
- issue: 'ἁμαρτίαν οὐκ εἴχοσαν: ¿pecado como culpa/culpabilidad, o pecado literal en relación con la revelación rechazada?'
  english_pob_reading: The main text keeps 'they would not have sin,' while notes preserve the alternative 'they would not be guilty of sin' / 'would not have guilt.'
  chosen_spanish_reading: El texto principal conserva «no tendrían pecado», sin resolver la tensión interpretativa.
  alternative_spanish_readings:
  - no serían culpables de pecado
  - no tendrían culpa
  rationale: El contexto habla de responsabilidad ante la venida y el hablar de Jesús, pero el griego dice literalmente «tener pecado». Conviene preservar la formulación y dejar la implicación de culpabilidad como inferencia contextual, no como sustitución del texto.
  doctrine_reference: Preservar la tensión teológica sin resolverla en la línea principal.
- issue: 'πρόφασιν οὐκ ἔχουσιν περὶ τῆς ἁμαρτίας αὐτῶν: ¿excusa, pretexto o defensa?'
  english_pob_reading: '''they have no excuse for their sin'' with note ''Or, they have no pretext.'''
  chosen_spanish_reading: «no tienen excusa por su pecado»
  alternative_spanish_readings:
  - no tienen pretexto por su pecado
  - no tienen defensa respecto de su pecado
  rationale: En español, «excusa» comunica de manera más natural la falta de justificación, sin ocultar que la opción 'pretexto' también sería posible.
  doctrine_reference: La idea es responsabilidad moral ante la revelación de Cristo.
translation_notes:
  revision_awareness: Se mantuvo el valor contrafactual del primer miembro con pluscuamperfecto de subjuntivo; se conservó «pecado» para ἁμαρτίαν en el cuerpo del texto, siguiendo la cautela de la POB inglesa; y se optó por «excusa» como equivalente idiomático de πρόφασιν, con nota alternativa para «pretexto».
  spanish_consistency_notes:
  - Se usó «pecado» de manera consistente para ἁμαρτία.
  - Se evitó «SEÑOR» o terminología ajena al versículo; no hay mención de nombres divinos aquí.
  - «Excusa» se mantiene como término principal para πρόφασις, en línea con el registro natural del español.
  - 'La puntuación reproduce el contraste del griego: prótasis contrafactual, apódosis negativa y clausula de contraste con «pero ahora».'
