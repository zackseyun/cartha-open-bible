translation:
  language: es
  text: Si guardan mis mandamientos, permanecerán en mi amor, así como yo he guardado los mandamientos de mi Padre y permanezco en su amor.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐὰν
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Si alguna vez
  - Cuando
  lexicon: BDAG
  rationale: La cláusula condicional griega se expresa de modo natural en español con 'si', sin añadir matices iterativos que el texto no exige.
- source_word: ἐντολάς
  english_pob_choice: commandments
  chosen_spanish: mandamientos
  alternatives_spanish:
  - mandatos
  - órdenes
  lexicon: BDAG
  rationale: '''Mandamientos'' conserva la fuerza autoritativa del término y mantiene la correspondencia con el uso joánico de ἐντολή.'
- source_word: τηρήσητε
  english_pob_choice: keep
  chosen_spanish: guardar
  alternatives_spanish:
  - observar
  - cumplir
  lexicon: BDAG
  rationale: En español, 'guardar' transmite bien la idea de atender fielmente y mantener en práctica los mandamientos, sin reducir el verbo a mera obediencia puntual.
- source_word: μενεῖτε
  english_pob_choice: will remain
  chosen_spanish: permanecerán
  alternatives_spanish:
  - permanecerán en
  - se mantendrán
  lexicon: BDAG
  rationale: '''Permanecer'' conserva el término clave de Juan para continuidad relacional y resulta natural en español moderno.'
- source_word: ἐν τῇ ἀγάπῃ μου
  english_pob_choice: in my love
  chosen_spanish: en mi amor
  alternatives_spanish:
  - dentro de mi amor
  - en el amor que me tienen
  lexicon: BDAG
  rationale: 'Se mantiene la imagen de esfera relacional con una traducción literal y transparente: ''en mi amor''.'
- source_word: καθὼς
  english_pob_choice: just as
  chosen_spanish: así como
  alternatives_spanish:
  - como
  - del mismo modo que
  lexicon: BDAG
  rationale: '''Así como'' señala con claridad la relación de comparación y correspondencia entre ambas cláusulas.'
- source_word: τετήρηκα
  english_pob_choice: have kept
  chosen_spanish: he guardado
  alternatives_spanish:
  - he observado
  - he cumplido
  lexicon: BDAG
  rationale: El perfecto griego se refleja con el perfecto compuesto español, preservando la acción completada con relevancia continua y el vínculo léxico con 'guardar'.
- source_word: τοῦ πατρός μου
  english_pob_choice: my Father's
  chosen_spanish: de mi Padre
  alternatives_spanish:
  - de mi Padre celestial
  - de mi Padre
  lexicon: BDAG
  rationale: La posesión se expresa de forma natural en español con 'de mi Padre', manteniendo la referencia personal y relacional del original.
- source_word: μένω
  english_pob_choice: remain
  chosen_spanish: permanezco
  alternatives_spanish:
  - sigo permaneciendo
  - habito
  lexicon: BDAG
  rationale: Se conserva el mismo verbo raíz que en la primera cláusula para sostener la repetición teológica de μένω y su continuidad en el versículo.
- source_word: ἀγάπη
  english_pob_choice: love
  chosen_spanish: amor
  alternatives_spanish:
  - caridad
  lexicon: BDAG
  rationale: '''Amor'' es la equivalencia doctrinal y natural en español, y preserva la conexión verbal y temática del pasaje.'
theological_decisions:
- issue: Relación entre obediencia y permanecer en el amor de Jesús
  english_pob_reading: Render the statement straightforwardly as a conditional relation without importing a doctrinal explanation of merit or loss of salvation.
  chosen_spanish_reading: Presentar la relación condicional de manera directa, sin añadir una explicación doctrinal sobre mérito, pérdida o simple evidencia.
  alternative_spanish_readings:
  - La obediencia como mérito del amor divino
  - La obediencia solo como señal externa sin fuerza condicional real
  rationale: El griego establece una condición real y una comparación con la obediencia de Jesús, pero no desarrolla el debate teológico mayor. La traducción española debe conservar esa tensión sin resolverla artificialmente.
  doctrine_reference: Preservar la tensión teológica del texto sin sistematizarla.
- issue: Mantenimiento del verbo clave μένω
  english_pob_reading: remain
  chosen_spanish_reading: permanecer
  alternative_spanish_readings:
  - abide
  - quedarse
  rationale: '''Permanecer'' conserva el campo semántico joánico de continuidad relacional y evita un lenguaje excesivamente devocional o arcaico.'
  doctrine_reference: Uso joánico de μένω como permanencia relacional.
translation_notes:
  revision_awareness: Se siguió el texto griego SBLGNT y el audit trail inglés sin cambios de revisión relevantes; la versión inglesa más reciente quedó sin modificaciones y con alto acuerdo entre revisores.
  spanish_consistency_notes:
  - Se mantuvo la repetición de 'guardar' para ἐντολάς/τετήρηκα a fin de conservar el vínculo léxico.
  - Se mantuvo 'permanecer' para μένω en ambas ocurrencias para preservar la cohesión temática del versículo.
  - Se usó 'amor' para ἀγάπη conforme al criterio doctrinal establecido.
  - No se añadieron notas al pie porque la redacción española no introdujo una ambigüedad nueva ni el audit trail inglés preservó notas alternativas.
