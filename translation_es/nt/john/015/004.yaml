review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del griego: imperativo de permanencia, elipsis recíproca «y yo en ustedes», metáfora de la vid y la rama, y la condición negativa repetida. Sin embargo, la segunda mitad queda menos fiel al valor de incapacidad implícito en οὐ δύναται / οὕτως οὐδὲ ὑμεῖς, porque «así tampoco ustedes» suena incompleto en español y no expresa con suficiente claridad «tampoco ustedes pueden».'
  spanish_quality_summary: 'El texto es generalmente claro y natural, pero necesita un ajuste menor para mayor fluidez y exactitud: «así tampoco ustedes» debe explicitar el verbo en español. La nota al pie actual contiene errores graves de forma y léxico: «Abidan» y «abidir» no son formas aceptables en español; la alternativa tradicional correcta es «Permanezcan»/posiblemente «Habiten», pero en este contexto no hay una alternativa española tradicional fuerte equivalente a English ''abide''. Conviene conservar la nota como alternativa léxica con «Permanezcan» / «Permanezcan en mí» frente a «permanezcan», o mejor usar «Permanezcan» como texto principal y «Permanezcan en mí... / También puede traducirse ''Sigan en mí''» sería débil. La mejor reparación es mantener la nota con «O «Permanezcan en mí, y yo en ustedes»» no aporta alternativa real; por eso es preferible una nota con «O «Habiten en mí…»» solo si se justifica. Dado el audit trail inglés, la nota debe preservar la alternativa de μένω;
    en español la opción más viable es «Permanezcan» principal y «Habiten» como alternativa explicativa, aunque menos contextual. '
  glossary_alignment: No hay conflictos con la terminología de proyecto principal. «mí», «ustedes», «vid», «fruto» y «permanezcan» están bien alineados. La principal desalineación es la nota léxica, donde se introducen formas inexistentes («abidan», «abidir») y una referencia innecesaria al inglés «abide».
  issues:
  - severity: medium
    issue: La cláusula «así tampoco ustedes» no expresa claramente la incapacidad implícita de οὕτως οὐδὲ ὑμεῖς.
    rationale: El inglés auditado corrigió precisamente este punto a «so neither can you». En español, sin verbo, la frase queda elíptica de manera menos natural y puede sentirse incompleta. «Así tampoco ustedes pueden» preserva mejor el sentido.
  - severity: high
    issue: 'La nota al pie usa formas españolas incorrectas: «Abidan» y «abidir».'
    rationale: Esas formas no son español estándar ni eclesialmente legible. Además, la nota mezcla indebidamente el anglicismo «abide» en vez de ofrecer una alternativa española válida.
  - severity: medium
    issue: La nota al pie no refleja adecuadamente la racionalidad léxica documentada para μένω en español.
    rationale: Debe presentar una alternativa española inteligible y explicar que «permanecer» comunica continuidad relacional, mientras una opción como «habitar» enfatiza residencia/duración, sin introducir términos inexistentes.
  revised_spanish_text: Permanezcan en mí[a], y yo en ustedes. Así como la rama no puede dar fruto por sí misma, si no permanece en la vid, así tampoco ustedes pueden, si no permanecen en mí.
  revised_footnotes:
