    text: O «Habiten en mí, y yo en ustedes». El verbo griego μένω también puede expresar la idea de permanecer o habitar continuamente; «permanezcan» es más natural en español actual, mientras que «habiten» resalta el matiz de continuidad o morada.
    reason: lexical_alternative
  revision_rationale: Se ajusta la segunda cláusula para expresar explícitamente la incapacidad implicada en el griego y ya reconocida en la auditoría inglesa («tampoco ustedes pueden»). También se reemplaza la nota defectuosa por una alternativa española válida y comprensible para μένω, eliminando formas inexistentes y el anglicismo innecesario.
