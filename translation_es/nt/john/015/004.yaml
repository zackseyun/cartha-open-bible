translation:
  language: es
  text: Permanezcan en mí[a], y yo en ustedes. Así como la rama no puede dar fruto por sí misma, si no permanece en la vid, así tampoco ustedes pueden, si no permanecen en mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Habiten en mí, y yo en ustedes». El verbo griego μένω también puede expresar la idea de permanecer o habitar continuamente; «permanezcan» es más natural en español actual, mientras que «habiten» resalta el matiz de continuidad o morada.
    reason: lexical_alternative
lexical_decisions:
- source_word: μείνατε
  english_pob_choice: Remain
  chosen_spanish: Permanezcan
  alternatives_spanish:
  - Permanezcan allí
  - Quédense
  - Abidan
  lexicon: μένω
  rationale: El imperativo aoristo plural exhorta a una permanencia continua. «Permanezcan» conserva la fuerza de continuidad relacional y es natural en español moderno; «abidan» es más tradicional pero menos claro para lectores contemporáneos.
- source_word: ἐν ἐμοί
  english_pob_choice: in me
  chosen_spanish: en mí
  alternatives_spanish:
  - conmigo
  - junto a mí
  lexicon: ἐν
  rationale: Se preserva «en» para mantener la idea de unión/participación, no mera cercanía.
- source_word: κἀγὼ ἐν ὑμῖν
  english_pob_choice: and I in you
  chosen_spanish: y yo en ustedes
  alternatives_spanish:
  - y yo permaneceré en ustedes
  - y yo en ustedes también
  lexicon: ἐγώ + ἐν
  rationale: El griego es elíptico y no expresa un verbo explícito; en español también puede mantenerse la elipsis con fluidez. «Ustedes» evita regionalismos y conserva el plural.
- source_word: καθὼς
  english_pob_choice: Just as
  chosen_spanish: Así como
  alternatives_spanish:
  - Como
  - Tal como
  lexicon: καθώς
  rationale: «Así como» marca con claridad la comparación del símil de la vid y los sarmientos.
- source_word: τὸ κλῆμα
  english_pob_choice: the branch
  chosen_spanish: la rama
  alternatives_spanish:
  - el sarmiento
  - la vid
  lexicon: κλῆμα
  rationale: Aunque «sarmiento» es más técnico, «rama» es claro y entendible para un lector general. Se mantiene la imagen vegetal sin sobrecargar el registro.
- source_word: οὐ δύναται
  english_pob_choice: is not able
  chosen_spanish: no puede
  alternatives_spanish:
  - no es capaz de
  - no tiene poder para
  lexicon: δύναμαι
  rationale: «No puede» comunica bien la incapacidad explícita y es idiomático en español; conserva el valor de posibilidad/capacidad del verbo.
- source_word: καρπὸν φέρειν
  english_pob_choice: to bear fruit
  chosen_spanish: dar fruto
  alternatives_spanish:
  - producir fruto
  - llevar fruto
  lexicon: καρπός + φέρω
  rationale: «Dar fruto» es la expresión natural en español bíblico y mantiene el sentido agrícola sin calco innecesario.
- source_word: ἀφ’ ἑαυτοῦ
  english_pob_choice: by itself
  chosen_spanish: por sí misma
  alternatives_spanish:
  - por sí sola
  - de sí misma
  lexicon: ἀπό + ἑαυτοῦ
  rationale: Se adapta el género de «la rama» y se usa una fórmula natural en español para expresar independencia/autosuficiencia.
- source_word: ἐὰν μὴ μένῃ
  english_pob_choice: unless it remains
  chosen_spanish: si no permanece
  alternatives_spanish:
  - a menos que permanezca
  - salvo que permanezca
  lexicon: ἐάν μή + μένω
  rationale: «Si no permanece» reproduce bien la condición negativa y evita una formulación demasiado pesada en español.
- source_word: ἐν τῇ ἀμπέλῳ
  english_pob_choice: in the vine
  chosen_spanish: en la vid
  alternatives_spanish:
  - en la parra
  - unida a la vid
  lexicon: ἀμπέλος
  rationale: «Vid» es la correspondencia más directa y común del término agrícola en este contexto.
- source_word: οὕτως οὐδὲ ὑμεῖς
  english_pob_choice: so neither can you
  chosen_spanish: así tampoco ustedes
  alternatives_spanish:
  - así tampoco pueden ustedes
  - ni ustedes tampoco
  lexicon: οὕτως + οὐδέ + σύ
  rationale: El griego retoma la imposibilidad del miembro anterior de forma elíptica. En español, «así tampoco ustedes» conserva la simetría; la incapacidad queda completa en la cláusula siguiente.
- source_word: ἐὰν μὴ ἐν ἐμοὶ μένητε
  english_pob_choice: unless you remain in me
  chosen_spanish: si no permanecen en mí
  alternatives_spanish:
  - a menos que permanezcan en mí
  - salvo que permanezcan en mí
  lexicon: ἐάν μή + ἐν ἐμοί + μένω
  rationale: Se mantiene el verbo clave «permanecer» y la preposición «en» para conservar el motivo central de unión con Jesús.
theological_decisions:
- issue: La metáfora de unión permanente con Jesús expresada por μένω
  english_pob_reading: remain / abide
  chosen_spanish_reading: permanecer
  alternative_spanish_readings:
  - abidir
  - abandonarse a
  - quedarse
  rationale: «Permanecer» comunica la continuidad relacional y la dependencia mutua sin perder la carga teológica de la imagen. Se evita «abidir», por ser menos natural en español, aunque «abide» fue retenido como alternativa en inglés.
  doctrine_reference: Translation philosophy §§5–6
- issue: Elipsis en «κἀγὼ ἐν ὑμῖν»
  english_pob_reading: and I in you
  chosen_spanish_reading: y yo en ustedes
  alternative_spanish_readings:
  - y yo permaneceré en ustedes
  - y yo estaré en ustedes
  rationale: Se conserva la elipsis del griego sin añadir un verbo que estreche el sentido. Esto mantiene abierta la lectura de mutua inhabitación/indwelling propia del contexto joánico.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: La base inglesa revisó «so neither are you» por «so neither can you» para reflejar mejor la capacidad implícita de οὐ δύναται. En español, esa precisión se integró con «así tampoco ustedes» y la oración final «si no permanecen en mí», dejando claro que la incapacidad depende de la permanencia en Jesús sin añadir verbos innecesarios.
  spanish_consistency_notes:
  - Se mantuvo «en mí / en ustedes / en la vid» de modo consistente para reflejar ἐν.
  - Se eligió «permanezcan» como traducción núcleo de μένω en toda la cláusula.
  - Se prefirió «vid» a «parra» por ser el equivalente más directo y estable en este contexto.
  - Se usó «ustedes» para un plural neutral y eclesialmente amplio.
  - Se respetó la elipsis del segundo miembro para no sobreinterpretar el texto.
