base_translation:
  language: en
  yaml_path: translation/nt/john/015/004.yaml
  text: Remain in me[a], and I in you. Just as the branch is not able to bear fruit by itself unless it remains in the vine, so neither can you unless you remain in me.
  footnotes:
  - marker: a
    text: Or 'Abide in me, and I in you.' The verb μένω can also be rendered 'abide,' a traditional English rendering that emphasizes ongoing dwelling or continuance.
    reason: lexical_alternative
