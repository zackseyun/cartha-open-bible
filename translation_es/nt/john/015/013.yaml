translation:
  language: es
  text: 'Nadie tiene amor mayor que este: que alguien dé su vida por sus amigos[a][b][c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que uno dé su vida por sus amigos». El griego usa un sujeto singular indefinido.'
    reason: lexical_alternative
  - marker: b
    text: «Vida» traduce el griego psychē, que también puede significar «alma» o «ser»; aquí se entiende como la vida entregada en muerte.
    reason: lexical_alternative
  - marker: c
    text: «Por» traduce el griego hyper, que también puede rendirse «en favor de» o «por causa de».
    reason: lexical_alternative
lexical_decisions:
- source_word: μείζονα
  english_pob_choice: greater
  chosen_spanish: mayor
  alternatives_spanish:
  - más grande
  - superior
  lexicon: BDAG
  rationale: Comparativo de μέγας; en español, 'amor mayor' es la construcción natural y fiel para expresar la comparación.
- source_word: ταύτης
  english_pob_choice: than this
  chosen_spanish: que este
  alternatives_spanish:
  - que esto
  - que tal
  lexicon: BDAG
  rationale: El griego usa el demostrativo en genitivo de comparación; en español, 'que este' conserva la referencia anticipatoria a la cláusula siguiente sin sobrecargarla.
- source_word: ἀγάπην
  english_pob_choice: love
  chosen_spanish: amor
  alternatives_spanish:
  - caridad
  - amor abnegado
  lexicon: BDAG
  rationale: ἀγάπη aquí expresa amor de entrega; 'amor' es el equivalente básico y más natural, y la concreción sacrificial se despliega en la cláusula explicativa.
- source_word: οὐδεὶς ἔχει
  english_pob_choice: No one has
  chosen_spanish: Nadie tiene
  alternatives_spanish:
  - Nadie posee
  lexicon: BDAG
  rationale: Expresión negativa posesiva directa; 'tiene' es el verbo más natural en español actual.
- source_word: ἵνα
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - para que
  - a fin de que
  lexicon: BDAG
  rationale: Aquí introduce la explicación de en qué consiste ese amor; 'que' comunica bien ese valor epexegético en español sin volverlo final en exceso.
- source_word: τις
  english_pob_choice: someone
  chosen_spanish: alguien
  alternatives_spanish:
  - uno
  - una persona
  lexicon: BDAG
  rationale: Pronombre indefinido genérico; 'alguien' conserva la generalidad y fluidez del griego sin marcar género.
- source_word: τὴν ψυχὴν αὐτοῦ
  english_pob_choice: his life
  chosen_spanish: su vida
  alternatives_spanish:
  - su alma
  - su ser
  lexicon: BDAG
  rationale: En este contexto ψυχή se refiere a la vida terrenal entregada hasta la muerte; 'vida' es la opción más precisa y evita una lectura dualista que el pasaje no enfatiza.
- source_word: θῇ
  english_pob_choice: lay down
  chosen_spanish: ponga
  alternatives_spanish:
  - deposite
  - dé
  lexicon: BDAG
  rationale: τίθημι con ψυχή en Juan es la expresión idiomática de 'poner/entregar la vida'; 'ponga' suena natural y mantiene la idea de entrega voluntaria.
- source_word: ὑπὲρ
  english_pob_choice: for
  chosen_spanish: por
  alternatives_spanish:
  - en favor de
  - en lugar de
  - a favor de
  lexicon: BDAG
  rationale: '''Por'' es la preposición española más directa y abarca el valor benefactivo/representativo sin imponer una especificación doctrinal no exigida por la frase sola.'
- source_word: τῶν φίλων αὐτοῦ
  english_pob_choice: his friends
  chosen_spanish: sus amigos
  alternatives_spanish:
  - los amigos de él
  - los que son sus amigos
  lexicon: BDAG
  rationale: φίλος se traduce de forma estándar como 'amigo'; el posesivo español preserva la relación personal del griego.
theological_decisions:
- issue: Sentido de ψυχή en un dicho de autoentrega
  english_pob_reading: Translated as 'life' rather than 'soul.'
  chosen_spanish_reading: Traducido como 'vida' y no como 'alma'.
  alternative_spanish_readings:
  - alma
  - ser
  rationale: El contexto habla de entregar la existencia en muerte; 'vida' expresa mejor el sentido concreto de la autoentrega sin introducir una antropología que el verso no está desarrollando.
  doctrine_reference: Translation philosophy §1, §6
- issue: Fuerza de ὑπέρ en relación con el amor sacrificial
  english_pob_reading: Rendered simply as 'for' in the main text.
  chosen_spanish_reading: Traducido simplemente como 'por' en el texto principal.
  alternative_spanish_readings:
  - en favor de
  - en lugar de
  - por causa de
  rationale: La preposición puede abarcar beneficio y representación; 'por' conserva la amplitud semántica y deja abierta la resonancia sacrificial sin sobreinterpretarla en esta línea.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El precedente inglés revisó una formulación con 'a person... their' hacia 'someone... his' para corresponder de modo más formal al griego τις... αὐτοῦ y mantener registro. La presente versión española conserva ese valor genérico con 'alguien... su vida', sin marcar género.
  spanish_consistency_notes:
  - Se mantiene la elección de 'vida' para ψυχή, coherente con el auditorial inglés y con el contexto de muerte sacrificial.
  - Se usa 'por' para ὑπέρ, dejando sin explicitar una lectura de sustitución que el texto no impone por sí solo.
  - '''Amigos'' reproduce φίλοι de manera directa y natural en español; no se sustituye por ''prójimos'' ni otra categoría más amplia.'
