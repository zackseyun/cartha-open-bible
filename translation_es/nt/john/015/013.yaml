revisions:
- from: 'Nadie tiene amor mayor que este: que alguien ponga su vida por sus amigos[a][b][c][d].'
  to: 'Nadie tiene amor mayor que este: que alguien dé su vida por sus amigos[a][b][c].'
  rationale: Se revisa «ponga su vida» a «dé su vida» por ser la expresión española más natural y fiel para el giro sacrificial de este contexto joánico. Se eliminó la nota d porque era redundante y estaba mal categorizada; se conservaron las notas que sí preservan alternativas léxicas significativas del griego.
