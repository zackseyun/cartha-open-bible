  source_alignment_summary: 'El borrador español transmite bien el sentido básico del griego: nadie tiene un amor mayor, definido por entregar la vida por los amigos. Las decisiones clave están bien encaminadas: ἀγάπην = «amor», ψυχή = «vida», ὑπέρ = «por», φίλων = «amigos». También refleja adecuadamente el valor epexegético de ἵνα con «que». Sin embargo, «ponga su vida» es menos idiomático en este giro joánico que «dé su vida» o «entregue su vida», y la nota d no aporta variante real útil, sino que repite el texto principal.'
  spanish_quality_summary: El español es claro y legible, pero «poner la vida por» suena menos natural y menos establecido en español bíblico que «dar la vida por». Además, el demostrativo en «amor mayor que este» funciona, aunque «amor más grande que este» no sería necesario; la construcción actual es aceptable. Hay que reparar la nota d, que es redundante y además está clasificada como textual_variant sin base en la evidencia dada. Conviene conservar las notas útiles sobre sujeto indefinido, ψυχή y ὑπέρ.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen Yahvé, Mesías/Cristo, Espíritu, etc. La elección «vida» para ψυχή y «por» para ὑπέρ coincide con la racionalidad léxica y teológica documentada. El cambio recomendado a «dé su vida» mejora la fidelidad idiomática al giro τίθημι + ψυχή en español.
  issues:
  - severity: medium
    issue: «ponga su vida» suena poco idiomático en español para este giro
    rationale: Aunque puede defenderse literalmente desde τίθημι, en español bíblico y natural la expresión asentada para una entrega sacrificial es «dar la vida» o «entregar la vida». Esto preserva mejor el sentido joánico sin rigidez calca.
