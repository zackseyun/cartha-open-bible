translation:
  language: es
  text: Ya no los llamo esclavos[a], porque el esclavo no sabe qué está haciendo su amo[b]. Pero los he llamado amigos, porque todo lo que oí de parte de mi Padre se lo he dado a conocer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘siervos’. El griego doulos puede denotar un siervo o un esclavo; aquí se usa ‘esclavos’ porque el contraste destaca la subordinación más que el servicio.
    reason: lexical_alternative
  - marker: b
    text: Griego ‘κύριος’; aquí se traduce ‘amo’ porque el contexto es una analogía doméstica y de estatus, no un título divino o mesiánico.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐκέτι
  english_pob_choice: no longer
  chosen_spanish: ya no
  alternatives_spanish:
  - no lo hago más
  - no más
  lexicon: BDAG
  rationale: Expresa de forma natural en español la negación temporal de cambio de estado anterior, conservando el valor de 'no longer' sin volverse rígido.
- source_word: λέγω ὑμᾶς
  english_pob_choice: I call you
  chosen_spanish: los llamo
  alternatives_spanish:
  - les digo que son
  - los designo
  lexicon: BDAG
  rationale: En esta construcción, λέγω funciona como designar/llamar con complemento predicativo; 'los llamo' refleja ese uso idiomático mejor que 'les digo'.
- source_word: δούλους / δοῦλος
  english_pob_choice: slaves / the slave
  chosen_spanish: esclavos / el esclavo
  alternatives_spanish:
  - siervos / el siervo
  - criados / el criado
  lexicon: BDAG
  rationale: Se conserva la fuerza social de subordinación del término, que el contexto contrasta con 'amigos' y con la relación de dependencia frente al amo.
- source_word: οἶδεν τί ποιεῖ
  english_pob_choice: does not know what ... is doing
  chosen_spanish: no sabe qué está haciendo
  alternatives_spanish:
  - no sabe lo que hace
  - no comprende qué hace
  lexicon: BDAG
  rationale: El presente progresivo en español transmite adecuadamente la acción en curso de ποιεῖ sin perder el sentido de conocimiento de οἶδα.
- source_word: αὐτοῦ ὁ κύριος
  english_pob_choice: his master
  chosen_spanish: su amo
  alternatives_spanish:
  - su señor
  - su dueño
  lexicon: BDAG
  rationale: Aquí κύριος no funciona como título divino sino como término de la analogía amo-esclavo; 'amo' reproduce mejor la relación de dominio doméstico que 'señor'.
- source_word: εἴρηκα
  english_pob_choice: I have called
  chosen_spanish: los he llamado
  alternatives_spanish:
  - los llamé
  - he dicho de ustedes
  lexicon: BDAG
  rationale: El perfecto griego comunica una designación con vigencia presente; el perfecto español 'he llamado' preserva ese valor resultativo.
- source_word: φίλους
  english_pob_choice: friends
  chosen_spanish: amigos
  alternatives_spanish:
  - compañeros
  - amigos cercanos
  lexicon: BDAG
  rationale: Es el equivalente directo y natural en español, manteniendo el contraste con esclavos y la cercanía relacional que el contexto implica.
- source_word: πάντα ἃ
  english_pob_choice: everything that
  chosen_spanish: todo lo que
  alternatives_spanish:
  - todas las cosas que
  - todo cuanto
  lexicon: BDAG
  rationale: '''Todo lo que'' es la forma natural y completa en español para este relativo neutro plural con sentido comprehensivo.'
- source_word: ἤκουσα παρὰ τοῦ πατρός μου
  english_pob_choice: I heard from my Father
  chosen_spanish: oí de mi Padre
  alternatives_spanish:
  - escuché de mi Padre
  - recibí de mi Padre
  lexicon: BDAG
  rationale: '''Oí'' traduce con precisión ἤκουσα y mantiene la fuente indicada por παρά con genitivo; no se sustituye por ''recibí'' sin necesidad.'
- source_word: ἐγνώρισα ὑμῖν
  english_pob_choice: I have made known to you
  chosen_spanish: se lo he dado a conocer
  alternatives_spanish:
  - se lo he revelado
  - se lo he hecho saber
  lexicon: BDAG
  rationale: γνωρίζω significa hacer conocido o dar a conocer; la forma pronominal 'se lo he dado a conocer' conserva el objeto implícito de 'todo' y suena natural en español.
theological_decisions:
- issue: Rendering δοῦλος in a discipleship/status contrast
  english_pob_reading: slaves
  chosen_spanish_reading: esclavos
  alternative_spanish_readings:
  - siervos
  - bondsiervos
  rationale: La decisión mantiene la asimetría social y la dependencia total que el contraste con 'amigos' exige; 'siervos' suavizaría demasiado el término.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms table for δοῦλος
- issue: Rendering κύριος in a non-divine household analogy
  english_pob_reading: master
  chosen_spanish_reading: amo
  alternative_spanish_readings:
  - señor
  - dueño
  rationale: En este contexto, κύριος no es un título cristológico o divino, sino el superior en la relación amo-esclavo; 'amo' evita importar una lectura titular.
  doctrine_reference: DOCTRINE.md Contested terms table for κύριος; Translation philosophy §5
- issue: Aspect of εἴρηκα and ἐγνώρισα
  english_pob_reading: I have called ... I have made known
  chosen_spanish_reading: los he llamado ... se lo he dado a conocer
  alternative_spanish_readings:
  - los llamé ... se lo di a conocer
  - los llamo ... se lo doy a conocer
  rationale: El perfecto español preserva la fuerza resultativa del griego y el valor presente de la declaración de Jesús, evitando convertirlo en simple pasado.
  doctrine_reference: DOCTRINE.md Translation philosophy §6
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios; este borrador conserva esa lectura de alta concordancia con el texto fuente griego y con el audit trail en inglés.
  spanish_consistency_notes:
  - Se mantiene la distinción contextual entre 'esclavos' y 'amo', evitando el par tradicional 'siervos/señor' para no perder la fuerza de la analogía.
  - Se usa perfecto compuesto ('he llamado', 'he dado a conocer') para reflejar el valor resultativo del griego y la vigencia actual de la declaración.
  - '''Oí de mi Padre'' conserva la fuente expresa por παρά con genitivo sin ampliar a ''recibí''.'
