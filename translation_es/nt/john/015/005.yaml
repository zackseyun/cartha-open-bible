translation:
  language: es
  text: Yo soy la vid; ustedes son los sarmientos. El que permanece[a] en mí, y yo en él, ese da mucho fruto[b], porque aparte de mí no pueden hacer nada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «permanece en mí». El verbo griego también puede traducirse «permanece» o «habita», especialmente en Juan, para enfatizar la continuidad relacional.
    reason: lexical_alternative
  - marker: b
    text: El singular masculino «él» tiene fuerza representativa; la afirmación se aplica de manera general a cualquier discípulo que permanezca en Jesús.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄμπελος
  english_pob_choice: vine
  chosen_spanish: vid
  alternatives_spanish:
  - parra
  - vid de uva
  lexicon: BDAG
  rationale: En español, «vid» es el equivalente natural y tradicional para la metáfora de la planta de la vid; conserva la imagen agrícola sin añadir una explicación innecesaria. «Parra» puede sonar más concreta en algunos contextos, pero aquí «vid» es más directo y publicable.
- source_word: κλήματα
  english_pob_choice: branches
  chosen_spanish: sarmientos
  alternatives_spanish:
  - ramas
  - ramitas de la vid
  lexicon: BDAG
  rationale: Para κλήματα, «sarmientos» es el término español más preciso dentro de la metáfora vitícola. «Ramas» sería más general y perdería parte del valor específico del símil; «sarmientos» mantiene la relación orgánica con la vid.
- source_word: ὁ μένων
  english_pob_choice: the one who remains
  chosen_spanish: el que permanece
  alternatives_spanish:
  - el que se queda
  - el que abide
  lexicon: BDAG
  rationale: «Permanece» comunica bien la continuidad relacional de μένω en Juan y es idiomático en español. «Abide» no es natural; «se queda» es posible pero menos preciso para el valor durativo y relacional.
- source_word: ἐν ἐμοὶ ... ἐν αὐτῷ
  english_pob_choice: in me ... in him
  chosen_spanish: en mí ... en él
  alternatives_spanish:
  - conmigo ... con él
  lexicon: BDAG
  rationale: Se conserva «en» para mantener el lenguaje recíproco de unión mutua. «Con» debilitaría la fuerza teológica y relacional del griego.
- source_word: κἀγὼ
  english_pob_choice: and I
  chosen_spanish: y yo
  alternatives_spanish:
  - yo también
  lexicon: BDAG
  rationale: 'La forma contraída se vierte de manera directa como «y yo», que preserva la reciprocidad: el discípulo permanece en Jesús, y Jesús en él.'
- source_word: φέρει
  english_pob_choice: bears
  chosen_spanish: da
  alternatives_spanish:
  - produce
  - lleva
  lexicon: BDAG
  rationale: En español, «dar fruto» es la colocación más natural y estable para esta metáfora. «Lleva fruto» suena menos idiomático; «produce» es correcto pero algo más técnico.
- source_word: καρπὸν πολύν
  english_pob_choice: much fruit
  chosen_spanish: mucho fruto
  alternatives_spanish:
  - abundante fruto
  - muchos frutos
  lexicon: BDAG
  rationale: «Mucho fruto» reproduce la cuantificación idiomática del griego y la metáfora sin sobreinterpretarla. «Abundante fruto» sería una paráfrasis más explicativa.
- source_word: χωρὶς ἐμοῦ
  english_pob_choice: apart from me
  chosen_spanish: separados de mí
  alternatives_spanish:
  - sin mí
  - apartados de mí
  lexicon: BDAG
  rationale: Se opta por «separados de mí» para reflejar la idea de distancia/separación que χωρὶς puede tener en este contexto, y para hacer explícita la relación orgánica con la vid. «Sin mí» es posible, pero puede sonar más general; «apartados de mí» resulta menos natural en español.
- source_word: οὐ δύνασθε
  english_pob_choice: you are not able
  chosen_spanish: no pueden
  alternatives_spanish:
  - no son capaces de
  - no pueden lograr
  lexicon: BDAG
  rationale: El griego expresa incapacidad, y en español «no pueden» comunica con claridad esa imposibilidad. Aunque la forma pasa a una construcción impersonal de tratamiento general, el sentido sigue siendo el de incapacidad real.
- source_word: ποιεῖν οὐδέν
  english_pob_choice: to do anything
  chosen_spanish: hacer nada
  alternatives_spanish:
  - hacer algo
  - hacer cosa alguna
  lexicon: BDAG
  rationale: La negación griega se vierte de forma natural como «hacer nada» en español. Esta opción expresa la imposibilidad total sin introducir un doble negativo torpe.
theological_decisions:
- issue: Unión mutua y permanencia en Juan
  english_pob_reading: Retain 'remains in me, and I in him' with the preposition 'in' rather than weakening to 'with.'
  chosen_spanish_reading: Mantener «en mí ... en él» y «permanece» para preservar la unión recíproca y duradera.
  alternative_spanish_readings:
  - conmigo ... con él
  - se mantiene cerca de mí
  rationale: El pasaje no habla solo de cercanía, sino de permanencia relacional mutua. Conservar «en» y «permanece» mantiene la tensión teológica del texto sin resolverla ni diluirla.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it
- issue: Pronombre masculino singular αὐτῷ con fuerza representativa
  english_pob_reading: Render as 'him' in the main text.
  chosen_spanish_reading: Conservar «él» en el texto principal.
  alternative_spanish_readings:
  - esa persona
  - ellos
  rationale: El griego usa un masculino singular representativo; el español puede reflejarlo con «él» sin perder inteligibilidad. Una neutralización al plural o a una paráfrasis impersonal borraría esa precisión gramatical.
  doctrine_reference: Translation philosophy §4 Gender-accurate over gender-neutral
translation_notes:
  revision_awareness: Se cotejó el borrador con el texto griego SBLGNT, la traducción inglesa POB y sus notas. No se detectaron revisiones posteriores que exigieran cambios; el último pase aparece como sin cambios. Se mantuvieron las decisiones ya auditadas sobre μένω/«permanecer», χωρὶς/«separados de», y el masculino singular representativo.
  spanish_consistency_notes:
  - 'Se conservó la metáfora vitícola con términos específicos y naturales en español: «vid» / «sarmientos».'
  - Se mantuvo el paralelismo mutuo con «en mí ... en él» para no suavizar la unión recíproca.
  - Se eligió la formulación idiomática «dar mucho fruto» / «hacer nada» para sonar natural sin perder el sentido del griego.
  - Se evitó «Cristo» porque el texto dice Ἰησοῦς implícitamente en el contexto inmediato y aquí no aparece el título Χριστός.
  - Se siguió el tratamiento de segunda persona plural «ustedes» para el discurso directo en español contemporáneo y reverente.
