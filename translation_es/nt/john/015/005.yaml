  source_alignment_summary: 'El borrador refleja bien el sentido del griego: mantiene la metáfora de la vid, la permanencia recíproca «en mí ... en él», el fruto abundante y la incapacidad total aparte de Jesús. También preserva correctamente el masculino singular representativo con nota. Sin embargo, la nota [a] está mal anclada: el marcador aparece en «vid», pero el contenido de la nota trata del verbo μένω / «permanece», no de ἄμπελος / «vid».'
  spanish_quality_summary: El español es claro, digno y publicable. «Vid» y «sarmientos» son buenas elecciones; «da mucho fruto» es idiomático. No obstante, «separados de mí» suena un poco más interpretativo y adjetival que el griego/preferencias POB; «apartados de mí» o «aparte de mí» preserva mejor la idea de separación sin introducir un estado descriptivo añadido. Además, debe corregirse la ubicación de la nota [a].
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. Las decisiones clave concuerdan con el rastro POB: «vid», «permanece», «en mí ... en él», y el masculino singular representativo. La única corrección léxica recomendada es ajustar «separados de mí» a «aparte de mí» para alinearse mejor con χωρὶς ἐμοῦ y con la rationale auditada de ‘apart from me’.'
  issues:
