    issue: La nota [a] está anclada a «vid», pero explica «permanece en mí».
    rationale: Esto rompe la correspondencia exigida entre marcador en el texto y contenido de la nota. La nota debe ir junto a «permanece» o eliminarse.
  - severity: low
    issue: «separados de mí» añade un matiz algo más interpretativo que χωρὶς ἐμοῦ.
    rationale: El griego expresa separación/apartamiento respecto de Jesús, no necesariamente el estado adjetival «separados». «Aparte de mí» suena más directo y fiel al audit trail inglés.
  - severity: low
