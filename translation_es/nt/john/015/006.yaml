translation:
  language: es
  text: Si alguien no permanece en mí[a], es echado fuera como la rama y se seca; y las recogen y las echan al fuego[b], y son quemadas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «permanezca en mí». El verbo griego también puede traducirse «permanecer» o, en una forma más tradicional, «morar». Aquí «permanece» conserva con claridad moderna el sentido de continuidad relacional de este término clave en Juan.
    reason: lexical_alternative
  - marker: b
    text: La imagen advierte exclusión y quema, pero el versículo no especifica por sí mismo si describe la pérdida de un discipulado genuino o la exposición de una adhesión falsa.
    reason: alternative_reading
lexical_decisions:
- source_word: μένῃ
  english_pob_choice: remain
  chosen_spanish: permanece
  alternatives_spanish:
  - permanece
  - permanezca
  - habita
  lexicon: BDAG
  rationale: μένω es un término clave en Juan para continuidad relacional. En español, «permanecer» conserva esa continuidad sin caer en el arcaísmo de «abide» ni en una paráfrasis más débil como «estar». Se mantiene el valor aspectual de duración.
- source_word: ἐν ἐμοί
  english_pob_choice: in me
  chosen_spanish: en mí
  alternatives_spanish:
  - conmigo
  - unido a mí
  lexicon: BDAG
  rationale: Se conserva literalmente «en mí» para retener la fuerza relacional y teológica de unión/continuidad con Jesús, sin explicitarla como «unido a mí».
- source_word: ἐβλήθη ἔξω
  english_pob_choice: is thrown out
  chosen_spanish: es echado fuera
  alternatives_spanish:
  - es arrojado fuera
  - es expulsado
  lexicon: BDAG
  rationale: La pasiva aorista se vierte con pasiva española natural. «Echado fuera» mantiene la concreción de la imagen y evita una formulación demasiado técnica o abstracta.
- source_word: ὡς τὸ κλῆμα
  english_pob_choice: like the branch
  chosen_spanish: como la rama
  alternatives_spanish:
  - como el sarmiento
  - como la rama de la vid
  lexicon: BDAG
  rationale: κλῆμα designa una rama o sarmiento de vid. «Rama» es claro y natural en español; «sarmiento» sería más técnico pero menos transparente para lectura pública. Se evita añadir «de la vid» porque el contexto inmediato ya sostiene la metáfora.
- source_word: ἐξηράνθη
  english_pob_choice: dries up
  chosen_spanish: se seca
  alternatives_spanish:
  - se marchita
  - se ha secado
  lexicon: BDAG
  rationale: El verbo expresa volverse seco. «Se seca» comunica la imagen de desecación de manera natural y directa en español, sin cargar la imagen con una interpretación más marcada que «marchita».
- source_word: συνάγουσιν
  english_pob_choice: they gather
  chosen_spanish: los recogen
  alternatives_spanish:
  - los juntan
  - los reúnen
  lexicon: BDAG
  rationale: El sujeto es indefinido. En español, «los recogen» suena natural con objetos múltiples y mantiene la indefinición del agente.
- source_word: αὐτὰ
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - las
  - los
  lexicon: BDAG
  rationale: El pronombre neutro plural se refiere a las ramas en conjunto. En español se usa «los» como referencia plural genérica concordante con el objeto directo animado/no animado en estilo bíblico estándar.
- source_word: εἰς τὸ πῦρ βάλλουσιν
  english_pob_choice: throw them into the fire
  chosen_spanish: los echan al fuego
  alternatives_spanish:
  - los arrojan al fuego
  - los tiran al fuego
  lexicon: BDAG
  rationale: Se conserva la imagen de movimiento hacia el fuego con un verbo natural en español. «Al fuego» transmite la dirección sin añadir matiz innecesario.
- source_word: καίεται
  english_pob_choice: they are burned
  chosen_spanish: son quemados
  alternatives_spanish:
  - se queman
  - quedan quemados
  lexicon: BDAG
  rationale: El griego presenta una forma pasiva singular que, por el plural precedente y el referente colectivo, se entiende naturalmente en español como plural. «Son quemados» refleja mejor la pasiva y la revisión del POB en inglés que corrigió la lectura a plural.
theological_decisions:
- issue: 'El alcance de la advertencia: pérdida de salvación, discipulado meramente aparente, o advertencia metafórica sin resolución doctrinal'
  english_pob_reading: A direct metaphorical warning without interpretive expansion
  chosen_spanish_reading: Una advertencia metafórica directa, sin expansión interpretativa
  alternative_spanish_readings:
  - Una advertencia sobre creyentes verdaderos que caen
  - Una advertencia sobre discípulos nominales que nunca estuvieron realmente unidos a Jesús
  rationale: El versículo usa la imagen de la rama y lenguaje de juicio, pero no resuelve por sí mismo debates doctrinales posteriores. La traducción conserva la fuerza de la advertencia sin imponer una conclusión denominacional.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del texto inglés POB: la cláusula final pasó de una lectura singular («it burns») a una plural («they are burned») para reflejar mejor el sujeto plural de las ramas recogidas y la forma verbal griega. La traducción española sigue esa corrección con «son quemados».'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exigiría explícitamente; aquí no aparece el Tetragrámaton.
  - Se mantiene «en mí» para conservar la relación con Jesús sin sustituirla por una paráfrasis.
  - Se evita «Cristo» porque el verso no contiene Χριστός ni una fórmula litúrgica fija.
  - «Rama» se prefiere a «sarmiento» por claridad pública, aunque la imagen sigue siendo claramente la de la vid.
  - 'La pasiva española se conserva donde el griego enfatiza la acción recibida: «es echado fuera», «son quemados».'
