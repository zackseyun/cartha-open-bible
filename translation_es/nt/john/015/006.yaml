review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del griego: mantiene la condición general («Si alguien no permanece en mí»), la imagen de ser echado fuera como rama, secarse, ser recogidos y echados al fuego. También conserva adecuadamente la tensión teológica sin resolver debates doctrinales. Sin embargo, hay dos desajustes importantes: (1) la nota [a] introduce erróneamente el inglés «abide» en una nota española, cuando la alternativa tradicional española correspondiente sería «permanezca» o, si se quiere mencionar tradición bíblica, «more»/«permanezca» según contexto; (2) «los recogen / los echan / son quemados» pierde naturalidad y concordancia metafórica en español porque el antecedente expreso es «la rama», por lo que la serie plural suena abrupta. Conviene usar «las recogen / las echan / son quemadas» para concordar con «ramas» implícitas en el plural genérico de αὐτά.'
  spanish_quality_summary: 'El texto es generalmente claro y digno, pero presenta una aspereza de lectura en la secuencia pronominal masculina plural tras «la rama». En español bíblico-natural, al retomarse ramas implícitas, la concordancia femenina plural mejora mucho la legibilidad: «las recogen... las echan... son quemadas». Además, la nota [a] debe estar en español idiomático y no citar «abide» como si fuera alternativa española.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «permanece», «en mí», «al fuego» y el tratamiento no interpretativo del juicio están bien alineados. La principal corrección léxica/documental es ajustar la nota alternativa de μένῃ para que refleje una alternativa española real y no un anglicismo metalingüístico innecesario.
  issues:
  - severity: medium
    issue: La nota [a] menciona «abide» como si fuera alternativa en español.
    rationale: La nota debe explicar alternativas léxicas en español. «Abide» es inglés y resulta impropio en una edición española. El inglés POB documenta una alternativa inglesa; aquí corresponde trasladar la rationale, no copiar el término inglés.
  - severity: medium
    issue: 'Discordancia pronominal poco natural: «la rama ... los recogen ... los echan ... son quemados».'
    rationale: Aunque αὐτά es neutro plural en griego, en español el referente metafórico recuperable son «las ramas». El masculino plural genérico aquí suena torpe y menos claro. «Las» mejora la cohesión y la legibilidad sin alterar el sentido.
  revised_spanish_text: Si alguien no permanece en mí[a], es echado fuera como la rama y se seca; y las recogen y las echan al fuego[b], y son quemadas.
  revised_footnotes:
