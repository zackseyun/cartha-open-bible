translation:
  language: es
  text: 'Este es mi mandamiento: que se amen unos a otros, así como yo los he amado[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Este es mi mandamiento: que se amen unos a otros, como yo los amé».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Αὕτη
  english_pob_choice: This
  chosen_spanish: Este
  alternatives_spanish:
  - Esto
  lexicon: BDAG
  rationale: El demostrativo introduce e identifica el mandamiento concreto. En español, «Este es...» reproduce con naturalidad la fuerza deíctica y mantiene un tono directo y solemne.
- source_word: ἐντολή
  english_pob_choice: command
  chosen_spanish: mandamiento
  alternatives_spanish:
  - mandato
  - comando
  lexicon: BDAG
  rationale: «Mandamiento» conserva el valor de precepto autoritativo y enlaza bien con el habla bíblica en español, sin perder claridad moderna. Frente a «mandato», suena más bíblico y menos jurídico-administrativo.
- source_word: ἡ ἐμὴ
  english_pob_choice: my
  chosen_spanish: mi
  alternatives_spanish:
  - mío
  lexicon: BDAG
  rationale: La posesión se expresa de forma idiomática con «mi». Mantiene la referencia personal a Jesús y la autoridad del precepto.
- source_word: ἵνα
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - para que
  - a fin de que
  lexicon: BDAG
  rationale: 'Aquí introduce el contenido del mandamiento, no un propósito separado. «Que» permite una formulación natural en español: «Este es mi mandamiento: que...».'
- source_word: ἀγαπᾶτε
  english_pob_choice: love
  chosen_spanish: se amen
  alternatives_spanish:
  - amen
  - estén amándose
  lexicon: BDAG
  rationale: Se traduce con el cognado «amar» para preservar la continuidad léxica de ἀγαπάω/ἀγάπη. Se opta por la forma reflexiva «se amen» porque ἀλλήλους exige reciprocidad explícita en español natural.
- source_word: ἀλλήλους
  english_pob_choice: one another
  chosen_spanish: unos a otros
  alternatives_spanish:
  - entre sí
  - los unos a los otros
  lexicon: BDAG
  rationale: «Unos a otros» expresa con claridad la relación recíproca entre los discípulos y evita una repetición menos fluida en español.
- source_word: καθὼς
  english_pob_choice: just as
  chosen_spanish: así como
  alternatives_spanish:
  - como
  - del mismo modo que
  lexicon: BDAG
  rationale: «Así como» marca tanto comparación como modelo. Preserva la fuerza normativa del amor de Jesús como patrón para el amor mutuo.
- source_word: ἠγάπησα
  english_pob_choice: I have loved
  chosen_spanish: yo los he amado
  alternatives_spanish:
  - yo los amé
  - los amé
  lexicon: BDAG
  rationale: El aoristo se vierte con perfecto compuesto para expresar una acción pasada con relevancia presente dentro del discurso. Se conserva el vínculo entre el amor ya mostrado por Jesús y su vigencia como modelo.
- source_word: ὑμᾶς
  english_pob_choice: you
  chosen_spanish: los
  alternatives_spanish:
  - les
  - ustedes
  lexicon: BDAG
  rationale: El objeto directo plural se expresa con «los» por concordancia natural con «se amen» y por claridad referencial a los discípulos. Se omite el pronombre explícito final porque el español no lo requiere para la comprensión.
theological_decisions:
- issue: ἀγαπάω / ἀγάπη language
  english_pob_reading: love
  chosen_spanish_reading: amar
  alternative_spanish_readings:
  - caridad
  - querer
  rationale: Se preserva el eje léxico de «amor/amar» en vez de «caridad», que en español suena más restringido o eclesiástico. «Amar» mantiene continuidad bíblica y evita suavizar el mandato.
  doctrine_reference: 'DOCTRINE.md Contested terms: ἀγάπη → love'
- issue: Forma del mandamiento recíproco
  english_pob_reading: 'This is my command: that you love one another just as I have loved you.'
  chosen_spanish_reading: 'Este es mi mandamiento: que se amen unos a otros, así como yo los he amado.'
  alternative_spanish_readings:
  - 'Este es mi mandamiento: que se amen entre ustedes, como yo los he amado.'
  - Este es mi mandamiento, que se amen unos a otros, como yo los he amado.
  rationale: 'La versión mantiene la autoridad imperativa de Jesús y la estructura de modelo: el amor entre discípulos debe conformarse al amor previo de Jesús. «Así como» conserva mejor la medida ejemplar que un simple «como».'
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; readable modern Spanish'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta que la revisión inglesa reciente no cambió el contenido: el texto final mantiene la misma lectura semántica y la misma alternativa léxica documentada para ἐντολή/commandment y ἠγάπησα/I have loved.'
  spanish_consistency_notes:
  - Se mantiene «mandamiento» como término consistente para ἐντολή, en línea con la decisión inglesa de evitar la rigidez de «commandment» pero conservando la fuerza preceptiva.
  - Se usa «amar» para ἀγαπάω, preservando la continuidad con el léxico bíblico del amor sin introducir «caridad».
  - La secuencia «se amen unos a otros» refleja reciprocidad explícita y se adapta mejor al español que una traducción palabra por palabra del griego.
  - El pronombre objeto directo se integra en la conjugación («los he amado») para una lectura natural y pública en español.
