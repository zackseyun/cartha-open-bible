  - severity: medium
    issue: «Lleven fruto» suena menos natural que «den fruto» para καρπὸν φέρητε
    rationale: En español bíblico y natural, «dar fruto» es la colocación idiomática más clara para esta metáfora joánica. «Llevar fruto» existe, pero aquí suena más calcado y menos fluido.
  - severity: low
    issue: Nota b mal formulada
    rationale: La nota ofrece como alternativa «permanezca» cuando esa misma forma ya está en el texto principal, y además mezcla innecesariamente el inglés «abide». Debe presentar una alternativa real y explicar el matiz joánico.
  - severity: low
    issue: «Él se lo dé a ustedes» es menos fluido que «él les dé»
    rationale: El objeto de «dar» queda suficientemente implícito en «todo lo que pidan»; «él les dé» preserva mejor la naturalidad sin pérdida de sentido.
