translation:
  language: es
  text: No fueron ustedes los que me escogieron[a], sino que yo los escogí a ustedes y los designé para que vayan y den fruto, y para que su fruto permanezca[b], de modo que todo lo que pidan al Padre en mi nombre[c], él les dé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «me eligieron / los elegí»; el verbo también puede traducirse «seleccionar». Aquí se prefiere «escoger» porque expresa bien el contraste personal e inmediato sin introducir terminología teológica posterior en el texto principal.
    reason: lexical_alternative
  - marker: b
    text: O «continúe». Juan usa con frecuencia este verbo para expresar continuidad relacional o duración en el tiempo; aquí «permanezca» conserva bien ese matiz en español moderno.
    reason: lexical_alternative
  - marker: c
    text: El griego dice «el Padre», no «mi Padre».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξελέξασθε / ἐξελεξάμην
  english_pob_choice: choose / chose
  chosen_spanish: escoger / escogí
  alternatives_spanish:
  - seleccionar / seleccioné
  - elegir / elegí
  lexicon: BDAG
  rationale: ἐκλέγομαι significa escoger o seleccionar. En español, «escoger» transmite bien la elección personal y relacional del pasaje sin cargar el texto con terminología técnica posterior. «Elegir» también es posible, pero «escoger» funciona con más naturalidad en este contexto.
- source_word: ἔθηκα
  english_pob_choice: appointed
  chosen_spanish: los designé
  alternatives_spanish:
  - los puse
  - los establecí
  lexicon: BDAG
  rationale: τίθημι es literalmente poner o colocar, pero aquí expresa asignación con propósito. «Designé» comunica con claridad la idea de comisión o nombramiento para una tarea, manteniendo la fuerza intencional del verbo en el contexto inmediato de ir y dar fruto.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: La conjunción introduce cláusulas de propósito. «Para que» es la forma más natural y clara en español para expresar ese valor final sin perder la estructura del griego.
- source_word: ὑπάγητε
  english_pob_choice: go
  chosen_spanish: vayan
  alternatives_spanish:
  - salgan
  - vayan y salgan
  lexicon: BDAG
  rationale: ὑπάγω puede significar ir, salir o retirarse. Aquí el sentido es de moverse con propósito en misión; «vayan» es breve, idiomático y suficientemente amplio para el contexto.
- source_word: καρπὸν φέρητε
  english_pob_choice: bear fruit
  chosen_spanish: lleven fruto
  alternatives_spanish:
  - produzcan fruto
  - den fruto
  lexicon: BDAG
  rationale: La metáfora de fruto es central en Juan. «Lleven fruto» conserva la imagen verbal y suena natural en español; «den fruto» también sería posible, pero «lleven fruto» sigue mejor la idea de portar o presentar fruto como resultado de la misión.
- source_word: μένῃ
  english_pob_choice: remain
  chosen_spanish: permanezca
  alternatives_spanish:
  - se quede
  - permanezca en pie
  - continúe
  lexicon: BDAG
  rationale: μένω es un término clave en Juan. «Permanezca» mantiene esa consistencia léxica y expresa continuidad sin recurrir a un calco extraño. «Permanezca» funciona bien tanto para duración como para persistencia relacional.
- source_word: ὅ τι ἂν αἰτήσητε
  english_pob_choice: whatever you ask
  chosen_spanish: todo lo que pidan
  alternatives_spanish:
  - cualquier cosa que pidan
  - lo que sea que pidan
  lexicon: BDAG
  rationale: La construcción con ἄν amplía la referencia de modo indefinido. En español, «todo lo que pidan» comunica esa amplitud de manera fluida y natural en un contexto de oración. «Pidan» corresponde bien a αἰτέω en este marco.
- source_word: ἐν τῷ ὀνόματί μου
  english_pob_choice: in my name
  chosen_spanish: en mi nombre
  alternatives_spanish:
  - por mi nombre
  - en unión con mi nombre
  lexicon: BDAG
  rationale: La forma estable y más fiel en español es «en mi nombre». Conserva la fuerza relacional y teológica de la expresión sin sobreexplicarla en el texto principal.
- source_word: δῷ
  english_pob_choice: he may give
  chosen_spanish: él se lo dé
  alternatives_spanish:
  - él les dé
  - él pueda dárselo
  lexicon: BDAG
  rationale: El subjuntivo en la cláusula final se refleja naturalmente con «se lo dé». Esta forma suena bien en español y mantiene el matiz de propósito/resulto sin convertirlo en una promesa simple de futuro.
- source_word: τὸν πατέρα
  english_pob_choice: the Father
  chosen_spanish: al Padre
  alternatives_spanish:
  - a mi Padre
  - al Padre de ustedes
  lexicon: BDAG
  rationale: El griego dice «el Padre», no «mi Padre». «Al Padre» preserva el artículo sin añadir un posesivo que no está en el texto. En español, el contexto deja claro a quién se refiere.
theological_decisions:
- issue: Posible sobrelectura doctrinal de ἐξελεξάμην en clave de elección técnica
  english_pob_reading: Rendered as 'I chose you' in the immediate discipleship/mission context without importing a technical doctrine of election into the translation.
  chosen_spanish_reading: Traducido como «yo los escogí» en el marco inmediato de discipulado y misión, sin convertirlo en una formulación técnica de elección soteriológica.
  alternative_spanish_readings:
  - «yo los elegí» para subrayar la iniciativa divina
  - «yo los predestiné» para una lectura más doctrinal
  rationale: El verbo expresa iniciativa divina real, pero el contexto inmediato habla de envío, fruto y oración. La traducción debe conservar esa tensión sin imponer una categoría sistemática ajena al enunciado mismo.
  doctrine_reference: Affirmations; Translation philosophy items 1 and 3
- issue: Sentido de ἔθηκα ὑμᾶς
  english_pob_reading: Understood as appointment/commissioning to mission and fruit-bearing.
  chosen_spanish_reading: Entendido como designación o comisión para la misión y para dar fruto.
  alternative_spanish_readings:
  - «los puse» en sentido más literal
  - «los ordené» en sentido eclesial más específico
  rationale: 'El contexto inmediato define la finalidad: ir, llevar fruto y permanecer. «Los designé» comunica esa asignación de propósito sin reducirla a un cargo eclesial ni perder la idea de encargo.'
  doctrine_reference: Translation philosophy items 1 and 6
- issue: Fuerza de la cláusula final con ἵνα
  english_pob_reading: 'Translated as a purpose/result clause: ''so that whatever you ask the Father in my name, he may give you.'''
  chosen_spanish_reading: 'Traducido como cláusula de propósito o resultado: «de modo que todo lo que pidan al Padre en mi nombre, él se lo dé a ustedes».'
  alternative_spanish_readings:
  - «para que todo lo que pidan... él les dará» con futuro más fuerte
  - «a fin de que... él pueda dárselo»
  rationale: La sintaxis griega mantiene la promesa ligada a la misión y al fruto. «De modo que» conserva bien el enlace lógico y evita endurecer el matiz del subjuntivo como si fuera un simple futuro independiente.
  doctrine_reference: Translation philosophy items 1 and 3
translation_notes:
  revision_awareness: El texto griego, la traducción inglesa POB y las notas de auditoría muestran alta concordancia. Se mantuvo la decisión de no importar una terminología doctrinal técnica a ἐκλέγομαι, se preservó el matiz final de ἵνα con subjuntivo, y se respetó la lectura de τὸν πατέρα como «el Padre».
  spanish_consistency_notes:
  - Se usó «escogí/escogieron» para ἐκλέγομαι, manteniendo consistencia con la decisión inglesa de choose/chose.
  - Se tradujo μένω como «permanecer» para sostener la redacción joánica habitual.
  - Se evitó «SEÑOR» o «Cristo» porque no aparecen en este verso y no corresponden al contenido auditado.
  - Se mantuvo el pronombre objeto explícito «se lo» para reflejar con naturalidad la referencia a lo pedido y lo dado dentro de la oración.
  - La puntuación sigue el español moderno y conserva la estructura paralela del original griego.
