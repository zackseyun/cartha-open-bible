review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la estructura y el sentido general del griego: contraste de elección, nombramiento con propósito, fruto perdurable y petición al Padre en el nombre de Jesús. Sin embargo, hay una inconsistencia importante entre el texto principal y las decisiones léxicas/nota en ἐξελέξασθε / ἐξελεξάμην: el texto usa «eligieron / elegí», mientras que la nota y la documentación afirman preferir «escogí». Además, «lleven fruto» es menos idiomático que «den fruto» para καρπὸν φέρητε en este contexto joánico, y la nota b es defectuosa porque ofrece «permanezca» como alternativa de un texto que ya dice «permanezca».'
  spanish_quality_summary: El español es claro y digno, pero requiere pulido menor para mayor naturalidad y consistencia documental. «No fueron ustedes los que...» suena bien. «Los designé» funciona para ἔθηκα. «Vayan y den fruto» es más natural y eclesialmente legible que «vayan y lleven fruto». La secuencia final con «él se lo dé a ustedes» es gramatical, pero «él les dé» es más fluida y evita un objeto directo implícito innecesariamente pesado.
  glossary_alignment: 'No hay conflicto con la terminología teológica de proyecto. El único desajuste serio es interno: la entrada léxica y la nota justifican «escoger», pero el texto principal usa «elegir». También conviene corregir la nota b para que la alternativa real sea «permanezca / permanezca firme / dure» o mejor «permanezca / continúe», ya que actualmente se glosa con el inglés «abide» y repite la forma principal.'
