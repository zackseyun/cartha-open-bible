revisions:
- from: No fueron ustedes los que me eligieron[a], sino que yo los elegí a ustedes y los designé para que vayan y lleven fruto, y para que su fruto permanezca, de modo que todo lo que pidan al Padre en mi nombre[c][b], él se lo dé a ustedes.
  to: No fueron ustedes los que me escogieron[a], sino que yo los escogí a ustedes y los designé para que vayan y den fruto, y para que su fruto permanezca[b], de modo que todo lo que pidan al Padre en mi nombre[c], él les dé.
  rationale: La revisión mantiene el sentido del original y del POB inglés, pero corrige inconsistencias editoriales y mejora la naturalidad del español. Se unifica ἐκλέγομαι con «escoger» para concordar con la justificación léxica; se cambia «lleven fruto» por «den fruto» por idiomaticidad; se simplifica la cláusula final a «él les dé»; y se corrige la nota b para que ofrezca una alternativa real y una explicación clara.
  reviewer_model: gpt-5.4
