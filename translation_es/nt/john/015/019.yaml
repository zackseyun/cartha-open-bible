translation:
  language: es
  text: Si fuerais del mundo[a], el mundo amaría lo suyo. Pero como no sois del mundo, sino que yo os escogí de en medio del mundo, por eso el mundo os odia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «del mundo» en sentido de pertenencia; en el griego ἐκ τοῦ κόσμου la preposición puede expresar fuente o pertenencia. El texto principal conserva visible la repetición de la expresión.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκ τοῦ κόσμου
  english_pob_choice: from the world
  chosen_spanish: del mundo
  alternatives_spanish:
  - de el mundo
  - procedentes del mundo
  lexicon: BDAG
  rationale: En español, la preposición natural con pertenencia o procedencia es «de», contraída en «del». Conserva la repetición visible de ἐκ τοῦ κόσμου sin forzar una perífrasis. La nota explica que el griego permite tanto fuente como pertenencia.
- source_word: κόσμος
  english_pob_choice: world
  chosen_spanish: mundo
  alternatives_spanish:
  - sistema del mundo
  - orden del mundo
  lexicon: BDAG
  rationale: «Mundo» es el equivalente español estándar y mantiene la amplitud teológica joánica. «Sistema del mundo» sería interpretativo y restringiría indebidamente el alcance del término.
- source_word: ἂν ... ἐφίλει
  english_pob_choice: would love
  chosen_spanish: amaría
  alternatives_spanish:
  - estaría amando
  - tendría cariño por
  lexicon: BDAG
  rationale: El condicional contrafactual del griego se expresa naturalmente en español con el condicional simple. «Amaría» mantiene la fuerza de resultado hipotético sin sobreexplicar el tiempo verbal.
- source_word: τὸ ἴδιον
  english_pob_choice: its own
  chosen_spanish: lo suyo
  alternatives_spanish:
  - lo propio
  - sus propios
  lexicon: BDAG
  rationale: La construcción neutra con artículo pide en español una forma sustantivada. «Lo suyo» es idiomático, conciso y conserva la idea de pertenencia sin añadir un objeto explícito que el griego no menciona.
- source_word: φιλέω
  english_pob_choice: love
  chosen_spanish: amar
  alternatives_spanish:
  - tener afecto por
  - querer
  lexicon: BDAG
  rationale: Aunque φιλέω puede sugerir afecto o amistad, en este contraste con μισέω resulta más fuerte y claro traducir «amar». Así se preserva el paralelo semántico con «odia».
- source_word: ὅτι δὲ
  english_pob_choice: But because
  chosen_spanish: Pero porque
  alternatives_spanish:
  - Pero como
  - Sin embargo, porque
  lexicon: BDAG
  rationale: La secuencia introduce una explicación contrastiva. «Pero porque» refleja tanto el valor adversativo de δέ como la causalidad de ὅτι con naturalidad en español.
- source_word: ἐξελεξάμην
  english_pob_choice: I chose
  chosen_spanish: escogí
  alternatives_spanish:
  - elegí
  - me escogí
  lexicon: BDAG
  rationale: El aoristo medio de ἐκλέγομαι se traduce con un verbo simple y natural. «Escogí» conserva la elección personal de Jesús sin añadir explicitaciones doctrinales al medio griego.
- source_word: ἐκ τοῦ κόσμου
  english_pob_choice: out of the world
  chosen_spanish: del mundo
  alternatives_spanish:
  - fuera del mundo
  - de en medio del mundo
  lexicon: BDAG
  rationale: Con ἐξελεξάμην, el griego enfatiza separación/procedencia. En español, «del mundo» mantiene el vínculo con la expresión previa y permite que la idea de separación la aporte el contexto verbal, no una expansión innecesaria.
- source_word: διὰ τοῦτο
  english_pob_choice: for this reason
  chosen_spanish: por eso
  alternatives_spanish:
  - por esta razón
  - por lo tanto
  lexicon: BDAG
  rationale: «Por eso» es una forma natural y directa de expresar la relación causal. Mantiene la fuerza del antecedente sin volver la frase más pesada de lo necesario.
- source_word: μισεῖ
  english_pob_choice: hates
  chosen_spanish: odia
  alternatives_spanish:
  - aborrece
  - detesta
  lexicon: BDAG
  rationale: «Odia» comunica con claridad la oposición fuerte de μισέω y conserva el contraste con «amaría». «Aborrece» sería más marcado y menos neutral en español actual.
theological_decisions:
- issue: Sentido de «el mundo» en Juan
  english_pob_reading: Retain 'world' in the main text without interpretive expansion.
  chosen_spanish_reading: Mantener «mundo» sin glosa interpretativa en el cuerpo del texto.
  alternative_spanish_readings:
  - sistema del mundo
  - sociedad humana opuesta a Dios
  rationale: El cuarto joánico de «mundo» es una categoría teológica amplia. Traducirlo simplemente como «mundo» conserva la tensión del pasaje sin imponer una explicación doctrinal que el versículo no desarrolla.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: La elección de los discípulos en ἐξελεξάμην
  english_pob_reading: Translate straightforwardly as 'I chose you out of the world' without importing a denominational doctrine of election.
  chosen_spanish_reading: Traducir de forma directa «yo os escogí del mundo», sin cargar el verbo con una doctrina sistemática posterior.
  alternative_spanish_readings:
  - yo os predestiné
  - yo os elegí para mí
  rationale: El versículo afirma una elección real de Jesús, pero no obliga a resolver debates posteriores sobre predestinación. La versión española mantiene la afirmación bíblica con sobriedad.
  doctrine_reference: Affirmations paragraph 2; Translation philosophy §3
translation_notes:
  revision_awareness: No se detectaron revisiones aplicadas en el expediente inglés; la lectura actual quedó marcada como unchanged en la última pasada, con acuerdo alto y solo observaciones menores.
  spanish_consistency_notes:
  - Se preservó «mundo» de manera uniforme para κόσμος.
  - Se usó «escogí» para ἐξελεξάμην, coherente con el valor verbal documentado en el audit trail.
  - La relación causal de διὰ τοῦτο quedó en «por eso», una formulación natural y fiel.
  - Se mantuvo el contraste léxico «amaría / odia» para reflejar φιλέω frente a μισέω.
