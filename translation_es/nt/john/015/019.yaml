review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: condición contraria al hecho, contraste causal, elección de Jesús y odio del mundo. Sin embargo, hay dos puntos que requieren ajuste para mayor fidelidad al audit trail y mejor español: (1) «Pero porque» suena poco natural en español bíblico actual; «Pero como» o «Pero dado que» expresa mejor ὅτι δὲ con contraste explicativo. (2) La nota al pie dice «de el mundo», forma incorrecta en español; debe ser «del mundo». Además, con ἐξελεξάμην ἐκ τοῦ κόσμου conviene «de en medio del mundo» para reflejar mejor el matiz de separación que el English POB documentó como contextual.'
  spanish_quality_summary: El texto es legible, digno y mayormente natural. «Si fuerais» funciona, aunque «Si fueran del mundo» podría sonar más común en muchos registros; no es necesario cambiarlo. «Lo suyo» es buena solución para τὸ ἴδιον. Los problemas principales son la torpeza de «Pero porque» y la incorrección gramatical de la nota «de el mundo».
  glossary_alignment: 'La terminología clave está bien alineada: κόσμος -> «mundo», φιλέω/μισέω -> «amar/odiar», ἐξελεξάμην -> «escogí». No hay conflictos con los defaults del proyecto. La revisión propuesta preserva «mundo» sin expansión interpretativa y mantiene la elección de Jesús sin sobrecarga doctrinal.'
  issues:
  - severity: medium
    issue: «Pero porque» es poco natural en español
    rationale: Aunque reproduce literalmente los valores de δέ + ὅτι, en español corriente y eclesial suena trabado. «Pero como» mantiene el contraste y la causalidad con mejor fluidez.
  - severity: high
    issue: La nota al pie contiene la forma incorrecta «de el mundo»
    rationale: En español estándar debe contraerse a «del mundo». Una nota con forma incorrecta afecta la calidad editorial y no debe aprobarse tal como está.
  - severity: medium
    issue: «yo os escogí del mundo» atenúa el matiz de extracción/separación documentado para ἐξελεξάμην ἐκ τοῦ κόσμου
    rationale: El audit trail inglés justificó variar contextualmente a «out of the world». En español, «de en medio del mundo» refleja mejor ese matiz sin volverse interpretativo en exceso.
  revised_spanish_text: Si fuerais del mundo[a], el mundo amaría lo suyo. Pero como no sois del mundo, sino que yo os escogí de en medio del mundo, por eso el mundo os odia.
  revised_footnotes:
