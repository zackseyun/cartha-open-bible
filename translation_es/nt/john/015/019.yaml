- from: Si fuerais del mundo[a], el mundo amaría lo suyo. Pero porque no sois del mundo, sino que yo os escogí del mundo, por eso el mundo os odia.
  to: Si fuerais del mundo[a], el mundo amaría lo suyo. Pero como no sois del mundo, sino que yo os escogí de en medio del mundo, por eso el mundo os odia.
  rationale: Se corrige la nota al pie para eliminar la forma incorrecta «de el mundo», se mejora la naturalidad de la conjunción causal-contrastiva con «Pero como», y se hace más explícito en español el matiz de separación de ἐξελεξάμην ἐκ τοῦ κόσμου mediante «de en medio del mundo», en línea con la decisión contextual documentada en el English POB.
