translation:
  language: es
  text: El que me odia también odia a mi Padre.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁ ... μισῶν
  english_pob_choice: The one who hates
  chosen_spanish: El que odia
  alternatives_spanish:
  - Quien odia
  - El que aborrece
  - El que odia constantemente
  lexicon: BDAG
  rationale: El artículo con el participio presente funciona de manera sustantiva y expresa una persona caracterizada por la acción. En español, «El que odia» mantiene bien el valor genérico singular y es natural para una sentencia breve. Se evita una forma más literal como «el que está odiando», que sería menos idiomática y no añade precisión necesaria.
- source_word: ἐμὲ
  english_pob_choice: me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  lexicon: BDAG
  rationale: Es el objeto directo de «odia». En español, el pronombre átono «me» comunica adecuadamente el énfasis del griego en una frase concisa; no es necesario añadir «a mí» salvo por énfasis estilístico, que aquí no aporta más precisión.
- source_word: μισῶν / μισεῖ
  english_pob_choice: hates
  chosen_spanish: odia
  alternatives_spanish:
  - aborrece
  - me odia / odia
  lexicon: BDAG
  rationale: μισέω significa «odiar, detestar». «Odia» es el equivalente natural y fuerte en español para conservar el sentido léxico y la repetición verbal del griego. «Aborrece» es posible, pero en este contexto suena más marcado o arcaizante.
- source_word: καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - y
  - además
  lexicon: BDAG
  rationale: 'Aquí καί vincula la segunda cláusula con fuerza implicativa: el que odia al Hijo también odia al Padre. «También» reproduce esa relación en español con claridad y sin suavizar la conexión.'
- source_word: τὸν πατέρα μου
  english_pob_choice: my Father
  chosen_spanish: mi Padre
  alternatives_spanish:
  - mi padre
  - el Padre mío
  lexicon: BDAG
  rationale: πατήρ con μου, en el contexto joánico, se refiere a Dios en la relación única de Jesús con él. En español, «mi Padre» conserva la referencia relacional y el tono reverente. Se capitaliza «Padre» para señalar el referente teológico, siguiendo la decisión auditada del inglés sin convertirlo en una fórmula eclesiástica distinta.
theological_decisions:
- issue: Referencia relacional y teológica de «mi Padre»
  english_pob_reading: my Father
  chosen_spanish_reading: mi Padre
  alternative_spanish_readings:
  - mi padre
  rationale: En Juan, la expresión no es meramente biológica ni genérica, sino una designación teológica de la relación singular de Jesús con Dios. La mayúscula ayuda al lector español a reconocer ese referente sin alterar el contenido del versículo.
  doctrine_reference: Cristología joánica; confesión histórica de la relación del Hijo con el Padre en la fe cristiana trinitaria
translation_notes:
  revision_awareness: 'El griego presenta una construcción breve y enfática: el participio sustantivado y el verbo finito repiten el mismo lexema μισέω. La versión española conserva esa repetición con «odia ... odia» y refleja la fuerza implicativa de καί con «también». No se introdujeron notas textuales porque no hay variantes relevantes en el paquete fuente.'
  spanish_consistency_notes:
  - Se conserva «Padre» con mayúscula para el referente divino.
  - Se evita «Señor» o «SEÑOR» porque el texto no contiene κύριος ni cita directa del nombre divino.
  - Se mantiene un registro breve y sobrio, acorde con la sentencia del original.
