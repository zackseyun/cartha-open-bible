translation:
  language: es
  text: Como el Padre me ha amado[a], así también yo a ustedes los he amado; permanezcan en mi amor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Como el Padre me amó, así también yo a ustedes los amé; permanezcan en mi amor». El griego usa verbos en aoristo, que también pueden verterse con pretérito simple; el texto principal usa el perfecto compuesto para reflejar la relevancia continua en el contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καθὼς
  english_pob_choice: Just as
  chosen_spanish: Como
  alternatives_spanish:
  - Así como
  - Tal como
  lexicon: BDAG
  rationale: Introduces la comparación entre el amor del Padre por Jesús y el amor de Jesús por los discípulos. En español, 'Como' mantiene la relación comparativa con naturalidad y sin añadir énfasis innecesario.
- source_word: ἠγάπησέν
  english_pob_choice: has loved
  chosen_spanish: ha amado
  alternatives_spanish:
  - amó
  lexicon: BDAG
  rationale: Aunque el aoristo es formalmente pasado, el perfecto español ('ha amado') comunica una acción pasada con relevancia presente en el contexto discursivo, en línea con la decisión auditada del inglés POB.
- source_word: ὁ πατήρ
  english_pob_choice: the Father
  chosen_spanish: el Padre
  alternatives_spanish:
  - el padre
  lexicon: BDAG
  rationale: En Juan, es un título reverencial para Dios como Padre de Jesús; la mayúscula refleja ese uso titular sin alterar el contenido.
- source_word: κἀγὼ
  english_pob_choice: I also
  chosen_spanish: así también yo
  alternatives_spanish:
  - y yo también
  - yo también
  lexicon: BDAG
  rationale: La expresión combina conexión y correspondencia enfática. 'Así también yo' conserva el paralelo comparativo con la cláusula anterior y suena natural en español.
- source_word: ὑμᾶς
  english_pob_choice: you
  chosen_spanish: los
  alternatives_spanish:
  - a ustedes
  lexicon: BDAG
  rationale: El objeto de segunda persona plural se expresa de modo natural en español con el clítico 'los' cuando el complemento directo es masculino mixto o plural genérico en un registro bíblico amplio; el contexto identifica a los discípulos.
- source_word: ἠγάπησα
  english_pob_choice: have loved
  chosen_spanish: he amado
  alternatives_spanish:
  - amé
  lexicon: BDAG
  rationale: Se mantiene el paralelismo con el primer verbo y se conserva la relevancia continua de la acción de Jesús para sus discípulos, como en el auditable inglés POB.
- source_word: μείνατε
  english_pob_choice: remain
  chosen_spanish: permanezcan
  alternatives_spanish:
  - quédense
  - sigan
  lexicon: BDAG
  rationale: El imperativo aoristo de μένω se traduce con 'permanezcan', que conserva el campo semántico joánico de permanecer/continuar sin el peso arcaico de 'abide'.
- source_word: ἐν τῇ ἀγάπῃ τῇ ἐμῇ
  english_pob_choice: in my love
  chosen_spanish: en mi amor
  alternatives_spanish:
  - en el amor que es mío
  - en mi cariño
  lexicon: BDAG
  rationale: ἀγάπη se rinde como 'amor' según la guía doctrinal auditada. El posesivo se expresa de forma idiomática en español como 'mi amor'.
theological_decisions:
- issue: Rendering of ἀγάπη
  english_pob_reading: love
  chosen_spanish_reading: amor
  alternative_spanish_readings:
  - caridad
  rationale: La guía doctrinal del proyecto favorece 'love' para ἀγάπη; en español, 'amor' es el equivalente natural y doctrinalmente adecuado, mientras que 'caridad' sería arcaizante e inadecuado aquí.
  doctrine_reference: 'DOCTRINE.md Contested terms: ἀγάπη → love'
- issue: Aspectual force of the two aorist verbs ἠγάπησέν / ἠγάπησα
  english_pob_reading: English present perfect ('has loved' / 'have loved')
  chosen_spanish_reading: pretérito perfecto compuesto ('ha amado' / 'he amado')
  alternative_spanish_readings:
  - pretérito perfecto simple ('amó' / 'amé')
  rationale: El perfecto compuesto español preserva la idea de acción pasada con vigencia en el presente de la exhortación, reproduciendo la decisión auditada del inglés POB sin exagerar el aspecto griego.
  doctrine_reference: Not a doctrinally contested issue; discourse/tense nuance
translation_notes:
  revision_awareness: Se corrigió la validación previa asegurando que el marcador de nota [a] aparezca exactamente en el texto español. La redacción mantiene la decisión auditada de usar perfecto compuesto para reflejar la vigencia contextual del amor del Padre y del Hijo.
  spanish_consistency_notes:
  - Se mantuvo 'Padre' con mayúscula por su uso titular joánico.
  - Se eligió 'amor' para ἀγάπη, conforme a la terminología doctrinal del proyecto.
  - Se usó 'permanezcan' para μένω por su claridad moderna y continuidad con el tema joánico de permanecer.
