translation:
  language: es
  text: Si el mundo los odia[a], sepan que a mí me ha odiado antes que a ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "me odió primero, antes que a ustedes". El griego usa "primero" con "ustedes" para expresar prioridad temporal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ κόσμος
  english_pob_choice: the world
  chosen_spanish: el mundo
  alternatives_spanish:
  - el sistema del mundo
  - el orden del mundo
  lexicon: BDAG
  rationale: κόσμος en Juan suele abarcar el ámbito humano en oposición a Dios, pero 'el mundo' es el equivalente natural en español y conserva la amplitud y la tensión teológica sin sobreexplicar.
- source_word: μισεῖ
  english_pob_choice: hates
  chosen_spanish: odia
  alternatives_spanish:
  - está odiando
  lexicon: BDAG
  rationale: El presente indicativo griego expresa aquí una realidad general o gnómica; en español se transmite mejor con el presente simple 'odia' que con una perífrasis progresiva.
- source_word: γινώσκετε
  english_pob_choice: know
  chosen_spanish: sepan
  alternatives_spanish:
  - conozcan
  - entiendan
  - reconozcan
  lexicon: BDAG
  rationale: Aunque la forma griega puede funcionar como indicativo o imperativo, en este contexto exhorta naturalmente a una toma de conciencia; 'sepan' comunica ese valor de manera directa y fluida en español.
- source_word: πρῶτον
  english_pob_choice: before
  chosen_spanish: primero que
  alternatives_spanish:
  - antes que
  - primero
  lexicon: BDAG
  rationale: Con el genitivo ὑμῶν, πρῶτον expresa prioridad temporal respecto de 'ustedes'; 'primero que a ustedes' mantiene esa relación sin sonar forzado en español.
- source_word: μεμίσηκεν
  english_pob_choice: has hated
  chosen_spanish: me ha odiado
  alternatives_spanish:
  - me odió
  lexicon: BDAG
  rationale: El perfecto griego presenta una acción completada con relevancia vigente; el perfecto compuesto español 'ha odiado' conserva mejor esa fuerza que un pretérito simple.
- source_word: ἐμὲ ... ὑμῶν
  english_pob_choice: me before you
  chosen_spanish: a mí ... que a ustedes
  alternatives_spanish:
  - a mí ... antes que a ustedes
  - a mí ... primero que a ustedes
  lexicon: BDAG
  rationale: La posición enfática de ἐμέ queda reflejada con 'a mí' al inicio de la cláusula; la comparación temporal se expresa de modo idiomático con 'primero que a ustedes'.
theological_decisions:
- issue: Sentido de κόσμος en la teología joánica
  english_pob_reading: Retain 'the world' without expanding it into an explicit theological paraphrase.
  chosen_spanish_reading: Mantener 'el mundo' sin convertirlo en 'el sistema del mundo' ni en una paráfrasis doctrinal.
  alternative_spanish_readings:
  - el sistema del mundo
  - la humanidad en rebelión contra Dios
  rationale: El contexto joánico sugiere oposición al Hijo y a sus discípulos, pero el versículo por sí mismo no exige una expansión interpretativa. 'El mundo' preserva el alcance y la tensión del texto.
  doctrine_reference: Translation philosophy §3, §6
- issue: Valor temporal de πρῶτον con ὑμῶν
  english_pob_reading: '''first, before you'' communicates temporal priority.'
  chosen_spanish_reading: '''primero que a ustedes'' comunica prioridad temporal sin forzar una calca literal.'
  alternative_spanish_readings:
  - antes que a ustedes
  - primero, antes de ustedes
  rationale: El griego usa 'primero' con ustedes para expresar anterioridad; el español necesita una formulación comparativa natural para mantener el mismo sentido.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete fuente; la lectura en inglés fue verificada como de alta concordancia y no requirió cambios posteriores.
  spanish_consistency_notes:
  - Se mantuvo 'el mundo' como término joánico amplio, sin sustituirlo por una expresión más interpretativa.
  - Se usó 'odiar' y no un verbo más suave para conservar la fuerza léxica de μισέω.
  - Se optó por 'sepan' como exhortación natural en español, coherente con el valor contextual de γινώσκετε.
  - Se preservó el matiz temporal del perfecto con 'ha odiado'.
