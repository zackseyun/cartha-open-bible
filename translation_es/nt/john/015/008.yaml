translation:
  language: es
  text: Por esto[a] mi Padre es glorificado, para que ustedes den mucho fruto y lleguen a ser mis discípulos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «En esto». El griego ἐν τούτῳ puede leerse de manera instrumental («por esto») o demostrativa/mannerística («en esto», «de este modo»).'
    reason: alternative_reading
  - marker: b
    text: 'O: «demuestren ser mis discípulos» / «muestren que son mis discípulos».'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν τούτῳ
  english_pob_choice: By this
  chosen_spanish: Por esto
  alternatives_spanish:
  - En esto
  - De este modo
  lexicon: BDAG
  rationale: El griego puede entenderse de manera instrumental o demostrativa. «Por esto» conserva la relación causal/instrumental que la revisión inglesa favoreció con «By this», y suena natural en español sin perder el enlace con la cláusula siguiente.
- source_word: ἐδοξάσθη
  english_pob_choice: is glorified
  chosen_spanish: es glorificado
  alternatives_spanish:
  - fue glorificado
  - ha sido glorificado
  lexicon: BDAG
  rationale: Aunque el verbo está en aoristo pasivo, en Juan puede expresar una afirmación general o de vigencia. El presente español comunica mejor esa validez actual y sigue la decisión inglesa de no forzar un pasado simple.
- source_word: ὁ πατήρ μου
  english_pob_choice: my Father
  chosen_spanish: mi Padre
  alternatives_spanish:
  - mi padre
  lexicon: BDAG
  rationale: «Padre» funciona aquí como título divino en el discurso de Jesús; por eso se capitaliza. Se conserva la relación posesiva de μου con «mi».
- source_word: ἵνα
  english_pob_choice: that
  chosen_spanish: para que
  alternatives_spanish:
  - que
  - a fin de que
  lexicon: BDAG
  rationale: En este contexto ἵνα expresa el propósito o resultado asociado con la glorificación del Padre. «Para que» es la forma más natural y precisa en español.
- source_word: καρπὸν πολὺν
  english_pob_choice: much fruit
  chosen_spanish: mucho fruto
  alternatives_spanish:
  - fruto abundante
  - gran fruto
  lexicon: BDAG
  rationale: Se mantiene la metáfora agrícola y su cuantificación directa. «Mucho fruto» es la equivalencia más transparente y evita explicaciones innecesarias.
- source_word: φέρητε
  english_pob_choice: you bear
  chosen_spanish: den
  alternatives_spanish:
  - lleven
  - produzcan
  lexicon: BDAG
  rationale: Con «dar fruto» el español bíblico entiende naturalmente el verbo con «fruto». «Den mucho fruto» preserva el giro idiomático sin abandonar la imagen original.
- source_word: γένησθε
  english_pob_choice: become
  chosen_spanish: lleguen a ser
  alternatives_spanish:
  - sean
  - se conviertan en
  lexicon: BDAG
  rationale: «Lleguen a ser» mantiene el matiz de proceso de γίνομαι mejor que un simple «sean», y evita resolver la tensión interpretativa que el texto conserva respecto a la condición de discípulos.
- source_word: ἐμοὶ μαθηταί
  english_pob_choice: my disciples
  chosen_spanish: mis discípulos
  alternatives_spanish:
  - discípulos míos
  - discípulos para mí
  lexicon: BDAG
  rationale: El dativo ἐμοί es relacional/posesivo en este contexto. «Mis discípulos» refleja bien la pertenencia y la lealtad a Jesús en español contemporáneo.
theological_decisions:
- issue: Cómo traducir γένησθε sin resolver la tensión entre ser y llegar a ser discípulos
  english_pob_reading: become my disciples
  chosen_spanish_reading: lleguen a ser mis discípulos
  alternative_spanish_readings:
  - sean mis discípulos
  - demuestren ser mis discípulos
  rationale: La forma griega admite un sentido de proceso/manifestación, pero la traducción principal no debe suavizarlo con una interpretación teológica previa. «Lleguen a ser» conserva la progresión verbal y deja abierta la tensión preservada por la POB inglesa.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Relación entre ἐν τούτῳ y la glorificación del Padre
  english_pob_reading: By this my Father is glorified
  chosen_spanish_reading: Por esto mi Padre es glorificado
  alternative_spanish_readings:
  - En esto mi Padre es glorificado
  - De este modo mi Padre es glorificado
  rationale: El griego puede leerse instrumentalmente o de manera demostrativa. La opción principal sigue la lectura instrumental destacada en la revisión inglesa, pero sin volverla artificial en español.
  doctrine_reference: 'Translation philosophy §2: Preserve source ambiguity when it is textually warranted.'
translation_notes:
  revision_awareness: La revisión inglesa más reciente prefirió «By this» frente a «In this» para ἐν τούτῳ y conservó la estructura «that you bear much fruit and become my disciples». Esta versión española sigue esa preferencia con «Por esto», mantiene el valor de propósito de ἵνα con «para que», y preserva la tensión de γένησθε con «lleguen a ser» sin resolverla interpretativamente.
  spanish_consistency_notes:
  - Se usa «Padre» con mayúscula como título divino, coherente con el tratamiento POB de términos teológicos.
  - Se mantiene «discípulos» y no «seguidores» para respetar el vocabulario del texto griego.
  - «Dar mucho fruto» conserva la metáfora bíblica común en español y corresponde al griego καρπὸν πολὺν φέρητε.
  - No se usa «SEÑOR» ni otras sustituciones de máscara divina, porque este versículo no contiene el nombre divino explícito.
