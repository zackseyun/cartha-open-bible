translation:
  language: es
  text: Si no hubiera hecho entre ellos las obras que nadie más hizo, no tendrían pecado[a]; pero ahora han tanto visto como odiado tanto a mí como a mi Padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ‘no serían culpables de pecado’. El griego dice más literalmente: ‘no tendrían pecado’.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τὰ ἔργα
  english_pob_choice: the works
  chosen_spanish: las obras
  alternatives_spanish:
  - las acciones
  - los hechos
  lexicon: BDAG
  rationale: ‘ἔργα’ en Juan conserva el sentido de obras/acciones reveladoras. ‘Obras’ es la opción más natural en español y mantiene el valor joánico de señales o actos que evidencian la identidad de Jesús.
- source_word: ἐποίησα ἐν αὐτοῖς
  english_pob_choice: I had done among them
  chosen_spanish: hubiera hecho entre ellos
  alternatives_spanish:
  - hubiera hecho en medio de ellos
  - hubiera hecho entre ellos mismos
  lexicon: BDAG
  rationale: La relación espacial/social de ἐν αὐτοῖς se expresa con ‘entre ellos’, que suena natural y conserva la idea de actividad realizada en su presencia, no dentro de ellos.
- source_word: ἃ οὐδεὶς ἄλλος ἐποίησεν
  english_pob_choice: that no one else did
  chosen_spanish: que nadie más hizo
  alternatives_spanish:
  - que ningún otro hizo
  - que otro alguno hizo
  lexicon: BDAG
  rationale: La cláusula relativa subraya la singularidad de las obras de Jesús. ‘Nadie más hizo’ es claro, directo y preserva la fuerza de οὐδεὶς ἄλλος.
- source_word: ἁμαρτίαν οὐκ εἴχοσαν
  english_pob_choice: they would not have sin
  chosen_spanish: no tendrían pecado
  alternatives_spanish:
  - no tendrían pecado[a] de culpabilidad
  - no serían culpables de pecado
  lexicon: BDAG
  rationale: Se conserva la expresión bíblica y joánica de ‘tener pecado’ sin reducirla a una paráfrasis explicativa. En español, ‘no tendrían pecado’ refleja la formulación literal con naturalidad suficiente.
- source_word: νῦν δὲ
  english_pob_choice: but now
  chosen_spanish: pero ahora
  alternatives_spanish:
  - mas ahora
  - y ahora
  lexicon: BDAG
  rationale: Marca con claridad el contraste entre la condición hipotética y la realidad presente. ‘Pero ahora’ es idiomático y fiel.
- source_word: ἑωράκασιν
  english_pob_choice: they have both seen
  chosen_spanish: han visto
  alternatives_spanish:
  - han llegado a ver
  - han contemplado
  lexicon: BDAG
  rationale: El perfecto expresa una acción completada con relevancia presente. En español, ‘han visto’ mantiene ese valor sin sobredeterminar el aspecto.
- source_word: μεμισήκασιν
  english_pob_choice: hated
  chosen_spanish: han odiado
  alternatives_spanish:
  - odian
  - han aborrecido
  lexicon: BDAG
  rationale: El verbo μισέω se rinde con ‘odiar/odiaron’. ‘Han odiado’ conserva el tiempo perfecto y la fuerza afectiva del original sin atenuarlo.
- source_word: καὶ ἐμὲ καὶ τὸν πατέρα μου
  english_pob_choice: both me and my Father
  chosen_spanish: tanto a mí como a mi Padre
  alternatives_spanish:
  - a mí y a mi Padre
  - tanto a mí y a mi Padre
  lexicon: BDAG
  rationale: La correlación enfática de καὶ...καὶ se expresa de modo natural con ‘tanto... como...’. En español esta construcción preserva el paralelismo sin sonar forzada.
theological_decisions:
- issue: ‘ἁμαρτίαν οὐκ εἴχοσαν’ y el grado de culpabilidad
  english_pob_reading: they would not have sin
  chosen_spanish_reading: no tendrían pecado
  alternative_spanish_readings:
  - no serían culpables de pecado
  - no tendrían culpa de pecado
  rationale: 'Se evita convertir la frase en una explicación interpretativa. La traducción conserva la tensión del texto: la revelación de las obras de Jesús incrementa la responsabilidad, pero el griego dice literalmente ‘no tendrían pecado’.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que simplificó la secuencia ‘they have both seen and hated’ para evitar aspereza; en español se reflejó el correlato con ‘han visto y han odiado’, y se preservó la correlación enfática final con ‘tanto a mí como a mi Padre’. También se siguió la lectura más literal de ‘have sin’ sin expandirla a una paráfrasis doctrinal.
  spanish_consistency_notes:
  - Se usa ‘obras’ para ἔργα, en continuidad con la terminología joánica habitual.
  - Se mantuvo ‘Padre’ con mayúscula por referencia a Dios Padre.
  - Se eligió ‘han visto / han odiado’ para conservar el perfecto griego con naturalidad en español.
  - La nota al pie marca la alternativa semántica principal sin duplicar el texto principal.
