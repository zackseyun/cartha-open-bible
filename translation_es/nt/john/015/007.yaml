- from: Si permanecen en mí, y mis palabras permanecen en ustedes, pidan[a] lo que quieran[b], y les será concedido.
  to: Si permanecen en mí y mis palabras permanecen en ustedes[a], pidan lo que quieran[b], y se hará para ustedes.
  rationale: Se quitó la coma innecesaria para una sintaxis española más natural y se reemplazó «les será concedido» por «se hará para ustedes» para seguir más de cerca el sentido de γενήσεται ὑμῖν y la decisión documentada en el audit trail inglés, evitando una interpretación más estrecha de concesión.
