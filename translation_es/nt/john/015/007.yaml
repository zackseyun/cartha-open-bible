translation:
  language: es
  text: Si permanecen en mí y mis palabras permanecen en ustedes[a], pidan lo que quieran[b], y se hará para ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «permanezcan en mí ... mis palabras permanezcan en ustedes».
    reason: lexical_alternative
  - marker: b
    text: O «lo que deseen».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν μείνητε ἐν ἐμοὶ καὶ τὰ ῥήματά μου ἐν ὑμῖν μείνῃ
  english_pob_choice: If you remain in me and my words remain in you
  chosen_spanish: Si permanecen en mí, y mis palabras permanecen en ustedes
  alternatives_spanish:
  - Si ustedes permanecen en mí, y mis palabras permanecen en ustedes
  - Si habitan en mí, y mis palabras habitan en ustedes
  lexicon: μένω
  rationale: '''Permanecen'' conserva el valor durativo y relacional de μένω, como en el audit trail inglés ''remain'', y suena natural en español moderno. Se mantiene la repetición del verbo en ambos miembros para reflejar la insistencia del griego. ''Habitan'' es posible por tradición espiritual, pero añade una imagen menos directa que el griego aquí.'
- source_word: ἐν ἐμοὶ
  english_pob_choice: in me
  chosen_spanish: en mí
  alternatives_spanish:
  - unidos a mí
  - junto a mí
  lexicon: BDAG
  rationale: '''En mí'' preserva la imagen de unión/relación interna del texto, sin suavizarla hacia una mera cercanía. Es la correspondencia más directa y mantiene la fuerza joánica de la preposición.'
- source_word: τὰ ῥήματά μου
  english_pob_choice: my words
  chosen_spanish: mis palabras
  alternatives_spanish:
  - mis dichos
  - mis enseñanzas
  lexicon: BDAG
  rationale: '''Palabras'' reproduce de forma natural ῥήματα como palabras pronunciadas o dichos, y conserva el vínculo con las expresiones de Jesús. ''Enseñanzas'' explicita demasiado; ''dichos'' es posible, pero menos transparente en español común.'
- source_word: ὃ ἐὰν θέλητε
  english_pob_choice: whatever you want
  chosen_spanish: lo que quieran
  alternatives_spanish:
  - lo que deseen
  - lo que quieran pedir
  lexicon: BDAG
  rationale: La cláusula indefinida se rinde de manera amplia y idiomática con 'lo que quieran'. 'Quieran' preserva el matiz de voluntad/deseo sin imponer una intensificación devocional ajena al griego. Se evita añadir 'pedir' dentro de la cláusula, porque la petición aparece ya en el imperativo siguiente.
- source_word: αἰτήσασθε
  english_pob_choice: ask
  chosen_spanish: pidan
  alternatives_spanish:
  - soliciten
  - rueguen
  lexicon: BDAG
  rationale: '''Pidan'' es el verbo natural en contexto de oración/petición y corresponde bien al imperativo aoristo medio. ''Soliciten'' suena más administrativo; ''rueguen'' introduce una tonalidad que el griego no exige.'
- source_word: γενήσεται ὑμῖν
  english_pob_choice: it will be done for you
  chosen_spanish: les será concedido
  alternatives_spanish:
  - se hará para ustedes
  - les sucederá
  lexicon: BDAG
  rationale: '''Les será concedido'' comunica bien el resultado de la petición en español y evita un calco torpe. Aunque γενήσεται puede significar ''llegar a ser'' o ''suceder'', el contexto de respuesta a la oración justifica una formulación concesiva. Se mantiene el dativo de beneficiario con ''les''.'
theological_decisions:
- issue: Estructura condicional de la promesa
  english_pob_reading: The promise is explicitly conditioned by remaining in Jesus and his words remaining in the disciples.
  chosen_spanish_reading: La promesa de pedir queda explícitamente condicionada por permanecer en Jesús y por que sus palabras permanezcan en los discípulos.
  alternative_spanish_readings:
  - Una lectura que haga sonar la promesa como si fuera absoluta o sin condición
  - Una versión que traslade el foco solo a la petición
  rationale: El griego abre con ἐὰν y encierra la promesa dentro de esa condición; por eso el español conserva la cláusula condicional completa sin universalizar el resultado. Esto preserva la tensión teológica documentada en el audit trail inglés.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'Coincide con el último pase revisado: no se documentaron cambios posteriores; el borrador sigue el estado de alta concordancia del auditor inglés.'
  spanish_consistency_notes:
  - Se conserva la repetición de 'permanecen' para reflejar el paralelismo del griego.
  - Se evita 'Cristo' o terminología eclesiástica no presente en el versículo.
  - La opción 'les será concedido' mantiene la idea de respuesta otorgada sin sobretraducir el verbo griego.
  - 'Las notas alternativas se anclan donde el español también admite una doble posibilidad real: μένω y θέλω.'
