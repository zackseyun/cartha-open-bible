review_pass:
  verdict: revise
  source_alignment_summary: El borrador conserva bien la estructura condicional, la repetición de μένω con «permanecen», «en mí», «mis palabras» y «pidan lo que quieran». Sin embargo, «les será concedido» se aparta del matiz de γενήσεται ὑμῖν, que el audit trail inglés entendió como «it will be done for you», no estrictamente «concedido». Además, la coma después de «mí» rompe innecesariamente la fluidez de la condición coordinada.
  spanish_quality_summary: El español es claro y natural, pero mejora quitando la coma tras «mí». «Les será hecho» sonaría forzado; una solución idiomática y fiel es «se hará para ustedes», aunque algo literal. Mejor aún, «se hará realidad para ustedes» explicita el resultado sin reducirlo a concesión. Dado el audit trail, conviene mantener una formulación más cercana a «se hará».
  glossary_alignment: No hay conflictos con la terminología del proyecto. «Permanecen», «en mí», «mis palabras» y «pidan» están bien alineados con las decisiones léxicas documentadas. El punto principal es ajustar γίνομαι para no convertirlo en un simple verbo de concesión.
  issues:
  - severity: medium
    issue: «les será concedido» estrecha el sentido de γενήσεται ὑμῖν
    rationale: γίνομαι aquí expresa que algo llegará a suceder / será hecho en respuesta a la petición. «Concedido» interpreta el resultado como concesión y se aleja de la formulación elegida en el audit trail inglés («it will be done for you»).
  - severity: low
    issue: Coma innecesaria después de «mí»
    rationale: 'En español no hace falta separar con coma los dos miembros coordinados de la prótasis: «Si permanecen en mí y mis palabras permanecen en ustedes...» fluye mejor y refleja mejor la unidad sintáctica del griego.'
  revised_spanish_text: Si permanecen en mí y mis palabras permanecen en ustedes[a], pidan lo que quieran[b], y se hará para ustedes.
