translation:
  language: es
  text: Les he hablado estas cosas para que mi gozo[b] esté en ustedes, y su gozo sea hecho pleno[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Sea hecho pleno» conserva la pasividad y la imagen de plenitud del verbo πληρόω; también puede entenderse como «sea completado».
    reason: lexical_alternative
  - marker: b
    text: 'O: «esté entre ustedes». El griego ἐν ὑμῖν puede expresar presencia «en» o «entre»; aquí se adopta la lectura principal de presencia interior/permanente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  lexicon: BDAG
  rationale: El demostrativo plural exige mantener la pluralidad explícita; «estas cosas» preserva mejor el alcance del discurso que un singular más fluido como «esto».
- source_word: λελάληκα
  english_pob_choice: I have spoken
  chosen_spanish: les he hablado
  alternatives_spanish:
  - les he dicho
  - les he dicho estas cosas
  lexicon: BDAG
  rationale: El perfecto de λαλέω comunica una acción ya realizada con resultado presente; «les he hablado» conserva ese valor y suena natural en español. Se evita «les he dicho» porque desplaza el matiz hacia decir/telling.
- source_word: ὑμῖν
  english_pob_choice: to you
  chosen_spanish: a ustedes
  alternatives_spanish:
  - a vosotros
  lexicon: BDAG
  rationale: El dativo plural se expresa de manera natural en español con «a ustedes». Mantiene la referencia plural sin forzar una marca arcaica.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: Introducir la finalidad con «para que» es la forma más natural y fiel al valor de propósito/resultación de ἵνα en este contexto.
- source_word: ἡ χαρὰ ἡ ἐμὴ
  english_pob_choice: my joy
  chosen_spanish: mi gozo
  alternatives_spanish:
  - mi alegría
  - el gozo que es mío
  lexicon: BDAG
  rationale: «Gozo» conserva bien el registro bíblico y la fuerza del sustantivo χαρά sin perder naturalidad. «Mi gozo» mantiene la posesión explícita y el contraste con el gozo de los discípulos.
- source_word: ἐν ὑμῖν
  english_pob_choice: in you
  chosen_spanish: esté en ustedes
  alternatives_spanish:
  - esté entre ustedes
  - esté dentro de ustedes
  lexicon: BDAG
  rationale: La preposición ἐν permite «en» o «entre». Aquí la lectura principal del POB favorece una presencia interior/de permanencia; en español «esté en ustedes» preserva esa posibilidad sin cerrarla por completo.
- source_word: ᾖ
  english_pob_choice: may be
  chosen_spanish: esté
  alternatives_spanish:
  - pueda estar
  - sea
  lexicon: BDAG
  rationale: En español, tras «para que», el subjuntivo presente «esté» comunica la finalidad del verbo εἰμί de manera natural. Se evita una perífrasis innecesaria.
- source_word: ἡ χαρὰ ὑμῶν
  english_pob_choice: your joy
  chosen_spanish: su gozo
  alternatives_spanish:
  - el gozo de ustedes
  - su alegría
  lexicon: BDAG
  rationale: «Su gozo» es idiomático y conserva el paralelismo con «mi gozo». El contexto ya hace claro que se trata del gozo de los discípulos.
- source_word: πληρωθῇ
  english_pob_choice: may be made full
  chosen_spanish: sea hecho pleno
  alternatives_spanish:
  - sea completado
  - sea lleno
  lexicon: BDAG
  rationale: El aoristo pasivo de πληρόω conserva la idea de plenitud alcanzada. «Sea hecho pleno» mantiene la pasividad y la imagen de llenura sin reducirla a una simple abstracción como «cumplido».
theological_decisions:
- issue: Relación entre «mi gozo» y el gozo de los discípulos
  english_pob_reading: Rendered as 'my joy' without interpretive expansion, allowing both the sense of Jesus' own joy shared with believers and joy derived from union with him.
  chosen_spanish_reading: Se mantiene «mi gozo» sin ampliación interpretativa, para dejar abierta tanto la idea del gozo propio de Jesús compartido con los creyentes como la alegría que fluye de la unión con él.
  alternative_spanish_readings:
  - el gozo que yo doy
  - gozo acerca de mí
  rationale: El griego dice simplemente «mi gozo». Traducirlo como «el gozo que yo doy» resolvería indebidamente la tensión teológica del texto. La formulación española preserva la ambigüedad significativa del original.
  doctrine_reference: Preservar la tensión teológica sin resolverla en la traducción.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego y el aparato auditado en inglés. No se observan revisiones sustanciales en el pasaje base; se conserva la tensión entre la presencia de «mi gozo» y el gozo de los discípulos, y la alternativa de ἐν ὑμῖν permanece anotada sin resolverla en el cuerpo principal.
  spanish_consistency_notes:
  - Se usa «gozo» de forma consistente para χαρά, en armonía con el registro bíblico y con la decisión auditada en inglés.
  - Se mantiene el tratamiento plural de ὑμῖν con «ustedes», adecuado para español latinoamericano neutral.
  - «Para que» refleja con naturalidad la cláusula de propósito introducida por ἵνα.
  - Se evita introducir «Cristo/Mesías» u otra terminología ajena, porque no aparece en este versículo.
