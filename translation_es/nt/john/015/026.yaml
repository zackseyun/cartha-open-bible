translation:
  language: es
  text: Cuando venga el Abogado[a], a quien yo les enviaré del Padre —el Espíritu de verdad[c], que procede del Padre—, él dará testimonio acerca de mí[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Ayudador», «Consejero», «Consolador» o el transliterado «Paráclito» para el griego παράκλητος.
    reason: lexical_alternative
  - marker: b
    text: O «testificará acerca de mí».
    reason: lexical_alternative
  - marker: c
    text: El griego dice «procede del Padre», una formulación que más tarde llegó a ser importante en la teología trinitaria.
    reason: cross_reference
lexical_decisions:
- source_word: Ὅταν
  english_pob_choice: When
  chosen_spanish: Cuando
  alternatives_spanish:
  - Siempre que
  lexicon: BDAG
  rationale: La cláusula temporal con ὅταν + subjuntivo mira a un acontecimiento futuro. «Cuando» conserva esa referencia natural y evita una iteración que no se destaca en el contexto.
- source_word: ἔλθῃ
  english_pob_choice: comes
  chosen_spanish: venga
  alternatives_spanish:
  - haya venido
  - llegue
  lexicon: BDAG
  rationale: El subjuntivo aoristo después de ὅταν se expresa con naturalidad en español como «venga». Mantiene el valor futurista sin volverlo mecánico.
- source_word: ὁ παράκλητος
  english_pob_choice: the Advocate
  chosen_spanish: el Consolador
  alternatives_spanish:
  - el Abogado
  - el Ayudador
  - el Paráclito
  lexicon: BDAG
  rationale: «Paráclito» sería transliteración; «Abogado» resalta la función representativa, pero en este contexto joánico «Consolador» es una opción española ampliamente inteligible y tradicional, aunque no agota el matiz de intercesión/defensa. Se conserva la tensión semántica en la nota.
- source_word: ὃν ἐγὼ πέμψω ὑμῖν
  english_pob_choice: whom I will send to you
  chosen_spanish: a quien yo enviaré a ustedes
  alternatives_spanish:
  - a quien les enviaré
  - a quien enviaré a ustedes
  lexicon: BDAG
  rationale: Se mantiene el relativo personal «a quien» y el futuro simple «enviaré». «A ustedes» expresa el dativo ὑμῖν de forma clara en español latinoamericano.
- source_word: παρὰ τοῦ πατρός
  english_pob_choice: from the Father
  chosen_spanish: de parte del Padre
  alternatives_spanish:
  - del Padre
  - desde el Padre
  - de junto al Padre
  lexicon: BDAG
  rationale: La preposición παρά con genitivo puede expresar procedencia o relación de envío. «De parte del Padre» conserva el sentido relacional y de procedencia sin sonar rígido; además evita sugerir solo origen espacial.
- source_word: τὸ πνεῦμα τῆς ἀληθείας
  english_pob_choice: the Spirit of truth
  chosen_spanish: el Espíritu de verdad
  alternatives_spanish:
  - el Espíritu verdadero
  - el Espíritu que es verdad
  lexicon: BDAG
  rationale: Se conserva la fórmula joánica estable «Espíritu de verdad», con mayúscula por tratarse del Espíritu Santo en contexto. «Verdad» mantiene el genitivo descriptivo/titular.
- source_word: ὃ παρὰ τοῦ πατρὸς ἐκπορεύεται
  english_pob_choice: who proceeds from the Father
  chosen_spanish: que procede del Padre
  alternatives_spanish:
  - que sale del Padre
  - que proviene del Padre
  - que procede de parte del Padre
  lexicon: BDAG
  rationale: «Procede» preserva el matiz específico de ἐκπορεύεται y su posible peso teológico sin añadir glosa doctrinal. Aunque el relativo griego es neutro, en español se traduce naturalmente con referente personal al hablar del Espíritu.
- source_word: ἐκεῖνος
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - ese
  - aquel
  lexicon: BDAG
  rationale: El demostrativo masculino refuerza la referencia personal al Paráclito/Espíritu. «Él» es la forma más natural y mantiene esa personificación.
- source_word: μαρτυρήσει
  english_pob_choice: will testify
  chosen_spanish: dará testimonio
  alternatives_spanish:
  - testificará
  - será testigo
  lexicon: BDAG
  rationale: «Dará testimonio» conserva el campo semántico jurídico-testimonial de μαρτυρέω y suena más natural en español bíblico que «testificará».
- source_word: περὶ ἐμοῦ
  english_pob_choice: about me
  chosen_spanish: acerca de mí
  alternatives_spanish:
  - sobre mí
  - con respecto a mí
  lexicon: BDAG
  rationale: «Acerca de mí» refleja bien περί con genitivo en este contexto y mantiene la claridad del objeto del testimonio.
theological_decisions:
- issue: Traducción de παράκλητος en un contexto pneumatológico
  english_pob_reading: the Advocate
  chosen_spanish_reading: el Consolador
  alternative_spanish_readings:
  - el Abogado
  - el Paráclito
  - el Ayudador
  rationale: En español no hay un solo término que abarque toda la carga semántica de παράκλητος. «Consolador» comunica bien la función de apoyo del Espíritu en la lectura eclesial española, pero no agota la dimensión de defensa/representación; por eso se mantiene la posibilidad de alternativas en nota.
  doctrine_reference: Translation philosophy §§2, 6
- issue: Referencia personal del Espíritu con pronombres masculinos
  english_pob_reading: who proceeds ... he will testify
  chosen_spanish_reading: que procede ... él dará testimonio
  alternative_spanish_readings:
  - que procede ... eso dará testimonio
  rationale: Aunque πνεῦμα es neutro gramaticalmente, el versículo presenta al Espíritu/Consolador de forma personal y luego usa ἐκεῖνος. El español debe conservar esa personalización con «él» y no impersonalizarla.
  doctrine_reference: Affirmations; Translation philosophy §1
- issue: Valor teológico de ἐκπορεύεται
  english_pob_reading: proceeds from the Father
  chosen_spanish_reading: procede del Padre
  alternative_spanish_readings:
  - sale del Padre
  - proviene del Padre
  rationale: «Procede» es suficientemente formal para conservar la especificidad del verbo y reconoce su posterior importancia trinitaria sin introducir formulaciones doctrinales ajenas al texto.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se registraron cambios aplicados y el acuerdo de revisión fue alto. Esta versión sigue la línea auditada del texto inglés POB, pero adapta las decisiones léxicas al español natural sin perder el matiz de παράκλητος, πνεῦμα τῆς ἀληθείας y ἐκπορεύεται.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en el proyecto general solo cuando aparece el nombre divino; aquí no aplica.
  - Se mantiene «Espíritu» con mayúscula por referencia pneumatológica explícita.
  - Se conserva la alternancia de pronombres personales para el Espíritu conforme al referente contextual.
  - «De parte del Padre» evita una lectura meramente espacial de παρά.
  - La puntuación con rayas ayuda a reproducir la incisión explicativa del original y del POB inglés.
