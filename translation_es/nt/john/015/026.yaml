  text: ⸀Ὅταν ἔλθῃ ὁ παράκλητος ὃν ἐγὼ πέμψω ὑμῖν παρὰ τοῦ πατρός, τὸ πνεῦμα τῆς ἀληθείας ὃ παρὰ τοῦ πατρὸς ἐκπορεύεται, ἐκεῖνος μαρτυρήσει περὶ ἐμοῦ·
base_translation:
  language: en
  yaml_path: translation/nt/john/015/026.yaml
  text: When the Advocate comes[a], whom I will send to you from the Father—the Spirit of truth[c][b], who proceeds from the Father—he will testify about me.
  footnotes:
  - marker: a
    text: Or 'Helper,' 'Counselor,' 'Comforter,' or transliterated 'Paraclete' for Greek παράκλητος.
    reason: lexical_alternative
  - marker: b
    text: Or 'will bear witness about me.'
    reason: lexical_alternative
  - marker: c
    text: The Greek says 'proceeds from the Father,' a wording later significant in Trinitarian theology.
    reason: cross_reference
