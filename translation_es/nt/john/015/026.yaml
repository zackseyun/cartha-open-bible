    text: O «Ayudador», «Consejero», «Consolador» o el transliterado «Paráclito» para el griego παράκλητος.
    reason: lexical_alternative
  - marker: b
    text: O «testificará acerca de mí».
    reason: lexical_alternative
  - marker: c
    text: El griego dice «procede del Padre», una formulación que más tarde llegó a ser importante en la teología trinitaria.
    reason: cross_reference
  revision_rationale: Se revisa la traducción principal para alinearla con la decisión auditada del POB sobre παράκλητος, usando «Abogado» como mejor equivalente español de «Advocate» en este contexto de representación y testimonio. También se corrige la nota alternativa de μαρτυρήσει para que sea realmente alternativa, y se mejora la naturalidad del español con «les enviaré» y un «del Padre» más directo y paralelo al griego.
