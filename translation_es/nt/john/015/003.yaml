lexical_decisions:
- source_word: ἤδη
  english_pob_choice: Already
  chosen_spanish: Ya
  alternatives_spanish:
  - Ya mismo
  - Ya ahora
  lexicon: BDAG
  rationale: ἤδη marca que el estado existe desde antes de este momento; en español bíblico natural, «Ya» comunica esa anterioridad/resultatividad de forma concisa y fluida.
- source_word: ὑμεῖς
  english_pob_choice: you
  chosen_spanish: ustedes
  alternatives_spanish:
  - ustedes mismos
  - vosotros
  lexicon: BDAG
  rationale: El griego explicita el pronombre con énfasis. «Ustedes» mantiene el sujeto explícito y funciona bien en español amplio sin forzar una forma reflexiva.
- source_word: καθαροί
  english_pob_choice: clean
  chosen_spanish: limpios
  alternatives_spanish:
  - puros
  - limpiados
  lexicon: BDAG
  rationale: En el contexto inmediato de la vid y la limpieza/poda, «limpios» preserva el campo semántico concreto de καθαροί mejor que «puros», que sonaría más abstracto.
- source_word: διὰ τὸν λόγον
  english_pob_choice: because of the word
  chosen_spanish: por la palabra
  alternatives_spanish:
  - a causa de la palabra
  - por medio de la palabra
  lexicon: BDAG
  rationale: διά con acusativo puede expresar causa o medio. La relación causal es la lectura principal del POB inglés; en español, «por la palabra» conserva esa causalidad sin añadir una interpretación técnica.
- source_word: λόγον
  english_pob_choice: word
  chosen_spanish: palabra
  alternatives_spanish:
  - mensaje
  - enseñanza
  lexicon: BDAG
  rationale: «Palabra» es el equivalente directo y preserva la dicción joánica. «Mensaje» o «enseñanza» serían más interpretativos.
- source_word: ὃν λελάληκα
  english_pob_choice: that I have spoken
  chosen_spanish: que les he hablado
  alternatives_spanish:
  - que he hablado a ustedes
  - que les dije
  lexicon: BDAG
  rationale: El perfecto λελάληκα sugiere una palabra dicha con efecto vigente; «les he hablado» conserva ese valor resultativo mejor que un pretérito simple.
- source_word: λαλέω
  english_pob_choice: spoken
  chosen_spanish: hablado
  alternatives_spanish:
  - dicho
  lexicon: BDAG
  rationale: «Hablado» corresponde bien a λαλέω y mantiene la relación entre «palabra» y acto de hablar. «Dicho» sería posible, pero menos alineado con la forma verbal del griego.
- source_word: ὑμῖν
  english_pob_choice: to you
  chosen_spanish: les
  alternatives_spanish:
  - a ustedes
  - a vosotros
  lexicon: BDAG
  rationale: El dativo de destinatario se naturaliza en español con el clítico «les»; el referente plural ya queda claro por el contexto y por «ustedes».
theological_decisions:
- issue: Naturaleza de la limpieza de los discípulos
  english_pob_reading: Present spiritual/moral cleanness grounded in Jesus' spoken word, without narrowing it to a sacramental or forensic category.
  chosen_spanish_reading: Limpieza/pureza presente atribuida a la palabra de Jesús, sin cerrar el sentido a una categoría doctrinal específica.
  alternative_spanish_readings:
  - limpieza sacramental
  - justificación forense
  - purificación ritual
  rationale: El contexto de la vid y la poda sugiere una imagen de limpieza vinculada a la palabra de Jesús. La traducción debe conservar esa amplitud teológica y no resolver la tensión hacia una doctrina posterior no explicitada aquí.
  doctrine_reference: Preservar la tensión teológica del pasaje sin especificación doctrinal añadida.
translation_notes:
  revision_awareness: 'Coincide con el último pase revisado: no hay cambios sustanciales respecto del sentido base ni de la evaluación de alta concordancia. La nota alternativa preserva la ambigüedad de διά con acusativo entre causalidad y medio.'
  spanish_consistency_notes:
  - Se mantiene «palabra» para λόγος, en coherencia con la dicción joánica y con el audit trail inglés.
  - Se usa «limpios» para καθαροί por el vínculo inmediato con el campo semántico de limpieza/poda en Juan 15.
  - Se evita introducir «purificados» o un lenguaje sacramental explícito, para no sobreespecificar el sentido.
  - El pronombre plural explícito se conserva con «ustedes» y se refuerza en el clítico indirecto «les» sin redundancia innecesaria.
