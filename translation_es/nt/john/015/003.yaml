review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien ἤδη, καθαροί y el valor general causal/instrumental de διὰ τὸν λόγον, y conserva la nota alternativa. Sin embargo, «la palabra que les he hablado» no es español natural ni representa bien la construcción relativa ὃν λελάληκα ὑμῖν. En español, con «hablar» el complemento directo «la palabra» suena forzado; el griego se expresa mejor como «la palabra que les he dicho» o «la palabra que les he hablado a ustedes», pero esta última sigue siendo torpe. Dado el énfasis joánico en «palabra», conviene conservar «palabra» y usar «dicho» en la relativa.
  spanish_quality_summary: La frase actual es mayormente clara, pero «que les he hablado» resulta poco idiomática en español general y rebaja la legibilidad eclesial. También «Ya ustedes» es comprensible, aunque «Ustedes ya» fluye mejor en español neutro sin perder el énfasis explícito del pronombre. El resto es adecuado y digno.
  glossary_alignment: No hay conflictos con la terminología del proyecto. «Limpios» para καθαροί y «palabra» para λόγος están bien elegidos. El cambio propuesto a «dicho» afecta solo la naturalidad del verbo de la relativa, no la decisión principal sobre λόγος.
  issues:
  - severity: medium
    issue: 'Expresión no idiomática: «la palabra que les he hablado»'
    rationale: Aunque intenta calcar ὃν λελάληκα, en español amplio «hablar una palabra» suena antinatural. «La palabra que les he dicho» conserva mejor el sentido y la legibilidad.
  - severity: low
    issue: 'Orden algo menos natural: «Ya ustedes»'
    rationale: Es entendible, pero «Ustedes ya» suena más natural en español neutro y mantiene el pronombre explícito para el énfasis de ὑμεῖς.
  revised_spanish_text: Ustedes ya están limpios[a] por la palabra que les he dicho.
