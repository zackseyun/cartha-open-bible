translation:
  language: es
  text: Ustedes son mis amigos si hacen lo que yo les mando[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Ustedes son mis amigos si hacen las cosas que yo les mando».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑμεῖς
  english_pob_choice: You
  chosen_spanish: Ustedes
  alternatives_spanish:
  - Ustedes mismos
  - Vosotros
  lexicon: BDAG
  rationale: El pronombre griego aparece al inicio para énfasis. En español, 'Ustedes' comunica naturalmente la segunda persona plural y mantiene el tono directo sin necesidad de marcar el énfasis de forma artificial.
- source_word: φίλοι
  english_pob_choice: friends
  chosen_spanish: amigos
  alternatives_spanish:
  - compañeros
  - amigos cercanos
  lexicon: BDAG
  rationale: En este contexto relacional, 'amigos' es la equivalencia natural y fiel para φίλοι. Conserva la cercanía interpersonal que el contexto joánico comunica.
- source_word: μού
  english_pob_choice: my
  chosen_spanish: mis
  alternatives_spanish:
  - de mí
  lexicon: BDAG
  rationale: El genitivo expresa relación/posesión; en español la forma posesiva plural 'mis' es la opción idiomática para 'friends'. Se mantiene el vínculo personal con Jesús.
- source_word: ἐστε
  english_pob_choice: are
  chosen_spanish: son
  alternatives_spanish:
  - están
  lexicon: BDAG
  rationale: El verbo copulativo se traduce de manera directa como 'son', que suena natural en español y preserva la afirmación de identidad relacional.
- source_word: ἐὰν
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - cuando
  - si es que
  lexicon: BDAG
  rationale: La cláusula condicional con subjuntivo se expresa mejor con 'si', manteniendo la condición explícita del griego sin suavizarla a un valor temporal.
- source_word: ποιῆτε
  english_pob_choice: you do
  chosen_spanish: hacen
  alternatives_spanish:
  - obedecen
  - cumplen
  lexicon: BDAG
  rationale: El verbo ποιέω aquí se refiere a ejecutar lo mandado. 'Hacen' conserva la amplitud del verbo y evita añadir la idea interpretativa de 'obedecer', aunque esa respuesta está implícita por el contexto.
- source_word: ἃ
  english_pob_choice: what
  chosen_spanish: lo que
  alternatives_spanish:
  - las cosas que
  - aquello que
  lexicon: BDAG
  rationale: El relativo neutro plural se vierte con 'lo que', una solución natural en español para el contenido de los mandatos sin volverlo innecesariamente pesado.
- source_word: ἐγὼ
  english_pob_choice: I
  chosen_spanish: yo
  alternatives_spanish:
  - yo mismo
  lexicon: BDAG
  rationale: El sujeto explícito conserva el énfasis del griego. En español, 'yo' mantiene esa marca sin introducir una intensificación ajena al texto.
- source_word: ἐντέλλομαι
  english_pob_choice: command
  chosen_spanish: mando
  alternatives_spanish:
  - ordeno
  - les doy mandato
  lexicon: BDAG
  rationale: '''Mando'' comunica la autoridad del verbo mejor que ''instruyo'', y suena natural en la relación maestro-discípulo. ''Ordeno'' sería más fuerte y más administrativo; ''mando'' preserva la fuerza imperativa sin exceso de formalidad.'
- source_word: ὑμῖν
  english_pob_choice: you
  chosen_spanish: les
  alternatives_spanish:
  - a ustedes
  lexicon: BDAG
  rationale: El dativo de destinatario se expresa de forma idiomática en español con clítico de objeto indirecto ('les'), reforzado por el sujeto plural ya presente.
theological_decisions:
- issue: Relación entre amistad y obediencia
  english_pob_reading: 'Straightforward condition: ''You are my friends if you do what I command you.'''
  chosen_spanish_reading: 'Condición directa: ''Ustedes son mis amigos si hacen lo que yo les mando.'''
  alternative_spanish_readings:
  - '''Ustedes serán mis amigos cuando hagan lo que yo les mando.'''
  - '''Ustedes son mis amigos al hacer lo que yo les mando.'''
  rationale: El griego con ἐὰν + subjuntivo expresa condición real, no mera temporalidad. El español conserva esa relación sin resolverla doctrinalmente ni convertirla en mérito, perseverancia u otro sistema ajeno al verso.
  doctrine_reference: Preservar la tensión teológica sin suavizar la condición del texto.
translation_notes:
  revision_awareness: Se corrigió la falta previa del marcador de nota al anclar [a] en el texto principal. La redacción mantiene correspondencia fuente a fuente con el griego y respeta la alternativa más formal documentada en la auditoría inglesa.
  spanish_consistency_notes:
  - Se usa 'Ustedes' para segunda persona plural con registro bíblico contemporáneo y neutral.
  - Se conserva 'mis amigos' en lugar de una glosa más interpretativa como 'mis discípulos', porque φίλοι en este verso enfatiza la relación amistosa.
  - '''Mando'' reproduce la fuerza de ἐντέλλομαι sin desplazarse a un lenguaje eclesiástico más tradicional que no está requerido por el griego.'
