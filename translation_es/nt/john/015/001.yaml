translation:
  language: es
  text: Yo soy la vid verdadera, y mi Padre es el viñador[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «labrador». El griego γεωργός se refiere a quien cultiva la tierra; en el contexto de la vid, «viñador» es una traducción más específica.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐγώ εἰμι
  english_pob_choice: I am
  chosen_spanish: Yo soy
  alternatives_spanish:
  - Yo mismo soy
  lexicon: SBLGNT / audit trail de POB
  rationale: El griego usa el pronombre enfático Ἐγώ con el verbo ser. En español, 'Yo soy' comunica con naturalidad la fuerza enfática sin recargar el estilo.
- source_word: ἄμπελος
  english_pob_choice: vine
  chosen_spanish: vid
  alternatives_spanish:
  - parra
  - viña
  lexicon: BDAG
  rationale: '''Vid'' es el equivalente natural y bíblico en español para la imagen de la planta de la vid, y preserva bien la metáfora sin desviar el sentido a un terreno o viñedo.'
- source_word: ἀληθινή
  english_pob_choice: 'true'
  chosen_spanish: verdadera
  alternatives_spanish:
  - real
  - genuina
  lexicon: BDAG
  rationale: '''Verdadera'' conserva la carga johánica de lo auténtico, pleno y conforme a la realidad de Dios, manteniendo el eco tradicional sin perder claridad.'
- source_word: πατήρ μου
  english_pob_choice: my Father
  chosen_spanish: mi Padre
  alternatives_spanish:
  - mi padre
  lexicon: BDAG
  rationale: En este contexto teológico, 'mi Padre' mantiene la relación personal y titular con Dios referida por Jesús, con la mayúscula reverente habitual en español bíblico.
- source_word: γεωργός
  english_pob_choice: vinegrower
  chosen_spanish: labrador
  alternatives_spanish:
  - viñador
  - viticultor
  - cultivador
  lexicon: BDAG
  rationale: γεωργός designa al que cultiva la tierra; en una metáfora de la vid, 'labrador' es una solución amplia, clara y fiel al campo semántico. 'Viñador' sería más específico, pero puede sonar menos natural fuera de ciertos registros.
theological_decisions:
- issue: Imagen metafórica de Jesús como la vid
  english_pob_reading: Retain the metaphor straightforwardly as 'I am the true vine' without expanding its symbolism in translation.
  chosen_spanish_reading: 'Conservar la metáfora: ''Yo soy la vid verdadera'' sin explicarla ni reinterpretarla en el texto.'
  alternative_spanish_readings:
  - Yo soy la vid real
  - Yo soy la vid auténtica
  rationale: La frase de Juan se entiende mejor si mantiene intacta la imagen y su densidad teológica. 'Verdadera' reproduce bien el valor de ἀληθινή sin añadir explicación ajena al verso.
  doctrine_reference: Juan 15:1; filosofía de traducción POB §§1, 3, 6
- issue: Rendering of γεωργός in relation to the Father
  english_pob_reading: Use 'vinegrower' in the main text and preserve 'vinedresser' in a footnote.
  chosen_spanish_reading: Usar 'labrador' en el texto principal y dejar alternativas más específicas para una nota.
  alternative_spanish_readings:
  - viñador
  - viticultor
  - cultivador
  rationale: La expresión debe ser clara para lectores modernos sin perder el sentido agrícola. 'Labrador' comunica la idea básica de quien trabaja y cuida la tierra; 'viñador' sería más técnico, pero no necesariamente más transparente para todos los lectores.
  doctrine_reference: Juan 15:1; filosofía de traducción POB §§5, 6
translation_notes:
  revision_awareness: El contexto auditado en inglés muestra un ajuste reciente del equipo desde 'gardener' a 'vinegrower' para γεωργός, buscando mayor precisión en la imagen de la vid. En español, se preserva esa precisión semántica dentro de un término natural y amplio ('labrador'), dejando la opción más específica ('viñador') en nota.
  spanish_consistency_notes:
  - Se mantiene 'vid' para ἄμπελος, en lugar de términos más técnicos o agrícolas que desplazarían la imagen.
  - Se usa 'mi Padre' con mayúscula reverente por la referencia teológica directa a Dios.
  - '''Labrador'' se eligió por claridad y amplitud semántica; la nota conserva la alternativa específica ''viñador'' para reflejar el rango lexical de γεωργός.'
  - El tono del verso es bíblico y digno, sin añadir explicación interpretativa al cuerpo del texto.
