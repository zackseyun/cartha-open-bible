  - severity: low
    issue: La nota léxica queda invertida respecto de la mejor opción en español
    rationale: Si «viñador» se mantiene solo como alternativa en nota, el texto principal deja de reflejar la elección más fiel al contexto. Conviene pasar «viñador» al cuerpo principal y dejar «labrador» como alternativa más general.
