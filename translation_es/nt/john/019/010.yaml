translation:
  language: es
  text: 'Entonces Pilato le dijo: «¿No me hablas? ¿No sabes que tengo autoridad para dejarte libre[a] y autoridad para crucificarte?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «poder» en lugar de «autoridad»; ἐξουσία puede denotar autoridad, derecho o poder. Se prefiere «autoridad» porque Pilato habla en un contexto jurídico-gubernativo.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει οὖν
  english_pob_choice: So ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Así que ... dijo
  - Por tanto ... dijo
  lexicon: BDAG
  rationale: οὖν funciona como conector narrativo y de avance de la escena; «Entonces» conserva bien esa secuencia en español sin sonar artificial.
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El dativo indirecto se expresa naturalmente con el clítico «le» en español; la forma es idiomática y mantiene el referente personal.
- source_word: Πιλᾶτος
  english_pob_choice: Pilate
  chosen_spanish: Pilato
  alternatives_spanish:
  - Poncio Pilato
  lexicon: BDAG
  rationale: El nombre propio se translitera según la convención hispana. Se omite «Poncio» porque el griego aquí solo dice Πιλᾶτος.
- source_word: Ἐμοὶ
  english_pob_choice: to me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  lexicon: BDAG
  rationale: El griego fronta el dativo con énfasis. En español, la anteposición «me» en la pregunta y el orden del enunciado conservan el tono reprochante sin recargarlo.
- source_word: οὐ λαλεῖς
  english_pob_choice: Will you not speak
  chosen_spanish: ¿No me hablas?
  alternatives_spanish:
  - ¿No hablas conmigo?
  - ¿No me respondes?
  lexicon: BDAG
  rationale: λαλέω es «hablar»; en este contexto de interrogatorio judicial, «hablas» reproduce con naturalidad la reprensión de Pilato. «Responder» sería interpretativo y más específico de lo que el griego exige.
- source_word: οὐκ οἶδας
  english_pob_choice: Do you not know
  chosen_spanish: ¿No sabes
  alternatives_spanish:
  - ¿No te das cuenta
  - ¿No reconoces
  lexicon: BDAG
  rationale: οἶδα significa «saber/conocer». «¿No sabes…?» mantiene la fuerza de la reprensión sin añadir matices que el texto no explicita.
- source_word: ἐξουσίαν ἔχω
  english_pob_choice: I have authority
  chosen_spanish: tengo autoridad
  alternatives_spanish:
  - tengo poder
  - tengo el derecho
  lexicon: BDAG
  rationale: ἐξουσία expresa autoridad o derecho con connotación jurídica. «Autoridad» es el equivalente más fiel en este contexto gubernativo, evitando reducirlo a fuerza bruta con «poder».
- source_word: ἀπολῦσαί σε
  english_pob_choice: to release you
  chosen_spanish: para soltarte
  alternatives_spanish:
  - para liberarte
  - para dejarte ir
  lexicon: BDAG
  rationale: ἀπολύω, en contexto judicial, es «soltar/liberar/dejar ir». «Soltarte» comunica bien la libertad de custodia en español y preserva el matiz de liberación procesal sin sobreinterpretar absolución.
- source_word: σταυρῶσαί σε
  english_pob_choice: to crucify you
  chosen_spanish: para crucificarte
  alternatives_spanish:
  - para que te crucifique
  - para hacerte crucificar
  lexicon: BDAG
  rationale: El infinitivo activo de σταυρόω se rinde directamente con «crucificarte». Se mantiene la forma directa del griego, sin convertirla en pasiva perifrástica.
theological_decisions:
- issue: Sentido de ἐξουσία en la boca de Pilato
  english_pob_reading: Render ἐξουσία as 'authority' without endorsing the legitimacy or absoluteness of Pilate's claim.
  chosen_spanish_reading: Traducir ἐξουσία como «autoridad» sin validar teológicamente la pretensión de Pilato.
  alternative_spanish_readings:
  - poder
  - derecho
  rationale: El versículo registra la afirmación de Pilato, no la aprueba. «Autoridad» conserva el campo semántico jurídico y deja intacta la tensión que Jesús responderá en el versículo siguiente.
  doctrine_reference: Preservar la tensión narrativa y teológica; no resolver la pretensión humana de soberanía.
translation_notes:
  revision_awareness: La redacción sigue de cerca el griego SBLGNT y coincide con el juicio de alta concordancia del audit trail inglés. Se preserva la repetición enfática de ἐξουσίαν ἔχω con dos ocurrencias de «autoridad», sin colapsarlas en una sola idea, y se adopta una formulación española natural que mantiene el tono de reprensión y el marco legal del dicho de Pilato.
  spanish_consistency_notes:
  - Se usa «autoridad» para ἐξουσία conforme al estándar POB cuando el contexto es jurídico o de gobierno.
  - Se usa «crucificarte» para σταυρῶσαί σε, manteniendo el verbo directo del griego.
  - Se opta por «soltarte» para ἀπολῦσαί σε como equivalente idiomático de liberación/custodia en contexto judicial.
  - Se conserva la pregunta retórica con marcas de interrogación españolas y comillas angulares de uso editorial.
  - El marcador de nota [a] aparece en el término «soltarte» para señalar la alternativa lexical sin duplicar la nota en el texto.
