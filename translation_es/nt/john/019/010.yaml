base_translation:
  language: en
  yaml_path: translation/nt/john/019/010.yaml
  text: So Pilate said to him[a], “Will you not speak to me? Do you not know that I have authority to release you and authority to crucify you?”
  footnotes:
  - marker: a
    text: Or 'power' instead of 'authority'; Greek exousia can denote authority, right, or power. 'Authority' is preferred here because Pilate is speaking in a legal-governing context.
    reason: lexical_alternative
