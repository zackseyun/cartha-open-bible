  text: ὅτε οὖν εἶδον αὐτὸν οἱ ἀρχιερεῖς καὶ οἱ ὑπηρέται ἐκραύγασαν λέγοντες· Σταύρωσον ⸀σταύρωσον. λέγει αὐτοῖς ὁ Πιλᾶτος· Λάβετε αὐτὸν ὑμεῖς καὶ σταυρώσατε, ἐγὼ γὰρ οὐχ εὑρίσκω ἐν αὐτῷ αἰτίαν.
base_translation:
  language: en
  yaml_path: translation/nt/john/019/006.yaml
  text: So when the chief priests and the officers saw him[a], they cried out, saying, “Crucify him! Crucify him!” Pilate said to them, “You take him and crucify him[b], for I find no charge against him.”
  footnotes:
  - marker: a
    text: Or, “Take him yourselves and crucify him.” The Greek explicitly includes “you,” adding emphasis.
    reason: lexical_alternative
  - marker: b
    text: Or, “I find no fault in him.” The Greek term can mean a legal charge or basis for accusation; here the judicial sense is primary.
    reason: lexical_alternative
