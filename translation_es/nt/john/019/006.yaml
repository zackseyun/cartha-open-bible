revisions:
- from: 'Así que, cuando los sumos sacerdotes y los oficiales[a] lo vieron, gritaban diciendo: «¡Crucifícalo! ¡Crucifícalo!». Pilato les dijo: «Tómenlo ustedes y crucifíquenlo[b], porque yo no encuentro en él ningún cargo».'
  to: 'Entonces, cuando los sumos sacerdotes y los oficiales lo vieron, gritaron: «¡Crucifícalo! ¡Crucifícalo!». Pilato les dijo: «Tómenlo ustedes[a] y crucifíquenlo, porque yo no encuentro ninguna acusación[b] contra él».'
  rationale: Se corrige el tiempo verbal para reflejar el aoristo narrativo, se reubican las notas al pie para que coincidan con los puntos léxicos documentados en el POB inglés (ὑμεῖς y αἰτίαν), y se mejora la formulación forense final para un español más natural sin perder el sentido judicial del original.
