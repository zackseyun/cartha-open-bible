translation:
  language: es
  text: 'Entonces, cuando los sumos sacerdotes y los oficiales lo vieron, gritaron: «¡Crucifícalo! ¡Crucifícalo!». Pilato les dijo: «Tómenlo ustedes[a] y crucifíquenlo, porque yo no encuentro ninguna acusación[b] contra él».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Tómenlo ustedes mismos y crucifíquenlo». El griego incluye expresamente «ustedes», con énfasis.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no encuentro ningún cargo contra él» o «no encuentro falta en él». El término griego puede significar un cargo legal o base para acusación; aquí predomina el sentido judicial.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτε οὖν
  english_pob_choice: So when
  chosen_spanish: Así que, cuando
  alternatives_spanish:
  - Entonces, cuando
  - Por tanto, cuando
  lexicon: SBLGNT / BDAG
  rationale: Combina el valor temporal de ὅτε con la transición inferencial de οὖν en un español natural. «Así que, cuando» conserva el avance narrativo sin volver la frase rígida.
- source_word: ἀρχιερεῖς
  english_pob_choice: chief priests
  chosen_spanish: sumos sacerdotes
  alternatives_spanish:
  - principales sacerdotes
  - jefes de los sacerdotes
  lexicon: BDAG
  rationale: En español bíblico y eclesial, «sumos sacerdotes» comunica el plural de la dirigencia sacerdotal mejor que una formulación más literal pero menos idiomática.
- source_word: ὑπηρέται
  english_pob_choice: officers
  chosen_spanish: oficiales
  alternatives_spanish:
  - guardias
  - sirvientes
  lexicon: BDAG
  rationale: «Oficiales» mantiene el matiz institucional de subordinados de autoridad sin especificar más de lo que el verso dice. «Guardias» sería posible, pero más interpretativo.
- source_word: ἐκραύγασαν
  english_pob_choice: they cried out
  chosen_spanish: gritaban
  alternatives_spanish:
  - clamaban
  - alzaban la voz
  lexicon: BDAG
  rationale: El verbo expresa un clamor fuerte y público. «Gritaban» es claro y natural en español para ese contexto judicial y hostil.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - clamando
  - repitiendo
  lexicon: BDAG
  rationale: La forma participial introduce el contenido del grito; «diciendo» conserva la relación sintáctica con el griego de manera directa y legible.
- source_word: Σταύρωσον σταύρωσον
  english_pob_choice: Crucify him! Crucify him!
  chosen_spanish: ¡Crucifícalo! ¡Crucifícalo!
  alternatives_spanish:
  - ¡Crucifíquenlo! ¡Crucifíquenlo!
  - ¡Pónganlo en una cruz! ¡Pónganlo en una cruz!
  lexicon: BDAG
  rationale: La repetición imperativa se mantiene para preservar la fuerza retórica. En español, el objeto pronominal explícito es natural y corresponde al αὐτόν del contexto inmediato.
- source_word: Λάβετε αὐτὸν ὑμεῖς
  english_pob_choice: You take him
  chosen_spanish: Tómenlo ustedes
  alternatives_spanish:
  - Tómenlo ustedes mismos
  - Llévenselo ustedes
  lexicon: BDAG
  rationale: El ὑμεῖς es enfático y se refleja mejor con el sujeto pospuesto «ustedes», que da el contraste implícito con Pilato. No se fuerza «ustedes mismos» porque el énfasis ya queda suficientemente marcado.
- source_word: σταυρώσατε
  english_pob_choice: crucify him
  chosen_spanish: crucifíquenlo
  alternatives_spanish:
  - pónganlo en una cruz
  - ejecútenlo en la cruz
  lexicon: BDAG
  rationale: Es la equivalencia directa y estable del imperativo aoristo, manteniendo el mandato brutal sin atenuarlo.
- source_word: αἰτίαν
  english_pob_choice: charge
  chosen_spanish: cargo
  alternatives_spanish:
  - culpa
  - motivo
  - acusación
  lexicon: BDAG
  rationale: En el marco judicial de Juan 19:6, αἰτία denota la base legal de una acusación. «Cargo» preserva ese sentido forense mejor que «culpa», que sonaría moral, o «motivo», que sería demasiado amplio.
theological_decisions:
- issue: La declaración de inocencia de Jesús en el juicio
  english_pob_reading: I find no charge against him
  chosen_spanish_reading: no encuentro en él ningún cargo
  alternative_spanish_readings:
  - no encuentro culpa en él
  - no encuentro ningún motivo de acusación contra él
  rationale: La escena es una evaluación judicial de Pilato, no una formulación doctrinal abstracta. «Cargo» mantiene el valor forense de αἰτία y deja intacta la afirmación de que no hay base legal para condenarlo.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: Se revisó el anclaje de las notas para que los marcadores [a] y [b] aparezcan exactamente en el texto español junto a las palabras correspondientes. Se mantuvo la fuerza repetitiva del mandato y el matiz jurídico de αἰτία como «cargo».
  spanish_consistency_notes:
  - Se usó «sumos sacerdotes» para el plural de ἀρχιερεῖς, coherente con el contexto johánico.
  - «Oficiales» preserva el sentido institucional de ὑπηρέται sin introducir ‘templo’ que no aparece en el verso.
  - «Crucifíquenlo» conserva la violencia imperativa del original y la repetición enfática.
  - «Cargo» se eligió por su valor forense, en línea con el audit trail inglés.
  - Los marcadores de nota [a] y [b] están anclados en el texto para evitar desajustes de validación.
