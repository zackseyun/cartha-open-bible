revisions:
- from: 'Entonces dijo al discípulo: «He aquí tu madre». Y desde aquella hora el discípulo la recibió en lo suyo[a].'
  to: 'Entonces dijo al discípulo: «He aquí tu madre».[a] Y desde aquella hora el discípulo la acogió en su propia casa.[b]'
  rationale: Se mantiene «He aquí» por su registro formal y fidelidad a Ἴδε. Se añade la alternativa con coma, siguiendo la nota inglesa. Se reemplaza «la recibió en lo suyo» por «la acogió en su propia casa» para expresar con español natural el sentido contextual de ἔλαβεν εἰς τὰ ἴδια, mientras la nota preserva la literalidad y el campo semántico del griego.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:05:41Z'
review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la secuencia narrativa, el carácter declarativo de «He aquí tu madre» y la referencia temporal «desde aquella hora». Sin embargo, «la recibió en lo suyo» no representa bien la fuerza contextual de εἰς τὰ ἴδια en este pasaje, donde el sentido documentado por el POB es entrar en su propio hogar/hogar-dominio, y además suena poco natural en español. También «recibió» es posible para ἔλαβεν, pero aquí «la llevó a su propia casa» o «la acogió en su propia casa» comunica mejor la acción concreta en contexto.
  spanish_quality_summary: El español es generalmente digno y legible. «He aquí» funciona bien en registro bíblico. La principal debilidad es la expresión «en lo suyo», que resulta opaca y poco idiomática para lectores hispanohablantes; la nota no compensa del todo esa extrañeza en el texto principal. Conviene usar una formulación natural y clara en el texto, preservando el matiz literal en nota.
  glossary_alignment: No hay conflictos con la terminología doctrinal principal del proyecto. La revisión propuesta mantiene el registro formal y sigue el razonamiento léxico del POB para εἰς τὰ ἴδια, trasladando al texto principal «su propia casa» y dejando en nota el literal «a lo suyo / a sus propias cosas».
  issues:
  - severity: medium
    issue: «en lo suyo» es poco natural y semánticamente impreciso en español contemporáneo
    rationale: Aunque intenta conservar la literalidad de εἰς τὰ ἴδια, en este contexto joánico el sentido práctico es que el discípulo la llevó/acogió en su propio hogar. El español propuesto suena forzado y puede no comunicar el sentido básico sin depender excesivamente de la nota.
  - severity: medium
    issue: «recibió» debilita la acción concreta de ἔλαβεν en contexto
    rationale: λαμβάνω puede ser «recibir», pero aquí la combinación con εἰς τὰ ἴδια apunta a tomarla consigo a su propio hogar. «Acogió» o «llevó»/«tomó consigo» expresa mejor la acción narrada.
  revised_spanish_text: 'Entonces dijo al discípulo: «He aquí tu madre».[a] Y desde aquella hora el discípulo la acogió en su propia casa.[b]'
  revised_footnotes:
  - marker: a
    text: 'O: «He aquí, tu madre»'
    reason: lexical_alternative
  - marker: b
    text: 'Griego: «a lo suyo» o «a sus propias cosas», es decir, a su propia casa u hogar.'
    reason: lexical_alternative
