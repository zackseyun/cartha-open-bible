translation:
  language: es
  text: 'Entonces dijo al discípulo: «He aquí tu madre».[a] Y desde aquella hora el discípulo la acogió en su propia casa.[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «He aquí, tu madre»'
    reason: lexical_alternative
  - marker: b
    text: 'Griego: «a lo suyo» o «a sus propias cosas», es decir, a su propia casa u hogar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶτα
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Después
  - Luego
  lexicon: BDAG
  rationale: Marca la sucesión narrativa inmediata. «Entonces» conserva bien la progresión temporal en español y suena natural en registro bíblico moderno.
- source_word: λέγει
  english_pob_choice: he said
  chosen_spanish: dijo
  alternatives_spanish:
  - dice
  lexicon: BDAG
  rationale: El griego usa presente histórico, pero en español narrativo «dijo» comunica mejor la acción pasada sin perder la función discursiva.
- source_word: τῷ μαθητῇ
  english_pob_choice: to the disciple
  chosen_spanish: al discípulo
  alternatives_spanish:
  - al discípulo amado
  - a su discípulo
  lexicon: BDAG
  rationale: El texto griego dice simplemente «al discípulo»; se evita añadir identificaciones o posesivos que no están explícitos en esta cláusula.
- source_word: Ἴδε
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - Miren
  lexicon: BDAG
  rationale: Es una exhortación para fijar la atención. «He aquí» mantiene el registro solemne y la fuerza deíctica más cerca del valor formal que el original requiere.
- source_word: ἡ μήτηρ σου
  english_pob_choice: your mother
  chosen_spanish: tu madre
  alternatives_spanish:
  - la madre tuya
  lexicon: BDAG
  rationale: 'La frase nominal sin verbo se vierte de forma directa en español: «tu madre». La forma pronominal conserva la relación recién declarada sin añadir explicaciones.'
- source_word: ἀπ’ ἐκείνης τῆς ὥρας
  english_pob_choice: from that hour
  chosen_spanish: desde aquella hora
  alternatives_spanish:
  - desde ese momento
  - desde entonces
  lexicon: BDAG
  rationale: «Hora» conserva la dicción joánica y la referencia temporal del griego. «Aquella» refleja el deíctico del texto con un tono formal natural en español.
- source_word: ἔλαβεν
  english_pob_choice: took
  chosen_spanish: recibió
  alternatives_spanish:
  - tomó
  - la tomó
  lexicon: BDAG
  rationale: Aquí λαμβάνω expresa la acción de acoger y asumir cuidado de ella. «Recibió» comunica mejor esa aceptación concreta en español, sin imponer demasiado la idea de traslado físico.
- source_word: αὐτὴν
  english_pob_choice: her
  chosen_spanish: la
  alternatives_spanish:
  - a ella
  lexicon: BDAG
  rationale: El pronombre de objeto directo se traduce con el clítico natural en español, refiriéndose a la madre de Jesús.
- source_word: εἰς τὰ ἴδια
  english_pob_choice: into his own home
  chosen_spanish: en lo suyo
  alternatives_spanish:
  - a su casa
  - a su hogar
  - en su propia casa
  lexicon: BDAG
  rationale: La expresión griega es idiomática y literalmente significa «a sus propias cosas/posesiones/ámbito». «En lo suyo» preserva esa tensión lexical sin resolverla del todo hacia «casa», que sería una interpretación posible pero más específica que el griego.
theological_decisions:
- issue: Alcance de la relación entre el discípulo y la madre de Jesús
  english_pob_reading: Render the statement straightforwardly as a new filial relationship and practical care without importing later doctrinal claims about Mary or ecclesial symbolism.
  chosen_spanish_reading: Presentar la escena como un encargo real de cuidado y acogida, sin convertirla en una afirmación doctrinal adicional sobre María ni en un símbolo eclesial explícito.
  alternative_spanish_readings:
  - Leerla principalmente como símbolo de la maternidad espiritual de María sobre todos los discípulos
  - Leerla solo como un arreglo legal de tutela
  rationale: El versículo expresa de manera directa que Jesús encomienda a su madre al discípulo y que este la recibe. La traducción debe sostener ese sentido básico y dejar abiertas las interpretaciones más amplias que no se expresan aquí.
  doctrine_reference: Preservar la tensión teológica sin resolver interpretaciones posteriores no explícitas en el texto.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail en cuanto a un registro más formal para Ἴδε. Se conserva la claridad narrativa y se evita sobreinterpretar εἰς τὰ ἴδια con una sola opción demasiado cerrada.
  spanish_consistency_notes:
  - Se usa «discípulo» sin añadir identificaciones que el griego no explicita en la cláusula.
  - «He aquí» se mantiene como equivalente solemne y bíblicamente reconocible de Ἴδε.
  - «Desde aquella hora» conserva la referencia temporal joánica con «hora» en lugar de reducirla a «momento».
  - Se evita «SEÑOR» o terminología ajena porque el pasaje no contiene θεός ni κύριος.
  - No se usa «siervo» ni «Cristo» porque no corresponden a esta unidad textual.
