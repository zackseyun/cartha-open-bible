base_translation:
  language: en
  yaml_path: translation/nt/john/019/029.yaml
  text: A container full of sour wine was lying there[b][a]; so they put a sponge full of the sour wine on hyssop and brought it to his mouth.
  footnotes:
  - marker: a
    text: Or 'vinegar.' The Greek term can denote sour wine or vinegar; here it likely refers to the sour wine drink available to soldiers.
    reason: lexical_alternative
  - marker: b
    text: Or 'on a hyssop branch' or 'with hyssop.' The Greek simply says 'on/with hyssop,' and the exact picture is debated.
    reason: lexical_alternative
