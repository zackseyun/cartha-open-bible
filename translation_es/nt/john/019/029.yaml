translation:
  language: es
  text: Había allí un recipiente lleno de vino agrio[a]; entonces pusieron una esponja llena del vino agrio sobre hisopo[b] y la acercaron a su boca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vinagre». El término griego puede designar vino agrio o vinagre; aquí probablemente se refiere a la bebida agria disponible para los soldados.
    reason: lexical_alternative
  - marker: b
    text: O «con hisopo» o «sobre una rama de hisopo». El griego dice simplemente «sobre/con hisopo», y el cuadro exacto es debatido.
    reason: lexical_alternative
lexical_decisions:
- source_word: σκεῦος
  english_pob_choice: container
  chosen_spanish: recipiente
  alternatives_spanish:
  - vasija
  - envase
  lexicon: BDAG
  rationale: σκεῦος es un término general para un objeto o recipiente. «Recipiente» mantiene esa amplitud sin precisar de más el tipo de objeto, y suena natural en español moderno.
- source_word: ἔκειτο
  english_pob_choice: was lying there
  chosen_spanish: había allí
  alternatives_spanish:
  - estaba allí
  - yacía allí
  lexicon: BDAG
  rationale: El imperfecto de κεῖμαι presenta un estado situado en el escenario. En español, «había allí» conserva bien la función de ambientación sin forzar una imagen corporal que «yacía» podría sugerir para un objeto.
- source_word: ὄξους
  english_pob_choice: sour wine
  chosen_spanish: vinagre agrio
  alternatives_spanish:
  - vino agrio
  - vinagre
  lexicon: BDAG
  rationale: En este contexto ὄξος alude al líquido agrio disponible para los soldados, no solo al condimento «vinagre». «Vinagre agrio» intenta conservar la referencia histórica y a la vez hacer visible el matiz de bebida ácida; se evita reducirlo solo a «vinagre» porque perdería el valor contextual señalado por la POB inglesa.
- source_word: μεστόν
  english_pob_choice: full of
  chosen_spanish: lleno de
  alternatives_spanish:
  - colmado de
  - lleno
  lexicon: BDAG
  rationale: «Lleno de» es la equivalencia natural en español para indicar plenitud del recipiente y luego de la esponja, manteniendo la repetición del griego.
- source_word: σπόγγον
  english_pob_choice: a sponge
  chosen_spanish: una esponja
  alternatives_spanish:
  - una esponja absorbente
  lexicon: BDAG
  rationale: Equivalencia léxica directa y transparente.
- source_word: οὖν
  english_pob_choice: so
  chosen_spanish: entonces
  alternatives_spanish:
  - así que
  - por tanto
  lexicon: BDAG
  rationale: Marca la secuencia narrativa inmediata. «Entonces» conserva la relación de consecuencia sin sonar demasiado formal.
- source_word: ὑσσώπῳ
  english_pob_choice: on hyssop
  chosen_spanish: sobre hisopo
  alternatives_spanish:
  - con hisopo
  - sobre una rama de hisopo
  lexicon: BDAG
  rationale: La forma griega es deliberadamente breve y ambigua respecto del medio exacto. «Sobre hisopo» mantiene la cercanía al texto y preserva la tensión interpretativa sin añadir «rama», que no aparece explícitamente en el griego.
- source_word: περιθέντες
  english_pob_choice: put
  chosen_spanish: pusieron
  alternatives_spanish:
  - colocaron
  - poniendo
  lexicon: BDAG
  rationale: El participio aoristo antecede a la acción principal. En español, «pusieron» comunica de forma natural la acción previa de colocar la esponja.
- source_word: προσήνεγκαν
  english_pob_choice: brought
  chosen_spanish: se la acercaron
  alternatives_spanish:
  - lo llevaron
  - lo trajeron
  lexicon: BDAG
  rationale: El verbo expresa llevar o presentar hacia Jesús. Dado que el complemento final es «a su boca», «se la acercaron» reproduce mejor el movimiento físico concreto que simplemente «trajeron».
- source_word: αὐτοῦ τῷ στόματι
  english_pob_choice: to his mouth
  chosen_spanish: a su boca
  alternatives_spanish:
  - a la boca de él
  - a la boca de Jesús
  lexicon: BDAG
  rationale: La construcción dativa se rinde naturalmente con posesivo en español. «A su boca» es idiomático y mantiene el referente claro por el contexto inmediato.
theological_decisions:
- issue: Posible resonancia de Passover/purificación en ὑσσώπῳ
  english_pob_reading: Retain 'hyssop' in the main text without expanding its symbolism.
  chosen_spanish_reading: Mantener «hisopo» en el texto principal sin ampliar su simbolismo.
  alternative_spanish_readings:
  - «rama de hisopo»
  - una paráfrasis que explicite la alusión pascual
  rationale: Juan puede evocar asociaciones pascuales o de purificación, pero el versículo no las desarrolla explícitamente. Mantener «hisopo» conserva la resonancia posible sin resolverla interpretativamente.
  doctrine_reference: Preservar la tensión teológica/lexical sin cerrarla por paráfrasis.
translation_notes:
  revision_awareness: La revisión más reciente indicó alto acuerdo y ningún cambio necesario. Esta versión conserva ese consenso, con ajuste español para evitar ambigüedades y mantener la tensión léxica de ὑσσώπῳ y ὄξους sin sobredeterminar el cuadro.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponda al nombre divino; este versículo no lo contiene.
  - Se mantiene «hisopo» sin expandir a «rama» en el texto principal para respetar la ambigüedad del griego.
  - «Vinagre agrio» intenta reflejar el valor contextual de ὄξος como bebida agria, sin borrar la alternativa literal «vinagre».
  - El pronombre posesivo «su» se usa por naturalidad española y por el contexto inmediato de Jesús.
