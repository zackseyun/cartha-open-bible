translation:
  language: es
  text: 'Y entró de nuevo en el pretorio y dijo a Jesús[a]: «¿De dónde eres tú?» Pero Jesús no le dio respuesta.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «residencia oficial o sede del gobernador romano»; «pretorio» conserva el término histórico.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰσῆλθεν
  english_pob_choice: entered
  chosen_spanish: entró
  alternatives_spanish:
  - ingresó
  - entró en
  lexicon: BDAG
  rationale: El aoristo de εἰσέρχομαι indica movimiento hacia el interior. «Entró» es natural y fiel en español; mantiene el sentido sin añadir matiz innecesario.
- source_word: πραιτώριον
  english_pob_choice: governor’s headquarters
  chosen_spanish: pretorio
  alternatives_spanish:
  - residencia del gobernador
  - cuartel del gobernador
  lexicon: BDAG
  rationale: En español, «pretorio» conserva el referente romano del término y es el equivalente más directo de πραιτώριον. La nota explica la función como residencia o sede del gobernador para evitar oscuridad.
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: de nuevo
  alternatives_spanish:
  - otra vez
  lexicon: BDAG
  rationale: «De nuevo» expresa la repetición de manera natural y solemne en español; conserva el valor adverbial de reiteración.
- source_word: λέγει
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - dice
  lexicon: BDAG
  rationale: Aunque el griego usa presente histórico, en español narrativo es más natural pasar al pretérito simple. «Dijo» preserva el flujo sin forzar el estilo.
- source_word: Πόθεν
  english_pob_choice: Where ... from
  chosen_spanish: ¿De dónde eres tú?
  alternatives_spanish:
  - ¿De dónde vienes?
  - ¿De dónde procedes tú?
  lexicon: BDAG
  rationale: La pregunta griega indaga origen/procedencia. «¿De dónde eres tú?» reproduce esa noción de origen de forma idiomática; se conserva el «tú» para reflejar el pronombre explícito del griego.
- source_word: ἀπόκρισιν
  english_pob_choice: answer
  chosen_spanish: respuesta
  alternatives_spanish:
  - contestación
  - réplica
  lexicon: BDAG
  rationale: Con ἔδωκεν, el griego dice literalmente que no le dio «respuesta/contestación». «Respuesta» es la opción más natural en español y mantiene la imagen verbal de dar una respuesta.
- source_word: οὐκ ἔδωκεν αὐτῷ
  english_pob_choice: gave him no answer
  chosen_spanish: no le dio respuesta
  alternatives_spanish:
  - no le respondió
  - no le dio contestación
  lexicon: BDAG
  rationale: La construcción conserva el verbo «dar» del griego y expresa negación de manera directa y sobria. «No le dio respuesta» retiene la imagen idiomática sin perder claridad.
- source_word: καὶ ... καὶ ... δὲ
  english_pob_choice: And ... and ... But
  chosen_spanish: Y ... y ... Pero
  alternatives_spanish:
  - Entonces ... y ... pero
  - Y ... y ... pero
  lexicon: BDAG
  rationale: Se mantiene la cadena narrativa con «Y ... y ...». «Pero» traduce δέ como contraste suave entre la pregunta de Pilato y el silencio de Jesús, evitando una oposición más fuerte que la del griego.
theological_decisions:
- issue: Referente del sujeto implícito
  english_pob_reading: Render the implied subject as 'he,' with context indicating Pilate.
  chosen_spanish_reading: Se mantiene el sujeto implícito en «entró» y «dijo», con el contexto identificando a Pilato.
  alternative_spanish_readings:
  - Pilato entró de nuevo...
  - Entonces Pilato entró de nuevo...
  rationale: El griego no nombra a Pilato aquí, aunque el contexto lo identifica claramente. Mantener el sujeto implícito respeta la economía del texto y evita añadir información no presente en esta cláusula.
  doctrine_reference: Principio de fidelidad textual y cohesión contextual
- issue: Naturaleza de la negativa de Jesús
  english_pob_reading: But Jesus gave him no answer.
  chosen_spanish_reading: Pero Jesús no le dio respuesta.
  alternative_spanish_readings:
  - Pero Jesús no le respondió.
  - Pero Jesús no dio respuesta
  rationale: La cláusula griega expresa una negativa directa a dar respuesta. La traducción conserva esa negativa sin suavizarla ni interpretarla como simple omisión casual.
  doctrine_reference: Fidelidad semántica al texto narrativo
- issue: Término para πραιτώριον
  english_pob_reading: governor’s headquarters
  chosen_spanish_reading: pretorio
  alternative_spanish_readings:
  - residencia del gobernador
  - cuartel del gobernador
  rationale: Aunque «pretorio» es un préstamo histórico, en español bíblico es comprensible y evita convertir el término en una paráfrasis. La nota aclara que se trata de la sede o residencia oficial del gobernador romano.
  doctrine_reference: Precisión histórica y equivalencia funcional
translation_notes:
  revision_awareness: La base inglesa revisó «went into» por «entered» por mayor formalidad y concisión; el español sigue esa línea con «entró». También se mantiene la decisión auditada de traducir πραιτώριον de forma funcional/ histórica y de conservar la negatividad idiomática de ἀπόκρισιν οὐκ ἔδωκεν αὐτῷ sin paraphrasear.
  spanish_consistency_notes:
  - Se usa «Jesús[a]» con nota léxica para πραιτώριον, siguiendo el patrón del audit trail inglés donde el marcador acompaña al término con alternativa.
  - Se evita «SEÑOR» o cualquier sustitución no presente en el texto; el versículo no contiene terminología divina explícita.
  - La puntuación de diálogo usa comillas latinas y signos de interrogación/exclamación propios del español.
  - «Pretorio» mantiene coherencia con un registro bíblico-histórico accesible en español.
