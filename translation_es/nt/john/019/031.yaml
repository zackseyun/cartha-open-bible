translation:
  language: es
  text: Entonces los judíos[a], como era el día de preparación[b], pidieron a Pilato que los cuerpos no quedaran en la cruz durante el sábado, pues aquel sábado era un día grande[c], y que les quebraran las piernas y los cuerpos fueran retirados[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los judeanos»; en Juan, Ἰουδαῖοι a veces puede referirse más específicamente a las autoridades o líderes de Judea.
    reason: alternative_reading
  - marker: b
    text: O «el Día de Preparación». El término se refiere al día de preparación antes del sábado.
    reason: lexical_alternative
  - marker: c
    text: O «aquel sábado era de gran importancia»; tradicionalmente, «aquel sábado era un día alto»; literalmente, «grande».
    reason: alternative_reading
  - marker: d
    text: O «y fueran bajados» o «y fueran quitados».
    reason: lexical_alternative
lexical_decisions:
- source_word: Οἱ οὖν Ἰουδαῖοι
  english_pob_choice: Therefore the Jews
  chosen_spanish: Entonces los judíos
  alternatives_spanish:
  - Así que los judíos
  - Por eso los judíos
  lexicon: BDAG
  rationale: οὖν expresa consecuencia o continuación narrativa; en español, «Entonces» conserva ese hilo discursivo sin volverlo mecánico. Ἰουδαῖοι se mantiene como «los judíos» en el texto principal, porque el contexto joánico no obliga aquí a restringirlo a líderes, aunque esa posibilidad queda documentada.
- source_word: ἐπεὶ παρασκευὴ ἦν
  english_pob_choice: because it was the day of preparation
  chosen_spanish: como era el día de preparación
  alternatives_spanish:
  - porque era el día de preparación
  - ya que era el día de preparación
  lexicon: BDAG
  rationale: παρασκευή designa el día de preparación antes del sábado. «Día de preparación» conserva el valor lexical; «como era» traduce la explicación causal con naturalidad en español. No se reemplaza por una fórmula litúrgica más opaca.
- source_word: ἐπὶ τοῦ σταυροῦ
  english_pob_choice: on the cross
  chosen_spanish: en la cruz
  alternatives_spanish:
  - sobre la cruz
  lexicon: BDAG
  rationale: La relación locativa en español se expresa naturalmente con «en la cruz». Aunque el griego usa ἐπί con genitivo, aquí el sentido es de permanencia sobre el instrumento de ejecución.
- source_word: ἐν τῷ σαββάτῳ
  english_pob_choice: on the Sabbath
  chosen_spanish: durante el sábado
  alternatives_spanish:
  - en el sábado
  lexicon: BDAG
  rationale: Para un marco temporal, «durante el sábado» comunica mejor el valor temporal que una calca literal. Mantiene claro que el impedimento es la duración del día sagrado.
- source_word: ἦν γὰρ μεγάλη ἡ ἡμέρα ἐκείνου τοῦ σαββάτου
  english_pob_choice: for that Sabbath day was a great one
  chosen_spanish: pues aquel sábado era un día grande
  alternatives_spanish:
  - pues aquel sábado era un día muy importante
  - pues aquel sábado era un día alto
  lexicon: BDAG
  rationale: μέγας se vierte de forma directa como «grande» para no borrar la tensión lexical. Se evita sustituirlo por «importante» en el texto principal, aunque esa sea una inferencia natural, porque el griego dice literalmente «grande».
- source_word: ἠρώτησαν τὸν Πιλᾶτον
  english_pob_choice: asked Pilate
  chosen_spanish: pidieron a Pilato
  alternatives_spanish:
  - preguntaron a Pilato
  - solicitaron a Pilato
  lexicon: BDAG
  rationale: Aquí ἐρωτάω tiene fuerza de petición formal; «pidieron» comunica mejor el sentido que un simple «preguntaron». Se conserva la referencia directa a Pilato como destinatario de la petición.
- source_word: ἵνα κατεαγῶσιν αὐτῶν τὰ σκέλη
  english_pob_choice: that their legs might be broken
  chosen_spanish: que les quebraran las piernas
  alternatives_spanish:
  - que sus piernas fueran quebradas
  - que les rompieran las piernas
  lexicon: BDAG
  rationale: κατάγνυμι significa romper/quebrar; en español, «quebraran las piernas» preserva la violencia física y evita un tecnicismo excesivamente formal. El dativo posesivo implícito se expresa de manera idiomática con «les».
- source_word: καὶ ἀρθῶσιν
  english_pob_choice: and they might be taken away
  chosen_spanish: y fueran retirados
  alternatives_spanish:
  - y fueran llevados
  - y fueran quitados
  lexicon: BDAG
  rationale: αἴρω puede significar quitar, remover o llevarse. En este contexto de crucifixión, «retirados» comunica la remoción de los cuerpos sin imponer «bajados» como si el verbo griego lo especificara directamente.
theological_decisions:
- issue: Referente de Ἰουδαῖοι en Juan
  english_pob_reading: Rendered as 'the Jews' in the main text, with a note that it can sometimes refer to Judean authorities or leaders.
  chosen_spanish_reading: Se mantiene «los judíos» en el texto principal, con nota sobre la posible referencia a autoridades o líderes judeanos.
  alternative_spanish_readings:
  - los judeanos
  - las autoridades judías
  rationale: El texto no restringe explícitamente el referente, y el POB inglés preserva esa tensión interpretativa. En español, «los judíos» sigue siendo la forma más directa y auditivamente fiel, mientras la nota documenta la posible especificación contextual sin imponerla.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; avoid importing interpretive narrowing not stated by the text.'
- issue: Sentido de μεγάλη aplicado al sábado
  english_pob_reading: Rendered literally as 'a great one' rather than the traditional 'a high day.'
  chosen_spanish_reading: «un día grande» en lugar de «un gran día de fiesta» o «un día solemne» en el cuerpo principal.
  alternative_spanish_readings:
  - un día importante
  - un día solemne
  - un día de gran importancia
  rationale: La expresión griega es literalmente «grande», y el POB inglés opta por conservar esa literalidad. En español, «día grande» retiene la tensión entre literalidad y claridad sin encerrar el sentido en una fórmula tradicional que podría sonar interpretativa.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; maintain lexical transparency.'
translation_notes:
  revision_awareness: Revisado a la luz del paquete fuente griego y del audit trail inglés; se mantuvo la decisión de no resolver la ambigüedad de Ἰουδαῖοι en el texto principal y de conservar la literalidad de μεγάλη sin adoptar la fórmula tradicional «día de fiesta solemne».
  spanish_consistency_notes:
  - Se mantiene el nombre propio «Pilato» con ortografía española estándar.
  - «Día de preparación» se usa de manera uniforme para παρασκευή.
  - Se evita «SEÑOR» o equivalentes, porque el verso no contiene el nombre divino ni κύριος.
  - La pasiva de ἀρθῶσιν se expresa de forma natural en español sin perder el sentido de remoción del cuerpo.
