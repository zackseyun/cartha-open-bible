base_translation:
  language: en
  yaml_path: translation/nt/john/019/031.yaml
  text: Therefore the Jews[a], because it was the day of preparation[d][c][b], asked Pilate that the bodies might not remain on the cross on the Sabbath—for that Sabbath day was a great one—and that their legs might be broken and they might be taken away.
  footnotes:
  - marker: a
    text: Or 'Preparation Day.' The term refers to the day of preparation before the Sabbath.
    reason: lexical_alternative
  - marker: b
    text: Or 'for that Sabbath was a high day,' meaning an especially significant Sabbath.
    reason: alternative_reading
  - marker: c
    text: '''The Jews'' could in Johannine context sometimes refer more specifically to the Judean authorities or leaders.'
    reason: alternative_reading
  - marker: d
    text: Or 'and removed' or 'and taken down.'
    reason: lexical_alternative
