    text: O «y fueran bajados» o «y fueran quitados».
    reason: lexical_alternative
  revision_rationale: Se elimina la repetición de 'pidieron' para seguir la sintaxis del griego con un solo verbo principal y dos cláusulas coordinadas de propósito. Se explicita 'los cuerpos' en la cláusula final para evitar ambigüedad del referente y preservar que la remoción recae sobre los cuerpos, no sobre las piernas. Se ajusta la nota [c] para reflejar mejor la alternativa tradicional documentada en el audit trail inglés.
