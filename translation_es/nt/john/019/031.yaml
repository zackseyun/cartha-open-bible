revisions:
- from: Entonces los judíos[a], como era el día de preparación[b], pidieron a Pilato que los cuerpos no quedaran en la cruz durante el sábado, pues aquel sábado era un día grande[c]; y pidieron que les quebraran las piernas y fueran retirados[d].
  to: Entonces los judíos[a], como era el día de preparación[b], pidieron a Pilato que los cuerpos no quedaran en la cruz durante el sábado, pues aquel sábado era un día grande[c], y que les quebraran las piernas y los cuerpos fueran retirados[d].
  rationale: Se elimina la repetición de 'pidieron' para seguir la sintaxis del griego con un solo verbo principal y dos cláusulas coordinadas de propósito. Se explicita 'los cuerpos' en la cláusula final para evitar ambigüedad del referente y preservar que la remoción recae sobre los cuerpos, no sobre las piernas. Se ajusta la nota [c] para reflejar mejor la alternativa tradicional documentada en el audit trail inglés.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:05:04Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura y el sentido general del griego: causalidad por la preparación, propósito de que los cuerpos no permanecieran en la cruz durante el sábado, explicación de la especial importancia de ese sábado, y la petición de quebrar las piernas y remover los cuerpos. Sin embargo, introduce una repetición no presente en el original (''y pidieron''), y el cierre ''fueran retirados'' queda ambiguo en español porque su antecedente más cercano puede parecer ''las piernas'' en vez de ''los cuerpos''. También conviene reflejar mejor la relación de propósito coordinado del segundo ἵνα.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero hay dos tropiezos de fluidez/fidelidad: la duplicación de ''pidieron'' rompe la sintaxis del original, y la pasiva final resulta algo confusa. ''Durante el sábado'' es aceptable, aunque ''en sábado'' o ''en el sábado'' serían menos naturales; la formulación actual no requiere cambio por sí sola. ''Un día grande'' suena algo literal, pero está justificado por la decisión léxica documentada y sigue siendo comprensible con nota.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Los judíos' concuerda con la decisión auditada, con nota alternativa adecuada. 'Día de preparación' y 'día grande' siguen la racionalidad del POB inglés. No aparecen términos de glosario mayor como Yahvé, Mesías, Espíritu, etc.
  issues:
  - severity: medium
    issue: Se añade un segundo 'pidieron' no presente en el griego.
    rationale: El original tiene un solo verbo principal ἠρώτησαν con dos cláusulas de propósito introducidas por ἵνα. Repetir 'pidieron' en español altera la estructura y da más peso retórico del que tiene el texto fuente.
  - severity: high
    issue: La frase final 'y fueran retirados' es ambigua en cuanto a su referente.
    rationale: En español, tras 'que les quebraran las piernas', el lector puede entender que 'fueran retirados' se refiere a las piernas o a las personas de manera imprecisa. El griego se refiere a la remoción de los cuerpos; conviene explicitarlo en español para preservar sentido claro y fiel.
  - severity: low
    issue: La nota [c] no refleja la alternativa tradicional 'día alto' / 'sábado de gran solemnidad' preservada en el audit trail inglés.
    rationale: Aunque la nota actual es válida, el POB inglés también documenta la alternativa tradicional 'high day'. En español puede incorporarse esa posibilidad sin desplazar la lectura principal.
  revised_spanish_text: Entonces los judíos[a], como era el día de preparación[b], pidieron a Pilato que los cuerpos no quedaran en la cruz durante el sábado, pues aquel sábado era un día grande[c], y que les quebraran las piernas y los cuerpos fueran retirados[d].
  revised_footnotes:
