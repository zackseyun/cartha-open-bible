revisions:
- from: 'Entonces Jesús, al ver a su madre y al discípulo a quien amaba, que estaban allí, le dice a su madre: «Mujer,[a] ahí tienes a tu hijo».'
  to: 'Entonces, Jesús, al ver a su madre y al discípulo a quien amaba, que estaba allí, le dice a su madre: «Mujer,[a] ahí está tu hijo».'
  rationale: La revisión corrige la referencia sintáctica de παρεστῶτα para que modifique solo al discípulo («que estaba allí») y ajusta la presentación final a una construcción española más fiel a la identificación solemne del griego («ahí está tu hijo»). Se conserva «Mujer» con nota, en conformidad con la decisión léxica y teológica documentada por el POB inglés.
