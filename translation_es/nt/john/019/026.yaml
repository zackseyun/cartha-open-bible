review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura general y conserva adecuadamente el presente histórico («le dice») y el vocativo Γύναι con nota explicativa. Sin embargo, introduce un problema de concordancia y referencia en «que estaban allí», porque el griego singular παρεστῶτα modifica solo «al discípulo», no a la madre y al discípulo juntos. Además, «a tu hijo» después de «ahí tienes» suena menos natural aquí que «tu hijo» o «ahí está tu hijo».
  spanish_quality_summary: El español es generalmente claro y digno, pero la relativa «que estaban allí» es gramaticalmente ambigua y de hecho cambia el sentido al pluralizar el participio referido al discípulo. También conviene ajustar la puntuación para que la frase fluya mejor. «Mujer» con nota es aceptable en línea con el POB inglés.
  glossary_alignment: No hay términos del glosario mayor en juego salvo Ἰησοῦς -> «Jesús», correctamente aplicado. La decisión de mantener «Mujer» para Γύναι concuerda con la racionalidad documentada, con nota pastoral adecuada. «He aquí» sería más cercano a «behold», pero «ahí tienes»/«ahí está» puede funcionar en español; en esta revisión se prefiere «ahí está tu hijo» para evitar el acusativo impropio «a tu hijo» y conservar la fuerza de presentación.
  issues:
  - severity: high
    issue: «que estaban allí» atribuye la acción/estado a la madre y al discípulo, pero el griego singular παρεστῶτα modifica solo «al discípulo».
    rationale: 'Esto altera la sintaxis y el foco del original: Jesús ve a su madre y, además, al discípulo que estaba allí.'
  - severity: medium
    issue: «a tu hijo» tras «ahí tienes» no representa bien la estructura predicativa «ἴδε ὁ υἱός σου».
    rationale: El griego presenta una identificación («he aquí tu hijo»), no un objeto directo marcado con «a». En español suena más fiel y natural «ahí está tu hijo» o «he aquí tu hijo».
  - severity: low
    issue: La colocación de comas en la apertura puede mejorarse.
    rationale: «Entonces, Jesús, al ver...» suena más natural y ordenado en español narrativo que la secuencia sin coma inicial.
  revised_spanish_text: 'Entonces, Jesús, al ver a su madre y al discípulo a quien amaba, que estaba allí, le dice a su madre: «Mujer,[a] ahí está tu hijo».'
  revised_footnotes:
  - marker: a
    text: O «Querida mujer» o «Señora». El vocativo griego es respetuoso, no rudo, aunque «Mujer» puede sonar más tajante para lectores modernos.
    reason: lexical_alternative
  revision_rationale: La revisión corrige la referencia sintáctica de παρεστῶτα para que modifique solo al discípulo («que estaba allí») y ajusta la presentación final a una construcción española más fiel a la identificación solemne del griego («ahí está tu hijo»). Se conserva «Mujer» con nota, en conformidad con la decisión léxica y teológica documentada por el POB inglés.
