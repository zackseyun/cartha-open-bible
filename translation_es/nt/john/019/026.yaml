translation:
  language: es
  text: 'Entonces, Jesús, al ver a su madre y al discípulo a quien amaba, que estaba allí, le dice a su madre: «Mujer,[a] ahí está tu hijo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Querida mujer» o «Señora». El vocativo griego es respetuoso, no rudo, aunque «Mujer» puede sonar más tajante para lectores modernos.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Entonces
  alternatives_spanish:
  - Así que
  - Por tanto
  lexicon: BDAG
  rationale: Marca la progresión narrativa de manera natural en español sin forzar una relación inferencial más fuerte de la que el contexto exige.
- source_word: ἰδὼν
  english_pob_choice: when ... saw
  chosen_spanish: al ver
  alternatives_spanish:
  - cuando vio
  - habiendo visto
  lexicon: BDAG
  rationale: El participio aoristo se vierte con valor temporal en una estructura fluida del español, preservando la secuencia de acciones.
- source_word: τὴν μητέρα
  english_pob_choice: his mother
  chosen_spanish: su madre
  alternatives_spanish:
  - la madre de Jesús
  - la madre
  lexicon: BDAG
  rationale: En español, el posesivo es idiomático y hace explícito el referente; el texto griego lo deja implícito por contexto.
- source_word: τὸν μαθητὴν
  english_pob_choice: the disciple
  chosen_spanish: el discípulo
  alternatives_spanish:
  - un discípulo
  - el seguidor
  lexicon: BDAG
  rationale: Se conserva el artículo definido para reflejar que se trata de un discípulo identificable en el relato joánico.
- source_word: παρεστῶτα
  english_pob_choice: standing there
  chosen_spanish: que estaban allí
  alternatives_spanish:
  - de pie allí
  - que estaba allí
  lexicon: BDAG
  rationale: El participio perfecto describe su presencia en la escena; en español se expresa de forma natural con una relativa que incluye la localización, manteniendo la imagen sin sonar forzado.
- source_word: ὃν ἠγάπα
  english_pob_choice: whom he loved
  chosen_spanish: a quien amaba
  alternatives_spanish:
  - a quien él amaba
  - el discípulo a quien amaba
  lexicon: BDAG
  rationale: Se preserva la identificación relacional del discípulo por el amor de Jesús, sin repetir innecesariamente el sujeto implícito.
- source_word: λέγει
  english_pob_choice: he says
  chosen_spanish: le dice
  alternatives_spanish:
  - dijo
  - le dijo
  lexicon: BDAG
  rationale: El presente histórico griego se mantiene con el presente narrativo español, que conserva viveza y concordancia estilística.
- source_word: τῇ μητρί
  english_pob_choice: to his mother
  chosen_spanish: a su madre
  alternatives_spanish:
  - a la madre
  - a la madre de Jesús
  lexicon: BDAG
  rationale: La preposición y el dativo introducen el destinatario del habla; en español se expresa con el dativo personal natural.
- source_word: Γύναι
  english_pob_choice: Woman
  chosen_spanish: Mujer
  alternatives_spanish:
  - Mujer querida
  - Señora
  lexicon: BDAG
  rationale: Se conserva el vocativo directo del original. En español, «Mujer» puede sonar duro, pero reproduce la forma léxica y mantiene la tensión documentada en el POB inglés.
- source_word: ἴδε
  english_pob_choice: behold
  chosen_spanish: ahí tienes
  alternatives_spanish:
  - mira
  - he aquí
  lexicon: BDAG
  rationale: El imperativo deíctico introduce una declaración solemne; «ahí tienes» comunica de forma natural la presentación/mostración del hijo en español, evitando un calco poco idiomático.
- source_word: ὁ υἱός σου
  english_pob_choice: your son
  chosen_spanish: a tu hijo
  alternatives_spanish:
  - tu hijo
  - he aquí tu hijo
  lexicon: BDAG
  rationale: En el español de esta construcción, el objeto presentado se expresa con 'a'; mantiene la fuerza identificadora del predicado griego y la relación filial.
theological_decisions:
- issue: Tono del vocativo Γύναι dirigido a María
  english_pob_reading: Mantener «Woman» en el texto principal, con nota aclarando que es respetuoso y no grosero.
  chosen_spanish_reading: Mantener «Mujer» en el texto principal, con nota aclarando que el vocativo es respetuoso y no abrupto.
  alternative_spanish_readings:
  - Querida mujer
  - Señora
  rationale: El griego no codifica descortesía. Traducirlo con un vocativo más afectuoso suavizaría indebidamente la forma léxica; la nota evita una lectura moderna equivocada sin borrar la tensión del original.
  doctrine_reference: Principio de primacía del texto original; preservación de la fuerza lexical con aclaración pastoral cuando la recepción moderna puede inducir error.
translation_notes:
  revision_awareness: Se siguió el último pase de revisión sin cambios sustantivos; el punto sensible principal es el vocativo Γύναι, donde se conserva la forma directa por fidelidad al original y se añade una nota para prevenir una mala lectura en español.
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς.
  - Se conserva «discípulo» para μαθητής, en línea con el contexto joánico.
  - Se usa presente narrativo («le dice») para reflejar el presente histórico de λέγει.
  - Se evita sustituir el vocativo por un tratamiento más interpretativo que borre la tensión documentada en el audit trail.
