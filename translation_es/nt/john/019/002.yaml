- from: Y los soldados, después de entretejer una corona[a] de espinas, se la pusieron sobre la cabeza, y lo vistieron con un manto púrpura.
  to: Y los soldados[a], después de tejer una corona de espinas, se la pusieron sobre su cabeza y lo vistieron con una prenda púrpura.
  rationale: Se ajusta «entretejer» a «tejer» por mayor naturalidad, «sobre la cabeza» a «sobre su cabeza» por fidelidad explícita al griego, y «manto» a «prenda» para reflejar mejor el sentido amplio de ἱμάτιον y el rationale documentado en el historial inglés. La nota alternativa se actualiza para corresponder exactamente al texto revisado.
