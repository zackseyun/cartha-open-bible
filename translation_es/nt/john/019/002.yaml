review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia y el sentido del griego: los soldados trenzan una corona de espinas, la ponen sobre la cabeza de Jesús y lo visten con una prenda púrpura. También preserva adecuadamente el participio de anterioridad («después de…») y evita añadir interpretación sobre la burla real. Sin embargo, «se la pusieron sobre la cabeza» omite el posesivo explícito de αὐτοῦ («su/cabeza de él»), y «manto» estrecha algo más de la cuenta el sentido más amplio de ἱμάτιον, especialmente dado que el propio historial inglés fue revisado de ‘robe’ a ‘garment’ para no sobreespecificar.'
  spanish_quality_summary: 'El español es claro y digno, pero tiene dos mejoras de naturalidad/fidelidad: 1) «sobre su cabeza» suena más completo y fiel que «sobre la cabeza» en este contexto; 2) «prenda púrpura» o «vestidura púrpura» refleja mejor el carácter genérico de ἱμάτιον que «manto». Además, «entretejer» es comprensible, pero «tejer» resulta más natural en español bíblico general sin perder el sentido.'
  glossary_alignment: No hay conflictos con la terminología doctrinal principal del proyecto. «Soldados», «corona», «espinas» y «púrpura» están bien alineados. La única desviación relevante es «manto» para ἱμάτιον, donde conviene una opción más amplia como «prenda».
  issues:
  - severity: medium
    issue: «manto» sobreespecifica ἱμάτιον
    rationale: El griego ἱμάτιον denota una prenda/vestido exterior de forma amplia. El expediente inglés fue revisado explícitamente a ‘garment’ para evitar una especificación excesiva. «Manto» puede sugerir una pieza concreta más estrecha.
  - severity: low
    issue: Falta el posesivo en «sobre la cabeza»
    rationale: αὐτοῦ τῇ κεφαλῇ se expresa de manera más fiel y natural en español como «sobre su cabeza». La forma actual sigue siendo entendible, pero deja menos explícita la referencia.
  - severity: low
    issue: «entretejer» suena algo forzado
    rationale: Aunque no es incorrecto, «tejer una corona de espinas» es más idiomático y suficientemente preciso para πλέξαντες en español general.
  revised_spanish_text: Y los soldados[a], después de tejer una corona de espinas, se la pusieron sobre su cabeza y lo vistieron con una prenda púrpura.
