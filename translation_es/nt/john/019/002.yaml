translation:
  language: es
  text: Y los soldados[a], después de tejer una corona de espinas, se la pusieron sobre su cabeza y lo vistieron con una prenda púrpura.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «habiendo tejido una corona de espinas, se la pusieron sobre su cabeza y lo vistieron con una prenda púrpura».'
    reason: lexical_alternative
lexical_decisions:
- source_word: στρατιῶται
  english_pob_choice: soldiers
  chosen_spanish: soldados
  alternatives_spanish:
  - tropas
  lexicon: BDAG
  rationale: En este contexto narrativo, στρατιῶται se refiere de manera natural a personal militar romano; «soldados» es el equivalente directo, claro y preciso en español.
- source_word: πλέξαντες
  english_pob_choice: after weaving
  chosen_spanish: después de entretejer
  alternatives_spanish:
  - habiendo entretejido
  - tras entretejer
  - después de tejer
  lexicon: BDAG
  rationale: El participio aoristo antecede a la acción principal; «después de entretejer» conserva la anterioridad y suena natural en español moderno, sin perder el matiz de fabricación del objeto.
- source_word: στέφανον
  english_pob_choice: crown
  chosen_spanish: corona
  alternatives_spanish:
  - guirnalda
  - diadema
  lexicon: BDAG
  rationale: En esta escena de parodia real, «corona» comunica mejor la función simbólica del στέφανον. «Guirnalda» suavizaría demasiado el sentido; «diadema» introduciría una connotación más técnica que el contexto no exige.
- source_word: ἐξ ἀκανθῶν
  english_pob_choice: of thorns
  chosen_spanish: de espinas
  alternatives_spanish:
  - de cardos
  - hecha de espinas
  lexicon: BDAG
  rationale: La construcción expresa material/origen. En español, «de espinas» conserva la imagen concreta y es más idiomático que calcar la preposición de modo rígido.
- source_word: ἐπέθηκαν αὐτοῦ τῇ κεφαλῇ
  english_pob_choice: put it on his head
  chosen_spanish: se la pusieron sobre la cabeza
  alternatives_spanish:
  - se la colocaron sobre la cabeza
  - la pusieron sobre su cabeza
  lexicon: BDAG
  rationale: La combinación griega con pronombre genitivo y dativo se expresa con naturalidad en español como «se la pusieron sobre la cabeza». Mantiene el objeto implícito en el pronombre y evita una construcción demasiado literal.
- source_word: ἱμάτιον
  english_pob_choice: garment
  chosen_spanish: manto
  alternatives_spanish:
  - vestidura
  - ropa
  - prenda
  lexicon: BDAG
  rationale: ἱμάτιον es un vestido/ropa exterior. «Manto» es suficientemente amplio y digno en español, y evita restringir indebidamente el término a una prenda más específica como «ropa» o «vestidura».
- source_word: πορφυροῦν
  english_pob_choice: purple
  chosen_spanish: púrpura
  alternatives_spanish:
  - morado
  - purpúreo
  lexicon: BDAG
  rationale: «Púrpura» reproduce el color y su carga regio-simbólica en un registro natural y bíblicamente reconocible en español. «Morado» puede sonar más cromático que histórico; «purpúreo» es más literario.
- source_word: περιέβαλον αὐτόν
  english_pob_choice: clothed him in
  chosen_spanish: lo vistieron con
  alternatives_spanish:
  - lo envolvieron con
  - lo cubrieron con
  lexicon: BDAG
  rationale: περιβάλλω con un prenda puede significar vestir o poner encima. «Lo vistieron con» transmite bien la acción sin sobreinterpretar y encaja con el gesto de investidura burlesca del contexto.
theological_decisions:
- issue: La burla real implícita en la corona y el vestido púrpura
  english_pob_reading: Render the clothing and crown language straightforwardly without adding interpretive explanation.
  chosen_spanish_reading: Traducir de manera directa la corona de espinas y el manto púrpura sin añadir ‘burlándose’ ni explicaciones interpretativas.
  alternative_spanish_readings:
  - lo coronaron y vistieron para burlarse de él
  - corona real improvisada y manto púrpura
  rationale: El contexto deja clara la burla; el versículo no necesita explicitarla con añadidos que la fuente no dice. Mantener la narración desnuda preserva la fuerza del texto y permite que el lector perciba la ironía por el contexto inmediato.
  doctrine_reference: 'Principio de fidelidad al texto fuente: no paraphrase beyond what the source text warrants.'
translation_notes:
  revision_awareness: La revisión inglesa reciente prefirió ‘of thorns’ frente a ‘out of thorns’ y ‘purple garment’ frente a ‘purple robe’ para mayor naturalidad y amplitud semántica. En español, eso se refleja con «de espinas» y «manto púrpura», manteniendo el valor general de ἱμάτιον sin especificar indebidamente una prenda más estrecha.
  spanish_consistency_notes:
  - He usado «púrpura» como color/tono regio, en línea con el valor simbólico del contexto.
  - He preferido «corona» para στέφανον y no «guirnalda», porque la escena es de parodia real.
  - «Manto» se eligió como equivalente amplio de ἱμάτιον, sin forzarlo a ‘túnica’ o ‘ropa’.
  - La nota de alternativa conserva el matiz participial y la secuencia temporal del griego.
  - No se introdujo lenguaje explícito de burla en el cuerpo del versículo, siguiendo el audit trail inglés.
