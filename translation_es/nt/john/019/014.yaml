translation:
  language: es
  text: 'Ahora bien, era el día de preparación de la Pascua; era alrededor de la hora sexta[a]. Y dice a los judíos[b]: «¡Miren, su rey!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, posiblemente en términos modernos, «alrededor del mediodía», dependiendo de cómo se cuente la hora.
    reason: cultural_note
  - marker: b
    text: «Los judíos» puede referirse en contexto más específicamente a las autoridades o líderes judíos.
    reason: alternative_reading
lexical_decisions:
- source_word: παρασκευὴ
  english_pob_choice: day of preparation
  chosen_spanish: día de preparación
  alternatives_spanish:
  - preparación
  - día previo de preparación
  lexicon: BDAG
  rationale: En este contexto, παρασκευή nombra un día concreto de preparación para la fiesta. «Día de preparación» conserva el sentido temporal sin volverlo opaco en español.
- source_word: τοῦ πάσχα
  english_pob_choice: of the Passover
  chosen_spanish: de la Pascua
  alternatives_spanish:
  - para la Pascua
  - de la fiesta de Pascua
  lexicon: BDAG
  rationale: El genitivo se refleja de manera natural como «de la Pascua», manteniendo la relación con la fiesta sin añadir interpretación.
- source_word: ὥρα ... ἕκτη
  english_pob_choice: it was about the sixth hour
  chosen_spanish: era como la hora sexta
  alternatives_spanish:
  - era aproximadamente el mediodía
  - era cerca de la hora sexta
  lexicon: BDAG
  rationale: Se conserva la expresión de hora antigua y el matiz aproximativo de ὡς mediante «como». «Hora sexta» preserva la forma fuente; la equivalencia moderna queda solo como posibilidad interpretativa.
- source_word: λέγει
  english_pob_choice: he says
  chosen_spanish: dice
  alternatives_spanish:
  - dijo
  lexicon: BDAG
  rationale: El presente histórico del griego se expresa con «dice» para mantener la viveza narrativa que el POB inglés preserva.
- source_word: τοῖς Ἰουδαίοις
  english_pob_choice: to the Jews
  chosen_spanish: a los judíos
  alternatives_spanish:
  - a los dirigentes judíos
  - a los judeanos
  lexicon: BDAG
  rationale: Se mantiene la referencia directa del texto griego. Aunque el contexto de Juan a veces puede aludir más estrechamente a autoridades, aquí no se restringe explícitamente.
- source_word: Ἴδε
  english_pob_choice: Behold
  chosen_spanish: ¡Miren!
  alternatives_spanish:
  - ¡Miren aquí!
  - ¡He aquí!
  lexicon: BDAG
  rationale: Para español actual, «¡Miren!» comunica la fuerza deíctica y pública de Ἴδε con mayor naturalidad que «He aquí», sin perder solemnidad.
- source_word: ὁ βασιλεὺς ὑμῶν
  english_pob_choice: your king
  chosen_spanish: su rey
  alternatives_spanish:
  - su rey de ustedes
  - el rey de ustedes
  lexicon: BDAG
  rationale: Se prefiere «su rey» por fluidez y porque el posesivo ya expresa el golpe irónico de la declaración. «Su» puede abarcar el valor de pertenencia del griego sin sobrecargar la frase.
theological_decisions:
- issue: Referencia de «los judíos» en Juan
  english_pob_reading: Retain 'the Jews' in the main text
  chosen_spanish_reading: Mantener «a los judíos» en el texto principal
  alternative_spanish_readings:
  - a los dirigentes judíos
  - a los judeanos
  rationale: El griego dice simplemente τοῖς Ἰουδαίοις. No se introduce una restricción interpretativa que el verso no formula, aunque el contexto permita matices más específicos.
  doctrine_reference: Principios de traducción POB §1, §3, §5
- issue: Notación temporal antigua «la hora sexta»
  english_pob_reading: Preserve the source-oriented expression in the main text
  chosen_spanish_reading: Conservar «la hora sexta» con el aproximativo «como»
  alternative_spanish_readings:
  - aproximadamente al mediodía
  - cerca del mediodía
  rationale: Se preserva la forma temporal de la fuente y el matiz de aproximación. No se resuelve por completo la cuestión del cómputo horario antiguo dentro del texto principal.
  doctrine_reference: Principios de traducción POB §1, §3
translation_notes:
  revision_awareness: Se siguió el cierre de revisión del inglés POB que ajustó la relación de τοῦ πάσχα a «of the Passover»; por ello el español usa «de la Pascua». También se preservó la lectura con hora antigua y el presente histórico de λέγει, sin introducir una paráfrasis cronológica no exigida por el griego.
  spanish_consistency_notes:
  - Se mantiene Yahvé como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva el presente narrativo «dice» para coherencia con el estilo joánico en español.
  - Se evita «Cristo» porque el término griego aquí es βασιλεύς, no Χριστός.
  - La puntuación sigue el tono de cita directa y la deíxis fuerte del original.
