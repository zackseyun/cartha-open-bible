    rationale: ἔθηκαν aquí describe colocar el cuerpo de Jesús en el sepulcro. «Lo colocaron» preserva mejor el contexto de sepultura y mantiene buena naturalidad en español.
  - severity: low
    issue: Puntuación algo rígida tras «allí»
    rationale: «Así que allí por ser…» o «Por eso, allí…» fluye mejor que una coma inmediatamente después de «allí», que corta innecesariamente la oración.
  revised_spanish_text: Así que allí, por ser el día de preparación de los judíos[a], como la tumba estaba cerca, colocaron a Jesús allí.
