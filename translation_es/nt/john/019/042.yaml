    issue: «por la preparación de los judíos» es poco natural en español
    rationale: Aunque reproduce de cerca el griego, en español moderno eclesial suena opaco. «por ser el día de preparación de los judíos» comunica la causalidad y el término técnico con más claridad, en línea con la nota inglesa.
  - severity: medium
