translation:
  language: es
  text: Así que allí, por ser el día de preparación de los judíos[a], como la tumba estaba cerca, colocaron a Jesús allí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por la preparación de los judíos» o «porque era la Preparación de los judíos».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκεῖ
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - allá
  lexicon: BDAG
  rationale: El adverbio locativo marca el lugar donde lo enterraron. «Allí» reproduce de manera natural la referencia espacial sin añadir matices indebidos.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - por tanto
  - entonces
  lexicon: BDAG
  rationale: La partícula conecta con la narración previa y sugiere continuidad/consecuencia. «Así que» suena natural en español y conserva ese enlace discursivo.
- source_word: διὰ τὴν παρασκευὴν
  english_pob_choice: because of ... day of preparation
  chosen_spanish: por la preparación
  alternatives_spanish:
  - a causa de la preparación
  - debido a la preparación
  - por el día de preparación
  lexicon: BDAG
  rationale: διά con acusativo expresa causa o motivo. «Preparación» preserva el término técnico sin sobreexplicarlo dentro del texto principal; la nota recoge la posibilidad de «día de preparación».
- source_word: τῶν Ἰουδαίων
  english_pob_choice: the Jews’
  chosen_spanish: de los judíos
  alternatives_spanish:
  - judía
  - de los judíos
  lexicon: BDAG
  rationale: El genitivo modifica «preparación». «De los judíos» sigue de cerca la estructura griega y evita decidir en el texto principal entre valor étnico, religioso o consuetudinario.
- source_word: ὅτι
  english_pob_choice: since
  chosen_spanish: como
  alternatives_spanish:
  - porque
  - ya que
  lexicon: BDAG
  rationale: Aquí introduce la razón explicativa por la que eligieron esa tumba. «Como» funciona de manera fluida en español con valor causal/expositivo.
- source_word: ἐγγὺς
  english_pob_choice: nearby
  chosen_spanish: cerca
  alternatives_spanish:
  - próxima
  - al lado
  lexicon: BDAG
  rationale: Adverbio de proximidad; «cerca» es claro y natural con «estaba».
- source_word: μνημεῖον
  english_pob_choice: tomb
  chosen_spanish: tumba
  alternatives_spanish:
  - sepulcro
  - tumba
  lexicon: BDAG
  rationale: En este contexto funerario, «tumba» es transparente para lectores modernos y conserva el sentido de lugar de entierro. «Sepulcro» también es posible, pero suena más tradicional.
- source_word: ἔθηκαν
  english_pob_choice: they laid
  chosen_spanish: pusieron
  alternatives_spanish:
  - depositaron
  - colocaron
  - pusieron
  lexicon: BDAG
  rationale: Aoristo de τίθημι para el acto de colocar el cuerpo en la tumba. «Pusieron» es sencillo y fiel; «colocaron» sería más formal pero menos natural en este contexto narrativo.
- source_word: τὸν Ἰησοῦν
  english_pob_choice: Jesus
  chosen_spanish: a Jesús
  alternatives_spanish:
  - a Jesús
  lexicon: BDAG
  rationale: Objeto directo personal en español requiere la preposición «a». Se mantiene el nombre propio sin sustitución litúrgica.
theological_decisions:
- issue: Sentido de παρασκευή en un contexto de Pasión
  english_pob_reading: day of preparation
  chosen_spanish_reading: la preparación
  alternative_spanish_readings:
  - el día de preparación
  - la Preparación
  rationale: El griego puede funcionar como rótulo calendárico. En el texto principal, «la preparación» deja visible el término sin imponer una glosa más específica; la nota ofrece la lectura alternativa de «día de preparación» para no perder la posible fuerza técnica.
  doctrine_reference: Hermenéutica textual y equivalencia óptima; no se añade información calendárica que el versículo no explicita.
- issue: El genitivo τῶν Ἰουδαίων en Juan
  english_pob_reading: the Jews’ day of preparation
  chosen_spanish_reading: de los judíos
  alternative_spanish_readings:
  - judía
  - de los judíos
  rationale: Se conserva la formulación cercana al griego sin convertirla en un calificativo teológico. En español, esta redacción mantiene visible la relación genitiva y evita suavizar o intensificar el alcance del sintagma.
  doctrine_reference: Prioridad del texto original; mantener la expresión joánica sin lecturas doctrinales ajenas al versículo.
translation_notes:
  revision_awareness: La redacción española incorpora la última revisión del inglés auditado, que añadió el equivalente final de ἐκεῖ («allí») para completar naturalmente la oración y mantener la referencia locativa al lugar del entierro.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando corresponda, pero este versículo no lo contiene.
  - Se mantiene «Jesús» como nombre propio sin formas litúrgicas alternativas.
  - «Tumba» se eligió por claridad; en contextos cercanos puede alternar con «sepulcro» según el registro del libro.
  - 'La construcción «pusieron a Jesús allí» conserva la doble referencia locativa del griego: el lugar previo («allí») y el cierre narrativo («allí»).'
