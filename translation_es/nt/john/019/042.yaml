  spanish_quality_summary: 'El texto es comprensible, pero presenta dos asperezas estilísticas importantes: «por la preparación de los judíos» no es una formulación idiomática clara para lectores contemporáneos, y «pusieron a Jesús allí» resulta demasiado coloquial para un contexto solemne de sepultura. «lo colocaron» o «depositaron» encaja mejor con el registro y el contexto. También fluye mejor omitir la coma tras «allí».'
  glossary_alignment: 'No hay conflicto con la terminología del proyecto en nombres divinos o títulos. «Jesús» está correcto. La cuestión principal es contextual: παρασκευή puede mantenerse como «preparación», pero en español necesita una formulación más natural; y ἔθηκαν en contexto de sepultura pide una opción más digna que «pusieron».'
  issues:
