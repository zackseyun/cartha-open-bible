translation:
  language: es
  text: 'Entonces gritaron: «¡Fuera, fuera! ¡Crucifícalo!». Pilato les dijo: «¿He de crucificar a vuestro rey?». Los principales sacerdotes respondieron: «No tenemos más rey que César[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No tenemos rey sino César».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκραύγασαν
  english_pob_choice: they cried out
  chosen_spanish: gritaban
  alternatives_spanish:
  - clamaban
  - gritaban a voz en cuello
  lexicon: BDAG
  rationale: κραυγάζω señala un clamor fuerte; «gritaban» conserva la intensidad del acto de gritar sin añadir una emoción específica no explicitada por el griego.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - Entonces
  - Por tanto
  lexicon: BDAG
  rationale: Aquí οὖν marca continuidad narrativa; «Así que» fluye naturalmente en español y mantiene la relación consecuencial.
- source_word: ἐκεῖνοι
  english_pob_choice: they
  chosen_spanish: ellos
  alternatives_spanish:
  - aquellos
  - esos
  lexicon: BDAG
  rationale: El demostrativo añade énfasis; en español, «ellos» basta para sostener el sujeto sin volverlo áspero.
- source_word: Ἆρον ἆρον
  english_pob_choice: Away, away
  chosen_spanish: ¡Fuera, fuera!
  alternatives_spanish:
  - ¡Quítenlo, quítenlo!
  - ¡Fuera de aquí, fuera de aquí!
  lexicon: BDAG
  rationale: El imperativo repetido de αἴρω funciona como clamor idiomático de expulsión o remoción. «¡Fuera, fuera!» refleja el impulso y evita introducir un complemento no expreso en el griego.
- source_word: σταύρωσον αὐτόν
  english_pob_choice: Crucify him
  chosen_spanish: ¡Crucifícalo!
  alternatives_spanish:
  - ¡Crucifíquenlo!
  - ¡Que lo crucifiquen!
  lexicon: BDAG
  rationale: σταυρόω en contexto romano de ejecución se traduce de forma directa como «crucificar». El imperativo singular se conserva con «Crucifícalo».
- source_word: λέγει αὐτοῖς ὁ Πιλᾶτος
  english_pob_choice: Pilate said to them
  chosen_spanish: Pilato les dijo
  alternatives_spanish:
  - Pilato les dice
  lexicon: BDAG
  rationale: El presente histórico griego se vuelve pasado simple en español para una narración más natural, como en la POB inglesa.
- source_word: Τὸν βασιλέα ὑμῶν
  english_pob_choice: your king
  chosen_spanish: a vuestro rey
  alternatives_spanish:
  - a su rey
  - a vuestro rey
  lexicon: BDAG
  rationale: 'La pregunta de Pilato puede conservar mejor su ironía con el complemento directo adelantado: «¿A vuestro rey he de crucificar?». Mantiene el énfasis del griego y su desafío retórico.'
- source_word: σταυρώσω;
  english_pob_choice: Shall I crucify
  chosen_spanish: he de crucificar
  alternatives_spanish:
  - debo crucificar
  - voy a crucificar
  lexicon: BDAG
  rationale: El subjuntivo deliberativo se expresa con una construcción natural en español que preserve la pregunta retórica de Pilato; «he de crucificar» suena idiomático y serio.
- source_word: ἀπεκρίθησαν
  english_pob_choice: answered
  chosen_spanish: respondieron
  alternatives_spanish:
  - contestaron
  - replicaron
  lexicon: BDAG
  rationale: «Respondieron» es un equivalente narrativo claro y elegante para el verbo de respuesta.
- source_word: οἱ ἀρχιερεῖς
  english_pob_choice: The chief priests
  chosen_spanish: los principales sacerdotes
  alternatives_spanish:
  - los sumos sacerdotes
  - los jefes de los sacerdotes
  lexicon: BDAG
  rationale: ἀρχιερεῖς puede referirse al grupo de liderazgo sacerdotal; «principales sacerdotes» evita desplazar el registro hacia una forma litúrgica más tardía y sigue de cerca la designación funcional.
- source_word: Οὐκ ἔχομεν βασιλέα εἰ μὴ Καίσαρα
  english_pob_choice: We have no king except Caesar
  chosen_spanish: No tenemos más rey que César
  alternatives_spanish:
  - No tenemos rey sino César
  - No tenemos rey excepto César
  lexicon: BDAG
  rationale: «Más ... que» reproduce en español la exclusividad de εἰ μὴ de forma natural y enfática. Conserva la declaración política de lealtad exclusiva sin suavizarla.
theological_decisions:
- issue: La exclusividad de César como rey en la declaración final
  english_pob_reading: We have no king except Caesar
  chosen_spanish_reading: No tenemos más rey que César
  alternative_spanish_readings:
  - No tenemos rey sino César
  - No tenemos rey excepto César
  rationale: La frase se mantiene tajante para preservar la tensión narrativa y teológica del pasaje. No se armoniza ni se atenúa la afirmación de los principales sacerdotes.
  doctrine_reference: Preservar la tensión teológica y narrativa sin resolverla artificialmente.
translation_notes:
  revision_awareness: Se corrigió la nota al pie para anclarla explícitamente en la frase final del versículo y se evitó añadir elementos no explícitos al imperativo repetido, manteniendo la cercanía al griego y al auditable English POB trail.
  spanish_consistency_notes:
  - Se usó «principales sacerdotes» para ἀρχιερεῖς, coherente con la referencia al liderazgo sacerdotal.
  - Se mantuvo «César» como nombre propio transliterado, sin sustituirlo por una forma explicativa.
  - La nota [a] está anclada exactamente en la cláusula final para cumplir la validación de marcadores.
