- from: 'Así que ellos gritaban[a]: «¡Fuera, fuera! ¡Crucifícalo!». Pilato les dijo: «¿A vuestro rey he de crucificar?». Los principales sacerdotes respondieron: «No tenemos más rey que César».


    a] O: «No tenemos rey sino César».'
  to: 'Entonces gritaron: «¡Fuera, fuera! ¡Crucifícalo!». Pilato les dijo: «¿He de crucificar a vuestro rey?». Los principales sacerdotes respondieron: «No tenemos más rey que César[a]».'
  rationale: Se corrige el aoristo ἐκραύγασαν con pretérito simple ('gritaron'), se mejora la naturalidad narrativa con 'Entonces', se ajusta el orden de la pregunta de Pilato para un español más fluido, y se reubica correctamente la nota léxica en la cláusula final a la que realmente corresponde.
