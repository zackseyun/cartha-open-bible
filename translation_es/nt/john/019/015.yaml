review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien la estructura y el sentido general del griego: clamor de la multitud, pregunta retórica de Pilato y respuesta de los principales sacerdotes. Sin embargo, hay un desajuste verbal importante en ἐκραύγασαν, que es aoristo (''gritaron'') y no imperfecto (''gritaban''). También la nota al pie está mal anclada: el marcador [a] aparece junto a ''gritaban'', pero la nota explica una alternativa para la cláusula final sobre César.'
  spanish_quality_summary: El español es claro y digno, pero 'Así que ellos gritaban' suena menos natural narrativamente que 'Entonces ellos gritaron' o simplemente 'Entonces gritaron'. '¿A vuestro rey he de crucificar?' es inteligible, aunque algo más peninsular/literario; '¿He de crucificar a vuestro rey?' suena más natural en español general y conserva el énfasis suficientemente bien. 'Los principales sacerdotes' es aceptable para ἀρχιερεῖς. La puntuación del borrador necesita normalización, especialmente el cierre de comillas y el anclaje correcto de la nota.
  glossary_alignment: No aparecen términos del glosario sensible como Yahvé, Mesías o esclavo. 'César' y 'principales sacerdotes' son compatibles con el expediente. La alternativa léxica documentada en inglés para εἰ μὴ debe preservarse en español, pero con anclaje correcto en la frase final, no en el verbo inicial.
  issues:
  - severity: high
    issue: Tiempo verbal incorrecto en 'gritaban' para ἐκραύγασαν
    rationale: 'El griego usa aoristo indicativo activo 3pl, que en este contexto narrativo se refleja normalmente como pretérito simple: ''gritaron''. El imperfecto ''gritaban'' cambia el aspecto y presenta la acción como durativa/habitual, lo cual no corresponde al source evidence ni a la POB inglesa (''cried out'').'
  - severity: high
    issue: Marcador de nota al pie mal ubicado
    rationale: 'La nota ''O: «No tenemos rey sino César»'' corresponde a la cláusula final ''No tenemos más rey que César'', pero el marcador [a] está colocado después de ''gritaban''. Esto rompe la trazabilidad exigida entre texto y nota.'
  - severity: medium
    issue: Conector inicial 'Así que' es menos natural aquí que 'Entonces'
    rationale: οὖν marca progresión/consecuencia narrativa. En este versículo, 'Entonces' fluye mejor en español bíblico moderno que 'Así que', especialmente al inicio de una reacción colectiva.
  - severity: low
    issue: Orden marcado en '¿A vuestro rey he de crucificar?' puede sonar algo rígido
    rationale: No es infiel, pero '¿He de crucificar a vuestro rey?' suena más natural en español neutral y conserva la fuerza retórica de Pilato sin perder sentido.
  revised_spanish_text: 'Entonces gritaron: «¡Fuera, fuera! ¡Crucifícalo!». Pilato les dijo: «¿He de crucificar a vuestro rey?». Los principales sacerdotes respondieron: «No tenemos más rey que César[a]».'
  revised_footnotes:
