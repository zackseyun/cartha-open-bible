    text: 'O: «No tenemos rey sino César».'
    reason: lexical_alternative
  revision_rationale: Se corrige el aoristo ἐκραύγασαν con pretérito simple ('gritaron'), se mejora la naturalidad narrativa con 'Entonces', se ajusta el orden de la pregunta de Pilato para un español más fluido, y se reubica correctamente la nota léxica en la cláusula final a la que realmente corresponde.
