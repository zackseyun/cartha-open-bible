  text: Μετὰ ⸀δὲ ταῦτα ἠρώτησεν τὸν Πιλᾶτον Ἰωσὴφ ⸀ἀπὸ Ἁριμαθαίας, ὢν μαθητὴς τοῦ Ἰησοῦ κεκρυμμένος δὲ διὰ τὸν φόβον τῶν Ἰουδαίων, ἵνα ἄρῃ τὸ σῶμα τοῦ Ἰησοῦ· καὶ ἐπέτρεψεν ὁ Πιλᾶτος. ἦλθεν οὖν καὶ ἦρεν τὸ σῶμα ⸀αὐτοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/john/019/038.yaml
  text: After these things[a], Joseph from Arimathea, being a disciple of Jesus but having kept it hidden because of fear of the Jews, asked Pilate that he might take away the body of Jesus. And Pilate gave permission. So he came and took away his body.
  footnotes:
  - marker: a
    text: Or, more specifically in context, 'the Judean/Jewish authorities'—John often uses 'the Jews' for those opposing Jesus, not for the Jewish people without distinction.
    reason: lexical_alternative
