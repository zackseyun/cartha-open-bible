translation:
  language: es
  text: Después de estas cosas, José de Arimatea, que era discípulo de Jesús pero lo tenía oculto, por miedo a los judíos[a], pidió a Pilato llevarse el cuerpo de Jesús. Y Pilato se lo permitió. Así que fue y se llevó su cuerpo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más específicamente en este contexto, «las autoridades judeanas/judías»; Juan suele usar «los judíos» para quienes se oponen a Jesús, no para todo el pueblo judío sin distinción.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μετὰ δὲ ταῦτα
  english_pob_choice: After these things
  chosen_spanish: Después de estas cosas
  alternatives_spanish:
  - Después de esto
  - Más tarde
  lexicon: BDAG
  rationale: La forma plural ταῦτα se refleja mejor con «estas cosas» que con un singular más fluido. Mantiene el valor secuencial sin suavizar la referencia textual.
- source_word: ἠρώτησεν
  english_pob_choice: asked
  chosen_spanish: pidió
  alternatives_spanish:
  - preguntó
  - solicitó
  lexicon: BDAG
  rationale: Aquí el verbo expresa una petición a Pilato, no una simple pregunta. «Pidió» comunica bien el acto de solicitar permiso y suena natural en español.
- source_word: ἀπὸ Ἁριμαθαίας
  english_pob_choice: from Arimathea
  chosen_spanish: de Arimatea
  alternatives_spanish:
  - desde Arimatea
  - originario de Arimatea
  lexicon: BDAG
  rationale: En español, la relación de procedencia se expresa naturalmente con «de». «De Arimatea» conserva el valor de origen sin forzar una construcción menos idiomática.
- source_word: ὢν μαθητὴς τοῦ Ἰησοῦ
  english_pob_choice: being a disciple of Jesus
  chosen_spanish: siendo discípulo de Jesús
  alternatives_spanish:
  - que era discípulo de Jesús
  - como discípulo de Jesús
  lexicon: BDAG
  rationale: Se mantiene la construcción participial con un gerundio español natural. «Discípulo» es el equivalente estándar de μαθητής y no requiere explicación adicional.
- source_word: κεκρυμμένος
  english_pob_choice: having kept it hidden
  chosen_spanish: habiéndolo mantenido oculto
  alternatives_spanish:
  - ocultamente
  - habiendo estado escondido
  lexicon: BDAG
  rationale: La idea de ocultamiento se refiere al discipulado de José en el contexto. En español, el clítico «lo» permite conservar esa referencia implícita sin añadir contenido ajeno al texto.
- source_word: διὰ τὸν φόβον τῶν Ἰουδαίων
  english_pob_choice: because of fear of the Jews
  chosen_spanish: por miedo de los judíos
  alternatives_spanish:
  - por temor de los judíos
  - debido al miedo de los judíos
  lexicon: BDAG
  rationale: «Por miedo de» reproduce de manera fiel la relación causal y preserva la tensión del original. «Temor» sería posible, pero «miedo» es más directo y transparente en este contexto narrativo.
- source_word: τῶν Ἰουδαίων
  english_pob_choice: the Jews
  chosen_spanish: los judíos
  alternatives_spanish:
  - las autoridades judías
  - los judeanos
  lexicon: BDAG
  rationale: Se conserva la expresión explícita del griego. Como en el inglés POB, el texto principal no reemplaza el término por una interpretación; la nota aclara su posible referencia contextual.
- source_word: ἵνα ἄρῃ
  english_pob_choice: that he might take away
  chosen_spanish: que quitara
  alternatives_spanish:
  - que se llevara
  - para quitar
  lexicon: BDAG
  rationale: αἴρω aquí significa retirar o llevarse el cuerpo. «Que quitara» es breve y corresponde al propósito pedido a Pilato, manteniendo la conexión con el verbo repetido después.
- source_word: τὸ σῶμα τοῦ Ἰησοῦ
  english_pob_choice: the body of Jesus
  chosen_spanish: el cuerpo de Jesús
  alternatives_spanish:
  - el cuerpo de Jesús Jesús
  - el cadáver de Jesús
  lexicon: BDAG
  rationale: «Cuerpo» es la manera más directa y reverente de rendir σῶμα en este contexto funerario. «Cadáver» sería demasiado áspero para la lengua meta.
- source_word: ἐπέτρεψεν
  english_pob_choice: gave permission
  chosen_spanish: se lo permitió
  alternatives_spanish:
  - dio permiso
  - le concedió permiso
  lexicon: BDAG
  rationale: La forma pronominal en español retoma naturalmente la petición anterior y evita repetir la palabra «permiso». Comunica bien la concesión de Pilato.
- source_word: ἦλθεν οὖν καὶ ἦρεν
  english_pob_choice: So he came and took away
  chosen_spanish: Así que fue y se lo llevó
  alternatives_spanish:
  - Entonces vino y lo quitó
  - Por tanto, fue y lo llevó
  lexicon: BDAG
  rationale: «Fue» y «se lo llevó» suenan naturales en español y expresan el resultado narrativo. El pronombre compuesto ayuda a evitar una repetición torpe de «cuerpo» sin perder el referente.
- source_word: τὸ σῶμα αὐτοῦ
  english_pob_choice: his body
  chosen_spanish: su cuerpo
  alternatives_spanish:
  - el cuerpo de él
  - su cadáver
  lexicon: BDAG
  rationale: El posesivo español permite representar bien αὐτοῦ de modo natural. «Su cuerpo» conserva la referencia sin introducir un giro más pesado.
theological_decisions:
- issue: Referente de τῶν Ἰουδαίων en Juan
  english_pob_reading: Render as 'the Jews' in the main text, with a clarifying footnote about the likely reference to the Judean/Jewish authorities opposed to Jesus.
  chosen_spanish_reading: Mantener «los judíos» en el texto principal y aclarar en nota que, en este contexto, puede referirse a las autoridades judeanas/judías opuestas a Jesús.
  alternative_spanish_readings:
  - las autoridades judías
  - los judeanos
  rationale: La traducción debe conservar la expresión del griego y no resolver de antemano la tensión interpretativa. La nota permite advertir el sentido contextual probable sin sustituir la forma original.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Valor aspectual del ocultamiento de José
  english_pob_reading: having kept it hidden
  chosen_spanish_reading: habiéndolo mantenido oculto
  alternative_spanish_readings:
  - ocultamente
  - habiendo estado escondido
  rationale: 'El participio perfecto sugiere un estado resultante: su discipulado permanecía oculto. «Habiéndolo mantenido oculto» conserva ese matiz mejor que un adverbio simple.'
  doctrine_reference: Lexical fidelity and narrative aspect
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia con el audit trail inglés y no requiere revisiones sustantivas. Se preservó la secuencia narrativa, el matiz de ocultamiento y la referencia explícita a «los judíos», con una nota aclaratoria como en el modelo inglés.
  spanish_consistency_notes:
  - Se usa «Jesús» para Ἰησοῦς de forma uniforme.
  - Se mantiene «los judíos» en el texto principal, con nota explicativa, siguiendo la estrategia auditada.
  - «Su cuerpo» y «el cuerpo de Jesús» conservan la referencia sin añadir términos ajenos al griego.
  - El registro es sobrio y publicable, con puntuación y sintaxis naturales en español.
