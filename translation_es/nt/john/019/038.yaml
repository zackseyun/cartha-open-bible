revisions:
- from: Después de estas cosas, José de Arimatea, siendo discípulo de Jesús pero habiéndolo mantenido oculto por miedo de los judíos[a], pidió a Pilato que le permitiera llevarse el cuerpo de Jesús. Y Pilato se lo permitió. Así que fue y se llevó su cuerpo.
  to: Después de estas cosas, José de Arimatea, que era discípulo de Jesús pero lo tenía oculto, por miedo a los judíos[a], pidió a Pilato llevarse el cuerpo de Jesús. Y Pilato se lo permitió. Así que fue y se llevó su cuerpo.
  rationale: La revisión corrige el principal desajuste con el griego al expresar directamente el propósito de José («pidió a Pilato llevarse el cuerpo de Jesús») sin insertar «que le permitiera» dentro de la subordinada. También elimina la ambigüedad de «habiéndolo mantenido oculto» mediante una formulación natural en español que deja claro que su condición de discípulo estaba oculta. Se conserva la decisión del POB de mantener «los judíos» en el texto principal con nota aclaratoria.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:05:29Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia general del griego y conserva decisiones clave del POB, especialmente «los judíos» con nota aclaratoria y la referencia final «su cuerpo». Sin embargo, hay dos desajustes importantes con el sentido y la redacción fuente: 1) en la cláusula de propósito, el texto griego dice que José pidió a Pilato para tomar/quitar el cuerpo él mismo, no que pidió que Pilato le permitiera hacerlo; 2) «habiéndolo mantenido oculto» suena ambiguo en español porque el antecedente de «lo» no es claro y puede leerse como si ocultara a Jesús o algo distinto de su discipulado.'
  spanish_quality_summary: El español es mayormente claro y digno, pero algunos giros son algo forzados o ambiguos. «Por miedo de los judíos» funciona, aunque «por miedo a los judíos» es más natural. «Pidió a Pilato que le permitiera llevarse...» añade un verbo no expreso en el griego y hace más pesada la frase. «Se lo permitió» queda bien una vez formulada la petición de modo más directo. El resto del versículo es fluido.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: «Jesús», «discípulo», «cuerpo», y «los judíos» en texto principal con nota contextual. No hay asuntos de Yahvé/Mesías/etc. La principal corrección terminológica/lexical es mantener αἴρω como «llevarse» o «quitar/tomar» sin introducir «permitiera» dentro de la subordinada.'
  issues:
  - severity: high
    issue: La cláusula de propósito ἵνα ἄρῃ se tradujo como «que le permitiera llevarse».
    rationale: 'El griego expresa el contenido de la petición: José pidió a Pilato para llevarse/quitar el cuerpo de Jesús. «Que le permitiera» inserta un verbo adicional no presente en la subordinada y desplaza la estructura del original.'
  - severity: medium
    issue: «Habiéndolo mantenido oculto» tiene referente ambiguo en español.
    rationale: Aunque intenta explicitar el objeto implícito de κεκρυμμένος, el clítico «lo» no tiene antecedente claro. Es preferible hacer explícito «su discipulado» o reformular con una relativa natural.
  - severity: low
    issue: «Por miedo de los judíos» es menos natural que «por miedo a los judíos».
    rationale: Ambas son comprensibles, pero «miedo a» es la construcción más idiomática en español general para expresar temor hacia personas.
  revised_spanish_text: Después de estas cosas, José de Arimatea, que era discípulo de Jesús pero lo tenía oculto, por miedo a los judíos[a], pidió a Pilato llevarse el cuerpo de Jesús. Y Pilato se lo permitió. Así que fue y se llevó su cuerpo.
