translation:
  language: es
  text: 'Desde entonces Pilato trataba de ponerlo en libertad[a]. Pero los judíos gritaron, diciendo: «Si dejas en libertad a este hombre, no eres amigo de César[b]. Todo el que se hace rey se opone a César[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «Por eso Pilato seguía tratando de ponerlo en libertad». La expresión griega ἐκ τούτου puede entenderse temporalmente («desde entonces») o causalmente («por eso»).
    reason: lexical_alternative
  - marker: b
    text: En Juan, «los judíos» a menudo se refiere más específicamente a las autoridades de Judea o a opositores judíos concretos en el contexto narrativo, no necesariamente al pueblo judío en su conjunto.
    reason: cultural_note
  - marker: c
    text: O, «habla contra César» o «se pone en contra de César».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκ τούτου
  english_pob_choice: From then on
  chosen_spanish: Desde entonces
  alternatives_spanish:
  - A partir de entonces
  - Por eso
  lexicon: BDAG
  rationale: En el contexto narrativo de Juan, la expresión marca una secuencia temporal. «Desde entonces» conserva el avance del relato de forma natural en español y evita convertir la frase en una explicación causal en el texto principal.
- source_word: ἐζήτει
  english_pob_choice: was seeking
  chosen_spanish: trataba de
  alternatives_spanish:
  - buscaba
  - intentaba
  lexicon: BDAG
  rationale: El imperfecto expresa intento continuo o reiterado. «Trataba de» comunica bien ese matiz progresivo en español y suena natural con el infinitivo «soltarlo».
- source_word: ἀπολῦσαι / ἀπολύσῃς
  english_pob_choice: to release / release
  chosen_spanish: soltarlo / sueltas
  alternatives_spanish:
  - liberarlo / liberas
  - dejarlo ir / dejas ir
  lexicon: BDAG
  rationale: En este pasaje el verbo se usa en un contexto judicial de liberación de custodia. «Soltar» es más directo y natural en español, aunque es algo menos técnico que «liberar». Se preserva la referencia a liberar de la detención sin introducir una paráfrasis excesiva.
- source_word: οἱ δὲ Ἰουδαῖοι
  english_pob_choice: But the Jews
  chosen_spanish: Pero los judíos
  alternatives_spanish:
  - Pero los judeanos
  - Pero los líderes judíos
  lexicon: BDAG
  rationale: El griego dice literalmente «los judíos». Se mantiene esa formulación en el texto principal, y cualquier restricción interpretativa del referente queda para nota. No se sustituye por una aclaración intratextual que el original no da.
- source_word: ἐκραύγασαν λέγοντες
  english_pob_choice: shouted, saying
  chosen_spanish: gritaban, diciendo
  alternatives_spanish:
  - clamaban, diciendo
  - gritaban
  lexicon: BDAG
  rationale: κραυγάζω denota un clamor fuerte y público. «Gritaban» transmite ese tono con claridad. Se conserva «diciendo» porque el participio introduce discurso directo.
- source_word: τοῦτον
  english_pob_choice: this man
  chosen_spanish: a este hombre
  alternatives_spanish:
  - a este
  - a él
  lexicon: BDAG
  rationale: El demostrativo es despectivo en el contexto de acusación. «A este hombre» reproduce el valor pragmático sin perder la referencia personal.
- source_word: φίλος τοῦ Καίσαρος
  english_pob_choice: Caesar’s friend
  chosen_spanish: amigo de César
  alternatives_spanish:
  - amigo del César
  - aliado de César
  lexicon: BDAG
  rationale: Se traduce la construcción genitiva con una posesión natural en español. «Amigo de César» conserva la acusación política de lealtad y mantiene la sencillez del griego.
- source_word: πᾶς ὁ βασιλέα ἑαυτὸν ποιῶν
  english_pob_choice: Everyone who makes himself a king
  chosen_spanish: Todo el que se hace rey a sí mismo
  alternatives_spanish:
  - Todo el que se hace rey
  - Todo el que se proclama rey
  lexicon: BDAG
  rationale: La frase griega es muy cercana a «hace rey a sí mismo». Se conserva esa fuerza reflexiva, aun cuando en español resulte algo marcada, porque el texto acusa precisamente una autoexaltación real.
- source_word: ἀντιλέγει τῷ Καίσαρι
  english_pob_choice: opposes Caesar
  chosen_spanish: se opone a César
  alternatives_spanish:
  - habla contra César
  - se enfrenta a César
  lexicon: BDAG
  rationale: El audit trail inglés revisó esta cláusula hacia «opposes Caesar» por mayor precisión contextual. «Se opone a César» mantiene esa decisión y expresa oposición directa sin diluir el verbo en una mera discrepancia verbal.
theological_decisions:
- issue: Referente de «los judíos» en Juan
  english_pob_reading: Retain the source-level wording 'the Jews' in the main text, without substituting 'Jewish leaders' or 'Judeans.'
  chosen_spanish_reading: Mantener «los judíos» en el texto principal, sin sustituirlo por «los líderes judíos» ni por «los judeanos».
  alternative_spanish_readings:
  - los líderes judíos
  - los judeanos
  rationale: El texto fuente nombra a οἱ Ἰουδαῖοι de manera directa. Siguiendo el criterio auditable del POB, se preserva la forma del original y se evita estrechar el referente en la línea principal. La aclaración contextual puede quedar en nota.
  doctrine_reference: Translation philosophy §1, §5
- issue: Matiz de ἀντιλέγω en el cargo político contra Jesús
  english_pob_reading: opposes Caesar
  chosen_spanish_reading: se opone a César
  alternative_spanish_readings:
  - habla contra César
  - se enfrenta a César
  rationale: El contexto no es solo verbal, sino político-legal. «Se opone a César» comunica oposición real y coincide con la revisión inglesa más reciente, evitando una traducción que reduzca el sentido a mera contradicción oral.
  doctrine_reference: BDAG; applied revision 2026-04-23T09:47:57Z
translation_notes:
  revision_awareness: La versión española sigue la revisión inglesa más reciente del audit trail, especialmente en ἀντιλέγει τῷ Καίσαρι, donde la lectura final favorece «opposes Caesar» sobre «speaks against Caesar». También conserva la decisión estable de mantener οἱ Ἰουδαῖοι en el texto principal y de marcar la ambigüedad de ἐκ τούτου en nota.
  spanish_consistency_notes:
  - Se mantiene «César» como transliteración estable del nombre propio imperial.
  - Se usa «soltar» para ἀπολύω por naturalidad en español, pero se conserva el matiz de liberación de custodia.
  - La puntuación refleja discurso directo con comillas españolas y coma antes de «diciendo».
  - Las notas de pie de página usan marcadores únicos y aparecen ancladas en el texto donde corresponde.
