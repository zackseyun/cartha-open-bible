    reason: lexical_alternative
  - marker: b
    text: En Juan, «los judíos» a menudo se refiere más específicamente a las autoridades de Judea o a opositores judíos concretos en el contexto narrativo, no necesariamente al pueblo judío en su conjunto.
    reason: cultural_note
