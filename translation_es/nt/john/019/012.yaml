source:
  edition: SBLGNT
  text: ἐκ τούτου ⸂ὁ Πιλᾶτος ἐζήτει⸃ ἀπολῦσαι αὐτόν· οἱ δὲ Ἰουδαῖοι ⸀ἐκραύγασαν λέγοντες· Ἐὰν τοῦτον ἀπολύσῃς, οὐκ εἶ φίλος τοῦ Καίσαρος· πᾶς ὁ βασιλέα ἑαυτὸν ποιῶν ἀντιλέγει τῷ Καίσαρι.
base_translation:
  language: en
  yaml_path: translation/nt/john/019/012.yaml
  text: From then on Pilate was seeking to release him[a]. But the Jews shouted, saying, “If you release this man, you are not Caesar’s friend[c][b]. Everyone who makes himself a king opposes Caesar.”
  footnotes:
  - marker: a
    text: Or, “Because of this Pilate kept trying to release him.” The Greek phrase ἐκ τούτου can be understood temporally (“from then on”) or causally (“because of this”).
    reason: lexical_alternative
  - marker: b
    text: In John, “the Jews” often refers more specifically to the Judean authorities or to particular Jewish opponents in the narrative context, not necessarily to the Jewish people as a whole.
    reason: cultural_note
  - marker: c
    text: Or, “opposes Caesar” or “sets himself against Caesar.”
    reason: lexical_alternative
