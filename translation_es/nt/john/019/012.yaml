revisions:
- from: 'Desde entonces Pilato trataba de soltarlo[a]. Pero los judíos gritaban, diciendo: «Si sueltas a este hombre, no eres amigo de César[c][b]. Todo el que se hace rey a sí mismo se opone a César».'
  to: 'Desde entonces Pilato trataba de ponerlo en libertad[a]. Pero los judíos gritaron, diciendo: «Si dejas en libertad a este hombre, no eres amigo de César[b]. Todo el que se hace rey se opone a César[c]».'
  rationale: Se ajustó el español para reflejar mejor el contexto judicial de ἀπολύω, el aspecto narrativo del aoristo ἐκραύγασαν y la ubicación correcta de la nota sobre ἀντιλέγει. También se suavizó una expresión rígida («se hace rey a sí mismo») y se hizo idiomática la alternativa causal de la nota [a], manteniendo intactas las decisiones fuente del POB.
