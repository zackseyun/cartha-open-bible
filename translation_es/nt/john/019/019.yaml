revisions:
- from: 'Pilato también escribió un letrero y lo puso sobre la cruz. Y estaba escrito: «Jesús el Nazareno[a], el Rey de los judíos».'
  to: 'Pilato también escribió una inscripción y la puso en la cruz. Estaba escrito: «Jesús el Nazareno[a], el Rey de los judíos».'
  rationale: Se reemplaza «letrero» por «inscripción» para reflejar mejor τίτλον en un registro formal y alinearse con la decisión auditada. Se cambia «sobre la cruz» por «en la cruz» para representar mejor ἐπὶ τοῦ σταυροῦ sin sugerir una ubicación por encima de la cruz. Se elimina la conjunción inicial «Y» en la segunda oración por fluidez natural en español, manteniendo intacto el sentido resultativo de γεγραμμένον con «Estaba escrito».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:05:33Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego y sigue de cerca la auditoría inglesa: Pilato escribe un título, lo pone en relación con la cruz, y el contenido del rótulo se reproduce correctamente. También preserva adecuadamente «el Nazareno» y la nota alternativa sobre Ἰουδαίων. Sin embargo, hay dos detalles mejorables frente al expediente fuente: (1) τίτλον queda mejor como «inscripción» en este contexto formal que como «letrero», para alinearse con la decisión documentada y mantener un registro más digno; (2) el griego ἔθηκεν ἐπὶ τοῦ σταυροῦ se representó en inglés como «on the cross», y en español «sobre la cruz» tiende a sugerir ubicación por encima de ella; «en la cruz» o «sobre el madero» no son equivalentes exactos. Aquí «en la cruz» reproduce mejor el valor directo y evita una inferencia espacial innecesaria.'
  spanish_quality_summary: El español es claro y natural, pero «letrero» suena algo coloquial para un contexto judicial y narrativo solemne; «inscripción» funciona mejor en español bíblico moderno. Además, «Y estaba escrito» después de punto resulta un poco menos fluido que simplemente «Estaba escrito». El resto del texto es legible, digno y ampliamente comprensible.
  glossary_alignment: No hay conflicto con la terminología central del proyecto. «Jesús», «el Nazareno» y «judíos» con nota a «judeanos» están bien alineados con las decisiones auditadas. La revisión propuesta ajusta solo matices léxicos y de estilo para acercarse mejor al expediente POB y al registro español deseado.
  issues:
  - severity: medium
    issue: «letrero» para τίτλον
    rationale: Aunque es comprensible, el expediente inglés documenta «inscription» por tratarse del aviso oficial fijado en la crucifixión. En español, «inscripción» conserva mejor ese tono formal que «letrero», que puede sonar más cotidiano o comercial.
  - severity: medium
    issue: «sobre la cruz» para ἐπὶ τοῦ σταυροῦ
    rationale: El borrador dice «sobre la cruz», pero en español esto suele entenderse como ‘encima de’ o ‘por arriba de’. La auditoría inglesa explícitamente evitó «above the cross» y prefirió «on the cross». «En la cruz» transmite mejor esa relación sin añadir inferencias.
  - severity: low
    issue: Conjunción inicial «Y estaba escrito»
    rationale: No es incorrecta, pero el griego no exige aquí un «Y» pleno al inicio de oración en español. «Estaba escrito» suena más natural y mantiene la progresión narrativa.
  revised_spanish_text: 'Pilato también escribió una inscripción y la puso en la cruz. Estaba escrito: «Jesús el Nazareno[a], el Rey de los judíos».'
  revised_footnotes:
  - marker: a
    text: O «el Rey de los judeanos». El término griego puede referirse a los judíos en general o a los judeanos en particular, según el contexto.
    reason: alternative_reading
  revision_rationale: Se reemplaza «letrero» por «inscripción» para reflejar mejor τίτλον en un registro formal y alinearse con la decisión auditada. Se cambia «sobre la cruz» por «en la cruz» para representar mejor ἐπὶ τοῦ σταυροῦ sin sugerir una ubicación por encima de la cruz. Se elimina la conjunción inicial «Y» en la segunda oración por fluidez natural en español, manteniendo intacto el sentido resultativo de γεγραμμένον con «Estaba escrito».
