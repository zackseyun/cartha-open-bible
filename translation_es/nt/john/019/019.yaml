translation:
  language: es
  text: 'Pilato también escribió una inscripción y la puso en la cruz. Estaba escrito: «Jesús el Nazareno[a], el Rey de los judíos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el Rey de los judeanos». El término griego puede referirse a los judíos en general o a los judeanos en particular, según el contexto.
    reason: alternative_reading
lexical_decisions:
- source_word: τίτλον
  english_pob_choice: inscription
  chosen_spanish: letrero
  alternatives_spanish:
  - inscripción
  - placa
  - aviso
  lexicon: BDAG
  rationale: En este contexto de crucifixión, el término griego designa el texto colocado como identificación pública del condenado. «Letrero» comunica con naturalidad la idea de un rótulo visible; «inscripción» es posible pero suena más técnico o abstracto en español.
- source_word: ἔθηκεν ἐπὶ τοῦ σταυροῦ
  english_pob_choice: put it on the cross
  chosen_spanish: lo puso sobre la cruz
  alternatives_spanish:
  - lo puso en la cruz
  - lo colocó sobre la cruz
  lexicon: BDAG
  rationale: El griego dice literalmente que lo puso sobre la cruz. En español, «sobre la cruz» preserva la relación espacial explícita sin introducir una inferencia como «arriba de» o «encima de».
- source_word: γεγραμμένον
  english_pob_choice: It was written
  chosen_spanish: estaba escrito
  alternatives_spanish:
  - fue escrito
  - decía
  lexicon: BDAG
  rationale: La construcción perifrástica griega expresa un estado resultante. «Estaba escrito» conserva bien ese valor y mantiene la conexión con el letrero mencionado antes.
- source_word: Ναζωραῖος
  english_pob_choice: the Nazarene
  chosen_spanish: el Nazareno
  alternatives_spanish:
  - el Nazoreo
  - de Nazaret
  lexicon: BDAG
  rationale: El griego usa una forma adjetival/nominal de identificación, no una expresión genitiva explícita. «El Nazareno» es la manera más natural y fiel de reproducir ese epíteto en español.
- source_word: βασιλεὺς τῶν Ἰουδαίων
  english_pob_choice: the King of the Jews
  chosen_spanish: el Rey de los judíos
  alternatives_spanish:
  - el Rey de los judeanos
  lexicon: BDAG
  rationale: En el relato de la pasión, la expresión funciona como el título público de la acusación. «Judíos» reproduce el sentido convencional del texto y la formulación ya asentada; se preserva en nota la alternativa léxicamente posible «judeanos».
- source_word: δὲ καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - y también
  - además
  lexicon: BDAG
  rationale: La combinación añade continuidad y suma. «También» reproduce esa fuerza aditiva de manera breve y natural en español.
- source_word: Ἰησοῦς
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  lexicon: BDAG
  rationale: Nombre propio estándar en español.
- source_word: Πιλᾶτος
  english_pob_choice: Pilate
  chosen_spanish: Pilato
  lexicon: BDAG
  rationale: Nombre propio estándar en español.
- source_word: σταυροῦ
  english_pob_choice: cross
  chosen_spanish: cruz
  alternatives_spanish:
  - madero
  - estaca
  lexicon: BDAG
  rationale: En los evangelios, σταυρός se traduce de forma estándar como «cruz» en español, dado su uso histórico y litúrgico consolidado y la claridad comunicativa resultante.
theological_decisions:
- issue: Ἰουδαίων en la inscripción pública
  english_pob_reading: the Jews
  chosen_spanish_reading: los judíos
  alternative_spanish_readings:
  - los judeanos
  rationale: La frase forma parte del rótulo oficial de la acusación y, en este contexto narrativo, «judíos» comunica el valor tradicional y la función pública del título. La alternativa «judeanos» es lexicamente posible, pero puede sonar demasiado técnica para el texto principal; se documenta para transparencia.
  doctrine_reference: Translation philosophy §3; preservar la tensión léxica sin resolverla artificialmente
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el control de calidad indicó alta concordancia y dejó el texto sin modificaciones necesarias.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero aquí no aparece el nombre divino.
  - Se traduce σταυρός como «cruz» por coherencia con el uso consolidado en los relatos de la pasión.
  - Se conserva el contraste entre el texto narrativo y la cita directa con comillas angulares españolas.
  - La nota al pie preserva la tensión semántica de Ἰουδαίων sin ocultarla en el texto principal.
