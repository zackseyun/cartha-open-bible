    rationale: El griego ἵνα ἡ γραφὴ πληρωθῇ expresa la fórmula joánica de cumplimiento. En español estándar, aquí debe decirse “para que se cumpliera la Escritura” o “así se cumplió la Escritura” según la estructura elegida. La forma actual mezcla conectores y modo verbal de manera infeliz y puede confundir el sentido.
  - severity: medium
    issue: La nota [a] no refleja bien la alternativa documentada
    rationale: El POB inglés nota como alternativa “draw lots for it”. En español, si el texto principal usa “echemos suertes”, la nota debería ser infinitiva o exhortativa paralela, p. ej. “O ‘saquemos suertes por ella’” o “O ‘echemos a suertes por ella’”, no “echen suertes sobre él”.
  - severity: low
