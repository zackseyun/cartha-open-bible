translation:
  language: es
  text: 'Entonces se dijeron unos a otros: «No lo rompamos, sino echemos suertes[a] por él para decidir de quién será», para que se cumpliera la Escritura, que dice: «Repartieron entre sí mis vestidos[b], y sobre mi ropa echaron suertes». Así que los soldados hicieron estas cosas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «saquemos suertes por él».
    reason: lexical_alternative
  - marker: b
    text: Citado de Salmo 22:18.
    reason: cross_reference
lexical_decisions:
- source_word: Μὴ σχίσωμεν αὐτόν
  english_pob_choice: Let us not tear it
  chosen_spanish: No lo rompamos
  alternatives_spanish:
  - No lo rasguemos
  - No lo partamos
  lexicon: BDAG
  rationale: El verbo σχίζω implica dividir o romper. En español, en este contexto de una prenda, “romper” comunica de forma natural la acción sin volverla más fuerte de lo que exige el griego. El pronombre se refiere al vestido/túnica en contexto, por eso se traduce como “lo”.
- source_word: λάχωμεν περὶ αὐτοῦ τίνος ἔσται
  english_pob_choice: cast lots for it to decide whose it will be
  chosen_spanish: echemos suertes sobre él para decidir de quién será
  alternatives_spanish:
  - echémosle suertes para saber de quién será
  - saquemos suertes sobre él para decidir a quién pertenecerá
  lexicon: BDAG
  rationale: La expresión describe determinar la posesión por sorteo. “Echar suertes” es la manera natural y reverberante en español bíblico para este acto, y “para decidir de quién será” expresa el resultado sin añadir más contenido que el del griego.
- source_word: ἵνα ἡ γραφὴ πληρωθῇ
  english_pob_choice: so that the Scripture might be fulfilled
  chosen_spanish: así se cumpliera la Escritura
  alternatives_spanish:
  - para que se cumpliera la Escritura
  - de modo que se cumpliera la Escritura
  lexicon: BDAG
  rationale: La cláusula introduce la fórmula de cumplimiento joánica. “Así se cumpliera” conserva el valor de finalidad/resultado de ἵνα y mantiene la afirmación de cumplimiento sin explicar mecánicamente la relación entre la acción humana y el plan de Dios.
- source_word: ἡ γραφή
  english_pob_choice: the Scripture
  chosen_spanish: la Escritura
  alternatives_spanish:
  - la Escritura sagrada
  - el pasaje de la Escritura
  lexicon: BDAG
  rationale: En Juan, γραφή remite a la Escritura canónica. “La Escritura” es la forma idiomática y precisa en español.
- source_word: ἡ λέγουσα
  english_pob_choice: that says
  chosen_spanish: que dice
  alternatives_spanish:
  - que afirma
  - que declara
  lexicon: BDAG
  rationale: El participio introduce la cita. “Que dice” es la equivalencia española más directa y natural.
- source_word: Διεμερίσαντο τὰ ἱμάτιά μου ἑαυτοῖς
  english_pob_choice: They divided my garments among themselves
  chosen_spanish: Repartieron entre sí mis vestidos
  alternatives_spanish:
  - Dividieron entre sí mis vestidos
  - Se repartieron mis vestidos
  lexicon: BDAG
  rationale: Διαμερίζω aquí expresa dividir o repartir entre varios. “Repartieron entre sí” da el sentido distributivo de ἑαυτοῖς. “Vestidos” refleja ἱμάτια con un registro digno y bíblicamente reconocible en español.
- source_word: τὰ ἱμάτιά μου / τὸν ἱματισμόν μου
  english_pob_choice: my garments / my clothing
  chosen_spanish: mis vestidos / mi ropa
  alternatives_spanish:
  - mis prendas / mi vestidura
  - mis vestidos / mi vestidura
  lexicon: BDAG
  rationale: El griego distingue dos términos de vestimenta. En español, “vestidos” y “ropa” conservan una distinción leve y natural sin forzar tecnicismos. “Ropa” hace sonar menos arcaico el segundo término dentro de la cita.
- source_word: ἔβαλον κλῆρον
  english_pob_choice: they cast a lot
  chosen_spanish: echaron suertes
  alternatives_spanish:
  - tiraron suertes
  - sortearon
  lexicon: BDAG
  rationale: Aunque el griego usa el singular κλῆρον, el sentido idiomático es sorteo. En español, “echar suertes” reproduce el acto mejor que una traducción literal como “echar un lote”.
- source_word: Οἱ μὲν οὖν στρατιῶται ταῦτα ἐποίησαν
  english_pob_choice: So the soldiers did these things
  chosen_spanish: Y los soldados hicieron estas cosas
  alternatives_spanish:
  - Así que los soldados hicieron esto
  - De modo que los soldados hicieron estas cosas
  lexicon: BDAG
  rationale: La partícula resumptiva se vierte con “Y” para mantener continuidad narrativa. “Estas cosas” sigue de cerca ταῦτα sin exigir una simplificación no atestiguada por el texto.
theological_decisions:
- issue: La relación entre la acción de los soldados y el cumplimiento de la Escritura en ἵνα ἡ γραφὴ πληρωθῇ
  english_pob_reading: Render the clause straightforwardly as a fulfillment statement without importing a stronger deterministic explanation.
  chosen_spanish_reading: Traducir la cláusula como afirmación de cumplimiento sin convertirla en una explicación filosófica del modo en que obran la intención divina y la acción humana.
  alternative_spanish_readings:
  - “para que se cumpliera la Escritura”
  - “de manera que se cumpliera la Escritura”
  rationale: Juan presenta el hecho como cumplimiento de la Escritura. La traducción mantiene esa afirmación y, a la vez, evita resolver la tensión teológica entre providencia y responsabilidad humana que el texto deja abierta.
  doctrine_reference: Preservar la tensión teológica sin sobreexplicarla.
translation_notes:
  revision_awareness: 'Coincide con la última revisión disponible: no hay cambios aplicados respecto del pasaje base; se mantiene el enfoque de equivalencia óptima y la lectura de cumplimiento sin sobreespecificar la mecánica teológica.'
  spanish_consistency_notes:
  - Se mantiene “Escritura” para γραφή, en coherencia con el uso joánico y con el audit trail inglés.
  - Se usa “Yahvé” no aplica aquí; no hay términos divinos directos en este versículo.
  - Se conserva la distinción entre los términos de vestimenta con “vestidos” y “ropa”, suficiente para reflejar el contraste del griego sin forzar arcaísmos.
  - La cita bíblica se presenta con comillas internas y con nota de referencia al Salmo 22:18, conforme al precedente inglés.
  - Se evita “Cristo”/“Mesías” porque el versículo no contiene vocabulario cristológico explícito.
