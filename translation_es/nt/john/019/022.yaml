translation:
  language: es
  text: 'Pilato respondió[a]: «Lo que he escrito, lo he escrito».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Lo que escribí, lo escribí». El griego usa dos veces el perfecto, que puede subrayar la finalidad perdurable de lo que Pilato ha escrito.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: BDAG
  rationale: El aoristo medio/deponente de ἀποκρίνομαι en narración suele equivaler a ‘responder/contestar’. ‘Respondió’ suena natural en español moderno y conserva el sentido directo de réplica en diálogo.
- source_word: ὁ Πιλᾶτος
  english_pob_choice: Pilate
  chosen_spanish: Pilato
  alternatives_spanish:
  - el Pilato
  lexicon: BDAG
  rationale: El artículo griego es estilístico y no se traslada al español. Se mantiene el nombre propio ‘Pilato’ como forma habitual y transparente en español bíblico.
- source_word: Ὃ
  english_pob_choice: What
  chosen_spanish: Lo que
  alternatives_spanish:
  - Eso que
  - Aquello que
  lexicon: BDAG
  rationale: El relativo neutro sustantivado funciona como ‘lo que / aquello que’. ‘Lo que’ es la opción más idiomática en español y preserva la referencia amplia sin sobreespecificar.
- source_word: γέγραφα
  english_pob_choice: I have written
  chosen_spanish: he escrito
  alternatives_spanish:
  - escribí
  - he inscrito
  lexicon: BDAG
  rationale: El perfecto griego marca una acción concluida con resultado vigente. ‘He escrito’ conserva mejor esa fuerza de finalización y permanencia que el pretérito simple en español.
theological_decisions:
- issue: Fuerza del doble perfecto γέγραφα γέγραφα
  english_pob_reading: 'Render as emphatic finality: ''What I have written, I have written.'''
  chosen_spanish_reading: «Lo que he escrito, lo he escrito» como declaración enfática de irrevocabilidad.
  alternative_spanish_readings:
  - «Lo que escribí, lo escribí»
  rationale: La repetición del perfecto refuerza la firmeza de Pilato y la irreversibilidad de la inscripción. El español con perfecto compuesto conserva mejor el valor de acto cumplido con efecto permanente que el pasado simple.
  doctrine_reference: Translation philosophy §1, §5, §6
translation_notes:
  revision_awareness: 'El contexto auditado en inglés coincide en alto grado con el texto griego: ἀπεκρίθη = answered/replied, Ὃ = What, y γέγραφα duplicado como perfecto enfático. No hubo revisiones aplicadas en la fuente inglesa; por eso la versión española sigue de cerca esa decisión y conserva la repetición con perfecto compuesto.'
  spanish_consistency_notes:
  - Se mantiene el tratamiento narrativo sobrio y directo.
  - Se usa el perfecto compuesto para reflejar el valor aspectual y la finalización permanente.
  - No se añade el artículo antes de Pilato, conforme al uso normal en español.
