translation:
  language: es
  text: Ahora, en el lugar donde fue crucificado había un jardín, y en el jardín un sepulcro nuevo, en el cual aún no habían puesto a nadie.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora bien
  alternatives_spanish:
  - Ahora
  - Y ahora
  lexicon: BDAG
  rationale: δέ marca una transición narrativa leve; «Ahora bien» mantiene ese avance del relato sin cargar una oposición fuerte ni sonar mecánico.
- source_word: τόπῳ
  english_pob_choice: place
  chosen_spanish: lugar
  alternatives_spanish:
  - sitio
  - lugar
  lexicon: BDAG
  rationale: «Lugar» es la equivalencia natural y clara para τόπος en este contexto narrativo.
- source_word: ὅπου ἐσταυρώθη
  english_pob_choice: where he was crucified
  chosen_spanish: donde fue crucificado
  alternatives_spanish:
  - donde lo crucificaron
  - donde fue crucificado
  lexicon: BDAG
  rationale: 'El pasivo ἐσταυρώθη se conserva como pasivo en español: «fue crucificado». El sujeto queda implícito por el contexto, como en el griego.'
- source_word: κῆπος
  english_pob_choice: garden
  chosen_spanish: jardín
  alternatives_spanish:
  - huerto
  - jardín
  lexicon: BDAG
  rationale: κῆπος normalmente designa un jardín; «jardín» es el término más natural y fiel en español.
- source_word: μνημεῖον
  english_pob_choice: tomb
  chosen_spanish: sepulcro
  alternatives_spanish:
  - tumba
  - sepulcro
  - sepultura
  lexicon: BDAG
  rationale: En contexto funerario joánico, μνημεῖον apunta a un lugar de entierro. «Sepulcro» preserva ese sentido concreto y solemne sin volverlo demasiado general como «tumba».
- source_word: καινόν
  english_pob_choice: new
  chosen_spanish: nuevo
  alternatives_spanish:
  - nuevo
  - recién hecho
  lexicon: BDAG
  rationale: καινός se traduce directamente por «nuevo». La idea de que no había sido usado queda aclarada por la cláusula siguiente, sin incorporarla al adjetivo.
- source_word: ἐν ᾧ
  english_pob_choice: in which
  chosen_spanish: en el cual
  alternatives_spanish:
  - en el que
  - en el cual
  lexicon: BDAG
  rationale: «En el cual» reproduce con claridad la relación local con el sepulcro y mantiene un registro digno y natural.
- source_word: οὐδέπω
  english_pob_choice: yet
  chosen_spanish: todavía
  alternatives_spanish:
  - todavía
  - aún
  lexicon: BDAG
  rationale: οὐδέπω expresa anterioridad negativa temporal; «todavía» comunica bien la idea de «aún no» en una frase fluida en español.
- source_word: οὐδεὶς
  english_pob_choice: no one
  chosen_spanish: nadie
  alternatives_spanish:
  - nadie
  - ninguna persona
  lexicon: BDAG
  rationale: El indefinido negativo se expresa de forma natural con «nadie».
- source_word: ἦν τεθειμένος
  english_pob_choice: had been laid
  chosen_spanish: había sido puesto
  alternatives_spanish:
  - había sido puesto
  - había sido depositado
  - yacía
  lexicon: BDAG
  rationale: La perífrasis de pluscuamperfecto pasivo comunica el estado anterior consumado. «Había sido puesto» preserva el valor verbal y la pasiva; «depositado» sería más interpretativo, y «yacía» perdería la estructura del griego.
theological_decisions:
- issue: Término funerario para μνημεῖον
  english_pob_reading: tomb
  chosen_spanish_reading: sepulcro
  alternative_spanish_readings:
  - tumba
  - sepultura
  rationale: La elección de «sepulcro» refleja el contexto de entierro concreto sin añadir interpretación doctrinal. Mantiene la escena material del relato de la sepultura de Jesús.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Pasivo de ἐσταυρώθη
  english_pob_reading: he was crucified
  chosen_spanish_reading: fue crucificado
  alternative_spanish_readings:
  - lo crucificaron
  rationale: Se conserva la voz pasiva para no introducir explícitamente un agente no expresado en esta cláusula, siguiendo el valor formal del griego y el auditable reasoning del POB.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego SBLGNT y concuerda con el recorrido del POB inglés: transición narrativa suave con δέ, pasivo conservado en ἐσταυρώθη, y léxico funerario concreto para μνημεῖον en un contexto de sepultura. No se detectaron revisiones en el pasaje inglés que requirieran reflejo adicional.'
  spanish_consistency_notes:
  - Se usó «sepulcro» para μνημεῖον por coherencia con el contexto de entierro y con el tono solemne del pasaje.
  - Se mantuvo la pasiva «fue crucificado» para ἐσταυρώθη, evitando introducir un sujeto explícito.
  - «Todavía» refleja la negación temporal de οὐδέπω sin sobrecargar la frase.
  - 'La sintaxis española conserva la progresión del original: lugar > jardín > sepulcro nuevo > nadie había sido puesto allí.'
