lexical_decisions:
- source_word: Ὅτε
  english_pob_choice: When
  chosen_spanish: Cuando
  alternatives_spanish:
  - Al cuando
  - Al oír
  lexicon: BDAG
  rationale: La conjunción temporal introduce la circunstancia inmediata de la reacción de Pilato. «Cuando» es la equivalencia natural y clara en español.
- source_word: οὖν
  english_pob_choice: —
  chosen_spanish: —
  alternatives_spanish:
  - por tanto
  - así que
  - entonces
  lexicon: BDAG
  rationale: El valor inferencial/consecutivo puede quedar implícito en el flujo narrativo español sin añadir una partícula pesada. Se conserva la naturalidad sin perder la conexión con el contexto.
- source_word: ἤκουσεν
  english_pob_choice: heard
  chosen_spanish: oyó
  alternatives_spanish:
  - escuchó
  - se enteró de
  lexicon: BDAG
  rationale: Aquí ἀκούω expresa recibir una declaración. «Oyó» mantiene el hecho narrativo de haber recibido el dicho, sin sugerir necesariamente atención deliberada.
- source_word: τοῦτον τὸν λόγον
  english_pob_choice: this statement
  chosen_spanish: esta declaración
  alternatives_spanish:
  - esta palabra
  - esta afirmación
  - este dicho
  lexicon: BDAG
  rationale: λόγος se refiere al contenido recién pronunciado en v. 7, no a una sola «palabra». «Declaración» comunica mejor una afirmación concreta y pública en español.
- source_word: μᾶλλον
  english_pob_choice: even more
  chosen_spanish: aún más
  alternatives_spanish:
  - más
  - todavía más
  - mucho más
  lexicon: BDAG
  rationale: El adverbio intensifica el miedo de Pilato respecto de su estado previo. «Aún más» transmite bien la escalada y suena natural en español.
- source_word: ἐφοβήθη
  english_pob_choice: became afraid
  chosen_spanish: tuvo... miedo
  alternatives_spanish:
  - se atemorizó
  - se asustó
  - comenzó a temer
  lexicon: BDAG
  rationale: El verbo es eventivo e indica entrada o aumento del temor. «Tuvo aún más miedo» expresa la intensificación sin forzar una lectura más específica que la del texto.
theological_decisions:
- issue: Naturaleza del temor de Pilato
  english_pob_reading: Render the verb in a straightforward psychological sense without specifying whether the fear is political, superstitious, or theological.
  chosen_spanish_reading: Traducir el aumento del temor de Pilato de forma directa, sin precisar si era miedo político, supersticioso o teológico.
  alternative_spanish_readings:
  - Estaba políticamente más alarmado
  - Tuvo miedo por las implicaciones divinas
  rationale: El griego solo afirma que el temor de Pilato aumentó después de oír la declaración. La traducción debe conservar esa tensión narrativa sin resolver el motivo.
  doctrine_reference: Preservar la tensión interpretativa del texto sin añadir explicación doctrinal no explicitada por el pasaje.
translation_notes:
  revision_awareness: El texto griego y el resumen de auditoría inglesa muestran alta concordancia; no hay cambios textuales ni notas críticas necesarias. Se mantuvo la fuerza incremental de μᾶλλον y el valor eventivo de ἐφοβήθη en un español natural.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o cualquier sustitución no pertinente; el versículo no contiene el Tetragrámaton ni κύριος aplicado a Yahvé.
  - Se eligió «declaración» para λόγος por el contexto inmediato de la acusación de v. 7.
  - Se mantuvo el aumento del miedo como fenómeno psicológico abierto, sin especificarlo.
  - La puntuación reproduce una oración narrativa breve y fluida, acorde con el tono del original.
