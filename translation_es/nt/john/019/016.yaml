translation:
  language: es
  text: Entonces se lo entregó para que fuera crucificado.[a] Entonces tomaron a Jesús.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Entonces lo entregó para ser crucificado». La cláusula de propósito griega también puede expresarse de forma más compacta en español.'
    reason: lexical_alternative
  - marker: b
    text: Los pronombres implícitos «se», «lo» y el sujeto de «tomaron» no identifican explícitamente al grupo en este versículo; el contexto inmediato orienta al lector, pero el griego no lo nombra aquí.
    reason: alternative_reading
lexical_decisions:
- source_word: τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - Entonces, en ese momento
  lexicon: BDAG
  rationale: Marca el avance temporal inmediato de la narración. «Entonces» es natural en español y conserva la secuencia del relato.
- source_word: οὖν
  english_pob_choice: therefore / so
  chosen_spanish: Así
  alternatives_spanish:
  - por tanto
  - pues
  - entonces
  lexicon: BDAG
  rationale: La partícula inferencial se integra de modo fluido en español con «así» en la segunda oración, manteniendo la consecuencia narrativa sin recargar la frase.
- source_word: παρέδωκεν
  english_pob_choice: handed ... over
  chosen_spanish: lo entregó
  alternatives_spanish:
  - lo puso en manos de ellos
  - lo entregó a ellos
  lexicon: BDAG
  rationale: «Entregar» expresa bien el sentido judicial/de transferencia de control de παραδίδωμι. En español resulta más natural que un calco como «lo dio a ellos».
- source_word: αὐτὸν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  - lo
  lexicon: BDAG
  rationale: El objeto directo se expresa de forma pronominal en español. «Lo» conserva la referencia a Jesús sin añadir redundancia.
- source_word: αὐτοῖς
  english_pob_choice: to them
  chosen_spanish: a ellos
  alternatives_spanish:
  - a los mismos
  - a ellos mismos
  lexicon: BDAG
  rationale: La referencia del grupo permanece implícita en el griego y no debe especificarse. «A ellos» conserva esa apertura referencial.
- source_word: ἵνα σταυρωθῇ
  english_pob_choice: to be crucified
  chosen_spanish: para que fuera crucificado
  alternatives_spanish:
  - para ser crucificado
  - a fin de que fuera crucificado
  lexicon: BDAG
  rationale: ἵνα con subjuntivo aoristo pasivo expresa propósito. «Para que fuera crucificado» mantiene la fuerza final y la voz pasiva; se prefiere esta forma por claridad y solemnidad en español.
- source_word: Παρέλαβον
  english_pob_choice: they took
  chosen_spanish: tomaron
  alternatives_spanish:
  - recibieron
  - se llevaron
  lexicon: BDAG
  rationale: παραλαμβάνω aquí implica tomar consigo o hacerse cargo. «Tomaron» es breve, natural y suficientemente abierto para no especificar más de lo que el texto dice.
- source_word: Ἰησοῦν
  english_pob_choice: Jesus
  chosen_spanish: a Jesús
  alternatives_spanish:
  - Jesús
  lexicon: BDAG
  rationale: Nombre propio estándar; en español el objeto directo personal requiere la preposición «a».
theological_decisions:
- issue: Identidad de «ellos» / sujeto implícito de la segunda cláusula
  english_pob_reading: Retain the generic 'them' / 'they' in the main text without specifying 'the Jews,' 'the chief priests,' or 'the soldiers.'
  chosen_spanish_reading: Mantener «a ellos» y «tomaron» sin identificar al grupo en la traducción principal.
  alternative_spanish_readings:
  - a los judíos
  - a los principales sacerdotes
  - a los soldados
  rationale: El griego no nombra explícitamente al grupo en este versículo. Es preferible preservar esa indeterminación narrativa en español en lugar de resolverla interpretativamente.
  doctrine_reference: Preservar la tensión referencial del texto fuente.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa más reciente, que prefirió una formulación más directa para ἵνα σταυρωθῇ y eliminó conectivos redundantes. La versión española sigue esa misma dirección: evita la duplicación de conectivos y usa una finalidad simple y natural.'
  spanish_consistency_notes:
  - Se mantiene el nombre propio «Jesús» conforme al estándar del proyecto.
  - Se evita «Cristo» porque el versículo no usa el título Χριστός.
  - No se especifica el grupo referido por «ellos», en fidelidad a la ambigüedad del griego.
  - La sintaxis española conserva la división en dos oraciones del original para reflejar el cambio narrativo.
