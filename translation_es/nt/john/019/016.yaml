  spanish_quality_summary: 'El texto es comprensible y digno, pero tiene dos roces de naturalidad: «lo entregó a ellos» es menos idiomático en español que «se lo entregó», y «Así tomaron a Jesús» suena torpe. Una leve revisión mejora fluidez sin perder literalidad ni la apertura referencial del griego.'
