translation:
  language: es
  text: 'Pues estas cosas sucedieron para que se cumpliera la Escritura: «No se le quebrará ningún hueso».[a]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego dice literalmente: «Un hueso de él no será quebrado». El singular «hueso» tiene valor colectivo en la cita; por eso se vierte de manera idiomática en español.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο
  english_pob_choice: happened
  chosen_spanish: sucedieron
  alternatives_spanish:
  - ocurrieron
  - pasaron
  - tuvieron lugar
  lexicon: BDAG
  rationale: El aoristo de γίνομαι introduce los hechos narrados; «sucedieron» comunica con naturalidad el valor eventivo sin forzar un giro arcaico.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Pues
  alternatives_spanish:
  - Porque
  - Puesto que
  - En efecto
  lexicon: BDAG
  rationale: γάρ da una explicación o fundamento. «Pues» mantiene el vínculo explicativo con tono sobrio y bíblico en español.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - estos hechos
  - estos acontecimientos
  lexicon: BDAG
  rationale: El demostrativo neutro plural remite a los eventos previos. «Estas cosas» conserva esa referencia amplia y cercana al griego.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: Introduce finalidad ligada al cumplimiento. «Para que» es la forma más natural en español y conserva el valor telico.
- source_word: ἡ γραφή
  english_pob_choice: the Scripture
  chosen_spanish: la Escritura
  alternatives_spanish:
  - la Escritura Santa
  - el pasaje de la Escritura
  lexicon: BDAG
  rationale: En Juan, γραφή se refiere a la Escritura sagrada. El singular con artículo se conserva como «la Escritura».
- source_word: πληρωθῇ
  english_pob_choice: might be fulfilled
  chosen_spanish: se cumpliera
  alternatives_spanish:
  - fuera cumplida
  - llegara a cumplirse
  lexicon: BDAG
  rationale: El subjuntivo aoristo pasivo expresa cumplimiento buscado o realizado en el marco del propósito. «Se cumpliera» preserva la pasiva y el matiz de finalidad sin sonar pesado.
- source_word: Ὀστοῦν
  english_pob_choice: bone
  chosen_spanish: hueso
  alternatives_spanish:
  - un hueso
  lexicon: BDAG
  rationale: Aunque el griego usa singular, en español la cita bíblica funciona mejor con «hueso» en el marco de la frase completa, manteniendo la fuerza colectiva de la referencia.
- source_word: οὐ συντριβήσεται
  english_pob_choice: will not be broken
  chosen_spanish: no se le quebrará
  alternatives_spanish:
  - no será quebrado
  - no se romperá
  lexicon: BDAG
  rationale: συντρίβω aquí se entiende de huesos no quebrados. «No se le quebrará» refleja bien la pasiva futura y evita un calco torpe; el dativo implícito en español se expresa con «se le».
- source_word: αὐτοῦ
  english_pob_choice: his
  chosen_spanish: le
  alternatives_spanish:
  - de él
  - sus
  lexicon: BDAG
  rationale: El genitivo posesivo se integra en la construcción pronominal española. «Se le» conserva la referencia al sujeto poseedor de los huesos sin necesidad de repetir «de él».
theological_decisions:
- issue: Cita bíblica singular con sentido colectivo y su relación con el cumplimiento de la Escritura
  english_pob_reading: Not one of his bones will be broken
  chosen_spanish_reading: No se le quebrará ningún hueso
  alternative_spanish_readings:
  - No le será quebrado ningún hueso
  - No se quebrará ninguno de sus huesos
  rationale: El griego cita un singular («hueso»), pero el sentido es colectivo y alude a la Escritura del Éxodo/Salmos. «Ningún hueso» preserva el cumplimiento y la lectura idiomática sin perder la tensión entre singular formal y sentido colectivo.
  doctrine_reference: Éxodo 12:46; Números 9:12; Salmo 34:20
translation_notes:
  revision_awareness: El contexto en inglés confirma una decisión estable de equivalencia óptima, sin revisiones pendientes. Mantengo el valor explicativo de γάρ, el propósito de ἵνα y la cita bíblica con sentido colectivo, procurando que el español sea publicable y auditable desde el griego.
  spanish_consistency_notes:
  - Se usa «Escritura» para ἡ γραφή en sentido canónico, conforme al uso joánico.
  - Se traduce συντρίβω con «quebrará» en el contexto de huesos, que es el equivalente español más natural y fiel.
  - Se conserva el sentido colectivo de la cita bíblica en una formulación idiomática española, con nota para transparentar el singular griego.
