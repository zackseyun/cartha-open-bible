translation:
  language: es
  text: 'Y de nuevo otra Escritura dice: «Verán[a] al que traspasaron».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «Mirarán hacia aquel a quien traspasaron». La construcción griega puede expresarse como mirar 'a' o 'hacia' la persona, y la frase hace eco de Zacarías 12:10.
    reason: lexical_alternative
lexical_decisions:
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  - nuevamente
  lexicon: BDAG
  rationale: El adverbio introduce una cita escrituraria adicional; en español, «otra vez» transmite con naturalidad la misma función conectiva de повторación y continuidad.
- source_word: ἑτέρα γραφή
  english_pob_choice: another Scripture
  chosen_spanish: otra Escritura
  alternatives_spanish:
  - otra pasaje de la Escritura
  - una Escritura diferente
  lexicon: BDAG
  rationale: γραφή se refiere aquí a un texto bíblico citado como autoridad; «Escritura» conserva ese valor técnico y «otra» refleja ἑτέρα como una cita distinta añadida al argumento.
- source_word: λέγει
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - declara
  - afirma
  lexicon: BDAG
  rationale: En fórmulas de cita bíblica, el presente «dice» es natural en español y mantiene el efecto vivo del griego.
- source_word: Ὄψονται
  english_pob_choice: they will look on
  chosen_spanish: verán
  alternatives_spanish:
  - mirarán
  - contemplarán
  lexicon: BDAG
  rationale: El griego expresa una visión dirigida hacia alguien; en español, «verán» comunica de forma clara y sobria el acto de percibir a la persona mencionada, sin forzar una construcción menos natural.
- source_word: εἰς ὃν
  english_pob_choice: on the one whom
  chosen_spanish: al que
  alternatives_spanish:
  - hacia el que
  - sobre el que
  lexicon: BDAG
  rationale: La construcción con εἰς en este contexto puede llevar matiz direccional hacia la persona vista; «al que» resulta idiomático en español y evita una rigidez innecesaria. La nota conserva la alternativa textual/semántica de «hacia» o «sobre» como posibilidad interpretativa.
- source_word: ἐξεκέντησαν
  english_pob_choice: they pierced
  chosen_spanish: traspasaron
  alternatives_spanish:
  - perforaron
  - acuchillaron
  lexicon: BDAG
  rationale: «Traspasaron» conserva el golpe semántico de ἐκκεντέω y es la manera más natural en español bíblico para un acto de herida penetrante, sin reducirlo a una simple herida superficial.
theological_decisions:
- issue: Mantener la identidad del traspasado en el marco cristológico de Juan sin añadir formulación ajena al texto
  english_pob_reading: They will look on the one whom they pierced
  chosen_spanish_reading: Verán al que traspasaron
  alternative_spanish_readings:
  - Verán al que atravesaron
  - Verán a quien traspasaron
  rationale: La frase española sigue de cerca el sentido de la cita de Juan y preserva la referencia al individuo traspasado, que en contexto es Jesús. No se amplía la cita con una formulación más explícita que el griego de Juan no da aquí.
  doctrine_reference: Juan 19:37; Zacarías 12:10
- issue: Decidir entre una preposición de dirección («a/hacia») o una de superficie («sobre») en la construcción de visión
  english_pob_reading: They will look on / to him whom they pierced
  chosen_spanish_reading: Verán al que traspasaron
  alternative_spanish_readings:
  - Mirarán hacia el que traspasaron
  - Verán sobre el que traspasaron
  rationale: El griego admite un matiz direccional; en español, la estructura verbal «ver a alguien» ya comunica el objeto personal de la mirada sin necesidad de explicitar la preposición. Así se evita una rareza sintáctica y se conserva la tensión interpretativa documentada por la nota inglesa.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: La redacción sigue el pasaje griego de Juan 19:37 y toma como guía el expediente auditado en inglés. Se conservó la cita breve y solemne; se evitó una paráfrasis expansiva y se mantuvo la ambigüedad direccional documentada en el inglés (on/to) mediante una nota en español.
  spanish_consistency_notes:
  - Se eligió «Escritura» para γραφή por consistencia con el uso bíblico técnico.
  - Se prefirió «traspasaron» para ἐξεκέντησαν por su fuerza lexical y su naturalidad en español bíblico.
  - Se evitó «Cristo» porque el versículo no lo expresa; la identificación cristológica depende del contexto narrativo inmediato.
