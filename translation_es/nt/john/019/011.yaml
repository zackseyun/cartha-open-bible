base_translation:
  language: en
  yaml_path: translation/nt/john/019/011.yaml
  text: Jesus answered him[a], “You would have no authority over me at all unless it had been given to you from above[b]. Therefore the one who handed me over to you has the greater sin.”
  footnotes:
  - marker: a
    text: Or "from heaven." The Greek says "from above," which in John often points to a divine source.
    reason: lexical_alternative
  - marker: b
    text: The one who handed Jesus over is not explicitly identified here; interpreters variously understand this as Judas, Caiaphas, or the Jewish leadership more broadly.
    reason: alternative_reading
