translation:
  language: es
  text: 'Jesús le respondió: «No tendrías ninguna autoridad sobre mí si no te hubiera sido dada de arriba[a]. Por eso, el que me entregó a ti[b] tiene mayor pecado».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «del cielo». El griego dice «de arriba», expresión que en Juan a menudo apunta a un origen divino.
    reason: lexical_alternative
  - marker: b
    text: La persona o grupo que entregó a Jesús no se identifica aquí de manera explícita; los intérpretes la entienden de distintas formas, como Judas, Caifás o la dirigencia judía en general.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐξουσίαν
  english_pob_choice: authority
  chosen_spanish: autoridad
  alternatives_spanish:
  - poder
  - derecho
  lexicon: BDAG
  rationale: En este contexto judicial y político, «autoridad» refleja mejor la jurisdicción delegada de Pilato. «Poder» puede sonar más a fuerza; «derecho» estrecha demasiado el sentido.
- source_word: κατ’ ἐμοῦ οὐδεμίαν
  english_pob_choice: over me at all
  chosen_spanish: sobre mí ninguna
  alternatives_spanish:
  - contra mí de ningún modo
  - sobre mí en absoluto
  lexicon: BDAG
  rationale: La combinación con ἐξουσία pide una expresión natural en español que conserve la idea de jurisdicción sobre Jesús; «ninguna» mantiene el énfasis de οὐδεμίαν. En el discurso fluido, «sobre mí» comunica mejor que una traducción más literal de κατά + genitivo.
- source_word: δεδομένον σοι
  english_pob_choice: had been given to you
  chosen_spanish: te hubiera sido dada
  alternatives_spanish:
  - te hubiera sido concedida
  - te fuera dada
  lexicon: BDAG
  rationale: El pasaje requiere una relación anterior a la autoridad de Pilato; el pluscuamperfecto compuesto español expresa bien ese valor relativo. Se usa pasiva para respetar el origen implícito del don sin nombrarlo explícitamente.
- source_word: ἄνωθεν
  english_pob_choice: from above
  chosen_spanish: de arriba
  alternatives_spanish:
  - del cielo
  - desde lo alto
  lexicon: BDAG
  rationale: Se conserva la tensión de ἄνωθεν entre fuente superior y posible referencia divina. «De arriba» es breve, fiel y menos interpretativo que «del cielo», aunque deja abierta la resonancia teológica que Juan suele cargar en esta palabra.
- source_word: διὰ τοῦτο
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por esta razón
  - Así que
  lexicon: BDAG
  rationale: «Por eso» reproduce la inferencia lógica de manera natural en español y mantiene la relación causal del texto.
- source_word: ὁ παραδούς
  english_pob_choice: the one who handed me over
  chosen_spanish: el que me entregó
  alternatives_spanish:
  - el que me puso en tus manos
  - el que me traicionó
  lexicon: BDAG
  rationale: «Entregó» conserva el valor narrativo de παραδίδωμι en la pasión sin identificar prematuramente al referent; «traicionó» sería demasiado específico y resolvería una ambigüedad que el griego deja abierta.
- source_word: μείζονα ἁμαρτίαν
  english_pob_choice: the greater sin
  chosen_spanish: mayor pecado
  alternatives_spanish:
  - el pecado mayor
  - un pecado más grave
  lexicon: BDAG
  rationale: «Mayor pecado» comunica la comparación de culpa entre los actores. En español, el artículo puede omitirse para sonar más natural sin perder el sentido comparativo del griego.
theological_decisions:
- issue: Fuente de la autoridad de Pilato implícita en ἄνωθεν
  english_pob_reading: Pilate’s authority is presented as given by God/from above, without specifying a full doctrine of political legitimacy beyond this case.
  chosen_spanish_reading: La autoridad de Pilato se presenta como dada «de arriba», sin convertir la frase en una doctrina política más amplia.
  alternative_spanish_readings:
  - del cielo
  - de Dios
  rationale: «De arriba» mantiene la ambigüedad reverencial del texto y evita resolver de antemano si la referencia debe explicitarse como «del cielo» o «de Dios». El contexto joánico sí sugiere fuente divina, pero la traducción conserva esa tensión.
  doctrine_reference: Preservar la tensión teológica sin ampliarla más allá del pasaje.
- issue: Identidad de ὁ παραδούς μέ σοι
  english_pob_reading: Rendered generically as "the one who handed me over to you" without identifying the referent in the main text.
  chosen_spanish_reading: 'Se traduce de forma genérica: «el que me entregó a ti», sin identificar al referent en el texto principal.'
  alternative_spanish_readings:
  - Judas
  - Caifás
  - la dirigencia judía
  rationale: El griego no nombra explícitamente a la persona o grupo; mantener la formulación genérica evita resolver una identificación debatida y respeta la ambigüedad del original.
  doctrine_reference: Preservar la tensión textual y exegética sin fijarla indebidamente.
translation_notes:
  revision_awareness: 'El texto sigue de cerca la última revisión en inglés, que no introdujo cambios respecto de la versión aprobada. La traducción española conserva las dos decisiones clave del audit trail: ἄνωθεν como una expresión abierta («de arriba») y ὁ παραδούς μέ σοι como referencia genérica («el que me entregó a ti») para no cerrar la ambigüedad del referent.'
  spanish_consistency_notes:
  - Se mantuvo «Jesús» como nombre propio y se evitó «Cristo» porque no aparece en el versículo.
  - «Autoridad» se conserva como término jurídico básico coherente con el contexto de Pilato.
  - «Pecado» se usó para ἁμαρτία, no «culpa», porque el griego y el audit trail comparan gravedad de pecado.
  - La pasiva impersonal de «te hubiera sido dada» ayuda a conservar el origen implícito sin introducir un sujeto explícito.
