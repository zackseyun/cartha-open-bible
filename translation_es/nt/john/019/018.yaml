translation:
  language: es
  text: donde lo crucificaron, y con él a otros dos, uno[a] a un lado y otro al otro, y Jesús en medio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de forma más compacta, «a ambos lados, con Jesús entre ellos».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅπου
  english_pob_choice: where
  chosen_spanish: donde
  alternatives_spanish:
  - en el lugar donde
  - en donde
  lexicon: BDAG
  rationale: ὅπου funciona como adverbio relativo locativo. «Donde» es natural en español y conserva la referencia espacial sin añadir más de lo que el griego dice.
- source_word: ἐσταύρωσαν
  english_pob_choice: they crucified
  chosen_spanish: lo crucificaron
  alternatives_spanish:
  - lo clavaron en una cruz
  - lo impalaron en una cruz
  lexicon: BDAG
  rationale: En el contexto joánico de la pasión, σταυρόω indica crucifixión. «Lo crucificaron» mantiene el sentido estándar y fiel sin especificar mecánicamente el método.
- source_word: μετ’ αὐτοῦ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - junto con él
  - acompañado de él
  lexicon: BDAG
  rationale: μετά con genitivo expresa acompañamiento. «Con él» es conciso y transparente en español.
- source_word: ἄλλους δύο
  english_pob_choice: two others
  chosen_spanish: a otros dos
  alternatives_spanish:
  - a dos otros hombres
  - a dos más
  lexicon: BDAG
  rationale: El griego dice simplemente «otros dos»; en español conviene el orden «a otros dos» por fluidez. No se añade «hombres», porque no está explícito en el texto.
- source_word: ἐντεῦθεν καὶ ἐντεῦθεν
  english_pob_choice: one on each side
  chosen_spanish: uno a cada lado
  alternatives_spanish:
  - uno de un lado y otro del otro
  - uno a un lado y otro al otro
  lexicon: BDAG
  rationale: La pareja adverbial expresa una colocación en lados opuestos. «Uno a cada lado» reproduce con naturalidad el sentido distributivo y la actualización revisada de la POB en inglés.
- source_word: μέσον
  english_pob_choice: in the middle
  chosen_spanish: en medio
  alternatives_spanish:
  - en el medio
  - en el centro
  lexicon: BDAG
  rationale: Aquí μέσον funciona espacialmente como posición central. «En medio» es idiomático en español y preserva la imagen.
- source_word: τὸν Ἰησοῦν
  english_pob_choice: Jesus
  chosen_spanish: a Jesús
  alternatives_spanish:
  - Jesús
  lexicon: BDAG
  rationale: El acusativo señala a Jesús como el centro de la disposición. En español, «a Jesús» refleja mejor el valor de objeto directo dentro de la oración.
theological_decisions:
- issue: Cómo expresar la disposición espacial de los crucificados sin atenuar el contraste visual
  english_pob_reading: one on each side, and Jesus in the middle
  chosen_spanish_reading: uno a cada lado, y a Jesús en medio
  alternative_spanish_readings:
  - uno de un lado y otro del otro, y a Jesús entre ellos
  - uno a cada lado, y Jesús en el centro
  rationale: El griego presenta dos personas colocadas en lados opuestos y a Jesús en posición central. «Uno a cada lado» conserva esa distribución sin volverla más interpretativa de lo necesario; «en medio» mantiene la misma imagen central.
  doctrine_reference: Preservar la tensión y la imaginería del texto original; primacía del idioma fuente sobre la tradición devocional.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente al preferir «uno a cada lado» por ser más natural y concisa que una formulación más larga, sin perder el sentido distributivo del griego. Se mantuvo la estructura simple del original y no se añadieron elementos ausentes en el texto base.
  spanish_consistency_notes:
  - Se usa «Jesús» sin artículo, conforme al uso bíblico habitual en español.
  - Se evita «Señor» o cualquier sustitución reverencial no presente en el texto.
  - Se conserva «crucificaron» para σταυρόω, en línea con la decisión auditada en inglés.
  - La preposición «a» en «a Jesús» refleja el régimen del objeto directo humano en español y ayuda a mantener la sintaxis natural.
