translation:
  language: es
  text: 'Los judíos le respondieron: «Nosotros tenemos una ley, y según esa ley[a] debe morir, porque se hizo Hijo de Dios[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «según la ley». El griego repite «ley», y la segunda aparición remite a la primera.
    reason: lexical_alternative
  - marker: b
    text: O, «porque se hizo el Hijo de Dios» o «porque se hizo Hijo de Dios de parte de Dios / el Hijo de Dios». La expresión también puede entenderse como «el Hijo de Dios» o «el Hijo de Dios de Dios», según cómo se haga explícita en español la fuerza titular de la frase griega.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθησαν
  english_pob_choice: answered
  chosen_spanish: respondieron
  alternatives_spanish:
  - contestaron
  - respondieron
  lexicon: BDAG
  rationale: Verbo narrativo normal de respuesta. «Respondieron» es natural en español y conserva el valor básico de ἀποκρίνομαι sin añadir matiz polémico.
- source_word: οἱ Ἰουδαῖοι
  english_pob_choice: The Jews
  chosen_spanish: Los judíos
  alternatives_spanish:
  - los líderes judíos
  - los judíos
  lexicon: BDAG
  rationale: La forma griega es un designador grupal amplio; «Los judíos» reproduce directamente el referente textual que el POB inglés retuvo, sin restringirlo indebidamente a autoridades específicas.
- source_word: νόμον ἔχομεν
  english_pob_choice: We have a law
  chosen_spanish: tenemos una ley
  alternatives_spanish:
  - tenemos la ley
  - tenemos una norma
  lexicon: BDAG
  rationale: El griego carece de artículo en la primera ocurrencia, por lo que «una ley» refleja mejor la forma y el contraste con la segunda mención. «Tenemos una ley» es idiomático y mantiene la fuerza jurídica de la reclamación.
- source_word: κατὰ τὸν νόμον
  english_pob_choice: according to that law
  chosen_spanish: según esa ley
  alternatives_spanish:
  - según la ley
  - conforme a esa ley
  lexicon: BDAG
  rationale: La segunda ocurrencia es articular y remite anafóricamente a la primera. «Esa ley» conserva la referencia de vuelta al antecedente y evita repetir «la ley» de modo menos preciso.
- source_word: ὀφείλει ἀποθανεῖν
  english_pob_choice: he ought to die
  chosen_spanish: debe morir
  alternatives_spanish:
  - tiene que morir
  - debería morir
  lexicon: BDAG
  rationale: ὀφείλω expresa obligación. «Debe morir» transmite la exigencia jurídica con naturalidad en español. «Tiene que morir» es posible, pero «debe» suena más sobrio en este contexto.
- source_word: υἱὸν θεοῦ
  english_pob_choice: the Son of God
  chosen_spanish: Hijo de Dios
  alternatives_spanish:
  - el Hijo de Dios
  - un hijo de Dios
  - Hijo de Dios
  lexicon: BDAG
  rationale: El texto griego no lleva artículo antes de υἱόν, pero en el contexto joánico la acusación apunta a la filiación única de Jesús. En español, la mayúscula de título se usa de forma natural sin añadir artículo obligatorio en la cita directa.
- source_word: ἑαυτὸν ἐποίησεν
  english_pob_choice: he made himself
  chosen_spanish: se hizo a sí mismo
  alternatives_spanish:
  - se hizo
  - se presentó como
  lexicon: BDAG
  rationale: Se mantiene el carácter literal del giro acusatorio sin suavizarlo con paráfrasis interpretativa. La reflexividad del griego queda expresada en español de modo claro y usable.
theological_decisions:
- issue: Cómo reflejar el valor titular de υἱὸν θεοῦ en una acusación hostil
  english_pob_reading: the Son of God
  chosen_spanish_reading: Hijo de Dios
  alternative_spanish_readings:
  - un hijo de Dios
  - hijo de Dios
  rationale: La acusación no debe rebajarse a una filiación genérica. «Hijo de Dios» conserva la carga cristológica del contexto joánico sin convertir la cita en una afirmación doctrinal del narrador. La mayúscula marca el título reconocido en uso bíblico español.
  doctrine_reference: Cristología nicena; criterio POB de preservar la tensión teológica del pasaje sin resolverla en paráfrasis
translation_notes:
  revision_awareness: 'Coincide con el estado de revisión más reciente: sin cambios requeridos según el audit trail inglés y la comprobación de alta concordancia.'
  spanish_consistency_notes:
  - Se mantiene «ley» para νόμος en ambas ocurrencias para conservar la repetición del griego; la nota b explica la referencia anafórica.
  - Se usa «Hijo de Dios» como título cristológico, coherente con el valor que el POB inglés preservó.
  - «Los judíos» reproduce el designador grupal del texto sin sustituirlo por un término interpretativo alterno.
