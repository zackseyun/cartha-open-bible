revisions:
- from: 'Los judíos le respondieron[a]: «Nosotros tenemos una ley, y según esa ley[b] debe morir, porque se hizo a sí mismo Hijo de Dios».'
  to: 'Los judíos le respondieron: «Nosotros tenemos una ley, y según esa ley[a] debe morir, porque se hizo Hijo de Dios[b]».'
  rationale: 'Se revisa para alinear las notas con el audit trail inglés: se elimina la nota no respaldada sobre «Los judíos», se conserva la nota sobre la segunda mención anafórica de «ley», y se añade una nota en «Hijo de Dios» para preservar la alternativa documentada «God’s Son / the Son of God». También se mejora levemente la naturalidad del español al quitar «a sí mismo», que aquí resulta redundante y pesado.'
