base_translation:
  language: en
  yaml_path: translation/nt/john/019/039.yaml
  text: Nicodemus also came—the one who had first come to him at night—bringing a mixture of myrrh and aloes[b][a], about a hundred litras.
  footnotes:
  - marker: a
    text: A litra was a Roman pound, roughly 327 grams; 'about a hundred litras' is approximately 32–33 kilograms (around 72 pounds).
    reason: cultural_note
  - marker: b
    text: Or 'who had earlier come to him by night,' recalling John 3:1–2.
    reason: cross_reference
