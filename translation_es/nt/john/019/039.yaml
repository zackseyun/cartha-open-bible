translation:
  language: es
  text: Nicodemo también vino —el que antes[b] había venido a él de noche— trayendo una mezcla de mirra y áloes, unas cien litras[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Una litra era una libra romana, de unos 327 gramos; «unas cien litras» equivale aproximadamente a 32–33 kilos (alrededor de 72 libras).
    reason: cultural_note
  - marker: b
    text: O «el que primero había venido a él de noche», recordando Juan 3:1–2.
    reason: cross_reference
lexical_decisions:
- source_word: ἦλθεν δὲ καὶ
  english_pob_choice: also came
  chosen_spanish: también vino
  alternatives_spanish:
  - y vino también
  - ahora también vino
  lexicon: BDAG
  rationale: καὶ añade a Nicodemo a los participantes ya mencionados, y δέ enlaza suavemente con lo anterior. «También vino» conserva el valor aditivo con español natural y sin sobrecargar el enlace discursivo.
- source_word: Νικόδημος
  english_pob_choice: Nicodemus
  chosen_spanish: Nicodemo
  alternatives_spanish:
  - Nikodemo
  lexicon: Convención onomástica estándar
  rationale: El nombre propio se translitera al español como «Nicodemo», forma clara y reconocible en lectura eclesial.
- source_word: ὁ ἐλθὼν πρὸς αὐτὸν νυκτὸς τὸ πρῶτον
  english_pob_choice: the one who had first come to him at night
  chosen_spanish: el que primero había venido a él de noche
  alternatives_spanish:
  - el que había venido antes a él de noche
  - el que había venido a él por la noche la primera vez
  lexicon: BDAG
  rationale: La construcción con artículo y participio funciona appositivamente para identificar a Nicodemo. «Primero había venido» mantiene el valor de τὸ πρῶτον como referencia retrospectiva/temporal, y «de noche» conserva el matiz idiomático de νυκτός.
- source_word: φέρων
  english_pob_choice: bringing
  chosen_spanish: trayendo
  alternatives_spanish:
  - llevando
  - portando
  lexicon: BDAG
  rationale: El participio presente expresa acción concomitante; «trayendo» suena natural en español y conserva la idea de que Nicodemo llegaba con los aromas.
- source_word: μίγμα σμύρνης καὶ ἀλόης
  english_pob_choice: a mixture of myrrh and aloes
  chosen_spanish: una mezcla de mirra y áloes
  alternatives_spanish:
  - una mezcla de mirra y aloe
  - un ungüento de mirra y áloes
  lexicon: BDAG
  rationale: «Mezcla» traduce directamente μίγμα. «Mirra» es la equivalencia estándar. «Áloes» mantiene el sentido aromático funerario del término en este contexto; en español, el plural evita confundirlo con la planta ornamental moderna y refleja el uso tradicional de la sustancia o fragancia.
- source_word: ὡς
  english_pob_choice: about
  chosen_spanish: como de
  alternatives_spanish:
  - aproximadamente
  - unos
  lexicon: BDAG
  rationale: Con una cantidad, ὡς marca aproximación. «Como de» reproduce esa estimación con un tono natural y respetuoso del valor no exacto.
- source_word: λίτρας ἑκατόν
  english_pob_choice: a hundred litras
  chosen_spanish: cien litras
  alternatives_spanish:
  - cien libras romanas
  - aproximadamente treinta y dos kilos
  lexicon: BDAG
  rationale: Se conserva la unidad antigua «litras» para mantener transparencia textual y no sustituirla por una equivalencia moderna que borre el matiz histórico. El número se expresa de forma directa, y la aproximación queda indicada por «como de».
theological_decisions:
- issue: Referencia de αὐτόν en la cláusula identificadora
  english_pob_reading: '''him'' refers to Jesus'
  chosen_spanish_reading: «a él» se refiere a Jesús
  alternative_spanish_readings:
  - «a él» puede leerse como referencia anafórica general, aunque el contexto apunta a Jesús
  - «a él» remite al personaje ya conocido en Juan 3
  rationale: En el contexto de Juan, la referencia es claramente a Jesús, evocando la visita anterior de Nicodemo en Juan 3:1–2. La formulación española conserva la anáfora sin desambiguar artificialmente en el texto principal.
  doctrine_reference: Juan 3:1–2; Juan 19:39
- issue: Valor de τὸ πρῶτον en la identificación de Nicodemo
  english_pob_reading: the one who had first come to him at night
  chosen_spanish_reading: «el que primero había venido a él de noche» mantiene el recuerdo narrativo de Juan 3
  alternative_spanish_readings:
  - «el que antes había venido a él de noche»
  - «el que había venido a él de noche por primera vez»
  rationale: La frase no introduce una doctrina nueva, pero sí preserva el vínculo narrativo con el encuentro previo. «Primero» sostiene el sentido retrospectivo sin eliminar la conexión con la primera visita nocturna.
  doctrine_reference: Juan 3:1–2
translation_notes:
  revision_awareness: La redacción sigue de cerca la última versión auditada en inglés, que fue dejada sin cambios tras revisión y obtuvo alta concordancia. Se conservó la estructura narrativa, la referencia retrospectiva a Juan 3 y la medida antigua 'litras', ajustando únicamente el español para fluidez y transparencia textual.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en el proyecto general cuando aparezca el nombre divino; aquí no aplica.
  - Se conserva «mirra» y «áloes» como vocabulario funerario de uso bíblico, sin normalizar a un término botánico moderno.
  - Se prefirió «cien litras» con nota cultural para no reemplazar la unidad antigua por una equivalencia moderna en el texto principal.
  - La puntuación con guiones largos reproduce la función appositiva de la cláusula relativa, en armonía con la estructura griega.
