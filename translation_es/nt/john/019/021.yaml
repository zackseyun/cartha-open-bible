translation:
  language: es
  text: 'Entonces los sumos sacerdotes de los judíos le decían a Pilato[a]: «No escribas: “El rey de los judíos”, sino que él dijo[b]: “Yo soy rey de los judíos”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de los judeanos» / «Rey de los judeanos». El término griego puede designar a judíos en general o a judeanos más específicamente, según el contexto.
    reason: alternative_reading
  - marker: b
    text: O «Yo soy el Rey de los judíos». El griego aquí no incluye de manera explícita el artículo antes de «rey» en la cláusula predicativa.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγον
  english_pob_choice: were saying
  chosen_spanish: le decían
  alternatives_spanish:
  - le decían una y otra vez
  - estaban diciendo
  lexicon: BDAG
  rationale: El imperfecto expresa acción en curso o repetida. En español, «le decían» comunica bien esa continuidad sin sonar forzado; «estaban diciendo» es posible, pero menos natural en este diálogo breve.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - Por tanto
  - Entonces
  lexicon: BDAG
  rationale: Conecta con la escena anterior de manera narrativa natural en español. «Así que» conserva la continuidad inferencial sin exceso de formalidad.
- source_word: ἀρχιερεῖς
  english_pob_choice: chief priests
  chosen_spanish: sumos sacerdotes
  alternatives_spanish:
  - principales sacerdotes
  lexicon: BDAG
  rationale: «Sumos sacerdotes» es el equivalente español estándar para el plural de ἀρχιερεῖς y conserva el peso de autoridad sacerdotal del grupo.
- source_word: τῶν Ἰουδαίων
  english_pob_choice: of the Jews
  chosen_spanish: de los judíos
  alternatives_spanish:
  - de los judeanos
  lexicon: BDAG
  rationale: En este contexto se trata del título polémico «Rey de los judíos» dentro de la pasión de Juan. Se mantiene la forma tradicional e inteligible en español, conservando la alternativa semántica posible de «judeanos» en la nota.
- source_word: Μὴ γράφε
  english_pob_choice: Do not write
  chosen_spanish: No escribas
  alternatives_spanish:
  - No pongas por escrito
  - No inscribas
  lexicon: BDAG
  rationale: El prohibitivo con μή se expresa de forma directa y natural con «No escribas». Es fiel y suficientemente específico para una inscripción.
- source_word: Ὁ βασιλεὺς τῶν Ἰουδαίων
  english_pob_choice: The King of the Jews
  chosen_spanish: El Rey de los judíos
  alternatives_spanish:
  - El rey de los judíos
  lexicon: BDAG
  rationale: Se preserva el título tal como aparece en la inscripción disputada. La mayúscula en «Rey» refleja su carácter titular en la cita, como en el inglés auditado.
- source_word: ἀλλ’ ὅτι
  english_pob_choice: but that
  chosen_spanish: sino que
  alternatives_spanish:
  - pero que
  - más bien que
  lexicon: BDAG
  rationale: En español, «sino que» reproduce con naturalidad la corrección que quieren imponer, manteniendo el contraste de la cláusula sin ampliar el sentido.
- source_word: ἐκεῖνος
  english_pob_choice: that he
  chosen_spanish: él
  alternatives_spanish:
  - ese hombre
  - aquel
  lexicon: BDAG
  rationale: El demostrativo griego tiene tono algo distanciador, pero el español aquí suena más sobrio y fiel con «él» dentro de la subordinada. La nota puede conservar la alternativa de matiz sin introducir una paráfrasis innecesaria.
- source_word: εἶπεν
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - afirmó
  - declaró
  lexicon: BDAG
  rationale: «Dijo» corresponde directamente al verbo sin cargarlo con una interpretación mayor.
- source_word: Βασιλεὺς τῶν Ἰουδαίων εἰμί
  english_pob_choice: I am King of the Jews
  chosen_spanish: Yo soy Rey de los judíos
  alternatives_spanish:
  - Yo soy el Rey de los judíos
  lexicon: BDAG
  rationale: El griego carece del artículo antes de βασιλεύς en esta cláusula predicativa. En español, «Yo soy Rey de los judíos» refleja mejor esa ausencia, aunque «Yo soy el Rey de los judíos» sigue siendo una alternativa natural; la nota la preserva.
theological_decisions:
- issue: Ἰουδαῖος/Ἰουδαίων en el contexto de la pasión joánica
  english_pob_reading: Jews
  chosen_spanish_reading: judíos
  alternative_spanish_readings:
  - judeanos
  rationale: Se mantiene la designación tradicional y reconocible del título «Rey de los judíos», porque aquí funciona como fórmula fija en la inscripción y en la controversia narrada. La alternativa «judeanos» se conserva como posibilidad semántica para no borrar la ambigüedad histórica del término griego.
  doctrine_reference: Principio de transparencia textual y respeto por la ambigüedad léxica donde el contexto no la resuelve por completo.
translation_notes:
  revision_awareness: 'La redacción sigue la última revisión del POB inglés que corrigió el giro más interpretativo de «That man said» a la forma más literal «that he said». Por eso el español evita expandir ἐκεῖνος con un sustantivo como «ese hombre» y conserva una subordinada simple: «que él dijo».'
  spanish_consistency_notes:
  - Se usa «judíos» de manera consistente con el título joánico y con la pauta inglesa auditada, pero se deja visible la alternativa «judeanos» en nota para transparencia.
  - Se evita «Cristo» u otros términos no presentes en el versículo.
  - «Rey» va con mayúscula dentro de la cita titulada, siguiendo el valor titular del enunciado disputado.
  - La puntuación con comillas angulares y subcomillas mantiene la cita dentro de la cita de forma clara para lectura pública.
