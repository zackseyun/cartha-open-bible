translation:
  language: es
  text: Entonces tomaron el cuerpo de Jesús y lo envolvieron en lienzos de lino con las especias, como es la costumbre funeraria de los judíos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de los judeanos», si se entiende el término de manera geográfica más que étnica o religiosa; aquí el contexto favorece una referencia a la práctica funeraria judía en general.
    reason: alternative_reading
lexical_decisions:
- source_word: ἔλαβον
  english_pob_choice: they took
  chosen_spanish: tomaron
  alternatives_spanish:
  - recibieron
  - llevaron
  lexicon: BDAG
  rationale: λαμβάνω aquí expresa tomar posesión física del cuerpo para preparar su sepultura. «Tomaron» conserva esa acción narrativa de manera natural en español.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Entonces
  alternatives_spanish:
  - Así que
  - Por tanto
  lexicon: BDAG
  rationale: La partícula marca consecuencia narrativa. «Entonces» transmite bien la continuidad del relato sin sonar excesivamente formal.
- source_word: σῶμα
  english_pob_choice: body
  chosen_spanish: cuerpo
  alternatives_spanish:
  - cadáver
  lexicon: BDAG
  rationale: σῶμα significa «cuerpo». «Cadáver» sería más explícito respecto de la muerte, pero es más duro que el griego y menos adecuado al tono reverente.
- source_word: Ἰησοῦ
  english_pob_choice: Jesus’s
  chosen_spanish: de Jesús
  alternatives_spanish:
  - de Jesucristo
  lexicon: BDAG
  rationale: El genitivo simple se traduce de forma directa con «de Jesús», conservando el nombre propio sin introducir una fórmula litúrgica ajena al texto.
- source_word: ἔδησαν
  english_pob_choice: wrapped
  chosen_spanish: lo envolvieron
  alternatives_spanish:
  - lo ataron
  - lo vendaron
  lexicon: BDAG
  rationale: δέω tiene el sentido básico de atar o sujetar, pero aquí la acción concreta se realiza con lienzos funerarios. En español, «lo envolvieron» comunica con naturalidad el resultado visible de esa acción sin perder el contexto de sujeción funeraria.
- source_word: ὀθονίοις
  english_pob_choice: in linen cloths
  chosen_spanish: en lienzos
  alternatives_spanish:
  - en telas de lino
  - en lienzos de lino
  lexicon: BDAG
  rationale: ὀθόνια se refiere a lienzos de lino usados para entierro. «Lienzos» es natural en español bíblico; el contexto ya aclara el material funerario.
- source_word: ἀρώματα
  english_pob_choice: the spices
  chosen_spanish: las especias
  alternatives_spanish:
  - los aromas
  - las fragancias
  lexicon: BDAG
  rationale: ἄρωμα designa sustancias aromáticas empleadas en sepultura. «Especias» es el equivalente claro y tradicional en español para este contexto.
- source_word: καθὼς
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - tal como
  - así como
  lexicon: BDAG
  rationale: καθώς introduce comparación/conformidad con la costumbre. «Como» es breve y fiel en español.
- source_word: ἔθος ἐστὶν
  english_pob_choice: is the burial custom
  chosen_spanish: es la costumbre de sepultar
  alternatives_spanish:
  - es la costumbre
  - es el modo habitual de sepultar
  lexicon: BDAG
  rationale: ἔθος indica costumbre o práctica habitual. En español conviene explicitar el verbo implícito de la acción funeraria; «costumbre de sepultar» preserva el sentido sin sobreinterpretar.
- source_word: τοῖς Ἰουδαίοις
  english_pob_choice: of the Jews
  chosen_spanish: de los judíos
  alternatives_spanish:
  - de los judeanos
  - entre los judíos
  lexicon: BDAG
  rationale: Ἰουδαῖοις puede referirse étnica o religiosamente a los judíos. Aquí el contexto apunta a una práctica funeraria general, por lo que «de los judíos» es la opción más directa y natural.
- source_word: ἐνταφιάζειν
  english_pob_choice: burial
  chosen_spanish: sepultar
  alternatives_spanish:
  - enterrar
  - dar sepultura
  lexicon: BDAG
  rationale: El infinitivo significa enterrar o preparar para sepultura. «Sepultar» mantiene el registro digno y el matiz funerario del verbo griego.
theological_decisions:
- issue: Alcance de τοῖς Ἰουδαίοις
  english_pob_reading: the Jews
  chosen_spanish_reading: de los judíos
  alternative_spanish_readings:
  - de los judeanos
  rationale: Aunque Ἰουδαῖοι puede ocasionalmente tener un matiz geográfico, aquí el texto habla de una costumbre funeraria general. «De los judíos» conserva el sentido cultural-religioso dominante sin cargar el versículo con un matiz polémico.
  doctrine_reference: 'Hecho de traducción: prioridad al sentido del texto fuente y al uso contextual.'
translation_notes:
  revision_awareness: La redacción española sigue de cerca la revisión final del audit trail inglés en el punto de la acción funeraria, pero no adopta mecánicamente la opción inglesa «wrapped»; en español se prefirió «lo envolvieron» para reflejar con naturalidad el resultado de ἔδησαν con lienzos. También se mantuvo una formulación equivalente a «as is the burial custom of the Jews», con la especificación funeraria integrada en la costumbre.
  spanish_consistency_notes:
  - Se usa «judíos» para Ἰουδαῖοι de manera consistente con el contexto cultural-religioso del pasaje.
  - «Espicas» se evita; se usa «especias» como equivalente bíblico común para ἀρώματα.
  - «Sepultar» se prefiere a «enterrar» por su registro más digno en un contexto de sepultura.
  - No se introduce «Cristo» ni «SEÑOR»; el texto griego nombra directamente a Jesús.
