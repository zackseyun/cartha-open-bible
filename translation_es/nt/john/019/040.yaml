review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: ἔλαβον οὖν = «Entonces tomaron», σῶμα = «cuerpo», ἔδησαν…ὀθονίοις = «lo envolvieron en lienzos», μετὰ τῶν ἀρωμάτων = «con las especias», y la cláusula de costumbre funeraria está conservada. La nota sobre Ἰουδαίοις también sigue adecuadamente el expediente inglés. Sin embargo, «la costumbre de sepultar de los judíos» suena poco natural y algo calcada; conviene reformularla para expresar con claridad «la costumbre funeraria de los judíos» o «la costumbre de los judíos para sepultar».'
  spanish_quality_summary: El español es en general claro y digno, pero la frase final «como es la costumbre de sepultar de los judíos» resulta torpe y no idiomática en español natural. Además, «lienzos» funciona, pero «lienzos de lino» mejora la precisión de ὀθονίοις sin volver pesada la frase. La revisión propuesta conserva fidelidad y mejora bastante la fluidez.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Jesús», «cuerpo», «especias» y «judíos» están alineados con las decisiones auditadas. La nota alternativa «judeanos» está bien mantenida. La revisión solo mejora naturalidad y precisión léxica en «lienzos de lino» y «costumbre funeraria».
  issues:
  - severity: medium
    issue: 'Frase final poco natural: «la costumbre de sepultar de los judíos»'
    rationale: Aunque transmite la idea, en español suena calcada y gramaticalmente torpe. El griego expresa una costumbre relativa al entierro; en español conviene decir «la costumbre funeraria de los judíos» o equivalente.
  - severity: low
    issue: «Lienzos» puede quedarse algo implícito respecto al material
    rationale: ὀθονίοις se refiere específicamente a telas/lienzos de lino. «Lienzos» no es incorrecto, pero «lienzos de lino» refleja mejor la evidencia léxica y sigue siendo natural.
  revised_spanish_text: Entonces tomaron el cuerpo de Jesús y lo envolvieron en lienzos de lino con las especias, como es la costumbre funeraria de los judíos[a].
  revised_footnotes:
  - marker: a
    text: O «de los judeanos», si se entiende el término de manera geográfica más que étnica o religiosa; aquí el contexto favorece una referencia a la práctica funeraria judía en general.
    reason: alternative_reading
  revision_rationale: Se ajustó la frase final para evitar un giro poco idiomático y expresar de manera natural el sentido de ἔθος ἐστὶν… ἐνταφιάζειν. También se explicitó «de lino» para reflejar mejor ὀθονίοις, en línea con la evidencia léxica y la traducción inglesa auditada.
