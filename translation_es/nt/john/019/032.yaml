translation:
  language: es
  text: Así pues, los soldados llegaron y quebraron las piernas del primero[a], y las del otro que había sido crucificado con él[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «del primero»; en español se puede entender la persona implícita por el contexto.'
    reason: lexical_alternative
  - marker: b
    text: 'O, más literalmente: «y del otro que había sido crucificado con él».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦλθον οὖν
  english_pob_choice: So ... came
  chosen_spanish: Así pues, ... llegaron
  alternatives_spanish:
  - Entonces, ... llegaron
  - Así, ... llegaron
  lexicon: BDAG
  rationale: οὖν marca continuidad/inferencia narrativa. «Así pues» conserva esa relación y suena natural en español; «llegaron» comunica el movimiento sin forzar un calco.
- source_word: οἱ στρατιῶται
  english_pob_choice: the soldiers
  chosen_spanish: los soldados
  alternatives_spanish:
  - las tropas
  - los militares
  lexicon: BDAG
  rationale: En el contexto de la crucifixión, «soldados» es el equivalente claro e idiomático para στρατιῶται.
- source_word: τοῦ μὲν πρώτου
  english_pob_choice: the first man
  chosen_spanish: del primero
  alternatives_spanish:
  - del primer hombre
  - del primero de ellos
  lexicon: BDAG
  rationale: El griego dice literalmente «del primero»; en español puede mantenerse la brevedad sin añadir «hombre». La referencia personal queda clara por el contexto y por el paralelo con «el otro».
- source_word: κατέαξαν
  english_pob_choice: broke
  chosen_spanish: quebraron
  alternatives_spanish:
  - rompieron
  - fracturaron
  lexicon: BDAG
  rationale: El verbo significa romper/quebrar. «Quebraron» preserva la fuerza física del acto y suena natural en español; «fracturaron» sería más técnico.
- source_word: τὰ σκέλη
  english_pob_choice: the legs
  chosen_spanish: las piernas
  alternatives_spanish:
  - las piernas de
  - las piernas
  lexicon: BDAG
  rationale: Para claridad en español, «piernas» comunica bien la parte del cuerpo afectada. El genitivo implícito ya determina de quiénes son.
- source_word: τοῦ ἄλλου
  english_pob_choice: the other
  chosen_spanish: del otro
  alternatives_spanish:
  - del otro hombre
  - del segundo
  lexicon: BDAG
  rationale: «Del otro» refleja fielmente el griego y conserva la economía del original.
- source_word: τοῦ συσταυρωθέντος αὐτῷ
  english_pob_choice: who had been crucified with him
  chosen_spanish: que había sido crucificado con él
  alternatives_spanish:
  - que fue crucificado con él
  - crucificado con él
  lexicon: BDAG
  rationale: 'El participio aoristo pasivo se expresa bien con un pluscuamperfecto relativo en español: «había sido crucificado». Mantiene la relación temporal respecto de la llegada de los soldados y preserva la identificación del otro hombre.'
theological_decisions:
- issue: Referente de αὐτῷ
  english_pob_reading: with him = with Jesus
  chosen_spanish_reading: con él = con Jesús
  alternative_spanish_readings:
  - con el primero
  - con aquel
  rationale: En el contexto joánico, el pronombre apunta de manera natural a Jesús, centro de la escena de crucifixión. Traducir «con él» mantiene la ambigüedad gramatical del griego sin perder la referencia contextual.
  doctrine_reference: Contexto narrativo de la Pasión en Juan 19
translation_notes:
  revision_awareness: El audit trail inglés pasó por una pequeña revisión sobre la repetición de «the legs of»; el texto griego, sin embargo, ya elide el objeto en la segunda cláusula. El español conserva esa elipsis de forma natural con «las del otro».
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se mantiene la economía del griego en «del otro» y en la elipsis del objeto verbal repetido.
  - «Con él» conserva el referente cristológico sin añadirlo explícitamente al texto principal.
