- from: Así pues, los soldados llegaron y quebraron las piernas del primero[a], y las del otro[b], que había sido crucificado con él.
  to: Así pues, los soldados llegaron y quebraron las piernas del primero[a], y las del otro que había sido crucificado con él[b].
  rationale: Se quitó la coma antes de la relativa para reflejar correctamente la construcción restrictiva del griego y mejorar la naturalidad del español. También se ajustó la clasificación de la nota b para que describa una alternativa más literal, no una lectura distinta, y se movió su anclaje al final de la frase pertinente.
