translation:
  language: es
  text: 'Entonces Pilato volvió a salir y les dijo: «Miren, lo saco ante ustedes para que sepan que no encuentro ningún cargo contra él[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no encuentro ninguna falta en él». La expresión griega también puede formularse de esta manera más tradicional, pero aquí probablemente tiene un sentido judicial: Pilato no encuentra ningún cargo ni base válida de acusación contra Jesús.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξῆλθεν ... πάλιν ἔξω
  english_pob_choice: went outside again
  chosen_spanish: salió otra vez afuera
  alternatives_spanish:
  - volvió a salir
  - salió de nuevo
  lexicon: BDAG
  rationale: La combinación verbal + adverbio expresa movimiento hacia afuera y repetición. «Salió otra vez afuera» conserva ambos elementos de manera natural en español sin perder el énfasis espacial.
- source_word: λέγει
  english_pob_choice: said
  chosen_spanish: les dijo
  alternatives_spanish:
  - les dice
  lexicon: BDAG
  rationale: Aunque el griego usa presente histórico, el español narrativo fluye mejor en pasado. Se mantiene la referencia a los oyentes con «les» conforme al contexto judicial del pasaje.
- source_word: Ἴδε
  english_pob_choice: Look
  chosen_spanish: Miren
  alternatives_spanish:
  - Miren, aquí
  - Vean
  lexicon: BDAG
  rationale: «Ἴδε» funciona como llamada de atención. «Miren» es la forma natural y digna en español para captar la atención del grupo sin arcaísmo.
- source_word: ἄγω ὑμῖν αὐτὸν ἔξω
  english_pob_choice: I am bringing him out to you
  chosen_spanish: les traigo a él afuera
  alternatives_spanish:
  - les estoy trayendo a él afuera
  - les lo traigo afuera
  lexicon: BDAG
  rationale: «ἄγω» aquí presenta la acción de conducir o traer a alguien hacia fuera. «Les traigo a él afuera» sigue la escena y preserva el sentido espacial; se evita una paráfrasis más libre que suavizaría la fuerza del original.
- source_word: ἵνα γνῶτε
  english_pob_choice: so that you may know
  chosen_spanish: para que sepan
  alternatives_spanish:
  - a fin de que sepan
  - para que conozcan
  lexicon: BDAG
  rationale: La cláusula final expresa propósito. «Para que sepan» comunica bien γνῶτε en español actual y mantiene el valor final sin sobreexplicar.
- source_word: οὐδεμίαν αἰτίαν
  english_pob_choice: no case against
  chosen_spanish: ningún cargo contra
  alternatives_spanish:
  - ninguna acusación contra
  - ningún caso contra
  lexicon: BDAG
  rationale: En contexto judicial, αἰτία significa una causa, cargo o base de acusación. «Ningún cargo contra» conserva la fuerza forense mejor que «ninguna falta», que sería más amplia y menos precisa.
- source_word: εὑρίσκω ἐν αὐτῷ
  english_pob_choice: I find ... against him
  chosen_spanish: encuentro ... contra él
  alternatives_spanish:
  - hallo ... contra él
  - encuentro ... en él
  lexicon: BDAG
  rationale: El giro idiomático combina con αἰτία para expresar una determinación judicial. «Encuentro ... contra él» reproduce esa relación de acusación de manera clara en español.
theological_decisions:
- issue: Valor judicial de la declaración de Pilato
  english_pob_reading: I find no case against him
  chosen_spanish_reading: no encuentro ningún cargo contra él
  alternative_spanish_readings:
  - no encuentro ninguna falta en él
  - no encuentro ningún caso contra él
  rationale: El verso presenta un juicio de carácter legal sobre Jesús; no se resuelve aquí una doctrina aparte, sino que se conserva el tono forense del texto. «Cargo» mantiene la tensión entre inocencia y acusación sin diluirla en una fórmula devocional.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el expediente inglés; el cierre de revisión indica que el texto quedó sin cambios y que el consenso fue alto. La redacción española sigue directamente esa lectura estable.
  spanish_consistency_notes:
  - Se mantiene «Pilato» como nombre propio sin adaptación.
  - Se usa «Jesús» en el texto del pasaje implícito por el pronombre, coherente con la práctica española del proyecto.
  - Se conserva el contraste espacial «afuera» / «afuera» para reflejar el doble movimiento del griego.
  - Se evita «Señor» u otra sustitución teológica no presente en el versículo.
  - Se traduce la idea forense de αἰτία con «cargo», conforme al contexto judicial documentado.
