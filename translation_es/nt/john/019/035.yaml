translation:
  language: es
  text: Y el que ha visto ha dado testimonio[a], y su testimonio es verdadero, y aquel sabe que dice la verdad, para que también ustedes crean[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ha testificado». El perfecto griego conserva la idea de un testimonio ya dado con validez presente.
    reason: alternative_reading
  - marker: b
    text: O «para que también ustedes sigan creyendo». El presente subjuntivo puede llevar un matiz continuo.
    reason: alternative_reading
lexical_decisions:
- source_word: ὁ ἑωρακὼς
  english_pob_choice: the one who has seen
  chosen_spanish: el que ha visto
  alternatives_spanish:
  - el que vio
  - el testigo ocular
  lexicon: BDAG
  rationale: El participio perfecto sustantivado conserva la idea de una visión ya realizada con vigencia actual. «El que ha visto» es natural en español y mantiene el matiz de testigo presencial sin convertirlo en una paráfrasis explicativa.
- source_word: μεμαρτύρηκεν
  english_pob_choice: has testified
  chosen_spanish: ha dado testimonio
  alternatives_spanish:
  - ha testificado
  - ha declarado como testigo
  lexicon: BDAG
  rationale: El perfecto expresa testimonio completado con validez presente. «Ha dado testimonio» es fluido en español y conserva la fuerza verbal de μαρτυρέω sin sonar forzado.
- source_word: ἀληθινὴ ... ἡ μαρτυρία
  english_pob_choice: his testimony is true
  chosen_spanish: su testimonio es verdadero
  alternatives_spanish:
  - su testimonio es cierto
  - su testimonio es genuino
  lexicon: BDAG
  rationale: «ἀληθινή» aquí califica la fiabilidad del testimonio. «Verdadero» es la correspondencia más directa y transparente en español, y «testimonio» mantiene la relación con «dar testimonio».
- source_word: ἐκεῖνος
  english_pob_choice: that one
  chosen_spanish: aquel
  alternatives_spanish:
  - ese
  - él
  lexicon: BDAG
  rationale: El demostrativo griego es enfático. «Aquel» preserva esa distancia o solemnidad mejor que un simple «él», sin identificar innecesariamente al hablante.
- source_word: οἶδεν
  english_pob_choice: knows
  chosen_spanish: sabe
  alternatives_spanish:
  - conoce
  - está seguro
  lexicon: BDAG
  rationale: οἶδα funciona con sentido presente de estado de conocimiento. «Sabe» es idiomático y fiel al valor estativo.
- source_word: ἀληθῆ λέγει
  english_pob_choice: he is telling the truth
  chosen_spanish: dice la verdad
  alternatives_spanish:
  - está diciendo la verdad
  - habla con verdad
  lexicon: BDAG
  rationale: La expresión griega idiomática se traduce con naturalidad. «Dice la verdad» comunica con precisión el sentido sin sobrecargar el español con una progresión aspectual innecesaria.
- source_word: ἵνα καὶ ὑμεῖς πιστεύητε
  english_pob_choice: so that you also may believe
  chosen_spanish: para que también ustedes crean
  alternatives_spanish:
  - para que ustedes también crean
  - a fin de que también ustedes crean
  - para que ustedes también sigan creyendo
  lexicon: BDAG
  rationale: «Para que» expresa adecuadamente la finalidad de ἵνα. «Crean» refleja la forma de subjuntivo presente sin imponer de entrada la nuance durativa; se deja la alternativa en nota porque el griego puede sugerir continuidad.
theological_decisions:
- issue: Identidad del testigo enfático
  english_pob_reading: The verse is rendered without resolving whether the narrator refers to himself in the third person or to another eyewitness, while preserving the emphatic wording.
  chosen_spanish_reading: La traducción mantiene el referente abierto con «el que ha visto» y «aquel», sin identificar al testigo.
  alternative_spanish_readings:
  - El narrador habla de sí mismo en tercera persona.
  - Se refiere a otro testigo distinto del narrador.
  rationale: El griego no identifica explícitamente al testigo. Conviene preservar la ambigüedad textual en vez de resolverla en la traducción.
  doctrine_reference: Preservar la tensión interpretativa sin cerrarla prematuramente.
- issue: Fuerza del subjuntivo presente πιστεύητε
  english_pob_reading: may believe
  chosen_spanish_reading: crean
  alternative_spanish_readings:
  - sigan creyendo
  - crean y continúen creyendo
  rationale: El presente subjuntivo puede admitir matiz continuo, pero en este contexto la finalidad se expresa de manera más natural con «crean». La posible continuidad queda recogida en la nota.
  doctrine_reference: Preservar una posible tensión aspectual sin resolverla dogmáticamente.
translation_notes:
  revision_awareness: 'Coincide con la intención de la POB en inglés: conservar el testimonio perfecto, el demostrativo enfático y la finalidad de ἵνα sin resolver la ambigüedad del testigo ni la posible continuidad de πιστεύητε.'
  spanish_consistency_notes:
  - Se usa «dar testimonio» para μαρτυρέω y «testimonio» para μαρτυρία con consistencia léxica.
  - Se mantiene «verdadero/verdad» para ἀληθινή/ἀληθῆ en lugar de introducir formulaciones interpretativas.
  - Se preserva el demostrativo enfático con «aquel» en vez de reducirlo a un pronombre neutro.
  - Se usa «crean» como subjuntivo natural en español, dejando la lectura durativa en nota.
