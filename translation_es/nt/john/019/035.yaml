  source_alignment_summary: 'El borrador español refleja fielmente el griego: «el que ha visto» conserva bien el participio perfecto sustantivado ὁ ἑωρακὼς; «ha dado testimonio» reproduce adecuadamente μεμαρτύρηκεν con valor perfecto; «su testimonio es verdadero» expresa bien ἀληθινὴ ... ἡ μαρτυρία; «aquel» mantiene la fuerza demostrativa de ἐκεῖνος sin resolver el referente; «sabe que dice la verdad» comunica con naturalidad ὅτι ἀληθῆ λέγει; y «para que también ustedes crean» preserva la finalidad de ἵνα y el valor inclusivo de καὶ ὑμεῖς. La nota sobre «sigan creyendo» conserva correctamente la posible nuance del presente subjuntivo.'
