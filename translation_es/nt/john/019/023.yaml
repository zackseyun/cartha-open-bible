revisions:
- from: Así que, cuando los soldados habían crucificado a Jesús, tomaron sus vestidos[a] y los repartieron en cuatro partes, una parte para cada soldado, y también la túnica. Ahora bien, la túnica era sin costura[b], tejida de una sola pieza[c] desde arriba hasta abajo.
  to: Así que, cuando los soldados habían crucificado a Jesús, tomaron sus prendas exteriores[a] e hicieron cuatro partes, una parte para cada soldado, y también la túnica. Ahora bien, la túnica era sin costuras[c], tejida desde la parte superior[b] por completo.
  rationale: Se corrige la principal desviación semántica al sustituir «desde arriba hasta abajo» por una formulación que refleja separadamente «desde la parte superior» y «por completo». También se restituye la alternativa documentada para ἄνωθεν, se elimina una nota redundante, y se fortalece en el texto principal el contraste entre las prendas exteriores y la túnica, en línea con el POB inglés y el griego.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:05:29Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue en gran parte el sentido del griego y del POB en la secuencia narrativa, la distinción entre ἱμάτια y χιτών, y la descripción no simbólica de la túnica. Sin embargo, altera dos decisiones importantes del audit trail: (1) convierte ὑφαντὸς δι’ ὅλου en «de una sola pieza ... hasta abajo», introduciendo «hasta abajo» y desplazando el sentido de «tejida por todo/a lo largo de toda la prenda»; y (2) omite en notas la alternativa documentada para ἐκ τῶν ἄνωθεν («desde la parte superior / desde arriba» en contraste con «de arriba»), mientras crea una nota redundante para «sin costura».'
  spanish_quality_summary: 'El español es generalmente claro y eclesialmente legible, pero presenta algunos giros menos naturales o menos precisos: «habían crucificado» suena algo pesado frente a «crucificaron» o «después de crucificar», aunque es defendible; «Ahora bien» funciona; «era sin costura» es comprensible pero menos idiomático que «era sin costuras» o «no tenía costura». La mayor necesidad de reparación es semántica: evitar «hasta abajo» y reflejar mejor «tejida ... por completo / toda de una pieza».'
  glossary_alignment: 'No hay conflicto con terminología de proyecto en nombres divinos o títulos. «Jesús» y «túnica» están bien. La decisión sobre τὰ ἱμάτια debería alinearse mejor con el POB principal: conviene usar «prendas exteriores» o «vestidos exteriores» en el texto, no relegarlo solo a nota, porque el contraste con la túnica es relevante en el propio versículo.'
  issues:
  - severity: high
    issue: «desde arriba hasta abajo» añade información no explícita
    rationale: El griego tiene ἐκ τῶν ἄνωθεν («desde arriba / desde la parte superior») y ὑφαντὸς δι’ ὅλου («tejida por completo / toda de una pieza / a lo largo de toda ella»). «Hasta abajo» no aparece en el texto y rehace la sintaxis.
  - severity: medium
    issue: La nota b es redundante e inútil
    rationale: La nota «O “sin costura”» repite exactamente el texto principal sin preservar una alternativa significativa del inglés, que era «seamless» / «woven in one piece through the whole garment».
  - severity: medium
    issue: Falta una nota para la alternativa de ἐκ τῶν ἄνωθεν
    rationale: El audit trail inglés preserva la alternativa «from above». En español conviene conservarla como «O “de arriba”» o similar, porque el término puede leerse así aunque aquí probablemente signifique la parte superior de la prenda.
  - severity: medium
    issue: «sus vestidos» debilita el contraste con «la túnica»
    rationale: Aunque natural, es demasiado amplio. Dado que el POB eligió «outer garments» precisamente para distinguirlos del χιτών, el español principal debe reflejar mejor esa distinción.
  - severity: low
    issue: «era sin costura» es menos idiomático
    rationale: En español bíblico actual suena más natural «era sin costuras» o «no tenía costura», sin perder fidelidad a ἄραφος.
  revised_spanish_text: Así que, cuando los soldados habían crucificado a Jesús, tomaron sus prendas exteriores[a] e hicieron cuatro partes, una parte para cada soldado, y también la túnica. Ahora bien, la túnica era sin costuras[c], tejida desde la parte superior[b] por completo.
  revised_footnotes:
  - marker: a
    text: O «sus vestidos»; el término griego puede referirse de manera amplia a la ropa, pero aquí probablemente designa las prendas exteriores, en contraste con la túnica mencionada aparte.
    reason: lexical_alternative
  - marker: b
    text: O «de arriba». En este contexto, la expresión probablemente se refiere a que la túnica estaba tejida desde la parte superior de la prenda hacia abajo.
    reason: lexical_alternative
  - marker: c
    text: O «tejida en una sola pieza por toda la prenda».
    reason: lexical_alternative
  revision_rationale: Se corrige la principal desviación semántica al sustituir «desde arriba hasta abajo» por una formulación que refleja separadamente «desde la parte superior» y «por completo». También se restituye la alternativa documentada para ἄνωθεν, se elimina una nota redundante, y se fortalece en el texto principal el contraste entre las prendas exteriores y la túnica, en línea con el POB inglés y el griego.
