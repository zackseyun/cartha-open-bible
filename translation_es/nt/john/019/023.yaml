source:
  edition: SBLGNT
  text: οἱ οὖν στρατιῶται ὅτε ἐσταύρωσαν τὸν Ἰησοῦν ἔλαβον τὰ ἱμάτια αὐτοῦ καὶ ἐποίησαν τέσσαρα μέρη, ἑκάστῳ στρατιώτῃ μέρος, καὶ τὸν χιτῶνα. ἦν δὲ ὁ χιτὼν ἄραφος, ἐκ τῶν ἄνωθεν ὑφαντὸς δι’ ὅλου·
base_translation:
  language: en
  yaml_path: translation/nt/john/019/023.yaml
  text: So when the soldiers had crucified Jesus[a], they took his outer garments and made four parts, a part for each soldier, and also the tunic. Now the tunic was seamless[c][b], woven from the top throughout.
  footnotes:
  - marker: a
    text: Or 'his garments'; the Greek term can refer broadly to clothing, but here likely means the outer garments in contrast with the tunic mentioned separately.
    reason: lexical_alternative
  - marker: b
    text: Or 'from above.' In this context the phrase most likely refers to the tunic being woven from the top of the garment downward.
    reason: lexical_alternative
  - marker: c
    text: Or 'woven in one piece through the whole garment.'
    reason: lexical_alternative
