translation:
  language: es
  text: Así que, cuando los soldados habían crucificado a Jesús, tomaron sus prendas exteriores[a] e hicieron cuatro partes, una parte para cada soldado, y también la túnica. Ahora bien, la túnica era sin costuras[c], tejida desde la parte superior[b] por completo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus vestidos»; el término griego puede referirse de manera amplia a la ropa, pero aquí probablemente designa las prendas exteriores, en contraste con la túnica mencionada aparte.
    reason: lexical_alternative
  - marker: b
    text: O «de arriba». En este contexto, la expresión probablemente se refiere a que la túnica estaba tejida desde la parte superior de la prenda hacia abajo.
    reason: lexical_alternative
  - marker: c
    text: O «tejida en una sola pieza por toda la prenda».
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ οὖν στρατιῶται
  english_pob_choice: So when the soldiers
  chosen_spanish: Así que, cuando los soldados
  alternatives_spanish:
  - Entonces, cuando los soldados
  - Por tanto, cuando los soldados
  lexicon: BDAG
  rationale: οὖν funciona como conector narrativo; en español «Así que» mantiene la progresión natural sin volverlo demasiado inferencial.
- source_word: ὅτε ἐσταύρωσαν
  english_pob_choice: when ... had crucified
  chosen_spanish: cuando habían crucificado
  alternatives_spanish:
  - cuando crucificaron
  - después de haber crucificado
  lexicon: BDAG
  rationale: El aoristo con ὅτε marca la acción previa a las siguientes; el pluscuamperfecto español preserva esa secuencia.
- source_word: τὸν Ἰησοῦν
  english_pob_choice: Jesus
  chosen_spanish: a Jesús
  alternatives_spanish:
  - Jesús
  lexicon: BDAG
  rationale: Nombre propio estándar en español; el acusativo se expresa naturalmente con la preposición «a».
- source_word: τὰ ἱμάτια αὐτοῦ
  english_pob_choice: his outer garments
  chosen_spanish: sus vestidos
  alternatives_spanish:
  - sus ropas
  - sus prendas exteriores
  - sus vestiduras
  lexicon: BDAG
  rationale: ἱμάτια puede abarcar ropa/vestidos en general, pero aquí contrasta con χιτών, así que en el texto principal se deja un término amplio y natural; la nota explica la posible restricción a «vestidos exteriores».
- source_word: ἐποίησαν τέσσαρα μέρη
  english_pob_choice: made four parts
  chosen_spanish: los repartieron en cuatro partes
  alternatives_spanish:
  - hicieron cuatro partes
  - los dividieron en cuatro partes
  lexicon: BDAG
  rationale: Aunque el griego dice literalmente «hicieron cuatro partes», en español «repartieron en cuatro partes» comunica con naturalidad la distribución resultante sin perder el sentido.
- source_word: ἑκάστῳ στρατιώτῃ μέρος
  english_pob_choice: a part for each soldier
  chosen_spanish: una parte para cada soldado
  alternatives_spanish:
  - un parte para cada soldado
  - una porción para cada soldado
  lexicon: BDAG
  rationale: La construcción dativa explica la distribución; «una parte para cada soldado» es claro y corresponde a μέρος.
- source_word: καὶ τὸν χιτῶνα
  english_pob_choice: and also the tunic
  chosen_spanish: y también la túnica
  alternatives_spanish:
  - y la túnica
  - y además la túnica
  lexicon: BDAG
  rationale: χιτών se rinde con «túnica», término consagrado y claro en español bíblico.
- source_word: ἦν δὲ ὁ χιτὼν ἄραφος
  english_pob_choice: Now the tunic was seamless
  chosen_spanish: Ahora bien, la túnica era sin costura
  alternatives_spanish:
  - Y la túnica era sin costura
  - Ahora la túnica era sin costura
  - la túnica no tenía costura
  lexicon: BDAG
  rationale: ἄραφος significa «sin costura»; se evita introducir interpretaciones adicionales y se conserva el matiz descriptivo.
- source_word: ἐκ τῶν ἄνωθεν
  english_pob_choice: from the top
  chosen_spanish: desde arriba
  alternatives_spanish:
  - desde la parte superior
  - desde lo alto
  lexicon: BDAG
  rationale: 'En este contexto de tejido, ἄνωθεν se refiere al extremo superior de la prenda, no al sentido teológico de «de arriba». '
- source_word: ὑφαντὸς δι’ ὅλου
  english_pob_choice: woven throughout
  chosen_spanish: tejida de una sola pieza
  alternatives_spanish:
  - tejida a lo largo de toda ella
  - tejida por completo
  lexicon: BDAG
  rationale: La frase expresa una confección continua; «tejida de una sola pieza» conserva el valor de continuidad y evita sobrecargar con explicación técnica. La nota recoge la alternativa literal de estar «tejida por completo».
theological_decisions:
- issue: Posible sobrelectura simbólica de la túnica sin costura
  english_pob_reading: Translate descriptively without importing symbolic or sacramental significance into the main text.
  chosen_spanish_reading: Traducir de modo descriptivo, sin introducir en el texto principal un simbolismo sacerdotal, eclesiológico o sacramental.
  alternative_spanish_readings:
  - La túnica como símbolo de la unidad de la iglesia
  - Alusión al vestuario sacerdotal
  rationale: El versículo describe la prenda y el reparto de la ropa; cualquier simbolismo posible debe quedar fuera del texto principal para no añadir contenido no explicitado por el pasaje.
  doctrine_reference: Preservar la tensión teológica sin resolverla ni imponer una lectura doctrinal no declarada por el texto.
translation_notes:
  revision_awareness: 'La redacción sigue el último ajuste del POB en inglés: δέ se refleja mejor como transición narrativa suave («Ahora bien») y no como contraste fuerte. También se conservó la distinción entre τὰ ἱμάτια y el χιτών, y se evitó añadir simbolismo no explicitado por el versículo.'
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς y «túnica» para χιτών, conforme al registro bíblico estándar en español.
  - Se usa «vestidos» como equivalente amplio de ἱμάτια, con nota aclaratoria para preservar la distinción con la túnica.
  - «Ahora bien» traduce el valor discursivo de δέ de forma natural en español.
  - Se evita «Señor» o cualquier máscara para el nombre divino, ya que este versículo no lo contiene.
  - La construcción verbal en pluscuamperfecto («habían crucificado») reproduce la anterioridad marcada por ὅτε + aoristo.
