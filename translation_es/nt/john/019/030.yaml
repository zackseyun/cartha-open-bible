revisions:
- from: 'Así que, cuando Jesús hubo recibido el vinagre agrio[a], dijo: «Consumado es[b]», y, inclinando la cabeza, entregó su espíritu[c].'
  to: 'Entonces, cuando Jesús hubo recibido el vino agrio[a], dijo: «Consumado es[b]», y, inclinando la cabeza, entregó su espíritu[c].'
  rationale: 'Se corrige el principal problema léxico y estilístico del borrador: τὸ ὄξος debe representarse en el texto principal como «vino agrio», no «vinagre agrio». También se suaviza el arranque a «Entonces, cuando» para reflejar ὅτε οὖν con mejor español. Se conservan «Consumado es» y «entregó su espíritu» porque reproducen adecuadamente tanto la tradición de traducción como la fuerza semántica y teológica documentada en la auditoría inglesa.'
