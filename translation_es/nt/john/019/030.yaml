translation:
  language: es
  text: 'Entonces, cuando Jesús hubo recibido el vino agrio[a], dijo: «Consumado es[b]», y, inclinando la cabeza, entregó su espíritu[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el vinagre» o «el vino avinagrado». El griego ὄξος se refiere a vino agrio.
    reason: lexical_alternative
  - marker: b
    text: O «Está terminado» o «Se ha cumplido».
    reason: lexical_alternative
  - marker: c
    text: 'O «exhaló su último aliento». El griego dice más literalmente: «entregó su espíritu».'
    reason: alternative_reading
lexical_decisions:
- source_word: ὅτε οὖν
  english_pob_choice: So when
  chosen_spanish: Así que, cuando
  alternatives_spanish:
  - Cuando, pues
  - Entonces, cuando
  lexicon: BDAG
  rationale: La combinación griega une temporalidad (ὅτε) con transición discursiva (οὖν). «Así que, cuando» conserva ambos valores con fluidez natural en español, sin volverlo rígidamente «cuando, por tanto».
- source_word: ἔλαβεν
  english_pob_choice: had received
  chosen_spanish: hubo recibido
  alternatives_spanish:
  - recibió
  - había recibido
  lexicon: BDAG
  rationale: El aoristo de λαμβάνω en este contexto expresa la recepción del ofrecimiento antes de la palabra de Jesús. En español, «hubo recibido» reproduce bien la secuencia anterior y mantiene el matiz narrativo de acto concluido.
- source_word: τὸ ὄξος
  english_pob_choice: the sour wine
  chosen_spanish: el vinagre agrio
  alternatives_spanish:
  - el vino agrio
  - el vinagre
  - el vino avinagrado
  lexicon: BDAG
  rationale: ὄξος designa una bebida agria asociada al vino, pero en español «vinagre agrio» comunica de modo directo la crudeza del término y conserva la tensión lexical documentada por la POB entre vino agrio y vinagre. Se evita una domesticación excesiva con solo «vino», que podría suavizar el referente.
- source_word: Τετέλεσται
  english_pob_choice: It is finished
  chosen_spanish: Consumado es
  alternatives_spanish:
  - Está terminado
  - Se ha cumplido
  - Está cumplido
  lexicon: BDAG
  rationale: La forma perfecta de τελέω expresa culminación con resultado vigente. «Consumado es» es una fórmula española digna y fiel al peso de finalización/realización, sin reducir el alcance a mera terminación material.
- source_word: κλίνας τὴν κεφαλὴν
  english_pob_choice: bowing his head
  chosen_spanish: inclinando la cabeza
  alternatives_spanish:
  - habiendo inclinado la cabeza
  - bajando la cabeza
  lexicon: BDAG
  rationale: El participio aoristo se vierte con una construcción participial natural en español. «Inclinando la cabeza» preserva la acción concomitante sin añadir sujeto posesivo innecesario, ya que el referente es claro por el contexto.
- source_word: παρέδωκεν
  english_pob_choice: gave up
  chosen_spanish: entregó
  alternatives_spanish:
  - dio
  - cedió
  - entregó su vida
  lexicon: BDAG
  rationale: παραδίδωμι puede significar entregar, encomendar o entregar en manos de otro; aquí, con τὸ πνεῦμα, señala la entrega voluntaria del aliento/espíritu en la muerte. «Entregó» preserva el acto intencional sin forzar una paráfrasis.
- source_word: τὸ πνεῦμα
  english_pob_choice: his spirit
  chosen_spanish: su espíritu
  alternatives_spanish:
  - el espíritu
  - su aliento
  lexicon: BDAG
  rationale: Aunque el griego tiene artículo, el español idiomático requiere posesivo. «Su espíritu» mantiene la fuerza lexical de πνεῦμα y la gravedad teológica de la expresión, en vez de reducirla a un simple «murió».
theological_decisions:
- issue: Cómo rendir παρέδωκεν τὸ πνεῦμα sin perder la tensión entre idiomática de muerte y el matiz personal del espíritu.
  english_pob_reading: he gave up his spirit
  chosen_spanish_reading: entregó su espíritu
  alternative_spanish_readings:
  - murió
  - exhaló su último aliento
  - entregó su vida
  rationale: La POB preserva la literalidad teológica de la expresión sin resolverla en una mera glosa de fallecimiento. «Entregó su espíritu» conserva ese peso y mantiene abierta la lectura de una entrega voluntaria en la muerte de Jesús.
  doctrine_reference: Preservar la tensión léxica y cristológica del texto sin explicitar más de lo que el verso dice.
- issue: Cómo traducir Τετέλεσται sin vaciar su fuerza de cumplimiento consumado.
  english_pob_reading: It is finished
  chosen_spanish_reading: Consumado es
  alternative_spanish_readings:
  - Está terminado
  - Se ha cumplido
  - Está consumado
  rationale: La declaración griega comunica culminación y resultado permanente. «Consumado es» reproduce la gravedad solemne del enunciado y puede abarcar tanto finalización como cumplimiento, sin imponer una sola lectura interpretativa.
  doctrine_reference: Mantener el énfasis joánico en la culminación de la obra de Jesús.
translation_notes:
  revision_awareness: 'Se ha seguido el pasaje griego SBLGNT y el rastro auditado en inglés POB. No se introdujeron revisiones recientes; el estado de revisión más reciente indica que no hubo cambios necesarios. Se conservaron las tensiones léxicas principales: ὄξος, Τετέλεσται y παρέδωκεν τὸ πνεῦμα.'
  spanish_consistency_notes:
  - Se usó «espíritu» para πνεῦμα, en coherencia con el valor teológico y lexical del texto.
  - Se evitó «SEÑOR» y no hubo términos divinos adicionales en este versículo.
  - «Consumado es» mantiene un registro solemne y publicable, compatible con el estilo de POB en español.
  - La puntuación y las comillas siguen convenciones tipográficas españolas y conservan la segmentación del original.
