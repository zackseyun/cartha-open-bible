base_translation:
  language: en
  yaml_path: translation/nt/john/019/030.yaml
  text: So when Jesus had received the sour wine[a], he said, “It is finished,” and bowing his head[c][b], he gave up his spirit.
  footnotes:
  - marker: a
    text: Or “the vinegar” or “the wine vinegar.” The Greek ὄξος refers to sour wine.
    reason: lexical_alternative
  - marker: b
    text: Or “It has been accomplished” or “It has been completed.”
    reason: lexical_alternative
  - marker: c
    text: Or “he breathed his last.” The Greek more literally says, “he gave up his spirit.”
    reason: alternative_reading
