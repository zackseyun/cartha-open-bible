translation:
  language: es
  text: Junto a la cruz de Jesús estaban su madre, y la hermana de su madre[b], María la de Clopas[a], y María Magdalena.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘María de Clopas’; el griego no expresa explícitamente la relación, aunque ‘esposa de Clopas’ es una interpretación común.
    reason: lexical_alternative
  - marker: b
    text: El griego también puede leerse como si nombrara a tres mujeres en vez de cuatro, si «la hermana de su madre» se entiende como la misma persona que «María de Clopas».
    reason: alternative_reading
lexical_decisions:
- source_word: Εἱστήκεισαν
  english_pob_choice: were standing
  chosen_spanish: estaban
  alternatives_spanish:
  - estaban de pie
  - estaban paradas
  - permanecían
  lexicon: ἵστημι
  rationale: El imperfectivo de la forma griega expresa postura continuada; en español, «estaban» comunica bien esa permanencia sin sonar forzado. «De pie» puede añadirse implícitamente por el contexto de estar junto a la cruz, pero no es necesario en la frase.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Junto
  alternatives_spanish:
  - Ahora
  - Y
  - Pero
  lexicon: BDAG
  rationale: Aquí δέ funciona como transición narrativa. En español, comenzar con «Junto a la cruz» fluye naturalmente y evita un marcador discursivo artificial; el valor de cambio de escena queda suficientemente expresado por el contexto.
- source_word: παρὰ τῷ σταυρῷ
  english_pob_choice: by the cross
  chosen_spanish: junto a la cruz
  alternatives_spanish:
  - cerca de la cruz
  - al lado de la cruz
  lexicon: BDAG
  rationale: παρά con dativo indica proximidad. «Junto a la cruz» conserva esa cercanía de manera natural y precisa en español.
- source_word: τοῦ Ἰησοῦ
  english_pob_choice: of Jesus
  chosen_spanish: de Jesús
  alternatives_spanish:
  - de Jesús crucificado
  lexicon: BDAG
  rationale: El genitivo modifica directamente a «cruz». Se mantiene la relación simple del griego sin expansión interpretativa.
- source_word: ἡ μήτηρ αὐτοῦ
  english_pob_choice: his mother
  chosen_spanish: su madre
  alternatives_spanish:
  - la madre de él
  lexicon: BDAG
  rationale: Correspondencia directa y natural; el posesivo español reproduce bien el referente sin necesidad de repetir el nombre.
- source_word: ἡ ἀδελφὴ τῆς μητρὸς αὐτοῦ
  english_pob_choice: his mother's sister
  chosen_spanish: la hermana de su madre
  alternatives_spanish:
  - la hermana de su madre
  - su tía
  lexicon: BDAG
  rationale: La construcción genitiva se traduce de forma transparente. «Su tía» sería una inferencia que el griego no dice explícitamente, por lo que se evita en el texto principal.
- source_word: Μαρία ἡ τοῦ Κλωπᾶ
  english_pob_choice: Mary the wife of Clopas
  chosen_spanish: María la de Clopas
  alternatives_spanish:
  - María, esposa de Clopas
  - María de Clopas
  lexicon: BDAG
  rationale: El griego no dice de manera explícita «esposa». Para no sobreinterpretar, se conserva una formulación abierta que refleja la ambigüedad del original y permite la lectura tradicional sin imponerla en el texto principal.
- source_word: Μαρία ἡ Μαγδαληνή
  english_pob_choice: Mary Magdalene
  chosen_spanish: María Magdalena
  alternatives_spanish:
  - María la Magdalena
  lexicon: BDAG
  rationale: Forma consagrada y plenamente inteligible en español; mantiene el identificador geográfico tradicional del nombre.
theological_decisions:
- issue: Número e identidad de las mujeres al pie de la cruz
  english_pob_reading: The verse is rendered as listing four women, while preserving the possibility that 'his mother's sister' and 'Mary of Clopas' may be the same person in a footnote.
  chosen_spanish_reading: El texto principal queda abierto a cuatro mujeres, sin resolver dogmáticamente si la hermana de su madre y María la de Clopas son la misma persona.
  alternative_spanish_readings:
  - Leer tres mujeres, tomando «la hermana de su madre» como la misma persona que «María la de Clopas».
  rationale: La sintaxis griega permite ambas posibilidades. La traducción conserva la lectura más directa, pero la nota reconoce la tensión interpretativa para no cerrar indebidamente el texto.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: La versión inglesa auditada ya había decidido mantener la fuerza durativa de Εἱστήκεισαν, tratar δὲ como transición narrativa, y dejar abierta la relación de María con Clopas y el posible recuento de las mujeres. La propuesta española sigue esas decisiones sin añadir inferencias nuevas.
  spanish_consistency_notes:
  - Se usa «Jesús» y no una sustitución reverencial de tipo máscara, conforme al estándar del proyecto.
  - Se conserva «María Magdalena» como forma establecida en español.
  - «La de Clopas» mantiene la ambigüedad del griego mejor que «esposa de Clopas», que se reserva para la nota.
  - El orden de los nombres sigue el griego y el texto inglés auditado, evitando armonizaciones externas.
