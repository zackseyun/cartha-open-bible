base_translation:
  language: en
  yaml_path: translation/nt/john/019/025.yaml
  text: Now standing by the cross of Jesus were his mother[a], and his mother's sister, Mary the wife of Clopas[b], and Mary Magdalene.
  footnotes:
  - marker: a
    text: Or 'Mary of Clopas'; the Greek does not explicitly state the relationship, though 'wife of Clopas' is a common interpretation.
    reason: lexical_alternative
  - marker: b
    text: The Greek may also be read as naming three women rather than four, if 'his mother's sister' is taken to be the same person as 'Mary of Clopas.'
    reason: alternative_reading
