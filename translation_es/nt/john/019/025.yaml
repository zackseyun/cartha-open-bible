  glossary_alignment: No hay conflictos con la terminología base del proyecto en este versículo. «Jesús» y «María Magdalena» están bien. La decisión de no explicitar «esposa» en el texto principal es defendible en español dado que el griego no lo dice de forma explícita, siempre que la alternativa se conserve en nota.
