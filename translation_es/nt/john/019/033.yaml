translation:
  language: es
  text: Pero cuando llegaron a Jesús[a], al ver que ya estaba muerto[b], no le quebraron las piernas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Más adelante Juan conecta esta acción con la Escritura: «No le será quebrado ni un solo hueso» (Juan 19:36; cf. Éx 12:46; Nm 9:12; Sal 34:20).'
    reason: cross_reference
  - marker: b
    text: 'O: «al ver que ya había muerto».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπὶ δὲ τὸν Ἰησοῦν ἐλθόντες
  english_pob_choice: But when they came to Jesus
  chosen_spanish: Pero cuando llegaron a Jesús
  alternatives_spanish:
  - Pero al llegar a Jesús
  - Pero después de llegar a Jesús
  lexicon: BDAG
  rationale: La construcción participial con δέ se expresa de manera natural en español como una cláusula temporal; «pero» conserva el leve contraste de δέ con la acción anterior, y «llegaron a Jesús» mantiene el movimiento hacia él sin calco innecesario.
- source_word: ὡς εἶδον
  english_pob_choice: seeing that
  chosen_spanish: al ver que
  alternatives_spanish:
  - cuando vieron que
  - después de ver que
  lexicon: BDAG
  rationale: ὡς con el aoristo introduce la circunstancia que motiva la acción siguiente. «Al ver que» reproduce de forma natural tanto la percepción como la relación causal implícita.
- source_word: ἤδη
  english_pob_choice: already
  chosen_spanish: ya
  alternatives_spanish:
  - ya para entonces
  - ya en ese momento
  lexicon: BDAG
  rationale: ἤδη señala que la muerte de Jesús ya había ocurrido al llegar los soldados. «Ya» es el equivalente más directo y natural en español.
- source_word: τεθνηκότα
  english_pob_choice: dead
  chosen_spanish: muerto
  alternatives_spanish:
  - habiendo muerto
  - que había muerto
  lexicon: BDAG
  rationale: El participio perfecto de θνῄσκω enfatiza el estado resultante. En español, «muerto» comunica con claridad ese estado sin perder la fuerza del original.
- source_word: οὐ κατέαξαν
  english_pob_choice: they did not break
  chosen_spanish: no le quebraron
  alternatives_spanish:
  - no le rompieron
  - no le partieron
  lexicon: BDAG
  rationale: κατάγνυμι aquí se refiere a romper huesos o piernas. «Quebraron» es un equivalente natural y preciso en español bíblico y contemporáneo.
- source_word: τὰ σκέλη
  english_pob_choice: his legs
  chosen_spanish: las piernas
  alternatives_spanish:
  - las piernas de él
  - los huesos de las piernas
  lexicon: BDAG
  rationale: σκέλη significa «piernas». Aunque el contexto supone daño óseo, la frase natural en español es «quebrar las piernas»; expandir a «huesos» iría más allá de la formulación del verso.
theological_decisions:
- issue: Posible alusión a la Escritura mediante la integridad de los huesos de Jesús
  english_pob_reading: The main text remains a straightforward narrative statement without importing fulfillment language into this verse.
  chosen_spanish_reading: El texto principal permanece como una afirmación narrativa directa, sin introducir en este versículo el lenguaje de cumplimiento.
  alternative_spanish_readings:
  - Traducir con una formulación que destaque «huesos» en lugar de «piernas» para anticipar 19:36
  rationale: Juan 19:36 explicita la conexión con la Escritura. Este versículo narra la acción de los soldados y no debe expandirse con lenguaje de cumplimiento antes de que el propio texto lo haga. Se conserva así la tensión teológica, con el vínculo canónico reservado para la nota cruzada.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla; primacía de la fuente original sobre la tradición de traducción.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se necesitaban cambios; se mantiene la lectura principal con una nota cruzada y una alternativa léxica breve, sin añadir interpretaciones ajenas al versículo.
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς de forma consistente.
  - Se conserva «ya» para ἤδη y «muerto» para el estado resultante de τεθνηκότα.
  - Se usa «quebraron» para el valor físico de κατάγνυμι en este contexto, sin recurrir a un término más técnico o más débil.
  - Se evita introducir «huesos» en el texto principal para no anticipar 19:36, preservando la distinción narrativa del versículo.
