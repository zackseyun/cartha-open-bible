revisions:
- from: 'Entonces Jesús salió[a], llevando la corona de espinas y el manto púrpura. Y les dice: «[b]He aquí el hombre».'
  to: 'Entonces Jesús salió, con la corona de espinas y el manto púrpura puestos. Y les dice: «He aquí[a] el hombre».'
  rationale: Se ajusta φορῶν a una expresión más precisa en español para ‘wearing’, se elimina la nota defectuosa sobre ἐξῆλθεν, y se conserva la formulación solemne «He aquí el hombre» con la alternativa léxica documentada para Ἰδοὺ. No se requiere una nota sobre «salió», porque el texto principal ya es natural y fiel, y la alternativa auditada no necesita preservarse obligatoriamente aquí.
  reviewer_model: gpt-5.4
