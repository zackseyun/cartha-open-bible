translation:
  language: es
  text: 'Entonces Jesús salió, con la corona de espinas y el manto púrpura puestos. Y les dice: «He aquí[a] el hombre».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Miren, el hombre». El griego Ἰδοὺ es una expresión de atención que puede traducirse como «He aquí», «Miren» o «Vean».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξῆλθεν
  english_pob_choice: came out
  chosen_spanish: salió
  alternatives_spanish:
  - salió afuera
  - se puso afuera
  lexicon: BDAG
  rationale: El verbo aoristo de ἐξέρχομαι indica movimiento hacia fuera. En español, «salió» comunica con naturalidad la acción narrativa; añadir «afuera» sería redundante, aunque el contexto ya implica el exterior.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Entonces
  alternatives_spanish:
  - Así que
  - Por eso
  lexicon: BDAG
  rationale: Funciona como conector narrativo de consecuencia o continuidad. «Entonces» conserva ese enlace en español sin sonar excesivamente formal.
- source_word: ἔξω
  english_pob_choice: out
  chosen_spanish: salió
  alternatives_spanish:
  - afuera
  - al exterior
  lexicon: BDAG
  rationale: Aquí ἔξω refuerza la salida ya expresada por ἐξῆλθεν. En español conviene integrarlo en el verbo principal para evitar una formulación mecánica como «salió afuera».
- source_word: φορῶν
  english_pob_choice: wearing
  chosen_spanish: llevando
  alternatives_spanish:
  - vistiendo
  - puesto
  lexicon: BDAG
  rationale: El participio de φορέω puede indicar portar o llevar una prenda o adorno sobre sí. «Llevando» permite incluir tanto la corona como el manto sin forzar un equivalente demasiado técnico.
- source_word: ἀκάνθινον στέφανον
  english_pob_choice: the crown of thorns
  chosen_spanish: la corona de espinas
  alternatives_spanish:
  - la corona espinosa
  - la corona de zarzas
  lexicon: BDAG
  rationale: «Corona de espinas» es la expresión natural y fiel para un στέφανος hecho de espinas. Conserva el sentido material y el valor de humillación real que el contexto exige.
- source_word: πορφυροῦν ἱμάτιον
  english_pob_choice: the purple robe
  chosen_spanish: el manto púrpura
  alternatives_spanish:
  - la ropa púrpura
  - el vestido púrpura
  lexicon: BDAG
  rationale: ἱμάτιον es una prenda exterior amplia; en este contexto de burla real, «manto» en español transmite mejor la función simbólica que «ropa» y sigue siendo suficientemente general. «Púrpura» conserva el color regio.
- source_word: λέγει
  english_pob_choice: he says
  chosen_spanish: dice
  alternatives_spanish:
  - dice él
  - les dijo
  lexicon: BDAG
  rationale: El presente histórico de Juan puede mantenerse con «dice», que conserva la vividez narrativa. En español es natural y no obliga a aplanar el efecto discursivo a pasado.
- source_word: Ἰδοὺ
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Miren
  - Vean
  lexicon: BDAG
  rationale: «He aquí» reproduce el tono deíctico y solemne de Ἰδοὺ mejor que una orden coloquial. Mantiene la fuerza de presentación pública que tiene la frase en el relato.
- source_word: ὁ ἄνθρωπος
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - este hombre
  - el ser humano
  lexicon: BDAG
  rationale: La expresión apunta concretamente a Jesús como individuo varón presentado ante la multitud. «El hombre» conserva la literalidad y la ambigüedad narrativa sin convertirla en una generalización antropológica.
theological_decisions:
- issue: Valor de ὁ ἄνθρωπος en la declaración de Pilato
  english_pob_reading: the man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - este hombre
  - el ser humano
  rationale: Se conserva el sustantivo singular con artículo para no diluir la referencia concreta a Jesús. Aunque algunos lectores oyen ecos más amplios sobre la humanidad, el texto presenta ante todo a una persona específica; la versión española debe mantener esa tensión sin resolverla.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (Preserve theological tension rather than resolve it) y §4 (Gender-accurate over gender-neutral)
- issue: Mantenimiento del presente histórico en λέγει
  english_pob_reading: he says
  chosen_spanish_reading: dice
  alternative_spanish_readings:
  - dijo
  rationale: El presente histórico añade viveza a la escena y encaja con la presentación pública y solemne de Jesús. Mantenerlo en español evita perder un rasgo narrativo observado por el POB inglés.
  doctrine_reference: DOCTRINE.md Translation philosophy §2 (Stay close to the discourse form where it matters)
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el expediente inglés; el pasaje quedó sin cambios en la última pasada. La traducción española sigue el texto fuente griego y mantiene las decisiones auditadas del POB inglés sin introducir ajustes no documentados.
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς, «espinas» para ἀκάνθινον, y «púrpura» para πορφυροῦν, siguiendo el paquete fuente.
  - Se conserva el presente histórico en «dice» para reflejar el valor discursivo del griego.
  - No se usó «SEÑOR» ni «Cristo», porque el versículo no contiene κύριος ni Χριστός como títulos en este punto.
  - La frase final queda suficientemente literal y solemne para la presentación pública de Jesús, sin suavizar la ironía del contexto.
