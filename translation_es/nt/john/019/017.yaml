translation:
  language: es
  text: Y llevando él mismo la cruz,[a] salió al lugar llamado Lugar de la Calavera, que en hebreo se llama Gólgota.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente, «en arameo». El término de Juan «en hebreo» puede referirse a la lengua semítica local de Judea.
    reason: lexical_alternative
lexical_decisions:
- source_word: βαστάζων
  english_pob_choice: carrying
  chosen_spanish: llevando
  alternatives_spanish:
  - cargando
  - portando
  lexicon: BDAG
  rationale: El participio expresa la acción concreta de llevar físicamente. «Llevando» suena natural en español y conserva la imagen corporal sin añadir matices no presentes en el griego.
- source_word: αὑτῷ τὸν σταυρὸν
  english_pob_choice: the cross by himself
  chosen_spanish: la cruz por sí mismo
  alternatives_spanish:
  - su propia cruz
  - la cruz para sí
  - la cruz él mismo
  lexicon: BDAG
  rationale: La construcción reflexiva subraya que Jesús la llevaba él mismo. «Por sí mismo» reproduce esa fuerza sin imponer un posesivo que no está explícito en el giro griego revisado.
- source_word: σταυρός
  english_pob_choice: cross
  chosen_spanish: cruz
  alternatives_spanish:
  - madero
  - patíbulo
  lexicon: BDAG
  rationale: En el contexto de la pasión, el sentido normal es «cruz». Mantiene la equivalencia directa y la claridad para el lector español.
- source_word: ἐξῆλθεν
  english_pob_choice: he went out
  chosen_spanish: salió
  alternatives_spanish:
  - salió fuera
  - se fue
  lexicon: BDAG
  rationale: El aoristo indica salida del lugar; «salió» es la equivalencia más breve y natural en español.
- source_word: τὸν λεγόμενον Κρανίου Τόπον
  english_pob_choice: the place called Skull Place
  chosen_spanish: el lugar llamado Lugar de la Calavera
  alternatives_spanish:
  - el lugar llamado Lugar del Cráneo
  - el lugar llamado Calvario
  lexicon: BDAG
  rationale: 'Se conserva la estructura nominativa del griego: un lugar llamado literalmente «Lugar de la Calavera». Se evita «Calvario» en el texto principal porque introduce una forma tradicional que ya interpreta la expresión.'
- source_word: Κρανίου
  english_pob_choice: Skull
  chosen_spanish: de la Calavera
  alternatives_spanish:
  - del Cráneo
  - de la Calavera
  lexicon: BDAG
  rationale: «Κρανίον» significa «cráneo/calavera». «Calavera» es más idiomático y transparente en español general, y conserva la imagen original del topónimo.
- source_word: ὃ λέγεται
  english_pob_choice: which is called
  chosen_spanish: que ... se llama
  alternatives_spanish:
  - que ... es llamado
  - que ... se dice
  lexicon: BDAG
  rationale: La pasiva nominal de denominación se vierte naturalmente con «se llama», que preserva la función identificadora de la frase.
- source_word: Ἑβραϊστί
  english_pob_choice: in Hebrew
  chosen_spanish: en hebreo
  alternatives_spanish:
  - en arameo
  lexicon: BDAG
  rationale: El griego dice explícitamente «en hebreo». Se conserva esa forma en el texto principal, dejando la posible referencia al arameo como alternativa nota-citacional si se requiere.
- source_word: Γολγοθα
  english_pob_choice: Golgotha
  chosen_spanish: Gólgota
  alternatives_spanish:
  - Golgota
  lexicon: BDAG
  rationale: Es un nombre propio transliterado. «Gólgota» es la forma castellana más estable y reconocible, manteniendo el carácter de topónimo.
theological_decisions:
- issue: Referencia a la lengua semítica en Ἑβραϊστί
  english_pob_reading: in Hebrew, with a footnote noting possible Aramaic reference
  chosen_spanish_reading: en hebreo, con nota sobre posible referencia al arameo
  alternative_spanish_readings:
  - en arameo
  - en la lengua local semítica
  rationale: El texto griego y la traducción POB principal conservan «en hebreo». Dado que en el uso joánico el término puede abarcar la lengua semítica local de Judea, se mantiene la tensión en una nota en vez de resolverla en el cuerpo del texto.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; preserve documented lexical tension.'
translation_notes:
  revision_awareness: Esta versión sigue la revisión del auditorio inglés que desplazó una posesión implícita hacia una lectura más cercana a αὑτῷ τὸν σταυρόν, evitando «su propia cruz» y manteniendo explícito que él la llevaba por sí mismo.
  spanish_consistency_notes:
  - Se conserva «Gólgota» como nombre propio transliterado y se evita «Calvario» en el cuerpo, porque el griego presenta un topónimo explicado literalmente.
  - «Lugar de la Calavera» mantiene la estructura explicativa del original sin sustituirla por una frase tradicional más interpretativa.
  - El texto principal usa «en hebreo» conforme al griego; la posible ampliación a arameo queda en nota para no borrar la tensión lexical documentada.
