translation:
  language: es
  text: Entonces Pilato tomó a Jesús y lo azotó[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más explícitamente en cuanto a agencia delegada: «Entonces Pilato tomó a Jesús y mandó que lo azotaran».'
    reason: alternative_reading
lexical_decisions:
- source_word: Τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - Así que
  lexicon: BDAG
  rationale: Marca la secuencia temporal inmediata en la narración. «Entonces» es natural en español y conserva el avance del relato sin añadir matices que el griego no exige.
- source_word: οὖν
  english_pob_choice: — (implicit in English flow)
  chosen_spanish: — (implícito en el flujo del español)
  alternatives_spanish:
  - por tanto
  - así pues
  lexicon: BDAG
  rationale: En este contexto, οὖν refuerza la progresión discursiva. En español, su fuerza queda absorbida por «Entonces», evitando una redundancia poco natural como «Entonces, por tanto».
- source_word: ἔλαβεν
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - tomó consigo
  - agarró
  - hizo tomar
  lexicon: BDAG
  rationale: λαμβάνω aquí funciona como acto narrativo simple de tomar/recibir a Jesús. «Tomó» preserva la sobriedad del verbo sin sobreinterpretar un arresto violento o una agencia delegada.
- source_word: ὁ Πιλᾶτος
  english_pob_choice: Pilate
  chosen_spanish: Pilato
  alternatives_spanish:
  - Poncio Pilato
  lexicon: BDAG
  rationale: El nombre propio se vierte de forma estándar en español. El artículo griego no se refleja en la traducción.
- source_word: τὸν Ἰησοῦν
  english_pob_choice: Jesus
  chosen_spanish: a Jesús
  alternatives_spanish:
  - a Jesús mismo
  lexicon: BDAG
  rationale: El acusativo funciona como complemento directo. En español es natural explicitar la preposición «a» con persona, manteniendo la referencia directa al objeto del verbo.
- source_word: ἐμαστίγωσεν
  english_pob_choice: flogged him
  chosen_spanish: lo azotó
  alternatives_spanish:
  - lo flageló
  - lo flageló con azotes
  - lo dio de azotes
  lexicon: BDAG
  rationale: μαστιγόω denota golpear con látigo/azote. «Azotó» es una equivalencia española clara, digna y suficientemente fuerte; «flageló» es posible, pero suena más técnico o eclesiástico. Se mantiene el objeto clítico «lo» para reflejar el objeto explícito del griego.
theological_decisions:
- issue: 'Agencia de la flagelación: acción directa o acto oficial delegado'
  english_pob_reading: Translate with Pilate as the grammatical subject of both verbs without specifying whether he personally performed or officially ordered the flogging.
  chosen_spanish_reading: Pilato queda como sujeto gramatical de ambos verbos, sin aclarar si ejecutó personalmente el azote o si lo mandó ejecutar.
  alternative_spanish_readings:
  - Entonces Pilato mandó azotar a Jesús.
  - Entonces Pilato hizo azotar a Jesús.
  rationale: El griego presenta a Pilato como sujeto de ἔλαβεν y ἐμαστίγωσεν. El español puede conservar esa superficie sin resolver la cuestión histórica o jurídica de la ejecución directa versus delegada. Así se preserva la tensión documental del texto fuente.
  doctrine_reference: Primacía del texto original; evitar añadir reconstrucción histórica no explicitada por el griego.
translation_notes:
  revision_awareness: El borrador sigue el paquete fuente griego SBLGNT y el criterio auditado de la POB en inglés, especialmente la decisión de no resolver la agencia de ἐμαστίγωσεν. No se detectan revisiones previas aplicables en este versículo.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece ninguna referencia al nombre divino.
  - Se mantiene «Jesús» como forma fija del nombre propio.
  - Se evita «SEÑOR» o formulaciones tradicionales no motivadas por el texto.
  - «Azotó» conserva la severidad de μαστιγόω sin volver el registro arcaico.
  - El orden discursivo «Entonces... y...» reproduce la progresión narrativa breve del griego.
