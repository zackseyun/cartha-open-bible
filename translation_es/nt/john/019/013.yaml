base_translation:
  language: en
  yaml_path: translation/nt/john/019/013.yaml
  text: So when Pilate heard these words[a], he brought Jesus outside and sat down on the judgment seat at a place called the Stone Pavement, and in Hebrew[b], Gabbatha.
  footnotes:
  - marker: a
    text: Or, 'and seated him on the judgment seat.' The Greek verb can be understood transitively, though the more likely sense here is that Pilate himself sat on the judgment seat.
    reason: alternative_reading
  - marker: b
    text: '''In Hebrew'' likely refers to the local Semitic language, probably Aramaic, as elsewhere in John.'
    reason: cultural_note
