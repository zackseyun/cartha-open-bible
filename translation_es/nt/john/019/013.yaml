translation:
  language: es
  text: Así que, cuando Pilato oyó estas palabras[a], llevó a Jesús afuera y se sentó en el estrado judicial, en un lugar llamado el Pavimento de Piedra, y en hebreo[b], Gábata.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y sentó a Jesús en el estrado judicial». El verbo griego puede entenderse transitivamente, aunque aquí es más probable que Pilato mismo se sentara en el estrado judicial.'
    reason: alternative_reading
  - marker: b
    text: «En hebreo» probablemente se refiere a la lengua semítica local, posiblemente arameo, como en otros lugares de Juan.
    reason: cultural_note
lexical_decisions:
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - Entonces
  - Por tanto
  lexicon: BDAG
  rationale: Marca continuidad e inferencia narrativa; «Así que» suena natural en español moderno y conserva la conexión lógica sin volverla excesivamente formal.
- source_word: ἀκούσας τῶν λόγων τούτων
  english_pob_choice: when Pilate heard these words
  chosen_spanish: cuando Pilato oyó estas palabras
  alternatives_spanish:
  - cuando Pilato escuchó estas palabras
  - después de oír estas palabras
  lexicon: BDAG
  rationale: El participio aoristo se entiende temporalmente. «Palabras» respeta λόγοι como declaraciones dichas; «oyó» es una forma natural y sobria en español bíblico.
- source_word: ἤγαγεν ἔξω τὸν Ἰησοῦν
  english_pob_choice: he brought Jesus outside
  chosen_spanish: sacó a Jesús fuera
  alternatives_spanish:
  - llevó a Jesús fuera
  - condujo a Jesús fuera
  lexicon: BDAG
  rationale: ἄγω con ἔξω indica movimiento hacia afuera. «Sacar ... fuera» es idiomático en español y conserva la dirección espacial del griego.
- source_word: βήματος
  english_pob_choice: judgment seat
  chosen_spanish: tribunal
  alternatives_spanish:
  - silla de juicio
  - asiento de juicio
  lexicon: BDAG
  rationale: En este contexto βῆμα designa el asiento/plataforma judicial oficial. «Tribunal» comunica mejor el marco judicial en español, aunque también deja abierta la posible imagen del asiento de juicio.
- source_word: εἰς τόπον λεγόμενον Λιθόστρωτον
  english_pob_choice: at a place called the Stone Pavement
  chosen_spanish: en un lugar llamado el Pavimento de Piedra
  alternatives_spanish:
  - en un lugar llamado Litóstrotos
  - en el lugar llamado el Pavimento de Piedra
  lexicon: BDAG
  rationale: 'El nombre griego es transparente y se traduce para que el lector entienda su sentido: un pavimento de piedra. «En un lugar llamado» refleja el dato de localización sin forzar la preposición literal.'
- source_word: Ἑβραϊστὶ δὲ Γαββαθα
  english_pob_choice: and in Hebrew, Gabbatha
  chosen_spanish: y en hebreo[b], Gabata
  alternatives_spanish:
  - pero en hebreo, Gabata
  - es decir, en arameo, Gabata
  lexicon: BDAG
  rationale: Se conserva «en hebreo» porque eso dice el texto, aunque en Juan suele referirse a la lengua semítica local; el nombre se translitera como Gabata para mantener el nombre propio y su sonoridad.
theological_decisions:
- issue: Sujeto de ἐκάθισεν
  english_pob_reading: Pilate sat down on the judgment seat
  chosen_spanish_reading: Pilato se sentó en el tribunal
  alternative_spanish_readings:
  - sentó a Jesús en el tribunal
  - sentó a Jesús en la silla de juicio
  rationale: La forma griega admite lectura transitiva o intransitiva. En el flujo inmediato, la lectura más probable es que Pilato tome asiento en el tribunal para ejercer el juicio; por eso se mantiene esa opción en el texto principal, preservando la tensión interpretativa con una nota.
  doctrine_reference: Conservar la ambigüedad sintáctica sin resolverla de manera dogmática.
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el audit trail inglés revisado: se mantiene la lectura principal de Pilato sentado en el tribunal, y se conserva la ambigüedad alternativa en nota. No hay revisiones posteriores que alteren la decisión textual o lexical.'
  spanish_consistency_notes:
  - Se usa «Jesús» para Ἰησοῦς y no se introduce ninguna paráfrasis explicativa ajena al texto.
  - «Tribunal» se prefiere aquí por claridad judicial; se deja constancia de la alternativa más literal relacionada con el asiento de juicio.
  - «Gabata» se translitera como nombre propio, mientras que Λιθόστρωτον se traduce por su sentido para facilitar la comprensión en español.
  - «En hebreo» se conserva siguiendo el texto, con nota cultural que explica la posible referencia al arameo local.
