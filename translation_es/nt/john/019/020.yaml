translation:
  language: es
  text: Por eso muchos de los judíos leyeron este letrero, porque el lugar donde Jesús fue crucificado estaba cerca de la ciudad; y estaba escrito en hebreo[a], en latín y en griego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente «en arameo»; Juan usa «hebreo» para la lengua semítica local.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦτον οὖν τὸν τίτλον
  english_pob_choice: this inscription
  chosen_spanish: este letrero[a]
  alternatives_spanish:
  - esta inscripción
  - este aviso
  - este título
  lexicon: BDAG
  rationale: τίτλος en este contexto de crucifixión designa el texto exhibido sobre Jesús. En español, 'letrero' comunica de manera natural una pieza escrita expuesta públicamente; 'inscripción' también es posible, pero puede sonar más arqueológica o formal. Se conserva la relación con el contexto sin convertirlo en un 'título' en sentido moderno.
- source_word: πολλοὶ ... τῶν Ἰουδαίων
  english_pob_choice: many of the Jews
  chosen_spanish: muchos de los judíos
  alternatives_spanish:
  - muchos judíos
  - muchos del pueblo judío
  lexicon: BDAG
  rationale: Se mantiene el valor partitivo del genitivo y la referencia contextual a personas judías presentes allí, sin ampliar ni suavizar la expresión.
- source_word: ἀνέγνωσαν
  english_pob_choice: read
  chosen_spanish: leyeron
  alternatives_spanish:
  - leían
  - leyeron en voz alta
  lexicon: BDAG
  rationale: El aoristo señala el hecho de leer el texto publicado. En español, 'leyeron' expresa bien la acción simple; no se añade 'en voz alta' porque el griego no lo exige.
- source_word: ἐγγὺς ἦν ὁ τόπος τῆς πόλεως
  english_pob_choice: the place ... was near the city
  chosen_spanish: el lugar ... estaba cerca de la ciudad
  alternatives_spanish:
  - el lugar ... estaba próximo a la ciudad
  - el lugar ... quedaba cerca de la ciudad
  lexicon: BDAG
  rationale: '''Estaba cerca de la ciudad'' es una equivalencia natural y precisa en español, sin introducir detalles como ''puerta'' o ''muralla'' que no aparecen en el texto.'
- source_word: ὅπου ἐσταυρώθη ὁ Ἰησοῦς
  english_pob_choice: where Jesus was crucified
  chosen_spanish: donde Jesús fue crucificado
  alternatives_spanish:
  - donde crucificaron a Jesús
  lexicon: BDAG
  rationale: La pasiva se conserva de forma directa con 'fue crucificado', que es natural y fiel al griego.
- source_word: καὶ ἦν γεγραμμένον
  english_pob_choice: and it was written
  chosen_spanish: y estaba escrito
  alternatives_spanish:
  - y había sido escrito
  - y fue escrito
  lexicon: BDAG
  rationale: La construcción perifrástica con participio perfecto expresa el estado resultante del escrito; 'estaba escrito' comunica ese valor de manera idiomática en español.
- source_word: Ἑβραϊστί
  english_pob_choice: in Hebrew
  chosen_spanish: en hebreo
  alternatives_spanish:
  - en arameo
  - en lengua hebrea
  lexicon: BDAG
  rationale: Se conserva el término del griego como 'hebreo' en el texto principal, siguiendo la decisión auditada de la POB. La alternativa 'arameo' se documenta por la posible referencia al vernáculo semítico local.
- source_word: Ῥωμαϊστί
  english_pob_choice: in Latin
  chosen_spanish: en latín
  alternatives_spanish:
  - en romano
  lexicon: BDAG
  rationale: Aunque el adverbio griego significa literalmente 'en romano', el referente idiomático es la lengua latina; 'en latín' es la forma clara y estándar en español.
- source_word: Ἑλληνιστί
  english_pob_choice: in Greek
  chosen_spanish: en griego
  alternatives_spanish:
  - en la lengua griega
  lexicon: BDAG
  rationale: Es la traducción directa y natural del adverbio de lengua.
- source_word: οὖν
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Así que
  - Entonces
  lexicon: BDAG
  rationale: '''Por eso'' conserva la conexión lógica/narrativa con el versículo anterior en un español fluido y sobrio.'
theological_decisions:
- issue: Ἑβραϊστί y la posible referencia al idioma local semítico
  english_pob_reading: Hebrew in the main text, with a footnote noting possible Aramaic
  chosen_spanish_reading: hebreo en el texto principal, con nota sobre la posible referencia a arameo
  alternative_spanish_readings:
  - arameo en el texto principal
  - hebreo sin nota
  rationale: Se respeta la palabra del griego y la preferencia auditada de la POB por 'hebreo' en el texto principal, sin ocultar la tensión histórica-lingüística que puede apuntar al arameo vernacular.
  doctrine_reference: Translation philosophy §§1, 3; lexical transparency
- issue: Rendering of οὖν as a narrative-logical connector
  english_pob_reading: Therefore
  chosen_spanish_reading: Por eso
  alternative_spanish_readings:
  - Por tanto
  - Entonces
  rationale: La conexión lógica con el contexto anterior se mantiene explícita sin volver la frase artificial o excesivamente solemne.
  doctrine_reference: Discourse coherence and source transparency
translation_notes:
  revision_awareness: 'El pasaje coincide con el estado revisado más reciente del contexto inglés: no se registran cambios pendientes y el acuerdo interrevisor es alto. La versión española sigue esa lectura estable, manteniendo el valor de ''inscripción/letrero'', el matiz de ''hebreo'' con nota alternativa, y la secuencia tripartita de lenguas.'
  spanish_consistency_notes:
  - Se mantiene 'Jesús' para Ἰησοῦς, 'judíos' para τῶν Ἰουδαίων y 'latín' para Ῥωμαϊστί, siguiendo el audit trail.
  - Se evita introducir mayúsculas reverenciales no requeridas; 'hebreo', 'latín' y 'griego' van en minúscula por tratarse de nombres de lenguas.
  - '''estaba escrito'' preserva el valor resultativo del participio perfecto sin endurecer el español.'
