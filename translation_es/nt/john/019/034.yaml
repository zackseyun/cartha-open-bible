translation:
  language: es
  text: Pero uno de los soldados le traspasó el costado con una lanza, y al instante salió sangre y agua.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos intérpretes entienden «sangre y agua» simbólicamente o en sentido sacramental; otros lo toman como una descripción física. El texto griego no explica aquí su significado.
    reason: cross_reference
lexical_decisions:
- source_word: ἀλλ’
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Mas
  - Sin embargo
  lexicon: BDAG
  rationale: La conjunción adversativa expresa contraste con el versículo anterior; «Pero» es natural en español y conserva el valor fuerte sin sonar arcaico.
- source_word: εἷς τῶν στρατιωτῶν
  english_pob_choice: one of the soldiers
  chosen_spanish: uno de los soldados
  alternatives_spanish:
  - un soldado
  lexicon: BDAG
  rationale: La construcción partitiva se mantiene explícita en español, como en el griego y en la audición inglesa.
- source_word: λόγχῃ
  english_pob_choice: with a spear
  chosen_spanish: con una lanza
  alternatives_spanish:
  - con una pica
  - con una lanza o lanza militar
  lexicon: BDAG
  rationale: «Lanza» es el término español más natural y amplio para λόγχη. La nota conserva la alternativa inglesa «spear/lance» como equivalente posible, sin sobrecargar el texto principal.
- source_word: τὴν πλευρὰν
  english_pob_choice: side
  chosen_spanish: el costado
  alternatives_spanish:
  - el lado
  - el flanco
  lexicon: BDAG
  rationale: En español, «costado» comunica con más precisión y dignidad narrativa la zona corporal de una herida que simplemente «lado».
- source_word: ἔνυξεν
  english_pob_choice: pierced
  chosen_spanish: le abrió
  alternatives_spanish:
  - le atravesó
  - lo hirió
  lexicon: BDAG
  rationale: El verbo griego indica una acción punzante/penetrante. «Le abrió el costado» mantiene la idea de penetración y el resultado visible sin introducir una precisión médica no explicitada por el texto.
- source_word: καὶ ⸂ἐξῆλθεν εὐθὺς⸃
  english_pob_choice: and immediately ... came out
  chosen_spanish: y al instante salió
  alternatives_spanish:
  - y inmediatamente salió
  - y salió de inmediato
  lexicon: BDAG
  rationale: Se preserva el adverbio de inmediatez y el orden narrativo natural en español.
- source_word: αἷμα καὶ ὕδωρ
  english_pob_choice: blood and water
  chosen_spanish: sangre y agua
  alternatives_spanish:
  - sangre y agua
  lexicon: BDAG
  rationale: Se conserva la expresión literal y su tensión interpretativa; no se explicita su sentido, conforme al registro auditado de la POB.
theological_decisions:
- issue: Significado de «sangre y agua»
  english_pob_reading: Keep the literal phrase without interpretive expansion.
  chosen_spanish_reading: Mantener «sangre y agua» sin interpretación añadida en el texto principal.
  alternative_spanish_readings:
  - una alusión sacramental
  - una descripción fisiológica
  rationale: El versículo presenta el hecho pero no lo explica. El texto español preserva la ambigüedad teológica documentada por la POB en inglés, evitando resolverla en una sola dirección.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Coincide con la última revisión registrada: no hubo cambios necesarios y el consenso externo fue de alta concordancia.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque el versículo no contiene el nombre divino ni κύριος.
  - Se usa «lanza» como equivalente español de λόγχη, coherente con la alternativa inglesa «spear/lance».
  - «Costado» mantiene la referencia corporal sin sobre-especificar anatomía.
  - La puntuación conserva el contraste inicial y el adverbio de inmediatez de forma fluida y readable.
