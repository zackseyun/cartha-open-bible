revisions:
- from: Pero uno de los soldados le abrió el costado con una lanza[a], y al instante[b] salió sangre y agua.
  to: Pero uno de los soldados le traspasó el costado con una lanza, y al instante salió sangre y agua.[a]
  rationale: Se reemplaza «le abrió» por «le traspasó» para reflejar mejor ἔνυξεν y la decisión inglesa «pierced». Se elimina la nota léxica [a] porque en español «spear/lance» converge de manera natural en «lanza» y la alternativa inglesa no produce una nota española útil ni distintiva. La nota interpretativa se mantiene y se reancla a «sangre y agua», que es el elemento que comenta.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:06:01Z'
review_pass:
  verdict: revise
  source_alignment_summary: El borrador conserva bien la estructura adversativa, la construcción partitiva («uno de los soldados»), «costado» para πλευρά, la inmediatez de εὐθύς, y la literalidad de «sangre y agua». Sin embargo, «le abrió el costado» debilita y desplaza el valor de ἔνυξεν, que en el contexto de λόγχῃ expresa perforar/traspasar/pinzar con arma punzante, no simplemente abrir. Además, la nota [a] no preserva la alternativa auditada en inglés, porque el texto principal ya dice «lanza» y la nota repite lo mismo en vez de ofrecer la alternativa correspondiente.
  spanish_quality_summary: El español es natural y digno, pero el verbo principal necesita mayor precisión léxica. «Le traspasó el costado» o «le perforó el costado» suena idiomático y fiel. La colocación de la nota [b] sobre «al instante» no es ideal, porque su contenido comenta «sangre y agua»; conviene anclarla allí para mayor claridad. La nota [a] debe corregirse para ofrecer una alternativa real.
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. La decisión entre «lanza» y «lanza/lanza de soldado» es léxica, no teológica. La preservación literal de «sangre y agua» coincide con la pauta de no resolver la tensión interpretativa en el texto principal.
  issues:
  - severity: high
    issue: «le abrió el costado» no refleja con suficiente precisión ἔνυξεν
    rationale: El verbo griego denota una acción de perforar o traspasar con un instrumento punzante. «Abrir» puede sugerir resultado más que la acción específica y atenúa la fuerza del original y de la decisión inglesa «pierced».
  - severity: medium
    issue: La nota [a] repite el texto principal en lugar de dar una alternativa léxica
    rationale: El inglés tiene texto principal «spear» y nota alternativa «lance». Si el español principal usa «lanza», la nota no puede decir «O “con una lanza”»; debe ofrecer una alternativa distinta, como «con una espada larga» no sería fiel, así que conviene cambiar el texto principal a «lanza»/«lanza» y la nota a «O “con una lanza de guerra”» no refleja la auditoría tan bien como usar principal «lanza» y nota «O “con una pica”», pero «pica» tampoco es equivalente exacto. Mejor usar principal «lanza» y nota «O “con una lanza militar”» sigue siendo débil; más limpio es principal «con una lanza» y nota «O “con una pica”» tampoco convence. La solución más fiel es principal «con una lanza» sin nota léxica, o principal «con una espada» no procede. Dado que la auditoría sí conserva alternativa, la mejor opción española es principal «con una lanza» y nota «O “con una lanza larga”» solo aproximada. Más naturalmente, principal «con una lanza» y nota «O “con una alabarda”» sería inexacto. Por
      eso conviene usar principal «con una lanza» y nota «O “con una jabalina”» tampoco exacto. La mejor equivalencia española entre spear/lance es realmente «lanza» para ambos, por lo que la nota inglesa no se traslada de forma útil; puede omitirse en español para evitar una nota vacía.
  - severity: low
    issue: El anclaje de la nota [b] está en «al instante» aunque comenta «sangre y agua»
    rationale: La nota interpretativa trata el significado de «sangre y agua», no el adverbio temporal. Anclarla a la frase correspondiente mejora la legibilidad y la referencia.
  revised_spanish_text: Pero uno de los soldados le traspasó el costado con una lanza, y al instante salió sangre y agua.[a]
  revised_footnotes:
  - marker: a
    text: Algunos intérpretes entienden «sangre y agua» simbólicamente o en sentido sacramental; otros lo toman como una descripción física. El texto griego no explica aquí su significado.
    reason: cross_reference
  revision_rationale: Se reemplaza «le abrió» por «le traspasó» para reflejar mejor ἔνυξεν y la decisión inglesa «pierced». Se elimina la nota léxica [a] porque en español «spear/lance» converge de manera natural en «lanza» y la alternativa inglesa no produce una nota española útil ni distintiva. La nota interpretativa se mantiene y se reancla a «sangre y agua», que es el elemento que comenta.
