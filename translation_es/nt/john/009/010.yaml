translation:
  language: es
  text: 'Entonces le dijeron[a]: «¿Cómo te fueron abiertos los ojos?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «¿Cómo llegaron a ser abiertos tus ojos?». El griego conserva la forma pasiva.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγον
  english_pob_choice: they said
  chosen_spanish: le dijeron
  alternatives_spanish:
  - le estaban diciendo
  - le decían
  lexicon: BDAG
  rationale: El imperfecto griego puede sugerir acción repetida o continua, pero el contexto narrativo en español admite con naturalidad el pretérito simple. «Le dijeron» conserva la continuidad del relato sin sonar forzado; «le decían» o «le estaban diciendo» enfatizarían más el aspecto durativo, aunque con menor fluidez aquí.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Entonces
  alternatives_spanish:
  - Así que
  - Por tanto
  lexicon: BDAG
  rationale: οὖν introduce continuación inferencial o narrativa. «Entonces» es la opción más natural en español para mantener ese enlace sin cargarlo de formalidad; «Así que» también es posible, pero «Entonces» suena más sobrio y equilibrado.
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El dativo de destinatario se expresa con el pronombre átono «le» en español, que resulta más idiomático que repetir «a él».
- source_word: Πῶς
  english_pob_choice: How
  chosen_spanish: ¿Cómo
  alternatives_spanish:
  - ¿De qué manera?
  lexicon: BDAG
  rationale: «¿Cómo?» reproduce de manera directa la pregunta de modo/mecanismo. Otras posibilidades son más explicativas y menos naturales en este contexto.
- source_word: ἠνεῴχθησάν
  english_pob_choice: were opened
  chosen_spanish: se abrieron
  alternatives_spanish:
  - fueron abiertos
  - quedaron abiertos
  lexicon: BDAG
  rationale: El griego conserva pasivo, y el español lo expresa de forma natural con la pasiva media/reflexiva «se abrieron». «Fueron abiertos» preserva más formalmente el pasivo, pero suena más pesado aquí. No se debe neutralizar la pasividad del evento.
- source_word: σου
  english_pob_choice: your
  chosen_spanish: se te
  alternatives_spanish:
  - tus
  lexicon: BDAG
  rationale: El posesivo griego se integra mejor en español mediante la construcción dativa reflexiva «se te» en lugar de un posesivo simple, porque el foco recae en el cambio ocurrido en los ojos del interlocutor.
- source_word: οἱ ὀφθαλμοί
  english_pob_choice: eyes
  chosen_spanish: ojos
  alternatives_spanish:
  - los ojos
  lexicon: BDAG
  rationale: «Ojos» es el equivalente léxico normal de ὀφθαλμοί. En español, el artículo definido puede omitirse en esta construcción posesiva implícita; su presencia o ausencia no altera el sentido.
translation_notes:
  revision_awareness: El texto inglés auditado revisó una versión más aspectual ('were saying') a un pasado simple más natural, sin perder el pasivo en 'were opened'. En español, se optó por un pretérito simple equivalente ('dijeron') y por una pasiva natural con 'se abrieron', manteniendo la voz pasiva/mediopasiva del griego y la fluidez idiomática.
  spanish_consistency_notes:
  - Se mantiene «le» para el destinatario de la palabra, en lugar de una perífrasis más explícita.
  - Se evita sustituir el pasivo griego por una activa sin evidencia textual.
  - La elección «Entonces» conserva la función narrativa de οὖν sin añadir intensidad doctrinal.
  - Se usa «ojos» sin artículo expreso, por idiomaticidad del español en esta construcción.
