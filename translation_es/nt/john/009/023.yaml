translation:
  language: es
  text: 'Por esta razón sus padres dijeron[a]: «Ya tiene edad; pregúntenle a él».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Ya tiene suficiente edad; pregúntenle a él».'
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τοῦτο
  english_pob_choice: For this reason
  chosen_spanish: Por esta razón
  alternatives_spanish:
  - Por eso
  - Debido a esto
  - Así que
  lexicon: BDAG
  rationale: La expresión retoma la explicación inmediata del contexto anterior. «Por esta razón» mantiene con claridad la fuerza causal sin sonar mecánico en español.
- source_word: οἱ γονεῖς αὐτοῦ
  english_pob_choice: his parents
  chosen_spanish: sus padres
  alternatives_spanish:
  - el padre y la madre de él
  - sus progenitores
  lexicon: BDAG
  rationale: El plural griego designa colectivamente a ambos padres. «Sus padres» es la equivalencia natural y precisa en español.
- source_word: εἶπαν
  english_pob_choice: said
  chosen_spanish: dijeron
  alternatives_spanish:
  - respondieron
  - les dijeron
  lexicon: BDAG
  rationale: El verbo es el ordinario de hablar/decir. En español, el plural «dijeron» refleja de modo directo el sujeto plural sin añadir matiz no presente en el griego.
- source_word: Ἡλικίαν ἔχει
  english_pob_choice: He is of age
  chosen_spanish: Está en edad
  alternatives_spanish:
  - Es mayor de edad
  - Ya tiene edad suficiente
  - Es adulto
  lexicon: BDAG
  rationale: La frase idiomática usa «tener edad», con sentido social o legal. «Está en edad» conserva esa idea en español natural y evita concretar más de lo que el griego exige.
- source_word: αὐτὸν ἐπερωτήσατε
  english_pob_choice: ask him
  chosen_spanish: pregúntenle a él
  alternatives_spanish:
  - háganle preguntas a él
  - interróguenlo
  - pregúntenlo
  lexicon: BDAG
  rationale: El imperativo dirige la consulta a la persona adecuada. «Pregúntenle a él» expresa bien la orientación del verbo y conserva el pronombre enfático sin volverlo áspero o jurídico en exceso.
translation_notes:
  revision_awareness: Se siguió el pasaje griego SBLGNT y el audit trail inglés de la POB. La versión inglesa usa «He is of age; ask him», con nota alternativa «He is old enough; question him». En español se optó por una equivalencia idiomática equivalente («Está en edad») y por un imperativo natural («pregúntenle a él») que conserva la referencia enfática al mismo individuo.
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y eclesial, sin arcaísmos innecesarios.
  - Se preservó el valor causal de διὰ τοῦτο con una construcción explícita en español.
  - La nota al pie refleja la alternativa semántica del giro idiomático sin introducir un cambio doctrinal.
