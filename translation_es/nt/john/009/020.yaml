translation:
  language: es
  text: 'Entonces sus padres respondieron y dijeron: «Sabemos que este es nuestro hijo, y que nació ciego[a].»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «era ciego desde el nacimiento».'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Entonces
  alternatives_spanish:
  - Así que
  - Por tanto
  lexicon: BDAG
  rationale: Marca continuidad narrativa y lógica con la interrogación previa. «Entonces» conserva esa progresión en español sin sonar demasiado formal.
- source_word: γονεῖς
  english_pob_choice: parents
  chosen_spanish: padres
  alternatives_spanish:
  - progenitores
  - padre y madre
  lexicon: BDAG
  rationale: El plural griego designa colectivamente al padre y la madre del hombre. «Padres» es el equivalente natural en español y mantiene la referencia colectiva.
- source_word: ἀπεκρίθησαν ... καὶ εἶπαν
  english_pob_choice: answered and said
  chosen_spanish: respondieron y dijeron
  alternatives_spanish:
  - contestaron y dijeron
  - respondieron
  lexicon: BDAG
  rationale: Conserva la doble fórmula narrativa de Juan sin reducirla a un solo verbo. «Respondieron y dijeron» refleja bien la textura del griego y suena natural en español.
- source_word: Οἴδαμεν
  english_pob_choice: We know
  chosen_spanish: Sabemos
  alternatives_spanish:
  - Lo sabemos
  - Estamos seguros
  lexicon: BDAG
  rationale: Verbo de conocimiento/certidumbre. «Sabemos» es la equivalencia directa y clara.
- source_word: οὗτός ἐστιν ὁ υἱὸς ἡμῶν
  english_pob_choice: this is our son
  chosen_spanish: este es nuestro hijo
  alternatives_spanish:
  - éste es nuestro hijo
  - este es el hijo nuestro
  lexicon: BDAG
  rationale: En español se conserva la identificación natural sin forzar el demostrativo enfático del griego. «Hijo» es más idiomático aquí que «hijo varón» o perífrasis similares.
- source_word: τυφλὸς ἐγεννήθη
  english_pob_choice: he was born blind
  chosen_spanish: nació ciego
  alternatives_spanish:
  - fue nacido ciego
  - era ciego desde su nacimiento
  lexicon: BDAG
  rationale: La pasiva aorista en contextos de nacimiento se expresa de modo idiomático como «nació ciego». Esto mantiene el sentido directo y evita una construcción pesada en español.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés están en alto acuerdo y no requieren revisión sustantiva; se preserva la fórmula narrativa de Juan y la alternativa de traducción para la frase de nacimiento ciego.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera explícitamente; este versículo no contiene el nombre divino.
  - Se mantiene «padres» para οἱ γονεῖς como término colectivo natural y fiel.
  - La alternancia entre «respondieron» y «dijeron» conserva la fórmula joánica sin sobrerrepresentación.
  - La nota textual al final marca la alternativa legítima para la condición de ceguera de nacimiento, como en el audit trail inglés.
