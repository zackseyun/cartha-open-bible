  to: 'Y les preguntaron, diciendo: «¿Es este su hijo, que, según ustedes, nació ciego? ¿Cómo entonces ve ahora?»'
  rationale: Se ajusta la cláusula relativa para expresar con español más natural y fiel la referencia de ὃν ὑμεῖς λέγετε ὅτι τυφλὸς ἐγεννήθη, evitando la torpeza de «del que». También se cambia «pues» por «entonces» para una fluidez más natural en español neutral contemporáneo, manteniendo la fuerza inferencial de οὖν.
