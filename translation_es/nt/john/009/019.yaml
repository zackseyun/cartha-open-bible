translation:
  language: es
  text: 'Y les preguntaron, diciendo: «¿Es este su hijo, que, según ustedes, nació ciego? ¿Cómo entonces ve ahora?»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἠρώτησαν
  english_pob_choice: asked
  chosen_spanish: preguntaron
  alternatives_spanish:
  - les preguntaron
  - interrogaron
  lexicon: BDAG
  rationale: El verbo expresa una acción de preguntar en el marco narrativo. «Preguntaron» es natural y fiel; añado «les» en la construcción por la claridad del complemento indirecto en español.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijeron
  - al decir
  lexicon: BDAG
  rationale: El participio acompaña la pregunta y presenta su contenido. «Diciendo» conserva bien la estructura griega sin volverla rígida en español.
- source_word: Οὗτός ἐστιν ὁ υἱὸς ὑμῶν
  english_pob_choice: Is this your son
  chosen_spanish: ¿Es este su hijo?
  alternatives_spanish:
  - ¿Este es su hijo?
  - ¿Es éste su hijo?
  lexicon: BDAG
  rationale: Aunque la forma griega es declarativa, funciona como pregunta en contexto. En español, la forma interrogativa expresa mejor el valor pragmático del enunciado.
- source_word: ὃν ὑμεῖς λέγετε
  english_pob_choice: whom you say
  chosen_spanish: del que ustedes dicen
  alternatives_spanish:
  - a quien ustedes dicen
  - que ustedes dicen
  lexicon: BDAG
  rationale: «Del que» evita una construcción incómoda en español y refleja la relación relativa del antecedente con la frase siguiente. «Dicen» conserva el verbo neutral del original; no se intensifica a «afirman» ni «aseguran».
- source_word: τυφλὸς ἐγεννήθη
  english_pob_choice: was born blind
  chosen_spanish: nació ciego
  alternatives_spanish:
  - fue nacido ciego
  - fue ciego de nacimiento
  lexicon: BDAG
  rationale: La expresión griega comunica una condición congénita. «Nació ciego» es la forma española más natural y directa, y mantiene el sentido de nacimiento con ceguera.
- source_word: πῶς οὖν
  english_pob_choice: How then
  chosen_spanish: ¿Cómo, pues
  alternatives_spanish:
  - ¿Cómo entonces
  - ¿Cómo, por tanto
  lexicon: BDAG
  rationale: «οὖν» introduce inferencia; «pues» reproduce bien ese matiz conclusivo en español y sigue la lógica del cuestionamiento.
- source_word: βλέπει
  english_pob_choice: does he now see
  chosen_spanish: ve
  alternatives_spanish:
  - ve ahora
  - puede ver
  - está viendo
  lexicon: BDAG
  rationale: El presente indica la situación actual de ver. En español, el verbo simple «ve» ya porta el sentido y evita sobrecargar la frase; el adverbio final explícita la actualidad.
- source_word: ἄρτι
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - en este momento
  - recién
  lexicon: BDAG
  rationale: «ἄρτι» contrasta con la ceguera anterior y señala el presente inmediato. «Ahora» es el equivalente más claro y natural en español.
translation_notes:
  revision_awareness: La redacción sigue de cerca el valor discursivo del griego y el equivalente funcional del borrador inglés, sin introducir intensificación polémica en el verbo «decir» ni perder la inferencia de οὖν.
  spanish_consistency_notes:
  - Se mantiene «ciego» para la condición congénita como en el inglés auditado.
  - Se usa «pues» para οὖν por su valor inferencial/conclusivo en español.
  - No se introduce «Cristo», «Señor» ni otra terminología doctrinal ajena al versículo.
