translation:
  language: es
  text: 'Jesús les dijo[a]: «Si ustedes fueran ciegos, no tendrían pecado. Pero ahora dicen: “Vemos”, así que su pecado permanece».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “no tendrían culpa”. El griego dice “pecado”, que aquí puede incluir la idea de culpabilidad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰησοῦς
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - Jesús
  lexicon: N/A
  rationale: Nombre propio estándar en español; coincide directamente con el griego y con el uso cristiano general.
- source_word: τυφλοὶ
  english_pob_choice: blind
  chosen_spanish: ciegos
  alternatives_spanish:
  - espiritualmente ciegos
  lexicon: BDAG
  rationale: τυφλοί significa literalmente 'ciegos'. En el contexto tiene fuerza metafórica, pero en el texto principal conviene mantener el término simple y dejar que el contexto desarrolle la imagen, sin añadir un adjetivo interpretativo que no está en el griego.
- source_word: οὐκ ἂν εἴχετε
  english_pob_choice: you would not have
  chosen_spanish: no tendrían
  alternatives_spanish:
  - no estarían teniendo
  lexicon: BDAG
  rationale: La construcción condicional expresa un resultado irreal en el pasado/contrafactual; en español, 'no tendrían' comunica de forma natural la consecuencia hipotética.
- source_word: ἁμαρτίαν
  english_pob_choice: sin
  chosen_spanish: pecado
  alternatives_spanish:
  - culpa
  lexicon: BDAG
  rationale: ἁμαρτία normalmente significa 'pecado'. En este contexto puede implicar culpabilidad, pero 'pecado' preserva mejor el término griego y el uso joánico sin explicitar una glosa interpretativa en el texto principal.
- source_word: νῦν δὲ
  english_pob_choice: But now
  chosen_spanish: Pero ahora
  alternatives_spanish:
  - Pero como están las cosas ahora
  - Pero ahora mismo
  lexicon: BDAG
  rationale: Introduce el contraste entre la situación hipotética y la realidad presente. 'Pero ahora' es natural, directo y fiel al giro discursivo.
- source_word: λέγετε ὅτι Βλέπομεν
  english_pob_choice: you say, ‘We see,’
  chosen_spanish: 'dicen: “Vemos”'
  alternatives_spanish:
  - 'afirman: “Vemos”'
  - dicen que ven
  lexicon: BDAG
  rationale: Se conserva el cambio de segunda persona plural a primera plural en el discurso directo, como en el griego. 'Vemos' mantiene la ironía de la afirmación sin suavizarla con una paráfrasis.
- source_word: ἡ ἁμαρτία ὑμῶν μένει
  english_pob_choice: your sin remains
  chosen_spanish: su pecado permanece
  alternatives_spanish:
  - su pecado sigue
  - su culpa permanece
  lexicon: BDAG
  rationale: μένει en Juan suele traducirse con 'permanece', que conserva el valor joánico de continuidad o persistencia. 'Su pecado' sigue de cerca el griego y evita reemplazar 'pecado' por una explicación más estrecha como 'culpa'.
theological_decisions:
- issue: Si 'ciegos' debe explicitarse como 'espiritualmente ciegos'
  english_pob_reading: Retain the literal term 'blind' in the main text, letting the context supply the metaphor.
  chosen_spanish_reading: Mantener 'ciegos' sin añadir 'espiritualmente' en el texto principal.
  alternative_spanish_readings:
  - Si ustedes fueran espiritualmente ciegos...
  - Si ustedes no vieran espiritualmente...
  rationale: La escena trata de percepción espiritual, pero Jesús formula la sentencia con una metáfora corporal sostenida a lo largo del capítulo. Añadir 'espiritualmente' resolvería la imagen antes de tiempo y reduciría la tensión retórica del pasaje.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it.
- issue: Si ἁμαρτία debe aclararse como 'culpa'
  english_pob_reading: The Greek says 'sin,' which here may include the sense of culpability.
  chosen_spanish_reading: Traducir 'pecado' en el texto principal y dejar abierta la posible implicación de culpabilidad.
  alternative_spanish_readings:
  - culpa
  - culpabilidad
  rationale: '''Pecado'' es la correspondencia léxica más directa y preserva el habla joánica. En una nota puede indicarse que el término puede incluir la idea de culpabilidad, sin trasladar esa aclaración al cuerpo del versículo.'
  doctrine_reference: BDAG on ἁμαρτία; Translation philosophy §3, Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: The latest revision pass reported no changes needed, and the cross-check showed high agreement with only minor issues. This draft keeps the established rendering choices, preserving the literal metaphor of blindness, the direct speech shift to “Vemos,” and the Johannine force of “permanece.”
  spanish_consistency_notes:
  - Usa 'Jesús' para Ἰησοῦς, 'ciegos' para τυφλοί, 'pecado' para ἁμαρτία y 'permanece' para μένει, en línea con la terminología POB.
  - 'Mantiene el contraste discursivo con ''Pero ahora'' y conserva el cambio a cita directa: ''Vemos''.'
  - No introduce 'Cristo', 'Señor' ni 'espiritualmente' porque el griego y el audit trail no lo exigen en este versículo.
