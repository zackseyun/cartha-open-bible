revisions:
- from: 'Así que los vecinos[a], y los que lo habían visto antes como mendigo, decían: «¿No es éste el que se sentaba y pedía limosna?»'
  to: 'Entonces los vecinos[a] y los que lo habían visto antes como mendigo decían: «¿No es este el que se sentaba y pedía limosna?»'
  rationale: Se ajusta οὖν a «Entonces» para una continuación narrativa más natural; se actualiza «éste» a «este» según la ortografía moderna; y se corrige la nota al pie para que realmente ofrezca la alternativa más literal basada en los participios griegos, en línea con la auditoría inglesa.
