translation:
  language: es
  text: 'Entonces los vecinos[a] y los que lo habían visto antes como mendigo decían: «¿No es este el que se sentaba y pedía limosna?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «¿No es este el que estaba sentado y pidiendo limosna?». El griego usa participios («sentado» y «pidiendo limosna») para identificarlo por su actividad habitual anterior.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - Entonces
  - Por tanto
  lexicon: BDAG
  rationale: Marca continuación narrativa e inferencia; «Así que» conserva la fuerza conectiva de οὖν en un español natural y no excesivamente formal.
- source_word: γείτονες
  english_pob_choice: neighbors
  chosen_spanish: vecinos
  alternatives_spanish:
  - personas cercanas
  - los que vivían cerca
  lexicon: BDAG
  rationale: «Vecinos» es el equivalente directo y natural para quienes vivían cerca de él.
- source_word: θεωροῦντες
  english_pob_choice: had seen
  chosen_spanish: habían visto
  alternatives_spanish:
  - estaban observando
  - lo habían estado viendo
  lexicon: BDAG
  rationale: 'El participio se entiende aquí retrospectivamente: gente que lo reconocía por haberlo visto antes. «Habían visto» expresa bien esa referencia previa sin sonar forzado.'
- source_word: τὸ πρότερον
  english_pob_choice: before
  chosen_spanish: antes
  alternatives_spanish:
  - anteriormente
  - antes de ahora
  lexicon: BDAG
  rationale: La expresión adverbial señala un tiempo anterior; «antes» es breve, claro y fiel al sentido temporal.
- source_word: ὅτι προσαίτης ἦν
  english_pob_choice: as a beggar
  chosen_spanish: como mendigo
  alternatives_spanish:
  - siendo mendigo
  - porque era mendigo
  lexicon: BDAG
  rationale: El griego caracteriza la identidad previa con un matiz descriptivo, no causal. «Como mendigo» refleja esa función identificadora sin introducir una causalidad que el texto no exige.
- source_word: προσαίτης
  english_pob_choice: beggar
  chosen_spanish: mendigo
  alternatives_spanish:
  - pordiosero
  - limosnero
  lexicon: BDAG
  rationale: «Mendigo» es el equivalente claro y estándar para alguien que pide limosna; conserva el valor léxico básico sin tecnicismos.
- source_word: ἔλεγον
  english_pob_choice: were saying
  chosen_spanish: decían
  alternatives_spanish:
  - estaban diciendo
  - seguían diciendo
  lexicon: BDAG
  rationale: El imperfecto griego puede expresar habla repetida o en curso; en español, «decían» reproduce ese trasfondo sin sobrerrepresentarlo.
- source_word: Οὐχ οὗτός ἐστιν
  english_pob_choice: Is this not
  chosen_spanish: ¿No es éste…?
  alternatives_spanish:
  - ¿Acaso no es éste…?
  - ¿No es este…?
  lexicon: BDAG
  rationale: La pregunta espera respuesta afirmativa. La forma interrogativa española conserva el tono retórico y la identificación directa.
- source_word: ὁ καθήμενος καὶ προσαιτῶν
  english_pob_choice: the man who used to sit and beg
  chosen_spanish: el que se sentaba y pedía limosna
  alternatives_spanish:
  - el que estaba sentado y pidiendo limosna
  - el que solía sentarse y pedir limosna
  lexicon: BDAG
  rationale: Los participios describen la actividad habitual pasada del hombre. «Se sentaba y pedía limosna» conserva el valor aspectual y suena natural en español; «solía» también es posible, pero aquí no es necesario añadir esa explicitación.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que corrigió una lectura causal («because he was a beggar») por una descriptiva («as a beggar»). En español se reflejó con «como mendigo», evitando una causalidad no sustentada por el griego. También se preservó la observación auditada sobre los participios finales, que identifican al hombre por su actividad habitual pasada.
  spanish_consistency_notes:
  - Se mantuvo «vecinos» para γείτονες, en paralelo con la decisión inglesa.
  - Se usó «mendigo» para προσαίτης y «pedir limosna» para προσαιτῶν, distinguiendo el sustantivo del verbo participial.
  - La cita directa conserva el orden natural del español sin perder el valor interrogativo-retórico del griego.
