revisions:
- from: Pero cómo ve ahora, no lo sabemos; o quién le abrió los ojos, no lo sabemos. Pregúntenle a él; ya tiene edad[a]. Él hablará por sí mismo.
  to: Pero cómo ve ahora, no lo sabemos; o quién le abrió los ojos, no lo sabemos. Pregúntenle a él; ya tiene edad suficiente. Él hablará por sí mismo[a].
  rationale: Se corrige el anclaje de la nota para que corresponda a λαλήσει y se mejora «ya tiene edad» a «ya tiene edad suficiente», que suena más natural en español y expresa mejor la idea contextual de madurez suficiente para dar su propio testimonio, sin introducir una categoría legal más fuerte de la necesaria.
