translation:
  language: es
  text: Pero cómo ve ahora, no lo sabemos; o quién le abrió los ojos, no lo sabemos. Pregúntenle a él; ya tiene edad suficiente. Él hablará por sí mismo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «puede hablar por sí mismo». El futuro griego puede funcionar como una afirmación práctica de su capacidad o responsabilidad para responder.
    reason: lexical_alternative
lexical_decisions:
- source_word: πῶς δὲ νῦν βλέπει
  english_pob_choice: But how he now sees
  chosen_spanish: Pero cómo ve ahora
  alternatives_spanish:
  - Pero cómo puede ver ahora
  - Pero cómo es que ahora ve
  lexicon: SBLGNT; BDAG
  rationale: πῶς pregunta «cómo»; δέ aporta transición suave, aquí mejor como «pero»; νῦν es «ahora»; y βλέπει es presente simple «ve». El español natural conserva la pregunta sobre la manera o el estado actual de la vista sin añadir explícitamente capacidad.
- source_word: οὐκ οἴδαμεν
  english_pob_choice: we do not know
  chosen_spanish: no lo sabemos
  alternatives_spanish:
  - no sabemos
  - no lo conocemos
  lexicon: SBLGNT; BDAG
  rationale: οἶδα expresa «saber». En español, el objeto implícito se expresa con «lo» para mantener la repetición enfática del texto griego sin volverlo pesado.
- source_word: ἢ τίς ἤνοιξεν αὐτοῦ τοὺς ὀφθαλμούς
  english_pob_choice: or who opened his eyes
  chosen_spanish: o quién le abrió los ojos
  alternatives_spanish:
  - o quién abrió sus ojos
  - o quién le abrió la vista
  lexicon: SBLGNT; BDAG
  rationale: ἤ introduce una alternativa; τίς es «quién»; ἤνοιξεν es aoristo de ἀνοίγω, aquí naturalmente «abrió». En español, «le abrió los ojos» conserva el giro narrativo del milagro y suena idiomático.
- source_word: αὐτὸν ἐρωτήσατε
  english_pob_choice: Ask him
  chosen_spanish: Pregúntenle a él
  alternatives_spanish:
  - Háganle la pregunta
  - Pregúntenle
  lexicon: SBLGNT; BDAG
  rationale: El imperativo plural se hace explícito con «Pregúntenle». Añadir «a él» refleja el énfasis pronominal de αὐτόν sin alterar el sentido.
- source_word: ἡλικίαν ἔχει
  english_pob_choice: he is of age
  chosen_spanish: ya tiene edad
  alternatives_spanish:
  - ya es mayor
  - ya es adulto
  lexicon: SBLGNT; BDAG
  rationale: ἡλικία aquí apunta a edad suficiente para responder por sí mismo, más que a estatura. «Ya tiene edad» conserva la idea jurídica/social de madurez responsable sin imponer una formulación más interpretativa.
- source_word: αὐτὸς περὶ ἑαυτοῦ λαλήσει
  english_pob_choice: He will speak for himself
  chosen_spanish: Él hablará por sí mismo
  alternatives_spanish:
  - Él mismo hablará por sí
  - Él dará testimonio por sí mismo
  lexicon: SBLGNT; BDAG
  rationale: αὐτός refuerza el sujeto; περὶ ἑαυτοῦ significa «acerca de sí mismo»; y λαλήσει es futuro. «Hablará por sí mismo» preserva la fuerza de auto-testimonio en un español natural y legalmente transparente.
theological_decisions:
- issue: Sentido de ἡλικίαν ἔχει
  english_pob_reading: Refers to being of sufficient age to answer independently
  chosen_spanish_reading: Refiere a tener edad suficiente para responder por cuenta propia
  alternative_spanish_readings:
  - Refiere a madurez general
  - Refiere a edad adulta legal
  rationale: En el contexto de la interrogación y la respuesta de los padres, la frase apunta a capacidad para declarar por sí mismo. «Ya tiene edad» deja abierta esa madurez funcional sin reducirla a una sola categoría moderna.
  doctrine_reference: Translation philosophy §1, §6
- issue: Fuerza de αὐτὸς περὶ ἑαυτοῦ λαλήσει
  english_pob_reading: An assertion that the man can give his own testimony
  chosen_spanish_reading: Afirma que el hombre puede dar su propio testimonio
  alternative_spanish_readings:
  - Afirma simplemente que hablará de sí mismo
  - Afirma que responderá por sí mismo
  rationale: El contexto es claramente de interrogatorio. «Hablará por sí mismo» conserva el matiz de testimonio personal sin introducir lenguaje doctrinal ajeno al pasaje.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior: la nota [a] ahora está anclada en el texto principal en «edad[a]». El resto de la redacción mantiene alta concordancia con el original griego y con el audit trail inglés.'
  spanish_consistency_notes:
  - Se mantuvo la repetición de «no lo sabemos» para reflejar el énfasis del griego.
  - Se evitó traducir ἡλικίαν ἔχει como «es un adulto» para no cerrar indebidamente la amplitud semántica del pasaje.
  - Se prefirió «hablará por sí mismo» por su claridad y por conservar la fuerza de auto-testimonio del contexto judicial.
