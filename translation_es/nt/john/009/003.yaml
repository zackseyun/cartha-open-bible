translation:
  language: es
  text: 'Jesús respondió: «Ni este hombre pecó, ni sus padres, sino para que las obras de Dios se manifestaran en él[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente «por medio de él» en lugar de «en él»; el griego dice «en él», lo que puede señalar la esfera o el medio por el cual se muestran las obras de Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: BDAG
  rationale: En español, «respondió» comunica con naturalidad la función narrativa de ἀποκρίνομαι en el diálogo, sin añadir matiz interpretativo.
- source_word: Οὔτε ... οὔτε
  english_pob_choice: Neither ... nor
  chosen_spanish: Ni ... ni
  alternatives_spanish:
  - No ... ni
  - Ni ... ni
  lexicon: BDAG
  rationale: La correlación enfática se preserva bien con «ni ... ni», que es idiomática y conserva la doble negación exclusivista del griego.
- source_word: οὗτος
  english_pob_choice: this man
  chosen_spanish: este hombre
  alternatives_spanish:
  - este
  - este hombre
  lexicon: BDAG
  rationale: Se explicita el referente para que el español sea claro y natural, sin introducir información nueva.
- source_word: ἥμαρτεν
  english_pob_choice: sinned
  chosen_spanish: pecó
  alternatives_spanish:
  - cometió pecado
  - pecó
  lexicon: BDAG
  rationale: «Pecó» es el equivalente directo y normal de ἁμαρτάνω en este contexto de pecado concreto, manteniendo la fuerza moral del verbo.
- source_word: γονεῖς
  english_pob_choice: parents
  chosen_spanish: padres
  alternatives_spanish:
  - progenitores
  - padres
  lexicon: BDAG
  rationale: «Padres» reproduce de manera directa γονεῖς y funciona naturalmente en español bíblico contemporáneo.
- source_word: ἵνα
  english_pob_choice: but so that
  chosen_spanish: sino para que
  alternatives_spanish:
  - pero para que
  - sino para que
  lexicon: BDAG
  rationale: El giro «sino para que» mantiene la transición del rechazo de las causas propuestas hacia la finalidad expresada por ἵνα, de modo fluido en español.
- source_word: φανερωθῇ
  english_pob_choice: might be revealed
  chosen_spanish: fueran reveladas
  alternatives_spanish:
  - fueran reveladas
  - se manifestaran
  lexicon: BDAG
  rationale: El pasivo subjuntivo se vierte con una construcción natural en español; «fueran reveladas» preserva la pasividad y la idea de manifestación.
- source_word: τὰ ἔργα τοῦ θεοῦ
  english_pob_choice: the works of God
  chosen_spanish: las obras de Dios
  alternatives_spanish:
  - las obras de Dios
  - los hechos de Dios
  lexicon: BDAG
  rationale: «Obras» es el equivalente más estable para ἔργα y conserva el léxico teológico joánico sin sobreinterpretar.
- source_word: ἐν αὐτῷ
  english_pob_choice: in him
  chosen_spanish: en él
  alternatives_spanish:
  - en él
  - por medio de él
  lexicon: BDAG
  rationale: Se mantiene «en él» para respetar la forma griega y preservar la tensión entre esfera y medio que la traducción inglesa también retuvo.
theological_decisions:
- issue: Si la negación de Jesús debe leerse como una regla universal sobre sufrimiento y pecado, o como una respuesta puntual al caso del ciego de nacimiento
  english_pob_reading: The translation should not import a universal theological rule beyond what the text states.
  chosen_spanish_reading: La traducción aplica la negación al caso concreto del hombre y de sus padres, sin convertirla en una regla universal sobre todo sufrimiento.
  alternative_spanish_readings:
  - Jesús niega que el sufrimiento nunca esté relacionado con pecado personal o familiar
  - Jesús enseña aquí una norma general para todo dolor humano
  rationale: El contexto inmediato responde a una pregunta específica de los discípulos; la redacción española debe conservar ese alcance limitado y no resolver la tensión teológica más allá del texto.
  doctrine_reference: Preservar la tensión teológica sin ampliarla más allá del pasaje.
- issue: Si ἵνα expresa propósito o solo resultado
  english_pob_reading: 'Translate with purpose-oriented language: ''so that the works of God might be revealed in him.'''
  chosen_spanish_reading: 'Se traduce con lenguaje de propósito: «sino para que las obras de Dios fueran reveladas en él».'
  alternative_spanish_readings:
  - con el resultado de que las obras de Dios fueran reveladas en él
  - de modo que las obras de Dios fueran reveladas en él
  rationale: El subjuntivo con ἵνα se vierte de manera directa como finalidad, sin añadir explicaciones causales que el texto no explicita.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del inglés POB al evitar añadidos no explícitos como 'this happened', y se conservó la formulación directa de ἵνα con finalidad. Para el español, se prefirió una sintaxis natural que mantuviera la misma tensión exegética sin ampliar el alcance del versículo.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός, conforme al estándar del proyecto.
  - Se conserva «obras» para ἔργα, en coherencia con el léxico joánico del POB.
  - Se usa «en él» para ἐν αὐτῷ, preservando la ambigüedad entre localización y medio.
  - La negación doble «ni ... ni» refleja fielmente la estructura correlativa de οὔτε ... οὔτε.
