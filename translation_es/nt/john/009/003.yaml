  text: ἀπεκρίθη Ἰησοῦς· Οὔτε οὗτος ἥμαρτεν οὔτε οἱ γονεῖς αὐτοῦ, ἀλλ’ ἵνα φανερωθῇ τὰ ἔργα τοῦ θεοῦ ἐν αὐτῷ.
base_translation:
  language: en
  yaml_path: translation/nt/john/009/003.yaml
  text: Jesus answered[a], “Neither this man sinned, nor his parents[c][b], but so that the works of God might be revealed in him.”
  footnotes:
  - marker: a
    text: Or, more literally, 'but so that the works of God might be revealed in him.' The supplied words 'this happened' make the Greek construction natural in English.
    reason: lexical_alternative
  - marker: b
    text: Or possibly 'through him' for 'in him'; the Greek reads 'in him,' which may denote the sphere or means by which God's works are displayed.
    reason: lexical_alternative
  - marker: c
    text: Or 'Neither this man sinned'.
    reason: previous_rendering
