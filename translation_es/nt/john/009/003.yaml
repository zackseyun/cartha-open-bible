revisions:
- from: 'Jesús respondió[a]: «Ni este hombre pecó, ni sus padres[b], sino para que las obras de Dios fueran reveladas en él».'
  to: 'Jesús respondió: «Ni este hombre pecó, ni sus padres, sino para que las obras de Dios se manifestaran en él[a]».'
  rationale: Se conserva el sentido del griego y la decisión teológica del POB, pero se mejora la naturalidad del español con «se manifestaran» y se reemplazan notas poco útiles por una nota léxica relevante sobre ἐν αὐτῷ, en línea con el rastro auditado en inglés.
