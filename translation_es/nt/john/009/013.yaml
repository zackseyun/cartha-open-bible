translation:
  language: es
  text: Llevaron al hombre que antes era ciego a los fariseos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Llevaron a los fariseos al hombre que antes era ciego».'
    reason: alternative_wording
lexical_decisions:
- source_word: Ἄγουσιν
  english_pob_choice: They brought
  chosen_spanish: Llevaron
  alternatives_spanish:
  - Trajeron
  - Lo llevaron
  lexicon: BDAG
  rationale: El griego usa presente histórico; en español narrativo, el pretérito simple transmite con naturalidad la acción concluida. «Llevaron» conserva el movimiento hacia otro lugar/personas sin sonar tan pesado como una construcción más literal con presente.
- source_word: αὐτὸν
  english_pob_choice: the man
  chosen_spanish: al que
  alternatives_spanish:
  - lo
  - al hombre
  lexicon: BDAG
  rationale: El pronombre griego se refiere al sanado, ya identificado por el contexto inmediato. En español, una referencia resumida con «al que» mantiene la cohesión sin repetir innecesariamente «el hombre»; el sentido sigue siendo el mismo que en la tradición auditada en inglés.
- source_word: πρὸς τοὺς Φαρισαίους
  english_pob_choice: to the Pharisees
  chosen_spanish: a los fariseos
  alternatives_spanish:
  - ante los fariseos
  - hacia los fariseos
  lexicon: BDAG
  rationale: πρός con acusativo expresa movimiento hacia personas; «a los fariseos» es la forma más directa y natural en español. «Ante» sería más interpretativo, y «hacia» menos preciso aquí.
- source_word: Φαρισαίους
  english_pob_choice: Pharisees
  chosen_spanish: fariseos
  alternatives_spanish:
  - Fariseos
  lexicon: BDAG
  rationale: Se mantiene el nombre de grupo como transliteración tradicional, en minúscula por la norma ortográfica del español cuando funciona como sustantivo común de designación grupal.
- source_word: τόν ποτε τυφλόν
  english_pob_choice: the man who had formerly been blind
  chosen_spanish: al que antes era ciego
  alternatives_spanish:
  - al que había sido ciego
  - al antes ciego
  - al que una vez fue ciego
  lexicon: BDAG
  rationale: 'La frase griega funciona sustantivamente: «el que antes era ciego». En español, «al que antes era ciego» conserva el contraste temporal entre su estado anterior y su condición actual, sin forzar una perífrasis más pesada. «Ciego» mantiene el adjetivo descriptivo del original.'
- source_word: ποτε
  english_pob_choice: formerly
  chosen_spanish: antes
  alternatives_spanish:
  - una vez
  - antes de eso
  lexicon: BDAG
  rationale: «Antes» expresa con claridad el valor temporal de ποτε en este contexto y suena más natural que «una vez», que en español puede sonar menos preciso o más ambiguo.
- source_word: τυφλόν
  english_pob_choice: blind
  chosen_spanish: ciego
  alternatives_spanish:
  - sin vista
  lexicon: BDAG
  rationale: Adjetivo directo para la condición previa del hombre. No se requiere una paráfrasis; el contraste con su sanidad posterior está implícito en la construcción.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa que reordenó la frase para hacerla más natural sin cambiar el contenido. En español, el orden elegido ya resulta natural y conserva todos los elementos: acción, objeto personal, destino y la identificación del hombre como antes ciego.'
  spanish_consistency_notes:
  - Se evitó usar «SEÑOR» o terminología no presente en el versículo.
  - No hay tensión teológica especial en este texto; la decisión principal es sintáctica y léxica.
  - La nota alternativa preserva la posibilidad de una formulación más cercana al orden del original griego, como en el aparato inglés auditado.
