revisions:
- from: Llevaron al que antes era ciego a los fariseos[a].
  to: Llevaron al hombre que antes era ciego a los fariseos[a].
  rationale: Se explicita «al hombre» para reflejar con mayor naturalidad en español el referente de αὐτὸν junto con la frase sustantivada τόν ποτε τυφλόν, siguiendo la misma lógica de claridad documentada en la auditoría inglesa. Se mantiene «antes» como equivalente natural de ποτε y se ajusta la nota para que la alternativa de orden también sea idiomática en español.
  reviewer_model: gpt-5.4
