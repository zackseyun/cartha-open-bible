translation:
  language: es
  text: 'Entonces ellos le dijeron: «¿Qué te hizo? ¿Cómo te abrió los ojos?»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: εἶπον
  english_pob_choice: they said
  chosen_spanish: le dijeron
  alternatives_spanish:
  - le preguntaron
  - le hablaron
  lexicon: BDAG
  rationale: El aoristo de λέγω introduce el discurso directo del grupo. En español, «le dijeron» conserva el verbo básico de decir sin forzar un verbo más específico que el griego no usa.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Entonces
  alternatives_spanish:
  - Así que
  - Por tanto
  lexicon: BDAG
  rationale: οὖν marca continuidad discursiva. «Entonces» expresa esa transición de manera natural en español y mantiene el valor inferencial sin volverlo demasiado lógico-formal.
- source_word: Τί ἐποίησέν σοι
  english_pob_choice: What did he do to you
  chosen_spanish: ¿Qué te hizo?
  alternatives_spanish:
  - ¿Qué hizo para ti?
  - ¿Qué te hizo a ti?
  lexicon: BDAG
  rationale: ποιέω con dativo aquí significa «hacer a/con respecto a». Dado el contexto interrogativo y hostil, «¿Qué te hizo?» preserva la fuerza directa y evita suavizarla como beneficio. Se omite «a ti» por redundante en español.
- source_word: πῶς ἤνοιξέν σου τοὺς ὀφθαλμούς
  english_pob_choice: How did he open your eyes
  chosen_spanish: ¿Cómo te abrió los ojos?
  alternatives_spanish:
  - ¿De qué manera te abrió los ojos?
  - ¿Cómo abrió tus ojos?
  lexicon: BDAG
  rationale: ἀνοίγω con objetos corporales se vierte de forma idiomática como «abrir los ojos». «Te abrió» refleja el dativo posesivo de σου / σοι en español natural, conservando el sentido literal sin calco innecesario.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios y la concordancia con el testigo griego y la traducción POB inglesa es alta; por ello se mantiene una solución directa y sobria sin notas textuales adicionales.
  spanish_consistency_notes:
