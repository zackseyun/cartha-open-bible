translation:
  language: es
  text: 'Algunos decían: «Este es él». Otros decían: «No, sino que se le parece». Él seguía diciendo: «Yo soy él[a]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente, «Yo soy». Aquí el sentido es de autoidentificación ordinaria: el hombre está diciendo que él es la persona de la que están hablando.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄλλοι
  english_pob_choice: Some / Others
  chosen_spanish: Algunos / Otros
  alternatives_spanish:
  - Los demás
  lexicon: BDAG
  rationale: El griego usa ἄλλοι de modo distributivo para contrastar voces distintas en la multitud. En español, «Algunos» y «Otros» conserva ese contraste de forma natural y sobria.
- source_word: ἔλεγον
  english_pob_choice: were saying / kept saying
  chosen_spanish: decían / seguía diciendo
  alternatives_spanish:
  - decían repetidamente
  - andaban diciendo
  lexicon: BDAG
  rationale: El imperfecto sugiere habla en curso o repetida. «Decían» y «seguía diciendo» preservan ese aspecto sin forzar una perífrasis demasiado explicativa.
- source_word: Οὗτός ἐστιν
  english_pob_choice: This is he
  chosen_spanish: Este es él
  alternatives_spanish:
  - Este es el hombre
  - Este es él mismo
  lexicon: BDAG
  rationale: La frase es de identificación directa. «Este es él» mantiene la deixis y evita añadir «el hombre», que no está explícito en el griego.
- source_word: Οὐχί
  english_pob_choice: 'No'
  chosen_spanish: 'No'
  alternatives_spanish:
  - De ningún modo
  - No, en absoluto
  lexicon: BDAG
  rationale: Es una negación enfática en diálogo. «No» es la equivalencia más clara y fiel en español actual.
- source_word: ἀλλὰ
  english_pob_choice: but / rather
  chosen_spanish: sino que
  alternatives_spanish:
  - pero
  - más bien
  lexicon: BDAG
  rationale: Aquí introduce corrección o contraste frente a la afirmación anterior. En español, «sino que» expresa mejor esa rectificación que un simple «pero».
- source_word: ὅμοιος αὐτῷ ἐστιν
  english_pob_choice: he is like him
  chosen_spanish: se le parece
  alternatives_spanish:
  - es como él
  - es similar a él
  lexicon: BDAG
  rationale: ὅμοιος con dativo expresa semejanza, no identidad. «Se le parece» suena natural en español y conserva la diferencia entre parecerse e identificarse.
- source_word: ἐκεῖνος
  english_pob_choice: He
  chosen_spanish: Él
  alternatives_spanish:
  - Aquel
  - Ese hombre
  lexicon: BDAG
  rationale: Se refiere al hombre del relato que ahora responde por sí mismo. En español, el pronombre simple «Él» es la forma más natural y clara.
- source_word: Ἐγώ εἰμι
  english_pob_choice: I am he
  chosen_spanish: Yo soy
  alternatives_spanish:
  - Yo soy él
  - Soy yo
  lexicon: BDAG
  rationale: El griego admite una autoidentificación breve. Como la POB inglesa conservó la tensión del literal «I am», en español «Yo soy» la preserva mejor que añadir «él», evitando resolver de antemano si aquí hay o no un eco teológico pleno.
theological_decisions:
- issue: Sentido de Ἐγώ εἰμι en un contexto narrativo de identificación personal
  english_pob_reading: I am he
  chosen_spanish_reading: Yo soy
  alternative_spanish_readings:
  - Soy yo
  - Yo soy él
  rationale: Aunque en Juan la fórmula puede adquirir resonancia teológica en otros pasajes, aquí el contexto inmediato es una discusión sobre la identidad del hombre sanado. «Yo soy» mantiene la posible densidad del griego sin imponer una aclaración que el texto no exige.
  doctrine_reference: Conservar la tensión textual; no cerrar prematuramente la posibilidad de un eco joánico más amplio, pero tampoco convertir esta línea en una afirmación doctrinal explícita sin base contextual.
translation_notes:
  revision_awareness: 'La versión inglesa auditada optó por una equivalencia óptima con preservación de la tensión de Ἐγώ εἰμι. La redacción española sigue esa línea: mantiene la identificación directa, el contraste entre identidad y semejanza, y la posibilidad de leer «Yo soy» de manera simple sin añadir un predicado explícito que el griego no expresa.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando corresponda al Tetragrámaton; este versículo no contiene el nombre divino.
  - Se evitó «Cristo» porque no aparece en el texto ni es pertinente aquí.
  - «Se le parece» traduce la semejanza de ὅμοιος sin confundirla con identidad.
  - La puntuación con comillas y dos puntos refleja adecuadamente el discurso directo y el contraste entre voces.
