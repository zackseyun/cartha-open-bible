translation:
  language: es
  text: 'El hombre respondió y les dijo: «Esto es lo admirable[a]: que ustedes no saben de dónde es[b], y me abrió los ojos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo sorprendente».
    reason: lexical_alternative
  - marker: b
    text: O «de dónde viene» o «de dónde procede».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  lexicon: BDAG
  rationale: ἀπεκρίθη introduce la respuesta en diálogo narrativo. «Respondió» conserva el carácter formal y directo del intercambio, de modo natural en español.
- source_word: ὁ ἄνθρωπος
  english_pob_choice: The man
  chosen_spanish: El hombre
  alternatives_spanish:
  - El varón
  - La persona
  lexicon: BDAG
  rationale: Se refiere al hombre sanado en la escena. «El hombre» es natural y mantiene la referencia masculina concreta del griego.
- source_word: εἶπεν αὐτοῖς
  english_pob_choice: said to them
  chosen_spanish: les dijo
  alternatives_spanish:
  - dijo a ellos
  lexicon: BDAG
  rationale: La construcción española normal con dativo de destinatario es «les dijo»; preserva la sencillez del verbo λέγω sin añadir énfasis.
- source_word: Ἐν τούτῳ ... τὸ θαυμαστόν ἐστιν
  english_pob_choice: This is the remarkable thing
  chosen_spanish: En esto, en efecto, está lo admirable
  alternatives_spanish:
  - Esto es lo admirable
  - En esto está lo admirable
  - Esto es lo asombroso
  lexicon: BDAG
  rationale: El griego usa una estructura idiomática con ἐν τούτῳ que apunta al asunto en cuestión. En español, «En esto ... está» conserva el demostrativo y la focalización. «Lo admirable» comunica θαυμαστόν con un matiz de admiración/extrañeza que encaja con la respuesta irónica del hombre; se evita forzar «milagroso» o «maravilloso» porque el texto enfatiza lo sorprendente de la situación, no solo el hecho físico.
- source_word: γὰρ
  english_pob_choice: —
  chosen_spanish: en efecto
  alternatives_spanish:
  - pues
  - porque
  lexicon: BDAG
  rationale: γάρ tiene función explicativa. «En efecto» reproduce esa aclaración sin sonar mecánico; mantiene el vínculo lógico con la afirmación precedente.
- source_word: ὅτι
  english_pob_choice: ':'
  chosen_spanish: que
  alternatives_spanish:
  - —
  lexicon: BDAG
  rationale: Introduce el contenido de lo admirable. En español, «que» permite una subordinación natural tras «está lo admirable».
- source_word: ὑμεῖς
  english_pob_choice: you
  chosen_spanish: ustedes
  alternatives_spanish:
  - vosotros
  lexicon: BDAG
  rationale: El pronombre griego es explícito y contrastivo. «Ustedes» conserva el contraste sin regionalizar la voz a una variedad peninsular.
- source_word: οὐκ οἴδατε
  english_pob_choice: do not know
  chosen_spanish: no saben
  alternatives_spanish:
  - no conocen
  - no comprenden
  lexicon: BDAG
  rationale: οἶδα aquí expresa conocimiento factual acerca del origen de Jesús. «No saben» es la forma más directa y natural; evita sobredeterminar con «comprenden».
- source_word: πόθεν ἐστίν
  english_pob_choice: where he is from
  chosen_spanish: de dónde es
  alternatives_spanish:
  - de dónde viene
  - cuál es su origen
  lexicon: BDAG
  rationale: πόθεν pregunta por procedencia u origen. «De dónde es» es idiomático en español y conserva la referencia personal a Jesús sin explicitar más de lo que el griego dice.
- source_word: καὶ
  english_pob_choice: and yet
  chosen_spanish: y
  alternatives_spanish:
  - y sin embargo
  - pero
  lexicon: BDAG
  rationale: Aunque el contexto tiene una tensión irónica, el griego simplemente une las cláusulas con καί. Se conserva «y» para no sobretraducir la adversatividad; la ironía surge del contraste del conjunto.
- source_word: ἤνοιξέν μου τοὺς ὀφθαλμούς
  english_pob_choice: he opened my eyes
  chosen_spanish: me abrió los ojos
  alternatives_spanish:
  - abrió mis ojos
  lexicon: BDAG
  rationale: La expresión es literal e idiomática. «Me abrió los ojos» respeta la imagen verbal sin convertirla en una explicación espiritual explícita.
theological_decisions:
- issue: Resonancia de la imagen de abrir los ojos en Juan sin espiritualizar el texto
  english_pob_reading: Retain the literal healing expression without making the metaphor explicit
  chosen_spanish_reading: Conservar la expresión literal del milagro sin convertirla en una metáfora de iluminación espiritual
  alternative_spanish_readings:
  - Hacer explícita la iluminación espiritual
  - Parafrasear para subrayar la fe o el discernimiento
  rationale: En el contexto inmediato, el hombre habla de su curación física. La traducción mantiene la imagen concreta («me abrió los ojos») y deja que la ironía joánica y el eco teológico emerjan del contexto narrativo, no de una glosa añadida.
  doctrine_reference: Preservar la tensión teológica sin resolverla de antemano.
translation_notes:
  revision_awareness: 'Se siguió de cerca el griego SBLGNT y el audit trail inglés: se mantuvo la estructura explicativa de ἐν τούτῳ... τὸ θαυμαστόν ἐστιν, se conservó el valor de γάρ mediante «en efecto», y se evitó espiritualizar «me abrió los ojos», en continuidad con la decisión inglesa de mantener la referencia primaria a la curación física. No se registraron revisiones posteriores que alteraran el sentido base.'
  spanish_consistency_notes:
  - Se prefirió «ustedes» para el plural explícito de ὑμεῖς, manteniendo un español neutral y publicado para lectores de toda América Latina.
  - Se usó «Dios»/«Yahvé» por norma del proyecto solo cuando correspondiera; este versículo no contiene el nombre divino ni títulos que requieran ajuste.
  - Se evitó «Cristo»/«Mesías» porque no aparecen en el texto; tampoco se introdujo terminología eclesiástica ajena al relato.
  - Se mantuvo el registro narrativo sobrio y directo, sin añadir intensificación devocional que el griego no exige.
