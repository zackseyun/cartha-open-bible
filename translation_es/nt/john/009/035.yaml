translation:
  language: es
  text: 'Jesús oyó que lo habían echado fuera[a], y cuando lo encontró, le dijo: «¿Crees en el Hijo del Hombre?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos dicen «el Hijo de Dios» en lugar de «el Hijo del Hombre».
    reason: textual_variant
lexical_decisions:
- source_word: Ἤκουσεν
  english_pob_choice: heard
  chosen_spanish: oyó
  alternatives_spanish:
  - escuchó
  - se enteró
  lexicon: ἀκούω
  rationale: Aquí ἀκούω expresa recepción de información sobre lo ocurrido; en español «oyó» es natural y breve, sin convertir innecesariamente el verbo en «escuchó» (más activo) ni en «se enteró» (más interpretativo).
- source_word: ἐξέβαλον ... ἔξω
  english_pob_choice: had thrown him out
  chosen_spanish: lo habían echado fuera
  alternatives_spanish:
  - lo habían expulsado
  - lo habían arrojado fuera
  - lo habían echado
  lexicon: ἐκβάλλω
  rationale: La combinación refuerza expulsión/exclusión social. «Echar fuera» conserva la fuerza verbal y suena idiomático en español; «expulsado» sería correcto pero más formal y menos directo. Se mantiene el sentido de exclusión sin suavizarlo a «poner fuera».
- source_word: εὑρὼν
  english_pob_choice: when he found him
  chosen_spanish: cuando lo encontró
  alternatives_spanish:
  - al encontrarlo
  - habiéndolo encontrado
  lexicon: εὑρίσκω
  rationale: El participio aoristo con valor temporal se expresa naturalmente como «cuando lo encontró», conservando la secuencia narrativa sin rigidez participial en español.
- source_word: Σὺ πιστεύεις
  english_pob_choice: Do you believe
  chosen_spanish: ¿Crees
  alternatives_spanish:
  - ¿Tú crees?
  - ¿Tú crees en...?
  - ¿Crees tú?
  lexicon: πιστεύω
  rationale: «Creer» es el equivalente normal de πιστεύω en esta pregunta de fe. El pronombre explícito Σὺ aporta énfasis; en español el énfasis puede sugerirse con la entonación y el orden, sin sobrecargar la frase.
- source_word: εἰς
  english_pob_choice: in
  chosen_spanish: en
  alternatives_spanish:
  - en dirección a
  - hacia
  lexicon: BDAG
  rationale: Con πιστεύω, εἰς marca la orientación de la fe hacia una persona. En español bíblico y moderno, «creer en» es la solución más clara y fiel.
- source_word: υἱὸν τοῦ ἀνθρώπου
  english_pob_choice: the Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - el Hijo de Hombre
  - el Hijo de la Humanidad
  lexicon: BDAG
  rationale: Se conserva el título tradicional y reconocible «Hijo del Hombre», que corresponde al valor titular y a la resonancia bíblica de la expresión griega, evitando una paráfrasis interpretativa.
theological_decisions:
- issue: Variante textual del título cristológico
  english_pob_reading: the Son of Man; footnote notes variant Son of God
  chosen_spanish_reading: el Hijo del Hombre; nota la variante «el Hijo de Dios»
  alternative_spanish_readings:
  - el Hijo de Dios
  rationale: 'El texto base sigue la lectura de SBLGNT: υἱὸν τοῦ ἀνθρώπου. La variante textual «Hijo de Dios» es significativa y se preserva en nota, sin desplazar la lectura principal.'
  doctrine_reference: Preservar la tensión textual documentando la variante importante en nota, en lugar de armonizarla.
translation_notes:
  revision_awareness: Se siguió la lectura base griega de SBLGNT y el audit trail inglés sin cambios sustantivos. La fraseología española se ajustó para sonar natural y reverente, manteniendo la fuerza de expulsión en ἐξέβαλον ... ἔξω y la pregunta directa de fe en πιστεύεις εἰς.
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς.
  - Se mantiene «el Hijo del Hombre» como título cristológico estándar y auditable.
  - Se usa «creer en» para πιστεύω εἰς, coherente con el valor relacional de la construcción.
  - La nota textual conserva la variante relevante sin incorporarla al texto principal.
