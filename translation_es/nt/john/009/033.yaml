translation:
  language: es
  text: Si este hombre no viniera de Dios[a], no podría hacer nada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a menos que este hombre viniera de Dios».
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰ μὴ
  english_pob_choice: If ... not
  chosen_spanish: Si ... no
  alternatives_spanish:
  - a menos que
  lexicon: BDAG
  rationale: La construcción introduce una condición contraria a los hechos; en español, «si ... no» conserva con transparencia la estructura condicional sin forzar una equivalencia más compacta que podría sonar menos directa.
- source_word: ἦν
  english_pob_choice: were
  chosen_spanish: viniera
  alternatives_spanish:
  - fuera
  lexicon: BDAG
  rationale: Aunque el verbo griego está en imperfecto indicativo, el sentido es contrafactual. En español, «viniera» expresa bien esa irrealidad condicional; «fuera» también es posible, pero «viniera» se ajusta mejor a la frase «de parte de Dios» y a la relación de procedencia.
- source_word: οὗτος
  english_pob_choice: this man
  chosen_spanish: este hombre
  alternatives_spanish:
  - este
  - esta persona
  lexicon: BDAG
  rationale: El referente es Jesús, ya identificado en el contexto. «Este hombre» conserva la referencia personal y el valor demostrativo sin volverla una fórmula demasiado literal o ambigua en español.
- source_word: παρὰ θεοῦ
  english_pob_choice: from God
  chosen_spanish: de parte de Dios
  alternatives_spanish:
  - de Dios
  - procedente de Dios
  - enviado por Dios
  lexicon: BDAG
  rationale: La preposición παρά con genitivo puede expresar origen o procedencia. «De parte de Dios» mantiene la idea de procedencia/relación con Dios y evita concretar más de lo que el griego afirma; «enviado por Dios» sería una interpretación más específica que el texto no exige.
- source_word: οὐκ ἠδύνατο
  english_pob_choice: he could not
  chosen_spanish: no podría
  alternatives_spanish:
  - no podía
  - no sería capaz de
  lexicon: BDAG
  rationale: En español, el condicional «no podría» comunica con naturalidad la incapacidad ligada a la condición irreal. «No podía» es posible, pero puede sonar menos claramente contrafactual en este contexto.
- source_word: ποιεῖν
  english_pob_choice: do
  chosen_spanish: hacer
  alternatives_spanish:
  - realizar
  - obrar
  lexicon: BDAG
  rationale: «Hacer» es el equivalente más amplio y natural en español para el verbo general ποιέω. «Obrar» podría sugerir un registro más religioso o tradicional sin aportar precisión adicional.
- source_word: οὐδέν
  english_pob_choice: nothing
  chosen_spanish: nada
  alternatives_spanish:
  - nada en absoluto
  - ninguna cosa
  lexicon: BDAG
  rationale: «Nada» reproduce el alcance total de la negación griega con naturalidad en español y conserva la fuerza enfática de la expresión.
theological_decisions:
- issue: Alcance de la expresión 'de parte de Dios'
  english_pob_reading: Retain the source-language expression 'from God' without expanding it.
  chosen_spanish_reading: Mantener «de parte de Dios» sin convertirlo en «enviado por Dios».
  alternative_spanish_readings:
  - enviado por Dios
  - autorizado por Dios
  rationale: El griego habla de procedencia o relación con Dios, pero no especifica aquí una formulación técnica de envío o de autorización. La versión española conserva esa tensión y no resuelve prematuramente el alcance doctrinal de la frase.
  doctrine_reference: Preservar la tensión teológica del texto sin añadir precisión doctrinal no explícita.
translation_notes:
  revision_awareness: El auditorio inglés de POB mantiene como equivalente principal una condicional contrafactual y nota una alternativa con 'unless'; la redacción española sigue esa misma lectura y conserva la alternativa semántica en nota, sin introducir una expansión doctrinal ni una paráfrasis más fuerte que el griego.
  spanish_consistency_notes:
  - Se mantiene «Dios» según la terminología POB para θεός.
  - Se usa un condicional contrafactual natural en español para reflejar el imperfecto griego.
  - No se introduce «Cristo» ni «Mesías», porque el versículo no usa Χριστός.
  - La negación total se conserva con «nada», equivalente funcional de οὐδέν.
