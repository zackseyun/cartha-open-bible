translation:
  language: es
  text: 'Lo insultaron y le dijeron: «Tú eres discípulo de ese hombre[a]; pero nosotros somos discípulos de Moisés».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su discípulo». El griego dice «de aquel/de ese», lo que aquí puede tener un matiz distanciador o despectivo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλοιδόρησαν
  english_pob_choice: They reviled
  chosen_spanish: Lo insultaron
  alternatives_spanish:
  - Lo injuriaron
  - Lo ultrajaron
  lexicon: BDAG
  rationale: λοιδορέω expresa reproche verbal ofensivo y deshonra pública. En español, «insultaron» comunica la agresión verbal de forma natural y clara; «injuriaron» es más formal, pero menos transparente para lectura pública.
- source_word: αὐτὸν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: Pronombre de objeto directo estándar
  rationale: El referente es el hombre sanado; en español, el clítico de objeto directo «lo» es la opción más natural y fiel al valor pronominal del griego.
- source_word: Σὺ
  english_pob_choice: You
  chosen_spanish: Tú
  alternatives_spanish:
  - Tú mismo
  lexicon: Pronombre enfático
  rationale: El pronombre inicial es enfático en griego. «Tú» al inicio de la cláusula conserva esa prominencia sin agregar énfasis ajeno al texto.
- source_word: μαθητὴς
  english_pob_choice: disciple
  chosen_spanish: discípulo
  alternatives_spanish:
  - seguidor
  - alumno
  lexicon: BDAG
  rationale: En Juan, μαθητής denota adhesión y pertenencia a un maestro, no simple instrucción. «Discípulo» mantiene la consistencia terminológica y el peso relacional del término.
- source_word: ἐκείνου
  english_pob_choice: that man's
  chosen_spanish: ese hombre
  alternatives_spanish:
  - de él
  - de aquel
  lexicon: BDAG
  rationale: El demostrativo tiene matiz distanciador y despectivo en este contexto hostil. «Ese hombre» reproduce mejor esa distancia que el posesivo neutral «de él».
- source_word: τοῦ Μωϋσέως
  english_pob_choice: of Moses
  chosen_spanish: de Moisés
  alternatives_spanish:
  - de la ley de Moisés
  lexicon: Genitivo de relación
  rationale: 'La construcción genitiva señala pertenencia o vínculo: «discípulos de Moisés» es idiomático en español y mantiene el contraste retórico del pasaje.'
- source_word: ἐσμὲν μαθηταί
  english_pob_choice: are disciples
  chosen_spanish: somos discípulos
  alternatives_spanish:
  - seguimos siendo discípulos
  - somos seguidores
  lexicon: Copulativa + predicado nominal
  rationale: Se conserva la estructura copulativa del griego con «somos discípulos», manteniendo el paralelismo y la oposición directa con la primera mitad del versículo.
theological_decisions:
- issue: Tono despectivo de ἐκείνου
  english_pob_reading: Rendered as 'that man's' to preserve the speakers' dismissive, hostile distancing.
  chosen_spanish_reading: «ese hombre» preserva la distancia despectiva de los hablantes.
  alternative_spanish_readings:
  - «de él»
  - «aquel hombre»
  rationale: El contexto de reprensión verbal justifica una traducción que refleje el desprecio implícito del demostrativo sin cargarlo más allá del texto. «Ese hombre» suena natural y conserva la tensión polémica.
  doctrine_reference: Translation philosophy §1, §6
- issue: Consistencia de μαθητής
  english_pob_reading: Used 'disciple' for both occurrences.
  chosen_spanish_reading: Se usa «discípulo» en ambas ocurrencias.
  alternative_spanish_readings:
  - «seguidor»
  - «alumno»
  rationale: La repetición del mismo término refuerza el contraste entre la lealtad alegada a Jesús y la lealtad a Moisés. «Discípulo» es el equivalente más estable y doctrinalmente neutro en este contexto.
  doctrine_reference: Translation philosophy §5
translation_notes:
  revision_awareness: El borrador sigue de cerca el griego SBLGNT y el trazado de decisiones del POB en inglés. Se mantiene la fuerza verbal de λοιδορέω, el énfasis de Σὺ, y el doble uso de μαθητής como «discípulo». Se adapta ἐκείνου a una solución española natural que preserve el matiz despectivo sin calco rígido.
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque el versículo no contiene κύριος ni una alusión directa al nombre divino.
  - Se mantiene «discípulo» para μαθητής en ambos miembros de la frase para conservar paralelismo y consistencia terminológica.
  - «Moisés» se traduce de forma estándar sin notas adicionales, ya que no presenta ambigüedad textual.
  - La puntuación española usa punto y coma para reflejar la fuerte oposición entre las dos cláusulas.
