translation:
  language: es
  text: 'Él respondió[a]: «El hombre llamado Jesús hizo barro y lo untó[b] en mis ojos, y me dijo: “Ve a Siloam y lávate”. Así que fui, me lavé y recobré la vista[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Respondió». La forma griega introduce la respuesta de manera simple; en español puede formularse también con verbo directo sin pronombre explícito.
    reason: lexical_alternative
  - marker: b
    text: O «lo puso sobre mis ojos» o «lo aplicó sobre mis ojos». El verbo griego ἐπιχρίω puede significar poner, untar o aplicar sobre una superficie.
    reason: lexical_alternative
  - marker: c
    text: O «recibí la vista». En este contexto, ἀναβλέπω se refiere a recuperar la capacidad de ver después de la ceguera.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη ἐκεῖνος
  english_pob_choice: He answered
  chosen_spanish: Él respondió
  alternatives_spanish:
  - Respondió
  - Él contestó
  lexicon: BDAG
  rationale: La fórmula narrativa se expresa de manera natural con el sujeto explícito «Él» para reflejar ἐκεῖνος sin caer en un calco rígido. «Respondió» conserva el valor de contestación en discurso directo.
- source_word: Ὁ ἄνθρωπος ὁ λεγόμενος Ἰησοῦς
  english_pob_choice: The man called Jesus
  chosen_spanish: El hombre llamado Jesús
  alternatives_spanish:
  - El hombre que se llama Jesús
  - El hombre nombrado Jesús
  lexicon: BDAG
  rationale: λεγόμενος identifica a Jesús por el nombre con que es conocido. «Llamado Jesús» mantiene la identificación simple del hablante, sin añadir un título confesional que el contexto no da.
- source_word: πηλὸν ἐποίησεν
  english_pob_choice: made mud
  chosen_spanish: hizo barro
  alternatives_spanish:
  - hizo lodo
  - hizo barro húmedo
  lexicon: BDAG
  rationale: πηλός puede ser «barro» o «lodo». Aquí se eligió «barro» porque en español suena natural y sigue permitiendo la alternativa de material arcilloso que el griego admite.
- source_word: ἐπέχρισέν μου τοὺς ὀφθαλμούς
  english_pob_choice: spread it on my eyes
  chosen_spanish: lo puso sobre mis ojos
  alternatives_spanish:
  - lo untó sobre mis ojos
  - lo extendió sobre mis ojos
  - me lo aplicó en los ojos
  lexicon: BDAG
  rationale: ἐπιχρίω denota la acción física de poner/untar/aplicar sobre algo. «Lo puso sobre mis ojos» comunica el gesto sin introducir de forma obligatoria el matiz ritual de «ungió».
- source_word: εἶπέν μοι ὅτι
  english_pob_choice: he told me
  chosen_spanish: me dijo
  alternatives_spanish:
  - me indicó
  - me ordenó
  lexicon: BDAG
  rationale: La introducción de discurso directo se expresa de forma simple y fiel con «me dijo». El contexto imperativo conserva la fuerza de la orden en la cita siguiente.
- source_word: Ὕπαγε
  english_pob_choice: Go
  chosen_spanish: Ve
  alternatives_spanish:
  - Anda
  - Vete
  lexicon: BDAG
  rationale: El imperativo de movimiento se expresa de manera directa y natural. «Ve» mantiene la sobriedad del mandato griego.
- source_word: εἰς τὸν Σιλωὰμ
  english_pob_choice: to Siloam
  chosen_spanish: a Siloam
  alternatives_spanish:
  - hasta Siloam
  - a la fuente de Siloam
  lexicon: BDAG
  rationale: El texto griego nombra simplemente el destino, «Siloam», sin repetir «estanque». «A Siloam» sigue esa forma breve y concuerda con el contexto ya identificado en el relato.
- source_word: νίψαι
  english_pob_choice: wash
  chosen_spanish: lávate
  alternatives_spanish:
  - lava
  - límpiate
  lexicon: BDAG
  rationale: 'El imperativo medio de νίπτω se expresa naturalmente en español con reflexivo: «lávate». Esto conserva la acción sobre el propio cuerpo sin sobrecargarla.'
- source_word: ἀπελθὼν οὖν
  english_pob_choice: So I went away
  chosen_spanish: Así que fui
  alternatives_spanish:
  - Entonces fui
  - Y fui
  lexicon: BDAG
  rationale: La secuencia causal/resultativa de οὖν se expresa con «Así que». Se omite «away» como elemento redundante en español, ya que el verbo simple comunica adecuadamente el desplazamiento.
- source_word: νιψάμενος
  english_pob_choice: washed
  chosen_spanish: me lavé
  alternatives_spanish:
  - me lavé a mí mismo
  - me limpié
  lexicon: BDAG
  rationale: El participio medio se vuelve natural en español con el reflexivo «me lavé», que conserva la referencia a la acción realizada sobre sí mismo.
- source_word: ἀνέβλεψα
  english_pob_choice: I received my sight
  chosen_spanish: recobré la vista
  alternatives_spanish:
  - volví a ver
  - recibí la vista
  - recobré la visión
  lexicon: BDAG
  rationale: En contexto de curación, ἀναβλέπω expresa la recuperación de la vista. «Recobré la vista» es idiomático en español y mantiene el sentido de restauración visual.
theological_decisions:
- issue: Caracterización de Jesús por el hablante
  english_pob_reading: The man called Jesus
  chosen_spanish_reading: El hombre llamado Jesús
  alternative_spanish_readings:
  - Jesús, el hombre llamado Jesús
  - Jesús, llamado Jesús
  rationale: 'Se preserva la tensión narrativa: el hombre sanado identifica a Jesús solo como «el hombre», sin añadir una confesión cristológica más alta que la que el texto presenta en este punto.'
  doctrine_reference: Mantener la tensión teológica narrativa sin resolverla anticipadamente.
translation_notes:
  revision_awareness: 'Se siguió de cerca el audit trail inglés: se mantuvieron las tres alternativas léxicas documentadas (πηλός, ἐπιχρίω, ἀναβλέπω) y la caracterización no confesional de Jesús. No se introdujeron cambios de sentido respecto al griego; las opciones elegidas priorizan español natural sin borrar la ambigüedad material de πηλός ni el matiz físico de ἐπιχρίω.'
  spanish_consistency_notes:
  - Se usó «Siloam» sin artículo porque el griego del versículo lo presenta así; si el contexto mayor en español ya hubiera introducido «estanque de Siloam», podría armonizarse en una nota, pero aquí se respetó la forma breve del verso.
  - Se evitó «ungió» para ἐπέχρισεν porque, aunque posible, podría añadir resonancias rituales no explícitas en este pasaje.
  - Se prefirió «recobré la vista» frente a «recibí la vista» por su mayor naturalidad en español, aunque ambas conservan el sentido de recuperación visual.
