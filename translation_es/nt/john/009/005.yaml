translation:
  language: es
  text: Cuando estoy en el mundo[a], soy la luz del mundo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Mientras estoy en el mundo»; el griego ὅταν puede traducirse «cuando», «siempre que» o, según el contexto, «mientras».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅταν
  english_pob_choice: Whenever
  chosen_spanish: Siempre que
  alternatives_spanish:
  - Cuando
  - Cada vez que
  lexicon: BDAG
  rationale: ὅταν introduce una cláusula temporal con matiz general/durativo. En español, «Siempre que» comunica bien ese valor no puntual sin forzar una iteración extraña; «Cuando» sería posible pero menos explícito sobre la generalidad, y «Cada vez que» suena más repetitivo de lo que pide el contexto.
- source_word: ἐν τῷ κόσμῳ
  english_pob_choice: in the world
  chosen_spanish: en el mundo
  alternatives_spanish:
  - entre el mundo
  - en el cosmos
  lexicon: BDAG
  rationale: La locución locativa se rinde de manera natural como «en el mundo». «Mundo» conserva el valor habitual joánico del orden humano creado y no requiere una paráfrasis.
- source_word: ὦ
  english_pob_choice: I am
  chosen_spanish: esté
  alternatives_spanish:
  - sea
  - esté presente
  lexicon: BDAG
  rationale: 'Aunque el griego usa subjuntivo, en la cláusula temporal el español pide un subjuntivo natural: «esté». Esto preserva la temporalidad de la frase sin introducir modalidad especulativa.'
- source_word: φῶς
  english_pob_choice: the light
  chosen_spanish: la luz
  alternatives_spanish:
  - luz
  lexicon: BDAG
  rationale: 'El predicado nominal en español suena mejor con artículo: «la luz». Se mantiene la identificación fuerte de Jesús sin añadir explicación ajena al texto.'
- source_word: εἰμι
  english_pob_choice: I am
  chosen_spanish: yo soy
  alternatives_spanish:
  - soy
  lexicon: BDAG
  rationale: «Yo soy» conserva con claridad la autodeclaración solemne del griego. El pronombre explícito ayuda a reproducir el énfasis discursivo sin exagerarlo.
- source_word: τοῦ κόσμου
  english_pob_choice: of the world
  chosen_spanish: del mundo
  alternatives_spanish:
  - para el mundo
  lexicon: BDAG
  rationale: El genitivo se expresa de forma directa como «del mundo», manteniendo la relación de esfera o pertenencia. «Para el mundo» cambiaría el vínculo semántico hacia beneficio y sería menos preciso.
theological_decisions:
- issue: Autodeclaración joánica de Jesús como luz
  english_pob_reading: I am the light of the world
  chosen_spanish_reading: yo soy la luz del mundo
  alternative_spanish_readings:
  - soy la luz del mundo
  - yo soy luz del mundo
  rationale: Se conserva la afirmación cristológica fuerte y la identificación definida de Jesús con la luz, sin añadir glosa doctrinal. La forma con artículo refleja mejor el sentido del predicado en contexto.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Valor temporal de ὅταν con subjuntivo
  english_pob_reading: Whenever I am in the world
  chosen_spanish_reading: Siempre que yo esté en el mundo
  alternative_spanish_readings:
  - Cuando yo esté en el mundo
  - Cada vez que yo esté en el mundo
  rationale: La elección mantiene la flexibilidad de ὅταν y evita fijarlo indebidamente a un solo matiz. «Siempre que» transmite bien el sentido temporal general que el audit trail inglés quiso preservar.
  doctrine_reference: Grammar/temporal clause handling
translation_notes:
  revision_awareness: El borrador anterior falló porque incluía la marca de nota [a] sin anclarla en el texto. Esta versión coloca [a] directamente después de «mundo» y mantiene una sola nota con un marcador único y usado exactamente una vez.
  spanish_consistency_notes:
  - Se mantiene «mundo» para κόσμος y «luz» para φῶς en coherencia con Juan.
  - Se usa el subjuntivo «esté» para reflejar la cláusula temporal con ὅταν + subjuntivo sin perder naturalidad en español.
  - La puntuación y el orden de palabras buscan un tono bíblico moderno, claro y publicable.
