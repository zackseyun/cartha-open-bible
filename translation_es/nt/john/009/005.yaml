revisions:
- from: Siempre que yo esté en el mundo[a], yo soy la luz del mundo.
  to: Cuando estoy en el mundo[a], soy la luz del mundo.
  rationale: Se ajusta la cláusula temporal para evitar la ambigüedad condicional de «siempre que» en español y para lograr una formulación más natural y fiel al uso joánico en contexto. También se elimina el pronombre explícito redundante para mejorar la fluidez sin perder énfasis teológico. La nota conserva las alternativas documentadas en el audit trail inglés.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:04:39Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja adecuadamente la estructura y el sentido básico de ὅταν ἐν τῷ κόσμῳ ὦ, φῶς εἰμι τοῦ κόσμου: cláusula temporal + autodeclaración joánica. «en el mundo» y «la luz del mundo» están bien alineados con el griego y con el audit trail inglés. Sin embargo, «Siempre que» en español suele sonar más condicional que temporal, y aquí introduce una ligera ambigüedad pragmática no presente en el original. Además, la repetición de «yo» antes de ambos verbos suena innecesariamente enfática en español.'
  spanish_quality_summary: El español es comprensible, pero puede mejorarse para sonar más natural y digno en registro bíblico contemporáneo. «Cuando estoy en el mundo» fluye mejor que «Siempre que yo esté en el mundo», evita una lectura condicional, y preserva el valor temporal general con apoyo de nota. «Soy la luz del mundo» mantiene bien la solemnidad sin el doble pronombre explícito, que en español resulta algo pesado.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «mundo», «luz» y «Jesús» implícito por contexto están bien. No intervienen términos sensibles como Yahvé, Mesías, Espíritu, esclavo, etc. La revisión propuesta mantiene la decisión teológica fuerte de «la luz del mundo».
  issues:
  - severity: medium
    issue: «Siempre que» puede leerse como condicional más que temporal
    rationale: Aunque puede usarse temporalmente, en español general «siempre que» con subjuntivo a menudo sugiere ‘con tal que’ o una condición. El griego ὅταν aquí es una cláusula temporal; «Cuando» evita esa ambigüedad y sigue siendo fiel, especialmente con una nota que preserve «mientras»/«siempre que» como alternativas.
  - severity: low
    issue: Doble uso de «yo» suena sobrecargado en español
    rationale: El griego expresa la primera persona en la flexión verbal; repetir «yo» dos veces no es necesario para conservar la fuerza de la autodeclaración. «Soy la luz del mundo» suena más natural y sigue siendo solemne.
  - severity: low
    issue: El subjuntivo «esté» es menos natural si se opta por «cuando» como temporal general
    rationale: Con una formulación española más directa y idiomática, «cuando estoy en el mundo» comunica bien el sentido presente y durativo señalado en el audit trail, sin introducir modalidad innecesaria.
  revised_spanish_text: Cuando estoy en el mundo[a], soy la luz del mundo.
  revised_footnotes:
  - marker: a
    text: O «Mientras estoy en el mundo»; el griego ὅταν puede traducirse «cuando», «siempre que» o, según el contexto, «mientras».
    reason: lexical_alternative
  revision_rationale: Se ajusta la cláusula temporal para evitar la ambigüedad condicional de «siempre que» en español y para lograr una formulación más natural y fiel al uso joánico en contexto. También se elimina el pronombre explícito redundante para mejorar la fluidez sin perder énfasis teológico. La nota conserva las alternativas documentadas en el audit trail inglés.
