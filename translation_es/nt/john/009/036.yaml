translation:
  language: es
  text: 'Él respondió y dijo: «¿Y quién es él, Señor[a], para que yo crea en él?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «señor». El griego κύριε puede ser una forma respetuosa de tratamiento, además de «Señor».
    reason: alternative_reading
lexical_decisions:
- source_word: ἀπεκρίθη
  english_pob_choice: He answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió y dijo
  lexicon: BDAG
  rationale: El verbo griego es una fórmula narrativa de respuesta. «Respondió» reproduce con naturalidad la acción de contestar en español y mantiene el valor discursivo del original sin recargar la frase.
- source_word: ἐκεῖνος
  english_pob_choice: He
  chosen_spanish: Él
  alternatives_spanish:
  - ese hombre
  - aquel
  - esa persona
  lexicon: BDAG
  rationale: El demostrativo remite al hombre previamente identificado en el contexto. En español, el pronombre personal basta y conserva la referencia narrativa sin introducir una marcación innecesaria.
- source_word: καὶ εἶπεν
  english_pob_choice: and said
  chosen_spanish: y dijo
  alternatives_spanish:
  - y habló
  - —
  lexicon: BDAG
  rationale: Se conserva la doble fórmula narrativa del griego, que enlaza la respuesta con el dicho siguiente. «Y dijo» es la equivalencia directa y idiomática.
- source_word: Καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - —
  lexicon: BDAG
  rationale: La conjunción se mantiene porque aparece en el griego y aporta continuidad discursiva. En español también puede funcionar como apertura enfática de la pregunta.
- source_word: τίς ἐστιν
  english_pob_choice: who is he
  chosen_spanish: ¿quién es?
  alternatives_spanish:
  - ¿quién es él?
  - ¿quién es ese?
  lexicon: BDAG
  rationale: El griego pregunta por la identidad de la persona. En español, la omisión del pronombre sujeto después de «es» es natural y no altera el sentido.
- source_word: κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - señor
  - maestro
  lexicon: BDAG
  rationale: Se conserva la decisión de la POB inglesa de mantener la lectura reverencial principal, aquí en la forma española estándar «Señor». Aunque el vocativo también puede ser respetuoso sin plena confesión cristológica, la redacción principal preserva esa tensión.
- source_word: ἵνα πιστεύσω
  english_pob_choice: that I may believe
  chosen_spanish: para que yo crea
  alternatives_spanish:
  - para creer
  - a fin de que yo crea
  lexicon: BDAG
  rationale: ἵνα con subjuntivo expresa finalidad. «Para que yo crea» transmite claramente el propósito en español; se conserva el subjuntivo y el énfasis personal del sujeto.
- source_word: πιστεύσω εἰς αὐτόν
  english_pob_choice: believe in him
  chosen_spanish: crea en él
  alternatives_spanish:
  - crea en él y confíe en él
  - ponga mi fe en él
  lexicon: BDAG
  rationale: La construcción πιστεύω εἰς se traduce de manera habitual como «creer en». «Crea en él» reproduce el valor relacional de la frase sin sobreexplicar ni sustituir el término por una paráfrasis más interpretativa.
theological_decisions:
- issue: 'Valor de κύριε: reverencia plena o trato respetuoso'
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - señor
  - maestro
  rationale: La POB inglesa conserva «Lord» en el texto principal y nota la posibilidad de «sir». En español, «Señor» mantiene la ambigüedad reverencial y permite que el contexto posterior determine si el vocativo es mera cortesía o un reconocimiento más profundo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — κύριος → Lord; preserve theological tension rather than resolve it'
- issue: Finalidad de ἵνα con subjuntivo
  english_pob_reading: that I may believe
  chosen_spanish_reading: para que yo crea
  alternative_spanish_readings:
  - para creer
  - a fin de que yo crea
  rationale: Se conserva el matiz de propósito sin convertirlo en una causal o en una simple infinitiva, porque el griego presenta finalidad explícita. El español mantiene así el impulso de la petición del hombre.
  doctrine_reference: BDAG / sintaxis de ἵνα + subjuntivo
translation_notes:
  revision_awareness: El texto español sigue de cerca el griego y la auditoría inglesa, preservando la doble fórmula narrativa («respondió y dijo») y la ambigüedad reverencial de κύριε. No se introdujeron cambios textuales respecto del último pase auditado; la versión inglesa fue marcada como sin cambios y de alta concordancia, por lo que la redacción española mantiene esa estabilidad.
  spanish_consistency_notes:
  - Se usa «Señor» para κύριος según el valor por defecto del proyecto, con nota alternativa para «señor».
  - Se mantiene el subjuntivo en «para que yo crea» para reflejar ἵνα + subjuntivo.
  - La puntuación española abre la cita con comillas angulares y conserva el vocativo separado por coma.
  - Se evita añadir explicaciones teológicas no presentes en el versículo.
