translation:
  language: es
  text: 'Entonces los fariseos también le preguntaban otra vez cómo había recobrado la vista[b]. Él les respondió: «Me puso lodo[a] sobre los ojos, y me lavé, y veo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “arcilla” en vez de “lodo”.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, “cómo vio de nuevo” o “cómo recobró la vista”.
    reason: lexical_alternative
lexical_decisions:
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  - nuevamente
  lexicon: BDAG
  rationale: Expresa la repetición de la pregunta con naturalidad en español y conserva el valor de reiteración del adverbio.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Entonces
  alternatives_spanish:
  - Así que
  - Por tanto
  lexicon: BDAG
  rationale: En narrativa, 'Entonces' comunica la continuación del episodio sin cargar más fuerza inferencial de la que exige el contexto.
- source_word: ἠρώτων
  english_pob_choice: asked
  chosen_spanish: le preguntaban
  alternatives_spanish:
  - le preguntaron
  - le seguían preguntando
  lexicon: BDAG
  rationale: El imperfecto sugiere acción repetida o sostenida; 'le preguntaban' mantiene ese matiz mejor que un pasado puntual.
- source_word: πῶς ἀνέβλεψεν
  english_pob_choice: how he had received his sight
  chosen_spanish: cómo había recobrado la vista
  alternatives_spanish:
  - cómo había recibido la vista
  - cómo había vuelto a ver
  lexicon: BDAG
  rationale: ἀναβλέπω en este contexto es 'recobrar la vista' / 'volver a ver', no simplemente 'mirar hacia arriba'. 'Recobrado la vista' conserva la idea de restauración visual.
- source_word: Πηλὸν
  english_pob_choice: mud
  chosen_spanish: lodo
  alternatives_spanish:
  - barro
  - barro de arcilla
  lexicon: BDAG
  rationale: '''Lodo'' comunica bien en español un material terroso y húmedo, y permite mantener la alternativa léxica del inglés (''mud'' / ''clay'') sin decidir por una terminología técnica excesiva.'
- source_word: ἐπέθηκέν μου ἐπὶ τοὺς ὀφθαλμούς
  english_pob_choice: He put mud on my eyes
  chosen_spanish: me puso lodo sobre los ojos
  alternatives_spanish:
  - me colocó lodo sobre los ojos
  - puso lodo en mis ojos
  lexicon: BDAG
  rationale: La construcción griega de colocar algo sobre los ojos se expresa de manera directa con 'me puso ... sobre los ojos', que conserva el sentido físico del gesto.
- source_word: ἐνιψάμην
  english_pob_choice: I washed
  chosen_spanish: me lavé
  alternatives_spanish:
  - lavé mi rostro
  - me limpié
  lexicon: BDAG
  rationale: El aoristo medio admite una traducción reflexiva natural; 'me lavé' preserva la acción del sujeto sobre sí mismo sin sobreexplicarla.
- source_word: βλέπω
  english_pob_choice: I see
  chosen_spanish: veo
  alternatives_spanish:
  - puedo ver
  - ya veo
  lexicon: BDAG
  rationale: El presente expresa el estado actual con inmediatez; 'veo' conserva la vivacidad del testimonio del hombre.
translation_notes:
  revision_awareness: El texto sigue de cerca el griego SBLGNT y el expediente auditado en inglés. Se mantuvo la secuencia narrativa, el imperfecto de ἠρώτων y el presente final de βλέπω. Se optó por un español natural sin perder la tensión léxica entre πηλός (‘lodo’ / ‘arcilla’) y ἀναβλέπω (‘recobrar la vista’ / ‘ver de nuevo’).
  spanish_consistency_notes:
  - Se preserva el tratamiento reverente pero directo de la narración con comillas latinas y puntuación española.
  - '''Fariseos'' se mantiene sin adaptación adicional por ser un nombre grupal asentado.'
  - '''Lodo'' funciona como equivalente general de πηλός y deja abierta la alternativa ''arcilla'' en nota.'
  - '''Me lavé'' conserva el valor medio de ἐνιψάμην sin añadir un sujeto explícito.'
  - '''Veo'' mantiene el presente de resultado y la vivacidad del cierre.'
