translation:
  language: es
  text: 'Y le dijo: «Ve, lávate en el estanque de Siloé» (que se traduce «Enviado»[a]). Entonces él fue, se lavó y regresó viendo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que significa “Enviado”».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὕπαγε
  english_pob_choice: Go
  chosen_spanish: Ve
  alternatives_spanish:
  - Anda
  - Vete
  lexicon: BDAG
  rationale: Es un imperativo breve de movimiento; «Ve» conserva la concisión y el tono directo del griego sin añadir matices inexistentes.
- source_word: νίψαι / ἐνίψατο
  english_pob_choice: wash / washed
  chosen_spanish: lávate / se lavó
  alternatives_spanish:
  - lávate a ti mismo / se lavó a sí mismo
  - enjuágate / se enjuagó
  lexicon: BDAG
  rationale: νίπτω suele indicar lavado de una parte del cuerpo o lavado puntual. En español, el reflexivo «lávate» expresa bien la acción ordenada; en la narración, «se lavó» preserva el sentido sin sobrecargar el texto.
- source_word: εἰς τὴν κολυμβήθραν
  english_pob_choice: in the pool
  chosen_spanish: en la alberca
  alternatives_spanish:
  - en el estanque
  - en la piscina
  lexicon: BDAG
  rationale: κολυμβήθρα designa una piscina o depósito de agua. «Alberca» es un término claro y sobrio en español latinoamericano y conserva la idea de un reservorio para el lavado. Se evita «piscina» por su asociación más moderna y recreativa.
- source_word: Σιλωάμ
  english_pob_choice: Siloam
  chosen_spanish: Siloé
  alternatives_spanish:
  - Siloam
  - Silóam
  lexicon: BDAG
  rationale: En español bíblico, «Siloé» es la forma más natural y reconocible del topónimo. Se mantiene la transliteración tradicional en español, ajustada a la fonética usual.
- source_word: ὃ ἑρμηνεύεται Ἀπεσταλμένος
  english_pob_choice: which is translated “Sent”
  chosen_spanish: 'que se traduce: «Enviado»'
  alternatives_spanish:
  - 'que significa: «Enviado»'
  - 'que se interpreta: «Enviado»'
  lexicon: BDAG
  rationale: ἑρμηνεύεται introduce una glosa explicativa; «se traduce» mantiene ese carácter. «Enviado» reproduce el participio pasivo Ἀπεσταλμένος de manera natural en español y conserva la relación con el sentido nominal del término.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Entonces
  alternatives_spanish:
  - Así que
  - Por tanto
  lexicon: BDAG
  rationale: Marca consecuencia narrativa. «Entonces» fluye bien en español y preserva la secuencia del relato.
- source_word: ἦλθεν βλέπων
  english_pob_choice: came back seeing
  chosen_spanish: volvió viendo
  alternatives_spanish:
  - regresó viendo
  - volvió con la vista restituida
  - volvió pudiendo ver
  lexicon: BDAG
  rationale: El participio βλέπων expresa el estado resultante al regresar. «Volvió viendo» conserva la vivacidad del griego sin explicitar más de lo que el texto dice. Se evita añadir «con la vista restituida» porque interpreta el resultado de forma más amplia que la frase griega.
theological_decisions:
- issue: Conservar la glosa explicativa sobre Siloé sin cargarla de simbolismo adicional
  english_pob_reading: Include the parenthetical explanation 'which is translated “Sent”' in the main text as part of the narrative.
  chosen_spanish_reading: 'Mantener la explicación parentética como parte del relato: «que se traduce: “Enviado”».'
  alternative_spanish_readings:
  - '«que significa: “Enviado”»'
  - omitir la glosa y dejar solo el topónimo
  rationale: El griego incluye la aclaración explícita, así que debe permanecer en el texto principal. «Se traduce» conserva el carácter de glosa lingüística sin transformar la nota en una interpretación teológica que el versículo no formula directamente.
  doctrine_reference: Original-language primacy; preserve textual tension rather than over-interpreting Johannine symbolism.
translation_notes:
  revision_awareness: 'Coincide con el estado más reciente del paquete: no se registran revisiones aplicadas y la última pasada marcó ''unchanged''. La redacción española sigue de cerca el texto griego y la solución auditada en inglés, manteniendo la glosa explicativa sin expansión interpretativa.'
  spanish_consistency_notes:
  - Se mantiene un registro bíblico claro y contemporáneo, evitando calcos duros.
  - «Yahvé» no aplica aquí; no hay nombres divinos en el versículo.
  - 'Se conserva el título/topónimo de forma natural en español: «Siloé».'
  - La fórmula narrativo-consecutiva «Entonces» reproduce adecuadamente οὖν.
  - El participio final se vierte con vivacidad en español sin añadir contenido ajeno al griego.
