revisions:
- from: 'Y le dijo: «Ve, lávate en la alberca de Siloé[a]» (que se traduce: «Enviado»). Entonces fue, se lavó y volvió viendo.'
  to: 'Y le dijo: «Ve, lávate en el estanque de Siloé» (que se traduce «Enviado»[a]). Entonces él fue, se lavó y regresó viendo.'
  rationale: Se reemplaza «alberca» por «estanque» para lograr una opción más panhispánica y bíblicamente natural; se ajusta «volvió viendo» a «regresó viendo» para mejorar la fluidez sin perder la fuerza participial de βλέπων; y se mueve la nota al lugar exacto de la variante, la glosa «que se traduce “Enviado”».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:04:06Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: mandato de ir y lavarse, glosa explicativa sobre Siloé, consecuencia narrativa y regreso con vista. Sin embargo, «alberca» no es la opción más ampliamente neutra para κολυμβήθρα en una Biblia panhispánica, y «volvió viendo» suena poco natural en español aunque intenta conservar el participio βλέπων.'
  spanish_quality_summary: El texto es claro, pero necesita un ajuste de registro y naturalidad para español ampliamente eclesial. «Estanque» es más panhispánico y bíblico que «alberca». «Volvió viendo» es comprensible pero duro; «regresó viendo» conserva mejor la vivacidad participial con mejor fluidez. También conviene anclar la nota al paréntesis/glosa, no al topónimo, porque la variante afecta a «que se traduce / significa».
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. «Siloé» es una forma española reconocible y adecuada. «Enviado» preserva correctamente Ἀπεσταλμένος. La decisión principal a corregir es estilística-lexical: κολυμβήθρα se representa mejor como «estanque» en este contexto.'
  issues:
  - severity: medium
    issue: «alberca» es regional y menos panhispánica para κολυμβήθρα
    rationale: Aunque puede entenderse, en una traducción neutral latinoamericana y ampliamente eclesial «estanque» es más natural, reconocible y menos marcado regionalmente para el estanque de Siloé.
  - severity: medium
    issue: «volvió viendo» suena forzado en español
    rationale: Intenta calcar el participio βλέπων, pero produce una construcción poco idiomática. «Regresó viendo» o «volvió con vista» serían más naturales; la primera preserva mejor la forma participial sin sobreinterpretar.
  - severity: low
    issue: La nota [a] está anclada a «Siloé» aunque la alternativa corresponde a la glosa explicativa
    rationale: 'La variante «que significa: “Enviado”» no modifica el topónimo en sí, sino la formulación de la explicación parentética; el anclaje debe ir allí para mayor precisión editorial.'
  revised_spanish_text: 'Y le dijo: «Ve, lávate en el estanque de Siloé» (que se traduce «Enviado»[a]). Entonces él fue, se lavó y regresó viendo.'
  revised_footnotes:
  - marker: a
    text: O «que significa “Enviado”».
    reason: lexical_alternative
  revision_rationale: Se reemplaza «alberca» por «estanque» para lograr una opción más panhispánica y bíblicamente natural; se ajusta «volvió viendo» a «regresó viendo» para mejorar la fluidez sin perder la fuerza participial de βλέπων; y se mueve la nota al lugar exacto de la variante, la glosa «que se traduce “Enviado”».
