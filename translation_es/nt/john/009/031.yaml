translation:
  language: es
  text: Sabemos que Dios no escucha a los pecadores; pero si alguien es temeroso de Dios[a] y hace su voluntad, a este lo escucha.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «adorador de Dios».
    reason: lexical_alternative
lexical_decisions:
- source_word: οἴδαμεν
  english_pob_choice: We know
  chosen_spanish: Sabemos
  alternatives_spanish:
  - Hemos conocido
  - Estamos conscientes
  lexicon: οἶδα
  rationale: El perfecto de οἶδα tiene valor presente en koiné; en español, «sabemos» expresa con naturalidad ese conocimiento compartido sin introducir una matización temporal que el griego no exige.
- source_word: ἁμαρτωλῶν
  english_pob_choice: sinners
  chosen_spanish: pecadores
  alternatives_spanish:
  - personas pecadoras
  - los pecadores
  lexicon: ἁμαρτωλός
  rationale: El genitivo plural designa la clase de personas en vista. «Pecadores» conserva la fuerza moral-religiosa y sigue de cerca la formulación breve del griego.
- source_word: ἀκούει
  english_pob_choice: listen to
  chosen_spanish: escucha
  alternatives_spanish:
  - oye
  - atiende
  lexicon: ἀκούω
  rationale: Aquí ἀκούω con objeto personal implica oír favorablemente o prestar atención. En español, «escucha» comunica esa relación sin añadir la idea específica de «responder».
- source_word: θεοσεβὴς
  english_pob_choice: God-fearing
  chosen_spanish: temeroso de Dios
  alternatives_spanish:
  - piadoso
  - reverente para con Dios
  - adorador de Dios
  lexicon: θεοσεβής
  rationale: θεοσεβής describe a quien reverencia a Dios. «Temeroso de Dios» es una equivalencia idiomática clara en español y mantiene la referencia explícita a Dios; «adorador de Dios» sería posible, pero puede estrechar demasiado el sentido reverencial.
- source_word: τὸ θέλημα αὐτοῦ ποιῇ
  english_pob_choice: does his will
  chosen_spanish: hace su voluntad
  alternatives_spanish:
  - cumple su voluntad
  - practica su voluntad
  lexicon: ποιέω τὸ θέλημα
  rationale: La expresión es un giro idiomático estándar. «Hace su voluntad» es natural en español y permanece cercano al griego sin sobreinterpretar.
- source_word: τούτου ἀκούει
  english_pob_choice: he listens to him
  chosen_spanish: a éste lo escucha
  alternatives_spanish:
  - lo escucha
  - escucha a éste
  lexicon: τούτου ἀκούει
  rationale: τούτου retoma enfáticamente a la persona temerosa de Dios. «A éste lo escucha» mantiene la referencia enfática y la correspondencia con el primer ἀκούει, preservando la relación personal del enunciado.
- source_word: ἀλλ’ ἐάν τις
  english_pob_choice: but if anyone
  chosen_spanish: pero si alguien
  alternatives_spanish:
  - mas si alguien
  - pero si cualquiera
  lexicon: ἐάν τις
  rationale: La cláusula introduce contraste y condición indefinida. «Pero si alguien» es fluido en español y conserva el singular indefinido.
theological_decisions:
- issue: Alcance de «Dios no escucha a los pecadores»
  english_pob_reading: Render the claim as stated, without softening or systematizing it beyond the speaker's assertion in context.
  chosen_spanish_reading: Traducir la afirmación tal como está, sin suavizarla ni convertirla en una formulación doctrinal más amplia.
  alternative_spanish_readings:
  - Dios no escucha las oraciones de los pecadores
  - Dios no aprueba a los pecadores
  rationale: El griego dice simplemente que Dios no «escucha» a los pecadores, en contraste con escuchar al temeroso de Dios que hace su voluntad. La traducción debe conservar el peso de la afirmación sin importar una explicación doctrinal ajena al enunciado inmediato.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
- issue: Sentido de θεοσεβής
  english_pob_reading: God-fearing
  chosen_spanish_reading: temeroso de Dios
  alternative_spanish_readings:
  - adorador de Dios
  - devoto de Dios
  rationale: La opción principal conserva el matiz reverencial y evita restringir el término solo a la práctica cultual. La alternativa «adorador de Dios» se mantiene como posibilidad semántica, pero en español puede sonar más limitada que el adjetivo griego.
  doctrine_reference: Primacía del idioma original con español claro y digno.
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el expediente más reciente; se mantiene el pasaje conforme al consenso alto del control cruzado y a la lectura del audit trail inglés.
  spanish_consistency_notes:
  - Se mantuvo Yahvé para el nombre divino, conforme al criterio del proyecto.
  - Se usó «escucha» de forma consistente para ἀκούω, preservando la relación personal y no solo la percepción auditiva.
  - No se introdujeron glosas doctrinales que atenúen la fuerza de la afirmación sobre los pecadores.
  - La nota conserva la alternativa lexical documentada para θεοσεβής sin desplazar la lectura principal.
