  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Dios» corresponde a θεός; no aparecen términos sensibles como Yahvé, Mesías, Espíritu o δοῦλος. La decisión de mantener «Da gloria a Dios» en el texto principal está alineada con la rationale documentada.
