translation:
  language: es
  text: 'Entonces llamaron por segunda vez al hombre que había sido ciego y le dijeron: «Da gloria a Dios[a]; nosotros sabemos que este hombre es un pecador».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O posiblemente una adjuración idiomática: «Da gloria a Dios», es decir, «Di la verdad ante Dios» o «Confiesa abiertamente ante Dios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐφώνησαν
  english_pob_choice: they called
  chosen_spanish: llamaron
  alternatives_spanish:
  - lo llamaron
  - lo convocaron
  lexicon: BDAG
  rationale: φωνέω aquí introduce que los dirigentes vuelven a hacer venir al hombre. En español, «llamaron» conserva la acción narrativa de convocarlo sin sobrecargarla con un matiz administrativo que no está explícito en el verbo.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Entonces
  alternatives_spanish:
  - Así que
  - Por tanto
  lexicon: BDAG
  rationale: οὖν marca continuidad narrativa. «Entonces» suena natural en español y preserva la progresión del relato.
- source_word: τὸν ἄνθρωπον
  english_pob_choice: the man
  chosen_spanish: al hombre
  alternatives_spanish:
  - al varón
  - a la persona
  lexicon: BDAG
  rationale: ἄνθρωπος señala aquí a un individuo masculino concreto. En español, el acusativo con «al hombre» es natural y preciso.
- source_word: ἐκ δευτέρου
  english_pob_choice: a second time
  chosen_spanish: por segunda vez
  alternatives_spanish:
  - una segunda vez
  - de nuevo
  lexicon: BDAG
  rationale: La expresión idiomática indica repetición. «Por segunda vez» conserva con claridad el valor temporal del giro griego.
- source_word: ὃς ἦν τυφλός
  english_pob_choice: who had been blind
  chosen_spanish: que había sido ciego
  alternatives_spanish:
  - que era ciego
  - que había estado ciego
  lexicon: BDAG
  rationale: El imperfecto griego describe la condición anterior del hombre. En español, «había sido ciego» comunica bien ese estado pasado; «ciego» se mantiene como equivalente directo de τυφλός.
- source_word: Δὸς δόξαν τῷ θεῷ
  english_pob_choice: Give glory to God
  chosen_spanish: Da gloria a Dios
  alternatives_spanish:
  - Glorifica a Dios
  - Dale la gloria a Dios
  lexicon: BDAG
  rationale: Se preserva la formulación literal de la frase. «Da gloria a Dios» mantiene la fuerza doxológica y deja abierta la posible carga idiomática del mandato.
- source_word: ἡμεῖς οἴδαμεν
  english_pob_choice: we know
  chosen_spanish: nosotros sabemos
  alternatives_spanish:
  - sabemos
  - estamos seguros
  lexicon: BDAG
  rationale: El pronombre enfático ἡμεῖς se refleja con «nosotros». «Sabemos» conserva el valor de certeza afirmada por los hablantes.
- source_word: οὗτος ὁ ἄνθρωπος
  english_pob_choice: this man
  chosen_spanish: este hombre
  alternatives_spanish:
  - este sujeto
  - este individuo
  lexicon: BDAG
  rationale: La construcción demostrativa se traduce de manera directa. «Este hombre» es natural en español y no añade desprecio que el griego no exige por sí mismo.
- source_word: ἁμαρτωλός
  english_pob_choice: a sinner
  chosen_spanish: un pecador
  alternatives_spanish:
  - un hombre pecador
  - pecador
  lexicon: BDAG
  rationale: El adjetivo sustantivado funciona como acusación personal. «Un pecador» reproduce ese uso con la fuerza nominal que requiere el contexto.
theological_decisions:
- issue: Sentido idiomático de Δὸς δόξαν τῷ θεῷ
  english_pob_reading: Retain the literal wording 'Give glory to God' in the main text, with a footnote noting the possible idiomatic force of solemn truth-telling or confession.
  chosen_spanish_reading: Mantener «Da gloria a Dios» en el texto principal, con nota sobre el posible sentido idiomático de decir la verdad o confesar ante Dios.
  alternative_spanish_readings:
  - Di la verdad ante Dios
  - Confiesa abiertamente ante Dios
  - Glorifica a Dios
  rationale: La frase griega es literalmente doxológica, pero en este contexto puede funcionar como una adjuración solemne. La traducción principal conserva la literalidad y la nota recoge la fuerza idiomática sin resolverla de manera excesiva.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: No se aplicaron revisiones posteriores; el estado más reciente indica que el texto se mantiene sin cambios y con acuerdo alto en la revisión cruzada.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para τῷ θεῷ, conforme al criterio proyectual.
  - Se conservó «pecador» como equivalente sustantivado de ἁμαρτωλός, sin suavizar la acusación.
  - La nota al pie preserva la ambigüedad idiomática de «Da gloria a Dios» en lugar de resolverla en el texto principal.
  - Se prefirió una sintaxis española directa y bíblica, sin calcos innecesarios.
