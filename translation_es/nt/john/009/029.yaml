translation:
  language: es
  text: Nosotros sabemos que Dios ha hablado a Moisés[a], pero de este hombre no sabemos de dónde es.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de dónde viene». En Juan, las preguntas sobre el origen de Jesús pueden tener tanto sentido ordinario como un significado teológico más profundo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡμεῖς
  english_pob_choice: We
  chosen_spanish: Nosotros
  alternatives_spanish:
  - Nosotros mismos
  - Nosotros
  lexicon: BDAG
  rationale: El pronombre explícito aporta énfasis o contraste. En español, 'Nosotros' conserva ese relieve con naturalidad; 'nosotros mismos' sonaría más pesado y añadiría un matiz reflexivo no necesario.
- source_word: οἴδαμεν
  english_pob_choice: know
  chosen_spanish: sabemos
  alternatives_spanish:
  - conocemos
  - estamos seguros
  lexicon: BDAG
  rationale: οἶδα expresa conocimiento o certeza. 'Sabemos' reproduce de forma directa y natural esa afirmación, y permite mantener la repetición del verbo en la segunda mitad del verso.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - —
  lexicon: BDAG
  rationale: Conjunción de contenido estándar en español para introducir la afirmación conocida.
- source_word: Μωϋσεῖ
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moisés
  lexicon: BDAG
  rationale: Nombre propio bíblico en forma española estándar.
- source_word: λελάληκεν
  english_pob_choice: has spoken
  chosen_spanish: ha hablado
  alternatives_spanish:
  - habló
  - ha dicho
  lexicon: BDAG
  rationale: El perfecto griego presenta la acción como un hecho establecido con vigencia. 'Ha hablado' conserva ese valor mejor que un simple pretérito; 'ha dicho' sería demasiado general.
- source_word: ὁ θεός
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios
  lexicon: BDAG
  rationale: La referencia es a Dios; en español no hace falta artículo para sostener la naturalidad de la frase.
- source_word: τοῦτον
  english_pob_choice: this man
  chosen_spanish: este hombre
  alternatives_spanish:
  - este
  - este hombre
  lexicon: BDAG
  rationale: El demostrativo es despectivo o distanciador en el contexto. 'Este hombre' preserva ese tono sin volverlo demasiado coloquial.
- source_word: δὲ
  english_pob_choice: but as for
  chosen_spanish: pero
  alternatives_spanish:
  - pero en cuanto a
  - mas
  lexicon: BDAG
  rationale: δέ marca contraste; en español, 'pero' comunica el giro con claridad. La topicalidad queda suficientemente sugerida por el cambio de sujeto y la estructura de la frase.
- source_word: οὐκ οἴδαμεν
  english_pob_choice: we do not know
  chosen_spanish: no sabemos
  alternatives_spanish:
  - no conocemos
  - no estamos seguros
  lexicon: BDAG
  rationale: Repetición de οἴδαμεν en negación. 'No sabemos' mantiene la correspondencia léxica y el registro sobrio del texto.
- source_word: πόθεν ἐστίν
  english_pob_choice: where he is from
  chosen_spanish: de dónde es
  alternatives_spanish:
  - de dónde viene
  - cuál es su origen
  lexicon: BDAG
  rationale: πόθεν pregunta por procedencia u origen. 'De dónde es' es la forma más idiomática en español y conserva la ambigüedad entre procedencia geográfica y origen más profundo.
theological_decisions:
- issue: El alcance de la pregunta sobre el origen de Jesús
  english_pob_reading: Render broadly as 'where he is from' without resolving whether the speakers mean merely geographical origin or deeper divine authorization.
  chosen_spanish_reading: Traducir con 'de dónde es' sin aclarar si se trata solo de procedencia geográfica o de un trasfondo teológico más hondo.
  alternative_spanish_readings:
  - de dónde viene
  - cuál es su origen
  rationale: En Juan, las preguntas sobre el origen de Jesús suelen tener carga teológica además de literal. La traducción conserva esa tensión narrativa sin explicarla ni reducirla.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el cotejo reporta alto acuerdo y ninguna observación abierta, por lo que la redacción española sigue de cerca la decisión inglesa auditada.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para θεός y 'Moisés' para Μωϋσεῖ.
  - Se conserva 'sabemos' en ambas apariciones de οἴδαμεν para reflejar la repetición del original.
  - La pregunta final se vierte de modo idiomático ('de dónde es') sin perder la ambigüedad de πόθεν ἐστίν.
  - Se evita 'SEÑOR' para θεός y no se sustituye 'este hombre' por una formulación más interpretativa.
