    text: O 'un pecador'. El griego dice 'un hombre pecador', usando un adjetivo que modifica a 'hombre'.
    reason: lexical_alternative
  - marker: b
    text: Juan usa a menudo 'señales' para las obras de Jesús, a fin de subrayar su significado revelador; alternativamente, 'señales milagrosas' hace más explícita esa implicación.
    reason: lexical_alternative
  revision_rationale: 'Se ajusta ''viene de parte de Dios'' a ''es de Dios'' para reflejar más de cerca παρὰ θεοῦ sin añadir un verbo interpretativo. Se reubican las notas al lugar correspondiente: [a] sobre ''pecador'' y [b] sobre ''señales''. Se mantiene el resto del texto porque es fiel, claro y natural en español.'
