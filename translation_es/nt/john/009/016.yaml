revisions:
- from: 'Entonces algunos de los fariseos decían[a]: “Este hombre no viene de parte de Dios, porque no guarda el sábado.” Pero otros decían[b]: “¿Cómo puede un hombre pecador hacer tales señales?” Y había una división entre ellos.'
  to: 'Entonces algunos de los fariseos decían: “Este hombre no es de Dios, porque no guarda el sábado.” Pero otros decían: “¿Cómo puede un hombre pecador[a] hacer tales señales[b]?” Y había una división entre ellos.'
  rationale: 'Se ajusta ''viene de parte de Dios'' a ''es de Dios'' para reflejar más de cerca παρὰ θεοῦ sin añadir un verbo interpretativo. Se reubican las notas al lugar correspondiente: [a] sobre ''pecador'' y [b] sobre ''señales''. Se mantiene el resto del texto porque es fiel, claro y natural en español.'
