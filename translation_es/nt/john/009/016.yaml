review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura general del griego: el imperfecto iterativo (''decían''), el contraste entre grupos, la pregunta retórica, y ''señales'' para σημεῖα. Sin embargo, ''no viene de parte de Dios'' se aparta innecesariamente de παρὰ θεοῦ (''de Dios'' / ''de parte de Dios'' en sentido de procedencia) al introducir el verbo ''viene'', que no está en el texto y acerca la frase a una formulación más interpretativa. Además, la nota [a] está mal anclada: corresponde a ''pecador''/''hombre pecador'', no a ''decían''.'
  spanish_quality_summary: El español es claro y natural, de registro bíblico moderno y legible. 'Guarda el sábado', 'tales señales' y 'había una división entre ellos' funcionan bien. La principal mejora de calidad es hacer más directo y fiel 'Este hombre no es de Dios', que suena idiomático y evita expansión innecesaria. También conviene mover la nota [a] al lugar semánticamente pertinente.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto: θεοῦ -> ''Dios'', σημεῖα -> ''señales'', ἁμαρτωλός -> ''pecador''. La decisión joánica de conservar ''señales'' está bien alineada. La única desalineación menor con la auditoría inglesa es expandir ''from God'' a ''viene de parte de Dios'' en vez de una formulación más cercana como ''es de Dios''.'
  issues:
  - severity: medium
    issue: '''viene de parte de Dios'' añade un verbo no explícito'
    rationale: παρὰ θεοῦ expresa procedencia/origen divino; el griego dice 'no es ... de Dios', no 'no viene ...'. 'Este hombre no es de Dios' preserva mejor la forma y la tensión teológica sin sobreinterpretación.
  - severity: medium
    issue: La nota [a] está anclada en 'decían' en vez de en 'pecador'
    rationale: La nota explica ἁμαρτωλός como adjetivo modificando 'hombre'; por lo tanto, debe aparecer junto a 'pecador' o 'hombre pecador', no junto al verbo 'decían'.
  - severity: low
    issue: La nota [a] dice 'literalmente' de manera algo inexacta
    rationale: No es que el texto griego diga una frase española literal exacta, sino que usa un adjetivo con 'hombre'. Conviene formularlo como explicación gramatical más precisa.
  revised_spanish_text: 'Entonces algunos de los fariseos decían: “Este hombre no es de Dios, porque no guarda el sábado.” Pero otros decían: “¿Cómo puede un hombre pecador[a] hacer tales señales[b]?” Y había una división entre ellos.'
  revised_footnotes:
