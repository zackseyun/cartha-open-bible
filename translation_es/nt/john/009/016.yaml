base_translation:
  language: en
  yaml_path: translation/nt/john/009/016.yaml
  text: So some of the Pharisees were saying[a], “This man is not from God, because he does not keep the Sabbath.” But others were saying[b], “How can a sinful man do such signs?” And there was a division among them.
  footnotes:
  - marker: a
    text: Or 'a sinner.' The Greek reads 'a sinful man,' using an adjective modifying 'man.'
    reason: lexical_alternative
  - marker: b
    text: John often uses 'signs' for Jesus' works to emphasize their revelatory meaning; alternatively, 'miraculous signs' makes that implication more explicit.
    reason: lexical_alternative
