translation:
  language: es
  text: 'Entonces algunos de los fariseos decían: “Este hombre no es de Dios, porque no guarda el sábado.” Pero otros decían: “¿Cómo puede un hombre pecador[a] hacer tales señales[b]?” Y había una división entre ellos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'un pecador'. El griego dice 'un hombre pecador', usando un adjetivo que modifica a 'hombre'.
    reason: lexical_alternative
  - marker: b
    text: Juan usa a menudo 'señales' para las obras de Jesús, a fin de subrayar su significado revelador; alternativamente, 'señales milagrosas' hace más explícita esa implicación.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγον ... τινές
  english_pob_choice: some ... were saying
  chosen_spanish: algunos ... decían
  alternatives_spanish:
  - ciertos ... decían
  - algunos ... estaban diciendo
  lexicon: BDAG
  rationale: El imperfecto griego expresa una խոսta en curso o repetida; en español, 'decían' conserva bien ese valor sin sonar forzado. 'Algunos' reproduce naturalmente τινές.
- source_word: ἐκ τῶν Φαρισαίων
  english_pob_choice: of the Pharisees
  chosen_spanish: de los fariseos
  alternatives_spanish:
  - entre los fariseos
  - de entre los fariseos
  lexicon: BDAG
  rationale: La frase identifica el grupo del que provenían esos hablantes. En español, 'de los fariseos' es la forma más natural y conserva la pertenencia al grupo.
- source_word: οὗτος ... ὁ ἄνθρωπος
  english_pob_choice: This man
  chosen_spanish: Este hombre
  alternatives_spanish:
  - Este varón
  - Esta persona
  lexicon: BDAG
  rationale: ἄνθρωπος aquí se refiere a un individuo masculino; 'hombre' es la equivalencia directa y natural. 'Este' mantiene el matiz despectivo del demostrativo sin exagerarlo.
- source_word: παρὰ θεοῦ
  english_pob_choice: from God
  chosen_spanish: viene de parte de Dios
  alternatives_spanish:
  - es de Dios
  - proviene de Dios
  lexicon: BDAG
  rationale: Para el español, 'viene de parte de Dios' comunica bien origen/autoridad divina sin perder la relación de procedencia. Evita la ambigüedad de una lectura demasiado literal de 'de Dios' y no añade explícitamente 'enviado'.
- source_word: τηρεῖ
  english_pob_choice: keep
  chosen_spanish: guarda
  alternatives_spanish:
  - observa
  - cumple
  lexicon: BDAG
  rationale: En el contexto del sábado, 'guardar' es un equivalente español tradicional y preciso para la observancia de un mandamiento. Preserva la fuerza normativa de τηρέω.
- source_word: τὸ σάββατον
  english_pob_choice: the Sabbath
  chosen_spanish: el sábado
  alternatives_spanish:
  - el día de reposo
  - el sabbat
  lexicon: BDAG
  rationale: '''Sábado'' es el término natural en español para el día judío de reposo. Mantiene claridad y fidelidad al referente cultural y religioso.'
- source_word: ἄλλοι
  english_pob_choice: others
  chosen_spanish: otros
  alternatives_spanish:
  - los demás
  - otros más
  lexicon: BDAG
  rationale: El contraste simple del griego se refleja bien con 'otros'.
- source_word: Πῶς δύναται
  english_pob_choice: How can
  chosen_spanish: ¿Cómo puede
  alternatives_spanish:
  - ¿Cómo es posible que
  - ¿De qué manera puede
  lexicon: BDAG
  rationale: La construcción pregunta por capacidad/posibilidad; '¿Cómo puede...?' es la forma española más natural y fiel.
- source_word: ἁμαρτωλὸς
  english_pob_choice: sinful
  chosen_spanish: pecador
  alternatives_spanish:
  - pecaminoso
  - un hombre de pecado
  lexicon: BDAG
  rationale: Como adjetivo que modifica 'hombre', el español puede expresarlo de manera natural como 'pecador'. Esta opción conserva la ambigüedad entre rasgo moral y posible sustantivación, reflejando la nota textual del POB inglés.
- source_word: τοιαῦτα σημεῖα
  english_pob_choice: such signs
  chosen_spanish: tales señales
  alternatives_spanish:
  - tales signos
  - señales tan grandes
  lexicon: BDAG
  rationale: En Juan, σημεῖα tiene peso teológico y suele traducirse por 'señales' para mantener el valor revelador de los hechos. 'Tales' reproduce τοιαῦτα sin sobreinterpretación.
- source_word: σχίσμα
  english_pob_choice: a division
  chosen_spanish: una división
  alternatives_spanish:
  - una ruptura
  - un cisma
  lexicon: BDAG
  rationale: '''División'' es claro, natural y conserva la fractura relacional sin cargar el texto con un término más eclesiástico como ''cisma''.'
- source_word: ἐν αὐτοῖς
  english_pob_choice: among them
  chosen_spanish: entre ellos
  alternatives_spanish:
  - en ellos
  - dentro de ellos
  lexicon: BDAG
  rationale: En español, la relación interna de un grupo se expresa mejor con 'entre ellos', que comunica el sentido social de ἐν αὐτοῖς.
theological_decisions:
- issue: Sentido de παρὰ θεοῦ respecto de Jesús
  english_pob_reading: from God
  chosen_spanish_reading: viene de parte de Dios
  alternative_spanish_readings:
  - es de Dios
  - proviene de Dios
  - enviado por Dios
  rationale: La afirmación de los fariseos apunta a origen o autorización divina. 'Viene de parte de Dios' mantiene esa idea sin expandirla a la misión explícita de 'enviado', que el griego aquí no dice.
  doctrine_reference: Translation philosophy §3
- issue: Valor johánico de σημεῖα
  english_pob_reading: signs
  chosen_spanish_reading: señales
  alternative_spanish_readings:
  - milagros
  - señales milagrosas
  rationale: Juan usa σημεῖα con carga reveladora; 'señales' conserva mejor esa función teológica que reducirlo a 'milagros'.
  doctrine_reference: Translation philosophy §1, §5
- issue: Ambigüedad de ἁμαρτωλός
  english_pob_reading: sinful man
  chosen_spanish_reading: hombre pecador
  alternative_spanish_readings:
  - un pecador
  - hombre pecaminoso
  rationale: El griego usa un adjetivo atributivo. 'Hombre pecador' preserva la estructura y deja abierta la tensión entre una caracterización moral y una posible sustantivación, tal como la nota inglesa indica.
  doctrine_reference: Lexical audit trail
translation_notes:
  revision_awareness: Coincide con el pasaje auditado en sentido y estructura discursiva; no se detectaron revisiones aplicadas en el registro inglés más reciente, y se preserva la misma segmentación de voces y la misma ambigüedad lexical relevante en ἁμαρτωλός y σημεῖα.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto, pero en este versículo no aparece el nombre divino; la referencia a θεός se traduce como 'Dios'.
  - Se usa 'señales' para σημεῖα, en continuidad con la decisión inglesa y la terminología joánica del proyecto.
  - '''Sábado'' se usa para τὸ σάββατον por claridad natural en español.'
  - La puntuación conserva el contraste entre dos grupos de hablantes y la conclusión narrativa de división interna.
