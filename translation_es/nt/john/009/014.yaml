translation:
  language: es
  text: Era sábado el día en que Jesús hizo el barro y abrió sus ojos[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lodo» para «barro».
    reason: lexical_alternative
  - marker: b
    text: 'Griego: «abrió sus ojos», expresión concreta para la curación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: σάββατον
  english_pob_choice: the Sabbath
  chosen_spanish: el sábado
  alternatives_spanish:
  - un sábado
  - sábado
  lexicon: BDAG
  rationale: En español, el artículo definido es la forma más natural y fiel para el día sabático concreto del relato. Evita la ambigüedad de un indefinido y conserva el valor calendárico del término.
- source_word: ἐν ᾗ ἡμέρᾳ
  english_pob_choice: on the day when
  chosen_spanish: en el día en que
  alternatives_spanish:
  - el día en que
  - el día cuando
  lexicon: BDAG
  rationale: La frase relativa temporal se vuelve más natural en español con una construcción idiomática que mantiene la referencia temporal sin calcar la sintaxis griega.
- source_word: πηλός
  english_pob_choice: mud
  chosen_spanish: barro
  alternatives_spanish:
  - lodo
  - arcilla
  - barro de tierra
  lexicon: BDAG
  rationale: Aunque el inglés POB eligió 'mud', en español 'barro' comunica bien la mezcla moldeable aplicada en el contexto narrativo y suena más natural y digno. 'Arcilla' podría sugerir un material más técnico o seco; 'lodo' puede sonar más despectivo o excesivamente sucio.
- source_word: ἐποίησεν
  english_pob_choice: made
  chosen_spanish: hizo
  alternatives_spanish:
  - formó
  - preparó
  - hizo el barro
  lexicon: BDAG
  rationale: El verbo hacer es la equivalencia más directa y sobria para ποιέω aquí. En español permite mantener el foco en la acción concreta de Jesús sin introducir matices interpretativos.
- source_word: ἀνέῳξεν
  english_pob_choice: opened
  chosen_spanish: abrió
  alternatives_spanish:
  - abrió los ojos
  - los abrió
  - restauró la vista
  lexicon: BDAG
  rationale: Se conserva la imagen concreta de 'abrir' en lugar de una paráfrasis como 'restauró la vista', que suavizaría el lenguaje de Juan. En español, la expresión 'abrió sus ojos' es comprensible y fiel a la metáfora corporal.
- source_word: αὐτοῦ τοὺς ὀφθαλμούς
  english_pob_choice: his eyes
  chosen_spanish: sus ojos
  alternatives_spanish:
  - los ojos del hombre
  - su vista
  lexicon: BDAG
  rationale: La construcción posesiva en español se expresa de modo natural como 'sus ojos'. Se conserva el referente corporal concreto y se evita abstraerlo a 'vista', que interpretaría el texto.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y
  - Pero
  lexicon: BDAG
  rationale: '''Ahora'' funciona como transición narrativa suave y natural en español, equivalente al matiz discursivo de δέ sin intensificar indebidamente la oposición.'
theological_decisions:
- issue: Referencia al sábado en relación con el acto de Jesús
  english_pob_reading: Translate the temporal notice straightforwardly without adding interpretive comment about Sabbath law or controversy.
  chosen_spanish_reading: Traducir la nota temporal de forma directa, sin agregar explicación sobre la ley sabática o la controversia posterior.
  alternative_spanish_readings:
  - Ahora era un sábado, en el día en que Jesús hizo el barro y abrió sus ojos.
  - Era el sábado, el día en que Jesús hizo el barro y abrió sus ojos.
  rationale: El versículo presenta un dato narrativo que prepara el conflicto siguiente; la traducción debe conservar esa sobriedad y no anticipar la polémica. El artículo definido 'el sábado' transmite con precisión el día sabático sin resolver ni ampliar la tensión teológica.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: La redacción sigue el consenso alto del control cruzado y adopta la revisión del inglés POB que prefirió 'the Sabbath' como referencia natural y contextual. En español se mantuvo el valor definido con 'el sábado' y se conservó la imagen concreta de 'abrió sus ojos' sin convertirla en una paráfrasis interpretativa.
  spanish_consistency_notes:
  - Se preservó el nombre Jesús y no Cristo, conforme al texto griego Ἰησοῦς.
  - '''Barro'' se eligió como equivalente idiomático de πηλός en este contexto; la nota deja constancia de la alternativa ''lodo''.'
  - Se mantuvo la referencia corporal 'sus ojos' para no abstraer la curación a 'vista'.
  - La puntuación y el orden sintáctico buscan ser publicables en español sin perder la relación temporal del griego.
