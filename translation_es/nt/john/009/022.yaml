source:
  edition: SBLGNT
  text: ταῦτα εἶπαν οἱ γονεῖς αὐτοῦ ὅτι ἐφοβοῦντο τοὺς Ἰουδαίους, ἤδη γὰρ συνετέθειντο οἱ Ἰουδαῖοι ἵνα ἐάν τις αὐτὸν ὁμολογήσῃ χριστόν, ἀποσυνάγωγος γένηται.
base_translation:
  language: en
  yaml_path: translation/nt/john/009/022.yaml
  text: His parents said these things because they were afraid of the Jews[a], for the Jews had already agreed that if anyone confessed him as the Messiah[b], he would be put out of the synagogue.
  footnotes:
  - marker: a
    text: 'Greek: ''the Jews.'' In this context, the reference is likely to the Jewish authorities rather than to Jewish people indiscriminately.'
    reason: cultural_note
  - marker: b
    text: Or 'confessed him as Christ' or 'acknowledged him as the Christ.'
    reason: alternative_reading
  ai_draft:
    model_id: gpt-5.4
