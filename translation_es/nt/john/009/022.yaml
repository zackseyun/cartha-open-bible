translation:
  language: es
  text: Sus padres dijeron estas cosas porque tenían miedo de los judíos[a], pues los judíos ya se habían puesto de acuerdo en que, si alguien lo confesaba como el Mesías[b], sería expulsado de la sinagoga.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «los judíos». En este contexto, la referencia probablemente es a las autoridades judías más que al pueblo judío en general.'
    reason: cultural_note
  - marker: b
    text: O «como Cristo» o «como el Cristo».
    reason: alternative_reading
lexical_decisions:
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  - estas palabras
  lexicon: BDAG
  rationale: El plural del demostrativo se conserva con «estas cosas», que refleja explícitamente que los padres dijeron varias cosas mencionadas antes, sin volver la frase pesada en español.
- source_word: εἶπαν
  english_pob_choice: said
  chosen_spanish: dijeron
  alternatives_spanish:
  - hablaron
  - expresaron
  lexicon: BDAG
  rationale: Aoristo narrativo de λέγω; «dijeron» es el equivalente natural y directo en español.
- source_word: οἱ γονεῖς αὐτοῦ
  english_pob_choice: his parents
  chosen_spanish: sus padres
  alternatives_spanish:
  - el padre y la madre de él
  lexicon: BDAG
  rationale: γονεῖς significa idiomáticamente «padres». El posesivo se expresa de forma natural con «sus» en español.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - que
  lexicon: BDAG
  rationale: Aquí introduce la causa de lo dicho; «porque» comunica mejor la relación causal que «que» en español.
- source_word: ἐφοβοῦντο
  english_pob_choice: were afraid
  chosen_spanish: tenían miedo
  alternatives_spanish:
  - temían
  lexicon: BDAG
  rationale: El imperfecto medio sugiere temor continuo o característico. «Tenían miedo» suena natural en español y preserva ese matiz de estado prolongado.
- source_word: τοὺς Ἰουδαίους / οἱ Ἰουδαῖοι
  english_pob_choice: the Jews
  chosen_spanish: los judíos
  alternatives_spanish:
  - los líderes judíos
  - los judeanos
  lexicon: BDAG
  rationale: Se mantiene el wording griego en el texto principal. En este contexto, el referente probable son las autoridades judías con poder sinagogal, pero el texto no lo explicita; por eso se conserva «los judíos» y se aclara en nota.
- source_word: ἤδη
  english_pob_choice: already
  chosen_spanish: ya
  alternatives_spanish:
  - para entonces
  - ya desde entonces
  lexicon: BDAG
  rationale: Adverbio temporal que indica una disposición previa; «ya» es el equivalente breve y claro en español.
- source_word: γὰρ
  english_pob_choice: for
  chosen_spanish: pues
  alternatives_spanish:
  - porque
  lexicon: BDAG
  rationale: Introduce la base explicativa de la afirmación anterior; «pues» funciona bien en español narrativo y mantiene el valor explicativo.
- source_word: συνετέθειντο
  english_pob_choice: had already agreed
  chosen_spanish: se habían puesto de acuerdo
  alternatives_spanish:
  - habían acordado
  - habían conspirado
  lexicon: BDAG
  rationale: El pluscuamperfecto medio de συντίθεμαι expresa un acuerdo previo. «Se habían puesto de acuerdo» conserva ese sentido sin cargarlo innecesariamente con la idea de conspiración.
- source_word: ἵνα ἐάν τις
  english_pob_choice: that if anyone
  chosen_spanish: en que, si alguien
  alternatives_spanish:
  - para que, si alguien
  - de modo que, si alguien
  lexicon: BDAG
  rationale: La construcción comunica el contenido del acuerdo. En español, «en que, si alguien» evita una fórmula rígida y conserva la relación sintáctica del griego.
- source_word: αὐτὸν ὁμολογήσῃ
  english_pob_choice: confessed him
  chosen_spanish: lo confesaba
  alternatives_spanish:
  - lo reconocía
  - declaraba públicamente su fe en él
  lexicon: BDAG
  rationale: ὁμολογέω aquí es reconocimiento/confesión pública. «Lo confesaba» mantiene el verbo de la raíz de «confesar» y la referencia directa a Jesús.
- source_word: χριστόν
  english_pob_choice: the Messiah
  chosen_spanish: como el Mesías
  alternatives_spanish:
  - como Cristo
  - como el Cristo
  lexicon: BDAG
  rationale: 'Como título en este contexto, Χριστός se traduce normalmente «Mesías». La preposición «como» refleja bien ὁμολογήσῃ ... χριστόν en español natural: confesarlo como el Mesías.'
- source_word: ἀποσυνάγωγος γένηται
  english_pob_choice: would be put out of the synagogue
  chosen_spanish: sería expulsado de la sinagoga
  alternatives_spanish:
  - quedaría fuera de la sinagoga
  - sería excluido de la sinagoga
  lexicon: BDAG
  rationale: ἀποσυνάγωγος indica exclusión de la comunidad sinagogal. «Sería expulsado de la sinagoga» es claro, fiel y menos interpretativo que «excomulgado».
theological_decisions:
- issue: Renderización de Χριστός como título
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - Cristo
  - el Cristo
  rationale: El término funciona como título mesiánico, no como simple nombre propio. «El Mesías» preserva el sentido judío de la confesión prohibida en el contexto de Juan.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Messiah cuando funciona como título'
- issue: Referente de οἱ Ἰουδαῖοι en Juan
  english_pob_reading: the Jews (with contextual footnote noting likely reference to Jewish authorities)
  chosen_spanish_reading: los judíos (con nota contextual sobre la probable referencia a las autoridades judías)
  alternative_spanish_readings:
  - las autoridades judías
  - los judeanos
  rationale: Se conserva el texto griego de forma transparente en la línea principal. La nota documenta que, por el contexto, la referencia probable es a las autoridades judías que controlaban la expulsión de la sinagoga, sin sustituir el término del original.
  doctrine_reference: POB transparency principle; contextual referent note for Ἰουδαῖοι
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del audit trail inglés, que ajustó «confessed him to be the Messiah» a «confessed him as the Messiah» por ser una representación más natural de ὁμολογήσῃ ... χριστόν. También conserva la decisión estable de mantener «the Jews» en el texto principal con nota contextual, y la preferencia por «Messiah» frente a «Christ» cuando Χριστός funciona como título.
  spanish_consistency_notes:
  - Se mantiene «los judíos» en el cuerpo del texto para ser fiel al wording griego, con nota aclaratoria para evitar una lectura indiscriminada.
  - «El Mesías» se usa como traducción titulal de Χριστός, en línea con la política de términos discutidos del proyecto.
  - «Sería expulsado de la sinagoga» conserva el valor de exclusión comunitaria de ἀποσυνάγωγος sin cargar el texto con terminología eclesiástica posterior.
  - La frase «si alguien lo confesaba como el Mesías» conserva la estructura directa de ὁμολογήσῃ χριστόν en español natural y readable.
