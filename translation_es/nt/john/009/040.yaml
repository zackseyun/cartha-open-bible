translation:
  language: es
  text: 'Algunos de los fariseos que estaban con él oyeron estas cosas y le dijeron[a]: «¿Acaso nosotros no somos también ciegos?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Nosotros no somos también ciegos, ¿verdad?» La pregunta con μή suele esperar una respuesta negativa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤκουσαν
  english_pob_choice: heard
  chosen_spanish: oyeron
  alternatives_spanish:
  - escucharon
  lexicon: BDAG
  rationale: El aoristo de ἀκούω aquí indica que recibieron lo que Jesús acababa de decir; en español, «oyeron» reproduce de manera natural ese hecho narrativo sin añadir énfasis de atención intencional que tendría «escucharon».
- source_word: ἐκ τῶν Φαρισαίων
  english_pob_choice: Some of the Pharisees
  chosen_spanish: Algunos de los fariseos
  alternatives_spanish:
  - Algunos entre los fariseos
  - De entre los fariseos
  lexicon: BDAG
  rationale: La construcción partitiva con ἐκ y genitivo señala un subconjunto, no todos los fariseos. «Algunos de los fariseos» conserva ese valor de parte de un grupo y suena idiomático en español.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - estas palabras
  - esto
  lexicon: BDAG
  rationale: El plural demostrativo se refiere a lo que Jesús dijo antes. «Estas cosas» conserva el plural y evita reducir el referente solo a palabras, aunque las incluye.
- source_word: οἱ μετ’ αὐτοῦ ὄντες
  english_pob_choice: who were with him
  chosen_spanish: que estaban con él
  alternatives_spanish:
  - que andaban con él
  - los que estaban con él
  lexicon: BDAG
  rationale: El participio con artículo identifica a los fariseos presentes con Jesús. «Que estaban con él» transmite de forma natural el sentido relacional y durativo del griego.
- source_word: εἶπον αὐτῷ
  english_pob_choice: said to him
  chosen_spanish: le dijeron
  alternatives_spanish:
  - le preguntaron
  - le hablaron
  lexicon: BDAG
  rationale: λέγω introduce el discurso directo; en español, «le dijeron» es la forma directa y estándar. Aunque la frase es interrogativa, la pregunta queda expresada en la cita misma.
- source_word: Μὴ καὶ ἡμεῖς τυφλοί ἐσμεν;
  english_pob_choice: Surely we are not blind too, are we?
  chosen_spanish: ¿Acaso nosotros también somos ciegos?
  alternatives_spanish:
  - ¿No seremos nosotros también ciegos?
  - ¿Somos nosotros también ciegos?
  lexicon: BDAG
  rationale: μή en una pregunta suele esperar una respuesta negativa; en español, una interrogativa con «¿Acaso...?» comunica bien la incredulidad y la expectativa de ‘no’ sin forzar una etiqueta inglesa equivalente. «Ciegos» conserva el adjetivo literal del griego y deja que el contexto marque el matiz figurado.
theological_decisions:
- issue: Si explicitar la ceguera como espiritual en el texto principal
  english_pob_reading: Retain 'blind' without adding 'spiritually' in the main text
  chosen_spanish_reading: Mantener «ciegos» sin añadir «espiritualmente»
  alternative_spanish_readings:
  - espiritualmente ciegos
  - ciegos espirituales
  rationale: El contexto joánico deja clara la ironía y el sentido figurado, pero el griego usa el adjetivo sin calificar. Conservar «ciegos» evita introducir una glosa interpretativa en el cuerpo del texto.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador [a] aparezca exactamente en el texto principal donde corresponde.
  spanish_consistency_notes:
  - Se mantuvo el plural de ταῦτα con «estas cosas» para conservar el referente plural.
  - Se eligió «fariseos» en minúscula por convención común en español bíblico cuando el término funciona como designación de grupo.
  - No se añadió «espiritualmente» para no sobreinterpretar τυφλοί.
  - La pregunta se ajustó a una forma natural en español que conserva la expectativa de respuesta negativa implícita en μή.
