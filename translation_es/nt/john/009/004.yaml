translation:
  language: es
  text: Debemos hacer las obras del que me envió, mientras sea de día; viene la noche[a], cuando nadie puede trabajar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Algunos manuscritos leen: «Debo hacer las obras del que me envió».'
    reason: textual_variant
lexical_decisions:
- source_word: ἡμᾶς
  english_pob_choice: We
  chosen_spanish: Debemos
  alternatives_spanish:
  - Tenemos que
  - Debemos nosotros
  lexicon: BDAG
  rationale: El griego de SBLGNT tiene un plural de primera persona con δεῖ, así que el español debe conservar el plural inclusivo. En español, la construcción impersonal o inclusiva con verbo conjugado en 1.ª plural (“Debemos”) comunica la obligación de manera natural y fiel, sin necesidad de explicitar el pronombre.
- source_word: δεῖ
  english_pob_choice: must
  chosen_spanish: debemos
  alternatives_spanish:
  - es necesario que
  - tenemos que
  lexicon: BDAG
  rationale: La idea central es necesidad u obligación. “Debemos” preserva esa fuerza normativa en español moderno y encaja con el plural del texto base.
- source_word: ἐργάζεσθαι
  english_pob_choice: do
  chosen_spanish: hacer
  alternatives_spanish:
  - trabajar
  - obrar
  lexicon: BDAG
  rationale: El inglés POB usa “do” porque en inglés “work the works” sería torpe. En español, “hacer las obras” resulta natural y conserva el vínculo con τὰ ἔργα. Para la segunda ocurrencia, “trabajar” expresa la actividad general sin repetir innecesariamente el mismo giro.
- source_word: τὰ ἔργα
  english_pob_choice: the works
  chosen_spanish: las obras
  alternatives_spanish:
  - las obras/los hechos
  - los trabajos
  lexicon: BDAG
  rationale: En el contexto joánico, “obras” es el equivalente más claro y reverente de ἔργα, conservando la referencia a las obras dadas por Dios. “Hechos” o “trabajos” no mantienen tan bien la intertextualidad teológica.
- source_word: τοῦ πέμψαντός με
  english_pob_choice: of the one who sent me
  chosen_spanish: del que me envió
  alternatives_spanish:
  - del que me ha enviado
  - de quien me envió
  lexicon: BDAG
  rationale: El participio articular se traduce de forma sustantiva. “Del que me envió” es claro, idiomático y conserva la referencia personal sin sobrecargar el texto con perífrasis.
- source_word: ἕως ἡμέρα ἐστίν
  english_pob_choice: while it is day
  chosen_spanish: mientras es de día
  alternatives_spanish:
  - mientras haya día
  - mientras dure el día
  lexicon: BDAG
  rationale: La expresión temporal se ajusta mejor al español como “mientras es de día”. Mantiene la idea de un período disponible para actuar, que contrasta con la noche que viene.
- source_word: ἔρχεται νὺξ
  english_pob_choice: night is coming
  chosen_spanish: viene la noche
  alternatives_spanish:
  - la noche viene
  - se acerca la noche
  lexicon: BDAG
  rationale: El presente con fuerza inminente se expresa naturalmente en español como “viene la noche”. Esta formulación preserva la progresión temporal y su tono de urgencia.
- source_word: ὅτε
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - en que
  lexicon: BDAG
  rationale: Conjunción temporal directa y natural en español.
- source_word: οὐδεὶς
  english_pob_choice: no one
  chosen_spanish: nadie
  alternatives_spanish:
  - ninguno
  lexicon: BDAG
  rationale: “Nadie” es la correspondencia española más natural para el indefinido negativo y evita una formulación marcada por género.
- source_word: δύναται ἐργάζεσθαι
  english_pob_choice: can work
  chosen_spanish: puede trabajar
  alternatives_spanish:
  - puede hacer obras
  - es capaz de trabajar
  lexicon: BDAG
  rationale: Aquí el verbo aparece sin objeto directo y refiere la capacidad general de actuar. “Puede trabajar” reproduce bien la idea de capacidad y suena natural en español; se evita repetir “hacer las obras” porque el griego no lo hace.
theological_decisions:
- issue: 'Variante textual inicial: ἡμᾶς / ‘we’ frente a ἐμέ / ‘I’'
  english_pob_reading: We must do the works of the one who sent me
  chosen_spanish_reading: Debemos hacer las obras del que me envió
  alternative_spanish_readings:
  - Debo hacer las obras del que me envió
  rationale: Se sigue la lectura griega proporcionada por SBLGNT, que presenta un plural de primera persona. La nota conserva la variante singular ampliamente atestiguada para transparencia textual, sin alterar el cuerpo principal.
  doctrine_reference: Principios POB de primacía del texto original y preservación de variantes significativas en nota
- issue: Relación entre ‘obras’ y la actividad general expresada por ἐργάζεσθαι
  english_pob_reading: do the works ... can work
  chosen_spanish_reading: hacer las obras ... puede trabajar
  alternative_spanish_readings:
  - hacer las obras ... puede hacer obras
  - obrar ... puede obrar
  rationale: El verso distingue entre las ‘obras’ específicas del enviado y la capacidad general de ‘trabajar’ antes de que llegue la noche. El español conserva esa tensión semántica con dos verbos diferentes, como hace el inglés POB.
  doctrine_reference: Distinción contextual entre έργα como obras señaladas y ἐργάζεσθαι como actividad/capacidad general
translation_notes:
  revision_awareness: Se revisó el pasaje a la luz del texto griego SBLGNT y del aparato auditado en inglés. La redacción española sigue la lectura plural de primera persona del testimonio base y conserva en nota la variante singular ampliamente conocida. No se detectaron revisiones pendientes en el pase más reciente; el criterio de equivalencia óptima se mantuvo estable.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ solo cuando el texto lo requiera explícitamente; aquí no aparece.
  - Se traduce ἔργα como ‘obras’ por consistencia joánica.
  - Se traduce δύναται ἐργάζεσθαι como ‘puede trabajar’ para evitar redundancia con ‘hacer las obras’.
  - La nota textual usa una formulación breve y transparente, acorde con el estilo POB.
