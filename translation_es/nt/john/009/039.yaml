translation:
  language: es
  text: 'Y Jesús dijo[a]: «Para juicio yo vine a este mundo, para que los que no ven vean y los que ven lleguen a ser ciegos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘para un juicio’. El griego εἰς κρίμα puede destacar el efecto judicial de la venida de Jesús más que solo la condenación.
    reason: lexical_alternative
lexical_decisions:
- source_word: κρίμα
  english_pob_choice: judgment
  chosen_spanish: juicio
  alternatives_spanish:
  - un juicio
  - condena
  - condenación
  lexicon: BDAG
  rationale: '‘Juicio’ reproduce de manera natural la fuerza judicial de εἰς κρίμα sin estrechar el sentido a ‘condena’ o ‘condenación’. En español mantiene la amplitud del efecto judicial que el contexto de Juan presenta: la venida de Jesús produce discernimiento y separación, no solo castigo.'
- source_word: κόσμον
  english_pob_choice: world
  chosen_spanish: mundo
  alternatives_spanish:
  - el mundo
  - esta tierra
  lexicon: BDAG
  rationale: ‘Mundo’ es la equivalencia directa y habitual de κόσμος en Juan. Conserva la referencia al orden humano en el que ocurre la venida de Jesús, sin suavizar el alcance teológico del término.
- source_word: βλέποντες
  english_pob_choice: those who do not see / those who see
  chosen_spanish: los que no ven / los que ven
  alternatives_spanish:
  - los ciegos / los que ven
  - quienes no ven / quienes ven
  lexicon: BDAG
  rationale: El participio se vuelve sustantivo de forma natural en español con ‘los que…’. Así se conserva la ambigüedad literal y metafórica sin sobreespecificar con ‘los ciegos’ en la primera cláusula.
- source_word: βλέπωσιν
  english_pob_choice: may see
  chosen_spanish: vean
  alternatives_spanish:
  - puedan ver
  - mayan ver
  lexicon: BDAG
  rationale: El subjuntivo final tras ἵνα se expresa con ‘vean’. En español es la forma más natural y conserva la idea de resultado o propósito sin añadir matices innecesarios.
- source_word: τυφλοὶ
  english_pob_choice: blind
  chosen_spanish: ciegos
  alternatives_spanish:
  - cegados
  - personas ciegas
  lexicon: BDAG
  rationale: ‘Ciegos’ preserva la fuerza predicativa del adjetivo y el paralelismo tajante del dicho. ‘Cegados’ sugeriría un proceso distinto y debilitaría la imagen de reversión.
- source_word: γένωνται
  english_pob_choice: may become
  chosen_spanish: lleguen a ser
  alternatives_spanish:
  - se vuelvan
  - se hagan
  - lleguen a convertirse en
  lexicon: BDAG
  rationale: ‘Lleguen a ser’ expresa devenir/resultar de modo idiomático en español y mantiene el valor de γίνομαι como cambio de estado. Evita reducirlo a mera apariencia o a un matiz moral no presente explícitamente.
- source_word: εἰς τὸν κόσμον τοῦτον ἦλθον
  english_pob_choice: I came into this world
  chosen_spanish: yo he venido a este mundo
  alternatives_spanish:
  - yo vine a este mundo
  - he venido a este mundo
  lexicon: BDAG
  rationale: ‘He venido’ suena natural en español en una declaración con peso presente y preserva la orientación del dicho. ‘A este mundo’ mantiene el destino/lugar de llegada de εἰς con ἔρχομαι. Se conserva ‘yo’ para reflejar el énfasis explícito del griego ἐγώ.
theological_decisions:
- issue: Tensión entre ‘juicio’ aquí y otras afirmaciones joánicas sobre la misión de Jesús
  english_pob_reading: Render κρίμα as 'judgment' without softening or harmonizing away the tension.
  chosen_spanish_reading: Traducir κρίμα como ‘juicio’ y no como ‘condena’, para conservar la tensión joánica de que la venida de Jesús produce separación judicial entre los que ven y los que no ven.
  alternative_spanish_readings:
  - ‘condena’
  - ‘crisis’
  - ‘sentencia’
  rationale: La frase no solo habla de castigo, sino del efecto revelador y divisorio de la venida de Jesús. ‘Juicio’ permite sostener esa tensión sin armonizarla artificialmente con otros pasajes; además, ‘condena’ estrecharía indebidamente el alcance del versículo.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Coincidimos con la última revisión: no se requieren cambios respecto al sentido base. La redacción española mantiene la tensión lexical y teológica documentada en el audit trail inglés, sin suavizar κρίμα ni perder el paralelismo entre ver y quedar ciego.'
  spanish_consistency_notes:
  - Se conserva ‘mundo’ para κόσμος, en línea con el uso joánico estándar.
  - Se mantiene el paralelismo ‘los que no ven / los que ven’ para respetar la estructura del griego.
  - ‘Lleguen a ser ciegos’ preserva el cambio de estado de γίνομαι sin introducir una explicación interpretativa adicional.
  - La nota al pie marca la alternativa léxica más importante sin duplicar otras ambigüedades ya resueltas por el texto principal.
