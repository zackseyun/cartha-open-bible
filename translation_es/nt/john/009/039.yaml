    issue: ‘he venido’ para ἦλθον
    rationale: Aunque es comprensible y defendible en español, el pretérito perfecto introduce un matiz aspectual más presente que no está exigido por el aoristo griego. ‘Vine’ es más directo, natural en este dicho, y más cercano al expediente inglés ‘I came’.
  - severity: low
    issue: Coma antes de ‘y’
    rationale: En español normal no hace falta coma antes de la conjunción copulativa en esta estructura paralela; quitarla mejora la fluidez sin afectar el sentido.
  - severity: low
    issue: 'Error en decisión léxica auxiliar: ‘mayan ver’'
    rationale: En las alternativas de la ficha léxica aparece un evidente error tipográfico (‘mayan ver’). No afecta el texto bíblico, pero confirma que la revisión menor es apropiada.
