translation:
  language: es
  text: Después de decir estas cosas, escupió en el suelo e hizo barro con la saliva, y ungió[a] sus ojos con el barro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «los untó». El verbo griego puede significar «ungir» o «untar/aplicar sobre».
    reason: lexical_alternative
lexical_decisions:
- source_word: ταῦτα εἰπὼν
  english_pob_choice: After saying these things
  chosen_spanish: Después de decir estas cosas
  alternatives_spanish:
  - Habiendo dicho estas cosas
  - Cuando hubo dicho estas cosas
  lexicon: BDAG
  rationale: El participio aoristo con el demostrativo introduce una acción anterior a los verbos principales. «Después de decir estas cosas» conserva la secuencia temporal de manera natural en español sin volver la frase rígida.
- source_word: ἔπτυσεν χαμαί
  english_pob_choice: he spit on the ground
  chosen_spanish: escupió en tierra
  alternatives_spanish:
  - escupió en el suelo
  - escupió al suelo
  lexicon: BDAG
  rationale: χαμαί significa «en tierra / al suelo». «Escupió en tierra» es breve, natural y conserva el acto físico concreto.
- source_word: ἐποίησεν πηλὸν
  english_pob_choice: made mud
  chosen_spanish: hizo barro
  alternatives_spanish:
  - hizo lodo
  - hizo arcilla
  lexicon: BDAG
  rationale: πηλός puede ser barro, lodo o arcilla; en esta escena curativa, «barro» comunica bien una mezcla material formada a partir de saliva y tierra, sin sonar técnico. «Arcilla» sería más tradicional pero menos transparente aquí.
- source_word: ἐκ τοῦ πτύσματος
  english_pob_choice: from the saliva
  chosen_spanish: con la saliva
  alternatives_spanish:
  - a partir de la saliva
  - desde la saliva
  lexicon: BDAG
  rationale: El griego expresa origen con ἐκ; en español, «con la saliva» comunica de forma natural que el barro fue formado a partir de ella. Se mantiene la relación material sin forzar una estructura poco idiomática.
- source_word: ἐπέχρισεν
  english_pob_choice: he anointed
  chosen_spanish: ungió
  alternatives_spanish:
  - lo untó
  - lo aplicó
  - lo frotó
  lexicon: BDAG
  rationale: ἐπιχρίω puede significar untar, frotar o ungir. Se conserva «ungió» porque refleja mejor la amplitud del verbo y la decisión revisada del POB en inglés, sin afirmar necesariamente un sentido ceremonial que el contexto no exige.
- source_word: αὐτοῦ ... ἐπὶ τοὺς ὀφθαλμούς
  english_pob_choice: on his eyes
  chosen_spanish: los ojos de él
  alternatives_spanish:
  - sus ojos
  - los ojos del hombre
  lexicon: BDAG
  rationale: El pronombre se refiere al hombre ciego en el contexto. «Los ojos de él» evita ambigüedad sobre el referente, mientras que el orden español mantiene el foco en el objeto de la acción.
- source_word: τὸν πηλόν
  english_pob_choice: the mud
  chosen_spanish: el barro
  alternatives_spanish:
  - el lodo
  - la arcilla
  lexicon: BDAG
  rationale: El artículo remite al barro recién hecho; por eso se conserva la referencia anafórica con «el barro». Así se mantiene la cohesión léxica con la primera mención de πηλός.
theological_decisions:
- issue: 'Valor de ἐπέχρισεν: posible matiz ceremonial frente a aplicación física'
  english_pob_reading: The verb can be rendered 'anoint,' but in this context the action is concrete and medicinal rather than explicitly cultic or messianic.
  chosen_spanish_reading: «Ungió» en el texto principal, sin añadir explicación ceremonial.
  alternative_spanish_readings:
  - lo untó
  - lo aplicó
  - lo frotó
  rationale: Se conserva la posibilidad léxica de «ungir» sin desarrollar una lectura sacramental o mesiánica que el versículo no formula. El contexto presenta una acción física concreta, y la traducción deja abierta esa tensión en vez de resolverla artificialmente.
  doctrine_reference: 'Translation philosophy: no introducir afirmaciones doctrinales que el texto no hace; preservar la tensión léxica y teológica.'
translation_notes:
  revision_awareness: La redacción sigue la revisión del POB inglés que prefirió «he anointed his eyes with the mud» en lugar de «he spread the mud on his eyes», por considerar que ἐπέχρισεν está mejor reflejado por un verbo más cercano a «ungir». En español se adoptó «ungió», manteniendo la opción más literal y dejando la alternativa «lo untó» en nota.
  spanish_consistency_notes:
  - Se mantiene «barro» para πηλός en ambas menciones.
  - Se evita traducir ἐκ de manera rígidamente literal si empobrece el español, pero se conserva la relación material.
  - Se usa «ungió» por consistencia con la revisión del audit trail y se explica la alternativa en nota.
  - «Tierra» se emplea para χαμαί; «barro» para πηλός, distinguiendo lugar y material.
