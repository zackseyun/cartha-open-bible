    rationale: Aunque refleja el genitivo αὐτοῦ, en español bíblico legible y natural corresponde «sus ojos». La forma actual suena calcada e innecesariamente rígida.
  - severity: medium
    issue: Anclaje incorrecto de la nota al pie
    rationale: La nota explica una alternativa del verbo ἐπέχρισεν («ungió» / «untó»), pero el marcador [a] está colocado sobre «ojos». Debe ir en el verbo o frase verbal pertinente.
  - severity: low
    issue: «Escupió en tierra» es menos natural que «escupió en el suelo»
    rationale: La expresión actual se entiende, pero «en el suelo» es más idiomática en español neutral contemporáneo y sigue reflejando χαμαί con claridad.
  revised_spanish_text: Después de decir estas cosas, escupió en el suelo e hizo barro con la saliva, y ungió[a] sus ojos con el barro.
  revised_footnotes:
  - marker: a
    text: O, «los untó». El verbo griego puede significar «ungir» o «untar/aplicar sobre».
    reason: lexical_alternative
  revision_rationale: 'Se ajusta el español para mayor naturalidad y precisión: «en el suelo» en lugar de «en tierra», «sus ojos» en lugar de «los ojos de él», y se reubica la nota al verbo «ungió», que es donde corresponde la alternativa léxica documentada.'
