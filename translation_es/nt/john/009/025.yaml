revisions:
- from: 'Entonces aquel hombre respondió[a]: «Si es pecador, no lo sé. Una cosa sé: aunque yo era ciego, ahora veo».'
  to: 'Entonces aquel hombre respondió[a]: «No sé si es pecador. Una cosa sí sé: aunque yo era ciego, ahora veo».'
  rationale: Se ajusta la primera cláusula para expresar con español más natural el valor de discurso indirecto de εἰ tras 'no saber', en línea con la decisión auditada en inglés de preservar la tensión epistemológica sin imponer una condicional más fuerte. Se mantiene la alternativa literal en nota. Además, se refuerza el contraste retórico con 'Una cosa sí sé'.
