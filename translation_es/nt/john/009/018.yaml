translation:
  language: es
  text: Así que los judíos no creyeron acerca de él, que había sido ciego y había recibido la vista[a], hasta que llamaron a los padres del que había recibido la vista.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente “los líderes judíos” o “los judeanos”, según cómo se entienda en contexto el uso de “los judíos” en Juan.
    reason: alternative_reading
lexical_decisions:
- source_word: Οὐκ ἐπίστευσαν
  english_pob_choice: did not believe
  chosen_spanish: no creyeron
  alternatives_spanish:
  - no tuvieron fe
  - rehusaron creer
  lexicon: BDAG
  rationale: Aquí πιστεύω introduce una cláusula de contenido con ὅτι, por lo que el valor principal es aceptar o no como verdadero lo dicho. En español, 'creer' reproduce mejor esa fuerza que 'confiar', y mantiene el matiz factual del contexto.
- source_word: οἱ Ἰουδαῖοι
  english_pob_choice: the Jews
  chosen_spanish: los judíos
  alternatives_spanish:
  - los líderes judíos
  - los judeos
  lexicon: BDAG
  rationale: Se conserva la expresión literal del griego, como en el POB inglés, sin estrecharla de antemano a 'líderes'. En Juan el alcance puede variar según el contexto, y el texto mismo no explicita un grupo más limitado.
- source_word: περὶ αὐτοῦ
  english_pob_choice: concerning him
  chosen_spanish: respecto de él
  alternatives_spanish:
  - acerca de él
  - con respecto a él
  lexicon: BDAG
  rationale: περί con genitivo suele significar 'acerca de / respecto de'. 'Respecto de él' suena natural y formal en español, y conserva la relación directa con la afirmación discutida.
- source_word: ἦν τυφλὸς
  english_pob_choice: he had been blind
  chosen_spanish: había sido ciego
  alternatives_spanish:
  - era ciego
  - estaba ciego
  lexicon: BDAG
  rationale: El imperfecto griego marca un estado previo al milagro. En español, 'había sido ciego' expresa bien esa anterioridad narrativa; 'era ciego' o 'estaba ciego' pueden sonar menos explícitos sobre el estado pasado ya superado.
- source_word: ἀνέβλεψεν
  english_pob_choice: had received sight
  chosen_spanish: hubiera recibido la vista
  alternatives_spanish:
  - hubiera recobrado la vista
  - hubiera vuelto a ver
  lexicon: BDAG
  rationale: En contextos de sanidad, ἀναβλέπω designa recibir o recuperar la vista. 'Recibir la vista' preserva el giro idiomático del POB inglés y evita la implicación no necesaria de que hubiera visto antes. Se usa el subjuntivo perfecto compuesto en dependencia de 'no creyeron que...' para reflejar adecuadamente la secuencia verbal.
- source_word: ἕως ὅτου
  english_pob_choice: until
  chosen_spanish: hasta que
  alternatives_spanish:
  - hasta el momento en que
  - hasta cuando
  lexicon: BDAG
  rationale: La locución temporal indica límite. 'Hasta que' es la equivalencia idiomática natural en español.
- source_word: ἐφώνησαν
  english_pob_choice: they called
  chosen_spanish: llamaron
  alternatives_spanish:
  - llamaron a
  - convocaron
  lexicon: BDAG
  rationale: φωνέω puede significar 'llamar' o 'convocar'. 'Llamaron' es la opción más amplia y natural; 'convocaron' sería más fuerte y específico de lo que exige el contexto.
- source_word: τοὺς γονεῖς αὐτοῦ
  english_pob_choice: the parents of the one who had received sight
  chosen_spanish: a los padres del que había recibido la vista
  alternatives_spanish:
  - a sus padres
  - a los padres del hombre que había recibido la vista
  lexicon: BDAG
  rationale: γονεῖς es simplemente 'padres'; el posesivo se mantiene por el pronombre αὐτοῦ. Se preserva también el participio sustantivado 'del que había recibido la vista' para no añadir 'hombre' sin necesidad textual.
- source_word: τοῦ ἀναβλέψαντος
  english_pob_choice: of the one who had received sight
  chosen_spanish: del que había recibido la vista
  alternatives_spanish:
  - del que recobró la vista
  - del que volvió a ver
  lexicon: BDAG
  rationale: El participio articular identifica al sujeto por el hecho de haber recibido la vista. 'El que había recibido la vista' reproduce bien esa identificación y mantiene la tensión textual entre el estado anterior y el milagro.
theological_decisions:
- issue: Alcance de οἱ Ἰουδαῖοι en Juan
  english_pob_reading: the Jews
  chosen_spanish_reading: los judíos
  alternative_spanish_readings:
  - los líderes judíos
  - los judeos
  rationale: Se conserva la expresión del texto griego sin reinterpretarla dentro del cuerpo principal. Dado que en Juan la referencia puede ser contextual y polémicamente sensible, una nota permite recordar la posible referencia a líderes o a judeos sin alterar la redacción base.
  doctrine_reference: Principio de primacía del texto original; conservar la tensión interpretativa sin resolverla prematuramente.
translation_notes:
  revision_awareness: 'Se siguió la última revisión inglesa al preferir una equivalencia formal para περὶ αὐτοῦ (''respecto de él'' / ''concerning him'') y se mantuvo el resto del sentido auditado: incredulidad ante el hecho de que era ciego y recibió la vista, con el límite temporal de ἕως ὅτου y la referencia a los padres del sanado.'
  spanish_consistency_notes:
  - Se mantuvo 'los judíos' en el texto principal, en línea con la práctica POB de no estrechar sin justificación el referente de οἱ Ἰουδαῖοι.
  - '''Recibir la vista'' se usó de manera consistente para ἀναβλέπω en contexto de sanidad.'
  - Se evitó 'SEÑOR' o terminología eclesiástica ajena al pasaje; el verso no contiene vocabulario divino explícito.
  - La estructura verbal española busca reflejar la relación de anterioridad entre la ceguera, la sanidad y la incredulidad sin sobreexplicar.
