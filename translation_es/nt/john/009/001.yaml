review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite correctamente la secuencia y el sentido básico del griego: Jesús ve a un hombre ciego mientras va pasando. Sin embargo, la nota al pie no preserva bien la alternativa del inglés POB, porque repite exactamente la lectura principal («al pasar») en vez de ofrecer una alternativa real equivalente a ''passing by''.'
  spanish_quality_summary: El texto principal es natural y claro en español. «Y al pasar, vio a un hombre ciego desde su nacimiento» es comprensible, aunque «ciego de nacimiento» suena más idiomático y más compacto en español bíblico contemporáneo. La colocación de la nota en «ciego[a]» no corresponde al término anotado; la nota trata de «al pasar», por lo que el anclaje debe ir allí.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «un hombre» refleja bien ἄνθρωπον en este contexto. «ciego» y «vio» son adecuados. La mejora principal es idiomática y de manejo de nota, no de glosario doctrinal.
  issues:
  - severity: medium
    issue: La nota al pie está anclada en «ciego[a]» pero explica «al pasar».
    rationale: Las notas deben aparecer en la palabra o frase relevante. Tal como está, crea confusión y no cumple la disciplina de anclaje requerida.
  - severity: medium
    issue: La nota al pie no ofrece una alternativa real.
    rationale: El inglés POB da texto principal 'as he was passing by' con alternativa 'passing by'. En español, si el texto principal es «al pasar», la nota no debe repetir «al pasar», sino dar una opción distinta como «mientras pasaba» o «pasando».
  - severity: low
    issue: «desde su nacimiento» es correcto pero menos idiomático que «de nacimiento».
    rationale: Ambas opciones transmiten ἐκ γενετῆς, pero «ciego de nacimiento» es la formulación española más natural y directa para ceguera congénita.
  revised_spanish_text: Y al pasar[a], vio a un hombre ciego de nacimiento.
  revised_footnotes:
  - marker: a
    text: O «mientras pasaba»; el participio griego presenta a Jesús en el acto de ir pasando cuando vio al hombre.
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de la nota para que recaiga sobre «al pasar», se sustituye la falsa alternativa por una alternativa real y se mejora la idiomaticidad de ἐκ γενετῆς con «de nacimiento», sin cambiar el sentido del original ni las decisiones léxicas fundamentales.
