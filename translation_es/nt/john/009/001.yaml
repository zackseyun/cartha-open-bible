translation:
  language: es
  text: Y al pasar[a], vio a un hombre ciego de nacimiento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mientras pasaba»; el participio griego presenta a Jesús en el acto de ir pasando cuando vio al hombre.
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Y entonces
  lexicon: BDAG
  rationale: La conjunción mantiene el enlace narrativo simple y natural con el contexto previo; en español, «Y» conserva esa continuidad sin añadir matiz temporal no explícito.
- source_word: παράγων
  english_pob_choice: as he was passing by
  chosen_spanish: al pasar
  alternatives_spanish:
  - mientras pasaba
  - pasando
  lexicon: BDAG
  rationale: El participio presente se vierte como una acción concomitante en español. «Al pasar» preserva el valor de trasfondo y resulta más idiomático que una traducción mecánica.
- source_word: εἶδεν
  english_pob_choice: he saw
  chosen_spanish: vio
  alternatives_spanish:
  - se dio cuenta de
  - notó
  lexicon: BDAG
  rationale: El aoristo de ὁράω se traduce de forma directa con «vio», sin introducir una matización interpretativa ajena al texto.
- source_word: ἄνθρωπον
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - un ser humano
  lexicon: BDAG
  rationale: Aquí ἄνθρωπος designa a un individuo concreto en la narración; «un hombre» es la equivalencia más natural y precisa en español.
- source_word: τυφλὸν
  english_pob_choice: blind
  chosen_spanish: ciego
  alternatives_spanish:
  - un ciego
  lexicon: BDAG
  rationale: El adjetivo se conserva como atributo de «hombre» y no se nominaliza. «Ciego» reproduce bien la cualidad descriptiva del griego sin añadir palabras innecesarias.
- source_word: ἐκ γενετῆς
  english_pob_choice: from birth
  chosen_spanish: desde su nacimiento
  alternatives_spanish:
  - desde el nacimiento
  - de nacimiento
  lexicon: BDAG
  rationale: La expresión idiomática indica ceguera congénita. «Desde su nacimiento» comunica de manera clara y natural que la condición existía desde ese momento.
theological_decisions:
- issue: Renderizado de ἄνθρωπον en un contexto narrativo específico
  english_pob_reading: a man
  chosen_spanish_reading: un hombre
  alternative_spanish_readings:
  - una persona
  - un ser humano
  rationale: Aunque el término puede ser genérico, el contexto presenta a un individuo masculino específico. «Un hombre» sigue la lectura del POB inglés y evita una neutralización no exigida por el griego.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: 'El POB inglés no introdujo cambios de revisión en este versículo; la versión española sigue de cerca la misma decisión óptima: conectivo narrativo simple, participio con valor de trasfondo, verbo visual directo y ceguera congénita expresada de forma idiomática.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiere; este versículo no lo contiene.
  - «ciego» se mantiene como adjetivo descriptivo, en paralelo con el inglés «blind».
  - La nota [a] preserva la alternativa del participio griego sin sobrecargar el cuerpo del texto.
