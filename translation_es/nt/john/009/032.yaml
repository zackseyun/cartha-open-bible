revisions:
- from: Desde antiguo no se ha oído que nadie abriera los ojos de uno que nació ciego[a].
  to: Desde antiguo no se ha oído que alguien haya abierto los ojos de alguien nacido ciego[a].
  rationale: 'Se ajusta la subordinada para reflejar mejor el griego y el español natural: «alguien haya abierto» conserva el indefinido τις y evita el giro menos idiomático «nadie abriera». «Alguien nacido ciego» expresa con mayor naturalidad τυφλοῦ γεγεννημένου sin añadir «hombre» ni perder el sentido de ceguera desde nacimiento. Se conserva «Desde antiguo» y la nota alternativa porque siguen bien la decisión auditada.'
