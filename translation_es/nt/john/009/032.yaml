translation:
  language: es
  text: Desde antiguo no se ha oído que alguien haya abierto los ojos de alguien nacido ciego[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Desde que existe el mundo no se ha oído …»'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκ τοῦ αἰῶνος
  english_pob_choice: From of old
  chosen_spanish: Desde antiguo
  alternatives_spanish:
  - Desde que existe el mundo
  - Desde la antigüedad
  - Nunca antes
  lexicon: BDAG
  rationale: El giro griego es idiomático y señala el transcurso de toda la memoria histórica, no una afirmación metafísica sobre la eternidad. «Desde antiguo» conserva ese valor temporal e idiomático en español, con naturalidad y sin exagerar el alcance.
- source_word: οὐκ ἠκούσθη
  english_pob_choice: it has never been heard
  chosen_spanish: no se ha oído
  alternatives_spanish:
  - nunca se oyó
  - no se había oído
  - no se ha escuchado
  lexicon: BDAG
  rationale: El pasivo idiomático comunica que no existe precedente conocido. En español, «no se ha oído» reproduce bien la fuerza de «has never been heard» y mantiene el matiz impersonal sin volver la frase rígida.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - cómo
  - de que
  lexicon: BDAG
  rationale: Introduce de manera directa el contenido de lo que no se ha oído. «Que» es la opción más simple y fiel en español.
- source_word: ἠνέῳξέν
  english_pob_choice: opened
  chosen_spanish: abriera
  alternatives_spanish:
  - abrió
  - hubiera abierto
  - abriera los ojos
  lexicon: BDAG
  rationale: Con «ojos», el verbo φυσικό ἀνοίγω se expresa de forma natural como «abrir». El subjuntivo imperfecto «abriera» refleja bien la subordinación negativa y el valor de precedente inexistente en español.
- source_word: τις
  english_pob_choice: anyone
  chosen_spanish: nadie
  alternatives_spanish:
  - alguien
  - una persona
  - ninguno
  lexicon: BDAG
  rationale: Aunque el griego usa un indefinido positivo dentro de una negación, el español suele expresar el conjunto con «nadie» en este contexto. Mantiene la fuerza universal negativa del enunciado.
- source_word: ὀφθαλμοὺς
  english_pob_choice: the eyes
  chosen_spanish: los ojos
  alternatives_spanish:
  - ojos
  lexicon: BDAG
  rationale: La imagen corporal se conserva literalmente. En español, el artículo definido es natural en esta construcción.
- source_word: τυφλοῦ γεγεννημένου
  english_pob_choice: of one born blind
  chosen_spanish: de uno que nació ciego
  alternatives_spanish:
  - de un ciego de nacimiento
  - de uno nacido ciego
  - de un hombre ciego de nacimiento
  lexicon: BDAG
  rationale: La frase griega describe a una persona ciega desde el nacimiento. «De uno que nació ciego» refleja con claridad el participio perfecto y evita añadir «hombre» donde el griego no lo exige; además preserva la tensión entre una formulación literal y una más idiomática.
theological_decisions:
- issue: Alcance temporal de ἐκ τοῦ αἰῶνος
  english_pob_reading: historical idiom meaning 'from of old' / 'never in recorded memory'
  chosen_spanish_reading: 'idioma histórico: «desde antiguo» / «no se ha oído»'
  alternative_spanish_readings:
  - desde la eternidad
  - desde que el mundo comenzó
  - nunca antes
  rationale: La declaración del ciego se refiere al testimonio humano y al precedente histórico, no a una afirmación sobre la eternidad divina. La traducción conserva ese alcance sin ampliarlo innecesariamente.
  doctrine_reference: Translation philosophy §1, §3
- issue: Valor universal de τις bajo negación
  english_pob_reading: anyone
  chosen_spanish_reading: nadie
  alternative_spanish_readings:
  - ninguna persona
  - alguien
  rationale: En español, la negación natural requiere concordancia negativa en este tipo de construcción. «Nadie» mantiene el sentido universal negativo del griego sin alterar la afirmación.
  doctrine_reference: Sintaxis española de negación; fidelidad funcional al indefinido griego
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego y el audit trail inglés: mantiene el idiomatismo temporal de ἐκ τοῦ αἰῶνος, el pasivo impersonal de οὐκ ἠκούσθη, y la ausencia de un sustantivo explícito como «hombre» en τυφλοῦ γεγεννημένου. También ajusta la sintaxis al español para que la negación suene natural sin perder la fuerza universal del original.'
  spanish_consistency_notes:
  - Se usa «ciego» como adjetivo para reproducir la descripción de estado desde el nacimiento.
  - Se evita «Cristo»/«Mesías» porque el versículo no contiene esos términos.
  - «Desde antiguo» se mantiene como equivalente idiomático, no metafísico, de ἐκ τοῦ αἰῶνος.
  - La nota alternativa conserva la posibilidad documentada en el audit trail inglés sin desplazar el texto principal.
