base_translation:
  language: en
  yaml_path: translation/nt/john/009/034.yaml
  text: They answered and said to him[a], “You were born entirely in sins[c][b], and are you teaching us?” And they cast him out.
  footnotes:
  - marker: a
    text: Or “You were born completely in sin.” The Greek is literally plural, “in sins,” preserving the force of the accusers’ insult.
    reason: lexical_alternative
  - marker: b
    text: Or “they cast him out.” This may refer to expelling him from their presence, and in context may also imply exclusion from the synagogue community.
    reason: alternative_reading
  - marker: c
    text: Or 'entirely in sins'.
    reason: previous_rendering
