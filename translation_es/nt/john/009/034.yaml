translation:
  language: es
  text: 'Ellos le respondieron y dijeron: «Tú naciste totalmente[a] en pecados, ¿y tú nos enseñas?». Y lo echaron fuera[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «completamente». El griego usa un plural, «en pecados», y no singular «en pecado», conservando la fuerza insultante de la acusación.
    reason: lexical_alternative
  - marker: b
    text: O «lo expulsaron». Puede referirse a echarlo de su presencia y, por el contexto, también a excluirlo de la comunidad de la sinagoga.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀπεκρίθησαν καὶ εἶπαν
  english_pob_choice: They answered and said
  chosen_spanish: le respondieron y dijeron
  alternatives_spanish:
  - respondieron
  - le respondieron
  lexicon: BDAG
  rationale: Conservo la doble formulación narrativa del griego sin volverla redundante en español. «Respondieron y dijeron» mantiene el énfasis retórico; el objeto indirecto «le» hace explícito el destinatario del habla.
- source_word: Ἐν ἁμαρτίαις
  english_pob_choice: in sins
  chosen_spanish: en pecados
  alternatives_spanish:
  - en pecado
  - como pecador
  - en culpa
  lexicon: BDAG
  rationale: Mantengo el plural «pecados» para reflejar el plural dativo griego y no suavizar la acusación. No se resuelve aquí si alude a pecado propio, culpa heredada o condición moral; el español conserva esa tensión.
- source_word: ἐγεννήθης ὅλος
  english_pob_choice: were born entirely
  chosen_spanish: naciste totalmente
  alternatives_spanish:
  - naciste completamente
  - naciste enteramente
  - naciste por completo
  lexicon: BDAG
  rationale: «Totalmente» comunica la fuerza de ὅλος como intensificador de la condición desde el nacimiento. Evita una construcción menos natural como «fuiste nacido» y conserva el insulto de los acusadores.
- source_word: καὶ σὺ διδάσκεις ἡμᾶς;
  english_pob_choice: and are you teaching us?
  chosen_spanish: ¿y tú nos enseñas?
  alternatives_spanish:
  - ¿y nos enseñas tú?
  - ¿y eres tú quien nos enseña?
  lexicon: BDAG
  rationale: El presente de indicativo con σὺ expresa una recriminación irónica. «¿Y tú nos enseñas?» reproduce el tono despectivo y la pregunta retórica de forma natural en español.
- source_word: ἐξέβαλον αὐτὸν ἔξω
  english_pob_choice: they cast him out
  chosen_spanish: lo expulsaron fuera
  alternatives_spanish:
  - lo echaron fuera
  - lo sacaron fuera
  - lo arrojaron fuera
  lexicon: BDAG
  rationale: «Expulsaron» conserva el carácter formal y hostil de ἐξέβαλον. Añadí «fuera» para reflejar ἔξω y mantener la imagen de expulsión; «cast him out» en el inglés POB se refleja mejor con este verbo que con una simple salida voluntaria.
theological_decisions:
- issue: Alcance de la acusación 'naciste en pecados'
  english_pob_reading: The line is rendered as the speakers' hostile accusation that the man was born wholly marked by sins, without specifying whether they mean his own sin, inherited sin, or sin associated with his condition.
  chosen_spanish_reading: La frase se presenta como una acusación hostil de que el hombre nació totalmente marcado por pecados, sin precisar si se refieren a pecado propio, culpa heredada o relación de su condición con el pecado.
  alternative_spanish_readings:
  - Naciste en pecado
  - Naciste como un pecador completo
  - Naciste bajo la culpa de los pecados de tus padres
  rationale: El griego no aclara la teología subyacente; por eso el español debe preservar la ambigüedad sin añadir una explicación doctrinal que el texto no da. Esto mantiene la tensión entre sufrimiento, pecado y juicio implícita en el insulto.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: El texto sigue la revisión más reciente del inglés POB, que prefirió «cast him out» sobre «threw him out» por un registro más formal y por ajustarse mejor a ἐξέβαλον. También se conserva la decisión de mantener el plural «in sins» y la ambigüedad teológica del insulto.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se mantiene «pecados» en plural para reflejar el griego ἁμαρτίαις.
  - «Expulsaron» refleja la hostilidad de ἐξέβαλον sin volver el texto excesivamente coloquial.
  - La puntuación española mantiene la estructura de cita directa y pregunta retórica del original.
