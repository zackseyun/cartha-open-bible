  rationale: Se corrige el objeto indirecto al singular para reflejar αὐτῷ con precisión. También se ajusta el demostrativo a «ese hombre» para preservar la fuerza de ἐκεῖνος de manera más idiomática en español, en línea con la lógica del POB inglés. Se conserva el presente histórico «Él dice» y la respuesta natural «No lo sé».
