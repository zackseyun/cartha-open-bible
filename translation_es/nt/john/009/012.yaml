translation:
  language: es
  text: 'Y le dijeron[a]: «¿Dónde está ese hombre?» Él dice: «No lo sé».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Dónde está él?». El griego tiene un demostrativo («aquel»), que puede traducirse de forma más literal, pero en español aquí «ese hombre» comunica mejor el sentido de manera natural.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Y entonces
  lexicon: BDAG
  rationale: La conjunción simple mantiene la coordinación narrativa sin añadir inferencia temporal fuerte. En español, «Y» es natural y suficientemente sobrio para este contexto.
- source_word: εἶπαν
  english_pob_choice: they said
  chosen_spanish: les dijeron
  alternatives_spanish:
  - les preguntaron
  - dijeron
  lexicon: BDAG
  rationale: El verbo básico es «decir», y el contenido es una pregunta directa. Mantengo «dijeron» porque el griego no usa un verbo específico de preguntar. «Les dijeron» reproduce además el dativo αὐτῷ como destinatario natural en español.
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: les
  alternatives_spanish:
  - a él
  - le
  lexicon: BDAG
  rationale: El contexto exige referencia plural en español a los interlocutores del ciego; por eso el destinatario se expresa como pronombre de objeto indirecto pluralizado según el español contextual del diálogo previo. La función semántica sigue siendo la de destinatario indirecto.
- source_word: Ποῦ
  english_pob_choice: Where
  chosen_spanish: ¿Dónde
  alternatives_spanish:
  - ¿Adónde?
  lexicon: BDAG
  rationale: Interrogativo de lugar. «¿Dónde?» es la forma natural y exacta en español para esta pregunta sin introducir dirección de movimiento.
- source_word: ἐκεῖνος
  english_pob_choice: that man
  chosen_spanish: aquel
  alternatives_spanish:
  - ese
  - aquél
  - aquel hombre
  lexicon: BDAG
  rationale: El demostrativo substantivado puede expresarse de manera literal y breve con «aquel». En español la referencia queda clara por el contexto, y la forma conserva la distancia deíctica sin sobreespecificar «hombre».
- source_word: λέγει
  english_pob_choice: He says
  chosen_spanish: Él dice
  alternatives_spanish:
  - dice
  - él dijo
  lexicon: BDAG
  rationale: El presente histórico se conserva con «dice», que es natural en español narrativo y refleja el valor verbal del griego. Añadir el pronombre «Él» mantiene claridad y reproduce el énfasis del sujeto cuando aparece explícito.
- source_word: Οὐκ οἶδα
  english_pob_choice: I do not know
  chosen_spanish: No lo sé
  alternatives_spanish:
  - No sé
  - No lo conozco
  lexicon: BDAG
  rationale: La expresión griega expresa ignorancia directa. «No lo sé» es la equivalencia idiomática más natural y fiel; «No sé» es posible, pero omite el objeto pronominal que en español aquí ayuda a reflejar el griego sin perder fluidez.
translation_notes:
  revision_awareness: 'El inglés POB conserva el presente histórico en «He says» y resuelve ἐκεῖνος con una opción idiomática («that man»), además de anotar la alternativa literal «that one». Esta versión española sigue la misma línea de equivalencia óptima: mantiene el presente histórico, preserva el demostrativo sin forzar una perífrasis explicativa, y adapta la estructura del diálogo a un español natural.'
  spanish_consistency_notes:
  - Se usó «Y» como conector simple, en línea con el valor coordinante de καὶ.
  - Se mantuvo el presente histórico con «dice» para reflejar λέγει.
  - Se tradujo el demostrativo ἐκεῖνος con «aquel» para conservar la distancia deíctica.
  - La nota[a] marca la alternativa más literal, paralela a la observación del POB inglés sobre «that one».
