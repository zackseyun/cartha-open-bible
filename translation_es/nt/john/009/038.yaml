translation:
  language: es
  text: 'Y él dijo: «Creo, Señor[a]», y lo adoró[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «señor». El griego κύριε puede ser una forma respetuosa de tratamiento; aquí se prefiere «Señor» porque el contexto culmina en confesión y adoración.
    reason: alternative_reading
  - marker: b
    text: O «se postró ante él» / «le rindió homenaje». El verbo griego puede denotar postración u homenaje; aquí se traduce «lo adoró» por el peso del contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δὲ
  english_pob_choice: And he
  chosen_spanish: Y él
  alternatives_spanish:
  - Entonces él
  - Pero él
  lexicon: BDAG
  rationale: El artículo con valor pronominal remite al hombre sanado; en español, «él» conserva la referencia sin añadir contraste. «Y» reproduce la conexión narrativa de δέ con naturalidad, sin forzar una oposición que el contexto no exige.
- source_word: ἔφη
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - decía
  - declaró
  lexicon: BDAG
  rationale: El aoristo narrativo de φημί introduce el discurso directo de forma sencilla. «Dijo» es la opción más natural y fiel en español.
- source_word: Πιστεύω
  english_pob_choice: I believe
  chosen_spanish: Creo
  alternatives_spanish:
  - Confío
  - Tengo fe
  lexicon: BDAG
  rationale: πιστεύω aquí expresa la respuesta de fe del hombre a la revelación de Jesús. «Creo» mantiene el vínculo con el lenguaje joánico de creer sin paraprasear.
- source_word: κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - señor
  - maestro
  lexicon: BDAG
  rationale: Siguiendo el valor elevado que el contexto da a κύριε, «Señor» expresa mejor la confesión que una traducción meramente cortés como «señor». En español, la mayúscula inicial puede marcar la dignidad del título en la cita directa.
- source_word: προσεκύνησεν
  english_pob_choice: worshiped
  chosen_spanish: lo adoró
  alternatives_spanish:
  - se postró ante él
  - le rindió homenaje
  lexicon: BDAG
  rationale: En Juan, tras la confesión de fe, προσκυνέω dirigido a Jesús se entiende con fuerza cultual. «Lo adoró» preserva esa fuerza; las alternativas más suaves siguen siendo lexicalmente posibles, pero menos explícitas.
- source_word: αὐτῷ
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - ante él
  - a él
  lexicon: BDAG
  rationale: El dativo con προσκυνέω se expresa de manera natural en español con objeto directo cuando el sentido es «adorar a alguien». «Lo» mantiene la relación con Jesús sin expansión interpretativa en el cuerpo del texto.
theological_decisions:
- issue: Si κύριε debe sonar como un simple trato respetuoso o como una confesión cristológica más elevada
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - señor
  - maestro
  rationale: El contexto culmina en fe y adoración, por lo que el valor de κύριε es más alto que un mero «señor» cortés. «Señor» preserva esa carga cristológica sin añadir contenido no sustentado por el texto.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (κύριος → Lord); Translation philosophy items 2 and 3'
- issue: Si προσεκύνησεν debe traducirse con un verbo explícitamente religioso o con una formulación más general de homenaje
  english_pob_reading: worshiped
  chosen_spanish_reading: lo adoró
  alternative_spanish_readings:
  - se postró ante él
  - le rindió homenaje
  rationale: El objeto es Jesús y la escena sigue a una confesión explícita de fe; por eso, una lectura de adoración es la más probable. Se preservan alternativas menos explícitas para auditar la posibilidad lexical de homenaje o postración.
  doctrine_reference: 'DOCTRINE.md: Affirmations (historic ecumenical orthodoxy); Translation philosophy item 3'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; el borrador español mantiene esa alineación con el texto griego y con el expediente auditado en inglés.
  spanish_consistency_notes:
  - Se mantuvo el valor narrativo breve de ὁ δὲ con una solución natural en español.
  - «Señor» se usó como título elevado, coherente con el contexto de confesión y adoración.
  - Se conservó la equivalencia fuerte de προσεκύνησεν como «adoró», con nota de alternativas.
  - La puntuación de cita directa sigue el estilo español con comillas angulares.
