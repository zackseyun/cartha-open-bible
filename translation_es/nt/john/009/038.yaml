    text: Or “Sir.” The Greek κύριε can be a respectful form of address; here “Lord” is preferred because the context climaxes in confession and worship.
    reason: alternative_reading
  - marker: b
    text: Or “bowed down before him” / “paid homage to him.” The Greek verb can denote prostration or homage; here it is rendered “worshiped” in view of the context.
    reason: lexical_alternative
