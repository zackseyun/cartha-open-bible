translation:
  language: es
  text: 'Juan da testimonio acerca de él y ha clamado, diciendo: «Este era de quien yo dije: “El que viene después de mí ha llegado a estar delante de mí[a], porque era antes que yo[b]”»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «ha tomado precedencia sobre mí» / «me ha superado». El griego puede expresar prioridad o rango, además de secuencia.
    reason: lexical_alternative
  - marker: b
    text: O, «existía antes que yo». La redacción «era antes que yo» conserva más de cerca el griego y, en su contexto, todavía permite la implicación de preexistencia.
    reason: alternative_reading
lexical_decisions:
- source_word: μαρτυρεῖ
  english_pob_choice: testifies
  chosen_spanish: da testimonio
  alternatives_spanish:
  - testifica
  - testimonia
  lexicon: BDAG
  rationale: «Da testimonio» conserva el sentido forense/de testigo de μαρτυρέω y suena natural en español bíblico contemporáneo sin volverse arcaico.
- source_word: περὶ αὐτοῦ
  english_pob_choice: about him
  chosen_spanish: acerca de él
  alternatives_spanish:
  - sobre él
  - con respecto a él
  lexicon: BDAG
  rationale: «Acerca de él» refleja bien περί con genitivo en este contexto y evita un calco demasiado rígido.
- source_word: κέκραγεν
  english_pob_choice: has cried out
  chosen_spanish: ha clamado
  alternatives_spanish:
  - ha gritado
  - ha proclamado en voz alta
  lexicon: BDAG
  rationale: El perfecto se conserva con «ha clamado», que mantiene el valor de acción completa con vigencia resultante y expresa el tono intenso del verbo mejor que un simple pasado.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  lexicon: BDAG
  rationale: El participio se vierte naturalmente con «diciendo», manteniendo la relación subordinada sin añadir interpretación.
- source_word: Οὗτος ἦν ⸂ὃν εἶπον⸃
  english_pob_choice: This was he of whom I said
  chosen_spanish: Este era de quien yo dije
  alternatives_spanish:
  - Este era aquel de quien yo dije
  - Este era el que yo dije
  lexicon: BDAG
  rationale: «Este era de quien yo dije» reproduce la referencia pasada de ἦν y la construcción relativa con la menor expansión posible; «de quien» preserva la relación del relativo sin forzar un giro más explicativo.
- source_word: Ὁ ὀπίσω μου ἐρχόμενος
  english_pob_choice: The one coming after me
  chosen_spanish: El que viene después de mí
  alternatives_spanish:
  - El que viene detrás de mí
  - El que venía después de mí
  lexicon: BDAG
  rationale: La frase sustantivada se traduce de manera idiomática como «El que viene después de mí», conservando la idea temporal/secuencial y el valor de participio presente.
- source_word: ἔμπροσθέν μου γέγονεν
  english_pob_choice: has become before me
  chosen_spanish: ha llegado a estar delante de mí
  alternatives_spanish:
  - ha quedado delante de mí
  - ha pasado a estar delante de mí
  - ha llegado a precederme
  lexicon: BDAG
  rationale: «Ha llegado a estar delante de mí» preserva el perfecto de γίνομαι y la imagen espacial/comparativa de ἔμπροσθεν sin resolver prematuramente la posible tensión entre prioridad y rango; evita equivalencias demasiado interpretativas como «ha precedido/superado».
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: «Porque» expresa con claridad la relación causal introducida por ὅτι en español corriente.
- source_word: πρῶτός μου ἦν
  english_pob_choice: he was before me
  chosen_spanish: era antes que yo
  alternatives_spanish:
  - estaba antes que yo
  - existía antes que yo
  lexicon: BDAG
  rationale: «Era antes que yo» preserva la afirmación comparativa de prioridad con una formulación breve y natural en español, sin explicitar más de lo que el griego dice; deja intacta la implicación de preexistencia que el contexto joánico desarrolla.
theological_decisions:
- issue: Cómo traducir ἔμπροσθέν μου γέγονεν sin resolver la tensión entre prioridad, rango y posible precedencia
  english_pob_reading: The one coming after me has become before me; the Greek can express priority or rank as well as sequence.
  chosen_spanish_reading: El que viene después de mí ha llegado a estar delante de mí.
  alternative_spanish_readings:
  - El que viene después de mí ha tomado precedencia sobre mí
  - El que viene después de mí me ha superado
  - El que viene después de mí ha llegado a precederme
  rationale: 'La redacción española conserva la ambigüedad útil del griego: puede aludir a orden temporal, rango o precedencia sin imponer una interpretación doctrinal prematura. «Delante de mí» mantiene la imagen espacial de ἔμπροσθεν y permite que el contexto haga el trabajo teológico.'
  doctrine_reference: Preservar la tensión textual; cristología joánica y preexistencia afirmadas por el contexto, no forzadas por la traducción.
- issue: Cómo reflejar πρῶτός μου ἦν en relación con la preexistencia de Cristo
  english_pob_reading: he was before me / he existed before me
  chosen_spanish_reading: era antes que yo
  alternative_spanish_readings:
  - existía antes que yo
  - estaba antes que yo
  rationale: «Era antes que yo» reproduce la comparación de prioridad con sobriedad y deja abierta la implicación de preexistencia. No se añade «existía» porque eso explicita más de lo que el texto griego dice de manera directa; la teología se apoya en el contexto amplio de Juan.
  doctrine_reference: Cristología alta joánica; mantener la tensión entre literalidad y implicación doctrinal sin sobre-interpretar.
translation_notes:
  revision_awareness: Se tuvo en cuenta el cierre de revisión más reciente (sin cambios) y el dictamen de concordancia moderada; no se adoptaron lecturas más interpretativas que las del audit trail en inglés, pero se ajustó el español para sonar natural y mantener la ambigüedad fuente cuando corresponde.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma POB general, pero este versículo no contiene el nombre divino.
  - Se usó «Cristo/Mesías» no aplica aquí; el referente es Juan y el testimonio sobre Jesús implícito en el contexto.
  - Se prefirió «da testimonio» para μαρτυρεῖ por consistencia con el campo semántico judicial del texto joánico.
  - Se evitó «siervo» u otras sustituciones no motivadas; no aparece δοῦλος en este versículo.
  - Se conservó el valor de perfectos griegos con «ha clamado» y «ha llegado a estar», siguiendo la preferencia POB por no aplanar aspectualmente el texto.
