base_translation:
  language: en
  yaml_path: translation/nt/john/001/015.yaml
  text: John testifies about him and has cried out[a], saying, “This was he of whom I said, ‘The one coming after me has become before me[b], because he was before me.’”
  footnotes:
  - marker: a
    text: Or, “has taken precedence over me” / “has surpassed me” for “has become before me.” The Greek can express priority or rank as well as sequence.
    reason: lexical_alternative
  - marker: b
    text: Or, “he existed before me.” The wording 'he was before me' preserves the Greek more closely while still allowing the implication of preexistence in context.
    reason: alternative_reading
