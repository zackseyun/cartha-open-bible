translation:
  language: es
  text: Y yo he visto y he dado testimonio de que este es el Elegido[a] de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos leen «el Hijo de Dios» en lugar de «el Elegido de Dios».
    reason: textual_variant
lexical_decisions:
- source_word: κἀγώ
  english_pob_choice: And I
  chosen_spanish: Y yo
  alternatives_spanish:
  - Y también yo
  - Yo también
  lexicon: BDAG
  rationale: El crasis añade continuidad y énfasis del sujeto. En español, 'Y yo' conserva la conexión discursiva con la frase anterior y el énfasis personal sin sobrecargar el verso.
- source_word: ἑώρακα
  english_pob_choice: have seen
  chosen_spanish: he visto
  alternatives_spanish:
  - vi
  lexicon: BDAG
  rationale: El perfecto griego expresa una visión pasada con vigencia presente. 'He visto' reproduce esa fuerza aspectual de modo natural en español.
- source_word: μεμαρτύρηκα
  english_pob_choice: have testified
  chosen_spanish: he testificado
  alternatives_spanish:
  - he dado testimonio
  - he testificado como testigo
  lexicon: BDAG
  rationale: El perfecto indica una acción concluida con validez actual. 'He testificado' mantiene el paralelismo con 'he visto' y conserva el valor formal del testimonio.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  lexicon: BDAG
  rationale: Aquí introduce el contenido del testimonio, no una causa. 'Que' es la equivalencia directa y natural en español.
- source_word: οὗτός
  english_pob_choice: this
  chosen_spanish: este
  alternatives_spanish:
  - este mismo
  - él
  lexicon: BDAG
  rationale: El demostrativo señala de manera inmediata a Jesús. 'Este' conserva la deíxis del griego y funciona bien en español.
- source_word: ἐκλεκτός
  english_pob_choice: Chosen One
  chosen_spanish: Elegido
  alternatives_spanish:
  - Escogido
  - Elegido de Dios
  - Electo
  lexicon: BDAG
  rationale: El adjetivo está sustantivado con artículo, por lo que conviene un sustantivo/adjetivo nominal en español. 'Elegido' es claro y refleja el valor de 'ἐκλεκτός' sin imponer de entrada la tradición eclesiástica de 'Cristo'.
- source_word: τοῦ θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - de parte de Dios
  - de Dios mismo
  lexicon: BDAG
  rationale: El genitivo se vierte de forma directa como 'de Dios', preservando la construcción titular y evitando una interpretación más libre.
theological_decisions:
- issue: Variante textual cristológica en Juan 1:34
  english_pob_reading: the Chosen One of God
  chosen_spanish_reading: el Elegido de Dios
  alternative_spanish_readings:
  - el Hijo de Dios
  - el Elegido
  rationale: El texto griego provisto lee ὁ ἐκλεκτὸς τοῦ θεοῦ; por fidelidad a la fuente, la línea principal debe traducir esa lectura y no armonizarla con la variante más conocida. Se conserva en nota la lectura alternativa 'Hijo de Dios' por su peso textual y teológico.
  doctrine_reference: Translation philosophy §1 (primacía del original) y §3 (preservar tensión textual y teológica)
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego SBLGNT proporcionado y la decisión auditada del POB en inglés. La única tensión importante es la variante textual cristológica; se mantiene en nota sin alterar el texto principal.
  spanish_consistency_notes:
  - Se usa 'Dios' para θεοῦ conforme al estándar del proyecto.
  - Se mantiene el perfecto perifrástico español ('he visto', 'he testificado') para reflejar el aspecto perfectivo con relevancia presente.
  - Se evita 'Cristo' porque el griego aquí no usa Χριστός, y la lectura principal debe seguir ἐκλεκτός/«Elegido».
