translation:
  language: es
  text: el que viene después de mí[a], de quien no soy digno de desatar la correa de su sandalia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «del cual no soy digno de desatar la correa de su sandalia».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ὀπίσω μου ἐρχόμενος
  english_pob_choice: the one coming after me
  chosen_spanish: el que viene después de mí
  alternatives_spanish:
  - el que viene detrás de mí
  - el que viene después de mí
  lexicon: BDAG
  rationale: El participio con artículo funciona como sustantivo y señala a una persona concreta. «Después de mí» conserva el valor temporal/de sucesión de ὀπίσω μου en este contexto, y «el que viene» mantiene el matiz verbal del participio sin volverlo una simple etiqueta nominal.
- source_word: οὗ
  english_pob_choice: whose
  chosen_spanish: de su
  alternatives_spanish:
  - cuyo
  - del cual
  lexicon: BDAG
  rationale: En español, «de su sandalia» comunica con naturalidad la relación genitiva que el griego expresa con οὗ. Aunque «cuyo» sería posible, aquí suena menos natural con el sintagma nominal completo y puede endurecer el ritmo.
- source_word: οὐκ εἰμὶ ἄξιος
  english_pob_choice: I am not worthy
  chosen_spanish: no soy digno
  alternatives_spanish:
  - no soy merecedor
  - no soy apto
  lexicon: BDAG
  rationale: Ἄξιος expresa dignidad o idoneidad. «No soy digno» es la equivalencia española más natural y fiel, y preserva la humildad del hablante sin añadir matices ajenos.
- source_word: ἵνα λύσω
  english_pob_choice: to untie
  chosen_spanish: desatar
  alternatives_spanish:
  - soltar
  - desatar la correa
  lexicon: BDAG
  rationale: Aunque λύω literalmente es «desatar/soltar», en este contexto de calzado la acción concreta se entiende mejor como desatar la correa. En español, «desatar» reproduce bien el gesto sin necesitar una perífrasis artificial.
- source_word: ἱμάντα
  english_pob_choice: strap
  chosen_spanish: correa
  alternatives_spanish:
  - tirante
  - cinta
  - correa
  lexicon: BDAG
  rationale: Ἱμάς puede significar correa, tira o correa de sujeción. «Correa» es clara y digna en español, y evita un término técnico o anticuado que distraería del sentido.
- source_word: τοῦ ὑποδήματος
  english_pob_choice: sandal
  chosen_spanish: de su sandalia
  alternatives_spanish:
  - del calzado
  - de su zapato
  lexicon: BDAG
  rationale: Ὑπόδημα designa aquí una sandalia o calzado de ese tipo. «Sandalia» es la opción más precisa para el contexto histórico-cultural, y se ajusta mejor que «zapato», que en español moderno puede sugerir un objeto anacrónico.
theological_decisions:
- issue: Relación de «después de mí» con el que viene
  english_pob_reading: 'Rendered as temporal/successive: ''coming after me'''
  chosen_spanish_reading: 'Se mantiene como sucesión temporal: «viene después de mí»'
  alternative_spanish_readings:
  - viene detrás de mí
  rationale: En el contexto joánico, la frase introduce al que sigue a Juan en el orden del ministerio y, por contexto más amplio, superior a él. La traducción conserva la sucesión sin explicitar aquí la interpretación cristológica completa, para no resolver la tensión que el pasaje deja abierta.
  doctrine_reference: Preservar la tensión teológica y contextual sin sobreexplicar.
translation_notes:
  revision_awareness: 'Coincide con la lectura auditada en inglés: se conserva la estructura básica, sin cambios necesarios respecto del último pase revisado. La decisión principal en español es mantener la naturalidad de «el que viene después de mí» y ajustar el complemento genitivo con «de su sandalia».'
  spanish_consistency_notes:
  - Se mantiene «sandalia» para ὑπόδημα, conforme al contexto histórico.
  - Se conserva «digno» para ἄξιος, en línea con el valor de worthiness del texto griego.
  - La nota al pie recoge una alternativa más literal sin duplicar el sentido del texto principal.
