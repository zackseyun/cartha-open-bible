    rationale: El griego οὗ introduce una relación posesiva que el inglés POB resolvió como «whose». En español, «del cual no soy digno de desatar la correa de su sandalia» se entiende, pero resulta más pesado y menos idiomático que «cuya sandalia...» o una reformulación equivalente.
  - severity: medium
    issue: La nota al pie marcada [a] no ofrece una alternativa más literal fiel al griego.
    rationale: 'La nota actual dice «del que yo no soy digno...», pero la forma más literal según el expediente inglés conserva mejor «de quien / del cual» con la estructura completa: «de quien no soy digno de desatar la correa de su sandalia» o «del cual no soy digno de desatar...». La nota actual no añade valor frente al texto principal y además no refleja con precisión la construcción comentada en el audit trail.'
