translation:
  language: es
  text: Todas las cosas llegaron a ser por medio de él[a], y aparte de él no llegó a ser ni una sola cosa que ha llegado a ser.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, comenzando con el versículo 4: «Lo que ha llegado a ser en él era vida».'
    reason: alternative_reading
lexical_decisions:
- source_word: πάντα
  english_pob_choice: All things
  chosen_spanish: Todas las cosas
  alternatives_spanish:
  - todo
  - todo cuanto
  lexicon: BDAG
  rationale: El plural neutro tiene alcance universal y cósmico. «Todas las cosas» conserva mejor esa totalidad que un singular colectivo como «todo», y sigue de cerca la amplitud del griego sin sonar rígido en español.
- source_word: δι’ αὐτοῦ
  english_pob_choice: through him
  chosen_spanish: por medio de él
  alternatives_spanish:
  - a través de él
  - por él
  lexicon: BDAG
  rationale: La preposición διά con genitivo expresa medio o agencia. «Por medio de él» comunica con claridad que la creación ocurrió mediante su intervención, sin perder la idea instrumental del original.
- source_word: ἐγένετο
  english_pob_choice: came into being
  chosen_spanish: llegaron a ser
  alternatives_spanish:
  - fueron hechas
  - vinieron a existir
  lexicon: BDAG
  rationale: γίνομαι aquí señala llegar a existir, no solo fabricar. «Llegaron a ser» preserva el matiz ontológico y el alcance plural de «πάντα». Mantiene también el contraste con el que crea, sin convertir el verbo en una mera noción artesanal.
- source_word: χωρὶς αὐτοῦ
  english_pob_choice: apart from him
  chosen_spanish: aparte de él
  alternatives_spanish:
  - sin él
  - separados de él
  lexicon: BDAG
  rationale: 'χωρίς expresa ausencia o separación. «Aparte de él» suena natural en español y mantiene la idea de exclusión absoluta: nada llegó a existir independientemente de él.'
- source_word: οὐδὲ ἕν
  english_pob_choice: not even one thing
  chosen_spanish: ni una sola cosa
  alternatives_spanish:
  - ni una cosa
  - nada
  lexicon: BDAG
  rationale: La frase es enfática. «Ni una sola cosa» reproduce bien la fuerza exhaustiva de οὐδὲ ἕν y evita debilitarla con un simple «nada», que sería más interpretativo.
- source_word: ὃ γέγονεν
  english_pob_choice: that has come into being
  chosen_spanish: de las que han llegado a ser
  alternatives_spanish:
  - que han llegado a ser
  - lo que ha llegado a ser
  lexicon: BDAG
  rationale: 'Dado que el texto griego puede leerse con este miembro final unido al v. 3, el español lo integra de modo natural en la cláusula restrictiva: «de las que han llegado a ser». Así se conserva la lectura auditada sin imponer la otra partición.'
theological_decisions:
- issue: Alcance de la creación respecto al Logos
  english_pob_reading: All things came into being through him, and apart from him not even one thing came into being...
  chosen_spanish_reading: Todas las cosas llegaron a ser por medio de él, y aparte de él no llegó a ser ni una sola cosa...
  alternative_spanish_readings:
  - Todas las cosas fueron hechas por medio de él...
  - Todo llegó a ser por medio de él...
  rationale: La redacción conserva la afirmación total sobre el papel del Logos en la creación, sin suavizarla ni reinterpretarla. «Llegaron a ser» mantiene la tensión entre origen y agencia divina que el griego y la POB inglesa preservan.
  doctrine_reference: Juan 1:3; doctrina de la creación mediada por el Logos
- issue: Unión ambigua del miembro final ὃ γέγονεν
  english_pob_reading: 'Attach the clause to verse 3: ''not even one thing came into being that has come into being.'''
  chosen_spanish_reading: '...ni una sola cosa de las que han llegado a ser.'
  alternative_spanish_readings:
  - '...ni una sola cosa. Lo que ha llegado a ser en él era vida.'
  - '...ni una sola cosa que ha llegado a ser.'
  rationale: Se conserva la lectura del POB inglés que une el miembro final al v. 3, pero en español se formula con una relativa natural que no borra la ambigüedad textual. La alternativa para iniciar el v. 4 sigue siendo real y no debe resolverse dentro del cuerpo del verso.
  doctrine_reference: Principio de mantener ambigüedad textual cuando el griego carece de puntuación original; cf. Juan 1:3–4
- issue: Negación enfática
  english_pob_reading: not even one thing
  chosen_spanish_reading: ni una sola cosa
  alternative_spanish_readings:
  - ni una
  - ninguna cosa
  rationale: La negación se intensifica en español con «ni una sola cosa», que transmite el valor enfático del griego mejor que una negación simple.
  doctrine_reference: Énfasis semántico de οὐδὲ ἕν
translation_notes:
  revision_awareness: Se siguió el expediente inglés sin cambios sustantivos, manteniendo la misma decisión sobre la cláusula final ambigua y la equivalencia óptima. No se detectaron revisiones aplicadas en el registro fuente, y el consenso de revisión indica alta concordancia con solo observaciones menores.
  spanish_consistency_notes:
  - Se usó «él» para αὐτοῦ en referencia al Logos, siguiendo el contexto inmediato de Juan 1.
  - Se evitó «hecho» como traducción principal de ἐγένετο para no reducir el sentido ontológico de «llegar a ser».
  - La nota al pie conserva la alternativa de versificación para no borrar la tensión textual documentada.
  - El estilo mantiene solemnidad y legibilidad en español latinoamericano, sin calco innecesario.
