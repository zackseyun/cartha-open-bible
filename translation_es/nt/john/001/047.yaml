translation:
  language: es
  text: 'Jesús vio a Natanael que venía hacia él y dijo de él: «Mira, verdaderamente un israelita en quien no hay engaño[a]».[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no hay doblez».
    reason: lexical_alternative
  - marker: b
    text: O «un israelita de verdad».
    reason: alternative_reading
lexical_decisions:
- source_word: εἶδεν
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - vio
  - observó
  lexicon: BDAG
  rationale: El aoristo de ὁράω se rinde de forma natural y directa con «vio»; mantiene la simpleza narrativa del griego y del audit trail inglés.
- source_word: ἐρχόμενον πρὸς αὐτόν
  english_pob_choice: coming toward him
  chosen_spanish: que venía hacia él
  alternatives_spanish:
  - que venía a él
  - que se acercaba a él
  lexicon: BDAG
  rationale: La forma participial expresa movimiento en dirección a Jesús; «que venía hacia él» conserva ese matiz espacial de manera fluida en español.
- source_word: λέγει περὶ αὐτοῦ
  english_pob_choice: said about him
  chosen_spanish: dijo de él
  alternatives_spanish:
  - dijo acerca de él
  - dijo sobre él
  lexicon: BDAG
  rationale: La construcción περί con genitivo indica que Jesús habla con referencia a Natanael; «dijo de él» es idiomático en español y refleja ese valor relacional.
- source_word: Ἴδε
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira
  - He aquí
  - Ve
  lexicon: BDAG
  rationale: Como interjección de llamada de atención, «Mira» funciona de modo natural en español; se conserva el tono exclamativo sin forzar un arcaísmo innecesario.
- source_word: ἀληθῶς
  english_pob_choice: truly
  chosen_spanish: verdaderamente
  alternatives_spanish:
  - verdaderamente
  - de veras
  - en verdad
  lexicon: BDAG
  rationale: El adverbio intensifica la evaluación; «verdaderamente» preserva el énfasis con registro digno.
- source_word: Ἰσραηλίτης
  english_pob_choice: Israelite
  chosen_spanish: un israelita
  alternatives_spanish:
  - un israelita
  - un hombre de Israel
  lexicon: BDAG
  rationale: El sustantivo designa a un miembro de Israel; «israelita» es el equivalente conciso y estándar en español.
- source_word: ἐν ᾧ
  english_pob_choice: in whom
  chosen_spanish: en quien
  alternatives_spanish:
  - en quien
  - en el cual
  lexicon: BDAG
  rationale: Con antecedente personal, «en quien» conserva la relación relativa natural del griego sin rigidizar la sintaxis.
- source_word: δόλος
  english_pob_choice: deceit
  chosen_spanish: engaño
  alternatives_spanish:
  - engaño
  - astucia
  - guile
  lexicon: BDAG
  rationale: δόλος puede expresar engaño o guile; «engaño» es claro y natural en español contemporáneo, sin perder la fuerza moral del término.
theological_decisions:
- issue: Caracterización de Natanael como ἀληθῶς Ἰσραηλίτης
  english_pob_reading: ‘truly an Israelite’ as a commendation of genuine covenantal integrity, not a denial of ethnic identity to others
  chosen_spanish_reading: «verdaderamente un israelita» como elogio de autenticidad e integridad de pacto, no como negación de la identidad étnica de otros
  alternative_spanish_readings:
  - «un verdadero israelita»
  - «un israelita de verdad»
  - «un israelita auténtico»
  rationale: La frase se explica por la cláusula siguiente («en quien no hay engaño»), por lo que conviene mantener el elogio moral y relacional sin convertirlo en una tesis doctrinal más amplia que el versículo no formula.
  doctrine_reference: Preservar la tensión teológica sin resolverla más allá del texto; no importar afirmaciones doctrinales ajenas al versículo.
translation_notes:
  revision_awareness: El registro inglés fue revisado para usar ‘Behold’ en lugar de ‘Look’ a fin de acercarse al tono formal de Ἴδε; en español se reflejó con «Mira», manteniendo la llamada de atención sin arcaísmo innecesario. Se conservó además la relación directa entre «verdaderamente un israelita» y «en quien no hay engaño».
  spanish_consistency_notes:
  - Se usó «Jesús» para Ἰησοῦς y «Natanael» para Ναθαναήλ, siguiendo la forma estable en español.
  - Se evitó «Señor» o una máscara reverencial, ya que no aparece el nombre divino en este versículo.
  - «En quien» mantiene el relativo personal del griego con naturalidad en español.
  - El par «verdaderamente / engaño» preserva la tensión semántica del original entre elogio positivo y ausencia de dolo.
