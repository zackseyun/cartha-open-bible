    rationale: La revisión debe ser plenamente legible en español. Además, el audit trail inglés preserva la alternativa tradicional, pero en español corresponde expresarla con una opción española equivalente, no transliterar el inglés.
  - severity: low
    issue: La coma en «verdaderamente un israelita, en quien...» resulta algo innecesaria y menos natural.
    rationale: La oración relativa restrictiva fluye mejor sin esa pausa; el sentido del elogio se preserva con mayor naturalidad en español eclesial contemporáneo.
