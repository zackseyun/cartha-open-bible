translation:
  language: es
  text: 'Al día siguiente ve a Jesús venir hacia él y dice[a]: «He aquí el Cordero de Dios, que quita el pecado del mundo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que lleva el pecado del mundo». El verbo griego puede significar tanto quitar/remover como llevar/cargar, y este último matiz puede aludir a imágenes sacrificiales.
    reason: alternative_reading
lexical_decisions:
- source_word: Τῇ ἐπαύριον
  english_pob_choice: The next day
  chosen_spanish: Al día siguiente
  alternatives_spanish:
  - El día siguiente
  - Al siguiente día
  lexicon: BDAG
  rationale: La expresión temporal dativa-adverbial se vierte de manera natural con una fórmula idiomática española que preserva la secuencia narrativa sin añadir información.
- source_word: βλέπει
  english_pob_choice: he sees
  chosen_spanish: ve
  alternatives_spanish:
  - veía
  - vio
  lexicon: BDAG
  rationale: Aunque el inglés POB conserva el presente histórico, en español el presente narrativo aquí resulta natural y mantiene la vivacidad del relato.
- source_word: ἐρχόμενον πρὸς αὐτόν
  english_pob_choice: coming toward him
  chosen_spanish: que venía hacia él
  alternatives_spanish:
  - que venía a él
  - que se acercaba a él
  lexicon: BDAG
  rationale: La frase participial con πρός + acusativo expresa movimiento en dirección a Juan; 'hacia él' conserva bien esa dirección. 'Venía' mantiene el presente histórico narrativo en español.
- source_word: λέγει
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - dijo
  - declara
  lexicon: BDAG
  rationale: Se mantiene el presente narrativo para reflejar la inmediatez del griego joánico y su estilo de relato.
- source_word: Ἴδε
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mirad
  - Mira
  lexicon: BDAG
  rationale: '''He aquí'' es una fórmula reverente y comunicativa que corresponde bien al imperativo/interjección de atención del griego, y evita tanto arcaísmo excesivo como banalización.'
- source_word: ὁ ἀμνὸς τοῦ θεοῦ
  english_pob_choice: the Lamb of God
  chosen_spanish: el Cordero de Dios
  alternatives_spanish:
  - el Cordero que pertenece a Dios
  - el Cordero divino
  lexicon: BDAG
  rationale: '''Cordero'' conserva el valor sacrificial y pascual del sustantivo griego. La construcción de genitivo se vierte de forma directa y tradicional, sin expandir el texto.'
- source_word: ὁ αἴρων
  english_pob_choice: who takes away
  chosen_spanish: que quita
  alternatives_spanish:
  - que lleva
  - que carga con
  - que quita de en medio
  lexicon: BDAG
  rationale: '''Quita'' expresa de forma compacta la idea de remoción y permite mantener abierta la tensión con el posible sentido de ''llevar/cargar'' señalado en la nota inglesa, sin forzar una sola lectura.'
- source_word: τὴν ἁμαρτίαν
  english_pob_choice: the sin
  chosen_spanish: el pecado
  alternatives_spanish:
  - el pecado colectivo
  - los pecados
  lexicon: BDAG
  rationale: Se conserva el singular del griego con 'el pecado', evitando pluralizarlo indebidamente y manteniendo el peso conceptual de la expresión.
- source_word: τοῦ κόσμου
  english_pob_choice: of the world
  chosen_spanish: del mundo
  alternatives_spanish:
  - del mundo entero
  - de la humanidad
  lexicon: BDAG
  rationale: '''Del mundo'' reproduce el alcance del genitivo sin estrecharlo ni interpretarlo más allá de lo que el texto dice.'
theological_decisions:
- issue: Sentido de ὁ αἴρων τὴν ἁμαρτίαν τοῦ κόσμου
  english_pob_reading: who takes away the sin of the world
  chosen_spanish_reading: que quita el pecado del mundo
  alternative_spanish_readings:
  - que lleva el pecado del mundo
  - que carga con el pecado del mundo
  rationale: La forma principal conserva la lectura de remoción como traducción más clara en español. Sin embargo, la alternativa de 'lleva/carga con' sigue siendo teológicamente viable por el rango de αἴρω y por la posible resonancia sacrificial. Se preserva así la tensión documentada por el POB inglés en lugar de resolverla por completo.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (preservar tensión teológica)
translation_notes:
  revision_awareness: El borrador sigue el estado revisado más reciente del contexto inglés, que sustituyó 'Look' por 'Behold' para reflejar Ἴδε con un registro más formal. En español se adoptó 'He aquí' para conservar ese tono reverente y atento, manteniendo al mismo tiempo una lectura natural y publicable.
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo cuando el texto lo requiere; aquí no aparece el nombre divino explícito, por lo que se mantuvo 'Dios'.
  - '''Jesús'' y ''Dios'' siguen las convenciones del proyecto; ''Cordero de Dios'' mantiene la expresión tradicional sin añadir glosas interpretativas.'
  - Se preservó el singular 'pecado' como en el griego, sin convertirlo en plural.
  - Se eligió 'He aquí' como equivalente funcional de Ἴδε, coherente con el cambio de revisión del inglés POB a un registro más formal.
