translation:
  language: es
  text: los que no nacieron[a] de sangre, ni de la voluntad de la carne, ni de la voluntad del hombre, sino de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O más idiomáticamente: "no nacieron de linaje". El griego usa el plural "sangres", una expresión inusual que alude a la descendencia natural o al parentesco humano.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἳ
  english_pob_choice: who
  chosen_spanish: los que
  alternatives_spanish:
  - quienes
  - los cuales
  lexicon: BDAG
  rationale: El relativo griego retoma a las personas mencionadas en el contexto inmediato. En español, 'los que' mantiene la referencia grupal con naturalidad y conserva la conexión sintáctica sin sonar forzado.
- source_word: αἱμάτων
  english_pob_choice: from blood
  chosen_spanish: de sangre
  alternatives_spanish:
  - de sangre humana
  - de linaje
  - de sangres
  lexicon: BDAG
  rationale: El griego usa el plural 'sangres', una expresión inusual que apunta al origen natural o a la descendencia humana. En español, 'de sangre' transmite ese campo semántico de manera idiomática y readable; 'de linaje' explicitaría una interpretación posible, pero suaviza la extrañeza del plural griego.
- source_word: θελήματος
  english_pob_choice: will
  chosen_spanish: voluntad
  alternatives_spanish:
  - deseo
  - decisión
  lexicon: BDAG
  rationale: '''Voluntad'' preserva la repetición estructural del texto y el sentido de iniciativa/intención que el término tiene en este pasaje.'
- source_word: σαρκὸς
  english_pob_choice: flesh
  chosen_spanish: la carne
  alternatives_spanish:
  - naturaleza humana
  - el cuerpo
  lexicon: BDAG
  rationale: Se conserva 'carne' porque el pasaje contrapone origen humano natural frente a origen divino, y el término puede mantenerse con valor literal sin convertirlo en una paráfrasis antropológica.
- source_word: ἀνδρὸς
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - un varón
  - un marido
  lexicon: BDAG
  rationale: '''Un hombre'' reproduce de forma natural el referente masculino genérico del griego en este contraste de origen y agencia humana.'
- source_word: ἐκ θεοῦ
  english_pob_choice: from God
  chosen_spanish: de Dios
  alternatives_spanish:
  - procedentes de Dios
  - nacieron de Dios
  lexicon: BDAG
  rationale: '''De Dios'' mantiene la relación de fuente/origen sin añadir explicaciones que el griego no expresa explícitamente.'
- source_word: ἐγεννήθησαν
  english_pob_choice: were born
  chosen_spanish: nacieron
  alternatives_spanish:
  - fueron engendrados
  - fueron nacidos
  lexicon: BDAG
  rationale: El aoristo pasivo de γεννάω se vierte aquí con el verbo natural 'nacer', que conserva el sentido de origen/begottenness en español sin arcaísmo.
theological_decisions:
- issue: Alcance del contraste entre origen humano y origen divino
  english_pob_reading: The verse speaks of those who have a birth/origin that is not grounded in natural human descent or human procreative will, but in God.
  chosen_spanish_reading: El versículo habla de un nacimiento/origen que no se basa en la descendencia humana natural ni en la voluntad procreadora humana, sino en Dios.
  alternative_spanish_readings:
  - Solo excluye la línea de descendencia étnica.
  - Debe leerse principalmente en clave sacramental o metafísica.
  rationale: La triple negación ('ni de sangre... ni de la voluntad de la carne... ni de la voluntad de un hombre') sugiere de forma más natural una oposición entre generación humana ordinaria y origen divino. La redacción española conserva esa tensión sin cargar el texto con una doctrina específica que el versículo no desarrolla por sí mismo.
  doctrine_reference: Mantener la tensión teológica del texto sin resolverla con una tradición denominacional específica; consonancia con la ortodoxia histórica ecuménica.
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente suavizó ''bloods'' a ''blood'' y ''a man'' a ''man'' por idiomaticidad; la presente versión española sigue una estrategia similar: evita un plural literal extraño (''sangres'') y mantiene un referente humano genérico con ''un hombre'', sin perder la fuerza del contraste original. También conserva la estructura repetitiva de las negaciones y el origen final ''de Dios''.'
  spanish_consistency_notes:
  - Se mantiene 'Dios' para θεός, conforme al estándar del proyecto.
  - Se traduce σάρξ como 'carne' en este contexto, no como 'naturaleza humana', para no borrar la resonancia lexical del griego.
  - '''Nacieron'' conserva la pasiva/origen del verbo griego de manera natural en español.'
  - La nota al pie preserva la ambigüedad/extrañeza del plural griego sin convertirla en un término técnico fijo.
