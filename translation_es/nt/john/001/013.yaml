  spanish_quality_summary: El español es claro y digno, pero puede mejorar en naturalidad y fuerza idiomática. En este contexto, 'ni de la voluntad del hombre' suena más genérico y más propio del contraste entre origen humano y origen divino que 'un hombre'. El resto del verso es legible y no necesita ajuste. La nota al pie está bien formulada y útil para conservar la rareza del plural griego.
