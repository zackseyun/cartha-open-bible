translation:
  language: es
  text: Él no era la luz[a], sino que vino para dar testimonio de la luz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Él no era la luz, sino para que diera testimonio de la luz». El griego deja implícito el verbo de la segunda cláusula, que se suple por el contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐκ ἦν
  english_pob_choice: was not
  chosen_spanish: no era
  alternatives_spanish:
  - no fue
  - no estaba
  lexicon: BDAG
  rationale: El imperfecto de εἰμί expresa estado/identidad en curso; en español, 'no era' comunica de modo natural que Juan no pertenecía a la categoría de la luz.
- source_word: ἐκεῖνος
  english_pob_choice: He
  chosen_spanish: Él
  alternatives_spanish:
  - ese
  - aquel
  - ese hombre
  lexicon: BDAG
  rationale: Aquí el demostrativo funciona como referencia personal enfática. 'Él' conserva la referencia a Juan sin volver la frase pesada o arcaica.
- source_word: τὸ φῶς
  english_pob_choice: the light
  chosen_spanish: la luz
  alternatives_spanish:
  - esa luz
  - la Luz
  lexicon: BDAG
  rationale: Se mantiene el artículo definido para reflejar la luz específica del prólogo joánico, no una luz genérica.
- source_word: ἀλλ’ ἵνα
  english_pob_choice: but came to
  chosen_spanish: sino para
  alternatives_spanish:
  - pero para
  - sino que
  lexicon: BDAG
  rationale: El griego deja implícito el verbo de la segunda cláusula; en español, 'sino para' expresa con naturalidad la contraposición y la finalidad implícita sin añadir un verbo no atestiguado en el texto.
- source_word: μαρτυρήσῃ
  english_pob_choice: bear witness
  chosen_spanish: dar testimonio
  alternatives_spanish:
  - testificar
  - ser testigo
  lexicon: BDAG
  rationale: '''Dar testimonio'' conserva el matiz testimonial/forense de μαρτυρέω y es una fórmula natural en español bíblico contemporáneo.'
- source_word: περὶ τοῦ φωτός
  english_pob_choice: about the light
  chosen_spanish: acerca de la luz
  alternatives_spanish:
  - sobre la luz
  - con respecto a la luz
  lexicon: BDAG
  rationale: '''περί'' con genitivo se vierte bien con ''acerca de''; mantiene claridad moderna sin sobrecargar la frase.'
theological_decisions:
- issue: Distinción entre Juan y la luz verdadera
  english_pob_reading: The verse denies that John himself was the light and states his purpose as bearing witness to the light.
  chosen_spanish_reading: El versículo niega que Juan mismo fuera la luz y afirma que su función era dar testimonio de la luz.
  alternative_spanish_readings:
  - Él no era la luz, sino que vino para dar testimonio de la luz.
  - No era él la luz, sino para testificar acerca de la luz.
  rationale: La redacción preserva la distinción cristológica del prólogo sin explicarla más allá de lo que el versículo dice. La elipsis del segundo verbo se resuelve con una forma española natural, sin introducir una interpretación doctrinal adicional.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El texto sigue de cerca el griego SBLGNT y coincide en sentido con el control inglés POB, incluyendo la elipsis de la segunda cláusula. Se mantiene la distinción entre Juan y la luz y se resuelve la finalidad implícita con español natural y auditable.
  spanish_consistency_notes:
  - Se usa 'luz' con artículo definido para reflejar la referencia específica del prólogo.
  - '''Dar testimonio'' se mantiene como equivalente consistente de μαρτυρέω en estilo bíblico español.'
  - No se reemplaza el matiz de finalidad del griego con una simple coordinación; se preserva la relación contrastiva y teleológica de ἀλλ’ ἵνα.
