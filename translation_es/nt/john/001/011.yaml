translation:
  language: es
  text: Él vino a lo que era suyo[a], y los suyos no lo recibieron[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a lo suyo»; el primer sintagma griego está en neutro plural, distinto del masculino plural siguiente «los suyos».
    reason: alternative_reading
  - marker: b
    text: O «no lo aceptaron» o «no lo acogieron».
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰς τὰ ἴδια
  english_pob_choice: to his own
  chosen_spanish: a lo que era suyo
  alternatives_spanish:
  - a lo suyo
  - a su propia esfera
  - a su propiedad
  lexicon: BDAG
  rationale: El griego neutro plural τὰ ἴδια apunta a lo que le pertenecía, no directamente a personas. En español, 'a lo que era suyo' conserva esa referencia neutra y la tensión con el plural masculino siguiente, sin forzar aún 'casa' o 'dominio'.
- source_word: ἦλθεν
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - acudió
  lexicon: BDAG
  rationale: El aoristo de ἔρχομαι se expresa de manera natural con 'vino' en español bíblico actual, manteniendo el movimiento narrativo simple y directo.
- source_word: οἱ ἴδιοι
  english_pob_choice: his own people
  chosen_spanish: los suyos
  alternatives_spanish:
  - su propia gente
  - su pueblo
  lexicon: BDAG
  rationale: El masculino plural indica personas. 'Los suyos' es una forma breve y natural en español que conserva la relación posesiva y el contraste con 'lo que era suyo'.
- source_word: παρέλαβον
  english_pob_choice: did not receive
  chosen_spanish: no lo recibieron
  alternatives_spanish:
  - no lo aceptaron
  - no lo acogieron
  lexicon: BDAG
  rationale: '''Recibir'' mantiene el sentido amplio de recibir/aceptar/acoger sin estrechar indebidamente el verbo griego a una sola matización.'
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El pronombre masculino singular se traduce naturalmente con el clítico de objeto directo 'lo', que en español suena más fluido que repetir 'a él'.
theological_decisions:
- issue: Distinción entre τὰ ἴδια y οἱ ἴδιοι
  english_pob_reading: The first phrase refers to what belonged to him ('his own' realm/home), while the second refers to his own people.
  chosen_spanish_reading: La primera frase se refiere a lo que le pertenecía; la segunda, a los suyos como personas.
  alternative_spanish_readings:
  - Ambas frases pueden entenderse como 'sus propios'
  - La primera frase podría especificarse como 'su casa' o 'su mundo'
  rationale: El griego cambia de neutro plural a masculino plural, lo que sugiere una distinción deliberada entre posesión/esfera y personas. La traducción la conserva sin resolverla prematuramente en una sola imagen concreta.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: Coincide con el texto fuente griego y con el audit trail inglés en la distinción entre τὰ ἴδια y οἱ ἴδιοι; no se han aplicado revisiones posteriores.
  spanish_consistency_notes:
  - Se preserva 'lo que era suyo' para el neutro plural y 'los suyos' para el masculino plural.
  - Se evita 'SEÑOR' porque este versículo no contiene κύριος.
  - '''Recibieron'' conserva la amplitud semántica de παραλαμβάνω sin perder la posible matiz de aceptar o acoger.'
