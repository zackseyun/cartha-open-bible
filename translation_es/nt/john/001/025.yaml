base_translation:
  language: en
  yaml_path: translation/nt/john/001/025.yaml
  text: And they asked him and said to him[a], “Why then are you baptizing, if you are not the Messiah, nor Elijah[b], nor the Prophet?”
  footnotes:
  - marker: a
    text: Or “the Christ.” The Greek title is Χριστός (Christos), rendered here as “the Messiah” to preserve the Jewish messianic context.
    reason: alternative_reading
  - marker: b
    text: “The Prophet” likely refers to the expected prophet like Moses (see Deut. 18:15).
    reason: cross_reference
