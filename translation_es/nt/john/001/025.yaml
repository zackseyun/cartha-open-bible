translation:
  language: es
  text: 'Y le preguntaron y le dijeron: «¿Por qué, entonces, bautizas, si tú no eres el Mesías[a], ni Elías, ni el Profeta[b]?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el Cristo». Χριστός es un título; aquí se vierte como «Mesías» para conservar el contexto judío de la expectativa.
    reason: alternative_reading
  - marker: b
    text: «El Profeta» probablemente alude al profeta esperado como Moisés (véase Deuteronomio 18:15).
    reason: cross_reference
lexical_decisions:
- source_word: ἠρώτησαν
  english_pob_choice: asked
  chosen_spanish: preguntaron
  alternatives_spanish:
  - interrogaron
  - consultaron
  lexicon: BDAG
  rationale: El aoristo de ἐρωτάω expresa la acción de hacer una pregunta; «preguntaron» es natural en español y conserva el tono narrativo sin añadir aspereza.
- source_word: εἶπαν
  english_pob_choice: said
  chosen_spanish: dijeron
  alternatives_spanish:
  - hablaron
  - respondieron
  lexicon: BDAG
  rationale: λέγω en relato se vierte con «dijeron»; mantener ambos verbos, «preguntaron» y «dijeron», refleja la estructura griega sin fusionarla.
- source_word: Τί οὖν
  english_pob_choice: Why then
  chosen_spanish: ¿Por qué, entonces?
  alternatives_spanish:
  - ¿Qué, entonces?
  - ¿Por qué, pues?
  lexicon: BDAG
  rationale: En este giro interrogativo, τί + οὖν + verbo funciona idiomáticamente como pregunta por la razón o motivo; «¿Por qué, entonces?» reproduce mejor la fuerza que un literal «¿Qué entonces?».
- source_word: βαπτίζεις
  english_pob_choice: are you baptizing
  chosen_spanish: bautizas
  alternatives_spanish:
  - estás bautizando
  - bautizas tú
  lexicon: BDAG
  rationale: El presente indica una acción actual cuestionada. En español, el presente simple transmite bien la práctica en curso sin necesidad de perífrasis progresiva.
- source_word: ὁ χριστός
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - el Cristo
  lexicon: BDAG
  rationale: Como título mesiánico en un contexto judío, «Mesías» preserva mejor el trasfondo esperado que «Cristo», que en español suele sonar más como nombre religioso fijo.
- source_word: Ἠλίας
  english_pob_choice: Elijah
  chosen_spanish: Elías
  alternatives_spanish:
  - Elias
  lexicon: BDAG
  rationale: Nombre propio bíblico en su forma española estándar, ampliamente reconocible y fiel a la convención de transliteración tradicional.
- source_word: ὁ προφήτης
  english_pob_choice: the Prophet
  chosen_spanish: el Profeta
  alternatives_spanish:
  - el profeta
  lexicon: BDAG
  rationale: El artículo señala una figura identificable y esperada; mayúscula en español ayuda a conservar el valor titular reconocido por el contexto sin añadir contenido ajeno al griego.
theological_decisions:
- issue: Renderizar Χριστός como título mesiánico
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - el Cristo
  rationale: La escena contrapone a Jesús con la expectativa judía de un ungido esperado; «Mesías» preserva esa carga histórica y teológica mejor que «Cristo» en español.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Messiah (where title; Christ where name-like)'
- issue: Tratar ὁ προφήτης como figura específica esperada
  english_pob_reading: the Prophet
  chosen_spanish_reading: el Profeta
  alternative_spanish_readings:
  - el profeta
  rationale: En Juan, la expresión apunta a un personaje esperado, no simplemente a cualquier profeta. La mayúscula mantiene la lectura titular sin sobreinterpretar el texto.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: translate titles; preserve source meaning'
- issue: Conservar la triple negación coordinada
  english_pob_reading: nor Elijah, nor the Prophet
  chosen_spanish_reading: ni Elías, ni el Profeta
  alternative_spanish_readings:
  - o Elías, o el Profeta
  rationale: El doble οὐδέ del griego introduce alternativas negadas; «ni ... ni ...» reproduce correctamente la coordinación negativa y su fuerza lógica.
  doctrine_reference: BDAG / sintaxis griega de οὐδέ
translation_notes:
  revision_awareness: El texto griego y la pauta inglesa muestran acuerdo alto y no registran revisiones aplicadas; por eso la propuesta española sigue de cerca la estructura del original, manteniendo los dos verbos introductorios, la pregunta idiomática y las tres negaciones coordinadas.
  spanish_consistency_notes:
  - Se usa «Mesías» para Χριστός como título, conforme a la política del proyecto.
  - Se usa mayúscula en «Profeta» para reflejar la fuerza titular del artículo griego y la nota cruzada de la edición inglesa.
  - Se evita «SEÑOR» o cualquier sustitución no pertinente, ya que este verso no contiene el tetragrámaton ni κύριος en función divina.
  - Se conserva un registro bíblico claro y moderno, con puntuación española y comillas angulares.
