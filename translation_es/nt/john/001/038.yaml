review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido básico del griego: Jesús se vuelve, ve a los dos siguiéndolo, pregunta qué buscan, ellos lo llaman «Rabí» y preguntan dónde se hospeda/permanece. También conserva adecuadamente la glosa explicativa de «Rabí» y la nota sobre μένω. Sin embargo, hay pequeños problemas de fidelidad y estilo: la puntuación añade una pausa innecesaria tras «y», la nota [a] introduce una alternativa no sustentada por el griego ni por el POB inglés, y «al verlos que lo seguían» es menos natural que una construcción participial española más limpia.'
  spanish_quality_summary: El español es mayormente claro y legible, pero presenta detalles mejorables para un registro más natural y digno. «Al verlos que lo seguían» suena forzado; «al ver que lo seguían» o «al verlos siguiéndolo» fluye mejor. «¿Dónde te quedas?» es comprensible, pero en español bíblico neutral «¿dónde te hospedas?» o «¿dónde te alojas?» suena más preciso para el contexto inmediato sin perder naturalidad. También conviene quitar el punto después de la pregunta dentro del diálogo.
  glossary_alignment: 'La terminología clave está bien alineada: «Jesús», «Rabí», «Maestro». No hay términos del glosario mayor en disputa aquí. La decisión de no forzar «permaneces» en el texto principal concuerda con la rationale del POB sobre μένω, siempre que se preserve la alternativa en nota. La nota sobre «Rabí» está bien. La nota [a], en cambio, no corresponde a ninguna decisión léxica relevante del original ni del POB auditado.'
  issues:
  - severity: medium
    issue: 'Construcción poco natural: «al verlos que lo seguían»'
    rationale: Aunque comunica el sentido, en español estándar esta secuencia resulta torpe. El griego tiene dos participios coordinados; una solución más natural es «al ver que lo seguían» o «al verlos siguiéndolo».
  - severity: medium
    issue: Nota [a] no respaldada por la evidencia fuente ni por el POB inglés
    rationale: El borrador crea una nota sobre «y»/pausa ligera que no corresponde a una alternativa significativa del griego ni preserva una decisión del audit trail. Introduce ruido editorial innecesario.
  - severity: low
    issue: Puntuación de diálogo mejorable
    rationale: «¿Qué buscan?». Ellos le dijeron...» lleva un punto extraño tras el cierre de interrogación. En español basta «¿Qué buscan?» seguido de la continuación narrativa.
  - severity: low
    issue: «¿Dónde te quedas?» es algo coloquial e impreciso para el registro
    rationale: Es entendible, pero «quedarse» en varios dialectos puede sonar demasiado informal o ambiguo. «¿Dónde te hospedas?» expresa mejor el sentido situacional de μένω en este contexto.
