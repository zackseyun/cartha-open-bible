revisions:
- from: 'Entonces Jesús se volvió y,[a] al verlos que lo seguían, les dijo: «¿Qué buscan?». Ellos le dijeron: «Rabí» (que traducido significa Maestro)[b], «¿dónde te quedas?»[c]'
  to: 'Entonces Jesús se volvió y, al ver que lo seguían, les dijo: «¿Qué buscan?» Ellos le dijeron: «Rabí» (que traducido significa Maestro)[a], «¿dónde te hospedas?»[b]'
  rationale: La revisión conserva el significado fuente y las decisiones del POB, pero elimina una nota innecesaria, mejora la fluidez de la frase participial, corrige la puntuación española y usa una formulación más precisa y natural para la pregunta sobre μένω en este contexto.
