translation:
  language: es
  text: 'Entonces Jesús se volvió y, al ver que lo seguían, les dijo: «¿Qué buscan?» Ellos le dijeron: «Rabí» (que traducido significa Maestro)[a], «¿dónde te hospedas?»[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Rabí» es un título judío de respeto que significa «Maestro».
    reason: cultural_note
  - marker: b
    text: 'O: «¿dónde permaneces?» / «¿dónde habitas?». El verbo griego es μένω, el mismo que en Juan suele traducirse «permanecer» o «abide».'
    reason: lexical_alternative
lexical_decisions:
- source_word: στραφεὶς
  english_pob_choice: turned
  chosen_spanish: se volvió
  alternatives_spanish:
  - se giró
  - volvió la vista
  lexicon: BDAG
  rationale: El participio aoristo introduce una acción previa de Jesús. «Se volvió» comunica el giro de manera natural en español y conserva el movimiento previo al hablar, sin añadir dirección innecesaria.
- source_word: θεασάμενος
  english_pob_choice: seeing
  chosen_spanish: al verlos
  alternatives_spanish:
  - viendo
  - al observarlos
  - al notarles
  lexicon: BDAG
  rationale: El valor de percepción atenta se expresa bien con «al verlos». Mantiene la secuencia narrativa y no fuerza una interpretación más intensa que la del texto.
- source_word: ἀκολουθοῦντας
  english_pob_choice: following
  chosen_spanish: que lo seguían
  alternatives_spanish:
  - siguiéndolo
  - que venían detrás de él
  lexicon: BDAG
  rationale: «Seguir» conserva el sentido literal y también deja abierta la resonancia discipular de Juan, sin convertirla artificialmente en una explicación teológica.
- source_word: Τί ζητεῖτε;
  english_pob_choice: What are you seeking?
  chosen_spanish: ¿Qué buscan?
  alternatives_spanish:
  - ¿Qué están buscando?
  - ¿Qué buscan ustedes?
  lexicon: BDAG
  rationale: En español, «buscar» es la opción más natural para esta pregunta inmediata, y permite mantener la posible tensión joánica entre búsqueda ordinaria y búsqueda espiritual. El contexto discursivo no exige un verbo más solemne.
- source_word: Ῥαββί
  english_pob_choice: Rabbi
  chosen_spanish: Rabí
  alternatives_spanish:
  - Rabí
  - Rabbi
  lexicon: BDAG
  rationale: Se mantiene la transliteración de uso bíblico en español como título judío de respeto. «Rabí» es reconocido por el lector hispano y se ajusta a la explicación inmediata del texto.
- source_word: μεθερμηνευόμενον Διδάσκαλε
  english_pob_choice: which translated means Teacher
  chosen_spanish: que traducido significa Maestro
  alternatives_spanish:
  - que quiere decir Maestro
  - que interpretado significa Maestro
  lexicon: BDAG
  rationale: El participio explicativo se vierte de forma clara y literal. «Maestro» comunica el título de dirección de manera natural en español, equivalente a Διδάσκαλε en este contexto.
- source_word: ποῦ μένεις;
  english_pob_choice: where are you staying?
  chosen_spanish: ¿dónde te quedas?
  alternatives_spanish:
  - ¿dónde permaneces?
  - ¿dónde habitas?
  lexicon: BDAG
  rationale: Aunque μένω tiene peso teológico en Juan, aquí la pregunta inmediata es situacional. «¿Dónde te quedas?» suena natural en español y preserva la posibilidad de una resonancia más profunda sin imponerla.
theological_decisions:
- issue: Posible doble sentido de ζητέω en Juan
  english_pob_reading: What are you seeking?
  chosen_spanish_reading: ¿Qué buscan?
  alternative_spanish_readings:
  - ¿Qué están buscando?
  - ¿Qué buscan ustedes?
  rationale: La pregunta puede referirse a una búsqueda concreta o insinuar una inquietud más profunda. «¿Qué buscan?» es suficientemente abierto para conservar esa tensión sin explicitarla en exceso.
  doctrine_reference: Translation philosophy §3
- issue: Primer uso de μένω en Juan y su posible carga teológica
  english_pob_reading: where are you staying?
  chosen_spanish_reading: ¿dónde te quedas?
  alternative_spanish_readings:
  - ¿dónde permaneces?
  - ¿dónde habitas?
  rationale: La escena trata ante todo de alojamiento o permanencia concreta. Mantener una formulación cotidiana evita importar la futura densidad teológica de μένω en Juan, sin negarla para lecturas posteriores.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'Se siguió el auditable del POB inglés: turned → se volvió; seeing → al verlos; following → que lo seguían; seeking → ¿Qué buscan?; Rabbi → Rabí; Teacher → Maestro; where are you staying? → ¿dónde te quedas? La decisión española mantiene la tensión de ζητέω y μένω sin volverlas demasiado técnicas. No hubo revisiones textuales en el auditorio inglés, así que el español se alinea con la última versión estable.'
  spanish_consistency_notes:
  - Se conserva «Jesús» como forma fija del nombre propio.
  - Se usa «Rabí» y no «Rabino» para respetar el título semítico explicado por el texto.
  - «Maestro» se eligió como equivalente natural de Διδάσκαλε en este contexto de dirección.
  - Se mantuvo un registro moderno pero reverente, con puntuación española estándar.
  - Las notas a pie preservan alternativas semánticas útiles sin sobrecargar el texto principal.
