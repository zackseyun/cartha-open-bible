  text: στραφεὶς δὲ ὁ Ἰησοῦς καὶ θεασάμενος αὐτοὺς ἀκολουθοῦντας λέγει αὐτοῖς· Τί ζητεῖτε; οἱ δὲ εἶπαν αὐτῷ· Ῥαββί (ὃ λέγεται ⸀μεθερμηνευόμενον Διδάσκαλε), ποῦ μένεις;
base_translation:
  language: en
  yaml_path: translation/nt/john/001/038.yaml
  text: Then Jesus turned and[a], seeing them following, said to them, “What are you seeking?” They said to him, “Rabbi” (which translated means Teacher)[c][b], “where are you staying?”
  footnotes:
  - marker: a
    text: Or “What are you looking for?” The Greek can refer to ordinary searching, but “seeking” better preserves the possible deeper sense in John’s narrative.
    reason: lexical_alternative
  - marker: b
    text: “Rabbi” is a Hebrew/Aramaic title meaning “Teacher.”
    reason: cultural_note
  - marker: c
    text: Or “where are you remaining?” The Greek verb is the same one often rendered “remain” or “abide” elsewhere in John.
    reason: lexical_alternative
