translation:
  language: es
  text: 'Y yo no lo conocía[a], pero vine bautizando en agua por esta razón: para que fuera revelado a Israel.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no lo reconocía». El griego puede referirse tanto a falta de trato o conocimiento como a falta de reconocimiento; el texto principal conserva la expresión más amplia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κἀγὼ
  english_pob_choice: And I
  chosen_spanish: Y yo
  alternatives_spanish:
  - Yo también
  - Y también yo
  lexicon: BDAG
  rationale: κἀγώ añade continuidad y énfasis discursivo. En español, «Y yo» conserva la conexión con el testimonio anterior sin sobretraducir la partícula aditiva.
- source_word: οὐκ ᾔδειν
  english_pob_choice: did not know
  chosen_spanish: no lo conocía
  alternatives_spanish:
  - no lo sabía
  - no lo reconocía
  lexicon: BDAG
  rationale: El imperfecto de οἶδα expresa un estado pasado de conocimiento; «no lo conocía» mantiene la amplitud semántica de falta de conocimiento o familiaridad, sin resolverla artificialmente como mera falta de reconocimiento.
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  - lo
  lexicon: BDAG
  rationale: El pronombre acusa directo en español se expresa naturalmente con «lo»; el antecedente es Jesús y el referente es claro en el contexto.
- source_word: ἀλλ’
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - sino
  - mas
  lexicon: BDAG
  rationale: Introduce contraste entre la ignorancia previa de Juan y el propósito de su ministerio. «Pero» es la equivalencia natural y clara en español.
- source_word: ἵνα φανερωθῇ
  english_pob_choice: that he might be revealed
  chosen_spanish: para que él fuera revelado
  alternatives_spanish:
  - para que él se diera a conocer
  - para que él fuera manifestado
  lexicon: BDAG
  rationale: ἵνα expresa propósito y el pasivo de φανερόω pide una forma pasiva en español. «Fuera revelado» preserva la pasividad y el registro bíblico sin imponer una interpretación adicional.
- source_word: τῷ Ἰσραήλ
  english_pob_choice: to Israel
  chosen_spanish: a Israel
  alternatives_spanish:
  - para Israel
  - entre Israel
  lexicon: BDAG
  rationale: 'El dativo con φανερωθῇ se traduce de forma natural como destinatario del acto de revelación: «a Israel». Mantiene el referente corporativo sin expansionarlo.'
- source_word: διὰ τοῦτο
  english_pob_choice: for this reason
  chosen_spanish: por esta razón
  alternatives_spanish:
  - por esto
  - por ello
  lexicon: BDAG
  rationale: La expresión mira hacia el propósito explicado en la frase siguiente; «por esta razón» conserva el valor explicativo y resulta idiomática en español.
- source_word: ἦλθον ἐγὼ
  english_pob_choice: I came
  chosen_spanish: vine
  alternatives_spanish:
  - he venido
  - yo vine
  lexicon: BDAG
  rationale: El aoristo ἦλθον se vierte naturalmente como pasado simple. En español, el énfasis de ἐγώ queda suficientemente expresado con «yo».
- source_word: ἐν ὕδατι
  english_pob_choice: in water
  chosen_spanish: en agua
  alternatives_spanish:
  - con agua
  - mediante agua
  lexicon: BDAG
  rationale: Se conserva la preposición y el sustantivo con la mayor cercanía posible al griego y al estilo joánico. «En agua» es fiel y gramaticalmente natural en español.
- source_word: βαπτίζων
  english_pob_choice: baptizing
  chosen_spanish: bautizando
  alternatives_spanish:
  - sumergiendo
  - bautizando
  lexicon: BDAG
  rationale: El participio contemporáneo describe la actividad de Juan. «Bautizando» conserva el verbo establecido en español para esta acción religiosa sin introducir una glosa modal.
theological_decisions:
- issue: Naturaleza del no conocimiento de Juan respecto de Jesús
  english_pob_reading: Render as a straightforward statement of prior non-knowledge without specifying whether this means lack of personal acquaintance or lack of messianic recognition.
  chosen_spanish_reading: Presentarlo como una afirmación directa de desconocimiento previo, sin precisar si fue falta de trato personal o de reconocimiento mesiánico.
  alternative_spanish_readings:
  - No lo reconocía
  - No lo había conocido como el Mesías
  rationale: El griego no determina explícitamente el tipo de conocimiento ausente. La traducción española conserva esa tensión interpretativa y evita armonizar el texto más allá de lo que dice.
  doctrine_reference: Preservar la tensión textual sin resolverla artificialmente.
translation_notes:
  revision_awareness: La redacción española sigue la última revisión auditada del inglés POB, que afinó la cláusula de propósito a una forma más formal sin cambiar el sentido. Se mantuvo esa relación de finalidad en español con «para que».
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera explícitamente; este versículo no contiene el nombre divino.
  - «Bautizando» se conserva como verbo técnico establecido para βαπτίζω.
  - Se evitó «Cristo» porque el pasaje no lo usa; el referente implícito es Jesús.
  - Se mantuvo la referencia corporativa «Israel» sin expansión interpretativa.
