translation:
  language: es
  text: Él vino como testigo[a], para que diera testimonio acerca de la Luz, para que todos creyeran por medio de él[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “diera testimonio acerca de la Luz”.'
    reason: lexical_alternative
  - marker: b
    text: Es decir, por el testimonio de Juan; algunos entienden que “él” se refiere a la Luz.
    reason: alternative_reading
lexical_decisions:
- source_word: οὗτος
  english_pob_choice: He
  chosen_spanish: Este
  alternatives_spanish:
  - Él
  - Este hombre
  lexicon: BDAG
  rationale: El demostrativo conserva la referencia anafórica a Juan del versículo anterior, como en el audit trail inglés. En español, “Este” mantiene mejor esa fuerza señaladora que un simple pronombre, sin sonar innecesariamente pesado.
- source_word: ἦλθεν
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - vino aquí
  lexicon: BDAG
  rationale: El aoristo de ἔρχομαι expresa movimiento narrativo simple. “Vino” es natural en español y mantiene el sentido de llegada sin añadir matices no presentes.
- source_word: εἰς μαρτυρίαν
  english_pob_choice: as a witness
  chosen_spanish: como testigo
  alternatives_spanish:
  - para testimonio
  - para ser testigo
  lexicon: BDAG
  rationale: La frase indica función o rol testimonial, no solo finalidad abstracta. “Como testigo” preserva la fuerza forense/testimonial de μαρτυρία y resulta idiomática en español.
- source_word: ἵνα μαρτυρήσῃ
  english_pob_choice: so that he might testify
  chosen_spanish: para que diera testimonio
  alternatives_spanish:
  - para que testificara
  - a fin de que diera testimonio
  lexicon: BDAG
  rationale: La cláusula con ἵνα expresa propósito. “Diera testimonio” comunica bien el valor verbal de μαρτυρέω en español bíblico actual, y evita una formulación demasiado técnica o rígida.
- source_word: περὶ τοῦ φωτός
  english_pob_choice: about the Light
  chosen_spanish: acerca de la Luz
  alternatives_spanish:
  - sobre la Luz
  - concerniente a la Luz
  lexicon: BDAG
  rationale: περί con genitivo se rinde naturalmente con “acerca de”. Se mantiene “Luz” en mayúscula por el carácter titular/cristológico que el contexto joánico sugiere, conforme al audit trail inglés.
- source_word: ἵνα πάντες πιστεύσωσιν
  english_pob_choice: so that all might believe
  chosen_spanish: para que todos creyeran
  alternatives_spanish:
  - para que todos crean
  - a fin de que todos creyeran
  lexicon: BDAG
  rationale: La segunda cláusula de propósito se preserva con “para que”. “Creyeran” refleja bien el subjuntivo de propósito en español, y “todos” reproduce el alcance universal de πάντες.
- source_word: πιστεύσωσιν
  english_pob_choice: believe
  chosen_spanish: creyeran
  alternatives_spanish:
  - crean
  - tuvieran fe
  lexicon: BDAG
  rationale: En este contexto, πιστεύω se traduce con el verbo común “creer”. Mantiene la claridad moderna sin perder la fuerza de confianza/adhesión propia del término.
- source_word: δι’ αὐτοῦ
  english_pob_choice: through him
  chosen_spanish: por medio de él
  alternatives_spanish:
  - a través de él
  - por él
  lexicon: BDAG
  rationale: 'διά con genitivo indica medio o mediación. “Por medio de él” es claro en español y conserva la ambigüedad controlada del audit trail: el referente más cercano es Juan, a través de cuyo testimonio llegan a creer.'
theological_decisions:
- issue: Referente de δι’ αὐτοῦ
  english_pob_reading: '''him'' refers to John the witness, not to the Light/Messiah'
  chosen_spanish_reading: “él” se entiende como Juan, el testigo, no como la Luz/Mesías
  alternative_spanish_readings:
  - “él” puede referirse a la Luz
  - “él” podría leerse de modo ambiguo
  rationale: El antecedente más cercano y natural en el discurso es Juan, sujeto del versículo. Por eso la traducción mantiene “por medio de él” sin resolver artificialmente la ambigüedad, pero la nota aclara la lectura preferida según el contexto inmediato.
  doctrine_reference: Preservar la tensión textual cuando el griego admite más de una referencia, dando prioridad al antecedente contextual más cercano.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego SBLGNT y el audit trail inglés, conservando las dos cláusulas de propósito y la posible ambigüedad de δι’ αὐτοῦ. Se prefirió una formulación española natural (“vino como testigo”, “diera testimonio”, “por medio de él”) sin borrar la función testimonial ni la referencia contextual a Juan.
  spanish_consistency_notes:
  - Se usa “Luz” con mayúscula por coherencia con el uso joánico y con la decisión inglesa auditada.
  - Se evita “Cristo” porque el versículo no lo exige y el contexto inmediato habla de la Luz, no del título mesiánico.
  - Se conserva el lenguaje testimonial (“testigo”, “testimonio”) para reflejar la familia léxica de μαρτυρ-.
  - Se mantiene un tono bíblico moderno, claro y publicable, sin depender de formulaciones tradicionales de máscara como “SEÑOR”.
