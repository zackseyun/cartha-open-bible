translation:
  language: es
  text: Y este es el testimonio de Juan[a], cuando los judíos enviaron sacerdotes y levitas de Jerusalén para preguntarle, «¿Quién eres tú?»
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los líderes judíos» o «los judeanos». En Juan, «los judíos» a menudo se refiere especialmente a las autoridades religiosas de Judea más que al pueblo judío en conjunto.
    reason: lexical_alternative
lexical_decisions:
- source_word: μαρτυρία
  english_pob_choice: testimony
  chosen_spanish: testimonio
  alternatives_spanish:
  - testimonio
  - testimonio jurídico
  - declaración
  lexicon: BDAG
  rationale: En este contexto narrativo y johánico, μαρτυρία presenta un testimonio formal de Juan. «Testimonio» conserva mejor el valor de declaración-witness que una traducción más suelta, y en español suena natural en un marco religioso y jurídico.
- source_word: τοῦ Ἰωάννου
  english_pob_choice: of John
  chosen_spanish: de Juan
  alternatives_spanish:
  - de Juan
  - acerca de Juan
  lexicon: BDAG
  rationale: 'El genitivo se entiende aquí como subjetivo: el testimonio pronunciado por Juan. «De Juan» es la forma natural y fiel en español; «acerca de Juan» desplazaría el sentido hacia un testimonio sobre él.'
- source_word: ὅτε
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - cuando
  - al tiempo que
  lexicon: BDAG
  rationale: La conjunción temporal introduce la circunstancia en la que ocurre el testimonio. «Cuando» refleja con claridad y naturalidad el valor temporal del griego.
- source_word: ἀπέστειλαν
  english_pob_choice: sent
  chosen_spanish: enviaron
  alternatives_spanish:
  - enviaron
  - mandaron
  - despacharon
  lexicon: BDAG
  rationale: «Enviar» comunica de modo natural la acción de ἀποστέλλω en este contexto narrativo. «Mandaron» podría sonar más duro y «despacharon» es innecesariamente técnico.
- source_word: οἱ Ἰουδαῖοι
  english_pob_choice: the Jews
  chosen_spanish: los judíos
  alternatives_spanish:
  - los judíos
  - los líderes judíos
  - los judeanos
  lexicon: BDAG
  rationale: Se conserva la forma literal del texto fuente. En Juan, la expresión a menudo apunta más específicamente a las autoridades judeanas, pero aquí el texto base sigue diciendo «los judíos»; esa tensión se mantiene sin sustituirla en el cuerpo principal.
- source_word: ἐξ Ἱεροσολύμων
  english_pob_choice: from Jerusalem
  chosen_spanish: desde Jerusalén
  alternatives_spanish:
  - desde Jerusalén
  - de Jerusalén
  lexicon: BDAG
  rationale: La preposición con origen se expresa de manera natural con «desde» en español, subrayando el punto de partida de la delegación.
- source_word: ἱερεῖς καὶ Λευίτας
  english_pob_choice: priests and Levites
  chosen_spanish: sacerdotes y levitas
  alternatives_spanish:
  - sacerdotes y levitas
  lexicon: BDAG
  rationale: Son dos grupos distintos asociados al templo, y la traducción literal los conserva claramente sin añadir interpretaciones.
- source_word: ἵνα ἐρωτήσωσιν αὐτόν
  english_pob_choice: to ask him
  chosen_spanish: para preguntarle
  alternatives_spanish:
  - para preguntarle
  - para interrogarlo
  - para hacerle una pregunta
  lexicon: BDAG
  rationale: El propósito expresado por ἵνα se vierte naturalmente con «para». «Preguntarle» mantiene la sencillez del griego; «interrogarlo» sería posible, pero da un matiz más forense del que exige el versículo.
- source_word: Σὺ τίς εἶ;
  english_pob_choice: Who are you?
  chosen_spanish: ¿Quién eres tú?
  alternatives_spanish:
  - ¿Quién eres tú?
  - ¿Tú quién eres?
  lexicon: BDAG
  rationale: La pregunta se traduce de manera idiomática en español. El pronombre explícito Σὺ aporta énfasis, y «tú» lo conserva sin volver la frase artificial.
theological_decisions:
- issue: Referencia de οἱ Ἰουδαῖοι en Juan
  english_pob_reading: Render literally as "the Jews" in the main text, while clarifying in a footnote that in Johannine usage this often refers more specifically to the Judean religious authorities, not the Jewish people as a whole.
  chosen_spanish_reading: Renderizar literalmente «los judíos» en el texto principal y aclarar en nota que en Juan la expresión suele referirse, en especial, a las autoridades religiosas judeanas, no al pueblo judío en conjunto.
  alternative_spanish_readings:
  - los líderes judíos
  - los judeanos
  rationale: La lectura principal preserva la forma del texto y evita sustituirla por una interpretación. La nota protege contra una lectura totalizante o étnicamente generalizada, a la vez que respeta el uso particular del cuarto evangelio.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del inglés al usar una sola cláusula corrida con coma antes de la temporal «cuando», en lugar de separar con dos puntos; así refleja mejor el flujo sintáctico del griego con ὅτε.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma de proyecto solo cuando el texto la exija; este versículo no contiene el tetragrámaton.
  - Se preserva «los judíos» en el cuerpo principal por fidelidad al griego, con nota explicativa sobre su alcance en Juan.
  - Se usa puntuación española estándar y comillas angulares para el discurso directo.
