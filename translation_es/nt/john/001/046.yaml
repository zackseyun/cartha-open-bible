  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: Natanael formula una pregunta retórica escéptica sobre Nazaret y Felipe responde con una invitación breve. También preserva adecuadamente la alternativa literal de εἶναι como «ser». Sin embargo, la colocación de la nota al final del versículo no ancla la alternativa en la frase pertinente, y «Ven y ve» suena menos natural e idiomático en español bíblico y general para Ἔρχου καὶ ἴδε que «Ven y mira».'
  spanish_quality_summary: El español es claro y legible, pero requiere un ajuste menor para mayor naturalidad y conformidad con la disciplina de notas. «¿Puede salir algo bueno de Nazaret?» funciona bien. En cambio, «Ven y ve» resulta algo forzado en español; «Ven y mira» comunica mejor la invitación sin perder el sentido. La nota debe colocarse junto a la pregunta, no al final del versículo.
  glossary_alignment: No hay términos del glosario de alto impacto en este versículo. Los nombres «Natanael», «Nazaret» y «Felipe» son apropiados. No hay conflicto con Yahvé/Mesías/Cristo u otra terminología doctrinal del proyecto.
  issues:
  - severity: medium
    issue: La nota al pie está anclada al final de todo el versículo en vez de a la pregunta donde pertenece la alternativa léxica.
    rationale: La instrucción del proyecto exige que cada nota tenga su marcador exacto en el punto relevante del texto. Aquí la alternativa «ser de Nazaret» corresponde a la cláusula de la pregunta, no a «Ven y ve».
  - severity: medium
    issue: «Ven y ve» es menos natural en español que «Ven y mira» para Ἔρχου καὶ ἴδε.
    rationale: Aunque «ve» puede intentar conservar resonancia temática, en español moderno «ven y mira» es la fórmula idiomática estable para una invitación de este tipo y refleja bien el imperativo ἴδε sin sonar mecánico.
  revised_spanish_text: 'Y Natanael le dijo: «¿Puede salir algo bueno de Nazaret?[a]» Felipe le dijo: «Ven y mira».'
