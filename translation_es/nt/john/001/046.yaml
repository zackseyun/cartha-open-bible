translation:
  language: es
  text: 'Y Natanael le dijo: «¿Puede salir algo bueno de Nazaret?[a]» Felipe le dijo: «Ven y mira».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «¿Puede algo bueno ser de Nazaret?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  lexicon: BDAG
  rationale: La partícula narrativa simple se conserva mejor con una coordinación directa. «Y» mantiene el flujo paratáctico del texto griego sin añadir un matiz temporal que no está explícito.
- source_word: εἶπεν
  english_pob_choice: said
  chosen_spanish: le dijo
  alternatives_spanish:
  - dijo
  lexicon: BDAG
  rationale: El aoristo narrativo se expresa naturalmente con pasado simple. Se añade el dativo pronominal en español para reflejar la relación indirecta marcada por αὐτῷ.
- source_word: Ναθαναήλ
  english_pob_choice: Nathanael
  chosen_spanish: Natanael
  alternatives_spanish:
  - Nathanael
  lexicon: Conventional transliteration
  rationale: Se translitera el nombre propio de forma estándar al español. Se usa la forma habitual «Natanael», más natural y reconocible en español bíblico contemporáneo.
- source_word: Ἐκ Ναζαρὲτ
  english_pob_choice: from Nazareth
  chosen_spanish: de Nazaret
  alternatives_spanish:
  - desde Nazaret
  - procedente de Nazaret
  lexicon: BDAG
  rationale: ἐκ expresa origen o procedencia. En español, «de Nazaret» comunica de manera natural ese origen sin introducir el matiz direccional de «desde» ni la explicitación interpretativa de «procedente de».
- source_word: δύναταί τι ἀγαθὸν εἶναι
  english_pob_choice: Can anything good come
  chosen_spanish: ¿Puede salir algo bueno
  alternatives_spanish:
  - ¿Puede haber algo bueno
  - ¿Puede venir algo bueno
  lexicon: BDAG
  rationale: El inglés POB opta por una equivalencia idiomática que expresa origen. En español, «salir» transmite con naturalidad la idea de proceder de un lugar, preservando la fuerza retórica sin volverla mecánica.
- source_word: τι ἀγαθὸν
  english_pob_choice: anything good
  chosen_spanish: algo bueno
  alternatives_spanish:
  - alguna cosa buena
  - algún bien
  lexicon: BDAG
  rationale: La combinación indefinida neutra se vierte de forma idiomática como «algo bueno». Evita la rigidez de «cualquier cosa buena», que en español puede sonar menos natural en la pregunta retórica.
- source_word: λέγει
  english_pob_choice: said
  chosen_spanish: le dijo
  alternatives_spanish:
  - dijo
  lexicon: BDAG
  rationale: Aunque el griego usa presente histórico, en español se prefiere el pasado simple para la fluidez narrativa. «Le dijo» mantiene la sencillez del relato.
- source_word: ὁ Φίλιππος
  english_pob_choice: Philip
  chosen_spanish: Felipe
  alternatives_spanish:
  - el Felipe
  lexicon: Conventional transliteration
  rationale: El nombre se adapta a la forma española estándar «Felipe». El artículo griego no se reproduce, porque en español no es idiomático ante un nombre propio en este contexto.
- source_word: Ἔρχου καὶ ἴδε
  english_pob_choice: Come and see
  chosen_spanish: Ven y ve
  alternatives_spanish:
  - Ven y mira
  - Acércate y mira
  lexicon: BDAG
  rationale: La fórmula johánica se conserva con una invitación breve y natural. «Ve» mantiene mejor que «mira» la resonancia general de percepción/descubrimiento del verbo ὁράω, sin sobrecargar el español con una expansión explicativa.
theological_decisions:
- issue: Tono de la pregunta de Natanael sobre Nazaret
  english_pob_reading: Render as a straightforward rhetorical question without adding interpretive markers of sarcasm or contempt beyond what the words themselves convey.
  chosen_spanish_reading: Traducirla como una pregunta retórica sobria, sin añadir ironía, desprecio o sarcasmo explícitos.
  alternative_spanish_readings:
  - ¿Puede venir algo bueno de Nazaret?
  - ¿Acaso puede salir algo bueno de Nazaret?
  rationale: El griego sí expresa escepticismo, pero no señala de forma explícita la intensidad emocional. La versión española conserva la tensión interpretativa sin resolverla en una carga más fuerte de la que el texto garantiza.
  doctrine_reference: Primacía del texto original; preservar la tensión exegética sin sobrerinterpretar.
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete de auditoría; la versión griega y el juicio inglés aparecen estables, con alto acuerdo entre revisores.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; aquí no aplica.
  - Se usa «Natanael» y «Felipe» con ortografía española estándar para nombres propios bíblicos.
  - La pregunta retórica conserva la ambigüedad del origen/procedencia sin convertirla en una afirmación negativa más fuerte de lo que el griego exige.
  - La fórmula final se traduce de modo breve y verbal, sin explicitar el matiz de percepción más allá de «ve», que es suficiente en español bíblico contemporáneo.
