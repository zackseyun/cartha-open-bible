translation:
  language: es
  text: 'Les dijo: «Vengan y verán». Fueron, pues, y vieron dónde se hospedaba, y se quedaron con él aquel día. Era como la décima hora[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, si se cuenta desde el amanecer, como las 4:00 de la tarde; algunos lo entienden según el cómputo romano como alrededor de las 10:00 de la mañana.
    reason: alternative_reading
lexical_decisions:
- source_word: λέγει αὐτοῖς
  english_pob_choice: He said to them
  chosen_spanish: Les dijo
  alternatives_spanish:
  - Les dice
  - Les hablaba
  lexicon: BDAG
  rationale: El presente histórico λέγει se conserva de manera natural en el relato español con pasado simple; 'les dijo' comunica la acción narrativa sin forzar un presente artificial. El dativo αὐτοῖς se expresa con el pronombre átono plural 'les'.
- source_word: Ἔρχεσθε
  english_pob_choice: Come
  chosen_spanish: Vengan
  alternatives_spanish:
  - Vengan conmigo
  - Vengan acá
  lexicon: BDAG
  rationale: El imperativo plural de invitación se vierte de forma natural y respetuosa con 'Vengan'. Mantiene el tono directo sin añadir una dirección explícita que el griego no exige.
- source_word: ὄψεσθε
  english_pob_choice: you will see
  chosen_spanish: verán
  alternatives_spanish:
  - van a ver
  - ustedes verán
  lexicon: BDAG
  rationale: El futuro de ὁράω se conserva con 'verán'. En español, el sujeto se entiende por el contexto; el valor prometedor/invitacional queda claro al unirlo con el imperativo previo.
- source_word: ἦλθαν οὖν
  english_pob_choice: So they went
  chosen_spanish: Fueron, pues
  alternatives_spanish:
  - Entonces fueron
  - Así que fueron
  lexicon: BDAG
  rationale: οὖν expresa consecuencia, bien reflejada por 'pues' o 'entonces'. 'Fueron' es idiomático en español narrativo y evita una calca incómoda de 'vinieron' que no refleja tan bien el punto de vista narrativo.
- source_word: εἶδαν
  english_pob_choice: saw
  chosen_spanish: vieron
  alternatives_spanish:
  - miraron
  - observaron
  lexicon: BDAG
  rationale: '''Vieron'' conserva el verbo básico de percepción y la correspondencia léxica con ''verán'' en la primera cláusula.'
- source_word: ποῦ μένει
  english_pob_choice: where he was staying
  chosen_spanish: dónde se hospedaba
  alternatives_spanish:
  - dónde se quedaba
  - dónde permanecía
  lexicon: BDAG
  rationale: μένω aquí apunta al lugar de estancia/lodging. 'Se hospedaba' expresa bien una estancia temporal y resulta natural en español, sin perder el matiz de alojamiento implícito en el contexto.
- source_word: παρ’ αὐτῷ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - junto a él
  - en su compañía
  lexicon: BDAG
  rationale: La preposición παρά con dativo indica cercanía/compañía; 'con él' es la forma más clara e idiomática en español.
- source_word: ἔμειναν
  english_pob_choice: they stayed
  chosen_spanish: se quedaron
  alternatives_spanish:
  - permanecieron
  - se alojaron
  lexicon: BDAG
  rationale: El aoristo de μένω se traduce con un verbo natural de resultado en español. 'Se quedaron' comunica la permanencia con él y mantiene cercanía semántica con 'se hospedaba'.
- source_word: τὴν ἡμέραν ἐκείνην
  english_pob_choice: that day
  chosen_spanish: aquel día
  alternatives_spanish:
  - ese día
  - todo aquel día
  lexicon: BDAG
  rationale: '''Aquel día'' reproduce el demostrativo con deíxis narrativa y suena natural en español bíblico contemporáneo.'
- source_word: ὥρα ἦν ὡς δεκάτη
  english_pob_choice: It was about the tenth hour
  chosen_spanish: Era como la hora décima
  alternatives_spanish:
  - Era como las diez
  - Era aproximadamente la hora décima
  lexicon: BDAG
  rationale: Se preserva la expresión temporal del griego sin resolverla en reloj moderno. 'Como' refleja ὡς y 'hora décima' mantiene la forma original con transparencia auditiva.
theological_decisions:
- issue: Interpretación de la hora décima
  english_pob_reading: 'Preserve the literal time expression in the main text: ''the tenth hour.'''
  chosen_spanish_reading: Mantener 'la hora décima' en el texto principal, con nota sobre las posibles equivalencias horarias.
  alternative_spanish_readings:
  - aproximadamente las 4:00 de la tarde si se cuenta desde el amanecer
  - aproximadamente las 10:00 de la mañana si se cuenta según cómputo romano
  rationale: El texto griego da una hora aproximada, pero no especifica el sistema de cómputo. La traducción principal conserva la expresión fuente y la nota preserva las dos lecturas principales sin resolver artificialmente la tensión interpretativa.
  doctrine_reference: Preservar la tensión interpretativa y la transparencia textual.
translation_notes:
  revision_awareness: Coincidencia alta con el audit trail inglés y el texto fuente griego; no se requieren revisiones adicionales respecto al borrador base. Se mantuvo la expresión horaria literal para conservar la ambigüedad interpretativa documentada.
  spanish_consistency_notes:
  - Se mantuvo un registro neutral y digno, apto para lectura eclesial amplia.
  - Se prefirió 'Vengan' sobre una calca más literal para evitar rigidez sintáctica.
  - Se conservó la distinción entre el tiempo expresado en forma fuente ('hora décima') y la nota interpretativa.
  - No se introdujo terminología eclesiástica no presente en el texto, y se evitó sustituir 'hospedaba' por un equivalente más doctrinal que altere el matiz de estancia temporal.
