  glossary_alignment: 'No hay términos del glosario mayor en disputa en este versículo. El borrador respeta bien las decisiones léxicas del POB: Ἔρχεσθε -> ''Vengan'', ὄψεσθε / εἶδαν -> ''verán'' / ''vieron'', μένει / ἔμειναν -> ''se hospedaba'' / ''se quedaron''. La conservación de la expresión literal de tiempo concuerda con la decisión teológica documentada.'
