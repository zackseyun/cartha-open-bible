translation:
  language: es
  text: Porque la ley fue dada por medio de Moisés; la gracia y la verdad vinieron por medio de Jesús Mesías[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, tradicionalmente, «por medio de Jesús Cristo».
    reason: alternative_reading
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Aquí ὅτι introduce la razón o explicación de la afirmación anterior; en español, «Porque» transmite con naturalidad ese valor explicativo-causal sin añadir matices no presentes en el griego.
- source_word: ὁ νόμος
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la Ley
  lexicon: BDAG
  rationale: νόμος se refiere al cuerpo legal mosaico en este contexto. «La ley» es claro y fiel; se evita capitalizarlo para no imponer una convención posterior que el texto no exige.
- source_word: διὰ Μωϋσέως
  english_pob_choice: through Moses
  chosen_spanish: por medio de Moisés
  alternatives_spanish:
  - por Moisés
  - mediante Moisés
  lexicon: BDAG
  rationale: διά con genitivo expresa mediación o instrumento. «Por medio de» conserva mejor la idea de mediación que un simple «por» y resulta natural en español.
- source_word: ἐδόθη
  english_pob_choice: was given
  chosen_spanish: fue dada
  alternatives_spanish:
  - fue otorgada
  - fue concedida
  lexicon: BDAG
  rationale: El aoristo pasivo de δίδωμι se traduce de modo directo y pasivo. «Fue dada» preserva la forma y la sencillez del enunciado.
- source_word: ἡ χάρις
  english_pob_choice: grace
  chosen_spanish: la gracia
  alternatives_spanish:
  - el favor
  lexicon: BDAG
  rationale: En el uso joánico, χάρις expresa gracia divina, no solo favor humano. «La gracia» es la correspondencia más precisa y reconocible en español.
- source_word: ἡ ἀλήθεια
  english_pob_choice: truth
  chosen_spanish: la verdad
  alternatives_spanish:
  - la realidad
  - la fidelidad
  lexicon: BDAG
  rationale: ἀλήθεια en Juan mantiene su sentido normal de verdad revelada. «La verdad» preserva el eco joánico y la correspondencia con la frase anterior de Juan 1:14.
- source_word: διὰ Ἰησοῦ Χριστοῦ
  english_pob_choice: through Jesus Messiah
  chosen_spanish: por medio de Jesús Mesías
  alternatives_spanish:
  - por medio de Jesús Cristo
  - por medio de Jesús, el Cristo
  lexicon: BDAG
  rationale: Se traduce Χριστός como «Mesías» siguiendo la política del proyecto para el valor de título. «Por medio de» conserva la mediación de διά; «Jesús Mesías» retiene la relación nombre-título sin depender de la forma litúrgica tradicional.
- source_word: ἐγένετο
  english_pob_choice: came
  chosen_spanish: vinieron
  alternatives_spanish:
  - llegaron
  - se hicieron presentes
  lexicon: BDAG
  rationale: γίνομαι aquí contrasta con ἐδόθη y expresa la entrada histórica de la gracia y la verdad a través de Jesús. En español, «vinieron» comunica de forma natural ese matiz de llegada/manifestación; se evita «se hicieron» por posible ambigüedad.
theological_decisions:
- issue: Traducción de Χριστοῦ
  english_pob_reading: Jesus Messiah
  chosen_spanish_reading: Jesús Mesías
  alternative_spanish_readings:
  - Jesús Cristo
  - Jesús, el Cristo
  rationale: Se mantiene el valor titular de Χριστός como «Mesías» para conservar el contenido mesiánico del término griego y seguir la directriz del proyecto de traducir títulos. La forma tradicional «Cristo» se evita en el texto principal por coherencia con esa política, aunque sigue siendo una alternativa reconocible.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
translation_notes:
  revision_awareness: 'El texto español sigue la lectura más reciente restaurada en el auditoría: Χριστός se rinde como «Mesías», no como «Cristo». Se conserva la estructura de contraste entre la ley dada por medio de Moisés y la gracia y la verdad que vinieron por medio de Jesús Mesías.'
  spanish_consistency_notes:
  - Se mantiene «por medio de» de forma paralela en ambas cláusulas para reflejar el διὰ repetido.
  - Se usa «ley» en minúscula, coherente con el valor contextual mosaico sin imponer una mayúscula editorial.
  - La puntuación con punto y coma conserva el paralelismo y la pausa fuerte del griego.
