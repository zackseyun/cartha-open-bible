translation:
  language: es
  text: 'Este es aquel de quien yo dije[a]: «Después de mí viene un hombre[b] que tiene precedencia sobre mí[c], porque era antes de mí».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dije acerca de él». El griego permite una relación equivalente a «de quien / acerca de quien».
    reason: lexical_alternative
  - marker: b
    text: O «varón». El griego ἀνήρ es explícitamente masculino y puede traducirse «hombre» o «varón» según el registro.
    reason: lexical_alternative
  - marker: c
    text: O «está antes de mí». El griego puede expresar precedencia o superioridad de rango, no solo secuencia temporal.
    reason: alternative_reading
lexical_decisions:
- source_word: οὗτός
  english_pob_choice: This is he
  chosen_spanish: Este es aquel
  alternatives_spanish:
  - Este es el que
  - Él es el que
  lexicon: BDAG
  rationale: El demostrativo con copulativa introduce identificación solemne. «Este es aquel» conserva el valor enfático e identificador del griego sin volverlo más explicativo de lo que permite el texto.
- source_word: ὑπὲρ οὗ ἐγὼ εἶπον
  english_pob_choice: of whom I said
  chosen_spanish: de quien yo dije
  alternatives_spanish:
  - sobre quien yo dije
  - acerca de quien yo dije
  lexicon: BDAG
  rationale: Aunque ὑπέρ puede equivaler a «acerca de / respecto de», en esta construcción con εἶπον el español natural y fiel es «de quien yo dije», manteniendo la referencia personal directa.
- source_word: Ὀπίσω μου ἔρχεται
  english_pob_choice: After me comes
  chosen_spanish: Después de mí viene
  alternatives_spanish:
  - Detrás de mí viene
  - Después de mí viene uno
  lexicon: BDAG
  rationale: ὀπίσω aquí expresa secuencia temporal/rango, no simple localización. «Después de mí viene» conserva el orden y la relación de sucesión con naturalidad en español.
- source_word: ἀνὴρ
  english_pob_choice: a man
  chosen_spanish: un varón
  alternatives_spanish:
  - un hombre
  - una persona
  lexicon: BDAG
  rationale: Se conserva la referencia masculina explícita del sustantivo griego. «Varón» mantiene el matiz más formal y algo más marcado de ἀνήρ, evitando neutralizar el término.
- source_word: ἔμπροσθέν μου γέγονεν
  english_pob_choice: who ranks before me
  chosen_spanish: que está antes de mí
  alternatives_spanish:
  - que tiene precedencia sobre mí
  - que ha tomado precedencia sobre mí
  lexicon: BDAG
  rationale: El perfecto γέγονεν con ἔμπροσθεν comunica una situación resultante de precedencia o superioridad de rango. En español, «está antes de mí» preserva esa tensión sin forzar una paráfrasis de rango exclusivamente interpretativa.
- source_word: ὅτι πρῶτός μου ἦν
  english_pob_choice: because he was before me
  chosen_spanish: porque era antes de mí
  alternatives_spanish:
  - porque existía antes que yo
  - porque era primero que yo
  lexicon: BDAG
  rationale: «Era antes de mí» reproduce la concisión del griego y deja abierta la tensión entre prioridad temporal y superioridad de orden, como en el audit trail inglés.
theological_decisions:
- issue: Posible referencia a la preexistencia de Jesús en la cláusula final
  english_pob_reading: he was before me
  chosen_spanish_reading: era antes de mí
  alternative_spanish_readings:
  - existía antes que yo
  - tenía precedencia sobre mí
  rationale: 'La formulación española conserva la ambigüedad significativa del griego: puede expresar prioridad temporal y, en contexto joánico, sugerir preexistencia sin explicitarla en forma expansiva. Así se preserva la tensión textual documentada en el POB inglés.'
  doctrine_reference: Juan 1; afirmación de la preexistencia del Hijo; principio POB de preservar tensiones textuales
- issue: Cómo reflejar la precedencia en ἔμπροσθέν μου γέγονεν sin resolverla demasiado
  english_pob_reading: who ranks before me
  chosen_spanish_reading: que está antes de mí
  alternative_spanish_readings:
  - que me precede
  - que tiene precedencia sobre mí
  rationale: La opción elegida permite leer tanto prioridad de rango como de tiempo. «Está antes de mí» es suficientemente cercano al griego y evita imponer una interpretación técnica que el texto no exige explícitamente.
  doctrine_reference: Cristología joánica; principio POB de no borrar la tensión léxica
translation_notes:
  revision_awareness: La redacción sigue el cierre revisado del audit trail inglés, que prefirió expresar γέγονεν con una idea de precedencia/rango («ranks before me») en lugar de una fórmula meramente temporal. En español se optó por una solución más natural, «está antes de mí», para mantener la misma tensión semántica sin sobrecargar el verso. La cláusula final conserva la ambigüedad productiva de πρῶτός μου ἦν, tal como el inglés POB la deja abierta.
  spanish_consistency_notes:
  - Se usa «Dios»/«Yahvé» según los defaults del proyecto, aunque este versículo no contiene esos términos.
  - «Varón» se usa aquí por la marca masculina explícita de ἀνήρ; en contextos no marcados podría preferirse «hombre» si la fluidez lo exigiera.
  - Se preserva la puntuación con comillas españolas y la estructura de cita directa, de modo que la secuencia declarativa y la explicación causal queden claramente diferenciadas.
