translation:
  language: es
  text: 'Él lo llevó a Jesús. Jesús lo miró y dijo: «Tú eres Simón, hijo de Juan[a]; serás llamado Cefas[b]» (que se traduce Pedro).'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos leen «Jonás» en lugar de «Juan»; el texto griego base sigue «Juan».
    reason: textual_variant
  - marker: b
    text: Cefas es el nombre semítico correspondiente a Pedro, con el sentido de «roca» o «piedra».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤγαγεν
  english_pob_choice: brought
  chosen_spanish: lo llevó
  alternatives_spanish:
  - lo trajo
  - lo condujo
  lexicon: BDAG
  rationale: El aoristo de ἄγω aquí expresa la acción completa de llevar a alguien hasta otra persona. «Lo llevó» comunica bien ese movimiento hacia Jesús en español natural y conserva el carácter puntual del verbo griego.
- source_word: πρὸς τὸν Ἰησοῦν
  english_pob_choice: to Jesus
  chosen_spanish: a Jesús
  alternatives_spanish:
  - hacia Jesús
  - ante Jesús
  lexicon: BDAG
  rationale: Con πρός + acusativo el sentido básico es movimiento hacia una persona. En español, «a Jesús» es la forma más directa y natural para ese destino relacional.
- source_word: ἐμβλέψας αὐτῷ
  english_pob_choice: Looking at him
  chosen_spanish: mirándolo
  alternatives_spanish:
  - fijando la mirada en él
  - mirándolo fijamente
  lexicon: BDAG
  rationale: ἐμβλέψας sugiere una mirada atenta o sostenida. «Mirándolo» mantiene la fluidez del español y deja que el contexto aporte la intensidad de la escena, sin sobrecargar el texto principal.
- source_word: Σὺ εἶ Σίμων
  english_pob_choice: You are Simon
  chosen_spanish: Tú eres Simón
  alternatives_spanish:
  - Eres Simón
  lexicon: BDAG
  rationale: El pronombre explícito σὺ aporta énfasis y dirección. «Tú eres Simón» lo refleja mejor que una omisión del pronombre, aunque el español podría omitirlo gramaticalmente.
- source_word: ὁ υἱὸς Ἰωάννου
  english_pob_choice: the son of John
  chosen_spanish: hijo de Juan
  alternatives_spanish:
  - hijo de Jonás
  lexicon: BDAG
  rationale: La lectura del texto base es Ἰωάννου, por lo que se traduce con «Juan». Se conserva la variante tradicional «Jonás» solo como alternativa documentada por la nota textual.
- source_word: κληθήσῃ
  english_pob_choice: will be called
  chosen_spanish: serás llamado
  alternatives_spanish:
  - te llamarán
  - serás nombrado
  lexicon: BDAG
  rationale: El futuro pasivo de καλέω se expresa de forma natural con «serás llamado», manteniendo tanto el valor futuro como la voz pasiva del original.
- source_word: Κηφᾶς
  english_pob_choice: Cephas
  chosen_spanish: Cefas
  alternatives_spanish:
  - Kefas
  lexicon: BDAG
  rationale: Se translitera el nombre semítico con la forma española establecida «Cefas». Esto preserva el valor onomástico del término sin traducirlo prematuramente en el texto principal.
- source_word: ὃ ἑρμηνεύεται Πέτρος
  english_pob_choice: which is translated Peter
  chosen_spanish: que se traduce Pedro
  alternatives_spanish:
  - que significa piedra
  - que se interpreta Pedro
  lexicon: BDAG
  rationale: ἑρμηνεύεται introduce una glosa explicativa del nombre. «Que se traduce Pedro» reproduce esa función aclaratoria y mantiene el enlace entre el nombre semítico y el nombre griego personal.
theological_decisions:
- issue: Nombre semítico y glosa explicativa de Cefas/Pedro
  english_pob_reading: 'Keep both as personal names in the main text: ''Cephas'' ... ''Peter'''
  chosen_spanish_reading: Mantener «Cefas» ... «Pedro» en el cuerpo principal, sin traducir el sentido como «Roca/Piedra»
  alternative_spanish_readings:
  - «Roca» en el texto principal
  - «Pedro» con nota sobre el significado de piedra/roca
  rationale: La línea principal del versículo presenta un acto de nombrar, no una homilía sobre el significado del nombre. Por eso conviene conservar el juego onomástico como nombres propios en español, mientras la nota puede recordar el trasfondo semítico de Cefas.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El texto sigue de cerca la lectura griega de SBLGNT y coincide con el audit trail inglés: ἤγαγεν como movimiento completado hacia Jesús; ἐμβλέψας como mirada atenta; Ἰωάννου en vez de la variante tradicional Jonás; κληθήσῃ como pasivo futuro; y Κηφᾶς conservado como nombre propio con glosa explicativa en la nota. No se introdujeron revisiones adicionales.'
  spanish_consistency_notes:
  - Se usa «Jesús» para Ἰησοῦς y «Dios» no aparece en este versículo.
  - Se mantiene el nombre propio «Cefas» en forma castellana habitual, paralelo al inglés «Cephas».
  - 'La puntuación reproduce la estructura del original: narración breve, cita directa y paréntesis explicativo final.'
  - La nota textual marca claramente la variante «Jonás/Juan» sin desplazar la lectura base del texto.
