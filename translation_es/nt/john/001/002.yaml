lexical_decisions:
- source_word: οὗτος
  english_pob_choice: He
  chosen_spanish: Este
  alternatives_spanish:
  - Él
  - Este mismo
  - Este hombre
  lexicon: BDAG
  rationale: El griego οὗτος es demostrativo y retoma al λόγος del versículo anterior. En español, «Él» haría la referencia más fluida, pero «Este» conserva mejor el valor anafórico observado en la nota inglesa («This one») sin perder la conexión personal con el sujeto del contexto.
- source_word: ἦν
  english_pob_choice: was
  chosen_spanish: estaba
  alternatives_spanish:
  - era
  - existía
  lexicon: BDAG
  rationale: El imperfecto de εἰμί expresa estado continuo; «estaba» comunica bien esa permanencia en español. «Era» podría sonar más ontológico, y «existía» añade una explicitación que el griego no exige.
- source_word: ἐν ἀρχῇ
  english_pob_choice: in the beginning
  chosen_spanish: en el principio
  alternatives_spanish:
  - al principio
  - desde el principio
  lexicon: BDAG
  rationale: «En el principio» reproduce de forma directa la resonancia con Génesis 1:1 que la auditoría inglesa preserva. «Al principio» es posible, pero en español atenúa un poco la alusión literaria.
- source_word: πρὸς
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - junto a
  - hacia
  lexicon: BDAG
  rationale: En este contexto joánico, πρός con acusativo expresa relación y distinción personal; «con» es la equivalencia española más natural y breve. «Junto a» puede sugerir cercanía física, y «hacia» desplaza indebidamente el sentido relacional.
- source_word: τὸν θεόν
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: BDAG
  rationale: El artículo griego no requiere repetirse en español. «Dios» comunica con naturalidad el referente divino; «el Dios» suena forzado en este contexto y no aporta claridad.
theological_decisions:
- issue: Referencia de οὗτος al λόγος de Juan 1:1
  english_pob_reading: The pronoun refers back to the Word and is rendered personally as 'He.'
  chosen_spanish_reading: El pronombre retoma al Verbo, pero se vierte de manera demostrativa como «Este» para conservar su fuerza anafórica.
  alternative_spanish_readings:
  - Él
  - Este mismo
  rationale: La fuente griega mantiene un demostrativo; la opción española «Este» preserva ese matiz sin perder la referencia personal al Verbo. No se agrega interpretación doctrinal nueva; solo se deja visible el enlace con el versículo anterior.
  doctrine_reference: Juan 1:1–2; filosofía de traducción §1
- issue: Fuerza relacional de πρὸς τὸν θεόν
  english_pob_reading: Relational distinction expressed as 'with God.'
  chosen_spanish_reading: Relación y distinción personal expresadas como «con Dios».
  alternative_spanish_readings:
  - hacia Dios
  - en presencia de Dios
  rationale: «Con Dios» mantiene la distinción relacional sin sobreespecificar categorías metafísicas. «Hacia Dios» sugeriría dirección más que relación, y «en presencia de Dios» añade un matiz que el texto no exige.
  doctrine_reference: Juan 1:1–2; filosofía de traducción §3
translation_notes:
  revision_awareness: La auditoría inglesa no registra cambios aplicados y mantiene alta concordancia; por eso esta versión española sigue de cerca las decisiones ya estabilizadas, especialmente el valor anafórico de οὗτος, el imperfecto de εἰμί, la alusión a Génesis en ἐν ἀρχῇ y el matiz relacional de πρός.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός, conforme al estándar del proyecto.
  - Se preserva el eco de Génesis con «en el principio».
  - Se usa un demostrativo en lugar de un pronombre personal para reflejar mejor οὗτος.
  - La nota al pie recoge la alternativa lexical principal sin duplicar marcadores.
