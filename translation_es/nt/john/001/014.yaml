translation:
  language: es
  text: Y la Palabra se hizo carne y habitó entre nosotros[a], y vimos su gloria, gloria como del Hijo único[b] del Padre, lleno de gracia y de verdad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «puso su tienda entre nosotros»; también, «tabernaculó entre nosotros». El verbo alude a la imagen del tabernáculo.
    reason: lexical_alternative
  - marker: b
    text: O «Hijo unigénito»; también, «único Hijo».
    reason: alternative_reading
lexical_decisions:
- source_word: λόγος
  english_pob_choice: the Word
  chosen_spanish: la Palabra
  alternatives_spanish:
  - el Verbo
  - el Mensaje
  lexicon: BDAG
  rationale: «Palabra» conserva el título joánico establecido y el valor personal y teológico del término sin reducirlo a una abstracción. «Verbo» es tradicional, pero en español contemporáneo suena más técnico y menos natural; «Mensaje» pierde la referencia personal.
- source_word: σάρξ
  english_pob_choice: flesh
  chosen_spanish: carne
  alternatives_spanish:
  - humanidad
  - naturaleza humana
  lexicon: BDAG
  rationale: «Carne» refleja con fidelidad la encarnación concreta y mantiene la fuerza lexical del griego. Las alternativas explican el sentido, pero suavizan la tensión deliberada del texto.
- source_word: ἐγένετο
  english_pob_choice: became
  chosen_spanish: se hizo
  alternatives_spanish:
  - llegó a ser
  - vino a ser
  lexicon: BDAG
  rationale: «Se hizo» expresa de modo natural el cambio real indicado por el verbo y funciona bien en español teológico sin volverse rígido.
- source_word: ἐσκήνωσεν ἐν ἡμῖν
  english_pob_choice: dwelt among us
  chosen_spanish: habitó entre nosotros
  alternatives_spanish:
  - tabernaculó entre nosotros
  - plantó su tienda entre nosotros
  lexicon: BDAG
  rationale: «Habitó entre nosotros» es claro y digno en español. La alusión al tabernáculo se conserva en la nota, para no forzar una frase demasiado literal en el texto principal.
- source_word: ἐθεασάμεθα
  english_pob_choice: we saw
  chosen_spanish: vimos
  alternatives_spanish:
  - contemplamos
  - miramos
  lexicon: BDAG
  rationale: «Vimos» reproduce con naturalidad el testimonio directo del aoristo sin elevar artificialmente el registro.
- source_word: δόξαν
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - esplendor
  - majestad
  lexicon: BDAG
  rationale: «Gloria» es la correspondencia bíblica estándar y preserva el peso teológico del término en Juan.
- source_word: ὡς
  english_pob_choice: as of
  chosen_spanish: como de
  alternatives_spanish:
  - cual de
  - como
  lexicon: BDAG
  rationale: «Como de» comunica comparación sin diluir la fuerza de la expresión ni convertirla en mera semejanza vacía.
- source_word: μονογενοῦς
  english_pob_choice: the one and only Son
  chosen_spanish: un Hijo unigénito
  alternatives_spanish:
  - el Hijo único
  - el Hijo único y unigénito
  lexicon: BDAG
  rationale: Dado que el inglés POB preserva en nota la alternativa tradicional «only begotten Son», en español se opta por «un Hijo unigénito», que mantiene la resonancia cristológica histórica y la ambigüedad productiva del término. «Hijo único» es una opción válida, pero atenúa la tradición exegética que la POB decide no borrar.
- source_word: παρὰ πατρός
  english_pob_choice: from the Father
  chosen_spanish: del Padre
  alternatives_spanish:
  - procedente del Padre
  - desde el Padre
  lexicon: BDAG
  rationale: En contexto, παρά expresa origen o procedencia en relación con el Padre. «Del Padre» es la forma natural y sobria en español.
- source_word: πλήρης χάριτος καὶ ἀληθείας
  english_pob_choice: full of grace and truth
  chosen_spanish: lleno de gracia y de verdad
  alternatives_spanish:
  - pleno de gracia y verdad
  - lleno de gracia y verdad
  lexicon: BDAG
  rationale: «Lleno de gracia y de verdad» preserva la fórmula bíblica natural en español y refleja con claridad el predicado nominal del texto.
theological_decisions:
- issue: Cómo traducir μονογενοῦς sin borrar la tensión entre unicidad y tradición doctrinal
  english_pob_reading: 'the one and only Son; footnote: only begotten Son / unique Son'
  chosen_spanish_reading: 'un Hijo unigénito; nota: «Hijo único» / «único Hijo»'
  alternative_spanish_readings:
  - el Hijo único
  - único Hijo
  - el Hijo unigénito
  rationale: La forma principal conserva la densidad histórica de la cristología joánica sin convertir el término en una paráfrasis moderna demasiado estrecha. La nota puede recoger las alternativas, para no ocultar la discusión lexical.
  doctrine_reference: Doctrina cristológica; Translation philosophy §§1, 3, 6
- issue: Si explicitar la imagen del tabernáculo en ἐσκήνωσεν
  english_pob_reading: 'dwelt among us; footnote: tabernacled among us / pitched his tent among us'
  chosen_spanish_reading: 'habitó entre nosotros; nota: «levantó su tienda entre nosotros» / «tabernaculó entre nosotros»'
  alternative_spanish_readings:
  - tabernaculó entre nosotros
  - levantó su tienda entre nosotros
  rationale: Se mantiene una formulación comprensible y reverente en el cuerpo del texto, mientras la nota preserva la alusión veterotestamentaria al tabernáculo sin imponer un calco poco idiomático.
  doctrine_reference: Tipología bíblica; Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'La revisión más reciente del expediente inglés no introdujo cambios: el texto quedó confirmado sin modificaciones y el control cruzado reporta alta concordancia. La versión española sigue de cerca esas decisiones, conservando la equivalencia óptima y las alternativas relevantes en nota.'
  spanish_consistency_notes:
  - Se mantuvo «Palabra» para λόγος, conforme al uso joánico establecido en español bíblico contemporáneo.
  - Se eligió «carne» para σάρξ para no suavizar la encarnación concreta del texto.
  - Se evitó «SEÑOR» o «Cristo» porque no corresponden al léxico de este versículo.
  - «Habitó entre nosotros» conserva la fluidez; la alusión tabernacular queda documentada en nota.
  - «Un Hijo unigénito» conserva la tensión entre unicidad y la tradición doctrinal asociada al término griego.
