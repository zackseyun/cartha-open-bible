translation:
  language: es
  text: Y la luz brilla en la oscuridad[a], y la oscuridad no la venció.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «la oscuridad no la comprendió» o «no la captó». El verbo griego puede expresar tanto vencer como aprehender o comprender.'
    reason: alternative_reading
lexical_decisions:
- source_word: φῶς
  english_pob_choice: the light
  chosen_spanish: la luz
  alternatives_spanish:
  - luz
  lexicon: BDAG
  rationale: El artículo definido se conserva en español para reflejar la referencia temática y específica del prólogo de Juan. «Luz» es el equivalente natural de φῶς en este contexto.
- source_word: σκοτίᾳ / σκοτία
  english_pob_choice: the darkness
  chosen_spanish: la oscuridad
  alternatives_spanish:
  - tinieblas
  - la tiniebla
  lexicon: BDAG
  rationale: Se usa el sustantivo singular con artículo para mantener el contraste personificado entre luz y oscuridad. «Oscuridad» comunica bien el campo semántico sin forzar un plural poético que el griego no exige aquí.
- source_word: φαίνει
  english_pob_choice: shines
  chosen_spanish: resplandece
  alternatives_spanish:
  - brilla
  - está brillando
  lexicon: BDAG
  rationale: El presente indica acción continua o viva; «resplandece» transmite esa vivacidad con un registro digno y natural en español, sin añadir matices no presentes en el texto.
- source_word: κατέλαβεν
  english_pob_choice: has not overcome
  chosen_spanish: no la venció
  alternatives_spanish:
  - no la comprendió
  - no la captó
  - no la tomó
  lexicon: BDAG
  rationale: El verbo καταλαμβάνω permite la idea de vencer/alcanzar/apoderarse y también de comprender. En la metáfora inmediata de luz frente a oscuridad, «vencer» comunica mejor el sentido hostil principal. Se conserva la ambigüedad relevante en nota.
- source_word: αὐτὸ
  english_pob_choice: it
  chosen_spanish: la
  alternatives_spanish:
  - lo
  lexicon: BDAG
  rationale: Aunque el pronombre griego es neutro y puede referirse gramaticalmente a φῶς, en español el referente natural de «luz» es femenino; por eso se usa «la» para concordancia idiomática sin perder la referencia al antecedente.
theological_decisions:
- issue: Sentido de κατέλαβεν en el contraste luz/oscuridad
  english_pob_reading: has not overcome
  chosen_spanish_reading: no la venció
  alternative_spanish_readings:
  - no la comprendió
  - no la captó
  - no la tomó
  rationale: 'La imagen inmediata favorece una lectura de conflicto: la oscuridad no logra dominar a la luz. Sin embargo, el verbo griego también admite el sentido cognitivo de comprender/aprehender. Se mantiene esa tensión mediante nota, evitando resolverla de manera exclusiva.'
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: Alineado con el pasaje inglés POB vigente y su nota alternativa; no se requieren revisiones respecto del último pase, y se conserva la tensión semántica de καταλαμβάνω en la nota.
  spanish_consistency_notes:
  - Se mantiene «luz» y «oscuridad» como términos temáticos centrales del prólogo.
  - Se evita «SEÑOR» u այլ máscaras porque el versículo no contiene el nombre divino.
  - Se conserva un registro bíblico moderno, claro y publicable, sin calco innecesario.
  - El pronombre se adapta a la concordancia natural del español («la») por referencia a «luz».
