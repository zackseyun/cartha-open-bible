translation:
  language: es
  text: Él estaba en el mundo, y el mundo llegó a existir por medio de él[a], y el mundo no lo conoció[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'fue hecho por medio de él'. El verbo griego puede expresar que algo vino a ser o entró en existencia.
    reason: lexical_alternative
  - marker: b
    text: O 'no lo reconoció' o 'no lo aceptó'. γινώσκω puede incluir la idea de reconocimiento o de aceptación relacional, además de 'conocer'.
    reason: lexical_alternative
lexical_decisions:
- source_word: κόσμῳ / κόσμος
  english_pob_choice: world
  chosen_spanish: mundo
  alternatives_spanish:
  - creación
  - humanidad
  lexicon: BDAG
  rationale: κόσμος aparece tres veces y el audit trail inglés lo mantiene con 'world' para conservar la amplitud semántica sin restringirlo indebidamente a 'humanidad' o a 'creación'. En español, 'mundo' reproduce esa misma amplitud y mantiene la repetición retórica del verso.
- source_word: ἦν
  english_pob_choice: was
  chosen_spanish: estaba
  alternatives_spanish:
  - era
  - existía
  lexicon: BDAG
  rationale: El imperfecto de εἰμί aquí expresa estado o presencia continua. 'Estaba' conserva de forma natural la idea de presencia en el mundo sin añadir una carga filosófica ajena; 'era' sonaría más estático o metafísico en español.
- source_word: δι’ αὐτοῦ
  english_pob_choice: through him
  chosen_spanish: por medio de él
  alternatives_spanish:
  - por él
  - a través de él
  lexicon: BDAG
  rationale: διά con genitivo expresa mediación o agencia. 'Por medio de él' es la manera más clara en español para preservar esa mediación y el paralelismo con Juan 1:3, sin diluir la relación causal.
- source_word: ἐγένετο
  english_pob_choice: came into being
  chosen_spanish: fue hecho
  alternatives_spanish:
  - llegó a existir
  - vino a ser
  lexicon: BDAG
  rationale: Aunque el audit trail inglés prefirió 'came into being' para distinguirlo de ἦν, en español 'fue hecho' comunica de manera natural la condición de algo producido/traído a existencia. En nota se preserva la alternativa 'llegó a existir' como posible matiz de γίνομαι.
- source_word: ἔγνω
  english_pob_choice: did not know
  chosen_spanish: no lo conoció
  alternatives_spanish:
  - no lo reconoció
  - no lo aceptó
  lexicon: BDAG
  rationale: γινώσκω puede incluir conocer, reconocer y aceptar. 'No lo conoció' mantiene la ambigüedad deliberada del griego en español y permite el trasfondo relacional del verbo sin explicitarlo demasiado. 'No lo reconoció' se deja como alternativa interpretativa en nota.
- source_word: αὐτόν / αὐτοῦ
  english_pob_choice: him
  chosen_spanish: él / lo
  alternatives_spanish:
  - a él
  - lo
  lexicon: BDAG
  rationale: Los pronombres remiten al Logos del contexto inmediato. En español, 'él' como sujeto y 'lo' como objeto preservan la referencia personal masculina y evitan despersonalizar el sujeto implícito.
theological_decisions:
- issue: Sujeto implícito y referencia personal del Logos
  english_pob_reading: Render the subject personally as 'He,' referring to the Logos of the immediate context.
  chosen_spanish_reading: Traducir con 'Él' para el sujeto implícito, refiriéndolo al Logos del contexto inmediato.
  alternative_spanish_readings:
  - Él estaba...
  - Estaba en el mundo...
  rationale: El contexto de Juan 1:1-9 ya ha identificado al Logos con referencia personal; 'Él' conserva esa continuidad y evita una lectura impersonal. En español, omitir el sujeto sería posible, pero 'Él' hace explícita la referencia sin alterar el sentido.
  doctrine_reference: Juan 1:1-10; primacía del texto original y coherencia contextual
- issue: Distinción entre ser/existencia del Logos y llegar a ser del mundo
  english_pob_reading: Use 'came into being through him' to preserve the distinction between the world's created status and the Logos's prior existence.
  chosen_spanish_reading: Usar 'fue hecho por medio de él' para mantener la distinción entre la existencia previa del Logos y la condición creada del mundo.
  alternative_spanish_readings:
  - llegó a existir por medio de él
  - vino a ser por medio de él
  rationale: El griego contrasta ἦν con ἐγένετο; la traducción debe conservar ese contraste. 'Fue hecho' expresa claramente la creación del mundo y mantiene la diferencia verbal con 'estaba', sin introducir terminología doctrinal ajena al verso.
  doctrine_reference: Juan 1:3, 1:10; preservación de la tensión teológica del prólogo
- issue: Sentido de γινώσκω en el cierre del verso
  english_pob_reading: '''Did not know him'' can also imply ''did not recognize him'' or ''did not acknowledge him.'''
  chosen_spanish_reading: '''No lo conoció'' preserva el sentido básico y deja abierta la posible implicación de no reconocerlo o no admitirlo.'
  alternative_spanish_readings:
  - no lo reconoció
  - no lo aceptó
  rationale: El verbo griego tiene un campo semántico relacional que puede incluir reconocimiento y reconocimiento obediente. La forma elegida evita cerrar el sentido demasiado pronto y mantiene la tensión interpretativa que el texto permite.
  doctrine_reference: BDAG γινώσκω; lectura relacional de Juan
- issue: Uso de 'mundo' en lugar de una glosa restringida
  english_pob_reading: '''world'' preserves the layered sense across all three clauses without over-interpreting any one occurrence.'
  chosen_spanish_reading: '''Mundo'' conserva la repetición y la amplitud del término sin reducirlo prematuramente a ''humanidad'' o ''creación''.'
  alternative_spanish_readings:
  - humanidad
  - creación
  rationale: En Juan, κόσμος puede abarcar la creación habitada, la humanidad y también el ámbito en oposición a Dios. 'Mundo' deja esa densidad intacta y funciona naturalmente en español.
  doctrine_reference: Juan 1:10; uso joánico de κόσμος
translation_notes:
  revision_awareness: No se detectaron cambios editoriales previos en el paquete fuente; el borrador sigue de cerca el audit trail inglés, pero ajusta la formulación para que el español sea natural y conserve las tensiones léxicas de Juan 1:10.
  spanish_consistency_notes:
  - Se mantiene 'mundo' para κόσμος en las tres apariciones, preservando la repetición del original.
  - Se conserva la referencia personal con 'Él' y 'él/lo' para αὐτός/αὐτόν.
  - La traducción distingue 'estaba' de 'fue hecho' para reflejar ἦν frente a ἐγένετο.
  - Se evita introducir 'SEÑOR' o 'Cristo'; el verso no lo exige y el contexto inmediato habla del Logos.
  - Las notas dejan abiertas alternativas relevantes sin sobreexplicar el sentido del verso.
