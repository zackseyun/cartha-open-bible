    issue: La traducción principal de ἐγένετο como 'fue hecho' debilita el contraste con ἦν.
    rationale: El audit trail inglés enfatiza que Juan contrasta 'was' con 'came into being'. 'Fue hecho' es posible, pero no conserva tan claramente la oposición ser/llegar a existir que el proyecto decidió preservar en el texto principal.
  - severity: high
    issue: Las notas a y b no corresponden a los mismos puntos léxicos del audit trail inglés.
    rationale: En el inglés, la primera nota trata la alternativa de ἐγένετο y la segunda el matiz de 'did not know him'. En el borrador, [a] comenta ἦν y [b] comenta ἐγένετο, creando desajuste con la auditoría y añadiendo una nota no necesaria.
  - severity: medium
    issue: La nota sobre 'estaba' es innecesaria y poco útil para el lector final.
    rationale: No preserva una alternativa significativa del inglés ni resuelve una ambigüedad nueva en español. Puede distraer del foco real del versículo.
  - severity: low
