revisions:
- from: Él estaba en el mundo[a], y el mundo fue hecho por medio de él[b], y el mundo no lo conoció[c].
  to: Él estaba en el mundo, y el mundo llegó a existir por medio de él[a], y el mundo no lo conoció[b].
  rationale: 'Se revisa el texto principal para reflejar mejor el contraste entre ἦν y ἐγένετο que el prólogo de Juan explota teológicamente y que el audit trail inglés preserva. Se eliminó la nota innecesaria sobre ''estaba'' y se reordenaron las notas para que correspondan a las dos alternativas léxicas significativas documentadas: ἐγένετο y ἔγνω. La redacción resultante sigue siendo natural en español y fiel al griego.'
