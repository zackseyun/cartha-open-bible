translation:
  language: es
  text: Al día siguiente[a], Juan estaba allí de pie otra vez, y dos de sus discípulos estaban con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Al día siguiente, Juan estaba otra vez de pie, y dos de sus discípulos [estaban allí].»'
    reason: alternative_reading
lexical_decisions:
- source_word: Τῇ ἐπαύριον
  english_pob_choice: On the next day
  chosen_spanish: Al día siguiente
  alternatives_spanish:
  - El día siguiente
  - Al siguiente día
  lexicon: BDAG
  rationale: La expresión griega con artículo funciona como un giro temporal fijo. En español, «al día siguiente» transmite de manera natural la sucesión temporal sin perder el valor narrativo de continuidad.
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  - nuevamente
  lexicon: BDAG
  rationale: «Otra vez» es una equivalencia clara y natural para la repetición de la escena; mantiene el matiz simple y narrativo de πάλιν.
- source_word: εἱστήκει
  english_pob_choice: was standing there
  chosen_spanish: estaba allí
  alternatives_spanish:
  - estaba de pie allí
  - seguía de pie allí
  lexicon: BDAG
  rationale: El griego presenta un estado ya establecido en la escena. En español, «estaba allí» conserva la presencia continua sin forzar una perífrasis demasiado pesada; el contexto ya implica la postura de pie por el verbo griego y la escena narrativa.
- source_word: ὁ Ἰωάννης
  english_pob_choice: John
  chosen_spanish: Juan
  alternatives_spanish:
  - Juan el Bautista
  - Juan el Bautista
  lexicon: BDAG
  rationale: El texto griego nombra simplemente a Juan. En el cuerpo principal se mantiene el nombre sin expandirlo, para no añadir identificación que el verso no expresa explícitamente.
- source_word: ἐκ τῶν μαθητῶν αὐτοῦ δύο
  english_pob_choice: two of his disciples were with him
  chosen_spanish: dos de sus discípulos estaban con él
  alternatives_spanish:
  - dos de sus discípulos
  - dos entre sus discípulos estaban con él
  lexicon: BDAG
  rationale: Se conserva el sentido partitivo de ἐκ con «de sus discípulos». Como el español requiere una predicación más completa, se expresa la relación locativa con «estaban con él», que corresponde al contexto narrativo del inglés auditado.
theological_decisions:
- issue: Identificación de Juan
  english_pob_reading: John
  chosen_spanish_reading: Juan
  alternative_spanish_readings:
  - Juan el Bautista
  rationale: El griego sólo dice ὁ Ἰωάννης; no se amplía en el texto principal para evitar introducir una identificación no explícita en el verso. La referencia contextual puede asumirse por la perícopa, pero no se impone en la traducción.
  doctrine_reference: Principio de sobriedad textual y no-expansión del referente implícito
translation_notes:
  revision_awareness: 'Se siguió el texto griego SBLGNT y el audit trail inglés sin cambios sustantivos respecto del sentido: la secuencia temporal, la reiteración de la escena, la postura/presencia de Juan y el carácter partitivo de «dos de sus discípulos» quedan preservados. El español ajusta la elipsis verbal de forma idiomática sin añadir contenido nuevo.'
  spanish_consistency_notes:
  - Se usa «Juan» y no se expande a «Juan el Bautista» en el texto principal, en línea con el griego.
  - «Al día siguiente» mantiene el valor temporal idiomático de Τῇ ἐπαύριον.
  - «Otra vez» traduce πάλιν con una opción breve y natural.
  - «Estaban con él» explicita la relación contextual que en griego queda comprimida en la frase partitiva.
  - La nota alternativa conserva la posibilidad de leer el pasaje con una elipsis más literal en español.
