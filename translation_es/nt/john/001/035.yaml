review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del griego: Τῇ ἐπαύριον = «Al día siguiente», πάλιν = repetición narrativa, y ἐκ τῶν μαθητῶν αὐτοῦ δύο = «dos de sus discípulos». Sin embargo, εἱστήκει expresa el estado de estar de pie/estar parado, no solo presencia general. La omisión de esa postura en «estaba allí» debilita un matiz léxico que el inglés auditado preservó con «was standing there».'
  spanish_quality_summary: El español es claro y natural, pero «estaba allí otra vez» pierde precisión frente a «estaba allí, de pie, otra vez» o «estaba allí de nuevo, de pie». Además, la nota alternativa actual «El día siguiente» no suena natural en español; conviene reformularla a una alternativa idiomática real.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Juan» y «discípulos» están bien. El ajuste necesario es léxico-estilístico en εἱστήκει para reflejar mejor el valor de ἵστημι.
  issues:
  - severity: medium
    issue: εἱστήκει se tradujo como «estaba allí»
    rationale: El verbo griego aporta la idea de estar de pie/estar parado en estado continuo. «Estaba allí» solo expresa ubicación y pierde un componente semántico presente en la fuente y preservado en el inglés POB.
  - severity: low
    issue: La nota alternativa usa «El día siguiente»
    rationale: Aunque refleja una alternativa más literal al inglés, en español suena poco natural. Debe ofrecerse una alternativa idiomática, por ejemplo «Al día siguiente, Juan estaba de pie otra vez...» o «El día siguiente, Juan estaba de pie...» solo si se quiere muy literal, pero la primera es preferible.
  revised_spanish_text: Al día siguiente[a], Juan estaba allí de pie otra vez, y dos de sus discípulos estaban con él.
  revised_footnotes:
  - marker: a
    text: 'O: «Al día siguiente, Juan estaba otra vez de pie, y dos de sus discípulos [estaban allí].»'
    reason: alternative_reading
  revision_rationale: Se revisa εἱστήκει para conservar explícitamente la postura/estado de «estar de pie», que el borrador atenuaba. También se mejora la nota alternativa para que suene natural en español y siga reflejando la opción de orden/fraseo documentada en el inglés POB.
