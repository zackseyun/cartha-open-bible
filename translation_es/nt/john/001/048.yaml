translation:
  language: es
  text: 'Natanael le dijo[a]: «¿Cómo me conoces?». Jesús respondió y le dijo: «Antes de que Felipe te llamara, mientras estabas bajo la higuera, te vi».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «¿De dónde me conoces?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: Πόθεν
  english_pob_choice: How
  chosen_spanish: ¿Cómo…?
  alternatives_spanish:
  - ¿De dónde…?
  - ¿Desde dónde…?
  lexicon: BDAG
  rationale: En este giro con γινώσκεις, la pregunta no busca ubicación espacial literal, sino la base o fuente del conocimiento de Jesús. «¿Cómo me conoces?» expresa mejor esa fuerza idiomática en español que un calco como «¿De dónde me conoces?».
- source_word: γινώσκεις
  english_pob_choice: do you know
  chosen_spanish: me conoces
  alternatives_spanish:
  - me sabes
  - reconoces mi identidad
  lexicon: BDAG
  rationale: Aquí γινώσκω expresa conocimiento personal/acquaintance. «Conocer» es la opción natural y fiel en español; evita una formulación forzada y conserva la relación personal implícita.
- source_word: ἀπεκρίθη ... καὶ εἶπεν
  english_pob_choice: answered and said
  chosen_spanish: respondió y le dijo
  alternatives_spanish:
  - respondió
  - replicó y le dijo
  lexicon: BDAG
  rationale: El griego conserva ambos verbos. En español, «respondió y le dijo» reproduce ese encadenamiento discursivo sin sonar innecesariamente redundante.
- source_word: Πρὸ τοῦ ... φωνῆσαι
  english_pob_choice: Before ... called
  chosen_spanish: Antes de que Felipe te llamara
  alternatives_spanish:
  - Antes de que Felipe te llamase
  - Antes que Felipe te llamara
  lexicon: BDAG
  rationale: φω­νέω aquí significa «llamar» en el sentido narrativo normal. «Antes de que Felipe te llamara» es claro, directo y fiel al valor temporal de Πρὸ τοῦ + infinitivo.
- source_word: ὄντα
  english_pob_choice: while you were
  chosen_spanish: mientras estabas
  alternatives_spanish:
  - cuando estabas
  - estando
  lexicon: BDAG
  rationale: El participio ὄντα aporta un marco circunstancial temporal. «Mientras estabas» conserva esa relación sin exigir una construcción más pesada en español.
- source_word: ὑπὸ τὴν συκῆν
  english_pob_choice: under the fig tree
  chosen_spanish: bajo la higuera
  alternatives_spanish:
  - debajo de la higuera
  - bajo el árbol de higos
  lexicon: BDAG
  rationale: «Higuera» es el equivalente natural de συκῆ en español bíblico. «Bajo la higuera» mantiene la imagen concreta y la preposición simple del original.
- source_word: εἶδόν σε
  english_pob_choice: I saw you
  chosen_spanish: te vi
  alternatives_spanish:
  - yo te vi
  - te había visto
  lexicon: BDAG
  rationale: El aoristo en discurso directo se vierte naturalmente con pretérito simple. «Te vi» conserva la afirmación directa sin añadir matices aspectuales que el texto no explicita.
theological_decisions:
- issue: Naturaleza del conocimiento de Jesús sobre Natanael
  english_pob_reading: Render the statement straightforwardly without explicating whether the knowledge is supernatural, prophetic, or ordinary.
  chosen_spanish_reading: Traducir la afirmación de manera directa, sin explicar si el conocimiento es sobrenatural, profético u ordinario.
  alternative_spanish_readings:
  - «Te conocía de antemano»
  - «Te vi sobrenaturalmente»
  - «Te observé antes»
  rationale: El versículo afirma que Jesús vio/conoció a Natanael antes del llamado de Felipe, pero no explica el mecanismo. La traducción debe preservar esa tensión teológica en lugar de resolverla interpretativamente.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión inglesa más reciente ajustó la frase del participio a «while you were under the fig tree» para reflejar con más naturalidad ὄντα ὑπὸ τὴν συκῆν. La versión española sigue esa misma decisión con «mientras estabas bajo la higuera», manteniendo la relación temporal-circunstancial sin sobrerinterpretar el modo del conocimiento de Jesús.
  spanish_consistency_notes:
  - Se conserva «Jesús» como nombre propio establecido para Ἰησοῦς.
  - Se usa «higuera» para συκῆ, conforme al léxico estándar y a la imagen concreta del pasaje.
  - Se evita «Señor» o una paráfrasis teológica en el texto principal, porque el griego aquí presenta una escena narrativa directa.
  - La nota[a] se ancla en «¿Cómo me conoces?» para preservar la alternativa más literal sin recargar el cuerpo principal.
