revisions:
- from: 'Natanael le dijo a él[a]: «¿Cómo me conoces?». Jesús respondió y le dijo: «Antes de que Felipe te llamara, mientras estabas bajo la higuera, te vi».'
  to: 'Natanael le dijo[a]: «¿Cómo me conoces?». Jesús respondió y le dijo: «Antes de que Felipe te llamara, mientras estabas bajo la higuera, te vi».'
  rationale: 'Se hacen ajustes menores de naturalidad y estilo: se elimina «a él» por ser un calco innecesario, y se mejora la nota alternativa con una literalidad más idiomática en español. El resto del texto es fiel al griego, al rastro de auditoría inglés y a la legibilidad esperada.'
