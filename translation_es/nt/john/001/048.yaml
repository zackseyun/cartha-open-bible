review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del griego y sigue de cerca las decisiones del POB inglés: «¿Cómo me conoces?» traduce idiomáticamente Πόθεν με γινώσκεις, se conserva el doble verbo «respondió y le dijo», y la relación temporal/circunstancial de Πρὸ τοῦ… ὄντα ὑπὸ τὴν συκῆν se transmite con claridad. No se introduce explicación teológica indebida sobre cómo Jesús sabía de Natanael.'
  spanish_quality_summary: 'El español es claro y natural, pero tiene un detalle de estilo y fidelidad discursiva que conviene corregir: «le dijo a él[a]» es gramaticalmente posible, pero suena innecesariamente calcado en español bíblico moderno; «le dijo[a]» preserva mejor la naturalidad sin pérdida de sentido. Además, la puntuación mejora si la pregunta queda dentro de la misma oración sin punto extra antes del cierre de comillas.'
  glossary_alignment: 'No hay términos del glosario mayor en juego como Yahvé, Mesías o esclavo. Las elecciones léxicas principales están alineadas con el proyecto: «conoces», «respondió y le dijo», «bajo la higuera», «te vi». La nota alternativa para Πόθεν debe preferir «¿De dónde me conoces?» antes que «¿Desde dónde me conoces?», porque es la forma española natural para la literalidad relativa del griego.'
  issues:
  - severity: medium
    issue: «le dijo a él[a]» suena calcado y poco natural en español
    rationale: El dativo αὐτῷ se expresa idiomáticamente con «le»; añadir «a él» aquí no aporta contraste ni énfasis presentes en el griego y degrada la fluidez del español.
  - severity: low
    issue: La nota literal usa «¿Desde dónde me conoces?»
    rationale: Aunque defendible como hiperliteral, en español la forma natural para reflejar «from where» es «¿De dónde me conoces?». «Desde dónde» suena forzado y menos idiomático.
  - severity: low
    issue: Puntuación mejorable en el primer discurso directo
    rationale: ««¿Cómo me conoces?»» basta; el punto antes del cierre de comillas no es necesario en esta construcción y recarga la línea.
  revised_spanish_text: 'Natanael le dijo[a]: «¿Cómo me conoces?». Jesús respondió y le dijo: «Antes de que Felipe te llamara, mientras estabas bajo la higuera, te vi».'
  revised_footnotes:
  - marker: a
    text: 'O, más literalmente: «¿De dónde me conoces?»'
    reason: lexical_alternative
  revision_rationale: 'Se hacen ajustes menores de naturalidad y estilo: se elimina «a él» por ser un calco innecesario, y se mejora la nota alternativa con una literalidad más idiomática en español. El resto del texto es fiel al griego, al rastro de auditoría inglés y a la legibilidad esperada.'
