translation:
  language: es
  text: 'Él encontró primero a su propio hermano Simón y le dijo[a]: «Hemos encontrado al Mesías» (lo que significa Mesías).'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más tradicional: «Hemos encontrado al Mesías» (que se traduce «Cristo»).'
    reason: alternative_reading
lexical_decisions:
- source_word: εὑρίσκει
  english_pob_choice: found
  chosen_spanish: encontró
  alternatives_spanish:
  - encuentra
  lexicon: BDAG
  rationale: El griego usa presente histórico; en español narrativo es natural verterlo en pasado sin perder el valor de la acción realizada.
- source_word: οὗτος
  english_pob_choice: he
  chosen_spanish: Éste
  alternatives_spanish:
  - él
  - este hombre
  lexicon: BDAG
  rationale: El demostrativo remite a Andrés en el contexto inmediato; en español puede conservarse con 'Éste' para mantener el vínculo deíctico sin oscurecer la referencia.
- source_word: πρῶτον
  english_pob_choice: first
  chosen_spanish: primero
  alternatives_spanish:
  - antes que nada
  - en primer lugar
  lexicon: BDAG
  rationale: 'Conserva la fuerza temporal/secuencial: su primera acción fue encontrar a Simón.'
- source_word: τὸν ἀδελφὸν τὸν ἴδιον
  english_pob_choice: his own brother
  chosen_spanish: a su propio hermano
  alternatives_spanish:
  - a su hermano
  - a su hermano mismo
  lexicon: BDAG
  rationale: '''Propio'' refleja el énfasis de ἴδιον mejor que una simple posesión sin matiz.'
- source_word: Σίμωνα
  english_pob_choice: Simon
  chosen_spanish: Simón
  lexicon: BDAG
  rationale: Nombre propio transliterado según la convención del proyecto.
- source_word: λέγει αὐτῷ
  english_pob_choice: said to him
  chosen_spanish: le dijo
  alternatives_spanish:
  - le dice
  - se lo dijo
  lexicon: BDAG
  rationale: El presente histórico se naturaliza en pasado en español. 'Le dijo' es directo y conserva la relación verbal sin añadir interpretación.
- source_word: Εὑρήκαμεν
  english_pob_choice: We have found
  chosen_spanish: Hemos encontrado
  alternatives_spanish:
  - Encontramos
  lexicon: BDAG
  rationale: El perfecto griego se representa bien con el presente perfecto español, manteniendo la relevancia actual del hallazgo.
- source_word: Μεσσίαν
  english_pob_choice: Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: El texto nombra explícitamente el título mesiánico semítico; 'Mesías' preserva mejor ese valor que 'Cristo' en la línea principal.
- source_word: μεθερμηνευόμενον
  english_pob_choice: which means
  chosen_spanish: lo que significa
  alternatives_spanish:
  - que se traduce
  - que quiere decir
  lexicon: BDAG
  rationale: La glosa explica el sentido del título para el lector; 'lo que significa' reproduce esa función con naturalidad en español.
- source_word: χριστός
  english_pob_choice: Anointed One / Christ
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  - Ungido
  lexicon: BDAG
  rationale: En esta construcción explicativa, el sentido semántico del término griego coincide con la designación ya dada; 'Mesías' evita introducir una forma tradicional distinta y mantiene la coherencia del título.
theological_decisions:
- issue: Tratamiento del título mesiánico y su glosa explicativa
  english_pob_reading: Main text uses 'Messiah' for Μεσσίαν and a parenthetical gloss for χριστός; the audit trail notes that 'Christ' was considered but restored to 'Messiah' for doctrinal consistency.
  chosen_spanish_reading: 'Texto principal: ''Mesías''; glosa: ''lo que significa Mesías''.'
  alternative_spanish_readings:
  - '''Mesías'' ... ''(lo que significa Cristo)'''
  - '''Mesías'' ... ''(que se traduce Cristo)'''
  rationale: En español, repetir 'Mesías' en la glosa conserva el valor explicativo del paréntesis sin desplazar el título principal a una forma tradicional menos transparente. Es fiel a la decisión revisada del audit trail de privilegiar 'Messiah/Mesías'.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names. Χριστός → Messiah where title sense is in view.'
translation_notes:
  revision_awareness: 'El registro inglés muestra un ciclo de revisión en la glosa de χριστός: primero se intentó una paráfrasis semántica, luego se ajustó a ''Christ'', y finalmente se restauró ''Messiah'' por coherencia doctrinal. La versión española sigue la lectura restaurada y mantiene la glosa explicativa sin introducir una equivalencia tradicional que desplace el término principal.'
  spanish_consistency_notes:
  - Se usa 'Mesías' para el título semítico principal y también en la glosa explicativa, para no crear una distinción artificial entre Μεσσίας y χριστός en este versículo.
  - Se mantiene el presente perfecto 'hemos encontrado' para Εὑρήκαμεν, porque comunica mejor la relevancia presente del hallazgo.
  - El demonstrativo 'Éste' conserva la deixis de οὗτος sin volver la frase demasiado pesada.
