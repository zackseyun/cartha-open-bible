translation:
  language: es
  text: 'Y confesó y no negó, sino que confesó: «Yo no soy el Mesías[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «el Cristo». El título griego es Χριστός (Christos). Aquí funciona como título mesiánico, por eso el texto principal lo traduce «el Mesías».
    reason: alternative_reading
lexical_decisions:
- source_word: ὡμολόγησεν
  english_pob_choice: confessed
  chosen_spanish: confesó
  alternatives_spanish:
  - reconoció públicamente
  - declaró abiertamente
  lexicon: BDAG
  rationale: ὁμολογέω expresa aquí una declaración abierta y solemne. «Confesó» conserva la fuerza formal y la repetición retórica del griego mejor que un verbo más débil como «reconoció».
- source_word: οὐκ ἠρνήσατο
  english_pob_choice: did not deny
  chosen_spanish: no negó
  alternatives_spanish:
  - no lo negó
  - no lo desmintió
  - no lo rechazó
  lexicon: BDAG
  rationale: ἀρνέομαι en este contexto johánico significa «negar». «No negó» reproduce la negación directa y el paralelismo con «confesó».
- source_word: καὶ ... καὶ ... καὶ
  english_pob_choice: And ... and ... but ...
  chosen_spanish: Y ... y ... sino que ...
  alternatives_spanish:
  - Y ... y ... y ...
  lexicon: BDAG
  rationale: El griego repite καί con valor enfático y acumulativo. En español, «sino que» comunica mejor el giro culminante de la segunda cláusula de confesión sin perder la progresión retórica.
- source_word: Ἐγὼ οὐκ εἰμὶ
  english_pob_choice: I am not
  chosen_spanish: Yo no soy
  alternatives_spanish:
  - Yo mismo no soy
  - No soy yo
  lexicon: BDAG
  rationale: El pronombre explícito ἐγώ aporta énfasis; en español, «Yo no soy» lo conserva de forma natural y contundente.
- source_word: ὁ χριστός
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - el Cristo
  lexicon: BDAG
  rationale: Aquí Χριστός funciona como título mesiánico, no como nombre propio. «Mesías» preserva mejor el contexto judío y la intención del pasaje, conforme al criterio del POB.
theological_decisions:
- issue: Título cristológico Χριστός en la negación de Juan el Bautista
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - el Cristo
  rationale: Juan niega ser el esperado ungido davídico. Traducir el título como «Mesías» mantiene la carga histórica y mesiánica del texto; «Cristo» podría sonar más a nombre eclesial que a título en este contexto.
  doctrine_reference: 'DOCTRINE.md: Χριστός → Mesías cuando funciona como título'
translation_notes:
  revision_awareness: 'No se requieren cambios respecto del audit trail inglés: la lectura crítica y la decisión terminológica sobre Χριστός están estables, y la estructura retórica del versículo se preserva en español con una equivalencia óptima.'
  spanish_consistency_notes:
  - Se mantiene el tratamiento del título Χριστός como «Mesías» en el texto principal.
  - La secuencia verbal «confesó / no negó / confesó» conserva el paralelismo del griego.
  - «Yo no soy» reproduce el énfasis del pronombre explícito ἐγώ sin sobrerreformular.
