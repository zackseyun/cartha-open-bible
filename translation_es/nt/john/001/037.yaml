translation:
  language: es
  text: Y los dos discípulos[a] lo oyeron mientras él hablaba, y siguieron a Jesús.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más explícitamente, 'sus dos discípulos', refiriéndose a Juan el Bautista.
    reason: alternative_reading
lexical_decisions:
- source_word: ἤκουσαν
  english_pob_choice: heard
  chosen_spanish: oyeron
  alternatives_spanish:
  - escucharon
  lexicon: BDAG
  rationale: El aoristo de ἀκούω aquí expresa el hecho simple de oír lo que decía Jesús, no necesariamente una escucha prolongada o atenta. 'Oyeron' es natural en español y conserva ese valor puntual.
- source_word: οἱ δύο μαθηταὶ αὐτοῦ
  english_pob_choice: the two disciples
  chosen_spanish: los dos discípulos
  alternatives_spanish:
  - sus dos discípulos
  lexicon: BDAG
  rationale: La referencia de αὐτοῦ se entiende por el contexto como Juan el Bautista. En español, como en la versión inglesa auditada, puede omitirse el posesivo explícito para evitar ambigüedad y mantener la identificación clara de 'los dos discípulos'.
- source_word: λαλοῦντος
  english_pob_choice: speaking
  chosen_spanish: que él hablaba
  alternatives_spanish:
  - mientras hablaba
  - mientras hablaba él
  lexicon: BDAG
  rationale: 'El participio presente de λαλέω indica acción contemporánea: lo oyeron mientras hablaba. ''Que él hablaba'' reproduce de forma natural la relación temporal sin volverla excesivamente libre; el pronombre explícito aclara el referente en español.'
- source_word: ἠκολούθησαν
  english_pob_choice: followed
  chosen_spanish: siguieron
  alternatives_spanish:
  - fueron tras
  - lo siguieron
  lexicon: BDAG
  rationale: ἀκολουθέω puede significar seguimiento físico inmediato y también connotar discipulado. 'Siguieron' conserva ambos niveles sin imponer una paráfrasis interpretativa.
- source_word: τῷ Ἰησοῦ
  english_pob_choice: Jesus
  chosen_spanish: a Jesús
  alternatives_spanish:
  - Jesús
  lexicon: BDAG
  rationale: 'En español, el dativo con ἀκολουθέω se expresa con la preposición ''a'': ''siguieron a Jesús''. Esto preserva la relación gramatical del griego de forma idiomática.'
theological_decisions:
- issue: Referente de αὐτοῦ ('su') en 'sus dos discípulos'
  english_pob_reading: Se entiende como referencia a Juan el Bautista, no a Jesús.
  chosen_spanish_reading: Se deja implícito en 'los dos discípulos', entendiendo por contexto que son los discípulos de Juan el Bautista.
  alternative_spanish_readings:
  - sus dos discípulos
  rationale: El contexto inmediato (Juan 1:35-36) deja claro que los dos discípulos pertenecen a Juan el Bautista. Mantener el posesivo en español podría ser correcto, pero también podría sonar innecesariamente explícito; la redacción elegida sigue la claridad contextual de la auditoría inglesa.
  doctrine_reference: Juan 1:35-37
translation_notes:
  revision_awareness: La redacción sigue la lectura ya consolidada en la auditoría inglesa y no introduce cambios revisionales sustantivos; mantiene el valor puntual de ἀκούω, el matiz narrativo de ἀκολουθέω y la referencia contextual de αὐτοῦ.
  spanish_consistency_notes:
  - Se usa 'Jesús' en lugar de 'Cristo' porque el texto griego tiene Ἰησοῦς, no Χριστός.
  - Se evita 'SEÑOR' u otra sustitución porque no hay aquí un caso de κύριος.
  - '''Oyeron'' se mantiene como verbo puntual, no como ''escucharon'', para no intensificar indebidamente el matiz atencional.'
  - La nota al pie marca la alternativa de posesivo explícito, como en la auditoría inglesa, para transparentar la referencia contextual.
