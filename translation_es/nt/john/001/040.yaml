translation:
  language: es
  text: Andrés[a], hermano de Simón Pedro, era uno de los dos que habían oído de Juan y lo habían seguido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «uno de los dos que oyeron de Juan y lo siguieron». El «lo» se refiere a Jesús en el contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦν
  english_pob_choice: was
  chosen_spanish: era
  alternatives_spanish:
  - fue
  - estaba
  lexicon: BDAG
  rationale: El imperfecto de εἰμί funciona aquí como cópula de identificación y descripción de estado. «Era» suena natural en español y conserva la relación identificatoria sin sugerir un evento puntual.
- source_word: Ἀνδρέας
  english_pob_choice: Andrew
  chosen_spanish: Andrés
  alternatives_spanish:
  - Andreo
  lexicon: Transliteración española estándar
  rationale: Nombre propio tradicionalmente adaptado al español como «Andrés», equivalente natural y reconocible para el lector hispanohablante.
- source_word: ὁ ἀδελφὸς Σίμωνος Πέτρου
  english_pob_choice: Simon Peter’s brother
  chosen_spanish: hermano de Simón Pedro
  alternatives_spanish:
  - el hermano de Simón Pedro
  - hermano del Simón Pedro
  lexicon: BDAG
  rationale: ἀδελφός aquí es parentesco literal. «Hermano de Simón Pedro» preserva la relación genitiva de manera clara y natural en español, sin añadir explicación interpretativa.
- source_word: εἷς ἐκ τῶν δύο
  english_pob_choice: one of the two
  chosen_spanish: uno de los dos
  alternatives_spanish:
  - uno entre los dos
  lexicon: BDAG
  rationale: Expresión partitiva estándar. «Uno de los dos» es idiomática en español y refleja con precisión la construcción griega.
- source_word: τῶν ἀκουσάντων
  english_pob_choice: who had heard
  chosen_spanish: que habían oído
  alternatives_spanish:
  - que oyeron
  - que habían escuchado
  lexicon: BDAG
  rationale: El aoristo participial se vierte de forma relacional y anterior al verbo principal. «Habían oído» mantiene la secuencia narrativa y evita una lectura demasiado puntual en español.
- source_word: παρὰ Ἰωάννου
  english_pob_choice: from John
  chosen_spanish: a Juan
  alternatives_spanish:
  - de Juan
  - desde Juan
  lexicon: BDAG
  rationale: La preposición παρά con genitivo puede expresar origen o procedencia; en español, «oír a Juan» comunica de forma natural que Juan fue la fuente del mensaje. Se evita sobreespecificar sin necesidad.
- source_word: καὶ ἀκολουθησάντων αὐτῷ
  english_pob_choice: and followed him
  chosen_spanish: y lo habían seguido
  alternatives_spanish:
  - y lo siguieron
  - y habían seguido tras él
  lexicon: BDAG
  rationale: ἀκολουθέω se traduce con el verbo básico «seguir». El pronombre se mantiene en forma directa («lo») para conservar la ambigüedad narrativa del antecedente inmediato, que el contexto identifica como Jesús sin introducirlo en la línea principal.
theological_decisions:
- issue: Antecedente de αὐτῷ
  english_pob_reading: '''him'' refers to Jesus'
  chosen_spanish_reading: '''lo'' refiere a Jesús por el contexto'
  alternative_spanish_readings:
  - '''lo'' podría referir a Juan en la superficie gramatical'
  - '''lo'' deja el antecedente implícito'
  rationale: La cadena narrativa de Juan 1:35–39 hace que el referente natural sea Jesús, mientras que el pronombre griego no lo explicita en la oración. La traducción conserva el pronombre y deja que el contexto resuelva la referencia, evitando una glosa en el texto principal.
  doctrine_reference: Preservar la referencia narrativa sin sobreinterpretar el pronombre; mantener la tensión/resolución contextual propia del pasaje.
translation_notes:
  revision_awareness: 'El audit trail en inglés no muestra revisiones aplicadas y reporta acuerdo mayoritario con observaciones menores. La versión española sigue el mismo marco interpretativo: mantiene la identificación de Andrés, el parentesco con Simón Pedro, la expresión partitiva «uno de los dos» y la referencia contextual de «lo» sin explicitarla en el cuerpo principal.'
  spanish_consistency_notes:
  - Se mantiene «Dios / Yahvé / Mesías» sin relevancia aquí; no aplica.
  - Se evita calco innecesario de la estructura inglesa, pero se conserva la secuencia semántica del griego.
  - El pronombre objeto singular «lo» conserva la ambigüedad contextual indicada por el audit trail, resuelta en la nota.
  - «Oído» se usa en sentido de recepción de testimonio, no en sentido fisiológico.
