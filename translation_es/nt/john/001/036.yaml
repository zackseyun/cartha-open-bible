translation:
  language: es
  text: 'Y fijando la mirada en Jesús mientras caminaba, dice: «¡He aquí el Cordero de Dios!»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐμβλέψας
  english_pob_choice: looking at
  chosen_spanish: fijando la mirada en
  alternatives_spanish:
  - mirando a
  - observando a
  - mirando fijamente a
  lexicon: BDAG
  rationale: El participio indica una mirada dirigida y atenta. «Fijando la mirada en» conserva ese énfasis sin sonar mecánico en español.
- source_word: τῷ Ἰησοῦ περιπατοῦντι
  english_pob_choice: Jesus as he was walking
  chosen_spanish: Jesús, que iba caminando
  alternatives_spanish:
  - Jesús mientras caminaba
  - Jesús, que caminaba
  - Jesús en tanto caminaba
  lexicon: BDAG
  rationale: El participio presente sitúa a Jesús en acción contemporánea. «Que iba caminando» mantiene la simultaneidad de forma natural en español.
- source_word: λέγει
  english_pob_choice: he says
  chosen_spanish: dice
  alternatives_spanish:
  - dijo
  lexicon: BDAG
  rationale: El griego usa presente histórico. «Dice» preserva esa vividez narrativa mejor que el pretérito.
- source_word: Ἴδε
  english_pob_choice: Behold
  chosen_spanish: ¡Miren!
  alternatives_spanish:
  - ¡Miren!
  - ¡Vean!
  - ¡He aquí!
  lexicon: BDAG
  rationale: El imperativo llama la atención con fuerza. «Miren» es claro y reverente en español contemporáneo; «He aquí» sería más tradicional, pero menos natural.
- source_word: ὁ ἀμνὸς
  english_pob_choice: the Lamb
  chosen_spanish: el Cordero
  alternatives_spanish:
  - el cordero
  - el cordero sacrificial
  lexicon: BDAG
  rationale: «Cordero» conserva el sentido literal y la carga simbólica de designación para Jesús. En español, la mayúscula en «Cordero» marca mejor el valor titular.
- source_word: τοῦ θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - perteneciente a Dios
  - procedente de Dios
  lexicon: BDAG
  rationale: El genitivo se mantiene con la relación simple y resonante «de Dios», sin precisar más de lo que expresa el griego.
theological_decisions:
- issue: Si ὁ ἀμνὸς τοῦ θεοῦ debe tratarse como título de Jesús
  english_pob_reading: the Lamb of God
  chosen_spanish_reading: el Cordero de Dios
  alternative_spanish_readings:
  - el cordero de Dios
  rationale: En el contexto joánico funciona como designación identificadora de Jesús y remite a su sentido sacrificial y mesiánico. La mayúscula en «Cordero» ayuda a señalar ese valor titular sin añadir explicación doctrinal.
  doctrine_reference: Affirmations; Translation philosophy §§2, 6
- issue: Cómo conservar la fuerza exhortativa de Ἴδε sin volver arcaico el español
  english_pob_reading: Behold
  chosen_spanish_reading: ¡Miren!
  alternative_spanish_readings:
  - ¡Vean!
  - ¡He aquí!
  rationale: «Miren» comunica la orden de atención de manera directa y digna. No introduce interpretación adicional y evita el tono arcaizante de «He aquí».
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: La revisión en inglés reemplazó «Look» por «Behold» para reflejar mejor Ἴδε en un registro formal. En español se preserva esa elevación con «¡Miren!», que mantiene la llamada enfática sin recurrir a un giro arcaico.
  spanish_consistency_notes:
  - Se mantiene «Jesús» sin cambios por ser nombre propio ya fijado.
  - Se usa presente narrativo («dice») para reflejar el histórico presente griego.
  - «Cordero» se capitaliza como apoyo tipográfico al valor titular, coherente con la fuerza identificadora del contexto.
