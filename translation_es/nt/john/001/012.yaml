translation:
  language: es
  text: Pero a todos los que lo recibieron[a], les dio el derecho de llegar a ser hijos de Dios, a los que creen en su nombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «autoridad» o «poder» para llegar a ser hijos de Dios; el término griego puede denotar autoridad delegada, derecho o capacidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅσοι
  english_pob_choice: all who
  chosen_spanish: a todos los que
  alternatives_spanish:
  - a cuantos
  - todos los que
  lexicon: BDAG
  rationale: ὅσοι expresa un conjunto total de personas caracterizadas por la acción; en español, «a todos los que» conserva ese valor colectivo con naturalidad. Incluye bien la referencia a los receptores sin volverla mecánica.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: La partícula marca contraste con el rechazo del contexto inmediato; «Pero» reproduce esa fuerza adversativa de forma directa y natural.
- source_word: ἔλαβον αὐτόν
  english_pob_choice: received him
  chosen_spanish: lo recibieron
  alternatives_spanish:
  - lo aceptaron
  - lo acogieron
  lexicon: BDAG
  rationale: λαμβάνω aquí significa recibir/acoger a la persona del Logos. «Lo recibieron» conserva el valor relacional sin interpretar demasiado ni reducirlo a una mera aceptación mental.
- source_word: ἔδωκεν
  english_pob_choice: he gave
  chosen_spanish: les dio
  alternatives_spanish:
  - les concedió
  - les otorgó
  lexicon: BDAG
  rationale: El aoristo de δίδωμι se rinde de forma directa con «dio». El matiz de concesión queda expresado por el sustantivo «derecho».
- source_word: ἐξουσίαν
  english_pob_choice: the right
  chosen_spanish: el derecho
  alternatives_spanish:
  - la autoridad
  - el poder
  - el privilegio
  lexicon: BDAG
  rationale: En este contexto ἐξουσία denota autorización o derecho concedido para llegar a ser hijos de Dios. «El derecho» comunica ese estatus otorgado mejor que «autoridad» o «poder», que sonarían demasiado fuertes o demasiado abstractos en español.
- source_word: τέκνα θεοῦ
  english_pob_choice: children of God
  chosen_spanish: hijos de Dios
  alternatives_spanish:
  - niños de Dios
  - descendencia de Dios
  lexicon: BDAG
  rationale: Aunque τέκνα es el término amplio para «hijos/niños», en español bíblico «hijos de Dios» comunica bien la filiación. Se evita «niños», que puede sonar infantil; la opción se mantiene como filiación relacional sin restringir el género del colectivo.
- source_word: γενέσθαι
  english_pob_choice: to become
  chosen_spanish: llegar a ser
  alternatives_spanish:
  - ser
  - convertirse en
  lexicon: BDAG
  rationale: γίνομαι en infinitivo aoristo indica entrar en un nuevo estado. «Llegar a ser» preserva con claridad la idea de transición, y en español fluye mejor que un simple «ser».
- source_word: τοῖς πιστεύουσιν
  english_pob_choice: to those who believe
  chosen_spanish: es decir, a los que creen
  alternatives_spanish:
  - a los que creen
  - a quienes creen
  lexicon: BDAG
  rationale: El participio presente describe a quienes están caracterizados por creer. Se mantiene esa identificación como explicación appositiva del grupo anterior con «es decir», sin borrar que el texto conserva ambas expresiones.
- source_word: εἰς τὸ ὄνομα αὐτοῦ
  english_pob_choice: in his name
  chosen_spanish: en su nombre
  alternatives_spanish:
  - en el nombre de él
  - hacia su nombre
  lexicon: BDAG
  rationale: La construcción πιστεύω εἰς seguida de «el nombre» se traduce con la expresión ya natural en español, «creer en su nombre». Conserva la referencia a su persona revelada, sin forzar un calco como «hacia su nombre».
theological_decisions:
- issue: Relación entre «lo recibieron» y «los que creen en su nombre»
  english_pob_reading: Render both expressions, with the latter in apposition explaining the former rather than collapsing them into one phrase.
  chosen_spanish_reading: Conservar ambas expresiones, haciendo de «es decir, a los que creen en su nombre» una aclaración del grupo descrito.
  alternative_spanish_readings:
  - fusionar ambas ideas en una sola frase como «a los que lo recibieron creyendo en su nombre»
  - traducir solo una de las dos expresiones
  rationale: 'El griego presenta dos designaciones: los que lo recibieron y los que creen en su nombre. La segunda explica al primer grupo, pero no lo sustituye. La redacción española mantiene esa textura teológica y relacional sin resolverla en exceso.'
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Término de filiación divina
  english_pob_reading: Use 'children of God' rather than 'sons of God.'
  chosen_spanish_reading: Usar «hijos de Dios» para expresar τέκνα θεοῦ.
  alternative_spanish_readings:
  - «niños de Dios»
  - «hijos e hijas de Dios»
  - «descendientes de Dios»
  rationale: τέκνα es un término amplio de filiación y no el masculino específico υἱοί. En español, «hijos de Dios» es la forma bíblica e idiomática más natural para esa relación, sin introducir una restricción de género que el griego no impone.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: La revisión más reciente no requirió cambios; el texto español sigue de cerca el análisis del griego y el tratamiento auditado del POB en inglés, especialmente en ἐξουσία, τέκνα θεοῦ y la relación entre las dos cláusulas participiales.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para θεοῦ y «su nombre» para αὐτοῦ, conforme al uso estándar de la serie.
  - Se evitó «Cristo» porque este versículo no contiene Χριστός; el foco está en el Logos/Jesús implícito del contexto inmediato.
  - La puntuación con raya introduce la aclaración appositiva sin borrar la continuidad sintáctica del griego.
