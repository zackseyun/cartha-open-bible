revisions:
- from: La luz verdadera[a], la cual alumbra a toda persona, estaba viniendo al mundo.
  to: La luz verdadera[a], que alumbra a toda persona, venía al mundo.
  rationale: 'Se revisa solo la redacción española para hacerla más natural y eclesialmente legible, manteniendo exactamente la misma decisión exegética del POB inglés: lectura principal cristológica y lectura alternativa en nota. «Venía al mundo» representa mejor la combinación de ἦν con el participio ἐρχόμενον en español; «que» mejora la fluidez frente a «la cual».'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:05:01Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue correctamente la lectura principal del griego y del POB inglés: ἦν + ἐρχόμενον se entiende en sentido con «la luz verdadera», y se conserva en nota la alternativa de unir «viniendo» a «toda persona». «La luz verdadera» y «al mundo» reflejan bien φῶς ἀληθινόν y κόσμον. El punto principal a reparar es la expresión verbal «estaba viniendo», que suena forzada en español bíblico y no es la mejor manera de representar la idea de ἦν ... ἐρχόμενον; «venía al mundo» preserva mejor el imperfecto de trasfondo y la lectura cristológica documentada.'
  spanish_quality_summary: El texto es mayormente claro, pero «la cual» y sobre todo «estaba viniendo» resultan menos naturales que alternativas más idiomáticas y dignas. En español bíblico actual, «que alumbra» y «venía al mundo» leen mejor sin perder precisión. La nota también debe ajustarse para reflejar esa mejora y evitar repetir «viniendo» donde el texto principal ya no lo usa.
  glossary_alignment: No hay conflictos con la terminología del proyecto. «Luz», «verdadera», «persona» y «mundo» están bien. «Alumbra» es aceptable para φωτίζει, aunque «ilumina» también sería posible; no requiere cambio. No intervienen términos de glosario sensibles como Yahvé, Mesías, esclavo, carne, etc.
  issues:
  - severity: medium
    issue: «estaba viniendo al mundo» es una construcción poco natural en español
    rationale: Aunque intenta calcar el inglés «was coming», en español suena torpe y menos digna. «Venía al mundo» comunica bien el imperfecto y la idea de irrupción progresiva sin perder el matiz del original.
  - severity: low
    issue: «la cual» suena más pesado de lo necesario
    rationale: «Que» es más natural y plenamente adecuado para ὃ en este contexto relativo; mejora la legibilidad sin afectar el sentido.
  - severity: low
    issue: La nota alternativa debe armonizar con la redacción revisada
    rationale: Si el texto principal usa «venía», la nota debe explicar la ambigüedad del participio sin depender de una formulación menos idiomática.
  revised_spanish_text: La luz verdadera[a], que alumbra a toda persona, venía al mundo.
  revised_footnotes:
  - marker: a
    text: 'O: «La luz verdadera, que alumbra a toda persona que viene al mundo». El participio griego «que viene» puede leerse con «toda persona» y no con «la luz verdadera».'
    reason: alternative_reading
  revision_rationale: 'Se revisa solo la redacción española para hacerla más natural y eclesialmente legible, manteniendo exactamente la misma decisión exegética del POB inglés: lectura principal cristológica y lectura alternativa en nota. «Venía al mundo» representa mejor la combinación de ἦν con el participio ἐρχόμενον en español; «que» mejora la fluidez frente a «la cual».'
