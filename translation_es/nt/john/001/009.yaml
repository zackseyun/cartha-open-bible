translation:
  language: es
  text: La luz verdadera[a], que alumbra a toda persona, venía al mundo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «La luz verdadera, que alumbra a toda persona que viene al mundo». El participio griego «que viene» puede leerse con «toda persona» y no con «la luz verdadera».'
    reason: alternative_reading
lexical_decisions:
- source_word: φῶς
  english_pob_choice: light
  chosen_spanish: luz
  alternatives_spanish:
  - Luz
  lexicon: BDAG
  rationale: Se traduce con el sustantivo común 'luz'. En Juan tiene sentido cristológico, pero el griego usa el sustantivo común con artículo; en español puede mantenerse en minúscula en el texto principal.
- source_word: ἀληθινὸν
  english_pob_choice: 'true'
  chosen_spanish: verdadera
  alternatives_spanish:
  - real
  - genuina
  lexicon: BDAG
  rationale: '''Verdadera'' conserva el valor joánico de lo auténtico, pleno o definitivo, no solo de lo verificable como hecho.'
- source_word: φωτίζει
  english_pob_choice: enlightens
  chosen_spanish: alumbra
  alternatives_spanish:
  - ilumina
  - da luz a
  lexicon: BDAG
  rationale: '''Alumbra'' expresa de manera natural y bíblicamente reconocible la acción metafórica del verbo, sin perder claridad en español.'
- source_word: πάντα ἄνθρωπον
  english_pob_choice: every person
  chosen_spanish: toda persona
  alternatives_spanish:
  - todo hombre
  - cada persona
  lexicon: BDAG
  rationale: Se opta por una forma inclusiva y natural en español que conserva el alcance universal del singular genérico ἄνθρωπον sin forzar un giro masculino en el texto principal.
- source_word: ἐρχόμενον εἰς τὸν κόσμον
  english_pob_choice: was coming into the world
  chosen_spanish: estaba viniendo al mundo
  alternatives_spanish:
  - venía al mundo
  - que viene al mundo
  lexicon: BDAG
  rationale: La POB inglesa toma la frase como referida en sentido a la luz. En español, 'estaba viniendo' reproduce el imperfecto y mantiene la lectura cristológica sin cerrar la ambigüedad gramatical del participio.
- source_word: κόσμον
  english_pob_choice: world
  chosen_spanish: mundo
  lexicon: BDAG
  rationale: Traducción estándar en Juan para κόσμος; no hay indicio contextual para restringirlo.
- source_word: ἦν
  english_pob_choice: was
  chosen_spanish: estaba
  alternatives_spanish:
  - era
  - había
  lexicon: BDAG
  rationale: El imperfecto se vierte de modo natural con 'estaba' en la construcción progresiva española, armonizando con 'viniendo' para expresar la continuidad de la acción.
theological_decisions:
- issue: A qué se une el participio ἐρχόμενον ('viniendo')
  english_pob_reading: 'Attached in sense to ''the true light'': ''The true light ... was coming into the world.'''
  chosen_spanish_reading: 'Se lo entiende en sentido unido a ''la luz verdadera'': ''La luz verdadera ... estaba viniendo al mundo.'''
  alternative_spanish_readings:
  - La luz verdadera ... alumbra a toda persona que viene al mundo.
  - La luz verdadera ... alumbra a toda persona, la que viene al mundo.
  rationale: El participio griego puede concordar gramaticalmente con ἄνθρωπον, pero el contexto del prólogo joánico favorece leer la expresión como referencia a la venida de la luz. Se conserva esa lectura en el cuerpo del texto y la ambigüedad se deja abierta en la nota.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La redacción sigue la lectura cristológica del audit trail inglés y conserva la ambigüedad sintáctica del participio mediante una nota alternativa. Frente al inglés actualizado, se prefirió 'toda persona' por naturalidad y alcance universal en español, sin perder el singular genérico del griego.
  spanish_consistency_notes:
  - Se mantuvo 'luz verdadera' en minúsculas para respetar el uso del sustantivo común en el griego, aunque el referente sea cristológico.
  - '''Alumbra'' se eligió por su naturalidad bíblica en español y para evitar un calco demasiado técnico de ''enlightens''.'
  - '''Toda persona'' evita sesgo de género y conserva el valor representativo de ἄνθρωπον.'
  - '''Estaba viniendo'' refleja el imperfecto griego y la lectura del movimiento de la luz hacia el mundo.'
  - No se introdujo 'Cristo' porque el texto griego no lo contiene y el audit trail inglés tampoco lo exige explícitamente.
