translation:
  language: es
  text: A Dios nadie lo ha visto jamás[a]; el único Dios[b], que está en el seno del Padre[c], lo ha dado a conocer[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos leen «el Hijo único» o «el Hijo unigénito» en lugar de «el único Dios».
    reason: textual_variant
  - marker: b
    text: O «el Dios unigénito». El griego μονογενής (monogenḗs) designa «único en su clase, sin par». El término tradicional «unigénito» tiene larga historia confesional en español (Credo Niceno), pero introduce el campo semántico del engendramiento sin apoyo directo en el léxico ordinario del término griego.
    reason: lexical_alternative
  - marker: c
    text: O «al lado del Padre». El griego dice literalmente «en el seno del Padre» (εἰς τὸν κόλπον τοῦ πατρός), imagen que expresa cercanía e intimidad plena.
    reason: lexical_alternative
  - marker: d
    text: O «lo reveló» o «lo explicó». El verbo griego ἐξηγέομαι (exēgḗsato) abarca los sentidos de narrar, exponer y dar a conocer.
    reason: lexical_alternative
lexical_decisions:
- source_word: θεὸν
  english_pob_choice: God
  chosen_spanish: a Dios
  alternatives_spanish:
  - Dios
  lexicon: BDAG
  rationale: Acusativo directo de ἑώρακεν. El español requiere la preposición personal 'a' ante Dios cuando funciona como objeto directo de un verbo de percepción referido a un ser personal. El fronteo ('a Dios nadie') refleja el orden griego θεὸν οὐδεὶς, que coloca el acusativo al inicio para énfasis.
- source_word: οὐδεὶς
  english_pob_choice: no one
  chosen_spanish: nadie
  alternatives_spanish:
  - ninguno
  lexicon: BDAG
  rationale: '''Nadie'' es el equivalente natural en español para la negación universal οὐδεὶς. ''Ninguno'' es posible pero más arcaico y menos idiomático en español contemporáneo.'
- source_word: ἑώρακεν
  english_pob_choice: has ever seen
  chosen_spanish: lo ha visto
  alternatives_spanish:
  - vio
  - ha contemplado
  lexicon: BDAG
  rationale: Perfecto griego (3XAI-S) que expresa un estado resultante extendido hasta el presente. En español neutro latinoamericano el pretérito perfecto compuesto ('ha visto') preserva el aspecto perfectivo con relevancia presente, en combinación con 'jamás' para πώποτε. El clítico 'lo' recoge el objeto 'a Dios' ya anticipado.
- source_word: πώποτε
  english_pob_choice: ever
  chosen_spanish: jamás
  alternatives_spanish:
  - nunca
  - en ningún tiempo
  lexicon: BDAG
  rationale: '''Jamás'' con el perfecto negado da el sentido pleno de πώποτε (''en ningún momento hasta ahora'') de forma sucinta y natural. ''Nunca'' es igualmente válido; ''en ningún tiempo'' es posible pero pedante en prosa moderna.'
- source_word: μονογενὴς θεὸς
  english_pob_choice: the one and only God
  chosen_spanish: el único Dios
  alternatives_spanish:
  - el Dios unigénito
  - el único Hijo
  - el Hijo unigénito
  lexicon: BDAG
  rationale: 'El texto del SBLGNT lee μονογενὴς θεός (nominativo). BDAG documenta μονογενής con el sentido primario de ''único en su clase, sin par'', no derivado directamente del campo semántico de ''engendrar''. El POB inglés optó por ''the one and only God'' por la misma razón. En español ''el único Dios'' reproduce esa decisión con la mayor fidelidad léxica. El término tradicional ''unigénito'' (= ''solo engendrado'', latín unigenitus) se preserva como alternativa en la nota [b] porque forma parte de la herencia confesional hispana (Credo Niceno en español: ''el Hijo Unigénito de Dios''), pero su uso en el texto principal importaría el campo semántico del engendramiento sin base directa en el léxico griego. La variante textual que lee υἱός en lugar de θεός queda recogida en la nota [a].'
- source_word: ὁ ὢν
  english_pob_choice: who is
  chosen_spanish: que está
  alternatives_spanish:
  - que es
  - el que existe
  lexicon: BDAG
  rationale: Participio sustantivado de εἰμί (V-PAPNSM), en aposición a μονογενὴς θεός. Con el complemento locativo εἰς τὸν κόλπον, 'que está' expresa la presencia relacional y la localización; 'que es' sería más ontológico pero menos idiomático con el predicado locativo que sigue. Aunque el εἰμί joánico tiene peso ontológico (cf. Juan 8:58), aquí la frase preposicional exige una lectura de presencia/ubicación.
- source_word: εἰς τὸν κόλπον τοῦ πατρὸς
  english_pob_choice: in the bosom of the Father
  chosen_spanish: en el seno del Padre
  alternatives_spanish:
  - al lado del Padre
  - en el regazo del Padre
  lexicon: BDAG
  rationale: 'κόλπος significa literalmente ''seno, pecho, regazo'', imagen de cercanía íntima. En español ''seno'' es el equivalente tradicional y transparente (cf. Juan 13:23 en traducciones históricas: ''reclinado en el seno''). ''Al lado del Padre'' es más interpretativo y aplana la metáfora; ''regazo'' es posible pero más coloquial. ''En el seno del Padre'' preserva la imagen con dignidad y tradición léxica en español.'
- source_word: πατρὸς
  english_pob_choice: the Father
  chosen_spanish: el Padre
  alternatives_spanish:
  - su Padre
  lexicon: BDAG
  rationale: Genitivo relacional con artículo. En el uso joánico 'el Padre' es título relacional que designa a Dios en su relación con el Hijo. 'Su Padre' añadiría un posesivo no presente en el texto griego.
- source_word: ἐκεῖνος
  english_pob_choice: he (implicit after revision)
  chosen_spanish: (implícito en la desinencia verbal)
  alternatives_spanish:
  - él mismo
  - ese mismo
  lexicon: BDAG
  rationale: ἐκεῖνος es demostrativo enfático que retoma a μονογενὴς θεός como sujeto. En inglés la revisión eliminó el pronombre 'he' redundante. En español la desinencia verbal de tercera persona singular ('dio a conocer') ya expresa el sujeto; añadir 'él mismo' preservaría el énfasis del demostrativo griego, pero haría la oración más pesada y el POB inglés optó por soltar esa redundancia. El peso semántico de ἐκεῖνος queda registrado en las decisiones léxicas; si el editor desea explicitarlo, 'él mismo lo dio a conocer' es la opción más fiel.
- source_word: ἐξηγήσατο
  english_pob_choice: has made him known
  chosen_spanish: lo dio a conocer
  alternatives_spanish:
  - lo reveló
  - lo explicó
  - lo declaró
  lexicon: BDAG
  rationale: Aoristo medio (3AMI-S) de ἐξηγέομαι, que abarca los sentidos de narrar, exponer, revelar, dar a conocer. El español latinoamericano prefiere el pretérito indefinido ('dio a conocer') para acciones pasadas puntuales y completadas, en lugar del pretérito perfecto compuesto que el inglés usa idiomáticamente ('has made known'). 'Dio a conocer' comunica la divulgación reveladora sin reducirla a mera explicación verbal. 'Lo reveló' y 'lo explicó' se preservan en la nota [d] como alternativas.
theological_decisions:
- issue: 'Lectura textual: μονογενὴς θεὸς versus ὁ μονογενὴς υἱός'
  english_pob_reading: the one and only God (following SBLGNT); 'the only Son' preserved in footnote [a]
  chosen_spanish_reading: el único Dios (siguiendo el SBLGNT); variante 'el Hijo único / el Hijo unigénito' en nota [a]
  alternative_spanish_readings:
  - el Hijo único
  - el Hijo unigénito
  - el unigénito Hijo
  rationale: El texto fuente es el SBLGNT, que lee μονογενὴς θεός. Este es el dato textual que determina la traducción principal. La variante υἱός tiene fuerte apoyo en algunos manuscritos y en la tradición patrística, y es la fuente de la fórmula familiar del Credo Niceno en español ('el Hijo Unigénito'). Dado que se trata de un crux cristológico y textual de primer orden, la traducción sigue el texto impreso del SBLGNT en el cuerpo principal y documenta la variante en la nota [a], conforme a la filosofía de transparencia del POB.
  doctrine_reference: Filosofía de traducción §1, §3; Afirmaciones (ortodoxia nicena-calcedoniense); SBLGNT apparatus ad loc.
- issue: 'Traducción de μονογενής: ''único'' versus ''unigénito'''
  english_pob_reading: Translate as 'one and only' rather than 'only begotten'
  chosen_spanish_reading: '''único'' en el texto principal; ''unigénito'' preservado como alternativa en nota [b]'
  alternative_spanish_readings:
  - unigénito
  - único en su clase
  - solo engendrado
  rationale: El POB inglés documentó que μονογενής en el uso joánico significa primariamente 'único en su clase, sin par' y no deriva su sentido ordinario del campo de 'engendrar'. En español 'unigénito' (< lat. unigenitus) transporta precisamente el sema del engendramiento y es teológicamente cargado por la tradición conciliar. Usar 'unigénito' en el texto principal importaría una afirmación léxica que la evidencia griega no exige; se preserva, sin embargo, en la nota [b] porque es término confesional establecido en el mundo hispanohablante y su tensión con el léxico griego debe quedar documentada, no borrada.
  doctrine_reference: Filosofía de traducción §1, §6; BDAG s.v. μονογενής; Credo Niceno en español
translation_notes:
  revision_awareness: 'El POB inglés recibió una revisión (2026-04-23, azure-gpt-5.4) que eliminó el pronombre redundante ''he'' (''he has made him known'' → ''has made him known''), haciéndolo más fluido. La traducción española sigue el mismo principio: el demostrativo enfático ἐκεῖνος no se explicita con ''él mismo'' en el texto principal —la desinencia verbal de tercera persona singular ya expresa el sujeto—, pero su peso semántico queda registrado en las decisiones léxicas y puede recuperarse editorialmente si el equipo prefiere mayor fidelidad formal al demostrativo griego.'
  spanish_consistency_notes:
  - Yahvé no aparece en este versículo; θεός se renderiza como 'Dios' de acuerdo con los valores predeterminados del proyecto.
  - El título 'el Padre' (ὁ πατήρ) sigue la convención del POB para el uso joánico relacional.
  - μονογενής se rinde como 'único' (no 'unigénito') en coherencia con la decisión léxica documentada del POB inglés; cualquier otro versículo del corpus que emplee μονογενής debe seguir el mismo principio salvo razón contextual documentada.
  - ἐξηγήσατο se traduce con el pretérito indefinido latinoamericano ('dio a conocer') en lugar del pretérito perfecto compuesto, alineándose con el estándar del proyecto para aoristos con referencia histórica puntual en español neutro.
