translation:
  language: es
  text: 'Juan les respondió, diciendo: «Yo bautizo en agua. Entre ustedes[a] está uno a quien ustedes no conocen»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «En medio de ustedes está uno a quien ustedes no conocen».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: BDAG
  rationale: Para una respuesta narrativa en diálogo, «respondió» reproduce de forma natural el verbo de réplica sin añadir matiz interpretativo. «Contestó» también sería posible, pero «respondió» es más neutro y común en español bíblico contemporáneo.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - diciendo
  lexicon: BDAG
  rationale: El participio introduce el contenido de la respuesta de Juan. «Diciendo» conserva la estructura griega de manera clara y natural en español; «y dijo» sería más libre.
- source_word: βαπτίζω
  english_pob_choice: baptize
  chosen_spanish: bautizo
  alternatives_spanish:
  - inmerso
  - sumerjo
  lexicon: BDAG
  rationale: En este contexto, el verbo establecido en español es «bautizar». «Sumerjo» o «inmerso» estrecharían indebidamente el sentido y no respetan el uso técnico-bíblico del término.
- source_word: ἐν ὕδατι
  english_pob_choice: in water
  chosen_spanish: en agua
  alternatives_spanish:
  - con agua
  - en agua
  lexicon: BDAG
  rationale: «En agua» sigue de cerca la preposición y el dativo griegos, igual que la elección inglesa «in water». «Con agua» sería idiomático, pero suaviza la correspondencia formal con el texto fuente.
- source_word: μέσος ὑμῶν
  english_pob_choice: among you
  chosen_spanish: En medio de ustedes
  alternatives_spanish:
  - entre ustedes
  - en medio de ustedes
  - en su midst
  lexicon: BDAG
  rationale: La frase griega puede expresarse de forma idiomática como presencia dentro del grupo. «En medio de ustedes» conserva mejor la imagen espacial que «entre ustedes», y evita un giro menos natural como «en su midst».
- source_word: ἕστηκεν
  english_pob_choice: stands
  chosen_spanish: está
  alternatives_spanish:
  - se encuentra
  - está de pie
  - permanece
  lexicon: BDAG
  rationale: El perfecto de ἵστημι comunica un estado presente de permanencia. En español, «está» transmite ese estado de manera natural; «está de pie» sería demasiado literal y «permanece» añade un matiz no exigido.
- source_word: ὃν
  english_pob_choice: whom
  chosen_spanish: a quien
  alternatives_spanish:
  - a quien
  - al que
  lexicon: BDAG
  rationale: El relativo introduce a la persona desconocida. «A quien» es claro, formal y respeta la función de objeto; «al que» también sería posible, pero menos elegante aquí.
- source_word: οὐκ οἴδατε
  english_pob_choice: you do not know
  chosen_spanish: ustedes no conocen
  alternatives_spanish:
  - ustedes no saben
  - ustedes no lo conocen
  lexicon: BDAG
  rationale: «Conocer» es el verbo más adecuado en español para οἶδα en este contexto relacional. El plural explícito «ustedes» evita ambigüedad y refleja el pronombre griego.
theological_decisions:
- issue: Identidad del que está en medio de ellos
  english_pob_reading: Render generically as 'one' without explicit messianic identification in the main text.
  chosen_spanish_reading: Conservar «uno» / «a quien ustedes no conocen» sin identificarlo explícitamente en el texto principal.
  alternative_spanish_readings:
  - el Mesías
  - Jesús
  rationale: El versículo, por sí solo, mantiene el referente sin nombrarlo; la traducción debe preservar esa tensión narrativa y no resolverla antes de tiempo. La identificación vendrá del contexto amplio, no de una inserción interpretativa aquí.
  doctrine_reference: Preservar la tensión narrativa y referencial del texto; lectura cristológica por contexto, no por explicitación prematura.
translation_notes:
  revision_awareness: Coincide con el hilo de auditoría inglesa de alta concordancia; no hubo revisiones aplicadas en el pass más reciente, así que la redacción española sigue de cerca la decisión establecida de preservar la ambigüedad referencial y la formulación de presencia entre el grupo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera de la traducción porque el versículo no contiene el nombre divino.
  - Se usó «bautizo» para conservar la terminología bíblica estable y no introducir una paráfrasis física estrecha.
  - Se prefirió «en agua» para reflejar la estructura preposicional del griego, aunque «con agua» sería una alternativa idiomática.
  - Se conservó la referencia indefinida «uno» implícita en el contenido, sin aclararla como «Jesús» o «el Mesías» en el texto principal.
