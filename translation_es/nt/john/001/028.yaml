translation:
  language: es
  text: Estas cosas tuvieron lugar en Betania[a], al otro lado del Jordán, donde Juan estaba bautizando.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos y tradiciones de traducción posteriores leen «Betábara» en lugar de «Betania».
    reason: textual_variant
lexical_decisions:
- source_word: ταῦτα
  english_pob_choice: These things
  chosen_spanish: Estas cosas
  alternatives_spanish:
  - Esto
  lexicon: BDAG
  rationale: El demostrativo plural griego remite a los hechos/episodios anteriores; en español, «Estas cosas» conserva mejor el plural y el enlace narrativo que un singular más suave como «Esto».
- source_word: ἐν Βηθανίᾳ
  english_pob_choice: in Bethany
  chosen_spanish: en Betania
  alternatives_spanish:
  - en Betania, en
  - en Betania
  lexicon: BDAG
  rationale: La preposición con nombre de lugar se traduce de manera directa y natural como «en». Se mantiene el topónimo «Betania» conforme al texto crítico griego.
- source_word: ἐγένετο
  english_pob_choice: took place
  chosen_spanish: tuvieron lugar
  alternatives_spanish:
  - sucedieron
  - acontecieron
  lexicon: BDAG
  rationale: γίνομαι aquí expresa ocurrencia de hechos; «tuvieron lugar» es una solución idiomática en español que conserva el valor narrativo sin volverlo arcaico.
- source_word: πέραν τοῦ Ἰορδάνου
  english_pob_choice: beyond the Jordan
  chosen_spanish: al otro lado del Jordán
  alternatives_spanish:
  - más allá del Jordán
  - al otro lado del río Jordán
  lexicon: BDAG
  rationale: La expresión indica ubicación en la ribera opuesta respecto del punto de referencia narrativo. «Al otro lado del Jordán» transmite bien esa relación espacial en español natural.
- source_word: ὅπου
  english_pob_choice: where
  chosen_spanish: donde
  alternatives_spanish:
  - en el lugar donde
  lexicon: BDAG
  rationale: La cláusula relativa de lugar se expresa de manera simple y precisa con «donde».
- source_word: βαπτίζων
  english_pob_choice: was baptizing
  chosen_spanish: estaba bautizando
  alternatives_spanish:
  - bautizaba
  lexicon: BDAG
  rationale: El participio presente con ἦν forma una construcción perifrástica imperfectiva; «estaba bautizando» conserva la acción en curso. Se prefiere «bautizando» al sustantivo o a un verbo puntual para respetar el aspecto.
theological_decisions:
- issue: 'Variante textual del lugar: Βηθανίᾳ frente a la tradición posterior Βηθαβαρᾷ'
  english_pob_reading: Bethany
  chosen_spanish_reading: Betania
  alternative_spanish_readings:
  - Betábara
  rationale: El texto base crítico leído aquí es Βηθανίᾳ, por lo que la traducción principal sigue «Betania». Como la tradición tardía conoce la variante «Bethabara», se conserva como alternativa textual en nota, sin desplazar el testimonio principal.
  doctrine_reference: Primacía del texto fuente y preservación de variantes textuales relevantes en notas.
translation_notes:
  revision_awareness: Se mantiene la lectura del texto crítico griego SBLGNT con la variante textual relevante documentada en nota; no se requieren cambios respecto del consenso auditado del inglés POB.
  spanish_consistency_notes:
  - Se usa «Betania» para el topónimo y no la máscara «SEÑOR» ni otros sustitutos no pertinentes.
  - «Bautizando» conserva el valor verbal en curso del participio presente.
  - La sintaxis española mantiene el orden narrativo claro y publicable, sin añadir interpretación.
