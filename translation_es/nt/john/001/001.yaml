  glossary_alignment: 'Alinea bien con la terminología del proyecto en este versículo: θεός -> «Dios»; λόγος se maneja con una excepción bien documentada como «Verbo» por su peso cristológico y tradición bíblica en español. No hay conflicto con las demás pautas globales.'
