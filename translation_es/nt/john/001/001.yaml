translation:
  language: es
  text: En el principio era el Verbo[a], y el Verbo estaba con Dios[b], y el Verbo era Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el Verbo era divino» o «lo que Dios era, el Verbo era». La redacción griega presenta θεός en sentido cualitativo en la cláusula final, afirmando la plena deidad del Verbo sin identificarlo con «Dios» en la cláusula anterior.'
    reason: alternative_reading
  - marker: b
    text: La frase inicial evoca Génesis 1:1 y vincula al Verbo con el comienzo de la creación.
    reason: cross_reference
lexical_decisions:
- source_word: Ἐν ἀρχῇ
  english_pob_choice: In the beginning
  chosen_spanish: En el principio
  alternatives_spanish:
  - Al comienzo
  - En el comienzo
  lexicon: BDAG
  rationale: La frase griega alude claramente a Génesis 1:1 y conserva un tono inaugural y teológico. En español, «En el principio» reproduce mejor esa resonancia bíblica que opciones más explicativas o menos solemnes.
- source_word: ἦν
  english_pob_choice: was
  chosen_spanish: era / estaba
  alternatives_spanish:
  - existía
  - había sido
  lexicon: BDAG
  rationale: El imperfecto de εἰμί en este verso expresa estado continuo o existencia en el marco del comienzo. En la primera cláusula, «era» mantiene la cadencia tradicional; en la segunda, «estaba» ayuda a expresar la relación personal de comunión que da πρὸς τὸν θεόν.
- source_word: ὁ λόγος
  english_pob_choice: the Word
  chosen_spanish: el Verbo
  alternatives_spanish:
  - la Palabra
  - el Logos
  - la Razón
  lexicon: BDAG
  rationale: Aunque λόγος puede traducirse literalmente como «palabra», aquí funciona como designación cristológica cargada. «Verbo» es una opción tradicional en español bíblico-teológico que conserva el carácter personal y la densidad del término sin reducirlo a una mera palabra hablada. «Logos» o «Razón» introducirían más interpretación; «Palabra» es posible, pero «Verbo» evita una lectura demasiado común o plana en este contexto.
- source_word: πρὸς τὸν θεόν
  english_pob_choice: with God
  chosen_spanish: con Dios
  alternatives_spanish:
  - junto a Dios
  - en relación con Dios
  lexicon: BDAG
  rationale: La preposición πρός con acusativo indica cercanía relacional, orientación y distinción personal. «Con Dios» es la forma más natural en español y conserva la relación sin diluir la distinción entre el Verbo y Dios.
- source_word: τὸν θεόν
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: BDAG
  rationale: El acusativo articular refiere a Dios como persona específica. En español, el artículo no se repite normalmente con el nombre divino; «Dios» es claro y fiel.
- source_word: θεὸς ἦν ὁ λόγος
  english_pob_choice: the Word was God
  chosen_spanish: el Verbo era Dios
  alternatives_spanish:
  - el Verbo era divino
  - lo que Dios era, eso era el Verbo
  lexicon: BDAG
  rationale: 'El predicado anartro θεός tiene fuerza cualitativa: afirma la plena deidad del Verbo sin confundirlo con «el Dios» mencionado antes. «El Verbo era Dios» conserva la lectura tradicional y natural en español; las alternativas explicitan la cualidad divina, pero pueden sonar explicativas más que textuales.'
theological_decisions:
- issue: Cómo reflejar la relación entre el Verbo y Dios en la segunda cláusula
  english_pob_reading: the Word was with God
  chosen_spanish_reading: el Verbo estaba con Dios
  alternative_spanish_readings:
  - el Verbo era con Dios
  - el Verbo estaba junto a Dios
  rationale: La traducción debe mantener simultáneamente cercanía y distinción personal. «Con Dios» reproduce la relación, y «estaba» sugiere una coexistencia continua; esto evita tanto una lectura modalista como una paraphrasis innecesaria.
  doctrine_reference: Juan 1:1; distinción personal en el prólogo joánico
- issue: Cómo traducir el predicado anartro θεός en la cláusula final
  english_pob_reading: the Word was God
  chosen_spanish_reading: el Verbo era Dios
  alternative_spanish_readings:
  - el Verbo era divino
  - lo que Dios era, el Verbo era
  rationale: 'La sintaxis griega es cualitativa: afirma la naturaleza/divinidad del Verbo, no que el Verbo sea la misma persona que «el Dios» de la cláusula anterior. «Era Dios» mantiene la fuerza plena del texto y la confesión cristológica clásica, preservando a la vez la distinción personal ya establecida.'
  doctrine_reference: Credo Niceno-Constantinopolitano (381 d. C.); Juan 1:1; §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se registran cambios aplicados y el control cruzado informó alto acuerdo, con veredicto de conformidad.'
  spanish_consistency_notes:
  - Se usa «Verbo» de manera uniforme para λόγος, siguiendo una opción cristológica estable y no una simple palabra común.
  - Se mantiene «Dios» sin artículo donde el español lo permite naturalmente, evitando artificios ajenos al uso idiomático.
  - Se distingue cuidadosamente entre «con Dios» y «era Dios» para conservar la tensión teológica del griego.
  - La nota a conserva la alternativa cualitativa documentada por el audit trail inglés, sin desplazar la traducción principal.
