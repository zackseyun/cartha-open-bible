lexical_decisions:
- source_word: ἀπεκρίθη
  english_pob_choice: answered
  chosen_spanish: le respondió
  alternatives_spanish:
  - respondió
  - le contestó
  lexicon: BDAG
  rationale: En español, «le respondió» conserva el valor narrativo normal de ἀποκρίνομαι y mantiene el dativo implícito de «a él» sin volverse rígido.
- source_word: Ῥαββί
  english_pob_choice: Rabbi
  chosen_spanish: Rabí
  alternatives_spanish:
  - Rabbi
  - Maestro
  lexicon: BDAG
  rationale: Se conserva el título judío directo como vocativo. «Rabí» es una forma estable y entendible en español, y mantiene el sabor cultural del original mejor que «Maestro».
- source_word: ὁ υἱὸς τοῦ θεοῦ
  english_pob_choice: the Son of God
  chosen_spanish: el Hijo de Dios
  alternatives_spanish:
  - un hijo de Dios
  - Hijo de Dios
  lexicon: BDAG
  rationale: La construcción articular requiere un título definido. «El Hijo de Dios» reproduce la fuerza confesional y cristológica sin debilitarla a un sentido indefinido.
- source_word: βασιλεὺς
  english_pob_choice: King
  chosen_spanish: Rey
  alternatives_spanish:
  - rey
  - gobernante
  lexicon: BDAG
  rationale: «Rey» es el equivalente directo y comunica el título real-mesiánico sin expandirlo interpretativamente.
- source_word: τοῦ Ἰσραήλ
  english_pob_choice: of Israel
  chosen_spanish: de Israel
  alternatives_spanish:
  - sobre Israel
  - para Israel
  lexicon: BDAG
  rationale: Se mantiene el genitivo simple como título («Rey de Israel»), evitando paráfrasis que introduzcan matices no explícitos en el griego.
- source_word: σὺ εἶ … σὺ … εἶ
  english_pob_choice: you are … you are
  chosen_spanish: tú eres … tú eres
  alternatives_spanish:
  - eres … eres
  - tú eres … y tú eres
  lexicon: Greek grammar
  rationale: Se conserva la repetición enfática del pronombre y del verbo para reflejar el paralelismo confesional del griego.
- source_word: Ναθαναήλ
  english_pob_choice: Nathanael
  chosen_spanish: Natanael
  alternatives_spanish:
  - Nathanael
  lexicon: N/A
  rationale: Se usa la transliteración castellana estándar del nombre propio.
theological_decisions:
- issue: Título cristológico 'el Hijo de Dios'
  english_pob_reading: 'Retain the title as stated without weakening or expanding it: ''the Son of God.'''
  chosen_spanish_reading: 'Conservar el título exacto: «el Hijo de Dios».'
  alternative_spanish_readings:
  - un hijo de Dios
  - hijo de Dios
  rationale: El español debe preservar el valor titular y la carga confesional del griego en Juan, sin rebajarlo a una lectura indefinida ni a una formulación menos marcada.
  doctrine_reference: Affirmations; Preserve theological tension rather than resolve it
- issue: Título real-mesiánico 'King of Israel'
  english_pob_reading: Translate as the explicit royal title 'the King of Israel.'
  chosen_spanish_reading: 'Traducir como título real explícito: «el Rey de Israel».'
  alternative_spanish_readings:
  - rey sobre Israel
  - el rey de Israel
  rationale: La frase funciona como confesión real-mesiánica; en español conviene mantener la forma de título, no expandirla con preposiciones interpretativas.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition'
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios; el borrador español sigue de cerca el texto griego y la decisión inglesa auditada, preservando la confesión paralelística sin añadir notas porque no se documentó ninguna variante relevante en este pasaje.
  spanish_consistency_notes:
  - Se usa «Rabí» como forma de honorífico judío reconocible y coherente con el contexto joánico.
  - Se mantiene «el Hijo de Dios» como título definido, en paralelo con «el Rey de Israel».
  - Se preserva la repetición enfática «tú eres … tú eres» para reflejar la estructura del griego.
  - No se añade puntuación explicativa ni notas al pie porque el paquete de auditoría no documenta una alternativa textual ni una tensión lexical que requiera anclaje visible.
