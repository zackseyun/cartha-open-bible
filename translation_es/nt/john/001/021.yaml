translation:
  language: es
  text: 'Y le preguntaron: «¿Entonces qué? ¿Eres tú Elías?». Y él dice[b]: «No soy». «¿Eres tú el Profeta[a]?». Y respondió: «No».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «aquel Profeta», probablemente en referencia al profeta esperado como Moisés (Dt 18:15, 18).
    reason: alternative_reading
  - marker: b
    text: La estructura griega usa el presente histórico, «dice», un recurso narrativo vívido.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠρώτησαν
  english_pob_choice: asked
  chosen_spanish: le preguntaron
  alternatives_spanish:
  - le hicieron preguntas
  - lo interrogaron
  lexicon: BDAG
  rationale: El aoristo de ἐρωτάω introduce una pregunta directa en narrativa. «Le preguntaron» es natural en español y conserva la función básica sin añadir intensidad.
- source_word: Τί οὖν;
  english_pob_choice: What then?
  chosen_spanish: ¿Entonces qué?
  alternatives_spanish:
  - ¿Qué, entonces?
  - ¿Qué, pues?
  lexicon: BDAG
  rationale: La frase compacta expresa una pregunta de continuación tras las negaciones previas. «¿Entonces qué?» conserva la brusquedad y el impulso lógico del griego en un español natural.
- source_word: σὺ Ἠλίας εἶ
  english_pob_choice: Are you Elijah?
  chosen_spanish: ¿Eres tú Elías?
  alternatives_spanish:
  - ¿Tú eres Elías?
  - ¿Eres Elías?
  lexicon: BDAG
  rationale: El pronombre enfático σύ se refleja con «tú» para mantener el énfasis. El nombre se da en su forma española estándar, «Elías», que corresponde al nombre bíblico reconocido en español.
- source_word: Οὐκ εἰμί
  english_pob_choice: I am not
  chosen_spanish: No soy
  alternatives_spanish:
  - No soy yo
  - 'No'
  lexicon: BDAG
  rationale: El griego es una negación breve de la cópula. En español, «No soy» transmite esa concisión sin añadir un complemento que no está en el texto.
- source_word: Ὁ προφήτης
  english_pob_choice: the Prophet
  chosen_spanish: el Profeta
  alternatives_spanish:
  - aquel Profeta
  - ese Profeta
  lexicon: BDAG
  rationale: El artículo griego señala una figura específica esperada. «El Profeta» preserva el título como tal, sin resolver en el cuerpo principal si alude al profeta prometido en Deuteronomio 18.
- source_word: ἀπεκρίθη
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - replicó
  lexicon: BDAG
  rationale: El verbo de respuesta narrativa se vierte de manera natural como «respondió». Mantiene el tono directo del diálogo.
- source_word: Οὔ
  english_pob_choice: 'No'
  chosen_spanish: 'No'
  alternatives_spanish:
  - No.
  - Para nada
  lexicon: BDAG
  rationale: La partícula negativa aislada funciona como respuesta directa. «No» es la equivalencia natural y sobria en español.
- source_word: λέγει
  english_pob_choice: he says
  chosen_spanish: dice
  alternatives_spanish:
  - dijo
  lexicon: BDAG
  rationale: Se conserva el presente histórico del griego joánico con «dice», que mantiene la viveza narrativa señalada por el POB inglés.
theological_decisions:
- issue: Identidad de «el Profeta»
  english_pob_reading: Render as 'the Prophet' without interpretive expansion in the main text.
  chosen_spanish_reading: Mantener «el Profeta» sin expansión interpretativa en el texto principal.
  alternative_spanish_readings:
  - el profeta como Moisés
  - aquel profeta
  rationale: El griego presenta un título definido y reconocido, pero no lo identifica explícitamente. La traducción conserva esa tensión histórica y teológica sin cerrarla en el texto principal.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Negación de Jesús respecto de Elías/denegación de Juan respecto de ser Elías
  english_pob_reading: Translate the denial plainly as 'I am not' without harmonizing it with other passages.
  chosen_spanish_reading: Traducir la negación de forma llana como «No soy», sin armonizarla con otros pasajes dentro de la traducción.
  alternative_spanish_readings:
  - No soy Elías
  - No lo soy
  rationale: El versículo presenta una negación directa y breve; la traducción debe respetarla sin importar explicaciones conciliadoras externas.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: 'Se revisó la segmentación para asegurar que todos los marcadores de nota aparezcan en el texto español exactamente donde corresponde: [a] en «le preguntaron» y [b] en «el Profeta». La formulación principal sigue de cerca el griego y el hilo auditado en inglés, sin resolver la tensión interpretativa sobre «el Profeta».'
  spanish_consistency_notes:
  - Se prefirió «No soy» para reflejar la negación breve de εἰμί; en español es gramatical y natural, aunque el sujeto implícito sea claro por el contexto.
  - Se mantuvo «el Profeta» con mayúscula por tratarse de un título definido en el contexto narrativo.
  - Se usó el presente histórico «dice» para seguir la decisión auditada del POB inglés y preservar la viveza del relato.
  - Se empleó «Elías» como forma española estándar del nombre bíblico, no «Elias» ni «Eliás».
