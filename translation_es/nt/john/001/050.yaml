review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del griego: respuesta de Jesús, pregunta retórica sobre creer a partir de la revelación bajo la higuera, y promesa de ver cosas mayores. Sin embargo, la formulación «¿Porque... crees?» no es ortográficamente adecuada en español para esta pregunta indirectamente causal, y la nota al pie no preserva la alternativa inglesa; repite esencialmente el texto principal en vez de ofrecer la opción explícita «¿Es porque... que crees?» o equivalente.'
  spanish_quality_summary: La redacción es mayormente clara y eclesialmente legible. «Jesús le respondió y le dijo» suena natural aunque algo redundante; aun así reproduce la fórmula narrativa griega aceptablemente. El principal problema de calidad es el uso de «Porque» con mayúscula y sin la forma más natural interrogativa en español. También conviene preferir «cosas mayores que estas» por mayor naturalidad idiomática frente a «Mayores cosas que estas».
  glossary_alignment: No hay conflictos con la terminología base del proyecto en este versículo. «Jesús», «crees», «higuera» y «verás» están bien. No hay términos teológicos del glosario central que requieran ajuste. La decisión sobre πιστεύεις como «crees» preserva adecuadamente el matiz joánico de creer.
  issues:
  - severity: medium
    issue: 'La pregunta causal está mal formulada en español: «¿Porque te dije... crees?»'
    rationale: En español estándar, «porque» no funciona así como encabezado natural de una pregunta de este tipo. Para reflejar el griego y la alternativa inglesa, debe decirse algo como «¿Crees porque te dije...?» o «¿Es porque te dije... que crees?».
  - severity: medium
    issue: La nota al pie no ofrece una verdadera alternativa textual
    rationale: La nota actual repite la misma formulación del texto principal. El audit trail inglés conserva una alternativa sintáctica explícita; la nota española debe reflejarla con una redacción distinta y útil.
  - severity: low
    issue: Orden menos natural en «Mayores cosas que estas verás»
    rationale: Aunque comprensible, en español suena más idiomático y digno «Verás cosas mayores que estas» o «Cosas mayores que estas verás». La primera es la más natural sin perder sentido.
  revised_spanish_text: 'Jesús le respondió y le dijo: «¿Crees porque te dije que te vi debajo de la higuera?[a] Verás cosas mayores que estas».'
  revised_footnotes:
  - marker: a
    text: 'O: «¿Es porque te dije que te vi debajo de la higuera que crees?»'
    reason: lexical_alternative
  revision_rationale: Se corrige la sintaxis interrogativa para un español natural y fiel al valor causal de Ὅτι, y se repara la nota al pie para que preserve la alternativa documentada en el audit trail inglés. También se ajusta el orden de la cláusula final a un español más idiomático sin alterar el sentido.
