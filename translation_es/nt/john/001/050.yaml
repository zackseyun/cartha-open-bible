translation:
  language: es
  text: 'Jesús le respondió y le dijo: «¿Crees porque te dije que te vi debajo de la higuera?[a] Verás cosas mayores que estas».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Es porque te dije que te vi debajo de la higuera que crees?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: BDAG
  rationale: En español, «respondió» comunica de manera natural la fórmula narrativa ἀπεκρίθη ... καὶ εἶπεν sin duplicar de forma pesada la acción verbal. Mantiene el sentido de réplica en diálogo.
- source_word: εἶπεν
  english_pob_choice: said
  chosen_spanish: le dijo
  alternatives_spanish:
  - le habló
  - dijo
  lexicon: BDAG
  rationale: Con ἀπεκρίθη, «le dijo» reproduce bien la fórmula griega de respuesta más decir, con naturalidad en español y sin perder el destinatario explícito.
- source_word: Ὅτι
  english_pob_choice: Because
  chosen_spanish: ¿Porque
  alternatives_spanish:
  - ¿Acaso porque
  - Porque
  lexicon: BDAG
  rationale: 'La primera Ὅτι introduce la razón o base de la pregunta de Jesús. En español puede sonar como pregunta causal: «¿Porque te dije... crees?». Esto conserva la ambigüedad registrada en el audit trail inglés entre una causal simple y una formulación interrogativa expandida, sin resolverla demasiado.'
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - que había
  - cómo
  lexicon: BDAG
  rationale: La segunda ὅτι introduce el contenido de lo dicho por Jesús. «Que te vi...» conserva la subordinación declarativa de forma directa.
- source_word: εἶδόν
  english_pob_choice: I saw
  chosen_spanish: te vi
  alternatives_spanish:
  - te había visto
  - yo te vi
  lexicon: BDAG
  rationale: El aoristo se vierte con pasado simple. El objeto explícito «te» es necesario en español y reproduce el valor personal de la observación.
- source_word: ὑποκάτω τῆς συκῆς
  english_pob_choice: under the fig tree
  chosen_spanish: debajo de la higuera
  alternatives_spanish:
  - bajo la higuera
  - debajo del árbol de higos
  lexicon: BDAG
  rationale: «Debajo de la higuera» es natural y preciso en español. «Higuera» conserva la imagen concreta del texto y el artículo definido refleja el referente conocido.
- source_word: πιστεύεις
  english_pob_choice: do you believe
  chosen_spanish: crees
  alternatives_spanish:
  - ¿crees?
  - ¿estás creyendo?
  lexicon: BDAG
  rationale: El presente interrogativo simple es el equivalente natural en español. «Crees» mantiene la fuerza de la pregunta retórica sin sobrecargarla con perífrasis.
- source_word: μείζω
  english_pob_choice: greater things
  chosen_spanish: Mayores cosas
  alternatives_spanish:
  - cosas mayores
  - cosas más grandes
  lexicon: BDAG
  rationale: El neutro plural comparativo se vierte de manera substantiva y natural con «mayores cosas», respetando el orden y el énfasis comparativo del griego.
- source_word: τούτων
  english_pob_choice: than these
  chosen_spanish: que estas
  alternatives_spanish:
  - que éstas
  - más que estas
  lexicon: BDAG
  rationale: En español, la comparación se expresa con «mayores cosas que estas». Mantiene la referencia a las cosas mencionadas inmediatamente antes, sin añadir un «de» menos natural aquí.
- source_word: ὄψῃ
  english_pob_choice: you will see
  chosen_spanish: verás
  alternatives_spanish:
  - vas a ver
  - llegarás a ver
  lexicon: BDAG
  rationale: El futuro de ὁράω se traduce con futuro simple. «Verás» es claro, directo y estilísticamente adecuado para una declaración solemne.
theological_decisions:
- issue: Fuerza de la pregunta de Jesús con πιστεύεις;
  english_pob_reading: 'A genuine rhetorical question: ''do you believe?'''
  chosen_spanish_reading: 'Una pregunta retórica genuina: «¿... crees?»'
  alternative_spanish_readings:
  - 'Una insinuación de reproche: «¿... crees por eso?»'
  - Una afirmación en vez de pregunta
  rationale: El griego admite una lectura interrogativa real, y el contexto inmediato conduce a la promesa de mayores revelaciones, no a una corrección doctrinal explícita. La traducción conserva la tensión retórica sin convertirla en reproche más fuerte de lo que exige el texto.
  doctrine_reference: Preservar la tensión interpretativa sin resolverla artificialmente.
translation_notes:
  revision_awareness: 'Coincide con el estado de revisión más reciente: no hubo cambios aplicados en el último pase y el acuerdo de revisión es alto. La redacción española sigue de cerca la sintaxis y la fuerza retórica del griego, usando el audit trail inglés solo como apoyo para decisiones léxicas y no como base mecánica.'
  spanish_consistency_notes:
  - Se usa «Jesús» para Ἰησοῦς, conforme al estándar del proyecto.
  - Se evita «SEÑOR» porque no aparece el nombre divino ni una cita explícita de κύριος en este versículo.
  - «Crees» conserva el valor de πιστεύεις en forma simple y actual.
  - «Mayores cosas» mantiene el comparativo sustantivado del griego.
  - La nota [a] preserva la alternativa causal/interrogativa registrada en el texto inglés auditado.
