  text: εὑρίσκει Φίλιππος τὸν Ναθαναὴλ καὶ λέγει αὐτῷ· Ὃν ἔγραψεν Μωϋσῆς ἐν τῷ νόμῳ καὶ οἱ προφῆται εὑρήκαμεν, ⸀Ἰησοῦν υἱὸν τοῦ Ἰωσὴφ τὸν ἀπὸ Ναζαρέτ.
base_translation:
  language: en
  yaml_path: translation/nt/john/001/045.yaml
  text: 'Philip found Nathanael and said to him[a], “We have found him of whom Moses in the Law and also the prophets wrote: Jesus son of Joseph[b], from Nazareth.”'
  footnotes:
  - marker: a
    text: Or, more formally, “the one of whom Moses wrote in the Law, and the prophets also.”
    reason: lexical_alternative
  - marker: b
    text: Traditional English often has “Jesus of Nazareth”; the Greek more literally says “Jesus ... from Nazareth.”
    reason: lexical_alternative
