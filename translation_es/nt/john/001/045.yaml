    changes_summary: Revised 'the one Moses wrote about in the Law, and also the prophets' to 'him of whom Moses in the Law and also the prophets wrote' for closer alignment with the Greek structure and fuller representation of both subjects writing about him.
translation:
  language: es
  text: 'Felipe encontró a Natanael y le dijo: «Hemos encontrado a aquel[a] de quien escribió Moisés en la Ley, y también los profetas: Jesús, hijo de José, procedente de Nazaret[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «aquel de quien escribió Moisés en la Ley, y también los profetas».
    reason: lexical_alternative
  - marker: b
    text: Tradicionalmente se dice «Jesús de Nazaret»; el griego dice más literalmente «Jesús ... procedente de Nazaret» o «Jesús ... de/desde Nazaret», con la preposición ἀπό.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὑρίσκει
  english_pob_choice: found
  chosen_spanish: encontró
  alternatives_spanish:
  - encuentra
  lexicon: BDAG
  rationale: El griego usa presente histórico; en español narrativo fluye mejor el pretérito simple. Conserva el avance de la acción sin calco rígido.
- source_word: λέγει
  english_pob_choice: said
  chosen_spanish: le dijo
  alternatives_spanish:
  - le dice
  lexicon: BDAG
  rationale: También es presente histórico. En español, «le dijo» mantiene la secuencia narrativa natural.
- source_word: Ὃν
  english_pob_choice: him of whom
  chosen_spanish: aquel de quien
  alternatives_spanish:
  - el que
  - el cual
  lexicon: BDAG
  rationale: El relativo griego introduce una persona identificada por el testimonio escritural. «Aquel de quien» conserva esa referencia personal y el vínculo con el verbo «escribió».
- source_word: ἔγραψεν
  english_pob_choice: wrote
  chosen_spanish: escribió
  alternatives_spanish:
  - escribió acerca de
  - escribió de
  lexicon: BDAG
  rationale: El griego dice simplemente «escribió»; en español, el complemento relativo «de quien» ya aporta la relación semántica, por lo que no hace falta añadir «acerca de».
- source_word: ἐν τῷ νόμῳ
  english_pob_choice: in the Law
  chosen_spanish: en la Ley
  alternatives_spanish:
  - en la ley
  - en la Torá
  lexicon: BDAG
  rationale: La mayúscula en «Ley» señala el cuerpo escritural asociado con Moisés. «Torá» sería posible, pero «Ley» es más accesible y sigue el valor del contexto canónico.
- source_word: οἱ προφῆται
  english_pob_choice: the prophets
  chosen_spanish: los profetas
  lexicon: BDAG
  rationale: Designa el testimonio profético escritural; el plural se conserva con claridad en español.
- source_word: εὑρήκαμεν
  english_pob_choice: we have found
  chosen_spanish: hemos encontrado
  alternatives_spanish:
  - encontramos
  lexicon: BDAG
  rationale: El perfecto griego expresa hallazgo presente con resultado vigente; el pretérito perfecto compuesto lo comunica bien en español.
- source_word: Ἰησοῦν
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  lexicon: BDAG
  rationale: Nombre propio transliterado según convención estándar.
- source_word: υἱὸν τοῦ Ἰωσὴφ
  english_pob_choice: son of Joseph
  chosen_spanish: hijo de José
  alternatives_spanish:
  - el hijo de José
  lexicon: BDAG
  rationale: La identificación appositiva en griego se vierte de manera natural sin forzar artículo. Se conserva la identificación social/narrativa tal como la dice Felipe.
- source_word: τὸν ἀπὸ Ναζαρέτ
  english_pob_choice: from Nazareth
  chosen_spanish: el de Nazaret
  alternatives_spanish:
  - el que es de Nazaret
  - procedente de Nazaret
  lexicon: BDAG
  rationale: Aunque ἀπό significa literalmente «de / desde», en español «el de Nazaret» suena natural y conserva la asociación de origen. Se evita «de Nazaret» como traducción demasiado tradicional si puede oscurecer el valor locativo del griego.
- source_word: Ναθαναήλ
  english_pob_choice: Nathanael
  chosen_spanish: Natanael
  lexicon: BDAG
  rationale: Nombre propio transliterado según uso español estándar.
- source_word: Μωϋσῆς
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: BDAG
  rationale: Nombre propio transliterado según uso español estándar.
- source_word: Ἰωσὴφ
  english_pob_choice: Joseph
  chosen_spanish: José
  lexicon: BDAG
  rationale: Nombre propio transliterado según uso español estándar.
theological_decisions:
- issue: Relación entre «hijo de José» y la cristología posterior
  english_pob_reading: Retained the narrative identification 'Jesus son of Joseph' as spoken by Philip, without modifying it to harmonize with later doctrinal understanding.
  chosen_spanish_reading: Se conserva la identificación narrativa «Jesús, hijo de José», sin armonizarla con formulaciones doctrinales posteriores.
  alternative_spanish_readings:
  - Jesús, el que era considerado hijo de José
  - Jesús, hijo legal de José
  rationale: La traducción debe reflejar la afirmación de Felipe en su forma concreta, no reescribirla para resolver anticipadamente una cuestión cristológica. La lectura queda abierta al contexto canónico más amplio.
  doctrine_reference: Affirmations; Translation philosophy items 1 and 3
- issue: Alcance de «Moisés en la Ley y también los profetas»
  english_pob_reading: 'Rendered as scriptural testimony to a person: ''the one Moses wrote about in the Law, and also the prophets.'''
  chosen_spanish_reading: 'Se entiende como testimonio escritural acerca de una persona: «aquel de quien escribió Moisés en la Ley, y también los profetas».'
  alternative_spanish_readings:
  - aquel de quien Moisés, en la Ley y también los profetas, escribió
  - el que escribió Moisés en la Ley, y también los profetas
  rationale: La redacción sigue de cerca la estructura griega y deja claro que Moisés y los profetas dan testimonio del mismo referente personal. No se explicita «Mesías» porque el verso no lo dice de forma directa.
  doctrine_reference: Translation philosophy items 1 and 6
translation_notes:
  revision_awareness: La redacción sigue de cerca la última revisión inglesa, que ajustó la cláusula para reflejar mejor la estructura griega («him of whom Moses in the Law and also the prophets wrote»). En español, se reflejó esa misma relación con «aquel de quien escribió Moisés en la Ley, y también los profetas», manteniendo además el valor temporal narrativo mediante pretéritos naturales.
  spanish_consistency_notes:
  - Se usa «Ley» con mayúscula para el corpus mosaico, en línea con el contexto canónico del pasaje.
  - Se conserva «los profetas» como designación escritural plural sin convertirla en una paráfrasis.
  - «Natanael», «Moisés», «Jesús» y «José» siguen la transliteración española estándar.
  - No se añadió «Cristo» ni «Mesías» porque el griego de este versículo no lo introduce explícitamente.
  - «el de Nazaret» se mantiene en nota como alternativa literal para respetar ἀπό sin imponer una fórmula tradicional.
