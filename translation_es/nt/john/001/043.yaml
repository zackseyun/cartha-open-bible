  text: Τῇ ἐπαύριον ἠθέλησεν ἐξελθεῖν εἰς τὴν Γαλιλαίαν. καὶ εὑρίσκει Φίλιππον καὶ λέγει αὐτῷ ὁ Ἰησοῦς· Ἀκολούθει μοι.
base_translation:
  language: en
  yaml_path: translation/nt/john/001/043.yaml
  text: The next day he wanted to go out into Galilee[a], and Jesus finds Philip and says to him[c][b], “Follow me.”
  footnotes:
  - marker: a
    text: Or 'to Galilee.' The Greek preposition can be rendered either more literally ('into') or more idiomatically ('to') in English.
    reason: lexical_alternative
  - marker: b
    text: The verbs 'finds' and 'says' are present tense in Greek, a historical present used for vivid narration.
    reason: lexical_alternative
  - marker: c
    text: The command 'Follow me' can denote both literal accompanying and the broader call to become Jesus' disciple.
    reason: alternative_reading
