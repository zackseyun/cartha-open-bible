translation:
  language: es
  text: 'Al día siguiente quiso salir a Galilea[a], y Jesús encuentra a Felipe y le dice[b][c]: «Sígueme»[d].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a la región de Galilea». La preposición griega puede expresarse de manera más literal como movimiento hacia el interior de un lugar, o más idiomáticamente en español como «a Galilea».
    reason: lexical_alternative
  - marker: b
    text: Los verbos «encuentra» y «dice» están en presente en griego; es el presente histórico, que da viveza a la narración.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «le dice a él»; en español, «le dice» expresa naturalmente el destinatario sin redundancia.
    reason: lexical_alternative
  - marker: d
    text: La orden «Sígueme» puede denotar tanto acompañar literalmente a Jesús como el llamado más amplio a ser su discípulo.
    reason: alternative_reading
lexical_decisions:
- source_word: Τῇ ἐπαύριον
  english_pob_choice: The next day
  chosen_spanish: Al día siguiente
  alternatives_spanish:
  - El día siguiente
  - Al siguiente día
  lexicon: BDAG
  rationale: La expresión temporal griega es idiomática; en español, «Al día siguiente» comunica con naturalidad la secuencia narrativa sin perder el valor de continuidad.
- source_word: ἠθέλησεν
  english_pob_choice: he wanted
  chosen_spanish: quiso
  alternatives_spanish:
  - quería
  - deseó
  - decidió
  lexicon: BDAG
  rationale: θέλω expresa voluntad o intención. «Quiso» conserva la fuerza volitiva sin imponer una decisión explícita que el griego no exige.
- source_word: ἐξελθεῖν
  english_pob_choice: to go out
  chosen_spanish: salir
  alternatives_spanish:
  - ir
  - partir
  - marcharse
  lexicon: BDAG
  rationale: El infinitivo de ἐξέρχομαι tiene sentido básico de salir. En español, «salir» es la forma más directa y natural, y se ajusta bien a la construcción con dirección.
- source_word: εἰς τὴν Γαλιλαίαν
  english_pob_choice: into Galilee
  chosen_spanish: hacia Galilea
  alternatives_spanish:
  - a Galilea
  - en Galilea
  - hasta Galilea
  lexicon: BDAG
  rationale: La preposición εἰς marca movimiento hacia/entrando en un lugar. «Hacia Galilea» mantiene el dinamismo direccional con más naturalidad que un calco rígido de «dentro de».
- source_word: εὑρίσκει
  english_pob_choice: finds
  chosen_spanish: encuentra
  alternatives_spanish:
  - halla
  - lo encuentra
  lexicon: BDAG
  rationale: El presente histórico se conserva en español con presente narrativo. «Encuentra» mantiene la vivacidad del relato johánico.
- source_word: λέγει
  english_pob_choice: says
  chosen_spanish: le dice
  alternatives_spanish:
  - dice
  - le habla
  lexicon: BDAG
  rationale: También aquí se conserva el presente histórico. En español, la inclusión del objeto indirecto «le» aclara el destinatario implícito sin sobrecargar la frase.
- source_word: Φίλιππον
  english_pob_choice: Philip
  chosen_spanish: Felipe
  alternatives_spanish:
  - Filipo
  lexicon: BDAG
  rationale: El nombre propio se adapta a la forma usual en español bíblico y eclesial, «Felipe», que corresponde al personaje del texto.
- source_word: ὁ Ἰησοῦς
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - el Jesús
  lexicon: BDAG
  rationale: Se conserva el sujeto explícito para reflejar la claridad narrativa del griego y del audit trail inglés.
- source_word: Ἀκολούθει μοι
  english_pob_choice: Follow me
  chosen_spanish: Sígueme
  alternatives_spanish:
  - Ven conmigo
  - Sígueme y acompáñame
  lexicon: BDAG
  rationale: El imperativo presente expresa una llamada continua al discipulado, no solo a un acompañamiento físico momentáneo. «Sígueme» es la formulación natural en español y preserva esa amplitud de sentido.
theological_decisions:
- issue: Alcance de la orden de Jesús a Felipe
  english_pob_reading: 'A direct summons to discipleship: ''Follow me.'''
  chosen_spanish_reading: 'Una convocatoria directa al discipulado: «Sígueme».'
  alternative_spanish_readings:
  - Una invitación a acompañar físicamente a Jesús
  - Una orden meramente de traslado
  rationale: La escena incluye movimiento real, pero el imperativo ἀκολούθει μοι en los evangelios suele abarcar el seguimiento discipular. La traducción conserva esa tensión sin reducirla a una sola dimensión.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: Se corrigió la validación anterior integrando los marcadores de nota exactamente en el texto español, sin dejar notas sin anclaje.
  spanish_consistency_notes:
  - Se mantuvo el presente histórico en «encuentra» y «dice» para reflejar la narración griega.
  - Se evitó «SEÑOR» o formulaciones tradicionales no requeridas; el nombre propio «Jesús» permanece explícito.
  - «Sígueme» conserva la fuerza del discipulado sin explicitar más de lo que el texto dice.
