translation:
  language: es
  text: Felipe era de Betsaida[a], de la ciudad de Andrés y Pedro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de la ciudad de Andrés y Pedro», es decir, su ciudad natal. También puede traducirse «del pueblo de Andrés y Pedro».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦν
  english_pob_choice: was
  chosen_spanish: era
  alternatives_spanish:
  - fue
  - estaba
  lexicon: BDAG
  rationale: El imperfecto de εἰμί expresa aquí un estado o procedencia habitual/identificadora; en español, «era» reproduce mejor ese valor que un pretérito puntual como «fue».
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Pero
  alternatives_spanish:
  - Ahora
  - Y
  lexicon: BDAG
  rationale: δέ funciona como conector leve de transición. «Pero» conserva el enlace discursivo de forma natural en español; no se usa para introducir contraste fuerte, sino transición narrativa.
- source_word: Φίλιππος
  english_pob_choice: Philip
  chosen_spanish: Felipe
  alternatives_spanish:
  - Filipo
  lexicon: convención onomástica bíblica
  rationale: En español bíblico estándar, el nombre propio se vierte «Felipe»; es la forma estable y más reconocible para el lector.
- source_word: ἀπὸ Βηθσαϊδά
  english_pob_choice: from Bethsaida
  chosen_spanish: de Betsaida
  alternatives_spanish:
  - procedente de Betsaida
  - oriundo de Betsaida
  lexicon: BDAG
  rationale: ἀπό marca origen o procedencia. En español, «de Betsaida» es la formulación más directa y fiel; «procedente de» explicita más de lo necesario.
- source_word: ἐκ τῆς πόλεως
  english_pob_choice: from the town
  chosen_spanish: de la ciudad
  alternatives_spanish:
  - de la aldea
  - del pueblo
  lexicon: BDAG
  rationale: πόλις admite «ciudad» o «pueblo/town». Se mantiene «ciudad» para seguir de cerca el contraste nominal del griego y evitar añadir una valoración geográfica no explicitada por el texto.
- source_word: Ἀνδρέου καὶ Πέτρου
  english_pob_choice: of Andrew and Peter
  chosen_spanish: de Andrés y de Pedro
  alternatives_spanish:
  - de Andrés y Pedro
  - perteneciente a Andrés y Pedro
  - hometown de Andrés y Pedro
  lexicon: BDAG
  rationale: 'Los genitivos dependen de πόλεως y señalan asociación/origen: la ciudad vinculada con Andrés y Pedro, es decir, su ciudad natal o de procedencia. En español, «de Andrés y de Pedro» conserva la relación sin forzar una paráfrasis interpretativa.'
translation_notes:
  revision_awareness: El draft sigue de cerca el griego SBLGNT y el audit trail inglés, manteniendo el doble marcador de origen (ἀπό + ἐκ) en español. Se preserva la ambigüedad contextual de πόλεως sin ampliarla más allá de lo que el texto justifica.
  spanish_consistency_notes:
  - Se usa «Betsaida» como transliteración habitual del topónimo.
  - Se mantiene la repetición de «de» para reflejar la doble estructura preposicional del griego.
  - No se introduce «Cristo», «SEÑOR» ni otros términos no presentes en el versículo.
