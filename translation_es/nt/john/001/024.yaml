- from: Y habían sido enviados de parte de los fariseos[a].
  to: Y habían sido enviados de los fariseos[a].
  rationale: Se reemplaza «de parte de» por «de» para reflejar mejor el valor de procedencia/origen de ἐκ sin añadir el matiz de representación. Se conserva en nota la alternativa agentiva «por los fariseos», en línea con la auditoría inglesa. Aunque «de los fariseos» es algo escueto en español, sigue siendo comprensible y más fiel al contraste semántico que el proyecto desea preservar en este versículo.
