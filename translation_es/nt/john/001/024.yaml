translation:
  language: es
  text: Y habían sido enviados de los fariseos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «fueron enviados por los fariseos». El griego indica más literalmente que procedían de los fariseos.'
    reason: alternative_reading
lexical_decisions:
- source_word: Καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora
  - Entonces
  lexicon: BDAG
  rationale: Se mantiene la coordinación simple para conservar el flujo narrativo sin añadir matiz interpretativo.
- source_word: ἀπεσταλμένοι ἦσαν
  english_pob_choice: they had been sent
  chosen_spanish: habían sido enviados
  alternatives_spanish:
  - fueron enviados
  - eran enviados
  lexicon: BDAG
  rationale: El participio perfecto perifrástico con ἦσαν expresa una acción ya completada con resultado vigente; en español, el pluscuamperfecto pasivo comunica mejor ese estado resultante que un pretérito simple o un imperfecto pasivo.
- source_word: ἐκ
  english_pob_choice: from
  chosen_spanish: de parte de
  alternatives_spanish:
  - de
  - por
  lexicon: BDAG
  rationale: Aunque ἐκ marca principalmente origen o procedencia, en este contexto español 'de parte de' conserva la idea de procedencia vinculada con representación, sin forzar una agencia plena que el griego no explicita.
- source_word: τῶν Φαρισαίων
  english_pob_choice: the Pharisees
  chosen_spanish: los fariseos
  alternatives_spanish:
  - los fariseos (grupo religioso judío)
  lexicon: BDAG
  rationale: Se usa el nombre reconocido del grupo en español. El artículo se integra naturalmente en la designación.
theological_decisions:
- issue: Relación de procedencia entre la delegación y los fariseos
  english_pob_reading: The men in view were sent from the Pharisees, indicating source/origin of the delegation.
  chosen_spanish_reading: Los hombres en vista habían sido enviados de parte de los fariseos, destacando procedencia y representación.
  alternative_spanish_readings:
  - habían sido enviados por los fariseos
  - procedían de los fariseos
  rationale: El griego usa ἐκ con genitivo, que señala origen o procedencia más directamente que agencia explícita. 'De parte de' permite reflejar esa procedencia y, a la vez, la idea contextual de que actuaban como delegados, sin sobredeterminar el vínculo causal.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requieren cambios respecto del pasaje base; la única decisión abierta es cómo matizar ἐκ en español sin perder la distinción entre procedencia y agencia.'
  spanish_consistency_notes:
  - Se conserva 'fariseos' como nombre de grupo reconocido en español.
  - Se evita 'Señor' u otra sustitución doctrinal porque no aparece el nombre divino en este versículo.
  - '''De parte de'' se eligió como solución española para reflejar el origen delegado que la POB inglesa marcó con ''from''.'
