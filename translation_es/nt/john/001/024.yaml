review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica: Καὶ = «Y», ἀπεσταλμένοι ἦσαν = «habían sido enviados», y τῶν Φαρισαίων = «los fariseos». Sin embargo, «de parte de» desplaza el matiz principal de ἐκ («de, desde, procedente de») hacia representación/comisión, mientras que el rastro inglés subraya precisamente origen/procedencia y reserva «por» como alternativa. Conviene ajustar el texto principal a una formulación más cercana a la procedencia.'
  spanish_quality_summary: El español es claro y natural, pero «de parte de los fariseos» introduce un matiz interpretativo no necesario. «De los fariseos» suena más directo y fiel al griego, y la nota puede conservar la alternativa «por los fariseos».
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. «Fariseos» y la sintaxis general son apropiados. El único ajuste recomendado es lexical: ἐκ debe representarse en el texto principal con «de» para preservar el valor de origen/procedencia documentado en la auditoría inglesa.'
  issues:
  - severity: medium
    issue: «de parte de» sobreinterpreta ἐκ
    rationale: El griego ἐκ con genitivo marca fuente/origen más directamente que representación. «De parte de» añade un matiz de actuar en nombre de alguien, mientras que la auditoría inglesa prefirió «from» y relegó «by» a nota.
  - severity: low
    issue: La nota al pie puede expresarse con español más natural
    rationale: 'La redacción actual es entendible, pero puede simplificarse ligeramente: «O: “fueron enviados por los fariseos”. El griego indica más literalmente que procedían de los fariseos.»'
  revised_spanish_text: Y habían sido enviados de los fariseos[a].
