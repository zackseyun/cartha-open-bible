  to: 'Y Juan dio testimonio, diciendo: «He visto al Espíritu descender como una paloma[a] desde el cielo[b], y permaneció sobre él».'
  rationale: Se corrigen las notas para que presenten alternativas genuinas y alineadas con el expediente inglés. También se suaviza «descendiendo» a «descender» para un español más natural después de «he visto», sin pérdida de sentido. Se conserva «Espíritu» y «permaneció» por fidelidad contextual y temática.
