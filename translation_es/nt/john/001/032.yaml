translation:
  language: es
  text: 'Y Juan dio testimonio, diciendo: «He visto al Espíritu descender como una paloma[a] desde el cielo[b], y permaneció sobre él».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como paloma». El griego también puede expresarse de una manera más compacta, pero aquí la comparación se entiende más naturalmente como semejanza.
    reason: lexical_alternative
  - marker: b
    text: O «del cielo». El griego ἐξ puede traducirse con énfasis en procedencia o en salida desde una fuente.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμαρτύρησεν
  english_pob_choice: testified
  chosen_spanish: dio testimonio
  alternatives_spanish:
  - testificó
  - atestiguó
  lexicon: BDAG
  rationale: μαρτυρέω tiene fuerza de dar testimonio en un marco de testigo. «Dio testimonio» conserva ese valor jurídico y resulta natural en español bíblico contemporáneo.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: BDAG
  rationale: El participio introduce el contenido del testimonio de Juan. «Diciendo» refleja la estructura griega sin forzar una reformulación innecesaria.
- source_word: Τεθέαμαι
  english_pob_choice: I have seen
  chosen_spanish: he visto
  alternatives_spanish:
  - he contemplado
  - he observado
  lexicon: BDAG
  rationale: El perfecto de θεάομαι expresa una visión ya realizada con vigencia para el hablante. «He visto» es idiomático en español y preserva la fuerza testimonial.
- source_word: τὸ πνεῦμα
  english_pob_choice: the Spirit
  chosen_spanish: el Espíritu
  alternatives_spanish:
  - el espíritu
  lexicon: BDAG
  rationale: En este contexto joánico se refiere al Espíritu Santo. La mayúscula refleja el referente personal divino reconocido por el contexto, sin añadir palabras al texto.
- source_word: καταβαῖνον
  english_pob_choice: descending
  chosen_spanish: descendiendo
  alternatives_spanish:
  - bajando
  - que descendía
  lexicon: BDAG
  rationale: El participio describe el movimiento del Espíritu hacia abajo. «Descendiendo» mantiene el tono solemne y la relación verbal con el sustantivo que modifica.
- source_word: ὡς περιστερὰν
  english_pob_choice: like a dove
  chosen_spanish: como una paloma
  alternatives_spanish:
  - así como una paloma
  - cual paloma
  lexicon: BDAG
  rationale: ὡς marca comparación. «Como una paloma» expresa la semejanza sin convertir la imagen en identificación literal.
- source_word: ἐξ οὐρανοῦ
  english_pob_choice: out of heaven
  chosen_spanish: desde el cielo
  alternatives_spanish:
  - del cielo
  - desde el cielo arriba
  lexicon: BDAG
  rationale: ἐξ denota procedencia/salida desde una fuente. «Desde el cielo» comunica la dirección y la procedencia de manera natural en español; «del cielo» es posible pero menos marcado espacialmente.
- source_word: ἔμεινεν
  english_pob_choice: remained
  chosen_spanish: permaneció
  alternatives_spanish:
  - se quedó
  - habitó
  lexicon: BDAG
  rationale: μένω es un verbo importante en Juan. «Permaneció» conserva la continuidad y resonancia temática de «remain» sin caer en arcaísmo.
- source_word: ἐπ’ αὐτόν
  english_pob_choice: on him
  chosen_spanish: sobre él
  alternatives_spanish:
  - encima de él
  - en él
  lexicon: BDAG
  rationale: ἐπί con acusativo indica reposo o posición sobre una persona. «Sobre él» es claro y conserva la imagen espacial del texto.
theological_decisions:
- issue: Identificación de τὸ πνεῦμα
  english_pob_reading: the Spirit refers to the Holy Spirit
  chosen_spanish_reading: el Espíritu se entiende como el Espíritu Santo
  alternative_spanish_readings:
  - el espíritu (minúscula, indefinido)
  rationale: El contexto inmediato de Juan 1:32–33 sitúa este descenso como señal divina relacionada con el bautismo de Jesús. La mayúscula en español señala el referente personal divino sin expandir el texto más allá de lo que el contexto exige.
  doctrine_reference: Afirmaciones; filosofía de traducción §1
- issue: Alcance de ὡς περιστερὰν
  english_pob_reading: 'comparative: the Spirit descended like a dove'
  chosen_spanish_reading: 'comparativo: el Espíritu descendió como una paloma'
  alternative_spanish_readings:
  - el Espíritu descendió cual paloma
  rationale: ὡς expresa semejanza. «Como una paloma» preserva la comparación y evita fijar una identificación ontológica que el griego no obliga a hacer.
  doctrine_reference: Filosofía de traducción §3
- issue: Forma verbal de ἔμεινεν con sujeto neutro en el contexto inglés auditado
  english_pob_reading: it remained on him
  chosen_spanish_reading: permaneció sobre él, sin introducir un pronombre explícito que no está en el griego
  alternative_spanish_readings:
  - y permaneció sobre él
  - y quedó sobre él
  rationale: En español, el verbo puede ir impersonalmente o con sujeto ya recuperable del contexto. Evito añadir un pronombre personal innecesario y mantengo la referencia al Espíritu sin resolver artificialmente el neutro griego.
  doctrine_reference: Gramática del griego y concordancia referencial en traducción
- issue: Imágenes de procedencia celeste
  english_pob_reading: out of heaven / from heaven
  chosen_spanish_reading: desde el cielo
  alternative_spanish_readings:
  - del cielo
  rationale: La lectura inglesa destaca el movimiento desde una procedencia celeste. «Desde el cielo» conserva la imagen espacial y es idiomática en español.
  doctrine_reference: Filosofía de traducción §2
translation_notes:
  revision_awareness: El borrador incorpora la revisión auditada del inglés POB que corrigió la referencia pronominal final para evitar introducir «él» donde el griego no lo exige. En español, se resuelve manteniendo «permaneció sobre él» con el sujeto «el Espíritu» ya establecido en el contexto, sin añadir pronombre explícito innecesario. También se preserva la comparación de ὡς con «como», en línea con la preferencia revisada del pasaje.
  spanish_consistency_notes:
  - Se usa «Espíritu» con mayúscula por el referente contextual divino.
  - Se mantiene «Yahvé» como norma del proyecto, aunque no aparece en este versículo.
  - Se elige «permaneció» para mantener la resonancia joánica de μένω.
  - «Como una paloma» conserva la comparación sin exagerar el valor figurado.
  - La puntuación en estilo de cita directa sigue el uso moderno del español bíblico.
