  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: Juan da testimonio, introduce su declaración con «diciendo», afirma haber visto al Espíritu descender, y el verbo joánico μένω se conserva bien con «permaneció». También acierta al capitalizar «Espíritu» en este contexto. Sin embargo, hay dos problemas de fidelidad al expediente auditado: el marcador [a] está anclado en «dio testimonio» pero la nota dice «O “dio testimonio”», lo que no funciona como alternativa real; y la nota [b] también está invertida, pues el texto principal ya dice «desde el cielo» mientras la nota ofrece esa misma lectura como alternativa, cuando la alternativa documentada es «del cielo».'
  spanish_quality_summary: El español es claro, natural y digno. «Dio testimonio», «He visto», «descendiendo» y «permaneció sobre él» leen bien en español eclesial contemporáneo. La puntuación y el registro son adecuados. La única reparación necesaria es de aparato de notas y una leve mejora de anclaje para que las alternativas sean reales y no repitan la lectura principal.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Espíritu» está bien por πνεῦμα en este contexto; no aparece Yahvé/Mesías ni otros términos sensibles del glosario. La decisión de mantener «permaneció» alinea correctamente con el valor joánico de μένω.
  issues:
  - severity: medium
    issue: La nota [a] repite la lectura principal en lugar de ofrecer una alternativa real.
    rationale: El texto principal dice «dio testimonio[a]», pero la nota [a] dice «O “dio testimonio”». Según el expediente inglés, la alternativa es más bien «testificó»/«atestiguó» o una formulación equivalente, no la misma frase ya usada en el texto.
  - severity: medium
    issue: La nota [b] está invertida respecto al texto principal.
    rationale: El texto principal usa «desde el cielo», pero la nota [b] ofrece «O “desde el cielo”». La alternativa documentada por el POB es la equivalente a «del cielo», ya que el inglés principal usa ‘out of heaven’ con nota ‘from heaven’. En español, si el principal queda «desde el cielo», la nota debe dar otra posibilidad real como «del cielo».
  revised_spanish_text: 'Y Juan dio testimonio, diciendo: «He visto al Espíritu descender como una paloma[a] desde el cielo[b], y permaneció sobre él».'
  revised_footnotes:
