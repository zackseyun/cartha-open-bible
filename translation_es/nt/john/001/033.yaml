    text: O «no lo reconocía». El griego puede indicar falta de conocimiento o falta de reconocimiento según el contexto.
    reason: lexical_alternative
  - marker: b
    text: «Permanecer» traduce un verbo joánico importante, a menudo vertido también como «morar» o, en inglés, «abide».
    reason: lexical_alternative
  - marker: c
    text: O «con el Espíritu Santo». El griego usa la misma preposición («en») en ambas frases; el texto principal preserva ese paralelismo.
    reason: lexical_alternative
  revision_rationale: Se corrige una construcción redundante para lograr un español más natural y fiel, se reancla la nota de μένω en el verbo correspondiente, se elimina el error léxico «abidir», y se normaliza «este» según el uso moderno. Se mantiene el paralelismo teológico y léxico de «en agua / en el Espíritu Santo».
