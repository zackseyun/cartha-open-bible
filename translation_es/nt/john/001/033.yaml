translation:
  language: es
  text: 'Y yo no lo conocía[a], pero el que me envió a bautizar en agua me dijo: «Aquel sobre quien veas al Espíritu descender y permanecer[b] sobre él, este es el que bautiza en el Espíritu Santo[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no lo reconocía». El griego puede indicar falta de conocimiento o falta de reconocimiento según el contexto.
    reason: lexical_alternative
  - marker: b
    text: «Permanecer» traduce un verbo joánico importante, a menudo vertido también como «morar» o, en inglés, «abide».
    reason: lexical_alternative
  - marker: c
    text: O «con el Espíritu Santo». El griego usa la misma preposición («en») en ambas frases; el texto principal preserva ese paralelismo.
    reason: lexical_alternative
lexical_decisions:
- source_word: κἀγὼ
  english_pob_choice: And I
  chosen_spanish: Y yo
  alternatives_spanish:
  - Y yo también
  - Y asimismo yo
  lexicon: BDAG
  rationale: La crasis une «y» + «yo» con valor continuativo y enfático. En español, «Y yo» comunica bien la conexión discursiva sin añadir una repetición innecesaria.
- source_word: οὐκ ᾔδειν
  english_pob_choice: did not know
  chosen_spanish: no lo conocía
  alternatives_spanish:
  - no lo sabía
  - no lo reconocía
  lexicon: BDAG
  rationale: El imperfecto de οἶδα puede implicar desconocimiento o falta de reconocimiento. «No lo conocía» mantiene esa ambigüedad de manera natural en español y evita escoger demasiado pronto entre saber y reconocer.
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  - lo conocía
  lexicon: BDAG
  rationale: El objeto se refiere a Jesús; en español, el clítico «lo» es la forma más directa y natural en esta construcción.
- source_word: ὁ πέμψας με
  english_pob_choice: he who sent me
  chosen_spanish: el que me envió
  alternatives_spanish:
  - el que me mandó
  - quien me envió
  lexicon: BDAG
  rationale: El participio aoristo sustantivado se expresa con una relativa natural en español. «El que me envió» conserva la referencia personal y el pasado puntual del envío.
- source_word: βαπτίζειν ἐν ὕδατι
  english_pob_choice: to baptize in water
  chosen_spanish: a bautizar en agua
  alternatives_spanish:
  - para bautizar con agua
  - a sumergir en agua
  lexicon: BDAG
  rationale: Se conserva la preposición «en» para reflejar ἐν y preservar el paralelismo con la frase final. «Bautizar» es el término estándar y preciso para βαπτίζειν en este contexto.
- source_word: ἐκεῖνός μοι εἶπεν
  english_pob_choice: said to me
  chosen_spanish: me dijo
  alternatives_spanish:
  - a mí me dijo
  - ese me dijo
  lexicon: BDAG
  rationale: El demostrativo enfático ἐκεῖνος no requiere reproducción literal en español; el énfasis queda suficientemente contenido en el desarrollo de la frase.
- source_word: Ἐφ’ ὃν ἂν ἴδῃς
  english_pob_choice: He on whom you see
  chosen_spanish: Sobre aquel sobre quien veas
  alternatives_spanish:
  - El que veas
  - Aquel sobre quien veas
  lexicon: BDAG
  rationale: La construcción relativa expresa la señal identificadora. «Sobre aquel sobre quien veas» sigue de cerca la relación preposicional de ἐπί y mantiene el carácter formal del signo revelado.
- source_word: τὸ πνεῦμα
  english_pob_choice: the Spirit
  chosen_spanish: el Espíritu
  alternatives_spanish:
  - el espíritu
  lexicon: BDAG
  rationale: En este contexto joánico se trata del Espíritu divino. La mayúscula en español marca el referente personal sin añadir contenido ajeno al texto.
- source_word: καταβαῖνον
  english_pob_choice: descending
  chosen_spanish: descender
  alternatives_spanish:
  - bajando
  - que desciende
  lexicon: BDAG
  rationale: El participio presente describe el movimiento hacia abajo como parte de la señal. «Descender» es claro, formal y fiel al valor verbal.
- source_word: μένον
  english_pob_choice: remaining
  chosen_spanish: permanecer
  alternatives_spanish:
  - quedarse
  - abidir
  lexicon: BDAG
  rationale: μένω es un verbo johánico clave. «Permanecer» conserva la fuerza de continuidad y la resonancia bíblica sin caer en una solución demasiado arcaica.
- source_word: ἐπ’ αὐτόν
  english_pob_choice: on him
  chosen_spanish: sobre aquel
  alternatives_spanish:
  - sobre él
  - encima de él
  lexicon: BDAG
  rationale: La preposición indica reposo o descenso sobre la persona señalada. «Sobre aquel» retoma el antecedente inmediato y mantiene la referencia de manera idiomática.
- source_word: οὗτός ἐστιν
  english_pob_choice: this is
  chosen_spanish: éste es
  alternatives_spanish:
  - éste es el
  - éste es aquel
  lexicon: BDAG
  rationale: La fórmula demostrativa de identificación se vierte con «éste es», que conserva la señal explícita del testimonio.
- source_word: ὁ βαπτίζων
  english_pob_choice: the one who baptizes
  chosen_spanish: el que bautiza
  alternatives_spanish:
  - el bautizador
  - quien bautiza
  lexicon: BDAG
  rationale: El participio presente sustantivado expresa una acción característica. «El que bautiza» es natural y suficientemente literal en español.
- source_word: ἐν πνεύματι ἁγίῳ
  english_pob_choice: in the Holy Spirit
  chosen_spanish: en el Espíritu Santo
  alternatives_spanish:
  - con el Espíritu Santo
  lexicon: BDAG
  rationale: Se preserva la preposición «en» para reflejar el paralelismo con «en agua». «Espíritu Santo» es la forma natural y reverente en español.
theological_decisions:
- issue: Identificación del πνεῦμα que desciende
  english_pob_reading: the Spirit ... the Holy Spirit
  chosen_spanish_reading: el Espíritu ... el Espíritu Santo
  alternative_spanish_readings:
  - el espíritu ... el espíritu santo
  rationale: El contexto inmediato identifica al πνεῦμα como el Espíritu divino, y la expresión final nombra explícitamente al Espíritu Santo. La mayúscula refleja esa referencia personal sin introducir una interpretación adicional.
  doctrine_reference: Affirmations; Translation philosophy §1
- issue: Paralelismo de las frases con ἐν
  english_pob_reading: baptize in water ... baptizes in the Holy Spirit
  chosen_spanish_reading: bautizar en agua ... bautiza en el Espíritu Santo
  alternative_spanish_readings:
  - bautizar con agua ... bautiza con el Espíritu Santo
  rationale: Se conserva «en» en ambas frases para reflejar la misma preposición griega y preservar el paralelismo intencional entre el bautismo de Juan y el de Jesús.
  doctrine_reference: Translation philosophy §5
- issue: Valor de οὐκ ᾔδειν
  english_pob_reading: did not know / did not recognize
  chosen_spanish_reading: no lo conocía
  alternative_spanish_readings:
  - no lo sabía
  - no lo reconocía
  rationale: El griego permite tanto falta de conocimiento como falta de reconocimiento. «No lo conocía» mantiene esa tensión sin cerrarla prematuramente.
  doctrine_reference: BDAG; English POB lexical note on οὐκ ᾔδειν
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que refinó el registro hacia una correspondencia más formal con el griego, manteniendo la estructura demostrativa y el paralelismo preposicional. Para esta versión española se priorizó una redacción natural pero cercana al original, evitando calcos innecesarios y preservando la tensión lexical de οὐκ ᾔδειν y la repetición de ἐν.
  spanish_consistency_notes:
  - Se usa «Espíritu Santo» con mayúsculas por el referente divino identificado en el contexto.
  - Se mantiene «en» en las dos frases con ἐν para conservar el paralelismo griego.
  - Se evita «Cristo» porque el versículo no usa Χριστός y la referencia es identificadora, no titulativa.
  - Se usa «bautizar» como forma estable para βαπτίζειν, sin sustituirla por «sumergir».
