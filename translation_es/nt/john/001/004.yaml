review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el griego en sus elementos principales: ἐν αὐτῷ = «En él», ζωὴ = «vida», ἡ ζωὴ = «la vida», τὸ φῶς = «la luz». Sin embargo, la primera cópula ἦν se aparta innecesariamente del valor simple de εἰμί al usar «había» en vez de «era/estaba», mientras que el audit trail inglés prefirió «was» precisamente para mantener la sencillez verbal del prólogo. En español, «En él estaba la vida» o «En él era la vida» no funcionan igual; «estaba» conserva mejor la estructura existencial sin cambiar de verbo. El resto del sentido está bien preservado.'
  spanish_quality_summary: 'El texto es claro y legible, pero «En él había vida» suena un poco menos ceñido al ritmo y paralelismo de Juan 1 que «En él estaba la vida». Además, el anclaje de la nota [a] está mal ubicado: la nota explica «los hombres», no «vida», por lo que debe colocarse junto a esa expresión. «De los hombres» es comprensible y digno en registro eclesial, aunque hoy puede requerir nota inclusiva, la cual ya existe adecuadamente.'
  glossary_alignment: No hay términos de glosario mayor en conflicto. La decisión «En él» concuerda con la fuerza personal de αὐτῷ. «La vida» y «la luz» siguen bien la terminología fuente. «Los hombres» es una excepción defendible por el audit trail para ἀνθρώπων, siempre que la nota alternativa quede correctamente anclada en esa frase.
  issues:
  - severity: medium
    issue: «había» para ἦν en la primera cláusula
    rationale: Aunque idiomático, cambia de un verbo copulativo simple a una construcción existencial. Dado el paralelismo con la segunda cláusula («la vida era...»), «estaba» preserva mejor el flujo y se alinea mejor con el audit trail inglés y el griego.
  - severity: medium
    issue: Nota [a] anclada en «vida» en vez de «los hombres»
    rationale: La nota explica alternativas para τῶν ἀνθρώπων, no para ζωή. El marcador debe ir sobre la expresión a la que comenta para mantener trazabilidad y claridad editorial.
  revised_spanish_text: En él estaba la vida, y la vida era la luz de los hombres[a].
  revised_footnotes:
  - marker: a
    text: O «la luz de la humanidad» o «la luz de las personas»; el griego usa un masculino plural con referencia genérica a los seres humanos.
    reason: lexical_alternative
