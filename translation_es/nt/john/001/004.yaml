translation:
  language: es
  text: En él estaba la vida, y la vida era la luz de los hombres[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la luz de la humanidad» o «la luz de las personas»; el griego usa un masculino plural con referencia genérica a los seres humanos.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν αὐτῷ
  english_pob_choice: In him
  chosen_spanish: En él
  alternatives_spanish:
  - En ello
  lexicon: BDAG
  rationale: La preposición ἐν con dativo se rinde naturalmente como 'en'. El pronombre αὐτῷ remite al Logos del contexto inmediato; en español, 'él' preserva el referente personal que el griego y el audit trail inglés sostienen, mientras que 'ello' sería gramaticalmente posible pero menos fiel al carácter personal del pasaje.
- source_word: ζωὴ
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - vida eterna
  lexicon: BDAG
  rationale: ζωή se traduce de forma directa como 'vida'. Aunque en Juan tiene peso teológico, aquí conviene mantener el léxico básico y dejar que el contexto prologue la profundidad, sin anticiparla con una paráfrasis como 'vida eterna'.
- source_word: ἦν
  english_pob_choice: was
  chosen_spanish: había
  alternatives_spanish:
  - era
  - existía
  lexicon: BDAG
  rationale: El imperfecto de εἰμί admite 'era' o 'había'. En español, 'había vida' suena más natural para expresar la existencia presente en el contexto, sin perder el valor imperfectivo. 'Era' puede sonar más estático y 'existía' introduce un matiz más explicativo que el texto no exige.
- source_word: ἡ ζωὴ
  english_pob_choice: the life
  chosen_spanish: la vida
  alternatives_spanish:
  - esa vida
  - la misma vida
  lexicon: BDAG
  rationale: 'El artículo se conserva como anafórico: vuelve sobre la vida ya mencionada y mantiene la identificación predicativa. ''La vida'' reproduce esa referencia sin sobreinterpretar.'
- source_word: τὸ φῶς
  english_pob_choice: the light
  chosen_spanish: la luz
  alternatives_spanish:
  - la luminaria
  lexicon: BDAG
  rationale: φῶς se traduce directamente como 'luz'. En español, el artículo ayuda a conservar la identificación temática entre 'la vida' y 'la luz'.
- source_word: τῶν ἀνθρώπων
  english_pob_choice: of men
  chosen_spanish: de los hombres
  alternatives_spanish:
  - de la humanidad
  - de las personas
  lexicon: BDAG
  rationale: ἄνθρωποι aquí tiene referencia genérica a los seres humanos. Se mantiene 'los hombres' para seguir la fuerza formal del genitivo plural masculino y la cadencia del texto, dejando abierta la lectura inclusiva en nota.
theological_decisions:
- issue: Referente personal de αὐτῷ
  english_pob_reading: The pronoun is rendered personally as 'him,' referring to the Word.
  chosen_spanish_reading: El pronombre se vierte personalmente como 'él', refiriéndose al Verbo.
  alternative_spanish_readings:
  - '''ello'', si se leyera de modo más abstracto'
  rationale: En el contexto inmediato de Juan 1, el Verbo aparece en términos personales y relacionales. Traducir 'él' preserva esa fuerza sin introducir lenguaje doctrinal posterior dentro del versículo mismo.
  doctrine_reference: 'Affirmations: Nicene/Chalcedonian orthodoxy; Translation philosophy 1'
- issue: Fuerza genérica de ἀνθρώπων
  english_pob_reading: Rendered 'men' as a generic term for humankind.
  chosen_spanish_reading: Se conserva 'los hombres' como término genérico para la humanidad.
  alternative_spanish_readings:
  - '''la humanidad'''
  - '''las personas'''
  rationale: El griego usa plural masculino con sentido representativo. En español, 'los hombres' conserva esa forma y su valor genérico, mientras la nota permite entender su alcance inclusivo sin borrar la forma del original.
  doctrine_reference: Translation philosophy 4
translation_notes:
  revision_awareness: 'El pasaje coincide con la última pasada de revisión auditada: no se requieren cambios respecto del texto fuente ni de las decisiones principales del inglés POB. Se mantiene la estructura breve del versículo y la identificación personal del referente.'
  spanish_consistency_notes:
  - Se mantiene 'él' para αὐτῷ, en continuidad con el referente personal del Logos en el prólogo.
  - Se conserva 'los hombres' por fidelidad formal al genitivo plural genérico; la nota ofrece alternativas inclusivas sin alterar el texto base.
  - Se usa 'vida' y 'luz' de forma literal, sin expandir a 'vida eterna' ni a explicaciones interpretativas.
