revisions:
- from: En él había vida[a], y la vida era la luz de los hombres.
  to: En él estaba la vida, y la vida era la luz de los hombres[a].
  rationale: Se ajusta la primera cláusula para reflejar más de cerca el valor simple de ἦν y el paralelismo del prólogo, y se reubica la nota al término ἀνθρώπων, que es el elemento realmente comentado.
  reviewer_model: gpt-5.4
