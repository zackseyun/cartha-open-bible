translation:
  language: es
  text: 'Él dijo[a]: «Yo soy una voz que clama en el desierto: “Enderecen el camino de Yahvé”, tal como dijo el profeta Isaías».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, menos probablemente, según otra puntuación: «Yo soy una voz en el desierto de uno que clama». La frase griega puede entenderse de otra manera, pero el texto principal refleja aquí la lectura más natural.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἔφη
  english_pob_choice: He said
  chosen_spanish: Él dijo
  alternatives_spanish:
  - Dijo
  - Respondió
  lexicon: BDAG
  rationale: Es un introductor de discurso narrativo simple. En español, «Él dijo» conserva el valor directo y natural del griego sin añadir matiz interpretativo innecesario.
- source_word: Ἐγὼ
  english_pob_choice: I
  chosen_spanish: Yo
  alternatives_spanish:
  - Yo mismo
  lexicon: BDAG
  rationale: El pronombre explícito es enfático en griego, pero en español la fuerza se entiende bien con «Yo» sin volver la frase artificial.
- source_word: φωνὴ
  english_pob_choice: a voice
  chosen_spanish: una voz
  alternatives_spanish:
  - la voz
  - voz
  lexicon: BDAG
  rationale: El nominativo anartro favorece un sentido indefinido. «Una voz» preserva la metáfora con naturalidad y sin sobreespecificar.
- source_word: βοῶντος
  english_pob_choice: of one crying out
  chosen_spanish: que clama
  alternatives_spanish:
  - de uno que clama
  - que grita
  lexicon: BDAG
  rationale: En español, una relativa verbal funciona con naturalidad y mantiene el vigor profético de βοάω. «Clama» recoge mejor el tono bíblico que «grita», que suena más coloquial.
- source_word: ἐν τῇ ἐρήμῳ
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto árido
  - en la soledad
  lexicon: BDAG
  rationale: Aquí «ἐρήμῳ» puede expresarse de manera natural como «desierto» en español. En este pasaje la imagen geográfica y profética se entiende bien así, aunque «wilderness» en inglés cubre un campo más amplio.
- source_word: Εὐθύνατε
  english_pob_choice: Make straight
  chosen_spanish: Enderezad
  alternatives_spanish:
  - Aplanad
  - Rectificad
  lexicon: BDAG
  rationale: «Enderezad» conserva la imagen de hacer recto el camino y es idiomático en un imperativo plural dirigido a una audiencia. «Rectificad» suena más abstracto y menos imagético.
- source_word: τὴν ὁδὸν
  english_pob_choice: the way
  chosen_spanish: el camino
  alternatives_spanish:
  - la senda
  - el sendero
  lexicon: BDAG
  rationale: «Camino» es la equivalencia más natural y estable en español para la imagen bíblica de ὁδός, manteniendo tanto el sentido literal como el metafórico.
- source_word: κυρίου
  english_pob_choice: the Lord
  chosen_spanish: del Señor
  alternatives_spanish:
  - del amo
  - del soberano
  lexicon: BDAG
  rationale: En esta cita de Isaías, κύριος se refiere al título divino. La forma española consagrada y fiel al referente teológico es «Señor».
- source_word: καθὼς
  english_pob_choice: just as
  chosen_spanish: tal como
  alternatives_spanish:
  - como
  - así como
  lexicon: BDAG
  rationale: «Tal como» expresa bien la correspondencia entre la autodefinición de Juan y la cita profética, con un tono natural y claro.
- source_word: εἶπεν
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  - expresó
  lexicon: BDAG
  rationale: El verbo simple «dijo» es la forma más natural para la fórmula de cita.
- source_word: Ἠσαΐας ὁ προφήτης
  english_pob_choice: Isaiah the prophet
  chosen_spanish: el profeta Isaías
  alternatives_spanish:
  - Isaías el profeta
  lexicon: BDAG
  rationale: «El profeta Isaías» es la forma más natural en español y mantiene la identificación profética sin perder claridad.
theological_decisions:
- issue: Rendering of κύριος in the Isaiah citation
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el amo
  - el soberano
  rationale: La cita isaiana retiene el peso del título divino. En el texto español, «Señor» conserva la resonancia teológica y evita rebajar el término a un sentido meramente humano.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Señor'
- issue: Relation of 'in the wilderness' to the participle
  english_pob_reading: a voice of one crying out in the wilderness
  chosen_spanish_reading: una voz que clama en el desierto
  alternative_spanish_readings:
  - una voz en el desierto que clama
  - una voz de uno que clama en el desierto
  rationale: 'La puntuación y la estructura elegidas reflejan la lectura más natural: la voz es la de uno que clama en el desierto. Esto mantiene la cita de Isaías y su conexión con el ministerio de Juan sin forzar el español.'
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
translation_notes:
  revision_awareness: El borrador sigue el pasaje griego SBLGNT y el audit trail inglés de POB. No se detectaron revisiones posteriores que alteren el sentido; la revisión más reciente indicó que no había cambios necesarios.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος conforme al criterio doctrinal del proyecto y al contexto de cita profética.
  - Se conserva el orden natural del español sin perder la estructura de cita isaiana.
  - «Desierto» se usa como equivalente natural de ἐρήμῳ en este contexto, aunque el inglés «wilderness» tiene un campo semántico algo más amplio.
  - La nota al pie marca la alternativa sintáctica conocida sin convertirla en lectura principal.
