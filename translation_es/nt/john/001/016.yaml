translation:
  language: es
  text: Pues de su plenitud todos hemos recibido[a], y gracia sobre gracia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «gracia en lugar de otra gracia», «gracia sobre gracia» o «una gracia tras otra». El griego puede sugerir gracia sucesiva, aunque ἀντί significa más literalmente «en lugar de».
    reason: alternative_reading
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: For
  chosen_spanish: Pues
  alternatives_spanish:
  - Porque
  - Pues que
  lexicon: BDAG
  rationale: Aquí introduce la explicación de lo dicho antes; en español, «Pues» funciona de manera natural como conector causal/explanatorio sin sonar excesivamente rígido.
- source_word: ἐκ τοῦ πληρώματος αὐτοῦ
  english_pob_choice: from his fullness
  chosen_spanish: de su plenitud
  alternatives_spanish:
  - de su plenitud abundante
  - a partir de su plenitud
  lexicon: BDAG
  rationale: «Plenitud» conserva el sentido de πλήρωμα como abundancia total o plenitud plena, y «de su» mantiene la relación posesiva del genitivo.
- source_word: ἡμεῖς πάντες
  english_pob_choice: we have all
  chosen_spanish: todos nosotros
  alternatives_spanish:
  - nosotros todos
  - todos
  lexicon: BDAG
  rationale: En español, el orden «todos nosotros» mantiene el énfasis colectivo del pronombre explícito más πάντες, sin forzar una inversión poco natural.
- source_word: ἐλάβομεν
  english_pob_choice: have received
  chosen_spanish: hemos recibido
  alternatives_spanish:
  - recibimos
  lexicon: BDAG
  rationale: El perfecto compuesto comunica bien una recepción pasada con resultado vigente, tal como en la solución inglesa adoptada por POB.
- source_word: χάριν ἀντὶ χάριτος
  english_pob_choice: grace upon grace
  chosen_spanish: gracia sobre gracia
  alternatives_spanish:
  - gracia en lugar de gracia
  - gracia tras gracia
  - una gracia después de otra
  lexicon: BDAG
  rationale: La revisión inglesa opta por una lectura acumulativa más natural; en español, «gracia sobre gracia» reproduce esa sucesión o superposición de dones sin borrar la ambigüedad del ἀντί griego, que puede sugerir reemplazo o continuidad.
theological_decisions:
- issue: Sentido de χάριν ἀντὶ χάριτος
  english_pob_reading: grace upon grace
  chosen_spanish_reading: gracia sobre gracia
  alternative_spanish_readings:
  - gracia en lugar de gracia
  - una gracia después de otra
  rationale: 'Se conserva la tensión interpretativa del griego: la frase puede leerse como gracia que se añade a gracia previa, o como gracia que sustituye otra gracia. La forma principal elegida sigue la revisión inglesa más natural, sin eliminar la posibilidad semántica del ἀντί.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Se tomó en cuenta la trayectoria de revisión del POB en inglés: primero se prefirió una traducción más literal («in place of grace») y luego se revisó a una más natural («grace upon grace»). La presente versión española sigue la revisión final, pero conserva en nota la alternativa más literal para no perder la tensión del ἀντί griego.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma general solo cuando el texto fuente lo exija; este versículo no lo requiere.
  - Se mantiene «gracia» como traducción de χάρις, sin sustituirla por «favor» o «agradecimiento», porque aquí el contexto es teológico.
  - «Plenitud» conserva el valor de πλήρωμα sin suavizarlo a una mera idea de abundancia parcial.
  - La puntuación reproduce una cláusula explicativa seguida de una coordinación directa, acorde con la sintaxis griega.
