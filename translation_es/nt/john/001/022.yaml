translation:
  language: es
  text: 'Entonces le dijeron: «¿Quién eres, para que demos respuesta a los que nos enviaron? ¿Qué dices acerca de ti mismo?»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Entonces
  alternatives_spanish:
  - Así que
  - Por tanto
  lexicon: BDAG
  rationale: Marca continuación discursiva e inferencia suave; «Entonces» suena natural en español y conserva el flujo de la conversación sin cargar una conclusión demasiado fuerte.
- source_word: εἶπαν ... αὐτῷ
  english_pob_choice: they said to him
  chosen_spanish: le preguntaron
  alternatives_spanish:
  - le dijeron
  - le interrogaron
  lexicon: BDAG
  rationale: Aunque el verbo básico es «decir», el contenido inmediato es una pregunta directa. En español, «le preguntaron» comunica mejor la función pragmática del turno sin alterar el hecho de que hablaron con él.
- source_word: Τίς εἶ;
  english_pob_choice: Who are you?
  chosen_spanish: ¿Quién eres?
  alternatives_spanish:
  - ¿Quién eres tú?
  - ¿Quién eres entonces?
  lexicon: BDAG
  rationale: Pregunta de identidad directa; «¿Quién eres?» es la forma natural y fiel. No se añade énfasis que el griego no exprese explícitamente.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: Introduce propósito. «Para que» preserva la fuerza final y suena idiomático en español.
- source_word: ἀπόκρισιν
  english_pob_choice: an answer
  chosen_spanish: respuesta
  alternatives_spanish:
  - contestación
  - respuesta
  lexicon: BDAG
  rationale: El sustantivo apunta al contenido que deben llevar de vuelta. «Respuesta» es el equivalente natural en español; evita una rigidez innecesaria de la frase «dar un answer» y mantiene la idea de réplica informativa.
- source_word: δῶμεν
  english_pob_choice: we may give
  chosen_spanish: demos
  alternatives_spanish:
  - podamos dar
  - diéramos
  lexicon: BDAG
  rationale: El subjuntivo de finalidad en español se expresa de manera directa con «demos» tras «para que». Mantiene el valor intencional del griego.
- source_word: τοῖς πέμψασιν ἡμᾶς
  english_pob_choice: to those who sent us
  chosen_spanish: a los que nos enviaron
  alternatives_spanish:
  - a los que nos mandaron
  - a quienes nos enviaron
  lexicon: BDAG
  rationale: El participio articular se vierte de forma natural con relativa. «Enviaron» conserva la relación funcional entre los delegados y quienes los mandaron.
- source_word: τί λέγεις
  english_pob_choice: What do you say
  chosen_spanish: ¿Qué dices
  alternatives_spanish:
  - ¿Qué estás diciendo
  - ¿Qué afirmas
  lexicon: BDAG
  rationale: La pregunta pide una declaración de sí mismo. «¿Qué dices?» preserva la literalidad suficiente y funciona bien en español dentro de la construcción completa.
- source_word: περὶ σεαυτοῦ
  english_pob_choice: about yourself
  chosen_spanish: acerca de ti mismo
  alternatives_spanish:
  - de ti mismo
  - sobre ti mismo
  lexicon: BDAG
  rationale: «Acerca de» refleja el tema de referencia y «ti mismo» conserva el reflexivo explícito del griego. Es más preciso que omitir el matiz reflexivo.
translation_notes:
  revision_awareness: 'El español sigue de cerca el texto griego y la solución auditada en inglés, pero ajusta el verbo inicial a la función pragmática de la escena: una pregunta de identidad formulada por un grupo de enviados. No se detectaron tensiones doctrinales o variantes textuales relevantes en este versículo.'
  spanish_consistency_notes:
  - Se mantiene un registro neutral y bíblico, con puntuación española estándar para el discurso directo.
  - Se preserva la estructura interrogativa doble del versículo, sin añadir información interpretativa.
  - No se usan términos técnicos teológicos innecesarios; el versículo es principalmente narrativo y de interrogación directa.
