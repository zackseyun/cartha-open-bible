review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: introducción existencial de un nuevo personaje, identificación como varón individual, y nombramiento de Juan. Sin embargo, la elección principal «por Dios» para παρὰ θεοῦ se aparta del énfasis auditado en la POB inglesa, que privilegia procedencia/origen de la comisión («from God») más que agencia pura. En español, «de parte de Dios» o «de Dios» preserva mejor esa fuerza sin perder naturalidad.'
  spanish_quality_summary: La redacción es clara y digna, pero «Hubo un hombre» suena algo menos idiomático en español bíblico narrativo que «Hubo un hombre ...» sí puede funcionar; no obstante, el punto principal a reparar es «enviado por Dios», que en español tiende a oírse como agente del pasivo más que como fuente/procedencia. «Cuyo nombre era Juan» es natural y fiel.
  glossary_alignment: No hay conflicto con terminología de proyecto salvo la necesidad de respetar el matiz de παρὰ θεοῦ. «Dios» y «Juan» están bien. No se requiere nota para «enviado»; si se mantiene una nota, debe alinearse con una alternativa real del texto principal.
  issues:
  - severity: medium
    issue: «por Dios» para παρὰ θεοῦ desplaza el matiz de fuente/procedencia hacia agencia
    rationale: El paquete fuente y la auditoría inglesa explican que παρά con genitivo aquí denota origen o fuente de la comisión. «Por Dios» en español es posible, pero no reproduce tan bien esa decisión documentada como «de parte de Dios» o «de Dios».
  - severity: low
    issue: La nota actual queda menos necesaria si el texto principal ya puede incorporar el matiz correcto
    rationale: La nota ofrece «de parte de Dios» como alternativa, pero esa formulación es precisamente la mejor candidata para el texto principal. Mantener nota lexical no es indispensable en español si el texto principal ya resuelve el matiz.
  revised_spanish_text: Hubo un hombre enviado de parte de Dios, cuyo nombre era Juan.[a]
  revised_footnotes:
  - marker: a
    text: 'También: «su nombre era Juan» o, de forma más compacta, «llamado Juan».'
    reason: lexical_alternative
  revision_rationale: Se ajusta παρὰ θεοῦ a «de parte de Dios» para preservar mejor el matiz de procedencia/comisión divina documentado por la POB inglesa y por el griego. Además, la nota se traslada al segmento final para reflejar la alternativa léxica que la auditoría inglesa sí preservó explícitamente para ὄνομα αὐτῷ Ἰωάννης.
