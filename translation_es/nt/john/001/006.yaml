- from: Hubo un hombre enviado[a] por Dios, cuyo nombre era Juan.
  to: Hubo un hombre enviado de parte de Dios, cuyo nombre era Juan.[a]
  rationale: Se ajusta παρὰ θεοῦ a «de parte de Dios» para preservar mejor el matiz de procedencia/comisión divina documentado por la POB inglesa y por el griego. Además, la nota se traslada al segmento final para reflejar la alternativa léxica que la auditoría inglesa sí preservó explícitamente para ὄνομα αὐτῷ Ἰωάννης.
