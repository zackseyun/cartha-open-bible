translation:
  language: es
  text: Hubo un hombre enviado de parte de Dios, cuyo nombre era Juan.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «su nombre era Juan» o, de forma más compacta, «llamado Juan».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐγένετο
  english_pob_choice: There was
  chosen_spanish: Hubo
  alternatives_spanish:
  - Existió
  - Apareció
  lexicon: BDAG
  rationale: γίνομαι introduce aquí a una persona nueva en la narración. En español, «Hubo» comunica de manera natural la introducción existencial sin añadir la idea de creación ni de mera aparición.
- source_word: ἄνθρωπος
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - un ser humano
  - una persona
  lexicon: BDAG
  rationale: El sustantivo singular masculino designa a un individuo varón concreto. «Un hombre» es la opción más directa, natural y fiel al referente.
- source_word: ἀπεσταλμένος
  english_pob_choice: sent
  chosen_spanish: enviado
  alternatives_spanish:
  - habiendo sido enviado
  - comisionado
  lexicon: BDAG
  rationale: El participio perfecto pasivo describe a Juan como uno que ha sido enviado. «Enviado» conserva la pasividad y la noción de misión/encargo sin volverse pesado en español.
- source_word: παρὰ θεοῦ
  english_pob_choice: from God
  chosen_spanish: por Dios
  alternatives_spanish:
  - de parte de Dios
  - de Dios
  lexicon: BDAG
  rationale: Aunque el inglés POB optó por «from God» para resaltar origen, en español «por Dios» expresa de forma natural la agencia divina en un pasivo de comisión. «De parte de Dios» también sería posible, pero suena más explicativo.
- source_word: ὄνομα αὐτῷ Ἰωάννης
  english_pob_choice: whose name was John
  chosen_spanish: cuyo nombre era Juan
  alternatives_spanish:
  - llamado Juan
  - de nombre Juan
  lexicon: BDAG
  rationale: La expresión idiomática griega se vierte mejor con una fórmula identificadora natural en español. «Cuyo nombre era Juan» mantiene el valor nominativo sin recargar el estilo.
- source_word: Ἰωάννης
  english_pob_choice: John
  chosen_spanish: Juan
  alternatives_spanish:
  - —
  lexicon: standard transliteration
  rationale: El nombre propio se adapta a la forma castellana estándar «Juan», conforme al uso bíblico habitual en español.
theological_decisions:
- issue: Fuente y comisión divina de Juan
  english_pob_reading: 'John is presented as divinely commissioned: ''sent from God.'''
  chosen_spanish_reading: Juan es presentado como enviado por Dios.
  alternative_spanish_readings:
  - Juan fue enviado por Dios
  - Juan estaba enviado de parte de Dios
  rationale: 'La construcción preserva la idea central del texto: no sólo procedencia, sino comisión divina. «Por Dios» mantiene la agencia del envío sin introducir una lectura doctrinal adicional no explicitada por el versículo.'
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense without importing doctrinal claims the text does not make.'
translation_notes:
  revision_awareness: 'La versión inglesa auditada se mantuvo estable (latest_revision_pass: unchanged). No se registran revisiones aplicadas; el pasaje presenta acuerdo alto con observaciones menores, por lo que la decisión española sigue de cerca el sentido del griego y del texto inglés auditado.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque aquí aparece θεοῦ, no κύριος.
  - Se mantuvo un registro natural y sobrio, con fórmula identificadora clásica («cuyo nombre era Juan») sin copiar mecánicamente el inglés.
  - «Enviado» conserva el valor pasivo y comisionado del participio sin añadir una explicación teológica más amplia que la del texto.
