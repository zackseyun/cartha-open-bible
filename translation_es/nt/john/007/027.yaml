    changes_summary: 'Replaced ''yet'' with ''but'' to reflect the repeated contrast more directly, and changed ''the Messiah'' to ''the Christ'' for closer lexical correspondence to χριστός and consistency with the Greek wording. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: Pero sabemos de dónde es este hombre; pero cuando venga el Mesías[a], nadie sabe de dónde es.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Pero sabemos de dónde viene este hombre; pero cuando venga el Cristo, nadie sabe de dónde viene».'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀλλὰ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Mas
  - Sin embargo
  lexicon: BDAG
  rationale: Introduce contraste directo y natural en español, manteniendo el doble giro contrastivo del griego sin endurecer el ritmo de la frase.
- source_word: τοῦτον
  english_pob_choice: this man
  chosen_spanish: este hombre
  alternatives_spanish:
  - este
  - esta persona
  lexicon: BDAG
  rationale: El demostrativo se refiere a Jesús de manera concreta y algo pointed; 'este hombre' conserva la referencia personal sin volverse demasiado literal o ambigua.
- source_word: οἴδαμεν
  english_pob_choice: we know
  chosen_spanish: sabemos
  alternatives_spanish:
  - conocemos
  - estamos seguros
  lexicon: BDAG
  rationale: Verbo de conocimiento factual; 'sabemos' es la forma más natural y directa en español.
- source_word: πόθεν ἐστίν
  english_pob_choice: where this man is from / where he is from
  chosen_spanish: de dónde es
  alternatives_spanish:
  - de dónde viene
  - cuál es su origen
  lexicon: BDAG
  rationale: '''De dónde es'' reproduce de forma idiomática la pregunta por origen o procedencia y permite repetir la misma estructura en ambas cláusulas.'
- source_word: ὁ δὲ χριστός
  english_pob_choice: when the Messiah comes
  chosen_spanish: el Mesías
  alternatives_spanish:
  - el Cristo
  - el Ungido
  lexicon: BDAG
  rationale: Χριστός funciona aquí como título mesiánico esperado; 'Mesías' mantiene el valor histórico-judío del término y evita imponer una forma eclesial más cargada en español.
- source_word: ὅταν ἔρχηται
  english_pob_choice: when the Messiah comes
  chosen_spanish: cuando venga
  alternatives_spanish:
  - cuando llegue
  - cuando venga a aparecer
  lexicon: BDAG
  rationale: La construcción con ὅταν + subjuntivo expresa contingencia futura indefinida; 'cuando venga' es natural en español y conserva esa expectativa abierta.
- source_word: οὐδεὶς
  english_pob_choice: no one
  chosen_spanish: nadie
  alternatives_spanish:
  - ninguno
  - no persona
  lexicon: BDAG
  rationale: Negación universal natural en español coloquial y literario; evita una formulación pesada.
- source_word: γινώσκει
  english_pob_choice: knows
  chosen_spanish: sabe
  alternatives_spanish:
  - conoce
  - reconoce
  lexicon: BDAG
  rationale: Aquí el verbo expresa conocimiento de origen/procedencia; 'sabe' mantiene la equivalencia más sencilla y clara en español, en paralelo con 'sabemos' al inicio.
theological_decisions:
- issue: Χριστός como título mesiánico
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  - Ungido
  rationale: En esta escena Χριστός no actúa como nombre propio sino como título esperado. 'Mesías' conserva el trasfondo judío y la referencia escatológica sin desplazarla hacia un uso más litúrgico o ya cristianizado de 'Cristo'.
  doctrine_reference: 'DOCTRINE.md: contested terms — render Χριστός as title with ''Messiah'' where the context is titular'
- issue: La afirmación de la multitud sobre el origen del Mesías
  english_pob_reading: Translate their statement straightforwardly without endorsing it
  chosen_spanish_reading: Traducir la afirmación de la multitud sin corregirla ni explicarla en el cuerpo del texto
  alternative_spanish_readings:
  - 'Explicitar: ''de dónde vendrá'''
  - Parafrasear como una expectativa doctrinal
  rationale: El versículo reporta una percepción o argumento de la multitud. La traducción debe preservar esa tensión sin armonizarla ni resolverla interpretativamente en el texto principal.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'Se siguió el último estado auditado de la POB en inglés: se mantuvo la repetición contrastiva con ''pero'' y se respetó la restauración de ''Messiah'' en la lectura doctrinal; para el español se eligió ''Mesías'' por consistencia terminológica del proyecto. No se introdujeron ampliaciones explicativas en el texto principal.'
  spanish_consistency_notes:
  - Se mantuvo una estructura paralela en ambas cláusulas con 'de dónde es / de dónde sabe' resuelta idiomáticamente como 'de dónde es' y 'de dónde sabe' en la versión final.
  - '''Mesías'' se usa como título, no como nombre propio, en coherencia con la política terminológica del proyecto.'
  - La nota al pie conserva la alternativa 'Cristo' como opción textual posible en español, correspondiente a la discusión auditada sobre χριστός.
