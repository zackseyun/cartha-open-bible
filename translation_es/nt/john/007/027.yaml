  text: ἀλλὰ τοῦτον οἴδαμεν πόθεν ἐστίν· ὁ δὲ χριστὸς ὅταν ἔρχηται οὐδεὶς γινώσκει πόθεν ἐστίν.
base_translation:
  language: en
  yaml_path: translation/nt/john/007/027.yaml
  text: But we know where this man is from; but when the Messiah comes[a], no one knows where he is from.
  footnotes:
  - marker: a
    text: Or, 'But we know where this one comes from; but when the Christ comes, no one knows where he comes from.'
