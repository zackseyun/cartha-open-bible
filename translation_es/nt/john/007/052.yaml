translation:
  language: es
  text: 'Le respondieron y le dijeron: «¿Acaso tú también eres de Galilea?[a] Investiga y mira que de Galilea no se levanta profeta.[b]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿No eres tú también de Galilea?». La pregunta griega está formulada para esperar una respuesta negativa.'
    reason: lexical_alternative
  - marker: b
    text: 'Algunos traducen: «de Galilea no es levantado profeta», preservando la posible idea de que Dios levanta a los profetas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθησαν καὶ εἶπαν
  english_pob_choice: They answered and said
  chosen_spanish: Le respondieron y le dijeron
  alternatives_spanish:
  - Respondieron y dijeron
  - Le contestaron y le dijeron
  lexicon: BDAG
  rationale: Conservo el doble verbo johánico para reflejar la fórmula narrativa enfática del griego. En español, «respondieron y le dijeron» mantiene el ritmo sin volverse demasiado literal o torpe.
- source_word: Μὴ καὶ σὺ ... εἶ;
  english_pob_choice: Are you also ... ?
  chosen_spanish: ¿Acaso tú también eres de Galilea?
  alternatives_spanish:
  - ¿Tú también eres de Galilea?
  - ¿Acaso también tú eres de Galilea?
  lexicon: BDAG
  rationale: La partícula μή en una pregunta anticipa una respuesta negativa y expresa tono despectivo. «¿Acaso…?» comunica mejor esa expectativa en español que una pregunta simple.
- source_word: ἐκ τῆς Γαλιλαίας
  english_pob_choice: from Galilee
  chosen_spanish: de Galilea
  alternatives_spanish:
  - de la Galilea
  - procedente de Galilea
  lexicon: BDAG
  rationale: Para origen o procedencia, «de Galilea» es la forma natural en español y conserva el sentido local del griego ἐκ.
- source_word: ἐραύνησον
  english_pob_choice: Search
  chosen_spanish: Investiga
  alternatives_spanish:
  - Busca
  - Examina
  - Escudriña
  lexicon: BDAG
  rationale: El imperativo pide indagación activa y polémica. «Investiga» transmite mejor en español contemporáneo la idea de examinar diligentemente que un simple «busca».
- source_word: ἴδε
  english_pob_choice: see
  chosen_spanish: mira
  alternatives_spanish:
  - ve
  - observa
  - ve y mira
  lexicon: BDAG
  rationale: En la secuencia imperativa, «mira» funciona como equivalente directo y natural de ἴδε, conservando la fuerza exhortativa del original.
- source_word: προφήτης
  english_pob_choice: prophet
  chosen_spanish: profeta
  alternatives_spanish:
  - el profeta
  - un profeta
  lexicon: BDAG
  rationale: 'El sustantivo es anartro y el argumento es general: se afirma que de Galilea no surge profeta alguno. «Profeta» sin artículo reproduce esa indefinición.'
- source_word: οὐκ ἐγείρεται
  english_pob_choice: arises
  chosen_spanish: no se levanta
  alternatives_spanish:
  - no surge
  - no es levantado
  lexicon: BDAG
  rationale: Conservo «no se levanta» para mantener la imagen verbal de ἐγείρω y dejar abierta la posible resonancia de ser levantado por Dios, sin imponer una paráfrasis interpretativa.
theological_decisions:
- issue: Fuerza retórica de la pregunta con μή
  english_pob_reading: Render as a natural English question and note the expected negative answer in a footnote.
  chosen_spanish_reading: Renderizar como una pregunta natural con «¿Acaso…?» y explicitar en nota que se espera una respuesta negativa.
  alternative_spanish_readings:
  - ¿Acaso no eres también de Galilea?
  - ¿No eres tú también de Galilea?
  rationale: La línea griega es sarcástica y presupone una respuesta negativa; el español con «¿Acaso…?» preserva esa tensión sin recargar el cuerpo del texto. La nota deja auditable el matiz.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3 (preserve tension/ambiguity where relevant)'
- issue: Sentido de οὐκ ἐγείρεται
  english_pob_reading: '"no prophet arises from Galilee," preserving a possible nuance that God raises up prophets.'
  chosen_spanish_reading: «de Galilea no se levanta profeta», preservando la posible resonancia de que Dios levanta profetas.
  alternative_spanish_readings:
  - de Galilea no surge profeta
  - de Galilea no es levantado profeta
  rationale: «Se levanta» mantiene el verbo de movimiento/emergencia y deja abierta la posible lectura teológica de elevación por parte de Dios, sin cerrar el texto a una sola paráfrasis.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3 (preserve tension/ambiguity where relevant)'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto coincide con la lectura aprobada de alta concordancia y conserva la doble formulación verbal, la pregunta retórica con expectativa negativa y la ambigüedad de ἐγείρεται.
  spanish_consistency_notes:
  - Uso «Yahvé» solo cuando corresponda al nombre divino; aquí no aparece.
  - Mantuve la distinción entre origen («de Galilea») y movimiento/levantamiento («se levanta»).
  - Conservé «profeta» sin artículo por el anartro griego.
  - Usé puntuación española y comillas angulares para un registro publicable.
