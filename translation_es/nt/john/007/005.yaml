translation:
  language: es
  text: Porque ni siquiera sus hermanos creían en él[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Porque ni siquiera sus hermanos creyeron en él». El verbo griego está en imperfecto y puede reflejar una acción pasada continua o habitual, no solo un hecho puntual.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐδὲ
  english_pob_choice: not even
  chosen_spanish: ni siquiera
  alternatives_spanish:
  - ni tampoco
  - ni aun
  lexicon: BDAG
  rationale: οὐδὲ intensifica la negación; «ni siquiera» reproduce bien esa fuerza enfática en español natural sin añadir contenido.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: γὰρ introduce una explicación o fundamento del contexto previo. «Porque» mantiene la relación discursiva de modo claro y común en español.
- source_word: ἀδελφοὶ αὐτοῦ
  english_pob_choice: his brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - sus hermanos varones
  - sus hermanos y hermanas
  lexicon: BDAG
  rationale: ἀδελφοί está en masculino plural y aquí designa a los hermanos de Jesús. «Sus hermanos» conserva la referencia directa y evita ampliar el grupo sin base textual.
- source_word: ἐπίστευον
  english_pob_choice: believed
  chosen_spanish: creían
  alternatives_spanish:
  - creyeron
  - estaban creyendo
  lexicon: BDAG
  rationale: El imperfecto griego expresa acción pasada en curso o habitual. «Creían» preserva ese matiz mejor que el pretérito perfecto simple, y suena natural en español.
- source_word: εἰς αὐτόν
  english_pob_choice: in him
  chosen_spanish: en él
  alternatives_spanish:
  - en él con fe
  - hacia él
  lexicon: BDAG
  rationale: En el uso joánico con πιστεύω, εἰς indica confianza dirigida a una persona. «En él» sigue el patrón del POB inglés y comunica adecuadamente la relación de fe sin sobreexplicar.
theological_decisions:
- issue: Sentido de πιστεύω εἰς αὐτόν en Juan
  english_pob_reading: personal belief/trust directed toward Jesus
  chosen_spanish_reading: creer/confiar personalmente en Jesús
  alternative_spanish_readings:
  - poner fe en él
  - depositar su confianza en él
  rationale: El texto afirma la ausencia de esa fe dirigida a Jesús, sin añadir motivos doctrinales ulteriores. «Creían en él» conserva la afirmación joánica central de confianza personal.
  doctrine_reference: Juan 7:5; uso joánico de πιστεύω + εἰς
- issue: Valor aspectual del imperfecto ἐπίστευον
  english_pob_reading: could be rendered as a simple past or ongoing past action
  chosen_spanish_reading: 'imperfecto narrativo: «creían»'
  alternative_spanish_readings:
  - «creyeron»
  - «estaban creyendo»
  rationale: El imperfecto puede sonar a estado continuo o habitual. En español, «creían» es la forma más natural y mantiene el matiz imperfectivo sin forzar una perífrasis.
  doctrine_reference: Gramática aspectual del griego koiné; correspondencia imperfectiva en español
translation_notes:
  revision_awareness: El POB inglés revisó la cláusula del imperfecto desde una redacción progresiva («were believing») a una simple («believed») por naturalidad. En español, se opta por el imperfecto «creían», que preserva mejor el valor aspectual del griego y sigue siendo idiomático. Se conserva además la fuerza enfática de οὐδὲ con «ni siquiera» y la relación causal/de apoyo de γὰρ con «Porque».
  spanish_consistency_notes:
  - Se usa «él» para referirse a Jesús, conforme a la referencia pronominal natural en español.
  - Se mantiene «sus hermanos» sin ampliar a «hermanos y hermanas», porque el griego masculino plural y el contexto narrativo no lo requieren.
  - La elección de «creían» evita perder el matiz imperfectivo del original, aunque el inglés POB haya preferido el simple past por estilo.
