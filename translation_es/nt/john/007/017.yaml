review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura condicional y el contraste «si ... o si», pero se aparta innecesariamente del texto fuente y del rastro POB en dos puntos clave: explicita αὐτοῦ como «la voluntad de Yahvé» en vez de preservar el pronombre, y vierte ἀπ’ ἐμαυτοῦ como «por mí mismo», que desplaza la imagen de origen/fuente hacia iniciativa o medio. El resto del sentido principal se conserva.'
  spanish_quality_summary: 'El español es claro y natural, pero «conocerá acerca de la enseñanza» suena algo rígido; «sabrá acerca de la enseñanza» o «conocerá en cuanto a la enseñanza» serían posibles, aunque no exigen corrección. La reparación principal debe priorizar fidelidad textual: «su voluntad» y «de mí mismo» en el texto principal. La nota actual es útil, pero debe ajustarse para que la alternativa idiomática sea la secundaria, no la principal.'
  glossary_alignment: «Dios» para θεοῦ está bien. Sin embargo, usar «Yahvé» para αὐτοῦ no sigue la decisión auditada, porque aquí el griego no usa el nombre divino sino un pronombre; la convención de Yahvé no justifica introducirlo donde no aparece. No hay otros conflictos relevantes de glosario.
  issues:
  - severity: high
    issue: Se explicitó αὐτοῦ como «la voluntad de Yahvé» en lugar de preservar «su voluntad».
    rationale: El texto griego usa pronombre, y la decisión inglesa documentada preserva deliberadamente esa forma, aunque el referente contextual sea Dios. Introducir «Yahvé» añade explicitación no presente en el original.
  - severity: high
    issue: ἀπ’ ἐμαυτοῦ se tradujo «por mí mismo» en el texto principal.
    rationale: La frase griega expresa origen/fuente («de/des­de mí mismo»), no primariamente medio o manera. «Por mí mismo» acerca el sentido a autodeterminación o independencia; la audit trail pide preservar «from myself» en el cuerpo principal y dejar «on my own authority» como nota.
  - severity: low
    issue: La nota al pie prioriza una formulación menos fiel al matiz de fuente.
    rationale: Si el texto principal se corrige a «de mí mismo», la nota puede conservar «por mí mismo» o «por mi propia autoridad» como alternativas explicativas, alineando mejor texto y nota.
  revised_spanish_text: Si alguien quiere hacer su voluntad, conocerá acerca de la enseñanza, si es de Dios o si yo hablo de mí mismo.[a]
  revised_footnotes:
  - marker: a
    text: O «por mí mismo» o «por mi propia autoridad». El griego dice literalmente «de mí mismo».
    reason: lexical_alternative
  revision_rationale: 'Se corrige para alinearse con el griego y con las decisiones auditadas del POB: se preserva el pronombre en «su voluntad» en vez de explicitar «Yahvé», y se restituye el lenguaje de fuente en «de mí mismo» para ἀπ’ ἐμαυτοῦ. La nota conserva las alternativas idiomáticas sin desplazar el sentido principal.'
