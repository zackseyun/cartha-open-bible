translation:
  language: es
  text: Si alguien quiere hacer su voluntad, conocerá acerca de la enseñanza, si es de Dios o si yo hablo de mí mismo.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por mí mismo» o «por mi propia autoridad». El griego dice literalmente «de mí mismo».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐάν τις θέλῃ
  english_pob_choice: If anyone wants
  chosen_spanish: Si alguien quiere
  alternatives_spanish:
  - Si cualquiera desea
  - Si alguno quiere
  lexicon: BDAG
  rationale: La construcción condicional general de ἐάν + subjuntivo se expresa naturalmente en español con «Si alguien quiere». «Quiere» conserva el matiz volitivo de θέλω sin sonar rígido.
- source_word: τὸ θέλημα αὐτοῦ
  english_pob_choice: his will
  chosen_spanish: la voluntad de Yahvé
  alternatives_spanish:
  - su voluntad
  - la voluntad de Dios
  lexicon: BDAG
  rationale: Aunque el griego usa el pronombre αὐτοῦ, el contexto inmediato identifica esa voluntad con la de Dios. En español, explicitar «Yahvé» evita ambigüedad y sigue la convención del proyecto para el nombre divino, sin alterar el sentido contextual.
- source_word: ποιεῖν
  english_pob_choice: to do
  chosen_spanish: hacer
  alternatives_spanish:
  - cumplir
  - practicar
  lexicon: BDAG
  rationale: «Hacer la voluntad» es la colocación más natural en español y corresponde al uso idiomático de ποιέω con θέλημα.
- source_word: γνώσεται
  english_pob_choice: he will know
  chosen_spanish: conocerá
  alternatives_spanish:
  - sabrá
  - llegará a conocer
  lexicon: BDAG
  rationale: «Conocerá» comunica el conocimiento resultante de manera clara y formal. «Sabrá» también sería posible, pero «conocerá» mantiene mejor el matiz de discernimiento progresivo.
- source_word: περὶ τῆς διδαχῆς
  english_pob_choice: about the teaching
  chosen_spanish: acerca de la enseñanza
  alternatives_spanish:
  - con respecto a la enseñanza
  - sobre la enseñanza
  lexicon: BDAG
  rationale: διδαχή se traduce aquí como «enseñanza», término natural en español y fiel al contenido del discurso. «Acerca de» reproduce bien la función de περί con el genitivo.
- source_word: πότερον ... ἢ
  english_pob_choice: whether ... or whether
  chosen_spanish: si ... o si
  alternatives_spanish:
  - si ... o
  - ya sea ... o
  lexicon: BDAG
  rationale: La correlación en español se expresa con «si ... o si», que conserva la alternativa doble del griego sin forzar el estilo.
- source_word: ἐκ τοῦ θεοῦ
  english_pob_choice: from God
  chosen_spanish: de Dios
  alternatives_spanish:
  - procedente de Dios
  - que viene de Dios
  lexicon: BDAG
  rationale: «De Dios» comunica la idea de origen indicada por ἐκ de forma natural en español. La forma más explícita («que viene de Dios») sería interpretativa y más larga.
- source_word: ἀπ’ ἐμαυτοῦ
  english_pob_choice: from myself
  chosen_spanish: por mí mismo
  alternatives_spanish:
  - desde mí mismo
  - de mí mismo
  lexicon: BDAG
  rationale: La frase griega marca origen en relación con el hablante. En español, «por mí mismo» expresa bien la idea de iniciativa propia y evita una literalidad poco natural; se conserva la tensión con la nota que mantiene el matiz de origen.
- source_word: λαλῶ
  english_pob_choice: I am speaking
  chosen_spanish: hablo
  alternatives_spanish:
  - estoy hablando
  - digo
  lexicon: BDAG
  rationale: En español, el presente simple funciona naturalmente para el discurso actual. «Hablo» es conciso y fiel al valor verbal del griego en este contexto.
theological_decisions:
- issue: Referente de αὐτοῦ en «su voluntad» / «la voluntad de Yahvé»
  english_pob_reading: The pronoun refers to God, but the translation preserves the pronoun rather than making the referent explicit in the main text.
  chosen_spanish_reading: Se explicita el referente como «la voluntad de Yahvé» para evitar ambigüedad en español.
  alternative_spanish_readings:
  - su voluntad
  - la voluntad de Dios
  rationale: El contexto de la perícopa trata del origen divino de la enseñanza. En español, dejar el pronombre puede resultar opaco; nombrar a Yahvé hace explícita la referencia contextual sin cambiar el sentido.
  doctrine_reference: Translation philosophy §1, §3
- issue: Fuerza de ἀπ’ ἐμαυτοῦ
  english_pob_reading: Rendered 'from myself' in the main text, preserving the language of source rather than expanding to 'on my own authority.'
  chosen_spanish_reading: Se traduce «por mí mismo» en el cuerpo principal, manteniendo la idea de iniciativa/origen propio sin sobredeterminarla.
  alternative_spanish_readings:
  - de mí mismo
  - por mi propia autoridad
  rationale: El griego expresa origen y procedencia. En español, «por mí mismo» comunica autodeterminación de manera idiomática; la nota conserva la alternativa más literal «de mí mismo» para auditar el matiz de origen.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el borrador anterior se mantuvo sin variaciones sustantivas, con acuerdo alto en el control cruzado.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» según la convención del proyecto para יהוה.
  - Se usa «enseñanza» para διδαχή, coherente con el contexto doctrinal de Jesús.
  - Se evita «Cristo» porque no aparece en el versículo ni es necesario para este enunciado.
  - 'Se conserva una formulación española natural para la alternativa correlativa: «si ... o si».'
