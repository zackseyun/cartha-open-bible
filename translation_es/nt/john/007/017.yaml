revisions:
- from: Si alguien quiere hacer la voluntad de Yahvé, conocerá acerca de la enseñanza, si es de Dios o si yo hablo por mí mismo.[a]
  to: Si alguien quiere hacer su voluntad, conocerá acerca de la enseñanza, si es de Dios o si yo hablo de mí mismo.[a]
  rationale: 'Se corrige para alinearse con el griego y con las decisiones auditadas del POB: se preserva el pronombre en «su voluntad» en vez de explicitar «Yahvé», y se restituye el lenguaje de fuente en «de mí mismo» para ἀπ’ ἐμαυτοῦ. La nota conserva las alternativas idiomáticas sin desplazar el sentido principal.'
