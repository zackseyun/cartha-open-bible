revisions:
- from: Ahora dijo esto acerca del Espíritu[a], a quien iban a recibir los que creyeron en él; porque el Espíritu todavía no era[b], pues Jesús todavía no había sido glorificado.
  to: Ahora dijo esto acerca del Espíritu[a], a quien iban a recibir los que creyeron en él; porque aún no estaba el Espíritu[b], pues Jesús todavía no había sido glorificado.
  rationale: Se revisa solo la cláusula difícil οὔπω γὰρ ἦν πνεῦμα. «Aún no estaba el Espíritu» es mejor español y sigue preservando la tensión del original sin introducir la expansión interpretativa «había sido dado» en el texto principal. La nota conserva tanto la lectura explicativa como la literalidad más dura del griego.
