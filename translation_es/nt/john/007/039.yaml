translation:
  language: es
  text: Ahora dijo esto acerca del Espíritu[a], a quien iban a recibir los que creyeron en él; porque aún no estaba el Espíritu[b], pues Jesús todavía no había sido glorificado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más explícitamente: «porque el Espíritu todavía no había sido dado». El griego dice simplemente: «porque aún no estaba el Espíritu», vinculándolo con que Jesús todavía no había sido glorificado.'
    reason: alternative_reading
  - marker: b
    text: Lit. «porque el Espíritu todavía no era».
    reason: previous_rendering
lexical_decisions:
- source_word: πνεύματος / πνεῦμα
  english_pob_choice: Spirit
  chosen_spanish: Espíritu
  alternatives_spanish:
  - espíritu
  - Espíritu Santo
  lexicon: BDAG
  rationale: En este contexto se trata del Espíritu divino prometido a los creyentes. En español, la mayúscula ayuda a señalar el referente personal y teológico sin añadir «Santo», que no aparece en el griego.
- source_word: οὗ
  english_pob_choice: whom
  chosen_spanish: a quien
  alternatives_spanish:
  - que
  - el cual
  lexicon: BDAG
  rationale: El relativo retoma a «Espíritu» como referente personal. «A quien» mantiene esa referencia y suena natural en español.
- source_word: ἔμελλον λαμβάνειν
  english_pob_choice: were about to receive
  chosen_spanish: iban a recibir
  alternatives_spanish:
  - estaban a punto de recibir
  - iban a recibirlo
  lexicon: BDAG
  rationale: La perífrasis expresa la expectativa futura del texto sin recargarlo. «Iban a recibir» conserva la perspectiva prospectiva de μέλλω con infinitivo y funciona bien en español.
- source_word: πιστεύσαντες εἰς αὐτόν
  english_pob_choice: those who believed in him
  chosen_spanish: los que creyeron en él
  alternatives_spanish:
  - los que habían creído en él
  - los creyentes en él
  lexicon: BDAG
  rationale: El participio aoristo se traduce de forma simple y natural. «Creyeron en él» reproduce la construcción johánica de πιστεύω εἰς sin forzar un matiz de pluperfecto.
- source_word: οὔπω γὰρ ἦν πνεῦμα
  english_pob_choice: for the Spirit was not yet
  chosen_spanish: porque el Espíritu todavía no era
  alternatives_spanish:
  - porque el Espíritu no estaba todavía
  - porque el Espíritu todavía no había sido dado
  lexicon: BDAG
  rationale: Se conserva la dureza deliberada del griego, que no añade «ser dado» ni «presente». «Todavía no era» refleja la tersedad del original y mantiene la tensión textual que la nota explica.
- source_word: οὐδέπω
  english_pob_choice: had not yet
  chosen_spanish: todavía no
  alternatives_spanish:
  - aún no
  - todavía no
  lexicon: BDAG
  rationale: Se usa una locución natural en español para el valor temporal de οὐδέπω, en coordinación con la cláusula siguiente.
- source_word: ἐδοξάσθη
  english_pob_choice: been glorified
  chosen_spanish: había sido glorificado
  alternatives_spanish:
  - había sido exaltado
  - había entrado en gloria
  lexicon: BDAG
  rationale: «Glorificado» conserva el término joánico establecido para δοξάζω y evita restringir el sentido a una sola fase del acontecimiento.
theological_decisions:
- issue: Cómo expresar οὔπω γὰρ ἦν πνεῦμα sin resolver prematuramente su tensión teológica.
  english_pob_reading: 'Retain the literal tension in the main text: ''for the Spirit was not yet,'' and clarify the likely sense in a footnote.'
  chosen_spanish_reading: 'Conservar la tensión en el texto principal: «porque el Espíritu todavía no era», y explicarla en nota.'
  alternative_spanish_readings:
  - porque el Espíritu todavía no había sido dado
  - porque el Espíritu todavía no estaba presente
  rationale: La ortodoxia cristiana afirma la eterna existencia del Espíritu Santo, pero el griego no dice explícitamente «dado» ni «presente». La traducción principal permanece cercana al texto, y la nota ofrece la lectura explicativa sin borrar la tensión del original.
  doctrine_reference: Unidad y eternidad del Espíritu Santo; principio traductológico de preservar la tensión textual
- issue: Relación entre la glorificación de Jesús y la recepción del Espíritu.
  english_pob_reading: because Jesus had not yet been glorified
  chosen_spanish_reading: pues Jesús todavía no había sido glorificado
  alternative_spanish_readings:
  - porque Jesús todavía no había sido glorificado
  - ya que Jesús todavía no había sido glorificado
  rationale: La cláusula causal se conserva de forma directa para mantener el vínculo joánico entre la glorificación de Jesús y el envío/recepción del Espíritu.
  doctrine_reference: Cristología joánica de la glorificación de Jesús
translation_notes:
  revision_awareness: La revisión más reciente del flujo inglés volvió de «had not yet been given» a la formulación más literal «the Spirit was not yet» para evitar una expansión interpretativa no presente en el griego. La versión española sigue esa decisión, manteniendo la misma tensión textual y dejando la explicación en nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma general en el proyecto, pero este versículo no contiene el nombre divino.
  - Se eligió «Espíritu» con mayúscula por el referente personal y teológico; no se añadió «Santo» porque no está en el texto griego.
  - «Creyeron en él» refleja el patrón johánico πιστεύω εἰς sin latinizar la sintaxis.
  - «Glorificado» se mantiene como término joánico técnico para δοξάζω.
