    issue: «porque el Espíritu todavía no era» suena antinatural y sugiere inexistencia ontológica en español
    rationale: Aunque es un intento de calcar la tersedad griega, en español «no era» aplicado al Espíritu suena más fuerte y menos idiomático que el inglés «was not yet». «Aún no estaba el Espíritu» conserva la tensión sin introducir el verbo «dar».
  - severity: low
