translation:
  language: es
  text: Porque nadie hace cosa alguna en secreto mientras procura ser conocido abiertamente[a]. Si haces estas cosas, muéstrate al mundo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'ser conocido públicamente' / 'ser público'. La expresión griega enfatiza la apertura o visibilidad pública.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐδεὶς
  english_pob_choice: no one
  chosen_spanish: nadie
  alternatives_spanish:
  - ninguno
  - no hay nadie
  lexicon: BDAG
  rationale: Pronombre negativo natural en español para un enunciado general. Mantiene el alcance universal de οὐδεὶς sin añadir matiz innecesario.
- source_word: γάρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Conserva la fuerza explicativa/conectiva del griego. 'Porque' funciona bien al inicio de una frase en español y refleja la relación con el versículo anterior.
- source_word: τι ἐν κρυπτῷ ποιεῖ
  english_pob_choice: does anything in secret
  chosen_spanish: hace nada en secreto
  alternatives_spanish:
  - hace algo en secreto
  - actúa en secreto
  lexicon: BDAG
  rationale: El indefinido τι expresa 'algo/anything'; en español, con una negación general previa, 'hace nada' reproduce la idea de que no realiza acción alguna en secreto. 'En secreto' refleja ἐν κρυπτῷ de forma idiomática y directa.
- source_word: ζητεῖ αὐτὸς ἐν παρρησίᾳ εἶναι
  english_pob_choice: seeking to be known openly
  chosen_spanish: mientras procura ser conocido abiertamente
  alternatives_spanish:
  - mientras busca ser conocido abiertamente
  - mientras quiere ser conocido públicamente
  - mientras procura estar a la vista
  lexicon: BDAG
  rationale: '''Procura'' expresa el esfuerzo intencional de ζητεῖ. ''Ser conocido abiertamente'' sigue la revisión inglesa que entiende ἐν παρρησίᾳ como apertura/visibilidad pública, y evita un calco demasiado duro. Se preserva la idea de notoriedad pública más que la de simple ''valentía''.'
- source_word: ἐν παρρησίᾳ εἶναι
  english_pob_choice: to be known openly
  chosen_spanish: ser conocido abiertamente
  alternatives_spanish:
  - estar en público
  - ser público
  - ser conocido en público
  lexicon: BDAG
  rationale: παρρησία aquí apunta a apertura, publicidad o visibilidad, no a 'franqueza' en el sentido de hablar con audacia. 'Ser conocido abiertamente' comunica ese sentido con naturalidad en español y mantiene la tensión del texto.
- source_word: φανέρωσον σεαυτὸν
  english_pob_choice: show yourself
  chosen_spanish: muéstrate
  alternatives_spanish:
  - revelate
  - hazte visible
  - muéstrate a ti mismo
  lexicon: BDAG
  rationale: Imperativo aoristo con tono de desafío. 'Muéstrate' es breve, idiomático y conserva la idea de auto-manifestación pública sin sobreexplicar.
- source_word: τῷ κόσμῳ
  english_pob_choice: to the world
  chosen_spanish: al mundo
  alternatives_spanish:
  - ante el mundo
  - al público
  lexicon: BDAG
  rationale: Se mantiene 'mundo' por la densidad joánica de κόσμος y por continuidad terminológica. 'Al mundo' conserva la resonancia literaria y teológica sin convertirlo solo en 'público'.
theological_decisions:
- issue: 'κόσμος en Juan 7:4: ''mundo'' o ''público'''
  english_pob_reading: the world
  chosen_spanish_reading: el mundo
  alternative_spanish_readings:
  - el público
  - la gente
  rationale: Aunque el contexto inmediato trata de visibilidad pública, el uso joánico de κόσμος suele tener peso literario y teológico. Traducirlo 'mundo' preserva esa red de resonancias, como en el texto inglés POB.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
- issue: 'ἐν παρρησίᾳ εἶναι: apertura pública vs. valentía al hablar'
  english_pob_reading: to be known openly
  chosen_spanish_reading: ser conocido abiertamente
  alternative_spanish_readings:
  - hablar con franqueza
  - ser abierto
  rationale: En este contexto no se trata principalmente de osadía discursiva, sino de ser visible/ostensible ante otros. La formulación española sigue la revisión inglesa y evita trasladar indebidamente el sentido de 'parresía' como mera franqueza.
  doctrine_reference: BDAG, παρρησία
- issue: 'οὐδεὶς γάρ: tono explicativo'
  english_pob_reading: For no one
  chosen_spanish_reading: Porque nadie
  alternative_spanish_readings:
  - Pues nadie
  - No hay nadie
  rationale: Se conserva el nexo explicativo del verso con una partícula causal natural en español. No se añade interpretación adicional al inicio de la frase.
  doctrine_reference: Translation philosophy §2 (source-prioritization)
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que prefirió 'to be known openly' sobre 'to be in public view' para reflejar con mayor naturalidad ἐν παρρησίᾳ εἶναι. En español se optó por 'ser conocido abiertamente', manteniendo esa misma decisión semántica y evitando trasladar el texto hacia una mera idea de presencia física pública.
  spanish_consistency_notes:
  - Se mantuvo 'mundo' para κόσμος por coherencia con el uso joánico y con la traducción inglesa auditada.
  - Se evitó 'SEÑOR' o equivalentes de ocultamiento nominal, ya que el versículo no contiene el tetragrámaton ni κύριος.
  - '''Nadie'' y ''porque'' reproducen el tono general y explicativo sin forzar una sintaxis arcaizante.'
  - '''Muéstrate'' conserva el imperativo directo y desafiante del griego, apropiado al contexto de los hermanos de Jesús.'
