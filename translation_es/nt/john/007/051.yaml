  spanish_quality_summary: 'El español es generalmente claro, pero «si primero no lo oye» suena algo forzado y la nota c introduce una alternativa poco idiomática («lo escucha de él»). Una leve revisión mejora naturalidad y fidelidad jurídica: «a menos que primero oiga de él». El resto del verso es legible y digno.'
