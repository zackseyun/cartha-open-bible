  - Se evitó «Cristo», «Señor» u այլ terminología no presente en el versículo.
  - Se conservó la pregunta retórica negativa para reproducir el tono del μή inicial.
  - La solución «lo oye» busca naturalidad en español sin perder la exigencia de escuchar primero; la nota preserva la lectura más literal.
