translation:
  language: es
  text: ¿No juzga nuestra ley[a] a un hombre[b] a menos que primero oiga de él[c] y sepa lo que hace?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Ley» traduce νόμος; aquí no se fija una capitalización devocional, porque el contexto es una apelación jurídica de Nicodemo.
    reason: lexical_alternative
  - marker: b
    text: O «una persona». El griego usa ἄνθρωπον en singular representativo.
    reason: lexical_alternative
  - marker: c
    text: O «lo oiga primero». El griego dice más literalmente «oiga primero de él».
    reason: lexical_alternative
lexical_decisions:
- source_word: Μὴ
  english_pob_choice: does it?
  chosen_spanish: ¿No…?
  alternatives_spanish:
  - ¿Acaso no…?
  - ¿No es verdad que…?
  lexicon: BDAG
  rationale: La partícula μή al inicio de la pregunta da un matiz retórico que espera una respuesta negativa. En español, una interrogativa con «¿No…?» comunica bien ese valor sin añadir contenido extra.
- source_word: νόμος
  english_pob_choice: law
  chosen_spanish: ley
  alternatives_spanish:
  - Ley
  - norma legal
  lexicon: BDAG
  rationale: «Ley» es el equivalente natural en español para el estándar jurídico invocado aquí. Mantiene el sentido forense sin forzar una referencia más específica que la del texto.
- source_word: κρίνει
  english_pob_choice: judge
  chosen_spanish: juzga
  alternatives_spanish:
  - condena
  - dicta sentencia sobre
  lexicon: BDAG
  rationale: κρίνω expresa juzgar o emitir decisión. «Juzga» conserva el campo legal y evita intensificar indebidamente el verbo hacia «condena».
- source_word: τὸν ἄνθρωπον
  english_pob_choice: a man
  chosen_spanish: a un hombre[b]
  alternatives_spanish:
  - a una persona
  - al hombre
  lexicon: BDAG
  rationale: El griego usa un singular representativo; por eso se mantiene «un hombre». Se conserva la nota de alternativa porque en español también podría entenderse de manera inclusiva como «una persona», aunque eso se aleja más de la forma del original.
- source_word: ἐὰν μὴ
  english_pob_choice: unless
  chosen_spanish: si primero no
  alternatives_spanish:
  - a menos que
  - si no
  lexicon: BDAG
  rationale: La combinación introduce una condición negativa necesaria. «Si primero no» reproduce con naturalidad el orden del griego y deja visible la secuencia procesal antes de cerrar la condición con el verbo siguiente.
- source_word: ἀκούσῃ πρῶτον παρ’ αὐτοῦ
  english_pob_choice: it first hears from him
  chosen_spanish: lo oye[c]
  alternatives_spanish:
  - lo oye primero de él
  - lo escucha primero de él
  lexicon: BDAG
  rationale: El griego dice literalmente «oír primero de parte de él». En español, «lo oye» transmite el acto jurídico de escuchar su testimonio, y la nota preserva la alternativa más literal. Se evita una formulación excesivamente dura o artificial.
- source_word: γνῷ
  english_pob_choice: knows
  chosen_spanish: sabe
  alternatives_spanish:
  - conoce
  - llega a saber
  lexicon: BDAG
  rationale: γινώσκω aquí apunta a llegar a saber los hechos del caso. «Sabe» es conciso y natural en español; en este contexto jurídico significa tener conocimiento suficiente para decidir.
- source_word: τί ποιεῖ
  english_pob_choice: what he is doing
  chosen_spanish: lo que hace
  alternatives_spanish:
  - lo que está haciendo
  - lo que ha hecho
  lexicon: BDAG
  rationale: El presente ποιεῖ puede reflejar la acción en curso o habitual. «Lo que hace» es más idiomático en español y mantiene el aspecto presente sin obligar a una perífrasis que podría sonar más interpretativa.
theological_decisions:
- issue: Alcance representativo de τὸν ἄνθρωπον
  english_pob_reading: a man as a representative singular
  chosen_spanish_reading: a un hombre como singular representativo
  alternative_spanish_readings:
  - a una persona
  - al hombre
  rationale: No hay una disputa doctrinal, pero sí una decisión sobre cómo reflejar el singular genérico del griego. Se conserva la forma masculina porque el texto original la usa como representativa; la nota permite reconocer la alternativa inclusiva sin borrar la forma fuente.
  doctrine_reference: Principio de fidelidad formal al singular representativo del original
- issue: Fuerza retórica de μή en interrogativa
  english_pob_reading: expects a negative answer
  chosen_spanish_reading: pregunta retórica que espera una respuesta negativa
  alternative_spanish_readings:
  - ¿Acaso no…?
  - ¿No es verdad que…?
  rationale: La elección de una interrogativa negativa en español conserva la función discursiva del griego. No se convierte en afirmación directa para no perder el tono de apelación judicial y retórica.
  doctrine_reference: Pragmática del discurso bíblico; ningún punto doctrinal afectado
- issue: 'Procedimiento judicial: oír antes de juzgar'
  english_pob_reading: it first hears from him and knows what he is doing
  chosen_spanish_reading: primero lo oye y sabe lo que hace
  alternative_spanish_readings:
  - primero lo escucha y sabe lo que hace
  - primero oye de él y sabe lo que hace
  rationale: 'La secuencia judicial es importante: escuchar antes de juzgar. La redacción española mantiene esa lógica procesal sin introducir una interpretación adicional.'
  doctrine_reference: Ética judicial en el contexto de la ley mosaica y el debido proceso
