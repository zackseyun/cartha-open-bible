    unchanged: false
    changes_summary: 'Changed ''Messiah'' to ''Christ'' to reflect the Greek term χριστός more directly and maintain formal consistency; otherwise retained the draft. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: 'Pero muchos de la multitud creyeron en él[a], y decían: «Cuando venga el Mesías, ¿acaso hará más señales que las que ha hecho este hombre?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el Cristo». El título griego Χριστός se vierte aquí «el Mesías» porque funciona como título en un contexto mesiánico judío.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐκ τοῦ ὄχλου
  english_pob_choice: from the crowd
  chosen_spanish: de la multitud
  alternatives_spanish:
  - entre la multitud
  - de entre la multitud
  lexicon: BDAG
  rationale: El griego marca un grupo tomado del conjunto mayor. «De la multitud» conserva el sentido partititivo de forma natural en español; «de entre la multitud» explicita más el origen, pero suena más pesado.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Aquí δέ introduce contraste leve con el rechazo y la discusión del contexto. «Pero» comunica mejor ese giro que una simple coordinación.
- source_word: πολλοὶ
  english_pob_choice: many
  chosen_spanish: muchos
  alternatives_spanish:
  - muchas personas
  lexicon: BDAG
  rationale: El adjetivo funciona sustantivado. «Muchos» es conciso y fiel al griego.
- source_word: ἐπίστευσαν εἰς αὐτόν
  english_pob_choice: believed in him
  chosen_spanish: creyeron en él
  alternatives_spanish:
  - pusieron su fe en él
  - creyeron hacia él
  lexicon: BDAG
  rationale: Con εἰς, πιστεύω expresa confianza dirigida a una persona. «Creyeron en él» es la forma española natural y conserva la dirección personal de la fe.
- source_word: ἔλεγον
  english_pob_choice: they were saying
  chosen_spanish: decían
  alternatives_spanish:
  - estaban diciendo
  - seguían diciendo
  lexicon: BDAG
  rationale: El imperfecto sugiere habla repetida o en curso. En español, «decían» transmite ese aspecto sin sonar recargado.
- source_word: Ὁ χριστός
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - el Cristo
  lexicon: BDAG
  rationale: Aquí Χριστός funciona como título en un contexto mesiánico judío, no como nombre propio. En español, «Mesías» es la equivalencia titulativa más clara y mantiene la referencia bíblica.
- source_word: ὅταν ἔλθῃ
  english_pob_choice: When the Messiah comes
  chosen_spanish: Cuando venga el Mesías
  alternatives_spanish:
  - cuando llegue el Mesías
  - cuando el Mesías venga
  lexicon: BDAG
  rationale: ὅταν con subjuntivo aoristo expresa una contingencia futura general. «Cuando venga el Mesías» es natural en español y preserva esa referencia futura.
- source_word: μὴ ... ποιήσει
  english_pob_choice: he will not do ... will he?
  chosen_spanish: ¿hará ...?
  alternatives_spanish:
  - ¿no hará ...?
  - ¿acaso hará ...?
  lexicon: BDAG
  rationale: La partícula μή en una pregunta apunta a una respuesta negativa esperada. En español, una pregunta con entonación retórica basta para reflejar esa expectativa sin añadir más contenido del necesario.
- source_word: πλείονα σημεῖα
  english_pob_choice: more signs
  chosen_spanish: más señales
  alternatives_spanish:
  - mayores señales
  - más milagros
  lexicon: BDAG
  rationale: πλείονα es comparativo de cantidad. «Más señales» preserva la relación cuantitativa y el término joánico σημεῖα, que aquí conviene verter como «señales».
- source_word: σημεῖα
  english_pob_choice: signs
  chosen_spanish: señales
  alternatives_spanish:
  - milagros
  lexicon: BDAG
  rationale: En Juan, σημεῖον tiene peso teológico como acto revelador. «Señales» conserva ese valor mejor que «milagros», que sería más explicativo.
- source_word: οὗτος
  english_pob_choice: this man
  chosen_spanish: este hombre
  alternatives_spanish:
  - este
  - este sujeto
  lexicon: BDAG
  rationale: El demostrativo se refiere a Jesús en el habla coloquial de la multitud. «Este hombre» reproduce el tono referencial sin suavizarlo demasiado.
- source_word: ἐποίησεν
  english_pob_choice: has done
  chosen_spanish: ha hecho
  alternatives_spanish:
  - hizo
  lexicon: BDAG
  rationale: Aunque el griego usa aoristo, el español necesita un tiempo que mantenga vigente lo ya realizado frente al futuro esperado. «Ha hecho» suena natural en la comparación.
theological_decisions:
- issue: Cómo renderizar Χριστός como título mesiánico
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - el Cristo
  rationale: El contexto habla del esperado que «viene»; por eso Χριστός es titular y no nombre propio. «El Mesías» conserva la fuerza judía del término y evita desplazarlo a un uso litúrgico menos contextual.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Messiah (where title; Christ where name-like)'
- issue: Fuerza retórica de la pregunta con μή
  english_pob_reading: expects a negative answer; rhetorical question
  chosen_spanish_reading: ¿hará más señales que las que ha hecho este hombre?
  alternative_spanish_readings:
  - ¿acaso hará más señales que las que ha hecho este hombre?
  - ¿no hará más señales que las que ha hecho este hombre?
  rationale: La pregunta no parece buscar información neutral, sino expresar que las señales de Jesús se perciben como suficientes o insuperables. En español, la entonación interrogativa retiene esa tensión sin resolverla de más.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El inglés auditado pasó por una revisión que osciló entre «Messiah» y «Christ»; el ajuste final restauró «Messiah» según la política de términos controvertidos. La versión española sigue esa decisión final y la expresa con «el Mesías».
  spanish_consistency_notes:
  - Se mantiene «Mesías» para Χριστός en sentido titular, conforme al criterio del proyecto.
  - Se usa «señales» para σημεῖα, preservando el lenguaje joánico y su carga reveladora.
  - La pregunta final conserva el tono retórico esperado por μή sin convertirlo en afirmación ni en paráfrasis interpretativa.
