  text: ⸂ἐκ τοῦ ὄχλου δὲ πολλοὶ⸃ ἐπίστευσαν εἰς αὐτόν, καὶ ⸀ἔλεγον· Ὁ χριστὸς ὅταν ἔλθῃ ⸀μὴ πλείονα ⸀σημεῖα ποιήσει ὧν οὗτος ἐποίησεν;
base_translation:
  language: en
  yaml_path: translation/nt/john/007/031.yaml
  text: But many from the crowd believed in him[a], and they were saying, “When the Messiah comes, he will not do more signs than this man has done, will he?”
  footnotes:
  - marker: a
    text: Or, 'the Christ.' The Greek title Χριστός is rendered 'Messiah' here because it is used as a title in a Jewish messianic context.
    reason: alternative_reading
  ai_draft:
    model_id: gpt-5.4
