translation:
  language: es
  text: Yo lo conozco,[a] porque vengo de parte de él,[b] y él me envió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que yo vengo de parte de él». La conjunción griega puede introducir contenido («que») o razón («porque»); el contexto favorece el sentido causal.
    reason: lexical_alternative
  - marker: b
    text: O «soy de él» o «vengo de su presencia». La frase griega puede expresar fuente u origen con más precisión que el español simple; aquí «vengo de parte de él» busca comunicar procedencia de manera natural en español, aunque también puede sonar más misional que la expresión griega por sí sola.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐγὼ
  english_pob_choice: I
  chosen_spanish: Yo
  alternatives_spanish:
  - (sujeto implícito)
  - Yo mismo
  lexicon: BDAG
  rationale: Se conserva el pronombre explícito para reflejar el énfasis del sujeto griego. En español, 'Yo' al inicio mantiene esa fuerza enfática sin añadir contenido.
- source_word: οἶδα
  english_pob_choice: know
  chosen_spanish: lo conozco
  alternatives_spanish:
  - lo sé
  - he llegado a conocerlo
  lexicon: BDAG
  rationale: Aunque οἶδα puede traducirse como 'sé', aquí el objeto personal y el contexto relacional permiten 'lo conozco' para expresar conocimiento personal, sin perder el valor de conocimiento real que el POB inglés conserva con 'know'.
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  - le
  lexicon: BDAG
  rationale: El pronombre retoma al Padre en contexto; en español, el objeto directo pronominal 'lo' es la forma natural y clara.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - que
  lexicon: BDAG
  rationale: Se mantiene el valor causal que el audit trail inglés privilegia. 'Porque' expresa mejor la relación de razón que 'que' en español contemporáneo.
- source_word: παρ’ αὐτοῦ
  english_pob_choice: from him
  chosen_spanish: de él
  alternatives_spanish:
  - desde él
  - de su presencia
  lexicon: BDAG
  rationale: La preposición παρά con genitivo señala origen/procedencia. 'De él' es la forma más natural en español y preserva la idea de procedencia sin cerrar indebidamente la tensión teológica.
- source_word: εἰμι
  english_pob_choice: I am
  chosen_spanish: soy
  alternatives_spanish:
  - estoy
  - he venido
  lexicon: BDAG
  rationale: Aunque el inglés conserva 'I am', en español la copula 'soy' comunica con naturalidad identidad/procedencia en esta construcción ('de él soy') y evita una paráfrasis que explicite 'he venido'.
- source_word: κἀκεῖνός
  english_pob_choice: and he
  chosen_spanish: y él
  alternatives_spanish:
  - y aquel
  - y ese
  lexicon: BDAG
  rationale: La contracción καί + ἐκεῖνος se rinde con el pronombre personal simple; 'y él' es natural y no introduce marcado demonstrativo innecesario.
- source_word: με
  english_pob_choice: me
  chosen_spanish: me
  lexicon: BDAG
  rationale: Objeto directo de ἀπέστειλεν, conservado de modo directo.
- source_word: ἀπέστειλεν
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - mandó a
  lexicon: BDAG
  rationale: El aoristo se vierte como pasado simple. 'Envió' mantiene el tema joánico de misión y es el equivalente más natural en español.
theological_decisions:
- issue: Relación de origen/procedencia en παρ’ αὐτοῦ εἰμι
  english_pob_reading: Render as 'I am from him' to express source/origin while preserving the text's theological depth without interpretive expansion.
  chosen_spanish_reading: de él soy
  alternative_spanish_readings:
  - soy de él
  - vengo de él
  - he venido de él
  rationale: La forma española 'de él soy' conserva la procedencia/origen y, al mismo tiempo, evita resolver la afirmación en una mera localización o en un simple 'haber venido'. Mantiene la tensión teológica sobre la relación única de Jesús con el Padre.
  doctrine_reference: Translation philosophy §3; Affirmations (Nicene/Chalcedonian bounds)
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete de origen; se sigue el estado más reciente, que indica que no hubo cambios necesarios y que el acuerdo de revisión fue alto.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para θεός y 'Yahvé' para יהוה según las normas del proyecto, aunque este versículo no los contiene explícitamente.
  - Se evita 'Señor' o 'Cristo' porque no corresponden al texto base ni al audit trail de este versículo.
  - La puntuación reproduce la cadencia de dos miembros causales y coordenados, acorde con el griego y el inglés auditado.
