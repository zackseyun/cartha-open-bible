  rationale: 'Se ajusta la cláusula central para que el español sea natural y legible. «Vengo de parte de él» comunica procedencia de forma idiomática, aunque la nota conserva alternativas más cercanas al matiz de origen del griego y advierte la posible reducción misional. También se corrigen las notas para alinearlas con el audit trail inglés: la alternativa principal se traslada a ὅτι, y se elimina «desde él», que no es una opción española adecuada.'
