translation:
  language: es
  text: 'Entonces Jesús les dijo[a]: «Mi tiempo todavía no ha llegado, pero el tiempo de ustedes siempre está listo.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Mi tiempo señalado todavía no ha llegado». El griego puede referirse a un tiempo oportuno o fijado, no solo al tiempo en general.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Entonces
  alternatives_spanish:
  - Así que
  - Por tanto
  lexicon: BDAG
  rationale: Expresa con naturalidad la continuación inferencial o narrativa del griego sin forzar un tono demasiado formal en español.
- source_word: λέγει ... ὁ Ἰησοῦς
  english_pob_choice: Jesus said
  chosen_spanish: Jesús les dijo
  alternatives_spanish:
  - Jesús dijo
  - Jesús les decía
  lexicon: BDAG
  rationale: El presente histórico griego se vierte en pasado natural en español. Mantener 'les dijo' conserva el destinatario explícito y la fluidez narrativa.
- source_word: αὐτοῖς
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  lexicon: BDAG
  rationale: El dativo indirecto se expresa de forma natural con el clítico español 'les'; el complemento explícito sería redundante.
- source_word: καιρός
  english_pob_choice: time
  chosen_spanish: tiempo
  alternatives_spanish:
  - momento
  - tiempo señalado
  - tiempo oportuno
  lexicon: BDAG
  rationale: '''καιρός'' aquí apunta a un tiempo fijado o adecuado más que al tiempo cronológico general. ''Tiempo'' mantiene la concisión y deja abierta la posible matización de ''momento señalado'' sin introducirla de más en el texto principal.'
- source_word: ὁ καιρὸς ὁ ἐμὸς
  english_pob_choice: My time
  chosen_spanish: Mi tiempo
  alternatives_spanish:
  - Mi tiempo señalado
  - Mi momento
  lexicon: BDAG
  rationale: La estructura posesiva enfática se conserva de manera directa y natural. En español, 'mi tiempo' comunica bien la referencia al momento propio de Jesús sin añadir interpretación.
- source_word: οὔπω
  english_pob_choice: not yet
  chosen_spanish: todavía no
  alternatives_spanish:
  - aún no
  lexicon: BDAG
  rationale: '''Todavía no'' refleja con claridad que el tiempo esperado no ha llegado hasta ahora, con un matiz temporal idiomático en español.'
- source_word: πάρεστιν
  english_pob_choice: has not yet come
  chosen_spanish: ha llegado
  alternatives_spanish:
  - está aquí
  - está presente
  lexicon: BDAG
  rationale: Aunque el verbo literalmente puede significar 'estar presente' o 'haber llegado', en esta construcción temporal española 'ha llegado' expresa bien la idea de arribo del momento señalado. La negación previa conserva el sentido de 'todavía no'.
- source_word: δὲ
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - mas
  - y
  lexicon: BDAG
  rationale: Introduce el contraste entre el tiempo de Jesús y el de ellos; 'pero' es la equivalencia natural en español.
- source_word: ὁ καιρὸς ὁ ὑμέτερος
  english_pob_choice: your time
  chosen_spanish: su tiempo
  alternatives_spanish:
  - el tiempo de ustedes
  - su momento
  lexicon: BDAG
  rationale: Se evita el tratamiento directo ambiguo del plural de segunda persona usando 'su tiempo', que en el contexto de la escena queda claro por el interlocutor plural. Esta solución conserva el contraste con 'mi tiempo'.
- source_word: πάντοτέ ἐστιν ἕτοιμος
  english_pob_choice: is always ready
  chosen_spanish: siempre está listo
  alternatives_spanish:
  - siempre está preparado
  - está siempre listo
  lexicon: BDAG
  rationale: '''ἕτοιμος'' significa listo/preparado. ''Está listo'' es una expresión natural en español y comunica la disponibilidad permanente que el contexto exige.'
theological_decisions:
- issue: Sentido de 'mi tiempo' en el contexto joánico
  english_pob_reading: Rendered as 'My time' without expanding to 'hour' or explicitly theological language in the main text.
  chosen_spanish_reading: '''Mi tiempo'' se mantiene sin convertirlo en ''mi hora'' ni explicitar su carga teológica en el texto principal.'
  alternative_spanish_readings:
  - Mi tiempo señalado
  - Mi hora
  rationale: El griego usa καιρός, no ὥρα. Aunque en Juan la referencia al tiempo de Jesús tiene peso teológico, el texto aquí distingue cuidadosamente el término y conviene preservar esa tensión en vez de resolverla en la traducción principal.
  doctrine_reference: Preservar la tensión textual y teológica sin sobreinterpretar.
translation_notes:
  revision_awareness: La versión en inglés POB ya había optado por 'My time' y una nota alternativa con 'My appointed time'. La presente redacción conserva esa decisión de manera natural en español, manteniendo el contraste con 'su tiempo' y añadiendo una nota donde el griego permite la lectura de un tiempo señalado o apropiado. No se observaron revisiones posteriores que obligaran a modificar el sentido.
  spanish_consistency_notes:
  - Se mantiene 'tiempo' para καιρός en el texto principal, siguiendo la opción inglesa y evitando sobreinterpretar el matiz de 'appointed time'.
  - '''Mi tiempo'' y ''su tiempo'' preservan el contraste enfático del griego.'
  - '''Siempre está listo'' reproduce ἕτοιμος con una formulación idiomática en español sin perder la idea de disponibilidad permanente.'
  - '''Todavía no ha llegado'' expresa οὔπω πάρεστιν de manera natural y compatible con el valor de ''estar presente/llegar'' del verbo griego.'
