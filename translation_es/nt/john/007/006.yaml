review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el contraste del griego: οὖν como continuación narrativa, ''Jesús les dijo'', ''mi tiempo'' / ''su tiempo'', ''todavía no ha llegado'' para οὔπω πάρεστιν, y ''siempre'' para πάντοτε. También preserva correctamente que καιρός no se expanda a ''hora''. Sin embargo, ''su tiempo'' en español neutral puede sonar de tercera persona o de tratamiento formal singular, y debilita la oposición directa con el plural interlocutivo αὐτοῖς/ὑμέτερος.'
  spanish_quality_summary: El español es claro y natural, pero 'su tiempo' introduce una ambigüedad evitable en una línea de contraste central. 'El tiempo de ustedes' suena más directo y fiel en español latinoamericano amplio. Además, 'está listo' es comprensible, pero con 'tiempo' suena un poco calcado; 'siempre está listo' puede mantenerse, aunque la frase mejora en conjunto con el ajuste del posesivo.
  glossary_alignment: No hay conflicto con la terminología del proyecto. 'Jesús', 'tiempo' para καιρός, y la nota sobre 'tiempo señalado' están alineados con la auditoría inglesa. No intervienen términos sensibles como Yahvé, Mesías, Espíritu, etc.
  issues:
  - severity: medium
    issue: Ambigüedad de 'su tiempo' para ὁ καιρὸς ὁ ὑμέτερος
    rationale: En español neutral, 'su' puede referirse a 'usted', 'ustedes' o 'ellos'. Aquí el griego contrasta enfáticamente 'mi' con 'vuestro/ de ustedes'. 'El tiempo de ustedes' preserva mejor la referencia plural directa sin introducir voseo ni 'vosotros'.
  - severity: low
    issue: Ligera rigidez en 'siempre está listo' con 'tiempo'
    rationale: No es incorrecto, pero con 'el tiempo de ustedes' la frase suena más idiomática y menos susceptible de leerse como calco. Aun así, no requiere reformulación mayor porque ἕτοιμος sí significa 'listo/preparado'.
  revised_spanish_text: 'Entonces Jesús les dijo[a]: «Mi tiempo todavía no ha llegado, pero el tiempo de ustedes siempre está listo.»'
  revised_footnotes:
  - marker: a
    text: O «Mi tiempo señalado todavía no ha llegado». El griego puede referirse a un tiempo oportuno o fijado, no solo al tiempo en general.
    reason: lexical_alternative
