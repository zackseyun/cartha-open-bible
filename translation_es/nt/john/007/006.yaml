- from: 'Entonces Jesús les dijo[a]: «Mi tiempo todavía no ha llegado, pero su tiempo siempre está listo.»'
  to: 'Entonces Jesús les dijo[a]: «Mi tiempo todavía no ha llegado, pero el tiempo de ustedes siempre está listo.»'
  rationale: Se ajusta únicamente el posesivo de la segunda persona plural para eliminar la ambigüedad de 'su tiempo' y reflejar con mayor claridad el contraste del griego entre 'mi' y 'de ustedes'. Se conserva el resto del texto y la nota porque son fieles al sentido fuente y a la rationale documentada.
  reviewer_model: gpt-5.4
