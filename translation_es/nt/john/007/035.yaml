  text: εἶπον οὖν οἱ Ἰουδαῖοι πρὸς ἑαυτούς· Ποῦ οὗτος μέλλει πορεύεσθαι ὅτι ἡμεῖς οὐχ εὑρήσομεν αὐτόν; μὴ εἰς τὴν διασπορὰν τῶν Ἑλλήνων μέλλει πορεύεσθαι καὶ διδάσκειν τοὺς Ἕλληνας;
base_translation:
  language: en
  yaml_path: translation/nt/john/007/035.yaml
  text: So the Jews said to one another[a], “Where is this man about to go, that we will not find him? He is not about to go to the Dispersion among the Greeks and teach the Greeks[b], is he?”
  footnotes:
  - marker: a
    text: Or “the Judeans.” The Greek term can denote Jews generally or, in some contexts, people from Judea.
    reason: lexical_alternative
  - marker: b
    text: “The dispersion among the Greeks” refers to Jewish people scattered among Greek-speaking populations, not to a dispersion made up of Greeks.
    reason: cultural_note
