translation:
  language: es
  text: 'Entonces los judíos[a] se decían entre sí: «¿Adónde va a ir este hombre, para que no lo encontremos? ¿Acaso va a ir a la Dispersión[b] entre los griegos y enseñar a los griegos?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los judeanos». El término griego puede referirse a los judíos en general o, en algunos contextos, a la gente de Judea.
    reason: lexical_alternative
  - marker: b
    text: «La Dispersión entre los griegos» se refiere a los judíos dispersos entre poblaciones griegas, no a una dispersión formada por griegos.
    reason: cultural_note
lexical_decisions:
- source_word: οἱ Ἰουδαῖοι
  english_pob_choice: the Jews
  chosen_spanish: los judíos
  alternatives_spanish:
  - los judeanos
  - los líderes judíos
  lexicon: BDAG
  rationale: El griego nombra simplemente a οἱ Ἰουδαῖοι. En este contexto narrativo, «los judíos» reproduce de forma directa el referente colectivo que el texto presenta; «judeanos» es posible pero menos natural en español y no está exigido por el contexto, y «líderes judíos» añadiría una precisión que el griego no da.
- source_word: πρὸς ἑαυτούς
  english_pob_choice: to one another
  chosen_spanish: se dijeron entre sí
  alternatives_spanish:
  - se dijeron unos a otros
  - se dijeron a sí mismos
  lexicon: BDAG
  rationale: La forma recíproca indica conversación dentro del mismo grupo. «Se dijeron entre sí» conserva esa reciprocidad con un español natural; «unos a otros» también sería posible, pero la opción elegida resulta más fluida en registro bíblico contemporáneo.
- source_word: Ποῦ οὗτος
  english_pob_choice: Where is this man
  chosen_spanish: ¿Adónde irá este hombre
  alternatives_spanish:
  - ¿Dónde está este hombre?
  - ¿Adónde va este hombre?
  lexicon: BDAG
  rationale: La pregunta no pide localización presente, sino destino futuro. Por eso «¿Adónde irá?» refleja mejor el alcance de μέλλει πορεύεσθαι. «Este hombre» preserva el valor despectivo o distante de οὗτος, como en la observación de los opositores.
- source_word: μέλλει πορεύεσθαι
  english_pob_choice: is about to go
  chosen_spanish: irá
  alternatives_spanish:
  - está a punto de ir
  - piensa ir
  lexicon: BDAG
  rationale: μέλλω con infinitivo expresa intención o inminencia. En español, el futuro simple comunica bien esa expectativa prospectiva sin forzar una perífrasis pesada; por eso «irá» funciona mejor dentro de la pregunta.
- source_word: ὅτι ἡμεῖς οὐχ εὑρήσομεν αὐτόν
  english_pob_choice: that we will not find him
  chosen_spanish: que no lo encontraremos
  alternatives_spanish:
  - para que no lo encontremos
  - que no podremos encontrarlo
  lexicon: BDAG
  rationale: La cláusula explica la conclusión que los hablantes sacan de su partida futura. «Que no lo encontraremos» mantiene el futuro negativo sin añadir una idea de capacidad que no está explícita en el griego.
- source_word: μὴ ... ;
  english_pob_choice: is he?
  chosen_spanish: verdad
  alternatives_spanish:
  - ¿no es así?
  - ¿o sí?
  lexicon: BDAG
  rationale: μή introduce una pregunta con respuesta negativa esperada. En español, el cierre «verdad» dentro de la interrogación reproduce el tono de expectativa sin introducir una estructura demasiado forzada; mantiene el matiz retórico de la pregunta.
- source_word: εἰς τὴν διασπορὰν τῶν Ἑλλήνων
  english_pob_choice: the Dispersion among the Greeks
  chosen_spanish: a la Dispersión entre los griegos
  alternatives_spanish:
  - a la Dispersión de los griegos
  - a la dispersión entre los griegos
  lexicon: BDAG
  rationale: 'La mayúscula sigue la revisión auditada del POB inglés: se trata de la diáspora judía como designación reconocida. «Entre los griegos» refleja mejor el genitivo de asociación/ubicación que una pertenencia a griegos mismos. Se usa «Dispersión» con mayúscula para mantener ese valor técnico-histórico.'
- source_word: Ἕλληνας
  english_pob_choice: the Greeks
  chosen_spanish: a los griegos
  alternatives_spanish:
  - a los helenos
  - a los gentiles
  lexicon: BDAG
  rationale: El término griego significa literalmente «griegos». Aquí conviene conservar ese sentido directo, ya que el contraste con la dispersión judía entre griegos se entiende mejor sin ampliar el referente a «gentiles».
- source_word: καὶ διδάσκειν τοὺς Ἕλληνας
  english_pob_choice: and teach the Greeks
  chosen_spanish: y a enseñar a los griegos
  alternatives_spanish:
  - y enseñar a los griegos
  - y a enseñar a los helenos
  lexicon: BDAG
  rationale: 'El infinitivo coordinado completa la especulación de los hablantes. En español, el paralelo con «a ir» en la primera mitad hace natural repetir la preposición: «y a enseñar a los griegos». Se conserva el objeto directo «los griegos» sin expansión interpretativa.'
theological_decisions:
- issue: Ἰουδαῖοι en Juan 7:35 y posible matiz regional/étnico
  english_pob_reading: the Jews
  chosen_spanish_reading: los judíos
  alternative_spanish_readings:
  - los judeanos
  - los líderes judíos
  rationale: El texto no obliga a restringir el referente a Judea ni a los dirigentes. Mantener «los judíos» sigue de cerca el griego y respeta la tensión histórica y narrativa que el POB inglés dejó abierta en su nota lexical.
  doctrine_reference: Principio de primacía del texto original; conservar la ambigüedad lexical donde el griego la presenta
- issue: διασπορά como designación histórica de la diáspora judía
  english_pob_reading: the Dispersion among the Greeks
  chosen_spanish_reading: la Dispersión entre los griegos
  alternative_spanish_readings:
  - la dispersión entre los griegos
  - la Dispersión de los griegos
  rationale: La revisión inglesa capitalizó «Dispersion» para reflejar un nombre reconocido de la diáspora judía. En español, «Dispersión» con mayúscula mantiene ese valor técnico e histórico sin convertir el genitivo en una dispersión perteneciente a griegos. La nota aclara que la expresión se refiere a judíos dispersos entre población griega.
  doctrine_reference: Historia de Israel en la diáspora; evitar leer étnicamente a los griegos como sujetos de la dispersión
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail inglés, que capitaliza «Dispersion» por tratarse de la diáspora judía como designación establecida. También conserva el criterio lexical del POB para οἱ Ἰουδαῖοι, πρὸς ἑαυτούς, μέλλω + infinitivo, y Ἕλληνες, evitando una paráfrasis que borre la ironía y la ambigüedad narrativa del pasaje.
  spanish_consistency_notes:
  - Se mantiene «Dispersión» con mayúscula para corresponder a la revisión inglesa auditada y a la referencia histórica a la diáspora judía.
  - «Los judíos» se conserva como equivalente directo de οἱ Ἰουδαῖοι, sin sustituirlo por «judeanos» salvo que un contexto más estrecho lo exigiera.
  - La estructura interrogativa en español procura sostener el tono irónico y expectante del griego, sin resolver la pregunta con una paráfrasis explicativa.
