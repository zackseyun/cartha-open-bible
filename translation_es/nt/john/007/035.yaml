revisions:
- from: 'Entonces los judíos se dijeron entre sí[a]: «¿Adónde irá este hombre, que no lo encontraremos? ¿No irá a la Dispersión[b] entre los griegos y a enseñar a los griegos, verdad?»'
  to: 'Entonces los judíos[a] se decían entre sí: «¿Adónde va a ir este hombre, para que no lo encontremos? ¿Acaso va a ir a la Dispersión[b] entre los griegos y enseñar a los griegos?»'
  rationale: Se revisa para conservar mejor la fuerza prospectiva de μέλλει con «va a ir», expresar con más naturalidad la pregunta retórica introducida por μή mediante «¿Acaso ...?», y alinear las notas con las decisiones auditadas del POB inglés. También se suaviza la sintaxis a un español más natural y digno.
