translation:
  language: es
  text: 'Entonces los judíos[b] se maravillaban, diciendo: «¿Cómo conoce este hombre las letras[a] sin haber estudiado?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Cómo tiene este hombre tal conocimiento?»; el griego dice literalmente «conoce letras».'
    reason: lexical_alternative
  - marker: b
    text: En Juan, «los judíos» aquí se refiere contextualmente a los interlocutores y opositores judíos de Jesús en Jerusalén, probablemente incluyendo a las autoridades judeanas, no al pueblo judío en su conjunto.
    reason: cultural_note
lexical_decisions:
- source_word: ἐθαύμαζον
  english_pob_choice: were marveling
  chosen_spanish: se maravillaban
  alternatives_spanish:
  - se asombraban
  - se admiraban
  lexicon: BDAG
  rationale: El imperfecto expresa reacción continua o en curso; «se maravillaban» conserva ese valor durativo mejor que un pretérito simple. También mantiene el matiz de sorpresa admirativa que el contexto sugiere.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - por tanto
  - entonces
  lexicon: BDAG
  rationale: Conserva la conexión narrativa con lo anterior en un español natural, sin cargar excesivamente el tono con una conclusión lógica formal.
- source_word: οἱ Ἰουδαῖοι
  english_pob_choice: the Jews
  chosen_spanish: los judíos
  alternatives_spanish:
  - los judeanos
  - los líderes judíos
  lexicon: BDAG
  rationale: Se mantiene la forma léxica directa del griego, como en la POB inglesa, en lugar de estrechar el referente dentro del texto principal. El sentido contextual se aclara en nota.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: y decían
  alternatives_spanish:
  - diciendo
  lexicon: BDAG
  rationale: El participio introductorio de discurso se vierte de forma idiomática en español. Se añade «y» para reflejar con naturalidad la transición al habla directa.
- source_word: Πῶς
  english_pob_choice: How
  chosen_spanish: ¿Cómo
  alternatives_spanish:
  - ¿de qué manera
  - ¿cómo es que
  lexicon: BDAG
  rationale: Interrogativo directo y natural en español, manteniendo la pregunta sobre la manera o posibilidad de lo dicho.
- source_word: οὗτος
  english_pob_choice: this man
  chosen_spanish: este hombre
  alternatives_spanish:
  - este
  - este individuo
  lexicon: BDAG
  rationale: «Este hombre» preserva el tono algo distante del griego y funciona de manera natural en español.
- source_word: γράμματα
  english_pob_choice: letters
  chosen_spanish: las letras
  alternatives_spanish:
  - la escritura
  - la enseñanza
  lexicon: BDAG
  rationale: Se traduce de forma transparente el sustantivo plural griego. La posible extensión semántica a «aprendizaje/enseñanza» se reserva para la nota, como en la POB inglesa.
- source_word: οἶδεν
  english_pob_choice: know
  chosen_spanish: conoce
  alternatives_spanish:
  - sabe
  - entiende
  lexicon: BDAG
  rationale: En esta construcción con γράμματα, «conoce» suena más natural en español y preserva la idea de competencia o familiaridad con letras/estudio.
- source_word: μὴ μεμαθηκώς
  english_pob_choice: without having studied
  chosen_spanish: sin haber estudiado
  alternatives_spanish:
  - sin haber recibido enseñanza
  - aunque no ha sido instruido
  lexicon: BDAG
  rationale: El participio perfecto de μανθάνω señala falta de formación recibida; «sin haber estudiado» comunica bien la ausencia de instrucción formal sin especificar más de lo que el griego exige.
theological_decisions:
- issue: Referente contextual de «los judíos» en Juan
  english_pob_reading: the Jews
  chosen_spanish_reading: los judíos
  alternative_spanish_readings:
  - los líderes judíos
  - los judeanos
  rationale: Se conserva la equivalencia léxica directa del griego, siguiendo la POB inglesa y evitando introducir una glosa interpretativa en el texto principal. La nota aclara que el referente es contextual y no el pueblo judío en general.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete fuente; la redacción sigue el estado más reciente del audit trail inglés, con la misma decisión de conservar la forma léxica directa y aclarar el alcance contextual en nota.
  spanish_consistency_notes:
  - Se mantiene «los judíos» para reflejar el griego y la POB inglesa, con aclaración contextual en nota para evitar una lectura universalizante.
  - «Se maravillaban» conserva el aspecto imperfectivo del verbo griego mejor que un pretérito puntual.
  - «Sin haber estudiado» transmite la carencia de formación reconocida sin sobreinterpretar el tipo exacto de instrucción.
