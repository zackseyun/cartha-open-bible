revisions:
- from: 'Jesús les respondió y dijo[a]: «Una sola obra[b] hice, y todos se maravillan».'
  to: 'Jesús les respondió[a]: «Hice una sola obra[b], y todos ustedes se maravillan».'
  rationale: Se reubica la nota de la fórmula verbal para que corresponda al segmento pertinente, se mejora la naturalidad sintáctica de la cláusula principal, y se hace más explícita la referencia plural del auditorio sin alterar el sentido del griego ni la decisión joánica de «obra».
