translation:
  language: es
  text: 'Jesús les respondió[a]: «Hice una sola obra[b], y todos ustedes se maravillan».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «les respondió y dijo». La duplicación verbal refleja la fórmula narrativa del griego.
    reason: lexical_alternative
  - marker: b
    text: Probablemente alude a la sanidad del hombre lisiado en sábado en Juan 5:1–18.
    reason: cross_reference
lexical_decisions:
- source_word: ἀπεκρίθη
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: BDAG
  rationale: En español, «respondió» reproduce bien la fórmula narrativa de ἀπεκρίθη y mantiene el tono directo del diálogo sin añadir matices que no están en el griego.
- source_word: εἶπεν
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  - expresó
  lexicon: BDAG
  rationale: «Dijo» conserva la pareja semítica «respondió... y dijo» sin forzar una simplificación que borre la estructura del original.
- source_word: αὐτοῖς
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - a ellos mismos
  lexicon: BDAG
  rationale: El dativo indirecto se expresa naturalmente con «les» en español; el complemento se sobreentiende por el contexto y la marca narrativa.
- source_word: Ἓν
  english_pob_choice: one
  chosen_spanish: una sola
  alternatives_spanish:
  - una
  - solo una
  lexicon: BDAG
  rationale: «Una sola» conserva el énfasis del numeral griego y hace visible que Jesús subraya la singularidad de la obra mencionada.
- source_word: ἔργον
  english_pob_choice: work
  chosen_spanish: obra
  alternatives_spanish:
  - trabajo
  - deed
  - hecho
  lexicon: BDAG
  rationale: Aunque el English POB retiene «work» para preservar la resonancia joánica de ἔργον, en español «obra» es la mejor equivalencia natural y digna para un acto significativo de Jesús, y puede sostener esa carga teológica sin sonar artificial.
- source_word: ἐποίησα
  english_pob_choice: I did
  chosen_spanish: hice
  alternatives_spanish:
  - realicé
  - efectué
  lexicon: BDAG
  rationale: El aoristo simple se vierte con el pretérito perfecto simple «hice», que reproduce con claridad la acción pasada y mantiene la concisión del griego.
- source_word: πάντες
  english_pob_choice: you all
  chosen_spanish: todos
  alternatives_spanish:
  - todos ustedes
  - ustedes todos
  lexicon: BDAG
  rationale: El griego se dirige al grupo entero; en español «todos» comunica bien la totalidad del auditorio sin necesidad de un pronombre redundante.
- source_word: θαυμάζετε
  english_pob_choice: marvel
  chosen_spanish: se maravillan
  alternatives_spanish:
  - se asombran
  - maravillan
  lexicon: BDAG
  rationale: «Se maravillan» preserva el presente y el sentido de asombro del verbo, sin añadir necesariamente la valoración positiva que «admirar» podría sugerir.
theological_decisions:
- issue: Renderización de ἔργον con carga joánica
  english_pob_reading: work
  chosen_spanish_reading: obra
  alternative_spanish_readings:
  - trabajo
  - deed
  - hecho
  rationale: En Juan, ἔργον tiene peso teológico y suele referirse a las acciones de Jesús. «Obra» es la opción española más estable para mantener ese campo semántico y la posible alusión a la sanidad del hombre lisiado en sábado, sin perder naturalidad en español.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented exception)
- issue: Tensión entre singular enfático y referencia contextual
  english_pob_reading: I did one work
  chosen_spanish_reading: Una sola obra hice
  alternative_spanish_readings:
  - hice una obra
  - realicé una sola obra
  rationale: La formulación española conserva el énfasis sobre una única acción y no diluye la posible referencia retrospectiva al milagro de Juan 5; el texto principal permanece abierto, y la nota explica el enlace intertextual.
  doctrine_reference: John 5:1–18 cross-reference
translation_notes:
  revision_awareness: 'El pasaje coincide en alto grado con el texto fuente y el audit trail inglés: no se registraron revisiones posteriores que alteraran la segmentación, la puntuación ni las decisiones léxicas principales.'
  spanish_consistency_notes:
  - Se mantiene el orden retórico «respondió y dijo» para reflejar la fórmula griega.
  - «Obra» se usa de manera consistente con el valor joánico de ἔργον y se evita «hecho» en el texto principal por sonar más genérico.
  - El presente «se maravillan» conserva la fuerza aspectual del griego y la dirección al grupo entero queda clara con «todos».
