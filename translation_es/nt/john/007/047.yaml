translation:
  language: es
  text: 'Entonces los fariseos les respondieron: «¿Acaso ustedes también han sido extraviados[a]?».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «han sido engañados». El verbo puede significar ser desviados del camino o ser engañados; «han sido extraviados» conserva la idea de haber sido llevados al error.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθησαν
  english_pob_choice: answered
  chosen_spanish: respondieron
  alternatives_spanish:
  - contestaron
  - respondieron a
  lexicon: BDAG
  rationale: El verbo de respuesta en diálogo se expresa naturalmente con «respondieron»; mantiene el intercambio narrativo sin sobrecargar el verso. «Contestaron» también sería posible, pero «respondieron» conserva mejor el registro bíblico moderno y la relación con αὐτοῖς.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Entonces
  alternatives_spanish:
  - Así que
  - Por tanto
  lexicon: BDAG
  rationale: Marca la progresión discursiva del relato. «Entonces» es una solución natural en español y preserva la conexión inferencial sin sonar excesivamente formal.
- source_word: αὐτοῖς
  english_pob_choice: them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  lexicon: BDAG
  rationale: El dativo se vierte con el clítico indirecto «les» en español, que reproduce de forma idiomática la dirección de la respuesta.
- source_word: Φαρισαῖοι
  english_pob_choice: the Pharisees
  chosen_spanish: los fariseos
  alternatives_spanish:
  - los Fariseos
  lexicon: BDAG
  rationale: Se conserva el nombre de grupo judío con el artículo. La forma común en español bíblico es «fariseos», sin necesidad de transliteración.
- source_word: Μὴ καὶ ὑμεῖς
  english_pob_choice: Have you also
  chosen_spanish: ¿Acaso ustedes también
  alternatives_spanish:
  - ¿Ustedes también...?
  - ¿No habrán también ustedes...?
  lexicon: BDAG
  rationale: La partícula μή en pregunta espera una respuesta negativa; en español conviene reflejar la fuerza retórica con «¿Acaso...?» sin convertirla en una paráfrasis explicativa. «Ustedes también» reproduce καὶ ὑμεῖς como inclusión/enfasis sobre los interlocutores.
- source_word: πεπλάνησθε
  english_pob_choice: been led astray
  chosen_spanish: han sido arrastrados al error
  alternatives_spanish:
  - han sido engañados
  - se han extraviado
  lexicon: BDAG
  rationale: El perfecto pasivo de πλανάω puede expresar ser desviados o engañados. «Arrastrados al error» conserva la idea de ser llevados fuera del camino y mantiene la tensión entre engaño intelectual y desviación moral; «han sido engañados» es alternativa válida, pero menos rica en la imagen de extravío.
theological_decisions:
- issue: Fuerza retórica de la pregunta con μή
  english_pob_reading: Render as a rhetorical question expecting a negative answer without overtranslating the expectation into the main text.
  chosen_spanish_reading: Se traduce como pregunta retórica con «¿Acaso...?» que sugiere una respuesta negativa sin añadir adverbios interpretativos fuertes al cuerpo del texto.
  alternative_spanish_readings:
  - ¿No habrán también ustedes sido engañados?
  - ¿Acaso ustedes también han sido engañados?
  rationale: La construcción griega comunica ironía/desdén y expectativa de respuesta negativa. La redacción elegida conserva ese tono en español sin exagerarlo ni suavizarlo demasiado.
  doctrine_reference: Principio de equivalencia óptima; mantener el sentido llano del original sin paráfrasis innecesaria.
translation_notes:
  revision_awareness: Texto alineado con el griego SBLGNT y con el audit trail inglés. Se preserva la partícula inferencial οὖν, la pregunta retórica con μή y el matiz de πλανάω sin neutralizar la ironía del contexto.
  spanish_consistency_notes:
  - Se usa «fariseos» como designación grupal estándar en español.
  - Se evita introducir vocabulario eclesiástico tradicional ajeno al griego.
  - La nota de pie de página se ancla en «arrastrados al error» para preservar la alternativa lexical documentada.
