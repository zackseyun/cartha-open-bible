translation:
  language: es
  text: Sin embargo, nadie hablaba abiertamente de él por temor a los judíos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más específicamente en este contexto, 'las autoridades judías' o 'los dirigentes judeanos'. En Juan, 'los judíos' puede referirse al pueblo judío en general o, en algunos pasajes, a las autoridades de Jerusalén opuestas a Jesús.
    reason: alternative_reading
lexical_decisions:
- source_word: οὐδεὶς
  english_pob_choice: no one
  chosen_spanish: nadie
  alternatives_spanish:
  - ninguno
  - no había nadie
  lexicon: BDAG
  rationale: El pronombre negativo indefinido se refiere de manera general a las personas presentes; 'nadie' es la forma natural y precisa en español.
- source_word: μέντοι
  english_pob_choice: Yet
  chosen_spanish: Sin embargo
  alternatives_spanish:
  - Pero
  - No obstante
  lexicon: BDAG
  rationale: Marca un contraste suave con el contexto anterior; 'Sin embargo' conserva el valor adversativo con registro digno y fluido.
- source_word: παρρησίᾳ
  english_pob_choice: openly
  chosen_spanish: abiertamente
  alternatives_spanish:
  - públicamente
  - con franqueza
  - sin ocultarse
  lexicon: BDAG
  rationale: La idea central es hablar sin reserva ni ocultamiento. 'Abiertamente' comunica bien la franqueza pública implícita en el contexto.
- source_word: ἐλάλει
  english_pob_choice: was speaking
  chosen_spanish: hablaba
  alternatives_spanish:
  - estaba hablando
  - decía
  - se expresaba
  lexicon: BDAG
  rationale: El imperfecto sugiere acción continua o habitual; en español, 'hablaba' preserva esa aspectualidad de modo natural.
- source_word: περὶ αὐτοῦ
  english_pob_choice: about him
  chosen_spanish: de él
  alternatives_spanish:
  - acerca de él
  - sobre él
  lexicon: BDAG
  rationale: La preposición περί con genitivo se expresa de forma idiomática como 'de él' en español, sin perder el referente personal.
- source_word: διὰ τὸν φόβον
  english_pob_choice: for fear
  chosen_spanish: por temor
  alternatives_spanish:
  - a causa del temor
  - por miedo
  lexicon: BDAG
  rationale: διά con acusativo expresa causa o motivo. 'Por temor' reproduce el valor causal con un sustantivo de registro sobrio.
- source_word: τῶν Ἰουδαίων
  english_pob_choice: the Jews
  chosen_spanish: los judíos
  alternatives_spanish:
  - los líderes judíos
  - las autoridades judías
  - los judeanos
  lexicon: BDAG
  rationale: Se conserva la forma lexical directa del griego, como en el POB inglés, para no sustituirla sin justificación por una paráfrasis interpretativa. La nota aclara el posible sentido contextual en Juan.
theological_decisions:
- issue: Referencia de 'los judíos' en Juan
  english_pob_reading: Retain 'the Jews' in the main text, with a footnote noting that in John this often refers more specifically to the Judean Jewish authorities or leadership.
  chosen_spanish_reading: Mantener 'los judíos' en el texto principal, con una nota que indique que en Juan a menudo puede referirse más específicamente a las autoridades judías de Judea o de Jerusalén.
  alternative_spanish_readings:
  - los líderes judíos
  - las autoridades judeas
  - los judeanos
  rationale: La traducción conserva la forma del texto fuente y evita introducir una restricción interpretativa en el cuerpo principal. La nota protege la transparencia y ayuda a evitar lecturas antijudías o anacrónicas.
  doctrine_reference: Principio POB de primacía de la fuente original y conservación de tensiones interpretativas
translation_notes:
  revision_awareness: El texto inglés auditado pasó de 'because of fear of the Jews' a la forma más idiomática 'for fear of the Jews'. La versión española sigue esa misma relación causal con 'por temor', manteniendo la sobriedad y la equivalencia formal del adverbio 'openly' con 'abiertamente'.
  spanish_consistency_notes:
  - Se usa 'judíos' como correspondencia directa de τῶν Ἰουδαίων, en paralelo con la decisión inglesa auditada.
  - '''Por temor'' conserva el sustantivo causal y evita una paráfrasis verbal no requerida por el griego.'
  - El imperfecto 'hablaba' mantiene la aspectualidad progresiva/comportamental de ἐλάλει.
  - El registro es neutral y publicable para lectura eclesial amplia.
