- from: Por esta razón, Moisés les ha dado la circuncisión[a] —no porque proceda de Moisés, sino de los padres—, y en sábado circuncidan a un hombre.
  to: Por esta razón, Moisés les ha dado la circuncisión —no porque proceda de Moisés, sino de los padres[a]—, y en el sábado ustedes circuncidan a un hombre.
