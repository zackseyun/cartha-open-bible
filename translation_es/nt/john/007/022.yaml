translation:
  language: es
  text: Por esta razón, Moisés les ha dado la circuncisión —no porque proceda de Moisés, sino de los padres[a]—, y en el sábado ustedes circuncidan a un hombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no porque proceda de Moisés, sino de los padres». El inciso explica que la circuncisión no se originó con Moisés, sino con los patriarcas.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τοῦτο
  english_pob_choice: For this reason
  chosen_spanish: Por esta razón
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: BDAG
  rationale: La expresión causal e inferencial se mantiene como conexión explicativa. «Por esta razón» conserva el matiz de conclusión argumentativa sin sonar mecánico en español.
- source_word: Μωϋσῆς
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moisés
  lexicon: BDAG
  rationale: Nombre propio transliterado de forma estándar en español bíblico.
- source_word: δέδωκεν
  english_pob_choice: has given
  chosen_spanish: ha dado
  alternatives_spanish:
  - dio
  lexicon: BDAG
  rationale: El perfecto griego se refleja con «ha dado», conservando la acción pasada con vigencia presente para los oyentes de Jesús.
- source_word: τὴν περιτομήν
  english_pob_choice: circumcision
  chosen_spanish: la circuncisión
  alternatives_spanish:
  - circuncisión
  lexicon: BDAG
  rationale: La práctica/institución se traduce de forma directa y natural en español, sin reducirla a un acto aislado.
- source_word: οὐχ ὅτι ἐκ τοῦ Μωϋσέως ἐστὶν ἀλλ’ ἐκ τῶν πατέρων
  english_pob_choice: not that it is from Moses, but from the fathers
  chosen_spanish: no porque proceda de Moisés, sino de los padres
  alternatives_spanish:
  - no que sea de Moisés, sino de los padres
  - no porque venga de Moisés, sino de los padres
  lexicon: BDAG
  rationale: En español, «no porque» reproduce con claridad la aclaración causal del inciso parentético. «Proceda de» comunica el origen fuente de ἐκ. «Los padres» preserva el registro bíblico para los patriarcas/antepasados, sin expandir el texto.
- source_word: ἐν σαββάτῳ
  english_pob_choice: on the Sabbath
  chosen_spanish: en sábado
  alternatives_spanish:
  - el sábado
  - durante el sábado
  lexicon: BDAG
  rationale: La frase anarthra temporal se expresa con una fórmula natural en español. «En sábado» mantiene la idea de práctica habitual y el paralelismo con la observancia discutida.
- source_word: περιτέμνετε
  english_pob_choice: you circumcise
  chosen_spanish: circuncidan
  alternatives_spanish:
  - circuncidáis
  - ustedes circuncidan
  lexicon: BDAG
  rationale: Se vierte el presente indicativo de costumbre como una afirmación general sobre lo que hacen. En español, el sujeto implícito y la forma impersonal plural resultan más fluidos en este contexto.
- source_word: ἄνθρωπον
  english_pob_choice: a man
  chosen_spanish: a un hombre
  alternatives_spanish:
  - a una persona
  - a alguien
  lexicon: BDAG
  rationale: Se conserva la referencia masculina concreta exigida por la circuncisión, evitando la neutralización que podría oscurecer el referente inmediato.
theological_decisions:
- issue: Origen de la circuncisión y relación con Moisés
  english_pob_reading: The parenthetical clause explains that circumcision did not originate with Moses but with the patriarchs.
  chosen_spanish_reading: El inciso aclara que la circuncisión no se origina en Moisés, sino en los padres/patriarcas.
  alternative_spanish_readings:
  - El inciso aclara que la circuncisión no proviene de Moisés, sino de los antepasados
  - El inciso aclara que la circuncisión no fue dada por Moisés, sino por los padres
  rationale: 'La traducción conserva la tensión histórica del argumento de Jesús: Moisés la «ha dado» al pueblo en el sentido de regulación/entrega legal, pero su origen es anterior, en los padres. No se suaviza la distinción.'
  doctrine_reference: Translation philosophy §§1, 3, 4
translation_notes:
  revision_awareness: El texto base en inglés mantiene el perfecto («has given») y un inciso aclaratorio sobre el origen de la circuncisión. No se registraron revisiones textuales recientes; la traducción española conserva ese mismo equilibrio entre la entrega mosaica y el origen patriarcal.
  spanish_consistency_notes:
  - Se mantiene «Moisés» como nombre propio estándar y «circuncisión» como término técnico bíblico.
  - «Los padres» conserva el registro bíblico del origen patriarcal sin ampliar indebidamente a una glosa histórica más extensa.
  - La estructura del inciso parentético reproduce la relación lógica del griego y del inglés POB, evitando una paráfrasis excesiva.
  - Se usa «en sábado» para reflejar el valor temporal habitual del dativo griego sin añadir determinación no presente en el texto.
