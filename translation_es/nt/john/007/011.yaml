translation:
  language: es
  text: 'Así que los judíos[a] lo buscaban en la fiesta y decían: «¿Dónde está aquel?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los judeanos», quizá refiriéndose más específicamente a las autoridades judías de Judea dentro del contexto narrativo de Juan.
    reason: alternative_reading
lexical_decisions:
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - Entonces
  - Por eso
  lexicon: BDAG
  rationale: Expresa la continuidad narrativa/inferencial del contexto inmediato con una fórmula natural en español, sin volverla excesivamente formal.
- source_word: Ἰουδαῖοι
  english_pob_choice: the Jews
  chosen_spanish: los judíos
  alternatives_spanish:
  - los judeanos
  - los líderes judíos
  lexicon: BDAG
  rationale: Mantiene la designación directa del texto. No se estrecha a 'líderes' ni a 'judeanos' en el cuerpo principal porque el verso no especifica ese recorte.
- source_word: ἐζήτουν
  english_pob_choice: were looking for
  chosen_spanish: lo buscaban
  alternatives_spanish:
  - lo andaban buscando
  - lo estaban buscando
  lexicon: BDAG
  rationale: El imperfecto marca acción en curso o reiterada; 'lo buscaban' comunica esa idea de forma idiomática y sobria en español.
- source_word: ἐν τῇ ἑορτῇ
  english_pob_choice: at the feast
  chosen_spanish: en la fiesta
  alternatives_spanish:
  - durante la fiesta
  - en el festival
  lexicon: BDAG
  rationale: '''Fiesta'' refleja bien ἑορτή en este contexto. ''En'' conserva la localización temporal/ambiental del evento sin forzar una paráfrasis.'
- source_word: ἔλεγον
  english_pob_choice: were saying
  chosen_spanish: decían
  alternatives_spanish:
  - seguían diciendo
  - estaban diciendo
  lexicon: BDAG
  rationale: El imperfecto puede verse reflejado naturalmente con 'decían', que en español puede expresar habla continuada sin sonar pesado.
- source_word: ἐκεῖνος
  english_pob_choice: that one
  chosen_spanish: ese
  alternatives_spanish:
  - aquel
  - ese hombre
  lexicon: BDAG
  rationale: El demostrativo griego conserva distancia/desapego. 'Ese' reproduce la deixis con una carga relativamente neutral; evita añadir 'hombre', que no está en el griego.
theological_decisions:
- issue: Alcance de Ἰουδαῖοι en Juan 7:11
  english_pob_reading: Render as 'the Jews' in the main text, with a footnote allowing 'the Judeans' as a contextual alternative.
  chosen_spanish_reading: los judíos, con nota para 'los judeanos' o una referencia más específica al contexto narrativo
  alternative_spanish_readings:
  - los judeanos
  - los líderes judíos
  rationale: El verso no delimita por sí mismo un subgrupo. En español, 'los judíos' reproduce la forma del texto base; la nota preserva la posibilidad contextual sin imponerla en el cuerpo principal.
  doctrine_reference: 'Translation philosophy: primacía del original y preservación de tensiones interpretativas; no sobreespecificar el referente sin base textual.'
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión más reciente del expediente inglés: imperfectos coordinados para acciones continuas y el demostrativo literal de ἐκεῖνος sin introducir ''hombre''.'
  spanish_consistency_notes:
  - Se prefirió 'los judíos' como forma principal, coherente con el expediente auditado y con la terminología base del proyecto.
  - Se evitó 'Cristo', 'Señor' u otros equivalentes no presentes en el verso.
  - La deixis de ἐκεῖνος se resolvió con 'ese' para mantener distancia sin añadir contenido interpretativo.
  - La puntuación española usa dos puntos antes de la cita directa y comillas angulares, según convención editorial.
