  rationale: 'Se ajusta únicamente el demostrativo final: «aquel» representa mejor ἐκεῖνος en un español más digno y menos despectivo que «ese», sin añadir «hombre» ni perder la distancia del original. El resto del borrador puede mantenerse.'
