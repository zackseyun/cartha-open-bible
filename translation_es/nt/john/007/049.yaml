translation:
  language: es
  text: Pero esta multitud, que no conoce la ley[a], está bajo maldición[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Aquí «la ley» se refiere a la ley judía, es decir, la Torá.
    reason: cultural_note
  - marker: b
    text: O «es maldita».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Mas
  - Sin embargo
  lexicon: BDAG
  rationale: La conjunción adversativa introduce contraste directo con el juicio anterior; «Pero» es natural en español y conserva el giro polémico sin añadir énfasis no presente.
- source_word: ὁ ὄχλος οὗτος
  english_pob_choice: this crowd
  chosen_spanish: esta muchedumbre
  alternatives_spanish:
  - esta multitud
  - este pueblo
  lexicon: BDAG
  rationale: ὄχλος designa una masa reunida de personas. «Muchedumbre» conserva el valor colectivo y el tono de masa sin caer en «turba», que añadiría una carga más negativa de la que exige el griego.
- source_word: ὁ μὴ γινώσκων
  english_pob_choice: which does not know
  chosen_spanish: que no conoce
  alternatives_spanish:
  - que no sabe
  - no conociendo
  lexicon: BDAG
  rationale: El participio articular funciona atributivamente y describe a «esta muchedumbre». «Que no conoce» reproduce la relación descriptiva y el sentido de conocimiento/ reconocimiento implícito en γινώσκω.
- source_word: τὸν νόμον
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la Ley
  - la Torá
  lexicon: BDAG
  rationale: En este contexto, νόμος alude a la ley judía/Torá. «Ley» mantiene claridad en español; se evita «Ley» mayúscula porque el texto no requiere esa formalización, y «Torá» sería una explicitación más interpretativa.
- source_word: ἐπάρατοί
  english_pob_choice: accursed
  chosen_spanish: maldita
  alternatives_spanish:
  - malditos
  - bajo maldición
  - maldecida
  lexicon: BDAG
  rationale: ἐπάρατος expresa estar bajo maldición o ser maldito. Como el sustantivo colectivo en español es femenino singular («esta muchedumbre»), «maldita» comunica con fuerza la condena; se mantiene la tensión teológica del insulto sin suavizarla.
- source_word: εἰσιν
  english_pob_choice: is
  chosen_spanish: está
  alternatives_spanish:
  - son
  lexicon: BDAG
  rationale: Aunque εἰσιν es plural, en español el sustantivo colectivo «muchedumbre» normalmente rige verbo singular. «Está» suena natural y preserva la fuerza predicativa del juicio colectivo.
theological_decisions:
- issue: Preservar el juicio hostil de los interlocutores sin convertirlo en comentario narratorial
  english_pob_reading: Translate the statement straightforwardly as the Pharisees' denunciation without softening or endorsing it.
  chosen_spanish_reading: Traducir la declaración como una condena pronunciada por los opositores, sin atenuarla ni introducir distancia explicativa.
  alternative_spanish_readings:
  - «dicen que esta muchedumbre está maldita»
  - «esta muchedumbre vive bajo maldición»
  rationale: El griego presenta una afirmación directa y dura. La versión española debe conservar esa dureza y no resolver la tensión teológica con una paráfrasis que rebaje la acusación o la atribuya narrativamente a otro hablante.
  doctrine_reference: Preservar la tensión teológica y retórica del texto sin armonizarla artificialmente.
translation_notes:
  revision_awareness: 'Coincide con la lectura auditada en inglés: el contraste adversativo se mantiene, el sustantivo colectivo se traduce con naturalidad en español, νόμος conserva su referencia a la ley judía/Torá, y ἐπάρατος se vierte con una condena fuerte sin suavización. No se requieren revisiones adicionales respecto del último pase auditado.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto solo cuando el texto lo exige; en este versículo no aparece.
  - «Ley» traduce νόμος en sentido judío-contextual, en línea con el audit trail inglés.
  - El verbo singular con sustantivo colectivo («esta muchedumbre está») es una adaptación gramatical española, no una atenuación del plural griego.
