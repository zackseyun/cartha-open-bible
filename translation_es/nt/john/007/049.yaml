review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: contraste adversativo, referencia despectiva a la multitud, desconocimiento de la ley/Torá y juicio condenatorio. Sin embargo, hay un desajuste importante de número en ἐπάρατοί εἰσιν: el griego predica en plural acerca de las personas de la multitud, y en español conviene expresarlo con un término igualmente plural para preservar mejor la fuerza del original.'
  spanish_quality_summary: El español es claro y natural, pero «esta muchedumbre ... está maldita» suena menos idiomático y menos fiel al plural personal del predicado. «Muchedumbre» además es menos común y más pesado que «multitud» o «gente» en lectura eclesial general. Una leve revisión mejora naturalidad y precisión.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «La ley» está bien, con nota aclaratoria sobre la ley judía/Torá. La nota alternativa para ὄχλος debe evitar «turba» como alternativa principal porque introduce una carga más negativa que el griego no exige.
  issues:
  - severity: medium
    issue: Desajuste de número/persona en «esta muchedumbre ... está maldita»
    rationale: El griego usa ἐπάρατοί εἰσιν, plural, refiriéndose a las personas de la multitud. Aunque un colectivo singular es posible en español, aquí debilita la referencia personal explícita del original.
  - severity: low
    issue: «Muchedumbre» es menos natural que otras opciones
    rationale: No es incorrecto, pero suena más pesado y menos común en español neutral contemporáneo. «Multitud» conserva bien el sentido de ὄχλος.
  - severity: low
    issue: La nota «O «turba»» propone una alternativa demasiado cargada
    rationale: Según la propia decisión léxica auditada, «turba» añade un matiz más negativo que el griego no requiere; no conviene preservarla como alternativa de nota.
