revisions:
- from: Pero esta muchedumbre[a], que no conoce la ley[b], está maldita.
  to: Pero esta multitud, que no conoce la ley[a], está bajo maldición[b].
  rationale: Se cambia «muchedumbre» por «multitud» para mayor naturalidad y se reestructura el predicado como «está bajo maldición» para reflejar mejor el valor de ἐπάρατος aplicado a la gente de la multitud, evitando la rigidez de un singular colectivo femenino («maldita»). Se elimina la alternativa «turba» porque introduce una connotación no exigida por el griego. No se requiere adjudicación adicional.
