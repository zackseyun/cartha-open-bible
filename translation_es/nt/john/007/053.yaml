translation:
  language: es
  text: Y cada uno fue a su casa.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Este versículo introduce la historia de la mujer sorprendida en adulterio (Juan 7:53–8:11). El pasaje completo falta en los manuscritos griegos más antiguos (incluidos papiros del siglo III y los códices Sinaítico y Vaticano del siglo IV), así como en traducciones coptas y siríacas tempranas. Aparece en el Códice de Beza del siglo V, en la tradición latina y en la tradición mayoritaria bizantina posterior. En algunos manuscritos, la historia circula en otras posiciones (como después de Juan 21:25 o de Lucas 21:38), evidencia clara de una tradición oral originalmente independiente incorporada al flujo textual. Se conserva aquí por su arraigo teológico y pastoral en más de 1500 años de lectura cristiana.
    reason: textual_variant
lexical_decisions:
- source_word: ἐπορεύθη / πορεύομαι
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - se fue
  - partió
  - marchó
  lexicon: BDAG
  rationale: El verbo griego expresa desplazamiento simple; en este contexto, «fue» comunica de manera natural la dispersión de cada persona sin añadir matices de marcha o partida que el texto no exige.
- source_word: ἕκαστος
  english_pob_choice: each
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada cual
  - todos
  lexicon: BDAG
  rationale: «Cada uno» reproduce el énfasis distributivo del griego y mantiene la individualidad de la acción.
- source_word: οἶκος
  english_pob_choice: home
  chosen_spanish: casa
  alternatives_spanish:
  - hogar
  - vivienda
  - casa propia
  lexicon: BDAG
  rationale: Aunque el inglés POB eligió «home» por el modismo griego, en español «casa» es la forma más natural y fiel para ese mismo giro idiomático; «hogar» sería más interpretativo y afectivo.
theological_decisions:
- issue: Alcance textual de Jn 7:53 como inicio de la perícopa de la mujer sorprendida en adulterio
  english_pob_reading: The verse begins the story of the woman caught in adultery ... preserved here due to its theological and pastoral belovedness
  chosen_spanish_reading: El versículo queda presentado como inicio narrativo de esa sección, con reconocimiento implícito de su compleja historia textual en el aparato de la obra.
  alternative_spanish_readings:
  - Incluir una nota extensa sobre el trasfondo textual dentro del texto principal
  - Omitir cualquier señal textual y tratar el versículo como flujo continuo
  rationale: El texto griego recibido aquí está presente en la tradición bizantina, mientras que el audit trail inglés registra la discusión textual sin incorporarla al cuerpo del versículo. Para una edición española auditable, la decisión correcta es mantener el versículo en el texto principal y documentar la cuestión en una nota, sin introducir explicación extensa en la línea principal.
  doctrine_reference: Crítica textual del Nuevo Testamento; uso editorial de tradición manuscrita
- issue: Causa de la expresión de movimiento y destino doméstico
  english_pob_reading: each went to his own home
  chosen_spanish_reading: cada uno fue a su casa
  alternative_spanish_readings:
  - cada uno se fue a su casa
  - cada uno volvió a su casa
  rationale: «Fue a su casa» es una traducción directa y sobria del idiomatismo griego εἰς τὸν οἶκον αὐτοῦ. «Se fue» es igualmente posible, pero «fue» conserva mejor la simplicidad del verbo sin añadir una orientación de regreso explícita que no aparece en el griego.
  doctrine_reference: Ninguna
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; el acuerdo cruzado fue alto (1.0) y no hubo objeciones en las pasadas de revisión. Por tanto, la redacción española mantiene el contenido griego recibido y la misma prudencia textual del registro inglés.
  spanish_consistency_notes:
  - 'Se conservó la sencillez sintáctica del griego: sujeto distributivo + verbo de movimiento + complemento de destino.'
  - Se prefirió «casa» en lugar de «hogar» para evitar una carga afectiva no exigida por el texto.
  - La nota textual se ancla en el versículo mediante [a], siguiendo la práctica auditada del POB.
