  text: And[a] each went to his own home.
  footnotes:
  - marker: a
    text: This verse begins the story of the woman caught in adultery (John 7:53–8:11). The entire passage is absent from the earliest Greek manuscripts (including 3rd-century papyri and the 4th-century Sinaiticus and Vaticanus) as well as early Coptic and Syriac translations. It is present in the 5th-century Codex Bezae, the Latin tradition, and the later Byzantine majority tradition. In some manuscripts, the story floats to different positions (such as after John 21:25 or Luke 21:38)—clear evidence of an originally independent oral tradition incorporated into the textual stream. It is preserved here due to its theological and pastoral belovedness across 1500 years of Christian reading.
    reason: textual_critical
