translation:
  language: es
  text: 'Ahora bien, en el último día, el gran día de la fiesta, Jesús estaba de pie y clamó, diciendo: «Si alguno[a] tiene sed, que venga a mí y beba».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, en un español más inclusivo, «que esa persona venga a mí y beba». El griego usa una expresión genérica singular gramatical.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐν δὲ
  english_pob_choice: Now on
  chosen_spanish: Ahora bien, en
  alternatives_spanish:
  - Y en
  - Ahora, en
  lexicon: BDAG
  rationale: Ἐν con dativo marca tiempo, y δὲ aporta una leve conexión discursiva. «Ahora bien, en» conserva esa transición natural en español sin forzar un contraste más fuerte del que el griego expresa.
- source_word: τῇ ἐσχάτῃ ἡμέρᾳ
  english_pob_choice: the last day
  chosen_spanish: el último día
  alternatives_spanish:
  - el día final
  lexicon: BDAG
  rationale: «Último día» es la forma más natural y fiel para la referencia temporal de la fiesta. Mantiene el marco festivo sin cargar innecesariamente una lectura escatológica.
- source_word: τῇ μεγάλῃ τῆς ἑορτῆς
  english_pob_choice: the great day of the feast
  chosen_spanish: el gran día de la fiesta
  alternatives_spanish:
  - el día grande de la fiesta
  - el gran día del festival
  lexicon: BDAG
  rationale: μέγας modifica a ἡμέρᾳ; por eso «gran día» conserva el énfasis. «Fiesta» traduce ἑορτή de manera más adecuada al contexto joánico que «festival».
- source_word: εἱστήκει
  english_pob_choice: stood
  chosen_spanish: estaba de pie
  alternatives_spanish:
  - estaba parado
  - se había puesto de pie
  lexicon: BDAG
  rationale: El verbo expresa postura de estar de pie. «Estaba de pie» es natural en español y conserva la escena pública y visible de Jesús.
- source_word: ἔκραξεν
  english_pob_choice: cried out
  chosen_spanish: exclamó
  alternatives_spanish:
  - clamó
  - gritó
  lexicon: BDAG
  rationale: κράζω indica una proclamación sonora y pública. «Exclamó» conserva la intensidad sin sonar demasiado coloquial; «clamó» sería una alternativa más solemne.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: BDAG
  rationale: El participio introduce el discurso directo. «Diciendo» reproduce bien la estructura griega en español sin añadir contenido interpretativo.
- source_word: Ἐάν τις διψᾷ
  english_pob_choice: If anyone is thirsty
  chosen_spanish: Si alguno tiene sed
  alternatives_spanish:
  - Si alguien tiene sed
  - Si alguno está sediento
  lexicon: BDAG
  rationale: τις es indefinido y genérico; «alguno» conserva esa apertura. Para διψάω, «tener sed» es el equivalente idiomático natural en español y mantiene la metáfora.
- source_word: ἐρχέσθω πρός με
  english_pob_choice: let him come to me
  chosen_spanish: que venga a mí
  alternatives_spanish:
  - venga a mí
  - que esa persona venga a mí
  lexicon: BDAG
  rationale: El imperativo presente tiene fuerza exhortativa/invitatoria. «Que venga a mí» suena natural en español y conserva el carácter de invitación; se mantiene la singularidad genérica del griego.
- source_word: καὶ πινέτω
  english_pob_choice: and drink
  chosen_spanish: y beba
  alternatives_spanish:
  - y que beba
  - y beba de ella
  lexicon: BDAG
  rationale: El segundo imperativo coordinado puede expresarse de forma directa en español. «Beba» mantiene la brevedad y la fuerza de la invitación sin sobreexplicar el objeto implícito.
theological_decisions:
- issue: Imagen de sed y bebida
  english_pob_reading: Retain the imagery literally as 'thirsty' and 'drink' without explicating it as believing or receiving the Spirit in the main text.
  chosen_spanish_reading: Conservar la imagen literalmente como «tener sed» y «beber», sin convertirla en una explicación sobre creer o recibir el Espíritu dentro del texto principal.
  alternative_spanish_readings:
  - «Si alguno anhela vida, que venga a mí y reciba»
  - «Si alguno busca a Dios, que venga a mí»
  rationale: El verso presenta una invitación imagética que el contexto joánico desarrolla después. Mantener la metáfora evita resolver la tensión teológica en la traducción y respeta el alcance inmediato del texto.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Genérico singular tras τις
  english_pob_reading: Use 'let him come' in the main text.
  chosen_spanish_reading: Mantener la singularidad genérica con «que venga».
  alternative_spanish_readings:
  - que vengan
  - que esa persona venga
  rationale: El griego usa una construcción singular genérica. En español, «que venga» conserva esa forma sin necesidad de pluralizar ni explicar demasiado, manteniendo la relación con el original.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: Se revisó el cierre del verso para conservar la metáfora de sed/bebida y la singularidad genérica del griego, en línea con el control de auditoría; no hubo cambios sustantivos respecto del pase más reciente del inglés POB.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton ni una cita directa con κύριος.
  - Se prefirió «fiesta» para ἑορτή por coherencia con el contexto joánico.
  - Se evitó «Cristo» porque aquí el texto nombra a Jesús como sujeto narrativo, no como título mesiánico.
  - La construcción «que venga» reproduce bien el imperativo singular genérico sin forzar un masculino léxico en español.
  - La puntuación del discurso directo sigue la práctica editorial española con comillas de apertura y cierre.
