translation:
  language: es
  text: 'Otros decían[a]: «Este es el Mesías». Pero algunos decían: «¿Acaso el Mesías viene de Galilea[b]?».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «el Cristo».
    reason: alternative_reading
  - marker: b
    text: 'La pregunta griega está formulada de manera que espera una respuesta negativa; también podría expresarse: «Seguramente el Mesías no viene de Galilea, ¿verdad?»'
    reason: rhetorical_force_clarification
lexical_decisions:
- source_word: ἄλλοι
  english_pob_choice: Others
  chosen_spanish: Otros
  alternatives_spanish:
  - Algunos otros
  lexicon: BDAG
  rationale: ἄλλοι introduce otro grupo dentro de la multitud; «Otros» conserva el contraste de forma natural en español y evita añadir matices no presentes en el griego.
- source_word: ἔλεγον
  english_pob_choice: were saying
  chosen_spanish: decían
  alternatives_spanish:
  - estaban diciendo
  - dijeron
  lexicon: BDAG
  rationale: El imperfecto expresa repetición o acción en curso. En español, «decían» comunica ese valor sin sobrecargar el estilo con una perífrasis más pesada.
- source_word: Οὗτός ἐστιν
  english_pob_choice: This is
  chosen_spanish: Este es
  alternatives_spanish:
  - Éste es
  - Este hombre es
  lexicon: BDAG
  rationale: La identificación demostrativa se expresa de manera natural con «Este es»; «Este hombre» añade contenido que el texto no exige.
- source_word: ὁ χριστός
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - el Cristo
  lexicon: BDAG
  rationale: Χριστός funciona aquí como título mesiánico en disputa. Siguiendo la preferencia terminológica del proyecto, «Mesías» preserva mejor el sentido hebraico del título que «Cristo» como forma litúrgica o nombre fijado.
- source_word: οἱ δὲ
  english_pob_choice: But some
  chosen_spanish: Pero algunos
  alternatives_spanish:
  - Pero otros
  - Y algunos
  lexicon: BDAG
  rationale: La combinación con δέ introduce un grupo contrastante. «Pero algunos» refleja bien el contraste y evita repetir «otros» de modo menos natural en español.
- source_word: Μὴ γὰρ ... ἔρχεται;
  english_pob_choice: Surely ... does ... ?
  chosen_spanish: ¿Acaso ... viene ...?, ¿verdad?
  alternatives_spanish:
  - ¿No es cierto que ... viene ...?
  - ¿Es que ... viene ...?
  lexicon: BDAG
  rationale: μή en una pregunta espera respuesta negativa y γάρ aporta fuerza inferencial o enfática. En español, una pregunta retórica con «¿Acaso ...?» capta esa incredulidad; el añadido final «¿verdad?» reproduce el tono de espera de respuesta negativa sin afirmar más de lo que el griego dice.
- source_word: ἐκ τῆς Γαλιλαίας
  english_pob_choice: from Galilee
  chosen_spanish: de Galilea
  alternatives_spanish:
  - desde Galilea
  - de la Galilea
  lexicon: BDAG
  rationale: ἐκ con origen/lugar se vierte naturalmente con «de» en español. «De Galilea» mantiene la simple relación de procedencia sin rigidizarla.
- source_word: ἔρχεται
  english_pob_choice: does come
  chosen_spanish: viene
  alternatives_spanish:
  - viene ahora
  - está viniendo
  lexicon: BDAG
  rationale: El presente general de expectativa se expresa con «viene» en español. En una pregunta retórica, el valor habitual de la forma verbal es suficiente sin necesidad de una perífrasis.
theological_decisions:
- issue: Χριστός como título mesiánico y su equivalente español
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - el Cristo
  rationale: En este contexto la multitud discute la identidad mesiánica de Jesús, por lo que Χριστός se entiende como título, no como nombre propio. «Mesías» conserva esa carga semítica y evita una lectura de nombre fijado que el original no exige.
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός default ''Messiah'' where title; Translation philosophy #2'
- issue: Fuerza de μή γάρ en la pregunta retórica
  english_pob_reading: Surely the Messiah does not come from Galilee, does he?
  chosen_spanish_reading: ¿Acaso el Mesías viene de Galilea?, ¿verdad?
  alternative_spanish_readings:
  - ¿El Mesías no viene de Galilea, verdad?
  - ¿Es que el Mesías viene de Galilea?
  rationale: El griego formula una pregunta que presupone respuesta negativa e incredulidad. En español, «¿Acaso ...?, ¿verdad?» conserva el tono retórico sin añadir una afirmación explícita que el texto no contiene.
  doctrine_reference: BDAG μή; análisis pragmático de preguntas retóricas en el NT
translation_notes:
  revision_awareness: La revisión inglesa más reciente desplazó la segunda intervención de «others» a «some» y simplificó la pregunta retórica; por eso el español usa «algunos» para el segundo grupo y una formulación breve de incredulidad («¿Acaso ...?, ¿verdad?») que conserva el mismo valor pragmático sin depender de un calco del inglés revisado.
  spanish_consistency_notes:
  - Se mantuvo «Mesías» como término principal conforme al criterio del proyecto para Χριστός como título.
  - Se evitó «SEÑOR» o sustituciones eclesiásticas ajenas al texto; la referencia geográfica quedó como «Galilea».
  - La puntuación reproduce dos enunciados contrastivos, como en el griego, con una pregunta retórica final que refleja la fuerza de μή γάρ.
