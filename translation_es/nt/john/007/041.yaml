  rationale: Se conserva la estructura básica correcta del borrador y la terminología «Mesías», pero se corrige la segunda oración para evitar una construcción española forzada y para representar mejor la fuerza retórica de μή γάρ. La expectativa de respuesta negativa se explica en nota, lo cual preserva el matiz del original sin producir una frase principal pesada o artificial en español.
