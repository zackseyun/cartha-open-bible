    issue: «de los judíos» para τῶν Ἰουδαίων
    rationale: Aunque es posible, aquí el griego funciona de manera adjetival y el audit trail inglés lo entendió así («Jewish»). En español «la fiesta judía» es más natural y evita una formulación innecesariamente rígida.
  - severity: low
    issue: «Ahora estaba cerca» suena poco idiomático
    rationale: «Ahora» como conector es posible, pero en esta estructura narrativa española resulta más natural «Y estaba cerca...» o «Estaba cerca...». Se busca un conector suave sin calco del inglés.
  - severity: low
    issue: Mayúscula en «Fiesta» dentro del nombre appositivo
    rationale: En español general corresponde «la Fiesta de los Tabernáculos» solo si se adopta como nombre formal completo; dentro de la oración, «la fiesta judía, la fiesta de los Tabernáculos» es más regular y legible.
  revised_spanish_text: Y estaba cerca la fiesta judía, la fiesta de los Tabernáculos.[a]
