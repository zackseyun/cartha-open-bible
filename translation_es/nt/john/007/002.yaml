lexical_decisions:
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y
  - Ahora
  lexicon: BDAG
  rationale: Funciona como conector discursivo suave de transición narrativa. «Ahora» conserva el valor de avance del relato sin forzar contraste.
- source_word: ἐγγὺς
  english_pob_choice: was near
  chosen_spanish: estaba cerca
  alternatives_spanish:
  - estaba próxima
  - estaba al llegar
  lexicon: BDAG
  rationale: Expresa proximidad temporal de manera natural en español y mantiene la misma idea temporal que la versión inglesa auditada.
- source_word: ἑορτὴ
  english_pob_choice: feast
  chosen_spanish: fiesta
  alternatives_spanish:
  - festividad
  - celebración
  lexicon: BDAG
  rationale: «Fiesta» es claro y idiomático en español; conserva el sentido de observancia religiosa festiva sin endurecer el registro.
- source_word: τῶν Ἰουδαίων
  english_pob_choice: Jewish
  chosen_spanish: de los judíos
  alternatives_spanish:
  - judía
  - de los judíos
  lexicon: BDAG
  rationale: En español, el genitivo se expresa naturalmente con «de los judíos», preservando el sentido adjetival de pertenencia/identificación de la fiesta.
- source_word: σκηνοπηγία
  english_pob_choice: the Feast of Tabernacles
