  - la Fiesta de los Booths
  lexicon: BDAG
  rationale: Se adopta el nombre convencional en español por claridad y reconocimiento eclesial, manteniendo la equivalencia con la forma más literal preservada en la nota.
theological_decisions:
- issue: Valor de τῶν Ἰουδαίων en una designación festiva
