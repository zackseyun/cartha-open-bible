  rationale: Aquí el sintagma identifica la fiesta como perteneciente al pueblo judío; no introduce una afirmación polémica. La traducción literal mantiene la referencia cultural e histórica del texto.
  doctrine_reference: Translation philosophy §1, §6
- issue: Nombre de σκηνοπηγία
  english_pob_reading: the Feast of Tabernacles
