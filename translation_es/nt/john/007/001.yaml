translation:
  language: es
  text: Y después de estas cosas, Jesús andaba en Galilea[a], porque no quería andar en Judea, ya que los judíos buscaban matarlo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los judeanos' o 'los líderes judíos'. En Juan, 'los judíos' a menudo se refiere más específicamente a la oposición judía de Judea o a sus autoridades en el contexto narrativo, no al pueblo judío en su conjunto.
    reason: lexical_alternative
lexical_decisions:
- source_word: μετὰ ταῦτα
  english_pob_choice: after these things
  chosen_spanish: después de estas cosas
  alternatives_spanish:
  - después
  - luego de estas cosas
  lexicon: BDAG
  rationale: Mantiene la transición temporal narrativa y conserva el plural demostrativo, de forma paralela al valor de la frase griega y al inglés auditado.
- source_word: περιεπάτει
  english_pob_choice: was walking
  chosen_spanish: andaba
  alternatives_spanish:
  - estaba andando
  - iba y venía
  lexicon: BDAG
  rationale: El imperfecto pide una acción continua o habitual. 'Andaba' suena natural en español y conserva la idea de desplazarse o moverse en un ámbito regional, sin perder el vínculo verbal con περιπατεῖν.
- source_word: ἐν τῇ Γαλιλαίᾳ
  english_pob_choice: in Galilee
  chosen_spanish: en Galilea
  alternatives_spanish:
  - por Galilea
  - a través de Galilea
  lexicon: BDAG
  rationale: Es una locución locativa directa y natural en español; no añade un alcance distributivo que el griego no exige.
- source_word: οὐ γὰρ ἤθελεν
  english_pob_choice: for he did not want
  chosen_spanish: porque no quería
  alternatives_spanish:
  - pues no estaba dispuesto
  - porque no deseaba
  lexicon: BDAG
  rationale: '''Quería'' reproduce bien θέλω en un español claro y moderno. ''Porque'' expresa la relación causal de γάρ de manera fluida.'
- source_word: ἐν τῇ Ἰουδαίᾳ περιπατεῖν
  english_pob_choice: to walk in Judea
  chosen_spanish: andar en Judea
  alternatives_spanish:
  - ir por Judea
  - caminar en Judea
  lexicon: BDAG
  rationale: '''Andar'' permite conservar la repetición verbal con ''andaba'' y resulta más idiomático en español que repetir ''caminar'' en ambos miembros. No se traslada a ''viajar'' porque el texto conserva un matiz de moverse o desenvolverse en la región.'
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: pues
  alternatives_spanish:
  - porque
  - ya que
  lexicon: BDAG
  rationale: '''Pues'' mantiene la causalidad y permite una cadencia más natural en español en la segunda explicación del versículo.'
- source_word: ἐζήτουν
  english_pob_choice: were seeking
  chosen_spanish: buscaban
  alternatives_spanish:
  - andaban buscando
  - procuraban
  lexicon: BDAG
  rationale: El imperfecto comunica acción continuada. 'Buscaban' es la opción más natural en español y conserva la intención hostil sin sobretraducir el verbo.
- source_word: οἱ Ἰουδαῖοι
  english_pob_choice: the Jews
  chosen_spanish: los judíos
  alternatives_spanish:
  - los judeanos
  - los líderes judíos
  lexicon: BDAG
  rationale: Se conserva la forma literal del griego tal como hace el texto inglés auditado, para no borrar la tensión léxica y narrativa del Evangelio. El matiz contextual se explica en nota en lugar de sustituir la designación del texto.
- source_word: ἀποκτεῖναι
  english_pob_choice: to kill him
  chosen_spanish: matarlo
  alternatives_spanish:
  - darle muerte
  - quitarle la vida
  lexicon: BDAG
  rationale: Verbo directo y fiel al infinitivo de propósito; 'matarlo' es claro y natural en español, sin atenuar la intención violenta del contexto.
theological_decisions:
- issue: Referencia narrativa de 'los judíos' en Juan
  english_pob_reading: Retain the literal rendering 'the Jews' in the main text, with a clarifying footnote that in this context John refers to the Judean Jewish opposition, especially authorities, not to all Jewish people without distinction.
  chosen_spanish_reading: Mantener 'los judíos' en el texto principal, con una nota que aclare que en este contexto Juan suele referirse a la oposición judía de Judea, especialmente a sus autoridades, no al pueblo judío en general.
  alternative_spanish_readings:
  - los judeanos
  - los líderes judíos
  rationale: Esta solución preserva el enunciado fuente y evita reemplazar la designación narrativa por una paráfrasis interpretativa. La aclaración va en nota para sostener tanto la transparencia léxica como la prudencia pastoral.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios; se mantiene la alineación alta con el texto fuente y con el audit trail inglés.
  spanish_consistency_notes:
  - Se conserva la repetición de la raíz verbal con 'andaba' / 'andar' para reflejar περιπατέω.
  - Se mantiene la designación literal 'los judíos' en el texto principal y se desplaza la aclaración contextual a una nota, conforme al audit trail.
  - El registro es formal y publicable, con sintaxis moderna y puntuación española estándar.
