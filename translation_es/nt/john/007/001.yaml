    issue: 'Encadenamiento causal poco natural: ''porque... pues...'''
    rationale: El griego tiene γάρ y luego ὅτι, ambos causales, pero en español esta combinación seguida suena pesada. Cambiar la segunda a 'ya que' conserva el sentido y mejora la legibilidad.
  - severity: low
    issue: 'Apertura algo calcada: ''Y después de estas cosas'''
    rationale: Es fiel a μετὰ ταῦτα, pero algo rígida en español. No es necesario forzar cambio si se prioriza transparencia formal, así que no lo marco como reparación obligatoria.
