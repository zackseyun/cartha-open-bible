translation:
  language: es
  text: Me buscarán y no me hallarán[a], y donde yo estoy, ustedes no pueden venir[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O posiblemente: «Me buscarán».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «ustedes no pueden ir».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ζητήσετέ
  english_pob_choice: you will seek
  chosen_spanish: me buscarán
  alternatives_spanish:
  - me buscarán
  - me buscarán con empeño
  lexicon: BDAG
  rationale: El futuro plural expresa una acción futura dirigida a encontrar a Jesús. «Buscar» conserva la correspondencia léxica con ζητέω mejor que una perífrasis más explicativa, y suena natural en español sin perder la fuerza del verbo.
- source_word: με
  english_pob_choice: me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  lexicon: pronombre personal
  rationale: Objeto directo referente a Jesús; el español mantiene el pronombre átono sin necesidad de reforzarlo con «a mí».
- source_word: οὐχ εὑρήσετε
  english_pob_choice: will not find
  chosen_spanish: no me hallarán
  alternatives_spanish:
  - no me encontrarán
  lexicon: BDAG
  rationale: «Hallar» conserva bien el valor de εὑρίσκω y es una opción natural y digna en español bíblico. «Encontrar» también es válido, pero «hallar» mantiene mejor la cadencia literaria de la frase.
- source_word: ὅπου
  english_pob_choice: where
  chosen_spanish: donde
  alternatives_spanish:
  - dondequiera que
  lexicon: BDAG
  rationale: La cláusula de lugar se expresa de forma directa con «donde», sin añadir generalización que el griego no contiene.
- source_word: εἰμὶ ἐγώ
  english_pob_choice: I am
  chosen_spanish: yo estoy
  alternatives_spanish:
  - estoy yo
  - yo soy
  lexicon: BDAG
  rationale: El griego presenta una autoconsciencia enfática («yo»). En español, «donde yo estoy» preserva la localización y el énfasis sin introducir una cópula abstracta que podría sonar menos natural. Se evita «yo soy» porque aquí el griego habla de ubicación, no de identificación nominal.
- source_word: ὑμεῖς
  english_pob_choice: you
  chosen_spanish: ustedes
  alternatives_spanish:
  - vosotros
  - ustedes mismos
  lexicon: pronombre personal
  rationale: Se conserva el plural explícito. «Ustedes» es la forma neutral y ampliamente comprensible en español latinoamericano, y mantiene el contraste con el «yo» enfático.
- source_word: οὐ δύνασθε ἐλθεῖν
  english_pob_choice: you are not able to come
  chosen_spanish: no pueden ir
  alternatives_spanish:
  - no pueden venir
  - no están en capacidad de ir
  lexicon: BDAG
  rationale: «δύνασθε» expresa incapacidad, no simple prohibición. En español, «no pueden ir» comunica esa imposibilidad de manera natural. «Venir» podría sonar más idiomático en algunos contextos, pero el griego usa un verbo de movimiento sin marcador deíctico; «ir» conserva esa neutralidad.
theological_decisions:
- issue: La frase final expresa incapacidad, no una prohibición explícita
  english_pob_reading: you are not able to come
  chosen_spanish_reading: ustedes no pueden ir
  alternative_spanish_readings:
  - ustedes no pueden venir
  - ustedes no deben ir
  rationale: El verbo δύναμαι señala posibilidad/capacidad. La traducción evita convertirlo en mandato negativo («no deben») y también evita especificar la causa de la imposibilidad. Así se preserva la tensión interpretativa del pasaje.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: La redacción sigue el ajuste posterior del audit trail que prefería «seek» frente a «look for», por lo que se eligió «buscar» en español. También se preserva la distinción entre búsqueda infructuosa y la imposibilidad de llegar al lugar donde Jesús está, sin añadir explicación causal.
  spanish_consistency_notes:
  - Se mantiene «Jesús» implícito mediante el pronombre de primera persona, coherente con el contexto narrativo.
  - Se evita «Cristo» porque el versículo no contiene Χριστός ni un título mesiánico explícito.
  - Se usa un plural de segunda persona uniforme («ustedes») para reflejar ὑμεῖς y hacer visible el contraste con ἐγώ.
