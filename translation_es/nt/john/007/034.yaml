review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura básica del griego: futuro de búsqueda, negación de hallar, y una cláusula final de incapacidad. Sin embargo, en la última cláusula el cambio de «come» a «ir» no sigue bien el rastro auditado del POB ni la alternativa preservada en inglés. Aunque ἐλθεῖν puede ser genéricamente ‘venir/ir’ según contexto, aquí la línea inglesa y la nota alternativa ya fijan ‘come’, y en español «venir» encaja mejor con «donde yo estoy».'
  spanish_quality_summary: El español es claro y digno, pero «hallarán» suena algo más literario que el registro moderno preferido del proyecto; no es incorrecto. El problema principal de naturalidad y cohesión es «donde yo estoy ... no pueden ir», que en español suena menos idiomático que «no pueden venir» al referirse al lugar donde está el hablante. La nota [a] también queda débil, porque la alternativa repite prácticamente la misma idea sin reflejar una diferencia real útil en español.
  glossary_alignment: No hay conflictos con terminología doctrinal principal. La decisión sobre δύνασθε como incapacidad está bien preservada con «no pueden». La excepción necesaria es cambiar «ir» por «venir» para alinearse con el POB auditado y con la deíxis natural del español en este contexto.
  issues:
  - severity: medium
    issue: «no pueden ir» en vez de «no pueden venir»
    rationale: Aunque el griego no lleva marcador deíctico explícito, el POB inglés traduce «come» y hasta preserva como alternativa idiomática «you cannot come». En español, con «donde yo estoy», «venir» reproduce mejor el movimiento hacia el lugar del hablante y suena más natural.
  - severity: low
    issue: La nota [a] no aporta una alternativa española significativa
    rationale: '«Me buscarán y no me hallarán» con nota «O: “me buscarán”» no preserva de forma útil la alternativa inglesa, que refleja una posible segmentación/lectura más breve. Conviene reformular la nota para que indique la opción breve de manera inteligible en español.'
  revised_spanish_text: Me buscarán y no me hallarán[a], y donde yo estoy, ustedes no pueden venir[b].
  revised_footnotes:
