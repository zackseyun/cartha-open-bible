revisions:
- from: Me buscarán y no me hallarán[a], y donde yo estoy[b], ustedes no pueden ir.
  to: Me buscarán y no me hallarán[a], y donde yo estoy, ustedes no pueden venir[b].
  rationale: Se mantiene la mayor parte del borrador porque representa bien el sentido del texto griego. Se ajusta la última cláusula a «venir» para seguir el audit trail inglés y la deíxis natural del español con «donde yo estoy». Se conserva «hallarán» como opción válida y digna. Se mejora la nota [a] para que realmente exprese la alternativa textual/traductológica documentada en el POB inglés.
