translation:
  language: es
  text: 'Los oficiales respondieron[a]: «Nunca ha hablado así un hombre».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Nunca ha hablado así nadie». El griego usa la forma masculina singular ἄνθρωπος, con fuerza representativa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθησαν
  english_pob_choice: answered
  chosen_spanish: respondieron
  alternatives_spanish:
  - contestaron
  - respondieron
  lexicon: BDAG
  rationale: El aoristo de ἀποκρίνομαι expresa aquí una respuesta en diálogo. «Respondieron» es natural en español y conserva el valor narrativo sin añadir matices ajenos.
- source_word: οἱ ὑπηρέται
  english_pob_choice: the officers
  chosen_spanish: los oficiales
  alternatives_spanish:
  - los guardias
  - los servidores
  - los alguaciles
  lexicon: BDAG
  rationale: En Juan 7 el grupo es enviado por los principales sacerdotes y fariseos para arrestar a Jesús, por lo que «oficiales» comunica mejor su función que un genérico como «servidores». Se evita «guardias» porque no está explícito en el texto fuente.
- source_word: Οὐδέποτε
  english_pob_choice: Never
  chosen_spanish: Nunca
  alternatives_spanish:
  - Jamás
  - Nunca antes
  lexicon: BDAG
  rationale: La negación absoluta temporal se expresa de forma directa con «Nunca».
- source_word: ἐλάλησεν
  english_pob_choice: has spoken
  chosen_spanish: ha hablado
  alternatives_spanish:
  - habló
  lexicon: BDAG
  rationale: Aunque el griego usa aoristo, en español después de «nunca» el perfecto compuesto («ha hablado») comunica de manera natural una experiencia hasta el presente, como en la lectura inglesa auditable.
- source_word: οὕτως
  english_pob_choice: like this
  chosen_spanish: así
  alternatives_spanish:
  - de esta manera
  - tan
  lexicon: BDAG
  rationale: El adverbio de modo se rinde con «así», que es breve, idiomático y fiel a la comparación de manera.
- source_word: ἄνθρωπος
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  - un ser humano
  lexicon: BDAG
  rationale: Se conserva la forma masculina singular del griego, que el POB inglés trató como fuerza representativa. «Un hombre» mantiene esa correspondencia sin neutralizar el referente.
theological_decisions:
- issue: Fuerza representativa de ἄνθρωπος
  english_pob_reading: a man
  chosen_spanish_reading: un hombre
  alternative_spanish_readings:
  - una persona
  - alguien
  - un ser humano
  rationale: El griego usa ἄνθρωπος en singular masculino con fuerza representativa. Se preserva esa forma en español para no borrar la huella textual ni convertirla en una abstracción neutral que el original no exige.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: El texto inglés auditado está en alta concordancia y no presenta revisiones aplicadas; la versión española sigue esa lectura estable, manteniendo el paralelismo de sentido sin introducir ajustes textuales.
  spanish_consistency_notes:
  - Se usa «oficiales» para ὑπηρέται en coherencia con el contexto joánico de enviados para arrestar a Jesús.
  - Se mantiene el masculino singular «un hombre» para reflejar la forma griega y su fuerza representativa.
  - «Ha hablado» reproduce en español el valor idiomático del perfecto compuesto que el audit trail inglés adoptó para ἐλάλησεν.
