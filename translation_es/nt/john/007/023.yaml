translation:
  language: es
  text: Si un hombre recibe la circuncisión el sábado[a], para que la ley de Moisés no sea quebrantada[b], ¿se enojan conmigo porque el sábado dejé completamente sano a un hombre[c]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “es circuncidado” para “recibe la circuncisión”. El griego dice literalmente “recibe circuncisión”.
    reason: lexical_alternative
  - marker: b
    text: O “no sea anulada” o “no sea puesta de lado” para “no sea quebrantada”.
    reason: lexical_alternative
  - marker: c
    text: La frase “dejé completamente sano a un hombre” destaca el contraste entre circuncidar una sola parte del cuerpo y restaurar completamente al hombre.
    reason: cross_reference
lexical_decisions:
- source_word: περιτομὴν λαμβάνει
  english_pob_choice: receives circumcision
  chosen_spanish: recibe la circuncisión
  alternatives_spanish:
  - es circuncidado
  - se somete a la circuncisión
  lexicon: BDAG
  rationale: El griego expresa un giro idiomático equivalente a “recibir circuncisión”. En español, “recibe la circuncisión” conserva la pasiva implícita y el valor idiomático sin perder la forma verbal del original. “Es circuncidado” es posible, pero reduce la huella idiomática del texto.
- source_word: ἄνθρωπος
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: BDAG
  rationale: El sustantivo es masculino singular y aquí la referencia es específicamente masculina, porque la circuncisión está en juego. “Un hombre” refleja mejor el referente que una opción genérica.
- source_word: ἐν σαββάτῳ
  english_pob_choice: on the Sabbath
  chosen_spanish: en sábado
  alternatives_spanish:
  - el sábado
  - durante el sábado
  lexicon: BDAG
  rationale: La expresión temporal se vierte de modo natural en español como “en sábado”. Mantiene el sentido institucional de la observancia sabática sin forzar una perífrasis más pesada.
- source_word: ἵνα μὴ λυθῇ ὁ νόμος Μωϋσέως
  english_pob_choice: so that the law of Moses may not be broken
  chosen_spanish: para que la ley de Moisés no sea quebrantada
  alternatives_spanish:
  - para que la ley de Moisés no sea anulada
  - para que la ley de Moisés no sea puesta de lado
  lexicon: BDAG
  rationale: λύω en este contexto legal puede significar “quebrantar”, “anular” o “dejar sin efecto”. “No sea quebrantada” conserva la imagen de violación de la ley y suena idiomática en español bíblico moderno. Se mantiene la tensión entre cumplimiento legal y argumento retórico sin resolverla prematuramente.
- source_word: χολᾶτε
  english_pob_choice: are you angry with me
  chosen_spanish: ¿se enojan conmigo?
  alternatives_spanish:
  - ¿están enojados conmigo?
  - ¿se irritan conmigo?
  lexicon: BDAG
  rationale: El verbo denota enojo o indignación. En español, la pregunta plural “¿se enojan conmigo?” conserva el matiz retórico y la fuerza directa del reproche de Jesús. Se evita intensificar sin necesidad.
- source_word: ὅλον ἄνθρωπον
  english_pob_choice: a whole man
  chosen_spanish: a un hombre entero
  alternatives_spanish:
  - a un hombre completo
  - a un hombre todo entero
  lexicon: BDAG
  rationale: La frase subraya el contraste entre tratar una sola parte del cuerpo y restaurar al hombre entero. “Un hombre entero” preserva ese contraste en español. El orden “a un hombre entero” también mantiene la cercanía al griego y a la formulación inglesa auditada.
- source_word: ὑγιῆ ἐποίησα
  english_pob_choice: I made ... well
  chosen_spanish: hice sano
  alternatives_spanish:
  - sané
  - hice que estuviera sano
  - lo restauré
  lexicon: BDAG
  rationale: La construcción significa literalmente “hice sano/ saludable”. “Hice sano” conserva el verbo causativo del griego y el paralelismo con la idea de integridad corporal. “Sané” sería más fluido, pero perdería la forma explícita de la acción de hacer.
theological_decisions:
- issue: Relación entre la circuncisión sabática y la sanidad sabática
  english_pob_reading: Jesus argues from accepted Sabbath circumcision to the greater legitimacy of restoring an entire man to wholeness on the Sabbath.
  chosen_spanish_reading: Jesús razona desde la práctica admitida de la circuncisión en sábado hacia la mayor legitimidad de sanar a un hombre entero en sábado.
  alternative_spanish_readings:
  - Jesús contrapone la ley ritual y la compasión de manera general.
  - Jesús critica la ley del sábado como tal.
  rationale: 'La estructura del versículo presenta un argumento a fortiori: si se permite la circuncisión para que la ley de Moisés no sea quebrantada, con mayor razón puede hacerse sano a un hombre entero en sábado. La traducción conserva esa lógica sin introducir una polémica ajena contra la ley.'
  doctrine_reference: Preservar la tensión teológica del texto y la prioridad del dato original sobre una armonización interpretativa.
translation_notes:
  revision_awareness: El paquete de auditoría en inglés muestra alta concordancia y no registra revisiones aplicadas; se conserva la solución óptima ya validada, con ajustes naturales de español para fluidez y precisión semántica.
  spanish_consistency_notes:
  - Se usa “circuncisión” y no una paráfrasis litúrgica.
  - Se mantiene “ley de Moisés” de forma explícita.
  - Se conserva el contraste retórico entre una parte del cuerpo y el hombre entero.
  - Se usa un tiempo verbal y una sintaxis naturales en español sin borrar la forma causativa de ὑγιῆ ἐποίησα.
