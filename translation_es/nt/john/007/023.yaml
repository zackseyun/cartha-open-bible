base_translation:
  language: en
  yaml_path: translation/nt/john/007/023.yaml
  text: If a man receives circumcision on the Sabbath so that the law of Moses may not be broken[c][b][a], are you angry with me because I made a whole man well on the Sabbath?
  footnotes:
