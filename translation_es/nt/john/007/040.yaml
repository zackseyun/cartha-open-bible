translation:
  language: es
  text: 'Entonces, algunos de entre la multitud, cuando oyeron estas palabras, decían: «Este verdaderamente es el Profeta[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «el Profeta» probablemente alude al profeta esperado semejante a Moisés (véase Deuteronomio 18:15), aunque algunos intérpretes lo entienden de manera más general como «el profeta».
    reason: cross_reference
lexical_decisions:
- source_word: Ἐκ τοῦ ὄχλου
  english_pob_choice: some from the crowd
  chosen_spanish: algunos de entre la multitud
  alternatives_spanish:
  - algunos de la multitud
  - unos cuantos de la multitud
  - algunos de entre la gente
  lexicon: BDAG
  rationale: El genitivo partitivo indica un subgrupo dentro de la multitud, no toda la multitud. «Algunos de entre la multitud» conserva esa restricción y suena natural en español.
- source_word: οὖν
  english_pob_choice: Therefore
  chosen_spanish: Por lo tanto
  alternatives_spanish:
  - Entonces
  - Así que
  - Por eso
  lexicon: BDAG
  rationale: La partícula marca consecuencia o desarrollo respecto del contexto previo. «Por lo tanto» mantiene ese valor inferencial con registro digno en español.
- source_word: ἀκούσαντες
  english_pob_choice: when they heard
  chosen_spanish: cuando oyeron
  alternatives_spanish:
  - habiendo oído
  - después de oír
  - al oír
  lexicon: BDAG
  rationale: El participio aoristo expresa una acción anterior a la del verbo principal. «Cuando oyeron» transmite con claridad esa relación temporal sin forzar una construcción pesada.
- source_word: τῶν λόγων τούτων
  english_pob_choice: these words
  chosen_spanish: estas palabras
  alternatives_spanish:
  - estos dichos
  - estas declaraciones
  - estas expresiones
  lexicon: BDAG
  rationale: λόγοι se refiere aquí a lo dicho inmediatamente antes por Jesús. «Palabras» es la equivalencia más directa y natural en este contexto.
- source_word: ἔλεγον
  english_pob_choice: were saying
  chosen_spanish: decían
  alternatives_spanish:
  - seguían diciendo
  - andaban diciendo
  - estaban diciendo
  lexicon: BDAG
  rationale: El imperfecto puede indicar repetición o continuidad en la respuesta del grupo. En español, «decían» conserva bien ese aspecto sin sonar forzado.
- source_word: Οὗτός ἐστιν
  english_pob_choice: This is
  chosen_spanish: Este verdaderamente es
  alternatives_spanish:
  - Este es
  - Este sí es
  - Éste verdaderamente es
  lexicon: BDAG
  rationale: El demostrativo apunta de forma inmediata a Jesús. Se mantiene «Este» con valor enfático y se conserva la intensificación del adverbio en la frase completa.
- source_word: ἀληθῶς
  english_pob_choice: truly
  chosen_spanish: verdaderamente
  alternatives_spanish:
  - realmente
  - ciertamente
  - de verdad
  lexicon: BDAG
  rationale: ἀληθῶς intensifica la afirmación como genuina o auténtica. «Verdaderamente» sostiene mejor el tono solemne que una opción más coloquial.
- source_word: ὁ προφήτης
  english_pob_choice: the Prophet
  chosen_spanish: el Profeta
  alternatives_spanish:
  - el profeta
  lexicon: BDAG
  rationale: En contexto joánico, la expresión probablemente alude al profeta esperado semejante a Moisés. En español, la mayúscula ayuda a señalar el valor titular que la POB documenta en inglés, sin resolver la referencia de manera más explícita que el texto.
theological_decisions:
- issue: Identidad de «el Profeta»
  english_pob_reading: Render as a title-like expression, 'the Prophet,' without collapsing it into an explicit identification with the Messiah in the main text.
  chosen_spanish_reading: Mantener «el Profeta» como expresión titulada, sin convertirla en una identificación explícita con el Mesías en el texto principal.
  alternative_spanish_readings:
  - el profeta como figura profética general
  - el Profeta como equivalente del Mesías
  rationale: El versículo refleja una expectativa judía y puede aludir a Deuteronomio 18:15, pero no define más el título. Preservar la mayúscula conserva la tensión interpretativa sin imponer una conclusión doctrinal no explicitada por el verso.
  doctrine_reference: 'Translation philosophy §3: Preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: 'El pasaje coincide sustancialmente con la auditoría inglesa más reciente: no se registran revisiones aplicadas y el estado de concordancia fue alto. La decisión principal en español fue mantener la fuerza partitiva de Ἐκ τοῦ ὄχλου y la referencia titular de ὁ προφήτης sin añadir interpretación ajena al texto.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en este proyecto cuando el texto lo exige; aquí no aparece el Tetragrámaton ni una cita directa del nombre divino.
  - Se conserva «Profeta» con mayúscula para reflejar el valor titular documentado en la POB inglesa.
  - No se introduce «Mesías» en el texto principal porque el verso no lo dice explícitamente y la POB inglesa preserva esa tensión.
  - «Multitud» traduce ὄχλος de forma natural y mantiene el sentido de grupo numeroso sin alterar el matiz partitivo de la frase.
