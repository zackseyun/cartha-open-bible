translation:
  language: es
  text: 'Y había mucho murmullo acerca de él entre las multitudes[a]. Unos decían: «Es bueno». Otros decían: «No, al contrario[b], engaña a la multitud».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «murmuración» o «murmullos» acerca de él.
    reason: lexical_alternative
  - marker: b
    text: O «No, más bien»; o «desvía a la multitud» o «la lleva por mal camino».
    reason: lexical_alternative
lexical_decisions:
- source_word: γογγυσμός
  english_pob_choice: murmuring
  chosen_spanish: murmullo
  alternatives_spanish:
  - murmuración
  - murmullos
  - quejas
  lexicon: BDAG
  rationale: El sustantivo expresa habla baja, comentada y no pública. «Murmullo» conserva ese matiz en español sin convertirlo en una queja abierta ni en una discusión formal.
- source_word: περὶ αὐτοῦ
  english_pob_choice: about him
  chosen_spanish: acerca de él
  alternatives_spanish:
  - sobre él
  - concerniente a él
  lexicon: BDAG
  rationale: Es la forma natural y directa en español para la referencia del asunto del que se habla, sin añadir interpretación.
- source_word: πολὺς
  english_pob_choice: much
  chosen_spanish: mucho
  alternatives_spanish:
  - considerable
  - abundante
  lexicon: BDAG
  rationale: Funciona de modo predicativo con el sustantivo y mantiene la intensidad sin sobrerrepresentarla.
- source_word: ἐν τοῖς ὄχλοις
  english_pob_choice: among the crowds
  chosen_spanish: entre las multitudes
  alternatives_spanish:
  - entre las turbas
  - entre la gente
  - en las multitudes
  lexicon: BDAG
  rationale: «Multitudes» conserva el plural y el carácter disperso del griego. «Entre» refleja bien la distribución del murmullo dentro del grupo.
- source_word: οἱ μὲν ... ἄλλοι δὲ
  english_pob_choice: Some ... Others ...
  chosen_spanish: Unos ... Otros ...
  alternatives_spanish:
  - Algunos ... otros ...
  - Unos decían ... otros decían ...
  lexicon: BDAG
  rationale: La correlación contrastiva se expresa de modo natural y claro en español con «Unos ... Otros ...».
- source_word: Ἀγαθός
  english_pob_choice: He is good
  chosen_spanish: Es bueno
  alternatives_spanish:
  - Es bueno/Es bueno él
  - Es bueno en sí
  - Es una buena persona
  lexicon: BDAG
  rationale: El griego usa un predicado adjetival simple. «Es bueno» preserva la brevedad y evita añadir «hombre» o «persona», que no están en el texto.
- source_word: Οὔ, ἀλλὰ
  english_pob_choice: No, on the contrary
  chosen_spanish: No, al contrario
  alternatives_spanish:
  - No, sino que
  - No, más bien
  - No, por el contrario
  lexicon: BDAG
  rationale: La secuencia introduce una réplica enfática y correctiva. «Al contrario» comunica bien el giro polémico sin perder naturalidad.
- source_word: πλανᾷ
  english_pob_choice: is misleading
  chosen_spanish: está engañando
  alternatives_spanish:
  - engaña
  - está extraviando
  - está desviando
  lexicon: BDAG
  rationale: El verbo puede significar engañar o extraviar. «Está engañando» deja abierta la tensión entre engaño intencional y desvío del camino, a la vez que suena natural en español.
- source_word: τὸν ὄχλον
  english_pob_choice: the crowd
  chosen_spanish: a la multitud
  alternatives_spanish:
  - a la gente
  - a la muchedumbre
  - al pueblo
  lexicon: BDAG
  rationale: El singular colectivo se puede verter naturalmente como objeto directo de la acción. «Multitud» mantiene la conexión con «multitudes» y conserva el sentido colectivo.
theological_decisions:
- issue: Opiniones contrapuestas sobre Jesús
  english_pob_reading: Rendered the divided public opinion without softening either positive or negative assessment.
  chosen_spanish_reading: Se tradujo la opinión dividida sin suavizar ni la afirmación positiva ni la negativa.
  alternative_spanish_readings:
  - Se aclaró una sola lectura favorable de Jesús
  - Se armonizó la acusación para hacerla menos fuerte
  rationale: El verso presenta juicios humanos en conflicto. La traducción mantiene ambas voces como tales, sin resolver la tensión narrativa ni doctrinal.
  doctrine_reference: Preservar la tensión teológica del testimonio humano sobre Jesús
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que ajustó Ἀγαθός ἐστιν de «He is a good man» a «He is good», por lo que el español evita añadir «hombre» o «persona» y conserva el predicado simple. También se respetó la tensión entre πλανᾷ como «is misleading» y las alternativas más fuertes «deceives» / «leads astray», reflejándolas en nota.
  spanish_consistency_notes:
  - Se usó «Y» inicial para corresponder al arranque narrativo del verso.
  - «Multitudes» y «multitud» se mantuvieron en relación léxica interna para reflejar el plural griego y el singular colectivo.
  - No se empleó «Cristo» ni terminología eclesiástica ajena al pasaje.
  - Las comillas angulares se usaron para el discurso directo conforme al estilo español.
  - El tono es moderno y digno, sin calco mecánico del inglés.
