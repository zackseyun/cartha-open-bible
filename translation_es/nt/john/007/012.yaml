- from: 'Y hubo mucho murmullo acerca de él entre las multitudes[a]. Unos decían: «Es bueno». Otros decían: «No, al contrario[b], está engañando a la multitud».'
  to: 'Y había mucho murmullo acerca de él entre las multitudes[a]. Unos decían: «Es bueno». Otros decían: «No, al contrario[b], engaña a la multitud».'
  rationale: Se cambió «Y hubo» por «Y había» para reflejar de manera más natural el imperfecto ἦν en contexto narrativo, y «está engañando» por «engaña» para representar mejor πλανᾷ como acusación general presente. Se ajustó la nota b para conservar las alternativas léxicas del griego con español más claro y natural.
