translation:
  language: es
  text: 'Entonces Jesús gritó en el templo, enseñando y diciendo: «A mí me conocen, y conocen de dónde soy[a]. Y no he venido por mí mismo[b], sino que el que me envió es verdadero[c], a quien ustedes no conocen».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «A mí me conocen, y conocen de dónde vengo». El enunciado puede oírse como irónico o desafiante en contexto, pero el griego es formalmente declarativo.'
    reason: alternative_reading
  - marker: b
    text: «Por mí mismo» también puede entenderse como «por mi propia iniciativa», indicando que Jesús no vino actuando por cuenta propia.
    reason: lexical_alternative
  - marker: c
    text: «Verdadero» también puede llevar el sentido de «genuino» o «real» en el uso de Juan.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔκραξεν
  english_pob_choice: cried out
  chosen_spanish: gritó
  alternatives_spanish:
  - clamó
  - exclamó en voz alta
  lexicon: BDAG
  rationale: En español, «gritó» comunica una alzada pública de la voz adecuada al contexto del templo. Mantiene la fuerza de ἔκραξεν sin añadir connotaciones de angustia.
- source_word: ἐν τῷ ἱερῷ
  english_pob_choice: in the temple
  chosen_spanish: en el templo
  alternatives_spanish:
  - en el recinto del templo
  - en los atrios del templo
  lexicon: BDAG
  rationale: ἱερόν designa el complejo del templo, no solo el santuario interior. «En el templo» es natural y fiel; el matiz amplio queda implícito sin sobreexplicar.
- source_word: διδάσκων ... καὶ λέγων
  english_pob_choice: teaching and saying
  chosen_spanish: enseñando y diciendo
  alternatives_spanish:
  - mientras enseñaba y decía
  - enseñando, y dijo
  lexicon: BDAG
  rationale: Se conservan ambos participios en español para reflejar la acción continua y el marco público del discurso de Jesús.
- source_word: Κἀμὲ
  english_pob_choice: You know me
  chosen_spanish: A mí me conocen
  alternatives_spanish:
  - También a mí me conocen
  - A mí, me conocen
  lexicon: BDAG
  rationale: El crasis aporta énfasis sobre «mí». En español, la anteposición «A mí» preserva ese relieve sin sonar forzada. Se mantiene el valor declarativo, como en el POB inglés.
- source_word: οἴδατε ... οἴδατε
  english_pob_choice: you know ... you know
  chosen_spanish: me conocen ... conocen
  alternatives_spanish:
  - saben ... saben
  - conocen ... conocen
  lexicon: BDAG
  rationale: La repetición se conserva para mantener la fuerza retórica e irónica del dicho. Se eligió «conocen» porque en este contexto personal expresa mejor la relación que «saben».
- source_word: πόθεν εἰμί
  english_pob_choice: where I am from
  chosen_spanish: de dónde soy
  alternatives_spanish:
  - de dónde vengo
  - de dónde procedo
  lexicon: BDAG
  rationale: «De dónde soy» es una forma natural de español para origen o procedencia. Mantiene abierta la amplitud semántica del griego, sin limitarse solo a geografía o a una interpretación más explícita.
- source_word: ἀπ’ ἐμαυτοῦ
  english_pob_choice: from myself
  chosen_spanish: por mí mismo
  alternatives_spanish:
  - de mí mismo
  - por mi propia iniciativa
  lexicon: BDAG
  rationale: Aunque el griego dice literalmente «de mí mismo», en español la fórmula idiomática más clara para independencia de iniciativa es «por mí mismo». Conserva el matiz de no actuar por cuenta propia.
- source_word: οὐκ ἐλήλυθα
  english_pob_choice: I have not come
  chosen_spanish: no he venido
  alternatives_spanish:
  - no he llegado
  - no he acudido
  lexicon: BDAG
  rationale: El perfecto griego se refleja con el presente perfecto español. «He venido»/«he venido por mí mismo» expresa bien la misión en curso en clave joánica.
- source_word: ἀληθινὸς
  english_pob_choice: 'true'
  chosen_spanish: verdadero
  alternatives_spanish:
  - genuino
  - real
  lexicon: BDAG
  rationale: «Verdadero» mantiene la fuerza tradicional y semántica de ἀληθινός en Juan, que puede abarcar verdad, autenticidad y realidad plena. Se conserva la tensión lexical sin resolverla en una sola glosa.
- source_word: ὁ πέμψας με
  english_pob_choice: the one who sent me
  chosen_spanish: el que me envió
  alternatives_spanish:
  - aquel que me envió
  - el que me ha enviado
  lexicon: BDAG
  rationale: Se preserva la agentividad sin añadir el título «Padre», que no aparece en el griego de esta cláusula. «El que me envió» es natural y fiel.
- source_word: ὃν ὑμεῖς οὐκ οἴδατε
  english_pob_choice: whom you do not know
  chosen_spanish: a quien ustedes no conocen
  alternatives_spanish:
  - a quien no conocen
  - a quien ustedes no han conocido
  lexicon: BDAG
  rationale: Se conserva el objeto personal directo de «conocer» y el contraste acusatorio del texto. Se usa «ustedes» para un español de registro bíblico claro y amplio.
theological_decisions:
- issue: Si la afirmación «Κἀμὲ οἴδατε καὶ οἴδατε πόθεν εἰμί» debe sonar irónica o simplemente declarativa
  english_pob_reading: Rendered straightforwardly in the main text without added markers of irony
  chosen_spanish_reading: Se mantiene de forma declarativa en el texto principal, sin convertirla en pregunta ni añadir marcas explícitas de ironía
  alternative_spanish_readings:
  - «¿Me conocen y saben de dónde soy?»
  - «Me conocen, aunque dicen conocer mi origen»
  rationale: El griego es formalmente declarativo. La traducción no resuelve la tensión interpretativa; deja que el contexto del pasaje determine el tono, como hace el POB inglés.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Qué tan explícita debe ser la procedencia de Jesús en «de dónde soy» y «no he venido por mí mismo»
  english_pob_reading: Kept broad enough to include both apparent human origin and deeper divine mission
  chosen_spanish_reading: Se mantiene suficientemente amplio para abarcar origen aparente y misión divina, sin añadir «del cielo» ni restringirlo a una procedencia meramente terrenal
  alternative_spanish_readings:
  - origen solo geográfico
  - procedencia celestial explícita
  rationale: Juan usa un lenguaje con capas de sentido. El español conserva esa amplitud semántica en vez de estrecharla o explicitarla más allá del griego.
  doctrine_reference: Translation philosophy §1 and §3.
- issue: Cómo traducir «ὁ πέμψας με» sin introducir un título teológico ausente en la cláusula
  english_pob_reading: Left as 'the one who sent me' without explicitly adding 'the Father'
  chosen_spanish_reading: Se dejó como «el que me envió», sin añadir «el Padre»
  alternative_spanish_readings:
  - «el Padre que me envió»
  - «quien me envió»
  rationale: La relación es reconocible por el contexto joánico, pero el griego aquí no nombra explícitamente al Padre. La traducción respeta la forma del texto y deja que el contexto haga el trabajo interpretativo.
  doctrine_reference: 'Translation philosophy §1: Original-language primacy over translation tradition.'
translation_notes:
  revision_awareness: La revisión más reciente quedó sin cambios sustantivos; el texto inglés auditado mantiene acuerdo moderado alto y solo presenta observaciones menores. La versión española sigue esa misma línea, conservando la tensión interpretativa y las decisiones léxicas documentadas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general, pero este versículo no contiene el tetragrámaton.
  - Se prefiere «Jesús» para Ἰησοῦς conforme al estándar del proyecto.
  - Se conserva la repetición de «conocen» para reflejar el paralelismo retórico de οἴδατε ... οἴδατε.
  - «Verdadero» se usa para ἀληθινός con nota alternativa, evitando suavizar el matiz joánico.
  - «El que me envió» evita introducir «Padre» sin base explícita en la cláusula griega.
