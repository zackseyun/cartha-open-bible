base_translation:
  language: en
  yaml_path: translation/nt/john/007/028.yaml
  text: So Jesus cried out in the temple[a], teaching and saying, “You know me, and you know where I am from. And I have not come from myself, but the one who sent me is true[c][b], whom you do not know.”
  footnotes:
  - marker: a
    text: Or, 'You know me, and you know where I come from.' The statement may be heard as ironic or challenging in context, but the Greek is formally declarative.
    reason: alternative_reading
  - marker: b
    text: '''From myself'' can also be rendered ''on my own,'' expressing that Jesus did not come on his own initiative.'
    reason: lexical_alternative
  - marker: c
    text: '''True'' may also carry the sense ''genuine'' or ''real'' in John''s usage.'
    reason: lexical_alternative
