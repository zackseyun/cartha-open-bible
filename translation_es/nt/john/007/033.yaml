- from: 'Entonces Jesús dijo[a]: «Todavía estoy con ustedes un poco más de tiempo[b], y voy al que me envió».'
  to: 'Entonces Jesús dijo[a]: «Todavía estoy con ustedes por poco tiempo más[b], y me voy al que me envió[c]».'
  rationale: Se ajusta 'y voy' a 'y me voy' para lograr un español natural que aún preserve la sencillez de ὑπάγω y su matiz de partida. Se suaviza la frase temporal a 'por poco tiempo más', más idiomática en español. Además, se añade la nota contextual presente en el aparato inglés sobre 'el que me envió', sin introducir esa aclaración en el texto principal.
