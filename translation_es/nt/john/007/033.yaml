translation:
  language: es
  text: 'Entonces Jesús dijo[a]: «Todavía estoy con ustedes por poco tiempo más[b], y me voy al que me envió[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Así que Jesús dijo».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «por un poco más de tiempo»; el griego también puede entenderse como «todavía por un breve tiempo».'
    reason: lexical_alternative
  - marker: c
    text: «El que me envió» se refiere al Padre en el contexto más amplio de Juan.
    reason: cross_reference
lexical_decisions:
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Entonces
  alternatives_spanish:
  - Así que
  - Por eso
  lexicon: BDAG
  rationale: Expresa la continuidad narrativa e inferencial del discurso de Jesús de manera natural en español, sin añadir énfasis causal que el contexto no obliga a marcar.
- source_word: Ἔτι χρόνον μικρόν
  english_pob_choice: a little while longer
  chosen_spanish: todavía ... un poco más de tiempo
  alternatives_spanish:
  - aún ... por un poco más
  - todavía ... por breve tiempo
  lexicon: BDAG
  rationale: La combinación de ἔτι y χρόνον μικρόν pide una idea de permanencia breve que todavía no ha concluido. En español, 'todavía' y 'un poco más de tiempo' conservan ese matiz temporal sin sonar rígidos.
- source_word: μεθ’ ὑμῶν εἰμι
  english_pob_choice: I am with you
  chosen_spanish: estoy con ustedes
  alternatives_spanish:
  - permanezco con ustedes
  - estoy entre ustedes
  lexicon: BDAG
  rationale: '''Estoy con ustedes'' reproduce el valor relacional inmediato de la frase griega y es el equivalente español más natural para la presencia continuada de Jesús con sus oyentes.'
- source_word: καὶ ὑπάγω
  english_pob_choice: and I am going
  chosen_spanish: y voy
  alternatives_spanish:
  - y me voy
  - y parto
  lexicon: BDAG
  rationale: Ὑπάγω puede implicar partida con peso teológico, pero aquí el griego sigue siendo simple. 'Voy' mantiene la sobriedad del original; el contexto ya indica que se trata de una marcha decisiva.
- source_word: πρὸς τὸν πέμψαντά με
  english_pob_choice: to the one who sent me
  chosen_spanish: al que me envió
  alternatives_spanish:
  - hacia el que me envió
  - al que me mandó
  lexicon: BDAG
  rationale: 'El participio articular πέμψαντά funciona como sustantivo: ''el que me envió''. En español, ''al que me envió'' conserva la relación sin explicitar en el texto principal que se trata del Padre, como hace el griego.'
theological_decisions:
- issue: Identificación del que envió a Jesús
  english_pob_reading: Retain the relational expression 'the one who sent me' rather than making the referent explicit in the main text.
  chosen_spanish_reading: Conservar 'al que me envió' sin añadir 'el Padre' en el texto principal.
  alternative_spanish_readings:
  - al Padre que me envió
  - al Padre
  rationale: En el contexto joánico el referente es el Padre, pero el griego lo deja indirecto. La versión española preserva esa economía expresiva y evita incorporar una aclaración interpretativa al cuerpo del versículo.
  doctrine_reference: Translation philosophy §1, §3
- issue: Matiz de la permanencia temporal
  english_pob_reading: a little while longer
  chosen_spanish_reading: todavía ... un poco más de tiempo
  alternative_spanish_readings:
  - aún ... por breve tiempo
  - todavía ... por un corto tiempo
  rationale: La frase conserva la tensión entre continuidad presente y cercanía del fin. 'Todavía' protege el valor de ἔτι, mientras 'un poco más de tiempo' comunica el carácter breve del período.
  doctrine_reference: BDAG; John 7:33 context
translation_notes:
  revision_awareness: La revisión inglesa eliminó 'then' porque no estaba explícito en el griego; la redacción española también evita añadir un equivalente temporal no presente. Se mantuvieron la continuidad narrativa, la brevedad temporal y la referencia indirecta al que envió a Jesús.
  spanish_consistency_notes:
  - Se usó 'Jesús' de forma directa, conforme al nombre propio del texto griego.
  - Se mantuvo 'con ustedes' en plural de trato neutro y eclesialmente legible.
  - Se evitó 'SEÑOR' y 'Cristo' porque no aparecen en este versículo y no son necesarios aquí.
  - La puntuación y la colocación de las notas se ajustan al español editorial moderno.
