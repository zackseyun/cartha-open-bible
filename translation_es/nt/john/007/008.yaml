translation:
  language: es
  text: Ustedes suban a la fiesta. Yo no subo a esta fiesta[a], porque mi tiempo aún no se ha cumplido[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Algunos manuscritos leen: «Yo aún no subo a esta fiesta».'
    reason: textual_variant
  - marker: b
    text: 'O: «mi tiempo señalado aún no se ha cumplido».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνάβητε
  english_pob_choice: go up
  chosen_spanish: suban
  alternatives_spanish:
  - vayan
  - suban arriba
  lexicon: BDAG
  rationale: En contexto de peregrinación a Jerusalén, ἀναβαίνω conserva la idea direccional de «subir». En español, «suban» comunica esa dirección de manera natural y breve; «vayan» perdería el matiz espacial, y «suban arriba» resultaría redundante.
- source_word: ἑορτή
  english_pob_choice: feast
  chosen_spanish: fiesta
  alternatives_spanish:
  - fiesta religiosa
  - festividad
  lexicon: BDAG
  rationale: En Juan, ἑορτή se refiere a una celebración festiva concreta; «fiesta» es natural en español y mantiene el sentido religioso-festal. «Festividad» suena más abstracto y «fiesta religiosa» añade explicación no exigida por el texto.
- source_word: οὐκ ἀναβαίνω
  english_pob_choice: I am not going up
  chosen_spanish: no subo
  alternatives_spanish:
  - no voy a subir
  - no estoy subiendo
  lexicon: BDAG
  rationale: El presente griego puede funcionar con valor de inminencia o intención. «No subo» conserva la sencillez del presente y permite entender la negativa inmediata; «no voy a subir» explicita más la cercanía futura, pero añade un giro interpretativo.
- source_word: ταύτην
  english_pob_choice: this
  chosen_spanish: esta
  alternatives_spanish:
  - la presente
  - esa
  lexicon: BDAG
  rationale: El demostrativo señala la fiesta específica en discusión. «Esta» es la equivalencia directa y más natural en español.
- source_word: καιρός
  english_pob_choice: time
  chosen_spanish: tiempo
  alternatives_spanish:
  - momento
  - tiempo señalado
  - tiempo oportuno
  lexicon: BDAG
  rationale: «Tiempo» es la forma más concisa y fiel al uso joánico. Otras opciones como «tiempo señalado» o «momento» aclaran la idea de oportunidad o designación, pero interpretan más de lo necesario en el texto principal.
- source_word: πεπλήρωται
  english_pob_choice: has not yet come to fulfillment
  chosen_spanish: se ha cumplido
  alternatives_spanish:
  - ha llegado a su cumplimiento
  - ha llegado a plenitud
  - se ha llenado
  lexicon: BDAG
  rationale: El perfecto pasivo de πληρόω sugiere cumplimiento/completitud. «Se ha cumplido» es una solución natural en español que preserva la idea de realización; «ha llegado a su cumplimiento» explicita más el proceso, pero resulta más pesado.
theological_decisions:
- issue: Variante textual sobre la frase negativa de Jesús
  english_pob_reading: 'Main text follows οὐκ (''not''): ''I am not going up to this feast.'' The alternative οὔπω (''not yet'') is preserved in a footnote in English.'
  chosen_spanish_reading: 'Texto principal: «Yo no subo a esta fiesta». Nota textual: «Algunos manuscritos leen: ‘Yo aún no subo a esta fiesta’.»'
  alternative_spanish_readings:
  - «Yo aún no subo a esta fiesta»
  - «Yo no voy todavía a esta fiesta»
  rationale: La base griega dada aquí es οὐκ, así que el español principal debe seguir la negación simple. Para no borrar la tensión textual e interpretativa ya documentada en el POB inglés, la variante oὔπω se preserva como nota. En español, «aún no» comunica bien esa lectura alternativa.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión textual en lugar de resolverla; conservar variantes significativas en nota.'
- issue: Matiz de καιρός en relación con el plan divino
  english_pob_reading: '''my time has not yet come to fulfillment'' / alternative ''my appointed time has not yet been fulfilled'''
  chosen_spanish_reading: «mi tiempo aún no se ha cumplido»
  alternative_spanish_readings:
  - «mi tiempo señalado aún no ha llegado a su cumplimiento»
  - «mi tiempo designado aún no se ha cumplido»
  rationale: El texto no exige desarrollar explícitamente «appointed» en la línea principal, pero sí mantiene el sentido de un tiempo fijado o definido por Dios. «Se ha cumplido» conserva el valor de plenitud/cumplimiento del perfecto y evita alargar innecesariamente la frase.
  doctrine_reference: Johannine timing / divine appointment language; preserve the completion sense of πεπλήρωται without flattening it to mere arrival.
translation_notes:
  revision_awareness: El borrador sigue el texto griego SBLGNT proporcionado (οὐκ ἀναβαίνω) y, a la vez, conserva la variante textual conocida (οὔπω) en nota, conforme al POB inglés. También mantiene el matiz de καιρός/πεπλήρωται sin convertirlo en mera indicación de llegada. Se evitó una traducción mecánica desde el inglés al priorizar la evidencia griega y la naturalidad del español.
  spanish_consistency_notes:
  - Se usó «subir» para ἀναβαίνω para conservar el matiz direccional de peregrinación.
  - Se prefirió «fiesta» por coherencia con el uso joánico de ἑορτή y con la lectura litúrgica natural en español.
  - Se mantuvo «tiempo» en el texto principal para καιρός, dejando la noción de designación/cumplimiento en la nota.
  - Se eligió una negación simple («no subo») en el cuerpo del texto porque el testigo base es οὐκ; la lectura alternativa «aún no» queda documentada en nota.
  - La frase final evita una paráfrasis excesiva y conserva la tensión entre tiempo humano y tiempo determinado en el relato joánico.
