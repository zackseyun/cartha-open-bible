translation:
  language: es
  text: 'Entonces sus hermanos le dijeron: «Sal de aquí y vete a Judea, para que tus discípulos[a] también vean las obras que haces».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «observen» o «contemplen». El verbo griego puede enfatizar el mirar o el percibir atentamente, y el futuro en esta cláusula de propósito admite varias formas de verterse en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Entonces
  alternatives_spanish:
  - Así que
  - Por tanto
  lexicon: BDAG
  rationale: En español, «Entonces» conserva la conexión inferencial/secuencial del original sin sonar forzado. Mantiene el valor discursivo de οὖν que la versión inglesa captó con «So».
- source_word: ἀδελφοὶ αὐτοῦ
  english_pob_choice: his brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - sus hermanos varones
  - sus parientes
  lexicon: BDAG
  rationale: El griego usa plural masculino y el contexto narrativo inmediato apunta a los hermanos de Jesús. «Sus hermanos» es natural en español y reproduce esa referencia sin ampliar innecesariamente a «parientes».
- source_word: Μετάβηθι ἐντεῦθεν
  english_pob_choice: Leave here
  chosen_spanish: Sal de aquí
  alternatives_spanish:
  - Vete de aquí
  - Déjate de aquí
  lexicon: BDAG
  rationale: El imperativo aoristo con ἐντεῦθεν exige una orden directa de partir del lugar presente. «Sal de aquí» transmite con claridad esa fuerza en un español natural.
- source_word: ὕπαγε εἰς τὴν Ἰουδαίαν
  english_pob_choice: go to Judea
  chosen_spanish: vete a Judea
  alternatives_spanish:
  - ve a Judea
  - marcha a Judea
  lexicon: BDAG
  rationale: «Vete a Judea» conserva el movimiento imperativo y el destino geográfico sin sobretraducir. «Judea» es la forma estándar y transparente del topónimo.
- source_word: ἵνα καὶ
  english_pob_choice: so that ... also
  chosen_spanish: para que ... también
  alternatives_spanish:
  - a fin de que ... también
  - para que incluso ...
  lexicon: BDAG
  rationale: La cláusula de propósito se expresa de manera idiomática con «para que». El adverbio καὶ se refleja con «también», preservando la adición de la frase.
- source_word: οἱ μαθηταί σου
  english_pob_choice: your disciples
  chosen_spanish: tus discípulos
  alternatives_spanish:
  - tus seguidores
  - tus alumnos
  lexicon: BDAG
  rationale: «Discípulos» mantiene la relación maestro-discípulo propia de Juan y evita una paraphrasis como «seguidores», menos precisa en este contexto.
- source_word: θεωρήσουσιν
  english_pob_choice: may see
  chosen_spanish: vean
  alternatives_spanish:
  - observen
  - contemplen
  lexicon: BDAG
  rationale: Aunque la forma es futuro indicativo, en cláusula de propósito funciona con valor prospectivo. En español, el subjuntivo «vean» expresa naturalmente esa finalidad, sin perder el sentido perceptivo de θεωρέω.
- source_word: σοῦ τὰ ἔργα ἃ ποιεῖς
  english_pob_choice: the works you are doing
  chosen_spanish: las obras que haces
  alternatives_spanish:
  - las obras que estás haciendo
  - tus obras que haces
  - los hechos que haces
  lexicon: BDAG
  rationale: «Obras» conserva el término temático de ἔργα en Juan. «Que haces» reproduce la acción presente de ποιεῖς de forma idiomática; «las obras que estás haciendo» es posible, pero más pesado.
theological_decisions:
- issue: Referencia de «sus hermanos»
  english_pob_reading: Jesus' biological brothers/family members are in view as the narrative speakers.
  chosen_spanish_reading: Se entiende a los hermanos de Jesús como los interlocutores narrativos inmediatos, sin ampliar ni doctrinalizar la relación familiar.
  alternative_spanish_readings:
  - sus parientes
  - sus familiares
  rationale: El texto inmediato de Juan 7:3–5 presenta a estos personajes como hermanos. La traducción conserva esa identificación directa sin introducir una aclaración que el versículo no exige.
  doctrine_reference: Ortodoxia histórica cristiana; fidelidad al nivel narrativo del texto sin añadir inferencias doctrinales.
- issue: Valor de propósito de ἵνα con futuro de θεωρέω
  english_pob_reading: '''may see'' or ''will see'' or ''observe'' in a purpose clause.'
  chosen_spanish_reading: «para que ... vean» expresa finalidad con un verbo de percepción natural en español.
  alternative_spanish_readings:
  - para que ... observen
  - para que ... contemplen
  rationale: El griego permite matices de ver/observar/contemplar. «Vean» es la opción más directa y transparente; «observen» enfatizaría más la vigilancia, y «contemplen» sería más interpretativa.
  doctrine_reference: Principios de equivalencia semántica; no se introduce contenido doctrinal adicional.
translation_notes:
  revision_awareness: Se revisó el antecedente inglés y no hubo cambios posteriores relevantes; la presente versión mantiene el estado estable del pasaje con equivalencia óptima y ajuste idiomático en español.
  spanish_consistency_notes:
  - Se mantiene «Judea» como topónimo estándar y transparente.
  - Se usa «discípulos» de manera consistente con el contexto joánico.
  - Se preserva «obras» para ἔργα, por su peso temático en Juan.
  - El subjuntivo en la cláusula final refleja naturalmente el valor de propósito de ἵνα en español.
