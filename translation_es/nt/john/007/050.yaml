translation:
  language: es
  text: 'Nicodemo, el que había venido a él[a] anteriormente, siendo uno de ellos, les dijo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el que había venido a él antes'. El pronombre 'él' se refiere a Jesús en el contexto más amplio.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει
  english_pob_choice: said
  chosen_spanish: les dijo
  alternatives_spanish:
  - dijo
  lexicon: BDAG
  rationale: El griego usa presente histórico; en español narrativo formal es más natural el pasado simple. Se conserva la función discursiva de introducir el habla.
- source_word: Νικόδημος
  english_pob_choice: Nicodemus
  chosen_spanish: Nicodemo
  lexicon: conventional proper-name transliteration
  rationale: Nombre propio transliterado según el uso estándar en español.
- source_word: πρὸς αὐτούς
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  lexicon: BDAG
  rationale: Con verbo de habla, πρός + acusativo marca destinatario; en español, el dativo de complemento indirecto expresa con naturalidad 'a ellos' como 'les'.
- source_word: ὁ ἐλθὼν πρὸς αὐτὸν πρότερον
  english_pob_choice: the one who had come to him earlier
  chosen_spanish: el que había venido a él antes
  alternatives_spanish:
  - el que había venido a él anteriormente
  - quien había venido a él antes
  lexicon: BDAG
  rationale: El artículo con participio funciona sustantivado y en aposición a Nicodemo. 'Había venido' refleja anterioridad relativa; 'antes' traduce πρότερον de forma natural y fiel. Se mantiene 'a él' sin especificar en el texto al referente de Jesús, aunque el contexto joánico lo aclara.
- source_word: εἷς ὢν ἐξ αὐτῶν
  english_pob_choice: being one of them
  chosen_spanish: siendo uno de ellos
  alternatives_spanish:
  - que era uno de ellos
  - pues era uno de ellos
  lexicon: BDAG
  rationale: El participio expresa información descriptiva de fondo; 'siendo uno de ellos' conserva la fuerza participial sin convertirla indebidamente en causal o explicativa.
theological_decisions:
- issue: Referente de αὐτόν en 'el que había venido a él antes'
  english_pob_reading: The pronoun refers to Jesus.
  chosen_spanish_reading: El pronombre 'él' se deja implícito como referencia contextual a Jesús.
  alternative_spanish_readings:
  - Explicitar 'Jesús' en el texto
  - Mantener una ambigüedad formal con 'a él' sin nota
  rationale: El contexto narrativo de Juan identifica al destinatario como Jesús (cf. Juan 3:1–2). En el texto español se preserva el pronombre como en el griego, sin añadir el nombre propio al versículo.
  doctrine_reference: Juan 3:1–2; coherencia narrativa del Evangelio de Juan
translation_notes:
  revision_awareness: 'Se sigue la reordenación del audit trail en inglés para reflejar la estructura aposicional griega: primero la identificación de Nicodemo, luego el verbo de habla al final. Se evita una traducción demasiado literal del presente histórico y se conserva la referencia pronominal sin sobreexplicarla.'
  spanish_consistency_notes:
  - Se usa 'él' para mantener la referencia contextual sin introducir un antecedente no presente en el versículo.
  - Se prefiere 'les dijo' por naturalidad sintáctica en español y correspondencia con πρὸς αὐτούς.
  - No se emplea 'Cristo' ni 'Señor' porque este versículo no contiene esos términos.
