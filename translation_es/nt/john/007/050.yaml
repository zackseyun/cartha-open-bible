  spanish_quality_summary: El texto es claro y natural en español eclesial moderno. 'Les dijo' y 'el que había venido a él antes' son legibles. No obstante, 'antes' puede afinarse a 'anteriormente' para un registro algo más digno y cercano al matiz de πρότερον, y conviene añadir nota para la alternativa y el referente contextual. La puntuación está bien.
