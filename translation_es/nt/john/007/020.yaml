translation:
  language: es
  text: 'La multitud respondió[a]: «Tienes un demonio. ¿Quién procura matarte?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Estás endemoniado». Literalmente: «Tienes un demonio».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: BDAG
  rationale: En este diálogo narrativo, «respondió» comunica de manera natural la réplica de la multitud y mantiene el tono directo del original. «Contestó» sería posible, pero aquí «respondió» suena más fluido en español bíblico actual.
- source_word: ὄχλος
  english_pob_choice: the crowd
  chosen_spanish: la multitud
  alternatives_spanish:
  - la gente
  - el gentío
  - la muchedumbre
  lexicon: BDAG
  rationale: ὄχλος puede referirse a una masa de personas; «la multitud» conserva ese valor colectivo y es plenamente comprensible en español bíblico sin volverse coloquial.
- source_word: Δαιμόνιον ἔχεις
  english_pob_choice: You have a demon
  chosen_spanish: Tienes un demonio
  alternatives_spanish:
  - Estás endemoniado
  - Tienes un espíritu maligno
  lexicon: BDAG
  rationale: La forma griega es literalmente «tienes un demonio». Se mantiene esa formulación porque el POB inglés preserva la expresión literal y evita introducir la interpretación «poseído» en el cuerpo del texto.
- source_word: τίς
  english_pob_choice: Who
  chosen_spanish: ¿Quién
  alternatives_spanish:
  - Nadie
  lexicon: BDAG
  rationale: El interrogativo está explícito en griego. Se conserva como pregunta retórica en español, en lugar de convertirla en una negación implícita.
- source_word: ζητεῖ
  english_pob_choice: is seeking
  chosen_spanish: procura
  alternatives_spanish:
  - busca
  - trata de
  lexicon: BDAG
  rationale: En esta pregunta hostil, «procura» comunica la acción intencional de manera natural y evita la rigidez de un progresivo artificial en español. «Busca» también sería posible, pero «procura» refleja bien el empeño dirigido a la acción siguiente.
- source_word: ἀποκτεῖναι
  english_pob_choice: to kill
  chosen_spanish: matar
  alternatives_spanish:
  - dar muerte
  - asesinar
  lexicon: BDAG
  rationale: El infinitivo significa «matar / dar muerte». «Matar» es la opción directa y fiel; «asesinar» añadiría una valoración legal o moral no explícita en el verbo.
theological_decisions:
- issue: Cómo renderizar la acusación «Δαιμόνιον ἔχεις» sin suavizarla ni interpretarla de más
  english_pob_reading: Translate literally as 'You have a demon' in the hostile accusation; preserve the tension and avoid importing 'demon-possessed' into the main text.
  chosen_spanish_reading: «Tienes un demonio» en el texto principal, con nota alternativa que explicita la posible equivalencia idiomática «Estás endemoniado».
  alternative_spanish_readings:
  - Estás endemoniado
  - Tienes un espíritu maligno
  rationale: La frase griega es literal y la acusación es hostil; por eso el texto principal conserva la estructura fuente. La nota permite al lector español ver la equivalencia idiomática sin borrar la tensión del original.
  doctrine_reference: 'Translation philosophy: Original-language primacy; preserve hostile speech as reported without doctrinal smoothing.'
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requieren cambios respecto al pass más reciente; se preserva la lectura literal de δαιμόνιον y la pregunta retórica de τίς.'
  spanish_consistency_notes:
  - Se usa «demonio» y no «espíritu inmundo» porque el griego dice δαιμόνιον, no πνεῦμα ἀκάθαρτον.
  - Se prefiere «la multitud» para ὄχλος, en armonía con el uso narrativo del pasaje.
  - Se mantiene el verbo directo «matar» en la nota semántica, mientras el texto principal usa «matarte» para naturalidad española.
  - El registro es bíblico contemporáneo, no arcaizante, y conserva la acusación hostil sin suavizarla.
