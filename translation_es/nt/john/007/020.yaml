    issue: «procura matarte» frente a «busca matarte»
    rationale: ζητεῖ suele verterse de manera muy natural como «busca» en español contemporáneo, pero «procura» también comunica bien intención y esfuerzo. Es una preferencia estilística menor, no un problema de fidelidad.
