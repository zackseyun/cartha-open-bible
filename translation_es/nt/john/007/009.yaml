translation:
  language: es
  text: Después de decir estas cosas, se quedó en Galilea.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  lexicon: BDAG
  rationale: El demostrativo neutro plural se refleja mejor con un plural en español para conservar la referencia retrospectiva amplia al discurso anterior. "Esto" sería más idiomático en algunos contextos, pero perdería algo de la huella plural del griego.
- source_word: δὲ
  english_pob_choice: After
  chosen_spanish: Después de
  alternatives_spanish:
  - y
  - entonces
  - ahora
  lexicon: BDAG
  rationale: En esta construcción con participio aoristo, δέ funciona como transición discursiva/temporal. "Después de" expresa con naturalidad el movimiento temporal sin añadir contraste que el contexto no exige.
- source_word: εἰπὼν
  english_pob_choice: saying
  chosen_spanish: decir
  alternatives_spanish:
  - haber dicho
  - diciendo
  lexicon: BDAG
  rationale: El participio aoristo antecede a la acción principal. En español, la construcción "después de decir" comunica bien esa anterioridad sin forzar un calco poco natural.
- source_word: ἔμεινεν
  english_pob_choice: remained
  chosen_spanish: se quedó
  alternatives_spanish:
  - permaneció
  - permaneció allí
  lexicon: BDAG
  rationale: μένω puede rendirse como "permanecer" o "quedarse". Aquí "se quedó" es claro y natural en español narrativo; conserva la idea de permanecer en un lugar sin sobrerrepresentar una matiz lexical no exigido por el contexto.
- source_word: ἐν τῇ Γαλιλαίᾳ
  english_pob_choice: in Galilee
  chosen_spanish: en Galilea
  alternatives_spanish:
  - dentro de Galilea
  lexicon: BDAG
  rationale: La frase locativa es directa y se traduce con la preposición normal en español. No requiere ampliación explicativa.
theological_decisions:
- issue: Valor narrativo del pronombre explícito αὐτός
  english_pob_reading: he remained in Galilee
  chosen_spanish_reading: se quedó en Galilea
  alternative_spanish_readings:
  - él se quedó en Galilea
  - él mismo se quedó en Galilea
  rationale: El inglés POB revisado eliminó el énfasis explícito de "he himself" porque αὐτός aquí puede quedar absorbido por el sujeto verbal ordinario. En español, lo mismo se logra con un verbo pronominal simple sin añadir un énfasis que el pasaje no obliga a destacar.
  doctrine_reference: Cristología narrativa del Evangelio de Juan; atención al énfasis textual sin sobrerinterpretación.
translation_notes:
  revision_awareness: El borrador sigue el estado revisado del POB inglés, que suprimió el énfasis explícito de 'himself' por no ser necesario en este contexto. La traducción española conserva esa misma economía y mantiene el movimiento temporal del participio aoristo con una construcción natural en español.
  spanish_consistency_notes:
  - Se mantiene 'Galilea' con el nombre geográfico estándar.
  - No se introduce 'Cristo', 'Señor' ni terminología eclesiástica ajena al verso.
  - La voz narrativa se mantiene simple y sobria, acorde con el estilo del relato de Juan.
