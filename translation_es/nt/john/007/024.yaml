review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura del griego: prohibición inicial, contraste adversativo y repetición de κρίνετε. «Según la apariencia» representa adecuadamente κατ’ ὄψιν, y la nota alternativa conserva «apariencia externa». Sin embargo, «con justo juicio» suena menos natural en español que «con juicio justo» y no reproduce tan claramente la colocación nominal de τὴν δικαίαν κρίσιν.'
  spanish_quality_summary: El texto es claro y fiel, pero «sino juzguen con justo juicio» resulta algo rígido. En español bíblico contemporáneo y natural, «sino juzguen con juicio justo» fluye mejor y mantiene el paralelismo. La puntuación y registro son adecuados para una versión eclesial legible.
  glossary_alignment: No hay términos del glosario mayor en juego salvo δικαίαν, donde el proyecto permite «justicia/rectitud» por contexto. Aquí «justo» es defendible en un contexto judicial, aunque la formulación debe mejorarse a «juicio justo».
  issues:
  - severity: medium
    issue: Colocación poco natural en «con justo juicio»
    rationale: Aunque semánticamente comprensible, en español la combinación más idiomática es «con juicio justo». Esto preserva mejor la fuerza de «with righteous/just judgment» sin sonar forzado.
  - severity: low
    issue: La nota alternativa repite la misma colocación menos natural
    rationale: Si se revisa el texto principal, la nota también debe armonizarse para mantener buena calidad estilística en español.
  revised_spanish_text: No juzguen según la apariencia[a], sino juzguen con juicio justo.
  revised_footnotes:
