translation:
  language: es
  text: No juzguen según la apariencia[a], sino juzguen con juicio justo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No juzguen por la apariencia externa, sino juzguen con juicio justo».'
    reason: alternative_reading
lexical_decisions:
- source_word: μὴ κρίνετε
  english_pob_choice: Do not judge
  chosen_spanish: No juzguen
  alternatives_spanish:
  - No juzguéis
  - No emitan juicio
  - Dejen de juzgar
  lexicon: BDAG
  rationale: El imperativo negativo en segunda persona plural se expresa de manera natural con «No juzguen». Conserva la fuerza prohibitiva sin añadir el matiz aspectual de «dejen de» ni el giro menos idiomático «emitan juicio».
- source_word: κατ’ ὄψιν
  english_pob_choice: according to appearance
  chosen_spanish: según la apariencia
  alternatives_spanish:
  - por la apariencia
  - según lo que se ve
  - por apariencia externa
  lexicon: BDAG
  rationale: La frase griega apunta a juzgar basándose en la apariencia exterior o impresión superficial. «Según la apariencia» conserva el sentido idiomático y suena natural en español; «por apariencia externa» aclara más, pero resulta más pesado.
- source_word: ἀλλὰ
  english_pob_choice: but
  chosen_spanish: sino
  alternatives_spanish:
  - pero
  - más bien
  - sino más bien
  lexicon: BDAG
  rationale: En español, tras una prohibición negativa, «sino» comunica mejor la oposición correctiva del griego que «pero».
- source_word: τὴν δικαίαν κρίσιν
  english_pob_choice: with righteous judgment
  chosen_spanish: con justo juicio
  alternatives_spanish:
  - con juicio recto
  - con juicio justo
  - con juicio rectamente justo
  lexicon: BDAG
  rationale: El griego literalmente habla de «el juicio justo/righteous». En español, «con justo juicio» preserva tanto el sustantivo como el calificativo y evita una construcción pesada. Se prefiere «justo» aquí porque el valor ético-jurídico de δίκαιος encaja de manera directa en español, sin perder la idea de juicio conforme a rectitud.
- source_word: κρίνετε
  english_pob_choice: judge
  chosen_spanish: juzguen
  alternatives_spanish:
  - juzgad
  - emitan juicio
  - decidan
  lexicon: BDAG
  rationale: Se mantiene el mismo verbo en ambas cláusulas para conservar el paralelismo retórico del griego. «Juzguen» es la forma más directa y clara en español contemporáneo.
theological_decisions:
- issue: δίκαιος aplicado al juicio
  english_pob_reading: righteous judgment
  chosen_spanish_reading: justo juicio
  alternative_spanish_readings:
  - juicio recto
  - juicio justo
  rationale: La traducción opta por «justo» porque en español comunica con claridad la cualidad moral y judicial de δίκαιος. No se fuerza un término más devocional que el contexto no exige; la tensión entre justicia moral y corrección judicial queda conservada en la fórmula breve.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego SBLGNT y la solución inglesa auditada, conservando el contraste negativo/positivo y el paralelismo verbal. Se refleja la revisión reciente que afinó κατ’ ὄψιν hacia una referencia singular a la apariencia, no a «apariencias» en plural.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo requiriera; este versículo no contiene el nombre divino.
  - Se evitó «Cristo»/«Mesías» porque no aparecen en el versículo.
  - «Juzguen» mantiene la repetición verbal del griego y la cohesión estilística con el resto de la serie.
  - La nota al pie preserva la alternativa lexical principal del audit trail inglés sin sobrecargar el texto principal.
