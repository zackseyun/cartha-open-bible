translation:
  language: es
  text: ¿Acaso alguno de los gobernantes o de los fariseos ha creído en él?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La pregunta griega con μή espera la respuesta «no».
    reason: lexical_alternative
lexical_decisions:
- source_word: μή τις
  english_pob_choice: Has any one
  chosen_spanish: ¿Acaso alguno... ha... ?
  alternatives_spanish:
  - ¿Ha creído alguno... ?
  - ¿Nadie... ha creído... ?
  lexicon: BDAG
  rationale: La partícula interrogativa μή con τις forma una pregunta retórica que espera respuesta negativa. «¿Acaso alguno... ha...? » conserva el carácter interrogativo y el tono despectivo sin convertirlo en una negación explícita en el texto principal.
- source_word: ἐκ τῶν ἀρχόντων
  english_pob_choice: of the rulers
  chosen_spanish: de los gobernantes
  alternatives_spanish:
  - de los jefes
  - de las autoridades
  - de los dirigentes
  lexicon: BDAG
  rationale: ἄρχοντες designa aquí a personas con autoridad reconocida. «Gobernantes» conserva el peso de rango y gobierno en español contemporáneo y evita diluir el término en una noción demasiado genérica de «líderes».
- source_word: ἐπίστευσεν
  english_pob_choice: believed
  chosen_spanish: ha creído
  alternatives_spanish:
  - creyó
  - ha puesto fe
  - ha confiado
  lexicon: BDAG
  rationale: 'En esta pregunta retórica, el aoristo se expresa naturalmente en español con perfecto compuesto para el registro publicado: «ha creído». Mantiene la acción puntual sin forzar una traducción más interpretativa.'
- source_word: εἰς αὐτόν
  english_pob_choice: in him
  chosen_spanish: en él
  alternatives_spanish:
  - en él mismo
  - hacia él
  lexicon: BDAG
  rationale: Aunque el griego usa πιστεύω εἰς, el español bíblico claro y fiel es «creer en él». Aquí «en él» reproduce la relación de confianza sin calcar «hacia/into».
- source_word: ἢ
  english_pob_choice: or
  chosen_spanish: o
  alternatives_spanish:
  - o incluso
  lexicon: BDAG
  rationale: La conjunción simple basta para unir el segundo grupo paralelo al primero. No hace falta intensificarla con «o incluso» porque la fuerza retórica ya está en la pregunta completa.
- source_word: ἐκ τῶν Φαρισαίων
  english_pob_choice: of the Pharisees
  chosen_spanish: de los fariseos
  alternatives_spanish:
  - entre los fariseos
  - de fariseos
  lexicon: BDAG
  rationale: Se mantiene la estructura paralela con «de los gobernantes» y el nombre del grupo con la transliteración habitual en español, «fariseos».
theological_decisions:
- issue: Pregunta retórica con expectativa negativa
  english_pob_reading: Render as a rhetorical question expecting a negative answer without converting it into an explicit denial.
  chosen_spanish_reading: Mantener la forma interrogativa con expectativa negativa implícita.
  alternative_spanish_readings:
  - Ninguno de los gobernantes ni de los fariseos ha creído en él.
  - ¿Es que alguno de los gobernantes o de los fariseos ha creído en él?
  rationale: El griego μή τις no formula una negación desnuda, sino una pregunta que presupone «no». En español, conservar la pregunta protege el tono narrativo y la ironía de los hablantes, sin resolver la tensión de manera excesiva.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: Basado en el texto griego SBLGNT y en el auditable criterio inglés de la POB; no se detectaron revisiones aplicadas en el registro fuente, por lo que se preserva la misma lectura retórica sin ampliarla.
  spanish_consistency_notes:
  - Se mantiene el tratamiento reverente breve de la tercera persona singular con «él» para αὐτόν, coherente con el contexto joánico.
  - «Gobernantes» y «fariseos» conservan el paralelismo de grupos y el tono social del dicho.
  - La nota al pie explicita la expectativa negativa de μή sin convertirla en una negación en el cuerpo del texto.
