translation:
  language: es
  text: Para entonces, cuando la fiesta ya iba por la mitad[a], Jesús subió al templo[b] y estaba enseñando[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «aproximadamente a la mitad de la fiesta».'
    reason: alternative_reading
  - marker: b
    text: 'Griego ἱερόν: aquí se refiere al complejo o recinto del templo, no específicamente al santuario interior.'
    reason: cultural_note
  - marker: c
    text: 'O: «enseñaba». El imperfecto griego puede enfatizar una acción en desarrollo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἤδη
  english_pob_choice: already
  chosen_spanish: ya
  alternatives_spanish:
  - ya para entonces
  - ya
  lexicon: BDAG
  rationale: Ἤδη marca que el momento ya ha avanzado; «ya» reproduce de forma natural esa idea temporal sin añadir énfasis innecesario.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y
  - Pero
  lexicon: BDAG
  rationale: δὲ funciona aquí como transición narrativa suave; «Ahora» conserva el flujo discursivo sin forzar contraste.
- source_word: τῆς ἑορτῆς μεσούσης
  english_pob_choice: when the feast was already half over
  chosen_spanish: cuando la fiesta ya estaba a la mitad
  alternatives_spanish:
  - cuando la fiesta estaba en su mitad
  - cuando la fiesta iba por la mitad
  - a la mitad de la fiesta
  lexicon: BDAG
  rationale: El genitivo absoluto expresa circunstancia temporal y μεσούσης señala el punto medio. «Estaba a la mitad» comunica con claridad la idea de la fiesta en su punto medio sin sobrerrepresentar el aspecto exacto del inglés.
- source_word: ἀνέβη
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - subió de camino
  - ascendió
  - fue
  lexicon: BDAG
  rationale: ἀναβαίνω conserva la idea de subir; en el contexto de Jerusalén y el templo, «subió» es la forma más natural y fiel en español.
- source_word: εἰς τὸ ἱερὸν
  english_pob_choice: into the temple
  chosen_spanish: al templo
  alternatives_spanish:
  - al complejo del templo
  - a los atrios del templo
  - al recinto del templo
  lexicon: BDAG
  rationale: ἱερόν designa el complejo del templo y no solo el santuario interior. «Al templo» es la expresión más natural en español; el matiz de recinto se preserva en nota.
- source_word: ἐδίδασκεν
  english_pob_choice: was teaching
  chosen_spanish: estaba enseñando
  alternatives_spanish:
  - enseñaba
  - estaba enseñando
  lexicon: BDAG
  rationale: El imperfecto griego presenta la acción en curso. «Estaba enseñando» refleja con claridad ese progreso sin añadir la idea inceptiva de «empezó a enseñar».
- source_word: Ἰησοῦς
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - Jesús
  lexicon: N-
  rationale: Nombre propio estándar en español, sin necesidad de glosa.
theological_decisions:
- issue: Sentido de ἱερόν
  english_pob_reading: the temple refers to the temple complex/courts, not specifically the inner sanctuary
  chosen_spanish_reading: «el templo» se entiende como el complejo o recinto del templo, no como el santuario interior
  alternative_spanish_readings:
  - el templo (menos específico)
  - los atrios del templo
  rationale: No es una cuestión doctrinal, sino de precisión histórica y espacial. La nota evita que el lector imagine solo el lugar santísimo o el santuario interior.
  doctrine_reference: Precisión lexical y cultural del texto; no implica doctrina controvertida.
- issue: Valor aspectual del imperfecto ἐδίδασκεν
  english_pob_reading: was teaching
  chosen_spanish_reading: «estaba enseñando» mantiene la acción en curso
  alternative_spanish_readings:
  - enseñaba
  - estaba enseñando
  rationale: El imperfecto describe una acción continua en pasado. La opción elegida evita introducir una idea de inicio que no está explícita en el griego.
  doctrine_reference: Aspecto verbal del griego koiné; no doctrinal.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB inglés: se prefirió una traducción progresiva del imperfecto («was teaching») en lugar de una forma inceptiva. También se conservó la nota cultural sobre ἱερόν como complejo del templo y se mantuvo la ambigüedad temporal de μεσούσης con una nota alternativa en español.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el original lo requiera explícitamente; este versículo no lo contiene.
  - «Jesús» se mantiene como nombre propio fijo.
  - «templo» se conserva como término común, con nota explicativa para el valor espacial de ἱερόν.
  - Se prefirió «estaba enseñando» para respetar el imperfecto sin añadir comienzo de acción.
