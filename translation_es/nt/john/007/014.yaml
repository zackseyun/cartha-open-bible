  rationale: Se corrige la colocación y el contenido de la nota sobre ἐδίδασκεν, de modo que quede anclada a «estaba enseñando» y ofrezca una alternativa real. También se mejora la naturalidad del español con «Para entonces» para δὲ y «iba por la mitad» para la circunstancia temporal, manteniendo fielmente el sentido del griego y las decisiones auditadas en inglés.
