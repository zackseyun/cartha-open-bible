translation:
  language: es
  text: '¿Qué es esta declaración[a] que dijo: «Me buscarán y no me encontrarán, y donde yo estoy[b][c], ustedes no pueden venir»?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¿Qué es esta palabra/dicho que dijo?». λόγος puede significar «palabra», «declaración», «mensaje» o «dicho», según el contexto.
    reason: lexical_alternative
  - marker: b
    text: 'Algunas traducciones ponen: «donde voy, ustedes no pueden venir», pero el griego aquí dice «donde yo estoy», conservando una tensión deliberada en la redacción de Juan.'
    reason: alternative_reading
  - marker: c
    text: 'O: «…y donde yo estoy, ustedes no pueden venir».'
    reason: previous_rendering
lexical_decisions:
- source_word: τίς ἐστιν ὁ λόγος οὗτος
  english_pob_choice: What is this statement
  chosen_spanish: ¿Cuál es esta declaración
  alternatives_spanish:
  - ¿Cuál es esta palabra
  - ¿Cuál es este dicho
  - ¿Qué significa esta declaración
  lexicon: BDAG
  rationale: λόγος aquí se refiere al contenido de lo que Jesús dijo, no a una sola ‘palabra’ técnica. ‘Declaración’ mantiene el sentido de un dicho formulado y suena natural en español, aunque conserva cierta formalidad para reflejar la pregunta del contexto.
- source_word: ὃν εἶπε
  english_pob_choice: that he said
  chosen_spanish: que dijo
  alternatives_spanish:
  - que habló
  - que pronunció
  lexicon: BDAG
  rationale: El aoristo εἶπε se expresa de forma directa con ‘dijo’, que introduce naturalmente la cita en español y no añade matices innecesarios.
- source_word: Ζητήσετέ με
  english_pob_choice: You will seek me
  chosen_spanish: Me buscarán
  alternatives_spanish:
  - Me buscarán diligentemente
  - Me buscarán y tratarán de hallar
  lexicon: BDAG
  rationale: ζητέω puede traducirse como ‘buscar’ o ‘buscar a’. En español, ‘me buscarán’ comunica bien la acción sin sonar forzado; se preserva la relación con el vocabulario joánico de búsqueda.
- source_word: οὐχ εὑρήσετε
  english_pob_choice: will not find me
  chosen_spanish: y no me encontrarán
  alternatives_spanish:
  - y no me hallarán
  - y ciertamente no me encontrarán
  lexicon: BDAG
  rationale: La negación futura se conserva de forma natural con ‘no me encontrarán’. Se mantiene el objeto ‘me’ para claridad, como en el sentido implícito del griego.
- source_word: ὅπου εἰμὶ ἐγὼ
  english_pob_choice: Where I am
  chosen_spanish: donde yo estoy
  alternatives_spanish:
  - donde estoy yo
  - donde yo me encuentro
  lexicon: BDAG
  rationale: Se preserva el presente εἰμί con ‘estoy’ en vez de interpretarlo como ‘voy a estar’ o ‘donde voy’. Esto conserva la tensión deliberada del texto y su valor auditivo en español.
- source_word: οὐ δύνασθε ἐλθεῖν
  english_pob_choice: you are not able to come
  chosen_spanish: ustedes no pueden venir
  alternatives_spanish:
  - ustedes no están en capacidad de venir
  - ustedes no pueden ir allí
  lexicon: BDAG
  rationale: δύνασθε expresa capacidad/inabilidad. ‘No pueden venir’ es idiomático en español y comunica la imposibilidad sin volver la frase pesada; ‘venir’ sigue bien el movimiento implícito hacia el lugar donde Jesús está.
- source_word: λόγος
  english_pob_choice: statement
  chosen_spanish: declaración
  alternatives_spanish:
  - dicho
  - mensaje
  - palabra
  lexicon: BDAG
  rationale: Se evita ‘palabra’ porque en español puede sonar demasiado genérica o sugerir un uso teológico distinto. ‘Declaración’ refleja mejor una afirmación concreta y la pregunta de la multitud sobre el sentido de lo dicho.
theological_decisions:
- issue: Tensión del presente en “ὅπου εἰμὶ ἐγώ”
  english_pob_reading: Retain the present tense 'Where I am' rather than interpretively shifting to 'where I am going.'
  chosen_spanish_reading: Mantener el presente con ‘donde yo estoy’, no con ‘donde yo voy’ ni ‘donde voy a estar’.
  alternative_spanish_readings:
  - donde yo voy
  - donde voy a estar
  rationale: El griego usa εἰμί en presente, y el POB inglés conserva esa forma para no resolver la tensión de inmediato. El español hace lo mismo con ‘estoy’, preservando la ambigüedad teológica y relacional del dicho de Jesús.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Unidad de la cita de Jesús
  english_pob_reading: A single, continuous saying with 'and' inside the quotation.
  chosen_spanish_reading: 'Una sola cita continua: ‘Me buscarán y no me encontrarán, y donde yo estoy...’'
  alternative_spanish_readings:
  - Separar en dos citas
  - introducir la segunda cláusula como comentario externo
  rationale: El griego une las cláusulas con καί dentro de un solo λόγος. El español debe reflejar esa unidad para no fragmentar indebidamente la afirmación y para conservar la estructura retórica del pasaje.
  doctrine_reference: Source structure and discourse coherence in translation.
translation_notes:
  revision_awareness: 'El inglés POB fue ajustado para unir la cita como una sola frase continua, evitando separar indebidamente las cláusulas. La versión española sigue esa revisión: coloca ‘y’ dentro de la cita y conserva el presente de ὅπου εἰμὶ ἐγώ con ‘donde yo estoy’, sin interpretar la frase como ‘donde voy’.'
  spanish_consistency_notes:
  - Se mantuvo el tratamiento reverente e indirecto de Jesús en tercera persona plural/usted plural no marcada, acorde con el español bíblico moderno.
  - Se prefirió ‘venir’ sobre ‘ir’ para evitar desplazar el punto de referencia del dicho; el griego expresa la imposibilidad de llegar al lugar donde Jesús está.
  - ‘Declaración’ se usa aquí como equivalente funcional de λόγος en este contexto narrativo, sin convertirlo en un término técnico fijo.
