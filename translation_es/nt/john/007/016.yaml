translation:
  language: es
  text: 'Así que Jesús les respondió[a]: «Mi enseñanza no es mía, sino de quien me envió».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sino que pertenece al que me envió», resaltando en la expresión griega en genitivo tanto el origen como la posesión.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: BDAG
  rationale: En español, 'respondió' comunica con naturalidad el verbo narrativo de réplica a una pregunta o intervención previa. Mantiene el sentido de ἀποκρίνομαι sin calcar la estructura inglesa.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - entonces
  - por eso
  lexicon: BDAG
  rationale: La partícula conecta el dicho de Jesús con el contexto previo; 'Así que' preserva continuidad discursiva en español contemporáneo sin sobrerrepresentar inferencia lógica.
- source_word: αὐτοῖς
  english_pob_choice: them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - les
  lexicon: BDAG
  rationale: El dativo de destinatario se expresa de forma natural con 'les' después de 'respondió', conservando la relación indirecta sin rigidez.
- source_word: καὶ εἶπεν
  english_pob_choice: answered them, “
  chosen_spanish: 'les respondió: «'
  alternatives_spanish:
  - 'y dijo: «'
  - 'les respondió y dijo: «'
  lexicon: BDAG
  rationale: El griego usa una fórmula doble ('respondió' y 'dijo'); en español, 'les respondió' introduce de manera idiomática el discurso directo y no pierde contenido.
- source_word: διδαχή
  english_pob_choice: teaching
  chosen_spanish: enseñanza
  alternatives_spanish:
  - doctrina
  - instrucción
  lexicon: BDAG
  rationale: '''Enseñanza'' es el equivalente más natural y amplio en español moderno para διδαχή. ''Doctrina'' suena más técnico/eclesial y podría estrechar indebidamente el sentido.'
- source_word: Ἡ ἐμὴ διδαχὴ
  english_pob_choice: My teaching
  chosen_spanish: Mi enseñanza
  alternatives_spanish:
  - La enseñanza que es mía
  - Mi doctrina
  lexicon: BDAG
  rationale: El posesivo directo conserva la concisión del griego y la oposición retórica 'mía/no mía'. 'Mi enseñanza' refleja bien el énfasis sin artificio.
- source_word: οὐκ ἔστιν ἐμὴ
  english_pob_choice: is not mine
  chosen_spanish: no es mía
  alternatives_spanish:
  - no me pertenece
  - no es propia
  lexicon: BDAG
  rationale: '''No es mía'' reproduce la afirmación breve y contrastiva del griego, manteniendo la tensión entre posesión/origen que el contexto exige.'
- source_word: ἀλλὰ τοῦ πέμψαντός με
  english_pob_choice: but his who sent me
  chosen_spanish: sino de quien me envió
  alternatives_spanish:
  - sino del que me envió
  - sino de aquel que me envió
  lexicon: BDAG
  rationale: El genitivo puede sugerir posesión y fuente. En español, 'de quien me envió' expresa procedencia de manera clara y sobria, sin forzar un posesivo explícito que el griego deja implícito.
- source_word: πέμψαντός
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - comisionó
  lexicon: BDAG
  rationale: πέμπω normalmente significa 'enviar'; 'envió' es el equivalente directo y más natural en español. 'Comisionó' añade matiz no requerido por el contexto.
theological_decisions:
- issue: Relación entre la enseñanza de Jesús y el que lo envió
  english_pob_reading: 'The verse is rendered to preserve both distinction of persons and unity of mission/source: Jesus denies independent origination of the teaching, not his authority or divinity.'
  chosen_spanish_reading: La traducción preserva que la enseñanza de Jesús no se origina en él de manera independiente, sino que procede del que lo envió, sin rebajar su autoridad ni su identidad divina.
  alternative_spanish_readings:
  - Jesús se presenta solo como un mensajero humano sin autoridad propia
  - La frase implicaría una separación metafísica fuerte entre Jesús y el que lo envió
  rationale: El griego contrapone 'mía' con 'de quien me envió', lo que afirma derivación y misión. La versión española mantiene esa tensión sin resolverla hacia una reducción cristológica ni hacia una formulación excesivamente abstracta.
  doctrine_reference: Credo Niceno-Constantinopolitano (381); Definición de Calcedonia (451); principio de preservar la tensión teológica del original.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando la nota al pie no anclada; la versión actual no usa marcadores de nota, por lo que no requiere footnotes.
  spanish_consistency_notes:
  - Se usa 'Jesús' para Ἰησοῦς conforme al estándar del proyecto.
  - Se usa 'enseñanza' para διδαχή, evitando 'doctrina' salvo necesidad contextual.
  - Se conserva la oposición posesiva del griego con 'mía / de quien me envió' sin introducir un posesivo interpretativo adicional.
  - '''Envió'' traduce πέμψαντός με de manera directa y mantiene el énfasis en origen/misión.'
