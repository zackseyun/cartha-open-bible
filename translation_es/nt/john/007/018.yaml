translation:
  language: es
  text: El que habla de sí mismo busca su propia gloria[a]; pero el que busca la gloria del que lo envió, este es verdadero[b], y no hay maldad[c] en él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por su propia cuenta» o «con su propia autoridad» para «de sí mismo».
    reason: lexical_alternative
  - marker: b
    text: O «veraz» para «verdadero».
    reason: lexical_alternative
  - marker: c
    text: O «injusticia» o «conducta injusta» para «maldad».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀφ’ ἑαυτοῦ
  english_pob_choice: from himself
  chosen_spanish: de sí mismo
  alternatives_spanish:
  - por su propia cuenta
  - con su propia autoridad
  lexicon: BDAG
  rationale: La expresión marca origen o procedencia desde uno mismo, en contraste con ser enviado por otro. «De sí mismo» conserva esa relación de fuente sin imponer una glosa interpretativa más fuerte que el griego.
- source_word: λαλῶν
  english_pob_choice: speaks
  chosen_spanish: habla
  alternatives_spanish:
  - dice
  - está hablando
  lexicon: BDAG
  rationale: El participio sustantivado funciona de manera general como alguien que habla. «Habla» suena natural en español y conserva el valor verbal sin recargar el aspecto.
- source_word: δόξαν
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - honra
  - reputación
  lexicon: BDAG
  rationale: En Juan, δόξα se mantiene mejor como «gloria», por su peso teológico y su resonancia con el resto del evangelio.
- source_word: τὴν ἰδίαν
  english_pob_choice: his own
  chosen_spanish: su propia
  alternatives_spanish:
  - propia
  - personal
  lexicon: BDAG
  rationale: ἴδιος indica lo que pertenece a uno mismo. «Su propia» conserva el contraste con la gloria del que lo envió.
- source_word: ζητεῖ
  english_pob_choice: seeks
  chosen_spanish: busca
  alternatives_spanish:
  - procura
  - persigue
  lexicon: BDAG
  rationale: ζητέω puede traducirse naturalmente como «buscar». En español comunica bien la intención orientada al honor propio y mantiene el paralelo con la segunda cláusula.
- source_word: τοῦ πέμψαντος αὐτόν
  english_pob_choice: of the one who sent him
  chosen_spanish: del que lo envió
  alternatives_spanish:
  - del que le envió
  - de su enviado
  lexicon: BDAG
  rationale: El participio articular expresa a la persona que envía. «Del que lo envió» es claro, directo y conserva la relación personal central del versículo.
- source_word: οὗτος
  english_pob_choice: this one
  chosen_spanish: este
  alternatives_spanish:
  - este hombre
  - él
  lexicon: BDAG
  rationale: El demostrativo tiene fuerza enfática. «Este» la conserva en español sin volver la frase rígida.
- source_word: ἀληθής
  english_pob_choice: 'true'
  chosen_spanish: veraz
  alternatives_spanish:
  - verdadero
  - sincero
  lexicon: BDAG
  rationale: En este contexto la palabra describe integridad y confiabilidad del hablante. «Veraz» comunica mejor esa cualidad personal en español que «verdadero», que podría sonar más abstracto.
- source_word: ἀδικία
  english_pob_choice: unrighteousness
  chosen_spanish: injusticia
  alternatives_spanish:
  - maldad
  - desviación
  lexicon: BDAG
  rationale: ἀδικία abarca injusticia, falta de rectitud o conducta mala. «Injusticia» es una opción española natural y suficientemente amplia; el contexto de integridad moral permite conservar esa amplitud sin estrecharla demasiado.
- source_word: ἐν αὐτῷ οὐκ ἔστιν
  english_pob_choice: there is no unrighteousness in him
  chosen_spanish: no hay injusticia en él
  alternatives_spanish:
  - no existe injusticia en él
  - ninguna injusticia hay en él
  lexicon: BDAG
  rationale: La construcción existencial se expresa de forma natural con «no hay». Mantiene el sentido de afirmación moral interna sobre la persona mencionada.
theological_decisions:
- issue: Contraste entre hablar «de sí mismo» y buscar la gloria del que envió
  english_pob_reading: The verse contrasts self-derived, self-glorifying speech with speech aligned to the honor of the one who sent him, without importing later doctrinal categories beyond the text.
  chosen_spanish_reading: El versículo contrapone el hablar nacido de sí mismo y orientado a la propia gloria con el hablar orientado a la gloria del que envía, sin añadir categorías doctrinales ajenas al texto.
  alternative_spanish_readings:
  - hablar por su propia autoridad
  - hablar como enseñanza falsa frente a Jesús
  rationale: La traducción conserva la relación entre fuente del discurso y finalidad de honor, pero no fuerza una explicación técnica que el griego no explicita.
  doctrine_reference: Translation philosophy §§1, 3
- issue: Valor moral de ἀδικία
  english_pob_reading: unrighteousness
  chosen_spanish_reading: injusticia
  alternative_spanish_readings:
  - injusticia moral
  - maldad
  rationale: En español, «injusticia» mantiene la amplitud ética del término y no reduce la afirmación a un solo ámbito jurídico o social.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: El texto inglés auditado permanece sin cambios en la última revisión; la convergencia de revisiones fue alta y no se registraron correcciones sustantivas. Esta versión española sigue de cerca las decisiones léxicas aprobadas, conservando el contraste entre origen del խոսido/discurso, gloria propia y gloria del que envía, así como la afirmación moral final.
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque el versículo no contiene el Tetragrámaton ni una cita directa del nombre divino.
  - «Gloria» se mantiene por coherencia joánica y por el peso teológico del término.
  - «Veraz» se eligió para ἀληθής por claridad personal en español; se preserva la alternativa «verdadero» en nota.
  - «Injusticia» se usa para ἀδικία siguiendo la amplitud moral del término y la opción auditada del POB inglés.
  - El demostrativo «este» conserva el énfasis de οὗτος sin sonar forzado en español.
