revisions:
- from: El que habla de sí mismo busca su propia gloria[a]; pero el que busca la gloria del que lo envió, este es veraz[b], y no hay injusticia[c] en él.
  to: El que habla de sí mismo busca su propia gloria[a]; pero el que busca la gloria del que lo envió, este es verdadero[b], y no hay maldad[c] en él.
  rationale: Se mantienen las decisiones correctas del borrador donde este sigue de cerca el griego y el POB auditado. Se cambia «veraz» por «verdadero» para reflejar mejor ἀληθής como término joánico más amplio que la mera veracidad. Se cambia «injusticia» por «maldad» para representar mejor ἀδικία en su dimensión moral-teológica, tal como la documentación inglesa prefirió «unrighteousness» sobre opciones más estrechas. Las notas conservan las alternativas relevantes.
