translation:
  language: es
  text: —¡Miren! Está hablando abiertamente, y no le dicen nada. ¿Será posible que los dirigentes realmente sepan que este es el Mesías?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Podría ser que los dirigentes realmente sepan que este es el Cristo?»'
    reason: alternative_reading
lexical_decisions:
- source_word: ἴδε
  english_pob_choice: look
  chosen_spanish: ¡Miren!
  alternatives_spanish:
  - ¡Vean!
  - ¡Miren, pues!
  lexicon: BDAG
  rationale: La partícula exhortativa dirige la atención de los oyentes. «¡Miren!» comunica bien ese gesto discursivo en español natural y solemne, sin arcaísmo.
- source_word: παρρησίᾳ
  english_pob_choice: openly
  chosen_spanish: abiertamente
  alternatives_spanish:
  - públicamente
  - con franqueza
  - sin ocultarse
  lexicon: BDAG
  rationale: En este contexto expresa habla sin reserva y a la vista de todos. «Abiertamente» conserva esa fuerza mejor que una formulación demasiado interpretativa.
- source_word: λαλεῖ
  english_pob_choice: is speaking
  chosen_spanish: está hablando
  alternatives_spanish:
  - habla
  - está diciendo
  lexicon: BDAG
  rationale: El presente progresivo refleja la escena en desarrollo. «Está hablando» suena natural en español y mantiene el carácter observacional del comentario.
- source_word: οὐδὲν αὐτῷ λέγουσιν
  english_pob_choice: they say nothing to him
  chosen_spanish: no le dicen nada
  alternatives_spanish:
  - no le dicen nada a él
  - no dicen nada contra él
  lexicon: BDAG
  rationale: La construcción se vierte de manera directa. Se conserva el dativo con «le»; no se añade «contra él» porque el griego no lo expresa de forma explícita.
- source_word: μήποτε
  english_pob_choice: Can it be that
  chosen_spanish: ¿Será posible que
  alternatives_spanish:
  - ¿Puede ser que
  - ¿Acaso
  lexicon: BDAG
  rationale: Aquí introduce una inferencia cautelosa y sorprendida, no una negación tajante. «¿Será posible que?» reproduce bien ese matiz de conjetura asombrada.
- source_word: ἀληθῶς
  english_pob_choice: truly
  chosen_spanish: realmente
  alternatives_spanish:
  - de veras
  - verdaderamente
  lexicon: BDAG
  rationale: Adverbio de afirmación enfática. «Realmente» encaja con el tono coloquial-serio de la pregunta sin perder peso.
- source_word: ἔγνωσαν
  english_pob_choice: know
  chosen_spanish: sepan
  alternatives_spanish:
  - han sabido
  - conozcan
  lexicon: BDAG
  rationale: Aunque el aoristo apunta al saber llegado a un punto, en español la pregunta indirecta suena más natural con un presente de subjuntivo dependiente de la duda. Mantiene el sentido de haber llegado al conocimiento en cuestión.
- source_word: οἱ ἄρχοντες
  english_pob_choice: the rulers
  chosen_spanish: los gobernantes
  alternatives_spanish:
  - las autoridades
  - los líderes
  lexicon: BDAG
  rationale: «ἄρχοντες» nombra a quienes ejercen autoridad; «gobernantes» comunica esa función en español sin exigir una precisión institucional mayor que la del contexto.
- source_word: ὅτι οὗτός ἐστιν ὁ χριστός
  english_pob_choice: that this is the Messiah
  chosen_spanish: que este es el Mesías
  alternatives_spanish:
  - que este es el Cristo
  lexicon: BDAG
  rationale: Se traduce Χριστός como título mesiánico con «Mesías», conforme a la pauta doctrinal del proyecto y al contexto judío de la pregunta. «Cristo» se reserva solo cuando el uso funciona ya como forma fija o nombre.
theological_decisions:
- issue: Rendering of Χριστός as title
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - el Cristo
  rationale: En esta pregunta, Χριστός funciona como título de expectativa mesiánica, no como nombre litúrgico fijo. «Mesías» preserva el trasfondo judío y la carga teológica del término.
  doctrine_reference: 'DOCTRINE.md: Χριστός → ''Mesías'' cuando es título; ''Cristo'' cuando es forma fija o nombre-like'
- issue: Matiz de μήποτε en pregunta retórica
  english_pob_reading: Can it be that
  chosen_spanish_reading: ¿Será posible que…?
  alternative_spanish_readings:
  - ¿Acaso…?
  - ¿Puede ser que…?
  rationale: La partícula expresa una inferencia tentativa y asombrada. La formulación elegida conserva la duda sorprendente sin convertirla en una negación directa.
  doctrine_reference: BDAG / uso pragmático de μήποτε en interrogativas
translation_notes:
  revision_awareness: El audit trail inglés muestra una oscilación interna entre «Christ» y «Messiah», con restauración final de «Messiah» por política doctrinal. La versión española sigue esa lectura final y la explicita como «Mesías», manteniendo la tensión lexical documentada y sin imponer una transliteración cristianizante innecesaria.
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque no hay aquí un tetragrama o una cita directa del nombre divino.
  - «Gobernantes» conserva la referencia a autoridades dirigentes sin introducir especificación institucional no presente en el griego.
  - La pregunta se mantiene abierta y retórica; no se suaviza ni se vuelve una afirmación.
  - Se usa puntuación española con signo de interrogación inicial y final; el guion largo solo introduce la exclamación discursiva.
