translation:
  language: es
  text: Pero cuando sus hermanos habían subido a la fiesta[a], entonces él también subió, no abiertamente, sino como si fuera en secreto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sino en secreto». La expresión griega dice literalmente «sino como en secreto», lo que puede suavizar un poco la afirmación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὡς δὲ
  english_pob_choice: But when
  chosen_spanish: Pero cuando
  alternatives_spanish:
  - Ahora cuando
  - Y cuando
  lexicon: BDAG
  rationale: Ὡς con el verbo aoristo introduce una cláusula temporal ('cuando'); δέ aporta una transición suave o contraste. 'Pero cuando' conserva ambas cosas en español natural, y mantiene el enlace con el contexto narrativo anterior.
- source_word: ἀνέβησαν ... ἀνέβη
  english_pob_choice: had gone up ... went up
  chosen_spanish: habían subido ... subió
  alternatives_spanish:
  - subieron ... subió
  - habían ido ... fue
  lexicon: BDAG
  rationale: ἀναβαίνω significa literalmente 'subir' y aquí puede aludir al ascenso geográfico a Jerusalén y al lenguaje de peregrinación. El pluscuamperfecto en la primera forma ayuda a mostrar la secuencia temporal; la segunda queda en pretérito simple. 'Subir' preserva mejor el verbo fuente que 'ir'.
- source_word: οἱ ἀδελφοὶ αὐτοῦ
  english_pob_choice: his brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - sus hermanos y hermanas
  - sus parientes
  lexicon: BDAG
  rationale: En este contexto inmediato, ἀδελφοί se refiere específicamente a los hermanos varones de Jesús. 'Sus hermanos' es preciso y no amplía indebidamente el referente.
- source_word: εἰς τὴν ἑορτήν
  english_pob_choice: to the feast
  chosen_spanish: a la fiesta
  alternatives_spanish:
  - a la festividad
  - a la celebración
  lexicon: BDAG
  rationale: ἑορτή designa una fiesta religiosa; en este pasaje se trata de una peregrinación festiva concreta. 'Fiesta' es natural en español y mantiene el sentido del texto sin explicitar más de lo que el versículo dice.
- source_word: τότε καὶ αὐτὸς
  english_pob_choice: then he also
  chosen_spanish: entonces él también
  alternatives_spanish:
  - luego él también
  - entonces también él
  lexicon: BDAG
  rationale: τότε marca posterioridad temporal y καὶ αὐτός añade que Jesús igualmente fue. 'Entonces él también' conserva la secuencia y el énfasis aditivo.
- source_word: οὐ φανερῶς
  english_pob_choice: not openly
  chosen_spanish: no abiertamente
  alternatives_spanish:
  - no públicamente
  - no en público
  lexicon: BDAG
  rationale: φανερῶς significa abiertamente, públicamente, de manera visible. 'No abiertamente' es una equivalencia directa y clara en español.
- source_word: ἀλλὰ ὡς ἐν κρυπτῷ
  english_pob_choice: but as if in secret
  chosen_spanish: sino como en secreto
  alternatives_spanish:
  - sino como si estuviera en secreto
  - sino privadamente
  lexicon: BDAG
  rationale: La expresión griega ὡς ἐν κρυπτῷ tiene una leve cualificación por ὡς, que puede suavizar a 'como'. En español, 'sino como en secreto' conserva la comparación sin forzar una paráfrasis más larga. Se evita resolver la tensión entre 'en secreto' y 'como en secreto' dentro del texto principal.
theological_decisions:
- issue: Relación entre esta acción de Jesús y su declaración previa de no subir a la fiesta
  english_pob_reading: Translate the verse straightforwardly without harmonizing; Jesus went up later and not openly.
  chosen_spanish_reading: 'Traducir el versículo de manera directa: Jesús subió después y no abiertamente.'
  alternative_spanish_readings:
  - Jesús cambió de parecer y subió
  - Jesús subió de otra manera para armonizar el pasaje
  rationale: El griego narra simplemente que, después de que subieron sus hermanos, Jesús también subió, pero no abiertamente. La traducción conserva la tensión narrativa sin intentar resolverla por paráfrasis o armonización.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El pasaje fue revisado y quedó sin cambios sustantivos en la última pasada; la presente redacción sigue de cerca el texto griego y el criterio auditado de mantener la tensión narrativa.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni una cita directa del nombre divino.
  - '''Cristo'' no aparece en el versículo; no se aplica ninguna decisión de título mesiánico aquí.'
  - Se conserva la distinción entre 'abiertamente' y 'como en secreto' para reflejar el contraste del griego con la menor precisión posible en español.
