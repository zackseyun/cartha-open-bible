base_translation:
  language: en
  yaml_path: translation/nt/john/007/032.yaml
  text: The Pharisees heard the crowd muttering these things about him[c][b][a], and the chief priests and the Pharisees sent officers to seize him.
  footnotes:
  - marker: a
    text: Or 'grumbling' or 'murmuring.' The Greek suggests subdued, discontented talk.
    reason: lexical_alternative
  - marker: b
    text: Or 'temple police' or 'guards' for 'officers.' The Greek refers to official attendants sent by the Jewish authorities.
    reason: lexical_alternative
  - marker: c
    text: Or 'to arrest him.' The Greek more literally says 'to seize him.'
    reason: lexical_alternative
