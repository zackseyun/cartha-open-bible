review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja correctamente la estructura y el sentido general del griego: los fariseos se enteran del murmullo de la multitud acerca de Jesús, y luego los principales sacerdotes y los fariseos envían agentes para aprehenderlo. Sin embargo, hay un desajuste sintáctico importante: Ἤκουσαν ... τοῦ ὄχλου γογγύζοντος ... ταῦτα significa que oyeron a la multitud murmurando estas cosas, no simplemente que oyeron que la multitud murmuraba. Además, el orden de las notas heredadas del inglés quedó mal aplicado: la nota [c] en español comenta «prenderlo», pero en el texto inglés [c] estaba anclada antes a otra frase; conviene normalizar el anclaje en español según el contenido real de cada nota.'
  spanish_quality_summary: El español es claro y bastante natural, con tono bíblico moderno y digno. «Murmuraba», «acerca de él», «principales sacerdotes» y «prenderlo» son opciones defendibles. No obstante, «oyeron que la multitud murmuraba» debilita el matiz de percepción directa del participio griego y suena un poco más indirecto de lo necesario. Una leve reestructuración mejora fidelidad y fluidez.
  glossary_alignment: No hay términos de glosario mayor en disputa en este versículo. «Principales sacerdotes» alinea bien con οἱ ἀρχιερεῖς. «Oficiales» para ὑπηρέτας es aceptable y coincide con la decisión documentada, con nota que preserva «guardias del templo/guardias». «Prenderlo» conserva bien la fuerza de πιάσωσιν.
  issues:
  - severity: medium
    issue: La construcción «oyeron que la multitud murmuraba» no refleja con precisión τοῦ ὄχλου γογγύζοντος.
    rationale: El griego presenta a «la multitud» como aquello que los fariseos oyeron en acto de murmurar, no como una proposición subordinada con «que». «Oyeron a la multitud murmurar» o «oyeron a la multitud murmurando» conserva mejor la sintaxis y el matiz.
  - severity: low
    issue: La nota [a] ofrece «murmuraba» como alternativa a una palabra ya traducida como «murmuraba».
    rationale: La nota no añade una alternativa real. Conviene conservar alternativas diferenciadas, como «refunfuñaba» o «murmuraba en voz baja», o reformular la nota para evitar repetición inútil.
  - severity: low
    issue: El anclaje y contenido de las notas deben ordenarse con claridad en el texto español.
    rationale: 'Las notas existen, pero es mejor anclarlas exactamente donde corresponden en español: sobre «murmurando/murmurar», «oficiales» y «prenderlo», con marcadores únicos y coherentes.'
  revised_spanish_text: Los fariseos oyeron a la multitud murmurar[a] estas cosas acerca de él, y los principales sacerdotes y los fariseos enviaron oficiales[b] para prenderlo[c].
  revised_footnotes:
