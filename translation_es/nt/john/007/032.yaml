revisions:
- from: Los fariseos oyeron que la multitud murmuraba[a] estas cosas acerca de él, y los principales sacerdotes y los fariseos enviaron oficiales[b] para prenderlo[c].
  to: Los fariseos oyeron a la multitud murmurar[a] estas cosas acerca de él, y los principales sacerdotes y los fariseos enviaron oficiales[b] para prenderlo[c].
  rationale: La revisión corrige la relación sintáctica entre «oyeron» y «la multitud», ajustándola mejor al participio griego γογγύζοντος. También depura la nota léxica de «murmurar» para que ofrezca alternativas reales y mantiene las decisiones documentadas de «oficiales» y «prenderlo».
