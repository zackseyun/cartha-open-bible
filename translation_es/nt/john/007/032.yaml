translation:
  language: es
  text: Los fariseos oyeron a la multitud murmurar[a] estas cosas acerca de él, y los principales sacerdotes y los fariseos enviaron oficiales[b] para prenderlo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «refunfuñar» o «murmurar en voz baja». El griego sugiere un hablar contenido y descontento.
    reason: lexical_alternative
  - marker: b
    text: O «guardias del templo» o «guardias» para «oficiales». El griego se refiere a asistentes oficiales enviados por las autoridades judías.
    reason: lexical_alternative
  - marker: c
    text: O «para arrestarlo». El griego dice más literalmente «para prenderlo».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἤκουσαν
  english_pob_choice: heard
  chosen_spanish: oyeron
  alternatives_spanish:
  - escucharon
  lexicon: BDAG
  rationale: El aoristo de ἀκούω aquí indica que recibieron la noticia; «oyeron» comunica mejor ese valor que «escucharon», que puede sonar más activo o intencional.
- source_word: τοῦ ὄχλου
  english_pob_choice: the crowd
  chosen_spanish: la multitud
  alternatives_spanish:
  - la gente
  - el gentío
  lexicon: BDAG
  rationale: ὄχλος suele referirse al grupo reunido. «Multitud» es natural en español bíblico moderno y conserva el sentido colectivo del griego.
- source_word: γογγύζοντος
  english_pob_choice: muttering
  chosen_spanish: murmuraba
  alternatives_spanish:
  - refunfuñaba
  - murmuraba en voz baja
  lexicon: BDAG
  rationale: El participio expresa habla baja y descontenta. «Murmuraba» preserva esa ambigüedad entre queja contenida y comentario bajo sin cargar demasiado el tono.
- source_word: περὶ αὐτοῦ
  english_pob_choice: about him
  chosen_spanish: acerca de él
  alternatives_spanish:
  - sobre él
  - con respecto a él
  lexicon: BDAG
  rationale: «Acerca de él» es una equivalencia directa y natural para περί con genitivo en este contexto.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  lexicon: BDAG
  rationale: El plural neutro se refleja mejor con «estas cosas» que con un singular resumido como «esto».
- source_word: ἀπέστειλαν
  english_pob_choice: sent
  chosen_spanish: enviaron
  alternatives_spanish:
  - mandaron
  - despacharon
  lexicon: BDAG
  rationale: «Enviaron» es la forma más natural en español y conserva el sentido básico de ἀποστέλλω sin añadir matices no presentes.
- source_word: οἱ ἀρχιερεῖς
  english_pob_choice: the chief priests
  chosen_spanish: los principales sacerdotes
  alternatives_spanish:
  - los sumos sacerdotes
  - los jefes de los sacerdotes
  lexicon: BDAG
  rationale: Aunque «chief priests» suele corresponder a «principales sacerdotes» o «sumos sacerdotes», aquí se prefirió «principales sacerdotes» para mantener un español claro y respetar el plural de la referencia al liderazgo sacerdotal.
- source_word: ὑπηρέτας
  english_pob_choice: officers
  chosen_spanish: oficiales
  alternatives_spanish:
  - guardias
  - servidores
  lexicon: BDAG
  rationale: En el contexto joánico se trata de asistentes u oficiales enviados por las autoridades judías. «Oficiales» conserva la función institucional sin estrechar el sentido a «guardias» o diluirlo en «servidores».
- source_word: ἵνα πιάσωσιν αὐτόν
  english_pob_choice: to seize him
  chosen_spanish: para prenderlo
  alternatives_spanish:
  - para arrestarlo
  - para sujetarlo
  lexicon: BDAG
  rationale: πιάζω significa literalmente «agarrar/capturar» y en este contexto apunta a una aprehensión. «Prenderlo» transmite bien el acto de capturarlo y mantiene más cerca la fuerza concreta del verbo que «arrestarlo».
theological_decisions:
- issue: Naturaleza de la misión de los ὑπηρέτας
  english_pob_reading: official officers under the authority of the chief priests and Pharisees
  chosen_spanish_reading: oficiales bajo la autoridad de los principales sacerdotes y los fariseos
  alternative_spanish_readings:
  - guardias del templo
  - servidores
  rationale: La escena describe una acción institucional para aprehender a Jesús. «Oficiales» preserva la función pública/autoritaria sin sobreespecificar más de lo que el griego exige.
  doctrine_reference: Contexto histórico-narrativo; no doctrinal.
translation_notes:
  revision_awareness: El texto español sigue el estado revisado más reciente sin cambios respecto del acuerdo alto del control cruzado; se mantuvo la equivalencia óptima del audit trail inglés, con ajustes idiomáticos naturales para el español.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, aunque este versículo no contiene el Tetragrámaton.
  - «Mesías/Cristo» no aparece en este versículo.
  - Se preservó la fuerza concreta de πιάζω con «prenderlo», evitando suavizarlo a una mera referencia jurídica.
  - «Principales sacerdotes» refleja el plural institucional de ἀρχιερεῖς sin convertirlo en un singular titular.
