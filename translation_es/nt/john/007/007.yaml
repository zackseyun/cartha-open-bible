translation:
  language: es
  text: El mundo no es capaz de odiarlos[a], pero a mí me odia[b][c][d], porque yo doy testimonio acerca de él de que sus obras son malvadas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no puede odiarlos».
    reason: lexical_alternative
  - marker: b
    text: En Juan, «el mundo» suele referirse al orden humano en oposición a Dios, no a la creación material en sí.
    reason: cultural_note
  - marker: c
    text: O «testifico acerca de él».
    reason: lexical_alternative
  - marker: d
    text: O «sus obras son malas».
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ δύναται
  english_pob_choice: is not able
  chosen_spanish: no puede
  alternatives_spanish:
  - no es capaz de
  - no puede llegar a
  lexicon: BDAG
  rationale: δύναμαι expresa capacidad; en español, «no puede» comunica de modo natural e inmediato la imposibilidad. «No es capaz de» preserva más explícitamente la idea de capacidad, pero suena menos ágil en este contexto.
- source_word: ὁ κόσμος
  english_pob_choice: the world
  chosen_spanish: el mundo
  alternatives_spanish:
  - el sistema del mundo
  - la humanidad
  lexicon: BDAG
  rationale: Se mantiene «el mundo» como traducción directa y transparente de κόσμος, conservando la carga joánica de la esfera humana en oposición a Dios sin explicitarla en el cuerpo principal.
- source_word: μισεῖν / μισεῖ
  english_pob_choice: hate / hates
  chosen_spanish: odiar / odia
  alternatives_spanish:
  - aborrecer / aborrece
  - odiar profundamente / odia profundamente
  lexicon: BDAG
  rationale: «Odiar» transmite con claridad el fuerte contraste retórico del griego μισέω. En español contemporáneo es la equivalencia natural y no atenúa la fuerza del verbo.
- source_word: ἐμὲ δὲ
  english_pob_choice: but it hates me
  chosen_spanish: pero a mí me odia
  alternatives_spanish:
  - pero me odia a mí
  - sin embargo, a mí me odia
  lexicon: BDAG
  rationale: La partícula δέ marca contraste; en español se expresa con «pero». El orden «a mí me» conserva el énfasis del pronombre acusativo y la fuerza contrastiva del griego.
- source_word: μαρτυρῶ
  english_pob_choice: I testify
  chosen_spanish: doy testimonio
  alternatives_spanish:
  - testifico
  - soy testigo
  lexicon: BDAG
  rationale: «Dar testimonio» es una equivalencia natural en español bíblico y preserva el matiz forense de μαρτυρέω. «Testifico» sería posible, pero menos idiomático para esta formulación.
- source_word: περὶ αὐτοῦ
  english_pob_choice: about it
  chosen_spanish: acerca de él
  alternatives_spanish:
  - sobre él
  - acerca de eso
  lexicon: BDAG
  rationale: Aunque κόσμος es conceptualmente impersonal en el contexto, en español «él» mantiene la referencia gramatical del sustantivo sin forzar una personalización doctrinal. «Acerca de él» refleja περὶ con naturalidad.
- source_word: τὰ ἔργα αὐτοῦ
  english_pob_choice: its works
  chosen_spanish: sus obras
  alternatives_spanish:
  - sus hechos
  - sus acciones
  lexicon: BDAG
  rationale: «Obras» conserva la resonancia bíblica y joánica de ἔργα mejor que «hechos» o «acciones», y permite mantener el juicio moral del versículo.
- source_word: πονηρά
  english_pob_choice: evil
  chosen_spanish: malas
  alternatives_spanish:
  - malvadas
  - malignas
  - malas en sentido moral
  lexicon: BDAG
  rationale: En español, «malas» funciona como equivalente natural y mantiene el juicio moral sin sonar excesivamente abstracto o arcaico. «Malvadas» sería más fuerte, pero menos sobria en este contexto.
theological_decisions:
- issue: Sentido de κόσμος en Juan 7:7
  english_pob_reading: Retain 'the world' without interpretive expansion
  chosen_spanish_reading: Mantener «el mundo» sin ampliar en el texto principal
  alternative_spanish_readings:
  - el sistema del mundo
  - la humanidad en rebelión contra Dios
  rationale: El pasaje conserva la tensión joánica entre el mundo y Jesús sin definirla por completo. La traducción española mantiene esa ambigüedad teológica, dejando la explicación para una nota y no para el cuerpo del texto.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: No se registraron revisiones aplicadas en el expediente inglés; el pasaje fue confirmado en la última pasada como sin cambios necesarios, con alta concordancia en la revisión cruzada.
  spanish_consistency_notes:
  - Se mantuvo «el mundo» para κόσμος, en línea con la práctica POB y con la nota explicativa sobre su carga joánica.
  - Se usó «dar testimonio» para μαρτυρῶ, por ser la opción española más natural y fiel al valor testimonial.
  - Se optó por «obras» para ἔργα y «malas» para πονηρά, conservando el juicio moral sin intensificarlo más allá del texto.
