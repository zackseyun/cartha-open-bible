review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura y el sentido básico del griego: un subgrupo quería apoderarse de Jesús, pero nadie efectivamente lo hizo. También preserva bien el contraste δὲ / ἀλλ’. Sin embargo, la colocación de las notas no sigue el contenido al que corresponden, y la frase final en español suena poco natural para el modismo griego.'
  spanish_quality_summary: «Pero algunos de ellos querían prenderlo» es claro y fiel. El problema principal es «echó mano sobre él», que suena forzado en español moderno; formas más naturales y dignas serían «le puso las manos encima» o «le echó mano». Dado que el inglés POB conserva el modismo ‘laid hands on him’, conviene mantener un modismo español natural equivalente.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Prenderlo» es aceptable para πιάσαι en este contexto, aunque «apresarlo» también sería posible. No intervienen términos sensibles como Yahvé, Mesías, esclavo, etc.
  issues:
  - severity: medium
    issue: Las notas [a] y [b] están ancladas al término equivocado.
    rationale: La nota sobre «prenderlo» debe anclarse a «prenderlo», mientras que la alternativa «de entre ellos» debe anclarse a «de ellos». El borrador invierte ese orden.
  - severity: medium
    issue: «Nadie echó mano sobre él» es una expresión poco natural en español.
    rationale: Aunque intenta reflejar el modismo griego, «echar mano sobre» no es una formulación idiomática normal en español contemporáneo. «Nadie le puso las manos encima» preserva mejor la fuerza idiomática y la legibilidad.
  revised_spanish_text: Pero algunos[a] de ellos querían prenderlo[b], aunque nadie le puso las manos encima.
