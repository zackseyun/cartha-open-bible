translation:
  language: es
  text: Pero algunos[a] de ellos querían prenderlo[b], aunque nadie le puso las manos encima.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de entre ellos».
    reason: lexical_alternative
  - marker: b
    text: «Prenderlo» también puede entenderse como «arrestarlo».
    reason: lexical_alternative
lexical_decisions:
- source_word: τινὲς
  english_pob_choice: some
  chosen_spanish: algunos
  alternatives_spanish:
  - unos
  lexicon: BDAG
  rationale: El indefinido plural señala a un subgrupo no identificado dentro del grupo mayor. «Algunos» conserva esa indefinición de modo natural en español.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Ahora bien
  - Y
  lexicon: BDAG
  rationale: La partícula introduce contraste con la reacción previa de la multitud. «Pero» expresa bien el valor adversativo en español.
- source_word: ἤθελον
  english_pob_choice: wanted
  chosen_spanish: querían
  alternatives_spanish:
  - querían hacerlo
  - deseaban
  lexicon: BDAG
  rationale: El imperfecto comunica intención en curso o persistente. «Querían» reproduce ese matiz con naturalidad sin cargar de más el aspecto.
- source_word: ἐξ αὐτῶν
  english_pob_choice: of them
  chosen_spanish: de ellos
  alternatives_spanish:
  - de entre ellos
  - entre ellos
  lexicon: BDAG
  rationale: La construcción indica un subgrupo surgido del conjunto. «De ellos» es breve y claro; «de entre ellos» explicita mejor el matiz de procedencia.
- source_word: πιάσαι
  english_pob_choice: to seize
  chosen_spanish: prenderlo
  alternatives_spanish:
  - apresarlo
  - arrestarlo
  - asirlo
  lexicon: BDAG
  rationale: En contexto joánico la acción es hostil y con probable intención de arresto. «Prenderlo» comunica esa fuerza en español y puede abarcar la idea de arrestarlo sin reducirla solo a un matiz policial técnico.
- source_word: οὐδεὶς
  english_pob_choice: no one
  chosen_spanish: nadie
  alternatives_spanish:
  - ninguno
  lexicon: BDAG
  rationale: La negación personal en español fluye mejor con «nadie» y preserva el sentido universal negativo.
- source_word: ἐπέβαλεν ἐπ’ αὐτὸν τὰς χεῖρας
  english_pob_choice: laid hands on him
  chosen_spanish: echó mano sobre él
  alternatives_spanish:
  - puso las manos sobre él
  - le echó mano
  lexicon: BDAG
  rationale: La expresión griega es idiomática para ejercer captura o aprehensión con intención hostil. «Echar mano sobre él» mantiene la imagen idiomática y sugiere el intento de sujetarlo/apresarlo mejor que una traducción demasiado literal.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el griego SBLGNT y coincide con la línea general del POB en inglés: contraste adversativo, subgrupo indefinido, intento de captura y fracaso de la acción. Se conserva el matiz idiomático de «laid hands on him» mediante una equivalencia natural en español, sin borrar la posible lectura de arresto explícita.'
  spanish_consistency_notes:
  - Se mantuvo un español bíblico claro y contemporáneo, sin calcos innecesarios.
  - Se evitó «SEÑOR» u otras sustituciones no presentes en el pasaje.
  - Las notas recogen las alternativas relevantes que en inglés aparecían como glosas lexicográficas y que en español también generan elección interpretativa.
