  rationale: La revisión es menor y no cambia el sentido básico. Ajusta el conector narrativo para reflejar mejor οὖν y reemplaza una expresión española potencialmente ambigua por una locución más precisa para el idiomatismo griego de prender a alguien. Se conservan 'prenderlo' y 'su hora', que están bien fundamentados por la evidencia y la audit trail inglesa.
