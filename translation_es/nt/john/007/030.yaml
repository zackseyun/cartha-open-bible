base_translation:
  language: en
  yaml_path: translation/nt/john/007/030.yaml
  text: So they were seeking to seize him[a], yet no one laid a hand on him[b], because his hour had not yet come.
  footnotes:
  - marker: a
    text: Or 'they were trying to arrest him.' The Greek verb can mean 'to seize,' and in context this likely implies arrest.
    reason: lexical_alternative
  - marker: b
    text: '''His hour'' is a recurring expression in John for the divinely appointed time in Jesus'' mission, especially his suffering, death, resurrection, and glorification.'
    reason: cross_reference
