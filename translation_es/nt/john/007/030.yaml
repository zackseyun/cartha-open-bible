translation:
  language: es
  text: Entonces procuraban prenderlo[a], pero nadie le echó mano[b], porque todavía no había llegado su hora.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'intentaban arrestarlo'. El verbo griego puede significar 'prender' o 'apresar', y en este contexto probablemente implica arresto.
    reason: lexical_alternative
  - marker: b
    text: '''Su hora'' es una expresión recurrente en Juan para el tiempo señalado por Dios en la misión de Jesús, especialmente su sufrimiento, muerte, resurrección y glorificación.'
    reason: cross_reference
lexical_decisions:
- source_word: ἐζήτουν
  english_pob_choice: they were seeking
  chosen_spanish: procuraban
  alternatives_spanish:
  - buscaban
  - intentaban
  lexicon: BDAG
  rationale: El imperfecto expresa una acción շարունակada o reiterada; en español, 'procuraban' comunica bien la idea de esfuerzo insistente y evita la dureza de una simple forma puntual. 'Buscaban' sería más neutro, pero menos enfático respecto de la intención de aprehenderlo.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - por tanto
  - entonces
  lexicon: BDAG
  rationale: Marca continuidad narrativa e inferencia. 'Así que' suena natural en español moderno y conserva el nexo sin volverlo demasiado formal.
- source_word: πιάσαι
  english_pob_choice: to seize
  chosen_spanish: prenderlo
  alternatives_spanish:
  - aprehenderlo
  - arrestarlo
  lexicon: BDAG
  rationale: El verbo griego puede significar 'asir' o 'apresar'; en este contexto, 'prenderlo' recoge bien la idea de tomarlo por la fuerza y permite la implicación de arresto sin imponerla como única lectura. 'Arrestarlo' explicita más de lo que el verbo por sí solo dice.
- source_word: οὐδεὶς
  english_pob_choice: no one
  chosen_spanish: nadie
  alternatives_spanish:
  - ninguno
  lexicon: BDAG
  rationale: Equivalente natural e idiomático del pronombre indefinido negativo.
- source_word: ἐπέβαλεν ἐπ’ αὐτὸν τὴν χεῖρα
  english_pob_choice: laid a hand on him
  chosen_spanish: le puso la mano encima
  alternatives_spanish:
  - le echó mano
  - lo tocó
  lexicon: BDAG
  rationale: La expresión griega es idiomática para tomarlo o aprehenderlo. 'Le puso la mano encima' conserva la singularidad de 'la mano' y reproduce un giro español natural; 'le echó mano' es posible, pero suena más regional y menos neutro.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Introduce la razón de que nadie actuara. 'Porque' es claro, directo y fiel al valor causal.
- source_word: οὔπω
  english_pob_choice: not yet
  chosen_spanish: todavía no
  alternatives_spanish:
  - aún no
  lexicon: BDAG
  rationale: Ambas opciones son correctas; 'todavía no' suena muy natural en español y mantiene la negación temporal progresiva.
- source_word: ἐληλύθει
  english_pob_choice: had come
  chosen_spanish: había llegado
  alternatives_spanish:
  - había venido
  - había arribado
  lexicon: BDAG
  rationale: El pluscuamperfecto de ἔρχομαι pide una forma pasada anterior. 'Había llegado' es la equivalencia más natural en español y mantiene la imagen de arribo sin sobrecargarla.
- source_word: ἡ ὥρα αὐτοῦ
  english_pob_choice: his hour
  chosen_spanish: su hora
  alternatives_spanish:
  - la hora señalada para él
  - su tiempo
  lexicon: BDAG
  rationale: Se conserva el término técnico johánico 'hora' en lugar de diluirlo en 'tiempo'. El posesivo 'su' mantiene la referencia a Jesús y permite la carga teológica del evangelio de Juan.
theological_decisions:
- issue: Sentido de 'su hora' en Juan
  english_pob_reading: Retain the literal expression 'his hour' in the main text without expanding it.
  chosen_spanish_reading: Conservar 'su hora' en el texto principal sin explicitarla como 'muerte' o 'arresto'.
  alternative_spanish_readings:
  - su tiempo
  - la hora señalada para su muerte
  rationale: En Juan, 'la hora' es un término teológico recurrente y no se debe reducir en esta cláusula a un solo acontecimiento. 'Su hora' preserva la tensión literaria y teológica del pasaje, dejando que el contexto joánico la desarrolle.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: 'Coincide con la última pasada de revisión: no hubo cambios necesarios tras la comprobación cruzada de alta concordancia.'
  spanish_consistency_notes:
  - Se mantiene 'Jesús' solo cuando el contexto lo explicita; aquí el referente pronominal 'lo' y 'su' siguen el flujo narrativo inmediato de Juan.
  - Se conserva 'hora' como término técnico johánico, evitando reemplazarlo por 'tiempo' en el cuerpo principal.
  - La opción verbal 'prenderlo' equilibra naturalidad española y fuerza semántica del griego sin cerrar indebidamente la implicación jurídica.
