  - severity: medium
    issue: Expresión 'le puso la mano encima'
    rationale: Aunque gramaticalmente posible, en español amplio suele sugerir agresión física o abuso. El griego alude idiomáticamente a echar mano de alguien para prenderlo; 'nadie le echó mano' comunica mejor ese matiz.
