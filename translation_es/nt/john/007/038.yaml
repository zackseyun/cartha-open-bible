translation:
  language: es
  text: El que cree en mí[a], tal como ha dicho la Escritura, de su vientre[b] fluirán ríos de agua viva.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de dentro de él»; algunos entienden que «su» se refiere al Mesías, y no al creyente.'
    reason: alternative_reading
  - marker: b
    text: 'Griego: «vientre» o «útero»; aquí probablemente es una expresión figurada del interior de la persona.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ πιστεύων
  english_pob_choice: The one who believes
  chosen_spanish: El que cree
  alternatives_spanish:
  - El que cree
  - Quien cree
  - El creyente
  lexicon: BDAG
  rationale: 'El participio articular griego funciona como un sustantivo: una persona caracterizada por creer. En español, «el que cree» conserva bien ese valor singular y general sin perder naturalidad.'
- source_word: εἰς ἐμέ
  english_pob_choice: in me
  chosen_spanish: en mí
  alternatives_spanish:
  - en mí
  - hacia mí
  - en dirección a mí
  lexicon: BDAG
  rationale: Con πιστεύω, εἰς expresa confianza personal dirigida a Jesús. «En mí» es la forma española idiomática y fiel al valor relacional de la construcción.
- source_word: καθὼς εἶπεν ἡ γραφή
  english_pob_choice: just as the Scripture has said
  chosen_spanish: tal como ha dicho la Escritura
  alternatives_spanish:
  - como ha dicho la Escritura
  - tal como dijo la Escritura
  lexicon: BDAG
  rationale: La fórmula introduce un respaldo escritural. «La Escritura» conserva el singular enfático de ἡ γραφή, y el perfecto español «ha dicho» reproduce naturalmente la fuerza vigente de la cita.
- source_word: ποταμοὶ
  english_pob_choice: rivers
  chosen_spanish: ríos
  alternatives_spanish:
  - ríos
  - corrientes
  - arroyos
  lexicon: BDAG
  rationale: ποταμοί denota ríos, no corrientes pequeñas. «Ríos» mantiene la imagen de abundancia y fuerza del original.
- source_word: ἐκ τῆς κοιλίας αὐτοῦ
  english_pob_choice: from his belly
  chosen_spanish: de su interior
  alternatives_spanish:
  - de su vientre
  - de su interior
  - desde dentro de él
  lexicon: BDAG
  rationale: κοιλία puede significar literalmente «vientre» o «vientre/útero», pero aquí funciona como imagen del centro interno de la persona. «De su interior» comunica esa metáfora de manera natural en español y evita una lectura meramente anatómica.
- source_word: ῥεύσουσιν
  english_pob_choice: will flow
  chosen_spanish: fluirán
  alternatives_spanish:
  - fluirán
  - correrán
  - brotarán
  lexicon: BDAG
  rationale: El futuro activo indica movimiento continuo. «Fluirán» es la equivalencia más directa y sobria en español.
- source_word: ὕδατος ζῶντος
  english_pob_choice: living water
  chosen_spanish: agua viva
  alternatives_spanish:
  - agua viva
  - agua que da vida
  - agua corriente
  lexicon: BDAG
  rationale: «Agua viva» preserva la expresión joánica establecida y su resonancia teológica, mejor que una paráfrasis explicativa.
theological_decisions:
- issue: Referente de αὐτοῦ en «de su interior»
  english_pob_reading: The pronoun refers to the believer, so the rivers flow from the one who believes.
  chosen_spanish_reading: El pronombre se entiende primariamente del creyente, de modo que los ríos fluyen desde su interior.
  alternative_spanish_readings:
  - El pronombre se refiere al Mesías/Jesús, de modo que los ríos fluyen desde él.
  - El pronombre queda intencionalmente ambiguo entre el creyente y el Mesías.
  rationale: La referencia más cercana es «el que cree», por lo que la lectura primaria es el creyente. Aun así, la tradición interpretativa admite la posibilidad de referirlo al Mesías; esa tensión se conserva en la nota.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Valor de κοιλία
  english_pob_reading: Greek 'belly' or 'womb'; here likely a figurative expression for the inner self.
  chosen_spanish_reading: «Interior» entiende κοιλία como una expresión figurada del centro interno de la persona.
  alternative_spanish_readings:
  - «Vientre»
  - «Útero»
  - «Dentro de él»
  rationale: En español, «vientre» puede sonar demasiado físico y «útero» sería inadecuado para el contexto. «Interior» conserva el sentido figurado y la claridad lectora.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: La redacción sigue el tramo revisado del auditorio inglés en cuanto a la cita escritural en presente perfecto («ha dicho») y preserva la tensión documentada sobre κοιλία. Frente a la oscilación inglesa entre «inner being» y «belly», el español opta por «su interior» para mantener la metáfora sin introducir una imagen corporal demasiado marcada.
  spanish_consistency_notes:
  - Se usa «Jesús» solo en la nota implícita de referencia, no en el texto, porque el versículo no lo nombra explícitamente.
  - Se mantiene «Escritura» en singular, conforme al uso joánico y al inglés auditado.
  - «Agua viva» se conserva como término técnico y teológicamente cargado en el corpus de Juan.
  - «En mí» traduce πιστεύω con εἰς sin calco artificioso, pero sin perder la dirección personal de la fe.
