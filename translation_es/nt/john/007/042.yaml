translation:
  language: es
  text: ¿No ha dicho la Escritura que el Mesías viene de la descendencia de David y de Belén[a], la aldea donde estaba David?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el Cristo». El griego dice ὁ χριστός.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἡ γραφή
  english_pob_choice: the Scripture
  chosen_spanish: la Escritura
  alternatives_spanish:
  - la escritura
  - las Escrituras
  lexicon: BDAG
  rationale: En este contexto juánico, ἡ γραφή designa la autoridad escritural como testimonio singular. En español, «la Escritura» conserva ese uso idiomático y mantiene la referencia a un pasaje autorizado.
- source_word: εἶπεν
  english_pob_choice: has ... said
  chosen_spanish: ha dicho
  alternatives_spanish:
  - dijo
  lexicon: BDAG
  rationale: El aoristo queda bien en español con perfecto compuesto en una pregunta retórica, porque el dicho de la Escritura sigue vigente como autoridad presente.
- source_word: ἐκ τοῦ σπέρματος Δαυίδ
  english_pob_choice: from the offspring of David
  chosen_spanish: del linaje de David
  alternatives_spanish:
  - de la descendencia de David
  - de la simiente de David
  lexicon: BDAG
  rationale: σπέρμα aquí expresa descendencia genealógica. «Linaje» es natural en español y conserva la idea de procedencia davídica sin sonar biológico de manera inapropiada.
- source_word: ἀπὸ Βηθλέεμ
  english_pob_choice: from Bethlehem
  chosen_spanish: de Belén
  alternatives_spanish:
  - desde Belén
  lexicon: BDAG
  rationale: ἀπό señala origen/procedencia. «De Belén» es la forma más natural en español y refleja la expectativa mesiánica citada.
- source_word: τῆς κώμης
  english_pob_choice: the village
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la aldea
  - la villa
  lexicon: BDAG
  rationale: κώμη indica una población pequeña. «Pueblo» es comprensible y más natural para lectores en español; «aldea» sería más literal pero menos idiomática en muchos contextos.
- source_word: ὅπου ἦν Δαυίδ
  english_pob_choice: where David was
  chosen_spanish: donde estaba David
  alternatives_spanish:
  - donde vivía David
  - donde David estaba
  lexicon: BDAG
  rationale: El griego dice simplemente «donde estaba David». «Donde estaba David» conserva la sencillez del original sin añadir la explicación interpretativa de «vivía».
- source_word: ἔρχεται
  english_pob_choice: comes
  chosen_spanish: viene
  alternatives_spanish:
  - está por venir
  - vendrá
  lexicon: BDAG
  rationale: El presente se mantiene como presente de afirmación general o expectativa escritural. «Viene» suena natural en español y preserva el valor de procedencia/manifestación.
- source_word: ὁ χριστός
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - el Cristo
  lexicon: BDAG
  rationale: En esta disputa judía sobre la identidad davídica del esperado, Χριστός funciona como título. Conforme a la norma del proyecto, se traduce «Mesías» para conservar el sentido de título y evitar un calco litúrgico innecesario.
theological_decisions:
- issue: Título Χριστός en un contexto mesiánico judío
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - el Cristo
  rationale: Aquí el término no funciona como nombre fijo, sino como el título del rey esperado. Traducirlo como «Mesías» conserva la discusión sobre la promesa davídica y el origen en Belén.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Mesías (when title; Christ where name-like)'
- issue: Forma de la referencia escritural singular
  english_pob_reading: the Scripture said
  chosen_spanish_reading: la Escritura ha dicho
  alternative_spanish_readings:
  - las Escrituras dicen
  rationale: La referencia singular mantiene la idea de una cita escritural concreta con autoridad normativa, en consonancia con el uso joánico de ἡ γραφή.
  doctrine_reference: BDAG / Johannine usage of ἡ γραφή
translation_notes:
  revision_awareness: El borrador inglés más reciente osciló entre «the Messiah» y «the Christ». Se mantiene la lectura doctrinalmente consistente «Mesías», alineada con la última corrección de regresión que restauró el tratamiento del título como tal. No se incorporan expansiones interpretativas ajenas al griego; se conserva la simplicidad de «donde estaba David».
  spanish_consistency_notes:
  - Se usa «Mesías» para Χριστός en coherencia con la política del proyecto sobre títulos mesiánicos.
  - Se evita «SEÑOR» porque no aparece el tetragrámaton ni una cita directa de κύριος en este versículo.
  - «La Escritura» mantiene el singular autoritativo del texto griego.
  - «Belén» y «David» siguen la forma bíblica tradicional en español, sin alterar el contenido genealógico y geográfico.
