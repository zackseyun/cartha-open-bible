translation:
  language: es
  text: ¿No les dio Moisés la ley? Sin embargo, ninguno de ustedes cumple la ley[a][b]. ¿Por qué buscan matarme?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Acaso no les ha dado Moisés la ley?». El perfecto griego puede verterse también con presente perfecto en español.'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «hace la ley»; es decir, la cumple u observa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὐ ... δέδωκεν
  english_pob_choice: Did not ... give
  chosen_spanish: ¿No les dio ...?
  alternatives_spanish:
  - ¿Acaso no les ha dado ...?
  - ¿No les ha dado ...?
  lexicon: BDAG
  rationale: En español, la pregunta retórica negativa con pasado simple reproduce bien el énfasis esperado de una respuesta afirmativa. El perfecto griego puede reflejarse con presente perfecto, pero aquí el pasado simple suena natural y mantiene el valor retórico sin forzar la temporalidad.
- source_word: Μωϋσῆς
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moisés (sin cambio)
  lexicon: Convención onomástica estándar
  rationale: Nombre propio transliterado según la convención habitual del español bíblico.
- source_word: νόμον
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la Ley
  - la ley de Moisés
  lexicon: BDAG
  rationale: En este contexto se trata de la ley mosaica dada por Moisés. 'Ley' es el equivalente natural en español; se evita mayúscula porque el texto no exige una señalización especial, aunque sigue siendo una referencia específica.
- source_word: καὶ
  english_pob_choice: Yet
  chosen_spanish: Sin embargo
  alternatives_spanish:
  - Y
  - pero
  lexicon: BDAG
  rationale: La conjunción introduce un fuerte contraste entre dar la ley y no cumplirla. 'Sin embargo' expresa mejor esa oposición en español contemporáneo.
- source_word: οὐδεὶς ἐξ ὑμῶν
  english_pob_choice: none of you
  chosen_spanish: ninguno de ustedes
  alternatives_spanish:
  - nadie de ustedes
  - ninguno entre ustedes
  lexicon: BDAG
  rationale: La negación total se expresa de forma natural con 'ninguno de ustedes', conservando el énfasis del griego sin sonar artificial.
- source_word: ποιεῖ τὸν νόμον
  english_pob_choice: keeps the law
  chosen_spanish: cumple la ley
  alternatives_spanish:
  - hace la ley
  - observa la ley
  - guarda la ley
  lexicon: BDAG
  rationale: Aunque el griego dice literalmente 'hace la ley', el sentido idiomático aquí es obedecerla u observarla. 'Cumple la ley' comunica bien esa idea en español y evita el calco 'hace la ley', que suena forzado.
- source_word: τί με ζητεῖτε ἀποκτεῖναι
  english_pob_choice: Why are you seeking to kill me
  chosen_spanish: ¿Por qué intentan matarme?
  alternatives_spanish:
  - ¿Por qué buscan matarme?
  - ¿Por qué tratan de matarme?
  lexicon: BDAG
  rationale: El presente de ζητεῖτε comunica una intención o búsqueda continua; en español, 'intentan matarme' capta bien ese matiz y suena natural en una acusación directa. 'Matarme' es el equivalente directo de ἀποκτεῖναι.
theological_decisions:
- issue: Referencia de 'la ley'
  english_pob_reading: Mosaic law given through Moses
  chosen_spanish_reading: La ley mosaica dada por medio de Moisés
  alternative_spanish_readings:
  - La ley en sentido moral general
  - La Ley como Torá
  rationale: El texto nombra explícitamente a Moisés como dador, así que el referente principal es la ley dada a Israel por medio de él. La traducción conserva esa especificidad sin añadir explicación extratextual.
  doctrine_reference: Torá / ley mosaica
- issue: Fuerza de la pregunta retórica
  english_pob_reading: Did not Moses give you the law?
  chosen_spanish_reading: ¿No les dio Moisés la ley?
  alternative_spanish_readings:
  - ¿Acaso Moisés no les dio la ley?
  - ¿No es cierto que Moisés les dio la ley?
  rationale: La construcción negativa interrogativa en español expresa la expectativa de respuesta afirmativa y mantiene el tono polémico de Jesús en el discurso.
  doctrine_reference: Retórica interrogativa bíblica
translation_notes:
  revision_awareness: 'Coincide con el último control de revisión: no se registraron cambios necesarios y la concordancia con el texto fuente y el audit trail inglés fue alta.'
  spanish_consistency_notes:
  - Se mantuvo 'ley' en minúscula por claridad moderna, sin perder la referencia mosaica contextual.
  - Se evitó 'SEÑOR' o formulaciones equivalentes porque aquí no aparece el nombre divino ni una cita directa que lo requiera.
  - '''Cumple la ley'' conserva el valor idiomático de ποιεῖ τὸν νόμον mejor que un calco literal.'
  - '''Intentan matarme'' refleja la acusación presente y el matiz de acción en curso sin añadir interpretación excesiva.'
