  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: imperfecto narrativo («decían»), grupo indefinido de habitantes de Jerusalén, y pregunta retórica que presupone respuesta afirmativa. Sin embargo, la cláusula final «el que buscan para matarlo» no preserva con suficiente naturalidad ni precisión la sintaxis y el aspecto de ὃν ζητοῦσιν ἀποκτεῖναι; en español suena algo forzada y puede sugerir propósito instrumental («buscar para») más que intento actual de matarlo.'
  spanish_quality_summary: El español es claro y mayormente natural, pero la frase «buscan para matarlo» resulta menos idiomática que «buscan matar» o «tratan de matar». También conviene mantener la nota léxica, pero «jerusalemitas» es una alternativa exacta aunque menos usual.
  glossary_alignment: No hay términos del glosario doctrinal principal en juego. «Habitantes de Jerusalén» corresponde bien a Ἱεροσολυμῖται / Ἱεροσολυμίταις en sentido de habitantes de Jerusalén. No hay conflicto con Yahvé, Mesías, Espíritu, etc.
  issues:
