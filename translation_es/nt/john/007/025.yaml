translation:
  language: es
  text: 'Entonces algunos de los habitantes de Jerusalén[a] decían: «¿No es este al que buscan matar?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de entre los jerusalemitas».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔλεγον
  english_pob_choice: were saying
  chosen_spanish: decían
  alternatives_spanish:
  - estaban diciendo
  - iban diciendo
  lexicon: BDAG
  rationale: El imperfecto griego expresa acción continuada o repetida en la escena; en español, el imperfecto simple «decían» transmite bien ese valor sin sonar forzado. La perífrasis «estaban diciendo» también sería posible, pero es más pesada.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Entonces
  alternatives_spanish:
  - Así que
  - Por tanto
  lexicon: BDAG
  rationale: Marca continuación narrativa. «Entonces» conserva el enlace lógico de manera natural en español y encaja bien con el desarrollo del relato.
- source_word: τινες
  english_pob_choice: some
  chosen_spanish: algunos
  alternatives_spanish:
  - ciertos
  - algunas personas
  lexicon: BDAG
  rationale: El indefinido plural apunta a un grupo no especificado. «Algunos» es la forma más directa y natural en español.
- source_word: ἐκ τῶν Ἱεροσολυμιτῶν
  english_pob_choice: of the people of Jerusalem
  chosen_spanish: de los habitantes de Jerusalén
  alternatives_spanish:
  - de los jerusalemitas
  - de entre los habitantes de Jerusalén
  lexicon: BDAG
  rationale: Ἱεροσολυμίτης designa a un habitante de Jerusalén. «Habitantes de Jerusalén» expresa el sentido con claridad y mantiene la referencia geográfica; «jerusalemitas» es exacto pero menos transparente para lectores generales.
- source_word: Οὐχ οὗτός ἐστιν
  english_pob_choice: Is this not the man
  chosen_spanish: ¿No es este
  alternatives_spanish:
  - ¿Acaso no es este
  - ¿No es este el hombre
  lexicon: BDAG
  rationale: La pregunta retórica espera una respuesta afirmativa. En español, «¿No es este…?» reproduce bien esa fuerza sin necesidad de añadir «el hombre», que no está explícito en el griego.
- source_word: ὃν ζητοῦσιν ἀποκτεῖναι
  english_pob_choice: whom they are seeking to kill
  chosen_spanish: el que buscan para matarlo
  alternatives_spanish:
  - a quien buscan matar
  - a quien tratan de matar
  lexicon: BDAG
  rationale: El griego literalmente dice «a quien buscan matar». En español, «el que buscan para matarlo» evita una construcción muy pesada y conserva tanto la búsqueda como la intención homicida. Se mantiene el pronombre clítico «lo»/«-lo» en el infinitivo para reflejar el objeto de la acción.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior añadiendo el marcador [a] al sustantivo correspondiente en el texto español y manteniendo la nota solo donde el marcador aparece anclado.
  spanish_consistency_notes:
  - Se preservó el valor imperfectivo de Ἔλεγον con un imperfecto español natural.
  - Se evitó traducir Ἱεροσολυμιτῶν con terminología eclesiástica o tradicional no exigida por el texto; se prefirió una denominación geográfica transparente.
  - No se añadió «el hombre» porque el griego usa solo el demostrativo y el relativo; el sentido queda claro en español sin esa expansión.
