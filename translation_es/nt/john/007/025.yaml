    issue: La expresión «el que buscan para matarlo» es poco natural y no refleja de la mejor manera ζητοῦσιν ἀποκτεῖναι.
    rationale: ζητοῦσιν + infinitivo expresa que lo están buscando con la intención de matarlo / buscan matarlo. En español, «buscar para matarlo» introduce un matiz menos directo y algo torpe estilísticamente.
  - severity: low
    issue: La nota al pie usa «jerusalemitas», forma exacta pero poco frecuente.
    rationale: No es incorrecta, pero sigue siendo una alternativa marcada; se puede conservar como nota léxica porque el texto principal ya usa la opción más natural.
