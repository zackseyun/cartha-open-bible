    text: Or “secretly.” The Greek adverb can denote speaking out of public hearing.
    reason: lexical_alternative
  - marker: b
    text: 'Or “The Master is here.” Greek: “The Teacher.”'
    reason: lexical_alternative
  - marker: c
    text: Or “calls you” / “is calling you.” The Greek present tense may be rendered more literally, but here likely means that he is asking for your presence.
    reason: lexical_alternative
