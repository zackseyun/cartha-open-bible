translation:
  language: es
  text: 'Y después de decir esto[a], se fue y llamó a María, su hermana, en privado, diciendo[c]: «El Maestro[b] está aquí y te llama».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «secretamente». El adverbio griego puede indicar que habló fuera del oído público.
    reason: lexical_alternative
  - marker: b
    text: 'O «El Profesor». Griego: «El Maestro/Profesor», es decir, «el que enseña».'
    reason: lexical_alternative
  - marker: c
    text: O «te está llamando» / «te llama». El presente griego puede traducirse de forma más literal, pero aquí probablemente significa que pide tu presencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦτο εἰποῦσα
  english_pob_choice: after saying this
  chosen_spanish: después de decir esto
  alternatives_spanish:
  - habiendo dicho esto
  - cuando dijo esto
  lexicon: BDAG
  rationale: El participio aoristo con τοῦτο expresa anterioridad temporal; en español, «después de decir esto» conserva la secuencia narrativa de manera natural sin perder el valor temporal del original.
- source_word: ἀπῆλθεν
  english_pob_choice: she went away
  chosen_spanish: se fue
  alternatives_spanish:
  - se marchó
  - partió
  lexicon: BDAG
  rationale: El verbo indica salida del lugar presente. «Se fue» es el equivalente narrativo más natural en español y mantiene el movimiento sin sobrecargar el estilo.
- source_word: ἐφώνησεν Μαριὰμ
  english_pob_choice: called Mary
  chosen_spanish: llamó a María
  alternatives_spanish:
  - convocó a María
  - llamó a María
  lexicon: BDAG
  rationale: φωνέω aquí significa llamar a alguien. En español, «llamó a María» expresa con claridad la acción sin añadir el matiz institucional de «convocar».
- source_word: τὴν ἀδελφὴν αὐτῆς
  english_pob_choice: her sister
  chosen_spanish: su hermana
  alternatives_spanish:
  - la hermana de ella
  - su propia hermana
  lexicon: BDAG
  rationale: La frase appositiva identifica a María como hermana de la hablante. «Su hermana» es la forma natural y fiel en español.
- source_word: λάθρᾳ
  english_pob_choice: privately
  chosen_spanish: privadamente
  alternatives_spanish:
  - en privado
  - secretamente
  lexicon: BDAG
  rationale: El adverbio señala que habló fuera de oído público. «Privadamente» mantiene ese valor de discreción; «en privado» también sería posible, pero «privadamente» sigue más de cerca la función adverbial del original.
- source_word: Ὁ διδάσκαλος
  english_pob_choice: The Teacher
  chosen_spanish: El Maestro
  alternatives_spanish:
  - El Maestro/El Maestro y Profesor
  - El Doctor
  lexicon: BDAG
  rationale: Aunque el inglés POB eligió «The Teacher» para resaltar el sentido léxico, en español «Maestro» es el equivalente natural y reverente de διδάσκαλος en este contexto. No se adopta «Señor» ni otro título no atestiguado por el griego.
- source_word: πάρεστιν
  english_pob_choice: is here
  chosen_spanish: está aquí
  alternatives_spanish:
  - está presente
  - ha llegado
  lexicon: BDAG
  rationale: El verbo expresa presencia. «Está aquí» reproduce de forma clara y directa esa idea en el habla inmediata del relato.
- source_word: φωνεῖ σε
  english_pob_choice: is calling for you
  chosen_spanish: te llama
  alternatives_spanish:
  - te está llamando
  - te está llamando para que vayas
  lexicon: BDAG
  rationale: El presente puede traducirse de manera más literal como acción en curso; sin embargo, en español «te llama» comunica de forma natural que Jesús pide su presencia. Se evita ampliar el sentido más allá del griego.
theological_decisions:
- issue: 'Título de Jesús: διδάσκαλος'
  english_pob_reading: The Teacher
  chosen_spanish_reading: El Maestro
  alternative_spanish_readings:
  - El Maestro (como traducción funcional de «The Teacher»)
  - El Maestro / El que enseña
  rationale: No se trata de un título doctrinalmente cargado como Cristo/Mesías, sino de un apelativo respetuoso en la escena. En español, «Maestro» es la equivalencia semántica más estable y naturalmente reconocible para διδάσκαλος, sin introducir la connotación de autoridad absoluta que podría sugerir «Señor».
  doctrine_reference: Translation philosophy §§1, 2, 6
- issue: Nuance de λάθρᾳ
  english_pob_reading: privately
  chosen_spanish_reading: privadamente
  alternative_spanish_readings:
  - en privado
  - secretamente
  rationale: El contexto indica discreción por la situación narrativa, no necesariamente secreto culpable o engañoso. «Privadamente» conserva la ambigüedad adecuada entre discreción y falta de publicidad, sin intensificar el matiz a «secretamente».
  doctrine_reference: Translation philosophy §§1, 6
- issue: Presente de φωνεῖ
  english_pob_reading: is calling for you
  chosen_spanish_reading: te llama
  alternative_spanish_readings:
  - te está llamando
  - te convoca
  rationale: El presente griego puede sonar continuo, pero en español una forma breve resulta más idiomática. «Te llama» mantiene la fuerza del llamado y evita una paráfrasis excesiva.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: 'El texto griego y el audit trail inglés están en alto acuerdo; no se registran revisiones aplicadas. La versión española sigue ese mismo criterio de equivalencia óptima, manteniendo las tres decisiones sensibles: el adverbio de discreción, el título de Jesús y el presente de φωνεῖ.'
  spanish_consistency_notes:
  - Se mantiene «María» para Μαριὰμ conforme a la forma española habitual del nombre.
  - Se usa «El Maestro» con mayúscula por tratarse de un título aplicado a Jesús en discurso directo.
  - Se traduce λάθρᾳ con un adverbio de discreción que no fuerce la idea de clandestinidad absoluta.
  - El final «te llama» es idiomático y compatible con la fuerza del presente griego en este contexto.
