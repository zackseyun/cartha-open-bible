revisions:
- from: 'Y después de decir esto[a], se fue y llamó a María, su hermana, privadamente, diciendo[b][c]: «El Maestro está aquí y te llama».'
  to: 'Y después de decir esto[a], se fue y llamó a María, su hermana, en privado, diciendo[c]: «El Maestro[b] está aquí y te llama».'
  rationale: Se ajusta λάθρᾳ a «en privado» por mayor naturalidad en español. Se repara la nota b para que sea una alternativa real y útil, manteniendo «El Maestro» en el texto principal por idiomaticidad e inteligibilidad eclesial en español, aunque el valor léxico de διδάσκαλος se conserva en la explicación. Se elimina la duplicación innecesaria de marcadores en «diciendo[b][c]» y se ancla cada nota donde corresponde.
