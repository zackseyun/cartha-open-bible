review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia y el sentido básico del griego: «después de decir esto», «se fue», «llamó a María, su hermana», y «está aquí y te llama». Sin embargo, no preserva plenamente una decisión léxica importante del POB auditado: Ὁ διδάσκαλος se documentó en inglés como «The Teacher», no «the Master». En español, «El Maestro» es posible, pero aquí conviene reflejar más de cerca el valor léxico documentado con «El Maestro/El Maestro»? No: la mejor solución natural y fiel es «El Maestro» solo si se justifica; aun así, el pie b del borrador es defectuoso porque ofrece como alternativa la misma forma. Además, «privadamente» es comprensible pero menos natural que «en privado» para λάθρᾳ.'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero hay dos problemas de calidad: «privadamente» suena algo rígido y poco idiomático frente a «en privado», y la nota b está mal formulada porque no ofrece una alternativa real. El resto fluye bien y mantiene buena legibilidad narrativa.'
  glossary_alignment: 'No hay conflicto con términos doctrinales mayores del glosario. El punto principal es διδάσκαλος: el rastro inglés favorece el sentido léxico «Teacher». En español, «Maestro» puede aceptarse como equivalente idiomático, pero debe explicarse correctamente en nota como alternativa «El Profesor» o mejor «El que enseña» no es idiomático; la alternativa más útil es «El Maestro»/«El Profesor» no encaja bien en registro bíblico. Por ello, es preferible ajustar el texto principal a «El Maestro» si se conserva, pero reparar la nota; además, para λάθρᾳ es mejor «en privado» que «privadamente» en español natural.'
  issues:
  - severity: medium
    issue: La nota b no ofrece una alternativa real
    rationale: 'Dice «O “Maestro”. El griego dice: “el Maestro”», lo cual repite sustancialmente el texto principal y no cumple la función de nota léxica útil.'
  - severity: medium
    issue: «privadamente» es poco natural en español bíblico contemporáneo
    rationale: Aunque semánticamente correcto, «en privado» expresa mejor λάθρᾳ en español natural y mantiene la idea de hablar fuera del oído público sin sonar acartonado.
  - severity: low
    issue: La justificación de διδάσκαλος en español necesita mejor alineación con el audit trail
    rationale: El inglés POB prefirió «The Teacher» por valor léxico. «El Maestro» puede mantenerse por idiomaticidad española, pero la documentación y la nota deben reflejar esa decisión con más precisión.
