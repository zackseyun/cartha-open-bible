translation:
  language: es
  text: Ahora bien, Betania estaba cerca de Jerusalén[a], como a quince estadios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Como a dos millas, o aproximadamente tres kilómetros.
