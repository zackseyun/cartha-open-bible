lexical_decisions:
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora bien
  alternatives_spanish:
  - Ahora
  - Pues
  - Y
  lexicon: BDAG
  rationale: δέ funciona aquí como un enlace discursivo suave, no como contraste fuerte. «Ahora bien» conserva ese avance narrativo en español sin sobreactuar oposición.
- source_word: Βηθανία
  english_pob_choice: Bethany
  chosen_spanish: Betania
  alternatives_spanish:
  - Bethania
  lexicon: Transliteración estándar
  rationale: Es un nombre propio de lugar; «Betania» es la forma habitual y natural en español bíblico.
- source_word: ἐγγὺς
  english_pob_choice: near
  chosen_spanish: cerca de
  alternatives_spanish:
  - próxima a
  - junto a
  lexicon: BDAG
  rationale: ἐγγύς expresa cercanía espacial. «Cerca de» es la equivalencia más natural en español y mantiene la relación locativa.
- source_word: Ἱεροσολύμων
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalen
  lexicon: Nombre propio bíblico
  rationale: Es el nombre propio de la ciudad; «Jerusalén» es la forma establecida en español.
- source_word: ὡς
  english_pob_choice: about
  chosen_spanish: a unos
  alternatives_spanish:
  - aproximadamente a
  - como a
  lexicon: BDAG
  rationale: Con una medida, ὡς señala aproximación. «A unos» comunica de manera idiomática que la distancia no es exacta.
- source_word: ἀπὸ σταδίων δεκαπέντε
  english_pob_choice: fifteen stadia away
  chosen_spanish: quince estadios de distancia
  alternatives_spanish:
  - a unos quince estadios
  - quince estadios lejos
  lexicon: BDAG
  rationale: στάδιον es una unidad antigua de distancia; «estadios» preserva el valor cultural e histórico del texto fuente. «De distancia» explicita la relación espacial de ἀπό sin convertir la medida a una equivalencia moderna en el texto principal.
translation_notes:
  revision_awareness: El contexto auditado en inglés mantiene la unidad antigua «stadia» en el texto principal y explica la equivalencia moderna en nota; la versión española sigue ese mismo criterio, conservando el término fuente-cultural y desplazando la equivalencia métrica a la nota.
  spanish_consistency_notes:
  - Se mantiene «Betania» y «Jerusalén» como formas bíblicas estándar en español.
  - Se conserva la medida antigua «estadios» para reflejar el texto griego y la nota ofrece la equivalencia moderna.
  - «Ahora bien» reproduce el enlace narrativo suave de δέ sin introducir contraste no presente en el griego.
