    issue: Expresión de distancia algo pesada en el texto principal
    rationale: «Estaba cerca de Jerusalén[a], a unos quince estadios de distancia» duplica parcialmente la idea de cercanía y distancia de forma menos idiomática que una formulación más directa como «quedaba ... como a quince estadios».
  - severity: low
    issue: Orden del equivalente moderno en la nota no sigue el rastro auditado en inglés
    rationale: El inglés da primero millas y luego kilómetros («About two miles, or roughly three kilometers»). En español no es obligatorio, pero conviene mantener el orden documentado salvo razón clara para cambiarlo.
  revised_spanish_text: Ahora bien, Betania estaba cerca de Jerusalén[a], como a quince estadios.
