translation:
  language: es
  text: Ya estaba cerca la Pascua de los judíos[a], y muchos subieron a Jerusalén del campo antes de la Pascua para purificarse[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la Pascua judía». El griego dice más literalmente «la Pascua de los judíos», una expresión recurrente en Juan.
    reason: lexical_alternative
  - marker: b
    text: Es decir, para someterse a una purificación ritual en preparación para la Pascua.
    reason: cultural_note
lexical_decisions:
- source_word: Ἦν δὲ
  english_pob_choice: Now ... was
  chosen_spanish: Ahora estaba
  alternatives_spanish:
  - Y estaba
  - Entonces estaba
  lexicon: BDAG
  rationale: δέ introduce una transición suave; en español, "Ahora" conserva el flujo narrativo natural sin cargar una oposición que el griego no exige. "Estaba" mantiene el valor imperfectivo y la cercanía temporal del contexto.
- source_word: ἐγγὺς
  english_pob_choice: near
  chosen_spanish: cerca
  alternatives_spanish:
  - próxima
  - al alcance
  lexicon: BDAG
  rationale: En este contexto temporal, "cerca" comunica bien la proximidad de la fiesta. "Próxima" también sería posible, pero suena menos natural en esta construcción.
- source_word: τὸ πάσχα τῶν Ἰουδαίων
  english_pob_choice: the Passover of the Jews
  chosen_spanish: la Pascua de los judíos
  alternatives_spanish:
  - la Pascua judía
  lexicon: BDAG
  rationale: Se conserva la construcción genitiva del griego, como en la traducción inglesa auditada, para no suavizar la formulación recurrente en Juan. "Pascua" es el equivalente estándar de πάσχα.
- source_word: ἀνέβησαν
  english_pob_choice: went up
  chosen_spanish: subieron
  alternatives_spanish:
  - fueron
  - ascendieron
  lexicon: BDAG
  rationale: '"Subieron" preserva tanto el sentido geográfico como el lenguaje convencional de peregrinación hacia Jerusalén. "Ascendieron" sería demasiado técnico; "fueron" perdería la imagen.'
- source_word: πολλοὶ
  english_pob_choice: many
  chosen_spanish: muchos
  alternatives_spanish:
  - gran número de personas
  lexicon: BDAG
  rationale: El adjetivo funciona sustantivamente; "muchos" es suficiente y natural en español.
- source_word: εἰς Ἱεροσόλυμα
  english_pob_choice: to Jerusalem
  chosen_spanish: a Jerusalén
  alternatives_spanish:
  - hacia Jerusalén
  - hasta Jerusalén
  lexicon: BDAG
  rationale: Con nombres de ciudad, el español prefiere "a" para marcar destino. Mantiene la dirección de εἰς sin forzar una calca.
- source_word: ἐκ τῆς χώρας
  english_pob_choice: from the countryside
  chosen_spanish: desde el campo
  alternatives_spanish:
  - desde la campiña
  - desde la región
  - desde el campo rural
  lexicon: BDAG
  rationale: χώρα aquí contrasta con la ciudad y alude a la zona rural circundante. "Desde el campo" es natural y comunica bien ese contraste; "campiña" sería más literario, "región" más general.
- source_word: πρὸ τοῦ πάσχα
  english_pob_choice: before the Passover
  chosen_spanish: antes de la Pascua
  alternatives_spanish:
  - previo a la Pascua
  lexicon: BDAG
  rationale: '"Antes de" es la forma más clara y directa para el valor temporal de πρὸ τοῦ.'
- source_word: ἵνα ἁγνίσωσιν ἑαυτούς
  english_pob_choice: to purify themselves
  chosen_spanish: para purificarse
  alternatives_spanish:
  - para purificar(se) ritualmente
  - para limpiarse ceremonialmente
  lexicon: BDAG
  rationale: La cláusula final expresa propósito. "Purificarse" conserva la acción reflexiva en español y reproduce el sentido ritual de ἁγνίζω sin añadir explicaciones en el texto principal.
theological_decisions:
- issue: 'Expresión recurrente en Juan: "la Pascua de los judíos"'
  english_pob_reading: The Greek more literally reads 'the Passover of the Jews,' a recurring expression in John.
  chosen_spanish_reading: la Pascua de los judíos
  alternative_spanish_readings:
  - la Pascua judía
  rationale: Se mantiene la estructura posesiva/genitiva, porque el audit trail inglés señala que la forma más transparente preserva la expresión recurrente de Juan. No se la suaviza a un adjetivo más interpretativo.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Purificación ritual previa a la Pascua
  english_pob_reading: to undergo ritual purification in preparation for the Passover.
  chosen_spanish_reading: para purificarse
  alternative_spanish_readings:
  - para purificarse ritualmente
  - para limpiarse ceremonialmente
  - para consagrarse
  rationale: El contexto histórico es judío y ritual, no moralizante ni sacramental. "Purificarse" deja visible la finalidad sin introducir una categoría doctrinal posterior; el matiz ritual queda implícito por el contexto de la fiesta.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran alta concordancia y no registran revisiones aplicadas; por eso la redacción española sigue de cerca la formulación transparente del original, manteniendo la expresión joánica «la Pascua de los judíos» y el propósito ritual de la purificación sin ampliaciones interpretativas.
  spanish_consistency_notes:
  - Se mantiene «Pascua» para πάσχα, conforme al uso bíblico estándar en español.
  - Se conserva «Yahvé» solo cuando corresponda; este versículo no contiene el nombre divino.
  - Se usa «subieron a Jerusalén» para preservar el matiz de peregrinación y la convención geográfica.
  - Se emplea una cláusula final con «para» en español, equivalente funcional de ἵνα + subjuntivo.
  - El pronombre reflexivo en «purificarse» transmite bien ἑαυτούς sin perder naturalidad en español.
