revisions:
- from: Ahora estaba cerca la Pascua de los judíos[a], y muchos subieron a Jerusalén desde el campo antes de la Pascua para purificarse[b].
  to: Ya estaba cerca la Pascua de los judíos[a], y muchos subieron a Jerusalén del campo antes de la Pascua para purificarse[b].
  rationale: Se ajusta el conector inicial a un español narrativo más natural («Ya estaba cerca») y se mejora la expresión de procedencia rural («del campo») sin alterar el sentido del griego ni las decisiones léxicas y teológicas ya documentadas.
