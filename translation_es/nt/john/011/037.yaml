translation:
  language: es
  text: 'Pero algunos de ellos dijeron[a]: «¿No podía este hombre, que abrió los ojos del ciego, también haber hecho que este hombre no muriera?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿No podía este hombre haber impedido que este hombre muriera?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: τινὲς δὲ ἐξ αὐτῶν
  english_pob_choice: But some of them
  chosen_spanish: Pero algunos de ellos
  alternatives_spanish:
  - Pero algunos entre ellos
  - Ahora bien, algunos de ellos
  lexicon: BDAG
  rationale: τινές ἐξ αὐτῶν expresa una parte indeterminada del grupo; «algunos de ellos» comunica bien ese valor sin sobrecargar el español. δέ se marca con «Pero» para conservar el contraste con la escena previa.
- source_word: εἶπαν
  english_pob_choice: said
  chosen_spanish: dijeron
  alternatives_spanish:
  - decían
  lexicon: BDAG
  rationale: 'El aoristo narrativo se vierte naturalmente con pasado simple en español: «dijeron».'
- source_word: Οὐκ ἐδύνατο
  english_pob_choice: Could not
  chosen_spanish: ¿No podía
  alternatives_spanish:
  - ¿No era capaz de
  - ¿No hubiera podido
  lexicon: BDAG
  rationale: La pregunta retórica en imperfecto de δύναμαι pide una solución idiomática en español. «¿No podía...?» conserva la fuerza de capacidad pasada sin volverse rígido.
- source_word: οὗτος
  english_pob_choice: this man
  chosen_spanish: este hombre
  alternatives_spanish:
  - este
  - él
  lexicon: BDAG
  rationale: «Este hombre» preserva el tono algo señalador o incisivo del demostrativo en el contexto, como en el inglés POB.
- source_word: ὁ ἀνοίξας τοὺς ὀφθαλμοὺς
  english_pob_choice: who opened the eyes
  chosen_spanish: que abrió los ojos
  alternatives_spanish:
  - el que abrió los ojos
  - quien abrió los ojos
  lexicon: BDAG
  rationale: El participio articular funciona atributivamente; una relativa en español es la forma más natural y fiel.
- source_word: τοῦ τυφλοῦ
  english_pob_choice: of the blind man
  chosen_spanish: del ciego
  alternatives_spanish:
  - del hombre ciego
  - del ciego aquel
  lexicon: BDAG
  rationale: El genitivo sustantivado apunta al hombre previamente narrado en Juan 9. «Del ciego» mantiene la referencia identificable y evita redundancia innecesaria.
- source_word: ποιῆσαι ἵνα
  english_pob_choice: have caused that
  chosen_spanish: haber hecho que
  alternatives_spanish:
  - haber causado que
  - haber logrado que
  lexicon: BDAG
  rationale: ποιέω con ἵνα expresa causalidad/resultación. «Haber hecho que» conserva esa relación causal con buena naturalidad en español.
- source_word: καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - incluso
  - hasta
  lexicon: BDAG
  rationale: '«También» reproduce la adición lógica de καί: el que sanó la ceguera podía asimismo impedir la muerte.'
- source_word: οὗτος
  english_pob_choice: this man
  chosen_spanish: este hombre
  alternatives_spanish:
  - él
  - este
  lexicon: BDAG
  rationale: Se mantiene el demostrativo para conservar el contraste implícito entre Jesús y Lázaro, y el tono del planteamiento.
- source_word: μὴ ἀποθάνῃ
  english_pob_choice: should not die
  chosen_spanish: no muriera
  alternatives_spanish:
  - no habría muerto
  - no muera
  lexicon: BDAG
  rationale: 'Tras ἵνα, el español natural aquí es una subordinada final/resultativa en imperfecto de subjuntivo: «no muriera». Mantiene la relación sinforzar el matiz temporal.'
theological_decisions:
- issue: Tono de la pregunta sobre la capacidad de Jesús
  english_pob_reading: Render as a skeptical rhetorical question about Jesus' ability to prevent Lazarus's death
  chosen_spanish_reading: Mantener la pregunta retórica con un matiz de escepticismo, sin convertirla en acusación explícita
  alternative_spanish_readings:
  - Hacerla una pregunta neutra
  - Explicitar la crítica de los hablantes
  rationale: 'El griego con Οὐκ ἐδύνατο sugiere más que una simple duda: implica que, a ojos de los hablantes, Jesús sí podía haber intervenido. La traducción conserva esa tensión sin añadir más de lo que el texto dice.'
  doctrine_reference: Preservar la tensión textual sin resolverla artificialmente.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail inglés al mantener la relación causal de ποιῆσαι + ἵνα con una formulación más cercana y formal; en español se optó por «haber hecho que… no muriera» como equivalente natural de esa estructura.
  spanish_consistency_notes:
  - Se mantuvo «este hombre» para ambos οὗτος, siguiendo el valor demostrativo y el tono del pasaje.
  - Se prefirió «el ciego» para τοῦ τυφλοῦ por claridad referencial, ya que alude al hombre sanado en Juan 9.
  - Se usó «muriera» en el subjuntivo español para reflejar la subordinación tras ἵνα sin perder naturalidad.
  - No se introdujo «Cristo», «SEÑOR» ni otras convenciones no requeridas por el griego de este versículo.
