    text: Griego ἱερόν se refiere al complejo o recinto del templo, no específicamente al santuario interior.
    reason: cultural_note
  - marker: b
    text: 'O: «que no vendrá de ningún modo a la fiesta». El griego usa una negación enfática (οὐ μή).'
    reason: lexical_alternative
  revision_rationale: La revisión preserva más fielmente ἑστηκότες con «de pie» y mejora la naturalidad española de la pregunta con negación enfática, sin perder la fuerza de οὐ μή ni la estructura de opinión introducida por ὅτι.
