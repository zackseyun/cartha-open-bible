translation:
  language: es
  text: 'Así que seguían buscando a Jesús y se decían unos a otros, de pie en el recinto del templo[a]: «¿Qué les parece? ¿Que de ninguna manera vendrá a la fiesta?[b]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Griego ἱερόν se refiere al complejo o recinto del templo, no específicamente al santuario interior.
    reason: cultural_note
  - marker: b
    text: 'O: «que no vendrá de ningún modo a la fiesta». El griego usa una negación enfática (οὐ μή).'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐζήτουν
  english_pob_choice: were looking for
  chosen_spanish: seguían buscando
  alternatives_spanish:
  - buscaban
  - estaban buscando
  lexicon: BDAG
  rationale: El imperfecto expresa acción շարունակada o repetida; «seguían buscando» conserva ese matiz de continuidad en un español natural y digno.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - por tanto
  - entonces
  lexicon: BDAG
  rationale: Marca continuidad narrativa e inferencia desde el contexto anterior; «Así que» suena idiomático en español sin perder la relación lógica.
- source_word: ἔλεγον
  english_pob_choice: were saying
  chosen_spanish: se decían
  alternatives_spanish:
  - decían
  - se iban diciendo
  lexicon: BDAG
  rationale: El imperfecto indica conversación en curso entre varios; «se decían» refleja bien la reciprocidad del griego μετ’ ἀλλήλων.
- source_word: μετ’ ἀλλήλων
  english_pob_choice: to one another
  chosen_spanish: unos a otros
  alternatives_spanish:
  - entre sí
  - unos con otros
  lexicon: BDAG
  rationale: Expresa conversación recíproca dentro del grupo con naturalidad en español y sin añadir matices ajenos.
- source_word: ἐν τῷ ἱερῷ
  english_pob_choice: in the temple courts
  chosen_spanish: en el recinto del templo
  alternatives_spanish:
  - en el templo
  - en los atrios del templo
  lexicon: BDAG
  rationale: ἱερόν se refiere al complejo del templo, no al santuario interior; «recinto del templo» conserva esa distinción sin forzar una imagen demasiado específica.
- source_word: ἑστηκότες
  english_pob_choice: as they stood
  chosen_spanish: mientras estaban
  alternatives_spanish:
  - de pie
  - estando
  lexicon: BDAG
  rationale: El participio describe su postura/situación al conversar; «mientras estaban» integra la idea de estar de pie de manera fluida en español, apoyada por el contexto del recinto.
- source_word: Τί δοκεῖ ὑμῖν;
  english_pob_choice: What do you think?
  chosen_spanish: ¿Qué les parece?
  alternatives_spanish:
  - ¿Qué piensan?
  - ¿Qué opinan?
  lexicon: BDAG
  rationale: La pregunta pide opinión; en español, «¿Qué les parece?» comunica bien la fuerza idiomática sin sonar rígido o demasiado literal.
- source_word: ὅτι
  english_pob_choice: That
  chosen_spanish: ¿Acaso
  alternatives_spanish:
  - que
  - si
  lexicon: BDAG
  rationale: Aquí introduce la proposición que se evalúa en la pregunta retórica; en español, una formulación interrogativa con «¿Acaso...?» expresa mejor la expectativa implícita del griego que un simple «que».
- source_word: οὐ μὴ ἔλθῃ
  english_pob_choice: he certainly will not come
  chosen_spanish: no vendrá de ningún modo
  alternatives_spanish:
  - ciertamente no vendrá
  - de ninguna manera vendrá
  lexicon: BDAG
  rationale: οὐ μή con subjuntivo aoristo es una negación enfática; «no vendrá de ningún modo» preserva la fuerza absoluta sin recurso a un giro demasiado arcaico.
- source_word: εἰς τὴν ἑορτήν
  english_pob_choice: to the feast
  chosen_spanish: a la fiesta
  alternatives_spanish:
  - a la festividad
  - al festejo
  lexicon: BDAG
  rationale: En Juan, ἑορτή suele referirse a una fiesta judía concreta; «fiesta» es el equivalente español más natural y suficientemente preciso en este contexto.
theological_decisions:
- issue: 'La identidad del lugar: ἱερόν versus ναός'
  english_pob_reading: temple courts, not specifically the inner sanctuary
  chosen_spanish_reading: recinto del templo
  alternative_spanish_readings:
  - templo
  - atrio(s) del templo
  rationale: La lectura inglesa distingue el complejo del templo del santuario interior. «Recinto del templo» preserva esa distinción espacial y evita identificar erróneamente el lugar con el santuario interior.
  doctrine_reference: Distinción léxica y topográfica del templo en el NT
- issue: La negación enfática οὐ μή
  english_pob_reading: he will by no means come / certainly will not come
  chosen_spanish_reading: no vendrá de ningún modo
  alternative_spanish_readings:
  - ciertamente no vendrá
  - de ninguna manera vendrá
  rationale: La fuerza enfática de οὐ μή no debe diluirse. «No vendrá de ningún modo» mantiene la negación absoluta en un español claro y publicable.
  doctrine_reference: Valor aspectual y modal del griego koine
translation_notes:
  revision_awareness: No se aplicaron revisiones previas en este pasaje. La redacción sigue de cerca el griego y el audit trail inglés, manteniendo el valor imperfectivo de ἐζήτουν y ἔλεγον, la distinción espacial de ἱερόν, y la negación enfática de οὐ μή.
  spanish_consistency_notes:
  - Se usa «Jesús» como forma fija del nombre propio.
  - Se traduce ἱερόν de manera espacial y no como un santuario interior.
  - Se conserva la negación enfática mediante una construcción española equivalente y no atenuada.
  - La puntuación introduce la cita directa de modo natural en español, sin alterar el contenido del original.
