revisions:
- from: 'Así que seguían buscando a Jesús y se decían unos a otros, mientras estaban en el recinto del templo[a]: «¿Qué les parece? ¿Acaso no vendrá de ningún modo a la fiesta?[b]»'
  to: 'Así que seguían buscando a Jesús y se decían unos a otros, de pie en el recinto del templo[a]: «¿Qué les parece? ¿Que de ninguna manera vendrá a la fiesta?[b]»'
  rationale: La revisión preserva más fielmente ἑστηκότες con «de pie» y mejora la naturalidad española de la pregunta con negación enfática, sin perder la fuerza de οὐ μή ni la estructura de opinión introducida por ὅτι.
