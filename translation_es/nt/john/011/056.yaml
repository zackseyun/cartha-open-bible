  text: ἐζήτουν οὖν τὸν Ἰησοῦν καὶ ἔλεγον μετ’ ἀλλήλων ἐν τῷ ἱερῷ ἑστηκότες· Τί δοκεῖ ὑμῖν; ὅτι οὐ μὴ ἔλθῃ εἰς τὴν ἑορτήν;
base_translation:
  language: en
  yaml_path: translation/nt/john/011/056.yaml
  text: So they were looking for Jesus and saying to one another as they stood in the temple courts[b][a], “What do you think? That he certainly will not come to the feast?”
  footnotes:
  - marker: a
    text: Greek ἱερόν refers to the temple complex or precincts, not specifically the inner sanctuary.
    reason: cultural_note
  - marker: b
    text: Or, “he will by no means come to the feast.” The Greek uses an emphatic negation (οὐ μὴ).
    reason: lexical_alternative
