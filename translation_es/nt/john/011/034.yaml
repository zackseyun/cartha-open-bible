- from: 'Y dijo[a]: «¿Dónde lo han puesto?». Le dijeron: «Señor, ven y mira».'
  to: 'Y dijo: «¿Dónde lo han puesto?». Le dijeron: «Señor[a], ven y ve».'
  rationale: Se corrigió la ubicación de la nota para que ancle al vocativo κύριε, se ajustó «mira» a «ve» para reflejar mejor ἴδε y la fórmula «ven y ve», y se reparó la nota para que presente una alternativa real y coherente con la auditoría inglesa.
