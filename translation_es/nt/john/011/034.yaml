translation:
  language: es
  text: 'Y dijo: «¿Dónde lo han puesto?». Le dijeron: «Señor[a], ven y ve».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «señor». El griego κύριε puede funcionar como un tratamiento respetuoso; «Señor» se mantiene como la traducción por defecto.
    reason: alternative_reading
lexical_decisions:
- source_word: καὶ εἶπεν
  english_pob_choice: And he said
  chosen_spanish: Y dijo
  alternatives_spanish:
  - Y le preguntó
  lexicon: BDAG
  rationale: λέγω se traduce normalmente por un verbo de decir. Aunque el contenido es una pregunta, en español también es natural conservar «dijo» sin convertirlo interpretativamente en «preguntó».
- source_word: Ποῦ
  english_pob_choice: Where
  chosen_spanish: ¿Dónde
  alternatives_spanish:
  - ¿En dónde
  lexicon: BDAG
  rationale: Interrogativo directo de lugar; «¿Dónde» es la forma más natural y sobria en español.
- source_word: τεθείκατε
  english_pob_choice: have you laid
  chosen_spanish: lo han puesto
  alternatives_spanish:
  - lo han colocado
  - lo han depositado
  lexicon: BDAG
  rationale: El perfecto de τίθημι expresa una acción completada de poner/colocar el cuerpo. En español, «han puesto» comunica bien ese sentido sin forzar una imagen más marcada que el griego.
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: Se refiere a Lázaro como objeto directo. En español, el pronombre átono «lo» es más natural que repetir «a él» en esta pregunta breve.
- source_word: λέγουσιν
  english_pob_choice: They said
  chosen_spanish: Le dijeron
  alternatives_spanish:
  - Le dicen
  lexicon: BDAG
  rationale: El griego usa presente histórico; en español narrativo es normal pasarlo al pretérito para mayor fluidez.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Señor mío
  - Maestro
  lexicon: BDAG
  rationale: En español, «Señor» reproduce el valor de address reverente que POB conserva con «Lord». «Maestro» o «Señor mío» introducen matices no explicitados aquí.
- source_word: ἔρχου
  english_pob_choice: come
  chosen_spanish: ven
  alternatives_spanish:
  - ven aquí
  lexicon: BDAG
  rationale: Imperativo de ἔρχομαι; «ven» es la forma natural y directa en español para una invitación inmediata.
- source_word: ἴδε
  english_pob_choice: see
  chosen_spanish: mira
  alternatives_spanish:
  - ve
  - mira y ve
  lexicon: BDAG
  rationale: El imperativo de ὁράω suele equivaler a «ver», pero en una exhortación directa en español «mira» funciona de manera más idiomática junto con «ven» y conserva el paralelismo breve del original.
theological_decisions:
- issue: Tratamiento de κύριε como título de respeto dirigido a Jesús
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Señor
  - Maestro
  rationale: POB retiene «Lord» por defecto, reconociendo que el vocativo puede ser un simple tratamiento respetuoso o cargar resonancia cristológica. En español, «Señor» preserva esa ambigüedad reverente mejor que «Señor» transliterado literalmente como préstamo o que «Maestro», que reduciría el alcance posible.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
translation_notes:
  revision_awareness: Coincide con el pasaje inglés auditado en filosofía de equivalencia óptima y sin revisiones aplicadas; la propuesta española conserva la secuencia narrativa, el valor interrogativo de la frase y la ambigüedad reverente de κύριε.
  spanish_consistency_notes:
  - Se mantiene el pronombre objeto directo enclítico/átono («lo») para referir a Lázaro, evitando redundancia.
  - Se usa pretérito narrativo («dijo», «dijeron») aunque el griego tenga presente histórico, por fluidez natural en español.
  - El par imperativo «ven y mira» conserva la concisión del original y la fórmula idiomática habitual en español.
