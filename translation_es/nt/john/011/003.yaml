translation:
  language: es
  text: 'Así que las hermanas le enviaron un mensaje, diciendo: «Señor, he aquí[a], el que amas[b] está enfermo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Mira» o «Ve».
    reason: alternative_reading
  - marker: b
    text: El verbo griego aquí es φιλέω, a menudo asociado con afecto o amistad; alternativamente, «el que te es querido».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέστειλαν
  english_pob_choice: sent word
  chosen_spanish: le enviaron un mensaje
  alternatives_spanish:
  - le enviaron palabra
  - lo mandaron a decir
  lexicon: BDAG
  rationale: El verbo griego significa ‘enviar’; en este contexto narrativo, con πρὸς αὐτόν y el contenido citado, ‘le enviaron un mensaje’ deja claro que no se trata de un envío físico de las hermanas sino de una comunicación dirigida a él, igual que el razonamiento del POB en inglés.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - Entonces
  - Por tanto
  lexicon: BDAG
  rationale: Marca continuidad narrativa. ‘Así que’ es natural en español y conserva el avance del relato sin cargarlo de una relación lógica más fuerte de la que exige el contexto.
- source_word: αἱ ἀδελφαὶ
  english_pob_choice: the sisters
  chosen_spanish: las hermanas
  alternatives_spanish:
  - sus hermanas
  - las dos hermanas
  lexicon: BDAG
  rationale: El plural con artículo identifica a Marta y María por el contexto inmediato. ‘Las hermanas’ reproduce la referencia sin añadir posesivo que no está explícito en el griego.
- source_word: πρὸς αὐτὸν
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - hacia él
  - para él
  lexicon: BDAG
  rationale: La preposición πρὸς con acusativo expresa dirección hacia la persona destinataria. ‘A él’ es la forma más directa y natural en español, sin nombrar a Jesús donde el griego usa pronombre.
- source_word: λέγουσαι
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijeron
  - con estas palabras
  lexicon: BDAG
  rationale: El participio presente introduce el contenido del mensaje. ‘Diciendo’ mantiene la relación participial del griego y encaja fluidamente con el discurso directo.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Señor mío
  - Maestro
  lexicon: BDAG
  rationale: Para κύριος en dirección a Jesús, el valor reverencial normal se expresa mejor con ‘Señor’. Esto sigue la convención del proyecto para κύριος y evita debilitar el tono de respeto.
- source_word: ἴδε
  english_pob_choice: behold
  chosen_spanish: he aquí[a]
  alternatives_spanish:
  - mira
  - mira bien
  lexicon: BDAG
  rationale: ἴδε es un imperativo de atención. ‘He aquí’ preserva el registro elevado del POB en inglés con ‘behold’ y comunica el llamado enfático del original sin modernizarlo en exceso.
- source_word: ὃν φιλεῖς
  english_pob_choice: the one you love
  chosen_spanish: el que amas
  alternatives_spanish:
  - a quien amas
  - el que te es querido
  lexicon: BDAG
  rationale: La cláusula relativa se vierte de manera natural como ‘el que amas’. En español, ‘amas’ conserva la fuerza afectiva de φιλέω sin imponer una distinción rígida entre φιλέω y ἀγαπάω que el contexto no exige resolver.
- source_word: φιλεῖς
  english_pob_choice: love
  chosen_spanish: amas
  alternatives_spanish:
  - quieres mucho
  - tienes cariño por
  lexicon: BDAG
  rationale: Aunque φιλέω puede denotar afecto o amistad, ‘amas’ es la opción más clara y directa en este contexto. Mantiene la tensión léxica documentada sin rebajarla a un simple ‘te cae bien’ o similar.
- source_word: ἀσθενεῖ
  english_pob_choice: is sick
  chosen_spanish: está enfermo
  alternatives_spanish:
  - está débil
  - está mal
  lexicon: BDAG
  rationale: En el contexto de Lázaro, ἀσθενέω se refiere a enfermedad. ‘Está enfermo’ es el equivalente español más natural y preciso; ‘está débil’ sería demasiado vago.
theological_decisions:
- issue: Renderización de κύριος en la dirección a Jesús
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Señor mío
  - Maestro
  rationale: La lectura del POB en inglés preserva el título reverencial sin forzar una formulación doctrinal adicional. ‘Señor’ mantiene la fuerza cristológica habitual de κύριος en el evangelio de Juan y sigue el estándar del proyecto.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Posible matiz entre φιλέω y ἀγαπάω
  english_pob_reading: the one you love
  chosen_spanish_reading: el que amas
  alternative_spanish_readings:
  - el que te es querido
  - el que aprecias
  rationale: El griego usa φιλέω, que puede implicar afecto o amistad. El POB en inglés opta por ‘love’ y aclara la alternativa sin imponer una separación teológica rígida; ‘amas’ conserva ese peso afectivo y no borra la tensión lexical.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, preserve tension rather than resolve it
- issue: Valor enfático de ἴδε
  english_pob_reading: behold
  chosen_spanish_reading: he aquí
  alternative_spanish_readings:
  - mira
  - ve
  rationale: El imperativo llama la atención sobre la noticia. ‘He aquí’ reproduce el registro formal del inglés POB ‘behold’ y conserva el matiz enfático y elevado del original.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve marked discourse force where the source is marked'
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó ‘look’ por ‘behold’ para reflejar con mayor formalidad ἴδε; por eso el español adopta «he aquí» y no una forma coloquial. Se mantuvo la decisión auditada de traducir ἀπέστειλαν con un envío de mensaje y de conservar la tensión léxica de φιλέω sin resolverla de manera interpretativa.
  spanish_consistency_notes:
  - He conservado «las hermanas» sin posesivo, siguiendo el referente contextual y evitando expansión no explícita.
  - He mantenido «Señor» para Κύριε, coherente con el tratamiento del proyecto para el discurso a Jesús.
  - «He aquí» funciona como equivalente estilístico de «behold» en un registro bíblico contemporáneo y no pretende arcaizar innecesariamente todo el versículo.
  - La nota sobre φιλέω se coloca en la palabra afectiva principal para preservar la alternativa documentada sin duplicar marcadores.
