translation:
  language: es
  text: 'Así que Tomás, llamado Dídimo[a], dijo a sus condiscípulos: «Vayamos también nosotros, para que muramos con él».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Griego Dídimo; es decir, «Mellizo» o «Gemelo».
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπεν οὖν
  english_pob_choice: So ... said
  chosen_spanish: Así que ... dijo
  alternatives_spanish:
  - Entonces ... dijo
  - Por tanto ... dijo
  lexicon: BDAG
  rationale: οὖν marca continuidad narrativa e inferencia suave; «Así que» comunica esa transición de modo natural en español sin forzar una conclusión lógica más fuerte de la que el contexto exige.
- source_word: Θωμᾶς
  english_pob_choice: Thomas
  chosen_spanish: Tomás
  alternatives_spanish:
  - Thomas
  lexicon: BDAG
  rationale: Nombre propio usual en español bíblico y plenamente transparente para la audiencia meta.
- source_word: ὁ λεγόμενος Δίδυμος
  english_pob_choice: called Didymus
  chosen_spanish: llamado Dídimo
  alternatives_spanish:
  - que era llamado Dídimo
  - llamado Twin
  lexicon: BDAG
  rationale: Δίδυμος se conserva como nombre/apelativo tradicional en forma transliterada «Dídimo», siguiendo el ajuste revisado del inglés POB para reflejar directamente el griego. «Llamado» reproduce la participial pasiva con neutralidad descriptiva.
- source_word: τοῖς συμμαθηταῖς
  english_pob_choice: to his fellow disciples
  chosen_spanish: a sus condiscípulos
  alternatives_spanish:
  - a sus fellow disciples
  - a sus compañeros discípulos
  lexicon: BDAG
  rationale: συμμαθηταῖς expresa compañeros de aprendizaje/discipulado. «Condiscípulos» es conciso, natural en español e incorpora la relación compartida de discipulado sin añadir explicación innecesaria.
- source_word: Ἄγωμεν
  english_pob_choice: Let us also go
  chosen_spanish: Vayamos también nosotros
  alternatives_spanish:
  - Vamos también nosotros
  - Andemos también nosotros
  lexicon: BDAG
  rationale: El subjuntivo exhortativo de primera persona plural se expresa mejor con «Vayamos». Se mantiene la exhortación inclusiva y la fuerza volitiva del griego.
- source_word: καὶ ἡμεῖς
  english_pob_choice: also
  chosen_spanish: también nosotros
  alternatives_spanish:
  - nosotros también
  - incluso nosotros
  lexicon: BDAG
  rationale: La combinación enfatiza inclusión de los discípulos con Jesús. «También nosotros» conserva el énfasis sin recargar el estilo.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: Introduce finalidad/resultado esperado; «para que» es la equivalencia más natural en español y mantiene la relación sintáctica del griego.
- source_word: ἀποθάνωμεν
  english_pob_choice: we may die
  chosen_spanish: muramos
  alternatives_spanish:
  - podamos morir
  - muramos nosotros
  lexicon: BDAG
  rationale: El subjuntivo aoristo se vierte de forma idiomática con «muramos». El contexto no exige añadir matiz interpretativo sobre valentía o resignación.
- source_word: μετ’ αὐτοῦ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - junto con él
  - con él mismo
  lexicon: BDAG
  rationale: Expresa acompañamiento simple; el referente es claramente Jesús por el contexto inmediato, por lo que «él» es suficiente y natural.
theological_decisions:
- issue: Tono e intención de la declaración de Tomás
  english_pob_reading: Render the statement straightforwardly without adding interpretive coloring.
  chosen_spanish_reading: Traducir la frase de manera directa, sin decidir si expresa valentía, resignación fatalista o ironía pesimista.
  alternative_spanish_readings:
  - Vayamos con valentía también nosotros, para morir con él
  - Vayamos también nosotros, resignados a morir con él
  - Vayamos también nosotros, con ironía, para morir con él
  rationale: El griego no explicita la motivación psicológica; la traducción conserva esa tensión interpretativa en vez de resolverla.
  doctrine_reference: Preservar la tensión teológica y narrativa del texto sin imponer una lectura interpretativa.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del contexto inglés que prefirió «Didymus» sobre «Twin» para reflejar directamente el griego; en español se mantiene el equivalente transparente «Dídimo», y la nota aclara el sentido léxico del apelativo.
  spanish_consistency_notes:
  - Se mantiene «Tomás» como nombre propio estándar y «Dídimo» como apelativo transliterado, sin sustituirlo por una glosa en el texto principal.
  - «Condiscípulos» conserva el valor de συμμαθηταῖς mejor que una paráfrasis más larga, y su registro es adecuado para prosa bíblica contemporánea.
  - La frase final no añade especificaciones sobre el destino o la actitud de los discípulos; conserva la ambigüedad del original.
