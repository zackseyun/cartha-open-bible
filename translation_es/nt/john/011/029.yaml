translation:
  language: es
  text: Y ella, cuando lo oyó[a], se levantó rápidamente y fue a él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «aquella, cuando oyó, se levantó rápidamente e iba hacia él».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκείνη
  english_pob_choice: she
  chosen_spanish: ella
  alternatives_spanish:
  - aquella
  - esa
  - aquella mujer
  lexicon: BDAG
  rationale: El demostrativo griego remite a María en el contexto inmediato. En español, el pronombre personal 'ella' comunica con naturalidad esa referencia sin añadir una etiqueta más pesada como 'aquella mujer'.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora bien
  - Entonces
  - Pero
  lexicon: BDAG
  rationale: Aquí δὲ funciona como conector narrativo suave, no como contraste fuerte. 'Y' mantiene el avance de la narración con naturalidad en español.
- source_word: ὡς
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - en cuanto
  - así que
  - después de que
  lexicon: BDAG
  rationale: La construcción temporal con el aoristo pide una relación de tiempo simple. 'Cuando' es fiel y natural; 'en cuanto' intensificaría más de lo que exige el griego.
- source_word: ἤκουσεν
  english_pob_choice: heard it
  chosen_spanish: lo oyó
  alternatives_spanish:
  - oyó
  - escuchó eso
  - se enteró
  lexicon: BDAG
  rationale: El verbo significa 'oír'. En español, 'lo oyó' conserva el objeto implícito del mensaje previo sin introducir interpretación adicional como 'se enteró'.
- source_word: ἠγέρθη
  english_pob_choice: got up
  chosen_spanish: se levantó
  alternatives_spanish:
  - se puso de pie
  - se alzó
  - se levantó de inmediato
  lexicon: BDAG
  rationale: Aunque la forma es pasiva, en este uso intransitivo σημαίνει 'levantarse / ponerse en pie'. 'Se levantó' evita la falsa idea de una pasiva teológica o causal externa.
- source_word: ταχὺ
  english_pob_choice: quickly
  chosen_spanish: rápidamente
  alternatives_spanish:
  - pronto
  - de prisa
  - con rapidez
  lexicon: BDAG
  rationale: El adverbio expresa prontitud. 'Rápidamente' suena digno y claro en español; 'pronto' sería más ambiguo en este contexto narrativo.
- source_word: ἤρχετο
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - iba
  - venía
  - se dirigió
  lexicon: BDAG
  rationale: El imperfecto presenta el movimiento en curso, pero el español narrativo acepta 'fue' como secuencia natural. 'Iba' conservaría más explícitamente el aspecto progresivo, pero aquí suena menos fluido.
- source_word: πρὸς αὐτόν
  english_pob_choice: to him
  chosen_spanish: hacia él
  alternatives_spanish:
  - a él
  - para verlo
  - hacia donde estaba él
  lexicon: BDAG
  rationale: La preposición πρός con acusativo marca dirección hacia una persona. 'Hacia él' refleja bien ese movimiento orientado sin perder la cercanía narrativa.
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto español, anclado en la frase correspondiente. El contenido sigue el griego SBLGNT y el rastro auditado en inglés, sin añadir notas sin ancla.
  spanish_consistency_notes:
  - Se mantuvo 'Y' como conector narrativo suave, coherente con δὲ.
  - Se evitó 'Cristo', 'SEÑOR' o paráfrasis teológicas porque el versículo no las exige.
  - La nota [a] preserva la alternativa más literal reconocida en el rastro inglés, ahora correctamente anclada en 'lo oyó[a]'.
