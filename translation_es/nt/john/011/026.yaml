    changes_summary: Removed the awkward and inaccurate 'forever' after 'never die'; οὐ μὴ ... εἰς τὸν αἰῶνα is naturally rendered 'will certainly never die.' Kept the rest unchanged.
translation:
  language: es
  text: Y todo el que vive y cree en mí no morirá jamás[a]. ¿Crees esto?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''no morirá eternamente'' / ''no morirá espiritualmente''. El griego expresa la promesa con gran énfasis, pero sin especificar aquí el modo de muerte.'
    reason: alternative_reading
lexical_decisions:
- source_word: πᾶς ὁ ζῶν
  english_pob_choice: everyone who lives
  chosen_spanish: todo el que vive
  alternatives_spanish:
  - todos los que viven
  - cualquiera que vive
  lexicon: BDAG
  rationale: La construcción articular con participio funciona de modo sustantivo y genérico. En español, 'todo el que vive' reproduce bien el valor universal sin sonar pesado.
- source_word: πιστεύων εἰς ἐμέ
  english_pob_choice: believes in me
  chosen_spanish: cree en mí
  alternatives_spanish:
  - confía en mí
  - cree en mí
  lexicon: BDAG
  rationale: '''Creer en'' expresa de forma natural la fe personal dirigida a Jesús. ''Confía en mí'' es posible, pero ''cree en mí'' mantiene mejor la forma verbal estándar del texto.'
- source_word: οὐ μὴ ἀποθάνῃ
  english_pob_choice: will certainly never die
  chosen_spanish: no morirá jamás
  alternatives_spanish:
  - ciertamente no morirá
  - nunca morirá
  lexicon: BDAG
  rationale: La negación enfática οὐ μή pide un refuerzo en español. 'No morirá jamás' conserva la fuerza absoluta y suena idiomático, sin sobreexplicar el modo de la muerte.
- source_word: εἰς τὸν αἰῶνα
  english_pob_choice: forever
  chosen_spanish: jamás
  alternatives_spanish:
  - para siempre
  - eternamente
  lexicon: BDAG
  rationale: Aunque literalmente el giro puede significar 'para siempre', aquí intensifica la negación ya expresada. 'Jamás' comunica bien la idea de negación absoluta en español y evita una redundancia torpe.
- source_word: πιστεύεις τοῦτο;
  english_pob_choice: Do you believe this?
  chosen_spanish: ¿Crees esto?
  alternatives_spanish:
  - ¿Crees eso?
  lexicon: BDAG
  rationale: '''Esto'' conserva la referencia inmediata a lo que Jesús acaba de afirmar. Es la deixis más directa y natural en español.'
theological_decisions:
- issue: Promesa de Jesús sobre no morir
  english_pob_reading: The statement preserves the paradox between physical death and ultimate/spiritual death, without collapsing it into an interpretive paraphrase.
  chosen_spanish_reading: 'La frase se deja con la misma tensión: afirma una victoria absoluta sobre la muerte sin explicitar aquí si habla de muerte física, espiritual o eterna.'
  alternative_spanish_readings:
  - no morirá eternamente
  - no morirá espiritualmente
  rationale: El griego dice la promesa con énfasis, pero no especifica el modo de muerte. La traducción evita resolver esa tensión en el texto principal y la deja abierta para el contexto.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión reciente del inglés eliminó el redundante 'forever' tras 'never die' y dejó como lectura final 'will certainly never die'. La versión española sigue esa decisión y evita añadir un equivalente duplicado, usando 'no morirá jamás'.
  spanish_consistency_notes:
  - Se mantiene 'creer en mí' para πιστεύω εἰς ἐμέ, conforme al uso bíblico y al estilo POB.
  - Se evita 'SEÑOR' o 'Cristo' porque el versículo no los contiene.
  - '''Jamás'' en la negación funciona como intensificador idiomático de οὐ μή + subjuntivo, sin introducir un matiz temporal adicional indebido.'
