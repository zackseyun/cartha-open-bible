  text: καὶ πᾶς ὁ ζῶν καὶ πιστεύων εἰς ἐμὲ οὐ μὴ ἀποθάνῃ εἰς τὸν αἰῶνα· πιστεύεις τοῦτο;
base_translation:
  language: en
  yaml_path: translation/nt/john/011/026.yaml
  text: And everyone who lives and believes in me will certainly never die[b][a]. Do you believe this?
  footnotes:
  - marker: a
    text: Or 'will certainly never die eternally' / 'will certainly never die spiritually.' The Greek states the promise emphatically without explicitly specifying the mode of death here.
    reason: alternative_reading
  - marker: b
    text: Literally 'unto the age,' an idiom meaning 'forever.'
    reason: lexical_alternative
  ai_draft:
