translation:
  language: es
  text: Jesús lloró[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Jesús derramó lágrimas». El verbo griego denota específicamente el derramar lágrimas y se distingue del llanto fuerte descrito en el contexto cercano.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐδάκρυσεν
  english_pob_choice: wept
  chosen_spanish: derramó lágrimas
  alternatives_spanish:
  - lloró
  - se echó a llorar
  lexicon: BDAG
  rationale: El verbo griego δακρύω indica literalmente la acción de derramar lágrimas. En español, «derramó lágrimas» conserva ese matiz léxico con naturalidad y refleja la opción inglesa de no intensificar el verbo. «Lloró» es más idiomático, pero menos específico; «se echó a llorar» añade un inicio no exigido por el aoristo.
- source_word: ὁ Ἰησοῦς
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - Jesús el
  lexicon: BDAG
  rationale: El artículo griego forma parte de la referencia al sujeto, pero en español no se expresa con nombre propio. Se mantiene simplemente «Jesús» como equivalente natural y fiel.
theological_decisions:
- issue: Expresión de la humanidad real de Jesús
  english_pob_reading: Jesus wept
  chosen_spanish_reading: Jesús derramó lágrimas
  alternative_spanish_readings:
  - Jesús lloró
  - Jesús se echó a llorar
  rationale: La traducción conserva una afirmación narrativa sencilla de emoción humana genuina sin añadir explicación doctrinal al texto principal. «Derramó lágrimas» mantiene el carácter sobrio del griego y evita tanto minimizar como intensificar la escena.
  doctrine_reference: Definición de Calcedonia (451 d. C.)
translation_notes:
  revision_awareness: El pasaje es muy breve y el juicio de revisión en inglés quedó sin cambios; por eso se conserva una formulación igualmente concisa en español, con la misma distinción léxica entre derramar lágrimas y un llanto más intenso.
  spanish_consistency_notes:
  - Se prefiere «Jesús» sin artículo, como en el uso normal del español.
  - Se evita «SEÑOR» o una forma litúrgica no presente en el original.
  - Se mantiene un registro sobrio y narrativo, acorde con la brevedad del versículo.
