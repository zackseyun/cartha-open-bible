base_translation:
  language: en
  yaml_path: translation/nt/john/011/039.yaml
  text: Jesus said[a], “Take away the stone.” Martha, the sister of the dead man, said to him, “Lord, by now he smells[c][b], for he has been dead four days.”
  footnotes:
