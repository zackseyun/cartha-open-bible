    text: Or “the one who had died.”
    reason: lexical_alternative
  - marker: b
    text: Or “he stinks”; Greek has a verb meaning “to emit an odor.”
    reason: lexical_alternative
  - marker: c
    text: Literally, “for he is a fourth-day man,” that is, he has been dead four days.
    reason: lexical_alternative
