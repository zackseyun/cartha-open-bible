translation:
  language: es
  text: 'Jesús dijo: «Quiten la piedra». Marta, la hermana del muerto[a], le dijo: «Señor, ya huele mal[b], porque lleva cuatro días muerto[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el que había muerto».
    reason: lexical_alternative
  - marker: b
    text: O «apesta»; el verbo griego significa «emitir un olor».
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «pues es un hombre de cuatro días», es decir, lleva cuatro días muerto.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἄρατε
  english_pob_choice: Take away
  chosen_spanish: Quiten
  alternatives_spanish:
  - Levanten
  - Retiren
  lexicon: BDAG
  rationale: El imperativo plural pide a varios presentes que aparten la piedra. En español, «quiten» comunica con naturalidad la acción de retirar o sacar del paso, sin volverla más literal de lo necesario.
- source_word: λίθον
  english_pob_choice: stone
  chosen_spanish: piedra
  alternatives_spanish:
  - roca
  - bloque de piedra
  lexicon: BDAG
  rationale: En contexto funerario se trata de la piedra que cerraba la entrada del sepulcro. «Piedra» es la forma natural y clara en español.
- source_word: τοῦ τετελευτηκότος
  english_pob_choice: the dead man
  chosen_spanish: del muerto
  alternatives_spanish:
  - del que había muerto
  - del difunto
  lexicon: BDAG
  rationale: El participio perfecto expresa a la persona ya fallecida, con estado resultante. «Del muerto» conserva esa referencia de manera breve y fiel. Se evita suavizarlo con «difunto» porque el texto mantiene una designación directa.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Señor mío
  - Maestro
  lexicon: BDAG
  rationale: La forma de trato a Jesús en Juan suele requerir «Señor» en español. Conserva el peso reverente del vocativo griego sin reducirlo a una cortesía simple como «Señor mío» o «Maestro».
- source_word: ἤδη
  english_pob_choice: by now
  chosen_spanish: ya
  alternatives_spanish:
  - ya para este momento
  - ya a estas alturas
  lexicon: BDAG
  rationale: La partícula indica que la condición ya está presente. «Ya» es la opción más natural en español dentro de esta advertencia de Marta.
- source_word: ὄζει
  english_pob_choice: he smells
  chosen_spanish: huele mal
  alternatives_spanish:
  - despide mal olor
  - apesta
  lexicon: BDAG
  rationale: El verbo griego significa emitir olor; aquí el contexto de muerte lo vuelve desagradable. «Huele mal» suena natural en español y preserva la referencia al mal olor sin volverlo grosero.
- source_word: τεταρταῖος
  english_pob_choice: he has been dead four days
  chosen_spanish: lleva cuatro días muerto
  alternatives_spanish:
  - ha estado muerto cuatro días
  - es de cuatro días
  lexicon: BDAG
  rationale: El adjetivo significa literalmente algo como «de cuatro días» o «cuatro días [muerto]». En español hace falta expansión para expresar la idea con claridad; «lleva cuatro días muerto» comunica el estado y la duración de manera idiomática.
- source_word: γάρ
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Aquí γάρ introduce la explicación de Marta. «Porque» reproduce con claridad la relación causal en español moderno.
theological_decisions:
- issue: Vocativo κύριε dirigido a Jesús
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Señor mío
  - Maestro
  rationale: Se conserva el tratamiento reverente a Jesús sin rebajarlo a una simple fórmula de cortesía. En este pasaje no se introduce una confesión doctrinal adicional; solo se mantiene el valor de respeto y reconocimiento que el contexto sugiere.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego y el criterio auditado de la POB en inglés: imperativo plural para retirar la piedra, referencia directa al muerto, y valor reverente de κύριε como «Señor». Se mantiene la expansión necesaria de τεταρταῖος para que el sentido sea natural en español.'
  spanish_consistency_notes:
  - Se usa «Jesús» para Ἰησοῦς.
  - Se usa «Señor» para Κύριε conforme al uso doctrinal del proyecto.
  - Se evita suavizar el olor con una paráfrasis excesiva; «huele mal» conserva el matiz negativo del contexto funerario.
  - Se mantiene el objeto singular «la piedra» para λίθον, en línea con el escenario del sepulcro.
