translation:
  language: es
  text: 'Entonces, después de esto, dice a los discípulos: «Vayamos a Judea de nuevo[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hacia Judea de nuevo». La preposición griega puede expresar movimiento «a» o «hacia dentro de» Judea en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔπειτα
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Después
  - Luego
  lexicon: BDAG
  rationale: Marca la secuencia narrativa. «Entonces» es natural en español y conserva el avance temporal sin volver la frase rígida.
- source_word: μετὰ τοῦτο
  english_pob_choice: after this
  chosen_spanish: después de esto
  alternatives_spanish:
  - después de estas cosas
  - luego de esto
  lexicon: BDAG
  rationale: Reproduce el valor temporal inmediato de la expresión griega sin añadir contenido que no está explícito.
- source_word: λέγει
  english_pob_choice: he says
  chosen_spanish: les dice
  alternatives_spanish:
  - les dijo
  - les habla
  lexicon: BDAG
  rationale: Se conserva el presente histórico de Juan en español, manteniendo la viveza narrativa del griego.
- source_word: τοῖς μαθηταῖς
  english_pob_choice: to the disciples
  chosen_spanish: a los discípulos
  alternatives_spanish:
  - a sus discípulos
  lexicon: BDAG
  rationale: El dativo indica destinatarios directos; «sus» no está explícito en el griego, por eso se omite.
- source_word: Ἄγωμεν
  english_pob_choice: Let us go
  chosen_spanish: Vayamos
  alternatives_spanish:
  - Vamos
  - Vayamos juntos
  lexicon: BDAG
  rationale: Es un subjuntivo exhortativo de primera persona plural. «Vayamos» transmite la invitación con fuerza natural en español.
- source_word: εἰς τὴν Ἰουδαίαν
  english_pob_choice: into Judea
  chosen_spanish: a Judea
  alternatives_spanish:
  - hacia Judea
  - en Judea
  lexicon: BDAG
  rationale: Aunque εἰς puede sugerir movimiento hacia adentro, en español «a Judea» suena más natural y aún conserva la dirección del movimiento. La alternativa «a Judea» deja abierta la misma variación que la POB inglesa documentó entre «into» y «to».
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  - nuevamente
  lexicon: BDAG
  rationale: Indica retorno a un lugar ya mencionado. «Otra vez» es claro, idiomático y fiel al valor repetitivo.
theological_decisions:
- issue: Valor direccional de εἰς en una frase de movimiento
  english_pob_reading: ‘into Judea’ with footnoted option ‘to Judea again’
  chosen_spanish_reading: «a Judea» sin marcar una distinción más fuerte que la que exige el contexto
  alternative_spanish_readings:
  - «a Judea otra vez»
  - «hacia Judea otra vez»
  - «entrando en Judea otra vez»
  rationale: El griego admite una lectura direccional general y, en español, la preposición «a» comunica el movimiento sin sobrerreclamar una imagen de ingreso físico que el contexto no exige de manera inequívoca.
  doctrine_reference: Translation philosophy §1, §6
- issue: Preservación del presente histórico en narrativa joánica
  english_pob_reading: ‘he says’
  chosen_spanish_reading: «les dice»
  alternative_spanish_readings:
  - «les dijo»
  rationale: El presente histórico forma parte del estilo narrativo de Juan y no introduce una diferencia doctrinal; conservarlo evita suavizar indebidamente el texto fuente.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: Se corrigió el problema de validación eliminando la nota al pie no anclada; la traducción final no requiere marcadores de nota porque la alternativa direccional se resolvió en la redacción principal.
  spanish_consistency_notes:
  - Se mantiene «Judea» como topónimo estándar para τὴν Ἰουδαίαν.
  - Se conserva el presente narrativo «dice» en lugar de pasarlo al pasado.
  - No se introduce el posesivo «sus» porque no está en el griego.
  - La frase es publicable y respeta la concisión del versículo.
