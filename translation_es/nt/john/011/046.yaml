translation:
  language: es
  text: Pero algunos de ellos fueron a los Fariseos y les dijeron lo que Jesús había hecho[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «les informaron de lo que Jesús hizo». El griego no dice explícitamente cuál fue el motivo de los que fueron a los Fariseos.
    reason: lexical_alternative
lexical_decisions:
- source_word: τινὲς
  english_pob_choice: some
  chosen_spanish: algunos
  alternatives_spanish:
  - unos
  - ciertos
  lexicon: BDAG
  rationale: El indefinido plural marca a un subconjunto del grupo anterior. «Algunos» es natural en español y conserva el valor no especificado de τινὲς.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: La partícula es adversativa en el contexto narrativo; «Pero» preserva mejor ese contraste con los que habían creído.
- source_word: ἐξ αὐτῶν
  english_pob_choice: of them
  chosen_spanish: de ellos
  alternatives_spanish:
  - de entre ellos
  - entre ellos
  lexicon: BDAG
  rationale: Expresa que salieron de ese mismo grupo mencionado antes. «De ellos» es conciso; «de entre ellos» aclara más el matiz de subconjunto.
- source_word: ἀπῆλθον
  english_pob_choice: went
  chosen_spanish: fueron
  alternatives_spanish:
  - se fueron
  - partieron
  lexicon: BDAG
  rationale: El aoristo de ἀπέρχομαι indica salida o alejamiento. En español, «fueron» resulta natural y mantiene la idea de desplazamiento sin añadir énfasis innecesario.
- source_word: πρὸς τοὺς Φαρισαίους
  english_pob_choice: to the Pharisees
  chosen_spanish: a los fariseos
  alternatives_spanish:
  - ante los fariseos
  - hacia los fariseos
  lexicon: BDAG
  rationale: La preposición con acusativo indica movimiento hacia personas. «A los fariseos» es la forma más directa y natural en español para el grupo nominal Φαρισαίοι.
- source_word: εἶπαν αὐτοῖς
  english_pob_choice: told them
  chosen_spanish: les dijeron
  alternatives_spanish:
  - les contaron
  - les reportaron
  lexicon: BDAG
  rationale: λέγω con dativo puede ser «decir a»; en español narrativo, «les dijeron» preserva el acto de comunicar sin introducir la connotación más formal de «reportar».
- source_word: ἃ
  english_pob_choice: what
  chosen_spanish: lo que
  alternatives_spanish:
  - las cosas que
  - aquello que
  lexicon: BDAG
  rationale: El relativo neutro plural se vuelve naturalmente «lo que» en español. Conserva la referencia global a los hechos sin forzar un plural innecesario.
- source_word: ἐποίησεν
  english_pob_choice: had done
  chosen_spanish: había hecho
  alternatives_spanish:
  - hizo
  lexicon: BDAG
  rationale: El aoristo perfecto en relación con el acto de hablar se expresa bien con pretérito pluscuamperfecto en español, manteniendo la secuencia temporal del relato.
- source_word: Ἰησοῦς
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  lexicon: BDAG
  rationale: Nombre propio estándar en español para Ἰησοῦς.
theological_decisions:
- issue: Motivo de ir a los fariseos
  english_pob_reading: Neutral reporting language without importing motive
  chosen_spanish_reading: Lenguaje neutral de comunicación, sin atribuir intención hostil
  alternative_spanish_readings:
  - les denunciaron lo que Jesús había hecho
  - fueron a acusar a Jesús ante los fariseos
  rationale: El griego solo afirma que algunos fueron a los fariseos y les dijeron lo que Jesús había hecho. No explicita motivo ni hostilidad; por eso la traducción conserva un verbo neutral.
  doctrine_reference: 'Principio POB: preservar la tensión o ambigüedad del texto sin resolverla por interpretación externa.'
translation_notes:
  revision_awareness: La redacción sigue el ajuste final del audit trail inglés, que prefirió un verbo de desplazamiento simple («went») en lugar de una forma más enfática («went away»). En español se reflejó con «fueron», sin añadir matices de separación que el griego no exige en este contexto.
  spanish_consistency_notes:
  - Se mantuvo «fariseos» como nombre de grupo establecido, sin transliteración.
  - Se usó «Jesús» como forma fija del nombre propio.
  - La nota al pie preserva la misma cautela interpretativa del audit trail inglés respecto del motivo de la acción.
  - No se introdujo terminología acusatoria como «delataron» o «traicionaron», porque el versículo no la contiene explícitamente.
