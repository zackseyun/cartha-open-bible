translation:
  language: es
  text: 'El hombre que había muerto salió[a], con los pies y las manos envueltos con vendas funerarias[b], y su rostro estaba envuelto con un paño. Jesús les dijo[c]: «Desátenlo y déjenlo ir».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el muerto salió». El griego lo identifica literalmente como «el que había muerto».
    reason: lexical_alternative
  - marker: b
    text: O «con tiras de tela» para los envoltorios usados en el entierro.
    reason: lexical_alternative
  - marker: c
    text: 'El griego usa un presente histórico: literalmente, «Jesús dice».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξῆλθεν
  english_pob_choice: came out
  chosen_spanish: salió
  alternatives_spanish:
  - salió afuera
  - se salió
  lexicon: BDAG
  rationale: El aoristo de ἐξέρχομαι indica movimiento hacia afuera. En español, «salió» es natural y fiel, sin la rigidez de «salió afuera» ni el matiz coloquial de «se salió».
- source_word: ὁ τεθνηκώς
  english_pob_choice: the man who had died
  chosen_spanish: el hombre que había muerto
  alternatives_spanish:
  - el muerto
  - el que había muerto
  lexicon: BDAG
  rationale: El participio perfecto identifica a Lázaro como el que había estado muerto. «El hombre que había muerto» preserva esa referencia pasada sin hacer sonar que sigue muerto en el presente narrativo.
- source_word: δεδεμένος
  english_pob_choice: bound
  chosen_spanish: atados
  alternatives_spanish:
  - ligados
  - vendados
  lexicon: BDAG
  rationale: El participio pasivo perfecto de δέω expresa estar sujeto. «Atados» comunica la restricción física de forma clara; lo pongo en plural por concordancia con «los pies y las manos».
- source_word: κειρίαις
  english_pob_choice: with burial cloths
  chosen_spanish: con vendas
  alternatives_spanish:
  - con tiras de tela
  - con lienzos funerarios
  lexicon: BDAG
  rationale: κειρία designa las tiras o vendas usadas para envolver en el entierro. «Vendas» conserva la idea de tiras sujetas al cuerpo y no se confunde con el paño del rostro.
- source_word: ἡ ὄψις αὐτοῦ
  english_pob_choice: his face
  chosen_spanish: su rostro
  alternatives_spanish:
  - su cara
  - su semblante
  lexicon: BDAG
  rationale: Aquí ὄψις se refiere concretamente al aspecto visible del rostro, por el contraste con el envoltorio. «Rostro» es claro, digno y evita la ambigüedad más general de «apariencia».
- source_word: σουδαρίῳ
  english_pob_choice: with a cloth
  chosen_spanish: con un paño
  alternatives_spanish:
  - con un lienzo
  - con un sudario
  lexicon: BDAG
  rationale: σουδάριον puede ser un paño para la cabeza o el rostro en contexto funerario. «Paño» mantiene la neutralidad y evita que «sudario» suene demasiado técnico o sugiere la sábana de entierro completa.
- source_word: περιεδέδετο
  english_pob_choice: wrapped
  chosen_spanish: estaba envuelto
  alternatives_spanish:
  - había sido envuelto
  - estaba atado alrededor
  lexicon: BDAG
  rationale: 'El pluscuamperfectivo pasivo describe un estado resultante: el rostro permanecía cubierto por el paño. «Estaba envuelto» comunica bien ese estado sin sobrecargar la frase.'
- source_word: λέγει
  english_pob_choice: said
  chosen_spanish: les dijo
  alternatives_spanish:
  - les dice
  - dijo
  lexicon: BDAG
  rationale: Aunque el griego usa presente histórico, el español narrativo funciona mejor en pasado. «Les dijo» preserva la naturalidad sin perder el valor discursivo del original.
- source_word: Λύσατε
  english_pob_choice: Unbind
  chosen_spanish: Desátenlo
  alternatives_spanish:
  - Sueltenlo
  - Átenlo
  lexicon: BDAG
  rationale: El imperativo aoristo de λύω pide liberar lo que lo sujeta. «Desátenlo» conserva el vínculo con las vendas y mantiene la orden directa.
- source_word: ἄφετε αὐτὸν ὑπάγειν
  english_pob_choice: let him go
  chosen_spanish: déjenlo ir
  alternatives_spanish:
  - permítanle irse
  - déjenlo marcharse
  lexicon: BDAG
  rationale: ἄφετε + infinitivo expresa permiso para irse. «Déjenlo ir» es natural, breve y refleja tanto la autorización como la liberación implícita en el verbo.
theological_decisions:
- issue: Estado de Lázaro tras salir del sepulcro
  english_pob_reading: the man who had died
  chosen_spanish_reading: el hombre que había muerto
  alternative_spanish_readings:
  - el muerto
  rationale: 'La redacción conserva la tensión del texto: Lázaro es identificado por su muerte anterior, pero narrativamente ya está vivo. No se debe suavizar esa tensión ni convertirla en una formulación doctrinal ajena al versículo.'
  doctrine_reference: Preservar la tensión narrativa y cristológica del relato sin añadir interpretación dogmática.
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió «says» por «said» para adecuarse mejor al pasado narrativo, pero conservó la observación sobre el presente histórico griego. La versión española sigue la línea final narrativa en pasado («les dijo») y mantiene la nota sobre el valor aspectual/discursivo del original.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando corresponda a יהוה; este versículo no contiene el nombre divino.
  - Se mantuvo «Jesús» como forma estable del nombre propio.
  - Se prefirió un español bíblico contemporáneo, claro y solemne, sin arcaísmos innecesarios.
  - Se distinguió entre «vendas» para κειρίαις y «paño» para σουδάριον para no fusionar dos objetos distintos.
