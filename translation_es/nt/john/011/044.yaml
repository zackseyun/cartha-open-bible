    text: O «el muerto salió». El griego lo identifica literalmente como «el que había muerto».
    reason: lexical_alternative
  - marker: b
    text: O «con tiras de tela» para los envoltorios usados en el entierro.
    reason: lexical_alternative
  - marker: c
    text: 'El griego usa un presente histórico: literalmente, «Jesús dice».'
    reason: lexical_alternative
  revision_rationale: Se recomienda una revisión menor para reflejar con más precisión κειρίαις como telas de entierro. «Vendas funerarias» conserva claridad en español y alinea mejor el borrador con la rationale léxica del POB inglés. El resto del versículo puede mantenerse sustancialmente igual.
