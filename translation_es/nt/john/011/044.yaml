base_translation:
  language: en
  yaml_path: translation/nt/john/011/044.yaml
  text: The man who had died came out[a], his feet and hands bound with burial cloths, and his face wrapped with a cloth. Jesus said to them[c][b], “Unbind him and let him go.”
  footnotes:
  - marker: a
    text: Or “the dead man came out.” The Greek literally identifies him as “the one who had died.”
    reason: lexical_alternative
  - marker: b
    text: Or “with strips of cloth” for the wrappings used in burial.
    reason: lexical_alternative
  - marker: c
    text: Greek “Jesus says,” using a historical present; many translations render “said.”
    reason: lexical_alternative
