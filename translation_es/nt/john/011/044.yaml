review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del griego y sigue de cerca el rastro POB en puntos clave: «el hombre que había muerto» preserva correctamente ὁ τεθνηκώς, «salió» corresponde bien a ἐξῆλθεν, y «Desátenlo y déjenlo ir» transmite con fidelidad Λύσατε αὐτὸν καὶ ἄφετε αὐτὸν ὑπάγειν. También mantiene adecuadamente la nota sobre el presente histórico en λέγει. Sin embargo, κειρίαις en este contexto funerario queda algo subespecificado como «vendas», y conviene explicitar mejor el matiz de telas de entierro para alinearse con la decisión inglesa «burial cloths».'
  spanish_quality_summary: 'El español es claro, natural y de tono digno. No obstante, una ligera revisión mejora la precisión semántica y la fluidez: «atados con vendas» funciona, pero suena algo clínico o médico; «envueltos con vendas funerarias» o formulación equivalente comunica mejor el contexto sepulcral sin perder naturalidad. El resto del versículo está bien construido y es plenamente legible para un público eclesial amplio.'
  glossary_alignment: 'No hay conflictos con la terminología troncal del proyecto. «Jesús» está correcto. La principal cuestión léxica es κειρίαις: el inglés auditado privilegia el contexto funerario, por lo que «vendas funerarias» alinea mejor el español con la rationale documentada. «Paño» para σουδάριον es aceptable y distingue bien este elemento de las vendas. «Rostro» es una buena elección para ἡ ὄψις αὐτοῦ.'
  issues:
  - severity: medium
    issue: «con vendas» debilita el matiz funerario de κειρίαις
    rationale: Aunque «vendas» puede valer, en español suele evocar vendas médicas. El griego se refiere a envolturas usadas en el entierro; el inglés POB documenta precisamente «burial cloths». Añadir «funerarias» preserva mejor el contexto sin volver la frase rígida.
  - severity: low
    issue: La decisión léxica de δεδεμένος como «atados» depende sintácticamente de «los pies y las manos» y no del hombre
    rationale: No es una traducción incorrecta, pero «envueltos» con las extremidades como referente inmediato armoniza mejor con el uso de κειρίαις y evita una leve aspereza sintáctica. La idea de sujeción permanece suficientemente clara en el contexto y en el mandato posterior «Desátenlo».
  revised_spanish_text: 'El hombre que había muerto salió[a], con los pies y las manos envueltos con vendas funerarias[b], y su rostro estaba envuelto con un paño. Jesús les dijo[c]: «Desátenlo y déjenlo ir».'
  revised_footnotes:
