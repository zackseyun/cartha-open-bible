revisions:
- from: Ahora Jesús había hablado acerca de su muerte, pero ellos pensaron que estaba hablando del sueño[a] del dormir.
  to: Jesús había hablado de su muerte, pero ellos pensaron que estaba hablando del sueño literal[a].
  rationale: Se quitó «Ahora» por naturalidad discursiva en español y se reemplazó «del sueño del dormir» por «del sueño literal» para comunicar claramente el contraste narrativo entre la muerte figurada y el sueño físico real. La alternativa más literal se conserva en nota, en línea con el rastro de auditoría inglés y con mejor legibilidad en español.
