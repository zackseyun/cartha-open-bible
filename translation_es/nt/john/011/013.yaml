translation:
  language: es
  text: Jesús había hablado de su muerte, pero ellos pensaron que estaba hablando del sueño literal[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «del sueño del dormir», es decir, del sueño en sentido literal y no de la muerte.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰρήκει
  english_pob_choice: had spoken
  chosen_spanish: había hablado
  alternatives_spanish:
  - había dicho
  - había estado diciendo
  lexicon: BDAG
  rationale: El pluscuamperfecto griego marca una acción anterior al malentendido de los discípulos; «había hablado» conserva esa anterioridad de forma natural en español. «Había dicho» sería posible, pero pierde un poco del matiz de discurso extendido que el contexto sugiere.
- source_word: δὲ
  english_pob_choice: Now / but
  chosen_spanish: Ahora / pero
  alternatives_spanish:
  - Y
  - entonces
  lexicon: BDAG
  rationale: El primer δέ funciona como transición discursiva, bien reflejada por «Ahora». El segundo introduce contraste con la interpretación errónea de ellos, por eso se rinde con «pero».
- source_word: περὶ τοῦ θανάτου αὐτοῦ
  english_pob_choice: about his death
  chosen_spanish: acerca de su muerte
  alternatives_spanish:
  - sobre su muerte
  - con respecto a su muerte
  lexicon: BDAG
  rationale: περί con genitivo expresa el tema del habla; «acerca de» suena natural y fiel. «Muerte» mantiene el referente directo del texto, sin ampliar ni suavizar el contenido.
- source_word: ἐκεῖνοι
  english_pob_choice: they
  chosen_spanish: ellos
  alternatives_spanish:
  - esos
  - aquellos
  lexicon: BDAG
  rationale: El demostrativo apunta a los discípulos ya mencionados; en español, el pronombre personal «ellos» comunica la referencia sin forzar un demostrativo pesado.
- source_word: ἔδοξαν
  english_pob_choice: thought
  chosen_spanish: pensaron
  alternatives_spanish:
  - supusieron
  - creyeron
  lexicon: BDAG
  rationale: Aquí δοκέω expresa una impresión equivocada; «pensaron» es claro y natural en español. «Supusieron» también sería posible, pero suena más técnico y menos inmediato.
- source_word: κοιμήσεως
  english_pob_choice: sleep
  chosen_spanish: del sueño
  alternatives_spanish:
  - del dormir
  - de sueño
  lexicon: BDAG
  rationale: El sustantivo κοιμήσις significa literalmente «sueño» y conserva la imagen figurada de la muerte como sueño. Se evita «descanso» como sustituto principal porque el griego no lo dice aquí y porque el texto mantiene deliberadamente la metáfora del sueño.
- source_word: τοῦ ὕπνου
  english_pob_choice: of rest / of sleep
  chosen_spanish: del dormir
  alternatives_spanish:
  - del sueño
  - del reposo
  lexicon: BDAG
  rationale: El genitivo especifica el sueño literal; en español, «del dormir» transmite mejor la idea de sueño físico concreto sin introducir la palabra «reposo», que sería una expansión interpretativa. La construcción completa busca conservar el contraste entre la muerte figurada y el sueño literal.
- source_word: λέγει
  english_pob_choice: was speaking
  chosen_spanish: estaba hablando
  alternatives_spanish:
  - hablaba
  - dice
  lexicon: BDAG
  rationale: Aunque formalmente presente, el verbo funciona como presente histórico; en español, «estaba hablando» reproduce bien la referencia continua a la intervención anterior de Jesús y se integra de manera fluida con el pluscuamperfecto inicial.
theological_decisions:
- issue: Mantener la tensión entre la metáfora de la muerte como sueño y el malentendido de sueño literal sin sugerir una doctrina específica sobre el estado de los muertos
  english_pob_reading: Translate plainly as 'his death' while preserving the disciples' misunderstanding as literal sleep without doctrinal expansion.
  chosen_spanish_reading: Traducir de forma directa la muerte de Jesús y dejar que el malentendido de los discípulos aparezca como sueño literal, sin añadir desarrollo doctrinal.
  alternative_spanish_readings:
  - Usar una expresión que insinuara el sueño del alma
  - Suavizar la metáfora hasta «descanso»
  rationale: El texto contrapone el uso figurado de Jesús con la interpretación literal de los discípulos. La traducción española debe preservar esa tensión narrativa sin resolverla en una doctrina ajena al versículo.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente al evitar añadir adjetivos como «ordinary» o equivalentes que no están en el griego. También se respetó la decisión auditada de mantener la metáfora de sueño sin convertirla en «descanso» interpretativo.
  spanish_consistency_notes:
  - Se emplea «Jesús» para Ἰησοῦς conforme al estándar del proyecto.
  - Se usa «muerte» para θάνατος y no una paráfrasis.
  - Se conserva la metáfora de sueño con vocabulario literal («sueño», «dormir») para no borrar la tensión entre lenguaje figurado y comprensión errónea.
  - La puntuación divide las dos cláusulas según la estructura del griego y el flujo narrativo español.
