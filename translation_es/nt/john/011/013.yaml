  spanish_quality_summary: El español es mayormente claro, pero «Ahora Jesús» resulta algo calcado y «del sueño del dormir» es poco idiomático y pesado. En español eclesial natural, conviene una redacción que mantenga el contraste entre sueño figurado y sueño literal sin producir una frase extraña. «Jesús había hablado de su muerte» y «del sueño literal» leen mejor y siguen siendo fieles.
  glossary_alignment: 'No hay términos del glosario principal en disputa aquí. «Jesús» y «muerte» están bien. La decisión clave es cómo expresar κοιμήσεως τοῦ ὕπνου: el borrador intenta conservar la duplicación semántica, pero en español funciona mejor explicitarla en una nota y usar «sueño literal» en el texto principal.'
  issues:
