translation:
  language: es
  text: Así que, cuando Jesús llegó, encontró que Lázaro ya llevaba cuatro días en el sepulcro.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἐλθὼν
  english_pob_choice: when Jesus arrived
  chosen_spanish: cuando Jesús llegó
  alternatives_spanish:
  - habiendo venido Jesús
  - después de que Jesús vino
  lexicon: BDAG
  rationale: El participio aoristo se entiende temporalmente respecto del verbo principal. En español, «cuando Jesús llegó» comunica de manera natural y fiel la relación temporal sin sonar forzado.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - Entonces
  - Por tanto
  - Por eso
  lexicon: BDAG
  rationale: Funciona como conector narrativo. «Así que» conserva el enlace discursivo con el contexto previo en español moderno y mantiene un tono digno.
- source_word: εὗρεν
  english_pob_choice: he found
  chosen_spanish: encontró
  alternatives_spanish:
  - descubrió
  lexicon: BDAG
  rationale: Es el equivalente narrativo directo de εὑρίσκω en este contexto. «Encontró» es claro, idiomático y suficientemente preciso.
- source_word: αὐτὸν
  english_pob_choice: that Lazarus
  chosen_spanish: que Lázaro
  alternatives_spanish:
  - que él
  - a Lázaro
  lexicon: BDAG
  rationale: El pronombre se refiere a Lázaro por el contexto inmediato. En español es más natural explicitar el referente para evitar ambigüedad, como hizo la POB en inglés.
- source_word: τέσσαρας ἤδη ἡμέρας ἔχοντα
  english_pob_choice: had already been in the tomb four days
  chosen_spanish: ya llevaba cuatro días en el sepulcro
  alternatives_spanish:
  - ya había estado en el sepulcro cuatro días
  - ya llevaba cuatro días allí
  lexicon: BDAG
  rationale: La construcción expresa duración ya transcurrida. «Ya llevaba cuatro días» transmite bien el aspecto durativo; «en el sepulcro» conserva el sentido de ubicación funeraria de μνημεῖον.
- source_word: μνημείῳ
  english_pob_choice: the tomb
  chosen_spanish: el sepulcro
  alternatives_spanish:
  - la tumba
  - el túmulo funerario
  lexicon: BDAG
  rationale: En contexto funerario, μνημεῖον designa el lugar de entierro. «Sepulcro» es una opción bíblica clara y plenamente comprensible en español, equivalente a «tomb».
theological_decisions:
- issue: Referente explícito de αὐτόν
  english_pob_reading: Explicitly name Lazarus in English to avoid ambiguity.
  chosen_spanish_reading: Nombrar explícitamente a Lázaro.
  alternative_spanish_readings:
  - 'Mantener el pronombre: «lo encontró»'
  - Dejarlo implícito por contexto
  rationale: No hay tensión doctrinal; es una decisión de claridad. Nombrar a Lázaro evita ambigüedad en español y sigue la lógica auditada de la POB en inglés.
  doctrine_reference: Translation philosophy §6 (claridad lectora sin pérdida de fidelidad)
translation_notes:
  revision_awareness: La versión inglesa auditada ya fue revisada y quedó sin cambios; este borrador español sigue ese sentido sin introducir variantes textuales ni decisiones doctrinales nuevas.
  spanish_consistency_notes:
  - Se mantiene «Jesús» como nombre propio y no se usa una máscara reverencial para el nombre divino, porque el versículo no contiene יהוה.
  - Se traduce μνημεῖον como «sepulcro» para mantener registro bíblico natural en español, coherente con el contexto de resurrección de Juan.
  - No se introduce puntuación explicativa adicional que altere el ritmo narrativo del versículo.
