review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del griego: πολλοὶ δὲ = «Ahora muchos», ἐληλύθεισαν = pluscuamperfecto «habían venido», ἵνα παραμυθήσωνται αὐτὰς = finalidad «para consolarlas», y περὶ τοῦ ἀδελφοῦ = «por/acerca de su hermano». También preserva la alternativa auditada para Ἰουδαίων mediante nota. Sin embargo, hay un ajuste ortográfico/onomástico necesario: en español bíblico estándar debe escribirse «Marta», no «Martha».'
  spanish_quality_summary: El texto es claro y natural, con tono digno y legible. La única deficiencia relevante es la grafía inconsistente y anglicada del nombre «Martha», tanto en el texto principal como en la nota. Además, «por su hermano» suena más idiomático en contexto de duelo que «acerca de su hermano», aunque esta última no es incorrecta. Conviene hacer esa mejora menor para mejor español e interacción contextual.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «judíos» con nota alternativa «judeanos» está bien documentado. «María» es apropiado para Μαριάμ. La revisión propuesta mantiene fidelidad al razonamiento léxico y mejora la idiomaticidad española.
  issues:
  - severity: medium
    issue: El nombre propio aparece como «Martha» en vez de «Marta».
    rationale: En español bíblico y general la forma establecida es «Marta». «Martha» es una grafía ajena al uso español y afecta la legibilidad y naturalidad.
  - severity: low
    issue: «acerca de su hermano» es menos natural que «por su hermano» en un contexto de consuelo por duelo.
    rationale: El griego περὶ permite «acerca de/sobre», pero en español de duelo «consolar por su hermano» comunica mejor la causa del consuelo sin alejarse del sentido fuente.
  revised_spanish_text: Ahora muchos de los judíos habían venido a Marta y María para consolarlas[a] por su hermano.
  revised_footnotes:
