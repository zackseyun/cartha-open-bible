- from: Ahora muchos de los judíos habían venido a Martha y María para consolarlas[a] acerca de su hermano.
  to: Ahora muchos de los judíos habían venido a Marta y María para consolarlas[a] por su hermano.
  rationale: Se corrige «Martha» a «Marta» para ajustarlo al español estándar y se mejora «acerca de su hermano» a «por su hermano» por mayor naturalidad en contexto funerario, sin alterar el sentido del griego ni la decisión auditada sobre Ἰουδαίων.
