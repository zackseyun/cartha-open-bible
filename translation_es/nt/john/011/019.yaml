    text: O «muchos de entre los judeanos habían venido a Marta y María». El término griego puede designar a los judíos en general o, en algunos contextos de Juan, más específicamente a los judeanos.
    reason: alternative_reading
  revision_rationale: Se corrige «Martha» a «Marta» para ajustarlo al español estándar y se mejora «acerca de su hermano» a «por su hermano» por mayor naturalidad en contexto funerario, sin alterar el sentido del griego ni la decisión auditada sobre Ἰουδαίων.
