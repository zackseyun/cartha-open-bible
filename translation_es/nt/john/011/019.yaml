translation:
  language: es
  text: Ahora muchos de los judíos habían venido a Marta y María para consolarlas[a] por su hermano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «muchos de entre los judeanos habían venido a Marta y María». El término griego puede designar a los judíos en general o, en algunos contextos de Juan, más específicamente a los judeanos.
    reason: alternative_reading
lexical_decisions:
- source_word: πολλοὶ δὲ
  english_pob_choice: Now many
  chosen_spanish: Ahora muchos
  alternatives_spanish:
  - Y muchos
  - Pero muchos
  lexicon: BDAG
  rationale: πολλοί expresa cantidad; δέ es un conector suave. «Ahora» reproduce en español la continuidad discursiva sin forzar contraste, como en la decisión inglesa «Now many».
- source_word: ἐκ τῶν Ἰουδαίων
  english_pob_choice: of the Jews
  chosen_spanish: de los judíos
  alternatives_spanish:
  - de entre los judíos
  - de los judeanos
  lexicon: BDAG
  rationale: 'La construcción es partitiva: «muchos de entre los judíos». En este contexto narrativo, el sentido natural es el de personas judías que acudieron en duelo, no un grupo hostil específico. «De los judíos» conserva el alcance amplio del término y sigue la decisión auditada en inglés.'
- source_word: ἐληλύθεισαν
  english_pob_choice: had come
  chosen_spanish: habían venido
  alternatives_spanish:
  - habían llegado
  lexicon: BDAG
  rationale: El pluscuamperfecto indica una acción anterior al momento narrado. «Habían venido» expresa bien la anterioridad y mantiene un español natural.
- source_word: πρὸς τὴν Μάρθαν καὶ Μαριὰμ
  english_pob_choice: to Martha and Mary
  chosen_spanish: a Martha y María
  alternatives_spanish:
  - hacia Martha y María
  lexicon: BDAG
  rationale: πρός con acusativo indica movimiento o visita hacia personas. En español, «a» es la forma más natural para ese desplazamiento. Se usa «María» por el nombre bíblico habitual en español, equivalente a Μαριάμ en este contexto.
- source_word: ἵνα παραμυθήσωνται αὐτὰς
  english_pob_choice: to comfort them
  chosen_spanish: para consolarlas
  alternatives_spanish:
  - para consolarlas y animarlas
  - para consolarlas en su dolor
  lexicon: BDAG
  rationale: ἵνα con subjuntivo expresa finalidad. παραμυθέομαι significa consolar, aliviar, animar en el duelo. «Consolarlas» es fiel, idiomático y suficientemente amplio para abarcar el consuelo fúnebre.
- source_word: περὶ τοῦ ἀδελφοῦ
  english_pob_choice: about their brother
  chosen_spanish: acerca de su hermano
  alternatives_spanish:
  - sobre su hermano
  - con respecto a su hermano
  lexicon: BDAG
  rationale: περί con genitivo significa «acerca de / sobre / con respecto a». El singular «su hermano» refleja de manera natural el referente compartido en el contexto (Lázaro) sin introducir una especificación que el griego no marca explícitamente.
theological_decisions:
- issue: Valor de Ἰουδαίων en Juan
  english_pob_reading: Jews
  chosen_spanish_reading: judíos
  alternative_spanish_readings:
  - judeanos
  rationale: En este versículo el término es descriptivo y no polémico. «Judíos» conserva el sentido amplio y tradicional sin borrar la ambigüedad auditada en Juan, donde en algunos contextos puede referirse más específicamente a «judeanos».
  doctrine_reference: 'Principio POB: primacía del idioma original y preservación de tensiones semánticas genuinas; no resolver una ambigüedad real sin base contextual suficiente.'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios; esta redacción sigue la concordancia alta del control cruzado y mantiene la misma decisión auditada para Ἰουδαίων, el valor perfectivo de ἐληλύθεισαν y el matiz final de παραμυθέομαι.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «judíos» en el texto principal y se preserva en nota la alternativa «judeanos» para reflejar la discusión auditada en Juan.
  - Se evita añadir explícitamente «Lázaro» porque el griego dice solo «su hermano»; el contexto lo identifica, pero no debe sobretraducirse en el cuerpo principal.
