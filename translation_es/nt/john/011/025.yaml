translation:
  language: es
  text: 'Jesús le dijo[a]: «Yo soy la resurrección y la vida. El que cree en mí, aunque muera, vivirá».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Quien cree en mí, aunque muera, vivirá». El griego usa un singular masculino representativo («el que cree… aunque él muera»).
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπεν
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - le habló
  lexicon: BDAG
  rationale: El aoristo de λέγω se expresa de forma natural en narración con «dijo». Mantiene la introducción simple del discurso sin añadir matices no presentes en el griego.
- source_word: αὐτῇ
  english_pob_choice: to her
  chosen_spanish: le
  alternatives_spanish:
  - a ella
  lexicon: BDAG
  rationale: El dativo femenino singular funciona como complemento indirecto. En español, «le» es la forma más natural y fiel; el referente femenino queda claro por el contexto inmediato de Marta.
- source_word: Ἐγώ εἰμι
  english_pob_choice: I am
  chosen_spanish: Yo soy
  alternatives_spanish:
  - Soy
  lexicon: BDAG
  rationale: Se conserva la expresión enfática con pronombre explícito para reflejar mejor el peso revelatorio de la fórmula joánica. «Yo soy» es la equivalencia más directa y solemne.
- source_word: ἡ ἀνάστασις
  english_pob_choice: the resurrection
  chosen_spanish: la resurrección
  alternatives_spanish:
  - la levantada
  - el levantamiento
  lexicon: BDAG
  rationale: ἀνάστασις aquí designa resurrección de entre los muertos. «Resurrección» es el término español estándar y doctrinalmente transparente; se evita una paráfrasis como «levantamiento» que debilitaría el sentido técnico.
- source_word: ἡ ζωή
  english_pob_choice: the life
  chosen_spanish: la vida
  alternatives_spanish:
  - vida
  lexicon: BDAG
  rationale: 'Se conserva el artículo para reproducir la identificación enfática: Jesús no solo da vida, sino que se presenta como «la vida».'
- source_word: ὁ πιστεύων
  english_pob_choice: the one who believes
  chosen_spanish: El que cree
  alternatives_spanish:
  - Quien cree
  - El creyente
  lexicon: BDAG
  rationale: El participio sustantivado singular se traduce con una construcción natural en español que mantiene la referencia representativa y el aspecto de acción continua. «El que cree» preserva el singular del griego sin forzar pluralización.
- source_word: εἰς ἐμέ
  english_pob_choice: in me
  chosen_spanish: en mí
  alternatives_spanish:
  - hacia mí
  - en mí mismo
  lexicon: BDAG
  rationale: Aunque la construcción griega literalmente implica un movimiento relacional («creer hacia/into»), en español la forma idiomática y fiel es «creer en mí».
- source_word: κἂν
  english_pob_choice: even if
  chosen_spanish: aunque
  alternatives_spanish:
  - incluso si
  - aun si
  lexicon: BDAG
  rationale: La concesiva se expresa con «aunque», que en español comunica de manera natural la idea de circunstancia adversa sin alterar el sentido del subjuntivo griego.
- source_word: ἀποθάνῃ
  english_pob_choice: he dies
  chosen_spanish: muera
  alternatives_spanish:
  - llegue a morir
  - si muere
  lexicon: BDAG
  rationale: El aoristo subjuntivo tras κἄν se vierte con una concesiva en subjuntivo. Se evita un futuro o una forma demasiado explicativa, manteniendo la condición eventual.
- source_word: ζήσεται
  english_pob_choice: will live
  chosen_spanish: vivirá
  alternatives_spanish:
  - vivirá otra vez
  - seguirá viviendo
  lexicon: BDAG
  rationale: El futuro medio de ζάω se traduce con «vivirá», suficientemente amplio para abarcar vida más allá de la muerte sin añadir explícitamente «otra vez», que el griego no dice de manera directa.
theological_decisions:
- issue: Autoidentificación de Jesús en «Yo soy la resurrección y la vida»
  english_pob_reading: I am the resurrection and the life
  chosen_spanish_reading: Yo soy la resurrección y la vida
  alternative_spanish_readings:
  - Yo soy quien resucita y da vida
  - Yo doy resurrección y vida
  rationale: Se preserva la identificación directa del texto, no una paráfrasis funcional. Esto mantiene la fuerza cristológica y la forma joánica de revelación personal.
  doctrine_reference: DOCTRINE.md Affirmations; Translation philosophy §1, §3
- issue: Valor representativo del singular en ὁ πιστεύων y los verbos singulares siguientes
  english_pob_reading: The one who believes in me, even if he dies, will live
  chosen_spanish_reading: El que cree en mí, aunque muera, vivirá
  alternative_spanish_readings:
  - Quien cree en mí, aunque muera, vivirá
  - El que cree en mí, aunque mueran, vivirá
  rationale: El griego usa singular masculino de manera representativa. En español, «el que» conserva ese singular sin necesidad de pluralizar ni neutralizar con una formulación menos directa.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: El pasaje presenta alto acuerdo con la auditoría inglesa y no requiere revisiones textuales. Se mantuvo la estructura, la autoidentificación de Jesús y el singular representativo del participio, ajustando solo la formulación al español natural y fiel.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como convención general del proyecto, pero este versículo no contiene el nombre divino explícito.
  - Se usa «creer en mí» por idiomaticidad en español, reflejando el sentido relacional de εἰς ἐμέ sin calco incómodo.
  - Se mantiene el singular representativo en «el que cree» para no perder el valor gramatical del griego.
  - La puntuación de diálogo sigue el estilo español con comillas angulares y dos puntos introduciendo la cita directa.
