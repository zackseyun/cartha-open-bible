translation:
  language: es
  text: 'Entonces los principales sacerdotes y los fariseos convocaron un consejo[a], y decían: «¿Qué hacemos? Porque este hombre hace muchas señales».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el Sanedrín», el consejo gobernante judío.
    reason: alternative_reading
lexical_decisions:
- source_word: συνήγαγον
  english_pob_choice: gathered
  chosen_spanish: reunieron
  alternatives_spanish:
  - convocaron
  - juntaron
  lexicon: BDAG
  rationale: El aoristo activo de συνάγω expresa una acción puntual de reunir/convocar. «Reunieron» es natural en español y conserva la idea de acción deliberada sin sobrecargar el texto con un matiz institucional que no está explícito en el verbo.
- source_word: ἀρχιερεῖς
  english_pob_choice: chief priests
  chosen_spanish: principales sacerdotes
  alternatives_spanish:
  - sumos sacerdotes
  - jefes de los sacerdotes
  lexicon: BDAG
  rationale: «Principales sacerdotes» comunica el plural de autoridades sacerdotales destacadas. Evita «sumos sacerdotes» en plural, que en español puede sonar menos claro o sugerir una función estrictamente singular múltiple.
- source_word: Φαρισαῖοι
  english_pob_choice: Pharisees
  chosen_spanish: fariseos
  alternatives_spanish:
  - fariseos
  lexicon: BDAG
  rationale: Se mantiene la transliteración tradicional del grupo judío, ya asentada en español bíblico y transparente para el lector.
- source_word: συνέδριον
  english_pob_choice: a council
  chosen_spanish: un consejo
  alternatives_spanish:
  - un concilio
  - el Sanedrín
  lexicon: BDAG
  rationale: La POB inglesa corrigió la redacción para no fijar demasiado un título técnico. En español, «un consejo» traduce el sustantivo y conserva la ambigüedad institucional del griego, mientras que «el Sanedrín» sería más interpretativo y «concilio» sonaría eclesiástico.
- source_word: ἔλεγον
  english_pob_choice: were saying
  chosen_spanish: decían
  alternatives_spanish:
  - estaban diciendo
  - seguían diciendo
  lexicon: BDAG
  rationale: El imperfecto griego expresa continuidad o reiteración. En español, «decían» reproduce bien ese aspecto sin una perífrasis pesada.
- source_word: Τί ποιοῦμεν
  english_pob_choice: What are we doing?
  chosen_spanish: ¿Qué hacemos?
  alternatives_spanish:
  - ¿Qué estamos haciendo?
  - ¿Qué vamos a hacer?
  lexicon: BDAG
  rationale: Aunque el inglés mantiene la forma progresiva, el presente simple español transmite de manera natural la deliberación urgente del griego. «¿Qué hacemos?» es idiomático y no introduce un matiz deliberativo ajeno al texto.
- source_word: ὅτι
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: La conjunción introduce la razón de su pregunta. «Porque» expresa esa causalidad con claridad en español contemporáneo.
- source_word: οὗτος ὁ ἄνθρωπος
  english_pob_choice: this man
  chosen_spanish: este hombre
  alternatives_spanish:
  - este sujeto
  - este hombre ese
  lexicon: BDAG
  rationale: «Este hombre» conserva la referencia despectiva o desdeñosa del hablante respecto de Jesús, sin añadir carga que el griego no exige.
- source_word: πολλὰ ποιεῖ σημεῖα
  english_pob_choice: is doing many signs
  chosen_spanish: hace muchas señales
  alternatives_spanish:
  - realiza muchas señales
  - hace muchos signos
  - obra muchas señales
  lexicon: BDAG
  rationale: «Señales» preserva el valor joánico de σημεῖα como actos reveladores, no meros milagros. «Hace» sigue de cerca el presente del griego; aunque «realiza» o «obra» son posibles, «hace» es más natural y conserva la sencillez del texto.
theological_decisions:
- issue: Sentido teológico de σημεῖα en Juan
  english_pob_reading: signs
  chosen_spanish_reading: señales
  alternative_spanish_readings:
  - milagros
  - signos
  rationale: En Juan, σημεῖα no designa solo hechos portentosos, sino actos que señalan la identidad y misión de Jesús. «Señales» mantiene esa función reveladora sin explicitarla de más. «Milagros» reduciría el alcance teológico; «signos» es posible, pero «señales» suena más natural y sigue siendo fiel.
  doctrine_reference: Principio de primacía del texto fuente y preservación de la carga joánica de σημεῖα.
- issue: Naturaleza de συνέδριον
  english_pob_reading: a council
  chosen_spanish_reading: un consejo
  alternative_spanish_readings:
  - el Sanedrín
  - un concilio
  rationale: La lectura inglesa evita imponer el nombre técnico «Sanhedrin» en el texto principal. En español, «un consejo» conserva la referencia a un cuerpo deliberativo judío sin convertir la identificación histórica en una glosa del versículo.
  doctrine_reference: 'Equivalencia óptima: traducir el sustantivo y reservar la identificación tradicional para notas o contexto.'
translation_notes:
  revision_awareness: He seguido la revisión del POB inglés que prefirió «a council» en vez de «the council» para no hacer más técnica la referencia de συνέδριον de lo que exige el griego. En español se refleja esa cautela con «un consejo», y se conserva la posible identificación histórica en la nota.
  spanish_consistency_notes:
  - «Yahvé» no aparece en este versículo.
  - Se conserva «señales» para σημεῖα, en línea con el valor joánico documentado por la POB inglesa.
  - «Consejo» se usa como traducción de συνέδριον; la nota preserva la alternativa histórica «Sanedrín».
  - El imperfecto ἔλεγον se refleja con «decían» para mantener la continuidad del discurso.
  - 'El presente griego ποιοῦμεν/ποιεῖ se expresa con un presente natural en español: «¿Qué hacemos?» / «hace muchas señales».'
