  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del griego: los principales sacerdotes y los fariseos reúnen un consejo, hablan en imperfecto iterativo, plantean «¿Qué hacemos?» y dan la razón de su alarma por las muchas señales que Jesús hace. También preserva correctamente la importancia joánica de σημεῖα como «señales».'
  spanish_quality_summary: El texto es generalmente claro y natural, pero «reunieron un consejo» suena menos idiomático en español que «convocaron un consejo». Además, el anclaje de la nota [a] está puesto sobre el verbo, cuando la alternativa «el Sanedrín» corresponde al sustantivo «consejo». Con esos ajustes, el versículo queda más natural y mejor alineado con la nota.
  glossary_alignment: No hay términos del glosario mayor en juego como Yahvé, Mesías o Espíritu. «Principales sacerdotes», «fariseos» y «señales» están bien alineados con las decisiones auditadas. «Un consejo» preserva la cautela del inglés frente a imponer «el Sanedrín» en el texto principal, pero conviene expresarlo con el verbo «convocaron» para mejor español.
  issues:
  - severity: medium
    issue: «Reunieron un consejo» es poco idiomático en español bíblico natural.
    rationale: Aunque es comprensible, en este contexto institucional el español prefiere «convocaron un consejo» o «reunieron al consejo». Como el inglés auditado escogió «a council», la mejor solución es mantener «un consejo» y ajustar el verbo a «convocaron».
  - severity: low
    issue: La nota [a] está anclada al verbo en vez de al sustantivo que explica.
    rationale: La nota ofrece la alternativa «el Sanedrín», que corresponde a συνέδριον / «consejo», no a «reunieron». El marcador debe colocarse junto a «consejo» para precisión editorial.
