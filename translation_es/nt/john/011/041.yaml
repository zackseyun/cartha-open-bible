translation:
  language: es
  text: 'Entonces quitaron la piedra. Jesús alzó la mirada hacia arriba[a] y dijo: «Padre, te doy gracias porque me has oído[b]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «levantó los ojos» o, más idiomáticamente, «miró hacia arriba».
    reason: lexical_alternative
  - marker: b
    text: O «porque me oíste». El aoristo griego puede traducirse de manera más literal así; «me has oído» refleja la acción completada con relevancia presente en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦραν οὖν τὸν λίθον
  english_pob_choice: So they took away the stone
  chosen_spanish: Entonces quitaron la piedra
  alternatives_spanish:
  - Así que quitaron la piedra
  - Entonces apartaron la piedra
  lexicon: BDAG
  rationale: ἦραν en este contexto se refiere a retirar la piedra de la entrada del sepulcro. «Quitar» comunica con naturalidad la acción y el objeto directo sin introducir una imagen potencialmente extraña en español. οὖν se expresa bien con «Entonces» para mantener la secuencia narrativa.
- source_word: λίθον
  english_pob_choice: stone
  chosen_spanish: piedra
  alternatives_spanish:
  - piedra grande
  - roca
  lexicon: BDAG
  rationale: En el contexto funerario, λίθος designa la pieza que cerraba el sepulcro. «Piedra» es el equivalente natural y suficientemente preciso en español; «roca» sonaría más pesado y menos idiomático.
- source_word: ἦρεν τοὺς ὀφθαλμοὺς ἄνω
  english_pob_choice: lifted his eyes upward
  chosen_spanish: alzó la mirada hacia arriba
  alternatives_spanish:
  - levantó los ojos hacia arriba
  - miró hacia arriba
  lexicon: BDAG
  rationale: La expresión griega es un modismo de oración que describe dirigir la vista al cielo. «Alzó la mirada hacia arriba» conserva la imagen corporal sin sonar torpe; «levantó los ojos» es posible, pero menos natural en español actual. Se evita reducirlo solo a «miró hacia arriba» porque atenúa la imagen del original.
- source_word: Πάτερ
  english_pob_choice: Father
  chosen_spanish: Padre
  alternatives_spanish:
  - Oh Padre
  - Padre mío
  lexicon: BDAG
  rationale: Es el vocativo directo de Jesús en oración. «Padre» reproduce la sencillez y cercanía del griego sin añadir solemnidad arcaizante.
- source_word: εὐχαριστῶ σοι
  english_pob_choice: I thank you
  chosen_spanish: te doy gracias
  alternatives_spanish:
  - te agradezco
  - doy gracias a ti
  lexicon: BDAG
  rationale: Aunque «te agradezco» sería idiomático, «te doy gracias» refleja más de cerca el verbo εὐχαριστέω y mantiene el tono litúrgico-natural del agradecimiento verbal.
- source_word: ὅτι ἤκουσάς μου
  english_pob_choice: that you have heard me
  chosen_spanish: porque me has oído
  alternatives_spanish:
  - porque me escuchaste
  - porque me has escuchado
  lexicon: BDAG
  rationale: El aoristo ἤκουσάς señala una acción completa; en español, «me has oído» comunica bien el hecho de que Dios ha atendido la oración. Se eligió «porque» para la relación causal implícita en el discurso español, equivalente funcional de ὅτι aquí.
theological_decisions:
- issue: Forma de dirigirse a Dios en oración
  english_pob_reading: Father
  chosen_spanish_reading: Padre
  alternative_spanish_readings:
  - Oh Padre
  - Padre mío
  rationale: El texto presenta una oración directa de Jesús al Padre. «Padre» mantiene la intimidad reverente sin cargar el vocativo con matices devocionales añadidos por la tradición española.
  doctrine_reference: John 11:41; Translation philosophy 6
- issue: Valor aspectual de ἤκουσάς μου
  english_pob_reading: you have heard me
  chosen_spanish_reading: me has oído
  alternative_spanish_readings:
  - me oíste
  - me has escuchado
  rationale: La formulación española conserva que la oración ya fue oída y que ese hecho tiene relevancia presente. No se amplía el sentido hacia una explicación doctrinal mayor sobre el modo de respuesta divina, sino que se mantiene la afirmación simple del texto.
  doctrine_reference: Translation philosophy 1, 3
translation_notes:
  revision_awareness: El contexto textual y la revisión inglesa muestran alta concordancia y ninguna revisión aplicada. La redacción española sigue esa lectura estable, manteniendo el flujo narrativo y la imagen idiomática de la oración de Jesús sin añadir explicaciones.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo contiene solo la dirección a Dios como «Padre», no el tetragrámaton.
  - Se usa «piedra» y no «roca» para el objeto del sepulcro, por naturalidad y precisión contextual.
  - «Me has oído» conserva el sentido completado del aoristo sin forzar un calco rígido.
  - La puntuación y el uso de comillas angulares siguen el estilo editorial en español.
