translation:
  language: es
  text: Pero yo sabía que siempre me oyes. Sin embargo, dije esto por la multitud que estaba alrededor[a], para que crean que tú me enviaste[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «por causa de la multitud que estaba alrededor».
    reason: lexical_alternative
  - marker: b
    text: El griego dice explícitamente «que tú me enviaste», con énfasis en «tú».
    reason: lexical_alternative
lexical_decisions:
- source_word: ᾔδειν
  english_pob_choice: I knew
  chosen_spanish: yo sabía
  alternatives_spanish:
  - yo conocía
  - yo sabía ya
  lexicon: BDAG
  rationale: El perfecto de οἶδα funciona aquí con valor de conocimiento previo; en español, «sabía» expresa naturalmente esa certeza sin forzar un pluscuamperfecto innecesario.
- source_word: πάντοτέ μου ἀκούεις
  english_pob_choice: you always hear me
  chosen_spanish: siempre me oyes
  alternatives_spanish:
  - siempre me escuchas
  - siempre me atiendes
  lexicon: BDAG
  rationale: ἀκούω con genitivo puede significar oír/escuchar. En una oración dirigida al Padre, «me oyes» conserva la sencillez y la fuerza relacional del griego mejor que una paráfrasis como «me atiendes».
- source_word: ἀλλὰ
  english_pob_choice: Yet
  chosen_spanish: Sin embargo
  alternatives_spanish:
  - Pero
  - No obstante
  lexicon: BDAG
  rationale: La oposición entre el conocimiento previo de Jesús y la razón de su խոսar se expresa bien en español con «sin embargo», que mantiene el contraste adversativo sin sonar abrupto.
- source_word: διὰ τὸν ὄχλον
  english_pob_choice: because of the crowd
  chosen_spanish: por la multitud
  alternatives_spanish:
  - a causa de la multitud
  - por causa de la multitud
  - por la gente
  lexicon: BDAG
  rationale: διά con acusativo puede expresar causa. «Por la multitud» es la forma más natural y directa en español; evita introducir una explicación más amplia que la del texto.
- source_word: τὸν περιεστῶτα
  english_pob_choice: standing around
  chosen_spanish: que estaba alrededor
  alternatives_spanish:
  - que rodeaba
  - reunida alrededor
  - que estaba allí alrededor
  lexicon: BDAG
  rationale: El participio describe a la multitud como presente en torno a Jesús. «Que estaba alrededor» conserva el sentido espacial de περιεστῶτα sin sonar artificial en español.
- source_word: εἶπον
  english_pob_choice: I said this
  chosen_spanish: dije esto
  alternatives_spanish:
  - lo dije
  - dije esas palabras
  lexicon: BDAG
  rationale: El aoristo de λέγω se refiere a la declaración inmediata de Jesús. «Dije esto» explicita de forma mínima que alude a la oración pronunciada, como en el inglés POB.
- source_word: ἵνα πιστεύσωσιν
  english_pob_choice: so that they may believe
  chosen_spanish: para que crean
  alternatives_spanish:
  - a fin de que crean
  - para que puedan creer
  lexicon: BDAG
  rationale: ἵνα con subjuntivo expresa propósito. «Para que crean» es la formulación más natural y fiel en español, manteniendo el matiz de finalidad.
- source_word: ὅτι σύ με ἀπέστειλας
  english_pob_choice: that you sent me
  chosen_spanish: que tú me enviaste
  alternatives_spanish:
  - que me enviaste tú
  - que tú me has enviado
  lexicon: BDAG
  rationale: ἀποστέλλω se traduce con «enviar»; el pronombre explícito σύ se conserva con «tú» para mantener el énfasis del griego en el remitente. El aoristo se vierte naturalmente con pretérito perfecto simple.
theological_decisions:
- issue: Hearing of the Father in relation to Jesus' prayer
  english_pob_reading: The Father always hears Jesus, and Jesus spoke aloud publicly for the crowd's benefit.
  chosen_spanish_reading: El Padre siempre oye a Jesús, y Jesús habló en voz alta públicamente para beneficio de la multitud.
  alternative_spanish_readings:
  - El Padre siempre escucha a Jesús
  - El Padre siempre atiende a Jesús
  rationale: La traducción conserva la relación íntima Padre-Hijo que el texto afirma, sin convertirla en una formulación doctrinal más amplia que el versículo no desarrolla. «Oyes» mantiene la dirección personal del acto de oír en contexto de oración.
  doctrine_reference: Affirmations; preserve theological tension rather than resolving it
- issue: Purpose of the public utterance
  english_pob_reading: Jesus' spoken prayer is intended to lead the surrounding crowd to believe that the Father sent him.
  chosen_spanish_reading: La declaración pública de Jesús se presenta con el propósito de que la multitud crea que el Padre lo envió.
  alternative_spanish_readings:
  - para que crean que tú me has enviado
  - para que crean que el Padre lo envió
  rationale: Se preserva la cláusula de propósito ἵνα sin reducirla al milagro inmediato ni ampliarla más allá de la misión en Juan. El énfasis en «tú» se mantiene para reflejar el griego σύ.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: This draft follows the latest revision pass marked unchanged, with no applied revisions. It aligns with the high-agreement cross-check and preserves the English POB audit trail while rendering the Greek source directly in idiomatic Spanish.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se traduce ἀκούω con «oír» en la línea principal, reservando «escuchar» como alternativa válida en nota.
  - Se conserva el énfasis pronominal de σύ con «tú» para reflejar la explicitud del griego.
  - La cláusula final mantiene «enviar» para ἀποστέλλω, coherente con la terminología misionera del Evangelio de Juan.
