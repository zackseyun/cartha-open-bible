translation:
  language: es
  text: Pero no lo dijo por sí mismo[a], sino que, siendo sumo sacerdote aquel año, profetizó que Jesús iba a morir por la nación[c][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de sí mismo» o «por su propia iniciativa» para ἀφ’ ἑαυτοῦ.
    reason: lexical_alternative
  - marker: b
    text: O «estaba destinado a morir» para ἔμελλεν ἀποθνῄσκειν.
    reason: lexical_alternative
  - marker: c
    text: O «en favor de la nación» para ὑπὲρ τοῦ ἔθνους.
    reason: alternative_reading
lexical_decisions:
- source_word: τοῦτο δὲ
  english_pob_choice: Now ... this
  chosen_spanish: Pero no lo dijo por sí mismo[a]
  alternatives_spanish:
  - Y ... esto
  - Ahora ... esto
  lexicon: BDAG
  rationale: δέ aquí marca una transición narrativa leve. En español, iniciar con «Pero» conserva el contraste implícito con el contexto inmediato, y «esto» retoma el contenido mencionado sin añadir explicación. La cláusula se completa de manera natural al negar el origen propio de la declaración.
- source_word: ἀφ’ ἑαυτοῦ
  english_pob_choice: from himself
  chosen_spanish: por sí mismo
  alternatives_spanish:
  - de sí mismo
  - por su propia iniciativa
  lexicon: BDAG
  rationale: La frase griega señala origen o fuente de lo dicho. En español, «por sí mismo» comunica bien que no provenía de iniciativa o autoridad meramente personal, y evita un calco rígido. Se conserva en nota la alternativa más literal «de sí mismo».
- source_word: οὐκ εἶπεν
  english_pob_choice: did not say
  chosen_spanish: no lo dijo
  alternatives_spanish:
  - no lo expresó
  - no lo afirmó
  lexicon: BDAG
  rationale: λέγω es el verbo ordinario de decir. «No lo dijo» es la forma más directa y natural en español para mantener la relación con el pronombre demostrativo «esto».
- source_word: ἀλλὰ ἀρχιερεὺς ὢν
  english_pob_choice: but being high priest
  chosen_spanish: sino que, siendo sumo sacerdote
  alternatives_spanish:
  - pero como sumo sacerdote
  - sino que, al ser sumo sacerdote
  lexicon: BDAG
  rationale: La construcción participial se vierte con «siendo» para preservar el trasfondo causal o circunstancial sin exceder lo que el griego afirma. «Sumo sacerdote» corresponde al cargo explícito de ἀρχιερεύς.
- source_word: τοῦ ἐνιαυτοῦ ἐκείνου
  english_pob_choice: that year
  chosen_spanish: de aquel año
  alternatives_spanish:
  - de ese año
  - en aquel año
  lexicon: BDAG
  rationale: La expresión genitiva identifica el año concreto de su ejercicio. «De aquel año» sigue de cerca la forma griega y suena natural en español.
- source_word: ἐπροφήτευσεν
  english_pob_choice: he prophesied
  chosen_spanish: profetizó
  alternatives_spanish:
  - hizo una profecía
  - habló proféticamente
  lexicon: BDAG
  rationale: 'El verbo indica habla profética real. «Profetizó» conserva la fuerza teológica del texto: Juan atribuye a las palabras de Caifás un sentido profético verdadero, sin añadir detalles sobre su conciencia o intención.'
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - a saber, que
  lexicon: BDAG
  rationale: Introduce de manera directa el contenido de la profecía.
- source_word: ἔμελλεν Ἰησοῦς ἀποθνῄσκειν
  english_pob_choice: Jesus was going to die
  chosen_spanish: Jesús iba a morir
  alternatives_spanish:
  - Jesús estaba por morir
  - Jesús iba a fallecer
  lexicon: BDAG
  rationale: μέλλω con infinitivo expresa un acontecimiento futuro o inminente. «Iba a morir» refleja bien esa orientación sin imponer una idea más fuerte de destino que el griego no exige en la frase principal. Se evita «fallecer» por sonar más eufemístico que el verbo griego.
- source_word: ὑπὲρ
  english_pob_choice: for
  chosen_spanish: por
  alternatives_spanish:
  - en favor de
  - en nombre de
  lexicon: BDAG
  rationale: En este contexto, ὑπέρ tiene fuerza representativa/benefactora. «Por» es la opción más breve y natural en español, y deja abierta la amplitud semántica que el inglés POB también preserva.
- source_word: τοῦ ἔθνους
  english_pob_choice: the nation
  chosen_spanish: la nación
  alternatives_spanish:
  - el pueblo
  - la nación judía
  lexicon: BDAG
  rationale: ἔθνος aquí se refiere al pueblo/nación de Israel en su marco inmediato. «La nación» reproduce el singular del griego y mantiene la referencia abierta y fiel al contexto.
theological_decisions:
- issue: Carácter profético de las palabras de Caifás
  english_pob_reading: The verse states that Caiaphas's words were prophetic because of his office as high priest, without specifying a full theory of inspiration or moral approval.
  chosen_spanish_reading: El versículo afirma que, por ser sumo sacerdote de aquel año, profetizó, sin explicar una teoría completa de inspiración ni aprobar moralmente a Caifás.
  alternative_spanish_readings:
  - Caifás profetizó conscientemente bajo inspiración divina
  - Juan solo habla con ironía y no de una profecía real
  rationale: 'La traducción conserva el enunciado explícito de Juan: realmente «profetizó». Al mismo tiempo, no añade nada sobre la intención interna de Caifás ni sobre su rectitud moral, porque el texto no lo especifica.'
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Sentido de ὑπὲρ en la muerte de Jesús
  english_pob_reading: Rendered broadly as 'for the nation,' allowing benefactive/representative sense without narrowing it to a specific atonement formula in the main text.
  chosen_spanish_reading: Se vierte con «por la nación», dejando abierta la lectura benefactora o representativa sin cerrar el sentido a una fórmula técnica de expiación en el texto principal.
  alternative_spanish_readings:
  - en favor de la nación
  - en lugar de la nación
  rationale: El griego admite varios matices en contextos representativos o sacrificiales. «Por» mantiene la amplitud semántica y evita imponer una interpretación más estrecha de la que el versículo, aislado, obliga.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La redacción inglesa más reciente cambió «was about to die» por «was going to die» para reflejar mejor ἔμελλεν sin implicar inmediatez estricta. La versión española sigue esa revisión con «iba a morir», que conserva futuro/impending sin exagerar cercanía temporal. También se mantuvo la equivalencia de ἀφ’ ἑαυτοῦ como origen de la palabra, y ὑπέρ con una preposición amplia ('por') como en el audit trail.
  spanish_consistency_notes:
  - Se usa «Jesús» para Ἰησοῦς conforme al estándar del proyecto.
  - Se traduce ἀρχιερεύς como «sumo sacerdote», el término eclesial y bíblico normal en español.
  - Se conserva «nación» en singular para ἔθνος, coherente con el contexto inmediato y con la opción inglesa.
  - La puntuación intenta reflejar la sintaxis original con una sola oración compleja, sin fragmentarla excesivamente.
  - Las notas [a], [b], [c] aparecen ancladas en el texto exactamente en los puntos léxicos pertinentes.
