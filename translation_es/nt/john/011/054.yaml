translation:
  language: es
  text: Entonces Jesús ya no andaba abiertamente entre los judíos[a], sino que se fue de allí a la región cerca del desierto, a una ciudad llamada Efraín, y allí se quedó con los discípulos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entre los judeanos». En Juan, «los judíos» a veces puede referirse más específicamente a la gente de Judea o a las autoridades de Judea, según el contexto.
    reason: alternative_reading
lexical_decisions:
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - Entonces
  - Por tanto
  lexicon: BDAG
  rationale: Expresa con naturalidad la consecuencia narrativa del contexto previo sin endurecer el español con una fórmula demasiado formal.
- source_word: οὐκέτι
  english_pob_choice: no longer
  chosen_spanish: ya no
  alternatives_spanish:
  - no más
  - no seguía
  lexicon: BDAG
  rationale: Marca cese de una acción habitual o continua; en español ‘ya no’ transmite bien la idea de continuidad interrumpida.
- source_word: παρρησίᾳ
  english_pob_choice: openly
  chosen_spanish: abiertamente
  alternatives_spanish:
  - públicamente
  - con valentía
  lexicon: BDAG
  rationale: Aquí el énfasis es la publicidad de su andar, no la valentía interior; ‘abiertamente’ conserva esa fuerza.
- source_word: περιεπάτει
  english_pob_choice: walked
  chosen_spanish: andaba
  alternatives_spanish:
  - caminaba
  - iba y venía
  lexicon: BDAG
  rationale: En narración joánica, el verbo describe su modo de moverse o desenvolverse; ‘andaba’ suena natural en español y mantiene la imagen de actividad continua.
- source_word: ἐν τοῖς Ἰουδαίοις
  english_pob_choice: among the Jews
  chosen_spanish: entre los judíos
  alternatives_spanish:
  - entre los judeanos
  - entre la gente de Judea
  lexicon: BDAG
  rationale: Se conserva la forma tradicional y amplia usada por la POB en inglés. En este contexto el referente puede ser geográfico-social, no necesariamente una alusión exclusiva a la dirigencia.
- source_word: ἀπῆλθεν ἐκεῖθεν
  english_pob_choice: departed from there
  chosen_spanish: se fue de allí
  alternatives_spanish:
  - partió de allí
  - salió de allí
  lexicon: BDAG
  rationale: Reproduce el movimiento de salida de manera natural y directa en español.
- source_word: χώραν
  english_pob_choice: region
  chosen_spanish: región
  alternatives_spanish:
  - territorio
  - comarca
  lexicon: BDAG
  rationale: ‘Región’ refleja bien una zona o territorio sin introducir connotaciones modernas de nación o estado.
- source_word: ἐγγὺς τῆς ἐρήμου
  english_pob_choice: near the wilderness
  chosen_spanish: cercana al desierto
  alternatives_spanish:
  - cerca del desierto
  - junto al desierto
  lexicon: BDAG
  rationale: ‘ἔρημος’ puede referir a un lugar deshabitado; en español ‘desierto’ es la opción más breve y clara, aunque ‘desierto’ no debe leerse solo como arena sino como zona despoblada.
- source_word: εἰς Ἐφραὶμ λεγομένην πόλιν
  english_pob_choice: to a city called Ephraim
  chosen_spanish: a una ciudad llamada Efraín
  alternatives_spanish:
  - a un pueblo llamado Efraín
  - a la ciudad llamada Efraín
  lexicon: BDAG
  rationale: ‘Ciudad llamada’ sigue de cerca la estructura del griego; ‘Efraín’ adapta el nombre propio a la forma española usual.
- source_word: κἀκεῖ ἔμεινεν
  english_pob_choice: and stayed there
  chosen_spanish: y allí se quedó
  alternatives_spanish:
  - y permaneció allí
  - y se alojó allí
  lexicon: BDAG
  rationale: ‘Se quedó’ expresa con sencillez el sentido de permanecer durante un tiempo en ese lugar.
- source_word: μετὰ τῶν μαθητῶν
  english_pob_choice: with the disciples
  chosen_spanish: con los discípulos
  alternatives_spanish:
  - con sus discípulos
  lexicon: BDAG
  rationale: Se mantiene el artículo del griego sin añadir el posesivo implícito, aunque el contexto permite entenderlo.
theological_decisions:
- issue: Sentido de Ἰουδαῖοι en Juan 11:54
  english_pob_reading: among the Jews
  chosen_spanish_reading: entre los judíos
  alternative_spanish_readings:
  - entre los judeanos
  - entre la gente de Judea
  rationale: Se conserva la lectura principal de la POB en inglés, pero sin cerrar la posibilidad de un matiz regional en el evangelio de Juan. La nota evita que el lector interprete el término de manera más amplia o más estrecha de lo que el contexto exige.
  doctrine_reference: POB translation philosophy §3, §5
- issue: Valor de ἔρημος
  english_pob_reading: wilderness
  chosen_spanish_reading: desierto
  alternative_spanish_readings:
  - región deshabitada
  - yermo
  rationale: Aunque ‘desierto’ puede sugerir arena, en contexto bíblico puede designar un área apartada y poco habitada. Se usa el término más natural en español y se preserva el sentido geográfico-bíblico.
  doctrine_reference: POB lexical consistency on geographic terms
translation_notes:
  revision_awareness: 'Coincide con el último pase revisado: el texto fuente y la solución inglesa muestran alta concordancia, sin cambios aplicados en la revisión más reciente. La versión española mantiene esa misma lectura estable.'
  spanish_consistency_notes:
  - Se mantiene ‘Jesús’ para Ἰησοῦς conforme al criterio del proyecto.
  - ‘Discípulos’ se conserva sin posesivo añadido, siguiendo la economía del griego.
  - ‘Desierto’ traduce ἔρημος con valor bíblico de lugar despoblado, no solo clima o arena.
  - La nota de ‘judíos’ conserva la tensión léxica documentada sin desplazarla a una paráfrasis interpretativa.
