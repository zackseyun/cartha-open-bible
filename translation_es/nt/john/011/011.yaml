translation:
  language: es
  text: 'Después de decir estas cosas, les dijo: «Lázaro, nuestro amigo, se ha quedado dormido[a], pero voy para despertarlo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más explícitamente, «ha muerto». Jesús usa aquí el sueño como metáfora de la muerte; los discípulos lo malentienden en los versículos siguientes.
    reason: alternative_reading
lexical_decisions:
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  lexicon: BDAG
  rationale: El plural griego se conserva mejor con «estas cosas», manteniendo la referencia al discurso previo y la forma narrativa de Juan.
- source_word: εἶπεν / λέγει
  english_pob_choice: After saying ... he said
  chosen_spanish: Después de decir ... les dijo
  alternatives_spanish:
  - Tras decir ... dijo
  - Luego de decir ... les dijo
  lexicon: BDAG
  rationale: El griego combina un aoristo seguido de presente histórico; en español es natural y fiel expresar la secuencia con un pasado simple o con perífrasis temporal sin perder la transición narrativa.
- source_word: μετὰ τοῦτο
  english_pob_choice: After
  chosen_spanish: Después de
  alternatives_spanish:
  - Luego de
  - Tras
  lexicon: BDAG
  rationale: Marca sucesión temporal. «Después de» conserva el valor de secuencia con estilo claro y digno en español.
- source_word: Λάζαρος
  english_pob_choice: Lazarus
  chosen_spanish: Lázaro
  alternatives_spanish:
  - Lazarus
  lexicon: BDAG
  rationale: Nombre propio bíblico con forma española establecida.
- source_word: ὁ φίλος ἡμῶν
  english_pob_choice: our friend
  chosen_spanish: nuestro amigo
  alternatives_spanish:
  - el amigo nuestro
  - el amigo de nosotros
  lexicon: BDAG
  rationale: La construcción posesiva se expresa naturalmente como «nuestro amigo», conservando el énfasis relacional sin literalidad extraña.
- source_word: κεκοίμηται
  english_pob_choice: has fallen asleep
  chosen_spanish: se ha quedado dormido
  alternatives_spanish:
  - ha dormido
  - está dormido
  - ha muerto
  lexicon: BDAG
  rationale: El perfecto de κοιμάομαι mantiene la metáfora del sueño para la muerte. «Se ha quedado dormido» preserva esa imagen en español y evita resolver prematuramente la tensión narrativa.
- source_word: ἀλλὰ
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - sino
  - mas
  lexicon: BDAG
  rationale: Contraste adversativo simple entre el estado de Lázaro y la acción intencional de Jesús.
- source_word: πορεύομαι
  english_pob_choice: I am going
  chosen_spanish: voy
  alternatives_spanish:
  - estoy yendo
  - me dirijo
  lexicon: BDAG
  rationale: En español, el presente simple «voy» expresa de manera natural la acción inminente y voluntaria, equivalente al presente histórico/intencional griego.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para
  alternatives_spanish:
  - a fin de que
  - para que
  lexicon: BDAG
  rationale: La cláusula de propósito queda más natural en español con infinitivo de finalidad. Se conserva la intención sin sobrecargar la sintaxis.
- source_word: ἐξυπνίσω
  english_pob_choice: I may wake him up
  chosen_spanish: despertarlo
  alternatives_spanish:
  - despertarlo de nuevo
  - hacer que despierte
  lexicon: BDAG
  rationale: El verbo comunica el despertar del sueño metafórico. El infinitivo «despertarlo» es idiomático y mantiene la metáfora sin explicitar «morir» en el texto principal.
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: Pronombre de objeto directo natural en español para referirse a Lázaro.
theological_decisions:
- issue: Si traducir κεκοίμηται como metáfora de sueño o como explicación interpretativa de muerte
  english_pob_reading: Preserve the metaphor in the main text as 'has fallen asleep'
  chosen_spanish_reading: Preservar la metáfora en el texto principal como «se ha quedado dormido»
  alternative_spanish_readings:
  - ha muerto
  - ha fallecido
  rationale: Jesús habla figuradamente, y la comprensión incorrecta de los discípulos aparece en el versículo siguiente. Mantener la metáfora conserva la tensión narrativa y teológica, sin resolverla demasiado pronto.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El borrador sigue de cerca el paquete fuente griego y el audit trail inglés. Se preservó la metáfora de sueño para κεκοίμηται, se mantuvo la secuencia temporal de los verbos y se adaptó la finalidad de ἵνα con una construcción natural en español sin perder el sentido de propósito.
  spanish_consistency_notes:
  - Se usa «Lázaro» como forma española estándar del nombre propio.
  - Se mantiene «dormido» en el texto principal para preservar la metáfora de muerte por sueño.
  - Se traduce el propósito con infinitivo («para despertarlo») para evitar una subordinación excesiva en español.
  - Se usa puntuación de diálogo conforme al español moderno y registro bíblico sobrio.
