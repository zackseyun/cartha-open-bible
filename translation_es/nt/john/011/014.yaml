translation:
  language: es
  text: 'Entonces Jesús les dijo claramente[a]: «Lázaro ha muerto».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «abiertamente»; el griego expresa habla sin reserva o en público.
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε οὖν
  english_pob_choice: So then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Así que
  - Pues entonces
  - Entonces, pues
  lexicon: BDAG
  rationale: Ambas partículas marcan avance discursivo y conexión inferencial. En español, «Entonces» comunica la secuencia con naturalidad; añadir dos conectores separados sonaría forzado y redundante.
- source_word: εἶπεν αὐτοῖς
  english_pob_choice: told them
  chosen_spanish: les dijo
  alternatives_spanish:
  - les habló
  - les declaró
  lexicon: BDAG
  rationale: El verbo λέγω con dativo de destinatario se vierte de forma natural como «les dijo». «Told them» no exige en español un equivalente distinto; «les dijo» mantiene la sencillez del acto de habla sin sobreinterpretar.
- source_word: παρρησίᾳ
  english_pob_choice: plainly
  chosen_spanish: claramente
  alternatives_spanish:
  - abiertamente
  - francamente
  - con franqueza
  lexicon: BDAG
  rationale: El término expresa habla abierta, sin ambigüedad. «Claramente» recoge la transparencia del enunciado en este contexto inmediato, donde Jesús explica sin rodeos lo que antes había dicho de forma figurada.
- source_word: Λάζαρος
  english_pob_choice: Lazarus
  chosen_spanish: Lázaro
  lexicon: Nombre propio
  rationale: Nombre propio transliterado al uso español estándar.
- source_word: ἀπέθανεν
  english_pob_choice: has died
  chosen_spanish: ha muerto
  alternatives_spanish:
  - murió
  - está muerto
  lexicon: BDAG
  rationale: El aoristo expresa el hecho consumado de la muerte. «Ha muerto» preserva el valor perfectivo con relevancia actual en español natural; «murió» sería posible, pero menos marcado como estado recién constatado en este contexto.
theological_decisions:
- issue: Clarificación de la metáfora previa del sueño
  english_pob_reading: A direct statement of Lazarus' physical death, clarifying the earlier metaphor of sleep.
  chosen_spanish_reading: Una afirmación directa de la muerte física de Lázaro, que aclara la metáfora anterior del sueño.
  alternative_spanish_readings:
  - Mantener una formulación más figurada como «Lázaro dormía»
  - Dejar ambigua su condición
  rationale: El propio versículo resuelve la imagen anterior con ἀπέθανεν; por eso la traducción principal no debe conservar la metáfora como si siguiera abierta. La claridad aquí sirve al sentido del pasaje sin borrar la tensión literaria previa.
  doctrine_reference: Juan 11:11-14; claridad contextual frente a metáfora narrativa
translation_notes:
  revision_awareness: El texto sigue el pasaje griego SBLGNT y el criterio POB ya auditado para Ἰησοῦς, παρρησίᾳ y ἀπέθανεν, manteniendo la claridad narrativa y la equivalencia óptima sin calco mecánico del inglés.
  spanish_consistency_notes:
  - Se usa «Jesús» y «Lázaro» como nombres propios establecidos.
  - Se evita «SEÑOR» porque aquí el sujeto explícito es ὁ Ἰησοῦς, no κύριος.
  - «ha muerto» conserva la fuerza perfectiva del aoristo sin sonar arcaico.
  - La nota al pie mantiene la alternativa semántica importante de παρρησίᾳ sin introducir otra variante doctrinal.
