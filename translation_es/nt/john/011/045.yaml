revisions:
- from: Entonces muchos de entre los judíos, los que habían venido a María y habían visto lo que él había hecho, creyeron en él[a].
  to: Por tanto, muchos de entre los judíos[a] que habían venido a María y habían visto lo que él había hecho, creyeron en él.
  rationale: Se ajusta οὖν a «Por tanto» para reflejar mejor la relación inferencial del griego y del audit trail inglés. También se elimina el artículo explicativo «los que» para una sintaxis más natural en español sin cambiar el referente. La nota se conserva, pero se evita duplicar exactamente la misma expresión principal como alternativa; «de los judíos» expresa la otra opción idiomática documentada.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:03:58Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja fielmente la estructura y el sentido del griego: partitivo («muchos de entre los judíos»), participios antecedentes («habían venido… habían visto») y la construcción joánica «creyeron en él». Sin embargo, «Entonces» suaviza el matiz inferencial de οὖν más hacia mera secuencia temporal que hacia consecuencia; «Por tanto» o equivalente preserva mejor la conexión lógica destacada en el audit trail inglés.'
  spanish_quality_summary: El español es claro y legible, pero «los que habían venido a María y habían visto…» suena algo pesado por la repetición de auxiliares. Una leve mejora estilística sin pérdida de fidelidad es posible. El resto está bien idiomático y digno.
  glossary_alignment: No hay términos del glosario mayor en disputa salvo Ἰουδαῖοι y πιστεύω. Se mantiene correctamente «judíos» con nota sobre «judeanos», en línea con el audit trail. «Creyeron en él» concuerda con la decisión joánica documentada para πιστεύω εἰς.
  issues:
  - severity: medium
    issue: οὖν se vierte como «Entonces»
    rationale: Aunque posible en contexto narrativo, el audit trail justifica «therefore» por su fuerza inferencial. En español, «Por tanto» preserva mejor la consecuencia lógica del signo de Jesús.
  - severity: low
    issue: Ligera pesadez sintáctica por repetición de pluscuamperfecto
    rationale: «Los que habían venido… y habían visto…» es correcto, pero puede aligerarse a «que habían ido… y vieron» o mantenerse. No es error de fidelidad, solo de fluidez.
  revised_spanish_text: Por tanto, muchos de entre los judíos[a] que habían venido a María y habían visto lo que él había hecho, creyeron en él.
  revised_footnotes:
  - marker: a
    text: O «de los judíos»; en algunos contextos joánicos también se ha propuesto «judeanos» para Ἰουδαῖοι.
    reason: lexical_alternative
  revision_rationale: Se ajusta οὖν a «Por tanto» para reflejar mejor la relación inferencial del griego y del audit trail inglés. También se elimina el artículo explicativo «los que» para una sintaxis más natural en español sin cambiar el referente. La nota se conserva, pero se evita duplicar exactamente la misma expresión principal como alternativa; «de los judíos» expresa la otra opción idiomática documentada.
