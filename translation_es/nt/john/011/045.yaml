translation:
  language: es
  text: Por tanto, muchos de entre los judíos[a] que habían venido a María y habían visto lo que él había hecho, creyeron en él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de los judíos»; en algunos contextos joánicos también se ha propuesto «judeanos» para Ἰουδαῖοι.
    reason: lexical_alternative
lexical_decisions:
- source_word: Πολλοὶ
  english_pob_choice: many
  chosen_spanish: muchos
  alternatives_spanish:
  - mucha gente
  - muchos hombres
  lexicon: BDAG
  rationale: Adjetivo cuantitativo directo. «Muchos» conserva la amplitud indefinida sin añadir matiz innecesario de género o de colectividad.
- source_word: οὖν
  english_pob_choice: therefore
  chosen_spanish: Entonces
  alternatives_spanish:
  - por tanto
  - así que
  lexicon: BDAG
  rationale: Marca consecuencia narrativa. En español, «Entonces» fluye naturalmente en una secuencia histórica y mantiene el vínculo inferencial con lo anterior.
- source_word: ἐκ τῶν Ἰουδαίων
  english_pob_choice: of the Jews
  chosen_spanish: de entre los judíos
  alternatives_spanish:
  - de los judíos
  - entre los judíos
  - de entre los judeanos
  lexicon: BDAG
  rationale: 'La frase es partititiva: «muchos de entre». «De entre los judíos» preserva mejor esa idea que un simple genitivo posesivo. Se mantiene «judíos» como equivalente idiomático del grupo del relato, sin adoptar «judeanos» como opción no documentada en el texto base.'
- source_word: οἱ ἐλθόντες πρὸς τὴν Μαριὰμ
  english_pob_choice: who had come to Mary
  chosen_spanish: los que habían venido a María
  alternatives_spanish:
  - los que habían ido a María
  - los que llegaron a María
  lexicon: BDAG
  rationale: El participio atributivo identifica a qué judíos se refiere el texto. «Habían venido a María» reproduce bien la relación temporal del aoristo participial con el verbo principal y conserva el destino personal del movimiento.
- source_word: θεασάμενοι
  english_pob_choice: had seen
  chosen_spanish: habían visto
  alternatives_spanish:
  - habiendo visto
  - habían observado
  - habían contemplado
  lexicon: BDAG
  rationale: θεάομαι implica ver con atención o presenciar. «Habían visto» es natural en español y no fuerza una intensificación que el contexto ya comunica por la acción previa.
- source_word: ἃ ἐποίησεν
  english_pob_choice: what he had done
  chosen_spanish: lo que él había hecho
  alternatives_spanish:
  - las cosas que había hecho
  - lo que hizo
  lexicon: BDAG
  rationale: El relativo neutro plural se expresa idiomáticamente como «lo que». El pluscuamperfecto «había hecho» ajusta la anterioridad respecto de «creyeron» y refleja bien el valor narrativo en español.
- source_word: ἐπίστευσαν εἰς αὐτόν
  english_pob_choice: believed in him
  chosen_spanish: creyeron en él
  alternatives_spanish:
  - pusieron su fe en él
  - creyeron hacia él
  lexicon: BDAG
  rationale: En Juan, πιστεύω con εἰς expresa confianza dirigida a Jesús. «Creyeron en él» es la forma natural y fiel en español; evita un calco como «creyeron hacia él» y no sustituye la idea de fe por una paráfrasis doctrinal.
theological_decisions:
- issue: Comprensión de πιστεύω εἰς αὐτόν en contexto joánico
  english_pob_reading: believed in him
  chosen_spanish_reading: creyeron en él
  alternative_spanish_readings:
  - pusieron su fe en él
  - confiaron en él
  rationale: La construcción no presenta aquí una controversia textual o doctrinal especial en el audit trail; por eso se conserva el valor relacional de la fe sin expandirlo. «Creyeron en él» reproduce la dirección de la confianza hacia Jesús con naturalidad y fidelidad.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (πίστις) y Translation philosophy #3'
translation_notes:
  revision_awareness: 'El pasaje coincide con el estado revisado más reciente del texto inglés: no hubo cambios aplicados tras la última revisión y el nivel de acuerdo fue alto. La versión española sigue esa misma decisión de lectura sin introducir modificaciones nuevas.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton ni una cita directa que lo requiera.
  - 'Se conservan nombres propios y referencias narrativas de forma estándar: «María» y «él» para Jesús, sin añadir explicaciones no presentes en el texto.'
  - «Creyeron en él» preserva la fórmula joánica de fe con un español natural y eclesialmente inteligible.
