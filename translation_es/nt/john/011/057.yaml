base_translation:
  language: en
  yaml_path: translation/nt/john/011/057.yaml
  text: Now the chief priests and the Pharisees had given orders that if anyone knew where he was[a], he should report it[b], so that they might seize him.
  footnotes:
  - marker: a
    text: Or, more literally, 'where he is.' The Greek has a present tense ('is'), but English often shifts to 'was' after a past reporting verb.
    reason: lexical_alternative
  - marker: b
    text: '''Seize'' could also be rendered ''arrest'' in this context.'
    reason: lexical_alternative
