revisions:
- from: Ahora los principales sacerdotes y los fariseos habían dado órdenes de que, si alguien sabía dónde estaba[a], debía informarlo[b], para que pudieran prenderlo.
  to: Ahora los principales sacerdotes y los fariseos habían dado órdenes de que, si alguien sabía dónde estaba[a], lo informara, para que pudieran prenderlo[b].
  rationale: 'La revisión hace dos ajustes menores pero importantes: (1) mejora la sintaxis española del contenido de la orden con «lo informara», más natural y más fiel a la subordinación del griego; y (2) reubica la nota léxica alternativa al lugar correcto, preservando la alternativa documentada por la POB inglesa para πιάσωσιν («arrestarlo»).'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:04:40Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: pluscuamperfecto narrativo («habían dado»), autoridades («los principales sacerdotes y los fariseos»), contenido de la orden, propósito final («para que...»), y el matiz de πιάσωσιν como aprehender/prender. También preserva correctamente la alternativa de ποῦ ἐστιν mediante nota.'
  spanish_quality_summary: El texto es claro y legible, pero «de que, si alguien sabía...» suena algo pesado y menos natural en español que una formulación directa con subjuntivo dependiente de «órdenes». Además, «debía informarlo» es comprensible, pero «lo informara» se ajusta mejor a la sintaxis subordinada del conjunto y evita una obligación perifrástica un poco rígida.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Principales sacerdotes» funciona bien para ἀρχιερεῖς; «fariseos», «órdenes» y «prenderlo» son apropiados. No hay términos teológicos sensibles en este versículo.
  issues:
  - severity: medium
    issue: La construcción «habían dado órdenes de que, si alguien sabía...» es gramaticalmente posible, pero resulta menos idiomática que una subordinación directa con subjuntivo.
    rationale: El griego expresa el contenido de las órdenes; en español eclesial-natural suena mejor «habían dado órdenes de que, si alguien sabía/supiera..., lo informara». Quitar la coma tras «que» y usar subjuntivo mejora fluidez y dependencia sintáctica.
  - severity: medium
    issue: «Debía informarlo» introduce una perífrasis de obligación que no reproduce tan bien la subordinación del mandato como «lo informara».
    rationale: μηνύσῃ depende del contenido de las órdenes. En español, el imperfecto de subjuntivo expresa mejor la orden indirecta que «debía + infinitivo», que añade un matiz explicativo más que reproductivo.
  - severity: low
    issue: La nota b no preserva la alternativa inglesa relevante sobre πιάσωσιν = «arrestar».
    rationale: La POB inglesa marca como alternativa léxica «arrest». En español conviene conservar esa posibilidad con una nota anclada en «prenderlo», ya que el borrador actual pone la nota en «informarlo», donde en realidad no está la alternativa documentada por la auditoría inglesa.
  revised_spanish_text: Ahora los principales sacerdotes y los fariseos habían dado órdenes de que, si alguien sabía dónde estaba[a], lo informara, para que pudieran prenderlo[b].
  revised_footnotes:
  - marker: a
    text: 'O: «dónde está». El griego usa un presente («está»); el texto principal sigue la opción narrativa de «estaba» para sonar natural después del verbo pasado «habían dado».'
    reason: lexical_alternative
  - marker: b
    text: «Prenderlo» también puede traducirse como «arrestarlo» en este contexto.
    reason: lexical_alternative
  revision_rationale: 'La revisión hace dos ajustes menores pero importantes: (1) mejora la sintaxis española del contenido de la orden con «lo informara», más natural y más fiel a la subordinación del griego; y (2) reubica la nota léxica alternativa al lugar correcto, preservando la alternativa documentada por la POB inglesa para πιάσωσιν («arrestarlo»).'
