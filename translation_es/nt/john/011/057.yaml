translation:
  language: es
  text: Ahora los principales sacerdotes y los fariseos habían dado órdenes de que, si alguien sabía dónde estaba[a], lo informara, para que pudieran prenderlo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «dónde está». El griego usa un presente («está»); el texto principal sigue la opción narrativa de «estaba» para sonar natural después del verbo pasado «habían dado».'
    reason: lexical_alternative
  - marker: b
    text: «Prenderlo» también puede traducirse como «arrestarlo» en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: δεδώκεισαν
  english_pob_choice: had given
  chosen_spanish: habían dado
  alternatives_spanish:
  - habían emitido
  - habían ordenado
  lexicon: BDAG
  rationale: El pluscuamperfecto expresa acción anterior ya completada respecto del momento narrativo. «Habían dado» conserva esa anterioridad y permite que «órdenes» explique el contenido de la acción sin sobrecargar el verbo.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y
  - Pero
  lexicon: BDAG
  rationale: Aquí δέ funciona como transición narrativa. «Ahora» introduce la escena de manera natural en español y conserva el cambio de foco sin forzar contraste.
- source_word: ἀρχιερεῖς
  english_pob_choice: chief priests
  chosen_spanish: principales sacerdotes
  alternatives_spanish:
  - sumos sacerdotes
  - jefes de los sacerdotes
  lexicon: BDAG
  rationale: El término plural en Juan suele referirse a las autoridades sacerdotales principales. «Principales sacerdotes» comunica esa función dirigente sin crear la impresión de varios sumos sacerdotes individuales. Se mantiene el valor institucional del grupo.
- source_word: Φαρισαῖοι
  english_pob_choice: Pharisees
  chosen_spanish: fariseos
  alternatives_spanish:
  - fariseos
  lexicon: BDAG
  rationale: Nombre de grupo transliterado de forma estándar al español; no requiere adaptación adicional.
- source_word: ἐντολὰς
  english_pob_choice: orders
  chosen_spanish: órdenes
  alternatives_spanish:
  - mandatos
  - instrucciones
  lexicon: BDAG
  rationale: En este contexto administrativo y coercitivo, «órdenes» refleja mejor una directiva autorizada que «instrucciones», que sonaría demasiado débil, o «mandatos», que resultaría más solemne pero menos natural.
- source_word: ἵνα ἐάν τις γνῷ
  english_pob_choice: that if anyone knew
  chosen_spanish: de que, si alguien sabía
  alternatives_spanish:
  - de que, si alguien llegaba a saber
  - para que, si alguien sabía
  lexicon: BDAG
  rationale: La cláusula introduce el contenido de las órdenes con condición implícita. En español, «de que, si alguien sabía» reproduce la subordinación de manera clara y natural. Se conserva el valor condicional de ἐάν y el sentido de γνῷ como conocimiento/discernimiento.
- source_word: τις
  english_pob_choice: anyone
  chosen_spanish: alguien
  alternatives_spanish:
  - cualquiera
  - alguna persona
  lexicon: BDAG
  rationale: En una condición general, «alguien» suena más natural en español que «cualquiera» dentro de esta estructura subordinada, aunque ambos expresan indefinición.
- source_word: γνῷ
  english_pob_choice: knew
  chosen_spanish: sabía
  alternatives_spanish:
  - supiera
  - llegara a saber
  lexicon: BDAG
  rationale: Aunque el griego usa aoristo subjuntivo, el español puede expresar la idea con imperfecto en la protasis condicional sin perder la referencia al acto de conocer. «Sabía» resulta idiomático y claro.
- source_word: ποῦ ἐστιν
  english_pob_choice: where he was
  chosen_spanish: dónde estaba[a]
  alternatives_spanish:
  - dónde está
  lexicon: BDAG
  rationale: Se conserva la opción de la POB inglesa de reflejar el backshift narrativo con «estaba» en el texto principal. La nota a pie preserva la alternativa más literal «dónde está», ya que el griego usa presente.
- source_word: μηνύσῃ
  english_pob_choice: should report it
  chosen_spanish: debía informarlo[b]
  alternatives_spanish:
  - debía dar aviso
  - debía comunicarlo
  lexicon: BDAG
  rationale: μηνύω implica dar aviso o informar, a menudo a autoridades. «Informarlo» mantiene la referencia al contenido ya sabido y permite un español fluido. «Debía» reproduce el matiz de obligación derivado de las órdenes.
- source_word: ὅπως πιάσωσιν
  english_pob_choice: so that they might seize
  chosen_spanish: para que pudieran prenderlo
  alternatives_spanish:
  - para que pudieran arrestarlo
  - para que pudieran apresarlo
  lexicon: BDAG
  rationale: «Prenderlo» transmite la idea de aprehender/capturar en un contexto de detención. Se evita «arrestarlo» por su tecnicismo moderno más estrecho, aunque sigue siendo una alternativa válida. «Poder» refleja el valor final de ὅπως con matiz de resultado pretendido.
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: Se refiere a Jesús como objeto directo en español. «Lo» es la forma natural y mantiene la referencia sin repetir el nombre.
translation_notes:
  revision_awareness: La versión española sigue de cerca el audit trail inglés y no introduce cambios de sentido. Se conserva la transición narrativa de δέ, el matiz de autoridad de ἐντολὰς y la finalidad de ὅπως. La única tensión relevante es ποῦ ἐστιν, donde el griego presenta presente; por eso se mantiene una nota para la lectura más literal mientras el texto principal usa el desplazamiento temporal idiomático.
  spanish_consistency_notes:
  - Se mantiene «fariseos» como transliteración estándar y «prenderlo» para πιάσωσιν, en línea con un registro bíblico contemporáneo pero preciso.
  - «Principales sacerdotes» se usa como equivalente funcional de ἀρχιερεῖς para evitar un calco que sugiera erróneamente múltiples sumos sacerdotes.
  - 'La formulación conserva la secuencia causal-final del griego: órdenes → información → captura.'
  - No se ha neutralizado el referente masculino de Jesús; el objeto directo «lo» corresponde al antecedente implícito del contexto inmediato.
