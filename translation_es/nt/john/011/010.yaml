translation:
  language: es
  text: Pero si alguien anda en la noche[a], tropieza, porque la luz no está en él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de noche». El griego dice más literalmente «en la noche»; se conserva esa imagen, que también puede sugerir la esfera de la oscuridad.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐὰν δέ
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Mas si
  - Y si
  lexicon: BDAG
  rationale: La combinación introduce contraste y condición. «Pero si» conserva el giro adversativo sin forzar una coordinación más dura que el español común.
- source_word: τις
  english_pob_choice: anyone
  chosen_spanish: alguien
  alternatives_spanish:
  - cualquiera
  - una persona
  lexicon: BDAG
  rationale: El indefinido griego es genérico. «Alguien» funciona de modo natural en español y preserva la referencia abierta sin individualizar el sujeto.
- source_word: περιπατῇ
  english_pob_choice: walks
  chosen_spanish: anda
  alternatives_spanish:
  - camina
  - vive
  lexicon: BDAG
  rationale: «Anda» mantiene la imagen de desplazamiento y, en contextos joánicos, puede conservar también la fuerza conductual/metafórica. «Camina» es posible, pero aquí «anda» resulta más fluido en español contemporáneo.
- source_word: ἐν τῇ νυκτί
  english_pob_choice: in the night
  chosen_spanish: en la noche
  alternatives_spanish:
  - de noche
  - en la oscuridad
  lexicon: BDAG
  rationale: La preposición y el sustantivo se mantienen de manera cercana. Se conserva «noche» en vez de reinterpretar directamente como «oscuridad», porque el griego dice literalmente «noche» y el contexto ya permite la implicación simbólica.
- source_word: προσκόπτει
  english_pob_choice: stumbles
  chosen_spanish: tropieza
  alternatives_spanish:
  - se equivoca
  - se golpea
  lexicon: BDAG
  rationale: «Tropieza» reproduce bien la imagen física y la posible resonancia figurada. «Se golpea» o equivalentes estrechan demasiado el sentido.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: «Porque» expresa con claridad la causa del tropiezo y es una equivalencia directa y natural en español.
- source_word: τὸ φῶς
  english_pob_choice: the light
  chosen_spanish: la luz
  alternatives_spanish:
  - la luz
  - luz
  lexicon: BDAG
  rationale: Se conserva el artículo porque el griego presenta una referencia definida en el discurso. «La luz» mantiene el valor conceptual sin suavizarlo a un uso genérico.
- source_word: οὐκ ἔστιν ἐν αὐτῷ
  english_pob_choice: is not in him
  chosen_spanish: no está en él
  alternatives_spanish:
  - no está con él
  - no está dentro de él
  lexicon: BDAG
  rationale: La formulación sigue de cerca el griego y preserva la tensión del «en él». «Con él» resolvería demasiado pronto la imagen hacia una mera circunstancia externa, mientras que «dentro de él» explicita en exceso lo que el griego deja abierto.
theological_decisions:
- issue: Alcance de «la luz no está en él»
  english_pob_reading: Retain the inward wording 'in him' without reducing it to merely external light availability.
  chosen_spanish_reading: Mantener «no está en él» sin sustituirlo por una lectura exclusivamente externa como «no está con él».
  alternative_spanish_readings:
  - la luz no está con él
  - la luz no está dentro de él
  rationale: El griego dice ἐν αὐτῷ, y el contexto joánico puede sugerir algo más que la falta de iluminación externa. La traducción conserva esa tensión sin resolverla ni hacia lo puramente situacional ni hacia una explicación interpretativa cerrada.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'El texto sigue de cerca la revisión final del inglés POB, que no introdujo cambios respecto del pasaje auditado. Se conserva la misma decisión clave sobre τὸ φῶς οὐκ ἔστιν ἐν αὐτῷ: mantener el valor de «en él» sin reducirlo a una presencia meramente externa.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como estándar del proyecto, aunque este versículo no lo contiene.
  - Se preserva el artículo en «la luz» para reflejar la referencia definida del griego.
  - Se evita «Cristo» o terminología equivalente porque no aparece en el versículo.
  - «Tropieza» y «anda» conservan el registro bíblico sin arcaizar el español.
