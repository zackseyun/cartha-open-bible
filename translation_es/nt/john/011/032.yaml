  glossary_alignment: 'La terminología principal está alineada con el proyecto: Ἰησοῦς → «Jesús» y κύριε → «Señor» conforme a la decisión teológica documentada para κύριος en este contexto. No hay conflicto con los glosarios mayores. La reparación necesaria es solo en la formulación de la nota alternativa para κύριε.'
