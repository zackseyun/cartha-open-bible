translation:
  language: es
  text: 'Así que, cuando María llegó donde estaba Jesús y lo vio, se postró a sus pies, diciéndole: «Señor[a], si hubieras estado aquí, mi hermano no habría muerto».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «señor». El griego κύριε puede ser una forma respetuosa de tratamiento, pero aquí se traduce «Señor» en consonancia con el valor habitual de κύριος en el proyecto y con la presentación de Jesús en el Evangelio.
    reason: alternative_reading
lexical_decisions:
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - Entonces
  - Por tanto
  lexicon: BDAG
  rationale: Marca continuidad narrativa e inferencia suave desde el contexto previo. «Así que» suena natural en español contemporáneo y conserva la relación discursiva sin volverla demasiado formal.
- source_word: ὡς ἦλθεν
  english_pob_choice: when Mary came
  chosen_spanish: cuando María llegó
  alternatives_spanish:
  - cuando María vino
  - al llegar María
  lexicon: BDAG
  rationale: La construcción temporal con aoristo se expresa de manera natural con «cuando... llegó». Mantiene el valor de llegada sin calco rígido.
- source_word: ὅπου ἦν Ἰησοῦς
  english_pob_choice: where Jesus was
  chosen_spanish: donde estaba Jesús
  alternatives_spanish:
  - donde Jesús estaba
  - al lugar donde estaba Jesús
  lexicon: BDAG
  rationale: La cláusula locativa se vierte de forma directa y idiomática. «Donde estaba Jesús» conserva el sentido espacial sin expansión innecesaria.
- source_word: ἰδοῦσα αὐτόν
  english_pob_choice: and saw him
  chosen_spanish: y lo vio
  alternatives_spanish:
  - al verlo
  - y al verlo
  lexicon: BDAG
  rationale: El participio circunstancial se integra en español con una coordinación sencilla. «Lo vio» es natural y preserva la secuencia de acciones.
- source_word: ἔπεσεν αὐτοῦ πρὸς τοὺς πόδας
  english_pob_choice: she fell at his feet
  chosen_spanish: se postró a sus pies
  alternatives_spanish:
  - cayó a sus pies
  - se echó a sus pies
  lexicon: BDAG
  rationale: El giro expresa postración ante Jesús. «Se postró» comunica mejor la fuerza reverente del gesto que un simple «cayó» y sigue siendo fiel al acto descrito.
- source_word: λέγουσα αὐτῷ
  english_pob_choice: saying to him
  chosen_spanish: diciéndole
  alternatives_spanish:
  - y le dijo
  - diciendo a él
  lexicon: BDAG
  rationale: El participio presente introduce el discurso. «Diciéndole» conserva la conexión verbal de manera fluida en español.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Señor mío
  - Maestro
  lexicon: BDAG
  rationale: Se mantiene la decisión del POB inglés de rendir κύριε como «Lord». En español, la forma natural y respetuosa es «Señor», que preserva el peso narrativo y teológico sin reducirlo a mera cortesía.
- source_word: εἰ ἦς ὧδε
  english_pob_choice: if you had been here
  chosen_spanish: si hubieras estado aquí
  alternatives_spanish:
  - si estuvieras aquí
  - si hubieras estado presente aquí
  lexicon: BDAG
  rationale: Aunque el griego usa imperfecto, el contexto es contrafáctico respecto del pasado. El pluscuamperfecto de subjuntivo español expresa con claridad esa irrealidad pasada.
- source_word: οὐκ ἄν ἀπέθανεν
  english_pob_choice: would not have died
  chosen_spanish: no habría muerto
  alternatives_spanish:
  - no moriría
  - no se habría muerto
  lexicon: BDAG
  rationale: La combinación expresa un resultado irreal en el pasado. «No habría muerto» es la manera más directa y fiel de reflejar ese valor contrafáctico.
- source_word: μου ὁ ἀδελφός
  english_pob_choice: my brother
  chosen_spanish: mi hermano
  alternatives_spanish:
  - el hermano mío
  - mi propio hermano
  lexicon: BDAG
  rationale: El genitivo posesivo se expresa de forma natural en español con «mi hermano», sin pérdida de sentido.
theological_decisions:
- issue: Tratamiento de κύριε en la voz de María a Jesús
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Señor mío
  - Maestro
  - Sir
  rationale: Se conserva la lectura teológica y narrativa del POB inglés. En este contexto, «Señor» evita rebajar la fórmula a un simple trato cortés, pero no introduce una confesión más explícita de la que el verso mismo da.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
translation_notes:
  revision_awareness: 'El texto inglés auditado fue ajustado solo por puntuación menor, sin cambios sustantivos: se mantuvo la estructura narrativa y la lectura contrafáctica del final. La versión española sigue esa misma base, preservando el flujo del relato y la decisión de traducir κύριε como tratamiento reverente.'
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς conforme al estándar del proyecto.
  - Se usa «Señor» para κύριος/κύριε, siguiendo la decisión teológica auditada del POB inglés y la convención del proyecto para este contexto.
  - Se traduce la construcción contrafáctica con «si hubieras estado aquí, no habría muerto», que es la forma española natural y fiel al valor del griego.
  - Se evita «SEÑOR» como convención tipográfica, porque aquí el nombre divino no está en el texto griego; se trata del tratamiento κύριε a Jesús.
