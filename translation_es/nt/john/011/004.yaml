translation:
  language: es
  text: 'Pero cuando Jesús lo oyó, dijo: «Esta enfermedad no es para muerte[a], sino para la gloria de Dios, para que el Hijo de Dios sea glorificado por medio de ella».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no conduce a muerte». La expresión griega puede indicar que la muerte no es el desenlace o la finalidad última de la enfermedad.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκούσας δὲ
  english_pob_choice: But when Jesus heard it
  chosen_spanish: Pero cuando Jesús lo oyó
  alternatives_spanish:
  - Y cuando Jesús lo oyó
  - Cuando Jesús lo oyó
  lexicon: BDAG
  rationale: El participio aoristo con δέ introduce el marco temporal de la respuesta de Jesús. En español, «cuando» expresa con naturalidad la relación temporal y «pero» conserva el leve giro narrativo de δέ. «Lo» recupera el referente contextual del mensaje sobre la enfermedad de Lázaro.
- source_word: ἀσθένεια
  english_pob_choice: sickness
  chosen_spanish: enfermedad
  alternatives_spanish:
  - dolencia
  - padecimiento
  - sickness
  lexicon: BDAG
  rationale: En este contexto se refiere a la condición de Lázaro. «Enfermedad» es natural en español y suficientemente amplia; evita un matiz más clínico o menos común que «dolencia».
- source_word: οὐκ ἔστιν πρὸς θάνατον
  english_pob_choice: is not unto death
  chosen_spanish: no es para muerte
  alternatives_spanish:
  - no conduce a muerte
  - no es para morir
  lexicon: BDAG
  rationale: πρὸς con acusativo expresa meta o resultado. «Para muerte» conserva la fuerza teleológica de la expresión griega y deja abierta la tensión narrativa de que Lázaro sí morirá después, sin resolverla prematuramente.
- source_word: ὑπὲρ τῆς δόξης τοῦ θεοῦ
  english_pob_choice: for the glory of God
  chosen_spanish: para la gloria de Dios
  alternatives_spanish:
  - por la gloria de Dios
  - en beneficio de la gloria de Dios
  lexicon: BDAG
  rationale: ὑπέρ aquí comunica finalidad/beneficio. «Para la gloria de Dios» es fiel y natural en español, y preserva el peso teológico de δόξα sin recargar la frase.
- source_word: ἵνα δοξασθῇ
  english_pob_choice: so that ... may be glorified
  chosen_spanish: para que ... sea glorificado
  alternatives_spanish:
  - a fin de que ... sea glorificado
  - para que ... pueda ser glorificado
  lexicon: BDAG
  rationale: ἵνα introduce propósito. En español, «para que» es la forma más directa y clara; el pasivo se conserva con «sea glorificado».
- source_word: ὁ υἱὸς τοῦ θεοῦ
  english_pob_choice: the Son of God
  chosen_spanish: el Hijo de Dios
  alternatives_spanish:
  - el Hijo de Dios
  lexicon: BDAG
  rationale: Título cristológico estándar; se traduce, no se translitera. «Hijo de Dios» mantiene la formulación bíblica y su fuerza doctrinal.
- source_word: δι’ αὐτῆς
  english_pob_choice: through it
  chosen_spanish: por medio de ella
  alternatives_spanish:
  - por ella
  - a través de ella
  lexicon: BDAG
  rationale: διά con genitivo indica medio o instrumento. En español, «por medio de ella» es claro y conserva el referente femenino de «enfermedad».
theological_decisions:
- issue: Sentido de «no es para muerte» frente a la muerte posterior de Lázaro
  english_pob_reading: The sickness is not the ultimate end or purpose of death; the phrase does not mean Lazarus will never die in the course of the story.
  chosen_spanish_reading: La enfermedad no tiene a la muerte como finalidad última; la frase no afirma que Lázaro no morirá en el desarrollo del relato.
  alternative_spanish_readings:
  - La enfermedad no va a producir ninguna muerte
  - La enfermedad no es mortal
  rationale: La narración posterior muestra que Lázaro muere temporalmente. Por eso conviene mantener la fuerza final/teleológica de πρὸς sin convertirla en una negación absoluta que borre la tensión del texto.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Relación entre la gloria de Dios y la glorificación del Hijo de Dios
  english_pob_reading: Both clauses are retained distinctly, showing that the sickness serves God's glory and specifically the glorification of the Son through it.
  chosen_spanish_reading: 'Se mantienen separadas las dos cláusulas: la enfermedad sirve a la gloria de Dios y, por medio de ella, el Hijo de Dios es glorificado.'
  alternative_spanish_readings:
  - Reducir ambas a una sola referencia a la gloria divina
  - Parafrasear el fin como una sola manifestación de gloria
  rationale: El griego distingue explícitamente ambos propósitos. Mantenerlos separados preserva la cristología elevada del versículo sin añadir explicación doctrinal ajena al texto.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD, including the homoousios language)'
translation_notes:
  revision_awareness: No se registraron revisiones posteriores que alteren la lectura; el pasaje mantiene alto acuerdo en la auditoría inglesa y la versión española conserva la misma tensión lexical y teológica.
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς y «Dios» para θεοῦ conforme a los defaults del proyecto.
  - Se usa «Hijo de Dios» como título cristológico traducido, no transliterado.
  - Se preserva la distinción entre finalidad («para la gloria de Dios») y medio («por medio de ella») sin fusionarlas.
  - El español evita un calco rígido de «unto death» pero conserva la ambigüedad teleológica documentada en la auditoría inglesa.
