translation:
  language: es
  text: Y me alegro por ustedes, para que crean[a], que no estaba allí; pero vayamos a él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para que lleguen a creer». El subjuntivo aoristo griego puede enfatizar el llegar a la fe, aunque «crean» se mantiene en el texto principal como la traducción más amplia y menos cargada de interpretación.
    reason: lexical_alternative
lexical_decisions:
- source_word: χαίρω
  english_pob_choice: I am glad
  chosen_spanish: me alegro
  alternatives_spanish:
  - me regocijo
  lexicon: BDAG
  rationale: El presente indicativo expresa el estado actual de Jesús. En español, «me alegro» comunica con naturalidad la alegría o satisfacción personal sin sonar forzado; «me regocijo» es más solemne, pero menos idiomático aquí.
- source_word: δι’ ὑμᾶς
  english_pob_choice: for your sake
  chosen_spanish: por ustedes
  alternatives_spanish:
  - a causa de ustedes
  - en beneficio de ustedes
  lexicon: BDAG
  rationale: La preposición διά con acusativo puede expresar causa o referencia a beneficio. En este contexto, la idea es que la situación redunde en bien de los discípulos; «por ustedes» conserva esa referencia relacional sin sobreexplicar.
- source_word: ἵνα πιστεύσητε
  english_pob_choice: so that you may believe
  chosen_spanish: para que crean
  alternatives_spanish:
  - para que lleguen a creer
  lexicon: BDAG
  rationale: ἵνα introduce propósito. El subjuntivo aoristo puede sugerir un matiz ingresivo, pero el POB inglés opta por el verbo simple «believe» para no cargar el sentido. En español, «crean» mantiene esa amplitud; «lleguen a creer» preserva la posible fuerza ingesiva, pero sería más interpretativo.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: porque
  alternatives_spanish:
  - que
  lexicon: BDAG
  rationale: 'Aunque ὅτι puede introducir contenido («que»), aquí el sentido global liga la razón con la ausencia de Jesús: la frase funciona naturalmente como explicación causal en español. «Porque» traduce bien esa relación sin perder el enlace lógico del griego.'
- source_word: οὐκ ἤμην ἐκεῖ
  english_pob_choice: I was not there
  chosen_spanish: no estaba allí
  alternatives_spanish:
  - no me hallaba allí
  lexicon: BDAG
  rationale: El imperfecto de εἰμί se vierte de forma natural con «estaba». «Allí» reproduce ἐκεῖ de manera clara e idiomática. «No me hallaba allí» es posible, pero más literario y menos directo.
- source_word: ἀλλὰ
  english_pob_choice: But
  chosen_spanish: pero
  alternatives_spanish:
  - sino que
  lexicon: BDAG
  rationale: Marca un giro de contraste hacia la acción siguiente. «Pero» es la conjunción más natural en español; «sino que» sonaría excesivo porque no hay una negación previa del mismo tipo que exija esa construcción.
- source_word: ἄγωμεν
  english_pob_choice: let us go
  chosen_spanish: vayamos
  alternatives_spanish:
  - vamos
  - partamos
  lexicon: BDAG
  rationale: El subjuntivo exhortativo de primera persona plural se expresa de forma idiomática con «vayamos». «Vamos» puede sonar demasiado coloquial en este registro; «partamos» añade una matiz no requerido.
- source_word: πρὸς αὐτόν
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - hacia él
  lexicon: BDAG
  rationale: πρός con acusativo indica movimiento hacia una persona. «A él» es la forma más natural en español; «hacia él» conserva más literalmente la dirección, pero suena más marcada sin necesidad.
theological_decisions:
- issue: Alcance de πιστεύσητε (simple fe vs. ingreso a la fe)
  english_pob_reading: believe
  chosen_spanish_reading: crean
  alternative_spanish_readings:
  - lleguen a creer
  rationale: La forma aorista subjuntiva puede insinuar entrada o llegada a la fe, pero el POB inglés mantiene el verbo simple para no sobreinterpretar el estado previo de los discípulos. «Crean» conserva esa prudencia y deja abierta la tensión teológica del texto.
  doctrine_reference: Translation philosophy §3; πίστις / πιστεύω sin carga doctrinal añadida
- issue: Relación entre ὅτι y la cláusula precedente
  english_pob_reading: that I was not there
  chosen_spanish_reading: porque no estaba allí
  alternative_spanish_readings:
  - que no estaba allí
  rationale: En el flujo del versículo, la motivación se entiende mejor como causal en español. Esta opción no niega el valor completivo de ὅτι, pero prioriza la relación argumental del enunciado sin alterar su contenido.
  doctrine_reference: Sintaxis discursiva del versículo; equivalencia óptima
translation_notes:
  revision_awareness: Esta redacción sigue de cerca el texto griego SBLGNT y coincide con la decisión inglesa auditada de mantener πιστεύσητε en un sentido amplio («believe») sin intensificarlo a «lleguen a creer». No se registraron revisiones posteriores en el expediente, y el pasaje muestra alta concordancia entre las pasadas de revisión.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se usa «vayamos» para la exhortación inclusiva de primera persona plural, consistente con el tono de invitación en español.
  - No se introducen notas al pie porque el texto español no requiere una alternativa textual obligatoria distinta de las decisiones ya explicadas en los campos de decisión.
