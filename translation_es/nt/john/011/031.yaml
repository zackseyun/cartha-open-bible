translation:
  language: es
  text: Entonces los judíos[a] que estaban con ella en la casa y la consolaban, al ver que María se levantó deprisa y salió, la siguieron, pensando que iba al sepulcro para llorar allí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los judeanos». En Juan, Ἰουδαῖοι a veces puede referirse más específicamente a gente de Judea o a las autoridades judeanas, pero aquí se refiere al grupo que estaba de duelo con María.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ οὖν Ἰουδαῖοι
  english_pob_choice: So the Jews
  chosen_spanish: Así que los judíos
  alternatives_spanish:
  - Entonces los judíos
  - Por eso los judíos
  - Así que los judeanos
  lexicon: BDAG
  rationale: οὖν marca continuación narrativa; «Así que» comunica bien la transición en español sin forzar un registro demasiado solemne. Ἰουδαῖοι se mantiene como «los judíos», siguiendo la decisión del POB en inglés; «los judeanos» queda como alternativa contextual posible, pero menos natural en esta línea narrativa.
- source_word: οἱ ὄντες μετ’ αὐτῆς ἐν τῇ οἰκίᾳ
  english_pob_choice: who were with her in the house
  chosen_spanish: que estaban con ella en la casa
  alternatives_spanish:
  - que estaban con ella en la vivienda
  - que se hallaban con ella en la casa
  lexicon: BDAG
  rationale: La frase participial identifica al grupo concreto. «En la casa» es la correspondencia directa y natural de ἐν τῇ οἰκίᾳ.
- source_word: παραμυθούμενοι αὐτήν
  english_pob_choice: comforting her
  chosen_spanish: la consolaban
  alternatives_spanish:
  - la confortaban
  - la consolaban y animaban
  lexicon: BDAG
  rationale: παραμυθέομαι expresa dar consuelo. «Consolaban» conserva esa fuerza y encaja bien en el contexto de duelo; «confortaban» sería posible, pero menos idiomático en español moderno.
- source_word: ἰδόντες
  english_pob_choice: when they saw
  chosen_spanish: al ver
  alternatives_spanish:
  - cuando vieron
  - viendo
  lexicon: BDAG
  rationale: El participio aoristo se vierte temporalmente. «Al ver» suena natural en español y conserva la secuencia de acciones.
- source_word: ταχέως ἀνέστη καὶ ἐξῆλθεν
  english_pob_choice: got up quickly and went out
  chosen_spanish: se levantó deprisa y salió
  alternatives_spanish:
  - se puso de pie deprisa y salió
  - se alzó rápidamente y salió
  lexicon: BDAG
  rationale: ἀνέστη aquí significa levantarse de la postura sentada, no resucitar; «se levantó» es claro y fiel. «Deprisa» refleja ταχέως con fluidez natural.
- source_word: ἠκολούθησαν αὐτῇ
  english_pob_choice: followed her
  chosen_spanish: la siguieron
  alternatives_spanish:
  - fueron tras ella
  - la acompañaron
  lexicon: BDAG
  rationale: ἀκολουθέω aquí describe seguimiento físico, no discipulado técnico. «La siguieron» es la forma más directa y natural.
- source_word: δόξαντες
  english_pob_choice: thinking
  chosen_spanish: pensando
  alternatives_spanish:
  - suponiendo
  - creyendo
  lexicon: BDAG
  rationale: δοκέω en participio expresa la inferencia que hacen. «Pensando» conserva la idea de su suposición sin añadir matices no requeridos.
- source_word: ὑπάγει
  english_pob_choice: she was going
  chosen_spanish: iba
  alternatives_spanish:
  - estaba yendo
  - se dirigía
  lexicon: BDAG
  rationale: 'En discurso indirecto tras un verbo pasado, el español natural pide imperfecto: «iba». Mantiene el sentido de desplazamiento sin rigidizar el tiempo verbal griego.'
- source_word: εἰς τὸ μνημεῖον
  english_pob_choice: to the tomb
  chosen_spanish: al sepulcro
  alternatives_spanish:
  - a la tumba
  - al monumento funerario
  lexicon: BDAG
  rationale: μνημεῖον en este contexto funerario se refiere al lugar de entierro. «Sepulcro» es una opción digna y bíblica en español, suficientemente cercana a «tomb» y menos ambigua que «grave».
- source_word: ἵνα κλαύσῃ ἐκεῖ
  english_pob_choice: to weep there
  chosen_spanish: para llorar allí
  alternatives_spanish:
  - para llorar allí mismo
  - a fin de llorar allí
  lexicon: BDAG
  rationale: ἵνα con subjuntivo expresa propósito. «Para llorar allí» comunica la finalidad con naturalidad; «llorar» es una equivalencia contextual adecuada para κλαύσῃ en este duelo.
theological_decisions:
- issue: Ἰουδαῖοι en el relato joánico
  english_pob_reading: Rendered as 'the Jews' in this verse, referring to the Jewish mourners present with Mary.
  chosen_spanish_reading: Se mantiene «los judíos», refiriéndose al grupo de dolientes presentes con María.
  alternative_spanish_readings:
  - los judeanos
  rationale: En este versículo, el referente es el grupo que acompaña y consuela a María. Se conserva la designación directa del griego sin neutralizarla, pero se aclara en el trasfondo de la decisión que el contexto es de duelo, no una generalización étnica amplia.
  doctrine_reference: Original-language primacy; preserve contextual tension rather than smoothing it away.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés están en alta concordancia y no muestran revisiones pendientes; se ha seguido la lectura estable del POB en inglés sin introducir cambios de sentido.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiere; este versículo no contiene el nombre divino.
  - Se mantiene «los judíos» como correspondencia de Ἰουδαῖοι, coherente con la decisión inglesa documentada.
  - «Sepulcro» se elige por su naturalidad bíblica en español y por corresponder al contexto funerario de μνημεῖον.
  - Se evita lenguaje excesivamente arcaico para preservar legibilidad pública sin perder tono reverente.
