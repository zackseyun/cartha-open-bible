  text: οἱ οὖν Ἰουδαῖοι οἱ ὄντες μετ’ αὐτῆς ἐν τῇ οἰκίᾳ καὶ παραμυθούμενοι αὐτήν, ἰδόντες τὴν ⸀Μαριὰμ ὅτι ταχέως ἀνέστη καὶ ἐξῆλθεν, ἠκολούθησαν αὐτῇ ⸀δόξαντες ὅτι ὑπάγει εἰς τὸ μνημεῖον ἵνα κλαύσῃ ἐκεῖ.
base_translation:
  language: en
  yaml_path: translation/nt/john/011/031.yaml
  text: So the Jews who were with her in the house and comforting her[a], when they saw that Mary got up quickly and went out, followed her, thinking that she was going to the tomb to weep there.
  footnotes:
  - marker: a
    text: Or 'the Judeans.' In John, Ἰουδαῖοι can sometimes refer more narrowly to people from Judea or to the Judean leadership, but here it refers to the group mourning with Mary.
    reason: lexical_alternative
