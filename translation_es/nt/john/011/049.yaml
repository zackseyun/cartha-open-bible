translation:
  language: es
  text: 'Pero uno de ellos, Caifás, que era sumo sacerdote aquel año, les dijo: «Ustedes no saben nada en absoluto[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Ustedes no saben nada». La expresión griega es un reproche enfático, literalmente con una doble negación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἷς δέ τις ἐξ αὐτῶν
  english_pob_choice: But one of them
  chosen_spanish: Pero uno de ellos
  alternatives_spanish:
  - Ahora uno de ellos
  - Pero cierto uno de ellos
  lexicon: BDAG
  rationale: La combinación εἷς ... τις introduce de manera idiomática a un individuo del grupo; en español natural basta con «uno de ellos». δέ se refleja con «Pero» para marcar la transición suave con respecto al contexto inmediato.
- source_word: Καϊάφας
  english_pob_choice: Caiaphas
  chosen_spanish: Caifás
  alternatives_spanish:
  - Caiás
  lexicon: BDAG
  rationale: Nombre propio transliterado según la convención española estándar. «Caifás» es la forma tradicional y clara en español bíblico.
- source_word: ἀρχιερεὺς
  english_pob_choice: high priest
  chosen_spanish: sumo sacerdote
  alternatives_spanish:
  - sumo pontífice
  - jefe de los sacerdotes
  lexicon: BDAG
  rationale: En este contexto, ἀρχιερεύς designa al titular del cargo; «sumo sacerdote» comunica con precisión la función sin introducir una glosa innecesaria. «Jefe de los sacerdotes» sería menos natural y menos exacto como término técnico.
- source_word: ὢν τοῦ ἐνιαυτοῦ ἐκείνου
  english_pob_choice: who was high priest that year
  chosen_spanish: que era ... aquel año
  alternatives_spanish:
  - siendo ... de aquel año
  - que fue ... aquel año
  lexicon: BDAG
  rationale: El participio ὢν se vierte de forma relativa y natural con «que era», preservando el dato histórico. «Aquel año» representa el demostrativo ἐκείνου sin forzar una construcción más pesada como «de aquel año».
- source_word: εἶπεν αὐτοῖς
  english_pob_choice: said to them
  chosen_spanish: les dijo
  alternatives_spanish:
  - les habló
  - les comentó
  lexicon: BDAG
  rationale: λέγω con dativo indirecto se expresa de manera directa y natural con «les dijo».
- source_word: Ὑμεῖς
  english_pob_choice: You
  chosen_spanish: Ustedes
  alternatives_spanish:
  - Vosotros
  - Tú
  lexicon: BDAG
  rationale: El pronombre explícito es enfático en griego; en español se conserva con «Ustedes» al inicio de la cita para reproducir el peso del reproche sin añadir una expansión artificial.
- source_word: οὐκ οἴδατε οὐδέν
  english_pob_choice: You know nothing at all
  chosen_spanish: no saben nada en absoluto
  alternatives_spanish:
  - no saben nada
  - no conocen nada
  lexicon: BDAG
  rationale: La doble negación en griego funciona como intensificación retórica, no como doble negación lógica. «Nada en absoluto» reproduce el énfasis del reproche de forma idiomática y fluida en español.
theological_decisions:
- issue: Nota temporal sobre el sumo sacerdocio de Caifás
  english_pob_reading: who was high priest that year
  chosen_spanish_reading: que era sumo sacerdote aquel año
  alternative_spanish_readings:
  - siendo sumo sacerdote de aquel año
  - que fue sumo sacerdote aquel año
  rationale: Se conserva la observación temporal como dato histórico del relato, sin añadir explicación teológica ni suavizar el carácter particular de «aquel año». Esto mantiene la tensión narrativa del pasaje sin resolverla interpretativamente.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'La redacción sigue el acuerdo alto del audit trail inglés y conserva las decisiones clave: transición con δέ, nombre propio transliterado, oficio sacerdotal como «sumo sacerdote», nota temporal sin explicación añadida, y el reproche enfático de la doble negación con una equivalencia natural en español.'
  spanish_consistency_notes:
  - Se usa «Caifás» como forma estable del nombre propio en español bíblico.
  - Se prefiere «sumo sacerdote» en lugar de «sumo pontífice» para mantener coherencia con el término técnico del texto griego.
  - «No saben nada en absoluto» preserva el valor retórico de οὐκ οἴδατε οὐδέν sin volverlo pesado o artificial.
  - Las comillas angulares se usan para la cita directa según la puntuación española.
  - El marcado de nota a no se coloca en el nombre propio, sino en el sintagma temporal para anclar la observación descriptiva del oficio.
