  source_alignment_summary: 'El borrador español refleja bien el sentido del griego: introduce a un individuo del grupo, identifica a Caifás como sumo sacerdote aquel año y conserva el reproche enfático de la cláusula final. Sin embargo, una nota al pie introduce una alternativa equivocada respecto de οὐκ οἴδατε οὐδέν.'
  spanish_quality_summary: 'El español principal es natural, claro y digno: «Pero uno de ellos, Caifás, que era sumo sacerdote aquel año, les dijo: “Ustedes no saben nada en absoluto”». La única reparación necesaria está en las notas: la nota [a] no aporta una verdadera alternativa y la nota [b] contradice la alternativa formal inglesa.'
  glossary_alignment: 'La terminología clave está bien alineada: Καϊάφας -> «Caifás»; ἀρχιερεύς -> «sumo sacerdote»; εἶπεν αὐτοῖς -> «les dijo». No hay términos del glosario de proyecto en tensión aquí. «Ustedes» es aceptable para español neutro latinoamericano.'
  issues:
  - severity: medium
    issue: 'La nota [b] da como alternativa «no saben nada», pero la alternativa formal documentada en inglés es «no saben nada/ no saben nada»? No: el inglés distingue entre la traducción idiomática principal y la opción más formal «no saben nada / no saben nada»?'
    rationale: El texto inglés auditado dice que la alternativa más formal es “You do not know anything”, mientras que la línea principal es “You know nothing at all.” En español, la opción formal correspondiente sería «no saben nada» solo si se entendiera como menos enfática, pero la nota dice “más formalmente” y además repite una construcción muy cercana al texto principal. Mejor expresar la alternativa formal como «ustedes no saben nada» o eliminar la nota si no añade valor.
  - severity: medium
    issue: La nota [a] no preserva una alternativa significativa y repite esencialmente el texto principal.
    rationale: El inglés no ofrece nota para «who was high priest that year»; la documentación léxica ya explica el valor participial. En español, la nota [a] no aclara una ambigüedad nueva ni preserva una alternativa relevante para el lector, por lo que conviene eliminarla para evitar ruido editorial.
  revised_spanish_text: 'Pero uno de ellos, Caifás, que era sumo sacerdote aquel año, les dijo: «Ustedes no saben nada en absoluto[a]».'
