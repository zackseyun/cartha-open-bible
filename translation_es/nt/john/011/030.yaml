    text: 'O, más explícitamente: «donde Marta había salido a encontrarlo».'
    reason: lexical_alternative
  revision_rationale: Se ajusta ὑπήντησεν en el texto principal a una forma más neutral ('lo había encontrado') para corresponder a la elección principal auditada 'had met', y se reserva la explicitación de movimiento para la nota, como en el POB inglés. También se elimina la redundancia 'seguía aún' para un español más fluido sin pérdida de sentido. El resto del versículo se mantiene fiel al griego.
