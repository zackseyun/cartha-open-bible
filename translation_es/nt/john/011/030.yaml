revisions:
- from: Jesús todavía no había llegado al pueblo[a], sino que seguía aún en el lugar donde Marta le había salido al encuentro.
  to: Jesús todavía no había llegado al pueblo[a], sino que seguía en el lugar donde Marta lo había encontrado.
  rationale: Se ajusta ὑπήντησεν en el texto principal a una forma más neutral ('lo había encontrado') para corresponder a la elección principal auditada 'had met', y se reserva la explicitación de movimiento para la nota, como en el POB inglés. También se elimina la redundancia 'seguía aún' para un español más fluido sin pérdida de sentido. El resto del versículo se mantiene fiel al griego.
