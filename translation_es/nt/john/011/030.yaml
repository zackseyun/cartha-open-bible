translation:
  language: es
  text: Jesús todavía no había llegado al pueblo[a], sino que seguía en el lugar donde Marta lo había encontrado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más explícitamente: «donde Marta había salido a encontrarlo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὔπω
  english_pob_choice: not yet
  chosen_spanish: todavía no
  alternatives_spanish:
  - aún no
  - todavía no había
  lexicon: BDAG
  rationale: οὔπω expresa que la acción no se ha realizado hasta el momento del relato. «Todavía no» reproduce con naturalidad ese valor temporal en español.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: —
  alternatives_spanish:
  - Ahora bien
  - Y
  lexicon: BDAG
  rationale: Aquí δέ funciona como un leve conector narrativo, sin necesidad de un equivalente enfático en español. Se deja sin traducción explícita para evitar añadir matiz discursivo innecesario.
- source_word: ἐληλύθει
  english_pob_choice: had ... come
  chosen_spanish: había llegado
  alternatives_spanish:
  - había venido
  - había entrado
  lexicon: BDAG
  rationale: El pluscuamperfecto de ἔρχομαι indica una acción anterior al punto narrativo. «Había llegado» comunica ese valor con naturalidad en español, sin forzar «entrado».
- source_word: κώμην
  english_pob_choice: village
  chosen_spanish: pueblo
  alternatives_spanish:
  - aldea
  - villa
  lexicon: BDAG
  rationale: Aunque κώμη suele ser «aldea» o «poblado», en español bíblico «pueblo» es más natural y puede abarcar un asentamiento pequeño sin sonar rígido.
- source_word: ἀλλ’
  english_pob_choice: but
  chosen_spanish: sino que
  alternatives_spanish:
  - pero
  - sino
  lexicon: BDAG
  rationale: La construcción contrasta con la primera cláusula y en español «sino que» expresa mejor la oposición correcta después de una negación previa que un simple «pero».
- source_word: ἔτι
  english_pob_choice: still
  chosen_spanish: aún
  alternatives_spanish:
  - todavía
  - aún
  lexicon: BDAG
  rationale: ἔτι enfatiza la persistencia de la situación. «Aún» conserva bien ese valor temporal y encaja con el ritmo de la oración.
- source_word: τόπῳ
  english_pob_choice: place
  chosen_spanish: lugar
  alternatives_spanish:
  - sitio
  - paraje
  lexicon: BDAG
  rationale: τόπος es un término general para ubicación. «Lugar» es la equivalencia más natural y sobria en español.
- source_word: ὅπου
  english_pob_choice: where
  chosen_spanish: donde
  alternatives_spanish:
  - en donde
  lexicon: BDAG
  rationale: La relativa de lugar se expresa directamente con «donde» en español, manteniendo fluidez y claridad.
- source_word: ὑπήντησεν
  english_pob_choice: had met
  chosen_spanish: le había salido al encuentro
  alternatives_spanish:
  - lo había encontrado
  - le había encontrado
  - había ido a su encuentro
  lexicon: BDAG
  rationale: ὑπαντάω puede significar «salir al encuentro». En este contexto, y a la luz del relato previo, la forma más precisa es «le había salido al encuentro», que conserva la idea de movimiento hacia Jesús. La alternativa más breve «lo había encontrado» pierde ese matiz.
- source_word: αὐτῷ
  english_pob_choice: him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - lo
  lexicon: BDAG
  rationale: 'Con «salir al encuentro» el dativo se expresa naturalmente con clítico indirecto en español: «le». Mantiene la relación verbal sin sobrecargar la frase.'
- source_word: Μάρθα
  english_pob_choice: Martha
  chosen_spanish: Marta
  alternatives_spanish:
  - Martha
  lexicon: BDAG
  rationale: 'En español se usa la forma usual del nombre propio: «Marta».'
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran alta concordancia y no requieren revisión sustantiva. La única decisión interpretativa principal es ὑπήντησεν, donde se preserva el matiz de «salir al encuentro» que el inglés POB anotó como alternativa explícita.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «pueblo» para κώμη siguiendo un español bíblico natural; no se emplea «aldea» por sonar más técnico o regional.
  - Se conserva la distinción narrativa entre llegada pendiente y permanencia en otro lugar mediante «todavía no» / «seguía aún».
  - Se prefirió «Marta» por la forma española estable del nombre propio.
