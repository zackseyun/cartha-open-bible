translation:
  language: es
  text: 'Jesús le dijo: «¿No te dije que si crees, verás la gloria de Dios?»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: λέγει
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - dice
  lexicon: BDAG
  rationale: El griego usa presente histórico, pero en español narrativo natural se prefiere el pretérito simple. "Dijo" conserva el valor narrativo y la equivalencia óptima sin sonar artificial.
- source_word: αὐτῇ
  english_pob_choice: to her
  chosen_spanish: le
  alternatives_spanish:
  - a ella
  lexicon: BDAG
  rationale: El dativo indirecto se expresa con el pronombre átono de objeto indirecto en español. "Le" es natural y fiel; "a ella" sería más explícito pero menos idiomático en la narración.
- source_word: Οὐκ εἶπόν σοι
  english_pob_choice: Did I not tell you
  chosen_spanish: ¿No te dije
  alternatives_spanish:
  - ¿No te he dicho?
  - ¿Acaso no te dije?
  lexicon: BDAG
  rationale: La pregunta retórica se conserva con una formulación natural en español. "Decir" reproduce bien el verbo griego en este contexto y el pretérito simple refleja el aoristo.
- source_word: ἐὰν πιστεύσῃς
  english_pob_choice: if you believe
  chosen_spanish: si crees
  alternatives_spanish:
  - si crees en él
  - si tienes fe
  lexicon: BDAG
  rationale: '"Creer" mantiene el uso joánico de πιστεύω sin introducir una paráfrasis más interpretativa. Se evita añadir el objeto implícito para no sobreespecificar lo que el griego deja general.'
- source_word: ὄψῃ
  english_pob_choice: you will see
  chosen_spanish: verás
  alternatives_spanish:
  - llegarás a ver
  - vas a ver
  lexicon: BDAG
  rationale: El futuro de ὁράω se expresa de forma directa con "verás". Es claro, sobrio y conserva la promesa condicional.
- source_word: δόξαν
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - esplendor
  - majestad
  lexicon: BDAG
  rationale: '"Gloria" es la equivalencia establecida en contexto joánico y preserva la carga teológica de δόξα como manifestación divina.'
- source_word: τοῦ θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - de Dios mismo
  lexicon: BDAG
  rationale: El genitivo se traduce de manera directa como posesivo/descriptivo. "De Dios" conserva el peso formal y la referencia explícita sin reescribir el sentido.
theological_decisions:
- issue: Relación entre la fe y ver la gloria de Dios
  english_pob_reading: Render the statement straightforwardly as a conditional promise without expanding its theological implications.
  chosen_spanish_reading: Traducirla como una promesa condicional directa, sin ampliar su alcance ni resolver de antemano si se refiere a una aplicación general o al episodio inmediato.
  alternative_spanish_readings:
  - Interpretarla como principio general sobre fe y milagros
  - Entenderla como una promesa limitada exclusivamente a la resurrección de Lázaro
  rationale: La frase griega presenta una condición clara y una consecuencia clara. La traducción debe mantener esa tensión abierta, evitando una glosa que cierre el debate teológico o narrativo.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: El texto griego de SBLGNT y el control cruzado del borrador inglés muestran acuerdo alto; no hay variantes textuales ni revisiones aplicadas que obliguen a notas adicionales. Se conserva el presente histórico griego con pasado narrativo natural en español, y la formulación condicional permanece sin expansión interpretativa.
  spanish_consistency_notes:
  - Se mantiene "Jesús" como forma fija para Ἰησοῦς.
  - Se usa "gloria" para δόξα, conforme al uso joánico y al borrador inglés.
  - No se introduce "Mesías" ni otros equivalentes no presentes en el versículo.
  - Se conserva un registro bíblico moderno y digno, sin calco innecesario del orden griego.
