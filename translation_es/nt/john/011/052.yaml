translation:
  language: es
  text: y no solamente por la nación[a][b], sino también para que reúna en uno a los hijos de Dios que están dispersos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no solamente por la nación, sino también para reunir en uno a los hijos de Dios que están dispersos».'
    reason: alternative_reading
  - marker: b
    text: «La nación» se refiere en contexto a la nación judía.
    reason: cultural_note
lexical_decisions:
- source_word: ἔθνους
  english_pob_choice: nation
  chosen_spanish: nación
  alternatives_spanish:
  - pueblo
  - nación judía
  lexicon: BDAG
  rationale: En este contexto inmediato se refiere a la nación judía, pero en español 'nación' conserva mejor el sustantivo singular corporativo del griego sin explicitar más de lo que el texto dice. 'Pueblo' suaviza la referencia nacional; 'nación judía' añade una especificación que el griego no formula.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: La cláusula expresa finalidad. 'Para que' es la forma natural y fiel en español, manteniendo el valor purposivo sin volverla más pesada.
- source_word: τέκνα τοῦ θεοῦ
  english_pob_choice: children of God
  chosen_spanish: hijos de Dios
  alternatives_spanish:
  - niños de Dios
  - hijos e hijas de Dios
  lexicon: BDAG
  rationale: Aunque τέκνα es inclusivo en griego, en español bíblico 'hijos de Dios' es la expresión más natural y tradicionalmente inteligible para una filiación colectiva. 'Niños' sería inadecuado en registro y sentido; 'hijos e hijas' añade un desdoblamiento que el griego no requiere.
- source_word: διεσκορπισμένα
  english_pob_choice: the scattered
  chosen_spanish: dispersos
  alternatives_spanish:
  - esparcidos
  - los dispersos
  - que estaban dispersos
  lexicon: BDAG
  rationale: El participio perfecto pasivo funciona adjetivalmente y describe un estado. 'Dispersos' preserva brevedad y la idea de personas en condición de dispersión. 'Esparcidos' es posible, pero menos idiomático para personas; 'que estaban dispersos' explicita más de lo necesario.
- source_word: συναγάγῃ
  english_pob_choice: he might gather
  chosen_spanish: reúna
  alternatives_spanish:
  - junte
  - reuniera
  - juntara
  lexicon: BDAG
  rationale: El subjuntivo aoristo tras ἵνα pide una finalidad expresada naturalmente en español con 'para que reúna'. 'Reúna' conserva el valor de congregar en un solo conjunto; 'junte' es aceptable pero algo más coloquial.
- source_word: εἰς ἕν
  english_pob_choice: into one
  chosen_spanish: en uno
  alternatives_spanish:
  - en una sola unidad
  - para ser uno
  - en una sola cosa
  lexicon: BDAG
  rationale: El griego es deliberadamente compacto. 'En uno' preserva esa concisión y evita introducir 'unidad' o 'cuerpo', que irían más allá del texto. En español funciona bien como resultado de la reunión.
- source_word: καὶ οὐχ ὑπὲρ τοῦ ἔθνους μόνον, ἀλλ’
  english_pob_choice: and not for the nation only, but also
  chosen_spanish: y no solamente por la nación, sino también
  alternatives_spanish:
  - y no por la nación solamente, sino también
  - y no solo por la nación, sino también
  lexicon: BDAG
  rationale: '''Solamente'' mantiene el contraste enfático de μόνον. ''Por la nación'' refleja ὑπέρ en este contexto de beneficio/vicariedad; en español suena más natural que repetir ''para'' en esta primera mitad, dado el paralelismo con la cláusula de finalidad siguiente.'
theological_decisions:
- issue: Alcance de 'la nación'
  english_pob_reading: Refers in context to the Jewish nation.
  chosen_spanish_reading: '''La nación'' se entiende en contexto como la nación judía, sin explicitarlo en el texto principal.'
  alternative_spanish_readings:
  - '''el pueblo'''
  - '''la nación judía'''
  rationale: El contexto de Juan 11 apunta al pueblo judío como referencia inmediata. Sin embargo, el texto griego solo dice 'la nación'; por eso el cuerpo principal conserva la forma más cercana y deja la aclaración para nota, en vez de resolverla dentro del versículo.
  doctrine_reference: Mantener la referencia contextual sin sobreespecificar; cf. Juan 11:50-52.
- issue: Identidad de 'los hijos de Dios'
  english_pob_reading: A forward-looking reference to God's people beyond the Jewish nation, gathered through Jesus' death, without specifying a narrower denominational system.
  chosen_spanish_reading: '''Los hijos de Dios'' se conserva como referencia amplia a los pertenecientes a Dios, sin precisar más su composición.'
  alternative_spanish_readings:
  - '''los creyentes'''
  - '''los elegidos'''
  - '''los hijos e hijas de Dios'''
  rationale: El griego usa τέκνα τοῦ θεοῦ, una designación relacional amplia. En español, 'hijos de Dios' comunica esa filiación sin reducirla a una categoría eclesiástica específica ni introducir un desdoblamiento innecesario. Se preserva así la tensión interpretativa del texto.
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente; cf. Juan 10:16; 11:50-52.
translation_notes:
  revision_awareness: 'El texto base en inglés no fue revisado en la última pasada; el informe de concordancia indica alto acuerdo y sin cambios necesarios. La propuesta española sigue esa lectura estable, manteniendo las dos notas del POB: una alternativa de sintaxis para la cláusula de finalidad y una aclaración contextual sobre ''la nación''.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma del proyecto solo cuando el texto la exige; aquí no aparece el nombre divino explícito.
  - Se evitó 'Cristo' porque el versículo no contiene Χριστός.
  - Se tradujo τέκνα como 'hijos' en coherencia con el uso bíblico de filiación colectiva, sin añadir desdoblamientos no presentes en el griego.
  - Se preservó la brevedad de εἰς ἕν con 'en uno', evitando ampliaciones doctrinales como 'en un solo cuerpo'.
