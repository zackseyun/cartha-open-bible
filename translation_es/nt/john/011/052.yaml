    issue: Ambigüedad leve en 'a los hijos de Dios dispersos'
    rationale: El griego τὰ τέκνα τοῦ θεοῦ τὰ διεσκορπισμένα marca claramente 'los hijos de Dios' como el grupo que está disperso. En español, la posposición adjetival sin artículo repetido puede sonar un poco apretada; 'los hijos de Dios que están dispersos' comunica con mayor claridad el valor atributivo del participio.
  - severity: low
