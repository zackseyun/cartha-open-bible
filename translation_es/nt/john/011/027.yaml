translation:
  language: es
  text: 'Le dijo a él: «Sí, Señor; yo he creído que tú eres el Mesías[a], el Hijo de Dios, el que viene al mundo[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el Cristo». El título griego Χριστός se traduce aquí como «Mesías» para conservar su sentido como título.
    reason: alternative_reading
  - marker: b
    text: O «que viene al mundo». La expresión participial griega puede verterse más explícitamente con una oración relativa.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει αὐτῷ
  english_pob_choice: She said to him
  chosen_spanish: Le dijo
  alternatives_spanish:
  - Ella le dijo
  - Le dice
  lexicon: SBLGNT / contexto narrativo
  rationale: El griego usa presente histórico, pero en español narrativo la forma natural y fiel es el pasado simple. El sujeto femenino se sobreentiende por el contexto inmediato sin necesidad de explicitarlo.
- source_word: Ναί
  english_pob_choice: 'Yes'
  chosen_spanish: Sí
  alternatives_spanish:
  - Claro
  - Ciertamente
  lexicon: BDAG
  rationale: Es una afirmación directa y breve; «Sí» reproduce con naturalidad el valor afirmativo del original.
- source_word: κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - señor
  lexicon: BDAG
  rationale: En este contexto confesional, «Señor» conserva la carga reverencial y cristológica que la POB inglesa quiso preservar con «Lord».
- source_word: πεπίστευκα
  english_pob_choice: I have believed
  chosen_spanish: yo he creído
  alternatives_spanish:
  - yo creo
  - he llegado a creer
  lexicon: BDAG
  rationale: El perfecto expresa una convicción estable con efecto presente. «Yo he creído» conserva ese valor resultativo sin perder legibilidad en español.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  lexicon: BDAG
  rationale: Introduce el contenido de la confesión de fe, no una causa.
- source_word: ὁ χριστός
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - el Cristo
  lexicon: BDAG
  rationale: Como título, Χριστός se traduce «Mesías» para preservar su sentido hebraico y mesiánico, siguiendo la decisión documentada de la POB inglesa.
- source_word: ὁ υἱὸς τοῦ θεοῦ
  english_pob_choice: the Son of God
  chosen_spanish: el Hijo de Dios
  alternatives_spanish:
  - el hijo de Dios
  lexicon: BDAG
  rationale: Es la forma española estable y precisa del título cristológico, manteniendo mayúsculas reverenciales en un confesión de identidad.
- source_word: ὁ εἰς τὸν κόσμον ἐρχόμενος
  english_pob_choice: the one coming into the world
  chosen_spanish: el que viene al mundo
  alternatives_spanish:
  - el que está viniendo al mundo
  - el que entra en el mundo
  lexicon: BDAG
  rationale: La construcción participial se vuelve naturalmente relativa en español. «Viene al mundo» preserva la dirección y el sentido de llegada sin forzar una calca.
- source_word: κόσμον
  english_pob_choice: world
  chosen_spanish: mundo
  alternatives_spanish:
  - mundo humano
  - mundo
  lexicon: BDAG
  rationale: «Mundo» es la equivalencia estándar y consistente en Juan para κόσμος en este contexto.
theological_decisions:
- issue: Título Χριστός en una confesión de fe
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - el Cristo
  rationale: La confesión de Marta identifica a Jesús con el ungido esperado; «Mesías» comunica mejor el peso judío y real-redentor del título que una transliteración de uso eclesiástico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός → Messiah (where title; Christ where name-like)'
- issue: Valor de κύριε en el discurso de Marta
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - señor
  rationale: La escena no es mera cortesía; la confesión posterior confirma que el tratamiento tiene fuerza reverencial y cristológica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — κύριος → Lord'
- issue: Aspecto del perfecto πεπίστευκα
  english_pob_reading: I have believed
  chosen_spanish_reading: yo he creído
  alternative_spanish_readings:
  - yo creo
  - he llegado a creer
  rationale: Se preserva la idea de una fe ya asentada con continuidad presente, sin diluirla en un presente genérico.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy — original-language primacy; preserve source meaning'
translation_notes:
  revision_awareness: 'El borrador sigue el texto griego SBLGNT y el audit trail inglés sin cambios sustantivos respecto de la última revisión: se mantiene la decisión de traducir Χριστός como «Mesías», κύριε como «Señor» y el participio articular como una relativa natural en español.'
  spanish_consistency_notes:
  - Se conserva «Mesías» como título y no como nombre propio litúrgico.
  - Se mantiene la diferencia entre «Señor» y «señor» con mayúscula reverencial en la confesión.
  - «Yo he creído» preserva el perfecto griego sin convertirlo en una simple presente de opinión.
  - La frase final evita calco excesivo y sigue siendo fiel a la estructura participial del original.
