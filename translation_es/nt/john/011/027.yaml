    rationale: La nota inglesa ofrece «who is coming into the world» como alternativa más explícita con relativa. La nota española propone «el que está viniendo al mundo», que cambia el matiz y suena menos natural. Conviene reflejar la opción relativa explícita más fiel, por ejemplo «que viene al mundo».
  - severity: low
    issue: Pequeño desliz gramatical en la justificación léxica interna
    rationale: En las decisiones léxicas aparece «manteniendo mayúsculas reverenciales en un confesión de identidad»; debería ser «una confesión». No afecta el texto bíblico, pero muestra un detalle menor de calidad editorial.
  revised_spanish_text: 'Le dijo a él: «Sí, Señor; yo he creído que tú eres el Mesías[a], el Hijo de Dios, el que viene al mundo[b]».'
