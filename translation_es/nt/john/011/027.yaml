base_translation:
  language: en
  yaml_path: translation/nt/john/011/027.yaml
  text: She said to him[a], “Yes, Lord; I have believed that you are the Messiah, the Son of God[b], the one coming into the world.”
  footnotes:
  - marker: a
    text: Or “the Christ.” The Greek title is Χριστός (Christos), rendered here as “Messiah” to preserve its meaning as a title.
    reason: alternative_reading
  - marker: b
    text: Or “who is coming into the world.” The Greek participial expression can be rendered more explicitly with a relative clause.
    reason: lexical_alternative
