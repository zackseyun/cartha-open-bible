    issue: Falta el complemento indirecto explícito de αὐτῷ
    rationale: El griego dice «λέγει αὐτῷ» y la POB inglesa lo conserva como «She said to him». «Le dijo» en español puede ser aceptable por concordancia pronominal, pero aquí deja implícito el referente en una revisión que busca preservar el contenido fuente de manera explícita. «Le dijo a él» o simplemente «Le dijo»; sin embargo, dado el encargo de auditoría, conviene completar «a él».
  - severity: low
