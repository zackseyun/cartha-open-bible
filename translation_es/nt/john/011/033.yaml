  text: Ἰησοῦς οὖν ὡς εἶδεν αὐτὴν κλαίουσαν καὶ τοὺς συνελθόντας αὐτῇ Ἰουδαίους κλαίοντας ἐνεβριμήσατο τῷ πνεύματι καὶ ἐτάραξεν ἑαυτόν,
base_translation:
  language: en
  yaml_path: translation/nt/john/011/033.yaml
  text: Therefore[a], when Jesus saw her weeping, and the Jews who had come with her weeping[b], he was deeply moved in his spirit and troubled himself.
  footnotes:
