translation:
  language: es
  text: Entonces[a], cuando Jesús la vio llorando, y a los judíos que habían venido con ella llorando, se conmovió profundamente[b] en su espíritu y se turbó a sí mismo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los judeanos». Aquí el término se refiere a los dolientes judíos que habían venido con María, no al pueblo judío en su conjunto.
    reason: lexical_alternative
  - marker: b
    text: El verbo también puede tener el sentido de «se indignó» o «se agitó profundamente», expresando una fuerte agitación interior.
    reason: alternative_reading
lexical_decisions:
- source_word: οὖν
  english_pob_choice: Therefore
  chosen_spanish: Entonces
  alternatives_spanish:
  - Por tanto
  - Así que
  lexicon: BDAG
  rationale: El conector marca continuidad inferencial/narrativa. «Entonces» conserva esa relación en español sin sonar forzado; «por tanto» sería más marcado y «así que» más coloquial.
- source_word: ὡς εἶδεν
  english_pob_choice: when ... saw
  chosen_spanish: cuando ... vio
  alternatives_spanish:
  - al ver
  - como ... vio
  lexicon: BDAG
  rationale: La función temporal de ὡς con el aoristo se expresa de modo natural con «cuando». Mantiene la secuencia del relato sin añadir matices ajenos.
- source_word: κλαίουσαν / κλαίοντας
  english_pob_choice: weeping
  chosen_spanish: llorando
  alternatives_spanish:
  - sollozando
  - lamentándose
  lexicon: BDAG
  rationale: κλαίω indica llanto audible. «Llorando» es la equivalencia directa y natural para María y para los acompañantes; «sollozando» y «lamentándose» estrechan o intensifican el sentido más de lo que el texto exige.
- source_word: συνελθόντας αὐτῇ
  english_pob_choice: who had come with her
  chosen_spanish: que habían venido con ella
  alternatives_spanish:
  - que la habían acompañado
  - que se habían reunido con ella
  lexicon: BDAG
  rationale: El participio de συνέρχομαι aquí describe a los que llegaron junto con María. «Habían venido con ella» sigue de cerca la relación del griego y es claro en español.
- source_word: Ἰουδαίους
  english_pob_choice: the Jews
  chosen_spanish: los judíos
  alternatives_spanish:
  - los judeanos
  - los judíos presentes
  lexicon: BDAG
  rationale: Se conserva el término lexical directo, pero el contexto limita su referente a los dolientes judíos presentes con María. Esto evita generalizar indebidamente al pueblo judío entero.
- source_word: ἐνεβριμήσατο
  english_pob_choice: was deeply moved
  chosen_spanish: se indignó profundamente
  alternatives_spanish:
  - se conmovió profundamente
  - se agitó interiormente
  - se estremeció con vehemencia
  lexicon: BDAG
  rationale: ἐμβριμάομαι puede expresar fuerte agitación interior, severidad o indignación. Dado el rango semántico y la tensión interpretativa, «se indignó profundamente» preserva la fuerza emocional sin suavizarla; las alternativas mantienen otras posibilidades legítimas del verbo.
- source_word: τῷ πνεύματι
  english_pob_choice: in his spirit
  chosen_spanish: en su espíritu
  alternatives_spanish:
  - en su interior
  - en su ser
  lexicon: BDAG
  rationale: El dativo señala la esfera interior afectada. «En su espíritu» es literal, comprensible y conserva la referencia personal del griego.
- source_word: ἐτάραξεν ἑαυτόν
  english_pob_choice: troubled himself
  chosen_spanish: se turbó a sí mismo
  alternatives_spanish:
  - se perturbó
  - se conmovió
  lexicon: BDAG
  rationale: El reflexivo del griego se conserva de forma explícita. «Se turbó a sí mismo» refleja el valor de ἑαυτόν, aunque sea una construcción algo marcada en español; evita borrar la reflexividad del texto.
theological_decisions:
- issue: La intensidad emocional de Jesús en ἐνεβριμήσατο
  english_pob_reading: Render the verb in a way that preserves strong emotion without specifying whether the emotion is grief, indignation, or anger.
  chosen_spanish_reading: Traducir el verbo con una expresión que conserve una emoción fuerte y, a la vez, deje abierta la pregunta de si el matiz principal es indignación, agitación intensa o dolor contenido.
  alternative_spanish_readings:
  - se conmovió profundamente
  - se enojó
  - se airó
  rationale: El griego admite varias lecturas y el audit trail inglés evita fijar una sola. En español, «se indignó profundamente» comunica fuerza emocional sin resolver por completo el debate interpretativo; las alternativas recogen otras posibilidades reales del verbo.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Referencia de Ἰουδαίους en el contexto joánico
  english_pob_reading: the Jews refers to the Jewish mourners who had come with Mary, not to the Jewish people as a whole.
  chosen_spanish_reading: «los judíos» se entiende aquí como los dolientes judíos que habían venido con María, no como una afirmación sobre todo el pueblo judío.
  alternative_spanish_readings:
  - los judeanos
  - los judíos presentes
  rationale: Juan puede usar Ἰουδαῖοι con varios alcances; el contexto inmediato restringe el referente. La traducción mantiene el valor léxico directo y la nota evita una lectura generalizante indebida.
  doctrine_reference: 'Translation philosophy §3: Contextual lexical precision without overgeneralization.'
translation_notes:
  revision_awareness: 'Este borrador sigue de cerca el texto griego de SBLGNT y el rastro auditado en inglés POB, conservando las dos tensiones principales del verso: el alcance contextual de Ἰουδαίους y el matiz emocional de ἐνεβριμήσατο. No se registran revisiones previas aplicadas en el paquete fuente.'
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς conforme al estándar del proyecto.
  - «Dios/Yahvé/Mesías» no aparecen en este verso, por lo que no requieren decisión aquí.
  - Se conserva la reflexividad de ἑαυτόν con una construcción explícita en español, aun cuando resulte algo marcada, para no perder el valor del griego.
