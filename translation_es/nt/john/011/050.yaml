translation:
  language: es
  text: Ni siquiera consideran que les conviene que un solo hombre muera por el pueblo[a], y no que toda la nación perezca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en favor del pueblo»; la frase también puede llevar el sentido de «en lugar del pueblo».
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐδὲ
  english_pob_choice: Nor
  chosen_spanish: ¿Ni siquiera
  alternatives_spanish:
  - Tampoco
  - Y no
  lexicon: BDAG
  rationale: La fuerza aquí es de continuación negativa y reprensión; «ni siquiera» transmite bien el tono de reproche enlazado con la frase anterior, sin sonar forzado en español.
- source_word: λογίζεσθε
  english_pob_choice: do you consider
  chosen_spanish: consideran
  alternatives_spanish:
  - razonan
  - toman en cuenta
  - piensan
  lexicon: BDAG
  rationale: El verbo implica calcular/considerar deliberadamente. «Consideran» conserva la idea de evaluación mental con naturalidad en español actual.
- source_word: συμφέρει
  english_pob_choice: it is better
  chosen_spanish: les conviene
  alternatives_spanish:
  - es mejor para ustedes
  - les resulta provechoso
  - les es útil
  lexicon: BDAG
  rationale: El griego expresa conveniencia práctica o ventaja. «Les conviene» mantiene ese matiz pragmático y el beneficio interesado del contexto, sin introducir una valoración moral ajena.
- source_word: ὑμῖν
  english_pob_choice: for you
  chosen_spanish: les
  alternatives_spanish:
  - para ustedes
  - a ustedes
  - en su provecho
  lexicon: BDAG
  rationale: La dativa de ventaja queda bien reflejada con el clítico «les» en la construcción «les conviene», que conserva la referencia al interés de los oyentes.
- source_word: εἷς ἄνθρωπος
  english_pob_choice: one man
  chosen_spanish: un solo hombre
  alternatives_spanish:
  - un hombre
  - una sola persona
  lexicon: BDAG
  rationale: «Un solo hombre» preserva la singularidad enfática del griego y mantiene el género masculino del sustantivo ἄνθρωπος, como en el texto fuente.
- source_word: ἀποθάνῃ
  english_pob_choice: die
  chosen_spanish: muera
  alternatives_spanish:
  - deba morir
  - perezca
  lexicon: BDAG
  rationale: El aoristo subjuntivo en la cláusula con ἵνα puede expresarse de forma natural con «muera» en español. No se sobreespecifica modalidad que el griego no obliga a fijar aquí.
- source_word: ὑπὲρ τοῦ λαοῦ
  english_pob_choice: for the people
  chosen_spanish: por el pueblo
  alternatives_spanish:
  - en favor del pueblo
  - a favor del pueblo
  - en lugar del pueblo
  lexicon: BDAG
  rationale: «Por el pueblo» mantiene la amplitud de ὑπέρ sin resolver de antemano si el sentido es beneficio, representación o sustitución. En Juan 11:50–51 esa tensión debe quedar abierta en el texto principal.
- source_word: λαοῦ
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - el pueblo de Israel
  lexicon: BDAG
  rationale: Aquí λαός designa al pueblo como cuerpo nacional/covenantal. «El pueblo» es la opción más directa y reverente en español bíblico contemporáneo.
- source_word: ὅλον τὸ ἔθνος
  english_pob_choice: the whole nation
  chosen_spanish: toda la nación
  alternatives_spanish:
  - la nación entera
  - todo el pueblo
  lexicon: BDAG
  rationale: ἔθνος aquí apunta al conjunto nacional como unidad histórica y política. «Toda la nación» conserva esa totalidad con fluidez natural.
- source_word: ἀπόληται
  english_pob_choice: perish
  chosen_spanish: perezca
  alternatives_spanish:
  - sea destruida
  - se pierda
  lexicon: BDAG
  rationale: «Perezca» reproduce con concisión la idea de ruina o destrucción final del verbo ἀπόλλυμι, sin precisar el modo de esa pérdida.
theological_decisions:
- issue: Alcance de ὑπέρ en una afirmación dicha por Caifás
  english_pob_reading: Rendered broadly as 'for the people' in the main text
  chosen_spanish_reading: Renderizado de manera amplia como «por el pueblo»
  alternative_spanish_readings:
  - en favor del pueblo
  - en lugar del pueblo
  rationale: El hablante está formulando una lógica política de conveniencia; el evangelista luego resignifica sus palabras (Jn 11:51). La redacción amplia preserva tanto el sentido inmediato como la posible resonancia sacrificial o sustitutiva, sin imponer una sola lectura en el texto principal.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en vez de resolverla'
translation_notes:
  revision_awareness: 'Se mantiene la lectura de alta concordancia: no se requieren cambios respecto del último pase revisado; la formulación española solo ajusta la naturalidad sintáctica mientras conserva la tensión lexical y teológica documentada en el audit trail.'
  spanish_consistency_notes:
  - Se conserva Yahvé para el nombre divino cuando corresponda en este proyecto, aunque este versículo no lo contiene.
  - 'Se mantiene «pueblo» y «nación» como dos referentes distintos: λαός para el cuerpo del pueblo y ἔθνος para la unidad nacional.'
  - Se evita «Cristo» porque el versículo no contiene Χριστός ni una referencia titulativa directa.
  - Se preserva la ambigüedad de ὑπέρ con una nota, en lugar de fijar anticipadamente un sentido sustitutivo exclusivo.
