translation:
  language: es
  text: 'Los discípulos le dijeron[a]: «Rabí, hace apenas un momento los judíos buscaban apedrearte, ¿y vuelves a ir allí?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “los judeanos” o, según el contexto, “los dirigentes judíos”. En Juan, “los judíos” a menudo se usa para los opositores de Jesús en Judea, no para el pueblo judío en su conjunto.
    reason: alternative_reading
lexical_decisions:
- source_word: λέγουσιν
  english_pob_choice: said
  chosen_spanish: dijeron
  alternatives_spanish:
  - dicen
  lexicon: BDAG
  rationale: El presente histórico griego se naturaliza en español como pretérito simple en narrativa contemporánea, sin perder la continuidad del relato.
- source_word: Ῥαββί
  english_pob_choice: Rabbi
  chosen_spanish: Rabí
  alternatives_spanish:
  - Rabbi
  - Maestro
  lexicon: BDAG
  rationale: Se conserva el título semítico transliterado para mantener el tono joánico y la forma de dirección de los discípulos; en español, «Rabí» es la forma asentada y clara.
- source_word: νῦν
  english_pob_choice: just now
  chosen_spanish: hace apenas un momento
  alternatives_spanish:
  - ahora
  - recién
  - hace poco
  lexicon: BDAG
  rationale: Aquí el adverbio señala la inmediatez reciente de la amenaza, no solo el presente; «hace apenas un momento» comunica mejor esa cercanía temporal.
- source_word: ἐζήτουν
  english_pob_choice: were seeking
  chosen_spanish: buscaban
  alternatives_spanish:
  - trataban de
  - intentaban
  - andaban buscando
  lexicon: BDAG
  rationale: El imperfecto expresa una acción en curso o tentativa en pasado; «buscaban» conserva esa imperfectividad de forma natural en español.
- source_word: λιθάσαι
  english_pob_choice: to stone
  chosen_spanish: apedrearte
  alternatives_spanish:
  - arrojarte piedras
  - lapidarte
  lexicon: BDAG
  rationale: El verbo denota la acción de apedrear; en español «apedrear» transmite con claridad el acto sin añadir explícitamente «hasta la muerte», que no está dicho en el griego.
- source_word: οἱ Ἰουδαῖοι
  english_pob_choice: the Jews
  chosen_spanish: los judíos
  alternatives_spanish:
  - los judeanos
  - los dirigentes judíos
  lexicon: BDAG
  rationale: La equivalencia léxica directa de Ἰουδαῖοι es «judíos». Aunque en Juan a veces el término puede referirse con más estrechez a opositores judeanos o autoridades, este verso no lo especifica, por lo que el texto principal conserva la forma directa y abierta.
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: vuelves
  alternatives_spanish:
  - otra vez
  lexicon: BDAG
  rationale: El matiz repetitivo queda reforzado por la estructura interrogativa con «vuelves», y se mantiene explícitamente en la idea de repetición del movimiento; «otra vez» podría añadirse, pero no es necesario para la fuerza del griego.
- source_word: ὑπάγεις
  english_pob_choice: are you going
  chosen_spanish: ir
  alternatives_spanish:
  - marcharte
  - irte
  - dirigirte
  lexicon: BDAG
  rationale: 'En español la idea se expresa mejor con el verbo de movimiento dentro de la pregunta: «¿y vuelves a ir allí?». Así se conserva el destino implícito y el tono de incredulidad.'
- source_word: ἐκεῖ
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - a ese lugar
  lexicon: BDAG
  rationale: El adverbio locativo se refiere al lugar ya mencionado; «allí» es la opción más natural y sobria en español.
theological_decisions:
- issue: Alcance de οἱ Ἰουδαῖοι en Juan
  english_pob_reading: the Jews
  chosen_spanish_reading: los judíos
  alternative_spanish_readings:
  - los judeanos
  - los dirigentes judíos
  rationale: Se mantiene la lectura léxica directa sin resolver interpretivamente el referente. La nota preserva la posibilidad contextual de un uso más restringido en Juan, evitando imponer una glosa que el verso no exige.
  doctrine_reference: Principio de primacía del idioma fuente y preservación de la tensión interpretativa; no neutralizar el término más allá de la evidencia textual.
translation_notes:
  revision_awareness: 'El texto griego y el audit trail inglés muestran alta concordancia, sin revisiones aplicadas en la última pasada. La versión española sigue esa estabilidad: conserva el presente histórico como pasado narrativo, mantiene «Rabí» como título semítico, y deja sin resolver en el cuerpo principal la posible restricción contextual de οἱ Ἰουδαῖοι, trasladada a nota.'
  spanish_consistency_notes:
  - Se mantiene «Rabí» con acento español estándar para el título semítico, no «Rabbi» inglés.
  - Se usa «los judíos» en el texto principal por fidelidad léxica, con nota que preserva alternativas contextuales.
  - «Apedrearte» comunica el acto de λιθάζω sin añadir precisión no explícita como «hasta la muerte».
  - «Hace apenas un momento» recoge mejor νῦν en este contexto que un simple «ahora».
  - La pregunta final conserva la sorpresa/incredulidad del griego mediante «¿y vuelves a ir allí?».
