  source_alignment_summary: 'El borrador español refleja fielmente el griego y el rastro de auditoría inglés: «Los discípulos le dijeron» naturaliza correctamente el presente histórico λέγουσιν; «Rabí» preserva Ῥαββί; «hace apenas un momento» comunica bien la fuerza reciente de νῦν; «buscaban apedrearte» mantiene el imperfecto ἐζήτουν y el infinitivo λιθάσαι sin añadir «matarte»; y «¿y vuelves a ir allí?» transmite adecuadamente καὶ πάλιν ὑπάγεις ἐκεῖ con sentido de repetición y asombro.'
  spanish_quality_summary: El español es natural, claro y digno. La sintaxis fluye bien y evita calcos rígidos. La puntuación con comillas angulares y la colocación de la nota son correctas. «Hace apenas un momento» es algo más expansivo que «justo ahora», pero idiomáticamente muy bueno para este contexto.
  glossary_alignment: 'Se alinea con la terminología del proyecto: no hay términos especiales en conflicto. La decisión de mantener «los judíos» en el texto principal con nota alternativa sobre «los judeanos» / «los dirigentes judíos» sigue exactamente la justificación léxica y teológica documentada en el POB inglés.'
  issues:
