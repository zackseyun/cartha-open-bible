  text: ⸀καὶ νῦν οἶδα ὅτι ὅσα ἂν αἰτήσῃ τὸν θεὸν δώσει σοι ὁ θεός.
base_translation:
  language: en
  yaml_path: translation/nt/john/011/022.yaml
  text: But even now I know that whatever you ask of God[b][a], God will give you.
  footnotes:
  - marker: a
    text: Or, 'And now I know.' The Greek conjunction can be rendered simply 'and,' but in context it also carries a contrastive turn after Martha's statement about Lazarus's death.
    reason: lexical_alternative
  - marker: b
    text: Greek, 'whatever you ask God.' English often expresses this idiom as 'ask from God.'
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
