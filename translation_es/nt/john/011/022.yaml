    changes_summary: Changed 'ask from God' to 'ask of God' for more natural formal English while preserving the Greek sense; otherwise retained the draft.
translation:
  language: es
  text: Pero aun ahora sé que todo lo que le pidas a Dios, Dios te lo dará.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: καὶ νῦν
  english_pob_choice: But even now
  chosen_spanish: Pero aun ahora
  alternatives_spanish:
  - Y ahora
  - Y aun ahora
  - Pero ahora
  lexicon: BDAG
  rationale: καί con νῦν funciona aquí como enlace discursivo con matiz de contraste después de la declaración de Marta sobre la muerte de Lázaro. «Pero aun ahora» conserva ese giro concesivo/contrastivo sin perder el valor temporal de νῦν.
- source_word: οἶδα
  english_pob_choice: I know
  chosen_spanish: sé
  alternatives_spanish:
  - he sabido
  - estoy seguro
  lexicon: BDAG
  rationale: οἶδα expresa conocimiento con sentido presente; en español «sé» es la forma más directa y transparente. «Estoy seguro» introduce una intensificación interpretativa no exigida por el griego.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - —
  lexicon: BDAG
  rationale: Introduce la oración de contenido de manera normal en español.
- source_word: ὅσα ἂν
  english_pob_choice: whatever
  chosen_spanish: todo lo que
  alternatives_spanish:
  - lo que sea que
  - cualquiera que
  lexicon: BDAG
  rationale: La construcción relativa indefinida con ἄν expresa amplitud e indefinición. «Todo lo que» preserva bien el alcance abierto y suena natural en español bíblico contemporáneo.
- source_word: αἰτήσῃ τὸν θεόν
  english_pob_choice: whatever you ask of God
  chosen_spanish: pidas de Dios
  alternatives_spanish:
  - pidas a Dios
  - le pidas a Dios
  - solicites de Dios
  lexicon: BDAG
  rationale: Aunque en griego θεόν es el objeto directo de αἰτέω, el español idiomático expresa esta idea con «pedir de Dios» o «pedir a Dios». Se eligió «de Dios» para seguir de cerca la solución auditada del inglés POB y conservar el matiz de procedencia/objeto implícito sin añadir elementos ajenos al texto.
- source_word: δώσει σοι ὁ θεός
  english_pob_choice: God will give you
  chosen_spanish: Dios te lo dará
  alternatives_spanish:
  - Dios te dará
  - Dios te dará eso
  lexicon: BDAG
  rationale: δίδωμι se traduce con el verbo simple «dar». Se añadió «lo» para reflejar el objeto implícito de la petición en una forma natural en español y evitar una oración demasiado desnuda; el sujeto explícito ὁ θεός se vierte con «Dios».
- source_word: θεός / ὁ θεός
  english_pob_choice: God ... God
  chosen_spanish: Dios ... Dios
  alternatives_spanish:
  - el Dios ... Dios
  - el Padre ... Dios
  lexicon: BDAG
  rationale: Ambas apariciones son θεός. En español, «Dios» sin artículo es la forma estándar y evita una expansión teológica no requerida por el texto.
theological_decisions:
- issue: La declaración de Marta podría leerse como subordinación de Jesús, ya que habla de pedir a Dios y de que Dios le dará a Jesús.
  english_pob_reading: 'Retain the plain wording of Martha''s confession without doctrinal expansion: ''whatever you ask of God, God will give you.'''
  chosen_spanish_reading: 'Mantener la formulación llana de Marta sin expansión doctrinal: «todo lo que pidas de Dios, Dios te lo dará».'
  alternative_spanish_readings:
  - Parafrasear para suavizar una posible subordinación
  - Explicitar «el Padre» en lugar de «Dios»
  rationale: El versículo reporta el habla de Marta y debe traducirse como tal. La tensión narrativa joánica entre Jesús y Dios no debe borrarse ni suavizarse artificialmente; tampoco conviene introducir «el Padre» sin respaldo explícito del texto griego.
  doctrine_reference: 'Affirmations; Translation philosophy #3'
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente al mantener la equivalencia natural de «ask of God» sin calcar la sintaxis del griego. En español, la decisión equivalente fue usar «pedir de Dios», que es idiomática, mantiene el sentido del objeto implícito y no altera la tensión narrativa del pasaje.
  spanish_consistency_notes:
  - Se mantuvo «Dios» en ambas ocurrencias de θεός, sin sustituir por «SEÑOR» ni por «el Padre».
  - Se prefirió «pidas de Dios» para reflejar la relación implícita de petición, en paralelo funcional con la solución auditada del inglés POB.
  - No se añadieron notas textuales porque no hay variante sustantiva en el paquete fuente provisto.
