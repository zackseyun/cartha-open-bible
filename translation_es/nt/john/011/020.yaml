translation:
  language: es
  text: Así que, cuando Marta oyó que Jesús venía[a], salió a su encuentro; pero María estaba sentada en la casa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Jesús viene». El griego usa un verbo en presente en la cláusula reportada, que puede verterse de manera más formal como un presente vívido.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - Entonces
  - Por tanto
  lexicon: BDAG
  rationale: El conector expresa continuidad narrativa e inferencia suave; «Así que» conserva ese enlace de manera natural en español sin volverlo excesivamente formal.
- source_word: ὡς
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - tan pronto como
  - al
  lexicon: BDAG
  rationale: La cláusula es temporal. «Cuando» reproduce con claridad la relación de tiempo sin intensificar indebidamente la inmediatez.
- source_word: ἤκουσεν
  english_pob_choice: heard
  chosen_spanish: oyó
  alternatives_spanish:
  - escuchó
  - se enteró
  lexicon: BDAG
  rationale: El aoristo de ἀκούω aquí se traduce de forma directa como «oyó». «Se enteró» introduce una inferencia contextual que el griego no exige.
- source_word: ἔρχεται
  english_pob_choice: was coming
  chosen_spanish: venía
  alternatives_spanish:
  - viene
  - estaba llegando
  lexicon: BDAG
  rationale: El presente en el discurso reportado da vividez a la acción en curso. En español narrativo, «venía» mantiene ese valor progresivo de manera natural.
- source_word: ὑπήντησεν
  english_pob_choice: went to meet
  chosen_spanish: salió a su encuentro
  alternatives_spanish:
  - fue a encontrarlo
  - fue a recibirlo
  lexicon: BDAG
  rationale: ὑπαντάω implica ir al encuentro de alguien. «Salió a su encuentro» conserva el matiz direccional mejor que un simple «lo encontró».
- source_word: δὲ
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - y
  - ahora
  lexicon: BDAG
  rationale: Aquí δέ marca contraste leve con la acción de Marta. «Pero» expresa esa oposición moderada de forma natural en español.
- source_word: ἐν τῷ οἴκῳ
  english_pob_choice: in the house
  chosen_spanish: en la casa
  alternatives_spanish:
  - en el hogar
  - adentro
  lexicon: BDAG
  rationale: La frase es concreta y simple. «En la casa» sigue de cerca el sustantivo οἶκος y resulta transparente para el lector.
- source_word: ἐκαθέζετο
  english_pob_choice: was sitting
  chosen_spanish: estaba sentada
  alternatives_spanish:
  - se hallaba sentada
  - permanecía sentada
  lexicon: BDAG
  rationale: El imperfecto expresa una अवस्था/acción en curso en el pasado. «Estaba sentada» preserva esa continuidad sin añadir más contraste del que el texto griego presenta.
- source_word: Μάρθα / Μαρία / Ἰησοῦς
  english_pob_choice: Martha / Mary / Jesus
  chosen_spanish: Marta / María / Jesús
  alternatives_spanish:
  - Martha / María / Jesús
  lexicon: Convención de nombres propios bíblicos en español
  rationale: Se usan las formas españolas estándar de los nombres propios para claridad y recepción eclesial amplia.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el contexto auditado en inglés: mantiene el valor narrativo de οὖν, el presente vívido de ἔρχεται y el matiz direccional de ὑπήντησεν, sin introducir información adicional. No se documentaron revisiones previas relevantes en el paquete fuente.'
  spanish_consistency_notes:
  - Se preserva el contraste suave entre Marta y María con «pero».
  - Se mantiene un estilo bíblico moderno y digno, evitando arcaísmos innecesarios.
  - La nota de pie recoge la alternativa de presente vívido porque el griego presenta ἔρχεται en tiempo presente en discurso indirecto.
