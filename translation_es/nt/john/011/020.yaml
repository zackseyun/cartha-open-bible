  source_alignment_summary: 'El borrador español refleja fielmente el griego: οὖν como conector narrativo («Así que»), ὡς + aoristo como cláusula temporal («cuando Marta oyó»), ἔρχεται con sentido de presente vívido en discurso reportado («venía» con nota alternativa «viene»), ὑπήντησεν con matiz direccional («salió a su encuentro»), y el contraste δὲ correctamente marcado con «pero». «Estaba sentada en la casa» preserva bien el imperfecto ἐκαθέζετο y la frase ἐν τῷ οἴκῳ.'
