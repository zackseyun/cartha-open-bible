review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia del griego: καὶ ταῦτα εἰπὼν = «después de decir estas cosas», φωνῇ μεγάλῃ ἐκραύγασεν = un clamor en voz fuerte, y el vocativo «Lázaro». El punto principal a corregir es δεῦρο ἔξω: «ven fuera» suena poco natural en español moderno y no expresa tan claramente la salida desde dentro hacia afuera como «sal fuera» o, mejor aún, simplemente «sal». Dado que el rastro inglés eligió «come out» por claridad moderna y conservó «come forth» como alternativa tradicional, en español conviene usar una forma igualmente natural y mantener la opción más tradicional en nota.'
  spanish_quality_summary: El texto es en general claro y digno, pero «ven fuera» resulta forzado y poco idiomático para lectores hispanohablantes; además la nota actual invierte la relación entre lectura principal y alternativa, porque «sal fuera» es más natural que «ven fuera». «Con voz fuerte» es comprensible, aunque «a gran voz» o «con voz fuerte» ambas funcionan; no requiere cambio obligatorio. La revisión propuesta mejora la naturalidad sin alejarse del griego.
  glossary_alignment: 'No hay términos del glosario mayor en disputa aquí. El nombre «Lázaro» está bien. La decisión clave es estilística/lexical: δεῦρο ἔξω debe representarse en español con un mandato natural de salida. La alternativa tradicional documentada en inglés («come forth») puede preservarse como «ven fuera» o mejor «ven afuera», pero no como lectura principal.'
  issues:
  - severity: medium
    issue: «Ven fuera» como lectura principal para δεῦρο ἔξω
    rationale: Aunque formalmente posible, en español moderno suena poco natural en un mandato de salir de una tumba. «Sal» o «sal fuera» transmite mejor el sentido exhortativo y la dirección espacial del griego.
  - severity: medium
    issue: La nota lexical alternativa no refleja bien la relación principal/tradicional
    rationale: El inglés tiene principal moderna «come out» y alternativa más tradicional «come forth». En español, «sal fuera» es más natural/moderna que «ven fuera»; por tanto no debe quedar relegada como la opción tradicional mientras la menos idiomática queda en el texto principal.
  revised_spanish_text: 'Y después de decir estas cosas, gritó con voz fuerte: «¡Lázaro, sal fuera![a]»'
  revised_footnotes:
  - marker: a
    text: O, de manera más tradicional, «¡Lázaro, ven fuera!»
    reason: lexical_alternative
  revision_rationale: Se cambia «ven fuera» por «sal fuera» para una lectura principal más natural y clara en español, manteniendo en nota la alternativa más tradicional y más cercana a una formulación litúrgica conocida. No se requieren otros cambios.
