  to: 'Y después de decir estas cosas, gritó con voz fuerte: «¡Lázaro, sal fuera![a]»'
  rationale: Se cambia «ven fuera» por «sal fuera» para una lectura principal más natural y clara en español, manteniendo en nota la alternativa más tradicional y más cercana a una formulación litúrgica conocida. No se requieren otros cambios.
