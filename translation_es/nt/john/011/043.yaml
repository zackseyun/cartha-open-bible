translation:
  language: es
  text: 'Y después de decir estas cosas, gritó con voz fuerte: «¡Lázaro, sal fuera![a]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de manera más tradicional, «¡Lázaro, ven fuera!»
    reason: lexical_alternative
lexical_decisions:
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  - estas palabras
  lexicon: BDAG
  rationale: El demostrativo plural neutro pide un plural en español para conservar la referencia a lo dicho previamente. «Estas cosas» sigue de cerca el valor de ταῦτα sin forzar una formulación más interpretativa.
- source_word: εἰπὼν
  english_pob_choice: after saying
  chosen_spanish: después de decir
  alternatives_spanish:
  - habiendo dicho
  - cuando hubo dicho
  lexicon: BDAG
  rationale: El participio aoristo anterior al verbo principal se expresa naturalmente en español con una secuencia temporal. «Después de decir» conserva la anterioridad sin sonar rígido.
- source_word: φωνῇ μεγάλῃ
  english_pob_choice: with a loud voice
  chosen_spanish: con voz fuerte
  alternatives_spanish:
  - en voz alta
  - con una gran voz
  lexicon: BDAG
  rationale: La dative de modo se traduce de forma idiomática en español. «Con voz fuerte» mantiene el énfasis en la intensidad vocal y evita el calco «voz grande», poco natural.
- source_word: ἐκραύγασεν
  english_pob_choice: he cried out
  chosen_spanish: gritó
  alternatives_spanish:
  - clamó
  - dio un grito
  lexicon: BDAG
  rationale: κραυγάζω implica un grito fuerte. «Gritó» es la forma más directa y natural en español; la fuerza ya queda reforzada por «con voz fuerte».
- source_word: Λάζαρε
  english_pob_choice: Lazarus
  chosen_spanish: Lázaro
  lexicon: BDAG
  rationale: Nombre propio transliterado según la convención española estándar.
- source_word: δεῦρο ἔξω
  english_pob_choice: come out
  chosen_spanish: ven fuera
  alternatives_spanish:
  - sal fuera
  - ven afuera
  - ven acá y sal
  lexicon: BDAG
  rationale: El conjunto imperatival combina llamado y salida. «Ven fuera» reproduce la fuerza exhortativa de δεῦρο ἔξω sin recurrir a la forma arcaica «ven forth»/«ven fuera» en sentido litúrgico fijado; además respeta la dirección espacial del griego.
theological_decisions:
- issue: Evitar una fórmula arcaica tradicional que no añade contenido semántico al mandato
  english_pob_reading: come out
  chosen_spanish_reading: ven fuera
  alternative_spanish_readings:
  - sal fuera
  - ven afuera
  rationale: El pasaje no contiene un término doctrinalmente disputado; la decisión principal es estilística y semántica. «Ven fuera» preserva el mandato breve y enérgico del original sin introducir arcaísmo.
  doctrine_reference: Translation philosophy §6 (Readable modern language, not archaic formula)
translation_notes:
  revision_awareness: Se corrigió la ausencia del marcador de nota al insertar [a] en el texto principal junto a la frase afectada. La redacción del mandato se mantuvo moderna y fiel al doble valor imperativo de δεῦρο ἔξω.
  spanish_consistency_notes:
  - Se mantuvo el nombre propio «Lázaro» según la convención española.
  - Se tradujo el contraste temporal del participio aoristo con una secuencia natural en español.
  - La intensidad vocal se distribuye entre «con voz fuerte» y «gritó» para reflejar la redundancia enfática del griego.
  - Se evitó «Cristo/Mesías» porque el versículo no contiene esa referencia.
