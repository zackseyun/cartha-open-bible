translation:
  language: es
  text: Si lo dejamos seguir así[a], todos creerán en él, y vendrán los romanos y nos quitarán tanto nuestro lugar como nuestra nación[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘nuestro templo’; el griego dice ‘nuestro lugar’, que puede referirse específicamente al templo o más ampliamente a su lugar o posición.
    reason: alternative_reading
  - marker: b
    text: O ‘nuestro pueblo’ para ‘nuestra nación’.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν ἀφῶμεν αὐτὸν οὕτως
  english_pob_choice: If we let him go on like this
  chosen_spanish: Si lo dejamos seguir así
  alternatives_spanish:
  - Si lo dejamos así
  - Si lo dejamos continuar así
  lexicon: BDAG
  rationale: 'ἀφῶμεν, de ἀφίημι, tiene aquí sentido permisivo: ‘dejar/permitir’. Seguir así comunica en español la continuidad implícita en οὕτως sin forzar una paráfrasis excesiva. ‘Dejarlo así’ puede sonar menos claramente progresivo; ‘continuar así’ es válido pero algo más explicativo.'
- source_word: πάντες
  english_pob_choice: everyone
  chosen_spanish: todos
  alternatives_spanish:
  - todos ellos
  - todo el mundo
  lexicon: BDAG
  rationale: En español, ‘todos’ comunica bien el alcance general e inclusivo de πάντες en este contexto. ‘Todo el mundo’ sería más idiomático en algunos registros, pero ‘todos’ conserva mejor la sobriedad del texto.
- source_word: πιστεύσουσιν εἰς αὐτόν
  english_pob_choice: will believe in him
  chosen_spanish: creerán en él
  alternatives_spanish:
  - pondrán fe en él
  - confiarán en él
  lexicon: BDAG
  rationale: La construcción πιστεύω εἰς + acusativo expresa la idea de creer en alguien. ‘Creerán en él’ es la forma más natural y fiel en español; ‘confiarán en él’ introduce un matiz distinto, y ‘pondrán fe en él’ suena más técnico.
- source_word: ἐλεύσονται οἱ Ῥωμαῖοι
  english_pob_choice: the Romans will come
  chosen_spanish: vendrán los romanos
  alternatives_spanish:
  - los romanos vendrán
  - llegarán los romanos
  lexicon: BDAG
  rationale: El futuro de ἔρχομαι se expresa de manera directa con ‘vendrán’. El orden ‘vendrán los romanos’ es claro y natural en español, manteniendo el sujeto explícito.
- source_word: ἀροῦσιν
  english_pob_choice: take away
  chosen_spanish: quitarán
  alternatives_spanish:
  - tomarán
  - llevarán
  lexicon: BDAG
  rationale: αἴρω aquí significa quitar/tomar fuera. ‘Quitarán’ es una equivalencia natural y compacta en español; ‘llevarán’ puede sonar más físico y menos preciso, y ‘tomarán’ sería ambiguo.
- source_word: τὸν τόπον
  english_pob_choice: our place
  chosen_spanish: nuestro lugar
  alternatives_spanish:
  - nuestro sitio
  - nuestro templo
  lexicon: BDAG
  rationale: τόπος significa literalmente ‘lugar’. Se conserva la ambigüedad del griego con ‘nuestro lugar’, sin resolverla en el texto principal a favor de ‘templo’ o de una interpretación institucional.
- source_word: τὸ ἔθνος
  english_pob_choice: our nation
  chosen_spanish: nuestra nación
  alternatives_spanish:
  - nuestro pueblo
  - la nación
  lexicon: BDAG
  rationale: ἔθνος se traduce aquí como ‘nación’, como en la lectura inglesa auditada. En español, ‘nación’ conserva el peso político del temor expresado; ‘pueblo’ es una alternativa válida y se reserva para nota.
theological_decisions:
- issue: Alcance de τὸν τόπον (‘our place’)
  english_pob_reading: Kept as 'place' without specifying 'temple' in the main text
  chosen_spanish_reading: Se mantiene ‘nuestro lugar’ sin especificar ‘templo’ en el texto principal
  alternative_spanish_readings:
  - nuestro templo
  - nuestro puesto/posición
  rationale: El griego τόπος es más amplio que ‘templo’. Aunque el contexto puede apuntar al templo o a la posición institucional de los hablantes, la traducción principal conserva la ambigüedad con ‘lugar’, siguiendo la política de no resolver en traducción una tensión léxica que el original no cierra.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Alcance de τὸ ἔθνος (‘our nation’)
  english_pob_reading: Or 'our people' for 'our nation.'
  chosen_spanish_reading: ‘nación’ en el texto principal; ‘pueblo’ como alternativa de nota
  alternative_spanish_readings:
  - nuestro pueblo
  - la gente
  rationale: ἔθνος puede significar ‘nación’ o ‘pueblo’. ‘Nación’ mantiene la referencia político-colectiva del temor ante Roma, mientras que ‘pueblo’ se preserva como alternativa lexicalmente posible porque el referente es el pueblo judío.
  doctrine_reference: BDAG; preservación de la ambigüedad léxica
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia con el audit trail inglés y no requiere revisiones sustantivas. Se mantuvo la ambigüedad de τόπος en ‘lugar’ y la de ἔθνος en ‘nación’, con notas alternativas para ‘templo’ y ‘pueblo’, respectivamente. La sintaxis española sigue de cerca la estructura causal y coordinada del griego sin calco pesado.
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ solo cuando corresponda; este versículo no contiene el nombre divino.
  - Se prefirió ‘creer en él’ por la construcción johánica πιστεύω εἰς + acusativo.
  - ‘Romanos’ se mantiene como etnónimo colectivo directo, en paralelo con el texto fuente.
  - La puntuación conserva la cadencia condicional, la cláusula resultativa y la coordinación final.
