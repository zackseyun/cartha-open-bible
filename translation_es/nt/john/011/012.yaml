base_translation:
  language: en
  yaml_path: translation/nt/john/011/012.yaml
  text: So the disciples said to him[a], “Lord, if he has fallen asleep[b], he will recover.”
  footnotes:
  - marker: a
    text: Or, more literally, 'if he has gone to sleep.' Jesus had spoken of Lazarus's death figuratively as sleep, but the disciples understood him to mean ordinary sleep.
    reason: lexical_alternative
  - marker: b
    text: 'The Greek verb can also be rendered ''he will be saved,'' but here it refers to recovery from illness: ''he will recover'' or ''he will get well.'''
    reason: lexical_alternative
