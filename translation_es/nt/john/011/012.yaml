translation:
  language: es
  text: 'Entonces los discípulos le dijeron[a]: «Señor, si se ha dormido, se recuperará[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «si se ha ido a dormir». Jesús había hablado de la muerte de Lázaro en sentido figurado como sueño, pero los discípulos lo entendieron como sueño ordinario.
    reason: lexical_alternative
  - marker: b
    text: 'El verbo griego también puede traducirse «será salvo», pero aquí se refiere a la recuperación de una enfermedad: «se recuperará» o «se pondrá bien».'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Entonces
  alternatives_spanish:
  - Así que
  - Por tanto
  lexicon: BDAG
  rationale: Marca la inferencia narrativa a partir de lo dicho antes. «Entonces» conserva la relación lógica de manera natural en español sin añadir un tono demasiado formal.
- source_word: οἱ μαθηταὶ
  english_pob_choice: the disciples
  chosen_spanish: los discípulos
  alternatives_spanish:
  - sus discípulos
  - los aprendices
  lexicon: BDAG
  rationale: El griego usa el artículo y el referente ya está claro por el contexto. «Los discípulos» reproduce bien el sustantivo sin añadir posesivo que no está explícito.
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - a Jesús
  lexicon: BDAG
  rationale: El pronombre remite a Jesús, pero el griego usa pronombre dativo. En español, «le» comunica la referencia de forma natural y cercana al original.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Señor mío
  - Maestro
  lexicon: BDAG
  rationale: En este contexto, κύριος como vocativo dirigido a Jesús se vierte por «Señor», que conserva el valor respetuoso y la resonancia cristológica que el POB inglés preserva con «Lord».
- source_word: εἰ
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - en caso de que
  lexicon: BDAG
  rationale: Introduce una condición directa. «Si» es la equivalencia natural y clara en español.
- source_word: κεκοίμηται
  english_pob_choice: has fallen asleep
  chosen_spanish: ha caído dormido
  alternatives_spanish:
  - está dormido
  - se ha dormido
  - ha ido a dormir
  lexicon: BDAG
  rationale: El verbo puede funcionar como eufemismo de muerte, pero aquí los discípulos lo entienden literalmente. «Ha caído dormido» refleja el sentido ordinario de sueño y mantiene la tensión interpretativa para el contexto siguiente.
- source_word: σωθήσεται
  english_pob_choice: he will recover
  chosen_spanish: se recuperará
  alternatives_spanish:
  - será salvo
  - se sanará
  - se pondrá bien
  lexicon: BDAG
  rationale: Aunque σῴζω puede significar «salvar», aquí el contexto es de enfermedad y recuperación. «Se recuperará» expresa la idea de restablecimiento sin importar una lectura soteriológica ajena al pasaje.
theological_decisions:
- issue: Renderización de κύριος en vocativo dirigido a Jesús
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Señor mío
  - Maestro
  - Señor Jesús
  rationale: La decisión del POB inglés preserva «Lord» como tratamiento reverente y con posible resonancia cristológica. En español, «Señor» es la equivalencia más fiel y eclesialmente inteligible.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Posible doble sentido de κεκοίμηται como sueño literal o muerte figurada
  english_pob_reading: Translate as ordinary sleep language in the main text
  chosen_spanish_reading: Traducir como sueño literal en el texto principal
  alternative_spanish_readings:
  - ha sido puesto a descansar
  - ha muerto
  rationale: La POB inglesa opta por reflejar la comprensión equivocada de los discípulos. «Ha caído dormido» mantiene esa lectura literal en español y deja que el contexto posterior revele el sentido figurado de Jesús.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
- issue: Valor de σωθήσεται en contexto de enfermedad
  english_pob_reading: he will recover
  chosen_spanish_reading: se recuperará
  alternative_spanish_readings:
  - será salvo
  - sanará
  - se pondrá bien
  rationale: La tensión está entre la acepción general de «salvar» y la recuperación física contextual. En español, «se recuperará» evita una carga doctrinal no presente en la comprensión de los discípulos.
  doctrine_reference: BDAG σῴζω; context of illness/recovery
translation_notes:
  revision_awareness: Se revisó el pasaje contra el texto griego SBLGNT y el audit trail en inglés. No se requirieron cambios respecto al último pase revisado; la formulación española sigue de cerca la lógica narrativa, conserva la tensión sueño/muerte y mantiene la acepción contextual de σῴζω como recuperación.
  spanish_consistency_notes:
  - Se usa «Señor» para κύριος en vocativo dirigido a Jesús, conforme al criterio POB y al uso cristiano español.
  - «Los discípulos» evita añadir posesivo no explícito en el griego.
  - «Se recuperará» preserva el sentido contextual de σῴζω sin introducir terminología soteriológica innecesaria.
  - La nota sobre κεκοίμηται conserva la alternativa literal y explica la comprensión errónea de los discípulos, como en el audit trail inglés.
