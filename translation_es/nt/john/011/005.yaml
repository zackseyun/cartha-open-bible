translation:
  language: es
  text: Y Jesús amaba a Marta, a su hermana y a Lázaro.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἠγάπα
  english_pob_choice: loved
  chosen_spanish: amaba
  alternatives_spanish:
  - amó
  - estaba amando
  - tenía amor por
  lexicon: BDAG
  rationale: El imperfecto griego ἠγάπα expresa una acción o estado continuo en el pasado. En español, «amaba» comunica mejor esa disposición sostenida que un pretérito puntual como «amó». Mantiene la fuerza del verbo ἀγαπάω con un registro natural y digno.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y
  - Pero
  lexicon: BDAG
  rationale: δέ funciona aquí como conector discursivo suave. «Ahora» reproduce en español la transición narrativa sin imponer contraste fuerte.
- source_word: Μάρθαν
  english_pob_choice: Martha
  chosen_spanish: Marta
  alternatives_spanish:
  - Martha
  lexicon: BDAG
  rationale: Se usa la forma habitual en español para el nombre propio, «Marta», conforme a la convención de transliteración adaptada en español bíblico.
- source_word: τὴν ἀδελφὴν αὐτῆς
  english_pob_choice: her sister
  chosen_spanish: su hermana
  alternatives_spanish:
  - la hermana de ella
  lexicon: BDAG
  rationale: El griego usa un posesivo de tercera persona que en español se expresa con naturalidad como «su hermana». En contexto, el referente es claro y no hace falta sobreespecificar.
- source_word: Λάζαρον
  english_pob_choice: Lazarus
  chosen_spanish: Lázaro
  alternatives_spanish:
  - Lazaro
  lexicon: BDAG
  rationale: Se conserva la forma española estándar del nombre propio, «Lázaro».
theological_decisions:
- issue: Alcance del amor de Jesús expresado por el imperfecto ἠγάπα
  english_pob_reading: A simple statement of Jesus' continuing love for Martha, her sister, and Lazarus
  chosen_spanish_reading: Una afirmación simple del amor continuo de Jesús por Marta, su hermana y Lázaro
  alternative_spanish_readings:
  - Jesús llegó a amar a Marta, su hermana y Lázaro
  - Jesús estaba amando a Marta, su hermana y Lázaro
  rationale: El texto no agrega matices emocionales o doctrinales adicionales; solo declara el amor de Jesús en forma durativa o continua en pasado. «Amaba» preserva esa lectura sin exagerarla ni volverla puntual.
  doctrine_reference: Translation philosophy §§3, 6
translation_notes:
  revision_awareness: El texto base inglés y la evaluación de revisión indican alta concordancia y ausencia de cambios necesarios; por ello, la versión española sigue de cerca el valor aspectual del imperfecto y la estructura coordinada del original sin notas textuales adicionales.
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς y nombres propios en forma española usual.
  - No se introduce «Cristo» ni una glosa teológica ajena al versículo.
  - La coordinación con comas refleja la lista griega de tres objetos unidos por καί.
  - El registro es sobrio y publicable, con español natural y sin calco excesivo.
