translation:
  language: es
  text: Y estaba enfermo[a] cierto hombre, Lázaro, de Betania, del pueblo de María y de Marta, su hermana.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Había alguien enfermo, Lázaro de Betania, del pueblo de María y de Marta, su hermana».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἦν δέ
  english_pob_choice: Now ... was
  chosen_spanish: Había
  alternatives_spanish:
  - Y había
  - Ahora había
  lexicon: BDAG
  rationale: El griego Ἦν δέ introduce la escena con un enlace narrativo suave. En español, «Había» naturaliza ese arranque sin añadir un contraste fuerte que δέ no exige. Se evita forzar un «ahora» innecesario en la línea principal.
- source_word: τις
  english_pob_choice: a certain man
  chosen_spanish: cierto hombre
  alternatives_spanish:
  - alguien
  - un cierto hombre
  lexicon: BDAG
  rationale: τις señala a una persona indefinida pero concreta. «Cierto hombre» conserva esa especificidad narrativa mejor que «alguien». Se añade «hombre» porque el referente es Lázaro, varón identificado por nombre.
- source_word: ἀσθενῶν
  english_pob_choice: was sick
  chosen_spanish: enfermo
  alternatives_spanish:
  - estaba enfermo
  - débil
  lexicon: BDAG
  rationale: El participio presente ἀσθενῶν expresa aquí una condición de enfermedad. En español, el adjetivo predicativo «enfermo» resulta más natural dentro de la construcción «Había cierto hombre enfermo», sin perder el valor léxico de padecer enfermedad.
- source_word: Λάζαρος
  english_pob_choice: Lazarus
  chosen_spanish: Lázaro
  alternatives_spanish:
  - Lazarus
  lexicon: BDAG
  rationale: Nombre propio transliterado al español estándar como «Lázaro».
- source_word: ἀπὸ Βηθανίας
  english_pob_choice: from Bethany
  chosen_spanish: de Betania
  alternatives_spanish:
  - desde Betania
  lexicon: BDAG
  rationale: ἀπό expresa origen o procedencia. En español, «de Betania» es una equivalencia natural y directa; «desde Betania» enfatizaría más el punto de partida que el vínculo de procedencia.
- source_word: ἐκ τῆς κώμης
  english_pob_choice: from the village
  chosen_spanish: del pueblo
  alternatives_spanish:
  - de la aldea
  - de la villa
  lexicon: BDAG
  rationale: κώμη designa un poblado pequeño, no una ciudad. En español, «pueblo» comunica bien esa realidad de forma natural y ampliamente entendible; «aldea» puede sonar más rústico o regional, y «villa» puede resultar más ambiguo.
- source_word: Μαρίας καὶ Μάρθας
  english_pob_choice: of Mary and her sister Martha
  chosen_spanish: de María y de Marta, su hermana
  alternatives_spanish:
  - de María y Marta, su hermana
  - de María y de Marta, la hermana de ella
  lexicon: BDAG
  rationale: Los genitivos dependen de «pueblo», identificando Betania como el poblado asociado con María y Marta. En español conviene explicitar la relación fraterna para mantener la referencia clara y evitar una construcción demasiado concentrada.
- source_word: τῆς ἀδελφῆς αὐτῆς
  english_pob_choice: her sister
  chosen_spanish: su hermana
  alternatives_spanish:
  - la hermana de ella
  - la hermana suya
  lexicon: BDAG
  rationale: La frase funciona como aposición explicativa de Marta respecto de María. «Su hermana» es idiomático y mantiene la referencia relacional sin sobrecargar la sintaxis.
translation_notes:
  revision_awareness: Se sigue el sentido y la ambigüedad controlada del texto griego, con especial atención a la escena introductoria, al valor indefinido de τις y a la relación genitiva entre María, Marta y el pueblo de Betania. No se detectaron revisiones textuales relevantes en el expediente inglés; el pasaje se mantiene con alta concordancia entre fuente y auditoría.
  spanish_consistency_notes:
  - Se usa «Lázaro» para el nombre propio conforme al español bíblico estándar.
  - Se evita «SEÑOR» u otras sustituciones no pertinentes porque el versículo no contiene referencias al nombre divino ni a Χριστός.
  - «Pueblo» se usa como equivalente de κώμη por naturalidad y por corresponder a un asentamiento pequeño; no se emplea «ciudad».
  - La nota de pie de página conserva una alternativa real del audit trail inglés y marca la ambigüedad de τις sin introducir una paráfrasis libre.
