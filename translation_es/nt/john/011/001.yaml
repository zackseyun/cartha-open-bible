  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: introduce a Lázaro como un individuo específico que estaba enfermo y lo identifica como procedente de Betania, el pueblo de María y de su hermana Marta. También conserva la alternativa textual/estilística documentada en la nota inglesa. Sin embargo, «Había cierto hombre enfermo» suena menos natural y menos preciso que una formulación verbal en español que exprese el estado de enfermedad, y la ausencia de un equivalente para δέ en la línea principal debilita levemente la transición narrativa que el inglés POB conservó con «Now».'
  spanish_quality_summary: El español es claro y comprensible, pero «Había cierto hombre enfermo» resulta algo rígido y menos idiomático en contexto narrativo bíblico moderno. «Estaba enfermo cierto hombre» o mejor «Y estaba enfermo cierto hombre» / «Había un hombre enfermo» serían más naturales; dado que τις apunta a un individuo específico, conviene mantener «cierto hombre». Además, «del pueblo» es aceptable, pero «de la aldea» o «del pueblo» ambos funcionan; aquí no requiere cambio. La puntuación con comas alrededor de «Lázaro» es correcta.
  glossary_alignment: 'No hay términos teológicos sensibles en este versículo. Los nombres propios están bien en español: «Lázaro», «Betania», «María», «Marta». La decisión sobre κώμη como «pueblo» es defendible. La nota alternativa debe mantenerse, pero ajustada al texto revisado.'
  issues:
  - severity: medium
    issue: «Había cierto hombre enfermo» es poco idiomático para ἀσθενῶν en español narrativo.
    rationale: El griego expresa una condición de enfermedad. En español natural, un verbo de estado («estaba enfermo») comunica mejor esa idea que una construcción existencial con adjetivo pospuesto.
  - severity: low
    issue: La línea principal omite por completo el matiz conectivo de δέ.
    rationale: Aunque δέ es leve, el inglés POB lo reflejó con «Now». En español, un «Y» narrativo al inicio puede preservar mejor la transición sin sonar forzado.
  - severity: low
    issue: La nota alternativa debe corresponder exactamente al texto revisado.
    rationale: Si se cambia la formulación principal, la alternativa también debe actualizarse para mantener coherencia editorial y audit trail.
