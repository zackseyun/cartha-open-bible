translation:
  language: es
  text: Desde aquel día en adelante, planearon matarlo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀπ’ ἐκείνης οὖν τῆς ἡμέρας
  english_pob_choice: from that day on / So
  chosen_spanish: Así que, desde aquel día en adelante
  alternatives_spanish:
  - Desde aquel día
  - Entonces, desde aquel día
  - Desde aquel día en adelante
  lexicon: BDAG
  rationale: La expresión temporal marca un punto de inicio con continuidad posterior. «Desde aquel día en adelante» conserva ese valor aspectual de inicio persistente; «Así que» reproduce la conexión inferencial de οὖν de forma natural en español.
- source_word: ἐβουλεύσαντο
  english_pob_choice: they planned
  chosen_spanish: resolvieron
  alternatives_spanish:
  - planearon
  - tomaron la decisión
  - conspiraron
  lexicon: BDAG
  rationale: βουλεύομαι indica deliberación que culmina en una determinación. «Resolvieron» expresa con naturalidad el resultado de esa deliberación sin debilitar el carácter decidido del contexto; «planearon» también es posible, pero puede sonar menos enfático en español que el paso a una resolución concreta.
- source_word: ἵνα ἀποκτείνωσιν
  english_pob_choice: to kill
  chosen_spanish: matarlo
  alternatives_spanish:
  - darle muerte
  - ponerlo a muerte
  - para matarlo
  lexicon: BDAG
  rationale: ἵνα + subjuntivo expresa propósito; en español, el infinitivo subordinado «matarlo» es la forma más natural tras «resolvieron». Se mantiene el sentido directo de ἀποκτείνω sin añadir matices judiciales que el texto no explicita.
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  - a Jesús
  - le
  lexicon: BDAG
  rationale: El pronombre retoma a Jesús por el contexto inmediato. En español, el clítico «lo» evita repetir el nombre y conserva la referencia pronominal simple del griego.
theological_decisions:
- issue: Gravedad de la intención contra Jesús
  english_pob_reading: Render the statement as a settled plan to kill Jesus, without softening it into mere discussion.
  chosen_spanish_reading: Presentar el enunciado como una resolución firme de matarlo, no como simple conversación o discusión.
  alternative_spanish_readings:
  - discutieron matarlo
  - consideraron darle muerte
  - decidieron eliminarlo
  rationale: El griego no describe solo debate, sino una determinación tomada después de la deliberación previa. «Resolvieron matarlo» preserva la seriedad conspirativa sin introducir un registro más interpretativo como «conspiraron» o un eufemismo como «eliminarlo».
  doctrine_reference: 'Principio de traducción: conservar el sentido llano y la gravedad narrativa del texto sin añadir interpretación externa.'
translation_notes:
  revision_awareness: El texto griego y el contexto de la Perícopa muestran un cierre narrativo contundente tras la reunión del consejo; la versión española mantiene ese giro inferencial y el valor de decisión firme. No se registran revisiones textuales ni alternativas sustanciales en el audit trail en esta unidad.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto cuando aparezca el nombre divino, aunque no aplica en este versículo.
  - Se usa un español moderno y sobrio, evitando calcos innecesarios como «tomaron consejo» o «propusieron», que suavizarían la fuerza de ἐβουλεύσαντο.
  - No se añade el nombre «Jesús» en el texto principal porque el pronombre griego es suficiente y el referente es inequívoco por contexto.
