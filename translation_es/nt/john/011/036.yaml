- from: 'Así que los judíos[a] decían: «Miren cómo lo amaba»'
  to: 'Entonces los judíos[a] decían: «Vean cómo lo amaba»'
  rationale: 'La revisión es menor: se cambia «Así que» por «Entonces» para reflejar mejor el valor narrativo de οὖν en español natural, y «Miren» por «Vean» para un tono algo más digno y menos coloquial, manteniendo el mismo sentido. Se conserva la nota sobre «los judeanos» porque sigue fielmente la justificación del POB en inglés.'
