translation:
  language: es
  text: 'Entonces los judíos[a] decían: «Vean cómo lo amaba»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los judeanos», si se entiende como una referencia más específica, de tipo regional, a los observadores judíos presentes allí.
    reason: alternative_reading
lexical_decisions:
- source_word: ἔλεγον
  english_pob_choice: were saying
  chosen_spanish: decían
  alternatives_spanish:
  - estaban diciendo
  - seguían diciendo
  lexicon: BDAG
  rationale: El imperfecto griego expresa una acción en curso o repetida; en español, «decían» transmite esa continuidad de forma natural sin sobrecargar el texto.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - Por tanto
  - Entonces
  lexicon: BDAG
  rationale: La partícula marca continuidad inferencial o narrativa. «Así que» suena natural en español y conserva el enlace con el contexto inmediato.
- source_word: οἱ Ἰουδαῖοι
  english_pob_choice: the Jews
  chosen_spanish: los judíos
  alternatives_spanish:
  - los judeanos
  - los judíos presentes
  lexicon: BDAG
  rationale: La forma griega dice literalmente «los judíos». Se conserva esa redacción por transparencia, manteniendo la posibilidad contextual de que se trate de los observadores judíos presentes.
- source_word: Ἴδε
  english_pob_choice: See
  chosen_spanish: Miren
  alternatives_spanish:
  - Vean
  - Ve
  lexicon: BDAG
  rationale: Es un imperativo de atención dirigido a varios oyentes. En español, «Miren» comunica con naturalidad el llamado a fijarse en lo que sigue.
- source_word: πῶς
  english_pob_choice: how
  chosen_spanish: cómo
  alternatives_spanish:
  - de qué manera
  - cuánto
  lexicon: BDAG
  rationale: «Cómo» reproduce la apertura de manera o grado sin especificar más de lo que el griego exige.
- source_word: ἐφίλει
  english_pob_choice: loved
  chosen_spanish: lo amaba
  alternatives_spanish:
  - lo quería
  - sentía amor por él
  lexicon: BDAG
  rationale: φιλέω aquí expresa afecto personal. «Lo amaba» es la opción más directa y fuerte en español, y conserva la relación afectiva sin suavizarla a un simple aprecio.
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El pronombre acusativo masculino singular refiere a Lázaro; en español, el objeto directo pronominal «lo» es la forma más natural.
theological_decisions:
- issue: Referencia de οἱ Ἰουδαῖοι en Juan 11:36
  english_pob_reading: the Jews
  chosen_spanish_reading: los judíos
  alternative_spanish_readings:
  - los judeanos
  - los judíos presentes
  rationale: Se mantiene la expresión del texto fuente, sin sustituirla por una paráfrasis interpretativa. En este contexto inmediato alude a los observadores judíos presentes, pero el texto griego conserva la designación general.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no se identificaron cambios necesarios y el acuerdo con la auditoría en inglés fue alto.'
  spanish_consistency_notes:
  - Se mantiene «judíos» para seguir la forma del texto fuente y la decisión auditada en inglés.
  - Se usa «lo amaba» para reflejar el afecto de φιλέω sin debilitarlo.
  - El enlace discursivo «Así que» conserva la continuidad narrativa del οὖν griego.
