translation:
  language: es
  text: 'Jesús le dice: «Tu hermano resucitará[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Tu hermano se levantará». El verbo griego puede traducirse simplemente «se levantará»; en este contexto, «resucitará» hace explícito el sentido de resurrección.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - dijo
  lexicon: BDAG
  rationale: Conserva el presente histórico de Juan de manera natural en español con «dice», sin forzar un pasado narrativo que atenúe la vividez del original.
- source_word: αὐτῇ
  english_pob_choice: to her
  chosen_spanish: le
  alternatives_spanish:
  - a ella
  lexicon: BDAG
  rationale: El dativo indirecto se expresa de forma natural con el clítico «le» después de «dice»; el complemento explícito «a ella» sería correcto pero menos fluido.
- source_word: Ἀναστήσεται
  english_pob_choice: will rise again
  chosen_spanish: resucitará
  alternatives_spanish:
  - se levantará
  - volverá a levantarse
  - resucitará otra vez
  lexicon: BDAG
  rationale: En este contexto de Lázaro, el verbo apunta a la resurrección de entre los muertos. «Resucitará» comunica ese sentido de forma clara y digna en español. Se evita añadir «otra vez» porque el griego no lo exige y podría sonar redundante.
- source_word: ὁ ἀδελφός σου
  english_pob_choice: your brother
  chosen_spanish: tu hermano
  alternatives_spanish:
  - tu hermano de ti
  lexicon: BDAG
  rationale: Es la equivalencia normal y directa del sintagma posesivo; el contexto identifica a Lázaro, y no se requiere ninguna aclaración adicional en el texto.
- source_word: ὁ Ἰησοῦς
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  lexicon: BDAG
  rationale: Nombre propio traducido de manera estándar conforme al estilo del proyecto.
theological_decisions:
- issue: Alcance de Ἀναστήσεται y tensión resurrección/levantarse
  english_pob_reading: will rise again
  chosen_spanish_reading: resucitará
  alternative_spanish_readings:
  - se levantará
  - volverá a levantarse
  rationale: El contexto inmediato trata de la muerte de Lázaro, por lo que la lectura de resurrección está bien fundada. A la vez, la forma verbal griega permite un sentido más general de 'levantarse'; sin embargo, en español una formulación así sería ambigua y menos acorde con el contexto. «Resucitará» preserva el sentido fuerte sin ampliar indebidamente el texto.
  doctrine_reference: Juan 11:23; preservar la tensión contextual sin resolverla más allá del versículo.
translation_notes:
  revision_awareness: El texto inglés auditado permanece estable y sin cambios relevantes; la decisión principal en español es mantener el presente narrativo con «dice» y explicitar el sentido resurreccional de Ἀναστήσεται sin sobretraducción.
  spanish_consistency_notes:
  - Se mantiene «Jesús» como nombre propio y «tu hermano» como posesivo natural en español.
  - La puntuación con comillas españolas y el clítico dativo «le» siguen el registro bíblico moderno y legible.
  - No se introduce «Cristo», «Señor» ni otras terminologías no presentes en el verso original.
