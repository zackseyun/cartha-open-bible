translation:
  language: es
  text: Jesús[a], entonces, de nuevo, profundamente conmovido dentro de sí mismo, llegó al sepulcro. Era una cueva, y había una piedra puesta contra la entrada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «indignado dentro de sí mismo» o «profundamente turbado dentro de sí mismo»; el verbo griego es inusualmente fuerte y puede sugerir más que solo tristeza.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὖν
  english_pob_choice: then
  chosen_spanish: pues
  alternatives_spanish:
  - entonces
  - así que
  lexicon: BDAG
  rationale: La partícula marca continuación narrativa e inferencia suave; «pues» conserva la conexión sin forzar un valor lógico más fuerte que el del contexto inmediato.
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  - nuevamente
  lexicon: BDAG
  rationale: Indica repetición de la respuesta emocional de Jesús. «Otra vez» es natural en español y transmite la repetición de manera directa.
- source_word: ἐμβριμώμενος ἐν ἑαυτῷ
  english_pob_choice: deeply moved within himself
  chosen_spanish: profundamente conmovido dentro de sí mismo
  alternatives_spanish:
  - profundamente turbado dentro de sí mismo
  - indignado dentro de sí mismo
  - muy agitado dentro de sí mismo
  lexicon: BDAG
  rationale: Se conserva la intensidad del participio sin cerrar indebidamente la ambigüedad afectiva del verbo. «Conmovido» es amplio y natural; el adverbio «profundamente» mantiene la fuerza. Otras opciones posibles reflejan matices debatidos, pero el texto español principal no debe resolver la tensión interpretativa.
- source_word: ἔρχεται
  english_pob_choice: came
  chosen_spanish: fue
  alternatives_spanish:
  - vino
  - llegó
  lexicon: BDAG
  rationale: Aunque el griego usa presente histórico, en español narrativo «fue» fluye con naturalidad y mantiene el movimiento hacia el sepulcro.
- source_word: μνημεῖον
  english_pob_choice: tomb
  chosen_spanish: sepulcro
  alternatives_spanish:
  - tumba
  - tumba funeraria
  lexicon: BDAG
  rationale: «Sepulcro» comunica bien el lugar de entierro y encaja con la descripción siguiente de una cueva con piedra en la entrada.
- source_word: σπήλαιον
  english_pob_choice: cave
  chosen_spanish: cueva
  alternatives_spanish:
  - gruta
  lexicon: BDAG
  rationale: Es la equivalencia más clara y directa en español; además armoniza con el contexto funerario del versículo.
- source_word: λίθος ἐπέκειτο ἐπ’ αὐτῷ
  english_pob_choice: a stone was lying against it
  chosen_spanish: una piedra estaba puesta delante de él
  alternatives_spanish:
  - una piedra yacía sobre él
  - una piedra estaba colocada contra él
  - una piedra estaba puesta sobre él
  lexicon: BDAG
  rationale: El griego presenta la piedra como colocada sobre/ante la abertura del sepulcro. En español, «delante de él» transmite de forma natural la función de bloqueo de la entrada sin sugerir una disposición plana o demasiado literalista.
theological_decisions:
- issue: Fuerza emocional de ἐμβριμώμενος aplicada a Jesús
  english_pob_reading: Jesus is portrayed as intensely emotionally stirred, rendered without narrowing the emotion to either sorrow alone or indignation alone in the main text.
  chosen_spanish_reading: Jesús aparece intensamente conmovido, sin precisar en el texto principal si se trata de dolor, indignación o turbación.
  alternative_spanish_readings:
  - Jesús estaba indignado dentro de sí mismo
  - Jesús estaba profundamente turbado dentro de sí mismo
  rationale: La evidencia del verbo permite más de un matiz. La redacción principal preserva esa tensión interpretativa en vez de cerrarla; las alternativas se mantienen disponibles para mostrar el rango semántico documentado.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios; este borrador sigue ese acuerdo alto y mantiene la decisión POB de preservar la fuerza emocional del verbo sin definirla en exceso.
  spanish_consistency_notes:
  - Se mantiene «Jesús» como nombre propio sin sustituciones litúrgicas.
  - «Yahvé» no aparece porque el versículo no contiene el tetragrámaton ni una cita directa del nombre divino.
  - Se evita «Cristo» porque el texto fuente no usa Χριστός aquí.
  - «Sepulcro» y «cueva» conservan el cuadro funerario concreto del pasaje.
  - La nota al pie usa un solo marcador y está anclada exactamente en la palabra que porta la ambigüedad semántica.
