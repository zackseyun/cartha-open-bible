  to: María era la que había ungido al Señor con perfume y había secado sus pies con su cabello[a], cuyo hermano Lázaro estaba enfermo.
  rationale: Se ajusta la sintaxis para reflejar mejor la estructura relativa del griego, se mejora la naturalidad del español eliminando la construcción forzada con coma, y se conserva la decisión léxica principal con una nota más pulida. No se requiere adjudicación especial porque el cambio es claro y de rutina.
