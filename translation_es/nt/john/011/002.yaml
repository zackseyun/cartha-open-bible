translation:
  language: es
  text: María era la que había ungido al Señor con perfume y había secado sus pies con su cabello[a], cuyo hermano Lázaro estaba enfermo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con ungüento» o «con aceite aromático»; el término griego se refiere a un aceite o ungüento perfumado.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦν δὲ
  english_pob_choice: Now it was
  chosen_spanish: Ahora bien, era
  alternatives_spanish:
  - Y era
  - Entonces era
  - Ahora era
  lexicon: BDAG
  rationale: El valor discursivo de δέ se expresa de manera natural con «Ahora bien», y ἦν conserva la identificación introductoria con «era» sin forzar una traducción más pesada.
- source_word: Μαριὰμ
  english_pob_choice: Mary
  chosen_spanish: María
  alternatives_spanish:
  - Miriam
  lexicon: Conventional Spanish biblical proper-name usage
  rationale: El nombre propio se adapta a la forma española estándar «María», clara y reconocible para lectura eclesial.
- source_word: ἡ ἀλείψασα
  english_pob_choice: who had anointed
  chosen_spanish: la que había ungido
  alternatives_spanish:
  - la que ungió
  - la ungidora
  lexicon: BDAG
  rationale: El participio aoristo articular funciona descriptivamente; en español, la relativa «la que había ungido» reproduce bien la identificación retrospectiva del texto. Se eligió «ungido» para preservar el acto ritual/simbólico de ἀλείφω sin diluirlo en un verbo más general.
- source_word: τὸν κύριον
  english_pob_choice: the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - al maestro
  lexicon: BDAG
  rationale: Se mantiene el título cristológico «Señor», equivalente al inglés auditado y más adecuado aquí que «maestro», porque el contexto joánico presenta a Jesús con valor honorífico y teológico.
- source_word: μύρῳ
  english_pob_choice: with perfume
  chosen_spanish: con perfume
  alternatives_spanish:
  - con ungüento
  - con aceite aromático
  lexicon: BDAG
  rationale: μύρον puede abarcar ungüento perfumado o aceite aromático; «perfume» es la solución española más clara y concisa, coherente con el audit trail inglés. Se preserva la posibilidad semántica en nota.
- source_word: ἐκμάξασα
  english_pob_choice: wiped
  chosen_spanish: le había secado
  alternatives_spanish:
  - había limpiado
  - había secado
  lexicon: BDAG
  rationale: En este contexto el complemento natural en español es «los pies» y el acto tiene sentido de secar con el cabello; «le había secado» transmite mejor la función de ἐκμάσσω que un simple «borró/limpió».
- source_word: τοὺς πόδας αὐτοῦ
  english_pob_choice: his feet
  chosen_spanish: los pies
  alternatives_spanish:
  - sus pies
  lexicon: BDAG
  rationale: Se mantiene el objeto directo explícito y se integra con el dativo de persona mediante «le», un giro natural en español.
- source_word: ταῖς θριξὶν αὐτῆς
  english_pob_choice: with her hair
  chosen_spanish: con su cabello
  alternatives_spanish:
  - con su pelo
  - con el cabello de ella
  lexicon: BDAG
  rationale: θρίξ significa cabello/pelo; «cabello» ofrece un registro un poco más digno y natural en español bíblico contemporáneo. Se evita oscurecer el instrumental con una construcción más pesada.
- source_word: ἧς ὁ ἀδελφὸς Λάζαρος
  english_pob_choice: whose brother Lazarus
  chosen_spanish: su hermano Lázaro
  alternatives_spanish:
  - cuyo hermano era Lázaro
  - de la cual su hermano era Lázaro
  lexicon: BDAG
  rationale: El relativo posesivo griego se vierte idiomáticamente con «su hermano Lázaro», manteniendo la referencia a María sin sobrecargar la oración.
- source_word: ἠσθένει
  english_pob_choice: was sick
  chosen_spanish: estaba enfermo
  alternatives_spanish:
  - estaba mal de salud
  - estaba débil
  lexicon: BDAG
  rationale: En este contexto ἀσθενέω se refiere a enfermedad física; «estaba enfermo» es la equivalencia española más directa y natural.
theological_decisions:
- issue: Traducción de κύριος aplicada a Jesús
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el maestro
  rationale: Se conserva el valor cristológico y reverencial del término, en línea con la lectura auditada del POB en inglés y con el uso confesional del pasaje en Juan.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Señor'
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego SBLGNT y coincide sustancialmente con el audit trail inglés; no se registran revisiones aplicadas en la fuente inglesa más allá de la estabilización del equivalente español natural para ἐκμάσσω y θρίξ. Se conserva la relación descriptiva de María, el título cristológico κύριος y la referencia a la enfermedad de Lázaro sin suavizar ninguna tensión lexical.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como terminología por defecto del proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió «Señor» para κύριος por corresponder al uso cristológico del pasaje y al audit trail inglés.
  - «Ungido» y «perfume» preservan el campo semántico de la acción ritual; la nota ofrece las alternativas relevantes.
  - La construcción «le había secado los pies con su cabello» es idiomática en español y conserva el instrumental del griego sin perder claridad.
