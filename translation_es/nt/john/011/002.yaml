review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta casi todo el sentido del griego: María es identificada como la que ungió al Señor con μύρῳ, limpió/secó sus pies con su cabello, y Lázaro estaba enfermo. También mantiene bien κύριος como «Señor». Sin embargo, la cláusula final griega ἧς ὁ ἀδελφὸς Λάζαρος ἠσθένει significa «cuyo hermano Lázaro estaba enfermo», no una nueva oración separada con punto y coma. Además, «la que había ungido» suena algo torpe tras «era María», y «secado» es aceptable pero «enjugado» o «secado» sin pronombre dativo evita una leve reinterpretación.'
  spanish_quality_summary: El español es mayormente claro, pero «Ahora bien, era María, la que…» resulta poco natural por la coma y la construcción identificacional. La puntuación con punto y coma rompe innecesariamente la relación relativa con María. Una formulación más fluida y fiel sería «María era la que… cuyo hermano Lázaro estaba enfermo». «Cabello» y «perfume» son buenas elecciones; conviene conservar la nota léxica.
  glossary_alignment: 'Alinea bien con la terminología del proyecto: «María», «Señor», «perfume», «cabello», «estaba enfermo». No hay conflicto con Yahvé/Mesías/etc. La principal corrección es sintáctica, no terminológica.'
  issues:
  - severity: medium
    issue: La cláusula relativa final fue convertida en oración independiente con punto y coma.
    rationale: 'ἧς introduce una relación posesiva con María: «cuyo hermano Lázaro estaba enfermo». El punto y coma debilita y altera esa dependencia sintáctica del original.'
  - severity: medium
    issue: La construcción «Ahora bien, era María, la que…» suena forzada en español.
    rationale: Aunque refleja ἦν δὲ, en español bíblico natural es mejor «María era la que…» o «Y era María la que…». La coma antes de «la que» es innecesaria y entorpece la lectura.
  - severity: low
    issue: «Le había secado los pies» introduce un dativo que no está explícito en el griego.
    rationale: Es español posible, pero «había secado/enjugado sus pies» o «los pies de él» se ajusta más directamente a τοὺς πόδας αὐτοῦ. No es error grave, pero puede mejorarse.
  revised_spanish_text: María era la que había ungido al Señor con perfume y había secado sus pies con su cabello[a], cuyo hermano Lázaro estaba enfermo.
  revised_footnotes:
  - marker: a
    text: O «con ungüento» o «con aceite aromático»; el término griego se refiere a un aceite o ungüento perfumado.
    reason: lexical_alternative
  revision_rationale: Se ajusta la sintaxis para reflejar mejor la estructura relativa del griego, se mejora la naturalidad del español eliminando la construcción forzada con coma, y se conserva la decisión léxica principal con una nota más pulida. No se requiere adjudicación especial porque el cambio es claro y de rutina.
