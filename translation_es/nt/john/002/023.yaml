translation:
  language: es
  text: Ahora bien, cuando estaba en Jerusalén en la Pascua, durante la fiesta, muchos creyeron en su nombre[a], al ver las señales[b] que hacía.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «creyeron en él». Literalmente, «creyeron en su nombre», una expresión joánica que destaca la confianza dirigida a la identidad revelada de Jesús.
    reason: lexical_alternative
  - marker: b
    text: «Señales» es el término característico de Juan para obras que apuntan más allá de sí mismas a quién es Jesús; algunas traducciones dicen «señales milagrosas».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὡς δὲ
  english_pob_choice: Now when
  chosen_spanish: Ahora bien, cuando
  alternatives_spanish:
  - Y cuando
  - Cuando
  lexicon: BDAG
  rationale: La combinación introduce una nueva escena con continuidad suave; «Ahora bien, cuando» conserva ese arranque narrativo sin volverlo rígido ni demasiado coloquial.
- source_word: ἦν ἐν τοῖς Ἱεροσολύμοις
  english_pob_choice: he was in Jerusalem
  chosen_spanish: estaba en Jerusalén
  alternatives_spanish:
  - era en Jerusalén
  - se hallaba en Jerusalén
  lexicon: BDAG
  rationale: «Estaba en Jerusalén» es la expresión natural en español para una localización narrativa. «Jerusalén» se conserva sin preposición inusual o calco forzado.
- source_word: ἐν τῷ πάσχα
  english_pob_choice: at the Passover
  chosen_spanish: en la Pascua
  alternatives_spanish:
  - en la fiesta de Pascua
  - durante la Pascua
  lexicon: BDAG
  rationale: El término πάσχα designa aquí la festividad de Pascua; «en la Pascua» mantiene la brevedad y la referencia festiva, sin añadir explicaciones no presentes en el griego.
- source_word: ἐν τῇ ἑορτῇ
  english_pob_choice: during the feast
  chosen_spanish: durante la fiesta
  alternatives_spanish:
  - en la fiesta
  - durante la festividad
  lexicon: BDAG
  rationale: Se preserva la idea de marco temporal con una formulación natural en español. «Fiesta» reproduce el valor general de ἑορτή sin imponer una identificación más específica que la del texto.
- source_word: πολλοὶ
  english_pob_choice: many
  chosen_spanish: muchos
  alternatives_spanish:
  - muchas personas
  - una gran cantidad
  lexicon: BDAG
  rationale: «Muchos» corresponde directamente a πολλοὶ y evita añadir sustantivos no expresados.
- source_word: ἐπίστευσαν εἰς τὸ ὄνομα αὐτοῦ
  english_pob_choice: believed in his name
  chosen_spanish: creyeron en su nombre
  alternatives_spanish:
  - creyeron en él
  - pusieron su fe en su nombre
  lexicon: BDAG
  rationale: Se conserva el giro joánico «creer en su nombre», importante para no diluir la formulación del texto. Aunque en español suene menos idiomático que «creer en él», la expresión mantiene la tensión léxica y teológica documentada por el audit trail.
- source_word: θεωροῦντες
  english_pob_choice: as they were seeing
  chosen_spanish: al ver
  alternatives_spanish:
  - mientras veían
  - viendo
  lexicon: BDAG
  rationale: El participio presente indica acción concomitante; «al ver» transmite esa simultaneidad de manera breve y natural en español.
- source_word: τὰ σημεῖα
  english_pob_choice: the signs
  chosen_spanish: las señales
  alternatives_spanish:
  - los signos
  - las señales milagrosas
  lexicon: BDAG
  rationale: «Señales» conserva bien el valor joánico de σημεῖα como actos que apuntan más allá de sí mismos. Se evita ampliar a «milagrosas» porque el griego y el audit trail no lo exigen.
- source_word: ἃ ἐποίει
  english_pob_choice: that he was doing
  chosen_spanish: que hacía
  alternatives_spanish:
  - que estaba haciendo
  - que realizaba
  lexicon: BDAG
  rationale: El imperfecto expresa acción continua en pasado; «hacía» lo comunica con naturalidad y sin sobrecargar la frase.
theological_decisions:
- issue: Alcance de «creyeron en su nombre»
  english_pob_reading: Render straightforwardly as 'many believed in his name' without weakening it in translation, while allowing the following context (v. 24) to qualify the adequacy of that belief.
  chosen_spanish_reading: Traducir de forma directa «muchos creyeron en su nombre» sin rebajar de antemano el alcance de la frase.
  alternative_spanish_readings:
  - muchos tuvieron una fe inicial o superficial en él
  - muchos profesaron creer por causa de las señales
  rationale: El griego afirma literalmente la fe dirigida «en su nombre». La traducción no debe resolver anticipadamente la evaluación narrativa que el contexto inmediato hará en el siguiente versículo; por eso se mantiene la formulación sin suavizarla doctrinalmente.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El pasaje coincide con la última revisión auditada: no se documentaron cambios en la pass más reciente y el resumen de control indicó alta concordancia con solo observaciones menores. Por ello, la redacción española sigue de cerca la solución aprobada en el audit trail inglés, manteniendo el valor joánico de «creer en su nombre» y de «señales».'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto base lo exige; aquí no aparece.
  - Se conserva «creyeron en su nombre» para respetar el giro joánico y su tensión contextual.
  - «Señales» mantiene el término técnico de Juan sin añadir interpretaciones intrusivas.
  - La puntuación y el orden sintáctico buscan ser naturales en español sin perder la estructura temporal del griego.
