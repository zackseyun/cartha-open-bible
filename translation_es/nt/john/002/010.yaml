translation:
  language: es
  text: 'Y le dijo a él: «Toda persona pone primero el buen vino, y cuando se han embriagado[a], el inferior; pero tú has guardado el buen vino hasta ahora».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘cuando están borrachos’ o ‘cuando han bebido de más’. El verbo griego suele significar ‘embriagarse’; algunas traducciones suavizan la expresión para destacar una menor lucidez más que una intoxicación explícita.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ λέγει αὐτῷ
  english_pob_choice: And he said to him
  chosen_spanish: Y le dijo
  alternatives_spanish:
  - Y le dice
  - Entonces le dijo
  lexicon: BDAG
  rationale: El griego usa presente histórico (λέγει), pero en español narrativo natural la forma pasada ‘le dijo’ comunica mejor la secuencia sin perder la fuerza del discurso directo.
- source_word: Πᾶς ἄνθρωπος
  english_pob_choice: Everyone
  chosen_spanish: Toda persona
  alternatives_spanish:
  - Todos
  - Todo hombre
  lexicon: BDAG
  rationale: La construcción singular genérica se expresa de modo natural con ‘toda persona’, manteniendo el valor universal sin restringirlo a varones ni sonar demasiado literal.
- source_word: πρῶτον
  english_pob_choice: first
  chosen_spanish: primero
  alternatives_spanish:
  - en primer lugar
  - antes
  lexicon: BDAG
  rationale: Indica orden secuencial; ‘primero’ es la equivalencia más directa y clara en español.
- source_word: τὸν καλὸν οἶνον
  english_pob_choice: the good wine
  chosen_spanish: el buen vino
  alternatives_spanish:
  - el vino bueno
  - el vino fino
  lexicon: BDAG
  rationale: καλός aquí señala calidad; ‘buen vino’ es la forma idiomática y conserva el contraste con ‘el inferior’.
- source_word: τίθησιν
  english_pob_choice: sets out
  chosen_spanish: pone
  alternatives_spanish:
  - sirve
  - dispone
  lexicon: BDAG
  rationale: τίθημι en este contexto de banquete es ‘poner/colocar’; ‘pone’ sigue de cerca el griego y es natural en español.
- source_word: ὅταν μεθυσθῶσιν
  english_pob_choice: when they have become drunk
  chosen_spanish: cuando se han embriagado
  alternatives_spanish:
  - cuando están borrachos
  - cuando han bebido de más
  lexicon: BDAG
  rationale: μεθύω normalmente significa ‘embriagarse / emborracharse’. Se conserva el sentido fuerte del verbo, aunque en español ‘embriagarse’ evita la aspereza de un calco excesivo.
- source_word: τὸν ἐλάσσω
  english_pob_choice: the inferior
  chosen_spanish: el inferior
  alternatives_spanish:
  - el menor
  - el de peor calidad
  - el más barato
  lexicon: BDAG
  rationale: ἐλάσσων es comparativo (‘menor, inferior’). En contexto de vino, ‘el inferior’ mantiene el contraste cualitativo y deja implícito el sustantivo por el contexto.
- source_word: σὺ τετήρηκας
  english_pob_choice: you have kept
  chosen_spanish: tú has guardado
  alternatives_spanish:
  - tú has reservado
  - tú has conservado
  lexicon: BDAG
  rationale: El perfecto expresa una acción pasada con resultado presente. ‘Has guardado’ conserva el valor de haber retenido el vino hasta este momento.
- source_word: ἕως ἄρτι
  english_pob_choice: until now
  chosen_spanish: hasta ahora
  alternatives_spanish:
  - hasta este momento
  - hasta el presente
  lexicon: BDAG
  rationale: Es el equivalente idiomático y preciso del giro temporal, señalando el punto presente de la narración.
theological_decisions:
- issue: La referencia explícita a la embriaguez en una escena de banquete con vino
  english_pob_reading: Retain the plain sense 'when they have become drunk'
  chosen_spanish_reading: Conservar el sentido explícito ‘cuando se han embriagado’
  alternative_spanish_readings:
  - cuando están borrachos
  - cuando han bebido de más
  rationale: El texto griego dice con claridad que la gente llega a estar embriagada; no conviene suavizarlo por razones morales o devocionales. La traducción reporta la observación social del dicho sin convertirla en aprobación.
  doctrine_reference: Primacía del texto original; preservar tensiones éticas sin resolverlas artificialmente.
translation_notes:
  revision_awareness: La revisión inglesa más reciente prefirió ‘Everyone’ en lugar de ‘Every man’ para reflejar mejor el genérico inclusivo del griego. Por eso el español usa ‘Toda persona’, que preserva ese valor universal sin introducir una lectura masculina restringida. Se mantuvo además el sentido fuerte de μεθυσθῶσιν y la oposición cualitativa entre el buen vino y el inferior.
  spanish_consistency_notes:
  - Se usa ‘vino bueno/buen vino’ para καλός según contexto de calidad, no ‘vino fino’ salvo que el contexto lo requiriera.
  - Se traduce el genérico singular Πᾶς ἄνθρωπος con una forma inclusiva natural en español.
  - Se conserva la referencia explícita a la embriaguez conforme al auditable English POB.
  - No se introduce terminología eclesiástica ajena al pasaje ni se atenúa la observación social del dicho.
