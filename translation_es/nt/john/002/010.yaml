  to: 'Y le dijo a él: «Toda persona pone primero el buen vino, y cuando se han embriagado[a], el inferior; pero tú has guardado el buen vino hasta ahora».'
  rationale: Se añadió ‘a él’ para reflejar explícitamente αὐτῷ de manera natural en español, y se reubicó la nota al verbo ‘se han embriagado’ porque allí pertenece según el contenido de la observación léxica. El resto del texto conserva adecuadamente el sentido y las decisiones del POB.
