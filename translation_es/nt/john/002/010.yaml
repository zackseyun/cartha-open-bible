base_translation:
  language: en
  yaml_path: translation/nt/john/002/010.yaml
  text: And he said to him[a], “Everyone sets out the good wine first, and when they have become drunk, then the inferior[b]. But you have kept the good wine until now.”
  footnotes:
  - marker: a
    text: Or 'when they are drunk' or 'when they have drunk freely.' The Greek verb commonly means 'become drunk'; some translations soften the expression to emphasize reduced discernment rather than explicit intoxication.
    reason: lexical_alternative
  - marker: b
    text: Greek 'Every man' uses a generic singular expression meaning people generally, not males only.
    reason: cultural_note
