review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: presente histórico narrado en pasado, orden de servicio del vino, referencia explícita a la embriaguez, contraste cualitativo con ‘el inferior’, y perfecto ‘has guardado’. Sin embargo, omite en el texto el complemento indirecto explícito de αὐτῷ (‘a él’), y el anclaje de nota está colocado en ‘el inferior[a]’ aunque la nota trata de μεθυσθῶσιν, no de ἐλάσσω.'
  spanish_quality_summary: El español es claro y digno, pero ‘Y le dijo’ suena algo incompleto frente al griego porque no explicita ‘a él’ en un contexto donde sí cabe naturalmente ‘le dijo a él’. ‘Toda persona’ es aceptable, aunque algo más rígido que ‘Todos’. El mayor problema de calidad editorial es la nota mal anclada. También conviene mantener la nota junto a ‘se han embriagado’ para evitar ambigüedad.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. ‘Buen vino’, ‘se han embriagado’ y ‘has guardado’ concuerdan con las decisiones auditadas. No intervienen términos sensibles como Yahvé, Mesías o esclavo.
  issues:
  - severity: medium
    issue: Falta la referencia explícita a ‘a él’ en la narración
    rationale: El griego λέγει αὐτῷ significa ‘le dice a él / le dijo a él’. En español puede omitirse por economía, pero aquí cabe expresarlo naturalmente y preserva mejor el detalle del original y del POB inglés.
  - severity: medium
    issue: La nota [a] está anclada a ‘el inferior’ pero comenta ‘cuando se han embriagado’
    rationale: Las instrucciones requieren que el marcador aparezca en la palabra o frase pertinente. La nota explica el verbo μεθυσθῶσιν, no el adjetivo ἐλάσσω. Debe moverse al segmento sobre embriagarse.
  - severity: low
    issue: ‘Toda persona’ suena algo rígido en español bíblico natural
    rationale: No es incorrecto, pero ‘Todos’ o ‘todo el mundo’ serían más idiomáticos. Aun así, ‘Toda persona’ preserva bien el singular genérico, así que no requiere cambio forzoso si se mantiene la formalidad.
  revised_spanish_text: 'Y le dijo a él: «Toda persona pone primero el buen vino, y cuando se han embriagado[a], el inferior; pero tú has guardado el buen vino hasta ahora».'
  revised_footnotes:
  - marker: a
    text: O ‘cuando están borrachos’ o ‘cuando han bebido de más’. El verbo griego suele significar ‘embriagarse’; algunas traducciones suavizan la expresión para destacar una menor lucidez más que una intoxicación explícita.
    reason: lexical_alternative
