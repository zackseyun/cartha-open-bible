translation:
  language: es
  text: Pero él hablaba del templo de su cuerpo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'santuario de su cuerpo'; la palabra griega aquí es naos, que a menudo se refiere más específicamente al santuario interior que al complejo del templo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκεῖνος
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - ese
  - aquel
  lexicon: BDAG
  rationale: En el contexto, el demostrativo se refiere a Jesús y en español funciona de manera natural como pronombre de tercera persona. 'Ese' o 'aquel' sonarían marcados o enfáticos sin necesidad.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ introduce un contraste suave con el malentendido del versículo anterior. 'Pero' conserva mejor esa oposición en español.
- source_word: ἔλεγεν
  english_pob_choice: was speaking
  chosen_spanish: hablaba
  alternatives_spanish:
  - decía
  - estaba diciendo
  lexicon: BDAG
  rationale: El imperfecto expresa acción en curso o descriptiva. 'Hablaba' conserva bien ese matiz y suena natural en español. 'Decía' puede sonar menos explícito para el comentario explicativo.
- source_word: περὶ
  english_pob_choice: about
  chosen_spanish: acerca de
  alternatives_spanish:
  - sobre
  - con respecto a
  lexicon: BDAG
  rationale: περί con genitivo significa aquí 'acerca de' / 'con respecto a'. 'Acerca de' es claro y mantiene la relación semántica sin sobrecargar el estilo.
- source_word: ναοῦ
  english_pob_choice: temple
  chosen_spanish: templo
  alternatives_spanish:
  - santuario
  lexicon: BDAG
  rationale: ναός designa con más precisión el santuario del templo, no todo el recinto. 'Templo' es la traducción principal más clara; la precisión léxica se conserva en la nota.
- source_word: σώματος
  english_pob_choice: body
  chosen_spanish: cuerpo
  alternatives_spanish:
  - cuerpo físico
  lexicon: BDAG
  rationale: El genitivo 'del cuerpo' se mantiene directamente. 'Cuerpo' es el equivalente normal y preserva la fuerza teológica de la metáfora sin expansionarla.
- source_word: αὐτοῦ
  english_pob_choice: his
  chosen_spanish: su
  alternatives_spanish:
  - de él
  lexicon: BDAG
  rationale: El posesivo identifica el cuerpo como el de Jesús. 'Su' es la forma más natural y fiel en español.
theological_decisions:
- issue: Identificación metafórica del cuerpo de Jesús con el templo
  english_pob_reading: Retain the metaphor directly as 'the temple of his body' without interpretive expansion.
  chosen_spanish_reading: 'Mantener la metáfora directamente: ''el templo de su cuerpo'', sin expansión interpretativa.'
  alternative_spanish_readings:
  - el santuario de su cuerpo
  - su cuerpo como templo
  rationale: El versículo presenta una identificación explicativa que conviene conservar en su forma verbal. 'Templo' traduce el texto principal, mientras la nota preserva la posibilidad más precisa de 'santuario' para ναός. No se introduce paráfrasis doctrinal que diluya la imagen.
  doctrine_reference: Cristología; doctrina de la encarnación; Affi rmations; Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: Coincide con la revisión más reciente sin cambios sustantivos; se mantiene la lectura aprobada y la nota léxica sobre ναός/naos.
  spanish_consistency_notes:
  - Se conserva 'templo' en el texto principal y se reserva 'santuario' para la nota, siguiendo la distinción léxica documentada.
  - '''Pero'' refleja bien el valor adversativo de δέ en este contexto narrativo.'
  - El imperfecto 'hablaba' preserva el aspecto descriptivo del original griego.
