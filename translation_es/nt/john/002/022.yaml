revisions:
- from: Así que, cuando fue levantado de entre los muertos[a], sus discípulos recordaron que había dicho esto[b], y creyeron la Escritura y la palabra[c] que Jesús había dicho.
  to: Por tanto, cuando fue resucitado de entre los muertos[a], sus discípulos recordaron que había dicho esto[b], y creyeron en la Escritura y en la palabra[c] que Jesús había dicho.
  rationale: Se ajusta «Así que» a «Por tanto» para una continuidad narrativa más sobria; se cambia «fue levantado» por «fue resucitado» para preservar la pasiva con mejor español y mayor precisión contextual; y se corrige «creyeron la Escritura y la palabra» a «creyeron en la Escritura y en la palabra», porque el calco sin preposición es poco idiomático en español. Se mantienen las notas léxicas, afinando la nota c para que corresponda mejor al alcance de λόγος en contexto.
