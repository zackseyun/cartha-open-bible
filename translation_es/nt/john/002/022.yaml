translation:
  language: es
  text: Por tanto, cuando fue resucitado de entre los muertos[a], sus discípulos recordaron que había dicho esto[b], y creyeron en la Escritura y en la palabra[c] que Jesús había dicho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «resucitó de entre los muertos». El verbo griego está en voz pasiva («fue resucitado»), y esa forma se conserva en el texto principal.
    reason: lexical_alternative
  - marker: b
    text: O, «que estaba diciendo esto» o «que decía esto». El imperfecto puede sugerir una acción previa continua o repetida, pero aquí se opta por una versión más directa y natural.
    reason: lexical_alternative
  - marker: c
    text: O, «la declaración» para «la palabra que Jesús había dicho». El término griego puede referirse a una palabra dicha, una declaración o un mensaje.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτε οὖν
  english_pob_choice: So when
  chosen_spanish: Así que, cuando
  alternatives_spanish:
  - Cuando, pues
  - Entonces, cuando
  lexicon: BDAG
  rationale: ὅτε introduce la cláusula temporal (“cuando”) y οὖν añade continuidad/inferencia narrativa. “Así que, cuando” conserva ambos valores con naturalidad en español y evita un giro demasiado rígido.
- source_word: ἠγέρθη
  english_pob_choice: he was raised
  chosen_spanish: fue levantado
  alternatives_spanish:
  - resucitó
  - se levantó
  lexicon: BDAG
  rationale: El verbo griego es pasivo; “fue levantado” preserva la voz pasiva de manera más fiel que un intransitivo como “resucitó”. En contexto de resurrección, “levantado” comunica el sentido sin ocultar la forma verbal.
- source_word: ἐκ νεκρῶν
  english_pob_choice: from the dead
  chosen_spanish: de entre los muertos
  alternatives_spanish:
  - de los muertos
  - de entre los muertos
  lexicon: BDAG
  rationale: La expresión griega es una fórmula idiomática de resurrección. “De entre los muertos” refleja con claridad el valor del plural y es idiomático en español bíblico contemporáneo.
- source_word: ἐμνήσθησαν
  english_pob_choice: remembered
  chosen_spanish: recordaron
  alternatives_spanish:
  - se acordaron
  - recordaron
  lexicon: BDAG
  rationale: El aoristo aquí expresa que la idea vino a su memoria. “Recordaron” es natural y mantiene el sentido de rememoración sin añadir matices inexistentes.
- source_word: ὅτι τοῦτο ἔλεγεν
  english_pob_choice: that he had said this
  chosen_spanish: que había dicho esto
  alternatives_spanish:
  - que decía esto
  - que había estado diciendo esto
  lexicon: BDAG
  rationale: El imperfecto ἔλεγεν puede sugerir habla previa en curso, pero la revisión inglesa privilegió una versión más directa y natural. “Había dicho esto” mantiene la referencia retrospectiva sin exagerar la duración o repetición.
- source_word: ἐπίστευσαν
  english_pob_choice: they believed
  chosen_spanish: creyeron
  alternatives_spanish:
  - pusieron fe en
  - confiaron en
  lexicon: BDAG
  rationale: El verbo πιστεύω aquí toma objetos dativos. “Creyeron” es la traducción más directa y menos interpretativa en español, acorde con el uso común para aceptar como verdadero lo que la Escritura y la palabra decían.
- source_word: τῇ γραφῇ
  english_pob_choice: the Scripture
  chosen_spanish: la Escritura
  alternatives_spanish:
  - la escritura
  - las Escrituras
  lexicon: BDAG
  rationale: γραφή en singular se refiere a la Escritura autoritativa. “La Escritura” preserva esa forma singular y su valor técnico en el contexto joánico.
- source_word: τῷ λόγῳ
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el dicho
  - el mensaje
  lexicon: BDAG
  rationale: λόγος aquí apunta a la palabra dicha por Jesús en el contexto inmediato. “La palabra” conserva la conexión léxica y es plenamente natural en español.
- source_word: ὃν εἶπεν ὁ Ἰησοῦς
  english_pob_choice: that Jesus had spoken
  chosen_spanish: que Jesús había dicho
  alternatives_spanish:
  - que Jesús había hablado
  - que Jesús dijo
  lexicon: BDAG
  rationale: La relativa modifica τῷ λόγῳ y remite a la expresión previa de Jesús. “Había dicho” es más directo que “había hablado” y evita una redundancia innecesaria en español.
theological_decisions:
- issue: Mantener la pasiva de la resurrección
  english_pob_reading: he was raised from the dead
  chosen_spanish_reading: fue levantado de entre los muertos
  alternative_spanish_readings:
  - resucitó de entre los muertos
  - se levantó de entre los muertos
  rationale: La forma griega es pasiva, y la traducción conserva esa voz para no borrar el dato gramatical. Esto no niega otros pasajes donde la resurrección se expresa con intransitivo; aquí se sigue la forma del texto.
  doctrine_reference: Afianzamientos; filosofía de traducción §1
- issue: Objeto dativo con πιστεύω
  english_pob_reading: they believed the Scripture and the word
  chosen_spanish_reading: creyeron la Escritura y la palabra
  alternative_spanish_readings:
  - pusieron fe en la Escritura y la palabra
  - confiaron en la Escritura y la palabra
  rationale: El texto describe la respuesta de los discípulos a lo que la Escritura y la palabra de Jesús afirmaban. “Creyeron” es la opción menos cargada interpretativamente y mantiene la tensión teológica de la fe que responde a la revelación.
  doctrine_reference: 'Filosofía de traducción §3; términos en disputa: πίστις'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail en inglés, que prefirió una formulación más directa para el imperfecto ἔλεγεν (“had said this”) en vez de una progresiva más marcada. La versión española refleja esa preferencia con “había dicho esto”, evitando sugerir repetición sostenida no exigida por el contexto.
  spanish_consistency_notes:
  - Se mantiene Yahvé como norma general del proyecto, pero este versículo no contiene el nombre divino explícito.
  - Se conserva “Escritura” en singular para τῇ γραφῇ, en línea con el valor técnico del griego.
  - “Palabra” se deja en forma singular para λόγος, sin ampliarla a “mensaje” en el texto principal, aunque la nota registra la alternativa semántica.
  - No se emplea “Cristo”, pues el versículo usa Ἰησοῦς y no presenta un caso de título mesiánico.
