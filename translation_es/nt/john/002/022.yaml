    issue: «fue levantado» para ἠγέρθη
    rationale: Aunque preserva la pasiva, en español de uso bíblico general «fue levantado de entre los muertos» suena menos natural y menos preciso que «fue resucitado de entre los muertos». La forma revisada sigue siendo pasiva y comunica explícitamente el sentido de resurrección.
  - severity: high
    issue: «creyeron la Escritura y la palabra» es poco natural en español
    rationale: Con «creer» seguido de estos objetos no personales, el español común y eclesial normalmente requiere «en» o una reestructuración. Mantener el calco del inglés aquí sacrifica legibilidad. «Creyeron en la Escritura y en la palabra que Jesús había dicho» preserva el sentido básico sin expansión interpretativa significativa.
  - severity: low
    issue: La nota c está anclada demasiado pronto
    rationale: La alternativa «la declaración» corresponde mejor a toda la expresión «la palabra que Jesús había dicho», no solo al sustantivo desnudo «palabra». Conviene mantener el marcador en «palabra», pero aclarar en la nota que se refiere a esa expresión como en el inglés auditado.
