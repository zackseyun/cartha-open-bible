  text: ὅτε οὖν ἠγέρθη ἐκ νεκρῶν, ἐμνήσθησαν οἱ μαθηταὶ αὐτοῦ ὅτι τοῦτο ἔλεγεν, καὶ ἐπίστευσαν τῇ γραφῇ καὶ τῷ λόγῳ ⸀ὃν εἶπεν ὁ Ἰησοῦς.
base_translation:
  language: en
  yaml_path: translation/nt/john/002/022.yaml
  text: So when he was raised from the dead[a], his disciples remembered that he had said this[c][b], and they believed the Scripture and the word that Jesus had spoken.
  footnotes:
  - marker: a
    text: Or, 'he rose from the dead.' The Greek verb is passive ('was raised'), which is preserved in the main text.
    reason: lexical_alternative
  - marker: b
    text: Or, 'that he was saying this' or 'that he said this.' The imperfect verb may suggest repeated or ongoing prior speech.
    reason: lexical_alternative
  - marker: c
    text: Or, 'the statement' for 'the word.' The Greek term can refer to a spoken word, statement, or message.
    reason: lexical_alternative
