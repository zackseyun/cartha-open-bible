translation:
  language: es
  text: Y encontró en el templo a los que vendían bueyes, ovejas y palomas[a], y a los cambistas sentados allí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego usa ἱερόν, que se refiere al complejo o recinto del templo, no específicamente al santuario interior.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὗρεν
  english_pob_choice: found
  chosen_spanish: encontró
  alternatives_spanish:
  - vio
  - se encontró con
  lexicon: BDAG
  rationale: El aoristo de εὑρίσκω se rinde naturalmente como «encontró», conservando la idea de que Jesús halló a esas personas en ese lugar. «Vio» es posible por el contexto, pero es menos preciso como equivalente léxico directo.
- source_word: ἱερῷ
  english_pob_choice: temple
  chosen_spanish: templo
  alternatives_spanish:
  - patio del templo
  - recintos del templo
  - santuario
  lexicon: BDAG
  rationale: ἱερόν se refiere al complejo o recinto del templo, no al santuario interior. «Templo» es la forma más natural en español; el alcance espacial más amplio queda preservado por el contexto y se aclara en nota.
- source_word: πωλοῦντας
  english_pob_choice: those selling
  chosen_spanish: a los que vendían
  alternatives_spanish:
  - a los que estaban vendiendo
  - a los vendedores
  lexicon: BDAG
  rationale: El participio presente expresa acción en curso. «A los que vendían» mantiene el valor sustantivado y suena natural en español.
- source_word: βόας
  english_pob_choice: oxen
  chosen_spanish: bueyes
  alternatives_spanish:
  - ganado
  - toros
  lexicon: BDAG
  rationale: βοῦς puede abarcar ganado, pero en este contexto sacrificial «bueyes» es claro, preciso y más idiomático en español que «toros».
- source_word: πρόβατα
  english_pob_choice: sheep
  chosen_spanish: ovejas
  alternatives_spanish:
  - ganado menor
  - carneros
  lexicon: BDAG
  rationale: En este contexto πρόβατα se entiende mejor como «ovejas». Es la equivalencia española normal y conserva la referencia sacrificial.
- source_word: περιστερὰς
  english_pob_choice: doves
  chosen_spanish: palomas
  alternatives_spanish:
  - palomas torcaces
  - doves
  lexicon: BDAG
  rationale: περιστερά puede ser «paloma» o «palomilla/dove». «Palomas» es natural en español bíblico y comunica bien la ofrenda animal sin forzar un registro técnico.
- source_word: κερματιστὰς
  english_pob_choice: money changers
  chosen_spanish: cambistas
  alternatives_spanish:
  - cambiadores de dinero
  - cambios de dinero
  lexicon: BDAG
  rationale: κερματιστής designa a quien cambia moneda. «Cambistas» es el equivalente español más exacto, breve y reconocido; evita la perífrasis.
- source_word: καθημένους
  english_pob_choice: sitting there
  chosen_spanish: sentados allí
  alternatives_spanish:
  - sentados
  - allí sentados
  lexicon: BDAG
  rationale: El participio describe su postura estable en el lugar. «Sentados allí» conserva la imagen de presencia asentada sin añadir información no explícita.
theological_decisions:
- issue: Alcance espacial de ἱερόν en relación con el templo de Jerusalén
  english_pob_reading: Rendered as 'temple' in the main text, with the understanding that the Greek denotes the temple precincts/courts rather than the inner sanctuary.
  chosen_spanish_reading: «templo» en el texto principal, entendido como el recinto o complejo del templo, no como el santuario interior.
  alternative_spanish_readings:
  - patios del templo
  - recintos del templo
  - santuario
  rationale: No se trata de una cuestión doctrinal polémica, pero sí de precisión histórica e interpretativa. Dado que el escenario incluye vendedores y cambistas, el sentido apunta al conjunto del recinto. La nota preserva esa aclaración sin sobrecargar el texto principal.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'La revisión más reciente mantuvo el texto sin cambios, y el cotejo de revisión informó alta concordancia (veredicto: agree). No se registraron revisiones aplicadas; por ello, el borrador español sigue de cerca el tramo griego y el criterio léxico ya auditado en inglés.'
  spanish_consistency_notes:
  - Se mantiene «templo» como traducción principal de ἱερόν, con nota aclaratoria sobre su alcance.
  - Se usa «cambistas» como término español breve y exacto para κερματιστὰς.
  - Se prefirió «bueyes», «ovejas» y «palomas» por claridad natural en español bíblico, sin perder el contexto sacrificial.
  - La puntuación reproduce la coordinación del griego con una sola frase narrativa fluida.
