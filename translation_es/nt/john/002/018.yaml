translation:
  language: es
  text: 'Entonces los judíos respondieron y le dijeron[a]: «¿Qué señal nos muestras que haces estas cosas?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los líderes judíos» o «los judeanos»; en Juan, «los judíos» a veces puede referirse de manera más restringida a un grupo representativo, especialmente a las autoridades de Judea, según el contexto.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀπεκρίθησαν
  english_pob_choice: answered
  chosen_spanish: respondieron
  alternatives_spanish:
  - contestaron
  - replicaron
  lexicon: BDAG
  rationale: En español, «respondieron» transmite la introducción narrativa de una réplica directa con naturalidad y sin añadir matices que el griego no exige.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Entonces
  alternatives_spanish:
  - Así que
  - Por tanto
  lexicon: BDAG
  rationale: «Entonces» conserva la continuidad narrativa inmediata con el contexto previo y suena natural en español bíblico contemporáneo.
- source_word: οἱ Ἰουδαῖοι
  english_pob_choice: the Jews
  chosen_spanish: los judíos
  alternatives_spanish:
  - los líderes judíos
  - los judeanos
  lexicon: BDAG
  rationale: Se mantiene el sintagma literal del griego, tal como el POB inglés, sin restringir de antemano el referente más allá de lo que el versículo dice explícitamente.
- source_word: εἶπαν αὐτῷ
  english_pob_choice: said to him
  chosen_spanish: le dijeron
  alternatives_spanish:
  - le hablaron
  - le dijeron a él
  lexicon: BDAG
  rationale: «Le dijeron» reproduce de modo directo la introducción del discurso sin recargar el español.
- source_word: Τί σημεῖον
  english_pob_choice: What sign
  chosen_spanish: ¿Qué señal
  alternatives_spanish:
  - ¿Qué signo
  - ¿Qué prueba
  lexicon: BDAG
  rationale: «Señal» conserva el valor joánico de σημεῖον mejor que «milagro» o «prueba», y sigue la decisión léxica auditada del POB inglés.
- source_word: δεικνύεις
  english_pob_choice: do you show
  chosen_spanish: muestras
  alternatives_spanish:
  - estás mostrando
  - presentas
  lexicon: BDAG
  rationale: En interrogación española, «muestras» reproduce de forma natural la pregunta desafiante del presente indicativo sin forzar una perífrasis innecesaria.
- source_word: ἡμῖν
  english_pob_choice: us
  chosen_spanish: nos
  alternatives_spanish:
  - a nosotros
  lexicon: BDAG
  rationale: El dativo de destinatario se expresa de manera normal en español con el pronombre átono «nos».
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - puesto que
  - porque
  lexicon: BDAG
  rationale: Aquí ὅτι introduce la base de la demanda; «que» preserva la estructura directa de la protesta sin convertirla en una paráfrasis causal más interpretativa.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  - tales cosas
  lexicon: BDAG
  rationale: «Estas cosas» mantiene el plural demostrativo del griego y el enlace con las acciones de Jesús en el templo.
- source_word: ποιεῖς
  english_pob_choice: you are doing
  chosen_spanish: haces
  alternatives_spanish:
  - estás haciendo
  - realizas
  lexicon: BDAG
  rationale: «Haces» conserva el presente del original con un español más ágil; el contexto ya comunica la acción inmediata cuestionada.
theological_decisions:
- issue: Referencia de «los judíos» en Juan
  english_pob_reading: Retain the literal rendering 'the Jews' in the main text
  chosen_spanish_reading: Conservar «los judíos» en el texto principal
  alternative_spanish_readings:
  - los líderes judíos
  - los judeanos
  rationale: Aunque en Juan la expresión puede referirse contextualmente a un grupo más estrecho, este versículo no lo especifica; por eso se conserva la forma literal y se deja abierta la nota contextual.
  doctrine_reference: Translation philosophy §1, §3
- issue: Función de ὅτι en la réplica
  english_pob_reading: ‘that you do these things’ rather than ‘since you are doing these things’
  chosen_spanish_reading: «que haces estas cosas»
  alternative_spanish_readings:
  - «porque haces estas cosas»
  - «puesto que haces estas cosas»
  rationale: La construcción española con «que» refleja mejor que la frase expresa la base del reto, sin convertirla en una explicación causal más libre.
  doctrine_reference: John 2:18 revision pass; source-greek syntax
translation_notes:
  revision_awareness: 'Se incorporó la revisión más reciente del POB inglés: la base de ὅτι se refleja con «que» en lugar de una paráfrasis causal como «porque» o «puesto que». También se evitó anclar notas no marcadas; la única nota aparece explícitamente en el texto.'
  spanish_consistency_notes:
  - Se preserva la terminología joánica de «señal» para σημεῖον.
  - Se conserva «los judíos» en forma literal, con nota contextual alternativa.
  - El español mantiene un tono bíblico moderno y claro, sin depender de fórmulas tradicionales innecesarias.
  - La pregunta final queda breve y directa, acorde al desafío del griego.
