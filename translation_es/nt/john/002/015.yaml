translation:
  language: es
  text: Y después de hacer un látigo de cuerdas, los echó a todos fuera de los atrios del templo[a], incluyendo tanto a las ovejas como al ganado[b][c]; y derramó las monedas de los cambistas y volcó las mesas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego ἱερόν se refiere al complejo del templo o sus atrios, no específicamente al santuario interior.
    reason: cultural_note
  - marker: b
    text: 'O: «los bueyes».'
    reason: lexical_alternative
  - marker: c
    text: El griego dice «a todos», y luego especifica «tanto las ovejas como el ganado»; la redacción no afirma explícitamente que el látigo se usara sobre personas.
    reason: alternative_reading
lexical_decisions:
- source_word: ποιήσας
  english_pob_choice: after making
  chosen_spanish: Y después de hacer
  alternatives_spanish:
  - habiendo hecho
  - haciendo
  lexicon: BDAG
  rationale: El participio aoristo antecede a la acción principal; en español, «después de hacer» comunica con claridad la secuencia sin volver la frase artificial.
- source_word: φραγέλλιον
  english_pob_choice: a whip
  chosen_spanish: un látigo
  alternatives_spanish:
  - un azote
  - un chicote
  lexicon: BDAG
  rationale: El término designa un instrumento de golpe. «Látigo» es natural en español actual y conserva la fuerza del objeto sin añadir connotaciones más rígidas de «azote».
- source_word: ἐκ σχοινίων
  english_pob_choice: out of cords
  chosen_spanish: de cuerdas
  alternatives_spanish:
  - hecho de cuerdas
  - con cuerdas
  lexicon: BDAG
  rationale: La preposición y el sustantivo indican material. «De cuerdas» expresa con sencillez la composición del látigo.
- source_word: πάντας
  english_pob_choice: them all
  chosen_spanish: a todos
  alternatives_spanish:
  - a todos ellos
  - a todos los presentes
  lexicon: BDAG
  rationale: La forma griega es amplia y el contexto inmediato sigue especificando animales; «a todos» conserva esa amplitud sin restringir indebidamente el referente.
- source_word: ἐξέβαλεν
  english_pob_choice: he drove ... out
  chosen_spanish: los echó ... fuera
  alternatives_spanish:
  - los expulsó
  - los sacó fuera
  lexicon: BDAG
  rationale: «Echar fuera» es una forma idiomática y enérgica en español para ἐκβάλλω en este contexto de expulsión forzosa.
- source_word: τοῦ ἱεροῦ
  english_pob_choice: the temple courts
  chosen_spanish: de los atrios del templo
  alternatives_spanish:
  - del recinto del templo
  - del templo
  lexicon: BDAG
  rationale: ἱερόν se refiere al complejo del templo, no al santuario interior. «Atrios del templo» transmite esa distinción con claridad bíblica y naturalidad en español.
- source_word: τά τε πρόβατα καὶ τοὺς βόας
  english_pob_choice: including both the sheep and the cattle
  chosen_spanish: incluidos tanto las ovejas como el ganado
  alternatives_spanish:
  - incluidas tanto las ovejas como los bueyes
  - tanto las ovejas como el ganado
  lexicon: BDAG
  rationale: La construcción especifica a los animales entre los expulsados. «Ganado» traduce βόας de modo más general y actual que «bueyes», manteniendo el sentido amplio del griego.
- source_word: κολλυβιστῶν
  english_pob_choice: the money changers
  chosen_spanish: los cambistas
  alternatives_spanish:
  - los cambiadores de dinero
  - los cambistas de moneda
  lexicon: BDAG
  rationale: Es el término habitual y claro en español para quienes cambiaban moneda en el templo.
- source_word: ἐξέχεεν τὰ κέρματα
  english_pob_choice: he poured out the coins
  chosen_spanish: derramó las monedas
  alternatives_spanish:
  - vertió las monedas
  - esparció las monedas
  lexicon: BDAG
  rationale: ἐκχέω significa literalmente «derramar/verter». «Derramó las monedas» preserva el verbo y evita una paráfrasis que debilite la imagen física.
- source_word: κέρματα
  english_pob_choice: the coins
  chosen_spanish: las monedas
  alternatives_spanish:
  - las piezas de moneda
  - el cambio
  lexicon: BDAG
  rationale: «Monedas» es la opción más natural y precisa en español para κέρματα sin volver la expresión coloquial.
- source_word: ἀνέστρεψεν
  english_pob_choice: overturned
  chosen_spanish: volcó
  alternatives_spanish:
  - volteó
  - volcó hacia arriba
  lexicon: BDAG
  rationale: En contexto el verbo indica poner las mesas patas arriba. «Volcó» es breve, enérgico y fiel a la acción descrita.
theological_decisions:
- issue: Alcance de la expulsión y uso del látigo
  english_pob_reading: The translation states that Jesus drove 'them all' out of the temple courts, with the following phrase explicitly including the sheep and cattle, without specifying that he used the whip on people.
  chosen_spanish_reading: La traducción dice que los echó a todos fuera de los atrios del templo, y luego incluye explícitamente tanto a las ovejas como al ganado, sin afirmar que el látigo se usó sobre personas.
  alternative_spanish_readings:
  - Echó fuera a toda la gente y a los animales
  - Echó fuera solo a los animales
  rationale: La sintaxis griega contiene πάντας y después especifica animales, pero no dice de manera explícita que el látigo se aplicara a seres humanos. La redacción en español conserva esa amplitud y mantiene la tensión interpretativa sin resolverla de más.
  doctrine_reference: Preservar la tensión textual en lugar de resolverla interpretativamente.
translation_notes:
  revision_awareness: La versión española sigue el acuerdo alto del control cruzado y reproduce la decisión revisada de mantener el alcance amplio de πάντας, la distinción de ἱερόν como complejo del templo y la imagen física de ἐκχέω/ἀνέστρεψεν sin añadir elementos no explícitos en el griego.
  spanish_consistency_notes:
  - Se usa «Yahvé» como convención general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se prefiere «cambistas» para κολλυβισταί por ser el término establecido y transparente en español.
  - «Atrios del templo» mantiene la distinción entre el complejo del templo y el santuario interior.
  - Las notas conservan la alternativa lexical relevante para βόας y la tensión sobre πάντας, como en el POB inglés.
