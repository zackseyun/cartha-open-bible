  text: καὶ ποιήσας φραγέλλιον ἐκ σχοινίων πάντας ἐξέβαλεν ἐκ τοῦ ἱεροῦ τά τε πρόβατα καὶ τοὺς βόας, καὶ τῶν κολλυβιστῶν ἐξέχεεν ⸂τὰ κέρματα⸃ καὶ τὰς τραπέζας ⸀ἀνέστρεψεν,
base_translation:
  language: en
  yaml_path: translation/nt/john/002/015.yaml
  text: And after making a whip out of cords[a], he drove them all out of the temple courts, including both the sheep and the cattle[c][b]; and he poured out the coins of the money changers and overturned the tables.
  footnotes:
  - marker: a
    text: Greek ἱερόν refers to the temple complex or courts, not specifically the inner sanctuary.
    reason: cultural_note
  - marker: b
    text: Or 'both the sheep and the oxen.'
    reason: lexical_alternative
  - marker: c
    text: The Greek says 'them all,' then specifies 'both the sheep and the cattle'; the wording does not explicitly state that the whip was used on people.
    reason: alternative_reading
