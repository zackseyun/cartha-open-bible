revisions:
- from: Y después de hacer un látigo de cuerdas[a], los echó a todos fuera de los atrios del templo, incluidos tanto las ovejas como el ganado[b][c]; y derramó las monedas de los cambistas y volcó las mesas.
  to: Y después de hacer un látigo de cuerdas, los echó a todos fuera de los atrios del templo[a], incluyendo tanto a las ovejas como al ganado[b][c]; y derramó las monedas de los cambistas y volcó las mesas.
  rationale: Se corrige una construcción poco natural en español («incluidos tanto las ovejas como el ganado») por «incluyendo tanto a las ovejas como al ganado», que preserva mejor la función especificativa del griego. También se reubica la nota [a] para que ancle correctamente al término que traduce ἱερόν.
