translation:
  language: es
  text: 'Jesús respondió y les dijo[a]: «Destruyan este templo, y en tres días lo levantaré».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «derriben este templo … lo reconstruiré». El verbo griego traducido «levantar» puede oírse aquí con resonancias de resurrección; Juan después explica que Jesús hablaba del templo de su cuerpo (2:21).
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: BDAG
  rationale: En español, «respondió» reproduce con naturalidad la fórmula narrativa ἀπεκρίθη ... καὶ εἶπεν sin sonar redundante; conserva el valor de respuesta a una intervención previa.
- source_word: εἶπεν
  english_pob_choice: said
  chosen_spanish: y les dijo
  alternatives_spanish:
  - y habló
  - y les habló
  lexicon: BDAG
  rationale: La combinación «respondió y les dijo» preserva la estructura semítica/joánica del original y es idiomática en español bíblico contemporáneo.
- source_word: Λύσατε
  english_pob_choice: Destroy
  chosen_spanish: Destruyan
  alternatives_spanish:
  - Derriben
  - Tiren abajo
  - Destruyan
  lexicon: BDAG
  rationale: El imperativo plural exige un mandato directo. «Destruyan» comunica la fuerza de λύω en este contexto de demolición del templo mejor que un calco literal como «desaten».
- source_word: ναὸν
  english_pob_choice: temple
  chosen_spanish: templo
  alternatives_spanish:
  - santuario
  lexicon: BDAG
  rationale: «Templo» es la equivalencia más natural y clara en español para ναός aquí; mantiene el escenario narrativo y no resuelve de antemano la identificación posterior con el cuerpo de Jesús.
- source_word: ἐν τρισὶν ἡμέραις
  english_pob_choice: in three days
  chosen_spanish: en tres días
  alternatives_spanish:
  - dentro de tres días
  - en el plazo de tres días
  lexicon: BDAG
  rationale: «En tres días» conserva la expresión temporal griega sin sobreinterpretar la relación exacta de duración o límite.
- source_word: ἐγερῶ
  english_pob_choice: I will raise ... up
  chosen_spanish: lo levantaré
  alternatives_spanish:
  - lo resucitaré
  - lo reconstruiré
  - lo levantaré
  lexicon: BDAG
  rationale: «Levantaré» mantiene el eco de ἐγείρω y permite la resonancia de resurrección que el contexto joánico sugiere, sin imponer en el texto principal una interpretación explicativa como «reconstruiré».
- source_word: αὐτόν
  english_pob_choice: it
  chosen_spanish: lo
  alternatives_spanish:
  - lo
  lexicon: BDAG
  rationale: Aunque el antecedente gramatical es masculino en griego, en español corresponde el objeto directo «lo» para «templo»; además conserva la ambigüedad narrativa, que Juan aclarará después.
theological_decisions:
- issue: Si la frase debe explicitar ya que el templo simboliza el cuerpo de Jesús
  english_pob_reading: Keep 'this temple' in the main text without interpretive expansion.
  chosen_spanish_reading: Mantener «este templo» sin añadir una glosa interpretativa en el texto principal.
  alternative_spanish_readings:
  - Destruyan este santuario —es decir, mi cuerpo—
  - Destruyan este templo de mi cuerpo
  rationale: El dicho está intencionalmente enigmático en el versículo; Juan 2:21 ofrece la aclaración posterior. Preservar la ambigüedad evita resolver prematuramente la tensión narrativa y teológica.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Cómo reflejar el valor de ἐγερῶ entre imagen arquitectónica y resonancia de resurrección
  english_pob_reading: Render as 'I will raise it up.'
  chosen_spanish_reading: Traducirlo como «lo levantaré».
  alternative_spanish_readings:
  - lo reconstruiré
  - lo resucitaré
  rationale: '«Levantaré» conserva la polisemia útil del verbo griego: puede leerse en clave de levantamiento/reconstrucción del templo y también deja espacio para la resonancia de resurrección que el contexto de Juan sugiere.'
  doctrine_reference: Translation philosophy §1 and §3
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el paquete de fuente griega y el criterio auditado de la POB en inglés: mantiene la estructura narrativa, conserva la ambigüedad intencional del dicho y refleja la posible doble resonancia de ἐγερῶ sin resolverla en el texto principal.'
  spanish_consistency_notes:
  - Se usa «templo» de manera consistente para ναός, evitando «santuario» salvo que el contexto lo exigiera.
  - Se emplea «destruyan» para Λύσατε por fuerza contextual, no el sentido básico de «soltar».
  - Se conserva el pronombre átono «lo» para αὐτόν, idiomático en español y compatible con la ambigüedad joánica.
  - Se mantiene «levantaré» para ἐγερῶ con el fin de no cerrar la lectura hacia «reconstruiré» ni hacia «resucitaré» en el texto principal.
