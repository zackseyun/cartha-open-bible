    reason: cultural_note
  revision_rationale: La revisión separa con más claridad la ubicación/colocación de las tinajas de su relación con el rito judío, y cambia «contenían» por «con capacidad para» para reflejar fielmente χωροῦσαι. También se ajusta mejor al audit trail inglés, conservando solo las notas realmente necesarias y anclándolas correctamente en el texto.
