translation:
  language: es
  text: Había allí seis tinajas de piedra, colocadas allí[a] según los ritos judíos de purificación, con capacidad para dos o tres medidas cada una[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para la costumbre de purificación de los judíos»; la frase se refiere a prácticas de limpieza ritual.'
    reason: lexical_alternative
  - marker: b
    text: Una «medida» (griego μετρητής, metretés) era una antigua unidad líquida, aproximadamente equivalente a 35–40 litros.
    reason: cultural_note
lexical_decisions:
- source_word: ἦσαν δὲ ἐκεῖ
  english_pob_choice: Now there were ... standing there
  chosen_spanish: Había allí
  alternatives_spanish:
  - Ahora había allí
  - Y había allí
  lexicon: BDAG
  rationale: En español, «había allí» expresa de forma natural la existencia y localización. «Ahora» es posible, pero no es necesario para el flujo narrativo y «había allí» preserva la concisión del griego sin calco torpe.
- source_word: λίθιναι ὑδρίαι
  english_pob_choice: stone water jars
  chosen_spanish: tinajas de piedra
  alternatives_spanish:
  - jarras de piedra
  - vasijas de piedra para agua
  lexicon: BDAG
  rationale: ὑδρία designa un recipiente para agua; en español, «tinaja» comunica bien un gran recipiente de uso doméstico, y «de piedra» conserva el material. Se evita «waterpots» por su rareza en español y se evita una paráfrasis excesiva.
- source_word: ἓξ
  english_pob_choice: six
  chosen_spanish: seis
  alternatives_spanish:
  - '6'
  lexicon: BDAG
  rationale: Numeral cardinal directo y transparente.
- source_word: κατὰ τὸν καθαρισμὸν τῶν Ἰουδαίων
  english_pob_choice: in accordance with the Jewish rites of purification
  chosen_spanish: dispuestas para la purificación de los judíos
  alternatives_spanish:
  - según la purificación de los judíos
  - para los ritos judíos de purificación
  - de conformidad con las purificaciones judías
  lexicon: BDAG
  rationale: El griego usa κατά con καθαρισμός para indicar conformidad con un uso ritual. «Dispuestas para» transmite la finalidad/uso sin forzar una fórmula demasiado abstracta. «Purificación de los judíos» conserva la referencia étnico-religiosa del texto sin sustituirla por una reescritura interpretativa.
- source_word: κείμεναι
  english_pob_choice: standing
  chosen_spanish: dispuestas
  alternatives_spanish:
  - colocadas
  - puestas
  - situadas
  lexicon: BDAG
  rationale: Para recipientes, «dispuestas» comunica que estaban colocadas allí de manera ordenada. En español, «de pie» sería poco natural para tinajas grandes y «acostadas» introduciría una imagen ajena al contexto.
- source_word: χωροῦσαι
  english_pob_choice: each holding
  chosen_spanish: que contenían
  alternatives_spanish:
  - que cabían
  - con capacidad para
  - que albergaban
  lexicon: BDAG
  rationale: El participio indica capacidad. «Contenían» es natural y conserva la idea de capacidad de cada recipiente sin alargar innecesariamente la frase. La distribución se expresa mejor con «cada una» en la siguiente decisión.
- source_word: ἀνὰ μετρητὰς δύο ἢ τρεῖς
  english_pob_choice: two or three measures
  chosen_spanish: dos o tres medidas cada una
  alternatives_spanish:
  - dos o tres metretas cada una
  - dos o tres medidas por recipiente
  - dos o tres medidas
  lexicon: BDAG
  rationale: «Medidas» conserva el nombre del peso/volumen sin importar una equivalencia moderna en el texto principal. «Cada una» refleja el valor distributivo de ἀνά. Se evita transliterar «metretas» en el cuerpo por inteligibilidad, pero el término antiguo queda implícito en la nota cultural si se requiere.
theological_decisions:
- issue: 'τῶν Ἰουδαίων: «judíos» frente a «judeanos»'
  english_pob_reading: the Jewish rites of purification
  chosen_spanish_reading: la purificación de los judíos
  alternative_spanish_readings:
  - la purificación de los judeanos
  - las purificaciones judías
  rationale: Aquí el contexto es una práctica ritual reconocida en el entorno narrativo, no una discusión geográfica. «Judíos» reproduce la referencia cultural-religiosa del texto con naturalidad en español. Se mantiene la tensión histórica del término sin suavizarlo a una etiqueta neutral.
  doctrine_reference: Juan 2:6; consistencia con el tratamiento POB de Ἰουδαῖος según contexto
- issue: कैdas? No issue
  english_pob_reading: in accordance with the Jewish rites of purification
  chosen_spanish_reading: dispuestas para la purificación de los judíos
  alternative_spanish_readings:
  - según los ritos judíos de purificación
  rationale: La frase puede leerse como referencia a recipientes destinados a un uso ceremonial, no solo como una descripción física. «Dispuestas para» preserva esa relación funcional sin convertirla en una explicación interpretativa amplia.
  doctrine_reference: Principio de equivalencia óptima y primacía del texto fuente
translation_notes:
  revision_awareness: El borrador sigue de cerca el griego SBLGNT y el audit trail en inglés POB. Se conservan la ubicación («allí»), el material («de piedra»), el uso ritual de las tinajas y la capacidad distributiva («cada una»), sin introducir equivalencias modernas en el texto principal. No se aplicaron revisiones posteriores adicionales al pasaje.
  spanish_consistency_notes:
  - Se usa «judíos» para τῶν Ἰουδαίων en continuidad con el contexto ritual del pasaje y el audit trail inglés.
  - Se prefiere «tinajas» para ὑδρίαι por ser comprensible y solemnemente natural en español; no se usa «waterpots».
  - «Medidas» mantiene el término antiguo sin sobreexplicar en el cuerpo principal; la equivalencia aproximada queda reservada a nota.
  - La estructura verbal busca fluidez en español sin perder la doble idea de existencia y ubicación en ἦσαν ἐκεῖ.
