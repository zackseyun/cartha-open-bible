revisions:
- from: Había allí seis tinajas[a] de piedra, dispuestas[b] para la purificación de los judíos, que contenían[c] dos o tres medidas cada una[d].
  to: Había allí seis tinajas de piedra, colocadas allí[a] según los ritos judíos de purificación, con capacidad para dos o tres medidas cada una[b].
  rationale: La revisión separa con más claridad la ubicación/colocación de las tinajas de su relación con el rito judío, y cambia «contenían» por «con capacidad para» para reflejar fielmente χωροῦσαι. También se ajusta mejor al audit trail inglés, conservando solo las notas realmente necesarias y anclándolas correctamente en el texto.
