    text: Or 'for the purification custom of the Jews'; the phrase refers to ritual cleansing practices.
    reason: lexical_alternative
  - marker: b
    text: A 'measure' (Greek metretēs) was an ancient liquid measure, roughly equivalent to 8–9 gallons or 35–40 liters.
    reason: cultural_note
