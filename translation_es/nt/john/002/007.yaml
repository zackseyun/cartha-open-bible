revisions:
- from: 'Jesús les dijo: «Llenen de agua las tinajas».[a] Y las llenaron hasta el borde.'
  to: 'Jesús les dijo: «Llenen las tinajas con agua». Y las llenaron hasta el borde[a].'
  rationale: Se corrige la sintaxis para reflejar con más naturalidad y precisión el contenido expresado por ὕδατος («con agua»). Se conserva «tinajas» como equivalente válido de ὑδρίας. Se mantiene «hasta el borde» para ἕως ἄνω por buena legibilidad en español, pero se reubica la nota al lugar correcto y se reemplaza por una alternativa real y útil.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:02:42Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador comunica correctamente la secuencia básica del griego: Jesús habla a los sirvientes, les ordena llenar las vasijas, y ellos las llenan completamente. Sin embargo, desplaza levemente la sintaxis de ὑδρίας ὕδατος al convertirla en «tinajas de agua», lo que en español describe el tipo de recipiente más que el contenido con el que deben llenarse. El griego y el audit trail inglés expresan claramente «llenar las tinajas con/de agua».'
  spanish_quality_summary: 'El español es claro y natural, pero el anclaje de la nota está mal ubicado: la nota alternativa sobre «hasta el borde» aparece después de la cita, aunque corresponde a la cláusula final. Además, «Llenen de agua las tinajas» suena menos directo y algo más marcado que «Llenen las tinajas con agua».'
  glossary_alignment: 'No hay términos del glosario principal en juego salvo «Jesús», que está correcto. «Tinajas» es aceptable para ὑδρίας. La decisión principal a corregir es sintáctica/semántica para ὕδατος: debe reflejar contenido («con agua») y no quedar absorbido como descriptor nominal del recipiente.'
  issues:
  - severity: medium
    issue: La frase «Llenen de agua las tinajas» es menos fiel a la relación gramatical de γεμίζω + ὕδατος que «Llenen las tinajas con agua».
    rationale: En el griego, ὕδατος expresa aquello con lo que se llenan las tinajas. La formulación actual es comprensible, pero suena más invertida y menos natural en español contemporáneo.
  - severity: medium
    issue: La nota [a] está anclada al lugar equivocado.
    rationale: 'La nota dice «O: “hasta el borde”», pero el texto principal ya usa «hasta el borde» y el asunto léxico corresponde a ἕως ἄνω en la cláusula final, no a la cita de Jesús.'
  - severity: medium
    issue: La nota al pie no preserva bien la alternativa auditada en inglés.
    rationale: El inglés documentó la alternancia entre «to the brim» y «up to the top». En español, si se mantiene nota, debe reflejar una alternativa real distinta del texto principal, por ejemplo «hasta arriba», no repetir el texto ya impreso.
  revised_spanish_text: 'Jesús les dijo: «Llenen las tinajas con agua». Y las llenaron hasta el borde[a].'
  revised_footnotes:
  - marker: a
    text: 'O: «hasta arriba».'
    reason: lexical_alternative
  revision_rationale: Se corrige la sintaxis para reflejar con más naturalidad y precisión el contenido expresado por ὕδατος («con agua»). Se conserva «tinajas» como equivalente válido de ὑδρίας. Se mantiene «hasta el borde» para ἕως ἄνω por buena legibilidad en español, pero se reubica la nota al lugar correcto y se reemplaza por una alternativa real y útil.
