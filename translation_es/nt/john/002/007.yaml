translation:
  language: es
  text: 'Jesús les dijo: «Llenen las tinajas con agua». Y las llenaron hasta el borde[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hasta arriba».'
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - les dice
  lexicon: BDAG
  rationale: Aunque el griego usa el presente histórico, en español narrativo «dijo» comunica con naturalidad el acto de habla sin perder la fuerza del relato.
- source_word: αὐτοῖς
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  lexicon: BDAG
  rationale: El dativo plural funciona como complemento indirecto; «les» es la forma más natural en español bíblico contemporáneo.
- source_word: Γεμίσατε
  english_pob_choice: Fill
  chosen_spanish: Llenen
  alternatives_spanish:
  - Llenen completamente
  - Llenen hasta arriba
  lexicon: BDAG
  rationale: El imperativo plural aoristo pide una orden directa; «Llenen» conserva la instrucción sin sobrecargarla. La idea de plenitud se expresa en la frase final.
- source_word: ὑδρίας
  english_pob_choice: water jars
  chosen_spanish: tinajas
  alternatives_spanish:
  - jarras de agua
  - vasijas de agua
  lexicon: BDAG
  rationale: ὑδρία designa un recipiente para agua. «Tinajas» es una opción natural y reverente en español, y evita una expresión demasiado técnica o artificial. El contexto ya especifica que son de agua.
- source_word: ὕδατος
  english_pob_choice: with water
  chosen_spanish: de agua
  alternatives_spanish:
  - con agua
  - llenas de agua
  lexicon: BDAG
  rationale: El genitivo de contenido se expresa de forma idiomática en español con «de agua» dentro de la frase nominal «tinajas de agua»; aquí se integra en la orden como complemento descriptivo.
- source_word: ἐγέμισαν
  english_pob_choice: they filled
  chosen_spanish: las llenaron
  alternatives_spanish:
  - las llenaron completamente
  - las llenaron por completo
  lexicon: BDAG
  rationale: El aoristo narrativo indica acción completada; «las llenaron» es claro y natural, y el objeto directo retoma las tinajas.
- source_word: ἕως ἄνω
  english_pob_choice: to the brim
  chosen_spanish: hasta el borde
  alternatives_spanish:
  - hasta arriba
  - al ras
  lexicon: BDAG
  rationale: La expresión indica llenado completo hasta el punto superior. «Hasta el borde» reproduce bien la imagen sin forzar una forma específica del recipiente y mantiene la precisión que el audit trail inglés resolvió como «to the brim».
theological_decisions:
- issue: La traducción del nombre divino no aparece en este versículo, pero se preserva el estilo cristológico y narrativo sin añadir terminología interpretativa.
  english_pob_reading: No theological note in the English audit trail.
  chosen_spanish_reading: No se introduce ninguna glosa teológica; se mantiene el enunciado narrativo simple.
  alternative_spanish_readings:
  - añadir una nota cristológica
  - parafrasear con énfasis devocional
  rationale: El texto no contiene un término con carga doctrinal que requiera decisión teológica explícita. La fidelidad aquí consiste en no sobreexplicar.
  doctrine_reference: Principio de suficiencia textual y no adición interpretativa
translation_notes:
  revision_awareness: El audit trail inglés revisó la clausula final desde «up to the top» a «to the brim» para reflejar con mayor precisión ἕως ἄνω. La traducción española adopta directamente esa precisión con «hasta el borde», una opción idiomática que mantiene la imagen de llenado completo.
  spanish_consistency_notes:
  - Se conservó el registro narrativo simple y directo del griego, evitando arcaísmos.
  - «Tinajas» se eligió por naturalidad en español y por adecuarse al contexto de recipientes para agua.
  - La nota al pie mantiene la alternativa semántica relevante sin duplicar innecesariamente el sentido principal en el cuerpo del texto.
  - Se evitó traducir mecánicamente el presente histórico griego con presente español, porque en narrativa castellana resultaría menos natural.
