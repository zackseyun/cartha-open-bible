translation:
  language: es
  text: Después de esto, bajó a Capernaúm[a] con su madre, sus hermanos y sus discípulos, y allí se quedaron no muchos días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus parientes» o «sus familiares»; la palabra griega puede referirse a hermanos en sentido estricto o, en algunos contextos, a una relación familiar más amplia.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μετὰ τοῦτο
  english_pob_choice: After this
  chosen_spanish: Después de esto
  alternatives_spanish:
  - Luego de esto
  - Después
  lexicon: BDAG
  rationale: Conserva la transición temporal breve y natural del griego sin añadir interpretación. «Después de esto» refleja bien el demostrativo singular τοῦτο y su valor narrativo.
- source_word: κατέβη
  english_pob_choice: went down
  chosen_spanish: bajó
  alternatives_spanish:
  - descendió
  - fue hacia abajo
  lexicon: BDAG
  rationale: «Bajó» mantiene el sentido direccional y topográfico del verbo, y suena natural en español. «Descendió» sería más formal, pero menos idiomático en este contexto narrativo.
- source_word: εἰς Καφαρναοὺμ
  english_pob_choice: to Capernaum
  chosen_spanish: a Capernaúm
  alternatives_spanish:
  - hacia Capernaúm
  - a Cafarnaúm
  lexicon: BDAG
  rationale: La preposición de destino se expresa naturalmente con «a». Se conserva la transliteración usada por POB en inglés, adaptada a ortografía española como «Capernaúm».
- source_word: αὐτὸς
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - él mismo
  lexicon: BDAG
  rationale: El pronombre explícito se conserva porque el griego lo enfatiza al introducir al grupo acompañante. En español basta «él»; «él mismo» sobrerreforzaría el énfasis.
- source_word: ἡ μήτηρ αὐτοῦ
  english_pob_choice: his mother
  chosen_spanish: su madre
  alternatives_spanish:
  - la madre de él
  - su madre, María
  lexicon: BDAG
  rationale: El texto griego dice simplemente «su madre»; no se debe añadir el nombre propio, ausente aquí. Se mantiene la relación posesiva natural del español.
- source_word: οἱ ἀδελφοὶ
  english_pob_choice: his brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - sus parientes
  - sus allegados
  - sus hermanos y hermanas
  lexicon: BDAG
  rationale: Se preserva el valor léxico directo de ἀδελφοί como plural masculino. «Hermanos» es la correspondencia más inmediata en español y evita resolver aquí la discusión de parentesco más amplio.
- source_word: οἱ μαθηταὶ αὐτοῦ
  english_pob_choice: his disciples
  chosen_spanish: sus discípulos
  alternatives_spanish:
  - sus seguidores
  lexicon: BDAG
  rationale: «Discípulos» mantiene el término técnico del Evangelio para μαθηταί y conserva su sentido de aprendices/seguidores dentro del relato joánico.
- source_word: ἐκεῖ ἔμειναν
  english_pob_choice: they stayed there
  chosen_spanish: allí se quedaron
  alternatives_spanish:
  - allí permanecieron
  - se quedaron allí
  lexicon: BDAG
  rationale: Se respeta el plural del verbo y el sentido de permanencia temporal. «Se quedaron» es natural en español y reproduce bien el matiz de estancia.
- source_word: οὐ πολλὰς ἡμέρας
  english_pob_choice: not many days
  chosen_spanish: no muchos días
  alternatives_spanish:
  - por pocos días
  - por no muchos días
  lexicon: BDAG
  rationale: Se mantiene la litote del griego con una formulación cercana y transparente. «No muchos días» refleja mejor la estructura original que una paráfrasis más fluida.
theological_decisions:
- issue: Sentido de ἀδελφοί respecto a la familia de Jesús
  english_pob_reading: Rendered as 'brothers' in the main text, with a note allowing a wider kinship sense.
  chosen_spanish_reading: «hermanos» en el texto principal, con nota que menciona la posibilidad de «parientes» o «deudos».
  alternative_spanish_readings:
  - hermanos y hermanas
  - parientes
  - deudos
  - familiares cercanos
  rationale: El griego masculino plural ἀδελφοί se traduce de forma directa como «hermanos». Para no eliminar la tensión lexical discutida en la tradición y en la auditoría inglesa, la nota preserva la posibilidad de un parentesco más amplio sin sustituir el término principal.
  doctrine_reference: Affirmations; Translation philosophy §§3–4
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se necesitaban cambios; esta versión conserva la misma decisión textual básica del inglés POB auditado, adaptándola al español con equivalencia óptima y sin expandir el contenido del versículo.
  spanish_consistency_notes:
  - Se mantiene «Capernaúm» con ortografía española consistente.
  - Se conserva «discípulos» como término técnico estable en todo el Evangelio.
  - Se usa «hermanos» para ἀδελφοί sin neutralizar ni ampliar en el cuerpo principal.
  - 'Se traduce la litote final de forma cercana: «no muchos días».'
