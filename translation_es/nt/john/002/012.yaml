review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del griego: transición temporal («Después de esto»), movimiento topográfico («bajó»), destino («a Capernaúm»), grupo acompañante, y duración breve de la estancia. También preserva correctamente la nota léxica sobre ἀδελφοί. Sin embargo, la sintaxis española puede ajustarse mejor al flujo natural del original sin duplicar innecesariamente «él», y la puntuación puede mejorarse.'
  spanish_quality_summary: El español es generalmente claro y fiel, pero «él bajó..., él y su madre...» suena pesado y poco natural. Además, el punto y coma antes de «y allí» no aporta claridad. Reordenar a «bajó... con su madre...» mantiene el sentido y mejora la legibilidad. «No muchos días» es aceptable por cercanía formal al griego, aunque «no se quedaron muchos días» fluye mejor en español.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Discípulos» y «hermanos» están bien alineados con las decisiones auditadas. La nota con «parientes» conserva la alternativa léxica; «deudos» es válido pero menos natural en español latinoamericano contemporáneo, por lo que conviene una alternativa más ampliamente legible.
  issues:
  - severity: medium
    issue: Duplicación de «él» en la estructura de acompañamiento
    rationale: Aunque αὐτὸς está explícito en griego, en español «él bajó..., él y su madre...» resulta torpe. Una construcción con «con» preserva el referente y mejora la naturalidad sin pérdida semántica.
  - severity: low
    issue: Puntuación poco natural con punto y coma
    rationale: La coordinación narrativa fluye mejor con coma antes de «y allí». El punto y coma introduce una pausa innecesaria en una oración sencilla.
  - severity: low
    issue: «deudos» en la nota suena menos natural para el español meta
    rationale: La nota inglesa ofrece «relatives/kinsmen». «Parientes» y «familiares» comunican esa amplitud con mayor claridad en español latinoamericano neutral.
  revised_spanish_text: Después de esto, bajó a Capernaúm[a] con su madre, sus hermanos y sus discípulos, y allí se quedaron no muchos días.
  revised_footnotes:
  - marker: a
    text: O «sus parientes» o «sus familiares»; la palabra griega puede referirse a hermanos en sentido estricto o, en algunos contextos, a una relación familiar más amplia.
    reason: lexical_alternative
  revision_rationale: 'La revisión mantiene todas las decisiones fuente-clave, pero mejora la naturalidad del español: elimina la repetición innecesaria de «él», usa una construcción idiomática de acompañamiento («con su madre...»), simplifica la puntuación, y ajusta la nota hacia un registro más ampliamente legible en español latinoamericano sin alterar la razón léxica o teológica documentada.'
