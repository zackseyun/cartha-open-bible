revisions:
- from: Después de esto, él bajó a Capernaúm[a], él y su madre y sus hermanos y sus discípulos; y allí se quedaron no muchos días.
  to: Después de esto, bajó a Capernaúm[a] con su madre, sus hermanos y sus discípulos, y allí se quedaron no muchos días.
  rationale: 'La revisión mantiene todas las decisiones fuente-clave, pero mejora la naturalidad del español: elimina la repetición innecesaria de «él», usa una construcción idiomática de acompañamiento («con su madre...»), simplifica la puntuación, y ajusta la nota hacia un registro más ampliamente legible en español latinoamericano sin alterar la razón léxica o teológica documentada.'
