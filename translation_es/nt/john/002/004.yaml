translation:
  language: es
  text: 'Y Jesús le dijo[a]: «¿Qué tiene eso que ver conmigo y contigo[b], mujer? Todavía no ha llegado mi hora.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «¿Qué es eso para mí y para ti?»; es un modismo que expresa distancia de preocupación, no necesariamente hostilidad.'
    reason: lexical_alternative
  - marker: b
    text: «Mujer» era una forma normal y respetuosa de dirigirse a alguien en ese contexto, aunque en español puede sonar brusca.
    reason: cultural_note
lexical_decisions:
- source_word: λέγει
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - dice
  lexicon: BDAG
  rationale: El griego usa presente histórico; en español narrativo, el pretérito simple suena natural y mantiene el avance de la escena sin alterar el valor discursivo.
- source_word: Τί ἐμοὶ καὶ σοί
  english_pob_choice: What does that have to do with me and with you
  chosen_spanish: ¿Qué tiene eso que ver conmigo y contigo?
  alternatives_spanish:
  - ¿Qué hay entre tú y yo?
  - ¿Qué tengo yo que ver contigo?
  lexicon: BDAG
  rationale: La expresión es idiomática y marca distancia de interés o de competencia, no una pregunta literal sobre posesión. La formulación elegida conserva ese sentido en español claro sin volverla más hostil de lo que permite el griego.
- source_word: γύναι
  english_pob_choice: woman
  chosen_spanish: mujer
  alternatives_spanish:
  - señora
  - amada mujer
  lexicon: BDAG
  rationale: Se mantiene el sentido literal del vocativo. 'Mujer' puede sonar abrupto en español, pero eso refleja la tensión del pasaje; 'señora' suavizaría demasiado y 'amada mujer' añadiría una afectividad no explícita.
- source_word: οὔπω
  english_pob_choice: not yet
  chosen_spanish: todavía no
  alternatives_spanish:
  - aún no
  - no todavía
  lexicon: BDAG
  rationale: '''Todavía no'' expresa de manera natural que el momento esperado no ha llegado hasta ahora, con el mismo valor aspectual de ''not yet''.'
- source_word: ἥκει
  english_pob_choice: has come
  chosen_spanish: ha llegado
  alternatives_spanish:
  - ha venido
  - está aquí
  lexicon: BDAG
  rationale: El verbo puede indicar llegada o presencia. 'Ha llegado' funciona bien con 'hora' en español y conserva la idea de arribo del momento señalado.
- source_word: ἡ ὥρα μου
  english_pob_choice: my hour
  chosen_spanish: mi hora
  alternatives_spanish:
  - mi tiempo
  lexicon: BDAG
  rationale: Se conserva 'hora' para mantener la carga joánica del término, que en Juan remite al momento designado por Dios para la revelación, sufrimiento, muerte y glorificación de Jesús.
theological_decisions:
- issue: Tono de la respuesta de Jesús a su madre
  english_pob_reading: A respectful but distancing response, not an insult
  chosen_spanish_reading: Una respuesta respetuosa pero con distancia, no un insulto
  alternative_spanish_readings:
  - Un regaño duro
  - Una expresión afectuosa y cercana
  rationale: La expresión idiomática introduce distancia relacional o de competencia; 'mujer' es un vocativo normal en ese contexto. La traducción conserva la tensión sin volver la frase ni insultante ni sentimental.
  doctrine_reference: Translation philosophy §3
- issue: Sentido de 'mi hora' en Juan
  english_pob_reading: Jesus refers to his divinely appointed hour, with broader theological resonance beyond the immediate situation
  chosen_spanish_reading: Jesús se refiere a su hora señalada por Dios, con resonancia teológica más amplia que la situación inmediata
  alternative_spanish_readings:
  - Solo al momento de realizar esta señal
  - A un mero asunto de calendario sin peso teológico
  rationale: En Juan, 'hora' es un término temático. Mantener la expresión literal permite que el lector perciba esa resonancia sin sobreexplicarla en el texto principal.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior anclando explícitamente los marcadores [a] y [b] en el texto español. No se introdujeron otros marcadores ni notas sin anclaje.
  spanish_consistency_notes:
  - Se usó 'hora' y no 'tiempo' para conservar la terminología joánica.
  - Se prefirió 'mujer' frente a alternativas más interpretativas para no suavizar la tensión del vocativo.
  - La puntuación y el orden reflejan una frase natural en español sin perder el paralelo idiomático del griego.
