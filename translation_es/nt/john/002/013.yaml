translation:
  language: es
  text: Y estaba cerca la Pascua de los judíos[a], y Jesús subió a Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «la Pascua de los judeanos». En Juan, Ἰουδαῖοι en algunos contextos puede significar «judeanos» en lugar de «judíos», pero aquí identifica más naturalmente la festividad judía.
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y
  - Entonces
  lexicon: BDAG
  rationale: Como marcador narrativo inicial, Καὶ aquí introduce la continuación del relato. «Ahora» funciona de manera natural en español para abrir una nueva escena sin perder el enlace narrativo.
- source_word: ἐγγὺς ἦν
  english_pob_choice: was near
  chosen_spanish: estaba cerca
  alternatives_spanish:
  - se acercaba
  - estaba por llegar
  lexicon: BDAG
  rationale: La expresión indica cercanía temporal. «Estaba cerca» conserva ese sentido simple y directo en español, sin introducir una matización más interpretativa como «se acercaba».
- source_word: πάσχα
  english_pob_choice: Passover
  chosen_spanish: Pascua
  alternatives_spanish:
  - Pascua de los judíos
  - Pascua
  lexicon: BDAG
  rationale: El término designa la festividad judía de Pascua. En español, «Pascua» es el equivalente natural y reconocido; el contexto ya aclara cuál Pascua se trata.
- source_word: τῶν Ἰουδαίων
  english_pob_choice: of the Jews
  chosen_spanish: de los judíos
  alternatives_spanish:
  - de los judeanos
  lexicon: BDAG
  rationale: El genitivo modifica a «Pascua» como festividad identificable dentro del calendario judío. «De los judíos» refleja la designación más directa del texto y mantiene la misma decisión auditada en inglés; la alternativa «judeanos» queda como posibilidad contextual, pero aquí resulta menos natural para una fiesta.
- source_word: ἀνέβη
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - fue
  - ascendió
  lexicon: BDAG
  rationale: El verbo conserva el sentido literal de movimiento ascendente y, a la vez, la fórmula idiomática de peregrinación hacia Jerusalén. «Subió» preserva mejor esa doble resonancia que un simple «fue».
- source_word: εἰς Ἱεροσόλυμα
  english_pob_choice: to Jerusalem
  chosen_spanish: a Jerusalén
  alternatives_spanish:
  - hacia Jerusalén
  lexicon: BDAG
  rationale: «Jerusalén» es la forma normal en español para el topónimo. La preposición «a» expresa con claridad el destino del movimiento.
- source_word: ὁ Ἰησοῦς
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - el Jesús
  lexicon: BDAG
  rationale: Nombre propio estándar en español, sin necesidad de artículo explícito.
theological_decisions:
- issue: Ἰουδαίων en Juan 2:13
  english_pob_reading: of the Jews
  chosen_spanish_reading: de los judíos
  alternative_spanish_readings:
  - de los judeanos
  rationale: En este versículo el sintagma se entiende naturalmente como la fiesta judía de Pascua, no como una etiqueta polémica o restringida a un subgrupo regional. Por eso se mantiene «de los judíos», mientras la alternativa «de los judeanos» queda reconocida como posibilidad léxica general en Juan sin imponerla aquí.
  doctrine_reference: Principio de primacía del texto original y preservación de tensiones léxicas cuando son reales, sin resolverlas artificialmente en la traducción.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el acuerdo alto del audito inglés: conserva la cercanía temporal («estaba cerca»), la fórmula de peregrinación («subió»), y mantiene la alternativa contextual para Ἰουδαῖοι en una nota, sin introducir cambios respecto del sentido base revisado.'
  spanish_consistency_notes:
  - Se usa «Pascua» como nombre de la festividad, en armonía con el uso bíblico estándar en español.
  - Se conserva «subió» para reflejar tanto el movimiento literal como el valor idiomático de ascender a Jerusalén.
  - «Judíos» se mantiene en el cuerpo del texto por fidelidad al contexto inmediato, con nota para la alternativa «judeanos».
