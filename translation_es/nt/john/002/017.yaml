translation:
  language: es
  text: 'Sus discípulos se acordaron de que está escrito[a]: «El celo por tu casa me consumirá».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «me ha consumido», reflejando la redacción de Salmo 69:9 en algunas tradiciones textuales; el griego de Juan aquí dice «me consumirá».
    reason: alternative_reading
lexical_decisions:
- source_word: ἐμνήσθησαν
  english_pob_choice: remembered
  chosen_spanish: se acordaron
  alternatives_spanish:
  - recordaron
  - se dieron cuenta
  lexicon: BDAG / uso natural del español
  rationale: El aoristo de μιμνῄσκομαι se expresa con naturalidad en español como 'se acordaron' o 'recordaron'. 'Se acordaron' conserva el matiz de recuperación de memoria sin sonar rígido.
- source_word: μαθηταὶ
  english_pob_choice: disciples
  chosen_spanish: discípulos
  alternatives_spanish:
  - seguidores
  - alumnos
  lexicon: BDAG
  rationale: '''Discípulos'' es el equivalente directo y el más reconocido en el registro bíblico; ''seguidores'' debilita la relación maestro-discípulo y ''alumnos'' no conserva el tono bíblico.'
- source_word: γεγραμμένον ἐστίν
  english_pob_choice: it is written
  chosen_spanish: está escrito
  alternatives_spanish:
  - ha sido escrito
  - se ha escrito
  lexicon: BDAG
  rationale: La fórmula bíblica en español se expresa de forma idiomática como 'está escrito'. Mantiene el valor de cita escrituraria y evita una construcción demasiado pesada.
- source_word: ζῆλος
  english_pob_choice: Zeal
  chosen_spanish: celo
  alternatives_spanish:
  - ardor
  - fervor
  lexicon: BDAG
  rationale: '''Celo'' conserva el campo semántico de ζῆλος y es una opción natural en español bíblico. ''Fervor'' o ''ardor'' captan intensidad, pero atenúan la referencia establecida del texto citado.'
- source_word: οἴκου
  english_pob_choice: house
  chosen_spanish: casa
  alternatives_spanish:
  - templo
  - hogar
  lexicon: BDAG
  rationale: Se mantiene 'casa' para reflejar el término del texto citado y preservar la alusión veterotestamentaria. Aunque el referente sea el templo, traducir directamente 'templo' borraría la forma de la cita.
- source_word: καταφάγεταί
  english_pob_choice: will consume
  chosen_spanish: consumirá
  alternatives_spanish:
  - devorará
  - me comerá
  lexicon: BDAG
  rationale: El futuro de καταφάγεταί se conserva como futuro en español. 'Consumirá' reproduce bien la fuerza de consumo total sin volverse coloquial ni exagerada.
- source_word: με
  english_pob_choice: me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  lexicon: BDAG
  rationale: Pronombre objeto directo normal en español; 'a mí' solo sería necesario para énfasis, que aquí no aparece.
theological_decisions:
- issue: Conservar el futuro verbal de la cita del Salmo en Juan 2:17
  english_pob_reading: will consume me
  chosen_spanish_reading: me consumirá
  alternative_spanish_readings:
  - me ha consumido
  rationale: El griego de Juan usa una forma futura y la traducción debe seguir el texto de Juan, no armonizarlo con otras tradiciones textuales del Salmo. Mantener el futuro preserva la cita tal como aparece en el evangelio y su aplicación a Jesús.
  doctrine_reference: §1, §3 de la filosofía de traducción
- issue: Mantener 'casa' en vez de 'templo' dentro de la cita
  english_pob_reading: house
  chosen_spanish_reading: casa
  alternative_spanish_readings:
  - templo
  rationale: La cita conserva el vocabulario del Salmo. Aunque el contexto señala el templo, 'casa' respeta la forma textual y la intertextualidad bíblica.
  doctrine_reference: fidelidad intertextual y alusión veterotestamentaria
translation_notes:
  revision_awareness: No se introdujeron cambios respecto al planteamiento auditado en inglés; la decisión clave es mantener en español el futuro de la cita y la forma 'casa' para reflejar el texto de Juan sin armonizarlo con variantes del Salmo.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico claro y contemporáneo, evitando arcaísmos innecesarios.
  - '''Discípulos'' y ''está escrito'' siguen la terminología bíblica estándar en español.'
  - La nota al pie preserva la tensión textual entre la forma de Juan y una tradición alternativa del Salmo sin ocultarla.
