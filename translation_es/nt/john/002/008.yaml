translation:
  language: es
  text: 'Y les dijo: «Saquen un poco ahora y llévenlo al encargado del banquete[a]». Y lo llevaron[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «el jefe del banquete» o «el mayordomo». El término griego se refiere a la persona a cargo del banquete.
    reason: lexical_alternative
  - marker: b
    text: O, «Y lo trajeron». El verbo griego puede expresarse de ambas maneras según la perspectiva.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει
  english_pob_choice: he said
  chosen_spanish: les dijo
  alternatives_spanish:
  - les dice
  lexicon: BDAG
  rationale: El presente histórico griego se vierte con pasado natural en español narrativo; «les dijo» conserva el valor de relato sin forzar un presente poco idiomático.
- source_word: Ἀντλήσατε
  english_pob_choice: Draw some out
  chosen_spanish: Sáquenlo
  alternatives_spanish:
  - Sáquen un poco
  - Extraiganlo
  lexicon: BDAG
  rationale: El verbo pide sacar o extraer líquido; en español, «Sáquenlo» expresa la acción de tomar del recipiente con claridad y fluidez, sin añadir más de lo que el contexto permite.
- source_word: νῦν
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - en este momento
  lexicon: BDAG
  rationale: Adverbio temporal directo; «ahora» preserva la urgencia inmediata del mandato.
- source_word: φέρετε
  english_pob_choice: take
  chosen_spanish: llévenlo
  alternatives_spanish:
  - llávenlo
  - tráiganlo
  lexicon: BDAG
  rationale: Desde la perspectiva de los sirvientes que trasladan lo sacado a otra persona, «llévenlo» es natural en español y conserva la idea de transportar el contenido al destinatario.
- source_word: ἀρχιτρικλίνῳ
  english_pob_choice: the master of the feast
  chosen_spanish: el mayordomo
  alternatives_spanish:
  - el jefe del banquete
  - el encargado del banquete
  - el maestro de ceremonias
  lexicon: BDAG
  rationale: El término designa al encargado del banquete; «mayordomo» comunica bien la función de supervisión del servicio en español bíblico contemporáneo, aunque no agota todas las posibilidades del cargo.
- source_word: οἱ δὲ ἤνεγκαν
  english_pob_choice: So they took it
  chosen_spanish: Y ellos lo llevaron
  alternatives_spanish:
  - Así que lo llevaron
  - Y lo llevaron
  lexicon: BDAG
  rationale: ἤνεγκαν es aoristo de φέρω y puede traducirse «llevaron» o «trajeron» según la perspectiva; aquí «lo llevaron» mantiene el movimiento implícito hacia el destinatario y refleja la obediencia sin forzar la perspectiva inglesa de «take it».
theological_decisions:
- issue: Título para ἀρχιτρικλίνῳ
  english_pob_reading: the master of the feast; lexical alternatives include headwaiter/steward
  chosen_spanish_reading: el mayordomo
  alternative_spanish_readings:
  - el jefe del banquete
  - el encargado del banquete
  - el maestro de ceremonias
  rationale: 'No hay carga doctrinal, pero sí una decisión de equivalencia funcional: se preserva la figura del responsable del banquete sin imponer un título eclesiástico o ceremonial ajeno al contexto.'
  doctrine_reference: Sin referencia doctrinal; decisión léxica-contextual
- issue: Direccionalidad de φέρετε / ἤνεγκαν
  english_pob_reading: take it; or, bring it
  chosen_spanish_reading: llévenlo / lo llevaron
  alternative_spanish_readings:
  - tráiganlo / lo trajeron
  - llévenlo / lo trajeron
  rationale: El griego admite un matiz direccional flexible. En español, se opta por «llevar» para mantener la escena de traslado al destinatario explícito y evitar una inversión innecesaria de perspectiva.
  doctrine_reference: Sin referencia doctrinal; decisión de perspectiva narrativa
translation_notes:
  revision_awareness: Se revisó la correspondencia con el texto griego de Juan 2:8 y con el audit trail en inglés. La redacción española conserva el presente histórico traducido al pasado narrativo, expresa el mandato de sacar líquido y mantiene la flexibilidad de φέρω con una solución coherente en español. Las notas [a] y [b] están ancladas en el texto para evitar marcadores huérfanos.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico contemporáneo y digno.
  - «Mayordomo» se usa aquí por función contextual, no como título eclesiástico.
  - 'Se evitó sobretraducción: no se añadió objeto explícito en el mandato salvo el pronombre clítico necesario en español.'
  - La segunda cláusula se tradujo con «llevaron» para conservar la posibilidad de lectura alternativa señalada en el audit trail.
