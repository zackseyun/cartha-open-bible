revisions:
- from: 'Y les dijo: «Sáquenlo ahora y llévenlo al mayordomo[a].» Y ellos lo llevaron[b].'
  to: 'Y les dijo: «Saquen un poco ahora y llévenlo al encargado del banquete[a]». Y lo llevaron[b].'
  rationale: Se ajusta ἀντλήσατε a «Saquen un poco» para una extracción de líquido más idiomática y fiel al objeto implícito contextual; se reemplaza «mayordomo» por «encargado del banquete» para reflejar con mayor claridad la función de ἀρχιτρίκλινος en español neutral; y se pule la nota alternativa final para que suene natural en español.
