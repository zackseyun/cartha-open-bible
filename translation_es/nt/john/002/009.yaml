translation:
  language: es
  text: Ahora bien, cuando el encargado del banquete probó el agua que se había convertido en vino[a], y no sabía de dónde procedía (aunque los siervos que habían sacado el agua sí lo sabían)[c][b], el encargado del banquete llama al novio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «maestresala» para «encargado del banquete». El término griego se refiere a la persona que supervisaba el banquete.
    reason: lexical_alternative
  - marker: b
    text: 'Griego: «el agua que había llegado a ser vino»; también puede traducirse: «el agua convertida en vino».'
    reason: lexical_alternative
  - marker: c
    text: 'Juan usa aquí un presente histórico: «llama», aunque en español muchas versiones suavizan con «llamó».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀρχιτρίκλινος
  english_pob_choice: master of the feast
  chosen_spanish: maestro de banquete
  alternatives_spanish:
  - encargado del banquete
  - maestro de ceremonia
  lexicon: BDAG
  rationale: El término designa al que supervisaba el banquete. En español, 'maestro de banquete' conserva la función social sin introducir una explicación más amplia que el griego no exige. 'Encargado del banquete' es posible, pero menos idiomático; 'maestro de ceremonia' suena más interpretativo y menos preciso.
- source_word: ἐγεύσατο
  english_pob_choice: tasted
  chosen_spanish: probó
  alternatives_spanish:
  - gustó
  - saboreó
  lexicon: BDAG
  rationale: Aquí el verbo expresa el acto de probar. 'Probó' es natural en español y mantiene el valor concreto de la acción sin sobrecargar el verbo.
- source_word: τὸ ὕδωρ οἶνον γεγενημένον
  english_pob_choice: the water that had become wine
  chosen_spanish: el agua que se había convertido en vino
  alternatives_spanish:
  - el agua transformada en vino
  - el agua vuelta vino
  lexicon: BDAG
  rationale: El participio perfecto señala un cambio ya consumado con resultado presente. 'Se había convertido en vino' expresa con fidelidad la transformación; 'transformada en vino' también es viable, pero algo más técnico; 'vuelta vino' es más idiomático, pero menos explícito.
- source_word: οὐκ ᾔδει πόθεν ἐστίν
  english_pob_choice: did not know where it came from
  chosen_spanish: no sabía de dónde procedía
  alternatives_spanish:
  - no sabía de dónde venía
  - no sabía cuál era su origen
  lexicon: BDAG
  rationale: πόθεν pregunta por procedencia u origen. 'De dónde procedía' suena natural y conserva el sentido de origen; 'de dónde venía' es correcto pero algo más coloquial; 'cuál era su origen' explicita demasiado la idea.
- source_word: διάκονοι
  english_pob_choice: servants
  chosen_spanish: servidores
  alternatives_spanish:
  - sirvientes
  - criados
  lexicon: BDAG
  rationale: En este contexto narrativo se trata de personal de servicio en la boda, no del oficio eclesiástico posterior. 'Servidores' es una opción neutra y digna en español; 'sirvientes' y 'criados' son posibles, pero más marcados socialmente.
- source_word: ἠντληκότες
  english_pob_choice: had drawn
  chosen_spanish: habían sacado
  alternatives_spanish:
  - habían sacado el agua
  - la habían sacado
  lexicon: BDAG
  rationale: El verbo alude a sacar agua. 'Habían sacado' comunica bien la acción en español; 'habían extraído' sería más técnico, y 'habían acarreado' no corresponde.
- source_word: φωνεῖ
  english_pob_choice: calls
  chosen_spanish: llama
  alternatives_spanish:
  - llamó
  - convoca
  lexicon: BDAG
  rationale: El presente histórico del griego se conserva mejor con el presente español 'llama'. Así se mantiene la vivacidad narrativa observada en el texto fuente.
- source_word: νυμφίον
  english_pob_choice: bridegroom
  chosen_spanish: novio
  alternatives_spanish:
  - esposo
  - novio de la boda
  lexicon: BDAG
  rationale: En el contexto de boda, 'novio' es la forma más natural y clara en español. 'Esposo' introduce una relación matrimonial ya consumada que el contexto inmediato no requiere.
- source_word: ὡς δὲ
  english_pob_choice: Now when
  chosen_spanish: Ahora bien, cuando
  alternatives_spanish:
  - Y cuando
  - Pero cuando
  lexicon: BDAG
  rationale: La combinación introduce la siguiente escena. 'Ahora bien, cuando' da una transición fluida en español sin forzar contraste fuerte.
theological_decisions:
- issue: Descripción narrativa de la señal y su transformación real
  english_pob_reading: 'Translate the clause straightforwardly as an actual transformation: ''the water that had become wine.'''
  chosen_spanish_reading: 'Traducir la cláusula como una transformación real: ''el agua que se había convertido en vino''.'
  alternative_spanish_readings:
  - el agua transformada en vino
  - el agua vuelta vino
  rationale: El griego afirma explícitamente un cambio de estado. La traducción española debe preservar esa transformación real sin diluirla en una impresión subjetiva ni en una mera apariencia.
  doctrine_reference: Juan 2:1-11; filosofía de traducción §1, §3
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hubo cambios necesarios y el control cruzado reportó alta concordancia. Por eso se mantiene una traducción estable, con ajustes solo en la formulación española para naturalidad y claridad sin alterar las decisiones léxicas del audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, aunque este versículo no contiene el tetragrama.
  - '''Mesías/Cristo'' no aplica aquí; se conserva ''novio'' para νυμφίον por ser el término contextual directo.'
  - '''servidores'' se usa para διάκονοι en sentido narrativo de servicio doméstico, evitando la terminología eclesiástica posterior.'
  - Se conserva el presente histórico 'llama' para reflejar la vivacidad del griego en la narración.
