base_translation:
  language: en
  yaml_path: translation/nt/john/002/009.yaml
  text: Now when the master of the feast tasted the water that had become wine[a], and did not know where it came from (though the servants who had drawn the water knew)[c][b], the master of the feast calls the bridegroom
  footnotes:
  - marker: a
    text: Or 'headwaiter' for 'master of the feast.' The Greek term refers to the one overseeing the banquet.
    reason: lexical_alternative
  - marker: b
    text: Greek 'the water having become wine'; alternatively, 'the water turned into wine.'
    reason: lexical_alternative
  - marker: c
    text: 'John uses a historical present here: ''calls,'' though English often renders it ''called.'''
    reason: lexical_alternative
