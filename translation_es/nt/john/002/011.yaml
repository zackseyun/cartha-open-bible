translation:
  language: es
  text: Jesús hizo esto[a], el comienzo de sus señales, en Caná de Galilea, y manifestó su gloria, y sus discípulos creyeron en él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «la primera de sus señales».
    reason: lexical_alternative
lexical_decisions:
- source_word: ταύτην
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - esta señal
  - este milagro
  lexicon: BDAG
  rationale: El demostrativo retoma la acción recién narrada; «esto» evita añadir «señal» o «milagro» donde el griego solo dice el pronombre.
- source_word: ἐποίησεν
  english_pob_choice: did
  chosen_spanish: hizo
  alternatives_spanish:
  - realizó
  - efectuó
  lexicon: BDAG
  rationale: ποιέω es amplio («hacer, realizar»). «Hizo» conserva la sencillez del griego y funciona naturalmente con el demostrativo previo.
- source_word: ἀρχὴν τῶν σημείων
  english_pob_choice: the beginning of his signs
  chosen_spanish: el comienzo de sus señales
  alternatives_spanish:
  - la primera de sus señales
  - el inicio de sus señales
  lexicon: BDAG
  rationale: ἀρχή puede expresar «comienzo» o «primero». Aquí marca el carácter inaugural de la señal en Caná. «Señales» mantiene el valor joánico de σημεῖον mejor que «milagros».
- source_word: σημείων
  english_pob_choice: signs
  chosen_spanish: señales
  alternatives_spanish:
  - milagros
  lexicon: BDAG
  rationale: 'En Juan, σημεῖον tiene peso teológico: actos que revelan. «Señales» preserva mejor esa función que «milagros».'
- source_word: ἐν Κανὰ τῆς Γαλιλαίας
  english_pob_choice: in Cana of Galilee
  chosen_spanish: en Caná de Galilea
  alternatives_spanish:
  - en Caná, en Galilea
  lexicon: BDAG
  rationale: Es la rendición geográfica directa y natural en español, manteniendo la construcción del genitivo sin sobreexplicarla.
- source_word: ἐφανέρωσεν
  english_pob_choice: revealed
  chosen_spanish: manifestó
  alternatives_spanish:
  - reveló
  - dio a conocer
  lexicon: BDAG
  rationale: φανερόω significa hacer visible o conocido. «Manifestó» es digno y comunica bien la idea de dar a conocer su gloria en un sentido visible.
- source_word: τὴν δόξαν αὐτοῦ
  english_pob_choice: his glory
  chosen_spanish: su gloria
  alternatives_spanish:
  - su esplendor
  lexicon: BDAG
  rationale: δόξα es un término teológico clave; «gloria» es la correspondencia estándar en contexto joánico y comunica honor y majestad divina.
- source_word: ἐπίστευσαν εἰς αὐτόν
  english_pob_choice: believed in him
  chosen_spanish: creyeron en él
  alternatives_spanish:
  - pusieron su fe en él
  - confiaron en él
  lexicon: BDAG
  rationale: La construcción πιστεύω con εἰς expresa confianza dirigida hacia Jesús. «Creyeron en él» es idiomática en español y conserva esa fuerza relacional.
- source_word: οἱ μαθηταὶ αὐτοῦ
  english_pob_choice: his disciples
  chosen_spanish: sus discípulos
  alternatives_spanish:
  - los discípulos de él
  lexicon: BDAG
  rationale: Es la forma natural y clara en español; no se pierde ninguna ambigüedad relevante.
theological_decisions:
- issue: Terminología joánica de σημεῖον
  english_pob_reading: Rendered σημεῖα as 'signs' rather than 'miracles.'
  chosen_spanish_reading: Renderizado como «señales» y no como «milagros».
  alternative_spanish_readings:
  - milagros
  rationale: En Juan, estos hechos no solo muestran poder, sino que señalan y revelan la identidad de Jesús. «Señales» conserva mejor esa dimensión reveladora.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; consistency of key terms, or documented exception.'
- issue: Fuerza de ἀρχὴν τῶν σημείων
  english_pob_reading: the beginning of his signs
  chosen_spanish_reading: «el comienzo de sus señales»
  alternative_spanish_readings:
  - «la primera de sus señales»
  rationale: El griego usa ἀρχή («comienzo»). Mantener esa idea refleja más directamente la fuente, aunque la alternativa más idiomática también es viable.
  doctrine_reference: 'Translation philosophy: optimal equivalence; original-language primacy over translation tradition.'
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión más reciente del texto inglés, que ajustó el orden y la puntuación para reflejar mejor la construcción griega «hizo esto, el comienzo de sus señales». La versión española conserva esa relación sintáctica sin añadir contenido.
  spanish_consistency_notes:
  - Se mantiene «señales» para σημεῖα, en coherencia con el uso joánico del término.
  - Se usa «manifestó» para φανερόω como equivalente digno y transparente de «revealed».
  - Se conserva «creyeron en él» para πιστεύω con εἰς, evitando un calco demasiado duro.
  - No se introduce «Cristo» ni «Señor» porque el versículo nombra a Jesús y no usa esos títulos.
