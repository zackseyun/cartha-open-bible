translation:
  language: es
  text: 'Y les dijo a los que vendían palomas[a]: «Quiten esto de aquí; no hagan de la casa de mi Padre una casa de comercio».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pichones». El griego nombra aves vendidas para el templo; «palomas» es la equivalencia más natural y usual en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: περιστερὰς
  english_pob_choice: doves
  chosen_spanish: palomas
  alternatives_spanish:
  - palomas domésticas
  - pichones
  lexicon: BDAG
  rationale: El contexto del templo y de las ofrendas favorece el ave conocida en español como 'paloma'. 'Pichones' es posible, pero menos natural en este contexto; 'palomas domésticas' añade una precisión que el griego no exige.
- source_word: πωλοῦσιν
  english_pob_choice: selling
  chosen_spanish: vendían
  alternatives_spanish:
  - vendiendo
  - que vendían
  lexicon: BDAG
  rationale: El participio presente describe a un grupo identificado por su actividad comercial. En español, la relativa 'que vendían' expresa bien esa función; 'vendían' en imperfecto conserva la idea de acción en curso y resulta natural.
- source_word: Ἄρατε
  english_pob_choice: Take
  chosen_spanish: Quiten
  alternatives_spanish:
  - Saquen
  - Lleven
  lexicon: BDAG
  rationale: El imperativo aoristo pide una acción decidida de retirar lo que estorba. 'Quiten esto de aquí' reproduce la fuerza del mandato en un español claro y directo.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: esto
  alternatives_spanish:
  - estas cosas
  - lo de aquí
  lexicon: BDAG
  rationale: El neutro plural griego probablemente apunta a los enseres o mercancías asociados con la venta. 'Esto' evita sobreespecificar y funciona con naturalidad junto a 'de aquí'.
- source_word: ἐντεῦθεν
  english_pob_choice: away from here
  chosen_spanish: de aquí
  alternatives_spanish:
  - de este lugar
  - de aquí mismo
  lexicon: BDAG
  rationale: El adverbio señala retirada del lugar presente. 'De aquí' es breve, natural y conserva el sentido de alejamiento implicado por el imperativo.
- source_word: μὴ ποιεῖτε
  english_pob_choice: do not make
  chosen_spanish: no hagan
  alternatives_spanish:
  - no conviertan
  - no vuelvan
  lexicon: BDAG
  rationale: Con μή y presente imperativo, la frase es una prohibición. 'No hagan de...' reproduce la estructura del griego sin forzar una paráfrasis interpretativa, aunque en español también se percibe la idea de 'convertir'.
- source_word: οἶκον τοῦ πατρός μου
  english_pob_choice: my Father’s house
  chosen_spanish: la casa de mi Padre
  alternatives_spanish:
  - la casa de mi Padre celestial
  - la casa de mi Padre
  lexicon: BDAG
  rationale: La referencia al templo debe conservar la relación filial explícita en el texto. 'La casa de mi Padre' mantiene el sentido y la forma natural en español, sin diluir el singular posesivo μου.
- source_word: οἶκον ἐμπορίου
  english_pob_choice: a house of trade
  chosen_spanish: una casa de comercio
  alternatives_spanish:
  - una casa de mercado
  - un mercado
  lexicon: BDAG
  rationale: '''ἐμπόριον'' se refiere al comercio o al intercambio mercantil. ''Casa de comercio'' preserva la repetición de ''casa'' en la sentencia, como hace el griego, mejor que ''mercado'', que suaviza el contraste retórico.'
theological_decisions:
- issue: El lenguaje filial de Jesús al decir 'la casa de mi Padre'
  english_pob_reading: 'Retain the explicit filial claim without softening: ''my Father’s house.'''
  chosen_spanish_reading: Conservar explícitamente 'la casa de mi Padre' sin convertirlo en una fórmula más general.
  alternative_spanish_readings:
  - la casa de nuestro Padre
  - la casa de Dios
  rationale: El griego usa el posesivo singular μου con πατρός. En español debe mantenerse esa relación única y directa, porque forma parte del peso cristológico de la escena y de la autoridad con que Jesús habla.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD, including the homoousios language); Translation philosophy §1 original-language primacy over translation tradition.'
translation_notes:
  revision_awareness: El borrador sigue de cerca el paquete fuente griego y el audio de decisión inglés. Se mantiene la repetición de 'casa' en la segunda cláusula, como en el griego, y se evita suavizar el mandato o reemplazar el posesivo singular de Jesús por una formulación más general.
  spanish_consistency_notes:
  - Se conserva un registro bíblico contemporáneo, digno y claro.
  - Se mantiene 'mi Padre' para reflejar el valor cristológico del texto.
  - '''Casa de comercio'' preserva la repetición semántica de ''casa ... casa'' del griego.'
  - El verbo 'hagan' reproduce una prohibición directa sin añadir matices no presentes en el original.
