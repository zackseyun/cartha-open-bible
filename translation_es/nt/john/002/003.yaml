translation:
  language: es
  text: 'Y cuando se acabó el vino[a], la madre de Jesús le dice[b]: «No tienen vino».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «cuando faltaba el vino».'
    reason: lexical_alternative
  - marker: b
    text: 'El griego usa el presente histórico: «dice». Algunas traducciones lo vierten como «dijo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑστερήσαντος οἴνου
  english_pob_choice: when the wine ran out
  chosen_spanish: cuando se acabó el vino
  alternatives_spanish:
  - cuando faltó el vino
  - cuando el vino se agotó
  lexicon: BDAG
  rationale: El genitivo absoluto expresa una circunstancia anterior a la acción principal. En español, «se acabó el vino» comunica de forma natural la idea de escasez o agotamiento sin perder el sentido del griego.
- source_word: λέγει
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - dijo
  lexicon: BDAG
  rationale: Se conserva el presente histórico de Juan con «dice», que refleja mejor el tiempo narrativo del griego que un pasado simple, aunque ambos son posibles en español.
- source_word: μήτηρ τοῦ Ἰησοῦ
  english_pob_choice: the mother of Jesus
  chosen_spanish: la madre de Jesús
  alternatives_spanish:
  - Jesús' madre
  - la madre de Jesús
  lexicon: BDAG
  rationale: La expresión sigue de cerca el griego y mantiene la designación característica de María en este contexto narrativo.
- source_word: πρὸς αὐτόν
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: En español, con el verbo de habla en presente, el complemento indirecto natural es «le»; evita una repetición pesada y conserva el valor direccional de la preposición.
- source_word: Οἶνον οὐκ ἔχουσιν
  english_pob_choice: They have no wine
  chosen_spanish: No tienen vino
  alternatives_spanish:
  - No hay vino para ellos
  - No tienen vino
  lexicon: BDAG
  rationale: El griego deja implícito el sujeto plural. En español, la omisión del sujeto es natural y preserva la indeterminación del referente mejor que explicitarlo.
- source_word: οἶνος
  english_pob_choice: wine
  chosen_spanish: vino
  alternatives_spanish:
  - vino
  lexicon: BDAG
  rationale: El sentido ordinario es vino fermentado; no hay base contextual para atenuar o paraphrasear el término.
theological_decisions:
- issue: Presente histórico en el relato joánico
  english_pob_reading: Preserve the present tense with 'says'
  chosen_spanish_reading: Preservar el presente con «dice»
  alternative_spanish_readings:
  - Usar «dijo» para un relato más fluido en pasado
  rationale: Es una decisión de estilo narrativo, no doctrinal; el presente conserva mejor la viveza del relato y corresponde al valor del griego.
  doctrine_reference: Translation philosophy §1, §6
- issue: Referente del sujeto plural implícito
  english_pob_reading: Leave the subject implicit in context as 'they' rather than specifying 'the hosts'
  chosen_spanish_reading: Mantener el sujeto implícito en «No tienen vino»
  alternative_spanish_readings:
  - No tienen vino los anfitriones
  - No tiene vino la fiesta
  rationale: El griego no identifica explícitamente a los que carecen de vino; el español sin sujeto expreso preserva esa ambigüedad narrativa.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'Se revisó la coherencia con el texto griego y con el audit trail inglés: se mantuvo el presente histórico, se preservó la ambigüedad del sujeto implícito y se evitó introducir información no explícita en el verso.'
  spanish_consistency_notes:
  - «vino» conserva el valor léxico ordinario de οἶνος.
  - La elisión del sujeto en «No tienen vino» es idiomática en español y respeta el plural implícito.
  - Se mantiene la designación «la madre de Jesús» conforme al patrón narrativo del texto fuente.
