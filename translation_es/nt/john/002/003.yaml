    issue: Alternativa lexical interna «Jesús' madre»
    rationale: En las decisiones léxicas del borrador aparece «Jesús' madre» como alternativa, forma no natural en español. Sin embargo, esto no afecta el texto bíblico publicado, que correctamente dice «la madre de Jesús».
