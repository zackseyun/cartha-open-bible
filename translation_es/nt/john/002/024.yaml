translation:
  language: es
  text: Pero Jesús mismo no se entregaba a ellos[a], porque él conocía a todos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego usa el mismo verbo que en el versículo anterior: muchos «creyeron en» Jesús, pero Jesús no se «entregaba a» ellos. La idea es que no se ponía en sus manos ni se confiaba a ellos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: αὐτὸς δὲ Ἰησοῦς
  english_pob_choice: But Jesus himself
  chosen_spanish: Pero Jesús mismo
  alternatives_spanish:
  - Pero Jesús
  - Ahora Jesús mismo
  lexicon: BDAG
  rationale: αὐτός en posición enfática se conserva con «mismo» para reflejar el contraste con los que creyeron en él en el versículo anterior. δέ introduce el giro adversativo, bien expresado por «Pero».
- source_word: ἐπίστευεν
  english_pob_choice: was not entrusting
  chosen_spanish: no se confiaba
  alternatives_spanish:
  - no se entregaba
  - no se encomendaba
  lexicon: BDAG
  rationale: Aquí πιστεύω rige un objeto personal con complemento dativo, por lo que el sentido no es «creer» sino «confiar/entregar(se)». En español, «no se confiaba a ellos» comunica la idea de autoentrega o auto-encargo; el imperfecto queda reflejado por la acción en curso/disposicional.
- source_word: αὑτὸν αὐτοῖς
  english_pob_choice: himself to them
  chosen_spanish: a ellos
  alternatives_spanish:
  - a esas personas
  - a ellos mismos
  lexicon: BDAG
  rationale: El reflexivo con dativo expresa la autoentrega de Jesús. En español, la construcción «se confiaba a ellos» preserva la relación semántica sin forzar una calca innecesaria.
- source_word: διὰ τὸ
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - puesto que
  lexicon: BDAG
  rationale: La construcción causal con artículo e infinitivo se vierte naturalmente por «porque», que expresa la causa de manera clara y fiel.
- source_word: αὐτὸν γινώσκειν
  english_pob_choice: he knew
  chosen_spanish: él conocía
  alternatives_spanish:
  - él sabía
  - él reconocía
  lexicon: BDAG
  rationale: El infinitivo se expresa en español con una oración finita. γινώσκω aquí denota conocimiento personal y discernimiento; «conocía» conserva bien ese matiz sin excesiva paráfrasis.
- source_word: πάντας
  english_pob_choice: all people
  chosen_spanish: a todos
  alternatives_spanish:
  - a todas las personas
  - a todos los hombres
  lexicon: BDAG
  rationale: El plural masculino en contexto apunta a la humanidad en general. «A todos» es natural en español y mantiene la amplitud del referente sin introducir una especificación innecesaria.
theological_decisions:
- issue: Repetición de πιστεύω en vv. 23–24 y su contraste retórico
  english_pob_reading: Use 'believed' in v. 23 and 'entrusting' in v. 24, while preserving the lexical connection in documentation.
  chosen_spanish_reading: Usar «creyeron» en el versículo anterior y «no se confiaba» aquí, manteniendo documentada la relación léxica.
  alternative_spanish_readings:
  - «no creía»
  - «no confiaba en ellos»
  rationale: En español, repetir «creer» aquí oscurecería el sentido contextual de πιστεύω con complemento personal. «No se confiaba» comunica la idea de autoentrega retenida y conserva el contraste retórico con quienes «creyeron en» Jesús en el contexto inmediato.
  doctrine_reference: 'Translation philosophy #5 (consistencia de términos clave con excepción documentada)'
- issue: Alcance de πάντας
  english_pob_reading: all people
  chosen_spanish_reading: a todos
  alternative_spanish_readings:
  - a todas las personas
  - a todos los hombres
  rationale: El texto presenta el conocimiento universal de Jesús sin restringirlo a un grupo. «A todos» es inclusivo en español y no añade una carga doctrinal ajena al versículo.
  doctrine_reference: 'Translation philosophy #4 (precisión semántica y adecuación de género)'
translation_notes:
  revision_awareness: 'La revisión más reciente indicó acuerdo alto y no introdujo cambios. Esta propuesta conserva la lectura principal del audit trail: el contraste entre la fe aparente de muchos y la reserva de Jesús, con el matiz de πιστεύω documentado en la nota.'
  spanish_consistency_notes:
  - Se mantiene «Jesús» como nombre propio invariable.
  - Se conserva el tono sobrio y directo adecuado para texto bíblico.
  - «Mismo» traduce la fuerza enfática de αὐτός sin sobrecargar la sintaxis.
  - La nota a pie de página marca la conexión verbal con el versículo anterior y evita perder el juego léxico de πιστεύω.
