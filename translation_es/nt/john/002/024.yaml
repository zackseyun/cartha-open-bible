review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: el contraste adversativo, el énfasis en «Jesús mismo», el valor de πιστεύω como autoentrega/entrustment y la causa «porque conocía…». Sin embargo, «no se confiaba a ellos» en español puede sugerir más naturalmente que Jesús no les contaba cosas o no les tenía confianza, y no expresa con suficiente claridad la idea de no entregarse/no ponerse en sus manos. Además, πάντας está bien como «a todos», pero en esta frase conviene explicitar «a todos» sin cambiar el alcance.'
  spanish_quality_summary: 'El texto es legible y digno, pero «se confiaba a ellos» suena algo ambiguo en español moderno eclesial general. Una leve reparación a «no se ponía en sus manos» haría el sentido más claro, aunque se alejaría del juego léxico; mejor es conservar una formulación cercana con una nota explicativa y ajustar a una expresión más natural: «no se entregaba a ellos». Esto comunica mejor la autoentrega retenida. El resto del verso es natural.'
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. «Jesús» está correcto. La decisión clave es πιστεύω: debe conservarse el vínculo con v. 23 mediante nota, pero en español conviene evitar un giro que sugiera simplemente ‘confiar en’. «Entregarse» funciona como excepción documentada y sigue la rationale inglesa. '
  issues:
  - severity: medium
    issue: «no se confiaba a ellos» es semánticamente ambigua en español
    rationale: Puede entenderse como ‘no les tenía confianza’ o ‘no les revelaba cosas’, mientras que αὑτὸν αὐτοῖς con πιστεύω apunta a no entregarse/no encomendarse personalmente a ellos.
  - severity: low
    issue: La nota actual con «no se “confió” a ellos» hereda la misma ambigüedad
    rationale: La nota debe seguir mostrando el juego verbal con el versículo anterior, pero conviene explicar con un verbo español más claro para evitar confusión en lectores comunes.
  revised_spanish_text: Pero Jesús mismo no se entregaba a ellos[a], porque él conocía a todos.
  revised_footnotes:
  - marker: a
    text: 'El griego usa el mismo verbo que en el versículo anterior: muchos «creyeron en» Jesús, pero Jesús no se «entregaba a» ellos. La idea es que no se ponía en sus manos ni se confiaba a ellos.'
    reason: lexical_alternative
  revision_rationale: 'Se revisa únicamente el verbo principal para expresar con más claridad en español el valor de πιστεύω con objeto personal y dativo: no mera falta de confianza, sino negativa de autoentrega. Se conserva la nota para documentar el juego léxico con el versículo anterior.'
