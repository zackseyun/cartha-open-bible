translation:
  language: es
  text: Jesús también fue invitado a la boda[a], junto con sus discípulos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: “Jesús también fue invitado, y sus discípulos, a la boda.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκλήθη
  english_pob_choice: was invited
  chosen_spanish: fue invitado
  alternatives_spanish:
  - fue llamado
  - fue convocado
  lexicon: BDAG
  rationale: El pasivo de καλέω, en el contexto de una celebración social, significa aquí “ser invitado”. En español, “fue invitado” comunica de manera natural la idea sin perder la relación con el evento.
- source_word: δὲ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - y
  - ahora
  lexicon: BDAG
  rationale: δέ introduce una adición suave al relato. En español, “también” expresa bien la suma de Jesús a los ya incluidos en el contexto anterior.
- source_word: καὶ
  english_pob_choice: also / along with
  chosen_spanish: junto con
  alternatives_spanish:
  - y
  - también
  lexicon: BDAG
  rationale: El segundo καί coordina a Jesús con sus discípulos. “Junto con” evita una repetición áspera de “y” y mantiene la relación de acompañamiento.
- source_word: ὁ Ἰησοῦς
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  lexicon: BDAG
  rationale: Nombre propio transliterado conforme a la norma del proyecto.
- source_word: οἱ μαθηταὶ αὐτοῦ
  english_pob_choice: his disciples
  chosen_spanish: sus discípulos
  alternatives_spanish:
  - sus estudiantes
  - sus seguidores
  lexicon: BDAG
  rationale: μαθηταί en los evangelios se refiere de forma estable a “discípulos”. “Sus discípulos” preserva el vínculo maestro–aprendices y el término eclesial ya asentado.
- source_word: εἰς τὸν γάμον
  english_pob_choice: to the wedding
  chosen_spanish: a la boda
  alternatives_spanish:
  - al casamiento
  - a la celebración de bodas
  lexicon: BDAG
  rationale: γάμος aquí designa la boda como acontecimiento. “Boda” es el equivalente natural y claro en español actual, sin añadir “banquete” o “feast”, que el griego no expresa explícitamente.
translation_notes:
  revision_awareness: 'El texto griego y el audit trail en inglés muestran una decisión ya estable: ἐκλήθη se entiende como invitación social, no como simple llamado. La versión española conserva esa lectura y sigue la misma equivalencia óptima, sin introducir elementos ajenos al verso.'
  spanish_consistency_notes:
  - Se mantiene “Jesús” como nombre propio transliterado, conforme a la política del proyecto.
  - Se usa “discípulos” y no “estudiantes” para conservar el valor técnico y narrativo de μαθηταί en Juan.
  - Se prefiere “boda” a “matrimonio” o “banquete de bodas” porque el contexto inmediato habla del evento, no de la institución matrimonial.
