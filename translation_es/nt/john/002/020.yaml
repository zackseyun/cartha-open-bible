    text: Or 'the Judeans.' The Greek says 'the Jews,' a term John uses in varied ways depending on context.
    reason: alternative_reading
  - marker: b
    text: Or 'rebuild it.' The Greek verb can be understood by the speakers in a construction sense, but 'raise it up' preserves the wording that John later connects to Jesus' resurrection.
