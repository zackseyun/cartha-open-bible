translation:
  language: es
  text: 'Entonces los judíos[a] dijeron: «Este templo se construyó en cuarenta y seis años, ¿y tú lo levantarás[b] en tres días?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los judeanos». El griego dice «los judíos», un término que Juan usa de maneras diversas según el contexto.
    reason: alternative_reading
  - marker: b
    text: O «lo reconstruirás». El verbo griego puede entenderse, desde la perspectiva de los interlocutores, en sentido de construcción; pero «lo levantarás» conserva la redacción que Juan relaciona después con la resurrección de Jesús.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Entonces
  alternatives_spanish:
  - Así que
  - Por eso
  lexicon: BDAG
  rationale: Marca la conexión inferencial con la declaración anterior de Jesús. «Entonces» conserva la continuidad discursiva con un español natural y sobrio.
- source_word: οἱ Ἰουδαῖοι
  english_pob_choice: the Jews
  chosen_spanish: los judíos
  alternatives_spanish:
  - los judeanos
  - los dirigentes judíos
  lexicon: BDAG
  rationale: El griego dice literalmente «los judíos». Mantenerlo en español preserva el dato textual sin estrechar indebidamente el referente. La ambigüedad johánica queda documentada en nota.
- source_word: Τεσσεράκοντα καὶ ἓξ ἔτεσιν
  english_pob_choice: in forty-six years
  chosen_spanish: en cuarenta y seis años
  alternatives_spanish:
  - durante cuarenta y seis años
  lexicon: BDAG
  rationale: El dativo de tiempo expresa duración del proceso de edificación. «En cuarenta y seis años» reproduce bien la cifra y el sentido de plazo transcurrido en español bíblico actual.
- source_word: οἰκοδομήθη
  english_pob_choice: was built
  chosen_spanish: fue construido
  alternatives_spanish:
  - fue edificado
  - estuvo en construcción
  lexicon: BDAG
  rationale: El aoristo pasivo señala un hecho resumido de construcción. «Fue construido» es claro, fiel y no adelanta la idea de reconstrucción que los hablantes no expresan explícitamente.
- source_word: ὁ ναὸς οὗτος
  english_pob_choice: this temple
  chosen_spanish: este templo
  alternatives_spanish:
  - este santuario
  - este recinto del templo
  lexicon: BDAG
  rationale: ναός designa el templo/santuario en sentido específico. En español, «templo» es la forma más natural y fiel en este contexto.
- source_word: καὶ σὺ
  english_pob_choice: and will you
  chosen_spanish: ¿y tú
  alternatives_spanish:
  - ¿y tú vas a
  - ¿y tú podrás
  lexicon: BDAG
  rationale: El σὺ es enfático en la pregunta retórica. El orden español con «¿y tú…?» conserva esa confrontación directa y el tono incrédulo.
- source_word: ἐν τρισὶν ἡμέραις
  english_pob_choice: in three days
  chosen_spanish: en tres días
  alternatives_spanish:
  - dentro de tres días
  lexicon: BDAG
  rationale: Expresión temporal idiomática; «en tres días» mantiene la sencillez del griego y su valor anticipatorio en la narrativa.
- source_word: ἐγερεῖς
  english_pob_choice: raise it up
  chosen_spanish: lo levantarás
  alternatives_spanish:
  - lo resucitarás
  - lo reedificarás
  - lo reconstruirás
  lexicon: BDAG
  rationale: ἐγείρω puede significar «levantar» y, por su eco posterior en Juan, puede sostener una lectura con resonancia de resurrección. En español, «lo levantarás» reproduce mejor esa tensión que «reconstruirás», aunque la frase admitirá también la lectura constructiva del interlocutor.
- source_word: αὐτόν
  english_pob_choice: it
  chosen_spanish: lo
  alternatives_spanish:
  - lo mismo
  lexicon: BDAG
  rationale: Se refiere a ναός, masculino en griego; en español, el pronombre objeto directo masculino «lo» es natural y preciso.
theological_decisions:
- issue: Posible sesgo anti-judío en οἱ Ἰουδαῖοι
  english_pob_reading: Retain 'the Jews' in the main text
  chosen_spanish_reading: Mantener «los judíos» en el texto principal
  alternative_spanish_readings:
  - los judeanos
  - los dirigentes judíos
  rationale: La versión sigue la formulación griega directa y evita una especificación interpretativa no presente en el verso. La nota documenta la posibilidad de «judeanos» sin ocultar el término del original.
  doctrine_reference: Translation philosophy §1, §3
- issue: Relación de ἐγερεῖς con el lenguaje de resurrección
  english_pob_reading: Translate as 'raise it up'
  chosen_spanish_reading: Traducir con «lo levantarás»
  alternative_spanish_readings:
  - lo reconstruirás
  - lo reedificarás
  rationale: 'La frase conserva la ambigüedad productiva del texto: los oyentes piensan en el templo físico, mientras que Juan la enlaza luego con la resurrección de Jesús. «Levantarás» preserva esa tensión sin resolverla prematuramente.'
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'La versión se mantiene en alta concordancia con el audit trail inglés y con la última revisión, sin cambios sustantivos respecto del sentido: conserva el referente de «los judíos», el plazo de cuarenta y seis años, y la ambigüedad de ἐγείρω/ἐγερεῖς entre construcción y resonancia de resurrección.'
  spanish_consistency_notes:
  - Se usa «templo» para ναός por ser el equivalente natural y bíblicamente comprensible en español.
  - Se conserva «los judíos» en el texto principal por fidelidad al original; la ambigüedad histórica/retórica queda registrada en nota.
  - «Lo levantarás» mantiene el vínculo verbal con la posible lectura de resurrección, evitando resolverla como mera reconstrucción.
