    text: 'El griego usa dos verbos distintos para lavar: λούω («bañar», de lavar el cuerpo entero) y νίπτω («lavar», a menudo una parte del cuerpo, como los pies).'
    reason: lexical_alternative
  revision_rationale: Se ajusta «está todo limpio» a «está completamente limpio» para reflejar con mayor precisión καθαρὸς ὅλος y mantener un tono más natural y digno. También se reubica la nota al término relevante para la distinción léxica entre λούω y νίπτω. Se mantiene el resto de la redacción, que es fiel y clara.
