review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien el sentido general del griego y preserva la distinción clave entre λούω («bañarse») y νίπτω («lavarse»), además de mantener la tensión entre limpieza literal y simbólica. También vierte adecuadamente el presente histórico como pretérito narrativo. Sin embargo, «pues está todo limpio» no representa con suficiente precisión καθαρὸς ὅλος, que se entiende mejor como «está completamente limpio» o «está limpio por completo», no como si cada parte estuviera ‘limpia’ en una formulación algo coloquial. Además, la nota [a] está anclada en «necesidad», cuando corresponde mejor anclarla en «bañado» o «lavarse los pies», ya que la nota explica la diferencia entre los dos verbos de lavado.
  spanish_quality_summary: El español es claro, natural y de registro digno. «Jesús le dijo» y «Y ustedes están limpios» funcionan bien para un español neutral latinoamericano. La principal debilidad estilística es «está todo limpio», que suena menos preciso e incluso ligeramente coloquial frente al griego y frente al tono del pasaje. Reubicar la nota al verbo pertinente también mejora la legibilidad editorial.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Se preserva correctamente «Jesús», y la elección de «limpio/limpios» para καθαρός está bien. La distinción léxica entre «bañado» y «lavarse los pies» está alineada con la racionalidad documentada del POB.
  issues:
  - severity: medium
    issue: «está todo limpio» suaviza y formula de modo menos preciso καθαρὸς ὅλος
    rationale: El griego expresa una limpieza total/completa. «Está todo limpio» puede sonar a giro coloquial o distributivo; «está completamente limpio» preserva mejor la fuerza de ὅλος como intensificador adverbial.
  - severity: low
    issue: La nota [a] está anclada en un lugar poco pertinente
    rationale: La nota explica la diferencia entre λούω y νίπτω, por lo que debe ir junto a «bañado» o «lavarse los pies», no junto a «necesidad».
  revised_spanish_text: 'Jesús le dijo: «El que se ha bañado[a] no tiene necesidad sino de lavarse los pies, sino que está completamente limpio. Y ustedes están limpios, pero no todos».'
