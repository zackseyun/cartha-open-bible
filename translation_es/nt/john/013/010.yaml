translation:
  language: es
  text: 'Jesús le dijo: «El que se ha bañado[a] no tiene necesidad sino de lavarse los pies, sino que está completamente limpio. Y ustedes están limpios, pero no todos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego usa dos verbos distintos para lavar: λούω («bañar», de lavar el cuerpo entero) y νίπτω («lavar», a menudo una parte del cuerpo, como los pies).'
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει αὐτῷ ὁ Ἰησοῦς
  english_pob_choice: Jesus said to him
  chosen_spanish: Jesús le dijo
  alternatives_spanish:
  - Jesús le dice
  lexicon: BDAG
  rationale: Se conserva el presente histórico de λέγει en el flujo narrativo, pero en español bíblico publicado es natural y claro verterlo con pretérito simple. Se mantiene el destinatario indirecto con le, como en el griego.
- source_word: Ὁ λελουμένος
  english_pob_choice: The one who has bathed
  chosen_spanish: El que se ha bañado
  alternatives_spanish:
  - El que se ha lavado
  - El que se ha bañado
  lexicon: BDAG
  rationale: λελουμένος es participio perfecto de λούω y apunta al baño completo, no al lavado parcial. «Se ha bañado» conserva mejor esa diferencia que «se ha lavado» y mantiene el estado resultante.
- source_word: οὐκ ἔχει χρείαν
  english_pob_choice: has no need
  chosen_spanish: no tiene necesidad
  alternatives_spanish:
  - no necesita
  lexicon: BDAG
  rationale: La expresión idiomática se vierte de forma directa con «no tiene necesidad», que refleja bien ἔχει χρείαν sin suavizar el giro. La nota explica que el texto dice literalmente «necesidad».
- source_word: εἰ μὴ
  english_pob_choice: except
  chosen_spanish: sino
  alternatives_spanish:
  - excepto
  lexicon: BDAG
  rationale: Aquí εἰ μὴ introduce la única excepción al enunciado anterior. En español, «sino» comunica con naturalidad esa exclusión y evita una construcción más pesada.
- source_word: τοὺς πόδας νίψασθαι
  english_pob_choice: to wash his feet
  chosen_spanish: lavarse los pies
  alternatives_spanish:
  - lavar sus pies
  - lavarse los pies
  lexicon: BDAG
  rationale: νίπτω se refiere al lavado de una parte del cuerpo, en contraste con λούω. «Lavarse los pies» conserva la imagen parcial y suena natural en español; el reflexivo expresa el sujeto implícito sin añadir contenido interpretativo.
- source_word: καθαρὸς ὅλος
  english_pob_choice: completely clean
  chosen_spanish: está todo limpio
  alternatives_spanish:
  - está completamente limpio
  - está totalmente limpio
  lexicon: BDAG
  rationale: ὅλος intensifica καθαρὸς con sentido de totalidad. «Está todo limpio» preserva esa fuerza completa y, en español, suena natural sin perder la imagen de limpieza ritual y simbólica.
- source_word: καὶ ὑμεῖς καθαροί ἐστε
  english_pob_choice: And you are clean
  chosen_spanish: Y ustedes están limpios
  alternatives_spanish:
  - Y vosotros estáis limpios
  - Y ustedes son limpios
  lexicon: BDAG
  rationale: Se mantiene el plural dirigido a los discípulos y la repetición de καθαρός con «limpios». «Están» respeta el valor de estado presente; «ustedes» es la forma neutral y ampliamente usable en español latinoamericano.
- source_word: ἀλλ’ οὐχὶ πάντες
  english_pob_choice: but not all of you
  chosen_spanish: pero no todos
  alternatives_spanish:
  - pero no todos ustedes
  - pero no todos de ustedes
  lexicon: BDAG
  rationale: La frase contrasta el enunciado general con una excepción interna al grupo. «No todos» es fiel y natural en español; el referente sigue claro por el contexto inmediato.
theological_decisions:
- issue: Mantener la distinción entre bañarse y lavarse los pies sin resolver la imagen en la explicación
  english_pob_reading: Retain 'bathed,' 'wash his feet,' and 'clean' without making the symbolism explicit in the main text.
  chosen_spanish_reading: Conservar «se ha bañado», «lavarse los pies» y «limpios» sin explicitar en el texto principal el sentido simbólico.
  alternative_spanish_readings:
  - Interpretar explícitamente como «espiritualmente limpio»
  - Reducir ambos verbos a «lavarse»
  rationale: El dicho de Jesús funciona a la vez en el nivel literal y en el simbólico. Mantener la diferencia léxica entre λούω y νίπτω preserva esa tensión y evita cerrar el sentido en una paráfrasis doctrinal.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it
- issue: Participio singular masculino con sentido genérico
  english_pob_reading: Use 'The one who has bathed' rather than a masculine-specific 'He who has bathed.'
  chosen_spanish_reading: 'Usar una forma genérica singular: «El que se ha bañado».'
  alternative_spanish_readings:
  - «Quien se ha bañado»
  - «Él que se ha bañado»
  rationale: El participio griego es masculino singular, pero aquí funciona de modo genérico. «El que» conserva el singular y la referencia general sin introducir una lectura exclusivamente masculina en español.
  doctrine_reference: Translation philosophy §4 Gender-accurate over gender-neutral
translation_notes:
  revision_awareness: No se registraron revisiones aplicadas en el expediente inglés; el último pase indicó que no eran necesarios cambios. La presente propuesta sigue de cerca la decisión léxica y teológica ya auditada, ajustándola a un español natural y fiel al contraste entre λούω y νίπτω.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero este versículo no contiene el nombre divino.
  - «Jesús» se conserva como forma fija del nombre propio.
  - Se usa «limpios» para καθαροί, evitando «puros» para no desplazar la imagen de limpieza del contexto.
  - Se adopta «ustedes» como registro neutral latinoamericano, coherente con el estilo objetivo de esta versión.
