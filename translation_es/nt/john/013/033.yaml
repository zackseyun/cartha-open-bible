translation:
  language: es
  text: Hijitos[a], todavía un poco más estaré con ustedes. Me buscarán, y así como les dije a los judíos, «Adonde yo voy, ustedes no pueden venir[b]», ahora también les digo a ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Niños», aunque «hijitos» conserva mejor el matiz afectuoso y diminutivo del griego.
    reason: lexical_alternative
  - marker: b
    text: O más formalmente, «ustedes no son capaces de venir».
    reason: lexical_alternative
lexical_decisions:
- source_word: τεκνία
  english_pob_choice: Little children
  chosen_spanish: Hijitos
  alternatives_spanish:
  - Niños
  - Queridos hijos
  lexicon: BDAG
  rationale: El diminutivo vocativo expresa ternura y cercanía afectiva. “Hijitos” conserva mejor que “niños” la relación familiar y el matiz diminutivo, sin sonar demasiado pesado en español.
- source_word: ἔτι μικρόν
  english_pob_choice: a little while longer
  chosen_spanish: todavía por un poco
  alternatives_spanish:
  - por un poco más
  - todavía un poco más
  lexicon: BDAG
  rationale: La expresión marca un tiempo breve que aún queda. “Todavía por un poco” mantiene el valor temporal sin forzar un giro demasiado literal ni perder naturalidad en español.
- source_word: μεθ’ ὑμῶν εἰμι
  english_pob_choice: I am with you
  chosen_spanish: estoy con ustedes
  alternatives_spanish:
  - permanezco con ustedes
  - sigo con ustedes
  lexicon: BDAG
  rationale: El presente indica presencia real y directa. “Estoy con ustedes” es la forma más natural y fiel en español; “permanezco” sería posible, pero introduce un matiz más interpretativo.
- source_word: ζητήσετέ με
  english_pob_choice: You will seek me
  chosen_spanish: Me buscarán
  alternatives_spanish:
  - Me procurarán
  - Me buscarán con afán
  lexicon: BDAG
  rationale: ζητέω puede significar buscar o buscar con propósito. “Me buscarán” es idiomático y suficiente para reflejar el futuro sin cargar el verbo con un matiz que el contexto no exige aquí.
- source_word: καθὼς εἶπον τοῖς Ἰουδαίοις
  english_pob_choice: just as I said to the Jews
  chosen_spanish: así como dije a los judíos
  alternatives_spanish:
  - tal como dije a los judíos
  - así como les dije a los judíos
  lexicon: BDAG
  rationale: Se mantiene el referente literal “los judíos” porque el griego no lo restringe explícitamente. “Así como” reproduce la comparación de καθώς y la forma verbal directa conserva la referencia histórica del dicho anterior.
- source_word: Ὅπου ἐγὼ ὑπάγω
  english_pob_choice: Where I am going
  chosen_spanish: Donde yo voy
  alternatives_spanish:
  - Donde estoy yendo
  - Donde yo me voy
  lexicon: BDAG
  rationale: ὑπάγω implica irse o dirigirse hacia un lugar. “Donde yo voy” es natural en español y conserva la idea de destino y movimiento sin añadir información no explicitada.
- source_word: οὐ δύνασθε ἐλθεῖν
  english_pob_choice: you are not able to come
  chosen_spanish: ustedes no pueden venir
  alternatives_spanish:
  - ustedes no son capaces de venir
  - ustedes no pueden llegar
  lexicon: BDAG
  rationale: El énfasis está en la imposibilidad de acceso. “No pueden venir” comunica bien la restricción; aunque “no son capaces” preserva más literalmente δύνασθε, en español suena más enfático y menos natural en este contexto.
- source_word: καὶ ὑμῖν λέγω ἄρτι
  english_pob_choice: so now I also say to you
  chosen_spanish: también ahora les digo a ustedes
  alternatives_spanish:
  - y ahora les digo
  - y también ahora les digo
  lexicon: BDAG
  rationale: El griego enlaza lo dicho a los judíos con lo que ahora se aplica a los discípulos. “También ahora” reproduce bien la continuidad discursiva; “les digo a ustedes” deja claro el destinatario sin perder fluidez.
theological_decisions:
- issue: Renderizado de Ἰουδαίοις en contexto joánico
  english_pob_reading: the Jews
  chosen_spanish_reading: los judíos
  alternative_spanish_readings:
  - los líderes judíos
  - las autoridades judías
  rationale: Se conserva la expresión literal del griego porque el contexto inmediato no obliga a restringirla. Aunque en Juan a veces puede referir a autoridades judeanas, aquí la traducción principal debe mantener la tensión interpretativa en vez de resolverla por anticipado.
  doctrine_reference: Primacía del texto original y preservación de ambigüedad contextual cuando el propio contexto no la resuelve.
translation_notes:
  revision_awareness: Se revisó la correspondencia con el texto griego SBLGNT y con el criterio auditado de la POB en inglés; no se detectaron cambios necesarios respecto del sentido, la fuerza verbal ni la referencia de ‘los judíos’.
  spanish_consistency_notes:
  - Se prefirió ‘Yahvé’ cuando aparece el nombre divino; este versículo no contiene el tetragrámaton.
  - Se mantuvo ‘los judíos’ por fidelidad al griego y a la decisión auditada de la POB inglesa.
  - Se usó el tuteo plural ‘ustedes’ para coherencia con el español bíblico neutral latinoamericano.
