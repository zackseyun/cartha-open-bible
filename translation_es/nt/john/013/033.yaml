base_translation:
  language: en
  yaml_path: translation/nt/john/013/033.yaml
  text: Little children[a], I am with you a little while longer. You will seek me, and just as I said to the Jews, ‘Where I am going[b], you are not able to come,’ so now I also say to you.
  footnotes:
  - marker: a
    text: Or 'the Jewish leaders,' since in John 'the Jews' can sometimes refer more specifically to the Judean authorities depending on context.
    reason: alternative_reading
  - marker: b
    text: Or more simply, 'you cannot come.'
    reason: lexical_alternative
