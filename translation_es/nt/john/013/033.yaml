review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del griego: vocativo afectuoso, brevedad del tiempo restante, futura búsqueda, referencia al dicho previo a los judíos y la imposibilidad de venir adonde Jesús va. Sin embargo, dos giros no preservan de la mejor manera el sentido y la naturalidad: «todavía por un poco» es poco idiomático para ἔτι μικρόν, y «Donde yo voy» suena menos natural y menos claramente prospectivo que «Adonde yo voy» o «Adonde voy». Además, la nota [b] está mal anclada: comenta «ustedes no pueden venir» pero está colocada sobre «voy».'
  spanish_quality_summary: El texto es mayormente claro y digno, pero contiene giros algo calcados. «Todavía un poco más estaré con ustedes» o «Estoy con ustedes un poco más» suena mejor en español neutral. «También ahora les digo a ustedes» es comprensible, pero «así ahora también se lo digo a ustedes» o «ahora también les digo a ustedes» fluye mejor y conserva la relación discursiva. «Hijitos» es adecuado en registro eclesial y mantiene la ternura del diminutivo.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «los judíos» respeta la decisión documentada para Ἰουδαίοις. No aparecen términos del glosario mayor como Yahvé/Mesías/esclavo. La elección «Hijitos» para τεκνία es coherente con la racionalidad léxica del POB.
  issues:
  - severity: medium
    issue: «todavía por un poco» es poco natural en español
    rationale: Aunque intenta reflejar ἔτι μικρόν, en español neutro suena forzado. Una formulación como «todavía un poco más» o «por poco tiempo más» comunica mejor el tiempo breve restante sin pérdida semántica.
  - severity: medium
    issue: «Donde yo voy» no es la mejor opción para Ὅπου ἐγὼ ὑπάγω
    rationale: En este contexto de destino/traslado, «Adonde yo voy» suena más natural y preciso en español que «Donde yo voy», que puede leerse más estáticamente.
  - severity: high
    issue: La nota [b] está anclada en la frase equivocada
    rationale: La nota dice «O más simplemente, “ustedes no pueden venir”», que comenta οὐ δύνασθε ἐλθεῖν, pero el marcador [b] aparece sobre «voy». Esto incumple la disciplina de anclaje de notas y puede confundir al lector.
  - severity: low
    issue: La cláusula final puede sonar más fluida
    rationale: «también ahora les digo a ustedes» es entendible, pero «ahora también les digo a ustedes» o «así ahora también se lo digo a ustedes» reproduce mejor el enlace discursivo y suena más idiomático.
  revised_spanish_text: Hijitos[a], todavía un poco más estaré con ustedes. Me buscarán, y así como les dije a los judíos, «Adonde yo voy, ustedes no pueden venir[b]», ahora también les digo a ustedes.
  revised_footnotes:
