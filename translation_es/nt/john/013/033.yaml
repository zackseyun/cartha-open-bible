revisions:
- from: 'Hijitos[a], todavía por un poco estoy con ustedes. Me buscarán, y así como dije a los judíos: “Donde yo voy[b], ustedes no pueden venir”, también ahora les digo a ustedes.'
  to: Hijitos[a], todavía un poco más estaré con ustedes. Me buscarán, y así como les dije a los judíos, «Adonde yo voy, ustedes no pueden venir[b]», ahora también les digo a ustedes.
  rationale: Se ajusta la expresión temporal para un español más natural y fiel a ἔτι μικρόν; se cambia «Donde» por «Adonde» para expresar mejor destino; se corrige el anclaje de la nota [b] para que corresponda a «ustedes no pueden venir»; y se alisa la cláusula final para una lectura más idiomática sin apartarse del sentido fuente.
