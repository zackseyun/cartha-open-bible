source:
  edition: SBLGNT
  text: Πρὸ δὲ τῆς ἑορτῆς τοῦ πάσχα εἰδὼς ὁ Ἰησοῦς ὅτι ⸀ἦλθεν αὐτοῦ ἡ ὥρα ἵνα μεταβῇ ἐκ τοῦ κόσμου τούτου πρὸς τὸν πατέρα ἀγαπήσας τοὺς ἰδίους τοὺς ἐν τῷ κόσμῳ εἰς τέλος ἠγάπησεν αὐτούς.
base_translation:
  language: en
  yaml_path: translation/nt/john/013/001.yaml
  text: Now before the Feast of the Passover[a], Jesus, knowing that his hour had come to depart from this world to the Father, having loved his own who were in the world[b], loved them to the end.
  footnotes:
  - marker: a
    text: Or 'to the fullest extent' or 'completely.' The Greek phrase may express both enduring love to the final moment and love in its fullest measure.
    reason: lexical_alternative
  - marker: b
    text: Or 'having loved his own who were in the world, loved them to the end'.
    reason: previous_rendering
