translation:
  language: es
  text: Antes de la fiesta de la Pascua, Jesús, sabiendo que había llegado su hora de partir de este mundo al Padre, habiendo amado a los suyos que estaban en el mundo, los amó hasta el fin[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «plenamente» o «por completo». La frase griega puede expresar tanto amor que permanece hasta el momento final como amor en su medida más plena.
    reason: lexical_alternative
lexical_decisions:
- source_word: Πρὸ δὲ
  english_pob_choice: Now before
  chosen_spanish: Antes de
  alternatives_spanish:
  - Y antes de
  - Ahora antes de
  lexicon: BDAG
  rationale: Πρὸ marca prioridad temporal; δὲ aporta una transición leve. «Antes de» comunica la relación temporal de forma natural en español sin forzar un contraste que el griego no exige.
- source_word: τῆς ἑορτῆς τοῦ πάσχα
  english_pob_choice: the Feast of the Passover
  chosen_spanish: la fiesta de la Pascua
  alternatives_spanish:
  - la fiesta de la Pascua
  - la Pascua
  lexicon: BDAG
  rationale: La construcción genitiva indica la fiesta asociada con la Pascua. En español, «fiesta de la Pascua» es claro, formal y conserva el valor festivo de ἑορτή.
- source_word: εἰδὼς
  english_pob_choice: knowing
  chosen_spanish: sabiendo
  alternatives_spanish:
  - al saber
  - conociendo
  lexicon: BDAG
  rationale: El participio expresa el conocimiento consciente de Jesús en paralelo con la acción principal; «sabiendo» mantiene esa relación sin añadir interpretación.
- source_word: ἦλθεν ... ἡ ὥρα
  english_pob_choice: his hour had come
  chosen_spanish: había llegado su hora
  alternatives_spanish:
  - había llegado la hora de él
  - le había llegado su hora
  lexicon: BDAG
  rationale: En Juan, «la hora» es un modismo teológico central. «Había llegado su hora» conserva el idioma joánico y el sentido de momento señalado, sin explicitar más de lo que el texto dice.
- source_word: ἵνα μεταβῇ
  english_pob_choice: to depart
  chosen_spanish: para pasar
  alternatives_spanish:
  - para partir
  - para irse
  lexicon: BDAG
  rationale: μεταβαίνω aquí indica transición de un ámbito a otro. «Para pasar» refleja ese movimiento de salida de este mundo hacia el Padre con sencillez y solemnidad; «partir» sería posible, pero menos cercano al verbo de paso.
- source_word: ἐκ τοῦ κόσμου τούτου
  english_pob_choice: from this world
  chosen_spanish: de este mundo
  alternatives_spanish:
  - de este mundo
  - fuera de este mundo
  lexicon: BDAG
  rationale: κόσμος aquí señala la esfera presente de la vida humana. «De este mundo» preserva la oposición con «al Padre» y evita una ampliación innecesaria.
- source_word: πρὸς τὸν πατέρα
  english_pob_choice: to the Father
  chosen_spanish: al Padre
  alternatives_spanish:
  - al Padre
  - hacia el Padre
  lexicon: BDAG
  rationale: El artículo con πατήρ funciona en Juan como título relacional. «Al Padre» es la forma más natural en español y mantiene la referencia teológica sin añadir posesión explícita.
- source_word: ἀγαπήσας
  english_pob_choice: having loved
  chosen_spanish: habiendo amado
  alternatives_spanish:
  - después de amar
  - tras amar
  lexicon: BDAG
  rationale: El aoristo participial antecede o enmarca la acción principal. «Habiendo amado» conserva la estructura del griego y deja intacta la relación entre el amor previo y la afirmación climática.
- source_word: τοὺς ἰδίους
  english_pob_choice: his own
  chosen_spanish: a los suyos
  alternatives_spanish:
  - a los suyos
  - a los que eran suyos
  lexicon: BDAG
  rationale: La frase es relacional y compacta. «A los suyos» reproduce bien la pertenencia implícita sin limitar el grupo más de lo que hace el texto griego.
- source_word: τοὺς ἐν τῷ κόσμῳ
  english_pob_choice: who were in the world
  chosen_spanish: que estaban en el mundo
  alternatives_spanish:
  - que estaban en el mundo
  - en el mundo
  lexicon: BDAG
  rationale: El participio atributivo delimita a «los suyos» como aquellos que aún están en la esfera terrenal. «Que estaban en el mundo» conserva esa función descriptiva.
- source_word: εἰς τέλος
  english_pob_choice: to the end
  chosen_spanish: hasta el fin
  alternatives_spanish:
  - hasta el final
  - completamente
  lexicon: BDAG
  rationale: La expresión puede ser temporal («hasta el final») y también cualitativa («completamente, hasta la plenitud»). «Hasta el fin» mantiene la ambigüedad deliberada y suena natural en español bíblico contemporáneo.
- source_word: ἠγάπησεν αὐτούς
  english_pob_choice: loved them
  chosen_spanish: los amó
  alternatives_spanish:
  - los amó
  - les mostró amor
  lexicon: BDAG
  rationale: ἀγαπάω debe conservarse con el cognado «amar» para respetar la consistencia léxica. El tiempo perfecto simple español funciona bien como cierre narrativo solemne.
theological_decisions:
- issue: Sentido de εἰς τέλος en el cierre de la frase
  english_pob_reading: The main text keeps 'to the end' and the footnote preserves the possible qualitative sense of 'to the fullest extent' or 'completely.'
  chosen_spanish_reading: La traducción principal dice «hasta el fin» y la nota recoge la posible idea de plenitud o totalidad.
  alternative_spanish_readings:
  - hasta el final
  - completamente
  - hasta la plenitud
  rationale: 'El griego permite una tensión intencional: amor continuado hasta el momento final y amor pleno en su medida. Conviene no resolver la ambigüedad en el texto principal, sino preservarla con una nota.'
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Relación entre «su hora» y el destino de Jesús
  english_pob_reading: '''his hour had come'' preserves Johannine idiom and its theological resonance.'
  chosen_spanish_reading: «había llegado su hora» conserva el modismo joánico y su peso teológico.
  alternative_spanish_readings:
  - había llegado el momento
  - le había llegado la hora
  rationale: En Juan, «la hora» no es solo un momento cronológico sino el momento designado por Dios para la pasión, exaltación y retorno del Hijo. La formulación elegida mantiene esa resonancia sin explicarla en exceso.
  doctrine_reference: Juan 2:4; 7:30; 12:23; 17:1
translation_notes:
  revision_awareness: 'El inglés auditado pasó por ajustes menores de estilo: se reforzó la fluidez de la clausula principal y se mantuvo «Feast of the Passover» en registro formal. La versión española sigue esa línea, pero sin copiar mecánicamente el inglés: conserva el orden natural del español, la progresión participial del griego y la ambigüedad de εἰς τέλος mediante una nota.'
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς y «Padre» para πατέρα, en línea con el estilo joánico.
  - Se traduce ἀγαπάω con «amar» de manera uniforme.
  - «Mundo» se usa para κόσμος en su sentido de esfera presente, no como mera referencia geográfica.
  - No se introduce «Cristo» ni «Señor» porque no aparecen en este versículo ni son necesarios para la referencia auditable.
