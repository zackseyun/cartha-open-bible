revisions:
- from: Antes de la fiesta de la Pascua, Jesús, sabiendo que había llegado su hora para pasar de este mundo al Padre, habiendo amado a los suyos que estaban en el mundo, los amó hasta el fin[a].
  to: Antes de la fiesta de la Pascua, Jesús, sabiendo que había llegado su hora de partir de este mundo al Padre, habiendo amado a los suyos que estaban en el mundo, los amó hasta el fin[a].
  rationale: Se reemplaza «para pasar» por «de partir» para representar mejor μεταβῇ en este contexto y sonar más natural en español bíblico contemporáneo. También se ajusta la nota para reflejar con más precisión las alternativas léxicas documentadas por el POB inglés, manteniendo la ambigüedad teológica de εἰς τέλος.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:04:50Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja correctamente la estructura y el sentido general del griego: temporalidad previa a la Pascua, conciencia de Jesús de que había llegado su hora, tránsito de este mundo al Padre, amor por los suyos en el mundo, y el clímax «los amó hasta el fin». Sin embargo, «para pasar de este mundo al Padre» suena algo débil e idiomáticamente menos natural que una formulación que exprese mejor μεταβῇ como partida/transición solemne. También conviene pulir la nota para ajustarla mejor a la alternativa documentada en inglés.'
  spanish_quality_summary: El español es claro y digno, pero «habiendo amado» resulta algo rígido y «para pasar» suena menos natural en este contexto joánico que «para partir». Una leve revisión mejora la legibilidad sin apartarse de la sintaxis ni del peso teológico del original.
  glossary_alignment: 'No hay conflictos con la terminología del proyecto. «Jesús», «Padre», «los suyos» y «hasta el fin» están bien alineados. La elección principal a ajustar es μεταβῇ: «partir» comunica mejor la salida de este mundo hacia el Padre en español bíblico natural.'
  issues:
  - severity: medium
    issue: «para pasar de este mundo al Padre» es poco natural para μεταβῇ en este contexto
    rationale: Aunque «pasar» puede defenderse léxicamente como transición, en español suena impreciso aquí y debilita la solemnidad del movimiento de Jesús desde este mundo al Padre. «Partir de este mundo al Padre» o formulación equivalente preserva mejor el sentido contextual documentado por el POB inglés («depart»).
  - severity: low
    issue: La nota al pie usa «hasta la plenitud», que no refleja tan bien la alternativa auditada
    rationale: El rastro inglés documenta «to the fullest extent» o «completely». En español, «plenamente» o «por completo» transmite mejor esa alternativa que «hasta la plenitud», que puede sonar interpretativa o menos idiomática.
  revised_spanish_text: Antes de la fiesta de la Pascua, Jesús, sabiendo que había llegado su hora de partir de este mundo al Padre, habiendo amado a los suyos que estaban en el mundo, los amó hasta el fin[a].
  revised_footnotes:
