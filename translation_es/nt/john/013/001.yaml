    text: O «plenamente» o «por completo». La frase griega puede expresar tanto amor que permanece hasta el momento final como amor en su medida más plena.
    reason: lexical_alternative
  revision_rationale: Se reemplaza «para pasar» por «de partir» para representar mejor μεταβῇ en este contexto y sonar más natural en español bíblico contemporáneo. También se ajusta la nota para reflejar con más precisión las alternativas léxicas documentadas por el POB inglés, manteniendo la ambigüedad teológica de εἰς τέλος.
