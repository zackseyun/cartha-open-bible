- from: 'Y después del pedazo de pan[a], entonces Satanás entró en él. Jesús, pues, le dijo: «Lo que haces[b], hazlo más pronto».'
  to: 'Y después del pedazo de pan[a], entonces Satanás entró en él. Jesús, pues, le dijo: «Lo que estás haciendo[b], hazlo más rápido[c]».'
  rationale: Se ajusta Ὃ ποιεῖς a «Lo que estás haciendo» para reflejar mejor la acción en curso destacada en el expediente POB; se cambia «más pronto» por «más rápido» por mayor naturalidad manteniendo el comparativo de τάχιον; y se añade una nota para preservar la alternativa no comparativa documentada para τάχιον. El resto del verso se conserva por ser fiel y claro.
