translation:
  language: es
  text: 'Y después del pedazo de pan[a], entonces Satanás entró en él. Jesús, pues, le dijo: «Lo que estás haciendo[b], hazlo más rápido[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el bocado». ψωμίον se refiere a una pequeña porción de alimento; aquí probablemente al pan mojado servido durante la comida.
    reason: lexical_alternative
  - marker: b
    text: O «lo que haces». El presente griego ποιεῖς puede expresar una acción en curso o inmediata; «lo que estás haciendo» la hace más explícita en español.
    reason: lexical_alternative
  - marker: c
    text: O «hazlo pronto». El griego τάχιον es comparativo («más rápido»), aunque muchas versiones lo suavizan a «pronto» o «rápidamente».
    reason: lexical_alternative
lexical_decisions:
- source_word: ψωμίον
  english_pob_choice: the piece of bread
  chosen_spanish: el pedazo de pan
  alternatives_spanish:
  - el bocado
  - el trozo de pan
  - la porción de pan
  lexicon: BDAG
  rationale: ψωμίον designa una pequeña porción de alimento; en este contexto de mesa, la referencia natural es al pedazo de pan dado en la comida. 'Pedazo de pan' conserva la concreción y evita un arcaísmo o una expresión demasiado vaga.
- source_word: εἰσῆλθεν εἰς ἐκεῖνον
  english_pob_choice: entered into him
  chosen_spanish: entró en él
  alternatives_spanish:
  - entró dentro de él
  - se metió en él
  - entró en su interior
  lexicon: BDAG
  rationale: La construcción griega expresa una entrada directa y hostil. En español, 'entró en él' reproduce esa fuerza de modo natural sin suavizarla ni añadir explicación.
- source_word: ὁ Σατανᾶς
  english_pob_choice: Satan
  chosen_spanish: Satanás
  alternatives_spanish:
  - el Adversario
  lexicon: BDAG
  rationale: Satanás funciona en español como nombre propio reconocido en el NT. Traducirlo como 'el Adversario' enfatizaría la etimología más que el uso bíblico establecido.
- source_word: λέγει οὖν
  english_pob_choice: So ... said
  chosen_spanish: Jesús, pues, le dijo
  alternatives_spanish:
  - Jesús entonces le dijo
  - Jesús, por tanto, le dijo
  - Jesús le dijo, pues
  lexicon: BDAG
  rationale: El griego usa un presente histórico, pero el contexto narrativo en español pide pasado. 'Pues' comunica bien οὖν como conector discursivo sin sobrecargar la frase.
- source_word: Ὃ ποιεῖς
  english_pob_choice: What you are doing
  chosen_spanish: Lo que haces
  alternatives_spanish:
  - Lo que estás haciendo
  - Lo que vas a hacer
  lexicon: BDAG
  rationale: El presente griego indica la acción en curso o inmediata. 'Lo que haces' es una forma breve y fiel; 'lo que estás haciendo' sería más explícita, pero menos sobria. 'Lo que vas a hacer' introduce una interpretación de futuro que el griego no exige.
- source_word: ποίēσον
  english_pob_choice: do
  chosen_spanish: hazlo
  alternatives_spanish:
  - haz
  - llévalo a cabo
  - realízalo
  lexicon: BDAG
  rationale: El imperativo aoristo pide una acción decisiva. 'Hazlo' preserva la brevedad y el tono directo del mandato de Jesús en español natural.
- source_word: τάχιον
  english_pob_choice: more quickly
  chosen_spanish: más pronto
  alternatives_spanish:
  - más rápidamente
  - rápidamente
  - pronto
  lexicon: BDAG
  rationale: τάχιον es comparativo, por lo que conviene reflejar la idea de 'más' rapidez. 'Más pronto' suena natural en español y conserva la fuerza comparativa mejor que un simple 'pronto'.
theological_decisions:
- issue: Entrada de Satanás en Judas / en el sujeto referido
  english_pob_reading: Retain the direct wording 'Satan entered into him' without explanatory expansion.
  chosen_spanish_reading: Conservar 'Satanás entró en él' sin ampliar a control, posesión o metáfora.
  alternative_spanish_readings:
  - Satanás tomó posesión de él
  - Satanás lo controló
  - Judas se entregó a Satanás
  rationale: El versículo afirma una entrada satánica directa y no debe reducirse a una mera figura ni expandirse hacia una doctrina más elaborada de posesión o control. La formulación española mantiene la tensión teológica del texto.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada de 'says' a 'said' para acomodar mejor el tiempo narrativo; en español se adoptó directamente el pasado ('dijo') desde el inicio, manteniendo la vivacidad del discurso sin forzar un presente histórico poco natural. También se preservó la comparación implícita de τάχιον con una expresión española comparativa ('más pronto').
  spanish_consistency_notes:
  - Se mantuvo 'Satanás' como nombre propio, coherente con el uso bíblico y con el tratamiento habitual del término en español.
  - Se evitó 'SEÑOR' u otros sustitutos para nombres divinos porque no aplican en este versículo.
  - '''Entró en él'' conserva la relación sintáctica y la dureza del griego sin eufemismo.'
  - '''Más pronto'' refleja mejor el matiz comparativo de τάχιον que un adverbio simple.'
