base_translation:
  language: en
  yaml_path: translation/nt/john/013/027.yaml
  text: And after the piece of bread[a], then Satan entered into him. So Jesus said to him, “What you are doing[b], do more quickly.”
  footnotes:
  - marker: a
    text: Or 'the morsel.' The Greek ψωμίον refers to a small piece of food, here likely the dipped bread given during the meal.
    reason: lexical_alternative
  - marker: b
    text: Or 'do quickly.' The Greek τάχιον is comparative ('more quickly'), though many English versions smooth it to 'quickly.'
    reason: lexical_alternative
