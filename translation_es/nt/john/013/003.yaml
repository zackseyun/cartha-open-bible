  source_alignment_summary: 'El borrador español refleja bien la estructura del griego: Jesús, sabiendo que el Padre le había dado/entregado todas las cosas en sus manos, y que había venido/salido de Dios y iba a Dios. Sin embargo, hay dos desajustes importantes con la auditoría inglesa y con el español natural: el marcador [a] está anclado en «Jesús» pero la nota alternativa corresponde a «había salido/venido de Dios», y «va a Dios» suena menos natural en esta cadena de imperfecto pluscuamperfecto; «iba a Dios» representa mejor ὑπάγει en contexto narrativo.'
  spanish_quality_summary: El texto es generalmente claro y digno, pero necesita una reparación menor para fluidez y para el sistema de notas. «Había salido de Dios» es posible, aunque «había venido de Dios» suele sonar más natural en español eclesial sin perder procedencia. «Iba a Dios» mejora la legibilidad frente a «va a Dios».
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto: θεοῦ/θεὸν = «Dios», ὁ πατήρ = «el Padre». No aplica Yahvé/Mesías/etc. La decisión cristológica de conservar «de Dios» y no añadir «de vuelta» es correcta. Conviene alinear la nota alternativa con el lugar correcto del texto y mantener la distinción entre texto principal y alternativa.'
  issues:
