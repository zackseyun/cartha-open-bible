    issue: La nota [a] está anclada en «Jesús» pero su contenido trata de ἐξῆλθεν («había salido/venido de Dios»).
    rationale: Esto rompe la correspondencia requerida entre marcador y palabra/frase anotada, y puede confundir al lector sobre qué elemento tiene la alternativa.
  - severity: medium
    issue: «va a Dios» es menos natural en español en esta oración y desentona con «le había entregado» / «había venido».
    rationale: Aunque defiende el presente narrativo, en español bíblico natural «iba a Dios» comunica mejor el movimiento en curso/inminente y coincide con la alternativa documentada del POB inglés.
  - severity: low
    issue: «había salido de Dios» es fiel, pero «había venido de Dios» suele ser más idiomático en español general.
    rationale: Juan usa lenguaje de procedencia/origen; «salir de» es válido, pero «venir de» evita una dureza innecesaria sin perder el sentido. Aun así, «salido» puede preservarse como alternativa en nota.
  revised_spanish_text: Jesús, sabiendo que el Padre le había entregado todas las cosas en sus manos, y que había venido[a] de Dios y que iba a Dios[b],
