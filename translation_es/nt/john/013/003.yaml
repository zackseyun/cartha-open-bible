translation:
  language: es
  text: Jesús, sabiendo que el Padre le había entregado todas las cosas en sus manos, y que había venido[a] de Dios y que iba a Dios[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «había salido de Dios».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «va a Dios»; el griego dice simplemente «iba a Dios».'
    reason: alternative_reading
lexical_decisions:
- source_word: εἰδὼς
  english_pob_choice: knowing
  chosen_spanish: sabiendo
  alternatives_spanish:
  - habiendo sabido
  - conociendo
  lexicon: BDAG
  rationale: El participio introduce el trasfondo circunstancial de la acción. «Sabiendo» es natural en español y conserva esa relación causal/de contexto sin forzar una construcción más pesada.
- source_word: πάντα
  english_pob_choice: all things
  chosen_spanish: todas las cosas
  alternatives_spanish:
  - todo
  - todo cuanto
  lexicon: BDAG
  rationale: El plural neutro se vierte de modo explícito como «todas las cosas» para mantener el alcance comprehensivo del original.
- source_word: ἔδωκεν
  english_pob_choice: had given
  chosen_spanish: había entregado
  alternatives_spanish:
  - había dado
  - dio
  lexicon: BDAG
  rationale: El aoristo se entiende como acción previa al marco narrativo. «Había entregado» transmite mejor la idea de concesión/puesta a disposición que un simple «dio».
- source_word: εἰς τὰς χεῖρας
  english_pob_choice: into his hands
  chosen_spanish: en sus manos
  alternatives_spanish:
  - en sus manos poderosas
  - bajo su control
  lexicon: BDAG
  rationale: Se conserva la imagen concreta de las «manos» como metáfora de autoridad y encargo. «En sus manos» es idiomático y fiel, y evita abstraer el giro demasiado pronto.
- source_word: ὁ πατὴρ
  english_pob_choice: the Father
  chosen_spanish: el Padre
  alternatives_spanish:
  - su Padre
  lexicon: BDAG
  rationale: El griego usa el título articular «el Padre»; en contexto joánico conviene preservar esa formulación titular, no reemplazarla por un posesivo.
- source_word: ἀπὸ θεοῦ
  english_pob_choice: from God
  chosen_spanish: de Dios
  alternatives_spanish:
  - desde Dios
  - procedía de Dios
  lexicon: BDAG
  rationale: La preposición expresa origen. «De Dios» mantiene la forma directa del griego y el peso teológico de la afirmación sin añadir una paráfrasis interpretativa.
- source_word: ἐξῆλθεν
  english_pob_choice: had come
  chosen_spanish: había salido
  alternatives_spanish:
  - había venido
  - había salido de Dios
  lexicon: BDAG
  rationale: En Juan este verbo puede señalar procedencia/origen y misión. «Había salido» es español claro y conserva el matiz de procedencia sin forzar un giro litúrgico.
- source_word: πρὸς τὸν θεὸν
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - hacia Dios
  - con Dios
  lexicon: BDAG
  rationale: La dirección del movimiento se conserva con una preposición simple y directa. «A Dios» es la correspondencia más natural y no explicita más de lo que el texto dice.
- source_word: ὑπάγει
  english_pob_choice: was going
  chosen_spanish: va
  alternatives_spanish:
  - iba
  - se dirige
  lexicon: BDAG
  rationale: El presente narrativo griego puede reflejar un movimiento en curso o inminente. «Va» mantiene esa vivacidad y evita añadir la especificación de un regreso que el griego no formula aquí.
theological_decisions:
- issue: Origen cristológico en ἀπὸ θεοῦ ἐξῆλθεν
  english_pob_reading: he had come from God
  chosen_spanish_reading: había salido de Dios
  alternative_spanish_readings:
  - había venido de Dios
  - había salido de la presencia de Dios
  rationale: La traducción preserva la afirmación fuerte de procedencia divina sin ampliar el texto con formulaciones dogmáticas ajenas al verso. «Salido de Dios» mantiene la tensión lexical del original entre origen y misión.
  doctrine_reference: Afirmaciones cristológicas; Juan 13:3
- issue: Dirección final en πρὸς τὸν θεὸν ὑπάγει
  english_pob_reading: was going to God
  chosen_spanish_reading: va a Dios
  alternative_spanish_readings:
  - va de vuelta a Dios
  - va hacia Dios
  rationale: Se conserva la orientación del movimiento hacia Dios, pero sin insertar «de vuelta» como si fuera explícito en el versículo. La formulación deja abierta la relación teológica que el contexto desarrolla.
  doctrine_reference: Juan 13:3; principio de no sobreespecificar
translation_notes:
  revision_awareness: 'La pauta inglesa final quedó sin cambios tras la última revisión y con alta concordancia del revisor. El español sigue esa lectura estable, conservando el mismo equilibrio entre literalidad y naturalidad: participio de trasfondo, pluscuamperfecto para anterioridad, y un verbo de movimiento presente que no añade «regreso» explícito.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y «el Padre» para ὁ πατήρ, conforme al registro joánico.
  - Se conserva la imagen concreta de «manos» para εἰς τὰς χεῖρας, sin sustituirla por «poder» o «control».
  - «Había salido de Dios» y «va a Dios» reflejan la tensión semántica documentada por el audit trail entre origen/procedencia y destino/movimiento.
  - Las notas al pie usan solo alternativas reales presentes en el contexto inglés, adaptadas al español sin ampliar el alcance del verso.
