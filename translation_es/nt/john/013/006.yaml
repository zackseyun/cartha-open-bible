translation:
  language: es
  text: 'Entonces viene a Simón Pedro. Le dice: «Señor[a], ¿tú me lavas los pies?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego κύριε también puede funcionar como tratamiento respetuoso, algo como «señor» en sentido cortés; aquí se conserva «Señor» como renderización por defecto.
    reason: alternative_reading
lexical_decisions:
- source_word: ἔρχεται
  english_pob_choice: comes
  chosen_spanish: viene
  alternatives_spanish:
  - llega
  - se acerca
  lexicon: BDAG
  rationale: El presente histórico del griego se conserva de forma natural en español con «viene». Comunica el movimiento hacia Simón Pedro sin forzar un calco de tiempo pasado.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Entonces
  alternatives_spanish:
  - Así que
  - Por tanto
  lexicon: BDAG
  rationale: Marca la progresión narrativa. «Entonces» mantiene el valor consecutivo de manera fluida en español bíblico contemporáneo.
- source_word: πρὸς Σίμωνα Πέτρον
  english_pob_choice: to Simon Peter
  chosen_spanish: a Simón Pedro
  alternatives_spanish:
  - hacia Simón Pedro
  lexicon: BDAG
  rationale: La preposición πρός con acusativo expresa movimiento hacia una persona; «a» es la realización más natural en español narrativo.
- source_word: λέγει αὐτῷ
  english_pob_choice: He says to him
  chosen_spanish: Le dice
  alternatives_spanish:
  - Le dijo
  lexicon: BDAG
  rationale: Se conserva el presente histórico de λέγει y el dativo indirecto de αὐτῷ con «le». El español admite omitir «a él» sin pérdida de claridad.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Señor mío
  - Maestro
  - Sir
  lexicon: BDAG
  rationale: Aunque el inglés POB retiene «Lord» por defecto doctrinal, en español el equivalente reverente y natural es «Señor». Aquí puede funcionar como tratamiento respetuoso y también conservar resonancia cristológica.
- source_word: σύ
  english_pob_choice: you
  chosen_spanish: tú
  alternatives_spanish:
  - tú mismo
  - ¿eres tú el que...?
  lexicon: BDAG
  rationale: El pronombre explícito es enfático en griego. En español se conserva con «tú», reforzando la sorpresa de Pedro sin sobrecargar la frase.
- source_word: μου
  english_pob_choice: my
  chosen_spanish: me
  alternatives_spanish:
  - de mí
  lexicon: BDAG
  rationale: 'Con verbos de acción sobre el cuerpo, el dativo/posesivo griego se expresa de forma natural en español con objeto pronominal: «me lavas los pies». Así se mantiene el sentido relacional de la frase.'
- source_word: νίπτεις
  english_pob_choice: are washing
  chosen_spanish: lavas
  alternatives_spanish:
  - estás lavando
  lexicon: BDAG
  rationale: νίπτω indica lavar una parte del cuerpo, no bañarse por completo. En español, el presente simple «lavas» es idiomático y puede llevar la fuerza de presente histórico/interrogativo sin necesidad de perífrasis.
- source_word: τοὺς πόδας
  english_pob_choice: feet
  chosen_spanish: los pies
  alternatives_spanish:
  - mis pies
  lexicon: BDAG
  rationale: La expresión normal en español requiere el artículo definido. El contexto de μου hace clara la referencia a «mis pies» aunque el griego lo exprese de modo diferente.
theological_decisions:
- issue: Tratamiento de κύριε en la boca de Pedro
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Señor mío
  - Maestro
  - Sir
  rationale: El audit trail inglés retiene «Lord» por defecto y por la posible densidad cristológica. En español, «Señor» es la forma reverente estándar y mantiene tanto el respeto como la posible lectura cristológica sin introducir un registro ajeno o rebajado.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
translation_notes:
  revision_awareness: El texto inglés revisado no cambió en la última pasada; la versión española sigue su lectura óptima sin introducir variantes textuales nuevas. Se mantiene el presente histórico y la tensión interpretativa de κύριε, trasladada a una nota breve.
  spanish_consistency_notes:
  - Se conserva el presente narrativo con «viene / dice» para reflejar el estilo del griego y el inglés POB.
  - «Señor» se usa para κύριε conforme al valor reverente documentado; la nota preserva la alternativa de cortesía.
  - La construcción «me lavas los pies» es la forma española más natural para el griego con μου + νίπτεις + τοὺς πόδας.
