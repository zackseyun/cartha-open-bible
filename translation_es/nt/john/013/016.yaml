translation:
  language: es
  text: 'En verdad[a], en verdad, les digo: un esclavo no es mayor que su amo[b], ni un apóstol es mayor que el que lo envió[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Amén, amén». Se traduce la fórmula solemne de ἀμήν con una expresión española equivalente de énfasis, en vez de dejarla sin traducir.
    reason: lexical_alternative
  - marker: b
    text: O «señor» para κύριος; aquí se traduce «amo» por su sentido social en la comparación con «esclavo», no como título reverencial.
    reason: lexical_alternative
  - marker: c
    text: O «mensajero» o «enviado» para ἀπόστολος. Se conserva «apóstol» por su peso lexical y eclesial en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀμὴν ἀμὴν
  english_pob_choice: Truly, truly
  chosen_spanish: En verdad, en verdad
  alternatives_spanish:
  - Amén, amén
  - Muy verdaderamente
  lexicon: BDAG
  rationale: La fórmula doble de ἀμήν funciona en Juan como énfasis solemne de una afirmación. «En verdad, en verdad» conserva la repetición y la fuerza discursiva en español natural; «Amén, amén» sería más literal, pero menos idiomático en este contexto narrativo.
- source_word: λέγω ὑμῖν
  english_pob_choice: I say to you
  chosen_spanish: les digo
  alternatives_spanish:
  - les digo a ustedes
  - les hablo
  lexicon: BDAG
  rationale: La forma de primera persona con dativo de segunda persona se expresa con naturalidad en español como «les digo». Mantiene el acto directo de hablar y evita una construcción más pesada sin perder el valor formal del griego.
- source_word: δοῦλος
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - servidor
  lexicon: BDAG
  rationale: 'Se conserva «esclavo» para preservar la relación social fuerte que el griego señala: una persona bajo autoridad de otro, en paralelo con «señor». «Siervo» suavizaría demasiado la fuerza léxica.'
- source_word: κύριος
  english_pob_choice: master
  chosen_spanish: señor
  alternatives_spanish:
  - amo
  - dueño
  lexicon: BDAG
  rationale: Aquí κύριος se usa en sentido social dentro de la comparación esclavo/señor, no como título directo. «Señor» mantiene la relación de autoridad sin desplazar innecesariamente el registro hacia «amo», que en español puede sonar más duro o menos equilibrado.
- source_word: ἀπόστολος
  english_pob_choice: apostle
  chosen_spanish: apóstol
  alternatives_spanish:
  - mensajero
  - enviado
  lexicon: BDAG
  rationale: Se conserva «apóstol» porque el término tiene peso lexical y resonancia joánica; «mensajero» o «enviado» aclaran la función, pero pierden la forma estable del término en la tradición del texto.
- source_word: τοῦ πέμψαντος αὐτόν
  english_pob_choice: the one who sent him
  chosen_spanish: el que lo envió
  alternatives_spanish:
  - el que le envió
  - su enviado
  lexicon: BDAG
  rationale: La construcción participial articular se vierte de forma directa y clara como «el que lo envió». Expresa bien la relación agente-enviado y conserva el paralelismo con la primera cláusula.
theological_decisions:
- issue: κύριος en sentido relacional, no titular
  english_pob_reading: master
  chosen_spanish_reading: señor
  alternative_spanish_readings:
  - Señor
  - amo
  rationale: 'El contexto inmediato presenta una analogía social: esclavo/señor y apóstol/el que envía. En español, «señor» preserva esa relación de autoridad sin introducir por sí solo una lectura cristológica titular que el pasaje no exige en esta línea.'
  doctrine_reference: 'DOCTRINE.md: Contested terms table for κύριος; Translation philosophy #5'
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el audit trail inglés; el texto inglés actual quedó confirmado como estable en la última pasada. La versión española sigue esa misma línea sin introducir cambios interpretativos nuevos.
  spanish_consistency_notes:
  - Se mantuvo «esclavo» para δοῦλος, coherente con la directriz del proyecto cuando la subordinación social es el punto.
  - Se evitó «SEÑOR» en mayúsculas porque el griego aquí funciona como término relacional dentro de una comparación, no como máscara del nombre divino.
  - «Apóstol» se conservó como término transliterado porque el contexto no obliga a sustituirlo por «mensajero» en el cuerpo del texto.
  - La puntuación con dos comas reproduce la doble solemnidad de ἀμὴν ἀμὴν y la división lógica de las dos comparaciones.
