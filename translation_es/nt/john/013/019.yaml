translation:
  language: es
  text: Desde ahora les digo, antes de que suceda, para que, cuando suceda, crean que yo soy[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O más literalmente: «que soy». La expresión griega también puede evocar la autoidentificación divina en Isaías y en otros pasajes de Juan.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀπ’ ἄρτι
  english_pob_choice: From now on
  chosen_spanish: Desde ahora
  alternatives_spanish:
  - A partir de ahora
  - Desde este momento
  lexicon: BDAG
  rationale: La expresión griega es temporal e idiomática, con fuerza de punto de partida hacia adelante. «Desde ahora» conserva bien ese valor prospectivo en español y suena natural en un registro bíblico moderno.
- source_word: λέγω ὑμῖν
  english_pob_choice: I am telling you
  chosen_spanish: les digo
  alternatives_spanish:
  - les estoy diciendo
  - les digo a ustedes
  lexicon: BDAG
  rationale: El presente verbal comunica una declaración actual dirigida a los discípulos. En español, el presente simple «les digo» es natural y mantiene la inmediatez sin necesidad de perífrasis.
- source_word: πρὸ τοῦ γενέσθαι
  english_pob_choice: before it happens
  chosen_spanish: antes de que suceda
  alternatives_spanish:
  - antes de que ocurra
  - antes de que acontezca
  lexicon: BDAG
  rationale: La construcción indica prioridad temporal antes de un evento aún no realizado. «Antes de que suceda» expresa con claridad ese sentido y evita una fórmula demasiado literal o pesada.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el propósito de que
  lexicon: BDAG
  rationale: La partícula introduce finalidad. «Para que» es la equivalencia española más directa y natural para el valor de propósito.
- source_word: πιστεύσητε
  english_pob_choice: you may believe
  chosen_spanish: crean
  alternatives_spanish:
  - crean ustedes
  - lleguen a creer
  lexicon: BDAG
  rationale: 'El aoristo subjuntivo con ἵνα expresa el propósito de la declaración. En español, un presente de subjuntivo tras «para que» comunica adecuadamente la finalidad: «para que… crean». Se evita sobreinterpretar el aspecto con una construcción más explicativa.'
- source_word: ὅταν γένηται
  english_pob_choice: when it does happen
  chosen_spanish: cuando suceda
  alternatives_spanish:
  - cuando ocurra
  - cuando llegue a suceder
  lexicon: BDAG
  rationale: ὅταν con subjuntivo señala un hecho futuro contingente. «Cuando suceda» preserva el sentido de evento futuro sin añadir matiz excesivo.
- source_word: ὅτι ἐγώ εἰμι
  english_pob_choice: that I am he
  chosen_spanish: que soy yo
  alternatives_spanish:
  - que yo soy
  - que yo soy él
  lexicon: BDAG
  rationale: La frase griega puede funcionar como autodeclaración absoluta y también evocar el lenguaje de autoidentificación divina. En español, «que soy yo» mantiene la referencia personal y deja abierta la tensión del original sin forzar un predicado inexistente.
theological_decisions:
- issue: La expresión absoluta ἐγώ εἰμι y su posible eco de autoidentificación divina
  english_pob_reading: that I am he; footnote preserves the more literal 'that I am' and notes possible echo of divine self-identification
  chosen_spanish_reading: que soy yo
  alternative_spanish_readings:
  - que yo soy
  - que soy
  rationale: La frase de Juan puede leerse como simple identificación personal y, a la vez, como posible eco del lenguaje de autoidentificación divina. «Que soy yo» es comprensible en español y no obliga a resolver la tensión teológica; conserva la ambigüedad de fondo más que una explicación explícita.
  doctrine_reference: Preservar la tensión teológica sin resolverla de forma anticipada.
translation_notes:
  revision_awareness: El borrador sigue de cerca el audit trail inglés y no introduce revisiones adicionales; conserva la tensión interpretativa de ἐγώ εἰμι mediante una nota alternativa, en paralelo con la práctica del POB en inglés.
  spanish_consistency_notes:
  - Se mantuvo «Dios»/«Yahvé» fuera del texto porque este versículo no contiene un término explícito correspondiente.
  - Se evitó «Cristo» porque el griego no lo usa aquí; el foco está en la autodeclaración de Jesús.
  - Se usó «crean» como subjuntivo de finalidad, coherente con el valor de ἵνα en contexto.
  - La nota al pie está anclada únicamente en «soy yo», que concentra la decisión interpretativa sobre ἐγώ εἰμι.
