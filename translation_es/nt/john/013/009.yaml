translation:
  language: es
  text: 'Simón Pedro le dice: «Señor[a], no solo mis pies, sino también mis manos y mi cabeza.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «Maestro». Griego: «Kyrios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - dijo
  lexicon: BDAG
  rationale: El presente histórico del griego narrativo se puede reflejar naturalmente con «dice», conservando la vivacidad del relato sin forzar un pasado innecesario.
- source_word: Σίμων Πέτρος
  english_pob_choice: Simon Peter
  chosen_spanish: Simón Pedro
  lexicon: convención onomástica
  rationale: Se mantienen los nombres propios en su forma española habitual y transparente.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: En un discurso dirigido a Jesús, «Señor» preserva el valor de tratamiento respetuoso y la resonancia teológica normal del término; «Maestro» queda como alternativa léxica posible, pero menos alineada con el uso preferente del proyecto.
- source_word: μὴ ... μόνον ἀλλὰ καὶ
  english_pob_choice: not only ... but also
  chosen_spanish: no solo ... sino también
  alternatives_spanish:
  - no únicamente ... sino también
  lexicon: BDAG
  rationale: 'La construcción contrastiva se expresa con la correlación española más natural y fiel al énfasis griego: no limitar la petición a una sola parte, sino extenderla a otras.'
- source_word: τοὺς πόδας μου
  english_pob_choice: my feet
  chosen_spanish: mis pies
  alternatives_spanish:
  - los pies míos
  lexicon: BDAG
  rationale: El posesivo se adapta al español con «mis pies», que comunica de forma directa el sentido del acusativo con pronombre posesivo.
- source_word: τὰς χεῖρας
  english_pob_choice: my hands
  chosen_spanish: mis manos
  alternatives_spanish:
  - las manos
  lexicon: BDAG
  rationale: Aunque el posesivo no se repite en griego, en español la coordinación con «mis pies» hace natural y claro compartir el mismo posesivo en la serie.
- source_word: τὴν κεφαλήν
  english_pob_choice: my head
  chosen_spanish: mi cabeza
  alternatives_spanish:
  - la cabeza
  lexicon: BDAG
  rationale: Se conserva el sentido corporal ordinario de «cabeza», con el posesivo coordinado por el contexto de la enumeración.
theological_decisions:
- issue: Tratamiento de κύριος como título dirigido a Jesús
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Maestro
  rationale: La versión española mantiene el título tradicional y teológicamente cargado para Jesús, acorde con la lectura auditada del POB y con el uso normal del Nuevo Testamento.
  doctrine_reference: 'DOCTRINE.md: Contested terms — κύριος → Lord'
translation_notes:
  revision_awareness: La revisión en inglés ajustó el orden a «not only my feet, but also...». La redacción española refleja ese mismo orden natural («no solo mis pies, sino también...»), preservando el énfasis contrastivo del griego sin calco torpe.
  spanish_consistency_notes:
  - Se usa «Señor» y no «SEÑOR», porque aquí el término griego es un vocativo dirigido a Jesús, no una máscara del nombre divino.
  - La serie posesiva se expresa de forma coherente en español con «mis manos» y «mi cabeza», siguiendo el sentido coordinado del griego.
  - La puntuación con comillas angulares es adecuada para estilo bíblico en español moderno.
