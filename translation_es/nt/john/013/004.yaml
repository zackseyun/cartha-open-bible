translation:
  language: es
  text: Se levanta de la cena y deja a un lado su ropa exterior[a], y tomando una toalla[b], se la ató a la cintura.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus prendas exteriores».
    reason: lexical_alternative
  - marker: b
    text: O «se ciñó»; el verbo griego puede expresar el gesto de ceñirse o atarse la toalla.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγείρεται
  english_pob_choice: He rises
  chosen_spanish: Se levanta
  alternatives_spanish:
  - Se alza
  - Se pone de pie
  lexicon: BDAG
  rationale: El presente histórico se conserva mejor en español con una forma verbal natural y viva. «Se levanta» comunica el movimiento narrativo sin sonar forzado.
- source_word: ἐκ τοῦ δείπνου
  english_pob_choice: from the supper
  chosen_spanish: de la cena
  alternatives_spanish:
  - del alimento
  - de la comida
  lexicon: BDAG
  rationale: «δεῖπνον» puede ser «cena» o «comida», pero «cena» refleja bien el contexto joánico y mantiene el matiz de comida principal sin precisar una hora moderna.
- source_word: τίθησιν τὰ ἱμάτια
  english_pob_choice: lays aside his outer garments
  chosen_spanish: deja a un lado sus prendas exteriores
  alternatives_spanish:
  - deja sus vestidos
  - se quita las ropas exteriores
  lexicon: BDAG
  rationale: «τίθημι» aquí implica apartar/retirar, no simplemente colocar. «Prendas exteriores» preserva la precisión de «ἱμάτια» sin sugerir desnudez total, y evita un calco rígido.
- source_word: λαβὼν λέντιον
  english_pob_choice: taking a towel
  chosen_spanish: tomando una toalla
  alternatives_spanish:
  - habiendo tomado una toalla
  lexicon: BDAG
  rationale: El participio aoristo se expresa de manera natural con un gerundio en español. «Toalla» es el equivalente idiomático más claro para «λέντιον» en este contexto de servicio.
- source_word: διέζωσεν ἑαυτόν
  english_pob_choice: tied it around himself
  chosen_spanish: se la ciñó alrededor de sí
  alternatives_spanish:
  - se la ató alrededor
  - se la ajustó a la cintura
  lexicon: BDAG
  rationale: «διαζώννυμι» significa ceñirse o atarse alrededor del cuerpo. «Se la ciñó» conserva mejor el gesto de servicio y evita una paráfrasis demasiado libre. El pronombre «la» remite naturalmente a «toalla».
translation_notes:
  revision_awareness: 'El texto sigue de cerca el griego SBLGNT y la solución auditada en inglés, pero ajusta la sintaxis para que suene natural en español: presente histórico con «Se levanta», valor aspectual del participio con «tomando», y el gesto final con «se la ciñó». Se mantiene la tensión lexical entre «dejar a un lado» y «ciñó» mediante nota alternativa.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» y otras sustituciones no presentes en el versículo.
  - «Cena» se eligió por fidelidad contextual; «comida» queda como alternativa válida pero menos precisa aquí.
  - «Prendas exteriores» mantiene el alcance de ἱμάτια sin sobreinterpretar.
  - La referencia pronominal de «la» está anclada en «toalla», coherente con el orden del griego.
