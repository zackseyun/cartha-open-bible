translation:
  language: es
  text: Si yo, el Señor[a] y el Maestro, les he lavado los pies, ustedes también deben lavar los pies unos a otros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘el Maestro’. Aquí κύριος se traduce como ‘Señor’ en consonancia con su sentido usual de título y con la práctica predeterminada del proyecto.
    reason: alternative_reading
lexical_decisions:
- source_word: εἰ οὖν
  english_pob_choice: If ... then
  chosen_spanish: Si ... entonces
  alternatives_spanish:
  - Por tanto, si
  - Así que, si
  lexicon: BDAG
  rationale: La combinación condicional e inferencial se conserva con una estructura natural en español. ‘Si ... entonces’ mantiene la fuerza lógica del argumento de Jesús sin volverlo pesado ni añadir interpretación.
- source_word: ἐγὼ
  english_pob_choice: I
  chosen_spanish: yo
  alternatives_spanish:
  - yo mismo
  lexicon: BDAG
  rationale: Se retiene el pronombre explícito para conservar el énfasis del griego y la contraposición implícita con la obligación de los discípulos.
- source_word: ἔνιψα
  english_pob_choice: have washed
  chosen_spanish: les he lavado
  alternatives_spanish:
  - les lavé
  lexicon: BDAG
  rationale: El aoristo refiere una acción completa ya realizada. En español, el pretérito perfecto compuesto expresa bien una acción reciente con relevancia inmediata en el discurso.
- source_word: ὑμῶν τοὺς πόδας
  english_pob_choice: your feet
  chosen_spanish: los pies
  alternatives_spanish:
  - sus pies
  - vuestros pies
  lexicon: BDAG
  rationale: El objeto directo se expresa de modo idiomático en español, apoyado por el clítico ‘les’ para reflejar el dativo posesivo del griego y el objeto concreto ‘pies’.
- source_word: ὁ κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Maestro
  lexicon: BDAG
  rationale: Se sigue la decisión del POB de rendir κύριος como ‘Lord/Señor’ cuando funciona como título cristológico. ‘Señor’ es el equivalente natural y reverente en español; ‘Maestro’ queda como alternativa interpretativa, no como reemplazo principal.
- source_word: ὁ διδάσκαλος
  english_pob_choice: the Teacher
  chosen_spanish: el Maestro
  alternatives_spanish:
  - el Maestro enseñante
  - el Profesor
  lexicon: BDAG
  rationale: ‘Maestro’ comunica de forma natural el título personal aplicado a Jesús y evita la rusticidad de ‘el maestro’ en minúscula; refleja mejor el valor titular junto a ‘el Señor’.
- source_word: καὶ ὑμεῖς
  english_pob_choice: you also
  chosen_spanish: ustedes también
  alternatives_spanish:
  - y ustedes
  - ustedes asimismo
  lexicon: BDAG
  rationale: 'La segunda persona plural se expresa claramente en español, conservando el énfasis de la respuesta obligada: así como Jesús actuó, ellos también deben actuar.'
- source_word: ὀφείλετε
  english_pob_choice: ought to
  chosen_spanish: deben
  alternatives_spanish:
  - están obligados a
  - les corresponde
  lexicon: BDAG
  rationale: ‘Deben’ transmite obligación moral real sin endurecer el matiz hasta un mandamiento formal más fuerte de lo que exige el indicativo de deuda/obligación del griego.
- source_word: ἀλλήλων
  english_pob_choice: one another’s
  chosen_spanish: unos a otros
  alternatives_spanish:
  - mutuamente
  - entre sí
  lexicon: BDAG
  rationale: En español, la reciprocidad queda clara con ‘unos a otros’, que además armoniza con el verbo pronominal y evita una posesión artificial.
- source_word: νίπτειν τοὺς πόδας
  english_pob_choice: to wash ... feet
  chosen_spanish: lavarse los pies
  alternatives_spanish:
  - lavar los pies
  - lavar los pies de los otros
  lexicon: BDAG
  rationale: ‘Lavarse los pies’ mantiene el acto concreto de lavado de pies y su fuerza ejemplar sin generalizarlo indebidamente; el pronombre recíproco refleja bien la reciprocidad de ἀλλήλων.
theological_decisions:
- issue: Título cristológico κύριος
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el Maestro
  rationale: El texto presenta a Jesús como ‘el Señor’ y ‘el Maestro’ en paralelo. Mantener ‘Señor’ preserva el peso cristológico del título y coincide con la práctica documental del POB para κύριος. ‘Maestro’ se conserva como segundo título, no como sustituto.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Naturaleza del mandato sobre el lavado de pies
  english_pob_reading: Retain the concrete act 'wash one another’s feet' without reducing it to a generalized metaphor in the main text
  chosen_spanish_reading: Conservar ‘lavarse los pies unos a otros’ sin convertirlo en una paráfrasis general de servicio
  alternative_spanish_readings:
  - servirse humildemente unos a otros
  - ayudarse unos a otros
  rationale: El griego nombra explícitamente el lavado de pies; la traducción debe preservar ese acto concreto y su carga ejemplar, dejando la aplicación amplia al contexto, no al reemplazo del texto.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Original-language primacy; Never paraphrase beyond what the source text warrants'
translation_notes:
  revision_awareness: Esta versión corrige el problema previo eliminando la nota al pie no anclada en el texto. El contenido principal conserva la lectura auditada sin introducir marcadores de nota innecesarios.
  spanish_consistency_notes:
  - ‘Señor’ y ‘Maestro’ se mantienen como títulos referidos a Jesús, con mayúscula inicial para respetar su valor titular.
  - Se evitó ‘SEÑOR’ en versalitas o mayúsculas, siguiendo la convención española del proyecto de usar ‘Yahvé’ para el nombre divino y no un enmascaramiento tipográfico aquí.
  - La reciprocidad del griego ἀλλήλων se expresa naturalmente con ‘unos a otros’, y el verbo pronominal ‘lavarse’ ayuda a reflejar el sentido mutuo sin perder concreción.
  - La formulación usa español neutro y eclesialmente readable, sin calcos innecesarios.
