translation:
  language: es
  text: Si Dios fue glorificado en él[a], Dios también lo glorificará en sí mismo[b], y lo glorificará enseguida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Ya que Dios fue glorificado en él». El griego usa εἰ («si»), aunque en el contexto la condición probablemente se asume como verdadera.'
    reason: alternative_reading
  - marker: b
    text: 'O: «en sí mismo» puede entenderse como «con sí mismo» o «por sí mismo»; la expresión griega es compacta y teológicamente densa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰ
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Ya que
  - Como
  lexicon: BDAG
  rationale: Se conserva la partícula condicional εἰ con «Si». Aunque el contexto puede implicar la realidad de la condición, el griego no usa una causal explícita; por eso no se resuelve a «ya que» en el texto principal.
- source_word: ἐδοξάσθη
  english_pob_choice: was glorified
  chosen_spanish: fue glorificado
  alternatives_spanish:
  - ha sido glorificado
  lexicon: BDAG
  rationale: El aoristo pasivo de δοξάζω se vierte de manera natural con pasado simple pasivo en español. «Fue glorificado» mantiene la voz pasiva y la acción completada sin cargar el verbo con matices adicionales.
- source_word: ἐν αὐτῷ
  english_pob_choice: in him
  chosen_spanish: en él
  alternatives_spanish:
  - por él
  - a través de él
  lexicon: BDAG
  rationale: Se conserva la preposición ἐν con «en», que refleja mejor la formulación joánica y la relación de inmanencia/glorificación mutua. «Por él» introduciría una interpretación más causal o instrumental.
- source_word: δοξάσει
  english_pob_choice: will glorify
  chosen_spanish: glorificará
  alternatives_spanish:
  - honrará
  lexicon: BDAG
  rationale: El futuro activo de δοξάζω se traduce con «glorificará» para mantener la continuidad léxica con la primera cláusula y evitar debilitar el peso teológico con «honrará».
- source_word: ἐν αὑτῷ
  english_pob_choice: in himself
  chosen_spanish: en sí mismo
  alternatives_spanish:
  - por sí mismo
  - con sí mismo
  lexicon: BDAG
  rationale: La expresión reflexiva se traduce literalmente como «en sí mismo» para preservar la densidad de la frase griega. En español suena más natural que «en él mismo» y conserva la ambigüedad teológica del original.
- source_word: εὐθὺς
  english_pob_choice: at once
  chosen_spanish: enseguida
  alternatives_spanish:
  - inmediatamente
  - de inmediato
  lexicon: BDAG
  rationale: «Enseguida» transmite con claridad la idea de inmediatez de εὐθύς en un registro moderno y digno, sin la rigidez de «inmediatamente».
theological_decisions:
- issue: Valor de εἰ en una afirmación cuya verdad el contexto presupone
  english_pob_reading: Retain 'If God was glorified in him' in the main text
  chosen_spanish_reading: Mantener «Si Dios fue glorificado en él» en el texto principal
  alternative_spanish_readings:
  - Ya que Dios fue glorificado en él
  - Puesto que Dios fue glorificado en él
  rationale: Aunque el contexto sugiere que la condición se asume como verdadera, la forma griega sigue siendo εἰ. Se conserva la tensión textual con «si» y se deja la lectura causal solo como alternativa, sin resolverla en el cuerpo principal.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Relación reflexiva de la gloria divina en la cláusula final
  english_pob_reading: '''in himself'' may be understood as ''with himself'' or ''by himself''; the Greek expression is compact and theologically dense.'
  chosen_spanish_reading: «en sí mismo» se mantiene como traducción principal, con posibles matices interpretativos no incorporados al texto
  alternative_spanish_readings:
  - con sí mismo
  - por sí mismo
  rationale: La frase griega es compacta y admite más de una glosa en español, pero la traducción principal debe conservar la forma breve y la densidad teológica. «En sí mismo» mantiene la referencia reflexiva a Dios sin explicar de más el mecanismo de la glorificación.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: El borrador sigue de cerca el último pase revisado del texto base en inglés, sin cambios aplicados en la revisión más reciente. Se respetó el acuerdo alto del control cruzado y se mantuvo la tensión de εἰ y la densidad de ἐν αὑτῷ sin suavizarlas.
  spanish_consistency_notes:
  - Se usa «Dios» de forma consistente para θεός.
  - Se conserva «glorificar» para δοξάζω en ambas cláusulas.
  - 'Se mantiene el paralelismo verbal del original: glorificado / glorificará / glorificará.'
  - Se evita sustituir la referencia reflexiva por una explicación interpretativa en el texto principal.
  - La puntuación reproduce el encadenamiento coordinado del griego con dos comas y una cláusula final unida por «y».
