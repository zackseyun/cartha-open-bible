translation:
  language: es
  text: Pero ninguno de los que estaban reclinados a la mesa supo por qué[a] le dijo esto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «con qué propósito le dijo esto».'
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦτο
  english_pob_choice: this
  chosen_spanish: lo
  alternatives_spanish:
  - esto
  lexicon: BDAG
  rationale: El demostrativo apunta a lo dicho o hecho antes; en español, el objeto directo átono 'lo' evita repetir innecesariamente 'esto' y mantiene la referencia anafórica sin perder naturalidad. 'Esto' sería más explícito, pero menos fluido aquí.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora
  lexicon: BDAG
  rationale: δέ introduce una continuación con contraste leve. 'Pero' transmite bien ese giro narrativo respecto del estado de ignorancia de los presentes.
- source_word: οὐδεὶς
  english_pob_choice: none
  chosen_spanish: ninguno
  alternatives_spanish:
  - nadie
  lexicon: BDAG
  rationale: Con el partitivo siguiente, 'ninguno' conserva la negación total y suena natural en español. 'Nadie' también sería posible, pero desplaza el foco desde el grupo al individuo.
- source_word: ἔγνω
  english_pob_choice: knew
  chosen_spanish: supo
  alternatives_spanish:
  - conoció
  - entendió
  - llegó a saber
  lexicon: BDAG
  rationale: Aquí γινώσκω expresa que no captaron el sentido del acto o palabra. 'Supo' comunica ese hecho de darse cuenta en español bíblico actual; 'entendió' sería más interpretativo.
- source_word: τῶν ἀνακειμένων
  english_pob_choice: of those reclining at the table
  chosen_spanish: de los que estaban reclinados a la mesa
  alternatives_spanish:
  - de los reclinados a la mesa
  - de los que estaban a la mesa
  lexicon: BDAG
  rationale: ἀνάκειμαι en contexto de comida alude a reclinarse para comer. 'Estaban reclinados a la mesa' preserva la imagen sin introducir una explicación ajena al texto; 'a la mesa' ayuda a situarlo en contexto de comida.
- source_word: πρὸς τί
  english_pob_choice: why
  chosen_spanish: por qué
  alternatives_spanish:
  - con qué propósito
  - para qué
  lexicon: BDAG
  rationale: La expresión idiomática pregunta por la causa o finalidad. 'Por qué' es la equivalencia natural en español y recoge bien el valor de pregunta por motivo o propósito.
- source_word: εἶπεν αὐτῷ
  english_pob_choice: he said this to him
  chosen_spanish: se lo dijo
  alternatives_spanish:
  - le dijo esto
  - se lo expresó
  lexicon: BDAG
  rationale: El griego une el pronombre demostrativo con el dativo del destinatario. 'Se lo dijo' condensa ambas ideas de forma idiomática en español y mantiene la referencia al contenido previo.
translation_notes:
  revision_awareness: Se mantiene la lectura narrativa simple del versículo sin añadir explicaciones. La nota reproduce la alternativa formal del inglés POB para πρὸς τί, ahora expresada en español.
  spanish_consistency_notes:
  - Se usa 'Mesa' solo en el sentido contextual de comer/reclinarse; no se traduce como un mueble aislado, sino como escena de comida.
  - Se evita 'entendió' para no mover el matiz de conocimiento factual hacia una interpretación más explicativa.
  - '''Pero'' conserva el leve contraste de δέ sin sobreactuarlo.'
