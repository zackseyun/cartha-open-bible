translation:
  language: es
  text: Por esto[a] todos sabrán que ustedes son mis discípulos[b], si tienen amor unos por otros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «En esto todos sabrán» o «Por este medio todos sabrán».
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «tienen amor entre unos y otros»; es decir, manifiestan amor mutuo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν τούτῳ
  english_pob_choice: By this
  chosen_spanish: En esto
  alternatives_spanish:
  - Por esto
  - De este modo
  lexicon: BDAG
  rationale: La frase griega funciona de manera demostrativa e instrumental, señalando el medio o la evidencia por la que se conocerá algo. «En esto» mantiene esa deixis de forma natural en español y conserva la posibilidad de leerla como señal identificadora o medio.
- source_word: γνώσονται
  english_pob_choice: will know
  chosen_spanish: conocerán
  alternatives_spanish:
  - sabrán
  - reconocerán
  lexicon: BDAG
  rationale: El futuro de γινώσκω aquí expresa llegar a conocer o identificar una realidad. «Conocerán» reproduce bien el alcance cognitivo sin estrecharlo solo a «saber» ni interpretarlo demasiado como «reconocerán».
- source_word: πάντες
  english_pob_choice: everyone
  chosen_spanish: todos
  alternatives_spanish:
  - todo el mundo
  - todas las personas
  lexicon: BDAG
  rationale: El plural masculino es genérico. «Todos» conserva la amplitud universal del griego con una forma natural en español y sin introducir sesgo masculino específico.
- source_word: ἐμοὶ μαθηταί ἐστε
  english_pob_choice: you are my disciples
  chosen_spanish: ustedes son mis discípulos
  alternatives_spanish:
  - son discípulos míos
  - ustedes son discípulos míos
  lexicon: BDAG
  rationale: 'El dativo posesivo con μαθηταί ἐστε expresa pertenencia: «mis discípulos». «Discípulos» es el equivalente más preciso y eclesialmente claro en español para μαθηταί, preservando la relación maestro-seguidor.'
- source_word: ἐὰν
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - cuando
  - en caso de que
  lexicon: BDAG
  rationale: La cláusula con subjuntivo presenta una condición. «Si» mantiene la estructura condicional del griego y su fuerza evidencial sin convertirla en una formulación temporal o causal.
- source_word: ἀγάπην
  english_pob_choice: love
  chosen_spanish: amor
  alternatives_spanish:
  - caridad
  lexicon: BDAG
  rationale: ἀγάπη se traduce por «amor» según el criterio doctrinal del proyecto. «Caridad» suena más arcaico en español actual y puede ocultar la conexión léxica con el lenguaje joánico.
- source_word: ἔχητε
  english_pob_choice: you have
  chosen_spanish: tienen
  alternatives_spanish:
  - tengan
  - posean
  lexicon: BDAG
  rationale: En español, dentro de la cláusula condicional, «si tienen amor» comunica de forma directa y natural la presencia continua de la cualidad. Aunque el griego usa subjuntivo, la construcción española estándar ya marca la condición con «si».
- source_word: ἐν ἀλλήλοις
  english_pob_choice: for one another
  chosen_spanish: unos por otros
  alternatives_spanish:
  - entre ustedes
  - mutuamente
  lexicon: BDAG
  rationale: La expresión griega es literalmente recíproca y apunta al amor mutuo dentro del grupo. «Unos por otros» transmite bien la reciprocidad y evita la literalidad poco natural de «en unos a otros».
theological_decisions:
- issue: Alcance universal de πάντες
  english_pob_reading: everyone
  chosen_spanish_reading: todos
  alternative_spanish_readings:
  - todo el mundo
  - todas las personas
  rationale: El griego no limita el referente a varones; es genérico y universal. «Todos» conserva la amplitud sin necesidad de aclaraciones interpretativas adicionales.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
- issue: Naturaleza de la condición introducida por ἐὰν
  english_pob_reading: if you have love for one another
  chosen_spanish_reading: si tienen amor unos por otros
  alternative_spanish_readings:
  - cuando tienen amor unos por otros
  - si se aman unos a otros
  rationale: La oración describe la evidencia identificadora del discipulado, no un mérito para obtenerlo. «Si» preserva la condición del griego y el valor probatorio de la señal de amor mutuo.
  doctrine_reference: DOCTRINE.md § Affirmations; § Translation philosophy, point 3
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto griego y mantiene el marco auditado de la POB en inglés: ἐν τούτῳ como señal instrumental/demostrativa, γνώσονται como «conocerán», πάντες como universal genérico, μαθηταί como «discípulos», ἀγάπη como «amor» y ἐν ἀλλήλοις como reciprocidad relacional. No se requirieron revisiones respecto del contexto fuente disponible.'
  spanish_consistency_notes:
  - Se mantiene «discípulos» para μαθηταί, coherente con el uso del Nuevo Testamento en español y con la decisión inglesa auditada.
  - Se usa «amor» para ἀγάπη, evitando «caridad» para conservar continuidad léxica y teológica.
  - La estructura «si tienen amor unos por otros» expresa la condición de manera idiomática en español y conserva el valor evidencial del original.
  - «En esto» reproduce la deixis del inicio y puede leerse como medio, evidencia o modo, según el matiz contextual.
