revisions:
- from: En esto todos conocerán que ustedes son mis discípulos[a][b], si tienen amor unos por otros.
  to: Por esto[a] todos sabrán que ustedes son mis discípulos[b], si tienen amor unos por otros.
  rationale: Se ajusta ἐν τούτῳ a «Por esto» para alinear el texto principal con la decisión instrumental documentada en el POB inglés. Se cambia «conocerán» por «sabrán» por mayor naturalidad en español en este contexto de reconocimiento público, sin alterar el sentido. Se mantienen «mis discípulos» y «amor unos por otros» por fidelidad léxica y claridad. También se armoniza la nota b con la forma verbal del texto revisado.
