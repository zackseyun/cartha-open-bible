base_translation:
  language: en
  yaml_path: translation/nt/john/013/036.yaml
  text: Simon Peter says to him[a], “Lord, where are you going?” Jesus answered, “Where I am going, you are not able to follow me now[b], but you will follow later.”
  footnotes:
  - marker: a
    text: Or “you cannot follow me now.” The Greek explicitly uses a verb of ability.
    reason: lexical_alternative
  - marker: b
    text: “You will follow later” may allude to Peter’s later following of Jesus in suffering or death; the wording itself does not specify how.
    reason: cross_reference
