translation:
  language: es
  text: 'Simón Pedro le dice: «Señor, ¿adónde vas?» Jesús respondió: «Adonde yo voy, no puedes seguirme ahora[a], pero me seguirás después[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no eres capaz de seguirme ahora». El griego usa explícitamente un verbo de capacidad.'
    reason: lexical_alternative
  - marker: b
    text: «Me seguirás después» puede aludir al posterior seguimiento de Jesús por parte de Pedro en sufrimiento o muerte; la expresión misma no lo especifica.
    reason: cross_reference
lexical_decisions:
- source_word: Λέγει
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - dijo
  lexicon: BDAG
  rationale: Se conserva el presente histórico del griego narrativo con «dice», que suena natural en español y mantiene la viveza del diálogo.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: En el trato directo a Jesús, «Señor» reproduce el valor reverencial y cristológico que la auditoría inglesa preserva con 'Lord'.
- source_word: ποῦ ὑπάγεις
  english_pob_choice: where are you going
  chosen_spanish: ¿adónde vas?
  alternatives_spanish:
  - ¿a dónde te vas?
  - ¿adónde te diriges?
  lexicon: BDAG
  rationale: «Adónde vas» expresa de forma natural el sentido de movimiento de ὑπάγω sin añadir una meta explícita que el griego no da.
- source_word: ἀπεκρίθη
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió Jesús
  lexicon: BDAG
  rationale: «Respondió» es una fórmula narrativa clara y fiel para ἀποκρίνομαι en el diálogo.
- source_word: Ὅπου ὑπάγω
  english_pob_choice: Where I am going
  chosen_spanish: Adonde yo voy
  alternatives_spanish:
  - Donde yo voy
  - Adonde voy
  lexicon: BDAG
  rationale: «Adonde yo voy» mantiene la relación verbal con la pregunta anterior y refleja con naturalidad la dirección implícita de ὅπου + ὑπάγω.
- source_word: οὐ δύνασαί μοι νῦν ἀκολουθῆσαι
  english_pob_choice: you are not able to follow me now
  chosen_spanish: no puedes seguirme ahora
  alternatives_spanish:
  - no eres capaz de seguirme ahora
  - no puedes acompañarme ahora
  lexicon: BDAG
  rationale: El griego expresa incapacidad con δύναμαι; en español, «no puedes» comunica esa capacidad sin sonar forzado. «Seguirme» reproduce ἀκολουθῆσαι con el matiz de discipulado presente en el contexto.
- source_word: ἀκολουθήσεις δὲ ὕστερον
  english_pob_choice: but you will follow later
  chosen_spanish: pero me seguirás después
  alternatives_spanish:
  - pero luego me seguirás
  - pero me seguirás más tarde
  lexicon: BDAG
  rationale: Se conserva el futuro y la oposición de δέ con «pero». «Después» traduce ὕστερον de manera sobria y fiel, sin especificar la forma concreta de ese seguimiento.
theological_decisions:
- issue: Implicación del futuro seguimiento de Pedro
  english_pob_reading: Render the statement without specifying in the main text whether it refers to Peter's later martyrdom, post-resurrection discipleship, or ultimate following in death/glory.
  chosen_spanish_reading: Traducir la afirmación sin precisar en el texto principal si alude al martirio posterior de Pedro, a su discipulado después de la resurrección o a otro seguimiento futuro.
  alternative_spanish_readings:
  - referencia al martirio de Pedro
  - referencia a la restauración y posterior discipulado de Pedro
  - seguimiento escatológico más amplio
  rationale: El griego solo afirma que Pedro no puede seguir ahora, pero sí después. La redacción española conserva esa apertura narrativa y teológica, evitando resolverla dentro del versículo.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: La versión revisada del texto inglés fue verificada como sin cambios sustantivos en la auditoría más reciente; no se detectaron correcciones necesarias para este versículo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención del proyecto cuando aparezca el nombre divino, pero aquí el texto no lo contiene.
  - «Señor» conserva la terminología cristológica estándar del proyecto para κύριος en este contexto.
  - «Seguirme» se usa de manera consistente para ἀκολουθέω cuando el objeto es Jesús y el contexto es discipular.
