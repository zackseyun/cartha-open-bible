translation:
  language: es
  text: 'No hablo acerca de todos ustedes[a]. Yo sé a quiénes he elegido. Pero esto es para que se cumpla la Escritura: “El que come mi pan[b] ha levantado contra mí su talón[c]”.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: “No hablo en cuanto a todos ustedes”.'
    reason: lexical_alternative
  - marker: b
    text: Cita o alusión al Salmo 41:9.
    reason: cross_reference
  - marker: c
    text: 'O: “ha alzado su talón contra mí”. La expresión es un modismo de hostilidad y traición.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ περὶ πάντων ὑμῶν λέγω
  english_pob_choice: I am not speaking about all of you
  chosen_spanish: No hablo acerca de todos ustedes
  alternatives_spanish:
  - No me refiero a todos ustedes
  - No hablo respecto de todos ustedes
  lexicon: BDAG
  rationale: περὶ con genitivo expresa relación o referencia (“acerca de/respecto de”). Hablar en presente simple suena natural en español y conserva la negación de alcance sin volverla más fuerte de lo que dice el griego.
- source_word: οἶδα
  english_pob_choice: I know
  chosen_spanish: Yo sé
  alternatives_spanish:
  - Yo conozco
  - Yo he sabido
  lexicon: BDAG
  rationale: οἶδα funciona con sentido presente en koiné; en español, “sé” comunica ese valor de conocimiento actual. Se mantiene el sujeto explícito para dar énfasis al contraste con “ustedes”.
- source_word: τίνας ἐξελεξάμην
  english_pob_choice: whom I have chosen
  chosen_spanish: a quiénes he elegido
  alternatives_spanish:
  - a los que he escogido
  - a quienes elegí
  lexicon: BDAG
  rationale: Se conserva el objeto personal interrogativo/relativo en plural (“a quiénes”) y el verbo ἐκλέγομαι como “elegir”. “He elegido” comunica la pertinencia actual del acto pasado sin introducir una explicación doctrinal.
- source_word: ἵνα ἡ γραφὴ πληρωθῇ
  english_pob_choice: the Scripture may be fulfilled
  chosen_spanish: para que se cumpla la Escritura
  alternatives_spanish:
  - a fin de que se cumpla la Escritura
  - para que la Escritura sea cumplida
  lexicon: BDAG
  rationale: En español, “para que” expresa bien la cláusula de propósito/resulta de ἵνα sin volverla pesada. “Se cumpla” mantiene el pasivo y evita una formulación artificial; “la Escritura” respeta el uso joánico de γραφή como Escritura sagrada.
- source_word: Ὁ τρώγων μου τὸν ἄρτον
  english_pob_choice: The one who eats my bread
  chosen_spanish: El que come de mi pan
  alternatives_spanish:
  - El que come mi pan
  - El que mastica mi pan
  lexicon: BDAG
  rationale: τρώγω es más vívido que el simple “comer”, pero en español “come de mi pan” conserva la imagen bíblica natural y evita una traducción áspera. Se prefiere “de mi pan” para reflejar el uso idiomático de participación en el pan compartido y mantener el paralelo con el salmo.
- source_word: ἐπῆρεν ἐπ’ ἐμὲ τὴν πτέρναν αὐτοῦ
  english_pob_choice: has lifted up his heel against me
  chosen_spanish: ha levantado contra mí su talón
  alternatives_spanish:
  - ha alzado contra mí su talón
  - ha alzado su talón contra mí
  lexicon: BDAG
  rationale: Se preserva la metáfora hebrea/grecolatina del talón levantado como gesto de hostilidad y traición. “Ha levantado contra mí su talón” suena más cercano al giro original y mantiene la tensión figurada sin explicarla en el texto principal.
theological_decisions:
- issue: Alcance de la elección de Jesús frente al traidor
  english_pob_reading: Translate ἐξελεξάμην straightforwardly as 'I have chosen' without importing a doctrinal explanation of election or excluding Judas in the wording.
  chosen_spanish_reading: Traducir “he elegido” sin convertirlo en una afirmación técnica sobre elección salvadora ni suavizar el hecho de que el contexto incluye al traidor.
  alternative_spanish_readings:
  - he escogido
  - he predestinado
  rationale: El versículo afirma el conocimiento y la elección de Jesús, pero no define por sí mismo la categoría teológica de esa elección. La traducción conserva la tensión del contexto inmediato sin resolverla con lenguaje doctrinal adicional.
  doctrine_reference: Translation philosophy §3
- issue: Valor de ἵνα en relación con la traición y el cumplimiento de la Escritura
  english_pob_reading: Render as 'But this is so that the Scripture may be fulfilled' to preserve the text's statement of scriptural fulfillment without expanding into a deterministic theological paraphrase.
  chosen_spanish_reading: “Pero esto es para que se cumpla la Escritura” mantiene el cumplimiento escritural sin añadir una explicación causal determinista.
  alternative_spanish_readings:
  - Pero esto sucedió porque la Escritura tenía que cumplirse
  - Pero esto ocurrió para cumplir la Escritura
  rationale: La cláusula expresa finalidad/cumplimiento, pero la traducción no debe convertirla en una tesis sobre fatalismo o necesidad absoluta más allá de lo que el texto declara. La formulación elegida es fiel y clara en español.
  doctrine_reference: Translation philosophy §1, §3
- issue: Cita/alusión al Salmo 41:9
  english_pob_reading: Quotation/allusion to Psalm 41:9.
  chosen_spanish_reading: Se señala la cita/alusión al Salmo 41:9 en nota.
  alternative_spanish_readings:
  - citar el salmo en el cuerpo del texto
  - omitir la referencia
  rationale: El texto griego reproduce claramente el eco del salmo; la referencia en nota ayuda al lector sin interrumpir la fluidez de la línea principal. Esto preserva la intertextualidad documentada por el audit trail.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: El pasaje fue revisado recientemente con resultado de alta concordancia y sin cambios necesarios; la presente redacción mantiene esa línea, conservando el valor presente de λέγω/οἶδα, la cláusula de propósito con ἵνα y la metáfora del talón sin resolverla en paráfrasis.
  spanish_consistency_notes:
  - Se usa “Yahvé” solo cuando el texto lo requiera explícitamente; aquí no aparece el tetragrámaton.
  - Se mantiene “Escritura” con mayúscula para reflejar el uso joánico de γραφή como referencia bíblica autorizada.
  - “Elegido”/“elegir” se conserva como decisión relacional de Jesús, no como término técnico de elección salvífica.
  - La imagen de “su talón” se preserva para no perder la fuerza figurada del eco salmódico.
