revisions:
- from: Porque les he dado un ejemplo[a], para que, así como yo he hecho con ustedes[b][c], ustedes también hagan.
  to: Porque les he dado un ejemplo[a][b], para que, así como yo hice con ustedes[c], ustedes también hagan.
  rationale: 'Se corrige la frase principal para mejorar la fidelidad al griego y al audit trail: se elimina «he hecho con ustedes», que sonaba impreciso, y se reubica la nota sobre el tiempo verbal en «les he dado». Se mantiene una formulación española natural en la cláusula comparativa, pero con una nota que reconoce la alternativa benefactiva y el valor del dativo.'
  reviewer_model: gpt-5.4
