translation:
  language: es
  text: Porque les he dado un ejemplo[a][b], para que, así como yo hice con ustedes[c], ustedes también hagan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un patrón» o «un modelo».
    reason: lexical_alternative
  - marker: b
    text: O «les di un ejemplo». El griego usa una forma simple de pasado; en español, «les he dado» puede resaltar mejor la relevancia actual del acto en el contexto.
    reason: lexical_alternative
  - marker: c
    text: O «hice por ustedes». El griego dice literalmente «hice a ustedes/para ustedes» con dativo; «con ustedes» se usa aquí como una expresión española natural para la acción realizada respecto de ellos en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπόδειγμα
  english_pob_choice: an example
  chosen_spanish: un ejemplo
  alternatives_spanish:
  - un patrón
  - un modelo
  lexicon: BDAG
  rationale: ὑπόδειγμα designa algo puesto delante como modelo para imitación. «Ejemplo» es el equivalente natural en español moderno y conserva la fuerza ética de imitación sin introducir un matiz técnico innecesario.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: γάρ introduce explicación de la afirmación anterior. «Porque» expresa bien esa relación causal-explicativa en español y mantiene la conexión lógica del dicho.
- source_word: ἔδωκα
  english_pob_choice: I have given
  chosen_spanish: les he dado
  alternatives_spanish:
  - les di
  lexicon: BDAG
  rationale: El aoristo griego es formalmente pasado, pero en este contexto tiene relevancia inmediata para los discípulos. El perfecto español («he dado») comunica mejor esa vigencia presente, siguiendo la decisión auditada del POB inglés.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: ἵνα expresa propósito. «Para que» es la forma española más natural y clara para ese valor final.
- source_word: καθὼς
  english_pob_choice: just as
  chosen_spanish: así como
  alternatives_spanish:
  - tal como
  - como
  lexicon: BDAG
  rationale: καθώς marca correspondencia entre la acción de Jesús y la de los discípulos. «Así como» reproduce esa comparación de modo explícito y elegante.
- source_word: ἐποίησα ὑμῖν
  english_pob_choice: I have done to you
  chosen_spanish: he hecho con ustedes
  alternatives_spanish:
  - he hecho a ustedes
  - he hecho para ustedes
  lexicon: BDAG
  rationale: ποιέω es amplio («hacer»). El dativo en este contexto acompaña la acción realizada respecto de los discípulos. «Con ustedes» evita sobrecargar el español con un «a» o «para» que podría sonar artificial, sin perder la referencia directa a la acción de Jesús sobre ellos.
- source_word: καὶ ὑμεῖς
  english_pob_choice: you also
  chosen_spanish: ustedes también
  alternatives_spanish:
  - también ustedes
  - ustedes igualmente
  lexicon: BDAG
  rationale: La construcción añade a los discípulos como participantes del mismo patrón. «Ustedes también» es natural y conserva la inclusión enfática.
- source_word: ποιῆτε
  english_pob_choice: may do
  chosen_spanish: hagan
  alternatives_spanish:
  - puedan hacer
  - deban hacer
  lexicon: BDAG
  rationale: Tras ἵνα, el subjuntivo presente expresa finalidad/resultado esperado. En español, el subjuntivo simple («hagan») comunica ese valor de manera fluida sin introducir una modalidad excesivamente interpretativa.
theological_decisions:
- issue: Fuerza ejemplar de la acción de Jesús
  english_pob_reading: Render the verse as presenting Jesus' action as an example for imitation without specifying sacramental, ecclesial, or merely symbolic conclusions beyond the text.
  chosen_spanish_reading: Presentar la acción de Jesús como un ejemplo que debe ser imitado, sin añadir conclusiones sacramentales, eclesiales o meramente simbólicas que el versículo no explicita.
  alternative_spanish_readings:
  - un mandato ritual universal de lavatorio de pies
  - un gesto solo simbólico sin fuerza imitativa concreta
  rationale: El texto dice explícitamente que Jesús dio un ejemplo para que los discípulos actuaran de manera correspondiente. La traducción debe preservar esa función ejemplar y no importar una conclusión denominacional ajena al versículo.
  doctrine_reference: Afirmaciones; filosofía de traducción §1, §3
translation_notes:
  revision_awareness: La revisión inglesa más reciente ajustó «for you» a «to you» para reflejar con más precisión el dativo griego y evitar una implicación benefactiva adicional. La versión española sigue esa decisión al usar «con ustedes» en el cuerpo del texto y, en nota, reconoce la alternativa más literal «a ustedes» sin imponerla como única opción.
  spanish_consistency_notes:
  - Se mantiene «ustedes» para el plural directo y contemporáneo en español latinoamericano.
  - Se evita «Cristo» o terminología litúrgica no presente en el versículo.
  - Se conserva el valor exhortativo del subjuntivo final («hagan») sin convertirlo en mandato más fuerte de lo que el griego exige.
  - La frase «he hecho con ustedes» busca equilibrar la literalidad del dativo con la naturalidad del español, sin borrar la relación directa entre Jesús y los discípulos.
