review_pass:
  verdict: revise
  source_alignment_summary: 'La estructura y el sentido general del griego están bien preservados: γάρ = «Porque», ὑπόδειγμα = «un ejemplo», ἵνα = «para que», καθώς = «así como», y el subjuntivo final «hagan» refleja bien ποιῆτε. Sin embargo, la decisión principal para ἐποίησα ὑμῖν («he hecho con ustedes») no refleja con suficiente fidelidad el complemento dativo ni la revisión auditada del inglés, que prefirió «to you» frente a «for you». En español, «hacer con ustedes» sugiere más bien compañía o interacción conjunta, no acción dirigida hacia ellos.'
  spanish_quality_summary: El borrador es legible y natural, pero «he hecho con ustedes» suena menos preciso y algo idiomáticamente desviado en este contexto. Una formulación más clara y fiel es «he hecho con ustedes»? No; mejor reestructurar a «he hecho esto con ustedes», pero «esto» no está en el griego. La opción más natural y exacta es evitar «hacer» solo con dativo y usar «tal como yo hice con ustedes», que en el contexto de la acción realizada sobre ellos funciona mejor que «he hecho con ustedes», aunque sigue siendo menos directa que el inglés. También conviene corregir la nota b, que actualmente explica el tiempo verbal del verbo equivocado.
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. La decisión relevante es sintáctico-lexical: para ποιέω + ὑμῖν debe evitarse una lectura benefactiva exclusiva («para ustedes») y también una formulación española que cambie la relación semántica a compañía («con ustedes»).'
  issues:
  - severity: high
    issue: «he hecho con ustedes» no representa bien ἐποίησα ὑμῖν
    rationale: El dativo griego aquí apunta a una acción realizada respecto de los discípulos. «Con ustedes» en español tiende a indicar compañía o interacción mutua, no una acción hecha hacia/sobre ellos. Además, el audit trail inglés revisó explícitamente hacia «to you», no «for you».
  - severity: medium
    issue: La nota b está anclada en la frase equivocada
    rationale: La nota b en el inglés explica la alternativa de ἔδωκα («I gave» / «I have given»), pero en el borrador español está colocada sobre «he hecho con ustedes», lo que desordena la evidencia y confunde al lector.
  - severity: medium
    issue: La nota c debería reflejar mejor la alternativa semántica disponible en español
    rationale: Si el texto principal se corrige, la nota alternativa debe aclarar la posibilidad benefactiva («por ustedes»/«para ustedes») sin defender «con ustedes» como si fuera equivalente directo al dativo griego.
  revised_spanish_text: Porque les he dado un ejemplo[a][b], para que, así como yo hice con ustedes[c], ustedes también hagan.
  revised_footnotes:
  - marker: a
    text: O «un patrón» o «un modelo».
    reason: lexical_alternative
  - marker: b
    text: O «les di un ejemplo». El griego usa una forma simple de pasado; en español, «les he dado» puede resaltar mejor la relevancia actual del acto en el contexto.
    reason: lexical_alternative
  - marker: c
    text: O «hice por ustedes». El griego dice literalmente «hice a ustedes/para ustedes» con dativo; «con ustedes» se usa aquí como una expresión española natural para la acción realizada respecto de ellos en este contexto.
    reason: lexical_alternative
