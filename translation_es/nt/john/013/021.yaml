    text: O, más literalmente, «me entregará».
    reason: lexical_alternative
  revision_rationale: Se ajusta «se turbó en espíritu» para una expresión española más natural y más cercana a la construcción documentada sin crear una nota innecesaria. Se cambia «me entregará» por «me traicionará» en el texto principal para seguir la decisión contextual principal del POB inglés sobre παραδίδωμι en este pasaje, y se conserva «me entregará» en nota como alternativa más literal. Se mantiene el resto de la redacción porque representa bien el griego y su tono solemne.
