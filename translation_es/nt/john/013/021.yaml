revisions:
- from: 'Después de decir estas cosas, Jesús se turbó en el espíritu[a] y dio testimonio, y dijo: «En verdad, en verdad les digo que uno de ustedes me entregará[b]».'
  to: 'Después de decir estas cosas, Jesús se turbó en espíritu y dio testimonio, y dijo: «En verdad, en verdad les digo que uno de ustedes me traicionará[a]»'
  rationale: Se ajusta «se turbó en espíritu» para una expresión española más natural y más cercana a la construcción documentada sin crear una nota innecesaria. Se cambia «me entregará» por «me traicionará» en el texto principal para seguir la decisión contextual principal del POB inglés sobre παραδίδωμι en este pasaje, y se conserva «me entregará» en nota como alternativa más literal. Se mantiene el resto de la redacción porque representa bien el griego y su tono solemne.
  reviewer_model: gpt-5.4
