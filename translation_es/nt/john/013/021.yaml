translation:
  language: es
  text: 'Después de decir estas cosas, Jesús se turbó en espíritu y dio testimonio, y dijo: «En verdad, en verdad les digo que uno de ustedes me traicionará[a]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «me entregará».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ταῦτα εἰπὼν
  english_pob_choice: After saying these things
  chosen_spanish: Después de decir estas cosas
  alternatives_spanish:
  - Habiendo dicho estas cosas
  - Cuando hubo dicho estas cosas
  lexicon: BDAG
  rationale: El participio aoristo con ταῦτα expresa anterioridad temporal. En español, "Después de decir estas cosas" conserva la secuencia sin volver la frase innecesariamente rígida.
- source_word: ἐταράχθη τῷ πνεύματι
  english_pob_choice: was troubled in spirit
  chosen_spanish: se turbó en el espíritu
  alternatives_spanish:
  - se turbó en su espíritu
  - se angustió en el espíritu
  - se turbó interiormente
  lexicon: BDAG
  rationale: '"ἐταράχθη" describe agitación o turbación interior; el dativo "τῷ πνεύματι" funciona como esfera o respecto. "Se turbó en el espíritu" conserva la estructura y la fuerza del griego sin intensificar más de lo que exige el texto.'
- source_word: ἐμαρτύρησεν
  english_pob_choice: testified
  chosen_spanish: dio testimonio
  alternatives_spanish:
  - testificó
  - declaró
  - dio testimonio solemnemente
  lexicon: BDAG
  rationale: En Juan, μαρτυρέω suele tener el sentido de dar testimonio. "Dio testimonio" es natural en español y mantiene el tono solemne mejor que una simple "declaró".
- source_word: Ἀμὴν ἀμὴν
  english_pob_choice: Truly, truly
  chosen_spanish: En verdad, en verdad
  alternatives_spanish:
  - Amén, amén
  - Verdaderamente, verdaderamente
  lexicon: BDAG
  rationale: La fórmula juanina de énfasis se puede verter con una repetición solemne y comprensible en español. "En verdad, en verdad" conserva la doble solemnidad sin introducir una traducción mecánica de "amén" donde su función es formularia.
- source_word: λέγω ὑμῖν
  english_pob_choice: I say to you
  chosen_spanish: les digo
  alternatives_spanish:
  - les digo a ustedes
  - yo les digo
  lexicon: BDAG
  rationale: El dativo plural se expresa naturalmente con "les". Se omite "yo" por ser implícito en el verbo y para conservar fluidez en español.
- source_word: εἷς ἐξ ὑμῶν
  english_pob_choice: one of you
  chosen_spanish: uno de ustedes
  alternatives_spanish:
  - uno de vosotros
  - uno entre ustedes
  lexicon: BDAG
  rationale: La expresión partititiva se traduce con la forma natural de español latinoamericano "uno de ustedes", que conserva la cercanía e impacto de la afirmación.
- source_word: παραδώσει με
  english_pob_choice: will betray me
  chosen_spanish: me entregará
  alternatives_spanish:
  - me traicionará
  - me pondrá en manos de otros
  - me entregará traicionándome
  lexicon: BDAG
  rationale: Παραδίδωμι significa literalmente "entregar / poner en manos de". Aunque en este contexto la acción es traidora, "me entregará" preserva el valor léxico de la raíz y mantiene abierta la tensión semántica que el POB inglés anotó con su nota alternativa.
theological_decisions:
- issue: La turbación de Jesús y su humanidad real
  english_pob_reading: was troubled in spirit
  chosen_spanish_reading: se turbó en el espíritu
  alternative_spanish_readings:
  - se turbó en su espíritu
  - se angustió en el espíritu
  - se turbó interiormente
  rationale: La traducción conserva la afirmación de una turbación real y no la suaviza ni la explica. Así deja en pie la humanidad plena de Jesús sin resolver la tensión que presenta el texto.
  doctrine_reference: Preservar la tensión teológica; cristología chalcedonense
- issue: παραδίδωμι en el anuncio de la traición
  english_pob_reading: will betray me
  chosen_spanish_reading: me entregará
  alternative_spanish_readings:
  - me traicionará
  - me pondrá en manos de otros
  rationale: En el contexto inmediato el acto es una traición, pero el verbo griego conserva el sentido básico de "entregar". Mantener "me entregará" respeta la amplitud léxica y evita imponer una sola paráfrasis donde el original permite más de una capa de sentido.
  doctrine_reference: Principio de equivalencia óptima; mantener alternativas auditables
- issue: La fórmula solemne de Jesús
  english_pob_reading: Truly, truly, I say to you
  chosen_spanish_reading: En verdad, en verdad les digo
  alternative_spanish_readings:
  - Amén, amén les digo
  - Verdaderamente, verdaderamente les digo
  rationale: La repetición solmene de ἀμήν ἀμήν requiere una formulación que suene natural en español y conserve el peso retórico del anuncio de Jesús.
  doctrine_reference: Uso joánico de fórmulas solemnes
translation_notes:
  revision_awareness: Se verificó el pasaje frente al texto griego SBLGNT y el audit trail inglés. La única decisión con tensión relevante es παραδώσει με, donde el inglés POB opta por "will betray me" y conserva la alternativa literal en nota; en español se priorizó "me entregará" para preservar el valor léxico central, dejando la opción interpretativa en la nota. La fórmula Ἀμὴν ἀμὴν se mantuvo como repetición solemne equivalente a la inglesa.
  spanish_consistency_notes:
  - Se usa "Jesús" para Ἰησοῦς.
  - Se usa "espíritu" para πνεύμα y se conserva el dativo de esfera con "en el espíritu".
  - Se usa "dio testimonio" para μαρτυρέω en registro joánico.
  - Se evita "SEÑOR" porque no aparece en este versículo.
  - Se usa "uno de ustedes" por español latinoamericano neutral.
  - Se mantiene "me entregará" para παραδώσει, con nota que preserva la lectura alternativa de traición.
