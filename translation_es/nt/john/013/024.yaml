translation:
  language: es
  text: Entonces Simón Pedro le hizo señas a este[a] para que preguntara quién podría ser, de quién hablaba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Simón Pedro, por tanto, le hace señas a este para inquirir quién podría ser, acerca de quién habla».'
    reason: alternative_reading
lexical_decisions:
- source_word: νεύει
  english_pob_choice: motioned
  chosen_spanish: le hizo señas
  alternatives_spanish:
  - le señaló
  - le gesticuló
  - le hizo una seña
  lexicon: BDAG
  rationale: El verbo griego expresa una comunicación no verbal mediante un gesto. «Le hizo señas» conserva esa acción física y es natural en español sin reducirla a un simple asentir con la cabeza.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Entonces
  alternatives_spanish:
  - Así que
  - Por tanto
  - Pues
  lexicon: BDAG
  rationale: Aquí marca continuación narrativa. «Entonces» fluye bien en español y reproduce la secuencia inferencial sin sobreactuar la conclusión.
- source_word: τούτῳ
  english_pob_choice: to this one
  chosen_spanish: a éste
  alternatives_spanish:
  - a él
  - a este
  - a ese discípulo
  lexicon: BDAG
  rationale: El demostrativo conserva la referencia cercana al discípulo señalado en el contexto. «A éste» preserva mejor la deixis que un simple «a él».
- source_word: πυθέσθαι
  english_pob_choice: to ask
  chosen_spanish: para preguntar
  alternatives_spanish:
  - para inquirir
  - para averiguar
  lexicon: BDAG
  rationale: 'En este contexto el infinitivo expresa la intención del gesto de Pedro: que el discípulo haga la pregunta. «Para preguntar» es la opción más clara y directa en español.'
- source_word: τίς ἂν εἴη
  english_pob_choice: who it might be
  chosen_spanish: quién podría ser
  alternatives_spanish:
  - quién sería
  - quién podría ser él
  lexicon: BDAG
  rationale: La combinación con ἄν y el optativo comunica indeterminación o posibilidad. «Quién podría ser» reproduce bien esa cautela sin sonar forzado.
- source_word: περὶ οὗ λέγει
  english_pob_choice: about whom he was speaking
  chosen_spanish: del que hablaba
  alternatives_spanish:
  - acerca de quien hablaba
  - de quien estaba hablando
  lexicon: BDAG
  rationale: El griego significa literalmente «acerca de quien habla». En español, «del que hablaba» integra la relación con verbo natural y conserva la referencia al contenido del discurso, sin perder el sentido personal del relativo.
theological_decisions:
- issue: Referencia pronominal y tono discursivo
  english_pob_reading: about whom he was speaking
  chosen_spanish_reading: del que hablaba
  alternative_spanish_readings:
  - de quien hablaba
  - acerca de quien hablaba
  rationale: No hay una cuestión doctrinal, sino de referencia y registro. Se evita una formulación excesivamente formal que pudiera sonar artificial, manteniendo la ambigüedad del referente según el contexto narrativo.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'La revisión inglesa reciente sustituyó una frase más explicativa por «about whom he was speaking», elevando el registro sin cambiar el sentido. La versión española mantiene ese mismo nivel de formalidad con una construcción natural: «del que hablaba».'
  spanish_consistency_notes:
  - Se mantiene «Entonces» para la continuidad narrativa de οὖν, evitando un calco demasiado jurídico como «por tanto» en el texto principal.
  - Se usa el demostrativo «éste» para conservar la proximidad referencial de τούτῳ.
  - La relativa final «del que hablaba» procura ser idiomática en español y a la vez fiel al valor del relativo griego.
  - El tono general es sobrio y publicable, sin agregar información no presente en el griego.
