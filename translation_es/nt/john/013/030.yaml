    text: Or 'the morsel' or 'the piece.' The Greek ψωμίον refers to a small piece of bread or food given at the meal.
    reason: lexical_alternative
  - marker: b
    text: Greek 'that one'; the wording is more emphatic than a simple 'he,' likely drawing attention to Judas.
    reason: lexical_alternative
  - marker: c
    text: John's mention that 'it was night' is a literal time reference and may also echo the Gospel's light/darkness theme.
    reason: cross_reference
