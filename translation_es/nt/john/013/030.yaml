translation:
  language: es
  text: Así que, después de tomar el pedazo de pan[a], aquel salió de inmediato[b]. Y era de noche[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el bocado» o «la porción». El griego ψωμίον se refiere a una pequeña pieza de pan o de comida dada durante la comida.
    reason: lexical_alternative
  - marker: b
    text: El griego dice literalmente «aquél/ese hombre» con énfasis; la expresión es más marcada que un simple «él», probablemente señalando a Judas.
    reason: lexical_alternative
  - marker: c
    text: La mención de que «era de noche» es un dato temporal literal y también puede resonar con el tema juanino de luz y tinieblas.
    reason: cross_reference
lexical_decisions:
- source_word: λαβὼν
  english_pob_choice: after taking
  chosen_spanish: después de tomar
  alternatives_spanish:
  - habiendo tomado
  - cuando hubo tomado
  lexicon: BDAG
  rationale: El participio aoristo funciona temporalmente; «después de tomar» expresa la secuencia de manera natural en español y conserva el avance narrativo sin sobrecargar la frase.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - entonces
  - por tanto
  lexicon: BDAG
  rationale: οὖν marca progresión narrativa. «Así que» mantiene la conexión discursiva con fluidez moderna y sin añadir una relación lógica más fuerte de la que el contexto exige.
- source_word: τὸ ψωμίον
  english_pob_choice: the piece of bread
  chosen_spanish: el pedazo de pan
  alternatives_spanish:
  - el bocado
  - la porción de pan
  - el mordisco
  lexicon: BDAG
  rationale: ψωμίον designa una pequeña porción de pan o comida dada en la mesa. «Pedazo de pan» conserva la concreción material y resulta claro para el lector hispano; evita «morsel»/«sop» por arcaísmo o ambigüedad.
- source_word: ἐκεῖνος
  english_pob_choice: he / that one
  chosen_spanish: salió
  alternatives_spanish:
  - él salió
  - ese salió
  - salió ese
  lexicon: BDAG
  rationale: El griego usa el demostrativo con énfasis, pero en español un pronombre enfático explícito puede sonar torpe aquí. Se deja el referente implícito en el verbo, mientras la nota explica el matiz de distancia/enfasis del original.
- source_word: ἐξῆλθεν
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - se fue
  - salió afuera
  - partió
  lexicon: BDAG
  rationale: ἐξέρχομαι significa «salir / irse». «Salió» es la forma más natural y precisa en español, y mantiene el sentido espacial del verbo.
- source_word: εὐθύς
  english_pob_choice: immediately
  chosen_spanish: de inmediato
  alternatives_spanish:
  - enseguida
  - al instante
  - inmediatamente
  lexicon: BDAG
  rationale: εὐθύς indica prontitud. «De inmediato» es claro, solemne y idiomático en español, sin perder el énfasis temporal.
- source_word: ἦν δὲ νύξ
  english_pob_choice: And it was night
  chosen_spanish: Y era de noche
  alternatives_spanish:
  - Y era noche
  - Y era ya de noche
  - Y estaba anocheciendo
  lexicon: BDAG
  rationale: La cláusula expresa una referencia temporal literal. «Era de noche» reproduce el dato sin convertirlo en interpretación; la forma «de noche» es la más natural en español.
theological_decisions:
- issue: Posible simbolismo de «noche» en Juan
  english_pob_reading: 'Render the clause literally as a temporal statement: ''And it was night.'''
  chosen_spanish_reading: 'Traducirlo literalmente como una indicación temporal: «Y era de noche».'
  alternative_spanish_readings:
  - Y era oscuridad
  - Y se hizo noche en sentido simbólico
  - Y era noche, señal de tinieblas espirituales
  rationale: Aunque Juan suele usar luz/oscuridad con carga teológica, aquí el griego formula una frase temporal simple. La traducción principal conserva esa literalidad y deja la resonancia simbólica para la exégesis, no para la redacción.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica sin resolverla en la traducción.'
- issue: Fuerza del demostrativo ἐκεῖνος respecto de Judas
  english_pob_reading: Retain emphasis with 'that man' rather than reducing it to 'he.'
  chosen_spanish_reading: No se explicita en el cuerpo principal; se registra la función enfática en nota.
  alternative_spanish_readings:
  - ese
  - aquel
  - ese mismo
  rationale: El demostrativo griego probablemente subraya distancia narrativa y énfasis referencial. En español, una marca forzada puede sonar artificial; por eso se preserva la naturalidad del texto principal y se documenta el matiz en nota.
  doctrine_reference: 'Translation philosophy §1 y §5: primacía del original y consistencia/documentación de excepciones.'
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego y el audit trail inglés, pero adapta la sintaxis para que suene natural en español. Se conservó el valor temporal de λαβών + ἐξῆλθεν, la puntualidad de εὐθύς y la literalidad de ἦν δὲ νύξ, mientras que el énfasis de ἐκεῖνος se documenta en nota para no introducir una construcción forzada en el texto principal.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo YHWH aparezca; aquí no aplica.
  - Se evitó «Señor» como sustituto teológico porque el versículo no contiene κύριος ni el nombre divino.
  - «Pan» se mantuvo en sentido concreto de la porción de comida, en continuidad con la nota lexical.
  - La puntuación y el orden responden al español moderno, sin perder la secuencia narrativa del griego.
