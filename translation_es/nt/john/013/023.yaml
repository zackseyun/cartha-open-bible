translation:
  language: es
  text: Uno de sus discípulos, a quien Jesús amaba, estaba recostado en el seno[a] de Jesús.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «en el seno de Jesús», expresión que describe la posición de uno que se recuesta junto a otro durante la comida.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνακείμενος
  english_pob_choice: was reclining
  chosen_spanish: estaba recostado
  alternatives_spanish:
  - estaba reclinado
  - estaba recostándose
  - estaba a la mesa
  lexicon: BDAG
  rationale: El participio describe la postura de comer en un banquete. En español, «estar recostado» comunica con naturalidad esa postura reclinada sin perder el rasgo histórico de la escena.
- source_word: εἷς ἐκ τῶν μαθητῶν αὐτοῦ
  english_pob_choice: One of his disciples
  chosen_spanish: Uno de sus discípulos
  alternatives_spanish:
  - uno de entre sus discípulos
  - uno de los discípulos de él
  lexicon: BDAG
  rationale: La expresión partititiva se refleja de manera idiomática y fiel con «Uno de sus discípulos».
- source_word: ἐν τῷ κόλπῳ τοῦ Ἰησοῦ
  english_pob_choice: in Jesus' bosom
  chosen_spanish: en el seno de Jesús
  alternatives_spanish:
  - en el regazo de Jesús
  - junto a Jesús
  - en el pecho de Jesús
  lexicon: BDAG
  rationale: «κόλπος» puede referirse al seno/pecho o al pliegue del vestido, y en el contexto de comida describe proximidad corporal en la mesa. «En el seno de Jesús» conserva la imagen literal sin volverla innecesariamente anacrónica.
- source_word: ὃν ἠγάπα ὁ Ἰησοῦς
  english_pob_choice: whom Jesus loved
  chosen_spanish: a quien Jesús amaba
  alternatives_spanish:
  - al que Jesús amaba
  - a quien Jesús quería
  lexicon: BDAG
  rationale: ἀγαπάω se traduce aquí con «amar» para mantener la fuerza habitual del verbo y la fórmula joánica tradicional sin suavizarla.
theological_decisions:
- issue: Imagen relacional y de mesa en ἐν τῷ κόλπῳ τοῦ Ἰησοῦ
  english_pob_reading: Translate the meal posture idiomatically as spatial closeness rather than with the literal 'in the bosom of Jesus' in the main text.
  chosen_spanish_reading: Mantener la imagen literal «en el seno de Jesús» en el texto principal, porque la metáfora joánica es significativa y el español la entiende sin excesiva extrañeza.
  alternative_spanish_readings:
  - junto a Jesús
  - a su lado
  - en el regazo de Jesús
  rationale: La frase no solo describe ubicación, sino una cercanía marcada en la escena del banquete. «En el seno de Jesús» preserva la tensión entre proximidad física y resonancia literaria sin borrar el valor expresivo del griego.
  doctrine_reference: Juan 13:23; Juan 1:18; principios de equivalencia óptima
- issue: Verbo ἀγαπάω en la fórmula del discípulo amado
  english_pob_reading: whom Jesus loved
  chosen_spanish_reading: a quien Jesús amaba
  alternative_spanish_readings:
  - al que Jesús amaba
  - el discípulo a quien Jesús amaba
  rationale: Se conserva la lectura relacional directa del texto, evitando rebajar la afirmación a simple preferencia o afecto menor.
  doctrine_reference: Juan 13:23; uso joánico de ἀγαπάω
translation_notes:
  revision_awareness: El inglés POB pasó de una redacción más interpretativa («close beside Jesus») a una más literal («in Jesus' bosom»). En español se siguió esa revisión y se optó por una forma principal literal y digna, con nota que explicita el sentido posicional de la expresión.
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς.
  - Se usa «discípulos» para μαθηταί.
  - Se conserva el verbo «amar» para ἀγαπάω.
  - «Seno» se eligió para reflejar κόλπος con mayor cercanía al texto que una paráfrasis espacial, sin perder inteligibilidad.
