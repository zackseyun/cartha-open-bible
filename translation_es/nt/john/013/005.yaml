translation:
  language: es
  text: Entonces echa agua en el lavatorio[a], y comenzó a lavar los pies de los discípulos y a secarlos con la toalla con la que estaba ceñido[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «palangana». El griego designa un recipiente usado para lavarse.
    reason: lexical_alternative
  - marker: b
    text: O «con la que se había ceñido». El griego se refiere a la toalla que llevaba atada alrededor de sí para el servicio.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶτα
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - Después
  lexicon: BDAG
  rationale: Marca la secuencia narrativa inmediata; «Entonces» es natural en español y conserva el valor consecutivo sin añadir énfasis extra.
- source_word: βάλλει
  english_pob_choice: pours
  chosen_spanish: echa
  alternatives_spanish:
  - pone
  - derrama
  lexicon: BDAG
  rationale: Con agua en un recipiente, «echa» comunica bien la acción sin volverla más literal de lo necesario. «Derrama» sugeriría un accidente; «pone» sería demasiado general.
- source_word: ὕδωρ εἰς τὸν νιπτῆρα
  english_pob_choice: water into the washbasin
  chosen_spanish: agua en el lavatorio
  alternatives_spanish:
  - agua en la palangana
  - agua en el lavabo
  lexicon: BDAG
  rationale: νιπτήρ designa un recipiente para lavarse; «lavatorio» conserva la función del objeto y suena natural y digno en español bíblico. Se evita «lavabo» por su asociación moderna con el baño.
- source_word: ἤρξατο νίπτειν
  english_pob_choice: began to wash
  chosen_spanish: comenzó a lavar
  alternatives_spanish:
  - empezó a lavar
  - se puso a lavar
  lexicon: BDAG
  rationale: La construcción con infinitivo se expresa de forma directa con «comenzó a lavar», manteniendo el arranque de la acción.
- source_word: τοὺς πόδας τῶν μαθητῶν
  english_pob_choice: the disciples’ feet
  chosen_spanish: los pies de los discípulos
  alternatives_spanish:
  - los pies de sus discípulos
  lexicon: BDAG
  rationale: Se conserva la relación genitiva de manera transparente y natural en español.
- source_word: ἐκμάσσειν
  english_pob_choice: to wipe them
  chosen_spanish: a limpiarlos
  alternatives_spanish:
  - a secarlos
  - a enjugarles
  lexicon: BDAG
  rationale: El verbo puede implicar secar por fricción. «Limpiarlos» refleja el gesto en español y evita una repetición mecánica de «secar» que podría sonar demasiado restringida.
- source_word: τῷ λεντίῳ
  english_pob_choice: with the towel
  chosen_spanish: con la toalla
  alternatives_spanish:
  - con el paño
  - con el lienzo
  lexicon: BDAG
  rationale: λέντιον denota un paño o toalla usada para secar; «toalla» es la equivalencia más clara y funcional en español.
- source_word: ᾧ ἦν διεζωσμένος
  english_pob_choice: with which he was girded
  chosen_spanish: con la que estaba ceñido
  alternatives_spanish:
  - con la que estaba cingido
  - con la que estaba atado
  lexicon: BDAG
  rationale: El participio expresa que llevaba el paño ceñido alrededor del cuerpo. «Ceñido» preserva la imagen idiomática y es comprensible; «atado» perdería la idea de servicio ordenado.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del texto inglés auditado: se conserva la secuencia narrativa simple («Then»), el valor instrumental de βάλλει con agua, la función del νιπτῆρ como recipiente para lavar, y el sentido formal de διεζωσμένος como estar ceñido/girded. Se evita calcar el inglés donde el español requiere una solución idiomática, pero sin perder la tensión lexical del original.'
  spanish_consistency_notes:
  - Se mantiene «lavatorio» para νιπτῆρ, coherente con una traducción funcional del recipiente.
  - «Ceñido» conserva el matiz de διεζωσμένος sin sobre-explicar el gesto.
  - «Limpiarlos» traduce ἐκμάσσειν con naturalidad; la nota ofrece «ceñido» como alternativa más literal en el pasaje final.
  - Se usa «discípulos» y no otra denominación, siguiendo el referente directo del griego.
  - La puntuación sigue el orden narrativo de una sola oración compuesta, como en el original.
