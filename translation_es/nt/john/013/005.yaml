revisions:
- from: Entonces echa agua en el lavatorio[a], y comenzó a lavar los pies de los discípulos y a limpiarlos con la toalla con la que estaba ceñido[b].
  to: Entonces echa agua en el lavatorio[a], y comenzó a lavar los pies de los discípulos y a secarlos con la toalla con la que estaba ceñido[b].
  rationale: Se sustituyó «limpiarlos» por «secarlos» para reflejar mejor ἐκμάσσειν en su contexto inmediato de lavar los pies y usar una toalla. Se mantuvo «lavatorio» y «ceñido» como opciones aceptables y fieles. También se corrigió la nota b para que ofrezca una alternativa real y explique mejor el modismo griego.
