review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la secuencia y la mayoría de las decisiones léxicas del griego: «Entonces», «comenzó a lavar», «los pies de los discípulos», «con la toalla» y «estaba ceñido» reflejan adecuadamente εἶτα, ἤρξατο νίπτειν, τοὺς πόδας τῶν μαθητῶν, τῷ λεντίῳ y ᾧ ἦν διεζωσμένος. Sin embargo, «a limpiarlos» no preserva con suficiente precisión ἐκμάσσειν, que aquí significa secar/enjugar o limpiar por frotación después del lavado, no simplemente limpiar. Además, la nota b está mal anclada como alternativa, porque repite exactamente la redacción principal en vez de ofrecer una alternativa real.'
  spanish_quality_summary: El español es claro y digno, pero requiere un ajuste menor para mayor precisión semántica y naturalidad contextual. «Lavatorio» funciona, aunque es algo más marcado; sigue siendo aceptable con la nota de alternativa «palangana». El principal problema de legibilidad/fidelidad es «limpiarlos», que suena menos específico tras «lavar los pies» y puede sugerir una acción redundante en vez de secarlos con la toalla.
  glossary_alignment: 'No hay conflictos con la terminología doctrinal del proyecto. La revisión necesaria es léxica: ἐκμάσσειν debe representarse mejor como «secarlos» o «enjugarlos», en línea con la decisión inglesa «to wipe them». «Ceñido» concuerda bien con διεζωσμένος.'
  issues:
  - severity: medium
    issue: «a limpiarlos» para ἐκμάσσειν es demasiado impreciso
    rationale: En este contexto, después de lavar los pies y usando una toalla, el verbo apunta a secar/enjugar por frotación. «Limpiarlos» difumina la acción específica y no conserva bien la progresión narrativa del griego.
  - severity: low
    issue: La nota b no ofrece una alternativa real
    rationale: La nota dice «O “con la que estaba ceñido”», que repite la frase del texto principal. Debe presentar una alternativa genuina o una aclaración del modismo.
  revised_spanish_text: Entonces echa agua en el lavatorio[a], y comenzó a lavar los pies de los discípulos y a secarlos con la toalla con la que estaba ceñido[b].
  revised_footnotes:
  - marker: a
    text: O «palangana». El griego designa un recipiente usado para lavarse.
    reason: lexical_alternative
  - marker: b
    text: O «con la que se había ceñido». El griego se refiere a la toalla que llevaba atada alrededor de sí para el servicio.
    reason: lexical_alternative
  revision_rationale: Se sustituyó «limpiarlos» por «secarlos» para reflejar mejor ἐκμάσσειν en su contexto inmediato de lavar los pies y usar una toalla. Se mantuvo «lavatorio» y «ceñido» como opciones aceptables y fieles. También se corrigió la nota b para que ofrezca una alternativa real y explique mejor el modismo griego.
