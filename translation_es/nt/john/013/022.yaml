translation:
  language: es
  text: Los discípulos se miraban unos a otros, perplejos, sin saber de quién hablaba[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Los discípulos seguían mirándose unos a otros, perplejos acerca de quién estaba hablando».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔβλεπον
  english_pob_choice: were looking
  chosen_spanish: se miraban
  alternatives_spanish:
  - se estaban mirando
  - se miraban unos a otros
  lexicon: BDAG
  rationale: El imperfecto expresa una acción en curso; en español, «se miraban» comunica de forma natural esa continuidad narrativa sin volver la frase pesada.
- source_word: εἰς ἀλλήλους
  english_pob_choice: at one another
  chosen_spanish: unos a otros
  alternatives_spanish:
  - entre sí
  - el uno al otro
  lexicon: BDAG
  rationale: La expresión indica mirada mutua entre los discípulos. «Unos a otros» reproduce bien el sentido recíproco en español bíblico actual.
- source_word: οἱ μαθηταὶ
  english_pob_choice: the disciples
  chosen_spanish: los discípulos
  alternatives_spanish:
  - sus discípulos
  lexicon: BDAG
  rationale: El artículo griego remite al grupo ya identificado en el contexto; en español basta «los discípulos» sin añadir posesivo no explícito.
- source_word: ἀπορούμενοι
  english_pob_choice: at a loss
  chosen_spanish: perplejos
  alternatives_spanish:
  - sin saber qué pensar
  - desconcertados
  lexicon: BDAG
  rationale: El participio expresa desconcierto o incertidumbre. «Perplejos» conserva esa tensión con un registro natural y digno en español.
- source_word: περὶ τίνος
  english_pob_choice: about whom
  chosen_spanish: acerca de a quién
  alternatives_spanish:
  - sobre quién
  - de quién
  lexicon: BDAG
  rationale: La construcción griega pregunta por la persona de la que hablaba Jesús. En español, «acerca de a quién se refería» refleja esa relación de forma fluida y precisa.
- source_word: λέγει
  english_pob_choice: he was speaking
  chosen_spanish: se refería
  alternatives_spanish:
  - hablaba
  - estaba hablando
  lexicon: BDAG
  rationale: Aunque el verbo griego es presente, en el discurso indirecto español resulta natural expresar el sentido con «se refería», que evita una redundancia torpe y mantiene la referencia al contenido de la խոսa hablada.
translation_notes:
  revision_awareness: El texto griego presenta un imperfecto durativo (ἔβλεπον) y un participio de desconcierto (ἀπορούμενοι). La redacción española conserva ambos valores con una escena continua («se miraban») y un calificativo de incertidumbre («perplejos»), mientras que la nota ofrece una alternativa más explícita para el matiz iterativo.
  spanish_consistency_notes:
  - Se mantiene «discípulos» como término estándar del contexto inmediato.
  - No se introduce «Cristo», «Señor» ni otras etiquetas no presentes en el versículo.
  - La frase final usa un giro español natural para περὶ τίνος λέγει sin añadir contenido doctrinal.
