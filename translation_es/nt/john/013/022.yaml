revisions:
- from: Los discípulos se miraban unos a otros, perplejos acerca de a quién se refería[a].
  to: Los discípulos se miraban unos a otros, perplejos, sin saber de quién hablaba[a].
  rationale: Se ajusta el final para reflejar más fielmente λέγει como acto de hablar, no solo de referirse, y para mejorar la naturalidad del español. «Sin saber de quién hablaba» comunica bien el valor de ἀπορούμενοι περὶ τίνος λέγει en un español claro y digno. La nota conserva la alternativa durativa para ἔβλεπον y una formulación más cercana a la estructura del inglés auditado.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:04:51Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien el sentido básico del griego: la mirada mutua continua de los discípulos y su desconcierto respecto de la persona aludida. Sin embargo, «se refería» desplaza levemente λέγει (‘dice/habla’) hacia una interpretación de significado más que de habla, cuando el inglés auditado preserva explícitamente el valor verbal ‘he was speaking about’.'
  spanish_quality_summary: El español es claro y natural, pero «acerca de a quién se refería» suena algo forzado por la secuencia preposicional y por el cambio a «referirse». Una formulación como «sin saber de quién hablaba» o «perplejos acerca de quién estaba hablando» suena más idiomática. Dado el registro bíblico moderno y digno, conviene evitar la construcción menos fluida.
  glossary_alignment: No hay términos doctrinales o de glosario mayor en juego. «Los discípulos» y «perplejos» son adecuados. La principal cuestión léxica es mantener λέγει más cerca de «hablaba» que de «se refería».
  issues:
  - severity: medium
    issue: «se refería» sobreinterpreta λέγει
    rationale: El griego usa λέγει, y la auditoría inglesa escogió ‘he was speaking’ precisamente para preservar el sentido verbal sin pasar a ‘meant’. «Se refería» en español se acerca más a ‘quería decir’ o ‘aludía’, con un matiz interpretativo adicional.
  - severity: low
    issue: «acerca de a quién» es poco fluido en español
    rationale: Aunque comprensible, la combinación resulta pesada. Puede expresarse el mismo sentido de manera más natural con «de quién hablaba» sin pérdida de precisión.
  - severity: low
    issue: La nota alternativa no refleja la mejor reparación del verbo final
    rationale: La nota repite «se refería», por lo que conviene alinearla también con una opción que preserve mejor el valor de habla de λέγει.
  revised_spanish_text: Los discípulos se miraban unos a otros, perplejos, sin saber de quién hablaba[a].
  revised_footnotes:
  - marker: a
    text: O «Los discípulos seguían mirándose unos a otros, perplejos acerca de quién estaba hablando».
    reason: lexical_alternative
  revision_rationale: Se ajusta el final para reflejar más fielmente λέγει como acto de hablar, no solo de referirse, y para mejorar la naturalidad del español. «Sin saber de quién hablaba» comunica bien el valor de ἀπορούμενοι περὶ τίνος λέγει en un español claro y digno. La nota conserva la alternativa durativa para ἔβλεπον y una formulación más cercana a la estructura del inglés auditado.
