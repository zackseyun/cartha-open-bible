  glossary_alignment: No hay términos del glosario mayor en juego. La principal cuestión léxica es la relación οἶδας / γνώσῃ. En español conviene no forzar una repetición de «saber» si eso debilita la inteligibilidad; la diferencia puede preservarse mediante nota léxica, como ya hace el POB inglés.
