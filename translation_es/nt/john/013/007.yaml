translation:
  language: es
  text: 'Jesús le respondió y le dijo: «Lo que hago, tú no lo sabes ahora[a], pero lo entenderás después de estas cosas[b].»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no entiendes ahora … pero entenderás después». El griego usa dos verbos distintos, uno a menudo traducido «saber» y el otro «llegar a saber» o «entender».
    reason: lexical_alternative
  - marker: b
    text: «Después de estas cosas» puede referirse a lo que sigue en este episodio o, más ampliamente, a acontecimientos posteriores que aclararían la acción de Jesús.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀπεκρίθη
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: BDAG
  rationale: En español, «respondió» conserva el valor narrativo de ἀπεκρίθη y suena natural junto con el verbo de habla siguiente. Evita la repetición pesada de un calco como «contestó» cuando el texto ya continúa con «le dijo».
- source_word: εἶπεν
  english_pob_choice: said
  chosen_spanish: le dijo
  alternatives_spanish:
  - dijo
  - le habló
  lexicon: BDAG
  rationale: El griego conserva dos verbos; en español, «respondió y le dijo» refleja esa doble formulación sin sonar rígido. «Le dijo» mantiene el objeto indirecto αὐτῷ y el tono directo del discurso.
- source_word: Ὃ
  english_pob_choice: What
  chosen_spanish: Lo que
  alternatives_spanish:
  - Aquello que
  - Eso que
  lexicon: BDAG
  rationale: El pronombre neutro relativo introduce una cláusula objetiva. «Lo que» es la forma española más natural y fiel para expresar el objeto de la acción de Jesús.
- source_word: ποιῶ
  english_pob_choice: I am doing
  chosen_spanish: hago
  alternatives_spanish:
  - estoy haciendo
  - hago
  lexicon: BDAG
  rationale: Aunque el inglés POB usó progresivo, el español bíblico natural aquí es el presente simple «hago», que puede abarcar la acción en curso. Conserva la inmediatez sin forzar un gerundio innecesario.
- source_word: οἶδας
  english_pob_choice: know
  chosen_spanish: sabes
  alternatives_spanish:
  - conoces
  - sabes
  lexicon: BDAG
  rationale: Se mantiene la distinción con γνώσῃ usando «sabes» para el conocimiento presente. Esto preserva la tensión lexical del griego entre saber presente y llegar a comprender después.
- source_word: ἄρτι
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - por ahora
  - en este momento
  lexicon: BDAG
  rationale: «Ahora» comunica el adverbio temporal de manera directa y moderna. Es el equivalente más transparente para el momento presente.
- source_word: γνώσῃ
  english_pob_choice: you will understand
  chosen_spanish: lo sabrás
  alternatives_spanish:
  - lo entenderás
  - llegarás a saber
  lexicon: BDAG
  rationale: El griego usa γινώσκω en futuro, en contraste con οἶδα. En español, «lo sabrás» preserva mejor la repetición verbal y la oposición saber/conocer, sin perder la promesa de comprensión futura.
- source_word: δὲ
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - mas
  - pero
  lexicon: BDAG
  rationale: «Pero» expresa bien la contraposición entre la ignorancia presente y el conocimiento futuro.
- source_word: μετὰ ταῦτα
  english_pob_choice: after these things
  chosen_spanish: después de estas cosas
  alternatives_spanish:
  - luego de esto
  - más tarde
  lexicon: BDAG
  rationale: Se conserva la cercanía formal al griego. «Después de estas cosas» mantiene la apertura interpretativa temporal que el inglés POB también preserva.
theological_decisions:
- issue: Alcance temporal de «después de estas cosas»
  english_pob_reading: The phrase may refer to what follows in this episode or, more broadly, to later events that would clarify Jesus’ action.
  chosen_spanish_reading: 'La frase queda abierta: puede referirse a lo que sigue en este episodio o a acontecimientos posteriores que aclaren la acción de Jesús.'
  alternative_spanish_readings:
  - Se refiere solo a la explicación inmediata del lavatorio de los pies.
  - Se refiere principalmente a la cruz y resurrección.
  - Se refiere al entendimiento pleno dado por el Espíritu.
  rationale: El griego no obliga a fijar un único horizonte teológico. La traducción conserva esa amplitud, evitando resolver interpretativamente lo que el texto deja abierto.
  doctrine_reference: Preservar la tensión interpretativa del texto sin dogmatizar el momento exacto del cumplimiento.
- issue: Contraste entre οἶδας y γνώσῃ
  english_pob_reading: The Greek uses two different verbs, one often rendered “know” and the other “come to know/understand.”
  chosen_spanish_reading: Se mantiene la oposición entre «sabes» y «lo sabrás», dejando visible que el griego usa dos verbos relacionados pero distintos.
  alternative_spanish_readings:
  - «no entiendes ahora, pero entenderás después»
  - «no sabes ahora, pero comprenderás después»
  rationale: En español, el par «sabes / lo sabrás» conserva mejor la diferencia verbal del original que igualar ambos con «entender». Así se protege la tensión lexical documentada por el POB inglés.
  doctrine_reference: No borrar la diferencia semántica entre οἶδα y γινώσκω.
translation_notes:
  revision_awareness: La última revisión del inglés POB ajustó οἶδας de «understand» a «know» para preservar la diferencia con γνώσῃ. En español, se reflejó esa decisión manteniendo «sabes» en el presente y evitando homogenizar ambos verbos con «entender».
  spanish_consistency_notes:
  - 'Se preserva la doble estructura verbal del griego: «respondió y le dijo».'
  - «Lo que yo hago» mantiene el sujeto enfático ἐγώ sin sobrecargar el español.
  - «Después de estas cosas» conserva la transparencia al original y la apertura interpretativa.
  - La puntuación con comillas angulares sigue el estilo editorial español.
  - El texto usa español neutral y digno, sin arcaísmos innecesarios.
