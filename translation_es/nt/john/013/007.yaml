base_translation:
  language: en
  yaml_path: translation/nt/john/013/007.yaml
  text: Jesus answered and said to him[a], “What I am doing you do not know now[b], but you will understand after these things.”
  footnotes:
  - marker: a
    text: Or “you do not know now … but you will know later.” The Greek uses two different verbs, one often rendered “know” and the other “come to know/understand.”
    reason: lexical_alternative
  - marker: b
    text: “After these things” may refer to what follows in this episode or, more broadly, to later events that would clarify Jesus’ action.
    reason: alternative_reading
