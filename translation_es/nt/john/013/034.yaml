    text: Or 'command.' The Greek term can be rendered either way, but 'commandment' better preserves the formal ethical force here.
    reason: lexical_alternative
  - marker: b
    text: The second clause may also be rendered, 'that you also may love one another.'
    reason: alternative_reading
