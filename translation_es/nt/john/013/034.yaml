revisions:
- from: 'Un mandamiento nuevo[a] les doy: que se amen unos a otros. Así como yo los he amado[b], así también ustedes se amen unos a otros.'
  to: 'Un mandamiento nuevo[a] les doy: que se amen unos a otros. Así como yo los amé, ustedes también deben amarse unos a otros.[b]'
  rationale: Se corrige ἠγάπησα a pasado simple («amé») para alinearlo con el griego y con la auditoría inglesa. También se suaviza la segunda mitad para un español más natural, manteniendo el énfasis en «ustedes también» y la fuerza exhortativa de la segunda cláusula. Las notas se conservan con redacción más precisa y sus marcadores siguen anclados en el texto.
