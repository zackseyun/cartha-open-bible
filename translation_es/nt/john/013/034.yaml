review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: «Un mandamiento nuevo les doy … que se amen unos a otros … como yo … ustedes también … unos a otros». Conserva correctamente ἐντολή como «mandamiento», καινός como «nuevo», la repetición de ἀγαπάω con lenguaje de amor y el recíproco ἀλλήλους como «unos a otros». Sin embargo, el punto principal de desalineación es ἠγάπησα, que el inglés auditado y la decisión léxica documentada entienden como pasado simple («I loved»), mientras el español borrador lo cambia a perfecto compuesto («he amado»), introduciendo un matiz aspectual no justificado por la evidencia fuente ni por la auditoría. Además, la segunda cláusula española «Así como yo los he amado, así también ustedes se amen…» suena algo forzada; el texto griego solo requiere el patrón comparativo y la exhortación resultante, no el doble «así».'
  spanish_quality_summary: El español es claro y eclesialmente legible, con buen tono general. «Un mandamiento nuevo les doy» y «que se amen unos a otros» son naturales. No obstante, «yo los he amado» en este contexto joánico suena menos directo que «yo los amé», y la secuencia «Así como …, así también ustedes se amen …» resulta algo rígida. Una formulación como «Así como yo los amé, ustedes también deben amarse unos a otros» o «… también ámense unos a otros» comunica mejor en español moderno y mantiene la fuerza exhortativa.
  glossary_alignment: 'Está bien alineado con la terminología del proyecto en lo relevante aquí: «mandamiento» para ἐντολή y lenguaje de «amor» para ἀγαπάω. No hay términos de glosario mayor en disputa. La única desalineación importante es aspectual/lexical: la auditoría inglesa documenta «I loved», por lo que el español debe preferir «amé» frente a «he amado».'
  issues:
  - severity: medium
    issue: «he amado» para ἠγάπησα
    rationale: El aoristo ἠγάπησα fue auditado como pasado simple («I loved»). «He amado» añade un matiz de perfecto compuesto que no está exigido por el griego y contradice la decisión léxica documentada.
  - severity: low
    issue: Duplicación algo rígida de «Así como …, así también … se amen»
    rationale: Aunque no es incorrecta, la redacción suena menos natural en español y puede mejorarse sin perder forma ni énfasis. El griego enfatiza καὶ ὑμεῖς («ustedes también»), no necesariamente una duplicación simétrica de «así».
  - severity: low
    issue: Nota b dice «puede entenderse»
    rationale: La nota inglesa habla de posibilidad de traducción alternativa más que de interpretación. En español conviene reflejarlo con «también puede traducirse» para mayor precisión traductológica.
  revised_spanish_text: 'Un mandamiento nuevo[a] les doy: que se amen unos a otros. Así como yo los amé, ustedes también deben amarse unos a otros.[b]'
  revised_footnotes:
  - marker: a
    text: O «mandato». El término griego puede traducirse de ambas maneras, pero «mandamiento» preserva mejor la fuerza ética y formal aquí.
    reason: lexical_alternative
  - marker: b
    text: 'La segunda cláusula también puede traducirse: «para que también ustedes se amen unos a otros».'
    reason: alternative_reading
  revision_rationale: Se corrige ἠγάπησα a pasado simple («amé») para alinearlo con el griego y con la auditoría inglesa. También se suaviza la segunda mitad para un español más natural, manteniendo el énfasis en «ustedes también» y la fuerza exhortativa de la segunda cláusula. Las notas se conservan con redacción más precisa y sus marcadores siguen anclados en el texto.
