translation:
  language: es
  text: 'Un mandamiento nuevo[a] les doy: que se amen unos a otros. Así como yo los amé, ustedes también deben amarse unos a otros.[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mandato». El término griego puede traducirse de ambas maneras, pero «mandamiento» preserva mejor la fuerza ética y formal aquí.
    reason: lexical_alternative
  - marker: b
    text: 'La segunda cláusula también puede traducirse: «para que también ustedes se amen unos a otros».'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐντολὴν
  english_pob_choice: commandment
  chosen_spanish: mandamiento
  alternatives_spanish:
  - mandato
  - mandamiento
  lexicon: BDAG
  rationale: En español, «mandamiento» conserva mejor la fuerza formal y ética de ἐντολή en este contexto joánico. «Mandato» es posible, pero suena más jurídico-administrativo y menos natural en esta formulación.
- source_word: καινὴν
  english_pob_choice: new
  chosen_spanish: nuevo
  alternatives_spanish:
  - nuevo
  - reciente
  lexicon: BDAG
  rationale: «Nuevo» expresa el sentido básico de καινός sin añadir explicación sobre si la novedad es temporal, cualitativa o de realización; así se preserva la tensión del texto.
- source_word: δίδωμι
  english_pob_choice: I give
  chosen_spanish: les doy
  alternatives_spanish:
  - les estoy dando
  - les entrego
  lexicon: BDAG
  rationale: El presente en español con «les doy» comunica de manera natural la declaración solemne y directa de Jesús. «Les entrego» sería posible, pero sugiere un matiz menos inmediato.
- source_word: ὑμῖν
  english_pob_choice: to you
  chosen_spanish: les
  alternatives_spanish:
  - a ustedes
  - a vosotros
  lexicon: BDAG
  rationale: Se explicita el destinatario con el clítico «les», y el sujeto «ustedes» en la segunda cláusula mantiene claridad y fluidez en español latinoamericano.
- source_word: ἵνα ἀγαπᾶτε ἀλλήλους
  english_pob_choice: that you love one another
  chosen_spanish: que se amen unos a otros
  alternatives_spanish:
  - para que se amen unos a otros
  - que amen unos a otros
  lexicon: BDAG
  rationale: Después de «les doy», la cláusula con ἵνα expresa el contenido del mandamiento. «Que se amen unos a otros» conserva el valor imperativo de forma natural en español y mantiene el lenguaje recíproco.
- source_word: ἀγαπᾶτε / ἠγάπησα
  english_pob_choice: love / loved
  chosen_spanish: se amen / he amado
  alternatives_spanish:
  - se quieran / he querido
  lexicon: BDAG
  rationale: Se mantiene la raíz de «amor» para conservar la repetición léxica y la carga teológica del pasaje. «Querer» debilitaría esa conexión en español bíblico.
- source_word: ἀλλήλους
  english_pob_choice: one another
  chosen_spanish: unos a otros
  alternatives_spanish:
  - entre sí
  - los unos a los otros
  lexicon: BDAG
  rationale: «Unos a otros» es la forma recíproca más natural y solemne en español, equivalente a «one another».
- source_word: καθὼς
  english_pob_choice: just as
  chosen_spanish: Así como
  alternatives_spanish:
  - Como
  - De la misma manera que
  lexicon: BDAG
  rationale: '«Así como» marca con claridad el modelo comparativo: el amor de Jesús es la medida y el patrón del amor de los discípulos.'
- source_word: ἠγάπησα
  english_pob_choice: I loved
  chosen_spanish: he amado
  alternatives_spanish:
  - amé
  - he querido
  lexicon: BDAG
  rationale: Aunque el aoristo puede leerse como pasado simple, «he amado» en español comunica mejor que el amor de Jesús ya se ha manifestado a los discípulos y conserva su vigencia narrativa. Se mantiene, no obstante, la relación con el acto ya mostrado.
- source_word: ἵνα καὶ ὑμεῖς ἀγαπᾶτε ἀλλήλους
  english_pob_choice: you also are to love one another
  chosen_spanish: así también ustedes se amen unos a otros
  alternatives_spanish:
  - para que también ustedes se amen unos a otros
  - que también ustedes se amen unos a otros
  lexicon: BDAG
  rationale: La segunda cláusula retoma el mandamiento con énfasis en «también ustedes». «Así también ustedes se amen unos a otros» reproduce ese impulso exhortativo sin recargar la frase.
theological_decisions:
- issue: Naturaleza de lo «nuevo» en el mandamiento
  english_pob_reading: Rendered straightforwardly as 'A new commandment' without explaining in the main text how it is new.
  chosen_spanish_reading: «Un mandamiento nuevo» sin explicar en el texto principal en qué consiste su novedad.
  alternative_spanish_readings:
  - mandamiento reciente
  - mandamiento nuevo en calidad
  - mandamiento nuevo por su realización en Jesús
  rationale: El griego afirma la novedad, pero no la define dentro del versículo. La versión española conserva esa apertura teológica, evitando resolver en la traducción una tensión que el texto mismo deja en pie.
  doctrine_reference: Preservar la tensión teológica en lugar de explicarla de antemano.
translation_notes:
  revision_awareness: 'Se mantuvo el acuerdo alto del texto de referencia en la revisión más reciente: no se requirieron cambios sustanciales respecto del sentido básico del inglés POB y del griego.'
  spanish_consistency_notes:
  - Se conservó la repetición de la raíz verbal de amor en todo el versículo para reflejar la insistencia del original.
  - Se evitó sustituir «mandamiento» por terminología eclesiástica tradicional sin justificación textual, para mantener la transparencia lexical.
  - La cláusula comparativa quedó explícita con «Así como» / «así también», siguiendo de cerca la estructura del griego sin caer en calco rígido.
  - La referencia recíproca «unos a otros» se mantuvo estable para preservar el paralelismo entre ambas mitades del versículo.
