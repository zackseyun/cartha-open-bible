translation:
  language: es
  text: 'En verdad[a], en verdad, les digo: el que recibe a cualquiera que yo envíe me recibe a mí, y el que me recibe recibe al que me envió[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Amén, amén».'
    reason: lexical_alternative
  - marker: b
    text: En contexto, «al que me envió» se refiere al Padre.
    reason: cross_reference
lexical_decisions:
- source_word: ἀμὴν ἀμὴν
  english_pob_choice: Truly, truly
  chosen_spanish: De veras, de veras
  alternatives_spanish:
  - Amén, amén
  - Ciertamente, ciertamente
  lexicon: BDAG
  rationale: La duplicación enfática pide una fórmula igual de solemne en español. "De veras, de veras" conserva el valor intensificador y suena natural; "Amén, amén" sería posible pero en español puede leerse más como respuesta litúrgica que como introducción enfática.
- source_word: λέγω ὑμῖν
  english_pob_choice: I say to you
  chosen_spanish: les digo
  alternatives_spanish:
  - les digo a ustedes
  - les afirmo
  lexicon: BDAG
  rationale: El dativo plural se expresa naturalmente con "les"; "digo" mantiene la fórmula joánica sin añadir matiz interpretativo. "Les afirmo" intensificaría el sentido, pero no es necesario para el griego ni para el patrón del contexto.
- source_word: ὁ λαμβάνων
  english_pob_choice: whoever receives
  chosen_spanish: el que recibe
  alternatives_spanish:
  - quien recibe
  - el que acoge
  lexicon: BDAG
  rationale: El participio articular tiene fuerza genérica. "El que recibe" conserva la relación representativa y evita introducir un matiz de hospitalidad más específico que el verbo griego por sí solo.
- source_word: ἄν τινα πέμψω
  english_pob_choice: anyone I send
  chosen_spanish: a cualquiera que yo envíe
  alternatives_spanish:
  - a quien yo envíe
  - a cualquiera que envíe
  lexicon: BDAG
  rationale: La combinación expresa una referencia indefinida y abierta. "A cualquiera que yo envíe" comunica bien ese alcance sin perder la dependencia verbal de la subjuntiva griega. Se evita reducirlo a una persona concreta o a un mero pronombre relativo sin matiz indefinido.
- source_word: λαμβάνει
  english_pob_choice: receives
  chosen_spanish: me recibe
  alternatives_spanish:
  - lo recibe
  - lo acoge
  lexicon: BDAG
  rationale: Se mantiene la repetición de "recibir" en la cadena representativa. Aquí el objeto directo es Jesús implícito por el contexto; se traduce con pronombre explícito para preservar la referencia y la fluidez en español.
- source_word: ὁ δὲ ἐμὲ λαμβάνων
  english_pob_choice: and whoever receives me
  chosen_spanish: y el que me recibe
  alternatives_spanish:
  - pero el que me recibe
  - y quien me recibe
  lexicon: BDAG
  rationale: '"δέ" funciona de manera conectiva, no fuertemente adversativa. "Y" conserva el paralelismo ascendente del dicho y evita cargar el contraste con un "pero" que no parece exigir el griego.'
- source_word: τὸν πέμψαντά με
  english_pob_choice: the one who sent me
  chosen_spanish: al que me envió
  alternatives_spanish:
  - al que me ha enviado
  - al que me mandó
  lexicon: BDAG
  rationale: El participio aoristo identifica al remitente en relación con Jesús. "Al que me envió" sigue de cerca el griego y deja la identificación teológica al contexto joánico sin introducir en el texto principal la designación explícita de "Padre".
theological_decisions:
- issue: Identificación de "al que me envió"
  english_pob_reading: the one who sent me
  chosen_spanish_reading: al que me envió
  alternative_spanish_readings:
  - el Padre que me envió
  - al Padre que me envió
  rationale: En el contexto de Juan, el referente es el Padre; sin embargo, el griego presenta una expresión relacional y no añade aquí el título explícito. La traducción conserva esa forma y permite que la identificación teológica se derive del contexto inmediato y canónico.
  doctrine_reference: Juan 13:20; Juan 5:24-30; Juan 17:3
- issue: Valor genérico del participio articular
  english_pob_reading: whoever receives
  chosen_spanish_reading: el que recibe
  alternative_spanish_readings:
  - quien recibe
  - el que reciba
  rationale: El participio masculino singular es genérico y no restringe el sentido a varones. "El que recibe" refleja ese valor representativo de manera natural en español, manteniendo el alcance universal del dicho.
  doctrine_reference: Gramática griega del participio articular; Juan 13:20
translation_notes:
  revision_awareness: Se siguió el paquete fuente SBLGNT y el control auditado en inglés de la POB. No se detectaron revisiones textuales ni cambios de última pasada; la redacción española conserva la repetición de "recibe" y la cadena de representación "el que... me recibe... recibe..." sin suavizar la tensión teológica del remitente.
  spanish_consistency_notes:
  - Se usa "Yahvé" solo cuando el texto fuente lo requiera; este versículo no contiene el tetragrámaton.
  - Se mantiene "recibe" de forma repetida para reflejar la relación verbal del original y la lógica representativa del dicho.
  - Se evitó introducir "Cristo" o "Señor" porque no aparecen en el griego de este versículo.
  - El estilo es formal pero natural para lectura eclesial en español latinoamericano.
