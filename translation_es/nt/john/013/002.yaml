    text: 'O: «mientras se celebraba la cena». El griego no significa que la cena ya hubiera terminado.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «había ya impulsado». Literalmente: «había ya puesto en el corazón».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «entregarlo». En este contexto, «traicionarlo» comunica mejor la fuerza de la expresión griega.'
    reason: alternative_reading
  revision_rationale: 'La revisión hace dos ajustes mínimos pero importantes: explicita «de Judas» para reflejar con claridad el referente del corazón y mejorar la naturalidad del español, y devuelve παραδοῖ al valor contextual principal «traicionara», en línea con la decisión documentada del POB, dejando «entregarlo» como alternativa en nota. Se preservan la metáfora de «corazón», la simultaneidad de «durante la cena» y la tensión teológica sobre la influencia satánica sin anular la agencia de Judas.'
