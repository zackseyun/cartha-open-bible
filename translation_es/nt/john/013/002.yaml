  text: καὶ δείπνου ⸀γινομένου, τοῦ διαβόλου ἤδη βεβληκότος εἰς τὴν καρδίαν ⸂ἵνα παραδοῖ αὐτὸν Ἰούδας Σίμωνος ⸀Ἰσκαριώτου⸃,
base_translation:
  language: en
  yaml_path: translation/nt/john/013/002.yaml
  text: And during supper[a], when the devil had already put it into the heart of Judas Iscariot, Simon's son, to betray him[c][b],
