translation:
  language: es
  text: Y durante la cena[a], cuando el diablo ya había puesto en el corazón[b] de Judas Iscariote, hijo de Simón, que lo traicionara[c],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mientras se celebraba la cena». El griego no significa que la cena ya hubiera terminado.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «había ya impulsado». Literalmente: «había ya puesto en el corazón».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «entregarlo». En este contexto, «traicionarlo» comunica mejor la fuerza de la expresión griega.'
    reason: alternative_reading
lexical_decisions:
- source_word: δείπνου γινομένου
  english_pob_choice: during supper
  chosen_spanish: durante la cena
  alternatives_spanish:
  - mientras se celebraba la cena
  - durante la comida
  lexicon: BDAG
  rationale: El genitivo absoluto indica una circunstancia simultánea. «Durante la cena» es natural en español y evita la falsa idea de que la cena ya había terminado.
- source_word: διάβολος
  english_pob_choice: the devil
  chosen_spanish: el diablo
  alternatives_spanish:
  - el calumniador
  lexicon: BDAG
  rationale: En este contexto joánico se trata claramente del ser personal del mal. «El diablo» es el equivalente estable y transparente en español.
- source_word: ἤδη βεβληκότος εἰς τὴν καρδίαν
  english_pob_choice: had already put it into the heart
  chosen_spanish: ya había puesto en el corazón
  alternatives_spanish:
  - ya había implantado en el corazón
  - ya lo había impulsado
  lexicon: BDAG
  rationale: La expresión conserva la metáfora de introducir una intención o impulso interior. En español, omitir el objeto directo explícito puede sonar más natural sin perder el sentido idiomático; el contexto aclara que se trata de la intención de traicionar.
- source_word: καρδίαν
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - mente
  lexicon: BDAG
  rationale: «Corazón» preserva la metáfora antropológica bíblica, que abarca voluntad e intención, no solo emoción.
- source_word: ἵνα παραδοῖ
  english_pob_choice: to betray
  chosen_spanish: lo entregara
  alternatives_spanish:
  - lo traicionara
  - lo entregase
  lexicon: BDAG
  rationale: Aquí παραδίδωμι puede significar «entregar» o «traicionar». Para mantener la tensión del texto original y el matiz relacional del acto, se usa «lo entregara»; el contexto permite entender la traición sin sobrecargar la formulación.
- source_word: αὐτὸν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El pronombre refiere a Jesús. En español, el objeto directo clítico mantiene fluidez y evita repetición innecesaria.
- source_word: Ἰούδας Σίμωνος Ἰσκαριώτου
  english_pob_choice: Judas Iscariot, Simon's son
  chosen_spanish: Judas Iscariote, hijo de Simón
  alternatives_spanish:
  - Judas, hijo de Simón Iscariote
  - Judas hijo de Simón Iscariote
  lexicon: BDAG
  rationale: La reordenación sigue de cerca la secuencia griega y evita sugerir que Simón sea el Iscariote. «Judas Iscariote, hijo de Simón» refleja bien la estructura appositiva.
theological_decisions:
- issue: Agencia en la traición de Judas
  english_pob_reading: The devil had already implanted the intention in Judas's heart, without wording that removes Judas's own agency.
  chosen_spanish_reading: El diablo ya había puesto en el corazón la intención de que Judas entregara a Jesús, sin borrar la responsabilidad de Judas.
  alternative_spanish_readings:
  - El diablo ya había impulsado a Judas
  - El diablo ya había decidido por medio de Judas
  rationale: El griego atribuye influencia satánica real, pero presenta a Judas como el agente del acto. La traducción conserva esa tensión sin resolverla a favor de una sola causalidad.
  doctrine_reference: Preservar la tensión teológica sin resolver cuestiones de causalidad o determinismo.
translation_notes:
  revision_awareness: La redacción sigue de cerca el último estado revisado del POB en inglés, especialmente la reordenación de «Judas Iscariot, Simon's son» para reflejar mejor la apposición griega y evitar ambigüedad sobre la identidad de Simón. También mantiene la elección de traducir γινομένου como una circunstancia simultánea y no como una cena ya concluida.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se usa «el diablo» para διάβολος, conforme al valor contextual personal del término.
  - Se conserva «corazón» para καρδία para respetar el campo antropológico bíblico.
  - Se prefiere «entregar» para παραδίδωμι en este contexto, con nota que reconoce la alternativa «traicionar».
  - La construcción española evita el giro arcaizante y conserva el carácter narrativo y sobrio del texto.
