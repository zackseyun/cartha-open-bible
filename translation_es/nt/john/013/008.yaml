  source_alignment_summary: 'El borrador español refleja bien el sentido básico del griego: la negativa enfática de Pedro, el lavado, y la advertencia de Jesús sobre no tener μέρος con él. Sin embargo, la nota al pie está mal anclada y no corresponde al lugar ni al contenido del alternativo léxico preservado por el POB inglés. El alternativo relevante pertenece a «parte», no a «le dijo a él».'
  spanish_quality_summary: El español es claro y natural. «Nunca lavarás mis pies» y «Si no te lavo, no tienes parte conmigo» son legibles y dignos. Conviene eliminar el calco innecesario «a él» en el anclaje de nota y corregir la nota para que explique la alternativa adecuada. También puede simplificarse la puntuación en una sola línea continua, aunque no es obligatorio.
  glossary_alignment: No hay conflictos con la terminología base del proyecto en este versículo. «Jesús», «Pedro», «lavar», «parte» y «conmigo» son adecuados. La elección de «parte» es aceptable en español y coincide con la alternativa tradicional que el inglés conserva en nota; pero si se mantiene «parte» en el texto, la nota debe ofrecer la alternativa moderna «participación» o «porción», no repetir el mismo texto.
  issues:
  - severity: medium
    issue: La nota [a] está colocada después de «él» en vez de junto a «parte conmigo».
    rationale: El POB inglés preserva una alternativa léxica para μέρος («share/part»). El anclaje actual crea una nota sin relación con el texto señalado.
  - severity: high
    issue: 'El contenido de la nota repite exactamente el texto principal: «O “no tienes parte conmigo”».'
    rationale: Una nota de alternativa léxica debe ofrecer una variante real. Tal como está, no aporta información y no preserva la decisión auditada del inglés.
  - severity: low
    issue: «Pedro le dijo a él» suena algo calcado.
    rationale: Aunque es comprensible, en español natural basta «Pedro le dijo». El dativo ya está implícito en el clítico «le».
