translation:
  language: es
  text: 'Pedro le dijo: «Nunca lavarás mis pies».


    Jesús le respondió: «Si no te lavo, no tienes parte[a] conmigo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «participación».
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὐ μὴ νίψῃς
  english_pob_choice: You will never wash
  chosen_spanish: Nunca lavarás
  alternatives_spanish:
  - No lavarás jamás
  - De ningún modo lavarás
  lexicon: BDAG
  rationale: La negación enfática οὐ μή con subjuntivo aoristo expresa una negativa tajante respecto de una acción futura. «Nunca lavarás» transmite bien esa fuerza en español natural, sin arcaísmo.
- source_word: μου τοὺς πόδας
  english_pob_choice: my feet
  chosen_spanish: mis pies
  alternatives_spanish:
  - los pies de mí
  lexicon: BDAG
  rationale: La construcción posesiva es directa y explícita; no requiere expansión interpretativa.
- source_word: εἰς τὸν αἰῶνα
  english_pob_choice: never
  chosen_spanish: nunca
  alternatives_spanish:
  - para siempre
  - por toda la eternidad
  lexicon: BDAG
  rationale: En este giro idiomático, la función es intensificar la negación. «Nunca» conserva mejor el valor idiomático que una traducción más literal de ‘para siempre’.
- source_word: ἀπεκρίθη
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - le respondió
  lexicon: BDAG
  rationale: Verbo narrativo estándar de respuesta; «respondió» es natural y fiel en español bíblico contemporáneo.
- source_word: Ἐὰν μὴ νίψω σε
  english_pob_choice: If I do not wash you
  chosen_spanish: Si no te lavo
  alternatives_spanish:
  - A menos que te lave
  - Si yo no te lavo
  lexicon: BDAG
  rationale: La cláusula condicional se conserva de forma transparente. En español, «Si no te lavo» expresa bien la condición sin añadir matices no explícitos.
- source_word: νίψω / νίψῃς
  english_pob_choice: wash
  chosen_spanish: lavar
  alternatives_spanish:
  - lavar clean
  - lavar los pies
  lexicon: BDAG
  rationale: νίπτω designa lavar, especialmente partes del cuerpo. «Lavar» es suficiente y preciso; el complemento ya aparece en la primera mitad del versículo.
- source_word: οὐκ ἔχεις μέρος
  english_pob_choice: you have no share
  chosen_spanish: no tienes parte
  alternatives_spanish:
  - no tienes participación
  - no tienes porción
  lexicon: BDAG
  rationale: μέρος puede significar ‘parte’, ‘porción’ o ‘participación’. «No tienes parte» conserva la metáfora y sigue de cerca la formulación tradicional que el propio POB deja abierta en nota.
- source_word: μετ’ ἐμοῦ
  english_pob_choice: with me
  chosen_spanish: conmigo
  alternatives_spanish:
  - junto conmigo
  lexicon: BDAG
  rationale: μετά con genitivo significa compañía o asociación. «Conmigo» es la forma natural y fiel en español.
theological_decisions:
- issue: Sentido de «tener parte con Jesús»
  english_pob_reading: Relational participation/fellowship with Jesus is in view, expressed without over-specifying sacramental or soteriological mechanics.
  chosen_spanish_reading: La frase señala participación o comunión relacional con Jesús, sin precisar el mecanismo sacramental o soteriológico.
  alternative_spanish_readings:
  - Referencia principalmente sacramental a la purificación
  - Referencia simbólica principal al servicio humilde
  - Afirmación directa de pertenencia salvífica
  rationale: El griego afirma necesidad de la acción de Jesús para que Pedro tenga ‘parte’ con él, pero no define por sí mismo el mecanismo teológico. Conviene preservar esa amplitud.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: 'El borrador corrige la validación previa: la nota [a] ahora aparece anclada en el texto («a él[a]») y la formulación principal mantiene la lectura abierta del griego sin sobreespecificarla.'
  spanish_consistency_notes:
  - Se preserva el paralelismo de dos enunciados directos en discurso citado.
  - «Parte conmigo» se reserva para la nota, mientras el texto principal usa «no tienes parte» para mantener el eco léxico del original.
  - Se evita traducir κυρία/κύριος por «Señor» porque este versículo no contiene ese término.
