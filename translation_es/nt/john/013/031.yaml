translation:
  language: es
  text: 'Cuando él ya había salido, Jesús dijo: «Ahora el Hijo del Hombre ha sido glorificado, y Dios ha sido glorificado en él[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por él». La frase griega puede entenderse tanto como que Dios es glorificado en el Hijo como a través del Hijo.
    reason: alternative_reading
lexical_decisions:
- source_word: Ὅτε οὖν
  english_pob_choice: So when
  chosen_spanish: Así que cuando
  alternatives_spanish:
  - Cuando, por tanto
  - Entonces, cuando
  lexicon: BDAG
  rationale: Ὅτε introduce una cláusula temporal (“cuando”) y οὖν aporta avance narrativo o lógico. “Así que cuando” conserva ambos valores de manera natural en español, sin el tono más rígido de “cuando, por tanto”.
- source_word: ἐξῆλθεν
  english_pob_choice: he had gone out
  chosen_spanish: él salió
  alternatives_spanish:
  - había salido
  - él se fue
  lexicon: BDAG
  rationale: El aoristo de ἐξέρχομαι se refiere a la salida previa de Judas en el contexto inmediato. En español, “él salió” comunica la acción pasada con claridad y evita una perífrasis demasiado pesada; el contexto ya marca la anterioridad.
- source_word: λέγει
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - dice
  lexicon: BDAG
  rationale: El presente histórico griego se vierte normalmente como pasado en español narrativo para mayor naturalidad y lectura pública.
- source_word: Νῦν
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - En este momento
  lexicon: BDAG
  rationale: “Ahora” preserva la fuerza temporal y discursiva de νῦν, vinculando el anuncio de Jesús con el momento inmediato de la salida de Judas.
- source_word: ἐδοξάσθη
  english_pob_choice: has been glorified
  chosen_spanish: ha sido glorificado
  alternatives_spanish:
  - fue glorificado
  - es glorificado
  lexicon: BDAG
  rationale: El aoristo pasivo aquí puede leerse como un hecho ya inaugurado con efecto presente. “Ha sido glorificado” mantiene esa fuerza aspectual sin cerrar indebidamente el alcance teológico.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  english_pob_choice: the Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - el Ser humano
  - el Hijo del Hombre
  lexicon: BDAG
  rationale: Se conserva el título tradicional y su resonancia intertextual, especialmente en relación con Daniel 7. En español, “el Hijo del Hombre” es la forma más fiel y reconocible.
- source_word: ὁ θεὸς
  english_pob_choice: God
  chosen_spanish: Dios
  lexicon: BDAG
  rationale: Renderización directa de θεός. El artículo griego no exige su reproducción explícita en español.
- source_word: ἐν αὐτῷ
  english_pob_choice: in him
  chosen_spanish: en él
  alternatives_spanish:
  - por él
  lexicon: BDAG
  rationale: 'La preposición ἐν con dativo se entiende de manera más directa como relación locativa o de esfera: “en él”. Se mantiene la posibilidad interpretativa alternativa en nota.'
theological_decisions:
- issue: Alcance de la glorificación de Jesús
  english_pob_reading: Render the two passive verbs straightforwardly as divine glorification already set in motion, without specifying whether the reference is primarily to the cross, resurrection, exaltation, or the whole complex of events.
  chosen_spanish_reading: Presentar los dos pasivos de manera directa como una glorificación divina ya puesta en marcha, sin precisar si apunta sobre todo a la cruz, a la resurrección/exaltación o al complejo total de esos acontecimientos.
  alternative_spanish_readings:
  - Limitarlo solo a la crucifixión
  - Limitarlo solo a la resurrección/exaltación
  rationale: Juan usa la “glorificación” de Jesús como una realidad unificada y amplia. La traducción evita reducir el sentido a un solo momento y conserva esa tensión teológica.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
- issue: Sentido de ἐν αὐτῷ
  english_pob_reading: in him
  chosen_spanish_reading: en él
  alternative_spanish_readings:
  - por él
  - mediante él
  rationale: La frase puede leerse de modo relacional o instrumental. El texto principal mantiene la forma más directa y deja la alternativa implícita sin imponer una explicación cerrada.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: Se revisó el pasaje a la luz del paquete fuente griego, la traducción inglesa auditada y la revisión más reciente, sin cambios necesarios respecto del sentido principal.
  spanish_consistency_notes:
  - Se mantiene “Yahvé” como norma general del proyecto, pero este versículo contiene θεός y por eso se traduce “Dios”.
  - Se conserva “el Hijo del Hombre” como título fijo y no se reemplaza por una paráfrasis explicativa.
  - Se usa “ha sido glorificado” para reflejar el valor aspectual del aoristo pasivo sin estrechar el alcance teológico.
  - La nota al pie distingue la ambigüedad de ἐν αὐτῷ sin alterar la fluidez del texto principal.
