revisions:
- from: 'Entonces, cuando les había lavado los pies y había tomado sus vestiduras, y se había recostado de nuevo[a], les dijo[b]: «¿Entienden lo que he hecho por ustedes?»'
  to: 'Entonces, cuando les lavó los pies, tomó su ropa y se recostó de nuevo[a], les dijo[b]: «¿Entienden lo que he hecho por ustedes?»'
  rationale: Se ajusta la frase para un español más natural y claro, manteniendo plenamente el sentido griego y las decisiones auditadas del POB. Se sustituye «sus vestiduras» por «su ropa» para evitar ambigüedad referencial, se simplifica la secuencia verbal eliminando pluscuamperfectos innecesarios, y se mejora la naturalidad de la nota b.
