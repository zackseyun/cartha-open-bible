    text: O, más literalmente, «se sentó de nuevo»; el verbo griego se refiere a recostarse a la mesa.
    reason: lexical_alternative
  - marker: b
    text: O, «lo que he hecho a ustedes»; el dativo griego puede traducirse de ambas maneras, aunque «por ustedes» encaja mejor con el contexto de servicio.
    reason: alternative_reading
  revision_rationale: Se ajusta la frase para un español más natural y claro, manteniendo plenamente el sentido griego y las decisiones auditadas del POB. Se sustituye «sus vestiduras» por «su ropa» para evitar ambigüedad referencial, se simplifica la secuencia verbal eliminando pluscuamperfectos innecesarios, y se mejora la naturalidad de la nota b.
