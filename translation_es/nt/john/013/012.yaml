translation:
  language: es
  text: 'Entonces, cuando les lavó los pies, tomó su ropa y se recostó de nuevo[a], les dijo[b]: «¿Entienden lo que he hecho por ustedes?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «se sentó de nuevo»; el verbo griego se refiere a recostarse a la mesa.
    reason: lexical_alternative
  - marker: b
    text: O, «lo que he hecho a ustedes»; el dativo griego puede traducirse de ambas maneras, aunque «por ustedes» encaja mejor con el contexto de servicio.
    reason: alternative_reading
lexical_decisions:
- source_word: Ὅτε οὖν
  english_pob_choice: So when
  chosen_spanish: Entonces, cuando
  alternatives_spanish:
  - Cuando, pues
  - Así que cuando
  lexicon: BDAG
  rationale: Ὅτε marca la subordinada temporal y οὖν añade continuidad narrativa. «Entonces, cuando» conserva ambos valores de manera natural en español y evita un calco demasiado rígido.
- source_word: ἔνιψεν
  english_pob_choice: had washed
  chosen_spanish: había lavado
  alternatives_spanish:
  - lavó
  lexicon: BDAG
  rationale: El aoristo en la cláusula temporal expresa una acción completada antes de las siguientes. El pluscuamperfecto español reproduce bien esa anterioridad.
- source_word: τοὺς πόδας αὐτῶν
  english_pob_choice: their feet
  chosen_spanish: los pies de ellos
  alternatives_spanish:
  - sus pies
  lexicon: BDAG
  rationale: En español, «sus pies» sería idiomático, pero «los pies de ellos» mantiene con más transparencia la referencia pronominal del griego y evita ambigüedad en una escena con varios participantes. Aun así, se puede preferir «sus pies» por fluidez; aquí se opta por una formulación clara y sobria.
- source_word: ἔλαβεν τὰ ἱμάτια αὐτοῦ
  english_pob_choice: taken his garments
  chosen_spanish: había tomado sus vestiduras
  alternatives_spanish:
  - había tomado sus ropas
  - había recogido sus vestiduras
  lexicon: BDAG
  rationale: ἱμάτια puede cubrir prendas/vestiduras; «vestiduras» mantiene dignidad y amplitud semántica. «Tomado» conserva el valor de λαμβάνω sin introducir la interpretación de vestirse o ponerse la ropa.
- source_word: ἀνέπεσεν
  english_pob_choice: reclined again
  chosen_spanish: se había recostado de nuevo
  alternatives_spanish:
  - se había sentado de nuevo
  - había vuelto a recostarse
  lexicon: BDAG
  rationale: En contexto de comida, ἀναπίπτω alude a recostarse a la mesa. «Se había recostado de nuevo» preserva esa imagen cultural y es más fiel que «sentarse de nuevo».
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: de nuevo
  alternatives_spanish:
  - otra vez
  lexicon: BDAG
  rationale: Adverbio simple de repetición. «De nuevo» es natural y directo en español.
- source_word: εἶπεν αὐτοῖς
  english_pob_choice: he said to them
  chosen_spanish: les dijo
  alternatives_spanish:
  - les habló
  - les dijo a ellos
  lexicon: BDAG
  rationale: La construcción dativa con λέγω se expresa de forma natural como «les dijo». Es idiomática y mantiene la relación directa con los discípulos.
- source_word: Γινώσκετε
  english_pob_choice: Do you understand
  chosen_spanish: ¿Entienden
  alternatives_spanish:
  - ¿Saben
  - ¿Comprenden
  lexicon: BDAG
  rationale: Aunque γινώσκω puede traducirse «saber», aquí la pregunta apunta a captar el significado del acto de Jesús. «Entienden» transmite mejor el matiz de comprensión del sentido.
- source_word: τί πεποίηκα ὑμῖν
  english_pob_choice: what I have done for you
  chosen_spanish: lo que he hecho por ustedes
  alternatives_spanish:
  - lo que les he hecho
  - lo que he hecho a ustedes
  lexicon: BDAG
  rationale: El perfecto πεποίηκα conserva el valor de acción cumplida con relevancia presente, bien reflejado por «he hecho». En cuanto a ὑμῖν, «por ustedes» sigue la lectura benefactiva del contexto de servicio, como en la traducción inglesa de referencia.
theological_decisions:
- issue: Sentido del acto de Jesús al lavarle los pies a los discípulos
  english_pob_reading: Rendered as an act of service rather than a mere ritual sequence.
  chosen_spanish_reading: «lo que he hecho por ustedes»
  alternative_spanish_readings:
  - «lo que he hecho a ustedes»
  - «lo que les he hecho»
  rationale: El contexto del lavatorio de pies subraya servicio humilde y beneficio para los discípulos. «Por ustedes» conserva esa fuerza benefactiva sin suavizar indebidamente la acción concreta de Jesús.
  doctrine_reference: John 13:12; translation philosophy §3, §6
- issue: Postura de Jesús después de lavar los pies
  english_pob_reading: ‘reclined again’ rather than ‘sat down again’.
  chosen_spanish_reading: «se había recostado de nuevo»
  alternative_spanish_readings:
  - «se había sentado de nuevo»
  - «había vuelto a su lugar»
  rationale: No se trata de una cuestión doctrinal, sino de precisión histórica y cultural. En el trasfondo de comida antigua, el verbo sugiere recostarse a la mesa; esa imagen debe preservarse en español.
  doctrine_reference: John 13:12; translation philosophy §1, §6
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB en inglés: se mantuvo «garments/vestiduras» como referencia general de las prendas, y se preservó la preferencia por el valor cultural de ἀνέπεσεν como «reclinarse/recostarse» en contexto de mesa. También se conservó la lectura benefactiva de ὑμῖν como «por ustedes», alineada con el audit trail.'
  spanish_consistency_notes:
  - Se emplea «entender» para γινώσκετε, en coherencia con el valor de comprensión del sentido y no solo de conocimiento factual.
  - Se evita «SEÑOR» u otro masking para el nombre divino, porque este versículo no lo contiene.
  - Se mantiene un registro sobrio y publicable, con puntuación española y comillas angulares para el discurso directo.
  - «Vestiduras» es una opción elevada pero natural; si la serie editorial prefiere un registro más llano, podría cambiarse a «ropas» sin alterar la base textual.
