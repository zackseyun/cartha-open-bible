review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia del griego: lavado de pies, toma de las vestiduras, recostarse de nuevo y la pregunta final. También conserva correctamente el matiz benefactivo de ὑμῖν como «por ustedes» con nota alternativa, y el valor cultural de ἀνέπεσεν con «recostado de nuevo» y nota explicativa. Sin embargo, la redacción verbal en pluscuamperfecto repetido («había lavado… había tomado… se había recostado») suena innecesariamente pesada en español para esta narración, y el borrador usa «sus vestiduras», que resulta ambiguo en español porque puede leerse como las vestiduras de los discípulos, no de Jesús, mientras el griego αὐτοῦ se refiere claramente a Jesús.'
  spanish_quality_summary: El texto es generalmente claro y digno, pero puede mejorarse en naturalidad y precisión referencial. «Entonces, cuando…» funciona, aunque la triple perífrasis con pluscuamperfecto produce una frase rígida. «Tomó su ropa» o «tomó sus ropas» evita la ambigüedad de «sus vestiduras» y suena más natural en español actual. También conviene quitar la coma antes de «y se recostó», para no fragmentar innecesariamente la serie verbal.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Jesús» no aparece. La decisión «recostó de nuevo» está bien alineada con la justificación léxica de ἀναπίπτω. «Por ustedes» concuerda con la decisión auditada sobre ὑμῖν. El único ajuste léxico recomendado es reemplazar «sus vestiduras» por «su ropa»/«sus ropas» para reflejar αὐτοῦ con claridad española.
  issues:
  - severity: medium
    issue: «sus vestiduras» es potencialmente ambiguo en español
    rationale: Aunque el griego αὐτοῦ se refiere a Jesús, en español «sus vestiduras» puede asociarse al referente plural cercano («ellos»). «Su ropa» o «sus ropas» aclara que son las de Jesús.
  - severity: low
    issue: La cadena de pluscuamperfectos suena pesada
    rationale: 'El valor de anterioridad puede mantenerse mejor en español con pretérito anterior narrativo más natural: «lavó… tomó… se recostó». El sentido temporal ya lo aporta «cuando».'
  - severity: low
    issue: La nota b usa «renderizarse», anglicismo técnico poco natural
    rationale: En una nota para lectores bíblicos, «traducirse» es más natural y claro que «renderizarse».
  revised_spanish_text: 'Entonces, cuando les lavó los pies, tomó su ropa y se recostó de nuevo[a], les dijo[b]: «¿Entienden lo que he hecho por ustedes?»'
  revised_footnotes:
