translation:
  language: es
  text: 'Pedro le dijo[a]: «Señor, ¿por qué no puedo seguirte ahora? Yo pondré mi vida[b] por ti».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «¿Por qué no puedo seguirte ahora mismo?»'
    reason: alternative_reading
  - marker: b
    text: 'Griego: «mi alma»; en este giro, el sentido es «mi vida».'
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει
  english_pob_choice: said
  chosen_spanish: le dijo
  alternatives_spanish:
  - le dice
  lexicon: BDAG
  rationale: Aunque el griego conserva el presente histórico, en español narrativo la forma pasada es la más natural y transmite el mismo sentido sin rigidez estilística.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: En el vocativo dirigido a Jesús, «Señor» conserva respeto y el peso teológico posible del término κύριος sin desplazarlo a una equivalencia menos cargada.
- source_word: διὰ τί
  english_pob_choice: why
  chosen_spanish: ¿por qué
  alternatives_spanish:
  - ¿por qué razón?
  lexicon: BDAG
  rationale: Es la correspondencia idiomática natural en español para la pregunta causal/interrogativa del griego.
- source_word: οὐ δύναμαί
  english_pob_choice: am I not able
  chosen_spanish: no puedo
  alternatives_spanish:
  - no soy capaz de
  - no me es posible
  lexicon: BDAG
  rationale: En español, «no puedo» expresa con naturalidad la capacidad negada por δύναμαι sin sonar forzado. Mantiene el valor modal básico del verbo.
- source_word: σοι ἀκολουθῆσαι
  english_pob_choice: to follow you
  chosen_spanish: seguirte
  alternatives_spanish:
  - acompañarte
  - ir contigo
  lexicon: BDAG
  rationale: «Seguirte» reproduce ἀκολουθέω con su doble resonancia de desplazamiento y discipulado en Juan. El infinitivo enclítico es la forma más fluida en español.
- source_word: ἄρτι
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - ahora mismo
  - en este momento
  lexicon: BDAG
  rationale: «Ahora» es la forma simple y suficiente para el adverbio temporal, preservando la inmediatez del contraste con lo que viene después.
- source_word: τὴν ψυχήν μου
  english_pob_choice: my life
  chosen_spanish: mi vida
  alternatives_spanish:
  - mi alma
  lexicon: BDAG
  rationale: En la expresión idiomática «poner/entregar la ψυχή», el sentido es la vida entregada hasta la muerte. «Mi vida» evita una lectura más metafísica de «alma» que el contexto no exige.
- source_word: ὑπὲρ σοῦ
  english_pob_choice: for you
  chosen_spanish: por ti
  alternatives_spanish:
  - a favor de ti
  - en tu beneficio
  lexicon: BDAG
  rationale: «Por ti» es la opción más natural en español y deja abierta la amplitud de ὑπέρ en este contexto de disposición sacrificial o vicaria.
- source_word: θήσω
  english_pob_choice: I will lay down
  chosen_spanish: pondré
  alternatives_spanish:
  - entregaré
  - daré
  lexicon: BDAG
  rationale: Con objeto directo «mi vida», τίθημι puede expresarse en español de modo idiomático como «poner» la vida por alguien. Mantiene la fuerza de entrega sin una calca artificial.
theological_decisions:
- issue: Sentido de ψυχή en la declaración de Pedro
  english_pob_reading: Rendered as 'life' rather than 'soul'
  chosen_spanish_reading: Renderizado como «vida» y no como «alma»
  alternative_spanish_readings:
  - mi alma
  rationale: El contexto inmediato es la disposición de Pedro a morir por Jesús; la expresión griega funciona como idiomática para entregar la vida. «Alma» introduciría una carga antropológica que aquí no es la principal.
  doctrine_reference: Translation philosophy §1, §6
- issue: Alcance de ἀκολουθέω
  english_pob_reading: Rendered 'follow' to preserve both literal and discipleship sense
  chosen_spanish_reading: «Seguirte» para conservar el sentido literal y el discipulado
  alternative_spanish_readings:
  - acompañarte
  - ir contigo
  rationale: En Juan, el verbo enlaza el movimiento físico con la imposibilidad/pedagogía del discipulado. «Seguirte» preserva esa tensión sin reducirlo a mera compañía.
  doctrine_reference: Translation philosophy §3
- issue: Valor de κύριος en la boca de Pedro
  english_pob_reading: Lord
  chosen_spanish_reading: «Señor»
  alternative_spanish_readings:
  - Maestro
  rationale: La forma tradicional y fiel en el trato directo a Jesús en español es «Señor»; conserva la dignidad del vocativo y no atenúa el posible peso cristológico del término.
  doctrine_reference: Doctrina sobre κύριος / títulos cristológicos
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés y la última revisión marcada como unchanged; no se requieren cambios de fondo. La redacción española sigue la decisión óptima-equivalente y conserva las dos tensiones principales: δύναμαι como capacidad y ψυχή como vida en una expresión idiomática.'
  spanish_consistency_notes:
  - Se mantiene la traducción de κύριος a «Señor» conforme al estándar del proyecto para Jesús.
  - Se conserva «seguirte» para ἀκολουθέω por su valor narrativo y discipular.
  - Se evita «alma» en la frase final para no desviar el sentido idiomático de ψυχή.
  - «Por ti» reproduce con naturalidad ὑπέρ sin cerrarlo a una sola matización semántica.
