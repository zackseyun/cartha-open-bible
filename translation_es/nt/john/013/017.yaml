review_pass:
  verdict: revise
  source_alignment_summary: 'La estructura condicional del griego está bien reflejada en general: εἰ… ἐὰν… se conserva como dos cláusulas con «si», ταῦτα como plural («estas cosas»), y ποιῆτε αὐτά como poner en práctica lo conocido. Sin embargo, el borrador no preserva adecuadamente el peso de μακάριοι, que en el POB inglés fue deliberadamente «blessed», no «happy».'
  spanish_quality_summary: El borrador es comprensible, pero «felices son» suena marcado e innecesariamente invertido en español moderno. «Son bendecidos» o «son dichosos» es más natural en orden y mejor comunica el sentido. Además, la nota en [a] introduce una alternativa («conocen») que no corresponde a una ambigüedad preservada por el inglés y no es necesaria aquí.
  glossary_alignment: No hay términos de glosario mayor implicados salvo μακάριοι. El proyecto y la auditoría inglesa favorecen conservar el peso teológico de «blessed»; en español, «bendecidos» o «dichosos» se alinean mejor que «felices». «Bienaventurados» sería fiel pero más tradicional; «bendecidos» mantiene claridad e inteligibilidad amplia.
  issues:
  - severity: high
    issue: «felices» debilita el sentido de μακάριοι
    rationale: La auditoría inglesa documenta explícitamente que «blessed» fue escogido para evitar reducir el término a emoción subjetiva. «Felices» hace precisamente eso en español común, aun con nota aclaratoria.
  - severity: medium
    issue: Orden «felices son» poco natural
    rationale: Aunque gramatical, ese orden suena forzado en español neutro actual. «Son bendecidos» o «son dichosos» lee mejor sin pérdida de sentido.
  - severity: low
    issue: La nota [a] sobre «conocen» no es necesaria
    rationale: El inglés no preservó una nota para οἴδατε; «saben» es adecuado y la alternativa puede distraer sin aportar una ambigüedad relevante del pasaje.
  revised_spanish_text: Si saben estas cosas, son bendecidos[a] si las hacen.
  revised_footnotes:
  - marker: a
    text: O «dichosos» o «bienaventurados»; el griego «bendecidos» lleva la idea de estar en un estado de favor y florecimiento, no solo de sentirse feliz.
    reason: lexical_alternative
  revision_rationale: 'Se corrige μακάριοι para reflejar el peso teológico documentado en la auditoría inglesa y se mejora la naturalidad del español con un orden copulativo normal. Se elimina la nota innecesaria sobre οἴδατε y se conserva una sola nota léxica donde realmente hace falta: en «bendecidos», para mantener visibles alternativas españolas válidas como «dichosos» y «bienaventurados».'
