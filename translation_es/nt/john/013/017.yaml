revisions:
- from: Si saben estas cosas[a], felices son[b] si las hacen.
  to: Si saben estas cosas, son bendecidos[a] si las hacen.
  rationale: 'Se corrige μακάριοι para reflejar el peso teológico documentado en la auditoría inglesa y se mejora la naturalidad del español con un orden copulativo normal. Se elimina la nota innecesaria sobre οἴδατε y se conserva una sola nota léxica donde realmente hace falta: en «bendecidos», para mantener visibles alternativas españolas válidas como «dichosos» y «bienaventurados».'
