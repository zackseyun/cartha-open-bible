translation:
  language: es
  text: Si saben estas cosas, son bendecidos[a] si las hacen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dichosos» o «bienaventurados»; el griego «bendecidos» lleva la idea de estar en un estado de favor y florecimiento, no solo de sentirse feliz.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰ
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Si es que
  lexicon: BDAG
  rationale: Introduce la condición de manera directa y natural en español, manteniendo la estructura condicional del griego.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  lexicon: BDAG
  rationale: El plural neutro se conserva mejor con «estas cosas», que mantiene el referente a la enseñanza y el ejemplo previos sin convertirlo en singular.
- source_word: οἴδατε
  english_pob_choice: you know
  chosen_spanish: saben
  alternatives_spanish:
  - conocen
  - ya saben
  lexicon: BDAG
  rationale: «Saben» comunica conocimiento real y directo; el plural de segunda persona en español requiere voseo o tuteo regional, y aquí se opta por una forma neutra de registro eclesial amplia.
- source_word: μακάριοί
  english_pob_choice: blessed
  chosen_spanish: felices
  alternatives_spanish:
  - bienaventurados
  - bendecidos
  - dichosos
  lexicon: BDAG
  rationale: Se conserva la tensión lexical de μακάριος. En español, «felices» expresa el estado de favor y florecimiento sin sonar tan eclesiástico como «bienaventurados»; la nota preserva la alternativa teológica de «bendecidos»/«dichosos».
- source_word: ἐστε
  english_pob_choice: you are
  chosen_spanish: son
  alternatives_spanish:
  - son ustedes
  lexicon: BDAG
  rationale: Copula simple, con concordancia natural en español implícita en el contexto.
- source_word: ἐὰν
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - cuando
  - si acaso
  lexicon: BDAG
  rationale: Marca condición contingente, no temporal ni causal.
- source_word: ποιῆτε
  english_pob_choice: you do
  chosen_spanish: las hacen
  alternatives_spanish:
  - las ponen en práctica
  - las practican
  lexicon: BDAG
  rationale: «Hacerlas» es idiomático y breve; mantiene la idea de ejecutar en la práctica lo conocido.
- source_word: αὐτά
  english_pob_choice: them
  chosen_spanish: las
  alternatives_spanish:
  - las cosas
  - eso
  lexicon: BDAG
  rationale: El pronombre retoma τἀῦτα y en español concuerda con «cosas», evitando repetición innecesaria.
theological_decisions:
- issue: Sentido de μακάριος en un contexto de discipulado obediente
  english_pob_reading: blessed
  chosen_spanish_reading: felices
  alternative_spanish_readings:
  - bienaventurados
  - bendecidos
  - dichosos
  rationale: El griego describe un estado de favor/florecimiento ligado a la obediencia, no meramente una emoción. «Felices» comunica el resultado vital sin forzar un tecnicismo; la nota deja visible la alternativa «bendecidos» y la resonancia bíblica de «bienaventurados».
  doctrine_reference: Translation philosophy §6; preserved theological weight in accessible target language
- issue: Relación entre conocer y obedecer
  english_pob_reading: If you know these things, you are blessed if you do them.
  chosen_spanish_reading: Si saben estas cosas, felices son si las hacen.
  alternative_spanish_readings:
  - Si conocen estas cosas, son bienaventurados si las practican.
  rationale: Se mantiene la correspondencia entre conocimiento y práctica sin añadir interpretaciones. La segunda condición «si las hacen» preserva la exigencia de poner en obra lo sabido.
  doctrine_reference: Discipleship and obedience emphasis in Johannine teaching
translation_notes:
  revision_awareness: El texto griego y la traducción inglesa POB coinciden plenamente en la estructura condicional y en el sentido de μακάριος; no se requieren revisiones textuales. La principal decisión de esta entrega es cómo expresar en español el valor de μακάριος sin perder su peso teológico y al mismo tiempo mantener una frase breve, natural y apta para lectura pública.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o terminología litúrgica no presente en el verso.
  - Se mantuvo «estas cosas» para conservar el plural del demostrativo griego.
  - Se prefirió un español neutral y eclesialmente amplio, sin regionalismos.
  - Las alternativas léxicas se dejaron visibles en notas para no ocultar la tensión de μακάριος.
