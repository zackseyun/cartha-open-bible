translation:
  language: es
  text: 'Jesús respondió[a]: «¿Darás tu vida por mí? En verdad, en verdad te digo: de ningún modo cantará el gallo hasta que me hayas negado tres veces».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «alma»: «¿Darás tu alma por mí?» El griego ψυχή puede significar «alma» o «vida»; aquí el sentido es dar la propia vida.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκρίνεται
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - repuso
  lexicon: BDAG
  rationale: El griego introduce la réplica de Jesús con ἀποκρίνομαι. En español, «respondió» comunica de forma natural la acción narrativa sin perder el valor de contestación.
- source_word: ψυχήν
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - alma
  lexicon: BDAG
  rationale: En la expresión idiomática τίθημι τὴν ψυχήν, el sentido es ofrecer o dar la propia vida. «Vida» preserva la fuerza concreta y sacrificial del contexto; «alma» podría desplazar el sentido hacia una antropología más estrecha.
- source_word: ὑπὲρ ἐμοῦ
  english_pob_choice: for me
  chosen_spanish: por mí
  alternatives_spanish:
  - en favor de mí
  - por mi causa
  lexicon: BDAG
  rationale: ὑπέρ aquí expresa beneficio o representación. «Por mí» es la forma natural y breve en español, y conserva bien el matiz del enunciado retórico.
- source_word: θήσεις
  english_pob_choice: will you lay down
  chosen_spanish: vas a entregar
  alternatives_spanish:
  - vas a poner
  - vas a dar
  lexicon: BDAG
  rationale: Aunque τίθημι en este giro puede ser literalmente «poner/colocar», en la expresión joánica con ψυχή el valor idiomático es dar o entregar la vida. «Vas a entregar» comunica el acto voluntario de sacrificarla sin calco mecánico.
- source_word: ἀμὴν ἀμὴν
  english_pob_choice: Truly, truly
  chosen_spanish: De cierto, de cierto
  alternatives_spanish:
  - Amén, amén
  - En verdad, en verdad
  lexicon: BDAG
  rationale: La fórmula solemne de Jesús en Juan se puede verter con una expresión tradicional y clara. «De cierto, de cierto» mantiene el énfasis repetido y resulta plenamente inteligible en español bíblico contemporáneo.
- source_word: οὐ μὴ
  english_pob_choice: will certainly not
  chosen_spanish: no ... en absoluto
  alternatives_spanish:
  - de ninguna manera
  - ciertamente no
  lexicon: BDAG
  rationale: La combinación οὐ μή con subjuntivo intensifica fuertemente la negación. En español, «no ... en absoluto» conserva esa fuerza enfática y evita un tono excesivamente literal o arcaico.
- source_word: ἀλέκτωρ
  english_pob_choice: rooster
  chosen_spanish: gallo
  alternatives_spanish:
  - gallo de pelea
  - rooster
  lexicon: BDAG
  rationale: «Gallo» es el equivalente natural y bíblico en español para ἀλέκτωρ. Es claro para la audiencia y evita el anglicismo o una especificación innecesaria.
- source_word: φωνήσῃ
  english_pob_choice: crow
  chosen_spanish: cantará
  alternatives_spanish:
  - cacareará
  - hará oír su voz
  lexicon: BDAG
  rationale: Con ἀλέκτωρ, el verbo designa el canto del gallo. «Cantará» es idiomático en español y comunica bien el sonido característico del ave.
- source_word: ἕως οὗ
  english_pob_choice: until
  chosen_spanish: hasta que
  alternatives_spanish:
  - antes de que
  - hasta el momento en que
  lexicon: BDAG
  rationale: La construcción temporal se vierte de manera directa con «hasta que», que expresa con precisión el límite temporal de la negación.
- source_word: ἀρνήσῃ με
  english_pob_choice: you have denied me
  chosen_spanish: me hayas negado
  alternatives_spanish:
  - me niegues
  - me hayas repudiado
  lexicon: BDAG
  rationale: ἀρνέομαι significa negar o repudiar. «Me hayas negado» refleja con naturalidad el subjuntivo perfecto después de «hasta que» y mantiene la idea de la negación de Jesús.
- source_word: τρίς
  english_pob_choice: three times
  chosen_spanish: tres veces
  alternatives_spanish:
  - tres ocasiones
  - tres veces seguidas
  lexicon: BDAG
  rationale: «Tres veces» es la forma estándar y clara en español moderno; conserva el conteo adverbial sin añadir información no presente en el texto.
theological_decisions:
- issue: Valor de ψυχή en un anuncio de negación y posible muerte
  english_pob_reading: life
  chosen_spanish_reading: vida
  alternative_spanish_readings:
  - alma
  rationale: La escena trata de la disposición de Pedro a exponerse hasta la muerte por Jesús. Traducir ψυχή como «vida» evita sugerir un alma separable como centro del dicho y mantiene el sentido concreto de entrega sacrificial que exige el contexto.
  doctrine_reference: Primacía del contexto inmediato y del uso idiomático griego sobre una equivalencia eclesiástica fija.
- issue: Intensificación de la negación con οὐ μή
  english_pob_reading: will certainly not
  chosen_spanish_reading: no ... en absoluto
  alternative_spanish_readings:
  - ciertamente no
  - de ninguna manera
  rationale: El griego niega con máxima fuerza la posibilidad del hecho. En español, la construcción discontinua «no ... en absoluto» transmite esa rotundidad sin sobrecargar el registro ni perder claridad.
  doctrine_reference: Fidelidad semántica al valor enfático de la negación griega.
- issue: Fórmula solemne ἀμὴν ἀμὴν λέγω σοι
  english_pob_reading: Truly, truly, I say to you
  chosen_spanish_reading: De cierto, de cierto te digo
  alternative_spanish_readings:
  - Amén, amén te digo
  - En verdad, en verdad te digo
  rationale: Se conserva la duplicación enfática característica de Jesús en Juan. «De cierto, de cierto» es una opción bíblica amplia y transparente en español, sin convertir la fórmula en un simple «amén» litúrgico.
  doctrine_reference: Consistencia joánica y legibilidad en español bíblico.
translation_notes:
  revision_awareness: El texto sigue de cerca el paquete fuente griego y el rastro auditado en inglés. Se mantuvo la decisión lexical principal sobre ψυχή como «vida» y la negación enfática de οὐ μή con una formulación española natural. No se introdujeron cambios textuales respecto del sentido auditado; solo se ajustó la sintaxis para lectura pública en español.
  spanish_consistency_notes:
  - Se usa «Jesús» como nombre propio, sin variación.
  - Se conserva la repetición enfática «De cierto, de cierto» para reflejar el griego ἀμὴν ἀμὴν.
  - «Gallo» se mantiene como término estándar y no se sustituye por formas más regionales.
  - La estructura «me hayas negado tres veces» preserva el orden temporal del original sin añadir explicaciones.
  - La nota a pie de página marca la alternativa semántica documentada para ψυχή sin imponerla en el texto principal.
