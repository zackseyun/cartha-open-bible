review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja correctamente el sentido general del griego: Jesús responde, cuestiona la disposición de Pedro a dar su vida por él, introduce la afirmación solemne con repetición enfática, y predice la triple negación antes del canto del gallo. También preserva bien la nota léxica sobre ψυχή como «vida» con alternativa «alma». Sin embargo, hay dos ajustes de fidelidad/estilo recomendables: (1) θήσεις en la expresión joánica se acerca mejor a «dar/poner tu vida» que a «entregar tu vida»; «dar tu vida» suena más natural y más cercano al giro establecido. (2) La intensificación de οὐ μὴ se ha llevado a «en absoluto», que en español suena algo forzada en este contexto; una formulación como «de ningún modo» o simplemente una predicción natural sin sobretraducción enfática suele funcionar mejor. Dado que el proyecto valora legibilidad moderna y digna, conviene reparar esto.'
  spanish_quality_summary: El español es claro y comprensible, pero «De cierto, de cierto» suena marcadamente heredado de tradición RV y menos natural para un español moderno neutral; «En verdad, en verdad» comunica mejor la fórmula solemne sin arcaísmo innecesario. Asimismo, «el gallo no cantará en absoluto» resulta poco idiomático; en español bíblico fluido, «de ningún modo cantará el gallo» o «el gallo no cantará hasta que...» son más naturales. La puntuación y estructura general están bien.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Jesús», «vida», «gallo» y «me hayas negado tres veces» están bien alineados. La nota sobre ψυχή preserva correctamente la alternativa «alma». La revisión propuesta mejora la equivalencia idiomática de θήσεις y la naturalidad de ἀμὴν ἀμὴν / οὐ μὴ sin alterar la teología ni el contenido.
  issues:
  - severity: medium
    issue: «De cierto, de cierto» es comprensible pero demasiado tradicional/arcaizante para el estilo objetivo
    rationale: El proyecto pide español moderno pero digno. «En verdad, en verdad» preserva mejor la repetición solemne de ἀμὴν ἀμὴν con mayor naturalidad contemporánea.
  - severity: medium
    issue: «no cantará en absoluto» suena poco idiomático para οὐ μὴ ἀλέκτωρ φωνήσῃ
    rationale: Aunque intenta reflejar la negación enfática, la colocación española resulta torpe. Una formulación como «de ningún modo cantará el gallo» o una estructura más natural conserva mejor el sentido en español.
  - severity: low
