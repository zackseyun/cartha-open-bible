translation:
  language: es
  text: 'Jesús responde: «Es aquel a quien yo mojaré el pedazo de pan y se lo daré». Y, habiendo mojado el pedazo de pan, se lo da a Judas, hijo de Simón Iscariote[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Judas Iscariote, hijo de Simón». La redacción griega puede entenderse de cualquiera de las dos maneras.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀποκρίνεται
  english_pob_choice: answers
  chosen_spanish: responde
  alternatives_spanish:
  - contesta
  - responde
  lexicon: BDAG
  rationale: El presente histórico se conserva con un verbo natural en español. «Responde» reproduce la vivacidad narrativa sin sonar forzado.
- source_word: Ἐκεῖνός ἐστιν
  english_pob_choice: It is he
  chosen_spanish: Él es
  alternatives_spanish:
  - Ese es
  - Ese mismo es
  lexicon: BDAG
  rationale: La identificación de la persona queda clara en español con «Él es», que mantiene la fuerza deíctica sin calco áspero.
- source_word: ᾧ
  english_pob_choice: to whom
  chosen_spanish: a quien
  alternatives_spanish:
  - para quien
  lexicon: BDAG
  rationale: El relativo dativo se vierte con la preposición exigida por el español («a quien»), en coordinación con el acto de dar y el gesto de mojar.
- source_word: βάψω
  english_pob_choice: will dip
  chosen_spanish: mojaré
  alternatives_spanish:
  - sumergiré
  - empaparé
  lexicon: BDAG
  rationale: Para este contexto de comida, «mojar» comunica mejor que «bautizar» o «sumergir». «Mojaré» expresa el futuro explícito del griego.
- source_word: τὸ ψωμίον
  english_pob_choice: the piece of bread
  chosen_spanish: el pedazo de pan
  alternatives_spanish:
  - la porción de pan
  - el bocado de pan
  lexicon: BDAG
  rationale: ψωμίον designa una pequeña porción de pan o alimento. «Pedazo de pan» es claro, natural y mantiene el objeto concreto del gesto.
- source_word: καὶ δώσω αὐτῷ
  english_pob_choice: and give it
  chosen_spanish: y se lo daré
  alternatives_spanish:
  - y se lo doy
  - y le daré eso
  lexicon: BDAG
  rationale: El pronombre neutro implícito en el griego se expresa naturalmente con «se lo». El futuro mantiene la secuencia respecto a «mojaré».
- source_word: βάψας οὖν
  english_pob_choice: So, having dipped
  chosen_spanish: Y, después de mojar
  alternatives_spanish:
  - Entonces, habiendo mojado
  - Así que, después de mojar
  lexicon: BDAG
  rationale: El participio aoristo antecedente se vierte en español con una construcción temporal natural. «Después de mojar» preserva el orden de las acciones sin rigidez.
- source_word: δίδωσιν
  english_pob_choice: he gives
  chosen_spanish: se lo da
  alternatives_spanish:
  - lo da
  - da
  lexicon: BDAG
  rationale: El presente histórico se mantiene con «da». Se explicita el objeto indirecto con el dativo español «le/se», aquí resuelto idiomáticamente en «se lo da» para evitar ambigüedad.
- source_word: Ἰούδᾳ Σίμωνος Ἰσκαριώτου
  english_pob_choice: to Judas, the son of Simon Iscariot
  chosen_spanish: a Judas, hijo de Simón Iscariote
  alternatives_spanish:
  - a Judas, el hijo de Simón Iscariote
  - a Judas Iscariote, hijo de Simón
  lexicon: BDAG
  rationale: La forma griega permite entender la identificación de Judas por su filiación y epíteto. La redacción española sigue la opción más clara y directamente derivable del orden griego, sin cerrar indebidamente la ambigüedad sintáctica.
theological_decisions:
- issue: Identificación final de Judas en la frase genitiva
  english_pob_reading: '''Judas, the son of Simon Iscariot'' with footnoted alternative ''Judas Iscariot, Simon''s son.'''
  chosen_spanish_reading: «Judas, hijo de Simón Iscariote»
  alternative_spanish_readings:
  - «Judas Iscariote, hijo de Simón»
  - «Judas, el hijo de Simón Iscariote»
  rationale: El griego Σίμωνος Ἰσκαριώτου admite más de una segmentación. La opción principal sigue la lectura inmediata de la construcción genitiva y deja la posibilidad alternativa registrada en nota.
  doctrine_reference: John 13:26 textual/syntactic note; Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: La versión española corrige el problema de validación anterior asegurando que el marcador de nota [a] aparezca explícitamente en el texto principal. También ajusta el verbo inicial a un presente narrativo natural («responde») y conserva la secuencia verbal y participial del griego sin depender mecánicamente del inglés.
  spanish_consistency_notes:
  - Se usa «Jesús» para Ἰησοῦς conforme al estándar del proyecto.
  - Se mantiene «pan» en lugar de una equivalencia eclesiástica o más litúrgica, porque ψωμίον describe un pequeño pedazo de alimento en este contexto de comida compartida.
  - Se evita «Cristo» porque no aparece en el versículo.
  - La ambigüedad sobre Iscariote se conserva en la nota, sin borrar la tensión sintáctica documentada.
  - La puntuación española coloca dos puntos tras «responde[a]» y comillas angulares para mejor legibilidad editorial.
