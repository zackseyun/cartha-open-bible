    text: O «bolsa del dinero». El término griego designa el recipiente donde se guardaban los fondos del grupo.
    reason: lexical_alternative
  - marker: b
    text: «La fiesta» se refiere al contexto de la comida ritual de Pascua en esta sección.
    reason: cross_reference
  revision_rationale: Se reemplaza «Porque» por «Pues» para reflejar mejor el valor discursivo de γάρ y mejorar la naturalidad del español. Se mueve la nota léxica al sintagma «caja del dinero» y se corrige su contenido para que ofrezca una alternativa real, en línea con la auditoría inglesa. El resto del versículo se mantiene por ser fiel, claro y bien formulado.
