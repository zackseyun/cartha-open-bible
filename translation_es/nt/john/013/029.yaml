translation:
  language: es
  text: 'Pues algunos pensaban que, como Judas tenía la caja del dinero[a], Jesús le decía[b]: «Compra lo que necesitamos para la fiesta», o que diera algo a los pobres.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «bolsa del dinero». El término griego designa el recipiente donde se guardaban los fondos del grupo.
    reason: lexical_alternative
  - marker: b
    text: «La fiesta» se refiere al contexto de la comida ritual de Pascua en esta sección.
    reason: cross_reference
lexical_decisions:
- source_word: τινὲς
  english_pob_choice: some
  chosen_spanish: algunos
  alternatives_spanish:
  - algunas personas
  - unos cuantos
  lexicon: BDAG
  rationale: El indefinido plural se expresa naturalmente en español con «algunos», manteniendo la referencia a un subconjunto de los presentes sin especificarlo más de lo que hace el griego.
- source_word: ἐδόκουν
  english_pob_choice: thought
  chosen_spanish: pensaban
  alternatives_spanish:
  - creían
  - supusieron
  lexicon: BDAG
  rationale: El imperfecto sugiere una percepción en curso en la narración; «pensaban» conserva bien ese valor y suena natural en español.
- source_word: ἐπεὶ
  english_pob_choice: because
  chosen_spanish: como
  alternatives_spanish:
  - porque
  - ya que
  lexicon: BDAG
  rationale: Aquí introduce la razón de la suposición. En español, «como» al inicio de la cláusula causal resulta fluido y mantiene la relación explicativa sin duplicar la causalidad de modo pesado.
- source_word: γλωσσόκομον
  english_pob_choice: money box
  chosen_spanish: caja del dinero
  alternatives_spanish:
  - bolsa del dinero
  - monedero común
  - caja común
  lexicon: BDAG
  rationale: El término se refiere al recipiente donde se guardaban los fondos del grupo. «Caja del dinero» comunica la función sin imponer una imagen demasiado específica; se preserva la alternativa de un contenedor o bolsa en la nota.
- source_word: εἶχεν
  english_pob_choice: had
  chosen_spanish: tenía
  alternatives_spanish:
  - guardaba
  - llevaba
  lexicon: BDAG
  rationale: El verbo expresa posesión/custodia básica. «Tenía» reproduce esa relación de manera directa, dejando que el contexto indique que Judas lo custodiaba.
- source_word: λέγει αὐτῷ ὁ Ἰησοῦς
  english_pob_choice: Jesus was telling him
  chosen_spanish: Jesús le decía
  alternatives_spanish:
  - Jesús le dijo
  - Jesús le estaba diciendo
  lexicon: BDAG
  rationale: El presente histórico λέγει se vierte con un imperfecto natural en español. «Le decía» conserva el matiz narrativo y la orientación al contenido citado.
- source_word: Ἀγόρασον
  english_pob_choice: Buy
  chosen_spanish: Compra
  alternatives_spanish:
  - Cómpralo
  - Adquiere
  lexicon: BDAG
  rationale: El imperativo aoristo se traduce con el imperativo simple y directo «Compra», adecuado al estilo bíblico contemporáneo en español.
- source_word: ὧν χρείαν ἔχομεν
  english_pob_choice: what we need
  chosen_spanish: lo que necesitamos
  alternatives_spanish:
  - las cosas que necesitamos
  - aquello que necesitamos
  lexicon: BDAG
  rationale: La construcción relativa con χρεία se expresa de forma idiomática con «lo que necesitamos», manteniendo el sentido de necesidad compartida sin calcado innecesario.
- source_word: εἰς τὴν ἑορτήν
  english_pob_choice: for the feast
  chosen_spanish: para la fiesta
  alternatives_spanish:
  - para la celebración
  - para el banquete
  lexicon: BDAG
  rationale: «Fiesta» traduce bien ἑορτή en este contexto de comida festiva/ritual. Se evita añadir «Pascua» en el texto principal porque el griego de este versículo no la repite explícitamente.
- source_word: τοῖς πτωχοῖς
  english_pob_choice: to the poor
  chosen_spanish: a los pobres
  alternatives_spanish:
  - para los pobres
  lexicon: BDAG
  rationale: La forma sustantivada del adjetivo se traduce naturalmente como «los pobres». Con el verbo «dar», la preposición «a» resulta la más directa en español.
- source_word: ἵνα τι δῷ
  english_pob_choice: that he should give something
  chosen_spanish: o que diera algo
  alternatives_spanish:
  - o que pudiera dar algo
  - o para que diera algo
  lexicon: BDAG
  rationale: La cláusula final expresa el propósito o intención atribuida por los discípulos. «O que diera algo» conserva la idea de posible entrega sin forzar una formulación demasiado explicativa.
theological_decisions:
- issue: Alusión al contexto de la fiesta
  english_pob_reading: '''The feast'' refers to the festival meal context of Passover in this section.'
  chosen_spanish_reading: «La fiesta» se entiende dentro del contexto pascual de la sección, sin añadir «Pascua» al cuerpo del versículo.
  alternative_spanish_readings:
  - «la Pascua»
  - «la fiesta de Pascua»
  rationale: El versículo no nombra explícitamente la Pascua, pero el contexto narrativo sí la presupone. Se conserva la literalidad de ἑορτή en el texto principal y se explica el trasfondo en nota.
  doctrine_reference: Contexto narrativo de la Pascua en Juan 13; lectura contextual del pasaje.
- issue: Valor de la cláusula ἵνα τι δῷ
  english_pob_reading: that he should give something to the poor.
  chosen_spanish_reading: «o que diera algo a los pobres» mantiene la posibilidad inferida por los discípulos, no una orden directa documentada.
  alternative_spanish_readings:
  - «para que diera algo a los pobres»
  - «que debía dar algo a los pobres»
  rationale: La construcción griega refleja lo que los discípulos creían que Jesús podía estar diciendo; en español conviene preservar ese carácter inferido e indirecto con una coordinación que no convierte la frase en mandato explícito del narrador.
  doctrine_reference: Narración indirecta y cohesión discursiva en Juan 13:29.
translation_notes:
  revision_awareness: Se tomó como base el texto griego SBLGNT y la auditoría inglesa más reciente, especialmente la estructura causal de ἐπεὶ, el valor del presente histórico λέγει y la relación inferida en ἵνα τι δῷ. La versión inglesa revisada eliminó un «because» extra para reflejar mejor la sintaxis griega; en español se mantuvo una sola causal inicial con «como» y se evitó repetir la causa dentro de la oración principal.
  spanish_consistency_notes:
  - Se usa «Jesús» para Ἰησοῦς conforme al estándar del proyecto.
  - Se mantiene «fiesta» en el texto principal y se explica el trasfondo pascual en nota, respetando la tensión entre traducción literal y contexto.
  - Se prefiere «a los pobres» por fluidez natural con el verbo de dar.
  - No se introduce terminología eclesiástica tradicional ajena al griego; el tono es bíblico contemporáneo y digno.
