review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien el sentido general del griego y sigue de cerca la auditoría inglesa: algunos dedujeron que Jesús le decía a Judas que comprara lo necesario para la fiesta o que diera algo a los pobres. Sin embargo, la apertura con «Porque algunos pensaban» introduce una causalidad inicial no presente como conjunción principal del versículo; γάρ se explica mejor como partícula de apoyo dentro de la oración, no como un «porque» frontal. Además, la nota [a] está anclada a «que», pero el contenido de la nota corresponde a «caja del dinero», por lo que el anclaje de nota no coincide con el término glosado.'
  spanish_quality_summary: El español es claro y legible, pero «Porque algunos pensaban» suena algo torpe en contexto aislado y menos natural que una formulación como «Pues algunos pensaban que…» o simplemente «Algunos pensaban que…». También conviene mover la nota léxica al sintagma que realmente explica. El resto del versículo tiene buena fluidez y registro adecuado.
  glossary_alignment: No hay conflictos con la terminología troncal del proyecto. «Jesús», «Dios» y otros términos sensibles no presentan problema aquí. «Caja del dinero» es aceptable como equivalente de γλωσσόκομον, con alternativa en nota. «La fiesta» refleja bien ἑορτή sin sobreespecificar «Pascua» en el texto principal.
  issues:
  - severity: medium
    issue: «Porque» al inicio del versículo no refleja de la mejor manera γάρ en esta oración.
    rationale: El griego comienza con τινὲς γὰρ ἐδόκουν, donde γάρ funciona como partícula explicativa/conectiva, no necesariamente como una causal fuerte encabezando toda la cláusula en español. «Pues algunos pensaban» o «Algunos pensaban» conserva mejor la estructura y la naturalidad.
  - severity: medium
    issue: La nota [a] está anclada a «que» en lugar de al término «caja del dinero».
    rationale: La nota explica γλωσσόκομον, no la conjunción ὅτι. Debe colocarse en el sintagma relevante para mantener disciplina de notas y claridad editorial.
  - severity: low
    issue: La redacción de la nota [a] repite el lema principal como alternativa.
    rationale: La nota dice «O “caja del dinero”», pero esa ya es la lectura principal. La alternativa documentada en la auditoría inglesa es más bien «bolsa del dinero / bolsa de dinero» o equivalente.
  revised_spanish_text: 'Pues algunos pensaban que, como Judas tenía la caja del dinero[a], Jesús le decía[b]: «Compra lo que necesitamos para la fiesta», o que diera algo a los pobres.'
  revised_footnotes:
