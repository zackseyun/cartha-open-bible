revisions:
- from: 'Porque algunos pensaban que[a], como Judas tenía la caja del dinero, Jesús le decía[b]: «Compra lo que necesitamos para la fiesta», o que diera algo a los pobres.'
  to: 'Pues algunos pensaban que, como Judas tenía la caja del dinero[a], Jesús le decía[b]: «Compra lo que necesitamos para la fiesta», o que diera algo a los pobres.'
  rationale: Se reemplaza «Porque» por «Pues» para reflejar mejor el valor discursivo de γάρ y mejorar la naturalidad del español. Se mueve la nota léxica al sintagma «caja del dinero» y se corrige su contenido para que ofrezca una alternativa real, en línea con la auditoría inglesa. El resto del versículo se mantiene por ser fiel, claro y bien formulado.
