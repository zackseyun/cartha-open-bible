translation:
  language: es
  text: 'Entonces él, recostándose así contra el pecho de Jesús[a], le dice: «Señor, ¿quién es?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «reclinándose sobre el pecho de Jesús». El griego refleja la postura de comer recostado a la mesa, echándose hacia atrás.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναπεσὼν
  english_pob_choice: leaning back
  chosen_spanish: recostándose
  alternatives_spanish:
  - reclinándose
  - inclinándose hacia atrás
  lexicon: BDAG
  rationale: En contexto de comida a la mesa, el participio describe la postura corporal de recostarse/reclinarse. «Recostándose» comunica la acción con naturalidad en español y conserva la idea de postura, sin volverla demasiado técnica.
- source_word: ἐκεῖνος
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - ese
  - aquel
  lexicon: BDAG
  rationale: El griego usa un demostrativo que aquí funciona de manera referencial. En español, «él» mantiene la referencia sin añadir interpretación; «ese/aquel» sonarían más marcados o menos naturales en este contexto.
- source_word: οὕτως
  english_pob_choice: in this way
  chosen_spanish: de esa manera
  alternatives_spanish:
  - así
  - de este modo
  lexicon: BDAG
  rationale: «De esa manera» conserva el enlace con la postura inmediatamente descrita y expresa la forma del gesto con claridad. «Así» también sería posible, pero esta opción suena más explícita y auditables desde el griego.
- source_word: ἐπὶ τὸ στῆθος
  english_pob_choice: against Jesus' chest
  chosen_spanish: sobre el pecho de Jesús
  alternatives_spanish:
  - contra el pecho de Jesús
  - en el pecho de Jesús
  lexicon: BDAG
  rationale: στῆθος designa el pecho/pecho-caja torácica. «Pecho» es el equivalente natural en español; «sobre» conserva la relación espacial sin forzar una imagen demasiado física como «contra».
- source_word: λέγει αὐτῷ
  english_pob_choice: says to him
  chosen_spanish: le dice
  alternatives_spanish:
  - le dijo
  lexicon: BDAG
  rationale: Se conserva el presente histórico del griego con «dice», como hace el POB inglés con «says». En español, el presente narrativo es posible y mantiene el valor aspectual del original.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Señor mío
  - Maestro
  lexicon: BDAG
  rationale: En el discurso directo a Jesús, «Señor» preserva el valor titular y la carga cristológica del término κύριος, en línea con el criterio del proyecto para este vocativo.
- source_word: τίς ἐστιν;
  english_pob_choice: who is it?
  chosen_spanish: ¿quién es?
  alternatives_spanish:
  - ¿quién es él?
  - ¿quién es esa persona?
  lexicon: BDAG
  rationale: El español idiomático omite a menudo el pronombre expreso en preguntas de identidad. «¿Quién es?» transmite fielmente la pregunta del griego sin añadir un referente innecesario.
theological_decisions:
- issue: Tratamiento de κύριος como vocativo dirigido a Jesús
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Maestro
  - Señor mío
  rationale: Se mantiene la lectura cristológica amplia de κύριος. «Señor» deja abierta tanto la cortesía como la confesión de autoridad, sin reducir el término a un simple tratamiento respetuoso.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Presente histórico en λέγει
  english_pob_reading: says
  chosen_spanish_reading: dice
  alternative_spanish_readings:
  - dijo
  rationale: El griego usa presente histórico; por eso se preserva en español con «dice». Esto mantiene la vivacidad narrativa sin alterar el contenido doctrinal del versículo.
  doctrine_reference: 'POB revision awareness: historical present preserved'
translation_notes:
  revision_awareness: 'Se siguió la última revisión del POB en inglés: se evitó una identificación interpretativa como «ese discípulo» y se conservó el presente histórico de λέγει. También se mantuvo el enlace espacial de οὕτως y la referencia física a στῆθος sin suavizar la escena.'
  spanish_consistency_notes:
  - Se usa «Señor» para κύριος, conforme al criterio del proyecto en referencia directa a Jesús.
  - Se preserva el presente narrativo con «dice», coherente con la revisión inglesa más reciente.
  - «Pecho» se mantiene como equivalente natural de στῆθος en español; no se usa «seno» para evitar un registro arcaizante o ambiguo.
