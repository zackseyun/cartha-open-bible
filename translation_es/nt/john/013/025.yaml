revisions:
- from: 'Así, él, recostándose de esa manera sobre el pecho de Jesús[a], le dice: «Señor, ¿quién es?»'
  to: 'Entonces él, recostándose así contra el pecho de Jesús[a], le dice: «Señor, ¿quién es?»'
  rationale: Se elimina la duplicación de οὕτως, se mejora la fluidez del español y se ajusta la imagen espacial a la postura implícita en la escena, mientras se preservan el presente histórico, el vocativo «Señor» y la pregunta de identidad.
