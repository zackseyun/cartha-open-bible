revisions:
- from: 'Pues él sabía quién lo estaba entregando; por eso dijo[a]: «No todos ustedes están limpios».'
  to: 'Pues él sabía quién lo estaba traicionando; por eso dijo[a]: «No todos ustedes están limpios».'
  rationale: Se cambia «entregando» por «traicionando» en el texto principal para alinearlo con la decisión contextual documentada por la POB inglesa para παραδιδόντα en referencia a Judas, mientras se conserva la opción más literal «entregando» en nota. Se mantiene «quién» por naturalidad española, ya que el cambio principal necesario es semántico y la frase resultante es clara y fiel al sentido.
