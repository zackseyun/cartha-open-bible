translation:
  language: es
  text: 'Pues él sabía quién lo estaba traicionando; por eso dijo[a]: «No todos ustedes están limpios».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «el que lo estaba entregando». En el contexto, esto se refiere a la traición de Judas.
    reason: lexical_alternative
lexical_decisions:
- source_word: ᾔδει
  english_pob_choice: he knew
  chosen_spanish: sabía
  alternatives_spanish:
  - conocía
  - había sabido
  lexicon: οἶδα
  rationale: En español, «sabía» transmite con naturalidad el conocimiento ya presente en el contexto narrativo. «Conocía» también es posible, pero aquí suena menos directo. «Había sabido» no expresa bien el estado de conocimiento continuo que sugiere οἶδα.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Pues
  alternatives_spanish:
  - Porque
  - Porque en efecto
  lexicon: γάρ
  rationale: «Pues» conserva la función explicativa de γάρ sin forzar una causalidad demasiado fuerte. Es natural en español y mantiene la conexión con la afirmación previa.
- source_word: τὸν παραδιδόντα αὐτόν
  english_pob_choice: the one who was betraying him
  chosen_spanish: quién lo estaba entregando
  alternatives_spanish:
  - el que lo estaba traicionando
  - el que lo entregaba
  lexicon: παραδίδωμι
  rationale: Se preserva la ambigüedad lexicográfica entre «entregar» y «traicionar», pero en este contexto narrativo la referencia es Judas. «Entregar» sigue de cerca la fuerza básica de παραδίδωμι, mientras que el participio progresivo «lo estaba entregando» refleja la acción en curso.
- source_word: διὰ τοῦτο
  english_pob_choice: for this reason
  chosen_spanish: por eso
  alternatives_spanish:
  - por esta razón
  - por lo cual
  lexicon: διά + τοῦτο
  rationale: «Por eso» es el equivalente más natural y fluido en español para la relación explicativa/resultativa del griego. Conserva el vínculo lógico sin recargar la frase.
- source_word: Οὐχὶ πάντες καθαροί ἐστε
  english_pob_choice: Not all of you are clean
  chosen_spanish: No todos ustedes están limpios
  alternatives_spanish:
  - No todos ustedes son limpios
  - No todos están limpios
  lexicon: καθαρός
  rationale: «Limpios» conserva el doble alcance físico/ritual y espiritual que la POB inglesa protege con «clean». «Están limpios» mantiene la idea de estado, mientras que «son limpios» suena más esencialista y menos adecuado aquí.
theological_decisions:
- issue: Sentido de παραδιδόντα en el contexto de Judas
  english_pob_reading: betraying
  chosen_spanish_reading: lo estaba entregando
  alternative_spanish_readings:
  - lo estaba traicionando
  - lo iba a entregar
  rationale: El griego puede traducirse más literalmente como «entregar», pero el contexto de la pasión identifica a Judas como el traidor. La versión española conserva la base verbal «entregar» para no perder la forma del texto fuente, sin negar el valor contextual de traición.
  doctrine_reference: Principio POB de primacía del idioma original y preservación de tensiones léxicas cuando el contexto las carga de sentido.
- issue: Sentido de καθαροί en el discurso del lavamiento de pies
  english_pob_reading: clean
  chosen_spanish_reading: limpios
  alternative_spanish_readings:
  - puros
  - limpios ritualmente
  rationale: «Limpios» mantiene la tensión entre limpieza física/ritual y condición espiritual. «Puros» estrecharía demasiado el sentido hacia lo moral; «limpios ritualmente» explicita más de lo que el texto dice.
  doctrine_reference: Principio POB de no resolver prematuramente la tensión teológica del texto.
translation_notes:
  revision_awareness: 'El auditor inglés revisó la cláusula participial para hacerla más natural sin cambiar el sentido: de una forma más breve a «the one who was betraying him». La versión española sigue esa misma línea, manteniendo la referencia a Judas y la progresión verbal del participio con una solución idiomática («lo estaba entregando»).'
  spanish_consistency_notes:
  - Se usó «Pues» como enlace explicativo, coherente con γάρ y con un español bíblico moderno.
  - Se evitó «SEÑOR» o equivalentes de tradición no presentes; no aplica aquí ningún nombre divino.
  - «Limpios» se eligió deliberadamente para conservar la tensión ritual y moral que la POB inglesa documenta.
  - La nota a pie de página marca la alternativa más literal de παραδιδόντα para preservar transparencia auditable.
