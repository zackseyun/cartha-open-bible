translation:
  language: es
  text: Ustedes me llaman el Maestro y el Señor[a], y tienen razón, porque lo soy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Maestro». En este contexto, κύριος puede expresar autoridad o señorío; aquí se conserva «Señor» como la traducción titulativa por defecto.
    reason: lexical_alternative
lexical_decisions:
- source_word: φωνεῖτέ
  english_pob_choice: call
  chosen_spanish: llaman
  alternatives_spanish:
  - me llaman
  - me dicen
  lexicon: BDAG
  rationale: En esta construcción con complemento directo y títulos, «llamar» reproduce de manera natural el valor de φωνέω en español y conserva la relación directa entre los discípulos y Jesús.
- source_word: Ὁ διδάσκαλος
  english_pob_choice: Teacher
  chosen_spanish: el Maestro
  alternatives_spanish:
  - el Maestro Enseñante
  - el Docente
  - el Teacher
  lexicon: BDAG
  rationale: Para Jesús como título, «Maestro» es la equivalencia española más natural y digna. Aunque el inglés POB usa «Teacher», en español «Maestro» comunica mejor la función titulativa sin sonar mecánico. «El» mantiene el artículo del griego en el título.
- source_word: Ὁ κύριος
  english_pob_choice: Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Dueño
  - el Amo
  - el Maestro
  lexicon: BDAG
  rationale: Se conserva «Señor» como traducción estándar de κύριος para un título cristológico. «Maestro» no se usa aquí para no borrar la distinción lexical entre διδάσκαλος y κύριος, y «Amo/Dueño» serían menos adecuados en este contexto.
- source_word: καλῶς λέγετε
  english_pob_choice: you are right
  chosen_spanish: tienen razón
  alternatives_spanish:
  - dicen bien
  - hablan bien
  - están en lo correcto
  lexicon: BDAG
  rationale: La combinación expresa evaluación de la afirmación de los discípulos. En español, «tienen razón» comunica con naturalidad la valoración de corrección que el inglés POB captó con «you are right», sin convertir el verbo en una paráfrasis excesiva.
- source_word: εἰμὶ γάρ
  english_pob_choice: for I am
  chosen_spanish: porque yo soy
  alternatives_spanish:
  - pues yo soy
  - porque soy yo
  - pues yo lo soy
  lexicon: BDAG
  rationale: «Porque yo soy» sigue de cerca la autoidentificación enfática del griego y preserva la concisión. Se evita añadir explicaciones como «el que soy» para no ir más allá del texto base.
theological_decisions:
- issue: Título cristológico κύριος aplicado a Jesús
  english_pob_reading: Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el Maestro
  - el Amo
  rationale: El verso afirma explícitamente la legitimidad de llamar a Jesús κύριος. «El Señor» mantiene el peso cristológico del título en español sin neutralizarlo, coherente con la lectura doctrinal base del POB.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
translation_notes:
  revision_awareness: El inglés POB revisó «you speak rightly» a «you are right» por mayor naturalidad. En español se siguió ese ajuste con «tienen razón», que expresa mejor la evaluación directa de καλῶς λέγετε sin perder formalidad ni contenido.
  spanish_consistency_notes:
  - Se mantuvo la distinción entre «Maestro» y «Señor» para reflejar los dos títulos griegos distintos.
  - No se omitió el artículo en los títulos, porque en español su presencia es natural y ayuda a conservar la estructura nominal del original.
  - «Porque yo soy» preserva la brevedad enfática del cierre griego sin añadir glosa interpretativa.
