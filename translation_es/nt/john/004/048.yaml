translation:
  language: es
  text: 'Entonces Jesús le dijo[a]: «Si ustedes no ven señales y maravillas, de ningún modo creerán».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Los verbos traducidos «ven» y «creerán» están en plural en griego; por eso las palabras de Jesús probablemente abarcan a más que al funcionario solo.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπεν οὖν
  english_pob_choice: So Jesus said
  chosen_spanish: Entonces Jesús le dijo
  alternatives_spanish:
  - Así que Jesús le dijo
  - Por tanto, Jesús le dijo
  lexicon: BDAG
  rationale: οὖν marca continuidad narrativa y lógica. «Entonces» conserva ese enlace de manera natural en español sin volver la frase excesivamente formal o mecánica.
- source_word: πρὸς αὐτόν
  english_pob_choice: to him
  chosen_spanish: le dijo
  alternatives_spanish:
  - dijo a él
  - le habló
  lexicon: BDAG
  rationale: El griego usa πρός con valor de dirección en una introducción de discurso. En español, el dativo ético «le dijo» expresa con naturalidad la misma relación sin perder el destinatario singular del marco narrativo.
- source_word: Ἐὰν μὴ
  english_pob_choice: Unless
  chosen_spanish: Si no
  alternatives_spanish:
  - A menos que
  - Si no fuera que
  lexicon: BDAG
  rationale: La estructura condicional negativa se expresa de modo claro y idiomático con «si no». Mantiene la fuerza de la condición sin añadir matices que el griego no exige.
- source_word: σημεῖα
  english_pob_choice: signs
  chosen_spanish: señales
  alternatives_spanish:
  - signos
  - señales milagrosas
  lexicon: BDAG
  rationale: 'En Juan, σημεῖον tiene peso teológico: no solo un milagro, sino un acto que apunta a su significado. «Señales» conserva ese valor mejor que «milagros» en el texto principal.'
- source_word: τέρατα
  english_pob_choice: wonders
  chosen_spanish: maravillas
  alternatives_spanish:
  - prodigios
  - portentos
  lexicon: BDAG
  rationale: El par σημεῖα καὶ τέρατα es tradicionalmente «señales y maravillas». «Maravillas» comunica bien el carácter extraordinario del término sin sonar arcaico.
- source_word: ἴδητε
  english_pob_choice: you see
  chosen_spanish: ven
  alternatives_spanish:
  - vean
  - veáis
  lexicon: BDAG
  rationale: El verbo está en segunda persona plural. En español, «ven» preserva esa pluralidad de forma natural dentro de un dicho directo, aunque el marco narrativo tenga un solo interlocutor.
- source_word: οὐ μὴ πιστεύσητε
  english_pob_choice: you will certainly not believe
  chosen_spanish: de ningún modo creerán
  alternatives_spanish:
  - nunca creerán
  - ciertamente no creerán
  lexicon: BDAG
  rationale: οὐ μὴ con subjuntivo aoristo expresa negación enfática. «De ningún modo» transmite esa fuerza con claridad y evita suavizar el énfasis. Se eligió «creerán» para reflejar el plural griego en la palabra de Jesús.
- source_word: πιστεύω
  english_pob_choice: believe
  chosen_spanish: creer
  alternatives_spanish:
  - tener fe
  - confiar
  lexicon: BDAG
  rationale: En Juan, πιστεύω suele significar «creer» en el sentido relacional y teológico habitual. «Creer» es el equivalente más directo y no introduce una paráfrasis.
theological_decisions:
- issue: Alcance plural de las palabras de Jesús
  english_pob_reading: The verbs 'see' and 'believe' are plural in Greek, so Jesus' words likely extend beyond the official himself to a wider group.
  chosen_spanish_reading: Los verbos «ven» y «creerán» son plurales en griego, así que las palabras de Jesús probablemente se extienden más allá del funcionario mismo hacia un grupo más amplio.
  alternative_spanish_readings:
  - Tomar toda la frase como dirigida solo al funcionario en sentido estrictamente individual
  - Explicitar el plural con una glosa como «ustedes» en el texto principal
  rationale: El contexto narrativo presenta a un solo interlocutor, pero la forma verbal plural en griego sugiere un alcance más amplio. Se preserva esa tensión en lugar de resolverla interpretativamente en el texto principal.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: 'El borrador sigue el texto griego SBLGNT y coincide con el audit trail inglés: conserva la continuidad de οὖν, el valor teológico de σημεῖα, la pareja fija σημεῖα καὶ τέρατα como «señales y maravillas», y la negación enfática de οὐ μὴ. No se detectaron revisiones recientes que exijan ajuste adicional.'
  spanish_consistency_notes:
  - Se usa «Jesús» para Ἰησοῦς y no se introduce terminología litúrgica distinta.
  - «Señales» se mantiene para σημεῖα en coherencia con el uso joánico.
  - «Creer» se usa para πιστεύω, evitando «tener fe» como paráfrasis innecesaria.
  - La nota al pie marca la tensión de número sin alterar el texto principal.
