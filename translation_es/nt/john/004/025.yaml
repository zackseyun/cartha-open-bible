review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del griego: la mujer habla a Jesús, afirma que el Mesías viene, añade una glosa explicativa sobre χριστός, y dice que cuando él venga les dará a conocer todas las cosas. Sin embargo, la decisión de mantener «Cristo» en el texto principal contradice la traza inglesa más reciente, que restauró «Messiah/Mesías» también en la glosa para ajustarse a la política doctrinal del proyecto. Además, el español actual usa dos notas donde una sola basta para explicar la relación entre Μεσσίας y χριστός.'
  spanish_quality_summary: El español es claro y digno. «La mujer le dijo» y «Sé que viene el Mesías» suenan naturales. «Nos anunciará todo» es aceptable, pero «nos declarará todas las cosas» o «nos dará a conocer todas las cosas» reflejarían mejor ἀναγγελεῖ sin reducirlo a mero anuncio; aun así, no es un error grave. La reparación necesaria es principalmente terminológica y de aparato de notas.
  glossary_alignment: «Mesías» para Μεσσίας está bien. Pero el proyecto indica que χριστός normalmente debe ir como «Mesías» cuando es título, salvo carve-out documentado; aquí la auditoría inglesa fue corregida precisamente para evitar «Christ/Cristo». Por tanto, en español debe decir «el que es llamado Mesías», con nota que explique que el griego aclara Μεσσίας mediante χριστός. Esto preserva la distinción fuente en nota sin romper la terminología principal.
  issues:
  - severity: high
    issue: Se conserva «Cristo» en la glosa explicativa del texto principal.
    rationale: La revisión auditada más reciente del POB inglés restauró «the one called Messiah» y rechazó «Christ» por política doctrinal/terminológica. El español debe seguir esa decisión salvo razón fuerte, que aquí no existe.
  - severity: medium
    issue: Las notas a y b duplican información y una de ellas ancla innecesariamente «Mesías».
    rationale: La explicación relevante es la relación entre Μεσσίας y χριστός; basta una sola nota en la glosa explicativa. La nota sobre «Mesías» por sí sola no añade una ambigüedad necesaria en español.
  - severity: low
    issue: «Nos anunciará todo» puede sonar algo menos preciso que el valor de ἀναγγελεῖ.
    rationale: El verbo apunta a declarar/dar a conocer. «Anunciar» no es incorrecto, pero puede sugerir proclamación breve más que explicación completa. Conviene ajustar para mayor fidelidad y naturalidad.
  revised_spanish_text: 'La mujer le dijo: «Sé que viene el Mesías, el que es llamado Mesías[a]. Cuando él venga, nos dará a conocer todas las cosas».'
