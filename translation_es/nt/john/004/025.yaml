  text: λέγει αὐτῷ ἡ γυνή· Οἶδα ὅτι Μεσσίας ἔρχεται, ὁ λεγόμενος χριστός· ὅταν ἔλθῃ ἐκεῖνος, ἀναγγελεῖ ἡμῖν ⸀ἅπαντα.
base_translation:
  language: en
  yaml_path: translation/nt/john/004/025.yaml
  text: The woman said to him[a], “I know that Messiah is coming” (the one called Messiah). “When he comes, he will tell us all things.”
  footnotes:
  - marker: a
    text: 'Greek: ''Messiah, the one called Christ.'' John explains the Semitic title Μεσσίας with the Greek title χριστός. Elsewhere in this translation, χριστός as a title is normally rendered ''Messiah.'''
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4-2026-03-05
