    unchanged: false
    changes_summary: 'Revised “everything” to “all things” to more closely reflect ἅπαντα while keeping formal register; otherwise left the draft unchanged. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: 'La mujer le dijo: «Sé que viene el Mesías, el que es llamado Mesías[a]. Cuando él venga, nos dará a conocer todas las cosas».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «Mesías, el que es llamado χριστός». Juan explica el título semítico Μεσσίας mediante el título griego χριστός. En esta traducción, χριστός como título normalmente se vierte «Mesías».'
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - dice
  lexicon: BDAG
  rationale: En narración española, el presente histórico es posible, pero aquí el pasado simple resulta más natural y fiel al valor narrativo del contexto, sin perder el tono inmediato del diálogo.
- source_word: γυνή
  english_pob_choice: the woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - la esposa
  lexicon: BDAG
  rationale: En este contexto se trata de la mujer samaritana; «la mujer» es la referencia contextual más directa y evita introducir una relación matrimonial no presente en el texto.
- source_word: Οἶδα
  english_pob_choice: I know
  chosen_spanish: sé
  alternatives_spanish:
  - yo sé
  - estoy consciente
  lexicon: BDAG
  rationale: «Sé» expresa de forma natural el perfecto de conocimiento de οἶδα y mantiene la afirmación directa de la mujer.
- source_word: Μεσσίας
  english_pob_choice: Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Mesías esperado
  - Mesías prometido
  lexicon: BDAG
  rationale: El término es un título semítico transliterado; en español, «Mesías» preserva el valor titular reconocido y mantiene la conexión con el contexto judío/samaritano.
- source_word: ἔρχεται
  english_pob_choice: is coming
  chosen_spanish: viene
  alternatives_spanish:
  - está viniendo
  - está por venir
  lexicon: BDAG
  rationale: El presente griego tiene sentido futurizante; en español, «viene» comunica ese valor con naturalidad y sin forzar una perífrasis menos idiomática.
- source_word: ὁ λεγόμενος χριστός
  english_pob_choice: the one called Christ
  chosen_spanish: el que es llamado Cristo
  alternatives_spanish:
  - el llamado Cristo
  - el que se llama Cristo
  lexicon: BDAG
  rationale: 'La frase conserva el carácter explicativo del griego: el título semítico se aclara mediante el término griego. Aquí se mantiene «Cristo» como glosa del original χριστός, porque el texto griego distingue entre Μεσσίας y χριστός; traducir ambos como «Mesías» borraría esa explicación bilingüe.'
- source_word: ὅταν ἔλθῃ
  english_pob_choice: When he comes
  chosen_spanish: Cuando él venga
  alternatives_spanish:
  - cuando venga
  - cuando él llegue
  lexicon: BDAG
  rationale: La construcción expresa una eventualidad futura; «Cuando él venga» preserva el sentido temporal y el matiz de expectativa.
- source_word: ἐκεῖνος
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - ese
  - aquel
  lexicon: BDAG
  rationale: El demostrativo añade énfasis; en español, el pronombre explícito «él» suena natural en este contexto y conserva la referencia enfática sin volver la frase extraña.
- source_word: ἀναγγελεῖ
  english_pob_choice: he will tell
  chosen_spanish: nos anunciará
  alternatives_spanish:
  - nos dirá
  - nos declarará
  lexicon: BDAG
  rationale: El verbo puede implicar comunicar o dar a conocer; «anunciará» mantiene esa fuerza de revelación, aunque en español sea un poco más formal que «dirá».
- source_word: ἡμῖν
  english_pob_choice: us
  chosen_spanish: nos
  alternatives_spanish:
  - a nosotros
  lexicon: BDAG
  rationale: El dativo indirecto se expresa naturalmente con el clítico «nos» en español.
- source_word: ἅπαντα
  english_pob_choice: all things
  chosen_spanish: todo
  alternatives_spanish:
  - todas las cosas
  - todo lo demás
  lexicon: BDAG
  rationale: ἅπαντα tiene fuerza comprehensiva; «todo» es la forma española más natural y abarcadora. «Todas las cosas» resultaría más pesado y menos idiomático.
theological_decisions:
- issue: Relación entre Μεσσίας y χριστός en la aclaración parentética
  english_pob_reading: Retain 'Christ' in the parenthetical explanation while rendering Μεσσίας as 'Messiah' in the main clause.
  chosen_spanish_reading: 'Mantener «Cristo» en la glosa explicativa: «el que es llamado Cristo», mientras «Μεσσίας» se traduce como «Mesías».'
  alternative_spanish_readings:
  - «el que es llamado Mesías» para ambos términos
  - «el llamado Mesías» con nota sobre Cristo
  rationale: El griego presenta un título semítico seguido de su explicación griega. En español, si ambos términos se reducen a «Mesías», se pierde la función aclaratoria del texto. Por eso se conserva «Cristo» en la frase explicativa, sin alterar la traducción principal de Μεσσίας.
  doctrine_reference: 'DOCTRINE.md: Translate titles; preserve source-text distinctions when the author explicates a term for another language audience.'
translation_notes:
  revision_awareness: 'La versión inglesa pasó por una corrección menor que ajustó «everything» a «all things» para reflejar mejor ἅπαντα, y luego se restauró «Messiah» en el título principal conforme a la política terminológica. La redacción española sigue esa distinción: «Mesías» para Μεσσίας y una glosa separada con «Cristo» para χριστός, manteniendo también una expresión comprensiva de ἅπαντα mediante «todo».'
  spanish_consistency_notes:
  - Se mantiene «Mesías» como título principal, conforme al uso proyectado para Μεσσίας.
  - Se conserva la distinción bilingüe del original entre «Mesías» y «Cristo», sin fusionarlos en una sola equivalencia.
  - «Todo» reproduce de manera natural la amplitud de ἅπαντα en español, evitando una literalidad pesada.
  - El tono del diálogo es sobrio y público, adecuado para lectura eclesial sin arcaísmos innecesarios.
