translation:
  language: es
  text: Ustedes adoran lo que no conocen; nosotros adoramos lo que conocemos[a], porque la salvación procede de los judíos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el pueblo judío'; en otros lugares de Juan, 'judeanos' puede ajustarse mejor a ciertos contextos, pero aquí el contraste es con los samaritanos en materia de adoración e historia de la salvación.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσκυνεῖτε / προσκυνοῦμεν
  english_pob_choice: worship
  chosen_spanish: adoran / adoramos
  alternatives_spanish:
  - rinden adoración / rendimos adoración
  - se postran ante / nos postramos ante
  lexicon: BDAG
  rationale: En este contexto joánico el verbo expresa culto religioso, no solo postración física. 'Adorar' es el equivalente natural en español y conserva el contraste entre dos formas de culto.
- source_word: ὃ
  english_pob_choice: what
  chosen_spanish: lo que
  alternatives_spanish:
  - aquello que
  - el que
  lexicon: BDAG
  rationale: El relativo neutro se refiere de modo general al objeto del culto. En español, 'lo que' reproduce bien ese alcance impersonal sin añadir una referencia personal que el griego no exige.
- source_word: οἴδατε / οἴδαμεν
  english_pob_choice: know
  chosen_spanish: conocen / conocemos
  alternatives_spanish:
  - saben / sabemos
  - comprenden / comprendemos
  lexicon: BDAG
  rationale: Aquí el sentido es conocimiento del objeto de adoración. 'Conocer' mantiene la fuerza relacional y religiosa del contraste; 'saber' sería posible, pero menos natural en esta construcción.
- source_word: σωτηρία
  english_pob_choice: salvation
  chosen_spanish: salvación
  alternatives_spanish:
  - liberación
  lexicon: BDAG
  rationale: '''Salvación'' es la traducción estándar y adecuada en este contexto; expresa la obra salvífica de Dios sin reducirla a un rescate meramente temporal.'
- source_word: ἐκ
  english_pob_choice: from
  chosen_spanish: procede de
  alternatives_spanish:
  - viene de
  - es de origen en
  lexicon: BDAG
  rationale: '''Procede de'' conserva la idea de origen o fuente y suena natural en español. Mantiene la afirmación histórica de procedencia sin volverla interpretativamente más fuerte de lo que dice el griego.'
- source_word: τῶν Ἰουδαίων
  english_pob_choice: the Jews
  chosen_spanish: los judíos
  alternatives_spanish:
  - el pueblo judío
  - los judeanos
  lexicon: BDAG
  rationale: La forma más directa y transparente es 'los judíos'. En este dicho, el contraste con los samaritanos se refiere a la historia de la salvación y al pueblo judío como mediador histórico de esa salvación.
theological_decisions:
- issue: Sentido de 'la salvación procede de los judíos'
  english_pob_reading: A statement of salvation's historical source and covenantal mediation through the Jewish people, not an ethnic superiority claim.
  chosen_spanish_reading: Una afirmación del origen histórico de la salvación y de su mediación en la historia de Israel mediante el pueblo judío, no una superioridad étnica.
  alternative_spanish_readings:
  - Una referencia más estrecha al origen judío del Mesías
  - Una afirmación amplia sobre la prioridad de la revelación y el culto judíos
  rationale: 'La cláusula explica por qué el culto verdadero no se desprende de la historia de Samaria: la salvación entra en la historia por el pueblo judío. La traducción conserva esa relación sin añadir polémica antijudía ni una lectura supersesionista que el texto no exige.'
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego y la lectura auditada en inglés POB. No se detectan revisiones recientes que alteren el sentido; se mantiene la misma decisión de fondo sobre 'los judíos' y 'adorar'.
  spanish_consistency_notes:
  - Se usa 'adorar' de manera uniforme para προσκυνέω, en línea con el valor cultual del verbo en Juan.
  - Se conserva 'salvación' para σωτηρία y 'procede de' para ἐκ, evitando una paráfrasis más amplia.
  - Se mantiene 'los judíos' en el texto principal y se reserva la alternativa explicativa en la nota.
  - El pronombre neutro ὃ se vierte como 'lo que' para evitar una personalización indebida.
