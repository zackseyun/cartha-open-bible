translation:
  language: es
  text: aunque Jesús mismo no bautizaba[a], sino que sus discípulos sí—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Jesús mismo no bautizó, sino que sus discípulos sí». El verbo griego está en imperfecto, lo que puede sugerir una acción continua o habitual.'
