lexical_decisions:
- source_word: καίτοιγε
  english_pob_choice: although
  chosen_spanish: aunque
  alternatives_spanish:
  - aunque en verdad
  - si bien
  lexicon: BDAG
  rationale: La partícula introduce una concesión o matiz aclaratorio; «aunque» transmite de forma natural y fiel esa fuerza concesiva en español sin endurecer el giro.
- source_word: Ἰησοῦς
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - Jesús mismo
  lexicon: BDAG
  rationale: Nombre propio transliterado y asentado en español bíblico; el énfasis de αὐτός se expresa mejor con la construcción «Jesús mismo» o con la posición enfática del sujeto.
- source_word: αὐτὸς
  english_pob_choice: himself
  chosen_spanish: mismo
  alternatives_spanish:
  - en persona
  - él mismo
  lexicon: BDAG
  rationale: El pronombre enfático se refleja de manera idiomática con «mismo», manteniendo la insistencia en que fue Jesús personalmente quien no bautizaba.
- source_word: οὐκ ἐβάπτιζεν
  english_pob_choice: was not baptizing
  chosen_spanish: no bautizaba
  alternatives_spanish:
  - no estaba bautizando
  - no bautizaba continuamente
  lexicon: BDAG
  rationale: El imperfecto sugiere acción en curso o habitual; en español, el imperfecto simple «no bautizaba» comunica bien ese valor aspectual sin sonar forzado.
- source_word: ἀλλ’
  english_pob_choice: but
  chosen_spanish: sino
  alternatives_spanish:
  - pero
  - más bien
  lexicon: BDAG
  rationale: Tras una negación previa, «sino» expresa con precisión el contraste correctivo entre Jesús y sus discípulos.
- source_word: οἱ μαθηταὶ αὐτοῦ
  english_pob_choice: his disciples were
  chosen_spanish: sus discípulos
  alternatives_spanish:
  - sus discípulos lo hacían
  - sus discípulos bautizaban
  lexicon: BDAG
  rationale: El griego omite el verbo en la segunda cláusula; en español puede mantenerse la elipsis con claridad, dejando implícido el bautizar por el contexto inmediato.
theological_decisions:
- issue: Quién administraba los bautismos en el ministerio de Jesús
  english_pob_reading: Jesus himself did not personally administer baptisms; his disciples did.
  chosen_spanish_reading: Jesús mismo no administraba los bautismos; lo hacían sus discípulos.
  alternative_spanish_readings:
  - Jesús no bautizaba, pero sus discípulos sí.
  - Jesús mismo no bautizaba, sino sus discípulos.
  rationale: La traducción conserva la distinción narrativa sin resolverla con una formulación más interpretativa. Se mantiene la tensión del imperfecto y la atribución de la acción a los discípulos, conforme al texto griego y a la audibilidad del audit trail.
  doctrine_reference: Priorizar el primado del original y preservar la tensión textual; no introducir armonización doctrinal no exigida por el verso.
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés: concesiva con καίτοιγε, énfasis de αὐτός, imperfecto de ἐβάπτιζεν, y elipsis en la segunda cláusula. No se aplicaron revisiones posteriores al texto inglés de referencia.'
  spanish_consistency_notes:
  - Se usa «Jesús» para el nombre propio y «bautizar» para βαπτίζω, manteniendo la terminología bíblica estándar en español.
  - Se preserva el matiz aspectual del imperfecto con una forma verbal imperfectiva española.
  - La segunda cláusula conserva la elipsis griega mediante la omisión del verbo repetido, siguiendo la economía del original.
