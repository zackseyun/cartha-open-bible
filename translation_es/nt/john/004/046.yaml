translation:
  language: es
  text: Así que volvió de nuevo a Caná de Galilea, donde había hecho el agua vino[a]. Y había cierto funcionario real[b], cuyo hijo estaba enfermo en Capernaúm.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más interpretativa, «donde había convertido el agua en vino». El griego dice más literalmente: «donde había hecho el agua vino».'
    reason: lexical_alternative
  - marker: b
    text: O «oficial real» o «cortesano». El griego βασιλικός se refiere a alguien vinculado a una corte o al servicio real.
    reason: alternative_reading
lexical_decisions:
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - Entonces
  - Por tanto
  lexicon: BDAG
  rationale: Marca continuación narrativa e inferencia suave; «Así que» conserva la transición sin sonar rígido ni excesivamente formal en español.
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  - nuevamente
  lexicon: BDAG
  rationale: Expresa repetición de visita de manera natural y clara en español contemporáneo.
- source_word: Κανὰ τῆς Γαλιλαίας
  english_pob_choice: Cana of Galilee
  chosen_spanish: Caná de Galilea
  alternatives_spanish:
  - Caná en Galilea
  lexicon: BDAG
  rationale: La construcción con genitivo se refleja idiomáticamente con «de Galilea», manteniendo el topónimo estándar y transparente.
- source_word: ὅπου
  english_pob_choice: where
  chosen_spanish: donde
  alternatives_spanish:
  - en donde
  - el lugar donde
  lexicon: BDAG
  rationale: Relativo locativo natural en español; conecta con la señal anterior en Caná sin añadir interpretación innecesaria.
- source_word: ἐποίησεν τὸ ὕδωρ οἶνον
  english_pob_choice: he had made the water wine
  chosen_spanish: había hecho el agua vino
  alternatives_spanish:
  - había convertido el agua en vino
  - había vuelto el agua vino
  lexicon: BDAG
  rationale: Sigue de cerca la formulación literal griega «hecho el agua vino»; el pluscuamperfecto refleja que el acto es previo al momento narrado. La alternativa más interpretativa «convertido... en vino» se evita en el texto principal, pero queda como posibilidad semántica.
- source_word: βασιλικός
  english_pob_choice: royal official
  chosen_spanish: funcionario real
  alternatives_spanish:
  - oficial real
  - cortesano
  - noble
  lexicon: BDAG
  rationale: El término señala a alguien vinculado al servicio o corte de un rey. «Funcionario real» comunica esa pertenencia sin cargar indebidamente con la idea de nobleza hereditaria.
- source_word: τις
  english_pob_choice: a certain
  chosen_spanish: un cierto
  alternatives_spanish:
  - uno
  - un
  lexicon: BDAG
  rationale: Preserva el valor indefinido pero específico del personaje introducido; en español suena algo más natural que «a certain» calcado y mantiene la indeterminación del griego.
- source_word: υἱός
  english_pob_choice: son
  chosen_spanish: hijo
  alternatives_spanish:
  - niño
  - descendiente
  lexicon: BDAG
  rationale: El griego especifica el parentesco masculino con precisión; «hijo» es la equivalencia directa y necesaria.
- source_word: ἠσθένει
  english_pob_choice: was sick
  chosen_spanish: estaba enfermo
  alternatives_spanish:
  - estaba enferma
  - se hallaba enfermo
  - estaba débil
  lexicon: BDAG
  rationale: En este contexto el verbo indica enfermedad física. «Estaba enfermo» es la forma más natural y precisa en español.
- source_word: Καφαρναούμ
  english_pob_choice: Capernaum
  chosen_spanish: Capernaúm
  alternatives_spanish:
  - Capernaum
  lexicon: BDAG
  rationale: Se mantiene la transliteración habitual en español bíblico con acento gráfico para la pronunciación y lectura contemporáneas.
theological_decisions:
- issue: Referencia al milagro de Caná sin explicitar más de lo que el griego dice
  english_pob_reading: where he had made the water wine
  chosen_spanish_reading: donde había hecho el agua vino
  alternative_spanish_readings:
  - donde había convertido el agua en vino
  - donde transformó el agua en vino
  rationale: El texto griego, y la POB inglesa, conservan una formulación literalmente predicativa («hacer el agua vino»). La española principal mantiene esa tensión; las alternativas interpretativas se reconocen como posibles pero no reemplazan el texto base.
  doctrine_reference: Principio de primacía del texto fuente y de no neutralizar matices semánticos por simplificación.
- issue: βασιλικός y el alcance de la identificación social del hombre
  english_pob_reading: royal official
  chosen_spanish_reading: funcionario real
  alternative_spanish_readings:
  - oficial real
  - noble
  rationale: La designación señala afiliación con la esfera real, pero no fija rango exacto ni dignidad nobiliaria. «Funcionario real» evita sobreinterpretar la estructura política o social.
  doctrine_reference: Evitación de precisiones históricas no contenidas en el versículo; fidelidad al alcance lexical del griego.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego SBLGNT y el audit trail inglés de la POB, conservando la relación temporal implícita del pluscuamperfecto y la ambigüedad lexical de βασιλικός. Se decidió una expresión española natural sin desplazar el sentido literal documentado. No se registran revisiones previas en el paquete, y el acuerdo cruzado reportado es alto.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se mantiene «Mesías/Cristo» fuera del versículo porque no aparece en el texto.
  - «Capernaúm» conserva la acentuación española habitual para nombres bíblicos.
  - Las notas al pie se colocan solo donde el texto principal incluye los anclajes [a] y [b], conforme a la disciplina del proyecto.
