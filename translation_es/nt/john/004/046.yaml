base_translation:
  language: en
  yaml_path: translation/nt/john/004/046.yaml
  text: So he came again to Cana of Galilee[a], where he had made the water wine[b]. And there was a certain royal official whose son was sick in Capernaum.
  footnotes:
  - marker: a
    text: Or, more interpretively, 'where he turned the water into wine.' The Greek reads more literally, 'where he had made the water wine.'
    reason: lexical_alternative
  - marker: b
    text: Or 'nobleman' or 'king's officer.' The Greek βασιλικός denotes someone attached to a royal court or in royal service.
    reason: alternative_reading
