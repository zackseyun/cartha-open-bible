revisions:
- from: Así que volvió otra vez a Caná de Galilea[a], donde había hecho el agua vino[b]. Y había un cierto funcionario real, cuyo hijo estaba enfermo en Capernaúm.
  to: Así que volvió de nuevo a Caná de Galilea, donde había hecho el agua vino[a]. Y había cierto funcionario real[b], cuyo hijo estaba enfermo en Capernaúm.
  rationale: Se corrigen los anclajes de las notas para que correspondan a las frases que explican, se elimina la redundancia de «volvió otra vez» con «volvió de nuevo», y se mejora la naturalidad de τις con «cierto funcionario real» sin perder la especificidad del griego ni la decisión auditada en inglés.
