  to: 'El funcionario real le dijo: «Señor[a], baja antes de que muera mi niño».'
  rationale: Se corrige παιδίον para evitar la sobreespecificación de género introducida por «mi hijo», y se repara la nota de κύριε para que exprese una alternativa semántica real y quede anclada al vocativo correspondiente. Se conserva «funcionario real», «le dijo», «Señor» y «baja» por fidelidad y naturalidad.
