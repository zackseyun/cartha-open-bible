translation:
  language: es
  text: 'El funcionario real le dijo: «Señor[a], baja antes de que muera mi niño».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «señor». El griego usa κύριε, un tratamiento respetuoso que también puede significar «Señor».
    reason: alternative_reading
lexical_decisions:
- source_word: ὁ βασιλικός
  english_pob_choice: the royal official
  chosen_spanish: el funcionario real
  alternatives_spanish:
  - el oficial del rey
  - el oficial de la corte
  - el noble
  lexicon: BDAG
  rationale: βασιλικός funciona aquí como un sustantivo para una persona vinculada con el rey o su corte. «Funcionario real» comunica esa relación de manera clara en español y evita cargar el término con una noción de rango social más específica de la que el griego exige.
- source_word: λέγει πρὸς αὐτόν
  english_pob_choice: said to him
  chosen_spanish: le dijo
  alternatives_spanish:
  - dice a él
  - dijo a él
  lexicon: BDAG
  rationale: El presente histórico λέγει se vierte naturalmente en pasado narrativo en español. «Le dijo» expresa con claridad la introducción del discurso y mantiene el flujo idiomático.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Señor mío
  - Sir
  lexicon: BDAG
  rationale: En español, el equivalente natural y reverente de κύριε en este contexto es «Señor». Conserva la posibilidad de un sentido respetuoso y, en el marco joánico, también permite resonancias más altas sin forzar la interpretación.
- source_word: κατάβηθι
  english_pob_choice: come down
  chosen_spanish: baja
  alternatives_spanish:
  - ven abajo
  - desciende
  lexicon: BDAG
  rationale: El imperativo aoristo de καταβαίνω pide una acción de descenso. En español, «baja» es la forma más directa y natural; el contexto de movimiento desde Caná hacia Cafarnaúm ya comunica la dirección espacial.
- source_word: πρὶν ἀποθανεῖν
  english_pob_choice: before ... dies
  chosen_spanish: antes de que muera
  alternatives_spanish:
  - antes de morir
  - antes de que fallezca
  lexicon: BDAG
  rationale: πρίν con infinitivo indica anterioridad temporal. «Antes de que muera» reproduce bien la relación temporal del griego y permite explicitar el sujeto a partir del contexto.
- source_word: τὸ παιδίον μου
  english_pob_choice: my child
  chosen_spanish: mi hijo
  alternatives_spanish:
  - mi niño
  - mi hijo pequeño
  - mi criatura
  lexicon: BDAG
  rationale: Aunque παιδίον puede significar «niño/niña» o «hijo/hija» según contexto, en este relato el solicitante se refiere probablemente a su propio descendiente masculino, como sugiere el marco narrativo. «Mi hijo» suena natural en español y evita la posible ambigüedad de «mi niño».
theological_decisions:
- issue: Tratamiento de κύριος como forma de respeto dirigida a Jesús
  english_pob_reading: Lord, with an alternative note for Sir
  chosen_spanish_reading: Señor, con una posible lectura respetuosa de trato
  alternative_spanish_readings:
  - Señor mío
  - Sir
  rationale: La traducción principal conserva «Señor» para respetar el valor tradicional y la amplitud semántica de κύριε. En este contexto narrativo puede ser simplemente un trato respetuoso, pero el evangelio también permite una resonancia cristológica más plena; por eso no se reduce a una cortesía plana.
  doctrine_reference: 'DOCTRINE.md: contested terms; John’s layered address to Jesus'
- issue: Decisión de género para παιδίον en este contexto
  english_pob_reading: my child
  chosen_spanish_reading: mi hijo
  alternative_spanish_readings:
  - mi niño
  - mi criatura
  rationale: El griego usa παιδίον, un término amplio para un niño pequeño o hijo. Aunque el versículo no nombra el sexo, el contexto narrativo sugiere un hijo varón; por eso «mi hijo» es una inferencia prudente en español, sin convertirlo en una generalización doctrinal.
  doctrine_reference: Contextual narrative inference; lexical sense of παιδίον
translation_notes:
  revision_awareness: 'Se incorporó el audit trail inglés como guía, pero la redacción final se ajustó a una equivalencia óptima en español: se mantuvo la fuerza reverente de κύριε con «Señor», se preservó el descenso espacial con «baja», y se resolvió παιδίον según el contexto narrativo como «mi hijo». No se detectaron revisiones textuales adicionales en el paquete fuente.'
  spanish_consistency_notes:
  - Se usó «funcionario real» para βασιλικός siguiendo la conexión con la corte/regio sin añadir matices de nobleza no garantizados por el griego.
  - Se evitó «SEÑOR» en mayúsculas porque aquí κύριε es una forma de trato dentro del discurso directo; aun así, «Señor» mantiene la resonancia posible en Juan.
  - La puntuación de cita española se adaptó con comillas angulares no obligatoriamente, manteniendo claridad editorial y el marcador de nota en el término relevante.
