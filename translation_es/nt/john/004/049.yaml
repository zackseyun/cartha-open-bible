review_pass:
  verdict: revise
  source_alignment_summary: 'La base griega dice: «El oficial real le dice/dijo: “Κύριε, desciende antes de que muera mi παιδίον”». El borrador conserva bien ὁ βασιλικός como «funcionario real», λέγει πρὸς αὐτόν como «le dijo», κύριε como «Señor» y πρὶν ἀποθανεῖν como «antes de que muera». Sin embargo, se aparta del rastro auditado del POB en dos puntos: (1) la nota al pie está mal formulada, porque ofrece «O “Señor”» como alternativa a «Señor», cuando la alternativa documentada es «Sir» / «Señor» en sentido cortés; en español debe distinguirse mejor, por ejemplo «O “Señor” como tratamiento respetuoso» o mejor «O “Señor” en el sentido de “señor”/“caballero”», pero sin repetir idénticamente la lectura principal; (2) τὸ παιδίον μου fue auditado expresamente como «my child», no «my son», para no sobreespecificar el género. En español, «mi hijo» introduce una precisión no presente en el versículo.'
  spanish_quality_summary: 'El español es claro y natural, pero tiene dos problemas de calidad editorial: el marcador [a] está colocado de forma poco natural al inicio de la cita, cuando debería anclarse en «Señor[a]»; y la nota al pie actual no comunica una alternativa real. Además, «baja» suena entendible pero algo brusco para dirigirse a Jesús; «ven abajo» es torpe, mientras que «desciende» es digno pero menos coloquial. «Baja» puede mantenerse por naturalidad. Para παιδίον, «mi hijo» es fluido pero menos fiel; «mi niño» puede sonar demasiado tierno; «mi hijo pequeño» sobreinterpreta. La mejor reparación es «mi hijo[a]?» no, porque sigue marcando género. Más fiel y legible es «mi pequeño» o «mi niño», pero ambos añaden matiz afectivo. «Mi hijo/a» no sirve. La opción más fiel al audit trail es «mi hijo» no; debe cambiarse. «Mi niño» es la mejor solución española breve aunque algo interpretativa en edad. También cabe «mi criatura», pero suena menos natural. Dado παιδίον, «mi niño» preserva
    mejor la niñez que «mi hijo».'
  glossary_alignment: 'Alinea bien «Señor» para κύριε según la política del proyecto, con nota alternativa. «Funcionario real» concuerda con la decisión léxica auditada. No hay términos teológicos globales problemáticos. El principal desajuste de glosario es παιδίον: el audit trail privilegia no marcar género; por eso «mi hijo» no debe mantenerse. También debe corregirse la nota para κύριε para reflejar la alternativa documentada sin duplicar la forma principal.'
  issues:
  - severity: high
    issue: «mi hijo» sobreespecifica τὸ παιδίον μου
    rationale: El griego usa παιδίον, y el English POB documentó explícitamente «my child» para evitar fijar el género. «Mi hijo» introduce información no expresada en este versículo.
  - severity: medium
    issue: La nota al pie [a] no presenta una alternativa real
    rationale: Dice «O “Señor”» cuando la lectura principal ya es «Señor». La nota debe explicar el valor de trato respetuoso de κύριε, equivalente a «Sir» en inglés, de manera útil para el lector español.
  - severity: low
    issue: Ubicación poco natural del marcador [a]
    rationale: En español debe anclarse al término relevante, «Señor[a]», no al comienzo de la cita.
  revised_spanish_text: 'El funcionario real le dijo: «Señor[a], baja antes de que muera mi niño».

    '
