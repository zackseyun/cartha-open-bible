translation:
  language: es
  text: 'Jesús le dijo: «Ve; tu hijo vive». El hombre creyó[a] la palabra que Jesús le dijo, y siguió su camino.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «confió en la palabra que Jesús le dijo».
    reason: lexical_alternative
lexical_decisions:
- source_word: Πορεύου
  english_pob_choice: Go
  chosen_spanish: Ve
  alternatives_spanish:
  - Anda
  - Vete
  lexicon: BDAG
  rationale: El imperativo de πορεύομαι pide una orden breve y natural. «Ve» comunica el mandato sin añadir matices no presentes en el griego, y conserva el ritmo directo del diálogo.
- source_word: ὁ υἱός σου
  english_pob_choice: your son
  chosen_spanish: tu hijo
  alternatives_spanish:
  - tu muchacho
  - tu hijo varón
  lexicon: BDAG
  rationale: υἱός significa específicamente «hijo»; no conviene generalizarlo como «niño» o «hijo varón» sin necesidad. «Tu hijo» es fiel y claro en español.
- source_word: ζῇ
  english_pob_choice: lives
  chosen_spanish: vive
  alternatives_spanish:
  - está vivo
  - seguirá vivo
  lexicon: BDAG
  rationale: El presente de ζῇ se expresa de forma natural con «vive». En este contexto comunica que el hijo está con vida en ese momento, sin introducir una lectura futura.
- source_word: ἐπίστευσεν
  english_pob_choice: believed
  chosen_spanish: creyó
  alternatives_spanish:
  - confió
  - tuvo fe
  lexicon: BDAG
  rationale: πιστεύω aquí rige el dativo τῷ λόγῳ y expresa creer lo dicho. «Creyó» preserva el valor básico del verbo y deja abierta la tensión narrativa entre creer y confiar, como en el inglés POB.
- source_word: ὁ ἄνθρωπος
  english_pob_choice: The man
  chosen_spanish: el hombre
  alternatives_spanish:
  - el oficial
  - el hombre mismo
  lexicon: BDAG
  rationale: El griego dice literalmente «el hombre». Aunque el contexto mayor identifica al personaje como funcionario real, esta cláusula usa ἄνθρωπος, y la traducción debe conservar esa designación general.
- source_word: τῷ λόγῳ
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - lo que Jesús dijo
  lexicon: BDAG
  rationale: λόγος aquí se refiere a la declaración pronunciada por Jesús. «La palabra» es un equivalente natural y transparente en español, y la relativa siguiente aclara de cuál palabra se trata.
- source_word: ὃν εἶπεν αὐτῷ ὁ Ἰησοῦς
  english_pob_choice: that Jesus spoke to him
  chosen_spanish: que Jesús le dijo
  alternatives_spanish:
  - que Jesús le habló
  - la cual Jesús le había dicho
  lexicon: BDAG
  rationale: La cláusula relativa modifica «la palabra» y conviene verterla de manera idiomática. «Le dijo» mantiene la relación verbal con λόγος sin sonar forzado en español.
- source_word: ἐπορεύετο
  english_pob_choice: went on his way
  chosen_spanish: se iba
  alternatives_spanish:
  - iba
  - se fue
  lexicon: BDAG
  rationale: 'El imperfecto medio señala una acción en curso: el hombre iba de regreso tras creer. «Se iba» conserva ese matiz de continuidad mejor que un simple pretérito perfecto, y resulta natural en español.'
theological_decisions:
- issue: La respuesta de πιστεύω ante la palabra de Jesús
  english_pob_reading: believed
  chosen_spanish_reading: creyó
  alternative_spanish_readings:
  - confió
  - tuvo fe
  rationale: No es necesario resolver si la respuesta implica solo asentimiento intelectual o también confianza personal. «Creyó» mantiene abierta la tensión teológica del relato joánico, en línea con la decisión inglesa de no estrechar el sentido.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (πίστις → faith; alternatives faithfulness, trust), and ''Preserve theological tension rather than resolve it.'''
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el texto fuente proporcionado y con el control cruzado de la revisión más reciente: no se registran cambios ni variantes textuales relevantes en el audit trail inglés.'
  spanish_consistency_notes:
  - Se mantiene «Jesús» como sujeto explícito para claridad narrativa.
  - Se conserva «la palabra» en lugar de «el mensaje» para reflejar λόγος y su vínculo con la cita directa.
  - El imperfecto «se iba» reproduce la marcha en curso del griego sin sobrerinterpretar duración o intención.
  - No se introduce la identificación contextual de «oficial» porque el griego del versículo usa ὁ ἄνθρωπος.
