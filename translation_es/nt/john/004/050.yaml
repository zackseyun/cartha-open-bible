  to: 'Jesús le dijo: «Ve; tu hijo vive». El hombre creyó[a] la palabra que Jesús le dijo, y siguió su camino.'
  rationale: Se conserva todo el texto salvo la última cláusula. «Y siguió su camino» refleja mejor ἐπορεύετο y la decisión auditada «went on his way», evitando la ambigüedad poco idiomática de «y se iba».
