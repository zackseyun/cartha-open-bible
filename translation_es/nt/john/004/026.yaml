translation:
  language: es
  text: 'Jesús le dijo: «Yo soy[a], el que te habla».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Yo soy él, el que te habla». El griego dice simplemente: «Yo soy, el que te habla»; la identificación implícita se entiende por el contexto inmediato del Mesías en el versículo anterior.'
    reason: alternative_reading
lexical_decisions:
- source_word: λέγει
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - dice
  lexicon: BDAG
  rationale: El presente histórico griego se vierte de modo natural al pretérito narrativo en español, manteniendo fluidez sin perder el valor de relato.
- source_word: αὐτῇ
  english_pob_choice: to her
  chosen_spanish: le
  alternatives_spanish:
  - a ella
  lexicon: BDAG
  rationale: El dativo de destinatario se expresa con el clítico indirecto en español; es la opción más natural y fiel al valor relacional del griego.
- source_word: Ἐγώ εἰμι
  english_pob_choice: I am
  chosen_spanish: Yo soy
  alternatives_spanish:
  - Soy yo
  - Yo soy él
  lexicon: BDAG
  rationale: Se conserva la formulación explícita del griego sin añadir el pronombre/predicado interpretativo 'él' al texto principal. 'Yo soy' mantiene la tensión identitaria y la posible resonancia teológica, mientras el contexto inmediato suple la identificación mesiánica.
- source_word: ὁ λαλῶν σοι
  english_pob_choice: the one speaking to you
  chosen_spanish: el que habla contigo
  alternatives_spanish:
  - el que te habla
  - el que está hablando contigo
  lexicon: BDAG
  rationale: La construcción articular con participio se naturaliza en español como una relativa sustantivada. 'Habla' reproduce bien el valor de λαλέω y 'contigo' expresa el dativo de relación de forma idiomática.
theological_decisions:
- issue: Si explicitar 'él' o 'el Mesías' en el texto principal
  english_pob_reading: Retain the Greek's concise 'I am' rather than expanding to 'I am he' or 'I, the Messiah, am he.'
  chosen_spanish_reading: Conservar 'Yo soy' sin añadir 'él' ni 'el Mesías' en el cuerpo del texto.
  alternative_spanish_readings:
  - Yo soy él
  - Yo soy el Mesías
  rationale: El contexto previo ya identifica la expectativa mesiánica, pero el griego de este versículo no añade el predicado. Mantener la brevedad preserva la wording original y no resuelve artificialmente la tensión interpretativa.
  doctrine_reference: Principio de primacía del texto original; preservar la tensión textual donde el griego es deliberadamente conciso.
translation_notes:
  revision_awareness: 'El contexto auditado en inglés revisó la puntuación para dejar ''I am, the one speaking to you'' sin guion, reflejando mejor la construcción appositiva griega. En español se siguió esa misma decisión: ''Yo soy, el que habla contigo'', evitando introducir una pausa o énfasis no sustentado por el texto.'
  spanish_consistency_notes:
  - Se usó 'Jesús' para Ἰησοῦς y no 'Cristo', conforme al nombre propio del texto.
  - Se prefirió 'Yo soy' como calco controlado de Ἐγώ εἰμι, manteniendo la posible resonancia teológica sin explicarla dentro del versículo.
  - '''Contigo'' es la forma natural en español para el dativo σοι y evita una estructura más pesada como ''a ti''.'
