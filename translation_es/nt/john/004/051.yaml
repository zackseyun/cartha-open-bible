translation:
  language: es
  text: Y mientras él ya iba bajando, sus esclavos le salieron al encuentro, diciendo que su niño[a] estaba vivo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘su hijo’; el griego pais puede significar ‘niño’, ‘muchacho’ o, en algunos contextos, ‘siervo’.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤδη
  english_pob_choice: already
  chosen_spanish: ya
  alternatives_spanish:
  - ya mismo
  - ya para entonces
  lexicon: BDAG
  rationale: ἤδη marca anterioridad temporal y estado ya en curso; 'ya' es la equivalencia natural y concisa en español.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora
  - Pero
  lexicon: BDAG
  rationale: La partícula introduce la escena con avance narrativo suave; 'Y' conserva esa continuidad sin cargar contraste inexistente.
- source_word: καταβαίνοντος
  english_pob_choice: was already going down
  chosen_spanish: descendía
  alternatives_spanish:
  - iba bajando
  - estaba descendiendo
  lexicon: BDAG
  rationale: El participio presente en genitivo absoluto expresa acción en progreso contemporánea; 'descendía' comunica el movimiento de bajada de forma natural y fiel.
- source_word: δοῦλοι
  english_pob_choice: slaves
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  - criados
  lexicon: BDAG
  rationale: δοῦλοι designa dependencia servil real; 'esclavos' preserva la fuerza lexical que el POB inglés eligió con criterio doctrinal y social.
- source_word: ὑπήντησαν
  english_pob_choice: met
  chosen_spanish: salieron al encuentro
  alternatives_spanish:
  - lo encontraron
  - fueron a su encuentro
  lexicon: BDAG
  rationale: Aunque el verbo puede traducirse simplemente 'encontraron', el contexto sugiere el acto de ir a recibirlo; 'salieron al encuentro' conserva ese matiz narrativo.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijeron
  - informándole
  lexicon: BDAG
  rationale: El participio acompañante se vierte con 'diciendo' para mantener la relación verbal sin añadir expansión interpretativa.
- source_word: παῖς
  english_pob_choice: child
  chosen_spanish: niño
  alternatives_spanish:
  - hijo
  - muchacho
  - criado
  lexicon: BDAG
  rationale: παῖς es semánticamente amplio; aquí 'niño' preserva el sentido de un descendiente joven o dependiente sin forzar 'hijo' donde el griego no usa υἱός. Se mantiene la posibilidad alternativa en nota.
- source_word: ζῇ
  english_pob_choice: was alive
  chosen_spanish: vivía
  alternatives_spanish:
  - estaba vivo
  - seguía con vida
  lexicon: BDAG
  rationale: El presente griego ζῇ puede expresarse en español narrativo como 'vivía' para reflejar el estado de estar con vida en el reporte indirecto, sin añadir 'se recuperó'.
theological_decisions:
- issue: Alcance de παῖς en el relato de sanidad
  english_pob_reading: his child
  chosen_spanish_reading: su niño
  alternative_spanish_readings:
  - su hijo
  - su esclavo
  rationale: El término παῖς admite varias lecturas; el contexto inmediato no obliga a fijarlo como 'hijo', aunque esa sea una alternativa común. 'Niño' conserva la amplitud semántica y evita cerrar prematuramente la referencia.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Relación entre δοῦλοι y el estatus social de la casa
  english_pob_reading: his slaves
  chosen_spanish_reading: sus esclavos
  alternative_spanish_readings:
  - sus siervos
  - sus criados
  rationale: La elección mantiene la realidad social de subordinación expresada por δοῦλοι, sin suavizarla por eufemismo.
  doctrine_reference: Lexical policy on δοῦλος
translation_notes:
  revision_awareness: 'Coincide con el último pase revisado: no hubo cambios aplicados en el texto base inglés y la solución española sigue de cerca el mismo perfil léxico, especialmente en δοῦλοι y παῖς.'
  spanish_consistency_notes:
  - Se mantuvo 'esclavos' para δοῦλοι, en línea con la decisión del POB en inglés.
  - Se evitó 'Cristo' o terminología teológica no presente en el versículo.
  - La nota cubre la amplitud semántica de παῖς sin introducir una glosa innecesaria en el texto principal.
  - '''Ya'' y el imperfecto ''descendía'' reflejan bien la acción en curso del genitivo absoluto.'
