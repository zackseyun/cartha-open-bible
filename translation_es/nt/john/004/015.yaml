review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: la mujer habla a Jesús, pide «esta agua», y expresa el propósito de no tener sed ni venir allí a sacar. Sin embargo, hay dos desajustes relevantes con el expediente auditado: (1) «dame de esta agua» introduce un partitivo («de») que no está en τοῦτο τὸ ὕδωρ y suena menos directo que el objeto simple del griego; (2) la nota al pie no preserva adecuadamente la alternativa inglesa «Sir», porque repite «Señor» y explica la cortesía, pero no ofrece una alternativa española distinta en el texto de la nota.'
  spanish_quality_summary: 'La redacción es mayormente natural y clara, pero «dame de esta agua» es menos precisa y menos elegante aquí que «dame esta agua». Además, el anclaje de la nota está mal ubicado: aparece al final de la oración cuando la nota corresponde al vocativo «Señor». «venir aquí a sacar» funciona, aunque «venir aquí a sacar agua» sería más explícito; no obstante, dado que el inglés auditado eliminó «water» para ceñirse más al griego, es mejor mantener «a sacar» en el texto principal.'
  glossary_alignment: 'El borrador sigue bien la terminología del proyecto en «Señor» para κύριε y mantiene la tensión teológica documentada. No hay términos doctrinales mayores fuera de eso. La excepción necesaria es en la nota: para reflejar la alternativa auditada, debe decir «O “Señor”, o “señor” como tratamiento cortés equivalente a “sir”» o formulación similar, no «Señor» repetido como si no hubiera alternativa real.'
  issues:
  - severity: medium
    issue: «dame de esta agua» añade un matiz partitivo no presente en el griego
    rationale: τοῦτο τὸ ὕδωρ es objeto directo simple, «esta agua». En español, «dame esta agua» es natural y más fiel. «Dame de esta agua» puede usarse, pero sugiere ‘dame un poco de’, que no está marcado en la fuente.
  - severity: medium
    issue: La nota al pie no preserva correctamente la alternativa de κύριε
    rationale: El expediente inglés conserva la alternativa «Sir». La nota española actual repite «Señor» y solo comenta su uso cortés, sin ofrecer de manera clara la alternativa española contextual «señor».
  - severity: low
    issue: El marcador de nota está al final de la oración y no junto a «Señor»
    rationale: La nota corresponde específicamente al vocativo κύριε; por claridad editorial, el marcador debe anclarse al término relevante.
  revised_spanish_text: 'La mujer le dijo: «Señor[a], dame esta agua, para que no tenga sed ni venga aquí a sacar».'
  revised_footnotes:
  - marker: a
    text: O «señor, dame esta agua …»; el vocativo griego κύριε también puede funcionar aquí como un tratamiento cortés.
    reason: alternative_reading
  revision_rationale: Se corrige «dame de esta agua» a «dame esta agua» para ajustarse mejor al objeto directo griego y al inglés auditado. Se reescribe la nota para preservar de forma real la alternativa contextual de cortesía para κύριε y se mueve el marcador al término anotado.
