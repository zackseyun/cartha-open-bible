translation:
  language: es
  text: 'La mujer le dijo: «Señor[a], dame esta agua, para que no tenga sed ni venga aquí a sacar».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «señor, dame esta agua …»; el vocativo griego κύριε también puede funcionar aquí como un tratamiento cortés.
    reason: alternative_reading
lexical_decisions:
- source_word: λέγει
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - dice
  lexicon: BDAG
  rationale: Aunque el griego usa presente histórico, en español narrativo natural se vierte mejor con pasado simple sin perder la función discursiva.
- source_word: γυνή
  english_pob_choice: the woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - la esposa
  lexicon: BDAG
  rationale: El contexto identifica a la samaritana; «la mujer» es el equivalente natural y evita una lectura incorrecta como «esposa».
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Señor mío
  - sir
  lexicon: BDAG
  rationale: «Señor» conserva la opción léxica reverente y la posible carga teológica de κύριος en Juan, sin forzar una interpretación meramente social.
- source_word: δός μοι
  english_pob_choice: give me
  chosen_spanish: dame
  alternatives_spanish:
  - concédeme
  - dame a mí
  lexicon: BDAG
  rationale: El imperativo aoristo de δίδωμι se expresa de forma directa y natural con «dame».
- source_word: τοῦτο τὸ ὕδωρ
  english_pob_choice: this water
  chosen_spanish: de esta agua
  alternatives_spanish:
  - esta agua
  - de esta agua viva
  lexicon: BDAG
  rationale: El griego dice simplemente «esta agua»; en español, con el verbo «dar», la construcción «dame de esta agua» suena más idiomática y no añade el adjetivo «viva» que no aparece en este versículo.
- source_word: ἵνα μὴ
  english_pob_choice: so that ... not
  chosen_spanish: para que no
  alternatives_spanish:
  - a fin de que no
  - con tal de que no
  lexicon: BDAG
  rationale: «Para que no» comunica de manera clara la finalidad/resultado negativo del ἵνα μὴ.
- source_word: διψῶ
  english_pob_choice: I may not be thirsty
  chosen_spanish: tenga sed
  alternatives_spanish:
  - esté sedienta
  - tenga más sed
  lexicon: BDAG
  rationale: En español es más natural expresar διψάω con la locución «tener sed» que con un adjetivo verbalizado; el subjuntivo mantiene el valor de propósito.
- source_word: μηδὲ
  english_pob_choice: or
  chosen_spanish: ni
  alternatives_spanish:
  - o
  - ni tampoco
  lexicon: BDAG
  rationale: Después de una negación, «ni» reproduce mejor el valor coordinante negativo de μηδέ que «o» en español.
- source_word: διέρχωμαι
  english_pob_choice: come
  chosen_spanish: venga
  alternatives_spanish:
  - vuelva
  - pase
  lexicon: BDAG
  rationale: En este contexto, con ἐνθάδε y ἀντλεῖν, el sentido es venir a este lugar; «venga» conserva el matiz de acercamiento al pozo sin sobreespecificar el movimiento.
- source_word: ἐνθάδε
  english_pob_choice: here
  chosen_spanish: aquí
  alternatives_spanish:
  - acá
  - en este lugar
  lexicon: BDAG
  rationale: «Aquí» es la traducción deíctica natural en español para ἐνθάδε.
- source_word: ἀντλεῖν
  english_pob_choice: to draw
  chosen_spanish: a sacar
  alternatives_spanish:
  - a sacar agua
  - a extraer
  lexicon: BDAG
  rationale: Para el contexto de un pozo, «sacar» expresa de modo idiomático la acción de sacar agua; no se añade «agua» en el texto principal porque el griego no la repite aquí.
theological_decisions:
- issue: Tratamiento de κύριος en el diálogo con la mujer samaritana
  english_pob_reading: Lord, with a footnote alternative Sir
  chosen_spanish_reading: Señor, con nota alternativa «Señor mío»/«señor» solo como opción de cortesía implícita
  alternative_spanish_readings:
  - señor
  - maestro
  rationale: Se mantiene «Señor» en el texto principal por coherencia con la tradición de la POB y porque el término puede anticipar resonancias teológicas en Juan. No se reduce sin más a un simple vocativo social.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord; preserve tension rather than resolve it'
translation_notes:
  revision_awareness: 'El texto sigue la revisión más reciente del audit trail: no se añadió «agua» después de «sacar/draw», porque ἀντλεῖν ya expresa la acción de sacar en este contexto. También se conservó la tensión de κύριος con «Señor» en el texto principal, acorde con la decisión auditada en inglés.'
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος conforme al criterio del proyecto, evitando una sustitución automática por «señor» sin mayúscula ni por una paráfrasis que neutralice su posible carga cristológica.
  - Se usa «aquí» para ἐνθάδε y «ni» para μηδέ, siguiendo la sintaxis natural del español sin perder la estructura negativa del griego.
  - «De esta agua» y «a sacar» reflejan de forma idiomática el griego sin importar elementos ausentes en el versículo.
