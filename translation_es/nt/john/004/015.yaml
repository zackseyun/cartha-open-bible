revisions:
- from: 'La mujer le dijo: «Señor, dame de esta agua, para que no tenga sed ni venga aquí a sacar».[a]'
  to: 'La mujer le dijo: «Señor[a], dame esta agua, para que no tenga sed ni venga aquí a sacar».'
  rationale: Se corrige «dame de esta agua» a «dame esta agua» para ajustarse mejor al objeto directo griego y al inglés auditado. Se reescribe la nota para preservar de forma real la alternativa contextual de cortesía para κύριε y se mueve el marcador al término anotado.
