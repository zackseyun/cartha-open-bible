translation:
  language: es
  text: Así que, cuando los samaritanos llegaron a él, le pidieron que se quedara con ellos, y se quedó allí dos días.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὡς οὖν
  english_pob_choice: So when
  chosen_spanish: Así que, cuando
  alternatives_spanish:
  - Entonces, cuando
  - Pues cuando
  lexicon: BDAG
  rationale: La combinación expresa conexión inferencial/secuencial y tiempo. «Así que, cuando» comunica ambas ideas en español natural sin volverlo rígido.
- source_word: ἦλθον πρὸς αὐτὸν
  english_pob_choice: came to him
  chosen_spanish: llegaron a él
  alternatives_spanish:
  - fueron a él
  - vinieron a él
  lexicon: BDAG
  rationale: «Llegaron a él» conserva el movimiento hacia una persona y evita una repetición demasiado literal de «ir a» en español, manteniendo la direccionalidad de πρός.
- source_word: οἱ Σαμαρῖται
  english_pob_choice: the Samaritans
  chosen_spanish: los samaritanos
  alternatives_spanish:
  - el pueblo samaritano
  lexicon: BDAG
  rationale: Es una designación étnica/grupal directa; el artículo se conserva de manera idiomática en español.
- source_word: ἠρώτων
  english_pob_choice: asked
  chosen_spanish: le pidieron
  alternatives_spanish:
  - le rogaban
  - le insistían en pedir
  lexicon: BDAG
  rationale: Aunque el imperfecto puede sugerir petición repetida o continuada, el español de publicación fluye mejor con «le pidieron» aquí. «Rogaban» o «insistían» serían más interpretativos y no necesarios para el sentido básico del contexto.
- source_word: μεῖναι παρ’ αὐτοῖς
  english_pob_choice: to stay with them
  chosen_spanish: que se quedara con ellos
  alternatives_spanish:
  - que permaneciera con ellos
  - que se alojara con ellos
  lexicon: BDAG
  rationale: «Quedarse con ellos» reproduce bien μένω en este contexto. «Se alojara» sería más específico de hospedaje y menos directo.
- source_word: καὶ ἔμεινεν ἐκεῖ
  english_pob_choice: and he stayed there
  chosen_spanish: y se quedó allí
  alternatives_spanish:
  - y permaneció allí
  lexicon: BDAG
  rationale: Se mantiene la raíz semántica de μένω con un español natural. «Allí» representa ἐκεῖ con claridad.
- source_word: δύο ἡμέρας
  english_pob_choice: two days
  chosen_spanish: dos días
  lexicon: BDAG
  rationale: Traducción directa y exacta de la duración.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa que optó por «asked» en lugar de «were asking» por naturalidad contextual; en español se reflejó esa decisión con una petición simple y natural, sin marcar una repetición explícita que el contexto no exige en la superficie.
  spanish_consistency_notes:
  - Se mantuvo el sujeto explícito «los samaritanos» para claridad narrativa.
  - Se conservó una correspondencia consistente de μένω con «quedarse» en ambas partes del versículo.
  - No se añadieron notas de pie porque no fue necesario preservar una alternativa textual o léxica de forma anclada en el versículo.
