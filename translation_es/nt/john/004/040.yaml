  source_alignment_summary: 'El borrador español refleja fielmente el griego: la secuencia temporal/consecutiva de ὡς οὖν, el movimiento hacia Jesús en ἦλθον πρὸς αὐτόν, la petición de permanecer con ellos, y el resultado de que se quedó allí dos días. No omite ni añade contenido relevante. La simplificación del imperfecto ἠρώτων a «le pidieron» concuerda con la revisión aprobada en el rastro inglés.'
