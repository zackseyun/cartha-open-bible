translation:
  language: es
  text: Y tenía que pasar por Samaria[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «era necesario que pasara por Samaria». El griego expresa necesidad sin especificar su base exacta.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔδει
  english_pob_choice: had to
  chosen_spanish: tenía que
  alternatives_spanish:
  - era necesario
  - debía
  - debía de
  lexicon: BDAG
  rationale: El imperfecto de δέω expresa necesidad en el relato pasado. «Tenía que» comunica esa necesidad de manera natural en español moderno y conserva la fuerza de obligación o necesidad sin volverla excesivamente formal.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y
  - Pero
  lexicon: BDAG
  rationale: Aquí δέ funciona como avance narrativo leve, no como contraste fuerte. «Ahora» mantiene la transición discursiva en un español fluido.
- source_word: αὐτὸν
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - lo
  - a él
  lexicon: BDAG
  rationale: 'Aunque el griego usa acusativo por la construcción de infinitivo, en español la cláusula se vuelve natural con sujeto explícito: «él tenía que pasar».'
- source_word: διέρχεσθαι
  english_pob_choice: pass through
  chosen_spanish: pasar por
  alternatives_spanish:
  - atravesar
  - ir por
  - pasar a través de
  lexicon: BDAG
  rationale: διέρχομαι con διά expresa tránsito por un lugar. «Pasar por» es idiomático en español y conserva el sentido geográfico sin sonar técnico o forzado.
- source_word: διὰ τῆς Σαμαρείας
  english_pob_choice: through Samaria
  chosen_spanish: por Samaria
  alternatives_spanish:
  - a través de Samaria
  - por la región de Samaria
  - vía Samaria
  lexicon: BDAG
  rationale: La preposición διά con genitivo señala movimiento a través de un lugar. En español, «por Samaria» comunica bien el recorrido sin añadir explicaciones que el verso no da. La ausencia de «la región de» evita sobreespecificar más allá del griego.
theological_decisions:
- issue: Fuerza de necesidad en ἔδει
  english_pob_reading: Expressed as real necessity ('had to') without specifying whether the necessity was merely geographic, socially unexpected, or divinely purposed.
  chosen_spanish_reading: Se expresa como necesidad real («tenía que») sin precisar si la razón era solo geográfica, también social, o parte del propósito divino.
  alternative_spanish_readings:
  - era necesario que pasara
  - debía pasar por Samaria
  - tuvo que pasar por Samaria
  rationale: El griego afirma necesidad, pero no explica su base en este versículo. La traducción debe conservar esa tensión y no resolver interpretativamente si la necesidad es logística o teológica.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El contexto de auditoría en inglés indica alta concordancia y sin revisiones aplicadas en la última pasada; por eso se mantiene una solución directa, con una nota que preserva la alternativa legítima de la fuerza de necesidad.
  spanish_consistency_notes:
  - Se mantiene «Samaria» sin artículo para seguir el uso geográfico natural en español y el valor breve del griego.
  - «Tenía que» conserva la necesidad pasada sin introducir una interpretación doctrinal no explicitada por el texto.
  - La nota al pie preserva la alternativa «era necesario» para reflejar la tensión léxica documentada en el audit trail.
