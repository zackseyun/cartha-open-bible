translation:
  language: es
  text: El que siega recibe salario[a] y recoge fruto para la vida eterna[b], para que el que siembra y el que siega se regocijen juntos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «recompensa» en lugar de «salario». El término griego puede denotar pago ganado o retribución.
    reason: lexical_alternative
  - marker: b
    text: O «hacia la vida eterna». La frase puede expresar meta o resultado.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ θερίζων
  english_pob_choice: the one who reaps
  chosen_spanish: el que siega
  alternatives_spanish:
  - el que cosecha
  - el segador
  lexicon: BDAG
  rationale: El participio articular sustantivado se mantiene con una estructura natural en español. «El que siega» conserva la acción verbal y la relación con el campo metafórico; «segador» sería más nominal y menos transparente en este contexto.
- source_word: μισθὸν
  english_pob_choice: wages
  chosen_spanish: salario
  alternatives_spanish:
  - recompensa
  - paga
  lexicon: BDAG
  rationale: En el campo semántico de μισθός caben salario/paga o recompensa. Aquí, por la imagen laboral de la siega, «salario» conserva mejor el sentido concreto de remuneración ganada, sin perder la posible resonancia de recompensa.
- source_word: λαμβάνει
  english_pob_choice: is receiving
  chosen_spanish: recibe
  alternatives_spanish:
  - está recibiendo
  lexicon: BDAG
  rationale: El presente indicativo expresa una acción actual o general. En español, «recibe» resulta más fluido y sigue transmitiendo la realidad presente del dicho sin forzar una perífrasis.
- source_word: συνάγει
  english_pob_choice: gathering
  chosen_spanish: recoge
  alternatives_spanish:
  - reúne
  - junta
  lexicon: BDAG
  rationale: El verbo coordina con λαμβάνει y pertenece a la misma escena agrícola. «Recoge» es idiomático en español y comunica bien la acción de juntar la cosecha/fruto.
- source_word: καρπὸν
  english_pob_choice: fruit
  chosen_spanish: fruto
  alternatives_spanish:
  - producto
  - cosecha
  lexicon: BDAG
  rationale: «Fruto» preserva la metáfora bíblica y no la reduce a la cosecha material. Es la equivalencia más directa y estable en español para καρπός en este contexto.
- source_word: εἰς ζωὴν αἰώνιον
  english_pob_choice: for eternal life
  chosen_spanish: para vida eterna
  alternatives_spanish:
  - hacia vida eterna
  - para la vida eterna
  lexicon: BDAG
  rationale: εἰς expresa meta o resultado. «Para vida eterna» es natural en español y mantiene la orientación del fruto hacia ese fin; «hacia» sería posible, pero menos idiomático.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: La cláusula con ἵνα expresa propósito, con posible matiz de resultado. «Para que» conserva esa relación causal-final de forma clara y natural.
- source_word: ὁ σπείρων
  english_pob_choice: the one who sows
  chosen_spanish: el que siembra
  alternatives_spanish:
  - el sembrador
  - quien siembra
  lexicon: BDAG
  rationale: Se mantiene el paralelismo con «el que siega» y el valor verbal del participio. «El que siembra» es claro y conserva la acción en desarrollo.
- source_word: ὁμοῦ
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - al mismo tiempo
  - en conjunto
  lexicon: BDAG
  rationale: «Juntos» expresa la alegría compartida de manera concisa y natural. «Al mismo tiempo» podría sugerir simultaneidad temporal más que participación común en la alegría.
- source_word: χαίρῃ
  english_pob_choice: may rejoice
  chosen_spanish: se regocijen
  alternatives_spanish:
  - se alegren
  - gocen
  lexicon: BDAG
  rationale: Con ἵνα + subjuntivo, el español pide una forma final. «Se regocijen» reproduce con fuerza el sentido festivo de χαίρω y mantiene un registro bíblico digno sin arcaizar en exceso.
theological_decisions:
- issue: Relación entre μισθός y la imagen de recompensa divina
  english_pob_reading: wages, with an alternative note allowing 'reward'
  chosen_spanish_reading: salario, con una nota alternativa que permite 'recompensa'
  alternative_spanish_readings:
  - recompensa
  - paga
  rationale: El griego permite tanto la idea concreta de salario/paga como la de recompensa. En español, «salario» preserva mejor la metáfora laboral de la siega; la nota alternativa mantiene visible la tensión léxica sin imponer solo una lectura teológica.
  doctrine_reference: BDAG; lexical_alternative
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que eliminó «Already,» por no ser necesario y por sonar forzado. Por eso el español no añade ningún equivalente discursivo como «ya» o «ahora» al inicio, y sigue de cerca el aspecto presente del verbo sin sobreexplicarlo.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo entre «el que siega» y «el que siembra» para reflejar los participios sustantivados griegos.
  - Se prefirió «fruto» frente a «cosecha» para no colapsar la metáfora entre la acción de segar y lo recogido.
  - «Vida eterna» se dejó sin artículo para reflejar la orientación de εἰς ζωὴν αἰώνιον, conforme al audit trail inglés.
  - No se introdujo vocabulario eclesiástico tradicional no atestiguado por la fuente; se conservó un registro bíblico claro y moderno.
