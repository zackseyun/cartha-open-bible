translation:
  language: es
  text: ¿Acaso eres tú mayor que nuestro padre Jacob[a], que nos dio el pozo, y él mismo bebió de él, y sus hijos y su ganado?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más explícitamente: «¿Acaso no eres tú mayor que nuestro padre Jacob, verdad?» La pregunta griega con μή espera una respuesta negativa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ σὺ
  english_pob_choice: Are you
  chosen_spanish: ¿Acaso eres tú
  alternatives_spanish:
  - ¿No eres tú
  - ¿Eres tú acaso
  lexicon: BDAG
  rationale: μή en una pregunta espera una respuesta negativa. En español, una pregunta retórica con «¿Acaso…?» comunica bien esa expectativa sin convertirla en una negación plana. Mantiene además el énfasis de σὺ con el pronombre explícito «tú».
- source_word: μείζων
  english_pob_choice: greater than
  chosen_spanish: mayor que
  alternatives_spanish:
  - más grande que
  - superior a
  lexicon: BDAG
  rationale: Aquí el comparativo expresa rango o grandeza, no tamaño físico. «Mayor que» es natural en español y conserva el sentido de estatura, honor o importancia.
- source_word: τοῦ πατρὸς ἡμῶν Ἰακώβ
  english_pob_choice: our father Jacob
  chosen_spanish: nuestro padre Jacob
  alternatives_spanish:
  - Jacob nuestro padre
  - nuestro padre, Jacob
  lexicon: BDAG
  rationale: La construcción posesiva se conserva de forma natural en español. «Padre» mantiene el tono honorífico y familiar del apelativo samaritano hacia Jacob.
- source_word: ἔδωκεν ἡμῖν
  english_pob_choice: gave us
  chosen_spanish: nos dio
  alternatives_spanish:
  - nos ha dado
  - dio para nosotros
  lexicon: BDAG
  rationale: El aoristo narrativo se vierte con pasado simple. «Nos dio» es directo y fiel al acto histórico presentado.
- source_word: τὸ φρέαρ
  english_pob_choice: the well
  chosen_spanish: el pozo
  alternatives_spanish:
  - el aljibe
  - la cisterna
  lexicon: BDAG
  rationale: En este contexto, φρέαρ designa el pozo asociado con Jacob. «Pozo» es el término español más claro y estándar; «cisterna» o «aljibe» estrecharían o desplazarían el referente.
- source_word: καὶ αὐτὸς ἐξ αὐτοῦ ἔπιεν
  english_pob_choice: and drank from it himself
  chosen_spanish: y él mismo bebió de él
  alternatives_spanish:
  - y bebió de él él mismo
  - y aun él bebió de él
  lexicon: BDAG
  rationale: Se conserva la fuerza enfática de αὐτός con «él mismo». «Bebió de él» reproduce la referencia al pozo de manera natural en español.
- source_word: οἱ υἱοὶ αὐτοῦ
  english_pob_choice: his sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  - sus hijos
  lexicon: BDAG
  rationale: Aunque υἱοί es literalmente «hijos/varones», en español «sus hijos» puede funcionar genéricamente e incluye la idea filial. Dado el paralelismo con el grupo familiar y el uso idiomático del español, se adopta la forma más natural sin perder el referente.
- source_word: τὰ θρέμματα αὐτοῦ
  english_pob_choice: his livestock
  chosen_spanish: su ganado
  alternatives_spanish:
  - sus reses
  - sus animales domésticos
  lexicon: BDAG
  rationale: θρέμματα se refiere a animales criados o mantenidos, es decir, ganado/livestock. «Su ganado» es una equivalencia clara y amplia en español; evita restringirlo a una sola especie.
theological_decisions:
- issue: Fuerza interrogativa de μή con expectativa de respuesta negativa
  english_pob_reading: A rhetorical question expecting the answer 'no'
  chosen_spanish_reading: Una pregunta retórica que espera la respuesta «no»
  alternative_spanish_readings:
  - 'Una negación explícita: «No eres tú mayor que nuestro padre Jacob, ¿verdad?»'
  - «¿Acaso eres tú…?» con fuerza retórica
  rationale: La forma interrogativa se conserva para no aplanar el matiz pragmático del griego. En español, «¿Acaso…?» transmite la misma impugnación implícita y evita resolver demasiado pronto la tensión de la escena.
  doctrine_reference: Translation philosophy §3, preserve tension rather than resolve it; optimal equivalence
translation_notes:
  revision_awareness: Se mantiene el sentido y la tensión pragmática del griego según el audit trail inglés, con una formulación española natural. No hay revisiones aplicadas en el paquete fuente; esta redacción sigue el estado más reciente aprobado.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma general del proyecto solo cuando aparece el nombre divino; este versículo no lo contiene.
  - Se prefirió «pozo» para φρέαρ por su correspondencia directa y su uso establecido en el contexto de Jacob.
  - Se conservó el énfasis de αὐτός con «él mismo» para reflejar la insistencia del original.
  - Aunque υἱοί es literalmente masculino plural, en español «sus hijos» es el equivalente más natural y no introduce una pérdida de sentido relevante en este contexto.
