translation:
  language: es
  text: Así que llegó a una ciudad[a] de Samaria llamada Sicar, cerca del terreno[b] que Jacob había dado a José su hijo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pueblo». El griego πόλις puede referirse a una ciudad o a un pueblo, según el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «campo». El griego χωρίον puede denotar un campo, una propiedad o una porción de tierra.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔρχεται
  english_pob_choice: he came
  chosen_spanish: llegó
  alternatives_spanish:
  - venía
  - vino
  lexicon: BDAG
  rationale: El presente histórico griego se vierte naturalmente al pasado en español narrativo. 'Llegó' mantiene el avance de la acción y suena más fluido que un presente narrativo forzado.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - por tanto
  - entonces
  lexicon: BDAG
  rationale: Conserva la conexión narrativa/inferencial sin sonar excesivamente formal. 'Así que' reproduce bien la transición del contexto previo.
- source_word: πόλιν
  english_pob_choice: town
  chosen_spanish: ciudad
  alternatives_spanish:
  - pueblo
  - villa
  lexicon: BDAG
  rationale: πόλις puede referirse a 'ciudad' o 'town' según el contexto. En español, 'ciudad de Samaria' preserva la ambigüedad lexical documentada y evita reducir indebidamente el término a una localidad menor.
- source_word: τῆς Σαμαρείας
  english_pob_choice: of Samaria
  chosen_spanish: de Samaria
  alternatives_spanish:
  - en Samaria
  lexicon: BDAG
  rationale: La construcción genitiva se refleja de manera directa con 'de Samaria', vinculando la localidad a la región sin añadir una preposición interpretativa.
- source_word: λεγομένην Συχὰρ
  english_pob_choice: called Sychar
  chosen_spanish: llamada Sicar
  alternatives_spanish:
  - nombrada Sicar
  lexicon: BDAG
  rationale: '''Llamada'' es el equivalente idiomático normal del participio pasivo de ''decir/llamar'' en este tipo de identificación nominal. Se conserva el nombre propio en forma española Sicar.'
- source_word: πλησίον
  english_pob_choice: near
  chosen_spanish: cerca de
  alternatives_spanish:
  - junto a
  lexicon: BDAG
  rationale: '''Cerca de'' es la forma natural en español para expresar proximidad espacial y mantiene la concisión del original.'
- source_word: χωρίου
  english_pob_choice: piece of land
  chosen_spanish: terreno
  alternatives_spanish:
  - campo
  - propiedad
  - parcela
  lexicon: BDAG
  rationale: χωρίον puede denotar campo, propiedad o terreno. 'Terreno' conserva la amplitud semántica sin limitarlo a tierra cultivada ni a una noción jurídica demasiado específica.
- source_word: ὃ ἔδωκεν Ἰακὼβ
  english_pob_choice: that Jacob had given
  chosen_spanish: que Jacob había dado
  alternatives_spanish:
  - que Jacob dio
  lexicon: BDAG
  rationale: El pluscuamperfecto español refleja la relación de anterioridad respecto del evento narrado principal, como en la decisión inglesa auditada.
- source_word: τῷ Ἰωσὴφ τῷ υἱῷ αὐτοῦ
  english_pob_choice: to Joseph his son
  chosen_spanish: a José, su hijo
  alternatives_spanish:
  - a José, el hijo de él
  - a su hijo José
  lexicon: BDAG
  rationale: La dativa de destinatario se expresa con 'a José' y la aposición con 'su hijo'. La coma ayuda a preservar la identificación appositiva del griego sin sonar rígida.
translation_notes:
  revision_awareness: 'Se siguió de cerca el auditorio inglés sin depender de él mecánicamente: se reabrió la decisión de πόλις para el español, donde ''ciudad'' preserva mejor la posibilidad semántica señalada por el audit trail; también se mantuvo la anterioridad verbal con pluscuamperfecto y se respetó la identificación nominal con apposición.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino según la convención del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se traduce Ἰησοῦς como 'Jesús' en todo el proyecto; aquí no aparece.
  - Se conserva la alternancia de 'ciudad/town' como ambigüedad lexical documentada mediante nota.
  - Se evita 'SEÑOR' y otras sustituciones no presentes en el texto fuente.
  - El nombre propio del lugar se adapta a la forma española 'Sicar' para una lectura natural en español.
