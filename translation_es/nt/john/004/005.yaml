base_translation:
  language: en
  yaml_path: translation/nt/john/004/005.yaml
  text: So he came to a town of Samaria called Sychar[b][a], near the piece of land that Jacob had given to Joseph his son.
  footnotes:
  - marker: a
    text: Or “city of Samaria.” The Greek word πόλις can refer to either a city or a town, depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or “field.” The Greek χωρίον can denote a field, property, or piece of land.
    reason: lexical_alternative
