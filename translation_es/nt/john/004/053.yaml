base_translation:
  language: en
  yaml_path: translation/nt/john/004/053.yaml
  text: So the father knew that it was at that hour when Jesus said to him[a], “Your son lives,” and he himself believed[b], and his whole household.
  footnotes:
  - marker: a
    text: Or “Your son is alive.”
    reason: lexical_alternative
  - marker: b
    text: The verb “believed” may refer either to believing Jesus' word specifically or to coming to faith in Jesus more fully; the Greek leaves the scope implicit.
    reason: alternative_reading
