translation:
  language: es
  text: 'Así que el padre supo que fue a aquella hora cuando Jesús le dijo: «Tu hijo vive[a]», y él mismo creyó[b], y toda su casa.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Tu hijo está vivo».'
    reason: lexical_alternative
  - marker: b
    text: El verbo «creyó» puede referirse ya sea a creer específicamente la palabra de Jesús, ya sea a llegar aquí a una fe más plena en Jesús; el griego deja implícito el alcance.
    reason: alternative_reading
lexical_decisions:
- source_word: ἔγνω
  english_pob_choice: knew
  chosen_spanish: supo
  alternatives_spanish:
  - conoció
  - se enteró
  - llegó a saber
  lexicon: BDAG
  rationale: El aoristo de γινώσκω aquí señala el reconocimiento de la correspondencia entre la hora informada y la palabra de Jesús. En español, «supo» comunica ese descubrimiento cognitivo de manera natural y conserva el matiz de comprensión lograda sin añadir proceso interpretativo excesivo.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - por tanto
  - entonces
  lexicon: BDAG
  rationale: Marca la inferencia narrativa a partir del informe previo. «Así que» suena natural en español actual y mantiene la conexión lógica.
- source_word: ὁ πατὴρ
  english_pob_choice: the father
  chosen_spanish: el padre
  alternatives_spanish:
  - el padre del muchacho
  - el oficial
  lexicon: BDAG
  rationale: El contexto inmediato ya ha desplazado la designación desde el cargo al papel familiar destacado por la sanidad. «El padre» sigue de cerca el griego y conserva el foco narrativo.
- source_word: ἐκείνῃ τῇ ὥρᾳ
  english_pob_choice: at that hour
  chosen_spanish: a aquella hora
  alternatives_spanish:
  - en aquella hora
  - a esa hora
  lexicon: BDAG
  rationale: La frase temporal indica un momento específico. «A aquella hora» preserva la referencia definida de ἐκείνῃ τῇ ὥρᾳ; se prefiere la forma plena para mantener la correspondencia con el texto griego.
- source_word: ἐν ᾗ
  english_pob_choice: when
  chosen_spanish: en que
  alternatives_spanish:
  - cuando
  - en la que
  lexicon: BDAG
  rationale: Aunque la forma más literal sería «en la cual», en español bíblico y contemporáneo «en que» funciona bien como relativo temporal y evita rigidez innecesaria.
- source_word: εἶπεν αὐτῷ ὁ Ἰησοῦς
  english_pob_choice: Jesus said to him
  chosen_spanish: Jesús le dijo
  alternatives_spanish:
  - Jesús le habló
  - Jesús le aseguró
  lexicon: BDAG
  rationale: λέγω con dativo se rinde de forma directa como «decir a alguien». «Le dijo» es natural y cercano al griego, sin intensificar hacia «aseguró» o suavizar hacia «habló».
- source_word: Ὁ υἱός σου ζῇ
  english_pob_choice: Your son lives
  chosen_spanish: Tu hijo vive
  alternatives_spanish:
  - Tu hijo está vivo
  - Tu hijo sigue vivo
  lexicon: BDAG
  rationale: El presente ζῇ expresa un estado presente. «Vive» refleja de modo breve y fiel esa afirmación; «está vivo» sería posible, pero es menos directo. Se evita «seguirá vivo», que introduciría futuro no presente en el griego.
- source_word: ἐπίστευσεν
  english_pob_choice: believed
  chosen_spanish: creyó
  alternatives_spanish:
  - tuvo fe
  - confió
  lexicon: BDAG
  rationale: Se conserva el verbo de fe sin explicitar su alcance. En español, «creyó» reproduce el valor básico de πιστεύω; «tuvo fe» es más explicativo y «confió» podría estrechar indebidamente el sentido.
- source_word: αὐτὸς
  english_pob_choice: he himself
  chosen_spanish: él mismo
  alternatives_spanish:
  - él
  - también él
  lexicon: BDAG
  rationale: El pronombre explícito tiene valor enfático. «Él mismo» lo preserva y distingue su respuesta personal de la de la casa.
- source_word: ἡ οἰκία αὐτοῦ ὅλη
  english_pob_choice: his whole household
  chosen_spanish: toda su casa
  alternatives_spanish:
  - toda su familia
  - toda su casa / su hogar completo
  lexicon: BDAG
  rationale: οἰκία aquí designa el grupo doméstico, no el edificio. «Toda su casa» es una formulación natural en español bíblico y mantiene el alcance colectivo de ὅλη.
theological_decisions:
- issue: Alcance de «creyó» en la fe del padre
  english_pob_reading: The text states that the father believed, with the implication in context that his faith is directed toward Jesus and his word, without specifying more than the Greek says.
  chosen_spanish_reading: El texto afirma que el padre creyó, con la implicación contextual de que su fe se dirige a Jesús y a su palabra, sin precisar más de lo que dice el griego.
  alternative_spanish_readings:
  - Creyó solo la palabra de sanidad de Jesús
  - Llegó aquí a una fe salvadora plena en Jesús
  rationale: Juan usa πιστεύω con profundidad teológica, pero este versículo no define de manera explícita la extensión completa de la fe del padre. La traducción mantiene simplemente «creyó» para no imponer en el texto principal una conclusión doctrinal que el griego no formula de modo directo.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el historial más reciente; el texto de partida fue confirmado sin cambios sustanciales y la versión española sigue de cerca el expediente auditado en inglés, especialmente en los puntos de ambigüedad léxica y teológica.
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς y «Dios/Yahvé» no aparece en este versículo.
  - «Casa» se usa en sentido doméstico/colectivo, no arquitectónico.
  - Se conserva el matiz inferencial de οὖν con una expresión natural en español.
  - La puntuación reproduce la subordinación temporal y el discurso directo del griego sin añadir contenido interpretativo.
