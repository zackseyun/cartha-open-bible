translation:
  language: es
  text: 'Una mujer de Samaria vino[a] a sacar agua. Jesús le dijo: «Dame de beber».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «viene … dice»; el griego usa presentes históricos en la narración.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔρχεται
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - viene
  lexicon: BDAG
  rationale: El presente histórico griego se vierte aquí con pasado simple en español, porque suena natural en narración y conserva la secuencia de la escena sin forzar un presente narrativo poco usual en este contexto.
- source_word: γυνὴ
  english_pob_choice: a woman
  chosen_spanish: una mujer
  alternatives_spanish:
  - una esposa
  lexicon: BDAG
  rationale: El sustantivo designa aquí a una persona femenina no identificada; 'mujer' reproduce mejor el valor contextual que 'esposa'.
- source_word: ἐκ τῆς Σαμαρείας
  english_pob_choice: from Samaria
  chosen_spanish: de Samaria
  alternatives_spanish:
  - desde Samaria
  - de la región de Samaria
  lexicon: BDAG
  rationale: La preposición ἐκ con lugar de procedencia se expresa de forma idiomática en español con 'de'. 'Samaria' se conserva como topónimo sin ampliar innecesariamente el alcance del texto.
- source_word: ἀντλῆσαι ὕδωρ
  english_pob_choice: to draw water
  chosen_spanish: a sacar agua
  alternatives_spanish:
  - a sacar agua del pozo
  - a extraer agua
  lexicon: BDAG
  rationale: '''Sacar agua'' es una equivalencia natural y clara para la acción de obtener agua del pozo. Mantiene el valor de propósito del infinitivo sin sonar mecánico.'
- source_word: λέγει αὐτῇ
  english_pob_choice: said to her
  chosen_spanish: le dijo
  alternatives_spanish:
  - le dice
  lexicon: BDAG
  rationale: Como en inglés, el presente histórico griego se adapta bien al pasado simple en español. 'Le dijo' suena natural y mantiene el avance narrativo.
- source_word: Δός μοι πεῖν
  english_pob_choice: Give me a drink
  chosen_spanish: Dame de beber
  alternatives_spanish:
  - Dame un poco de agua
  - Dame un trago
  lexicon: BDAG
  rationale: '''Give me to drink'' sería demasiado literal en español; ''Dame de beber'' conserva el sentido exacto de la petición con una forma bíblica y plenamente comprensible.'
theological_decisions:
- issue: Referencia de 'Samaria'
  english_pob_reading: The phrase identifies the woman as coming from Samaria/the Samaritan locale, without importing broader ethnic or theological claims into the translation line itself.
  chosen_spanish_reading: La frase identifica a la mujer como procedente de Samaria, sin introducir aquí de manera explícita la carga étnica o religiosa que se desarrollará en el contexto.
  alternative_spanish_readings:
  - una mujer samaritana
  - una mujer de la ciudad de Samaria
  rationale: El griego dice literalmente 'una mujer de Samaria'. La traducción conserva esa formulación y evita añadir 'samaritana' como etiqueta interpretativa, aunque el contexto más amplio lo permita.
  doctrine_reference: Principio de primacía del texto original y de no importar información interpretativa que el versículo no enuncia de manera explícita.
translation_notes:
  revision_awareness: 'Coincide con el análisis auditado: se conserva el presente histórico griego en nota, se traduce con pasado simple natural en español, y se mantiene la petición breve e idiomática de Jesús sin perder su sentido literal.'
  spanish_consistency_notes:
  - Se usa 'Dios' no aplica aquí; 'Jesús' se mantiene como nombre propio normal.
  - '''Samaria'' se conserva sin convertirlo en ''samaritana'' para no exceder el texto fuente.'
  - La nota explica la alternativa del presente histórico, como en el registro inglés auditado.
