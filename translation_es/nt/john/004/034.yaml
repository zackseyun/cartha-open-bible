translation:
  language: es
  text: 'Jesús les dijo: «Mi alimento es hacer la voluntad del que me envió y completar su obra»[a][b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «terminar su obra».
    reason: lexical_alternative
  - marker: b
    text: La expresión «el que me envió» alude contextualmente al Padre, aunque el griego no lo dice explícitamente aquí.
    reason: cross_reference
lexical_decisions:
- source_word: λέγει αὐτοῖς ὁ Ἰησοῦς
  english_pob_choice: Jesus said to them
  chosen_spanish: Jesús les dijo
  alternatives_spanish:
  - Jesús les dice
  lexicon: SBLGNT / narrativa joánica
  rationale: Aunque el griego usa presente histórico (λέγει), en español narrativo natural el pretérito simple comunica mejor la escena sin perder el valor discursivo del dicho.
- source_word: βρῶμά
  english_pob_choice: food
  chosen_spanish: alimento
  alternatives_spanish:
  - comida
  - alimentos
  lexicon: BDAG
  rationale: βρῶμα es literalmente ‘comida/alimento’. ‘Alimento’ conserva la metáfora concreta en un español sobrio y leído en iglesia; evita expandir el sentido a ‘nourishment’ y mantiene la imagen de comer frente al contexto inmediato.
- source_word: Ἐμὸν βρῶμά ἐστιν
  english_pob_choice: My food is
  chosen_spanish: Mi alimento es
  alternatives_spanish:
  - Lo que me alimenta es
  lexicon: BDAG
  rationale: Se conserva la metáfora posesiva directa del griego. ‘Mi alimento es’ suena natural en español y no deshace la figura retórica que Jesús usa.
- source_word: ἵνα ποιήσω
  english_pob_choice: is to do
  chosen_spanish: hacer
  alternatives_spanish:
  - que yo haga
  - es hacer
  lexicon: BDAG
  rationale: La construcción con ἵνα y subjuntivo expresa aquí contenido/propósito; en español, tras ‘es’, el infinitivo funciona con naturalidad y preserva la relación sin sobrerreformularla.
- source_word: τὸ θέλημα
  english_pob_choice: the will
  chosen_spanish: la voluntad
  alternatives_spanish:
  - el querer
  - lo que desea
  lexicon: BDAG
  rationale: ‘Voluntad’ es el equivalente establecido y preciso para θέλημα, especialmente en un marco de obediencia al Padre.
- source_word: τοῦ πέμψαντός με
  english_pob_choice: of him who sent me
  chosen_spanish: del que me envió
  alternatives_spanish:
  - del que me ha enviado
  - del que me mandó
  lexicon: BDAG
  rationale: Se preserva la referencia personal sin introducir un título explícito que el griego no dice aquí. ‘Del que me envió’ refleja el participio aoristo con una cláusula relativa natural en español.
- source_word: τελειώσω
  english_pob_choice: complete
  chosen_spanish: completar
  alternatives_spanish:
  - terminar
  - llevar a término
  lexicon: BDAG
  rationale: ‘Completar’ mantiene la idea de llevar algo a su plenitud o cumplimiento, no solo de ‘acabarlo’ cronológicamente.
- source_word: αὐτοῦ τὸ ἔργον
  english_pob_choice: his work
  chosen_spanish: su obra
  alternatives_spanish:
  - su trabajo
  - su tarea
  lexicon: BDAG
  rationale: ἔργον puede ser ‘obra’, ‘trabajo’ o ‘tarea’. ‘Obra’ es fuerte en el contexto joánico y puede abarcar la misión encomendada sin reducirla a trabajo manual o tarea puntual.
theological_decisions:
- issue: Referencia implícita de «el que me envió»
  english_pob_reading: An implicit reference to the Father/God, left as 'him who sent me' in the text.
  chosen_spanish_reading: Se mantiene la referencia implícita con «del que me envió», sin explicitar «el Padre».
  alternative_spanish_readings:
  - del Padre que me envió
  - de Dios, que me envió
  rationale: El contexto joánico señala al Padre, pero el versículo no lo nombra. La traducción conserva esa tensión y evita añadir un identificador no presente en el texto base.
  doctrine_reference: Primacía del texto original y preservación de la referencia implícita sin expansión interpretativa.
translation_notes:
  revision_awareness: 'No hay revisiones aplicadas en el historial más reciente; el rastro inglés mantiene alta concordancia y no exige ajustes adicionales. Se siguió la misma línea de equivalencia óptima: metáfora conservada, referencia implícita preservada y verbo final traducido con un término que exprese cumplimiento.'
  spanish_consistency_notes:
  - Se usa «alimento» para βρῶμα, coherente con el valor concreto de la metáfora.
  - Se usa «voluntad» para θέλημα, en línea con el uso teológico estándar y el audit trail inglés.
  - Se evita introducir «Padre» en el cuerpo del versículo para no resolver en traducción una referencia que el griego deja implícita.
  - «Obra» se prefiere a «trabajo» por su amplitud y resonancia joánica.
