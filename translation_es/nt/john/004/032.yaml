translation:
  language: es
  text: 'Pero les dijo: «Yo tengo una comida[a] que ustedes no conocen».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Tengo algo para comer que ustedes no conocen». Jesús habla en sentido figurado, como deja claro el contexto siguiente.
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Mas
  lexicon: BDAG
  rationale: δέ marca aquí un giro suave o contraste narrativo; «Pero» conserva mejor ese matiz en español que una mera suma con «Y».
- source_word: εἶπεν αὐτοῖς
  english_pob_choice: he said to them
  chosen_spanish: les dijo
  alternatives_spanish:
  - les habló
  - les respondió
  lexicon: BDAG
  rationale: «Dijo a ellos» se naturaliza en español como «les dijo», manteniendo el carácter narrativo directo y conciso del griego.
- source_word: Ἐγὼ
  english_pob_choice: I
  chosen_spanish: Yo
  alternatives_spanish:
  - Yo mismo
  lexicon: BDAG
  rationale: El pronombre explícito conserva el énfasis griego sin sobrerrecalcarlo; en español «Yo» al inicio de la cita comunica bien esa fuerza.
- source_word: βρῶσιν
  english_pob_choice: food
  chosen_spanish: comida
  alternatives_spanish:
  - alimento
  - algo para comer
  lexicon: BDAG
  rationale: βρῶσις aquí nombra el alimento, no el acto de comer. «Comida» es el equivalente más natural y fiel en español contemporáneo.
- source_word: ἔχω φαγεῖν
  english_pob_choice: have food to eat
  chosen_spanish: tengo comida que comer
  alternatives_spanish:
  - tengo algo que comer
  - tengo alimento que comer
  lexicon: BDAG
  rationale: La construcción expresa posesión de alimento destinado a ser comido. «Tengo comida que comer» conserva la estructura y el sentido sin explicar la metáfora.
- source_word: ἣν
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - la cual
  - cual
  lexicon: BDAG
  rationale: La cláusula relativa restringe a «comida»; «que» es la forma más natural y clara en español.
- source_word: ὑμεῖς
  english_pob_choice: you
  chosen_spanish: ustedes
  alternatives_spanish:
  - vosotros
  - ustedes mismos
  lexicon: BDAG
  rationale: El plural enfático griego se vierte con el pronombre plural explícito. «Ustedes» mantiene el contraste sin regionalizar en exceso.
- source_word: οὐκ οἴδατε
  english_pob_choice: do not know
  chosen_spanish: no conocen
  alternatives_spanish:
  - no saben
  - no conocen acerca de
  lexicon: BDAG
  rationale: Aunque οἶδα puede traducirse como «saber», aquí con objeto implícito referido a la comida, «no conocen» conserva el sentido de desconocer esa realidad sin añadir «de» u otra expansión no presente en el griego.
theological_decisions:
- issue: Sentido metafórico de la comida de Jesús
  english_pob_reading: Retain the literal lexical term 'food' in the main text without explicating the metaphor.
  chosen_spanish_reading: Conservar «comida» en el texto principal sin resolver la metáfora.
  alternative_spanish_readings:
  - «algo para comer»
  - «alimento»
  rationale: El contexto inmediato mostrará que Jesús habla en sentido figurado, pero este versículo preserva deliberadamente el malentendido de los discípulos. Traducir con una glosa interpretativa debilitaría esa tensión narrativa.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La versión española sigue la última revisión auditada del inglés, que eliminó «about» para reflejar más de cerca οὐκ οἴδατε sin volver menos natural la frase. Por eso se evitó cualquier expansión equivalente en español y se mantuvo una estructura breve y directa.
  spanish_consistency_notes:
  - Se usa «Yahvé» en lugar de «SEÑOR» solo cuando el texto base lo requiera; aquí no aplica.
  - «Mesías», «Jesús» y demás términos cristológicos no aparecen en este versículo, por lo que no se introducen.
  - Se preserva el valor metafórico de «comida» sin sustituirlo por una paráfrasis explicativa en el cuerpo principal.
  - El pronombre plural se expresa como «ustedes» para mantener la referencia clara en español neutro latinoamericano.
