translation:
  language: es
  text: 'Mientras tanto[a], los discípulos le preguntaban[b], diciendo: «Rabí[c], come».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede traducirse «En el entretanto».
    reason: lexical_alternative
  - marker: b
    text: El imperfecto puede entenderse como «preguntaban» o «seguían preguntándole»; aquí se mantiene la forma simple y el contexto sugiere la insistencia de la petición.
    reason: lexical_alternative
  - marker: c
    text: «Rabí» es un título judío de tratamiento que también significa «Maestro».
    reason: cultural_note
lexical_decisions:
- source_word: Ἐν τῷ μεταξὺ
  english_pob_choice: Meanwhile
  chosen_spanish: Mientras tanto
  alternatives_spanish:
  - En el entretanto
  - Entretanto
  lexicon: BDAG
  rationale: El giro idiomático expresa con naturalidad el intervalo temporal entre la partida de la mujer y la escena siguiente. 'Mientras tanto' conserva el sentido de intervalo sin forzar un calco.
- source_word: ἠρώτων
  english_pob_choice: were asking
  chosen_spanish: preguntaban
  alternatives_spanish:
  - seguían preguntándole
  - le insistían
  - le pedían
  lexicon: BDAG
  rationale: El imperfecto sugiere acción continua o reiterada. 'Preguntaban' refleja directamente el valor básico de ἐρωτάω y permite el matiz de insistencia por el contexto sin añadir una interpretación más fuerte que el texto no exige en español.
- source_word: οἱ μαθηταὶ
  english_pob_choice: the disciples
  chosen_spanish: los discípulos
  alternatives_spanish:
  - sus discípulos
  lexicon: BDAG
  rationale: El artículo identifica al grupo conocido por el contexto; 'los discípulos' basta en español y mantiene la referencia narrativa clara.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  - al decir
  lexicon: BDAG
  rationale: El participio introduce el contenido de su intervención. 'Diciendo' preserva la relación verbal de manera natural en español.
- source_word: Ῥαββί
  english_pob_choice: Rabbi
  chosen_spanish: Rabí
  alternatives_spanish:
  - Rabí, Maestro
  lexicon: BDAG
  rationale: Se conserva la forma de tratamiento judía como préstamo transliterado. 'Rabí' es reconocible en español y respeta el valor cultural del título sin sustituirlo por una traducción explicativa en el texto principal.
- source_word: φάγε
  english_pob_choice: eat
  chosen_spanish: come
  alternatives_spanish:
  - come algo
  - toma alimento
  lexicon: BDAG
  rationale: El imperativo aoristo singular de ἐσθίω pide una orden/invitación directa. 'Come' es la forma más breve, natural y fiel en español.
translation_notes:
  revision_awareness: La versión inglesa final pasó de 'were urging' a 'were asking' para ajustarse más directamente a ἠρώτων. La propuesta española refleja ese ajuste con 'preguntaban', sin perder el posible matiz de insistencia que aporta el contexto narrativo.
  spanish_consistency_notes:
  - Se mantiene 'Rabí' como préstamo reverente, coherente con la conservación de títulos de tratamiento judíos cuando aportan información cultural significativa.
  - Se usa 'mientras tanto' como equivalente idiomático de Ἐν τῷ μεταξὺ, evitando un giro demasiado literal.
  - No se introduce una paráfrasis interpretativa del mandato final; 'come' conserva la brevedad del imperativo griego.
