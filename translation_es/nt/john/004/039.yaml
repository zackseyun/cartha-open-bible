translation:
  language: es
  text: 'Y muchos de los samaritanos de aquella ciudad creyeron en él por la palabra[a] de la mujer que daba testimonio: «Me dijo todo lo que he hecho».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a causa del mensaje de la mujer». El griego λόγος puede significar «palabra», «mensaje» o «relato».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐκ δὲ τῆς πόλεως ἐκείνης
  english_pob_choice: And ... from that town
  chosen_spanish: Y ... de aquella ciudad
  alternatives_spanish:
  - Y ... de aquel pueblo
  - Y ... de esa ciudad
  lexicon: BDAG
  rationale: ἐκ indica procedencia u origen, por lo que se expresa con «de». πόλις puede ser «ciudad» o «pueblo»; aquí «ciudad» mantiene la referencia geográfica sin reducir innecesariamente el término. «Aquella» conserva la deixis de ἐκείνης.
- source_word: πολλοὶ ... τῶν Σαμαριτῶν
  english_pob_choice: many of the Samaritans
  chosen_spanish: muchos de los samaritanos
  alternatives_spanish:
  - muchos samaritanos
  - muchos entre los samaritanos
  lexicon: BDAG
  rationale: La construcción es partitiva; «muchos de los samaritanos» conserva ese matiz de manera natural en español.
- source_word: ἐπίστευσαν εἰς αὐτόν
  english_pob_choice: believed in him
  chosen_spanish: creyeron en él
  alternatives_spanish:
  - pusieron su fe en él
  - creyeron él
  lexicon: BDAG
  rationale: πιστεύω con εἰς expresa confianza dirigida hacia una persona. «Creyeron en él» es el equivalente español más directo y fiel, manteniendo la fuerza relacional sin sobreexplicar.
- source_word: διὰ τὸν λόγον
  english_pob_choice: because of the word
  chosen_spanish: por la palabra
  alternatives_spanish:
  - a causa del mensaje
  - por el relato
  lexicon: BDAG
  rationale: διά con acusativo expresa causa. λόγος puede ser «palabra», «mensaje» o «relato»; aquí «palabra» conserva el campo semántico habitual de Juan y deja abierta la amplitud del término, como en el audit trail inglés.
- source_word: τῆς γυναικὸς μαρτυρούσης
  english_pob_choice: of the woman who was testifying
  chosen_spanish: de la mujer que daba testimonio
  alternatives_spanish:
  - de la mujer que testificaba
  - de la mujer que estaba dando testimonio
  lexicon: BDAG
  rationale: El participio presente subraya una acción en curso. «Daba testimonio» reproduce bien ese aspecto en español y suena más natural que una calca literal.
- source_word: ὅτι Εἶπέν μοι
  english_pob_choice: He told me
  chosen_spanish: 'diciendo: «Me dijo»'
  alternatives_spanish:
  - que me dijo
  - 'diciendo: «Me habló»'
  lexicon: BDAG
  rationale: ὅτι introduce el contenido de la testificación; en español, el discurso directo ayuda a reflejar la viveza narrativa. «Me dijo» corresponde de modo idiomático a λέγω con dativo.
- source_word: πάντα ⸀ἃ ἐποίησα
  english_pob_choice: everything I have done
  chosen_spanish: todo lo que he hecho
  alternatives_spanish:
  - todo lo que hice
  - todas las cosas que he hecho
  lexicon: BDAG
  rationale: πάντα ἃ se vierte de forma comprensiva como «todo lo que». El aoristo ἐποίησα en este contexto se traduce con perfecto compuesto o pretérito según el español; aquí «he hecho» sigue la revisión inglesa y suena natural en la confesión reportada.
theological_decisions:
- issue: Alcance de πιστεύω εἰς αὐτόν
  english_pob_reading: believed in him
  chosen_spanish_reading: creyeron en él
  alternative_spanish_readings:
  - pusieron su fe en él
  - creyeron a él
  rationale: El texto describe fe/confianza real dirigida a Jesús, sin añadir categorías doctrinales externas. «Creyeron en él» conserva esa relación personal de forma sobria y fiel.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que cambió «I did» por «I have done» para reflejar mejor el sentido perfectoivo en contexto. Por eso el español adopta «he hecho» en la cita directa, manteniendo la misma decisión interpretativa y el mismo tono testimonial.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente exige el nombre divino; aquí no aplica.
  - Se mantuvo «creyeron en él» para πιστεύω εἰς sin convertirlo en una formulación doctrinal más amplia.
  - «Palabra» conserva la amplitud semántica de λόγος y la nota explica la alternativa «mensaje/relato».
  - El discurso directo con comillas angulares no se usó para mantener coherencia con el estilo publicado del registro; se prefieren comillas dobles españolas.
  - La construcción «daba testimonio» preserva el aspecto del participio presente y evita una simplificación a pretérito simple.
