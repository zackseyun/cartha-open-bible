review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del griego: procedencia desde aquella ciudad, construcción partitiva «muchos de los samaritanos», fe dirigida «en él», causa expresada por διά, y el contenido del testimonio de la mujer. Sin embargo, la nota al pie está anclada en «él[a]», cuando la alternativa léxica documentada corresponde a «por la palabra», no a «él». Además, «diciendo» añade una palabra no necesaria, ya que ὅτι puede verterse directamente con dos puntos o con «que».'
  spanish_quality_summary: El español es claro y natural, con buen registro eclesial moderno. «Que daba testimonio» y «Me dijo todo lo que he hecho» son legibles. La principal reparación necesaria es de colocación de la nota y una leve simplificación estilística para evitar la inserción redundante «diciendo».
  glossary_alignment: No hay conflicto con la terminología del proyecto. «Creyeron en él» corresponde bien a πιστεύω εἰς αὐτόν. No aparecen términos sensibles como Yahvé/Mesías/esclavo. La decisión «palabra» para λόγος es aceptable y la alternativa «mensaje» debe mantenerse en nota, pero con anclaje correcto.
  issues:
  - severity: medium
    issue: La nota al pie está anclada en «él[a]» en vez de en «palabra[a]».
    rationale: La nota explica la alternativa léxica para λόγος («palabra/mensaje/relato»), no para αὐτόν («él»). El anclaje actual induce a error y no cumple bien la disciplina de notas.
  - severity: low
    issue: «diciendo» es innecesario en la cita introducida por ὅτι.
    rationale: 'El griego solo introduce el contenido del testimonio; en español basta «que daba testimonio: “…”» o «que daba testimonio de que…». Quitar «diciendo» mejora la naturalidad sin pérdida de sentido.'
