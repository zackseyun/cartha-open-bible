  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del griego: la mujer responde, declara que no tiene marido, y Jesús valida esa afirmación repitiéndola. La elección de «marido» para ἀνήρ concuerda con el contexto inmediato y con la decisión auditada en inglés. También es correcta la adaptación del presente histórico λέγει a pasado («dijo»).'
  spanish_quality_summary: 'El español es claro y natural en general, pero hay dos detalles que conviene reparar: (1) la nota [a] no aporta una alternativa real, porque repite exactamente «No tengo marido» aunque pretende ser una opción más literal; debe reflejar el contraste documentado en inglés («No tengo marido» / «No tengo un marido» no funciona bien en español), por lo que la mejor alternativa literal española es «No tengo marido» frente a una redacción principal más idiomática como «No tengo esposo», o bien mantener el texto principal y eliminar esa nota. (2) Dado que el proyecto exige que toda nota tenga su marcador en el texto en el punto pertinente, [b] debe anclarse a «marido» donde aparece por primera vez y no solo a «Jesús le dijo».'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Jesús» es correcto. No intervienen aquí términos como Yahvé, Mesías, espíritu, etc. La decisión contextual sobre ἀνήρ = «marido» está bien fundada y debe conservarse, idealmente con una nota anclada al sustantivo.
