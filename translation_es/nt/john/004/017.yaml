translation:
  language: es
  text: 'La mujer respondió y le dijo: «No tengo marido[a]». Jesús le dijo: «Bien has dicho: “No tengo marido”»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La palabra griega ἀνήρ puede significar «hombre» o «marido»; aquí el contexto indica «marido».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: BDAG
  rationale: El aoristo de ἀποκρίνομαι suele introducir una respuesta directa. En español, «respondió» conserva la función narrativa natural sin añadir matiz extra.
- source_word: γυνή
  english_pob_choice: woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - la esposa
  - la mujer
  lexicon: BDAG
  rationale: Aquí γυνή designa a la mujer samaritana como persona, no como esposa. «La mujer» es el equivalente contextual más directo.
- source_word: καὶ εἶπεν
  english_pob_choice: and said
  chosen_spanish: y le dijo
  alternatives_spanish:
  - y dijo
  - y le habló
  lexicon: BDAG
  rationale: La fórmula narrativa griega se expresa de modo natural en español con «y le dijo», preservando tanto la secuencia como el destinatario.
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - le
  lexicon: BDAG
  rationale: El dativo personal se expresa de forma natural con el pronombre átono «le»; evita una literalidad pesada sin perder el referente masculino del diálogo.
- source_word: Οὐκ ἔχω ἄνδρα
  english_pob_choice: I do not have a husband
  chosen_spanish: No tengo marido
  alternatives_spanish:
  - No tengo esposo
  - No tengo hombre
  lexicon: BDAG
  rationale: Aunque ἀνήρ puede significar «hombre» o «marido», el contexto inmediato trata de la situación matrimonial de la mujer, por lo que «marido» comunica mejor el sentido previsto y mantiene la tensión lexical del original.
- source_word: λέγει
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - dice
  - dijo
  lexicon: BDAG
  rationale: El presente histórico griego se vierte con el pretérito en español por naturalidad narrativa, como en el audit trail en inglés.
- source_word: Καλῶς
  english_pob_choice: well
  chosen_spanish: Bien
  alternatives_spanish:
  - Bien
  - Correctamente
  - Justamente
  lexicon: BDAG
  rationale: «Bien» reproduce de forma idiomática la valoración positiva de Jesús sobre la veracidad/apropiación de la frase.
- source_word: εἶπας
  english_pob_choice: you have spoken
  chosen_spanish: has dicho
  alternatives_spanish:
  - has dicho
  - has hablado
  - dijiste
  lexicon: BDAG
  rationale: En español, la expresión natural es «has dicho»; mantiene la evaluación de Jesús y evita una repetición áspera de «dijo».
- source_word: ὅτι
  english_pob_choice: ':'
  chosen_spanish: «
  alternatives_spanish:
  - que
  - ':'
  lexicon: BDAG
  rationale: Aquí ὅτι introduce una cita directa del contenido dicho. En español se refleja mejor con comillas y puntuación de cita que con un «que» redundante.
- source_word: Ἄνδρα οὐκ ἔχω
  english_pob_choice: I do not have a husband
  chosen_spanish: No tengo marido
  alternatives_spanish:
  - No tengo marido
  - No tengo hombre
  lexicon: BDAG
  rationale: Se conserva la cita literal del contenido anterior, manteniendo el mismo valor contextual de ἀνήρ como «marido».
theological_decisions:
- issue: Valor de ἀνήρ en la confesión de la mujer
  english_pob_reading: husband
  chosen_spanish_reading: marido
  alternative_spanish_readings:
  - hombre
  - esposo
  rationale: La conversación de Jesús en el versículo siguiente confirma que el tema es el estado matrimonial de la mujer. «Marido» es la opción más clara y fiel al contexto, sin convertir el término en una generalidad antropológica.
  doctrine_reference: 'Translation philosophy: original-language primacy; lexical context over isolated gloss'
- issue: Estilo de discurso directo de Jesús
  english_pob_reading: 'You have spoken well: “I do not have a husband.”'
  chosen_spanish_reading: 'Bien has dicho: «No tengo marido»'
  alternative_spanish_readings:
  - 'Has dicho bien: «No tengo marido»'
  - 'Bien has dicho: «No tengo marido»'
  rationale: Se mantiene la valoración afirmativa de Jesús y la cita directa de las palabras de la mujer. El orden elegido suena natural en español y conserva el énfasis evaluativo del griego.
  doctrine_reference: 'Translation philosophy: optimal equivalence with source transparency'
translation_notes:
  revision_awareness: El borrador sigue el pasaje griego y el expediente inglés sin cambios sustantivos; la única decisión interpretativa principal es ἀνήρ = «marido», confirmada por el contexto inmediato y por la nota lexical del original inglés. Se conserva la repetición de la confesión de la mujer dentro de la cita de Jesús.
  spanish_consistency_notes:
  - Se usa «marido» de manera coherente para ἀνήρ en este contexto, evitando «esposo» por ser menos directo en español bíblico y menos consistente con el expediente inglés.
  - Se mantiene «Jesús» para Ἰησοῦς y el discurso directo con comillas angulares, en línea con el estilo publicado del proyecto.
  - El pronombre enclítico «le» representa el dativo αὐτῷ/αὐτῇ de forma natural en español sin añadir información no presente en el griego.
