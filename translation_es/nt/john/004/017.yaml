    rationale: La instrucción del proyecto requiere que el marcador exacto aparezca en el punto relevante del texto. Como la nota trata del valor de ἀνήρ, debe anclarse a «marido» en la primera ocurrencia, no a «Jesús le dijo».
  - severity: low
    issue: Las comillas internas pueden simplificarse para fluidez tipográfica en español bíblico.
    rationale: Tras dos puntos, en español basta citar la repetición con comillas angulares; no es un error grave, pero conviene mantener una puntuación limpia y consistente.
