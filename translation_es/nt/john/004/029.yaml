translation:
  language: es
  text: Vengan, vean a un hombre que me dijo todo lo que he hecho. ¿No será este el Mesías[a]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «¿Puede ser este el Cristo?»
    reason: alternative_reading
lexical_decisions:
- source_word: Δεῦτε
  english_pob_choice: Come
  chosen_spanish: Vengan
  alternatives_spanish:
  - Vengan acá
  - Vengan, pues
  lexicon: BDAG
  rationale: Es una invitación directa y plural; «Vengan» conserva el llamado inmediato y natural en español.
- source_word: ἴδετε
  english_pob_choice: see
  chosen_spanish: vean
  alternatives_spanish:
  - miren
  - vean ustedes
  lexicon: BDAG
  rationale: 'Con «Vengan» forma una invitación breve y idiomática: «Vengan, vean...». Mantiene el imperativo de percepción sin arcaísmo.'
- source_word: ἄνθρωπον
  english_pob_choice: a man
  chosen_spanish: a un hombre
  alternatives_spanish:
  - a una persona
  - a alguien
  lexicon: BDAG
  rationale: El griego es masculino singular y se refiere a Jesús como individuo varón; «un hombre» conserva esa referencia concreta.
- source_word: ὃς εἶπέ μοι
  english_pob_choice: who told me
  chosen_spanish: que me dijo
  alternatives_spanish:
  - que me contó
  - quien me dijo
  lexicon: BDAG
  rationale: En español, «me dijo» comunica naturalmente λέγω con objeto indirecto y evita una rigidez innecesaria.
- source_word: πάντα ⸀ὅσα ἐποίησα
  english_pob_choice: everything I have done
  chosen_spanish: todo lo que he hecho
  alternatives_spanish:
  - todo cuanto he hecho
  - todas las cosas que he hecho
  lexicon: BDAG
  rationale: La combinación intensifica la totalidad; «todo lo que he hecho» reproduce bien la amplitud sin sobreexplicar.
- source_word: μήτι
  english_pob_choice: Could this be
  chosen_spanish: ¿No será
  alternatives_spanish:
  - ¿Podrá ser
  - ¿Será acaso
  lexicon: BDAG
  rationale: μήτι expresa una pregunta tentativa que sugiere cautela; «¿No será...?» en español conserva esa apertura y expectativa sin convertirla en afirmación cerrada.
- source_word: ὁ χριστός
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - el Cristo
  lexicon: BDAG
  rationale: Como título mesiánico, Χριστός se traduce por «Mesías» según el criterio del proyecto, preservando su sentido judío y evitando el uso litúrgico de «Cristo» como nombre-forma.
theological_decisions:
- issue: Χριστός como título mesiánico
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - el Cristo
  rationale: El contexto plantea una identificación mesiánica, no un nombre propio; «Mesías» transmite mejor el valor titular y la expectativa de Israel.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
translation_notes:
  revision_awareness: El paquete de auditoría muestra una oscilación previa entre «Messiah» y «Christ» en inglés, luego corregida para restaurar la política de traducir Χριστός como «Messiah». Esta versión sigue esa decisión y la refleja en español con «Mesías».
  spanish_consistency_notes:
  - 'Se mantiene el tratamiento plural en la invitación: «Vengan, vean».'
  - «Mesías» se usa como título, no como nombre propio.
  - La pregunta con μήτι se expresa de modo tentativo, no como negación fuerte.
  - El registro es moderno y digno, sin arcaísmos innecesarios.
