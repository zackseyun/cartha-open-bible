translation:
  language: es
  text: Por tanto, cuando Jesús supo que los fariseos habían oído que Jesús hacía más discípulos y bautizaba más que Juan[a]—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Jesús hacía y bautizaba más discípulos que Juan». El griego también puede leerse con la comparación aplicada al conjunto de la actividad o específicamente a «discípulos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὡς οὖν
  english_pob_choice: Therefore, when
  chosen_spanish: Por tanto, cuando
  alternatives_spanish:
  - Así que, cuando
  - Entonces, cuando
  lexicon: BDAG
  rationale: Ὡς introduce la acción temporal ('cuando') y οὖν aporta progresión inferencial ('por tanto/entonces'). 'Por tanto, cuando' conserva ambas fuerzas de manera natural en español.
- source_word: ἔγνω
  english_pob_choice: knew
  chosen_spanish: supo
  alternatives_spanish:
  - conoció
  - llegó a saber
  lexicon: BDAG
  rationale: En este contexto aorístico, γινώσκω expresa que Jesús se enteró o tuvo conocimiento de la noticia. 'Supo' es breve, idiomático y conserva el matiz de percibir una información.
- source_word: οἱ Φαρισαῖοι
  english_pob_choice: the Pharisees
  chosen_spanish: los fariseos
  alternatives_spanish:
  - los Fariseos
  lexicon: BDAG
  rationale: Nombre de grupo étnico-religioso bien establecido en español bíblico; el artículo definido se mantiene.
- source_word: ἤκουσαν
  english_pob_choice: had heard
  chosen_spanish: habían oído
  alternatives_spanish:
  - oyeron
  lexicon: BDAG
  rationale: 'El pluscuamperfecto español refleja con claridad la secuencia narrativa: antes del conocimiento de Jesús, los fariseos ya habían recibido la noticia.'
- source_word: πλείονας μαθητὰς
  english_pob_choice: more disciples
  chosen_spanish: más discípulos
  alternatives_spanish:
  - un mayor número de discípulos
  lexicon: BDAG
  rationale: El comparativo con μαθητάς se expresa de forma natural como 'más discípulos'.
- source_word: ποιεῖ
  english_pob_choice: was making
  chosen_spanish: hacía
  alternatives_spanish:
  - estaba haciendo
  - ganaba
  lexicon: BDAG
  rationale: Con μαθητάς, ποιέω conserva su fuerza de 'hacer discípulos'. 'Hacía' permite un español fluido y mantiene la conexión verbal con el siguiente participio de bautizar.
- source_word: βαπτίζει
  english_pob_choice: baptizing
  chosen_spanish: bautizaba
  alternatives_spanish:
  - sumergía
  lexicon: BDAG
  rationale: '''Bautizaba'' es la equivalencia estándar y clara de βαπτίζω en narración del NT.'
- source_word: ἢ Ἰωάννης
  english_pob_choice: than John
  chosen_spanish: que Juan
  alternatives_spanish:
  - que Juan lo hacía
  - que Juan bautizaba
  lexicon: BDAG
  rationale: La comparación puede extenderse al conjunto de las acciones; en español, 'que Juan' es breve y natural, dejando abierta la lectura que el texto griego permite.
theological_decisions:
- issue: Posible implicación de que Jesús bautizaba personalmente, tensionada por Juan 4:2
  english_pob_reading: Retain the surface wording of 4:1 without importing the clarification of 4:2 into the main text.
  chosen_spanish_reading: Conservar el nivel superficial de 4:1 sin anticipar la aclaración de 4:2 en el texto principal.
  alternative_spanish_readings:
  - Jesús estaba haciendo más discípulos, y su grupo bautizaba...
  - Jesús hacía más discípulos y bautizaba más que Juan
  rationale: 'El versículo afirma lo que se decía: Jesús hacía y bautizaba más discípulos que Juan. Dado que 4:2 inmediatamente precisa que Jesús mismo no bautizaba, conviene no armonizar prematuramente y dejar que el siguiente versículo aporte la aclaración.'
  doctrine_reference: Preservar la tensión textual sin resolverla de antemano.
translation_notes:
  revision_awareness: 'Revisión alineada con el texto griego SBLGNT y con el rastro auditado en inglés: se mantiene la progresión temporal/inferencial de Ὡς οὖν, se conserva la tensión sobre la coordinación de πλείονας μαθητὰς ποιεῖ καὶ βαπτίζει, y no se introduce la aclaración de 4:2 en 4:1. No hubo cambios recientes en la pasada de revisión más reciente.'
  spanish_consistency_notes:
  - Se usa 'Jesús' sin artículo, conforme al uso bíblico en español.
  - '''Fariseos'' se mantiene en minúscula inicial por tratarse de un nombre común de grupo en español.'
  - '''Bautizaba'' conserva la terminología POB usual para βαπτίζω.'
  - La nota al pie marca la alternativa sintáctica real del griego sin sobreinterpretar la comparación.
