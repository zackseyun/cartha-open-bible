    rationale: El audit trail inglés escogió «welcomed him» precisamente para expresar la recepción favorable. «Lo recibieron» es posible, pero en español puede sonar demasiado neutro frente al contexto.
  - severity: low
    issue: La secuencia «porque ... pues ...» suena redundante
    rationale: El participio ἑωρακότες ya se volvió una cláusula causal; luego γάρ añade otra explicación. En español conviene distribuir mejor los conectores para no producir una frase pesada.
  - severity: low
