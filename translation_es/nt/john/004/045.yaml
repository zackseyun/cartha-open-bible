revisions:
- from: Entonces, cuando llegó a Galilea, los galileos lo recibieron[a], porque habían visto todo lo que había hecho en Jerusalén durante la fiesta[b], pues ellos también habían ido a la fiesta.
  to: Entonces, cuando llegó a Galilea, los galileos le dieron la bienvenida[a], porque habían visto todo lo que había hecho en Jerusalén en la fiesta[b], ya que ellos también habían ido a la fiesta.
  rationale: Se ajusta el verbo principal para reflejar mejor el matiz favorable de ἐδέξαντο, en línea con la decisión léxica auditada en inglés. También se aligera la relación causal para evitar la duplicación torpe de conectores y se acerca «en la fiesta» al valor sencillo de ἐν τῇ ἑορτῇ. Las notas se actualizan para que la alternativa corresponda al nuevo texto principal y para mantener la opción «festival» documentada por el POB inglés.
