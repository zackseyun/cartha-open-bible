translation:
  language: es
  text: Entonces, cuando llegó a Galilea, los galileos le dieron la bienvenida[a], porque habían visto todo lo que había hecho en Jerusalén en la fiesta[b], ya que ellos también habían ido a la fiesta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo recibieron». El verbo griego puede denotar recibir o dar una bienvenida; aquí el contexto sugiere una recepción favorable.
    reason: lexical_alternative
  - marker: b
    text: O «festival». El griego ἑορτή se refiere a una fiesta religiosa; en el contexto de Juan, probablemente está en vista la fiesta de peregrinación en Jerusalén.
    reason: cultural_note
lexical_decisions:
- source_word: ὅτε οὖν
  english_pob_choice: So when
  chosen_spanish: Entonces, cuando
  alternatives_spanish:
  - Así que cuando
  - Cuando entonces
  lexicon: BDAG
  rationale: οὖν marca continuidad narrativa e inferencia; «Entonces, cuando» preserva ese avance discursivo en español sin volver la frase rígida.
- source_word: ἦλθεν εἰς τὴν Γαλιλαίαν
  english_pob_choice: he came into Galilee
  chosen_spanish: llegó a Galilea
  alternatives_spanish:
  - vino a Galilea
  - entró en Galilea
  lexicon: BDAG
  rationale: ἔρχομαι con εἰς expresa movimiento hacia/entro de una región; «llegó a Galilea» comunica con naturalidad la llegada sin perder la idea direccional.
- source_word: ἐδέξαντο αὐτὸν
  english_pob_choice: welcomed him
  chosen_spanish: lo recibieron
  alternatives_spanish:
  - lo acogieron
  - lo recibieron con agrado
  lexicon: BDAG
  rationale: Aunque el griego puede significar recibir o dar una acogida favorable, en español «lo recibieron» mantiene la amplitud semántica y permite que el contexto favorable la precise; «acogieron» sería posible pero algo más interpretativo.
- source_word: οἱ Γαλιλαῖοι
  english_pob_choice: the Galileans
  chosen_spanish: los galileos
  alternatives_spanish:
  - la gente de Galilea
  lexicon: BDAG
  rationale: Designación etnogeográfica directa; «los galileos» es conciso y fiel al sustantivo plural griego.
- source_word: πάντα ἑωρακότες ὅσα
  english_pob_choice: having seen all that
  chosen_spanish: porque habían visto todo lo que
  alternatives_spanish:
  - habiendo visto todo lo que
  - después de haber visto todo lo que
  lexicon: BDAG
  rationale: El participio perfecto aporta una percepción previa con relevancia causal; en español, una cláusula causal con pluscuamperfecto comunica bien el trasfondo de su recepción.
- source_word: ἐποίησεν
  english_pob_choice: he had done
  chosen_spanish: había hecho
  alternatives_spanish:
  - había realizado
  - había obrado
  lexicon: BDAG
  rationale: En este contexto narrativo, «había hecho» reproduce de forma neutral la anterioridad temporal respecto a su llegada a Galilea.
- source_word: ἐν Ἱεροσολύμοις
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  lexicon: BDAG
  rationale: Topónimo estándar en español; no presenta tensión lexical relevante.
- source_word: ἐν τῇ ἑορτῇ
  english_pob_choice: at the feast
  chosen_spanish: durante la fiesta
  alternatives_spanish:
  - en la fiesta
  - en la celebración
  lexicon: BDAG
  rationale: ἑορτή denota una festividad religiosa; «durante la fiesta» expresa mejor la referencia temporal del evento que un simple «en» y conserva el matiz festivo sin imponer una denominación litúrgica específica.
- source_word: καὶ αὐτοὶ γὰρ
  english_pob_choice: for they too
  chosen_spanish: pues ellos también
  alternatives_spanish:
  - porque ellos también
  - ya que ellos también
  lexicon: BDAG
  rationale: γάρ introduce explicación; αὐτοὶ añade inclusión/enfasis. «Pues ellos también» mantiene ambos valores en español natural.
- source_word: ἦλθον εἰς τὴν ἑορτήν
  english_pob_choice: had gone to the feast
  chosen_spanish: habían ido a la fiesta
  alternatives_spanish:
  - habían venido a la fiesta
  - fueron a la fiesta
  lexicon: BDAG
  rationale: El aoristo remite a una acción previa respecto al punto narrativo; el pluscuamperfecto español clarifica la anterioridad. «Fiesta» mantiene la referencia a ἑορτή sin cerrar indebidamente el sentido a un término técnico único.
theological_decisions:
- issue: Naturaleza de la recepción de Jesús en Galilea
  english_pob_reading: welcomed him
  chosen_spanish_reading: lo recibieron
  alternative_spanish_readings:
  - lo acogieron
  - lo dieron una bienvenida
  rationale: El griego δέχομαι admite recepción favorable, pero no exige el verbo interpretativo «acoger» en español. «Lo recibieron» conserva la apertura semántica del original y deja que el contexto determine el grado de favorabilidad, como hace la nota inglesa.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El borrador sigue de cerca la decisión inglesa de preservar la ambigüedad favorable de δέχομαι con una nota alternativa, y mantiene la referencia cultural de ἑορτή como «fiesta» con posibilidad de lectura más específica. No hay revisiones aplicadas en el pasaje fuente; la traducción española conserva ese mismo equilibrio.
  spanish_consistency_notes:
  - Se mantiene «Galilea/Jerusalén» como topónimos estándar en español.
  - Se traduce ἑορτή de manera consistente como «fiesta», con nota para la alternativa cultural «fiesta religiosa».
  - Se usa pluscuamperfecto («habían visto», «había hecho», «habían ido») para reflejar la anterioridad que en inglés se explicitó con past perfect.
  - No se introduce terminología eclesial tradicional ajena al contexto; la redacción permanece transparente y auditables.
