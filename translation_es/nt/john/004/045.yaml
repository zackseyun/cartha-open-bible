base_translation:
  language: en
  yaml_path: translation/nt/john/004/045.yaml
  text: So when he came into Galilee[a], the Galileans welcomed him, having seen all that he had done in Jerusalem at the feast[b], for they too had gone to the feast.
  footnotes:
  - marker: a
    text: Or 'received him.' The Greek verb can denote receiving or welcoming; here the context suggests a favorable reception.
    reason: lexical_alternative
  - marker: b
    text: Or 'festival.' The Greek ἑορτή refers to a religious feast; John likely has the Jerusalem pilgrimage feast in view from the surrounding context.
    reason: cultural_note
