    issue: «para Galilea» para εἰς τὴν Γαλιλαίαν
    rationale: Aunque no es imposible, «para Galilea» en español suena menos idiomático después de «salió de allí» y puede sugerir intención más que simple destino. εἰς aquí se vierte mejor como «a», con «hacia» como alternativa aceptable.
  - severity: low
    issue: Falta la nota léxica alternativa presente en el rastro inglés
    rationale: El inglés preserva la alternativa «to Galilee». En español, dado que la redacción principal se corrige a «a Galilea», la alternativa útil pasa a ser «hacia Galilea», para conservar la posibilidad de un matiz de dirección sin recargar el texto principal.
  revised_spanish_text: Después de los dos días, salió de allí a Galilea[a].
