lexical_decisions:
- source_word: Μετὰ δὲ τὰς δύο ἡμέρας
  english_pob_choice: After the two days
  chosen_spanish: Después de los dos días
  alternatives_spanish:
  - Al cabo de los dos días
  - Pasados los dos días
  lexicon: μετά + acusativo; artículo con numeral
  rationale: μετά con acusativo expresa secuencia temporal, por lo que en español corresponde naturalmente a «después de». Mantengo «los dos días» para reflejar el artículo del griego y la referencia concreta al período inmediato anterior, sin volverlo más explícito que el original.
- source_word: ἐξῆλθεν
  english_pob_choice: he departed
  chosen_spanish: salió
  alternatives_spanish:
  - partió
  - se fue
  lexicon: ἐξέρχομαι
  rationale: El verbo griego significa literalmente «salir», y aquí se refiere al movimiento desde el lugar previo. En español, «salió» conserva esa fuerza sin añadir matices de viaje que el texto no exige. «Partió» sería posible, pero es menos directo respecto del verbo fuente.
- source_word: ἐκεῖθεν
  english_pob_choice: from there
  chosen_spanish: de allí
  alternatives_spanish:
  - de ese lugar
  - desde allí
  lexicon: ἐκεῖθεν
  rationale: El adverbio señala el punto de partida desde el lugar mencionado antes. «De allí» comunica bien esa referencia espacial y mantiene la naturalidad en español.
- source_word: εἰς τὴν Γαλιλαίαν
  english_pob_choice: for Galilee
  chosen_spanish: para Galilea
  alternatives_spanish:
  - a Galilea
  - hacia Galilea
  lexicon: εἰς + acusativo
  rationale: Aunque εἰς puede traducirse con «a», en este contexto de desplazamiento narrativo «para» reproduce bien la dirección del movimiento y sigue de cerca la opción inglesa auditada «for Galilee». «A Galilea» también sería válido, pero «para Galilea» suena más natural con «salió de allí» en español.
translation_notes:
  revision_awareness: El texto griego y la auditoría inglesa coinciden estrechamente; no se documentan variantes textuales ni revisiones significativas, y la versión española conserva esa sencillez narrativa sin añadir interpretación.
  spanish_consistency_notes:
  - Se mantuvo un registro narrativo sobrio y directo.
  - No se introdujo terminología eclesiástica innecesaria; el lugar se conserva como «Galilea».
  - La preposición final se ajustó a un español idiomático sin perder la dirección del movimiento expresada por εἰς.
