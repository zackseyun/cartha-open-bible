  rationale: Se cambia «para Galilea» por «a Galilea» porque refleja mejor el valor normal de εἰς en una cláusula de movimiento y suena más natural en español. Se añade una nota con la alternativa «hacia Galilea» para preservar el rango léxico sin introducir rigidez en el texto principal.
