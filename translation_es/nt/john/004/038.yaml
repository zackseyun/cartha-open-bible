review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: envío, siega/cosecha, trabajo previo de otros y participación posterior de los discípulos. Conserva también la ambigüedad de «otros». Sin embargo, «no habían trabajado» introduce un pluscuamperfecto que no corresponde bien a los perfectos griegos κεκοπιάκατε / κεκοπιάκασιν, y omite la relación implícita de «trabajar para eso / por ello» que el inglés POB explicitó con razón. Conviene ajustar a un perfecto compuesto en ambas cláusulas para mantener mejor la relevancia presente.'
  spanish_quality_summary: 'El español es claro y legible, con buen registro eclesial neutral. «Segar» funciona bien, aunque «cosechar» se mantiene correctamente en nota. La frase «han entrado en su labor» es fiel, pero puede sonar algo rígida; aun así, es aceptable y preferible por su cercanía al griego y a la decisión léxica auditada. El cambio principal necesario es verbal: «no han trabajado» suena más natural aquí que «no habían trabajado».'
  glossary_alignment: No hay conflictos con la terminología global del proyecto. Se preserva el campo léxico entre κοπιάω y κόπος mediante «trabajado / labor», aunque no de forma plenamente cognada. Eso es aceptable por naturalidad del español. También se mantiene la metáfora agrícola con «segar».
  issues:
  - severity: medium
    issue: Uso de pluscuamperfecto «no habían trabajado»
    rationale: El griego usa perfecto (κεκοπιάκατε), y el inglés POB lo refleja con present perfect («have not labored for»). En español, aquí conviene «no han trabajado» antes que «no habían trabajado», ya que el pluscuamperfecto introduce una anterioridad más marcada respecto de otro pasado, no requerida por el original.
  - severity: low
    issue: Falta la idea relacional de «por ello / para eso» tras «trabajado»
    rationale: El inglés POB añadió «for» para aclarar la relación entre el trabajo y la siega. En español puede expresarse naturalmente como «por lo cual» o dejarse implícito. Dado que «segar lo que no han trabajado» resulta entendible, no es error grave, pero una leve mejora puede hacerlo más claro sin apartarse del griego.
  revised_spanish_text: Yo los envié a ustedes a segar[a] lo que ustedes no han trabajado; otros han trabajado[b], y ustedes han entrado en su labor.
  revised_footnotes:
  - marker: a
    text: O «cosechar».
    reason: lexical_alternative
  - marker: b
    text: O «han entrado en el fruto de su labor» o «han participado en su trabajo». El griego dice más literalmente «han entrado en su labor».
    reason: lexical_alternative
  revision_rationale: Se revisa el tiempo verbal «no habían trabajado» a «no han trabajado» para alinearlo mejor con el perfecto griego y con la decisión auditada del English POB. Se conservan «segar» y «han entrado en su labor» por fidelidad a la metáfora agrícola y a la formulación más literal del griego.
