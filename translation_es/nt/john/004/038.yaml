translation:
  language: es
  text: Yo los envié a ustedes a segar[a] lo que ustedes no han trabajado; otros han trabajado[b], y ustedes han entrado en su labor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cosechar».
    reason: lexical_alternative
  - marker: b
    text: O «han entrado en el fruto de su labor» o «han participado en su trabajo». El griego dice más literalmente «han entrado en su labor».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέστειλα
  english_pob_choice: sent
  chosen_spanish: envié
  alternatives_spanish:
  - mandé
  - envié como mensajeros
  - comisioné
  lexicon: BDAG
  rationale: El aoristo indica una acción ya realizada; en español, «envié» reproduce bien el sentido de envío y misión sin forzar un tecnicismo. «Mandé» puede sonar más directivo y menos personal; «comisioné» es posible, pero más explicativo que el griego simple.
- source_word: θερίζειν
  english_pob_choice: to reap
  chosen_spanish: segar
  alternatives_spanish:
  - cosechar
  - recoger
  lexicon: BDAG
  rationale: Se mantiene la metáfora agrícola del verbo. «Segar» es el equivalente más directo de reaping y conserva el paralelismo con el trabajo previo. «Cosechar» es viable, pero en español puede sonar más general y menos ligado a la imagen de la siega.
- source_word: ὃ
  english_pob_choice: what
  chosen_spanish: lo que
  alternatives_spanish:
  - aquello que
  - lo cual
  lexicon: BDAG
  rationale: El relativo neutro sustantivado se expresa naturalmente en español con «lo que». Mantiene la referencia amplia y no añade especificación interpretativa.
- source_word: κεκοπιάκατε
  english_pob_choice: have not labored for
  chosen_spanish: no habían trabajado
  alternatives_spanish:
  - no habían laborado
  - no se habían fatigado
  lexicon: BDAG
  rationale: El perfecto destaca una acción anterior con relevancia presente; en español, el pluscuamperfecto «no habían trabajado» transmite bien la anterioridad respecto de la siega. «Laborado» conserva la raíz de «labor», pero suena menos natural; «fatigado» desplaza el énfasis hacia el cansancio, que no es el punto principal.
- source_word: ἄλλοι
  english_pob_choice: others
  chosen_spanish: otros
  alternatives_spanish:
  - otros más
  - algunos otros
  lexicon: BDAG
  rationale: «Otros» es la equivalencia natural y breve del sustantivo plural griego, sin identificar quiénes son esos otros.
- source_word: κεκοπιάκασιν
  english_pob_choice: have labored
  chosen_spanish: han trabajado
  alternatives_spanish:
  - han laborado
  - han trabajado arduamente
  lexicon: BDAG
  rationale: Se conserva el perfecto como acción cumplida con efecto presente. «Han trabajado» es claro y natural en español; «han laborado» mantiene más el campo léxico de κόπος, pero resulta más marcado y menos idiomático.
- source_word: εἰς τὸν κόπον αὐτῶν εἰσεληλύθατε
  english_pob_choice: you have entered into their labor
  chosen_spanish: han entrado en su labor
  alternatives_spanish:
  - han entrado en el fruto de su labor
  - han participado en su trabajo
  lexicon: BDAG
  rationale: El griego dice literalmente «han entrado en su labor/toil». En español, «entrado en su labor» conserva esa imagen y la relación con κόπος; se evita sustituirla por una interpretación como «el fruto» en el texto principal.
- source_word: ἐγὼ ... ὑμεῖς
  english_pob_choice: I ... you
  chosen_spanish: Yo ... ustedes
  alternatives_spanish:
  - Yo ... vosotros
  - yo ... ustedes
  lexicon: Greek grammar
  rationale: Los pronombres explícitos se mantienen para reflejar el énfasis del griego. Se usa «ustedes» por ser el español neutral latinoamericano y de lectura eclesial amplia.
- source_word: κόπον
  english_pob_choice: labor
  chosen_spanish: labor
  alternatives_spanish:
  - trabajo
  - esfuerzo
  lexicon: BDAG
  rationale: «Labor» conserva la conexión temática con κοπιάω, tal como en el inglés POB. Aunque «trabajo» es más común, debilita el vínculo léxico y retórico del versículo.
theological_decisions:
- issue: Identidad de «otros» en la metáfora de la siega
  english_pob_reading: The verse leaves the referent of 'others' broad; the translation preserves the agricultural metaphor and the ambiguity rather than specifying prophets, John the Baptist, Jesus, or earlier witnesses.
  chosen_spanish_reading: El texto mantiene abierta la referencia de «otros» y conserva la metáfora agrícola sin identificar a esos otros como profetas, Juan el Bautista, Jesús ni otros testigos previos.
  alternative_spanish_readings:
  - «otros» = los profetas
  - «otros» = Juan el Bautista
  - «otros» = el propio Jesús
  - «otros» = testigos anteriores en general
  rationale: La evidencia griega no nombra a los «otros», de modo que la traducción no debe cerrar la ambigüedad. Mantenerla evita introducir una interpretación que el versículo no exige.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El borrador sigue el paquete fuente más reciente (SBLGNT + auditoría inglesa POB) sin revisiones pendientes; no se detectan cambios posteriores en el registro provisto.
  spanish_consistency_notes:
  - Se usa «labor» para κόπος a fin de conservar la relación léxica con κοπιάω, como en el audit trail inglés.
  - Se usa «envié» para ἀπέστειλα por ser natural y fiel al acto de envío/misión en el contexto de Jesús.
  - Se mantiene la metáfora agrícola («segar») y la ambigüedad de «otros» sin especificación interpretativa.
  - Se emplea español neutral latinoamericano («ustedes») por consistencia con el estilo eclesial amplio del proyecto.
