translation:
  language: es
  text: '¿No dicen ustedes: “Todavía faltan cuatro meses, y luego viene la siega”? Miren, les digo: levanten sus ojos y vean los campos, que están blancos[a] para la siega ya.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘ya están maduras para la siega’. El griego dice ‘blancos’, conservando la imagen visual de la cosecha mientras también implica que están listas para la siega.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐχ ὑμεῖς λέγετε
  english_pob_choice: Do you not say
  chosen_spanish: ¿No dicen ustedes
  alternatives_spanish:
  - ¿No dicen
  - ¿No es esto lo que ustedes dicen
  lexicon: BDAG
  rationale: Conserva la pregunta negativa y el énfasis del ὑμεῖς con el pronombre explícito “ustedes”, sin forzar una duplicación demasiado pesada. En español, “¿No dicen ustedes…?” suena natural y mantiene el reproche implícito.
- source_word: Ἔτι τετράμηνός ἐστιν
  english_pob_choice: There are still four months
  chosen_spanish: Todavía faltan cuatro meses
  alternatives_spanish:
  - Aún quedan cuatro meses
  - Todavía son cuatro meses
  lexicon: BDAG
  rationale: La construcción existencial inglesa se vierte de manera idiomática en español con “faltan/quedan”. “Todavía faltan cuatro meses” preserva el intervalo restante sin volver literal una frase que en griego funciona de modo proverbial.
- source_word: ὁ θερισμὸς ἔρχεται
  english_pob_choice: the harvest comes
  chosen_spanish: la siega
  alternatives_spanish:
  - la cosecha viene
  - la siega llega
  lexicon: BDAG
  rationale: “Siega” comunica bien el campo semántico agrícola y suena natural en español bíblico actual. “Cosecha” es posible, pero “siega” mantiene mejor el matiz de recolección del fruto maduro; el verbo siguiente “viene” se sobreentiende en el ritmo de la cita.
- source_word: ἰδοὺ
  english_pob_choice: Look
  chosen_spanish: Miren
  alternatives_spanish:
  - Vean
  - Miren ustedes
  lexicon: BDAG
  rationale: Se traduce como marcador discursivo de atención. “Miren” es claro, moderno y mantiene la fuerza de llamada sin arcaísmo.
- source_word: ἐπάρατε τοὺς ὀφθαλμοὺς ὑμῶν
  english_pob_choice: lift up your eyes
  chosen_spanish: levanten sus ojos
  alternatives_spanish:
  - alcen sus ojos
  - miren hacia arriba
  lexicon: BDAG
  rationale: Se preserva la imagen corporal del original en vez de reducirla a “miren”. “Levanten sus ojos” reproduce la vivacidad de la expresión griega y queda bien en español.
- source_word: θεάσασθε
  english_pob_choice: see
  chosen_spanish: vean
  alternatives_spanish:
  - contemplen
  - observen
  lexicon: BDAG
  rationale: Aquí el verbo pide una observación intencional. “Vean” combina naturalidad y suficiencia; “contemplen” suena más marcado de lo necesario.
- source_word: τὰς χώρας
  english_pob_choice: the fields
  chosen_spanish: los campos
  alternatives_spanish:
  - las tierras
  - los terrenos
  lexicon: BDAG
  rationale: En contexto de cosecha, χώρας apunta a extensiones cultivadas. “Campos” es el equivalente más transparente y natural en español.
- source_word: λευκαί εἰσιν
  english_pob_choice: they are white
  chosen_spanish: están blancos
  alternatives_spanish:
  - son blancos
  - están blanqueados
  lexicon: BDAG
  rationale: Se conserva la imagen visual del griego, que la POB inglesa decidió mantener en vez de interpretar directamente como “maduros”. En español, “están blancos” preserva el color y la idea de estado visible; la posible implicación de madurez queda sin explicitar en el texto principal.
- source_word: πρὸς θερισμόν
  english_pob_choice: for harvest
  chosen_spanish: para la siega
  alternatives_spanish:
  - para la cosecha
  - listos para la siega
  lexicon: BDAG
  rationale: “Para la siega” conserva la metáfora agrícola y evita adelantar la explicación. “Listos para la siega” sería más interpretativo y sobreexplicaría el sentido.
- source_word: ἤδη
  english_pob_choice: already
  chosen_spanish: ya
  alternatives_spanish:
  - ya mismo
  - incluso ahora
  lexicon: BDAG
  rationale: “Ya” reproduce la fuerza temporal final y el contraste con “todavía faltan cuatro meses”. Colocado al final, mantiene el golpe retórico del original.
theological_decisions:
- issue: Mantener la imagen agrícola sin explicitarla como referencia directa a personas o misión
  english_pob_reading: Preserve the agricultural imagery without making the spiritual referent explicit in translation.
  chosen_spanish_reading: Conservar la imagen de la siega sin convertirla en una paráfrasis sobre personas o disposición espiritual.
  alternative_spanish_readings:
  - La gente ya está lista para ser recogida
  - Las personas están maduras para la misión
  rationale: El contexto joánico sugiere un sentido metafórico, pero el griego sigue hablando de campos, color blanco y siega. La traducción principal debe respetar esa imagen y dejar la inferencia al lector, tal como hace la POB inglesa.
  doctrine_reference: Translation philosophy items 1, 3, and 6
translation_notes:
  revision_awareness: Se siguió la versión inglesa auditada con acuerdo alto y sin revisiones aplicadas; se mantuvo la metáfora agrícola principal y la nota léxica sobre λευκαί εἰσιν, trasladándola a un español natural sin perder la tensión entre la imagen visual y la implicación de madurez.
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ como norma del proyecto solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se prefirió ‘siega’ sobre ‘cosecha’ para conservar mejor la imaginería bíblica y agrícola del pasaje.
  - Se mantuvo el pronombre explícito ‘ustedes’ para reflejar el ὑμεῖς enfático sin sobrerrecalcarlo.
  - La nota al pie se ancla en ‘están blancos’ para respetar la decisión inglesa de conservar el color en el texto principal.
