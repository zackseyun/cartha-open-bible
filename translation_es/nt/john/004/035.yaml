review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del griego y sigue la filosofía de preservar la imagen agrícola. Sin embargo, omite explícitamente el verbo de ὁ θερισμὸς ἔρχεται al traducir la cita proverbial como “Todavía faltan cuatro meses, y luego viene la siega” en el texto, mientras en las decisiones léxicas se registra solo “la siega”, lo que muestra cierta inconsistencia documental. Además, el anclaje de la nota [a] está mal colocado: en la POB inglesa la nota alternativa corresponde a “white”, no a “Do you not say”.'
  spanish_quality_summary: El español es claro y natural en registro bíblico moderno. No obstante, “¿No dicen ustedes...?” suena menos idiomático que “¿No dicen ustedes...?” solo si se mantiene la estructura completa con comillas; aquí funciona, pero conviene ajustar la nota al lugar correcto y hacer más fluida la cláusula causal/final con “que están blancos para la siega”. También es preferible evitar “disponibilidad para segar” en la nota, que suena técnico; “que están listas para la siega” es más natural.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. “Siega” es aceptable para θερισμός en este contexto. Se preserva bien λευκαί como “blancos” en vez de interpretar directamente “maduros”.
  issues:
  - severity: medium
    issue: Marcador de nota [a] anclado en la frase equivocada
    rationale: La nota explica λευκαί εἰσιν (‘blancos’ / ‘maduras’), pero en el borrador [a] aparece tras “ustedes”. Esto rompe la trazabilidad con la evidencia fuente y con la auditoría inglesa.
  - severity: low
    issue: La documentación léxica de ὁ θερισμὸς ἔρχεται no coincide plenamente con el texto español
    rationale: El texto dice “luego viene la siega”, que es correcto; pero la decisión léxica registrada como “la siega” omite el verbo. No invalida la traducción, pero conviene reflejar con precisión la elección aplicada.
  - severity: low
    issue: Redacción mejorable en la nota al pie
    rationale: “Disponibilidad para segar” suena poco natural en español e introduce una formulación más técnica de la necesaria. Puede expresarse con mayor claridad y fidelidad al inglés auditado.
