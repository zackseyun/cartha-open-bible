translation:
  language: es
  text: 'La mujer le dijo a él: «Señor[a], no tienes cubo y el pozo es hondo. ¿De dónde, pues, sacas el agua viva[b]?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «señor». El griego κύριε es una forma respetuosa de tratamiento y, según el contexto, puede significar «Señor» o «señor».
    reason: alternative_reading
  - marker: b
    text: O «agua corriente», es decir, agua fresca que fluye, en contraste con el agua estancada. La expresión también conserva el sentido más profundo sugerido en el dicho de Jesús.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει αὐτῷ
  english_pob_choice: said to him
  chosen_spanish: le dijo
  alternatives_spanish:
  - le dice
  lexicon: BDAG
  rationale: Aunque el griego usa presente histórico, en español narrativo resulta más natural el pasado simple. «Le dijo» conserva la función discursiva sin sonar forzado.
- source_word: ἡ γυνή
  english_pob_choice: the woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - la esposa
  lexicon: BDAG
  rationale: El contexto identifica a la samaritana junto al pozo; «mujer» es el equivalente directo y evita introducir el sentido de «esposa».
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Señora
  - Sire
  lexicon: BDAG
  rationale: En español bíblico contemporáneo, «Señor» es el equivalente habitual de κύριε como tratamiento respetuoso. En este diálogo puede funcionar también como fórmula de cortesía, sin exigir todavía una confesión plena de fe.
- source_word: ἄντλημα
  english_pob_choice: bucket
  chosen_spanish: cubo
  alternatives_spanish:
  - balde
  - vasija para sacar agua
  lexicon: BDAG
  rationale: El término designa un utensilio para sacar agua. «Cubo» es natural y claro en español general; «balde» sería una alternativa regional válida, y la perífrasis explica el objeto con más precisión pero menos naturalidad.
- source_word: τὸ φρέαρ
  english_pob_choice: the well
  chosen_spanish: el pozo
  alternatives_spanish:
  - la fuente
  - la cisterna
  lexicon: BDAG
  rationale: Aquí φρέαρ se refiere al pozo del que se saca agua. «Pozo» es la equivalencia precisa y más transparente en español.
- source_word: βαθύ
  english_pob_choice: deep
  chosen_spanish: hondo
  alternatives_spanish:
  - profundo
  - muy hondo
  lexicon: BDAG
  rationale: «Hondo» es idiomático para un pozo en español y mantiene el sentido de profundidad sin sonar técnico. «Profundo» también sería válido, pero en este contexto «hondo» resulta más natural.
- source_word: πόθεν οὖν
  english_pob_choice: So where
  chosen_spanish: ¿De dónde, pues?
  alternatives_spanish:
  - ¿De dónde entonces?
  - ¿De dónde, pues,?
  lexicon: BDAG
  rationale: πόθεν pregunta por procedencia u origen; οὖν marca inferencia. «¿De dónde, pues?» conserva esa relación lógica y suena natural en español interrogativo.
- source_word: τὸ ὕδωρ τὸ ζῶν
  english_pob_choice: the living water
  chosen_spanish: el agua viva
  alternatives_spanish:
  - el agua que vive
  - agua viva
  lexicon: BDAG
  rationale: La expresión puede referirse al agua corriente o fresca, pero en Juan también mantiene una resonancia teológica. «El agua viva» preserva esa doble posibilidad sin resolverla prematuramente.
theological_decisions:
- issue: Tratamiento de κύριος en la boca de la samaritana
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Señor como simple cortesía
  - señor = señor
  rationale: Se mantiene el equivalente estándar del proyecto. En este contexto puede ser un trato respetuoso y no necesariamente una confesión cristológica completa; el español «Señor» conserva esa ambigüedad contextual.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Conservar la tensión semántica de ὕδωρ τὸ ζῶν
  english_pob_reading: the living water
  chosen_spanish_reading: el agua viva
  alternative_spanish_readings:
  - agua corriente
  - agua fresca
  rationale: La frase puede aludir al agua corriente en sentido literal, pero en Juan también anticipa el significado simbólico que Jesús desarrollará. «El agua viva» mantiene la tensión entre lo literal y lo teológico.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés POB que corrigió la correlación a «neither ... nor». En español, la estructura «ni ... y ...» no reproduce exactamente esa corrección; por eso se optó por una redacción natural que conserva la negación correlativa sin forzar un calco, manteniendo el contraste entre la falta de utensilio y la profundidad del pozo.
  spanish_consistency_notes:
  - Se usó «Señor» para κύριε conforme al defecto del proyecto y se dejó la alternativa en nota.
  - «Agua viva» conserva la tensión literal/teológica del griego y del audit trail inglés.
  - No se transliteró ni se sustituyó «pozo» por un término más técnico; la escena requiere claridad inmediata en español.
  - Se prefirió «hondo» por naturalidad en español para un pozo, sin perder el valor de profundidad del adjetivo griego.
