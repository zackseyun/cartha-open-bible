revisions:
- from: 'La mujer le dijo[a]: «Señor, no tienes ni cubo[b], y el pozo es hondo. ¿De dónde, pues, tienes el agua viva?»'
  to: 'La mujer le dijo a él: «Señor[a], no tienes cubo y el pozo es hondo. ¿De dónde, pues, sacas el agua viva[b]?»'
  rationale: 'Se corrige el anclaje de notas para que [a] corresponda a κύριε y [b] a «agua viva». También se repara la redacción para expresar con español natural la objeción de la mujer: no tiene cubo y el pozo es hondo, por lo que pregunta de dónde saca esa agua. Se mantiene «Señor» y «agua viva» por fidelidad al POB y al doble sentido joánico.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:03:12Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: «la mujer le dijo», «pozo», «hondo» y «agua viva» están bien encaminados, y preserva la tensión de ὕδωρ τὸ ζῶν. Sin embargo, no reproduce adecuadamente la correlación negativa de οὔτε ... καί en este contexto auditado por el English POB como «neither ... nor». En español, «no tienes ni cubo, y el pozo es hondo» debilita la relación argumentativa; debe expresarse como «ni ... ni ...» o equivalente.'
  spanish_quality_summary: 'El español es generalmente natural y legible, pero hay dos problemas de calidad: (1) la nota [a] es defectuosa, porque da como alternativa «Señor», idéntica al texto principal, cuando la alternativa contextual real es «señor»/«usted, señor» o mejor explicada como tratamiento cortés; (2) la nota [b] está anclada en «cubo», pero su contenido explica «agua viva / agua corriente», así que el marcador está mal ubicado. Además, «cubo» es comprensible, pero «balde» sería regional y «recipiente para sacar agua» demasiado pesado; mantener «cubo» es aceptable.'
  glossary_alignment: La elección principal «Señor» para κύριε concuerda con el criterio del proyecto para κύριος en este contexto, siempre que la alternativa «señor» se conserve en nota. «Agua viva» también concuerda con la decisión teológica y lexical del POB. No hay conflicto con Yahvé/Mesías u otros términos del glosario.
  issues:
  - severity: medium
    issue: La correlación negativa está mal resuelta en el texto principal.
    rationale: 'El griego οὔτε ... καί aquí se ha auditado correctamente en inglés como una construcción correlativa equivalente a «neither ... nor». El español «no tienes ni cubo, y el pozo es hondo» usa «y» donde debe ir una relación negativa coordinada: «no tienes ni cubo ni el pozo es hondo» sería incorrecto por sentido, así que la forma natural es «no tienes cubo, y el pozo es hondo» o mejor «no tienes con qué sacarla, y el pozo es hondo». Pero dado el audit trail, la solución más fiel y clara es «no tienes cubo, y además el pozo es hondo» o reestructurar. Aquí conviene una reparación mínima que mantenga el argumento claro.'
  - severity: high
    issue: La nota [b] está anclada en la palabra equivocada.
    rationale: La nota [b] explica la alternativa de τὸ ὕδωρ τὸ ζῶν («agua corriente»), pero el marcador aparece junto a «cubo». Eso rompe la disciplina de notas exigida y confunde al lector.
  - severity: medium
    issue: La nota [a] no presenta una alternativa real.
    rationale: La nota dice «O «Señor»», que repite el texto principal. Debe reflejar la alternativa contextual «señor»/«Señor» como tratamiento cortés equivalente a «Sir», explicando la ambigüedad de κύριε en español.
  - severity: low
    issue: Una decisión lexical documenta alternativas inadecuadas para Κύριε.
    rationale: «Señora» y «Sire» no son alternativas contextualmente pertinentes para κύριε aquí. Aunque esto afecta más la documentación que el texto bíblico, conviene corregir la revisión textual y las notas; no hace falta adjudicación adicional.
  revised_spanish_text: 'La mujer le dijo a él: «Señor[a], no tienes cubo y el pozo es hondo. ¿De dónde, pues, sacas el agua viva[b]?»'
  revised_footnotes:
  - marker: a
    text: O «señor». El griego κύριε es una forma respetuosa de tratamiento y, según el contexto, puede significar «Señor» o «señor».
    reason: alternative_reading
  - marker: b
    text: O «agua corriente», es decir, agua fresca que fluye, en contraste con el agua estancada. La expresión también conserva el sentido más profundo sugerido en el dicho de Jesús.
    reason: lexical_alternative
  revision_rationale: 'Se corrige el anclaje de notas para que [a] corresponda a κύριε y [b] a «agua viva». También se repara la redacción para expresar con español natural la objeción de la mujer: no tiene cubo y el pozo es hondo, por lo que pregunta de dónde saca esa agua. Se mantiene «Señor» y «agua viva» por fidelidad al POB y al doble sentido joánico.'
