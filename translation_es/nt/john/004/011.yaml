base_translation:
  language: en
  yaml_path: translation/nt/john/004/011.yaml
  text: The woman said to him[a], “Lord, you have neither a bucket nor is the well deep[b]. So where do you get the living water?”
  footnotes:
  - marker: a
    text: Or “Sir.” The Greek κύριε is a respectful form of address and can mean either “Lord” or “Sir” depending on context.
    reason: alternative_reading
  - marker: b
    text: Or “running water,” that is, fresh flowing water as opposed to stagnant water. The wording also preserves the deeper sense intended in Jesus’ statement.
    reason: lexical_alternative
