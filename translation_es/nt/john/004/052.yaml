translation:
  language: es
  text: 'Así que les preguntó cuál había sido la hora en que había comenzado a mejorar. Entonces ellos le dijeron[a]: «Ayer, a la séptima hora, la fiebre lo dejó».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a la una de la tarde», si se cuenta desde la salida del sol; algunos entienden de otro modo el cómputo horario de Juan.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπύθετο
  english_pob_choice: he asked
  chosen_spanish: le preguntó
  alternatives_spanish:
  - le inquirió
  - preguntó
  lexicon: BDAG
  rationale: πυνθάνομαι expresa preguntar o averiguar; en este contexto, el padre solicita información a los sirvientes sobre el momento preciso, y «le preguntó» es natural y fiel.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - entonces
  - por tanto
  lexicon: BDAG
  rationale: Marca continuación narrativa e inferencia. «Así que» conserva la conexión con el versículo anterior con un español fluido.
- source_word: τὴν ὥραν
  english_pob_choice: the hour
  chosen_spanish: la hora
  alternatives_spanish:
  - el momento
  - el tiempo
  lexicon: BDAG
  rationale: ὥρα significa literalmente «hora» y aquí apunta al momento exacto de la mejoría; se conserva el término para mantener la correspondencia con la respuesta siguiente.
- source_word: παρ’ αὐτῶν
  english_pob_choice: them
  chosen_spanish: le
  alternatives_spanish:
  - a ellos
  - de ellos
  lexicon: BDAG
  rationale: La preposición con genitivo expresa procedencia/source, pero en español la construcción verbal con «preguntar» se vuelve más natural con un dativo indirecto, sin perder el sentido de que la información proviene de ellos.
- source_word: ἐν ᾗ
  english_pob_choice: at which
  chosen_spanish: en que
  alternatives_spanish:
  - cuando
  - a la cual
  lexicon: BDAG
  rationale: La relativa vincula la pregunta con una hora específica. «En que» refleja mejor la forma griega que una paráfrasis más libre.
- source_word: κομψότερον ἔσχεν
  english_pob_choice: he began to get better
  chosen_spanish: había comenzado a mejorar
  alternatives_spanish:
  - empezó a mejorar
  - se estaba mejorando
  lexicon: BDAG
  rationale: El idiomatismo describe el inicio de la mejoría. «Había comenzado a mejorar» comunica ese valor ingresivo con naturalidad en español.
- source_word: εἶπαν οὖν
  english_pob_choice: Then they said
  chosen_spanish: Entonces ellos le dijeron
  alternatives_spanish:
  - Y le dijeron
  - Así que le dijeron
  lexicon: BDAG
  rationale: Retoma la narración con la respuesta de los sirvientes. «Entonces» conserva la secuencia narrativa; se explicita el pronombre indirecto por claridad.
- source_word: Ἐχθὲς
  english_pob_choice: Yesterday
  chosen_spanish: Ayer
  alternatives_spanish:
  - el día de ayer
  lexicon: BDAG
  rationale: Adverbio temporal directo y sin ambigüedad.
- source_word: ὥραν ἑβδόμην
  english_pob_choice: the seventh hour
  chosen_spanish: a la séptima hora
  alternatives_spanish:
  - a la hora séptima
  - a eso de la séptima hora
  lexicon: BDAG
  rationale: Se mantiene la designación literal de la hora para no resolver en el texto principal la cuestión del cómputo horario.
- source_word: ἀφῆκεν αὐτὸν ὁ πυρετός
  english_pob_choice: the fever left him
  chosen_spanish: la fiebre lo dejó
  alternatives_spanish:
  - la fiebre lo abandonó
  - la fiebre se le fue
  lexicon: BDAG
  rationale: ἀφίημι aquí significa dejar o apartarse. «La fiebre lo dejó» conserva el sujeto gramatical y el sentido idiomático de manera natural.
theological_decisions:
- issue: Cómputo de la séptima hora
  english_pob_reading: Retain the literal expression 'the seventh hour' in the main text without converting it to a modern equivalent.
  chosen_spanish_reading: Conservar «la séptima hora» sin convertirla en una hora moderna.
  alternative_spanish_readings:
  - aproximadamente la una de la tarde si se cuenta desde la salida del sol
  - aproximadamente las siete de la noche si se sigue el cómputo romano
  rationale: El pasaje no especifica el sistema horario. Mantener la expresión literal preserva la ambigüedad histórica y no resuelve más de lo que el texto dice.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente al expresar la mejoría como inicio de proceso («había comenzado a mejorar») y se mantuvo la ambigüedad sobre el cómputo de la hora. La nota se ancló correctamente en el texto con [a].
  spanish_consistency_notes:
  - Se conserva «hora» para ὥρα, coherente con la respuesta del versículo.
  - Se usa «fiebre» como sujeto de ἀφῆκεν, manteniendo la estructura griega.
  - No se emplea «SEÑOR» ni otros términos de sustitución porque no aparecen en este versículo.
