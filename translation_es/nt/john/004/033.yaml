revisions:
- from: 'Así que los discípulos se decían unos a otros[a]: «¿Acaso alguien le habrá llevado algo para comer?».'
  to: 'Entonces los discípulos se decían unos a otros[a]: «¿Acaso alguien le trajo algo para comer?»'
  rationale: Se ajusta la traducción para evitar el matiz especulativo de «habrá llevado» y reflejar de forma más directa el aoristo griego con «trajo». Se mejora la nota al pie para que ofrezca una alternativa real y explique el valor de μή. También se normaliza la puntuación española.
