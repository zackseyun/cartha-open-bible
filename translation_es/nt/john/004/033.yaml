translation:
  language: es
  text: 'Entonces los discípulos se decían unos a otros[a]: «¿Acaso alguien le trajo algo para comer?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Seguramente nadie le trajo algo para comer, ¿verdad?». La pregunta griega con μή espera una respuesta negativa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγον
  english_pob_choice: were saying
  chosen_spanish: se decían
  alternatives_spanish:
  - decían
  - estaban diciendo
  lexicon: BDAG
  rationale: El imperfecto griego expresa una acción en desarrollo o repetida; «se decían» conserva ese matiz de conversación en curso mejor que un perfecto simple como «dijeron».
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - por tanto
  - entonces
  lexicon: BDAG
  rationale: οὖν marca continuidad/inferencia narrativa. «Así que» funciona naturalmente en español y mantiene la conexión con el contexto inmediato.
- source_word: μαθηταὶ
  english_pob_choice: disciples
  chosen_spanish: los discípulos
  alternatives_spanish:
  - los seguidores
  lexicon: BDAG
  rationale: «Discípulos» es el equivalente preciso y ya establecido para μαθηταί en Juan.
- source_word: πρὸς ἀλλήλους
  english_pob_choice: to one another
  chosen_spanish: unos a otros
  alternatives_spanish:
  - entre sí
  - el uno al otro
  lexicon: BDAG
  rationale: La frase indica habla recíproca dentro del grupo; «unos a otros» es una forma natural y clara en español.
- source_word: Μή τις
  english_pob_choice: Has anyone ...?
  chosen_spanish: ¿Acaso alguien ...?
  alternatives_spanish:
  - ¿No será que alguien ...?
  - ¿Habrá alguien que ...?
  lexicon: BDAG
  rationale: La combinación μή τις introduce una pregunta que espera respuesta negativa. En español, una interrogación con «acaso» transmite bien esa apertura con expectativa negativa sin convertirla en una afirmación cerrada.
- source_word: ἤνεγκεν
  english_pob_choice: brought
  chosen_spanish: le habrá llevado
  alternatives_spanish:
  - le llevó
  - le trajo
  lexicon: BDAG
  rationale: El aoristo de φέρω aquí se refiere a llevar comida a Jesús. «Le habrá llevado» conserva la idea de posible acción pasada implícita en la pregunta y suena natural en español.
- source_word: αὐτῷ
  english_pob_choice: him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El dativo indirecto se expresa de manera natural con el pronombre átono «le» en español.
- source_word: φαγεῖν
  english_pob_choice: something to eat
  chosen_spanish: algo para comer
  alternatives_spanish:
  - algo que comer
  - comida
  lexicon: BDAG
  rationale: El infinitivo expresa la acción de comer dependiente de «llevar». «Algo para comer» es idiomático en español y refleja bien el sentido contextual sin añadir información excesiva.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del texto base inglés, que evitó la pregunta con etiqueta negativa y prefirió una pregunta abierta compatible con μή τις; por eso el español usa una formulación interrogativa abierta con expectativa negativa implícita. También se siguió el ajuste de «something to eat» en vez de «anything to eat», reflejado aquí como «algo para comer».
  spanish_consistency_notes:
  - Se mantuvo «discípulos» para μαθηταί, en línea con el uso estándar del evangelio.
  - Se evitó «SEÑOR» u otras formas de sustitución, porque en este versículo no aparece el nombre divino ni κύριος.
  - La puntuación y la comilla inicial reflejan una cita directa breve, con la nota al pie anclada en la pregunta para conservar la alternativa de lectura.
