revisions:
- from: 'Y al llegar a este punto sus discípulos vinieron[a], y se maravillaban de que él hablara con una mujer. Sin embargo, nadie dijo: «¿Qué buscas?» o[b] «¿Qué le hablas con ella?»'
  to: 'Y en ese momento llegaron sus discípulos, y se asombraban de que él hablara con una mujer. Sin embargo, nadie dijo: «¿Qué buscas[a]?», o: «¿Por qué hablas con ella?[b]»'
  rationale: Se ajusta ἐπὶ τούτῳ a un marcador temporal natural en español («en ese momento»), se mejora la fluidez narrativa («llegaron sus discípulos»), y se corrige la segunda pregunta para reflejar el sentido pragmático documentado por el POB («¿Por qué hablas con ella?»), preservando la literalidad en nota sin añadir un «le» inexistente en el griego. Se mantiene «una mujer» y el tono sobrio del versículo.
