review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el sentido general del versículo: llegada de los discípulos, asombro, y silencio concesivo. Sin embargo, falla en varios puntos de fidelidad fina al griego y al rastro de auditoría inglés. «Y al llegar a este punto» desplaza ἐπὶ τούτῳ de un marcador temporal narrativo a una construcción poco natural que sugiere la llegada como sujeto de la acción. «Vinieron» es posible, pero con «sus discípulos» suena menos natural que «llegaron». Más grave, «¿Qué le hablas con ella?» no preserva el sentido documentado de τί λαλεῖς μετ’ αὐτῆς; el propio audit trail inglés estableció que el sentido en lengua receptora debe ser «¿Por qué hablas con ella?», dejando la literalidad en nota. También hay desajuste entre el texto y la nota b: la nota dice que lo literal es «¿Qué le hablas con ella?», pero el griego no contiene «le».'
  spanish_quality_summary: El español necesita reparación para sonar natural y digno. «Y al llegar a este punto sus discípulos vinieron» es torpe; «En ese momento llegaron sus discípulos» fluye mejor y expresa el valor temporal. «Se maravillaban» es aceptable, pero «se asombraron» o «estaban asombrados» suena más natural en español contemporáneo; aun así, mantener imperfecto también es defendible. La forma «de que él hablara» es gramatical, pero en registro bíblico moderno «de que él estaba hablando» o «de que hablaba» refleja mejor la acción en curso. La pregunta «¿Qué le hablas con ella?» es español deficiente. Debe corregirse a «¿Por qué hablas con ella?» con la literalidad relegada a nota, como ya hizo el inglés POB.
  glossary_alignment: 'No hay términos teológicos sensibles del glosario principal en este versículo. Las decisiones relevantes son discursivas y léxicas: ἐπὶ τούτῳ debe expresarse temporalmente; γυνή como «una mujer» está bien; λαλέω puede ser «hablar»; μέντοι se representa bien con «sin embargo» o «pero». La nota de ζητεῖς puede conservar «¿Qué quieres?» como alternativa idiomática. La nota de la segunda pregunta debe explicar la literalidad griega sin introducir un dativo inexistente.'
  issues:
  - severity: medium
    issue: «Y al llegar a este punto sus discípulos vinieron» suena antinatural y desajusta el valor temporal de ἐπὶ τούτῳ.
    rationale: 'La expresión griega marca el momento narrativo: «en ese momento», «justo entonces». El borrador convierte la frase en una estructura más pesada y menos idiomática.'
  - severity: high
    issue: «¿Qué le hablas con ella?» es una traducción española defectuosa y no refleja adecuadamente el sentido establecido para τί λαλεῖς μετ’ αὐτῆς.
    rationale: El audit trail inglés ya resolvió que la formulación natural en la lengua meta debe ser «Why are you speaking with her?». En español, «¿Por qué hablas con ella?» es la opción fiel y legible. La literalidad debe ir en nota.
  - severity: medium
    issue: La nota b introduce «le», elemento no presente en el griego.
    rationale: μετ’ αὐτῆς significa «con ella», no «a ella / le». La nota debe preservar la rareza literal sin añadir objetos indirectos inexistentes.
  - severity: low
    issue: «Vinieron» con sujeto pospuesto es posible, pero «llegaron sus discípulos» es más natural en español narrativo aquí.
    rationale: Mejora la legibilidad sin alterar el sentido.
  revised_spanish_text: 'Y en ese momento llegaron sus discípulos, y se asombraban de que él hablara con una mujer. Sin embargo, nadie dijo: «¿Qué buscas[a]?», o: «¿Por qué hablas con ella?[b]»'
  revised_footnotes:
  - marker: a
    text: 'O: «¿Qué quieres?» para «¿Qué buscas?»'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente, «¿Qué hablas con ella?». El sentido es: «¿Por qué hablas con ella?»'
    reason: lexical_alternative
