translation:
  language: es
  text: 'Y en ese momento llegaron sus discípulos, y se asombraban de que él hablara con una mujer. Sin embargo, nadie dijo: «¿Qué buscas[a]?», o: «¿Por qué hablas con ella?[b]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Qué quieres?» para «¿Qué buscas?»'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente, «¿Qué hablas con ella?». El sentido es: «¿Por qué hablas con ella?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπὶ τούτῳ
  english_pob_choice: at this point
  chosen_spanish: a este punto
  alternatives_spanish:
  - en ese momento
  - justo entonces
  - a estas alturas
  lexicon: BDAG
  rationale: La expresión temporal se entiende como marcación narrativa de momento, no espacial. «A este punto» conserva la inmediatez del pasaje con español natural y sin añadir interpretación.
- source_word: ἦλθαν
  english_pob_choice: came
  chosen_spanish: vinieron
  alternatives_spanish:
  - llegaron
  - vinieron y llegaron
  lexicon: BDAG
  rationale: «Vinieron» comunica el movimiento de llegada al escena de manera directa y fluida; «llegaron» también sería posible, pero aquí el verbo de venir mantiene mejor la secuencia narrativa.
- source_word: ἐθαύμαζον
  english_pob_choice: they were amazed
  chosen_spanish: se maravillaban
  alternatives_spanish:
  - estaban asombrados
  - se asombraban
  - se quedaban asombrados
  lexicon: BDAG
  rationale: El imperfecto expresa reacción prolongada; «se maravillaban» conserva el aspecto y una tonalidad sobria. Evita intensificar innecesariamente el término.
- source_word: μετὰ γυναικὸς
  english_pob_choice: with a woman
  chosen_spanish: con una mujer
  alternatives_spanish:
  - con la mujer
  - con una esposa/mujer
  lexicon: BDAG
  rationale: La forma anártica de γυνή aquí es indefinida; por eso se traduce «una mujer», sin convertirla en «esposa» ni cargarla con otra precisión que el griego no pide.
- source_word: ἐλάλει
  english_pob_choice: he was speaking
  chosen_spanish: hablara
  alternatives_spanish:
  - hablaba
  - estuviera hablando
  - estaba hablando
  lexicon: BDAG
  rationale: 'El imperfecto indica acción en curso; en español, el subjuntivo imperfecto en la subordinada con «de que» reproduce bien la situación observada por los discípulos: que él estaba hablando con una mujer.'
- source_word: μέντοι
  english_pob_choice: yet
  chosen_spanish: Sin embargo
  alternatives_spanish:
  - no obstante
  - pero
  lexicon: BDAG
  rationale: Introduce contraste concesivo entre su sorpresa y su silencio. «Sin embargo» es natural en español moderno y mantiene la fuerza del marcador discursivo.
- source_word: Τί ζητεῖς;
  english_pob_choice: What are you seeking?
  chosen_spanish: ¿Qué buscas?[a]
  alternatives_spanish:
  - ¿Qué estás buscando?
  - ¿Qué quieres?
  lexicon: BDAG
  rationale: «Buscar» es el equivalente más cercano y transparente para ζητέω en este contexto. Se conserva la pregunta abierta del griego, y se ancla una nota porque el sentido pragmático puede ser «¿Qué quieres?».
- source_word: τί λαλεῖς μετ’ αὐτῆς;
  english_pob_choice: Why are you speaking with her?
  chosen_spanish: ¿Qué le hablas con ella?[b]
  alternatives_spanish:
  - ¿Por qué hablas con ella?
  - ¿Qué dices con ella?
  - ¿De qué le hablas?
  lexicon: BDAG
  rationale: 'Se mantiene la cercanía a la forma griega con λαλέω y μετά + genitivo, pero el español requiere una formulación menos literal para ser comprensible. La nota preserva la alternativa interpretativa: el sentido pragmático es «¿Por qué hablas con ella?».'
theological_decisions:
- issue: La sorpresa de los discípulos ante Jesús hablando con una mujer
  english_pob_reading: Render the disciples' reaction as surprise without importing an explicit moral or ethnic explanation into the main text.
  chosen_spanish_reading: Presentar la reacción como asombro/maravilla sin añadir en el texto principal una explicación social explícita.
  alternative_spanish_readings:
  - explicitar el tabú judío-samaritano o varón-mujer en el versículo
  - convertir la observación en una censura moral
  rationale: El griego solo afirma que se maravillaban de que él hablara con una mujer. La traducción preserva esa contención y no añade explicación histórica que el versículo mismo no formula.
  doctrine_reference: 'Principio de equivalencia óptima: no introducir en el texto principal inferencias que pertenecen al trasfondo y no a la formulación del versículo.'
translation_notes:
  revision_awareness: 'Se corrigió la validación previa asegurando que cada marcador de nota aparece exactamente en el texto español: [a] en «¿Qué buscas?[a]» y [b] en «¿Qué le hablas con ella?[b]». No se dejaron notas sin anclaje.'
  spanish_consistency_notes:
  - Se usó «mujer» y no «esposa» porque el contexto exige una referencia indefinida.
  - Se evitó «SEÑOR» porque este versículo no contiene el nombre divino ni una cita de κύριος.
  - Se mantuvo un tono sobrio y bíblico sin calco rígido del inglés.
  - El orden de las preguntas refleja la secuencia del griego y la del texto auditado en inglés.
