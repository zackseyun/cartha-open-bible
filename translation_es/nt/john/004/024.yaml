translation:
  language: es
  text: Dios es espíritu[a][b], y los que lo adoran deben adorarlo en espíritu y en verdad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Dios es espíritu» expresa la naturaleza de Dios; no significa simplemente que Dios sea un ser espiritual entre otros.
    reason: lexical_alternative
  - marker: b
    text: 'O: «en el Espíritu y en verdad». El griego puede entenderse de manera más específica, pero la redacción aquí conserva el sentido más amplio de la expresión.'
    reason: alternative_reading
lexical_decisions:
- source_word: πνεῦμα
  english_pob_choice: spirit
  chosen_spanish: espíritu
  alternatives_spanish:
  - Espíritu
  lexicon: BDAG
  rationale: El griego usa un predicado anartro antes de ὁ θεός, lo que en el audit trail inglés se entiende de manera cualitativa. En español, «Dios es espíritu» comunica esa cualidad/naturaleza mejor que «Dios es un espíritu», que lo haría sonar como uno entre varios seres espirituales. Se mantiene la minúscula porque aquí no se refiere de forma explícita al Espíritu Santo.
- source_word: ὁ θεός
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: BDAG
  rationale: La referencia es al Dios verdadero y el español bíblico natural omite el artículo en este tipo de enunciado predicativo. «Dios» preserva la identidad divina sin forzar una estructura menos idiomática.
- source_word: προσκυνοῦντας
  english_pob_choice: those who worship
  chosen_spanish: los que lo adoran
  alternatives_spanish:
  - los que adoran
  - quienes lo adoran
  lexicon: BDAG
  rationale: El participio con artículo funciona sustantivadamente. «Los que lo adoran» es natural en español y conserva el valor general/continuo del grupo de adoradores.
- source_word: ἐν πνεύματι
  english_pob_choice: in spirit
  chosen_spanish: en espíritu
  alternatives_spanish:
  - en el Espíritu
  - en el espíritu
  lexicon: BDAG
  rationale: El audit trail inglés preserva la amplitud de la frase y evita restringirla de entrada al Espíritu Santo. En español, «en espíritu» mantiene esa amplitud y sigue siendo la opción más sobria para la publicación; la lectura con mayúscula queda como alternativa interpretativa.
- source_word: ἀληθείᾳ
  english_pob_choice: truth
  chosen_spanish: verdad
  alternatives_spanish:
  - verdaderamente
  - realidad
  lexicon: BDAG
  rationale: «Verdad» es la equivalencia directa y más estable en español para este contexto joánico, conservando el peso revelacional y factual del término.
- source_word: δεῖ
  english_pob_choice: must
  chosen_spanish: deben
  alternatives_spanish:
  - tiene que
  - es necesario que
  lexicon: BDAG
  rationale: El verbo de necesidad/obligación se expresa de forma natural con «deben» en español cuando el sujeto es plural («los que lo adoran»). Mantiene la fuerza obligatoria sin sobrecargar la frase.
- source_word: προσκυνεῖν
  english_pob_choice: worship
  chosen_spanish: adorarlo
  alternatives_spanish:
  - adorar
  - rendirle adoración
  lexicon: BDAG
  rationale: En este contexto, el verbo expresa adoración religiosa. En español, «adorar» comunica esa práctica de manera directa y digna. El objeto pronominal retoma a Dios con claridad, y el segundo infinitivo se mantiene en paralelo con el primero.
theological_decisions:
- issue: Sentido de «Dios es espíritu»
  english_pob_reading: A qualitative statement about God's nature, not 'God is a spirit' as one being among other spirits.
  chosen_spanish_reading: Una afirmación cualitativa sobre la naturaleza de Dios, no «Dios es un espíritu» como si fuera un ser entre otros seres espirituales.
  alternative_spanish_readings:
  - Dios es un espíritu
  rationale: La ausencia del artículo en πνεῦμα favorece una lectura cualitativa. En español, la formulación sin artículo protege esa fuerza y evita una lectura clasificatoria indebida.
  doctrine_reference: Credo Niceno-Constantinopolitano (381); primacía del texto original y preservación de la tensión teológica.
- issue: Sentido de «en espíritu y en verdad»
  english_pob_reading: Worship must be characterized by spiritual reality and truth, without specifying more than the text states about the Holy Spirit.
  chosen_spanish_reading: La adoración debe caracterizarse por realidad espiritual y verdad, sin precisar más de lo que el texto dice acerca del Espíritu Santo.
  alternative_spanish_readings:
  - en el Espíritu y en verdad
  - con sinceridad y verdad
  rationale: El griego anartro permite una amplitud que no conviene estrechar prematuramente. La traducción conserva la posibilidad de una referencia más específica, pero no la impone en el texto principal.
  doctrine_reference: Principio de preservar la tensión teológica sin resolverla más allá del texto.
translation_notes:
  revision_awareness: 'No se introdujeron cambios de revisión respecto del último pase inglés; el consenso del auditor confirma alta concordancia. La redacción española sigue el mismo marco interpretativo: lectura cualitativa de «espíritu» y amplitud de «en espíritu y en verdad».'
  spanish_consistency_notes:
  - Se mantiene «Dios» y no «Señor», porque el versículo no usa κύριος para el referente divino principal.
  - Se conserva «espíritu» en minúscula para reflejar el valor cualitativo, no una identificación con el Espíritu Santo en el texto principal.
  - «Adorar» se usa como equivalente contextual de προσκυνέω, sin añadir una paráfrasis explicativa.
  - La nota al pie marca la alternativa interpretativa sobre «en el Espíritu», siguiendo el audit trail inglés y sin resolver la ambigüedad en el cuerpo principal.
