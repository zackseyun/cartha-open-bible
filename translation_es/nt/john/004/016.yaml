translation:
  language: es
  text: 'Él le dijo[a]: «Ve, llama a tu esposo y ven aquí».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «le dice»; el griego usa un presente histórico, un rasgo narrativo común que en español normalmente se vierte con pasado para sonar natural.
    reason: lexical_alternative
lexical_decisions:
- source_word: Λέγει
  english_pob_choice: He said
  chosen_spanish: le dijo
  alternatives_spanish:
  - le dice
  lexicon: BDAG / valor narrativo del presente histórico
  rationale: El griego usa presente histórico en narración. En español, para un relato natural y fluido, el pasado simple «dijo» comunica la misma función narrativa sin perder el sentido del original.
- source_word: αὐτῇ
  english_pob_choice: to her
  chosen_spanish: le
  alternatives_spanish:
  - a ella
  lexicon: BDAG
  rationale: 'El dativo de destinatario se expresa de forma natural en español con pronombre átono indirecto: «le». Mantiene la referencia directa y evita una repetición pesada.'
- source_word: Ὕπαγε
  english_pob_choice: Go
  chosen_spanish: Ve
  alternatives_spanish:
  - Vete
  - Anda
  lexicon: BDAG
  rationale: El imperativo de ὑπάγω aquí introduce una orden/instrucción breve. «Ve» es conciso, natural y fiel; «vete» podría sonar más marcado como alejamiento reflexivo, y «anda» sería más coloquial.
- source_word: φώνησον
  english_pob_choice: call
  chosen_spanish: llama
  alternatives_spanish:
  - suma
  - manda llamar
  lexicon: BDAG
  rationale: φωμέω aquí tiene el valor de llamar o hacer venir a alguien. «Llama» es el equivalente español más directo y normal; «manda llamar» añade explicitud no presente en el griego.
- source_word: τὸν ἄνδρα σου
  english_pob_choice: your husband
  chosen_spanish: tu esposo
  alternatives_spanish:
  - tu marido
  - tu hombre
  lexicon: BDAG
  rationale: Aunque ἀνήρ puede significar «hombre», el contexto doméstico muestra claramente el sentido de esposo. «Esposo» es preciso y sobrio; «marido» también sería válido, pero «esposo» suena más neutro en español contemporáneo.
- source_word: ἐλθὲ
  english_pob_choice: come
  chosen_spanish: ven
  alternatives_spanish:
  - ven acá
  - regresa
  lexicon: BDAG
  rationale: ἔρχομαι en imperativo aoristo se traduce con el mandato simple «ven». «Ven acá» es posible, pero «ven» ya queda completado por el adverbio siguiente.
- source_word: ἐνθάδε
  english_pob_choice: here
  chosen_spanish: acá
  alternatives_spanish:
  - aquí
  - a este lugar
  lexicon: BDAG
  rationale: ἐνθάδε significa «aquí / acá». «Acá» mantiene bien la orientación espacial hacia el lugar del hablante y suena natural en español latinoamericano.
theological_decisions:
- issue: 'ἄνδρα σου: ¿«hombre» o «esposo»?'
  english_pob_reading: your husband
  chosen_spanish_reading: tu esposo
  alternative_spanish_readings:
  - tu hombre
  rationale: No hay tensión teológica, pero sí una decisión léxica importante. El contexto inmediato y la traducción inglesa auditable entienden ἄνδρα como «husband», no como «man». Por eso se evita «hombre», que en español sería ambiguo y oscurecería la escena.
  doctrine_reference: Contexto narrativo inmediato; BDAG para ἀνήρ
translation_notes:
  revision_awareness: La fuente griega y el audit trail inglés están en alta concordancia. No se aplicaron revisiones; se preservó el presente histórico en una nota y se optó por un español natural sin ampliar el sentido del mandato.
  spanish_consistency_notes:
  - Se mantiene el trato de segunda persona singular implícito en el diálogo directo.
  - «Acá» se usa por estilo latinoamericano; podría alternar con «aquí» sin cambio de sentido.
  - «Esposo» se eligió por claridad contextual y coherencia con la decisión inglesa auditada de ‘your husband’.
