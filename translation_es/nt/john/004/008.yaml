translation:
  language: es
  text: Porque sus discípulos habían ido a la ciudad[a] para comprar comida[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al pueblo»; πόλις puede traducirse «ciudad» o, según el contexto, «pueblo».
    reason: lexical_alternative
  - marker: b
    text: O «para comprar provisiones».
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: γάρ introduce una explicación causal o de apoyo al relato anterior; en español, «Porque» comunica con naturalidad esa conexión explicativa.
- source_word: μαθηταὶ αὐτοῦ
  english_pob_choice: his disciples
  chosen_spanish: sus discípulos
  alternatives_spanish:
  - los discípulos de él
  lexicon: BDAG
  rationale: La relación posesiva se expresa de forma natural en español con «sus discípulos», sin añadir énfasis innecesario.
- source_word: ἀπεληλύθεισαν
  english_pob_choice: had gone away
  chosen_spanish: habían ido
  alternatives_spanish:
  - habían partido
  - se habían ido
  lexicon: BDAG
  rationale: El pluscuamperfecto marca acción anterior a la escena principal; «habían ido» conserva el valor anterior y suena idiomático en español. «Se habían ido» también es posible, pero «habían ido» mantiene la referencia al destino que sigue.
- source_word: εἰς τὴν πόλιν
  english_pob_choice: into the city
  chosen_spanish: a la ciudad
  alternatives_spanish:
  - a la urbe
  - a la población
  - al pueblo
  lexicon: BDAG
  rationale: Aunque εἰς puede sugerir «hacia/into», aquí el movimiento tiene como meta la ciudad; «a la ciudad» es el español más natural y no sobrecarga la imagen espacial. Se conserva la alternativa «ciudad» frente a «pueblo/town» como decisión contextual.
- source_word: ἵνα
  english_pob_choice: to
  chosen_spanish: para
  alternatives_spanish:
  - a fin de
  - con el fin de
  lexicon: BDAG
  rationale: ἵνα expresa propósito; en español, «para» es la forma más natural y precisa para introducir el fin de la acción.
- source_word: τροφὰς
  english_pob_choice: food
  chosen_spanish: alimento
  alternatives_spanish:
  - comida
  - provisiones
  lexicon: BDAG
  rationale: τροφάς puede referirse a comida/alimento o provisiones. «Alimento» mantiene un registro digno y amplio; «provisiones» es una alternativa válida si se desea enfatizar compras de abastecimiento.
- source_word: ἀγοράσωσιν
  english_pob_choice: buy
  chosen_spanish: comprar
  alternatives_spanish:
  - adquirir
  - comprar provisiones
  lexicon: BDAG
  rationale: El verbo de finalidad indica la acción de obtener mediante compra; «comprar» es la equivalencia directa y clara en español.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el griego SBLGNT y armoniza con el auditable English POB: conserva la conexión explicativa de γάρ, el pluscuamperfecto de ἀπεληλύθεισαν, el valor final de ἵνα y la ambigüedad lexical de τροφάς con nota alternativa. No se documentan revisiones textuales o teológicas adicionales en el paquete de referencia.'
  spanish_consistency_notes:
  - Se usa «discípulos» en plural con posesivo natural («sus discípulos»).
  - Se mantiene «ciudad» en el texto principal, con nota para la alternativa contextual «pueblo».
  - «Alimento» se eligió por su amplitud semántica y registro neutro; la nota conserva «provisiones» como alternativa auditable.
  - La puntuación sigue el orden narrativo del griego y la sintaxis española moderna.
