base_translation:
  language: en
  yaml_path: translation/nt/john/004/010.yaml
  text: Jesus answered and said to her[a], “If you knew the gift of God, and who it is who says to you, ‘Give me a drink,’ you would have asked him, and he would have given you living water.”
  footnotes:
