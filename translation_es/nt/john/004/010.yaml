translation:
  language: es
  text: 'Jesús le respondió y le dijo: «Si conocieras el don de Dios y quién es el que te dice: “Dame de beber”, tú le habrías pedido, y él te habría dado agua viva[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «agua corriente» o «agua fresca»; la expresión puede referirse al agua que fluye, pero «agua viva» preserva el doble sentido que Jesús quiere en este pasaje.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: BDAG
  rationale: En español, «respondió» comunica con naturalidad el verbo narrativo de réplica y conserva la relación con la pregunta implícita del contexto. «Contestó» sería posible, pero «respondió» encaja mejor con el registro bíblico actual sin sonar arcaico.
- source_word: εἶπεν
  english_pob_choice: said
  chosen_spanish: y le dijo
  alternatives_spanish:
  - y dijo
  - y le habló
  lexicon: BDAG
  rationale: El doblete griego ἀπεκρίθη... καὶ εἶπεν se conserva de manera natural con «respondió y le dijo». Mantener ambos verbos refleja el énfasis narrativo sin calco pesado.
- source_word: δωρεὰν
  english_pob_choice: gift
  chosen_spanish: don
  alternatives_spanish:
  - regalo
  - obsequio
  lexicon: BDAG
  rationale: «Don» preserva bien el matiz de algo dado gratuitamente y suena más elevado y bíblico que «regalo». También evita la posible banalización de «regalo» en español contemporáneo.
- source_word: τοῦ θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - procedente de Dios
  - de parte de Dios
  lexicon: BDAG
  rationale: La forma simple «de Dios» sigue de cerca el genitivo griego y es la opción más directa y clara en español.
- source_word: τίς ἐστιν ὁ λέγων σοι
  english_pob_choice: who it is who says to you
  chosen_spanish: quién es el que te dice
  alternatives_spanish:
  - quién es el que te está diciendo
  - quién es el que te habla
  lexicon: BDAG
  rationale: «Quién es el que te dice» conserva la identificación enfática del participio griego sin forzar un progresivo artificial. En español suena más natural que una perífrasis continua.
- source_word: Δός μοι πεῖν
  english_pob_choice: Give me a drink
  chosen_spanish: Dame de beber
  alternatives_spanish:
  - Dame un trago
  - Dame algo de beber
  lexicon: BDAG
  rationale: «Dame de beber» reproduce el sentido idiomático de la petición y evita añadir elementos no explícitos. Es más fiel que «Dame algo de beber» y más natural que una construcción literal.
- source_word: ᾔτησας
  english_pob_choice: you would have asked
  chosen_spanish: le habrías pedido
  alternatives_spanish:
  - le habrías solicitado
  - habrías pedido de él
  lexicon: BDAG
  rationale: El verbo «pedir» es el equivalente natural en español para esta solicitud. El pronombre objeto indirecto «le» mantiene claro el referente masculino del griego.
- source_word: ἔδωκεν ἄν
  english_pob_choice: he would have given
  chosen_spanish: te habría dado
  alternatives_spanish:
  - te daría
  - te hubiese dado
  lexicon: BDAG
  rationale: «Habría dado» expresa bien la condición irreal del período condicional contrafáctico. Se usa el objeto indirecto «te» para reflejar la dirección del don hacia la mujer.
- source_word: ὕδωρ ζῶν
  english_pob_choice: living water
  chosen_spanish: agua viva
  alternatives_spanish:
  - agua corriente
  - agua fresca
  lexicon: BDAG
  rationale: «Agua viva» conserva la expresión tradicional y, a la vez, mantiene la ambigüedad intencional entre agua literal y sentido simbólico. Las alternativas físicas se reservan para la nota textual.
theological_decisions:
- issue: Mantener la tensión entre el sentido literal y el simbólico de ὕδωρ ζῶν
  english_pob_reading: living water
  chosen_spanish_reading: agua viva
  alternative_spanish_readings:
  - agua corriente
  - agua fresca
  rationale: En el contexto de Juan, Jesús habla de un agua que puede entenderse físicamente pero apunta a una realidad espiritual más profunda. «Agua viva» preserva esa tensión teológica en lugar de resolverla prematuramente con una sola lectura física.
  doctrine_reference: 'Translation philosophy §3: Preservar la tensión teológica en vez de resolverla.'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que refinó la naturalidad de la forma verbal en el discurso de Jesús sin alterar el contenido. En español se mantuvo el doblete narrativo «respondió y le dijo» y se preservó la ambigüedad de «agua viva» mediante nota, de acuerdo con el trail de auditoría.
  spanish_consistency_notes:
  - Se mantiene Yahvé como forma estándar del proyecto para el nombre divino; en este versículo aparece θεός, por lo que corresponde «Dios».
  - Se usa «don» para δωρεά en lugar de «regalo» por registro y precisión bíblica.
  - Se conserva «agua viva» como término principal por resonancia joánica y por la tensión literal/teológica documentada.
  - El condicional contrafáctico se expresa con «habrías pedido / habría dado» para reflejar ἄν + aoristo en la apódosis.
