translation:
  language: es
  text: Entonces la mujer dejó su cántaro de agua y fue a la ciudad, y dijo a la gente[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a los hombres». El griego puede referirse, según el contexto, a personas en general o específicamente a varones.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀφῆκεν
  english_pob_choice: left
  chosen_spanish: dejó
  alternatives_spanish:
  - abandonó
  - dejó atrás
  lexicon: BDAG
  rationale: El aoristo de ἀφίημι aquí expresa que la mujer dejó el recipiente al irse. «Dejó» es natural en español y no añade la fuerza de «abandonó», que sería excesiva. «Dejó atrás» es posible, pero suena menos directo en esta narración.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Entonces
  alternatives_spanish:
  - Así que
  - Por tanto
  lexicon: BDAG
  rationale: οὖν marca transición narrativa o consecuencia. «Entonces» conserva el enlace discursivo de forma fluida y digna en español, sin sonar demasiado lógico-formal como «por tanto».
- source_word: ὑδρίαν
  english_pob_choice: water jar
  chosen_spanish: cántaro de agua
  alternatives_spanish:
  - jarra de agua
  - vasija de agua
  lexicon: BDAG
  rationale: ὑδρία es un recipiente para traer agua. «Cántaro de agua» comunica bien el objeto en español y mantiene la especificidad del recipiente. «Jarra» puede sonar menos preciso según el registro; «vasija» es más general.
- source_word: ἡ γυνή
  english_pob_choice: the woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - la esposa
  - la señora
  lexicon: BDAG
  rationale: En este contexto narrativo se trata de la mujer samaritana ya introducida. «La mujer» es la forma más natural y fiel; «esposa» no está indicado por el contexto.
- source_word: ἀπῆλθεν
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - se fue
  - partió
  lexicon: BDAG
  rationale: El aoristo de ἀπέρχομαι expresa que salió y se dirigió a otro lugar. «Fue» es breve, natural y suficiente en español narrativo. «Se fue» también sería posible, pero aquí «fue» conserva mejor el movimiento objetivo hacia la ciudad.
- source_word: εἰς τὴν πόλιν
  english_pob_choice: into the town
  chosen_spanish: a la ciudad
  alternatives_spanish:
  - hacia la ciudad
  - al pueblo
  lexicon: BDAG
  rationale: πόλις puede traducirse «ciudad» o «pueblo/aldea» según el contexto. Dado que el texto no especifica el tamaño del asentamiento, «ciudad» mantiene una equivalencia amplia y tradicional en español; la preposición de destino se expresa naturalmente con «a».
- source_word: λέγει
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - les dice
  - habló
  lexicon: BDAG
  rationale: Aunque el griego usa presente histórico, en español narrativo la forma más natural es el pretérito «dijo». Esto preserva la función narrativa sin forzar un presente histórico que podría sonar menos natural.
- source_word: τοῖς ἀνθρώποις
  english_pob_choice: to the people
  chosen_spanish: a la gente
  alternatives_spanish:
  - a las personas
  - a los hombres
  lexicon: BDAG
  rationale: ἄνθρωποι puede referirse genéricamente a personas. «A la gente» expresa ese sentido colectivo y evita restringir innecesariamente a varones. «A los hombres» sería posible solo si el contexto exigiera una referencia masculina específica, lo cual aquí no es necesario.
theological_decisions:
- issue: Alcance de τοῖς ἀνθρώποις (género o generalidad)
  english_pob_reading: to the people
  chosen_spanish_reading: a la gente
  alternative_spanish_readings:
  - a los hombres
  rationale: El griego admite un sentido general de ἄνθρωποι. La lectura española «a la gente» mantiene ese valor inclusivo sin introducir una restricción masculina que el versículo por sí solo no exige. Esto sigue la cautela del POB inglés frente a una masculinización innecesaria.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
translation_notes:
  revision_awareness: El inglés revisado cambió «says» por «said» para ajustar el estilo narrativo; en español se siguió ese mismo criterio, usando el pretérito «dijo». También se respetó la ambigüedad de ἄνθρωποι sin imponer una lectura masculina innecesaria.
  spanish_consistency_notes:
  - Se mantuvo el registro narrativo claro y sobrio.
  - Se evitó el calco del presente histórico griego en favor de un pretérito natural en español.
  - Se conservó una traducción no masculinizada de ἄνθρωποι, coherente con la auditoría inglesa.
  - «Cántaro de agua» comunica el objeto con naturalidad sin perder la referencia a un recipiente para transportar agua.
