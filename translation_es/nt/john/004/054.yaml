translation:
  language: es
  text: Esta fue de nuevo la segunda señal que Jesús hizo después de haber venido de Judea a Galilea[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «milagro». En Juan, «señal» subraya que la obra de Jesús apunta a algo más que su poder visible.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦτο
  english_pob_choice: This
  chosen_spanish: Esto
  alternatives_spanish:
  - Este
  - Esto mismo
  lexicon: BDAG
  rationale: El demostrativo retoma el hecho narrado antes; en español, «Esto» conserva la referencia deíctica sin forzar un sustantivo implícito.
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  - nuevamente
  lexicon: BDAG
  rationale: La repetición queda bien expresada con una fórmula natural en español; «otra vez» transmite el valor adverbial de repetición.
- source_word: δεύτερον
  english_pob_choice: the second
  chosen_spanish: la segunda
  alternatives_spanish:
  - segunda
  lexicon: BDAG
  rationale: El ordinal modifica a «señal»; el artículo en español ayuda a la fluidez y mantiene el valor ordinal exacto.
- source_word: σημεῖον
  english_pob_choice: sign
  chosen_spanish: señal
  alternatives_spanish:
  - signo
  - milagro
  lexicon: BDAG
  rationale: En Juan, σημεῖον tiene fuerza teológica y evidencial. «Señal» preserva mejor esa carga que «milagro», que subrayaría solo lo extraordinario.
- source_word: ἐποίησεν
  english_pob_choice: did
  chosen_spanish: hizo
  alternatives_spanish:
  - realizó
  - obró
  lexicon: BDAG
  rationale: Con σημεῖον, el verbo natural en español es «hacer»; mantiene el paralelismo simple del griego sin introducir un matiz técnico innecesario.
- source_word: ἐλθὼν
  english_pob_choice: after coming
  chosen_spanish: después de venir
  alternatives_spanish:
  - cuando vino
  - habiendo venido
  lexicon: BDAG
  rationale: El participio aoristo expresa anterioridad temporal; «después de venir» comunica esa relación de manera clara y fiel.
- source_word: ἐκ τῆς Ἰουδαίας
  english_pob_choice: from Judea
  chosen_spanish: de Judea
  alternatives_spanish:
  - desde Judea
  lexicon: BDAG
  rationale: La preposición ἐκ indica procedencia; «de Judea» es la opción más natural y directa en español.
- source_word: εἰς τὴν Γαλιλαίαν
  english_pob_choice: into Galilee
  chosen_spanish: a Galilea
  alternatives_spanish:
  - hacia Galilea
  - hasta Galilea
  lexicon: BDAG
  rationale: Aunque εἰς puede sugerir dirección concreta, en español «a Galilea» suena más natural que «en/ dentro de Galilea» y conserva el movimiento.
theological_decisions:
- issue: Valor joánico de σημεῖον
  english_pob_reading: sign
  chosen_spanish_reading: señal
  alternative_spanish_readings:
  - milagro
  rationale: Juan usa σημεῖον para resaltar que la obra de Jesús apunta a su identidad y propósito, no solo a su poder. «Señal» mantiene ese sentido literario y teológico.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: La versión inglesa del POB ya decidió conservar «sign» frente a «miracle» para respetar el uso joánico. Aquí se mantuvo esa decisión con «señal», evitando simplificarla como «milagro» y preservando el matiz evidencial-teológico. No hubo revisiones posteriores que alteraran ese juicio.
  spanish_consistency_notes:
  - Se mantuvo «Jesús» como nombre propio fijo, sin transliteración ni sustitución litúrgica.
  - Se eligió «señal» de forma consistente con el valor joánico de σημεῖον y con el audit trail inglés.
  - La preposición de movimiento se expresó con una construcción natural en español («a Galilea») sin perder la idea de desplazamiento desde Judea.
