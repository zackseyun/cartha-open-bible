    text: '''Woman'' was a respectful form of address in this context, not a rude one.'
    reason: cultural_note
  - marker: c
    text: Or 'the hour is coming.' Although the noun lacks the article here, John often uses 'hour' as a thematic term for a decisive time in God's plan.
    reason: lexical_alternative
