translation:
  language: es
  text: 'Jesús le dijo: «Créeme[a], mujer[b], que viene una hora[c] cuando ni en este monte ni en Jerusalén ustedes adorarán al Padre».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Confía en mí». El verbo griego puede expresar tanto creer lo que alguien dice como confiar en la persona.
    reason: lexical_alternative
  - marker: b
    text: «Mujer» era una forma de trato respetuosa en este contexto, no una expresión descortés.
    reason: cultural_note
  - marker: c
    text: O «viene la hora». Aunque el sustantivo no lleva artículo aquí, Juan usa con frecuencia «hora» como término temático para un momento decisivo en el plan de Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: Πίστευέ μοι
  english_pob_choice: Believe me
  chosen_spanish: Créeme
  alternatives_spanish:
  - Ten confianza en mí
  - Confía en mí
  lexicon: BDAG
  rationale: El imperativo presente con dativo expresa una apelación directa a aceptar como verdadero lo que Jesús dice. «Créeme» conserva esa fuerza de credibilidad y resulta natural en español. «Confía en mí» desplaza el foco hacia la confianza relacional y suaviza el vínculo con el contenido inmediato de la afirmación.
- source_word: γύναι
  english_pob_choice: woman
  chosen_spanish: mujer
  alternatives_spanish:
  - señora
  - amada mujer
  lexicon: BDAG
  rationale: El vocativo griego significa literalmente «mujer». En este contexto es una forma respetuosa de tratamiento. «Mujer» preserva el valor léxico sin añadir un matiz afectivo o cortesano que el texto no exige. La posible percepción de brusquedad se maneja mejor en nota que en el texto principal.
- source_word: ἔρχεται ὥρα
  english_pob_choice: an hour is coming
  chosen_spanish: viene la hora
  alternatives_spanish:
  - viene una hora
  - se acerca la hora
  lexicon: BDAG
  rationale: Se mantiene el sustantivo «hora» para conservar el motivo joánico y su carga teológica. El presente «viene» comunica la inminencia y reproduce bien el valor aspectual del griego. «Una hora» sería más literal respecto a la ausencia del artículo, pero en español suena menos natural aquí y puede debilitar la fórmula temática.
- source_word: ἐν τῷ ὄρει τούτῳ
  english_pob_choice: on this mountain
  chosen_spanish: en este monte
  alternatives_spanish:
  - sobre este monte
  - en esta montaña
  lexicon: BDAG
  rationale: Aunque ἐν puede significar literalmente «en», en español la referencia a un lugar sagrado o topográfico se expresa con naturalidad como «en este monte». «Monte» mantiene mejor el registro bíblico y el vínculo con la discusión samaritana. «Montaña» sería comprensible, pero menos acorde con el lenguaje tradicional del pasaje.
- source_word: ἐν Ἱεροσολύμοις
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - a Jerusalén
  - en la ciudad de Jerusalén
  lexicon: BDAG
  rationale: Jerusalén se mantiene como nombre propio de ciudad, con la preposición idiomática «en». No requiere expansión ni adaptación adicional.
- source_word: προσκυνήσετε
  english_pob_choice: will you worship
  chosen_spanish: adorarán
  alternatives_spanish:
  - adorarán ustedes
  - se postrarán a adorar
  lexicon: BDAG
  rationale: En Juan 4 el verbo se refiere al acto religioso de culto a Dios. En español, «adorarán» comunica de forma natural ese sentido y engloba la dimensión de reverencia y culto. Se evita «postrarse» porque estrecharía indebidamente el significado. La forma verbal se ajusta al contexto impersonal del enunciado de Jesús, donde el sujeto implícito es plural.
- source_word: τῷ πατρί
  english_pob_choice: the Father
  chosen_spanish: al Padre
  alternatives_spanish:
  - al padre
  - al Padre celestial
  lexicon: BDAG
  rationale: El contexto joánico refiere a Dios como Padre; por eso se capitaliza «Padre». El dativo con artículo se expresa naturalmente con «al». «Padre celestial» añade una precisión que el griego no requiere en este punto.
- source_word: οὔτε ... οὔτε
  english_pob_choice: neither ... nor
  chosen_spanish: ni ... ni
  alternatives_spanish:
  - ni ... ni tampoco
  - no ... ni
  lexicon: BDAG
  rationale: La correlación negativa griega se reproduce con la pareja idiomática «ni ... ni», que conserva la exclusión doble entre ambos lugares de culto.
theological_decisions:
- issue: Tono del vocativo γύναι
  english_pob_reading: Rendered literally as 'woman' without softening additions
  chosen_spanish_reading: «mujer» sin atenuantes en el texto principal
  alternative_spanish_readings:
  - «señora»
  - «querida mujer»
  rationale: La forma literal preserva el habla de Jesús y evita añadir una cortesía no explicitada. En español, como en el inglés POB, la posible impresión de brusquedad se atiende mejor con nota cultural que alterando el texto.
  doctrine_reference: Translation philosophy §1, §6
- issue: Motivo joánico de la hora
  english_pob_reading: Retained 'hour' rather than generalized 'time'
  chosen_spanish_reading: «la hora»
  alternative_spanish_readings:
  - «el tiempo»
  - «una hora»
  rationale: «Hora» conserva la expresión recurrente de Juan y su carga narrativa/teológica sobre el momento decisivo del plan de Dios. No se generaliza a «tiempo» porque eso diluiría el eco intrajoánico.
  doctrine_reference: Translation philosophy §3, §5
- issue: Objeto del culto en τῷ πατρί
  english_pob_reading: the Father
  chosen_spanish_reading: «el Padre»
  alternative_spanish_readings:
  - «el padre»
  - «Dios»
  rationale: El pasaje no habla de un padre humano, sino de Dios como Padre. La capitalización marca adecuadamente la referencia personal divina sin traducir interpretativamente a «Dios», que aquí sería una explicitación adicional.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: Revisión final conforme al último pase de auditoría, sin cambios aplicados respecto al texto base inglés; se conservan los matices léxicos de πιστεύω, γύναι y ὥρα, y la lectura cultual de προσκυνέω en contexto joánico.
  spanish_consistency_notes:
  - Se mantiene «Jesús» y «Jerusalén» como nombres propios estables.
  - Se conserva «hora» para el motivo joánico en lugar de generalizar a «tiempo».
  - «Mujer» se traduce literalmente pero se acompaña de nota cultural para evitar una lectura de rudeza.
  - «Adorarán» comunica el sentido religioso de προσκυνέω sin introducir la imagen más estrecha de postrarse.
  - La capitalización de «Padre» sigue el contexto joánico de Dios como Padre.
