base_translation:
  language: en
  yaml_path: translation/nt/john/004/021.yaml
  text: Jesus said to her[a], “Believe me, woman[c][b], an hour is coming when neither on this mountain nor in Jerusalem will you worship the Father.”
  footnotes:
