revisions:
- from: 'Jesús le dijo: «[a]Créeme, mujer[b], porque viene la hora[c] cuando ni en este monte ni en Jerusalén adorarán al Padre».'
  to: 'Jesús le dijo: «Créeme[a], mujer[b], que viene una hora[c] cuando ni en este monte ni en Jerusalén ustedes adorarán al Padre».'
  rationale: 'La revisión corrige dos puntos principales: 1) hace explícita la segunda persona plural de προσκυνήσετε con ''ustedes adorarán'', evitando una lectura impersonal o de tercera persona; 2) alinea ἔρχεται ὥρα con la decisión documentada del English POB mediante ''viene una hora'', dejando ''viene la hora'' como alternativa en nota. También se mejora la colocación del marcador de nota léxica en ''Créeme''.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:03:54Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: Jesús habla a la mujer, la exhorta a creerle, anuncia la venida de una hora, contrapone este monte y Jerusalén, y refiere la adoración al Padre. Sin embargo, hay un desajuste importante en la persona verbal de προσκυνήσετε: el griego es segunda persona plural (''adorarán ustedes / adorarán vosotros / adorarán'') dirigida a la interlocutora samaritana en representación de su grupo, mientras que el español ''adorarán'' sin pronombre puede sonar genérico e impersonal. Además, el borrador invierte la decisión léxica documentada en la nota sobre ἔρχεται ὥρα: el texto principal pone ''la hora'' y la nota ofrece ''una hora'', cuando el English POB eligió ''an hour is coming'' y dejó ''the hour is coming'' como alternativa. Conviene ajustar eso para preservar mejor el audit trail y la forma griega sin artículo.'
  spanish_quality_summary: El español es claro y digno, con buen registro bíblico y puntuación adecuada. 'Créeme, mujer' es natural y fiel; 'en este monte' y 'en Jerusalén' funcionan bien. La principal mejora de legibilidad y fidelidad es explicitar la segunda persona plural con 'ustedes adorarán' o reestructurar la cláusula. También conviene reubicar el marcador de nota [c] para que ancle directamente en 'una hora' y no en toda la cláusula, y armonizar la nota con el texto principal.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. 'Jesús', 'Padre' y 'adorar' están bien. La elección 'mujer' sigue correctamente la decisión documentada para γύναι. 'Créeme' también sigue bien la decisión para Πίστευέ μοι. El punto a corregir es la alineación con la decisión inglesa para ἔρχεται ὥρα, que favorece 'viene una hora', manteniendo el motivo joánico 'hora' sin imponer artículo definido.
  issues:
  - severity: high
    issue: La forma verbal española no refleja con suficiente precisión la segunda persona plural de προσκυνήσετε.
    rationale: El griego dice 'ustedes adorarán' (2ª plural futura), no una referencia impersonal a terceros. En español, 'adorarán' sin pronombre puede leerse como tercera persona plural. Añadir 'ustedes' o reformular evita pérdida de sentido.
  - severity: medium
    issue: El texto principal usa 'viene la hora' aunque el audit trail inglés eligió 'an hour is coming'.
    rationale: Aunque 'la hora' puede sonar idiomática y teológicamente cargada, aquí la decisión documentada prioriza la falta de artículo en griego. La nota española actualmente presenta como alternativa precisamente la opción elegida por el English POB, quedando invertida la relación principal/alternativa.
  - severity: low
    issue: El marcador [a] al inicio de la cita no está anclado directamente a 'Créeme'.
    rationale: No es incorrecto, pero anclar la nota léxica en la expresión correspondiente mejora consistencia y claridad editorial.
  revised_spanish_text: 'Jesús le dijo: «Créeme[a], mujer[b], que viene una hora[c] cuando ni en este monte ni en Jerusalén ustedes adorarán al Padre».

