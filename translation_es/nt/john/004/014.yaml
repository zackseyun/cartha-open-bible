  text: ὃς δ’ ἂν πίῃ ἐκ τοῦ ὕδατος οὗ ἐγὼ δώσω αὐτῷ, οὐ μὴ ⸀διψήσει εἰς τὸν αἰῶνα, ἀλλὰ τὸ ὕδωρ ὃ δώσω αὐτῷ γενήσεται ἐν αὐτῷ πηγὴ ὕδατος ἁλλομένου εἰς ζωὴν αἰώνιον.
base_translation:
  language: en
  yaml_path: translation/nt/john/004/014.yaml
  text: But whoever drinks from the water that I will give him will never thirst[a]; rather[c][b], the water that I will give him will become in him a spring of water welling up to eternal life.
  footnotes:
  - marker: a
    text: 'Greek: ''will certainly not thirst forever''; the expression is an emphatic negation (οὐ μὴ ... εἰς τὸν αἰῶνα).'
    reason: lexical_alternative
  - marker: b
    text: Or 'springing up' or 'leaping up' to eternal life.
    reason: lexical_alternative
  - marker: c
    text: The Greek says 'him' generically, referring to any person who drinks of the water Jesus gives.
    reason: lexical_alternative
