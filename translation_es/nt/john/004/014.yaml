  rationale: Se corrigió el anclaje de la nota sobre el masculino genérico, se sustituyó «sino» por «más bien» para un contraste más natural, y se refinó la imagen de πηγή con «manantial». También se añadió una nota para el matiz de ἁλλομένου, preservando la alternativa léxica documentada en el POB inglés.
