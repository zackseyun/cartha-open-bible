translation:
  language: es
  text: Pero cualquiera que beba del agua que yo le[c] daré no tendrá sed jamás[a]; más bien, el agua que yo le daré llegará a ser en él un manantial de agua que brota[b] para vida eterna.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «ciertamente no tendrá sed para siempre»; la expresión es una negación enfática (οὐ μὴ ... εἰς τὸν αἰῶνα).'
    reason: lexical_alternative
  - marker: b
    text: O «que salta» o «que surge» para vida eterna.
    reason: lexical_alternative
  - marker: c
    text: El griego usa singular masculino de forma genérica, refiriéndose a cualquier persona que beba del agua que Jesús da.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὃς δ’ ἂν πίῃ
  english_pob_choice: whoever drinks
  chosen_spanish: cualquiera que beba
  alternatives_spanish:
  - quien beba
  - el que beba
  - quienquiera que beba
  lexicon: BDAG
  rationale: La construcción con relativo indefinido y ἄν expresa una condición general e indeterminada. «Cualquiera que beba» conserva ese valor abierto con español natural y digno.
- source_word: ἐκ τοῦ ὕδατος
  english_pob_choice: from the water
  chosen_spanish: del agua
  alternatives_spanish:
  - de agua
  - desde el agua
  lexicon: BDAG
  rationale: ἐκ indica procedencia o fuente; en español, «del agua» comunica bien la idea de beber de una fuente concreta sin sonar forzado.
- source_word: οὗ ἐγὼ δώσω αὐτῷ
  english_pob_choice: that I will give him
  chosen_spanish: que yo le daré
  alternatives_spanish:
  - que yo le daré a él
  - que yo le daré
  lexicon: BDAG
  rationale: La relativa expresa una promesa futura. En español, la forma directa «que yo le daré» es la más clara y fiel al flujo del original.
- source_word: οὐ μὴ διψήσει εἰς τὸν αἰῶνα
  english_pob_choice: will never thirst
  chosen_spanish: no tendrá sed jamás
  alternatives_spanish:
  - no tendrá sed para siempre
  - nunca tendrá sed
  lexicon: BDAG
  rationale: La negación enfática οὐ μή con εἰς τὸν αἰῶνα comunica una negación absoluta. «No tendrá sed jamás» reproduce bien la fuerza idiomática en español sin redundancia pesada.
- source_word: ἀλλὰ
  english_pob_choice: rather
  chosen_spanish: sino
  alternatives_spanish:
  - más bien
  - pero
  lexicon: BDAG
  rationale: Marca contraste fuerte con desarrollo positivo. «Sino» funciona con naturalidad en español cuando la frase anterior ya contiene una negación.
- source_word: γενήσεται ἐν αὐτῷ
  english_pob_choice: will become in him
  chosen_spanish: se convertirá en él
  alternatives_spanish:
  - se hará en él
  - llegará a ser en él
  lexicon: BDAG
  rationale: γίνομαι expresa llegar a ser o convertirse, no mera existencia. «Se convertirá en él» conserva el cambio de estado y la localización interior del símbolo.
- source_word: πηγὴ ὕδατος
  english_pob_choice: a spring of water
  chosen_spanish: una fuente de agua
  alternatives_spanish:
  - un manantial de agua
  - un surtidor de agua
  lexicon: BDAG
  rationale: πηγή puede ser «fuente» o «manantial». «Fuente de agua» mantiene la imagen bíblica y resulta ampliamente inteligible en español moderno.
- source_word: ἁλλομένου
  english_pob_choice: welling up
  chosen_spanish: que brota
  alternatives_spanish:
  - que salta
  - que mana
  lexicon: BDAG
  rationale: El participio describe movimiento vigoroso y ascendente del agua. «Que brota» preserva el dinamismo con una imagen natural en español; «mana» es posible, pero menos marcada por el impulso ascendente.
- source_word: εἰς ζωὴν αἰώνιον
  english_pob_choice: to eternal life
  chosen_spanish: para vida eterna
  alternatives_spanish:
  - hacia vida eterna
  - en vida eterna
  lexicon: BDAG
  rationale: εἰς expresa meta o resultado. «Para vida eterna» conserva esa orientación final de manera clara y sobria.
- source_word: αὐτῷ / αὐτῷ
  english_pob_choice: him / him
  chosen_spanish: le / en él
  alternatives_spanish:
  - le / dentro de él
  - le / en la persona
  lexicon: BDAG
  rationale: El singular masculino del griego se mantiene en el texto principal para respetar la forma fuente, con referencia genérica implícita. En español, el primer dativo natural es «le»; la segunda referencia locativa se expresa mejor con «en él».
theological_decisions:
- issue: Negación enfática de la sed futura
  english_pob_reading: The Greek says 'will certainly not thirst forever'; the translation keeps the emphatic negation without overloading the line.
  chosen_spanish_reading: No tendrá sed jamás
  alternative_spanish_readings:
  - No tendrá sed para siempre
  - Jamás volverá a tener sed
  rationale: La promesa se conserva como garantía fuerte y continuada, pero sin duplicar innecesariamente la idea de duración. «Jamás» transmite bien el énfasis del original y evita una redundancia estilística.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Masculine singular generic reference
  english_pob_reading: The Greek says 'him' generically, referring to any person who drinks of the water Jesus gives.
  chosen_spanish_reading: Conservar «le» y «en él» en la línea principal
  alternative_spanish_readings:
  - usar «les» o «en la persona»
  - reformular en plural genérico
  rationale: El griego usa masculino singular genérico. La versión española mantiene esa forma sin neutralizarla, siguiendo la decisión auditada del POB y preservando la correspondencia formal.
  doctrine_reference: Gender-accurate over gender-neutral.
- issue: Imagen del agua como fuente interior de vida
  english_pob_reading: The water becomes in him a spring of water welling up to eternal life.
  chosen_spanish_reading: El agua se convertirá en él en una fuente de agua que brota para vida eterna
  alternative_spanish_readings:
  - el agua será en él una fuente de agua viva
  - el agua brotará dentro de él para vida eterna
  rationale: La traducción conserva la metáfora y el movimiento interno del texto sin explicarlo doctrinalmente. Se evita reemplazar la imagen por una paráfrasis interpretativa.
  doctrine_reference: Preserve metaphor and internal transformation.
translation_notes:
  revision_awareness: La redacción sigue la revisión auditada del inglés POB que eliminó la redundancia de 'forever' tras 'will never thirst' para reflejar mejor la fuerza de οὐ μή ... εἰς τὸν αἰῶνα. También conserva la decisión revisada de mantener la imagen de una fuente interna que brota hacia vida eterna.
  spanish_consistency_notes:
  - Se mantiene Yahvé/Cristo/Jesús según las reglas del proyecto, aunque este versículo no contiene esos términos.
  - Se conserva un registro español moderno y bíblico, evitando tanto arcaísmo excesivo como paráfrasis explicativa.
  - La construcción «no tendrá sed jamás» equilibra fidelidad y naturalidad, equivalente funcional de la negación enfática griega.
