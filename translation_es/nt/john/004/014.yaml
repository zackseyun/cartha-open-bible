  glossary_alignment: No hay conflictos con la terminología base del proyecto. La decisión de conservar el masculino singular genérico en el texto principal es coherente con el rastro auditado. La metáfora del agua y la vida eterna se preserva sin sobreinterpretación doctrinal.
