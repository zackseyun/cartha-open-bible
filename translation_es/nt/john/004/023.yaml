translation:
  language: es
  text: Pero viene una hora, y ahora es, cuando los verdaderos adoradores adorarán al Padre en espíritu[a] y verdad; porque ciertamente el Padre busca a tales personas para que lo adoren.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "en el Espíritu"; el griego puede denotar adoración impulsada por el Espíritu Santo, adoración en el espíritu humano, o adoración caracterizada por realidad espiritual.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀλλὰ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Mas
  - Sin embargo
  lexicon: BDAG
  rationale: Introduce el contraste de manera natural en español y conserva la oposición con la adoración ligada al lugar que viene del contexto inmediato.
- source_word: ἔρχεται ὥρα
  english_pob_choice: an hour is coming
  chosen_spanish: viene una hora
  alternatives_spanish:
  - está viniendo una hora
  - se acerca una hora
  lexicon: BDAG
  rationale: Mantiene el valor futuro-inminente sin sonar forzado en español; 'hora' conserva el matiz joánico y escatológico.
- source_word: καὶ νῦν ἐστιν
  english_pob_choice: and is now here
  chosen_spanish: y ahora es
  alternatives_spanish:
  - y ahora está aquí
  - y ya ha llegado
  lexicon: BDAG
  rationale: Reproduce la fuerza de presente realizado del griego con una formulación breve y natural. La omisión de 'aquí' evita redundancia en español y no debilita el sentido.
- source_word: οἱ ἀληθινοὶ προσκυνηταὶ
  english_pob_choice: the true worshipers
  chosen_spanish: los verdaderos adoradores
  alternatives_spanish:
  - los adoradores verdaderos
  - los adoradores genuinos
  lexicon: BDAG
  rationale: '''Verdaderos'' conserva la cualidad de autenticidad/realidad de ἀληθινοί. ''Adoradores'' sigue el valor de προσκυνηταί en un registro bíblico claro y natural.'
- source_word: προσκυνήσουσιν
  english_pob_choice: will worship
  chosen_spanish: adorarán
  alternatives_spanish:
  - rendirán adoración
  - postrados adorarán
  lexicon: BDAG
  rationale: El futuro simple expresa bien el verbo; 'adorarán' es el equivalente más idiomático y no añade gestualidad no explícita en el texto.
- source_word: τῷ πατρὶ
  english_pob_choice: the Father
  chosen_spanish: al Padre
  alternatives_spanish:
  - al padre
  lexicon: BDAG
  rationale: En el contexto joánico se trata de Dios como Padre; la mayúscula refleja el título divino sin alterar el sentido del dativo receptor.
- source_word: ἐν πνεύματι
  english_pob_choice: in spirit
  chosen_spanish: en espíritu
  alternatives_spanish:
  - en el Espíritu
  - espiritualmente
  lexicon: BDAG
  rationale: Conserva la ambigüedad del anartro πνεύματι, como en el inglés auditado. El español 'espíritu' puede referirse al espíritu humano, al Espíritu Santo o a la esfera espiritual, según la lectura teológica.
- source_word: ἀληθείᾳ
  english_pob_choice: truth
  chosen_spanish: verdad
  alternatives_spanish:
  - en verdad
  - verazmente
  lexicon: BDAG
  rationale: Sostiene el sustantivo ἀλήθεια como 'verdad', coherente con el paralelismo y con el uso joánico de la verdad como realidad revelada.
- source_word: καὶ γὰρ
  english_pob_choice: for ... indeed
  chosen_spanish: porque, ciertamente,
  alternatives_spanish:
  - pues
  - porque de hecho
  lexicon: BDAG
  rationale: '''Porque'' expresa la causalidad; ''ciertamente'' recoge la intensificación de καὶ γάρ sin sonar artificial en español.'
- source_word: τοιούτους
  english_pob_choice: such people
  chosen_spanish: a tales personas
  alternatives_spanish:
  - a personas así
  - a semejantes personas
  lexicon: BDAG
  rationale: '''Tales personas'' mantiene la deixis cualitativa sin introducir un sustantivo ajeno al texto. El plural impersonal es fiel al griego.'
- source_word: ζητεῖ
  english_pob_choice: indeed seeks
  chosen_spanish: busca
  alternatives_spanish:
  - anda buscando
  - busca de hecho
  lexicon: BDAG
  rationale: Preserva el presente simple del griego y el verbo directo del texto. 'Busca' es claro y suficientemente enfático en contexto, especialmente con 'ciertamente'.
- source_word: τοὺς προσκυνοῦντας αὐτόν
  english_pob_choice: to worship him
  chosen_spanish: para que lo adoren
  alternatives_spanish:
  - que lo adoren
  - adorándolo
  lexicon: BDAG
  rationale: La construcción final se vierte de modo natural en español como finalidad con subjuntivo, manteniendo que son personas caracterizadas por adorar a Dios. El pronombre 'lo' se refiere al Padre/Dios sin reducir el referente.
theological_decisions:
- issue: Ambigüedad de ἐν πνεύματι
  english_pob_reading: Rendered 'in spirit' without specifying 'the Spirit' in the main text, while a footnote preserves the alternative reading.
  chosen_spanish_reading: 'En el texto principal: ''en espíritu''; nota: también puede leerse ''en el Espíritu'' o como adoración en la esfera del Espíritu Santo, del espíritu humano, o de la realidad espiritual.'
  alternative_spanish_readings:
  - en el Espíritu
  - espiritualmente
  rationale: Se conserva la ambigüedad griega sin resolverla de antemano. El español 'espíritu' permite las mismas posibilidades interpretativas que el audit trail inglés protege.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Alcance de 'verdaderos adoradores'
  english_pob_reading: A qualitative sense of genuine/real worshipers, not a sectarian label.
  chosen_spanish_reading: '''verdaderos adoradores'' como cualidad de autenticidad, no como designación sectaria.'
  alternative_spanish_readings:
  - adoradores genuinos
  - adoradores reales
  rationale: La frase contrasta adoración auténtica con adoración meramente localizada, sin introducir una división confesional inexistente en el griego.
  doctrine_reference: Affirmations; Translation philosophy §1 and §3.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail inglés, que ajustó el presente de ζητεῖ a 'seeks'/'busca' y mantuvo la estructura general intacta. También conserva la tensión interpretativa de πνεύματι en lugar de resolverla.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando corresponda al tetragrámaton; aquí el referente es 'el Padre', por lo que no aparece.
  - '''Padre'' se capitaliza como título divino en contexto joánico.'
  - Se mantiene 'adoradores'/'adorarán' para προσκυνη- en consonancia con el registro bíblico del pasaje.
  - El pronombre objeto 'lo' se refiere al Padre/Dios sin necesidad de explicitar 'a Él', que sería menos natural en español moderno.
