source:
  edition: SBLGNT
  text: ἀλλὰ ἔρχεται ὥρα καὶ νῦν ἐστιν, ὅτε οἱ ἀληθινοὶ προσκυνηταὶ προσκυνήσουσιν τῷ πατρὶ ἐν πνεύματι καὶ ἀληθείᾳ, καὶ γὰρ ὁ πατὴρ τοιούτους ζητεῖ τοὺς προσκυνοῦντας αὐτόν·
base_translation:
  language: en
  yaml_path: translation/nt/john/004/023.yaml
  text: But an hour is coming[a], and is now here, when the true worshipers will worship the Father in spirit and truth; for the Father indeed seeks such people to worship him.
  footnotes:
  - marker: a
    text: Or 'in the Spirit'; the Greek can denote worship empowered by the Holy Spirit, worship in the human spirit, or worship characterized by spiritual reality.
    reason: alternative_reading
  ai_draft:
    model_id: gpt-5.4
