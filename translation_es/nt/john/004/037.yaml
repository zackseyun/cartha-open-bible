  source_alignment_summary: 'El borrador refleja bien la estructura del griego: ''Porque en esto'' para ἐν γὰρ τούτῳ, una máxima general introducida por dos puntos para ὅτι, y el contraste ''uno ... y otro ...'' para ἄλλος ... καὶ ἄλλος. También conserva adecuadamente los participios sustantivados con ''el que siembra / el que siega''. Sin embargo, ὁ λόγος aquí no se refiere naturalmente a ''la palabra'' sino a un dicho o refrán reconocido; el propio expediente inglés justificó ''the saying'' y preservó ''the word'' solo como alternativa. En español, ''la palabra'' suena menos idiomático y puede desviar hacia un sentido demasiado amplio o teológico.'
