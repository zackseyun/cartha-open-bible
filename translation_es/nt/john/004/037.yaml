lexical_decisions:
- source_word: ἐν τούτῳ
  english_pob_choice: in this
  chosen_spanish: en esto
  alternatives_spanish:
  - en esta ocasión
  - en esto mismo
  lexicon: BDAG
  rationale: Conserva la referencia demostrativa inmediata al caso o situación presente, de modo natural en español.
- source_word: γὰρ
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Expresa la conexión explicativa con el contexto anterior de manera fluida en español, sin perder el valor de fundamento.
- source_word: ὁ λόγος
  english_pob_choice: the saying
  chosen_spanish: la palabra
  alternatives_spanish:
  - el dicho
  - la sentencia
  - el proverbio
  lexicon: BDAG
  rationale: Aquí λόγος puede entenderse como una formulación reconocible o máxima. En español, 'la palabra' mantiene el campo semántico general del griego y permite una nota alternativa, aunque 'el dicho' o 'el proverbio' también son posibles según el matiz.
- source_word: ἀληθινός
  english_pob_choice: 'true'
  chosen_spanish: verdadera
  alternatives_spanish:
  - cierta
  - genuina
  lexicon: BDAG
  rationale: Describe la validez de la expresión; 'verdadera' es la correspondencia más natural y fiel en español.
- source_word: ἄλλος ... καὶ ἄλλος
  english_pob_choice: one ... and another
  chosen_spanish: uno ... y otro
  alternatives_spanish:
  - uno ... y uno diferente
  - uno ... y otro distinto
  lexicon: BDAG
  rationale: Preserva el contraste entre dos agentes distintos con una formulación idiomática y directa en español.
- source_word: ὁ σπείρων
  english_pob_choice: the one sowing
  chosen_spanish: el que siembra
  alternatives_spanish:
  - el sembrador
  - el que está sembrando
  lexicon: BDAG
  rationale: El participio sustantivado se expresa con una construcción relativa natural en español, manteniendo la acción verbal sin forzar un sustantivo más interpretativo.
- source_word: ὁ θερίζων
  english_pob_choice: the one reaping
  chosen_spanish: el que siega
  alternatives_spanish:
  - el segador
  - el que está segando
  lexicon: BDAG
  rationale: Conserva el paralelo con 'el que siembra' y reproduce el sentido agrícola del participio sustantivado.
theological_decisions:
- issue: Sentido de λόγος y grado de especificación interpretativa
  english_pob_reading: Render as a general true saying without specifying allegorical referents in the translation itself.
  chosen_spanish_reading: Traducir la expresión como una afirmación general verdadera, sin identificar dentro del texto a quiénes representan el sembrador y el segador.
  alternative_spanish_readings:
  - el dicho es verdadero
  - el proverbio es verdadero
  rationale: El griego no explicita aquí las correspondencias simbólicas. Mantener la formulación general evita introducir interpretación en la traducción y preserva la tensión exegética del contexto.
  doctrine_reference: Preservar la tensión teológica sin resolverla prematuramente.
translation_notes:
  revision_awareness: La revisión inglesa reciente favorece una traducción más cercana a los participios sustantivados ('the one sowing'/'the one reaping'), pero en español una construcción relativa ('el que siembra'/'el que siega') resulta más natural y sigue siendo fuente-fiel. Se evita especificar alegóricamente a los personajes, en línea con la decisión auditada.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando el texto fuente lo requiera explícitamente; no aplica en este versículo.
  - Se traduce λόγος aquí por 'la palabra' por economía y naturalidad, dejando nota de la alternativa 'el dicho' sin cerrar el matiz.
  - Se conserva el paralelismo 'el que siembra' / 'el que siega' para reflejar los dos participios sustantivados griegos.
  - No se introduce un equivalente más eclesiástico como 'proverbio' en el cuerpo principal para no sobredeterminar el género de la expresión.
