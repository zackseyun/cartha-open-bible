  glossary_alignment: 'No hay conflictos con la terminología doctrinal principal del proyecto. La decisión sobre λόγος sí debe alinearse con el análisis contextual del POB: aquí corresponde ''dicho'' más que ''palabra''. ''El que siembra / el que siega'' concuerda bien con la preferencia por preservar el valor participial.'
