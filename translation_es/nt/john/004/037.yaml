translation:
  language: es
  text: 'Porque en esto es verdadero este dicho[a]: uno es el que siembra[b], y otro el que siega[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la palabra' o 'el proverbio'.
    reason: lexical_alternative
  - marker: b
    text: O 'el sembrador ... el segador'.
