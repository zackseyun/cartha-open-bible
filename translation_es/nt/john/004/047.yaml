  text: οὗτος ἀκούσας ὅτι Ἰησοῦς ἥκει ἐκ τῆς Ἰουδαίας εἰς τὴν Γαλιλαίαν ἀπῆλθεν πρὸς αὐτὸν καὶ ⸀ἠρώτα ἵνα καταβῇ καὶ ἰάσηται αὐτοῦ τὸν υἱόν, ἤμελλεν γὰρ ἀποθνῄσκειν.
base_translation:
  language: en
  yaml_path: translation/nt/john/004/047.yaml
  text: When this man heard that Jesus had come from Judea into Galilee[a], he went to him and asked him to come down and heal his son[b], for he was about to die.
  footnotes:
  - marker: a
    text: Or 'was asking.' The Greek imperfect may indicate continued or repeated action; 'kept asking' brings out that nuance.
    reason: lexical_alternative
  - marker: b
    text: '''Come down'' reflects the change in elevation between locations in Galilee.'
    reason: cultural_note
  ai_draft:
