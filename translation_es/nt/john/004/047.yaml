  glossary_alignment: 'No hay conflictos con la terminología principal del proyecto: «Jesús», «sanara», y el tono general son adecuados. No aparecen términos sensibles como Yahvé/Mesías/esclavo. La decisión de usar «le pidió» para ἠρώτα es apropiada en este contexto.'
