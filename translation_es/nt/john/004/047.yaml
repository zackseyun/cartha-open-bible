    changes_summary: Changed 'kept asking' to 'asked' because the Greek imperfect here does not require iterative force in English; the rest of the draft is accurate and natural.
translation:
  language: es
  text: Cuando este hombre oyó que Jesús había venido[a] de Judea a Galilea, fue a verlo y le pidió que bajara y sanara a su hijo[b], porque su hijo estaba por morir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Había venido» refleja el valor de llegada/presencia de ἥκει. También podría expresarse como «había llegado».
    reason: lexical_alternative
  - marker: b
    text: '«Bajara» conserva la imagen topográfica del griego: un desplazamiento desde una zona más alta hacia otra más baja.'
    reason: cultural_note
lexical_decisions:
- source_word: οὗτος
  english_pob_choice: this man
  chosen_spanish: este hombre
  alternatives_spanish:
  - él
  - este
  lexicon: BDAG
  rationale: El demostrativo griego conserva referencia deíctica; en español, «este hombre» mantiene la identificación narrativa sin volverlo un pronombre demasiado vago.
- source_word: ἀκούσας
  english_pob_choice: heard
  chosen_spanish: oyó
  alternatives_spanish:
  - habiendo oído
  - cuando oyó
  lexicon: BDAG
  rationale: El aoristo participial expresa anterioridad temporal respecto al verbo principal; «cuando oyó» también sería posible, pero «oyó» mantiene la fluidez española dentro de la oración principal.
- source_word: ἥκει
  english_pob_choice: had come
  chosen_spanish: había venido
  alternatives_spanish:
  - había llegado
  - estaba ya en
  lexicon: BDAG
  rationale: «ἥκω» señala llegada/presencia resultante de venir; «había venido» reproduce bien ese matiz y corresponde al movimiento reportado desde Judea hacia Galilea.
- source_word: ἐκ τῆς Ἰουδαίας εἰς τὴν Γαλιλαίαν
  english_pob_choice: from Judea into Galilee
  chosen_spanish: de Judea a Galilea
  alternatives_spanish:
  - desde Judea hacia Galilea
  - de Judea hacia Galilea
  lexicon: BDAG
  rationale: En español, «a Galilea» comunica naturalmente la meta del movimiento. «A» cubre el valor direccional de εἰς sin sonar forzado; el matiz de entrada queda implícito en el contexto narrativo.
- source_word: ἀπῆλθεν πρὸς αὐτόν
  english_pob_choice: he went to him
  chosen_spanish: fue a él
  alternatives_spanish:
  - se fue hacia él
  - fue hacia él
  lexicon: BDAG
  rationale: Con πρὸς αὐτόν, «fue a él» es natural en español y preserva el desplazamiento hacia la persona referida.
- source_word: ἠρώτα
  english_pob_choice: asked
  chosen_spanish: le pidió
  alternatives_spanish:
  - le preguntó
  - le rogó
  lexicon: BDAG
  rationale: El verbo ἐρωτάω en este contexto implica una petición dirigida a Jesús, no solo una pregunta. «Le pidió» comunica el ruego concreto sin sobrecargarlo con un matiz más intenso que el texto no exige.
- source_word: ἵνα καταβῇ
  english_pob_choice: to come down
  chosen_spanish: que bajara
  alternatives_spanish:
  - que descendiera
  - bajara
  lexicon: BDAG
  rationale: «Καταβαίνω» conserva su sentido topográfico; «bajara» es el equivalente español más natural y mantiene la imagen del desplazamiento de mayor a menor altura.
- source_word: ἰάσηται
  english_pob_choice: heal
  chosen_spanish: sanara
  alternatives_spanish:
  - curara
  - lo sanara
  lexicon: BDAG
  rationale: En este contexto de curación física, «sanar» es claro y digno en español. «Sanara» concuerda con la subordinada final y mantiene la función del verbo medio sin introducir una distinción innecesaria.
- source_word: αὐτοῦ τὸν υἱόν
  english_pob_choice: his son
  chosen_spanish: a su hijo
  alternatives_spanish:
  - su hijo
  - a su hijo varón
  lexicon: BDAG
  rationale: El posesivo español basta para expresar la relación genitiva; el acusativo con objeto de la acción se integra naturalmente con la preposición «a».
- source_word: ἤμελλεν γὰρ ἀποθνῄσκειν
  english_pob_choice: for he was about to die
  chosen_spanish: porque estaba por morir
  alternatives_spanish:
  - pues estaba a punto de morir
  - porque iba a morir
  lexicon: BDAG
  rationale: «Μέλλω» con infinitivo indica inminencia. «Estaba por morir» conserva esa cercanía temporal de forma natural y evita intensificarla más de lo que el griego requiere.
theological_decisions:
- issue: Referente de «estaba por morir»
  english_pob_reading: The clause refers to the son, not Jesus or the official.
  chosen_spanish_reading: La cláusula se refiere al hijo, no a Jesús ni al funcionario.
  alternative_spanish_readings:
  - estaba por morir él
  - porque él estaba por morir
  rationale: El antecedente inmediato y el sentido narrativo señalan inequívocamente al hijo. En español conviene mantener la referencia clara sin reintroducir ambigüedad.
  doctrine_reference: Contexto inmediato y sintaxis del pronombre posesivo
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del audit trail inglés, que prefirió un verbo simple para ἠρώτα en lugar de una fuerza iterativa. Aquí se reflejó esa decisión con «le pidió» sin añadir «seguía pidiendo» o «insistía», y se mantuvo la estructura temporal natural del original.
  spanish_consistency_notes:
  - Se usó «Jesús» conforme al estándar del proyecto para Ἰησοῦς.
  - Se optó por «Dios»/«Yahvé» no aplicable en este versículo.
  - Se preservó el matiz de inminencia de μέλλω con «estaba por morir» en vez de una paráfrasis más idiomática pero menos precisa.
  - La coordinación narrativa fue mantenida con una sola oración principal, como en el griego.
