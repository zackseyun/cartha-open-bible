  to: Cuando este hombre oyó que Jesús había venido[a] de Judea a Galilea, fue a verlo y le pidió que bajara y sanara a su hijo[b], porque su hijo estaba por morir.
  rationale: Se revisa el texto para evitar un calco poco natural («fue a él»), aclarar explícitamente que quien estaba por morir era el hijo, y colocar la nota léxica [a] sobre la expresión que realmente comenta. El resto del contenido permanece fiel al griego y al expediente de auditoría inglés.
