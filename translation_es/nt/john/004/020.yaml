translation:
  language: es
  text: Nuestros padres adoraron[a] en este monte, y ustedes dicen que en Jerusalén está el lugar donde se debe adorar[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «antepasados».
    reason: lexical_alternative
  - marker: b
    text: O «donde es necesario adorar».
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ πατέρες ἡμῶν
  english_pob_choice: Our fathers
  chosen_spanish: Nuestros padres
  alternatives_spanish:
  - Nuestros antepasados
  lexicon: BDAG
  rationale: Conserva el valor histórico y representativo del grupo familiar/comunitario que habla. «Padres» refleja mejor la formulación griega que «antepasados», aunque esta última sigue siendo una alternativa válida en español.
- source_word: ἐν τῷ ὄρει τούτῳ
  english_pob_choice: on this mountain
  chosen_spanish: en este monte
  alternatives_spanish:
  - sobre este monte
  - en esta montaña
  lexicon: BDAG
  rationale: Se mantiene la preposición local del griego con una forma natural en español. «Monte» es adecuado en contexto bíblico y evita una explicación interpretativa adicional.
- source_word: προσεκύνησαν
  english_pob_choice: worshiped
  chosen_spanish: adoraron
  alternatives_spanish:
  - rindieron adoración
  - se postraron en adoración
  lexicon: BDAG
  rationale: En este contexto de lugar de culto, el verbo expresa adoración religiosa más que solo reverencia física. «Adoraron» comunica bien esa fuerza en español moderno y natural.
- source_word: ὑμεῖς
  english_pob_choice: you
  chosen_spanish: ustedes
  alternatives_spanish:
  - vosotros
  lexicon: BDAG
  rationale: En español neutro latinoamericano, «ustedes» mantiene el contraste explícito con «nuestros padres» y conserva el tono directo del pronombre griego.
- source_word: ἐν Ἱεροσολύμοις
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en la ciudad de Jerusalén
  lexicon: BDAG
  rationale: La forma española normal es singular y no requiere reflejar el plural griego del topónimo. Se conserva la referencia geográfica simple y transparente.
- source_word: ὁ τόπος
  english_pob_choice: the place
  chosen_spanish: el lugar
  alternatives_spanish:
  - el sitio
  lexicon: BDAG
  rationale: «Lugar» es la equivalencia directa y clara. No se agrega «debido» o «correcto» al sustantivo, porque esa valoración queda en la cláusula completa.
- source_word: ὅπου
  english_pob_choice: where
  chosen_spanish: donde
  alternatives_spanish:
  - en el que
  lexicon: BDAG
  rationale: «Donde» fluye de manera natural en español y mantiene la relación locativa del relativo griego.
- source_word: προσκυνεῖν δεῖ
  english_pob_choice: one must worship
  chosen_spanish: se debe adorar
  alternatives_spanish:
  - es necesario adorar
  - uno debe adorar
  lexicon: BDAG
  rationale: El griego expresa necesidad/obligación impersonal. «Se debe adorar» preserva esa fuerza normativa sin convertirla en una instrucción dirigida a una persona específica.
theological_decisions:
- issue: Si explicitar la identidad étnico-religiosa en la oposición del versículo
  english_pob_reading: Kept the contrast implicit in 'Our fathers ... and you say ...'
  chosen_spanish_reading: Se mantuvo el contraste implícito en «Nuestros padres ... y ustedes dicen ...»
  alternative_spanish_readings:
  - «Nuestros padres samaritanos ... pero ustedes judíos dicen ...»
  rationale: El griego no nombra aquí a samaritanos o judíos; el contraste surge del contexto inmediato. La versión española evita añadir identidades no expresadas en el versículo, preservando la tensión textual.
  doctrine_reference: 'Principio de fidelidad textual: no ampliar el alcance semántico más allá de lo que el texto fuente dice explícitamente.'
- issue: Cómo traducir la necesidad impersonal de προσκυνεῖν δεῖ
  english_pob_reading: Rendered as 'where one must worship'
  chosen_spanish_reading: Traducido como «donde se debe adorar»
  alternative_spanish_readings:
  - «donde uno debe adorar»
  - «donde es necesario adorar»
  rationale: La construcción expresa una necesidad general y no un mandato personal. La forma impersonal con «se debe» conserva mejor esa fuerza normativa en español.
  doctrine_reference: 'Principio de equivalencia óptima: claridad moderna sin perder la modalidad de obligación del original.'
translation_notes:
  revision_awareness: 'Coincide con el último pase revisado: no se observan cambios necesarios respecto del contexto auditado en inglés; se conservan el contraste implícito, la locación en el monte y la necesidad impersonal de δεῖ.'
  spanish_consistency_notes:
  - Se usa «Dios»/«Yahvé» solo cuando el texto lo requiera; este versículo no lo contiene.
  - Se emplea «adorar» para προσκυνέω en sentido de culto religioso, consistente con el contexto del lugar de adoración.
  - 'Se mantiene un español neutro latinoamericano: «ustedes», «se debe», «lugar».'
  - El verbo principal se dejó en pasado simple («adoraron») para reflejar el aoristo narrativo del griego.
