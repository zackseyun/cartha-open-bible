review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del griego y sigue de cerca las decisiones del POB inglés: «mujer samaritana», «judío», la sorpresa marcada por «¿Cómo...?», y la explicación sobre la separación entre judíos y samaritanos. Sin embargo, hay un error importante de anclaje de nota: la nota [a] en español está puesta sobre «de beber», pero su contenido explica la cláusula final «Porque los judíos no se relacionan con los samaritanos». Además, la explicación parentética del griego y del POB inglés se expresa mejor en español con paréntesis que dentro de las comillas como parte del discurso directo.'
  spanish_quality_summary: El español es claro y natural, pero «¿Cómo tú, siendo judío...?» suena menos idiomático que «¿Cómo es que tú...?» o «¿Cómo es que tú, siendo judío...?». También conviene ajustar la puntuación para que la frase explicativa sea una acotación del narrador, no parte directa de las palabras de la mujer. «No se relacionan» es aceptable, aunque «no tienen trato» suena un poco más idiomático en registro bíblico legible; aun así, no es obligatorio cambiarlo.
  glossary_alignment: No hay conflictos con la terminología base del proyecto en este versículo. «Judío» para Ἰουδαῖος concuerda con la justificación documentada frente a «judeano». «Mujer samaritana» conserva identidad étnica y de género. La decisión para συγχρῶνται puede mantenerse como «se relacionan», siempre que la alternativa más específica quede en nota, correctamente anclada.
  issues:
  - severity: high
    issue: La nota [a] está anclada en la frase equivocada.
    rationale: El contenido de la nota trata la traducción de συγχρῶνται y de toda la cláusula explicativa final, no la expresión «de beber». Esto rompe la correspondencia exigida entre marcador y lugar relevante en el texto.
  - severity: medium
    issue: La cláusula explicativa final aparece como parte del discurso directo en vez de como explicación parentética del narrador.
    rationale: El griego οὐ γὰρ συγχρῶνται... funciona como comentario explicativo, y el POB inglés lo presenta entre paréntesis. En español, dejarlo dentro de las comillas puede confundir la voz narrativa con la voz de la mujer.
  - severity: low
    issue: «¿Cómo tú...?» es menos natural en español general que una formulación con «¿Cómo es que tú...?».
    rationale: No es incorrecto, pero una pequeña mejora estilística aumenta la legibilidad sin apartarse del valor de Πῶς como pregunta de asombro.
  revised_spanish_text: 'Entonces la mujer samaritana le dijo: «¿Cómo es que tú, siendo judío, me pides de beber, siendo yo una mujer samaritana?». (Porque los judíos no se relacionan[a] con los samaritanos.)'
  revised_footnotes:
  - marker: a
    text: O, «no tienen trato con los samaritanos», posiblemente con el sentido más específico de que no usaban en común ciertos objetos, como los recipientes para beber.
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de la nota para que corresponda al término que realmente comenta, y se ajusta la puntuación para reflejar mejor la acotación explicativa del narrador en el original y en el POB inglés. También se mejora levemente la naturalidad del inicio de la pregunta en español, sin cambiar el sentido documentado.
