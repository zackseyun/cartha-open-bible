translation:
  language: es
  text: 'Entonces la mujer samaritana le dijo: «¿Cómo es que tú, siendo judío, me pides de beber, siendo yo una mujer samaritana?». (Porque los judíos no se relacionan[a] con los samaritanos.)'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «no tienen trato con los samaritanos», posiblemente con el sentido más específico de que no usaban en común ciertos objetos, como los recipientes para beber.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει οὖν
  english_pob_choice: So ... said
  chosen_spanish: Entonces ... le dijo
  alternatives_spanish:
  - Así que ... le dijo
  - Luego ... le dijo
  lexicon: BDAG
  rationale: οὖν marca continuidad narrativa; «Entonces» comunica el avance de la escena con naturalidad en español sin perder la relación lógica.
- source_word: ἡ γυνὴ ἡ Σαμαρῖτις
  english_pob_choice: the Samaritan woman
  chosen_spanish: la mujer samaritana
  alternatives_spanish:
  - la samaritana
  - la mujer, la samaritana
  lexicon: BDAG
  rationale: La doble identificación se puede expresar de forma natural como un sustantivo más adjetivo, manteniendo su identidad étnica y de género.
- source_word: Πῶς
  english_pob_choice: How is it that
  chosen_spanish: ¿Cómo
  alternatives_spanish:
  - ¿Cómo es que
  - ¿Por qué
  lexicon: BDAG
  rationale: En español, la incredulidad o sorpresa de la pregunta se expresa con una interrogativa directa breve; el matiz está dado por el contexto.
- source_word: Ἰουδαῖος
  english_pob_choice: Jew
  chosen_spanish: judío
  alternatives_spanish:
  - judeano
  lexicon: BDAG
  rationale: Aquí el contraste explícito es con «samaritanos» y apunta a la identidad comunitaria y religiosa; «judío» es la correspondencia más clara y natural.
- source_word: ὢν
  english_pob_choice: being
  chosen_spanish: siendo
  alternatives_spanish:
  - como eres
  - porque eres
  lexicon: BDAG
  rationale: El participio expresa trasfondo circunstancial; «siendo» conserva esa relación sin agregar una inferencia causal más fuerte que la del griego.
- source_word: παρ’ ἐμοῦ πεῖν αἰτεῖς
  english_pob_choice: ask for a drink from me
  chosen_spanish: me pides de beber
  alternatives_spanish:
  - me pides un poco de agua
  - me pides beber
  lexicon: BDAG
  rationale: La expresión griega pide algo para beber; en español «pedir de beber» reproduce de manera idiomática la petición sin cargarla de más detalle del que exige el texto.
- source_word: γυναικὸς Σαμαρίτιδος οὔσης
  english_pob_choice: from me, a Samaritan woman
  chosen_spanish: siendo yo una mujer samaritana
  alternatives_spanish:
  - yo, una mujer samaritana
  - porque soy una mujer samaritana
  lexicon: BDAG
  rationale: El genitivo absoluto indica la base de la sorpresa. En español, una cláusula circunstancial con «siendo yo» conserva la referencia en primera persona y el valor explicativo.
- source_word: συγχρῶνται
  english_pob_choice: associate with
  chosen_spanish: se relacionan
  alternatives_spanish:
  - tienen trato con
  - hacen uso común con
  lexicon: BDAG
  rationale: El verbo puede abarcar trato social general o uso en común; «se relacionan» mantiene la amplitud del sentido sin restringirlo a utensilios.
- source_word: οὐ γὰρ συγχρῶνται Ἰουδαῖοι Σαμαρίταις
  english_pob_choice: For Jews do not associate with Samaritans
  chosen_spanish: Porque los judíos no se relacionan con los samaritanos
  alternatives_spanish:
  - Porque los judíos no tienen trato con los samaritanos
  - Porque los judíos no usan cosas en común con los samaritanos
  lexicon: BDAG
  rationale: La cláusula se vierte como explicación entrecomillada y con «Porque», conservando la función parentética del original. La opción principal refleja la amplitud social del verbo.
theological_decisions:
- issue: Alcance de συγχρῶνται
  english_pob_reading: general social association, with a possible narrower sense of common use of items
  chosen_spanish_reading: relación social general, sin excluir el posible matiz de uso en común
  alternative_spanish_readings:
  - trato mutuo general
  - uso compartido de objetos o utensilios
  rationale: El contexto inmediato del agua sugiere un posible trasfondo material, pero el enunciado funciona como explicación amplia de la separación entre ambos grupos. La redacción principal mantiene esa amplitud y deja abierto el matiz más concreto.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather than resolve it
- issue: Identidad de Ἰουδαῖος
  english_pob_reading: Jew
  chosen_spanish_reading: judío
  alternative_spanish_readings:
  - judeano
  rationale: La oposición con samaritanos es comunitaria y religiosa además de geográfica; «judío» comunica mejor esa distinción en español sin desplazar el foco del relato.
  doctrine_reference: Translation philosophy §1, original-language primacy over translation tradition
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador de nota [a] aparece exactamente en el texto español, anclado en «de beber[a]». La redacción general sigue de cerca el audit trail inglés y el griego, con el verbo συγχρῶνται mantenido en un español amplio para no cerrar indebidamente su alcance.
  spanish_consistency_notes:
  - «Entonces» reproduce la progresión narrativa de οὖν de manera natural.
  - «Mujer samaritana» conserva la doble identificación del griego sin sonar calcado.
  - «Me pides de beber» mantiene la petición concreta del agua/bebida sin añadir un objeto explícito ausente en el griego.
  - La cláusula parentética con «Porque» conserva el carácter explicativo del original.
  - Se evita «SEÑOR» y terminología litúrgica ajena al pasaje; no hay referencia a YHWH, Mesías ni Espíritu en este verso.
