revisions:
- from: 'Entonces la mujer samaritana le dijo: «¿Cómo tú, siendo judío, me pides de beber[a], siendo yo una mujer samaritana? Porque los judíos no se relacionan con los samaritanos».'
  to: 'Entonces la mujer samaritana le dijo: «¿Cómo es que tú, siendo judío, me pides de beber, siendo yo una mujer samaritana?». (Porque los judíos no se relacionan[a] con los samaritanos.)'
  rationale: Se corrige el anclaje de la nota para que corresponda al término que realmente comenta, y se ajusta la puntuación para reflejar mejor la acotación explicativa del narrador en el original y en el POB inglés. También se mejora levemente la naturalidad del inicio de la pregunta en español, sin cambiar el sentido documentado.
  reviewer_model: gpt-5.4
