translation:
  language: es
  text: Porque has tenido cinco maridos[a], y el hombre que ahora tienes no es tu marido; en esto has dicho la verdad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Porque has tenido cinco hombres, y el que ahora tienes no es tu hombre/marido». El griego ἀνήρ puede significar «hombre» o «marido»; aquí el contexto favorece «marido».'
    reason: lexical_alternative
lexical_decisions:
- source_word: πέντε
  english_pob_choice: five
  chosen_spanish: cinco
  alternatives_spanish:
  - cinco (quedó igual)
  lexicon: BDAG
  rationale: Es un numeral cardinal directo; en español no presenta dificultad ni requiere adaptación.
- source_word: γὰρ
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Aquí introduce la razón del juicio de Jesús sobre la verdad de la afirmación previa. «Porque» conserva con claridad el valor explicativo.
- source_word: ἄνδρας
  english_pob_choice: husbands
  chosen_spanish: maridos
  alternatives_spanish:
  - esposos
  - hombres
  lexicon: BDAG
  rationale: Aunque ἀνήρ puede significar «hombre» o «esposo/marido», el contexto relacional y la oposición con «no es tu marido» favorecen el sentido marital. «Maridos» es natural en español y mantiene la relación explícita.
- source_word: ἔσχες
  english_pob_choice: you have had
  chosen_spanish: has tenido
  alternatives_spanish:
  - tuviste
  - has poseído
  lexicon: BDAG
  rationale: El aoristo refiere a una historia pasada con relevancia presente. «Has tenido» reproduce bien ese valor en español y suena idiomático.
- source_word: νῦν
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - en este momento
  - actualmente
  lexicon: BDAG
  rationale: Marca la situación presente de la mujer; «ahora» es la opción más directa y sobria.
- source_word: ὃν
  english_pob_choice: the man ... you now have
  chosen_spanish: el hombre que ahora tienes
  alternatives_spanish:
  - el que ahora tienes
  - a quien ahora tienes
  lexicon: BDAG
  rationale: El relativo se integra de forma natural en español con «el hombre que ahora tienes». Esto evita una construcción demasiado literal y mantiene el sentido relacional.
- source_word: ἔχεις
  english_pob_choice: you now have
  chosen_spanish: ahora tienes
  alternatives_spanish:
  - ahora posees
  - ahora llevas
  lexicon: BDAG
  rationale: Aquí ἔχω expresa relación o convivencia, no simple posesión material. «Tienes» es literal y comprensible en español.
- source_word: οὐκ ἔστιν σου ἀνήρ
  english_pob_choice: is not your husband
  chosen_spanish: no es tu marido
  alternatives_spanish:
  - no es tu esposo
  - no es tu hombre
  lexicon: BDAG
  rationale: La frase expresa negación de vínculo marital. «Marido» conserva la relación matrimonial con claridad; «esposo» sería posible, pero «marido» encaja mejor con el registro directo del versículo.
- source_word: τοῦτο ἀληθὲς εἴρηκας
  english_pob_choice: this you have said truly
  chosen_spanish: esto has dicho verdaderamente
  alternatives_spanish:
  - lo has dicho con verdad
  - esto lo has dicho con verdad
  lexicon: BDAG
  rationale: La combinación demostrativo + adjetivo predicativo + verbo perfecto señala la veracidad de lo dicho. «Verdaderamente» mantiene el adverbio sin sobreexplicar el sujeto de «esto».
theological_decisions:
- issue: Valor de ἀνήρ en las dos ocurrencias
  english_pob_reading: Render the first occurrence as 'husbands' and the second as 'husband.'
  chosen_spanish_reading: Traducir la primera como «maridos» y la segunda como «marido».
  alternative_spanish_readings:
  - Traducir ambas como «hombres»/«hombre»
  - Traducir ambas como «esposos»/«esposo»
  rationale: 'El griego usa el mismo lexema con dos funciones contextuales: historia matrimonial y relación presente no matrimonial. Mantener «maridos/marido» conserva la tensión relacional sin diluirla en un genérico.'
  doctrine_reference: John 4:18; principio de equivalencia óptima y respeto al contexto léxico
- issue: Cierre de la afirmación con τοῦτο ἀληθὲς εἴρηκας
  english_pob_reading: this you have said truly
  chosen_spanish_reading: «esto has dicho verdaderamente»
  alternative_spanish_readings:
  - «lo has dicho verdaderamente»
  - «esto has dicho con verdad»
  - «lo has dicho con verdad»
  rationale: El griego enfatiza que esa declaración concreta es verdadera. «Esto has dicho verdaderamente» preserva el demostrativo y el valor adverbial de ἀληθές sin añadir una paráfrasis interpretativa.
  doctrine_reference: John 4:18; fidelidad semántica al demostrativo y al predicado adverbial
translation_notes:
  revision_awareness: 'Se siguió el ajuste final del POB inglés que concluye con una afirmación adverbial de veracidad: τοῦτο ἀληθὲς εἴρηκας → «esto has dicho verdaderamente». También se conservó la diferenciación contextual de ἀνήρ, como en el audit trail inglés, con una nota para la alternativa más literal.'
  spanish_consistency_notes:
  - Se mantuvo «maridos/marido» para ἀνήρ, evitando «esposos» por registro y coherencia con el contraste interno del versículo.
  - Se eligió «porque» para γὰρ por su valor explicativo directo en español.
  - «Has tenido» refleja el aoristo con relevancia presente, en paralelo al inglés POB.
  - La puntuación con punto y coma ayuda a reflejar la clausula final separada del razonamiento principal, sin añadir contenido.
  - Se evitó capitalizar innecesariamente el pronombre o introducir un sujeto explícito donde el español ya lo recupera del verbo.
