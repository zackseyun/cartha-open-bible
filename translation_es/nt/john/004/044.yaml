revisions:
- from: Porque Jesús mismo testificó que un profeta no recibe honra en su propia patria[a].
  to: Porque Jesús mismo testificó que un profeta no tiene honor en su propia patria[a].
  rationale: Se revisa únicamente la cláusula final para alinearla más estrechamente con el griego τιμὴν οὐκ ἔχει y con la decisión auditada en inglés de conservar el sustantivo «honor» en vez de convertirlo en una expresión de recepción. El resto del borrador es fiel, claro y teológicamente prudente.
