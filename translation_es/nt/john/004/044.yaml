translation:
  language: es
  text: Porque Jesús mismo testificó que un profeta no tiene honor en su propia patria[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en su propia tierra» o «en su lugar de origen». El griego πατρίς puede referirse a la patria, la región natal o el hogar de origen.'
    reason: lexical_alternative
lexical_decisions:
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque, en efecto
  lexicon: BDAG
  rationale: γάρ introduce una explicación o fundamentación del contexto anterior. En español, «Porque» expresa con naturalidad esa relación causal-explicativa sin añadir interpretación.
- source_word: αὐτὸς ... Ἰησοῦς
  english_pob_choice: Jesus himself
  chosen_spanish: Jesús mismo
  alternatives_spanish:
  - el mismo Jesús
  - Jesús
  lexicon: BDAG
  rationale: αὐτός es enfático en aposición con Ἰησοῦς. «Jesús mismo» conserva el énfasis sin volverse pesado.
- source_word: ἐμαρτύρησεν
  english_pob_choice: testified
  chosen_spanish: testificó
  alternatives_spanish:
  - dio testimonio
  - atestiguó
  - declaró
  lexicon: BDAG
  rationale: μαρτυρέω pertenece al campo de testimonio. «Testificó» mantiene ese lenguaje forense/testimonial, muy propio de Juan, y suena natural en español bíblico contemporáneo.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - —
  lexicon: BDAG
  rationale: Introduce el contenido de la declaración; «que» es el complemento estándar en español.
- source_word: προφήτης
  english_pob_choice: a prophet
  chosen_spanish: un profeta
  alternatives_spanish:
  - profeta
  lexicon: BDAG
  rationale: El singular anartro en griego puede expresar una afirmación proverbial e indefinida. «Un profeta» conserva ese valor natural en español.
- source_word: ἐν τῇ ἰδίᾳ πατρίδι
  english_pob_choice: in his own homeland
  chosen_spanish: en su propia patria
  alternatives_spanish:
  - en su propio país
  - en su propia tierra
  - en su lugar de origen
  lexicon: BDAG
  rationale: πατρίς puede significar patria, tierra natal o región de origen. «Patria» es una traducción digna y amplia; «propia» refleja ἰδίᾳ. Se evita resolver en el texto principal si el referente es Nazaret, Galilea o una región más amplia.
- source_word: τιμὴν οὐκ ἔχει
  english_pob_choice: has no honor
  chosen_spanish: no recibe honra
  alternatives_spanish:
  - no tiene honra
  - no recibe honor
  - no es honrado
  lexicon: BDAG
  rationale: El griego dice literalmente «no tiene honor». En español, «no recibe honra» comunica bien el resultado relacional y mantiene el sustantivo de honor/ honra. Se prefiere «honra» por su registro bíblico y claridad, sin convertir la frase en pasiva.
theological_decisions:
- issue: Alcance geográfico de πατρίς
  english_pob_reading: Translate the proverb straightforwardly without resolving whether 'his own homeland' refers specifically to Judea, Galilee, or Nazareth in this narrative context.
  chosen_spanish_reading: 'Traducir el proverbio de forma general: «en su propia patria», sin identificar en el texto principal un lugar específico.'
  alternative_spanish_readings:
  - en Nazaret
  - en Galilea
  - en Judea
  - en su país natal
  rationale: El verso presenta un dicho proverbial y no define explícitamente el referente geográfico. Mantener la generalidad preserva la tensión interpretativa documentada por POB y evita cerrar una cuestión que el contexto inmediato no resuelve.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se siguió el estado de revisión más reciente sin cambios sustantivos; la concordancia de auditoría es alta y no se registraron revisiones aplicadas. La redacción española conserva el énfasis de αὐτός, el lenguaje testimonial de μαρτυρέω y la ambigüedad controlada de πατρίς.
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς y no se usa «Cristo», porque el texto no lo contiene.
  - Se usa «honra»/«honra» en una construcción idiomática española que conserva el sustantivo τιμή.
  - Se evita «SEÑOR» o equivalentes no pertinentes; no hay término divino explícito en este versículo.
  - La nota al pie se ancla en «patria» para reflejar la alternativa lexical de πατρίς.
