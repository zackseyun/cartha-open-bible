review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: mantiene el valor explicativo de γάρ, el énfasis de «Jesús mismo», el carácter proverbial de «un profeta» y no resuelve indebidamente el alcance geográfico de πατρίς. Sin embargo, en la cláusula final se aparta innecesariamente de la forma nominal de τιμὴν οὐκ ἔχει («no tiene honor») al traducir «no recibe honra».'
  spanish_quality_summary: El español es claro y digno, pero puede ajustarse para mayor fidelidad y naturalidad bíblica. «No recibe honra» suena aceptable, aunque «no tiene honor» reproduce mejor la estructura y el sustantivo del original y además armoniza con la auditoría inglesa. «Patria» es defendible, pero en español bíblico general «tierra» suele sonar más natural; aun así, no es necesario cambiarlo si se conserva la nota.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Jesús» está correcto. No aparecen términos con directrices especiales como Yahvé, Mesías, esclavo, etc. La decisión sobre πατρίς permanece dentro de lo documentado por POB, con nota de alternativas adecuada.
  issues:
  - severity: medium
    issue: «no recibe honra» en lugar de una forma más cercana a τιμὴν οὐκ ἔχει
    rationale: El griego dice literalmente «no tiene honor». La versión inglesa auditada preserva esa construcción nominal («has no honor»). «No recibe honra» comunica un sentido similar, pero desplaza el foco a la recepción y se aleja de la decisión léxica documentada.
  - severity: low
    issue: Uso de «honra» frente a «honor»
    rationale: «Honra» es comprensible y de registro bíblico, pero «honor» conecta más directamente con la auditoría inglesa y suena más neutral y ampliamente natural en español contemporáneo. No es error grave, pero conviene uniformar.
  revised_spanish_text: Porque Jesús mismo testificó que un profeta no tiene honor en su propia patria[a].
  revised_footnotes:
  - marker: a
    text: 'O: «en su propia tierra» o «en su lugar de origen». El griego πατρίς puede referirse a la patria, la región natal o el hogar de origen.'
    reason: lexical_alternative
