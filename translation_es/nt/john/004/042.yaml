    changes_summary: Changed 'because of what you said' to 'because of your word' for closer lexical correspondence to λαλιὰν while keeping natural English; otherwise retained the draft.
translation:
  language: es
  text: 'Y le decían a la mujer[a]: «Ya no creemos por tu palabra, porque nosotros mismos hemos oído, y sabemos que este[b] es verdaderamente el Salvador del mundo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más formalmente, «por tu manera de hablar» o «por tu palabra». El griego se refiere al testimonio hablado de la mujer.
    reason: lexical_alternative
  - marker: b
    text: Algunas traducciones dicen «este hombre» o simplemente «él» para οὗτός. El demostrativo griego es más enfático.
    reason: lexical_alternative
lexical_decisions:
- source_word: τῇ τε γυναικὶ
  english_pob_choice: to the woman
  chosen_spanish: a la mujer
  alternatives_spanish:
  - a la mujer también
  - y a la mujer
  lexicon: BDAG
  rationale: El dativo marca destinatario indirecto; τε añade una leve continuidad/conexión que en español puede quedar implícita. «A la mujer» es natural y fiel, y evita sobrecargar el inicio con un calco innecesario.
- source_word: ἔλεγον
  english_pob_choice: they were saying
  chosen_spanish: le decían
  alternatives_spanish:
  - decían
  - estaban diciendo
  lexicon: BDAG
  rationale: El imperfecto expresa acción reiterada o en desarrollo en pasado. «Le decían» conserva bien ese matiz en español sin sonar forzado.
- source_word: Οὐκέτι
  english_pob_choice: no longer
  chosen_spanish: ya no
  alternatives_spanish:
  - no más
  - ya no seguimos
  lexicon: BDAG
  rationale: «Ya no» es la negación temporal natural en español para indicar que cesó la base anterior de la creencia.
- source_word: διὰ τὴν σὴν λαλιὰν
  english_pob_choice: because of your word
  chosen_spanish: por tu palabra
  alternatives_spanish:
  - por tu hablar
  - por tu dicho
  - por tu testimonio
  lexicon: BDAG
  rationale: διά con acusativo expresa causa o fundamento. Aunque λαλιὰν puede acercarse a «habla» o «hablar», en este contexto la idea es la palabra/testimonio pronunciado por la mujer. «Por tu palabra» refleja esa base de manera natural y mantiene la conexión con la audición directa que sigue.
- source_word: πιστεύομεν
  english_pob_choice: we believe
  chosen_spanish: creemos
  alternatives_spanish:
  - estamos creyendo
  lexicon: BDAG
  rationale: El presente indicativo expresa la creencia actual. «Creemos» es la equivalencia natural en español.
- source_word: αὐτοὶ
  english_pob_choice: we ourselves
  chosen_spanish: nosotros mismos
  alternatives_spanish:
  - nosotros personalmente
  - nosotros mismos, de hecho
  lexicon: BDAG
  rationale: El pronombre intensivo subraya experiencia directa en contraste con el testimonio de segunda mano. «Nosotros mismos» preserva ese énfasis.
- source_word: ἀκηκόαμεν
  english_pob_choice: have heard
  chosen_spanish: hemos oído
  alternatives_spanish:
  - hemos escuchado
  - oímos
  lexicon: BDAG
  rationale: El perfecto indica una acción completada con efecto presente. «Hemos oído» es el equivalente estándar y conserva la fuerza testimonial.
- source_word: οἴδαμεν
  english_pob_choice: we know
  chosen_spanish: sabemos
  alternatives_spanish:
  - hemos llegado a saber
  lexicon: BDAG
  rationale: οἶδα funciona como verbo de estado con sentido presente. «Sabemos» comunica con claridad el conocimiento firme que declaran.
- source_word: οὗτός
  english_pob_choice: this one
  chosen_spanish: este
  alternatives_spanish:
  - este mismo
  - él
  lexicon: BDAG
  rationale: El demostrativo es enfático y señala a Jesús. En español, «este» conserva la deíxis sin sonar artificial; el énfasis queda reforzado por el contexto y por «verdaderamente».
- source_word: ἀληθῶς
  english_pob_choice: truly
  chosen_spanish: verdaderamente
  alternatives_spanish:
  - realmente
  - de verdad
  lexicon: BDAG
  rationale: El adverbio intensifica la confesión. «Verdaderamente» preserva el tono solemne y confesional mejor que opciones más coloquiales.
- source_word: ὁ σωτὴρ
  english_pob_choice: the Savior
  chosen_spanish: el Salvador
  alternatives_spanish:
  - el libertador
  - el que salva
  lexicon: BDAG
  rationale: «Salvador» es el equivalente establecido y mantiene el peso cristológico del término sin perder claridad.
- source_word: τοῦ κόσμου
  english_pob_choice: of the world
  chosen_spanish: del mundo
  alternatives_spanish:
  - de todo el mundo
  lexicon: BDAG
  rationale: κόσμος tiene aquí alcance universal. «Del mundo» reproduce directamente el genitivo sin ampliar interpretativamente a «todo el mundo».
theological_decisions:
- issue: Alcance universal de la confesión samaritana
  english_pob_reading: Rendered the confession straightforwardly as 'this one truly is the Savior of the world' without narrowing 'world' to a subgroup or expanding it into a doctrinal statement beyond the text.
  chosen_spanish_reading: 'La confesión se traduce de forma directa: «este es verdaderamente el Salvador del mundo», sin restringir «mundo» a un grupo menor ni ampliarlo con formulaciones doctrinales ajenas al versículo.'
  alternative_spanish_readings:
  - «el Salvador de todas las personas»
  - «el Salvador de los escogidos del mundo»
  rationale: El texto presenta una confesión de alcance amplio. La traducción debe conservar esa amplitud y la tensión teológica sin resolverla por anticipado con aclaraciones doctrinales que no están en el griego.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla.
translation_notes:
  revision_awareness: El borrador en inglés pasó de «because of what you said» a «because of your word» para acercarse más a λαλιὰν sin perder naturalidad. En español se siguió esa línea con «por tu palabra», manteniendo la conexión entre el dicho/testimonio de la mujer y la afirmación subsiguiente de haber oído directamente a Jesús.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto exige el nombre divino; aquí no aparece.
  - Se mantuvo «Salvador» en lugar de glosas como «libertador» para conservar el valor cristológico del sustantivo.
  - Se prefirió «este» para οὗτός, porque en español conserva la deixis demostrativa sin forzar una construcción como «este hombre» o «él».
  - Se respetó el imperfecto con «le decían» para reflejar mejor ἔλεγον.
  - Se eligió «hemos oído» para ἀκηκόαμεν, siguiendo el valor perfecto del griego.
