  text: τῇ τε γυναικὶ ἔλεγον ὅτι Οὐκέτι διὰ τὴν σὴν λαλιὰν πιστεύομεν· αὐτοὶ γὰρ ἀκηκόαμεν, καὶ οἴδαμεν ὅτι οὗτός ἐστιν ἀληθῶς ὁ σωτὴρ τοῦ ⸀κόσμου.
base_translation:
  language: en
  yaml_path: translation/nt/john/004/042.yaml
  text: And they were saying to the woman[a], “We no longer believe because of your word, for we ourselves have heard[b], and we know that this one truly is the Savior of the world.”
  footnotes:
  - marker: a
    text: Or, more formally, 'because of your speech.' The Greek refers to the woman's spoken testimony.
    reason: lexical_alternative
  - marker: b
    text: Some translations render 'this man' or simply 'he' for 'this one.' The Greek demonstrative is more emphatic.
    reason: lexical_alternative
