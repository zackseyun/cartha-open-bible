translation:
  language: es
  text: Dejó Judea y fue de nuevo a Galilea[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de nuevo a Galilea». El adverbio griego πάλιν puede traducirse «de nuevo» o «otra vez», pero aquí probablemente lleva el sentido de regreso; por eso también podría expresarse «de vuelta a Galilea».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀφῆκεν
  english_pob_choice: left
  chosen_spanish: dejó
  alternatives_spanish:
  - abandonó
  - se fue de
  lexicon: BDAG
  rationale: En este contexto de desplazamiento geográfico, ἀφίημι expresa dejar un lugar atrás. «Dejó» conserva la naturalidad del inglés POB «left» y funciona bien con el complemento directo «Judea».
- source_word: Ἰουδαίαν
  english_pob_choice: Judea
  chosen_spanish: Judea
  alternatives_spanish:
  - la región de Judea
  - Judea la región
  lexicon: BDAG
  rationale: Es el nombre geográfico convencional en español para la región; la transliteración permite mantener la referencia territorial sin añadir explicación innecesaria.
- source_word: ἀπῆλθεν
  english_pob_choice: went
  chosen_spanish: volvió
  alternatives_spanish:
  - fue
  - partió
  lexicon: BDAG
  rationale: Aunque el verbo base denota irse o partir, el contexto y πάλιν apuntan a retorno. «Volvió» comunica mejor la idea de regreso que una repetición mecánica de «fue».
- source_word: πάλιν
  english_pob_choice: back
  chosen_spanish: volvió
  alternatives_spanish:
  - de nuevo
  - otra vez
  lexicon: BDAG
  rationale: El inglés POB optó por «back» porque aquí πάλιν sugiere retorno. En español, ese matiz ya queda integrado en «volvió», por lo que no hace falta una segunda palabra que sonaría redundante.
- source_word: εἰς τὴν Γαλιλαίαν
  english_pob_choice: to Galilee
  chosen_spanish: a Galilea
  alternatives_spanish:
  - hacia Galilea
  - a la Galilea
  lexicon: BDAG
  rationale: εἰς marca destino. «A Galilea» es la forma natural en español para indicar movimiento hacia una región.
translation_notes:
  revision_awareness: El inglés POB fue revisado y quedó sin cambios; mantengo la misma decisión de sentido para πάλιν, pero la integro en español con una sola expresión natural para evitar redundancia.
  spanish_consistency_notes:
  - Se usa «Judea» y «Galilea» como topónimos establecidos, en paralelo con la práctica habitual del POB en inglés.
  - No se introduce vocabulario doctrinal adicional; el versículo es puramente narrativo.
  - La nota al pie preserva la alternativa semántica de πάλιν sin romper la fluidez del texto español.
