lexical_decisions:
- source_word: ἐξῆλθον
  english_pob_choice: went out
  chosen_spanish: salieron
  alternatives_spanish:
  - salieron de
  - salieron fuera de
  - salieron
  lexicon: BDAG
  rationale: El aoristo de ἐξέρχομαι expresa salida desde un lugar definido. «Salieron» comunica la acción completa con naturalidad en español; el complemento se explicita en la frase para conservar el movimiento desde la ciudad.
- source_word: ἐκ τῆς πόλεως
  english_pob_choice: of the city
  chosen_spanish: de la ciudad
  alternatives_spanish:
  - fuera de la ciudad
  - desde la ciudad
  - de la ciudad
  lexicon: BDAG
  rationale: La preposición ἐκ marca procedencia desde el interior del lugar. «De la ciudad» es idiomático en español y conserva la idea de salida desde ese espacio.
- source_word: ἤρχοντο
  english_pob_choice: were coming
  chosen_spanish: venían
  alternatives_spanish:
  - venían
  - iban
  - se acercaban
  lexicon: BDAG
  rationale: El imperfecto de ἔρχομαι presenta una acción en curso en el pasado. «Venían» conserva ese aspecto imperfectivo de manera natural; «iban» podría sugerir otro punto de vista, y «se acercaban» añade una interpretación más explícita.
- source_word: πρὸς αὐτόν
  english_pob_choice: to him
  chosen_spanish: hacia él
  alternatives_spanish:
  - a él
  - hacia él
  - para él
  lexicon: BDAG
  rationale: La construcción con πρός + acusativo indica movimiento orientado hacia una persona. «Hacia él» reproduce mejor la dirección del movimiento que un simple «a él».
translation_notes:
  revision_awareness: 'La revisión previa señalaba un problema de validación: el marcador de nota debía aparecer en el texto español. Se corrigió anclando [a] directamente en la frase final para que la alternativa léxica quede vinculada al lugar correspondiente.'
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y bíblico en español contemporáneo.
  - No se introdujo vocabulario tradicionalizante innecesario; «venían hacia él» preserva el imperfectivo del griego.
  - La nota alternativa se limitó a la diferencia aspectual/lexical sin alterar el sentido principal.
