    issue: La nota al pie no corresponde bien a la alternativa auditada en inglés.
    rationale: El inglés preserva «were on their way to him» como alternativa; «estaban viniendo hacia él» no expresa ese matiz y además suena poco idiomático en español.
  - severity: low
    issue: «Hacia él» en el texto principal es un poco menos natural que «a él» en español narrativo.
    rationale: πρὸς αὐτόν puede expresarse naturalmente como «a él» cuando el verbo ya implica movimiento; esto mantiene fidelidad y mejora la fluidez.
  revised_spanish_text: Salieron de la ciudad y venían a él[a].
