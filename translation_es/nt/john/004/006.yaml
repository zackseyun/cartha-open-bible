translation:
  language: es
  text: Y allí estaba el pozo de Jacob[a]. Entonces Jesús, cansado del viaje, estaba sentado junto al pozo[b]. Era como la sexta hora[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «manantial»; el griego πηγή puede denotar un manantial o un pozo.
    reason: lexical_alternative
  - marker: b
    text: O «estaba sentado así», con posible sentido de «tal como estaba» o «de ese modo».
    reason: lexical_alternative
  - marker: c
    text: Es decir, aproximadamente al mediodía si se cuenta según las horas diurnas judías.
    reason: alternative_reading
lexical_decisions:
- source_word: πηγή
  english_pob_choice: well
  chosen_spanish: pozo
  alternatives_spanish:
  - manantial
  - fuente
  lexicon: BDAG
  rationale: En este contexto, πηγή puede referirse a un manantial o a un pozo. Dado que el relato posterior presupone un lugar asociado con sacar agua, ‘pozo’ es la opción más natural y readable en español. Mantiene el nombre tradicional del lugar sin borrar la alternativa lexical de ‘manantial/fuente’.
- source_word: κεκοπιακὼς
  english_pob_choice: wearied
  chosen_spanish: cansado
  alternatives_spanish:
  - fatigado
  - cansado por el esfuerzo
  lexicon: BDAG
  rationale: El participio perfecto expresa un estado resultante del cansancio producido por la actividad. ‘Cansado’ comunica ese estado con naturalidad en español; ‘fatigado’ sería más elevado, pero menos idiomático aquí.
- source_word: ἐκ τῆς ὁδοιπορίας
  english_pob_choice: from the journey
  chosen_spanish: del viaje
  alternatives_spanish:
  - del camino
  - de la caminata
  - de su viaje
  lexicon: BDAG
  rationale: La expresión marca la causa del cansancio. ‘Del viaje’ es la forma más natural y concisa en español, preservando el sentido causal de ἐκ sin sobreespecificar.
- source_word: ἐκαθέζετο
  english_pob_choice: was sitting
  chosen_spanish: se sentaba
  alternatives_spanish:
  - estaba sentado
  - se estaba sentando
  lexicon: BDAG
  rationale: El imperfecto describe una acción en curso o una escena en desarrollo. ‘Se sentaba’ mantiene ese valor aspectual en español y funciona mejor que un perfecto puntual.
- source_word: οὕτως
  english_pob_choice: there / thus
  chosen_spanish: así
  alternatives_spanish:
  - de ese modo
  - allí
  - justo así
  lexicon: BDAG
  rationale: 'El adverbio es semánticamente difícil: puede matizar modo, estado o incluso la situación del estar sentado. ‘Así’ conserva la ambigüedad sin resolverla en exceso; la nota puede recoger las alternativas interpretativas.'
- source_word: ἐπὶ τῇ πηγῇ
  english_pob_choice: by the well
  chosen_spanish: junto al pozo
  alternatives_spanish:
  - al lado del pozo
  - en el pozo
  - sobre el pozo
  lexicon: BDAG
  rationale: Con ἐπί y dativo, aquí se trata de ubicación. ‘Junto al pozo’ es la expresión natural en español para alguien sentado al lado de una fuente de agua.
- source_word: ὥρα ἦν ὡς ἕκτη
  english_pob_choice: It was about the sixth hour
  chosen_spanish: Era como la hora sexta
  alternatives_spanish:
  - Era cerca de la hora sexta
  - Era alrededor de la sexta hora
  - Era como al mediodía
  lexicon: BDAG
  rationale: Se conserva la expresión fuente ‘hora sexta’ para no resolver de antemano el debate cronológico joánico. ‘Como’ refleja ὡς y mantiene la aproximación del texto griego.
- source_word: δὲ / οὖν
  english_pob_choice: Now / So
  chosen_spanish: Y / Entonces
  alternatives_spanish:
  - Ahora / Así que
  - Pero / Por tanto
  lexicon: BDAG
  rationale: Estas partículas enlazan el avance narrativo. En español, ‘Y’ al inicio y ‘Entonces’ ofrecen una transición clara sin cargar de interpretación las partículas.
theological_decisions:
- issue: Referencia temporal en ‘la hora sexta’
  english_pob_reading: Retain the literal expression 'about the sixth hour' in the main text.
  chosen_spanish_reading: Mantener ‘como la hora sexta’ en el texto principal.
  alternative_spanish_readings:
  - como al mediodía
  - aproximadamente a las doce
  - como a las seis de la tarde
  rationale: La frase tiene importancia interpretativa en la cronología joánica. El griego no obliga a una equivalencia moderna inmediata, así que conviene preservar la tensión textual en la traducción principal.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Ambigüedad de οὕτως
  english_pob_reading: Or 'was sitting thus,' possibly implying 'just as he was' or 'in this way.'
  chosen_spanish_reading: Conservar ‘así’ sin explicitar más la relación exacta.
  alternative_spanish_readings:
  - sentado de ese modo
  - sentado tal como estaba
  - simplemente sentado
  rationale: El término puede describir manera o estado, y la tradición editorial del POB preserva esa tensión. Traducirlo con demasiada precisión eliminaría una ambigüedad real del griego.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto griego y coincide sustancialmente con la última pasada sin cambios del expediente inglés. Se preservan las mismas tensiones principales: πηγή como término potencialmente doble, οὕτως como adverbio difícil, y ὥρα ἦν ὡς ἕκτη sin resolver cronología moderna.'
  spanish_consistency_notes:
  - Se usa ‘pozo’ en el cuerpo principal porque es más natural en español, mientras la nota conserva la alternativa ‘manantial’.
  - Se evita ‘SEÑOR’ u otras sustituciones no presentes en el versículo; el nombre propio Jesús queda sin cambio.
  - ‘Hora sexta’ se mantiene como expresión fuente para conservar el valor textual y la discusión cronológica.
  - ‘Así’ se deja deliberadamente abierto para reflejar la ambigüedad del adverbio griego.
  - La puntuación y el orden responden a una lectura española fluida sin desatender el orden narrativo del griego.
