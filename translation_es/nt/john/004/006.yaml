revisions:
- from: Y estaba allí el pozo de Jacob[a]. Entonces Jesús, cansado del viaje, se sentaba así[b] junto al pozo. Era como la hora sexta[c].
  to: Y allí estaba el pozo de Jacob[a]. Entonces Jesús, cansado del viaje, estaba sentado junto al pozo[b]. Era como la sexta hora[c].
  rationale: Se ajusta el español para reflejar mejor el aspecto descriptivo de ἐκαθέζετο con «estaba sentado», dejando la ambigüedad de οὕτως en la nota, en línea con el POB inglés. También se corrige «como la hora sexta» a «como la sexta hora» por naturalidad y fidelidad idiomática. El resto del versículo y las notas pueden conservarse sustancialmente.
