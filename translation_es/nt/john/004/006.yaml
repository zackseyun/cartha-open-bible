review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: πηγή como «pozo» con nota alternativa, κεκοπιακώς como cansancio por el viaje, y la preservación de «la sexta hora» con nota interpretativa. Sin embargo, dos elecciones no preservan bien el matiz fuente/POB: «se sentaba» para ἐκαθέζετο suena habitual/iterativo en español más que descriptivo progresivo, y «Era como la hora sexta» es poco idiomático y no refleja tan bien el inglés auditado «about the sixth hour» como «Era como la sexta hora» o «era alrededor de la sexta hora».'
  spanish_quality_summary: El español es mayormente claro, pero tiene giros algo poco naturales o ambiguos innecesariamente. «Y estaba allí» es aceptable, aunque algo rígido; «se sentaba así» puede entenderse como acción repetida, no como estado descriptivo en esa escena. «Era como la hora sexta» suena forzado en español eclesial moderno; «Era como la sexta hora» es más natural y sigue siendo literal. El resto del verso es legible y digno.
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. «Jesús», «pozo», «cansado», «junto al pozo» y la retención de «sexta hora» concuerdan con el rastro léxico inglés. La nota sobre πηγή como posible «manantial» está bien conservada. La decisión sobre οὕτως puede mantenerse en nota, pero el texto principal debe expresarse de forma idiomática en español.
  issues:
  - severity: medium
    issue: «se sentaba así» para ἐκαθέζετο οὕτως
    rationale: Aunque intenta reflejar el imperfecto y οὕτως, en español «se sentaba» suele leerse como iterativo/habitual (‘solía sentarse’) más que como descripción puntual en progreso. «Estaba sentado allí/así» o «estaba sentado junto al pozo» comunica mejor la escena. Además, el inglés POB resuelve οὕτως idiomáticamente en el texto principal y deja la literalidad en nota.
  - severity: medium
    issue: «Era como la hora sexta»
    rationale: La frase es comprensible pero poco natural en español. El griego ὥρα ἦν ὡς ἕκτη se representa mejor como «Era como la sexta hora» o «Era alrededor de la sexta hora», preservando a la vez la aproximación y la literalidad de la expresión fuente.
  - severity: low
    issue: 'Orden y fluidez inicial: «Y estaba allí el pozo de Jacob»'
    rationale: No es incorrecto, pero «Y allí estaba el pozo de Jacob» fluye mejor en español narrativo sin alterar el sentido. Es una mejora estilística menor.
