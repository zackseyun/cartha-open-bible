translation:
  language: es
  text: No pido solo por estos, sino también por los que creen en mí por medio de su palabra[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mediante su palabra».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «los que creen en mí por medio de su palabra».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐρωτῶ
  english_pob_choice: I ask
  chosen_spanish: ruego
  alternatives_spanish:
  - pido
  - pregunto
  lexicon: BDAG
  rationale: En español, en el contexto joánico de la oración de Jesús al Padre, «ruego» comunica mejor la fuerza de una petición intercesora que un simple «pregunto». Mantiene el sentido de petición sin volverlo excesivamente litúrgico.
- source_word: περὶ τούτων
  english_pob_choice: concerning these
  chosen_spanish: por estos
  alternatives_spanish:
  - acerca de estos
  - concerning these
  lexicon: BDAG
  rationale: La preposición griega περί con genitivo indica referencia o asunto. En español, «por estos» funciona de forma natural con «ruego» y conserva la referencia a los discípulos inmediatos sin sobreespecificar.
- source_word: μόνον
  english_pob_choice: only
  chosen_spanish: solo
  alternatives_spanish:
  - solamente
  - únicamente
  lexicon: BDAG
  rationale: «Solo» reproduce la limitación de alcance de manera natural y directa en español.
- source_word: τῶν πιστευόντων
  english_pob_choice: those who believe
  chosen_spanish: los que creen
  alternatives_spanish:
  - los creyentes
  - los que están creyendo
  lexicon: BDAG
  rationale: El participio presente sustantivado expresa a quienes creen; «los que creen» conserva el valor verbal mejor que un sustantivo fijo. Se evita forzar una forma progresiva poco natural en español.
- source_word: διὰ τοῦ λόγου αὐτῶν
  english_pob_choice: through their word
  chosen_spanish: mediante la palabra de ellos
  alternatives_spanish:
  - por medio de su palabra
  - a través de su mensaje
  lexicon: BDAG
  rationale: «Palabra» conserva la cercanía con λόγος y el eco joánico del término. «Mediante» expresa con claridad el medio instrumental. Se prefiere «de ellos» para mantener el referente a los discípulos y la posible ambivalencia entre palabra, testimonio o mensaje.
- source_word: εἰς ἐμέ
  english_pob_choice: in me
  chosen_spanish: en mí
  alternatives_spanish:
  - crean en mí
  - hacia mí
  lexicon: BDAG
  rationale: Con πιστεύω, εἰς se traduce idiomáticamente en español como «en». Se conserva la construcción establecida sin convertir la frase en una paráfrasis explicativa.
theological_decisions:
- issue: Alcance de la oración de Jesús más allá del grupo inmediato
  english_pob_reading: The verse includes future believers who come to faith through the apostles' witness.
  chosen_spanish_reading: El versículo abarca no solo a los discípulos presentes, sino también a los que lleguen a creer por medio de su palabra.
  alternative_spanish_readings:
  - Solo se refiere a los que ya creen en ese momento.
  - Se limita a un círculo ya definido de oyentes inmediatos.
  rationale: La construcción con «los que creen» y «mediante la palabra de ellos» permite una extensión natural a creyentes posteriores sin añadir explícitamente un futuro inexistente en el griego. La redacción española conserva esa amplitud sin resolverla artificialmente.
  doctrine_reference: Preservar la tensión interpretativa sin imponer más precisión temporal que la del texto.
translation_notes:
  revision_awareness: El borrador sigue de cerca el griego de SBLGNT y el análisis POB en inglés, manteniendo la relación entre petición, alcance y medio de fe. No se introdujeron revisiones textuales adicionales; se optó por una formulación española natural que conserva la ambigüedad temporal y el vínculo entre λόγος y testimonio.
  spanish_consistency_notes:
  - Se usa «ruego» para ἐρωτῶ en contexto de oración, sin desplazar el sentido básico de petición.
  - Se evita «SEÑOR» o «Cristo» porque el versículo no los exige léxicamente.
  - «Palabra» mantiene el eco de λόγος y permite la alternativa semántica de «mensaje» sin fijarla en el texto principal.
  - «En mí» conserva la construcción habitual con creer, conforme al patrón joánico.
