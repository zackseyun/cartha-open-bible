revisions:
- from: No ruego solo por estos[a], sino también por los que creen en mí mediante la palabra de ellos[b].
  to: No pido solo por estos, sino también por los que creen en mí por medio de su palabra[a][b].
  rationale: Se corrige el verbo principal a «pido» para alinearlo mejor con ἐρωτῶ y con la filosofía del POB inglés. Se rehace la frase instrumental como «por medio de su palabra» para mejorar la naturalidad del español sin perder la cercanía a λόγος. Se reubican y reformulan las notas para que correspondan correctamente a διὰ τοῦ λόγου αὐτῶν y al participio sustantivado griego.
