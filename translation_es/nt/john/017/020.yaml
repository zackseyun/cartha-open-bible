  - severity: medium
    issue: «La palabra de ellos» es comprensible pero poco natural en español amplio.
    rationale: «Su palabra» o «por medio de su palabra» suena más idiomático sin perder el referente a los discípulos. La forma actual no es incorrecta, pero sí menos legible.
