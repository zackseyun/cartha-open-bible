  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. «El maligno» corresponde bien a la decisión inglesa «the evil one», con la alternativa «el mal» preservada en nota.
