translation:
  language: es
  text: No estoy pidiendo que los saques del mundo, sino que los guardes del maligno[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «del mal». El griego τοῦ πονηροῦ puede significar «el maligno» o «el mal».'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐρωτῶ
  english_pob_choice: I am asking
  chosen_spanish: estoy pidiendo
  alternatives_spanish:
  - pido
  - estoy solicitando
  lexicon: BDAG
  rationale: El presente indicativo en primera persona expresa una acción actual en curso dentro de la oración de Jesús. «Estoy pidiendo» conserva ese valor progresivo de la petición y evita un registro excesivamente litúrgico que «oro» podría sugerir en español.
- source_word: ἄρῃς
  english_pob_choice: take
  chosen_spanish: saques
  alternatives_spanish:
  - quites
  - saques fuera
  - retires
  lexicon: BDAG
  rationale: αἴρω aquí significa sacar o remover fuera de un ámbito. «Sacar del mundo» reproduce bien la idea de separación espacial/relacional sin forzar un calco menos natural.
- source_word: κόσμου
  english_pob_choice: world
  chosen_spanish: mundo
  alternatives_spanish:
  - mundo creado
  - orden del mundo
  - sociedad humana
  lexicon: BDAG
  rationale: En el uso joánico, κόσμος puede implicar el orden humano caído, pero «mundo» es la forma más directa y amplia en español, y preserva la ambigüedad teológica del término.
- source_word: τηρήσῃς
  english_pob_choice: keep
  chosen_spanish: guardes
  alternatives_spanish:
  - protejas
  - custodies
  - preservas
  lexicon: BDAG
  rationale: τηρέω puede significar guardar, preservar o proteger. «Guardar» mantiene la relación semántica con la petición de protección y suena natural en español bíblico contemporáneo.
- source_word: ἐκ
  english_pob_choice: from
  chosen_spanish: del
  alternatives_spanish:
  - de
  - de parte de
  lexicon: BDAG
  rationale: Con τηρήσῃς ... ἐκ, el sentido es protección desde/contra. «Del maligno» comunica de manera natural la idea de resguardo respecto de un agente o poder hostil.
- source_word: τοῦ πονηροῦ
  english_pob_choice: the evil one
  chosen_spanish: el maligno
  alternatives_spanish:
  - el malo
  - el mal
  - el espíritu del mal
  lexicon: BDAG
  rationale: La forma griega es genuinamente ambigua entre un referente personal («el maligno») y uno impersonal («el mal»). «El maligno» sigue la lectura personal preferida por el POB inglés, mientras la nota conserva la alternativa impersonal para no resolver en exceso la tensión.
theological_decisions:
- issue: 'Ambigüedad de τοῦ πονηροῦ: personal o impersonal'
  english_pob_reading: the evil one
  chosen_spanish_reading: el maligno
  alternative_spanish_readings:
  - el mal
  rationale: El contexto joánico favorece una referencia personal a una fuerza hostil concreta, pero el griego permite también el sentido impersonal. Se mantiene la lectura personal en el texto principal y la alternativa en nota para preservar la tensión documentada.
  doctrine_reference: DOCTRINE.md § Translation philosophy 3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: La versión inglesa auditada está marcada como sin cambios en la última revisión y muestra acuerdo alto; esta propuesta española sigue esa línea sin introducir reajustes textuales innecesarios.
  spanish_consistency_notes:
  - Se mantiene «mundo» para κόσμος, en armonía con el uso joánico y con la decisión inglesa.
  - Se usa «el maligno» para τοῦ πονηροῦ, evitando la paráfrasis doctrinalmente cerrada y preservando la alternativa «el mal» en nota.
  - Se prefiere un español natural y sobrio («estoy pidiendo», «sacar del mundo», «guardar del maligno») sin perder la estructura contrastiva del griego.
