translation:
  language: es
  text: Y todo lo mío es tuyo[a], y lo tuyo es mío, y he sido glorificado en ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por medio de ellos» o «entre ellos». El griego dice «en ellos», lo cual puede expresar ubicación, medio o manifestación según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὰ ἐμὰ πάντα
  english_pob_choice: all that is mine
  chosen_spanish: todo lo mío
  alternatives_spanish:
  - todas mis cosas
  - todo lo que es mío
  lexicon: BDAG
  rationale: El neutro plural con πᾶς funciona sustantivamente y expresa posesión total. «Todo lo mío» conserva la amplitud sin volverlo materialista ni demasiado pesado en español.
- source_word: σά
  english_pob_choice: yours
  chosen_spanish: lo tuyo
  alternatives_spanish:
  - tuyo
  - lo que es tuyo
  lexicon: BDAG
  rationale: En una cláusula de equidad posesiva, «lo tuyo» suena natural en español y mantiene el paralelismo con «lo mío».
- source_word: τὰ σὰ ἐμά
  english_pob_choice: what is yours is mine
  chosen_spanish: lo tuyo es mío
  alternatives_spanish:
  - lo que es tuyo es mío
  - las cosas tuyas son mías
  lexicon: BDAG
  rationale: La forma breve conserva la reciprocidad explícita del griego y evita un literalismo incómodo. El sentido de posesión recíproca queda intacto.
- source_word: δεδόξασμαι
  english_pob_choice: I have been glorified
  chosen_spanish: he sido glorificado
  alternatives_spanish:
  - soy glorificado
  - he recibido gloria
  lexicon: BDAG
  rationale: El perfecto pasivo indica una acción cumplida con resultado vigente. «He sido glorificado» reproduce mejor ese valor que un simple presente.
- source_word: ἐν αὐτοῖς
  english_pob_choice: in them
  chosen_spanish: en ellos
  alternatives_spanish:
  - por medio de ellos
  - entre ellos
  lexicon: BDAG
  rationale: Se mantiene la preposición más directa del griego. «En ellos» deja abierta la posible fuerza locativa, instrumental o de manifestación que el contexto permite, sin resolverla indebidamente.
theological_decisions:
- issue: Posesión recíproca entre el Hijo y el Padre
  english_pob_reading: 'Render the statement straightforwardly as mutual possession: ''all that is mine is yours, and what is yours is mine.'''
  chosen_spanish_reading: 'Expresar de manera directa la posesión mutua: «todo lo mío es tuyo, y lo tuyo es mío».'
  alternative_spanish_readings:
  - una formulación más débil de cooperación funcional
  - una paráfrasis explicativa que atenúe la reciprocidad
  rationale: El griego afirma una posesión recíproca sin atenuantes. La traducción no debe suavizar ese alcance, aunque tampoco debe añadir terminología credal ajena al versículo.
  doctrine_reference: Af irmaciones nicenas sobre la plena comunión entre el Padre y el Hijo; NICENO-constantinopolitano (381) como marco doctrinal
- issue: Alcance de ἐν αὐτοῖς
  english_pob_reading: Keep the locative wording 'in them' in the main text.
  chosen_spanish_reading: Mantener «en ellos» en el texto principal.
  alternative_spanish_readings:
  - por medio de ellos
  - entre ellos
  rationale: La preposición ἐν admite matices contextuales, pero el texto no obliga a escoger uno en la línea principal. Preservar la forma directa respeta la ambigüedad útil del original.
  doctrine_reference: 'Principio de traducción: preservar tensiones semánticas cuando el original no las resuelve'
translation_notes:
  revision_awareness: El último repaso indicó alta concordancia y no requirió cambios; esta redacción sigue de cerca el griego y la auditoría inglesa, manteniendo la reciprocidad posesiva y la ambigüedad de ἐν αὐτοῖς.
  spanish_consistency_notes:
  - Se usa «glorificado» para δεδόξασμαι, conservando el valor perfecto pasivo.
  - Se mantiene «en ellos» como traducción primaria de ἐν αὐτοῖς, con nota sobre sus matices posibles.
  - 'La reciprocidad posesiva se expresa con un paralelismo breve y natural en español: «todo lo mío es tuyo, y lo tuyo es mío».'
