translation:
  language: es
  text: Y les di a conocer tu nombre[a], y lo daré a conocer, para que el amor con que me amaste esté en ellos[c][b], y yo en ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «les revelé tu nombre, y lo revelaré»; el verbo griego puede expresarse como «dar a conocer» o «revelar».'
    reason: lexical_alternative
  - marker: b
    text: «Tu nombre» se refiere a la identidad revelada y al carácter de Dios, no solo a una designación oral.
    reason: cultural_note
  - marker: c
    text: 'O: «entre ellos»; «en ellos» conserva mejor el tema joánico de la morada interior.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγνώρισα
  english_pob_choice: I made known
  chosen_spanish: he dado a conocer
  alternatives_spanish:
  - les hice conocer
  - les revelé
  lexicon: BDAG
  rationale: El aoristo activo indica una acción realizada; en español, "he dado a conocer" conserva el sentido causativo de γνωρίζω y suena natural en un registro bíblico actual. "Revelé" es posible, pero introduce una interpretación un poco más fuerte que el verbo básico."
- source_word: τὸ ὄνομά σου
  english_pob_choice: your name
  chosen_spanish: tu nombre
  alternatives_spanish:
  - tu carácter
  - quién eres
  lexicon: BDAG
  rationale: Se conserva el sustantivo concreto "nombre" porque el texto lo dice así. En Juan, la expresión implica la identidad revelada de Dios, pero esa carga queda en el término mismo y no debe desplazarse a una paráfrasis.
- source_word: γνωρίσω
  english_pob_choice: I will make it known
  chosen_spanish: lo daré a conocer
  alternatives_spanish:
  - lo haré conocer
  - lo revelaré
  lexicon: BDAG
  rationale: El futuro mantiene el paralelismo con el verbo anterior. En español se puede suplir "lo" para referirse a "tu nombre" sin perder la repetición enfática del griego.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: '"Para que" expresa de forma natural la fuerza de propósito/resulta do de ἵνα en español moderno, sin cargar la frase de formalidad innecesaria.'
- source_word: ἡ ἀγάπη
  english_pob_choice: the love
  chosen_spanish: el amor
  alternatives_spanish:
  - el amor ágape
  lexicon: BDAG
  rationale: '"Amor" es la equivalencia normal en español para ἀγάπη. No se añade una glosa como "ágape" porque el texto no la requiere y oscurecería la lectura.'
- source_word: ἣν ἠγάπησάς με
  english_pob_choice: with which you loved me
  chosen_spanish: con que me amaste
  alternatives_spanish:
  - con el que me amaste
  - que me amaste con
  lexicon: BDAG
  rationale: La construcción relativa se vuelve naturalmente en español con "con que", que conserva el matiz instrumental/relacional del griego. "Con el que" también es posible, pero "con que" suena más fluido aquí.
- source_word: ἐν αὐτοῖς
  english_pob_choice: in them
  chosen_spanish: en ellos
  alternatives_spanish:
  - entre ellos
  lexicon: BDAG
  rationale: Se mantiene "en ellos" porque el griego usa ἐν con dativo y porque la POB inglesa preserva la temática joánica de morada interior. "Entre ellos" atenuaría esa resonancia.
- source_word: ᾖ
  english_pob_choice: may be
  chosen_spanish: esté
  alternatives_spanish:
  - pueda estar
  - sea
  lexicon: BDAG
  rationale: Después de una cláusula final con "para que", el subjuntivo presente "esté" es el equivalente natural en español.
- source_word: κἀγὼ ἐν αὐτοῖς
  english_pob_choice: and I in them
  chosen_spanish: y yo en ellos
  alternatives_spanish:
  - y yo esté en ellos
  - y también yo en ellos
  lexicon: BDAG
  rationale: Se conserva la elipsis del griego y la coordinación final sin añadir un verbo que el texto no expresa explícitamente. "Yo en ellos" mantiene la fuerza de la morada mutua con estilo sobrio.
theological_decisions:
- issue: Sentido de "tu nombre" en Juan 17:26
  english_pob_reading: Retain 'your name' in the main text without expanding it to 'your character' or 'your person.'
  chosen_spanish_reading: Mantener "tu nombre" en el texto principal, sin expandirlo a "tu carácter" o "quién eres".
  alternative_spanish_readings:
  - tu carácter
  - quién eres
  rationale: La expresión tiene peso teológico en Juan y refiere la identidad revelada del Padre, pero traducirla con una expansión explicativa resolvería en la traducción una interpretación que el texto deja implícita. Mantener "nombre" preserva el idiomático bíblico y la tensión teológica.
  doctrine_reference: 'Principio POB: primacía del original y preservación de la tensión teológica sin sobreinterpretarla.'
- issue: Relación entre el amor del Padre y la presencia de Cristo en los creyentes
  english_pob_reading: 'Render both elements coordinately: ''so that the love ... may be in them, and I in them.'''
  chosen_spanish_reading: 'Renderizar coordinadamente: "para que el amor ... esté en ellos, y yo en ellos."'
  alternative_spanish_readings:
  - para que ... yo esté en ellos
  - para que el amor ... esté en ellos porque yo estoy en ellos
  rationale: El griego presenta dos realidades coordinadas sin explicitar cuál depende de cuál. La traducción mantiene esa coordinación y evita cerrar la relación teológica más de lo que el texto permite.
  doctrine_reference: 'Principio POB: preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: La versión actual del contexto inglés indica 'high_agreement' y 'No changes needed'; esta propuesta sigue esa lectura estable, conserva el paralelismo de los verbos y mantiene la coordinación final sin explicitar más de lo que el griego dice.
  spanish_consistency_notes:
  - Se usa "Yahvé" solo cuando el texto lo requiera explícitamente; aquí no aparece el Tetragrámaton.
  - Se mantiene el registro bíblico sobrio y natural en español latinoamericano.
  - Se conserva "nombre" y "en ellos" para respetar las resonancias teológicas documentadas en el audit trail.
  - No se introduce "Cristo" porque el pasaje usa referencia pronominal a Jesús y el contexto no exige el título.
