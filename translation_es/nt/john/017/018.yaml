translation:
  language: es
  text: Así como tú me enviaste al mundo, yo también los envié al mundo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: καθὼς
  english_pob_choice: Just as
  chosen_spanish: Así como
  alternatives_spanish:
  - Tal como
  - Como
  lexicon: BDAG
  rationale: καθώς introduce comparación; «Así como» expresa con naturalidad la relación comparativa sin perder la fuerza de paralelo entre ambas cláusulas.
- source_word: ἐμὲ
  english_pob_choice: me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  lexicon: BDAG
  rationale: Pronombre objeto directo; «me» mantiene la referencia clara y sobria. No es necesario reforzarlo con «a mí» en el texto principal.
- source_word: ἀπέστειλας
  english_pob_choice: sent
  chosen_spanish: enviaste
  alternatives_spanish:
  - mandaste
  - comisionaste
  lexicon: BDAG
  rationale: ἀποστέλλω suele significar «enviar»; «enviaste» preserva el lenguaje de misión joánica sin introducir una paráfrasis más explicativa como «comisionaste».
- source_word: εἰς τὸν κόσμον
  english_pob_choice: into the world
  chosen_spanish: al mundo
  alternatives_spanish:
  - al mundo
  - dentro del mundo
  lexicon: BDAG
  rationale: εἰς con acusativo indica movimiento hacia/entrada. En español, «al mundo» transmite ese desplazamiento de manera natural y fiel, manteniendo el valor joánico de κόσμος.
- source_word: κἀγὼ
  english_pob_choice: I also
  chosen_spanish: yo también
  alternatives_spanish:
  - y yo
  - yo igualmente
  lexicon: BDAG
  rationale: La forma contraída καὶ ἐγώ añade paralelo y continuidad; «yo también» reproduce bien esa fuerza aditiva en español y conserva la simetría con la primera cláusula.
- source_word: ἀπέστειλα
  english_pob_choice: sent
  chosen_spanish: envié
  alternatives_spanish:
  - mandé
  - comisioné
  lexicon: BDAG
  rationale: Se mantiene el mismo verbo que en la primera cláusula para conservar el paralelo deliberado entre el envío del Padre del Hijo y el envío del Hijo de sus discípulos.
- source_word: αὐτοὺς
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  - les
  lexicon: BDAG
  rationale: Objeto directo plural masculino referido a los discípulos; «los» es la forma más natural y concisa en español.
- source_word: κόσμον
  english_pob_choice: world
  chosen_spanish: mundo
  alternatives_spanish:
  - mundo
  - el mundo
  lexicon: BDAG
  rationale: κόσμος es un término joánico clave. «Mundo» conserva su carga teológica sin explicitarla excesivamente; el artículo se integra naturalmente en la frase española.
theological_decisions:
- issue: Paralelo entre el envío del Padre al Hijo y el envío del Hijo a los discípulos
  english_pob_reading: Preserve the verbal parallel with 'sent ... sent' rather than varying the English gloss.
  chosen_spanish_reading: Conservar el mismo verbo «enviaste ... envié» para reflejar el paralelismo verbal.
  alternative_spanish_readings:
  - enviaste ... mandé
  - comisionaste ... envié
  rationale: El versículo subraya analogía de misión, no identidad de rango. Repetir «enviar» preserva la correspondencia textual y evita sobrecargar el sentido con una terminología más interpretativa.
  doctrine_reference: Cristología histórica; filosofía de traducción §5
translation_notes:
  revision_awareness: El pasaje muestra alto acuerdo en la revisión auditada y no presenta cambios textuales o revisiones aplicadas en el expediente; por eso el borrador mantiene un paralelismo verbal simple y estable.
  spanish_consistency_notes:
  - Se usa «mundo» para κόσμος, sin convertirlo en un término explicativo como «humanidad» o «sociedad», para conservar la tensión joánica.
  - Se mantiene «envié/enviar» en ambas cláusulas para reflejar el paralelismo del griego.
  - El estilo es moderno y reverente, evitando calcos innecesarios y sin recurrir a fórmulas eclesiásticas no motivadas por el texto.
