- from: Porque las palabras que tú me diste, yo se las he dado a ellos[a]; y ellos las recibieron, y verdaderamente conocieron que salí de ti[b], y creyeron que tú me enviaste.
  to: Porque las palabras que tú me diste, yo se las he dado a ellos[a]; y ellos las recibieron, y verdaderamente llegaron a conocer que salí de ti[b], y creyeron que tú me enviaste.
  rationale: Se corrige la nota léxica de ῥήματα para que refleje una alternativa real documentada por la auditoría inglesa, y se ajusta «verdaderamente conocieron» a «verdaderamente llegaron a conocer» para expresar mejor el matiz de ἔγνωσαν ἀληθῶς en español natural. También se simplifica la nota sobre παρὰ σοῦ ἐξῆλθον para evitar redundancia y alinearla con la alternativa auditada.
