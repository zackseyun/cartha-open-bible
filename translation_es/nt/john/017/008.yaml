translation:
  language: es
  text: Porque las palabras que tú me diste, yo se las he dado a ellos[a]; y ellos las recibieron, y verdaderamente llegaron a conocer que salí de ti[b], y creyeron que tú me enviaste.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los dichos que tú me diste».
    reason: lexical_alternative
  - marker: b
    text: O «vine de ti».
    reason: lexical_alternative
lexical_decisions:
- source_word: ῥήματα
  english_pob_choice: words
  chosen_spanish: palabras
  alternatives_spanish:
  - dichos
  - mensajes
  - expresiones
  lexicon: BDAG
  rationale: ῥήματα designa palabras pronunciadas o dichos concretos. «Palabras» conserva el plural y la materialidad verbal mejor que una opción más interpretativa como «mensaje».
- source_word: ἔδωκάς ... δέδωκα
  english_pob_choice: you gave ... I have given
  chosen_spanish: tú me diste ... yo se las he dado
  alternatives_spanish:
  - tú me has dado ... yo se las di
  - tú me diste ... yo se las di
  lexicon: BDAG
  rationale: El aoristo inicial y el perfecto posterior marcan contraste aspectual. En español, «me diste» y «se las he dado» conserva la secuencia y el valor de acción completada con resultado presente.
- source_word: αὐτοῖς
  english_pob_choice: to them
  chosen_spanish: a ellos
  alternatives_spanish:
  - les
  - para ellos
  lexicon: BDAG
  rationale: El dativo se expresa con claridad en español como complemento indirecto «a ellos». La forma clítica «les» quedaría más natural en el flujo, pero aquí la repetición enfática del pronombre se preserva mejor con el sintagma explícito.
- source_word: ἔλαβον
  english_pob_choice: received
  chosen_spanish: recibieron
  alternatives_spanish:
  - las aceptaron
  - las tomaron
  lexicon: BDAG
  rationale: En contexto joánico, λαμβάνω aquí apunta a recibir lo dado, especialmente revelación. «Recibieron» es más fiel que «tomaron» y menos interpretativo que «aceptaron».
- source_word: ἔγνωσαν ἀληθῶς
  english_pob_choice: truly came to know
  chosen_spanish: verdaderamente conocieron
  alternatives_spanish:
  - conocieron de verdad
  - llegaron a conocer verdaderamente
  - verdaderamente llegaron a conocer
  lexicon: BDAG
  rationale: γινώσκω puede expresar conocimiento adquirido o reconocido. «Conocieron» mantiene la concreción del aoristo; «verdaderamente» preserva ἀληθῶς sin añadir una perífrasis innecesaria.
- source_word: παρὰ σοῦ ἐξῆλθον
  english_pob_choice: I came from you
  chosen_spanish: salí de ti
  alternatives_spanish:
  - vine de ti
  - procedí de ti
  - salí de tu presencia
  lexicon: BDAG
  rationale: La expresión indica origen/procedencia. «Salí de ti» es natural en español y conserva la idea de procedencia sin imponer una formulación más explicativa.
- source_word: ἐπίστευσαν
  english_pob_choice: believed
  chosen_spanish: creyeron
  alternatives_spanish:
  - tuvieron fe
  - pusieron su fe
  - confiaron
  lexicon: BDAG
  rationale: Con ὅτι + proposición, πιστεύω introduce creencia en la verdad de lo dicho. «Creyeron» sigue de cerca la construcción y evita desplazar el sentido hacia una confianza más relacional.
- source_word: ἀπέστειλας
  english_pob_choice: sent
  chosen_spanish: enviaste
  alternatives_spanish:
  - mandaste
  - comisionaste
  lexicon: BDAG
  rationale: ἀποστέλλω en este contexto remite al envío del Hijo por el Padre. «Enviaste» es el equivalente directo y suficientemente solemne en español.
theological_decisions:
- issue: Procedencia del Hijo en παρὰ σοῦ ἐξῆλθον
  english_pob_reading: I came from you
  chosen_spanish_reading: salí de ti
  alternative_spanish_readings:
  - vine de ti
  - procedí de ti
  rationale: La redacción conserva la afirmación de procedencia sin introducir terminología doctrinal externa al verso. «Salí de ti» mantiene la tensión teológica del texto y su formulación relacional entre el Padre y el Hijo.
  doctrine_reference: Affirmations; Preserve theological tension rather than resolve it
- issue: Construcción de πιστεύω con cláusula de ὅτι
  english_pob_reading: believed that
  chosen_spanish_reading: creyeron que
  alternative_spanish_readings:
  - tuvieron fe en que
  - confiaron en que
  rationale: Como el objeto de πιστεύω es una proposición, el español debe expresar creencia en el contenido afirmado. «Creyeron que» conserva la sintaxis y evita suavizarla hacia un matiz meramente relacional.
  doctrine_reference: 'Contested terms: πίστις default ''faith'' with alternatives documented where contested'
translation_notes:
  revision_awareness: 'El texto sigue de cerca el audit trail inglés: mantiene la distinción aspectual entre «diste» y «he dado», conserva la recepción de las palabras, el reconocimiento verdadero de la procedencia de Jesús y la creencia en el envío del Padre. No se detectaron revisiones posteriores en el paquete fuente.'
  spanish_consistency_notes:
  - Se usó «palabras» para ῥήματα, en continuidad con la decisión inglesa y con el plural concreto del griego.
  - Se prefirió «salí de ti» por naturalidad en español, pero se documenta la alternativa «vine de ti» para preservar la tensión de procedencia.
  - Se evitó «Cristo», «Señor» o «SEÑOR» porque el verso no contiene Χριστός ni κύριος; la referencia es estrictamente al envío del Padre.
  - Se mantuvo «creyeron que» para reflejar la cláusula de contenido introducida por ὅτι.
