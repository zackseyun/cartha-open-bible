revisions:
- from: Padre justo[a], aunque el mundo no te ha conocido, yo te he conocido, y estos han conocido que tú me enviaste.
  to: Padre justo[a], aunque el mundo[b] no te ha conocido, yo te he conocido, y estos han sabido que tú me enviaste.
  rationale: Se ajusta la tercera cláusula a «han sabido que» para un español más natural y preciso con una oración de contenido introducida por «que», manteniendo «conocer» en las cláusulas relacionales sobre el Padre. También se añade la nota sobre «el mundo» para preservar el rastro de auditoría del English POB. No se requiere adjudicación adicional porque los cambios son menores, claros y no doctrinalmente controvertidos.
