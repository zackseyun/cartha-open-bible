review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del griego: vocativo «Padre justo», contraste concesivo con «aunque», mantenimiento de «el mundo», y secuencia de conocimiento relacional. Sin embargo, en español la tercera cláusula «y estos han conocido que» suena menos natural y menos precisa que «y estos han llegado a saber que» o «han sabido que», dado que aquí ὅτι introduce contenido conocido. Además, falta trasladar la nota inglesa sobre el sentido joánico de «el mundo», que sí forma parte del rastro de auditoría POB.'
  spanish_quality_summary: El texto es claro y digno, pero «han conocido que» resulta forzado en español bíblico actual. «Han sabido que» mejora la fluidez sin alejarse del griego, distinguiendo bien entre conocer a una persona («te he conocido») y saber un hecho («que tú me enviaste»). También conviene anclar una nota en «mundo» para preservar la explicación contextual ya documentada.
  glossary_alignment: 'La terminología principal está alineada: «Padre», «justo», «el mundo». No hay términos del glosario de alto riesgo incumplidos. La decisión sobre γινώσκω debe ser más sensible al complemento: mantener «conocer» para relación personal con el Padre, pero usar «saber» en la subordinada con ὅτι mejora el español y sigue siendo fiel al valor cognitivo del verbo en ese contexto.'
  issues:
  - severity: medium
    issue: «y estos han conocido que» suena antinatural en español
    rationale: Aunque calca el inglés auditado, en español con una subordinada introducida por «que» es más idiomático «han sabido que» o «han llegado a saber que». Esto preserva el sentido cognitivo del griego sin rigidizar la sintaxis.
  - severity: medium
    issue: Falta la nota sobre el sentido joánico de «el mundo»
    rationale: El English POB incluye una nota explicativa importante sobre κόσμος. El español debe preservarla, especialmente porque «el mundo» puede malentenderse como mera creación física.
  - severity: low
    issue: La justificación teológica dice «perfecto compuesto... en las dos primeras cláusulas», pero el texto lo usa en tres cláusulas de γινώσκω
    rationale: Hay una pequeña inconsistencia interna en la documentación del borrador, aunque la revisión del texto la resolverá de manera natural al cambiar la tercera cláusula a «han sabido».
  revised_spanish_text: Padre justo[a], aunque el mundo[b] no te ha conocido, yo te he conocido, y estos han sabido que tú me enviaste.
