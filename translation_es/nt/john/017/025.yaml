translation:
  language: es
  text: Padre justo[a], aunque el mundo[b] no te ha conocido, yo te he conocido, y estos han sabido que tú me enviaste.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Padre justo, y el mundo no te conoció, pero yo te conocí, y estos supieron que tú me enviaste». El griego usa formas aoristas; el texto principal las vierte con perfecto compuesto en las cláusulas de conocimiento relacional para una naturalidad más idiomática y para expresar su relevancia presente en esta oración.'
    reason: lexical_alternative
  - marker: b
    text: «El mundo» en Juan a menudo no se refiere meramente al orden creado, sino a la humanidad en su extrañamiento de Dios.
    reason: cross_reference
lexical_decisions:
- source_word: Πάτερ
  english_pob_choice: Father
  chosen_spanish: Padre
  alternatives_spanish:
  - Oh Padre
  lexicon: BDAG
  rationale: Vocativo de dirección. En español, «Padre» es la forma natural y reverente; añadir «Oh» sonaría más arcaico y menos idiomático.
- source_word: δίκαιε
  english_pob_choice: Righteous
  chosen_spanish: justo
  alternatives_spanish:
  - recto
  - righteous
  lexicon: BDAG
  rationale: En este contexto, el adjetivo modifica a «Padre» y expresa su rectitud moral. «Justo» conserva bien ese valor en español y evita restringirlo a una idea solamente jurídica.
- source_word: ὁ κόσμος
  english_pob_choice: the world
  chosen_spanish: el mundo
  alternatives_spanish:
  - la gente del mundo
  - el sistema del mundo
  lexicon: BDAG
  rationale: Se mantiene la amplitud del término joánico sin reducirlo a una paráfrasis interpretativa. «El mundo» conserva la tensión teológica del griego.
- source_word: ἔγνω / ἔγνων / ἔγνωσαν
  english_pob_choice: has not known / have known / have known
  chosen_spanish: no te ha conocido / te he conocido / han conocido
  alternatives_spanish:
  - no te conoció / te conocí / conocieron
  - no ha llegado a conocerte / he llegado a conocerte / han llegado a conocer
  lexicon: BDAG
  rationale: Los aoristos de γινώσκω se vierten con perfecto en español para expresar relevancia presente y resultado vigente, algo natural en esta oración. «Conocer» conserva el sentido relacional-cognitivo.
- source_word: οὗτοι
  english_pob_choice: these
  chosen_spanish: estos
  alternatives_spanish:
  - estos discípulos
  - estas personas
  lexicon: BDAG
  rationale: El demostrativo se traduce de forma directa y breve. El contexto ya identifica a los referidos sin necesidad de añadir un sustantivo interpretativo.
- source_word: ἀπέστειλας
  english_pob_choice: you sent me
  chosen_spanish: me enviaste
  alternatives_spanish:
  - me has enviado
  lexicon: BDAG
  rationale: El aoristo de ἀποστέλλω se expresa de manera directa con pasado simple en español. «Me enviaste» es claro y fiel; «me has enviado» también sería posible, pero introduce un matiz aspectual menos inmediato.
theological_decisions:
- issue: Atributo del Padre en δίκαιε
  english_pob_reading: Righteous Father
  chosen_spanish_reading: Padre justo
  alternative_spanish_readings:
  - Padre recto
  - Padre justo y recto
  rationale: La combinación mantiene el juicio moral del término sin cargarlo con un tecnicismo doctrinal ajeno al contexto. «Justo» es la forma más natural y suficientemente fuerte en español.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #6; semantic family of δικαιοσύνη'
- issue: Sentido de κόσμος en Juan
  english_pob_reading: the world
  chosen_spanish_reading: el mundo
  alternative_spanish_readings:
  - la humanidad
  - el mundo alienado de Dios
  rationale: Se conserva la ambivalencia teológica joánica sin resolverla en una glosa. El texto español deja visible el contraste entre el mundo y los discípulos.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
- issue: Valor temporal/aspectual de los aoristos de γινώσκω
  english_pob_reading: English perfects for the knowing clauses
  chosen_spanish_reading: perfecto compuesto en español en las dos primeras cláusulas de conocimiento
  alternative_spanish_readings:
  - pretérito simple
  - presente de resultado
  rationale: El perfecto compuesto comunica mejor la vigencia del conocimiento en el presente de la oración, especialmente en el marco de Juan 17. A la vez, no añade contenido inexistente en el griego.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence'
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del inglés POB al mantener un registro formal y conciso; en español se reflejó esa misma decisión con «aunque» y sin expansión innecesaria. Se preservó la tensión del κόσμος y el valor aspectual de los aoristos de γινώσκω mediante perfecto compuesto.
  spanish_consistency_notes:
  - Se usa «Padre» para el vocativo divino y «justo» para δίκαιε, coherente con la terminología bíblica habitual del proyecto.
  - «Mundo» se mantiene sin glosa interpretativa en el texto principal, siguiendo el tratamiento joánico del término.
  - Se emplea «me enviaste» para ἀπέστειλας, evitando introducir un matiz de tiempo compuesto que el griego no exige.
  - 'La puntuación y el orden conservan la estructura tripartita del versículo: apelación, contraste con el mundo, testimonio de los discípulos.'
