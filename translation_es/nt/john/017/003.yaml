    reason: alternative_reading
  revision_rationale: 'Se hace una reparación menor de idiomaticidad y puntuación: «Jesús, el Mesías» comunica mejor en español el valor titular de Χριστός que «Jesús Mesías», sin apartarse del griego ni de la decisión léxica del POB. La nota alternativa se mantiene intacta.'
