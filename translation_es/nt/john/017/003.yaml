    rationale: Aunque refleja la yuxtaposición griega, en español general y eclesial la forma titular más natural es «Jesús, el Mesías» o «Jesús el Mesías». Esto preserva mejor la fuerza semántica de Χριστός como título sin sonar calcado.
  - severity: low
    issue: Falta de puntuación apositiva alrededor del título.
    rationale: Las comas ayudan a leer «el Mesías» como aposición de «Jesús» y mejoran claridad y dignidad del registro sin alterar el sentido.
