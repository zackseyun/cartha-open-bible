translation:
  language: es
  text: 'Y esta es la vida eterna: que te conozcan a ti, el único Dios verdadero, y a Jesús, el Mesías[a], a quien enviaste.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, tradicionalmente, «Jesús Cristo». El griego Χριστός puede funcionar como título («Mesías») o, en algunos contextos, como designación casi nominal («Cristo»).
    reason: alternative_reading
lexical_decisions:
- source_word: αὕτη δέ ἐστιν
  english_pob_choice: And this is
  chosen_spanish: Y esta es
  alternatives_spanish:
  - Ahora esto es
  - Y así es
  lexicon: BDAG
  rationale: La construcción introduce una explicación definitoria. «Y esta es» conserva la conexión de δέ sin forzar un contraste que el griego no exige.
- source_word: ἡ αἰώνιος ζωὴ
  english_pob_choice: eternal life
  chosen_spanish: la vida eterna
  alternatives_spanish:
  - la vida del siglo venidero
  - la vida perdurable
  lexicon: BDAG
  rationale: Es la expresión joánica estable y natural en español. «Vida eterna» comunica con fidelidad la vida propia del siglo venidero y su calidad perdurable.
- source_word: ἵνα γινώσκωσι
  english_pob_choice: that they may know
  chosen_spanish: que te conozcan
  alternatives_spanish:
  - para que te conozcan
  - que lleguen a conocerte
  lexicon: BDAG
  rationale: ἵνα introduce el contenido que define esa vida. «Te conozcan» preserva el sentido relacional y el aspecto durativo/continuo del verbo mejor que una fórmula más abstracta.
- source_word: σὲ
  english_pob_choice: you
  chosen_spanish: te
  alternatives_spanish:
  - a ti
  lexicon: BDAG
  rationale: Es el objeto directo de γινώσκωσι y se refiere al Padre en la oración de Jesús. En español, el pronombre enclítico «te» suena natural y claro.
- source_word: τὸν μόνον ἀληθινὸν θεὸν
  english_pob_choice: the only true God
  chosen_spanish: el único Dios verdadero
  alternatives_spanish:
  - el solo Dios verdadero
  - el único y verdadero Dios
  lexicon: BDAG
  rationale: 'Se mantiene el orden natural en español y el doble matiz de μόνον + ἀληθινὸν: exclusividad y autenticidad. «Verdadero» aquí expresa genuino frente a falso o parcial.'
- source_word: Ἰησοῦν Χριστόν
  english_pob_choice: Jesus Messiah
  chosen_spanish: a Jesús Mesías
  alternatives_spanish:
  - a Jesús Cristo
  - a Jesús el Mesías
  lexicon: BDAG
  rationale: Se conserva el título Χριστός como «Mesías», siguiendo la preferencia del proyecto cuando el término funciona con fuerza titular. Se antepone la preposición «a» porque el relativo «a quien enviaste» retoma a Jesús como objeto del envío.
- source_word: ὃν ἀπέστειλας
  english_pob_choice: whom you sent
  chosen_spanish: a quien enviaste
  alternatives_spanish:
  - que enviaste
  - a quien tú enviaste
  lexicon: BDAG
  rationale: El relativo identifica a Jesús en relación con la misión del Padre. «A quien enviaste» conserva la referencia personal y el matiz de envío sin añadir información no presente.
theological_decisions:
- issue: Relación entre «el único Dios verdadero» y Jesús en un texto usado en discusiones cristológicas
  english_pob_reading: 'Retain the verse''s direct wording without importing explanatory additions: the Father is addressed as ''the only true God,'' and Jesus is distinguished as the one sent by the Father.'
  chosen_spanish_reading: 'Mantener el contraste y la distinción del versículo sin añadir glosas doctrinales: el Padre es llamado «el único Dios verdadero», y Jesús queda distinguido como el enviado por el Padre.'
  alternative_spanish_readings:
  - Parafrasear para explicitar la cristología trinitaria
  - Suavizar la distinción entre el Padre y Jesús
  rationale: La traducción debe respetar la formulación del texto y su tensión teológica propia, sin resolverla por adelantado. El contexto joánico más amplio sostiene la confesión cristológica, pero este versículo no la expande con lenguaje explicativo.
  doctrine_reference: 'Affirmations; Translation philosophy #3'
- issue: Cómo reflejar Χριστός en Jesús Χριστόν
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: En español, «Mesías» conserva con más claridad el valor titular de Χριστός y sigue la convención del proyecto cuando el término no funciona meramente como nombre fijo. «Cristo» se reserva como alternativa tradicional, pero no como forma principal aquí.
  doctrine_reference: 'Contested terms: Χριστός'
translation_notes:
  revision_awareness: El borrador inglés pasó por una revisión que inicialmente favoreció «Christ» por registro convencional, pero luego se restauró «Messiah» conforme a la política del proyecto sobre Χριστός. La versión española sigue esa decisión restaurada y la expresa como «Mesías», preservando el valor titular sin caer en una transliteración meramente tradicional.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparezca, pero en este versículo el referente es θεός, por lo que corresponde «Dios».
  - Se mantiene «Mesías» como traducción principal de Χριστός, coherente con el criterio del proyecto.
  - La preposición explícita «a» en «a Jesús Mesías» y «a quien enviaste» ayuda a reflejar el régimen verbal español sin alterar el contenido del griego.
  - No se introduce mayúscula en «verdadero» porque aquí funciona como adjetivo cualitativo, no como nombre propio.
