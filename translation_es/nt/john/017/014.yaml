    changes_summary: Changed 'from the world' to 'of the world' for closer lexical correspondence to ἐκ τοῦ κόσμου and more standard formal-register phrasing in this context.
translation:
  language: es
  text: Yo les he dado tu palabra[a], y el mundo los ha odiado porque no son del mundo, así como yo no soy del mundo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de» o «del mundo». La expresión griega usa literalmente «de/desde» y puede señalar origen o pertenencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: δέδωκα
  english_pob_choice: have given
  chosen_spanish: he dado
  alternatives_spanish:
  - di
  lexicon: BDAG
  rationale: El perfecto griego expresa una acción cumplida con resultado vigente; el perfecto compuesto español («he dado») conserva mejor ese valor que el pretérito simple.
- source_word: λόγον
  english_pob_choice: word
  chosen_spanish: palabra
  alternatives_spanish:
  - mensaje
  lexicon: BDAG
  rationale: «λόγος» aquí se refiere a la palabra comunicada por el Padre y dada por Jesús. «Palabra» conserva el vínculo joánico y evita una paráfrasis más interpretativa como «mensaje».
- source_word: κόσμος
  english_pob_choice: world
  chosen_spanish: mundo
  alternatives_spanish:
  - sistema del mundo
  lexicon: BDAG
  rationale: En Juan, κόσμος puede designar el orden humano en rebelión contra Dios. «Mundo» preserva la amplitud del término y deja que el contexto sostenga su sentido hostil sin expandirlo.
- source_word: ἐμίσησεν
  english_pob_choice: has hated
  chosen_spanish: ha odiado
  alternatives_spanish:
  - odiaba
  - odió
  lexicon: BDAG
  rationale: El aoristo puede traducirse en pasado simple, pero el perfecto compuesto español transmite bien la hostilidad estable del mundo como realidad vigente derivada de la palabra dada a los discípulos.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - que
  lexicon: BDAG
  rationale: 'El valor causal encaja mejor: el odio del mundo se explica por el hecho de que ellos no pertenecen al mundo.'
- source_word: ἐκ τοῦ κόσμου
  english_pob_choice: of the world
  chosen_spanish: del mundo
  alternatives_spanish:
  - de entre el mundo
  - del lado del mundo
  lexicon: BDAG
  rationale: La preposición ἐκ marca origen/pertenencia. «Del mundo» es la forma natural y fiel en español; evita una paráfrasis excesiva, pero sigue dejando la tensión entre origen y pertenencia.
- source_word: καθὼς
  english_pob_choice: just as
  chosen_spanish: así como
  alternatives_spanish:
  - tal como
  - igual que
  lexicon: BDAG
  rationale: «Así como» expresa con claridad la comparación entre la relación de los discípulos con el mundo y la de Jesús con el mundo.
theological_decisions:
- issue: Relación de los discípulos y de Jesús con 'el mundo'
  english_pob_reading: Render the comparison straightforwardly as 'they are not of the world, just as I am not of the world' without weakening or overexplaining it.
  chosen_spanish_reading: 'Traducir de manera directa: «no son del mundo, así como yo no soy del mundo», sin convertir ἐκ en una explicación sociológica o metafísica más amplia de la que el versículo ofrece.'
  alternative_spanish_readings:
  - no pertenecen al mundo, así como yo no pertenezco al mundo
  - no provienen del mundo, así como yo no provengo del mundo
  rationale: El versículo presenta una analogía real entre Jesús y sus discípulos en relación con el mundo. «Del mundo» preserva la tensión de origen/pertenencia sin resolverla ni ampliarla más allá del texto.
  doctrine_reference: Preservar la tensión teológica del texto sin cerrarla interpretativamente.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail inglés, que prefirió una forma más cercana a ἐκ τοῦ κόσμου y mantuvo el registro formal. En español, «del mundo» conserva esa cercanía y resulta idiomático y publicable.
  spanish_consistency_notes:
  - Se usa «palabra» para λόγος, en coherencia con el registro joánico y la decisión inglesa.
  - Se usa «mundo» para κόσμος sin expandirlo a «sistema del mundo», manteniendo la amplitud semántica del original.
  - Se usa el perfecto compuesto («he dado», «ha odiado») para reflejar la acción completada con efecto presente.
  - Se mantiene «del mundo» para ἐκ τοῦ κόσμου, siguiendo la tensión de origen/pertenencia observada en el audio textual.
