  text: ἐγὼ δέδωκα αὐτοῖς τὸν λόγον σου, καὶ ὁ κόσμος ἐμίσησεν αὐτούς, ὅτι οὐκ εἰσὶν ἐκ τοῦ κόσμου καθὼς ἐγὼ οὐκ εἰμὶ ἐκ τοῦ κόσμου.
base_translation:
  language: en
  yaml_path: translation/nt/john/017/014.yaml
  text: I have given them your word[a], and the world has hated them because they are not of the world, just as I am not of the world.
  footnotes:
