translation:
  language: es
  text: Ahora han llegado a saber que todo lo que me has dado es de ti[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todo lo que me has dado proviene de ti»; la frase griega puede expresar origen o procedencia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: νῦν
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Ahora mismo
  - En este momento
  lexicon: BDAG
  rationale: El adverbio temporal señala el estado presente del conocimiento de los discípulos. «Ahora» es natural en español y conserva la fuerza de resultado actual.
- source_word: ἔγνωκαν
  english_pob_choice: they have come to know
  chosen_spanish: han llegado a saber
  alternatives_spanish:
  - han conocido
  - saben
  lexicon: BDAG
  rationale: El perfecto expresa un conocimiento adquirido con resultado vigente. «Han llegado a saber» conserva el matiz ingresivo/resultativo mejor que un simple «saben».
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  lexicon: BDAG
  rationale: Conjunción de contenido que introduce lo conocido.
- source_word: πάντα ὅσα
  english_pob_choice: everything
  chosen_spanish: todo lo que
  alternatives_spanish:
  - todas las cosas que
  - todo cuanto
  lexicon: BDAG
  rationale: La combinación funciona de manera totalizante. «Todo lo que» es fluido en español y preserva la amplitud sin perder el enlace relativo.
- source_word: δέδωκάς
  english_pob_choice: you have given
  chosen_spanish: me has dado
  alternatives_spanish:
  - me diste
  lexicon: BDAG
  rationale: El perfecto de δίδωμι se refleja mejor con presente perfecto en español, manteniendo la acción dada y su vigencia presente.
- source_word: μοι
  english_pob_choice: me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  lexicon: BDAG
  rationale: Dativo de objeto indirecto; el español ordinario prefiere «me has dado».
- source_word: παρὰ σοῦ
  english_pob_choice: from you
  chosen_spanish: es de ti
  alternatives_spanish:
  - proviene de ti
  - viene de ti
  lexicon: BDAG
  rationale: Con idea de origen, παρά + genitivo indica procedencia/fuente. «Es de ti» comunica la relación de origen de manera breve y natural, sin añadir una paráfrasis más interpretativa.
- source_word: εἰσιν
  english_pob_choice: is
  chosen_spanish: es
  alternatives_spanish:
  - son
  lexicon: BDAG
  rationale: Aunque el verbo griego es plural, en español el sujeto colectivo «todo lo que me has dado» suele concordar en singular. «Es» es más idiomático y mantiene el sentido colectivo.
theological_decisions:
- issue: Fuente y procedencia de lo dado al Hijo
  english_pob_reading: everything you have given me is from you
  chosen_spanish_reading: todo lo que me has dado es de ti
  alternative_spanish_readings:
  - todo lo que me has dado proviene de ti
  - todo lo que me has dado viene de ti
  rationale: 'La frase se traduce como una afirmación de origen/fuente. Se evita expandirla hacia formulaciones doctrinales posteriores, preservando la tensión textual: lo dado al Hijo procede del Padre.'
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: 'Coincide con el consenso alto del contexto auditado: se mantiene el perfecto, la relación de procedencia con παρά + genitivo, y la comprensión colectiva de «todo lo que» sin sobreexplicar la teología del pasaje.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera explícitamente; aquí no aparece.
  - Se conserva «todo lo que» para reflejar la combinación totalizante πάντα ὅσα.
  - Se evita «SEÑOR» y no hay necesidad de términos cristológicos especiales en este versículo.
  - La nota al pie marca la alternativa de origen/procedencia, equivalente a la observación del inglés POB.
