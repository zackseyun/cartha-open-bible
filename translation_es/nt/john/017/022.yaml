translation:
  language: es
  text: Y yo[a] les he dado la gloria que tú me has dado, para que sean uno, así como nosotros somos uno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y también yo»; o: «Yo también». El griego κἀγώ puede llevar un matiz aditivo o enfático.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κἀγὼ
  english_pob_choice: And I
  chosen_spanish: Y yo
  alternatives_spanish:
  - Y también yo
  - Yo también
  lexicon: BDAG
  rationale: El crasis καὶ + ἐγώ añade un matiz conectivo o enfático. «Y yo» conserva la continuidad del discurso y mantiene el sujeto explícito; «también» sería posible, pero en español puede sonar más marcado de lo que el contexto exige.
- source_word: τὴν δόξαν
  english_pob_choice: glory
  chosen_spanish: la gloria
  alternatives_spanish:
  - el honor
  - el esplendor
  lexicon: BDAG
  rationale: En Juan, δόξα tiene peso teológico de gloria divina, no solo de honor humano. «Gloria» es la equivalencia natural y conserva la carga intertextual.
- source_word: ἣν δέδωκάς μοι
  english_pob_choice: that you have given me
  chosen_spanish: que tú me has dado
  alternatives_spanish:
  - que me has dado
  - la cual me has dado
  lexicon: BDAG
  rationale: El perfecto griego expresa una acción cumplida con efecto vigente. El pretérito perfecto compuesto español («has dado») reproduce bien ese valor; el relativo «que» es idiomático y claro.
- source_word: δέδωκα αὐτοῖς
  english_pob_choice: I have given them
  chosen_spanish: les he dado
  alternatives_spanish:
  - se la he dado
  - yo les he dado
  lexicon: BDAG
  rationale: El perfecto δέδωκα también pide en español una forma compuesta que preserve la acción realizada con परिणाम permanente. «Les he dado» es natural y mantiene el objeto indirecto.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: Introduce finalidad o resultado. «Para que» comunica bien la fuerza telica en español moderno y conserva la relación con el subjuntivo siguiente.
- source_word: ὦσιν
  english_pob_choice: they may be
  chosen_spanish: sean
  alternatives_spanish:
  - puedan ser
  - estén
  lexicon: BDAG
  rationale: El subjuntivo presente μετά ἵνα se expresa naturalmente con «sean». No añade matiz adicional y respeta la simple finalidad del texto.
- source_word: ἓν
  english_pob_choice: one
  chosen_spanish: uno
  alternatives_spanish:
  - unidos
  - una sola cosa
  lexicon: BDAG
  rationale: El neutro singular subraya unidad, no identidad personal. «Uno» conserva la concisión y deja abierta la naturaleza exacta de esa unidad.
- source_word: καθὼς
  english_pob_choice: just as
  chosen_spanish: así como
  alternatives_spanish:
  - como
  - tal como
  lexicon: BDAG
  rationale: «Así como» marca comparación de manera clara y natural en español, equivalente al valor comparativo de καθώς.
- source_word: ἡμεῖς ἕν
  english_pob_choice: we are one
  chosen_spanish: nosotros somos uno
  alternatives_spanish:
  - somos uno
  - estamos unidos
  lexicon: BDAG
  rationale: La comparación con la unidad del Padre y del Hijo debe mantenerse sin precisar más de lo que el texto dice. «Somos uno» conserva la tensión teológica y la brevedad del griego.
theological_decisions:
- issue: Naturaleza de la unidad de los discípulos comparada con la unidad del Padre y del Hijo
  english_pob_reading: Render the comparison straightforwardly as 'so that they may be one, just as we are one' without specifying whether the unity is ontological, relational, or missional.
  chosen_spanish_reading: «para que sean uno, así como nosotros somos uno» sin definir el tipo exacto de unidad.
  alternative_spanish_readings:
  - para que estén unidos, así como nosotros estamos unidos
  - para que sean una sola cosa, así como nosotros somos uno
  rationale: El versículo establece una comparación real pero no define aquí su modalidad. Mantener una formulación abierta evita resolver prematuramente una tensión teológica que el texto deja en pie.
  doctrine_reference: Preservar la tensión teológica sin imponer una precisión doctrinal posterior.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios y fue confirmada con alto grado de acuerdo; no se requieren ajustes adicionales respecto del texto fuente ni del audit trail inglés.
  spanish_consistency_notes:
  - Se mantuvo «gloria» para δόξα por consistencia joánica.
  - Se usó el perfecto compuesto español para reflejar el valor aspectual de los perfectos griegos.
  - Se conservó «uno» para ἓν a fin de no interpretar la unidad más allá de lo que el texto expresa.
  - Se prefirió una comparación abierta («así como») que preserva la tensión teológica documentada en el audit trail.
