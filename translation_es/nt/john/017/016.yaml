translation:
  language: es
  text: No son del mundo[a], así como yo no soy del mundo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «del mundo». El griego usa ἐκ, que puede expresar procedencia, origen o pertenencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκ
  english_pob_choice: from
  chosen_spanish: de
  alternatives_spanish:
  - desde
  - fuera de
  lexicon: BDAG
  rationale: En español, la preposición más natural para ἐκ con κόσμος en este contexto es «de». Conserva la idea de procedencia o pertenencia sin volver la frase pesada. «Desde» subrayaría origen espacial de manera más marcada; «fuera de» sugeriría separación física más que origen/sfera.
- source_word: κόσμου
  english_pob_choice: the world
  chosen_spanish: el mundo
  alternatives_spanish:
  - el sistema del mundo
  - el orden mundano
  lexicon: BDAG
  rationale: Se mantiene la forma simple «el mundo», porque el texto joánico sí puede cargar el término de peso teológico, pero aquí no obliga a una expansión interpretativa. «El sistema del mundo» o «el orden mundano» introducirían glosa ajena al enunciado.
- source_word: οὐκ εἰσὶν
  english_pob_choice: are not
  chosen_spanish: no son
  alternatives_spanish:
  - no están
  - no pertenecen
  lexicon: BDAG
  rationale: El verbo copulativo en presente se expresa con naturalidad en español como «no son». «No pertenecen» explicita el matiz de pertenencia, pero va más allá de la formulación directa del griego.
- source_word: καθὼς
  english_pob_choice: just as
  chosen_spanish: así como
  alternatives_spanish:
  - tal como
  - como
  lexicon: BDAG
  rationale: «Así como» reproduce bien la comparación paralela entre los discípulos y Jesús. Es claro, natural y mantiene el vínculo estructural del griego sin perder solemnidad.
- source_word: ἐγὼ
  english_pob_choice: I
  chosen_spanish: yo
  lexicon: BDAG
  rationale: Se conserva el pronombre explícito «yo» para reflejar el énfasis del griego y la simetría comparativa del verso.
- source_word: οὐκ εἰμὶ
  english_pob_choice: am not
  chosen_spanish: no soy
  alternatives_spanish:
  - no estoy
  lexicon: BDAG
  rationale: Como en la primera cláusula, el copulativo se vierte con «no soy». «No estoy» podría sugerir ubicación física más que identidad o procedencia; aquí el paralelismo con «no son del mundo» favorece «no soy».
- source_word: ἐκ τοῦ κόσμου
  english_pob_choice: from the world
  chosen_spanish: del mundo
  alternatives_spanish:
  - de este mundo
  - fuera del mundo
  lexicon: BDAG
  rationale: La contracción «del» refleja con naturalidad «de + el» y mantiene la relación de origen/pertenencia expresada por ἐκ. «De este mundo» añade determinación ausente en el texto; «fuera del mundo» sería más fuerte de lo que el griego exige.
theological_decisions:
- issue: Sentido de κόσμος en Juan 17:16
  english_pob_reading: Retain 'the world' without interpretive expansion in the main text.
  chosen_spanish_reading: Conservar «el mundo» sin expansión interpretativa en el texto principal.
  alternative_spanish_readings:
  - el sistema del mundo
  - el orden presente caído
  rationale: El pasaje sí presupone la carga teológica joánica de κόσμος, pero el versículo mismo no exige resolverla en una paráfrasis. Mantener «el mundo» preserva la tensión teológica y deja que el contexto haga su trabajo.
  doctrine_reference: 'Translation philosophy #3, preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El texto sigue de cerca el griego SBLGNT y coincide con la lectura aprobada del inglés POB: la repetición de ἐκ τοῦ κόσμου se mantiene en ambas cláusulas, y se conserva el contraste comparativo de καθὼς sin añadir glosa interpretativa. No hubo revisiones aplicadas en el pasaje base; por eso la versión española prioriza continuidad lexical y claridad idiomática.'
  spanish_consistency_notes:
  - Se mantuvo la repetición de la misma construcción preposicional en ambas cláusulas para reflejar el paralelismo del original.
  - Se evitó «Cristo» y «Señor» porque el versículo no contiene Χριστός ni κύριος.
  - Se usó «mundo» sin calificativos para no resolver prematuramente la ambigüedad teológica de κόσμος.
  - La nota a pie de página se ancla en «del mundo» para reflejar la alternativa lexical de ἐκ.
