- from: He dado a conocer tu nombre[a] a los hombres[b] que me diste[c][d] del mundo. Tuyos eran, y me los diste, y han guardado tu palabra.
  to: He dado a conocer tu nombre[a][b] a las personas[c] que me diste de entre el mundo[d]. Tuyos eran, y me los diste, y han guardado tu palabra[e].
  rationale: Se corrige el texto para alinearlo con la revisión auditada del POB en τοῖς ἀνθρώποις ('personas' en vez de 'hombres'), se restaura el anclaje correcto de la nota sobre «tu nombre», se mejora la representación de ἐκ con «de entre el mundo», y se añade la alternativa léxica correspondiente a τετήρηκαν.
