translation:
  language: es
  text: He dado a conocer tu nombre[a][b] a las personas[c] que me diste de entre el mundo[d]. Tuyos eran, y me los diste, y han guardado tu palabra[e].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «he revelado tu nombre».
    reason: lexical_alternative
  - marker: b
    text: «Tu nombre» se refiere a la identidad y el carácter revelados de Dios, no solo a un nombre pronunciado.
    reason: cultural_note
  - marker: c
    text: O «a los hombres», si se entiende que el referente inmediato son los discípulos varones de Jesús.
    reason: lexical_alternative
  - marker: d
    text: O «del mundo».
    reason: lexical_alternative
  - marker: e
    text: O «han obedecido tu palabra»; el griego dice más literalmente «han guardado tu palabra».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐφανέρωσά
  english_pob_choice: I have made known
  chosen_spanish: he dado a conocer
  alternatives_spanish:
  - he revelado
  - he manifestado
  lexicon: BDAG
  rationale: φανερόω expresa hacer visible o conocido. «He dado a conocer» comunica bien la divulgación y suena natural en español, sin perder la idea de revelación que también admite el verbo.
- source_word: τὸ ὄνομα
  english_pob_choice: your name
  chosen_spanish: tu nombre
  alternatives_spanish:
  - quién eres
  - tu carácter
  lexicon: BDAG
  rationale: Se conserva la expresión concreta «nombre», porque en Juan tiene peso teológico y no conviene sustituirla por una paráfrasis interpretativa. La profundidad de identidad revelada queda implícita en el término mismo.
- source_word: τοῖς ἀνθρώποις
  english_pob_choice: the people / the men
  chosen_spanish: los hombres
  alternatives_spanish:
  - las personas
  - la gente
  lexicon: BDAG
  rationale: Aunque ἄνθρωποι puede ser genérico, el contexto inmediato se refiere al círculo de discípulos varones. Por eso «los hombres» preserva el referente histórico y evita neutralizar indebidamente el término.
- source_word: οὓς ἔδωκάς μοι
  english_pob_choice: whom you gave me
  chosen_spanish: que me diste
  alternatives_spanish:
  - a quienes me diste
  - que tú me diste
  lexicon: BDAG
  rationale: El relativo con aoristo se expresa de forma natural en español con «que me diste». Mantiene el sentido simple del pasado y la relación de donación sin sobrecargar la sintaxis.
- source_word: ἐκ τοῦ κόσμου
  english_pob_choice: out of the world
  chosen_spanish: del mundo
  alternatives_spanish:
  - fuera del mundo
  - de entre el mundo
  lexicon: BDAG
  rationale: La preposición ἐκ puede indicar procedencia o extracción. En español, «del mundo» es más natural y conserva la idea de pertenencia/origen que el texto quiere comunicar, sin añadir una imagen innecesariamente pesada.
- source_word: σοὶ ἦσαν
  english_pob_choice: They were yours
  chosen_spanish: Tuyos eran
  alternatives_spanish:
  - eran tuyos
  - te pertenecían
  lexicon: BDAG
  rationale: La cláusula posesiva es breve y solemne. «Tuyos eran» reproduce bien la estructura enfática del griego y deja abierta la fuerza relacional de pertenencia.
- source_word: κἀμοὶ αὐτοὺς ἔδωκας
  english_pob_choice: and you gave them to me
  chosen_spanish: y me los diste
  alternatives_spanish:
  - y se los diste a mí
  - y a mí me los diste
  lexicon: BDAG
  rationale: Se conserva la idea de transferencia personal del Padre al Hijo. «Me los diste» es la forma más natural en español y mantiene la dirección del don sin perder el contenido.
- source_word: τὸν λόγον σου
  english_pob_choice: your word
  chosen_spanish: tu palabra
  alternatives_spanish:
  - tu palabra dada
  - tu mensaje
  lexicon: BDAG
  rationale: En Juan, λόγος puede abarcar palabra, mensaje o enseñanza. «Tu palabra» es la opción más estable y bíblicamente reconocible en español, conservando la resonancia joánica sin ampliar demasiado el significado.
- source_word: τετήρηκαν
  english_pob_choice: they have kept
  chosen_spanish: han guardado
  alternatives_spanish:
  - han obedecido
  - han observado
  lexicon: BDAG
  rationale: τηρέω puede significar guardar, observar o mantener fielmente. «Han guardado» preserva el matiz de custodia/adhesión continua que el perfecto sugiere, sin reducirlo a una mera obediencia puntual.
theological_decisions:
- issue: Sentido de «tu nombre» en Juan
  english_pob_reading: Retain the literal expression 'your name' in the main text
  chosen_spanish_reading: Conservar «tu nombre» en el texto principal
  alternative_spanish_readings:
  - parafrasear como «quién eres»
  - parafrasear como «tu carácter»
  rationale: En el evangelio de Juan, «nombre» no es solo un rótulo verbal, sino la identidad revelada de Dios. Sin embargo, traducirlo con una paráfrasis desharía la densidad del original; por eso se mantiene la forma literal y se deja que el contexto teológico haga el resto.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Alcance de τοῖς ἀνθρώποις
  english_pob_reading: Translate as 'the people' / 'the men' depending on context
  chosen_spanish_reading: Traducir como «los hombres»
  alternative_spanish_readings:
  - «las personas»
  - «la gente»
  rationale: El contexto inmediato muestra que Jesús habla de sus discípulos concretos, y aquí el referente es masculino. La traducción conserva ese dato histórico sin convertir el texto en un genérico que diluya la escena.
  doctrine_reference: Translation philosophy §4
- issue: La donación del Padre al Hijo
  english_pob_reading: Preserve the wording of the Father giving people to the Son without importing a denominational framework
  chosen_spanish_reading: Conservar la afirmación de que el Padre dio estas personas al Hijo
  alternative_spanish_readings:
  - una lectura de elección incondicional
  - una lectura centrada en la respuesta prevista
  rationale: El versículo afirma la donación real del Padre al Hijo, pero no desarrolla aquí un sistema completo sobre la mecánica de esa entrega. La traducción mantiene esa tensión textual sin resolverla de antemano.
  doctrine_reference: Affirmations paragraph 2; Translation philosophy §3
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego de SBLGNT y conserva las decisiones auditadas de la POB inglesa: φανερόω como ‘dar a conocer’, τὸ ὄνομα como ‘tu nombre’, ἐκ τοῦ κόσμου como procedencia ‘del mundo’, y τηρέω como ‘guardar’. Se adopta además la revisión reciente de la POB inglesa para usar el sentido más general de ἄνθρωποι en español, pero se mantiene ‘los hombres’ por el referente inmediato masculino señalado en el contexto auditado.'
  spanish_consistency_notes:
  - Se usa «tú/tu» en toda la oración por coherencia con la segunda persona del discurso a Dios.
  - Se mantiene la secuencia verbal en perfecto compuesto y perfecto simple donde el español lo permite sin forzar el ritmo.
  - No se introduce terminología eclesiástica no atestiguada; «palabra» se conserva para λόγος.
  - Las notas al pie distinguen entre variantes léxicas y aclaraciones teológicas para no mezclar niveles de decisión.
