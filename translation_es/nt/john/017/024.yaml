translation:
  language: es
  text: Padre[a], deseo que los que me has dado también estén conmigo donde yo estoy, para que vean mi gloria, la que me has dado, porque me amaste antes de la fundación del mundo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego, literalmente: «lo que/eso que me has dado»; la expresión es colectiva y se refiere a las personas que el Padre ha dado al Hijo, por eso se traduce «los que me has dado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: πάτερ
  english_pob_choice: Father
  chosen_spanish: Padre
  alternatives_spanish:
  - Mi Padre
  lexicon: BDAG
  rationale: Es vocativo directo a Dios; en español, «Padre» comunica la relación sin añadir un posesivo que el griego no expresa.
- source_word: ὃ δέδωκάς μοι
  english_pob_choice: those whom you have given me
  chosen_spanish: los que me has dado
  alternatives_spanish:
  - aquello que me has dado
  - lo que me has dado
  - aquellos que me has dado
  lexicon: BDAG
  rationale: Aunque el relativo griego es neutro singular, el contexto inmediato exige un sentido colectivo y personal. En español, «los que me has dado» conserva ese referente humano sin volver la frase pesada o abstracta.
- source_word: δέδωκάς
  english_pob_choice: have given
  chosen_spanish: has dado
  alternatives_spanish:
  - diste
  lexicon: BDAG
  rationale: El perfecto griego expresa una acción cumplida con efecto vigente; el presente perfecto español lo refleja de modo natural.
- source_word: θέλω
  english_pob_choice: I desire
  chosen_spanish: deseo
  alternatives_spanish:
  - quiero
  - quiero que
  lexicon: BDAG
  rationale: «Deseo» conserva la fuerza volitiva de θέλω en una oración de petición sin sonar a decreto ni a simple preferencia débil.
- source_word: ὅπου εἰμὶ ἐγὼ
  english_pob_choice: where I am
  chosen_spanish: donde yo estoy
  alternatives_spanish:
  - donde estoy yo
  lexicon: BDAG
  rationale: La repetición enfática del pronombre personal se puede trasladar con «yo» en español; «donde yo estoy» suena natural y conserva el énfasis de la presencia de Jesús.
- source_word: κἀκεῖνοι ὦσιν μετ’ ἐμοῦ
  english_pob_choice: they also may be with me
  chosen_spanish: también estén conmigo
  alternatives_spanish:
  - ellos también estén conmigo
  - estén también conmigo
  lexicon: BDAG
  rationale: κἀκεῖνοι añade la idea de «ellos también»; en español, «también estén conmigo» mantiene la adición y la comunión personal con Jesús.
- source_word: θεωρῶσιν
  english_pob_choice: may see
  chosen_spanish: vean
  alternatives_spanish:
  - contemplen
  - vean y contemplen
  lexicon: BDAG
  rationale: «Ver» es el equivalente claro y suficiente; el matiz contemplativo de θεωρέω queda apoyado por el objeto directo «mi gloria».
- source_word: τὴν δόξαν τὴν ἐμὴν
  english_pob_choice: my glory
  chosen_spanish: mi gloria
  alternatives_spanish:
  - la gloria que es mía
  - la gloria mía
  lexicon: BDAG
  rationale: La repetición griega del artículo y el posesivo se expresa naturalmente como «mi gloria» en español, sin perder la relación de pertenencia.
- source_word: ἣν δέδωκάς μοι
  english_pob_choice: that you have given me
  chosen_spanish: la que me has dado
  alternatives_spanish:
  - que me has dado
  lexicon: BDAG
  rationale: El relativo retoma «gloria»; en español, el artículo relativo «la que» preserva la referencia explícita y la relación posesiva.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - pues
  lexicon: BDAG
  rationale: 'Aquí introduce la causa de la petición: el amor previo del Padre. «Porque» es la forma más directa y clara en español.'
- source_word: ἠγάπησάς με
  english_pob_choice: you loved me
  chosen_spanish: me amaste
  alternatives_spanish:
  - me has amado
  lexicon: BDAG
  rationale: El aoristo se refleja bien con pasado simple en español. En este contexto temporal, «me amaste» comunica adecuadamente la referencia al amor del Padre en relación con el tiempo precreacional.
- source_word: πρὸ καταβολῆς κόσμου
  english_pob_choice: before the foundation of the world
  chosen_spanish: antes de la fundación del mundo
  alternatives_spanish:
  - antes de que el mundo existiera
  - antes de la creación del mundo
  lexicon: BDAG
  rationale: Es un modismo establecido para anterioridad a la creación. «Fundación del mundo» conserva la formulación tradicional y la precisión del texto.
theological_decisions:
- issue: Lectura colectiva del neutro singular ὃ
  english_pob_reading: Greek literally, 'what/that which you have given me'; the expression is collective and refers to the people the Father has given to the Son, hence 'those whom you have given me.'
  chosen_spanish_reading: los que me has dado
  alternative_spanish_readings:
  - lo que me has dado
  - aquello que me has dado
  rationale: El griego usa un relativo neutro singular, pero el verso inmediatamente continúa con plurales y con la escena de comunión personal. La traducción española debe dejar claro el sentido colectivo sin ocultar la forma griega detrás de una abstracción impersonal.
  doctrine_reference: Juan 6:37; Juan 10:29; Juan 17:6, 9, 24
- issue: Fuerza de θέλω en la oración de Jesús
  english_pob_reading: Rendered as 'I desire' rather than 'I will.'
  chosen_spanish_reading: deseo
  alternative_spanish_readings:
  - quiero
  - quiero que
  rationale: «Deseo» preserva la voluntad real de Jesús en forma de petición, evitando tanto un matiz de simple capricho como una lectura que pudiera sonar a decreto formal.
  doctrine_reference: Juan 17:1, 5; Filipenses 2:8
- issue: Amor del Padre antes de la creación
  english_pob_reading: because you loved me before the foundation of the world.
  chosen_spanish_reading: porque me amaste antes de la fundación del mundo
  alternative_spanish_readings:
  - porque me has amado antes de la fundación del mundo
  rationale: Se conserva la referencia temporal precreacional sin suavizarla. La frase mantiene la tensión teológica del amor eterno del Padre hacia el Hijo.
  doctrine_reference: Juan 1:1-3; Juan 17:5; Colosenses 1:15-17
translation_notes:
  revision_awareness: Se siguió de cerca el audit trail inglés y no se introdujeron ampliaciones interpretativas. La principal decisión mantenida fue el sentido colectivo de ὃ y la fuerza volitiva de θέλω; la revisión reciente indicó alta concordancia y no requirió cambios.
  spanish_consistency_notes:
  - Se mantiene «Padre» para el vocativo divino en vez de «Señor», conforme al texto griego.
  - Se usa «fundación del mundo» como fórmula estable y precisa para πρὸ καταβολῆς κόσμου.
  - Se preserva el tiempo perfecto con presente perfecto español en «has dado».
  - Se evita «Cristo» porque el verso no usa Χριστός; el sujeto es Jesús en el contexto narrativo.
  - Se usa «gloria» para δόξα sin glosarla, dado que el contexto joánico la perfila suficientemente.
