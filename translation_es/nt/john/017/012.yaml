translation:
  language: es
  text: Mientras estaba con ellos, yo los guardaba en tu nombre, que me has dado, y los guardé, y ninguno de ellos pereció[a] sino el hijo de destrucción[b], para que la Escritura se cumpliera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ninguno de ellos se perdió».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebraísmo; también: «el destinado a destrucción» o tradicionalmente «el hijo de perdición».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτε
  english_pob_choice: While
  chosen_spanish: Mientras
  alternatives_spanish:
  - Cuando
  lexicon: BDAG
  rationale: Introduce una cláusula temporal con valor de simultaneidad durativa; «Mientras» comunica bien el trasfondo continuo de la acción.
- source_word: ἤμην μετ’ αὐτῶν
  english_pob_choice: I was with them
  chosen_spanish: estaba con ellos
  alternatives_spanish:
  - era con ellos
  - estaba entre ellos
  lexicon: BDAG
  rationale: «Estaba con ellos» es la forma natural y fiel para expresar la presencia de Jesús con los discípulos.
- source_word: ἐγὼ
  english_pob_choice: I
  chosen_spanish: yo
  alternatives_spanish:
  - —
  lexicon: BDAG
  rationale: Se conserva el pronombre explícito para reflejar el énfasis del griego.
- source_word: ἐτήρουν
  english_pob_choice: I kept
  chosen_spanish: yo los guardaba
  alternatives_spanish:
  - yo los cuidaba
  - yo los mantenía
  lexicon: BDAG
  rationale: El imperfecto sugiere acción continua; «guardaba» preserva el valor durativo mejor que un pretérito simple, y evita perder la idea de custodia implicada por τηρέω.
- source_word: ἐν τῷ ὀνόματί σου
  english_pob_choice: in your name
  chosen_spanish: en tu nombre
  alternatives_spanish:
  - por tu nombre
  - bajo tu nombre
  lexicon: BDAG
  rationale: «Nombre» conserva el peso teológico de autoridad y revelación sin explicarlo de más.
- source_word: ᾧ δέδωκάς μοι
  english_pob_choice: which you have given me
  chosen_spanish: el que me has dado
  alternatives_spanish:
  - que me has dado
  - el cual me has dado
  lexicon: BDAG
  rationale: El relativo neutro singular se entiende mejor en español como modificando «nombre»; «el que» mantiene esa referencia y suena natural.
- source_word: καὶ ἐφύλαξα
  english_pob_choice: and I guarded them
  chosen_spanish: y los guardé
  alternatives_spanish:
  - y los protegí
  - y los resguardé
  lexicon: BDAG
  rationale: Se distingue de τηρέω pero en español «guardé» funciona como verbo de custodia y permite conservar la variación verbal del griego.
- source_word: οὐδεὶς ἐξ αὐτῶν ἀπώλετο
  english_pob_choice: not one of them perished
  chosen_spanish: ninguno de ellos se perdió
  alternatives_spanish:
  - no se perdió ninguno de ellos
  - ninguno pereció
  lexicon: BDAG
  rationale: «Se perdió» sigue la alternativa lexical reconocida por la POB inglesa y es un equivalente idiomático fuerte en español; se evita resolver el matiz entre perderse y perecer.
- source_word: εἰ μὴ
  english_pob_choice: except
  chosen_spanish: sino
  alternatives_spanish:
  - excepto
  - salvo
  lexicon: BDAG
  rationale: En español, «sino» encaja de forma natural tras una negación previa.
- source_word: ὁ υἱὸς τῆς ἀπωλείας
  english_pob_choice: the son of destruction
  chosen_spanish: el hijo de perdición
  alternatives_spanish:
  - el hijo de destrucción
  - el destinado a destrucción
  lexicon: BDAG
  rationale: Se conserva la expresión semítica tradicionalmente conocida, porque en español «hijo de perdición» comunica el peso idiomático y literario del giro, a la vez que deja abierta la tensión interpretativa.
- source_word: ἵνα ἡ γραφὴ πληρωθῇ
  english_pob_choice: so that the Scripture might be fulfilled
  chosen_spanish: para que la Escritura se cumpliera
  alternatives_spanish:
  - a fin de que la Escritura se cumpliera
  - para que se cumpliera la Escritura
  lexicon: BDAG
  rationale: «Se cumpliera» reproduce el sentido de πληρωθῇ en un español bíblico claro; se mantiene el artículo con «la Escritura» como posible referencia específica o colectiva a la autoridad escritural.
theological_decisions:
- issue: Referencia de ᾧ δέδωκάς μοι
  english_pob_reading: The relative clause modifies 'your name' ('in your name, which you have given me').
  chosen_spanish_reading: 'La cláusula relativa modifica «tu nombre»: «en tu nombre, el que me has dado».'
  alternative_spanish_readings:
  - «en tu nombre, que me has dado»
  - «en tu nombre, el cual me has dado»
  rationale: El relativo neutro singular concuerda más naturalmente con «nombre» que con «ellos». La traducción sigue la sintaxis griega transmitida en vez de armonizar con otras formulaciones joánicas más familiares.
  doctrine_reference: Primacía del texto original sobre la armonización traductiva
- issue: Sentido de ὁ υἱὸς τῆς ἀπωλείας
  english_pob_reading: A Hebraic idiom indicating one characterized by or destined for destruction, rendered formally as 'the son of destruction'.
  chosen_spanish_reading: Un hebraísmo que caracteriza a Judas como destinado a perdición, conservado formalmente como «el hijo de perdición».
  alternative_spanish_readings:
  - «el hijo de destrucción»
  - «el destinado a destrucción»
  rationale: La forma tradicional en español mantiene el color idiomático y no cierra indebidamente el matiz entre carácter, destino y juicio. Así se preserva la tensión teológica que el griego deja abierta.
  doctrine_reference: Preservar la tensión teológica sin explicarla en exceso
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente del audit trail inglés: usa un pasado simple natural en la acción principal («los guardé») junto con el imperfecto de trasfondo («los guardaba») para reflejar continuidad durante la presencia de Jesús. También conserva la lectura gramáticalmente más directa de «nombre» como antecedente de «el que me has dado», sin armonizarla con formulaciones paralelas de otros pasajes.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» por defecto en el proyecto, pero aquí no aparece el nombre divino explícito; por tanto no se requiere ajuste.
  - Se usa «nombre» en sentido teológico de autoridad/revelación, sin añadir paráfrasis.
  - Se conserva la variación verbal entre «guardaba» y «guardé» para reflejar el contraste aspectual del griego.
  - «Hijo de perdición» se elige por continuidad idiomática y legibilidad eclesial en español, con nota que preserva alternativas.
