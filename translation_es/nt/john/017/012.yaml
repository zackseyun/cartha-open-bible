    rationale: La POB inglesa eligió «not one of them perished» y conservó «none of them was lost» como alternativa en nota. El español debe reflejar esa jerarquía de decisiones, no invertirla.
  - severity: medium
    issue: «El hijo de perdición» en el texto principal no sigue la decisión principal documentada «the son of destruction».
    rationale: Aunque «hijo de perdición» es tradicional y comprensible, la auditoría pidió preservar formalmente el giro como «son of destruction» y dejar la formulación tradicional como alternativa.
  - severity: low
