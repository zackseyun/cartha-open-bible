  text: ὅτε ἤμην μετ’ ⸀αὐτῶν ἐγὼ ἐτήρουν αὐτοὺς ἐν τῷ ὀνόματί σου ⸀ᾧ δέδωκάς μοι, ⸀καὶ ἐφύλαξα, καὶ οὐδεὶς ἐξ αὐτῶν ἀπώλετο εἰ μὴ ὁ υἱὸς τῆς ἀπωλείας, ἵνα ἡ γραφὴ πληρωθῇ.
base_translation:
  language: en
  yaml_path: translation/nt/john/017/012.yaml
  text: While I was with them[a], I kept them in your name, which you have given me, and I guarded them, and not one of them perished except the son of destruction[b], so that the Scripture might be fulfilled.
