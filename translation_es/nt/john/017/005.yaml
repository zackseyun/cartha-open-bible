translation:
  language: es
  text: Y ahora, Padre, glorifícame en tu presencia[a] con la gloria que tuve contigo antes de que existiera el mundo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «junto a ti»; la frase griega puede denotar con más literalidad proximidad al Padre.
    reason: lexical_alternative
  - marker: b
    text: O «antes de que el mundo fuera» o «antes de que el mundo llegara a existir».
    reason: lexical_alternative
lexical_decisions:
- source_word: δόξασόν
  english_pob_choice: glorify
  chosen_spanish: glorifica
  alternatives_spanish:
  - honra
  lexicon: BDAG
  rationale: El imperativo aoristo de δοξάζω conserva en Juan el campo teológico de la gloria. «Glorifica» mantiene ese vocabulario mejor que «honra», que debilitaría la resonancia joánica y la relación con la gloria compartida entre el Padre y el Hijo.
- source_word: παρὰ σεαυτῷ
  english_pob_choice: in your presence
  chosen_spanish: en tu presencia
  alternatives_spanish:
  - contigo mismo
  - junto a ti
  lexicon: BDAG
  rationale: παρά con dativo puede expresar cercanía o presencia. En español, «en tu presencia» comunica con naturalidad esa proximidad relacional/espacial sin forzar una construcción extraña.
- source_word: τῇ δόξῃ
  english_pob_choice: with the glory
  chosen_spanish: con aquella gloria
  alternatives_spanish:
  - con la gloria
  - en la gloria
  lexicon: BDAG
  rationale: 'El dativo se entiende de manera asociativa en relación con la petición: la glorificación pedida se especifica por la gloria mencionada en la relativa. «Con aquella gloria» conserva esa relación y suena fluido en español.'
- source_word: ᾗ εἶχον
  english_pob_choice: that I had
  chosen_spanish: que tuve
  alternatives_spanish:
  - que estaba teniendo
  - que poseía
  lexicon: BDAG
  rationale: El imperfecto εἶχον refiere una posesión anterior de gloria. En español, el pretérito perfecto simple «tuve» resulta natural en esta cláusula temporal y mantiene la referencia a una posesión previa sin sobreexplicar.
- source_word: πρὸ τοῦ τὸν κόσμον εἶναι
  english_pob_choice: before the world existed
  chosen_spanish: antes de que existiera el mundo
  alternatives_spanish:
  - antes de que el mundo fuera
  - antes de que el mundo llegara a existir
  lexicon: BDAG
  rationale: La construcción articular con infinitivo expresa tiempo antecedente. «Antes de que existiera el mundo» preserva el sentido ontológico de εἶναι con claridad y buena idiomaticidad en español.
- source_word: παρὰ σοί
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - junto a ti
  - en tu presencia
  lexicon: BDAG
  rationale: παρά con dativo indica cercanía/presencia; «contigo» es la forma más natural y concisa en español. Dado que ya se usó «en tu presencia» para παρὰ σεαυτῷ, aquí se mantiene la variación natural sin perder la idea relacional.
- source_word: σύ, πάτερ
  english_pob_choice: Father
  chosen_spanish: Padre
  alternatives_spanish:
  - Padre, tú
  - Padre mío
  lexicon: BDAG
  rationale: El pronombre enfático σύ no requiere calco en español; el vocativo «Padre» comunica la dirección orante con claridad y dignidad. El énfasis se conserva en el orden y el tono de la oración.
- source_word: κόσμον
  english_pob_choice: world
  chosen_spanish: mundo
  alternatives_spanish:
  - universo
  - creación
  lexicon: BDAG
  rationale: κόσμος en Juan suele referirse al mundo creado y humano. «Mundo» es el equivalente estándar y adecuado en este contexto.
theological_decisions:
- issue: Preexistencia del Hijo implícita en el versículo
  english_pob_reading: Render the temporal clause straightforwardly as referring to glory Jesus had with the Father before the world's existence.
  chosen_spanish_reading: Traducir la cláusula temporal de forma directa, afirmando la gloria que Jesús tuvo con el Padre antes de la existencia del mundo.
  alternative_spanish_readings:
  - antes de que el mundo fuera
  - antes de que el mundo llegara a existir
  rationale: El griego presenta con claridad una existencia previa al mundo y una gloria compartida con el Padre. La traducción no debe suavizar esa afirmación ni ampliarla interpretativamente; debe dejar intacta la fuerza pretemporal del texto.
  doctrine_reference: Credo Niceno (381 d.C.)
- issue: Naturaleza de la 'gloria' compartida con el Padre
  english_pob_reading: Retain 'glory' without interpretive expansion.
  chosen_spanish_reading: Mantener «gloria» sin expansión interpretativa.
  alternative_spanish_readings:
  - majestad
  - honor
  rationale: El texto afirma una gloria compartida, pero no la define aquí. Conservar «gloria» preserva la tensión teológica joánica y evita imponer una explicación doctrinal más estrecha en la traducción misma.
  doctrine_reference: 'Principio de la POB: preservar la tensión teológica en lugar de resolverla'
translation_notes:
  revision_awareness: 'Revisado con el último pase disponible: sin cambios necesarios; alta concordancia con la fuente y con el auditor inglés.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usa «gloria» de manera consistente con la terminología joánica y con la decisión inglesa de no expandir a «majestad» u «honor».
  - Se preserva la preexistencia del Hijo sin suavizarla mediante formulaciones menos directas.
  - Se evita «SEÑOR» como sustituto devocional no presente en el original.
  - El pronombre enfático σύ se refleja por el tono de la invocación y no por un calco incómodo en español.
