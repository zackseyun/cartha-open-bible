    issue: Las notas al pie están vinculadas a lugares incorrectos del texto.
    rationale: La nota [a] aparece después de «Padre», pero su contenido explica παρὰ σεαυτῷ, no el vocativo. La nota [b] aparece después de «presencia», pero su contenido explica πρὸ τοῦ τὸν κόσμον εἶναι. La nota [c] explica παρά con dativo, pero está anclada al final de la cláusula temporal. Esto distorsiona la evidencia fuente y el audit trail inglés.
