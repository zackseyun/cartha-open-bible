translation:
  language: es
  text: Y por ellos me santifico[a], para que también ellos sean santificados en verdad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «me consagro». El verbo griego pertenece a la misma raíz que el participio final «santificados».
    reason: lexical_alternative
  - marker: b
    text: O «en la verdad»; compárese con 17:17.
    reason: alternative_reading
lexical_decisions:
- source_word: ὑπὲρ αὐτῶν
  english_pob_choice: for their sake
  chosen_spanish: por ellos
  alternatives_spanish:
  - en favor de ellos
  - por su bien
  lexicon: BDAG
  rationale: ὑπέρ con genitivo expresa beneficio o representación. En español, «por ellos» conserva esa relación de beneficio de forma natural y sobria, sin añadir la idea de sustitución que el contexto no exige.
- source_word: ἁγιάζω
  english_pob_choice: sanctify
  chosen_spanish: santifico
  alternatives_spanish:
  - consagro
  - hago santo
  - apartó/consagro
  lexicon: BDAG
  rationale: Se mantiene la repetición de la misma raíz verbal entre el verbo principal y el participio final. «Santifico» es el cognado natural de «santificados» y preserva la conexión léxica y teológica del versículo. «Consagro» es una alternativa válida para el matiz de dedicación, pero no mantiene tan bien la repetición visible.
- source_word: ἐμαυτόν
  english_pob_choice: myself
  chosen_spanish: a mí mismo
  alternatives_spanish:
  - a mí mismo mismo
  - yo mismo
  lexicon: BDAG
  rationale: El reflexivo griego indica acción dirigida a la propia persona de Jesús. «A mí mismo» es la correspondencia directa y clara en español.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el fin de que
  lexicon: BDAG
  rationale: Introduce finalidad. «Para que» es la forma más natural y precisa en español contemporáneo, preservando el valor telico del griego.
- source_word: ὦσιν
  english_pob_choice: may be
  chosen_spanish: sean
  alternatives_spanish:
  - puedan ser
  - lleguen a ser
  lexicon: BDAG
  rationale: Después de ἵνα, el subjuntivo expresa propósito. En español, «sean» comunica adecuadamente ese valor sin sobrecargar la frase.
- source_word: καὶ αὐτοὶ
  english_pob_choice: they also
  chosen_spanish: también ellos
  alternatives_spanish:
  - ellos también
  - aun ellos
  lexicon: BDAG
  rationale: La combinación añade inclusión y énfasis. «También ellos» conserva ese énfasis de manera fluida en español.
- source_word: ἡγιασμένοι
  english_pob_choice: sanctified
  chosen_spanish: santificados
  alternatives_spanish:
  - consagrados
  - hechos santos
  lexicon: BDAG
  rationale: El participio perfecto pasivo expresa un estado resultante. «Santificados» preserva la relación léxica con ἁγιάζω y mantiene el mismo término base en ambas partes del versículo.
- source_word: ἐν ἀληθείᾳ
  english_pob_choice: in truth
  chosen_spanish: en la verdad
  alternatives_spanish:
  - en verdad
  - por la verdad
  lexicon: BDAG
  rationale: Aunque el griego no lleva artículo, la proximidad con Juan 17:17 hace legítima y natural la expresión «en la verdad» en español. Esta opción mantiene la resonancia contextual sin forzar una paráfrasis.
theological_decisions:
- issue: Sentido de la auto-santificación de Jesús
  english_pob_reading: Jesús se separa o se consagra a sí mismo para el bien de los discípulos, no como si pasara de impuro a puro.
  chosen_spanish_reading: Jesús habla de consagrarse a sí mismo para la misión que beneficia a los discípulos, no de volverse moralmente más santo.
  alternative_spanish_readings:
  - Jesús se hace santo a sí mismo
  - Jesús se santifica moralmente
  rationale: En el contexto joánico y cristológico, el Hijo es sin pecado; por eso el verbo aquí debe leerse como dedicación/consecración para la obra redentora. El español «me santifico» conserva la tensión léxica sin resolverla de forma inapropiada y permite que el contexto determine el matiz.
  doctrine_reference: Credo Niceno (381); Definición de Calcedonia (451)
- issue: Valor de ἐν ἀληθείᾳ
  english_pob_reading: '''in truth'' as the sphere or reality in which sanctification occurs.'
  chosen_spanish_reading: «en la verdad» como esfera o ámbito de la santificación.
  alternative_spanish_readings:
  - «en verdad» como modo
  - «por la verdad» como medio
  rationale: La frase griega carece de artículo; aun así, la cercanía con Juan 17:17 favorece una resonancia intencional con «la verdad». Se conserva el enlace contextual sin introducir una certeza más fuerte de la que exige el griego.
  doctrine_reference: 'Principio de traducción POB: preservar tensiones teológicas y contextuales en lugar de nivelarlas'
translation_notes:
  revision_awareness: Pasaje sin revisiones registradas; se mantiene el acuerdo alto del control cruzado y se conserva la repetición léxica de ἁγιάζω/ἡγιασμένοι con la pareja «santifico/santificados».
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exija; aquí no aparece.
  - Se preserva «santifico/santificados» para visibilizar la raíz común del griego.
  - Se evita «Cristo» porque el versículo usa el pronombre reflexivo de Jesús, no un título.
  - «En la verdad» se mantiene como lectura principal por la cercanía contextual con Juan 17:17.
