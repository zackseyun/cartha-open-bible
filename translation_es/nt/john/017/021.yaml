translation:
  language: es
  text: para que todos sean uno[a], así como tú, Padre, estás en mí y yo en ti; para que también ellos estén en nosotros[b], para que el mundo crea[c] que tú me enviaste.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «unidos». El griego dice más literalmente «uno», lo cual conserva la plenitud de la unidad sin limitarla a un solo aspecto.
    reason: lexical_alternative
  - marker: b
    text: La repetición de «en» («en mí», «en ti», «en nosotros») refleja el lenguaje joánico de mutua morada y participación; es más fuerte que una mera asociación.
    reason: cross_reference
  - marker: c
    text: O «llegue a creer». El griego puede entenderse como el acto de creer del mundo, sin precisar aquí si se enfatiza el comienzo o la continuidad de esa fe.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα
  english_pob_choice: that / so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: En español, «para que» comunica de forma natural la relación de propósito/resultado que el griego expresa con ἵνα. Mantiene la secuencia de tres cláusulas sin volverla rígida ni mecánica.
- source_word: πάντες
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todos ellos
  lexicon: BDAG
  rationale: «Todos» reproduce con concisión el alcance universal del plural nominativo y encaja con el español natural de la oración.
- source_word: ἓν
  english_pob_choice: one
  chosen_spanish: uno
  alternatives_spanish:
  - unidos
  lexicon: BDAG
  rationale: Se conserva el singular neutro con «uno», porque el griego dice literalmente «uno» y no especifica el modo de esa unidad. «Unidos» explicaría más de lo que el texto dice.
- source_word: καθὼς
  english_pob_choice: just as
  chosen_spanish: así como
  alternatives_spanish:
  - como
  - tal como
  lexicon: BDAG
  rationale: «Así como» marca claramente la comparación entre la unidad de los creyentes y la relación del Padre y el Hijo.
- source_word: πάτερ
  english_pob_choice: Father
  chosen_spanish: Padre
  alternatives_spanish:
  - Padre mío
  lexicon: BDAG
  rationale: La vocación directa debe mantenerse explícita. «Padre» conserva el tono relacional y teológico del vocativo.
- source_word: ἐν ἐμοὶ ... ἐν σοί
  english_pob_choice: in me ... in you
  chosen_spanish: estás en mí ... yo en ti
  alternatives_spanish:
  - estás conmigo ... yo contigo
  lexicon: BDAG
  rationale: 'Se mantiene «en» para reflejar el lenguaje joánico de mutua morada. En español se completa el verbo en la segunda parte por elipsis natural: «yo en ti» = «yo estoy en ti».'
- source_word: κἀγώ
  english_pob_choice: and I
  chosen_spanish: y yo
  alternatives_spanish:
  - y yo también
  lexicon: BDAG
  rationale: «Y yo» conserva la coordinación simple del crasis y suena más natural en español que una expansión interpretativa.
- source_word: καὶ αὐτοὶ
  english_pob_choice: they also
  chosen_spanish: también ellos
  alternatives_spanish:
  - ellos también
  lexicon: BDAG
  rationale: Se preserva el matiz aditivo de καί con una colocación fluida en español. La forma elegida enlaza con la oración anterior sin añadir interpretación.
- source_word: ἐν ἡμῖν
  english_pob_choice: in us
  chosen_spanish: en nosotros
  alternatives_spanish:
  - entre nosotros
  lexicon: BDAG
  rationale: «En nosotros» reproduce el lenguaje de participación/morada mutua. «Entre nosotros» diluiría la fuerza teológica del ἐν joánico.
- source_word: κόσμος
  english_pob_choice: the world
  chosen_spanish: el mundo
  alternatives_spanish:
  - la humanidad
  - la gente del mundo
  lexicon: BDAG
  rationale: «El mundo» conserva el término joánico establecido y su densidad teológica, sin reducirlo a una sola acepción sociológica.
- source_word: πιστεύῃ
  english_pob_choice: may believe
  chosen_spanish: crea
  alternatives_spanish:
  - crea en ti
  - llegue a creer
  lexicon: BDAG
  rationale: El subjuntivo presente después de ἵνα se expresa naturalmente con «crea». No se fuerza un valor ingressivo («llegue a creer») que el griego no exige explícitamente.
- source_word: ἀπέστειλας
  english_pob_choice: sent
  chosen_spanish: enviaste
  alternatives_spanish:
  - mandaste
  - has enviado
  lexicon: BDAG
  rationale: «Enviaste» traduce con precisión el aoristo y mantiene el verbo de comisión/apostolado presente en ἀποστέλλω. En español bíblico actual, «enviar» es claro y fiel.
theological_decisions:
- issue: Naturaleza de la unidad de los creyentes
  english_pob_reading: Render ἓν as 'one' and retain 'in us' language without interpretive expansion.
  chosen_spanish_reading: Conservar «uno» y «en nosotros» sin convertirlo en «unidos» o «en armonía».
  alternative_spanish_readings:
  - sean unidos
  - sean uno en propósito
  - estén en armonía
  rationale: El texto compara la unidad de los creyentes con la relación del Padre y el Hijo, pero no la define de forma restrictiva. «Uno» preserva la tensión teológica y evita sobreexplicar el alcance del término.
  doctrine_reference: Translation philosophy §3; Affirmations (Nicene Creed, Chalcedon)
- issue: Lenguaje joánico de morada mutua
  english_pob_reading: Use 'in me,' 'in you,' and 'in us' literally.
  chosen_spanish_reading: Mantener «en mí», «en ti» y «en nosotros» de manera literal.
  alternative_spanish_readings:
  - conmigo / contigo / con nosotros
  - unidos con nosotros
  rationale: El ἐν repetido es parte del tejido teológico joánico. Traducirlo por «con» o por una paráfrasis relacional disminuiría la fuerza de la imagen de mutua inhabitación que el griego deja abierta.
  doctrine_reference: Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: El texto sigue la lectura confirmada por el último pase de revisión, que no introdujo cambios. Se mantuvo la equivalencia óptima del original griego con atención al audit trail en inglés y sin desplazar la tensión léxica de ἓν ni el valor joánico de ἐν.
  spanish_consistency_notes:
  - Se usa «Yahvé» en el proyecto cuando corresponda, pero este versículo no contiene el nombre divino.
  - Se mantiene la distinción entre «uno» y «unidos» para no aplanar la unidad descrita por ἓν.
  - «En nosotros» se conserva literalmente para reflejar el patrón joánico de indwelling.
  - «Crea» reproduce el subjuntivo presente de πιστεύῃ sin añadir un matiz ingressivo obligatorio.
