translation:
  language: es
  text: Santifícalos en la verdad[a]; tu palabra es verdad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tu palabra es la verdad». El sustantivo predicado griego «verdad» no lleva artículo, lo que puede enfatizar cualidad («es verdad») más que simple identificación.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἁγίασον
  english_pob_choice: Sanctify
  chosen_spanish: Santifícalos
  alternatives_spanish:
  - Sepáralos para ti
  - Hazlos santos
  lexicon: BDAG
  rationale: El imperativo aoristo de ἁγιάζω conserva en español el doble matiz de consagrar y hacer santo. «Santificar» es el equivalente más fiel y natural en registro bíblico. En esta forma imperativa, «Santifícalos» mantiene la fuerza exhortativa dirigida a Dios y evita reducir el verbo solo a separación funcional.
- source_word: ἐν τῇ ἀληθείᾳ
  english_pob_choice: in the truth
  chosen_spanish: en la verdad
  alternatives_spanish:
  - por la verdad
  - en verdad
  lexicon: BDAG
  rationale: La preposición ἐν con dativo admite un alcance locativo e instrumental. «En la verdad» preserva esa amplitud sin concretar indebidamente solo el instrumento. «Por la verdad» estrecha demasiado el sentido; «en verdad» en español suele sonar adverbial y puede perder la referencia definida al contenido de ἀλήθεια.
- source_word: λόγος
  english_pob_choice: word
  chosen_spanish: palabra
  alternatives_spanish:
  - mensaje
  - discurso
  lexicon: BDAG
  rationale: En este contexto, λόγος se refiere a la comunicación divina. «Palabra» es el equivalente más claro y tradicional en español, y mantiene la resonancia joánica. «Mensaje» explicita demasiado; «discurso» no encaja tan bien con el registro teológico del pasaje.
- source_word: ὁ σὸς
  english_pob_choice: your
  chosen_spanish: tu
  alternatives_spanish:
  - el tuyo
  lexicon: BDAG
  rationale: El posesivo con artículo en griego se comprime naturalmente en español como «tu palabra». La forma plena «el tuyo» sería menos idiomática y no añade precisión semántica.
- source_word: ἀλήθειά ἐστιν
  english_pob_choice: is truth
  chosen_spanish: es verdad
  alternatives_spanish:
  - es la verdad
  - es verdadera
  lexicon: BDAG
  rationale: 'El predicado nominal carece de artículo, y la POB inglesa nota que eso puede comunicar un valor cualitativo. «Es verdad» conserva bien ese matiz: la palabra de Dios no solo es una verdad más, sino que se caracteriza por verdad. «Es la verdad» es posible, pero resuelve más fuertemente la frase; «es verdadera» debilita el sustantivo ἀλήθεια.'
theological_decisions:
- issue: Cómo reflejar la fuerza cualitativa de ἀλήθεια en la segunda cláusula
  english_pob_reading: your word is truth
  chosen_spanish_reading: tu palabra es verdad
  alternative_spanish_readings:
  - tu palabra es la verdad
  - tu palabra es verdadera
  rationale: 'Se conserva la tensión observada en la POB inglesa: el griego anartro puede leerse cualitativamente. «Es verdad» mantiene la fuerza sustantiva y no obliga a traducir como identificación absoluta mediante el artículo. Así se preserva la afirmación robusta sobre la palabra de Dios sin resolver más de lo que el griego marca explícitamente.'
  doctrine_reference: Primacía del original y preservación de la tensión textual; no forzar una resolución doctrinal por la traducción.
translation_notes:
  revision_awareness: 'El texto griego y la auditoría inglesa concuerdan en alta medida. No hubo revisiones aplicadas en el contexto inglés más reciente, así que la traducción española sigue de cerca el mismo criterio: mantener el imperativo de consagración, la amplitud de ἐν τῇ ἀληθείᾳ y la cualidad de ἀλήθεια sin sobreexplicarla.'
  spanish_consistency_notes:
  - Se usa «Santifícalos» para conservar el registro bíblico y la fuerza del imperativo.
  - «Verdad» se mantiene sin artículo en la cláusula principal para reflejar la posible cualidad del predicado griego.
  - La nota al pie ofrece la alternativa con artículo porque el español crea una ambigüedad similar a la señalada en la POB inglesa.
