revisions:
- from: Pero ahora voy a ti, y digo estas cosas en el mundo, para que tengan mi gozo[a] cumplido[b] en ellos mismos.
  to: Pero ahora vengo a ti, y digo estas cosas en el mundo, para que tengan mi gozo cumplido[a] en ellos mismos[b].
  rationale: Se revisa «voy a ti» a «vengo a ti» para reflejar con mayor fidelidad y naturalidad el presente ἔρχομαι en este contexto de oración. También se corrigen los anclajes de las notas al pie para que la alternativa de πεπληρωμένην se marque en «cumplido» y la de ἐν ἑαυτοῖς en «ellos mismos», conforme al expediente inglés y a la disciplina editorial requerida.
