translation:
  language: es
  text: Pero ahora vengo a ti, y digo estas cosas en el mundo, para que tengan mi gozo cumplido[a] en ellos mismos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «completo» o «lleno».
    reason: lexical_alternative
  - marker: b
    text: O «dentro de ellos mismos».
    reason: lexical_alternative
lexical_decisions:
- source_word: νῦν δὲ
  english_pob_choice: But now
  chosen_spanish: Pero ahora
  alternatives_spanish:
  - Y ahora
  - Ahora
  lexicon: BDAG
  rationale: «νῦν δὲ» marca un giro temporal con matiz leve de contraste o continuidad adversativa. «Pero ahora» conserva ese cambio discursivo de manera natural en español sin exagerar la oposición.
- source_word: πρὸς σὲ ἔρχομαι
  english_pob_choice: I am coming to you
  chosen_spanish: voy a ti
  alternatives_spanish:
  - vengo a ti
  - estoy viniendo a ti
  lexicon: BDAG
  rationale: La idea central es movimiento hacia el Padre. En español, «voy a ti» suena más natural y mantiene la dirección; «vengo» puede sonar menos idiomático aquí por el valor de movimiento futuro/inminente en el contexto de la oración de Jesús.
- source_word: ταῦτα λαλῶ
  english_pob_choice: I am speaking these things
  chosen_spanish: digo estas cosas
  alternatives_spanish:
  - hablo estas cosas
  - estoy diciendo estas cosas
  lexicon: BDAG
  rationale: «λαλέω» enfatiza el acto de hablar/decir. «Digo estas cosas» evita una construcción pesada en español y comunica fielmente el contenido de la palabra pronunciada, sin ir más allá del texto.
- source_word: ἐν τῷ κόσμῳ
  english_pob_choice: in the world
  chosen_spanish: en el mundo
  alternatives_spanish:
  - mientras estoy en el mundo
  - aquí en el mundo
  lexicon: BDAG
  rationale: La frase mantiene la referencia joánica al ámbito presente de Jesús. «En el mundo» preserva la fórmula bíblica y su resonancia temática.
- source_word: ἵνα ἔχωσιν
  english_pob_choice: so that they may have
  chosen_spanish: para que tengan
  alternatives_spanish:
  - a fin de que tengan
  - para que puedan tener
  lexicon: BDAG
  rationale: «ἵνα» expresa propósito. «Para que tengan» es claro y natural en español, y conserva el sentido final sin recargarlo.
- source_word: τὴν χαρὰν τὴν ἐμὴν
  english_pob_choice: my joy
  chosen_spanish: mi gozo
  alternatives_spanish:
  - mi alegría
  - el gozo que es mío
  lexicon: BDAG
  rationale: «χαρά» puede rendirse como «gozo» o «alegría». Se elige «gozo» para mantener un registro bíblico sobrio y porque la frase posee una fuerza más estable y espiritual en español eclesial.
- source_word: πεπληρωμένην
  english_pob_choice: fulfilled
  chosen_spanish: cumplido
  alternatives_spanish:
  - lleno
  - completo
  - colmado
  lexicon: BDAG
  rationale: El participio perfecto pasivo de πληρόω expresa un estado de plenitud alcanzada. «Cumplido» conserva la idea de plenitud realizada y funciona bien con «gozo» en español, sin imponer una paráfrasis explicativa.
- source_word: ἐν ⸀ἑαυτοῖς
  english_pob_choice: in themselves
  chosen_spanish: en ellos mismos
  alternatives_spanish:
  - dentro de sí mismos
  - entre ellos mismos
  lexicon: BDAG
  rationale: El reflexivo plural señala una experiencia interna o personal de los discípulos. «En ellos mismos» es formalmente cercano y claro; «dentro de sí mismos» sería una alternativa posible, pero algo más interpretativa.
theological_decisions:
- issue: Naturaleza de «mi gozo»
  english_pob_reading: Jesus speaks of joy that belongs to him and is to be present fully in his disciples.
  chosen_spanish_reading: Jesús habla del gozo que le pertenece y que debe estar plenamente presente en sus discípulos.
  alternative_spanish_readings:
  - el gozo acerca de Jesús
  - el gozo producido por Jesús sin referencia a su propio gozo
  rationale: El posesivo «mi» se conserva sin suavizarlo, para no resolver la tensión teológica del texto. La redacción española mantiene que el gozo es de Jesús y, a la vez, destinado a los discípulos.
  doctrine_reference: Conservar la tensión lexical y teológica del posesivo sin explicitar una doctrina de participación más allá del texto.
translation_notes:
  revision_awareness: La redacción sigue el estado más reciente del audit trail inglés, que prefirió «fulfilled» para πεπληρωμένην por ser más natural y formalmente apropiado. La versión española refleja esa decisión con «cumplido», manteniendo también la ambigüedad útil entre plenitud realizada y estado completo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto solo cuando aparezca el Tetragrámaton; aquí no aplica.
  - Se usa «gozo» en lugar de «alegría» para conservar el registro bíblico y la correspondencia con la tradición lexical del pasaje.
  - «En el mundo» preserva la fórmula joánica sin añadir explicación interpretativa.
  - No se elimina la tensión del posesivo «mi»; el texto no la resuelve doctrinalmente.
