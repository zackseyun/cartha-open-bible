revisions:
- from: Te he glorificado en la tierra, llevando a término la obra que me has dado para hacer[a].
  to: Te glorifiqué en la tierra, al completar la obra que me has dado para hacer[a].
  rationale: Se ajusta el verbo principal al pretérito simple para reflejar mejor el aoristo griego y mejorar la naturalidad del español. Se reemplaza 'llevando a término' por 'al completar' para expresar con más claridad y sencillez la relación del participio con el verbo principal, en línea con la decisión del POB inglés. Se conserva la alternativa más formal en nota.
