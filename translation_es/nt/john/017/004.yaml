translation:
  language: es
  text: Te glorifiqué en la tierra, al completar la obra que me has dado para hacer[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «habiendo completado la obra que me has dado para hacer».

      '
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐδόξασα
  english_pob_choice: glorified
  chosen_spanish: he glorificado
  alternatives_spanish:
  - te he honrado
  lexicon: BDAG
  rationale: δόξαζω en Juan suele implicar dar gloria en sentido teológico, no solo 'honrar'. 'He glorificado' conserva ese valor fuerte y la relación directa con el Padre.
- source_word: ἐπὶ τῆς γῆς
  english_pob_choice: on the earth
  chosen_spanish: en la tierra
  alternatives_spanish:
  - sobre la tierra
  - en la tierra misma
  lexicon: BDAG
  rationale: La preposición griega con genitivo expresa ubicación/esfera; en español 'en la tierra' suena natural y mantiene el sentido espacial sin perder solemnidad.
- source_word: τελειώσας
  english_pob_choice: by completing
  chosen_spanish: llevando a término
  alternatives_spanish:
  - habiendo completado
  - completando
  - terminando
  lexicon: BDAG
  rationale: El participio aoristo expresa la acción que acompaña o explica la glorificación. 'Llevando a término' conserva la idea de llevar algo a su plena realización y evita la rigidez de un calco.
- source_word: τὸ ἔργον
  english_pob_choice: the work
  chosen_spanish: la obra
  alternatives_spanish:
  - el trabajo
  - la tarea
  lexicon: BDAG
  rationale: En Juan, ἔργον se refiere aquí a la misión encomendada por el Padre. 'La obra' mantiene el registro bíblico y la amplitud semántica mejor que 'trabajo'.
- source_word: δέδωκάς μοι
  english_pob_choice: you have given me
  chosen_spanish: me has dado
  alternatives_spanish:
  - me diste
  lexicon: BDAG
  rationale: El perfecto griego expresa una acción dada con relevancia presente. El pretérito perfecto compuesto español ('me has dado') comunica bien esa continuidad.
- source_word: ἵνα ποιήσω
  english_pob_choice: to do
  chosen_spanish: para hacer
  alternatives_spanish:
  - para que haga
  - que yo haga
  lexicon: BDAG
  rationale: Después de un verbo de dar, ἵνα con subjuntivo expresa finalidad. 'Para hacer' es natural en español y conserva la idea de propósito sin forzar la sintaxis.
theological_decisions:
- issue: Relación entre glorificar al Padre y completar la obra asignada
  english_pob_reading: Jesus glorified the Father on earth by completing the work given to him.
  chosen_spanish_reading: Jesús glorifica al Padre en la tierra llevando a término la obra encomendada.
  alternative_spanish_readings:
  - Jesús te glorificó en la tierra después de completar la obra...
  - Jesús te glorificó en la tierra; completé la obra...
  rationale: La sintaxis permite entender el participio como medio o circunstancia concomitante. 'Llevando a término' preserva esa relación sin decidir en exceso entre lectura temporal o instrumental, manteniendo la tensión interpretativa documentada en el POB inglés.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it beyond the text)
translation_notes:
  revision_awareness: 'El inglés POB reciente lee el participio como medio: ''by completing''. La versión española sigue esa decisión con una equivalencia natural (''llevando a término'') y conserva la alternativa participial explícita en nota. No se registran revisiones posteriores en el expediente.'
  spanish_consistency_notes:
  - Se mantiene el tratamiento directo de Jesús a Dios en segunda persona singular, como en el texto fuente.
  - '''La obra'' conserva el registro joánico y evita reducir ἔργον a una mera tarea puntual.'
  - '''En la tierra'' sigue el valor espacial de ἐπὶ τῆς γῆς sin introducir matices devocionales ajenos.'
