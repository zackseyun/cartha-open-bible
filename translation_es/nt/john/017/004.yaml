review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: Jesús glorifica al Padre en la tierra en relación con completar la obra dada. Conserva adecuadamente ἐδόξασα = ''glorificado'', ἐπὶ τῆς γῆς = ''en la tierra'', τὸ ἔργον = ''la obra'', y δέδωκάς μοι = ''me has dado''. Sin embargo, ''Te he glorificado'' introduce un pretérito perfecto compuesto no motivado por el aoristo ἐδόξασα y suena menos natural aquí que el pretérito simple ''Te glorifiqué''. Además, ''llevando a término'' es posible, pero en este contexto resulta algo más perifrástico que la opción más directa ''al completar'', que expresa mejor la relación de medio documentada por el POB inglés.'
  spanish_quality_summary: El español es claro y digno, pero puede mejorarse en naturalidad y precisión aspectual. 'Te glorifiqué en la tierra, al completar la obra...' suena más idiomático y más ajustado al valor del aoristo principal y del participio de medio. 'Para hacer' es comprensible, pero 'que me has dado que haga' sería torpe; por ello conviene mantener una formulación natural como 'para hacer'. La nota alternativa debe reflejar la nueva redacción principal.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Glorificado', 'obra' y 'me has dado' están alineados con las decisiones del POB. La revisión propuesta mantiene el registro bíblico y la relación teológica entre glorificar y completar la obra sin sobreinterpretar.
  issues:
  - severity: medium
    issue: Tiempo verbal principal en español
    rationale: 'El griego ἐδόξασα es aoristo, y en este contexto español prefiere el pretérito simple: ''Te glorifiqué'', no ''Te he glorificado''. El perfecto compuesto no es imposible, pero aquí introduce una matización aspectual ajena al original y menos natural en registro bíblico narrativo/oracional.'
  - severity: low
    issue: Rendición del participio τελειώσας
    rationale: '''Llevando a término'' comunica bien la idea, pero ''al completar'' expresa de manera más directa e idiomática la relación instrumental/explicativa que el POB inglés documenta con ''by completing''. Además evita una perífrasis algo pesada.'
  - severity: low
    issue: Coherencia de la nota alternativa
    rationale: Si se cambia el texto principal, la nota debe actualizarse para conservar una alternativa formalmente cercana al griego, por ejemplo 'habiendo completado...'.
  revised_spanish_text: Te glorifiqué en la tierra, al completar la obra que me has dado para hacer[a].
  revised_footnotes:
