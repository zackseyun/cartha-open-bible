  text: καὶ οὐκέτι εἰμὶ ἐν τῷ κόσμῳ, καὶ ⸀αὐτοὶ ἐν τῷ κόσμῳ εἰσίν, κἀγὼ πρὸς σὲ ἔρχομαι. πάτερ ἅγιε, τήρησον αὐτοὺς ἐν τῷ ὀνόματί σου ᾧ δέδωκάς μοι, ἵνα ὦσιν ἓν ⸀καθὼς ἡμεῖς.
base_translation:
  language: en
  yaml_path: translation/nt/john/017/011.yaml
  text: And I am no longer in the world[a], but they are in the world, and I am coming to you. Holy Father, keep them in your name, which you have given to me, so that they may be one[b], just as we are.
  footnotes:
  - marker: a
    text: Or 'keep them by your name' or 'protect them through your name.' The Greek phrase can express sphere, means, or authority.
    reason: lexical_alternative
  - marker: b
    text: Some manuscripts read 'keep them in your name which you have given me,' while others are understood as 'keep them in your name those whom you have given me.' This translation follows the SBLGNT reading, in which 'which' refers to 'name.'
    reason: textual_variant
