translation:
  language: es
  text: Y ya no estoy en el mundo[a], pero ellos están en el mundo, y yo vengo a ti. Padre santo, guárdalos en tu nombre, el cual me has dado, para que sean uno[b], así como nosotros somos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «guárdalos por tu nombre» o «protégelos mediante tu nombre». La frase griega puede expresar esfera, medio o autoridad.
    reason: lexical_alternative
  - marker: b
    text: Algunos manuscritos leen «guárdalos en tu nombre, el cual me has dado», mientras que otros se entienden como «guárdalos en tu nombre a los que me has dado». Esta traducción sigue la lectura del SBLGNT, en la que «el cual» retoma «nombre».
    reason: textual_variant
lexical_decisions:
- source_word: οὐκέτι
  english_pob_choice: no longer
  chosen_spanish: ya no
  alternatives_spanish:
  - no más
  - ya no estoy
  lexicon: BDAG
  rationale: Οὐκέτι expresa cese desde el punto de vista presente. En español, «ya no» comunica de forma natural la misma idea temporal sin perder la negación de continuidad.
- source_word: κόσμος
  english_pob_choice: world
  chosen_spanish: mundo
  alternatives_spanish:
  - el mundo
  - la sociedad humana
  - la esfera terrenal
  lexicon: BDAG
  rationale: En Juan, κόσμος suele mantener la carga de la esfera humana/terrenal. «Mundo» preserva el término establecido sin reinterpretarlo como «sociedad» o «era».
- source_word: κἀγὼ πρὸς σὲ ἔρχομαι
  english_pob_choice: and I am coming to you
  chosen_spanish: y yo vengo a ti
  alternatives_spanish:
  - y yo estoy viniendo a ti
  - y yo voy a ti
  lexicon: BDAG
  rationale: El presente ἔρχομαι tiene fuerza progresiva o futurista en contexto. «Vengo a ti» mantiene la cercanía verbal al griego y resulta natural en español.
- source_word: πάτερ ἅγιε
  english_pob_choice: Holy Father
  chosen_spanish: Padre santo
  alternatives_spanish:
  - Padre santo y apartado
  - Santo Padre
  lexicon: BDAG
  rationale: El vocativo se conserva con el orden más natural en español. «Padre santo» refleja tanto la intimidad de «Padre» como la cualidad de ἅγιε, sin desplazar el sentido hacia un título eclesiástico fijo.
- source_word: τήρησον
  english_pob_choice: keep
  chosen_spanish: guárdalos
  alternatives_spanish:
  - cuídalos
  - protégelos
  - presérvalos
  lexicon: BDAG
  rationale: τηρέω puede significar guardar, proteger o preservar. «Guárdalos» es el equivalente español más amplio y mantiene la resonancia joánica sin estrechar el sentido a mera protección física.
- source_word: ἐν τῷ ὀνόματί σου
  english_pob_choice: in your name
  chosen_spanish: en tu nombre
  alternatives_spanish:
  - por tu nombre
  - mediante tu nombre
  - bajo tu nombre
  lexicon: BDAG
  rationale: Se conserva «en» para reflejar la idea de esfera, relación o ámbito, no solo instrumento. «Tu nombre» preserva la referencia al carácter, autoridad y realidad revelada de Dios.
- source_word: ᾧ δέδωκάς μοι
  english_pob_choice: which you have given to me
  chosen_spanish: que me has dado
  alternatives_spanish:
  - el cual me has dado
  - que tú me has dado
  lexicon: BDAG
  rationale: Aunque el antecedente gramatical es «nombre», en español la relativa suena más natural retomando la idea con «que». Esto mantiene la lectura del SBLGNT y evita una construcción rígida o ambigua.
- source_word: ἵνα ὦσιν ἓν
  english_pob_choice: so that they may be one
  chosen_spanish: para que sean uno
  alternatives_spanish:
  - a fin de que sean uno
  - para que sean una sola cosa
  lexicon: BDAG
  rationale: ἵνα expresa propósito. «Sean uno» conserva la unidad como idea principal; «uno» respeta el neutro singular ἕν mejor que una formulación que sugiera una sola entidad material.
- source_word: καθὼς ἡμεῖς
  english_pob_choice: just as we are
  chosen_spanish: así como nosotros
  alternatives_spanish:
  - tal como nosotros
  - igual que nosotros somos
  lexicon: BDAG
  rationale: Καθώς marca comparación. «Así como nosotros» reproduce la analogía sin ampliar el contenido de la comparación más allá de lo que el texto dice.
theological_decisions:
- issue: Sentido de «en tu nombre»
  english_pob_reading: Rendered as 'keep them in your name' without expanding the phrase in the main text.
  chosen_spanish_reading: «Guárdalos en tu nombre» sin explicitar en el texto principal la esfera, el medio o la autoridad.
  alternative_spanish_readings:
  - guárdalos por tu nombre
  - protégelos mediante tu nombre
  rationale: La frase admite matices de esfera, medio, autoridad o pertenencia. Mantener «en tu nombre» preserva esa tensión interpretativa y evita resolverla prematuramente en la línea principal.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it.
- issue: Relación entre la unidad de los discípulos y la unidad del Padre y del Hijo
  english_pob_reading: The verse expresses a real analogy between the disciples' unity and the Father-Son unity, without specifying metaphysical identity in the translation.
  chosen_spanish_reading: «para que sean uno, así como nosotros» conserva una analogía real sin convertirla en identidad metafísica ni reducirla a mera cooperación.
  alternative_spanish_readings:
  - para que sean uno, como nosotros somos uno
  - para que sean uno, en el mismo sentido que nosotros
  rationale: El texto afirma una comparación verdadera pero no la define exhaustivamente. La traducción debe respetar esa tensión teológica sin importar formulaciones doctrinales posteriores al propio versículo.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD); Translation philosophy §3 Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La versión reciente se mantuvo sin cambios tras la revisión cruzada; el consenso fue de alta concordancia y no se aplicaron revisiones editoriales adicionales.
  spanish_consistency_notes:
  - Se mantiene «mundo» para κόσμος y «nombre» para ὄνομα, con el mismo valor terminológico que en el audit trail inglés.
  - Se evita «SEÑOR» como sustituto de Yahvé, porque este versículo no contiene el tetragrámaton ni una cita explícita del nombre divino.
  - «Padre santo» conserva la vocación directa del griego y evita el título eclesiástico fijo «Santo Padre».
  - «Guárdalos» traduce τηρέω en un sentido amplio y joánico, sin estrecharlo solo a protección física.
  - Se conserva la comparación «así como nosotros» para no sobredeterminar la analogía teológica del cierre del versículo.
