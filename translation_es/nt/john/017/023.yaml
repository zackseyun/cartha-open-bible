translation:
  language: es
  text: Yo en ellos y tú en mí[a], para que sean perfeccionados hasta ser uno, para que el mundo conozca que tú me enviaste y los amaste tal como me amaste a mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hechos perfectos hasta ser uno» o «llevados a cumplimiento hasta ser uno».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν αὐτοῖς / ἐν ἐμοί
  english_pob_choice: in them / in me
  chosen_spanish: en ellos / en mí
  alternatives_spanish:
  - entre ellos / en mí
  - en medio de ellos / en mí
  lexicon: BDAG
  rationale: Se conserva la relación de mutua inhabitación que el auditorio joánico reconoce en el uso de ἐν. En español, «en» mantiene mejor ese valor teológico y literario que «entre», que debilitaría la reciprocidad de la presencia.
- source_word: τετελειωμένοι
  english_pob_choice: perfected
  chosen_spanish: perfeccionados
  alternatives_spanish:
  - hechos perfectos
  - llevados a la perfección
  - llevados a cumplimiento
  lexicon: BDAG
  rationale: «Perfeccionados» reproduce el estado resultante del participio perfecto pasivo y evita fijar de modo exclusivo la idea de impecabilidad moral. También conserva la tensión entre завершamiento y madurez/completitud.
- source_word: εἰς ἕν
  english_pob_choice: into one
  chosen_spanish: en uno
  alternatives_spanish:
  - en uno solo
  - hacia la unidad
  - como uno
  lexicon: BDAG
  rationale: Aunque la fuerza literal de εἰς es direccional, en español «en uno» comunica de forma natural el resultado de unión. «En uno solo» sería más explícito, pero podría sonar más interpretativo; «como uno» suaviza demasiado la imagen.
- source_word: γινώσκῃ
  english_pob_choice: may know
  chosen_spanish: conozca
  alternatives_spanish:
  - llegue a conocer
  - reconozca
  lexicon: BDAG
  rationale: En la subordinada final, el subjuntivo español «conozca» expresa bien el propósito sin añadir matices que no exige el griego. «Llegue a conocer» es posible, pero más explicativo.
- source_word: κόσμος
  english_pob_choice: the world
  chosen_spanish: el mundo
  alternatives_spanish:
  - la humanidad
  - la gente del mundo
  lexicon: BDAG
  rationale: Se conserva el término joánico técnico «el mundo» sin expandirlo interpretativamente. En este contexto mantiene la referencia amplia y literaria del texto.
- source_word: ἀπέστειλας
  english_pob_choice: sent
  chosen_spanish: enviaste
  alternatives_spanish:
  - mandaste
  - comisionaste
  lexicon: BDAG
  rationale: «Enviaste» es el equivalente más natural y estable en Juan para ἀποστέλλω. «Comisionaste» explicita demasiado la idea, y «mandaste» cambia el matiz relacional de misión.
- source_word: ἠγάπησας
  english_pob_choice: loved
  chosen_spanish: amaste
  alternatives_spanish:
  - amaste con amor
  - amaste profundamente
  lexicon: BDAG
  rationale: Se usa «amaste» para mantener la repetición del verbo amar en la cláusula comparativa. En español, «amar» corresponde mejor a ἀγαπάω en este registro teológico que «querer».
- source_word: καθὼς
  english_pob_choice: just as
  chosen_spanish: tal como
  alternatives_spanish:
  - así como
  - de la misma manera que
  lexicon: BDAG
  rationale: «Tal como» preserva la comparación directa y fuerte de καθὼς sin convertirla en una paráfrasis explicativa. «Así como» también sería válido, pero «tal como» suena más compacto en esta frase.
theological_decisions:
- issue: Fuerza de la comparación en «como me amaste a mí»
  english_pob_reading: 'Render the comparison directly without softening or qualifying it: ''just as you loved me.'''
  chosen_spanish_reading: «tal como me amaste a mí»
  alternative_spanish_readings:
  - «así como me amaste»
  - «de la misma manera que me amaste»
  rationale: La comparación debe conservar su peso teológico sin atenuarla ni explicarla. «Tal como» deja intacta la relación entre el amor del Padre por los discípulos y su amor por el Hijo, sin resolver la tensión doctrinal.
  doctrine_reference: Preservar la tensión teológica; primacía del texto original sobre la tradición interpretativa.
- issue: Sentido de τετελειωμένοι en contexto
  english_pob_reading: Express completion toward unity rather than absolute sinless perfection.
  chosen_spanish_reading: «sean perfeccionados en uno»
  alternative_spanish_readings:
  - «sean hechos perfectos en uno»
  - «sean llevados a cumplimiento en uno»
  rationale: «Perfeccionados» conserva el valor de resultado/completitud del participio sin imponer la idea de perfección moral absoluta. La frase «en uno» mantiene la orientación a la unidad como meta del proceso.
  doctrine_reference: Primacía del texto original; preservar la tensión teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: El control cruzado previo indicó alto acuerdo y no requirió cambios; esta versión mantiene la estructura y las decisiones léxicas del auditorio inglés, adaptándolas a un español natural sin perder la tensión entre perfección/completitud y unidad.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando aparece el nombre divino en el texto fuente; aquí no aplica.
  - 'Se conserva el paralelismo verbal: «enviaste» / «amaste».'
  - «Perfeccionados» se usa de forma consistente con la política de no reducir τελειόω a una perfección moral absoluta.
  - La nota al pie usa una sola marca y la ancla aparece exactamente en el término afectado.
