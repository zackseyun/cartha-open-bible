translation:
  language: es
  text: 'Jesús dijo estas cosas, y, alzando sus ojos al cielo, dijo: «Padre, ha llegado la hora; glorifica a tu Hijo, para que el Hijo te glorifique»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  lexicon: BDAG
  rationale: El plural neutro apunta de manera natural a lo que Jesús acaba de decir; «estas cosas» mantiene la referencia discursiva sin reducirla indebidamente a un singular abstracto.
- source_word: ἐλάλησεν
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  lexicon: BDAG
  rationale: Con introducción de cita directa, «dijo» es la forma natural en español y conserva el valor comunicativo del verbo sin añadir matices no presentes en el griego.
- source_word: ἐπάρας τοὺς ὀφθαλμοὺς αὐτοῦ
  english_pob_choice: lifting up his eyes
  chosen_spanish: alzando sus ojos
  alternatives_spanish:
  - levantando sus ojos
  - alzando la vista
  lexicon: BDAG
  rationale: El participio aoristo describe el gesto físico previo o concomitante; «alzando sus ojos» conserva la imagen corporal y suena natural en español bíblico contemporáneo.
- source_word: εἰς τὸν οὐρανόν
  english_pob_choice: to heaven
  chosen_spanish: al cielo
  alternatives_spanish:
  - hacia el cielo
  - al cielo
  lexicon: BDAG
  rationale: «Cielo» comunica la dirección hacia arriba en un español claro y reverente. Se evita «heaven» literal inglés y se mantiene el valor direccional de εἰς.
- source_word: Πάτερ
  english_pob_choice: Father
  chosen_spanish: Padre
  alternatives_spanish:
  - Padre mío
  lexicon: BDAG
  rationale: La vocativa es simple e íntima; «Padre» reproduce la dirección directa sin añadir posesivo no expresado.
- source_word: ἐλήλυθεν ἡ ὥρα
  english_pob_choice: the hour has come
  chosen_spanish: ha llegado la hora
  alternatives_spanish:
  - la hora ha venido
  - ha venido la hora
  lexicon: BDAG
  rationale: El perfecto subraya la llegada decisiva del momento señalado. En español, «ha llegado la hora» transmite con naturalidad la fuerza temática joánica de ὥρα.
- source_word: δόξασόν
  english_pob_choice: Glorify
  chosen_spanish: glorifica
  alternatives_spanish:
  - glorifica
  - honra
  lexicon: BDAG
  rationale: δοξάζω en Juan tiene peso revelatorio y de honor; «glorifica» es el equivalente español estándar más fiel y mantiene la terminología teológica del texto.
- source_word: σου τὸν υἱόν
  english_pob_choice: your Son
  chosen_spanish: a tu Hijo
  alternatives_spanish:
  - a tu hijo
  - a tu propio Hijo
  lexicon: BDAG
  rationale: El posesivo expresa relación directa con el Padre. Se conserva «Hijo» con mayúscula por su función titulativa cristológica en la oración.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: Introduce propósito. «Para que» es la construcción más natural en español y preserva el valor teleológico de la cláusula.
- source_word: ὁ υἱὸς
  english_pob_choice: the Son
  chosen_spanish: el Hijo
  alternatives_spanish:
  - tu Hijo
  - el hijo
  lexicon: BDAG
  rationale: El artículo vuelve explícito el sujeto titular. «El Hijo» mantiene la transición del objeto directo al sujeto de la finalidad, sin diluir el matiz cristológico.
- source_word: δοξάσῃ σέ
  english_pob_choice: may glorify you
  chosen_spanish: te glorifique
  alternatives_spanish:
  - pueda glorificarte
  - te dé gloria
  lexicon: BDAG
  rationale: El subjuntivo aoristo tras ἵνα expresa propósito. «Te glorifique» conserva el sentido y resulta idiomático en español sin redundar con el complemento directo.
theological_decisions:
- issue: Mutua glorificación entre el Padre y el Hijo
  english_pob_reading: Glorify your Son, so that the Son may glorify you
  chosen_spanish_reading: glorifica a tu Hijo, para que el Hijo te glorifique
  alternative_spanish_readings:
  - honra a tu Hijo, para que el Hijo te honre
  - glorifica a tu Hijo, para que tu Hijo te dé gloria
  rationale: Se conserva la reciprocidad fuerte del pasaje sin expandirlo interpretativamente. «Glorifica» mantiene el peso joánico de la revelación y el honor, y el español refleja la simetría entre Padre e Hijo que el griego presenta con claridad.
  doctrine_reference: Juan 17:1; afirmaciones cristológicas de la traducción
- issue: Título cristológico en contexto de oración
  english_pob_reading: Capitalized 'Son' in reference to Jesus.
  chosen_spanish_reading: Hijo con mayúscula
  alternative_spanish_readings:
  - hijo con minúscula
  rationale: En el contexto de la oración de Jesús, υἱός funciona como título cristológico. La mayúscula ayuda al lector español a percibir el uso titular sin alterar el contenido léxico.
  doctrine_reference: Affirmations; uso titular cristológico
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto griego de SBLGNT y armoniza con la decisión auditada en inglés de mantener la estructura: referencia retroactiva a «estas cosas», gesto corporal de levantar los ojos, llegada decisiva de «la hora», y la cláusula final de propósito con la relación recíproca de glorificación. No hay revisiones textuales señaladas en el expediente inglés; por eso no se introducen variantes ni notas textuales adicionales.'
  spanish_consistency_notes:
  - Se mantiene «glorifica» para δοξάζω en todo el versículo, evitando alternar con «honra» para no desestabilizar el campo semántico teológico.
  - Se usa «Hijo» con mayúscula por la función titulativa, coherente con el tratamiento cristológico del término en contextos directos de Jesús.
  - La puntuación española distribuye la cita de modo natural con dos puntos y comillas angulares opcionales evitadas por consistencia de estilo simple en un solo versículo.
  - «Alzando sus ojos al cielo» conserva el gesto sin volverlo excesivamente literal o arcaizante, y «ha llegado la hora» mantiene la expresión joánica tradicional en español con naturalidad actual.
