translation:
  language: es
  text: Créanme[a] que yo estoy en el Padre y el Padre en mí; pero si no, crean[b] por causa de las obras mismas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "Confíen en mí". El griego puede implicar tanto creerle a Jesús como confiar en él; aquí se mantiene "Créanme" para seguir de cerca el objeto personal explícito.'
    reason: lexical_alternative
  - marker: b
    text: 'O: "crean sobre la base de las obras mismas". El segundo "crean" no lleva objeto explícito en griego; la idea es que las obras mismas bastan como fundamento de fe.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πιστεύετέ
  english_pob_choice: Believe me
  chosen_spanish: Creanme
  alternatives_spanish:
  - Confíen en mí
  - Créanme
  lexicon: BDAG
  rationale: El imperativo de πιστεύω con dativo personal μοι admite en español tanto 'creerme' como 'confiar en mí'. Aquí 'creanme' preserva la apelación directa y el valor epistémico del verbo sin ampliar el sentido a una confianza más amplia que el contexto inmediato no exige.
- source_word: μοι
  english_pob_choice: me
  chosen_spanish: me
  alternatives_spanish:
  - lo que digo
  lexicon: BDAG
  rationale: El dativo depende de πιστεύετέ y se conserva con 'me'. Añadir 'lo que digo' sería interpretativo y debilitaría la estructura directa del griego.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  lexicon: BDAG
  rationale: Introduce el contenido de lo que debe creerse; por eso 'que' es la opción natural y fiel en español.
- source_word: ἐν τῷ πατρὶ ... ἐν ἐμοί
  english_pob_choice: in the Father ... in me
  chosen_spanish: yo estoy en el Padre y el Padre en mí
  alternatives_spanish:
  - yo estoy en unión con el Padre y el Padre en unión conmigo
  - yo soy uno con el Padre y el Padre uno conmigo
  lexicon: BDAG
  rationale: Se conserva el lenguaje relacional de 'en' sin reemplazarlo por una paráfrasis doctrinal. En español, para claridad sintáctica, se explicita 'estoy' en la primera cláusula; la segunda conserva la elipsis del griego con el mismo contenido de mutua inhabitación.
- source_word: εἰ δὲ μή
  english_pob_choice: but if not
  chosen_spanish: y si no
  alternatives_spanish:
  - pero si no
  - de lo contrario
  lexicon: BDAG
  rationale: La expresión introduce una alternativa o concesión. 'Y si no' mantiene la brevedad del griego y funciona bien en español; 'pero si no' también sería posible, pero añade una oposición más marcada.
- source_word: διὰ
  english_pob_choice: because of
  chosen_spanish: por causa de
  alternatives_spanish:
  - a causa de
  - debido a
  lexicon: BDAG
  rationale: Con acusativo, διά indica base o razón. 'Por causa de' reproduce bien esa relación causal en un español natural y publicado.
- source_word: τὰ ἔργα
  english_pob_choice: the works
  chosen_spanish: las obras
  alternatives_spanish:
  - los hechos
  - las obras
  lexicon: BDAG
  rationale: En Juan, ἔργα refiere a las obras/acciones reveladoras de Jesús. 'Obras' es la equivalencia más estable y transparente en español.
- source_word: αὐτὰ
  english_pob_choice: themselves
  chosen_spanish: mismas
  alternatives_spanish:
  - ellas mismas
  - solas
  lexicon: BDAG
  rationale: El intensivo αὐτά subraya que las obras bastan por sí mismas como testimonio. 'Mismas' conserva ese énfasis sin sobreinterpretar con 'solas'.
- source_word: πιστεύετε
  english_pob_choice: believe
  chosen_spanish: crean
  alternatives_spanish:
  - sigan creyendo
  - crean en ello
  lexicon: BDAG
  rationale: El imperativo presente puede tener fuerza continua, pero en español el imperativo simple es la forma más clara. Se mantiene sin objeto explícito en la segunda cláusula, como en el griego.
theological_decisions:
- issue: Mutua inhabitación del Padre y del Hijo
  english_pob_reading: Retain the literal relational language 'I am in the Father and the Father is in me.'
  chosen_spanish_reading: 'Conservar el lenguaje relacional literal: ''yo estoy en el Padre y el Padre en mí''.'
  alternative_spanish_readings:
  - soy uno con el Padre y el Padre es uno conmigo
  - estoy en unión con el Padre y el Padre en unión conmigo
  rationale: La frase expresa una unidad relacional profunda entre Jesús y el Padre. La traducción debe preservar esa literalidad y no sustituirla por una paráfrasis doctrinal, aunque el contenido sea plenamente compatible con la cristología nicena.
  doctrine_reference: Credo Niceno-Constantinopolitano (381); principio de fidelidad al lenguaje joánico
- issue: Base de la fe a partir de las obras
  english_pob_reading: Translate the second clause as belief on account of the works themselves.
  chosen_spanish_reading: 'Traducir la segunda cláusula como fe basada en las obras mismas: ''y si no, crean por causa de las obras mismas''.'
  alternative_spanish_readings:
  - y si no, crean porque las obras mismas lo muestran
  - y si no, crean por causa de estas obras
  rationale: El segundo imperativo no lleva objeto explícito en griego. En español, dejarlo igual preserva la concisión del original y expresa que las obras funcionan como fundamento suficiente de credibilidad.
  doctrine_reference: Fidelidad a la sintaxis del texto y a la función testimonial de las obras en Juan
translation_notes:
  revision_awareness: Se siguió el consenso alto del audit trail en cuanto a la estructura literal de la mutua inhabitación y al segundo imperativo sin objeto explícito. La principal adaptación al español fue explicitar 'estoy' para una sintaxis publicada natural, manteniendo intacto el contenido fuente y el énfasis intensivo de 'las obras mismas'.
  spanish_consistency_notes:
  - Se usa 'Padre' con mayúscula en referencia divina consistente con el corpus.
  - Se conserva 'obras' para ἔργα, en línea con la terminología joánica del proyecto.
  - Se mantiene la distinción entre el primer imperativo con objeto personal explícito y el segundo sin objeto explícito.
  - Se prefirió 'por causa de' para διά + acusativo por claridad y naturalidad sin perder el valor causal.
