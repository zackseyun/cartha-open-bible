translation:
  language: es
  text: Estas cosas les he hablado mientras seguía con ustedes[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mientras permanecía con ustedes» o «mientras estaba con ustedes». El griego usa el participio de μένω, un verbo recurrente en Juan con el sentido de permanecer.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  lexicon: BDAG
  rationale: El demostrativo plural neutro se conserva mejor como «estas cosas», porque mantiene el valor plural y el enlace con las enseñanzas previas de Jesús. «Esto» sería más natural en singular, pero perdería esa precisión.
- source_word: λελάληκα
  english_pob_choice: I have spoken
  chosen_spanish: les he hablado
  alternatives_spanish:
  - les hablé
  - les he dicho
  lexicon: BDAG
  rationale: El perfecto de λαλέω expresa una acción realizada con relevancia presente. En español, «les he hablado» preserva mejor ese valor que el pretérito simple. «Les he dicho» es posible, pero atenúa el matiz de hablar/proclamar.
- source_word: ὑμῖν
  english_pob_choice: to you
  chosen_spanish: les
  alternatives_spanish:
  - a ustedes
  - a vosotros
  lexicon: BDAG
  rationale: El dativo plural dirigido a los discípulos se expresa de modo natural en español con el pronombre indirecto «les». La explicitación «a ustedes» podría añadirse, pero no es necesaria en la frase principal.
- source_word: παρ’ ὑμῖν
  english_pob_choice: with you
  chosen_spanish: con ustedes
  alternatives_spanish:
  - entre ustedes
  - en su presencia
  - junto a ustedes
  lexicon: BDAG
  rationale: La preposición παρά con dativo aquí señala cercanía/presencia. «Con ustedes» comunica de forma natural la presencia de Jesús junto a los discípulos y evita una expresión demasiado rígida.
- source_word: μένων
  english_pob_choice: while staying
  chosen_spanish: mientras estaba
  alternatives_spanish:
  - mientras permanecía
  - mientras seguía con ustedes
  lexicon: BDAG
  rationale: El participio presente de μένω tiene peso temático en Juan, pero en español una construcción como «mientras permanecía» puede sonar más marcada. «Mientras estaba» es más natural y sigue reflejando la situación de presencia continua; la alternativa temática queda señalada en las notas.
theological_decisions:
- issue: Cómo traducir el lenguaje johánico de μένω sin borrar su peso temático
  english_pob_reading: while staying with you
  chosen_spanish_reading: mientras estaba con ustedes
  alternative_spanish_readings:
  - mientras permanecía con ustedes
  - mientras seguía con ustedes
  rationale: El texto aquí no exige introducir una terminología técnica, pero sí conviene no perder de vista el verbo μένω, recurrente en Juan. En español, «estaba con ustedes» comunica la presencia de Jesús de manera idiomática; la nota conserva la alternativa más literal «permanecía» para la huella léxica de μένω.
  doctrine_reference: 'Translation philosophy #5 (Consistency of key terms, or documented exception)'
translation_notes:
  revision_awareness: El texto inglés más reciente optó por «while staying with you» por naturalidad formal, aunque el audit trail conserva la alternativa «while remaining with you» para reflejar μένω. La presente versión española sigue esa preferencia de naturalidad con «mientras estaba con ustedes», sin perder la referencia al valor temático de μένω en la nota.
  spanish_consistency_notes:
  - Se conserva el plural de dirección con «les» y «ustedes», coherente con el destinatario colectivo.
  - Se evita «SEÑOR» para no introducir una convención de sustitución del nombre divino, irrelevante en este versículo.
  - No se usa «Cristo» ni otro término cristológico porque el versículo no lo contiene.
  - La puntuación y el orden responden al español actual sin añadir contenido interpretativo.
