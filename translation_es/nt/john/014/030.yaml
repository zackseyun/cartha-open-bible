translation:
  language: es
  text: Ya no hablaré mucho con ustedes, porque viene el gobernante del mundo[a]. Y en mí no tiene nada[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el gobernante de este mundo». Algunas versiones añaden «este» por paralelos joánicos, pero el griego aquí dice simplemente «del mundo».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no tiene derecho sobre mí» o «no tiene dominio sobre mí». El griego dice literalmente: «no tiene nada en mí».'
    reason: alternative_reading
lexical_decisions:
- source_word: οὐκέτι
  english_pob_choice: no longer
  chosen_spanish: ya no
  alternatives_spanish:
  - no hablaré más
  - ya no más
  lexicon: BDAG
  rationale: El adverbio temporal indica cese desde este punto; en español, "ya no" comunica con naturalidad la idea de interrupción futura sin endurecer el texto.
- source_word: πολλὰ
  english_pob_choice: much
  chosen_spanish: mucho
  alternatives_spanish:
  - muchas cosas
  - más
  lexicon: BDAG
  rationale: El neutro plural funciona adverbialmente con λαλήσω; en español conviene mantener el valor de cantidad/intensidad con "mucho", no como objetos contables.
- source_word: λαλήσω
  english_pob_choice: I will speak
  chosen_spanish: hablaré
  alternatives_spanish:
  - diré
  - me dirigiré
  lexicon: BDAG
  rationale: '"Hablaré" conserva el sentido verbal de la acción de comunicación y suena natural en español actual, sin perder la formalidad del contexto.'
- source_word: μεθ’ ὑμῶν
  english_pob_choice: with you
  chosen_spanish: con ustedes
  alternatives_spanish:
  - entre ustedes
  - con vosotros
  lexicon: BDAG
  rationale: La preposición expresa asociación y conversación directa con los discípulos; "con ustedes" es la forma neutral y ampliamente inteligible en español.
- source_word: ἔρχεται
  english_pob_choice: is coming
  chosen_spanish: viene
  alternatives_spanish:
  - está viniendo
  - se acerca
  lexicon: BDAG
  rationale: El presente con sentido futurista se puede expresar de modo natural con "viene" en español, manteniendo la inminencia sin sonar forzado.
- source_word: ὁ τοῦ κόσμου ἄρχων
  english_pob_choice: the ruler of the world
  chosen_spanish: el gobernante del mundo
  alternatives_spanish:
  - el ruler del mundo
  - el príncipe del mundo
  - el gobernante de este mundo
  lexicon: BDAG
  rationale: '"ἄρχων" se traduce de manera transparente como "gobernante". Se evita añadir "este" al texto principal, porque no está en el griego; la forma elegida conserva la referencia sin sobrerinterpretar.'
- source_word: κόσμου
  english_pob_choice: world
  chosen_spanish: mundo
  alternatives_spanish:
  - este mundo
  - orden del mundo
  lexicon: BDAG
  rationale: '"κόσμος" aquí se mantiene como "mundo", el equivalente estándar y suficientemente amplio en español.'
- source_word: ἐν ἐμοὶ
  english_pob_choice: in me
  chosen_spanish: en mí
  alternatives_spanish:
  - contra mí
  - sobre mí
  lexicon: BDAG
  rationale: La frase preposicional es breve e idiomática; "en mí" preserva la literalidad del griego y deja al contexto el sentido implícito.
- source_word: οὐκ ἔχει οὐδέν
  english_pob_choice: he has nothing
  chosen_spanish: no tiene nada
  alternatives_spanish:
  - no tiene ningún derecho sobre mí
  - no tiene nada contra mí
  - no tiene poder sobre mí
  lexicon: BDAG
  rationale: La traducción literal preserva la expresión compacta del griego. Las posibles implicaciones de derecho, base o dominio se conservan para una nota, en vez de fijarlas en el texto principal.
theological_decisions:
- issue: Identidad y fuerza de 'el gobernante del mundo'
  english_pob_reading: A reference to Satan, expressed by the translated title 'the ruler of the world' without importing the identification into the main text.
  chosen_spanish_reading: Una referencia al adversario espiritual, expresada por el título traducido 'el gobernante del mundo', sin introducir 'Satanás' en el texto principal.
  alternative_spanish_readings:
  - una personificación general del mal mundano
  - Satanás viene
  rationale: En el contexto joánico, el título alude al adversario de Jesús; sin embargo, el griego nombra el título, no el nombre. El texto español conserva esa tensión al traducir el título de forma directa y dejar la identificación implícita.
  doctrine_reference: Affirmations; Preserve theological tension rather than resolve it
- issue: Sentido de 'en mí no tiene nada'
  english_pob_reading: Retain the literal expression rather than interpretively specifying 'no claim on me' or 'no hold over me.'
  chosen_spanish_reading: Conservar la expresión literal 'en mí no tiene nada', en vez de explicitar 'no tiene derecho sobre mí' o 'no tiene dominio sobre mí'.
  alternative_spanish_readings:
  - no tiene derecho sobre mí
  - no tiene dominio sobre mí
  - no tiene poder sobre mí
  rationale: El griego es breve e idiomático. La versión literal preserva la afirmación teológica de que el gobernante que viene no encuentra en Jesús ningún punto de apoyo, reclamación ni pertenencia compartida, sin cerrar el alcance interpretativo.
  doctrine_reference: Translation philosophy 3
translation_notes:
  revision_awareness: El borrador sigue el acuerdo alto del contexto inglés y no requiere cambios respecto del último pase revisado; se mantiene la literalidad compacta del cierre griego y la ausencia de «este» en el título principal.
  spanish_consistency_notes:
  - Se mantiene «mundo» para κόσμος, sin añadir «este» al cuerpo principal.
  - Se conserva el título «gobernante» para ἄρχων, en línea con la opción inglesa de transparencia.
  - Se traduce la frase final de manera literal para preservar la tensión interpretativa documentada en la auditoría inglesa.
  - Se usa «ustedes» como forma neutral de plural en español latinoamericano.
  - Se evita sustituir la referencia del título por el nombre propio «Satanás» en el texto principal.
