translation:
  language: es
  text: 'Jesús le dijo[a]: «Yo soy el camino, y la verdad, y la vida. Nadie viene al Padre sino por mí[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Jesús le dice». El griego usa presente histórico.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Nadie viene al Padre si no es por mí».'
    reason: alternative_reading
lexical_decisions:
- source_word: λέγει
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - dice
  lexicon: BDAG
  rationale: 'El griego usa presente histórico, pero en español bíblico natural la narración fluye mejor con pretérito perfecto simple: «dijo». Se conserva el valor narrativo sin sonar forzado. La alternativa «dice» es posible, pero menos idiomática aquí.'
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El dativo de destinatario se expresa de forma natural en español con el pronombre indirecto «le». «A él» es posible, pero menos fluido en esta construcción.
- source_word: Ἐγώ εἰμι
  english_pob_choice: I am
  chosen_spanish: Yo soy
  alternatives_spanish:
  - Yo estoy
  lexicon: BDAG
  rationale: La fórmula enfática se conserva de manera directa con «Yo soy». El pronombre explícito mantiene el énfasis del griego; «Yo estoy» no corresponde al predicado nominal del verso.
- source_word: ἡ ὁδός
  english_pob_choice: the way
  chosen_spanish: el camino
  alternatives_spanish:
  - la vía
  - la senda
  lexicon: BDAG
  rationale: ὁδός puede significar camino, ruta o vía. «El camino» es la equivalencia más natural y fiel en español para este uso metafórico de acceso al Padre.
- source_word: ἡ ἀλήθεια
  english_pob_choice: the truth
  chosen_spanish: la verdad
  alternatives_spanish:
  - la realidad
  lexicon: BDAG
  rationale: ἀλήθεια se traduce de manera básica como «verdad». Aunque en Juan puede tener un alcance teológico amplio, «la verdad» preserva el sentido léxico sin explicitar más de lo que el texto dice.
- source_word: ἡ ζωή
  english_pob_choice: the life
  chosen_spanish: la vida
  alternatives_spanish:
  - la vida eterna
  lexicon: BDAG
  rationale: ζωή significa «vida»; en Juan lleva resonancias teológicas, pero aquí conviene mantener el término simple y dejar que el contexto cargue su sentido. «La vida eterna» interpretaría más allá de la forma griega.
- source_word: οὐδεὶς
  english_pob_choice: no one
  chosen_spanish: nadie
  alternatives_spanish:
  - ninguno
  lexicon: BDAG
  rationale: El pronombre indefinido negativo se expresa naturalmente como «nadie» en español. «Ninguno» suena menos preciso en esta construcción.
- source_word: ἔρχεται
  english_pob_choice: comes
  chosen_spanish: viene
  alternatives_spanish:
  - acude
  lexicon: BDAG
  rationale: El verbo de movimiento se puede traducir por «viene», que es idiomático y mantiene la idea general de acercarse al Padre. «Acude» sería más interpretativo y menos directo.
- source_word: πρὸς τὸν πατέρα
  english_pob_choice: to the Father
  chosen_spanish: al Padre
  alternatives_spanish:
  - hacia el Padre
  lexicon: BDAG
  rationale: πρός con acusativo indica movimiento hacia. En español, «al Padre» comunica esa dirección de forma natural; «hacia el Padre» es más literal, pero menos fluido.
- source_word: εἰ μὴ
  english_pob_choice: except
  chosen_spanish: sino
  alternatives_spanish:
  - excepto
  lexicon: BDAG
  rationale: 'La expresión exceptiva funciona idiomáticamente como «sino» en esta negación previa: «Nadie viene… sino por mí». «Excepto» es correcto, pero menos natural en español corriente.'
- source_word: δι’ ἐμοῦ
  english_pob_choice: through me
  chosen_spanish: por mí
  alternatives_spanish:
  - a través de mí
  - mediante mí
  lexicon: BDAG
  rationale: διά con genitivo denota medio o agencia. «Por mí» conserva esa mediación de forma breve y natural en español. «A través de mí» y «mediante mí» son más explícitas, pero menos idiomáticas aquí.
theological_decisions:
- issue: Exclusividad de acceso al Padre por medio de Jesús
  english_pob_reading: No one comes to the Father except through me.
  chosen_spanish_reading: Nadie viene al Padre sino por mí.
  alternative_spanish_readings:
  - Nadie viene al Padre excepto por mí.
  - Nadie viene al Padre sino mediante mí.
  rationale: El griego expresa una exclusividad clara y no debe suavizarse. «Sino por mí» conserva el sentido exclusivo y la mediación personal de Jesús sin perder naturalidad en español.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 6
- issue: Secuencia predicativa joánica con artículos repetidos
  english_pob_reading: I am the way, and the truth, and the life.
  chosen_spanish_reading: Yo soy el camino, y la verdad, y la vida.
  alternative_spanish_readings:
  - Yo soy el camino, la verdad y la vida.
  rationale: El griego repite el artículo en cada sustantivo, marcando cada predicado con relieve propio. Mantener la repetición con comas y la conjunción «y» preserva el peso retórico y la estructura triádica.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: 'El borrador corrige el problema de validación anterior: cada marcador de nota aparece ahora exactamente en el texto español, anclado en la palabra o frase correspondiente.'
  spanish_consistency_notes:
  - Se mantiene «Padre» con mayúscula por tratarse del título personal de Dios en este contexto.
  - Se prefiere «por mí» para preservar la mediación expresada por διά con genitivo sin introducir una perífrasis más pesada.
  - 'Se conserva la estructura triádica con artículos repetidos: «el camino, y la verdad, y la vida».'
