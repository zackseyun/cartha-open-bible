  spanish_quality_summary: 'El texto principal en español es claro, digno y muy legible: «Jesús le dijo… Yo soy el camino, y la verdad, y la vida. Nadie viene al Padre sino por mí». Suena natural en español eclesial amplio. La puntuación y el registro son adecuados. Solo conviene ajustar la nota [b] para mejorar naturalidad y correspondencia con el audit trail.'
