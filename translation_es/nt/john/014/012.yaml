  text: ἀμὴν ἀμὴν λέγω ὑμῖν, ὁ πιστεύων εἰς ἐμὲ τὰ ἔργα ἃ ἐγὼ ποιῶ κἀκεῖνος ποιήσει, καὶ μείζονα τούτων ποιήσει, ὅτι ἐγὼ πρὸς τὸν ⸀πατέρα πορεύομαι·
base_translation:
  language: en
  yaml_path: translation/nt/john/014/012.yaml
  text: Truly[a], truly, I say to you, the one who believes in me will also do the works that I do; and he will do greater works than these[b], because I am going to the Father.
  footnotes:
  - marker: a
    text: Or 'greater works than these.' The Greek can supply 'works' from the previous clause.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'the one who believes ... he' uses a grammatically masculine representative singular in Greek, referring generically to any believer.
    reason: cultural_note
