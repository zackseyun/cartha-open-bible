translation:
  language: es
  text: 'En verdad[a], en verdad les digo: el que cree en mí también hará las obras que yo hago; y hará obras[b] mayores que estas, porque yo voy al Padre.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Amén, amén». La fórmula griega puede conservarse como préstamo litúrgico, pero aquí se traduce para expresar de manera transparente su énfasis solemne.
    reason: lexical_alternative
  - marker: b
    text: La comparación griega puede entenderse implícitamente como «obras mayores que estas»; se explicita «obras» para reflejar el sustantivo subentendido del griego y hacer la frase completa en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀμὴν ἀμὴν
  english_pob_choice: Truly, truly
  chosen_spanish: De cierto, de cierto
  alternatives_spanish:
  - Amén, amén
  - Verdaderamente, verdaderamente
  lexicon: BDAG
  rationale: La fórmula duplicada se conserva como una intensificación solemne. «De cierto» es natural en español bíblico sin perder el peso enfático de ἀμήν; se evita mecanizar «Amén» en el discurso directo.
- source_word: ὁ πιστεύων εἰς ἐμέ
  english_pob_choice: the one who believes in me
  chosen_spanish: el que cree en mí
  alternatives_spanish:
  - el que confía en mí
  - quien cree en mí
  lexicon: BDAG
  rationale: El participio articular se vierte como sujeto representativo. «Cree en mí» es el equivalente más directo y idiomático para πιστεύω εἰς en este contexto joánico.
- source_word: τὰ ἔργα
  english_pob_choice: the works
  chosen_spanish: las obras
  alternatives_spanish:
  - los hechos
  - las acciones
  lexicon: BDAG
  rationale: «Obras» mantiene el vocabulario joánico y la referencia a las acciones/obras de Jesús, con un registro natural en español bíblico contemporáneo.
- source_word: ἃ ἐγὼ ποιῶ
  english_pob_choice: that I do
  chosen_spanish: que yo hago
  alternatives_spanish:
  - que estoy haciendo
  lexicon: BDAG
  rationale: El presente se traduce de manera simple y directa con «hago», sin cargarlo innecesariamente con aspecto progresivo en español.
- source_word: κἀκεῖνος
  english_pob_choice: will also
  chosen_spanish: también hará
  alternatives_spanish:
  - él también hará
  - hará asimismo
  lexicon: BDAG
  rationale: El compuesto añade énfasis de continuidad y coordinación; en español se expresa de forma natural con «también», manteniendo el sujeto representativo implícito en el contexto.
- source_word: ποιήσει
  english_pob_choice: will do
  chosen_spanish: hará
  alternatives_spanish:
  - realizará
  - obrará
  lexicon: BDAG
  rationale: Se mantiene consistencia verbal con ποιῶ y un futuro simple natural en español.
- source_word: καὶ μείζονα τούτων ποιήσει
  english_pob_choice: and he will do greater works than these
  chosen_spanish: y hará obras mayores que estas
  alternatives_spanish:
  - y hará cosas mayores que estas
  - y hará mayores que estas obras
  lexicon: BDAG
  rationale: En español conviene explicitar «obras» para que la comparación suene completa y fiel al antecedente inmediato. Se preserva la amplitud de μείζονα sin limitar el alcance de «mayores».
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - pues
  lexicon: BDAG
  rationale: Aquí introduce la razón de la afirmación anterior, por lo que «porque» comunica con claridad la fuerza causal.
- source_word: πρὸς τὸν πατέρα πορεύομαι
  english_pob_choice: I am going to the Father
  chosen_spanish: yo voy al Padre
  alternatives_spanish:
  - yo me voy al Padre
  - yo voy hacia el Padre
  lexicon: BDAG
  rationale: «Voy al Padre» reproduce con naturalidad la idea direccional de πρὸς y conserva el artículo del griego sin convertirlo en posesivo («mi Padre»), que el texto no dice.
theological_decisions:
- issue: Alcance de «obras mayores que estas»
  english_pob_reading: 'The text is left broad: the believer will do works greater than Jesus'' works in some sense, grounded in Jesus'' going to the Father.'
  chosen_spanish_reading: 'El texto queda abierto: el creyente hará obras mayores que las de Jesús en algún sentido, fundado en que Jesús va al Padre.'
  alternative_spanish_readings:
  - mayores en alcance por la misión posterior a la resurrección
  - mayores en significado redentor-histórico más que en poder
  - obras mayores por el ministerio de la iglesia en el Espíritu
  rationale: La frase no define el tipo exacto de «mayores». La traducción evita restringir el sentido con una explicación interpretativa, preservando la tensión teológica del pasaje.
  doctrine_reference: Preservar tensión teológica sin resolverla de antemano.
- issue: Sujeto representativo masculino en «el que cree... hará»
  english_pob_reading: the one who believes in me ... he
  chosen_spanish_reading: el que cree en mí ... hará
  alternative_spanish_readings:
  - quien cree en mí ... hará
  - la persona que cree en mí ... hará
  rationale: Aunque el griego usa un singular representativo masculino, en español «el que» comunica naturalmente el valor genérico sin forzar una neutralización artificial del texto.
  doctrine_reference: Mantener el referente genérico sin borrar la gramática del original.
translation_notes:
  revision_awareness: La versión inglesa más reciente añadió explícitamente 'works' en 'greater works than these' para reflejar el objeto implícito del griego. En español se siguió esa misma decisión, explicitando 'obras' en la cláusula comparativa.
  spanish_consistency_notes:
  - Se mantiene «Padre» con artículo definido, sin convertirlo en «mi Padre», porque el griego dice τὸν πατέρα.
  - Se usa «obras» de manera consistente en ambas cláusulas para reflejar τὰ ἔργα y la elipsis de μείζονα τούτων ποιήσει.
  - Se conserva un registro bíblico contemporáneo y sobrio, evitando arcaísmos innecesarios.
