translation:
  language: es
  text: 'Tomás le dijo: «Señor, no sabemos adónde vas. ¿Cómo podemos[a] saber[b] el camino?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¿Cómo somos capaces de saber el camino?»
    reason: lexical_alternative
  - marker: b
    text: 'El verbo griego para «saber» se usa dos veces en este versículo: en «no sabemos» y en «saber el camino».'
    reason: cross_reference
lexical_decisions:
- source_word: λέγει αὐτῷ Θωμᾶς
  english_pob_choice: Thomas said to him
  chosen_spanish: Tomás le dijo
  alternatives_spanish:
  - Tomás le dice
  lexicon: BDAG
  rationale: Se mantiene el nombre propio en forma española habitual, Tomás. El presente histórico del griego λέγει puede conservarse en español con presente, pero aquí el pretérito simple suena natural en narrativa y preserva el valor discursivo sin afectar el sentido.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  - Señor mío
  lexicon: BDAG
  rationale: Se conserva la vocación reverente de κύριε con «Señor», que en contexto joánico es la equivalencia española más directa y digna. «Maestro» rebajaría el matiz de reconocimiento discipular; «Señor mío» añade intensidad no exigida por el griego.
- source_word: οὐκ οἴδαμεν
  english_pob_choice: we do not know
  chosen_spanish: no sabemos
  alternatives_spanish:
  - no conocemos
  - no entendemos
  lexicon: BDAG
  rationale: οἶδα expresa conocimiento, no solo comprensión. «No sabemos» reproduce con naturalidad la afirmación de ignorancia cognitiva y evita interpretar más allá del griego.
- source_word: ποῦ ὑπάγεις
  english_pob_choice: where you are going
  chosen_spanish: adónde vas
  alternatives_spanish:
  - a dónde vas
  - dónde vas
  lexicon: BDAG
  rationale: ὑπάγω puede implicar irse o partir, pero el contexto inmediato pide una formulación neutral y natural. «Adónde vas» conserva la dirección del movimiento sin sobreexplicar la teología del destino de Jesús.
- source_word: πῶς
  english_pob_choice: How
  chosen_spanish: ¿Cómo
  alternatives_spanish:
  - ¿Cómo entonces?
  lexicon: BDAG
  rationale: La pregunta introduce la dificultad lógica de Tomás. «¿Cómo?» basta en español y no añade conectivos que no están en el griego.
- source_word: δυνάμεθα
  english_pob_choice: can we
  chosen_spanish: podemos
  alternatives_spanish:
  - somos capaces de
  lexicon: BDAG
  rationale: δύναμαι denota capacidad. En español, «podemos» comunica la fuerza modal de manera idiomática y directa.
- source_word: τὴν ὁδὸν
  english_pob_choice: the way
  chosen_spanish: el camino
  alternatives_spanish:
  - la senda
  - la ruta
  lexicon: BDAG
  rationale: ὁδός puede ser «camino», «ruta» o «senda». Aquí «el camino» es claro, natural y conserva la resonancia temática bíblica sin forzar una terminología más abstracta.
- source_word: εἰδέναι
  english_pob_choice: know
  chosen_spanish: saber
  alternatives_spanish:
  - conocer
  - conocer el camino
  lexicon: BDAG
  rationale: El infinitivo de οἶδα mantiene el campo semántico de conocimiento. En español, «saber» da el paralelismo más natural con «no sabemos» y reproduce la repetición del verbo de conocimiento que el inglés POB quiso resaltar.
theological_decisions:
- issue: Matiz de ὑπάγεις en el contexto joánico
  english_pob_reading: Rendered neutrally as 'where you are going'
  chosen_spanish_reading: adónde vas
  alternative_spanish_readings:
  - adónde te vas
  - adónde te diriges
  rationale: 'Se preserva la neutralidad del griego y del audit trail inglés: Tomás declara ignorancia del destino de Jesús, sin aclarar aún el trasfondo de partida/retorno al Padre. «Adónde vas» mantiene esa tensión narrativa.'
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Repetición del verbo de conocimiento en la pregunta final
  english_pob_reading: The Greek verb for “know” is used twice in this verse
  chosen_spanish_reading: no sabemos... saber
  alternative_spanish_readings:
  - no conocemos... conocer
  - no entendemos... entender
  rationale: Se preserva la repetición léxica del campo de conocimiento entre οἴδαμεν y εἰδέναι. El contraste «no sabemos... saber» hace visible en español la misma insistencia que el inglés POB anotó, sin suavizarla.
  doctrine_reference: Preserve lexical repetition where it carries rhetorical force.
translation_notes:
  revision_awareness: Esta versión sigue de cerca el griego SBLGNT y el audit trail inglés POB, manteniendo la tensión narrativa de ὑπάγεις y la repetición de οἶδα/εἰδέναι. No se introdujeron cambios de revisión posteriores en el expediente base.
  spanish_consistency_notes:
  - Se usa «Señor» para κύριε conforme al valor reverente y cristológico habitual en Juan.
  - Se usa «saber» de forma repetida para reflejar el paralelismo del griego con οἶδα / εἰδέναι.
  - Se evita «Cristo» porque el versículo no contiene Χριστός ni un título mesiánico explícito.
  - Se prefiere un español moderno y eclesialmente legible, sin calco rígido de la sintaxis griega.
