revisions:
- from: Y tú sabes el camino donde voy[a].
  to: Y ustedes saben el camino[a] adonde voy.
  rationale: Se corrige la segunda persona a plural para reflejar fielmente οἴδατε. Se mantiene «camino» para ὁδός. Se cambia «donde» por «adonde» porque en español la relación con «camino» y «voy» se entiende mejor como destino; esto mejora la naturalidad sin introducir una paráfrasis teológica. La nota textual se conserva y se ajusta al mismo tratamiento plural del texto principal.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:04:29Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja en general el sentido del griego: los discípulos conocen «el camino» en relación con el lugar adonde Jesús va, y conserva correctamente la variante textual en nota. Sin embargo, introduce un cambio de persona y número no presente en la fuente: οἴδατε es segunda persona plural («ustedes saben / vosotros sabéis»), no singular («tú sabes»).'
  spanish_quality_summary: «Y tú sabes el camino donde voy» suena poco natural en español neutro y además mezcla un sujeto singular con una forma verbal que en el original es plural. Una formulación plural como «Y ustedes saben el camino adonde voy» es más clara, fiel y eclesialmente legible. «Adonde» mejora la idiomaticidad con «camino» + destino, sin alterar el sentido básico.
  glossary_alignment: 'No hay términos del glosario mayor en disputa aquí. «Camino» para ὁδός está bien alineado. El problema principal es morfosintáctico: debe respetarse el plural de οἴδατε. También conviene ajustar la explicación lexical, pues el borrador dice que mantiene «yo» por énfasis, pero el texto español final no lo incluye.'
  issues:
  - severity: high
    issue: Cambio indebido de segunda persona plural a singular
    rationale: El griego οἴδατε es 2ª persona plural. «Tú sabes» altera el destinatario del discurso y no es una mera adaptación estilística.
  - severity: medium
    issue: «el camino donde voy» es poco idiomático en español
    rationale: Aunque intenta seguir de cerca el orden griego y la decisión inglesa final, en español «camino adonde voy» o «camino hacia donde voy» comunica mejor la relación de destino. «Donde» tras «camino» suena más locativo que direccional.
  - severity: low
    issue: Inconsistencia entre decisiones léxicas y texto final
    rationale: La decisión léxica para ἐγώ afirma que se mantiene «yo», pero el borrador no lo incluye. Esto no obliga a poner «yo» en el texto, pero sí muestra desajuste en la documentación.
  revised_spanish_text: Y ustedes saben el camino[a] adonde voy.
  revised_footnotes:
  - marker: a
    text: 'Algunos manuscritos leen: «Y ustedes saben dónde voy, y ustedes saben el camino».'
    reason: textual_variant
  revision_rationale: Se corrige la segunda persona a plural para reflejar fielmente οἴδατε. Se mantiene «camino» para ὁδός. Se cambia «donde» por «adonde» porque en español la relación con «camino» y «voy» se entiende mejor como destino; esto mejora la naturalidad sin introducir una paráfrasis teológica. La nota textual se conserva y se ajusta al mismo tratamiento plural del texto principal.
