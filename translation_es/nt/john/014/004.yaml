translation:
  language: es
  text: Y ustedes saben el camino[a] adonde voy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Algunos manuscritos leen: «Y ustedes saben dónde voy, y ustedes saben el camino».'
    reason: textual_variant
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Y también
  - Además
  lexicon: BDAG
  rationale: La conjunción simple καὶ se reproduce de forma natural con «Y», manteniendo la coordinación sin añadir énfasis no sustentado.
- source_word: ὅπου
  english_pob_choice: where
  chosen_spanish: donde
  alternatives_spanish:
  - adonde
  - en donde
  lexicon: BDAG
  rationale: ὅπου indica lugar relativo; «donde» es la opción más natural en español. Se evita «adonde» porque el griego no exige explícitamente la idea de movimiento con preposición en la superficie del texto.
- source_word: ἐγὼ
  english_pob_choice: I
  chosen_spanish: yo
  alternatives_spanish:
  - —
  lexicon: BDAG
  rationale: El pronombre explícito se mantiene con «yo» para reflejar el sujeto enfático presente en griego, aunque el español podría omitirlo.
- source_word: ὑπάγω
  english_pob_choice: am going
  chosen_spanish: voy
  alternatives_spanish:
  - estoy yendo
  - me voy
  - parto
  lexicon: BDAG
  rationale: El presente de movimiento ὑπάγω se traduce de modo natural con «voy». «Me voy» o «parto» introducirían matices de despedida más marcados que el texto base no obliga a expresar aquí.
- source_word: οἴδατε
  english_pob_choice: you know
  chosen_spanish: sabes
  alternatives_spanish:
  - sabéis
  - ustedes saben
  lexicon: BDAG
  rationale: El verbo οἶδα expresa conocimiento presente. Aquí se adopta una segunda persona singular de trato reverente/sola en español por fluidez devocional, sin alterar el valor semántico central de «saber». En un registro de plural explícito podría ser «sabéis» o «ustedes saben».
- source_word: τὴν ὁδόν
  english_pob_choice: the way
  chosen_spanish: el camino
  alternatives_spanish:
  - la vía
  - el sendero
  - el camino
  lexicon: BDAG
  rationale: ὁδός puede ser «camino», «ruta» o «vía». «Camino» es el equivalente español más claro y estable para este contexto y conserva la resonancia bíblica sin forzar una paráfrasis.
theological_decisions:
- issue: Relación entre «el camino» y «donde voy»
  english_pob_reading: And you know the way where I am going.
  chosen_spanish_reading: Y tú sabes el camino donde voy.
  alternative_spanish_readings:
  - Y tú sabes el camino adonde voy.
  - Y tú sabes dónde voy y el camino.
  rationale: El griego une el verbo de conocimiento con «el camino» respecto del lugar adonde Jesús va. En español, «el camino donde voy» mantiene la relación deíctica con la secuencia griega sin imponer de manera explícita una preposición de dirección que el texto no formula en la superficie. «Adonde voy» sería más idiomático, pero introduce una explicitación direccional que el audit trail inglés prefirió no añadir en la forma final.
  doctrine_reference: 'Translation philosophy: optimal-equivalence; preservar la tensión textual sin resolverla con ampliaciones innecesarias.'
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail inglés, que eliminó «to» para acercarse más a la construcción griega. Por eso la versión española evita añadir una preposición direccional explícita y conserva una relación más directa entre «el camino» y «donde voy».
  spanish_consistency_notes:
  - Se usa «camino» para ὁδός, manteniendo coherencia con el valor lexical básico y con el uso joánico cercano.
  - Se conserva el pronombre explícito «tú/yo» solo donde ayuda a reflejar el énfasis del griego y la naturalidad del español.
  - La nota textual se ancla en el final de la cláusula, porque el testimonio alternativo afecta a la estructura completa de la oración.
