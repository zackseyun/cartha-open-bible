    reason: alternative_reading
  - marker: c
    text: 'O: «y yo lo amaré y me revelaré a él».'
    reason: previous_rendering
  revision_rationale: Se conserva intacta la sustancia de la traducción principal, pero se corrigen las notas para alinearlas con el expediente inglés y con el valor de ἐμφανίσω. También se pule levemente el español de la oración principal para mejorar la naturalidad y ajustarse a la ortografía actual.
