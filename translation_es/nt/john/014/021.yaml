base_translation:
  language: en
  yaml_path: translation/nt/john/014/021.yaml
  text: The one who has my commandments and keeps them is the one who loves me[a]. And the one who loves me will be loved by my Father[c][b], and I will love him and reveal myself to him.
  footnotes:
  - marker: a
    text: Or 'The person who has my commandments and keeps them … I will love that person and reveal myself to that person.' The Greek uses masculine singular forms with representative force.
    reason: lexical_alternative
  - marker: b
    text: Or 'will show myself to him.' The Greek verb can mean to make oneself known or visible; here it likely emphasizes personal self-disclosure.
    reason: alternative_reading
  - marker: c
    text: Or 'and I will love him and will reveal myself to him'.
    reason: previous_rendering
