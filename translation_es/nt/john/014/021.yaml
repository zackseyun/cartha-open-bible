translation:
  language: es
  text: El que tiene mis mandamientos y los guarda es ese el que me ama[a]. Y el que me ama será amado por mi Padre[c], y yo lo amaré y me revelaré a él[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «La persona que tiene mis mandamientos y los guarda… yo amaré a esa persona y me revelaré a esa persona». El griego usa formas masculinas singulares con fuerza representativa.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «me mostraré a él». El verbo griego puede significar hacerse conocido o visible; aquí probablemente enfatiza la auto-revelación personal.'
    reason: alternative_reading
  - marker: c
    text: 'O: «y yo lo amaré y me revelaré a él».'
    reason: previous_rendering
lexical_decisions:
- source_word: ὁ ἔχων
  english_pob_choice: The one who has
  chosen_spanish: El que tiene
  alternatives_spanish:
  - Quien tiene
  - La persona que tiene
  lexicon: BDAG
  rationale: El participio con artículo funciona como sustantivo y señala a una persona representativa. «El que tiene» conserva esa estructura griega y su valor general sin volverlo una paráfrasis.
- source_word: τὰς ἐντολάς
  english_pob_choice: commandments
  chosen_spanish: mandamientos
  alternatives_spanish:
  - mandatos
  - mandamientos/órdenes
  lexicon: BDAG
  rationale: ἐντολή suele ser «mandamiento» o «mandato». «Mandamientos» preserva el peso autoritativo de las palabras de Jesús y es natural en español bíblico actual.
- source_word: τηρῶν
  english_pob_choice: keeps
  chosen_spanish: los guarda
  alternatives_spanish:
  - los observa
  - los cumple
  - los conserva
  lexicon: BDAG
  rationale: τηρέω en Juan tiene el sentido de guardar, observar o mantener fielmente. «Guardar» suena natural en español y conserva la idea de custodia obediente sin reducirla solo a cumplimiento externo.
- source_word: ἐκεῖνός ἐστιν ὁ ἀγαπῶν με
  english_pob_choice: is the one who loves me
  chosen_spanish: ése es el que me ama
  alternatives_spanish:
  - ese es el que me ama
  - ése es el que me ama
  lexicon: BDAG
  rationale: 'La construcción identificadora se mantiene con «ése es el que». El demostrativo añade énfasis: precisamente quien tiene y guarda los mandamientos es el que ama a Jesús.'
- source_word: ἀγαπῶν / ἀγαπηθήσεται / ἀγαπήσω
  english_pob_choice: loves / will be loved / will love
  chosen_spanish: ama / será amado / amaré
  alternatives_spanish:
  - quiere / será querido / querré
  lexicon: BDAG
  rationale: Se conserva la repetición del campo léxico de ἀγαπάω con «amar/amor», porque el verso articula esa relación de forma intencional y teológicamente cargada.
- source_word: ὁ δὲ ἀγαπῶν με
  english_pob_choice: And the one who loves me
  chosen_spanish: Y el que me ama
  alternatives_spanish:
  - Pero el que me ama
  - Ahora bien, el que me ama
  lexicon: BDAG
  rationale: δέ aquí enlaza el desarrollo del pensamiento más que oponerse. «Y» fluye con naturalidad en español y conserva la progresión del argumento.
- source_word: ἀγαπηθήσεται ὑπὸ τοῦ πατρός μου
  english_pob_choice: will be loved by my Father
  chosen_spanish: será amado por mi Padre
  alternatives_spanish:
  - será amado por el Padre mío
  - mi Padre lo amará
  lexicon: BDAG
  rationale: La pasiva futura expresa el amor del Padre hacia quien ama a Jesús. «Mi Padre» preserva el lenguaje filial central en Juan.
- source_word: κἀγὼ
  english_pob_choice: and I
  chosen_spanish: y yo
  alternatives_spanish:
  - yo también
  - y yo mismo
  lexicon: BDAG
  rationale: κἀγώ = καὶ ἐγώ. «Y yo» conserva la acción correspondiente de Jesús de manera simple y natural.
- source_word: ἐμφανίσω
  english_pob_choice: will reveal
  chosen_spanish: me revelaré
  alternatives_spanish:
  - me mostraré
  - me daré a conocer
  lexicon: BDAG
  rationale: ἐμφανίζω puede significar hacer visible, manifestar o dar a conocer. En este contexto de presencia relacional en Juan 14, «me revelaré» preserva la idea de autodescubrimiento personal sin reducirla a una mera aparición física.
- source_word: ἐμαυτόν
  english_pob_choice: myself
  chosen_spanish: me
  alternatives_spanish:
  - a mí mismo
  - a mi propia persona
  lexicon: BDAG
  rationale: El reflexivo enfatiza que es Jesús mismo quien se da a conocer. En español, «me revelaré» ya comunica esa auto-referencia con naturalidad.
- source_word: αὐτὸν / αὐτῷ
  english_pob_choice: him / to him
  chosen_spanish: lo / a él
  alternatives_spanish:
  - le / a él
  - a esa persona
  lexicon: BDAG
  rationale: Se mantiene el masculino singular gramatical de los pronombres como en el griego, respetando la forma representativa del pasaje. «A él» explicita el complemento indirecto sin borrar el referente masculino de la construcción.
theological_decisions:
- issue: Relación entre amor y obediencia
  english_pob_reading: Rendered the syntax so that keeping Jesus's commandments identifies the one who loves him, without adding causal or meritorious language.
  chosen_spanish_reading: La cláusula identifica al que ama a Jesús por el hecho de tener y guardar sus mandamientos, sin añadir lenguaje causal o meritorio.
  alternative_spanish_readings:
  - La obediencia prueba el amor
  - La obediencia merece el amor divino
  rationale: La frase griega presenta una relación de identificación, no una formulación explícita de mérito. La traducción conserva la cercanía entre amor y obediencia sin resolver la tensión teológica del texto.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla
- issue: Naturaleza de la auto-revelación de Jesús
  english_pob_reading: Translated ἐμφανίσω as 'will reveal myself to him' rather than a more physical 'show myself.'
  chosen_spanish_reading: «me revelaré» comunica una autodonación y autodescubrimiento personal, no solo una aparición visual.
  alternative_spanish_readings:
  - me mostraré
  - me apareceré
  rationale: El contexto de Juan 14 apunta a una presencia relacional y a una manifestación de Jesús, no necesariamente a una visión física. «Revelaré» mantiene el alcance semántico amplio.
  doctrine_reference: Primacía del original sobre una tradición interpretativa restrictiva
- issue: Masculino singular genérico/representativo
  english_pob_reading: Used 'him' in the main text with a footnote preserving the representative sense.
  chosen_spanish_reading: Se conserva el singular masculino gramatical en la traducción principal, con nota sobre su valor representativo.
  alternative_spanish_readings:
  - lo/lo mismo en plural
  - esa persona
  rationale: El griego usa participios y pronombres masculinos singulares de modo representativo. Mantenerlos evita borrar la forma del texto fuente, mientras la nota aclara el alcance general.
  doctrine_reference: Precisión gramatical antes que neutralización
translation_notes:
  revision_awareness: Se tuvo en cuenta la última revisión inglesa que eliminó un «will» redundante por estilo; en español se eligió una construcción natural («y me revelaré») sin alterar el sentido. También se respetó el consenso alto entre revisores y la preferencia por mantener la repetición léxica de ἀγαπάω con «amar».
  spanish_consistency_notes:
  - Se conservó el paralelismo léxico amar/amado/amaré para reflejar la repetición intencional del griego.
  - «Guardar» se emplea para τηρέω en sentido de observar fielmente, coherente con Juan.
  - «Revelaré» evita reducir ἐμφανίζω a mera visibilidad y mantiene la dimensión personal de la auto-manifestación.
  - Los pronombres masculinos singulares se preservan en la línea principal para respetar la gramática del original.
