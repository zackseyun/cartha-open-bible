    text: O «Ayudante», «Consejero» o «Consolador» para παράκλητος.
    reason: lexical_alternative
  revision_rationale: 'Se hace una reparación menor para alinear mejor el español con el aoristo griego εἶπον y con el texto POB auditado: «les dije» en lugar de «les he dicho». También se mejora la colocación visual del marcador de nota en «Abogado[a]». No se requieren cambios doctrinales ni terminológicos mayores.'
