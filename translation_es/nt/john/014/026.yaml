review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue en gran medida el griego y el rastro POB en puntos clave: παράκλητος con nota de alternativas, referencia personal al Espíritu con «a quien» y «él», «en mi nombre», «les enseñará», y «les recordará». Sin embargo, «todo lo que les he dicho» no refleja bien el aoristo εἶπον ni el inglés auditado «all that I said to you»; aquí conviene «todo lo que les dije» para mantener la referencia al dicho pasado sin introducir un matiz aspectual no señalado por la fuente.'
  spanish_quality_summary: El español es claro y digno, pero «el[a] Abogado» suena algo forzado por el artículo masculino antes del título; «el Abogado» es aceptable si se mantiene la nota. La frase general es natural y legible. El único ajuste necesario para fidelidad y fluidez es cambiar «he dicho» por «dije».
  glossary_alignment: 'Se alinea bien con la terminología del proyecto: «Espíritu Santo» para πνεῦμα τὸ ἅγιον, referencia personal al Espíritu, y conservación de alternativas para παράκλητος en nota. No hay conflicto con Yahvé/Mesías u otros términos del glosario. «Abogado» como equivalente de «Advocate» es defendible dentro del razonamiento documentado.'
  issues:
  - severity: medium
    issue: Tiempo verbal en «todo lo que les he dicho»
    rationale: El griego εἶπον es aoristo y el inglés POB auditado dice «all that I said to you». El perfecto español «he dicho» añade un matiz de vigencia/resultatividad no explicitado por la fuente. «Les dije» preserva mejor el valor narrativo simple.
  - severity: low
    issue: Artículo + nota en «el[a] Abogado»
    rationale: No es incorrecto, pero el anclaje de nota sobre el artículo puede sentirse extraño visualmente. Mantener la nota en la expresión es válido; si se conserva un solo marcador, conviene una colocación limpia como «el Abogado[a]».
  revised_spanish_text: Pero el Abogado[a], el Espíritu Santo, a quien el Padre enviará en mi nombre, él les enseñará todas las cosas y les recordará todo lo que les dije.
  revised_footnotes:
