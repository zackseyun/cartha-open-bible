translation:
  language: es
  text: Pero el Abogado[a], el Espíritu Santo, a quien el Padre enviará en mi nombre, él les enseñará todas las cosas y les recordará todo lo que les dije.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Ayudante», «Consejero» o «Consolador» para παράκλητος.
    reason: lexical_alternative
lexical_decisions:
- source_word: παράκλητος
  english_pob_choice: Advocate
  chosen_spanish: Abogado
  alternatives_spanish:
  - Ayudante
  - Consejero
  - Consolador
  lexicon: BDAG
  rationale: En español, «Abogado» preserva mejor el matiz de representante/intercesor activo que tiene παράκλητος, especialmente en un contexto de envío y misión. «Ayudante», «Consejero» y «Consolador» comunican aspectos reales del término, pero estrechan o desplazan su fuerza principal.
- source_word: τὸ πνεῦμα τὸ ἅγιον
  english_pob_choice: the Holy Spirit
  chosen_spanish: el Espíritu Santo
  alternatives_spanish:
  - el Espíritu Santo
  lexicon: BDAG
  rationale: Se mantiene la designación estable y clara en español para πνεῦμα τὸ ἅγιον. La mayúscula en «Espíritu Santo» refleja el referente personal y titular del pasaje.
- source_word: ὃ πέμψει ὁ πατὴρ
  english_pob_choice: whom the Father will send
  chosen_spanish: a quien el Padre enviará
  alternatives_spanish:
  - que el Padre enviará
  lexicon: BDAG
  rationale: Aunque en griego el relativo es neutro, el referente inmediato es personal. En español, «a quien» conserva la referencia personal y el sentido de envío sin hacerla impersonal.
- source_word: ἐν τῷ ὀνόματί μου
  english_pob_choice: in my name
  chosen_spanish: en mi nombre
  alternatives_spanish:
  - con mi autoridad
  - en representación mía
  lexicon: BDAG
  rationale: «En mi nombre» es la equivalencia natural y fiel del idiomatismo griego; deja abiertas las nociones de autoridad, representación y agencia sin sobreinterpretar una sola de ellas.
- source_word: ἐκεῖνος
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - ese
  - aquel
  lexicon: BDAG
  rationale: El demostrativo enfático refuerza la referencia personal al Paráclito. «Él» es la forma natural en español y mantiene la fuerza personal del texto.
- source_word: διδάξει
  english_pob_choice: will teach
  chosen_spanish: les enseñará
  alternatives_spanish:
  - les instruirá
  lexicon: BDAG
  rationale: «Enseñar» es el equivalente directo y más natural de διδάσκω en este contexto. Se antepone el clítico dativo «les» por claridad de destinatario.
- source_word: πάντα
  english_pob_choice: all things
  chosen_spanish: todas las cosas
  alternatives_spanish:
  - todo
  - todo ello
  lexicon: BDAG
  rationale: «Todas las cosas» sigue de cerca la amplitud del griego y conserva el alcance total de la promesa sin reducirla a un solo campo temático.
- source_word: ὑπομνήσει
  english_pob_choice: remind
  chosen_spanish: les recordará
  alternatives_spanish:
  - les hará recordar
  - les traerá a la memoria
  lexicon: BDAG
  rationale: «Recordará» expresa bien el valor causativo de ὑπομιμνῄσκω en español contemporáneo y suena natural en este contexto de memoria apostólica.
- source_word: πάντα ἃ εἶπον ὑμῖν
  english_pob_choice: all that I said to you
  chosen_spanish: todo lo que les he dicho
  alternatives_spanish:
  - todas las cosas que les dije
  - todo cuanto les he dicho
  lexicon: BDAG
  rationale: La relativa se vierte con naturalidad en español sin perder el alcance total. El perfecto «he dicho» conserva la vigencia de las palabras de Jesús para los discípulos.
theological_decisions:
- issue: Referencia personal del Espíritu Santo
  english_pob_reading: Use personal reference ('whom,' 'he') for the Spirit
  chosen_spanish_reading: Usar referencia personal («a quien», «él») para el Espíritu
  alternative_spanish_readings:
  - Usar referencia impersonal («que», «lo», «eso») por el neutro griego
  rationale: El versículo combina πνεῦμα neutro con παράκλητος masculino y con ἐκεῖνος enfático, lo que apunta a una referencia personal. El español debe reflejar esa personalización del agente, no neutralizarla.
  doctrine_reference: Credo Niceno-Constantinopolitano; filosofía de traducción del POB sobre precisión sintáctica y teológica
- issue: Cómo renderizar παράκλητος
  english_pob_reading: Advocate
  chosen_spanish_reading: Abogado
  alternative_spanish_readings:
  - Ayudante
  - Consejero
  - Consolador
  rationale: No hay una sola palabra española que cubra todo el campo semántico de παράκλητος. «Abogado» preserva con más fuerza la idea de intervención representativa y apoyo activo, que es la más distintiva en el contexto.
  doctrine_reference: Filología léxica de BDAG; principio POB de no aplanar tensiones semánticas
translation_notes:
  revision_awareness: El pasaje muestra alta concordancia con la auditoría inglesa y no requiere revisiones textuales. Se mantuvo la decisión de traducir παράκλητος con una opción que preserve su fuerza representativa, y se conservó la referencia personal del Espíritu mediante sintaxis española natural.
  spanish_consistency_notes:
  - Se usó «Espíritu Santo» con mayúsculas por consistencia titular.
  - Se prefirió «les» en ambos complementos para marcar a los discípulos como destinatarios claros.
  - Se mantuvo «en mi nombre» como idiomatismo bíblico ya establecido en español.
  - Se evitó «SEÑOR» u otras sustituciones no presentes en el texto base.
