- from: Pero el[a] Abogado, el Espíritu Santo, a quien el Padre enviará en mi nombre, él les enseñará todas las cosas y les recordará todo lo que les he dicho.
  to: Pero el Abogado[a], el Espíritu Santo, a quien el Padre enviará en mi nombre, él les enseñará todas las cosas y les recordará todo lo que les dije.
  rationale: 'Se hace una reparación menor para alinear mejor el español con el aoristo griego εἶπον y con el texto POB auditado: «les dije» en lugar de «les he dicho». También se mejora la colocación visual del marcador de nota en «Abogado[a]». No se requieren cambios doctrinales ni terminológicos mayores.'
