translation:
  language: es
  text: Aquel día[a] ustedes sabrán que yo estoy en mi Padre, y ustedes en mí[b], y yo en ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, menos idiomáticamente, «En aquel día».
    reason: lexical_alternative
  - marker: b
    text: Se conserva literalmente el lenguaje repetido de «en» para reflejar el tema joánico de la mutua inhabitación; alternativamente, podría parafrasearse como «en unión con», pero eso sería más interpretativo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ἐκείνῃ τῇ ἡμέρᾳ
  english_pob_choice: On that day
  chosen_spanish: En aquel día
  alternatives_spanish:
  - En ese día
  - En aquel tiempo
  lexicon: BDAG
  rationale: La frase es temporal y señala un momento específico. «En aquel día» conserva la deixis de ἐκείνῃ y suena natural en español bíblico moderno, sin volverla más interpretativa de lo necesario.
- source_word: γνώσεσθε
  english_pob_choice: you will know
  chosen_spanish: sabrán
  alternatives_spanish:
  - conocerán
  - llegarán a saber
  lexicon: BDAG
  rationale: El futuro de γινώσκω expresa una certeza futura de conocimiento o reconocimiento. «Sabrán» es natural en español y mantiene el valor de conocimiento futuro sin enfatizar indebidamente el proceso.
- source_word: ὑμεῖς
  english_pob_choice: you
  chosen_spanish: ustedes
  alternatives_spanish:
  - vosotros
  - ustedes mismos
  lexicon: BDAG
  rationale: El pronombre explícito añade énfasis. En español, «ustedes» conserva la referencia directa; el énfasis puede mantenerse por la estructura y el contexto sin forzar un reflexivo.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  lexicon: BDAG
  rationale: Introduce el contenido de lo que sabrán, no una causa. «Que» es la equivalencia natural en español.
- source_word: ἐγὼ ἐν τῷ πατρί μου
  english_pob_choice: I am in my Father
  chosen_spanish: yo estoy en mi Padre
  alternatives_spanish:
  - yo estoy en unión con mi Padre
  lexicon: BDAG
  rationale: Se preserva la construcción repetida con «en», central en el lenguaje joánico de mutua morada. «Estoy en mi Padre» mantiene la fuerza metafórica sin resolverla con una paráfrasis explicativa.
- source_word: πατρί μου
  english_pob_choice: my Father
  chosen_spanish: mi Padre
  alternatives_spanish:
  - el Padre mío
  lexicon: BDAG
  rationale: «Mi Padre» es la forma idiomática y clara en español, preservando la relación filial central en el pasaje.
- source_word: καὶ ὑμεῖς ἐν ἐμοὶ
  english_pob_choice: and you are in me
  chosen_spanish: y ustedes en mí
  alternatives_spanish:
  - y ustedes están en mí
  - y ustedes en unión conmigo
  lexicon: BDAG
  rationale: El verbo ser/estar debe suplirse en español. Se evita añadir «están» para no cargar demasiado la frase, pero podría leerse implícitamente. La repetición de «en» se conserva para reflejar el paralelismo y la tensión teológica.
- source_word: κἀγὼ ἐν ὑμῖν
  english_pob_choice: and I am in you
  chosen_spanish: y yo en ustedes
  alternatives_spanish:
  - y yo estoy en ustedes
  - y yo en unión con ustedes
  lexicon: BDAG
  rationale: Como en la cláusula anterior, el verbo se sobreentiende en español. Se mantiene el mismo patrón de «en» para conservar la reciprocidad del lenguaje joánico sin interpretarlo demasiado pronto.
theological_decisions:
- issue: Lenguaje joánico de mutua inhabitación (ἐν ... ἐν ... ἐν)
  english_pob_reading: 'Preserve the repeated preposition ''in'' throughout: ''I am in my Father, and you are in me, and I am in you.'''
  chosen_spanish_reading: 'Preservar la repetición de «en» a lo largo de la frase: «yo estoy en mi Padre, y ustedes en mí, y yo en ustedes».'
  alternative_spanish_readings:
  - «yo estoy unido a mi Padre, y ustedes unidos a mí, y yo unido a ustedes»
  - «yo estoy en unión con mi Padre, y ustedes en unión conmigo, y yo en unión con ustedes»
  rationale: La secuencia ἐν ... ἐν ... ἐν expresa una realidad relacional y teológica densa. Mantener «en» evita reducir el sentido a una sola explicación (por ejemplo, unión meramente relacional) y preserva la tensión del texto original.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §3, preservar la tensión teológica en vez de resolverla.'
- issue: Relación de Jesús con el Padre
  english_pob_reading: Translate straightforwardly as 'I am in my Father' without expanding or narrowing the claim.
  chosen_spanish_reading: 'Traducir sin ampliar ni reducir: «yo estoy en mi Padre».'
  alternative_spanish_readings:
  - «yo y mi Padre somos uno en esencia»
  - «yo estoy con mi Padre»
  rationale: La traducción no debe importar formulaciones doctrinales posteriores ni debilitar la afirmación del texto. «Estoy en mi Padre» conserva la fuerza cristológica del pasaje con disciplina textual.
  doctrine_reference: 'DOCTRINE.md: afirmaciones nicenas y principio de no importar formulaciones doctrinales que el versículo no dice.'
translation_notes:
  revision_awareness: 'La revisión más reciente indicó que no se requerían cambios y que el acuerdo con el control cruzado fue alto (1.0). Esta versión española sigue de cerca el mismo perfil: conserva el tiempo futuro de conocimiento, el encadenamiento de ''en'', y evita paráfrasis explicativas.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» cuando corresponda en otros contextos, pero este versículo no lo contiene.
  - Se usa «Padre» con mayúscula para la referencia relacional a Dios, conforme al uso reverente y al contexto joánico.
  - Se conserva la repetición de «en» porque es el rasgo teológico más distintivo del verso y evita resolver prematuramente la imagen.
