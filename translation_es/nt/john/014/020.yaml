  to: Aquel día[a] ustedes sabrán que yo estoy en mi Padre, y ustedes en mí[b], y yo en ustedes.
  rationale: Se corrige la frase temporal principal a «Aquel día» para reflejar una formulación española más idiomática, en paralelo con la decisión inglesa «On that day», y para que la nota [a] vuelva a funcionar como alternativa menos idiomática. Se mantiene intacta la triple repetición de «en» y la estructura elíptica de las dos últimas cláusulas, porque preservan bien el lenguaje joánico de inhabitación mutua sin sobreinterpretarlo.
