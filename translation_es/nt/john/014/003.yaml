translation:
  language: es
  text: Y si voy y les preparo un lugar[a], vengo de nuevo y los llevaré conmigo, para que donde yo estoy[b], ustedes también estén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «vendré de nuevo». El griego usa un verbo en presente («vengo»), con sentido futuro.'
    reason: lexical_alternative
  - marker: b
    text: Las interpretaciones difieren sobre si «vengo de nuevo» se refiere específicamente a las apariciones de Jesús después de la resurrección, a la venida del Espíritu, a su retorno final, o a una promesa que abarca más de una de estas referencias.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐὰν πορευθῶ
  english_pob_choice: if I go
  chosen_spanish: si voy
  alternatives_spanish:
  - si parto
  - si me voy
  lexicon: BDAG
  rationale: El aoristo subjuntivo con ἐάν expresa una contingencia futura; en español, «si voy» comunica de forma directa la partida de Jesús sin añadir la interpretación de «partir» o «irme», que sería más explicativa.
- source_word: ἑτοιμάσω τόπον ὑμῖν
  english_pob_choice: prepare a place for you
  chosen_spanish: les preparo un lugar
  alternatives_spanish:
  - les preparo un sitio
  - les hago listo un lugar
  lexicon: BDAG
  rationale: ἑτοιμάζω significa «preparar, dejar listo» y τόπος es «lugar». «Les preparo un lugar» conserva la sencillez del griego y el valor relacional de la promesa sin expandir el contenido de ese lugar.
- source_word: πάλιν ἔρχομαι
  english_pob_choice: I am coming again
  chosen_spanish: vengo de nuevo
  alternatives_spanish:
  - vuelvo a venir
  - vendré de nuevo
  lexicon: BDAG
  rationale: El presente ἔρχομαι puede tener sentido futuro. «Vengo de nuevo» preserva la forma verbal presente con sentido prospectivo, como hace la POB en inglés, mientras sigue siendo natural en español.
- source_word: παραλήμψομαι ὑμᾶς πρὸς ἐμαυτόν
  english_pob_choice: will take you to myself
  chosen_spanish: los tomaré conmigo
  alternatives_spanish:
  - los recibiré para mí
  - los llevaré a mí
  lexicon: BDAG
  rationale: παραλαμβάνω aquí comunica tomar a alguien consigo o a su propia presencia. «Los tomaré conmigo» mantiene ese matiz relacional y evita que «recibiré» suene demasiado abstracto o que «llevaré» introduzca un movimiento no explicitado.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - de modo que
  - a fin de que
  lexicon: BDAG
  rationale: ἵνα introduce propósito. «Para que» es la forma española más directa y natural para preservar ese valor final.
- source_word: ὅπου εἰμὶ ἐγὼ
  english_pob_choice: where I am
  chosen_spanish: donde yo estoy
  alternatives_spanish:
  - donde estoy yo
  - donde yo me encuentro
  lexicon: BDAG
  rationale: La construcción griega dice literalmente «donde estoy yo» con énfasis en ἐγώ. En español, «donde yo estoy» conserva esa enfática posición del pronombre sin sonar forzado.
- source_word: καὶ ὑμεῖς ἦτε
  english_pob_choice: you also may be
  chosen_spanish: ustedes también estén
  alternatives_spanish:
  - ustedes también puedan estar
  - ustedes también estarán
  lexicon: BDAG
  rationale: Después de ἵνα, el subjuntivo ἦτε expresa finalidad. «Ustedes también estén» conserva el valor modal final en español; «estarán» convertiría la cláusula en simple futuro y «puedan estar» añade una posibilidad no explícita.
theological_decisions:
- issue: Naturaleza de la promesa de «vengo de nuevo»
  english_pob_reading: Rendered as a future-oriented promise, 'I am coming again,' without specifying the precise mode or timing of the return.
  chosen_spanish_reading: 'Se traduce como una promesa futura abierta: «vengo de nuevo», sin fijar el modo o el momento exactos de esa venida.'
  alternative_spanish_readings:
  - vendré de nuevo
  - vuelvo a venir
  - regresaré
  rationale: La cláusula admite varias referencias posibles en la discusión interpretativa, y la traducción debe preservar esa tensión sin resolverla de antemano. La formulación elegida mantiene la promesa de presencia renovada sin imponer una sola lectura escatológica o pneumatológica.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: Se mantuvo la decisión de la POB inglesa de conservar el presente griego con valor futuro en «vengo de nuevo», y se preservó la apertura interpretativa sobre el alcance de esa venida. No se introdujeron cambios de sentido respecto del audit trail inglés.
  spanish_consistency_notes:
  - Se usó «ustedes» de forma uniforme para el plural de segunda persona.
  - Se evitó «SEÑOR» y otras convenciones de sustitución no presentes en este versículo.
  - Se mantuvo un registro sobrio y eclesialmente legible, sin ampliar el contenido de «un lugar».
