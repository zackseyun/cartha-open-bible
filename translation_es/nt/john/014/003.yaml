    text: Or, 'I will come again.' The Greek uses a present-form verb ('I am coming') with future sense.
    reason: lexical_alternative
  - marker: b
    text: Interpretations differ on whether 'I am coming again' refers specifically to Jesus' final return, his resurrection appearances, the coming of the Spirit, or a layered promise encompassing more than one of these.
    reason: alternative_reading
