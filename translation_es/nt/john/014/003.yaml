revisions:
- from: Y si voy y les preparo un lugar[a], vengo de nuevo y los tomaré conmigo, para que donde yo estoy[b], ustedes también estén.
  to: Y si voy y les preparo un lugar[a], vengo de nuevo y los llevaré conmigo, para que donde yo estoy[b], ustedes también estén.
  rationale: Se hace una reparación menor para expresar mejor el sentido de παραλήμψομαι ὑμᾶς πρὸς ἐμαυτόν mediante «los llevaré conmigo», que en español suena más natural y mantiene mejor la idea de llevarlos a la propia presencia de Jesús. También se precisa la nota interpretativa para reflejar exactamente la alternativa documentada en la auditoría inglesa.
