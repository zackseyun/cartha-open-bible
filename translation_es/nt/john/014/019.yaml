translation:
  language: es
  text: Dentro de poco[a], el mundo ya no me verá, pero ustedes me verán. Porque yo vivo[b], ustedes también vivirán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Todavía un poco»; también puede entenderse «verme» como «observar» o «contemplar» en ambas instancias, ya que el verbo griego puede implicar más que una simple mirada.
    reason: lexical_alternative
  - marker: b
    text: «Ustedes también vivirán» puede referirse a la participación de los discípulos en la vida resucitada de Jesús, a la vida espiritual en unión con él, o a ambas cosas.
    reason: alternative_reading
lexical_decisions:
- source_word: ἔτι μικρὸν
  english_pob_choice: A little while longer
  chosen_spanish: Un poco más de tiempo
  alternatives_spanish:
  - Todavía un poco más
  - Un poco más todavía
  lexicon: BDAG
  rationale: La expresión griega es idiomática y marca un lapso breve que aún falta. En español, "un poco más de tiempo" comunica con naturalidad esa idea temporal sin endurecer el ritmo ni perder el sentido de inminencia.
- source_word: ὁ κόσμος
  english_pob_choice: the world
  chosen_spanish: el mundo
  alternatives_spanish:
  - el sistema del mundo
  - la gente del mundo
  lexicon: BDAG
  rationale: En Juan, κόσμος suele conservar su valor característico sin explicitarlo en exceso. "El mundo" mantiene el término joánico estándar y deja abierta su carga teológica.
- source_word: θεωρεῖ / θεωρεῖτέ
  english_pob_choice: will no longer see / will see
  chosen_spanish: ya no me verá / me verán
  alternatives_spanish:
  - ya no me observará / me observarán
  - ya no me contemplará / me contemplarán
  lexicon: BDAG
  rationale: El verbo puede implicar más que una mirada casual, pero aquí el español más natural es "ver". La traducción conserva esa amplitud sin resolverla a una sola matización interpretativa.
- source_word: οὐκέτι
  english_pob_choice: no longer
  chosen_spanish: ya no
  alternatives_spanish:
  - no volverá a
  - no más
  lexicon: BDAG
  rationale: '"Ya no" expresa bien la cesación de una acción desde un punto próximo en el tiempo y suena más natural en español bíblico contemporáneo.'
- source_word: ὑμεῖς δὲ
  english_pob_choice: but you
  chosen_spanish: pero ustedes
  alternatives_spanish:
  - pero vosotros
  - en cambio, ustedes
  lexicon: BDAG
  rationale: La partícula δέ introduce contraste. "Pero" lo marca con claridad, y "ustedes" mantiene un español amplio y actual de registro eclesial.
- source_word: ὅτι
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Aquí ὅτι expresa fundamento causal. "Porque" lo hace explícito en español sin añadir interpretación innecesaria.
- source_word: ἐγὼ ζῶ
  english_pob_choice: I live
  chosen_spanish: yo vivo
  alternatives_spanish:
  - yo estoy vivo
  - yo vivo para siempre
  lexicon: BDAG
  rationale: '"Vivo" conserva el presente del griego y deja intacta la fuerza teológica del verbo, sin precisar si la referencia apunta a vida resucitada, vida eterna o ambas.'
- source_word: ζήσετε
  english_pob_choice: you also will live
  chosen_spanish: ustedes también vivirán
  alternatives_spanish:
  - ustedes también tendrán vida
  - ustedes también volverán a vivir
  lexicon: BDAG
  rationale: El futuro de ζάω admite una amplitud teológica que conviene preservar. "Vivirán" mantiene esa amplitud y refleja la relación entre la vida de Jesús y la de los discípulos.
theological_decisions:
- issue: Sentido de "verán" respecto de Jesús
  english_pob_reading: Render as simple 'see' without specifying whether this refers to resurrection appearances, spiritual perception through faith, or eschatological life.
  chosen_spanish_reading: Traducir con "verán" sin cerrar si se trata de apariciones posresurrección, percepción espiritual por la fe o una referencia con alcance escatológico.
  alternative_spanish_readings:
  - lo contemplarán físicamente después de la resurrección
  - lo percibirán espiritualmente por la fe
  - lo verán tanto ahora como en el cumplimiento final
  rationale: El griego permite más de una resonancia en Juan. La traducción debe conservar esa tensión teológica en vez de resolverla.
  doctrine_reference: Preservar la tensión teológica del texto.
- issue: Sentido de "ustedes también vivirán"
  english_pob_reading: Translate broadly as 'you also will live' without narrowing it to physical survival, resurrection only, or spiritual life only.
  chosen_spanish_reading: Traducir ampliamente como "ustedes también vivirán" sin restringirlo a supervivencia física, solo resurrección o solo vida espiritual.
  alternative_spanish_readings:
  - ustedes también tendrán vida resucitada
  - ustedes también vivirán espiritualmente
  - ustedes también participarán de la vida eterna en unión con Jesús
  rationale: El futuro de ζάω puede abarcar participación presente en la vida y vida resucitada futura. Una formulación amplia preserva ese alcance.
  doctrine_reference: Preservar la tensión teológica del texto.
translation_notes:
  revision_awareness: La revisión más reciente no requirió cambios; el pasaje mantiene alta concordancia con la evaluación auditada y no hubo correcciones aplicadas.
  spanish_consistency_notes:
  - Se conservó "el mundo" para κόσμος y no se amplificó a una glosa explicativa en el texto principal.
  - Se eligió "ver" en ambos miembros para reproducir la misma base léxica del griego y dejar abierta la amplitud semántica documentada.
  - Se usó "ustedes" de manera consistente para el plural de segunda persona, en registro neutral latinoamericano.
  - Se mantuvo la relación causal con "Porque" para ὅτι, coherente con el audit trail en inglés.
  - No se reemplazó el valor teológico amplio de ζήσετε por una lectura restringida de resurrección o de vida meramente espiritual.
