    text: Or 'behold/observe me' for both instances of 'see'; the Greek verb can imply more than a mere glance.
    reason: lexical_alternative
  - marker: b
    text: '''You also will live'' may refer to the disciples'' share in Jesus'' resurrection life, spiritual life in union with him, or both.'
    reason: alternative_reading
