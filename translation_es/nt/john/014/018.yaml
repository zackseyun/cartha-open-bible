review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la primera cláusula: Οὐκ ἀφήσω ὑμᾶς ὀρφανούς se comunica fielmente con «No los dejaré huérfanos». Sin embargo, la segunda cláusula ἔρχομαι πρὸς ὑμᾶς está en presente con fuerza de inminencia/vividez, y el inglés POB preserva esa inmediatez con «I am coming to you». El español «vendré a ustedes» desplaza innecesariamente el matiz al futuro simple. La ambigüedad teológica del referente sí está bien conservada en la nota.'
  spanish_quality_summary: '«No los dejaré huérfanos» es claro, natural y digno. Para la segunda cláusula, «vengo a ustedes» suena algo menos idiomático en algunos registros, pero preserva mejor la forma y fuerza del griego que «vendré». Puede mantenerse «a ustedes» en español neutro eclesial; no hace falta una paráfrasis mayor. La nota [a] del borrador no funciona como verdadera alternativa porque repite la lectura principal; conviene ofrecer la alternativa real «huérfanos / huérfanos» no cambia, así que la nota debe reflejar la opción documentada equivalente a «huérfanos / huérfanos» en estructura: «O: “No los dejaré huérfanos”» no añade información. Debe recoger la alternativa española correspondiente a «No los dejaré desamparados / huérfanos» o mejor «O: “No los dejaré huérfanos”, es decir, como niños sin cuidado parental»? Aun así, como el inglés preserva una alternativa formal, en español la alternativa más fiel es «O: “No los dejaré como huérfanos”» si el texto principal queda sin
    «como», o viceversa.'
  glossary_alignment: 'No hay términos del glosario mayor en juego. «Huérfanos» alinea bien con ὀρφανούς. La principal desviación está en ἔρχομαι: el proyecto en inglés documentó la preferencia por conservar el presente («I am coming»), por lo que en español conviene «vengo» en vez de «vendré».'
  issues:
  - severity: medium
    issue: «vendré a ustedes» no preserva el presente griego ἔρχομαι
    rationale: Aunque el futuro suena natural en español, el inglés POB documenta que el presente debe mantenerse por su fuerza de inminencia/vividez. «Vengo a ustedes» conserva mejor ese matiz sin resolver la ambigüedad teológica.
  - severity: medium
