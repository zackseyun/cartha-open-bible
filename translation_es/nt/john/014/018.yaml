translation:
  language: es
  text: No los dejaré huérfanos[a]; vengo a ustedes[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No los dejaré como huérfanos». La imagen griega es la de quedar como niños sin cuidado parental.'
    reason: lexical_alternative
  - marker: b
    text: Puede referirse a la venida de Jesús después de la resurrección, a su venida por medio del Espíritu Santo o a su regreso futuro; el griego no obliga a un solo referente.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀφήσω
  english_pob_choice: will leave
  chosen_spanish: dejaré
  alternatives_spanish:
  - abandonaré
  - desampararé
  - los dejaré
  lexicon: BDAG
  rationale: El futuro activo de ἀφίημι aquí expresa dejar a alguien atrás, no perdonar ni permitir. «Dejaré» reproduce con naturalidad el sentido relacional del contexto y mantiene el paralelismo con el predicado siguiente.
- source_word: ὀρφανούς
  english_pob_choice: as orphans
  chosen_spanish: huérfanos
  alternatives_spanish:
  - huérfanos de padre
  - sin padre
  - abandonados
  lexicon: BDAG
  rationale: ὀρφανός conserva la imagen concreta de hijos privados de cuidado parental. En español, «huérfanos» comunica bien esa imagen; se evita «abandonados» porque atenúa el matiz familiar y puede borrar la tensión lexical del original.
- source_word: ἔρχομαι
  english_pob_choice: I am coming
  chosen_spanish: vendré
  alternatives_spanish:
  - vengo
  - estoy viniendo
  lexicon: BDAG
  rationale: Aunque el griego usa presente con fuerza inminente, en español «vendré» comunica naturalmente la llegada prometida sin sonar forzado. «Vengo» podría sugerir inmediatez presente, pero aquí el contexto admite un valor de promesa futura en una forma idiomática.
- source_word: πρὸς ὑμᾶς
  english_pob_choice: to you
  chosen_spanish: a ustedes
  alternatives_spanish:
  - hacia ustedes
  - para ustedes
  lexicon: BDAG
  rationale: La preposición πρός con acusativo marca movimiento hacia personas. «A ustedes» es la equivalencia más natural en español; «hacia ustedes» conserva más explícitamente la dirección, pero suena menos idiomático aquí.
- source_word: Οὐκ
  english_pob_choice: not
  chosen_spanish: 'No'
  alternatives_spanish:
  - No, de ningún modo
  lexicon: BDAG
  rationale: La negación simple reproduce la fuerza de οὐκ sin sobrecargar el enunciado. En español, el futuro negativo ya expresa bien la negación enfática.
theological_decisions:
- issue: Referencia de «vendré a ustedes»
  english_pob_reading: Render the clause without specifying whether Jesus refers to his post-resurrection appearances, the coming of the Spirit, or his eschatological return.
  chosen_spanish_reading: Traducir la cláusula sin determinar si Jesús habla de sus apariciones tras la resurrección, de su venida por medio del Espíritu, o de su regreso final.
  alternative_spanish_readings:
  - Vendré en la resurrección.
  - Vendré por medio del Espíritu Santo.
  - Vendré en mi regreso final.
  rationale: El contexto inmediato puede relacionarse con la promesa del Espíritu, pero el enunciado también resuena con la venida personal de Jesús. La traducción conserva esa amplitud teológica sin resolver la ambigüedad en el cuerpo principal.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Coincide con el último pase revisado: no se registraron cambios posteriores y el cotejo final mostró alto grado de acuerdo. La redacción española conserva la imagen familiar de ὀρφανούς y la ambigüedad teológica de ἔρχομαι πρὸς ὑμᾶς sin forzar una interpretación única.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió «huérfanos» sobre «abandonados» para no borrar la imagen concreta de hijos sin cuidado parental.
  - Se eligió «a ustedes» por naturalidad idiomática, aunque «hacia ustedes» sería una alternativa más literal de la dirección de πρός.
  - La negación y el futuro español se combinan para reflejar el valor prospectivo de la forma griega sin calco excesivo.
