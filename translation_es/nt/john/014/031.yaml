translation:
  language: es
  text: Pero para que el mundo sepa que yo amo al Padre, hago tal como el Padre me ha mandado[a]. Levántense, vámonos de aquí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tal como el Padre me mandó, así hago»'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλ’
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - sino
  - más bien
  lexicon: BDAG
  rationale: Mantiene el valor adversativo de transición en un español natural y sobrio, sin exagerar la contraposición.
- source_word: ἵνα γνῷ
  english_pob_choice: so that ... may know
  chosen_spanish: para que ... sepa
  alternatives_spanish:
  - a fin de que ... sepa
  - para que ... llegue a saber
  lexicon: BDAG
  rationale: ἵνα expresa propósito; en español, 'para que' comunica con claridad esa finalidad. El subjuntivo 'sepa' conserva el matiz de propósito en un registro actual.
- source_word: ὁ κόσμος
  english_pob_choice: the world
  chosen_spanish: el mundo
  alternatives_spanish:
  - la gente del mundo
  - la humanidad
  lexicon: BDAG
  rationale: '''Mundo'' preserva el uso joánico y la carga teológica/corporativa de κόσμος sin diluirlo en una explicación interpretativa.'
- source_word: ἀγαπῶ
  english_pob_choice: I love
  chosen_spanish: yo amo
  alternatives_spanish:
  - yo люблю?
  - yo quiero
  lexicon: BDAG
  rationale: '''Amo'' conserva el valor de ἀγαπάω en presente y mantiene la fuerza relacional del enunciado. Se evita ''quiero'', que debilitaría el verbo griego.'
- source_word: τὸν πατέρα
  english_pob_choice: the Father
  chosen_spanish: al Padre
  alternatives_spanish:
  - a mi Padre
  - al Padre celestial
  lexicon: BDAG
  rationale: El griego tiene artículo definido, no posesivo explícito. 'Al Padre' respeta la forma del texto y el título joánico sin añadir 'mi'.
- source_word: καθὼς ἐνετείλατο μοι ὁ πατήρ
  english_pob_choice: just as the Father has commanded me
  chosen_spanish: exactamente como el Padre me ha mandado
  alternatives_spanish:
  - tal como el Padre me ha ordenado
  - como el Padre me lo ha mandado
  lexicon: BDAG
  rationale: '''Exactamente como'' refleja bien la correspondencia de καθώς...οὕτως. ''Ha mandado'' conserva la fuerza de ἐντέλλομαι y su relación con obediencia, sin rebajarla a una mera sugerencia.'
- source_word: οὕτως ποιῶ
  english_pob_choice: I do just as
  chosen_spanish: hago exactamente
  alternatives_spanish:
  - así hago
  - de ese modo hago
  lexicon: BDAG
  rationale: 'En español, la correspondencia doble de καθώς...οὕτως se expresa mejor integrando el adverbio con el verbo: ''hago exactamente como''. Así se preserva el paralelismo sin sonar artificial.'
- source_word: Ἐγείρεσθε
  english_pob_choice: Rise
  chosen_spanish: Levántense
  alternatives_spanish:
  - Pónganse de pie
  - Alzénse
  lexicon: BDAG
  rationale: El imperativo plural pide incorporarse/ponerse en pie. 'Levántense' es claro, natural y digno en español contemporáneo.
- source_word: ἄγωμεν
  english_pob_choice: let us go
  chosen_spanish: vámonos
  alternatives_spanish:
  - vamos
  - partamos
  lexicon: BDAG
  rationale: El hortativo plural se expresa con naturalidad en español con 'vámonos', que conserva la invitación a salir y el movimiento conjunto.
- source_word: ἐντεῦθεν
  english_pob_choice: from here
  chosen_spanish: de aquí
  alternatives_spanish:
  - de este lugar
  - de este sitio
  lexicon: BDAG
  rationale: '''De aquí'' es la forma más directa y natural para indicar salida desde el lugar presente.'
theological_decisions:
- issue: Título relacional πατήρ en cristología joánica
  english_pob_reading: the Father
  chosen_spanish_reading: el Padre
  alternative_spanish_readings:
  - mi Padre
  - Padre
  rationale: Se conserva el título con artículo, como en el griego, sin introducir un posesivo que no está explícito. Esto mantiene la precisión textual y la relación Padre-Hijo tal como aparece en el pasaje.
  doctrine_reference: Juan 14; afirmaciones cristológicas del POB
- issue: Fuerza de ἐντέλλομαι en la obediencia del Hijo
  english_pob_reading: commanded
  chosen_spanish_reading: ha mandado
  alternative_spanish_readings:
  - ha ordenado
  - me ha instruido
  rationale: '''Mandado'' preserva el contenido fuerte de mandato/encargo de ἐντέλλομαι. Se evita suavizarlo con ''instruido'', que podría rebajar la fuerza de la relación de obediencia expresada en el texto.'
  doctrine_reference: Juan 14:31; fidelidad léxica y cristología ortodoxa
- issue: Correspondencia comparativa entre καθώς y οὕτως
  english_pob_reading: just as ... so ...
  chosen_spanish_reading: exactamente como ...
  alternative_spanish_readings:
  - tal como ...
  - así como ...
  rationale: La estructura griega enfatiza correspondencia exacta. En español, 'exactamente como' comunica con claridad esa idea sin forzar una repetición pesada de 'así' en ambas mitades.
  doctrine_reference: John 14:31; equivalencia retórica
translation_notes:
  revision_awareness: El contexto inglés presenta acuerdo alto y sin revisiones aplicadas; la versión española sigue esa lectura estable, conservando el orden lógico del original y la correspondencia comparativa de καθώς...οὕτως sin añadir información.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto fuente lo requiera; aquí no aparece el nombre divino.
  - Se mantiene 'Padre' como título relacional, sin posesivo añadido.
  - Se conserva un registro sobrio y publicable, evitando calcos innecesarios pero respetando el paralelismo del griego.
  - '''Mandado'' mantiene fuerza normativa sin desplazar el sentido hacia simple instrucción.'
