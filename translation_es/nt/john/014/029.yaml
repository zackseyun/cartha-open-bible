review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien el sentido básico del griego: discurso previo al acontecimiento con propósito de suscitar fe cuando ocurra. Conserva correctamente la repetición de γίνομαι con «ocurra» y la fuerza de πιστεύσητε como «crean». Sin embargo, «les he dicho antes de que ocurra» suena incompleto en español porque falta el complemento temporal explícito «esto», que el griego deja implícito pero el español normalmente requiere para plena naturalidad y claridad.'
  spanish_quality_summary: La redacción es mayormente clara y digna, pero «Y ahora les he dicho antes de que ocurra» resulta menos idiomática que «Y ahora se lo he dicho antes de que ocurra». Añadir «se lo» mejora mucho la fluidez sin introducir contenido indebido; simplemente explicita el objeto implícito de εἴρηκα. El resto del verso es natural y fiel.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Crean» refleja bien πιστεύσητε en contexto joánico. No aparecen términos sensibles del glosario mayor. La nota sobre «confíen» como alternativa es adecuada.
  issues:
  - severity: medium
    issue: Falta de objeto explícito con «les he dicho»
    rationale: Aunque el griego puede dejar implícito el contenido dicho, en español «les he dicho antes de que ocurra» suena elíptico y poco natural. «Se lo he dicho» explicita de manera idiomática el objeto implícito sin alterar el significado.
  revised_spanish_text: Y ahora se lo he dicho antes de que ocurra[a], para que cuando ocurra[b], crean[c].
