- from: Y ahora les he dicho antes de que ocurra[a], para que cuando ocurra[b], crean[c].
  to: Y ahora se lo he dicho antes de que ocurra[a], para que cuando ocurra[b], crean[c].
  rationale: Se añadió «se lo» para hacer idiomática en español la referencia al contenido previamente dicho, implícita en el griego y en el inglés auditado. No cambia el sentido ni la estructura argumental del verso; solo corrige una elipsis poco natural en español.
