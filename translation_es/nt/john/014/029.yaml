translation:
  language: es
  text: Y ahora se lo he dicho antes de que ocurra[a], para que cuando ocurra[b], crean[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «antes de que suceda».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «cuando suceda».'
    reason: lexical_alternative
  - marker: c
    text: También puede significar «confíen», pero en Juan «creer» es la rendición habitual para πιστεύω.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ νῦν
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  - Y ahora mismo
  lexicon: BDAG
  rationale: Conserva la continuidad discursiva de καί y el adverbio temporal νῦν. «Y ahora» suena natural en español y mantiene el enlace con el contexto previo.
- source_word: εἴρηκα
  english_pob_choice: I have told
  chosen_spanish: les he dicho
  alternatives_spanish:
  - les he contado
  - les he hablado
  lexicon: BDAG
  rationale: El perfecto de λέγω expresa una acción previa con efecto presente. En español, «les he dicho» reproduce bien ese estado resultante y mantiene el matiz de comunicación ya realizada.
- source_word: ὑμῖν
  english_pob_choice: you
  chosen_spanish: les
  alternatives_spanish:
  - a ustedes
  - a vosotros
  lexicon: BDAG
  rationale: El dativo indirecto se integra de forma natural en el verbo español. «Les he dicho» conserva el destinatario sin añadir una construcción más pesada.
- source_word: πρὶν γενέσθαι
  english_pob_choice: before it happens
  chosen_spanish: antes de que ocurra
  alternatives_spanish:
  - antes de que suceda
  - antes de que llegue a pasar
  - antes de que acontezca
  lexicon: BDAG
  rationale: πρίν con infinitivo aoristo indica anterioridad respecto de un evento implícito. «Antes de que ocurra» es una equivalencia natural y conserva la referencia al acontecimiento futuro sin forzar el español.
- source_word: ὅταν γένηται
  english_pob_choice: when it happens
  chosen_spanish: cuando ocurra
  alternatives_spanish:
  - cuando suceda
  - cuando llegue a pasar
  - cuando acontezca
  lexicon: BDAG
  rationale: La repetición de γίνομαι se mantiene con el mismo verbo de evento en español. «Ocurra» traduce bien el sentido de hecho que sucede y deja visible la relación con «antes de que ocurra».
- source_word: πιστεύσητε
  english_pob_choice: you may believe
  chosen_spanish: crean
  alternatives_spanish:
  - crean en mí
  - lleguen a creer
  - tengan fe
  lexicon: BDAG
  rationale: En Juan, πιστεύω suele traducirse por «creer». Aquí el subjuntivo de propósito μετά ἵνα se expresa naturalmente como «para que… crean». Se evita imponer «confíen» o «tengan fe» porque el audit trail inglés preserva «believe» como rendición estándar joánica.
theological_decisions:
- issue: Fuerza de πιστεύσητε en el contexto joánico
  english_pob_reading: you may believe
  chosen_spanish_reading: crean
  alternative_spanish_readings:
  - sigan creyendo
  - confíen
  - tengan fe
  rationale: El griego permite tanto la respuesta inicial de fe como su fortalecimiento; no especifica más. «Crean» conserva esa amplitud y evita resolver la tensión teológica hacia una perseverancia explícita o hacia una sola formulación devocional.
  doctrine_reference: Preservar la tensión interpretativa sin cerrarla indebidamente.
translation_notes:
  revision_awareness: La versión española sigue de cerca el audit trail inglés y el griego SBLGNT. Se conserva la repetición de γίνομαι con «ocurra» / «ocurra» y el propósito de ἵνα con «para que». No se añadió contenido interpretativo ajeno al texto.
  spanish_consistency_notes:
  - Se mantiene «Y ahora» para καὶ νῦν, evitando omitir el nexo.
  - Se usa «les he dicho» para reflejar el perfecto de λέγω con efecto presente.
  - El mismo verbo «ocurra» reproduce la repetición de γίνομαι en el segmento temporal.
  - «Crean» conserva la familia semántica de πιστεύω en estilo joánico.
