translation:
  language: es
  text: El que no me ama no guarda mis palabras[a]. Y la palabra que ustedes oyen no es mía[b], sino del Padre que me envió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mi mensaje»; o «lo que digo».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no me pertenece»; o «no procede de mí».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ μὴ ἀγαπῶν
  english_pob_choice: The one who does not love
  chosen_spanish: El que no me ama
  alternatives_spanish:
  - Quien no me ama
  - El que no me ama a mí
  lexicon: BDAG
  rationale: La forma articular con participio funciona de modo sustantivo y genérico; en español, "El que no me ama" preserva ese valor sin sonar forzado. Se mantiene el objeto explícito "me" para no diluir el referente a Jesús.
- source_word: ἀγαπῶν
  english_pob_choice: love
  chosen_spanish: ama
  alternatives_spanish:
  - ama de verdad
  - quiere
  lexicon: BDAG
  rationale: Se conserva el verbo "amar" como equivalente estable de ἀγαπάω en el contexto joánico, evitando opciones más débiles o interpretativas.
- source_word: τοὺς λόγους μου
  english_pob_choice: my words
  chosen_spanish: mis palabras
  alternatives_spanish:
  - mis dichos
  - lo que digo
  lexicon: BDAG
  rationale: El plural λόγους se refleja mejor con "palabras" en plural. "Mis palabras" mantiene la correspondencia formal y la referencia al hablar de Jesús.
- source_word: τηρεῖ
  english_pob_choice: keep
  chosen_spanish: guarda
  alternatives_spanish:
  - obedece
  - observa
  lexicon: BDAG
  rationale: En español bíblico, "guardar" puede conservar la idea joánica de mantener, observar y acatar la palabra. "Obedece" estrecha demasiado el sentido; "observa" suena menos natural aquí.
- source_word: ὁ λόγος
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  lexicon: BDAG
  rationale: Se conserva el singular con "la palabra", que respeta la dicción joánica y la relación con el decir de Jesús. "Mensaje" explicita demasiado la idea y pierde la resonancia léxica.
- source_word: ὃν ἀκούετε
  english_pob_choice: that you hear
  chosen_spanish: que ustedes oyen
  alternatives_spanish:
  - que escuchan
  - que están oyendo
  lexicon: BDAG
  rationale: El presente ἀκούετε se traduce naturalmente con presente en español. "Ustedes" hace explícito el sujeto implícito y corresponde al registro público del pasaje.
- source_word: οὐκ ἔστιν ἐμὸς
  english_pob_choice: is not mine
  chosen_spanish: no es mía
  alternatives_spanish:
  - no me pertenece
  - no procede de mí
  lexicon: BDAG
  rationale: Dado que "la palabra" es femenina en español, el predicativo concuerda como "mía". Esta forma conserva la tensión de origen/posesión del griego sin interpretarla en exceso.
- source_word: τοῦ πέμψαντός με πατρός
  english_pob_choice: the Father who sent me
  chosen_spanish: del Padre que me envió
  alternatives_spanish:
  - del Padre que me ha enviado
  - del Padre que me mandó
  lexicon: BDAG
  rationale: El participio aoristo πέμψαντός se vierte de forma natural con pretérito simple, "envió". "Del Padre" expresa la relación genitiva de origen/posesión y mantiene la referencia clara al Padre que envía al Hijo.
theological_decisions:
- issue: Relación entre la palabra de Jesús y la del Padre
  english_pob_reading: 'The verse preserves both distinction of persons and unity of message: the word heard from Jesus is not his in independent origin, but the Father''s who sent him.'
  chosen_spanish_reading: La redacción conserva la distinción entre Jesús y el Padre, a la vez que afirma que la palabra escuchada no es de Jesús como origen independiente, sino del Padre que lo envió.
  alternative_spanish_readings:
  - La palabra no le pertenece a Jesús, sino al Padre que lo envió.
  - No es su palabra, sino la del Padre que lo envió.
  rationale: 'La frase "no es mía" mantiene la tensión del texto: no niega la autoridad de Jesús, sino que señala el origen de la palabra en la misión del Padre. Se evita una paráfrasis que suavice o resuelva esa tensión teológica.'
  doctrine_reference: Credo niceno (381); Definición de Calcedonia (451); principio de preservar la tensión teológica del original.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el ajuste de auditoría del inglés desde una formulación posesiva más áspera hacia una más natural; en español se resolvió con una construcción plenamente idiomática: «del Padre que me envió». También se respetó la observación teológica sobre no disolver la relación Padre-Hijo en una simple paráfrasis de procedencia.'
  spanish_consistency_notes:
  - Se mantiene «Padre» con mayúscula como referencia divina.
  - Se conserva el registro joánico de «palabra» y «guardar» para λόγος y τηρέω.
  - Se usa «Jesús» implícito en primera persona, sin introducir títulos no presentes en el verso.
