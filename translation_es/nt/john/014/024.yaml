    issue: Coma innecesaria entre sujeto y predicado en «El que no me ama, no guarda...»
    rationale: En español estándar no corresponde separar con coma el sujeto oracional «El que no me ama» del predicado «no guarda mis palabras». La pausa perjudica la fluidez sin base en el original.
  - severity: medium
    issue: La nota [a] («mis dichos») no sigue bien la alternativa auditada y resulta menos natural
    rationale: La evidencia inglesa preserva como alternativa principal «the message». «Mis dichos» no es incorrecto, pero suena más rígido y menos idiomático en español moderno; además desplaza la alternativa documentada hacia otra no priorizada.
  revised_spanish_text: El que no me ama no guarda mis palabras[a]. Y la palabra que ustedes oyen no es mía[b], sino del Padre que me envió.
