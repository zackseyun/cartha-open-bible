translation:
  language: es
  text: Si me hubieran conocido[a], también habrían conocido a mi Padre. Desde este momento lo conocen y lo han visto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Algunos manuscritos leen la primera cláusula en una forma que puede traducirse más simplemente: «Si me conocen, conocerán también a mi Padre». El texto griego impreso respalda: «Si me hubieran conocido, también habrían conocido a mi Padre».'
    reason: textual_variant
lexical_decisions:
- source_word: ἐγνώκειτέ
  english_pob_choice: had known
  chosen_spanish: hubieran conocido
  alternatives_spanish:
  - conocieran
  - habían conocido
  lexicon: γινώσκω
  rationale: 'El pluperfecto griego en la prótasis condicional se expresa en español con pluscuamperfecto de subjuntivo: «hubieran conocido». Conserva la relación anterior e irreal o no cumplida sugerida por el inglés POB y por el contexto discursivo.'
- source_word: πατέρα μου
  english_pob_choice: my Father
  chosen_spanish: mi Padre
  alternatives_spanish:
  - el Padre mío
  - el Padre que es mío
  lexicon: πατήρ
  rationale: «Mi Padre» es la forma natural y fiel en español para la posesión filial y teológica de Jesús. Mantiene la relación única sin volverla más explícita de lo que permite el texto.
- source_word: ᾔδειτε
  english_pob_choice: would have known
  chosen_spanish: habrían conocido
  alternatives_spanish:
  - conocerían
  - hubieran sabido
  lexicon: οἶδα
  rationale: 'El verbo en la apódosis con ἄν pide una consecuencia contraria al hecho; en español se rinde mejor con condicional compuesto: «habrían conocido». «Conocer» preserva el paralelo con γινώσκω sin introducir una paráfrasis como «comprendido» o «sabido».'
- source_word: ἀπ’ ἄρτι
  english_pob_choice: From now on
  chosen_spanish: Desde ahora
  alternatives_spanish:
  - A partir de ahora
  - Desde este momento
  lexicon: ἀπ’ ἄρτι
  rationale: La locución idiomática marca un cambio de situación en el discurso. «Desde ahora» es natural en español y mantiene el valor temporal inmediato.
- source_word: γινώσκετε
  english_pob_choice: you know
  chosen_spanish: conocen
  alternatives_spanish:
  - saben
  - están conociendo
  lexicon: γινώσκω
  rationale: Aquí el presente expresa una realidad vigente a partir del cambio de marco señalado por ἀπ’ ἄρτι. «Conocen» es idiomático en español y conserva el sentido relacional de γινώσκω.
- source_word: ἑωράκατε
  english_pob_choice: have seen
  chosen_spanish: han visto
  alternatives_spanish:
  - han contemplado
  - han mirado
  lexicon: ὁράω
  rationale: 'El perfecto de ὁράω se refleja con presente perfecto español: «han visto». Mantiene la acción completada con relevancia presente y evita intensificar innecesariamente con «contemplado».'
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: αὐτός
  rationale: El pronombre se refiere al Padre; en español, el objeto directo personal puede expresarse con «lo» sin perder claridad en este contexto. Se prefiere para mayor fluidez, manteniendo el referente personal implícito.
theological_decisions:
- issue: Conocimiento de Jesús y conocimiento del Padre
  english_pob_reading: The verse states that knowledge of and encounter with Jesus reveal the Father, without adding explanatory doctrinal language.
  chosen_spanish_reading: El versículo afirma directamente que conocer a Jesús lleva a conocer al Padre, y que verlo implica haber visto al Padre, sin ampliar la frase con formulaciones doctrinales ajenas al texto.
  alternative_spanish_readings:
  - Una paráfrasis más explícita sobre la identidad ontológica del Hijo y el Padre
  - Una lectura suavizada que haga de «ver» solo una metáfora de entender
  rationale: La traducción conserva la fuerza reveladora del dicho de Jesús y también su tensión teológica, sin importar lenguaje confesional posterior ni rebajar el alcance de «ver».
  doctrine_reference: Afirmaciones; Translation philosophy §3
- issue: Fuerza de la condición inicial
  english_pob_reading: '''If you had known me, you would have known my Father also.'''
  chosen_spanish_reading: 'La condición se expresa como pasado contrafactual: «Si me hubieran conocido, también habrían conocido a mi Padre».'
  alternative_spanish_readings:
  - «Si me conocen, conocerán a mi Padre también»
  - Una armonización textual hacia una lectura menos de reproche
  rationale: Los tiempos griegos con ἄν sostienen una relación contraria a la realidad en la primera cláusula. El español condicional compuesto y el pluscuamperfecto de subjuntivo preservan ese valor y el tono del contexto.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: La versión inglesa revisada eliminó el auxiliar enfático «do» en «From now on you know him and have seen him» por mayor naturalidad. El español aquí sigue esa línea con un presente simple natural («lo conocen») y mantiene el valor perfectivo de «han visto».
  spanish_consistency_notes:
  - Se mantiene «Padre» con mayúscula por consistencia reverencial y porque el referente es relacional y teológico.
  - Se evita «SEÑOR» o una sustitución de nombre divino porque el versículo no contiene יהוה ni κύριος como título sustitutivo.
  - Se conserva el paralelismo conocer/ver para reflejar el peso joánico de ambos verbos.
