revisions:
- from: Si me hubieran conocido[a], también habrían conocido a mi Padre. Desde ahora lo conocen y lo han visto.
  to: Si me hubieran conocido[a], también habrían conocido a mi Padre. Desde este momento lo conocen y lo han visto.
  rationale: Se mantiene la traducción base porque es fiel al griego y al rastro de auditoría inglés. Solo se ajusta ἀπ’ ἄρτι de «Desde ahora» a «Desde este momento» para un español más natural y digno, sin alterar el valor temporal ni la fuerza del contraste. La nota textual permanece igual, ya que está bien formulada y correctamente anclada.
