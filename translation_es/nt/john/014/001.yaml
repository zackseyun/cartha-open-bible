review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: una prohibición seguida de dos exhortaciones paralelas a creer en Dios y en Jesús. Conserva correctamente el singular colectivo «su corazón» para ὑμῶν ἡ καρδία y la repetición verbal de πιστεύετε. Sin embargo, la nota [a] no preserva una alternativa real del inglés auditado; repite sustancialmente la misma lectura y desplaza la nota desde una alternativa de formulación a una explicación poco útil. Además, falta en español la alternativa léxica «confíen»/«confíen también en mí» que el POB inglés conservó en nota para πιστεύετε.'
  spanish_quality_summary: El texto principal es claro y digno. «No se turbe su corazón» suena natural y eclesialmente legible. «Crean en Dios; crean también en mí» es comprensible, pero para reflejar mejor el inglés auditado y la ambigüedad semántica de πιστεύω, conviene añadir una nota léxica sobre «confíen». También mejora la fidelidad documental simplificar la puntuación a punto y coma tras la primera cláusula, siguiendo mejor la estructura del original y del POB inglés.
  glossary_alignment: 'Sin conflictos con la terminología del proyecto: θεόν -> «Dios», Ἰησοῦς no aparece, y no hay términos sensibles como Yahvé/Mesías/esclavo. La decisión principal «crean» para πιστεύετε es aceptable, pero la alternativa documentada «confíen» debe preservarse en nota.'
  issues:
  - severity: medium
    issue: La nota [a] no corresponde a una alternativa significativa preservada por el POB inglés.
    rationale: El inglés documenta para Μὴ ταρασσέσθω la diferencia entre «Do not let your heart be troubled» y una formulación sin «let». La nota española repite «No se turbe su corazón» en ambos lados y por tanto no aporta una alternativa real ni aclara el matiz de forma útil.
  - severity: medium
    issue: Falta una nota léxica sobre el valor de πιστεύετε como «confiar».
    rationale: El POB inglés preserva explícitamente «Trust in God; trust also in me». El borrador español solo conserva la ambigüedad indicativo/imperativo, pero omite la alternativa léxica, perdiendo parte del rastro auditado.
  - severity: low
    issue: La puntuación del texto principal puede alinearse mejor con el original y el POB inglés.
    rationale: El griego tiene una pausa fuerte tras «corazón» y luego dos cláusulas paralelas; en español «No se turbe su corazón; crean en Dios, y crean también en mí» o sin coma antes de «y» refleja mejor la continuidad exhortativa que un punto separado.
  revised_spanish_text: No se turbe su corazón[a]; crean en Dios[b] y crean también en mí.
  revised_footnotes:
