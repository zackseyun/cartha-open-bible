    text: 'O: «No dejen que se turbe su corazón». El griego puede expresarse en español con o sin hacer explícito el matiz de «dejar que».'
    reason: alternative_reading
  - marker: b
    text: 'O: «Ustedes creen en Dios; crean también en mí». La forma griega πιστεύετε puede ser indicativa («creen») o imperativa («crean»). También puede llevar el sentido de «confíen»: «Confíen en Dios; confíen también en mí».'
    reason: alternative_reading
