translation:
  language: es
  text: No se turbe su corazón[a]; crean en Dios[b] y crean también en mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No dejen que se turbe su corazón». El griego puede expresarse en español con o sin hacer explícito el matiz de «dejar que».'
    reason: alternative_reading
  - marker: b
    text: 'O: «Ustedes creen en Dios; crean también en mí». La forma griega πιστεύετε puede ser indicativa («creen») o imperativa («crean»). También puede llevar el sentido de «confíen»: «Confíen en Dios; confíen también en mí».'
    reason: alternative_reading
lexical_decisions:
- source_word: Μὴ ταρασσέσθω
  english_pob_choice: Do not let your heart be troubled
  chosen_spanish: No se turbe
  alternatives_spanish:
  - No se perturbe
  - No se angustie
  - No se alborote
  lexicon: SBLGNT; BDAG (vía audit trail inglés)
  rationale: El imperativo pasivo de tercera persona con μή pide una prohibición en español; «No se turbe» conserva el matiz de perturbación interior sin reducirlo solo a ansiedad. «Turbarse» es natural en español bíblico y mantiene la fuerza de ταράσσω sin volverlo más fuerte de lo que el griego exige.
- source_word: ὑμῶν ἡ καρδία
  english_pob_choice: your heart
  chosen_spanish: su corazón
  alternatives_spanish:
  - sus corazones
  lexicon: SBLGNT; BDAG (vía audit trail inglés)
  rationale: El griego usa καρδία en singular con un posesivo plural, un singular colectivo. En español, «su corazón» preserva ese valor colectivo y suena más natural que pluralizarlo sin necesidad. El referente plural queda claro por el contexto de Jesús hablando a sus discípulos.
- source_word: πιστεύετε
  english_pob_choice: Believe
  chosen_spanish: Crean
  alternatives_spanish:
  - Crean también
  - Confíen
  - Tengan fe
  lexicon: SBLGNT; BDAG (vía audit trail inglés)
  rationale: La forma griega permite lectura indicativa o imperativa. En la línea principal se mantiene la lectura exhortativa, como en la traducción inglesa, porque encaja con el tono consolador y paralelístico del versículo. «Crean» es el imperativo plural natural en español; «confiar» sería posible, pero «creer» preserva el paralelismo verbal con el griego.
- source_word: εἰς τὸν θεόν
  english_pob_choice: in God
  chosen_spanish: en Dios
  alternatives_spanish:
  - en el Dios
  lexicon: SBLGNT; BDAG (vía audit trail inglés)
  rationale: Con πιστεύω, εἰς expresa dirección de confianza/belief; en español la preposición simple «en» comunica bien ese movimiento relacional. No se añade artículo porque el griego tampoco lo exige aquí de forma idiomática en español.
- source_word: καὶ εἰς ἐμὲ πιστεύετε
  english_pob_choice: believe also in me
  chosen_spanish: crean también en mí
  alternatives_spanish:
  - crean en mí también
  - y crean en mí
  lexicon: SBLGNT; BDAG (vía audit trail inglés)
  rationale: «También» reproduce la fuerza aditiva de καί y mantiene el paralelismo con «en Dios». Repetir «crean» conserva la estructura del griego y evita suavizar la exhortación. Se prefirió «mí» con tilde por norma del español.
theological_decisions:
- issue: Ambigüedad indicativo/imperativo en πιστεύετε
  english_pob_reading: 'Both rendered as imperatives: ''Believe in God; believe also in me.'' The indicative alternative is preserved in a footnote.'
  chosen_spanish_reading: 'Se traduce como imperativo: «Crean en Dios; crean también en mí».'
  alternative_spanish_readings:
  - Ustedes creen en Dios; crean también en mí.
  - Creen en Dios; crean también en mí.
  rationale: 'La forma griega admite ambas lecturas, y el contexto puede sostenerlas. Sin embargo, para el texto principal se mantiene la lectura exhortativa por su cercanía al flujo del versículo y al tono de consolación y llamado a la confianza. La ambigüedad real no se elimina: se documenta en nota para preservar la tensión textual, como exige la filosofía de traducción.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: No se requirieron cambios sustantivos respecto del último repaso; la solución principal conserva la ambigüedad griega documentada en la auditoría inglesa y la expresa con una lectura exhortativa en español, con nota alternativa para la lectura indicativa.
  spanish_consistency_notes:
  - Se usa «Dios» para θεόν conforme al estándar del proyecto.
  - Se mantiene «creer» en lugar de «confiar» en el texto principal para conservar el paralelismo verbal, dejando la alternativa semántica documentada implícitamente en la nota.
  - Se eligió «corazón» en singular por el singular colectivo del griego.
  - La puntuación con dos puntos/ punto y coma en español se adapta al paralelismo de dos cláusulas exhortativas.
  - Se evita «SEÑOR» y se traduce directamente el referente divino como «Dios» siguiendo la pauta del proyecto.
