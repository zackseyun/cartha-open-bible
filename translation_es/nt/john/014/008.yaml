translation:
  language: es
  text: 'Felipe le dijo: «Señor[a], muéstranos al Padre, y nos basta».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Señor, muéstranos al Padre, y eso nos basta». También es posible entender «Señor» aquí en un sentido más cercano a «señor» o «caballero» como tratamiento respetuoso.
    reason: lexical_alternative
lexical_decisions:
- source_word: Λέγει
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - dice
  lexicon: BDAG
  rationale: El griego usa presente histórico; en español narrativo natural, el pasado simple conserva el valor de relato sin sonar forzado.
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: 'El dativo de destinatario se expresa de manera idiomática con pronombre átono en español: «le dijo».'
- source_word: Φίλιππος
  english_pob_choice: Philip
  chosen_spanish: Felipe
  alternatives_spanish:
  - Philip
  lexicon: convención onomástica española
  rationale: Se usa la forma española estándar del nombre propio en una traducción bíblica para lectores hispanohablantes.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Señor mío
  - Maestro
  - Señor, siervo
  lexicon: BDAG
  rationale: El vocativo de κύριος en este contexto joánico se traduce con el título reverente «Señor», que en español conserva el peso cristológico de la dirección a Jesús.
- source_word: δεῖξον
  english_pob_choice: show
  chosen_spanish: muéstranos
  alternatives_spanish:
  - enséñanos
  - revela
  lexicon: BDAG
  rationale: El imperativo aoristo pide una acción directa de hacer ver o manifestar; «mostrar» es el equivalente más natural y fiel en español.
- source_word: ἡμῖν
  english_pob_choice: us
  chosen_spanish: nos
  alternatives_spanish:
  - a nosotros
  lexicon: BDAG
  rationale: 'El dativo con el imperativo se vuelve en español un objeto clítico natural: «muéstranos».'
- source_word: τὸν πατέρα
  english_pob_choice: the Father
  chosen_spanish: al Padre
  alternatives_spanish:
  - al padre
  lexicon: BDAG
  rationale: En el contexto de Juan, la referencia es específica a Dios como Padre; el artículo y la mayúscula mantienen esa referencia titular y divina.
- source_word: καὶ ἀρκεῖ ἡμῖν
  english_pob_choice: and that is enough for us
  chosen_spanish: y nos basta
  alternatives_spanish:
  - y eso nos basta
  - y será suficiente para nosotros
  lexicon: BDAG
  rationale: La construcción con ἀρκέω se vierte de forma compacta y natural en español con «bastar»; el sentido de suficiencia queda preservado sin añadir interpretación.
theological_decisions:
- issue: Título vocativo κύριος dirigido a Jesús
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Maestro
  - Sir
  rationale: Se mantiene la lectura reverente aplicada a Jesús, coherente con el uso joánico y con el valor cristológico que el contexto sugiere sin sobreexplicarlo.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
translation_notes:
  revision_awareness: El texto griego, el análisis morfológico y la auditoría inglesa coinciden en una lectura directa y estable; no hubo revisiones posteriores que alteren la elección léxica o teológica principal.
  spanish_consistency_notes:
  - Se conserva el registro reverente y sobrio.
  - «Padre» se capitaliza por su valor titular/divino en el contexto joánico.
  - La frase final se mantiene breve para reproducir la suficiencia expresada por ἀρκεῖ sin expansión explicativa.
