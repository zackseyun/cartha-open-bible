translation:
  language: es
  text: 'Jesús respondió y le dijo: «Si alguien me ama, guardará mi palabra[a], y mi Padre lo amará, y vendremos a él y haremos nuestra morada[b] con él».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi enseñanza» o «lo que digo» para «mi palabra».
    reason: lexical_alternative
  - marker: b
    text: O «hacer una morada con él» o «hacer nuestro hogar con él».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió y dijo
  lexicon: BDAG
  rationale: En español, «respondió» comunica con naturalidad la respuesta narrativa y mantiene el sentido formal de la escena sin volverla pesada. La combinación con «le dijo» preserva el doble verbo griego ἀπεκρίθη ... καὶ εἶπεν sin calco rígido.
- source_word: εἶπεν
  english_pob_choice: said
  chosen_spanish: le dijo
  alternatives_spanish:
  - dijo
  - le habló
  lexicon: BDAG
  rationale: El dativo αὐτῷ exige un destinatario explícito; «le dijo» es la forma idiomática en español y conserva la estructura de respuesta dirigida a una persona concreta.
- source_word: Ἐάν τις
  english_pob_choice: If anyone
  chosen_spanish: Si alguien
  alternatives_spanish:
  - Si cualquiera
  - Si una persona
  lexicon: BDAG
  rationale: «Alguien» reproduce bien el valor genérico e indefinido de τις en una condición abierta, sin imponer género en el español de la cláusula condicional.
- source_word: ἀγαπᾷ
  english_pob_choice: loves
  chosen_spanish: ama
  alternatives_spanish:
  - quiere
  - tiene amor por
  lexicon: BDAG
  rationale: «Ama» es la correspondencia natural de ἀγαπάω en este contexto y mantiene la fuerza relacional y de lealtad del verbo.
- source_word: τὸν λόγον μου
  english_pob_choice: my word
  chosen_spanish: mi palabra
  alternatives_spanish:
  - mi enseñanza
  - lo que digo
  lexicon: BDAG
  rationale: «Palabra» conserva la dicción joánica de λόγος y el vínculo entre revelación dicha y obedecida. «Mi enseñanza» o «lo que digo» aclaran, pero estrechan el alcance que el texto permite.
- source_word: τηρήσει
  english_pob_choice: will keep
  chosen_spanish: guardará
  alternatives_spanish:
  - obedecerá
  - cumplirá
  lexicon: BDAG
  rationale: '«Guardar» preserva el rango semántico de τηρέω: proteger, observar y obedecer. En español suena más natural que «mantendrá» y menos restrictivo que «obedecerá».'
- source_word: ὁ πατήρ μου
  english_pob_choice: my Father
  chosen_spanish: mi Padre
  alternatives_spanish:
  - mi Padre celestial
  - el Padre
  lexicon: BDAG
  rationale: La mayúscula en «Padre» señala el título divino; «mi Padre» sigue de cerca el patrón joánico y la relación filial del hablante.
- source_word: ἀγαπήσει
  english_pob_choice: will love
  chosen_spanish: amará
  alternatives_spanish:
  - mostrará amor a
  - querrá
  lexicon: BDAG
  rationale: Se mantiene la misma raíz verbal en español para reflejar la repetición enfática del amor entre el discípulo, Jesús y el Padre.
- source_word: πρὸς αὐτὸν ἐλευσόμεθα
  english_pob_choice: we will come to him
  chosen_spanish: vendremos a él
  alternatives_spanish:
  - iremos a él
  - nos acercaremos a él
  lexicon: BDAG
  rationale: «Vendremos a él» es la forma más natural para ἔρχομαι con πρός y preserva el movimiento personal hacia el creyente sin sobreexplicar la dirección.
- source_word: μονὴν
  english_pob_choice: our dwelling
  chosen_spanish: nuestra morada
  alternatives_spanish:
  - nuestro hogar
  - nuestra habitación
  lexicon: BDAG
  rationale: «Morada» traduce bien μονή en un registro bíblico claro y digno. «Hogar» es posible, pero «morada» conserva mejor el matiz de habitación permanente.
- source_word: παρ’ αὐτῷ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - junto a él
  - en su compañía
  lexicon: BDAG
  rationale: «Con él» expresa de forma sencilla la presencia relacional de παρά con dativo en este contexto.
- source_word: ποιησόμεθα
  english_pob_choice: make
  chosen_spanish: haremos
  alternatives_spanish:
  - estableceremos
  - levantaremos
  lexicon: BDAG
  rationale: «Haremos» conserva la sencillez del verbo ποιέω en la expresión idiomática «hacer morada». En español, la construcción «hacer nuestra morada» suena más natural que un equivalente más técnico.
theological_decisions:
- issue: Plural divino en «vendremos ... y haremos nuestra morada»
  english_pob_reading: The plural refers to Jesus and the Father jointly acting in divine indwelling presence.
  chosen_spanish_reading: El plural se conserva como acción conjunta de Jesús y del Padre en la presencia que habita con el creyente.
  alternative_spanish_readings:
  - Se podría suavizar a una forma impersonal o singular para evitar la pluralidad.
  - Se podría reexpresar como una sola presencia divina sin marcar la distinción.
  rationale: Los verbos en primera persona plural expresan explícitamente la venida y morada conjunta. El español mantiene esa pluralidad sin explicaciones añadidas, para no borrar la distinción textual entre Jesús y el Padre.
  doctrine_reference: Credo Niceno-Constantinopolitano (381); Definición de Calcedonia (451)
- issue: Referencia genérica de τις
  english_pob_reading: Use 'anyone' for τις, but retain singular 'he/him' for the consequent clauses.
  chosen_spanish_reading: «Si alguien» conserva el alcance genérico; luego, «lo amará» y la construcción singular mantienen la referencia al mismo individuo.
  alternative_spanish_readings:
  - Usar «quien» con concordancia más formal.
  - Usar plural inclusivo para evitar singular masculino.
  rationale: El español permite un genérico natural con «alguien» sin necesidad de forzar un plural. La cláusula consecuente sigue centrada en un solo sujeto, como en el griego.
  doctrine_reference: Principio de fidelidad gramatical al singular genérico del texto fuente
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando explícitamente las notas a los marcadores [a] y [b] dentro del texto español. La redacción general se mantiene alineada con el pasaje fuente y con la auditable decisión inglesa de conservar el doble verbo, el singular genérico y la pluralidad divina.
  spanish_consistency_notes:
  - Se prefirió «mi palabra» y «guardar» para mantener la dicción joánica y no reducir λόγος/τηρέω a una paráfrasis estrecha.
  - «Morada» se usa como término bíblico comprensible en español; evita el tono demasiado doméstico de «hogar» y mantiene la idea de habitación permanente.
  - Los pronombres singulares en la primera mitad del versículo preservan el singular genérico del griego.
  - Los verbos en plural «vendremos» y «haremos» conservan la fuerza teológica del original sin explicitar más de lo que el texto dice.
