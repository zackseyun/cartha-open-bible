translation:
  language: es
  text: Y yo pediré al Padre, y él les dará otro Abogado[a], para que esté con ustedes para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Ayudador», «Consejero» o, tradicionalmente, «Consolador» para el griego παράκλητος.
    reason: lexical_alternative
lexical_decisions:
- source_word: κἀγὼ
  english_pob_choice: And I
  chosen_spanish: Y yo
  alternatives_spanish:
  - Y yo mismo
  - Yo también
  lexicon: BDAG
  rationale: El crasis κἀγώ une «y» + «yo» con continuidad discursiva y un matiz leve de énfasis. «Y yo» conserva esa transición natural en español sin exagerar el énfasis con un reflexivo innecesario.
- source_word: ἐρωτήσω
  english_pob_choice: will ask
  chosen_spanish: rogaré
  alternatives_spanish:
  - pediré
  - solicitaré
  lexicon: BDAG
  rationale: En este contexto Jesús se dirige al Padre; en español «rogaré» comunica mejor la petición reverente y personal que «pediré», sin introducir la oración litúrgica de manera técnica. Se preserva el futuro activo y la acción de interceder/pedir.
- source_word: τὸν πατέρα
  english_pob_choice: the Father
  chosen_spanish: al Padre
  alternatives_spanish:
  - al Padre mío
  - al Padre
  lexicon: BDAG
  rationale: El griego no incluye posesivo. En español, el objeto directo personal con «a» da naturalmente «al Padre». No se añade «mío» porque no está explícito en la cláusula.
- source_word: ἄλλον
  english_pob_choice: another
  chosen_spanish: otro
  alternatives_spanish:
  - otro más
  - uno más
  lexicon: BDAG
  rationale: «Ἄλλον» indica otro distinto del primero. «Otro» es la equivalencia natural y directa en español; la relación con Jesús como precedente queda dada por el contexto inmediato.
- source_word: παράκλητον
  english_pob_choice: Advocate
  chosen_spanish: Abogado
  alternatives_spanish:
  - Ayudador
  - Consolador
  - Consejero
  lexicon: BDAG
  rationale: Para παράκλητος, «Abogado» conserva mejor la fuerza personal y relacional de alguien que representa, defiende y actúa a favor de otros. «Ayudador» o «Consolador» reducen la amplitud del término; «Consejero» puede sugerir solo orientación. Se mantiene la tensión semántica sin resolverla por completo.
- source_word: δώσει ὑμῖν
  english_pob_choice: he will give you
  chosen_spanish: les dará
  alternatives_spanish:
  - les va a dar
  - les entregará
  lexicon: BDAG
  rationale: El futuro de δίδωμι se vierte naturalmente como «dará». Se usa «les» porque el destinatario es plural en el griego (ὑμῖν).
- source_word: ἵνα ᾖ
  english_pob_choice: so that he may be
  chosen_spanish: para que esté
  alternatives_spanish:
  - a fin de que esté
  - para que pueda estar
  lexicon: BDAG
  rationale: ἵνα con subjuntivo expresa propósito. «Para que esté» reproduce el valor final con naturalidad en español y conserva el subjuntivo sin añadir matices no explicitados.
- source_word: μεθ’ ὑμῶν
  english_pob_choice: with you
  chosen_spanish: con ustedes
  alternatives_spanish:
  - entre ustedes
  - junto a ustedes
  lexicon: BDAG
  rationale: μετά con genitivo significa «con». En español, «con ustedes» es claro y directo; «entre ustedes» sería posible en algunos contextos, pero aquí el sentido principal es compañía/presencia con los discípulos.
- source_word: εἰς τὸν αἰῶνα
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - para la eternidad
  lexicon: BDAG
  rationale: La expresión idiomática εἰς τὸν αἰῶνα comunica duración permanente. «Para siempre» es la equivalencia más natural y estable en español bíblico contemporáneo.
theological_decisions:
- issue: Naturaleza de παράκλητος en una promesa trinitaria
  english_pob_reading: Advocate
  chosen_spanish_reading: Abogado
  alternative_spanish_readings:
  - Ayudador
  - Consolador
  - Consejero
  rationale: La promesa de «otro παράκλητος» debe sonar personal y relacional, no meramente funcional. «Abogado» preserva la idea de representación y apoyo activo sin cerrarla en una sola faceta. Se conservan alternativas porque el término sigue siendo semánticamente amplio y teológicamente importante.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica y no simplificar términos clave cuando el original es amplio.'
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente sin cambios sustantivos: se mantiene la lectura óptima del griego de SBLGNT, con atención especial a la amplitud semántica de παράκλητος y a la duración idiomática de εἰς τὸν αἰῶνα.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usa el tratamiento plural «ustedes» para ὑμῖν, coherente con el destinatario plural del discurso.
  - Se conserva un español bíblico moderno y digno, evitando calcos rígidos como «para que él sea con ustedes» o «por el siglo».
