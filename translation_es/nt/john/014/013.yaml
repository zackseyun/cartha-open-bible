  glossary_alignment: No hay conflictos con la terminología del proyecto. «Padre», «Hijo», «en mi nombre» y «sea glorificado» están bien. La decisión de mantener «en el Hijo» en el texto principal coincide con la rationale documentada; la alternativa «por medio del Hijo» debe permanecer solo en nota, correctamente ubicada.
  issues:
  - severity: medium
    issue: Marcador de nota al pie ubicado en la frase equivocada
    rationale: La nota [a] explica la alternativa de ἐν τῷ υἱῷ («en el Hijo» / «por medio del Hijo»), pero en el borrador el marcador está colocado en «pidan». Esto rompe la trazabilidad entre nota y lugar textual relevante.
  revised_spanish_text: Y cualquier cosa que pidan en mi nombre, esto haré, para que el Padre sea glorificado en el Hijo[a].
  revised_footnotes:
  - marker: a
    text: O «por medio del Hijo». El griego dice «en el Hijo», lo que puede expresar la esfera o el medio por el cual el Padre es glorificado.
    reason: alternative_reading
  revision_rationale: Se conserva el texto base porque es fiel y legible. Solo se corrige la ubicación del marcador de la nota para que ancle correctamente la alternativa interpretativa de «en el Hijo».
