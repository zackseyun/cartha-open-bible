translation:
  language: es
  text: Y cualquier cosa que pidan en mi nombre, esto haré, para que el Padre sea glorificado en el Hijo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por medio del Hijo». El griego dice «en el Hijo», lo que puede expresar la esfera o el medio por el cual el Padre es glorificado.
    reason: alternative_reading
lexical_decisions:
- source_word: ὅ τι ἂν
  english_pob_choice: whatever
  chosen_spanish: cualquier cosa que
  alternatives_spanish:
  - lo que
  - todo lo que
  lexicon: BDAG
  rationale: La construcción relativa-indefinida con ἄν expresa amplitud e indefinición. En español, «cualquier cosa que» conserva bien ese alcance abierto; «lo que» sería más natural pero menos explícito, y «todo lo que» intensifica un poco más de lo que exige el griego.
- source_word: αἰτήσητε
  english_pob_choice: you ask
  chosen_spanish: pidan
  alternatives_spanish:
  - pidan ustedes
  - soliciten
  lexicon: BDAG
  rationale: αἰτέω significa pedir o solicitar. En contexto de oración, «pidan» es idiomático y directo en español. Se usa la segunda persona plural para reflejar la forma verbal griega.
- source_word: ἐν τῷ ὀνόματί μου
  english_pob_choice: in my name
  chosen_spanish: en mi nombre
  alternatives_spanish:
  - por mi autoridad
  - por medio de mi nombre
  lexicon: BDAG
  rationale: Se conserva la expresión joánica estable «en mi nombre» porque en español transmite mejor la carga relacional, representativa y teológica de la frase sin reducirla a una sola paráfrasis explicativa.
- source_word: τοῦτο
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - eso
  lexicon: BDAG
  rationale: El demostrativo está explícito en griego y conviene mantenerlo. «Esto haré» conserva el énfasis y la proximidad sintáctica del original.
- source_word: ποιήσω
  english_pob_choice: I will do
  chosen_spanish: haré
  alternatives_spanish:
  - lo haré
  - llevaré a cabo
  lexicon: BDAG
  rationale: ποιέω aquí es amplio y sencillo. «Haré» resulta natural en español y mantiene la cercanía al griego sin añadir matices interpretativos.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: ἵνα introduce propósito. «Para que» comunica claramente la finalidad en español contemporáneo y conserva bien el sentido.
- source_word: δοξασθῇ
  english_pob_choice: may be glorified
  chosen_spanish: sea glorificado
  alternatives_spanish:
  - reciba gloria
  - sea honrado
  lexicon: BDAG
  rationale: El pasivo de δοξάζω se traduce mejor con «sea glorificado», preservando el lenguaje bíblico de gloria y evitando rebajarlo a «ser honrado», que es más débil.
- source_word: ὁ πατὴρ
  english_pob_choice: the Father
  chosen_spanish: el Padre
  alternatives_spanish:
  - mi Padre
  lexicon: BDAG
  rationale: El griego dice simplemente «el Padre»; se conserva el artículo y la designación divina distintiva en el uso joánico.
- source_word: ἐν τῷ υἱῷ
  english_pob_choice: in the Son
  chosen_spanish: en el Hijo
  alternatives_spanish:
  - por medio del Hijo
  - a través del Hijo
  lexicon: BDAG
  rationale: Se mantiene la preposición «en» para no resolver prematuramente la relación semántica. «En el Hijo» preserva la tensión entre esfera y medio que el griego permite.
theological_decisions:
- issue: Sentido de «en mi nombre»
  english_pob_reading: Retained as 'in my name' without paraphrastic expansion.
  chosen_spanish_reading: Mantenido como «en mi nombre» sin expansión explicativa en el texto principal.
  alternative_spanish_readings:
  - por mi autoridad
  - en unión conmigo
  - conforme a mi voluntad y carácter
  rationale: La frase tiene una densidad teológica reconocida en Juan. Mantenerla literal preserva su alcance relacional, representativo y de autoridad sin imponer una sola explicación en el cuerpo del texto.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it.
- issue: Valor de ἐν τῷ υἱῷ
  english_pob_reading: Rendered 'in the Son.'
  chosen_spanish_reading: «en el Hijo» en el texto principal.
  alternative_spanish_readings:
  - por medio del Hijo
  - a través del Hijo
  rationale: El griego permite entender la expresión como esfera o medio. La traducción principal conserva la formulación más cercana al original y deja abierta la tensión interpretativa.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no se requieren cambios respecto al acuerdo alto del audit trail en inglés. La redacción española sigue la misma estrategia de equivalencia óptima y preserva la tensión interpretativa de ἐν τῷ υἱῷ.'
  spanish_consistency_notes:
  - Se mantuvo «Padre» y «Hijo» con artículo definido, conforme al griego.
  - Se preservó la construcción «en mi nombre» como fórmula joánica estable.
  - «Sea glorificado» conserva el registro bíblico de δόξα sin introducir una paráfrasis doctrinal más estrecha.
  - La puntuación separa con coma la cláusula de propósito para reflejar el flujo del original griego.
