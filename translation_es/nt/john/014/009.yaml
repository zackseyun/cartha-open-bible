translation:
  language: es
  text: 'Jesús le dijo[a]: «¿Tanto tiempo he estado con ustedes, y todavía tú no me has conocido, Felipe? El que me ha visto ha visto al Padre. ¿Cómo puedes decir: “Muéstranos al Padre”?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por tanto tiempo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Τοσούτῳ χρόνῳ
  english_pob_choice: for so long
  chosen_spanish: Tanto tiempo
  alternatives_spanish:
  - Por tanto tiempo
  - Durante tanto tiempo
  - Hace tanto tiempo
  lexicon: BDAG
  rationale: El dativo de extensión/duración expresa un lapso prolongado; «Tanto tiempo» mantiene la fuerza temporal y suena natural en español sin añadir contenido ajeno.
- source_word: μεθ’ ὑμῶν εἰμι
  english_pob_choice: have I been with you
  chosen_spanish: he estado con ustedes
  alternatives_spanish:
  - estoy con ustedes
  - he permanecido con ustedes
  lexicon: BDAG
  rationale: Aunque el griego usa presente, el español idiomático pide un perfecto para una presencia continua hasta ahora. «He estado con ustedes» conserva la idea de duración.
- source_word: οὐκ ἔγνωκάς με
  english_pob_choice: you still have not known me
  chosen_spanish: no me has conocido
  alternatives_spanish:
  - todavía no me has conocido
  - no me conoces
  lexicon: BDAG
  rationale: El perfecto de γινώσκω señala el estado resultante de no haber llegado a conocerlo. En español, «no me has conocido» conserva bien ese valor; el contexto ya aporta el tono de reprensión.
- source_word: ὁ ἑωρακὼς ἐμὲ
  english_pob_choice: The one who has seen me
  chosen_spanish: El que me ha visto
  alternatives_spanish:
  - Quien me ha visto
  - El que ha visto me
  lexicon: BDAG
  rationale: El participio perfecto articular se naturaliza como una relativa sustantivada. «El que» es claro, fiel y común en español bíblico contemporáneo.
- source_word: ἑώρακεν τὸν πατέρα
  english_pob_choice: has seen the Father
  chosen_spanish: ha visto al Padre
  alternatives_spanish:
  - ha visto al Padre mío
  - ha visto al Padre
  lexicon: BDAG
  rationale: El griego dice «al Padre» con artículo definido; en español conviene el objeto directo personal «al Padre». Mantiene la formulación teológica joánica sin suavizarla.
- source_word: πῶς σὺ λέγεις
  english_pob_choice: How can you say
  chosen_spanish: ¿Cómo dices?
  alternatives_spanish:
  - ¿Cómo puedes decir?
  - ¿Por qué dices?
  lexicon: BDAG
  rationale: El valor retórico de πῶς aquí expresa extrañeza e incredulidad. En español, la pregunta breve «¿Cómo dices?» reproduce esa confrontación directa sin sobreexplicar.
- source_word: Δεῖξον ἡμῖν τὸν πατέρα
  english_pob_choice: Show us the Father
  chosen_spanish: Muéstranos al Padre
  alternatives_spanish:
  - Revelanos al Padre
  - Enséñanos al Padre
  lexicon: BDAG
  rationale: El imperativo aoristo de δείκνυμι se traduce naturalmente como «muéstranos». Se conserva la petición directa y la referencia al mismo Padre mencionado en el versículo anterior.
theological_decisions:
- issue: Relación entre ver a Jesús y ver al Padre
  english_pob_reading: Rendered the statement straightforwardly as 'The one who has seen me has seen the Father' without interpretive expansion.
  chosen_spanish_reading: El que me ha visto, ha visto al Padre.
  alternative_spanish_readings:
  - El que me ha visto ha visto al Padre
  - Quien me ha visto ha visto al Padre
  - El que me ha visto ha visto lo que es el Padre
  rationale: La traducción conserva la afirmación cristológica en su forma directa, sin rebajarla a mera semejanza ni añadir una paráfrasis explicativa que no está en el griego.
  doctrine_reference: Nicene Creed (381 AD); Chalcedon (451 AD); Translation philosophy §3 preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior incorporando el marcador [a] directamente en el texto español. No se hicieron otros cambios de fondo respecto del sentido del versículo; se mantuvo la equivalencia óptima y la formulación cristológica directa del texto griego.
  spanish_consistency_notes:
  - Se mantiene «Padre» con artículo definido para reflejar τὸν πατέρα.
  - Se usa «al Padre» con la a personal, normal en español cuando el objeto directo es personal.
  - «El que» conserva el valor sustantivado del participio griego sin arcaísmo.
  - No se introduce «Cristo» ni «SEÑOR» porque el versículo nombra explícitamente a Jesús y al Padre.
