translation:
  language: es
  text: 'Judas (no el Iscariote) le dijo: «Señor, ¿qué ha sucedido, que vas a manifestarte[b] a nosotros y no al mundo?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: b
    text: O «darte a conocer a nosotros» o «revelarte».
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει
  english_pob_choice: said
  chosen_spanish: le dijo
  alternatives_spanish:
  - dijo
  lexicon: BDAG
  rationale: El presente histórico griego se vierte naturalmente en pasado narrativo en español; el dativo αὐτῷ queda explícito en «le dijo», conservando la dirección del habla sin sobrecargar la frase.
- source_word: Ἰούδας, οὐχ ὁ Ἰσκαριώτης
  english_pob_choice: Judas (not Iscariot)
  chosen_spanish: Judas, no el Iscariote
  alternatives_spanish:
  - Judas (no Iscariote)
  - Judas, no Iscariote
  lexicon: BDAG
  rationale: Se mantiene el nombre «Judas» y la aclaración identificadora por contraste con Iscariote. En español, la aposición negativa «no el Iscariote» reproduce bien la aclaración del texto sin introducir un nombre distinto.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: En la invocación directa a Jesús, «Señor» conserva el valor honorífico y teológico de κύριος y es el equivalente natural en español eclesial contemporáneo.
- source_word: τί γέγονεν
  english_pob_choice: what has happened
  chosen_spanish: ¿qué ha sucedido?
  alternatives_spanish:
  - ¿qué ha acontecido?
  - ¿qué ha pasado?
  lexicon: BDAG
  rationale: El perfecto de γίνομαι comunica un hecho ya ocurrido con resultado presente. «Ha sucedido» mantiene esa fuerza de acontecimiento sin sonar rígido.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: para que
  alternatives_spanish:
  - que
  - de modo que
  lexicon: BDAG
  rationale: En esta pregunta, ὅτι introduce la relación que Judas percibe entre el hecho preguntado y la intención de Jesús. «Para que» expresa la finalidad percibida en español y evita una subordinada incómoda; aun así, se conserva la tensión de la pregunta, no una afirmación causal cerrada.
- source_word: ἡμῖν
  english_pob_choice: to us
  chosen_spanish: a nosotros
  alternatives_spanish:
  - a nosotros los discípulos
  - para nosotros
  lexicon: BDAG
  rationale: El dativo de destinatario se expresa de forma directa en español con «a nosotros», manteniendo el contraste con «al mundo».
- source_word: μέλλεις
  english_pob_choice: you are going to
  chosen_spanish: te dispongas a
  alternatives_spanish:
  - vayas a
  - estés por
  lexicon: BDAG
  rationale: μέλλω con infinitivo puede expresar intención o inminencia. «Te dispongas a» conserva la orientación futura/intencional sin forzar una inmediatez excesiva; refleja que la revelación aún está por ocurrir.
- source_word: ἐμφανίζειν σεαυτόν
  english_pob_choice: reveal yourself
  chosen_spanish: manifestarte
  alternatives_spanish:
  - revelarte
  - darte a conocer
  lexicon: BDAG
  rationale: El verbo ἐμφανίζω abarca hacer visible, dar a conocer o manifestar. «Manifestarte» conserva la fuerza verbal y refleja bien la auto-revelación del sujeto; «revelarte» y «darte a conocer» quedan como alternativas interpretativas válidas.
- source_word: κόσμῳ
  english_pob_choice: the world
  chosen_spanish: al mundo
  alternatives_spanish:
  - al mundo en general
  - a la humanidad
  lexicon: BDAG
  rationale: Se preserva «el mundo» como vocabulario joánico cargado teológicamente. El contraste con «a nosotros» queda claro sin resolver de antemano el alcance teológico de κόσμος.
theological_decisions:
- issue: Naturaleza de la auto-manifestación de Jesús
  english_pob_reading: reveal yourself / manifest yourself
  chosen_spanish_reading: manifestarte
  alternative_spanish_readings:
  - revelarte
  - darte a conocer
  rationale: El griego ἐμφανίζειν σεαυτόν admite la idea de hacerse visible o conocido. «Manifestarte» conserva la ambigüedad útil entre visibilidad y auto-revelación, sin reducirla a una sola explicación.
  doctrine_reference: Preservar tensión léxica y cristológica sin resolverla de más.
- issue: Sentido de κόσμος en Juan
  english_pob_reading: the world
  chosen_spanish_reading: el mundo
  alternative_spanish_readings:
  - la humanidad
  - el orden del mundo incrédulo
  rationale: Juan usa κόσμος con densidad teológica, pero este versículo no obliga a escoger una glosa explicativa. «El mundo» mantiene la tensión y deja que el contexto juánico determine el matiz.
  doctrine_reference: Preservar la tensión teológica del término joánico.
translation_notes:
  revision_awareness: Se tuvo en cuenta el pasaje inglés auditado y el estado de revisión más reciente, que indica alta concordancia y ningún cambio necesario. La redacción española sigue la misma línea de equivalencia óptima, pero adapta la sintaxis al español sin perder las decisiones léxicas clave ni la tensión teológica documentada.
  spanish_consistency_notes:
  - Se mantiene «Judas» para Ἰούδας y la aclaración negativa distingue claramente de Iscariote.
  - «Señor» conserva el tratamiento directo a Jesús y evita el calco de «Lord».
  - El contraste «a nosotros / al mundo» reproduce la estructura relacional del original.
  - «Manifestarte» respeta el campo semántico de ἐμφανίζειν sin convertirlo en una glosa explicativa única.
