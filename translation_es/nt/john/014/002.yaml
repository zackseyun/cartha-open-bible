    reason: lexical_alternative
  - marker: b
    text: O, 'Si no fuera así, les habría dicho, porque voy a preparar un lugar para ustedes'. La cláusula griega también puede leerse como una afirmación y no como una pregunta retórica.
    reason: alternative_reading
  revision_rationale: Se ajusta la cláusula final para reflejar con más precisión la estructura del griego y la decisión léxica ya documentada para ὑμῖν ('para ustedes'), sin cambiar la lectura principal ni el tono del versículo.
