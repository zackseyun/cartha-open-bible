  text: In my Father's house there are many dwelling places[a]. If it were not so[b], would I have told you that I am going to prepare a place for you?
  footnotes:
  - marker: a
    text: Or, 'many rooms.' The Greek word can mean places to stay or dwell; 'dwelling places' is broader and preserves the connection to the theme of abiding in this chapter.
    reason: lexical_alternative
  - marker: b
    text: Or, 'If it were not so, I would have told you, because I am going to prepare a place for you.' The Greek clause can also be taken as a statement rather than a rhetorical question.
