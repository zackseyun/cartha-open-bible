translation:
  language: es
  text: En la casa de mi Padre hay muchas moradas[a]. Si no fuera así[b], ¿les habría dicho que voy a preparar un lugar para ustedes?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, 'muchos aposentos'. La palabra griega puede significar lugares donde uno se queda o habita; 'moradas' es más amplio y conserva la conexión con el tema de permanecer en este capítulo.
    reason: lexical_alternative
  - marker: b
    text: O, 'Si no fuera así, les habría dicho, porque voy a preparar un lugar para ustedes'. La cláusula griega también puede leerse como una afirmación y no como una pregunta retórica.
    reason: alternative_reading
lexical_decisions:
- source_word: οἰκίᾳ
  english_pob_choice: house
  chosen_spanish: casa
  alternatives_spanish:
  - hogar
  - casa de habitación
  lexicon: BDAG
  rationale: οἰκία designa aquí la imagen concreta de la casa; en español, 'casa' preserva de manera natural esa imagen y conserva la expresión joánica tradicional 'la casa de mi Padre' sin convertirla en una paráfrasis abstracta.
- source_word: πατρός μου
  english_pob_choice: my Father's
  chosen_spanish: de mi Padre
  alternatives_spanish:
  - de mi Padre celestial
  - de mi Padre
  lexicon: BDAG
  rationale: El genitivo posesivo se expresa de forma idiomática en español con 'de mi Padre'. No hace falta explicitar 'celestial' porque el referente ya es claro en el discurso de Jesús.
- source_word: μοναὶ πολλαί
  english_pob_choice: many dwelling places
  chosen_spanish: muchas moradas
  alternatives_spanish:
  - muchos lugares para morar
  - muchos aposentos
  - muchos lugares de morada
  lexicon: BDAG
  rationale: μονή puede significar lugar donde uno permanece o habita. 'Moradas' mantiene la amplitud semántica y la resonancia bíblica en español, sin restringir indebidamente la imagen a 'habitaciones'. Aunque 'moradas' es tradicional, aquí sigue siendo una equivalencia válida y amplia para el término griego.
- source_word: εἰ δὲ μή
  english_pob_choice: If it were not so
  chosen_spanish: Si no fuera así
  alternatives_spanish:
  - Si no fuera de otro modo
  - Si no fuera así
  lexicon: BDAG
  rationale: La expresión condicional se vierte con una cláusula completa y natural en español. 'Si no fuera así' comunica bien la condición implícita sin añadir contenido extra.
- source_word: εἶπον ἂν ὑμῖν
  english_pob_choice: would I have told you
  chosen_spanish: ¿les habría dicho
  alternatives_spanish:
  - les habría dicho
  - ¿les diría
  lexicon: BDAG
  rationale: El aoristo con ἄν en este contexto condicional se expresa bien con el condicional compuesto en español. Se conserva el tono interrogativo del contexto sin forzar la sintaxis.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - que
  lexicon: BDAG
  rationale: Aquí ὅτι introduce el contenido de lo dicho; 'que' es la opción más directa y natural en español. La alternativa causal se conserva en la nota porque la cláusula completa admite otra lectura.
- source_word: πορεύομαι
  english_pob_choice: I am going
  chosen_spanish: voy
  alternatives_spanish:
  - estoy yendo
  - me voy
  lexicon: BDAG
  rationale: El presente medio puede funcionar con sentido progresivo o inminente. En español, 'voy' transmite con naturalidad esa inminencia sin alargar la frase.
- source_word: ἑτοιμάσαι
  english_pob_choice: to prepare
  chosen_spanish: a preparar
  alternatives_spanish:
  - para preparar
  - a disponer
  lexicon: BDAG
  rationale: El infinitivo de propósito se expresa de forma natural con 'a preparar' en español, manteniendo la finalidad de la acción.
- source_word: τόπον
  english_pob_choice: a place
  chosen_spanish: un lugar
  alternatives_spanish:
  - un sitio
  - un lugar
  lexicon: BDAG
  rationale: τόπος es amplio y no debe reducirse a 'cuarto' o 'habitación'. 'Un lugar' conserva esa amplitud y armoniza con 'moradas' al inicio del versículo.
- source_word: ὑμῖν
  english_pob_choice: for you
  chosen_spanish: para ustedes
  alternatives_spanish:
  - para ustedes
  - para vosotros
  lexicon: BDAG
  rationale: El dativo plural se vierte de manera natural como beneficio/destino con 'para ustedes'. En español latinoamericano es la forma más clara y respetuosa.
theological_decisions:
- issue: Traslado de μονή en un contexto escatológico y de permanencia
  english_pob_reading: many dwelling places
  chosen_spanish_reading: muchas moradas
  alternative_spanish_readings:
  - muchas habitaciones
  - muchos aposentos
  - muchos lugares para morar
  rationale: La imagen no debe estrecharse a subdivisiones arquitectónicas como 'habitaciones'. 'Moradas' preserva la idea de permanencia, de alojamiento y de pertenencia en la casa del Padre, sin introducir una imagen más limitada que la del griego.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Puntuación y fuerza de la segunda cláusula
  english_pob_reading: 'rendered as a rhetorical question: ''If it were not so, would I have told you that I am going to prepare a place for you?'''
  chosen_spanish_reading: Si no fuera así, ¿les habría dicho que voy a prepararles un lugar?
  alternative_spanish_readings:
  - Si no fuera así, les habría dicho que voy a prepararles un lugar.
  - Si no fuera así, ¿les habría dicho, porque voy a prepararles un lugar?
  rationale: El griego permite más de una segmentación de la cláusula, especialmente en torno a ὅτι. La pregunta retórica funciona bien en español y reproduce la tensión del texto; se preserva también la posibilidad alternativa en nota.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'Último pasaje de revisión: modelo gpt-5.4 (2026-04-23T09:47:13Z), sin cambios; estado de alta concordancia (agreement 1.0). No hubo revisiones aplicadas en el ciclo más reciente.'
  spanish_consistency_notes:
  - Se mantiene 'Padre' con mayúscula para reflejar el referente divino en el discurso de Jesús, en línea con la convención editorial del proyecto.
  - Se preserva la amplitud semántica de μονή con 'moradas', evitando tanto 'habitaciones' como 'mansiones', que estrechan o exageran el sentido.
  - '''Lugar'' se reserva para τόπος, evitando ''cuarto'' o ''habitación'' para no sobreespecificar el espacio preparado.'
  - Se usa 'ustedes' por naturalidad del español latinoamericano y por el valor plural del dativo griego.
