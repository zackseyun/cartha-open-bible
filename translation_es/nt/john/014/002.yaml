revisions:
- from: En la casa de mi Padre hay muchas moradas[a]. Si no fuera así[b], ¿les habría dicho que voy a prepararles un lugar?
  to: En la casa de mi Padre hay muchas moradas[a]. Si no fuera así[b], ¿les habría dicho que voy a preparar un lugar para ustedes?
  rationale: Se ajusta la cláusula final para reflejar con más precisión la estructura del griego y la decisión léxica ya documentada para ὑμῖν ('para ustedes'), sin cambiar la lectura principal ni el tono del versículo.
