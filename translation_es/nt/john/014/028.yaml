review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva en general el sentido del griego y la línea de la POB en inglés: oído previo, ida y venida, condición contraria a los hechos, ida al Padre, y la comparación literal «el Padre es mayor que yo». Sin embargo, hay un problema importante de número/pronombres: el griego usa plural de principio a fin para los discípulos (ἠκούσατε, ὑμῖν, ὑμᾶς, ἠγαπᾶτέ, ἐχάρητε), pero el español mezcla singular («oíste», «te dije», «te habrías alegrado») con plural («a ustedes»). Eso distorsiona la referencia y produce incoherencia interna.'
  spanish_quality_summary: El español es claro, pero la mezcla singular/plural suena descuidada e infiel al original. Además, «de que voy al Padre» es comprensible, pero tras «alegrarse» suele fluir mejor «de que voy al Padre» o «porque voy al Padre»; aquí puede mantenerse «de que» por cercanía al inglés auditado, aunque conviene regularizar todo el versículo en plural. La nota b usa «status», anglicismo menos natural; «estatus» o mejor «posición»/«rango» sería más idiomático. También es preferible «ustedes habrían...» en vez de «se habrían...» para conservar la segunda persona plural latinoamericana.
  glossary_alignment: No hay conflicto con los términos base del proyecto. «el Padre» preserva bien πατήρ como título; «mayor que yo» mantiene μείζων μού sin glosa interpretativa, conforme a la decisión teológica auditada. No intervienen Yahvé/Mesías/etc. Se debe corregir solamente la concordancia pronominal y mejorar la naturalidad de la nota explicativa.
  issues:
  - severity: high
    issue: Mezcla indebida de singular y plural en la dirección a los discípulos
    rationale: El texto griego está íntegramente en segunda persona plural. «Oíste», «te dije» y «te habrías alegrado» no preservan esa referencia y chocan con «a ustedes».
  - severity: medium
    issue: Justificación léxica de «te dije» como singular genérico
    rationale: La propia nota léxica reconoce que «les dije» sería la concordancia explícita; en este versículo no hay base textual para singular genérico.
  - severity: low
    issue: 'Anglicismo en la nota b: «status»'
    rationale: En español eclesial general «estatus» o mejor «rango/posición» es más natural y digno que «status».
