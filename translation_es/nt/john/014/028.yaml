  text: ἠκούσατε ὅτι ἐγὼ εἶπον ὑμῖν· Ὑπάγω καὶ ἔρχομαι πρὸς ὑμᾶς. εἰ ἠγαπᾶτέ με ἐχάρητε ἄν, ⸀ὅτι πορεύομαι πρὸς τὸν πατέρα, ὅτι ὁ ⸀πατὴρ μείζων μού ἐστιν.
base_translation:
  language: en
  yaml_path: translation/nt/john/014/028.yaml
  text: You heard that I said to you[a], ‘I am going away, and I am coming to you.’ If you loved me, you would have rejoiced that I am going to the Father[b], because the Father is greater than I.
  footnotes:
  - marker: a
    text: Or, 'you would rejoice that I am going to the Father.' The Greek form may be rendered more generally, but 'would have rejoiced' best fits the contrary-to-fact condition in context.
    reason: lexical_alternative
  - marker: b
    text: '''The Father is greater than I'' is translated as written without adding an interpretive qualifier such as ''in role'' or ''in status.'''
    reason: alternative_reading
