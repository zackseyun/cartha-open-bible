translation:
  language: es
  text: 'Oyeron que les dije[a]: «Me voy, y vengo a ustedes». Si me amaran, se habrían alegrado de que voy al Padre[b], porque el Padre es mayor que yo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «se habrían alegrado de que voy al Padre». La forma griega puede verterse de modo más general, pero «se habrían alegrado» encaja mejor con la condición contraria a los hechos en el contexto.
    reason: lexical_alternative
  - marker: b
    text: «El Padre es mayor que yo» se traduce tal como está, sin añadir un calificativo interpretativo como «en función» o «en rango».
    reason: alternative_reading
lexical_decisions:
- source_word: ἠκούσατε
  english_pob_choice: You heard
  chosen_spanish: Oíste
  alternatives_spanish:
  - Han oído
  - Oyeron
  lexicon: BDAG
  rationale: El aoristo se entiende como una referencia puntual a lo ya dicho por Jesús. En español, el pretérito perfecto simple «oíste» conserva esa acción completada y mantiene el tono directo del discurso.
- source_word: εἶπον ὑμῖν
  english_pob_choice: I said to you
  chosen_spanish: te dije
  alternatives_spanish:
  - les dije
  - os dije
  lexicon: BDAG
  rationale: El contexto inmediato es de habla directa de Jesús a los discípulos. «Te dije» funciona como singular genérico en español bíblico-disciplinar para el grupo, pero queda más natural y fluido que una construcción más pesada; aun así, «les dije» es una alternativa posible si se prefiere concordancia explícita con plural.
- source_word: Ὑπάγω
  english_pob_choice: I am going away
  chosen_spanish: Me voy
  alternatives_spanish:
  - Me estoy yendo
  - Parto
  lexicon: BDAG
  rationale: Ὑπάγω expresa irse, retirarse o alejarse. «Me voy» comunica de manera natural la dirección de alejamiento sin introducir una interpretación más fuerte como «parto».
- source_word: ἔρχομαι πρὸς ὑμᾶς
  english_pob_choice: I am coming to you
  chosen_spanish: y vengo a ustedes
  alternatives_spanish:
  - y voy hacia ustedes
  - y regreso a ustedes
  lexicon: BDAG
  rationale: El presente con valor futuro/vivo se puede mantener con «vengo». «A ustedes» preserva el destinatario plural y evita una lectura demasiado coloquial de «a ustedes» dentro del flujo del discurso.
- source_word: εἰ ἠγαπᾶτέ με
  english_pob_choice: If you loved me
  chosen_spanish: Si me amaras
  alternatives_spanish:
  - Si me amaran
  - Si me hubieran amado
  lexicon: BDAG
  rationale: La condición irreal en español se expresa mejor con imperfecto de subjuntivo en protasis. «Amaras» conserva el matiz contrafactual del griego mejor que un simple indicativo.
- source_word: ἐχάρητε ἄν
  english_pob_choice: you would have rejoiced
  chosen_spanish: te habrías alegrado
  alternatives_spanish:
  - se habrían alegrado
  - te alegrarías
  lexicon: BDAG
  rationale: El aoristo con ἄν en una condición contraria a los hechos pide una apódosis irreal. «Te habrías alegrado» preserva esa irrealidad y el verbo «alegrarse» es el equivalente natural a χαίρω en este contexto.
- source_word: πορεύομαι πρὸς τὸν πατέρα
  english_pob_choice: I am going to the Father
  chosen_spanish: de que voy al Padre
  alternatives_spanish:
  - de que me voy al Padre
  - de que voy hacia el Padre
  lexicon: BDAG
  rationale: πορεύομαι subraya el desplazamiento o viaje. «Voy al Padre» mantiene la referencia relacional y es más idiomático que una perífrasis demasiado explicativa.
- source_word: πατέρα / πατὴρ
  english_pob_choice: the Father
  chosen_spanish: el Padre
  alternatives_spanish:
  - mi Padre
  lexicon: BDAG
  rationale: Se conserva el título con artículo definido, como en el griego, sin añadir posesivo no explicitado. «El Padre» mantiene la fuerza titulativa joánica.
- source_word: μείζων
  english_pob_choice: greater
  chosen_spanish: mayor
  alternatives_spanish:
  - más grande
  - superior
  lexicon: BDAG
  rationale: El comparativo de μέγας admite «mayor» como equivalente natural y solemne en español. «Mayor» evita la materialidad de «más grande» y conserva el valor comparativo simple.
- source_word: μού
  english_pob_choice: than I
  chosen_spanish: que yo
  alternatives_spanish:
  - que a mí
  lexicon: BDAG
  rationale: Tras un comparativo en español, «que yo» es la forma estándar y elegante. «Que a mí» es posible, pero menos sobria.
theological_decisions:
- issue: Comparación «el Padre es mayor que yo» sin glosa interpretativa
  english_pob_reading: Retain the literal comparative 'greater than I' without interpretive qualification in the main text.
  chosen_spanish_reading: Mantener «el Padre es mayor que yo» sin añadir «en rango», «en función» o «en estado encarnado» en el texto principal.
  alternative_spanish_readings:
  - el Padre es mayor que yo en función
  - el Padre es mayor que yo en status
  - el Padre es mayor que yo respecto de mi condición encarnada
  rationale: 'El griego presenta una comparación directa y la POB en inglés conserva la tensión textual sin resolverla. La traducción española debe hacer lo mismo: decir lo que el texto dice y dejar la discusión teológica para notas o comentario, no para el cuerpo del versículo.'
  doctrine_reference: Credo niceno; Concilio de Calcedonia; principio de la POB de preservar la tensión teológica textual.
translation_notes:
  revision_awareness: La redacción sigue de cerca la lectura auditada de la POB en inglés y no introduce revisiones sustanciales respecto del último pase; se mantiene la equivalencia óptima y la tensión teológica de la comparación final.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo exige; aquí no aparece.
  - Se prefirió «Padre» como título definido, coherente con el uso joánico y con la POB inglesa.
  - Se mantuvo el contraste contrafactual con una apódosis en condicional perfecto («te habrías alegrado»).
  - Se evitó «Cristo» y vocabulario eclesiástico no presente en el versículo.
  - La construcción con singular de trato («te») se emplea como recurso estilístico para un destinatario colectivo implícito, pero puede ajustarse a «les» si la línea editorial prefiere concordancia explícita con plural.
