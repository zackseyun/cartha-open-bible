review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del griego: conserva la doble mención de «paz», el contraste con la manera en que el mundo da, y la exhortación final. Sin embargo, «ni tenga miedo» debilita ligeramente la distinción léxica que el POB inglés documenta para δειλιάω como ‘be fearful’ en contraste con ταράσσω ‘be troubled’. Una formulación como «ni sea temeroso» o «ni se llene de temor» preserva mejor esa diferencia sin moralizar en exceso.'
  spanish_quality_summary: El texto es claro, natural y ampliamente legible en español eclesial. «Les dejo la paz; mi paz les doy» suena digno y fiel. «No se turbe su corazón» mantiene bien la resonancia intrajoánica con Juan 14:1, aunque es algo más tradicional; sigue siendo inteligible. El único ajuste recomendable es afinar la segunda prohibición para evitar que suene demasiado genérica.
  glossary_alignment: No hay conflictos con la terminología de proyecto. «Paz» corresponde bien a εἰρήνην; «mundo» conserva κόσμος; no hay términos sensibles como Yahvé, Mesías, esclavo, etc. La decisión de mantener «su corazón» en singular es adecuada al colectivo singular griego.
  issues:
  - severity: medium
    issue: «ni tenga miedo» no refleja tan bien la distinción entre ταράσσω y δειλιάω
    rationale: El POB inglés distingue «be troubled» de «be fearful». En español, «tener miedo» es correcto en sentido general, pero pierde parte del matiz de volverse temeroso o falto de ánimo que δειλιάω aporta, y se diferencia menos nítidamente del primer verbo.
  - severity: low
    issue: La nota al pie omite la alternativa más cercana al texto principal inglés
    rationale: La nota ofrece «ni pierda el valor» y «ni se acobarde», pero no incluye una alternativa equivalente a «ni tenga temor»/«ni sea temeroso», que ayudaría a mostrar mejor el rango semántico sin cargar el verbo con tono moral.
  revised_spanish_text: Les dejo la paz; mi paz les doy. No les doy como el mundo da. No se turbe[a] su corazón, ni sea temeroso.
  revised_footnotes:
  - marker: a
    text: O «ni tenga miedo» o «ni pierda el valor». El verbo griego expresa la idea de llegar a tener temor o perder ánimo.
    reason: lexical_alternative
  revision_rationale: Se conserva todo el texto salvo la última cláusula, para reflejar mejor la distinción léxica entre ταράσσω («turbar») y δειλιάω («volverse temeroso/perder ánimo») documentada en la auditoría inglesa. La nota se ajusta para incluir una alternativa más natural en español y más cercana al matiz fuente.
