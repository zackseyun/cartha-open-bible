translation:
  language: es
  text: Les dejo la paz; mi paz les doy. No les doy como el mundo da. No se turbe[a] su corazón, ni sea temeroso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ni tenga miedo» o «ni pierda el valor». El verbo griego expresa la idea de llegar a tener temor o perder ánimo.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰρήνην
  english_pob_choice: Peace
  chosen_spanish: paz
  alternatives_spanish:
  - bienestar
  - plenitud
  lexicon: BDAG
  rationale: «Paz» es el equivalente natural y lexicalmente fiel; conserva la amplitud semántica de εἰρήνη sin restringirla a solo calma interior o reconciliación.
- source_word: ἀφίημι
  english_pob_choice: I leave
  chosen_spanish: les dejo
  alternatives_spanish:
  - les dejo atrás
  - les heredo
  lexicon: BDAG
  rationale: «Les dejo» expresa bien la acción presente y el tono directo del enunciado. «Heredar» o «legar» sugeriría una imagen testamentaria más interpretativa que el griego no exige en la línea principal.
- source_word: τὴν ἐμὴν
  english_pob_choice: my
  chosen_spanish: mi
  alternatives_spanish:
  - mi propia
  - la paz que es mía
  lexicon: BDAG
  rationale: El posesivo simple «mi» preserva la distinción enfática entre la paz de Jesús y la del mundo sin recargar el texto.
- source_word: δίδωμι
  english_pob_choice: I give
  chosen_spanish: les doy
  alternatives_spanish:
  - les entrego
  - les concedo
  lexicon: BDAG
  rationale: «Doy» mantiene la repetición verbal del versículo y el contraste con el dar del mundo. «Concedo» o «entrego» introducirían matices no necesarios en el texto principal.
- source_word: οὐ καθὼς ὁ κόσμος δίδωσιν
  english_pob_choice: I do not give to you as the world gives
  chosen_spanish: No les doy como el mundo da
  alternatives_spanish:
  - No les doy como da el mundo
  - No les doy del modo en que el mundo da
  lexicon: BDAG
  rationale: La comparación queda clara en español con una sintaxis natural. «El mundo» conserva la resonancia joánica de κόσμος sin explicar de más su alcance.
- source_word: μὴ ταρασσέσθω
  english_pob_choice: Do not let your heart be troubled
  chosen_spanish: No se turbe
  alternatives_spanish:
  - No se inquiete
  - No se alborote
  lexicon: BDAG
  rationale: «Turbe» reproduce bien la idea de agitación interna y mantiene la conexión con Juan 14:1. «Inquiete» es posible, pero es menos exacto al paralelismo joánico.
- source_word: ὑμῶν ἡ καρδία
  english_pob_choice: your heart
  chosen_spanish: su corazón
  alternatives_spanish:
  - sus corazones
  lexicon: BDAG
  rationale: El singular griego funciona como colectivo; en español, el singular «su corazón» suena natural y preserva el sentido de la comunidad discípular considerada en conjunto.
- source_word: μηδὲ δειλιάτω
  english_pob_choice: nor let it be fearful
  chosen_spanish: ni tenga miedo
  alternatives_spanish:
  - ni se acobarde
  - ni pierda el valor
  lexicon: BDAG
  rationale: «Tenga miedo» comunica el valor semántico básico de δειλιάω y evita una moralización excesiva. «Acobarde» o «pierda el valor» serían alternativas legítimas, pero más marcadas.
theological_decisions:
- issue: Naturaleza de la paz que Jesús da
  english_pob_reading: Render simply as 'Peace'/'my peace' without expanding it into reconciliation, inner calm, or eschatological shalom in the main text.
  chosen_spanish_reading: Traducir simplemente «paz» / «mi paz», sin desarrollar en el texto principal si se trata de reconciliación, calma interior o plenitud escatológica.
  alternative_spanish_readings:
  - paz interior
  - plenitud mesiánica
  - reconciliación con Dios
  rationale: El verso no define de forma estrecha la paz; mantener el término amplio preserva la tensión teológica y la riqueza del texto en lugar de resolverla prematuramente.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Sentido de δειλιάω frente a ταράσσω
  english_pob_reading: '''nor let it be fearful'' with a footnote allowing ''afraid'' or ''lose courage''.'
  chosen_spanish_reading: «ni tenga miedo», con posibilidad de nota para «ni pierda el valor» / «ni se acobarde».
  alternative_spanish_readings:
  - ni esté atemorizado
  - ni pierda el valor
  - ni se acobarde
  rationale: Conviene mantener la diferencia entre estar «turbado» y sentir miedo o perder ánimo, sin cargar el verbo con una condena moral innecesaria.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: El pasaje muestra una alta concordancia con el texto fuente y con el audit trail inglés. No se requirieron revisiones textuales adicionales; se mantuvo el contraste repetido entre «dar» y la dupla «turbar / tener miedo», con la nota solo para la alternativa léxica de δειλιάω.
  spanish_consistency_notes:
  - Se conservó «paz» sin ampliarlo a una paráfrasis doctrinal.
  - Se evitó «Cristo» porque el versículo no contiene Χριστός.
  - Se usó «mundo» para κόσμος siguiendo la preferencia POB y la resonancia joánica.
  - La nota al pie queda anclada en «miedo» para ofrecer la alternativa léxica sin alterar el cuerpo del texto.
  - El singular «corazón» se mantuvo para reflejar el colectivo singular griego.
