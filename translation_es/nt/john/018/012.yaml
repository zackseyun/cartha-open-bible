translation:
  language: es
  text: Entonces la cohorte[a], el comandante y los oficiales de los judíos prendieron a Jesús y lo ataron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de los líderes judíos» o «de los judeanos», según el contexto; Juan a menudo usa «los judíos» en un sentido más específico que todo el pueblo judío.
    reason: alternative_reading
lexical_decisions:
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - Entonces
  - Por tanto
  lexicon: BDAG
  rationale: Marca continuidad narrativa e inferencia; «Así que» suena natural en español moderno y conserva la función discursiva sin volverlo excesivamente formal.
- source_word: σπεῖρα
  english_pob_choice: cohort
  chosen_spanish: cohorte
  alternatives_spanish:
  - cohorte romana
  - destacamento
  - grupo de soldados
  lexicon: BDAG
  rationale: «Cohorte» conserva el sentido militar específico del término griego. «Romana» sería interpretativo, no explícito en la palabra misma.
- source_word: χιλίαρχος
  english_pob_choice: commander
  chosen_spanish: comandante
  alternatives_spanish:
  - tribuno
  - comandante militar
  - quilíarca
  lexicon: BDAG
  rationale: Designa al oficial a cargo; «comandante» es claro y digno en español. «Tribuno» es más histórico, pero menos inmediato; «quilíarca» sería demasiado transliterado.
- source_word: ὑπηρέται
  english_pob_choice: officers
  chosen_spanish: oficiales
  alternatives_spanish:
  - servidores
  - guardias
  - policías del templo
  lexicon: BDAG
  rationale: En este contexto juanino apunta a personal oficial de arresto o asistencia, no a sirvientes domésticos. «Oficiales» preserva esa función institucional sin sobreespecificar.
- source_word: τῶν Ἰουδαίων
  english_pob_choice: of the Jews
  chosen_spanish: de los judíos
  alternatives_spanish:
  - de los líderes judíos
  - de los judeanos
  lexicon: BDAG
  rationale: Se mantiene el genitivo de manera transparente, tal como hizo la POB en inglés, porque el texto griego no especifica «líderes» aquí. La posible restricción del referente se deja para nota.
- source_word: συνέλαβον
  english_pob_choice: seized
  chosen_spanish: prendieron
  alternatives_spanish:
  - apresaron
  - arrestaron
  - tomaron
  lexicon: BDAG
  rationale: El verbo expresa captura/aprehensión con fuerza física o de detención. «Prendieron» comunica bien esa acción en español narrativo sin añadir el matiz procedural de «arrestaron».
- source_word: ἔδησαν
  english_pob_choice: bound
  chosen_spanish: lo ataron
  alternatives_spanish:
  - lo sujetaron
  - lo vendaron
  - lo amarraron
  lexicon: BDAG
  rationale: «Ataron» reproduce el valor básico de δέω. Se conserva el objeto pronominal para claridad narrativa y fluidez en español.
theological_decisions:
- issue: Alcance de τῶν Ἰουδαίων en Juan
  english_pob_reading: Rendered literally as 'of the Jews' in the main text, with a note allowing narrower contextual senses.
  chosen_spanish_reading: «de los judíos» en el texto principal, con nota sobre posibles sentidos más específicos.
  alternative_spanish_readings:
  - «de los líderes judíos»
  - «de los judeanos»
  rationale: El griego no dice «líderes» y la traducción debe preservar esa forma antes que resolver la discusión interpretativa en el cuerpo del texto. La nota ayuda al lector a entender la posible restricción contextual sin borrar la frase original.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: 'Revisión final: no hubo cambios en el pase más reciente del texto fuente inglés; el draft español sigue directamente el trazado auditado sin introducir ajustes no respaldados por el original.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, aunque este versículo no contiene el nombre divino.
  - Se usa «cohorte» y «comandante» en línea con el registro militar del original, evitando equivalencias más eclesiásticas.
  - «Prendieron» conserva la fuerza narrativa de la captura sin añadir tecnicismos legales ajenos al griego.
