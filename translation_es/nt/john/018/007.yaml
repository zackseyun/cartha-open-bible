translation:
  language: es
  text: 'De nuevo, entonces, les preguntó: «¿A quién buscan?» Y ellos dijeron: «A Jesús el Nazareno»[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «Jesús de Nazaret»; griego: «Jesús el Nazareno».'
    reason: lexical_alternative
lexical_decisions:
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: De nuevo
  alternatives_spanish:
  - otra vez
  - nuevamente
  lexicon: BDAG
  rationale: Expresa repetición de forma natural en español narrativo. 'De nuevo' conserva el valor adverbial sin sonar rígido.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: entonces
  alternatives_spanish:
  - por tanto
  - así que
  lexicon: BDAG
  rationale: Aquí λειτουργa como conector narrativo. 'Entonces' reproduce la continuidad del relato sin cargar demasiado la inferencia.
- source_word: ἐπηρώτησεν
  english_pob_choice: asked
  chosen_spanish: preguntó
  alternatives_spanish:
  - interrogó
  - les preguntó
  lexicon: BDAG
  rationale: En español, 'preguntó' es el equivalente más natural y suficiente para una pregunta directa. La forma pronominal con 'les' queda integrada en la sintaxis española.
- source_word: Τίνα
  english_pob_choice: Whom
  chosen_spanish: ¿A quién?
  alternatives_spanish:
  - ¿A quiénes?
  - ¿Quién?
  lexicon: BDAG
  rationale: El acusativo interrogativo funciona como objeto de 'buscar'. '¿A quién?' refleja la función del caso de manera idiomática en español.
- source_word: ζητεῖτε
  english_pob_choice: are you seeking
  chosen_spanish: buscan
  alternatives_spanish:
  - están buscando
  - andan buscando
  lexicon: BDAG
  rationale: '''Buscar'' es el equivalente natural de ζητέω en este contexto. Se evita ''buscar a'' repetido de forma pesada al integrar la pregunta: ''¿A quién buscan?''.'
- source_word: οἱ δὲ εἶπαν
  english_pob_choice: And they said
  chosen_spanish: Y ellos dijeron
  alternatives_spanish:
  - Y respondieron
  - Entonces dijeron
  lexicon: BDAG
  rationale: '''Y ellos dijeron'' sigue el avance narrativo simple del griego con una construcción clara y estándar en español.'
- source_word: Ἰησοῦν
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  lexicon: BDAG
  rationale: Nombre propio estándar en español para Ἰησοῦς.
- source_word: τὸν Ναζωραῖον
  english_pob_choice: the Nazarene
  chosen_spanish: el Nazareno
  alternatives_spanish:
  - el Nazoreo
  - de Nazaret
  lexicon: BDAG
  rationale: '''Nazareno'' reproduce de forma idiomática el epíteto griego Ναζωραῖος y coincide con el valor identificador del texto. ''De Nazaret'' es una paráfrasis interpretativa y se reserva como alternativa.'
theological_decisions:
- issue: 'Epíteto de Jesús: Ναζωραῖος'
  english_pob_reading: the Nazarene
  chosen_spanish_reading: el Nazareno
  alternative_spanish_readings:
  - de Nazaret
  - el Nazoreo
  rationale: No se trata de un título doctrinal, sino de una designación histórica/identificadora. 'El Nazareno' conserva el matiz del griego sin forzar una explicación adicional.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; readable modern Spanish'
translation_notes:
  revision_awareness: No se registran revisiones posteriores en el pasaje; se sigue la lectura del SBLGNT y el audit trail inglés sin cambios relevantes.
  spanish_consistency_notes:
  - Se mantiene 'Jesús' como nombre propio y 'Nazareno' como epíteto identificador.
  - Se usa 'buscar' para ζητεῖτε, en línea con el valor verbal señalado en el contexto auditado.
  - La puntuación española ajusta la estructura directa de la pregunta y la respuesta sin añadir contenido.
