translation:
  language: es
  text: Ahora Simón Pedro seguía a Jesús[a], y también otro discípulo. Aquel discípulo era conocido por el sumo sacerdote, y entró con Jesús en el patio del sumo sacerdote,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Ahora Simón Pedro seguía a Jesús, y otro discípulo». El griego deja implícita la acción compartida del segundo discípulo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἠκολούθει
  english_pob_choice: was following
  chosen_spanish: seguía
  alternatives_spanish:
  - estaba siguiendo
  - seguía de cerca
  lexicon: BDAG
  rationale: El imperfecto griego expresa acción en curso; «seguía» mantiene esa duración narrativa en español sin sonar forzado.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y
  - Pero
  lexicon: BDAG
  rationale: Funciona como conector discursivo suave que avanza la narración; «Ahora» reproduce bien ese valor en español.
- source_word: καὶ ἄλλος μαθητής
  english_pob_choice: and so was another disciple
  chosen_spanish: y también otro discípulo
  alternatives_spanish:
  - y otro discípulo
  - y asimismo otro discípulo
  lexicon: BDAG
  rationale: El griego coordina a Pedro con otro discípulo bajo la misma acción implícita; en español, «y también» hace explícita esa acción compartida sin añadir explicación extra.
- source_word: μαθητής
  english_pob_choice: disciple
  chosen_spanish: discípulo
  alternatives_spanish:
  - seguidor
  lexicon: BDAG
  rationale: «Discípulo» es el equivalente establecido y preciso en este contexto joánico.
- source_word: ἐκεῖνος
  english_pob_choice: that
  chosen_spanish: Aquel
  alternatives_spanish:
  - Ese
  - El
  lexicon: BDAG
  rationale: El demostrativo remite al discípulo mencionado antes; «Aquel» conserva bien la referencia anafórica y el matiz de distancia textual.
- source_word: γνωστὸς
  english_pob_choice: known
  chosen_spanish: era conocido
  alternatives_spanish:
  - era conocido por
  - era familiar
  lexicon: BDAG
  rationale: «Conocido» es la forma más directa y sobria; con el complemento «del sumo sacerdote» expresa la relación sin exagerar el grado de cercanía.
- source_word: ἀρχιερεῖ / ἀρχιερέως
  english_pob_choice: high priest
  chosen_spanish: sumo sacerdote
  alternatives_spanish:
  - pontífice
  - sacerdote principal
  lexicon: BDAG
  rationale: «Sumo sacerdote» es la equivalencia estándar y clara en español bíblico, fiel al singular de ambas ocurrencias.
- source_word: συνεισῆλθεν
  english_pob_choice: went in with
  chosen_spanish: entró con
  alternatives_spanish:
  - entró junto con
  - fue adentro con
  lexicon: BDAG
  rationale: El compuesto con σύν expresa entrada conjunta; «entró con» conserva esa asociación de manera natural en español.
- source_word: αὐλήν
  english_pob_choice: courtyard
  chosen_spanish: patio
  alternatives_spanish:
  - patio interior
  - atrio
  lexicon: BDAG
  rationale: En español, «patio» comunica de forma clara el espacio cerrado de la residencia del sumo sacerdote; «atrio» sería más tradicional pero menos transparente para lectores modernos.
translation_notes:
  revision_awareness: La redacción sigue de cerca el griego SBLGNT y el expediente auditado en inglés. Se conserva el imperfecto narrativo de Ἠκολούθει, la coordinación implícita de καὶ ἄλλος μαθητής y el valor conjunto de συνεισῆλθεν. No se detectaron revisiones textuales en el expediente más reciente; el pasaje quedó igual en el último pase.
  spanish_consistency_notes:
  - Se mantuvo «Jesús» para Ἰησοῦς de manera uniforme.
  - Se mantuvo «discípulo» para μαθητής, conforme al uso joánico y al audit trail en inglés.
  - Se prefirió «sumo sacerdote» sobre alternativas más eclesiásticas o técnicas por claridad y fidelidad contextual.
  - Se prefirió «patio» para αὐλήν por transparencia para lectores actuales, sin añadir especificación no presente en el griego.
