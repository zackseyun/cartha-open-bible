revisions:
- from: Así que llevaron a Jesús desde Caifás al pretorio[a]. Era temprano por la mañana. Ellos mismos no entraron al pretorio, para no quedar contaminados[b], sino para poder comer la Pascua[c].
  to: Así que llevaron a Jesús desde Caifás al pretorio[a]. Era temprano por la mañana. Ellos mismos no entraron al pretorio, para no quedar impuros[b], sino para poder comer la Pascua[c].
  rationale: Se ajusta la expresión de μιανθῶσιν a «quedar impuros» para reflejar con más naturalidad la impureza ritual en español. Se conserva «sino para poder comer la Pascua» porque reproduce el contraste de propósito del griego mejor que una simple coordinación, pero dentro de una frase ya reparada por el cambio léxico principal. También se normaliza la nota de «pretorio» como alternativa española natural al término tradicional.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:05:18Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia narrativa y las decisiones principales del griego: llevaron a Jesús desde Caifás al πραιτώριον, era temprano, ellos mismos no entraron para no contraer impureza ritual y así poder comer la Pascua. También preserva la tensión interpretativa de «comer la Pascua» mediante nota. Sin embargo, la construcción española «sino para poder comer la Pascua» no corresponde al griego ἵνα μὴ ... ἀλλὰ ...; aquí ἀλλά coordina dos propósitos contrastados dentro de la misma cláusula final, no expresa contraste adversativo de acción principal. En español, «sino» tras «no entraron» sugiere erróneamente ‘no entraron, sino que hicieron otra cosa’.'
  spanish_quality_summary: El texto es claro y legible, con tono bíblico moderno. No obstante, «quedar contaminados» suena menos natural y menos preciso en registro bíblico que «quedar impuros» o «ser contaminados ritualmente», y la sintaxis con «sino para poder comer» resulta torpe y algo engañosa. Una redacción más natural y fiel es «para no quedar impuros[a], sino para poder comer la Pascua[b]» o incluso sin «sino», pero manteniendo el paralelismo de propósito. Conviene también reordenar las notas para que la de impureza ritual preceda a la de ‘comer la Pascua’, siguiendo el anclaje en el texto español.
  glossary_alignment: 'No hay conflictos con terminología de proyecto: «Jesús», «Caifás» y «Pascua» están bien. «Pretorio» es aceptable como excepción contextual documentada por nota, aunque el inglés POB prefirió una traducción explicativa; la justificación española es suficiente. El punto más débil es una preferencia léxica: para μιανθῶσιν, «impuros» se alinea mejor con el matiz ceremonial documentado que «contaminados».'
  issues:
  - severity: medium
    issue: Uso de «sino para poder comer la Pascua»
    rationale: 'El griego expresa dos fines coordinados de no entrar: evitar impureza y poder comer la Pascua. En español, «sino» después de «no entraron» puede sonar como corrección adversativa de la acción principal, no como segundo propósito contrastado.'
  - severity: low
    issue: «Quedar contaminados» para μιανθῶσιν
    rationale: Aunque posible, en español bíblico y eclesial «quedar impuros» comunica con mayor naturalidad la impureza ritual y evita resonancias modernas de contaminación física o ambiental.
  - severity: low
    issue: Orden de marcadores de notas en relación con el texto revisado
    rationale: Si se mantiene nota de impureza y de ‘comer la Pascua’, deben anclarse en orden de aparición en el texto español para cumplir la disciplina de marcadores únicos y secuenciales.
  revised_spanish_text: Así que llevaron a Jesús desde Caifás al pretorio[a]. Era temprano por la mañana. Ellos mismos no entraron al pretorio, para no quedar impuros[b], sino para poder comer la Pascua[c].
  revised_footnotes:
