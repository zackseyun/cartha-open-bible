translation:
  language: es
  text: Así que llevaron a Jesús desde Caifás al pretorio[a]. Era temprano por la mañana. Ellos mismos no entraron al pretorio, para no quedar impuros[b], sino para poder comer la Pascua[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la residencia oficial y sede judicial del gobernador romano».
    reason: lexical_alternative
  - marker: b
    text: Es decir, quedar ritualmente impuros.
    reason: cultural_note
  - marker: c
    text: Puede referirse específicamente a la cena pascual o, de manera más amplia, a comidas u observancias festivas durante la Pascua.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἄγουσιν
  english_pob_choice: they led
  chosen_spanish: llevaron
  alternatives_spanish:
  - condujeron
  - trajeron
  lexicon: BDAG
  rationale: El verbo griego expresa traslado de Jesús bajo custodia. En español, «llevaron» comunica bien el movimiento narrativo sin sonar mecánico; «condujeron» sería más formal y «trajeron» podría sugerir hacia el hablante.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - por tanto
  - entonces
  lexicon: BDAG
  rationale: Marca continuidad narrativa. «Así que» suena natural en español moderno y conserva el valor consecutivo sin sobreactuar la inferencia.
- source_word: πραιτώριον
  english_pob_choice: the governor’s headquarters
  chosen_spanish: el pretorio
  alternatives_spanish:
  - la residencia del gobernador
  - la sede del gobernador
  lexicon: BDAG
  rationale: Se conserva el término tradicional y transparente «pretorio», que en español eclesial y bíblico identifica el recinto romano. La alternativa explicativa sería válida, pero aquí el préstamo es fiel y comprensible con apoyo de nota.
- source_word: πρωΐ
  english_pob_choice: early morning
  chosen_spanish: temprano por la mañana
  alternatives_spanish:
  - a la mañana temprano
  - de madrugada
  lexicon: BDAG
  rationale: La expresión española reproduce el valor temporal general sin forzar una precisión mayor que la del griego. «De madrugada» podría ser demasiado específico.
- source_word: αὐτοὶ
  english_pob_choice: they themselves
  chosen_spanish: Ellos mismos
  alternatives_spanish:
  - ellos
  - por su parte
  lexicon: BDAG
  rationale: El pronombre es enfático. «Ellos mismos» preserva el contraste con quienes llevaron a Jesús y subraya la decisión de no entrar.
- source_word: εἰσῆλθον
  english_pob_choice: did not enter
  chosen_spanish: no entraron
  alternatives_spanish:
  - no pasaron
  - no ingresaron
  lexicon: BDAG
  rationale: Verbo narrativo simple y exacto. «No entraron» es natural y suficiente para el movimiento hacia el recinto.
- source_word: μιανθῶσιν
  english_pob_choice: would not be defiled
  chosen_spanish: quedar contaminados
  alternatives_spanish:
  - ser contaminados ritualmente
  - quedar impuros
  lexicon: BDAG
  rationale: El verbo tiene sentido de contaminación ritual, no de suciedad moral. «Quedar contaminados» transmite esa condición en español actual; «quedar impuros» también sería posible, pero «contaminados» evita un tono excesivamente técnico y conserva la idea ceremonial.
- source_word: φάγωσιν τὸ πάσχα
  english_pob_choice: could eat the Passover
  chosen_spanish: poder comer la Pascua
  alternatives_spanish:
  - comer la Pascua
  - poder participar de la Pascua
  lexicon: BDAG
  rationale: Se conserva la frase literal y su apertura semántica. «Poder comer la Pascua» mantiene el posible alcance del original sin resolver en el cuerpo del texto si se trata de la cena pascual o de observancias festivas asociadas.
- source_word: Καϊάφα
  english_pob_choice: Caiaphas
  chosen_spanish: Caifás
  alternatives_spanish:
  - Caiás
  lexicon: BDAG
  rationale: Nombre propio transmitido por la forma habitual en español bíblico.
- source_word: Ἰησοῦν
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - Yesús
  lexicon: BDAG
  rationale: Nombre propio transmitido por la forma estándar en español.
theological_decisions:
- issue: Sentido de la impureza ritual antes de comer la Pascua
  english_pob_reading: '''Be defiled'' refers to becoming ceremonially unclean.'
  chosen_spanish_reading: '''Quedar contaminados'' se entiende como quedar ritualmente impuros.'
  alternative_spanish_readings:
  - quedar impuros
  - ser contaminados ritualmente
  rationale: La frase griega apunta a una impureza ceremonial asociada con entrar al recinto gentil. El español elegido evita una lectura moralizante y conserva la tensión ritual del relato.
  doctrine_reference: Nota cultural/ritual sobre pureza ceremonial en el judaísmo del Segundo Templo.
- issue: Alcance de 'comer la Pascua'
  english_pob_reading: May refer specifically to the Passover meal or more broadly to festival meals/observances during Passover.
  chosen_spanish_reading: '''Poder comer la Pascua'' deja abierta la referencia precisa, sin resolver la cuestión cronológica en la traducción.'
  alternative_spanish_readings:
  - comer la Pascua
  - poder comer la cena pascual
  rationale: La traducción conserva la tensión interpretativa documentada por el POB en inglés, en lugar de armonizarla o especificarla indebidamente.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El pasaje no requiere revisiones aplicadas; se mantiene la alta concordancia del informe de referencia y no hay cambios pendientes en el sentido o en la puntuación base.
  spanish_consistency_notes:
  - Se mantiene «pretorio» como término bíblico transparente, coherente con el uso eclesial y con la nota explicativa.
  - Se usa «Pascua» para τὸ πάσχα, preservando la amplitud semántica señalada por el audit trail inglés.
  - «Contaminados» se emplea en sentido ritual, no moral, para armonizar con la nota explicativa y evitar ambigüedad doctrinal.
  - 'Los nombres propios siguen las formas españolas estándar: Jesús, Caifás.'
