    reason: cultural_note
  - marker: c
    text: Puede referirse específicamente a la cena pascual o, de manera más amplia, a comidas u observancias festivas durante la Pascua.
    reason: alternative_reading
  revision_rationale: Se ajusta la expresión de μιανθῶσιν a «quedar impuros» para reflejar con más naturalidad la impureza ritual en español. Se conserva «sino para poder comer la Pascua» porque reproduce el contraste de propósito del griego mejor que una simple coordinación, pero dentro de una frase ya reparada por el cambio léxico principal. También se normaliza la nota de «pretorio» como alternativa española natural al término tradicional.
