base_translation:
  language: en
  yaml_path: translation/nt/john/018/028.yaml
  text: So they led Jesus from Caiaphas into the governor’s headquarters[a]. Now it was early morning. They themselves did not enter the headquarters, so that they would not be defiled[c][b], but could eat the Passover.
  footnotes:
  - marker: a
    text: Or 'the Praetorium,' the Roman governor’s official residence and judicial headquarters.
    reason: lexical_alternative
  - marker: b
    text: '''Be defiled'' refers to becoming ceremonially unclean.'
    reason: cultural_note
  - marker: c
    text: '''Eat the Passover'' may refer specifically to the Passover meal or more broadly to festival meals/observances during Passover.'
    reason: alternative_reading
