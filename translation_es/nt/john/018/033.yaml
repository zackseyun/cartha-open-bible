translation:
  language: es
  text: 'Entonces Pilato volvió a entrar en el pretorio[a] y llamó a Jesús y le dijo: «¿Tú eres el Rey de los judíos[b]?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el pretorio», la residencia o sede oficial del gobernador romano.
    reason: lexical_alternative
  - marker: b
    text: O «de los judeanos». El término griego puede referirse a los judíos en general o, en algunos contextos, a las personas de Judea.
    reason: alternative_reading
lexical_decisions:
- source_word: Εἰσῆλθεν οὖν πάλιν εἰς τὸ πραιτώριον
  english_pob_choice: So Pilate went back into the governor’s headquarters
  chosen_spanish: Entonces Pilato volvió al pretorio[a]
  alternatives_spanish:
  - Entonces Pilato entró de nuevo al pretorio
  - Así que Pilato volvió a entrar en el pretorio
  lexicon: BDAG
  rationale: El griego combina entrada + repetición de movimiento con πάλιν. En español, «volvió al pretorio» comunica de forma natural la reentrada. Se conserva «pretorio» como equivalente directo de πραιτώριον, y la nota explica la opción interpretativa de «cuartel/residencia del gobernador».
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Entonces
  alternatives_spanish:
  - Así que
  - Por tanto
  lexicon: BDAG
  rationale: οὖν marca avance narrativo. «Entonces» es fluido en español y conserva la progresión sin cargar la frase con una inferencia demasiado fuerte.
- source_word: πάλιν
  english_pob_choice: back
  chosen_spanish: volvió
  alternatives_spanish:
  - de nuevo
  - otra vez
  lexicon: BDAG
  rationale: Con un verbo de movimiento, «volvió» ya incorpora la idea de retorno que πάλιν añade. Así se evita la repetición pesada de «de nuevo» en una frase breve.
- source_word: πραιτώριον
  english_pob_choice: the governor’s headquarters
  chosen_spanish: el pretorio
  alternatives_spanish:
  - la residencia del gobernador
  - la sede del gobernador
  lexicon: BDAG
  rationale: El término latino-grecizado «pretorio» es el equivalente más directo y mantiene la referencia histórica. La nota recoge la glosa explicativa del inglés POB para lectores que necesiten aclaración.
- source_word: ἐφώνησεν τὸν Ἰησοῦν
  english_pob_choice: called Jesus
  chosen_spanish: llamó a Jesús
  alternatives_spanish:
  - mandó llamar a Jesús
  - hizo llamar a Jesús
  lexicon: BDAG
  rationale: φωνέω aquí expresa llamar/summon. «Llamó a Jesús» es breve y fiel; «mandó llamar» implicaría con más fuerza un intermediario, lo cual no está explicitado.
- source_word: εἶπεν αὐτῷ
  english_pob_choice: said to him
  chosen_spanish: y le dijo
  alternatives_spanish:
  - y le preguntó
  - y dijo a él
  lexicon: BDAG
  rationale: λέγω conserva el valor general de decir; el tono interrogativo viene en la cita. «Le dijo» es la forma natural en español y respeta que el verbo no es el específico «preguntar».
- source_word: Σὺ εἶ
  english_pob_choice: Are you
  chosen_spanish: ¿Tú eres
  alternatives_spanish:
  - ¿Eres tú
  - ¿Tú eres tú
  lexicon: BDAG
  rationale: El pronombre explícito σύ añade énfasis. En español, «¿Tú eres…?» conserva ese énfasis mejor que una simple inversión verbal, y funciona bien en el diálogo directo.
- source_word: ὁ βασιλεὺς
  english_pob_choice: the King
  chosen_spanish: el Rey
  alternatives_spanish:
  - el rey
  lexicon: BDAG
  rationale: El artículo define una identificación/título. Se capitaliza «Rey» por tratarse de un título en el interrogatorio, siguiendo la fuerza titulativa del texto fuente.
- source_word: τῶν Ἰουδαίων
  english_pob_choice: of the Jews
  chosen_spanish: de los judíos[b]
  alternatives_spanish:
  - de los judeanos
  - de Judea
  lexicon: BDAG
  rationale: Se mantiene «judíos» porque es la forma establecida y la más reconocible en el contexto judicial de la pasión. La nota preserva la alternativa lexicológica «judeanos» documentada por el POB inglés, sin ocultar la tensión semántica del término.
theological_decisions:
- issue: Título real aplicado a Jesús en el interrogatorio romano
  english_pob_reading: Are you the King of the Jews?
  chosen_spanish_reading: ¿Tú eres el Rey de los judíos?
  alternative_spanish_readings:
  - ¿Tú eres el rey de los judíos?
  - ¿Tú eres el Rey de los judeanos?
  rationale: La mayúscula en «Rey» refleja el uso titular en la pregunta de Pilato. No se suaviza ni se espiritualiza el título, porque el pasaje presenta una acusación política concreta dentro del relato de la pasión.
  doctrine_reference: 'Translation philosophy: preserve historical and theological tension; do not flatten the royal claim of Jesús.'
- issue: Rango semántico de Ἰουδαίων
  english_pob_reading: Jews / Judeans
  chosen_spanish_reading: judíos
  alternative_spanish_readings:
  - judeanos
  - personas de Judea
  rationale: El texto admite una lectura étnico-religiosa o regional. Se opta por «judíos» en el cuerpo principal por ser la formulación más natural y tradicional en este pasaje, pero la nota conserva la alternativa para no resolver artificialmente la ambigüedad.
  doctrine_reference: 'Translation philosophy: preserve context-dependent lexical tension rather than forcing a single narrowing.'
translation_notes:
  revision_awareness: El texto inglés más reciente no mostró cambios respecto de la versión auditada anterior; por eso esta propuesta sigue de cerca la lectura estable del POB en inglés, manteniendo la distinción entre el valor narrativo de οὖν, la repetición de πάλιν y la ambigüedad contextual de Ἰουδαίων.
  spanish_consistency_notes:
  - Se conserva la terminología POB de «pretorio» con nota explicativa, en lugar de sustituirla por una glosa interpretativa dentro del cuerpo principal.
  - «Rey» aparece con mayúscula por función titular, coherente con el énfasis del interrogatorio.
  - La puntuación respeta el diálogo directo español y sitúa la pregunta final como cita cerrada.
  - Se mantiene «judíos» en el texto principal y se documenta la alternativa «judeanos» para preservar la tensión lexical sin resolverla por adelantado.
