review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia y el sentido básico del griego: Pilato reingresa, llama a Jesús y le formula la pregunta sobre el título real. Conserva correctamente la alternativa léxica de Ἰουδαίων en nota. Sin embargo, «volvió al pretorio» atenúa el componente explícito de entrada presente en Εἰσῆλθεν ... εἰς, y la puntuación española final es incorrecta al cerrar con comillas y punto después del signo de interrogación.'
  spanish_quality_summary: 'El español es claro y digno, pero necesita un ajuste menor para mayor fidelidad y naturalidad: «volvió a entrar en el pretorio» expresa mejor la reentrada que el simple «volvió al pretorio». También debe corregirse la puntuación de la cita interrogativa en español. La mayúscula en «Rey» es defendible por uso titular, aunque «rey» también sería posible; no es un problema mayor.'
  glossary_alignment: 'Sin conflictos con la terminología base del proyecto: «Jesús», «judíos» con nota «judeanos», y «pretorio» con glosa explicativa son aceptables. No hay términos doctrinales problemáticos adicionales en este versículo.'
  issues:
  - severity: medium
    issue: «Volvió al pretorio» no expresa plenamente la reentrada
    rationale: El griego dice literalmente que Pilato «entró de nuevo en el pretorio» (Εἰσῆλθεν ... πάλιν εἰς). El borrador comunica retorno al lugar, pero omite el acto explícito de entrar. «Volvió a entrar en el pretorio» preserva mejor el movimiento.
  - severity: low
    issue: Puntuación española incorrecta al final de la pregunta citada
    rationale: 'En español no corresponde cerrar la cita interrogativa con «?». La forma correcta es cerrar la pregunta con «?» y luego las comillas, sin punto adicional: «… judíos[b]?».'
  revised_spanish_text: 'Entonces Pilato volvió a entrar en el pretorio[a] y llamó a Jesús y le dijo: «¿Tú eres el Rey de los judíos[b]?»'
  revised_footnotes:
  - marker: a
    text: O «el pretorio», la residencia o sede oficial del gobernador romano.
    reason: lexical_alternative
  - marker: b
    text: O «de los judeanos». El término griego puede referirse a los judíos en general o, en algunos contextos, a las personas de Judea.
    reason: alternative_reading
  revision_rationale: Se ajusta la primera cláusula para reflejar explícitamente la reentrada indicada por Εἰσῆλθεν ... πάλιν εἰς, y se corrige la puntuación española de la pregunta citada. Se mantienen «pretorio» y la nota sobre «judeanos», que están bien justificadas por el expediente inglés y el contexto.
