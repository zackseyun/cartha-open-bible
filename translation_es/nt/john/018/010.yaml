translation:
  language: es
  text: Entonces Simón Pedro, teniendo una espada, la desenvainó y golpeó al esclavo[a] del sumo sacerdote y le cortó la oreja derecha. Y el nombre del esclavo era Malco.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “siervo”. El término griego doulos puede significar “esclavo” o “siervo” según el contexto.
    reason: alternative_reading
lexical_decisions:
- source_word: οὖν
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Así que
  - Luego
  lexicon: BDAG
  rationale: Marca continuidad narrativa; 'Entonces' conserva el avance del relato en español sin volverlo excesivamente lógico o inferencial.
- source_word: ἔχων μάχαιραν
  english_pob_choice: having a sword
  chosen_spanish: teniendo una espada
  alternatives_spanish:
  - con una espada
  - llevando una espada
  lexicon: BDAG
  rationale: El participio se puede reflejar con 'teniendo' para mantener la estructura griega, mientras 'espada' es la equivalencia natural y amplia de μάχαιρα en este contexto.
- source_word: εἵλκυσεν αὐτὴν
  english_pob_choice: drew it
  chosen_spanish: la desenvainó
  alternatives_spanish:
  - la sacó
  - la arrancó
  lexicon: BDAG
  rationale: En contexto de arma, el sentido es desenvainar; 'la desenvainó' expresa mejor en español la acción idiomática que 'la sacó'.
- source_word: ἔπαισεν
  english_pob_choice: struck
  chosen_spanish: golpeó
  alternatives_spanish:
  - hirió
  - pegó
  lexicon: BDAG
  rationale: '''Golpeó'' es claro y natural para la acción violenta del relato; mantiene el tono narrativo sin añadir un matiz no explicitado.'
- source_word: τὸν τοῦ ἀρχιερέως δοῦλον
  english_pob_choice: the high priest’s slave
  chosen_spanish: al esclavo del sumo sacerdote
  alternatives_spanish:
  - al siervo del sumo sacerdote
  lexicon: BDAG
  rationale: δοῦλος se rinde aquí como 'esclavo' por la relación de pertenencia/bondad personal del sintagma genitivo; 'siervo' suavizaría la fuerza léxica. 'Sumo sacerdote' traduce ἀρχιερεύς con un término claro y eclesialmente comprensible en español.
- source_word: ἀπέκοψεν
  english_pob_choice: cut off
  chosen_spanish: le cortó
  alternatives_spanish:
  - le cercenó
  - separó
  lexicon: BDAG
  rationale: '''Le cortó'' comunica directamente el resultado sin sonar arcaico; el pronombre dativo se expresa naturalmente en español con objeto indirecto.'
- source_word: ὠτάριον
  english_pob_choice: ear
  chosen_spanish: oreja
  alternatives_spanish:
  - oreja pequeña
  - oreja/ oído
  lexicon: BDAG
  rationale: El diminutivo griego no obliga a un diminutivo español. 'Oreja' es idiomática y clara; 'oído' sería menos preciso aquí por el órgano externo herido.
- source_word: τὸ δεξιόν
  english_pob_choice: right
  chosen_spanish: derecha
  alternatives_spanish:
  - derecho
  lexicon: BDAG
  rationale: 'Como modifica a ''oreja'', en español concuerda naturalmente en femenino: ''oreja derecha''.'
- source_word: ἦν δὲ ὄνομα τῷ δούλῳ Μάλχος
  english_pob_choice: Now the slave’s name was Malchus
  chosen_spanish: Y el nombre del esclavo era Malco
  alternatives_spanish:
  - Ahora bien, el nombre del esclavo era Malco
  - Y el esclavo se llamaba Malco
  lexicon: BDAG
  rationale: La construcción griega se vierte con una fórmula idiomática de identificación. 'Y' reproduce δέ de forma simple; 'Malco' es la forma española habitual del nombre propio.
theological_decisions:
- issue: δοῦλος y la intensidad social del término
  english_pob_reading: slave
  chosen_spanish_reading: esclavo
  alternative_spanish_readings:
  - siervo
  rationale: Mantener 'esclavo' preserva la fuerza social y legal del término griego, especialmente porque el texto especifica la pertenencia al sumo sacerdote. 'Siervo' atenuaría esa relación.
  doctrine_reference: 'Contested terms table for δοῦλος; Translation philosophy #1'
translation_notes:
  revision_awareness: La revisión más reciente indica acuerdo alto y ningún cambio necesario; se mantuvo la lectura de δοῦλος como 'esclavo' y la formulación narrativa directa para el resto del versículo.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo donde aparezca el nombre divino; aquí no aparece.
  - '''Malco'' se usa como transliteración española estable del nombre propio.'
  - La concordancia de género en 'oreja derecha' respeta el sustantivo español elegido.
  - La nota a pie preserva la alternativa léxica documentada para δοῦλος sin introducir otra tensión no atestiguada.
