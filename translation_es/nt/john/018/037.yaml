translation:
  language: es
  text: 'Entonces Pilato le dijo[a]: «¿Así que eres rey?». Jesús respondió: «Tú dices que soy rey. Para esto he nacido, y para esto he venido al mundo: para dar testimonio a la verdad. Todo el que es de la verdad escucha mi voz».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Tú dices: soy rey»; o: «Tú dices bien que soy rey». El griego es breve y puede entenderse como una afirmación calificada.'
    reason: alternative_reading
lexical_decisions:
- source_word: Οὐκοῦν
  english_pob_choice: So then
  chosen_spanish: Entonces / ¿Así que…?
  alternatives_spanish:
  - Pues entonces
  - De modo que
  lexicon: BDAG
  rationale: El griego expresa una conclusión inferida a partir del intercambio previo. En la pregunta de Pilato, «¿Así que eres rey?» reproduce bien esa fuerza inferencial sin volver la frase rígida en español.
- source_word: βασιλεύς
  english_pob_choice: king
  chosen_spanish: rey
  alternatives_spanish:
  - rey soberano
  - gobernante
  lexicon: BDAG
  rationale: «Rey» es la equivalencia natural y contextualmente precisa en el interrogatorio romano. Mantiene la carga política y mesiánica del término sin sobreexplicar.
- source_word: Σὺ λέγεις ὅτι βασιλεύς εἰμι
  english_pob_choice: You say that I am a king
  chosen_spanish: Tú dices que soy rey
  alternatives_spanish:
  - Tú dices que soy un rey
  - 'Tú lo dices: soy rey'
  - Tú dices correctamente que soy rey
  lexicon: BDAG
  rationale: La respuesta griega es concisa y admite una afirmación calificada. «Tú dices que soy rey» conserva la ambigüedad controlada del original y evita resolverla demasiado en favor de una afirmación fuerte o de una negación disfrazada.
- source_word: γεγέννημαι
  english_pob_choice: I have been born
  chosen_spanish: he nacido
  alternatives_spanish:
  - he sido nacido
  - nací
  lexicon: BDAG
  rationale: El perfecto griego comunica una realidad con relevancia presente. «He nacido» reproduce bien ese valor sin introducir una formulación extraña como «he sido nacido».
- source_word: ἐλήλυθα εἰς τὸν κόσμον
  english_pob_choice: I have come into the world
  chosen_spanish: he venido al mundo
  alternatives_spanish:
  - he llegado al mundo
  - vine al mundo
  lexicon: BDAG
  rationale: El perfecto de ἔρχομαι se conserva con «he venido», y «al mundo» mantiene κόσμος de manera directa. La forma es natural en español y respeta el matiz de misión/presencia en Juan.
- source_word: μαρτυρήσω
  english_pob_choice: I should bear witness
  chosen_spanish: dar testimonio
  alternatives_spanish:
  - testificar
  - dar testimonio como testigo
  lexicon: BDAG
  rationale: En español, «dar testimonio» preserva el campo jurídico-testimonial de μαρτυρέω y suena más natural que una traducción más literal pero menos idiomática. «Testificar» queda como alternativa válida, aunque menos frecuente en registro general.
- source_word: τῇ ἀληθείᾳ
  english_pob_choice: to the truth
  chosen_spanish: a la verdad
  alternatives_spanish:
  - en favor de la verdad
  - sobre la verdad
  lexicon: BDAG
  rationale: El dativo con μαρτυρέω se expresa bien con «dar testimonio a/de la verdad»; aquí «a la verdad» conserva la relación directa y el uso joánico de ἀλήθεια sin convertirlo en una explicación.
- source_word: πᾶς ὁ ὢν ἐκ τῆς ἀληθείας
  english_pob_choice: Everyone who is of the truth
  chosen_spanish: Todo el que es de la verdad
  alternatives_spanish:
  - Todo el que pertenece a la verdad
  - Todo el que procede de la verdad
  lexicon: BDAG
  rationale: «Es de la verdad» conserva la relación de procedencia/pertenencia de ἐκ con un giro idiomático aceptable en español. Mantiene la formulación joánica sin suprimir la tensión relacional del original.
- source_word: ἀκούει μου τῆς φωνῆς
  english_pob_choice: listens to my voice
  chosen_spanish: escucha mi voz
  alternatives_spanish:
  - oye mi voz
  - presta oído a mi voz
  lexicon: BDAG
  rationale: «Escucha» comunica mejor la recepción activa que exige el contexto que un mero «oye». «Mi voz» se conserva literalmente por su resonancia joánica y por la imagen de respuesta obediente.
theological_decisions:
- issue: Matiz de la respuesta de Jesús a Pilato
  english_pob_reading: A qualified affirmation rendered transparently as 'You say that I am a king'
  chosen_spanish_reading: 'Una afirmación calificada: «Tú dices que soy rey»'
  alternative_spanish_readings:
  - 'Una afirmación enfática: «Tú dices correctamente que soy rey»'
  - 'Una respuesta más distante: «Eso lo dices tú»'
  rationale: El griego permite una respuesta afirmativa con matiz, pero no obliga a una resolución más fuerte. La traducción española mantiene la tensión sin convertirla en una afirmación enfática ni en una negativa encubierta.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Doble cláusula de misión y encarnación implícita
  english_pob_reading: Retain both clauses distinctly without collapsing them into a single paraphrase
  chosen_spanish_reading: Conservar por separado «he nacido» y «he venido al mundo»
  alternative_spanish_readings:
  - Unirlas en una sola idea de misión
  - Parafrasear ambas cláusulas como finalidad general
  rationale: Juan distingue el nacer de Jesús y su venir al mundo; mantener ambas expresiones evita perder la posible carga encarnacional y respeta la estructura del texto.
  doctrine_reference: DOCTRINE.md §Affirmations; §Translation philosophy 1, 3
translation_notes:
  revision_awareness: Alineado con el último pase de revisión, que no requirió cambios y fue confirmado con alto grado de acuerdo en la traducción inglesa de referencia.
  spanish_consistency_notes:
  - Se usa «rey» para βασιλεύς, manteniendo la terminología política y mesiánica del contexto.
  - Se conserva «verdad» para ἀλήθεια, sin sustituirla por una paráfrasis más abstracta.
  - Se mantiene el paralelismo de «he nacido» / «he venido al mundo» para no fusionar los dos verbos griegos.
  - «Escucha mi voz» conserva la imagen relacional y auditiva del original.
