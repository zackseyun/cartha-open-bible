revisions:
- from: 'Entonces Pilato le dijo[a]: «¿Así que eres rey?» Jesús respondió: «Tú dices que soy rey. Para esto he nacido, y para esto he venido al mundo: para dar testimonio de la verdad. Todo el que es de la verdad escucha mi voz».'
  to: 'Entonces Pilato le dijo[a]: «¿Así que eres rey?». Jesús respondió: «Tú dices que soy rey. Para esto he nacido, y para esto he venido al mundo: para dar testimonio a la verdad. Todo el que es de la verdad escucha mi voz».'
  rationale: Se mantiene íntegramente la traducción, con un ajuste menor en «dar testimonio a la verdad» para reflejar mejor μαρτυρέω + dativo y el rastro léxico auditado. También se pule la puntuación de diálogo en español con punto después de la pregunta cerrada antes de «Jesús respondió», y se conserva la nota alternativa con redacción ligeramente afinada.
