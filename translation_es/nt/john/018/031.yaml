    changes_summary: 'Adjusted wording for closer lexical accuracy and more natural formal English: changed ''You take him'' to ''Take him yourselves'' to reflect ὑμεῖς, and ''It is not permitted for us'' to ''It is not lawful for us'' to better match ἔξεστιν in this legal context.'
translation:
  language: es
  text: 'Entonces Pilato les dijo[a]: «Tómenlo ustedes mismos y júzguenlo conforme a su ley». Los judíos le dijeron: «A nosotros no nos está permitido dar muerte a nadie».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «Los judíos» (hoi Ioudaioi); en este contexto, la referencia apunta a las autoridades o acusadores judíos que hablan con Pilato, no al pueblo judío en su conjunto.'
    reason: alternative_reading
lexical_decisions:
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Entonces
  alternatives_spanish:
  - Así que
  - Por eso
  lexicon: BDAG
  rationale: οὖν enlaza la escena con continuidad narrativa e inferencial. «Entonces» conserva ese flujo sin sonar forzado en español.
- source_word: Λάβετε αὐτὸν ὑμεῖς
  english_pob_choice: Take him yourselves
  chosen_spanish: Tómenlo ustedes mismos
  alternatives_spanish:
  - Tómenlo ustedes
  - Tómenlo por ustedes mismos
  lexicon: BDAG
  rationale: El imperativo plural y el pronombre explícito ὑμεῖς piden reflejar énfasis. «Ustedes mismos» conserva esa fuerza sin añadir más de lo que el griego sugiere.
- source_word: κατὰ τὸν νόμον ὑμῶν
  english_pob_choice: according to your law
  chosen_spanish: conforme a su ley
  alternatives_spanish:
  - según su ley
  - de acuerdo con su ley
  lexicon: BDAG
  rationale: κατά con acusativo expresa norma o conformidad. «Conforme a su ley» mantiene el sentido legal y el distanciamiento de Pilato.
- source_word: κρίνατε
  english_pob_choice: judge
  chosen_spanish: júzguenlo
  alternatives_spanish:
  - juzguen
  - háganle juicio
  lexicon: BDAG
  rationale: κρίνω aquí es un mandato de emitir juicio en contexto legal. «Júzguenlo» comunica bien la orden directa sin restringirlo a un procedimiento técnico romano.
- source_word: οἱ Ἰουδαῖοι
  english_pob_choice: The Jews
  chosen_spanish: Los judíos
  alternatives_spanish:
  - Las autoridades judías
  - Los judíos presentes
  lexicon: BDAG
  rationale: Se conserva la forma del texto griego, pero en español el contexto inmediato permite leerlo como el grupo de autoridades o acusadores ante Pilato. Se mantiene la tensión del término sin suavizarla indebidamente.
- source_word: ἔξεστιν
  english_pob_choice: It is not lawful
  chosen_spanish: no nos está permitido
  alternatives_spanish:
  - no es lícito
  - no tenemos permiso
  lexicon: BDAG
  rationale: ἔξεστιν expresa posibilidad/permiso en marco legal. «No nos está permitido» comunica claramente la restricción jurídica en español actual.
- source_word: ἀποκτεῖναι
  english_pob_choice: to put anyone to death
  chosen_spanish: dar muerte
  alternatives_spanish:
  - matar
  - ejecutar
  lexicon: BDAG
  rationale: En este contexto judicial, «dar muerte» mantiene el peso formal del acto sin volverlo más técnico de lo necesario.
- source_word: οὐδένα
  english_pob_choice: anyone
  chosen_spanish: a nadie
  alternatives_spanish:
  - a ninguna persona
  - a nadie en absoluto
  lexicon: BDAG
  rationale: Tras un infinitivo negativo, «a nadie» transmite el alcance universal de οὐδένα con naturalidad en español.
theological_decisions:
- issue: Referencia de οἱ Ἰουδαῖοι en Juan 18:31
  english_pob_reading: '''The Jews'' is retained, with a clarifying note in English that the phrase here refers to the Jewish authorities or accusers speaking with Pilate, not to the Jewish people as a whole.'
  chosen_spanish_reading: Se mantiene «Los judíos» en el texto principal, entendiendo por el contexto a las autoridades o acusadores judíos que hablan con Pilato.
  alternative_spanish_readings:
  - las autoridades judías
  - los dirigentes judíos
  - los judíos presentes
  rationale: La traducción principal sigue de cerca el griego y preserva la expresión de Juan. El contexto narrativo limita el referente al grupo ante Pilato; una nota puede ayudar a evitar una lectura globalizadora sin reemplazar el término del texto.
  doctrine_reference: Principio de primacía del original; mantener la tensión contextual de οἱ Ἰουδαῖοι sin borrar su forma textual.
- issue: Matiz legal de ἔξεστιν en el dicho de los judíos
  english_pob_reading: It is not lawful for us to put anyone to death.
  chosen_spanish_reading: «No nos está permitido dar muerte a nadie»
  alternative_spanish_readings:
  - «No nos es lícito matar a nadie»
  - «No tenemos permiso para dar muerte a nadie»
  rationale: El verbo griego marca una restricción de permiso/licitud, apropiada para el marco jurídico de la escena. La formulación elegida es clara y no exagera el tecnicismo.
  doctrine_reference: Contexto judicial de la pasión; precisión lexical sin cargar el texto con términos eclesiásticos o jurídicos ajenos al griego.
translation_notes:
  revision_awareness: La redacción sigue de cerca el último estado auditado en inglés, especialmente la corrección de ὑμεῖς con un refuerzo explícito («ustedes mismos») y la restricción legal de ἔξεστιν con una formulación de permiso/licitud. También conserva la nota contextual sobre οἱ Ἰουδαῖοι, adaptada al español.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera explícitamente; este versículo no lo contiene.
  - Se mantiene un registro moderno y digno, evitando arcaísmos innecesarios.
  - «Los judíos» se conserva por fidelidad textual, con nota contextual para evitar una lectura generalizante.
  - No se introduce vocabulario doctrinal ajeno al versículo; el lenguaje es jurídico y narrativo.
