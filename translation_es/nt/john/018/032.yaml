translation:
  language: es
  text: para que se cumpliera[a] la palabra que Jesús había dicho[c], indicando[b] de qué clase de muerte iba a morir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el dicho de Jesús».'
    reason: lexical_alternative
  - marker: b
    text: Es decir, Jesús había indicado la manera de su muerte, probablemente aludiendo a la crucifixión (compárese Juan 12:32–33).
    reason: cross_reference
  - marker: c
    text: 'O: «que había dicho para indicar».'
    reason: previous_rendering
lexical_decisions:
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: Introduce una finalidad/resultado. «Para que» es la forma natural y digna en español, y conserva la fuerza teleológica del griego sin sonar forzada.
- source_word: ὁ λόγος
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el dicho
  - la declaración
  - la expresión
  lexicon: BDAG
  rationale: En este contexto joánico se trata de una palabra dicha por Jesús, no del título de Juan 1:1. «La palabra» mantiene la fórmula de cumplimiento y suena idiomática en español.
- source_word: τοῦ Ἰησοῦ
  english_pob_choice: of Jesus
  chosen_spanish: de Jesús
  alternatives_spanish:
  - que Jesús dijo
  - de parte de Jesús
  lexicon: BDAG
  rationale: Se conserva el genitivo de posesión o autoría de modo directo. La cláusula relativa posterior precisa que esa era la palabra que Jesús había dicho.
- source_word: πληρωθῇ
  english_pob_choice: would be fulfilled
  chosen_spanish: se cumpliera
  alternatives_spanish:
  - fuera cumplida
  - llegara a cumplirse
  lexicon: BDAG
  rationale: El pasivo subjuntivo después de ἵνα se vierte con naturalidad como cumplimiento. «Se cumpliera» preserva el lenguaje bíblico de cumplimiento y es fluido en español.
- source_word: ὃν εἶπεν
  english_pob_choice: which he had spoken
  chosen_spanish: que él había dicho
  alternatives_spanish:
  - que había pronunciado
  - que había hablado
  lexicon: BDAG
  rationale: La relativa retoma «la palabra». En español, «había dicho» expresa con claridad la anterioridad del dicho respecto al momento narrativo y evita una construcción rígida.
- source_word: σημαίνων
  english_pob_choice: indicating
  chosen_spanish: indicando
  alternatives_spanish:
  - señalando
  - dando a entender
  lexicon: BDAG
  rationale: El participio circunstancial se mantiene como gerundio explicativo, en línea con la revisión inglesa. «Indicando» conserva la relación explicativa con la manera de su declaración.
- source_word: ποίῳ θανάτῳ
  english_pob_choice: by what kind of death
  chosen_spanish: de qué clase de muerte
  alternatives_spanish:
  - por qué clase de muerte
  - de qué tipo de muerte
  lexicon: BDAG
  rationale: ποίῳ pregunta por la clase o modo. «De qué clase de muerte» preserva esa precisión y es natural en español; mantiene abierta la alusión al modo de ejecución sin explicitarla en el cuerpo del texto.
- source_word: ἤμελλεν
  english_pob_choice: he was about to
  chosen_spanish: iba a
  alternatives_spanish:
  - estaba por
  - estaba a punto de
  lexicon: BDAG
  rationale: μέλλω expresa inminencia. «Iba a» comunica futuro inminente de forma sobria y natural, sin cargar el verbo con una noción más fuerte de destino que la que exige el griego.
- source_word: ἀποθνῄσκειν
  english_pob_choice: die
  chosen_spanish: morir
  alternatives_spanish:
  - fallecer
  - perecer
  lexicon: BDAG
  rationale: El infinitivo simple se vierte con el verbo básico «morir». En español fluye mejor con «iba a morir» y conserva la referencia directa al hecho de la muerte.
theological_decisions:
- issue: Lenguaje de cumplimiento aplicado a las palabras de Jesús
  english_pob_reading: 'Retain explicit fulfillment wording: ''the word of Jesus would be fulfilled.'''
  chosen_spanish_reading: 'Conservar el lenguaje explícito de cumplimiento: «se cumpliera la palabra de Jesús».'
  alternative_spanish_readings:
  - «se hiciera realidad lo que Jesús dijo»
  - «se realizara la palabra de Jesús»
  rationale: El griego usa πληρόω en su idiomática fórmula de cumplimiento, importante en Juan. Traducir con «se cumpliera» preserva ese peso teológico y narrativo mejor que una paráfrasis más libre.
  doctrine_reference: Juan 18:32; tema joánico del cumplimiento
- issue: Fuerza de μέλλω respecto a la muerte de Jesús
  english_pob_reading: Render as imminent future ('was about to die') rather than stronger predestinarian language.
  chosen_spanish_reading: 'Renderizar como futuro inminente: «iba a morir» en lugar de una formulación de destino más fuerte.'
  alternative_spanish_readings:
  - «estaba destinado a morir»
  - «estaba por morir»
  rationale: El texto señala que Jesús había indicado la clase de muerte que iba a sufrir; no obliga aquí a una afirmación más fuerte de determinismo. «Iba a morir» conserva la inminencia sin añadir tensión doctrinal no explicitada en la cláusula.
  doctrine_reference: Juan 18:32; relación entre anuncio previo e inminencia
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión inglesa más reciente, que prefirió «indicating» como participio circunstancial para reflejar mejor la sintaxis griega. En español se conserva esa relación con «indicando», evitando una construcción final demasiado pesada y manteniendo el flujo natural de la cláusula.
  spanish_consistency_notes:
  - Se usó «Jesús» para Ἰησοῦς y «Dios»/«Yahvé» no aparecen en este versículo.
  - Se evitó «Cristo» porque el texto no usa Χριστός.
  - Se conservó el lenguaje de cumplimiento bíblico con «se cumpliera».
  - Se evitó una equivalencia doctrinalmente más fuerte para μέλλω; el español mantiene la inminencia con «iba a morir».
