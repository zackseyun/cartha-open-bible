translation:
  language: es
  text: Pero ustedes tienen la costumbre de que yo les suelte un hombre en la Pascua. ¿Quieren, entonces, que les suelte al Rey de los judíos[a]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el Rey de los Judeanos». El término griego puede denotar «judíos» o «judeanos» según el contexto; aquí aparece como título fijo en la narrativa de la pasión.
    reason: alternative_reading
lexical_decisions:
- source_word: συνήθεια
  english_pob_choice: custom
  chosen_spanish: costumbre
  alternatives_spanish:
  - práctica
  - hábito
  lexicon: BDAG
  rationale: «Costumbre» comunica una práctica establecida y social, adecuada al contexto judicial y festivo. «Hábito» suena más individual; «práctica» es posible, pero menos natural aquí.
- source_word: ἵνα ἕνα ἀπολύσω ὑμῖν
  english_pob_choice: that I release one man for you
  chosen_spanish: que yo les suelte un hombre
  alternatives_spanish:
  - que yo les suelte uno
  - que yo les libere un hombre
  lexicon: BDAG
  rationale: La cláusula expresa el contenido de la costumbre. «Suelte» reproduce bien ἀπολύω en el sentido de liberar a un preso o dejar en libertad. «Un hombre» explicita de manera natural el referente personal de ἕνα.
- source_word: ἀπολύω
  english_pob_choice: release
  chosen_spanish: soltar
  alternatives_spanish:
  - liberar
  - dejar libre
  lexicon: BDAG
  rationale: En este contexto de un gobernante que deja ir a un preso, «soltar» preserva con claridad la fuerza de libertad/puesta en libertad sin volver la frase demasiado técnica o eclesiástica. Mantiene además la repetición verbal del versículo.
- source_word: ἐν τῷ πάσχα
  english_pob_choice: at the Passover
  chosen_spanish: en la Pascua
  alternatives_spanish:
  - durante la Pascua
  - en la fiesta de Pascua
  lexicon: BDAG
  rationale: «En la Pascua» es una forma natural en español para situar la costumbre en el marco temporal de la fiesta. Conserva la relación de ἐν con el tiempo festivo.
- source_word: βούλεσθε οὖν
  english_pob_choice: So do you want
  chosen_spanish: ¿Quieren, entonces
  alternatives_spanish:
  - ¿Desean, pues
  - ¿Quieren, pues
  lexicon: BDAG
  rationale: «¿Quieren, entonces» refleja el valor inferencial de οὖν de modo natural. El plural sigue el griego y el inglés POB, aunque en español puede sonar como un plural de cortesía o dirigido al grupo.
- source_word: τὸν βασιλέα τῶν Ἰουδαίων
  english_pob_choice: the King of the Jews
  chosen_spanish: al Rey de los judíos
  alternatives_spanish:
  - al rey de los judíos
  - al Rey de los Judeanos
  lexicon: BDAG
  rationale: Se mantiene «Rey» con mayúscula para reflejar el título formal en la narrativa de la pasión. «Judíos» conserva el término establecido en la fórmula narrativa; la alternativa «Judeanos» queda reservada para la nota por la tensión lexical documentada.
theological_decisions:
- issue: Ἰουδαίων en el título de la pasión
  english_pob_reading: the King of the Jews
  chosen_spanish_reading: el Rey de los judíos
  alternative_spanish_readings:
  - el Rey de los Judeanos
  rationale: En Juan, esta fórmula funciona como el título/acusación real aplicado a Jesús dentro de la narrativa de la pasión. Mantener «judíos» conserva el uso establecido de la frase en español bíblico, mientras que «Judeanos» se preserva como alternativa transparente para no borrar la tensión semántica del griego.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La revisión más reciente indica que no se requieren cambios; esta versión sigue de cerca el texto fuente griego y el audit trail inglés, conservando la repetición de ἀπολύω y la tensión de Ἰουδαίων en el título de la pasión.
  spanish_consistency_notes:
  - Se conserva la repetición verbal con «soltar» en ambos casos de ἀπολύω para mantener cohesión léxica.
  - «Rey» va con mayúscula por tratarse de un título narrativo formal, coherente con el estilo POB.
  - La nota al pie usa la alternativa «Judeanos» para reflejar la opción documentada sin imponerla en el texto principal.
