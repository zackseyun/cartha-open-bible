translation:
  language: es
  text: 'para que se cumpliera la palabra que él había dicho: «De los que tú me has dado, no perdí a ninguno[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ninguno de ellos» o «ni uno de ellos».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: ἵνα expresa finalidad o resultado; «para que» es la equivalencia natural y digna en español, y conserva la fuerza telica sin rigidizar la sintaxis.
- source_word: πληρωθῇ
  english_pob_choice: might be fulfilled
  chosen_spanish: se cumpliera
  alternatives_spanish:
  - fuera cumplida
  - se realizara
  lexicon: BDAG
  rationale: El pasivo subjuntivo apunta al cumplimiento de una palabra ya pronunciada. «Se cumpliera» transmite bien la realización narrativa y la resonancia bíblica de cumplimiento sin forzar una fórmula más técnica.
- source_word: ὁ λόγος
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - la expresión
  - la declaración
  lexicon: BDAG
  rationale: Aquí λόγος se refiere a una afirmación concreta de Jesús, no al Logos como título. «Palabra» preserva el valor joánico y es natural en español.
- source_word: ὃν εἶπεν
  english_pob_choice: that he had spoken
  chosen_spanish: que él había dicho
  alternatives_spanish:
  - que él había hablado
  - que había pronunciado
  lexicon: BDAG
  rationale: «Había dicho» reproduce con claridad la referencia a una խոսa previa. En español, «hablar» o «pronunciar» son posibles, pero «decir» resulta más directo y fiel al enunciado citado.
- source_word: Οὓς δέδωκάς μοι
  english_pob_choice: Of those whom you have given me
  chosen_spanish: De los que tú me has dado
  alternatives_spanish:
  - De aquellos que tú me has dado
  - Los que tú me has dado
  lexicon: BDAG
  rationale: El griego es partitivo y prepara ἐξ αὐτῶν; por eso «De los que» conserva mejor la estructura que una simple relativa. El perfecto «me has dado» mantiene el resultado vigente de la acción del Padre.
- source_word: ἀπώλεσα
  english_pob_choice: I lost
  chosen_spanish: perdí
  alternatives_spanish:
  - destruí
  - dejé perecer
  lexicon: BDAG
  rationale: En este contexto de protección de los discípulos, el sentido es no haber dejado perder a ninguno. «Perdí» es la forma más natural en español para mantener esa tensión sin introducir destrucción activa.
- source_word: ἐξ αὐτῶν οὐδένα
  english_pob_choice: not one
  chosen_spanish: a ninguno
  alternatives_spanish:
  - de ellos a ninguno
  - ni uno de ellos
  lexicon: BDAG
  rationale: La negación enfática expresa «ni uno». «A ninguno» fluye bien con «perdí» en español y conserva el valor intensivo del griego.
theological_decisions:
- issue: Cumplimiento de la palabra dicha por Jesús
  english_pob_reading: Render πληρωθῇ as fulfillment of Jesus' prior spoken word without importing a formal prophecy formula beyond the text.
  chosen_spanish_reading: «Se cumpliera» expresa el cumplimiento de la palabra dicha por Jesús sin convertirla artificialmente en una fórmula profética más estrecha que la del texto.
  alternative_spanish_readings:
  - «se realizara»
  - «se cumpliera la Escritura»
  rationale: El texto habla de la palabra previamente pronunciada, no de un encabezado explícito de profecía. La traducción mantiene el peso teológico del cumplimiento narrativo y evita ampliar indebidamente el alcance del pasaje.
  doctrine_reference: Translation philosophy §1, §3
- issue: Sentido de ἀπώλεσα respecto de los discípulos
  english_pob_reading: Translate as 'I lost not one' in the sense of preserving those entrusted to Jesus.
  chosen_spanish_reading: «No perdí a ninguno» preserva el sentido de resguardo de los discípulos confiados a Jesús, sin volverlo una afirmación de destrucción física.
  alternative_spanish_readings:
  - «no destruí a ninguno»
  - «no dejé perecer a ninguno»
  rationale: En el contexto inmediato del arresto y de la oración anterior de Juan 17:12, el punto es la custodia fiel de los entregados a Jesús. «Perdí» mantiene la tensión joánica y su alcance más natural en español.
  doctrine_reference: Affirmations; Translation philosophy §3
translation_notes:
  revision_awareness: La redacción sigue de cerca el análisis griego y coincide con el cierre revisado del POB inglés, que no requirió cambios. Se preservó la estructura partitiva de «De los que tú me has dado» y el lenguaje de cumplimiento con subjuntivo imperfecto en español.
  spanish_consistency_notes:
  - Se usó «Yahvé» como convención general del proyecto solo cuando aparezca el nombre divino; aquí no aparece.
  - Se prefirió «palabra» para λόγος por tratarse de una declaración concreta, no de un título cristológico.
  - Se conservó el valor enfático de la negación con «no perdí a ninguno» sin añadir matices doctrinales ajenos al contexto.
  - La sintaxis en español mantiene el orden natural de la oración subordinada de finalidad y la cita directa con dos puntos implícitos dentro de la puntuación española.
