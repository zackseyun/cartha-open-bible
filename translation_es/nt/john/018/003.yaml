base_translation:
  language: en
  yaml_path: translation/nt/john/018/003.yaml
  text: So Judas[a], having taken the cohort and officers from the chief priests and from the Pharisees[b], comes there with lanterns and torches and weapons.
  footnotes:
  - marker: a
    text: Or 'detachment' or 'band of soldiers' for 'cohort' (σπεῖρα). The Greek term can refer to a military unit without requiring that the entire unit was present.
    reason: lexical_alternative
  - marker: b
    text: Or 'guards' or 'temple police' for 'officers' (ὑπηρέτας). The term refers to official attendants serving the Jewish authorities.
    reason: lexical_alternative
