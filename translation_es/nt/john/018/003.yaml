revisions:
- from: Así que Judas[a], habiendo tomado la cohorte y oficiales de los sumos sacerdotes y de los fariseos[b], viene allí con linternas, antorchas y armas.
  to: Entonces Judas[a], habiendo tomado la cohorte y los guardias de los sumos sacerdotes y de los fariseos[b], viene allí con linternas, antorchas y armas.
  rationale: Se ajusta οὖν a un conector narrativo más natural en español («Entonces») y se reemplaza «oficiales» por «guardias» para mejorar la inteligibilidad y reflejar mejor el valor funcional de ὑπηρέτας en este contexto, manteniendo las alternativas en nota. El resto del versículo ya preserva bien el sentido fuente y las decisiones auditadas del POB.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:05:20Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del griego: Judas toma la σπεῖρα, además de ὑπηρέτας procedentes de los principales grupos judíos mencionados, y llega con tres elementos coordinados de equipo. También preserva acertadamente el presente histórico («viene») y la distinción entre φανῶν y λαμπάδων. Sin embargo, «Así que» suena más inferencial/conclusivo de lo que pide οὖν en español narrativo; «Entonces» o «Así pues» encajan mejor. Además, «oficiales de los sumos sacerdotes y de los fariseos» puede leerse como si modificara solo a «oficiales», pero en español conviene explicitar mejor que Judas tomó la cohorte y además guardias/alguaciles provenientes de esas autoridades.'
  spanish_quality_summary: El texto es claro y digno, pero «oficiales» resulta algo poco natural y potencialmente ambiguo en español eclesial general, donde puede sugerir rangos militares o funcionarios más que asistentes/guardias. «Guardias» es más inteligible en el cuerpo del texto, dejando «oficiales» como posibilidad menos probable en nota si se quisiera, aunque el expediente inglés privilegia 'officers'. Dado el uso joánico y la nota inglesa ya abierta a «guards / temple police», en español la mejora de legibilidad justifica usar «guardias». También conviene pulir el arranque a «Entonces Judas…».
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. «Cohorte» mantiene bien σπεῖρα. «Sumos sacerdotes», «fariseos», «linternas», «antorchas» y «armas» están alineados. La principal cuestión léxica es ὑπηρέτας: el borrador usa «oficiales», pero para español neutral y legible «guardias» comunica mejor la función documentada sin perder fidelidad.'
  issues:
  - severity: medium
    issue: «Así que» para οὖν
    rationale: 'En español bíblico moderno, «Así que» suele sonar más conclusivo o resultativo. Aquí οὖν funciona mejor como continuación narrativa: «Entonces» preserva mejor el flujo.'
  - severity: medium
    issue: «oficiales» para ὑπηρέτας
    rationale: Aunque es defendible por cercanía al inglés POB, en español general puede sonar artificial o ambiguo. «Guardias» comunica mejor la función de asistentes/guardas de las autoridades judías y sigue una alternativa ya documentada en el expediente.
  - severity: low
    issue: Leve ambigüedad sintáctica en «la cohorte y oficiales de los sumos sacerdotes y de los fariseos»
    rationale: La frase se entiende, pero una formulación con artículo («los guardias») mejora el paralelismo y la lectura de los dos grupos que Judas llevó consigo.
  revised_spanish_text: Entonces Judas[a], habiendo tomado la cohorte y los guardias de los sumos sacerdotes y de los fariseos[b], viene allí con linternas, antorchas y armas.
  revised_footnotes:
  - marker: a
    text: O «destacamento» o «banda de soldados» para «cohorte» (σπεῖρα). El término griego puede referirse a una unidad militar sin implicar necesariamente que estuviera presente toda la cohorte.
    reason: lexical_alternative
  - marker: b
    text: O «oficiales» o «policía del templo» para «guardias» (ὑπηρέτας). El término se refiere a asistentes oficiales al servicio de las autoridades judías.
    reason: lexical_alternative
  revision_rationale: Se ajusta οὖν a un conector narrativo más natural en español («Entonces») y se reemplaza «oficiales» por «guardias» para mejorar la inteligibilidad y reflejar mejor el valor funcional de ὑπηρέτας en este contexto, manteniendo las alternativas en nota. El resto del versículo ya preserva bien el sentido fuente y las decisiones auditadas del POB.
