translation:
  language: es
  text: Entonces Judas[a], habiendo tomado la cohorte y los guardias de los sumos sacerdotes y de los fariseos[b], viene allí con linternas, antorchas y armas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «destacamento» o «banda de soldados» para «cohorte» (σπεῖρα). El término griego puede referirse a una unidad militar sin implicar necesariamente que estuviera presente toda la cohorte.
    reason: lexical_alternative
  - marker: b
    text: O «oficiales» o «policía del templo» para «guardias» (ὑπηρέτας). El término se refiere a asistentes oficiales al servicio de las autoridades judías.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ οὖν
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - Entonces
  - Por tanto
  lexicon: BDAG
  rationale: Mantiene la conexión narrativa e inferencial de οὖν sin sonar forzado en español.
- source_word: λαβὼν
  english_pob_choice: having taken
  chosen_spanish: habiendo tomado
  alternatives_spanish:
  - habiendo recibido
  - tomando
  lexicon: BDAG
  rationale: El participio aoristo previo al verbo principal se conserva mejor con una construcción de anterioridad en español.
- source_word: σπεῖραν
  english_pob_choice: cohort
  chosen_spanish: cohorte
  alternatives_spanish:
  - destacamento
  - banda de soldados
  lexicon: BDAG
  rationale: «Cohorte» conserva la especificidad militar histórica que el POB inglés quiso mantener, sin afirmar más de lo que el texto exige sobre el tamaño exacto.
- source_word: ὑπηρέτας
  english_pob_choice: officers
  chosen_spanish: oficiales
  alternatives_spanish:
  - guardias
  - policía del templo
  - sirvientes
  lexicon: BDAG
  rationale: «Oficiales» es amplio y digno; permite incluir la función de servidores/guardianes de autoridades judías sin introducir una glosa demasiado estrecha.
- source_word: ἀρχιερέων
  english_pob_choice: chief priests
  chosen_spanish: sumos sacerdotes
  alternatives_spanish:
  - principales sacerdotes
  - sumos sacerdotes principales
  lexicon: BDAG
  rationale: En plural, «sumos sacerdotes» comunica el grupo dirigente sacerdotal de forma natural en español y mantiene el valor colectivo del término.
- source_word: Φαρισαίων
  english_pob_choice: Pharisees
  chosen_spanish: fariseos
  alternatives_spanish:
  - Fariseos
  lexicon: BDAG
  rationale: Transliteración estándar en español para el grupo religioso, sin necesidad de explicación adicional en el versículo.
- source_word: ἔρχεται
  english_pob_choice: comes
  chosen_spanish: viene
  alternatives_spanish:
  - llega
  - se acerca
  lexicon: BDAG
  rationale: El presente histórico se conserva con un verbo natural en español que mantiene la vivacidad narrativa de Juan.
- source_word: ἐκεῖ
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  lexicon: BDAG
  rationale: Adverbio locativo simple que corresponde al lugar ya identificado por el contexto.
- source_word: φανῶν
  english_pob_choice: lanterns
  chosen_spanish: linternas
  alternatives_spanish:
  - faroles
  - lámparas portátiles
  lexicon: BDAG
  rationale: «Linternas» es el equivalente moderno más claro para un portable light; conserva la distinción con «antorchas».
- source_word: λαμπάδων
  english_pob_choice: torches
  chosen_spanish: antorchas
  alternatives_spanish:
  - torchas
  - lámparas
  lexicon: BDAG
  rationale: «Antorchas» diferencia bien este segundo término del primero y refleja la imagen de fuego/luz portátil del griego.
- source_word: ὅπλων
  english_pob_choice: weapons
  chosen_spanish: armas
  alternatives_spanish:
  - armamento
  - armas de guerra
  lexicon: BDAG
  rationale: «Armas» es el equivalente natural y general del término griego para instrumentos de combate.
theological_decisions:
- issue: Composición del grupo que arresta a Jesús
  english_pob_reading: 'The verse presents a mixed party: a cohort plus officers from the chief priests and Pharisees, without specifying the exact size or all military details.'
  chosen_spanish_reading: 'La traducción conserva la composición mixta: cohorte y oficiales procedentes de los sumos sacerdotes y de los fariseos, sin precisar el tamaño exacto del contingente.'
  alternative_spanish_readings:
  - banda de soldados y guardias
  - destacamento y oficiales
  rationale: El texto no obliga a decidir si estaba presente la cohorte completa; «cohorte» mantiene la fuerza histórica y deja abierta la cuestión de la magnitud, como en el POB inglés.
  doctrine_reference: Juan 18:3; composición del grupo de arresto en el relato de la pasión
translation_notes:
  revision_awareness: El texto sigue de cerca el estado más reciente del POB inglés, que no muestra cambios aplicados en la última pasada y fue revisado como de alta concordancia. Se preserva la distinción entre σπεῖρα y ὑπηρέτας, y la nota de ambigüedad sobre la extensión real de la unidad militar.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se mantiene «Mesías»/«Cristo» fuera del versículo por no aparecer en el texto fuente.
  - «cohorte» y «oficiales» conservan la distinción entre un componente militar y otro ligado a autoridades judías.
  - El presente histórico griego ἔρχεται se rinde con «viene» para mantener la viveza narrativa.
