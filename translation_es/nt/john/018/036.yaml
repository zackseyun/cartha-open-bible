revisions:
- from: 'Jesús respondió[a]: «Mi reino no es de este mundo. Si mi reino fuera de este mundo, mis servidores estarían peleando para que yo no fuera entregado a los judíos. Pero, en realidad, mi reino no es de aquí».'
  to: 'Jesús respondió: «Mi reino no es de este mundo. Si mi reino fuera de este mundo, mis servidores estarían luchando para que yo no fuera entregado a los judíos[a]. Pero tal como están las cosas, mi reino no es de aquí».'
  rationale: Se corrige el anclaje de la nota para que corresponda a «a los judíos», que es el término explicado por la nota en el audit trail inglés. Además, se ajusta νῦν δὲ a «Pero tal como están las cosas» para reflejar mejor el contraste entre la hipótesis y el estado real, y se mejora ligeramente el registro con «estarían luchando».
