review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego y del audit trail inglés: mantiene «reino», conserva el contraste condicional, expresa el origen con «de este mundo» y termina con «de aquí». También preserva la nota alternativa para Ἰουδαίοις. Sin embargo, hay dos desajustes notables con la POB inglesa y con la naturalidad española: la nota al pie está anclada en «respondió[a]» en lugar de en «a los judíos[a]», y «Pero, en realidad» para νῦν δὲ suena algo interpretativo frente al más ceñido contraste factual del original.'
  spanish_quality_summary: El español es claro y legible, pero puede mejorarse. «Servidores» es comprensible aunque algo menos idiomático en registro bíblico general que «sirvientes» o «siervos»; no obliga cambio. «Estarían peleando» es fiel al aspecto, pero «luchando» suena un poco más digno que «peleando». Lo más importante es corregir el anclaje de la nota y suavizar «en realidad» a una formulación más natural y más ajustada al valor de νῦν δὲ.
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. «Jesús», «reino», «mundo» y «judíos» concuerdan con las decisiones auditadas. No aparecen términos sensibles como Yahvé, Mesías, δοῦλος, etc. La alternativa «judeanos» en nota se preserva correctamente, pero debe ir anclada a «judíos».
  issues:
  - severity: high
    issue: La nota al pie está anclada a «respondió[a]» en vez de a «a los judíos[a]».
    rationale: La nota explica la alternativa para τοῖς Ἰουδαίοις, no para ἀπεκρίθη. Según las instrucciones, el marcador exacto debe aparecer en la frase relevante del texto.
  - severity: medium
    issue: «Pero, en realidad» sobreinterpreta ligeramente νῦν δὲ.
    rationale: νῦν δὲ aquí contrasta el caso real con la condición hipotética previa. «Pero tal como están las cosas» o «Pero ahora» reflejan mejor ese giro sin añadir el matiz potencialmente polémico de «en realidad».
  - severity: low
    issue: «Peleando» es menos digno de registro que «luchando».
    rationale: Aunque es fiel y natural, «luchando» mantiene mejor el tono moderno pero solemne esperado para el proyecto y sigue reflejando ἠγωνίζοντο ἄν.
  revised_spanish_text: 'Jesús respondió: «Mi reino no es de este mundo. Si mi reino fuera de este mundo, mis servidores estarían luchando para que yo no fuera entregado a los judíos[a]. Pero tal como están las cosas, mi reino no es de aquí».'
  revised_footnotes:
  - marker: a
    text: O «a los judeanos», quizá refiriéndose más específicamente aquí a las autoridades judeanas.
    reason: alternative_reading
  revision_rationale: Se corrige el anclaje de la nota para que corresponda a «a los judíos», que es el término explicado por la nota en el audit trail inglés. Además, se ajusta νῦν δὲ a «Pero tal como están las cosas» para reflejar mejor el contraste entre la hipótesis y el estado real, y se mejora ligeramente el registro con «estarían luchando».
