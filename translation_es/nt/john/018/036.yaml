translation:
  language: es
  text: 'Jesús respondió: «Mi reino no es de este mundo. Si mi reino fuera de este mundo, mis servidores estarían luchando para que yo no fuera entregado a los judíos[a]. Pero tal como están las cosas, mi reino no es de aquí».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a los judeanos», quizá refiriéndose más específicamente aquí a las autoridades judeanas.
    reason: alternative_reading
lexical_decisions:
- source_word: βασιλεία
  english_pob_choice: kingdom
  chosen_spanish: reino
  alternatives_spanish:
  - reinado
  - gobierno
  - dominio
  lexicon: BDAG
  rationale: «Reino» es el equivalente más natural y reconocido en español para βασιλεία en este contexto. Mantiene la imagen regia y la repetición retórica del versículo, sin forzar una abstracción como «gobierno» o «dominio».
- source_word: ἐκ τοῦ κόσμου τούτου
  english_pob_choice: from this world
  chosen_spanish: de este mundo
  alternatives_spanish:
  - de este mundo
  - de este orden del mundo
  - procedente de este mundo
  lexicon: BDAG
  rationale: La preposición ἐκ señala origen o fuente. En español, «de este mundo» conserva esa relación de procedencia de forma natural y evita el matiz más interpretativo de «no es parte de este mundo».
- source_word: κόσμος
  english_pob_choice: world
  chosen_spanish: mundo
  alternatives_spanish:
  - mundo
  - orden del mundo
  lexicon: BDAG
  rationale: «Mundo» es la traducción directa y más clara. El matiz joánico de un orden humano opuesto a Dios queda en el contexto, sin expandir innecesariamente el texto.
- source_word: ὑπηρέται
  english_pob_choice: servants
  chosen_spanish: servidores
  alternatives_spanish:
  - sirvientes
  - siervos
  - subordinados
  lexicon: BDAG
  rationale: En este dicho real, «servidores» comunica bien la idea de personas bajo autoridad y suena más natural en español que «siervos» en este contexto. Se evita «oficiales» porque precisaría demasiado el rol.
- source_word: ἠγωνίζοντο ἄν
  english_pob_choice: would be fighting
  chosen_spanish: estarían peleando
  alternatives_spanish:
  - estarían luchando
  - pelearían
  - estarían combatiendo
  lexicon: BDAG
  rationale: El imperfecto con ἄν expresa una acción hipotética en curso. «Estarían peleando» conserva ese valor aspectual de manera fluida en español.
- source_word: ἵνα μὴ παραδοθῶ
  english_pob_choice: so that I might not be handed over
  chosen_spanish: para que yo no fuera entregado
  alternatives_spanish:
  - para que yo no fuera entregado
  - para que no me entregaran
  - a fin de que no fuera entregado
  lexicon: BDAG
  rationale: «Entregado» refleja bien παραδίδωμι en este contexto de arresto/juzgamiento. La construcción pasiva mantiene la perspectiva del original y la cláusula final de propósito.
- source_word: τοῖς Ἰουδαίοις
  english_pob_choice: to the Jews
  chosen_spanish: a los judíos
  alternatives_spanish:
  - a los judíos
  - a los judeanos
  lexicon: BDAG
  rationale: El término griego es Ἰουδαῖοι, y la traducción principal conserva su forma más directa. Se mantiene la tensión contextual señalada por la POB inglesa sin sustituir el término por una paráfrasis más estrecha en el texto principal.
- source_word: νῦν δὲ
  english_pob_choice: But as it is
  chosen_spanish: Pero, en realidad
  alternatives_spanish:
  - Pero ahora
  - Pero de hecho
  - Pero, tal como están las cosas
  lexicon: BDAG
  rationale: La expresión marca el estado efectivo de las cosas frente a la hipótesis previa. «En realidad» comunica bien ese contraste discursivo en español y evita una repetición mecánica de «ahora».
- source_word: ἐντεῦθεν
  english_pob_choice: from here
  chosen_spanish: de aquí
  alternatives_spanish:
  - de aquí
  - desde aquí
  - de este lugar
  lexicon: BDAG
  rationale: «De aquí» conserva el valor deíctico de ἐντεῦθεν y la oposición con «de este mundo» sin añadir una explicación interpretativa.
theological_decisions:
- issue: Relación del reino de Jesús con el mundo
  english_pob_reading: The kingdom is not from this world, emphasizing source/origin rather than saying it is absent from the world.
  chosen_spanish_reading: «Mi reino no es de este mundo» mantiene la idea de origen o procedencia, no de ausencia absoluta del mundo.
  alternative_spanish_readings:
  - Mi reino no es parte de este mundo
  - Mi reino no pertenece a este mundo
  rationale: 'La fórmula preserva la tensión teológica del texto: el reino de Jesús no procede del orden mundano, pero sí actúa en la historia. No se resuelve el pasaje hacia un dualismo simplista.'
  doctrine_reference: Translation philosophy §3
- issue: Sentido de τοῖς Ἰουδαίοις en Juan
  english_pob_reading: Main text keeps “the Jews” with a footnote offering “the Judeans” as a contextual alternative.
  chosen_spanish_reading: El texto principal conserva «a los judíos», con nota que ofrece la alternativa contextual «a los judeanos».
  alternative_spanish_readings:
  - a los judeanos
  - a los líderes judíos
  rationale: Se evita estrechar el referente más allá de lo que permite el griego, pero también se reconoce que el contexto inmediato apunta a las autoridades judías. La nota preserva esa tensión sin reemplazar el término del texto base.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El borrador sigue de cerca la última decisión aprobada del POB en inglés, sin introducir cambios textuales necesarios. Se mantuvo la equivalencia óptima en la estructura condicional y la cláusula final, y se preservó la tensión interpretativa sobre τοῖς Ἰουδαίοις mediante nota.
  spanish_consistency_notes:
  - Se usa «reino» de manera uniforme para βασιλεία.
  - Se conserva «de este mundo» / «de aquí» para distinguir ἐκ τοῦ κόσμου τούτου de ἐντεῦθεν.
  - «Entregado» se mantiene como verbo pasivo para παραδοθῶ, en línea con el valor judicial del pasaje.
  - No se sustituye «judíos» por un equivalente explicativo en el texto principal, para respetar la decisión auditada del POB en inglés.
