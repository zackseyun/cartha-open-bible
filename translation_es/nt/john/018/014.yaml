- from: Y Caifás era el que había aconsejado a los judíos que convenía que un solo hombre muriera por el pueblo[a][b].
  to: Ahora bien, Caifás era el que había aconsejado a los judíos que era mejor que un solo hombre muriera por el pueblo[a][b].
  rationale: 'La revisión hace dos ajustes menores de estilo y fidelidad auditiva al POB inglés: (1) cambia el conector inicial a ''Ahora bien'' para representar mejor el δέ narrativo en español natural; (2) sustituye ''convenía que'' por ''era mejor que'', que corresponde más de cerca a la decisión léxica auditada para συμφέρει y evita una construcción algo pesada. El resto del texto y las notas se mantienen porque ya preservan bien el sentido fuente y las alternativas documentadas.'
