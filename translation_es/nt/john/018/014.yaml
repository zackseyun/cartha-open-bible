translation:
  language: es
  text: Ahora bien, Caifás era el que había aconsejado a los judíos que era mejor que un solo hombre muriera por el pueblo[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a los líderes judíos» o «a los judeanos», según cómo se entienda en contexto el uso joánico de «los judíos».
    reason: alternative_reading
  - marker: b
    text: O «en favor del pueblo»; la frase también puede llevar matices representativos o sacrificiales en contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦν δὲ
  english_pob_choice: Now ... was
  chosen_spanish: Y ... era
  alternatives_spanish:
  - Ahora ... era
  - Pero ... era
  lexicon: BDAG
  rationale: δέ funciona aquí como una partícula de continuidad narrativa. En español, 'Y' mantiene el flujo y el enlace suave sin exagerar contraste; 'era' conserva el imperfecto del estado descriptivo.
- source_word: Καϊάφας
  english_pob_choice: Caiaphas
  chosen_spanish: Caifás
  alternatives_spanish:
  - Caiás
  lexicon: BDAG
  rationale: Se translitera el nombre propio con la forma usual en español bíblico, 'Caifás', que es clara y reconocible.
- source_word: ὁ συμβουλεύσας
  english_pob_choice: the one who had advised
  chosen_spanish: el que había aconsejado
  alternatives_spanish:
  - el que había dado consejo
  - el que había aconsejado a
  lexicon: BDAG
  rationale: El participio articular aoristo identifica a Caifás por una acción previa. 'El que había aconsejado' reproduce bien la referencia pasada y la función atributiva en español natural.
- source_word: τοῖς Ἰουδαίοις
  english_pob_choice: the Jews
  chosen_spanish: a los judíos
  alternatives_spanish:
  - a los líderes judíos
  - a los judeanos
  lexicon: BDAG
  rationale: El griego dice simplemente 'a los judíos' sin precisar un subgrupo. Se conserva esa formulación en el texto principal; las alternativas interpretativas quedan para nota, porque el uso joánico de la expresión es debatido.
- source_word: ὅτι συμφέρει
  english_pob_choice: that it was better
  chosen_spanish: que convenía
  alternatives_spanish:
  - que era mejor
  - que era conveniente
  lexicon: BDAG
  rationale: συμφέρει expresa conveniencia/beneficio. 'Convenía' es un equivalente natural en español y mantiene el tono deliberativo del consejo político sin añadir matices no necesarios.
- source_word: ἕνα ἄνθρωπον
  english_pob_choice: one man
  chosen_spanish: un solo hombre
  alternatives_spanish:
  - un hombre
  - una sola persona
  lexicon: BDAG
  rationale: '''Un solo hombre'' conserva el numeral enfático y el referente masculino explícito del griego, con naturalidad en español.'
- source_word: ἀποθανεῖν
  english_pob_choice: to die
  chosen_spanish: muriera
  alternatives_spanish:
  - morir
  - llegara a morir
  lexicon: BDAG
  rationale: Tras 'convenía que', el subjuntivo imperfecto en español expresa adecuadamente la subordinación de finalidad/contenido del dicho indirecto. No se amplía el sentido del infinitivo más allá de 'morir'.
- source_word: ὑπὲρ τοῦ λαοῦ
  english_pob_choice: for the people
  chosen_spanish: por el pueblo
  alternatives_spanish:
  - en favor del pueblo
  - en representación del pueblo
  lexicon: BDAG
  rationale: ὑπέρ puede ser benefactivo o representativo; 'por el pueblo' es breve y deja abierto el trasfondo sacrificial o representativo, como en el inglés POB.
- source_word: λαοῦ
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la nación
  lexicon: BDAG
  rationale: λαός significa 'pueblo'. 'El pueblo' es el equivalente más exacto y natural en español bíblico, sin introducir la ampliación de 'nación' que no está en este versículo.
theological_decisions:
- issue: Posible matiz sustitutivo o sacrificial de ὑπὲρ τοῦ λαοῦ
  english_pob_reading: for the people
  chosen_spanish_reading: por el pueblo
  alternative_spanish_readings:
  - en favor del pueblo
  - en lugar del pueblo
  rationale: La frase puede sugerir beneficio, representación o resonancias sacrificiales en el contexto joánico. El texto principal mantiene la formulación abierta sin resolver el alcance doctrinal, preservando la tensión documentada por el POB inglés.
  doctrine_reference: Preservar tensión teológica sin explicitar una doctrina no obligada por la forma griega.
- issue: Referente de τοῖς Ἰουδαίοις en Juan
  english_pob_reading: the Jews
  chosen_spanish_reading: a los judíos
  alternative_spanish_readings:
  - a los líderes judíos
  - a los judeanos
  rationale: Se conserva la expresión del texto griego sin estrecharla en el cuerpo principal. Dado que en Juan el referente puede ser discutido, la nota recoge alternativas interpretativas sin alterar el texto base.
  doctrine_reference: Primacía del original; mantener ambigüedad cuando es genuina.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el pasaje griego y el auditable del POB inglés. Se mantuvieron las mismas tensiones interpretativas principales: τοῖς Ἰουδαίοις y ὑπὲρ τοῦ λαοῦ. No se detectaron revisiones posteriores en el paquete de origen; el borrador refleja el estado más reciente sin cambios.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni una cita directa de יהוה.
  - Se prefiere «judíos» para mantener la correspondencia formal con τοῖς Ἰουδαίοις, dejando las alternativas interpretativas en nota.
  - «Por el pueblo» conserva la ambigüedad benefactiva/representativa solicitada por el POB; no se sustituye por formulaciones doctrinalmente cerradas.
  - Se usa «Caifás» como forma establecida en español bíblico.
  - El orden sintáctico español se ajusta levemente para legibilidad, sin añadir contenido exegético no presente en el griego.
