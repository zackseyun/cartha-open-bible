revisions:
- from: 'Pilato respondió[a]: «¿Acaso yo soy judío? Tu propia nación y los principales sacerdotes te han entregado a mí. ¿Qué has hecho?»'
  to: 'Pilato respondió[a]: «¿Acaso no soy yo judío? Tu propia nación y los sumos sacerdotes te entregaron en mis manos. ¿Qué has hecho?»'
  rationale: Se ajusta la pregunta para reflejar mejor la expectativa negativa de μήτι, se sustituye una expresión poco idiomática («te han entregado a mí») por una construcción natural en español que mantiene el matiz judicial, y se usa «sumos sacerdotes» como equivalente bíblico más natural de ἀρχιερεῖς. La nota sobre «judeano» se conserva sin cambios.
