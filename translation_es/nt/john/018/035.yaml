translation:
  language: es
  text: 'Pilato respondió[a]: «¿Acaso no soy yo judío? Tu propia nación y los sumos sacerdotes te entregaron en mis manos. ¿Qué has hecho?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «judeano». El término griego puede denotar identidad étnico-religiosa («judío») o regional («judeano»), según el contexto.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀπεκρίθη
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: BDAG
  rationale: En diálogo narrativo, ἀποκρίνομαι se expresa naturalmente en español con «respondió» o «contestó». «Respondió» conserva la función de réplica sin añadir matiz interpretativo.
- source_word: Μήτι
  english_pob_choice: I am not ... am I?
  chosen_spanish: ¿Acaso yo soy ...?
  alternatives_spanish:
  - ¿No soy yo ...?
  - ¿Soy yo acaso ...?
  lexicon: BDAG
  rationale: μήτι introduce una pregunta que espera respuesta negativa. En español, «¿Acaso yo soy judío?» mantiene el tono retórico y evita una paráfrasis demasiado libre; el contexto ya comunica la negación implícita.
- source_word: Ἰουδαῖός
  english_pob_choice: Jew
  chosen_spanish: judío
  alternatives_spanish:
  - judeano
  lexicon: BDAG
  rationale: Aquí Pilato se distancia de Jesús y de sus acusadores con una identidad étnico-religiosa; «judío» es el equivalente natural y fiel en español. «Judeano» quedaría más técnico y menos transparente en este intercambio.
- source_word: τὸ ἔθνος τὸ σὸν
  english_pob_choice: your own nation
  chosen_spanish: tu propia nación
  alternatives_spanish:
  - tu pueblo
  - tu nación
  lexicon: BDAG
  rationale: ἔθνος puede ser nación o pueblo. «Tu propia nación» conserva el possessivo enfático de τὸ σὸν y reproduce el tono distanciado de Pilato, sin perder la referencia colectiva.
- source_word: ἀρχιερεῖς
  english_pob_choice: chief priests
  chosen_spanish: principales sacerdotes
  alternatives_spanish:
  - sumos sacerdotes
  - jefes de los sacerdotes
  lexicon: BDAG
  rationale: La expresión griega en plural nombra al liderazgo sacerdotal. «Principales sacerdotes» es claro y ampliamente comprensible en español; «sumos sacerdotes» podría sonar más rígido o sugerir una forma singular en ciertos lectores.
- source_word: παρέδωκάν
  english_pob_choice: handed ... over
  chosen_spanish: te han entregado
  alternatives_spanish:
  - te entregaron
  - te han puesto en mis manos
  - te han dado
  lexicon: BDAG
  rationale: παραδίδωμι en contexto judicial describe entregar a una autoridad. «Te han entregado» preserva ese valor sin cargarlo con «traicionado», que sería más fuerte de lo que el contexto inmediato exige.
- source_word: τί ἐποίησας
  english_pob_choice: What have you done?
  chosen_spanish: ¿Qué has hecho?
  alternatives_spanish:
  - ¿Qué hiciste?
  - ¿Qué has hecho, pues?
  lexicon: BDAG
  rationale: El aoristo se refiere a una acción ya realizada cuya relevancia sigue vigente en la pregunta judicial. «¿Qué has hecho?» suena natural en español y conserva esa actualidad procesal.
theological_decisions:
- issue: Sentido de Ἰουδαῖος en Juan 18:35
  english_pob_reading: Jew, with a footnoted alternative “Judean”
  chosen_spanish_reading: judío, con nota alternativa “judeano”
  alternative_spanish_readings:
  - judío sin nota
  - judeano en el texto principal
  rationale: El contexto inmediato favorece la lectura étnico-religiosa amplia, como en el audit trail inglés. Mantener «judío» en el texto principal preserva la inteligibilidad; la nota alternativa resguarda la ambigüedad lexical de Ἰουδαῖος sin forzarla en el cuerpo del texto.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve ambiguity only where the source is genuinely ambiguous'
- issue: Valor judicial de παρέδωκάν σε ἐμοί
  english_pob_reading: handed you over to me
  chosen_spanish_reading: te han entregado a mí
  alternative_spanish_readings:
  - te entregaron a mí
  - te han puesto en mis manos
  rationale: La escena es procesal y de autoridad, no meramente física. «Te han entregado a mí» mantiene la relación judicial y no introduce una interpretación moral adicional que el griego no exige aquí.
  doctrine_reference: Source-sensitive lexical precision in passion narrative
translation_notes:
  revision_awareness: El borrador sigue de cerca el auditable inglés POB y el griego de SBLGNT; no se detectan revisiones textuales en el paquete fuente, y la redacción española preserva la fuerza retórica de la pregunta de Pilato sin suavizar la tensión lexical de Ἰουδαῖος.
  spanish_consistency_notes:
  - Se mantiene «principales sacerdotes» para el plural sacerdotal, coherente con el valor colectivo del griego.
  - Se evita «SEÑOR» u otra terminología no pertinente; no hay nombre divino en este versículo.
  - 'La pregunta final conserva el aoristo con una forma natural en español: «¿Qué has hecho?».'
  - La nota [a] se ancla en «judío» para preservar la alternativa léxica documentada sin alterar el texto principal.
