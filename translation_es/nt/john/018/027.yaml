translation:
  language: es
  text: Entonces Pedro lo negó de nuevo[a], e inmediatamente cantó un gallo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Entonces Pedro negó de nuevo»; el griego no expresa el objeto de forma explícita, pero el contexto lo aporta de la pregunta anterior.'
    reason: alternative_reading
lexical_decisions:
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: de nuevo
  alternatives_spanish:
  - otra vez
  - nuevamente
  lexicon: BDAG
  rationale: El adverbio expresa repetición; «de nuevo» suena natural en español y conserva la idea de una nueva negación sin añadir énfasis innecesario.
- source_word: οὖν
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - por tanto
  - así que
  lexicon: BDAG
  rationale: La partícula enlaza narrativamente con el intercambio previo. «Entonces» mantiene la secuencia sin imponer una relación lógica más fuerte que la del contexto.
- source_word: ἠρνήσατο
  english_pob_choice: denied it
  chosen_spanish: lo negó
  alternatives_spanish:
  - negó
  - lo rechazó
  - se desentendió de él
  lexicon: BDAG
  rationale: El griego no expresa el objeto de forma explícita, pero el contexto inmediato lo suministra. En español, «lo negó» preserva esa referencia contextual de manera natural y evita sobreinterpretar el verbo.
- source_word: Πέτρος
  english_pob_choice: Peter
  chosen_spanish: Pedro
  alternatives_spanish:
  - Pedro
  lexicon: Nombre propio estándar
  rationale: Se usa la forma española corriente del nombre propio, conforme al uso bíblico estable.
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: e
  alternatives_spanish:
  - y
  - entonces
  lexicon: BDAG
  rationale: Conjunción coordinante que une la negación con el hecho siguiente. «E» es la forma fonética normal ante «inmediatamente» y suena más fluida en español.
- source_word: εὐθέως
  english_pob_choice: immediately
  chosen_spanish: inmediatamente
  alternatives_spanish:
  - al instante
  - enseguida
  - de inmediato
  lexicon: BDAG
  rationale: Marca la inmediatez temporal entre la negación y el canto del gallo. «Inmediatamente» conserva con precisión esa fuerza narrativa.
- source_word: ἀλέκτωρ
  english_pob_choice: rooster
  chosen_spanish: un gallo
  alternatives_spanish:
  - un gallo
  - un gallo de corral
  lexicon: BDAG
  rationale: El término designa el macho de la gallina. «Gallo» es el equivalente natural y claro en español.
- source_word: ἐφώνησεν
  english_pob_choice: crowed
  chosen_spanish: cantó
  alternatives_spanish:
  - cantó
  - cacareó
  lexicon: BDAG
  rationale: Aunque el verbo puede significar en general «hacer oír la voz», con «gallo» como sujeto el español idiomático es «cantó». «Cacareó» suena menos natural para un gallo y altera el tono narrativo.
translation_notes:
  revision_awareness: 'Se siguió el sentido auditado del texto griego y del antecedente inglés: secuencia narrativa («Entonces»), repetición («de nuevo»), objeto implícito de la negación y canto del gallo como hecho inmediato.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o equivalentes porque no hay aquí un caso del nombre divino.
  - Se mantuvo la secuencia breve y sobria del original, sin añadir explicaciones en el cuerpo del texto.
  - La nota conserva la alternativa textual/lexical relevante que el inglés POB documentó sobre el objeto implícito.
