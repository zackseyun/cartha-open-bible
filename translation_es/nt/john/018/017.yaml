translation:
  language: es
  text: 'Entonces la joven sirvienta que cuidaba la puerta le dijo a Pedro[a]: «¿No eres tú también uno de los discípulos de este hombre?». Él dijo: «No soy».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «esclava joven que estaba a la puerta».
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει οὖν
  english_pob_choice: So
  chosen_spanish: Entonces
  alternatives_spanish:
  - Así que
  - Por tanto
  - Luego
  lexicon: BDAG
  rationale: οὖν marca continuación narrativa; «Entonces» suena natural en español y conserva la progresión del relato sin cargar demasiado el matiz inferencial.
- source_word: παιδίσκη
  english_pob_choice: servant girl
  chosen_spanish: muchacha servidora
  alternatives_spanish:
  - sirvienta
  - criada
  - esclava joven
  lexicon: BDAG
  rationale: El término puede referirse a una joven sirvienta o esclava. En este contexto narrativo, la función de la mujer en la escena es lo principal; «muchacha servidora» mantiene el matiz de servicio sin imponer de entrada la carga jurídica de «esclava».
- source_word: ἡ θυρωρός
  english_pob_choice: who kept the door
  chosen_spanish: que cuidaba la puerta
  alternatives_spanish:
  - portera
  - la que estaba a la puerta
  - la doorkeeper
  lexicon: BDAG
  rationale: θυρωρός identifica la función de quien atiende la entrada. «Que cuidaba la puerta» expresa esa función de manera clara y fluida en español, sin perder el valor descriptivo del participio/atributo.
- source_word: Μὴ καὶ σὺ
  english_pob_choice: You are not also
  chosen_spanish: ¿No eres tú también... ?
  alternatives_spanish:
  - ¿Acaso tú también... ?
  - ¿No serás tú también... ?
  - ¿Tú también no... ?
  lexicon: BDAG
  rationale: La pregunta con μή espera una respuesta negativa. En español, la forma interrogativa negativa reproduce bien esa expectativa sin volverla demasiado forzada.
- source_word: ἐκ τῶν μαθητῶν
  english_pob_choice: one of ... disciples
  chosen_spanish: uno de los discípulos
  alternatives_spanish:
  - de los discípulos
  - del grupo de los discípulos
  lexicon: BDAG
  rationale: ἐκ conserva sentido partitivo; «uno de los discípulos» es la manera más natural de expresarlo en español y mantiene la pertenencia al grupo.
- source_word: τοῦ ἀνθρώπου τούτου
  english_pob_choice: this man's
  chosen_spanish: de este hombre
  alternatives_spanish:
  - de este hombre aquí
  - de este sujeto
  lexicon: BDAG
  rationale: ἄνθρωπος aquí significa «hombre» en sentido ordinario. «De este hombre» conserva el tono algo distante del demostrativo y evita suavizarlo en exceso.
- source_word: λέγει ἐκεῖνος
  english_pob_choice: He said
  chosen_spanish: Él respondió
  alternatives_spanish:
  - Él dijo
  - Dijo él
  lexicon: BDAG
  rationale: ἐκεῖνος remite a Pedro. «Respondió» expresa naturalmente la función discursiva aquí, ya que sigue a la pregunta y precede a una negación breve.
- source_word: Οὐκ εἰμί
  english_pob_choice: I am not
  chosen_spanish: No lo soy
  alternatives_spanish:
  - No soy
  - No estoy entre ellos
  - No soy uno
  lexicon: BDAG
  rationale: La réplica griega es escueta y negativa. «No lo soy» mantiene la brevedad y evita añadir elementos que el griego no explicita.
theological_decisions:
- issue: Nuance social of παιδίσκη
  english_pob_reading: Use 'servant girl' in the main text while preserving 'slave girl' as a lexical alternative.
  chosen_spanish_reading: Usar «muchacha servidora» en el texto principal, con nota de alternativa «esclava joven».
  alternative_spanish_readings:
  - «sirvienta»
  - «criada»
  - «esclava joven»
  rationale: El griego puede denotar servidumbre o esclavitud femenina. En esta escena no se enfatiza la condición jurídica sino la identidad funcional de la hablante; por eso el texto principal usa un término natural y digno, dejando constancia de la alternativa más fuerte.
  doctrine_reference: 'Translation philosophy §1, §5; Contested terms: δοῦλος'
- issue: Force of the negative question introduced by μή
  english_pob_reading: 'Render as a question expecting a negative answer: ''You are not also ... , are you?'''
  chosen_spanish_reading: 'Mantener una pregunta negativa que sugiera respuesta negativa: «¿No eres tú también...?»'
  alternative_spanish_readings:
  - «¿Acaso tú también...?»
  - «¿No serás tú también...?»
  rationale: Se trata de una decisión gramatical y discursiva. La forma escogida reproduce la expectativa de refutación implícita en μή sin exagerar el tono.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'El pasaje coincide con la revisión más reciente aprobada: no hubo cambios aplicados y el consenso de revisión fue de alta concordancia. La redacción española sigue la misma interpretación básica del griego y del audit trail inglés, especialmente en παιδίσκη, θυρωρός, μή + pregunta, y Οὐκ εἰμί.'
  spanish_consistency_notes:
  - Se mantiene «Pedro» como receptor directo del interrogatorio, siguiendo el sujeto dativo del griego.
  - Se conserva la brevedad de la negación final con una fórmula idiomática española equivalente a Οὐκ εἰμί.
  - «Discípulos» traduce μαθητῶν sin añadir matices no presentes.
  - La nota al pie preserva la alternativa léxica más fuerte para παιδίσκη sin desplazar el texto principal.
