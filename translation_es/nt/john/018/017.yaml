    rationale: Aunque intenta reflejar παιδίσκη sin sobredeterminar esclavitud, la expresión no suena idiomática en español eclesial general. «Joven sirvienta» preserva edad/sexo/función con mejor legibilidad.
  - severity: medium
    issue: «No lo soy» añade un elemento no expreso y debilita la tersura de Οὐκ εἰμί
    rationale: El griego dice simplemente «No soy / no lo soy» elípticamente, pero en este contexto español «No soy» reproduce mejor la brevedad y evita añadir el pronombre objeto.
  - severity: low
    issue: Puntuación mejorable con comillas angulares
    rationale: En español estándar, no es necesario colocar el punto fuera de la comilla de cierre después de la pregunta citada antes del verbo de habla siguiente.
