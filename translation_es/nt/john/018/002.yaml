translation:
  language: es
  text: Y Judas[a], el que lo traicionaba, también conocía el lugar, porque Jesús se reunía allí[b] con sus discípulos con frecuencia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el que lo entregaba».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «porque Jesús solía reunirse allí con sus discípulos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ᾔδει
  english_pob_choice: knew
  chosen_spanish: conocía
  alternatives_spanish:
  - sabía
  - había conocido
  lexicon: BDAG
  rationale: οἶδα expresa conocimiento o familiaridad; en español, «conocía» comunica de modo natural que Judas estaba familiarizado con ese sitio. Evita la rigidez de «sabía el lugar» y conserva el valor de conocimiento estable.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora bien
  - Pues
  lexicon: BDAG
  rationale: δέ aquí marca continuidad narrativa leve. En español, «Y» enlaza sin introducir una oposición fuerte ni un tono artificial.
- source_word: καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - además
  - incluso
  lexicon: BDAG
  rationale: καί añade a Judas al grupo de quienes conocían el lugar; «también» preserva claramente ese valor aditivo.
- source_word: ὁ παραδιδοὺς αὐτὸν
  english_pob_choice: who was betraying him
  chosen_spanish: el que lo entregaba
  alternatives_spanish:
  - el que lo traicionaba
  - su traidor
  lexicon: BDAG
  rationale: παραδίδωμι en el relato de la pasión suele tener fuerza narrativa de «entregar»; en español, «el que lo entregaba» mantiene el participio presente y evita fijar sin necesidad una equivalencia más interpretativa como «traicionaba». Se conserva así la tensión entre entrega y traición que el contexto puede sugerir.
- source_word: τὸν τόπον
  english_pob_choice: the place
  chosen_spanish: el lugar
  alternatives_spanish:
  - ese lugar
  - la ubicación
  lexicon: BDAG
  rationale: τόπος significa de manera directa «lugar» o «sitio». «El lugar» es natural y refleja que se trata de un sitio ya conocido en el contexto.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - pues
  lexicon: BDAG
  rationale: Aquí ὅτι introduce la razón por la que Judas conocía el lugar. «Porque» expresa con claridad la relación causal.
- source_word: πολλάκις
  english_pob_choice: often
  chosen_spanish: con frecuencia
  alternatives_spanish:
  - muchas veces
  - a menudo
  lexicon: BDAG
  rationale: πολλάκις indica repetición. «Con frecuencia» es una opción digna y precisa en español, ligeramente más formal que «a menudo» sin perder naturalidad.
- source_word: συνήχθη
  english_pob_choice: often met
  chosen_spanish: se reunía
  alternatives_spanish:
  - se juntaba
  - se congregaba
  lexicon: BDAG
  rationale: El pasivo de συνάγω puede funcionar con sentido intransitivo de reunirse o juntarse. «Se reunía» comunica bien el carácter habitual del encuentro y suena natural en español. No se fuerza una forma pasiva artificial.
- source_word: μετὰ τῶν μαθητῶν αὐτοῦ
  english_pob_choice: with his disciples
  chosen_spanish: con sus discípulos
  alternatives_spanish:
  - junto con sus discípulos
  lexicon: BDAG
  rationale: μετά con genitivo indica compañía o asociación; «con sus discípulos» preserva esa relación de acompañamiento. «Discípulos» es el término normal en el contexto joánico.
theological_decisions:
- issue: Valor de παραδιδοὺς aplicado a Judas
  english_pob_reading: betraying
  chosen_spanish_reading: entregaba
  alternative_spanish_readings:
  - traicionaba
  - lo entregaba
  rationale: En este contexto, el verbo apunta a Judas como agente de la entrega de Jesús. «Entregaba» mantiene la ambigüedad controlada del griego y permite que el lector perciba la carga narrativa sin imponer de entrada una sola glosa teológica. La alternativa «traicionaba» es posible por el contexto, pero es más interpretativa.
  doctrine_reference: Translation philosophy §1, §6
- issue: Sentido de συνήχθη en relación con Jesús
  english_pob_reading: Jesus often met there with his disciples
  chosen_spanish_reading: Jesús se reunía allí con sus discípulos con frecuencia
  alternative_spanish_readings:
  - Jesús había solido reunirse allí con sus discípulos
  - Jesús se juntaba allí con sus discípulos con frecuencia
  rationale: El griego describe una acción habitual y el pasivo se usa con valor intransitivo. «Se reunía» preserva el sentido de reunión repetida, sin sugerir necesariamente una acción puntual o una pasiva extraña en español. La frase mantiene la referencia a encuentros habituales, no una afirmación doctrinal adicional.
  doctrine_reference: Translation philosophy §5, §6
translation_notes:
  revision_awareness: La redacción sigue el ajuste más reciente del inglés POB, que prefirió «often met there» frente a una formulación más literal como «had often gathered there», para sonar más natural y ajustarse al valor intransitivo de συνήχθη. En español se adoptó el mismo enfoque con «se reunía allí con sus discípulos con frecuencia».
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no lo contiene.
  - Se mantiene «Jesús» como forma fija del nombre propio.
  - Se prefirió «entregaba» para preservar la fuerza narrativa de παραδίδωμι sin perder la posibilidad de lectura de traición en el contexto.
  - No se usó «Cristo» ni «Señor» porque no aparecen en el versículo y no son necesarios aquí.
  - La puntuación sigue el uso español moderno y conserva la cadencia narrativa del relato.
