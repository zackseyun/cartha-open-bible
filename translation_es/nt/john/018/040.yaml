translation:
  language: es
  text: 'Entonces gritaron[a] de nuevo, diciendo: «No a este, sino a Barrabás». Ahora bien, Barrabás era un ladrón.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «bandido»; el término griego puede referirse a un ladrón, salteador o insurgente violento en algunos contextos.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκραύγασαν
  english_pob_choice: they shouted
  chosen_spanish: gritaron
  alternatives_spanish:
  - clamaron
  - vociferaron
  lexicon: BDAG
  rationale: κραυγάζω expresa un grito fuerte y público. «Gritaron» comunica esa intensidad en español de forma natural, sin volver el registro excesivamente coloquial.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - Entonces
  - Por tanto
  lexicon: BDAG
  rationale: οὖν marca continuidad inferencial o narrativa. «Así que» funciona como conector discursivo natural en español y conserva el enlace con la escena anterior.
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: de nuevo
  alternatives_spanish:
  - otra vez
  - nuevamente
  lexicon: BDAG
  rationale: πάλιν indica repetición. «De nuevo» es claro, sobrio y equivalente al valor básico del término.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - gritando
  - clamando
  lexicon: BDAG
  rationale: Aunque en español puede sonar redundante tras «gritaron», el participio se conserva con «diciendo» para respetar la estructura del griego sin añadir interpretación.
- source_word: Μὴ τοῦτον ἀλλὰ τὸν Βαραββᾶν
  english_pob_choice: Not this man, but Barabbas
  chosen_spanish: No a este, sino a Barrabás
  alternatives_spanish:
  - No a este hombre, sino a Barrabás
  - No a él, sino a Barrabás
  lexicon: BDAG
  rationale: El griego es elíptico y contrastivo. En español, «No a este» preserva la oposición inmediata del demonstrativo y evita sobrecargar el texto con una paráfrasis innecesaria. Se mantiene el nombre propio transliterado como «Barrabás».
- source_word: ἦν δὲ ὁ Βαραββᾶς λῃστής
  english_pob_choice: Now Barabbas was a robber
  chosen_spanish: Y Barrabás era un ladrón
  alternatives_spanish:
  - Y Barrabás era un bandido
  - Y Barrabás era un salteador
  lexicon: BDAG
  rationale: λῃστής tiene como sentido central «ladrón» o «bandido». Se elige «ladrón» por ser la equivalencia más transparente y directa en español, sin importar al texto una lectura histórica más amplia que el versículo no exige por sí mismo.
theological_decisions:
- issue: Alcance semántico de λῃστής aplicado a Barrabás
  english_pob_reading: robber
  chosen_spanish_reading: ladrón
  alternative_spanish_readings:
  - bandido
  - salteador
  - insurgente
  rationale: El contexto inmediato identifica a Barrabás con λῃστής, término que puede abarcar desde «ladrón» hasta «bandido» o, en ciertos contextos, un insurgente violento. El texto de Juan 18:40 por sí solo no obliga a importar esa ampliación histórica; por eso la lectura principal conserva el sentido más directo y deja abiertas las demás posibilidades.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; preserve lexical tension rather than resolving it beyond the source.'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el griego SBLGNT y armoniza con el expediente en inglés: mantiene la repetición de la escena, conserva la elipsis del contraste y deja sin resolver artificialmente el rango semántico de λῃστής. No se registraron revisiones posteriores que alteren la lectura base.'
  spanish_consistency_notes:
  - Se usa «Barrabás» como transliteración estándar del nombre propio.
  - Se evita «SEÑOR» u otra terminología litúrgica no pertinente aquí.
  - La puntuación reproduce la clausula de contraste con comillas españolas y mantiene el tono narrativo sobrio.
  - «Ladrón» se entiende en sentido léxico amplio, no como juicio moral añadido por traducción.
