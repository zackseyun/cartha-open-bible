    issue: «Así que» para οὖν
    rationale: οὖν aquí marca continuación/resultado discursivo, pero «Así que» en español puede sonar más causal o conclusivo de lo necesario. «Entonces» reproduce mejor el avance narrativo sin sobreinterpretar.
  - severity: medium
    issue: «Y Barrabás era un ladrón» para ἦν δὲ
    rationale: δέ introduce una aclaración de trasfondo. «Y» es posible, pero «Ahora bien, Barrabás era un ladrón» o similar refleja mejor la función explicativa señalada por el POB inglés con «Now».
  revised_spanish_text: 'Entonces gritaron[a] de nuevo, diciendo: «No a este, sino a Barrabás». Ahora bien, Barrabás era un ladrón.'
