revisions:
- from: 'Así que gritaron[a] de nuevo, diciendo: «No a este, sino a Barrabás». Y Barrabás era un ladrón.'
  to: 'Entonces gritaron[a] de nuevo, diciendo: «No a este, sino a Barrabás». Ahora bien, Barrabás era un ladrón.'
  rationale: Se ajusta οὖν a «Entonces» para una progresión narrativa más natural y menos causal, y ἦν δὲ a «Ahora bien» para reflejar la aclaración parentética del griego y del audit trail inglés. Se conserva «ladrón» con nota por la amplitud semántica de λῃστής.
