translation:
  language: es
  text: 'Uno de los esclavos[a] del sumo sacerdote, siendo pariente del hombre a quien Pedro había cortado la oreja, dijo: «¿No te vi yo en el jardín con él?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «siervos». El término griego es douloi, que puede significar «siervos» o «esclavos» según el contexto; aquí se eligió «esclavos» para preservar el estatus de dependencia que el término implica.
    reason: lexical_alternative
lexical_decisions:
- source_word: δούλων
  english_pob_choice: slaves
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  - criados
  lexicon: BDAG
  rationale: δοῦλος aquí conserva su fuerza de pertenencia y dependencia. En español, «esclavos» expresa mejor ese vínculo que «siervos», que suaviza el término y puede perder el matiz social del contexto.
- source_word: ἀρχιερέως
  english_pob_choice: high priest
  chosen_spanish: sumo sacerdote
  alternatives_spanish:
  - sumo pontífice
  - gran sacerdote
  lexicon: BDAG
  rationale: Es la forma estable y clara en español para ἀρχιερεύς en el contexto de la pasión, y comunica el cargo sin ambigüedad.
- source_word: συγγενὴς ὢν
  english_pob_choice: being a relative
  chosen_spanish: siendo pariente
  alternatives_spanish:
  - siendo un pariente
  - que era pariente
  lexicon: BDAG
  rationale: La construcción participial se refleja de forma natural con «siendo», como en el inglés auditado, y «pariente» mantiene el vínculo familiar sin añadir precisión no garantizada por el griego.
- source_word: οὗ ἀπέκοψεν Πέτρος τὸ ὠτίον
  english_pob_choice: of the man whose ear Peter had cut off
  chosen_spanish: del hombre a quien Pedro le había cortado la oreja
  alternatives_spanish:
  - del hombre cuya oreja Pedro había cortado
  - del hombre a quien Pedro había cortado la oreja
  lexicon: BDAG
  rationale: El relativo griego apunta al hombre afectado por la acción. En español, «a quien» hace explícita la relación personal y evita una formulación demasiado literal que sonaría menos natural. «Oreja» preserva el sentido básico de ὠτίον sin forzar el diminutivo.
- source_word: Οὐκ ἐγώ σε εἶδον
  english_pob_choice: Didn’t I see you
  chosen_spanish: ¿No te vi yo?
  alternatives_spanish:
  - ¿No te vi?
  - ¿Acaso no te vi yo?
  lexicon: BDAG
  rationale: La pregunta con negación y énfasis en ἐγώ se reproduce con el orden «te vi yo», que conserva la fuerza retórica sin volverla artificiosa.
- source_word: ἐν τῷ κήπῳ
  english_pob_choice: in the garden
  chosen_spanish: en el jardín
  alternatives_spanish:
  - en el huerto
  - en el jardín/huerto
  lexicon: BDAG
  rationale: «Jardín» es la equivalencia más natural para κῆπος en español moderno. «Huerto» sería posible, pero aquí puede sonar más agrícola y menos acorde con la escena narrativa.
- source_word: μετ’ αὐτοῦ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - con él allí
  - junto con él
  lexicon: BDAG
  rationale: Traducción directa y natural del complemento preposicional; el referente es Jesús en el contexto inmediato.
theological_decisions:
- issue: Renderizar δοῦλος sin suavizar su fuerza social
  english_pob_reading: slaves
  chosen_spanish_reading: esclavos
  alternative_spanish_readings:
  - siervos
  - criados
  rationale: La decisión sigue la lectura auditada de la POB inglesa y evita reemplazar el término por uno eclesiásticamente más suave. En este contexto, la referencia es a personal ligado a la casa del sumo sacerdote, no a un simple grupo de asistentes genéricos.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms table for δοῦλος
- issue: Mantener la fuerza retórica de la pregunta final
  english_pob_reading: Didn’t I see you in the garden with him?
  chosen_spanish_reading: ¿No te vi yo en el jardín con él?
  alternative_spanish_readings:
  - ¿No te vi en el jardín con él?
  - ¿Acaso no te vi yo en el jardín con él?
  rationale: El griego usa una pregunta con negación que espera afirmación. El español conserva ese valor retórico sin convertirla en una afirmación indirecta ni en una paráfrasis interpretativa.
  doctrine_reference: DOCTRINE.md Translation philosophy §1
translation_notes:
  revision_awareness: La revisión más reciente añadió explícitamente «siendo» para reflejar mejor la construcción participial συγγενὴς ὢν. La redacción española sigue esa mejora al usar «siendo pariente», y también conserva el énfasis interrogativo final de la frase griega tal como se reflejó en el audit trail inglés.
  spanish_consistency_notes:
  - Se usa «esclavos» para δοῦλοι conforme a la política terminológica del proyecto, evitando «siervos» salvo razón contextual específica.
  - Se prefiere «sumo sacerdote» para ἀρχιερεύς, forma estable en español bíblico contemporáneo.
  - «Jardín» se mantiene para κῆπος por naturalidad y coherencia con la escena de Getsemaní.
  - La pregunta final conserva el orden enfático con «yo» para reflejar ἐγώ.
