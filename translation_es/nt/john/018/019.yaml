translation:
  language: es
  text: Así que el sumo sacerdote interrogó a Jesús acerca de sus discípulos y acerca de su enseñanza[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «preguntó». El verbo griego puede traducirse tanto «preguntó» como «interrogó»; se escogió «interrogó» para reflejar el contexto formal de la audiencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὁ οὖν
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - Entonces
  - Por tanto
  lexicon: BDAG
  rationale: Ὁ οὖν introduce continuidad narrativa e inferencia. «Así que» comunica bien esa transición en español actual sin añadir una conclusión demasiado lógica o formal.
- source_word: ἀρχιερεύς
  english_pob_choice: the high priest
  chosen_spanish: el sumo sacerdote
  alternatives_spanish:
  - el jefe de los sacerdotes
  - el gran sacerdote
  lexicon: BDAG
  rationale: Es la forma establecida y natural en español para el título sacerdotal supremo. Mantiene el oficio del texto griego sin sustituirlo por un nombre propio o una armonización histórica.
- source_word: ἠρώτησεν
  english_pob_choice: questioned
  chosen_spanish: interrogó
  alternatives_spanish:
  - preguntó
  - cuestionó
  lexicon: BDAG
  rationale: En este contexto de audiencia formal, «interrogó» reproduce mejor el matiz de pregunta oficial o judicial que la mera pregunta cotidiana de «preguntó». Conserva la decisión auditada de la POB inglesa de reflejar un contexto formal.
- source_word: μαθητῶν
  english_pob_choice: disciples
  chosen_spanish: discípulos
  alternatives_spanish:
  - seguidores
  - alumnos
  lexicon: BDAG
  rationale: «Discípulos» es el equivalente más preciso y establecido para μαθητής en los Evangelios, preservando la relación maestro-discípulo.
- source_word: διδαχῆς
  english_pob_choice: teaching
  chosen_spanish: enseñanza
  alternatives_spanish:
  - doctrina
  - instrucción
  lexicon: BDAG
  rationale: «Enseñanza» es la opción más natural en español y evita importar el matiz más técnico o sistemático de «doctrina», que el contexto no exige.
- source_word: περὶ
  english_pob_choice: about
  chosen_spanish: acerca de
  alternatives_spanish:
  - sobre
  - respecto de
  lexicon: BDAG
  rationale: La preposición aparece dos veces con genitivo para introducir el asunto de la indagación. «Acerca de» suena claro y adecuado en español contemporáneo.
- source_word: αὐτοῦ
  english_pob_choice: his
  chosen_spanish: sus / su
  alternatives_spanish:
  - de él
  lexicon: BDAG
  rationale: El posesivo se refiere a Jesús en ambas ocurrencias. En español, «sus discípulos» y «su enseñanza» conservan la referencia de forma natural.
theological_decisions:
- issue: Título sacerdotal ἀρχιερεύς en el contexto narrativo de la comparecencia de Jesús
  english_pob_reading: Translate the Greek title directly as 'the high priest'
  chosen_spanish_reading: Traducir directamente como «el sumo sacerdote»
  alternative_spanish_readings:
  - Anás, el sumo sacerdote
  - el jefe de los sacerdotes
  rationale: La traducción sigue el título griego sin armonizar el detalle histórico del personaje en el texto principal. Esto preserva la presentación narrativa del evangelista y evita agregar aclaraciones no presentes en el versículo.
  doctrine_reference: Primacía del texto original sobre la armonización interpretativa
- issue: Valor del verbo ἠρώτησεν en un entorno judicial o formal
  english_pob_reading: '''questioned'' chosen to reflect the formal hearing context'
  chosen_spanish_reading: «interrogó» para reflejar un contexto formal
  alternative_spanish_readings:
  - «preguntó»
  - «cuestionó»
  rationale: La POB inglesa eligió 'questioned' por el tono de audiencia formal. En español, «interrogó» expresa mejor ese matiz sin exagerarlo a «interrogó judicialmente» o añadir elementos ajenos al texto.
  doctrine_reference: Precisión contextual y restricción al alcance semántico del original
translation_notes:
  revision_awareness: 'Se siguió el contexto auditado en inglés sin dependencia mecánica de la forma inglesa: se mantuvieron el valor narrativo de οὖν, el título sacerdotal directo y el matiz formal de ἠρώτησεν. No se registran revisiones posteriores en el paquete fuente.'
  spanish_consistency_notes:
  - Se mantiene «Jesús» como forma fija para Ἰησοῦς.
  - Se usa «sumo sacerdote» como título funcional equivalente al griego ἀρχιερεύς.
  - «Enseñanza» conserva el tono general y evita tecnicismos doctrinales no exigidos.
  - El marcador de nota [a] aparece sólo en «enseñanza[a]» y corresponde a una única alternativa léxica.
