translation:
  language: es
  text: 'Jesús le respondió: «Si hablé mal, da testimonio[a] acerca de lo malo; pero si hablé bien[b], ¿por qué me golpeas?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «testifica acerca del mal» o «da testimonio de lo que estuvo mal».
    reason: lexical_alternative
  - marker: b
    text: O «¿por qué me pegas?». El verbo griego puede referirse en sentido amplio a golpear, y en algunos contextos a apalear.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: BDAG
  rationale: En español, «respondió» comunica de manera natural la fórmula narrativa de réplica sin sonar forzado. Mantiene el tono formal del intercambio judicial.
- source_word: αὐτῷ
  english_pob_choice: him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: 'El dativo se expresa de forma idiomática con pronombre indirecto en español: «le». Evita la redundancia de «a él» en una frase ya clara por el contexto.'
- source_word: κακῶς
  english_pob_choice: wrongly
  chosen_spanish: mal
  alternatives_spanish:
  - incorrectamente
  - de manera mala
  lexicon: BDAG
  rationale: El adverbio puede referirse a hablar de forma mala, injusta o incorrecta. «Mal» conserva esa amplitud y funciona bien en paralelo con «bien» en la segunda cláusula.
- source_word: ἐλάλησα
  english_pob_choice: I spoke
  chosen_spanish: hablé
  alternatives_spanish:
  - he hablado
  - dije
  lexicon: BDAG
  rationale: El aoristo de λαλέω se vierte naturalmente con pasado simple. «Hablé» preserva el hecho de la palabra ya dicha sin añadir matiz aspectual innecesario.
- source_word: μαρτύρησον
  english_pob_choice: testify
  chosen_spanish: da testimonio
  alternatives_spanish:
  - testifica
  - declara como testigo
  lexicon: BDAG
  rationale: En contexto jurídico, el imperativo pide aportar testimonio. «Da testimonio» mantiene la fuerza forense y es claro en español bíblico contemporáneo.
- source_word: περὶ τοῦ κακοῦ
  english_pob_choice: about the wrong
  chosen_spanish: acerca de lo malo
  alternatives_spanish:
  - acerca del mal
  - sobre lo malo
  - acerca de lo que estuvo mal
  lexicon: BDAG
  rationale: La frase puede referirse al supuesto mal de las palabras de Jesús. «Lo malo» conserva el valor nominal sin decidir más de lo que el griego explicita; «mal» y «malo» mantienen la tensión entre acto incorrecto y mal moral.
- source_word: δὲ
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - sin embargo
  - y
  lexicon: BDAG
  rationale: Marca contraste directo entre las dos hipótesis. «Pero» es la equivalencia más transparente y natural en español.
- source_word: καλῶς
  english_pob_choice: rightly
  chosen_spanish: bien
  alternatives_spanish:
  - correctamente
  - rectamente
  lexicon: BDAG
  rationale: En paralelo con κακῶς, «bien» reproduce el contraste básico del texto. En español resulta más natural que «correctamente» y permite que la oposición se perciba con claridad.
- source_word: τί
  english_pob_choice: why
  chosen_spanish: ¿por qué?
  alternatives_spanish:
  - ¿para qué?
  - ¿por qué razón?
  lexicon: BDAG
  rationale: Aunque literalmente significa «qué», en esta construcción interrogativa funciona idiomáticamente como «por qué». El español debe reflejar ese sentido adverbial.
- source_word: δέρεις
  english_pob_choice: do you strike
  chosen_spanish: me golpeas
  alternatives_spanish:
  - me pegas
  - me azotas
  - me hieres
  lexicon: BDAG
  rationale: δέρω puede abarcar golpear o azotar. En este contexto inmediato, «golpeas» conserva la amplitud del verbo sin intensificarlo indebidamente a «azotas» ni debilitarlo a un simple «pegar» coloquial.
theological_decisions:
- issue: Tono judicial y moral de la respuesta de Jesús
  english_pob_reading: Rendered as a legal-moral challenge without importing additional theological commentary.
  chosen_spanish_reading: 'Se traduce como una objeción jurídico-moral: Jesús pide testimonio sobre la falta y cuestiona el golpe recibido.'
  alternative_spanish_readings:
  - Una paráfrasis más combativa que subraye la injusticia
  - Una versión más suave que diluya el tono forense
  rationale: El versículo presenta a Jesús apelando al testimonio correcto y exponiendo la violencia injustificada. La redacción española conserva esa lógica forense y moral sin añadir comentario doctrinal no explícito en el texto.
  doctrine_reference: Translation philosophy items 1, 3 y 6
translation_notes:
  revision_awareness: El pasaje fue revisado recientemente y se mantuvo sin cambios en el control más reciente; el consenso de revisión fue alto, sin observaciones, por lo que no se aplicaron ajustes adicionales.
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς, conforme al estándar del proyecto.
  - Se conserva la oposición adverbial «mal / bien» para reflejar κακῶς / καλῶς sin suavizarla.
  - «Da testimonio» y «golpeas» preservan el marco forense y la fuerza verbal inmediata del griego.
  - Las notas al pie ofrecen alternativas léxicas breves sin sobrecargar el texto principal.
