revisions:
- from: 'Jesús le respondió[a]: «Yo he hablado abiertamente al mundo. Siempre enseñé en la sinagoga y en el templo[b], donde se reúnen todos los judíos, y no he dicho nada en secreto».'
  to: 'Jesús le respondió[a]: «Yo he hablado abiertamente al mundo. Siempre enseñé en la sinagoga y en el templo[b], donde se reúnen todos los judíos[c], y no dije nada en secreto».'
  rationale: Se corrige el último verbo a pretérito simple («no dije nada») para reflejar mejor ἐλάλησα y mantener la coherencia aspectual del versículo. Además, se añade la nota contextual sobre «todos los judíos» para preservar una decisión léxica y teológica documentada en el audit trail inglés.
  reviewer_model: gpt-5.4
