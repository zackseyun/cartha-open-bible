translation:
  language: es
  text: 'Jesús le respondió[a]: «Yo he hablado abiertamente al mundo. Siempre enseñé en la sinagoga y en el templo[b], donde se reúnen todos los judíos[c], y no dije nada en secreto».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «le contestó».
    reason: lexical_alternative
  - marker: b
    text: O «en los atrios del templo» o «en el recinto del templo»; el griego ἱερόν se refiere al complejo del templo, no específicamente al santuario interior.
    reason: lexical_alternative
  - marker: c
    text: O «todo el pueblo judío» o, en algunos contextos de Juan, «todos los judeanos». El griego Ἰουδαῖοι depende del contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη αὐτῷ
  english_pob_choice: answered him
  chosen_spanish: le respondió
  alternatives_spanish:
  - respondió
  - le contestó
  lexicon: BDAG
  rationale: La construcción narrativa pide un verbo breve y natural en español; «le respondió» conserva el dativo de destinatario y el tono directo del diálogo.
- source_word: παρρησίᾳ
  english_pob_choice: openly
  chosen_spanish: abiertamente
  alternatives_spanish:
  - públicamente
  - con franqueza
  - con valentía
  lexicon: BDAG
  rationale: El contraste explícito con «en secreto» pide una expresión de publicidad/no ocultamiento. «Abiertamente» reproduce bien ese contraste sin cargar el matiz hacia la valentía personal.
- source_word: λελάληκα
  english_pob_choice: have spoken
  chosen_spanish: he hablado
  alternatives_spanish:
  - he dicho
  - he hablado públicamente
  lexicon: BDAG
  rationale: El perfecto griego conserva relevancia presente de la acción pasada; «he hablado» lo refleja de manera natural en español mejor que un simple pretérito.
- source_word: τῷ κόσμῳ
  english_pob_choice: to the world
  chosen_spanish: al mundo
  alternatives_spanish:
  - al público
  - a todos
  lexicon: BDAG
  rationale: Se mantiene el lenguaje johánico de κόσμος como «mundo», tal como lo preservó el inglés POB, en vez de reducirlo a «público».
- source_word: πάντοτε
  english_pob_choice: always
  chosen_spanish: siempre
  alternatives_spanish:
  - constantemente
  - de continuo
  lexicon: BDAG
  rationale: «Siempre» es la correspondencia más directa y natural en español para el valor habitual del adverbio.
- source_word: ἐδίδαξα
  english_pob_choice: taught
  chosen_spanish: enseñé
  alternatives_spanish:
  - estuve enseñando
  - instruí
  lexicon: BDAG
  rationale: El aoristo se vierte con pretérito simple en español; «enseñé» mantiene la acción habitual en la frase sin añadir aspecto progresivo.
- source_word: ἐν συναγωγῇ
  english_pob_choice: in the synagogue
  chosen_spanish: en la sinagoga
  alternatives_spanish:
  - en sinagogas
  lexicon: BDAG
  rationale: Se conserva el singular griego con un valor genérico de ámbito de enseñanza pública, siguiendo la lectura del inglés POB.
- source_word: ἐν τῷ ἱερῷ
  english_pob_choice: in the temple
  chosen_spanish: en el templo
  alternatives_spanish:
  - en los atrios del templo
  - en el recinto del templo
  lexicon: BDAG
  rationale: «Templo» es la forma breve y natural en español; el término griego señala el complejo del templo, y esa precisión se documenta en la nota textual.
- source_word: πάντες οἱ Ἰουδαῖοι
  english_pob_choice: all the Jews
  chosen_spanish: todos los judíos
  alternatives_spanish:
  - todo el pueblo judío
  - todos los judeanos
  lexicon: BDAG
  rationale: Se conserva la referencia directa del griego y del inglés POB. En este contexto, el sentido es el de la comunidad judía que acude al espacio público de culto y enseñanza.
- source_word: συνέρχονται
  english_pob_choice: gather
  chosen_spanish: se reúnen
  alternatives_spanish:
  - se congregan
  - acuden juntos
  lexicon: BDAG
  rationale: El presente indica acción habitual; «se reúnen» expresa de forma idiomática el acto de congregarse.
- source_word: ἐν κρυπτῷ
  english_pob_choice: in secret
  chosen_spanish: en secreto
  alternatives_spanish:
  - secretamente
  - a escondidas
  lexicon: BDAG
  rationale: La frase preposicional se conserva literalmente para mantener el contraste retórico con «abiertamente».
- source_word: ἐλάλησα οὐδέν
  english_pob_choice: I said nothing
  chosen_spanish: no he dicho nada
  alternatives_spanish:
  - no hablé nada
  - no dije nada
  lexicon: BDAG
  rationale: El griego usa una negación enfática de la palabra hablada; en español «no he dicho nada» suena natural y conserva la fuerza total de la negación.
theological_decisions:
- issue: Referencia de Ἰουδαῖοι
  english_pob_reading: all the Jews / the Jewish people in a public worshiping-gathering context
  chosen_spanish_reading: todos los judíos
  alternative_spanish_readings:
  - todo el pueblo judío
  - todos los judeanos
  rationale: Se mantiene la designación explícita del texto sin suavizarla. El contexto de sinagoga y templo favorece una referencia comunitaria amplia, no una restricción a autoridades específicas; la nota deja constancia de la sensibilidad del término en Juan.
  doctrine_reference: Transparencia textual y primacía del original; evitar resolver por traducción una tensión contextual del evangelio de Juan
- issue: Valor de ἱερόν
  english_pob_reading: temple / temple complex, not specifically the inner sanctuary
  chosen_spanish_reading: templo
  alternative_spanish_readings:
  - recinto del templo
  - atrio(s) del templo
  rationale: La palabra española «templo» conserva el sentido general del complejo sagrado. La especificación arquitectónica se documenta en nota para no sobrecargar el versículo.
  doctrine_reference: Precisión léxica basada en el alcance del término griego
- issue: Contraste público/secreto
  english_pob_reading: openly ... in secret
  chosen_spanish_reading: abiertamente ... en secreto
  alternative_spanish_readings:
  - públicamente ... en secreto
  - con franqueza ... en secreto
  rationale: El contraste retórico es central en la respuesta de Jesús; «abiertamente» preserva el valor de exposición pública sin introducir un matiz de audacia que el griego no exige aquí.
  doctrine_reference: Respeto del paralelismo retórico del texto fuente
translation_notes:
  revision_awareness: 'Se revisó el pasaje sin cambios sustanciales respecto al asentimiento previo del control cruzado: la traducción española sigue de cerca el griego y conserva las dos tensiones documentadas en el audit trail inglés, el sentido de παρρησίᾳ como publicidad abierta y la amplitud contextual de Ἰουδαῖοι. No se detectaron revisiones aplicadas en el ciclo previo, por lo que esta versión se alinea con el estado más reciente aprobado.'
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς y no se introduce nomenclatura alternativa.
  - Se conserva «mundo» para κόσμος por continuidad johánica y por fidelidad al POB inglés.
  - «Templo» se usa como forma principal; la nota aclara la extensión del término ἱερόν.
  - «Judíos» se conserva como traducción directa de Ἰουδαῖοι, con nota para evitar una simplificación interpretativa.
  - Se prefirió un registro bíblico contemporáneo pero reverente, sin calcos innecesarios ni arcaísmos.
