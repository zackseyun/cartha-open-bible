  to: 'Pilato le dijo: «¿Qué es la verdad?». Después de decir esto, salió otra vez a los judíos[a] y les dijo: «No encuentro ningún caso contra él».'
  rationale: Se corrigió la cláusula final para que el español exprese de forma natural el sentido forense de αἰτίαν, manteniendo la opción auditada «caso» pero con la construcción idiomática «contra él». Se reubicó la nota al término «judíos», que es el elemento explicado por la nota. También se eliminó «Yo» por naturalidad, sin alterar el sentido.
