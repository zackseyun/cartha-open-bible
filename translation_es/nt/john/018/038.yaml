translation:
  language: es
  text: 'Pilato le dijo: «¿Qué es la verdad?». Después de decir esto, salió otra vez a los judíos[a] y les dijo: «No encuentro ningún caso contra él».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a los líderes judíos». En Juan, «los judíos» a veces puede referirse más específicamente a las autoridades de Judea o al grupo representativo que se opone a Jesús en el contexto inmediato.
    reason: alternative_reading
lexical_decisions:
- source_word: λέγει αὐτῷ ὁ Πιλᾶτος
  english_pob_choice: Pilate said to him
  chosen_spanish: Pilato le dijo
  alternatives_spanish:
  - Pilato le dice
  lexicon: BDAG
  rationale: El presente histórico griego λέγει se vierte de manera natural en español narrativo con pasado («dijo»), conservando el flujo del relato sin perder la viveza del original.
- source_word: Τί ἐστιν ἀλήθεια;
  english_pob_choice: What is truth?
  chosen_spanish: ¿Qué es la verdad?
  alternatives_spanish:
  - ¿Qué es verdad?
  lexicon: BDAG
  rationale: ἀλήθεια sin artículo funciona de forma natural como sustantivo abstracto; en español, «la verdad» expresa mejor la formulación interrogativa y sigue siendo fiel a la generalidad del griego.
- source_word: Καὶ τοῦτο εἰπὼν
  english_pob_choice: After saying this
  chosen_spanish: Después de decir esto
  alternatives_spanish:
  - Y habiendo dicho esto
  - Cuando hubo dicho esto
  lexicon: BDAG
  rationale: El participio aoristo εἰπών se expresa mejor con una cláusula temporal idiomática en español. «Después de decir esto» preserva la secuencia sin sonar forzado.
- source_word: πάλιν ἐξῆλθεν
  english_pob_choice: he went out again
  chosen_spanish: salió otra vez
  alternatives_spanish:
  - salió de nuevo
  lexicon: BDAG
  rationale: πάλιν indica repetición; «otra vez» es una equivalencia clara y natural en español.
- source_word: πρὸς τοὺς Ἰουδαίους
  english_pob_choice: to the Jews
  chosen_spanish: a los judíos
  alternatives_spanish:
  - a los líderes judíos
  - a los judeanos
  lexicon: BDAG
  rationale: Se conserva la forma léxica del griego en el texto principal por transparencia. La nota mantiene la posibilidad contextual de un referente más restringido, sin borrar la tensión interpretativa del término en Juan.
- source_word: καὶ λέγει αὐτοῖς
  english_pob_choice: and said to them
  chosen_spanish: y les dijo
  alternatives_spanish:
  - y les dice
  lexicon: BDAG
  rationale: De nuevo, el presente histórico se vierte en pasado narrativo por naturalidad en español, manteniendo el orden discursivo.
- source_word: Ἐγὼ οὐδεμίαν εὑρίσκω ἐν αὐτῷ αἰτίαν
  english_pob_choice: I find no case against him
  chosen_spanish: Yo no encuentro en él ningún caso
  alternatives_spanish:
  - No encuentro en él ningún caso
  - No hallo en él ningún caso
  - No encuentro motivo de acusación contra él
  lexicon: BDAG
  rationale: αἰτία en contexto judicial apunta a causa/cargo/caso, no a un simple defecto moral. «Caso» reproduce bien el sentido forense y sigue la revisión auditada del inglés. «En él» conserva la preposición ἐν con una construcción española aceptable, sin explicitar más de lo que el texto da.
theological_decisions:
- issue: Referente de τοὺς Ἰουδαίους en Juan 18
  english_pob_reading: Main text retains 'the Jews' with a clarifying footnote preserving 'the Jewish leaders' as a contextual alternative.
  chosen_spanish_reading: El texto principal conserva «los judíos» con nota que ofrece «los líderes judíos» como alternativa contextual.
  alternative_spanish_readings:
  - los líderes judíos
  - los judeanos
  rationale: Se preserva la forma del original para transparencia textual, pero se evita absolutizar el término como si designara a todo el pueblo judío. La nota mantiene abierta la lectura contextual restringida que el pasaje puede exigir.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del expediente inglés, que ajustó αἰτίαν de una formulación más explicativa a «case» por ser más directa y natural en el registro forense. En español se reflejó con «caso» para conservar esa misma economía y claridad.
  spanish_consistency_notes:
  - Se mantuvo «Pilato» y «Jesús» donde corresponde a nombres propios estándar en español bíblico.
  - Se evitó sustituir «judíos» por un equivalente más interpretativo en el cuerpo principal, para conservar la huella léxica del griego y dejar la restricción contextual en la nota.
  - «Caso» se eligió por su valor jurídico natural en español; «asunto» o «culpa» habrían desplazado el matiz forense de αἰτία.
