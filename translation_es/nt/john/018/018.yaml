translation:
  language: es
  text: Había allí los esclavos[a] y los oficiales, que habían hecho un fuego de carbón porque hacía frío, y se calentaban. Pedro también estaba allí con ellos, de pie y calentándose.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘sirvientes’ para δοῦλοι; aquí se usa ‘esclavos’ para preservar el probable estatus servil del personal de la casa.
    reason: lexical_alternative
lexical_decisions:
- source_word: δοῦλοι
  english_pob_choice: slaves
  chosen_spanish: esclavos
  alternatives_spanish:
  - sirvientes
  - siervos
  lexicon: BDAG
  rationale: El griego δοῦλοι puede significar 'sirvientes' o 'esclavos' según el contexto; aquí el audit trail inglés preserva el estatus ligado o dependiente del personal. 'Esclavos' mantiene esa fuerza léxica y evita suavizarla indebidamente.
- source_word: ὑπηρέται
  english_pob_choice: officers
  chosen_spanish: oficiales
  alternatives_spanish:
  - sirvientes
  - guardias
  lexicon: BDAG
  rationale: ὑπηρέται en Juan suele referirse a asistentes o funcionarios con función institucional, no simplemente a criados. 'Oficiales' comunica mejor ese papel en español que 'sirvientes'; 'guardias' sería posible, pero es más específico de lo que exige el griego.
- source_word: ἀνθρακιὰν
  english_pob_choice: a charcoal fire
  chosen_spanish: una fogata de brasas
  alternatives_spanish:
  - un fuego de carbón
  - un brasero de carbón
  lexicon: BDAG
  rationale: ἀνθρακιά designa un fuego hecho con brasas o carbón. En español, 'fogata de brasas' conserva la imagen concreta y naturalidad narrativa; 'brasero' podría sugerir un recipiente, que el texto no menciona.
- source_word: πεποιηκότες
  english_pob_choice: having made
  chosen_spanish: que habían hecho
  alternatives_spanish:
  - después de hacer
  - habiendo hecho
  lexicon: BDAG
  rationale: El participio perfecto expresa una acción ya completada con resultado presente. 'Que habían hecho' reproduce bien la relación participial en una sintaxis natural en español.
- source_word: ὅτι ψῦχος ἦν
  english_pob_choice: because it was cold
  chosen_spanish: porque hacía frío
  alternatives_spanish:
  - porque estaba frío
  - ya que hacía frío
  lexicon: BDAG
  rationale: La causa es el frío del ambiente. 'Hacía frío' es la forma idiomática y clara en español; evita una literalidad forzada como 'estaba frío', que suena menos natural.
- source_word: ἐθερμαίνοντο
  english_pob_choice: they were warming themselves
  chosen_spanish: se calentaban
  alternatives_spanish:
  - se estaban calentando
  - se calentaban junto al fuego
  lexicon: BDAG
  rationale: El imperfecto medio indica acción en curso. 'Se calentaban' es breve, natural y conserva el sentido reflexivo sin añadir demasiado a la escena.
- source_word: ἦν δὲ καὶ ὁ Πέτρος μετ’ αὐτῶν
  english_pob_choice: Peter also was standing with them
  chosen_spanish: Pedro también estaba con ellos, de pie
  alternatives_spanish:
  - Pedro también estaba allí con ellos
  - Pedro también estaba con ellos
  lexicon: BDAG
  rationale: 'El texto coloca a Pedro dentro del grupo y en postura de pie. En español conviene integrar ambos matices: ''estaba con ellos, de pie''. ''También'' mantiene el énfasis aditivo de καί.'
- source_word: ἑστὼς
  english_pob_choice: was standing
  chosen_spanish: de pie
  alternatives_spanish:
  - estando de pie
  - en pie
  lexicon: BDAG
  rationale: El participio con ἦν forma una construcción perifrástica que describe estado/postura. 'De pie' es la opción más natural en español para expresar esa postura sin repetir innecesariamente el verbo.
- source_word: θερμαινόμενος
  english_pob_choice: warming himself
  chosen_spanish: calentándose
  alternatives_spanish:
  - se calentaba
  - buscando calentarse
  lexicon: BDAG
  rationale: El participio presente medio conserva la acción continua de Pedro. 'Calentándose' mantiene el paralelo con el verbo anterior y suena natural en español.
translation_notes:
  revision_awareness: El pasaje no muestra cambios textuales relevantes en el auditoría inglesa; se mantiene la escena con una equivalencia óptima, preservando el contraste social entre δοῦλοι y ὑπηρέται y el detalle narrativo de la fogata de brasas.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera; aquí no aparece.
  - Se mantiene 'esclavos' para δοῦλοι de acuerdo con la política léxica del proyecto y el audit trail inglés.
  - '''Oficiales'' se emplea para ὑπηρέται en coherencia con el uso joánico institucional.'
  - La puntuación busca reflejar la secuencia narrativa del griego sin sobrerreformular.
