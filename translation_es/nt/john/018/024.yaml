translation:
  language: es
  text: Entonces Anás lo envió[a] atado a Caifás, el sumo sacerdote.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, en contexto, «Ahora Anás lo había enviado atado a Caifás, el sumo sacerdote», si se toma como una nota parentética que explica los hechos anteriores.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀπέστειλεν
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - remitió
  lexicon: ἀποστέλλω
  rationale: El aoristo narrativo de ἀποστέλλω se expresa de manera natural en español con «envió». Mantiene la acción simple y directa del relato sin añadir matices ajenos como los que podrían sugerir «mandó» o «remitió».
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - Entonces
  - Por tanto
  lexicon: οὖν
  rationale: «Así que» conserva la conexión discursiva de οὖν en un español fluido y narrativo. «Entonces» también sería posible, pero puede sonar más ambiguo entre valor temporal y lógico; «Por tanto» sería más formal de lo que pide el contexto.
- source_word: δεδεμένον
  english_pob_choice: bound
  chosen_spanish: atado
  alternatives_spanish:
  - encadenado
  - todavía atado
  lexicon: δέω
  rationale: El participio perfecto pasivo indica el estado en que iba la persona al ser enviada. En español, «atado» comunica ese estado de manera natural y visible; «encadenado» añadiría un detalle no explícito, y «todavía atado» enfatizaría la continuidad más allá de lo requerido por el griego.
- source_word: πρὸς Καϊάφαν
  english_pob_choice: to Caiaphas
  chosen_spanish: a Caifás
  alternatives_spanish:
  - ante Caifás
  - hacia Caifás
  lexicon: πρός
  rationale: Con verbo de movimiento, πρός expresa dirección hacia una persona; en español, «a Caifás» es la equivalencia más idiomática y precisa. «Ante Caifás» introduciría una idea de comparecencia que no está marcada aquí.
- source_word: τὸν ἀρχιερέα
  english_pob_choice: the high priest
  chosen_spanish: el sumo sacerdote
  alternatives_spanish:
  - el gran sacerdote
  - el jefe de los sacerdotes
  lexicon: ἀρχιερεύς
  rationale: En el contexto joánico de la pasión, ἀρχιερεύς designa el cargo individual del sumo sacerdote. «Sumo sacerdote» es la forma establecida y exacta en español; «gran sacerdote» o «jefe de los sacerdotes» serían menos naturales o cambiarían el alcance del título.
- source_word: ὁ Ἅννας
  english_pob_choice: Annas
  chosen_spanish: Anás
  alternatives_spanish:
  - Annas
  lexicon: Ἅννας
  rationale: La transliteración tradicional en español para Ἅννας es «Anás». Se conserva la identificación personal sin depender de la forma inglesa.
theological_decisions:
- issue: Relación de John 18:24 con la secuencia narrativa circundante
  english_pob_reading: 'A simple past action: Annas sent Jesus bound to Caiaphas.'
  chosen_spanish_reading: 'Como acción pasada simple: Anás lo envió atado a Caifás.'
  alternative_spanish_readings:
  - 'Como nota explicativa retrospectiva: Anás lo había enviado atado a Caifás.'
  - Como inciso parentético que resume un traslado anterior.
  rationale: El griego aoristo admite la lectura narrativa simple, y el texto principal no debe forzar una armonización temporal. Para mantener la tensión interpretativa documentada por la POB en inglés, se conserva una nota que deja abierta la posibilidad de una observación retrospectiva sin incorporarla al cuerpo principal.
  doctrine_reference: Preservar la tensión narrativa y no resolverla artificialmente.
translation_notes:
  revision_awareness: 'Se siguió el audit trail en inglés: la lectura principal mantiene el valor narrativo simple del aoristo, mientras la nota preserva la alternativa contextual de lectura retrospectiva sin moverla al texto principal. No hubo revisiones posteriores que alteraran esa decisión.'
  spanish_consistency_notes:
  - Se usa «Anás» como forma española estándar de Ἅννας.
  - «Sumo sacerdote» se mantiene para ἀρχιερεύς, en coherencia con el oficio singular del contexto.
  - «Atado» traduce el estado resultante de δεδεμένον sin sobreespecificar el modo de sujeción.
  - 'La partícula οὖν se vierte con una conexión discursiva natural: «Así que».'
