translation:
  language: es
  text: 'Le respondieron: «Jesús, el Nazareno». Les dijo: «Yo soy[a]». Judas, el que lo traicionaba, estaba también allí de pie con ellos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, como simple identificación en contexto, «Soy yo». El griego dice literalmente «Yo soy» y también puede evocar el uso más amplio de esta expresión en Juan.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀπεκρίθησαν
  english_pob_choice: They answered
  chosen_spanish: Le respondieron
  alternatives_spanish:
  - Le contestaron
  - Respondieron
  lexicon: BDAG
  rationale: El verbo de respuesta se traduce de forma directa y natural en narrativa española. Mantengo el dativo αὐτῷ como 'le' para reflejar el destinatario de la respuesta.
- source_word: Ἰησοῦν τὸν Ναζωραῖον
  english_pob_choice: Jesus the Nazarene
  chosen_spanish: Jesús, el Nazareno
  alternatives_spanish:
  - Jesús de Nazaret
  - Jesús el Nazareno
  lexicon: BDAG
  rationale: Ναζωραῖος funciona como epíteto/título identificador. 'El Nazareno' conserva mejor la forma adjetival griega que 'de Nazaret', sin perder claridad en español.
- source_word: λέγει αὐτοῖς
  english_pob_choice: He said to them
  chosen_spanish: Les dijo
  alternatives_spanish:
  - Les dice
  - Dijo a ellos
  lexicon: BDAG
  rationale: El presente histórico λέγει se vierte naturalmente en pasado en español narrativo. 'Les dijo' comunica bien la relación verbal con el grupo.
- source_word: Ἐγώ εἰμι
  english_pob_choice: I am
  chosen_spanish: Yo soy
  alternatives_spanish:
  - Soy yo
  - Yo soy él
  lexicon: BDAG
  rationale: La forma griega es literalmente 'yo soy'. En español, 'Yo soy' preserva la tensión del enunciado absoluto sin añadir un pronombre implícito como 'él'.
- source_word: εἱστήκει
  english_pob_choice: was standing
  chosen_spanish: estaba también
  alternatives_spanish:
  - estaba de pie también
  - se hallaba también
  lexicon: BDAG
  rationale: El verbo expresa una postura ya en curso. En combinación con μετ’ αὐτῶν, la frase se integra de manera natural como 'estaba también con ellos', manteniendo el valor estático del original.
- source_word: δὲ καὶ
  english_pob_choice: Now ... also
  chosen_spanish: también
  alternatives_spanish:
  - y también
  - además
  lexicon: BDAG
  rationale: En español, el matiz discursivo de δὲ se absorbe con la fluidez de la oración, y καὶ queda expresado con 'también'.
- source_word: ὁ παραδιδοὺς αὐτὸν
  english_pob_choice: who was betraying him
  chosen_spanish: el que lo entregaba
  alternatives_spanish:
  - el que lo traicionaba
  - su traidor
  lexicon: BDAG
  rationale: Παραδίδωμι admite 'entregar' y 'traicionar'. Dado el rango semántico y la ambigüedad teológica/narrativa, 'entregaba' conserva el sentido básico de 'poner en manos de otros' sin imponer de entrada una lectura exclusivamente moral.
- source_word: μετ’ αὐτῶν
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - entre ellos
  lexicon: BDAG
  rationale: La preposición μετά con genitivo se traduce normalmente 'con'. 'Con ellos' es la opción más natural y precisa en español.
theological_decisions:
- issue: Cómo reflejar Ἐγώ εἰμι en un contexto joánico con posible resonancia teológica
  english_pob_reading: I am
  chosen_spanish_reading: Yo soy
  alternative_spanish_readings:
  - Yo soy él
  - Soy yo
  rationale: 'Sigo la revisión más literal del audit trail inglés: ''I am''. En español, ''Yo soy'' preserva la formulación absoluta y deja abierta la posible resonancia joánica sin resolverla en una identificación explícita como ''él''.'
  doctrine_reference: Preservar la tensión teológica sin explicitarla indebidamente.
- issue: Valor semántico de παραδίδωμι en el contexto de Judas
  english_pob_reading: who was betraying him
  chosen_spanish_reading: el que lo entregaba
  alternative_spanish_readings:
  - el que lo traicionaba
  - su traidor
  rationale: Aunque el contexto narrativo permite 'traicionaba', la raíz verbal también significa 'entregar'. La traducción 'entregaba' mantiene el vínculo con el acto de poner a Jesús en manos de otros y evita cerrar prematuramente la polisemia.
  doctrine_reference: Mantener la tensión léxica entre 'entregar' y 'traicionar' cuando el contexto lo permite.
translation_notes:
  revision_awareness: El texto inglés de trabajo pasó de 'I am he' a 'I am' en la revisión más reciente para reflejar con mayor literalidad Ἐγώ εἰμι; la versión española sigue esa decisión con 'Yo soy', sin añadir glosa interpretativa en el cuerpo del versículo.
  spanish_consistency_notes:
  - Se mantiene 'Nazareno' para Ναζωραῖος, alineado con la forma adjetival del griego y con el registro bíblico en español.
  - '''Entregaba'' conserva la polisemia de παραδίδωμι mejor que una traducción exclusivamente moral como ''traicionaba''.'
  - '''Yo soy'' reproduce la forma absoluta de Ἐγώ εἰμι y evita resolver la posible alusión joánica dentro del texto principal.'
