base_translation:
  language: en
  yaml_path: translation/nt/john/018/022.yaml
  text: And when he had said these things[a], one of the officers standing by struck Jesus, saying[b], “Is this how you answer the high priest?”
  footnotes:
  - marker: a
    text: Or “gave Jesus a slap”; the Greek expression denotes a blow with the hand and may refer to a slap or similar strike.
    reason: lexical_alternative
  - marker: b
    text: “Officers” translates a term that can also mean attendants or servants; in this context it likely refers to official temple personnel.
    reason: lexical_alternative
