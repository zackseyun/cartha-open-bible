translation:
  language: es
  text: 'Y cuando dijo estas cosas[a], uno de los oficiales[b] que estaba allí le dio un golpe a Jesús, diciendo: «¿Así respondes al sumo sacerdote?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «le dio una bofetada a Jesús»; la expresión griega denota un golpe con la mano y puede referirse a una bofetada o a un golpe semejante.
    reason: lexical_alternative
  - marker: b
    text: «Oficiales» traduce un término que también puede significar asistentes o servidores; en este contexto probablemente se refiere a personal oficial vinculado al entorno del templo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  lexicon: BDAG
  rationale: El plural demostrativo se conserva naturalmente en español como «estas cosas», manteniendo la referencia a lo dicho antes sin volverlo singular.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Pero
  - Entonces
  - Ahora bien
  lexicon: BDAG
  rationale: Conector narrativo suave; «Y» da continuidad sin introducir una oposición que el griego no exige.
- source_word: αὐτοῦ εἰπόντος
  english_pob_choice: when he had said
  chosen_spanish: cuando hubo dicho
  alternatives_spanish:
  - después de haber dicho
  - al decir
  lexicon: BDAG
  rationale: La construcción de genitivo absoluto temporal se vierte bien con una subordinada temporal en pasado anterior, preservando la anterioridad de la acción.
- source_word: εἷς παρεστηκὼς τῶν ὑπηρετῶν
  english_pob_choice: one of the officers standing by
  chosen_spanish: uno de los oficiales ... que estaban allí
  alternatives_spanish:
  - uno de los servidores ... que estaban allí
  - uno de los asistentes ... que estaban allí
  lexicon: BDAG
  rationale: «Oficiales» refleja la lectura contextual de ὑπηρέτης en el entorno del juicio como personal subalterno oficial. Añadir «que estaban allí» comunica la idea de estar presente/puesto al lado. Se evita «sirvientes» por la carga doméstica que tendría en español.
- source_word: ἔδωκεν ῥάπισμα
  english_pob_choice: struck
  chosen_spanish: golpeó
  alternatives_spanish:
  - abofeteó
  - dio una bofetada
  - le dio un golpe
  lexicon: BDAG
  rationale: ῥάπισμα denota un golpe dado con la mano, posiblemente una bofetada. «Golpeó» conserva la fuerza física sin especificar más de lo que el griego obliga; evita sobretraducir con un tipo concreto de golpe.
- source_word: τῷ Ἰησοῦ
  english_pob_choice: Jesus
  chosen_spanish: a Jesús
  alternatives_spanish:
  - a Jesús
  lexicon: BDAG
  rationale: Se mantiene el objeto indirecto explícito con la preposición «a», natural en español.
- source_word: εἰπών
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: BDAG
  rationale: 'Participio acompañante de habla: «diciendo» reproduce la relación sintáctica sin añadir una coordinación que no está en el griego.'
- source_word: Οὕτως
  english_pob_choice: Is this how
  chosen_spanish: ¿Así
  alternatives_spanish:
  - ¿De este modo
  - ¿De esa manera
  lexicon: BDAG
  rationale: El adverbio introduce la censura sobre el modo de responder; «¿Así...?» conserva la concisión interrogativa y el tono de reproche.
- source_word: ἀποκρίνῃ
  english_pob_choice: you answer
  chosen_spanish: respondes
  alternatives_spanish:
  - contestas
  - replicas
  lexicon: BDAG
  rationale: 'Verbo de respuesta en segunda persona: «respondes» es el equivalente más natural y directo en español.'
- source_word: τῷ ἀρχιερεῖ
  english_pob_choice: the high priest
  chosen_spanish: al sumo sacerdote
  alternatives_spanish:
  - al gran sacerdote
  lexicon: BDAG
  rationale: «Sumo sacerdote» es la equivalencia estándar y fiel de ἀρχιερεύς en este contexto; preserva la referencia institucional sin alterar el registro.
theological_decisions:
- issue: Identificación de ὑπηρέτης en el contexto del juicio
  english_pob_reading: official officers/attendants, likely temple police
  chosen_spanish_reading: oficiales
  alternative_spanish_readings:
  - servidores
  - asistentes
  - policías del templo
  rationale: El contexto joánico del proceso ante el sumo sacerdote favorece personal oficial vinculado a la autoridad del templo. «Oficiales» mantiene esa ambigüedad contextual sin rebajar el término a un simple sirviente doméstico ni imponer una precisión no explicitada en el texto.
  doctrine_reference: Contexto narrativo de Juan 18; no hay afirmación doctrinal directa.
translation_notes:
  revision_awareness: 'Se siguió el ajuste de la revisión inglesa más reciente: ῥάπισμα se traduce sin añadir explícitamente «con la mano», porque el sustantivo ya comunica un golpe/bofetada. La solución española mantiene esa sobriedad y conserva la tensión léxica del original mediante una nota opcional para la alternativa concreta.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando corresponda; este versículo no contiene el nombre divino.
  - «sumo sacerdote» se mantuvo de forma consistente para ἀρχιερεύς.
  - Se evitó «siervo» para ὑπηρέτης por la decisión contextual de la POB en este pasaje.
  - El estilo mantiene narración bíblica moderna y digna, sin arcaísmos innecesarios.
