base_translation:
  language: en
  yaml_path: translation/nt/john/018/016.yaml
  text: But Peter was standing outside at the door[a]. So the other disciple, who was known to the high priest[b], went out and spoke to the doorkeeper and brought Peter in.
  footnotes:
  - marker: a
    text: Or 'an acquaintance of the high priest' for 'known to the high priest.' The Greek leaves the exact closeness of the relationship unspecified.
    reason: lexical_alternative
  - marker: b
    text: Or 'gatekeeper' for 'doorkeeper.' The Greek term refers to the person stationed at the entrance.
    reason: lexical_alternative
