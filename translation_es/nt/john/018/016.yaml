revisions:
- from: Pero Pedro estaba fuera, junto a la puerta[a]. Entonces el otro discípulo, que era conocido del sumo sacerdote[b], salió, habló con la portera y metió a Pedro adentro.
  to: Pero Pedro estaba de pie afuera, junto a la puerta. Entonces el otro discípulo, que era conocido del sumo sacerdote[a], salió, habló con la portera[b] e hizo entrar a Pedro.
  rationale: Se corrige el valor verbal de εἱστήκει con 'estaba de pie', se recolocan las notas al pie para que correspondan a γνωστός y θυρωρός según el expediente inglés, se ajusta la alternativa de γνωστός al masculino, y se sustituye 'metió a Pedro adentro' por 'hizo entrar a Pedro' para un español más fiel, natural y digno.
