translation:
  language: es
  text: Pero Pedro estaba de pie afuera, junto a la puerta. Entonces el otro discípulo, que era conocido del sumo sacerdote[a], salió, habló con la portera[b] e hizo entrar a Pedro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'un conocido del sumo sacerdote' por 'conocido del sumo sacerdote'. El griego deja sin especificar qué tan cercana era la relación exacta.
    reason: lexical_alternative
  - marker: b
    text: O 'guardiana de la puerta' por 'portera'. El término griego se refiere a la persona apostada en la entrada.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἱστήκει
  english_pob_choice: was standing
  chosen_spanish: estaba
  alternatives_spanish:
  - estaba de pie
  - se hallaba de pie
  - estaba parado
  lexicon: BDAG
  rationale: El griego expresa una postura շարունակativa/estativa; en español, el imperfecto 'estaba' comunica el estado en curso sin sonar rígido. Añadir 'de pie' sería posible, pero aquí el contexto ya indica que Pedro permanecía en una posición determinada junto a la puerta.
- source_word: πρὸς τῇ θύρᾳ ἔξω
  english_pob_choice: outside at the door
  chosen_spanish: fuera, junto a la puerta
  alternatives_spanish:
  - afuera, junto a la puerta
  - fuera de la puerta
  - junto a la puerta, afuera
  lexicon: BDAG
  rationale: La combinación de ἔξω y πρὸς τῇ θύρᾳ pide conservar tanto la exterioridad como la proximidad a la entrada. 'Fuera, junto a la puerta' preserva ambos matices en español natural; 'puerta' se mantiene frente a 'portón' porque θύρα es el término básico para puerta, aunque el contexto pueda evocar una entrada más amplia.
- source_word: ὁ μαθητὴς ὁ ἄλλος
  english_pob_choice: the other disciple
  chosen_spanish: el otro discípulo
  alternatives_spanish:
  - el otro alumno
  - el otro seguidor
  lexicon: BDAG
  rationale: μαθητής en el evangelio conserva mejor 'discípulo' que alternativas más modernas o genéricas. 'Discípulo' mantiene la relación de aprendizaje y seguimiento propia del relato.
- source_word: ὁ γνωστὸς τοῦ ἀρχιερέως
  english_pob_choice: who was known to the high priest
  chosen_spanish: que era conocido del sumo sacerdote
  alternatives_spanish:
  - que era conocido por el sumo sacerdote
  - que era un conocido del sumo sacerdote
  - que estaba relacionado con el sumo sacerdote
  lexicon: BDAG
  rationale: γνωστός admite la idea de ser 'conocido' o 'conocido de / familiar de'. 'Conocido del sumo sacerdote' conserva la indeterminación del vínculo exacto, como en el griego, y evita precisar más de lo que el texto dice. Se mantiene 'sumo sacerdote' como equivalencia directa de ἀρχιερεύς por claridad bíblica y fidelidad al oficio.
- source_word: τῇ θυρωρῷ
  english_pob_choice: doorkeeper
  chosen_spanish: la portera
  alternatives_spanish:
  - la encargada de la puerta
  - la guardiana de la puerta
  - la portera de la entrada
  lexicon: BDAG
  rationale: θυρωρός designa a la persona que cuida la puerta; el artículo femenino en griego sugiere que era mujer. 'Portera' comunica de forma natural esa función y el género indicado por el contexto, sin introducir una explicación innecesaria en el texto principal.
- source_word: εἶπεν τῇ θυρωρῷ
  english_pob_choice: spoke to the doorkeeper
  chosen_spanish: habló con la portera
  alternatives_spanish:
  - le dijo a la portera
  - se dirigió a la portera
  lexicon: BDAG
  rationale: λέγω puede traducirse como 'decir' o 'hablar'. Como no se cita discurso directo, 'habló con' resulta más idiomático en español y comunica la acción relacional sin sobredeterminar el contenido.
- source_word: εἰσήγαγεν τὸν Πέτρον
  english_pob_choice: brought Peter in
  chosen_spanish: metió a Pedro adentro
  alternatives_spanish:
  - introdujo a Pedro
  - hizo entrar a Pedro
  - trajo a Pedro adentro
  lexicon: BDAG
  rationale: εἰσάγω significa hacer entrar o conducir dentro. 'Metió a Pedro adentro' es más natural en español narrativo y conserva la idea de llevarlo al interior. 'Introdujo' o 'hizo entrar' son posibles, pero suenan más formales o más interpretativos.
theological_decisions:
- issue: No se explicita la relación exacta entre el discípulo y el sumo sacerdote.
  english_pob_reading: '''who was known to the high priest'' leaves the exact closeness of the relationship unspecified.'
  chosen_spanish_reading: '''que era conocido del sumo sacerdote'' deja sin precisar la naturaleza exacta del vínculo.'
  alternative_spanish_readings:
  - que era un conocido del sumo sacerdote
  - que estaba emparentado con el sumo sacerdote
  - que tenía acceso al sumo sacerdote
  rationale: El griego usa γνωστός de manera ambigua. La redacción española debe conservar esa ambigüedad, evitando convertirla en parentesco, patronazgo o mera cortesía. Así se mantiene el alcance lexical sin imponer una interpretación no garantizada por el texto.
  doctrine_reference: Principio de sobriedad exegética y respeto al alcance semántico del texto; no hay afirmación doctrinal directa en el versículo.
- issue: El oficio de θυρωρός y su género gramatical/contextual.
  english_pob_reading: '''doorkeeper'' with a note that the term refers to the person stationed at the entrance.'
  chosen_spanish_reading: '''portera'' en el texto principal refleja la función y el género sugerido por el contexto.'
  alternative_spanish_readings:
  - portero
  - encargado de la puerta
  - guardián de la puerta
  rationale: El artículo dativo femenino τῇ indica una mujer en este contexto; por eso 'portera' es una solución más precisa que un genérico masculino. No se fuerza una lectura doctrinal, sino una concordancia contextual y gramatical.
  doctrine_reference: No aplica; decisión de concordancia contextual y precisión narrativa.
translation_notes:
  revision_awareness: Se ha seguido de cerca el estado más reciente del texto fuente, que no presenta revisiones aplicadas en el auditor de inglés. La versión española conserva la estructura narrativa breve del griego y mantiene la ambigüedad lexical documentada en γνωστός y θυρωρός sin ampliarla indebidamente.
  spanish_consistency_notes:
  - Se conserva 'sumo sacerdote' para ἀρχιερεύς, conforme al uso bíblico estable y claro en español.
  - Se usa 'discípulo' para μαθητής en continuidad con el lenguaje narrativo del Evangelio.
  - '''Fuera'' y ''junto a la puerta'' reproducen la doble indicación espacial de πρὸς τῇ θύρᾳ ἔξω sin sobretraducir.'
  - El texto principal evita 'SEÑOR' u otros equivalentes no pertinentes porque no aparecen en este versículo.
