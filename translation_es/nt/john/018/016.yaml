review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del griego: Pedro permanece afuera junto a la puerta; el otro discípulo sale, habla con la encargada de la puerta y hace entrar a Pedro. Sin embargo, hay varios desajustes menores pero significativos: εἱστήκει se expresa mejor con una referencia a la postura/posición continuada (''estaba de pie'') que con solo ''estaba''; la nota [a] está mal anclada porque no corresponde a ''puerta'' sino a la relación ''conocido del sumo sacerdote''; y la nota [b] del borrador en realidad comenta γνωστός, no θυρωρός. Además, ''metió a Pedro adentro'' suena demasiado coloquial y algo brusco para εἰσήγαγεν.'
  spanish_quality_summary: El español es comprensible y bastante natural, pero requiere pulido para registro bíblico digno y precisión. 'Estaba fuera, junto a la puerta' es aceptable, aunque 'estaba de pie afuera, junto a la puerta' preserva mejor el valor verbal. 'Portera' funciona bien en contexto. 'Metió a Pedro adentro' conviene reemplazarlo por 'hizo entrar a Pedro' o 'introdujo a Pedro'; la primera opción mantiene claridad y naturalidad neutral latinoamericana. También hace falta corregir la distribución de notas al pie y su contenido.
  glossary_alignment: 'La terminología principal está bien alineada: μαθητής = ''discípulo'', ἀρχιερεύς = ''sumo sacerdote'', θυρωρός = ''portera''. No hay términos del glosario maestro en conflicto. La decisión sobre γνωστός debe seguir preservando la ambigüedad del vínculo; ''conocido del sumo sacerdote'' lo logra. La nota sobre θυρωρός debe tratar la alternativa ''guardiana de la puerta'' o similar, no la relación con el sumo sacerdote.'
  issues:
  - severity: medium
    issue: εἱστήκει se tradujo solo como 'estaba'.
    rationale: El verbo describe que Pedro estaba en posición de pie/permanecía apostado. 'Estaba' pierde parte de ese matiz estativo-posicional; 'estaba de pie' lo conserva mejor en español natural.
  - severity: high
    issue: Las notas al pie están intercambiadas respecto de los referentes léxicos del texto fuente y del POB inglés.
    rationale: La nota [a] en el inglés corresponde a ὁ γνωστὸς τοῦ ἀρχιερέως, pero en el borrador se colocó sobre 'puerta'. La nota [b] inglesa corresponde a θυρωρός, pero en el borrador comenta γνωστός. Esto rompe la trazabilidad del expediente de auditoría.
  - severity: medium
    issue: '''Metió a Pedro adentro'' es demasiado coloquial y algo más fuerte que εἰσήγαγεν.'
    rationale: εἰσάγω significa 'hacer entrar / introducir / llevar adentro'. 'Metió' puede sugerir empujar o forzar, y 'adentro' añade un tono coloquial menos digno de lo deseable para el proyecto.
  - severity: low
    issue: La nota sobre γνωστός propone 'conocida del sumo sacerdote', en femenino.
    rationale: 'El referente es ''el otro discípulo'', masculino. La alternativa debería concordar: ''conocido por el sumo sacerdote'' o ''un conocido del sumo sacerdote''.'
  revised_spanish_text: Pero Pedro estaba de pie afuera, junto a la puerta. Entonces el otro discípulo, que era conocido del sumo sacerdote[a], salió, habló con la portera[b] e hizo entrar a Pedro.
  revised_footnotes:
  - marker: a
    text: O 'un conocido del sumo sacerdote' por 'conocido del sumo sacerdote'. El griego deja sin especificar qué tan cercana era la relación exacta.
    reason: lexical_alternative
  - marker: b
    text: O 'guardiana de la puerta' por 'portera'. El término griego se refiere a la persona apostada en la entrada.
    reason: lexical_alternative
  revision_rationale: Se corrige el valor verbal de εἱστήκει con 'estaba de pie', se recolocan las notas al pie para que correspondan a γνωστός y θυρωρός según el expediente inglés, se ajusta la alternativa de γνωστός al masculino, y se sustituye 'metió a Pedro adentro' por 'hizo entrar a Pedro' para un español más fiel, natural y digno.
