review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la secuencia y el sentido general del griego: participio temporal («Después de decir estas cosas»), movimiento concreto («salió»), compañía («con sus discípulos»), referencia al jardín/huerto, y entrada de Jesús con sus discípulos. Sin embargo, la frase «al otro lado del valle de Cedrón» no representa bien πέραν τοῦ χειμάρρου τοῦ Κεδρών: sugiere estar al otro lado de todo el valle, cuando el griego habla de cruzar el Cedrón como cauce estacional/ravina/valle. Además, la nota al pie actual introduce «más allá del valle de Cedrón», que no corresponde bien a la alternativa inglesa auditada.'
  spanish_quality_summary: El texto es claro, natural y digno en español. «Huerto» funciona bien para κῆπος. La sintaxis final «en el cual entraron él y sus discípulos» es correcta, aunque ligeramente formal; encaja con el registro bíblico. La mejora principal es precisar la geografía con una formulación más natural y exacta en español, como «a través del valle de Cedrón», evitando una imagen espacial equívoca.
  glossary_alignment: 'No hay conflictos con la terminología principal del proyecto: «Jesús», «discípulos» y el resto del léxico están bien. No hay términos teológicos sensibles en este versículo. La revisión propuesta mantiene la decisión inglesa revisada hacia «Valley», pero la adapta mejor al español y al griego subyacente.'
  issues:
  - severity: medium
    issue: «al otro lado del valle de Cedrón» expresa de forma imprecisa πέραν τοῦ χειμάρρου τοῦ Κεδρών
    rationale: πέραν + genitivo indica cruce hacia el otro lado del Cedrón; con «valle» en español, «al otro lado del valle» normalmente significa al lado opuesto de todo el valle, no atravesándolo. «A través del valle de Cedrón» o similar comunica mejor la escena.
  - severity: low
    issue: La nota al pie no refleja con precisión las alternativas auditadas
    rationale: La alternativa «más allá del valle de Cedrón» no preserva bien el valor de χείμαρρος como curso de agua estacional/ravina. Conviene mantener alternativas como «ravina» o «torrente» y explicar que el término griego se refiere a un curso de agua estacional.
  revised_spanish_text: Después de decir estas cosas[a], Jesús salió con sus discípulos a través del valle de Cedrón, donde había un huerto, en el cual entraron él y sus discípulos.
  revised_footnotes:
  - marker: a
    text: O «a través de la ravina de Cedrón» o «más allá del torrente de Cedrón». El término griego se refiere a un curso de agua estacional.
    reason: lexical_alternative
  revision_rationale: Se ajusta la frase geográfica para reflejar mejor el griego y evitar la lectura equívoca de «al otro lado del valle». También se corrige la nota para que preserve mejor las alternativas auditadas y el valor léxico de χειμάρρος.
