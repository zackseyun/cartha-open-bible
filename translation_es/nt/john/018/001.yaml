translation:
  language: es
  text: Después de decir estas cosas[a], Jesús salió con sus discípulos a través del valle de Cedrón, donde había un huerto, en el cual entraron él y sus discípulos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a través de la ravina de Cedrón» o «más allá del torrente de Cedrón». El término griego se refiere a un curso de agua estacional.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ταῦτα εἰπὼν
  english_pob_choice: After saying these things
  chosen_spanish: Después de decir estas cosas
  alternatives_spanish:
  - Habiendo dicho estas cosas
  - Cuando hubo dicho estas cosas
  lexicon: SBLGNT; observación sintáctica del participio aoristo
  rationale: El participio aoristo con Ταῦτα funciona temporalmente. En español, «Después de decir estas cosas» comunica bien la secuencia narrativa sin sonar forzado ni demasiado literal.
- source_word: ἐξῆλθεν
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - se fue
  - partió
  lexicon: BDAG
  rationale: «Salió» conserva el movimiento concreto del verbo y encaja bien con el estilo narrativo de Juan.
- source_word: σὺν τοῖς μαθηταῖς αὐτοῦ
  english_pob_choice: with his disciples
  chosen_spanish: con sus discípulos
  alternatives_spanish:
  - junto con sus discípulos
  lexicon: BDAG
  rationale: σύν con dativo indica compañía; «con sus discípulos» es la forma más natural y fiel en español.
- source_word: πέραν τοῦ χειμάρρου τοῦ Κεδρὼν
  english_pob_choice: across the Kidron Valley
  chosen_spanish: al otro lado del valle de Cedrón
  alternatives_spanish:
  - al otro lado del torrente de Cedrón
  - más allá del valle de Cedrón
  - al otro lado del Cedrón
  lexicon: BDAG; nota del POB en inglés sobre χειμάρρος como curso de agua estacional
  rationale: El inglés POB revisó «brook» a «Valley» para reflejar mejor el sentido probable de la expresión. En español, «valle de Cedrón» comunica de forma natural el lugar de paso y evita reducir χειμάρρος a «arroyo» o «torrente», que podrían estrechar demasiado el matiz geográfico.
- source_word: ὅπου ἦν κῆπος
  english_pob_choice: where there was a garden
  chosen_spanish: donde había un huerto
  alternatives_spanish:
  - donde había un jardín
  - donde estaba un huerto
  lexicon: BDAG
  rationale: κῆπος puede ser «jardín» o «huerto». Aquí «huerto» refleja bien un lugar cultivado y es idiomático en español bíblico sin depender de una formulación arcaica.
- source_word: εἰς ὃν εἰσῆλθεν
  english_pob_choice: into which he ... entered
  chosen_spanish: en el cual entraron
  alternatives_spanish:
  - al cual entró
  - dentro del cual entraron
  lexicon: BDAG
  rationale: La secuencia con εἰς + relativo expresa entrada hacia el interior. En español, «en el cual entraron» transmite esa relación espacial de modo claro y natural, aunque el relativo de lugar precise el movimiento implícito.
- source_word: αὐτὸς καὶ οἱ μαθηταὶ αὐτοῦ
  english_pob_choice: he and his disciples
  chosen_spanish: él y sus discípulos
  alternatives_spanish:
  - él mismo y sus discípulos
  lexicon: BDAG
  rationale: El pronombre αὐτός puede quedar simplemente como «él»; añadir «mismo» sería excesivo. La repetición final «sus discípulos» mantiene la referencia sin oscurecer el sujeto.
theological_decisions:
- issue: Rendición de χειμάρρος τοῦ Κεδρών como expresión geográfica
  english_pob_reading: The Greek term refers to a seasonal watercourse.
  chosen_spanish_reading: El griego alude a un curso de agua estacional, pero el contexto narrativo admite una referencia geográfica más amplia al valle de Cedrón.
  alternative_spanish_readings:
  - arroyo de Cedrón
  - torrente de Cedrón
  - barranco de Cedrón
  rationale: La nota inglesa preserva la tensión entre el curso de agua literal y la referencia topográfica. En español, «valle de Cedrón» sigue la revisión inglesa y evita fijar indebidamente un único tipo de cauce cuando el pasaje puede evocar la zona geográfica en conjunto.
  doctrine_reference: John 18:1; nota léxica sobre χειμάρρος en el audit trail inglés
translation_notes:
  revision_awareness: La versión inglesa revisó «brook» a «Valley» para reflejar mejor el posible sentido de χειμάρρου τοῦ Κεδρών. La propuesta española sigue esa revisión con «al otro lado del valle de Cedrón», manteniendo la nota alternativa para no ocultar la ambigüedad léxica del original.
  spanish_consistency_notes:
  - Se usa «Jesús» para Ἰησοῦς y «discípulos» para μαθηταί de manera consistente con el registro bíblico actual.
  - Se conserva «Cedrón» como transliteración estable del nombre propio Κεδρών.
  - No se introduce «SEÑOR» ni otro equivalente reverencial, porque el versículo no contiene κύριος ni un reemplazo del nombre divino.
