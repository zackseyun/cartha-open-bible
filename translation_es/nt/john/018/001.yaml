revisions:
- from: Después de decir estas cosas[a], Jesús salió con sus discípulos al otro lado del valle de Cedrón, donde había un huerto, en el cual entraron él y sus discípulos.
  to: Después de decir estas cosas[a], Jesús salió con sus discípulos a través del valle de Cedrón, donde había un huerto, en el cual entraron él y sus discípulos.
  rationale: Se ajusta la frase geográfica para reflejar mejor el griego y evitar la lectura equívoca de «al otro lado del valle». También se corrige la nota para que preserve mejor las alternativas auditadas y el valor léxico de χειμάρρος.
