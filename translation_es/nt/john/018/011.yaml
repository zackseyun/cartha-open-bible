translation:
  language: es
  text: 'Entonces Jesús le dijo a Pedro: «Pon la espada en su vaina[a]. ¿No he de beber la copa[b] que el Padre me ha dado?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «funda»; el término conserva la imagen concreta del receptáculo del arma.
    reason: lexical_alternative
  - marker: b
    text: La «copa» es una metáfora bíblica del sufrimiento o destino asignado por Dios; compárese Juan 18:11 con la oración en Getsemaní (p. ej., Mat 26:39; Mar 14:36; Luc 22:42).
    reason: cross_reference
lexical_decisions:
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Entonces
  alternatives_spanish:
  - Así que
  - Pues
  lexicon: BDAG
  rationale: Marca continuidad narrativa e inferencia. «Entonces» conserva ese enlace de manera natural en español sin añadir énfasis indebido.
- source_word: Βάλε
  english_pob_choice: Put
  chosen_spanish: Pon
  alternatives_spanish:
  - Coloca
  - Vuelve a poner
  lexicon: BDAG
  rationale: El imperativo aoristo aquí funciona como una orden directa y natural de devolver el arma a su lugar. «Pon» es la opción más idiomática y fiel.
- source_word: μάχαιραν
  english_pob_choice: sword
  chosen_spanish: espada
  alternatives_spanish:
  - cuchillo
  - daga
  - arma blanca
  lexicon: BDAG
  rationale: μάχαιρα designa un arma cortante; en este contexto narrativo, «espada» es la forma más clara y convencional en español, sin estrechar indebidamente el término a una daga o cuchillo.
- source_word: θήκην
  english_pob_choice: sheath
  chosen_spanish: vaina
  alternatives_spanish:
  - funda
  - cuchillera
  - forro
  lexicon: BDAG
  rationale: «Vaina» es el equivalente natural para el recipiente de una espada en español y preserva la imagen concreta del texto. La alternativa «funda» puede sonar menos específica para un arma blanca.
- source_word: ποτήριον
  english_pob_choice: cup
  chosen_spanish: copa
  alternatives_spanish:
  - cáliz
  - vaso
  lexicon: BDAG
  rationale: Se conserva la metáfora bíblica del «copa/cup» como símbolo de sufrimiento o destino asignado. «Copa» es la traducción más directa y reconocible en español bíblico actual.
- source_word: δέδωκέν
  english_pob_choice: has given
  chosen_spanish: me ha dado
  alternatives_spanish:
  - me dio
  - me ha entregado
  lexicon: BDAG
  rationale: El perfecto griego expresa una acción cumplida con relevancia presente. «Me ha dado» conserva mejor ese matiz que el pasado simple.
- source_word: ὁ πατήρ
  english_pob_choice: the Father
  chosen_spanish: el Padre
  alternatives_spanish:
  - mi Padre
  lexicon: BDAG
  rationale: El griego no añade posesivo; «el Padre» mantiene la formulación explícita y su peso teológico sin introducir una relación posesiva no dicha en el texto.
- source_word: οὐ μὴ πίω αὐτό;
  english_pob_choice: Shall I not drink it?
  chosen_spanish: ¿No he de beber la copa?
  alternatives_spanish:
  - ¿Acaso no voy a beberla?
  - ¿No debo beberla?
  lexicon: BDAG
  rationale: La construcción οὐ μή con subjuntivo en forma interrogativa retórica expresa una fuerte expectativa afirmativa. En español, «¿No he de beber...?» conserva el tono retórico y la disposición voluntaria de Jesús sin volverlo una simple prohibición.
theological_decisions:
- issue: Significado de «la copa»
  english_pob_reading: Retain 'cup' as a biblical metaphor for suffering or destiny appointed by God, without paraphrasing it as wrath, death, or crucifixion in the main text.
  chosen_spanish_reading: Conservar «la copa» como metáfora bíblica del sufrimiento o destino asignado, sin explicarla en el texto principal como ira, muerte o crucifixión.
  alternative_spanish_readings:
  - la copa del sufrimiento que el Padre me ha asignado
  - la copa de la ira divina
  - el destino que el Padre me ha dado
  rationale: El contexto bíblico apoya la metáfora de un sufrimiento asignado, pero el versículo no la define de modo más estrecho. Mantener la imagen evita resolver una tensión que el texto deja abierta.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Relación entre Jesús y el Padre en «el Padre me ha dado»
  english_pob_reading: Translate straightforwardly as filial obedience to the Father without diminishing Jesus' dignity or adding doctrinal explanation.
  chosen_spanish_reading: Traducir de manera directa la obediencia filial de Jesús al Padre, sin añadir explicación doctrinal ni suavizar la sumisión expresada.
  alternative_spanish_readings:
  - mi Padre me ha asignado esto
  - el Padre me ha entregado esto
  rationale: La frase presenta la disposición obediente del Hijo frente a la voluntad del Padre. La traducción directa conserva esa relación sin sobreexplicarla y sigue siendo compatible con la doctrina cristiana clásica.
  doctrine_reference: 'Affirmations: Nicene Creed; Definition of Chalcedon'
translation_notes:
  revision_awareness: 'No se requieren revisiones adicionales: la redacción sigue de cerca el griego, preserva la metáfora de «la copa» y mantiene la fuerza retórica de la pregunta final, en concordancia con el control de calidad más reciente.'
  spanish_consistency_notes:
  - Se usa «Jesús» para Ἰησοῦς y «Pedro» para Πέτρος de forma consistente.
  - Se conserva «el Padre» sin introducir «mi» porque el posesivo no aparece en el griego.
  - «Copa» se mantiene como metáfora bíblica, en paralelo con el inglés POB.
  - La puntuación y las comillas siguen convenciones españolas.
  - Las notas al pie marcan solo alternativas léxicas relevantes y no duplican marcadores.
