translation:
  language: es
  text: 'Entonces Pilato salió a donde estaban ellos y les dijo: «¿Qué acusación presentan contra este hombre?»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐξῆλθεν
  english_pob_choice: went outside
  chosen_spanish: salió afuera
  alternatives_spanish:
  - salió
  - salió fuera
  lexicon: BDAG
  rationale: El verbo expresa movimiento desde un interior hacia el exterior. En español, «salió afuera» conserva el valor espacial reforzado por ἔξω, de manera natural y sin perder la redundancia enfática del griego.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Entonces
  alternatives_spanish:
  - Así que
  - Por tanto
  lexicon: BDAG
  rationale: Marca progresión narrativa; «Entonces» funciona con naturalidad en español y conserva la transición del relato.
- source_word: ἔξω
  english_pob_choice: outside
  chosen_spanish: afuera
  alternatives_spanish:
  - fuera
  lexicon: BDAG
  rationale: El adverbio refuerza la salida ya indicada por ἐξῆλθεν. «Afuera» preserva esa orientación espacial en español contemporáneo.
- source_word: πρὸς αὐτούς
  english_pob_choice: to them
  chosen_spanish: hacia ellos
  alternatives_spanish:
  - a ellos
  - ante ellos
  lexicon: BDAG
  rationale: La preposición πρός con acusativo puede expresar movimiento hacia personas. «Hacia ellos» conserva ese matiz direccional mejor que una simple relación estática.
- source_word: φησίν
  english_pob_choice: said
  chosen_spanish: les dijo
  alternatives_spanish:
  - dijo
  - les preguntó
  lexicon: BDAG
  rationale: Aunque el griego usa presente histórico, en español narrativo la forma pasada es natural. Se añade «les» porque el contexto del discurso va dirigido a ellos.
- source_word: Τίνα κατηγορίαν
  english_pob_choice: What accusation
  chosen_spanish: ¿Qué acusación
  alternatives_spanish:
  - ¿Qué cargo
  - ¿Qué denuncia
  lexicon: BDAG
  rationale: κατηγορία tiene sentido forense de acusación o cargo legal. «Acusación» es la opción más directa y transparente en español.
- source_word: φέρετε
  english_pob_choice: do you bring
  chosen_spanish: presentan
  alternatives_spanish:
  - traen
  - formulan
  lexicon: BDAG
  rationale: En español jurídico, «presentar una acusación» transmite bien el acto de llevar formalmente un cargo. Es más natural que un calco de «traer» y mantiene el sentido legal.
- source_word: κατὰ τοῦ ἀνθρώπου τούτου
  english_pob_choice: against this man
  chosen_spanish: contra este hombre
  alternatives_spanish:
  - contra este hombre aquí
  - en contra de este hombre
  lexicon: BDAG
  rationale: κατά con genitivo en contexto judicial significa «contra». ἄνθρωπος aquí designa a un varón individual, por lo que «hombre» es fiel y preciso.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el griego SBLGNT y concuerda con el audit trail inglés: movimiento hacia afuera, progresión narrativa, pregunta forense y referencia masculina singular a ἄνθρωπος. No se requirieron notas textuales ni variantes adicionales.'
  spanish_consistency_notes:
  - Se conserva la puntuación interrogativa y la cita directa en estilo bíblico moderno.
  - «Acusación» mantiene el matiz jurídico de κατηγορία sin introducir terminología eclesiástica.
  - «Hombre» traduce ἄνθρωπος en sentido individual, no genérico.
  - No se introducen fórmulas tradicionales como «SEÑOR» o «Cristo» porque no aparecen en este versículo.
