translation:
  language: es
  text: 'Simón Pedro estaba de pie y calentándose. Entonces le dijeron[a]: «Tú no eres también uno de sus discípulos, ¿verdad?» Él lo negó y dijo: «No lo soy».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Acaso no eres también uno de sus discípulos?». La pregunta con μή normalmente espera una respuesta negativa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἦν δὲ
  english_pob_choice: Now ... was
  chosen_spanish: estaba allí
  alternatives_spanish:
  - y estaba
  - entonces estaba
  lexicon: BDAG
  rationale: δέ cumple una función narrativa suave de avance. En español, «estaba allí» transmite la continuidad de la escena sin sobrecargar el texto con una conjunción que suene forzada. Se añade «allí» porque el contexto inmediato hace claro el lugar, y en español mejora la naturalidad sin introducir contenido nuevo decisivo.
- source_word: Σίμων Πέτρος
  english_pob_choice: Simon Peter
  chosen_spanish: Pedro
  alternatives_spanish:
  - Simón Pedro
  - Simón, Pedro
  lexicon: BDAG
  rationale: El griego nombra al personaje como «Simón Pedro», pero en español, en esta escena narrativa, «Pedro» basta y fluye mejor. No se pierde la referencia, ya que el contexto identifica claramente al discípulo. «Simón Pedro» sería igualmente válido si se quisiera conservar la forma plena del nombre.
- source_word: ἑστὼς
  english_pob_choice: standing
  chosen_spanish: de pie
  alternatives_spanish:
  - estando de pie
  - en pie
  lexicon: BDAG
  rationale: El participio perfecto expresa una postura continua. «De pie» es la equivalencia natural en español y preserva la simple observación física del texto.
- source_word: θερμαινόμενος
  english_pob_choice: warming himself
  chosen_spanish: calentándose
  alternatives_spanish:
  - entrando en calor
  - calentándose a sí mismo
  lexicon: BDAG
  rationale: El participio medio/pasivo indica que Pedro se estaba calentando. En español, el reflexivo es comprensible, pero «calentándose» evita una construcción innecesariamente explícita y sigue siendo natural. No se añade «junto al fuego» porque el verso no lo dice explícitamente.
- source_word: εἶπον οὖν αὐτῷ
  english_pob_choice: So they said to him
  chosen_spanish: Entonces le dijeron
  alternatives_spanish:
  - Así que le dijeron
  - Luego le dijeron
  lexicon: BDAG
  rationale: οὖν marca consecuencia narrativa. «Entonces» conserva el avance lógico y resulta natural en español. El sujeto plural se mantiene de forma impersonal/contextual como en el inglés POB, porque el griego no especifica quiénes son.
- source_word: Μὴ καὶ σὺ ἐκ τῶν μαθητῶν αὐτοῦ εἶ;
  english_pob_choice: You are not also one of his disciples, are you?
  chosen_spanish: Tú no eres también uno de sus discípulos, ¿verdad?
  alternatives_spanish:
  - ¿Acaso no eres también uno de sus discípulos?
  - ¿No eres también uno de sus discípulos?
  lexicon: BDAG
  rationale: La partícula μή en esta pregunta espera una respuesta negativa. En español, la forma con «¿verdad?» reproduce bien esa expectativa sin forzar una literalidad poco idiomática. «También» conserva καὶ σὺ; «uno de sus discípulos» refleja ἐκ τῶν μαθητῶν αὐτοῦ como pertenencia al grupo.
- source_word: ἠρνήσατο
  english_pob_choice: He denied it
  chosen_spanish: lo negó
  alternatives_spanish:
  - lo negó rotundamente
  - lo rechazó
  lexicon: BDAG
  rationale: El verbo significa negar/rehusar reconocer. «Lo negó» expresa el acto verbal sin añadir intensidad ajena al texto. El objeto implícito se entiende como la acusación/pregunta, igual que en el POB inglés.
- source_word: ἐκεῖνος
  english_pob_choice: He
  chosen_spanish: Él
  alternatives_spanish:
  - Aquel
  - Ese
  lexicon: BDAG
  rationale: ἐκεῖνος aporta leve énfasis, pero en español un pronombre simple es la solución más natural. La mayúscula inicial depende de la posición oracional.
- source_word: Οὐκ εἰμί
  english_pob_choice: I am not
  chosen_spanish: No soy
  alternatives_spanish:
  - No lo soy
  - No soy yo
  lexicon: BDAG
  rationale: La negación griega es breve y directa. «No soy» conserva la concisión del original; aunque en español puede percibirse elipsis, el contexto aclara que se trata de la autoidentificación negada. «No lo soy» sería más explícito, pero añade un pronombre que el griego no tiene.
theological_decisions:
- issue: Forma de la negativa de Pedro
  english_pob_reading: Render the statement as a straightforward denial of being one of Jesus' disciples without expanding it into a broader doctrinal denial.
  chosen_spanish_reading: Traducir la respuesta como una negación directa y breve de pertenecer al grupo de los discípulos, sin ampliar el alcance de la negativa.
  alternative_spanish_readings:
  - «No soy uno de sus discípulos»
  - «No lo soy»
  rationale: El griego termina con una réplica sobria y elíptica. Mantener la brevedad evita convertir la frase en una formulación más interpretativa que narrativa. La negación queda claramente vinculada a la acusación previa.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: El pasaje coincide en alto grado con el contexto auditado en inglés POB; no se detectaron revisiones aplicadas en el paquete fuente. La versión española sigue esa misma decisión de mantener la pregunta con μή como una forma que espera respuesta negativa, y conserva la brevedad de la negativa final.
  spanish_consistency_notes:
  - Se mantiene «discípulos» para μαθηταί, conforme al uso estable del proyecto.
  - Se evita añadir «junto al fuego» porque no está explícito en este verso.
  - «Pedro» funciona bien en contexto, pero «Simón Pedro» también sería defendible si se prefiriera una reproducción más plena del nombre.
  - La nota al pie preserva la alternativa interrogativa de μή sin duplicar el contenido principal.
