translation:
  language: es
  text: 'Jesús respondió: «Les dije que yo soy él[a]. Así que si me están buscando, dejen ir a estos hombres.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O simplemente: «Yo soy». El griego no añade «él»; en contextos de identificación, el español suele suplirlo por claridad.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀπεκρίθη
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: BDAG
  rationale: En diálogo narrativo, ἀπεκρίθη se expresa naturalmente como «respondió» en español, manteniendo el tono directo y formal del intercambio sin añadir matices ajenos.
- source_word: Εἶπον
  english_pob_choice: I told
  chosen_spanish: Les dije
  alternatives_spanish:
  - Les había dicho
  - Les dije
  lexicon: BDAG
  rationale: El aoristo con ὑμῖν remite a una afirmación previa dirigida a ellos; «les dije» conserva esa referencia retrospectiva de manera natural en español.
- source_word: ἐγώ εἰμι
  english_pob_choice: I am he
  chosen_spanish: yo soy
  alternatives_spanish:
  - yo soy el que soy
  - yo soy él
  lexicon: BDAG
  rationale: Se conserva la forma breve sin suplir un predicado en el texto principal, porque el griego no lo expresa. En español, «yo soy» mantiene la tensión joánica y la posible resonancia absoluta; no se añade «él» para no resolver lo que el griego deja abierto.
- source_word: ζητεῖτε
  english_pob_choice: are seeking
  chosen_spanish: me están buscando
  alternatives_spanish:
  - me buscan
  - me están buscando
  lexicon: BDAG
  rationale: El presente se traduce con un progresivo natural en español por tratarse de una escena inmediata y concreta; «buscar» preserva el sentido de ζητέω sin cargarlo con una connotación técnica de búsqueda religiosa.
- source_word: ἄφετε
  english_pob_choice: let
  chosen_spanish: dejen ir
  alternatives_spanish:
  - dejen
  - permitan que vayan
  - dejen ir
  lexicon: BDAG
  rationale: ἄφετε aquí pide permitir la salida; «dejen ir» es idiomático, claro y no añade la idea jurídica de «liberen».
- source_word: τούτους
  english_pob_choice: these men
  chosen_spanish: a estos hombres
  alternatives_spanish:
  - a estos
  - a estos hombres
  lexicon: BDAG
  rationale: El demostrativo se refiere a los compañeros de Jesús; añadir «hombres» explicita el referente sin introducir una interpretación nueva, y el acusativo se refleja con la preposición «a».
- source_word: ὑπάγειν
  english_pob_choice: go
  chosen_spanish: ir
  alternatives_spanish:
  - irse
  - ir
  lexicon: BDAG
  rationale: El infinitivo expresa la acción permitida de retirarse; «ir» es breve y fiel. En combinación con «dejen ir» resulta natural en español.
theological_decisions:
- issue: Valor de ἐγώ εἰμι en contexto joánico de arresto
  english_pob_reading: I am he; footnote preserves possible 'I am'
  chosen_spanish_reading: yo soy; nota preserva la lectura absoluta posible
  alternative_spanish_readings:
  - yo soy él
  - yo soy el que soy
  rationale: En la escena inmediata Jesús se identifica ante los arrestantes, por lo que la lectura principal comunica identificación. Al mismo tiempo, el griego no añade un predicado; por eso la nota conserva la posibilidad de leer la expresión de manera absoluta, sin borrar la tensión joánica.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'El texto inglés POB no requiere cambios de fondo: mantiene la identificación directa de Jesús, la nota sobre ἐγώ εἰμι y el imperativo permisivo de ἄφετε. La versión española sigue esa misma lectura, conservando la tensión entre identificación explícita y posible uso absoluto de «yo soy».'
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς conforme al criterio del proyecto.
  - Se usa «yo soy» en vez de «Cristo» o un añadido explicativo, porque el griego no lo requiere y la nota cubre la alternativa absoluta.
  - «Dejen ir» conserva el valor permisivo de ἄφετε sin sobretraducirlo como un acto técnico de liberación.
  - El demostrativo «estos hombres» hace explícito el referente humano sin alterar el alcance del texto.
