translation:
  language: es
  text: ¿Por qué me cuestionas?[a] Cuestiona a los que han oído lo que les dije. Mira, ellos saben lo que dije.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¿Por qué me preguntas? Pregunta a los que han oído lo que les dije». El griego puede traducirse de manera más neutra como «preguntar», pero «cuestionar» refleja mejor el contexto judicial.
    reason: lexical_alternative
lexical_decisions:
- source_word: τί με ἐρωτᾷς
  english_pob_choice: Why do you question me?
  chosen_spanish: ¿Por qué me preguntas?
  alternatives_spanish:
  - ¿Por qué me cuestionas?
  - ¿Por qué me interrogas?
  lexicon: BDAG
  rationale: El griego usa ἐρωτάω en un contexto judicial. En español, «preguntar» es la opción más natural y digna; «cuestionar» e «interrogar» enfatizan mejor la formalidad forense, pero suenan más marcadas o menos directas en este giro. Se conserva la fuerza de reproche por el contexto inmediato y por la repetición con el imperativo siguiente.
- source_word: ἐρώτησον
  english_pob_choice: Question
  chosen_spanish: Pregunta
  alternatives_spanish:
  - Interroga
  - Pregunta a
  lexicon: BDAG
  rationale: El imperativo aoristo pide una acción directa. «Pregunta» mantiene la correspondencia verbal con ἐρωτᾷς y sigue siendo idiomático en español. «Interroga» podría reflejar mejor el tono judicial, pero añade una connotación más técnica que el griego no exige por sí mismo.
- source_word: τοὺς ἀκηκοότας
  english_pob_choice: those who have heard
  chosen_spanish: a los que han oído
  alternatives_spanish:
  - a los que oyeron
  - a quienes han escuchado
  lexicon: BDAG
  rationale: El participio perfecto destaca a personas caracterizadas por haber oído y permanecer como tales. «Han oído» preserva mejor ese valor aspectual que un pretérito simple. Se introduce «a los» por exigencia sintáctica del español; «escuchado» sería posible, pero «oído» sigue más de cerca el verbo griego.
- source_word: τί ἐλάλησα αὐτοῖς
  english_pob_choice: what I said to them
  chosen_spanish: lo que les hablé
  alternatives_spanish:
  - lo que les dije
  - lo que les hablé a ellos
  lexicon: BDAG
  rationale: λαλέω tiene el sentido de hablar/decir. «Les hablé» conserva el matiz de habla pronunciada y evita una paráfrasis interpretativa. «Les dije» es más idiomático en algunos contextos, pero el griego aquí no usa λέγω; por eso se mantiene la referencia al acto de hablar.
- source_word: ἴδε
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Ve
  - Miren
  lexicon: BDAG
  rationale: La interjección llama la atención del oyente. «Mira» es el equivalente natural y directo en español. «Ve» sería posible pero menos idiomático como fórmula exhortativa en este contexto; «Miren» introduciría plural sin base en el singular griego.
- source_word: οὗτοι οἴδασιν
  english_pob_choice: they know
  chosen_spanish: ellos saben
  alternatives_spanish:
  - éstos saben
  - estos saben
  lexicon: BDAG
  rationale: Aunque οὗτοι es demostrativo, el español puede sonar más natural con «ellos» sin perder la referencia contextual. Se evita «éstos» porque su demostratividad puede sonar más dura o artificial en español contemporáneo, aunque queda como alternativa viable si se quisiera reflejar más explícitamente el gesto de señalar.
- source_word: ἃ εἶπον ἐγώ
  english_pob_choice: what I said
  chosen_spanish: lo que dije
  alternatives_spanish:
  - lo que yo dije
  - las cosas que dije
  lexicon: BDAG
  rationale: La cláusula relativa de contenido se rinde de forma natural con «lo que dije». El ἐγώ final aporta énfasis; en español puede conservarse opcionalmente con «yo», pero no es necesario para transmitir la fuerza del enunciado, especialmente en una frase ya muy concentrada.
theological_decisions:
- issue: Tono forense y confrontativo de la respuesta de Jesús
  english_pob_reading: Use 'question' rather than the more neutral 'ask' for ἐρωτάω in both occurrences.
  chosen_spanish_reading: Usar «preguntas/pregunta» en ambos lugares, con el tono judicial sostenido por el contexto.
  alternative_spanish_readings:
  - Usar «cuestionas/cuestiona»
  - Usar «interrogas/interroga»
  rationale: No se trata de una disputa doctrinal, sino de una decisión de registro. En español, «preguntar» es la forma más natural; el contexto del interrogatorio ante el sumo sacerdote preserva la tensión forense sin necesidad de una palabra más técnica. La reiteración del mismo verbo ayuda a mantener el contraste entre la pregunta dirigida a Jesús y la instrucción de preguntar a los testigos.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego SBLGNT y el audit trail inglés, conservando la estructura interrogativa-imperativa paralela. Se priorizó una equivalencia óptima: naturalidad española sin perder el tono forense ni el contraste entre ἐρωτᾷς y ἐρώτησον. Se tomó en cuenta la revisión inglesa que prefirió un sujeto más natural en la última cláusula; en español se resolvió de forma igualmente natural con «ellos».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero no aplica en este versículo.
  - Se usa «pregunta/preguntas» para ἐρωτάω por la base forense, sin forzar «interrogar».
  - Se conserva el matiz de perfecto en «han oído».
  - 'Se traduce ἴδε con una interjección breve y directa: «Mira».'
  - Se preserva la relación entre «lo que les hablé» y «lo que dije» para reflejar tanto λαλέω como λέγω sin confundirlos.
