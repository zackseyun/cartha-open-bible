revisions:
- from: ¿Por qué me preguntas?[a] Pregunta a los que han oído lo que les hablé. Mira, ellos saben lo que dije.
  to: ¿Por qué me cuestionas?[a] Cuestiona a los que han oído lo que les dije. Mira, ellos saben lo que dije.
  rationale: Se corrige «lo que les hablé» a «lo que les dije» por fidelidad idiomática y semántica en español. También se adopta «cuestionas/cuestiona» para alinear la traducción con la decisión léxica auditada del POB sobre el tono forense de ἐρωτάω, manteniendo una nota con la alternativa más neutra «preguntas/pregunta». No se requiere adjudicación adicional porque la corrección es clara y de bajo riesgo doctrinal.
