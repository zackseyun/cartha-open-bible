translation:
  language: es
  text: 'Entonces, cuando les dijo[a]: «Yo soy él», retrocedieron y cayeron al suelo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O más literalmente: «Yo soy». La expresión griega también puede aludir a los dichos distintivos de «Yo soy» en Juan.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὡς οὖν
  english_pob_choice: So when
  chosen_spanish: Así que, cuando
  alternatives_spanish:
  - Entonces, cuando
  - Pues cuando
  lexicon: BDAG
  rationale: Combina la relación inferencial de οὖν con el valor temporal de ὡς en un español natural. «Así que» mantiene la conexión narrativa y «cuando» expresa la simultaneidad sin forzar una construcción rígida.
- source_word: εἶπεν αὐτοῖς
  english_pob_choice: he said to them
  chosen_spanish: les dijo
  alternatives_spanish:
  - les habló
  - dijo a ellos
  lexicon: BDAG
  rationale: El dativo plural αὐτοῖς se expresa de forma natural con «les»; «dijo» conserva el verbo básico de λέγω sin volver la frase pesada.
- source_word: Ἐγώ εἰμι
  english_pob_choice: I am he
  chosen_spanish: Yo soy
  alternatives_spanish:
  - Yo soy él
  - Soy yo
  lexicon: BDAG
  rationale: En este contexto de autoidentificación, «Yo soy» reproduce con más cercanía la forma griega y preserva la tensión joánica. «Soy yo» sería más idiomático, pero atenúa el eco posible de ἐγώ εἰμι en Juan.
- source_word: ἀπῆλθον εἰς τὰ ὀπίσω
  english_pob_choice: they went backward
  chosen_spanish: retrocedieron
  alternatives_spanish:
  - fueron hacia atrás
  - dieron marcha atrás
  lexicon: BDAG
  rationale: El griego indica movimiento hacia atrás; «retrocedieron» es una equivalencia natural y concisa que conserva el gesto repentino de retirada. Se evita una formulación demasiado explicativa.
- source_word: ἔπεσαν χαμαί
  english_pob_choice: fell to the ground
  chosen_spanish: cayeron al suelo
  alternatives_spanish:
  - cayeron a tierra
  - se desplomaron al suelo
  lexicon: BDAG
  rationale: χαμαί significa caer al suelo/la tierra; «cayeron al suelo» es claro y directo en español. «Se desplomaron» añadiría intensidad no exigida por el griego.
theological_decisions:
- issue: Posible resonancia teológica de Ἐγώ εἰμι en Juan 18:6
  english_pob_reading: I am he, with a footnote preserving the more literal 'I am' and noting possible Johannine resonance
  chosen_spanish_reading: «Yo soy», con nota que preserva «Yo soy» como traducción más literal y señala la posible resonancia joánica
  alternative_spanish_readings:
  - «Soy yo»
  - «Yo soy él»
  rationale: El contexto inmediato favorece la autoidentificación, pero en Juan la expresión puede tener peso teológico adicional. La nota evita borrar esa tensión y deja visible la lectura más literal junto con la idiomática del texto principal.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: La base inglesa revisó «drew back» a «went backward» para acercarse más a ἀπῆλθον εἰς τὰ ὀπίσω; la versión española adopta «retrocedieron», que conserva esa cercanía léxica y la naturalidad en español. Se mantuvo la decisión de no neutralizar Ἐγώ εἰμι con una paráfrasis como «Soy yo», para preservar la tensión documentada.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se evita «Cristo» porque no hay Χριστός en el texto fuente.
  - «Espíritu»/«espíritu» no aplica aquí; no se introduce terminología ajena al pasaje.
  - La puntuación conserva el discurso directo con comillas españolas y el anclaje de nota en la autoidentificación.
