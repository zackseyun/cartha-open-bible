translation:
  language: es
  text: 'Ellos le respondieron y le dijeron: «Si este hombre no fuera un malhechor[a], no te lo habríamos entregado».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «si este hombre no estuviera haciendo el mal»'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθησαν
  english_pob_choice: They answered
  chosen_spanish: le respondieron
  alternatives_spanish:
  - respondieron
  lexicon: BDAG
  rationale: El verbo de respuesta se expresa de forma natural con «respondieron»; añado el clítico «le» porque el dativo αὐτῷ marca a quién dirigen la respuesta, sin forzar una reexpresión innecesaria.
- source_word: καὶ εἶπαν
  english_pob_choice: and said
  chosen_spanish: y le dijeron
  alternatives_spanish:
  - y dijeron
  lexicon: BDAG
  rationale: Conservo la fórmula narrativa doble como en el griego y en el POB inglés. En español, «le dijeron» es la forma natural para completar la secuencia y mantener el destinatario explícito.
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El dativo indirecto se integra con el clítico español. El referente es Pilato por el contexto inmediato, aunque el texto no lo nombra aquí.
- source_word: Εἰ μὴ
  english_pob_choice: If ... not
  chosen_spanish: Si ... no
  alternatives_spanish:
  - A menos que
  - Si no
  lexicon: BDAG
  rationale: Mantengo la estructura condicional transparente del griego. «Si ... no» reproduce mejor la condición contrafactual que una forma más compacta como «a menos que».
- source_word: οὗτος
  english_pob_choice: this man
  chosen_spanish: este hombre
  alternatives_spanish:
  - este
  - este sujeto
  lexicon: BDAG
  rationale: «Este hombre» conserva el valor demostrativo con distancia despectiva moderada sin añadir más desprecio del que exige el griego. Evito «este sujeto» por ser más interpretativo.
- source_word: κακὸν ποιῶν
  english_pob_choice: an evildoer
  chosen_spanish: un malhechor
  alternatives_spanish:
  - uno que hace el mal
  - haciendo el mal
  - un evildoer
  lexicon: BDAG
  rationale: La revisión inglesa reciente prefirió una etiqueta nominal para expresar con naturalidad la acusación. En español, «malhechor» transmite esa misma carga acusatoria y suena más idiomático que una perífrasis demasiado literal; aun así, conserva la idea de alguien caracterizado por hacer el mal.
- source_word: οὐκ ἄν ... παρεδώκαμεν
  english_pob_choice: we would not have handed ... over
  chosen_spanish: no te lo habríamos entregado
  alternatives_spanish:
  - no te lo habríamos entregado a ti
  - no te lo habríamos puesto en tus manos
  - no te lo habríamos entregado
  lexicon: BDAG
  rationale: «Habríamos entregado» refleja bien la apódosis contrafactual. En este contexto judicial, «entregar» conserva el valor forense de παραδίδωμι mejor que opciones más libres.
- source_word: σοι
  english_pob_choice: to you
  chosen_spanish: te
  alternatives_spanish:
  - a ti
  lexicon: BDAG
  rationale: El dativo singular se expresa con el clítico «te», que resulta natural en español y mantiene el destinatario directo del acto de entrega.
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El objeto directo se expresa con el clítico masculino «lo», coherente con Jesús como referente implícito y con la fluidez del español.
theological_decisions:
- issue: Carácter de la acusación contra Jesús
  english_pob_reading: Render as a general accusation of moral wrongdoing ('doing evil') without specifying a formal legal charge.
  chosen_spanish_reading: Renderizar la acusación como «un malhechor», es decir, una imputación moral general sin precisar un delito técnico.
  alternative_spanish_readings:
  - haciendo el mal
  - un evildoer
  - un criminal
  rationale: El griego κακὸν ποιῶν no obliga a una categoría legal formal; la forma nominal en español permite mantener la acusación general y la distancia de los acusadores, sin cargar el verso con una especificación jurídica que el texto no da.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; preserve what the text says without importing doctrinal claims.'
translation_notes:
  revision_awareness: La versión inglesa pasó de «doing evil» a «an evildoer» para reflejar con más naturalidad la acusación de κακὸν ποιῶν. La propuesta española sigue esa revisión y opta por una formulación nominal idiomática («un malhechor») que mantiene la fuerza acusatoria sin añadir una tipificación legal ajena al griego.
  spanish_consistency_notes:
  - Se mantiene el tratamiento de Jesús en tercera persona masculina singular con clíticos («lo», «le», «te») para una lectura fluida en español.
  - Se conserva la estructura contrafactual del original mediante «Si ... no ... habríamos ...», sin convertirla en una paráfrasis explicativa.
  - Se evita «SEÑOR» u otros reemplazos teológicos no pertinentes en este versículo.
