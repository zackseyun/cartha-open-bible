translation:
  language: es
  text: 'Jesús, entonces, sabiendo todo lo que venía sobre él[a], salió y les dijo: «¿A quién buscan?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todo lo que estaba por venir sobre él».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰησοῦς
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - Jesús
  lexicon: Ἰησοῦς
  rationale: Nombre propio estándar y directo; no requiere adaptación.
- source_word: οὖν
  english_pob_choice: therefore
  chosen_spanish: entonces
  alternatives_spanish:
  - por tanto
  - así que
  lexicon: BDAG
  rationale: En español, «entonces» comunica bien la continuación narrativa y la inferencia sin sonar tan formal como «por tanto». Evita sobrecargar el enlace lógico.
- source_word: εἰδὼς
  english_pob_choice: knowing
  chosen_spanish: sabiendo
  alternatives_spanish:
  - sabiendo plenamente
  - conociendo
  lexicon: BDAG
  rationale: El participio aoristo presenta la conciencia previa de Jesús; «sabiendo» mantiene esa simultaneidad narrativa de forma natural en español.
- source_word: πάντα τὰ ἐρχόμενα ἐπ’ αὐτόν
  english_pob_choice: all the things coming upon him
  chosen_spanish: todas las cosas que le venían encima
  alternatives_spanish:
  - todo lo que iba a venir sobre él
  - todas las cosas que estaban por venir sobre él
  lexicon: BDAG
  rationale: La construcción griega conserva un plural amplio y una idea de inminencia. «Le venían encima» reproduce la imagen de algo que se aproxima sobre Jesús sin especificar más de lo que dice el texto; se mantiene la tensión entre totalidad e inminencia.
- source_word: ἐξῆλθεν
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - salió afuera
  - se adelantó y salió
  lexicon: BDAG
  rationale: Verbo simple y natural para ἐξέρχομαι; evita añadir matices dramáticos no presentes en el griego.
- source_word: λέγει
  english_pob_choice: said
  chosen_spanish: les dijo
  alternatives_spanish:
  - dijo
  - les preguntó
  lexicon: BDAG
  rationale: En español narrativo, «les dijo» fluye con naturalidad y conserva el valor discursivo del presente histórico griego sin forzarlo a un presente castellano.
- source_word: Τίνα ζητεῖτε;
  english_pob_choice: Whom are you seeking?
  chosen_spanish: ¿A quién buscan?
  alternatives_spanish:
  - ¿A quién están buscando?
  - ¿A quién buscan ustedes?
  lexicon: BDAG
  rationale: «A quién» expresa el objeto directo humano exigido por τίνα. «Buscan» es una opción idiomática y digna en español; mantiene el matiz de buscar/seeking sin el tono más marcado de una perífrasis progresiva.
theological_decisions:
- issue: La presciencia de Jesús ante los acontecimientos de la pasión
  english_pob_reading: The translation preserves that Jesus knew in advance all that was coming upon him, without expanding this into an explicit doctrinal statement beyond the verse.
  chosen_spanish_reading: La traducción conserva que Jesús sabía de antemano todo lo que le venía encima, sin convertirlo en una afirmación doctrinal más amplia que el versículo mismo.
  alternative_spanish_readings:
  - Jesús conocía exhaustivamente todo lo que iba a sucederle
  - Jesús tenía plena conciencia de todo lo que estaba por venir sobre él
  rationale: El texto afirma la conciencia previa de Jesús, pero no obliga a formular una doctrina sistemática en la traducción. Se preserva la fuerza teológica del versículo y su tensión narrativa sin resolverla con explicación adicional.
  doctrine_reference: Affirmations; Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: ahora la nota [a] aparece anclada en el texto principal junto a «sabiendo». Se mantiene la correspondencia entre el marcador y la nota, sin notas huérfanas.'
  spanish_consistency_notes:
  - Se usó un registro bíblico claro y contemporáneo, evitando calco excesivo.
  - «Buscan» preserva el sentido de ζητεῖτε sin perder naturalidad en español.
  - Se mantuvo la ambigüedad reverente sobre lo que «le venía encima», sin especificar más que el griego.
