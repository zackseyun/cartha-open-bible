  language: en
  yaml_path: translation/nt/john/006/022.yaml
  text: On the next day[a], the crowd that had been standing on the other side of the sea saw that no other small boat had been there except one, and that Jesus had not gone with his disciples into the boat[b], but that his disciples had gone away alone.
