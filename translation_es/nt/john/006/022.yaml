    issue: πλοιάριον se tradujo como «embarcación» en vez de marcar el diminutivo en el texto principal.
    rationale: El audit trail inglés eligió explícitamente «small boat» para preservar el valor diminutivo. «Embarcación» es demasiado genérico; la nota sola no compensa la pérdida del matiz en el cuerpo del texto.
  - severity: low
    issue: «la multitud que estaba de pie» atenúa el perfecto participial ἑστηκώς.
    rationale: No es incorrecto, pero «que había estado al otro lado del mar» o «que había estado de pie» refleja mejor el estado previo/resultante señalado por el griego y por la decisión inglesa «had been standing».
  - severity: low
    issue: «entrado con sus discípulos en la barca» es menos idiomático para abordar una barca.
    rationale: El griego εἰς τὸ πλοῖον expresa movimiento hacia dentro/a bordo; en español narrativo «subido con sus discípulos a la barca» suena más natural y preciso.
