translation:
  language: es
  text: Al día siguiente[a], la multitud que había estado al otro lado del mar vio que no había allí otra barca pequeña[b] excepto una, y que Jesús no había subido con sus discípulos a la barca[c], sino que sus discípulos se habían ido solos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el día siguiente».
    reason: alternative_reading
  - marker: b
    text: O «barca»; el griego usa un diminutivo en πλοιάριον.
    reason: lexical_alternative
  - marker: c
    text: Algunos manuscritos y ediciones varían entre πλοιάριον («barca pequeña») y πλοῖον («barca») en este versículo; la traducción refleja el texto griego impreso en cada cláusula.
    reason: textual_variant
lexical_decisions:
- source_word: Τῇ ἐπαύριον
  english_pob_choice: On the next day
  chosen_spanish: Al día siguiente
  alternatives_spanish:
  - Al siguiente día
  - Al otro día
  lexicon: BDAG
  rationale: La expresión temporal es adverbial e introduce la secuencia narrativa. «Al día siguiente» suena natural en español y conserva el valor de transición temporal sin añadir matices no presentes.
- source_word: ὁ ὄχλος ὁ ἑστηκὼς
  english_pob_choice: the crowd that had been standing
  chosen_spanish: la multitud que estaba de pie
  alternatives_spanish:
  - la multitud que había estado de pie
  - la multitud de pie
  lexicon: BDAG
  rationale: 'El participio perfecto resalta un estado resultante: la multitud se encontraba allí, de pie, al otro lado del mar. «Estaba de pie» comunica ese estado de manera clara y natural en español.'
- source_word: πέραν τῆς θαλάσσης
  english_pob_choice: on the other side of the sea
  chosen_spanish: al otro lado del mar
  alternatives_spanish:
  - al otro lado del mar de Galilea
  - más allá del mar
  lexicon: BDAG
  rationale: «Más allá» puede sonar más abstracto; «al otro lado del mar» refleja con claridad la localización opuesta. «Mar» mantiene la imagen geográfica del contexto joánico.
- source_word: εἶδον
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - vieron
  - advirtieron
  lexicon: BDAG
  rationale: 'Hay una tensión gramatical entre el sujeto singular colectivo y el verbo plural en griego. En español, con «la multitud» se resuelve de forma natural con singular colectivo: «vio», sin alterar el sentido de percepción.'
- source_word: πλοιάριον
  english_pob_choice: small boat
  chosen_spanish: embarcación
  alternatives_spanish:
  - barca pequeña
  - pequeña embarcación
  lexicon: BDAG
  rationale: El diminutivo griego señala menor tamaño. En español, «embarcación» evita una redundancia torpe como «pequeña barca» y mantiene el sentido de un medio de transporte acuático más pequeño que el πλοῖον del resto del versículo. Se preserva la distinción léxica con una nota.
- source_word: ἄλλο οὐκ ἦν ἐκεῖ εἰ μὴ ἕν
  english_pob_choice: no other small boat had been there except one
  chosen_spanish: no había allí otra embarcación excepto una
  alternatives_spanish:
  - no había allí otra barca excepto una
  - no había allí otra embarcación sino una
  lexicon: BDAG
  rationale: La construcción expresa exclusividad. «No había allí otra… excepto una» reproduce bien esa restricción sin forzar un pluscuamperfecto innecesario en español.
- source_word: συνεισῆλθεν
  english_pob_choice: had not gone with
  chosen_spanish: no había entrado con
  alternatives_spanish:
  - no fue con
  - no había subido con
  lexicon: BDAG
  rationale: El compuesto significa entrar/ir junto con alguien. En el contexto de abordar una barca, «había entrado con» conserva la idea de acompañamiento y se ajusta al paralelismo con la siguiente cláusula.
- source_word: εἰς τὸ πλοῖον
  english_pob_choice: into the boat
  chosen_spanish: en la barca
  alternatives_spanish:
  - en el barco
  - a la barca
  lexicon: BDAG
  rationale: Aquí el texto griego usa πλοῖον, distinto de πλοιάριον. En español, «barca» ofrece un término amplio y natural para el vehículo acuático, y permite mantener la variación textual señalada por el audit trail. La elección «en» refleja el movimiento de incorporación al barco/barca en español idiomático.
- source_word: μόνοι
  english_pob_choice: alone
  chosen_spanish: solos
  alternatives_spanish:
  - por su cuenta
  - solamente
  lexicon: BDAG
  rationale: '«Solos» conserva la idea de exclusión: los discípulos partieron sin Jesús. Es una solución natural y directa para el cierre de la cláusula.'
- source_word: ἀπῆλθον
  english_pob_choice: had gone away
  chosen_spanish: se habían ido
  alternatives_spanish:
  - habían partido
  - habían salido
  lexicon: BDAG
  rationale: El verbo σημαίνει irse/partir. «Se habían ido» es fluido en español y expresa el carácter retrospectivo de la observación.
theological_decisions:
- issue: Distinción entre πλοιάριον y πλοῖον en el mismo versículo
  english_pob_reading: The translation reflects the wording of the printed Greek text in each clause.
  chosen_spanish_reading: La traducción conserva la distinción entre «embarcación» y «barca», con nota sobre la variación manuscrita.
  alternative_spanish_readings:
  - unificar ambos términos como «barca»
  - unificar ambos términos como «embarcación»
  rationale: El contexto auditado indica que hay variación textual entre πλοιάριον y πλοῖον en esta cláusula/versículo. Mantener dos términos distintos ayuda a hacer visible esa tensión textual en español, en lugar de aplanarla.
  doctrine_reference: Textual criticism / crítica textual; principio de transparencia textual de la POB
translation_notes:
  revision_awareness: Se revisó el pasaje con el contexto auditado en inglés y el texto griego SBLGNT. No se detectaron cambios necesarios respecto del sentido general; la principal atención estuvo en conservar la distinción textual entre πλοιάριον y πλοῖον y en resolver naturalmente la concordancia de εἶδον con el sujeto colectivo en español.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma general del proyecto solo cuando el texto lo exige; este versículo no contiene el nombre divino.
  - Se evitó traducir mecánicamente el pluscuamperfecto inglés donde el español narrativo fluye mejor con presente de estado o pretérito compuesto.
  - Se mantuvo un registro neutro y eclesialmente legible, sin arcaísmos innecesarios.
  - La nota textual se colocó para no ocultar la variación entre πλοιάριον y πλοῖον, conforme al principio de transparencia de la POB.
