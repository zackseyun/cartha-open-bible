translation:
  language: es
  text: Después de estas cosas[a], Jesús se fue al otro lado del mar de Galilea[b], que es el mar de Tiberíades.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Después de estas cosas, Jesús partió más allá del mar de Galilea, que es el mar de Tiberíades».'
    reason: lexical_alternative
  - marker: b
    text: «Mar de Galilea» y «mar de Tiberíades» son dos nombres del mismo cuerpo de agua; Juan usa ambos para identificarlo.
    reason: cultural_note
lexical_decisions:
- source_word: Μετὰ ταῦτα
  english_pob_choice: After these things
  chosen_spanish: Después de estas cosas
  alternatives_spanish:
  - Después de esto
  - Después de aquello
  lexicon: BDAG
  rationale: Conserva el valor plural del demostrativo griego y la fórmula transicional característica de Juan; «Después de esto» sería más fluido, pero pierde parte de la correspondencia formal del plural.
- source_word: ἀπῆλθεν
  english_pob_choice: went away
  chosen_spanish: se fue
  alternatives_spanish:
  - partió
  - se apartó
  - se fue de allí
  lexicon: BDAG
  rationale: Expresa naturalmente en español el movimiento de salir o alejarse sin sobrecargar la frase; mantiene la idea de desplazamiento del aoristo de ἀπέρχομαι.
- source_word: πέραν
  english_pob_choice: to the other side of
  chosen_spanish: al otro lado de
  alternatives_spanish:
  - al otro lado
  - más allá de
  - al lado opuesto de
  lexicon: BDAG
  rationale: En contexto de cruce de un cuerpo de agua, la expresión idiomática española más clara es «al otro lado de», que conserva la orientación espacial del griego.
- source_word: θάλασσης
  english_pob_choice: Sea
  chosen_spanish: mar
  alternatives_spanish:
  - mar grande
  - lago
  lexicon: BDAG
  rationale: Aunque geográficamente se trata de un lago, el término griego usa θάλασσα y el uso bíblico tradicional en español también admite «mar»; así se conserva mejor el dato lexical del original.
- source_word: τῆς Γαλιλαίας
  english_pob_choice: of Galilee
  chosen_spanish: de Galilea
  alternatives_spanish:
  - galileo
  - de la Galilea
  lexicon: BDAG
  rationale: Reproduce la genitividad identificadora del texto y forma la denominación natural «mar de Galilea».
- source_word: τῆς Τιβεριάδος
  english_pob_choice: which is the Sea of Tiberias
  chosen_spanish: que es el mar de Tiberias
  alternatives_spanish:
  - que es el mar Tiberíades
  - el cual es el mar de Tiberias
  lexicon: BDAG
  rationale: Refleja la segunda designación del mismo cuerpo de agua en construcción explicativa, manteniendo claro que Juan añade un nombre equivalente y no introduce otro lugar distinto.
translation_notes:
  revision_awareness: 'Se siguió de cerca el texto griego SBLGNT y el audit trail inglés: se conservó la fórmula temporal plural Μετὰ ταῦτα, la idea de movimiento de ἀπῆλθεν, la relación espacial de πέραν y la doble identificación del cuerpo de agua con τῆς Γαλιλαίας / τῆς Τιβεριάδος. Se evitó una paráfrasis excesiva y se eligió una redacción española natural pero suficientemente formal para lectura pública.'
  spanish_consistency_notes:
  - Se usó «Jesús» como nombre propio establecido.
  - Se mantuvo «mar» en vez de «lago» para respetar el término griego θάλασσα y la tradición bíblica del pasaje.
  - La construcción «que es el mar de Tiberias» preserva la función explicativa del segundo genitivo sin añadir interpretación doctrinal.
