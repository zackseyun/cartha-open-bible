  text: Μετὰ ταῦτα ἀπῆλθεν ὁ Ἰησοῦς πέραν τῆς θαλάσσης τῆς Γαλιλαίας τῆς Τιβεριάδος.
base_translation:
  language: en
  yaml_path: translation/nt/john/006/001.yaml
  text: After these things[a], Jesus went away to the other side of the Sea of Galilee[b], which is the Sea of Tiberias.
  footnotes:
  - marker: a
    text: Or, more formally, 'After these things, Jesus departed beyond the Sea of Galilee, of Tiberias.'
    reason: lexical_alternative
  - marker: b
    text: The 'Sea of Galilee' was also known as the 'Sea of Tiberias.' John includes both names to identify the same body of water.
    reason: cultural_note
