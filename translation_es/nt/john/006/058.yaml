translation:
  language: es
  text: Este es el pan que descendió del cielo[a], no como comieron los padres y murieron; el que come este pan vivirá para siempre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los antepasados». El griego «los padres» probablemente se refiere a los antepasados de Israel que comieron el maná.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «vivirá hacia la edad», un modismo que significa vivir para siempre.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὗτός ἐστιν
  english_pob_choice: This is
  chosen_spanish: Este es
  alternatives_spanish:
  - Éste es
  - Este es el
  lexicon: BDAG
  rationale: El demostrativo con cópula se vierte de manera natural en español con «Este es», manteniendo la identificación directa sin sobrecargar el texto con una forma más literal y menos fluida como «Éste es el».
- source_word: ὁ ἄρτος
  english_pob_choice: the bread
  chosen_spanish: el pan
  alternatives_spanish:
  - este pan
  - el pan
  lexicon: BDAG
  rationale: «Pan» reproduce directamente ἄρτος y conserva la referencia discursiva ya desarrollada en el contexto. Se mantiene el artículo por la identificación de un pan específico.
- source_word: ὁ ἐξ οὐρανοῦ καταβάς
  english_pob_choice: that came down from heaven
  chosen_spanish: que descendió del cielo
  alternatives_spanish:
  - que bajó del cielo
  - que ha descendido del cielo
  lexicon: BDAG
  rationale: 'El participio aoristo se expresa naturalmente con una relativa: «que descendió del cielo». «Del cielo» conserva ἐξ οὐρανοῦ sin forzar una perífrasis más pesada.'
- source_word: οὐ καθὼς
  english_pob_choice: not as
  chosen_spanish: no como
  alternatives_spanish:
  - no tal como
  - no igual que
  lexicon: BDAG
  rationale: «No como» reproduce con claridad la comparación negativa del griego y es idiomático en español.
- source_word: ἔφαγον
  english_pob_choice: ate
  chosen_spanish: comieron
  alternatives_spanish:
  - comieron
  - comieron de
  lexicon: BDAG
  rationale: El aoristo plural se vierte con pasado simple plural. «Comieron» es el equivalente natural de ἔφαγον en este contraste narrativo.
- source_word: οἱ πατέρες
  english_pob_choice: the fathers
  chosen_spanish: los padres
  alternatives_spanish:
  - los ancestros
  - los antepasados
  lexicon: BDAG
  rationale: Se conserva el masculino plural con «los padres», que refleja la forma del griego y la probable alusión a los antepasados de Israel en el desierto. Se evita neutralizar el término sin base textual directa.
- source_word: ἀπέθανον
  english_pob_choice: died
  chosen_spanish: murieron
  alternatives_spanish:
  - murieron
  - perecieron
  lexicon: BDAG
  rationale: «Murieron» es el equivalente más natural del aoristo y mantiene el contraste directo con la vida futura prometida.
- source_word: ὁ τρώγων
  english_pob_choice: the one who eats
  chosen_spanish: el que come
  alternatives_spanish:
  - el que se alimenta de
  - el que mastica
  lexicon: BDAG
  rationale: El participio presente sustantivado se vierte como «el que come», preservando la fuerza durativa/generic del griego sin introducir una lectura sacramental explícita. Aunque τρώγω puede sonar gráfico, «come» es el equivalente español más claro y sobrio.
- source_word: τοῦτον τὸν ἄρτον
  english_pob_choice: this bread
  chosen_spanish: este pan
  alternatives_spanish:
  - este pan
  - este alimento
  lexicon: BDAG
  rationale: Se mantiene la referencia demostrativa directa con «este pan». «Alimento» diluiría la correspondencia concreta con ἄρτος.
- source_word: ζήσει εἰς τὸν αἰῶνα
  english_pob_choice: will live forever
  chosen_spanish: vivirá para siempre
  alternatives_spanish:
  - vivirá por la eternidad
  - vivirá para el siglo
  lexicon: BDAG
  rationale: «Vivirá para siempre» comunica de forma natural la idiomática expresión griega εἰς τὸν αἰῶνα, que señala vida perdurable sin dejar una construcción calcada en español.
theological_decisions:
- issue: Referencia de οἱ πατέρες en la comparación con el maná
  english_pob_reading: Retained as 'the fathers' rather than broadening to 'ancestors.'
  chosen_spanish_reading: Se conserva «los padres» en lugar de ampliar a «los antepasados».
  alternative_spanish_readings:
  - los ancestros
  - los antepasados
  rationale: El griego es masculino plural explícito y probablemente alude a los padres de Israel que comieron el maná. Mantener «los padres» conserva la forma textual y no borra la precisión del referente; la posible lectura colectiva queda implícita por el contexto.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
- issue: Fuerza de τρώγων en el discurso del pan de vida
  english_pob_reading: Rendered neutrally as 'the one who eats' without importing a sacramental interpretation.
  chosen_spanish_reading: Se vierte neutralmente como «el que come», sin imponer una interpretación sacramental.
  alternative_spanish_readings:
  - el que se alimenta de
  - el que participa de
  rationale: El pasaje pertenece al discurso del pan de vida, pero la traducción no debe resolver aquí el debate entre lectura sacramental y lectura metafórica de fe. «El que come» preserva el verbo y deja intacta la tensión teológica documentada.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 3
translation_notes:
  revision_awareness: La versión griega y el texto inglés auditado muestran acuerdo alto; no se documentaron revisiones aplicadas en el pase más reciente, por lo que la redacción española sigue de cerca las decisiones léxicas y la tensión teológica ya establecidas.
  spanish_consistency_notes:
  - Se mantiene «pan» para ἄρτος en todo el versículo.
  - Se conserva la construcción demostrativa + cópula («Este es») para reflejar οὗτός ἐστιν.
  - «Los padres» mantiene la precisión masculina del griego y la posible referencia a los padres de Israel.
  - «Vivirá para siempre» traduce el modismo εἰς τὸν αἰῶνα con español natural y digno.
