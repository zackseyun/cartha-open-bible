    text: Or 'the ancestors.' Greek 'the fathers' likely refers to Israel's forefathers who ate the manna.
    reason: lexical_alternative
  - marker: b
    text: Literally 'will live into the age,' an idiom meaning enduring life forever.
    reason: lexical_alternative
