revisions:
- from: Yo soy el pan vivo[a] que descendió del cielo. Si alguien come de este pan, vivirá para siempre[b]. Y el pan que yo daré, mi carne[c], es por la vida del mundo.
  to: Yo soy el pan vivo[a] que descendió del cielo. Si alguien come de este pan, vivirá para siempre[b]. Y el pan que yo daré por la vida del mundo es mi carne[c].
  rationale: 'Se corrige la última cláusula para reflejar la sintaxis y el énfasis del griego: el pan que Jesús dará es su carne, dada por la vida del mundo. También se afina la nota [b] para que la alternativa conserve mejor la cercanía léxica con εἰς τὸν αἰῶνα, sin perder claridad en español.'
