translation:
  language: es
  text: Yo soy el pan vivo[a] que descendió del cielo. Si alguien come de este pan, vivirá para siempre[b]. Y el pan que yo daré por la vida del mundo es mi carne[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “que bajó del cielo”. El participio griego expresa un descenso completo; “descendió” conserva el matiz con un español digno y natural.
    reason: lexical_alternative
  - marker: b
    text: O “vivirá por el siglo”. La expresión griega significa vida perdurable, es decir, para siempre.
    reason: lexical_alternative
  - marker: c
    text: Griego “carne”, no “cuerpo”. La expresión es deliberadamente concreta.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ἄρτος ὁ ζῶν
  english_pob_choice: the living bread
  chosen_spanish: el pan vivo
  alternatives_spanish:
  - el pan que vive
  - el pan de vida
  lexicon: BDAG
  rationale: ζῶν funciona mejor como participio atributivo con valor adjetival; en español, “vivo” conserva la imagen sin convertir la frase en una paráfrasis interpretativa como “pan de vida”.
- source_word: ὁ ἐκ τοῦ οὐρανοῦ καταβάς
  english_pob_choice: that came down from heaven
  chosen_spanish: que descendió del cielo
  alternatives_spanish:
  - que bajó del cielo
  - que ha descendido del cielo
  lexicon: BDAG
  rationale: El participio aoristo καταβάς expresa una acción completa. “Descendió” mantiene el matiz formal y la afirmación cristológica de procedencia celestial sin endurecer el español.
- source_word: ἐάν τις φάγῃ ἐκ τούτου τοῦ ἄρτου
  english_pob_choice: If anyone eats of this bread
  chosen_spanish: Si alguien come de este pan
  alternatives_spanish:
  - Si cualquiera comiere de este pan
  - Si alguien comiera de este pan
  - Si alguien come de este pan
  lexicon: BDAG
  rationale: ἐκ se refleja naturalmente con “de” en español. “Alguien” transmite el valor indefinido de τις; “come” comunica la condición general de forma clara y actual.
- source_word: ζήσει εἰς τὸν αἰῶνα
  english_pob_choice: he will live forever
  chosen_spanish: vivirá para siempre
  alternatives_spanish:
  - vivirá por el siglo
  - vivirá hasta la eternidad
  - vivirá para el siglo
  lexicon: BDAG
  rationale: La expresión idiomática griega en Juan apunta a duración indefinida/eternidad. “Para siempre” es la equivalencia natural en español y preserva el alcance del dicho.
- source_word: ὁ ἄρτος δὲ ὃν ἐγὼ δώσω
  english_pob_choice: And the bread that I will give
  chosen_spanish: Y el pan que yo daré
  alternatives_spanish:
  - Y el pan que daré
  - Ahora bien, el pan que yo daré
  lexicon: BDAG
  rationale: δέ introduce desarrollo del discurso; “Y” mantiene la continuidad. El futuro “daré” conserva la proyección hacia la entrega de Jesús.
- source_word: ἡ σάρξ μού
  english_pob_choice: my flesh
  chosen_spanish: mi carne
  alternatives_spanish:
  - mi cuerpo
  - mi naturaleza humana
  lexicon: BDAG
  rationale: σάρξ debe mantenerse como “carne” en este contexto concreto e intencionalmente fuerte. “Cuerpo” suavizaría el término y resolvería indebidamente la tensión léxica que el griego conserva.
- source_word: ὑπὲρ τῆς τοῦ κόσμου ζωῆς
  english_pob_choice: for the life of the world
  chosen_spanish: por la vida del mundo
  alternatives_spanish:
  - para la vida del mundo
  - en favor de la vida del mundo
  - a favor de la vida del mundo
  lexicon: BDAG
  rationale: ὑπέρ admite valor benefactivo o sustitutivo según contexto; “por” es natural en español y conserva la amplitud del propósito sin estrechar el sentido.
- source_word: κόσμος
  english_pob_choice: world
  chosen_spanish: mundo
  alternatives_spanish:
  - humanidad
  - creación
  lexicon: BDAG
  rationale: En Juan, κόσμος suele conservarse como “mundo” para respetar su resonancia teológica y no reducir su alcance a una interpretación más estrecha.
- source_word: τις ... ζήσει
  english_pob_choice: anyone ... he will live
  chosen_spanish: Si alguien ... vivirá
  alternatives_spanish:
  - Si cualquiera ... vivirá
  - Si alguno ... vivirá
  lexicon: Louw-Nida
  rationale: El singular indefinido griego se traduce con un indefinido en español. “Alguien” evita marcar género y mantiene el valor genérico del sujeto.
theological_decisions:
- issue: Sentido de σάρξ en la autodescripción de Jesús
  english_pob_reading: literal 'flesh' in the main text
  chosen_spanish_reading: ‘carne’ literal en el texto principal
  alternative_spanish_readings:
  - ‘cuerpo’ como adaptación interpretativa
  - ‘naturaleza humana’ como explicación doctrinal
  rationale: La guía del proyecto pide mantener σάρξ como “carne” en contextos literales. Aquí la frase es concreta y provocadora; traducirla como “cuerpo” suavizaría el impacto semántico y resolvería una tensión que el original conserva.
  doctrine_reference: 'DOCTRINE.md Contested terms: σάρξ'
- issue: Alcance de “el mundo”
  english_pob_reading: retain 'world' without narrowing
  chosen_spanish_reading: mantener ‘mundo’ sin restringirlo
  alternative_spanish_readings:
  - ‘humanidad’
  - ‘los elegidos’
  rationale: La cláusula afirma que Jesús da su carne “por la vida del mundo”. “Mundo” preserva el alcance amplio del texto y no introduce una reducción doctrinal que el griego no exige.
  doctrine_reference: DOCTRINE.md Translation philosophy §3; Affirmations
- issue: Procedencia celestial del pan
  english_pob_reading: translate straightforwardly as a real descent from heaven
  chosen_spanish_reading: traducir como un descenso real del cielo
  alternative_spanish_readings:
  - ‘fue enviado del cielo’
  - ‘vino del cielo’ como mera comisión
  rationale: En Juan, el lenguaje del descenso tiene fuerte carga cristológica e incarnacional. “Descendió del cielo” conserva esa afirmación de manera directa y clara.
  doctrine_reference: DOCTRINE.md Affirmations (Nicene, Chalcedonian bounds)
translation_notes:
  revision_awareness: Tomé en cuenta la última revisión inglesa que prefirió ‘eats of this bread’ por ser más natural y consistente para ἐκ τούτου τοῦ ἄρτου. En español opté por ‘come de este pan’, que refleja con naturalidad la misma relación preposicional sin perder formalidad.
  spanish_consistency_notes:
  - He mantenido ‘carne’ para σάρξ, en línea con el vocabulario POB y la tensión léxica documentada.
  - He usado ‘mundo’ para κόσμος y no ‘humanidad’, para conservar la amplitud joánica.
  - ‘descendió del cielo’ sigue el valor del participio aoristo y evita una paráfrasis excesiva.
  - La estructura general conserva el paralelismo y la progresión del griego sin introducir explicación doctrinal en el texto principal.
