review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la mayor parte del sentido griego: ''Yo soy el pan vivo'', ''que descendió del cielo'', la condición general ''Si alguien come de este pan'', y ''vivirá para siempre'' reflejan adecuadamente ἐγώ εἰμι, ὁ ἄρτος ὁ ζῶν, καταβάς, ἐάν τις φάγῃ ἐκ..., y ζήσει εἰς τὸν αἰῶνα. También mantiene correctamente σάρξ como ''carne'' y κόσμος como ''mundo''. Sin embargo, la última cláusula no preserva bien la sintaxis ni el énfasis del original: καὶ ὁ ἄρτος δὲ ὃν ἐγὼ δώσω ἡ σάρξ μού ἐστιν ὑπὲρ τῆς τοῦ κόσμου ζωῆς significa ''Y el pan que yo daré por la vida del mundo es mi carne'', no ''Y el pan que yo daré, mi carne, es por la vida del mundo''. La puntuación actual introduce una aposición que desordena la identificación central entre ''el pan'' y ''mi carne''.'
  spanish_quality_summary: El español es claro y digno en general, con registro apto para lectura eclesial amplia. 'Pan vivo', 'descendió del cielo' y 'vivirá para siempre' suenan naturales. La principal dificultad de legibilidad está en la coma de la última oración, que crea una estructura poco natural y algo confusa en español. Reordenar la cláusula final mejora a la vez fidelidad y fluidez.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: σάρξ -> ''carne'' se mantiene correctamente; κόσμος -> ''mundo'' también. No hay conflicto con Yahvé/Mesías u otros términos de glosario en este versículo. Sí conviene ajustar ὑπὲρ τῆς τοῦ κόσμου ζωῆς a ''por la vida del mundo'' dentro de la estructura correcta de la oración, no como predicado separado tras una coma.'
  issues:
  - severity: high
    issue: La cláusula final está mal estructurada en español y no refleja con precisión la sintaxis griega.
    rationale: El griego identifica 'el pan que yo daré' con 'mi carne' y luego añade 'por la vida del mundo'. La versión 'Y el pan que yo daré, mi carne, es por la vida del mundo' rompe esa identificación principal y puede sugerir una aposición incidental en vez de la ecuación explícita 'el pan ... es mi carne'.
  - severity: low
    issue: La nota [b] ofrece una alternativa española menos natural que la nota inglesa auditada.
    rationale: La alternativa inglesa preservada es 'he will live into the age'. 'Vivirá hasta la eternidad' no es incorrecto como glosa de sentido, pero funciona menos como alternativa léxica cercana al griego. Conviene una nota que preserve mejor 'por el siglo/la era' o 'hasta la era' si se desea reflejar la literalidad.
  revised_spanish_text: Yo soy el pan vivo[a] que descendió del cielo. Si alguien come de este pan, vivirá para siempre[b]. Y el pan que yo daré por la vida del mundo es mi carne[c].
  revised_footnotes:
  - marker: a
    text: O “que bajó del cielo”. El participio griego expresa un descenso completo; “descendió” conserva el matiz con un español digno y natural.
    reason: lexical_alternative
  - marker: b
    text: O “vivirá por el siglo”. La expresión griega significa vida perdurable, es decir, para siempre.
    reason: lexical_alternative
  - marker: c
    text: Griego “carne”, no “cuerpo”. La expresión es deliberadamente concreta.
    reason: lexical_alternative
  revision_rationale: 'Se corrige la última cláusula para reflejar la sintaxis y el énfasis del griego: el pan que Jesús dará es su carne, dada por la vida del mundo. También se afina la nota [b] para que la alternativa conserve mejor la cercanía léxica con εἰς τὸν αἰῶνα, sin perder claridad en español.'
