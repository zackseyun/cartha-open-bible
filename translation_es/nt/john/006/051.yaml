  text: ἐγώ εἰμι ὁ ἄρτος ὁ ζῶν ὁ ἐκ τοῦ οὐρανοῦ καταβάς· ἐάν τις φάγῃ ἐκ τούτου τοῦ ἄρτου ⸀ζήσει εἰς τὸν αἰῶνα, καὶ ὁ ἄρτος δὲ ὃν ἐγὼ δώσω ἡ σάρξ μού ⸀ἐστιν ὑπὲρ τῆς τοῦ κόσμου ζωῆς.
base_translation:
  language: en
  yaml_path: translation/nt/john/006/051.yaml
  text: I am the living bread that came down from heaven[a]. If anyone eats of this bread, he will live forever[c][b]. And the bread that I will give for the life of the world is my flesh.
  footnotes:
  - marker: a
    text: Or 'eats of this bread.' The Greek preposition can be rendered more literally this way, but 'eats from this bread' is more natural in current English.
    reason: lexical_alternative
  - marker: b
    text: Or 'he will live into the age.' The expression means enduringly or forever.
    reason: lexical_alternative
  - marker: c
    text: Greek 'flesh,' not 'body.' The wording is intentionally concrete.
    reason: lexical_alternative
