translation:
  language: es
  text: Entonces Jesús subió al monte, y allí estaba sentado con sus discípulos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀνῆλθεν
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - ascendió
  - fue subiendo
  lexicon: BDAG
  rationale: El aoristo de ἀνέρχομαι expresa movimiento ascendente en una acción narrativa ordinaria. En español, «subió» comunica ese desplazamiento de forma natural y fiel, sin la elevación estilística de «ascendió».
- source_word: δὲ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Aquí δέ marca progreso narrativo, no contraste fuerte. «Entonces» mantiene esa transición en español con fluidez.
- source_word: εἰς τὸ ὄρος
  english_pob_choice: on the mountain
  chosen_spanish: al monte
  alternatives_spanish:
  - a la montaña
  - sobre el monte
  - hacia el monte
  lexicon: BDAG
  rationale: Con ἀνῆλθεν, εἰς τὸ ὄρος describe el ir hacia arriba y llegar al monte. «Al monte» es idiomático en español y conserva la referencia al lugar específico, evitando el calco «en el monte» cuando el verbo ya expresa el ascenso.
- source_word: Ἰησοῦς
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  lexicon: BDAG
  rationale: Nombre propio transliterado de manera estándar al español bíblico.
- source_word: ἐκεῖ
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  lexicon: BDAG
  rationale: Adverbio locativo simple; «allí» es natural y mantiene la referencia espacial.
- source_word: ἐκάθητο
  english_pob_choice: sat
  chosen_spanish: se sentaba
  alternatives_spanish:
  - estaba sentado
  - se hallaba sentado
  lexicon: BDAG
  rationale: El imperfecto de κάθημαι puede expresar estado o acción continua. «Se sentaba» preserva mejor esa duración/escena en curso que un perfecto simple, y evita perder el matiz aspectual que el inglés resolvió con «sat» en contexto narrativo.
- source_word: μετὰ τῶν μαθητῶν αὐτοῦ
  english_pob_choice: with his disciples
  chosen_spanish: con sus discípulos
  alternatives_spanish:
  - con los discípulos de él
  - con sus seguidores
  lexicon: BDAG
  rationale: μετά con genitivo significa «con». μαθητής se rinde mejor como «discípulos» en contexto evangélico, porque mantiene la relación maestro-seguidor.
translation_notes:
  revision_awareness: El inglés POB y la revisión más reciente coinciden plenamente; no hubo cambios aplicados. La versión española sigue esa lectura estable, con ajustes idiomáticos propios del español para el valor narrativo de los verbos y la preposición.
  spanish_consistency_notes:
  - Se mantuvo «Jesús» como nombre propio estándar.
  - Se usó «discípulos» en coherencia con la terminología evangélica del POB.
  - Se evitó «ascendió» para no sobreelevar una acción geográfica ordinaria.
  - Se conservó el imperfecto con «se sentaba» para reflejar la escena en desarrollo.
