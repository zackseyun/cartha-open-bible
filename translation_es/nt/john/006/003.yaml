review_pass:
  verdict: revise
  source_alignment_summary: 'La mayor parte del borrador refleja bien el griego: «Entonces», «Jesús subió al monte», «allí» y «con sus discípulos» corresponden adecuadamente a δέ, ἀνῆλθεν, ἐκεῖ y μετὰ τῶν μαθητῶν αὐτοῦ. El problema principal está en ἐκάθητο: «se sentaba» en español suele sonar iterativo o inceptivo (''tomaba asiento''), mientras que aquí describe la escena de estar sentado allí con sus discípulos. «Estaba sentado» o «se quedó sentado» representan mejor el imperfecto de κάθημαι en este contexto narrativo.'
  spanish_quality_summary: El texto es claro y natural, pero «y allí se sentaba» suena poco idiomático en español bíblico contemporáneo y puede sugerir acción repetida. «Y allí estaba sentado» fluye mejor y conserva el valor descriptivo del imperfecto. El resto del versículo es plenamente legible y digno.
  glossary_alignment: 'La terminología clave está alineada con las pautas del proyecto: «Jesús» para Ἰησοῦς y «discípulos» para μαθηταί. No hay términos teológicos conflictivos ni necesidad de notas léxicas adicionales.'
  issues:
  - severity: medium
    issue: «se sentaba» para ἐκάθητο
    rationale: Aunque formalmente puede reflejar un imperfecto, en español actual suele entenderse como acción habitual, repetida o de inicio ('tomaba asiento'). El griego aquí describe la situación de Jesús ya sentado/estando sentado en ese lugar con sus discípulos.
  revised_spanish_text: Entonces Jesús subió al monte, y allí estaba sentado con sus discípulos.
  revision_rationale: Se reemplaza «se sentaba» por «estaba sentado» para expresar con mayor fidelidad y naturalidad el imperfecto descriptivo de ἐκάθητο en español, evitando una lectura iterativa o inceptiva que no encaja bien en el contexto.
