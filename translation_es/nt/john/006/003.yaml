- from: Entonces Jesús subió al monte, y allí se sentaba con sus discípulos.
  to: Entonces Jesús subió al monte, y allí estaba sentado con sus discípulos.
  rationale: Se reemplaza «se sentaba» por «estaba sentado» para expresar con mayor fidelidad y naturalidad el imperfecto descriptivo de ἐκάθητο en español, evitando una lectura iterativa o inceptiva que no encaja bien en el contexto.
