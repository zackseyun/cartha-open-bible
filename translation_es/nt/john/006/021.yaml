translation:
  language: es
  text: Así que estaban dispuestos a recibirlo en la barca, y enseguida la barca estaba en la tierra adonde iban.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «enseguida la barca llegó a la orilla adonde iban».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤθελον
  english_pob_choice: they were willing
  chosen_spanish: querían
  alternatives_spanish:
  - estaban dispuestos
  - estaban dispuestos a
  lexicon: BDAG
  rationale: El imperfecto de θέλω aquí expresa disposición o intención sostenida en el contexto narrativo. En español, «querían» transmite esa voluntad/disposición sin añadir una matiz de simple deseo emocional que el contexto no exige.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - por tanto
  - entonces
  lexicon: BDAG
  rationale: οὖν marca continuidad inferencial o narrativa. «Así que» conserva la conexión con lo anterior con naturalidad en español moderno.
- source_word: λαβεῖν αὐτὸν εἰς τὸ πλοῖον
  english_pob_choice: to take him into the boat
  chosen_spanish: tomarlo en la barca
  alternatives_spanish:
  - llevarlo a la barca
  - recibirlo en la barca
  lexicon: BDAG
  rationale: λαμβάνω en este contexto concreto describe la acción de introducir a Jesús en la embarcación. «Tomarlo en la barca» mantiene cercanía al griego y es idiomático; «barca» es más natural que «barco» para este contexto lacustre.
- source_word: πλοῖον
  english_pob_choice: boat
  chosen_spanish: barca
  alternatives_spanish:
  - barco
  - embarcación
  lexicon: BDAG
  rationale: En el contexto del mar de Galilea, «barca» comunica mejor el tamaño y tipo de nave que «barco», que puede sonar demasiado grande o genérico en español.
- source_word: εὐθέως
  english_pob_choice: immediately
  chosen_spanish: enseguida
  alternatives_spanish:
  - inmediatamente
  - al instante
  lexicon: BDAG
  rationale: εὐθέως expresa inmediatez. «Enseguida» es natural y conserva el golpe narrativo sin perder precisión.
- source_word: ἐγένετο τὸ πλοῖον ἐπὶ τῆς γῆς
  english_pob_choice: the boat was at the land
  chosen_spanish: la barca estaba en la tierra
  alternatives_spanish:
  - la barca llegó a la orilla
  - la barca estaba en la costa
  lexicon: BDAG
  rationale: γίνομαι con complemento locativo puede expresar que algo se encuentra o llega a estar en un lugar. «Estaba en la tierra» se mantiene cercano al griego y deja intacta la abrupta transición; «tierra» conserva la ambigüedad de γῆ entre tierra y ribera.
- source_word: γῆς
  english_pob_choice: land
  chosen_spanish: la tierra
  alternatives_spanish:
  - la orilla
  - la costa
  lexicon: BDAG
  rationale: Aunque en contexto náutico «orilla» sería una aclaración posible, γῆ dice literalmente «tierra/land». Se conserva «tierra» en el texto principal y se reserva «orilla» para la alternativa en nota.
- source_word: εἰς ἣν ὑπῆγον
  english_pob_choice: to which they were going
  chosen_spanish: adonde iban
  alternatives_spanish:
  - a la que iban
  - hacia la que se dirigían
  lexicon: BDAG
  rationale: ὑπάγω indica movimiento hacia un destino. «Adonde iban» refleja con naturalidad la relación de destino del relativo y el aspecto imperfectivo del viaje en curso.
theological_decisions:
- issue: Cómo preservar la brusquedad del cambio espacial sin suavizarlo interpretativamente
  english_pob_reading: Retain the straightforward wording 'immediately the boat was at the land' without explanatory expansion.
  chosen_spanish_reading: 'Mantener una formulación breve y directa: «enseguida la barca estaba en la tierra».'
  alternative_spanish_readings:
  - enseguida la barca llegó a la orilla
  - enseguida la barca arribó a la costa
  rationale: El griego presenta la secuencia con extrema concisión y con fuerte sensación de inmediatez. La traducción conserva esa tensión narrativa sin resolverla mediante una paráfrasis explicativa más suave.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el pasaje base; el testimonio de auditoría indica alta concordancia y sin cambios necesarios en la revisión más reciente.
  spanish_consistency_notes:
  - Se usa «barca» de manera consistente para πλοῖον en el contexto de Galilea.
  - Se conserva «tierra» en el texto principal para γῆ, con «orilla» como alternativa marginal.
  - «Así que» refleja la inferencia narrativa de οὖν sin sobretraducirla.
  - La nota preserva la alternativa «orilla» porque el campo semántico de γῆ en este contexto permite esa lectura contextual.
