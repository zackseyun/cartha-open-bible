translation:
  language: es
  text: Desde este momento muchos de sus discípulos volvieron atrás y ya no andaban con él[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Por esto muchos de sus discípulos se fueron»; la expresión griega inicial puede entenderse causalmente, aunque en este contexto «Desde este momento» refleja mejor el sentido de punto de quiebre.'
    reason: alternative_reading
lexical_decisions:
- source_word: Ἐκ τούτου
  english_pob_choice: From this time
  chosen_spanish: Desde este momento
  alternatives_spanish:
  - Desde entonces
  - A partir de este momento
  - Por esto
  lexicon: BDAG
  rationale: En este contexto joánico, la expresión funciona mejor como marcador temporal de giro narrativo que como causa estricta. «Desde este momento» mantiene el valor de umbral o punto de quiebre y evita imponer una lectura causal que el contexto no exige.
- source_word: πολλοὶ
  english_pob_choice: many
  chosen_spanish: muchos
  alternatives_spanish:
  - una multitud
  - muchísimos
  lexicon: BDAG
  rationale: Adjetivo cuantitativo directo; «muchos» es la equivalencia natural en español y conserva la amplitud del grupo sin exageración.
- source_word: ἐκ τῶν μαθητῶν αὐτοῦ
  english_pob_choice: of his disciples
  chosen_spanish: de sus discípulos
  alternatives_spanish:
  - de entre sus discípulos
  - de los discípulos que lo seguían
  lexicon: BDAG
  rationale: El ἐκ partitivo indica que salieron de dentro del grupo de discípulos. «De sus discípulos» es conciso y fiel; la opción «de entre» explicita el partitivo, pero resulta un poco más pesada en español.
- source_word: ἀπῆλθον
  english_pob_choice: went back
  chosen_spanish: se volvieron atrás
  alternatives_spanish:
  - se fueron
  - se retiraron
  - regresaron
  lexicon: BDAG
  rationale: Unido a εἰς τὰ ὀπίσω, el verbo expresa retroceso o retirada hacia atrás, no solo salida. «Se volvieron atrás» reproduce bien el matiz de abandono y retroceso que la POB inglesa captó con «went back».
- source_word: εἰς τὰ ὀπίσω
  english_pob_choice: back
  chosen_spanish: atrás
  alternatives_spanish:
  - hacia atrás
  - a lo de atrás
  lexicon: BDAG
  rationale: El giro idiomático se integra naturalmente con «se volvieron atrás». En español, «atrás» comunica el movimiento de retroceso sin sonar literalista.
- source_word: οὐκέτι
  english_pob_choice: no longer
  chosen_spanish: ya no
  alternatives_spanish:
  - no más
  - no volvieron a
  lexicon: BDAG
  rationale: Marca cese desde ese punto en adelante. «Ya no» es la forma más natural y clara en español para expresar esa interrupción continua.
- source_word: μετ’ αὐτοῦ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - a su lado
  - en compañía de él
  lexicon: BDAG
  rationale: Expresa compañía o seguimiento relacional de forma simple y directa; no requiere ampliación.
- source_word: περιεπάτουν
  english_pob_choice: walked
  chosen_spanish: andaban
  alternatives_spanish:
  - caminaban
  - seguían andando
  lexicon: BDAG
  rationale: 'En contexto joánico, περιπατέω puede conservar el sentido literal de caminar y el valor de conducta/compañía. «Andaban con él» es idiomático en español y preserva esa continuidad relacional sin forzar una paráfrasis como «seguían». '
theological_decisions:
- issue: Cómo reflejar μαθηταί sin convertirlos en los Doce ni resolver la tensión sobre su fidelidad
  english_pob_reading: disciples
  chosen_spanish_reading: discípulos
  alternative_spanish_readings:
  - seguidores
  - alumnos
  rationale: El texto solo dice que muchos de entre sus discípulos se apartaron; no identifica a los Doce ni introduce una distinción doctrinal entre aparentes y verdaderos discípulos. «Discípulos» conserva la categoría narrativa y deja intacta la tensión del pasaje.
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: La redacción sigue la última decisión auditada del POB inglés de mantener Ἐκ τούτου con valor temporal de giro narrativo, conservando también la lectura de abandono/retroceso en ἀπῆλθον εἰς τὰ ὀπίσω y la continuidad relacional de οὐκέτι μετ’ αὐτοῦ περιεπάτουν.
  spanish_consistency_notes:
  - Se mantuvo «discípulos» para μαθηταί, en coherencia con la política POB de no resolver por traducción la cuestión de su identidad o autenticidad espiritual.
  - Se evitó «SEÑOR» o fórmulas litúrgicas no presentes; el texto solo contiene referencias pronominales a Jesús mediante «él».
  - «Se volvieron atrás» y «andaban con él» conservan el paralelismo del griego entre retroceso físico/metafórico y discontinuidad de compañía.
