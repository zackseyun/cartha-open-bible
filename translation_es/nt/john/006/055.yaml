translation:
  language: es
  text: Porque mi carne es verdadero alimento[a], y mi sangre es verdadera bebida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "alimento real" y "bebida real".
    reason: lexical_alternative
lexical_decisions:
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Expresa la conexión explicativa con lo anterior en un español natural y digno. "Porque" conserva la fuerza discursiva de γάρ sin volver la frase artificial.
- source_word: σάρξ
  english_pob_choice: flesh
  chosen_spanish: carne
  alternatives_spanish:
  - cuerpo
  lexicon: BDAG
  rationale: Se mantiene el valor literal de σάρξ, como en el texto inglés auditado con "flesh". "Carne" es la correspondencia española más directa y preserva el paralelismo con "sangre".
- source_word: ἀληθής
  english_pob_choice: 'true'
  chosen_spanish: verdadero
  alternatives_spanish:
  - real
  - genuino
  lexicon: BDAG
  rationale: '"Verdadero" conserva la fuerza del adjetivo y evita resolver de antemano la carga teológica o sacramental con una opción más interpretativa como "real".'
- source_word: βρῶσις
  english_pob_choice: food
  chosen_spanish: alimento
  alternatives_spanish:
  - comida
  - manjar
  lexicon: BDAG
  rationale: '"Alimento" expresa bien el sentido de aquello que se come y funciona naturalmente con el adjetivo predicativo. Evita estrechar indebidamente el término y conserva el paralelo con "bebida".'
- source_word: αἷμα
  english_pob_choice: blood
  chosen_spanish: sangre
  alternatives_spanish:
  - hemorragia
  lexicon: BDAG
  rationale: Se traduce de manera literal por "sangre", manteniendo el paralelismo con "carne" y sin suavizar la imagen del original.
- source_word: πόσις
  english_pob_choice: drink
  chosen_spanish: bebida
  alternatives_spanish:
  - beber
  - lo que se bebe
  lexicon: BDAG
  rationale: En español, "bebida" es el contraparte natural de "alimento" y representa bien el valor nominal de πόσις como aquello que se bebe.
theological_decisions:
- issue: Cómo rendir ἀληθής en un pasaje con fuerte peso sacramental sin decidir la controversia
  english_pob_reading: true food / true drink
  chosen_spanish_reading: verdadero alimento / verdadera bebida
  alternative_spanish_readings:
  - alimento real / bebida real
  - alimento auténtico / bebida auténtica
  rationale: Se preserva la formulación directa del griego y del audit trail inglés, evitando una paráfrasis que resuelva la tensión teológica. "Verdadero" deja abierta la discusión sobre la dimensión eucarística sin imponerla por traducción.
  doctrine_reference: Preservar la tensión teológica sin resolverla por elección léxica.
translation_notes:
  revision_awareness: El texto inglés auditado permanece sin cambios en la revisión más reciente; no se registran revisiones aplicadas. La versión española sigue esa estabilidad y conserva las mismas decisiones léxicas principales, ajustándolas a un español natural sin perder el paralelismo del original.
  spanish_consistency_notes:
  - Se mantiene el paralelismo "mi carne... y mi sangre...".
  - Se evita "Cristo" o terminología eclesial no presente en el versículo.
  - '"Verdadero" se usa en ambos miembros para reflejar el adjetivo repetido ἀληθής.'
  - La nota al pie preserva la alternativa semántica documentada en el audit trail inglés.
