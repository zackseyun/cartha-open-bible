revisions:
- from: Pero hay algunos entre ustedes que no creen[a]. Porque Jesús sabía desde el principio quiénes eran los que no creían[b], y quién era el que lo iba a entregar.
  to: Pero hay algunos entre ustedes que no creen. Porque Jesús sabía desde el principio quiénes eran los que no creían[a], y quién era el que lo iba a traicionar[b].
  rationale: Se corrigió la traducción principal de παραδώσων para alinearla con la decisión contextual de la POB ('traicionar'), dejando 'entregar' como alternativa más literal en nota. También se reubicaron y rehicieron las notas para que correspondan al segmento correcto del texto y preserven alternativas reales y útiles. El resto del versículo se mantiene por ser fiel, natural y claro.
