review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: contraste inicial, subconjunto dentro del grupo, incredulidad continua, conocimiento previo de Jesús, y referencia al futuro entregador. Sin embargo, se aparta del rastro auditado de la POB inglesa en un punto importante: donde la POB principal traduce παραδώσων como ''would betray'' con nota para la alternativa literal, el español invierte esa decisión y pone en texto principal ''lo iba a entregar'' con nota mal anclada y además equivocadamente colocada sobre ''creen''.'
  spanish_quality_summary: 'El español es claro y natural en casi todo el versículo. ''Pero hay algunos entre ustedes que no creen'' y ''Jesús sabía desde el principio'' son idiomáticos y fieles. La principal reparación necesaria es mover la alternativa léxica al lugar correcto y hacer que el texto principal exprese la traición contextual: ''lo iba a traicionar'' suena natural y digno. También la nota b actual no aporta una alternativa real, porque repite sustancialmente el mismo texto y con puntuación defectuosa.'
  glossary_alignment: No hay conflicto con los términos proyectuales mayores. 'Jesús', 'Dios' etc. no están en juego aquí. Para πιστεύω, 'creen/creían' está bien. Para παραδίδωμι, dado el expediente inglés y la decisión teológica documentada, el español debe normalmente seguir 'traicionar' en el texto principal y reservar 'entregar' como alternativa literal en nota.
  issues:
  - severity: high
    issue: La traducción principal de παραδώσων no sigue la decisión auditada de la POB inglesa.
    rationale: El inglés principal tiene 'would betray him' y conserva 'hand him over' solo como alternativa léxica en nota. El borrador español pone 'lo iba a entregar' en el texto principal, lo cual revierte una decisión semántica y teológica ya documentada.
  - severity: high
    issue: La nota [a] está anclada al lugar equivocado.
    rationale: La nota sobre 'hand him over/entregar' aparece unida a 'creen[a]' en vez de al verbo final relacionado con παραδώσων. Esto crea una referencia errónea y confunde al lector.
  - severity: medium
    issue: La nota [b] no preserva una alternativa significativa y está mal formulada.
    rationale: La nota b dice esencialmente lo mismo que el texto principal ('quiénes eran los que no creían') y no refleja con precisión la alternativa inglesa documentada ('who the ones not believing were'). Debe ajustarse a una alternativa española real o eliminarse.
  revised_spanish_text: Pero hay algunos entre ustedes que no creen. Porque Jesús sabía desde el principio quiénes eran los que no creían[a], y quién era el que lo iba a traicionar[b].
  revised_footnotes:
  - marker: a
    text: 'O: «quiénes eran los no creyentes» o, más literalmente, «quiénes eran los que no estaban creyendo».'
    reason: previous_rendering
  - marker: b
    text: O, más literalmente, «que lo iba a entregar».
    reason: lexical_alternative
  revision_rationale: Se corrigió la traducción principal de παραδώσων para alinearla con la decisión contextual de la POB ('traicionar'), dejando 'entregar' como alternativa más literal en nota. También se reubicaron y rehicieron las notas para que correspondan al segmento correcto del texto y preserven alternativas reales y útiles. El resto del versículo se mantiene por ser fiel, natural y claro.
