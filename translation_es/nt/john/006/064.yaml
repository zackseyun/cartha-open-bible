translation:
  language: es
  text: Pero hay algunos entre ustedes que no creen. Porque Jesús sabía desde el principio quiénes eran los que no creían[a], y quién era el que lo iba a traicionar[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «quiénes eran los no creyentes» o, más literalmente, «quiénes eran los que no estaban creyendo».'
    reason: previous_rendering
  - marker: b
    text: O, más literalmente, «que lo iba a entregar».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Mas
  - Sin embargo
  lexicon: BDAG
  rationale: Marca contraste con lo anterior; en español, «Pero» es natural y conserva el valor adversativo sin elevar el tono.
- source_word: ἐξ ὑμῶν
  english_pob_choice: among you
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - de ustedes
  - en medio de ustedes
  lexicon: BDAG
  rationale: La idea es de pertenencia dentro del grupo al que Jesús se dirige; «entre ustedes» transmite esa inclusión grupal de forma idiomática.
- source_word: τινες
  english_pob_choice: some
  chosen_spanish: algunos
  alternatives_spanish:
  - ciertos
  - unos cuantos
  lexicon: BDAG
  rationale: Indefinido plural para un subconjunto no especificado; «algunos» es el equivalente natural en español.
- source_word: οἳ οὐ πιστεύουσιν
  english_pob_choice: who do not believe
  chosen_spanish: que no creen
  alternatives_spanish:
  - que no creen en él
  - que no están creyendo
  lexicon: BDAG
  rationale: Preserva el presente durativo/actual de πιστεύω con un español claro; «creen» mantiene la negación de fe sin forzar una perífrasis menos natural.
- source_word: ᾔδει
  english_pob_choice: knew
  chosen_spanish: sabía
  alternatives_spanish:
  - conocía
  - había sabido
  lexicon: BDAG
  rationale: El imperfecto de οἶδα funciona como estado pasado; «sabía» expresa bien esa conciencia previa y continua.
- source_word: ἐξ ἀρχῆς
  english_pob_choice: from the beginning
  chosen_spanish: desde el principio
  alternatives_spanish:
  - desde el comienzo
  - desde el inicio
  lexicon: BDAG
  rationale: Conserva la referencia temporal amplia sin precisar más de lo que el griego afirma.
- source_word: οἱ μὴ πιστεύοντες
  english_pob_choice: the ones not believing
  chosen_spanish: los que no creían
  alternatives_spanish:
  - los que no creen
  - los incrédulos
  lexicon: BDAG
  rationale: La forma sustantivada participial identifica a un grupo caracterizado por incredulidad; en español, «los que no creían» mantiene el valor de clase y el aspecto pasado en la cláusula de conocimiento de Jesús.
- source_word: παραδώσων
  english_pob_choice: would betray
  chosen_spanish: lo iba a entregar
  alternatives_spanish:
  - lo entregaría
  - lo iba a traicionar
  lexicon: BDAG
  rationale: Παραδίδωμι puede significar «entregar/poner en manos de»; en el contexto narrativo de Judas, «lo iba a entregar» conserva el valor más literal y deja visible la tensión con la lectura interpretativa «traicionar».
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: Pronombre de objeto directo referido a Jesús; «lo» es la forma natural en español.
theological_decisions:
- issue: πιστεύω en contexto joánico de incredulidad
  english_pob_reading: believe
  chosen_spanish_reading: creen
  alternative_spanish_readings:
  - confían
  - tienen fe
  rationale: En Juan, πιστεύω abarca creer/poner fe; «creen» preserva el uso joánico sin reducirlo a una formulación devocional más estrecha.
  doctrine_reference: 'Translation philosophy §3; Contested terms: πίστις'
- issue: παραδίδωμι respecto de Judas
  english_pob_reading: betray
  chosen_spanish_reading: lo iba a entregar
  alternative_spanish_readings:
  - lo iba a traicionar
  - lo entregaría
  rationale: La POB inglesa preserva la alternativa más literal en nota. En español, «entregar» mantiene la conexión directa con παραδίδωμι y deja abierta la carga narrativa de traición implícita en el contexto.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: La versión inglesa más reciente suaviza la construcción de οἱ μὴ πιστεύοντες a «who those were who did not believe», pero el griego conserva una caracterización sustantivada del grupo. El español aquí mantiene esa referencia grupal con «los que no creían» y conserva la alternativa literal de παραδώσων en nota, siguiendo la práctica auditada de la POB.
  spanish_consistency_notes:
  - Se usa «Jesús» sin artículo, conforme al nombre propio griego.
  - Se evita «Cristo» porque no aparece en el texto fuente.
  - Se mantiene «Dios»/«Yahvé» fuera de este versículo, sin necesidad de decisiones adicionales.
  - El orden de las cláusulas sigue el contraste, la explicación causal y la identificación final, con puntuación natural en español.
