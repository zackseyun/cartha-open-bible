translation:
  language: es
  text: 'Entonces los judíos murmuraban de él porque dijo[a]: «Yo soy el pan que descendió del cielo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los judeanos» o, en algunos contextos, «los líderes judíos». La expresión de Juan «los judíos» puede referirse a un grupo particular opuesto a Jesús más que al pueblo judío en su conjunto.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἐγόγγυζον
  english_pob_choice: were grumbling
  chosen_spanish: estaban murmurando
  alternatives_spanish:
  - estaban quejándose
  - murmuraban
  lexicon: BDAG
  rationale: El imperfecto griego expresa acción շարունակada o repetida en el pasado. «Estaban murmurando» conserva ese aspecto durativo y el tono de queja baja o recelosa que sugiere γογγύζω, sin sonar arcaico en español.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - Entonces
  - Por tanto
  lexicon: BDAG
  rationale: Marca continuación narrativa y lógica. «Así que» es natural en español moderno y mantiene la conexión inferencial sin volver el texto excesivamente formal.
- source_word: οἱ Ἰουδαῖοι
  english_pob_choice: the Jews
  chosen_spanish: los judíos
  alternatives_spanish:
  - los líderes judíos
  - los judeanos
  lexicon: BDAG
  rationale: La expresión griega se conserva de modo directo. En este versículo no hay una delimitación explícita a líderes; «los judíos» reproduce el sintagma de Juan y mantiene la observación teológica documentada en la auditoría, sin universalizarlo contra todo el pueblo judío.
- source_word: περὶ αὐτοῦ
  english_pob_choice: about him
  chosen_spanish: acerca de él
  alternatives_spanish:
  - sobre él
  - contra él
  lexicon: BDAG
  rationale: περί con genitivo significa normalmente «acerca de / sobre». «Acerca de él» es la opción más natural en español y no fuerza una hostilidad que el preposición por sí sola no exige.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - que
  lexicon: BDAG
  rationale: Aquí introduce la causa de su murmuración, no solo el contenido citado. «Porque» hace explícita la relación causal de manera idiomática en español.
- source_word: εἶπεν
  english_pob_choice: he said
  chosen_spanish: dijo
  alternatives_spanish:
  - había dicho
  lexicon: BDAG
  rationale: El aoristo narrativo se vierte naturalmente con pretérito simple. «Dijo» mantiene la secuencia del relato sin añadir matiz temporal innecesario.
- source_word: Ἐγώ εἰμι
  english_pob_choice: I am
  chosen_spanish: Yo soy
  alternatives_spanish:
  - Soy yo
  lexicon: BDAG
  rationale: Es la autodeclaración copulativa directa de Jesús. «Yo soy» preserva la forma griega y el énfasis del pronombre explícito.
- source_word: ὁ ἄρτος
  english_pob_choice: the bread
  chosen_spanish: el pan
  alternatives_spanish:
  - pan
  lexicon: BDAG
  rationale: La construcción con artículo identifica a Jesús como el pan específico del discurso, no pan en sentido general. «El pan» refleja esa especificidad.
- source_word: ὁ καταβὰς
  english_pob_choice: that came down
  chosen_spanish: que descendió
  alternatives_spanish:
  - que bajó
  - que ha descendido
  lexicon: BDAG
  rationale: El participio aoristo con artículo modifica a «el pan». En español, la relativa «que descendió» expresa de forma clara y fiel la acción completa de venir desde arriba.
- source_word: ἐκ τοῦ οὐρανοῦ
  english_pob_choice: from heaven
  chosen_spanish: del cielo
  alternatives_spanish:
  - desde el cielo
  - desde el cielo arriba
  lexicon: BDAG
  rationale: En español bíblico y contemporáneo, «cielo» es la forma normal para οὐρανός en este contexto teológico. «Del cielo» conserva la procedencia/origen divina de manera natural.
theological_decisions:
- issue: Referente de οἱ Ἰουδαῖοι en Juan
  english_pob_reading: Rendered as 'the Jews' in the main text
  chosen_spanish_reading: los judíos en el texto principal
  alternative_spanish_readings:
  - los líderes judíos
  - los judeanos
  rationale: La traducción sigue de cerca la forma griega y no restringe el referente más allá de lo que el contexto inmediato exige. La nota documenta que, en Juan, la expresión puede señalar a un grupo particular en oposición a Jesús y no al pueblo judío en general.
  doctrine_reference: Principio de primacía del texto original y claridad lectora en español
- issue: Posible ambigüedad de ἐκ τοῦ οὐρανοῦ
  english_pob_reading: from heaven
  chosen_spanish_reading: del cielo
  alternative_spanish_readings:
  - desde el cielo
  rationale: «Del cielo» es la expresión española más estable para origen celestial/divino. Conserva el movimiento de procedencia sin convertir el verso en una explicación doctrinal adicional.
  doctrine_reference: Uso bíblico consolidado de «cielo» para οὐρανός en contexto teológico
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; el pasaje quedó estable. La redacción española sigue esa lectura estable, manteniendo el valor aspectual del imperfecto, la causalidad de ὅτι y la autodeclaración «Yo soy» sin añadir expansión interpretativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparezca; aquí no corresponde.
  - Se mantiene «los judíos» como reflejo directo de οἱ Ἰουδαῖοι, con nota de alcance contextual.
  - «Pan» se conserva como término literal para ἄρτος en esta unidad.
  - «Del cielo» sigue la convención española normal para οὐρανός en sentido teológico.
