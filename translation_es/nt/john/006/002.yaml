translation:
  language: es
  text: Y una gran multitud lo seguía, porque veían las señales[a] que hacía en los que estaban enfermos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «milagros» o «señales milagrosas»; en Juan, «señales» subraya lo que estas obras revelan acerca de Jesús.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠκολούθει
  english_pob_choice: was following
  chosen_spanish: lo seguía
  alternatives_spanish:
  - iba siguiendo a él
  - estaba siguiendo a él
  lexicon: BDAG
  rationale: El imperfecto griego expresa acción continua o en desarrollo en el pasado. En español, «lo seguía» comunica esa continuidad de manera natural y sin forzar una perífrasis pesada.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Pero
  - Entonces
  - Ahora bien
  lexicon: BDAG
  rationale: Aquí δέ enlaza suavemente la narración; «Y» mantiene el avance discursivo sin introducir contraste fuerte.
- source_word: ὄχλος πολύς
  english_pob_choice: a large crowd
  chosen_spanish: una gran multitud
  alternatives_spanish:
  - una gran multitud de gente
  - una multitud grande
  lexicon: BDAG
  rationale: «ὄχλος» es una agrupación numerosa de personas; «gran multitud» conserva el énfasis cuantitativo y es idiomático en español bíblico actual.
- source_word: ἐθεώρουν
  english_pob_choice: were seeing
  chosen_spanish: veían
  alternatives_spanish:
  - estaban viendo
  - observaban
  - miraban
  lexicon: BDAG
  rationale: El imperfecto indica percepción repetida o continua. «Veían» mantiene esa idea en español natural; «observaban» sería posible, pero endurece el tono más de lo que exige el contexto.
- source_word: σημεῖα
  english_pob_choice: signs
  chosen_spanish: las señales
  alternatives_spanish:
  - los signos
  - los milagros
  - las señales milagrosas
  lexicon: BDAG
  rationale: En Juan, σημεῖα es un término teológicamente cargado que apunta al significado revelador de las obras de Jesús. «Señales» preserva ese valor mejor que «milagros» y evita perder la tensión interpretativa del texto.
- source_word: ἐποίει
  english_pob_choice: was doing
  chosen_spanish: hacía
  alternatives_spanish:
  - estaba haciendo
  - realizaba
  - obraba
  lexicon: BDAG
  rationale: El imperfecto expresa actividad en curso. «Hacía» es una solución clara y sobria; «obraba» podría sonar más tradicional, pero introduce un matiz menos inmediato.
- source_word: ἐπὶ τῶν ἀσθενούντων
  english_pob_choice: on those who were sick
  chosen_spanish: sobre los que estaban enfermos
  alternatives_spanish:
  - en favor de los que estaban enfermos
  - para los que estaban enfermos
  - entre los enfermos
  lexicon: BDAG
  rationale: La preposición ἐπί con genitivo se refleja mejor de forma concreta con «sobre». En español, la expresión resultante puede sonar ligeramente marcada, pero conserva la relación espacial/objetual que el audit trail inglés decidió no suavizar.
- source_word: ἀσθενούντων
  english_pob_choice: those who were sick
  chosen_spanish: los que estaban enfermos
  alternatives_spanish:
  - los enfermos
  - los débiles
  - los aquejados
  lexicon: BDAG
  rationale: El participio se refiere aquí a enfermedad física en el contexto. «Los que estaban enfermos» explicita el sentido sin perder el valor participial.
theological_decisions:
- issue: Juan 6:2 y el término σημεῖα
  english_pob_reading: signs
  chosen_spanish_reading: señales
  alternative_spanish_readings:
  - milagros
  - signos milagrosos
  rationale: El texto joánico no solo describe prodigios, sino hechos que revelan quién es Jesús. «Señales» preserva esa dimensión reveladora y mantiene la tensión entre el hecho y su significado.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather than resolve it.'
- issue: Relación de ἐπί con los enfermos
  english_pob_reading: on those who were sick
  chosen_spanish_reading: sobre los que estaban enfermos
  alternative_spanish_readings:
  - en favor de los que estaban enfermos
  - para los que estaban enfermos
  rationale: Se conserva la cercanía al valor preposicional que el audit trail inglés quiso reflejar. No se normaliza hacia una paráfrasis más interpretativa que pudiera diluir el vínculo textual.
  doctrine_reference: Original-language primacy over translation tradition; auditable lexical reasoning.
translation_notes:
  revision_awareness: El inglés auditado pasó de «for those who were sick» a «on those who were sick» para reflejar con más precisión ἐπὶ con genitivo. La redacción española conserva esa decisión con «sobre los que estaban enfermos», evitando suavizarla hacia una paráfrasis de beneficio. También mantiene el término joánico «signs» como «señales» para preservar la carga teológica del original.
  spanish_consistency_notes:
  - Se usa «señales» de manera consistente para σημεῖα, evitando «milagros» en el texto principal.
  - 'El imperfecto griego se refleja con formas imperfectivas naturales del español: «seguía», «veían», «hacía».'
  - «Sobre los que estaban enfermos» conserva la relación marcada por ἐπί con genitivo, aunque suene menos corriente que una formulación interpretativa.
  - Se evita «SEÑOR» u otras sustituciones porque no aparece el tetragrámaton en este versículo.
  - La puntuación sigue el orden narrativo español estándar y mantiene la única nota textual/lexical donde el término joánico puede generar alternativa de lectura.
