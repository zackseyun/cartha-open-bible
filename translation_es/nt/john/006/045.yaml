revisions:
- from: 'Está escrito en los Profetas[a]: «Y todos serán enseñados por Dios». Todo el que ha oído del Padre y ha aprendido viene a mí.'
  to: 'Está escrito en los Profetas[a]: «Y todos serán enseñados por Dios». Todo el que ha oído al Padre y ha aprendido de él viene a mí.'
  rationale: Se propone una reparación menor, no una reescritura sustancial. Se corrige la nota al pie para que preserve la alternativa léxica real documentada por el POB. También se mejora «ha oído del Padre» a «ha oído al Padre y ha aprendido de él», que suena más natural en español y mantiene la secuencia semántica de haber escuchado y aprendido del Padre antes de venir a Jesús. No se requiere adjudicación adicional.
