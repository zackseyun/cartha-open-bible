review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego y sigue de cerca el rastro POB en casi todos los puntos: «Está escrito», «en los Profetas», «todos serán enseñados por Dios», y la secuencia «ha oído... ha aprendido... viene a mí» preservan adecuadamente la relación entre la enseñanza del Padre y venir a Jesús. Sin embargo, hay un desajuste menor entre el texto principal y la decisión léxica documentada en παρὰ τοῦ πατρὸς: el texto dice «ha oído del Padre», que en español puede sonar algo brusco o menos natural, mientras que la decisión léxica aprobada es «del Padre» como complemento de procedencia. Conviene ajustar a una formulación más idiomática sin perder el valor de fuente.'
  spanish_quality_summary: 'El español es claro, digno y ampliamente legible. La principal mejora es estilística-idiomática: «ha oído del Padre» suena menos natural que «ha oído al Padre y ha aprendido de él» o «ha oído del Padre y aprendido», pero la mejor solución debe evitar alterar el sentido. Además, la nota al pie actual está mal formulada: presenta como alternativa exactamente la misma frase del texto principal («todos serán enseñados por Dios») en vez de reservar la nota para la alternativa léxica real «Dios-enseñados».'
  glossary_alignment: 'La terminología está alineada con el proyecto: θεοῦ -> «Dios», πατήρ -> «Padre», ἐμέ -> «mí». No hay conflicto con Yahvé/Mesías/Cristo u otros términos sensibles. La excepción a corregir es la nota léxica, que debe reflejar la alternativa documentada «Dios-enseñados» en lugar de repetir el texto principal.'
  issues:
  - severity: medium
    issue: Expresión poco idiomática en «ha oído del Padre»
    rationale: Aunque comprensible y cercana al inglés, esta secuencia no suena tan natural en español bíblico contemporáneo. El griego παρὰ τοῦ πατρὸς expresa fuente/procedencia; «ha oído al Padre y ha aprendido de él» comunica mejor la relación de escuchar y aprender del Padre sin perder el sentido.
  - severity: medium
    issue: Nota al pie defectuosa y redundante
    rationale: 'La nota dice: «O: “todos serán enseñados por Dios”; lit. “todos serán Dios-enseñados”». La primera parte repite exactamente el texto principal, por lo que no ofrece una alternativa real. Debe limitarse a la alternativa léxica pertinente, como en el inglés POB.'
  revised_spanish_text: 'Está escrito en los Profetas[a]: «Y todos serán enseñados por Dios». Todo el que ha oído al Padre y ha aprendido de él viene a mí.'
  revised_footnotes:
  - marker: a
    text: 'O: «todos serán Dios-enseñados».'
    reason: lexical_alternative
  revision_rationale: Se propone una reparación menor, no una reescritura sustancial. Se corrige la nota al pie para que preserve la alternativa léxica real documentada por el POB. También se mejora «ha oído del Padre» a «ha oído al Padre y ha aprendido de él», que suena más natural en español y mantiene la secuencia semántica de haber escuchado y aprendido del Padre antes de venir a Jesús. No se requiere adjudicación adicional.
