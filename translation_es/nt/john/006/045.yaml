translation:
  language: es
  text: 'Está escrito en los Profetas[a]: «Y todos serán enseñados por Dios». Todo el que ha oído al Padre y ha aprendido de él viene a mí.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todos serán Dios-enseñados».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔστιν γεγραμμένον
  english_pob_choice: It is written
  chosen_spanish: Está escrito
  alternatives_spanish:
  - Se halla escrito
  - Queda escrito
  lexicon: BDAG
  rationale: La perífrasis perfecta se vierte con una fórmula natural y reverente en español que expresa una cita con autoridad vigente sin sonar artificial.
- source_word: ἐν τοῖς προφήταις
  english_pob_choice: in the Prophets
  chosen_spanish: en los Profetas
  alternatives_spanish:
  - en las Escrituras proféticas
  - en los profetas
  lexicon: BDAG
  rationale: Se conserva la referencia al corpus profético como título escritural, con mayúscula en español por tratarse de una designación canónica.
- source_word: ἔσονται πάντες διδακτοὶ θεοῦ
  english_pob_choice: they will all be taught by God
  chosen_spanish: todos serán enseñados por Dios
  alternatives_spanish:
  - todos serán enseñados por Dios mismo
  - todos serán instruidos por Dios
  - todos serán enseñados por Dios-todo
  lexicon: BDAG
  rationale: «Enseñados» comunica el pasivo futuro de forma natural en español y mantiene a Dios como agente de la instrucción. Se evita una glosa mecánica que suene forzada.
- source_word: πᾶς ὁ
  english_pob_choice: Everyone who
  chosen_spanish: Todo el que
  alternatives_spanish:
  - Cada uno que
  - Quienquiera que
  lexicon: BDAG
  rationale: La construcción sustantivada singular con valor genérico se expresa de manera idiomática y clara en español.
- source_word: ἀκούσας
  english_pob_choice: has heard
  chosen_spanish: ha oído
  alternatives_spanish:
  - oyó
  - ha escuchado
  lexicon: BDAG
  rationale: El aoristo participial se vierte con pretérito perfecto para marcar una acción previa con resultado presente, en paralelo con «ha aprendido».
- source_word: παρὰ τοῦ πατρὸς
  english_pob_choice: from the Father
  chosen_spanish: del Padre
  alternatives_spanish:
  - de parte del Padre
  - desde el Padre
  lexicon: BDAG
  rationale: La preposición con genitivo expresa procedencia/origen; «del Padre» conserva la relación personal joánica con naturalidad en español.
- source_word: μαθὼν
  english_pob_choice: has learned
  chosen_spanish: ha aprendido
  alternatives_spanish:
  - aprendió
  - ha sido instruido
  lexicon: BDAG
  rationale: Se mantiene el paralelismo con «ha oído» y el valor de acción previa culminada antes del verbo principal.
- source_word: ἔρχεται πρὸς ἐμέ
  english_pob_choice: comes to me
  chosen_spanish: viene a mí
  alternatives_spanish:
  - se acerca a mí
  - va a mí
  lexicon: BDAG
  rationale: «Viene a mí» reproduce el presente de movimiento hacia Jesús con una fórmula natural y reverente en español; evita un literalismo innecesario.
theological_decisions:
- issue: Relación entre la enseñanza divina y el venir a Jesús
  english_pob_reading: 'The translation preserves the text''s sequence without importing a denominational explanation: those who have heard from the Father and learned come to Jesus.'
  chosen_spanish_reading: 'La traducción conserva la secuencia del texto: quienes han oído del Padre y han aprendido vienen a Jesús.'
  alternative_spanish_readings:
  - quienes han oído del Padre y han aprendido llegan a Jesús
  - los que han oído del Padre y han aprendido se acercan a Jesús
  rationale: El español mantiene la relación entre oír/aprender y venir sin resolver la cuestión teológica de si el énfasis recae más en la acción divina o en la respuesta humana. Se preserva la tensión del original.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
- issue: Identidad del Padre y alcance cristológico de «a mí»
  english_pob_reading: The translation keeps 'the Father' and 'me' in direct relation, preserving the Johannine claim that true learning from the Father leads to Jesus.
  chosen_spanish_reading: 'Se mantiene al Padre y a Jesús en relación directa: el que aprende del Padre viene a Jesús.'
  alternative_spanish_readings:
  - el que aprende del Padre se dirige a Jesús
  - el que es enseñado por el Padre viene a Jesús
  rationale: La formulación española conserva el peso cristológico del dicho sin añadir explicación doctrinal externa al versículo.
  doctrine_reference: historic ecumenical orthodoxy; do not import claims the text does not make.
translation_notes:
  revision_awareness: La revisión más reciente indica que no se requirieron cambios y que el acuerdo con el control cruzado fue alto; por ello se mantiene una traducción estable, ajustada solo a la naturalidad del español sin alterar el sentido auditado.
  spanish_consistency_notes:
  - Se usa «Dios» para θεοῦ conforme al estándar del proyecto.
  - Se conserva «Padre» con mayúscula por referencia personal y joánica.
  - Se emplea «Jesús» implícito en «a mí» según el contexto del evangelio, sin añadirlo al texto.
  - La nota al pie preserva la alternativa lexical documentada por el inglés POB.
  - No se introduce «Cristo» ni «SEÑOR», ya que el versículo no lo exige.
