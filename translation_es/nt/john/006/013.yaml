revisions:
- from: Así que recogieron los pedazos[a], y llenaron doce canastos con pedazos de los cinco panes de cebada que habían sobrado[b] a los que habían comido.
  to: Así que recogieron, y llenaron doce cestas con pedazos[a] de los cinco panes de cebada que habían sobrado[b] por los que habían comido.
  rationale: La revisión elimina la explicitación innecesaria del objeto de συνήγαγον, mejora la naturalidad de la relación final con τοῖς βεβρωκόσιν, y sustituye 'canastos' por 'cestas' para mayor neutralidad y legibilidad eclesial. Se conservan las notas léxicas ya documentadas y el sentido del inglés POB auditado.
