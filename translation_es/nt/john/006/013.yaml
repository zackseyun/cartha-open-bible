review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien la secuencia básica del griego: consecuencia narrativa (οὖν), recolección de los sobrantes, llenado de doce cestas/canastos, y procedencia de los restos de los cinco panes de cebada. Sin embargo, dos elecciones necesitan ajuste para reflejar mejor la relación sintáctica y el sentido documentado: (1) hacer explícito en la primera cláusula ''los pedazos'' introduce κλασμάτων antes de tiempo y repite innecesariamente el mismo sustantivo; el objeto está implícito en el contexto, como en el inglés auditado. (2) ''a los que habían comido'' suena menos natural y menos fiel que ''por los que habían comido'' o una reformulación equivalente para τοῖς βεβρωκόσιν dentro de la expresión ''sobrados por...''.'
  spanish_quality_summary: El texto es generalmente claro y digno, pero 'recogieron los pedazos' seguido de 'con pedazos' produce repetición torpe, y 'a los que habían comido' resulta poco idiomático en esta construcción. 'Canastos' es posible, pero 'cestas' suena más ampliamente neutro y bíblicamente natural en español eclesial general. Una leve revisión mejora fluidez sin alejarse de la fuente.
  glossary_alignment: 'No hay conflictos con la terminología teológica del proyecto. Las decisiones léxicas clave son mayormente adecuadas: ''panes de cebada'', ''pedazos'', y nota sobre ''fragmentos''. La nota sobre ἐπερίσσευσαν debe mantener la explicación del matiz ''sobraron/abundaron'' y el sentido de restos después de la comida.'
  issues:
  - severity: medium
    issue: Objeto explícito innecesario en 'recogieron los pedazos'
    rationale: συνήγαγον no incluye κλασμάτων; el griego simplemente dice 'recogieron' con objeto implícito por el contexto. Añadir 'los pedazos' no falsea gravemente, pero adelanta y duplica un elemento que aparece después.
  - severity: medium
    issue: Preposición poco natural en 'habían sobrado a los que habían comido'
    rationale: La relación de τοῖς βεβρωκόσιν se expresa mejor en español con 'por los que habían comido' o una reformulación equivalente ('después que habían comido'). 'Sobrar a' aquí suena impropio.
  - severity: low
    issue: '''Canastos'' menos natural que ''cestas'' en registro bíblico general'
    rationale: Aunque válido, 'cestas' suele ser más ampliamente reconocido y natural en traducción bíblica neutral; además empata mejor con el uso común para κοφίνους.
  revised_spanish_text: Así que recogieron, y llenaron doce cestas con pedazos[a] de los cinco panes de cebada que habían sobrado[b] por los que habían comido.
