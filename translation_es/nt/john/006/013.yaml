translation:
  language: es
  text: Así que recogieron, y llenaron doce cestas con pedazos[a] de los cinco panes de cebada que habían sobrado[b] por los que habían comido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'fragmentos' para 'pedazos' (κλασμάτων).
    reason: lexical_alternative
  - marker: b
    text: Lit. 'que sobraron' / 'que abundaron'; la idea es que eran los restos después de la comida.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνήγαγον
  english_pob_choice: they gathered them
  chosen_spanish: recogieron los pedazos
  alternatives_spanish:
  - los juntaron
  - recogieron
  lexicon: BDAG
  rationale: El verbo expresa la acción de reunir lo que quedó; en español, 'recogieron' comunica bien esa acción dentro del contexto de los sobrantes. Añadir 'los pedazos' hace explícito el objeto implícito, como en el inglés POB.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - Entonces
  - Por tanto
  lexicon: BDAG
  rationale: '''Así que'' conserva la fuerza inferencial/narrativa de οὖν con naturalidad en español moderno.'
- source_word: ἐγέμισαν
  english_pob_choice: filled
  chosen_spanish: llenaron
  alternatives_spanish:
  - llenaron de
  lexicon: BDAG
  rationale: '''Llenaron'' es la equivalencia natural del aoristo y mantiene el sujeto plural implícito sin recargar la frase.'
- source_word: δώδεκα κοφίνους
  english_pob_choice: twelve baskets
  chosen_spanish: doce canastos
  alternatives_spanish:
  - doce cestas
  - doce canastas
  lexicon: BDAG
  rationale: '''Canastos'' es un término claro y neutral para κοφίνους. ''Canastas'' también sería posible, pero ''canastos'' evita regionalismos más marcados.'
- source_word: κλασμάτων
  english_pob_choice: pieces
  chosen_spanish: pedazos
  alternatives_spanish:
  - fragmentos
  - trozos
  lexicon: BDAG
  rationale: El término se refiere a los restos partidos del pan. 'Pedazos' es comprensible y evita una elección demasiado técnica; en nota se preserva la alternativa 'fragmentos'.
- source_word: ἐκ τῶν πέντε ἄρτων τῶν κριθίνων
  english_pob_choice: from the five barley loaves
  chosen_spanish: de los cinco panes de cebada
  alternatives_spanish:
  - de los cinco panes de cebada
  - de los cinco panes de cebada
  lexicon: BDAG
  rationale: '''Panes'' refleja ἄρτοι en este contexto de alimentación milagrosa. ''De cebada'' conserva el adjetivo de materia/crédito alimentario y mantiene la relación con la provisión original.'
- source_word: ἃ ἐπερίσσευσαν
  english_pob_choice: left over
  chosen_spanish: que habían sobrado
  alternatives_spanish:
  - que quedaron de sobra
  - que sobraron
  lexicon: BDAG
  rationale: El griego describe el excedente que quedó tras la comida. En español, 'habían sobrado' expresa con naturalidad el resultado sin perder el matiz de sobrante.
- source_word: τοῖς βεβρωκόσιν
  english_pob_choice: by those who had eaten
  chosen_spanish: a los que habían comido
  alternatives_spanish:
  - para los que habían comido
  - por los que habían comido
  lexicon: BDAG
  rationale: El participio perfecto de βιβρώσκω apunta a quienes comieron; en español, la relación más natural con el sobrante puede expresarse con 'a los que habían comido'. La preposición no intenta interpretar causalidad, sino continuidad referencial en la clausula final.
theological_decisions:
- issue: Valor de los sobrantes en el relato de la multiplicación
  english_pob_reading: The sense is that these were the portions left over after the meal.
  chosen_spanish_reading: Se entiende que eran los pedazos sobrantes después de la comida.
  alternative_spanish_readings:
  - eran los restos después de la comida
  - eran las porciones que quedaron tras la comida
  rationale: No hay un punto doctrinal controversial, pero sí una tensión semántica entre el verbo activo griego y el sentido pasivo de 'quedó sobrante'. La traducción española mantiene esa lectura de sobras sin sugerir que los pedazos 'se multiplicaron' por sí mismos.
  doctrine_reference: None
translation_notes:
  revision_awareness: 'La revisión inglesa eliminó el relativo innecesario ''that were'' para reflejar mejor el griego. La versión española sigue esa línea al evitar una perífrasis equivalente innecesaria y usar una construcción directa: ''que habían sobrado''.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' como norma del proyecto solo cuando corresponda; este versículo no contiene el nombre divino.
  - '''Mesías'' no aplica aquí; ''Cristo'' tampoco es necesario en el texto.'
  - '''Canastos'' mantiene un registro bíblico claro sin forzar un tecnicismo regional.'
  - La colocación de 'a los que habían comido' reproduce la relación final del participio sin añadir interpretación doctrinal.
