base_translation:
  language: en
  yaml_path: translation/nt/john/006/029.yaml
  text: 'Jesus answered and said to them[b][a], “This is the work of God: that you believe in the one whom he has sent.”'
  footnotes:
  - marker: a
    text: Or “the work God requires” or “the work God does.” The Greek phrase “the work of God” can be understood in more than one way, and the wording here preserves that ambiguity.
    reason: alternative_reading
  - marker: b
    text: Or “trust in the one whom he has sent.”
    reason: lexical_alternative
