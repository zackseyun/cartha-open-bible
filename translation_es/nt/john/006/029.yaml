translation:
  language: es
  text: 'Jesús respondió y les dijo[a][b]: «Esta es la obra de Dios: que crean en aquel a quien él ha enviado».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la obra que Dios requiere» o «la obra que Dios hace». La expresión griega «la obra de Dios» puede entenderse de más de un modo, y la redacción aquí preserva esa ambigüedad.
    reason: alternative_reading
  - marker: b
    text: O «confíen en aquel a quien él ha enviado».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: BDAG
  rationale: En español, «respondió» comunica de manera natural la fórmula narrativa de ἀποκρίνομαι en un diálogo, sin añadir énfasis extra. «Contestó» sería posible, pero «respondió» es más estándar y sobrio.
- source_word: εἶπεν
  english_pob_choice: said
  chosen_spanish: les dijo
  alternatives_spanish:
  - les habló
  - les dijo
  lexicon: BDAG
  rationale: Conserva la duplicación griega «respondió... y dijo» con un verbo verbalmente simple y natural en español. «Dijo» mantiene la estructura sin volverla pesada.
- source_word: Τοῦτό ἐστιν
  english_pob_choice: This is
  chosen_spanish: Este es
  alternatives_spanish:
  - Esto es
  - Este es
  lexicon: BDAG
  rationale: La forma demostrativa + copula se refleja de modo directo. «Este es» suena natural en español y preserva el énfasis de la frase inicial.
- source_word: τὸ ἔργον τοῦ θεοῦ
  english_pob_choice: the work of God
  chosen_spanish: el trabajo de Dios
  alternatives_spanish:
  - la obra de Dios
  - el trabajo de Dios
  - el trabajo que Dios requiere
  lexicon: BDAG
  rationale: Se conserva la ambigüedad del genitivo como en la versión inglesa auditada. «Trabajo» mantiene la fuerza concreta de ἔργον sin forzar una interpretación exclusivamente religiosa; «obra» es una alternativa válida, pero aquí puede sonar más eclesiástica y menos abierta.
- source_word: ἵνα
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - para que
  - que
  lexicon: BDAG
  rationale: En español, después de una definición o identificación como ésta, «que» introduce con claridad la cláusula subordinada sin añadir finalidad más fuerte de la que el contexto exige.
- source_word: πιστεύητε
  english_pob_choice: you believe
  chosen_spanish: crean
  alternatives_spanish:
  - crean
  - crean en
  - tengan fe en
  lexicon: BDAG
  rationale: «Crean» reproduce el valor de πιστεύω de manera idiomática. En este contexto, el complemento con εἰς pide la preposición «en»; «tener fe en» sería posible, pero aquí «crean en» es más directo y consistente con el uso bíblico.
- source_word: εἰς ὃν
  english_pob_choice: in the one whom
  chosen_spanish: en aquel a quien
  alternatives_spanish:
  - en el que
  - en aquel a quien
  - en el que él ha enviado
  lexicon: BDAG
  rationale: «Aquel a quien» mantiene el referente personal y el valor relacional de εἰς con πιστεύω, sin convertirlo en una mera afirmación intelectual. «Aquel» conserva la distancia reverente del pronombre relativo.
- source_word: ἀπέστειλεν
  english_pob_choice: he has sent
  chosen_spanish: ha enviado
  alternatives_spanish:
  - envió
  - ha enviado
  lexicon: BDAG
  rationale: El perfecto compuesto español («ha enviado») refleja bien la relevancia presente del envío en el discurso, como en la lectura inglesa auditada.
- source_word: ἐκεῖνος
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - él
  - ese
  lexicon: BDAG
  rationale: El pronombre se refiere a Dios y en español puede expresarse naturalmente con «él». Evita un calco como «aquel» o «ese» donde el referente ya queda claro por el contexto.
theological_decisions:
- issue: Ambigüedad de «el trabajo de Dios» / τὸ ἔργον τοῦ θεοῦ
  english_pob_reading: Retain the ambiguous phrase 'the work of God' in the main text.
  chosen_spanish_reading: Mantener «el trabajo de Dios» en el texto principal, sin resolver el genitivo.
  alternative_spanish_readings:
  - la obra de Dios
  - el trabajo que Dios requiere
  - el trabajo que Dios hace
  rationale: La frase griega admite una lectura objetiva o subjetiva. En el contexto, Jesús responde a una pregunta sobre lo que deben hacer los oyentes, pero el texto también puede entenderse como la obra que pertenece a Dios o que Dios realiza. La traducción española conserva esa tensión, siguiendo el criterio auditado de no decidir prematuramente la interpretación.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Valor de πιστεύω con εἰς
  english_pob_reading: Translate as 'believe in.'
  chosen_spanish_reading: Traducir como «crean en»
  alternative_spanish_readings:
  - confíen en
  - tengan fe en
  rationale: En Juan, πιστεύω con εἰς expresa una relación personal de fe/confianza dirigida a alguien, no solo asentimiento mental. «Crean en» es el equivalente más natural en español y deja abierta la cercanía entre creer y confiar sin imponer una paráfrasis doctrinal.
  doctrine_reference: 'Contested terms table: πιστεύω default rendering with context-sensitive alternatives.'
translation_notes:
  revision_awareness: Sin revisiones aplicadas respecto del último pase; se conserva la lectura auditada con la misma preservación de tensiones léxicas y teológicas.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός conforme al estándar del proyecto.
  - Se emplea «crean en» para πιστεύω con εἰς, sin neutralizar la relación personal del complemento.
  - Se evita «SEÑOR» para el nombre divino porque este versículo usa θεός, no יהוה.
  - Se conserva una sintaxis directa y publicable en español, sin calco excesivo de la estructura griega.
