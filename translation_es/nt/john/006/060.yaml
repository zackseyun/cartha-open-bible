translation:
  language: es
  text: 'Por eso muchos de sus discípulos, al oírlo, dijeron: «Esta palabra[a] es dura[b]; ¿quién puede escucharla[c]?».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «este dicho». λόγος aquí también puede significar «mensaje» o «enseñanza».
    reason: lexical_alternative
  - marker: b
    text: O «difícil»; σκληρός aquí puede significar duro, severo o difícil de aceptar.
    reason: lexical_alternative
  - marker: c
    text: O «oírla». El verbo griego puede significar oír, escuchar, o prestar atención/aceptar, según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: Πολλοὶ
  english_pob_choice: many
  chosen_spanish: muchos
  alternatives_spanish:
  - gran número de
  lexicon: BDAG
  rationale: πολλοί señala una cantidad considerable dentro del grupo; «muchos» es la forma natural y concisa en español, y conserva el valor cuantitativo sin añadir énfasis innecesario.
- source_word: οὖν
  english_pob_choice: therefore
  chosen_spanish: por eso
  alternatives_spanish:
  - entonces
  - así que
  lexicon: BDAG
  rationale: El conector expresa consecuencia o desarrollo respecto del discurso previo. «Por eso» conserva esa fuerza inferencial con un español fluido y adecuado al registro bíblico actual.
- source_word: ἀκούσαντες
  english_pob_choice: when they heard it
  chosen_spanish: al oírlo
  alternatives_spanish:
  - cuando lo oyeron
  - después de oírlo
  lexicon: BDAG
  rationale: El participio aoristo tiene valor temporal en el contexto. «Al oírlo» reproduce esa relación temporal de forma natural y mantiene la referencia al contenido escuchado sin sobrecargar la frase.
- source_word: ἐκ τῶν μαθητῶν αὐτοῦ
  english_pob_choice: of his disciples
  chosen_spanish: de sus discípulos
  alternatives_spanish:
  - entre sus discípulos
  - de entre sus discípulos
  lexicon: BDAG
  rationale: La construcción indica procedencia desde dentro del grupo de discípulos. «De sus discípulos» es idiomático en español y conserva esa pertenencia sin expandir el sentido más de lo necesario.
- source_word: Σκληρός
  english_pob_choice: hard
  chosen_spanish: dura
  alternatives_spanish:
  - difícil
  - áspera
  - severa
  lexicon: BDAG
  rationale: El adjetivo puede expresar dureza, severidad o dificultad de aceptación. «Dura» preserva esa amplitud semántica en español, evitando reducir el reclamo a solo dificultad intelectual o solo aspereza moral.
- source_word: ὁ λόγος οὗτος
  english_pob_choice: this word
  chosen_spanish: esta palabra
  alternatives_spanish:
  - esta frase
  - este dicho
  - este mensaje
  - esta enseñanza
  lexicon: BDAG
  rationale: λόγος puede significar «palabra», «dicho», «mensaje» o «enseñanza». «Palabra» mantiene la cercanía formal con el griego y permite que la queja se entienda como referida al dicho/discurso recién escuchado.
- source_word: τίς δύναται
  english_pob_choice: who can
  chosen_spanish: ¿quién puede?
  alternatives_spanish:
  - ¿quién es capaz de?
  - ¿quién puede hacerlo?
  lexicon: BDAG
  rationale: La pregunta sobre capacidad se expresa de manera directa y natural con «¿quién puede?», sin añadir un complemento que el texto no explicita.
- source_word: αὐτοῦ ἀκούειν
  english_pob_choice: listen to it
  chosen_spanish: escucharla
  alternatives_spanish:
  - oírla
  - prestarle atención
  - aceptarla
  lexicon: BDAG
  rationale: ἀκούω puede significar oír, escuchar o prestar atención/obedecer según el contexto. Aquí el problema es la recepción del dicho; «escucharla» mantiene el vínculo con «al oírlo» y evita cerrar prematuramente el sentido en «aceptarla».
theological_decisions:
- issue: Sentido de la objeción de los discípulos ante el discurso de Jesús
  english_pob_reading: The statement expresses that Jesus' teaching is difficult or severe to receive, without specifying whether the difficulty is intellectual, moral, or offensive.
  chosen_spanish_reading: La frase comunica que la palabra de Jesús resulta dura de recibir, sin precisar si la dificultad es intelectual, moral o de aceptación.
  alternative_spanish_readings:
  - La frase indica solo que es intelectualmente difícil.
  - La frase implica que es ofensiva o intolerable moralmente.
  rationale: 'σκληρός admite una gama de matices: dureza, severidad, dificultad o aspereza. Traducir «dura» conserva esa tensión sin resolverla en una interpretación más estrecha que el texto no obliga a adoptar.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Coincide con la última pasada sin cambios relevantes: se mantiene la fuerza inferencial de οὖν, el valor temporal de ἀκούσαντες, la ambigüedad de σκληρός y la posibilidad semántica de λόγος y ἀκούω, tal como refleja el audit trail inglés.'
  spanish_consistency_notes:
  - Se preserva «Yahvé» como norma general del proyecto, aunque este versículo no contiene el nombre divino.
  - Se usa «palabra» para λόγος siguiendo la decisión inglesa documentada, con nota alternativa implícita en la glosa.
  - Se mantiene «escucharla» para ἀκούειν por su capacidad de incluir oír y atender, sin cerrar el sentido en «aceptarla».
