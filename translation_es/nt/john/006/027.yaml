translation:
  language: es
  text: No trabajen por el alimento que perece, sino por el alimento que permanece para vida eterna[a], el cual el Hijo del Hombre les dará; porque Dios el Padre ha puesto su sello sobre él[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que dura para vida eterna».
    reason: lexical_alternative
  - marker: b
    text: 'Griego: «ha sellado»; la expresión comunica autorización o autenticación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐργάζεσθε
  english_pob_choice: Do not work
  chosen_spanish: No trabajen
  alternatives_spanish:
  - No trabajéis
  - No se afanen en
  lexicon: BDAG
  rationale: El imperativo plural exige una prohibición directa. «Trabajen» conserva la fuerza verbal del original mejor que una paráfrasis como «esfuércense». Se evita «afanen» por ser más interpretativo y menos fiel al verbo de trabajo/empleo de esfuerzo.
- source_word: μὴ ... ἀλλὰ
  english_pob_choice: not ... but
  chosen_spanish: no ... sino
  alternatives_spanish:
  - no ... pero
  - no ... más bien
  lexicon: BDAG
  rationale: «No ... sino» reproduce con claridad la oposición prohibitiva del griego y es idiomático en español.
- source_word: βρῶσιν
  english_pob_choice: food
  chosen_spanish: el alimento
  alternatives_spanish:
  - la comida
  - el sustento
  lexicon: BDAG
  rationale: En este contexto βρῶσις designa lo que se come. «Alimento» mantiene el campo semántico de comida/nutrición y suena natural en español bíblico contemporáneo.
- source_word: ἀπολλυμένην
  english_pob_choice: that perishes
  chosen_spanish: que perece
  alternatives_spanish:
  - que se pierde
  - que está pereciendo
  lexicon: BDAG
  rationale: El participio presente expresa una cualidad en curso. «Que perece» conserva el sentido de perecer/desaparecer sin volverlo demasiado explicativo.
- source_word: μένουσαν
  english_pob_choice: that remains
  chosen_spanish: que permanece
  alternatives_spanish:
  - que dura
  - que permanece en pie
  lexicon: BDAG
  rationale: «Permanece» refleja bien μένω y mantiene el contraste con «perece». «Dura» sería más libre y menos consistente con la raíz verbal.
- source_word: εἰς ζωὴν αἰώνιον
  english_pob_choice: to eternal life
  chosen_spanish: para vida eterna
  alternatives_spanish:
  - hacia vida eterna
  - para la vida eterna
  lexicon: BDAG
  rationale: El valor final/de resultado de εἰς se expresa de forma natural con «para». Se evita «hacia» por sonar menos idiomático y «la vida eterna» porque el griego no exige artículo.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  english_pob_choice: the Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - el Hijo del ser humano
  - el Hijo del Hombre
  lexicon: BDAG
  rationale: Es el título estable y tradicional para esta autodesignación de Jesús, y en español transmite mejor la resonancia bíblica que una explicación perifrástica.
- source_word: ὑμῖν δώσει
  english_pob_choice: will give to you
  chosen_spanish: les dará
  alternatives_spanish:
  - les dará a ustedes
  - se lo dará
  lexicon: BDAG
  rationale: El dativo plural se expresa naturalmente con «les». Se evita redundancia innecesaria, aunque la variante explícita «a ustedes» es posible.
- source_word: τοῦτον
  english_pob_choice: him
  chosen_spanish: a este
  alternatives_spanish:
  - a él
  - a este mismo
  lexicon: BDAG
  rationale: El demostrativo retoma al Hijo del Hombre. En español, conservar «a este» preserva mejor la referencia demonstrativa del griego que reemplazarlo directamente por un pronombre más liso.
- source_word: ἐσφράγισεν
  english_pob_choice: has set his seal on
  chosen_spanish: ha sellado
  alternatives_spanish:
  - ha puesto su sello en
  - ha autenticado
  lexicon: BDAG
  rationale: El español puede conservar el verbo metafórico «sellar» sin perder inteligibilidad. «Ha sellado» mantiene la imagen del sello y permite, en lectura teológica, la idea de autorización/autenticación sin explicitarla en el texto principal.
- source_word: ὁ πατὴρ ... ὁ θεός
  english_pob_choice: God the Father
  chosen_spanish: Dios el Padre
  alternatives_spanish:
  - el Padre, Dios
  - el Padre, que es Dios
  lexicon: BDAG
  rationale: La apposición griega identifica al Padre como Dios. «Dios el Padre» conserva esa identificación de modo natural en español y evita la inversión más litúrgica «Dios Padre», que no refleja tan directamente la estructura del original.
theological_decisions:
- issue: Relación entre ὁ πατὴρ y ὁ θεός
  english_pob_reading: for God the Father has set his seal on him
  chosen_spanish_reading: porque a este lo ha sellado Dios el Padre
  alternative_spanish_readings:
  - porque el Padre, Dios, ha puesto su sello en él
  - porque Dios el Padre ha autenticado a este
  rationale: La apposición debe mantenerse sin diluirla. «Dios el Padre» deja claro que el Padre es referido como Dios, sin introducir formulaciones doctrinales ajenas al versículo. Se conserva además la relación con el demostrativo «a este».
  doctrine_reference: Credo Niceno (381); principios de transparencia textual del POB
- issue: Sentido de ἐσφράγισεν respecto del Hijo del Hombre
  english_pob_reading: has set his seal on him
  chosen_spanish_reading: lo ha sellado
  alternative_spanish_readings:
  - ha puesto su sello en él
  - lo ha autenticado
  rationale: Debe mantenerse la metáfora del sello porque el griego la presenta de forma explícita. «Lo ha sellado» preserva la imagen y deja abierta la lectura de autorización/validación sin reducirla a un mero comentario interpretativo.
  doctrine_reference: John 6:27; POB translation philosophy §1 y §6
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa al conservar el imperativo negativo natural y el valor final de εἰς con «para vida eterna». También atiende la observación sobre ἐσφράγισεν manteniendo la metáfora del sello en español, sin resolverla por paráfrasis. No se adoptó una forma más interpretativa para ὁ πατὴρ ... ὁ θεός; se preservó la identificación del Padre con Dios de manera directa y legible.
  spanish_consistency_notes:
  - Se prefirió «alimento» para βρῶσις por consistencia con el registro bíblico y para evitar una lectura excesivamente cotidiana de «comida».
  - «Perece» y «permanece» mantienen el contraste verbal del griego y armonizan con la preferencia POB por transparencia léxica.
  - Se evitó «Cristo» porque el pasaje usa «Hijo del Hombre»; no hay motivo textual para sustituir ese título.
  - El demostrativo «a este» conserva la referencia de τοῦτον sin borrar el enlace discursivo con el sujeto anterior.
