review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: prohibición/contraste («No trabajen ... sino ...»), βρῶσις como «alimento», μένουσαν con «permanece», el título «Hijo del Hombre», y la apposición «Dios el Padre». Sin embargo, hay dos desajustes importantes con la evidencia y el rastro POB: (1) la nota [a] está anclada a «perece», pero el inglés POB documenta la alternativa para la segunda frase («that remains/endures for eternal life»), no para ἀπολλυμένην; (2) «a este lo ha sellado» suena menos natural en español y no expresa tan claramente como el POB la metáfora de autorización; «ha puesto su sello sobre él» preserva mejor la imagen y la legibilidad.'
  spanish_quality_summary: El español es en general claro y digno, pero la nota [a] contiene un error léxico/gramatical («endura» por «dura» o «permanece») y además está ubicada en el lugar equivocado. La cláusula final «porque a este lo ha sellado Dios el Padre» es comprensible, pero resulta algo rígida y menos idiomática que «porque Dios el Padre ha puesto su sello sobre él». También conviene evitar comillas simples innecesarias en la nota [b].
  glossary_alignment: 'La terminología principal está alineada con el proyecto: «Dios», «Hijo del Hombre», y la identificación appositiva del Padre como Dios. No hay conflicto con los glosarios de Yahvé/Mesías/Espíritu. El tratamiento de ἐσφράγισεν debe seguir la decisión POB de preservar la metáfora del sello de forma inteligible en español.'
  issues:
  - severity: high
    issue: La nota [a] está aplicada al término equivocado.
    rationale: El POB inglés pone la alternativa en la segunda βρῶσις/μένουσαν («that endures for eternal life»), no en «that perishes». En español, la nota debe anclarse a «permanece para vida eterna», no a «perece».
  - severity: medium
    issue: La nota [a] contiene una forma incorrecta y un contenido no correspondiente.
    rationale: «endura» no es forma estándar; además la alternativa propuesta («que endura para vida eterna») no corresponde a ἀπολλυμένην sino a μένουσαν. Debe corregirse a algo como «O «que dura para vida eterna»» o equivalente.
  - severity: medium
    issue: «Porque a este lo ha sellado Dios el Padre» es poco natural y menos claro que una formulación con «poner su sello».
    rationale: Aunque «a este» refleja τοῦτον, en español aquí suena forzado. La decisión inglesa documentada privilegia conservar la metáfora de «set his seal on». «Porque Dios el Padre ha puesto su sello sobre él» mantiene mejor la imagen y mejora la legibilidad sin perder referencia.
  - severity: low
    issue: La nota [b] usa puntuación/comillado poco natural.
    rationale: Las comillas simples envolviendo toda la nota no son necesarias. Conviene presentar la aclaración de manera limpia en español editorial.
  revised_spanish_text: No trabajen por el alimento que perece, sino por el alimento que permanece para vida eterna[a], el cual el Hijo del Hombre les dará; porque Dios el Padre ha puesto su sello sobre él[b].
