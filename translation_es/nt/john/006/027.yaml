  to: No trabajen por el alimento que perece, sino por el alimento que permanece para vida eterna[a], el cual el Hijo del Hombre les dará; porque Dios el Padre ha puesto su sello sobre él[b].
  rationale: Se reubica la nota [a] para que corresponda a μένουσαν/«permanece», en línea con el audit trail inglés, y se corrige su redacción. Se revisa la cláusula final para un español más natural y para preservar mejor la metáfora documentada de ἐσφράγισεν («ha puesto su sello sobre él»), manteniendo la apposición «Dios el Padre».
