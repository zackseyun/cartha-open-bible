- from: 'Jesús dijo[a]: «Hagan que la gente se recueste». Había mucha hierba[b] en aquel lugar. Entonces se recostaron los hombres, como cinco mil en número.'
  to: 'Jesús dijo[a]: «Hagan que la gente se recline[b]». Había mucha hierba en el lugar. Entonces se reclinaron[b] los hombres, unos cinco mil en número.'
  rationale: Se corrigió la ubicación y el contenido de la nota [b] para que documente la alternativa léxica real de ἀναπεσεῖν/ἀνέπεσαν, en línea con el audit trail inglés. También se ajustó «en aquel lugar» a «en el lugar» para evitar una deixis añadida no explícita en el griego, y se suavizó la frase numérica a «unos cinco mil en número» para mejor naturalidad sin perder fidelidad.
