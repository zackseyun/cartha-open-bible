translation:
  language: es
  text: 'Jesús dijo[a]: «Hagan que la gente se recline[b]». Había mucha hierba en el lugar. Entonces se reclinaron[b] los hombres, unos cinco mil en número.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego primero dice «la gente» (ἀνθρώπους) y luego «los hombres» (ἄνδρες), lo que indica que el número de unos cinco mil se refiere específicamente a los varones.
    reason: lexical_alternative
  - marker: b
    text: O «se recueste / se recostaron». El verbo griego puede referirse a reclinarse para una comida, aunque también puede expresarse de manera más natural como «sentarse» según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ποιήσατε
  english_pob_choice: Have
  chosen_spanish: Hagan que
  alternatives_spanish:
  - Hagan
  - Hagan sentar
  - Hagan recostarse
  lexicon: BDAG
  rationale: 'El imperativo aoristo con infinitivo complementario expresa causación: no solo ordenar a la multitud, sino hacer que tome la posición indicada. En español, «Hagan que» conserva esa fuerza causativa con naturalidad.'
- source_word: τοὺς ἀνθρώπους
  english_pob_choice: the people
  chosen_spanish: la gente
  alternatives_spanish:
  - las personas
  - la multitud
  - los hombres
  lexicon: BDAG
  rationale: Aquí ἄνθρωπος funciona de manera inclusiva para la multitud en general, no para varones específicamente. «La gente» reproduce bien ese alcance amplio y deja libre la precisión posterior de ἄνδρες.
- source_word: ἀναπεσεῖν / ἀνέπεσαν
  english_pob_choice: recline / reclined
  chosen_spanish: recueste / se recostaron
  alternatives_spanish:
  - se sienten / se sentaron
  - se reclinen / se reclinaron
  - se echen / se echaron
  lexicon: BDAG
  rationale: ἀναπίπτω puede referirse a recostarse o reclinarse, especialmente en contexto de comida. Dado que el inglés auditado corrigió hacia «recline», «recuestarse/recostarse» preserva mejor esa imagen que «sentarse».
- source_word: χόρτος πολὺς
  english_pob_choice: much grass
  chosen_spanish: mucha hierba
  alternatives_spanish:
  - mucho pasto
  - abundante hierba
  - mucho césped
  lexicon: BDAG
  rationale: χόρτος aquí significa hierba/grass. «Mucha hierba» sigue de cerca la referencia léxica y suena natural en español bíblico contemporáneo.
- source_word: ἐν τῷ τόπῳ
  english_pob_choice: in the place
  chosen_spanish: en aquel lugar
  alternatives_spanish:
  - en el lugar
  - allí
  - en ese lugar
  lexicon: BDAG
  rationale: El artículo griego aporta referencia situacional concreta. «Aquel lugar» refleja esa deixis narrativa sin sobreinterpretar el texto.
- source_word: οἱ ἄνδρες
  english_pob_choice: the men
  chosen_spanish: los hombres
  alternatives_spanish:
  - los varones
  - los adultos
  - las personas
  lexicon: BDAG
  rationale: ἄνδρες es masculino específico. «Los hombres» mantiene la distinción señalada en el audit trail frente a τοὺς ἀνθρώπους, que era inclusivo.
- source_word: τὸν ἀριθμὸν ὡς πεντακισχίλιοι
  english_pob_choice: about five thousand in number
  chosen_spanish: como cinco mil en número
  alternatives_spanish:
  - aproximadamente cinco mil
  - unos cinco mil en número
  - alrededor de cinco mil
  lexicon: BDAG
  rationale: ὡς indica aproximación, y τὸν ἀριθμόν explicita la cuenta. «Como cinco mil en número» conserva ambos elementos de manera fiel y legible.
theological_decisions:
- issue: Distinción entre el término inclusivo y el conteo masculino
  english_pob_reading: Differentiate ἀνθρώπους as inclusive 'people' and ἄνδρες as 'men' in the count.
  chosen_spanish_reading: Diferenciar «la gente» para ἀνθρώπους y «los hombres» para ἄνδρες en el conteo.
  alternative_spanish_readings:
  - Traducir ambos términos de forma genérica como «la gente» o «las personas»
  - Usar «los varones» en ambos lugares
  rationale: El griego pasa de un término general a uno masculino específico. Mantener esa variación evita aplanar una diferencia lexical significativa y sigue el principio de precisión de género donde el texto la marca.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4 (Gender-accurate over gender-neutral)
- issue: Valor semántico de ἀναπίπτω en el contexto de la alimentación
  english_pob_reading: The Greek verb can refer to reclining for a meal, but here 'sit down' is used for natural English.
  chosen_spanish_reading: Traducir con lenguaje de recostarse/reclinarse, no con «sentarse».
  alternative_spanish_readings:
  - «Sentarse» por naturalidad moderna
  - «Echarse» para mayor literalidad
  - «Reclinarse» en registro más formal
  rationale: El ajuste editorial inglés revirtió «sit down» hacia «recline» por mayor precisión. En español, «recuestarse/recostarse» conserva la imagen de banquete o comida sin perder inteligibilidad.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 2 (Source-language primacy)
- issue: Elección de tiempo verbal y tono imperativo
  english_pob_reading: Have the people recline.
  chosen_spanish_reading: «Hagan que la gente se recueste».
  alternative_spanish_readings:
  - «Háganlos recostarse»
  - «Ordenen que la gente se recueste»
  - «Hagan recostarse a la gente»
  rationale: La forma escogida expresa mandato y causación de modo claro y natural en español, sin introducir una perífrasis más pesada que el griego no exige.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 1 (Clarity with source fidelity)
translation_notes:
  revision_awareness: El texto inglés auditado pasó de «sit down» a «recline» para reflejar con más precisión ἀναπεσεῖν/ἀνέπεσαν, y de «plenty of grass» a «much grass». La versión española sigue esa revisión al usar un verbo de recostarse/reclinarse y conservar la referencia más literal a la hierba.
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς de manera uniforme.
  - Se usa «la gente» para el término inclusivo ἀνθρώπους y «los hombres» para ἄνδρες, preservando la distinción lexical.
  - No se introduce «Cristo» ni terminología eclesiástica no presente en el verso.
  - «Mucha hierba» conserva la relación semántica con χόρτος sin desplazar el sentido hacia paisaje ornamental moderno.
