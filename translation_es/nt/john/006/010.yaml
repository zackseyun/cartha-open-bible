  text: ⸀εἶπεν ὁ Ἰησοῦς· Ποιήσατε τοὺς ἀνθρώπους ἀναπεσεῖν. ἦν δὲ χόρτος πολὺς ἐν τῷ τόπῳ. ἀνέπεσαν οὖν οἱ ἄνδρες τὸν ἀριθμὸν ⸀ὡς πεντακισχίλιοι.
base_translation:
  language: en
  yaml_path: translation/nt/john/006/010.yaml
  text: Jesus said[a], “Have the people recline.” Now there was much grass in the place. So the men reclined[b], about five thousand in number.
  footnotes:
  - marker: a
    text: Greek first says 'the people' (ἀνθρώπους), then later 'the men' (ἄνδρες), indicating that the count of about five thousand refers specifically to the men.
    reason: lexical_alternative
  - marker: b
    text: Or 'recline.' The Greek verb can refer to reclining for a meal, but here 'sit down' is used for natural English.
    reason: lexical_alternative
