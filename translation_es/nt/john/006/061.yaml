translation:
  language: es
  text: 'Pero Jesús[a], sabiendo en sí mismo que sus discípulos murmuraban acerca de esto, les dijo: «¿Esto los escandaliza?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Esto los hace tropezar?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰδὼς
  english_pob_choice: knowing
  chosen_spanish: sabiendo
  alternatives_spanish:
  - conociendo
  - sabía
  lexicon: BDAG
  rationale: El participio indica conocimiento simultáneo con la acción principal. «Sabiendo» conserva bien ese valor participial en español, de forma natural y sin añadir una relación temporal más fuerte que la del griego.
- source_word: ἐν ἑαυτῷ
  english_pob_choice: in himself
  chosen_spanish: en sí mismo
  alternatives_spanish:
  - dentro de sí
  - interiormente
  lexicon: BDAG
  rationale: La frase señala conocimiento interno, no recibido externamente. «En sí mismo» es fiel, transparente y mantiene la idea de interioridad sin sobreinterpretarla.
- source_word: γογγύζουσιν
  english_pob_choice: were grumbling
  chosen_spanish: murmuraban
  alternatives_spanish:
  - se quejaban
  - refunfuñaban
  lexicon: BDAG
  rationale: El verbo expresa protesta baja y desaprobación contenida. «Murmuraban» conserva ese matiz de murmullo que expresa descontento y evita suavizarlo a una simple queja.
- source_word: περὶ τούτου
  english_pob_choice: about this
  chosen_spanish: acerca de esto
  alternatives_spanish:
  - sobre esto
  - de esto
  lexicon: BDAG
  rationale: La preposición con el demostrativo apunta a lo dicho inmediatamente antes. «Acerca de esto» es natural en español y mantiene la referencia sin añadir contenido interpretativo.
- source_word: οἱ μαθηταὶ αὐτοῦ
  english_pob_choice: his disciples
  chosen_spanish: sus discípulos
  alternatives_spanish:
  - los discípulos de él
  lexicon: BDAG
  rationale: La expresión es idiomática en español y conserva el sentido del grupo de seguidores de Jesús, sin restringirlo artificialmente a un subgrupo.
- source_word: Τοῦτο
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - esta enseñanza
  - este dicho
  lexicon: BDAG
  rationale: El demostrativo queda breve en griego y remite al discurso previo. «Esto» preserva esa deixis sin ampliar indebidamente el referente.
- source_word: σκανδαλίζει
  english_pob_choice: offend
  chosen_spanish: escandaliza
  alternatives_spanish:
  - los hace tropezar
  - los hace caer
  lexicon: BDAG
  rationale: En español, «escandaliza» puede reflejar tanto la ofensa como el tropiezo causado por la palabra de Jesús. Dado que el inglés POB preserva la tensión entre ofensa y tropiezo con nota, el verbo principal mantiene una formulación breve y la nota recoge la alternativa metafórica.
theological_decisions:
- issue: Sentido de σκανδαλίζει en una pregunta sobre la reacción de los discípulos al discurso de Jesús
  english_pob_reading: Does this offend you?
  chosen_spanish_reading: ¿Esto los escandaliza?
  alternative_spanish_readings:
  - ¿Esto los hace tropezar?
  - ¿Esto los ofende?
  rationale: El griego admite tanto la idea de ofensa como la de tropiezo espiritual. «Escandaliza» permite conservar esa ambigüedad significativa en español, sin resolverla prematuramente hacia una sola lectura psicológica o doctrinal.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: preservar la tensión teológica en lugar de resolverla'
- issue: Referencia interna de Jesús al saber de la murmuración
  english_pob_reading: knowing in himself
  chosen_spanish_reading: sabiendo en sí mismo
  alternative_spanish_readings:
  - conociendo en sí mismo
  - sabiendo interiormente
  rationale: La expresión subraya conocimiento interno y no mera inferencia externa. «En sí mismo» mantiene esa interioridad sin convertirla en un comentario explicativo, respetando el modo en que el texto presenta la percepción de Jesús.
  doctrine_reference: Juan 6:61; ver también el patrón narrativo de conocimiento interior en el Evangelio de Juan
translation_notes:
  revision_awareness: El texto base en inglés no requirió cambios posteriores según el registro de revisión más reciente; la redacción española sigue de cerca el griego y preserva la misma alternativa léxica documentada para σκανδαλίζει.
  spanish_consistency_notes:
  - Se mantuvo «Jesús» como nombre propio sin añadir títulos no presentes.
  - Se eligió el imperfecto «murmuraban» para reflejar la acción continua en contexto narrativo.
  - «Esto» se conserva de forma breve para no especificar indebidamente el objeto del señalamiento.
  - La nota al pie mantiene la alternativa principal documentada por el POB inglés sin duplicar marcadores.
