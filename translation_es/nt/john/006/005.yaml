base_translation:
  language: en
  yaml_path: translation/nt/john/006/005.yaml
  text: So Jesus[a], lifting up his eyes and seeing that a large crowd was coming toward him, said to Philip[c][b], “Where are we to buy bread so that these may eat?”
  footnotes:
