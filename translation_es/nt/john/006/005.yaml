translation:
  language: es
  text: 'Entonces Jesús, alzando los ojos y viendo que una gran multitud[a] venía hacia él, dijo a Felipe: «¿Dónde[b] vamos a comprar pan[c] para que ellos coman?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una gran muchedumbre».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «¿De dónde compraremos...?»
    reason: lexical_alternative
  - marker: c
    text: O «panes». El griego puede referirse al pan en general o a panes individuales.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπάρας
  english_pob_choice: lifting up
  chosen_spanish: alzando
  alternatives_spanish:
  - levantando
  - alzando hacia arriba
  lexicon: BDAG
  rationale: El participio aoristo con «los ojos» pide en español una acción idiomática natural; «alzando» conserva el gesto sin calcar de manera pesada el inglés ni perder el valor aspectual.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Entonces
  alternatives_spanish:
  - Así que
  - Por tanto
  lexicon: BDAG
  rationale: Marca continuidad narrativa. «Entonces» fluye bien en español y conserva la inferencia/progresión del relato.
- source_word: τοὺς ὀφθαλμοὺς
  english_pob_choice: his eyes
  chosen_spanish: los ojos
  alternatives_spanish:
  - sus ojos
  lexicon: BDAG
  rationale: En español la posesión ya queda sobrentendida por el sujeto explícito «Jesús»; no hace falta añadir «sus» para expresar la frase con naturalidad.
- source_word: θεασάμενος
  english_pob_choice: seeing
  chosen_spanish: viendo
  alternatives_spanish:
  - observando
  - notando
  lexicon: BDAG
  rationale: El participio expresa percepción visual. «Viendo» es directo y mantiene la secuencia de acciones sin intensificar el matiz más allá del texto.
- source_word: πολὺς ὄχλος
  english_pob_choice: a large crowd
  chosen_spanish: una gran multitud
  alternatives_spanish:
  - una gran muchedumbre
  - una multitud grande
  lexicon: BDAG
  rationale: «Multitud» traduce bien ὄχλος en este contexto y «gran» conserva el énfasis de tamaño. En español suena natural y no pierde la amplitud del grupo.
- source_word: ἔρχεται πρὸς αὐτόν
  english_pob_choice: was coming toward him
  chosen_spanish: venía hacia él
  alternatives_spanish:
  - iba hacia él
  - se acercaba a él
  lexicon: BDAG
  rationale: La imagen de movimiento hacia Jesús se expresa bien con «venía hacia él», que mantiene el sentido direccional de πρός y la progresividad narrativa.
- source_word: λέγει πρὸς Φίλιππον
  english_pob_choice: said to Philip
  chosen_spanish: dijo a Felipe
  alternatives_spanish:
  - les dijo a Felipe
  - dijo hacia Felipe
  lexicon: BDAG
  rationale: El verbo de habla se vierte naturalmente en pasado en español. «A Felipe» comunica el destinatario de πρὸς sin forzar una preposición menos idiomática.
- source_word: Πόθεν
  english_pob_choice: Where are we to
  chosen_spanish: ¿De dónde
  alternatives_spanish:
  - ¿Desde dónde
  - ¿De qué lugar
  lexicon: BDAG
  rationale: La fuerza literal de πόθεν es «de dónde / desde dónde». En español, «¿De dónde compraremos...?» preserva la pregunta por el origen o fuente de provisión.
- source_word: ἀγοράσωμεν
  english_pob_choice: buy
  chosen_spanish: compraremos
  alternatives_spanish:
  - compraríamos
  - debemos comprar
  lexicon: BDAG
  rationale: «Comprar» es el equivalente natural del verbo comercial. El futuro en español reproduce bien la forma deliberativa de la pregunta sin volverla explicativa.
- source_word: ἄρτους
  english_pob_choice: bread
  chosen_spanish: panes
  alternatives_spanish:
  - pan
  - loaves
  lexicon: BDAG
  rationale: Aquí conviene retener el plural concreto de ἄρτους. «Panes» mantiene la referencia a unidades de pan sin perder la posibilidad semántica de alimento básico.
- source_word: ἵνα φάγωσιν
  english_pob_choice: so that these may eat
  chosen_spanish: para que coman
  alternatives_spanish:
  - para que éstos coman
  - a fin de que coman
  lexicon: BDAG
  rationale: «Para que» expresa finalidad con naturalidad en español y conserva el valor de ἵνα. «Coman» mantiene el subjuntivo de propósito.
- source_word: οὗτοι
  english_pob_choice: these
  chosen_spanish: estos
  alternatives_spanish:
  - éstos
  - estas personas
  lexicon: BDAG
  rationale: El demostrativo se traduce con cercanía deíctica. «Estos» conserva la referencia inmediata a la gente presente sin añadir un sustantivo no expresado.
theological_decisions:
- issue: Reproducción del movimiento narrativo y de la pregunta de provisión
  english_pob_reading: 'The English keeps the crowd movement and renders the question naturally: ‘Where are we to buy bread so that these may eat?’'
  chosen_spanish_reading: 'Se conserva el avance narrativo y la pregunta práctica por la provisión: «¿De dónde compraremos panes para que coman estos?»'
  alternative_spanish_readings:
  - «¿Dónde compraremos pan para que éstos coman?»
  - «¿De dónde hemos de comprar panes para que coman estos?»
  rationale: No hay tensión doctrinal aquí; la decisión es de equivalencia estilística. La redacción elegida mantiene el origen de la pregunta en πόθεν y el propósito en ἵνα sin sonar forzada en español.
  doctrine_reference: 'Translation philosophy: optimal equivalence; narrative clarity without flattening the Greek structure.'
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior incorporando todos los marcadores de nota directamente en el texto español: [a], [b] y [c]. La redacción mantiene el flujo narrativo del griego y del POB inglés, pero ahora las notas quedan ancladas exactamente donde corresponden.'
  spanish_consistency_notes:
  - Se usa «Jesús» y «Felipe» como nombres propios estables.
  - «Panes» se mantiene en el texto principal para reflejar ἄρτους; la nota [c] preserva la alternativa semántica de «pan».
  - «Gran multitud» sigue el valor cuantitativo de πολὺς ὄχλος sin preferir un giro arcaico.
  - La estructura «para que coman estos» conserva el demostrativo final sin expandirlo innecesariamente.
