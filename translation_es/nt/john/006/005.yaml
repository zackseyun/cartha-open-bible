review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español conserva bien la secuencia del griego: Jesús alza los ojos, ve que viene una multitud y habla a Felipe. Sin embargo, las notas al pie están desancladas o mal asignadas respecto del texto y del rastro de auditoría inglés. Además, «¿De dónde compraremos panes...?» es comprensible pero suena menos natural en español que una formulación deliberativa equivalente como «¿Dónde vamos a comprar pan...?» o una forma más literal explicada en nota.'
  spanish_quality_summary: 'La redacción general es clara y digna, pero hay problemas de legibilidad y de aparato crítico: [a] está anclada en «Jesús» aunque la nota corresponde a «gran multitud»; [b] está anclada en «multitud» aunque la nota corresponde a «venía hacia él»; [c] está anclada en «Felipe» aunque la nota corresponde a «pan/panes». También conviene evitar «estos» al final sin sustantivo explícito, que en español suena más brusco; «ellos» o «esta gente» sería más natural, pero puede mantenerse «estos» si se prioriza cercanía formal. Mejor aún: «para que ellos coman».'
  glossary_alignment: No hay términos teológicos de proyecto en juego aquí. «Jesús», «Felipe», «pan/panes» y el resto están alineados con la terminología general. La decisión de usar «pan» en el texto principal con nota alternativa «panes» sigue bien el POB inglés y mejora la naturalidad del español.
  issues:
  - severity: high
    issue: Marcadores de notas al pie mal colocados
    rationale: La nota a corresponde a «gran multitud», no a «Jesús»; la nota b corresponde a la frase «venía hacia él», no a «multitud»; la nota c corresponde a «pan/pan(es)», no a «Felipe». Esto incumple el requisito de anclar cada nota exactamente en la palabra o frase pertinente.
  - severity: medium
    issue: Contenido de las notas no refleja fielmente el audit trail inglés
    rationale: La nota a en inglés ofrece alternativa para «a large crowd»; en español debe anclarse a «gran multitud» y no repetir el mismo texto exacto como alternativa. La nota b inglesa explica la literalidad de Πόθεν («From where shall we buy...?»), no «venía hacia él». La nota c inglesa explica «bread/loaves», por lo que debe anclarse a «pan» o «panes».
  - severity: medium
    issue: «¿De dónde compraremos panes...?» es menos idiomático en español
    rationale: Aunque refleja πόθεν, en español suena algo rígido. Una solución óptima es usar una formulación natural en el texto principal («¿Dónde vamos a comprar pan...?») y preservar la literalidad de «De dónde» en una nota, tal como hizo el inglés.
  - severity: low
    issue: Uso final de «estos» sin sustantivo
    rationale: Es posible, pero en español general resulta menos fluido que «ellos» o «esta gente». Dado el tono narrativo moderno-digno del proyecto, «ellos» suena más natural sin perder el referente.
  revised_spanish_text: 'Entonces Jesús, alzando los ojos y viendo que una gran multitud[a] venía hacia él, dijo a Felipe: «¿Dónde[b] vamos a comprar pan[c] para que ellos coman?»'
  revised_footnotes:
  - marker: a
    text: O «una gran muchedumbre».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «¿De dónde compraremos...?»
    reason: lexical_alternative
  - marker: c
    text: O «panes». El griego puede referirse al pan en general o a panes individuales.
    reason: lexical_alternative
  revision_rationale: 'La revisión corrige el problema principal: la ubicación y el contenido de las notas al pie según el rastro de auditoría inglés y el requisito de anclaje exacto. También mejora la naturalidad del español usando «¿Dónde vamos a comprar pan...?», mientras conserva en nota la literalidad de πόθεν. «Pan» como texto principal sigue mejor la decisión del POB inglés, con «panes» como alternativa léxica documentada.'
