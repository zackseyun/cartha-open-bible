translation:
  language: es
  text: 'Y decían: «¿No es este Jesús, el hijo de José, cuyo padre y madre conocemos? ¿Cómo dice ahora: “He bajado del cielo”?»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἔλεγον
  english_pob_choice: they were saying
  chosen_spanish: decían
  alternatives_spanish:
  - estaban diciendo
  - decían continuamente
  lexicon: BDAG
  rationale: El imperfecto griego expresa acción en curso o repetida; en español, «decían» comunica de forma natural esa continuidad sin sobrecargar el texto con una perífrasis innecesaria.
- source_word: Οὐχ οὗτός ἐστιν
  english_pob_choice: Is this not
  chosen_spanish: ¿No es este
  alternatives_spanish:
  - ¿No es este acaso
  - ¿No será este
  lexicon: BDAG
  rationale: La pregunta negativa retórica se vuelve idiomática en español con «¿No es este…?», conservando la expectativa de respuesta afirmativa sin alejarse del valor interrogativo.
- source_word: ὁ υἱὸς Ἰωσήφ
  english_pob_choice: the son of Joseph
  chosen_spanish: el hijo de José
  alternatives_spanish:
  - José hijo
  - el hijo de Joseph
  lexicon: BDAG
  rationale: La construcción titular/genitiva se reproduce de modo transparente. «José» es la forma española normal del nombre propio y mantiene el énfasis en el trasfondo humano conocido de Jesús.
- source_word: οὗ ἡμεῖς οἴδαμεν τὸν πατέρα καὶ τὴν μητέρα
  english_pob_choice: whose father and mother we know
  chosen_spanish: cuyo padre y madre nosotros conocemos
  alternatives_spanish:
  - de quien conocemos al padre y a la madre
  - cuyos padre y madre conocemos
  lexicon: BDAG
  rationale: «Cuyo» preserva la relación posesiva del relativo griego y «nosotros conocemos» mantiene el énfasis de la afirmación del grupo. Se conserva el orden natural del español sin perder la referencia a ambos padres.
- source_word: πῶς νῦν λέγει
  english_pob_choice: How does he now say
  chosen_spanish: ¿Cómo dice ahora
  alternatives_spanish:
  - ¿Cómo puede decir ahora
  - ¿Por qué dice ahora
  lexicon: BDAG
  rationale: «Cómo» refleja el valor básico de πῶς, y el presente «dice» reproduce el tiempo verbal directo del griego. «Ahora» conserva νῦν sin añadir matices modales que no están explícitos.
- source_word: Ἐκ τοῦ οὐρανοῦ
  english_pob_choice: from heaven
  chosen_spanish: del cielo
  alternatives_spanish:
  - desde el cielo
  - del cielo arriba
  lexicon: BDAG
  rationale: En español, «del cielo» expresa de manera natural el origen indicado por ἐκ + genitivo. Se evita una literalidad rígida («desde el cielo») porque aquí «del cielo» es la forma más clara y aceptada.
- source_word: καταβέβηκα
  english_pob_choice: I have come down
  chosen_spanish: He descendido
  alternatives_spanish:
  - He bajado
  - He venido abajo
  lexicon: BDAG
  rationale: El perfecto griego comunica una acción completada con relevancia presente. «He descendido» conserva con mayor precisión la imagen de descenso que «he bajado», y mantiene el registro solemne del dicho citado.
theological_decisions:
- issue: Afirmación de origen celestial de Jesús en la cita del versículo
  english_pob_reading: Retain the literal claim 'I have come down from heaven' without softening it into metaphor or explanatory paraphrase.
  chosen_spanish_reading: Conservar la afirmación literal «He descendido del cielo» sin convertirla en metáfora ni en paráfrasis explicativa.
  alternative_spanish_readings:
  - He venido del cielo
  - Bajé del cielo
  rationale: El versículo presenta el tropiezo de la multitud ante la afirmación de procedencia celestial de Jesús. La traducción mantiene esa tensión sin resolverla, para que el lector reciba el alcance teológico del enunciado tal como está en el texto.
  doctrine_reference: 'Affirmations: Credo Niceno (381 d. C.); principio de la traducción PO B de preservar la tensión teológica en lugar de resolverla'
- issue: Forma de la cita en estilo directo dentro de una reacción de la multitud
  english_pob_reading: Quoted speech is presented plainly and directly, preserving the crowd’s challenge.
  chosen_spanish_reading: Presentar el dicho en estilo directo, con la objeción de la multitud claramente audible.
  alternative_spanish_readings:
  - 'Estilo indirecto: que había descendido del cielo'
  - Paráfrasis explicativa de la objeción
  rationale: La escena depende del contraste entre la pregunta escéptica y la afirmación de Jesús. Mantener la cita directa preserva el choque retórico y no atenúa la fuerza de la acusación implícita.
  doctrine_reference: Juan 6:42 en su contexto narrativo; principio PO B de fidelidad al discurso directo
translation_notes:
  revision_awareness: No se detectan revisiones aplicadas en el pasaje base; el texto inglés final fue revisado y aprobado sin cambios, con alto acuerdo entre revisores, por lo que la versión española sigue de cerca esa lectura estable.
  spanish_consistency_notes:
  - Se usa «Jesús» para Ἰησοῦς y «José» para Ἰωσήφ, conforme al uso español estándar y al criterio de transliteración del proyecto.
  - Se mantiene «cielo» para οὐρανός en este contexto cristológico, ya que el habla apunta al origen celestial de Jesús y no a un sentido meteorológico o espacial simple.
  - Se conserva el estilo directo con comillas angulares españolas para una presentación publicable y legible.
  - No se introducen notas al pie porque el texto griego y la lectura inglesa no requieren variantes textuales ni ambigüedades suplementarias en este versículo.
