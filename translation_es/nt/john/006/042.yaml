review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del griego: imperfecto «decían», pregunta retórica negativa «¿No es este…?», la cláusula relativa sobre el padre y la madre, y la objeción a la afirmación de origen celestial. Sin embargo, en la cita directa «He descendido del cielo» no sigue la decisión auditada del POB inglés para καταβέβηκα, que prefirió «I have come down» en vez de «I have descended» por estilo joánico e idiomaticidad. En español, «he bajado del cielo» o «he venido del cielo» serían más naturales que «he descendido del cielo», y «he bajado» preserva mejor la idea verbal de descenso sin sonar rígido.'
  spanish_quality_summary: 'El español es claro y digno, pero tiene dos puntos mejorables: «cuyo padre y madre nosotros conocemos» suena algo pesado por el orden marcado de «nosotros», y «He descendido del cielo» suena más técnico y menos natural en español bíblico contemporáneo. Una revisión menor puede hacer el texto más fluido sin perder precisión.'
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto: «Jesús», «José» y «cielo» están bien. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. La principal divergencia es estilístico-lexical respecto a la rationale documentada para καταβέβηκα.'
  issues:
  - severity: medium
    issue: «He descendido del cielo» es demasiado rígido para καταβέβηκα en este contexto.
    rationale: La auditoría inglesa justificó «I have come down» frente a «I have descended» por idiomaticidad y estilo joánico. En español, «he descendido» también resulta más duro y menos natural que «he bajado», sin ganar fidelidad real.
  - severity: low
    issue: «cuyo padre y madre nosotros conocemos» tiene énfasis algo forzado.
    rationale: Aunque gramaticalmente correcto y fiel, la posición de «nosotros» suena menos natural en español corriente. «cuyo padre y madre conocemos» mantiene el sentido; si se desea conservar énfasis, podría hacerse en nota o con contexto, pero aquí no es necesario.
  revised_spanish_text: 'Y decían: «¿No es este Jesús, el hijo de José, cuyo padre y madre conocemos? ¿Cómo dice ahora: “He bajado del cielo”?»'
  revision_rationale: Se ajusta καταβέβηκα a una expresión española más natural y alineada con la decisión auditada del POB de evitar una formulación excesivamente formal. También se alisa la cláusula relativa suprimiendo un «nosotros» innecesariamente marcado, sin pérdida semántica relevante.
