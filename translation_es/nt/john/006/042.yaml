revisions:
- from: 'Y decían: «¿No es este Jesús, el hijo de José, cuyo padre y madre nosotros conocemos? ¿Cómo dice ahora: “He descendido del cielo”?»'
  to: 'Y decían: «¿No es este Jesús, el hijo de José, cuyo padre y madre conocemos? ¿Cómo dice ahora: “He bajado del cielo”?»'
  rationale: Se ajusta καταβέβηκα a una expresión española más natural y alineada con la decisión auditada del POB de evitar una formulación excesivamente formal. También se alisa la cláusula relativa suprimiendo un «nosotros» innecesariamente marcado, sin pérdida semántica relevante.
