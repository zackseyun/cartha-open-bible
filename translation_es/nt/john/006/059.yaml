  to: Estas cosas dijo mientras enseñaba en la sinagoga en Capernaúm.
  rationale: Se revisa 'Esto' a 'Estas cosas' para preservar el plural de ταῦτα conforme a la evidencia griega y la decisión léxica del English POB. También se ajusta el cierre a 'en la sinagoga en Capernaúm' para reflejar más directamente los dos complementos locativos con ἐν del original.
