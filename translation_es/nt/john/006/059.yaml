translation:
  language: es
  text: Estas cosas dijo mientras enseñaba en la sinagoga en Capernaúm.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: esto
  alternatives_spanish:
  - estas cosas
  - estas palabras
  lexicon: BDAG
  rationale: El griego neutro plural remite al discurso precedente como conjunto. En español, 'esto' puede resumir con naturalidad el contenido sin forzar un plural poco idiomático; 'estas cosas' mantiene más explícitamente la referencia plural, pero suena más pesado en esta frase breve.
- source_word: εἶπεν
  english_pob_choice: He said
  chosen_spanish: dijo
  alternatives_spanish:
  - Jesús dijo
  - habló
  lexicon: BDAG
  rationale: El aoristo de λέγω se rinde de forma directa con 'dijo'. El sujeto está implícito en el griego y en el contexto es Jesús; en español se puede omitir el sujeto explícito para mantener la fluidez y la concisión del original.
- source_word: ἐν συναγωγῇ
  english_pob_choice: in the synagogue
  chosen_spanish: en la sinagoga
  alternatives_spanish:
  - en una sinagoga
  - en la sinagoga
  lexicon: BDAG
  rationale: Aunque falta el artículo en griego, el contexto local hace que el referente sea definido. 'En la sinagoga' conserva la naturalidad del español y la lectura contextual definida; 'en una sinagoga' introduciría una indefinición no sugerida por el pasaje.
- source_word: διδάσκων
  english_pob_choice: while teaching
  chosen_spanish: mientras enseñaba
  alternatives_spanish:
  - enseñando
  - así enseñando
  lexicon: BDAG
  rationale: El participio presente expresa acción simultánea con el verbo principal. En español, 'mientras enseñaba' comunica con claridad esa simultaneidad y suena más natural que un calco participial aislado.
- source_word: Καφαρναούμ
  english_pob_choice: Capernaum
  chosen_spanish: Capernaúm
  alternatives_spanish:
  - Cafarnaúm
  lexicon: BDAG
  rationale: Se conserva el topónimo bíblico con transliteración usual en español. 'Capernaúm' sigue la forma estándar y evita una sustitución por una forma menos extendida o menos consistente con el uso bíblico.
translation_notes:
  revision_awareness: La versión griega y el audit trail inglés concuerdan plenamente; no hay variantes textuales ni decisiones teológicas adicionales que reflejar.
  spanish_consistency_notes:
