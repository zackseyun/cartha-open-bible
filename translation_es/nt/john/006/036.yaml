translation:
  language: es
  text: Pero les dije que hasta me han visto[a], y sin embargo no creen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O más formalmente: «Pero les dije que de hecho me han visto, y sin embargo no creen».'
    reason: alternativa_lexica
lexical_decisions:
- source_word: ἀλλ’
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sin embargo
  - No obstante
  lexicon: BDAG
  rationale: Marca contraste con la declaración anterior; «Pero» es el adversativo más natural y breve en español aquí.
- source_word: εἶπον
  english_pob_choice: I told
  chosen_spanish: les dije
  alternatives_spanish:
  - les he dicho
  - les hablaba
  lexicon: BDAG
  rationale: El aoristo de λέγω remite a una declaración ya hecha a los oyentes; en español, «les dije» comunica bien esa referencia pasada y resulta idiomático en el discurso directo.
- source_word: ὑμῖν
  english_pob_choice: you
  chosen_spanish: les
  alternatives_spanish:
  - a ustedes
  - a vosotros
  lexicon: BDAG
  rationale: 'El dativo de destinatario queda absorbido de manera natural por el clítico de objeto indirecto en español: «les dije».'
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - —
  lexicon: BDAG
  rationale: Introduce el contenido de lo dicho; «que» es el complemento más natural en español.
- source_word: καὶ ἑωράκατέ με
  english_pob_choice: you have even seen me
  chosen_spanish: incluso me han visto
  alternatives_spanish:
  - y me han visto
  - de hecho me han visto
  lexicon: BDAG
  rationale: Se preserva la fuerza enfática de καί con «incluso», y el perfecto de ὁράω con «han visto», que mantiene la relevancia presente del acto. El orden «me han visto» evita un calco duro y sigue la fluidez del español.
- source_word: οὐ πιστεύετε
  english_pob_choice: you do not believe
  chosen_spanish: no creen
  alternatives_spanish:
  - no creen en mí
  - no tienen fe
  lexicon: BDAG
  rationale: πιστεύω en Juan se rinde normalmente por «creer»; en español, el verbo puede ir sin complemento explícito cuando el objeto está claro por contexto. Aquí «no creen» mantiene la brevedad y el paralelismo con la constatación de incredulidad.
theological_decisions:
- issue: Valor de καὶ antes de ἑωράκατέ με
  english_pob_reading: 'Render with concessive emphasis: ''you have even seen me'''
  chosen_spanish_reading: «incluso me han visto»
  alternative_spanish_readings:
  - «y me han visto»
  - «de hecho me han visto»
  rationale: La primera καί no añade simplemente otra acción; subraya lo sorprendente de que, a pesar de haberlo visto, no creen. «Incluso» conserva ese énfasis sin convertirlo en una paráfrasis doctrinal.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Relación entre ver a Jesús y creer
  english_pob_reading: and yet you do not believe
  chosen_spanish_reading: «y aun así no creen»
  alternative_spanish_readings:
  - «y sin embargo no creen»
  - «pero no creen»
  rationale: El segundo miembro mantiene el contraste retórico entre haberlo visto y no creer. «Aun así» preserva esa tensión de manera natural en español, sin suavizarla ni explicarla en exceso.
  doctrine_reference: 'Contested terms: πίστις; Translation philosophy §5'
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa al conservar ambas cláusulas coordinadas y reflejar la fuerza enfática de καί con un equivalente español explícito («incluso»), evitando una paráfrasis concesiva más libre. No se introducen notas porque el español puede expresar la alternancia sin ambigüedad adicional.
  spanish_consistency_notes:
  - Se usó «creer» para πιστεύω conforme al uso joánico, en lugar de «tener fe» o «confiar».
  - Se prefirió «han visto» para mantener el valor de perfecto del griego y su relevancia presente.
  - No se empleó «Cristo» ni terminología eclesiástica ajena al versículo.
  - La puntuación reproduce el contraste final con una sola oración de dos miembros coordinados.
