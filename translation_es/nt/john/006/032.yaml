translation:
  language: es
  text: 'Entonces Jesús les dijo: «En verdad, en verdad les digo: Moisés no les ha dado el pan del cielo[a], sino que mi Padre les da el verdadero pan del cielo[b]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no fue Moisés quien les dio el pan del cielo». El griego coloca la negación antes de «Moisés», haciendo especialmente prominente el contraste de agencia.'
    reason: lexical_alternative
  - marker: b
    text: '«Verdadero» también puede entenderse como «real» o «genuino»: el pan definitivo del cielo, no simplemente el maná anterior como señal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Entonces
  alternatives_spanish:
  - Así que
  - Por tanto
  lexicon: BDAG
  rationale: Marca la continuidad discursiva con lo anterior. «Entonces» conserva la transición natural en español sin forzar una conclusión lógica más fuerte de la que exige el contexto.
- source_word: Ἀμὴν ἀμὴν
  english_pob_choice: Truly, truly
  chosen_spanish: De cierto, de cierto
  alternatives_spanish:
  - Amén, amén
  - En verdad, en verdad
  lexicon: BDAG
  rationale: La fórmula joánica doble exige una expresión solemne y repetida. «De cierto, de cierto» es idiomática en español bíblico amplio y mantiene la fuerza enfática sin traducir mecánicamente el préstamo litúrgico.
- source_word: λέγω ὑμῖν
  english_pob_choice: I say to you
  chosen_spanish: les digo
  alternatives_spanish:
  - les hablo
  - les digo a ustedes
  lexicon: BDAG
  rationale: Reproduce el valor directo del dicho introductorio. El pronombre clítico verbal es natural en español y preserva el destinatario plural.
- source_word: οὐ Μωϋσῆς ⸀δέδωκεν ὑμῖν
  english_pob_choice: Moses has not given you
  chosen_spanish: no fue Moisés quien les dio
  alternatives_spanish:
  - Moisés no les dio
  - No les dio Moisés
  lexicon: BDAG
  rationale: El griego coloca la negación antes de «Moisés», destacando la agencia. En español, la construcción escindida «no fue Moisés quien...» conserva mejor ese contraste que una simple negación verbal.
- source_word: τὸν ἄρτον ἐκ τοῦ οὐρανοῦ
  english_pob_choice: the bread from heaven
  chosen_spanish: el pan del cielo
  alternatives_spanish:
  - el pan del cielo
  - el pan desde el cielo
  lexicon: BDAG
  rationale: «Del cielo» es la forma más natural y fiel para ἐκ τοῦ οὐρανοῦ en este giro bíblico. Mantiene la imagen de procedencia sin sonar artificial.
- source_word: ἀλλ’ ὁ πατήρ μου δίδωσιν ὑμῖν
  english_pob_choice: but my Father gives you
  chosen_spanish: sino que mi Padre les da
  alternatives_spanish:
  - pero mi Padre les da
  - sino que mi Padre les está dando
  lexicon: BDAG
  rationale: «Sino que» corresponde bien al contraste fuerte con la negación anterior. El presente «da» preserva la forma verbal de δίδωσιν como acción vigente en el discurso.
- source_word: ὁ πατήρ μου
  english_pob_choice: my Father
  chosen_spanish: mi Padre
  alternatives_spanish:
  - el Padre mío
  - el Padre de mí
  lexicon: BDAG
  rationale: Es la manera natural de expresar la relación filial de Jesús en español, sin perder la posesión explícita del griego.
- source_word: τὸν ἀληθινόν
  english_pob_choice: the true
  chosen_spanish: el verdadero
  alternatives_spanish:
  - el auténtico
  - el genuino
  lexicon: BDAG
  rationale: «Verdadero» conserva el valor de ἀληθινός como lo real, definitivo y plenamente correspondiente a la realidad divina frente al pan anterior como figura o signo. En español, «verdadero» comunica mejor esa carga que «real» en este contexto.
theological_decisions:
- issue: 'Contraste de agente: Moisés vs. el Padre'
  english_pob_reading: The negation before 'Moses' makes the contrast in agency especially prominent.
  chosen_spanish_reading: 'La negación se expresa con una construcción enfática: «no fue Moisés quien les dio...», para resaltar que la provisión no se atribuye a Moisés sino al Padre.'
  alternative_spanish_readings:
  - Moisés no les dio el pan del cielo
  - No les dio Moisés el pan del cielo
  rationale: El sentido teológico no es solo negar una acción pasada, sino reposicionar al verdadero dador del pan. La estructura escindida en español mantiene esa prominencia de la agencia sin añadir explicación extra al cuerpo del texto.
  doctrine_reference: Juan 6:32; traducción con atención a énfasis de agencia
- issue: Sentido de ἀληθινός aplicado al pan
  english_pob_reading: '''True bread'' can also mean ''real'' or ''genuine'' bread—the ultimate bread from heaven, not merely the earlier manna as a sign.'
  chosen_spanish_reading: Se conserva «verdadero pan» en el texto principal para mantener la tensión entre el pan como realidad definitiva y el maná como figura.
  alternative_spanish_readings:
  - pan real
  - pan genuino
  - pan definitivo
  rationale: «Verdadero» permite leer el adjetivo en sentido joánico de realidad plena, no solo de corrección factual. Así se conserva la relación tipológica con el maná sin expandir el verso más allá de lo que el griego dice.
  doctrine_reference: Uso joánico de ἀληθινός; Juan 6
- issue: Tiempo verbal del presente δίδωσιν
  english_pob_reading: The present tense δίδωσιν is significant in contrast to the earlier perfect.
  chosen_spanish_reading: Se usa «da» para reflejar una acción presente y vigente del Padre.
  alternative_spanish_readings:
  - está dando
  - da ahora
  rationale: El presente simple en español comunica adecuadamente la entrega actual sin sobreinterpretar una progresividad aspectual que el contexto no exige explícitamente.
  doctrine_reference: Juan 6:32; contraste aspectual
translation_notes:
  revision_awareness: Revisado contra el texto griego SBLGNT y el audit trail inglés. La versión española conserva el énfasis de agencia en la primera cláusula, la continuidad presente de δίδωσιν y la carga joánica de ἀληθινός sin importar formulaciones tradicionales ajenas al expediente.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el Tetragrámaton.
  - Se mantiene «Jesús» para Ἰησοῦς y «Padre» con mayúscula por referencia a Dios.
  - «Pan del cielo» conserva la metáfora bíblica estándar y evita paráfrasis como «alimento celestial» que debilitarían el vínculo con el maná.
  - La construcción «no fue Moisés quien...» se eligió por fidelidad al orden enfático del griego, no por estilo meramente literario.
