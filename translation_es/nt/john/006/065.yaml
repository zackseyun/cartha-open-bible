  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: imperfecto discursivo, conexión causal, perfecto con vigencia presente, incapacidad para venir a Jesús, y condición pasiva ligada al Padre. Sin embargo, el punto principal a corregir es ἐκ τοῦ πατρός, que en la evidencia fuente y en el rastro inglés se reconoce primariamente como procedencia/origen («from the Father»), con «by the Father» solo como ajuste de estilo inglés. En español, «por el Padre» desplaza demasiado el sentido hacia agencia y no preserva tan bien la preposición griega.'
  spanish_quality_summary: El español es claro y digno, pero «Y estaba diciendo» suena algo más pesado de lo necesario; «Y decía» conserva mejor el imperfecto y fluye de modo más natural en español bíblico contemporáneo. También conviene ajustar la nota [a] porque, si se adopta «decía», ya no corresponde justificar «estaba diciendo». El resto del verso es legible y fiel.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. «Padre» y «Jesús/yo» están bien manejados por contexto. La decisión «concedido» es aceptable para δεδομένον, pero debe combinarse con «del Padre» para respetar mejor ἐκ. El manejo de αὐτῷ con «le» es adecuado en español.
  issues:
