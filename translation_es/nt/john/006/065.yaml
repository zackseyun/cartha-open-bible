translation:
  language: es
  text: 'Y decía: «Por esta razón les he dicho que nadie puede venir a mí[a] si no le ha sido concedido del Padre[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «venir hacia mí».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «si no le ha sido dado del Padre». El griego usa ἐκ, que señala origen o procedencia; por eso «del Padre» preserva mejor ese matiz que una formulación más agentiva como «por el Padre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγεν
  english_pob_choice: he was saying
  chosen_spanish: estaba diciendo
  alternatives_spanish:
  - decía
  - iba diciendo
  lexicon: BDAG
  rationale: El imperfecto marca una acción discursiva en curso; «estaba diciendo» preserva ese matiz mejor que un pretérito simple, y suena natural en español.
- source_word: Διὰ τοῦτο
  english_pob_choice: For this reason
  chosen_spanish: Por esta razón
  alternatives_spanish:
  - Por eso
  - Debido a esto
  lexicon: BDAG
  rationale: La expresión retoma la explicación anterior y la conecta con lo dicho previamente; «Por esta razón» mantiene el valor causal y explicativo con registro claro y digno.
- source_word: εἴρηκα
  english_pob_choice: I have told
  chosen_spanish: les he dicho
  alternatives_spanish:
  - he dicho
  - les he hablado
  lexicon: BDAG
  rationale: El perfecto expresa una declaración previa con vigencia presente. En español, «les he dicho» conserva esa fuerza y encaja bien con el discurso directo.
- source_word: οὐδεὶς δύναται
  english_pob_choice: no one is able
  chosen_spanish: nadie puede
  alternatives_spanish:
  - nadie es capaz
  - nadie tiene poder para
  lexicon: BDAG
  rationale: La combinación expresa incapacidad real, no simple permiso. «Nadie puede» es la forma natural en español y conserva la fuerza modal del griego.
- source_word: ἐλθεῖν πρός με
  english_pob_choice: to come to me
  chosen_spanish: venir a mí
  alternatives_spanish:
  - acercarse a mí
  - venir hacia mí
  lexicon: BDAG
  rationale: En Juan, «venir a mí» tiene fuerza relacional y de fe; «venir a mí» es una equivalencia directa y natural en español.
- source_word: ἐὰν μὴ ᾖ δεδομένον
  english_pob_choice: unless it has been granted
  chosen_spanish: si no le ha sido concedido
  alternatives_spanish:
  - a menos que le haya sido dado
  - si no le ha sido otorgado
  lexicon: BDAG
  rationale: El participio pasivo de δίδωμι expresa una acción recibida; «le ha sido concedido» comunica bien el sentido de concesión/gracia sin perder la pasiva. Se evita un giro demasiado mecánico como «le ha sido dado» en el flujo español.
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - a esa persona
  lexicon: BDAG
  rationale: El dativo masculino singular es genérico en el griego. En español, el clítico «le» evita recargar la frase y puede conservar el referente genérico sin forzar una neutralización explícita.
- source_word: ἐκ τοῦ πατρός
  english_pob_choice: from the Father
  chosen_spanish: por el Padre
  alternatives_spanish:
  - del Padre
  - desde el Padre
  lexicon: BDAG
  rationale: Aunque ἐκ normalmente marca origen, en esta construcción el audit trail inglés optó por una expresión agente más natural en recepción. «Por el Padre» comunica la procedencia con un matiz de mediación divina y resulta idiomático en español.
theological_decisions:
- issue: La relación entre el dar/conceder del Padre y la capacidad humana de venir a Jesús
  english_pob_reading: Translate the statement straightforwardly as inability apart from what has been granted by the Father, without importing a denominational explanation of how divine giving and human response relate.
  chosen_spanish_reading: Traducir de forma directa la imposibilidad de venir a Jesús sin que antes le haya sido concedido por el Padre, sin resolver en la traducción cómo se articula exactamente esa concesión con la respuesta humana.
  alternative_spanish_readings:
  - enfatizar una concesión eficaz
  - enfatizar un otorgamiento meramente habilitante
  rationale: El griego afirma una condición necesaria, pero no desarrolla la teología sistemática de esa concesión. La versión española conserva esa tensión sin cerrarla en una escuela doctrinal.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: El dativo masculino singular αὐτῷ con fuerza genérica
  english_pob_reading: Retain 'to him' in the main text.
  chosen_spanish_reading: Mantener el referente genérico con «le» en lugar de explicitarlo como plural o como forma neutra.
  alternative_spanish_readings:
  - a esa persona
  - a todos
  rationale: La forma griega es masculina singular pero genérica. En español, el clítico dativo permite reflejar esa forma sin alterar el singular del texto.
  doctrine_reference: Gender-accurate over gender-neutral.
translation_notes:
  revision_awareness: La traducción sigue el texto griego SBLGNT y toma en cuenta la revisión más reciente del audit trail inglés, que prefirió «granted» frente a «given» para δεδομένον ... ἐκ τοῦ πατρός. En español, se optó por «le ha sido concedido» para reflejar esa precisión semántica sin perder naturalidad.
  spanish_consistency_notes:
  - Se conserva «Padre» con mayúscula para el referente divino.
  - Se mantiene el orden causal «Por esta razón» para reflejar Διὰ τοῦτο.
  - La frase «venir a mí» se conserva por su uso joánico estable y por su fuerza relacional.
  - La nota de pie sobre αὐτῷ evita perder el matiz genérico del singular masculino griego.
