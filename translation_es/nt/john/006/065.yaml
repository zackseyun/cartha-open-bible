revisions:
- from: Y estaba diciendo[a], «Por esta razón les he dicho que nadie puede venir a mí[b] si no le ha sido concedido por el Padre[c]».
  to: 'Y decía: «Por esta razón les he dicho que nadie puede venir a mí[a] si no le ha sido concedido del Padre[b]».'
  rationale: Se revisa para alinear mejor ἐκ τοῦ πατρός con un español de procedencia («del Padre») en vez de una lectura principalmente agentiva («por el Padre»). También se mejora la naturalidad del imperfecto con «decía», que sigue siendo fiel al griego sin la pesadez de «estaba diciendo». Se conservan «les he dicho», «nadie puede venir a mí» y «le ha sido concedido» por su fidelidad y buena legibilidad.
