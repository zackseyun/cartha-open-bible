    issue: «por el Padre» para ἐκ τοῦ πατρός
    rationale: ἐκ señala fuente/procedencia; «por» en español se oye principalmente agentivo. Dado que el propio rastro inglés documenta «from the Father» como la opción léxicamente preferible, el español debe reflejarlo con «del Padre».
  - severity: low
    issue: «Y estaba diciendo» suena menos natural que «Y decía»
    rationale: Ambas pueden reflejar el imperfecto, pero «decía» es más idiomático y suficientemente fiel al aspecto imperfectivo en este contexto discursivo.
  - severity: low
