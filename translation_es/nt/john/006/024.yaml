translation:
  language: es
  text: Así que, cuando la multitud vio que Jesús no estaba allí, ni sus discípulos, ellos mismos subieron a las barcas[a] y fueron a Cafarnaúm, buscando a Jesús.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «barquitas» o «barcas pequeñas»; el griego usa una forma diminutiva para «barcas».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτε οὖν
  english_pob_choice: So when
  chosen_spanish: Así que, cuando
  alternatives_spanish:
  - Cuando, pues
  - Entonces, cuando
  lexicon: BDAG
  rationale: Combina el valor temporal de ὅτε con el matiz continuativo/inferencial de οὖν en un español natural. «Así que» conserva la conexión narrativa sin sonar forzado, y «cuando» mantiene la relación temporal.
- source_word: ὁ ὄχλος
  english_pob_choice: the crowd
  chosen_spanish: la multitud
  alternatives_spanish:
  - la gente
  - el gentío
  lexicon: BDAG
  rationale: ὄχλος designa un grupo reunido de personas; «multitud» comunica bien ese sentido en español bíblico contemporáneo y evita un tono demasiado coloquial.
- source_word: εἶδεν
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - se dio cuenta de
  - notó
  lexicon: BDAG
  rationale: 'El verbo básico es visual: la multitud «vio» que Jesús no estaba allí. «Se dio cuenta de» introduciría una inferencia más fuerte que la del griego y de la traducción inglesa auditada.'
- source_word: οὐκ ἔστιν ἐκεῖ
  english_pob_choice: was not there
  chosen_spanish: no estaba allí
  alternatives_spanish:
  - no está allí
  lexicon: BDAG
  rationale: El griego usa presente en narración vívida, pero en español el pretérito imperfecto («no estaba allí») reproduce naturalmente la escena pasada sin perder el sentido.
- source_word: οὐδὲ οἱ μαθηταὶ αὐτοῦ
  english_pob_choice: nor his disciples
  chosen_spanish: ni sus discípulos
  alternatives_spanish:
  - y tampoco sus discípulos
  lexicon: BDAG
  rationale: «Ni» conserva la coordinación negativa compacta del griego y de la versión inglesa; «sus discípulos» mantiene la referencia directa al antecedente Jesús.
- source_word: ἐνέβησαν
  english_pob_choice: got into
  chosen_spanish: subieron a
  alternatives_spanish:
  - se embarcaron en
  - entraron en
  lexicon: BDAG
  rationale: ἐμβαίνω puede significar subir o embarcarse en una embarcación. En español, «subieron a» refleja de manera natural el acto de entrar en una barca o bote.
- source_word: τὰ πλοιάρια
  english_pob_choice: the boats
  chosen_spanish: las barcas[b]
  alternatives_spanish:
  - las barquitas[b]
  - las barcas pequeñas[b]
  lexicon: BDAG
  rationale: πλοιάρια es un diminutivo. «Barcas» es la forma natural en español, y el diminutivo se preserva en la nota para no sobrecargar el texto principal; en el texto, la elección evita un calco artificial.
- source_word: ἦλθον εἰς Καφαρναούμ
  english_pob_choice: came to Capernaum
  chosen_spanish: fueron a Cafarnaúm
  alternatives_spanish:
  - vinieron a Cafarnaúm
  lexicon: BDAG
  rationale: Aunque el verbo puede traducirse «vinieron», en español narrativo «fueron a» resulta más natural desde el punto de vista del movimiento de la multitud. «Cafarnaúm» es la forma castellana usual del topónimo.
- source_word: ζητοῦντες τὸν Ἰησοῦν
  english_pob_choice: looking for Jesus
  chosen_spanish: buscando a Jesús
  alternatives_spanish:
  - en busca de Jesús
  - tratando de encontrar a Jesús
  lexicon: BDAG
  rationale: ζητέω aquí expresa búsqueda concreta para encontrar a alguien. «Buscando a Jesús» es idiomático y fiel, sin cargar el verbo con un matiz devocional que el contexto inmediato no exige.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacía falta cambiar el borrador anterior; esta redacción mantiene ese acuerdo alto con el texto griego y con el análisis auditado en inglés, incorporando la observación sobre el diminutivo de πλοιάρια mediante nota.
  spanish_consistency_notes:
  - Se usa «Jesús» de manera uniforme para Ἰησοῦς.
  - Se mantiene «Cafarnaúm» como topónimo español estándar.
  - Se evita «SEÑOR» porque el versículo no contiene κύριος ni referencia al nombre divino.
  - Se conserva una sintaxis narrativa fluida en español, sin perder la relación temporal-inferencial de ὅτε οὖν.
