review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia y el sentido general del griego: la multitud observa la ausencia de Jesús y de sus discípulos, aborda las embarcaciones y va a Cafarnaúm buscándolo. Sin embargo, la nota [a] está mal anclada y comenta «allí» cuando la nota inglesa auditada corresponde a τὰ πλοιάρια, el diminutivo «barcas/barquitas». Además, el énfasis de αὐτοὶ está bien conservado con «ellos mismos».'
  spanish_quality_summary: 'El español es claro y legible, con tono bíblico moderno adecuado. «Así que, cuando» funciona, aunque algo cargado; no requiere cambio. «La multitud», «no estaba allí», «ellos mismos», «fueron a Cafarnaúm» y «buscando a Jesús» son naturales. El principal problema es editorial: una nota innecesaria y desalineada en «allí».'
  glossary_alignment: No hay términos del glosario mayor en disputa aquí. «Jesús» y «discípulos» están correctos. La decisión de usar «barcas» con nota sobre el diminutivo concuerda con el rastro POB inglés. No hay cuestiones teológicas sensibles.
  issues:
  - severity: medium
    issue: La nota [a] está colocada en «allí» pero el audit trail inglés la asigna al diminutivo de τὰ πλοιάρια.
    rationale: 'La nota inglesa dice: «Or ''the small boats'' or ''the little boats''; the Greek uses a diminutive form for ''boats.''» El borrador introduce una nota sobre ἐκεῖ («allí») que no corresponde a ninguna nota preservada ni a una ambigüedad nueva necesaria en español.'
  - severity: low
    issue: Hay dos notas donde solo una es necesaria.
    rationale: El texto español ya traduce correctamente ἐκεῖ sin requerir nota. Mantener solo la nota del diminutivo mejora la limpieza editorial y la fidelidad al expediente inglés.
  revised_spanish_text: Así que, cuando la multitud vio que Jesús no estaba allí, ni sus discípulos, ellos mismos subieron a las barcas[a] y fueron a Cafarnaúm, buscando a Jesús.
  revised_footnotes:
