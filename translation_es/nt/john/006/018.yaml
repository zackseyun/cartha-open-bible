translation:
  language: es
  text: Y el mar se estaba agitando[a] porque soplaba un viento fuerte[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se estaba agitando intensamente» o «se levantaba». El verbo griego imperfecto describe un proceso continuo que afectaba al mar.'
    reason: lexical_alternative
  - marker: b
    text: Lit. «un gran viento». En este contexto, «viento fuerte» expresa de manera más natural en español la intensidad de μέγας sin añadir la idea de «violento».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἥ τε θάλασσα
  english_pob_choice: And the sea
  chosen_spanish: Y el mar
  alternatives_spanish:
  - Y el mar de Galilea
  - Y el lago
  lexicon: θάλασσα
  rationale: θάλασσα designa aquí el cuerpo de agua conocido en el contexto, pero el griego usa el sustantivo común. En español, «mar» mantiene la referencia al agua extensa y conserva la conexión con la traducción inglesa sin forzar un nombre propio que el texto griego no da.
- source_word: ἀνέμου μεγάλου
  english_pob_choice: a strong wind
  chosen_spanish: un gran viento
  alternatives_spanish:
  - un viento fuerte
  - un viento violento
  lexicon: ἄνεμος + μέγας
  rationale: ἄνεμος es «viento» y μέγας aporta intensidad. «Gran viento» conserva la literalidad básica de μέγας; «fuerte» sería idiomático, pero «gran» mantiene mejor el enlace con la forma griega y con la decisión inglesa de no sobrerinterpretar como «violento».
- source_word: πνέοντος
  english_pob_choice: was blowing
  chosen_spanish: soplaba
  alternatives_spanish:
  - estaba soplando
  - estaba haciendo viento
  lexicon: πνέω
  rationale: El participio presente expresa una acción en curso que da la circunstancia causal. «Soplaba» comunica el aspecto continuo de manera natural en español y conserva la relación causal sin añadir elementos ajenos.
- source_word: διεγείρετο
  english_pob_choice: was being stirred up
  chosen_spanish: se iba agitando
  alternatives_spanish:
  - era agitado
  - se agitaba
  - se alzaba
  lexicon: διεγείρω
  rationale: El imperfecto pasivo describe un proceso en desarrollo sobre el mar. «Se iba agitando» refleja bien esa progresión y la pasividad del sujeto. «Se agitaba» sería posible, pero la perífrasis destaca mejor el avance del efecto; «se alzaba» se acerca demasiado a «rising», una alternativa que el POB inglés consideró pero no eligió.
translation_notes:
  revision_awareness: El texto inglés auditado no requirió revisiones en el último pase y mostró alta concordancia en la verificación cruzada; esta versión española sigue esa lectura sin introducir cambios de sentido.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico moderno y sobrio.
  - No se introduce «SEÑOR» ni otra sustitución convencional, porque el versículo no contiene el nombre divino.
  - «Mar» conserva la imagen básica del griego θάλασσα sin añadir especificación geográfica al cuerpo del texto.
  - La progresión imperfectiva se expresa con una forma continua en español para reflejar el proceso del verso.
