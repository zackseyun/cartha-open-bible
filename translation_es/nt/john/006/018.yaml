  rationale: Se ajusta «gran viento» a «viento fuerte» para reflejar mejor la decisión léxica del POB y la idiomaticidad del español. Se simplifica el versículo eliminando una nota innecesaria sobre «mar». Se revisa la nota de διεγείρετο para preservar mejor las alternativas documentadas en inglés y se usa «se estaba agitando» como formulación más transparente del proceso en curso.
