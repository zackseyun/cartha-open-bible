translation:
  language: es
  text: Y subieron a una barca y iban al otro lado del mar, hacia Cafarnaúm[a]. Ya se había hecho de noche[b], y Jesús aún no había venido a ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a través del mar». El griego puede expresar el cruce hacia la ribera opuesta.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «ya había caído la oscuridad» o «ya había oscurecido».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμβάντες εἰς πλοῖον
  english_pob_choice: They got into a boat
  chosen_spanish: habiendo entrado en una barca
  alternatives_spanish:
  - después de subir a una barca
  - habiendo subido a una barca
  lexicon: BDAG
  rationale: El participio aoristo expresa una acción previa al verbo principal; en español, un gerundio absoluto o una construcción participial con 'habiendo' comunica bien esa anterioridad. 'Barca' es más natural que 'barco' en este contexto y mantiene el tamaño implícito del πλοῖον.
- source_word: ἤρχοντο
  english_pob_choice: were heading
  chosen_spanish: iban
  alternatives_spanish:
  - se dirigían
  - estaban yendo
  lexicon: BDAG
  rationale: El imperfecto debe conservar la acción en curso. 'Iban' es conciso y reproduce el movimiento continuo sin sobrecargar el español con una perífrasis menos natural.
- source_word: πέραν τῆς θαλάσσης
  english_pob_choice: across the sea
  chosen_spanish: hacia el otro lado del mar
  alternatives_spanish:
  - a la otra orilla del mar
  - al otro lado del mar
  lexicon: BDAG
  rationale: '''Πέραν'' con genitivo expresa cruce o dirección al lado opuesto. ''Hacia el otro lado del mar'' conserva la idea de travesía y evita perder el matiz direccional. Se mantiene ''mar'' porque el griego usa θάλασσα.'
- source_word: εἰς Καφαρναούμ
  english_pob_choice: to Capernaum
  chosen_spanish: a Cafarnaúm
  alternatives_spanish:
  - hacia Cafarnaúm
  lexicon: BDAG
  rationale: Se translitera el nombre propio en forma habitual en español. 'A' expresa el destino de manera directa y natural.
- source_word: σκοτία ἤδη ἐγεγόνει
  english_pob_choice: it had already become dark
  chosen_spanish: Ya se había hecho de noche
  alternatives_spanish:
  - ya había oscurecido
  - ya era de noche
  lexicon: BDAG
  rationale: La forma pluperfecta pide una traducción que preserve un estado resultante de un cambio previo. 'Se había hecho de noche' comunica ese tránsito mejor que un simple estado estático. 'Noche' funciona como equivalente idiomático de la oscuridad del contexto.
- source_word: οὔπω ἐληλύθει πρὸς αὐτοὺς
  english_pob_choice: had not yet come to them
  chosen_spanish: aún no había venido a ellos
  alternatives_spanish:
  - todavía no había llegado a ellos
  - aún no se había acercado a ellos
  lexicon: BDAG
  rationale: '''Venir a ellos'' reproduce de cerca πρὸς αὐτούς sin sobreinterpretar. ''Aún'' sostiene la negación temporal de οὔπω.'
- source_word: ὁ Ἰησοῦς
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  lexicon: BDAG
  rationale: Nombre propio estándar en español.
theological_decisions:
- issue: Preservar la secuencia narrativa y la tensión temporal
  english_pob_reading: 'The verse is rendered to preserve the sequence: they got into the boat, were crossing toward Capernaum, darkness had already come, and Jesus had not yet come to them.'
  chosen_spanish_reading: 'La traducción conserva el orden de los hechos: entran en la barca, se dirigen al otro lado, ya ha caído la noche y Jesús todavía no ha venido a ellos.'
  alternative_spanish_readings:
  - se subieron a una barca y cruzaban hacia Cafarnaúm
  - ya estaba oscuro y Jesús no había llegado todavía
  rationale: No hay un crux doctrinal, pero sí una progresión narrativa importante. Mantener la anterioridad, el movimiento en curso y la demora de Jesús ayuda a preservar la tensión del relato sin añadir interpretación.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: El audit trail inglés pasó de una solución más pesada para el participio aoristo a una forma más fluida; la versión española adopta una construcción igualmente natural ('habiendo entrado') que conserva la anterioridad. También se mantiene el matiz aspectual del imperfecto y del pluperfecto conforme a la revisión más reciente, sin cambios sustanciales de sentido.
  spanish_consistency_notes:
  - Se usa 'Cafarnaúm' para el topónimo, coherente con transliteración estándar en español.
  - Se conserva 'barca' por naturalidad contextual en un relato lacustre; 'barco' sería demasiado moderno o grande para el pasaje.
  - '''Mar'' mantiene la designación del griego θάλασσα; no se sustituye por ''lago'' sin respaldo explícito del texto fuente.'
  - '''Venido a ellos'' refleja la proximidad relacional de πρὸς αὐτούς sin introducir ''reunirse'' ni ''llegar'' como interpretación más específica.'
