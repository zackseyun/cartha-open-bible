translation:
  language: es
  text: Entonces, cuando ya habían remado como veinticinco o treinta estadios[a], vieron a Jesús caminando sobre el mar y acercándose a la barca[b], y tuvieron miedo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Un estadio era una unidad antigua de distancia; veinticinco o treinta estadios equivalen aproximadamente a tres o cuatro millas (aproximadamente cinco o seis kilómetros).
    reason: cultural_note
  - marker: b
    text: 'O: «sobre el agua». El griego dice literalmente «sobre el mar».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐληλακότες
  english_pob_choice: had rowed
  chosen_spanish: habían remado
  alternatives_spanish:
  - habían ido
  - habían avanzado
  lexicon: BDAG
  rationale: En contexto náutico, el participio perfecto expresa una acción previa completada; «habían remado» comunica con naturalidad el movimiento de la barca por fuerza humana, sin perder el sentido de ἐλαύνω en este uso marítimo.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - por tanto
  - entonces
  lexicon: BDAG
  rationale: Marca continuidad narrativa e inferencia. «Así que» es una conexión natural en español y conserva el avance del relato sin elevar innecesariamente el tono.
- source_word: ὡς
  english_pob_choice: about
  chosen_spanish: como
  alternatives_spanish:
  - aproximadamente
  - unos
  lexicon: BDAG
  rationale: Con una medida, ὡς expresa aproximación. «Como» funciona idiomáticamente en español y deja claro que la cifra es estimada.
- source_word: σταδίους εἴκοσι πέντε ἢ τριάκοντα
  english_pob_choice: twenty-five or thirty stadia
  chosen_spanish: veinticinco o treinta estadios
  alternatives_spanish:
  - unos tres o cuatro millas
  - veinticinco o treinta furlongs
  lexicon: BDAG
  rationale: Se conserva la unidad antigua para mantener transparencia respecto del texto fuente. La equivalencia moderna se reserva para nota, como en el audit trail inglés.
- source_word: θεωροῦσιν
  english_pob_choice: they saw
  chosen_spanish: vieron
  alternatives_spanish:
  - observaban
  - divisaron
  lexicon: BDAG
  rationale: Aunque θεωρέω puede sugerir observación atenta, aquí la narración requiere una percepción directa y sencilla. «Vieron» es fiel y natural.
- source_word: περιπατοῦντα ἐπὶ τῆς θαλάσσης
  english_pob_choice: walking on the sea
  chosen_spanish: caminando sobre el mar
  alternatives_spanish:
  - caminando sobre el mar
  - caminando sobre el agua
  lexicon: BDAG
  rationale: Se mantiene «mar» para reflejar θαλάσσης y no suavizar el efecto literal del pasaje. «Sobre el mar» suena más directo que una paráfrasis como «por encima del agua».
- source_word: ἐγγὺς τοῦ πλοίου γινόμενον
  english_pob_choice: coming near the boat
  chosen_spanish: acercándose a la barca
  alternatives_spanish:
  - llegando cerca de la barca
  - poniéndose cerca de la barca
  lexicon: BDAG
  rationale: γίνομαι con ἐγγύς expresa movimiento hacia la proximidad. «Acercándose» preserva esa progresión y «barca» encaja mejor que «barco» en el contexto galileo.
- source_word: πλοίου
  english_pob_choice: boat
  chosen_spanish: barca
  alternatives_spanish:
  - barco
  - embarcación
  lexicon: BDAG
  rationale: En este contexto de pesca en el lago, «barca» comunica mejor el tamaño y el entorno que «barco».
- source_word: ἐφοβήθησαν
  english_pob_choice: they were afraid
  chosen_spanish: tuvieron miedo
  alternatives_spanish:
  - estaban asustados
  - se asustaron
  lexicon: BDAG
  rationale: La reacción narrada se expresa de manera clara y contemporánea con «tuvieron miedo». Mantiene el valor afectivo sin sobreinterpretar el matiz del aoristo.
theological_decisions:
- issue: Conservar el sentido literal del milagro sin rebajarlo a una escena ambigua
  english_pob_reading: walking on the sea
  chosen_spanish_reading: caminando sobre el mar
  alternative_spanish_readings:
  - caminando por la orilla del mar
  - caminando sobre el agua
  rationale: El griego dice literalmente que Jesús camina sobre la θάλασσα. «Caminando sobre el mar» preserva el carácter extraordinario del relato y evita atenuarlo con una lectura espacial ordinaria.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: El pasaje muestra alto acuerdo con la revisión más reciente del texto fuente y del auditor en inglés; no se detectaron cambios necesarios en la lectura base. Se conservó la transparencia lexical de «estadios» y la literalidad de «sobre el mar», con ajuste natural al español para la progresión verbal y la referencia a la embarcación.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «Mesías» solo cuando el término aparece en el fuente; aquí no corresponde.
  - Se eligió «barca» por consistencia contextual en narraciones galileas y para evitar el matiz excesivamente grande de «barco».
  - Se evitó «SEÑOR» o una glosa interpretativa porque el versículo no contiene κύριος ni una cita del nombre divino.
