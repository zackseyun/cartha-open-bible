  text: ἐληλακότες οὖν ὡς σταδίους εἴκοσι πέντε ἢ τριάκοντα θεωροῦσιν τὸν Ἰησοῦν περιπατοῦντα ἐπὶ τῆς θαλάσσης καὶ ἐγγὺς τοῦ πλοίου γινόμενον, καὶ ἐφοβήθησαν.
base_translation:
  language: en
  yaml_path: translation/nt/john/006/019.yaml
  text: So when they had rowed about twenty-five or thirty stadia[a], they saw Jesus walking on the sea and coming near the boat[b], and they were afraid.
  footnotes:
  - marker: a
    text: A stadion was an ancient unit of distance; twenty-five or thirty stadia is roughly three to four miles (about five to six kilometers).
    reason: cultural_note
  - marker: b
    text: Or 'walking on the water.' The Greek literally says 'walking on the sea.'
    reason: lexical_alternative
