translation:
  language: es
  text: 'Entonces ellos le dijeron[a]: «¿Qué debemos hacer para hacer las obras de Dios?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Qué debemos hacer para que podamos trabajar las obras de Dios?» El griego también puede entenderse como «las obras que Dios requiere».'
    reason: alternative_reading
lexical_decisions:
- source_word: εἶπον
  english_pob_choice: they said
  chosen_spanish: dijeron
  alternatives_spanish:
  - hablaron
  - contestaron
  lexicon: BDAG
  rationale: El aoristo de λέγω se expresa naturalmente en español con el pasado simple narrativo «dijeron». «Contestaron» añadiría matiz de respuesta que el griego no exige.
- source_word: οὖν
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - pues
  - así que
  lexicon: BDAG
  rationale: οὖν marca continuidad discursiva; «Entonces» mantiene el flujo narrativo sin forzar una conclusión lógica más fuerte de la que el contexto requiere.
- source_word: πρὸς αὐτόν
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - hacia él
  lexicon: BDAG
  rationale: Con un verbo de habla, πρός + acusativo funciona idiomáticamente como dirección del habla. En español, el dativo clítico «le» suena natural y conserva la referencia sin redundancia.
- source_word: Τί
  english_pob_choice: What
  chosen_spanish: ¿Qué
  alternatives_spanish:
  - ¿Cuál?
  - ¿Por qué?
  lexicon: BDAG
  rationale: 'El interrogativo neutro pide la acción requerida: «¿Qué?», no una explicación causal.'
- source_word: ποιῶμεν
  english_pob_choice: must we do
  chosen_spanish: debemos hacer
  alternatives_spanish:
  - deberíamos hacer
  - hemos de hacer
  lexicon: BDAG
  rationale: La pregunta deliberativa expresa qué acción se requiere. «Debemos hacer» comunica bien esa fuerza en español sin sobrecargar el modal.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el fin de que
  lexicon: BDAG
  rationale: ἵνα introduce finalidad; «para que» es la equivalencia española más natural y clara.
- source_word: ἐργαζώμεθα
  english_pob_choice: we may work
  chosen_spanish: podamos trabajar
  alternatives_spanish:
  - podamos hacer
  - estemos trabajando
  lexicon: BDAG
  rationale: ἐργάζομαι significa trabajar, llevar a cabo, hacer. «Podamos trabajar» conserva el verbo de trabajo y mantiene la conexión léxica con ἔργα.
- source_word: τὰ ἔργα
  english_pob_choice: the works
  chosen_spanish: las obras
  alternatives_spanish:
  - las obras hechas
  - las tareas
  lexicon: BDAG
  rationale: En español, «obras» transmite mejor que «trabajos» el sustantivo ἔργα en este contexto teológico y preserva la repetición semántica con el verbo anterior.
- source_word: τοῦ θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - que Dios requiere
  - pertenecientes a Dios
  lexicon: BDAG
  rationale: Se mantiene el genitivo abierto como «de Dios», sin resolver si son obras de Dios, para Dios, o requeridas por Dios.
theological_decisions:
- issue: Ambigüedad del genitivo en τὰ ἔργα τοῦ θεοῦ
  english_pob_reading: Retain the literal phrase 'the works of God' without resolving whether it means works God requires or works that belong to/come from God.
  chosen_spanish_reading: Mantener «las obras de Dios» sin aclarar si se trata de obras que Dios requiere, que pertenecen a Dios o que proceden de Dios.
  alternative_spanish_readings:
  - las obras que Dios requiere
  - las obras de Dios mismo
  rationale: El griego deja abierta la relación del genitivo, y el contexto cercano aprovecha esa ambigüedad. La traducción conserva esa tensión sin interpretarla de antemano.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador de nota [a] aparezca explícitamente en el texto traducido.
  spanish_consistency_notes:
  - Se usó «Dios» para θεοῦ, conforme al estándar del proyecto.
  - Se prefirió «obras» para ἔργα para mantener la repetición léxica con ἐργαζώμεθα.
  - Se evitó resolver la ambigüedad del genitivo para respetar el audit trail en inglés.
