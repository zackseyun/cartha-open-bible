  glossary_alignment: 'No hay conflictos con la terminología del proyecto: θεοῦ se traduce correctamente como «Dios» y se conserva la ambigüedad teológica documentada. La única mejora propuesta es de naturalidad idiomática en español, no de terminología doctrinal.'
