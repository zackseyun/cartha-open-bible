translation:
  language: es
  text: Pero esto lo decía para probarlo[a], porque él mismo sabía qué iba a hacer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para tentarlo»; el verbo puede significar también «tentar», pero aquí el sentido es de prueba o examen.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦτο
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - esto mismo
  - aquello
  lexicon: BDAG
  rationale: El demostrativo neutro acusa una referencia inmediata a lo dicho antes; «esto» es natural en español y conserva la deixis directa.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: «Pero» refleja el leve giro o contraste narrativo sin cargar el verso con solemnidad artificial.
- source_word: ἔλεγεν
  english_pob_choice: was saying
  chosen_spanish: lo decía
  alternatives_spanish:
  - decía
  - estaba diciendo
  lexicon: BDAG
  rationale: El imperfecto indica acción en curso; «lo decía» transmite esa continuidad de forma natural en español.
- source_word: πειράζων
  english_pob_choice: to test
  chosen_spanish: para probar
  alternatives_spanish:
  - para poner a prueba
  - para tentar
  lexicon: BDAG
  rationale: En este contexto la acción es examinar o poner a prueba, no inducir al mal. «Probar» conserva la posible amplitud del verbo y evita cerrar la tensión lexical demasiado pronto.
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  - al mismo
  lexicon: BDAG
  rationale: El objeto directo masculino singular referido a Felipe se expresa de manera sobria con «lo»; el referente inmediato queda claro por el contexto.
- source_word: αὐτὸς
  english_pob_choice: he himself
  chosen_spanish: él mismo
  alternatives_spanish:
  - él
  lexicon: BDAG
  rationale: El pronombre explícito es enfático; «él mismo» preserva ese énfasis sin volverlo explicativo de más.
- source_word: ᾔδει
  english_pob_choice: knew
  chosen_spanish: sabía
  alternatives_spanish:
  - conocía
  - había sabido
  lexicon: BDAG
  rationale: El verbo de saber expresa conocimiento ya poseído; «sabía» es el equivalente más natural y mantiene el valor estativo del griego.
- source_word: τί
  english_pob_choice: what
  chosen_spanish: qué
  alternatives_spanish:
  - lo que
  - cuál
  lexicon: BDAG
  rationale: La interrogativa neutra introduciendo el contenido del conocimiento se vierte de modo idiomático como «qué».
- source_word: ἔμελλεν ποιεῖν
  english_pob_choice: was about to do
  chosen_spanish: iba a hacer
  alternatives_spanish:
  - estaba a punto de hacer
  - pensaba hacer
  lexicon: BDAG
  rationale: μέλλω con infinitivo apunta a acción inminente o prevista. «Iba a hacer» conserva la anticipación sin decidir en exceso entre inminencia e intención.
theological_decisions:
- issue: Sentido de πειράζων aplicado a Jesús
  english_pob_reading: Rendered as 'to test' rather than 'to tempt.'
  chosen_spanish_reading: «para probarlo» en vez de «para tentarlo»
  alternative_spanish_readings:
  - para ponerlo a prueba
  - para tentarlo
  rationale: El contexto inmediato muestra una prueba/examen de la fe o comprensión de Felipe, no una incitación al pecado. La traducción debe conservar esa tensión semántica y evitar una lectura moralmente engañosa.
  doctrine_reference: Preservar la tensión lexical sin resolverla por tradición eclesiástica; primacía del sentido contextual del texto original.
- issue: Énfasis en el conocimiento previo de Jesús
  english_pob_reading: Retained emphatic 'he himself knew.'
  chosen_spanish_reading: «él mismo sabía»
  alternative_spanish_readings:
  - sabía
  - él sabía
  rationale: El pronombre enfático αὐτός aporta relieve a la afirmación de conocimiento previo. «Él mismo sabía» mantiene ese énfasis de manera natural en español.
  doctrine_reference: Primacía del texto original; no expandir la afirmación más allá de lo que el verso dice, pero tampoco diluir su énfasis.
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no hubo cambios sustantivos y el consenso de auditoría es alto; se mantuvo el matiz imperfectivo de ἔλεγεν, el valor adverbial de πειράζων y el énfasis de αὐτός.'
  spanish_consistency_notes:
  - Se mantiene «probar» para πειράζων, conforme al uso POB de evitar «tentar» cuando el contexto no implica incitación al mal.
  - Se conserva el sujeto enfático con «él mismo» para αὐτὸς.
  - Se vierte μέλλω con «iba a» para no sobrecargar el verso con una interpretación de intención frente a inminencia.
  - La puntuación reproduce una cláusula principal seguida de explicación causal, en paralelo al griego y al POB inglés.
