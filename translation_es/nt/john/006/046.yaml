  glossary_alignment: No hay choque con términos troncales del glosario salvo la necesidad de alinear παρὰ τοῦ θεοῦ con la decisión POB «from God» en el texto principal. «Dios» y «Padre» están bien. No hay términos como Yahvé/Mesías/esclavo implicados aquí.
