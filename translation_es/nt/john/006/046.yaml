translation:
  language: es
  text: No es que alguien haya visto al Padre[a], excepto el que es de Dios; él ha visto al Padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desde la presencia de Dios» o «con Dios». La expresión griega puede llevar un matiz de proximidad personal además de procedencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐχ ὅτι
  english_pob_choice: Not that
  chosen_spanish: No que
  alternatives_spanish:
  - No es que
  - No porque
  lexicon: BDAG
  rationale: En español, «No que» introduce bien una aclaración correctiva sin volver causal la cláusula. Mantiene la fuerza de matiz respecto de la afirmación anterior, de modo semejante al inglés POB «Not that».
- source_word: τὸν πατέρα
  english_pob_choice: the Father
  chosen_spanish: el Padre
  alternatives_spanish:
  - al Padre
  - el Padre celestial
  lexicon: BDAG
  rationale: Se conserva el uso joánico/titular de «Padre» para Dios. No se añade un calificativo como «celestial» porque el griego no lo expresa.
- source_word: ἑώρακέν τις
  english_pob_choice: anyone has seen
  chosen_spanish: alguien haya visto
  alternatives_spanish:
  - nadie ha visto
  - cualquiera haya visto
  lexicon: BDAG
  rationale: El perfecto de ὁράω comunica una visión con relevancia presente; en español, el subjuntivo en una construcción negativa e indefinida transmite mejor el sentido que un presente perfecto literal. Se evita «nadie ha visto» para no borrar la estructura de excepción del griego.
- source_word: εἰ μὴ
  english_pob_choice: except
  chosen_spanish: sino
  alternatives_spanish:
  - excepto
  - salvo
  lexicon: BDAG
  rationale: En este contexto, εἰ μὴ marca excepción. «Sino» es idiomático y claro en español, y conserva la oposición correctiva del verso.
- source_word: ὁ ὢν
  english_pob_choice: the one who is
  chosen_spanish: el que está
  alternatives_spanish:
  - el que es
  - el que permanece
  lexicon: BDAG
  rationale: El participio sustantivado indica identificación por relación continua. «El que está» comunica en español una presencia/relación activa sin sonar forzado; «el que es» podría resultar demasiado abstracto.
- source_word: παρὰ τοῦ θεοῦ
  english_pob_choice: from God
  chosen_spanish: junto a Dios
  alternatives_spanish:
  - de parte de Dios
  - con Dios
  - desde Dios
  lexicon: BDAG
  rationale: παρά con genitivo puede expresar procedencia y también cercanía o presencia personal. El inglés POB conserva en nota la posibilidad espacial/personal; en español, «junto a Dios» preserva esa tensión sin decidirla solo por origen. No se usa «de Dios» porque podría perder la matiz relacional.
- source_word: οὗτος
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - este
  - este mismo
  lexicon: BDAG
  rationale: Como en el inglés POB, el demostrativo se resuelve naturalmente como pronombre personal en español. El énfasis queda retenido por la estructura del período y por la repetición final.
- source_word: ἑώρακεν
  english_pob_choice: has seen
  chosen_spanish: ha visto
  alternatives_spanish:
  - vio
  lexicon: BDAG
  rationale: El perfecto griego se rinde mejor con el pretérito perfecto compuesto español, que expresa acción completada con vigencia presente.
theological_decisions:
- issue: 'Nuance de παρὰ τοῦ θεοῦ: origen, presencia o compañía'
  english_pob_reading: from God
  chosen_spanish_reading: junto a Dios
  alternative_spanish_readings:
  - de parte de Dios
  - con Dios
  - desde Dios
  rationale: El inglés POB conserva la posibilidad de una cercanía personal además del origen. En español, «junto a Dios» protege esa ambigüedad productiva y no reduce el griego a una sola idea de procedencia. La frase sigue afirmando la relación única del Hijo con el Padre sin sobre-explicar metafísica.
  doctrine_reference: Translation philosophy §§1, 3; afirmaciones cristológicas joánicas
- issue: Estructura correctiva de la primera cláusula
  english_pob_reading: Not that anyone has seen the Father, except...
  chosen_spanish_reading: No que alguien haya visto al Padre, sino...
  alternative_spanish_readings:
  - No es que alguien haya visto al Padre, sino...
  - No porque alguien haya visto al Padre, sino...
  rationale: La formulación mantiene que el texto no niega la visión del Padre en abstracto, sino que corrige la idea previa mediante una excepción. Esto evita convertir la frase en una simple negación absoluta y respeta el valor discursivo del griego.
  doctrine_reference: John 6:46; sintaxis de excepción
translation_notes:
  revision_awareness: La versión sigue de cerca el audit trail inglés y conserva la tensión lexical de παρὰ τοῦ θεοῦ en la nota, mientras usa un español natural. No se hicieron cambios respecto de la lectura base del paquete fuente; se optó por un subjuntivo español para ἑώρακέν τις porque la negación y la indefinición lo favorecen en castellano.
  spanish_consistency_notes:
  - Se mantiene «Padre» con mayúscula como título divino/joánico.
  - Se traduce el perfecto griego con pretérito perfecto compuesto cuando el contexto lo pide.
  - Se evita «SEÑOR» para el nombre divino porque aquí no aparece κύριος ni יהוה.
  - Se conserva la distinción entre negación correctiva («No que... sino...») y negación absoluta.
