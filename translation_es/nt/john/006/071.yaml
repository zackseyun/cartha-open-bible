translation:
  language: es
  text: Estaba hablando de Judas[a], hijo de Simón Iscariote; porque él, uno de los Doce, estaba por traicionarlo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «entregarlo».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγεν
  english_pob_choice: was speaking
  chosen_spanish: estaba hablando
  alternatives_spanish:
  - decía
  - estaba diciendo
  lexicon: BDAG
  rationale: El imperfecto expresa una acción discursiva en curso; «estaba hablando» comunica mejor el carácter explicativo del narrador que un simple «decía», y evita una literalidad extraña en español.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y
  - Pero
  lexicon: BDAG
  rationale: Aquí δέ funciona como transición suave. «Ahora» conserva ese enlace discursivo sin forzar contraste.
- source_word: τὸν Ἰούδαν
  english_pob_choice: about Judas
  chosen_spanish: de Judas
  alternatives_spanish:
  - acerca de Judas
  - sobre Judas
  lexicon: BDAG
  rationale: Con λέγω en esta aclaración narrativa, el español natural requiere expresar el referente del discurso como «de Judas»; así se evita una construcción rígida y se conserva el sentido explicativo.
- source_word: Σίμωνος Ἰσκαριώτου
  english_pob_choice: the son of Simon Iscariot
  chosen_spanish: hijo de Simón Iscariote
  alternatives_spanish:
  - hijo de Simón, el Iscariote
  - Simón Iscariote, su padre
  lexicon: BDAG
  rationale: Los dos genitivos identifican a Judas por filiación paterna. «Hijo de Simón Iscariote» refleja la relación sin confundir a Iscariote con Judas mismo.
- source_word: οὗτος
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - este
  - este hombre
  lexicon: BDAG
  rationale: El demostrativo griego tiene fuerza referencial, pero en español una repetición enfática como «este» sonaría marcada. «Él» mantiene la referencia clara y natural en la narración.
- source_word: ἔμελλεν
  english_pob_choice: was about to
  chosen_spanish: estaba por
  alternatives_spanish:
  - iba a
  - estaba destinado a
  lexicon: BDAG
  rationale: μέλλω expresa inminencia o futuro cercano. «Estaba por» reproduce bien esa proximidad sin añadir matices de destino o intención no explicitados por el texto.
- source_word: παραδιδόναι αὐτόν
  english_pob_choice: betray him
  chosen_spanish: traicionarlo
  alternatives_spanish:
  - entregarlo
  - ponerlo en manos de otros
  lexicon: BDAG
  rationale: En el contexto joánico de la pasión, παραδίδωμι aplicado a Judas designa la traición. «Traicionarlo» capta la carga relacional y narrativa; «entregarlo» queda como alternativa más literal pero menos explícita en español.
- source_word: εἷς ἐκ τῶν δώδεκα
  english_pob_choice: one of the Twelve
  chosen_spanish: uno de los Doce
  alternatives_spanish:
  - uno de los doce
  - miembro de los Doce
  lexicon: BDAG
  rationale: La frase appositiva subraya la ironía de que el traidor pertenece al grupo apostólico. «Los Doce» es la forma establecida en español para el grupo, y conserva ese valor colectivo.
theological_decisions:
- issue: παραδιδόναι aplicado a Judas
  english_pob_reading: betray him
  chosen_spanish_reading: traicionarlo
  alternative_spanish_readings:
  - entregarlo
  - cederlo
  rationale: Se mantiene la tensión lexical del griego en el marco narrativo de la pasión. Traducirlo como «traicionar» expresa la responsabilidad moral de Judas sin resolver el verbo hacia una lectura puramente técnica de «entregar».
  doctrine_reference: Lexical-contextual; no doctrinal resolution of παραδίδωμι.
translation_notes:
  revision_awareness: La tradición auditada en inglés osciló entre una formulación más literal («hand him over») y otra más interpretativa («betray him»). La versión española adopta «traicionarlo» como equivalente óptimo en contexto, manteniendo la alternativa más literal en nota para no borrar la tensión lexical de παραδίδωμι.
  spanish_consistency_notes:
  - Se usa «Doce» con mayúscula para el grupo apostólico, conforme al uso eclesial y al contexto joánico.
  - Se prefiere «Yahvé» cuando aparezca el nombre divino, pero este versículo no lo contiene.
  - No se introduce «Cristo» ni otras fórmulas confesionales ajenas al pasaje.
  - La puntuación separa la cláusula causal con punto y coma para reflejar la claridad explicativa del griego.
