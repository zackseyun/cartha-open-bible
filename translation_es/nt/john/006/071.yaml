  - severity: low
    issue: «Ahora» suena algo mecánico como equivalente de δέ
    rationale: No es incorrecto, pero en este contexto explicativo puede fluir mejor sin «Ahora». Aun así, no es un error grave; el ajuste principal es la estructura de la cláusula final.
