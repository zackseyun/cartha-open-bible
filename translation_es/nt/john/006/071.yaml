- from: Ahora estaba hablando de Judas[a], hijo de Simón Iscariote; porque él estaba por traicionarlo, uno de los Doce.
  to: Estaba hablando de Judas[a], hijo de Simón Iscariote; porque él, uno de los Doce, estaba por traicionarlo.
  rationale: Se elimina «Ahora» para un arranque más natural en español y se reubica «uno de los Doce» como aposición de «él», lo que preserva el énfasis del griego y evita una frase final colgante. Se mantiene la nota léxica sobre «entregarlo» porque refleja correctamente la alternativa literal de παραδιδόναι.
