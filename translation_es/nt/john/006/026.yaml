translation:
  language: es
  text: 'Jesús les respondió: «En verdad, en verdad les digo: ustedes me buscan no porque vieron señales, sino porque comieron de los panes[a] y quedaron saciados.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ustedes me buscan ... porque comieron de los panes y quedaron satisfechos». El griego dice más literalmente «de los panes» y usa un verbo que puede significar «fueron saciados» o «quedaron satisfechos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη αὐτοῖς ὁ Ἰησοῦς καὶ εἶπεν
  english_pob_choice: Jesus answered them
  chosen_spanish: Jesús les respondió
  alternatives_spanish:
  - Jesús les contestó
  - Jesús respondió y dijo
  lexicon: BDAG
  rationale: Se conserva el valor narrativo normal de ἀποκρίνομαι como ‘responder’. En español, ‘les respondió’ introduce con naturalidad la cita directa; ‘respondió y dijo’ reproduce más literalmente la duplicación griega, pero suena más pesada. ‘Contestó’ es posible, aunque algo menos solemne.
- source_word: Ἀμὴν ἀμὴν
  english_pob_choice: Truly, truly
  chosen_spanish: En verdad, en verdad
  alternatives_spanish:
  - Amén, amén
  - Verdaderamente, verdaderamente
  lexicon: BDAG
  rationale: Se preserva la fórmula solemne joánica con una equivalencia natural en español. ‘Amén, amén’ mantiene la transliteración, pero resulta menos transparente para lectores generales; ‘verdaderamente’ es correcto, pero ‘en verdad’ conserva mejor el tono enfático y bíblico sin sonar arcaico.
- source_word: λέγω ὑμῖν
  english_pob_choice: I say to you
  chosen_spanish: les digo
  alternatives_spanish:
  - les digo a ustedes
  - yo les digo
  lexicon: BDAG
  rationale: El pronombre indirecto ‘les’ expresa claramente el dativo plural. ‘Les digo’ es la forma más natural en español; el sujeto explícito ‘yo’ no es necesario y vuelve la frase más pesada.
- source_word: ζητεῖτέ με
  english_pob_choice: you are seeking me
  chosen_spanish: ustedes me buscan
  alternatives_spanish:
  - ustedes me están buscando
  - ustedes me andan buscando
  lexicon: BDAG
  rationale: En español, ‘buscar’ comunica bien el sentido de ἐπιζητεῖν/ζητεῖν en este contexto. Aunque el inglés usa progresivo, el presente simple español puede expresar acción en curso sin forzar una perífrasis. ‘Me están buscando’ sería más explícito, pero menos sobrio.
- source_word: οὐχ ὅτι ... ἀλλ’ ὅτι
  english_pob_choice: not because ... but because
  chosen_spanish: no porque ... sino porque
  alternatives_spanish:
  - no que ... sino que
  - no debido a que ... sino debido a que
  lexicon: BDAG
  rationale: Se conserva la oposición causal del griego con la forma más idiomática en español. ‘No que ... sino que’ suena más abstracto; ‘no porque ... sino porque’ expresa de manera directa el motivo que Jesús corrige.
- source_word: εἴδετε σημεῖα
  english_pob_choice: you saw signs
  chosen_spanish: vieron señales
  alternatives_spanish:
  - vieron signos
  - percibieron señales
  lexicon: BDAG
  rationale: ‘Señales’ reproduce adecuadamente σημεῖα en Juan y mantiene su carga reveladora sin reducirlo a ‘milagros’. ‘Signos’ es posible, pero ‘señales’ resulta más natural en español y conserva el valor de algo que apunta más allá de sí mismo. Se mantiene el plural.
- source_word: ἐφάγετε ἐκ τῶν ἄρτων
  english_pob_choice: you ate of the loaves
  chosen_spanish: comieron de los panes
  alternatives_spanish:
  - comieron de los panes multiplicados
  - comieron de esos panes
  lexicon: BDAG
  rationale: Se conserva el plural de ἄρτοι con ‘panes’. La preposición ἐκ se refleja con ‘de’, que en español suena natural para el sentido partitivo. ‘Loaves’ puede traducirse como ‘panes’ para evitar un arcaísmo innecesario.
- source_word: ἐχορτάσθητε
  english_pob_choice: were filled
  chosen_spanish: quedaron saciados
  alternatives_spanish:
  - fueron saciados
  - quedaron llenos
  lexicon: BDAG
  rationale: El verbo expresa ser llenados hasta la saciedad. ‘Quedaron saciados’ comunica la plenitud del comer de manera idiomática y evita la ambigüedad de ‘llenos’, que puede sonar incompleto o simplemente físico. ‘Fueron saciados’ es más literal pero menos natural.
theological_decisions:
- issue: Sentido de σημεῖα en Juan 6:26
  english_pob_reading: Rendered as 'signs' rather than 'miracles.'
  chosen_spanish_reading: ‘señales’ en vez de ‘milagros’
  alternative_spanish_readings:
  - milagros
  - milagros señaladores
  rationale: En Juan, σημεῖα no describe solo prodigios, sino actos que revelan e interpretan la identidad de Jesús. ‘Señales’ conserva esa dimensión teológica y evita cerrar el sentido a un mero hecho extraordinario.
  doctrine_reference: Juan 2:11; 4:54; 6:2; filosofía de traducción §1, §5
translation_notes:
  revision_awareness: 'Se siguió el cierre revisionado del contexto inglés: ἐκ τῶν ἄρτων se entendió de manera natural como ‘de los panes’, no como ‘desde los panes’. También se mantuvo la opción del inglés POB por ‘signs’ y por ‘were filled’, reflejándolas en español con ‘señales’ y ‘quedaron saciados’, respectivamente.'
  spanish_consistency_notes:
  - Se conservó la fórmula joánica solemne con ‘En verdad, en verdad’.
  - Se eligió ‘señales’ para σημεῖα por coherencia con el uso teológico del Evangelio de Juan.
  - Se mantuvo el plural ‘panes’ para reflejar ἄρτων y la multiplicación previa.
  - ‘Les respondió’ evita la redundancia de ‘respondió y dijo’ sin perder el contenido del saludo narrativo.
  - La nota a pie de página cubre la alternativa semántica de ἐχορτάσθητε, que en español puede sonar como ‘saciados’ o ‘satisfechos’.
