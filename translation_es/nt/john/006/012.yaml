- from: 'Y cuando se saciaron, les dice a sus discípulos: «Recojan los pedazos que sobraron[a], para que nada se pierda[b]».'
  to: 'Y cuando se saciaron[a], les dice[b] a sus discípulos: «Recojan los pedazos sobrantes[c], para que nada se pierda[d]».'
  rationale: 'La revisión mantiene las buenas decisiones principales del borrador («se saciaron», presente histórico, «se pierda») pero añade dos notas exigidas por la auditoría inglesa: la alternativa de ἐνεπλήσθησαν y la del presente histórico de λέγει. También ajusta «los pedazos que sobraron» a «los pedazos sobrantes» para anclar con más precisión la nota léxica sobre τὰ περισσεύσαντα, y añade la alternativa «fragmentos» para κλάσματα, preservada en el POB inglés.'
