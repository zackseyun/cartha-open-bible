  text: ὡς δὲ ἐνεπλήσθησαν λέγει τοῖς μαθηταῖς αὐτοῦ· Συναγάγετε τὰ περισσεύσαντα κλάσματα, ἵνα μή τι ἀπόληται.
base_translation:
  language: en
  yaml_path: translation/nt/john/006/012.yaml
  text: And when they were filled[a], he says to his disciples, “Gather up the leftover pieces[d][c][b], so that nothing may be lost.”
  footnotes:
  - marker: a
    text: Or 'they were satisfied' or 'they had eaten their fill.'
    reason: lexical_alternative
  - marker: b
    text: 'Greek has the historical present: ''he says.'' Some translations smooth this to ''he said.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'fragments.'
    reason: lexical_alternative
  - marker: d
    text: Or 'so that nothing may be wasted.' The Greek more literally says 'so that nothing may be lost.'
    reason: lexical_alternative
