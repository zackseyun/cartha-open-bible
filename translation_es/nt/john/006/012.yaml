translation:
  language: es
  text: 'Y cuando se saciaron[a], les dice[b] a sus discípulos: «Recojan los pedazos sobrantes[c], para que nada se pierda[d]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «quedaron satisfechos» o «habían comido hasta saciarse».
    reason: lexical_alternative
  - marker: b
    text: 'El griego tiene presente histórico: «dice». Algunas traducciones lo suavizan a «dijo».'
    reason: lexical_alternative
  - marker: c
    text: O «fragmentos».
    reason: lexical_alternative
  - marker: d
    text: O «para que nada se desperdicie». El griego dice más literalmente «para que nada se pierda».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς δὲ
  english_pob_choice: And when
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Ahora bien, cuando
  - Cuando entonces
  lexicon: BDAG
  rationale: La expresión marca transición temporal con una leve conexión narrativa. «Y cuando» conserva la fluidez del relato sin sobrerrepresentar δέ.
- source_word: ἐνεπλήσθησαν
  english_pob_choice: they were filled
  chosen_spanish: se saciaron
  alternatives_spanish:
  - quedaron llenos
  - hubieron comido hasta saciarse
  lexicon: BDAG
  rationale: En este contexto de comida, el verbo pasivo alude a quedar satisfechos con alimento. «Se saciaron» comunica bien el sentido natural en español y refleja la idea de haber comido hasta el punto de quedar llenos.
- source_word: λέγει
  english_pob_choice: he says
  chosen_spanish: les dice
  alternatives_spanish:
  - les dijo
  lexicon: BDAG
  rationale: Se conserva el presente histórico del griego con «dice», que es posible y natural en español narrativo.
- source_word: μαθηταῖς
  english_pob_choice: disciples
  chosen_spanish: discípulos
  alternatives_spanish:
  - seguidores
  lexicon: BDAG
  rationale: «Discípulos» es el término preciso y estándar para μαθηταί en los Evangelios.
- source_word: Συναγάγετε
  english_pob_choice: Gather up
  chosen_spanish: Recojan
  alternatives_spanish:
  - Reúnan
  - Recojan juntos
  lexicon: BDAG
  rationale: El imperativo aoristo pide una orden directa. «Recojan» funciona de manera natural en español para la acción de juntar lo que quedó.
- source_word: τὰ περισσεύσαντα
  english_pob_choice: the leftover
  chosen_spanish: los pedazos que sobraron
  alternatives_spanish:
  - lo que sobró
  - los restantes
  lexicon: BDAG
  rationale: El participio de περισσεύω expresa lo que quedó de sobra. En español, «los pedazos que sobraron» transmite con claridad el sentido material y evita una formulación demasiado abstracta.
- source_word: κλάσματα
  english_pob_choice: pieces
  chosen_spanish: pedazos
  alternatives_spanish:
  - fragmentos
  - trozos
  lexicon: BDAG
  rationale: κλάσματα son porciones o piezas partidas del pan. «Pedazos» es más natural y comunica bien la imagen concreta sin añadir una especificación no necesaria en el texto principal.
- source_word: ἵνα μή τι ἀπόληται
  english_pob_choice: so that nothing may be lost
  chosen_spanish: para que nada se pierda
  alternatives_spanish:
  - para que nada se desperdicie
  - para que nada perezca
  lexicon: BDAG
  rationale: «Se pierda» reproduce de cerca ἀπόλλυμι en su sentido inmediato material, manteniendo también la posible resonancia más amplia sin imponer una lectura soteriológica.
theological_decisions:
- issue: Sentido de ἀπόληται en un contexto de milagro alimentario
  english_pob_reading: Rendered as 'lost' in its immediate material sense, without importing a soteriological meaning into this verse.
  chosen_spanish_reading: «se pierda» en sentido material inmediato, sin volver explícito un sentido soteriológico.
  alternative_spanish_readings:
  - «se desperdicie» como paráfrasis práctica
  - «perezca» con posible resonancia teológica
  rationale: Aquí Jesús habla de recoger sobras después de la multiplicación de los panes. En español, «se pierda» conserva el valor léxico básico y deja abierta la posible resonancia joánica sin resolverla en la traducción principal.
  doctrine_reference: Preservar la tensión teológica sin resolverla de antemano.
translation_notes:
  revision_awareness: El draft sigue la revisión más reciente del inglés POB al omitir cualquier equivalente de «broken» antes de «pieces», ya que κλάσματα queda bien representado por «pedazos» y una expresión como «pedazos rotos» sonaría forzada en español. También conserva el presente histórico con «dice» y mantiene ἀπόλλυμι como «se pierda» en su sentido inmediato.
  spanish_consistency_notes:
  - Se usó «discípulos» para μαθηταί, en coherencia con la terminología evangélica estándar.
  - Se preservó el presente histórico con «dice» para reflejar el aspecto narrativo del griego.
  - «Pedazos» evita una sobreespecificación y mantiene la imagen concreta de los restos de pan.
  - La nota b distingue entre el sentido más literal («se pierda») y la paráfrasis práctica («se desperdicie»).
  - Se eligió un registro moderno y digno, evitando giros arcaizantes innecesarios.
