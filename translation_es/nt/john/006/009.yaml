translation:
  language: es
  text: Hay aquí un muchacho que tiene cinco panes de cebada y dos peces; pero ¿qué son estos para tantos?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «¿qué alcanzan estos para tantos?»; la pregunta puede entenderse como una evaluación de suficiencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: παιδάριον
  english_pob_choice: boy
  chosen_spanish: muchacho
  alternatives_spanish:
  - niño
  - chico
  - joven
  lexicon: BDAG
  rationale: El término apunta a un menor o muchacho joven. En español, «muchacho» es natural, digno y suficientemente amplio para el contexto narrativo, sin añadir la pequeñez explícita de «niño» ni la informalidad de «chico».
- source_word: ὧδε
  english_pob_choice: here
  chosen_spanish: aquí
  alternatives_spanish:
  - aquí mismo
  - en este lugar
  lexicon: BDAG
  rationale: Es un adverbio locativo simple; «aquí» reproduce con naturalidad la referencia inmediata del escenario.
- source_word: ὃς ἔχει
  english_pob_choice: who has
  chosen_spanish: que tiene
  alternatives_spanish:
  - que posee
  - que lleva
  lexicon: BDAG
  rationale: Aunque el inglés auditado usa «who has», en español una cláusula relativa con «que tiene» es la forma más natural para identificar al muchacho por lo que posee.
- source_word: ἄρτους κριθίνους
  english_pob_choice: barley loaves
  chosen_spanish: panes de cebada
  alternatives_spanish:
  - panes de cebada
  - hogazas de cebada
  - panes de cebada molida
  lexicon: BDAG
  rationale: «ἄρτους» son panes/hogazas, y «κριθίνους» especifica cebada. «Panes de cebada» conserva la relación nominal sin forzar una forma demasiado técnica o arcaica.
- source_word: ὀψάρια
  english_pob_choice: fish
  chosen_spanish: peces
  alternatives_spanish:
  - pescado
  - pececillos
  lexicon: BDAG
  rationale: En este contexto se trata de alimento acompañado con pan. «Peces» es el equivalente más directo y transparente en español; «pescado» puede sonar a carne preparada más que al referente léxico básico.
- source_word: ἀλλὰ
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - sin embargo
  - mas
  lexicon: BDAG
  rationale: Marca el contraste entre la provisión disponible y la multitud. «Pero» mantiene la fuerza directa y narrativa del griego.
- source_word: ταῦτα τί ἐστιν
  english_pob_choice: what are these
  chosen_spanish: ¿qué son estos?
  alternatives_spanish:
  - ¿qué es esto?
  - ¿para qué sirven estos?
  lexicon: BDAG
  rationale: 'El plural neutro griego queda mejor en español con plural concordado: «¿qué son estos?». Conserva el tono evaluativo y retórico de la pregunta.'
- source_word: εἰς τοσούτους
  english_pob_choice: for so many
  chosen_spanish: para tantos
  alternatives_spanish:
  - para tanta gente
  - para tantos como estos
  lexicon: BDAG
  rationale: La preposición expresa adecuación o relación con una multitud. «Para tantos» es breve, idiomático y transmite la insuficiencia implícita.
theological_decisions:
- issue: La pregunta final expresa insuficiencia sin explicitar una conclusión doctrinal.
  english_pob_reading: what are these for so many?
  chosen_spanish_reading: ¿qué son estos para tantos?
  alternative_spanish_readings:
  - ¿qué son estos para tanta gente?
  - ¿qué alcanzan estos para tantos?
  rationale: La frase se mantiene como pregunta retórica de insuficiencia, sin convertirla en una paráfrasis explicativa. Se preserva así la tensión narrativa del relato antes del milagro de provisión.
  doctrine_reference: Juan 6:9 en su contexto inmediato; relación con la multiplicación de los panes (Juan 6:1-14).
translation_notes:
  revision_awareness: El texto base inglés y el análisis cruzado muestran alta concordancia y no requieren revisión sustantiva. Se conservó la estructura breve y retórica del griego, con decisiones léxicas consistentes con el audit trail inglés y con español natural.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando corresponda al nombre divino; este versículo no lo contiene.
  - Se evitó «Cristo»/«Mesías» por no aparecer en el texto.
  - Se prefirió «peces» frente a «pescado» para mantener el referente léxico concreto.
  - La concordancia plural en la pregunta final responde al plural neutro griego y al uso natural del español.
