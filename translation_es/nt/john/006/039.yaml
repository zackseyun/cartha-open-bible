translation:
  language: es
  text: 'Y esta es la voluntad del que me envió: que no pierda nada de todo lo que me ha dado[a], sino que lo levante en el último día.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más personalmente: «todos los que me ha dado ... los levantaré». El griego usa una expresión colectiva singular, literalmente «todo lo que ... lo».'
    reason: alternative_reading
lexical_decisions:
- source_word: θέλημα
  english_pob_choice: will
  chosen_spanish: voluntad
  alternatives_spanish:
  - deseo
  - propósito
  lexicon: BDAG
  rationale: «Voluntad» expresa de manera natural la intención del Padre en español y conserva bien el uso joánico sin reducirlo a mero deseo ni endurecerlo como decreto técnico.
- source_word: τοῦ πέμψαντός με
  english_pob_choice: the one who sent me
  chosen_spanish: del que me envió
  alternatives_spanish:
  - de aquel que me envió
  - del que me ha enviado
  lexicon: BDAG
  rationale: El participio sustantivado se vierte con una relativa natural en español. «El que me envió» preserva la fuerza verbal de πέμπω y su relación personal con Jesús.
- source_word: ἵνα
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - para que
  - a fin de que
  lexicon: BDAG
  rationale: Después de «esta es la voluntad», en español «que» introduce con naturalidad el contenido/propósito de esa voluntad, manteniendo la función final sin sobrerelaborarla.
- source_word: πᾶν ὃ δέδωκέν μοι
  english_pob_choice: all that he has given me
  chosen_spanish: todo lo que me ha dado
  alternatives_spanish:
  - todo cuanto me ha dado
  - todos los que me ha dado
  lexicon: BDAG
  rationale: La construcción neutra singular griega se refleja mejor con «todo lo que», que conserva el sentido colectivo sin forzar una personalización explícita en el cuerpo del texto.
- source_word: δέδωκέν
  english_pob_choice: has given
  chosen_spanish: me ha dado
  alternatives_spanish:
  - me dio
  - me ha confiado
  lexicon: BDAG
  rationale: El perfecto expresa un acto cumplido con efecto presente; «me ha dado» conserva mejor ese valor que un pasado simple.
- source_word: μὴ ἀπολέσω
  english_pob_choice: I should lose nothing
  chosen_spanish: no pierda nada
  alternatives_spanish:
  - no pierda ninguno
  - no pierda nada de ello
  lexicon: BDAG
  rationale: «No pierda nada» reproduce bien el matiz negativo y el sentido de pérdida, evitando introducir una forma más interpretativa o demasiado personalizante.
- source_word: ἐξ αὐτοῦ
  english_pob_choice: of all that he has given me
  chosen_spanish: de todo lo que me ha dado
  alternatives_spanish:
  - de ello
  - de ese conjunto
  lexicon: BDAG
  rationale: Aunque literalmente significa «de ello / fuera de ello», en español fluye mejor integrándolo en la frase anterior como parte del mismo complemento partitivo.
- source_word: ἀναστήσω αὐτὸ
  english_pob_choice: should raise it up
  chosen_spanish: lo resucite
  alternatives_spanish:
  - lo levante
  - lo resucite y lo levante
  lexicon: BDAG
  rationale: Aquí ἀνίστημι se entiende como resurrección escatológica. «Lo resucite» es más directo en español que «lo levante» y preserva el sentido final del versículo; el pronombre singular neutro se mantiene con «lo».
- source_word: τῇ ἐσχάτῃ ἡμέρᾳ
  english_pob_choice: on the last day
  chosen_spanish: en el último día
  alternatives_spanish:
  - en el día final
  - el día postrero
  lexicon: BDAG
  rationale: «En el último día» es la forma más natural y clara en español para la referencia escatológica joánica.
theological_decisions:
- issue: 'Objeto colectivo neutro: si personalizar el referente como «todos los que» o mantener la forma colectiva «todo lo que».'
  english_pob_reading: all that he has given me ... raise it up
  chosen_spanish_reading: todo lo que me ha dado ... lo resucite
  alternative_spanish_readings:
  - todos los que me ha dado ... los resucite
  - todos aquellos que me ha dado ... los levante
  rationale: El griego usa formas neutras singulares (πᾶν, ὃ, αὐτό), y el inglés POB conserva esa colectividad con singular neutro. En español, «todo lo que ... lo» mantiene la estructura colectiva sin resolverla prematuramente en una formulación personalizada, aunque el contexto pueda referirse a personas.
  doctrine_reference: Preservar la tensión textual y la primacía del original; no armonizar por tradición eclesial.
- issue: Cómo traducir ἀναστήσω en un contexto escatológico.
  english_pob_reading: should raise it up
  chosen_spanish_reading: lo resucite
  alternative_spanish_readings:
  - lo levante
  - lo haga resucitar
  rationale: Aunque «levantar» es posible, en un contexto de último día el verbo español más transparente para la resurrección es «resucitar». La elección mantiene el acto escatológico sin perder la referencia al levantar/poner en pie implícita en ἀνίστημι.
  doctrine_reference: Resurrección final en la teología joánica (Jn 6:39; cf. 6:40, 44, 54).
translation_notes:
  revision_awareness: La redacción sigue el último estado revisado del audit trail en el sentido de preservar la colectividad neutra («todo lo que») y la referencia singular («lo»), mientras adapta el verbo final al español bíblico natural con «resucite». Se tuvo en cuenta la revisión inglesa que cambió «none» por «nothing» para ajustar el neutro singular.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término por defecto, pero no aparece aquí porque el texto no contiene el tetragrámaton.
  - Se conserva «Jesús» en primera persona implícita por la estructura del versículo sin añadir el nombre, siguiendo el griego.
  - «Voluntad» se usa para θέλημα, en línea con el valor intencional y no meramente emotivo.
  - La coletividad neutra se refleja con singular colectivo en español («todo lo que ... lo»), evitando una armonización no apoyada por el griego.
