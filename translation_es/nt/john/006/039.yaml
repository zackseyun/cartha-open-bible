review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del griego: «voluntad», «del que me envió», «todo lo que me ha dado», «no pierda nada» y «en el último día» están bien alineados con el texto fuente y con la auditoría inglesa. También preserva correctamente la decisión importante de mantener el colectivo neutro singular en vez de personalizarlo en el texto principal.'
  spanish_quality_summary: El español es claro y natural en general. Sin embargo, «lo resucite» suena menos idiomático con un antecedente colectivo no personal («todo lo que») y además introduce una fricción semántica, porque en español «resucitar» suele asociarse más directamente con personas. «Lo levante» preserva mejor el vínculo formal con el colectivo singular griego y suena más natural en este encadenamiento sintáctico, especialmente con la nota al pie que ya explica la alternativa más personal.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. La decisión principal en juego no es de glosario fijo, sino de correspondencia semántica de ἀναστήσω αὐτὸ. Conviene ajustar la redacción española para reflejar mejor la elección POB auditada («raise it up») y la racionalidad documentada sobre el singular colectivo.
  issues:
  - severity: medium
    issue: «lo resucite» sobretraduce ἀναστήσω αὐτὸ frente a la auditoría POB
    rationale: Aunque el contexto es escatológico y la resurrección está implícita, la auditoría inglesa escogió deliberadamente «raise it up» para conservar tanto el sentido como la forma del singular colectivo. «Lo resucite» explicita más de lo necesario y hace menos natural el referente neutro colectivo en español.
  - severity: medium
    issue: La nota al pie usa «todo el que me ha dado», formulación poco natural en español
    rationale: 'La alternativa personal debe expresarse con un plural personal claro: «todos los que me ha dado ... los levantaré/los resucitaré». «Todo el que me ha dado» mezcla singular distributivo con un antecedente colectivo y no representa bien la alternativa documentada.'
  revised_spanish_text: 'Y esta es la voluntad del que me envió: que no pierda nada de todo lo que me ha dado[a], sino que lo levante en el último día.'
