revisions:
- from: 'Y esta es la voluntad del que me envió: que no pierda nada[a] de todo lo que me ha dado, sino que lo resucite en el último día.'
  to: 'Y esta es la voluntad del que me envió: que no pierda nada de todo lo que me ha dado[a], sino que lo levante en el último día.'
  rationale: 'Se ajusta «lo resucite» a «lo levante» para alinearlo mejor con ἀναστήσω, con la decisión auditada del POB en inglés y con el colectivo singular del griego. También se corrige la nota para expresar de manera natural en español la alternativa personal que el inglés conserva como posibilidad interpretativa. No se requiere adjudicación adicional: es una reparación pequeña y bien sustentada por la evidencia ya documentada.'
