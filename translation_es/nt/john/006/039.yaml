  text: τοῦτο δέ ἐστιν τὸ θέλημα τοῦ πέμψαντός ⸀με ἵνα πᾶν ὃ δέδωκέν μοι μὴ ἀπολέσω ἐξ αὐτοῦ ἀλλὰ ἀναστήσω ⸀αὐτὸ τῇ ἐσχάτῃ ἡμέρᾳ.
base_translation:
  language: en
  yaml_path: translation/nt/john/006/039.yaml
  text: 'And this is the will of the one who sent me: that I should lose nothing of all that he has given me[a], but should raise it up on the last day.'
