    text: 'O, más personalmente: «todos los que me ha dado ... los levantaré». El griego usa una expresión colectiva singular, literalmente «todo lo que ... lo».'
    reason: alternative_reading
  revision_rationale: 'Se ajusta «lo resucite» a «lo levante» para alinearlo mejor con ἀναστήσω, con la decisión auditada del POB en inglés y con el colectivo singular del griego. También se corrige la nota para expresar de manera natural en español la alternativa personal que el inglés conserva como posibilidad interpretativa. No se requiere adjudicación adicional: es una reparación pequeña y bien sustentada por la evidencia ya documentada.'
