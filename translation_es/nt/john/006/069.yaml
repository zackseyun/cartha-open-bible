translation:
  language: es
  text: Y nosotros hemos creído y hemos llegado a saber que tú eres el Santo de Dios[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Algunos manuscritos leen: «el Mesías, el Hijo del Dios vivo».'
    reason: textual_variant
  - marker: b
    text: 'O: «el Santo de parte de Dios». El genitivo griego puede expresar relación o procedencia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡμεῖς
  english_pob_choice: we
  chosen_spanish: nosotros
  alternatives_spanish:
  - nosotros mismos
  lexicon: BDAG
  rationale: El pronombre explícito se conserva con 'nosotros', que ya da énfasis en español sin añadir el peso de 'nosotros mismos', innecesario aquí.
- source_word: πεπιστεύκαμεν
  english_pob_choice: have believed
  chosen_spanish: hemos creído
  alternatives_spanish:
  - creemos
  - hemos llegado a creer
  lexicon: BDAG
  rationale: El perfecto expresa una acción pasada con vigencia presente. 'Hemos creído' preserva bien ese valor; 'creemos' pierde el matiz aspectual, y 'hemos llegado a creer' añade un matiz ingresivo no explícito en la forma griega.
- source_word: ἐγνώκαμεν
  english_pob_choice: have come to know
  chosen_spanish: hemos llegado a conocer
  alternatives_spanish:
  - hemos conocido
  - conocemos
  lexicon: BDAG
  rationale: El perfecto de γινώσκω comunica conocimiento adquirido con resultado presente. 'Hemos llegado a conocer' refleja ese proceso y el estado actual de conocimiento mejor que 'hemos conocido', que suena más duro en español.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  lexicon: BDAG
  rationale: Introduce el contenido de la confesión; 'que' es la subordinación natural y fiel en español.
- source_word: ὁ ἅγιος
  english_pob_choice: the Holy One
  chosen_spanish: el Santo
  alternatives_spanish:
  - el Santo Uno
  - el consagrado
  lexicon: BDAG
  rationale: Como título cristológico, ἅγιος aquí designa a uno singularmente apartado por Dios. En español, 'el Santo' es la forma más natural y reverente para mantener el título sin forzar una perífrasis.
- source_word: τοῦ θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - de parte de Dios
  - procedente de Dios
  lexicon: BDAG
  rationale: '''De Dios'' conserva la relación genitiva amplia del griego sin reducirla demasiado a fuente o pertenencia exclusiva. En español, esta forma mantiene la ambigüedad teológica útil del original.'
theological_decisions:
- issue: Título cristológico en Juan 6:69
  english_pob_reading: the Holy One of God
  chosen_spanish_reading: el Santo de Dios
  alternative_spanish_readings:
  - el Santo desde Dios
  - el Cristo, el Hijo del Dios viviente
  rationale: El texto griego leído por SBLGNT dice ὁ ἅγιος τοῦ θεοῦ, así que la traducción debe seguir ese título directamente, sin armonizarlo con variantes manuscritas o con Mateo 16:16. 'De Dios' preserva la relación genitiva sin convertirla en una paráfrasis causal.
  doctrine_reference: Afirmaciones; filosofía de traducción §§1, 3, 5
- issue: Valor del genitivo τοῦ θεοῦ
  english_pob_reading: The Greek genitive can express relation or source.
  chosen_spanish_reading: 'relación amplia: pertenencia, procedencia o vínculo'
  alternative_spanish_readings:
  - solo procedencia
  - solo pertenencia
  rationale: La nota en inglés reconoce que el genitivo puede expresar relación o fuente. En español, 'de Dios' mantiene esa amplitud y evita cerrar prematuramente el sentido.
  doctrine_reference: Gramática griega del genitivo; nota textual b del POB inglés
translation_notes:
  revision_awareness: Se siguió el texto griego de SBLGNT y el auditorio inglés sin aplicar armonización con la variante manuscrita. La frase española conserva el perfecto verbal y el título cristológico breve, con notas que registran la variante y la alternativa semántica del genitivo.
  spanish_consistency_notes:
  - Se usó 'nosotros' para el pronombre explícito, coherente con un registro natural y reverente en español.
  - Se prefirió 'hemos creído' y 'hemos llegado a conocer' para reflejar el valor perfectivo con resultado presente.
  - Se eligió 'el Santo de Dios' como título directo y publicable, evitando 'Mesías' o 'Cristo' porque el texto base no los contiene.
  - Se mantuvo 'de Dios' como genitivo amplio, sin forzarlo a 'desde' o 'procedente de' en el texto principal.
