translation:
  language: es
  text: 'Pero él les dijo: «Soy yo[a]; no tengan miedo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «Yo soy». En Juan, esta expresión puede funcionar como simple autoidentificación y también puede evocar temas teológicos más amplios.
    reason: alternative_reading
lexical_decisions:
- source_word: ὁ δὲ
  english_pob_choice: But he
  chosen_spanish: Pero él
  alternatives_spanish:
  - Y él
  - Entonces él
  lexicon: BDAG
  rationale: δέ introduce un giro suave en el discurso; en español, «Pero» conserva bien ese enlace natural. El artículo con valor pronominal se expresa con «él» para evitar ambigüedad en la narración.
- source_word: λέγει
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - dice
  lexicon: BDAG
  rationale: Aunque el griego usa presente histórico, en español narrativo el pretérito «dijo» suena natural y conserva la función de relato sin perder el sentido.
- source_word: αὐτοῖς
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - a los discípulos
  lexicon: BDAG
  rationale: El dativo plural se expresa con el clítico indirecto «les», que es la forma más natural y concisa en español; el referente queda determinado por el contexto.
- source_word: Ἐγώ εἰμι
  english_pob_choice: It is I
  chosen_spanish: Yo soy
  alternatives_spanish:
  - Soy yo
  - Yo soy él
  lexicon: BDAG
  rationale: La forma más literal y transparente en español es «Yo soy», que mantiene la posibilidad de una simple autoidentificación y también deja abierta la resonancia joánica más amplia que el POB inglés preserva con la nota sobre «I am».
- source_word: μὴ φοβεῖσθε
  english_pob_choice: do not be afraid
  chosen_spanish: no tengan miedo
  alternatives_spanish:
  - no teman
  - no se asusten
  lexicon: BDAG
  rationale: La prohibición con μή y el verbo φοβέομαι se vierten de manera idiomática como «no tengan miedo». «No teman» es más formal, pero «no tengan miedo» comunica con claridad el alivio que Jesús ofrece en este contexto.
theological_decisions:
- issue: Cómo traducir Ἐγώ εἰμι en Juan 6:20 sin borrar su posible resonancia teológica
  english_pob_reading: 'Main text: ''It is I''; footnote preserves ''I am'' as a more literal alternative with Johannine resonance'
  chosen_spanish_reading: 'Main text: «Yo soy»; nota preserva que también puede leerse más literalmente como «Yo soy» en el sentido absoluto de autoidentificación, con posible resonancia joánica'
  alternative_spanish_readings:
  - «Soy yo»
  - «Yo soy él»
  - «Yo soy» como simple identificación
  rationale: 'En este versículo Jesús tranquiliza a los discípulos identificándose. Sin embargo, en Juan la expresión ἐγώ εἰμι puede sonar con una densidad mayor. Traducir «Yo soy» mantiene esa tensión: funciona como autoidentificación inmediata y, al mismo tiempo, no cierra la posible resonancia teológica que el texto griego permite.'
  doctrine_reference: DOCTRINE.md §Translation philosophy, item 3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: El último pase de revisión indicó que no se necesitaban cambios; se mantiene esa lectura de alta concordancia y se adapta al español con equivalencias idiomáticas sin perder la tensión de Ἐγώ εἰμι.
  spanish_consistency_notes:
  - Se usa «Yo soy» para Ἐγώ εἰμι, en línea con la consistencia del proyecto para mantener la posibilidad de una resonancia teológica en Juan.
  - Se evita «SEÑOR» o sustituciones litúrgicas no presentes en el texto; aquí el referente es Jesús hablando a sus discípulos.
  - «Miedo» se elige por naturalidad y claridad en español moderno, sin suavizar la prohibición del griego.
