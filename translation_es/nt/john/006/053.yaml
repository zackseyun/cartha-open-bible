translation:
  language: es
  text: 'Entonces Jesús les dijo[a]: «En verdad, en verdad les digo: a menos que coman la carne del Hijo del Hombre y beban su sangre[b], no tienen vida en ustedes mismos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuerpo» para «carne»; el griego tiene «carne» (σάρξ), que conserva la fuerza concreta de la expresión.
    reason: lexical_alternative
  - marker: b
    text: El versículo dice simplemente «vida», no «vida eterna», aunque el contexto más amplio de Juan suele relacionar esta vida con la vida eterna.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - Por tanto
  - Entonces
  lexicon: BDAG
  rationale: Marca una transición consecuencial con naturalidad en español sin volver la frase rígida. «Así que» conserva la conexión discursiva del griego y la fluidez del POB inglés.
- source_word: Ἀμὴν ἀμὴν
  english_pob_choice: Truly, truly
  chosen_spanish: En verdad, en verdad
  alternatives_spanish:
  - Amén, amén
  - Ciertamente, ciertamente
  lexicon: BDAG
  rationale: La fórmula doble de solemnidad en Juan se conserva de manera reverente y clara. «En verdad, en verdad» comunica el énfasis sin dejar la expresión sin traducir ni sonar artificiosa.
- source_word: ἐὰν μὴ
  english_pob_choice: unless
  chosen_spanish: si no
  alternatives_spanish:
  - a menos que
  - si no es que
  lexicon: BDAG
  rationale: En español, «si no» expresa bien la condición negativa y evita una formulación demasiado pesada. Mantiene el valor condicional del griego.
- source_word: φάγητε
  english_pob_choice: eat
  chosen_spanish: coman
  alternatives_spanish:
  - coman de
  - ingieran
  lexicon: BDAG
  rationale: Se conserva el verbo literal «comer», como en el texto griego, para mantener la fuerza concreta de la imagen. «Coman» es el ajuste natural al plural de segunda persona en español.
- source_word: σάρκα
  english_pob_choice: flesh
  chosen_spanish: la carne
  alternatives_spanish:
  - el cuerpo
  lexicon: BDAG
  rationale: Se mantiene «carne» porque el griego dice σάρξ y la audit trail inglesa destacó su fuerza concreta. «Cuerpo» suavizaría el término e introduciría una equivalencia interpretativa no explícita en el verso.
- source_word: τοῦ υἱοῦ τοῦ ἀνθρώπου
  english_pob_choice: of the Son of Man
  chosen_spanish: del Hijo del Hombre
  alternatives_spanish:
  - del Hijo del ser humano
  - del Hombre
  lexicon: BDAG
  rationale: Se preserva la designación cristológica tradicional y cercana al texto. «Hijo del Hombre» mantiene el eco bíblico y la resonancia daniélica del título.
- source_word: πίητε
  english_pob_choice: drink
  chosen_spanish: beben
  alternatives_spanish:
  - tomen
  - ingieran
  lexicon: BDAG
  rationale: Se conserva el paralelismo con «coman» y el sentido literal de πίνω. «Beben» mantiene la concreción de la imagen.
- source_word: αἷμα
  english_pob_choice: blood
  chosen_spanish: sangre
  lexicon: BDAG
  rationale: La traducción literal «sangre» conserva el impacto retórico y teológico del dicho, sin reemplazarlo por una formulación más explicativa.
- source_word: ζωὴν
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - vida eterna
  lexicon: BDAG
  rationale: Se mantiene el sustantivo simple «vida», porque el griego no añade αἰώνιον. No se amplía a «vida eterna» para no introducir contenido ausente en el verso.
- source_word: ἐν ἑαυτοῖς
  english_pob_choice: in yourselves
  chosen_spanish: en ustedes mismos
  alternatives_spanish:
  - dentro de ustedes
  - en sí mismos
  lexicon: BDAG
  rationale: La frase se vierte de manera directa al español y conserva la idea de posesión interna que el griego expresa literalmente. «En ustedes mismos» es claro y respeta la sintaxis del original.
theological_decisions:
- issue: Si traducir el lenguaje de comer/beber de forma literal o interpretativa en debates sacramentales o metafóricos
  english_pob_reading: Retain the literal wording 'eat the flesh ... and drink his blood' without interpretive expansion
  chosen_spanish_reading: Conservar «coman la carne ... y beban su sangre» sin expansión interpretativa
  alternative_spanish_readings:
  - partan de su carne ... y beban su sangre
  - reciban su cuerpo ...
  rationale: El verso es deliberadamente concreto y provocador. La traducción española preserva la tensión teológica en lugar de resolverla, y evita introducir una lectura sacramental o metafórica que el griego no explicita.
  doctrine_reference: Translation philosophy §3; Contested terms table for σάρξ
- issue: Si ampliar «vida» a «vida eterna» por el contexto joánico
  english_pob_reading: Keep 'life' in the main text
  chosen_spanish_reading: Mantener «vida» en el texto principal
  alternative_spanish_readings:
  - vida eterna
  rationale: ζωὴν aparece sin αἰώνιον; por fidelidad al verso, la traducción no añade el adjetivo. El contexto de Juan puede sugerir la cualidad de esa vida, pero no debe incorporarse como si estuviera explícita aquí.
  doctrine_reference: Translation philosophy §1 and §3
translation_notes:
  revision_awareness: 'La traducción sigue el pasaje con alta concordancia respecto al audit trail inglés y al griego SBLGNT. No se aplicaron revisiones textuales adicionales; se conservaron las dos tensiones principales documentadas: σάρξ como «carne» y ζωὴν como «vida» sin ampliar a «vida eterna».'
  spanish_consistency_notes:
  - Se mantuvo «Jesús» para Ἰησοῦς y «Hijo del Hombre» para el título cristológico consistente con el proyecto.
  - Se usó «Yahvé» como norma del proyecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se evitó «Cristo» porque el verso no usa Χριστός.
  - Se conservó el paralelismo verbal «coman / beban» para reflejar la estructura del griego.
  - Las notas usan marcadores únicos y aparecen ancladas en el texto en los lugares correspondientes.
