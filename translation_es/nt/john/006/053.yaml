    issue: 'La condición negativa se duplicó en el segundo verbo: «y no beben».'
    rationale: El griego dice ἐὰν μὴ φάγητε ... καὶ πίητε ..., con una sola negación condicional que abarca ambos verbos. Repetir «no» en el segundo miembro cambia levemente la forma y puede sonar menos ajustado al original. «A menos que coman ... y beban ...» preserva mejor la sintaxis y evita ambigüedad.
  - severity: low
    issue: «Así que» es posible, pero «Entonces» encaja mejor con el flujo narrativo de οὖν aquí.
    rationale: οὖν puede marcar secuencia/inferencia. En narrativa evangélica española, «Entonces Jesús les dijo» suele sonar más natural y suficientemente fiel sin endurecer el tono.
