base_translation:
  language: en
  yaml_path: translation/nt/john/006/053.yaml
  text: So Jesus said to them[a], “Truly, truly, I say to you, unless you eat the flesh of the Son of Man and drink his blood[b], you do not have life in yourselves.”
  footnotes:
  - marker: a
    text: Or 'body' for 'flesh'; Greek has 'flesh' (σάρξ), which preserves the concrete force of the saying.
    reason: lexical_alternative
  - marker: b
    text: The verse says simply 'life,' not 'eternal life,' though the wider context in John often connects this life with eternal life.
    reason: lexical_alternative
