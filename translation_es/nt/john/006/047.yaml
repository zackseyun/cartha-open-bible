translation:
  language: es
  text: 'En verdad[a], en verdad les digo: el que cree tiene vida eterna[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «amén, amén». El griego usa ἀμήν repetido como fórmula solemne de énfasis.
    reason: lexical_alternative
  - marker: b
    text: O «vida perdurable»; más literalmente, «vida del siglo» o «vida de la era».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀμὴν ἀμὴν
  english_pob_choice: Truly, truly
  chosen_spanish: En verdad, en verdad
  alternatives_spanish:
  - Amén, amén
  - Ciertamente, ciertamente
  lexicon: BDAG
  rationale: El duplicado de ἀμήν funciona en Juan como marcador solemne de discurso. «En verdad, en verdad» conserva la repetición y la fuerza enfática en un español natural y digno; deja abierta la resonancia de «amén» sin imponer una fórmula menos transparente en esta cláusula.
- source_word: λέγω ὑμῖν
  english_pob_choice: I say to you
  chosen_spanish: les digo
  alternatives_spanish:
  - les digo a ustedes
  - les declaro
  lexicon: BDAG
  rationale: El presente indicativo con dativo se vierte de manera directa con «les digo». Mantiene la cadencia joánica y comunica con claridad la dirección del habla sin añadir matices no requeridos por el griego.
- source_word: ὁ πιστεύων
  english_pob_choice: the one who believes
  chosen_spanish: el que cree
  alternatives_spanish:
  - el que está creyendo
  - quien cree
  - el creyente
  lexicon: BDAG
  rationale: El participio presente con artículo expresa una persona caracterizada por creer. «El que cree» conserva el valor substantivado y el aspecto presente sin sobreparafrasear. Se evita «el creyente» para no convertir demasiado pronto la forma verbal en un sustantivo fijo.
- source_word: πιστεύων
  english_pob_choice: believes
  chosen_spanish: cree
  alternatives_spanish:
  - tiene fe
  - confía
  lexicon: BDAG
  rationale: «Cree» es la equivalencia más directa del verbo πιστεύω en este contexto joánico. Mantiene el sentido normal de creer sin introducir una glosa interpretativa como «confía».
- source_word: ἔχει
  english_pob_choice: has
  chosen_spanish: tiene
  alternatives_spanish:
  - posee
  - dispone de
  lexicon: BDAG
  rationale: El presente simple se conserva con «tiene», que expresa posesión presente. Así se mantiene la lectura de posesión actual, no solo futura.
- source_word: ζωὴν αἰώνιον
  english_pob_choice: eternal life
  chosen_spanish: vida eterna
  alternatives_spanish:
  - vida perdurable
  - vida del siglo
  lexicon: BDAG
  rationale: «Vida eterna» es la forma natural y fiel en español para ζωὴ αἰώνιον. Comunica el sentido durativo y cualitativo que tiene en Juan sin volverlo demasiado técnico o literalista.
theological_decisions:
- issue: Posesión presente de la vida eterna
  english_pob_reading: has eternal life
  chosen_spanish_reading: tiene vida eterna
  alternative_spanish_readings:
  - tendrá vida eterna
  - poseerá vida eterna
  rationale: Se preserva el presente ἔχει, porque el texto afirma una posesión actual. Traducirlo al futuro debilitaría la escatología realizada de Juan y agregaría algo que el griego no dice.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: El texto sigue de cerca el griego SBLGNT y coincide sustancialmente con la auditoría inglesa actual. No se detectaron revisiones aplicadas en el pass más reciente; la única tensión léxica relevante es la forma de ἀμήν y la posibilidad de alternar entre «el que cree» y una paráfrasis más explícita del participio articular, por lo que se optó por una solución transparente y publicable.
  spanish_consistency_notes:
  - Se mantiene «vida eterna» como término joánico estándar, en coherencia con la auditoría inglesa.
  - Se evita «Amén, amén» en el cuerpo principal para no oscurecer el valor discursivo de la fórmula en español, pero se registra como alternativa.
  - Se preserva el presente de «tiene» para reflejar la posesión actual de la vida eterna.
  - La redacción usa español neutro y eclesialmente legible, sin depender de formulaciones tradicionales que no sean necesarias para la fidelidad al griego.
