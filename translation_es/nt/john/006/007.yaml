translation:
  language: es
  text: 'Felipe le respondió: «Pan[a] por valor de doscientos denarios[b] no basta para ellos, para que cada uno reciba un poco».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «panes»; la palabra griega puede referirse a pan o a panes, según el contexto.
    reason: lexical_alternative
  - marker: b
    text: Un denario era el salario diario normal de un trabajador o soldado.
    reason: cultural_note
lexical_decisions:
- source_word: ἀπεκρίθη
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: BDAG
  rationale: El verbo griego marca una respuesta en el diálogo narrativo. En español, «respondió» es natural y fiel al intercambio directo; conserva el sentido sin sonar excesivamente formal.
- source_word: αὐτῷ
  english_pob_choice: him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El dativo de destinatario se expresa de forma idiomática en español con el clítico «le». Evita una repetición pesada y mantiene la relación verbal de respuesta a Jesús.
- source_word: Φίλιππος
  english_pob_choice: Philip
  chosen_spanish: Felipe
  alternatives_spanish:
  - Filipo
  lexicon: standard proper-name convention
  rationale: En español bíblico, el nombre propio se adapta normalmente como «Felipe». Es la forma reconocible y estándar para el apóstol.
- source_word: Διακοσίων δηναρίων
  english_pob_choice: Two hundred denarii worth of
  chosen_spanish: Doscientos denarios de
  alternatives_spanish:
  - doscientos denarios que valgan
  - pan por valor de doscientos denarios
  lexicon: BDAG
  rationale: El genitivo expresa monto/costo. En español, «doscientos denarios de pan» conserva la unidad monetaria y su relación con el pan sin forzar una perífrasis más pesada. La idea de valor queda implícita por el contexto y por la unidad de medida.
- source_word: ἄρτοι
  english_pob_choice: bread
  chosen_spanish: pan
  alternatives_spanish:
  - panes
  - alimento
  lexicon: BDAG
  rationale: Aunque el plural puede referir «panes», en español «pan» funciona de manera natural con la expresión de costo y conserva el valor genérico del alimento de base. «Panes» sería más específico, pero aquí no es necesario.
- source_word: οὐκ ἀρκοῦσιν
  english_pob_choice: is not enough
  chosen_spanish: no bastan
  alternatives_spanish:
  - no son suficientes
  - no alcanzan
  lexicon: BDAG
  rationale: Ἀρκέω significa ser suficiente, bastar. «No bastan» reproduce bien la fuerza verbal en español y evita una construcción demasiado literal.
- source_word: αὐτοῖς
  english_pob_choice: for them
  chosen_spanish: para ellos
  alternatives_spanish:
  - a ellos
  lexicon: BDAG
  rationale: El dativo de ventaja/relación se vierte naturalmente como «para ellos» con «bastar». Mantiene claro quiénes son los beneficiarios previstos.
- source_word: ἵνα
  english_pob_choice: that
  chosen_spanish: para que
  alternatives_spanish:
  - de modo que
  - a fin de que
  lexicon: BDAG
  rationale: La cláusula con ἵνα aquí expresa el resultado o propósito esperado de la distribución. «Para que» es la correspondencia natural en español y preserva la apertura entre finalidad y resultado, sin volverla demasiado interpretativa.
- source_word: ἕκαστος
  english_pob_choice: each one
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada cual
  - todos
  lexicon: BDAG
  rationale: La fuerza distributiva singular se conserva con «cada uno». Es la opción más clara y corriente en español.
- source_word: βραχύ τι
  english_pob_choice: a little
  chosen_spanish: un poco
  alternatives_spanish:
  - una pequeña cantidad
  - un poquito
  lexicon: BDAG
  rationale: La expresión griega indica una pequeña cantidad. «Un poco» es la equivalencia idiomática más natural y sobria en español.
- source_word: λαμβάνω
  english_pob_choice: may receive
  chosen_spanish: reciba
  alternatives_spanish:
  - reciba
  - tome
  - obtenga
  lexicon: BDAG
  rationale: En este contexto distributivo, «reciba» refleja mejor la recepción de una porción entregada que «tome», que podría sonar más activa o voluntaria que el griego permite.
theological_decisions:
- issue: Valor del verbo ἵνα en la cláusula final
  english_pob_reading: that each one may receive a little
  chosen_spanish_reading: para que cada uno reciba un poco
  alternative_spanish_readings:
  - de modo que cada uno reciba un poco
  - a fin de que cada uno reciba un poco
  rationale: No se ha hecho de ἵνα una finalidad fuerte y exclusiva; se ha conservado una formulación española que puede abarcar tanto propósito como resultado, acorde con el flujo del diálogo y la revisión inglesa que evitó sobrecargar la intención.
  doctrine_reference: none
- issue: Naturaleza del alimento mencionado por ἄρτοι
  english_pob_reading: bread / loaves
  chosen_spanish_reading: pan
  alternative_spanish_readings:
  - panes
  rationale: Se mantiene la referencia general al alimento básico. El español «pan» comunica bien la noción de alimento distribuible sin exigir que el lector decida entre un singular genérico y la imagen de varios panes.
  doctrine_reference: none
translation_notes:
  revision_awareness: La revisión inglesa desplazó ἵνα de una traducción más teleológica («so that») a una más sobria («that») para no sobreinterpretar el matiz. El español conserva esa sobriedad con «para que», que en este contexto puede funcionar naturalmente como resultado esperado sin afirmar una finalidad más fuerte de la que el griego exige.
  spanish_consistency_notes:
  - Se mantiene «denarios» como unidad monetaria histórica, coherente con la estrategia del POB inglés.
  - Se evita «Cristo» porque no aparece en el versículo.
  - Se usa «pan» en singular genérico, en paralelo con la opción inglesa «bread», sin perder el posible trasfondo de «loaves».
