base_translation:
  language: en
  yaml_path: translation/nt/john/006/007.yaml
  text: Philip answered him[a], “Two hundred denarii worth of bread is not enough for them[b], that each one may receive a little.”
  footnotes:
  - marker: a
    text: A denarius was a standard daily wage for a laborer or soldier.
    reason: cultural_note
  - marker: b
    text: Or “loaves”; the Greek word can refer to bread or bread loaves in context.
    reason: lexical_alternative
