revisions:
- from: 'Felipe le respondió: “Doscientos denarios de pan no bastan para ellos, para que cada uno reciba un poco.”'
  to: 'Felipe le respondió: «Pan[a] por valor de doscientos denarios[b] no basta para ellos, para que cada uno reciba un poco».'
  rationale: Se revisa «Doscientos denarios de pan» a «Pan por valor de doscientos denarios» para reflejar con claridad el genitivo de valor/costo en el griego y la decisión documentada en el POB inglés. Se mantiene «pan» como texto principal por naturalidad española, pero se añade la alternativa «panes» en nota. También se añade la nota cultural sobre el denario, ya preservada en la auditoría inglesa. No se requiere adjudicación adicional porque la corrección es local, clara y no doctrinal.
