translation:
  language: es
  text: Todo lo que[a] el Padre me da vendrá a mí, y al que viene a mí no lo echaré fuera[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Todo aquello que». El griego usa un neutro singular colectivo.
    reason: lexical_alternative
  - marker: b
    text: O «nunca lo echaré fuera» o «de ningún modo lo echaré fuera». La negación griega es enfática.
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶν ὃ
  english_pob_choice: All that
  chosen_spanish: Todo lo que
  alternatives_spanish:
  - Todo aquello que
  - Todo lo que el Padre me da
  lexicon: BDAG
  rationale: El griego usa un neutro singular colectivo. En español, «Todo lo que» conserva bien ese valor colectivo sin forzarlo a una lectura personalizada. «Todo aquello que» es posible, pero menos natural; «Todo lo que el Padre me da» ya integra la cláusula siguiente y puede sonar menos transparente como equivalencia del neutro.
- source_word: δίδωσίν μοι
  english_pob_choice: gives me
  chosen_spanish: me da
  alternatives_spanish:
  - me está dando
  - me ha dado
  lexicon: BDAG
  rationale: El presente indicativo se rinde mejor con un presente simple en español. «Me da» mantiene la fuerza verbal sin añadir aspecto progresivo o perfectivo que el griego no exige aquí.
- source_word: ὁ πατὴρ
  english_pob_choice: the Father
  chosen_spanish: el Padre
  alternatives_spanish:
  - mi Padre
  lexicon: BDAG
  rationale: El griego no lleva posesivo explícito; por eso se conserva «el Padre». «Mi Padre» es posible por el contexto, pero añade una relación explícita que el texto no formula aquí.
- source_word: πρὸς ἐμὲ ἥξει
  english_pob_choice: will come to me
  chosen_spanish: vendrá a mí
  alternatives_spanish:
  - vendrá hacia mí
  - llegará a mí
  lexicon: BDAG
  rationale: ἥκω aquí funciona naturalmente como «venir». «Vendrá a mí» es idiomático y fiel. «Llegará a mí» suena más marcado por el resultado que por el movimiento; «vendrá hacia mí» introduce un matiz direccional menos directo.
- source_word: τὸν ἐρχόμενον πρός ⸀με
  english_pob_choice: the one who comes to me
  chosen_spanish: al que viene a mí
  alternatives_spanish:
  - el que viene a mí
  - quien viene a mí
  lexicon: BDAG
  rationale: El participio articular se traduce de forma natural como una relativa sustantivada. En español, «al que viene a mí» fluye bien en la segunda cláusula y conserva el valor genérico del griego. «El que viene a mí» también es posible; se eligió «al que» para enlazar con la oración y evitar repetición pesada.
- source_word: οὐ μὴ ἐκβάλω ἔξω
  english_pob_choice: I will certainly not cast out
  chosen_spanish: no lo echaré fuera
  alternatives_spanish:
  - de ningún modo lo echaré fuera
  - jamás lo echaré fuera
  lexicon: BDAG
  rationale: La expresión griega es una negación enfática. En español, «no lo echaré fuera» es claro y natural; el contexto y la estructura negativa sostienen la fuerza enfática. «De ningún modo» o «jamás» explicitan más la intensidad, pero pueden sonar más interpretativos o más cargados de estilo.
theological_decisions:
- issue: Valor colectivo del neutro singular πᾶν ὃ frente a una lectura personalizada
  english_pob_reading: Rendered as 'All that the Father gives me' rather than 'Everyone whom the Father gives me.'
  chosen_spanish_reading: '''Todo lo que el Padre me da'' conserva el valor colectivo sin resolverlo en una lectura individualizante.'
  alternative_spanish_readings:
  - '''Todos los que el Padre me da'''
  - '''Todos los que el Padre me ha dado'''
  rationale: El griego presenta una forma neutra singular colectiva. La redacción española mantiene esa tensión sin convertirla en una formulación explícitamente personalizante. Así se preserva el dato gramatical y se evita fijar una lectura doctrinal donde el texto no la impone por sí solo.
  doctrine_reference: Preservar la tensión gramatical y teológica sin resolverla artificialmente.
- issue: Fuerza de la promesa en οὐ μὴ ἐκβάλω ἔξω
  english_pob_reading: 'An emphatic assurance: ''I will certainly not cast out.'''
  chosen_spanish_reading: '''no lo echaré fuera'' comunica la promesa con una negación firme y natural en español.'
  alternative_spanish_readings:
  - '''nunca lo echaré fuera'''
  - '''de ningún modo lo echaré fuera'''
  rationale: El griego expresa una negación enfática. La versión española conserva el sentido sin expandirlo hacia formulaciones doctrinales posteriores sobre perseverancia o pérdida de la salvación. «No lo echaré fuera» es suficientemente fuerte en contexto y evita exceso de dramatización verbal.
  doctrine_reference: No convertir la promesa en una formulación doctrinal que exceda el verso.
translation_notes:
  revision_awareness: Se tomó en cuenta el pasaje fuente griego SBLGNT y el audit trail inglés POB. La decisión inglesa de preservar πᾶν ὃ como colectivo (All that) y la negación enfática de οὐ μὴ ἐκβάλω ἔξω (certainly not cast out) guiaron la estructura española, manteniendo el valor colectivo sin personalizarlo indebidamente y reflejando la promesa con una negación firme pero idiomática.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» para θεός/יהוה porque este versículo no contiene esa referencia.
  - Se mantuvo «Padre» sin posesivo, conforme al griego.
  - «Echar fuera» reproduce bien ἐκβάλλω con ἔξω y es idiomático en español bíblico contemporáneo.
  - La puntuación separa claramente las dos cláusulas del versículo y conserva el paralelismo.
  - Los marcadores de nota se colocaron en las palabras o frases donde surge la alternativa lexical.
