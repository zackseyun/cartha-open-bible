translation:
  language: es
  text: Porque el pan de Dios es el que baja del cielo y da vida al mundo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo que baja del cielo y da vida al mundo». El griego puede entenderse de modo más impersonal, aunque los participios masculinos favorecen un referente personal.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἄρτος
  english_pob_choice: bread
  chosen_spanish: pan
  alternatives_spanish:
  - alimento
  - hogaza
  lexicon: BDAG
  rationale: '''Pan'' conserva el sentido concreto básico y la fuerza metafórica del discurso de Juan, sin diluirlo en un término más general como ''alimento''.'
- source_word: τοῦ θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - de parte de Dios
  - que pertenece a Dios
  lexicon: BDAG
  rationale: La construcción posesiva/genitiva se mantiene de forma directa como 'de Dios', que en español conserva la ambigüedad entre pertenencia y procedencia que el contexto desarrolla.
- source_word: ὁ καταβαίνων
  english_pob_choice: the one who comes down
  chosen_spanish: el que baja
  alternatives_spanish:
  - el que desciende
  - aquel que baja
  lexicon: BDAG
  rationale: El participio articular masculino singular sugiere un referente personal; 'el que baja' mantiene esa referencia de manera natural en español. 'Baja' es más idiomático que 'desciende' sin perder la idea de venir desde arriba.
- source_word: ἐκ τοῦ οὐρανοῦ
  english_pob_choice: from heaven
  chosen_spanish: del cielo
  alternatives_spanish:
  - desde el cielo
  - del cielo arriba
  lexicon: BDAG
  rationale: '''Del cielo'' es la forma más natural en español y mantiene la relación de origen expresada por ἐκ + genitivo.'
- source_word: ζωὴν
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - vida plena
  - vida
  lexicon: BDAG
  rationale: '''Vida'' reproduce el término joánico central sin amplificación interpretativa.'
- source_word: διδοὺς
  english_pob_choice: gives
  chosen_spanish: da
  alternatives_spanish:
  - está dando
  - concede
  lexicon: BDAG
  rationale: 'El participio presente coordinado se vierte con un verbo finito natural en español: ''da''. Conserva la acción característica sin forzar una perífrasis.'
- source_word: τῷ κόσμῳ
  english_pob_choice: to the world
  chosen_spanish: al mundo
  alternatives_spanish:
  - al mundo
  - a la humanidad
  lexicon: BDAG
  rationale: '''Mundo'' preserva el alcance joánico del término κόσμος y evita reducirlo a ''humanidad'', que estrecharía innecesariamente el alcance del texto.'
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: '''Porque'' expresa de forma clara la relación explicativa/argumentativa con lo anterior. En español fluye mejor al inicio de la cláusula que un simple ''pues''.'
theological_decisions:
- issue: Referencia personal vs. impersonal del participio articular masculino ὁ καταβαίνων... καὶ ζωὴν διδοὺς
  english_pob_reading: 'Use personal language: ''the one who comes down from heaven and gives life to the world.'''
  chosen_spanish_reading: 'Usar lenguaje personal: ''el que baja del cielo y da vida al mundo.'''
  alternative_spanish_readings:
  - '''lo que baja del cielo y da vida al mundo'''
  rationale: Aunque 'pan' es neutro en español, el griego usa participios masculinos singulares articulados, lo que favorece un referente personal. La versión española mantiene esa fuerza sin añadir explicación doctrinal ajena al versículo.
  doctrine_reference: 'Affirmations; Translation philosophy #1 y #3'
- issue: Alcance de κόσμος
  english_pob_reading: Retain 'world' rather than specifying a narrower theological category.
  chosen_spanish_reading: Conservar 'mundo' sin restringirlo a 'humanidad'.
  alternative_spanish_readings:
  - '''humanidad'''
  - '''todos'''
  rationale: El texto afirma amplitud y no resuelve por sí mismo debates posteriores sobre extensión. 'Mundo' conserva la tensión teológica del original.
  doctrine_reference: 'Translation philosophy #3'
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente del archivo inglés: no se aplicaron cambios posteriores y el texto permanece en alto acuerdo con la auditoría.'
  spanish_consistency_notes:
  - Se mantuvo el tono sobrio y publicable propio de la serie POB.
  - Se preservó 'mundo' para κόσμος y 'cielo' para οὐρανός, sin intensificar ni restringir el alcance semántico.
  - Se optó por 'el que baja' para reflejar el referente personal sugerido por el griego, en paralelo con la nota alternativa sobre una lectura impersonal.
