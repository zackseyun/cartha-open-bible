  timestamp: '2026-05-07T21:03:41Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien el sentido global del griego: Jesús percibe la inminencia de la acción de la multitud, el matiz coercitivo de ἁρπάζειν, el propósito de hacerlo rey y su retirada de nuevo al monte. Sin embargo, «estaban por venir» suena poco natural en este contexto y «arrebatarlo» puede sugerir más bien quitarle algo o llevárselo bruscamente, mientras que aquí la idea principal es apoderarse de él / tomarlo por fuerza. También conviene suavizar la puntuación final para una lectura más natural en español.'
  spanish_quality_summary: 'El texto es mayormente claro y digno, pero presenta dos puntos de estilo/idioma mejorables: «estaban por venir» no es la mejor forma neutral y ampliamente legible para expresar inminencia, y «él solo» tras coma finaliza con una cadencia algo menos natural que «él solo» sin coma o «él solo» precedido por una estructura más fluida. Una leve revisión produce un español más natural sin perder precisión.'
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto: «Jesús» es correcto; no aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. La decisión teológica clave de mantener el intento coercitivo sí debe preservarse mejor con «tomarlo por la fuerza» o equivalente, como ya refleja la nota inglesa.'
  issues:
  - severity: medium
    issue: «estaban por venir» para μέλλουσιν ἔρχεσθαι
    rationale: Aunque puede entenderse, no es la formulación más natural ni más ampliamente legible en español bíblico general. «iban a venir» o «estaban a punto de venir» comunican mejor la inminencia.
  - severity: medium
    issue: «arrebatarlo» para ἁρπάζειν
    rationale: Mantiene algo de fuerza, pero en español puede sonar a 'quitar/rebatar' más que a 'apoderarse de alguien'. En este contexto político-coercitivo, «tomarlo por la fuerza» expresa con mayor claridad el sentido documentado por el POB.
  - severity: low
    issue: Coma antes de «él solo»
    rationale: No es incorrecta, pero la frase fluye mejor como «se retiró otra vez al monte él solo» o con una formulación equivalente. Es un ajuste estilístico menor.
  revised_spanish_text: Así que Jesús[a], al saber que iban a venir para tomarlo por la fuerza y hacerlo rey, se retiró otra vez al monte él solo.
  revised_footnotes:
  - marker: a
    text: O «apoderarse de él para hacerlo rey».
    reason: lexical_alternative
  revision_rationale: Se reemplaza «estaban por venir» por «iban a venir» para un español más natural y ampliamente legible; «arrebatarlo» por «tomarlo por la fuerza» para reflejar con mayor claridad el matiz coercitivo de ἁρπάζειν, en línea con la nota del POB en inglés; y se alisa la puntuación final para mejorar la fluidez sin alterar el sentido. La nota se ajusta para conservar una alternativa léxica genuina distinta del texto principal.
