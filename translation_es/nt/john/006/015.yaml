translation:
  language: es
  text: Así que Jesús[a], al saber que iban a venir para tomarlo por la fuerza y hacerlo rey, se retiró otra vez al monte él solo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «apoderarse de él para hacerlo rey».
    reason: lexical_alternative
lexical_decisions:
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - por tanto
  - entonces
  lexicon: BDAG
  rationale: Marca continuación/inferencia narrativa. «Así que» conserva esa relación causal o consecutiva con naturalidad en español sin volver la frase demasiado formal.
- source_word: γνοὺς
  english_pob_choice: knowing
  chosen_spanish: al saber
  alternatives_spanish:
  - sabiendo
  - al conocer
  lexicon: BDAG
  rationale: El participio aoristo expresa la circunstancia de la acción de Jesús. «Al saber» suena natural y mantiene la función circunstancial sin recargar la sintaxis.
- source_word: μέλλουσιν ἔρχεσθαι
  english_pob_choice: were about to come
  chosen_spanish: estaban por venir
  alternatives_spanish:
  - iban a venir
  - estaban a punto de venir
  lexicon: BDAG
  rationale: La perífrasis con μέλλω indica inminencia. «Estaban por venir» conserva bien esa cercanía temporal en español y evita una lectura meramente futura.
- source_word: ἁρπάζειν
  english_pob_choice: seize
  chosen_spanish: arrebatarlo
  alternatives_spanish:
  - tomarlo por la fuerza
  - apoderarse de él
  lexicon: BDAG
  rationale: El verbo implica una toma brusca o violenta. «Arrebatarlo» mantiene el matiz coercitivo mejor que un simple «tomarlo» y permite reflejar la fuerza del intento.
- source_word: ἵνα ποιήσωσιν βασιλέα
  english_pob_choice: in order to make him king
  chosen_spanish: para hacerlo rey
  alternatives_spanish:
  - a fin de hacerlo rey
  - con el fin de hacerlo rey
  lexicon: BDAG
  rationale: ἵνα + subjuntivo expresa propósito. «Para hacerlo rey» es claro y fiel, y conserva el sentido de intención política sin añadir interpretación ajena al texto.
- source_word: ἀνεχώρησεν
  english_pob_choice: withdrew
  chosen_spanish: se retiró
  alternatives_spanish:
  - se apartó
  - se retiró de allí
  lexicon: BDAG
  rationale: El verbo denota retirarse o apartarse de una situación. «Se retiró» funciona bien en español y comunica tanto el movimiento físico como la evitación del intento de la multitud.
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  - una vez más
  lexicon: BDAG
  rationale: Adverbio de repetición. «Otra vez» es idiomático y directo en español.
- source_word: εἰς τὸ ὄρος
  english_pob_choice: to the mountain
  chosen_spanish: al monte
  alternatives_spanish:
  - a la montaña
  - al monte
  lexicon: BDAG
  rationale: Aunque «montaña» es posible, «monte» suena más natural en español bíblico para referirse al lugar elevado del contexto inmediato, sin perder la referencia geográfica.
- source_word: αὐτὸς μόνος
  english_pob_choice: by himself
  chosen_spanish: él solo
  alternatives_spanish:
  - solo
  - por sí mismo
  lexicon: BDAG
  rationale: La combinación es enfática. En español, «él solo» reproduce con claridad la idea de que Jesús quedó sin compañía; la duplicación puede quedar implícita sin sonar pesada.
theological_decisions:
- issue: Carácter coercitivo del intento de la multitud respecto de Jesús
  english_pob_reading: 'Render the action as coercive political enthronement: ''seize him in order to make him king.'''
  chosen_spanish_reading: «arrebatarlo para hacerlo rey»
  alternative_spanish_readings:
  - tomarlo para hacerlo rey
  - llevarlo para hacerlo rey
  rationale: La presencia de ἁρπάζειν exige conservar la idea de fuerza o aprehensión brusca. «Arrebatarlo» evita suavizar el acto y no lo convierte en una simple invitación a reinar.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: La revisión inglesa eliminó el redundante 'alone' tras 'by himself' porque αὐτὸς μόνος ya queda suficientemente expresado en inglés. En español, la duplicación es natural como énfasis y se refleja con «él solo», sin necesidad de una doble expresión redundante.
  spanish_consistency_notes:
  - Se conserva «Jesús» para Ἰησοῦς según el estándar del proyecto.
  - Se evita «SEÑOR» o sustituciones reverenciales no presentes en el texto.
  - «Rey» se mantiene para βασιλέα, sin introducir «Mesías» ni una lectura litúrgica.
  - «Monte» se usa de forma consistente para ὄρος en este pasaje, siguiendo el contexto narrativo.
  - La nota a pie de página preserva la alternativa léxica fuerte de ἁρπάζειν sin desplazarla del texto principal.
