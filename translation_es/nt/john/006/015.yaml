revisions:
- from: Así que Jesús[a], al saber que estaban por venir y arrebatarlo para hacerlo rey, se retiró otra vez al monte, él solo.
  to: Así que Jesús[a], al saber que iban a venir para tomarlo por la fuerza y hacerlo rey, se retiró otra vez al monte él solo.
  rationale: Se reemplaza «estaban por venir» por «iban a venir» para un español más natural y ampliamente legible; «arrebatarlo» por «tomarlo por la fuerza» para reflejar con mayor claridad el matiz coercitivo de ἁρπάζειν, en línea con la nota del POB en inglés; y se alisa la puntuación final para mejorar la fluidez sin alterar el sentido. La nota se ajusta para conservar una alternativa léxica genuina distinta del texto principal.
