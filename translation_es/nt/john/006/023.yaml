revisions:
- from: Pero vinieron barcas de Tiberíades, cerca del lugar donde habían comido el pan[a] después que el Señor había dado gracias.
  to: Pero vinieron barcas de Tiberíades cerca del lugar donde comieron el pan, después de que el Señor dio gracias[a].
  rationale: Se ajustó el tiempo verbal principal a «comieron» para reflejar la decisión auditada del English POB y mejorar la naturalidad narrativa en español. También se reemplazó «después que ... había dado gracias» por «después de que el Señor dio gracias», una construcción más idiomática y fluida que preserva la anterioridad del participio griego. Se mantuvo la nota sobre el diminutivo de πλοιάρια, con anclaje al final de la cláusula relevante.
  reviewer_model: gpt-5.4
