translation:
  language: es
  text: Pero vinieron barcas de Tiberíades cerca del lugar donde comieron el pan, después de que el Señor dio gracias[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «barcas pequeñas vinieron de Tiberíades». El griego πλοιάρια es una forma diminutiva.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Mas
  - Sin embargo
  lexicon: BDAG
  rationale: Marca una oposición o transición respecto del contexto anterior; en español, «Pero» es la opción natural y directa en posición inicial.
- source_word: ἦλθεν
  english_pob_choice: came
  chosen_spanish: vinieron
  alternatives_spanish:
  - llegaron
  - vinieron
  lexicon: BDAG
  rationale: El verbo griego narra llegada/movimiento hacia el lugar. «Vinieron» conserva el dinamismo del desplazamiento y funciona bien con el sujeto implícito de las barcas.
- source_word: πλοιάρια
  english_pob_choice: boats
  chosen_spanish: barcas
  alternatives_spanish:
  - barquitas
  - embarcaciones
  - barcas
  lexicon: BDAG
  rationale: El diminutivo puede sugerir 'barcas pequeñas', pero en español «barcas» comunica el referente sin forzar un diminutivo no necesario en el contexto. Se preserva la posibilidad de nota sobre la forma diminutiva en griego.
- source_word: ἐκ Τιβεριάδος
  english_pob_choice: from Tiberias
  chosen_spanish: de Tiberíades
  alternatives_spanish:
  - desde Tiberíades
  - de Tiberíades
  lexicon: BDAG
  rationale: Expresión de origen espacial. «De Tiberíades» es idiomática y fiel al genitivo de procedencia.
- source_word: ἐγγὺς τοῦ τόπου
  english_pob_choice: near the place
  chosen_spanish: cerca del lugar
  alternatives_spanish:
  - junto al lugar
  - cerca del lugar
  lexicon: BDAG
  rationale: Equivale naturalmente a la proximidad indicada por ἐγγύς; «cerca del lugar» mantiene claridad y tono bíblico sobrio.
- source_word: ὅπου
  english_pob_choice: where
  chosen_spanish: donde
  alternatives_spanish:
  - en donde
  - donde
  lexicon: BDAG
  rationale: Relativo locativo natural en español, sin añadir matiz innecesario.
- source_word: ἔφαγον τὸν ἄρτον
  english_pob_choice: they ate the bread
  chosen_spanish: habían comido el pan
  alternatives_spanish:
  - comieron el pan
  - habían comido el pan
  lexicon: BDAG
  rationale: El contexto mira hacia la alimentación previa de la multitud; el pluscuamperfecto en español expresa bien la anterioridad narrativa. «El pan» conserva el artículo definido del griego, referido al pan previamente mencionado.
- source_word: εὐχαριστήσαντος
  english_pob_choice: after ... had given thanks
  chosen_spanish: después que ... había dado gracias
  alternatives_spanish:
  - después de que ... había dado gracias
  - cuando ... había dado gracias
  - habiendo dado gracias
  lexicon: BDAG
  rationale: El participio aoristo en construcción genitiva señala acción anterior al comer. «Después que ... había dado gracias» hace explícita esa relación temporal en español sin perder el orden de los hechos.
- source_word: τοῦ κυρίου
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Señor
  - el maestro
  lexicon: BDAG
  rationale: κύριος se traduce como «Señor» conforme al tratamiento confesional establecido para este título en el proyecto. En este contexto joánico, la referencia es reverente y cristológica.
theological_decisions:
- issue: Renderización de κύριος en un contexto cristológico
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el maestro
  rationale: El contexto habla de Jesús y el título conserva tanto el respeto como la resonancia cristológica. «Señor» sigue la pauta doctrinal del proyecto para κύριος.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Relación temporal entre comer y dar gracias
  english_pob_reading: after the Lord had given thanks
  chosen_spanish_reading: después que el Señor había dado gracias
  alternative_spanish_readings:
  - cuando el Señor había dado gracias
  - habiendo dado gracias
  rationale: La construcción griega sitúa la acción de dar gracias antes del acto de comer. El español elegido explicita esa anterioridad sin alterar el sentido ni forzar una paráfrasis.
  doctrine_reference: Gramática del participio aoristo en construcción de anterioridad
- issue: Diminutivo griego πλοιάρια
  english_pob_reading: boats
  chosen_spanish_reading: barcas
  alternative_spanish_readings:
  - barquitas
  - embarcaciones
  rationale: El valor diminutivo existe en griego, pero no parece semánticamente decisivo aquí. Se mantiene en nota la posibilidad de lectura más literal sin introducir un matiz afectivo o estilístico no confirmado por el contexto.
  doctrine_reference: Lexicografía contextual de πλοιάριον
translation_notes:
  revision_awareness: El texto sigue de cerca el último pase revisado del POB en inglés, que prefirió 'they ate' frente a 'they had eaten' para ἔφαγον. En español se optó por 'habían comido' porque el pluscuamperfecto expresa con naturalidad la anterioridad respecto de 'dado gracias' y evita ambigüedad temporal en esta construcción. Se conservó la nota léxica sobre πλοιάρια como diminutivo. No se añadieron variantes textuales porque el paquete fuente muestra alta concordancia.
  spanish_consistency_notes:
  - Se usa «Señor» para κύριος, coherente con la terminología doctrinal del proyecto.
  - Se evita traducir πλοιάρια mecánicamente como 'pequeñas barcas' en el texto principal; esa matización queda en nota.
  - Se conserva el artículo definido en «el pan» por la referencia específica al pan ya mencionado en el contexto.
  - La puntuación separa la cláusula de procedencia y la de localización de forma natural en español bíblico moderno.
