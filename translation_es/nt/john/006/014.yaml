    issue: 'Inicio de la oración algo forzado: «Así que, cuando la gente vio...»'
    rationale: Aunque transmite οὖν, la combinación «Así que, cuando» resulta menos natural en español que una solución como «Entonces, al ver...» o «Así, cuando...». El griego marca progresión narrativa, no necesariamente una consecuencia fuerte.
  - severity: low
    issue: «Estaban diciendo» suena pesado en este contexto
    rationale: El imperfecto ἔλεγον sí expresa acción continua o repetida, pero en español narrativo «decían» suele representar mejor ese matiz sin perífrasis poco idiomática.
