revisions:
- from: 'Así que, cuando la gente vio la señal que había hecho[a], estaban diciendo[b]: «Este verdaderamente es el Profeta que viene al mundo».'
  to: 'Entonces, al ver la señal que había hecho[a], la gente decía[b]: «Este verdaderamente es el Profeta que viene al mundo».'
  rationale: La revisión mejora la naturalidad del español sin alterar el sentido fuente ni las decisiones léxicas del POB. «Entonces, al ver...» refleja mejor la progresión narrativa y el participio aoristo; «la gente decía» representa de manera más idiomática el imperfecto ἔλεγον. Se conservan «señal», «verdaderamente» y «el Profeta» por fidelidad semántica y teológica.
