translation:
  language: es
  text: 'Entonces, al ver la señal que había hecho[a], la gente decía[b]: «Este verdaderamente es el Profeta que viene al mundo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el milagro que había hecho». En Juan, σημεῖον suele destacar el sentido revelador de las obras de Jesús, no solo su carácter prodigioso.
    reason: lexical_alternative
  - marker: b
    text: «El Profeta» probablemente alude al profeta esperado como Moisés (Dt 18:15–18).
    reason: cross_reference
lexical_decisions:
- source_word: οἱ οὖν ἄνθρωποι
  english_pob_choice: So when the people
  chosen_spanish: Así que, cuando la gente
  alternatives_spanish:
  - Entonces, cuando la gente
  - Por eso, cuando la gente
  lexicon: BDAG
  rationale: ἄνθρωποι aquí designa a la multitud en sentido general, no a varones específicamente. «La gente» transmite bien el referente colectivo en español. «οὖν» marca continuidad inferencial/narrativa, reflejada con «Así que».
- source_word: ἰδόντες
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - habiendo visto
  - después de ver
  lexicon: BDAG
  rationale: El participio aoristo se expresa de manera natural en español con un verbo finito en pasado dentro del marco narrativo. «Vio» conserva el acto de percepción sin volver la frase pesada.
- source_word: ὃ ἐποίησεν σημεῖον
  english_pob_choice: the sign that he had done
  chosen_spanish: la señal que había hecho
  alternatives_spanish:
  - la señal que había realizado
  - el milagro que había hecho
  lexicon: BDAG
  rationale: En Juan, σημεῖον conserva un valor revelador y no debe reducirse a «milagro». «Señal» mantiene ese peso teológico. El relativo se vierte de modo idiomático y el pluscuamperfecto español refleja la anterioridad desde la perspectiva de la multitud.
- source_word: ἔλεγον
  english_pob_choice: they were saying
  chosen_spanish: estaban diciendo
  alternatives_spanish:
  - decían
  - seguían diciendo
  lexicon: BDAG
  rationale: El imperfecto sugiere habla continua o repetida. «Estaban diciendo» preserva mejor ese aspecto que un simple pretérito.
- source_word: ἀληθῶς
  english_pob_choice: truly
  chosen_spanish: verdaderamente
  alternatives_spanish:
  - de veras
  - ciertamente
  lexicon: BDAG
  rationale: «Verdaderamente» expresa con claridad la afirmación de reconocimiento genuino y conserva el énfasis adverbial de ἀληθῶς.
- source_word: ὁ προφήτης
  english_pob_choice: the Prophet
  chosen_spanish: el Profeta
  alternatives_spanish:
  - el profeta
  lexicon: BDAG
  rationale: La mayúscula ayuda a señalar un título reconocido, en línea con la lectura joánica y la posible alusión a Deuteronomio 18:15–18. Se conserva la ambigüedad del texto griego sin explicitar más en la traducción principal.
- source_word: ὁ ἐρχόμενος εἰς τὸν κόσμον
  english_pob_choice: who is coming into the world
  chosen_spanish: que viene al mundo
  alternatives_spanish:
  - que está viniendo al mundo
  - que ha de venir al mundo
  lexicon: BDAG
  rationale: El participio presente con artículo funciona de forma descriptiva/titular. En español, «que viene al mundo» suena natural y conserva el presente de la expresión joánica sin forzar una temporalidad más interpretativa.
theological_decisions:
- issue: Identificación de «el Profeta»
  english_pob_reading: Render as 'the Prophet' without explicitly identifying him in the translation text.
  chosen_spanish_reading: Traducir «el Profeta» sin resolverlo explícitamente como «el profeta como Moisés» en el texto principal.
  alternative_spanish_readings:
  - el profeta como Moisés
  - un profeta
  rationale: El griego dice solo «el Profeta». Aunque la alusión probable es a Deuteronomio 18:15–18, la traducción principal debe preservar la formulación del texto y dejar la identificación completa al contexto y a las notas.
  doctrine_reference: Preservar la tensión interpretativa sin cerrarla prematuramente.
translation_notes:
  revision_awareness: Coincide con el pasaje base y con el audit trail inglés más reciente; no se requieren revisiones adicionales. La versión mantiene el valor de σημεῖον, el aspecto imperfectivo de ἔλεγον y la ambigüedad cristológica de ὁ προφήτης.
  spanish_consistency_notes:
  - Se mantiene «señal» para σημεῖον, conforme al uso joánico del término.
  - Se usa «Profeta» con mayúscula para reflejar el posible valor titular, coherente con la decisión inglesa.
  - La construcción «que viene al mundo» conserva el idiomático presente del participio sin añadir interpretación temporal excesiva.
