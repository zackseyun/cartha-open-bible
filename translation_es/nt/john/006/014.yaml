base_translation:
  language: en
  yaml_path: translation/nt/john/006/014.yaml
  text: So when the people saw the sign that he had done[a], they were saying[b], “This truly is the Prophet who is coming into the world.”
  footnotes:
  - marker: a
    text: Or 'the miracle that he had done'; John regularly uses 'sign' (σημεῖον) to emphasize the revelatory meaning of Jesus's works, not only their miraculous character.
    reason: lexical_alternative
  - marker: b
    text: '''The Prophet'' likely refers to the expected prophet like Moses (Deut 18:15–18).'
    reason: cross_reference
