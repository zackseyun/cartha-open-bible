translation:
  language: es
  text: 'Así que los judíos estaban discutiendo entre ellos[a], y decían: «¿Cómo puede este hombre darnos a comer su carne[b]?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los judeanos» o, contextualmente, «los líderes judíos». El griego dice simplemente «los judíos».
    reason: alternative_reading
  - marker: b
    text: O «su cuerpo». El griego usa «carne» (σάρξ), retenida aquí para preservar la formulación concreta y la tensión del pasaje.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐμάχοντο
  english_pob_choice: were arguing
  chosen_spanish: estaban discutiendo
  alternatives_spanish:
  - estaban peleando
  - estaban disputando
  - estaban riñendo
  lexicon: BDAG
  rationale: El imperfecto expresa una acción en curso. En español, «estaban discutiendo» comunica con naturalidad el conflicto sostenido sin intensificarlo indebidamente a combate físico.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - por tanto
  - entonces
  lexicon: BDAG
  rationale: Marca la continuación narrativa desde el contexto previo. «Así que» conserva el valor consecutivo en un español fluido y readable.
- source_word: πρὸς ἀλλήλους
  english_pob_choice: among themselves
  chosen_spanish: entre ellos
  alternatives_spanish:
  - unos con otros
  - entre sí
  lexicon: BDAG
  rationale: La expresión recíproca se vierte de forma idiomática con «entre ellos», que transmite disputa interna dentro del grupo.
- source_word: οἱ Ἰουδαῖοι
  english_pob_choice: the Jews
  chosen_spanish: los judíos
  alternatives_spanish:
  - los judeanos
  - los líderes judíos
  lexicon: BDAG
  rationale: El griego dice simplemente «los judíos». Se conserva esa forma directa en el texto principal por primacía del original, sin resolver en el texto la cuestión contextual del referente.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: y decían
  alternatives_spanish:
  - diciendo
  - al decir
  lexicon: BDAG
  rationale: El participio introduce el contenido del diálogo. En español, «y decían» suena natural y conserva la función discursiva.
- source_word: Πῶς δύναται
  english_pob_choice: How can
  chosen_spanish: ¿Cómo puede
  alternatives_spanish:
  - ¿Cómo es posible que pueda
  - ¿Cómo podría
  lexicon: BDAG
  rationale: Expresa la pregunta sobre capacidad o posibilidad con una forma directa y natural en español.
- source_word: οὗτος
  english_pob_choice: this man
  chosen_spanish: este hombre
  alternatives_spanish:
  - este
  - este individuo
  lexicon: BDAG
  rationale: El demostrativo tiene un matiz de distancia o desdén en contexto. «Este hombre» reproduce mejor ese tono que un simple «él».
- source_word: ἡμῖν
  english_pob_choice: us
  chosen_spanish: darnos
  alternatives_spanish:
  - dárnoslo
  - darnos a nosotros
  lexicon: BDAG
  rationale: El dativo indirecto se integra naturalmente en el verbo español «darnos», sin añadir material innecesario.
- source_word: δοῦναι
  english_pob_choice: give
  chosen_spanish: dar
  alternatives_spanish:
  - otorgar
  - proporcionar
  lexicon: BDAG
  rationale: El sentido básico de δίδωμι se mantiene con «dar», sin elevar ni suavizar el verbo.
- source_word: τὴν σάρκα αὐτοῦ
  english_pob_choice: his flesh
  chosen_spanish: su carne
  alternatives_spanish:
  - su cuerpo
  lexicon: BDAG
  rationale: Se preserva σάρξ con «carne», porque el pasaje mantiene la formulación concreta y la tensión literal del dicho. «Cuerpo» interpretaría demasiado pronto el término.
- source_word: φαγεῖν
  english_pob_choice: to eat
  chosen_spanish: a comer
  alternatives_spanish:
  - para comer
  - comer
  lexicon: BDAG
  rationale: Tras «dar» en español, la construcción más natural es «dar a comer». Conserva el infinitivo de finalidad/complemento sin perder la concreción del acto.
theological_decisions:
- issue: Referencia de οἱ Ἰουδαῖοι en Juan
  english_pob_reading: the Jews
  chosen_spanish_reading: los judíos
  alternative_spanish_readings:
  - los judeanos
  - los líderes judíos
  rationale: Se mantiene la lectura explícita del griego en el texto principal. No se sustituye por una clarificación contextual, porque la POB documenta la ambigüedad y prefiere conservarla en vez de resolverla editorialmente.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve source-level ambiguity and theological tension'
- issue: Traducción de σάρξ en un contexto concreto/literal
  english_pob_reading: flesh
  chosen_spanish_reading: carne
  alternative_spanish_readings:
  - cuerpo
  rationale: En este versículo la reacción de los oyentes depende de la materialidad chocante del término. «Carne» preserva la fuerza léxica de σάρξ y evita interpretar el dicho como si dijera simplemente «cuerpo».
  doctrine_reference: 'DOCTRINE.md Contested terms: σάρξ *sarx* → ''flesh'' (literal) / ''sinful nature'' (metaphorical)'
- issue: Registro de la formulación final del infinitivo
  english_pob_reading: to eat
  chosen_spanish_reading: a comer
  alternative_spanish_readings:
  - para comer
  - comer
  rationale: La construcción española con «dar a comer» comunica de modo idiomático la misma relación verbal del original, sin añadir una lectura sacramental ni suavizar la dureza del enunciado.
  doctrine_reference: DOCTRINE.md original-language primacy; avoid interpretive expansion
translation_notes:
  revision_awareness: The latest audited English revision pass reports no changes needed (model gpt-5.4, unchanged=true) and cross-check review shows high agreement. The Spanish draft therefore follows the stable English audit trail without introducing unreviewed reinterpretations.
  spanish_consistency_notes:
  - Se mantiene «judíos» en el texto principal y se documenta la alternativa contextual en nota, siguiendo el criterio de transparencia del POB.
  - Se conserva «carne» para σάρξ, evitando la tradicional «cuerpo» en el cuerpo principal porque el audit trail inglés retiene la concreción física del término.
  - La secuencia narrativa se vierte con conectores naturales («Así que», «y decían») para readability sin perder la relación lógica del griego.
  - El marcado de notas usa letras únicas y aparece anclado exactamente en el texto donde corresponde.
