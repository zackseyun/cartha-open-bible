lexical_decisions:
- source_word: λέγει
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - dice
  lexicon: BDAG
  rationale: El griego usa presente histórico, pero en español narrativo la forma natural y fiel es el pretérito simple «dijo». Conserva el valor de reporte sin sonar artificial.
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El dativo de destinatario de la palabra se expresa de forma idiomática en español con el complemento indirecto «le». El referente es Jesús en el contexto inmediato.
- source_word: εἷς ἐκ τῶν μαθητῶν αὐτοῦ
  english_pob_choice: One of his disciples
  chosen_spanish: Uno de sus discípulos
  alternatives_spanish:
  - Uno entre sus discípulos
  - Uno de entre sus discípulos
  lexicon: BDAG
  rationale: La construcción partitiva se rinde de manera natural con «uno de». «Discípulos» conserva el sentido relacional e instructivo de μαθηταί en los Evangelios.
- source_word: μαθητῶν
  english_pob_choice: disciples
  chosen_spanish: discípulos
  alternatives_spanish:
  - aprendices
  - alumnos
  lexicon: BDAG
  rationale: «Discípulos» es el equivalente bíblico y eclesialmente transparente para μαθηταί, sin perder el matiz de seguimiento y aprendizaje.
- source_word: Ἀνδρέας
  english_pob_choice: Andrew
  chosen_spanish: Andrés
  lexicon: N/A (nombre propio)
  rationale: Nombre propio transliterado al uso español estándar.
- source_word: ὁ ἀδελφὸς Σίμωνος Πέτρου
  english_pob_choice: Simon Peter’s brother
  chosen_spanish: hermano de Simón Pedro
  alternatives_spanish:
  - el hermano de Simón Pedro
  - hermano de Simón, Pedro
  lexicon: BDAG
  rationale: La construcción genitiva identifica a Andrés por parentesco. En español, «hermano de Simón Pedro» es la forma más natural y precisa, preservando la identificación compuesta del nombre propio.
- source_word: Σίμωνος Πέτρου
  english_pob_choice: Simon Peter
  chosen_spanish: Simón Pedro
  alternatives_spanish:
  - Simón, Pedro
  - Simón llamado Pedro
  lexicon: N/A (nombre propio)
  rationale: Se conserva la forma nominal familiar «Simón Pedro», que en español transmite de manera natural la identificación dual del personaje.
