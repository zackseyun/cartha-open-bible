    rationale: En Jn 6:67, μή en pregunta suele esperar respuesta negativa. El English POB preserva ese matiz en el texto principal; el español actual lo traslada solo a la nota y deja una pregunta neutral.
  - severity: low
    issue: «Así que» no es la mejor opción para οὖν en esta línea narrativa.
    rationale: «Entonces» suena más natural como continuación inmediata del relato; «Así que» puede sentirse más fuertemente inferencial o causal de lo necesario.
  - severity: medium
    issue: La nota al pie repite el texto principal en vez de dar una alternativa real.
    rationale: Si hay nota léxica, debe ofrecer una variante significativa. Aquí conviene poner como alternativa la formulación neutral sin negación explícita.
