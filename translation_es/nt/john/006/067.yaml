  verdict: revise
  source_alignment_summary: 'El borrador transmite bien la estructura básica: Jesús habla a los Doce y pregunta si ellos también desean irse. «Los Doce» refleja correctamente τοῖς δώδεκα, y «quieren irse» representa adecuadamente θέλετε ὑπάγειν. Sin embargo, la formulación principal omite en español la expectativa de respuesta negativa que aporta μή, matiz que el English POB sí decidió preservar en el texto principal, no solo en nota.'
  spanish_quality_summary: El español es natural y claro, pero «Así que» al inicio suena un poco más causal/conclusivo de lo necesario; «Entonces» fluye mejor como continuación narrativa. Además, la nota al pie actual no aporta una alternativa real, porque repite exactamente el texto principal. Conviene ajustar el texto principal para reflejar mejor μή y hacer que la nota preserve la alternativa más neutral.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. «Jesús» y «los Doce» están bien. No intervienen términos sensibles como Yahvé, Mesías, esclavo, carne, etc. La decisión clave es discursiva: representar μή con una pregunta negativa natural en español.'
  issues:
