translation:
  language: es
  text: 'Entonces Jesús les dijo a los Doce[a]: «¿No quieren irse también ustedes?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿También ustedes quieren irse?» El griego usa μή, que con frecuencia espera una respuesta negativa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - Entonces
  - Por eso
  lexicon: BDAG
  rationale: Marca continuidad narrativa e inferencial respecto del contexto inmediato. «Así que» suena natural en español actual y conserva la transición lógica sin sobrerreformular la relación.
- source_word: τοῖς δώδεκα
  english_pob_choice: to the Twelve
  chosen_spanish: a los Doce
  alternatives_spanish:
  - a los doce discípulos
  - a los doce
  lexicon: BDAG
  rationale: La expresión funciona como designación fija del grupo íntimo de Jesús. «Los Doce» conserva ese valor titular y evita explicitar «discípulos» sin base directa en el texto.
- source_word: Μὴ καὶ ὑμεῖς
  english_pob_choice: You do not want to ... too, do you?
  chosen_spanish: ¿También ustedes quieren irse?
  alternatives_spanish:
  - ¿No quieren irse también ustedes?
  - ¿Ustedes también quieren irse?
  lexicon: BDAG
  rationale: El griego usa μή en una pregunta, con fuerza que suele esperar una respuesta negativa. El español puede conservar esa tensión con una pregunta directa e implicativa; «también» refleja καί y la mención enfática de ὑμεῖς, sin añadir una negación explícita que suene menos natural.
- source_word: θέλετε
  english_pob_choice: want
  chosen_spanish: quieren
  alternatives_spanish:
  - desean
  - están dispuestos a
  lexicon: BDAG
  rationale: En este contexto θέλω expresa deseo o voluntad. «Quieren» es el equivalente más natural y claro en español para una pregunta directa.
- source_word: ὑπάγειν
  english_pob_choice: to go away
  chosen_spanish: irse
  alternatives_spanish:
  - alejarse
  - marcharse
  lexicon: BDAG
  rationale: El verbo indica alejarse de Jesús en el contexto inmediato. «Irse» es idiomático en español y conserva el movimiento de salida sin sobreinterpretar con un matiz más específico de «marcharse».
theological_decisions:
- issue: Fuerza interrogativa de μή
  english_pob_reading: A negative-question form that implies expectation of 'no' without making it an absolute assertion
  chosen_spanish_reading: Una pregunta que sugiere expectativa de respuesta negativa, sin convertirla en afirmación ni suavizarla en exceso
  alternative_spanish_readings:
  - ¿No quieren irse también ustedes?
  - ¿También ustedes quieren irse?
  rationale: El griego μή en preguntas suele implicar que el hablante espera un «no». En español, una formulación interrogativa simple puede conservar esa expectativa implícita sin resolverla de manera explicativa o catequética.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia y no requiere revisión adicional; se mantuvo la decisión inglesa de preservar el valor pragmático de μή, pero se adaptó al español con una interrogación natural.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino cuando corresponda; aquí no aparece.
  - «Los Doce» conserva el valor de designación grupal fija.
  - «Irse» se eligió por naturalidad y porque el contexto de los discípulos que se apartan ya orienta el sentido hacia salir de Jesús.
