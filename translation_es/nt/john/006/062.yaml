  glossary_alignment: No hay conflictos con la terminología del proyecto. «el Hijo del Hombre» está bien. «ascender» es adecuado para ἀναβαίνοντα. «adonde estaba antes» preserva la dirección implícita y evita sobreinterpretar la preexistencia más allá del texto.
