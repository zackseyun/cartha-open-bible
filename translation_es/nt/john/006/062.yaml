  rationale: Se revisa la apertura para lograr un español natural y ampliamente legible sin perder la fuerza retórica-condicional de ἐὰν οὖν. «¿Qué pasaría si» comunica mejor la función de «Then what if» que el calco «¿qué si». «Llegaran a ver» conserva el matiz prospectivo de θεωρῆτε en esta hipótesis. Se mantiene «ascender» y «adonde estaba antes» por fidelidad al griego y a la decisión teológica auditada de no explicitar «cielo» ni «Padre».
