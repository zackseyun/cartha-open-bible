translation:
  language: es
  text: Entonces, ¿qué pasaría si llegaran a ver al Hijo del Hombre ascender[a] adonde estaba antes?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Entonces, si llegaran a ver al Hijo del Hombre ascender adonde estaba antes». El griego es una pregunta condicional retórica.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν οὖν
  english_pob_choice: Then what if
  chosen_spanish: Entonces, ¿qué si
  alternatives_spanish:
  - Entonces, si
  - ¿Qué pasaría si
  lexicon: BDAG
  rationale: La combinación introduce una pregunta condicional-retórica que sigue al tropiezo previo. «Entonces, ¿qué si» conserva la fuerza inferencial de οὖν y la condición de ἐὰν sin volverse rígida en español.
- source_word: θεωρῆτε
  english_pob_choice: you were to see
  chosen_spanish: vieran
  alternatives_spanish:
  - vieran con atención
  - observaran
  - contemplaran
  lexicon: BDAG
  rationale: θεωρέω implica ver con atención o presenciar. En una condición retórica, «vieran» suena natural en español y mantiene el valor prospectivo sin añadir interpretación.
- source_word: τὸν υἱὸν τοῦ ἀνθρώπου
  english_pob_choice: the Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - el Hijo de hombre
  lexicon: BDAG
  rationale: Se conserva el título reconocido de Jesús, con su resonancia daniélica y mesiánica, en lugar de parafrasearlo.
- source_word: ἀναβαίνοντα
  english_pob_choice: ascending
  chosen_spanish: ascender
  alternatives_spanish:
  - subir
  - ir subiendo
  - elevarse
  lexicon: BDAG
  rationale: El participio expresa movimiento hacia arriba; «ascender» conserva mejor el tono elevado y posible sentido celestial que «subir».
- source_word: ὅπου ἦν τὸ πρότερον
  english_pob_choice: to where he was before
  chosen_spanish: adonde estaba antes
  alternatives_spanish:
  - donde estaba antes
  - adonde estaba previamente
  lexicon: BDAG
  rationale: «Adonde» refleja la dirección implícita del movimiento, y «estaba antes» preserva la referencia temporal sin añadir «cielo» ni «Padre», que el griego no nombra explícitamente.
theological_decisions:
- issue: Si traducir la frase como una afirmación explícita de preexistencia o de regreso al cielo
  english_pob_reading: Retain the wording 'to where he was before' without adding interpretive expansion.
  chosen_spanish_reading: Mantener «adonde estaba antes» sin expansión interpretativa.
  alternative_spanish_readings:
  - al cielo, adonde estaba antes
  - de regreso al Padre, adonde estaba antes
  rationale: El griego implica preexistencia y ascenso, pero el versículo no menciona de forma explícita ni el cielo ni al Padre. La traducción conserva la tensión cristológica sin importarla más allá del texto.
  doctrine_reference: Afirmaciones; filosofía de traducción §§1, 3
- issue: 'Naturaleza de la cláusula: interrogativa retórica condicional'
  english_pob_reading: The Greek is a rhetorical conditional question.
  chosen_spanish_reading: Una pregunta condicional retórica.
  alternative_spanish_readings:
  - Una condición simple
  - Una pregunta hipotética
  rationale: La forma del griego no pide una simple hipótesis neutral, sino una pregunta que desafía la incredulidad del oyente. La puntuación interrogativa ayuda a reflejarlo.
  doctrine_reference: Sintaxis del griego; nota auditada en POB inglés
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior añadiendo el anclaje [a] en el texto español junto a la alternativa señalada por la nota. No hay otros cambios respecto al sentido auditado del pasaje.
  spanish_consistency_notes:
  - Se preserva «Hijo del Hombre» como título fijo, no como paráfrasis.
  - «Ascender» mantiene el matiz elevado del participio griego.
  - «Adonde estaba antes» evita añadir interpretaciones doctrinales no explicitadas en el versículo.
  - La puntuación interrogativa refleja la fuerza retórica de la construcción griega.
