translation:
  language: es
  text: Al anochecer, sus discípulos bajaron al mar[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al lago». El cuerpo de agua es el mar de Galilea, que técnicamente es un lago, pero el texto griego dice «mar» (θάλασσα).
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὡς δὲ
  english_pob_choice: Now when
  chosen_spanish: Cuando ya
  alternatives_spanish:
  - Y cuando
  - Ahora cuando
  lexicon: BDAG
  rationale: La combinación introduce un giro temporal narrativo. En español, "Cuando ya" comunica con naturalidad la transición y deja oír el matiz de avance temporal de ὡς δέ sin añadir explicaciones ajenas al texto.
- source_word: ὀψία ἐγένετο
  english_pob_choice: evening came
  chosen_spanish: era de noche
  alternatives_spanish:
  - llegó la tarde
  - anocheció
  lexicon: BDAG
  rationale: El griego expresa el inicio de la noche o del atardecer. "Era de noche" suena natural en español y conserva el valor idiomático del cambio de hora; evita forzar una imagen demasiado literal que resulte menos idiomática en español.
- source_word: κατέβησαν
  english_pob_choice: went down
  chosen_spanish: bajaron
  alternatives_spanish:
  - descendieron
  - fueron hacia abajo
  lexicon: BDAG
  rationale: El verbo καταβαίνω denota movimiento descendente. "Bajaron" reproduce ese movimiento de forma clara y natural en español, manteniendo la perspectiva narrativa.
- source_word: οἱ μαθηταὶ αὐτοῦ
  english_pob_choice: his disciples
  chosen_spanish: sus discípulos
  alternatives_spanish:
  - los discípulos de él
  lexicon: BDAG
  rationale: La construcción posesiva se expresa de forma normal en español como "sus discípulos". Se conserva la relación de pertenencia sin calco innecesario.
- source_word: ἐπὶ τὴν θάλασσαν
  english_pob_choice: to the sea
  chosen_spanish: al mar
  alternatives_spanish:
  - al lago
  - hacia el mar
  lexicon: BDAG
  rationale: El griego dice θάλασσα, literalmente "mar". Aunque el referente histórico es el mar de Galilea, el texto fuente usa "mar", por lo que se conserva esa elección; en español "al mar" mantiene la primacía del original y sigue siendo claro en el contexto.
translation_notes:
  revision_awareness: El texto griego y el contexto de auditoría en inglés muestran alta concordancia y no requieren revisión textual ni decisión teológica adicional para este versículo. La única tensión léxica relevante es θάλασσα, que en el uso histórico alude al mar de Galilea; en español se conserva el vocablo del original sin domesticarlo a "lago".
  spanish_consistency_notes:
  - Se mantuvo un estilo narrativo simple y sobrio, coherente con una sección de relato.
  - Se conservó "mar" para θάλασσα, en continuidad con la prioridad del texto original sobre la aclaración geográfica.
  - No se añadieron notas de pie porque el español elegido no introduce una ambigüedad nueva que requiera alternativa explícita en este versículo.
