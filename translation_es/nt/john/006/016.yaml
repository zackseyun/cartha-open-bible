review_pass:
  verdict: revise
  source_alignment_summary: El borrador capta bien κατέβησαν como «bajaron», οἱ μαθηταὶ αὐτοῦ como «sus discípulos» y ἐπὶ τὴν θάλασσαν como «al mar». Sin embargo, ὀψία ἐγένετο significa la llegada del atardecer/la tarde avanzada, no «ya era de noche», que desplaza la escena a un momento más tardío que el griego. Además, el English POB conserva una nota léxica sobre «sea/lake» que debe mantenerse en español.
  spanish_quality_summary: «Cuando ya era de noche» es natural, pero menos fiel al valor temporal del original. Una formulación como «Al anochecer» o «Cuando cayó la noche» sería más cercana; «Al anochecer» es especialmente concisa y idiomática. También conviene conservar la nota sobre «mar/lago» para reflejar la decisión léxica documentada.
  glossary_alignment: 'No hay términos del glosario principal en juego salvo la fidelidad a θάλασσα como «mar», que el borrador mantiene correctamente. Debe añadirse la alternativa en nota: «O “al lago” ... el griego dice “mar” (θάλασσα)».'
  issues:
  - severity: medium
    issue: «era de noche» sobretraduce ὀψία ἐγένετο
    rationale: El griego describe la llegada del atardecer/anochecer, no un estado ya establecido de noche cerrada. La redacción actual adelanta demasiado el tiempo narrativo.
  - severity: medium
    issue: Falta la nota léxica sobre «mar/lago»
    rationale: El English POB documenta explícitamente la alternativa y la razón de conservar «sea». La revisión española debe preservar esa información auditada.
  revised_spanish_text: Al anochecer, sus discípulos bajaron al mar[a].
  revised_footnotes:
  - marker: a
    text: O «al lago». El cuerpo de agua es el mar de Galilea, que técnicamente es un lago, pero el texto griego dice «mar» (θάλασσα).
    reason: lexical_alternative
  revision_rationale: Se ajusta el tiempo narrativo para reflejar con más precisión ὀψία ἐγένετο y se restaura la nota léxica documentada sobre θάλασσα/«mar» frente a «lago». La revisión sigue siendo natural y digna en español.
