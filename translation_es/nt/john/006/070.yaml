translation:
  language: es
  text: 'Jesús les respondió[a]: «¿No los elegí yo a ustedes, a los Doce? Sin embargo, uno de ustedes es un diablo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un calumniador». La palabra griega puede denotar a un falso acusador o, en muchos contextos, al Diablo. Aquí la expresión es cualitativa más que una identificación directa con Satanás.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: BDAG
  rationale: En el diálogo narrativo, ἀποκρίνομαι funciona como fórmula de respuesta. «Respondió» es natural en español bíblico actual y conserva el valor de contestación sin forzar un matiz extra.
- source_word: Οὐκ ἐγὼ ... ἐξελεξάμην;
  english_pob_choice: Did I not choose
  chosen_spanish: ¿No los elegí yo ...?
  alternatives_spanish:
  - ¿Acaso no los elegí yo ...?
  - ¿No los escogí yo ...?
  lexicon: BDAG
  rationale: El aoristo en pregunta negativa espera respuesta afirmativa. En español, la pregunta retórica «¿No los elegí yo...?» preserva bien esa fuerza. «Elegí» mantiene la elección personal; «escogí» es posible, pero «elegí» suena más directo aquí.
- source_word: ὑμᾶς τοὺς δώδεκα
  english_pob_choice: you, the Twelve
  chosen_spanish: a ustedes, los Doce
  alternatives_spanish:
  - a ustedes, los doce
  - a ustedes, el grupo de los Doce
  lexicon: BDAG
  rationale: El artículo con δώδεκα señala un grupo identificado. En español, «los Doce» transmite la designación del grupo discipular con naturalidad y evita una lectura meramente numérica.
- source_word: καὶ
  english_pob_choice: Yet
  chosen_spanish: Y
  alternatives_spanish:
  - Pero
  - Sin embargo
  lexicon: BDAG
  rationale: Aunque el inglés POB suaviza el contraste con «Yet», en español la oposición queda clara por el contexto inmediato. «Y» reproduce la coordinación del griego sin añadir una adversatividad más fuerte de la que exige el texto.
- source_word: ἐξ ὑμῶν εἷς
  english_pob_choice: one of you
  chosen_spanish: uno de ustedes
  alternatives_spanish:
  - uno entre ustedes
  - uno de ustedes mismos
  lexicon: BDAG
  rationale: La construcción partitiva se expresa de forma natural con «uno de ustedes». Conserva la relación interna del grupo sin sobreexplicarla.
- source_word: διάβολός
  english_pob_choice: a devil
  chosen_spanish: un diablo
  alternatives_spanish:
  - un acusador
  - un calumniador
  - el diablo
  lexicon: BDAG
  rationale: Se mantiene el valor lexical fuerte de διάβολος con «diablo», que en español conserva el peso retórico y la tensión del original. «Acusador» o «calumniador» explicitan un posible matiz semántico, pero debilitan la dureza de la expresión. Se evita «el diablo» porque el griego no lleva artículo y la lectura es cualitativa, no una identificación directa con Satanás.
theological_decisions:
- issue: 'Sentido de διάβολος sin artículo: identificación con Satanás o caracterización cualitativa'
  english_pob_reading: a devil
  chosen_spanish_reading: un diablo
  alternative_spanish_readings:
  - el diablo
  - un calumniador
  rationale: 'El texto no dice que Jesús identifique a Judas con Satanás; el sustantivo anartro describe su carácter de modo cualitativo. «Un diablo» preserva esa tensión: es una afirmación fuerte, pero no convierte automáticamente la frase en una identificación ontológica con el Diablo.'
  doctrine_reference: Preservar la tensión teológica del original y la lectura cualitativa del predicado anartro.
translation_notes:
  revision_awareness: El control de revisión indica acuerdo alto y sin cambios necesarios respecto del último pase; por tanto, esta versión mantiene la lectura cualitativa de διάβολος, la designación grupal «los Doce» y la fuerza retórica de la pregunta negativa sin introducir suavizaciones innecesarias.
  spanish_consistency_notes:
  - Se usó «Jesús» para Ἰησοῦς, «los Doce» como designación grupal y «un diablo» para conservar la dureza lexical del predicado griego.
  - La puntuación española ajusta la cita directa con dos puntos y comillas angulares, manteniendo el orden narrativo del original.
  - La nota al pie se ancló en «diablo» para preservar la alternativa lexical documentada sin duplicar la tensión teológica en el cuerpo del texto.
