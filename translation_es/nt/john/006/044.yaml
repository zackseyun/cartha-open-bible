translation:
  language: es
  text: Nadie puede venir a mí a menos que el Padre que me envió lo[a] lleve hacia mí[b], y yo lo resucitaré en el último día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El pronombre masculino singular tiene fuerza representativa; la afirmación se aplica de manera general, no solo a varones.
    reason: lexical_alternative
  - marker: b
    text: O «lo arrastre» o «tire de él». El verbo griego puede tener un sentido más fuerte de jalar o tirar; «lleve hacia mí» se usa en el texto principal para preservar la idea de movimiento hacia Jesús sin imponer una explicación teológica específica sobre cómo el Padre trae a una persona al Hijo.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐδεὶς
  english_pob_choice: No one
  chosen_spanish: Nadie
  alternatives_spanish:
  - Ninguna persona
  - Ninguno
  lexicon: BDAG
  rationale: El indefinido negativo se expresa de forma natural en español como 'Nadie', preservando la negación universal sin calco innecesario.
- source_word: δύναται
  english_pob_choice: is able
  chosen_spanish: puede
  alternatives_spanish:
  - es capaz de
  lexicon: BDAG
  rationale: '''Puede'' comunica adecuadamente la capacidad o posibilidad real en español. ''Es capaz de'' sería más literal, pero suena más pesado en este contexto.'
- source_word: ἐλθεῖν πρός με
  english_pob_choice: to come to me
  chosen_spanish: venir a mí
  alternatives_spanish:
  - acercarse a mí
  - llegar a mí
  lexicon: BDAG
  rationale: '''Venir a mí'' conserva el movimiento relacional y salvífico de πρός με en Juan, con español natural y transparente.'
- source_word: ὁ πατὴρ ὁ πέμψας με
  english_pob_choice: the Father who sent me
  chosen_spanish: el Padre que me envió
  alternatives_spanish:
  - el Padre, el que me envió
  - el Padre que me ha enviado
  lexicon: BDAG
  rationale: La cláusula participial se vierte naturalmente como una relativa en español. 'Me envió' mantiene el hecho del envío sin introducir un matiz aspectual no explicitado por el griego.
- source_word: ἑλκύσῃ
  english_pob_choice: draws
  chosen_spanish: atraiga
  alternatives_spanish:
  - arrastre
  - jale
  - tire de
  lexicon: BDAG
  rationale: '''Atraiga'' preserva la fuerza de un movimiento que lleva hacia Jesús sin decidir de antemano entre ''draws'', ''drags'' o ''pulls''. En español, ''atraer'' mantiene mejor la tensión teológica que opciones más físicas o más débiles.'
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a esa persona
  - a él
  lexicon: BDAG
  rationale: El griego usa pronombre masculino singular con fuerza representativa. En español, el clítico 'lo' conserva la referencia sin marcar género humano de modo explícito, pero sin convertir la frase en una paráfrasis neutralizante.
- source_word: κἀγὼ
  english_pob_choice: and I
  chosen_spanish: y yo
  alternatives_spanish:
  - y yo mismo
  lexicon: BDAG
  rationale: La crasis se refleja de forma simple y natural con 'y yo', manteniendo el contraste enfático sin sobrecargar el español.
- source_word: ἀναστήσω
  english_pob_choice: will raise ... up
  chosen_spanish: resucitaré
  alternatives_spanish:
  - levantaré
  - volveré a levantar
  lexicon: BDAG
  rationale: En este contexto escatológico, 'resucitaré' comunica directamente el sentido de ἀναστήσω. 'Levantaré' es posible, pero en español puede sonar menos explícito respecto de la resurrección final.
- source_word: ἐν τῇ ἐσχάτῃ ἡμέρᾳ
  english_pob_choice: on the last day
  chosen_spanish: en el último día
  alternatives_spanish:
  - el día postrero
  - en el día final
  lexicon: BDAG
  rationale: '''En el último día'' es la formulación natural y fiel del referente escatológico, manteniendo la ubicación temporal del griego.'
theological_decisions:
- issue: Valor de ἑλκύσῃ en un contexto soteriológico debatido
  english_pob_reading: draws
  chosen_spanish_reading: atraiga
  alternative_spanish_readings:
  - arrastre
  - jale
  - tire de
  rationale: Se preserva la tensión del verbo sin resolverla doctrinalmente. 'Atraiga' evita imponer una interpretación mecánica o violentamente física, pero sigue implicando una acción eficaz del Padre que lleva a la persona hacia Jesús.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
- issue: Pronombre masculino singular αὐτόν con fuerza representativa
  english_pob_reading: him
  chosen_spanish_reading: lo
  alternative_spanish_readings:
  - a esa persona
  - a él
  rationale: Se mantiene la referencia gramatical del singular masculino sin neutralizarla innecesariamente. En español, 'lo' permite un referente representativo general sin perder fidelidad a la forma del griego.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral.'
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el audit trail inglés: conserva la negación universal, la capacidad, el movimiento hacia Jesús, la cláusula relativa del Padre que envió al Hijo, el verbo soteriológicamente debatido ἑλκύσῃ, el pronombre masculino representativo y la promesa de resurrección escatológica. No se detectaron revisiones posteriores que alteren la lectura de base.'
  spanish_consistency_notes:
  - Se usó 'Padre' y no 'Dios' porque el texto distingue claramente al Padre como sujeto de la acción.
  - Se prefirió 'atraiga' en lugar de un término más duro o más débil para no resolver la tensión lexical de ἑλκύσῃ.
  - Se mantuvo 'lo' como referente singular representativo, consistente con una política de fidelidad gramatical.
  - '''Resucitaré'' expresa mejor en español el sentido escatológico de ἀναστήσω que un simple ''levantaré''.'
