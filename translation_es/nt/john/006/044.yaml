base_translation:
  language: en
  yaml_path: translation/nt/john/006/044.yaml
  text: No one is able to come to me unless the Father who sent me draws him[b][a], and I will raise him up on the last day.
  footnotes:
  - marker: a
    text: Or 'drags him' or 'pulls him.' The Greek verb can carry a stronger sense of drawing or pulling; 'draws' is used in the main text to preserve the wording without forcing a particular theological explanation of how the Father brings a person to the Son.
    reason: lexical_alternative
  - marker: b
    text: The Greek says 'him' with representative force; the statement applies generally, not only to males.
    reason: lexical_alternative
