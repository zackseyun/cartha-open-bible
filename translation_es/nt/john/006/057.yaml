translation:
  language: es
  text: Así como el Padre viviente me envió, y yo vivo por causa del Padre[b], así también el que se alimenta de mí[a] vivirá por causa de mí[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el que me come'. El verbo griego es vívido y concreto, y literalmente se refiere a comer/masticar.
    reason: lexical_alternative
  - marker: b
    text: O 'por medio del Padre' y 'por medio de mí'. La preposición griega puede entenderse con sentido causal o instrumental; aquí el texto principal usa el sentido causal para preservar el paralelismo Padre-Hijo / Hijo-creyente.
    reason: alternative_reading
lexical_decisions:
- source_word: καθὼς
  english_pob_choice: Just as
  chosen_spanish: Así como
  alternatives_spanish:
  - Como
  - Tal como
  lexicon: BDAG
  rationale: Introduce una comparación directa y natural en español. 'Así como' preserva la relación paralela que gobierna toda la oración.
- source_word: ὁ ζῶν πατὴρ
  english_pob_choice: the living Father
  chosen_spanish: el Padre viviente
  alternatives_spanish:
  - el Padre que vive
  - el Padre dador de vida
  lexicon: BDAG
  rationale: '''ὁ ζῶν'' funciona como participio atributivo con ''πατήρ''. ''Padre viviente'' conserva la fuerza atributiva y la imagen de vida divina sin ampliar indebidamente a ''dador de vida''.'
- source_word: ἀπέστειλέν
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - ha enviado
  - comisionó
  lexicon: BDAG
  rationale: El aoristo indicativo se vierte de manera simple como pasado puntual. 'Envió' suena natural en español y mantiene el paralelismo narrativo.
- source_word: ζῶ
  english_pob_choice: I live
  chosen_spanish: yo vivo
  alternatives_spanish:
  - yo estoy vivo
  lexicon: BDAG
  rationale: El presente verbal expresa una realidad en curso. 'Yo vivo' conserva el movimiento del verbo y el paralelo con 'vivirá' al final del versículo.
- source_word: διὰ τὸν πατέρα
  english_pob_choice: because of the Father
  chosen_spanish: por causa del Padre
  alternatives_spanish:
  - a causa del Padre
  - por el Padre
  - por medio del Padre
  lexicon: BDAG
  rationale: Con διά + acusativo aquí puede leerse en sentido causal o instrumental. 'Por causa del Padre' mantiene la opción causal del POB inglés y evita sugerir solo mediación instrumental.
- source_word: ὁ τρώγων με
  english_pob_choice: the one who feeds on me
  chosen_spanish: el que se alimenta de mí
  alternatives_spanish:
  - el que come de mí
  - el que me come
  - quien se alimenta de mí
  lexicon: BDAG
  rationale: Τρώγω es un verbo vívido y concreto de comer/masticar. 'Se alimenta de mí' conserva la fuerza concreta sin sonar tan áspero como 'me come' en español, y sigue permitiendo la lectura literal de la imagen.
- source_word: κἀκεῖνος
  english_pob_choice: so also ... he
  chosen_spanish: así también
  alternatives_spanish:
  - él también
  - ese también
  lexicon: BDAG
  rationale: El pronombre es enfático. En español su fuerza queda bien representada por la correlación 'así también' dentro de la comparación.
- source_word: ζήσει
  english_pob_choice: will live
  chosen_spanish: vivirá
  alternatives_spanish:
  - tendrá vida
  - llegará a vivir
  lexicon: BDAG
  rationale: El futuro se conserva de manera directa para mantener el paralelo con 'yo vivo' y la promesa de vida del versículo.
- source_word: δι’ ἐμέ
  english_pob_choice: because of me
  chosen_spanish: por causa de mí
  alternatives_spanish:
  - a causa de mí
  - por medio de mí
  - a través de mí
  lexicon: BDAG
  rationale: Se mantiene la misma relación causal elegida para διὰ τὸν πατέρα, resaltando el paralelo Padre-Hijo / Hijo-creyente sin imponer solo un sentido instrumental.
theological_decisions:
- issue: Relación de vida del Hijo con el Padre en διὰ τὸν πατέρα
  english_pob_reading: I live because of the Father
  chosen_spanish_reading: yo vivo por causa del Padre
  alternative_spanish_readings:
  - yo vivo por medio del Padre
  - yo vivo a causa del Padre
  rationale: La traducción expresa dependencia relacional dentro de la economía de la misión, sin sugerir inferioridad ontológica ni negar la plena deidad del Hijo. Conserva la tensión del texto y su paralelismo con 'por causa de mí'.
  doctrine_reference: Credo Niceno-Constantinopolitano (381); Definición de Calcedonia (451)
- issue: Fuerza concreta de ὁ τρώγων με
  english_pob_reading: the one who feeds on me
  chosen_spanish_reading: el que se alimenta de mí
  alternative_spanish_readings:
  - el que come de mí
  - el que me come
  rationale: Juan 6 admite lecturas sacramentales y metafóricas/relacionales en distintas tradiciones. La formulación conserva el acto concreto de alimentarse sin cerrar indebidamente la interpretación hacia una sola lectura doctrinal.
  doctrine_reference: Conservar la tensión teológica sin resolverla
translation_notes:
  revision_awareness: El borrador sigue de cerca el paquete fuente griego y el tramo de auditoría inglesa. Se conserva la comparación de καθώς, el participio atributivo 'el Padre viviente', el valor concreto de τρώγων y la ambigüedad de διά + acusativo, sin mecanizar el inglés ni resolver prematuramente la tensión interpretativa.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo exija; aquí no aparece el nombre divino.
  - Se mantiene 'Padre' y 'Hijo' con mayúscula reverente en un contexto cristológico.
  - '''Se alimenta de mí'' busca ser natural en español y a la vez conservar la concreción del verbo griego.'
  - Las notas usan marcadores únicos y aparecen ancladas en el texto donde corresponden.
