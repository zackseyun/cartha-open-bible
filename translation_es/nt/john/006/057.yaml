base_translation:
  language: en
  yaml_path: translation/nt/john/006/057.yaml
  text: Just as the living Father sent me[a], and I live because of the Father[b], so also the one who feeds on me will live because of me.
  footnotes:
  - marker: a
    text: Or 'the one who eats me.' The Greek verb is vivid and concrete, literally referring to eating/chewing.
    reason: lexical_alternative
  - marker: b
    text: Or 'through the Father' and 'through me.' The Greek preposition can be understood in a causal or instrumental sense; here the main text uses the causal sense to preserve the Father-Son / Son-believer parallel.
    reason: alternative_reading
