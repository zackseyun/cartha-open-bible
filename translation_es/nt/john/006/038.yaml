translation:
  language: es
  text: Porque he bajado del cielo, no para hacer mi propia voluntad, sino la voluntad del que me envió.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Aquí ὅτι introduce la explicación de lo dicho antes; en español, «Porque» conserva bien el valor causal/explicativo y suena natural en registro bíblico contemporáneo.
- source_word: καταβέβηκα
  english_pob_choice: I have come down
  chosen_spanish: he descendido
  alternatives_spanish:
  - he bajado
  - he venido del cielo
  lexicon: BDAG
  rationale: El perfecto expresa una acción concluida con relevancia presente. «He descendido» mantiene con más precisión la imagen verbal de καταβαίνω que «he bajado», y conserva el registro algo más solemne del original.
- source_word: ἀπὸ τοῦ οὐρανοῦ
  english_pob_choice: from heaven
  chosen_spanish: del cielo
  alternatives_spanish:
  - desde el cielo
  - de los cielos
  lexicon: BDAG
  rationale: En español, «cielo» es la forma natural y estándar para el ámbito celestial de Juan. «Del cielo» preserva la imagen espacial y la resonancia teológica sin volverla artificial.
- source_word: οὐχ ἵνα
  english_pob_choice: not to
  chosen_spanish: no para
  alternatives_spanish:
  - no a fin de
  - no con el propósito de
  lexicon: BDAG
  rationale: La secuencia expresa finalidad negada. «No para» es idiomático en español y conserva la fuerza de propósito sin añadir una explicación más pesada que el griego no exige.
- source_word: ποιῶ
  english_pob_choice: do
  chosen_spanish: hacer
  alternatives_spanish:
  - cumplir
  - realizar
  lexicon: BDAG
  rationale: «Hacer» es el equivalente más directo y mantiene el paralelismo con el sustantivo θέλημα. Otras opciones introducen matices interpretativos adicionales.
- source_word: τὸ θέλημα τὸ ἐμὸν
  english_pob_choice: my own will
  chosen_spanish: mi propia voluntad
  alternatives_spanish:
  - mi voluntad
  - lo que yo quiero
  lexicon: BDAG
  rationale: «Voluntad» conserva la fuerza formal y teológica de θέλημα mejor que «querer» o «lo que yo quiero». El posesivo enfático se expresa de manera natural con «mi propia».
- source_word: τὸ θέλημα τοῦ πέμψαντός με
  english_pob_choice: the will of the one who sent me
  chosen_spanish: la voluntad del que me envió
  alternatives_spanish:
  - la voluntad de quien me envió
  - la voluntad de mi enviado
  lexicon: BDAG
  rationale: «El que me envió» reproduce con claridad el participio sustantivado y preserva la relación personal sin sobreinterpretarla. Mantiene también el paralelismo con la primera mitad del versículo.
theological_decisions:
- issue: Origen celestial de Jesús
  english_pob_reading: I have come down from heaven.
  chosen_spanish_reading: he descendido del cielo.
  alternative_spanish_readings:
  - he venido del cielo
  - bajé del cielo
  rationale: La frase se traduce de forma directa como afirmación de procedencia celestial, sin reducirla a mera comisión profética. «He descendido del cielo» conserva la fuerza cristológica del texto y el sentido de movimiento desde el ámbito celestial.
  doctrine_reference: Juan 6:38; afirmación cristológica coherente con la tradición nicena, sin añadir formulación doctrinal ajena al verso.
- issue: Distinción entre voluntades
  english_pob_reading: Use 'will' in both instances and preserve the contrast without explaining it away.
  chosen_spanish_reading: usar «voluntad» en ambos casos y preservar el contraste
  alternative_spanish_readings:
  - traducir como «lo que yo quiero» / «lo que él quiere»
  - armonizar las dos expresiones
  rationale: El verso mantiene una distinción real entre la voluntad del Hijo y la del que lo envió en el plano de misión y obediencia. «Voluntad» en ambos miembros preserva esa tensión teológica sin resolverla prematuramente.
  doctrine_reference: Teología joánica de la obediencia del Hijo; principio de traducción de preservar la tensión textual.
translation_notes:
  revision_awareness: El texto inglés POB y el análisis cruzado muestran alto acuerdo y no requieren revisiones sustantivas. La versión española sigue la decisión del POB de mantener el perfecto de movimiento, el valor final negado de οὐχ ἵνα y el contraste explícito entre «mi propia voluntad» y «la voluntad del que me envió».
  spanish_consistency_notes:
  - Se mantiene «voluntad» para θέλημα en ambos miembros del versículo.
  - Se conserva el perfecto con «he descendido» para reflejar la relevancia presente de καταβέβηκα.
  - «Del cielo» traduce ἀπὸ τοῦ οὐρανοῦ de manera natural en español bíblico contemporáneo.
  - No se introducen notas al pie porque el verso no presenta variantes textuales o ambigüedades que requieran marcación adicional en esta sección.
