    rationale: Aunque «descender» no es incorrecto y preserva la imagen espacial, el POB inglés eligió ‘I have come down’ en vez de una forma más formal como ‘I have descended’. En español, «he bajado del cielo» comunica mejor esa naturalidad y sigue preservando el origen celestial sin debilitar la cristología.
  revised_spanish_text: Porque he bajado del cielo, no para hacer mi propia voluntad, sino la voluntad del que me envió.
