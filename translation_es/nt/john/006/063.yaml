translation:
  language: es
  text: Es el Espíritu[a] el que da vida; la carne[b] no aprovecha nada. Las palabras que yo he hablado a ustedes son espíritu[c] y son vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «espíritu». El griego πνεῦμα puede significar «Espíritu» o «espíritu»; aquí el contexto favorece al Espíritu Santo.
    reason: alternative_reading
  - marker: b
    text: «Carne» puede referirse de manera amplia a lo meramente humano; traducirla aquí como «naturaleza pecaminosa» sería más interpretativo de lo que el griego exige.
    reason: lexical_alternative
  - marker: c
    text: O «son Espíritu y vida» o «son espirituales y vivificadoras». La redacción griega es comprimida y cualitativa.
    reason: alternative_reading
lexical_decisions:
- source_word: πνεῦμα
  english_pob_choice: Spirit
  chosen_spanish: Espíritu
  alternatives_spanish:
  - espíritu
  lexicon: BDAG
  rationale: En la primera cláusula, el sujeto articular τὸ πνεῦμα en contexto joánico apunta de manera natural al Espíritu Santo. En español, la mayúscula en «Espíritu» ayuda a señalar ese referente probable sin cambiar la base griega. Se conserva la alternativa semántica con la nota para no borrar la ambigüedad léxica de πνεῦμα.
- source_word: ζῳοποιοῦν
  english_pob_choice: who gives life
  chosen_spanish: el que da vida
  alternatives_spanish:
  - que da vida
  - vivificante
  lexicon: BDAG
  rationale: 'El participio presente expresa acción en curso: «el que da vida» mantiene el valor verbal y suena natural en español con sujeto personal. «Vivificante» sería más adjetival y menos transparente para el movimiento verbal del griego.'
- source_word: σὰρξ
  english_pob_choice: flesh
  chosen_spanish: carne
  alternatives_spanish:
  - naturaleza humana
  - naturaleza pecaminosa
  - cuerpo
  lexicon: BDAG
  rationale: Se retiene «carne» porque preserva la tensión juanina sin resolverla de modo doctrinal excesivo. «Naturaleza pecaminosa» sería más interpretativo de lo que exige el griego; «carne» deja oír el contraste entre lo humano-meramente natural y el Espíritu.
- source_word: ὠφελεῖ οὐδέν
  english_pob_choice: benefits nothing
  chosen_spanish: no aprovecha nada
  alternatives_spanish:
  - no beneficia en nada
  - no sirve de nada
  lexicon: BDAG
  rationale: La expresión idiomática significa no traer beneficio o provecho. «No aprovecha nada» comunica el absoluto de οὐδέν con español natural y conserva la fuerza negativa.
- source_word: ῥήματα
  english_pob_choice: words
  chosen_spanish: palabras
  alternatives_spanish:
  - dichos
  - las cosas que he dicho
  lexicon: BDAG
  rationale: ῥήματα designa palabras/expresiones dichas. «Palabras» es la correspondencia más directa y adecuada para el registro bíblico en español.
- source_word: λελάληκα
  english_pob_choice: I have spoken
  chosen_spanish: he hablado
  alternatives_spanish:
  - he dicho
  lexicon: BDAG
  rationale: El perfecto conserva la acción pronunciada con relevancia presente. «He hablado» mantiene esa forma y su vínculo con «palabras» mejor que un pasado simple.
- source_word: πνεῦμά ἐστιν
  english_pob_choice: are spirit
  chosen_spanish: son espíritu
  alternatives_spanish:
  - son el Espíritu
  - son espirituales
  lexicon: BDAG
  rationale: En la cláusula final, el predicado anartro admite un sentido cualitativo. «Son espíritu» reproduce la concisión del griego sin convertirlo en «espirituales», que suavizaría demasiado la formulación, ni identificarlo directamente con el Espíritu Santo más de lo que la gramática exige.
- source_word: ζωή
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - vida plena
  lexicon: BDAG
  rationale: «Vida» es la traducción directa y estándar de ζωή en Juan. Se mantiene la sobriedad del término, que en contexto tiene densidad teológica sin requerir ampliación interpretativa.
theological_decisions:
- issue: Referente de πνεῦμα en la primera cláusula
  english_pob_reading: the Spirit refers to the Holy Spirit
  chosen_spanish_reading: Espíritu se entiende como el Espíritu Santo
  alternative_spanish_readings:
  - espíritu como principio espiritual general
  - espíritu humano
  rationale: En Juan, la agencia que da vida se asocia de forma marcada con el Espíritu Santo. La mayúscula en la traducción señala ese referente probable, pero la nota deja abierta la alternativa léxica para no borrar la ambigüedad del término griego.
  doctrine_reference: 'Juan 3:5-8; 6:63; filosofía de traducción #3'
- issue: Sentido de σάρξ en contraste con el Espíritu
  english_pob_reading: flesh retained as an intentionally broad term
  chosen_spanish_reading: carne conservada como término amplio
  alternative_spanish_readings:
  - naturaleza pecaminosa
  - mero esfuerzo humano
  - cuerpo físico
  rationale: La opción «carne» preserva el contraste teológico tal como lo formula Jesús. «Naturaleza pecaminosa» impondría una lectura más cerrada que la del texto; conservar el término amplio permite que el lector perciba la tensión sin sobreexplicarla.
  doctrine_reference: 'Tabla de términos controvertidos para σάρξ; filosofía de traducción #3'
- issue: Fuerza del predicado πνεῦμά ἐστιν en la cláusula final
  english_pob_reading: 'qualitative: Jesus’ words are spirit and life'
  chosen_spanish_reading: 'lectura cualitativa: las palabras de Jesús son espíritu y vida'
  alternative_spanish_readings:
  - 'identificadora: son el Espíritu y la vida'
  - 'interpretativa: son espirituales y vivificadoras'
  rationale: La ausencia de artículo favorece una lectura cualitativa. «Son espíritu y vida» conserva la forma breve y tajante del griego, evitando tanto una identificación excesiva como una paráfrasis que diluya la expresión.
  doctrine_reference: 'Filosofía de traducción #1 y #3'
translation_notes:
  revision_awareness: 'El contexto de auditoría en inglés reporta alta concordancia y un pasaje sin cambios recientes sustantivos. Esta versión española sigue la misma línea revisada: mantiene πνεῦμα como «Espíritu» en la primera cláusula, conserva «carne» para σάρξ, y reproduce la fuerza cualitativa de la clausula final sin sobreinterpretarla.'
  spanish_consistency_notes:
  - Se mantiene «Espíritu» con mayúscula solo en la primera cláusula por el referente probable al Espíritu Santo; en la cláusula final se deja en minúscula por la lectura cualitativa del predicado.
  - Se usa «carne» en lugar de «naturaleza pecaminosa» para no cerrar el sentido de σάρξ más allá de lo que el texto permite.
  - «Son espíritu y vida» preserva la tersura del griego y evita una paráfrasis explicativa.
  - El tono general es bíblico pero contemporáneo, sin depender de formulaciones eclesiales tradicionales que oculten el léxico del original.
