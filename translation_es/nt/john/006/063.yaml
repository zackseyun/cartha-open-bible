base_translation:
  language: en
  yaml_path: translation/nt/john/006/063.yaml
  text: It is the Spirit who gives life[a]; the flesh benefits nothing[c][b]. The words that I have spoken to you are spirit and are life.
  footnotes:
  - marker: a
    text: Or 'the spirit gives life.' The Greek πνεῦμα can mean 'Spirit' or 'spirit'; here the context favors the Holy Spirit.
    reason: alternative_reading
  - marker: b
    text: '''The flesh'' may refer broadly to what is merely human; translating it as ''sinful nature'' here would be more interpretive than the Greek requires.'
    reason: lexical_alternative
  - marker: c
    text: Or 'are Spirit and life' or 'are spiritual and life-giving.' The Greek wording is compressed and qualitative.
    reason: alternative_reading
