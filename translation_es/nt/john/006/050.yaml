translation:
  language: es
  text: Este es el pan que desciende del cielo[a][b], para que cualquiera que coma de él no muera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Este es el pan que desciende del cielo» o «Este es el pan que baja del cielo».'
    reason: lexical_alternative
  - marker: b
    text: La expresión «no muera» se deja amplia en el texto principal; según el contexto, puede entenderse como libertad respecto de la muerte final, de la muerte espiritual o de la destrucción escatológica.
    reason: alternative_reading
lexical_decisions:
- source_word: οὗτός
  english_pob_choice: This
  chosen_spanish: Este
  alternatives_spanish:
  - Este mismo
  - Éste
  lexicon: BDAG
  rationale: El demostrativo presenta el pan que Jesús está identificando; «Este» es natural en español y conserva la inmediatez del griego sin recargar el texto.
- source_word: ἄρτος
  english_pob_choice: bread
  chosen_spanish: pan
  alternatives_spanish:
  - pan
  - alimento
  lexicon: BDAG
  rationale: «ἄρτος» significa literalmente «pan». En español, «pan» mantiene el término básico y es el equivalente más directo y reconocido.
- source_word: ὁ ἐκ τοῦ οὐρανοῦ καταβαίνων
  english_pob_choice: that comes down from heaven
  chosen_spanish: que desciende del cielo
  alternatives_spanish:
  - que baja del cielo
  - que viene descendiendo del cielo
  lexicon: BDAG
  rationale: El participio presente se expresa con una relativa natural en español. «Desciende» conserva mejor el matiz de movimiento desde lo alto que una forma más estática.
- source_word: οὐρανός
  english_pob_choice: heaven
  chosen_spanish: cielo
  alternatives_spanish:
  - cielo
  - cielos
  lexicon: BDAG
  rationale: En este contexto joánico, οὐρανός alude al ámbito celestial/divino; en español, «cielo» comunica ese sentido de manera sobria y fiel.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - para
  lexicon: BDAG
  rationale: La cláusula expresa propósito. «Para que» es la forma más natural y precisa en español contemporáneo.
- source_word: τις
  english_pob_choice: anyone
  chosen_spanish: cualquiera
  alternatives_spanish:
  - alguien
  - una persona
  lexicon: BDAG
  rationale: El indefinido tiene fuerza general. «Cualquiera» mantiene esa apertura sin particularizar indebidamente.
- source_word: ἐξ αὐτοῦ
  english_pob_choice: from it
  chosen_spanish: de él
  alternatives_spanish:
  - de él
  - de éste
  lexicon: BDAG
  rationale: Con «comer» en español, la preposición simple «de» suena natural y conserva la relación de procedencia/ingesta del original.
- source_word: φάγῃ
  english_pob_choice: may eat
  chosen_spanish: coma
  alternatives_spanish:
  - coma
  - pueda comer
  lexicon: BDAG
  rationale: El aoristo subjuntivo bajo ἵνα se vierte bien con un subjuntivo presente en español. «Coma» expresa la idea de finalidad sin artificio.
- source_word: μὴ ἀποθάνῃ
  english_pob_choice: and not die
  chosen_spanish: y no muera
  alternatives_spanish:
  - y no muera
  - y no perezca
  lexicon: BDAG
  rationale: Se conserva el verbo simple «morir» para no cerrar la amplitud semántica del texto. «Perecer» introduciría una interpretación más específica que el griego no obliga.
theological_decisions:
- issue: Alcance de «no morir»
  english_pob_reading: Retain the plain expression 'not die' without specifying physical or spiritual death.
  chosen_spanish_reading: Conservar «y no muera» sin precisar si se trata de muerte física, espiritual o escatológica.
  alternative_spanish_readings:
  - y no muera espiritualmente
  - y no perezca eternamente
  rationale: En el discurso del pan de vida, el contraste es teológicamente rico, pero este versículo por sí solo no delimita el tipo de muerte. Mantener la expresión abierta preserva la tensión interpretativa documentada en el POB inglés.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla prematuramente.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego SBLGNT y el auditorial inglés POB. No se aplicaron revisiones posteriores; el estado de concordancia reportado es alto y sin cambios necesarios.
  spanish_consistency_notes:
  - Se usa «pan» para ἄρτος, en coherencia con la terminología bíblica común y el sentido literal del término.
  - Se usa «cielo» para οὐρανός en el sentido teológico del ámbito divino, no del cielo atmosférico.
  - Se conserva «desciende» para el participio presente καταβαίνων, manteniendo el dinamismo del original.
  - Se mantiene «no muera» en forma amplia, sin especificar el tipo de muerte.
  - La puntuación y el subjuntivo español se ajustan a una redacción publicable y natural.
