translation:
  language: es
  text: Ahora bien, la Pascua[a], la fiesta de los judíos, estaba cerca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de los judeanos». El término griego puede denotar a los judíos en general o a los judeanos en particular, según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦν ... ἐγγὺς
  english_pob_choice: was near
  chosen_spanish: estaba cerca
  alternatives_spanish:
  - estaba próxima
  - se acercaba
  lexicon: BDAG
  rationale: La construcción con ἦν + ἐγγύς expresa cercanía temporal. «Estaba cerca» es natural en español y conserva la idea de inmediatez sin añadir matiz interpretativo.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora
  - Entonces
  lexicon: BDAG
  rationale: Aquí δέ funciona como conector narrativo leve. En español, «Y» mantiene la continuidad del relato de forma sobria y fluida; «Ahora» sería más enfático y «Entonces» sugeriría más dirección temporal de la que el griego exige.
- source_word: πάσχα
  english_pob_choice: Passover
  chosen_spanish: Pascua
  alternatives_spanish:
  - Pascua judía
  - Pésaj
  lexicon: BDAG
  rationale: El término designa la festividad judía de la Pascua. «Pascua» es el equivalente español estándar y reconocible; «Pésaj» sería más técnico y menos natural para un texto bíblico de lectura pública.
- source_word: ἑορτὴ
  english_pob_choice: feast
  chosen_spanish: fiesta
  alternatives_spanish:
  - festividad
  - solemnidad
  lexicon: BDAG
  rationale: ἑορτή denota una celebración festiva. En español, «fiesta» conserva el sentido de celebración sin sonar tan litúrgico como «solemnidad» ni tan formalizado como «festividad».
- source_word: τῶν Ἰουδαίων
  english_pob_choice: of the Jews
  chosen_spanish: de los judíos
  alternatives_spanish:
  - de los judeanos
  lexicon: BDAG
  rationale: El contexto apunta a la fiesta pascual asociada al pueblo judío en general. «De los judíos» sigue de cerca la lectura de la POB inglesa; «de los judeanos» preservaría una posible referencia regional, pero aquí resulta menos natural y no está exigido por el contexto.
theological_decisions:
- issue: Alcance de Ἰουδαίων en una narración joánica
  english_pob_reading: of the Jews
  chosen_spanish_reading: de los judíos
  alternative_spanish_readings:
  - de los judeanos
  rationale: Se mantiene el sentido amplio y corriente del término en este contexto, donde la Pascua es la fiesta de todo el pueblo judío. Esto evita estrechar innecesariamente la referencia a una región específica y conserva la ambigüedad contextual donde no es necesaria una restricción adicional.
  doctrine_reference: Principio de primacía del idioma original; no introducir una restricción semántica no requerida por el contexto.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego y coincide con el juicio revisado de la POB inglesa: no se requieren cambios. Se ha conservado el matiz narrativo leve de δέ, la cercanía temporal de ἐγγύς y la ambigüedad contextual de Ἰουδαίων en una nota breve.'
  spanish_consistency_notes:
  - Se mantuvo «Pascua» como equivalente natural de πάσχα, sin sustituirlo por un término más técnico o regional.
  - «Fiesta» reproduce el valor cultual de ἑορτή en un español digno y comprensible.
  - Se evitó «SEÑOR» u სხვა masking conventions, porque el texto no contiene el nombre divino.
  - La nota al pie conserva la alternativa lexical importante «judeanos/judíos» sin alterar el cuerpo del texto.
