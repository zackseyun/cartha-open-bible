translation:
  language: es
  text: 'Y cuando lo encontraron al otro lado del mar[a], le dijeron: «Rabí, ¿cuándo llegaste aquí?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «¿cuándo has venido aquí?». El perfecto griego puede expresarse de ese modo más formalmente, pero en el contexto el sentido idiomático es de llegada: «¿cuándo llegaste aquí?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Y también
  lexicon: BDAG
  rationale: Se mantiene el simple nexo narrativo sin añadir matiz interpretativo; en español, «Y» reproduce bien la continuidad del relato.
- source_word: εὑρόντες
  english_pob_choice: when they found
  chosen_spanish: cuando lo encontraron
  alternatives_spanish:
  - habiéndolo encontrado
  - después de encontrarlo
  lexicon: BDAG
  rationale: El participio aoristo funciona temporalmente antes del verbo principal; «cuando lo encontraron» conserva el orden narrativo de manera natural en español.
- source_word: πέραν τῆς θαλάσσης
  english_pob_choice: on the other side of the sea
  chosen_spanish: al otro lado del mar
  alternatives_spanish:
  - al otro lado del lago
  - más allá del mar
  lexicon: BDAG
  rationale: «πέραν» con genitivo marca ubicación al otro lado; «mar» sigue el sentido del texto y la elección inglesa, y «al otro lado» expresa con claridad la relación espacial.
- source_word: εἶπον αὐτῷ
  english_pob_choice: they said to him
  chosen_spanish: le dijeron
  alternatives_spanish:
  - le preguntaron
  - le hablaron
  lexicon: BDAG
  rationale: «Dijeron» mantiene la fuerza de λέγω sin convertirla en una paráfrasis más interpretativa como «preguntaron», aunque el contenido sea interrogativo.
- source_word: Ῥαββί
  english_pob_choice: Rabbi
  chosen_spanish: Rabí
  alternatives_spanish:
  - Rabbi
  - Maestro
  lexicon: BDAG
  rationale: Se conserva el vocativo transliterado y reconocido en español bíblico como «Rabí», preservando el marco judío y evitando reemplazarlo por «Maestro».
- source_word: πότε
  english_pob_choice: when
  chosen_spanish: ¿cuándo
  alternatives_spanish:
  - en qué momento
  lexicon: BDAG
  rationale: Interrogativo temporal estándar; «¿cuándo» es la equivalencia natural y exacta en español.
- source_word: ὧδε
  english_pob_choice: here
  chosen_spanish: aquí
  alternatives_spanish:
  - acá
  - en este lugar
  lexicon: BDAG
  rationale: El adverbio de lugar se vierte con «aquí», la forma directa y idiomática para la pregunta de presencia/localización.
- source_word: γέγονας
  english_pob_choice: did you get here
  chosen_spanish: llegaste aquí
  alternatives_spanish:
  - has venido aquí
  - has llegado aquí
  lexicon: BDAG
  rationale: Aunque el perfecto griego puede leerse de modo más formal como «has venido aquí», el sentido idiomático en contexto es de llegada/presencia; «llegaste aquí» reproduce ese valor de manera natural en español.
translation_notes:
  revision_awareness: Se corrigió el problema de validación asegurando que el marcador de nota [a] aparezca exactamente en el texto español, unido al sintagma correspondiente, y que la nota ofrezca la alternativa formal reflejada por el griego perfecto.
  spanish_consistency_notes:
  - Se conservó el tratamiento directo de Jesús con «Rabí», acorde con el registro del relato.
  - «Mar» se mantuvo conforme al paquete fuente y a la tradición textual de este versículo en el contexto narrativo.
  - No se introdujeron mayúsculas teológicas innecesarias; el verso no contiene referencias explícitas al nombre divino ni a títulos cristológicos traducidos.
  - La puntuación sigue el español moderno con comillas angulares y signos de interrogación de apertura.
