base_translation:
  language: en
  yaml_path: translation/nt/john/006/030.yaml
  text: So they said to him[a], “Then what sign are you doing, so that we may see and believe you? What work are you doing?”
  footnotes:
  - marker: a
    text: Or “believe in you” or “trust you.” The Greek more literally says “believe you,” using the dative pronoun rather than the more common Johannine expression “believe in.”
