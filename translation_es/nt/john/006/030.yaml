review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del versículo y mantiene «señal» para σημεῖον y «obra» para ἐργάζῃ. Sin embargo, no preserva adecuadamente una decisión fuente clave del POB auditado: πιστεύσωμέν σοι se distinguió expresamente de la construcción joánica más común «creer en», y el borrador lo traduce en el texto principal como «creamos en ti». Eso desplaza el matiz semántico del dativo σοι y contradice la decisión léxica y teológica documentada.'
  spanish_quality_summary: El español es natural y claro, pero puede mejorarse para reflejar mejor el griego sin perder legibilidad. «¿Qué señal haces...?» y «¿Qué obra haces?» son aceptables, aunque la omisión de un equivalente de οὖν en la pregunta inicial reduce un poco la insistencia retórica. El ajuste principal necesario es cambiar «creamos en ti» por una formulación natural que preserve «believe you», como «te creamos».
  glossary_alignment: 'Buena alineación con la terminología del proyecto en «señal», «Dios» no aplica, etc. La divergencia importante está en πίστις/πιστεύω: el audit trail exige conservar aquí el valor de «creer(te)» más que «creer en». La nota al pie ya reconoce esa distinción, pero el texto principal debe alinearse con ella.'
  issues:
  - severity: high
    issue: «creamos en ti» no preserva el valor de πιστεύσωμέν σοι
    rationale: El griego usa πιστεύω con dativo σοι, no εἰς + acusativo. El English POB decidió explícitamente «believe you» y no «believe in you». La versión española principal debe reflejar esa diferencia, idealmente con «te creamos». Mantener «en ti» en el texto y relegar la distinción a nota contradice la decisión auditada.
  - severity: medium
    issue: Se pierde la repetición retórica de οὖν en «Τί οὖν»
    rationale: Aunque en español no siempre conviene calcar οὖν, aquí puede conservarse de forma natural con «Entonces, ¿qué señal haces...?» o similar. No es tan grave como el problema de πιστεύσωμέν σοι, pero sí mejora la fidelidad discursiva.
  revised_spanish_text: 'Entonces le dijeron[a]: «Entonces, ¿qué señal haces, para que veamos y te creamos? ¿Qué obra haces?»'
  revised_footnotes:
  - marker: a
    text: O «creamos en ti» o «confiemos en ti». El griego dice más literalmente «te creamos», usando el dativo σοι en vez de la expresión joánica más común con εἰς, «creer en».
    reason: lexical_alternative
  revision_rationale: 'Se revisa el texto principal para alinear la traducción con la evidencia griega y con la decisión léxica y teológica documentada del POB: πιστεύσωμέν σοι debe distinguirse de «creer en». «Te creamos» es español natural y preserva ese matiz. También se añade «Entonces» al inicio de la pregunta para reflejar mejor la repetición de οὖν sin volver la frase artificiosa. La nota se ajusta para presentar las alternativas como alternativas reales al texto principal revisado.'
