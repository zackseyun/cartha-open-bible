translation:
  language: es
  text: 'Entonces le dijeron[a]: «Entonces, ¿qué señal haces, para que veamos y te creamos? ¿Qué obra haces?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «creamos en ti» o «confiemos en ti». El griego dice más literalmente «te creamos», usando el dativo σοι en vez de la expresión joánica más común con εἰς, «creer en».
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπον οὖν αὐτῷ
  english_pob_choice: So they said to him
  chosen_spanish: Entonces le dijeron
  alternatives_spanish:
  - Así que le dijeron
  - Por eso le dijeron
  lexicon: BDAG
  rationale: οὖν expresa una relación inferencial o consecutiva; «Entonces» mantiene ese enlace discursivo en español con naturalidad y conserva el tono de respuesta inmediata de la multitud.
- source_word: Τί οὖν
  english_pob_choice: Then what
  chosen_spanish: ¿Qué
  alternatives_spanish:
  - Entonces qué
  - ¿Qué entonces?
  lexicon: BDAG
  rationale: En español, la repetición de οὖν se puede reflejar con la estructura interrogativa directa sin forzar un calco. La fuerza retórica queda conservada por el contexto y por la primera pregunta que sigue.
- source_word: ποιεῖς σὺ σημεῖον
  english_pob_choice: are you doing ... sign
  chosen_spanish: ¿Qué señal haces
  alternatives_spanish:
  - ¿Qué señal estás haciendo
  - ¿Qué señal realizas
  lexicon: BDAG
  rationale: ποιεῖς puede expresarse de manera natural con «haces». «Señal» preserva el término joánico σημεῖον sin explicitarlo como «milagro», que sería más interpretativo.
- source_word: σημεῖον
  english_pob_choice: sign
  chosen_spanish: señal
  alternatives_spanish:
  - signo
  - milagro-señal
  lexicon: BDAG
  rationale: «Señal» es el equivalente más natural y transparente en español para el uso teológico de σημεῖον en Juan, manteniendo su valor de hecho que apunta a algo más allá de sí mismo.
- source_word: ἵνα ἴδωμεν καὶ πιστεύσωμέν σοι
  english_pob_choice: so that we may see and believe you
  chosen_spanish: para que veamos y creamos en ti
  alternatives_spanish:
  - para que veamos y te creamos
  - para que veamos y creamos lo que dices
  lexicon: BDAG
  rationale: ἵνα expresa propósito. En español, «creer en ti» es la formulación más idiomática para la respuesta de fe dirigida a una persona; aun así, se mantiene el valor relacional del griego dentro de una traducción pública y natural.
- source_word: πιστεύσωμέν
  english_pob_choice: believe
  chosen_spanish: creamos
  alternatives_spanish:
  - creamos en ti
  - te creamos
  lexicon: BDAG
  rationale: La familia πιστεύω se traduce aquí con «creer». En este contexto, el español requiere completar el sentido con «en ti» para que la relación de la fe sea clara y idiomática.
- source_word: σοι
  english_pob_choice: believe you
  chosen_spanish: en ti
  alternatives_spanish:
  - a ti
  - en usted
  lexicon: BDAG
  rationale: El dativo σοι no obliga a una sola fórmula en español. «En ti» comunica de modo natural el destinatario personal de la fe, aunque el griego sea literalmente «a ti».
- source_word: τί ἐργάζῃ
  english_pob_choice: What work are you doing?
  chosen_spanish: ¿Qué obra haces?
  alternatives_spanish:
  - ¿Qué estás haciendo?
  - ¿Qué trabajo haces?
  lexicon: BDAG
  rationale: ἐργάζῃ puede traducirse con «obra» para conservar el paralelismo conceptual con ποιεῖς y la pregunta por la actividad de Jesús. «Haces» mantiene la correspondencia verbal con la primera pregunta y suena natural en español.
theological_decisions:
- issue: Construcción πιστεύω con dativo σοι
  english_pob_reading: believe you
  chosen_spanish_reading: creamos en ti
  alternative_spanish_readings:
  - creamos en ti
  - te creamos
  - creamos
  rationale: El inglés POB destacó que el griego usa dativo, no la fórmula habitual «creer en». En español, sin embargo, la expresión más clara y eclesialmente inteligible es «creamos en ti». Se conserva la tensión mediante una nota léxica, en vez de suprimirla o volver la frase extraña.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §§1, 3, 5; Contested terms: πίστις'
- issue: Valor joánico de σημεῖον
  english_pob_reading: sign
  chosen_spanish_reading: señal
  alternative_spanish_readings:
  - signo
  - milagro
  rationale: «Señal» mantiene el término técnico joánico sin sustituirlo por una explicación más interpretativa. Esto preserva la ambigüedad intencional entre milagro y prueba reveladora.
  doctrine_reference: Juan 2–12; DOCTRINE.md sobre términos teológicos con carga narrativa
translation_notes:
  revision_awareness: El borrador sigue el último pase de revisión del inglés POB al reflejar la segunda pregunta con un verbo simple y directo («haces»), en paralelo con la primera pregunta. También evita una paráfrasis excesiva al conservar la secuencia retórica y el término técnico «señal».
  spanish_consistency_notes:
  - Se usó «señal» para σημεῖον de manera consistente con el vocabulario joánico.
  - Se optó por «creamos en ti» para que el español suene natural, dejando constancia en la nota de la construcción griega con dativo.
  - La doble pregunta conserva el paralelismo del griego entre ποιεῖς y ἐργάζῃ sin volver la frase artificiosa.
  - La puntuación sigue el español moderno y mantiene comillas angulares para estilo bíblico publicable.
