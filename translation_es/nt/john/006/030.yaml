revisions:
- from: 'Entonces le dijeron[a]: «¿Qué señal haces, para que veamos y creamos en ti? ¿Qué obra haces?»'
  to: 'Entonces le dijeron[a]: «Entonces, ¿qué señal haces, para que veamos y te creamos? ¿Qué obra haces?»'
  rationale: 'Se revisa el texto principal para alinear la traducción con la evidencia griega y con la decisión léxica y teológica documentada del POB: πιστεύσωμέν σοι debe distinguirse de «creer en». «Te creamos» es español natural y preserva ese matiz. También se añade «Entonces» al inicio de la pregunta para reflejar mejor la repetición de οὖν sin volver la frase artificiosa. La nota se ajusta para presentar las alternativas como alternativas reales al texto principal revisado.'
