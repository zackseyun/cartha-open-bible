lexical_decisions:
- source_word: ἐγώ
  english_pob_choice: I
  chosen_spanish: Yo
  alternatives_spanish:
  - Yo mismo
  lexicon: BDAG
  rationale: El griego expresa el sujeto explícito. En español conviene mantenerlo con «Yo» para conservar la identificación directa de Jesús sin recargar el enunciado.
- source_word: εἰμι
  english_pob_choice: am
  chosen_spanish: soy
  alternatives_spanish:
  - estoy
  lexicon: BDAG
  rationale: En una construcción copulativa con predicado nominal, «soy» es la equivalencia natural en español y conserva el valor identificador del original.
- source_word: ὁ ἄρτος
  english_pob_choice: the bread
  chosen_spanish: el pan
  alternatives_spanish:
  - el pan de trigo
  - el alimento
  lexicon: BDAG
  rationale: «Pan» reproduce el sustantivo básico ἄρτος. Aunque el artículo griego puede tener fuerza identificadora, en español la identificación queda bien expresada con el artículo definido «el».
- source_word: τῆς ζωῆς
  english_pob_choice: of life
  chosen_spanish: de vida
  alternatives_spanish:
  - que da vida
  - para la vida
  lexicon: BDAG
  rationale: Se conserva el genitivo de forma compacta como «de vida», reflejando la expresión joánica estable sin expandirla interpretativamente.
theological_decisions:
- issue: Autopresentación cristológica en el enunciado «Yo soy…»
  english_pob_reading: Translate straightforwardly as 'I am' without expanding it into a more explicit theological paraphrase.
  chosen_spanish_reading: 'Traducir de manera directa: «Yo soy…», sin añadir paráfrasis como «Yo soy el que soy» o «yo existo».'
  alternative_spanish_readings:
  - Yo mismo soy el pan de vida
  - Yo soy el que da el pan de vida
  rationale: El griego aquí no es un uso absoluto de ἐγώ εἰμι, sino una afirmación con predicado nominal. La traducción debe preservar la autoidentificación de Jesús sin introducir formulaciones que el texto no dice.
  doctrine_reference: Cristología joánica; principio de primacía del texto original y preservación de la tensión teológica.
translation_notes:
  revision_awareness: 'Coincide con el texto fuente y con la auditoría inglesa: no se requirieron revisiones en el pase más reciente; el consenso de revisión fue de alta concordancia.'
  spanish_consistency_notes:
  - Se mantiene «pan» como equivalente estándar de ἄρτος en contextos eucarísticos y simbólicos, sin sustituirlo por «alimento».
  - Se conserva el orden natural del español con sujeto explícito para reflejar el énfasis posible de ἐγώ.
  - No se introduce nota al pie porque no hay variante textual ni ambigüedad española que el texto deba resolver aquí.
