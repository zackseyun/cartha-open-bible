  text: τοῦτο ⸀γάρ ἐστιν τὸ θέλημα τοῦ ⸂πατρός μου⸃ ἵνα πᾶς ὁ θεωρῶν τὸν υἱὸν καὶ πιστεύων εἰς αὐτὸν ἔχῃ ζωὴν αἰώνιον, καὶ ἀναστήσω αὐτὸν ⸀ἐγὼ τῇ ἐσχάτῃ ἡμέρᾳ.
base_translation:
  language: en
  yaml_path: translation/nt/john/006/040.yaml
  text: 'For this is the will of my Father: that everyone who sees the Son and believes in him may have eternal life[b][a], and I myself will raise him up on the last day.'
  footnotes:
  - marker: a
    text: Or 'everyone who beholds the Son and believes in him.' The verb can carry the sense of attentive seeing, not merely physical sight.
    reason: lexical_alternative
  - marker: b
    text: 'Or ''and I will raise him up.'' The Greek explicitly includes ''I,'' adding emphasis: ''I myself will raise him up.'''
    reason: lexical_alternative
