translation:
  language: es
  text: 'Porque esta es la voluntad de mi Padre: que todo aquel que ve[a] al Hijo y cree en él tenga vida eterna, y yo mismo lo resucitaré[b] en el último día.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todo aquel que contempla al Hijo y cree en él». El verbo puede sugerir una visión atenta, no solo una percepción física.
    reason: lexical_alternative
  - marker: b
    text: 'O «y yo lo resucitaré». El griego incluye explícitamente «yo», que añade énfasis: «yo mismo lo resucitaré».'
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦτο γάρ ἐστιν
  english_pob_choice: For this is
  chosen_spanish: Porque esta es
  alternatives_spanish:
  - Pues esta es
  - Porque esto es
  lexicon: BDAG
  rationale: γάρ expresa una conexión explicativa; en español, «Porque» conserva esa relación con la frase anterior de manera natural. «Esta es» representa con claridad τοῦτο ἐστιν sin forzar el orden.
- source_word: τὸ θέλημα
  english_pob_choice: the will
  chosen_spanish: la voluntad
  alternatives_spanish:
  - el deseo
  - la intención
  lexicon: BDAG
  rationale: θέλημα en este contexto denota lo que el Padre quiere o determina. «Voluntad» es la equivalencia más directa y transparente en español bíblico.
- source_word: τοῦ πατρός μου
  english_pob_choice: of my Father
  chosen_spanish: de mi Padre
  alternatives_spanish:
  - de mi padre
  lexicon: BDAG
  rationale: Se mantiene la relación posesiva directa. «Padre» va con mayúscula por su valor titular y reverencial en el contexto joánico.
- source_word: ἵνα
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - para que
  - a fin de que
  lexicon: BDAG
  rationale: Después de «la voluntad ... es», ἵνα introduce el contenido deseado o propuesto. «Que» resulta idiomático en español y conserva la fuerza de finalidad/contenido sin sobrecargar la oración.
- source_word: πᾶς ὁ θεωρῶν
  english_pob_choice: everyone who sees
  chosen_spanish: todo aquel que ve
  alternatives_spanish:
  - todo el que contempla
  - quienquiera que vea
  lexicon: BDAG
  rationale: 'El participio articular tiene sentido genérico: «todo aquel que». θεωρέω puede sugerir ver con atención; sin embargo, «ve» mantiene claridad y naturalidad en español sin perder la referencia al acto de ver al Hijo.'
- source_word: τὸν υἱὸν
  english_pob_choice: the Son
  chosen_spanish: al Hijo
  alternatives_spanish:
  - al hijo
  lexicon: BDAG
  rationale: En Juan, «el Hijo» es un título cristológico; el acusativo con «a» personal se expresa naturalmente como «al Hijo».
- source_word: καὶ πιστεύων εἰς αὐτὸν
  english_pob_choice: and believes in him
  chosen_spanish: y cree en él
  alternatives_spanish:
  - y confía en él
  - y pone su fe en él
  lexicon: BDAG
  rationale: πιστεύω con εἰς comunica fe/confiar dirigido a una persona. «Cree en él» es la forma más natural y fiel en español para este uso joánico.
- source_word: ἔχῃ
  english_pob_choice: may have
  chosen_spanish: tenga
  alternatives_spanish:
  - pueda tener
  - tiene
  lexicon: BDAG
  rationale: El subjuntivo en la cláusula con ἵνα se refleja mejor con «tenga», que en español preserva tanto el valor de finalidad como el de promesa/resultado sin convertirlo en indicativo.
- source_word: ζωὴν αἰώνιον
  english_pob_choice: eternal life
  chosen_spanish: vida eterna
  alternatives_spanish:
  - vida eterna
  - vida del siglo venidero
  lexicon: BDAG
  rationale: «Vida eterna» es la correspondencia establecida y clara en el evangelio de Juan, conservando el sentido de duración y calidad escatológica.
- source_word: καὶ ἀναστήσω αὐτὸν ἐγὼ
  english_pob_choice: and I myself will raise him up
  chosen_spanish: y yo mismo lo resucitaré
  alternatives_spanish:
  - y yo mismo lo levantaré
  - y yo lo resucitaré
  lexicon: BDAG
  rationale: ἀναστήσω aquí apunta a la resurrección escatológica. En español, «resucitaré» comunica con claridad ese acto final; «yo mismo» conserva el énfasis del ἐγώ explícito en el griego.
- source_word: τῇ ἐσχάτῃ ἡμέρᾳ
  english_pob_choice: on the last day
  chosen_spanish: en el último día
  alternatives_spanish:
  - en el día postrero
  - en el día final
  lexicon: BDAG
  rationale: La frase temporal se vierte de forma natural como «en el último día». «En» es idiomático en español para este marco temporal escatológico.
theological_decisions:
- issue: Alcance y condición en πᾶς ὁ θεωρῶν ... καὶ πιστεύων
  english_pob_reading: that everyone who sees the Son and believes in him may have eternal life
  chosen_spanish_reading: que todo aquel que ve al Hijo y cree en él tenga vida eterna
  alternative_spanish_readings:
  - que quien mira al Hijo y cree en él tenga vida eterna
  - que todo el que contempla al Hijo y cree en él tenga vida eterna
  rationale: La oración mantiene el participio genérico y la estructura de ἵνα + subjuntivo sin resolver la tensión teológica del pasaje. «Todo aquel que» conserva el alcance universal de la formulación, y el subjuntivo «tenga» respeta la construcción original sin reducirla a un simple indicativo.
  doctrine_reference: Preservar la tensión teológica sin resolverla en la traducción.
- issue: Énfasis de ἐγώ en καὶ ἀναστήσω αὐτὸν ἐγώ
  english_pob_reading: and I myself will raise him up
  chosen_spanish_reading: y yo mismo lo resucitaré
  alternative_spanish_readings:
  - y lo resucitaré
  - y yo lo resucitaré
  rationale: Incluir «yo mismo» preserva el énfasis explícito del pronombre griego, destacando la agencia personal de Jesús en la promesa de resurrección sin añadir contenido doctrinal ajeno al texto.
  doctrine_reference: Primacía del original sobre la tradición de traducción.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto griego y el audit trail inglés, sin cambios sustantivos respecto de la lectura base: conserva la cláusula explicativa con ἵνα, el valor genérico de πᾶς ὁ θεωρῶν, y el énfasis explícito de ἐγώ en la promesa final. Se eligió una formulación española más natural («Porque esta es...», «todo aquel que», «yo mismo lo resucitaré») manteniendo intactas las decisiones lexicográficas y teológicas documentadas.'
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto solo cuando el texto lo requiera; aquí no aparece el nombre divino.
  - «El Hijo» se mantiene como título cristológico coherente con el evangelio de Juan.
  - «Vida eterna» conserva la fórmula joánica estándar.
  - La voz verbal y el subjuntivo reflejan el carácter de propósito/resultado de ἵνα sin forzar el español.
