translation:
  language: es
  text: 'Jesús les dijo: «Yo soy el pan de vida; el que viene a mí nunca tendrá hambre, y el que cree en mí nunca tendrá sed[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «nunca jamás tendrá sed». El griego usa una negación enfática con πώποτε, «jamás» o «en ningún momento».
    reason: lexical_alternative
lexical_decisions:
- source_word: Εἶπεν
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - les habló
  - dijo a ellos
  lexicon: BDAG
  rationale: El aoristo narrativo de λέγω se vierte naturalmente como «dijo». En español, el complemento indirecto «les» ya expresa con claridad el destinatario sin sobrecargar la frase.
- source_word: Ἰησοῦς
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  lexicon: BDAG
  rationale: Nombre propio establecido en español bíblico.
- source_word: Ἐγώ εἰμι
  english_pob_choice: I am
  chosen_spanish: Yo soy
  alternatives_spanish:
  - Yo mismo soy
  lexicon: BDAG
  rationale: La fórmula enfática se conserva con el orden natural del español «Yo soy». «Yo mismo soy» podría reflejar más explícitamente el énfasis, pero suena más marcado y menos fluido.
- source_word: ὁ ἄρτος τῆς ζωῆς
  english_pob_choice: the bread of life
  chosen_spanish: el pan de vida
  alternatives_spanish:
  - el pan que da vida
  - el pan vivificante
  lexicon: BDAG
  rationale: Se mantiene la metáfora y la estructura genitiva con un español transparente. «Pan de vida» es la correspondencia más directa y ampliamente inteligible.
- source_word: ὁ ἐρχόμενος πρὸς ἐμέ
  english_pob_choice: the one who comes to me
  chosen_spanish: el que viene a mí
  alternatives_spanish:
  - el que se acerca a mí
  - el que llega a mí
  lexicon: BDAG
  rationale: El participio sustantivado se traduce de manera natural como «el que viene a mí». «Viene a mí» conserva la idea relacional y direccional de πρός χωρίς añadir interpretación.
- source_word: οὐ μὴ πεινάσῃ
  english_pob_choice: will never hunger
  chosen_spanish: nunca tendrá hambre
  alternatives_spanish:
  - de ningún modo tendrá hambre
  - jamás tendrá hambre
  lexicon: BDAG
  rationale: La negación enfática se comunica de forma idiomática con «nunca». Es una solución natural que mantiene el valor fuerte de οὐ μή sin sonar forzada.
- source_word: ὁ πιστεύων εἰς ἐμέ
  english_pob_choice: the one who believes in me
  chosen_spanish: el que cree en mí
  alternatives_spanish:
  - el que confía en mí
  lexicon: BDAG
  rationale: Para πιστεύω con εἰς, «cree en mí» es la forma más transparente y estándar en español bíblico actual. «Confía en mí» preserva una posible nuance, pero reduce la consistencia de la serie πιστεύω.
- source_word: οὐ μὴ διψήσει πώποτε
  english_pob_choice: will never thirst
  chosen_spanish: nunca tendrá sed
  alternatives_spanish:
  - jamás tendrá sed
  - de ningún modo tendrá sed
  lexicon: BDAG
  rationale: Se expresa la negación enfática y durativa con «nunca». Se evita añadir «otra vez» o «de nuevo», porque πώποτε significa «nunca/alguna vez» en el marco de la negación, no «otra vez».
theological_decisions:
- issue: Alcance de Ἐγώ εἰμι en la autodeclaración de Jesús
  english_pob_reading: I am
  chosen_spanish_reading: Yo soy
  alternative_spanish_readings:
  - Yo mismo soy
  rationale: Se conserva la autodeclaración directa sin añadir explicación teológica en el texto principal. El español mantiene la resonancia joánica de la fórmula sin resolverla interpretativamente.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
- issue: Valor de πιστεύων εἰς ἐμέ
  english_pob_reading: the one who believes in me
  chosen_spanish_reading: el que cree en mí
  alternative_spanish_readings:
  - el que confía en mí
  rationale: La lectura principal mantiene la formulación relacional usual en Juan y es plenamente fiel al griego. «Confía en mí» expresa una matiz válida, pero no se eleva al texto principal para no debilitar la continuidad terminológica.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for πίστις; Translation philosophy items 3 and 5'
translation_notes:
  revision_awareness: Se corrigió el problema previo de validación asegurando que el marcador de nota [a] aparezca explícitamente en el texto español. También se evitó traducir πώποτε como «otra vez» o «de nuevo», porque el ajuste de revisión del audit trail indica que significa «ever/never at any time», no «again».
  spanish_consistency_notes:
  - Se mantiene «Jesús» para el nombre propio y «Yo soy» para la fórmula de autodeclaración.
  - Se usa «el que» para los participios sustantivados, siguiendo un español natural y consistente.
  - Se conserva «cree en mí» para πιστεύω con εἰς, en línea con el tratamiento joánico del verbo de fe.
  - La negación enfática se expresa con «nunca» para reflejar οὐ μή y πώποτε sin calco duro.
