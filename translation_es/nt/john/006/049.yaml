- from: Sus padres comieron el maná en el desierto[a], y murieron.
  to: Sus padres comieron el maná en el desierto[a] y murieron.
  rationale: Se conserva la traducción sustancialmente correcta, pero se mejora la naturalidad del español quitando la coma innecesaria antes de “y murieron”. Se mantiene la nota léxica sobre “padres/antepasados”, que refleja fielmente la decisión auditada. No se requiere adjudicación adicional.
