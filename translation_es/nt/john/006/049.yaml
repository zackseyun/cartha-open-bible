lexical_decisions:
- source_word: οἱ πατέρες ὑμῶν
  english_pob_choice: Your fathers
  chosen_spanish: sus padres
  alternatives_spanish:
  - sus antepasados
  lexicon: BDAG
  rationale: πατέρες significa literalmente “padres”. En español, “sus padres” conserva la referencia genealógica y la fuerza retórica del dicho de Jesús sin neutralizar el término. “Antepasados” es posible, pero pierde la forma más cercana al griego y suaviza el eco de la formulación original.
- source_word: ἔφαγον
  english_pob_choice: ate
  chosen_spanish: comieron
  alternatives_spanish:
  - comieron de
  lexicon: BDAG
  rationale: El aoristo de ἐσθίω se expresa de manera natural con “comieron”. No hace falta explicitar un matiz aspectual adicional en español.
- source_word: ἐν τῇ ἐρήμῳ
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto de Israel
  - en la región desierta
  lexicon: BDAG
  rationale: Aquí ἔρημος alude al escenario del éxodo. En español, “desierto” comunica de forma clara y bíblicamente reconocible ese trasfondo; “wilderness” no sería natural en español. Se conserva así la referencia al lugar de la provisión y muerte de aquella generación.
- source_word: τὸ μάννα
  english_pob_choice: the manna
  chosen_spanish: el maná
  alternatives_spanish:
  - maná
  lexicon: BDAG
  rationale: El artículo griego puede reflejarse de manera natural con “el maná” en esta referencia conocida. La forma es idiomática en español bíblico y mantiene la concreción del sustantivo.
- source_word: ἀπέθανον
  english_pob_choice: they died
  chosen_spanish: murieron
  alternatives_spanish:
  - y murieron
  lexicon: BDAG
  rationale: El aoristo de ἀποθνῄσκω se traduce con “murieron”. En español, el sujeto ya queda claro por el contexto y la forma verbal; no es necesario repetirlo.
theological_decisions:
- issue: Referencia a la generación del éxodo y fuerza genealógica de πατέρες
  english_pob_reading: Your fathers
  chosen_spanish_reading: sus padres
  alternative_spanish_readings:
  - sus antepasados
  rationale: La frase se refiere a los padres representativos de la generación del desierto, sin cambiar el alcance histórico. “Sus padres” mantiene el paralelismo con el griego y la lectura auditada del POB, preservando la precisión genealógica sin imponer neutralización.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: 'Se siguió el contexto de auditoría del POB en inglés, sin cambios en la evaluación más reciente: la formulación fue considerada estable y de alta concordancia. La versión española conserva las decisiones léxicas principales del griego y adapta únicamente lo necesario para un español natural y publicable.'
  spanish_consistency_notes:
  - Se mantiene “padres” en lugar de una neutralización como “antepasados” para conservar la forma literal y el valor retórico del griego.
  - “Maná” lleva artículo definido porque el referente es conocido y concreto en la historia de Israel.
  - “Desierto” se usa como equivalente bíblico natural de ἐρήμῳ en este contexto exódico.
  - La coordinación final “y murieron” reproduce el enlace simple del griego sin sobreinterpretación.
