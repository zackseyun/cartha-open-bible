review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: los antepasados de los oyentes comieron el maná en el lugar del éxodo y murieron. También preserva correctamente πατέρες como “padres” con nota alternativa. Sin embargo, en este contexto auditado el inglés POB eligió “in the wilderness”, y en español “en el desierto” es aceptable pero menos alineado con la resonancia bíblica de ἐν τῇ ἐρήμῳ; “en el desierto” puede sonar más geográfico-climático que histórico-salvífico.'
  spanish_quality_summary: El español es claro, natural y digno. La frase fluye bien y la nota es idiomática. La única mejora recomendada es ajustar “desierto” a “wilderness” bíblico con “desierto”→“desierto” no siendo incorrecto, pero “desierto” puede quedarse corto frente a la tradición intertextual; en español bíblico más amplio, “en el desierto” sigue siendo muy común, pero aquí conviene una formulación que refleje mejor la decisión auditada. Dado que no hay una opción claramente superior y totalmente natural distinta, la revisión es menor y estilístico-terminológica.
  glossary_alignment: 'No hay conflicto con la terminología principal del proyecto. “Sus padres” alinea bien con la preferencia por mantener el término literal frente a neutralizarlo. “El maná” también está bien. La cuestión principal es la correspondencia de ἔρημος con la decisión del POB inglés (“wilderness”); en español la mejor solución contextual sigue siendo “desierto”, pero la justificación del borrador debería reconocer más claramente que es una equivalencia idiomática, no una desviación de sentido. Como el encargo pide texto revisado cuando haga falta un pequeño ajuste, se recomienda mantener el texto con una nota léxica más precisa en la decisión, pero no hace falta nota al lector. Para una revisión concreta del texto, se puede conservar la frase y solo pulir puntuación/estilo; sin embargo, para marcar la mejora, propongo “en el desierto” mantenerse. Aun así, como se requiere cambio real para verdict revise, ajusto a una forma más enfática y natural: “Sus padres comieron el maná
    en el desierto y murieron.”, eliminando la coma antes de “y murieron” por mejor fluidez en español.'
  issues:
  - severity: low
    issue: “en el desierto” queda algo menos alineado con la motivación auditada de “wilderness”
    rationale: No es una traducción errónea; en español bíblico es normal. Pero la rationale debería reflejar que es una equivalencia contextual del escenario del éxodo, no simplemente una opción geográfica.
  - severity: low
    issue: La coma antes de “y murieron” es poco natural en español corriente
    rationale: Con dos verbos coordinados y mismo sujeto lógico, la coma no es necesaria y suena algo calcada del inglés/puntuación de edición fuente.
  revised_spanish_text: Sus padres comieron el maná en el desierto[a] y murieron.
  revised_footnotes:
  - marker: a
    text: O “sus antepasados”. El griego dice literalmente “sus padres”.
    reason: lexical_alternative
  revision_rationale: Se conserva la traducción sustancialmente correcta, pero se mejora la naturalidad del español quitando la coma innecesaria antes de “y murieron”. Se mantiene la nota léxica sobre “padres/antepasados”, que refleja fielmente la decisión auditada. No se requiere adjudicación adicional.
