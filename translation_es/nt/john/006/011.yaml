revisions:
- from: Así que Jesús tomó los panes[a], y después de dar gracias los repartió entre los que estaban reclinados; igualmente también de los peces[b], tanto como querían.
  to: Así que Jesús tomó los panes[a], y después de dar gracias los repartió a los que estaban reclinados; de igual manera también del pescado[b], tanto como querían.
  rationale: Se ajusta la preposición para reflejar mejor el dativo griego («a los que estaban reclinados») y se cambia «peces» por «pescado» para una lectura española más natural en contexto de comida, manteniendo la alternativa más literal en nota. También se suaviza la secuencia paralela con «de igual manera también», que conserva el doble énfasis de ὁμοίως καὶ sin sonar tan forzado.
