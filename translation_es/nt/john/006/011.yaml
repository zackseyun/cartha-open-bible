translation:
  language: es
  text: Así que Jesús tomó los panes[a], y después de dar gracias los repartió a los que estaban reclinados; de igual manera también del pescado[b], tanto como querían.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a los que estaban sentados». El griego dice más literalmente «a los que estaban reclinados», la postura habitual para una comida.
    reason: lexical_alternative
  - marker: b
    text: O «de los peces pequeños». El término griego puede referirse a pescado servido con pan, posiblemente peces pequeños.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - Entonces
  - Por tanto
  lexicon: BDAG
  rationale: οὖν marca continuidad narrativa y lógica. «Así que» comunica esa transición de manera natural en español sin introducir una conclusión demasiado fuerte como «por tanto».
- source_word: ἄρτους
  english_pob_choice: loaves
  chosen_spanish: los panes
  alternatives_spanish:
  - los panes de pan
  - los bollos
  - los panes/loaves
  lexicon: BDAG
  rationale: En español, «panes» suena más natural que «hogazas» en este contexto, y conserva la referencia plural a los panes del relato sin volverlo demasiado técnico.
- source_word: εὐχαριστήσας
  english_pob_choice: after giving thanks
  chosen_spanish: después de dar gracias
  alternatives_spanish:
  - habiendo dado gracias
  - después de agradecer
  lexicon: BDAG
  rationale: El participio aoristo expresa acción anterior a la principal. «Después de dar gracias» es claro y no añade un objeto explícito no presente en el griego. También deja abierta la resonancia teológica sin explicitarla.
- source_word: διέδωκεν
  english_pob_choice: distributed them
  chosen_spanish: los repartió
  alternatives_spanish:
  - los distribuyó
  - los fue dando
  lexicon: BDAG
  rationale: Aquí el verbo indica reparto entre la multitud. «Los repartió» es natural en español y conserva la idea distributiva sin sonar demasiado administrativo.
- source_word: τοῖς ἀνακειμένοις
  english_pob_choice: to those who were reclining
  chosen_spanish: entre los que estaban reclinados
  alternatives_spanish:
  - a los que estaban reclinados
  - a los recostados
  - entre los sentados
  lexicon: BDAG
  rationale: «Reclinados» refleja mejor el valor literal de ἀνάκειμαι en un contexto de comida. Se usa «estaban reclinados» para mantener claridad narrativa en español moderno.
- source_word: ὁμοίως καὶ
  english_pob_choice: likewise also
  chosen_spanish: igualmente también
  alternatives_spanish:
  - de la misma manera también
  - asimismo
  lexicon: BDAG
  rationale: La doble marca de paralelismo se refleja con «igualmente también», que preserva ambos elementos de énfasis en español.
- source_word: ἐκ τῶν ὀψαρίων
  english_pob_choice: from the fish
  chosen_spanish: de los peces
  alternatives_spanish:
  - de los pescaditos
  - de los peces pequeños
  - de las pescados
  lexicon: BDAG
  rationale: ὀψάριον puede referirse a pescado/peces pequeños que acompañan el pan. «Peces» es lo más natural en español, y la nota conserva la alternativa de «peces pequeños».
- source_word: ὅσον ἤθελον
  english_pob_choice: as much as they wanted
  chosen_spanish: tanto como querían
  alternatives_spanish:
  - cuanto querían
  - lo que quisieran
  - tanto como deseaban
  lexicon: BDAG
  rationale: La frase expresa cantidad sin restricción según el deseo del grupo. «Tanto como querían» comunica bien el sentido de ὅσον + θέλω en español corriente.
theological_decisions:
- issue: Posible resonancia eucarística de εὐχαριστήσας
  english_pob_reading: Render as 'giving thanks' without sacramental expansion
  chosen_spanish_reading: Traducir «después de dar gracias» sin expandir a lenguaje sacramental
  alternative_spanish_readings:
  - después de bendecir
  - después de agradecer a Dios
  - con una alusión explícita a la Eucaristía
  rationale: El verbo dice literalmente «dar gracias». Aunque el relato puede resonar con temas eucarísticos, la traducción no debe importarlos al texto principal sin apoyo explícito del griego.
  doctrine_reference: Primacía del idioma original; preservar la tensión teológica sin resolverla en la traducción.
translation_notes:
  revision_awareness: El texto griego y el auditorio inglés coinciden ampliamente; no se registraron revisiones aplicadas en el paso más reciente. La redacción española sigue esa lectura estable y conserva la equivalencia distributiva, la postura de comida y la ambigüedad moderada de ὀψάριον.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, aunque este versículo no contiene el tetragrámaton.
  - Se conserva «Jesús» para Ἰησοῦς.
  - «Dar gracias» se usa sin expansión sacramental para respetar el valor léxico de εὐχαριστέω.
  - «Reclinados» conserva la imagen de comida del griego; la nota ofrece «sentados» como alternativa idiomática.
  - «Peces» se mantiene en el texto principal por naturalidad; la nota preserva la posibilidad de «peces pequeños».
