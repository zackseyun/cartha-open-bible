translation:
  language: es
  text: 'Simón Pedro le respondió[a]: «Señor, ¿a quién iremos? Tú tienes palabras de vida eterna».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Maestro». El título griego puede funcionar como una forma respetuosa de dirigirse a Jesús, pero «Señor» es la equivalencia preferida del proyecto para κύριος y encaja mejor con el uso joánico aquí.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀπεκρίθη
  english_pob_choice: answered
  chosen_spanish: le respondió
  alternatives_spanish:
  - respondió
  - contestó
  lexicon: BDAG
  rationale: El verbo narrativo normal para introducir la réplica de Pedro. «Le respondió» conserva la relación con el destinatario del discurso y suena natural en español bíblico actual.
- source_word: αὐτῷ
  english_pob_choice: him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: 'El dativo referido a Jesús se expresa de forma idiomática en español con dativo de objeto indirecto: «le». Mantiene la referencia personal sin recargar el estilo.'
- source_word: Σίμων Πέτρος
  english_pob_choice: Simon Peter
  chosen_spanish: Simón Pedro
  alternatives_spanish:
  - Simón, Pedro
  lexicon: nombre propio
  rationale: Se conserva la forma usual del nombre propio en español, sin añadir puntuación innecesaria. Es la equivalencia estándar y transparente.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: «Señor» es el equivalente español más natural y tradicional para el vocativo κύριε en este contexto, preservando su peso cristológico. «Maestro» es posible, pero atenúa el valor del título en Juan.
- source_word: πρὸς τίνα
  english_pob_choice: to whom
  chosen_spanish: ¿a quién?
  alternatives_spanish:
  - ¿hacia quién?
  - ¿a quién iremos?
  lexicon: BDAG
  rationale: La construcción con πρός + interrogativo se vierte de modo idiomático como «¿a quién?». En español, la pregunta de movimiento se completa naturalmente con «iremos».
- source_word: ἀπελευσόμεθα
  english_pob_choice: will we go
  chosen_spanish: iremos
  alternatives_spanish:
  - nos iremos
  - partiremos
  lexicon: BDAG
  rationale: El futuro de ἀπέρχομαι se traduce de manera natural con «iremos». «Nos iremos» o «partiremos» serían más marcados; aquí «iremos» conserva la simplicidad y la fuerza retórica de la pregunta.
- source_word: ῥήματα
  english_pob_choice: words
  chosen_spanish: palabras
  alternatives_spanish:
  - dichos
  - declaraciones
  - sentencias
  lexicon: BDAG
  rationale: «Palabras» preserva el plural y la naturalidad del español. «Dichos» o «declaraciones» serían posibles, pero menos fluidos y más interpretativos.
- source_word: ζωῆς αἰωνίου
  english_pob_choice: of eternal life
  chosen_spanish: de vida eterna
  alternatives_spanish:
  - de vida perpetua
  - de vida eterna duradera
  lexicon: BDAG
  rationale: La expresión joánica estable es «vida eterna», y el genitivo se expresa naturalmente con «de». Se mantiene la formulación bíblica clara sin diluir el sentido técnico del término.
- source_word: ἔχεις
  english_pob_choice: you have
  chosen_spanish: tú tienes
  alternatives_spanish:
  - tienes
  lexicon: BDAG
  rationale: El presente de posesión se vierte con «tienes». Se explicita el pronombre por énfasis y claridad en la réplica de Pedro, como permite el español.
theological_decisions:
- issue: Valor cristológico del vocativo κύριε dirigido a Jesús
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Maestro
  rationale: Se mantiene «Señor» porque el inglés POB sigue la lectura por defecto de κύριος y el contexto joánico da a este vocativo una carga cristológica que no conviene rebajar. «Maestro» sigue siendo una alternativa semántica posible, pero no la preferida aquí.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
translation_notes:
  revision_awareness: El texto coincide con el pasaje fuente y con el audit trail inglés en el punto principal de decisión (κύριος → Lord/Señor). No hay revisiones aplicadas en el paquete fuente; se preserva el orden, el contenido y la fuerza interrogativa del griego.
  spanish_consistency_notes:
  - Se mantiene la fórmula joánica «vida eterna» como terminología fija.
  - Se conserva el vocativo directo con comillas españolas y puntuación interrogativa invertida.
  - No se introduce «Cristo» ni «Mesías» porque no aparecen en este versículo.
  - El pronombre dativo se expresa como «le» por naturalidad sintáctica en español.
