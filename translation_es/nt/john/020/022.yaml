translation:
  language: es
  text: 'Y después de decir esto[a], sopló sobre ellos y les dijo: «Reciban el Espíritu Santo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sopló en ellos». El verbo también recuerda la imaginería de creación y nueva creación en Génesis 2:7 y Ezequiel 37.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦτο εἰπὼν
  english_pob_choice: after saying this
  chosen_spanish: Y después de decir esto
  alternatives_spanish:
  - Habiendo dicho esto
  - Cuando hubo dicho esto
  lexicon: BDAG
  rationale: El participio aoristo con τοῦτο marca una acción previa a la principal. «Después de decir esto» conserva esa secuencia temporal en un español natural y digno.
- source_word: ἐνεφύσησεν
  english_pob_choice: breathed on them
  chosen_spanish: sopló sobre ellos
  alternatives_spanish:
  - sopló en ellos
  - respiró sobre ellos
  lexicon: BDAG
  rationale: El verbo puede significar soplar/insuflar. En español, «sopló sobre ellos» comunica bien la acción física sin forzar una lectura más específica en el texto principal. La nota preserva la posible resonancia con Génesis 2:7 y Ezequiel 37.
- source_word: λέγει αὐτοῖς
  english_pob_choice: said to them
  chosen_spanish: les dijo
  alternatives_spanish:
  - les dice
  lexicon: BDAG
  rationale: Aunque el griego usa presente histórico, en español narrativo fluido se mantiene mejor el pasado. «Les dijo» conserva el sentido sin perder claridad.
- source_word: Λάβετε
  english_pob_choice: Receive
  chosen_spanish: Reciban
  alternatives_spanish:
  - Recibid
  - Recibe
  lexicon: BDAG
  rationale: El imperativo aoristo plural se expresa de manera natural con «Reciban». Mantiene el valor de acogida/recepción y evita la posible idea de tomar por iniciativa propia.
- source_word: πνεῦμα ἅγιον
  english_pob_choice: the Holy Spirit
  chosen_spanish: el Espíritu Santo
  alternatives_spanish:
  - Espíritu Santo
  - un espíritu santo
  lexicon: BDAG
  rationale: En el contexto joánico se refiere al Espíritu divino, no a un «espíritu santo» indefinido. El artículo español explicita el referente personal-divino que el contexto exige.
theological_decisions:
- issue: 'Cómo traducir πνεῦμα ἅγιον: referente personal-divino o cualidad indefinida'
  english_pob_reading: the Holy Spirit
  chosen_spanish_reading: el Espíritu Santo
  alternative_spanish_readings:
  - Espíritu Santo
  - espíritu santo
  rationale: En Juan, esta expresión nombra al Espíritu de Dios. Traducirlo con mayúsculas y artículo mantiene la lectura trinitaria sin añadir contenido ajeno al texto.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Valor del verbo ἐνεφύσησεν y su posible eco intertextual
  english_pob_reading: breathed on them
  chosen_spanish_reading: sopló sobre ellos
  alternative_spanish_readings:
  - sopló en ellos
  - respiró sobre ellos
  rationale: La traducción principal no debe sobredeterminar el eco a la creación nueva, pero la nota puede reconocerlo. Así se preserva la tensión entre la acción narrativa inmediata y su resonancia bíblica.
  doctrine_reference: Juan 20:22; Génesis 2:7; Ezequiel 37
translation_notes:
  revision_awareness: El borrador sigue el pasaje griego SBLGNT y concuerda con el audit trail inglés sin cambios revisados posteriores; la última pasada indicó que no hacía falta modificar la solución previa.
  spanish_consistency_notes:
  - Se mantiene «Espíritu Santo» con mayúsculas por referencia personal-divina en el contexto joánico.
  - «Reciban» refleja el imperativo plural y suena natural en español culto latinoamericano.
  - La nota conserva la alternativa lexical principal para ἐνεφύσησεν y su resonancia intertextual, sin trasladarla al cuerpo principal.
