translation:
  language: es
  text: Entonces el otro discípulo, que había llegado primero al sepulcro, también entró[a], y vio y creyó[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entró». El griego puede expresarse en español como «también entró» o simplemente «entró», según cómo se refleje el énfasis de «también».
    reason: lexical_alternative
  - marker: b
    text: El griego simplemente dice «creyó» sin expresar explícitamente qué creyó; los intérpretes difieren sobre si creyó en la resurrección, creyó la evidencia que tenía delante, o creyó el informe anterior.
    reason: alternative_reading
lexical_decisions:
- source_word: τότε οὖν
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Así que
  - Luego
  lexicon: BDAG
  rationale: La combinación marca secuencia narrativa con un leve matiz inferencial. «Entonces» comunica naturalmente ese avance del relato en español sin volverlo más fuerte de lo que permite el griego.
- source_word: εἰσῆλθεν
  english_pob_choice: went in
  chosen_spanish: entró
  alternatives_spanish:
  - fue adentro
  - ingresó
  lexicon: BDAG
  rationale: El verbo aoristo expresa la entrada concreta al lugar. «Entró» es la equivalencia directa y natural en español; no hace falta una paráfrasis más larga.
- source_word: ὁ ἄλλος μαθητής
  english_pob_choice: the other disciple
  chosen_spanish: el otro discípulo
  alternatives_spanish:
  - el otro seguidor
  - el otro estudiante
  lexicon: BDAG
  rationale: «Discípulo» es el equivalente estable en el contexto joánico y conserva el valor narrativo-teológico del término griego.
- source_word: ὁ ἐλθὼν πρῶτος εἰς τὸ μνημεῖον
  english_pob_choice: who had arrived at the tomb first
  chosen_spanish: que había llegado primero al sepulcro
  alternatives_spanish:
  - que vino primero al sepulcro
  - el que había llegado primero al sepulcro
  lexicon: BDAG
  rationale: La construcción participial identifica al discípulo por haber llegado antes que Pedro. «Había llegado primero» expresa bien la anterioridad relativa y «sepulcro» refleja con precisión μνημεῖον en el relato de resurrección.
- source_word: μνημεῖον
  english_pob_choice: tomb
  chosen_spanish: sepulcro
  alternatives_spanish:
  - tumba
  - túmulo
  lexicon: BDAG
  rationale: En este contexto narrativo funerario, «sepulcro» es claro, natural y fiel al lugar de enterramiento al que se refiere el texto. Conserva la dignidad del registro sin introducir una interpretación distinta.
- source_word: εἶδεν
  english_pob_choice: and he saw
  chosen_spanish: y vio
  alternatives_spanish:
  - y miró
  - y contempló
  lexicon: BDAG
  rationale: «Vio» es la equivalencia directa de εἶδεν. Mantiene la concisión del griego y deja espacio al matiz narrativo que el contexto desarrolla.
- source_word: ἐπίστευσεν
  english_pob_choice: believed
  chosen_spanish: y creyó
  alternatives_spanish:
  - y llegó a creer
  - y tuvo fe
  lexicon: BDAG
  rationale: Se conserva el verbo en forma absoluta sin especificar su objeto, como en el griego. «Creyó» mantiene la brevedad y la tensión interpretativa que el POB inglés preserva.
theological_decisions:
- issue: Qué fue exactamente lo que creyó el discípulo
  english_pob_reading: Render the verb absolutely as 'believed' without specifying the content.
  chosen_spanish_reading: Traducir simplemente «creyó», sin añadir qué creyó.
  alternative_spanish_readings:
  - creyó que Jesús había resucitado
  - creyó el testimonio previo
  - llegó a la fe
  rationale: El griego no expresa el objeto del verbo. Añadirlo cerraría una cuestión interpretativa que el texto deja abierta, especialmente por la frase siguiente. Mantener «creyó» conserva la tensión narrativa y teológica documentada por el POB inglés.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto coincide con el pasaje fuente y con el audit trail inglés, sin ajustes posteriores necesarios.
  spanish_consistency_notes:
  - Se mantiene «sepulcro» para μνημεῖον, coherente con el registro narrativo de resurrección en Juan.
  - Se preserva la ambigüedad de ἐπίστευσεν sin explicitar su objeto, siguiendo la decisión teológica del original auditado.
  - La secuencia verbal «vio y creyó» reproduce la brevedad enfática del griego y no añade elementos explicativos.
