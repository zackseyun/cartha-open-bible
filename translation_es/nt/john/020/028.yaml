  source_alignment_summary: 'El borrador español refleja fielmente el griego: ἀπεκρίθη Θωμᾶς καὶ εἶπεν αὐτῷ se traduce naturalmente como «Tomás respondió y le dijo», y la confesión coordinada Ὁ κύριός μου καὶ ὁ θεός μου queda preservada como «¡Mi Señor y mi Dios!». La nota mantiene correctamente la alternativa menos probable de leerlo como exclamación, pero da prioridad justificada a la dirección directa a Jesús por αὐτῷ.'
