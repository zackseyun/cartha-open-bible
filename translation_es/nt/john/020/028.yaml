translation:
  language: es
  text: 'Tomás respondió y le dijo[a]: «¡Mi Señor y mi Dios!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, menos probable, Tomás respondió y dijo: «¡Mi Señor y mi Dios!», como exclamación; sin embargo, el griego dice que habló «a él», lo que favorece que se dirija directamente a Jesús.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀπεκρίθη
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: BDAG
  rationale: En español, ‘respondió’ reproduce bien el valor narrativo normal de ἀποκρίνομαι y mantiene la fluidez. ‘Contestó’ también sería posible, pero ‘respondió’ suena más sobrio y cercano al registro bíblico sin arcaizar en exceso.
- source_word: Θωμᾶς
  english_pob_choice: Thomas
  chosen_spanish: Tomás
  alternatives_spanish:
  - Tomás
  lexicon: transliteración onomástica
  rationale: El nombre propio se translitera conforme al uso español estándar y la práctica del proyecto.
- source_word: εἶπεν αὐτῷ
  english_pob_choice: said to him
  chosen_spanish: le dijo
  alternatives_spanish:
  - le dijo a él
  - dijo
  lexicon: BDAG
  rationale: ‘Le dijo’ expresa naturalmente el dativo αὐτῷ en español. Se evita introducir ‘Jesús’ en el cuerpo del texto porque el griego dice simplemente ‘a él’, preservando la referencia implícita del contexto.
- source_word: Ὁ κύριός μου
  english_pob_choice: My Lord
  chosen_spanish: mi Señor
  alternatives_spanish:
  - mi señor
  - mi Amo
  lexicon: BDAG
  rationale: ‘Señor’ conserva la fuerza reverencial y cristológica de κύριος mejor que ‘amo’ o una lectura meramente honorífica. Se mantiene el posesivo ‘mi’ para reflejar el griego μου.
- source_word: ὁ θεός μου
  english_pob_choice: my God
  chosen_spanish: mi Dios
  alternatives_spanish:
  - mi dios
  lexicon: BDAG
  rationale: ‘Dios’ es la traducción directa y normal de θεός. Se conserva el posesivo ‘mi’ para reproducir la confesión personal de Tomás.
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: conjunción coordinante
  rationale: ‘Y’ preserva la coordinación simple entre los dos títulos sin añadir matiz interpretativo.
theological_decisions:
- issue: Si la frase de Tomás debe entenderse como confesión directa dirigida a Jesús o como exclamación no dirigida a él
  english_pob_reading: 'Direct confession to Jesus: ''My Lord and my God!'''
  chosen_spanish_reading: 'Confesión directa a Jesús: «¡Mi Señor y mi Dios!»'
  alternative_spanish_readings:
  - Exclamación dirigida a Dios sin identificar directamente a Jesús
  rationale: El texto griego dice explícitamente que Tomás ‘le dijo’ a él (αὐτῷ), lo que favorece la lectura de dirección directa. El español conserva esa relación con ‘le dijo’ y deja intacta la fuerza cristológica de la confesión.
  doctrine_reference: Credo de Nicea-Constantinopla (381); Definición de Calcedonia (451); primacía del texto original y preservación de la tensión teológica
- issue: El valor de κύριος en una confesión cristológica
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - amo
  - maestro
  rationale: ‘Señor’ es la forma española que mejor conserva la dignidad, la carga cristológica y la posibilidad de alusión al título divino sin reducirlo a un mero tratamiento cortés.
  doctrine_reference: Cristología del NT; uso bíblico de κύριος
translation_notes:
  revision_awareness: 'Se corrigió la validación previa: el marcador de nota [a] ahora aparece en el texto principal junto a la frase a la que se refiere. La nota conserva la lectura alternativa documentada por el audit trail inglés y la razón gramatical basada en αὐτῷ.'
  spanish_consistency_notes:
  - Se mantuvo ‘Señor’ para κύριος y ‘Dios’ para θεός, siguiendo la decisión auditada del inglés POB.
  - Se evitó explicitar ‘Jesús’ en el texto principal porque el griego usa un pronombre dativo; la identidad del destinatario queda dada por el contexto y se explica en la nota.
  - La puntuación con comillas y exclamación sigue el tono confesional del pasaje sin forzar una paráfrasis.
