  glossary_alignment: La elección de «Señor» para κύριος y «Dios» para θεός concuerda con la terminología del proyecto y con la decisión teológica documentada. No hay conflicto con el uso de «Yahvé», ya que aquí el texto fuente usa κύριος en confesión dirigida a Jesús, no el nombre divino hebreo.
