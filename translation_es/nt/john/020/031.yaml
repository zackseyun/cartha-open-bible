base_translation:
  language: en
  yaml_path: translation/nt/john/020/031.yaml
  text: But these have been written so that you may believe that Jesus is the Messiah[a], the Son of God[b], and so that by believing you may have life in his name.
  footnotes:
  - marker: a
    text: Some manuscripts read 'so that you may come to believe' (aorist), while others support 'so that you may continue believing' (present). The main text renders the clause broadly as 'so that you may believe.'
    reason: textual_variant
  - marker: b
    text: Or 'the Christ.' The Greek title Χριστός is rendered 'Messiah' here to preserve its meaning as a title.
    reason: alternative_reading
