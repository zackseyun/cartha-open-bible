translation:
  language: es
  text: Pero estas han sido escritas para que ustedes crean que Jesús es el Mesías[a], el Hijo de Dios[b], y para que, creyendo, tengan vida en su nombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Algunos manuscritos leen: «para que ustedes lleguen a creer» (aoristo), mientras que otros apoyan «para que ustedes sigan creyendo» (presente). El texto principal lo vierte de manera amplia como «crean».'
    reason: textual_variant
  - marker: b
    text: 'O: «el Cristo». El título griego Χριστός se traduce aquí como «Mesías» para conservar su sentido.'
    reason: alternative_reading
lexical_decisions:
- source_word: ταῦτα
  english_pob_choice: these
  chosen_spanish: estas cosas
  alternatives_spanish:
  - estas
  lexicon: BDAG
  rationale: El demostrativo plural se refiere al material escrito previamente; en español, "estas cosas" es natural y mantiene la referencia amplia sin volverla demasiado genérica.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora
  lexicon: BDAG
  rationale: Marca transición con matiz contrastivo respecto del contexto anterior; "Pero" conserva bien ese giro discursivo en español.
- source_word: γέγραπται
  english_pob_choice: have been written
  chosen_spanish: han sido escritas
  alternatives_spanish:
  - están escritas
  - fueron escritas
  lexicon: BDAG
  rationale: El perfecto pasivo expresa acción completada con efecto vigente. "Han sido escritas" conserva mejor ese valor que un simple presente o pasado remoto.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  lexicon: BDAG
  rationale: Introduce finalidad. "Para que" es idiomático en español y mantiene claramente el sentido purposivo.
- source_word: πιστεύητε
  english_pob_choice: you may believe
  chosen_spanish: ustedes crean
  alternatives_spanish:
  - ustedes crean y sigan creyendo
  - ustedes crean continuamente
  lexicon: BDAG
  rationale: El subjuntivo presente permite una lectura amplia; "crean" evita fijar de más si el matiz es ingresivo o continuativo. Se conserva la tensión textual/aspectual en la nota.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - que
  lexicon: BDAG
  rationale: Introduce el contenido de la fe de forma directa y natural en español.
- source_word: Ἰησοῦς
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - Jesús
  lexicon: BDAG
  rationale: Nombre propio estándar en español.
- source_word: ὁ χριστός
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - el Cristo
  lexicon: BDAG
  rationale: Como título, Χριστός se traduce para conservar el sentido mesiánico y evitar una transliteración que en español puede sonar más litúrgica que semántica.
- source_word: ὁ υἱὸς τοῦ θεοῦ
  english_pob_choice: the Son of God
  chosen_spanish: el Hijo de Dios
  alternatives_spanish:
  - el Hijo de Dios
  lexicon: BDAG
  rationale: Título cristológico estable y preciso; se mantiene sin dilución.
- source_word: καὶ ἵνα
  english_pob_choice: and so that
  chosen_spanish: y para que
  alternatives_spanish:
  - y a fin de que
  lexicon: BDAG
  rationale: La coordinación de dos propósitos se expresa de modo paralelo y claro. "Y para que" reproduce bien la segunda finalidad.
- source_word: πιστεύοντες
  english_pob_choice: by believing
  chosen_spanish: creyendo
  alternatives_spanish:
  - al creer
  - por medio de creer
  lexicon: BDAG
  rationale: El participio funciona adverbialmente; en español, un gerundio simple expresa de manera natural el medio o circunstancia concomitante sin sobreexplicar.
- source_word: ζωὴν
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - vida
  lexicon: BDAG
  rationale: No hay adjetivo equivalente a "eterna" en el texto griego; se mantiene el sustantivo simple.
- source_word: ἔχητε
  english_pob_choice: you may have
  chosen_spanish: tengan
  alternatives_spanish:
  - posean
  lexicon: BDAG
  rationale: Verbo simple y natural para el subjuntivo de finalidad.
- source_word: ἐν τῷ ὀνόματι αὐτοῦ
  english_pob_choice: in his name
  chosen_spanish: en su nombre
  alternatives_spanish:
  - por medio de su nombre
  lexicon: BDAG
  rationale: Se conserva el modismo bíblico sin expandirlo interpretativamente; en español, "en su nombre" es idiomático y fiel.
theological_decisions:
- issue: Título Χριστός como mesianismo
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - el Cristo
  rationale: El griego usa Χριστός como título. Traducirlo por "Mesías" preserva su contenido histórico-teológico y evita trasladarlo como un nombre fijo sin explicar el sentido.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
- issue: Aspecto y variante textual en πιστεύητε / πιστεύσητε
  english_pob_reading: you may believe
  chosen_spanish_reading: ustedes crean
  alternative_spanish_readings:
  - ustedes sigan creyendo
  rationale: La forma presente del texto impreso puede sugerir continuidad, mientras que la variante aorista favorece una entrada a la fe. "Crean" mantiene amplitud y evita resolver la cuestión en el texto principal; la nota preserva la tensión textual y aspectual.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El texto griego SBLGNT y el resumen auditado en inglés muestran alta concordancia con la traducción inglesa previa; no se registran revisiones aplicadas en el paquete fuente. La versión española sigue la misma solución principal, manteniendo la tensión textual de πιστεύητε y la traducción titular de Χριστός.
  spanish_consistency_notes:
  - Se mantiene "Mesías" para Χριστός, en línea con la terminología POB.
  - Se evita introducir "Cristo" como forma principal porque en este versículo λειτουργa como título y no como nombre propio fijo.
  - '"Crean" conserva el alcance del subjuntivo sin forzar una decisión entre inicio y continuidad de la fe.'
  - '"En su nombre" reproduce el modismo bíblico sin ampliar su sentido de forma interpretativa.'
