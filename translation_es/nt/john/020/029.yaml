translation:
  language: es
  text: 'Jesús le dijo: «¿Porque me has visto, has creído?[a] Bienaventurados los que no han visto y han creído».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Porque me has visto, has creído». El griego puede leerse como pregunta o como afirmación.'
    reason: alternative_reading
lexical_decisions:
- source_word: λέγει αὐτῷ
  english_pob_choice: said to him
  chosen_spanish: le dijo
  alternatives_spanish:
  - le decía
  - le habló
  lexicon: BDAG
  rationale: En español narrativo, el aoristo/presente histórico se expresa naturalmente con pretérito simple. «Le dijo» conserva la dirección del habla hacia Tomás sin sobrecargar el tono.
- source_word: Ὅτι
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - ¿Porque
  - Que
  lexicon: BDAG
  rationale: «Porque» refleja la lectura causal preferida en la audición inglesa y mantiene la posibilidad de leer la cláusula como afirmación o pregunta en la puntuación. En español, el inicio de cita con pregunta permite conservar la tensión sin añadir explicaciones.
- source_word: ἑώρακάς
  english_pob_choice: you have seen
  chosen_spanish: me has visto
  alternatives_spanish:
  - me viste
  - has visto
  lexicon: BDAG
  rationale: El perfecto griego se vierte como pretérito perfecto compuesto en español para expresar la acción completada con relevancia presente. Se mantiene el objeto directo «me» para reproducir la relación inmediata con Jesús.
- source_word: πεπίστευκας
  english_pob_choice: you have believed
  chosen_spanish: has creído
  alternatives_spanish:
  - has tenido fe
  - creíste
  lexicon: BDAG
  rationale: «Has creído» conserva el valor perfectivo del griego y su vínculo con el estado presente de Tomás. «Creíste» sería posible, pero debilita la resonancia aspectual que el POB inglés procuró preservar.
- source_word: μακάριοι
  english_pob_choice: Blessed
  chosen_spanish: Bienaventurados
  alternatives_spanish:
  - Benditos
  - Dichosos
  lexicon: BDAG
  rationale: «Bienaventurados» es la fórmula castellana más estable para las bienaventuranzas y expresa mejor el peso teológico de μακάριοι que opciones más coloquiales como «dichosos».
- source_word: οἱ μὴ ἰδόντες
  english_pob_choice: those who have not seen
  chosen_spanish: los que no vieron
  alternatives_spanish:
  - los que no han visto
  - los que no han llegado a ver
  lexicon: BDAG
  rationale: El participio aoristo sustantivado se traduce de forma natural como relativo plural. Aquí se eligió un pretérito simple en español para mantener la brevedad del dicho y evitar una lectura excesivamente explicativa.
- source_word: καὶ πιστεύσαντες
  english_pob_choice: and have believed
  chosen_spanish: y creyeron
  alternatives_spanish:
  - y han creído
  - y creyeron sin ver
  lexicon: BDAG
  rationale: Se conserva la coordinación simple del griego sin añadir «también» ni «sin embargo», porque el contraste ya queda implícito en «no vieron». El pretérito simple mantiene el paralelismo con la cláusula anterior.
theological_decisions:
- issue: Lectura interrogativa o declarativa de la primera cláusula
  english_pob_reading: The Greek can be read as either a question or a statement.
  chosen_spanish_reading: 'La puntuación española mantiene la lectura interrogativa: «¿Porque me has visto, has creído?».'
  alternative_spanish_readings:
  - «Porque me has visto, has creído.»
  - «¿Porque me has visto has creído?»
  rationale: La interrogación preserva la fuerza retórica señalada en el aparato inglés y deja abierta la posibilidad de la lectura declarativa como variante de traducción, sin resolver artificialmente una ambigüedad del texto griego.
  doctrine_reference: Preservar la tensión textual y retórica sin cerrarla prematuramente
- issue: Contraste entre ver y creer
  english_pob_reading: Blessed are those who have not seen and have believed.
  chosen_spanish_reading: Bienaventurados los que no vieron y creyeron.
  alternative_spanish_readings:
  - Bienaventurados los que no han visto y han creído.
  - Bienaventurados los que no vieron y han creído.
  rationale: La formulación breve conserva el contraste central del dicho de Jesús sin introducir conectores ajenos al griego. La bienaventuranza recae sobre quienes llegan a creer sin la base de la visión física.
  doctrine_reference: Fe sin visión física como tema de bienaventuranza
translation_notes:
  revision_awareness: Se corrigió el fallo anterior eliminando cualquier nota al pie no anclada en el texto. Ahora no se incluyen footnotes, de modo que no hay marcadores huérfanos.
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς conforme al estándar del proyecto.
  - Se usa «Bienaventurados» para μακάριοι, coherente con el registro bíblico en español.
  - Se evita «Cristo» porque el pasaje nombra explícitamente a Jesús, no usa aquí el título Χριστός.
  - Se conserva un español sobrio y eclesial sin depender de formulaciones tradicionales que oculten la lectura griega.
