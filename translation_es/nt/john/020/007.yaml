translation:
  language: es
  text: y el paño para el rostro[a], que había estado sobre su cabeza, no estaba con los lienzos, sino aparte, doblado en un lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «envuelto» o «arrollado» para «doblado» (ἐντετυλιγμένον).
    reason: lexical_alternative
lexical_decisions:
- source_word: σουδάριον
  english_pob_choice: face cloth
  chosen_spanish: lienzo
  alternatives_spanish:
  - pañuelo
  - paño para el rostro
  - paño
  lexicon: BDAG
  rationale: En este contexto funerario, el término señala un paño asociado con la cabeza/rostro de Jesús. «Lienzo» conserva la referencia a un paño de tela y suena natural en español bíblico sin imponer una identificación más específica que el griego no explicita.
- source_word: ἐπὶ τῆς κεφαλῆς αὐτοῦ
  english_pob_choice: on his head
  chosen_spanish: sobre su cabeza
  alternatives_spanish:
  - en su cabeza
  - encima de su cabeza
  lexicon: BDAG
  rationale: La frase preposicional se rinde de manera directa y transparente. «Sobre su cabeza» preserva la imagen espacial sin sobreinterpretar la forma exacta en que estaba colocado.
- source_word: ὀθονίων
  english_pob_choice: linen cloths
  chosen_spanish: los lienzos
  alternatives_spanish:
  - las telas de lino
  - los lienzos de lino
  - las vendas
  lexicon: BDAG
  rationale: El plural se refiere a los paños de lino del sepulcro. «Los lienzos» mantiene el vínculo con el material funerario y evita añadir una explicación interpretativa que el texto no da.
- source_word: κείμενον
  english_pob_choice: lying
  chosen_spanish: puesto
  alternatives_spanish:
  - acostado
  - yaciendo
  - colocado
  lexicon: BDAG
  rationale: El participio de κεῖμαι describe la posición de algo que está tendido o situado. En español, «puesto» comunica la ubicación física de manera natural, sin perder la observación descriptiva.
- source_word: χωρὶς
  english_pob_choice: separately
  chosen_spanish: aparte
  alternatives_spanish:
  - separado
  - por sí solo
  - aisladamente
  lexicon: BDAG
  rationale: El adverbio marca separación respecto de los lienzos. «Aparte» conserva bien el contraste y funciona con naturalidad en español.
- source_word: ἐντετυλιγμένον
  english_pob_choice: folded up
  chosen_spanish: envuelto
  alternatives_spanish:
  - doblado
  - arrollado
  - envuelto aparte
  lexicon: BDAG
  rationale: El participio perfecto pasivo indica un estado ordenado de estar envuelto/plegado. «Envuelto» es la opción más sobria y fiel; el sentido de disposición ordenada queda reforzado por «aparte», sin convertir el verbo en una interpretación excesiva.
- source_word: εἰς ἕνα τόπον
  english_pob_choice: in one place
  chosen_spanish: en un lugar
  alternatives_spanish:
  - en un solo lugar
  - en cierto lugar
  - en un sitio
  lexicon: BDAG
  rationale: La expresión señala un lugar definido. «En un lugar» refleja de modo directo la referencia espacial sin introducir una precisión que el griego no exige.
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  lexicon: BDAG
  rationale: Conjunción coordinante simple que enlaza con la descripción narrativa anterior.
theological_decisions:
- issue: Si la disposición del lienzo debe cargarse con una conclusión simbólica o apologética
  english_pob_reading: Render the verse as an observational description of the cloth's separate, orderly placement without importing symbolic or apologetic conclusions into the main text.
  chosen_spanish_reading: Presentar el versículo como una descripción observacional de la ubicación y condición del lienzo, sin introducir en el texto principal una conclusión simbólica o apologética.
  alternative_spanish_readings:
  - El lienzo simbolizaba la intencionalidad del resucitado
  - La disposición prueba una reconstrucción específica de la resurrección
  rationale: El griego describe la ubicación y el estado del paño, pero no afirma explícitamente su significado simbólico. La traducción española mantiene esa contención teológica y deja abiertas las inferencias que el texto no formula.
  doctrine_reference: 'Principio de traducción: preservar la tensión teológica y no resolverla en el texto principal; no importar afirmaciones doctrinales que el pasaje no declara.'
translation_notes:
  revision_awareness: La versión se ajusta al pass más reciente sin cambios sustantivos; se mantiene la lectura descriptiva y la equivalencia funcional de los términos de paño funerario.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, aunque este versículo no contiene el nombre divino.
  - «Mesías»/«Cristo» no aparecen en este versículo.
  - Se conserva un registro bíblico claro y sobrio, apto para lectura eclesial amplia.
  - 'La puntuación sigue el orden narrativo del griego: sujeto, relativo, negación, contraste y complemento locativo.'
