revisions:
- from: y el lienzo[a] que había estado sobre su cabeza, no estaba puesto junto con los lienzos, sino envuelto aparte, en un lugar.
  to: y el paño para el rostro[a], que había estado sobre su cabeza, no estaba con los lienzos, sino aparte, doblado en un lugar.
  rationale: La revisión distingue el σουδάριον de los ὀθόνια con «paño para el rostro», siguiendo la lógica contextual del inglés auditado y evitando la repetición «lienzo/lienzos». También cambia ἐντετυλιγμένον a «doblado», que representa mejor el estado ordenado descrito, mientras preserva «envuelto» y «arrollado» como alternativas en nota. Se mantiene la sobriedad descriptiva del texto sin añadir inferencias teológicas.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:05:49Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura básica del griego y mantiene la contención teológica del POB. Sin embargo, dos elecciones debilitan la fidelidad léxica y descriptiva: «lienzo» para σουδάριον pierde la especificidad de paño de cabeza/rostro en contraste con los ὀθόνια, y «envuelto» para ἐντετυλιγμένον no preserva bien el matiz de estar doblado/arrollado en un estado ordenado que el inglés auditado marcó con nota.'
  spanish_quality_summary: El español es legible, pero «el lienzo ... junto con los lienzos» suena repetitivo y poco claro. «Puesto» para κείμενον es aceptable pero menos natural que «estando»/«que estaba» con «con». «En un lugar» es comprensible, aunque «en un lugar aparte» sería redundante con χωρὶς; «en un solo lugar» o «en un lugar» depende del grado de literalidad. La mejor mejora es distinguir el σουδάριον como «paño para el rostro» y usar «doblado» con nota alternativa.
  glossary_alignment: No hay conflicto con la terminología doctrinal principal del proyecto. La revisión propuesta alinea mejor la distinción entre σουδάριον y ὀθόνια, y conserva la nota léxica del inglés para ἐντετυλιγμένον con alternativas españolas adecuadas.
  issues:
  - severity: medium
    issue: «lienzo» para σουδάριον no distingue bien este paño de los ὀθόνια
    rationale: El griego contrasta el σουδάριον con las telas/lienzos funerarios. En español, «lienzo» para ambos crea ambigüedad y repetición. «Paño para el rostro» o similar preserva mejor la referencia contextual del inglés POB («face cloth»).
  - severity: medium
    issue: «envuelto» para ἐντετυλιγμένον debilita el matiz de disposición ordenada
    rationale: El inglés POB eligió «folded up» y conservó «wrapped up/rolled up» como alternativas. En español, «envuelto» se acerca demasiado a la idea genérica de estar cubierto o enrollado, mientras «doblado» transmite mejor el estado observado; las otras opciones pueden quedar en nota.
  - severity: low
    issue: La nota al pie repite «envuelto» como lema y alternativa
    rationale: «O «envuelto» o «arrollado» para «envuelto»» es poco útil y circular. La nota debe reflejar una base principal clara, por ejemplo «doblado», con alternativas «envuelto» o «arrollado».
  revised_spanish_text: y el paño para el rostro[a], que había estado sobre su cabeza, no estaba con los lienzos, sino aparte, doblado en un lugar.
  revised_footnotes:
  - marker: a
    text: O «envuelto» o «arrollado» para «doblado» (ἐντετυλιγμένον).
    reason: lexical_alternative
  revision_rationale: La revisión distingue el σουδάριον de los ὀθόνια con «paño para el rostro», siguiendo la lógica contextual del inglés auditado y evitando la repetición «lienzo/lienzos». También cambia ἐντετυλιγμένον a «doblado», que representa mejor el estado ordenado descrito, mientras preserva «envuelto» y «arrollado» como alternativas en nota. Se mantiene la sobriedad descriptiva del texto sin añadir inferencias teológicas.
