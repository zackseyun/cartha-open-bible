translation:
  language: es
  text: Y el primer día de la semana[a], María Magdalena viene al sepulcro temprano, cuando todavía estaba oscuro, y ve la piedra ya quitada del sepulcro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, 'en uno de los sábados'; es un giro idiomático que significa 'el primer día de la semana'.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τῇ δὲ μιᾷ τῶν σαββάτων
  english_pob_choice: Now on the first day of the week
  chosen_spanish: Ahora, el primer día de la semana[a]
  alternatives_spanish:
  - Al primer día de la semana
  - Ahora, en uno de los sábados
  lexicon: BDAG
  rationale: El griego es un giro idiomático que en uso koiné significa 'el primer día de la semana'. 'Ahora' traduce de modo discursivo δέ sin forzar contraste. Se conserva el valor idiomático y se evita una traducción literal que oscurezca el sentido.
- source_word: Μαρία ἡ Μαγδαληνή
  english_pob_choice: Mary Magdalene
  chosen_spanish: María Magdalena
  alternatives_spanish:
  - María la Magdalena
  lexicon: BDAG
  rationale: Nombre propio y sobrenombre geográfico habituales en español bíblico. Se conserva la forma natural y reconocible del nombre sin añadir un artículo que no es necesario en español.
- source_word: ἔρχεται
  english_pob_choice: comes
  chosen_spanish: viene
  alternatives_spanish:
  - llega
  - va
  lexicon: BDAG
  rationale: El presente histórico se mantiene en español con 'viene' para conservar la vivacidad narrativa. 'Llega' también sería posible, pero 'viene' refleja mejor el movimiento expresado por el verbo.
- source_word: πρωῒ
  english_pob_choice: early
  chosen_spanish: temprano
  alternatives_spanish:
  - de madrugada
  - muy de mañana
  lexicon: BDAG
  rationale: '''Temprano'' expresa con concisión el adverbio sin añadir una precisión interpretativa mayor que la del griego. La cláusula siguiente completa la escena temporal.'
- source_word: σκοτίας ἔτι οὔσης
  english_pob_choice: while it was still dark
  chosen_spanish: mientras todavía había oscuridad
  alternatives_spanish:
  - cuando todavía estaba oscuro
  - mientras aún era de noche
  lexicon: BDAG
  rationale: La construcción de genitivo absoluto se vierte como cláusula temporal natural en español. 'Había oscuridad' preserva el sustantivo σκοτία y evita reducirlo únicamente a un adjetivo de estado.
- source_word: εἰς τὸ μνημεῖον
  english_pob_choice: to the tomb
  chosen_spanish: al sepulcro
  alternatives_spanish:
  - al túmulo
  - a la tumba
  lexicon: BDAG
  rationale: μνημεῖον designa aquí una tumba sepulcral; 'sepulcro' es claro, solemne y fiel al contexto. 'Tumba' sería comprensible, pero 'sepulcro' conserva mejor el registro bíblico sin perder exactitud.
- source_word: βλέπει
  english_pob_choice: sees
  chosen_spanish: ve
  alternatives_spanish:
  - percibe
  - observa
  lexicon: BDAG
  rationale: El presente histórico se conserva con 've', breve y natural en español. Evita intensificar el verbo más de lo que el griego dice.
- source_word: τὸν λίθον ἠρμένον
  english_pob_choice: the stone having been taken away
  chosen_spanish: la piedra habiendo sido removida
  alternatives_spanish:
  - la piedra quitada
  - la piedra removida
  lexicon: BDAG
  rationale: El participio perfecto pasivo ἠρμένον expresa acción completada con estado resultante. 'Habiendo sido removida' refleja esa pasividad y resultado sin introducir la partícula 'que' ni convertirlo en una explicativa no presente en el griego.
- source_word: ἐκ τοῦ μνημείου
  english_pob_choice: from the tomb
  chosen_spanish: del sepulcro
  alternatives_spanish:
  - fuera del sepulcro
  - desde el sepulcro
  lexicon: BDAG
  rationale: ἐκ indica salida desde el interior o desde la esfera del sepulcro; 'del sepulcro' es la forma española más natural y suficiente. Se evita añadir 'entrada' u otro detalle no explícito.
theological_decisions:
- issue: Preservación del presente histórico en la narración de resurrección
  english_pob_reading: Retain the historical present ('comes,' 'sees')
  chosen_spanish_reading: Mantener el presente narrativo ('viene', 've')
  alternative_spanish_readings:
  - Pasar todo al pretérito ('vino', 'vio')
  rationale: El presente histórico forma parte del estilo narrativo del texto griego y aporta inmediatez sin alterar la doctrina. En español, 'viene' y 've' reproducen bien esa vivacidad sin sonar artificiales.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: La revisión inglesa más reciente ajustó la clausula final para reflejar más directamente el participio pasivo perfecto ἠρμένον ('having been taken away/lifted') sin añadir 'that'. Esta versión española sigue esa misma decisión al usar una construcción participial pasiva ('habiendo sido removida') en vez de una subordinada explicativa.
  spanish_consistency_notes:
  - Se mantiene 'sepulcro' de manera consistente para μνημεῖον, evitando alternar con 'tumba' dentro del mismo versículo.
  - Se conserva el presente histórico en 'viene' y 've' para corresponder al estilo narrativo del griego.
  - El orden general sigue el flujo del original sin calcos rígidos, pero con sintaxis española natural.
