revisions:
- from: Ahora, el primer día de la semana[a], María Magdalena viene al sepulcro temprano, mientras todavía había oscuridad, y ve la piedra habiendo sido removida del sepulcro.
  to: Y el primer día de la semana[a], María Magdalena viene al sepulcro temprano, cuando todavía estaba oscuro, y ve la piedra ya quitada del sepulcro.
  rationale: 'Se hicieron ajustes de estilo y fidelidad funcional al español: δέ se resolvió como transición narrativa natural; el genitivo absoluto se expresó con una cláusula temporal idiomática; y el participio perfecto pasivo se tradujo con ''ya quitada'', que comunica acción completada con estado resultante sin calco antinatural. La nota lexical se conserva porque documenta el idiomatismo del griego.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:05:49Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego y conserva correctamente el presente histórico en ''viene'' y ''ve''. También mantiene el sentido idiomático de Τῇ δὲ μιᾷ τῶν σαββάτων con nota. Sin embargo, dos giros españoles no son fieles al nivel de naturalidad requerido: ''Ahora, el primer día...'' suena calcado y le falta la preposición natural; y ''la piedra habiendo sido removida'' es gramaticalmente muy forzado en español, aunque busca seguir el participio griego.'
  spanish_quality_summary: La legibilidad necesita ajuste menor. 'Ahora, el primer día de la semana' debe ser 'Y el primer día de la semana' o 'Ahora bien, el primer día de la semana'; y 'mientras todavía había oscuridad' es comprensible pero menos idiomático que 'cuando todavía estaba oscuro'. La cláusula final debe rehacerse a un español natural que preserve el resultado del participio perfecto pasivo, por ejemplo 'la piedra ya quitada del sepulcro'.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'María Magdalena' y 'sepulcro' son adecuados. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. La nota sobre el idiomatismo de σαββάτων está bien orientada y debe conservarse con leve mejora de estilo.
  issues:
  - severity: medium
    issue: 'Inicio discursivo poco natural: ''Ahora, el primer día de la semana'''
    rationale: Aunque δέ puede reflejarse discursivamente, en español esa combinación suena poco idiomática y además omite la preposición esperable con una expresión temporal. 'Y el primer día de la semana' comunica mejor la transición narrativa sin calco.
  - severity: medium
    issue: 'Cláusula temporal menos natural: ''mientras todavía había oscuridad'''
    rationale: Preserva el sustantivo σκοτία, pero en español bíblico y general resulta más natural 'cuando todavía estaba oscuro' o 'cuando aún estaba oscuro'. La fidelidad no exige mantener una nominalización rígida.
  - severity: high
    issue: 'Participio calcado e impropio: ''la piedra habiendo sido removida del sepulcro'''
    rationale: El español no usa con naturalidad este participio absoluto después de 've'. Debe expresarse con un resultado observable, como 've la piedra ya quitada del sepulcro', que conserva la idea del perfecto pasivo sin introducir una subordinada explicativa innecesaria.
  revised_spanish_text: Y el primer día de la semana[a], María Magdalena viene al sepulcro temprano, cuando todavía estaba oscuro, y ve la piedra ya quitada del sepulcro.
  revised_footnotes:
  - marker: a
    text: Literalmente, 'en uno de los sábados'; es un giro idiomático que significa 'el primer día de la semana'.
    reason: lexical_alternative
  revision_rationale: 'Se hicieron ajustes de estilo y fidelidad funcional al español: δέ se resolvió como transición narrativa natural; el genitivo absoluto se expresó con una cláusula temporal idiomática; y el participio perfecto pasivo se tradujo con ''ya quitada'', que comunica acción completada con estado resultante sin calco antinatural. La nota lexical se conserva porque documenta el idiomatismo del griego.'
