translation:
  language: es
  text: 'Jesús le dice: «Mujer, ¿por qué lloras? ¿A quién buscas?» Ella, suponiendo que era el jardinero, le dice: «Señor[a], si tú te lo llevaste, dime dónde lo pusiste, y yo me lo llevaré».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «Señor» (κύριε); aquí probablemente funciona como un trato respetuoso, porque María piensa que habla con el jardinero.'
    reason: alternative_reading
lexical_decisions:
- source_word: Γύναι
  english_pob_choice: Woman
  chosen_spanish: Mujer
  alternatives_spanish:
  - Señora
  - Mujer, con tono respetuoso
  lexicon: BDAG
  rationale: Mantiene el vocativo directo y respetuoso de γύναι sin añadir afecto no explícito. «Mujer» preserva la literalidad funcional y es natural en español bíblico contemporáneo.
- source_word: τί κλαίεις
  english_pob_choice: why are you weeping
  chosen_spanish: ¿por qué lloras?
  alternatives_spanish:
  - ¿por qué estás llorando?
  - ¿por qué lloras tú?
  lexicon: BDAG
  rationale: κλαίω puede expresarse en español como «llorar» o «weeping». Aquí «lloras» comunica el sentido con naturalidad; el matiz solemne queda por el contexto narrativo.
- source_word: τίνα ζητεῖς
  english_pob_choice: Whom are you seeking
  chosen_spanish: ¿A quién buscas?
  alternatives_spanish:
  - ¿A quién estás buscando?
  - ¿A quién buscas tú?
  lexicon: BDAG
  rationale: ζητέω es «buscar»; en español, «¿a quién buscas?» es idiomático y conserva el objeto personal de τίνα. «Buscar» comunica bien la fuerza relacional del verbo.
- source_word: δοκοῦσα
  english_pob_choice: supposing
  chosen_spanish: pensando
  alternatives_spanish:
  - suponiendo
  - creyendo
  lexicon: BDAG
  rationale: El participio marca la inferencia equivocada de María. «Pensando» es natural en español y evita sobrecargar con tecnicismo; «suponiendo» es una alternativa cercana al matiz de inferencia.
- source_word: ὁ κηπουρός
  english_pob_choice: the gardener
  chosen_spanish: el jardinero
  alternatives_spanish:
  - el encargado del jardín
  - el hortelano
  lexicon: BDAG
  rationale: κηπουρός denota literalmente a un jardinero. «Jardinero» es la equivalencia directa y más transparente para el lector español.
- source_word: Κύριε
  english_pob_choice: Sir
  chosen_spanish: Señor
  alternatives_spanish:
  - Señor, con sentido de trato respetuoso
  - Caballero
  lexicon: BDAG
  rationale: Aunque el inglés POB opta por «Sir» por el contexto, en español el trato respetuoso natural es «Señor». Aquí no funciona como confesión cristológica de fe, sino como apelativo cortés al supuesto jardinero. Se mantiene la ambigüedad auditada de κύριε mediante nota.
- source_word: ἐβάστασας αὐτόν
  english_pob_choice: you carried him away
  chosen_spanish: te lo llevaste
  alternatives_spanish:
  - lo cargaste y te lo llevaste
  - lo llevaste
  lexicon: BDAG
  rationale: βαστάζω puede implicar llevar/cargar. En esta escena, María habla del traslado del cuerpo; «te lo llevaste» comunica de forma natural la acción de haberlo retirado.
- source_word: ποῦ ἔθηκας αὐτόν
  english_pob_choice: where you put him
  chosen_spanish: dónde lo pusiste
  alternatives_spanish:
  - dónde lo dejaste
  - dónde lo colocaste
  lexicon: BDAG
  rationale: τίθημι significa poner/colocar/poner en un lugar. «Dónde lo pusiste» es claro y directo en español; conserva el sentido de ubicación buscado por María.
- source_word: κἀγὼ αὐτὸν ἀρῶ
  english_pob_choice: and I will take him away
  chosen_spanish: y yo me lo llevaré
  alternatives_spanish:
  - y lo retiraré
  - y lo sacaré de allí
  lexicon: BDAG
  rationale: ἀίρω puede significar tomar, llevarse o remover. «Me lo llevaré» reproduce bien la intención de María de recuperar el cuerpo y mantiene el futuro. El «yo» enfático refleja κἀγώ.
theological_decisions:
- issue: Sentido de κύριε en la voz de María antes de reconocer a Jesús
  english_pob_reading: Sir
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Señor, con lectura cristológica
  - Caballero
  rationale: El contexto narrativo indica que María cree hablar con el jardinero, por lo que el valor principal es el de trato respetuoso. En español, «Señor» es la forma más natural para ese tratamiento; la nota deja claro que no debe leerse aquí como confesión de divinidad o reconocimiento mesiánico.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (κύριος) y filosofía de traducción #5 (excepción documentada por contexto)'
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: el marcador de nota [a] ahora aparece exactamente en el texto español, anclado en la frase correspondiente.'
  spanish_consistency_notes:
  - Se mantuvo el uso de «Jesús» como sujeto explícito para reflejar el griego y la claridad narrativa.
  - Se evitó «SEÑOR» como sustituto de Yahvé, porque aquí κύριε corresponde a un vocativo de cortesía en el contexto inmediato.
  - 'Se conservó la secuencia narrativa: pregunta de Jesús, respuesta de María bajo una suposición errónea, y oferta de llevarse el cuerpo.'
  - El registro es reverente pero moderno, adecuado para lectura eclesial en español.
