  text: Οὔσης οὖν ὀψίας τῇ ἡμέρᾳ ἐκείνῃ τῇ ⸀μιᾷ σαββάτων, καὶ τῶν θυρῶν κεκλεισμένων ὅπου ἦσαν οἱ ⸀μαθηταὶ διὰ τὸν φόβον τῶν Ἰουδαίων, ἦλθεν ὁ Ἰησοῦς καὶ ἔστη εἰς τὸ μέσον, καὶ λέγει αὐτοῖς· Εἰρήνη ὑμῖν.
base_translation:
  language: en
  yaml_path: translation/nt/john/020/019.yaml
  text: So when it was evening on that day[a], the first day of the week, and the doors had been locked where the disciples were because of fear of the Jews, Jesus came and stood in the midst of them and said to them[b], “Peace to you.”
  footnotes:
  - marker: a
    text: Or possibly “the Jewish leaders” or “the Judeans,” depending on how Ἰουδαῖοι is understood in context.
    reason: alternative_reading
  - marker: b
    text: Or “Peace be with you.” The Greek reads literally, “Peace to you.”
    reason: lexical_alternative
