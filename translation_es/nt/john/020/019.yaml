translation:
  language: es
  text: 'Así que, al anochecer de aquel día, el primer día de la semana, con las puertas cerradas con llave donde estaban los discípulos por temor de los judíos[a], Jesús vino y se puso en medio de ellos, y les dijo: «Paz a ustedes[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente «los líderes judíos» o «los judeanos», según cómo se entienda Ἰουδαίων en el contexto.
    reason: alternative_reading
  - marker: b
    text: 'O «Paz sea con ustedes». El griego dice literalmente: «Paz a ustedes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὔσης ... ὀψίας
  english_pob_choice: when it was evening
  chosen_spanish: al anochecer
  alternatives_spanish:
  - cuando anochecía
  - cuando ya era de noche
  lexicon: BDAG
  rationale: La construcción de genitivo absoluto expresa marco temporal; en español, “al anochecer” comunica de forma natural el inicio del tiempo vespertino sin volverla rígidamente literal.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - por tanto
  - entonces
  - pues
  lexicon: BDAG
  rationale: Mantiene la continuidad narrativa con valor inferencial leve, en un español fluido y digno.
- source_word: τῇ ἡμέρᾳ ἐκείνῃ
  english_pob_choice: on that day
  chosen_spanish: de aquel día
  alternatives_spanish:
  - en aquel día
  - ese día
  lexicon: BDAG
  rationale: En español, la referencia temporal queda natural dentro de la frase “al anochecer de aquel día”; no hace falta forzar una preposición equivalente al dativo.
- source_word: τῇ μιᾷ σαββάτων
  english_pob_choice: the first day of the week
  chosen_spanish: el primer día de la semana
  alternatives_spanish:
  - el primero de la semana
  - el día primero de la semana
  lexicon: BDAG
  rationale: Expresa con claridad el modismo joánico; es la equivalencia idiomática más transparente para el lector español.
- source_word: τῶν θυρῶν κεκλεισμένων
  english_pob_choice: the doors had been locked
  chosen_spanish: estando cerradas las puertas
  alternatives_spanish:
  - con las puertas cerradas
  - las puertas habían sido cerradas
  lexicon: BDAG
  rationale: El participio perfecto pasivo describe un estado resultante. “Cerradas” preserva el estado sin añadir explícitamente la acción de seguro/candado que “locked” sugiere en inglés.
- source_word: ὅπου ἦσαν οἱ μαθηταὶ
  english_pob_choice: where the disciples were
  chosen_spanish: donde estaban los discípulos
  alternatives_spanish:
  - donde se hallaban los discípulos
  lexicon: BDAG
  rationale: Mantiene la localización simple del texto sin añadir la idea de reunión o permanencia.
- source_word: μαθηταὶ
  english_pob_choice: disciples
  chosen_spanish: discípulos
  alternatives_spanish:
  - seguidores
  lexicon: BDAG
  rationale: Término estándar y preciso para μαθηταί; conserva la relación de aprendizaje y seguimiento.
- source_word: διὰ τὸν φόβον
  english_pob_choice: because of fear
  chosen_spanish: por temor
  alternatives_spanish:
  - a causa del temor
  - por miedo
  lexicon: BDAG
  rationale: La preposición causal puede expresarse naturalmente en español con “por temor”; mantiene la fuerza afectiva del sustantivo φόβος.
- source_word: τῶν Ἰουδαίων
  english_pob_choice: the Jews
  chosen_spanish: de los judíos
  alternatives_spanish:
  - de los judeanos
  - de los líderes judíos
  lexicon: BDAG
  rationale: Se conserva la forma léxica básica del griego. Se evita sobreespecificar “líderes” sin que el texto lo diga; “judíos” reproduce el referente textual, con la ambigüedad contextual que el POB inglés también anotó.
- source_word: ἦλθεν
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - vino y llegó
  lexicon: BDAG
  rationale: En español narrativo, “vino” expresa con naturalidad el movimiento hacia los presentes; junto con el contexto, funciona como equivalente idiomático de ἦλθεν.
- source_word: ἔστη εἰς τὸ μέσον
  english_pob_choice: stood in the midst of them
  chosen_spanish: se puso en medio de ellos
  alternatives_spanish:
  - estuvo en medio de ellos
  - se paró en medio de ellos
  lexicon: BDAG
  rationale: La imagen espacial se conserva con una formulación natural en español. “Se puso en medio de ellos” refleja la irrupción y colocación central del sujeto.
- source_word: λέγει αὐτοῖς
  english_pob_choice: said to them
  chosen_spanish: les dijo
  alternatives_spanish:
  - les dice
  lexicon: BDAG
  rationale: El presente histórico se suaviza a pasado en español narrativo por claridad y fluidez.
- source_word: Εἰρήνη
  english_pob_choice: Peace
  chosen_spanish: Paz
  alternatives_spanish:
  - Paz sea con ustedes
  - Paz a ustedes
  lexicon: BDAG
  rationale: “Paz” reproduce el saludo literal. En español, la fórmula sin verbo conserva mejor la brevedad del griego.
- source_word: ὑμῖν
  english_pob_choice: to you
  chosen_spanish: a ustedes
  alternatives_spanish:
  - para ustedes
  - con ustedes
  lexicon: BDAG
  rationale: La preposición refleja el dativo de dirección/beneficio de manera clara en español; “a ustedes” mantiene la concisión del saludo.
theological_decisions:
- issue: Referente de τῶν Ἰουδαίων
  english_pob_reading: Render as 'the Jews' in the main text, with contextual alternative in a footnote.
  chosen_spanish_reading: Mantener “de los judíos” en el texto principal.
  alternative_spanish_readings:
  - de los judeanos
  - de los líderes judíos
  rationale: No se debe estrechar el referente más allá de lo que el griego dice. La forma principal sigue el valor léxico del término; las alternativas quedan reconocidas como posibilidad contextual, sin reescribir la frase.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Saludo final Εἰρήνη ὑμῖν
  english_pob_reading: Peace to you / Or, Peace be with you.
  chosen_spanish_reading: Paz a ustedes
  alternative_spanish_readings:
  - Paz con ustedes
  - Paz sea con ustedes
  rationale: La forma breve del griego es literal y no exige expandirse a una fórmula litúrgica. “A ustedes” conserva el dativo; la expresión tradicional “con ustedes” queda como alternativa, pero no como texto base sin apoyo explícito.
  doctrine_reference: Lexical note on direct-greeting translation
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior asegurando que cada marcador de nota esté anclado exactamente en el texto español: [a] en “aquel día[a]” y [b] en “ustedes[b]”. No se añadieron notas sin anclaje. La redacción sigue de cerca el griego y el criterio auditado del POB en inglés, con ajuste natural al español.'
  spanish_consistency_notes:
  - Se mantiene “Jesús” sin variación nominal.
  - Se usa “discípulos” de forma consistente para μαθηταί.
  - Se conserva “judíos” como equivalente principal de Ἰουδαίων, con nota contextual.
  - Se evita introducir “Señor” o “Cristo”, pues no aparecen en este versículo.
  - La puntuación y el orden responden a la sintaxis española natural sin perder el paralelismo narrativo del original.
