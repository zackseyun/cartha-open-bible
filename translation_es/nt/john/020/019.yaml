    text: O posiblemente «los líderes judíos» o «los judeanos», según cómo se entienda Ἰουδαίων en el contexto.
    reason: alternative_reading
  - marker: b
    text: 'O «Paz sea con ustedes». El griego dice literalmente: «Paz a ustedes».'
    reason: lexical_alternative
  revision_rationale: La revisión corrige el matiz léxico de κεκλεισμένων para alinearlo con la decisión auditada del POB ('locked'), reubica la nota sobre Ἰουδαίων al lugar correcto, y ajusta la nota del saludo para que refleje una alternativa española adecuada a 'Peace be with you'. También normaliza ligeramente la puntuación y las comillas al uso español, sin alterar el sentido.
