revisions:
- from: 'Así que, al anochecer de aquel día[a], el primer día de la semana, y estando cerradas las puertas donde estaban los discípulos por temor de los judíos, Jesús vino y se puso en medio de ellos, y les dijo: “Paz a ustedes[b]”.'
  to: 'Así que, al anochecer de aquel día, el primer día de la semana, con las puertas cerradas con llave donde estaban los discípulos por temor de los judíos[a], Jesús vino y se puso en medio de ellos, y les dijo: «Paz a ustedes[b]».'
  rationale: La revisión corrige el matiz léxico de κεκλεισμένων para alinearlo con la decisión auditada del POB ('locked'), reubica la nota sobre Ἰουδαίων al lugar correcto, y ajusta la nota del saludo para que refleje una alternativa española adecuada a 'Peace be with you'. También normaliza ligeramente la puntuación y las comillas al uso español, sin alterar el sentido.
