translation:
  language: es
  text: Y, al inclinarse para mirar dentro, ve los lienzos de lino tendidos[a], pero no entró.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ve los lienzos de lino tendidos»; el participio griego puede entenderse estrechamente con «lienzos de lino» sin suplir explícitamente «allí».
    reason: lexical_alternative
lexical_decisions:
- source_word: παρακύψας
  english_pob_choice: stooping to look in
  chosen_spanish: al inclinarse para mirar dentro
  alternatives_spanish:
  - al agacharse para mirar dentro
  - asomándose para mirar dentro
  - al inclinarse para ver dentro
  lexicon: BDAG
  rationale: 'El participio aoristo describe el movimiento físico de acercarse al borde de la tumba y orientar la vista hacia adentro. «Al inclinarse para mirar dentro» conserva ambos rasgos: postura corporal y acción visual, sin sonar forzado en español.'
- source_word: βλέπει
  english_pob_choice: he sees
  chosen_spanish: ve
  alternatives_spanish:
  - ve
  - vio
  - nota
  lexicon: BDAG
  rationale: Se mantiene el presente histórico del griego con «ve», que preserva la vivacidad narrativa mejor que un pasado liso.
- source_word: κείμενα
  english_pob_choice: lying there
  chosen_spanish: tendidas
  alternatives_spanish:
  - puestas
  - acostadas
  - yacen
  lexicon: BDAG
  rationale: El participio de κεῖμαι indica una posición visible de reposo o colocación. «Tendidas» funciona de manera natural con «las vendas de lino» y conserva la idea de estar allí colocadas.
- source_word: τὰ ὀθόνια
  english_pob_choice: the linen cloths
  chosen_spanish: las vendas de lino
  alternatives_spanish:
  - los lienzos de lino
  - las telas de lino
  - las vendas funerarias
  lexicon: BDAG
  rationale: ὀθόνια designa paños o lienzos de lino vinculados al entierro. «Vendas de lino» comunica bien el referente funerario en español y evita una expresión demasiado genérica.
- source_word: οὐ μέντοι
  english_pob_choice: yet
  chosen_spanish: pero
  alternatives_spanish:
  - sin embargo
  - no obstante
  - pero sí
  lexicon: BDAG
  rationale: La combinación aporta una leve oposición entre ver y no entrar. «Pero» es suficiente en español aquí y deja intacta la tensión narrativa; la negación sigue expresada en la cláusula siguiente.
- source_word: εἰσῆλθεν
  english_pob_choice: he did not enter
  chosen_spanish: no entró
  alternatives_spanish:
  - no entró
  - no ingresó
  - no pasó adentro
  lexicon: BDAG
  rationale: El aoristo de εἰσέρχομαι se traduce de forma directa y natural. «No entró» es fiel, formal y plenamente comprensible en español.
translation_notes:
  revision_awareness: La versión inglesa revisada cambió «go in» por «enter» para un registro más formal; en español se reflejó directamente con «entró». Se evitó añadir notas no ancladas y se colocó el marcador [a] en el lugar exacto donde la alternativa interpretativa afecta al sintagma verbal.
  spanish_consistency_notes:
  - Se preservó el presente histórico de βλέπει con «ve».
  - Se mantuvo el contraste narrativo de οὐ μέντοι ... εἰσῆλθεν con una oposición sencilla en español.
  - Se eligió un término funerario claro para τὰ ὀθόνια sin sobreexplicar en el texto principal.
