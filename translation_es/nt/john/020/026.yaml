    reason: alternative_reading
  - marker: c
    text: 'O tradicionalmente: «Paz sea con ustedes».'
    reason: lexical_alternative
  revision_rationale: Se ajusta la cláusula del genitivo absoluto para reflejar mejor la tensión concesiva documentada en el expediente inglés, sin sobreexplicar el modo de entrada de Jesús. También se corrige la nota [b] para evitar duplicar la redacción del texto principal y conservar alternativas reales. El resto del versículo puede mantenerse tal como está.
