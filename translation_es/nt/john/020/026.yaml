translation:
  language: es
  text: 'Y después de ocho días[a], sus discípulos estaban otra vez dentro, y Tomás estaba con ellos. Jesús vino, aunque las puertas estaban cerradas[b], se puso en medio y dijo: «Paz a ustedes[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «después de ocho días», un modismo que probablemente se refiere a la semana siguiente por conteo inclusivo.'
    reason: cultural_note
  - marker: b
    text: 'O: «con las puertas cerradas» o «cuando las puertas estaban cerradas». El griego no explica explícitamente cómo entró Jesús.'
    reason: alternative_reading
  - marker: c
    text: 'O tradicionalmente: «Paz sea con ustedes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: μεθ’ ἡμέρας ὀκτὼ
  english_pob_choice: after eight days
  chosen_spanish: después de ocho días
  alternatives_spanish:
  - ocho días después
  - al cabo de ocho días
  lexicon: BDAG
  rationale: La expresión griega es idiomática y en español se rinde naturalmente como «después de ocho días». Conserva la referencia temporal directa sin explicitar en el texto principal la interpretación de conteo inclusivo, que queda para la nota.
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  - nuevamente
  lexicon: BDAG
  rationale: «Otra vez» reproduce bien la repetición del encuentro y suena natural en español bíblico contemporáneo.
- source_word: ἦσαν ἔσω
  english_pob_choice: were inside
  chosen_spanish: estaban ... dentro
  alternatives_spanish:
  - estaban adentro
  - estaban dentro de la casa
  lexicon: BDAG
  rationale: La expresión espacial se conserva con «dentro», que es claro y no añade detalles no presentes en el griego.
- source_word: οἱ μαθηταὶ αὐτοῦ
  english_pob_choice: his disciples
  chosen_spanish: sus discípulos
  alternatives_spanish:
  - los discípulos de él
  - los discípulos
  lexicon: BDAG
  rationale: El posesivo αὐτοῦ está explícito; «sus discípulos» lo refleja de manera natural en español.
- source_word: Θωμᾶς
  english_pob_choice: Thomas
  chosen_spanish: Tomás
  lexicon: transliteración estándar
  rationale: Nombre propio con transliteración española habitual.
- source_word: ἔρχεται
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - venía
  lexicon: BDAG
  rationale: Aunque el griego usa presente histórico, en español el pasado simple da una narración natural y fue el ajuste final también en la POB inglesa. «Vino» conserva el movimiento hacia el lugar sin sobredeterminar el modo de entrada.
- source_word: τῶν θυρῶν κεκλεισμένων
  english_pob_choice: though the doors had been shut
  chosen_spanish: con las puertas cerradas
  alternatives_spanish:
  - cuando las puertas estaban cerradas
  - con las puertas cerradas herméticamente
  - aunque las puertas habían sido cerradas
  lexicon: BDAG
  rationale: La construcción de genitivo absoluto afirma el estado de las puertas, pero no explica el mecanismo de entrada. «Con las puertas cerradas» preserva el dato sin sobreinterpretar la relación lógica en el español principal; la nota mantiene la alternativa interpretativa.
- source_word: ἔστη εἰς τὸ μέσον
  english_pob_choice: stood in the midst
  chosen_spanish: se puso en medio
  alternatives_spanish:
  - se mantuvo en medio
  - estuvo en medio
  lexicon: BDAG
  rationale: «Se puso en medio» comunica el posicionamiento central con naturalidad. En español, «en medio» es más idiomático que «en el medio» o «en medio de ellos» aquí, dado el contexto inmediato.
- source_word: Εἰρήνη ὑμῖν
  english_pob_choice: Peace to you
  chosen_spanish: Paz a ustedes
  alternatives_spanish:
  - Paz con ustedes
  - La paz sea con ustedes
  - Paz para ustedes
  lexicon: BDAG
  rationale: El griego es una salutación directa sin verbo explícito; «Paz a ustedes» sigue de cerca la forma y evita introducir «sea» en el texto principal. «Ustedes» es más natural en español latinoamericano contemporáneo que un singular ambiguo.
theological_decisions:
- issue: Modo de la aparición de Jesús con las puertas cerradas
  english_pob_reading: Render as 'though the doors had been shut' without explaining the mechanics
  chosen_spanish_reading: Con las puertas cerradas, sin explicar el modo de entrada
  alternative_spanish_readings:
  - aunque las puertas habían sido cerradas
  - cuando las puertas estaban cerradas
  - con las puertas cerradas y Jesús apareció milagrosamente
  rationale: El texto griego afirma el estado de las puertas y la presencia de Jesús, pero no da la mecánica. La redacción española conserva esa tensión narrativa y evita añadir una explicación que el texto no ofrece.
  doctrine_reference: Transparencia textual; narración de la resurrección en Juan 20
- issue: Presente histórico ἔρχεται en narrativa
  english_pob_reading: Preserve the present as 'comes'
  chosen_spanish_reading: Pasado simple natural en español («vino»)
  alternative_spanish_readings:
  - viene
  - venía
  - llega
  rationale: En español, el presente histórico resulta más marcado y menos natural en esta frase. Se adopta el pasado simple para lecturabilidad, sin alterar el contenido narrativo ni la afirmación de la venida de Jesús.
  doctrine_reference: Estilo narrativo español; fidelidad al evento narrado
- issue: Saludo de paz sin verbo explícito
  english_pob_reading: Peace to you
  chosen_spanish_reading: Paz a ustedes
  alternative_spanish_readings:
  - Paz sea con ustedes
  - La paz sea con ustedes
  - Paz para ustedes
  rationale: La frase griega carece de verbo copulativo; el español puede reproducir esa concisión. Se evita una fórmula litúrgica tradicional si añade más de lo que el texto dice.
  doctrine_reference: Economía semántica; saludo johánico
translation_notes:
  revision_awareness: 'El contexto inglés muestra una revisión importante en ἔρχεται: de «comes» a «came» para naturalidad narrativa, manteniendo el valor del presente histórico. En español se adoptó directamente un pasado simple natural («vino») y se preservó la cautela interpretativa sobre τῶν θυρῶν κεκλεισμένων. La lectura general coincide con el estado final revisado del POB inglés y con el alto acuerdo del control cruzado.'
  spanish_consistency_notes:
  - Se usó «Tomás» como transliteración estándar, coherente con el resto del Nuevo Testamento en español.
  - Se mantuvo «Paz» y no «La paz» para reflejar la concisión del saludo griego.
  - «Con las puertas cerradas» conserva el dato textual sin comprometer una teoría sobre el modo de entrada.
  - Se prefirió «ustedes» por neutralidad latinoamericana y claridad plural.
  - El orden de las cláusulas sigue el griego y la estructura del POB inglés, con adaptación mínima para fluidez española.
