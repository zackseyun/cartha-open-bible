  text: Καὶ μεθ’ ἡμέρας ὀκτὼ πάλιν ἦσαν ἔσω οἱ μαθηταὶ αὐτοῦ καὶ Θωμᾶς μετ’ αὐτῶν. ἔρχεται ὁ Ἰησοῦς τῶν θυρῶν κεκλεισμένων, καὶ ἔστη εἰς τὸ μέσον καὶ εἶπεν· Εἰρήνη ὑμῖν.
base_translation:
  language: en
  yaml_path: translation/nt/john/020/026.yaml
  text: And after eight days[a], his disciples were inside again, and Thomas was with them. Jesus came, though the doors had been shut, and stood in the midst and said[c][b], “Peace to you.”
  footnotes:
  - marker: a
    text: 'Greek: ''after eight days,'' an idiom that likely refers to the following week by inclusive counting.'
    reason: cultural_note
  - marker: b
    text: Or 'with the doors shut' or 'when the doors were shut.' The Greek does not explicitly describe how Jesus entered.
    reason: alternative_reading
  - marker: c
    text: 'Traditional rendering: ''Peace be with you.'''
    reason: lexical_alternative
