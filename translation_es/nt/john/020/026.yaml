  to: 'Y después de ocho días[a], sus discípulos estaban otra vez dentro, y Tomás estaba con ellos. Jesús vino, aunque las puertas estaban cerradas[b], se puso en medio y dijo: «Paz a ustedes[c]».'
  rationale: Se ajusta la cláusula del genitivo absoluto para reflejar mejor la tensión concesiva documentada en el expediente inglés, sin sobreexplicar el modo de entrada de Jesús. También se corrige la nota [b] para evitar duplicar la redacción del texto principal y conservar alternativas reales. El resto del versículo puede mantenerse tal como está.
