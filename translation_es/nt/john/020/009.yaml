revisions:
- from: Porque todavía no entendían la Escritura[a], que era necesario que él resucitara de entre los muertos.
  to: Porque todavía no habían entendido la Escritura[a], que era necesario que él resucitara de entre los muertos.
  rationale: Se ajusta el verbo principal a «no habían entendido» para reflejar mejor el valor temporal y aspectual del griego en el marco narrativo. Se conserva la singularidad de «la Escritura», la necesidad divina de δεῖ y la forma activa de ἀναστῆναι con «resucitara». La nota al pie se pule para sonar más natural en español y seguir indicando que la alternativa pasiva no es la forma principal del griego.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:05:34Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: conexión explicativa («Porque»), comprensión de «la Escritura», necesidad divina, y la forma activa de ἀναστῆναι. Sin embargo, «entendían» en imperfecto no reproduce bien el valor de οὐδέπω ... ᾔδεισαν en este contexto narrativo, donde conviene un perfecto compuesto o indefinido con adverbio temporal: «no habían entendido todavía» o «todavía no entendían/entendieron». Además, la nota al pie con «ser resucitado» suena poco natural en español; «ser levantado» o «ser resucitado» puede funcionar, pero debe presentarse con mayor naturalidad y en paralelo con el texto principal.'
  spanish_quality_summary: El español es claro y digno, pero puede mejorar en naturalidad y precisión temporal. «Porque todavía no entendían» suena algo durativo y menos ajustado al punto narrativo; «Porque todavía no habían entendido» fluye mejor y comunica que hasta ese momento no habían llegado a comprender. El resto de la frase es legible y eclesialmente natural. La nota al pie requiere un pequeño ajuste estilístico.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «la Escritura» conserva bien γραφή en singular, y «resucitara de entre los muertos» preserva correctamente la decisión activa frente a la alternativa pasiva documentada. No aparecen términos sensibles del glosario mayor que requieran corrección.
  issues:
  - severity: medium
    issue: Tiempo/aspecto de «entendían»
    rationale: 'ᾔδεισαν con οὐδέπω en esta narración se expresa mejor en español como estado de no comprensión vigente hasta ese momento: «todavía no habían entendido». El imperfecto «entendían» puede sugerir una acción continua más que la falta de comprensión alcanzada hasta ese punto.'
  - severity: low
    issue: Redacción de la nota al pie
    rationale: «tenía que ser resucitado» es comprensible, pero algo rígido. Conviene una formulación más natural y más cercana a la lógica de alternativa de voz verbal, sin perder que el griego usa activo.
  revised_spanish_text: Porque todavía no habían entendido la Escritura[a], que era necesario que él resucitara de entre los muertos.
  revised_footnotes:
  - marker: a
    text: O, «que tenía que ser levantado de entre los muertos». El griego aquí usa un verbo activo, «resucitar».
    reason: alternative_reading
  revision_rationale: Se ajusta el verbo principal a «no habían entendido» para reflejar mejor el valor temporal y aspectual del griego en el marco narrativo. Se conserva la singularidad de «la Escritura», la necesidad divina de δεῖ y la forma activa de ἀναστῆναι con «resucitara». La nota al pie se pule para sonar más natural en español y seguir indicando que la alternativa pasiva no es la forma principal del griego.
