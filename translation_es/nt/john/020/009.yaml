translation:
  language: es
  text: Porque todavía no habían entendido la Escritura[a], que era necesario que él resucitara de entre los muertos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «que tenía que ser levantado de entre los muertos». El griego aquí usa un verbo activo, «resucitar».
    reason: alternative_reading
lexical_decisions:
- source_word: οὐδέπω
  english_pob_choice: not yet
  chosen_spanish: todavía no
  alternatives_spanish:
  - aún no
  lexicon: BDAG
  rationale: 'Expresa con naturalidad el valor temporal de οὐδέπω: la comprensión no había ocurrido hasta ese momento.'
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Conserva la conexión explicativa con el contexto anterior en un español fluido y digno.
- source_word: ᾔδεισαν
  english_pob_choice: understand
  chosen_spanish: entendían
  alternatives_spanish:
  - sabían
  - comprendían
  lexicon: BDAG
  rationale: Aunque el verbo proviene de οἶδα, aquí el objeto es «la Escritura», por lo que el sentido es captar su significado, no solo saber de su existencia.
- source_word: τὴν γραφὴν
  english_pob_choice: the Scripture
  chosen_spanish: la Escritura
  alternatives_spanish:
  - las Escrituras
  - el pasaje de la Escritura
  - la escritura
  lexicon: BDAG
  rationale: La forma singular se conserva en español porque el griego es singular y remite a la autoridad escritural en sentido específico o representativo.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - que,
  - esto es que
  lexicon: BDAG
  rationale: Introduce de manera natural el contenido de lo no entendido por ellos.
- source_word: δεῖ
  english_pob_choice: had to
  chosen_spanish: era necesario
  alternatives_spanish:
  - debía
  - tenía que
  lexicon: BDAG
  rationale: Preserva la fuerza de necesidad divina sin volver la frase rígida en español. 'Era necesario' comunica bien el matiz de obligación o designio.
- source_word: ἐκ νεκρῶν
  english_pob_choice: from the dead
  chosen_spanish: de entre los muertos
  alternatives_spanish:
  - de los muertos
  - de entre los muertos
  lexicon: BDAG
  rationale: La expresión española tradicional y transparente mantiene el valor del plural y el movimiento «desde entre» los muertos.
- source_word: ἀναστῆναι
  english_pob_choice: to rise
  chosen_spanish: resucitara
  alternatives_spanish:
  - resucitara de entre los muertos
  - se levantara
  lexicon: BDAG
  rationale: Aunque el griego usa un infinitivo activo, en español la cláusula subordinada exige una forma verbal natural. 'Resucitara' preserva la idea de levantarse de la muerte sin importar una pasiva que el texto no usa.
theological_decisions:
- issue: Agencia en la resurrección
  english_pob_reading: that he had to rise from the dead
  chosen_spanish_reading: que era necesario que él resucitara de entre los muertos
  alternative_spanish_readings:
  - que era necesario que él fuera resucitado de entre los muertos
  - que tenía que levantarse de entre los muertos
  rationale: El griego emplea ἀναστῆναι, infinitivo activo, y conviene conservar esa forma verbal en español sin imponer una pasiva. 'Resucitara' mantiene la tensión textual entre la acción expresada y la agencia divina implícita en la necesidad.
  doctrine_reference: Preservar la forma verbal del texto y no resolverla por armonización doctrinal.
translation_notes:
  revision_awareness: El texto sigue de cerca el juicio final del audit trail en inglés, manteniendo la lectura activa del verbo griego y la comprensión de γραφή como Escritura, sin introducir una pasiva en el cuerpo principal.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando corresponda, pero este versículo no lo contiene.
  - «Escritura» se mantiene singular, en consonancia con el griego y con el audit trail inglés.
  - Se evitó «Cristo» porque el versículo no lo requiere.
  - La nota al pie preserva la alternativa pasiva documentada sin convertirla en la lectura principal.
