translation:
  language: es
  text: 'Entonces le dijo a Tomás[a]: «Trae tu dedo aquí y mira mis manos, y trae tu mano y ponla en mi costado, y no te vuelvas incrédulo, sino creyente».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no te vuelvas incrédulo, sino fiel». Los adjetivos griegos pueden expresar cualquiera de los dos matices, pero aquí el contraste se centra en la creencia de Tomás en Jesús resucitado.'
    reason: alternative_reading
lexical_decisions:
- source_word: εἶτα
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - Después
  lexicon: BDAG
  rationale: Marca la secuencia narrativa de manera natural en español sin perder el valor temporal del griego.
- source_word: λέγει
  english_pob_choice: he said
  chosen_spanish: le dijo
  alternatives_spanish:
  - dice
  - decía
  lexicon: BDAG
  rationale: Aunque el griego usa presente histórico, en español narrativo resulta más natural el pasado simple.
- source_word: τῷ Θωμᾷ
  english_pob_choice: to Thomas
  chosen_spanish: a Tomás
  alternatives_spanish:
  - a Tomás el Didimio
  lexicon: BDAG
  rationale: Se conserva el nombre propio de forma directa; no se añade el apelativo ausente en este versículo.
- source_word: Φέρε τὸν δάκτυλόν σου ὧδε
  english_pob_choice: Bring your finger here
  chosen_spanish: Trae tu dedo aquí
  alternatives_spanish:
  - Lleva tu dedo aquí
  - Acerca tu dedo aquí
  lexicon: BDAG
  rationale: «Trae» conserva el valor básico de φέρω y mantiene la repetición verbal del mandato siguiente. «Aquí» reproduce el matiz deíctico de ὧδε.
- source_word: ἴδε
  english_pob_choice: see
  chosen_spanish: mira
  alternatives_spanish:
  - ve
  - observa
  lexicon: BDAG
  rationale: «Mira» es una orden natural en español y funciona bien junto a «mis manos»; conserva la invitación directa a constatar lo visible.
- source_word: τὰς χεῖράς μου
  english_pob_choice: my hands
  chosen_spanish: mis manos
  alternatives_spanish:
  - mis manos heridas
  - mis manos
  lexicon: BDAG
  rationale: Se mantiene la referencia simple y plural de χείρ sin agregar calificación que el texto no expresa aquí.
- source_word: βάλε εἰς τὴν πλευράν μου
  english_pob_choice: put it into my side
  chosen_spanish: ponla en mi costado
  alternatives_spanish:
  - pon tu mano en mi costado
  - ponla en mi lado
  lexicon: BDAG
  rationale: «Costado» es un equivalente claro y natural de πλευρά en este contexto joánico; el objeto implícito se recupera por el paralelismo con «tu mano».
- source_word: μὴ γίνου
  english_pob_choice: do not become
  chosen_spanish: no te hagas
  alternatives_spanish:
  - no llegues a ser
  - no seas
  lexicon: BDAG
  rationale: Se conserva el matiz procesual/inceptivo de γίνομαι mejor que con un mero «no seas». «No te hagas» expresa el cambio de estado sin sobreinterpretarlo.
- source_word: ἄπιστος
  english_pob_choice: unbelieving
  chosen_spanish: incrédulo
  alternatives_spanish:
  - sin fe
  - descreído
  lexicon: BDAG
  rationale: «Incrédulo» comunica la falta de creencia exigida por el contexto inmediato de la resurrección y mantiene el contraste con πιστός sin expandirlo a otra esfera moral.
- source_word: ἀλλὰ πιστός
  english_pob_choice: but believing
  chosen_spanish: sino creyente
  alternatives_spanish:
  - sino fiel
  - sino lleno de fe
  lexicon: BDAG
  rationale: «Creyente» conserva el contraste directo con «incrédulo» y centra la exhortación en la respuesta de fe a Jesús resucitado, tal como indica el contexto.
theological_decisions:
- issue: Contraste entre ἄπιστος y πιστός en la exhortación de Jesús
  english_pob_reading: unbelieving / believing
  chosen_spanish_reading: incrédulo / creyente
  alternative_spanish_readings:
  - sin fe / fiel
  - descreído / fiel
  rationale: El contexto inmediato trata de la negativa de Tomás a creer el testimonio de la resurrección sin ver y tocar. Por eso conviene un par de términos centrado en la creencia, sin trasladar el pasaje a una valoración moral más amplia que el texto no exige aquí.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica y no resolverla artificialmente; mantener la fuerza semántica del contraste según el contexto.'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el análisis auditado del texto griego y el criterio POB en inglés: mantiene la secuencia narrativa, conserva la repetición de los imperativos y refleja el contraste ἄπιστος/πιστός con un par español equivalente, sin introducir glosas interpretativas innecesarias.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino en otros contextos según la norma del proyecto; este versículo no lo contiene.
  - Se mantiene «Tomás» sin títulos añadidos.
  - «Costado» se eligió por su naturalidad en español bíblico contemporáneo y por la referencia joánica al costado traspasado.
