revisions:
- from: 'Entonces le dijo a Tomás[a]: «Trae tu dedo aquí y mira mis manos; trae tu mano y ponla en mi costado, y no te hagas incrédulo, sino creyente».'
  to: 'Entonces le dijo a Tomás[a]: «Trae tu dedo aquí y mira mis manos, y trae tu mano y ponla en mi costado, y no te vuelvas incrédulo, sino creyente».'
  rationale: 'La revisión es menor: mejora la naturalidad de μὴ γίνου con «no te vuelvas», mantiene el contraste teológico documentado y suaviza la puntuación para reflejar mejor la cadena coordinada de imperativos del griego.'
  reviewer_model: gpt-5.4
