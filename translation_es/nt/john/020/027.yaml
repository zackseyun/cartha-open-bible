review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la secuencia y el sentido del griego: «Entonces», «le dijo a Tomás», la repetición de «trae», «mis manos», «mi costado» y el contraste final centrado en creer. También conserva adecuadamente la nota alternativa sobre ἄπιστος / πιστός. Sin embargo, «mira mis manos» debilita ligeramente el valor de ἴδε en esta construcción, donde en español suena más directo «mira» o «mira bien», pero el problema principal es de estilo/puntuación: el punto y coma en el discurso directo no refleja tan bien la cadena coordinada del original. Además, «no te hagas incrédulo» es comprensible, pero «no te vuelvas incrédulo» representa con más naturalidad en español el matiz de μὴ γίνου.'
  spanish_quality_summary: El texto es claro y legible, pero puede mejorarse para sonar más natural y mantener mejor el flujo imperativo del original. «Ponla» explicita correctamente el objeto, pero en español conviene mantener la coordinación con comas en vez de punto y coma. «No te vuelvas incrédulo» es más idiomático y digno que «no te hagas incrédulo» en este contexto bíblico.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. La decisión teológica «incrédulo / creyente» concuerda con el audit trail inglés y con el enfoque contextual en la fe de Tomás en el Jesús resucitado. «Costado» para πλευρά está bien documentado y es idiomático en español bíblico moderno.
  issues:
  - severity: medium
    issue: «no te hagas incrédulo» suena menos natural que «no te vuelvas incrédulo»
    rationale: μὴ γίνου expresa llegar a ser/devenir. «Volverse» refleja mejor ese matiz procesual en español natural y evita una posible lectura de afectación voluntaria que puede sugerir «hacerse».
  - severity: low
    issue: El punto y coma dentro del discurso directo interrumpe innecesariamente la cadena de imperativos
    rationale: El griego encadena los mandatos con καὶ. En español, una serie con comas conserva mejor el ritmo y la progresión del original.
  revised_spanish_text: 'Entonces le dijo a Tomás[a]: «Trae tu dedo aquí y mira mis manos, y trae tu mano y ponla en mi costado, y no te vuelvas incrédulo, sino creyente».'
  revised_footnotes:
  - marker: a
    text: 'O: «no te vuelvas incrédulo, sino fiel». Los adjetivos griegos pueden expresar cualquiera de los dos matices, pero aquí el contraste se centra en la creencia de Tomás en Jesús resucitado.'
    reason: alternative_reading
  revision_rationale: 'La revisión es menor: mejora la naturalidad de μὴ γίνου con «no te vuelvas», mantiene el contraste teológico documentado y suaviza la puntuación para reflejar mejor la cadena coordinada de imperativos del griego.'
