  to: Entonces Pedro y el otro discípulo salieron y se dirigían a la tumba[a].
  rationale: Se ajusta el conector a una opción más natural y digna en español narrativo ('Entonces'), y se normaliza la nota al pie para mayor claridad y corrección estilística. El resto del texto conserva fielmente el sentido fuente y la decisión aspectual del inglés POB.
