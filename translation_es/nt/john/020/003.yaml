translation:
  language: es
  text: Entonces Pedro y el otro discípulo salieron y se dirigían a la tumba[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "iban a la tumba". El imperfecto griego puede traducirse de manera más simple, pero "se dirigían" conserva con mayor claridad la acción en curso.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξῆλθεν
  english_pob_choice: went out
  chosen_spanish: salieron
  alternatives_spanish:
  - salió
  - partieron
  - se fueron
  lexicon: BDAG
  rationale: El aoristo de ἐξέρχομαι indica salida de un lugar. En español, el plural implícito del sujeto compuesto (‘Pedro y el otro discípulo’) hace natural ‘salieron’, que conserva la idea de abandono del lugar sin rigidez.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - por tanto
  - entonces
  lexicon: BDAG
  rationale: οὖν conecta narrativamente con el versículo anterior. ‘Así que’ reproduce bien la consecuencia/continuación en español actual y mantiene el flujo narrativo.
- source_word: ὁ Πέτρος
  english_pob_choice: Peter
  chosen_spanish: Pedro
  alternatives_spanish:
  - Pedro el apóstol
  lexicon: BDAG
  rationale: Nombre propio convencional en español.
- source_word: ὁ ἄλλος μαθητής
  english_pob_choice: the other disciple
  chosen_spanish: el otro discípulo
  alternatives_spanish:
  - el otro estudiante
  lexicon: BDAG
  rationale: μαθητής en el Evangelio de Juan se traduce de forma estable como ‘discípulo’. ‘El otro’ conserva la referencia contrastiva con Pedro.
- source_word: ἤρχοντο
  english_pob_choice: were going
  chosen_spanish: se dirigían
  alternatives_spanish:
  - iban
  - estaban yendo
  lexicon: BDAG
  rationale: El imperfecto expresa acción en curso. ‘Se dirigían’ preserva mejor esa progresividad que un pretérito simple y suena natural en español; además evita la repetición más pesada de ‘estaban yendo’.
- source_word: εἰς τὸ μνημεῖον
  english_pob_choice: to the tomb
  chosen_spanish: a la tumba
  alternatives_spanish:
  - al sepulcro
  - hacia la tumba
  lexicon: BDAG
  rationale: μνημεῖον aquí designa el sepulcro de Jesús. ‘Tumba’ es clara y moderna; ‘a’ comunica el movimiento hacia un destino sin insinuar todavía entrada física, como en el texto griego y en la continuación narrativa.
theological_decisions:
- issue: Aspecto imperfectivo en ἤρχοντο
  english_pob_reading: they were going
  chosen_spanish_reading: se dirigían
  alternative_spanish_readings:
  - iban
  - estaban yendo
  rationale: La lectura inglesa preserva la acción continua. En español, ‘se dirigían’ transmite mejor esa acción en progreso sin perder naturalidad. No cambia el sentido doctrinal, pero sí evita reducir el valor aspectual del verbo griego.
  doctrine_reference: Gramática del aspecto verbal en el griego del NT; ninguna implicación doctrinal directa.
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado para suprimir una segunda conjunción ‘and’ y lograr mayor fluidez. En español se integró con una sola coordinación natural (‘salieron y se dirigían’), manteniendo la secuencia griega sin duplicar conectores innecesarios.
  spanish_consistency_notes:
  - Se mantiene ‘discípulo’ para μαθητής, conforme al uso estable del POB en los Evangelios.
  - Se usa ‘tumba’ para μνημεῖον en este contexto funerario, sin introducir ‘sepulcro’ como término obligatorio.
  - La traducción conserva el matiz progresivo del imperfecto en ἤρχοντο mediante una perífrasis natural en español.
