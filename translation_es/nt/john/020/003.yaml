    rationale: El texto español puede usar plural por sujeto compuesto, pero incluir 'salió' como alternativa sugiere un análisis inestable. No exige adjudicación externa, pero conviene corregir en revisión editorial.
  revised_spanish_text: Entonces Pedro y el otro discípulo salieron y se dirigían a la tumba[a].
  revised_footnotes:
