translation:
  language: es
  text: 'Y le dijeron: «Mujer[a], ¿por qué lloras?». Ella les dijo: «Se han llevado a mi Señor[b], y no sé dónde lo han puesto».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¿qué lloras?». El griego usa literalmente «qué», pero en español el sentido idiomático aquí es «por qué».
    reason: lexical_alternative
  - marker: b
    text: O «mi maestro». κύριος puede funcionar como título respetuoso; en esta traducción se mantiene «Señor» como opción por defecto y por su posible fuerza cristológica.
    reason: alternative_reading
lexical_decisions:
- source_word: Γύναι
  english_pob_choice: Woman
  chosen_spanish: Mujer
  alternatives_spanish:
  - Señora
  - Mujer querida
  lexicon: BDAG
  rationale: El vocativo griego es respetuoso, pero directo. «Mujer» conserva la forma breve y la consistencia joánica sin añadir afecto o cortesía que el texto no explicita.
- source_word: τί κλαίεις
  english_pob_choice: why are you weeping
  chosen_spanish: ¿por qué lloras?
  alternatives_spanish:
  - ¿qué lloras?
  - ¿por qué estás llorando?
  lexicon: BDAG
  rationale: Aunque τί es literalmente «qué», en esta pregunta idiomática el sentido natural en español es causal. «Lloras» mantiene el presente de acción en un registro sobrio; «estás llorando» sería más explícito, pero no necesario.
- source_word: Ἦραν
  english_pob_choice: have taken away
  chosen_spanish: Se han llevado
  alternatives_spanish:
  - lo han quitado
  - lo tomaron
  lexicon: BDAG
  rationale: El aoristo señala una acción completada; en español «se han llevado» expresa bien el resultado presente de la acción y sugiere movimiento/remoción del cuerpo desde la tumba.
- source_word: κύριόν μου
  english_pob_choice: my Lord
  chosen_spanish: mi Señor
  alternatives_spanish:
  - mi amo
  - mi maestro
  lexicon: BDAG
  rationale: Se mantiene «Señor» como equivalente habitual de κύριος en esta traducción, preservando el peso reverencial y posible resonancia cristológica. «Maestro» o «amo» reducirían ese alcance.
- source_word: οὐκ οἶδα
  english_pob_choice: I do not know
  chosen_spanish: no sé
  alternatives_spanish:
  - no conozco
  - no lo sé
  lexicon: BDAG
  rationale: οἶδα funciona como verbo de estado de conocimiento; «no sé» es la forma más natural y fiel en español. El objeto implícito se completa con la cláusula siguiente.
- source_word: ποῦ ἔθηκαν αὐτόν
  english_pob_choice: where they have put him
  chosen_spanish: dónde lo han puesto
  alternatives_spanish:
  - dónde lo dejaron
  - dónde lo colocaron
  lexicon: BDAG
  rationale: τίθημι aquí comunica colocar/poner. «Lo han puesto» reproduce el valor básico sin volverlo demasiado técnico; «lo dejaron» sería menos preciso, y «colocaron» suena más artificial en este contexto.
- source_word: ἐκεῖνοι
  english_pob_choice: they
  chosen_spanish: le
  alternatives_spanish:
  - ellos
  - aquellos
  lexicon: BDAG
  rationale: El pronombre sujeto ya queda claro por el verbo; en español se expresa mejor con la estructura verbal «le dicen». No es necesario marcar el demostrativo del griego en la línea principal.
theological_decisions:
- issue: Tratamiento de κύριος en boca de María
  english_pob_reading: my Lord
  chosen_spanish_reading: mi Señor
  alternative_spanish_readings:
  - mi maestro
  - mi amo
  rationale: La forma «Señor» conserva la lectura reverencial y abierta del término griego. En Juan, esa designación puede ser simplemente respetuosa, pero también carga un potencial cristológico que no conviene neutralizar.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Valor de Γύναι como vocativo
  english_pob_reading: Woman
  chosen_spanish_reading: Mujer
  alternative_spanish_readings:
  - Señora
  - Mujer querida
  rationale: El griego es respetuoso, no despectivo. «Mujer» mantiene la sobriedad del original y evita suavizar el tono con fórmulas no presentes en el texto.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy over translation tradition; readable modern Spanish'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el paquete griego y la trayectoria auditada en inglés. Se mantuvieron las decisiones centrales: vocativo breve para Γύναι, valor idiomático de τί en la pregunta, aoristo con sentido de acción ya realizada, y κύριος como «Señor» con nota alternativa. No se identificaron revisiones posteriores que obligaran cambios respecto del contexto inglés aportado.'
  spanish_consistency_notes:
  - Se usa «Señor» para κύριος conforme al criterio del proyecto, no «Señor» como máscara litúrgica automática, sino como traducción léxica conservando su amplitud semántica.
  - Se prefirió «lloras» frente a perífrasis más largas para respetar la sencillez del griego.
  - La estructura española omite el pronombre sujeto explícito cuando no aporta claridad, como suele ocurrir de manera natural en español.
  - Las notas mantienen alternativas reales cuando el griego admite una tensión idiomática o semántica relevante.
