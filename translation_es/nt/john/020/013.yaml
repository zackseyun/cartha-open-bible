    text: Or 'what are you weeping for?' The Greek literally uses 'what,' but the sense in English is 'why.'
    reason: lexical_alternative
  - marker: b
    text: Or 'my master.' Greek kyrios is rendered 'Lord' by default in this translation; the term can also function as a respectful title depending on context.
    reason: alternative_reading
