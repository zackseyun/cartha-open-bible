translation:
  language: es
  text: 'Jesús le dice: «María». Volviéndose ella, le dice en hebreo[a]: «¡Rabuní!» (que significa: «Maestro»).'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en arameo». El «hebreo» de Juan puede referirse de manera más amplia a la lengua semítica vernácula de Judea.
    reason: alternative_reading
lexical_decisions:
- source_word: λέγει
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - dijo
  lexicon: BDAG
  rationale: Se conserva el presente histórico del griego con «dice», que suena natural en español y mantiene la vivacidad narrativa de Juan.
- source_word: αὐτῇ
  english_pob_choice: to her
  chosen_spanish: le
  alternatives_spanish:
  - a ella
  lexicon: BDAG
  rationale: El dativo pronominal se expresa de modo natural con el pronombre átono «le» en español, evitando una construcción más pesada.
- source_word: Μαριάμ
  english_pob_choice: Mary
  chosen_spanish: María
  alternatives_spanish:
  - Mariam
  lexicon: BDAG
  rationale: Se usa la forma española corriente del nombre propio, que es la más idiomática y transparente para el lector.
- source_word: στραφεῖσα
  english_pob_choice: Turning
  chosen_spanish: Se vuelve
  alternatives_spanish:
  - Volviéndose
  - Habiéndose vuelto
  lexicon: BDAG
  rationale: El participio aoristo se vierte con una acción consecutiva breve y fluida. «Se vuelve» mantiene la secuencia sin sonar forzado en español.
- source_word: ἐκείνη
  english_pob_choice: she
  chosen_spanish: ella
  alternatives_spanish:
  - aquella
  - esa mujer
  lexicon: BDAG
  rationale: Aunque la forma griega es demostrativa, en contexto funciona como sujeto pronominal; por eso se traduce simplemente «ella».
- source_word: Ἑβραϊστί
  english_pob_choice: in Hebrew
  chosen_spanish: en hebreo
  alternatives_spanish:
  - en arameo
  lexicon: BDAG
  rationale: La redacción sigue el adverbio griego de manera directa. La posible referencia más amplia al vernáculo semítico de Judea queda indicada en la nota textual.
- source_word: Ραββουνι
  english_pob_choice: Rabboni
  chosen_spanish: Rabuní
  alternatives_spanish:
  - Rabbuní
  - Raboní
  lexicon: BDAG
  rationale: Se conserva la transliteración como nombre/título vocalizado, pero adaptada a una grafía española legible. Mantiene el matiz afectivo y cultural del vocativo.
- source_word: ὃ λέγεται Διδάσκαλε
  english_pob_choice: which means, “Teacher”
  chosen_spanish: 'que significa: «Maestro»'
  alternatives_spanish:
  - 'que quiere decir: «Maestro»'
  - 'que se traduce: «Maestro»'
  - 'que significa: «Maestro/Profesor»'
  lexicon: BDAG
  rationale: La cláusula explicativa se vierte de forma natural con «que significa». «Διδάσκαλε» en vocativo se aproxima mejor a «Maestro» que a «Profesor» en este contexto, conservando el tono relacional del griego.
theological_decisions:
- issue: Sentido de Ἑβραϊστί en Juan
  english_pob_reading: in Hebrew, with a footnote allowing Aramaic as the broader Semitic vernacular
  chosen_spanish_reading: en hebreo, con nota que permite «en arameo»
  alternative_spanish_readings:
  - en arameo
  rationale: Se respeta el wording del griego en el texto principal y, como hace el POB inglés, se preserva la posibilidad interpretativa sin resolverla silenciosamente.
  doctrine_reference: Translation philosophy §1, §3
- issue: Glosa explicativa del título Ῥαββουνί
  english_pob_reading: which means, “Teacher”
  chosen_spanish_reading: 'que significa: «Maestro»'
  alternative_spanish_readings:
  - 'que significa: «Señor»'
  - 'que significa: «Maestro/Señor»'
  rationale: La glosa inspirada identifica el título para el lector; «Maestro» refleja con mayor precisión el sentido ordinario de διδάσκαλος sin intensificarlo a «Señor».
  doctrine_reference: John 20:16 lexical gloss
translation_notes:
  revision_awareness: El texto sigue de cerca el paquete fuente griego y el audit trail inglés. Se mantiene el presente histórico de λέγει, la secuencia de la participación aorística de στραφεῖσα, la glosa explicativa de Ῥαββουνί, y la ambigüedad interpretativa de Ἑβραϊστί mediante nota, sin introducir paráfrasis ni armonizaciones posteriores.
  spanish_consistency_notes:
  - Se usa «Jesús» para Ἰησοῦς y «Dios/Yahvé» no aparecen en este versículo.
  - Se mantiene la convención POB de conservar ciertas formas semíticas transliteradas cuando el texto las glosa inmediatamente.
  - «Maestro» se eligió para Διδάσκαλε por ser el equivalente más natural y menos cargado que «Señor» en este contexto.
  - La nota al pie marca la alternativa interpretativa sin alterar el texto principal.
