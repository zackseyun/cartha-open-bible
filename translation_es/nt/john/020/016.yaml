review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: mantiene el presente histórico con «dice», conserva «en hebreo» con nota alternativa a «arameo», y preserva la glosa de Ραββουνι con «Maestro». Sin embargo, «Ella se vuelve» cambia innecesariamente el participio aoristo «στραφεῖσα» a un presente narrativo finito, cuando en español una forma participial más ceñida preserva mejor la secuencia del original.'
  spanish_quality_summary: El español es claro y natural, pero «Ella se vuelve» suena un poco menos preciso que «volviéndose» o «al volverse». Además, la nota es buena, pero conviene anclarla a «hebreo» más que a «le dice», porque la variante interpretativa afecta Ἑβραϊστί, no αὐτῇ.
  glossary_alignment: 'Alineación general buena con las pautas: «Jesús», «Maestro», y transliteración de «Rabuní» son aceptables. No hay conflicto con la terminología doctrinal del proyecto. La principal mejora es de fidelidad sintáctica y colocación de la nota.'
  issues:
  - severity: medium
    issue: «Ella se vuelve» para στραφεῖσα
    rationale: El griego usa un participio aoristo que introduce la acción previa o concomitante. «Ella se vuelve» convierte esa relación en una cláusula principal coordinada y pierde parte del flujo sintáctico del original. «Volviéndose» preserva mejor la forma y sigue siendo natural en español bíblico moderno.
  - severity: low
    issue: Ubicación del marcador de nota
    rationale: La nota explica «Ἑβραϊστί / en hebreo», pero el marcador actual aparece después de «dice». Es más preciso y legible anclarlo a «hebreo[a]».
  revised_spanish_text: 'Jesús le dice: «María». Volviéndose ella, le dice en hebreo[a]: «¡Rabuní!» (que significa: «Maestro»).'
  revised_footnotes:
  - marker: a
    text: O «en arameo». El «hebreo» de Juan puede referirse de manera más amplia a la lengua semítica vernácula de Judea.
    reason: alternative_reading
  revision_rationale: Se ajusta «στραφεῖσα» a una construcción participial española más fiel al original y se reubica la nota al término que realmente comenta, «en hebreo». El resto del texto puede mantenerse.
