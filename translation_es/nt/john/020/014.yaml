translation:
  language: es
  text: Después de decir estas cosas[a], se volvió y vio a Jesús de pie, y no sabía que era Jesús.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no reconocía que era Jesús». El griego dice literalmente: «no sabía que Jesús es», expresando falta de reconocimiento de su identidad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  lexicon: BDAG
  rationale: El demostrativo plural pide un plural en español para conservar el matiz narrativo y la referencia a lo dicho previamente. "Estas cosas" refleja mejor el número griego que un singular resumido como "esto".
- source_word: εἰποῦσα
  english_pob_choice: after saying
  chosen_spanish: después de decir
  alternatives_spanish:
  - habiendo dicho
  - cuando hubo dicho
  lexicon: BDAG
  rationale: El participio aoristo femenino singular expresa anterioridad respecto de la acción principal. "Después de decir" comunica esa relación temporal de manera natural en español sin perder el valor aspectual.
- source_word: ἐστράφη εἰς τὰ ὀπίσω
  english_pob_choice: she turned around
  chosen_spanish: se volvió hacia atrás
  alternatives_spanish:
  - se dio vuelta
  - se volvió
  lexicon: BDAG
  rationale: La expresión griega indica giro hacia lo que queda detrás. "Se volvió hacia atrás" mantiene la dirección espacial y es plenamente comprensible en español bíblico contemporáneo.
- source_word: θεωρεῖ
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - observó
  - miró
  lexicon: BDAG
  rationale: En narración, el presente histórico griego suele trasladarse al pasado en español. "Vio" conserva la percepción visual sin volverla demasiado marcada o literaria.
- source_word: ἑστῶτα
  english_pob_choice: standing there
  chosen_spanish: de pie
  alternatives_spanish:
  - en pie
  - allí de pie
  lexicon: BDAG
  rationale: El participio perfecto describe la postura de Jesús. En español, "de pie" expresa con naturalidad ese estado; añadir "allí" sería posible, pero no es necesario para la fidelidad del verso.
- source_word: οὐκ ᾔδει
  english_pob_choice: she did not know
  chosen_spanish: no sabía
  alternatives_spanish:
  - no conocía
  - no reconocía
  lexicon: BDAG
  rationale: '"No sabía" conserva el sentido básico de οἶδα como conocimiento. "No reconocía" interpreta el resultado como falta de identificación, pero el griego deja esa conclusión para la cláusula siguiente.'
- source_word: ὅτι Ἰησοῦς ἐστιν
  english_pob_choice: that it was Jesus
  chosen_spanish: que era Jesús
  alternatives_spanish:
  - que se trataba de Jesús
  - que era el mismo Jesús
  lexicon: BDAG
  rationale: 'En español, una cláusula identificativa natural es "que era Jesús". Esto conserva la tensión narrativa: ella aún no percibía la identidad de la persona presente.'
theological_decisions:
- issue: Lack of recognition of the risen Jesus
  english_pob_reading: that it was Jesus / she did not recognize that it was Jesus
  chosen_spanish_reading: no sabía que era Jesús
  alternative_spanish_readings:
  - no lo reconocía
  - no se dio cuenta de que era Jesús
  rationale: 'La frase principal mantiene la afirmación mínima del griego: falta de conocimiento sobre la identidad de la persona. No se resuelve la causa en el texto, preservando la tensión narrativa y evitando explicar más de lo que el verso dice.'
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: 'Coincide con el último pase auditado: no se reportan revisiones posteriores y el texto base mantiene alta concordancia con el análisis inglés y el griego SBLGNT.'
  spanish_consistency_notes:
  - Se usó "Jesús" sin artículo, en paralelo con el nombre propio griego.
  - Se evitó "Cristo" porque el versículo no usa el título Χριστός.
  - La nota conserva la alternativa de reconocimiento porque el español "no sabía" puede sonar más general que el matiz identificativo del contexto griego.
