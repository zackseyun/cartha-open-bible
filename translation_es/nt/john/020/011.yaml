  - severity: low
    issue: '''Sepulcro'' es aceptable pero algo menos natural que ''tumba'''
    rationale: Dado el estilo objetivo de español moderno y ampliamente legible, 'tumba' suena más natural sin perder dignidad ni precisión contextual.
  revised_spanish_text: Pero María estaba de pie fuera de la tumba, llorando. Entonces, mientras lloraba, se inclinó para mirar[a] dentro de la tumba.
