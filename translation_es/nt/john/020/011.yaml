translation:
  language: es
  text: Pero María estaba de pie fuera de la tumba, llorando. Entonces, mientras lloraba, se inclinó para mirar[a] dentro de la tumba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se inclinó y miró dentro de la tumba». El verbo griego incluye la idea de agacharse o inclinarse para mirar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora
  lexicon: BDAG
  rationale: Marca una transición narrativa con leve contraste respecto a la escena anterior. En español, 'Pero' conserva esa transición con naturalidad sin volver la frase demasiado enfática.
- source_word: εἱστήκει
  english_pob_choice: was standing
  chosen_spanish: estaba
  alternatives_spanish:
  - estaba de pie
  - estaba parada
  lexicon: BDAG
  rationale: El valor aspectual expresa una postura continuada; en español, 'estaba' comunica bien ese estado sin añadir rigidez. El contexto ya hace claro que está de pie.
- source_word: πρὸς τῷ μνημείῳ ἔξω
  english_pob_choice: outside the tomb
  chosen_spanish: fuera del sepulcro
  alternatives_spanish:
  - afuera del sepulcro
  - junto al sepulcro, fuera
  lexicon: BDAG
  rationale: La frase ubica a María en relación con el lugar de entierro. 'Sepulcro' es un equivalente natural y reverente en español bíblico; 'fuera del sepulcro' preserva el contraste espacial con mirar hacia dentro.
- source_word: μνημεῖον
  english_pob_choice: tomb
  chosen_spanish: sepulcro
  alternatives_spanish:
  - tumba
  - tomba
  lexicon: BDAG
  rationale: En este contexto de resurrección, el término se refiere al lugar de enterramiento de Jesús. 'Sepulcro' es claro, digno y ampliamente inteligible en registro bíblico; 'tumba' sería más moderno pero algo menos solemne.
- source_word: κλαίουσα
  english_pob_choice: weeping
  chosen_spanish: llorando
  alternatives_spanish:
  - sollozando
  lexicon: BDAG
  rationale: El participio describe una acción continua. 'Llorando' es la forma española más directa y natural; 'sollozando' sería más específica, pero añade matiz no explicitado por el griego.
- source_word: ἔκλαιεν
  english_pob_choice: was weeping
  chosen_spanish: lloraba
  alternatives_spanish:
  - seguía llorando
  - estaba llorando
  lexicon: BDAG
  rationale: El imperfecto expresa acción en curso. 'Lloraba' conserva esa continuidad de manera fluida y evita redundancia excesiva con el participio anterior, aunque mantiene la misma idea de llanto sostenido.
- source_word: παρέκυψεν
  english_pob_choice: stooped to look
  chosen_spanish: se inclinó para mirar
  alternatives_spanish:
  - se agachó para mirar
  - se asomó
  lexicon: BDAG
  rationale: El verbo incluye la idea de inclinarse o agacharse para mirar dentro. 'Se inclinó para mirar' conserva el movimiento corporal y la finalidad de observar el interior sin sobretraducir la postura.
- source_word: εἰς τὸ μνημεῖον
  english_pob_choice: into the tomb
  chosen_spanish: dentro del sepulcro
  alternatives_spanish:
  - al sepulcro
  - en el sepulcro
  lexicon: BDAG
  rationale: La preposición indica dirección hacia el interior. 'Dentro del sepulcro' expresa con naturalidad ese movimiento visual hacia el interior; en español funciona bien con 'mirar'.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego y toma como guía el audit trail inglés, pero ajusta la sintaxis al español para mantener naturalidad. Se conserva la continuidad aspectual del llanto con dos formas distintas ('llorando' / 'lloraba'), y se refleja el matiz de παρέκυψεν con una nota que admite la alternativa más literal de inclinarse/agacharse para mirar dentro.
  spanish_consistency_notes:
  - Se usa 'sepulcro' de forma consistente para μνημεῖον en este versículo, en armonía con el registro bíblico español y sin recurrir a un término más coloquial que debilite el tono narrativo.
  - Se mantiene la distinción entre el participio presente ('llorando') y el imperfecto ('lloraba') para conservar la acción continua del original.
  - La nota al pie se ancla en 'se inclinó para mirar' porque ahí reside la principal alternativa léxica documentada por el griego y por el audit trail inglés.
