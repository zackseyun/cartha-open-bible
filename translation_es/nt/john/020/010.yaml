translation:
  language: es
  text: Así que los discípulos se fueron otra vez a sus casas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «a ellos mismos» o «a su propio lugar». La expresión griega probablemente significa que regresaron al sitio donde se alojaban.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπῆλθον
  english_pob_choice: went away
  chosen_spanish: se fueron
  alternatives_spanish:
  - partieron
  - se marcharon
  - se fueron de allí
  lexicon: BDAG
  rationale: El aoristo de ἀπέρχομαι indica salida o alejamiento del lugar. En español, «se fueron» comunica de manera natural el movimiento de salida sin sobrecargar el verso.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - Entonces
  - Por eso
  lexicon: BDAG
  rationale: οὖν expresa continuación narrativa o inferencia. «Así que» conserva esa conexión causal/consecutiva con un tono fluido y natural en español.
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  - una vez más
  lexicon: BDAG
  rationale: πάλιν marca repetición o retorno. «Otra vez» es idiomático en español y mantiene la idea de regreso al punto previo.
- source_word: πρὸς ἑαυτούς
  english_pob_choice: to their own homes
  chosen_spanish: a su propio hogar
  alternatives_spanish:
  - a su propia casa
  - a su propio lugar
  - a ellos mismos
  lexicon: BDAG
  rationale: 'La expresión griega es idiomática: no significa meramente «a ellos mismos», sino el regreso al lugar donde se alojaban o pertenecían. «A su propio hogar» hace explícito ese sentido contextual en un español claro.'
- source_word: οἱ μαθηταί
  english_pob_choice: the disciples
  chosen_spanish: los discípulos
  alternatives_spanish:
  - los seguidores
  - los aprendices
  lexicon: BDAG
  rationale: μαθηταί es el término narrativo estándar para los discípulos de Jesús. «Los discípulos» es la equivalencia más directa y reconocible en español.
translation_notes:
  revision_awareness: El texto griego es breve y estable; la tradición auditada en inglés mantiene la lectura idiomática de πρὸς ἑαυτούς como regreso al lugar de estancia. La versión española conserva esa decisión, pero usa «hogar» para expresar el sentido contextual con naturalidad.
  spanish_consistency_notes:
  - Se mantiene el tono narrativo sobrio y directo propio del POB.
  - No se introduce terminología eclesiástica adicional; «discípulos» conserva el valor narrativo estándar.
  - La nota al pie preserva la ambigüedad lexical del giro griego sin imponer una sola equivalencia exclusiva.
