  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: María Magdalena va a los discípulos, anuncia «He visto al Señor» y la cláusula final se entiende como continuación del contenido anunciado. Conserva adecuadamente el perfecto Ἑώρακα con «He visto» y κύριον con «Señor». Sin embargo, la puntuación actual con dos puntos antes de la cita y luego «y que» produce una construcción poco natural en español para un contenido mixto directo/indirecto.'
  spanish_quality_summary: 'El español es comprensible, pero «vino anunciando a los discípulos: “He visto al Señor”, y que él le había dicho estas cosas» suena forzado. Es más natural introducir el contenido con «que» y mantener la cita directa dentro de ese marco: «vino anunciando ... que: “He visto al Señor”, y que él le había dicho estas cosas». También conviene ajustar la nota alternativa para que la opción narrativa suene idiomática en español.'
  glossary_alignment: 'Buena alineación con la terminología del proyecto: «María Magdalena», «discípulos», «Señor». No hay términos doctrinales conflictivos fuera de κύριος, bien resuelto como «Señor».'
  issues:
  - severity: medium
    issue: Construcción sintáctica poco natural en español entre cita directa e indirecta
    rationale: El texto actual usa dos puntos tras «a los discípulos» y luego añade «y que», lo que deja una coordinación híbrida áspera. El griego permite continuidad de contenido; en español conviene marcar desde el inicio que se trata de lo anunciado con «que».
  - severity: low
    issue: Redacción mejorable de la nota alternativa
    rationale: 'La opción «y él le había dicho estas cosas» no representa bien la alternativa de comentario narrativo, que en español corresponde mejor a pasado simple: «y él le dijo estas cosas».'
  revised_spanish_text: 'María Magdalena vino anunciando a los discípulos[a] que: «He visto al Señor», y que él le había dicho estas cosas.'
