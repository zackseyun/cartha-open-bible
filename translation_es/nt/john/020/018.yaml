translation:
  language: es
  text: 'María Magdalena vino anunciando a los discípulos[a] que: «He visto al Señor», y que él le había dicho estas cosas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «María Magdalena vino a los discípulos y dijo: “He visto al Señor”, y él le dijo estas cosas». La cláusula final puede entenderse como parte del informe de María o como un comentario del narrador.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἔρχεται
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - vino
  - llegó
  lexicon: BDAG
  rationale: El presente histórico griego se naturaliza en español con pasado simple. «Vino» conserva el movimiento hacia los discípulos y mantiene la fuerza narrativa sin volverla mecánica.
- source_word: Μαριὰμ ἡ Μαγδαληνὴ
  english_pob_choice: Mary Magdalene
  chosen_spanish: María Magdalena
  alternatives_spanish:
  - María la Magdalena
  - María Magdalena
  lexicon: BDAG
  rationale: Se usa la forma estable y comprensible en español para el nombre propio y el epíteto. «Magdalena» funciona como identificador tradicional sin necesidad de expandir el griego.
- source_word: ἀγγέλλουσα
  english_pob_choice: announcing
  chosen_spanish: anunciando
  alternatives_spanish:
  - diciendo
  - informando
  - trayendo noticia
  lexicon: BDAG
  rationale: El participio expresa acción concomitante de comunicar un mensaje. «Anunciando» conserva el matiz verbal y la noción de dar noticia mejor que un simple «diciendo».
- source_word: τοῖς μαθηταῖς
  english_pob_choice: to the disciples
  chosen_spanish: a los discípulos
  alternatives_spanish:
  - a los seguidores
  - a los discípulos
  lexicon: BDAG
  rationale: «Discípulos» es el equivalente directo y reconocido de μαθηταῖς. No se añade posesivo porque no está explícito en el griego.
- source_word: Ἑώρακα
  english_pob_choice: I have seen
  chosen_spanish: He visto
  alternatives_spanish:
  - He contemplado
  - Vi
  lexicon: BDAG
  rationale: El perfecto griego señala una acción completada con relevancia presente; en español, el pretérito perfecto compuesto («he visto») transmite bien ese valor.
- source_word: τὸν κύριον
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el amo
  - el maestro
  lexicon: BDAG
  rationale: En este contexto joánico de resurrección, κύριον se refiere a Jesús con peso cristológico. «Señor» es la forma natural y fiel en español, sin sustituir el título por un término menos cargado.
- source_word: καὶ ταῦτα εἶπεν αὐτῇ
  english_pob_choice: and that he had said these things to her
  chosen_spanish: y que él le había dicho estas cosas
  alternatives_spanish:
  - y él le dijo estas cosas
  - y que le había dicho esto
  lexicon: BDAG
  rationale: Se conserva la lectura de que la frase continúa el contenido del anuncio de María. El pluscuamperfecto en español ayuda a distinguir la palabra previa de Jesús respecto del reporte actual, y «estas cosas» mantiene la referencia formal de ταῦτα.
theological_decisions:
- issue: Valor cristológico de κύριος en contexto de resurrección
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el maestro
  rationale: El título se aplica a Jesús resucitado y debe retener su peso cristológico. «Señor» es el equivalente estándar y no diluye la referencia reverente del texto.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Alcance de καὶ ταῦτα εἶπεν αὐτῇ
  english_pob_reading: 'Included as part of what Mary announced: ''and that he had said these things to her'''
  chosen_spanish_reading: 'Incluido como parte de lo que María anuncia: «y que él le había dicho estas cosas»'
  alternative_spanish_readings:
  - 'Como comentario narrativo aparte: «y él le había dicho estas cosas»'
  rationale: La sintaxis puede leerse como continuación del contenido del anuncio de María. La redacción elegida refleja esa relación sin forzar una separación que el griego no exige.
  doctrine_reference: Sintaxis narrativa griega; lectura auditada en el POB inglés
translation_notes:
  revision_awareness: No hubo revisiones posteriores que alteraran la decisión de fondo. La versión inglesa más reciente mantuvo el mismo análisis, con acuerdo alto en la revisión cruzada; por eso la línea española conserva la lectura principal y la ambigüedad documentada sobre la cláusula final.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριον por consistencia cristológica y terminológica con el POB inglés.
  - Se conserva el tiempo compuesto «he visto» para reflejar el perfecto griego.
  - La ambigüedad de la cláusula final queda preservada mediante nota, sin resolverla de manera excesiva en el cuerpo principal.
  - El estilo busca ser natural en español sin perder la estructura del testimonio de María.
