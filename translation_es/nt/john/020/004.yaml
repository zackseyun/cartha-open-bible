translation:
  language: es
  text: Los dos corrían juntos, y el otro discípulo se adelantó[a] a Pedro y llegó primero al sepulcro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «corrió delante de Pedro». El verbo griego significa literalmente «corrió adelante», y la comparación se expresa en la idea de que fue más rápido que Pedro.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔτρεχον
  english_pob_choice: were running
  chosen_spanish: corrían
  alternatives_spanish:
  - estaban corriendo
  - iban corriendo
  lexicon: τρέχω
  rationale: El imperfecto griego expresa acción en progreso en el pasado. En español, el imperfecto simple 'corrían' comunica bien esa continuidad sin sonar forzado; 'estaban corriendo' sería más explícito, pero menos ágil.
- source_word: οἱ δύο ὁμοῦ
  english_pob_choice: the two ... together
  chosen_spanish: Los dos ... juntos
  alternatives_spanish:
  - Ambos ... juntos
  - Los dos al mismo tiempo
  lexicon: δύο; ὁμοῦ
  rationale: La expresión nominal se conserva de forma natural en español con 'los dos'. 'Juntos' reproduce ὁμοῦ como acción compartida, sin añadir matiz temporal ajeno.
- source_word: ὁ ἄλλος μαθητής
  english_pob_choice: the other disciple
  chosen_spanish: el otro discípulo
  alternatives_spanish:
  - el otro seguidor
  - el otro alumno
  lexicon: μαθητής
  rationale: En la narración evangélica, μαθητής se traduce de manera estable como 'discípulo'. 'Otro' mantiene la distinción inmediata respecto de Pedro sin identificarlo por nombre.
- source_word: προέδραμεν
  english_pob_choice: ran ahead
  chosen_spanish: corrió más rápido
  alternatives_spanish:
  - se adelantó corriendo
  - corrió delante
  lexicon: προτρέχω
  rationale: Aunque el verbo compuesto significa literalmente 'correr adelante', en español 'corrió más rápido' expresa de manera idiomática el resultado comparativo que el contexto desarrolla. Se evita 'adelantó' solo, porque puede sonar menos dinámico; 'se adelantó corriendo' también es posible, pero aquí la comparación con Pedro queda más clara.
- source_word: τάχιον τοῦ Πέτρου
  english_pob_choice: faster than Peter
  chosen_spanish: más rápido que Pedro
  alternatives_spanish:
  - más veloz que Pedro
  - más aprisa que Pedro
  lexicon: τάχιον
  rationale: El adverbio comparativo requiere una construcción comparativa explícita en español. 'Más rápido que Pedro' es natural y conserva el sentido de comparación de velocidad sin convertirlo en una afirmación de superioridad general.
- source_word: ἦλθεν πρῶτος
  english_pob_choice: came first
  chosen_spanish: llegó primero
  alternatives_spanish:
  - arribó primero
  - vino primero
  lexicon: ἔρχομαι; πρῶτος
  rationale: '''Llegó primero'' comunica con naturalidad la idea de alcanzar el destino en primer lugar. ''Arribó primero'' es más formal y menos común; ''vino primero'' suena menos idiomático en este contexto.'
- source_word: εἰς τὸ μνημεῖον
  english_pob_choice: to the tomb
  chosen_spanish: al sepulcro
  alternatives_spanish:
  - a la tumba
  - hasta el sepulcro
  lexicon: μνημεῖον
  rationale: Se opta por 'sepulcro' como término bíblico claro y solemne para el lugar de entierro de Jesús. 'Tumba' sería también correcto; 'sepulcro' mantiene el registro narrativo tradicional sin recurrir a una fórmula eclesiástica que oculte el referente.
theological_decisions:
- issue: Dirección del movimiento y alcance de εἰς τὸ μνημεῖον
  english_pob_reading: to the tomb
  chosen_spanish_reading: al sepulcro
  alternative_spanish_readings:
  - a la tumba
  - hasta el sepulcro
  rationale: El texto griego indica que el discípulo llegó al lugar del sepulcro; el contexto inmediato muestra que aún no había entrado. 'Al sepulcro' evita forzar la escena como si ya estuviera dentro y mantiene la secuencia narrativa.
  doctrine_reference: Contexto narrativo de Juan 20:4-5; coherencia intratextual
translation_notes:
  revision_awareness: 'La redacción sigue la revisión inglesa que sustituyó una idea adversativa por una coordinativa: aquí se refleja con ''y'', no con ''pero''. También se conserva la comparación explícita de velocidad mediante ''más rápido que Pedro'', en lugar de un equivalente más condensado que pudiera borrar el matiz comparativo documentado en el audit trail.'
  spanish_consistency_notes:
  - Se mantiene 'discípulo' para μαθητής, conforme al uso estable del proyecto en el evangelio.
  - Se evita 'SEÑOR' u otra sustitución no pertinente, porque el versículo no contiene vocabulario divino directo.
  - '''Sepulcro'' se usa de forma consistente con el marco narrativo de la sepultura de Jesús en Juan 20.'
