review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: imperfecto progresivo con «corrían», acción conjunta con «juntos», identificación de «el otro discípulo», y llegada «al sepulcro» sin forzar entrada al interior. Sin embargo, «corrió más rápido que Pedro» fusiona προέδραμεν y τάχιον en una sola idea de velocidad y pierde parcialmente el matiz verbal de «correr adelante / adelantarse» que el POB inglés preserva explícitamente.'
  spanish_quality_summary: El español es natural, claro y de registro bíblico moderno. No obstante, puede mejorarse la fidelidad y la elegancia con «se adelantó a Pedro y llegó primero al sepulcro», o mejor aún preservando la comparación con una nota léxica. La redacción actual es legible, pero simplifica demasiado la estructura fuente.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. «Discípulo» y «sepulcro» son adecuados. La principal cuestión es léxica: προέδραμεν conviene representarlo con «se adelantó» o equivalente, y conservar mediante nota la alternativa/explicación de «corrió delante / corrió adelante».'
  issues:
  - severity: medium
    issue: La traducción de προέδραμεν como «corrió más rápido» omite el matiz de ‘correr adelante / adelantarse’.
    rationale: En el griego, προέδραμεν aporta una imagen verbal distinta de la comparación τάχιον τοῦ Πέτρου. El borrador hace que ambos elementos digan básicamente lo mismo (‘más rápido’), reduciendo la diferenciación léxica presente en la fuente y en la auditoría inglesa.
  - severity: low
    issue: Falta una nota que preserve la alternativa léxica documentada en el POB inglés.
    rationale: 'La auditoría inglesa incluyó una nota significativa: el verbo literalmente significa ‘corrió adelante’, con la comparación expresada por ‘más rápido que Pedro’. En español, una nota equivalente ayuda a conservar esa decisión léxica sin recargar el texto principal.'
  revised_spanish_text: Los dos corrían juntos, y el otro discípulo se adelantó[a] a Pedro y llegó primero al sepulcro.
  revised_footnotes:
  - marker: a
    text: O «corrió delante de Pedro». El verbo griego significa literalmente «corrió adelante», y la comparación se expresa en la idea de que fue más rápido que Pedro.
    reason: lexical_alternative
