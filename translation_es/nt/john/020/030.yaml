translation:
  language: es
  text: Jesús hizo muchos otros signos[a] en presencia de los discípulos, que no están escritos en este libro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «milagros»; el griego dice «signos», enfatizando actos que apuntan más allá de sí mismos hacia quién es Jesús.
    reason: lexical_alternative
lexical_decisions:
- source_word: Πολλὰ μὲν οὖν καὶ ἄλλα
  english_pob_choice: many other
  chosen_spanish: muchos otros
  alternatives_spanish:
  - muchos otros más
  - muchos demás
  lexicon: BDAG
  rationale: La combinación griega intensifica y enlaza con la conclusión narrativa; en español, «muchos otros» comunica naturalmente esa acumulación sin forzar la repetición de partículas como «μέν» y «οὖν». Se evita añadir «ahora» porque el valor discursivo ya queda implícito en el flujo del relato.
- source_word: σημεῖα
  english_pob_choice: signs
  chosen_spanish: signos
  alternatives_spanish:
  - señales
  - milagros
  - signos milagrosos
  lexicon: BDAG
  rationale: 'En Juan, σημεῖα tiene peso teológico: son actos que apuntan a quién es Jesús. «Signos» conserva mejor ese valor que «milagros», que podría reducir el sentido a prodigios. «Señales» es posible, pero «signos» resulta más cercano al uso bíblico y más estable en español eclesial moderno.'
- source_word: ἐποίησεν
  english_pob_choice: did
  chosen_spanish: hizo
  alternatives_spanish:
  - realizó
  - obró
  - efectuó
  lexicon: BDAG
  rationale: El aoristo de ποιέω aquí se expresa de forma natural con «hizo». Es breve, fiel y evita una solemnidad innecesaria que no aporta más precisión en este contexto.
- source_word: ἐνώπιον
  english_pob_choice: in the presence of
  chosen_spanish: en presencia de
  alternatives_spanish:
  - delante de
  - ante
  lexicon: BDAG
  rationale: La frase indica que los signos ocurrieron como hechos visibles para testigos. «En presencia de» reproduce bien ese valor y mantiene un tono claro y moderno.
- source_word: τῶν μαθητῶν
  english_pob_choice: the disciples
  chosen_spanish: los discípulos
  alternatives_spanish:
  - sus discípulos
  - los aprendices
  lexicon: BDAG
  rationale: El griego no añade posesivo; por eso se conserva «los discípulos» y no «sus discípulos». «Aprendices» sería demasiado técnico y poco natural en este contexto.
- source_word: ἃ οὐκ ἔστιν γεγραμμένα
  english_pob_choice: which are not written
  chosen_spanish: los cuales no están escritos
  alternatives_spanish:
  - que no están escritos
  - los cuales no han sido escritos
  - que no han sido registrados
  lexicon: BDAG
  rationale: Se mantiene el valor pasivo y la referencia al estado de lo no consignado en el libro. «No están escritos» suena natural en español y conserva la relación con γράφω sin convertirlo en una paráfrasis más interpretativa como «registrados».
- source_word: ἐν τῷ βιβλίῳ τούτῳ
  english_pob_choice: in this book
  chosen_spanish: en este libro
  alternatives_spanish:
  - en este rollo
  - en este escrito
  lexicon: BDAG
  rationale: «βιβλίον» puede designar libro o rollo, pero en este contexto literario la opción más directa y comprensible es «libro». Mantiene la referencia al escrito de Juan sin introducir una especificación histórica innecesaria.
theological_decisions:
- issue: Uso joánico de σημεῖα
  english_pob_reading: Rendered as 'signs' rather than 'miracles.'
  chosen_spanish_reading: Traducido como «signos» y no como «milagros».
  alternative_spanish_readings:
  - milagros
  - señales
  rationale: 'La elección preserva la carga teológica de Juan: las obras de Jesús no solo maravillan, sino que señalan su identidad y misión. «Milagros» es posible, pero atenúa esa función reveladora. «Signos» mantiene el vínculo con el tema del Evangelio.'
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: El borrador coincide con la revisión más reciente indicada como sin cambios; no se detectan ajustes pendientes respecto del texto fuente ni del criterio inglés auditado.
  spanish_consistency_notes:
  - Se mantiene la distinción entre «signos» y «milagros» para no diluir el término joánico.
  - No se añadió posesivo en «los discípulos», porque no aparece en el griego.
  - «Este libro» conserva el referente literario del evangelio sin forzar una imagen técnica de «rollo».
  - El orden de la oración respeta la progresión narrativa del griego sin calcos innecesarios.
