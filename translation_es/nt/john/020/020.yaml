translation:
  language: es
  text: Y después de decir esto, les mostró sus manos y su costado. Entonces los discípulos se alegraron al ver al Señor.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: καὶ τοῦτο εἰπὼν
  english_pob_choice: after saying this
  chosen_spanish: Y después de decir esto
  alternatives_spanish:
  - Y habiendo dicho esto
  - Y cuando dijo esto
  lexicon: BDAG
  rationale: El participio aoristo con τοῦτο expresa anterioridad temporal respecto del verbo principal. En español, «después de decir esto» comunica bien la secuencia narrativa sin sonar forzado ni demasiado literal.
- source_word: ἔδειξεν
  english_pob_choice: showed
  chosen_spanish: les mostró
  alternatives_spanish:
  - les enseñó
  - les presentó
  lexicon: BDAG
  rationale: δείκνυμι aquí significa poner a la vista. «Mostró» es la equivalencia más natural en español y mantiene el gesto identificador de las manos y el costado.
- source_word: τὰς χεῖρας
  english_pob_choice: his hands
  chosen_spanish: sus manos
  alternatives_spanish:
  - las manos
  lexicon: BDAG
  rationale: Aunque el griego no explicita el posesivo, el contexto deja claro que son las manos de Jesús. En español, «sus manos» evita ambigüedad y corresponde al uso idiomático documentado en el inglés POB.
- source_word: τὴν πλευρὰν
  english_pob_choice: his side
  chosen_spanish: su costado
  alternatives_spanish:
  - su lado
  - su flanco
  lexicon: BDAG
  rationale: πλευρά significa «lado/costado». «Costado» es una forma natural y reverente en español bíblico, y evoca con precisión la herida mencionada previamente en el capítulo.
- source_word: ἐχάρησαν
  english_pob_choice: rejoiced
  chosen_spanish: se alegraron
  alternatives_spanish:
  - se regocijaron
  - se gozaron
  lexicon: BDAG
  rationale: χαίρω puede rendirse como «alegrarse» o «regocijarse». Aquí «se alegraron» expresa el gozo de manera clara y natural en español, sin perder el valor verbal del original.
- source_word: οὖν
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Así que
  - Por tanto
  lexicon: BDAG
  rationale: οὖν marca consecuencia o progresión narrativa. «Entonces» comunica bien ese paso en la narración en un español fluido.
- source_word: οἱ μαθηταί
  english_pob_choice: the disciples
  chosen_spanish: los discípulos
  alternatives_spanish:
  - los aprendices
  lexicon: BDAG
  rationale: μαθηταί es el término estándar para los seguidores de Jesús. «Los discípulos» es la traducción estable y exacta en español.
- source_word: ἰδόντες
  english_pob_choice: when they saw
  chosen_spanish: al ver
  alternatives_spanish:
  - cuando vieron
  - habiendo visto
  lexicon: BDAG
  rationale: El participio aoristo expresa la circunstancia temporal del gozo. «Al ver» mantiene esa relación temporal de forma natural en español.
- source_word: τὸν κύριον
  english_pob_choice: the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - al dueño
  - al maestro
  lexicon: BDAG
  rationale: En este contexto joánico de resurrección, κύριος funciona como título cristológico. «Señor» preserva ese peso teológico y la formulación habitual en español bíblico, con el artículo incorporado en la construcción preposicional.
theological_decisions:
- issue: Renderización de κύριος como título cristológico
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el dueño
  - el maestro
  rationale: Siguiendo la lectura auditada del POB inglés, κύριος aquí no es un simple tratamiento de cortesía. En el contexto de la aparición resucitada, «Señor» conserva la identificación de Jesús y su carga cristológica.
  doctrine_reference: 'DOCTRINE.md: κύριος → Lord'
- issue: Relación temporal entre el dicho y la muestra de las heridas
  english_pob_reading: after saying this
  chosen_spanish_reading: después de decir esto
  alternative_spanish_readings:
  - habiendo dicho esto
  rationale: El texto griego presenta una acción anterior al verbo principal. La redacción española conserva esa secuencia sin introducir explicaciones ajenas al pasaje.
  doctrine_reference: Gramática del participio aoristo circunstancial
- issue: Gozo de los discípulos al reconocer a Jesús resucitado
  english_pob_reading: Then the disciples rejoiced when they saw the Lord
  chosen_spanish_reading: Entonces los discípulos se alegraron al ver al Señor
  alternative_spanish_readings:
  - Entonces los discípulos se regocijaron al ver al Señor
  rationale: La frase mantiene la reacción de alegría como respuesta directa a la visión del Señor resucitado, sin suavizar el énfasis narrativo ni añadir matices no presentes en el texto.
  doctrine_reference: Jn 16:22; narrativa de la resurrección
translation_notes:
  revision_awareness: El borrador sigue de cerca el audit trail inglés del POB y el griego SBLGNT, sin cambios respecto de la solución ya aprobada en la revisión más reciente. No se detectan tensiones textuales adicionales que requieran nota al pie.
  spanish_consistency_notes:
  - Se usa «Señor» para κύριος conforme al criterio doctrinal del proyecto y al contexto cristológico joánico.
  - Se mantiene un español contemporáneo y digno, evitando calcos innecesarios.
  - No se añadieron notas al pie porque el versículo no presenta variantes textuales o alternativas relevantes que requieran marcación en el texto español.
