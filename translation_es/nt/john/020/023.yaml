    text: 'O, de manera más dinámica: «Si perdonan los pecados de cualquiera, les son perdonados; si los retienen, les quedan retenidos». El griego usa perfectos pasivos en ambas cláusulas, lo que puede enfatizar una acción terminada con resultado continuo.'
    reason: lexical_alternative
