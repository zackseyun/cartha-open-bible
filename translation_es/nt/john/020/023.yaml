translation:
  language: es
  text: Si perdonan los pecados de alguno[a], les han sido perdonados; si los retienen, les quedan retenidos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más dinámica: «Si perdonan los pecados de cualquiera, les son perdonados; si los retienen, les quedan retenidos». El griego usa perfectos pasivos en ambas cláusulas, lo que puede enfatizar una acción terminada con resultado continuo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄν τινων
  english_pob_choice: If ... of any
  chosen_spanish: de alguno
  alternatives_spanish:
  - de cualquiera
  - a alguno
  lexicon: BDAG
  rationale: La construcción griega introduce una condición indefinida; en español, «de alguno» conserva esa indefinición sin forzar una formulación más explicativa que el original.
- source_word: ἀφῆτε
  english_pob_choice: you forgive
  chosen_spanish: perdonáis
  alternatives_spanish:
  - perdonen
  - absuelvan
  - remitan
  lexicon: BDAG
  rationale: En este contexto ἀφίημι tiene el sentido de perdonar pecados. «Perdonáis» mantiene el valor verbal claro y natural en español, sin recurrir a «remitir», que es más técnico o eclesiástico.
- source_word: τὰς ἁμαρτίας
  english_pob_choice: the sins
  chosen_spanish: los pecados
  alternatives_spanish:
  - los pecados cometidos
  - las faltas
  lexicon: BDAG
  rationale: «Pecados» expresa con fidelidad el sustantivo griego y conserva el artículo, que en español resulta natural en esta construcción.
- source_word: ἀφέωνται
  english_pob_choice: they have been forgiven
  chosen_spanish: les han sido perdonados
  alternatives_spanish:
  - están perdonados
  - han sido perdonados
  lexicon: BDAG
  rationale: El perfecto pasivo griego expresa una acción completa con resultado vigente. «Les han sido perdonados» conserva ese matiz resultativo mejor que un simple presente, y evita borrar la pasiva.
- source_word: αὐτοῖς
  english_pob_choice: them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - para ellos
  lexicon: BDAG
  rationale: El dativo personal se naturaliza en español con clítico indirecto. «Les» mantiene la referencia a las personas afectadas por el perdón.
- source_word: κρατῆτε
  english_pob_choice: you retain
  chosen_spanish: retenéis
  alternatives_spanish:
  - guardáis
  - mantenéis
  - conserváis
  lexicon: BDAG
  rationale: Aquí κρατέω contrasta con perdonar y significa retener o mantener bajo retención. «Retenéis» es el antónimo más claro y fiel en español.
- source_word: κεκράτηνται
  english_pob_choice: they have been retained
  chosen_spanish: han sido retenidos
  alternatives_spanish:
  - están retenidos
  - les han sido retenidos
  lexicon: BDAG
  rationale: El perfecto pasivo se refleja con «han sido retenidos», que conserva la idea de una acción ya realizada con efecto presente, en paralelo con la primera cláusula.
theological_decisions:
- issue: Cómo reflejar la relación entre la acción de los discípulos y el estado del perdón/retención sin resolver la tensión teológica del pasaje.
  english_pob_reading: The English POB preserves the perfect-passive/resultative wording without adding interpretive qualifiers, allowing the text to remain ambiguous about direct agency while preserving the passive voice.
  chosen_spanish_reading: La traducción mantiene la pasiva resultativa («les han sido perdonados» / «han sido retenidos») sin añadir explícitamente a Dios como sujeto agente.
  alternative_spanish_readings:
  - si perdonáis... están perdonados
  - Dios les ha perdonado...
  rationale: El griego no nombra de forma explícita al agente en las pasivas. Mantener la pasiva preserva la tensión teológica y evita imponer una explicación doctrinal que el texto no desarrolla.
  doctrine_reference: 'Translation philosophy §3: Preservar la tensión teológica en vez de resolverla.'
translation_notes:
  revision_awareness: 'El último repaso en inglés corrigió una posible ambigüedad de referencia en la primera cláusula y, a la vez, conservó la pasiva perfecta en ambas mitades del versículo. La versión española refleja ese equilibrio: mantiene la referencia a «los pecados» en la primera cláusula y conserva una pasiva resultativa compacta en la segunda, sin expandir el texto más allá del griego.'
  spanish_consistency_notes:
  - Se usó «Yahvé» en lugar de «SEÑOR» solo cuando corresponda a citas del nombre divino; aquí no aparece.
  - Se prefirió «perdonar» sobre «remitir» para el campo semántico de ἀφίημι en contexto de pecados.
  - Se preservó el paralelismo verbal entre ambas cláusulas con formas pasivas resultativas en español.
  - «Retenéis» se eligió como antónimo contextual de «perdonáis», evitando «guardáis» o «mantenéis», que sonarían menos precisos en este pasaje.
