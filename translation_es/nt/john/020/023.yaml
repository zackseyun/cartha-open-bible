review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura condicional indefinida del griego, el contraste entre perdonar y retener, y la intención de mantener la pasiva sin explicitar al agente divino. Sin embargo, en la segunda cláusula española se pierde el matiz perfectivo/resultativo de κεκράτηνται al decir solo «han sido retenidos», donde el español pide normalmente el clítico dativo paralelo («les han sido retenidos») o una reformulación más natural. Además, la nota [b] está equivocada, porque ofrece una alternativa de la primera cláusula («les han sido perdonados») en lugar de aclarar la segunda.
  spanish_quality_summary: 'El texto es mayormente claro y digno, pero mezcla voseo peninsular («perdonáis / retenéis») con el encargo de español neutral latinoamericano. Para un registro ampliamente eclesial y panhispánico, «perdonan / retienen» funciona mejor. También conviene ajustar la segunda cláusula para mantener mejor el paralelismo y la naturalidad: «les quedan retenidos» preserva la pasiva/resultatividad con español más idiomático que «han sido retenidos» sin dativo.'
  glossary_alignment: No hay términos del glosario mayor en juego aparte de «pecados», que está bien. La decisión de mantener la pasiva teológica es correcta y acorde con la justificación POB. La principal divergencia es estilística y aspectual, no terminológica.
  issues:
  - severity: medium
    issue: 'Registro verbal no neutral: «perdonáis / retenéis».'
    rationale: El proyecto pide español neutral latinoamericano / ampliamente legible en iglesia. Las formas de segunda persona plural peninsular suenan regionales; «perdonan / retienen» evita eso sin perder fidelidad.
  - severity: medium
    issue: La segunda cláusula española no refleja con suficiente naturalidad el paralelismo resultativo del perfecto pasivo griego.
    rationale: «Han sido retenidos» suena truncado en español al omitir referencia a las personas y no comunica tan bien el estado vigente. «Les quedan retenidos» conserva mejor el valor resultativo y el contraste con «les son perdonados / les han sido perdonados».
  - severity: high
    issue: La nota [b] es incorrecta y no corresponde al lugar donde está anclada.
    rationale: 'La nota b dice «O: “les han sido perdonados”», que repite una formulación de la primera cláusula en vez de explicar «los retenéis». Esto desorienta al lector y no preserva el rastro de auditoría inglés, donde la nota b se refería a una alternativa de la primera cláusula inglesa causada por ambigüedad de pronombres.'
  revised_spanish_text: Si perdonan los pecados de alguno[a], les han sido perdonados; si los retienen, les quedan retenidos.
