    text: «Hermanos» traduce el término griego masculino plural; aquí se refiere a los discípulos de Jesús y puede incluir un grupo representativo más amplio.
    reason: cultural_note
  revision_rationale: Se corrige la ambigüedad de «su Padre / su Dios» para reflejar explícitamente la segunda persona plural del griego y preservar el paralelismo intencional del texto. También se reubica la nota cultural al término «hermanos», que es el elemento al que realmente explica. El resto del versículo puede mantenerse.
