base_translation:
  language: en
  yaml_path: translation/nt/john/020/017.yaml
  text: Jesus said to her[a], “Do not cling to me, for I have not yet ascended to the Father. But go to my brothers and tell them, ‘I am ascending to my Father and your Father[b], and my God and your God.’”
  footnotes:
  - marker: a
    text: Or “Do not touch me” or “Do not hold on to me.” The Greek likely refers to clinging or continuing to hold him rather than merely making contact.
    reason: lexical_alternative
  - marker: b
    text: “Brothers” renders the masculine plural Greek term; here it refers to Jesus’ disciples and may include a broader representative group.
    reason: cultural_note
