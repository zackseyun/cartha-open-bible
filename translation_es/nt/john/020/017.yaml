translation:
  language: es
  text: 'Jesús le dijo[a]: «No te aferres a mí, porque todavía no he subido al Padre. Pero ve a mis hermanos[b] y diles: “Subo a mi Padre y al Padre de ustedes, y a mi Dios y al Dios de ustedes”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «No me toques» o «No me agarres». El griego probablemente se refiere a aferrarse a él o seguir reteniéndolo, más que a un simple contacto.
    reason: lexical_alternative
  - marker: b
    text: «Hermanos» traduce el término griego masculino plural; aquí se refiere a los discípulos de Jesús y puede incluir un grupo representativo más amplio.
    reason: cultural_note
lexical_decisions:
- source_word: ἅπτου
  english_pob_choice: cling to
  chosen_spanish: te aferres a
  alternatives_spanish:
  - me toques
  - te agarres de mí
  lexicon: BDAG
  rationale: El imperativo negativo con μή y presente medio sugiere una acción en curso que debe cesar. «Te aferres a» comunica mejor la idea de seguir sujetándolo o retenerlo, sin reducirla a un simple contacto físico.
- source_word: οὔπω γὰρ ἀναβέβηκα
  english_pob_choice: for I have not yet ascended
  chosen_spanish: porque todavía no he subido
  alternatives_spanish:
  - porque aún no he ascendido
  - porque todavía no he subido a
  lexicon: BDAG
  rationale: «Subido» mantiene la imagen de ascenso con una forma natural en español. La opción «he ascendido» también es válida, pero «he subido» resulta más idiomática y preserva el movimiento hacia arriba.
- source_word: πρὸς τὸν πατέρα
  english_pob_choice: to the Father
  chosen_spanish: al Padre
  alternatives_spanish:
  - a el Padre
  - a mi Padre
  lexicon: BDAG
  rationale: Se conserva el artículo del griego sin introducir el posesivo donde el texto no lo tiene. «Al Padre» respeta la referencia definida y deja que la frase posterior distinga explícitamente «mi Padre».
- source_word: πορεύου
  english_pob_choice: go
  chosen_spanish: ve
  alternatives_spanish:
  - anda
  - ponte en camino
  lexicon: BDAG
  rationale: Es un imperativo de movimiento directo. «Ve» es la forma más natural y fiel en español.
- source_word: ἀδελφούς
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - discípulos
  lexicon: BDAG
  rationale: Se mantiene el plural masculino del original como «hermanos». En este contexto se refiere a los discípulos; el matiz inclusivo se deja implícito sin alterar el término base.
- source_word: εἰπὲ αὐτοῖς
  english_pob_choice: tell them
  chosen_spanish: diles
  alternatives_spanish:
  - háblales
  - cuéntales
  lexicon: BDAG
  rationale: En este encargo de comunicación, «diles» reproduce con claridad y naturalidad el valor del imperativo aoristo seguido del dativo.
- source_word: Ἀναβαίνω
  english_pob_choice: I am ascending
  chosen_spanish: Subo
  alternatives_spanish:
  - Estoy subiendo
  - Asciendo
  lexicon: BDAG
  rationale: El presente puede tener fuerza progresiva o futurista. «Subo» mantiene la sencillez del enunciado y la idea de movimiento inminente sin forzar una perífrasis.
- source_word: πατέρα μου καὶ πατέρα ὑμῶν
  english_pob_choice: my Father and your Father
  chosen_spanish: mi Padre y su Padre
  alternatives_spanish:
  - mi Padre y vuestro Padre
  - mi Padre y el Padre de ustedes
  lexicon: BDAG
  rationale: La relación paralela se conserva, pero en español la repetición de «Padre» con un posesivo resulta pesada; «su Padre» mantiene la distinción del destinatario y el paralelismo relacional. La lectura alternativa «vuestro Padre» sería natural en algunos registros, pero «su Padre» puede abarcar mejor una audiencia amplia.
- source_word: θεόν μου καὶ θεὸν ὑμῶν
  english_pob_choice: my God and your God
  chosen_spanish: mi Dios y su Dios
  alternatives_spanish:
  - mi Dios y vuestro Dios
  - mi Dios y el Dios de ustedes
  lexicon: BDAG
  rationale: Se preserva la estructura paralela con «mi Dios y su Dios», evitando suavizar la afirmación. «Dios» mantiene el valor teológico directo del sustantivo griego.
theological_decisions:
- issue: Sentido de Μή μου ἅπτου
  english_pob_reading: A prohibition against continued holding/clinging rather than a ban on any physical contact whatsoever.
  chosen_spanish_reading: Una prohibición de aferrarse o seguir reteniéndolo, más que de cualquier contacto físico en absoluto.
  alternative_spanish_readings:
  - No me toques
  - No me agarres
  rationale: El griego favorece una prohibición de acción continuada. «No te aferres a mí» conserva la tensión del pasaje sin resolverla en una prohibición absoluta de contacto.
  doctrine_reference: Translation philosophy §3 y §6
- issue: Referencia del primer πρὸς τὸν πατέρα
  english_pob_reading: the Father
  chosen_spanish_reading: el Padre
  alternative_spanish_readings:
  - mi Padre
  rationale: No aparece μου en la primera cláusula griega; por eso se mantiene la referencia definida «el Padre» y se deja que la cita posterior exponga la relación específica.
  doctrine_reference: Translation philosophy §1
- issue: Fuerza cristológica de «mi Dios y su Dios»
  english_pob_reading: Translate the phrase directly without doctrinal softening.
  chosen_spanish_reading: Traducir la frase de manera directa, sin suavizar su fuerza.
  alternative_spanish_readings:
  - parafrasear para evitar la expresión
  - atenuar la posesión con una fórmula más vaga
  rationale: La traducción debe conservar el peso cristológico y la tensión teológica del texto, en vez de reescribirlo para prevenir malentendidos doctrinales.
  doctrine_reference: Affirmations (Nicene/Chalcedonian orthodoxy)
translation_notes:
  revision_awareness: 'El texto sigue de cerca el griego de SBLGNT y es coherente con la decisión previa del POB en inglés: conservar la tensión de Μή μου ἅπτου, mantener «el Padre» en la primera cláusula y traducir directamente la declaración final sin suavización doctrinal. No se registran revisiones aplicadas en el historial reciente.'
  spanish_consistency_notes:
  - Se mantiene «Padre» con mayúscula en referencia a Dios.
  - Se conserva el paralelismo «mi Padre / su Padre» y «mi Dios / su Dios» sin expandirlo en paráfrasis.
  - «Hermanos» se usa en sentido inclusivo contextual, con nota explicativa.
  - El registro es reverente y contemporáneo, evitando arcaísmos innecesarios.
