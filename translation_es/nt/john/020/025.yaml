  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del griego y sigue de cerca el rastro del POB inglés: imperfecto iterativo («le decían»), perfecto con relevancia presente («Hemos visto»), título cristológico («el Señor»), concreción de τύπος («marca»), y referencia anatómica precisa («costado»). Sin embargo, la nota al pie está anclada en el lugar equivocado: el marcador [a] aparece tras «le decían», pero la nota explica la negación enfática de «οὐ μὴ πιστεύσω», por lo que debe ir junto a la cláusula final de incredulidad. Además, «no creeré en absoluto» es entendible, pero suena algo menos natural y algo más adverbial que una formulación como «de ningún modo creeré», que preserva mejor la fuerza enfática sin introducir la temporalidad de «nunca».'
