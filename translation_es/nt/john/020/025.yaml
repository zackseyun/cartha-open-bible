translation:
  language: es
  text: 'Así que los otros discípulos le decían: «Hemos visto al Señor». Pero él les dijo: «Si no veo en sus manos la marca de los clavos, y meto mi dedo en la marca de los clavos, y meto mi mano en su costado, de ningún modo creeré[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no creeré nunca». El griego usa una negación enfática.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγον
  english_pob_choice: were telling
  chosen_spanish: le decían
  alternatives_spanish:
  - le estaban diciendo
  - seguían diciéndole
  lexicon: BDAG
  rationale: El imperfecto expresa acción շարունակada o repetida; en español, «le decían» conserva ese valor iterativo sin sonar pesado. «Le estaban diciendo» lo vuelve más analítico, y «seguían diciéndole» enfatiza más de lo que exige el griego.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - Entonces
  - Por tanto
  lexicon: BDAG
  rationale: Marca continuidad narrativa. «Así que» es natural en español y mantiene la relación discursiva sin cargarla de formalidad lógica.
- source_word: οἱ ἄλλοι μαθηταί
  english_pob_choice: the other disciples
  chosen_spanish: los otros discípulos
  alternatives_spanish:
  - los demás discípulos
  - el resto de los discípulos
  lexicon: BDAG
  rationale: Corresponde directamente al contraste con Tomás en el contexto inmediato. «Los otros discípulos» es claro y fiel al griego.
- source_word: Ἑωράκαμεν
  english_pob_choice: We have seen
  chosen_spanish: Hemos visto
  alternatives_spanish:
  - Vimos
  lexicon: BDAG
  rationale: El perfecto griego conserva relevancia presente de una acción completada; «hemos visto» lo refleja mejor que el pretérito simple.
- source_word: κύριον
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  lexicon: BDAG
  rationale: Aquí κύριος funciona como título cristológico referido a Jesús resucitado. En español bíblico «el Señor» es la forma natural y fiel al uso de título, sin perder la referencia personal.
- source_word: Ἐὰν μὴ ἴδω
  english_pob_choice: Unless I see
  chosen_spanish: Si no veo
  alternatives_spanish:
  - A menos que vea
  lexicon: BDAG
  rationale: En español, la condición negativa queda más natural con «si no veo». «A menos que vea» también es posible, pero suena más marcado y menos directo.
- source_word: ἐν ταῖς χερσὶν αὐτοῦ
  english_pob_choice: in his hands
  chosen_spanish: en sus manos
  alternatives_spanish:
  - sobre sus manos
  lexicon: BDAG
  rationale: Se conserva el valor locativo de ἐν con la imagen concreta de las heridas. «En sus manos» sigue de cerca el griego y es idiomático en español.
- source_word: τὸν τύπον τῶν ἥλων
  english_pob_choice: the mark of the nails
  chosen_spanish: la marca de los clavos
  alternatives_spanish:
  - la huella de los clavos
  - la impresión de los clavos
  lexicon: BDAG
  rationale: τύπος aquí señala la huella visible dejada por los clavos. «Marca» es claro, moderno y reproduce la decisión del POB inglés; «clavos» explicita el referente de ἥλων.
- source_word: βάλω
  english_pob_choice: put
  chosen_spanish: meto
  alternatives_spanish:
  - pongo
  - coloco
  lexicon: BDAG
  rationale: En este contexto corporal, el sentido es introducir o colocar físicamente. «Meto» transmite con naturalidad la acción de poner el dedo y la mano en las heridas.
- source_word: τὸν δάκτυλόν μου εἰς
  english_pob_choice: my finger into
  chosen_spanish: mi dedo en
  alternatives_spanish:
  - mi dedo dentro de
  lexicon: BDAG
  rationale: El griego expresa movimiento hacia dentro; en español «en» puede funcionar naturalmente con verbos de introducir. «Mi dedo en» evita sobrecargar la frase y mantiene la vividez de la escena.
- source_word: μου τὴν χεῖρα
  english_pob_choice: my hand
  chosen_spanish: mi mano
  lexicon: BDAG
  rationale: El posesivo se conserva de forma directa. No hay razón para variar el sentido explícito del griego.
- source_word: τὴν πλευρὰν αὐτοῦ
  english_pob_choice: his side
  chosen_spanish: su costado
  alternatives_spanish:
  - su lado
  - su costado herido
  lexicon: BDAG
  rationale: «Costado» es el término español más natural en este contexto joánico y mantiene la referencia al costado abierto de Jesús en el relato previo. «Lado» sería más general y menos preciso.
- source_word: οὐ μὴ πιστεύσω
  english_pob_choice: I will certainly not believe
  chosen_spanish: no creeré en absoluto
  alternatives_spanish:
  - jamás creeré
  - no creeré de ninguna manera
  lexicon: BDAG
  rationale: La negación enfática οὐ μή requiere una formulación fuerte. «No creeré en absoluto» preserva la intensidad sin fijar una temporalidad absoluta de «jamás»; mantiene la negativa decidida de Tomás.
theological_decisions:
- issue: Fuerza de la negativa enfática οὐ μὴ πιστεύσω
  english_pob_reading: I will certainly not believe
  chosen_spanish_reading: no creeré en absoluto
  alternative_spanish_readings:
  - jamás creeré
  - no creeré de ninguna manera
  rationale: La construcción griega expresa rechazo enfático, no solo simple duda. «No creeré en absoluto» conserva la contundencia sin forzar una lectura de negatividad eterna o psicológicamente definitiva.
  doctrine_reference: Mantener la fuerza retórica del texto sin resolverla más allá del griego; tensión literaria y teológica del relato de Tomás.
- issue: Término cristológico κύριον
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el Dueño
  - el Maestro
  rationale: En este contexto, el término es una confesión cristológica referida a Jesús resucitado. «El Señor» es la forma eclesial y bíblica en español que mejor preserva esa identificación.
  doctrine_reference: Cristología joánica; confesión de Jesús como Señor.
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés con alta concordancia. Se mantuvieron las decisiones clave: imperfecto iterativo en «le decían», perfecto en «hemos visto», τύπος como «marca», y la negación enfática de οὐ μή sin suavizarla excesivamente. No se detectaron cambios de revisión relevantes en el contexto inglés.'
  spanish_consistency_notes:
  - Se usa «Señor» como título cristológico, coherente con la referencia a Jesús resucitado.
  - Se mantuvo «marca» para τύπος y «clavos» para ἥλων, en paralelo con el POB inglés.
  - «No creeré en absoluto» conserva la negación enfática y evita un calco rígido.
  - La sintaxis sigue de cerca el orden y la progresión discursiva del griego sin sonar artificial en español.
