  glossary_alignment: 'Buena alineación con la terminología del proyecto: κύριος se traduce correctamente como «Señor» referido a Jesús; no hay conflicto con Yahvé. No aparecen otros términos sensibles del glosario. La decisión sobre οὐ μὴ πιστεύσω debe mantener la negación enfática; «de ningún modo creeré[a]» lo hace de forma fiel y natural, y la alternativa «no creeré nunca» puede conservarse en nota como en el POB inglés.'
