translation:
  language: es
  text: Entonces Simón Pedro también[a] vino, siguiéndolo, y entró en el sepulcro; y ve los lienzos puestos allí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego tiene presente histórico tanto en «viene» como en «ve»; en español el primero se vierte en pasado para una narración más natural, mientras se conserva el segundo en presente para mantener la vivacidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔρχεται
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - venía
  - llegó
  lexicon: BDAG
  rationale: El griego usa presente histórico, pero en español narrativo natural el pretérito simple comunica mejor la sucesión de hechos sin sonar forzado. «Vino» mantiene el movimiento y la progresión del relato.
- source_word: οὖν
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Así que
  - Por tanto
  lexicon: BDAG
  rationale: Marca continuidad narrativa e inferencia inmediata respecto al versículo anterior. «Entonces» es claro y natural en español.
- source_word: καὶ Σίμων Πέτρος
  english_pob_choice: Simon Peter also
  chosen_spanish: Simón Pedro también
  alternatives_spanish:
  - y Simón Pedro
  - Simón Pedro asimismo
  lexicon: BDAG
  rationale: El καὶ añade a Simón Pedro al cuadro ya iniciado. «También» conserva ese valor aditivo con fluidez en español.
- source_word: ἀκολουθῶν αὐτῷ
  english_pob_choice: following him
  chosen_spanish: siguiendo a Jesús
  alternatives_spanish:
  - siguiéndolo
  - siguiendo tras él
  lexicon: BDAG
  rationale: El referente implícito de αὐτῷ es Jesús en el contexto inmediato. En español, explicitar «a Jesús» evita ambigüedad sin alterar el sentido. «Siguiendo» conserva el participio concomitante y el matiz de acompañamiento.
- source_word: εἰσῆλθεν εἰς τὸ μνημεῖον
  english_pob_choice: entered into the tomb
  chosen_spanish: entró en el sepulcro
  alternatives_spanish:
  - entró en la tumba
  - entró al sepulcro
  lexicon: BDAG
  rationale: μνημεῖον aquí designa una tumba funeraria; «sepulcro» es preciso y solemne en español bíblico. Se evita «dentro de» porque ya está contenido en el verbo + preposición.
- source_word: θεωρεῖ
  english_pob_choice: he sees
  chosen_spanish: ve
  alternatives_spanish:
  - observa
  - mira
  lexicon: BDAG
  rationale: El presente histórico puede conservarse en español con valor narrativo vivo. «Ve» es directo y reproduce la inmediatez del griego sin sobreinterpretar el acto perceptivo.
- source_word: τὰ ὀθόνια
  english_pob_choice: the linen cloths
  chosen_spanish: los lienzos
  alternatives_spanish:
  - las telas de lino
  - las vendas de lino
  lexicon: BDAG
  rationale: ὀθόνια se refiere a paños de lino usados en el entierro. «Lienzos» es una forma bíblica clara y suficientemente literal en español; «vendas de lino» añadiría una especificidad no exigida por el término.
- source_word: κείμενα
  english_pob_choice: lying there
  chosen_spanish: tendidos
  alternatives_spanish:
  - puestos allí
  - yacentes
  lexicon: BDAG
  rationale: El participio expresa el estado visible de los lienzos como colocados/extendidos. «Tendidos» comunica bien esa postura en español sin recargar la frase con un locativo explícito innecesario.
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés: se mantuvo la secuencia narrativa, el presente histórico se conservó en la segunda cláusula para vivacidad y se explicitó el referente de αὐτῷ como Jesús por claridad contextual. No hubo revisiones posteriores que exigieran cambios.'
  spanish_consistency_notes:
  - Se usa «sepulcro» para μνημεῖον, coherente con registro bíblico y con el contexto funerario.
  - Se evita «Cristo» porque el referente inmediato es Jesús narrativo, no el título mesiánico en esta cláusula.
  - «Lienzos» mantiene una solución breve y tradicional sin perder la referencia a paños funerarios de lino.
  - Se conserva el presente «ve» para reflejar el presente histórico griego, en línea con la decisión auditada en inglés.
