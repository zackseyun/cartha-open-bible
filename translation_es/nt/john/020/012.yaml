- from: y ve dos ángeles vestidos de blanco[a], sentados, uno junto a la cabeza y uno junto a los pies[b], donde había estado el cuerpo de Jesús.
  to: y ve dos ángeles de blanco[a], sentados, uno junto a la cabeza y uno junto a los pies[b], donde había estado tendido el cuerpo de Jesús.
  rationale: Se ajusta ἐν λευκοῖς a «de blanco» para preservar la concisión del original y del POB inglés, dejando la explicitación de la vestimenta en nota. Se reemplaza «había estado» por «había estado tendido» para reflejar mejor ἔκειτο y mejorar la naturalidad del español sin perder la anterioridad contextual que el POB quiso aclarar.
