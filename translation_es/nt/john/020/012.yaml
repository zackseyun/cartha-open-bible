review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la escena y la mayoría de las decisiones léxicas del griego: «ve», «dos ángeles», «sentados», y la distribución «uno ... y uno ...» son fieles. También preserva correctamente la lectura de ἀγγέλους como seres celestiales. Sin embargo, «vestidos de blanco» en el texto principal sobreinterpreta ἐν λευκοῖς, que el POB inglés retuvo con mayor compacidad como «in white» y relegó la expansión a nota. Además, «donde había estado el cuerpo de Jesús» debilita el valor de κεῖμαι (‘yacer/estar puesto’) y suena menos natural que una formulación que conserve el estado de estar tendido o puesto allí.'
  spanish_quality_summary: El español es generalmente claro y digno, pero dos frases pueden mejorarse. «Vestidos de blanco» es idiomático, aunque añade una explicitación innecesaria en el cuerpo del texto; «de blanco» mantiene mejor la concisión. «Había estado el cuerpo de Jesús» es comprensible pero algo rígido e incompleto semánticamente en español, porque «estar» sin complemento o verbo de postura pierde la imagen espacial presente en κεῖμαι. «Había estado tendido» o «yacía» resuelven mejor la fluidez y la precisión.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto: «Jesús», «ángeles» y «cuerpo» están bien. La revisión propuesta no altera ninguna convención doctrinal o terminológica global. La principal corrección es de fidelidad léxica y naturalidad española en ἐν λευκοῖς y ἔκειτο.'
  issues:
  - severity: medium
    issue: «vestidos de blanco» añade una explicitación en el texto principal
    rationale: El griego dice literalmente «en blanco» y el POB inglés preserva esa compacidad en el texto principal, dejando «wearing white / in white clothing» como alternativa en nota. En español, «de blanco» comunica bien la idea sin sobreespecificar «vestidos».
  - severity: medium
    issue: «donde había estado el cuerpo de Jesús» no refleja con suficiente precisión el valor locativo-postural de ἔκειτο
    rationale: κεῖμαι no es simplemente «estar», sino «yacer / estar puesto / estar tendido». La construcción actual resulta menos natural y menos vívida en español. Una opción como «donde había estado tendido el cuerpo de Jesús» conserva la anterioridad contextual y la imagen espacial.
  - severity: low
    issue: La nota [a] no ofrece una alternativa real al texto actual
    rationale: Si el texto principal dice «vestidos de blanco», una nota que repite «O “vestidos de blanco”» no aporta información útil. Debe ajustarse para reflejar el texto revisado y la literalidad griega.
  revised_spanish_text: y ve dos ángeles de blanco[a], sentados, uno junto a la cabeza y uno junto a los pies[b], donde había estado tendido el cuerpo de Jesús.
  revised_footnotes:
