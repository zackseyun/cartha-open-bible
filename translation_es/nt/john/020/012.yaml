translation:
  language: es
  text: y ve dos ángeles de blanco[a], sentados, uno junto a la cabeza y uno junto a los pies[b], donde había estado tendido el cuerpo de Jesús.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vestidos de blanco» o «con vestiduras blancas». El griego es literalmente «en blanco».
    reason: lexical_alternative
  - marker: b
    text: O «donde yacía el cuerpo de Jesús». El imperfecto griego puede traducirse de manera más simple, pero «había estado tendido» aclara el estado anterior en el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: θεωρεῖ
  english_pob_choice: she sees
  chosen_spanish: ve
  alternatives_spanish:
  - observa
  - nota
  - contempla
  lexicon: BDAG
  rationale: El verbo en español debe ser natural y directo en una escena narrativa. «Ve» conserva el valor básico de percepción visual sin añadir énfasis innecesario. Como el sujeto se deduce del contexto, el español puede omitir el pronombre explícito.
- source_word: ἀγγέλους
  english_pob_choice: angels
  chosen_spanish: ángeles
  alternatives_spanish:
  - mensajeros
  lexicon: BDAG
  rationale: En el contexto de la tumba vacía, el referente son seres celestiales; «ángeles» es la opción precisa y clara en español.
- source_word: ἐν λευκοῖς
  english_pob_choice: in white
  chosen_spanish: vestidos de blanco
  alternatives_spanish:
  - en blanco
  - con vestiduras blancas
  lexicon: BDAG
  rationale: El griego es conciso, literalmente «en blancos / en blanco». En español, «vestidos de blanco» expresa con naturalidad la misma imagen implícita de vestiduras blancas sin volverla torpe o ambigua. Mantiene la idea de estado/vestimenta sin sobreespecificar.
- source_word: καθεζομένους
  english_pob_choice: sitting
  chosen_spanish: sentados
  alternatives_spanish:
  - sentados allí
  - sentándose
  lexicon: BDAG
  rationale: El participio describe la postura de los ángeles. «Sentados» comunica de forma simple y fiel esa postura en español. No se añade un equivalente de «there» porque el texto griego no lo explicita en esta forma.
- source_word: ἕνα πρὸς τῇ κεφαλῇ καὶ ἕνα πρὸς τοῖς ποσίν
  english_pob_choice: one at the head and one at the feet
  chosen_spanish: uno junto a la cabeza y uno junto a los pies
  alternatives_spanish:
  - uno al lado de la cabeza y uno al lado de los pies
  - uno cerca de la cabeza y uno cerca de los pies
  lexicon: BDAG
  rationale: La preposición πρός con dativo indica proximidad. «Junto a» conserva esa cercanía de manera idiomática en español. «Cabeza» y «pies» reflejan los dos extremos del lugar donde yacía el cuerpo.
- source_word: ὅπου
  english_pob_choice: where
  chosen_spanish: donde
  alternatives_spanish:
  - en donde
  - en el lugar donde
  lexicon: BDAG
  rationale: «Donde» reproduce de manera simple la relación locativa del relativo griego sin expandirla innecesariamente.
- source_word: ἔκειτο
  english_pob_choice: had been lying
  chosen_spanish: había estado
  alternatives_spanish:
  - yacía
  - había yacido
  - había estado yaciendo
  lexicon: BDAG
  rationale: El imperfecto de κεῖμαι expresa la condición previa del cuerpo en ese lugar. En español, «había estado» se completa naturalmente con «el cuerpo de Jesús» como «había estado [allí]», pero para no sobrecargar el texto se deja implícito el complemento espacial y se combina con «donde» al inicio de la cláusula. «Yacía» es posible, pero no marca tan claramente el estado previo frente al momento de observación.
- source_word: σῶμα
  english_pob_choice: body
  chosen_spanish: cuerpo
  alternatives_spanish:
  - cadáver
  lexicon: BDAG
  rationale: «Cuerpo» es el equivalente reverente y estándar para σῶμα en este contexto. «Cadáver» sería demasiado duro y no está exigido por el griego.
- source_word: τοῦ Ἰησοῦ
  english_pob_choice: of Jesus
  chosen_spanish: de Jesús
  alternatives_spanish:
  - de Jesús
  lexicon: BDAG
  rationale: Se mantiene el nombre propio «Jesús» según la convención del proyecto para Ἰησοῦς. La relación posesiva/genitiva se expresa con la preposición española natural «de».
theological_decisions:
- issue: Identidad de los ἀγγέλους en la tumba vacía
  english_pob_reading: heavenly angels
  chosen_spanish_reading: ángeles celestiales
  alternative_spanish_readings:
  - mensajeros
  - seres celestiales
  rationale: Aunque ἄγγελος puede significar «mensajero», el contexto inmediato de la tumba vacía y la vestidura blanca favorecen claramente la lectura de seres celestiales. En español se conserva la traducción usual y precisa «ángeles», sin rebajarla a «mensajeros».
  doctrine_reference: Principio de primacía del idioma original y contexto inmediato sobre tradición receptiva
- issue: Valor temporal de ἔκειτο
  english_pob_reading: where the body of Jesus had been lying
  chosen_spanish_reading: donde había estado el cuerpo de Jesús
  alternative_spanish_readings:
  - donde yacía el cuerpo de Jesús
  - donde había yacido el cuerpo de Jesús
  rationale: El imperfecto de κεῖμαι señala una situación previa. La formulación española elegida preserva esa anterioridad sin introducir teología adicional. No se fuerza una lectura doctrinal; solo se explicita el estado previo que el relato presupone.
  doctrine_reference: Equivalencia óptima y coherencia narrativa
translation_notes:
  revision_awareness: La revisión inglesa posterior eliminó «there» por no estar expresado explícitamente en el griego; por eso el español no introduce un equivalente de ubicación adicional en la primera cláusula. La redacción final mantiene la imagen del griego y la clarifica solo donde la gramática española lo requiere.
  spanish_consistency_notes:
  - Se usa «Jesús» para Ἰησοῦς, conforme al estándar del proyecto.
  - Se traduce ἄγγελοι como «ángeles» por el contexto de la tumba vacía.
  - Se evita «SEÑOR» porque no aparece el tetragrámaton ni una cita directa de κύριος en este versículo.
  - «Cuerpo» se mantiene para σῶμα, sin pasar a «cadáver» por la carga más dura de este último en español.
