  text: τρέχει οὖν καὶ ἔρχεται πρὸς Σίμωνα Πέτρον καὶ πρὸς τὸν ἄλλον μαθητὴν ὃν ἐφίλει ὁ Ἰησοῦς, καὶ λέγει αὐτοῖς· Ἦραν τὸν κύριον ἐκ τοῦ μνημείου, καὶ οὐκ οἴδαμεν ποῦ ἔθηκαν αὐτόν.
base_translation:
  language: en
  yaml_path: translation/nt/john/020/002.yaml
  text: So she runs and comes to Simon Peter and to the other disciple[a], whom Jesus loved, and says to them, “They have taken the Lord out of the tomb[b], and we do not know where they have laid him.”
  footnotes:
  - marker: a
    text: 'Greek: ''the other disciple, whom Jesus loved.'' The verb here is from φιλέω, which can emphasize affection; alternatively, ''whom Jesus was fond of.'''
    reason: lexical_alternative
  - marker: b
    text: Mary says, 'we do not know,' preserving the Greek first person plural. Some readers understand this as including other women with her; the text itself does not explain the plural here.
    reason: alternative_reading
