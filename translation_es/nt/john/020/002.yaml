translation:
  language: es
  text: 'Entonces corre y va a Simón Pedro y al otro discípulo, a quien Jesús amaba[a], y les dice: «Han sacado al Señor del sepulcro, y no sabemos[b] dónde lo han puesto».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice «a quien Jesús amaba». El verbo aquí es de φιλέω, que puede enfatizar afecto; alternativamente, «a quien Jesús quería» o «por quien Jesús sentía cariño».
    reason: lexical_alternative
  - marker: b
    text: María dice «no sabemos», preservando el plural de primera persona del griego. Algunos entienden que incluye a otras mujeres con ella; el texto mismo no explica ese plural aquí.
    reason: alternative_reading
lexical_decisions:
- source_word: τρέχει
  english_pob_choice: runs
  chosen_spanish: corre
  alternatives_spanish:
  - va corriendo
  - sale corriendo
  lexicon: BDAG
  rationale: Se conserva el presente histórico del griego con un verbo natural en español. «Corre» es breve, vivo y fiel al movimiento narrativo.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Entonces
  alternatives_spanish:
  - Así que
  - Por tanto
  lexicon: BDAG
  rationale: Marca consecuencia narrativa de modo natural en español sin volverlo excesivamente formal.
- source_word: ἔρχεται
  english_pob_choice: comes
  chosen_spanish: va
  alternatives_spanish:
  - llega
  - viene
  lexicon: BDAG
  rationale: En combinación con πρὸς, «va a» expresa el movimiento hacia una persona con claridad idiomática.
- source_word: πρὸς Σίμωνα Πέτρον
  english_pob_choice: to Simon Peter
  chosen_spanish: a Simón Pedro
  alternatives_spanish:
  - hacia Simón Pedro
  lexicon: BDAG
  rationale: πρός con acusativo indica movimiento hacia alguien; en español basta «a» para mantener la dirección sin calco pesado.
- source_word: τὸν ἄλλον μαθητήν
  english_pob_choice: the other disciple
  chosen_spanish: al otro discípulo
  alternatives_spanish:
  - al otro seguidor
  lexicon: BDAG
  rationale: μαθητής se rinde de forma consistente como «discípulo»; «otro» conserva la oposición con Pedro.
- source_word: ὃν ἐφίλει ὁ Ἰησοῦς
  english_pob_choice: whom Jesus loved
  chosen_spanish: a quien Jesús amaba
  alternatives_spanish:
  - a quien Jesús quería
  - a quien Jesús tenía cariño
  lexicon: BDAG
  rationale: Se mantiene el valor afectivo de φιλέω sin debilitarlo. «Amaba» es natural y recoge bien la referencia establecida en Juan.
- source_word: λέγει αὐτοῖς
  english_pob_choice: says to them
  chosen_spanish: les dice
  alternatives_spanish:
  - les dice a ellos
  - les habló
  lexicon: BDAG
  rationale: Se conserva el presente histórico y la inmediatez del relato.
- source_word: Ἦραν
  english_pob_choice: They have taken
  chosen_spanish: Han sacado
  alternatives_spanish:
  - Han tomado
  - Lo han quitado
  lexicon: BDAG
  rationale: Ἦραν puede expresar quitar/retirar. En contexto funerario, «han sacado» comunica con naturalidad que el cuerpo ya no está allí y evita un calco rígido.
- source_word: τὸν κύριον
  english_pob_choice: the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - al maestro
  lexicon: BDAG
  rationale: Se conserva el título cristológico tradicional «Señor», equivalente funcional de κύριος en este contexto.
- source_word: ἐκ τοῦ μνημείου
  english_pob_choice: out of the tomb
  chosen_spanish: del sepulcro
  alternatives_spanish:
  - de la tumba
  - del monumento funerario
  lexicon: BDAG
  rationale: μνημεῖον aquí designa una tumba sepulcral. «Sepulcro» mantiene el registro reverente y es idiomático en español bíblico.
- source_word: οὐκ οἴδαμεν
  english_pob_choice: we do not know
  chosen_spanish: no sabemos
  alternatives_spanish:
  - no sé
  lexicon: BDAG
  rationale: Se preserva el plural explícito del griego sin singularizar la voz del hablante.
- source_word: ποῦ ἔθηκαν αὐτόν
  english_pob_choice: where they have laid him
  chosen_spanish: dónde lo han puesto
  alternatives_spanish:
  - dónde lo colocaron
  - dónde lo echaron
  lexicon: BDAG
  rationale: τίθημι aquí significa poner/colocar. «Lo han puesto» es natural en español; «han puesto» mantiene el perfecto y la incertidumbre presente sobre el paradero del cuerpo.
theological_decisions:
- issue: Rendering of κύριος for Jesus
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el maestro
  rationale: En la voz de los discípulos, κύριος funciona como título cristológico reverencial. «Señor» conserva el peso confesional sin desdibujar la referencia a Jesús.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: First-person plural οἴδαμεν
  english_pob_reading: we do not know
  chosen_spanish_reading: no sabemos
  alternative_spanish_readings:
  - no sé
  rationale: Se mantiene el plural del texto griego para no resolver la tensión textual sobre quiénes integran el «nosotros».
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El borrador sigue de cerca el consenso auditado del POB inglés para Juan 20:2, incluyendo el presente histórico, el título cristológico para κύριος, el valor plural de οἴδαμεν y la incertidumbre del lugar del cuerpo. Se ajusta la imagen verbal final a un español natural («han puesto») sin perder el sentido de colocación funeraria; no se introdujeron revisiones adicionales más allá de esa adaptación estilística.
  spanish_consistency_notes:
  - Se mantiene el estilo narrativo presente para las formas históricas del griego («corre», «va», «dice»).
  - «Señor» se usa como título para Jesús en línea con el tratamiento cristológico del proyecto.
  - «Sepulcro» se prefiere aquí por su registro bíblico y su correspondencia contextual con μνημεῖον.
  - La frase final conserva el plural «no sabemos» para respetar la forma textual del griego.
