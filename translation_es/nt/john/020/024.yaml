translation:
  language: es
  text: Ahora Tomás, uno de los Doce, llamado Dídimo[a], no estaba con ellos cuando Jesús vino.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «Dídimo». Su sentido es «gemelo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Pero
  - Y
  lexicon: BDAG
  rationale: δέ introduce un cambio suave de escena; «Ahora» funciona de modo natural en español y conserva el flujo narrativo sin añadir contraste fuerte.
- source_word: εἷς ἐκ τῶν δώδεκα
  english_pob_choice: one of the Twelve
  chosen_spanish: uno de los Doce
  alternatives_spanish:
  - uno de los doce discípulos
  lexicon: BDAG
  rationale: La expresión identifica a Tomás como miembro del grupo apostólico reconocido; «los Doce» conserva ese valor técnico mejor que una glosa más amplia.
- source_word: ὁ λεγόμενος Δίδυμος
  english_pob_choice: the one called Didymus
  chosen_spanish: el que es llamado Dídimo
  alternatives_spanish:
  - el llamado Dídimo
  - el que era llamado Dídimo
  lexicon: BDAG
  rationale: Se conserva el nombre/epíteto griego como forma propia en español y se refleja la construcción participial con una fórmula natural. No se traduce aquí como «gemelo» porque el texto base y la auditoría inglesa preservan la forma tradicional del nombre.
- source_word: οὐκ ἦν μετ’ αὐτῶν
  english_pob_choice: was not with them
  chosen_spanish: no estaba con ellos
  alternatives_spanish:
  - no se hallaba con ellos
  - no estaba entre ellos
  lexicon: BDAG
  rationale: La imperfectividad se expresa bien con «estaba»; «con ellos» reproduce de manera sencilla y fiel la relación de compañía/ausencia del grupo.
- source_word: ὅτε ἦλθεν Ἰησοῦς
  english_pob_choice: when Jesus came
  chosen_spanish: cuando Jesús vino
  alternatives_spanish:
  - cuando Jesús llegó
  - cuando vino Jesús
  lexicon: BDAG
  rationale: «Vino» sigue de cerca el valor de ἦλθεν y evita una expansión interpretativa. «Llegó» sería posible, pero «vino» mantiene la formulación más directa.
theological_decisions:
- issue: Tratamiento de Δίδυμος como nombre/epíteto
  english_pob_reading: Preserve the Greek form Didymus rather than translate it as Twin.
  chosen_spanish_reading: Preservar «Dídimo» como forma propia, sin traducirla en el texto principal.
  alternative_spanish_readings:
  - Gemelo
  - Gemelo / el Gemelo
  rationale: No hay carga doctrinal en el término; la auditoría inglesa decidió conservar la forma griega tradicional. En español, «Dídimo» es la equivalencia habitual y readable para el nombre, mientras que «Gemelo» explicaría el significado pero perdería la forma tradicional del epíteto.
  doctrine_reference: Principio de transparencia textual y conservación de nombres/epítetos tradicionales cuando funcionan como designación propia.
translation_notes:
  revision_awareness: La auditoría inglesa pasó de traducir Δίδυμος como «Twin» a conservar «Didymus» para mantener el registro formal y el nombre propio tradicional. Este borrador sigue esa revisión en español con «Dídimo», preservando el epíteto como forma nominativa en lugar de glosarlo en el texto principal.
  spanish_consistency_notes:
  - Se mantiene «Jesús» sin variación, conforme al patrón del proyecto.
  - «los Doce» conserva la designación grupal técnica con mayúscula inicial implícita por el nombre colectivo.
  - La nota al pie explica el significado de Dídimo sin introducirlo en el flujo principal, para no perder la forma tradicional del nombre.
