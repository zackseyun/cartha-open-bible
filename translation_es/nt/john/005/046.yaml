translation:
  language: es
  text: Porque si le creyeran a Moisés, me creerían[a] a mí, porque él[b] escribió acerca de mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «confiarían en mí». El mismo verbo griego se usa en ambas cláusulas.
    reason: lexical_alternative
  - marker: b
    text: O «aquel escribió acerca de mí», reflejando el demostrativo enfático ἐκεῖνος.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰ γὰρ
  english_pob_choice: For if
  chosen_spanish: Porque si
  alternatives_spanish:
  - Si en verdad
  - Pues si
  lexicon: BDAG
  rationale: Conservo la conexión argumentativa de γάρ con «porque», y εἰ con «si». En español, «porque si» suena natural y mantiene la relación lógica sin añadir intensidad no explicitada por el griego.
- source_word: ἐπιστεύετε
  english_pob_choice: you believed
  chosen_spanish: creyeran
  alternatives_spanish:
  - creyerais
  - habían creído
  - confiaran
  lexicon: BDAG
  rationale: El imperfecto indicativo en la prótasis se refleja mejor en una condición irreal en español con subjuntivo imperfecto («creyeran»). Se conserva el mismo verbo raíz en ambas cláusulas, como en el griego y en la auditoría inglesa.
- source_word: Μωϋσεῖ
  english_pob_choice: Moses
  chosen_spanish: a Moisés
  alternatives_spanish:
  - Moisés
  - Moisés mismo
  lexicon: BDAG
  rationale: En español, el complemento con creencia personal se expresa normalmente con «creer a alguien». Esto preserva la dativealidad del griego sin forzar una construcción menos natural.
- source_word: ἐπιστεύετε ἂν ἐμοί
  english_pob_choice: you would believe me
  chosen_spanish: me creerían a mí
  alternatives_spanish:
  - creerían en mí
  - me confiarían
  lexicon: BDAG
  rationale: La apódosis contrafactual se vierte con condicional («creerían»). «A mí» refleja el dativo ἐμοί y el pronombre explícito «me» mantiene el paralelismo con la primera cláusula; no se introduce «en» porque no está en el griego.
- source_word: περὶ γὰρ ἐμοῦ
  english_pob_choice: for ... about me
  chosen_spanish: porque de mí
  alternatives_spanish:
  - porque acerca de mí
  - pues sobre mí
  lexicon: BDAG
  rationale: Περί con genitivo puede expresar «acerca de/con respecto a». En español, «de mí escribió» es idiomático y fiel al sentido referencial; la decisión evita endurecer la frase con una calca poco natural como «acerca de mí» en el cierre.
- source_word: ἐκεῖνος
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - ese
  - aquel
  lexicon: BDAG
  rationale: El demostrativo enfático se resuelve naturalmente con «él» en español, porque el antecedente inmediato es Moisés. Se conserva la referencia personal sin sobrecargar el texto con un demostrativo marcado que podría sonar artificial.
- source_word: ἔγραψεν
  english_pob_choice: wrote
  chosen_spanish: escribió
  alternatives_spanish:
  - escribió
  - ha escrito
  lexicon: BDAG
  rationale: El aoristo se expresa con pretérito simple. «Escribió» es el equivalente normal en español bíblico moderno y conserva la acción completa del verbo.
theological_decisions:
- issue: Testimonio de Moisés respecto de Jesús
  english_pob_reading: for he wrote about me
  chosen_spanish_reading: porque de mí escribió él
  alternative_spanish_readings:
  - porque escribió acerca de mí
  - pues escribió de mí
  rationale: 'La traducción preserva la afirmación de que Moisés escribió con referencia a Jesús sin especificar un pasaje ni resolver hermenéuticamente el alcance de ese testimonio. Se mantiene la tensión teológica documentada por la POB: el versículo afirma la relación, pero la traducción no la expande.'
  doctrine_reference: Preservar la tensión teológica sin resolverla en la traducción.
translation_notes:
  revision_awareness: 'Concordante con el pasaje fuente y con la auditoría inglesa: se mantuvo el paralelismo verbal πιστεύω/creer, el valor contrafactual de ἄν y la referencia de περί con genitivo. No se detectaron revisiones aplicadas en el registro fuente; por eso la redacción española sigue la lectura aprobada sin introducir expansión interpretativa.'
  spanish_consistency_notes:
  - Se usa «a Moisés» para la creencia dirigida a una persona, pero «me creerían a mí» para mantener el paralelismo y la transparencia del dativo ἐμοί.
  - Se optó por «de mí» en la cláusula final por naturalidad idiomática; el sentido de «acerca de/con respecto a mí» queda preservado por el contexto y por la nota alternativa.
  - Se mantiene el pronombre explícito «él» al final para reflejar el sujeto enfático ἐκεῖνος, aunque en español podría omitirse; aquí se conserva para reproducir el énfasis del griego.
