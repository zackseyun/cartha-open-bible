translation:
  language: es
  text: para que todos honren al Hijo así como honran al Padre. El que no honra al Hijo tampoco honra al Padre, que lo envió.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: ἵνα expresa propósito/resultadо. En español, «para que» comunica de forma natural esa fuerza final sin endurecer el estilo.
- source_word: πάντες
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todos los hombres
  - todos las personas
  lexicon: BDAG
  rationale: El plural nominativo generaliza sin especificar un grupo distinto; «todos» conserva esa amplitud de manera clara y breve.
- source_word: τιμῶσι / τιμῶν / τιμᾷ
  english_pob_choice: honor
  chosen_spanish: honren / honra
  alternatives_spanish:
  - den honor a
  - estimen
  lexicon: BDAG
  rationale: τιμάω expresa dar honor o reconocimiento debido. «Honrar» es la equivalencia directa y permite mantener la repetición verbal del versículo.
- source_word: τὸν υἱὸν
  english_pob_choice: the Son
  chosen_spanish: al Hijo
  alternatives_spanish:
  - al hijo
  lexicon: BDAG
  rationale: En Juan, el sintagma es un título cristológico, no una referencia genérica. «Hijo» con mayúscula es una convención editorial española útil para señalar su valor titular.
- source_word: καθὼς
  english_pob_choice: just as
  chosen_spanish: así como
  alternatives_spanish:
  - tal como
  - del mismo modo que
  lexicon: BDAG
  rationale: καθώς marca comparación fuerte. «Así como» preserva esa correspondencia sin suavizarla.
- source_word: τὸν πατέρα
  english_pob_choice: the Father
  chosen_spanish: al Padre
  alternatives_spanish:
  - al padre
  lexicon: BDAG
  rationale: Aquí es un título divino relacional en contexto joánico. La mayúscula ayuda a identificar la referencia sin añadir contenido ajeno al texto.
- source_word: ὁ μὴ τιμῶν
  english_pob_choice: the one who does not honor
  chosen_spanish: El que no honra
  alternatives_spanish:
  - Quien no honra
  - La persona que no honra
  lexicon: BDAG
  rationale: El participio articular funciona como un sustantivo genérico. «El que no honra» mantiene el carácter proverbial y es idiomático en español.
- source_word: τὸν πέμψαντα αὐτόν
  english_pob_choice: who sent him
  chosen_spanish: que lo envió
  alternatives_spanish:
  - que lo mandó
  - el que lo envió
  lexicon: BDAG
  rationale: πέμπω significa enviar; «envió» es la equivalencia más natural y fiel. El relativo mantiene la identificación del Padre como el que envió al Hijo.
theological_decisions:
- issue: Fuerza de la comparación entre honrar al Hijo y honrar al Padre
  english_pob_reading: Rendered καθὼς as 'just as,' preserving the text's strong equivalence of honor without weakening it to mere similarity.
  chosen_spanish_reading: «así como» mantiene la equivalencia fuerte entre el honor debido al Hijo y el debido al Padre.
  alternative_spanish_readings:
  - «como»
  - «del mismo modo que»
  rationale: La cláusula no expresa una simple semejanza tenue, sino una correspondencia normativa. «Así como» preserva esa fuerza comparativa sin introducir formulaciones doctrinales externas al versículo.
  doctrine_reference: Juan 5:23; afirmación cristológica de honor compartido dentro del discurso joánico
- issue: Identidad del Hijo y del Padre como títulos en contexto
  english_pob_reading: Capitalized both as divine/personal titles in context.
  chosen_spanish_reading: 'Se reflejan como títulos personales/divinos con mayúscula inicial: Hijo, Padre.'
  alternative_spanish_readings:
  - 'minúsculas: hijo, padre'
  rationale: Aunque el griego no marca mayúsculas, el contexto joánico identifica claramente a Jesús y a Dios Padre. La mayúscula editorial evita ambigüedad y sigue una convención reverente en español.
  doctrine_reference: Juan 5:19-23; lectura cristológica del discurso
translation_notes:
  revision_awareness: Se corrigió el problema de validación eliminando todo marcador de nota, de modo que no quede ninguna nota sin anclaje en el texto. El contenido sigue alineado con el texto griego y con la auditoría inglesa.
  spanish_consistency_notes:
  - Se mantuvo «honrar» de forma uniforme para τιμάω en toda la sección.
  - Se usó «Hijo» y «Padre» con mayúscula como decisión editorial coherente con el contexto joánico.
  - Se evitó «Señor» para κύριος porque el pasaje no lo usa directamente; no aplica aquí.
  - Se conservó la estructura sintáctica de propósito y comparación sin añadir glosas interpretativas.
