translation:
  language: es
  text: 'Después de estas cosas[a], Jesús lo halló en el templo y le dijo: «Mira, has quedado sano[b]. No peques más, para que no te suceda algo peor[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de forma más natural en español: «Después de esto».'
    reason: lexical_alternative
  - marker: b
    text: 'El griego dice literalmente: «has llegado a estar sano», destacando el estado resultante de lo ocurrido.'
    reason: lexical_alternative
  - marker: c
    text: La advertencia no dice expresamente si la enfermedad anterior fue causada por un pecado específico, ni si «algo peor» se refiere al sufrimiento temporal, al juicio final, o a ambos.
    reason: alternative_reading
lexical_decisions:
- source_word: μετὰ ταῦτα
  english_pob_choice: After these things
  chosen_spanish: Después de esto
  alternatives_spanish:
  - Después de estas cosas
  - Más tarde
  lexicon: BDAG
  rationale: Conserva la secuencia narrativa joánica y el plural demonstrativo del griego sin sonar forzado en español. «Después de esto» es natural y suficientemente cercano al valor del original.
- source_word: εὑρίσκει
  english_pob_choice: found
  chosen_spanish: lo halló
  alternatives_spanish:
  - lo encontró
  lexicon: BDAG
  rationale: El aoristo histórico se vierte con pretérito simple en español. «Halló» mantiene un registro bíblico claro y equivalente al inglés POB «found».
- source_word: ἐν τῷ ἱερῷ
  english_pob_choice: in the temple
  chosen_spanish: en el templo
  alternatives_spanish:
  - en los atrios del templo
  - en el recinto del templo
  lexicon: BDAG
  rationale: ἱερόν se refiere al complejo del templo, no al santuario interior. «Templo» es la forma breve y fiel; las otras opciones explicitan el complejo pero añaden interpretación.
- source_word: Ἴδε
  english_pob_choice: See
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - Mira, pues
  - Ve
  lexicon: BDAG
  rationale: En español «Mira» reproduce el tono llamativo e imperativo de atención de Ἴδε sin arcaísmo. «Ve» sería menos idiomático aquí.
- source_word: ὑγιὴς γέγονας
  english_pob_choice: you have become well
  chosen_spanish: has quedado sano
  alternatives_spanish:
  - has llegado a estar sano
  - has quedado bien
  - estás sano
  lexicon: BDAG
  rationale: El perfecto γέγονας expresa un estado resultante de un cambio consumado. «Has quedado sano» conserva la idea de estado resultante mejor que un simple «estás sano», y deja ver la transición resaltada por el griego y por la nota inglesa.
- source_word: μηκέτι ἁμάρτανε
  english_pob_choice: Sin no more
  chosen_spanish: No peques más
  alternatives_spanish:
  - No sigas pecando
  - Deja de pecar
  lexicon: BDAG
  rationale: El presente imperativo con μηκέτι puede expresar cese de una acción en curso o habitual. «No peques más» es una fórmula española tradicional, clara y fiel; «No sigas pecando» explicita más el aspecto progresivo.
- source_word: ἵνα μὴ χεῖρόν σοί τι γένηται
  english_pob_choice: so that something worse may not happen to you
  chosen_spanish: para que no te suceda algo peor
  alternatives_spanish:
  - para que no te ocurra algo peor
  - a fin de que no te acontezca algo peor
  lexicon: BDAG
  rationale: ἵνα μὴ expresa finalidad o resultado previsto. «Suceda algo peor» comunica de modo natural el valor de γένηται y preserva el indefinido τι con «algo». «Peor» reproduce el comparativo χεῖρόν.
theological_decisions:
- issue: Relación entre pecado y sufrimiento en la advertencia de Jesús
  english_pob_reading: Render the warning straightforwardly without specifying that the man's earlier illness was directly caused by a particular sin, while preserving that Jesus warns of a worse outcome connected to future sin.
  chosen_spanish_reading: Traducir la advertencia de manera directa, sin afirmar que la enfermedad anterior fue causada por un pecado específico ni definir qué es exactamente «algo peor».
  alternative_spanish_readings:
  - La enfermedad anterior fue castigo directo de un pecado concreto
  - La advertencia se refiere solo a consecuencias temporales
  - La advertencia se refiere específicamente al juicio final
  rationale: El texto griego ordena no pecar más y advierte de un resultado peor, pero no explicita la relación causal exacta entre la enfermedad previa, el pecado futuro y la naturaleza de lo peor. La traducción debe conservar esa tensión teológica sin resolverla por encima del texto.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios y que el acuerdo con el contexto de auditoría era alto, con solo observaciones menores. Esta propuesta mantiene esa orientación y preserva las decisiones léxicas y la tensión teológica documentadas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como terminología general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa pretérito simple narrativo para el griego histórico y un registro bíblico moderno pero digno.
  - «No peques más» conserva la fuerza del imperativo y evita suavizar el mandato en una paráfrasis más débil.
  - La frase «algo peor» mantiene la indefinición del griego τι y no concreta innecesariamente el tipo de consecuencia.
