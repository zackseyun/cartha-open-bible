base_translation:
  language: en
  yaml_path: translation/nt/john/005/014.yaml
  text: After these things Jesus found him in the temple and said to him[a], “See, you have become well. Sin no more[c][b], so that something worse may not happen to you.”
  footnotes:
  - marker: a
    text: Or, more literally, “After these things.”
    reason: lexical_alternative
  - marker: b
    text: Greek “you have become well,” emphasizing the man's restored condition as the result of what has happened.
    reason: lexical_alternative
  - marker: c
    text: The warning does not explicitly state whether the earlier illness was caused by a specific sin, nor whether the “worse” outcome is temporal suffering, final judgment, or both.
    reason: alternative_reading
