translation:
  language: es
  text: El hombre se fue y les informó a los judíos[a] que Jesús era el que lo había puesto bien.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a los líderes judíos» o «a los judeanos», según cómo se entienda en contexto el uso de «los judíos» en Juan.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀπῆλθεν
  english_pob_choice: went away
  chosen_spanish: se fue
  alternatives_spanish:
  - partió
  - se marchó
  lexicon: BDAG
  rationale: El aoristo de ἀπέρχομαι expresa salida del lugar. «Se fue» es natural en español moderno y conserva el movimiento sin volverlo demasiado formal o literario.
- source_word: ὁ ἄνθρωπος
  english_pob_choice: The man
  chosen_spanish: El hombre
  alternatives_spanish:
  - La persona
  - El individuo
  lexicon: BDAG
  rationale: El sustantivo singular masculino se refiere al hombre sanado en el contexto narrativo. «El hombre» reproduce con precisión el referente y mantiene la concreción del original.
- source_word: ἀνήγγειλεν
  english_pob_choice: reported
  chosen_spanish: les informó
  alternatives_spanish:
  - les contó
  - les reportó
  - les anunció
  lexicon: BDAG
  rationale: ἀναγγέλλω puede significar informar, anunciar o dar noticia. «Les informó» comunica bien el acto de transmitir la noticia sin sugerir una proclamación más pública de la que exige el contexto.
- source_word: τοῖς Ἰουδαίοις
  english_pob_choice: to the Jews
  chosen_spanish: a los judíos
  alternatives_spanish:
  - a los líderes judíos
  - a los judeanos
  lexicon: BDAG
  rationale: El griego dice literalmente «a los judíos». En Juan, el término puede adquirir matiz contextual, pero aquí la forma léxica se conserva en el texto principal; se deja constancia de las alternativas interpretativas en nota.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - es decir, que
  lexicon: BDAG
  rationale: Conjunción declarativa estándar que introduce el contenido del informe.
- source_word: Ἰησοῦς
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  lexicon: BDAG
  rationale: Nombre propio transliterado de manera estándar al español.
- source_word: ἐστιν
  english_pob_choice: was
  chosen_spanish: era
  alternatives_spanish:
  - es
  lexicon: BDAG
  rationale: Aunque el griego está en presente, en discurso indirecto tras un verbo de reporte en pasado el español suele retrotraer el tiempo verbal. «Era» mantiene una redacción natural sin alterar el sentido.
- source_word: ὁ ποιήσας
  english_pob_choice: the one who had made
  chosen_spanish: el que lo había sanado
  alternatives_spanish:
  - el que lo hizo sano
  - el que lo había hecho bien
  lexicon: BDAG
  rationale: El participio articular identifica a Jesús como el agente de la acción previa. En este contexto de curación, «había sanado» expresa con claridad el resultado terapéutico implícito en ποιήσας... ὑγιῆ, sin perder el vínculo con la acción anterior.
- source_word: αὐτὸν ὑγιῆ
  english_pob_choice: him well
  chosen_spanish: lo había sanado
  alternatives_spanish:
  - lo había hecho estar bien
  - lo había hecho sano
  lexicon: BDAG
  rationale: ὑγιής denota salud, integridad o estar sano. En español, «sanar» es la forma más natural y exacta en este contexto de curación; evita la posible ambigüedad de «bien» y comunica el resultado con claridad.
theological_decisions:
- issue: Sentido de τοῖς Ἰουδαίοις en Juan
  english_pob_reading: Retain 'the Jews' in the main text and note the contextual possibility of 'the Jewish leaders' or 'the Judeans' in a footnote.
  chosen_spanish_reading: Conservar «a los judíos» en el texto principal y notar la posibilidad contextual de «a los líderes judíos» o «a los judeanos».
  alternative_spanish_readings:
  - a los líderes judíos
  - a los judeanos
  rationale: La traducción sigue la forma explícita del griego sin resolver de antemano una discusión interpretativa propia del Evangelio de Juan. La nota preserva la tensión semántica y ofrece las alternativas que el contexto puede sugerir.
  doctrine_reference: Translation philosophy items 1 and 3
translation_notes:
  revision_awareness: El pasaje coincide con el texto griego SBLGNT y con la revisión inglesa más reciente; no se registran cambios posteriores ni variantes textuales relevantes en el paquete auditado.
  spanish_consistency_notes:
  - Se mantuvo «Jesús» como nombre propio estándar y «judíos» para reflejar el griego Ἰουδαίοις en el texto principal.
  - Se optó por «sanado» para hacer explícito el resultado curativo implícito en ὑγιῆ, manteniendo la relación semántica con el original.
  - La nota al pie preserva la ambigüedad contextual del término «judíos» sin introducirla en el cuerpo principal.
