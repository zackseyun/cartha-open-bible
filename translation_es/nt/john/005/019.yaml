revisions:
- from: 'Entonces Jesús respondió y les decía: «Amén, amén les digo: el Hijo no puede hacer nada de sí mismo, sino solamente lo que ve que el Padre hace[a]; porque todo lo que aquel hace[b], también eso hace el Hijo de igual manera».'
  to: 'Entonces Jesús respondió y les dijo: «Amén, amén les digo: el Hijo no puede hacer nada por sí mismo, sino lo que ve hacer al Padre[a]; porque todo lo que aquel hace[b], eso también hace el Hijo de igual manera».'
  rationale: 'Se ajustó el español para mayor naturalidad y fidelidad funcional: «les dijo» en lugar de «les decía» sigue la revisión auditada del inglés y encaja mejor en el discurso narrativo; «por sí mismo» reemplaza el calco poco idiomático «de sí mismo» mientras preserva la dependencia relacional del Hijo; «sino lo que ve hacer al Padre» expresa la excepción con claridad; y se suavizó el orden final para mantener el paralelismo sin rigidez innecesaria.'
  reviewer_model: gpt-5.4
