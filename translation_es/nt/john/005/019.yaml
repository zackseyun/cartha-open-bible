translation:
  language: es
  text: 'Entonces Jesús respondió y les dijo: «Amén, amén les digo: el Hijo no puede hacer nada por sí mismo, sino lo que ve hacer al Padre[a]; porque todo lo que aquel hace[b], eso también hace el Hijo de igual manera».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más idiomática: «el Hijo no puede hacer nada por su propia cuenta, sino solamente lo que ve hacer al Padre».'
    reason: lexical_alternative
  - marker: b
    text: La afirmación describe la plena unidad de acción y la dependencia del Hijo con respecto al Padre; no debe leerse como una negación de la plena deidad del Hijo.
    reason: theological_note
lexical_decisions:
- source_word: Ἀπεκρίνατο οὖν
  english_pob_choice: So ... answered
  chosen_spanish: Entonces respondió
  alternatives_spanish:
  - Por eso respondió
  - Así que respondió
  lexicon: BDAG
  rationale: οὖν expresa conexión inferencial o discursiva; «Entonces» comunica esa transición de modo natural en español sin forzar una conclusión demasiado fuerte.
- source_word: καὶ ἔλεγεν
  english_pob_choice: and said
  chosen_spanish: y decía
  alternatives_spanish:
  - y dijo
  - y estaba diciendo
  lexicon: BDAG
  rationale: El imperfecto ἔλεγεν sugiere una formulación en curso; «decía» conserva mejor ese matiz que el pretérito simple, aunque la versión inglesa lo simplifique a «said» por fluidez.
- source_word: Ἀμὴν ἀμὴν
  english_pob_choice: Truly, truly
  chosen_spanish: Amén, amén
  alternatives_spanish:
  - En verdad, en verdad
  - Ciertamente, ciertamente
  lexicon: BDAG
  rationale: Se conserva la fórmula solemne duplicada. En español «Amén» es entendible y mantiene la marca semítica del dicho de Jesús mejor que una traducción interpretativa.
- source_word: οὐ δύναται
  english_pob_choice: is not able
  chosen_spanish: no puede
  alternatives_spanish:
  - no es capaz de
  - no tiene poder para
  lexicon: BDAG
  rationale: En español, «no puede» expresa con naturalidad la incapacidad de δύναται sin perder su fuerza de habilidad/inviabilidad funcional.
- source_word: ὁ υἱός
  english_pob_choice: the Son
  chosen_spanish: el Hijo
  alternatives_spanish:
  - el hijo
  lexicon: BDAG
  rationale: En el contexto joánico es un título cristológico específico; por eso se mantiene «Hijo» con mayúscula implícita por el uso titular en el registro bíblico español.
- source_word: ποιεῖν ἀφ’ ἑαυτοῦ οὐδέν
  english_pob_choice: to do anything from himself
  chosen_spanish: hacer nada de sí mismo
  alternatives_spanish:
  - hacer nada por sí mismo
  - hacer nada por su propia cuenta
  lexicon: BDAG
  rationale: «De sí mismo» preserva la relación de origen/independencia del griego ἀφ’ ἑαυτοῦ. Se evita «por su propia cuenta» porque suaviza demasiado la dependencia relacional del texto.
- source_word: ἐὰν μή τι βλέπῃ τὸν πατέρα ποιοῦντα
  english_pob_choice: unless he sees the Father doing it
  chosen_spanish: sino solamente lo que ve que el Padre hace[a]
  alternatives_spanish:
  - sino lo que ve al Padre haciendo
  - excepto lo que ve al Padre hacer
  lexicon: BDAG
  rationale: 'La estructura griega introduce excepción: el Hijo no actúa independientemente, sino en conformidad con lo que ve del Padre. «Lo que ve que el Padre hace» conserva el contenido abierto de τι sin agregar una precisión inexistente.'
- source_word: βλέπῃ
  english_pob_choice: sees
  chosen_spanish: ve
  alternatives_spanish:
  - observa
  - percibe
  lexicon: BDAG
  rationale: «Ve» es la equivalencia más directa y natural; mantiene el valor de percepción/observación sin sobreinterpretarlo.
- source_word: τὸν πατέρα
  english_pob_choice: the Father
  chosen_spanish: el Padre
  alternatives_spanish:
  - su Padre
  lexicon: BDAG
  rationale: El artículo griego presenta el título; «el Padre» preserva esa forma titular sin introducir un posesivo que no está explícito.
- source_word: ἃ γὰρ ἂν ἐκεῖνος ποιῇ
  english_pob_choice: for whatever that one does
  chosen_spanish: porque todo lo que aquel hace[b]
  alternatives_spanish:
  - porque todo lo que él hace
  - pues todo lo que aquel haga
  lexicon: BDAG
  rationale: «Aquel» refleja el contraste de ἐκεῖνος y ayuda a distinguir al Padre del Hijo. «Todo lo que» transmite la generalidad de ἃ ... ἂν ... ποιῇ.
- source_word: ταῦτα καὶ ὁ υἱὸς ὁμοίως ποιεῖ
  english_pob_choice: these things the Son also does likewise
  chosen_spanish: también eso hace el Hijo de igual manera
  alternatives_spanish:
  - también esas cosas hace el Hijo asimismo
  - el Hijo también hace lo mismo
  lexicon: BDAG
  rationale: Se conserva la correspondencia enfática de ταῦτα ... ὁμοίως. «De igual manera» expresa ὁμοίως con dignidad y claridad, sin perder el paralelismo del texto.
theological_decisions:
- issue: La incapacidad del Hijo debe leerse como dependencia funcional, no como negación de su deidad
  english_pob_reading: the Son is not able to do anything from himself
  chosen_spanish_reading: el Hijo no puede hacer nada de sí mismo
  alternative_spanish_readings:
  - el Hijo no puede hacer nada por sí mismo
  - el Hijo no puede obrar por su propia cuenta
  rationale: La traducción mantiene la afirmación de dependencia en la acción del Hijo sin sugerir inferioridad ontológica. El versículo describe unidad de obrar con el Padre, no una negación de la deidad del Hijo.
  doctrine_reference: Credo Niceno (381 d.C.); Definición de Calcedonia (451 d.C.)
- issue: Mantener la distinción entre el Padre y el Hijo en la sintaxis española
  english_pob_reading: whatever that one does, these things the Son also does likewise
  chosen_spanish_reading: todo lo que aquel hace, también eso hace el Hijo de igual manera
  alternative_spanish_readings:
  - todo lo que él hace, eso también lo hace el Hijo
  - lo que aquel hace, eso mismo hace también el Hijo
  rationale: «Aquel» conserva la distancia relacional que el griego marca con ἐκεῖνος. Esto ayuda a que el lector vea tanto la distinción de personas como la perfecta conformidad de obras.
  doctrine_reference: Credo Niceno (381 d.C.)
translation_notes:
  revision_awareness: La versión inglesa revisó «was saying» por «said» para mayor naturalidad narrativa, y ajustó «doing something» a «doing it» para evitar repetición. En español se optó por mantener el imperfecto «decía» para reflejar el valor aspectual del griego, y por una formulación idiomática que conserva la relación Padre-Hijo sin añadir elementos ajenos al texto.
  spanish_consistency_notes:
  - Se mantiene «Hijo» y «Padre» como títulos relacionales del contexto joánico.
  - Se conservó «Amén, amén» para reflejar el énfasis solemne del griego.
  - «De sí mismo» reproduce la relación de dependencia expresada por ἀφ’ ἑαυτοῦ.
  - «Aquel» traduce ἐκεῖνος para conservar el contraste referencial con el Hijo.
