revisions:
- from: Y no tienen su palabra habitando en ustedes[a], porque no creen en el que él envió.
  to: Y no tienen su palabra permaneciendo en ustedes[a], porque no creen al que él envió.
  rationale: Se revisa «habitando» a «permaneciendo» para reflejar mejor μένω en contexto joánico y evitar un matiz de inhabitación más cargado de lo que exige el texto. Se cambia «no creen en el que él envió» a «no creen al que él envió» para representar mejor πιστεύω con dativo y el sentido de no aceptar/creer al enviado. No se requiere adjudicación adicional porque son ajustes léxicos y sintácticos claros, no una disputa doctrinal o textual compleja.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:03:23Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien la estructura básica del griego: negación de tener la palabra de Dios en ellos, participio durativo de μένω, y relación causal introducida por ὅτι. También mantiene la referencia a Jesús como el enviado del Padre. Sin embargo, «no creen en el que él envió» añade explícitamente «en», mientras que el griego tiene πιστεύω con dativo, mejor reflejado aquí en español como «no le creen» o «no creen al que él envió», especialmente en este contexto de no aceptar el testimonio del enviado. Además, «habitando» es posible, pero en español bíblico natural joánico «permaneciendo» o «permanece» refleja mejor μένω y la decisión léxica documentada.'
  spanish_quality_summary: El texto es entendible, pero «su palabra habitando en ustedes» suena algo forzado en español; «su palabra permaneciendo en ustedes» es más fiel al campo semántico de μένω, aunque todavía algo pesado. La mejor solución idiomática y fiel es reestructurar a «no tienen su palabra permaneciendo en ustedes» o más natural aún «no tienen su palabra que permanezca en ustedes». Para mínima intervención y cercanía formal, se propone «no tienen su palabra permaneciendo en ustedes». También conviene ajustar «no creen en el que él envió» a una formulación más natural y precisa.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. «Palabra» para λόγος está bien. No hay términos como Yahvé/Mesías/esclavo implicados. El principal ajuste léxico requerido es μένω -> «permanecer» en vez de «habitar» para alinear mejor con la racionalidad documentada y el uso joánico, y πιστεύω dativo -> «creerle»/«creer al» en vez de «creer en».
  issues:
  - severity: medium
    issue: «habitando en ustedes» para μένοντα
    rationale: Aunque no es imposible, «habitando» desplaza el matiz de μένω hacia residencia/inhabitación. El expediente inglés conserva «abiding» con alternativa «remaining», y la justificación teológica pide no cargar el texto con una lectura doctrinal específica. «Permaneciendo» refleja mejor la continuidad de μένω sin añadir ese matiz.
  - severity: medium
    issue: «no creen en el que él envió» para τούτῳ ... οὐ πιστεύετε
    rationale: El griego usa πιστεύω con dativo, no la construcción española más marcada «creer en». Aquí el sentido inmediato es no creerle/no aceptar al enviado. «No le creen al que él envió» sería redundante, así que «no creen al que él envió» preserva mejor la relación sintáctica y el sentido.
  - severity: low
    issue: Nota al pie invierte la preferencia léxica
    rationale: Si el texto principal se corrige a «permaneciendo», la alternativa puede ser «habitando» o «morando». La nota actual presupone que «habitando» es principal, lo cual no parece la mejor decisión en español para este versículo.
  revised_spanish_text: Y no tienen su palabra permaneciendo en ustedes[a], porque no creen al que él envió.
  revised_footnotes:
  - marker: a
    text: O ‘habitando en ustedes’.
    reason: lexical_alternative
  revision_rationale: Se revisa «habitando» a «permaneciendo» para reflejar mejor μένω en contexto joánico y evitar un matiz de inhabitación más cargado de lo que exige el texto. Se cambia «no creen en el que él envió» a «no creen al que él envió» para representar mejor πιστεύω con dativo y el sentido de no aceptar/creer al enviado. No se requiere adjudicación adicional porque son ajustes léxicos y sintácticos claros, no una disputa doctrinal o textual compleja.
