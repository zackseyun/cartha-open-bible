translation:
  language: es
  text: Y no tienen su palabra permaneciendo en ustedes[a], porque no creen al que él envió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘habitando en ustedes’.
    reason: lexical_alternative
lexical_decisions:
- source_word: λόγον
  english_pob_choice: word
  chosen_spanish: palabra
  alternatives_spanish:
  - mensaje
  lexicon: BDAG
  rationale: λόγος aquí se refiere de manera natural a la palabra revelada de Dios, no a un simple asunto o noticia. «Palabra» conserva el lenguaje joánico y la conexión con el uso amplio de λόγος en el Evangelio; «mensaje» es posible, pero menos transparente para este contexto.
- source_word: ἔχετε
  english_pob_choice: have
  chosen_spanish: tienen
  alternatives_spanish:
  - poseen
  - tienen consigo
  lexicon: BDAG
  rationale: 'El presente negativo expresa una posesión actual: no la tienen. «Tienen» es natural en español y mantiene la fuerza simple del verbo.'
- source_word: ἐν ὑμῖν μένοντα
  english_pob_choice: abiding in you
  chosen_spanish: habitando en ustedes
  alternatives_spanish:
  - permaneciendo en ustedes
  - morando en ustedes
  lexicon: BDAG
  rationale: El participio μένοντα indica continuidad y permanencia. «Habitando» comunica esa permanencia de modo fluido en español y encaja bien con el contexto joánico; «permaneciendo» y «morando» son alternativas válidas, pero «habitando» suena más natural aquí sin perder la idea durativa.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Aquí introduce la razón de la afirmación anterior. «Porque» expresa con claridad la relación causal.
- source_word: ὃν ... ἀπέστειλεν ἐκεῖνος
  english_pob_choice: the one whom he sent
  chosen_spanish: el que él envió
  alternatives_spanish:
  - a quien él envió
  - el enviado por él
  lexicon: BDAG
  rationale: La cláusula relativa apunta a Jesús como el enviado del Padre. «El que él envió» mantiene la referencia personal y la sencillez del griego; «a quien él envió» es una opción más explícita, pero menos fluida en español.
- source_word: ἐκεῖνος
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - aquel
  - ese
  lexicon: BDAG
  rationale: En contexto ἐκεῖνος se refiere al Padre. El español normal usa «él»; «aquel» sería más literal, pero innecesariamente duro aquí.
- source_word: πιστεύετε
  english_pob_choice: believe
  chosen_spanish: creen
  alternatives_spanish:
  - confían
  - creen en
  lexicon: BDAG
  rationale: πιστεύω aquí requiere el verbo «creer» en español. En este contexto, la construcción negativa simple «no creen» preserva bien la fuerza de incredulidad hacia el enviado de Dios.
theological_decisions:
- issue: Relación entre la palabra de Dios que permanece y la incredulidad hacia el enviado
  english_pob_reading: The verse states that their failure to believe Jesus, the one sent by the Father, demonstrates that they do not have the Father's word remaining in them.
  chosen_spanish_reading: El versículo afirma que su falta de fe en Jesús, el enviado por el Padre, muestra que no tienen la palabra del Padre habitando en ellos.
  alternative_spanish_readings:
  - El versículo podría leerse como una referencia solo a no retener interiormente la Escritura, sin una afirmación más amplia sobre regeneración o inhabitación.
  - 'También podría expresarse con un matiz más fuerte: la palabra no mora en ellos.'
  rationale: La traducción conserva la lógica causal del texto sin cerrar la tensión teológica con una doctrina específica sobre regeneración, perseverancia o iluminación. «Habitando en ustedes» mantiene abierta la fuerza joánica de μένω/μένω sin resolverla artificialmente.
  doctrine_reference: Preservar la tensión teológica del texto sin imponer una lectura denominacional.
translation_notes:
  revision_awareness: El texto inglés auditado pasó de ‘remaining in you’ a ‘abiding in you’ para μένοντα; la versión española sigue ese ajuste con un término natural y joánico («habitando»), manteniendo la alternativa lexical en nota.
  spanish_consistency_notes:
  - Se usa «palabra» para λόγος, coherente con el uso joánico y con el criterio POB de no sustituir por ‘mensaje’ sin necesidad.
  - Se evita «SEÑOR» como máscara para el nombre divino porque aquí el referente es el Padre por contexto, no un problema de substitución del Tetragrámaton.
  - «El que él envió» conserva la referencia a Jesús sin introducir un giro litúrgico o eclesiástico.
  - La nota a pie marca la alternativa textual/lexical importante entre ‘habitando’ y ‘permaneciendo’.
