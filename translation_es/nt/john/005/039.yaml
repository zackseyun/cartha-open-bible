translation:
  language: es
  text: Ustedes escudriñan las Escrituras, porque piensan que en ellas tienen vida eterna[a]; y estas son las que dan testimonio de mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Escudriñen las Escrituras», tomando Ἐραυνᾶτε como imperativo en lugar de indicativo.'
    reason: alternative_reading
lexical_decisions:
- source_word: Ἐραυνᾶτε
  english_pob_choice: You search
  chosen_spanish: Ustedes escudriñan
  alternatives_spanish:
  - Ustedes buscan
  - Escudriñen
  lexicon: BDAG
  rationale: El griego permite leer la forma como indicativo o imperativo. En el flujo del versículo, el indicativo encaja con la observación crítica de Jesús sobre lo que ellos hacen actualmente. 'Escudriñar' conserva mejor que 'buscar' la idea de examen minucioso asociada a las Escrituras; el imperativo queda preservado en la nota.
- source_word: τὰς γραφάς
  english_pob_choice: the Scriptures
  chosen_spanish: las Escrituras
  alternatives_spanish:
  - los escritos
  - las Sagradas Escrituras
  lexicon: BDAG
  rationale: En el uso joánico, γραφή se refiere a los escritos sagrados de Israel; por eso 'las Escrituras' es la equivalencia natural y más fiel que 'los escritos'.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - que
  lexicon: BDAG
  rationale: 'Aquí ὅτι expresa causa: explica por qué escudriñan las Escrituras. ''Porque'' hace explícita esa relación causal en español.'
- source_word: δοκεῖτε
  english_pob_choice: you think
  chosen_spanish: piensan
  alternatives_spanish:
  - suponen
  - imaginan
  lexicon: BDAG
  rationale: δοκέω expresa una convicción o suposición; 'piensan' es natural en español y conserva el matiz de opinión humana sin sobrecargar el texto.
- source_word: ἐν αὐταῖς
  english_pob_choice: in them
  chosen_spanish: en ellas
  alternatives_spanish:
  - allí
  - por medio de ellas
  lexicon: BDAG
  rationale: El pronombre retoma a 'las Escrituras' y la preposición ἐν se refleja de manera directa con 'en'. 'Ellas' mantiene la referencia femenina plural en español.
- source_word: ζωὴν αἰώνιον
  english_pob_choice: eternal life
  chosen_spanish: vida eterna
  alternatives_spanish:
  - vida perpetua
  lexicon: BDAG
  rationale: Esta es la expresión fija y joánica más natural en español. 'Vida eterna' preserva la formulación establecida sin perder el sentido de duración y calidad de vida del original.
- source_word: ἐκεῖναί
  english_pob_choice: these
  chosen_spanish: ellas
  alternatives_spanish:
  - estas
  - esas
  lexicon: BDAG
  rationale: El demostrativo enfatiza a las Escrituras ya mencionadas. En español, repetir 'ellas' evita un giro torpe y mantiene la referencia clara; el énfasis se conserva por el contexto y por la cláusula relativa siguiente.
- source_word: αἱ μαρτυροῦσαι
  english_pob_choice: the ones that testify
  chosen_spanish: las que dan testimonio
  alternatives_spanish:
  - las que testifican
  - las que son testigos
  lexicon: BDAG
  rationale: μαρτυρέω tiene un fuerte matiz de testimonio legal y joánico. 'Dar testimonio' es la equivalencia más natural y reconocible en español bíblico sin perder el valor jurídico del verbo.
- source_word: περὶ ἐμοῦ
  english_pob_choice: about me
  chosen_spanish: de mí
  alternatives_spanish:
  - acerca de mí
  - sobre mí
  lexicon: BDAG
  rationale: Con μαρτυρέω, περί + genitivo se expresa con naturalidad en español como 'de mí'. 'Acerca de mí' es posible, pero más pesado; 'de mí' es breve y idiomático.
theological_decisions:
- issue: Modo de Ἐραυνᾶτε
  english_pob_reading: 'Indicative: ''You search the Scriptures'''
  chosen_spanish_reading: 'Indicativo: ''Ustedes escudriñan las Escrituras'''
  alternative_spanish_readings:
  - 'Imperativo: ''Escudriñen las Escrituras'''
  rationale: La forma griega permite ambas lecturas. El contexto inmediato favorece el indicativo, porque Jesús describe la práctica presente de sus oyentes y la pone en contraste con su falta de reconocimiento de él. Para no borrar la tensión interpretativa documentada, la alternativa imperativa se conserva en nota.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios textuales; el presente borrador sigue el texto griego SBLGNT y el audit trail inglés aprobado, manteniendo la lectura indicativa en el cuerpo y la alternativa imperativa en nota.
  spanish_consistency_notes:
  - Se mantiene 'vida eterna' como fórmula joánica estable.
  - '''Las Escrituras'' conserva el valor técnico de γραφή sin sustituirlo por ''escritos''.'
  - '''Dar testimonio'' preserva el vocabulario joánico de μαρτυρέω y su matiz jurídico.'
  - Se usa 'Ustedes' para un plural explícito y claro en español, coherente con el tono de reprensión del pasaje.
