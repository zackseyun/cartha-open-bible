    text: 'O: «Escudriñen las Escrituras», tomando Ἐραυνᾶτε como imperativo en lugar de indicativo.'
    reason: alternative_reading
  revision_rationale: Se reemplaza 'ellas' por 'estas' en la segunda cláusula para reflejar mejor el demostrativo enfático ἐκεῖναί y mejorar la naturalidad del español, sin cambiar la decisión principal de traducir Ἐραυνᾶτε como indicativo con nota alternativa.
