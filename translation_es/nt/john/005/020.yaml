translation:
  language: es
  text: Pues el Padre ama al Hijo y le muestra todo lo que él mismo hace; y le mostrará obras mayores que estas, para que ustedes se maravillen[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de modo que ustedes se maravillen». El griego ἵνα con el subjuntivo puede expresar propósito y, en contexto, también el resultado del asombro de los oyentes de Jesús.'
    reason: alternative_reading
lexical_decisions:
- source_word: φιλεῖ
  english_pob_choice: loves
  chosen_spanish: ama
  alternatives_spanish:
  - lo ama
  - le tiene amor
  lexicon: BDAG
  rationale: En español, «ama» comunica con naturalidad la relación íntima entre el Padre y el Hijo sin rebajar φιλέω a una mera simpatía. Aunque el griego puede matizar afecto, el contexto joánico sostiene un amor real y pleno.
- source_word: δείκνυσιν
  english_pob_choice: shows
  chosen_spanish: muestra
  alternatives_spanish:
  - le revela
  - le da a conocer
  lexicon: BDAG
  rationale: «Muestra» es el equivalente más directo y conserva el enlace verbal con δείξει («le mostrará») en la segunda mitad del versículo.
- source_word: πάντα
  english_pob_choice: all
  chosen_spanish: todo
  alternatives_spanish:
  - todas las cosas
  - todo cuanto
  lexicon: BDAG
  rationale: «Todo» reproduce con naturalidad la amplitud de πάντα y sigue la revisión inglesa que prefirió una forma más directa y formal que «everything».
- source_word: ἃ αὐτὸς ποιεῖ
  english_pob_choice: that he himself is doing
  chosen_spanish: lo que él mismo hace
  alternatives_spanish:
  - lo que él mismo está haciendo
  - lo que él hace
  lexicon: BDAG
  rationale: En español, «lo que él mismo hace» conserva el énfasis de αὐτός sin forzar un progresivo que suene duro. El presente sigue siendo genérico y actual, compatible con la acción continua implícita en el contexto.
- source_word: μείζονα τούτων ... ἔργα
  english_pob_choice: greater works than these
  chosen_spanish: obras mayores que estas
  alternatives_spanish:
  - obras más grandes que estas
  - obras superiores a estas
  lexicon: BDAG
  rationale: «Obras» respeta el valor joánico de ἔργα como actos/signos con peso teológico. «Mayores» mantiene el comparativo sin añadir explicaciones. Se preserva el posible matiz de ‘obras’ frente a ‘deeds’.
- source_word: δείξει
  english_pob_choice: will show
  chosen_spanish: le mostrará
  alternatives_spanish:
  - le revelará
  - le dará a conocer
  lexicon: BDAG
  rationale: Se mantiene la misma raíz verbal que en δείκνυσιν para conservar la cohesión léxica del versículo y el futuro explícito.
- source_word: ἵνα ὑμεῖς θαυμάζητε
  english_pob_choice: so that you may marvel
  chosen_spanish: para que ustedes se maravillen
  alternatives_spanish:
  - para que ustedes marquen asombro
  - para que ustedes se admiren
  - para que ustedes marvele[n]
  lexicon: BDAG
  rationale: «Para que» expresa bien la cláusula ἵνα. «Se maravillen» conserva el valor de θαυμάζω con un tono digno y claro en español; el plural explicita que el destinatario es la audiencia, no el Hijo.
theological_decisions:
- issue: Fuerza de φιλεῖ en la relación Padre-Hijo
  english_pob_reading: Translate simply as 'loves' without implying a lesser or merely human affection.
  chosen_spanish_reading: Traducir con «ama» sin insinuar un amor inferior o meramente afectivo.
  alternative_spanish_readings:
  - «tiene cariño por»
  - «le tiene afecto»
  rationale: En Juan, la relación Padre-Hijo no debe rebajarse por una diferenciación artificial entre φιλέω y ἀγαπάω. «Ama» preserva el peso cristológico y evita introducir una tensión que el contexto no exige.
  doctrine_reference: Preserve theological tension rather than resolve it
- issue: Valor de ἵνα ὑμεῖς θαυμάζητε
  english_pob_reading: 'Render as purpose/result clause addressed to Jesus'' hearers: ''so that you may marvel.'''
  chosen_spanish_reading: 'Traducir como cláusula de propósito/resultado: «para que ustedes se maravillen».'
  alternative_spanish_readings:
  - «de modo que ustedes se maravillen»
  - «así que ustedes se maravillen»
  - «para que ustedes marquen asombro»
  rationale: El subjuntivo después de ἵνα admite tanto propósito como resultado. «Para que» conserva esa apertura sin convertirlo en una predicción más fuerte de lo que el griego exige.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
translation_notes:
  revision_awareness: La versión inglesa revisada cambió 'everything' por 'all' para ajustar el valor de πάντα; en español se reflejó con «todo» y se mantuvo la repetición léxica de «muestra / mostrará» para conservar la coherencia del versículo. También se sostuvo la lectura de ἵνα como propósito/resultado sin forzar un tiempo futuro inequívoco.
  spanish_consistency_notes:
  - Se mantuvo «Padre» y «Hijo» con mayúsculas por tratarse de referentes teológicos directos en el discurso joánico.
  - Se eligió «obras» para ἔργα siguiendo el uso joánico y evitando el término más general «hechos».
  - Se evitó «SEÑOR» como sustituto del nombre divino porque este versículo no contiene el Tetragrámaton ni una cita directa de יהוה.
