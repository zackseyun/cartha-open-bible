lexical_decisions:
- source_word: τοῦτον
  english_pob_choice: this man
  chosen_spanish: este hombre
  alternatives_spanish:
  - este
  - él
  - este individuo
  lexicon: BDAG
  rationale: El demostrativo señala a una persona concreta ya identificada en el contexto. En español, «este hombre» explicita el referente sin volver la frase rígida o ambigua.
- source_word: ἰδὼν
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - habiendo visto
  - al ver
  lexicon: BDAG
  rationale: 'El participio aoristo anterior al verbo principal se vierte naturalmente con una cláusula temporal en español: «Cuando Jesús vio…», conservando la secuencia narrativa.'
- source_word: κατακείμενον
  english_pob_choice: lying there
  chosen_spanish: acostado allí
  alternatives_spanish:
  - tirado allí
  - echado allí
  - reclinado allí
  lexicon: BDAG
  rationale: La forma describe la postura y el lugar. «Acostado allí» es natural en español y mantiene la escena sin añadir matices ajenos.
- source_word: γνοὺς
  english_pob_choice: knew
  chosen_spanish: supo
  alternatives_spanish:
  - conoció
  - entendió
  - se dio cuenta
  lexicon: BDAG
  rationale: El texto afirma conocimiento, pero no especifica su fuente. «Supo» expresa esa percepción o conocimiento sin decidir si fue sobrenatural o por observación.
- source_word: πολὺν ἤδη χρόνον ἔχει
  english_pob_choice: he had already been there a long time
  chosen_spanish: ya llevaba mucho tiempo así
  alternatives_spanish:
  - ya llevaba mucho tiempo allí
  - ya había estado así mucho tiempo
  - ya tenía esa condición desde hacía mucho tiempo
  lexicon: BDAG
  rationale: La construcción griega puede aludir al tiempo de la situación/condición del hombre. «Ya llevaba mucho tiempo así» conserva la duración y deja abierta la ambigüedad entre estar allí y estar en ese estado, como en el contexto narrativo.
- source_word: λέγει αὐτῷ
  english_pob_choice: he said to him
  chosen_spanish: le dijo
  alternatives_spanish:
  - le dice
  - le habló
  lexicon: BDAG
  rationale: El presente histórico griego se vierte con pasado natural en español narrativo. «Le dijo» es claro y fiel al flujo del relato.
- source_word: Θέλεις
  english_pob_choice: Do you want
  chosen_spanish: ¿Quieres
  alternatives_spanish:
  - ¿Deseas
  - ¿Estás dispuesto a
  lexicon: BDAG
  rationale: θέλω expresa deseo o voluntad. «¿Quieres» es la forma más directa y natural para la pregunta de Jesús.
- source_word: ὑγιὴς
  english_pob_choice: well
  chosen_spanish: sano
  alternatives_spanish:
  - bien
  - saludable
  - completo
  lexicon: BDAG
  rationale: El adjetivo se refiere a estar sano o en buen estado. «Sano» comunica bien el sentido de sanidad sin sonar demasiado técnico.
- source_word: γενέσθαι
  english_pob_choice: to become
  chosen_spanish: llegar a estar
  alternatives_spanish:
  - hacerse
  - quedar
  - ser hecho
  lexicon: BDAG
  rationale: 'El infinitivo de γίνομαι tiene sentido ingresivo: entrar en un nuevo estado. «Llegar a estar sano» preserva ese movimiento hacia una condición nueva.'
theological_decisions:
- issue: 'Alcance de la pregunta de Jesús: sanidad física vs. restauración integral'
  english_pob_reading: '"Do you want to become well?" preserves the healing context without over-specifying the nature of the condition.'
  chosen_spanish_reading: «¿Quieres llegar a estar sano?» mantiene el sentido de sanidad física sin ampliar indebidamente a una restauración más general.
  alternative_spanish_readings:
  - ¿Quieres quedar sano?
  - ¿Quieres ser sanado?
  - ¿Quieres estar bien?
  rationale: El contexto inmediato es la curación del enfermo junto al estanque. «Sano» conserva la referencia médica/funcional, mientras que «llegar a estar» refleja el cambio de estado del verbo griego sin forzar una formulación confesional.
  doctrine_reference: Preservar el alcance contextual del milagro de sanidad sin añadir interpretación devocional.
- issue: Conocimiento de Jesús en γνοὺς
  english_pob_reading: Render simply as narrative knowledge without specifying whether it was supernatural or naturally acquired.
  chosen_spanish_reading: «y supo» deja abierto el modo en que Jesús conoció la situación del hombre.
  alternative_spanish_readings:
  - y al saber
  - y al darse cuenta
  - y con conocimiento sobrenatural
  rationale: El texto no explica el medio del conocimiento. La traducción debe mantener esa reserva y no resolver la cuestión teológica por anticipado.
  doctrine_reference: Preservar la tensión textual sobre la naturaleza del conocimiento de Jesús.
translation_notes:
  revision_awareness: Coincide con el pasaje base y con la auditoría inglesa más reciente, que no requirió cambios. Se conservó la ambigüedad del griego en la duración de la condición del hombre y en el modo del conocimiento de Jesús, evitando resolver lo que el texto no especifica.
  spanish_consistency_notes:
  - Se usa «Jesús» y no se introduce titulación adicional.
  - Se mantiene «sano» para ὑγιής y una construcción ingresiva con «llegar a estar» para γίνομαι.
  - Se evita «SEÑOR» o «Cristo» porque no aparecen en este versículo.
  - La nota textual en español refleja la alternativa inglesa sobre el tiempo de la condición, adaptada al contexto español.
  - La puntuación y las comillas siguen el uso estándar del español.]} } to=functions.submit_spanish_draft  天天中彩票提款final
