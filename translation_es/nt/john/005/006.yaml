translation:
  language: es
  text: 'Cuando Jesús vio a este hombre[a] acostado allí, y supo que ya llevaba mucho tiempo allí, le dijo: «¿Quieres llegar a estar sano?»'
  philosophy: optimal-equivalence
  footnotes:
