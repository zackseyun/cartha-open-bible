review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del griego: Jesús ve al hombre, sabe que lleva mucho tiempo en esa situación y le pregunta si quiere pasar a un estado de sanidad. Sin embargo, «así» en «ya llevaba mucho tiempo así» desplaza la alternativa principal documentada por el English POB («haber estado allí mucho tiempo») y reduce la ambigüedad contextual que el original permite. Conviene ajustar el texto principal para conservar mejor el anclaje narrativo al estanque y mantener la alternativa sobre la condición en nota.'
  spanish_quality_summary: El español es natural, claro y digno. «Acostado allí» y «le dijo» funcionan bien. La pregunta final es inteligible, pero «¿Quieres llegar a estar sano?» suena un poco más pesada de lo necesario; «¿Quieres llegar a estar sano?» sigue siendo aceptable, aunque «ponerte sano» sería más idiomático. Aun así, por fidelidad al valor ingresivo de γενέσθαι, puede mantenerse. El cambio principal necesario está en la cláusula de duración.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Jesús», «sano» y el tratamiento del conocimiento de Jesús son adecuados. No aparecen términos sensibles del glosario mayor. La nota alternativa debe preservarse porque el English POB la documenta.
  issues:
  - severity: medium
    issue: La frase «ya llevaba mucho tiempo así» hace principal la lectura de la condición y no la de estar allí.
    rationale: El English POB escogió como texto principal «he had already been there a long time» y dejó la lectura de la condición como alternativa en nota. El español actual invierte en la práctica esa priorización y pierde parte del encuadre narrativo inmediato del hombre junto al estanque.
  - severity: low
    issue: La nota usa «esa condición», pero el texto principal no deja suficientemente visible la alternativa locativa.
    rationale: La nota es válida, pero funciona mejor si el texto principal dice «allí» para que la nota conserve una alternativa real y no redundante.
  revised_spanish_text: 'Cuando Jesús vio a este hombre[a] acostado allí, y supo que ya llevaba mucho tiempo allí, le dijo: «¿Quieres llegar a estar sano?»'
  revised_footnotes:
  - marker: a
    text: 'O: «que ya tenía esa condición desde hacía mucho tiempo».'
    reason: lexical_alternative
  revision_rationale: Se revisa la cláusula temporal para alinearla con la decisión principal auditada en inglés, preservando en el texto la referencia narrativa al lugar («allí») y dejando en nota la alternativa de duración de la condición. El resto del versículo puede mantenerse por fidelidad y buena legibilidad.
