translation:
  language: es
  text: Él era la lámpara[a] que ardía y alumbraba, y ustedes quisieron regocijarse por un tiempo en su luz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por un tiempo». La expresión señala un período limitado, no necesariamente una hora literal.
    reason: lexical_alternative
lexical_decisions:
- source_word: λύχνος
  english_pob_choice: lamp
  chosen_spanish: lámpara
  alternatives_spanish:
  - lámpara de aceite
  - antorcha
  - luz
  lexicon: BDAG
  rationale: λύχνος designa un objeto que da luz, no la luz en abstracto. En español, «lámpara» comunica bien ese sentido sin convertirlo en «luz», lo cual borraría la distinción entre el testigo y la luz que testifica.
- source_word: καιόμενος
  english_pob_choice: was burning
  chosen_spanish: que ardía
  alternatives_spanish:
  - que estaba ardiendo
  - que se quemaba
  - ardiendo
  lexicon: BDAG
  rationale: El participio presente expresa acción/estado en curso. «Que ardía» es natural en español y conserva la imagen de una lámpara encendida y activa.
- source_word: φαίνων
  english_pob_choice: shining
  chosen_spanish: alumbraba
  alternatives_spanish:
  - resplandecía
  - brillaba
  - daba luz
  lexicon: BDAG
  rationale: Aquí el verbo indica emisión de luz. «Alumbraba» evita una redundancia excesiva con «ardía» y mantiene el sentido funcional de dar luz.
- source_word: ἠθελήσατε
  english_pob_choice: you were willing
  chosen_spanish: quisieron
  alternatives_spanish:
  - estuvieron dispuestos a
  - quisieron ustedes
  - querían
  lexicon: BDAG
  rationale: El aoristo señala una respuesta volitiva concreta. «Quisieron» expresa esa inclinación o voluntad sin volverla más fuerte de lo que el contexto exige.
- source_word: ἀγαλλιαθῆναι
  english_pob_choice: to rejoice
  chosen_spanish: regocijarse
  alternatives_spanish:
  - alegrarse intensamente
  - exultar
  - gozarse
  lexicon: BDAG
  rationale: El verbo lleva la idea de alegría intensa. «Regocijarse» es una opción digna y suficientemente fuerte en español, más cercana al matiz del griego que un simple «alegrarse».
- source_word: πρὸς ὥραν
  english_pob_choice: for a time
  chosen_spanish: por un tiempo
  alternatives_spanish:
  - por un rato
  - por una hora
  - por breve tiempo
  lexicon: BDAG
  rationale: La expresión idiomática indica duración limitada, no necesariamente una hora literal. «Por un tiempo» conserva esa restricción temporal con naturalidad.
- source_word: ἐν τῷ φωτὶ αὐτοῦ
  english_pob_choice: in his light
  chosen_spanish: en su luz
  alternatives_spanish:
  - a la luz de él
  - por su luz
  lexicon: BDAG
  rationale: La preposición conserva la imagen de permanecer o moverse dentro de la esfera de su iluminación/testimonio. «En su luz» es directo y fiel.
- source_word: ἐκεῖνος
  english_pob_choice: He
  chosen_spanish: Él
  alternatives_spanish:
  - Ese hombre
  - Aquel
  lexicon: BDAG
  rationale: El demostrativo es enfático en griego, pero en español el pronombre simple mantiene la referencia a Juan el Bautista sin forzar una frase pesada.
theological_decisions:
- issue: Distinción entre la lámpara y la luz en la imagen joánica
  english_pob_reading: John is rendered as 'the lamp,' not 'the light,' preserving his subordinate, derivative witness.
  chosen_spanish_reading: Juan es «la lámpara», no «la luz», preservando su testimonio subordinado y derivado.
  alternative_spanish_readings:
  - Juan era la luz
  - Él era la luz
  rationale: 'El griego usa λύχνος, no φῶς. Mantener «lámpara» conserva la tensión teológica del Evangelio de Juan: Juan da testimonio y refleja, pero no es la luz definitiva.'
  doctrine_reference: Juan 1:6-8; Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego SBLGNT y la auditoría inglesa POB. Mantiene la distinción λύχνος/φῶς, la temporalidad idiomática de πρὸς ὥραν y el matiz volitivo de ἠθελήσατε sin introducir interpretaciones ajenas al original.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el nombre divino aparece explícitamente; no aplica en este versículo.
  - Se prefirió «lámpara» para λύχνος, en línea con la distinción joánica entre testigo y luz.
  - «Por un tiempo» comunica la duración limitada sin literalizar «hora».
  - El registro es bíblico moderno y digno, evitando arcaísmos innecesarios.
