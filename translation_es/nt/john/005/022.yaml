translation:
  language: es
  text: Porque el Padre no juzga a nadie, sino que todo el juicio lo ha dado al Hijo,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: οὐδὲ γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque, en efecto
  lexicon: BDAG
  rationale: En español, «Porque» conserva la relación explicativa de γάρ sin sonar forzado. Se omite un equivalente separado de οὐδέ porque, en esta construcción, el contraste negativo queda suficientemente expresado por «no juzga a nadie» y el giro resultaría artificial si se desdoblara.
- source_word: ὁ πατὴρ
  english_pob_choice: the Father
  chosen_spanish: el Padre
  alternatives_spanish:
  - el padre
  lexicon: BDAG
  rationale: Aquí se trata del título relacional divino en contexto joánico; por eso se capitaliza como «Padre». En español, esta forma comunica mejor el valor titular que «el padre», que sonaría genérico.
- source_word: κρίνει
  english_pob_choice: judges
  chosen_spanish: juzga
  alternatives_spanish:
  - está juzgando
  - condena
  - emite juicio
  lexicon: BDAG
  rationale: «Juzga» preserva el verbo básico y mantiene la conexión léxica con κρίσιν. «Condena» estrecharía indebidamente el sentido, y «está juzgando» añadiría una progresividad no exigida por el presente.
- source_word: οὐδένα
  english_pob_choice: no one
  chosen_spanish: a nadie
  alternatives_spanish:
  - a ninguna persona
  - a nadie en absoluto
  lexicon: BDAG
  rationale: «A nadie» expresa la negación total con naturalidad en español y refleja bien οὐδένα. Se evita «nadie» sin preposición porque el verbo transitivo en español suele requerir el objeto directo marcado con «a».
- source_word: ἀλλὰ
  english_pob_choice: but
  chosen_spanish: sino que
  alternatives_spanish:
  - pero
  - sino
  lexicon: BDAG
  rationale: «Sino que» expresa con mayor precisión la fuerte contraposición entre la primera y la segunda cláusula en español, y encaja mejor con una oración verbal completa que simple «pero».
- source_word: τὴν κρίσιν πᾶσαν
  english_pob_choice: all judgment
  chosen_spanish: todo el juicio
  alternatives_spanish:
  - todo juicio
  - la totalidad del juicio
  - todo el acto de juzgar
  lexicon: BDAG
  rationale: «Todo el juicio» mantiene la sustantivación de κρίσις y la amplitud de πᾶσαν sin convertirlo en «autoridad para juzgar», opción más interpretativa. También conserva la tensión de si se trata del acto, la función o el veredicto, sin resolverla artificialmente.
- source_word: δέδωκεν
  english_pob_choice: has given
  chosen_spanish: ha dado
  alternatives_spanish:
  - dio
  - ha confiado
  lexicon: BDAG
  rationale: El perfecto griego expresa una acción completa con efecto vigente; «ha dado» reproduce ese valor mejor que el pretérito simple. «Ha confiado» introduciría una nuance no explícita en el texto.
- source_word: τῷ υἱῷ
  english_pob_choice: to the Son
  chosen_spanish: al Hijo
  alternatives_spanish:
  - al Hijo suyo
  - a su Hijo
  lexicon: BDAG
  rationale: Se conserva el título cristológico «el Hijo» como en el griego, sin añadir un posesivo que no está presente. En español, la contracción «al» es la forma natural del dativo con artículo definido.
theological_decisions:
- issue: Relación entre el no juicio del Padre y la entrega del juicio al Hijo
  english_pob_reading: 'Render the statement straightforwardly without softening the apparent tension: the Father judges no one, but has given all judgment to the Son.'
  chosen_spanish_reading: 'Se mantiene la afirmación en forma directa: el Padre no juzga a nadie, sino que ha dado todo el juicio al Hijo.'
  alternative_spanish_readings:
  - El Padre no juzga a nadie independientemente del Hijo
  - El Padre no juzga a nadie por sí mismo, sino que delega el juicio al Hijo
  rationale: La redacción conserva la tensión teológica del versículo sin añadir aclaraciones conciliadoras que no aparecen en el griego. Así se respeta el contraste explícito entre el Padre y el Hijo y se evita limitar «todo el juicio» a una sola modalidad no indicada por el texto.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
- issue: Título cristológico «el Hijo»
  english_pob_reading: Retain 'the Son' as a title rather than paraphrasing it.
  chosen_spanish_reading: Se conserva «el Hijo» como título, no como simple parentesco humano.
  alternative_spanish_readings:
  - su Hijo
  - el hijo
  rationale: En Juan, «el Hijo» es un título de peso teológico y cristológico. Mantenerlo sin posesivo añadido refleja mejor el griego y evita suavizar la formulación titular.
  doctrine_reference: 'DOCTRINE.md: Affirmations; Translate titles'
translation_notes:
  revision_awareness: 'El texto coincide con el sentido del griego SBLGNT y con la auditoría inglesa: se preserva la estructura contrastiva, el perfecto de δέδωκεν y el título cristológico τῷ υἱῷ sin armonizaciones adicionales. No se detectan revisiones previas aplicables en este versículo.'
  spanish_consistency_notes:
  - Se mantiene «Padre» y «Hijo» con mayúscula por su función titular en el contexto joánico.
  - Se usa «juicio» para κρίσις, no «condena», para no restringir indebidamente el alcance semántico.
  - Se traduce γάρ con «Porque» para una lectura fluida y pública en español.
  - No se añade nota al pie porque el verso no presenta una variante textual o léxica que requiera anclaje explícito en esta línea de trabajo.
