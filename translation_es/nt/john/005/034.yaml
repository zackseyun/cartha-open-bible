revisions:
- from: Pero yo no recibo testimonio de parte de hombre; más bien, digo estas cosas para que ustedes sean salvos.
  to: Pero yo no recibo testimonio de un hombre; más bien, digo estas cosas para que ustedes sean salvos.
  rationale: Se reemplaza «de parte de hombre» por «de un hombre» para preservar el singular de ἀνθρώπου y mejorar la naturalidad del español sin cambiar el sentido. No se requieren notas, porque no se pierde ninguna alternativa significativa preservada por el inglés ni se crea una ambigüedad nueva en español.
