translation:
  language: es
  text: Pero yo no recibo testimonio de un hombre; más bien, digo estas cosas para que ustedes sean salvos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: παρὰ ἀνθρώπου
  english_pob_choice: from man
  chosen_spanish: de parte de hombre
  alternatives_spanish:
  - de un hombre
  - de seres humanos
  - de la gente
  lexicon: BDAG; παρά + genitivo de fuente
  rationale: παρά con genitivo expresa origen o fuente. En español, «de parte de» conserva bien esa relación de procedencia y mantiene la referencia singular de ἀνθρώπου sin volver plural lo que el griego deja en singular.
- source_word: τὴν μαρτυρίαν
  english_pob_choice: testimony
  chosen_spanish: testimonio
  alternatives_spanish:
  - testimonio judicial
  - testimonio dado
  - testigo
  lexicon: BDAG; μαρτυρία
  rationale: «Testimonio» reproduce el valor evidencial/jurídico de μαρτυρία y funciona naturalmente con «recibir» en español. «Testigo» sería la persona, no el contenido, y «testimonio judicial» añade especificación no explícita.
- source_word: λαμβάνω
  english_pob_choice: receive
  chosen_spanish: recibo
  alternatives_spanish:
  - acepto
  - recibo como válido
  lexicon: BDAG; λαμβάνω
  rationale: El presente en primera persona se traduce de forma directa con «recibo». «Acepto» es posible, pero desplaza el énfasis desde la recepción del testimonio hacia una valoración más interpretativa.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  - estas palabras
  lexicon: BDAG; οὗτος
  rationale: El neutro plural se conserva mejor con «estas cosas». «Esto» suaviza la pluralidad del original, y «estas palabras» especifica más de lo que el texto griego dice.
- source_word: λέγω
  english_pob_choice: I say
  chosen_spanish: digo
  alternatives_spanish:
  - hablo
  - estoy diciendo
  lexicon: BDAG; λέγω
  rationale: «Digo» es la equivalencia más directa y natural en español para el presente indicativo. «Hablo» sería menos preciso con el objeto directo «estas cosas».
- source_word: ἵνα ὑμεῖς σωθῆτε
  english_pob_choice: so that you may be saved
  chosen_spanish: para que ustedes sean salvos
  alternatives_spanish:
  - para que ustedes sean salvados
  - para que ustedes puedan ser salvos
  - a fin de que ustedes sean salvos
  lexicon: BDAG; σῴζω
  rationale: La cláusula final expresa propósito. «Para que» comunica bien ἵνα en español. «Sean salvos» mantiene el sentido salvífico amplio sin reducirlo a rescate físico ni forzar una paráfrasis doctrinal.
- source_word: δὲ ... ἀλλὰ
  english_pob_choice: But ... rather
  chosen_spanish: Pero ... más bien
  alternatives_spanish:
  - Pero ... sino
  - Y ... más bien
  lexicon: BDAG; conectores adversativos
  rationale: La secuencia contrastiva se refleja con «Pero ... más bien», que conserva la oposición entre la negación de dependencia humana y la afirmación del propósito de Jesús. «Más bien» reproduce bien el valor de ἀλλὰ.
theological_decisions:
- issue: Alcance de σωθῆτε
  english_pob_reading: Retain the broad salvific wording without narrowing it to physical rescue or to a specific doctrinal model of salvation.
  chosen_spanish_reading: 'Conservar el lenguaje amplio de salvación: «sean salvos».'
  alternative_spanish_readings:
  - sean librados
  - obtengan salvación
  - sean rescatados
  rationale: En Juan, σῴζω puede tener alcance salvífico amplio; «sean salvos» preserva esa amplitud sin imponer una lectura más estrecha de liberación física o de un modelo doctrinal particular.
  doctrine_reference: Affirmations; Translation philosophy §3
translation_notes:
  revision_awareness: 'No se requieren revisiones adicionales: la redacción española sigue de cerca el texto griego y el criterio POB auditado, conservando el contraste adversativo y el propósito final sin añadir matices no sustentados.'
  spanish_consistency_notes:
  - Se mantiene «Dios/Yahvé» fuera de este versículo porque no aparecen en el texto.
  - Se usa «hombre» en sentido genérico singular para reflejar ἀνθρώπου, no como referencia a varón específico.
  - La elección de «salvos» preserva el pasivo teológico de σῴζω sin convertirlo en una paráfrasis explicativa.
