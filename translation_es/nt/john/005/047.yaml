translation:
  language: es
  text: Pero si no creen en sus escritos[a], ¿cómo creerán en mis palabras?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sus letras'. El griego puede significar letras o escritos; aquí se refiere a lo que Moisés escribió.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰ δὲ
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Mas si
  - Sin embargo, si
  lexicon: BDAG
  rationale: La combinación condicional con valor de transición adversativa se expresa de forma natural en español con 'Pero si', que conserva el contraste con el argumento anterior sin volverse pesada.
- source_word: τοῖς ἐκείνου γράμμασιν
  english_pob_choice: his writings
  chosen_spanish: sus escritos
  alternatives_spanish:
  - sus letras
  - sus escritos sagrados
  - sus escritos de Moisés
  lexicon: BDAG
  rationale: γράμμασιν puede significar 'escritos' o 'cartas'; en este contexto alude a lo que Moisés escribió. 'Sus escritos' mantiene el sentido amplio de 'writings' y evita limitarlo a 'cartas'. El posesivo queda claro por el contexto inmediato, donde el referente es Moisés.
- source_word: οὐ πιστεύετε
  english_pob_choice: you do not believe
  chosen_spanish: no creen
  alternatives_spanish:
  - no creen ustedes
  - no están creyendo
  - no confían
  lexicon: BDAG
  rationale: πιστεύω aquí expresa aceptar como verdadero o digno de fe. 'No creen' es natural en español y preserva el valor de creer sin introducir el matiz más subjetivo de 'confiar'.
- source_word: πῶς
  english_pob_choice: how will
  chosen_spanish: ¿cómo creerán?
  alternatives_spanish:
  - ¿cómo podrán creer?
  - ¿de qué manera creerán?
  - ¿cómo van a creer?
  lexicon: BDAG
  rationale: El futuro de πιστεύσετε se refleja bien con 'creerán'. En español, la pregunta retórica fluye con '¿cómo creerán?', que conserva la fuerza argumentativa del griego.
- source_word: τοῖς ἐμοῖς ῥήμασιν
  english_pob_choice: my words
  chosen_spanish: mis palabras
  alternatives_spanish:
  - mis dichos
  - mis dichos y palabras
  - mis declaraciones
  lexicon: BDAG
  rationale: ῥήμασιν se refiere a palabras pronunciadas. 'Mis palabras' es el equivalente más natural y mantiene el paralelismo con 'sus escritos'.
- source_word: πιστεύσετε
  english_pob_choice: you believe
  chosen_spanish: creerán
  alternatives_spanish:
  - van a creer
  - podrán creer
  - llegarán a creer
  lexicon: BDAG
  rationale: Aunque es futuro, en español la interrogativa retórica suena más natural con 'creerán'. Esto conserva la orientación futura sin forzar una paráfrasis.
theological_decisions:
- issue: Referente de 'sus' / ἐκείνου
  english_pob_reading: '''his'' refers to Moses in the immediate context'
  chosen_spanish_reading: '''sus'' se entiende como una referencia a Moisés por el contexto inmediato'
  alternative_spanish_readings:
  - '''sus'' con referente genérico'
  - '''de él'''
  - nombrar explícitamente a Moisés
  rationale: El contexto de Juan 5:45–46 identifica a Moisés como el que escribió acerca de Jesús. Mantener el posesivo implícito en español respeta la cohesión del texto griego y deja que el contexto aclare el referente.
  doctrine_reference: Juan 5:45–46; referencia inmediata a Moisés como testigo/escritor
- issue: Lenguaje de creer en las Escrituras y en las palabras de Jesús
  english_pob_reading: Translate πιστεύω consistently as 'believe' rather than 'trust' in this verse
  chosen_spanish_reading: traducir πιστεύω consistentemente con 'creer'
  alternative_spanish_readings:
  - '''confiar'''
  - '''dar crédito'''
  - '''tener fe'''
  rationale: El pasaje contrasta aceptar como verdadero lo escrito por Moisés con aceptar las palabras de Jesús. 'Creer' preserva ese contraste verbal y evita introducir un matiz de confianza relacional que no es el foco principal aquí.
  doctrine_reference: Terminología de fe/creencia en Juan 5:47
translation_notes:
  revision_awareness: Se mantuvo el sentido del griego SBLGNT y la decisión auditada del POB en inglés de entender γράμμασιν como 'writings'. No se hicieron cambios de alcance doctrinal; la redacción española ajusta solo la naturalidad sintáctica y la concordancia verbal para una pregunta retórica en futuro.
  spanish_consistency_notes:
  - Se usa 'creer' para πιστεύω, en coherencia con la decisión inglesa auditada.
  - Se evita 'SEÑOR' u otra sustitución, ya que el versículo no contiene el nombre divino.
  - '''Escritos'' conserva la ambigüedad lexical de γράμμασιν sin sobrertraducir a ''cartas''.'
  - La nota al pie conserva la alternativa lexical documentada para γράμμασιν y la vincula con Moisés por contexto.
