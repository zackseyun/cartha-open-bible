translation:
  language: es
  text: Y por esto los judíos perseguían a Jesús[a], porque hacía estas cosas en el día de reposo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los judeanos» o, según el contexto, «los dirigentes judíos». En Juan, este término a menudo se refiere a un grupo particular que se opone a Jesús, no a todo el pueblo judío sin distinción.
    reason: alternative_reading
lexical_decisions:
- source_word: διὰ τοῦτο
  english_pob_choice: because of this
  chosen_spanish: por esto
  alternatives_spanish:
  - por esta razón
  - por ello
  lexicon: BDAG
  rationale: La frase causal mira atrás al hecho anterior; «por esto» conserva la relación causal de modo natural en español y sin volverla meramente inferencial.
- source_word: ἐδίωκον
  english_pob_choice: were persecuting
  chosen_spanish: perseguían
  alternatives_spanish:
  - acosaban
  - proseguían
  lexicon: BDAG
  rationale: El imperfecto expresa acción continua o repetida. En este contexto joánico, el verbo indica oposición hostil; «perseguían» preserva esa fuerza sin añadir todavía la intención de matar que aparecerá después.
- source_word: οἱ Ἰουδαῖοι
  english_pob_choice: the Jews
  chosen_spanish: los judíos
  alternatives_spanish:
  - los judeanos
  - los dirigentes judíos
  lexicon: BDAG
  rationale: El griego usa la designación plural habitual. Se mantiene la forma directa en el texto principal, y se documenta la posible referencia contextual más restringida en una nota para evitar una lectura totalizante.
- source_word: τὸν Ἰησοῦν
  english_pob_choice: Jesus
  chosen_spanish: a Jesús
  alternatives_spanish:
  - a Jesús de Nazaret
  lexicon: Ἰησοῦς
  rationale: El nombre propio se traduce de manera regular como «Jesús». La preposición personal española exige la marca de objeto directo con «a».
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - estas acciones
  - tales cosas
  lexicon: BDAG
  rationale: El demostrativo plural retoma las acciones mencionadas antes. «Estas cosas» es claro, natural y suficientemente cercano al griego.
- source_word: ἐποίει
  english_pob_choice: was doing
  chosen_spanish: hacía
  alternatives_spanish:
  - iba haciendo
  - seguía haciendo
  lexicon: BDAG
  rationale: El imperfecto queda bien representado por «hacía», que en español puede expresar acción en curso sin forzar una perífrasis progresiva innecesaria.
- source_word: ἐν σαββάτῳ
  english_pob_choice: on the Sabbath
  chosen_spanish: en sábado
  alternatives_spanish:
  - durante el sábado
  - en día de sábado
  lexicon: σάββατον
  rationale: Aunque el artículo no aparece en griego, el sentido temporal del pasaje en español se expresa de forma natural como «en sábado». «Sábado» comunica el día sagrado sin alterar el referente.
theological_decisions:
- issue: Alcance de οἱ Ἰουδαῖοι en Juan 5:16
  english_pob_reading: the Jews
  chosen_spanish_reading: los judíos
  alternative_spanish_readings:
  - los dirigentes judíos
  - los judeanos
  rationale: Se conserva el valor léxico directo del plural griego en el texto principal. La nota aclara que, en Juan, el término a menudo se refiere a un grupo particular que se opone a Jesús, no a todo el pueblo judío sin distinción.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente del contexto inglés: no hubo cambios aplicados y el estado final fue de alta concordancia, con observaciones menores ya cubiertas por la nota sobre οἱ Ἰουδαῖοι.'
  spanish_consistency_notes:
  - Se mantiene «Jesús» como nombre propio y «sábado» como término litúrgico-temporal natural en español.
  - 'Se evita suavizar el verbo de oposición: «perseguían» conserva la fuerza hostil del imperfecto griego.'
  - La causalidad se expresa con «por esto» para reflejar διὰ τοῦτο sin convertirlo en una conclusión lógica más fuerte de lo necesario.
