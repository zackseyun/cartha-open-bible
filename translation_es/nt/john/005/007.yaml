review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja correctamente el sentido general del griego: el enfermo responde a Jesús, explica que no tiene quien lo introduzca en la piscina cuando el agua se agita, y que otro desciende antes que él. Sin embargo, hay dos ajustes menores aconsejables para mayor fidelidad y naturalidad: mover la nota al vocativo «Señor» en vez de anclarla a «le respondió», y preferir una formulación más idiomática para ταραχθῇ τὸ ὕδωρ en español («se agita» en lugar de «es agitada»).'
  spanish_quality_summary: La redacción es clara, digna y ampliamente comprensible. «El enfermo» funciona bien. «Me meta en la piscina» y «otro baja antes que yo» son naturales. No obstante, la nota al pie actual está mal anclada, y «cuando el agua es agitada» suena algo rígido; «cuando el agua se agita» lee mejor en español bíblico contemporáneo sin perder concreción.
  glossary_alignment: No hay conflicto con la terminología del proyecto. «Señor» para Κύριε como trato respetuoso es defendible en español, aun cuando el inglés revisado use «Sir», y la nota preserva la alternativa contextual. No intervienen Yahvé, Mesías, Espíritu, esclavo u otros términos sensibles del glosario.
  issues:
  - severity: medium
    issue: La nota al pie [a] está anclada a «le respondió» en vez de a «Señor».
    rationale: La nota explica el valor de Κύριε, por lo que el marcador debe aparecer en la palabra o frase correspondiente dentro del texto español.
  - severity: low
    issue: «cuando el agua es agitada» suena poco idiomático en español
    rationale: El pasivo perifrástico reproduce el griego de forma algo rígida; «cuando el agua se agita» conserva el sentido de ταραχθῇ y suena más natural y legible.
  - severity: low
    issue: El texto de la nota dice «O “Señor”» aunque la lectura principal ya es «Señor».
    rationale: La nota debería presentar la alternativa española real, por ejemplo «O “Señor”/“Señor”» no aporta nada; más útil es explicar que κύριε también puede equivaler a «señor» como trato respetuoso o, si se desea alternativa, mencionar «Señor»/«señor» según capitalización editorial.
  revised_spanish_text: 'El enfermo le respondió: «Señor[a], no tengo a nadie que me meta en la piscina cuando el agua se agita; pero mientras yo llego, otro baja antes que yo».'
  revised_footnotes:
  - marker: a
    text: El griego es κύριε, comúnmente traducido «Señor», pero en este contexto también puede funcionar como un tratamiento respetuoso equivalente a «señor» o «señor, señor».
    reason: alternative_reading
  revision_rationale: Se corrige el anclaje de la nota para que recaiga sobre «Señor», que es la palabra explicada. También se ajusta «el agua es agitada» a «el agua se agita» por mayor naturalidad en español sin alterar el sentido. La nota se reformula para evitar una pseudoalternativa redundante y explicar mejor el valor contextual de κύριε.
