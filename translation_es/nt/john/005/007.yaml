revisions:
- from: 'El enfermo le respondió[a]: «Señor, no tengo a nadie que me meta en la piscina cuando el agua es agitada; pero mientras yo llego, otro baja antes que yo».'
  to: 'El enfermo le respondió: «Señor[a], no tengo a nadie que me meta en la piscina cuando el agua se agita; pero mientras yo llego, otro baja antes que yo».'
  rationale: Se corrige el anclaje de la nota para que recaiga sobre «Señor», que es la palabra explicada. También se ajusta «el agua es agitada» a «el agua se agita» por mayor naturalidad en español sin alterar el sentido. La nota se reformula para evitar una pseudoalternativa redundante y explicar mejor el valor contextual de κύριε.
