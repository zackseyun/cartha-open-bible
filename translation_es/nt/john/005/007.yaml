translation:
  language: es
  text: 'El enfermo le respondió: «Señor[a], no tengo a nadie que me meta en la piscina cuando el agua se agita; pero mientras yo llego, otro baja antes que yo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego es κύριε, comúnmente traducido «Señor», pero en este contexto también puede funcionar como un tratamiento respetuoso equivalente a «señor» o «señor, señor».
    reason: alternative_reading
lexical_decisions:
- source_word: ὁ ἀσθενῶν
  english_pob_choice: the sick man
  chosen_spanish: el enfermo
  alternatives_spanish:
  - el hombre enfermo
  - el inválido
  - el que estaba enfermo
  lexicon: BDAG
  rationale: El participio sustantivado nombra al hombre caracterizado por su enfermedad. «El enfermo» es natural en español, conserva la referencia personal y evita añadir matices clínicos o despectivos que no están en el griego.
- source_word: Κύριε
  english_pob_choice: Sir
  chosen_spanish: Señor
  alternatives_spanish:
  - Señor mío
  - Señor Jesús
  - Caballero
  lexicon: BDAG
  rationale: Aunque el contexto narrativo permite un valor respetuoso cercano a «señor», el proyecto mantiene Yahvé para el nombre divino y no usa «SEÑOR» como máscara. Aquí κύριε funciona como tratamiento directo reverente; «Señor» conserva la forma tradicional y la ambigüedad posible entre cortesía y reconocimiento sin afirmar más de lo que el contexto exige.
- source_word: ἄνθρωπον
  english_pob_choice: no one
  chosen_spanish: nadie
  alternatives_spanish:
  - ninguna persona
  - ningún hombre
  - no tengo a nadie
  lexicon: BDAG
  rationale: 'Aunque la forma es singular, el sentido es genérico: no hay persona alguna que lo ayude. «Nadie» reproduce de forma idiomática la fuerza del inglés POB y del griego, sin forzar género ni sonar artificial.'
- source_word: ταραχθῇ τὸ ὕδωρ
  english_pob_choice: the water is stirred up
  chosen_spanish: el agua es agitada
  alternatives_spanish:
  - el agua es removida
  - el agua es turbada
  - el agua se agita
  lexicon: BDAG
  rationale: El pasivo de ταράσσω expresa que el agua es puesta en movimiento o alterada. «Es agitada» mantiene la imagen concreta y resulta natural en español, evitando «turbada», que puede sonar más abstracta.
- source_word: βάλῃ με εἰς τὴν κολυμβήθραν
  english_pob_choice: put me into the pool
  chosen_spanish: me meta en la piscina
  alternatives_spanish:
  - me ponga en la piscina
  - me eche en la piscina
  - me introduzca en la piscina
  lexicon: BDAG
  rationale: βάλλω puede ser literalmente «arrojar», pero aquí el sentido es ayudar a colocarlo dentro del estanque. «Meterme en la piscina» expresa la acción requerida sin sugerir violencia; «piscina» comunica bien κολυμβήθρα en español moderno. Dado el registro bíblico, se mantiene «piscina» para esta escena acuática concreta, aunque «estanque» sería posible en otros contextos.
- source_word: ἐν ᾧ δὲ ἔρχομαι ἐγώ
  english_pob_choice: but while I am coming
  chosen_spanish: pero mientras yo llego
  alternatives_spanish:
  - pero mientras voy
  - pero mientras vengo
  - pero mientras me acerco
  lexicon: BDAG
  rationale: La frase es temporal y presenta su movimiento en curso. «Mientras yo llego» conserva el valor progresivo y, en español, suena más natural que un calco demasiado literal. Se explicita «yo» para reflejar ἐγώ.
- source_word: ἄλλος πρὸ ἐμοῦ καταβαίνει
  english_pob_choice: another goes down before me
  chosen_spanish: otro baja antes que yo
  alternatives_spanish:
  - otro desciende antes que yo
  - otro se adelanta a mí y baja
  - otro baja delante de mí
  lexicon: BDAG
  rationale: καταβαίνει es literalmente «baja/desciende», y el contexto del estanque hace claro ese movimiento. «Otro baja antes que yo» conserva la prioridad temporal y la imagen espacial sin sobreformalidad. «Antes que yo» evita una expresión menos natural como «delante de mí» cuando el énfasis es prioridad de acceso.
theological_decisions:
- issue: Valor de Κύριε en la dirección a Jesús
  english_pob_reading: Rendered as 'Sir' in the revision, while preserving the possibility of a respectful address without asserting full christological confession.
  chosen_spanish_reading: «Señor» como tratamiento respetuoso y ambivalente; no se fuerza una confesión plena de la identidad de Jesús en esta sola palabra.
  alternative_spanish_readings:
  - «Señor mío»
  - «caballero»
  - «sir»
  rationale: La evidencia contextual permite un trato reverente de cortesía. En español, «Señor» es la forma más natural y ampliamente inteligible para un interlocutor en narrativa bíblica. No se traduce como «Yahvé» porque aquí no hay el nombre divino, sino κύριε en vocativo.
  doctrine_reference: 'DOCTRINE.md: contested terms / κύριος y distinción entre nombre divino y tratamiento respetuoso'
- issue: Imagen del agua agitada y el movimiento hacia la piscina
  english_pob_reading: The water is stirred up; put me into the pool; another goes down before me.
  chosen_spanish_reading: El pasaje conserva la escena concreta sin convertirla en alegoría ni suavizar la acción física.
  alternative_spanish_readings:
  - espiritualizar el agua y la piscina
  - tratar "baja" como mera metáfora
  rationale: 'El griego describe una situación material y narrativa: agua agitada, descenso a la piscina y demora del enfermo. La traducción preserva ese nivel referencial, evitando lecturas simbólicas no sustentadas por el texto.'
  doctrine_reference: Narrative integrity / no allegorical inflation
translation_notes:
  revision_awareness: 'La base inglesa revisada cambió de «Lord» a «Sir» para κύριε por naturalidad contextual. La versión española toma en cuenta esa revisión, pero elige «Señor» porque en español bíblico conserva mejor la reverencia del vocativo y la ambigüedad respetuosa del original sin convertirlo en una confesión doctrinal explícita. Se mantuvieron las demás decisiones léxicas del audit trail: sujeto sustantivado («el enfermo»), ἄνθρωπον como «nadie», ταραχθῇ τὸ ὕδωρ como «el agua es agitada», βάλλῃ με εἰς τὴν κολυμβήθραν como «me meta en la piscina», y ἄλλος πρὸ ἐμοῦ καταβαίνει como «otro baja antes que yo».'
  spanish_consistency_notes:
  - Se usó «piscina» para κολυμβήθρα por claridad moderna y coherencia con una escena de estanque de curación.
  - Se evitó «SEÑOR» en versales porque la política del proyecto reserva Yahvé para el nombre divino y no exige máscara tipográfica para κύριε.
  - «El enfermo» mantiene el participio sustantivado sin añadir diagnóstico técnico.
  - La puntuación y el orden de la cita buscan fluidez natural en español sin perder la estructura de causa/tiempo del griego.
