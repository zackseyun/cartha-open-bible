revisions:
- from: De cierto[a], de cierto os digo que viene una hora[b], y ahora es, cuando los muertos oirán la voz del Hijo de Dios, y los que oyeren vivirán[c].
  to: Les aseguro[a] que viene una hora[b], y ahora es, cuando los muertos[c] oirán la voz del Hijo de Dios, y los que oigan[d] vivirán.
  rationale: 'La revisión conserva todas las decisiones exegéticas centrales del griego y del audit trail inglés, pero ajusta el español al objetivo del proyecto: registro moderno, digno y neutral latinoamericano. «Les aseguro» comunica con naturalidad la fuerza solemne de Ἀμὴν ἀμὴν λέγω ὑμῖν, mientras la nota mantiene la alternativa más formal «Amén, amén». «Los que oigan» evita el arcaísmo de «oyeren» sin perder el sentido condicional-resultativo del participio. También se restaura la nota sobre «los muertos» para preservar la tensión teológica documentada en el inglés.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:03:52Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja en general bien el griego: mantiene la doble solemnidad de Ἀμὴν ἀμὴν, conserva «hora», preserva la tensión de «y ahora es», traduce οἱ νεκροὶ como «los muertos», y mantiene el título «el Hijo de Dios». Sin embargo, dos decisiones debilitan la fidelidad al enfoque auditado: «De cierto» y «los que oyeren» suenan marcadamente arcaicas y se apartan del objetivo de español moderno y legible. Además, falta en español la nota teológica/cross-reference del inglés sobre «los muertos».'
  spanish_quality_summary: El texto es comprensible, pero mezcla registro arcaizante tipo Reina-Valera («De cierto», «os digo», «los que oyeren») con el objetivo del proyecto de español moderno y ampliamente legible. «Os digo» no es incorrecto, pero no es neutral latinoamericano. Una revisión leve a «Les aseguro» y «los que oigan» mejora naturalidad sin perder dignidad ni precisión.
  glossary_alignment: 'No hay conflictos con la terminología principal del proyecto: «Dios», «Hijo de Dios» y demás están bien. No aplica Yahvé/Mesías aquí. La principal observación es estilística y de equivalencia óptima: evitar formulaciones demasiado tradicionales cuando no son las más naturales en español contemporáneo.'
