translation:
  language: es
  text: Les aseguro[a] que viene una hora[b], y ahora es, cuando los muertos[c] oirán la voz del Hijo de Dios, y los que oigan[d] vivirán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Amén, amén, les digo».'
    reason: lexical_alternative
  - marker: b
    text: «Hora» también puede entenderse en sentido más amplio como «tiempo», pero el griego dice específicamente «hora».
    reason: lexical_alternative
  - marker: c
    text: «Los muertos» puede incluir aquí un sentido espiritual presente («y ahora es»), a la vez que anticipa la resurrección corporal en el contexto circundante.
    reason: cross_reference
  - marker: d
    text: 'O: «los que han oído vivirán».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀμὴν ἀμὴν
  english_pob_choice: Truly, truly
  chosen_spanish: De cierto[a], de cierto
  alternatives_spanish:
  - Amén, amén
  - Ciertamente, ciertamente
  lexicon: BDAG
  rationale: Conserva la repetición enfática y solemne del original. «De cierto» es una fórmula bíblica natural en español y comunica la fuerza declarativa sin depender de una transliteración que podría resultar menos clara para lectores generales.
- source_word: λέγω ὑμῖν
  english_pob_choice: I say to you
  chosen_spanish: os digo
  alternatives_spanish:
  - les digo
  - os hablo
  lexicon: BDAG
  rationale: Mantiene el valor directo de la primera persona singular con destinatarios explícitos. «Os digo» es una opción natural y digna en español bíblico, equivalente a «I say to you».
- source_word: ἔρχεται ὥρα
  english_pob_choice: an hour is coming
  chosen_spanish: viene una hora[b]
  alternatives_spanish:
  - la hora viene
  - llega una hora
  - viene un tiempo
  lexicon: BDAG
  rationale: Se conserva «hora» porque el griego usa ὥρα y el audit trail inglés evita generalizar a «time». En español, «viene una hora» reproduce la expresión breve y mantiene su peso escatológico.
- source_word: καὶ νῦν ἐστιν
  english_pob_choice: and now is
  chosen_spanish: y ahora es
  alternatives_spanish:
  - y ya es
  - y ahora está
  lexicon: BDAG
  rationale: Preserva la tensión entre futuro y presente sin explicarla. La forma breve «y ahora es» sigue de cerca el griego y sugiere la actualidad de la acción divina.
- source_word: οἱ νεκροὶ
  english_pob_choice: the dead
  chosen_spanish: los muertos
  alternatives_spanish:
  - los fallecidos
  - los que están muertos
  lexicon: BDAG
  rationale: '«Los muertos» es la equivalencia directa y conserva la ambigüedad deliberada señalada en el audit trail: puede abarcar tanto una resonancia espiritual presente como una futura resurrección corporal.'
- source_word: ἀκούσουσιν τῆς φωνῆς
  english_pob_choice: will hear the voice
  chosen_spanish: oirán la voz
  alternatives_spanish:
  - escucharán la voz
  - oirán el sonido
  lexicon: BDAG
  rationale: «Oír» refleja el verbo ἀκούω con genitivo de manera directa y evita introducir una matización exhortativa que no está en el texto. «Voz» conserva φωνή en su sentido personal.
- source_word: τοῦ υἱοῦ τοῦ θεοῦ
  english_pob_choice: of the Son of God
  chosen_spanish: del Hijo de Dios
  alternatives_spanish:
  - del Hijo de Dios Padre
  - del Hijo de Dios
  lexicon: BDAG
  rationale: Se mantiene el título cristológico completo y transparente. En español, «Hijo de Dios» es la forma natural y doctrinalmente clara, sin añadir explicaciones ajenas al versículo.
- source_word: οἱ ἀκούσαντες
  english_pob_choice: those who hear
  chosen_spanish: los que oyeren
  alternatives_spanish:
  - los que oyen
  - los que han oído
  lexicon: BDAG
  rationale: Se opta por un futuro de valor general o gnómico en «los que oyeren», que en español bíblico conserva bien la relación condicional-resultativa del participio aoristo. Evita la posible lectura de simple presente y mantiene la conexión con la respuesta a la voz del Hijo.
- source_word: ζήσουσιν
  english_pob_choice: will live
  chosen_spanish: vivirán
  alternatives_spanish:
  - volverán a vivir
  - estarán vivos
  lexicon: BDAG
  rationale: «Vivirán» reproduce el verbo ζάω de forma sobria y directa. El español no fuerza aquí una especificación de resurrección física que el versículo, por sí solo, aún no expresa de manera exclusiva.
theological_decisions:
- issue: Referente de «los muertos» en el contexto de Juan 5
  english_pob_reading: Rendered simply as 'the dead' without interpretive expansion, preserving the text's tension between present spiritual vivification and future bodily resurrection.
  chosen_spanish_reading: Se traduce simplemente «los muertos» sin expansión interpretativa, preservando la tensión entre vivificación espiritual presente y resurrección corporal futura.
  alternative_spanish_readings:
  - los espiritualmente muertos
  - los físicamente muertos
  rationale: El «y ahora es» del pasaje sugiere un cumplimiento presente, pero el contexto mayor de Juan 5 también apunta a la resurrección futura. La traducción no debe resolver esa tensión con una identificación doctrinal demasiado estrecha.
  doctrine_reference: Preservar la tensión teológica sin resolverla de antemano.
- issue: Título cristológico «el Hijo de Dios»
  english_pob_reading: Retained as 'the Son of God' in the main text.
  chosen_spanish_reading: Se retiene «el Hijo de Dios» en el texto principal.
  alternative_spanish_readings:
  - el Hijo de Dios
  rationale: Refleja directamente el griego y conserva la cristología del versículo sin añadir glosas explicativas. Es la formulación estándar, clara y plenamente fiel al texto.
  doctrine_reference: Credo Niceno (381), Calcedonia (451)
translation_notes:
  revision_awareness: El cotejo más reciente indica que no hubo cambios necesarios y que el acuerdo con el control de revisión fue alto. Esta versión conserva esa línea de estabilidad, manteniendo las decisiones principales del audit trail inglés y adaptándolas a un español natural sin perder la tensión semántica del original.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y «Hijo de Dios» para el título cristológico, conforme al criterio proyectual.
  - Se conserva la distinción entre oír/escuchar con «oír» para ἀκούω en este contexto.
  - Se usa «hora» y no «tiempo», siguiendo el valor específico del término en Juan.
  - Se evita sustituir «los muertos» por una glosa doctrinal que cierre la ambigüedad presente en el texto.
