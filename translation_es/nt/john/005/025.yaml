source:
  edition: SBLGNT
  text: Ἀμὴν ἀμὴν λέγω ὑμῖν ὅτι ἔρχεται ὥρα καὶ νῦν ἐστιν ὅτε οἱ νεκροὶ ⸀ἀκούσουσιν τῆς φωνῆς τοῦ υἱοῦ τοῦ θεοῦ καὶ οἱ ἀκούσαντες ⸀ζήσουσιν.
base_translation:
  language: en
  yaml_path: translation/nt/john/005/025.yaml
  text: Truly[a], truly, I say to you that an hour is coming, and now is, when the dead will hear the voice of the Son of God[d][c][b], and those who hear will live.
  footnotes:
  - marker: a
    text: Or, more formally, 'Amen, amen, I say to you.'
    reason: lexical_alternative
  - marker: b
    text: '''Hour'' can also be understood more broadly as ''time,'' but the Greek specifically says ''hour.'''
    reason: lexical_alternative
  - marker: c
    text: '''The dead'' may include a present spiritual sense here (''and now is'') while also anticipating bodily resurrection in the surrounding context.'
    reason: cross_reference
  - marker: d
    text: Or 'those who have heard will live.'
    reason: lexical_alternative
