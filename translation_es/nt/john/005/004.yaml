translation:
  language: es
  text: Porque[a] un ángel descendía de tiempo en tiempo al estanque y agitaba el agua. Entonces el primero que entraba en el estanque después de la agitación del agua quedaba sano[b] de cualquier enfermedad que lo afligiera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Este versículo, junto con la segunda mitad del versículo 3, falta en los papiros griegos más antiguos (como P66 y P75) y en manuscritos importantes del siglo IV (Sinaítico y Vaticano). Está presente en la tradición mayoritaria bizantina, así como en traducciones latinas y siriacas antiguas. Muchos estudiosos lo consideran una adición temprana de escriba para explicar por qué los enfermos se reunían junto al estanque.
    reason: textual_variant
  - marker: b
    text: 'O: ''se sanaba''.'
    reason: alternative_reading
lexical_decisions:
- source_word: Ἄγγελος
  english_pob_choice: an angel
  chosen_spanish: un ángel
  alternatives_spanish:
  - un mensajero
  lexicon: BDAG
  rationale: El griego usa ἄγγελος en el sentido normal de ‘ángel’ dentro de este relato. ‘Mensajero’ es posible léxicamente, pero el contexto del episodio del estanque y la tradición auditada de POB favorecen ‘ángel’.
- source_word: κατὰ καιρὸν
  english_pob_choice: from time to time
  chosen_spanish: de tiempo en tiempo
  alternatives_spanish:
  - de vez en cuando
  - periódicamente
  lexicon: BDAG
  rationale: La frase indica recurrencia ocasional, no una estación fija. ‘De tiempo en tiempo’ conserva bien esa periodicidad imprecisa y natural en español.
- source_word: κατέβαινεν
  english_pob_choice: would go down
  chosen_spanish: descendía
  alternatives_spanish:
  - bajaba
  - iba descendiendo
  lexicon: BDAG
  rationale: El imperfecto expresa acción repetida o habitual en el pasado; ‘descendía’ mantiene ese valor aspectual y el movimiento hacia abajo con dignidad estilística.
- source_word: ἐτάρασσεν τὸ ὕδωρ
  english_pob_choice: stir up the water
  chosen_spanish: agitaba el agua
  alternatives_spanish:
  - removía el agua
  - perturbaba el agua
  lexicon: BDAG
  rationale: Ἐτάρασσεν describe poner el agua en movimiento o alterarla. ‘Agitaba’ es una equivalencia clara y natural en español; ‘perturbaba’ suena más abstracto, y ‘removía’ puede sugerir mezcla más que turbulencia.
- source_word: ὁ οὖν πρῶτος ἐμβὰς
  english_pob_choice: the first one to step in
  chosen_spanish: el primero que entraba
  alternatives_spanish:
  - el primero que se metía
  - el primero en entrar
  lexicon: BDAG
  rationale: ἐμβὰς literalmente es ‘habiendo entrado / entrando’; en contexto se refiere a quien se introduce en el estanque. ‘Entraba’ conserva la idea de ingreso sin volver la frase demasiado técnica.
- source_word: μετὰ τὴν ταραχὴν τοῦ ὕδατος
  english_pob_choice: after the stirring of the water
  chosen_spanish: después de la agitación del agua
  alternatives_spanish:
  - tras el agitar del agua
  - después de que el agua era agitada
  lexicon: BDAG
  rationale: ‘Agitación’ reproduce τὴν ταραχήν de manera sustantiva y precisa. Mantiene la relación con el verbo anterior sin forzar una reexpresión perifrástica.
- source_word: ὑγιὴς ἐγίνετο
  english_pob_choice: would become well
  chosen_spanish: quedaba sano
  alternatives_spanish:
  - se hacía sano
  - sanaba
  lexicon: BDAG
  rationale: El imperfecto ἐγίνετο expresa el resultado habitual en pasado. ‘Quedaba sano’ comunica el estado resultante y evita una traducción demasiado clínica o moderna; ‘sanaba’ también sería posible, pero puede sonar menos explícita sobre el estado alcanzado.
- source_word: νοσήματι
  english_pob_choice: disease
  chosen_spanish: enfermedad
  alternatives_spanish:
  - padecimiento
  - mal
  lexicon: BDAG
  rationale: νοσήματι designa una enfermedad o afección. ‘Enfermedad’ es el equivalente más directo y claro en español contemporáneo.
- source_word: κατείχετο
  english_pob_choice: afflicted
  chosen_spanish: lo afligiera
  alternatives_spanish:
  - lo aquejara
  - lo tuviera atrapado
  lexicon: BDAG
  rationale: Con una enfermedad, κατέχω funciona idiomáticamente como ‘afligir / padecer’. La forma relativa ‘lo afligiera’ preserva el matiz de una afección que lo tenía bajo su dominio, sin volverlo mecánico.
theological_decisions:
- issue: Naturaleza textual del versículo
  english_pob_reading: This verse ... is absent from the earliest Greek papyri ... and major 4th-century manuscripts ... It is present in the Byzantine majority tradition ... widely viewed ... as an early scribal addition
  chosen_spanish_reading: Este versículo se traduce como parte del texto recibido, pero su transmisión es tardía y textual-mente disputada según el testimonio auditado.
  alternative_spanish_readings:
  - Omitir el versículo del texto principal
  - Trasladarlo a una nota textual extensa
  rationale: La POB inglesa conserva el versículo con nota crítica; el español debe reflejar la misma tensión textual sin resolverla artificialmente. Por eso se mantiene en el texto principal y se deja constancia de la variante en nota.
  doctrine_reference: Crítica textual del Nuevo Testamento; testimonio manuscrito
- issue: Sentido causal de la apertura con γάρ
  english_pob_reading: For an angel would go down...
  chosen_spanish_reading: Porque un ángel descendía...
  alternative_spanish_readings:
  - Pues un ángel descendía...
  - Y un ángel descendía...
  rationale: γάρ introduce la explicación de la escena previa; ‘Porque’ reproduce bien el valor explicativo-causal y mantiene el flujo argumental del pasaje.
  doctrine_reference: Conectores discursivos del griego koiné
translation_notes:
  revision_awareness: El texto español sigue la última forma auditada del POB inglés, conservando la imperfectividad repetida (‘descendía’, ‘entraba’, ‘quedaba’) y la formulación final de curación/resultados. También evita el marcador accidental que fue retirado en la revisión reciente del inglés, y mantiene el versículo completo en la línea principal con nota textual crítica.
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ solo cuando corresponde al Tetragrámaton; aquí no aparece.
  - Se prefirió ‘ángel’ por el sustantivo griego ἄγγελος en este contexto narrativo.
  - Se evitó ‘SEÑOR’ u otra sustitución reverencial no presente en el texto fuente.
  - ‘Agitaba el agua’ conserva la imagen física mejor que una paráfrasis abstracta.
  - La alternancia entre ‘descendía / entraba / quedaba’ preserva el valor iterativo del imperfecto griego.
