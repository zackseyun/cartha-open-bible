base_translation:
  language: en
  yaml_path: translation/nt/john/005/004.yaml
  text: For an angel would go down into the pool from time to time and stir up the water. Therefore, the first one to step in after the stirring of the water would become well from whatever disease afflicted him.
  footnotes:
  - marker: a
    text: This verse (along with the latter half of verse 3) is absent from the earliest Greek papyri (such as the 3rd-century Papyrus 66 and Papyrus 75) and major 4th-century manuscripts (Sinaiticus and Vaticanus). It is present in the Byzantine majority tradition, as well as early Latin and Syriac translations. It is widely viewed by scholars as an early scribal addition to explain why the disabled gathered at the pool.
    reason: textual_critical
  - marker: b
    text: Or 'became well'.
    reason: previous_rendering
