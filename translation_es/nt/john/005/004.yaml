revisions:
- from: Porque un ángel descendía de tiempo en tiempo al estanque y agitaba el agua. Entonces el primero que entraba después de la agitación del agua quedaba sano[a] de cualquier enfermedad que lo afligiera[b].
  to: Porque[a] un ángel descendía de tiempo en tiempo al estanque y agitaba el agua. Entonces el primero que entraba en el estanque después de la agitación del agua quedaba sano[b] de cualquier enfermedad que lo afligiera.
  rationale: Se reubica la nota textual crítica para que señale el versículo completo, no una palabra aislada; se corrige la nota alternativa para que ancle en 'quedaba sano', que es donde realmente existe la alternativa auditada; y se añade 'en el estanque' para mejorar la precisión y naturalidad del español sin alterar el sentido fuente.
