    issue: El marcador de la nota textual crítica [a] está colocado en 'sano'
    rationale: La nota trata de la autenticidad textual del versículo completo, no de la palabra 'sano'. Debe anclarse al inicio del versículo o a una unidad que señale claramente que afecta a todo el versículo.
  - severity: medium
