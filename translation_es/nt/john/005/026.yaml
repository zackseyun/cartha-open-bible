translation:
  language: es
  text: Porque, así como el Padre tiene vida en sí mismo[a], así también le concedió[b] al Hijo tener vida en sí mismo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Vida en sí mismo» puede entenderse como vida intrínseca a su propio ser; se conserva la formulación griega en vez de reemplazarla por la expresión teológica técnica «autoexistencia».
    reason: lexical_alternative
  - marker: b
    text: 'También puede traducirse: «le dio al Hijo tener vida en sí mismo». El verbo griego es el término ordinario para «dar»; aquí se ha preferido «concedió» por claridad natural y para reflejar una prerrogativa otorgada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὥσπερ γὰρ
  english_pob_choice: For just as
  chosen_spanish: Porque, así como
  alternatives_spanish:
  - Porque, tal como
  - Así como
  lexicon: BDAG
  rationale: Conserva la relación explicativa de γάρ mediante «Porque» y la comparación de ὥσπερ con «así como», en español natural y claro.
- source_word: ὁ πατὴρ
  english_pob_choice: the Father
  chosen_spanish: el Padre
  alternatives_spanish:
  - el Padre celestial
  - el Padre
  lexicon: BDAG
  rationale: Mantiene el título relacional y reverencial del contexto joánico sin añadir una expansión interpretativa innecesaria.
- source_word: ἔχει ζωὴν
  english_pob_choice: has life
  chosen_spanish: tiene vida
  alternatives_spanish:
  - posee vida
  - tiene vida
  lexicon: BDAG
  rationale: «Tiene vida» sigue de cerca el verbo ἔχει y su objeto directo, preservando la sencillez del enunciado.
- source_word: ζωὴν ἐν ἑαυτῷ
  english_pob_choice: life in himself
  chosen_spanish: vida en sí mismo
  alternatives_spanish:
  - vida dentro de sí mismo
  - vida intrínseca en sí mismo
  lexicon: BDAG
  rationale: Mantiene explícita la frase griega sin convertirla en un tecnicismo como «autoexistencia»; «en sí mismo» preserva el paralelismo con la segunda mitad del versículo.
- source_word: οὕτως καὶ
  english_pob_choice: so he also
  chosen_spanish: así también
  alternatives_spanish:
  - de la misma manera también
  - así también
  lexicon: BDAG
  rationale: Reproduce la estructura correlativa con una formulación breve y fluida en español.
- source_word: τῷ υἱῷ
  english_pob_choice: the Son
  chosen_spanish: al Hijo
  alternatives_spanish:
  - al Hijo
  - al Hijo de Dios
  lexicon: BDAG
  rationale: El dativo se expresa naturalmente con «al Hijo»; se conserva el título cristológico sin ampliarlo.
- source_word: ἔδωκεν
  english_pob_choice: granted
  chosen_spanish: le concedió
  alternatives_spanish:
  - le dio
  - le otorgó
  lexicon: BDAG
  rationale: «Concedió» comunica mejor que «dio» la idea de conferir una prerrogativa, siguiendo la decisión auditada del inglés POB de evitar una literalidad plana.
- source_word: ζωὴν ἔχειν
  english_pob_choice: to have life
  chosen_spanish: tener vida
  alternatives_spanish:
  - a tener vida
  - para tener vida
  lexicon: BDAG
  rationale: Infinitivo natural en español que refleja la construcción complementaria μετά de ἔδωκεν sin forzar el orden griego.
- source_word: ἐν ἑαυτῷ
  english_pob_choice: in himself
  chosen_spanish: en sí mismo
  alternatives_spanish:
  - dentro de sí mismo
  - en él mismo
  lexicon: BDAG
  rationale: Conserva la repetición exacta de la frase, importante para el paralelismo y la tensión teológica del pasaje.
theological_decisions:
- issue: Si traducir la frase como una afirmación técnica de 'autoexistencia'
  english_pob_reading: Retain the wording 'life in himself' without importing a technical theological term.
  chosen_spanish_reading: Mantener «vida en sí mismo» sin introducir «autoexistencia» ni otra fórmula doctrinal técnica.
  alternative_spanish_readings:
  - vida autoexistente
  - vida por sí mismo
  rationale: La expresión griega comunica una vida propia e intrínseca, pero el texto no usa un tecnicismo. La traducción preserva esa fuerza sin cerrar la tensión teológica mediante una glosa sistemática.
  doctrine_reference: Juan 5:26; preservación de la tensión textual; ortodoxia nicena sin sobreinterpretación terminológica.
- issue: Cómo reflejar el verbo ἔδωκεν respecto de la relación Padre-Hijo
  english_pob_reading: Translate as 'granted' in a way that preserves the text's language of giving without diminishing the Son's full divinity.
  chosen_spanish_reading: Traducir con «le concedió» para conservar el lenguaje de donación/concesión sin debilitar la divinidad plena del Hijo.
  alternative_spanish_readings:
  - le dio
  - le otorgó
  rationale: «Concedió» expresa mejor una concesión de prerrogativa que un simple acto de dar, y deja intacta la afirmación joánica en su marco trinitario.
  doctrine_reference: Credo Niceno-Constantinopolitano (381 d. C.); preservación de la tensión teológica.
translation_notes:
  revision_awareness: La versión sigue de cerca el griego SBLGNT y concuerda con el análisis auditado del inglés POB. No se registran revisiones aplicadas; el último pase confirmó alta concordancia y dejó el texto sin cambios.
  spanish_consistency_notes:
  - Se mantiene «Padre» y «Hijo» como títulos con mayúscula inicial en sentido cristológico.
  - Se conserva la repetición de «en sí mismo» para reflejar el paralelismo del original.
  - «Concedió» se usa de manera consistente con la decisión inglesa auditada de «granted», evitando una banalización de ἔδωκεν.
  - No se introduce «SEÑOR» ni «Cristo» porque el versículo no los contiene.
  - La puntuación reproduce la cadencia de dos cláusulas comparativas con coma central.
