base_translation:
  language: en
  yaml_path: translation/nt/john/005/026.yaml
  text: For just as the Father has life in himself[b][a], so he also granted the Son to have life in himself.
  footnotes:
  - marker: a
    text: Or 'gave the Son to have life in himself.' The Greek verb is the ordinary word for 'gave'; 'granted' is used in the main text for natural English and to reflect bestowed prerogative.
    reason: lexical_alternative
  - marker: b
    text: '''Life in himself'' may be understood as life intrinsic to one''s own being; the translation preserves the Greek wording rather than using the theological shorthand ''self-existent life.'''
    reason: lexical_alternative
