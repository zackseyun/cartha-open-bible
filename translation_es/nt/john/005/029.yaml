- from: y saldrán—los que han hecho el bien para la resurrección de la vida[a], pero los que han hecho lo malo para la resurrección del juicio.
  to: 'y saldrán: los que han hecho el bien, a resurrección de vida; pero los que han hecho el mal, a resurrección de juicio[a].'
  rationale: 'Se ajusta la sintaxis española para sonar natural y mantener el paralelismo formal del griego: «a resurrección de vida / a resurrección de juicio». También se mejora la simetría moral con «el bien / el mal». La nota se ancla correctamente en «juicio», que es donde aparece la alternativa relevante.'
