review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del griego: ἐκπορεύσονται = «saldrán», contraste marcado por δὲ = «pero», y κρίσεως correctamente preservado como «juicio» en vez de «condenación». Sin embargo, dos giros españoles se alejan de la mejor correspondencia y naturalidad: «para la resurrección...» suena menos fiel que «a/para resurrección de...», y sobre todo «la resurrección de la vida» es poco idiomático en español bíblico actual para ἀνάστασιν ζωῆς, donde «resurrección de vida» preserva mejor el paralelismo con «resurrección de juicio».'
  spanish_quality_summary: El texto es claro, pero «para la resurrección de la vida» y «para la resurrección del juicio» suenan pesados y algo antinaturales. En español digno y legible, «para resurrección de vida» / «para resurrección de juicio» o «a resurrección de vida» / «a resurrección de juicio» fluye mejor y conserva la simetría formal del original. El resto del verso es bien legible.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «juicio» para κρίσις está correctamente alineado con la decisión teológica documentada. «han hecho el bien / lo malo» es aceptable, aunque para mayor simetría abstracta puede preferirse «el mal» frente a «lo malo».
  issues:
  - severity: medium
    issue: «la resurrección de la vida» suena menos natural y menos preciso que «resurrección de vida»
    rationale: El genitivo ζωῆς en la expresión paralela ἀνάστασιν ζωῆς / ἀνάστασιν κρίσεως se preserva mejor en español sin insertar el artículo «la», que hace la frase más torpe y rompe la simetría con la segunda cláusula.
  - severity: medium
    issue: «para la resurrección...» es una preposición poco idiomática aquí
    rationale: 'εἰς en este contexto de resultado/destino se expresa mejor en español con «a» o con «para» sin artículo: «a resurrección de vida» o «para resurrección de vida». La forma actual suena traducción-calco.'
  - severity: low
    issue: Asimetría menor entre «el bien» y «lo malo»
    rationale: No es incorrecto, pero «el bien ... el mal» ofrece mejor paralelismo conceptual en español para dos neutros sustantivados de valor moral.
  revised_spanish_text: 'y saldrán: los que han hecho el bien, a resurrección de vida; pero los que han hecho el mal, a resurrección de juicio[a].'
  revised_footnotes:
  - marker: a
    text: O «a resurrección de condenación». El griego dice «juicio», que es más amplio; «condenación» refleja una interpretación más estrecha presente en algunas traducciones.
    reason: alternative_reading
  revision_rationale: 'Se ajusta la sintaxis española para sonar natural y mantener el paralelismo formal del griego: «a resurrección de vida / a resurrección de juicio». También se mejora la simetría moral con «el bien / el mal». La nota se ancla correctamente en «juicio», que es donde aparece la alternativa relevante.'
