translation:
  language: es
  text: 'y saldrán: los que han hecho el bien, a resurrección de vida; pero los que han hecho el mal, a resurrección de juicio[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a resurrección de condenación». El griego dice «juicio», que es más amplio; «condenación» refleja una interpretación más estrecha presente en algunas traducciones.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐκπορεύσονται
  english_pob_choice: will come out
  chosen_spanish: saldrán
  alternatives_spanish:
  - saldrán fuera
  - saldrán afuera
  - saldrán de allí
  lexicon: BDAG
  rationale: En este contexto de los muertos que oyen la voz del Hijo y salen de los sepulcros, «saldrán» comunica con naturalidad la acción de salir. Conserva el movimiento del griego sin sonar forzado en español.
- source_word: τὰ ἀγαθὰ
  english_pob_choice: good
  chosen_spanish: el bien
  alternatives_spanish:
  - cosas buenas
  - lo bueno
  - el bien moral
  lexicon: BDAG
  rationale: El sustantivo neutro con artículo funciona de modo sustantivado. «El bien» preserva bien ese valor abstracto y moral, sin añadir una palabra innecesaria.
- source_word: ποιήσαντες
  english_pob_choice: have done
  chosen_spanish: han hecho
  alternatives_spanish:
  - hicieron
  - han practicado
  - han realizado
  lexicon: BDAG
  rationale: El aoristo participial se vierte con un perfecto natural en español. «Han hecho» mantiene la correspondencia con el paralelo siguiente y evita diferenciar artificialmente entre los dos verbos griegos donde el inglés POB no impuso una distinción fuerte.
- source_word: ἀνάστασιν ζωῆς
  english_pob_choice: the resurrection of life
  chosen_spanish: la resurrección de la vida
  alternatives_spanish:
  - la resurrección para vida
  - la resurrección a la vida
  lexicon: BDAG
  rationale: Se conserva la estructura genitiva casi literalmente porque el texto contrasta dos resurrecciones paralelas. «De la vida» mantiene la forma formal y deja que el contexto explique el sentido.
- source_word: φαῦλα
  english_pob_choice: evil
  chosen_spanish: lo malo
  alternatives_spanish:
  - el mal
  - cosas malas
  - lo perverso
  lexicon: BDAG
  rationale: φαῦλος puede abarcar lo moralmente malo o despreciable. En español, «lo malo» refleja esa cualidad moral sin introducir una carga más técnica o más intensa de la que exige el texto.
- source_word: πράξαντες
  english_pob_choice: have done
  chosen_spanish: han hecho
  alternatives_spanish:
  - han practicado
  - han cometido
  lexicon: BDAG
  rationale: Aunque πράσσω a veces sugiere conducta continuada, el audit trail revisó la redacción inglesa para alinear ambos miembros con «have done». Por eso en español se mantiene «han hecho» para conservar paralelismo y fidelidad léxica.
- source_word: ἀνάστασιν κρίσεως
  english_pob_choice: the resurrection of judgment
  chosen_spanish: la resurrección del juicio
  alternatives_spanish:
  - la resurrección de juicio
  - la resurrección de condenación
  lexicon: BDAG
  rationale: κρίσις significa primariamente «juicio». Se evita estrecharlo a «condenación», porque el POB inglés preserva la amplitud del término y la tensión teológica del versículo. «Del juicio» suena más natural que «de juicio» en español y mantiene la relación nominal.
- source_word: δὲ
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - y
  - mas
  lexicon: BDAG
  rationale: La partícula marca contraste entre los dos grupos y sus destinos. «Pero» expresa de forma clara y directa ese contraste.
theological_decisions:
- issue: Cómo traducir κρίσεως sin reducirlo a condenación
  english_pob_reading: the resurrection of judgment
  chosen_spanish_reading: la resurrección del juicio
  alternative_spanish_readings:
  - la resurrección de condenación
  - la resurrección para condenación
  rationale: El griego dice «juicio», no «condenación». Traducirlo como «juicio» conserva la amplitud semántica y deja que el contexto determine la gravedad de la sentencia, en vez de introducir una conclusión doctrinal más específica de la que el texto formula.
  doctrine_reference: Preservar la tensión teológica; no estrechar κρίσις más allá del texto.
translation_notes:
  revision_awareness: El texto inglés revisado cambió de «have practiced evil» a «have done evil» para ajustar mejor el paralelismo con «have done good». La presente versión española sigue esa revisión y usa «han hecho» en ambos miembros, manteniendo correspondencia lexical y ritmo paralelo. También conserva κρίσις como «juicio», en línea con el audit trail que rechazó estrechar el término a «condemnation».
  spanish_consistency_notes:
  - Se usa «Yahvé» en este proyecto cuando el texto lo requiera, pero este versículo no contiene el nombre divino.
  - Se mantiene la estructura paralela «los que han hecho… pero los que han hecho…» para reflejar el contraste del griego.
  - «Juicio» se conserva como término amplio y no se sustituye por vocabulario eclesiástico más estrecho.
  - La puntuación con raya ayuda a reflejar el giro explicativo del original y la pausa retórica del inglés POB.
