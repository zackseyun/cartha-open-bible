translation:
  language: es
  text: En estas yacía una multitud de los enfermos, ciegos, cojos y paralíticos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «marchitos». El griego literalmente significa «secos» o «marchitos», probablemente con referencia a miembros secos o contraídos.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ταύταις
  english_pob_choice: In these
  chosen_spanish: En estas
  alternatives_spanish:
  - En ellas
  - En estos pórticos
  lexicon: BDAG
  rationale: Mantiene el deíctico femenino plural y deja que el antecedente se recupere del contexto inmediato, como hace la versión inglesa. No se añade «pórticos», porque el griego de este versículo no lo expresa.
- source_word: κατέκειτο
  english_pob_choice: lay
  chosen_spanish: yacía
  alternatives_spanish:
  - estaba tendida
  - estaba acostada
  lexicon: BDAG
  rationale: El imperfecto de κατάκειμαι expresa una अवस्था continua de estar echado o tendido. «Yacía» conserva la imagen y funciona de manera natural en español narrativo.
- source_word: πλῆθος
  english_pob_choice: a multitude
  chosen_spanish: una multitud
  alternatives_spanish:
  - una gran cantidad
  - un gentío
  lexicon: BDAG
  rationale: «Multitud» conserva el valor colectivo y elevado del sustantivo griego sin convertirlo en una simple cifra o en una escena de movimiento social.
- source_word: τῶν ἀσθενούντων
  english_pob_choice: of the sick
  chosen_spanish: de los enfermos
  alternatives_spanish:
  - de los que estaban enfermos
  - de los débiles
  lexicon: BDAG
  rationale: El participio aquí designa a personas físicamente afligidas; «enfermos» es el equivalente más natural. «Débiles» sería más amplio y podría desviar el sentido hacia debilidad general.
- source_word: τυφλῶν
  english_pob_choice: blind
  chosen_spanish: ciegos
  alternatives_spanish:
  - los ciegos
  lexicon: BDAG
  rationale: La lista adjetival se vierte en forma sustantivada breve en español. «Ciegos» es directo y mantiene el paralelismo con los términos siguientes.
- source_word: χωλῶν
  english_pob_choice: lame
  chosen_spanish: cojos
  alternatives_spanish:
  - lisiados
  lexicon: BDAG
  rationale: χωλός describe a quienes tienen impedida la marcha. «Cojos» es el equivalente más directo y usual en español; «lisiados» es más general y menos específico para la marcha.
- source_word: ξηρῶν
  english_pob_choice: paralyzed
  chosen_spanish: paralíticos
  alternatives_spanish:
  - secos
  - mutilados
  lexicon: BDAG
  rationale: Aunque el sentido literal de ξηρός es «seco» o «marchito», en contexto corporal se refiere a miembros secados o atrofiados. El inglés POB opta por «paralyzed» por sentido; en español, «paralíticos» comunica esa misma condición funcional sin perder la relación con la nota lexical de «seco/marchito».
translation_notes:
  revision_awareness: El texto sigue de cerca el pasaje base griego de Juan 5:3 y conserva la decisión del POB inglés de tratar ξηρῶν por sentido contextual, sin introducir una paráfrasis mayor. La única nota léxica se mantiene para no borrar la tensión entre el sentido literal («secos/marchitos») y el sentido funcional en contexto.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece.
  - Se mantiene el registro sobrio y narrativo, sin calcos innecesarios.
  - La lista de condiciones físicas se vierte con términos breves y paralelos para conservar el ritmo del griego.
