translation:
  language: es
  text: No se asombren de esto, porque viene una hora en que todos los que están en los sepulcros[a] oirán su voz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'tumbas' o 'sepulturas'. El griego μνημεῖα puede referirse en general a lugares de entierro; 'sepulcros' se eligió para conservar la imagen concreta.
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ θαυμάζετε
  english_pob_choice: Do not marvel
  chosen_spanish: No se asombren
  alternatives_spanish:
  - No se maravillen
  - No se admiren
  lexicon: BDAG
  rationale: El imperativo prohibitivo pide una negación directa. En español, 'asombrarse' comunica bien el sentido de θαυμάζω sin sonar forzado; 'maravillarse' es posible, pero puede sonar más literario o más cercano a 'wonder' que al registro exhortativo aquí.
- source_word: τοῦτο
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - esta cosa
  - lo de esto
  lexicon: BDAG
  rationale: El demostrativo es directo y se refiere a la afirmación inmediata previa; 'esto' conserva la referencia simple y transparente.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - pues
  - que
  lexicon: BDAG
  rationale: '''Porque'' expresa con claridad la relación causal introducida por ὅτι y suena natural en español moderno.'
- source_word: ἔρχεται ὥρα
  english_pob_choice: an hour is coming
  chosen_spanish: viene la hora
  alternatives_spanish:
  - se acerca la hora
  - la hora viene
  - viene un tiempo
  lexicon: BDAG
  rationale: Se mantiene la imagen johánica de ὥρα con 'la hora', que conserva el peso teológico del término. 'Viene' refleja ἔρχεται de manera natural en español, y evita una construcción más pesada como 'está viniendo'.
- source_word: ἐν ᾗ
  english_pob_choice: in which
  chosen_spanish: en que
  alternatives_spanish:
  - cuando
  - en la cual
  lexicon: BDAG
  rationale: La relativa temporal se puede decir de manera más natural como 'en que' en español, sin perder la relación formal con el griego. 'Cuando' sería más fluido, pero suaviza más la estructura.
- source_word: πάντες οἱ ἐν τοῖς μνημείοις
  english_pob_choice: all who are in the tombs
  chosen_spanish: todos los que están en los sepulcros[a]
  alternatives_spanish:
  - todos los que están en las tumbas[a]
  - todos los que están en las sepulturas[a]
  - todos los que están en los sepulcros
  lexicon: BDAG
  rationale: '''Sepulcros'' preserva el campo concreto de μνημεῖον y encaja con la imagen de entierro sin diluirla en un término genérico. Se añade una nota porque el término puede abarcar ''tombs'' / ''graves'' / lugares de sepultura; en español, ''sepulcros'' mantiene la concreción pero no agota todas las posibilidades léxicas.'
- source_word: ἀκούσουσιν
  english_pob_choice: will hear
  chosen_spanish: oirán
  alternatives_spanish:
  - escucharán
  - van a oír
  lexicon: BDAG
  rationale: El futuro simple expresa bien el valor del verbo en la promesa. 'Oír' es la equivalencia más directa para ἀκούω aquí; 'escuchar' sugeriría más atención voluntaria de la que exige el texto.
- source_word: τῆς φωνῆς αὐτοῦ
  english_pob_choice: his voice
  chosen_spanish: su voz
  alternatives_spanish:
  - la voz de él
  - la voz de él mismo
  lexicon: BDAG
  rationale: φωνή en contexto personal se traduce naturalmente por 'voz'. El posesivo español 'su' reproduce de forma idiomática el genitivo pronominal griego.
theological_decisions:
- issue: Imagen concreta de resurrección en 'los que están en los sepulcros'
  english_pob_reading: Retain the concrete burial image 'tombs' without importing an explicit doctrinal explanation into the verse.
  chosen_spanish_reading: Mantener la imagen concreta de 'sepulcros' sin añadir una explicación doctrinal explícita en el versículo.
  alternative_spanish_readings:
  - usar 'tumbas'
  - usar 'graves'
  - explicitar 'los muertos'
  rationale: El texto presenta la escena de forma concreta y sobria. 'Sepulcros' conserva el marco funerario y deja intacta la tensión teológica implícita sobre la resurrección, sin resolverla dentro de la traducción.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: 'Coincide con el pasaje auditado de alta concordancia: no hubo revisiones posteriores y la decisión inglesa clave se mantuvo estable. La versión española sigue ese trazado, conservando la imagen concreta de μνημεῖον y el valor causal de ὅτι sin añadir expansión doctrinal.'
  spanish_consistency_notes:
  - Se mantuvo el tono imperativo negativo con tratamiento plural, acorde al contexto.
  - Se preservó 'la hora' como expresión con peso joánico, en lugar de rebajarla a 'tiempo'.
  - Se evitó 'escucharán' para no introducir una matización de atención voluntaria ausente en ἀκούω.
  - La nota de pie distingue la posible alternativa léxica sin desplazar la opción principal del texto.
  - Se usó 'sepulcros' como término digno y transparente, más cercano al campo de μνημεῖον que un simple 'tumbas'.
