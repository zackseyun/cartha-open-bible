translation:
  language: es
  text: No puedo hacer nada de mí mismo[a]; así como oigo, juzgo, y mi juicio es justo, porque no busco mi propia voluntad, sino la voluntad del que me envió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no puedo hacer nada por mi propia cuenta». La frase griega puede enfatizar actuar de manera independiente; aquí se traduce «de mí mismo» para conservar tanto el sentido de fuente como el de independencia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὐ δύναμαι ἐγὼ
  english_pob_choice: I am not able
  chosen_spanish: No puedo
  alternatives_spanish:
  - No soy capaz de
  - No tengo poder para
  lexicon: BDAG
  rationale: En español, «no puedo» reproduce de forma natural la negación de capacidad de δύναμαι y mantiene el énfasis del ἐγώ sin sonar forzado. «No soy capaz de» es más explícito pero menos idiomático; «no tengo poder para» añade matiz que no exige el griego.
- source_word: ποιεῖν ἀπ’ ἐμαυτοῦ οὐδέν
  english_pob_choice: to do anything from myself
  chosen_spanish: hacer nada por mí mismo
  alternatives_spanish:
  - hacer nada por mi propia cuenta
  - hacer nada de mí mismo
  lexicon: BDAG
  rationale: La POB en inglés preserva la idea de origen/independencia; en español, «por mí mismo» comunica bien la acción independiente sin perder el sentido relacional. «De mí mismo» suena menos natural; «por mi propia cuenta» explicita independencia pero puede sonar más interpretativo.
- source_word: καθὼς
  english_pob_choice: Just as
  chosen_spanish: así como
  alternatives_spanish:
  - tal como
  - del mismo modo que
  lexicon: BDAG
  rationale: «Así como» conserva la relación de correspondencia entre oír y juzgar y suena fluido en español bíblico contemporáneo.
- source_word: ἀκούω
  english_pob_choice: I hear
  chosen_spanish: oigo
  alternatives_spanish:
  - escucho
  - oyendo
  lexicon: BDAG
  rationale: «Oigo» sigue el presente simple del griego y evita cargar el verbo con una intención que «escucho» podría sugerir en algunos contextos.
- source_word: κρίνω
  english_pob_choice: I judge
  chosen_spanish: juzgo
  alternatives_spanish:
  - doy juicio
  - decido
  lexicon: BDAG
  rationale: «Juzgo» mantiene la continuidad léxica con κρίσις/juicio en la misma oración y refleja el campo judicial del término.
- source_word: ἡ κρίσις ἡ ἐμὴ
  english_pob_choice: my judgment
  chosen_spanish: mi juicio
  alternatives_spanish:
  - mi sentencia
  - el juicio que es mío
  lexicon: BDAG
  rationale: «Juicio» es el correlato más natural de κρίνω en español y conserva la dimensión judicial sin introducir tecnicismos ajenos al texto.
- source_word: δικαία
  english_pob_choice: just
  chosen_spanish: justo
  alternatives_spanish:
  - recto
  - righteous
  lexicon: BDAG
  rationale: «Justo» expresa adecuación y corrección judicial en español; «recto» es posible pero menos idiomático aquí. Se preserva así la fuerza de la valoración del juicio sin diluirla.
- source_word: ζητῶ
  english_pob_choice: I seek
  chosen_spanish: busco
  alternatives_spanish:
  - procuro
  - persigo
  lexicon: BDAG
  rationale: «Busco» es la equivalencia más directa y natural para ζητέω en este contexto volitivo.
- source_word: τὸ θέλημα τὸ ἐμὸν
  english_pob_choice: my own will
  chosen_spanish: mi propia voluntad
  alternatives_spanish:
  - mi voluntad
  - lo que yo quiero
  lexicon: BDAG
  rationale: «Mi propia voluntad» conserva el énfasis del posesivo griego y evita reducir la expresión a una simple preferencia personal.
- source_word: τοῦ πέμψαντός με
  english_pob_choice: the one who sent me
  chosen_spanish: del que me envió
  alternatives_spanish:
  - del que me ha enviado
  - de quien me envió
  lexicon: BDAG
  rationale: «Del que me envió» sigue de cerca la forma participial sin imponer «Padre», ya que el griego usa una descripción relacional. En español, la elipsis de «el» tras «de» es natural y clara.
theological_decisions:
- issue: ἀπ’ ἐμαυτοῦ y la dependencia del Hijo respecto del Padre
  english_pob_reading: Rendered as 'from myself' to express non-independent action/source rather than inability in an absolute or ontological sense.
  chosen_spanish_reading: «por mí mismo» para expresar acción independiente, no una incapacidad absoluta u ontológica.
  alternative_spanish_readings:
  - «de mí mismo»
  - «por mi propia cuenta»
  rationale: 'La formulación española debe preservar la tensión teológica joánica: el Hijo no actúa de manera autónoma del Padre, pero el texto no niega su divinidad ni su competencia. «Por mí mismo» comunica bien la independencia evitada sin oscurecer el sentido.'
  doctrine_reference: Credo Niceno-constantinopolitano (381); Definición de Calcedonia (451)
- issue: δικαία con κρίσις
  english_pob_reading: Rendered as 'just' rather than 'righteous.'
  chosen_spanish_reading: «justo» en lugar de «recto» o una opción más marcadamente moral.
  alternative_spanish_readings:
  - «recto»
  - «righteous»
  rationale: En un contexto judicial, «justo» es la forma más natural y exacta en español. Mantiene la idea de corrección/fairness sin desplazar el matiz jurídico del pasaje.
  doctrine_reference: Principio de equivalencia óptima aplicado al campo judicial del texto
translation_notes:
  revision_awareness: El texto sigue el audit trail inglés de la POB y corrige la colocación del marcador de nota, anclándolo explícitamente en «por mí mismo» para que la alternativa léxica quede visible en la línea principal. No se introdujeron cambios de sentido respecto del griego ni de las decisiones auditadas en inglés.
  spanish_consistency_notes:
  - Se mantuvo la cadena judicial con «juzgo / juicio / justo» para reflejar κρίνω / κρίσις / δικαία.
  - Se evitó traducir τοῦ πέμψαντός με como «mi Padre» porque el griego usa una descripción relacional, no el término explícito.
  - «Voluntad» se conservó para θέλημα por su uso estable en español bíblico y su adecuación al contexto de intención divina.
  - La nota [a] está anclada en «por mí mismo» y no se deja ninguna nota sin marcador en el texto principal.
