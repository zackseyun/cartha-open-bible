translation:
  language: es
  text: Si yo testifico acerca de mí mismo, mi testimonio no es verdadero[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mi testimonio no es válido», reflejando el marco legal del testimonio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐὰν
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  - Si es que
  lexicon: BDAG
  rationale: La condicional simple de Ἐὰν se expresa naturalmente en español con 'Si', sin añadir matiz iterativo que el contexto no exige.
- source_word: ἐγὼ
  english_pob_choice: I
  chosen_spanish: yo
  alternatives_spanish:
  - yo mismo
  - —
  lexicon: BDAG
  rationale: 'Se conserva el pronombre explícito para reflejar el énfasis leve del griego. En español puede anteponerse para mantener la fuerza enfática: ''Si yo...''.'
- source_word: μαρτυρῶ
  english_pob_choice: testify
  chosen_spanish: doy testimonio
  alternatives_spanish:
  - testifico
  - doy testimonio como testigo
  lexicon: BDAG
  rationale: '''Dar testimonio'' comunica de modo natural el sentido forense de μαρτυρέω en español y evita un tecnicismo innecesario.'
- source_word: περὶ ἐμαυτοῦ
  english_pob_choice: about myself
  chosen_spanish: acerca de mí mismo
  alternatives_spanish:
  - sobre mí mismo
  - con respecto a mí mismo
  lexicon: BDAG
  rationale: '''Acerca de'' reproduce bien περὶ con genitivo y mantiene el sentido inmediato de referencia personal, sin convertirlo de entrada en ''en mi propio favor''.'
- source_word: ἡ μαρτυρία μου
  english_pob_choice: my testimony
  chosen_spanish: mi testimonio
  alternatives_spanish:
  - mi declaración
  - mi testimonio como testigo
  lexicon: BDAG
  rationale: '''Testimonio'' conserva el vínculo léxico con μαρτυρῶ y es la forma más natural en español para este contexto legal-evidencial.'
- source_word: οὐκ ἔστιν ἀληθής
  english_pob_choice: is not true
  chosen_spanish: no es verdadero
  alternatives_spanish:
  - no es válido
  - no es auténtico
  lexicon: BDAG
  rationale: Se mantiene la fuerza literal de ἀληθής con 'verdadero', preservando la tensión interpretativa que el contexto posterior desarrolla. 'No es válido' explicita una lectura jurídica, pero no se hace primaria en el texto.
theological_decisions:
- issue: Cómo expresar la afirmación de que el testimonio de Jesús 'no es verdadero' sin suavizar la tensión interpretativa
  english_pob_reading: Render the clause straightforwardly as 'my testimony is not true' without softening it to purely legal language.
  chosen_spanish_reading: 'Traducir de forma directa: ''mi testimonio no es verdadero'', dejando que el contexto judicial del pasaje precise la fuerza de la afirmación.'
  alternative_spanish_readings:
  - mi testimonio no es válido
  - mi testimonio no es admisible
  rationale: El griego usa ἀληθής ('verdadero'), por lo que el español debe conservar esa palabra y no resolver de antemano la cuestión jurídica. Así se respeta la tensión del discurso y la lectura se aclara por el contexto inmediato, no por una paráfrasis interpretativa.
  doctrine_reference: Preservar la tensión teológica y discursiva del texto; no resolverla prematuramente.
translation_notes:
  revision_awareness: El texto inglés auditado ya había sido revisado y quedó sin cambios, con acuerdo alto entre evaluadores. La versión española sigue esa misma decisión de no suavizar la cláusula final, manteniendo la ambigüedad entre verdad y validez jurídica.
  spanish_consistency_notes:
  - Se usa 'testimonio' de manera consistente para μαρτυρία y el verbo relacionado, manteniendo el campo léxico forense.
  - Se evita 'SEÑOR' u otras sustituciones no presentes en este versículo.
  - 'La puntuación y la estructura siguen el orden lógico del griego: condicional, objeto del testimonio, y predicado final.'
