translation:
  language: es
  text: Hay otro que da testimonio acerca de mí[a], y sé que el testimonio que él da acerca de mí es verdadero.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que testifica acerca de mí».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄλλος
  english_pob_choice: another
  chosen_spanish: otro
  alternatives_spanish:
  - uno más
  - alguien más
  lexicon: BDAG
  rationale: ἄλλος señala a una persona adicional o distinta. En español, «otro» conserva de forma natural esa referencia sin identificar al testigo, como hace el texto griego y la traducción inglesa auditada.
- source_word: ὁ μαρτυρῶν
  english_pob_choice: who testifies
  chosen_spanish: que da testimonio
  alternatives_spanish:
  - que testifica
  - el que da testimonio
  lexicon: BDAG
  rationale: 'El participio articular funciona como sustantivo: «el que testifica / da testimonio». «Que da testimonio» fluye bien en español y mantiene el sentido verbal continuo sin imponer una terminología eclesiástica más fija de la necesaria.'
- source_word: περὶ ἐμοῦ
  english_pob_choice: about me
  chosen_spanish: acerca de mí
  alternatives_spanish:
  - sobre mí
  - con respecto a mí
  lexicon: BDAG
  rationale: περί con genitivo expresa referencia o materia. «Acerca de mí» es idiomático en español y conserva el valor de referencia del original.
- source_word: οἶδα
  english_pob_choice: I know
  chosen_spanish: yo sé
  alternatives_spanish:
  - sé
  - yo conozco
  lexicon: BDAG
  rationale: οἶδα expresa conocimiento cierto. «Yo sé» refleja con claridad ese valor; se conserva el pronombre para reproducir el énfasis del griego y la estructura del contexto.
- source_word: ἀληθής
  english_pob_choice: 'true'
  chosen_spanish: verdadero
  alternatives_spanish:
  - cierto
  - fiel
  lexicon: BDAG
  rationale: Aquí ἀληθής califica al testimonio como verdadero, genuino o fiable. «Verdadero» es la opción más directa y natural en español para esa cualidad del testimonio.
- source_word: ἡ μαρτυρία
  english_pob_choice: the testimony
  chosen_spanish: el testimonio
  alternatives_spanish:
  - el testimonio dado
  - la declaración
  lexicon: BDAG
  rationale: μαρτυρία tiene un matiz forense/jurídico de testimonio. «El testimonio» preserva ese campo semántico y encaja con la repetición deliberada del verso.
- source_word: ἣν μαρτυρεῖ
  english_pob_choice: which he testifies
  chosen_spanish: que él da
  alternatives_spanish:
  - que él testifica
  - que él testimonia
  lexicon: BDAG
  rationale: El griego repite la misma raíz (μαρτυρ-), lo que produce una redundancia estilística joánica. En español se mantiene la relación léxica con «testimonio» y «da testimonio»; se evita una formulación demasiado pesada, pero se conserva la idea de que ese testimonio es precisamente el que él da acerca de Jesús.
theological_decisions:
- issue: Identidad de «otro» (ἄλλος)
  english_pob_reading: The translation keeps 'another' without identifying the referent, preserving the text's level of specificity.
  chosen_spanish_reading: La traducción mantiene «otro» sin precisar quién es, preservando la indefinición del texto.
  alternative_spanish_readings:
  - Juan el Bautista
  - el Padre
  - otro testigo en sentido jurídico
  rationale: El verso no identifica explícitamente al testigo. Aunque el contexto más amplio guía la interpretación, la traducción no debe insertar una identificación que el versículo no proporciona. Esto preserva la tensión teológica y el valor argumentativo del pasaje.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: La redacción sigue la revisión del inglés auditado que hizo explícita la estructura relativa de ἣν. En español, se preserva esa relación con «el testimonio que él da», evitando una paráfrasis que borre la repetición joánica entre μαρτυρία y μαρτυρεῖ.
  spanish_consistency_notes:
  - Se usa «Yahvé» como convención general del proyecto, pero este versículo no contiene el Tetragrámaton ni una cita directa que lo requiera.
  - Se conserva «testimonio» y «da testimonio» para reflejar la raíz verbal del griego y mantener la textura forense del versículo.
  - Se evita identificar al «otro» porque el texto no lo hace; la traducción permanece en el nivel de especificidad del original.
