- from: Hay otro que da testimonio acerca de mí[a], y yo sé que verdadero es el testimonio que él da acerca de mí.
  to: Hay otro que da testimonio acerca de mí[a], y sé que el testimonio que él da acerca de mí es verdadero.
  rationale: Se ajusta el orden sintáctico para un español más natural y digno, manteniendo íntegramente el sentido y la repetición léxica del original. Se reemplaza la nota por una alternativa real y útil, en línea con la auditoría inglesa.
