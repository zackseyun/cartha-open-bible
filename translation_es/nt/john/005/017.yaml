translation:
  language: es
  text: 'Pero él les respondió[a]: «Mi Padre está trabajando hasta ahora, y yo también estoy trabajando».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Mi Padre trabaja hasta ahora, y yo trabajo». El presente griego puede traducirse en español como presente simple o como una forma progresiva; aquí se eligió la forma progresiva para resaltar la acción continua.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ marca contraste o continuación con matiz adversativo; «Pero» comunica bien la respuesta de Jesús frente a la acusación previa sin añadir interpretación.
- source_word: ἀπεκρίνατο αὐτοῖς
  english_pob_choice: he answered them
  chosen_spanish: él les respondió
  alternatives_spanish:
  - él les contestó
  - respondió a ellos
  lexicon: BDAG
  rationale: «Responder» es la equivalencia natural y fiel para ἀποκρίνομαι; el dativo αὐτοῖς queda bien expresado con «les».
- source_word: Ὁ πατήρ μου
  english_pob_choice: My Father
  chosen_spanish: Mi Padre
  alternatives_spanish:
  - mi Padre
  lexicon: BDAG
  rationale: Se mantiene la referencia personal y teológica a Dios como Padre de Jesús. En español, «Padre» conserva la mayúscula reverencial en un contexto divino.
- source_word: ἕως ἄρτι
  english_pob_choice: until now
  chosen_spanish: hasta ahora
  alternatives_spanish:
  - hasta este momento
  - aún ahora
  lexicon: BDAG
  rationale: La expresión indica continuidad hasta el presente; «hasta ahora» es idiomática y precisa en español.
- source_word: ἐργάζεται
  english_pob_choice: is working
  chosen_spanish: sigue trabajando
  alternatives_spanish:
  - está trabajando
  - trabaja
  lexicon: BDAG
  rationale: El presente griego expresa actividad continua. «Sigue trabajando» comunica la continuidad de forma natural sin perder la fuerza aspectual que el POB inglés destacó con el progresivo.
- source_word: κἀγὼ
  english_pob_choice: and I also
  chosen_spanish: y yo también
  alternatives_spanish:
  - yo también
  - y también yo
  lexicon: BDAG
  rationale: κἀγώ añade a Jesús junto con el Padre; «y yo también» preserva claramente el paralelismo aditivo.
- source_word: ἐργάζομαι
  english_pob_choice: am working
  chosen_spanish: trabajo
  alternatives_spanish:
  - estoy trabajando
  - sigo trabajando
  lexicon: BDAG
  rationale: En español, el presente simple puede expresar acción en curso; aquí mantiene el paralelismo con «sigue trabajando» sin volver pesada la frase.
theological_decisions:
- issue: Paralelismo entre la obra del Padre y la de Jesús
  english_pob_reading: 'Render the statement straightforwardly without softening the parallel: ''My Father is working until now, and I also am working.'''
  chosen_spanish_reading: 'Traducir la afirmación de manera directa, preservando el paralelismo: «Mi Padre sigue trabajando hasta ahora, y yo también trabajo».'
  alternative_spanish_readings:
  - Mi Padre trabaja hasta ahora, y yo trabajo
  - Mi Padre está trabajando hasta ahora, y yo también estoy trabajando
  rationale: La frase debe conservar la relación paralela sin suavizarla ni explicarla. La redacción elegida mantiene la continuidad de la acción del Padre y la respuesta simétrica de Jesús, dejando intacta la tensión teológica del pasaje.
  doctrine_reference: Affirmations; Translation philosophy §3 Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: 'El texto coincide con el consenso del audit trail en cuanto al sentido: contraste suave con «pero», respuesta directa, continuidad de la acción divina y paralelismo entre Padre e Hijo. Se adoptó una solución española natural que conserva el valor aspectual del presente griego sin sobreexplicar el trasfondo.'
  spanish_consistency_notes:
  - Se usa «Padre» con mayúscula por tratarse del título divino en boca de Jesús.
  - Se prefirió «sigue trabajando» para reflejar continuidad, mientras que «trabajo» mantiene el paralelismo natural en español.
  - No se introdujo vocabulario interpretativo adicional sobre sábado o controversia; la frase queda tan directa como en el griego.
