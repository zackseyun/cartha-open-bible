  text: Ἀμὴν ἀμὴν λέγω ὑμῖν ὅτι ὁ τὸν λόγον μου ἀκούων καὶ πιστεύων τῷ πέμψαντί με ἔχει ζωὴν αἰώνιον, καὶ εἰς κρίσιν οὐκ ἔρχεται ἀλλὰ μεταβέβηκεν ἐκ τοῦ θανάτου εἰς τὴν ζωήν.
base_translation:
  language: en
  yaml_path: translation/nt/john/005/024.yaml
  text: Truly[a], truly, I say to you, whoever hears my word and believes him who sent me has eternal life, and does not come into judgment[b], but has passed from death into life.
  footnotes:
  - marker: a
    text: Or 'does not come into condemnation.' The Greek κρίσις can mean 'judgment' generally or, in context, an adverse judgment.
    reason: lexical_alternative
  - marker: b
    text: 'The Greek perfect verb indicates a completed transition with continuing result: ''has passed over'' or ''has crossed over'' from death into life.'
    reason: lexical_alternative
