translation:
  language: es
  text: En verdad, en verdad[a], les digo que el que oye mi palabra y cree al que me envió tiene vida eterna, y no entra en juicio[b], sino que ha pasado[c] de la muerte a la vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'Amén, amén'. La fórmula griega puede mantenerse sin traducir, pero aquí se vierte por su fuerza enfática y para que el español conserve el tono solemne de la expresión.
    reason: lexical_alternative
  - marker: b
    text: O 'condenación'. κρίσις puede significar 'juicio' en general o, en contexto, un juicio adverso. Se prefiere 'juicio' por ser más amplio y por respetar la ambigüedad del término.
    reason: lexical_alternative
  - marker: c
    text: 'El verbo perfecto griego indica una transición ya completada con resultado continuo: también puede entenderse como ''ha cruzado'' o ''ha pasado de un estado a otro'' de la muerte a la vida.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀμὴν ἀμὴν
  english_pob_choice: Truly, truly
  chosen_spanish: De cierto, de cierto
  alternatives_spanish:
  - Amén, amén
  - Verdaderamente, verdaderamente
  lexicon: BDAG
  rationale: La fórmula solemne e intensiva se conserva con una expresión natural y reverente en español. 'De cierto, de cierto' comunica la fuerza enfática sin dejar el giro como mera transliteración litúrgica, y mantiene el tono del original y del POB en inglés.
- source_word: λέγω ὑμῖν
  english_pob_choice: I say to you
  chosen_spanish: les digo
  alternatives_spanish:
  - les hablo
  - les aseguro
  lexicon: BDAG
  rationale: El plural 'ὑμῖν' queda bien reflejado con 'les'. 'Les digo' es directo, sobrio y cercano al formulismo griego. 'Les aseguro' expresa la solemnidad, pero introduce una interpretación más fuerte que la construcción básica.
- source_word: ὁ ... ἀκούων καὶ πιστεύων
  english_pob_choice: whoever hears ... and believes
  chosen_spanish: el que oye ... y cree
  alternatives_spanish:
  - quien oye ... y cree
  - el que escucha ... y cree
  lexicon: BDAG
  rationale: El participio articular funciona de modo genérico; en español, 'el que' expresa bien esa referencia general sin forzar género ni añadir explicaciones. 'Oye' conserva el valor de ἀκούω como oír/escuchar en contexto de recepción obediente.
- source_word: τὸν λόγον μου
  english_pob_choice: my word
  chosen_spanish: mi palabra
  alternatives_spanish:
  - mi palabra y mensaje
  - mi mensaje
  lexicon: BDAG
  rationale: '''λόγος'' en este contexto puede ser ''palabra'' o ''mensaje''. Se mantiene ''mi palabra'' porque conserva mejor la resonancia joánica y la correspondencia más directa con el POB inglés, sin perder claridad en español.'
- source_word: πιστεύων τῷ πέμψαντί με
  english_pob_choice: believes him who sent me
  chosen_spanish: cree al que me envió
  alternatives_spanish:
  - cree en el que me envió
  - confía en el que me envió
  lexicon: BDAG
  rationale: El dativo con πιστεύω admite creer a alguien / creerle. En español, 'cree al que me envió' reproduce bien la relación personal del texto griego y evita añadir 'en' cuando el giro directo resulta natural.
- source_word: ἔχει ζωὴν αἰώνιον
  english_pob_choice: has eternal life
  chosen_spanish: tiene vida eterna
  alternatives_spanish:
  - posee vida eterna
  - goza de vida eterna
  lexicon: BDAG
  rationale: El presente ἔχει indica posesión actual. 'Tiene vida eterna' es la forma más natural y fiel en español; mantiene la afirmación de posesión presente sin volverla futura o abstracta.
- source_word: εἰς κρίσιν οὐκ ἔρχεται
  english_pob_choice: does not come into judgment
  chosen_spanish: no entra en juicio
  alternatives_spanish:
  - no viene a juicio
  - no entra en condenación
  lexicon: BDAG
  rationale: '''κρίσις'' se conserva como ''juicio'' para no reducirlo prematuramente a ''condenación''. ''No entra en juicio'' sigue la fuerza de εἰς y deja abierta la tensión lexical señalada por el POB en inglés.'
- source_word: μεταβέβηκεν
  english_pob_choice: has passed
  chosen_spanish: ha pasado
  alternatives_spanish:
  - ha cruzado
  - ha pasado de un estado a otro
  lexicon: BDAG
  rationale: El perfecto expresa una transición completada con efecto continuo. 'Ha pasado' conserva esa idea con naturalidad española, sin sobreexplicar el matiz del perfecto en el cuerpo del texto.
- source_word: ἐκ τοῦ θανάτου εἰς τὴν ζωήν
  english_pob_choice: from death into life
  chosen_spanish: de la muerte a la vida
  alternatives_spanish:
  - de la muerte hacia la vida
  - fuera de la muerte a la vida
  lexicon: BDAG
  rationale: La oposición tajante muerte/vida se preserva con un español fluido. 'De ... a ...' comunica bien el movimiento; 'a la vida' es más idiomático que 'hacia la vida' y suficientemente fiel al valor direccional.
theological_decisions:
- issue: Sentido de κρίσις en un contexto soteriológico
  english_pob_reading: judgment, with a lexical note that 'condemnation' is possible but broader 'judgment' is preferred
  chosen_spanish_reading: juicio
  alternative_spanish_readings:
  - condenación
  - sentencia
  rationale: 'Se mantiene la tensión lexical: el término griego puede abarcar juicio en general o un juicio adverso. ''Juicio'' evita resolver de antemano el resultado y deja que el contexto inmediato comunique la promesa de salvación.'
  doctrine_reference: Preservar la tensión lexical en vez de cerrarla teológicamente.
- issue: Valor del presente y del perfecto en la promesa de salvación
  english_pob_reading: present possession of eternal life and completed transition from death into life
  chosen_spanish_reading: posesión presente de la vida eterna y transición ya cumplida de la muerte a la vida
  alternative_spanish_readings:
  - vida eterna solo futura
  - paso meramente esperado al final
  rationale: El presente ἔχει y el perfecto μεταβέβηκεν apuntan a una realidad ya poseída y a un cambio ya realizado con efecto duradero. La traducción conserva ese aspecto verbal sin imponer una sistematización doctrinal ajena al texto.
  doctrine_reference: Dentro de la ortodoxia histórica, sin cargar el texto con una postura denominacional no exigida por el griego.
translation_notes:
  revision_awareness: Se revisó el versículo con el paquete fuente griego y el rastro auditado en inglés. No hubo revisiones aplicadas en la última pasada; la redacción española mantiene el valor enfático de Ἀμὴν ἀμὴν, el presente de ἔχει y el perfecto de μεταβέβηκεν, así como la ambigüedad lexical de κρίσις.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se usa 'vida eterna' porque el proyecto la trata como fórmula estable y el contexto joánico la exige.
  - Se evita 'Cristo' porque no aparece Χριστός en el versículo.
  - Se eligió 'juicio' en vez de 'condenación' para no cerrar la amplitud de κρίσις.
  - '''Les digo'' y ''el que'' mantienen un registro natural, digno y bíblico en español neutral.'
