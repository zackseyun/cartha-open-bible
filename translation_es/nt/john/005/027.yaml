translation:
  language: es
  text: Y le dio autoridad para ejecutar juicio[a], porque es el Hijo del Hombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «porque es un hijo de hombre», es decir, porque comparte la naturaleza humana. El texto principal preserva el probable uso titular en Juan.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐξουσίαν
  english_pob_choice: authority
  chosen_spanish: autoridad
  alternatives_spanish:
  - poder
  - derecho
  lexicon: BDAG
  rationale: ἐξουσία aquí denota autoridad delegada o jurisdicción legítima, no simple capacidad o fuerza. «Autoridad» conserva mejor el sentido jurídico-gobernante que el contexto de Juan 5:27 requiere.
- source_word: ἔδωκεν
  english_pob_choice: gave
  chosen_spanish: le dio
  alternatives_spanish:
  - le concedió
  - le otorgó
  lexicon: BDAG
  rationale: El aoristo de δίδωμι se expresa de manera natural con «dio». En español, el dativo implícito se resuelve fluidamente con «le dio», manteniendo la acción directa sin añadir matices innecesarios.
- source_word: αὐτῷ
  english_pob_choice: him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El pronombre dativo se integra mejor en español como complemento indirecto «le», ya que el referente es Jesús en el contexto inmediato.
- source_word: κρίσιν ποιεῖν
  english_pob_choice: to execute judgment
  chosen_spanish: ejecutar juicio
  alternatives_spanish:
  - hacer juicio
  - juzgar
  lexicon: BDAG
  rationale: La expresión literal significa «hacer juicio», pero en este contexto alude al ejercicio formal de la sentencia judicial. «Ejecutar juicio» conserva esa fuerza jurídica y evita reducir la frase a un simple acto de juzgar.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - pues
  lexicon: BDAG
  rationale: Aquí introduce la razón de la concesión de autoridad, no una mera cláusula de contenido. «Porque» reproduce bien la relación causal.
- source_word: υἱὸς ἀνθρώπου
  english_pob_choice: the Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - un hijo de hombre
  - un ser humano
  lexicon: BDAG
  rationale: Aunque el griego no lleva artículo ante υἱός, en Juan esta expresión funciona como título cristológico establecido. «El Hijo del Hombre» preserva ese valor titular y su resonancia bíblica, en lugar de volverla una referencia genérica a la humanidad.
- source_word: ἐστίν
  english_pob_choice: is
  chosen_spanish: es
  alternatives_spanish:
  - está
  lexicon: BDAG
  rationale: Copulativo simple en presente; «es» es la equivalencia natural y suficiente en español.
theological_decisions:
- issue: Si υἱὸς ἀνθρώπου debe sonar como título cristológico o como expresión genérica de humanidad
  english_pob_reading: Rendered as the title 'the Son of Man.' The main text preserves the likely title usage in John, while the footnote preserves the generic-human alternative.
  chosen_spanish_reading: 'Se mantiene como título: «el Hijo del Hombre».'
  alternative_spanish_readings:
  - porque es un hijo de hombre
  - porque es humano
  rationale: En el evangelio de Juan, la expresión funciona como autodesignación reconocible de Jesús con resonancias daniélicas y escatológicas. Traducirla de forma genérica borraría esa referencia. La nota conserva la alternativa de sentido humano sin desplazar el título del texto principal.
  doctrine_reference: Affirmations (Nicene/Chalcedonian bounds); Juan 5:27; Daniel 7
- issue: Cómo expresar κρίσιν ποιεῖν sin diluir su carácter judicial
  english_pob_reading: to execute judgment
  chosen_spanish_reading: ejecutar juicio
  alternative_spanish_readings:
  - juzgar
  - hacer juicio
  rationale: La frase no es solo «juzgar» en sentido amplio, sino ejercer una función judicial con autoridad. «Ejecutar juicio» preserva el matiz formal de sentencia/acto judicial que la POB inglesa quiso retener.
  doctrine_reference: Juan 5:27; contexto judicial de Juan 5:22-30
translation_notes:
  revision_awareness: 'Se mantuvo la lectura y valoración del audit trail en inglés sin cambios sustantivos: la traducción principal conserva el título cristológico «el Hijo del Hombre» y la fuerza judicial de κρίσιν ποιεῖν. La nota al pie recoge la alternativa generativa/humana documentada por la POB inglesa.'
  spanish_consistency_notes:
  - Se emplea «Yahvé» solo cuando el texto fuente lo exija explícitamente; aquí no aparece.
  - Se conserva «Hijo del Hombre» como título cristológico consistente con la POB inglesa y la tradición joánica del término.
  - «Autoridad» y «juicio» mantienen el registro jurídico del versículo.
  - La sintaxis es breve y directa, adecuada para lectura pública y auditabilidad lexical.
