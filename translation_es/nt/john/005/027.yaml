  source_alignment_summary: 'El borrador español refleja fielmente el griego y el rastro de auditoría inglés: «le dio autoridad» corresponde bien a καὶ ἐξουσίαν ἔδωκεν αὐτῷ; «para ejecutar juicio» preserva adecuadamente κρίσιν ποιεῖν con su matiz judicial formal; «porque» refleja correctamente el valor causal de ὅτι; y «el Hijo del Hombre» mantiene la lectura titular preferida para υἱὸς ἀνθρώπου en Juan. La nota también conserva de manera fiel la alternativa documentada.'
