  glossary_alignment: No hay conflicto con la terminología del proyecto. «Hijo del Hombre» respeta la decisión cristológica documentada; no aparecen términos sensibles del glosario general que requieran ajuste. La elección de «autoridad» para ἐξουσία y de «ejecutar juicio» para κρίσιν ποιεῖν está bien alineada con la racionalidad POB.
