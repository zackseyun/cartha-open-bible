translation:
  language: es
  text: Yo he venido en el nombre de mi Padre[a], y no me reciben. Si otro viene en su propio nombre[b], a ese recibirán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con la autoridad de mi Padre». El giro griego «en el nombre de» también puede denotar representación o autoridad, además del nombre mismo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «con su propia autoridad». La expresión «en su propio nombre» contrasta de forma marcada con la venida de Jesús «en el nombre de mi Padre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλήλυθα
  english_pob_choice: have come
  chosen_spanish: he venido
  alternatives_spanish:
  - vine
  - he llegado
  lexicon: BDAG
  rationale: El perfecto de ἔρχομαι expresa una acción ya realizada con resultado presente; en español, «he venido» comunica bien esa presencia resultante sin perder naturalidad.
- source_word: ἐν τῷ ὀνόματι τοῦ πατρός μου
  english_pob_choice: in my Father's name
  chosen_spanish: en el nombre de mi Padre
  alternatives_spanish:
  - con la autoridad de mi Padre
  - en nombre de mi Padre
  lexicon: BDAG
  rationale: Se conserva el giro idiomático «en el nombre de» para mantener el paralelismo y la amplitud semántica de representación y autoridad, sin explicitar demasiado en el texto principal.
- source_word: λαμβάνετέ με
  english_pob_choice: you do not receive me
  chosen_spanish: no me reciben
  alternatives_spanish:
  - no me aceptan
  - no me reciben a mí
  lexicon: BDAG
  rationale: «Reciben» preserva el valor joánico de λαμβάνω como recibir/aceptar, y en español suena natural en contraste con la venida de Jesús.
- source_word: ἄλλος
  english_pob_choice: another
  chosen_spanish: otro
  alternatives_spanish:
  - alguien más
  - otro hombre
  lexicon: BDAG
  rationale: «Otro» reproduce de forma directa el contraste con Jesús sin añadir especificación interpretativa.
- source_word: ἐν τῷ ὀνόματι τῷ ἰδίῳ
  english_pob_choice: in his own name
  chosen_spanish: en su propio nombre
  alternatives_spanish:
  - con su propia autoridad
  - bajo su propio nombre
  lexicon: BDAG
  rationale: La formulación paralela «en su propio nombre» conserva la antítesis con «en el nombre de mi Padre» y deja abierta la implicación de autoridad propia.
- source_word: ἐκεῖνον λήμψεσθε
  english_pob_choice: you will receive him
  chosen_spanish: a ese lo recibirán
  alternatives_spanish:
  - lo recibirán
  - a ese lo aceptarán
  lexicon: BDAG
  rationale: «Lo recibirán» mantiene el eco verbal con la primera cláusula; el refuerzo «a ese» ayuda a expresar el énfasis del demostrativo ἐκεῖνον y la fuerza contrastiva del pasaje.
theological_decisions:
- issue: Si hacer explícita la referencia divina de «mi Padre»
  english_pob_reading: Capitalization in English marks the divine referent while keeping the phrase literal.
  chosen_spanish_reading: Mantener «mi Padre» sin añadir glosa en el texto principal.
  alternative_spanish_readings:
  - mi padre
  - mi Padre celestial
  rationale: En el contexto joánico la referencia a Dios es clara; el español no necesita una ampliación explícita para entender el sentido, y conservar el giro literal evita introducir contenido ajeno al griego.
  doctrine_reference: Juan 5; filosofía de traducción de la POB
- issue: Si explicitar la idea de autoridad en el texto principal
  english_pob_reading: The idiom 'in ... name' is retained in the main text, with a footnote noting the authority nuance.
  chosen_spanish_reading: Retener la expresión idiomática «en el nombre de» y aclarar la posible equivalencia de autoridad en nota.
  alternative_spanish_readings:
  - con la autoridad de
  - en representación de
  rationale: La frase griega admite la noción de autoridad/representación, pero el texto principal debe conservar la imagen y el paralelismo deliberado entre ambas cláusulas; la nota permite la aclaración sin estrechar el sentido.
  doctrine_reference: Filosofía de traducción §3
translation_notes:
  revision_awareness: 'Coincide con la lectura auditada: se preserva el perfecto de ἔρχομαι con «he venido», el paralelismo idiomático de «en el nombre de», y el contraste retórico entre rechazo de Jesús y recepción del que viene con nombre propio. No se requieren revisiones adicionales según el informe más reciente.'
  spanish_consistency_notes:
  - Se usa «recibir» de manera uniforme para λαμβάνω, como en la traducción inglesa auditada.
  - Se mantiene el paralelismo sintáctico entre las dos mitades del versículo para conservar el contraste retórico.
  - Se evita sustituir «nombre» por «autoridad» en el cuerpo principal para no perder la tensión semántica documentada.
