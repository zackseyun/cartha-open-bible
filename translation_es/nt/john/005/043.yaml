base_translation:
  language: en
  yaml_path: translation/nt/john/005/043.yaml
  text: I have come in my Father's name[a], and you do not receive me. If another comes in his own name[b], you will receive him.
  footnotes:
  - marker: a
    text: Or 'with my Father's authority.' The Greek idiom 'in the name' can denote representation or authority as well as the name itself.
    reason: lexical_alternative
  - marker: b
    text: Or 'on his own authority.' The phrase 'in his own name' contrasts sharply with Jesus' coming 'in my Father's name.'
    reason: lexical_alternative
