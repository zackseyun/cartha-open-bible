translation:
  language: es
  text: Y el Padre que me envió, él mismo ha dado testimonio acerca de mí[a]. Ustedes no han oído jamás su voz ni han visto su forma[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ese mismo ha dado testimonio acerca de mí». El demostrativo griego ἐκεῖνος añade énfasis al Padre que me envió.
    reason: lexical_alternative
  - marker: b
    text: O «su apariencia». El griego εἶδος puede denotar forma visible o apariencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ πέμψας με πατὴρ
  english_pob_choice: the Father who sent me
  chosen_spanish: el Padre que me envió
  alternatives_spanish:
  - el Padre que me ha enviado
  - mi Padre, el que me envió
  lexicon: BDAG
  rationale: La oración relativa identifica al Padre por su acción de enviar a Jesús. En español, "el Padre que me envió" conserva esa relación identificadora con naturalidad y sin sobrecargar el texto.
- source_word: ἐκεῖνος
  english_pob_choice: has himself
  chosen_spanish: ese mismo
  alternatives_spanish:
  - él mismo
  - aquel mismo
  lexicon: BDAG
  rationale: El demostrativo griego añade énfasis sobre el Padre. "Ese mismo" mantiene la fuerza enfática sin sonar rígido en español, y evita perder la referencia explícita al sujeto.
- source_word: μεμαρτύρηκεν
  english_pob_choice: has testified
  chosen_spanish: ha dado testimonio
  alternatives_spanish:
  - ha testificado
  - ha testimoniado
  lexicon: BDAG
  rationale: El perfecto expresa una acción completada con vigencia presente. "Ha dado testimonio" es una equivalencia natural en español bíblico contemporáneo y conserva el sentido legal/de testigo de μαρτυρέω.
- source_word: περὶ ἐμοῦ
  english_pob_choice: about me
  chosen_spanish: acerca de mí
  alternatives_spanish:
  - sobre mí
  - con respecto a mí
  lexicon: BDAG
  rationale: '"Acerca de mí" reproduce bien el valor de περί con genitivo en este contexto. Suena natural en español y mantiene la relación temática del testimonio.'
- source_word: οὔτε ... οὔτε
  english_pob_choice: neither ... nor
  chosen_spanish: ni ... ni
  alternatives_spanish:
  - ni siquiera ... ni
  - no ... ni
  lexicon: BDAG
  rationale: La correlación negativa se expresa de manera idiomática con "ni ... ni" en español.
- source_word: φωνὴν αὐτοῦ
  english_pob_choice: his voice
  chosen_spanish: su voz
  alternatives_spanish:
  - la voz de él
  - su sonido
  lexicon: BDAG
  rationale: '"Voz" es la equivalencia directa y más clara de φωνή en un contexto de oír.'
- source_word: πώποτε
  english_pob_choice: ever
  chosen_spanish: jamás
  alternatives_spanish:
  - nunca
  - alguna vez
  lexicon: BDAG
  rationale: Con la negación, πώποτε expresa "en ningún momento / nunca". "Jamás" suena natural y fuerte en español, preservando el énfasis de la negación total.
- source_word: ἀκηκόατε
  english_pob_choice: have heard
  chosen_spanish: han oído
  alternatives_spanish:
  - han escuchado
  - han escuchado jamás
  lexicon: BDAG
  rationale: El perfecto se refleja bien con el presente perfecto "han oído", que mantiene la experiencia pasada con relevancia presente.
- source_word: εἶδος αὐτοῦ
  english_pob_choice: his form
  chosen_spanish: su forma
  alternatives_spanish:
  - su apariencia
  - su aspecto
  lexicon: BDAG
  rationale: '"Forma" preserva la amplitud semántica de εἶδος y deja abierta la tensión entre forma visible y apariencia, igual que en el audit trail inglés.'
- source_word: ἑωράκατε
  english_pob_choice: have seen
  chosen_spanish: han visto
  alternatives_spanish:
  - han contemplado
  - han percibido
  lexicon: BDAG
  rationale: El perfecto se conserva con "han visto". Es la opción más directa y mantiene el paralelismo con "han oído".
theological_decisions:
- issue: Cómo reflejar el énfasis de ἐκεῖνος aplicado al Padre
  english_pob_reading: 'Retain explicit emphasis in the main text: ''that one has testified about me.'' / revised to ''has himself testified'' for naturalness.'
  chosen_spanish_reading: «ese mismo ha dado testimonio»
  alternative_spanish_readings:
  - «él mismo ha dado testimonio»
  - «aquel ha dado testimonio»
  rationale: El texto subraya que el Padre mismo es el testigo de Jesús. "Ese mismo" preserva el énfasis del demostrativo sin introducir una formulación extraña en español.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Cómo traducir εἶδος sin resolver demasiado su alcance
  english_pob_reading: Translate as 'his form' rather than a more interpretive phrase.
  chosen_spanish_reading: «su forma»
  alternative_spanish_readings:
  - «su apariencia»
  - «su aspecto»
  rationale: '"Forma" mantiene la amplitud del término y no fuerza una interpretación entre presencia visible literal y apariencia reveladora. Conserva la tensión teológica del pasaje sobre la percepción de Dios.'
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el último estado del audit trail inglés: se mantiene el énfasis del demostrativo en el testimonio del Padre y se conserva «forma» para εἶδος, evitando resolver en exceso su alcance semántico. También se preserva el paralelismo de los perfectos con verbos en presente perfecto español.'
  spanish_consistency_notes:
  - Se emplea «Padre» para πατήρ y «Jesús» queda implícito en el contexto del pronombre de primera persona, sin añadirlo al texto.
  - Se usa «testimonio» para μαρτυρέω por coherencia con el campo judicial/forense del pasaje.
  - Se mantiene el paralelismo «han oído / han visto» para reflejar la estructura negativa doble del griego.
  - No se introduce «SEÑOR» ni otra sustitución tradicional, ya que el texto no contiene el tetragrámaton ni κύριος en este versículo.
