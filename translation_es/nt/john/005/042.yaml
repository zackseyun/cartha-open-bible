revisions:
- from: Pero yo los conozco[a], porque no tienen el amor de Dios en ustedes.
  to: Pero yo sé de ustedes que no tienen el amor de Dios[a] en ustedes.
  rationale: Se reemplazó «porque» por «que» para reflejar mejor ὅτι como cláusula de contenido; se reformuló «yo los conozco» como «yo sé de ustedes» para una sintaxis española más natural en este contexto; y se movió la nota al punto realmente ambiguo, «el amor de Dios». Se preserva la ambigüedad teológica del genitivo y la legibilidad en español neutral.
