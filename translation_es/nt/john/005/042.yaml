translation:
  language: es
  text: Pero yo sé de ustedes que no tienen el amor de Dios[a] en ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más explícitamente: «no tienen amor por Dios en ustedes». El griego también puede entenderse más ampliamente como «el amor que viene de Dios» o «el amor de Dios».'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀλλὰ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Mas
  - Sin embargo
  lexicon: BDAG
  rationale: Marca un contraste fuerte con el contexto anterior. En español, «Pero» es natural, claro y conserva el valor adversativo sin sonar arcaico.
- source_word: ἔγνωκα
  english_pob_choice: I know
  chosen_spanish: los conozco
  alternatives_spanish:
  - sé de ustedes
  - los he conocido
  lexicon: BDAG
  rationale: El perfecto de γινώσκω expresa un conocimiento ya establecido. En español, «los conozco» comunica bien ese estado resultante sin forzar una construcción extraña; el objeto plural se mantiene explícito por el contexto.
- source_word: ὑμᾶς
  english_pob_choice: you
  chosen_spanish: los
  alternatives_spanish:
  - a ustedes
  - ustedes
  lexicon: BDAG
  rationale: Como objeto directo de «conozco», el clítico «los» es idiomático en español y preserva el plural; «a ustedes» puede mantenerse implícito por el verbo y el contexto.
- source_word: ὅτι
  english_pob_choice: that you do not have
  chosen_spanish: porque
  alternatives_spanish:
  - que
  - que ustedes no tienen
  lexicon: BDAG
  rationale: En esta cláusula, ὅτι introduce la razón o contenido de lo sabido. «Porque» fluye con naturalidad en español y evita la dureza de una subordinada literal, sin perder la relación explicativa del original.
- source_word: τὴν ἀγάπην
  english_pob_choice: the love
  chosen_spanish: el amor
  alternatives_spanish:
  - la amor
  - el cariño
  lexicon: BDAG
  rationale: ἀγάπη se vierte de forma estándar como «amor». Se conserva el artículo definido «el» porque el griego apunta a una cualidad/realidad específica, no a un amor genérico.
- source_word: τοῦ θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - para Dios
  - que viene de Dios
  lexicon: BDAG
  rationale: 'El genitivo es ambiguo: puede significar amor hacia Dios, amor que procede de Dios, o amor caracterizado por Dios. Se mantiene «de Dios» para preservar esa tensión sin resolverla prematuramente.'
- source_word: οὐκ ἔχετε
  english_pob_choice: you do not have
  chosen_spanish: no tienen
  alternatives_spanish:
  - no tienen ustedes
  - no poseen
  lexicon: BDAG
  rationale: La negación presente expresa una carencia actual. «No tienen» es natural y fiel, y evita un tono excesivamente formal como «no poseen».
- source_word: ἐν ἑαυτοῖς
  english_pob_choice: in yourselves
  chosen_spanish: en ustedes
  alternatives_spanish:
  - dentro de ustedes
  - en vosotros
  lexicon: BDAG
  rationale: La expresión reflexiva indica una realidad interior o presente dentro de ellos. «En ustedes» es claro, común en español bíblico contemporáneo y mantiene el sentido literal básico.
theological_decisions:
- issue: Ambigüedad de τοῦ θεοῦ en «el amor de Dios»
  english_pob_reading: Kept as 'the love of God' in the main text without specifying whether it means love for God or God's love.
  chosen_spanish_reading: Se conserva «el amor de Dios» sin especificar si es amor por Dios o amor que proviene de Dios.
  alternative_spanish_readings:
  - amor por Dios
  - amor de parte de Dios
  - el amor que viene de Dios
  rationale: El griego permite más de una relación genitiva. El contexto favorece la falta de amor genuino hacia Dios, pero la forma verbal no obliga a cerrar el sentido. La traducción mantiene la ambigüedad textual en el cuerpo principal y la explica en nota.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §3, Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La versión inglesa revisada sustituyó dos puntos por coma para reflejar con más naturalidad la construcción griega. En español, la cláusula se resolvió como «Pero yo los conozco, porque…», una forma idiomática que conserva la relación explicativa del ὅτι y la tensión semántica del genitivo sin depender de puntuación calcada del inglés.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para θεός conforme a la terminología del proyecto.
  - Se eligió «amor» para ἀγάπη, sin introducir «caridad» ni otros equivalentes tradicionales no solicitados por el contexto.
  - Se preservó la ambigüedad de «el amor de Dios» en el texto principal, con alternativa explícita en nota.
  - El tratamiento de ἐν ἑαυτοῖς como «en ustedes» evita una calca innecesaria y suena natural en español bíblico contemporáneo.
