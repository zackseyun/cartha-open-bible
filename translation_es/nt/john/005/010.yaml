base_translation:
  language: en
  yaml_path: translation/nt/john/005/010.yaml
  text: So the Jews were saying to the man who had been healed[a], “It is the Sabbath[c][b], and it is not lawful for you to carry your mat.”
  footnotes:
  - marker: a
    text: Or possibly “the Jewish leaders” or “the Judeans,” depending on how John is using the term here.
    reason: alternative_reading
  - marker: b
    text: Or “pick up” or “take up your mat.”
    reason: lexical_alternative
  - marker: c
    text: The term rendered “mat” refers to a portable sleeping pad or pallet, not necessarily a full bed.
    reason: cultural_note
