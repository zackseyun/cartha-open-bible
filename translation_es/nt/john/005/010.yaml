translation:
  language: es
  text: 'Así que los judíos le decían al hombre que había sido sanado[a]: «Es sábado, y no te está permitido cargar tu estera[b][c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente «los líderes judíos» o «los judeanos», según cómo Juan use el término aquí.
    reason: alternative_reading
  - marker: b
    text: O «levantar» o «tomar» tu estera.
    reason: lexical_alternative
  - marker: c
    text: El término traducido «estera» se refiere a un lecho portátil para dormir, no necesariamente a una cama completa.
    reason: cultural_note
lexical_decisions:
- source_word: ἔλεγον
  english_pob_choice: were saying
  chosen_spanish: le decían
  alternatives_spanish:
  - le dijeron
  - seguían diciéndole
  lexicon: BDAG
  rationale: El imperfecto griego expresa acción շարունակada o repetida en el pasado. En español, «le decían» conserva esa duración de forma natural y no fuerza un simple pasado puntual.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - por tanto
  - entonces
  lexicon: BDAG
  rationale: La partícula enlaza la escena con lo anterior. «Así que» mantiene la continuidad narrativa con un registro natural en español.
- source_word: οἱ Ἰουδαῖοι
  english_pob_choice: the Jews
  chosen_spanish: los judíos
  alternatives_spanish:
  - los líderes judíos
  - los judeanos
  lexicon: BDAG
  rationale: Se conserva el valor literal del grupo nominal, sin restringirlo a «líderes» ni desplazarlo a un etnónimo más interpretativo. La ambigüedad joánica se mantiene para no resolver de antemano un debate del texto.
- source_word: τῷ τεθεραπευμένῳ
  english_pob_choice: to the man who had been healed
  chosen_spanish: al hombre que había sido sanado
  alternatives_spanish:
  - al que había sido sanado
  - al hombre sanado
  lexicon: BDAG
  rationale: El participio perfecto pasivo expresa una sanidad ya completada con resultado vigente. «Había sido sanado» reproduce bien ese valor y «hombre» hace explícito el referente masculino contextual.
- source_word: Σάββατόν ἐστιν
  english_pob_choice: It is the Sabbath
  chosen_spanish: Es sábado
  alternatives_spanish:
  - Es el sábado
  - Es día de sábado
  lexicon: BDAG
  rationale: En español, «sábado» comunica de manera natural la referencia temporal del día. Se evita una formulación más pesada, sin perder el sentido de la observancia sabática.
- source_word: οὐκ ἔξεστίν σοι
  english_pob_choice: it is not lawful for you
  chosen_spanish: no te es permitido
  alternatives_spanish:
  - no te está permitido
  - no es lícito para ti
  lexicon: BDAG
  rationale: ἔξεστιν expresa permiso o licitud. «No te es permitido» conserva la fuerza normativa sin imponer una traducción eclesiástica fija; «lícito» quedaría más jurídico y menos natural en español corriente.
- source_word: ἆραι
  english_pob_choice: to carry
  chosen_spanish: cargar
  alternatives_spanish:
  - levantar
  - tomar
  lexicon: BDAG
  rationale: Aquí el punto es transportar la camilla durante el sábado. «Cargar» transmite mejor la acusación práctica que «levantar», aunque el verbo griego también puede tener ese matiz.
- source_word: κράβαττον
  english_pob_choice: mat
  chosen_spanish: camilla
  alternatives_spanish:
  - colchoneta
  - camastro
  - esterilla
  lexicon: BDAG
  rationale: El término designa una plataforma o lecho portátil para dormir. En español, «camilla» comunica la idea de un lecho portátil; se evita «cama» por ser demasiado amplia y «esterilla» por sonar demasiado ligera para el contexto.
theological_decisions:
- issue: Referente de οἱ Ἰουδαῖοι en Juan
  english_pob_reading: the Jews
  chosen_spanish_reading: los judíos
  alternative_spanish_readings:
  - los líderes judíos
  - los judeanos
  rationale: Se mantiene la traducción literal del grupo nominal, porque el verso por sí solo no especifica líderes ni exige una lectura geográfica. La ambigüedad se deja abierta, como en el audit trail inglés.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: El pasaje coincide con el texto fuente y con la auditoría inglesa actual; no se registran revisiones aplicadas y el acuerdo de revisión fue alto, sin observaciones.
  spanish_consistency_notes:
  - Se mantiene el tratamiento narrativo en imperfecto para ἔλεγον.
  - Se conserva la ambigüedad de οἱ Ἰουδαῖοι mediante una nota, no en el cuerpo principal.
  - «Camilla» se usa de forma consistente con el valor de lecho portátil del κράβαττον.
  - El registro es moderno y digno, evitando calcos innecesarios pero sin suavizar la fuerza normativa del dicho.
