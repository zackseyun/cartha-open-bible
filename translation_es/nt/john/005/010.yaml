    issue: «camilla» para κράβαττον
    rationale: En español ampliamente entendible, «camilla» suele asociarse con una camilla de hospital o de traslado, no con una estera o lecho portátil para dormir. Eso altera la imagen del texto fuente y debilita la nota cultural.
  - severity: low
    issue: «no te es permitido» suena menos natural
    rationale: Aunque es comprensible y fiel, en español actual suena más forzado que «no te está permitido», que conserva el matiz normativo de ἔξεστιν con mejor fluidez.
