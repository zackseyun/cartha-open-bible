  to: 'Así que los judíos le decían al hombre que había sido sanado[a]: «Es sábado, y no te está permitido cargar tu estera[b][c]».'
  rationale: Se reemplaza «camilla» por «estera» para reflejar mejor un lecho portátil y evitar la asociación médica moderna. También se ajusta «no te es permitido» a «no te está permitido» por mayor naturalidad sin pérdida del matiz legal/normativo. Se conservan la estructura, el aspecto verbal y las notas del audit trail inglés.
