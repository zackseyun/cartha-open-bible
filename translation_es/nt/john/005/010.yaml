  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: imperfecto iterativo («le decían»), referencia temporal al sábado, matiz normativo de οὐκ ἔξεστίν σοι, y el objeto portátil del κράβαττον. También conserva correctamente «los judíos» con nota de alternativa, en línea con el audit trail inglés. Sin embargo, «camilla» en español común latinoamericano tiende a evocar una camilla médica, lo que distorsiona el referente cultural de κράβαττος en este contexto.'
  spanish_quality_summary: La redacción es clara y natural, pero «no te es permitido» suena algo rígido; «no te está permitido» o «no te es lícito» serían opciones más idiomáticas. El problema principal de legibilidad y precisión es «camilla», que introduce una imagen moderna equivocada. «Estera» o «colchoneta» funcionan mejor con la nota cultural. También conviene ajustar la nota para explicar mejor el objeto como lecho/estera portátil, no una cama completa.
  glossary_alignment: No hay conflicto con los términos teológicos del proyecto. «los judíos» sigue la decisión documentada. No intervienen Yahvé/Mesías/otros términos sensibles. La revisión propuesta solo corrige la equivalencia de κράβαττον y mejora el español idiomático de ἔξεστιν.
