translation:
  language: es
  text: Y al instante el hombre quedó sano, y tomó su estera[a] y comenzó a andar[b]. Y aquel día era un sábado[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘tomó su lecho’. El griego κράβαττον se refiere a un lecho simple, una estera o una colchoneta para dormir, no necesariamente a una cama grande.
    reason: lexical_alternative
  - marker: b
    text: O ‘iba andando’. El imperfecto griego puede enfatizar la acción en curso; aquí también puede entenderse como el comienzo de su andar después de haber sido sanado.
    reason: lexical_alternative
  - marker: c
    text: 'O ‘el sábado’. El griego dice literalmente: ‘era sábado en aquel día’.'
    reason: alternative_reading
lexical_decisions:
- source_word: εὐθέως
  english_pob_choice: immediately
  chosen_spanish: al instante
  alternatives_spanish:
  - inmediatamente
  - de inmediato
  lexicon: BDAG
  rationale: Expresa la rapidez instantánea del evento con naturalidad en español; conserva el énfasis narrativo de una curación inmediata sin volverlo pesado o demasiado técnico.
- source_word: ἐγένετο ὑγιὴς
  english_pob_choice: became well
  chosen_spanish: quedó sano
  alternatives_spanish:
  - se puso bueno
  - quedó bien
  - se hizo sano
  lexicon: BDAG
  rationale: La construcción comunica el cambio de estado producido por la curación. 'Quedó sano' refleja ese resultado sin sonar mecánico; 'sano' preserva el sentido de salud/restauración sin introducir una pasiva que el griego no exige.
- source_word: ὁ ἄνθρωπος
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la persona
  lexicon: BDAG
  rationale: Mantiene la referencia masculina singular del relato y la identificación del individuo específico.
- source_word: ἦρε
  english_pob_choice: picked up
  chosen_spanish: tomó
  alternatives_spanish:
  - levantó
  - recogió
  - tomó en brazos
  lexicon: BDAG
  rationale: En español, 'tomó su camilla' comunica con claridad que la levantó para cargarla o llevarla. Evita una repetición forzada de 'recoger' y se ajusta al movimiento narrativo del texto.
- source_word: κράβαττον
  english_pob_choice: mat
  chosen_spanish: camilla
  alternatives_spanish:
  - estera
  - petate
  - colchón
  lexicon: BDAG
  rationale: Aunque el término griego puede referirse a un lecho sencillo, en este contexto narrativo 'camilla' comunica mejor el objeto portátil que el hombre llevaba consigo. 'Estera' o 'petate' podrían sonar regionales o menos claros; 'camilla' conserva la idea de un lecho simple sin sugerir una cama doméstica grande.
- source_word: περιεπάτει
  english_pob_choice: began to walk
  chosen_spanish: comenzó a andar
  alternatives_spanish:
  - iba andando
  - andaba
  - comenzó a caminar
  lexicon: BDAG
  rationale: El imperfecto puede indicar acción en curso o el inicio de la marcha; 'comenzó a andar' conserva el matiz de inicio en una forma natural para español. 'Andar' también es idiomático en este contexto y evita forzar un aspecto demasiado explícito.
- source_word: Ἦν δὲ
  english_pob_choice: Now ... was
  chosen_spanish: Pero ... era
  alternatives_spanish:
  - Ahora ... era
  - Y ... era
  - Mas ... era
  lexicon: BDAG
  rationale: '''Pero'' refleja el δέ como transición narrativa/expositiva sin cargarlo con contraste fuerte. En español, la frase fluye de manera natural al introducir la nota temporal que sigue.'
- source_word: σάββατον
  english_pob_choice: a Sabbath
  chosen_spanish: un sábado
  alternatives_spanish:
  - el sábado
  - Sábado
  lexicon: BDAG
  rationale: Como el griego carece de artículo, 'un sábado' preserva el valor anartro y la función de nota temporal. En español, 'sábado' mantiene la referencia al día santo judío sin necesidad de añadir una explicación intrusiva en el texto principal.
- source_word: ἐν ἐκείνῃ τῇ ἡμέρᾳ
  english_pob_choice: that day
  chosen_spanish: aquel día
  alternatives_spanish:
  - ese día
  - en aquel día
  - ese mismo día
  lexicon: BDAG
  rationale: '''Aquel día'' reproduce de forma natural la referencia deíctica del griego y suena más bíblico/narrativo que una formulación excesivamente moderna.'
theological_decisions:
- issue: Valor temporal y narrativo de σάββατον en una frase de marco
  english_pob_reading: a Sabbath
  chosen_spanish_reading: un sábado
  alternative_spanish_readings:
  - el sábado
  - Sábado
  rationale: La ausencia de artículo en el griego se conserva mejor con 'un sábado'. Esto deja claro que la frase funciona como dato temporal y no como una redefinición doctrinal del día; además, evita importar un artículo definido que el texto no tiene.
  doctrine_reference: Gramática griega de articulación; filosofia de traducción del POB §1, §6
translation_notes:
  revision_awareness: 'El texto sigue de cerca el audit trail inglés y el griego SBLGNT, conservando la secuencia narrativa: sanidad inmediata, levantamiento del lecho/camilla, y la nota temporal del sábado. Se revisó la posible ambigüedad de κράβαττον y del imperfecto περιεπάτει, optando por equivalentes naturales en español que mantienen el matiz del original.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' no aplica en este versículo.
  - Se mantiene un registro bíblico moderno y claro, evitando arcaísmos innecesarios.
  - '''sábado'' se usa como nombre del día/fiesta sin capitalización forzada en el cuerpo del texto; la mayúscula no es necesaria en español aquí.'
  - '''camilla'' refleja un lecho portátil; la nota preserva la alternativa ''tomó su camilla''.'
