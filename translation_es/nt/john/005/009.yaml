  text: καὶ εὐθέως ἐγένετο ὑγιὴς ὁ ἄνθρωπος καὶ ἦρε τὸν κράβαττον αὐτοῦ καὶ περιεπάτει. Ἦν δὲ σάββατον ἐν ἐκείνῃ τῇ ἡμέρᾳ.
base_translation:
  language: en
  yaml_path: translation/nt/john/005/009.yaml
  text: And immediately the man became well[a], and he picked up his mat and began to walk[c][b]. Now that day was a Sabbath.
  footnotes:
  - marker: a
    text: Or 'took up his bed.' The Greek κράβαττον refers to a simple mat, pallet, or sleeping pad rather than necessarily a full bed.
    reason: lexical_alternative
  - marker: b
    text: Or 'was walking.' The Greek imperfect can emphasize continued action; here it may also be understood as the beginning of his walking after being healed.
    reason: lexical_alternative
  - marker: c
    text: Or 'the Sabbath.' The Greek reads literally 'it was Sabbath on that day.'
    reason: alternative_reading
