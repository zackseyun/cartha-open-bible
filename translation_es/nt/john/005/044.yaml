    issue: Anclaje incorrecto de la nota [b]
    rationale: La nota «O «¿Cómo pueden ustedes creer...?»» corresponde a la formulación inicial de πῶς δύνασθε, no a la segunda ocurrencia de «gloria». Debe anclarse en la pregunta inicial para reflejar el audit trail inglés.
  - severity: low
    issue: Alternativa de la nota [c] poco idiomática
    rationale: «El único y solo Dios» no es una alternativa natural en español. La alternativa documentada en inglés es «the one and only God», que en español se expresa mejor como «el único y verdadero Dios» o más literalmente «el único y solo Dios», pero esta última suena forzada. La opción más fiel e idiomática aquí es «el único y verdadero Dios» solo si se quisiera interpretar más; mejor aún «el Dios único y único» no funciona. Conviene usar «el único y solo Dios» no por calidad. La mejor reparación es «el único y solo Dios» -> «el único y solo Dios» no resuelve; por tanto debe ajustarse a «el único y solo Dios» evitando extraña formulación. Una solución más fiel al audit trail y natural es «el único y único Dios» tampoco sirve. Se recomienda «el único Dios» como texto principal y en la nota «O «el Dios único»».
