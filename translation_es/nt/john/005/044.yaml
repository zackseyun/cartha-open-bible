translation:
  language: es
  text: ¿Cómo pueden[a] ustedes creer, recibiendo gloria[b] unos de otros y no buscando la gloria que proviene del único Dios[c]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¿Cómo pueden ustedes creer...?».
    reason: lexical_alternative
  - marker: b
    text: O «honor» para ambas ocurrencias de «gloria» (griego δόξα).
    reason: lexical_alternative
  - marker: c
    text: O «el Dios único».
    reason: lexical_alternative
lexical_decisions:
- source_word: πῶς
  english_pob_choice: How
  chosen_spanish: ¿Cómo
  alternatives_spanish:
  - ¿De qué manera
  - ¿Cómo pueden
  lexicon: BDAG
  rationale: La partícula interrogativa introduce una pregunta retórica sobre posibilidad o manera. «¿Cómo» conserva la forma y el tono del griego sin añadir explicaciones interpretativas.
- source_word: δύνασθε
  english_pob_choice: are ... able
  chosen_spanish: pueden
  alternatives_spanish:
  - son capaces de
  - pueden ustedes
  lexicon: BDAG
  rationale: El verbo expresa capacidad o posibilidad. En español, «pueden» comunica esa capacidad de manera natural y fiel, y el sujeto explícito «ustedes» refleja el ὑμεῖς enfático del griego.
- source_word: ὑμεῖς
  english_pob_choice: you
  chosen_spanish: ustedes
  alternatives_spanish:
  - ustedes mismos
  - vosotros
  lexicon: BDAG
  rationale: El pronombre está explícito en griego y añade énfasis. «Ustedes» es el equivalente neutral y ampliamente usable en español latinoamericano; no se intensifica más para no sobretraducir.
- source_word: πιστεῦσαι
  english_pob_choice: to believe
  chosen_spanish: creer
  alternatives_spanish:
  - tener fe
  - creer de verdad
  lexicon: BDAG
  rationale: En este contexto joánico, el infinitivo complementario se traduce de forma natural con «creer». Mantiene el sentido de confianza/fe sin introducir una paráfrasis doctrinal.
- source_word: δόξαν
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - honor
  - alabanza
  lexicon: BDAG
  rationale: Se conserva «gloria» en ambas ocurrencias para mantener la repetición léxica del griego y el contraste entre la gloria humana y la que procede de Dios. «Honor» sería posible, pero desharía esa correspondencia.
- source_word: παρ’ ἀλλήλων
  english_pob_choice: from one another
  chosen_spanish: unos de otros
  alternatives_spanish:
  - de los unos a los otros
  - entre ustedes
  lexicon: BDAG
  rationale: La frase expresa una fuente recíproca humana. «Unos de otros» es una formulación natural en español y reproduce bien el sentido relacional del original.
- source_word: λαμβάνοντες
  english_pob_choice: receiving
  chosen_spanish: recibiendo
  alternatives_spanish:
  - aceptando
  - tomando
  lexicon: BDAG
  rationale: El participio describe la práctica continua de recibir aprobación/gloria humana. «Recibiendo» es la equivalencia más directa y no añade el matiz de aprobación implícita en «aceptando».
- source_word: καὶ ... οὐ ζητεῖτε
  english_pob_choice: and not seeking
  chosen_spanish: y no buscando
  alternatives_spanish:
  - y no buscan
  - mientras no buscan
  lexicon: BDAG
  rationale: El participio y el verbo finito se coordinan para describir una conducta contrastante. «Y no buscando» conserva esa conexión sintáctica con un español natural.
- source_word: τὴν δόξαν τὴν παρὰ τοῦ μόνου θεοῦ
  english_pob_choice: the glory that is from the only God
  chosen_spanish: la gloria que proviene del único Dios
  alternatives_spanish:
  - la gloria que viene del único Dios
  - la gloria del único Dios
  lexicon: BDAG
  rationale: La construcción con artículo repetido y complemento preposicional se expresa con una relativa natural en español. «Proviene de» conserva el origen señalado por παρὰ y mantiene la distinción entre el origen humano y el divino.
- source_word: μόνου θεοῦ
  english_pob_choice: the only God
  chosen_spanish: el único Dios
  alternatives_spanish:
  - el solo Dios
  - el Dios único
  lexicon: BDAG
  rationale: μόνος marca exclusividad. «El único Dios» es la forma más directa y clara en español, preservando la fuerza monoteísta sin expandir el sentido.
theological_decisions:
- issue: Capacidad de creer en un contexto de reproche
  english_pob_reading: How are you able to believe?
  chosen_spanish_reading: ¿Cómo pueden ustedes creer?
  alternative_spanish_readings:
  - ¿Cómo pueden creer?
  - ¿De qué manera pueden creer?
  rationale: La pregunta retórica señala la incompatibilidad práctica entre buscar gloria humana y llegar a la fe auténtica. El español mantiene la tensión sin suavizarla ni convertirla en una mera observación estilística.
  doctrine_reference: 'DOCTRINE.md: Contested terms — preserve tension rather than resolve it'
- issue: δόξα repetida en dos ámbitos distintos
  english_pob_reading: glory ... the glory
  chosen_spanish_reading: gloria ... la gloria
  alternative_spanish_readings:
  - honor ... el honor
  - reconocimiento ... el reconocimiento
  rationale: 'Se mantiene la repetición de «gloria» para reflejar el paralelismo intencional del griego: la gloria recibida de seres humanos frente a la gloria que procede de Dios. Cambiar el término en español diluiría ese contraste.'
  doctrine_reference: 'DOCTRINE.md: Consistency of key terms, or documented exception'
- issue: οῦ μόνου θεοῦ como afirmación monoteísta
  english_pob_reading: the only God
  chosen_spanish_reading: el único Dios
  alternative_spanish_readings:
  - el Dios único
  - el Dios uno y solo
  rationale: La frase conserva el valor excluyente de μόνος sin introducir una glosa doctrinal adicional. En español, «el único Dios» comunica de forma directa la unicidad divina afirmada por el texto.
  doctrine_reference: 'DOCTRINE.md: Never import doctrinal claims the text does not make'
translation_notes:
  revision_awareness: Se revisó el pasaje con base en el texto griego SBLGNT y el auditor de la POB en inglés. La versión inglesa ya mostraba alta concordancia y no requirió cambios sustanciales; la traducción española conserva la estructura retórica, la repetición de δόξα y la referencia a τοῦ μόνου θεοῦ sin suavizar la tensión del versículo.
  spanish_consistency_notes:
  - Se usa «gloria» de manera uniforme para δόξα en ambas apariciones.
  - Se usa «creer» para πιστεῦσαι, en línea con el valor joánico del verbo.
  - Se traduce θεός como «Dios» y μόνος como «único» sin perifrases innecesarias.
  - El pronombre explícito ὑμεῖς queda reflejado con «ustedes» para conservar el énfasis sin artificio.
  - Las notas a pie mantienen alternativas léxicas reales, no paráfrasis libres.
