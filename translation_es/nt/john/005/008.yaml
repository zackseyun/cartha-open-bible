  glossary_alignment: 'No hay conflictos con la terminología teológica principal del proyecto. La revisión propuesta sigue la preferencia de claridad moderna: «levántate» para Ἔγειρε, «recoge» para ἆρον, y «estera» para κράβαττος, con nota sobre «cama/lecho» para conservar la alternativa tradicional y la explicación del objeto.'
