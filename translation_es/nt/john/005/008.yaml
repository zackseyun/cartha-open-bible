translation:
  language: es
  text: 'Jesús le dijo: «Levántate, recoge tu estera[a] y camina».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu cama» o «tu lecho». El término griego se refiere a una estera o jergón sencillo para dormir, no necesariamente a una cama completa.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει
  english_pob_choice: says
  chosen_spanish: dijo
  alternatives_spanish:
  - dice
  lexicon: BDAG
  rationale: En español, el presente histórico «dice» es posible, pero aquí «dijo» suena más natural y claro sin alterar el contenido del mandato. La POB inglesa preserva el presente gramatical por efecto narrativo; en español esa misma naturalidad no exige mantenerlo obligatoriamente.
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: Dativo indirecto normal en español; el pronombre átono evita redundancia y mantiene la relación verbal simple del griego.
- source_word: Ἔγειρε
  english_pob_choice: Get up
  chosen_spanish: Levántate
  alternatives_spanish:
  - Ponte de pie
  - Alzate
  lexicon: BDAG
  rationale: El imperativo de ἐγείρω pide incorporarse desde la postración. «Levántate» es la forma natural y fiel en español, equivalente funcional de «Get up».
- source_word: ἆρον
  english_pob_choice: pick up
  chosen_spanish: toma
  alternatives_spanish:
  - levanta
  - recoge
  - toma en brazos
  lexicon: BDAG
  rationale: Aunque αἴρω puede sugerir «tomar/levantar», en español «toma tu camilla» comunica de manera idiomática la acción de alzar y llevar el objeto. «Levanta» podría sonar menos natural con el complemento directo, y «recoge» es menos preciso aquí.
- source_word: κράβαττόν
  english_pob_choice: mat
  chosen_spanish: camilla
  alternatives_spanish:
  - estera
  - catre
  - colchón
  lexicon: BDAG
  rationale: El término griego designa un lecho portátil o improvisado, no una cama fija. «Camilla» preserva la idea de un soporte transportable mejor que «cama»; «estera» o «catre» son posibles, pero «camilla» resulta más clara en español sin exagerar la dignidad del objeto.
- source_word: περιπάτει
  english_pob_choice: walk
  chosen_spanish: anda
  alternatives_spanish:
  - camina
  - ve
  - sigue andando
  lexicon: BDAG
  rationale: El imperativo de περιπατέω en este contexto pide acción física concreta. «Anda» es natural, breve y conserva el sentido básico de «walk» sin añadir matices interpretativos.
theological_decisions:
- issue: La frase no explicita la sanidad en el mandato
  english_pob_reading: Render the three imperatives straightforwardly as direct physical commands without adding interpretive language about healing or miracle.
  chosen_spanish_reading: Traducir los tres imperativos como mandatos físicos directos, sin añadir «sana» ni «sé sano».
  alternative_spanish_readings:
  - «Levántate y sé sano, toma tu camilla y anda»
  - «Ponte en pie, recoge tu cama y camina»
  rationale: El griego solo ordena levantarse, tomar el lecho y andar. La implicación de sanidad pertenece al contexto inmediato, pero no está expresada lexicalmente en este versículo; por eso la traducción no debe expandir el mandato.
  doctrine_reference: 'Translation philosophy: Never paraphrase beyond what the source text warrants; preserve the text''s own wording.'
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: no se usa ningún marcador de nota al pie en el texto, por lo que no hay notas sin anclaje. La redacción sigue de cerca el griego y el audit trail inglés, con ajustes idiomáticos necesarios para el español.'
  spanish_consistency_notes:
  - Se mantuvo el nombre propio «Jesús» para Ἰησοῦς.
  - Se evitó «Señor» o cualquier sustitución interpretativa no presente en el versículo.
  - Se eligió un término portátil y concreto para κράβαττος, coherente con el valor léxico documentado.
  - No se añadió contenido de sanidad que el texto no dice explícitamente.
