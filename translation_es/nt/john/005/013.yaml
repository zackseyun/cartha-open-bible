translation:
  language: es
  text: Pero el hombre que había sido sanado no sabía quién era, porque Jesús se había retirado[a], pues había una multitud en el lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «había salido discretamente». El verbo griego sugiere que Jesús se apartó sin llamar la atención.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰαθεὶς
  english_pob_choice: the man who had been healed
  chosen_spanish: el hombre que había sido sanado
  alternatives_spanish:
  - el que había sido sanado
  - el hombre sanado
  lexicon: BDAG
  rationale: El participio aoristo pasivo funciona sustantivamente. En español, "había sido sanado" preserva la pasividad y la anterioridad respecto de "no sabía". "El hombre" está implícito por el masculino singular y se expresa de manera natural.
- source_word: οὐκ ᾔδει
  english_pob_choice: did not know
  chosen_spanish: no sabía
  alternatives_spanish:
  - no conocía
  - no estaba enterado
  lexicon: BDAG
  rationale: El imperfecto de οἶδα expresa estado de desconocimiento; "no sabía" es la equivalencia más natural y fiel en español.
- source_word: τίς ἐστιν
  english_pob_choice: who he was
  chosen_spanish: quién era
  alternatives_spanish:
  - quién era él
  - quién se trataba
  lexicon: BDAG
  rationale: La cláusula se refiere personalmente a Jesús. En español, "quién era" conserva la referencia personal sin forzar una repetición explícita del sujeto.
- source_word: ἐξένευσεν
  english_pob_choice: had withdrawn
  chosen_spanish: se había retirado
  alternatives_spanish:
  - había salido discretamente
  - se había escabullido
  lexicon: BDAG
  rationale: El verbo sugiere una salida/retirada no llamativa. "Se había retirado" mantiene el registro formal y la idea de apartarse sin hacer ruido; no se opta por una forma más coloquial que debilitaría el tono.
- source_word: ὄχλου ὄντος
  english_pob_choice: since there was a crowd
  chosen_spanish: pues había una multitud
  alternatives_spanish:
  - porque había una multitud
  - ya que había una multitud
  lexicon: BDAG
  rationale: El genitivo absoluto expresa circunstancia concomitante o explicativa. "Pues" conserva la relación causal/explicativa de forma fluida en español sin reproducir mecánicamente la estructura griega.
- source_word: ἐν τῷ τόπῳ
  english_pob_choice: in the place
  chosen_spanish: en el lugar
  alternatives_spanish:
  - allí
  - en ese lugar
  lexicon: BDAG
  rationale: '"En el lugar" reproduce de cerca el matiz locativo del griego y coincide con el valor explicativo del contexto. "Allí" sería más fluido, pero menos explícito.'
translation_notes:
  revision_awareness: 'La redacción sigue el pasaje griego directo y toma en cuenta el ajuste revisado en el testimonio inglés: se prefirió "se había retirado" por un registro más formal y un ajuste léxico más cercano a ἐξένευσεν que opciones más coloquiales como "se había escabullido".'
  spanish_consistency_notes:
  - Se mantiene "Jesús" como nombre propio establecido.
  - Se usa "sanado" para ἰαθεὶς, conservando la pasividad sin introducir vocabulario médico ajeno al texto.
  - Se evita "SEÑOR" u otro equivalente porque no aparece en este versículo.
  - La relación entre la retirada de Jesús y la presencia de la multitud se expresa con una causalidad natural en español, sin perder el matiz explicativo del genitivo absoluto.
