translation:
  language: es
  text: Sin embargo, no quieren venir a mí[a] para que tengan vida[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y no quieren venir a mí». El griego καί también puede traducirse simplemente «y», y θέλετε puede verterse «quieren».'
    reason: lexical_alternative
  - marker: b
    text: En Juan, «vida» suele llevar el sentido pleno de vida de Dios, es decir, vida eterna, aunque aquí la palabra «eterna» no aparece.
    reason: cross_reference
lexical_decisions:
- source_word: καὶ
  english_pob_choice: Yet
  chosen_spanish: Sin embargo
  alternatives_spanish:
  - Y
  - Pero
  lexicon: BDAG
  rationale: καί puede funcionar con matiz adversativo en este contexto. «Sin embargo» expresa bien la oposición implícita en español sin sobrecargar el texto.
- source_word: οὐ θέλετε
  english_pob_choice: you are not willing
  chosen_spanish: no quieren
  alternatives_spanish:
  - no están dispuestos a
  - no desean
  lexicon: BDAG
  rationale: θέλετε admite «querer» o «estar dispuesto». En español, «no quieren» conserva de forma natural el valor volitivo sin añadir una formulación más interpretativa.
- source_word: ἐλθεῖν πρός με
  english_pob_choice: to come to me
  chosen_spanish: venir a mí
  alternatives_spanish:
  - acercarse a mí
  - venir hacia mí
  lexicon: BDAG
  rationale: La construcción idiomática πρός + acusativo se rinde de manera directa con «venir a mí», preservando la imagen concreta del movimiento hacia Jesús.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: ἵνα expresa propósito aquí. «Para que» es la forma natural y clara en español.
- source_word: ζωὴν
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - vida eterna
  - vida de Dios
  lexicon: BDAG
  rationale: ζωή se traduce literalmente como «vida». Aunque en Juan suele tener profundidad salvífica, el adjetivo «eterna» no está presente en el griego de este versículo.
- source_word: ἔχητε
  english_pob_choice: you may have
  chosen_spanish: tengan
  alternatives_spanish:
  - puedan tener
  - posean
  lexicon: BDAG
  rationale: El subjuntivo con ἵνα expresa finalidad. En español, «para que tengan» comunica de forma natural ese propósito.
theological_decisions:
- issue: Cómo expresar el valor de ζωή sin añadir 'eterna' al texto principal
  english_pob_reading: life
  chosen_spanish_reading: vida
  alternative_spanish_readings:
  - vida eterna
  rationale: Juan suele usar ζωή con sentido teológico pleno, pero el texto no dice αἰώνιος. Se conserva «vida» en el cuerpo principal para no introducir un calificativo no explícito.
  doctrine_reference: 'Translation philosophy: original-language primacy; no imported qualifiers.'
- issue: Si 'venir a mí' debe interpretarse explícitamente como 'creer en mí'
  english_pob_reading: come to me
  chosen_spanish_reading: venir a mí
  alternative_spanish_readings:
  - creer en mí
  - venir a mí con fe
  rationale: El griego mantiene el verbo concreto de movimiento. En Juan, venir a Jesús está relacionado con creer, pero esa interpretación no debe reemplazar la imagen textual en el versículo.
  doctrine_reference: Preserve theological tension rather than resolving metaphor into paraphrase.
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que cada marcador de nota aparezca exactamente en el texto español y que no existan notas sin ancla.
  spanish_consistency_notes:
  - Se mantuvo «mí» en minúscula por tratarse del pronombre dentro de la cita.
  - Se evitó «Cristo» o terminología interpretativa no presente en el verso.
  - La puntuación sigue la lectura natural del español y conserva la finalidad de la cláusula con ἵνα.
