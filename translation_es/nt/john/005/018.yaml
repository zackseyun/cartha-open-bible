translation:
  language: es
  text: Por esta razón[a], pues, los judíos buscaban todavía más matarlo, porque no solo quebrantaba el sábado, sino que también llamaba a Dios su propio Padre, haciéndose igual a Dios[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: En Juan, «los judíos» con frecuencia se refiere más específicamente a los opositores de Jesús en Judea o a ciertas autoridades judías según el contexto, no a todo el pueblo judío sin distinción.
    reason: cultural_note
  - marker: b
    text: 'O: «haciéndose igual con Dios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τοῦτο οὖν
  english_pob_choice: For this reason, therefore
  chosen_spanish: Por esta razón, pues
  alternatives_spanish:
  - Por esta razón, por tanto
  - Por eso, pues
  - Así que, pues
  lexicon: BDAG
  rationale: Conservo las dos partículas inferenciales acumuladas con una frase natural en español. «Por esta razón» refleja διὰ τοῦτο y «pues» conserva la fuerza de οὖν sin sonar redundante en exceso.
- source_word: μᾶλλον
  english_pob_choice: all the more
  chosen_spanish: todavía más
  alternatives_spanish:
  - aún más
  - más todavía
  lexicon: BDAG
  rationale: La comparación intensificadora se expresa mejor en español con «todavía más», que mantiene el aumento de intensidad del verbo principal.
- source_word: ἐζήτουν ... ἀποκτεῖναι
  english_pob_choice: were seeking ... to kill
  chosen_spanish: buscaban ... matarlo
  alternatives_spanish:
  - intentaban ... matarlo
  - buscaban ... darle muerte
  lexicon: BDAG
  rationale: El imperfecto se conserva con «buscaban», que suena natural y durativo. «Matarlo» comunica con claridad ἀποκτεῖναι sin alejarse de la fuerza verbal del griego.
- source_word: οἱ Ἰουδαῖοι
  english_pob_choice: the Jews
  chosen_spanish: los judíos
  alternatives_spanish:
  - los judeanos
  - los dirigentes judíos
  lexicon: BDAG
  rationale: Sigo el valor lexical directo del griego. No estrecho el referente en el texto principal; la posible precisión contextual queda para nota, como en el audit trail inglés.
- source_word: ἔλυε τὸ σάββατον
  english_pob_choice: was ... breaking the Sabbath
  chosen_spanish: quebrantaba el sábado
  alternatives_spanish:
  - violaba el sábado
  - anulaba el sábado
  lexicon: BDAG
  rationale: «Quebrantar» es un equivalente natural y bíblicamente inteligible para la acusación de ἔλυε. Mantiene el valor de violar/romper la norma sin sonar mecánico.
- source_word: πατέρα ἴδιον ἔλεγε τὸν θεόν
  english_pob_choice: was ... calling God his own Father
  chosen_spanish: llamaba a Dios su propio Padre
  alternatives_spanish:
  - decía que Dios era su propio Padre
  - llamaba Padre a Dios de modo único
  lexicon: BDAG
  rationale: Preservo ἴδιον con «su propio», porque señala una relación filial distintiva. «Llamaba a Dios» sigue el verbo ἔλεγε de manera idiomática en español y evita introducir una paráfrasis más fuerte que la del texto.
- source_word: ἴσον ἑαυτὸν ποιῶν τῷ θεῷ
  english_pob_choice: making himself equal with God
  chosen_spanish: haciéndose igual a Dios
  alternatives_spanish:
  - haciéndose igual con Dios
  - presentándose como igual a Dios
  lexicon: BDAG
  rationale: «Haciéndose igual a Dios» reproduce la conclusión acusatoria del participio y conserva la afirmación de igualdad sin suavizarla. «Igual a Dios» es el giro más natural en español y evita un calcado innecesario de la preposición inglesa.
theological_decisions:
- issue: Fuerza cristológica de la igualdad con Dios
  english_pob_reading: Retained 'making himself equal with God' in the main text
  chosen_spanish_reading: haciéndose igual a Dios
  alternative_spanish_readings:
  - haciéndose igual con Dios
  - reclamando igualdad con Dios
  rationale: 'La redacción mantiene la carga cristológica alta del versículo sin añadir terminología posterior ajena al texto. No se atenúa la acusación narrada por Juan: la filiación reclamada implica igualdad con Dios.'
  doctrine_reference: Credo Niceno (381 d.C.), lenguaje de la plena divinidad del Hijo
- issue: Referente de «los judíos» en Juan
  english_pob_reading: Kept 'the Jews' in the main text with contextual clarification in a footnote
  chosen_spanish_reading: los judíos
  alternative_spanish_readings:
  - los dirigentes judíos
  - los judeanos
  rationale: Se conserva la forma léxica del griego en el cuerpo del texto. La posible precisión histórica o narrativa no se impone como traducción, sino que puede aclararse en nota.
  doctrine_reference: Primacía del texto original; preservar la tensión interpretativa sin resolverla por glosa
- issue: Relación entre «llamaba a Dios su propio Padre» y la implicación de igualdad
  english_pob_reading: making himself equal with God
  chosen_spanish_reading: llamaba a Dios su propio Padre, haciéndose igual a Dios
  alternative_spanish_readings:
  - decía que Dios era su propio Padre
  - haciéndose igual con Dios
  rationale: La cláusula participial expresa la inferencia de los opositores y del narrador; no debe debilitarse a mera cortesía religiosa. La nota permite reconocer la alternativa preposicional sin perder la lectura principal.
  doctrine_reference: Cristología joánica; preservación de la inferencia narrativa del evangelista
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego de SBLGNT y concuerda con el auditor inglés en mantener «los judíos», la intensificación de μᾶλλον, el imperfecto durativo de ἐζήτουν y la afirmación fuerte de igualdad con Dios. Se evitó un calco innecesario en la cláusula final, usando un español natural que conserva el valor acusatorio del participio.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero aquí el texto usa θεός y no aparece el nombre divino.
  - «sábado» se conserva como término litúrgico-bíblico estándar en español.
  - Se usa «haciéndose» para reflejar el participio presente con matiz simultáneo.
  - La nota de «los judíos» preserva la distinción contextual sin alterar el texto principal.
