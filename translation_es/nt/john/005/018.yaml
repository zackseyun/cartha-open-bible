  text: διὰ τοῦτο οὖν μᾶλλον ἐζήτουν αὐτὸν οἱ Ἰουδαῖοι ἀποκτεῖναι ὅτι οὐ μόνον ἔλυε τὸ σάββατον, ἀλλὰ καὶ πατέρα ἴδιον ἔλεγε τὸν θεόν, ἴσον ἑαυτὸν ποιῶν τῷ θεῷ.
base_translation:
  language: en
  yaml_path: translation/nt/john/005/018.yaml
  text: For this reason[a], therefore, the Jews were seeking all the more to kill him, because he was not only breaking the Sabbath, but was also calling God his own Father[b], making himself equal with God.
  footnotes:
  - marker: a
    text: In John, 'the Jews' often refers more specifically to Jesus' Judean opponents or certain Jewish authorities in context, not to every Jewish person without distinction.
    reason: cultural_note
  - marker: b
    text: Or 'making himself equal to God.'
    reason: lexical_alternative
