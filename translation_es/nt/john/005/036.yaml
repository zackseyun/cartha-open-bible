translation:
  language: es
  text: Pero yo tengo un testimonio[a] mayor que el de Juan; porque las obras que el Padre me ha dado para completarlas —estas mismas obras que hago— dan testimonio acerca de mí de que el Padre me ha enviado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «un testimonio mayor que el de Juan». También puede expresarse: «un testimonio superior al de Juan».'
    reason: lexical_alternative
lexical_decisions:
- source_word: μαρτυρίαν
  english_pob_choice: testimony
  chosen_spanish: testimonio
  alternatives_spanish:
  - testigo
  - testificación
  lexicon: BDAG
  rationale: En Juan, μαρτυρία puede expresar el valor evidencial del dicho o de la prueba presentada. «Testimonio» funciona naturalmente con «tener» y conserva el matiz jurídico-evidencial que el POB inglés quiso resguardar con testimony.
- source_word: μείζω
  english_pob_choice: greater
  chosen_spanish: mayor
  alternatives_spanish:
  - más grande
  - superior
  lexicon: BDAG
  rationale: El comparativo pide una expresión directa de superioridad. «Mayor» es natural en español y comunica la misma comparación de grado que «greater».
- source_word: τοῦ Ἰωάννου
  english_pob_choice: than John's
  chosen_spanish: que el de Juan
  alternatives_spanish:
  - que Juan
  - que el testimonio de Juan
  lexicon: BDAG
  rationale: El genitivo es elíptico y se refiere al testimonio de Juan. En español, «que el de Juan» preserva esa elipsis sin expandir demasiado el texto.
- source_word: ἔργα
  english_pob_choice: works
  chosen_spanish: obras
  alternatives_spanish:
  - hechos
  - acciones
  - obras/obras poderosas
  lexicon: BDAG
  rationale: En Juan, ἔργα puede abarcar las obras asignadas por el Padre y no solo milagros. «Obras» mantiene mejor esa amplitud teológica que opciones más restrictivas.
- source_word: δέδωκέν μοι
  english_pob_choice: has given me
  chosen_spanish: me ha dado
  alternatives_spanish:
  - me dio
  lexicon: BDAG
  rationale: El perfecto griego conserva una acción dada con relevancia vigente. «Me ha dado» refleja bien ese valor aspectual en español.
- source_word: ὁ πατήρ
  english_pob_choice: the Father
  chosen_spanish: el Padre
  alternatives_spanish:
  - Dios
  - mi Padre
  lexicon: BDAG
  rationale: La expresión titular ὁ πατήρ se preserva como «el Padre», siguiendo la relación cristológica marcada por el texto sin añadir posesivo que no está explícito.
- source_word: ἵνα τελειώσω αὐτά
  english_pob_choice: to complete
  chosen_spanish: para que las lleve a cabo
  alternatives_spanish:
  - para completarlas
  - para terminarlas
  - para que las cumpla
  lexicon: BDAG
  rationale: τελειόω aquí expresa llevar a su cumplimiento lo encomendado. «Para que las lleve a cabo» comunica la finalidad y evita reducirlo a solo «terminar», que suena menos pleno en español.
- source_word: αὐτὰ τὰ ἔργα
  english_pob_choice: these very works
  chosen_spanish: estas mismas obras
  alternatives_spanish:
  - las mismas obras
  - esas mismas obras
  lexicon: BDAG
  rationale: La repetición enfática de αὐτά se vierte naturalmente como «estas mismas». Así se conserva el énfasis demostrativo del griego.
- source_word: ἃ ποιῶ
  english_pob_choice: that I am doing
  chosen_spanish: que hago
  alternatives_spanish:
  - que estoy haciendo
  - las que hago
  lexicon: BDAG
  rationale: El presente griego puede leerse como acción en curso. «Que hago» es breve y fiel; el contexto ya sugiere actividad presente sin necesidad de un progresivo explícito.
- source_word: μαρτυρεῖ περὶ ἐμοῦ
  english_pob_choice: testify about me
  chosen_spanish: dan testimonio acerca de mí
  alternatives_spanish:
  - testifican de mí
  - dan testimonio de mí
  lexicon: BDAG
  rationale: El verbo está en singular, pero en español el sujeto compuesto «las obras... estas mismas obras que hago» se resume mejor con plural concordando con el referente semántico. «Acerca de mí» conserva el valor de περί sin forzar un giro poco natural.
- source_word: ἀπέσταλκεν
  english_pob_choice: has sent
  chosen_spanish: ha enviado
  alternatives_spanish:
  - me envió
  lexicon: BDAG
  rationale: El perfecto indica envío con vigencia presente. «Ha enviado» mantiene ese valor aspectual y es natural en español.
theological_decisions:
- issue: Naturaleza del testimonio de las obras
  english_pob_reading: Jesus claims that the Father's assigned works provide testimony greater than John's and confirm that the Father has sent him.
  chosen_spanish_reading: Jesús afirma que las obras que el Padre le ha dado constituyen un testimonio mayor que el de Juan y confirman que el Padre lo ha enviado.
  alternative_spanish_readings:
  - Las obras son solo milagros que prueban su autoridad.
  - Las obras son meramente acciones poderosas sin carga reveladora amplia.
  rationale: La traducción conserva que las obras son testimonio y no las reduce a milagros solamente. Eso respeta la amplitud de ἔργα en Juan y la afirmación explícita del envío por el Padre.
  doctrine_reference: 'Affirmations; Translation philosophy #3'
- issue: Valor de ὁ πατήρ
  english_pob_reading: the Father
  chosen_spanish_reading: el Padre
  alternative_spanish_readings:
  - Dios
  - mi Padre
  rationale: El griego usa el título relacional ὁ πατήρ. «El Padre» mantiene la formulación del texto sin introducir una posesión que no aparece explícitamente.
  doctrine_reference: 'Affirmations; Translation philosophy #1'
translation_notes:
  revision_awareness: El pasaje coincide en sustancia con el último estado auditado del texto inglés; no se documentan revisiones adicionales aplicadas en la fuente inglesa. La versión española sigue el mismo perfil de equivalencia óptima, preservando el contraste «mayor que el de Juan», la referencia a las obras dadas por el Padre y el testimonio sobre el envío del Padre.
  spanish_consistency_notes:
  - Se mantiene «Padre» con mayúscula como título relacional cristológico.
  - Se conserva «obras» para ἔργα, evitando restringirlo a «milagros».
  - Se usa «ha enviado» para reflejar el perfecto griego, en paralelo con «me ha dado».
  - El orden y la puntuación buscan hacer audible la triple cláusula del griego sin perder naturalidad en español.
