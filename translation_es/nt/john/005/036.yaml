revisions:
- from: Pero yo tengo un testimonio[a] mayor que el de Juan; porque las obras que el Padre me ha dado para que las lleve a cabo, estas mismas obras que hago, dan testimonio acerca de mí de que el Padre me ha enviado.
  to: Pero yo tengo un testimonio[a] mayor que el de Juan; porque las obras que el Padre me ha dado para completarlas —estas mismas obras que hago— dan testimonio acerca de mí de que el Padre me ha enviado.
  rationale: Se corrige la nota al pie para que refleje con fidelidad la alternativa léxica de μαρτυρίαν sin convertirla erróneamente en «testigo». Se ajusta «para que las lleve a cabo» a «para completarlas» para representar mejor τελειώσω y la decisión auditada del POB. Se añaden rayas para marcar el inciso enfático y mejorar la legibilidad sin cambiar el sentido.
