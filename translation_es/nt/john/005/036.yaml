review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del griego y del POB inglés: contrasta el testimonio de Jesús con el de Juan, preserva «las obras» como categoría teológica joánica, mantiene «el Padre» y refleja adecuadamente los perfectos con «me ha dado» y «me ha enviado». La elipsis de τοῦ Ἰωάννου se resuelve bien con «el de Juan».'
  spanish_quality_summary: El español es claro y digno, pero hay dos detalles mejorables. Primero, la nota alternativa «testigo mayor» no corresponde a μαρτυρίαν; debe ser «testimonio» o «dar testimonio». Segundo, «para que las lleve a cabo» es aceptable, pero «para completarlas» se ajusta mejor a τελειώσω y al POB auditado. También conviene puntuar con rayas para reflejar mejor el inciso enfático «estas mismas obras que hago».
  glossary_alignment: 'No hay conflictos con la terminología del proyecto: «el Padre», «obras», «testimonio» y «me ha enviado» están alineados. La única desviación significativa está en la nota léxica, donde «testigo» confunde el sustantivo abstracto μαρτυρία con una persona que atestigua.'
  issues:
  - severity: medium
    issue: La nota al pie traduce mal la alternativa léxica de μαρτυρίαν como «testigo».
    rationale: μαρτυρία significa «testimonio» o, por extensión contextual, «dar testimonio», no «testigo» (persona). La nota debe preservar la alternativa del POB inglés sin introducir un cambio de categoría semántica.
  - severity: low
    issue: «Para que las lleve a cabo» es menos preciso que «para completarlas».
    rationale: τελειώσω apunta a completar/consumar lo encomendado. «Llevar a cabo» comunica realización, pero atenúa el matiz de culminación presente en el verbo y en la decisión léxica inglesa documentada.
  - severity: low
    issue: La puntuación puede reflejar mejor el inciso enfático del griego.
    rationale: El POB inglés usa rayas para marcar el inciso «these very works that I am doing». En español, las rayas mejoran la legibilidad y reproducen mejor el énfasis discursivo.
  revised_spanish_text: Pero yo tengo un testimonio[a] mayor que el de Juan; porque las obras que el Padre me ha dado para completarlas —estas mismas obras que hago— dan testimonio acerca de mí de que el Padre me ha enviado.
  revised_footnotes:
  - marker: a
    text: 'O «un testimonio mayor que el de Juan». También puede expresarse: «un testimonio superior al de Juan».'
    reason: lexical_alternative
  revision_rationale: Se corrige la nota al pie para que refleje con fidelidad la alternativa léxica de μαρτυρίαν sin convertirla erróneamente en «testigo». Se ajusta «para que las lleve a cabo» a «para completarlas» para representar mejor τελειώσω y la decisión auditada del POB. Se añaden rayas para marcar el inciso enfático y mejorar la legibilidad sin cambiar el sentido.
