  to: 'Pero él les respondió: «El que me sanó, ese me dijo: “Levanta tu estera[a] y camina”».'
  rationale: Se ajusta la frase de sanidad a un español natural y fiel al contexto («me sanó»), se reemplaza «camilla» por «estera» para reflejar mejor κράβαττος, y se usa «camina» por mayor claridad panhispánica. Se mantiene el énfasis de «ese» para ἐκεῖνός. La nota se concentra en la verdadera alternativa léxica relevante del objeto.
