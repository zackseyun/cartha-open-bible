    issue: «me hizo estar sano» es una formulación poco idiomática para Ὁ ποιήσας με ὑγιῆ
    rationale: Aunque intenta reflejar el valor causativo de ποιέω, en español suena artificial. En este contexto narrativo de sanidad, «me sanó» transmite de forma natural el resultado físico sin importar una ampliación doctrinal.
  - severity: medium
    issue: «camilla» para κράβαττον puede inducir una imagen moderna incorrecta
    rationale: En español actual, «camilla» suele evocar una camilla médica o mueble específico. El griego alude a una estera o lecho sencillo portátil; «estera» comunica mejor el referente.
  - severity: low
    issue: La distribución de notas no coincide idealmente con las palabras que explican
    rationale: La nota sobre alternativas de κράβαττον debe anclarse al sustantivo correspondiente en el texto, no a «respondió».
