translation:
  language: es
  text: 'Pero él les respondió: «El que me sanó, ese me dijo: “Levanta tu estera[a] y camina”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lecho»; el griego se refiere a una estera o lecho sencillo portátil.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: BDAG
  rationale: En español bíblico moderno, «respondió» comunica de manera natural la acción narrativa de contestar a otros. Mantiene el valor de ἀποκρίνομαι sin sonar excesivamente arcaico.
- source_word: Ὁ ποιήσας με ὑγιῆ
  english_pob_choice: The one who made me well
  chosen_spanish: El que me hizo estar sano
  alternatives_spanish:
  - El que me hizo estar bien
  - El que me sanó
  lexicon: BDAG
  rationale: La construcción participial articular se vierte con «el que» para conservar su función sustantiva. «Hizo estar sano» refleja el causativo de ποιέω con ὑγιής y evita introducir una simple paráfrasis de «sanó» que podría borrar la relación léxica original entre hacer y quedar sano.
- source_word: ὑγιῆ
  english_pob_choice: well
  chosen_spanish: estar sano
  alternatives_spanish:
  - estar bien
  - estar saludable
  lexicon: BDAG
  rationale: «Sano» conserva el campo semántico de ὑγιής en un contexto de curación física. «Estar bien» es más idiomático pero más general; «saludable» suena menos natural aplicado a una persona recién sanada.
- source_word: ἐκεῖνός
  english_pob_choice: that one
  chosen_spanish: ese
  alternatives_spanish:
  - aquel
  - él mismo
  lexicon: BDAG
  rationale: El demostrativo es enfático en griego. «Ese» conserva la dexis y el matiz enfático en español, sin suavizarlo a un simple pronombre personal.
- source_word: Ἆρον
  english_pob_choice: Pick up
  chosen_spanish: Levanta
  alternatives_spanish:
  - Toma
  - Recoge
  lexicon: BDAG
  rationale: El imperativo aoristo de αἴρω pide una orden concreta y breve. «Levanta» expresa con naturalidad la acción de cargar/tomar consigo el objeto; en español de uso eclesial resulta más claro que un calco rígido.
- source_word: κράβαττόν
  english_pob_choice: mat
  chosen_spanish: camilla
  alternatives_spanish:
  - estera
  - colchoneta
  - lecho
  lexicon: BDAG
  rationale: La referencia es a un lecho sencillo portátil. «Camilla» comunica bien la idea de un soporte transportable en español actual, aunque no es exacto a una camilla médica moderna; por eso se conserva una nota alternativa posible en la traducción del objeto.
- source_word: περιπάτει
  english_pob_choice: walk
  chosen_spanish: anda
  alternatives_spanish:
  - camina
  - anda
  lexicon: BDAG
  rationale: El imperativo presente indica la acción ordenada de continuar moviéndose. «Anda» suena natural en español y reproduce la orden con concisión; «camina» sería igualmente viable pero algo más descriptivo.
theological_decisions:
- issue: Descripción de la sanidad sin ampliar el sentido a una afirmación espiritual no explícita
  english_pob_reading: made me well
  chosen_spanish_reading: me hizo estar sano
  alternative_spanish_readings:
  - me sanó
  - me hizo estar bien
  rationale: La escena se refiere a la curación física inmediata. «Me hizo estar sano» conserva el hecho de la sanidad sin cargar la frase con connotaciones adicionales de plenitud espiritual que el griego inmediato no exige.
  doctrine_reference: 'Translation philosophy: preserve the concrete claim of the text and avoid importing theological expansion not stated by the source.'
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior anclando ambos marcadores de nota dentro del texto español: [a] en «respondió» y [b] en «sano». La redacción mantiene el contenido del griego y la auditoría inglesa, con una opción natural en español para el objeto κράβαττος.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, aunque este versículo no contiene el nombre divino.
  - Se conserva un registro bíblico moderno y digno, evitando calcos innecesarios.
  - «Sano» preserva mejor la relación con ὑγιής que una simple paráfrasis de «bien».
  - «Camilla» se usa solo como opción de equivalencia funcional en español; la nota explica la posibilidad de «lecho» o «estera» para no borrar la tensión léxica.
