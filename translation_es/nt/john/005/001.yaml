translation:
  language: es
  text: Después de estas cosas[a], hubo una fiesta de los judíos[b], y Jesús subió a Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Después de esto».'
    reason: lexical_alternative
  - marker: b
    text: Aquí «los judíos» se refiere al pueblo judío en relación con una de sus observancias festivas; en algunos contextos de Juan, Ἰουδαῖοι también puede traducirse «judeanos».
    reason: lexical_alternative
lexical_decisions:
- source_word: Μετὰ ταῦτα
  english_pob_choice: After these things
  chosen_spanish: Después de estas cosas
  alternatives_spanish:
  - Después de esto
  - Luego de estas cosas
  lexicon: BDAG
  rationale: Conserva la transición narrativa explícita del griego y refleja el plural de ταῦτα sin suavizarlo demasiado; 'Después de estas cosas' es una fórmula natural y suficientemente formal en español bíblico moderno.
- source_word: ἦν
  english_pob_choice: there was
  chosen_spanish: hubo
  alternatives_spanish:
  - había
  - era
  lexicon: BDAG
  rationale: En español, una construcción existencial como 'hubo' expresa con naturalidad la introducción de un acontecimiento festivo. 'Había' también sería posible, pero 'hubo' evita sonar demasiado descriptivo y se ajusta mejor al inicio de un evento puntual.
- source_word: ἑορτὴ
  english_pob_choice: a feast
  chosen_spanish: una fiesta
  alternatives_spanish:
  - una fiesta solemne
  - un festival
  lexicon: BDAG
  rationale: '''ἑορτή'' designa una celebración religiosa o festiva. ''Fiesta'' es la forma más directa y comprensible en español, y permite mantener el tono narrativo sin introducir una precisión litúrgica no exigida por el texto. Se preserva la posibilidad de ''festival'' en nota.'
- source_word: τῶν Ἰουδαίων
  english_pob_choice: of the Jews
  chosen_spanish: de los judíos
  alternatives_spanish:
  - de los judeanos
  - del pueblo judío
  lexicon: BDAG
  rationale: El genitivo identifica la festividad como perteneciente u observada por los judíos. 'De los judíos' sigue de cerca el griego y corresponde al juicio del audit trail; no se reemplaza por una paráfrasis étnica o regional sin necesidad textual.
- source_word: ἀνέβη
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - fue
  - ascendió
  lexicon: BDAG
  rationale: '''Subió'' conserva la imagen direccional del verbo y la convención bíblica de ir a Jerusalén en ascenso geográfico y peregrinación. ''Fue'' pierde esa fuerza; ''ascendió'' suena demasiado técnico o solemne en español.'
- source_word: Ἱεροσόλυμα
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalén
  lexicon: BDAG
  rationale: Nombre propio estándar en español para la ciudad.
theological_decisions:
- issue: Sentido de Ἰουδαίων en Juan 5:1
  english_pob_reading: Rendered as 'the Jews' in this verse; in this context it refers to a Jewish festal observance rather than a regional identity.
  chosen_spanish_reading: Se traduce 'los judíos' aquí como referencia al pueblo judío en relación con una observancia festiva, no como una marca polémica ni como 'judeanos'.
  alternative_spanish_readings:
  - los judeanos
  - el pueblo judío
  rationale: El contexto inmediato habla de una fiesta vinculada a la comunidad judía; por eso la traducción directa 'los judíos' es fiel al griego y al juicio del POB inglés. Se deja abierta la nota sobre la posible lectura 'judeanos' en otros contextos joánicos, pero aquí no es la opción más ajustada.
  doctrine_reference: Principio de primacía de la lengua original y preservación del alcance contextual sin forzar una lectura posterior al texto.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran alta concordancia y no registran revisiones sustantivas; la versión española sigue de cerca esa lectura estable sin introducir expansiones. Mantengo la nota alternativa para la posible equivalencia de ἑορτή y la formulación transicional de Μετὰ ταῦτα.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto, pero no aparece en este versículo.
  - '''Jesús'' y ''Jerusalén'' siguen la terminología española estándar del proyecto.'
  - '''Fiesta'' se usa aquí en sentido religioso, evitando ''festival'' en el texto principal para no aumentar la modernidad por encima del griego.'
