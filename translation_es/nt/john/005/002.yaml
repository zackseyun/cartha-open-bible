base_translation:
  language: en
  yaml_path: translation/nt/john/005/002.yaml
  text: Now there is in Jerusalem[a], by the Sheep Gate, a pool called Bethesda in Hebrew[c][b], having five porticoes.
  footnotes:
  - marker: a
    text: Or 'in Aramaic'; John's expression 'in Hebrew' often refers to the local Semitic language of Judea rather than classical Hebrew strictly speaking.
    reason: lexical_alternative
  - marker: b
    text: Some manuscripts read 'Bethzatha' or 'Bethsaida' instead of 'Bethesda.'
    reason: textual_variant
  - marker: c
    text: The Greek likely refers to the area of the Sheep Gate (compare Nehemiah 3:1; 12:39), with 'Gate' understood though not explicitly stated here.
    reason: cross_reference
