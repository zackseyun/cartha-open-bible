translation:
  language: es
  text: Ahora hay en Jerusalén, junto a la Puerta de las Ovejas[c], un estanque llamado Betesda en hebreo[a][b], con cinco pórticos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en arameo»; la expresión de Juan «en hebreo» a menudo se refiere a la lengua semítica local de Judea, no estrictamente al hebreo clásico.
    reason: lexical_alternative
  - marker: b
    text: Algunos manuscritos leen «Bethzatha» o «Bethsaida» en lugar de «Betesda».
    reason: textual_variant
  - marker: c
    text: Es probable que el griego se refiera al área de la Puerta de las Ovejas (compárese Nehemías 3:1; 12:39), con «Puerta» entendida aunque no esté explícita aquí.
    reason: cross_reference
lexical_decisions:
- source_word: ἔστιν δὲ
  english_pob_choice: Now there is
  chosen_spanish: Ahora hay
  alternatives_spanish:
  - Y hay
  - Ahora existe
  lexicon: BDAG
  rationale: El presente ἔστιν se conserva de manera natural con «hay». «Ahora» reproduce la transición discursiva de δέ sin cargarla de contraste fuerte.
- source_word: ἐν τοῖς Ἱεροσολύμοις
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en la ciudad de Jerusalén
  lexicon: BDAG
  rationale: Aunque el griego usa una forma plural, el nombre propio español idiomático y fiel es «Jerusalén».
- source_word: ἐπὶ τῇ προβατικῇ
  english_pob_choice: by the Sheep Gate
  chosen_spanish: junto a la Puerta de las Ovejas
  alternatives_spanish:
  - junto al estanque de las Ovejas
  - cerca de la Puerta de las Ovejas
  lexicon: BDAG
  rationale: La frase es elíptica y probablemente alude al sector de la Puerta de las Ovejas. En español, «Puerta de las Ovejas» mantiene la referencia topográfica con un sustantivo suministrado por el contexto, como en la decisión inglesa.
- source_word: κολυμβήθρα
  english_pob_choice: a pool
  chosen_spanish: un estanque
  alternatives_spanish:
  - una piscina
  - un estanque/poza
  lexicon: BDAG
  rationale: «Estanque» comunica bien la idea de reservorio de agua sin sonar demasiado moderno; «piscina» podría sugerir un sentido demasiado actual o recreativo.
- source_word: ἡ ἐπιλεγομένη
  english_pob_choice: called
  chosen_spanish: llamado
  alternatives_spanish:
  - que se llama
  - nombrado
  lexicon: BDAG
  rationale: El participio pasivo introduce el nombre del lugar; «llamado» es natural y conserva la designación.
- source_word: Ἑβραϊστὶ
  english_pob_choice: in Hebrew
  chosen_spanish: en hebreo
  alternatives_spanish:
  - en arameo
  - en la lengua hebrea
  lexicon: BDAG
  rationale: 'Se mantiene la lectura explícita del texto: «en hebreo». La posible referencia al idioma semítico local se preserva en la nota.'
- source_word: Βηθεσδά
  english_pob_choice: Bethesda
  chosen_spanish: Betesda
  alternatives_spanish:
  - Betesda
  - Bétesda
  lexicon: NA28/SBLGNT textual tradition
  rationale: Se translitera al español como nombre propio bíblico común, manteniendo la forma del texto base SBLGNT.
- source_word: πέντε στοὰς ἔχουσα
  english_pob_choice: having five porticoes
  chosen_spanish: con cinco pórticos
  alternatives_spanish:
  - que tenía cinco pórticos
  - teniendo cinco pórticos
  lexicon: BDAG
  rationale: «Pórticos» es la equivalencia más natural para στοά; la preposición «con» vuelve la construcción participial fluida en español sin perder el dato arquitectónico.
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando cada nota con su marca correspondiente en el texto español; además, se mantuvo la lectura principal del texto SBLGNT y la nota de variante textual del audit trail inglés.
  spanish_consistency_notes:
  - Se conservó el nombre propio bíblico como «Betesda», coherente con la tradición textual base SBLGNT.
  - «Pórticos» se usa para στοά, evitando una paráfrasis demasiado libre y manteniendo la arquitectura indicada por el griego.
  - La referencia topográfica «Puerta de las Ovejas» sigue la decisión contextual del audit trail inglés y no se reduce a una simple mención de un estanque.
