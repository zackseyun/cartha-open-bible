translation:
  language: es
  text: Porque así como el Padre resucita a los muertos y da vida[a], así también el Hijo da vida a quienes quiere.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hace vivir» en ambas ocurrencias de «da vida».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὥσπερ γὰρ
  english_pob_choice: For just as
  chosen_spanish: Porque así como
  alternatives_spanish:
  - Pues así como
  - Porque tal como
  lexicon: BDAG
  rationale: Conserva la función explicativa de γάρ con «porque» y el valor comparativo de ὥσπερ con «así como», en un español natural y solemne.
- source_word: ὁ πατὴρ
  english_pob_choice: the Father
  chosen_spanish: el Padre
  alternatives_spanish:
  - el padre
  lexicon: BDAG
  rationale: En este contexto joánico se trata de Dios Padre como título relacional; la mayúscula no es visible en español hablado, pero el artículo y el contexto mantienen la referencia.
- source_word: ἐγείρει
  english_pob_choice: raises
  chosen_spanish: levanta
  alternatives_spanish:
  - resucita
  - despierta
  lexicon: BDAG
  rationale: «Levanta» puede abarcar el sentido de despertar/resucitar en contexto de muertos; se evita cargar de antemano una sola lectura más técnica si el paralelismo con ζῳοποιεῖ ya expresa el resultado vital.
- source_word: τοὺς νεκρούς
  english_pob_choice: the dead
  chosen_spanish: a los muertos
  alternatives_spanish:
  - a los muertos ones
  - a los difuntos
  lexicon: BDAG
  rationale: El sustantivo/adjetivo sustantivado se vierte de modo idiomático en español sin añadir especificaciones ajenas al griego.
- source_word: ζῳοποιεῖ
  english_pob_choice: gives life
  chosen_spanish: les da vida
  alternatives_spanish:
  - los hace vivir
  - los vivifica
  lexicon: BDAG
  rationale: «Dar vida» comunica de forma clara el acto de impartir vida; el pronombre «les» en la primera ocurrencia evita añadir un objeto explícito inexistente en el griego, siguiendo la cautela del POB inglés.
- source_word: οὕτως καὶ
  english_pob_choice: so also
  chosen_spanish: así también
  alternatives_spanish:
  - de igual manera también
  - de ese modo también
  lexicon: BDAG
  rationale: Mantiene el paralelismo enfático entre Padre e Hijo con una fórmula natural en español.
- source_word: ὁ υἱὸς
  english_pob_choice: the Son
  chosen_spanish: el Hijo
  alternatives_spanish:
  - el hijo
  lexicon: BDAG
  rationale: Título cristológico en el discurso de Juan; se conserva la forma titulada en español.
- source_word: οὓς θέλει
  english_pob_choice: to whom he wishes
  chosen_spanish: a quienes quiere
  alternatives_spanish:
  - a quienes desea
  - a quienes quiere él
  lexicon: BDAG
  rationale: «Querer» preserva la volición del verbo θέλω con naturalidad en español y sin la arcaización de «quiere»/«quisiere»; la preposición «a» refleja el régimen del relativo humano en español.
- source_word: ζῳοποιεῖ
  english_pob_choice: gives life
  chosen_spanish: da vida
  alternatives_spanish:
  - vivifica
  - hace vivir
  lexicon: BDAG
  rationale: Repite la misma decisión léxica que en la primera cláusula para mantener la correspondencia semántica del versículo.
theological_decisions:
- issue: Paralelismo Padre-Hijo en la acción vivificante
  english_pob_reading: The verse is rendered to preserve the explicit parallel that the Son gives life in the same way the Father does, without weakening the christological force.
  chosen_spanish_reading: 'La traducción conserva el paralelo explícito: el Padre da vida y el Hijo da vida, de modo correspondiente, sin suavizar la afirmación cristológica.'
  alternative_spanish_readings:
  - Parafrasear para diluir la simetría entre Padre e Hijo
  - Explicar teológicamente la relación en el texto principal
  rationale: El griego presenta una comparación deliberada entre la acción vivificante del Padre y la del Hijo. La versión española debe dejar visible esa simetría sin agregar explicaciones doctrinales ajenas al versículo.
  doctrine_reference: Concilio de Nicea (381) y cristología joánica; principio POB de conservar la tensión teológica del texto.
- issue: θέλει y la volición del Hijo
  english_pob_reading: Rendered as 'wishes' rather than 'wills' in the main text.
  chosen_spanish_reading: Se expresa con «quiere», que transmite volición real en español contemporáneo.
  alternative_spanish_readings:
  - quiere
  - desea
  - quiere hacer vivir
  rationale: En español «quiere» es la forma más natural para θέλω aquí y no debilita la libertad o autoridad del Hijo; evita además un registro excesivamente formal o arcaizante.
  doctrine_reference: 'Principio de traducción POB: claridad moderna sin perder la fuerza semántica del original.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que eliminó un objeto explícito añadido tras «da vida» para mantener el paralelismo con el griego; por eso la primera mitad dice «les da vida» sin repetir un objeto directo explícito, y la segunda repite la misma expresión básica «da vida» para conservar la correspondencia del versículo.
  spanish_consistency_notes:
  - Se mantiene «Padre» y «Hijo» como títulos cristológicos coherentes con el registro joánico.
  - Se eligió «dar vida» en ambas ocurrencias de ζῳοποιεῖ para preservar la repetición semántica del original.
  - Se usa «quiere» para θέλει por claridad y naturalidad en español, sin recurrir a «wills» o a fórmulas arcaicas.
  - La puntuación reproduce la estructura comparativa del versículo y evita introducir material interpretativo.
