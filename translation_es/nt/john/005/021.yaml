review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura comparativa de ὥσπερ γὰρ ... οὕτως καὶ, el paralelismo Padre-Hijo y el sentido general de ζῳοποιεῖ como impartir vida. Sin embargo, en la primera cláusula añade «les», mientras que la revisión inglesa auditada eliminó el objeto explícito para conservar mejor la forma griega y el paralelismo con la segunda cláusula. Además, la nota [b] no corresponde bien al inglés auditado ni aporta una alternativa significativa.
  spanish_quality_summary: El español es claro y legible, con buen registro eclesial moderno. No obstante, «levanta a los muertos» suena menos natural en contexto de resurrección que «resucita a los muertos», y la combinación «levanta ... y da vida» puede sentirse algo redundante o imprecisa en español. «Resucita» comunica mejor ἐγείρει aquí sin perder fidelidad. También conviene quitar una nota menor innecesaria.
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. «Padre», «Hijo» y «vida» están bien. La decisión principal a corregir es estilístico-lexical y de alineación con el audit trail: evitar el pronombre añadido en la primera ocurrencia de ζῳοποιεῖ y mantener una nota léxica útil para «da vida / hace vivir».'
  issues:
  - severity: medium
    issue: La primera cláusula añade «les» en «les da vida».
    rationale: El griego no expresa objeto directo o indirecto aquí, y la revisión inglesa auditada quitó explícitamente «them» para evitar esa adición y reforzar el paralelismo entre ambas cláusulas.
  - severity: medium
    issue: «Levanta a los muertos» es menos idiomático y menos preciso que «resucita a los muertos» en este contexto.
    rationale: En Juan 5:21 el contexto es claramente de acción vivificante/resurreccional sobre «los muertos». «Resucita» suena más natural en español bíblico moderno y representa mejor ἐγείρει en contexto de muertos.
  - severity: low
    issue: La nota [b] («O “a quienes él quiere”») no preserva una alternativa significativa.
    rationale: La alternativa inglesa relevante es «to whom he wills». En español, «a quienes él quiere» solo añade énfasis pronominal y no ofrece una variante léxica útil; es mejor omitirla.
  - severity: low
    issue: 'Hay una alternativa defectuosa en las decisiones léxicas: «a los muertos ones».'
    rationale: Es un error editorial en metadatos, aunque no afecta el texto principal.
  revised_spanish_text: Porque así como el Padre resucita a los muertos y da vida[a], así también el Hijo da vida a quienes quiere.
  revised_footnotes:
  - marker: a
    text: O «hace vivir» en ambas ocurrencias de «da vida».
    reason: lexical_alternative
  revision_rationale: 'Se ajusta el texto para alinearlo con el griego y con la revisión auditada del POB inglés: se elimina el pronombre añadido en la primera cláusula, se usa «resucita» como opción más natural y precisa para ἐγείρει en este contexto, y se conserva solo la nota léxica verdaderamente útil sobre ζῳοποιεῖ. No se requiere adjudicación adicional porque la corrección es clara y de baja complejidad doctrinal.'
