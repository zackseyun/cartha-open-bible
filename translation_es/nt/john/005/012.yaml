translation:
  language: es
  text: 'Entonces le preguntaron[a]: «¿Quién es el hombre que te dijo: “Recoge y camina”?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice literalmente «Toma y camina» o «Recoge y camina». El objeto se sobreentiende por el contexto previo, refiriéndose a la camilla o lecho sobre el que había estado acostado el hombre.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠρώτησαν
  english_pob_choice: they asked
  chosen_spanish: le preguntaron
  alternatives_spanish:
  - le interrogaron
  - le consultaron
  lexicon: ἐρωτάω
  rationale: El aoristo plural narra una acción puntual de pregunta. «Preguntaron» es natural en español y conserva el tono narrativo sin añadir dureza que el contexto no exige.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Entonces
  alternatives_spanish:
  - Así que
  - Por tanto
  lexicon: οὖν
  rationale: Marca continuidad lógica/narrativa con el versículo anterior. «Entonces» suena idiomático en español y preserva el avance de la escena.
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: αὐτός
  rationale: El pronombre dativo/objeto se expresa naturalmente en español con clítico indirecto en esta pregunta directa introducida por «preguntar a alguien».
- source_word: Τίς ἐστιν
  english_pob_choice: Who is
  chosen_spanish: ¿Quién es
  alternatives_spanish:
  - ¿Quién es el que es
  - ¿Quién resulta ser
  lexicon: τίς + εἰμί
  rationale: La pregunta es directa y simple; «¿Quién es?» reproduce la concisión griega sin recargar la sintaxis.
- source_word: ὁ ἄνθρωπος
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la persona
  lexicon: ἄνθρωπος
  rationale: Aquí ἄνθρωπος designa a un individuo masculino concreto, no «ser humano» en general. «El hombre» mantiene esa referencia específica.
- source_word: ὁ εἰπών
  english_pob_choice: who said
  chosen_spanish: que te dijo
  alternatives_spanish:
  - que habló contigo y dijo
  - el que te dijo
  lexicon: λέγω
  rationale: El participio articular identifica al hombre por sus palabras previas. «Que te dijo» es la forma más natural en español y conserva la función atributiva de identificación.
- source_word: σοι
  english_pob_choice: to you
  chosen_spanish: te
  alternatives_spanish:
  - a ti
  lexicon: σύ
  rationale: El dativo singular se expresa idiomáticamente con el pronombre átono «te» en esta cita directa.
- source_word: Ἆρον
  english_pob_choice: Pick it up
  chosen_spanish: Levántalo
  alternatives_spanish:
  - Tómalo y levántalo
  - Recógelo
  lexicon: αἴρω
  rationale: El imperativo aoristo de αἴρω implica tomar/levantar el objeto mencionado en el contexto inmediato (la camilla o lecho). «Levántalo» conserva ese sentido sin sonar forzado en español.
- source_word: περιπάτει
  english_pob_choice: and walk
  chosen_spanish: y camina
  alternatives_spanish:
  - y sigue caminando
  - y anda
  lexicon: περιπατέω
  rationale: El imperativo presente pide una acción en curso; en español, «camina» comunica el mandato de forma clara y directa. «Anda» es posible, pero menos neutral en registro.
translation_notes:
  revision_awareness: El borrador sigue el texto griego de SBLGNT y coincide sustancialmente con la solución auditada en inglés. Se mantuvo la continuidad narrativa de οὖν, la identificación del referente masculino de ἄνθρωπος y la expresión del mandato final con un objeto implícito recuperado del contexto anterior. La nota reproduce la alternativa lexical documentada para Ἆρον/περιπάτει, adaptada al español.
  spanish_consistency_notes:
  - Se usa «hombre» para ἄνθρωπος en sentido individual masculino, no genérico.
  - Se evita «SEÑOR» u otra sustitución doctrinal porque no hay teónimo en el versículo.
  - «Levántalo» conserva el objeto implícito de la acción, explicado en la nota.
  - El tono es narrativo y directo, sin añadir matices interpretativos no presentes en el griego.
