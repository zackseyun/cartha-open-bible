translation:
  language: es
  text: 'Y él les decía[a]: «Ustedes son de abajo; yo soy de arriba. Ustedes son de este mundo[b]; yo no soy de este mundo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Ustedes son de lo de abajo … yo soy de lo de arriba».'
    reason: lexical_alternative
  - marker: b
    text: En Juan, «mundo» con frecuencia no se refiere solo a la tierra física, sino al orden humano en alienación de Dios.
    reason: cultural_note
lexical_decisions:
- source_word: ἔλεγεν
  english_pob_choice: was saying
  chosen_spanish: les decía
  alternatives_spanish:
  - les dijo
  lexicon: BDAG
  rationale: El imperfecto griego comunica una acción en desarrollo o reiterada. En español, «les decía» conserva ese aspecto mejor que un pasado puntual como «les dijo», y suena natural y digno en este contexto.
- source_word: Ὑμεῖς / ἐγὼ
  english_pob_choice: You / I
  chosen_spanish: Ustedes / yo
  alternatives_spanish:
  - Vosotros / yo
  - Usted / yo
  lexicon: BDAG
  rationale: El griego explicita los pronombres para reforzar el contraste. En español, «ustedes» mantiene la oposición con «yo» de forma clara y neutral para audiencia latinoamericana amplia.
- source_word: ἐκ τῶν κάτω
  english_pob_choice: from below
  chosen_spanish: de abajo
  alternatives_spanish:
  - de lo de abajo
  - del ámbito de abajo
  lexicon: BDAG
  rationale: La expresión conserva el contraste vertical y de origen/sitio sin sobreexplicar. «De abajo» es breve, natural y refleja bien la oposición con «de arriba».
- source_word: ἐκ τῶν ἄνω
  english_pob_choice: from above
  chosen_spanish: de arriba
  alternatives_spanish:
  - de lo de arriba
  - del ámbito de arriba
  lexicon: BDAG
  rationale: «De arriba» reproduce la antítesis con «de abajo» y mantiene la imagen joánica de origen/ámbito sin convertirla en paráfrasis doctrinal.
- source_word: κόσμος
  english_pob_choice: world
  chosen_spanish: mundo
  alternatives_spanish:
  - mundo orden
  - edad
  lexicon: BDAG
  rationale: «Mundo» es la equivalencia más estable y amplia para κόσμος en Juan. La carga de oposición al orden humano ajeno a Dios se mantiene mejor en nota que dentro del cuerpo del texto.
- source_word: τοῦ κόσμου τούτου / τούτου τοῦ κόσμου
  english_pob_choice: this world
  chosen_spanish: este mundo
  alternatives_spanish:
  - este mundo presente
  - el mundo de aquí
  lexicon: BDAG
  rationale: «Este mundo» conserva el demostrativo y la repetición enfática del griego, marcando la esfera a la que pertenecen los oyentes y de la cual Jesús se distingue.
- source_word: οὐκ εἰμὶ ἐκ τοῦ κόσμου τούτου
  english_pob_choice: I am not from this world
  chosen_spanish: yo no soy de este mundo
  alternatives_spanish:
  - yo no pertenezco a este mundo
  lexicon: BDAG
  rationale: «No soy de este mundo» mantiene la construcción de procedencia/origen de ἐκ. «No pertenezco» explicita una implicación posible, pero desplaza el énfasis desde origen a afiliación.
theological_decisions:
- issue: Contraste entre «de abajo/de arriba» y «de este mundo»
  english_pob_reading: The translation preserves the language of origin/source and realm without expanding it into a full doctrinal paraphrase.
  chosen_spanish_reading: La traducción conserva el lenguaje de origen/ámbito sin convertirlo en una paráfrasis doctrinal más explícita.
  alternative_spanish_readings:
  - Podría verterse de manera más interpretativa como un contraste moral o entre lo terrenal y lo celestial.
  rationale: El texto presenta una oposición joánica fuerte entre Jesús y sus interlocutores, pero el español no debe resolver de antemano la imagen espacial en una explicación teológica más estrecha que la del griego. Mantener «de abajo / de arriba» y «de este mundo» preserva la tensión.
  doctrine_reference: 'POB: preservar la tensión teológica y no cerrar la imagen con una paráfrasis interpretativa.'
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios; esta propuesta sigue de cerca el texto griego SBLGNT y el criterio inglés auditado, manteniendo el contraste vertical y la repetición de ἐκ sin suavizarla.
  spanish_consistency_notes:
  - Se mantiene «mundo» para κόσμος, conforme al uso joánico y al criterio POB.
  - Se usa «de abajo / de arriba» para preservar el paralelismo y la imagen espacial del griego.
  - Se conserva el imperfecto con «decía» para reflejar la continuidad de ἔλεγεν.
  - Se evita introducir «pertenece» en el texto principal, reservando esa implicación para la nota si fuera útil.
