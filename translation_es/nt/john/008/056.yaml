revisions:
- from: Abraham, vuestro padre, se alegró de ver mi día[a]; lo vio y se regocijó[b].
  to: Abraham, el padre de ustedes, se regocijó de que vería mi día[a][b]; lo vio y se alegró.
  rationale: Se ajusta el tratamiento a un español más neutral ('el padre de ustedes'), se restaura mejor la gradación verbal del griego usando el verbo más intenso en la primera cláusula y uno más simple en la segunda, y se corrigen las notas para reflejar con fidelidad las alternativas auditadas y anclar la nota teológica directamente en 'mi día'.
  reviewer_model: gpt-5.4
