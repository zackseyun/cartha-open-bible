translation:
  language: es
  text: Abraham, el padre de ustedes, se regocijó de que vería mi día[a][b]; lo vio y se alegró.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede traducirse 'se regocijó para ver mi día' o 'se regocijó de ver mi día'. La cláusula griega con ἵνα admite más de un matiz estrechamente relacionado.
    reason: lexical_alternative
  - marker: b
    text: '''Mi día'' puede referirse en sentido amplio al día mesiánico de Jesús o a su cumplimiento, sin que el versículo mismo especifique el acontecimiento o momento exacto.'
    reason: alternative_reading
lexical_decisions:
- source_word: Ἀβραὰμ
  english_pob_choice: Abraham
  chosen_spanish: Abraham
  alternatives_spanish:
  - Abrahán
  lexicon: SBLGNT / nombre propio tradicional
  rationale: Se conserva el nombre propio del patriarca como transliteración estándar en español bíblico, sin añadir equivalencias interpretativas.
- source_word: ὁ πατὴρ ὑμῶν
  english_pob_choice: your father
  chosen_spanish: vuestro padre
  alternatives_spanish:
  - su padre
  - el padre de ustedes
  lexicon: BDAG
  rationale: La relación de posesión y apelación directa se expresa de manera natural en español con 'vuestro padre', manteniendo el tono de confrontación de Jesús a sus oyentes.
- source_word: ἠγαλλιάσατο
  english_pob_choice: rejoiced
  chosen_spanish: se alegró
  alternatives_spanish:
  - se regocijó
  - exultó
  - se llenó de gozo
  lexicon: BDAG
  rationale: ἀγαλλιάω denota alegría intensa o exultación. En español, 'se alegró' comunica bien el hecho de la alegría y evita una repetición excesivamente enfática; la segunda cláusula recupera un verbo más fuerte para preservar la progresión del griego.
- source_word: ἵνα ἴδῃ
  english_pob_choice: to see
  chosen_spanish: de ver
  alternatives_spanish:
  - para ver
  - a fin de ver
  - para que viera
  lexicon: BDAG
  rationale: Aunque ἵνα puede expresar finalidad o contenido, el audit trail inglés optó por un infinitivo natural. En español, 'se alegró de ver' reproduce esa relación sin resolver indebidamente la tensión entre propósito y contenido.
- source_word: τὴν ἡμέραν τὴν ἐμήν
  english_pob_choice: my day
  chosen_spanish: mi día
  alternatives_spanish:
  - el día mío
  - el día de mí
  - mi tiempo
  lexicon: BDAG
  rationale: Se conserva la literalidad de la expresión para mantener su carga teológica y su posible amplitud referencial, sin especificar si alude a la encarnación, el ministerio mesiánico, la cruz/resurrección o la revelación final.
- source_word: καὶ εἶδεν
  english_pob_choice: he saw it
  chosen_spanish: lo vio
  alternatives_spanish:
  - y lo vio
  - y vio eso
  - y lo contempló
  lexicon: BDAG
  rationale: El objeto está implícito en griego y remite a 'mi día'. En español, 'lo vio' resulta idiomático y conserva la referencia anafórica sin añadir contenido nuevo.
- source_word: καὶ ἐχάρη
  english_pob_choice: and was glad
  chosen_spanish: se regocijó
  alternatives_spanish:
  - se alegró
  - estuvo feliz
  - se llenó de gozo
  lexicon: BDAG
  rationale: Se distingue de ἠγαλλιάσατο mediante un segundo verbo de alegría, pero con un matiz algo más solemne. 'Se regocijó' preserva la intensidad y evita uniformar ambas cláusulas.
theological_decisions:
- issue: Sentido de 'mi día'
  english_pob_reading: Retain the literal phrase 'my day' without specifying whether it refers to Jesus' incarnation, messianic fulfillment, crucifixion/resurrection, or eschatological day.
  chosen_spanish_reading: Mantener la expresión literal 'mi día' sin precisar si se refiere a la encarnación, al cumplimiento mesiánico, a la cruz/resurrección o al día escatológico de Cristo.
  alternative_spanish_readings:
  - mi tiempo
  - el día de mi venida
  - el día del Mesías
  rationale: El griego conserva una referencia amplia y teológicamente densa. La traducción española debe preservar esa tensión, no resolverla interpretativamente en el texto principal.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Fuerza de ἵνα con ἴδῃ
  english_pob_reading: 'Render as forward-looking expectation: ''that he would see.'''
  chosen_spanish_reading: Expresar expectativa anticipada mediante 'se alegró de ver', que deja implícita la orientación hacia el futuro.
  alternative_spanish_readings:
  - para que viera
  - para ver
  - con el fin de ver
  rationale: En este contexto, la alegría de Abraham se entiende como anticipación de la visión de 'mi día'. El español 'se alegró de ver' reproduce esa relación de manera natural y sin introducir una forma verbal futura que el griego no exige.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve ambiguity where genuine.'
translation_notes:
  revision_awareness: El texto español sigue el último ajuste del audit trail inglés, que prefirió una formulación más directa y natural para ἠγαλλιάσατο ἵνα ἴδῃ. Se mantuvo la tensión interpretativa sobre 'mi día' y se evitó resolverla con una glosa explicativa dentro del versículo.
  spanish_consistency_notes:
  - Se usa 'vuestro' para mantener la apelación plural directa del discurso de Jesús.
  - Se preserva 'mi día' de forma literal para coincidir con la decisión teológica auditada en inglés.
  - Se distinguen dos verbos de alegría en español para reflejar la variación aspectual/lexical del griego.
  - La puntuación con punto y coma ayuda a reproducir la pausa entre la alegría anticipatoria y la visión cumplida.
