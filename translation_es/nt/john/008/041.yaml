translation:
  language: es
  text: '«Ustedes están haciendo las obras de su padre». Ellos le dijeron[a]: «Nosotros no nacimos por inmoralidad sexual; tenemos un solo Padre—Dios»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No somos hijos ilegítimos». El griego dice literalmente: «No nacimos de inmoralidad sexual».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ποιεῖτε
  english_pob_choice: are doing
  chosen_spanish: están haciendo
  alternatives_spanish:
  - hacen
  - están realizando
  lexicon: BDAG
  rationale: El presente indicativo expresa acción en curso; «están haciendo» conserva esa fuerza progresiva de manera natural en español y mantiene el tono de acusación inmediata.
- source_word: τὰ ἔργα
  english_pob_choice: the works
  chosen_spanish: las obras
  alternatives_spanish:
  - las acciones
  - los hechos
  lexicon: BDAG
  rationale: «Obras» reproduce bien el campo semántico de ἔργα y mantiene el enlace verbal con ποιεῖτε. En español suena más idiomático y bíblico que «trabajos».
- source_word: τοῦ πατρὸς ὑμῶν
  english_pob_choice: of your father
  chosen_spanish: de su padre
  alternatives_spanish:
  - de vuestro padre
  - de tu padre
  - de su antepasado
  lexicon: BDAG
  rationale: «Padre» conserva la metáfora relacional y teológica del pasaje. Se opta por «su» en lugar de «vuestro» para un español bíblico ampliamente comprensible y neutral, sin perder la confrontación directa.
- source_word: ἐκ πορνείας
  english_pob_choice: of sexual immorality
  chosen_spanish: de inmoralidad sexual
  alternatives_spanish:
  - de fornicación
  - de pecado sexual
  - de unión sexual ilícita
  lexicon: BDAG
  rationale: «Inmoralidad sexual» refleja el sentido amplio de πορνεία en español contemporáneo. «De» es una equivalencia natural para ἐκ en esta construcción de origen/nacimiento, como ya reflejó la revisión inglesa.
- source_word: οὐ γεγεννήμεθα
  english_pob_choice: we were not born
  chosen_spanish: no nacimos
  alternatives_spanish:
  - no hemos nacido
  - no fuimos engendrados
  lexicon: BDAG
  rationale: Aunque el perfecto pasivo griego puede conservarse literalmente, en español «no nacimos» comunica con claridad la afirmación de origen sin sonar forzado. Mantiene el valor idiomático del nacimiento.
- source_word: ἕνα πατέρα ἔχομεν
  english_pob_choice: we have one Father
  chosen_spanish: tenemos un solo Padre
  alternatives_spanish:
  - tenemos un Padre único
  - solo tenemos un Padre
  lexicon: BDAG
  rationale: «Un solo Padre» expresa bien la unicidad de ἕνα y preserva el énfasis exclusivista del reclamo. La mayúscula en «Padre» se justifica por la apposición inmediata con Dios.
- source_word: τὸν θεόν
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - el único Dios
  lexicon: BDAG
  rationale: «Dios» es la traducción directa y adecuada de θεόν en apposición. En español, el artículo puede omitirse sin perder el sentido identificador, y la frase queda más natural con dos puntos.
theological_decisions:
- issue: Si la respuesta de los interlocutores debe explicitar como reclamo de legitimidad o mantenerse literal
  english_pob_reading: Retain the literal statement 'We were not born of sexual immorality' in the main text
  chosen_spanish_reading: 'Mantener la afirmación literal: «no nacimos de inmoralidad sexual»'
  alternative_spanish_readings:
  - no somos hijos ilegítimos
  - no nacimos de fornicación
  - no nacimos de una unión sexual ilícita
  rationale: El griego dice literalmente que no nacieron «de πορνεία». La POB en inglés retiene esa literalidad para no resolver la tensión interpretativa; el español debe hacer lo mismo, dejando que el lector perciba la insinuación polémica sin imponer una explicación
  doctrine_reference: Preservar la tensión textual sin interpretarla de antemano.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del contexto inglés, que prefirió «of sexual immorality» por una equivalencia más natural; en español se refleja con «de inmoralidad sexual», manteniendo la literalidad idiomática sin sobreinterpretar el reclamo.
  spanish_consistency_notes:
  - Se mantiene «Padre» con mayúscula por la identificación directa con Dios.
  - Se usa «inmoralidad sexual» como equivalente neutro y contemporáneo de πορνεία, evitando un calco eclesiástico más estrecho como «fornicación» salvo en la nota.
  - Se conserva el contraste entre la acusación de Jesús y la defensa de los interlocutores sin armonizarlo.
  - 'La puntuación con dos puntos ayuda a reproducir la apposición final «un solo Padre: Dios».'
