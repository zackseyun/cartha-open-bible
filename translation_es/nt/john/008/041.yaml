- from: 'Ustedes están haciendo las obras de su padre.” Ellos le dijeron[a]: “Nosotros no nacimos de inmoralidad sexual; tenemos un solo Padre: Dios.”'
  to: '«Ustedes están haciendo las obras de su padre». Ellos le dijeron[a]: «Nosotros no nacimos por inmoralidad sexual; tenemos un solo Padre—Dios»'
  rationale: Se ajusta únicamente la expresión de ἐκ πορνείας para un español más natural sin abandonar la decisión POB de conservar el enunciado literal en el texto principal. También se normaliza la puntuación de comillas y se usa raya para reflejar mejor la aposición enfática «un solo Padre—Dios». No se requiere adjudicación adicional porque el cambio es estilístico y de naturalidad, no doctrinal ni textual.
