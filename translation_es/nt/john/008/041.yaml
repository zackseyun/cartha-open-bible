    rationale: Aunque intenta seguir de cerca ἐκ πορνείας y la formulación inglesa, en español la construcción «nacer de inmoralidad sexual» resulta dura y algo impropia. «Por inmoralidad sexual» comunica mejor la idea causal/origen sin resolver la tensión interpretativa.
  - severity: low
    issue: Los dos puntos antes de «Dios» funcionan, pero la raya introduce mejor la aposición enfática
    rationale: El inglés auditado usa raya para la aposición «one Father—God». En español ambos son posibles; mantener la raya ayuda a reflejar el golpe retórico de identificación inmediata.
