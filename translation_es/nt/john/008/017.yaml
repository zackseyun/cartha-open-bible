translation:
  language: es
  text: Y hasta en vuestra ley está escrito que el testimonio de dos hombres es verdadero[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el testimonio de dos personas es verdadero». El griego dice «dos hombres», una expresión jurídica convencional para testigos humanos.
    reason: lexical_alternative
lexical_decisions:
- source_word: νόμῳ
  english_pob_choice: law
  chosen_spanish: ley
  alternatives_spanish:
  - Ley
  lexicon: BDAG
  rationale: En este contexto, νόμος alude a la autoridad normativa-escrituraria a la que Jesús apela frente a sus interlocutores. «Ley» preserva ese campo semántico jurídico y bíblico en español; la mayúscula se evita porque aquí funciona como sustantivo común en la expresión polémica «vuestra ley».
- source_word: ὑμετέρῳ
  english_pob_choice: your
  chosen_spanish: vuestra
  alternatives_spanish:
  - su
  - de ustedes
  lexicon: BDAG
  rationale: El posesivo plural de segunda persona conserva la distancia retórica del discurso de Jesús hacia sus oyentes. «Vuestra» comunica con naturalidad en español esa referencia plural y la relación posesiva directa.
- source_word: γέγραπται
  english_pob_choice: it is written
  chosen_spanish: está escrito
  alternatives_spanish:
  - ha sido escrito
  - está escrito
  lexicon: BDAG
  rationale: La fórmula perfecta pasiva se expresa en español con la construcción estable «está escrito», que mantiene el carácter de cita escritural vigente y evita una paráfrasis innecesaria.
- source_word: δύο ἀνθρώπων
  english_pob_choice: two men
  chosen_spanish: dos hombres
  alternatives_spanish:
  - dos personas
  - dos seres humanos
  lexicon: BDAG
  rationale: Se conserva el masculino plural del griego. En este dicho jurídico, «hombres» refleja la forma léxica original y el valor convencional de testigos humanos; el español permite mantener ese matiz sin perder claridad.
- source_word: μαρτυρία
  english_pob_choice: testimony
  chosen_spanish: testimonio
  alternatives_spanish:
  - testigo
  - declaración
  lexicon: BDAG
  rationale: «Testimonio» reproduce bien el valor forense de μαρτυρία en una máxima legal. «Testigo» cambiaría la categoría gramatical, y «declaración» debilitaría el matiz jurídico.
- source_word: ἀληθής
  english_pob_choice: 'true'
  chosen_spanish: verdadero
  alternatives_spanish:
  - verdadera
  - válido
  - cierto
  lexicon: BDAG
  rationale: En español, «verdadero» funciona naturalmente con «testimonio» y conserva tanto la afirmación de verdad como la validez legal implícita en el contexto.
- source_word: καὶ ... δὲ
  english_pob_choice: And even
  chosen_spanish: Y aun
  alternatives_spanish:
  - Y también
  - Y aun así
  lexicon: BDAG
  rationale: La combinación de καί y δέ añade enlace y cierto énfasis. «Y aun» capta esa fuerza con economía y mantiene el tono discursivo del original, mejor que una expansión explicativa.
theological_decisions:
- issue: Fuerza retórica de «vuestra ley»
  english_pob_reading: Retain 'your law' as Jesus' direct address to his opponents, without softening it to 'the law' or harmonizing it with broader Johannine theology.
  chosen_spanish_reading: Conservar «vuestra ley» como apelación directa y distanciadora de Jesús hacia sus interlocutores, sin neutralizarla en «la ley».
  alternative_spanish_readings:
  - la ley
  - la ley de ustedes
  rationale: El griego contiene explícitamente el posesivo de segunda persona, y el español debe mantener esa carga discursiva. «Vuestra ley» conserva la confrontación retórica sin añadir una glosa interpretativa.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Valor legal de ἀληθής en el testimonio
  english_pob_reading: '''true'' preserves the wording of the Greek while allowing the legal implication to remain implicit.'
  chosen_spanish_reading: «Verdadero» deja implícita la validez jurídica del testimonio sin forzar una explicación doctrinal o legal adicional.
  alternative_spanish_readings:
  - válido
  - fidedigno
  - auténtico
  rationale: La frase griega combina verdad y fuerza forense. En español, «verdadero» conserva la literalidad suficiente y permite que el contexto jurídico haga el resto.
  doctrine_reference: Translation philosophy §§1, 4, 6
translation_notes:
  revision_awareness: El texto griego y el análisis auditado coinciden sustancialmente con la versión inglesa POB; no se documentan revisiones textuales que alteren la base de traducción. La decisión principal en español es mantener el valor jurídico de la fórmula y conservar el masculino plural del original, aclarable en nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» fuera de este versículo porque aquí no aparece el nombre divino; la referencia es a «la ley».
  - Se usa «ley» en minúscula por tratarse de un sustantivo común en la expresión polémica, no de un título formal.
  - «Verdadero» se eligió para armonizar con «testimonio» y preservar la afirmación de verdad/validez del dicho legal.
  - La nota al pie recoge la alternativa semántica sin borrar la forma masculina del griego en el texto principal.
