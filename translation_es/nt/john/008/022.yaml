translation:
  language: es
  text: 'Entonces los judíos[a] decían: “¿Acaso se matará a sí mismo? Porque dice: ‘Adonde yo voy, ustedes no pueden venir’?”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente, en el contexto joánico, “los judeanos” o “los líderes judíos”, según cuán amplio intente Juan que sea el referente aquí.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγον
  english_pob_choice: were saying
  chosen_spanish: estaban diciendo
  alternatives_spanish:
  - decían
  - seguían diciendo
  lexicon: BDAG
  rationale: El imperfecto griego expresa acción en curso o reiterada; en español, ‘estaban diciendo’ conserva bien ese matiz narrativo sin sonar forzado.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Entonces
  alternatives_spanish:
  - Así que
  - Por tanto
  lexicon: BDAG
  rationale: Marca la continuación inferencial del relato; ‘Entonces’ es natural en español y mantiene la conexión discursiva.
- source_word: οἱ Ἰουδαῖοι
  english_pob_choice: the Jews
  chosen_spanish: los judíos
  alternatives_spanish:
  - los líderes judíos
  - los judeanos
  lexicon: BDAG
  rationale: La frase griega es literalmente ‘los judíos’. Como en el contexto joánico puede abarcar opositores o autoridades, se conserva el término literal en el texto principal y se deja la alternativa interpretativa en nota.
- source_word: Μήτι
  english_pob_choice: Surely ... not
  chosen_spanish: ¿Acaso ... ?
  alternatives_spanish:
  - ¿No será que ... ?
  - ¿Se estará ... ?
  lexicon: BDAG
  rationale: μήτι introduce una pregunta que espera respuesta negativa. En español, la construcción interrogativa con ‘¿Acaso...?’ comunica bien la sospecha incrédula sin añadir palabras no requeridas.
- source_word: ἀποκτενεῖ ἑαυτόν
  english_pob_choice: kill himself
  chosen_spanish: se matará a sí mismo
  alternatives_spanish:
  - se quitará la vida
  - se dará muerte
  lexicon: BDAG
  rationale: El sentido reflexivo directo se mantiene. ‘Se matará a sí mismo’ es claro y transparente; evita eufemizar el verbo y conserva la fuerza léxica del griego.
- source_word: ὅτι
  english_pob_choice: since
  chosen_spanish: Porque
  alternatives_spanish:
  - ya que
  - puesto que
  - pues
  lexicon: BDAG
  rationale: Aquí introduce la razón de la especulación de los interlocutores. ‘Porque’ es natural en español dentro de la cita y reproduce la fuerza explicativa.
- source_word: λέγει
  english_pob_choice: he says
  chosen_spanish: dice
  alternatives_spanish:
  - está diciendo
  - ha dicho
  lexicon: BDAG
  rationale: Se conserva el presente del discurso directo, que en Juan funciona de manera viva y directa. ‘Dice’ corresponde con el tiempo griego sin necesidad de matizarlo.
- source_word: Ὅπου ἐγὼ ὑπάγω
  english_pob_choice: Where I am going
  chosen_spanish: Adonde yo voy
  alternatives_spanish:
  - Donde yo voy
  - A donde yo voy
  lexicon: BDAG
  rationale: Ὅπου con verbo de movimiento puede expresarse de manera natural con ‘adonde’. Esto refleja el movimiento implícito de ὑπάγω y suena más idiomático en español que una reproducción rígida.
- source_word: οὐ δύνασθε ἐλθεῖν
  english_pob_choice: you cannot come
  chosen_spanish: ustedes no pueden ir
  alternatives_spanish:
  - ustedes no pueden venir
  - no les es posible ir
  lexicon: BDAG
  rationale: El griego dice literalmente ‘no pueden venir/ir’. Como el verbo de destino en español suele expresarse con ‘ir’ en este tipo de cita, se mantiene el sentido de imposibilidad de llegar al lugar de Jesús.
theological_decisions:
- issue: Referente de οἱ Ἰουδαῖοι en Juan
  english_pob_reading: Retain the literal rendering 'the Jews' in the main text
  chosen_spanish_reading: Mantener ‘los judíos’ en el texto principal
  alternative_spanish_readings:
  - los líderes judíos
  - los judeanos
  rationale: El texto griego dice literalmente οἱ Ἰουδαῖοι. Aunque en Juan puede aludir contextualmente a opositores o autoridades judeanas, este versículo no restringe explícitamente el referente. La nota preserva la alternativa sin resolverla interpretativamente en el cuerpo del texto.
  doctrine_reference: Principio de primacía del original; conservar la tensión contextual sin diluir el léxico del texto fuente.
translation_notes:
  revision_awareness: 'Coincide con el último repaso: no se requieren cambios respecto del estado auditado más reciente; se preserva la lectura literal con nota para la alternativa contextual de οἱ Ἰουδαῖοι.'
  spanish_consistency_notes:
  - Se mantuvo ‘los judíos’ como traducción principal de οἱ Ἰουδαῖοι, en consonancia con la política POB de no estrechar el referente sin base explícita.
  - Se prefirió ‘Adonde’ para reflejar con naturalidad el movimiento implícito en ὅπου ἐγώ ὑπάγω.
  - Se evitó ‘Cristo’ u otra terminología no presente en este versículo.
  - Se conservó el registro reverente pero contemporáneo, sin depender de fórmulas tradicionales que oculten el valor léxico del griego.
