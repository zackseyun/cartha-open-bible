revisions:
- from: 'Entonces los judíos estaban diciendo[a]: “¿Acaso se matará a sí mismo? Porque dice: ‘Adonde yo voy, ustedes no pueden ir’”.'
  to: 'Entonces los judíos[a] decían: “¿Acaso se matará a sí mismo? Porque dice: ‘Adonde yo voy, ustedes no pueden venir’?”'
  rationale: Se corrige la fidelidad léxica principal sustituyendo ‘ir’ por ‘venir’ para ἐλθεῖν. Además, se suaviza el imperfecto a ‘decían’, más natural en español narrativo, sin perder el valor aspectual del griego, y se ajusta la puntuación para una cita interrogativa más idiomática.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:04:45Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la mayor parte del griego: mantiene el imperfecto narrativo de ἔλεγον, conserva literalmente οἱ Ἰουδαῖοι con nota alternativa, reproduce adecuadamente la pregunta negativa de μήτι y traduce con claridad ἀποκτενεῖ ἑαυτόν. Sin embargo, en la cita final cambia indebidamente la orientación de ἐλθεῖν: el griego dice ‘venir’, y el inglés POB preserva ‘come’. El español ‘ir’ altera el punto de referencia implícito hacia el lugar de Jesús y debe corregirse a ‘venir’.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero hay dos detalles de naturalidad/mejora: ‘estaban diciendo’ es defendible, aunque ‘decían’ suele sonar más natural en narrativa española para el imperfecto iterativo; y la puntuación final debe ajustarse mejor al estilo español con el signo de interrogación cerrando toda la pregunta citada. La reparación principal es léxica: ‘no pueden venir’ en vez de ‘no pueden ir’.'
  glossary_alignment: 'La terminología del proyecto se respeta en este versículo: ‘los judíos’ en texto principal con nota para ‘los judeanos’/‘los líderes judíos’ coincide con la decisión auditada. No hay términos de glosario mayores como Yahvé, Mesías o esclavo en este texto. La única desalineación relevante es contra la decisión léxica para οὐ δύνασθε ἐλθεῖν, que debe corresponder a ‘no pueden venir’.'
  issues:
  - severity: high
    issue: ‘οὐ δύνασθε ἐλθεῖν’ fue traducido como ‘ustedes no pueden ir’
    rationale: ἔρχομαι significa ‘venir/venir hacia’, y el inglés POB auditado eligió ‘you cannot come’. Cambiarlo a ‘ir’ modifica la deixis y debilita la fidelidad al original.
  - severity: medium
    issue: ‘estaban diciendo’ suena algo pesado en español narrativo
    rationale: Aunque refleja el aspecto imperfectivo, ‘decían’ suele comunicar mejor en español bíblico moderno la acción repetida o continua sin perífrasis innecesaria.
  - severity: low
    issue: Puntuación final mejorable en la pregunta citada
    rationale: 'En español conviene cerrar la pregunta completa con ‘?’ dentro de la cita: ‘... no pueden venir?’ en lugar de terminar con comillas y punto fuera de una pregunta indirectamente reproducida como cita directa.'
  revised_spanish_text: 'Entonces los judíos[a] decían: “¿Acaso se matará a sí mismo? Porque dice: ‘Adonde yo voy, ustedes no pueden venir’?”'
  revised_footnotes:
  - marker: a
    text: O posiblemente, en el contexto joánico, “los judeanos” o “los líderes judíos”, según cuán amplio intente Juan que sea el referente aquí.
    reason: lexical_alternative
