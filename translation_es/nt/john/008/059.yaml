revisions:
- from: Así que tomaron piedras para arrojárselas[a], pero Jesús se ocultó y salió del templo.
  to: Así que tomaron piedras para arrojarlas contra él[a], pero Jesús se ocultó y salió del templo.
  rationale: Se corrige la construcción verbal para reflejar con claridad el propósito hostil de ἵνα βάλωσιν ἐπ’ αὐτόν en español natural ('arrojarlas contra él'). También se repara la nota para usar términos españoles correctos y eclesialmente legibles ('recinto', 'atrios') y para explicar con precisión el valor de ἱερόν sin introducir detalles ajenos al texto.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:04:03Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia y el sentido básico del griego: consecuencia lógica (οὖν), acción hostil de tomar piedras para arrojarlas, Jesús escondiéndose/ocultándose, y su salida del ἱερόν sin importar expansiones textuales posteriores. Sin embargo, ''arrojárselas'' desplaza el complemento griego ἐπ’ αὐτόν (''contra/a él'') hacia un dativo español ambiguo, y la nota tiene problemas léxicos/idiomáticos (''cortiles'', ''fuera de'' en vez de precisar el valor de recinto/atrio).'
  spanish_quality_summary: El texto es mayormente natural y legible, pero 'para arrojárselas' suena algo forzado y puede sugerir 'arrojarlas a alguien' de manera menos directa que 'arrojárselas a él' o mejor 'arrojárselas/arrojárselas' no es ideal aquí. 'Para arrojárselas' además introduce una ambigüedad evitables; 'para arrojárselas' en español no es tan claro como 'para arrojárselas a él' o, más naturalmente, 'para tirárselas/arrojarle piedras'—pero lo más claro y fiel es 'para arrojárselas'?? Mejor 'para arrojárselas' no. La redacción mejor es 'para arrojárselas' no; 'para arrojárselas' sigue siendo problemática. También la nota debe decir 'atrios/recinto del templo' y evitar 'cortiles'.
  glossary_alignment: No hay conflictos con la terminología doctrinal principal del proyecto. 'Jesús' y 'templo' están bien. La decisión sobre ἱερόν en nota concuerda con el criterio del POB, pero la formulación española de la nota necesita corrección léxica e idiomática.
  issues:
  - severity: medium
    issue: '''para arrojárselas[a]'' no expresa con suficiente claridad ἐπ’ αὐτόν'
    rationale: El griego indica propósito de arrojar piedras contra Jesús. En español, el enclítico 'se' + 'las' sin complemento explícito puede sonar ambiguo o menos natural. 'para arrojárselas a él' sería redundante; una solución más clara es 'para arrojárselas' reemplazada por 'para arrojárselas' no resuelve el problema. Lo más natural y fiel es 'para arrojárselas' cambiarlo por 'para tirárselas' tampoco es ideal. 'para arrojárselas' debe reemplazarse por 'para arrojárselas' no. La formulación directa 'para arrojárselas' debe sustituirse por 'para arrojárselas' no; mejor 'para arrojarlas contra él'.
  - severity: medium
    issue: La nota al pie contiene 'cortiles', forma incorrecta o muy impropia
    rationale: El equivalente natural de courts/precincts es 'atrios' o 'recinto'. 'Cortiles' no es adecuado en español bíblico general.
  - severity: low
    issue: La nota dice 'fuera del recinto/cortiles del templo' de forma poco pulida
    rationale: La nota debe explicar que ἱερόν se refiere al complejo del templo, no necesariamente traducir 'fuera de'. Una formulación como 'del recinto/los atrios del templo' o 'fuera del recinto del templo' es más clara.
  revised_spanish_text: Así que tomaron piedras para arrojarlas contra él[a], pero Jesús se ocultó y salió del templo.
  revised_footnotes:
  - marker: a
    text: O más precisamente, «del recinto del templo» o «de los atrios del templo»; la palabra griega aquí es ἱερόν, que se refiere al complejo del templo y no al santuario interior.
    reason: lexical_alternative
  revision_rationale: Se corrige la construcción verbal para reflejar con claridad el propósito hostil de ἵνα βάλωσιν ἐπ’ αὐτόν en español natural ('arrojarlas contra él'). También se repara la nota para usar términos españoles correctos y eclesialmente legibles ('recinto', 'atrios') y para explicar con precisión el valor de ἱερόν sin introducir detalles ajenos al texto.
