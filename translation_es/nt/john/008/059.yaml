translation:
  language: es
  text: Así que tomaron piedras para arrojarlas contra él[a], pero Jesús se ocultó y salió del templo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O más precisamente, «del recinto del templo» o «de los atrios del templo»; la palabra griega aquí es ἱερόν, que se refiere al complejo del templo y no al santuario interior.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦραν
  english_pob_choice: picked up
  chosen_spanish: tomaron
  alternatives_spanish:
  - recogieron
  - levantaron
  lexicon: BDAG
  rationale: El griego de αἴρω aquí describe tomar piedras en mano para un acto violento inminente. En español, 'tomaron' comunica la acción de manera natural y directa; 'recogieron' o 'levantaron' sonarían menos marcados para el intento de apedreamiento.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - por tanto
  - entonces
  lexicon: BDAG
  rationale: '''Así que'' conserva la relación consecutiva del contexto inmediato con un español fluido y no excesivamente formal.'
- source_word: λίθους
  english_pob_choice: stones
  chosen_spanish: piedras
  alternatives_spanish:
  - guijarros
  - rocas
  lexicon: BDAG
  rationale: '''Piedras'' es el equivalente natural y bíblicamente reconocible para λίθοι en una escena de apedreamiento.'
- source_word: ἵνα βάλωσιν ἐπ’ αὐτόν
  english_pob_choice: to throw at him
  chosen_spanish: para arrojárselas
  alternatives_spanish:
  - para lanzárselas
  - para tirárselas
  lexicon: BDAG
  rationale: La finalidad de ἵνα + subjuntivo se expresa con 'para'. El verbo 'arrojar' reproduce bien βάλλω con ἐπί en un contexto hostil. El pronombre enclítico 'las' retoma 'piedras' y evita la repetición pesada de 'a él'.
- source_word: ἐκρύβη
  english_pob_choice: hid himself
  chosen_spanish: se ocultó
  alternatives_spanish:
  - se escondió
  - se ocultó a sí mismo
  lexicon: BDAG
  rationale: Aunque la forma es pasiva morfológica, el uso aquí es naturalmente medio/reflexivo. 'Se ocultó' preserva la iniciativa de Jesús sin introducir un agente externo.
- source_word: ἐξῆλθεν
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - se fue
  - salió afuera
  lexicon: BDAG
  rationale: '''Salió'' es el equivalente directo y más natural en español para ἐξέρχομαι en esta secuencia narrativa.'
- source_word: ἐκ τοῦ ἱεροῦ
  english_pob_choice: of the temple
  chosen_spanish: del templo
  alternatives_spanish:
  - de los atrios del templo
  - del recinto del templo
  lexicon: BDAG
  rationale: ἱερόν se refiere al complejo o recinto del templo, no al santuario interior. En el texto principal, 'del templo' mantiene legibilidad; el matiz espacial más preciso queda documentado en la nota.
theological_decisions:
- issue: Naturaleza de la salida de Jesús
  english_pob_reading: Translate the text as Jesus hiding himself and leaving, without adding miraculous details.
  chosen_spanish_reading: Traducir que Jesús se ocultó y salió, sin añadir detalles milagrosos no presentes en el texto dado.
  alternative_spanish_readings:
  - Jesús pasó milagrosamente entre ellos
  - Jesús se volvió invisible
  rationale: El testimonio griego aquí solo afirma que Jesús se ocultó y salió del templo. La traducción no debe importar expansiones de tradiciones manuscritas posteriores ni sugerir un milagro que este texto no expresa.
  doctrine_reference: Principio de primacía del texto original; no incorporar afirmaciones doctrinales o narrativas que el texto base no hace.
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no se reportaron cambios y el consenso de revisión fue de alta concordancia.'
  spanish_consistency_notes:
  - Se usa 'templo' en el texto principal por fluidez, pero se aclara en la nota que ἱερόν designa el complejo o recinto del templo.
  - Se mantiene 'piedras' para conservar el valor narrativo y violento del intento de apedreamiento.
  - No se añade ninguna expansión milagrosa a la salida de Jesús; la redacción sigue estrictamente lo que dice el griego.
