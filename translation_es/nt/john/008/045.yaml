translation:
  language: es
  text: Pero yo, porque digo la verdad[a], ustedes no me creen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Pero yo, porque digo la verdad, ustedes no me creen» / «Pero porque digo la verdad, ustedes no me creen». La conjunción griega también puede traducirse más literalmente como «que», pero aquí se entiende mejor con sentido causal: «porque».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγὼ
  english_pob_choice: I
  chosen_spanish: yo
  alternatives_spanish:
  - yo mismo
  - yo, por mi parte
  lexicon: BDAG
  rationale: Se conserva el pronombre explícito para reflejar el énfasis y el contraste personal con el sujeto implícito de la reacción de los oyentes.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Aquí δέ introduce contraste con el contexto inmediato; «Pero» reproduce con naturalidad esa oposición en español.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - que
  lexicon: BDAG
  rationale: En este contexto la relación es causal, no meramente declarativa. «Porque» expresa mejor la lógica del dicho en español.
- source_word: τὴν ἀλήθειαν
  english_pob_choice: the truth
  chosen_spanish: la verdad
  alternatives_spanish:
  - la verdad plena
  - la realidad
  lexicon: BDAG
  rationale: «Verdad» es la correspondencia directa y natural en español para ἀλήθεια en este contexto forense y polémico.
- source_word: λέγω
  english_pob_choice: I tell
  chosen_spanish: digo
  alternatives_spanish:
  - hablo
  - afirmo
  lexicon: BDAG
  rationale: Aunque el inglés opta por «tell» por idiomatismo, el griego λέγω aquí se expresa con mayor naturalidad en español con «decir». Con «la verdad», la construcción «digo la verdad» conserva bien el sentido de declaración verdadera.
- source_word: οὐ πιστεύετέ μοι
  english_pob_choice: you do not believe me
  chosen_spanish: ustedes no me creen
  alternatives_spanish:
  - no creen en mí
  - ustedes no creen lo que digo
  lexicon: BDAG
  rationale: Se mantiene el objeto personal en dativo con un español natural. «Me creen» expresa adecuadamente la negativa a aceptar el testimonio de Jesús; el sujeto explícito «ustedes» refuerza el contraste del pasaje.
theological_decisions:
- issue: Valor de ὅτι en la frase
  english_pob_reading: 'causal: ''because I tell the truth'''
  chosen_spanish_reading: 'causal: «porque yo digo la verdad»'
  alternative_spanish_readings:
  - «que yo digo la verdad»
  rationale: 'La lectura causal preserva la ironía discursiva del pasaje: precisamente porque Jesús habla verdad, sus interlocutores no creen en él. La alternativa con «que» es más formal pero menos clara para el flujo argumental.'
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés están en alto acuerdo; no se reportan revisiones aplicadas en la fuente inglesa más allá de la decisión sintáctica sobre ὅτι. La versión española sigue esa lectura causal y conserva el contraste de δέ con «Pero».
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera; este versículo no lo contiene.
  - Se mantiene el pronombre explícito «yo» para reflejar el énfasis del griego ἐγώ.
  - «Me creen» preserva la relación personal de πιστεύω con dativo sin añadir paráfrasis doctrinal.
