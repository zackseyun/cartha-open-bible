translation:
  language: es
  text: 'Jesús les respondió: «De cierto, de cierto les digo que todo el que practica el pecado[a] es esclavo[b] del pecado».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todo el que hace pecado». El participio griego puede expresarse más literalmente, pero «todo el que practica el pecado» comunica mejor el sentido habitual o característico en el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «siervo». El término griego δοῦλος puede significar «siervo» o «esclavo»; aquí se usa «esclavo» porque la idea de esclavitud es central en la afirmación de Jesús.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἀπεκρίθη
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - les respondió
  lexicon: BDAG
  rationale: «Respondió» comunica de manera natural la acción narrativa de ἀποκρίνομαι y preserva el carácter dialogal de la escena. Se mantiene el complemento explícito «les» para reflejar αὐτοῖς.
- source_word: Ἀμὴν ἀμὴν
  english_pob_choice: Truly, truly
  chosen_spanish: De cierto, de cierto
  alternatives_spanish:
  - Amén, amén
  - En verdad, en verdad
  lexicon: BDAG
  rationale: El doble ἀμήν es una fórmula solemne y característica de Juan. «De cierto, de cierto» es una forma tradicional y clara en español, sin perder la repetición enfática.
- source_word: λέγω ὑμῖν
  english_pob_choice: I say to you
  chosen_spanish: les digo
  alternatives_spanish:
  - les digo a ustedes
  - les hablo
  lexicon: BDAG
  rationale: La primera persona implícita de λέγω ὑμῖν se expresa con naturalidad en español como «les digo». El complemento dativo plural queda bien representado por «les».
- source_word: πᾶς ὁ ποιῶν
  english_pob_choice: everyone who practices
  chosen_spanish: todo el que practica
  alternatives_spanish:
  - todo el que hace
  - todos los que practican
  lexicon: BDAG
  rationale: El participio presente articular expresa una acción habitual o característica; «practica» transmite mejor ese valor que un simple «hace». «Todo el que» conserva el sentido distributivo de πᾶς ὁ.
- source_word: τὴν ἁμαρτίαν
  english_pob_choice: sin
  chosen_spanish: el pecado
  alternatives_spanish:
  - pecado
  - la falta
  lexicon: BDAG
  rationale: Aunque el inglés omite el artículo, en español «el pecado» suena más natural y conserva la referencia genérica a la esfera del pecado, no a una falta aislada.
- source_word: δοῦλος
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - servidor
  lexicon: BDAG
  rationale: Se conserva la fuerza de la metáfora de esclavitud, central en el argumento de Jesús. «Esclavo» refleja mejor δοῦλος que «siervo», que suavizaría el peso del término.
- source_word: τῆς ἁμαρτίας
  english_pob_choice: of sin
  chosen_spanish: del pecado
  alternatives_spanish:
  - de pecado
  - bajo el pecado
  lexicon: BDAG
  rationale: 'El genitivo se vierte de forma directa como posesión o dominio: «del pecado». En español conserva la imagen de pertenencia y sujeción a pecado.'
theological_decisions:
- issue: Valor aspectual del participio presente en ποιῶν
  english_pob_reading: 'Render the present participle and predicate as describing ongoing bondage: ''everyone who practices sin is a slave of sin.'''
  chosen_spanish_reading: «todo el que practica el pecado es esclavo del pecado» describe una práctica continua o característica, no un acto aislado.
  alternative_spanish_readings:
  - todo el que hace pecado es esclavo del pecado
  - todo el que comete pecado es esclavo del pecado
  rationale: El presente participio griego sugiere hábito o patrón. «Practica» comunica mejor la continuidad y evita convertir la frase en una mera referencia a una acción puntual. Se mantiene la fuerza moral y teológica del dicho sin exagerarlo como una fórmula sistemática sobre cada acto individual.
  doctrine_reference: Translation philosophy §§1, 3, 5; Contested terms table on δοῦλος
- issue: Intensidad de la metáfora de δοῦλος
  english_pob_reading: '''slave'' is used because the sense of bondage is central to Jesus'' point.'
  chosen_spanish_reading: «esclavo» se mantiene para preservar la idea de esclavitud y sujeción al pecado.
  alternative_spanish_readings:
  - siervo
  - servidor
  rationale: En este contexto la imagen no es la de servicio honorable sino la de dominación y cautiverio. Traducir con «esclavo» conserva la tensión teológica y el peso retórico del pasaje.
  doctrine_reference: Contested terms table on δοῦλος
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no hubo cambios aplicados; el texto mantiene el acuerdo alto con el control cruzado y conserva la lectura óptima ya aprobada.'
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς y «pecado» para ἁμαρτία de manera uniforme.
  - Se usa «De cierto, de cierto» como equivalente solemne y bíblicamente reconocible del doble ἀμήν.
  - «Esclavo» se conserva consistentemente para δοῦλος en esta sección por la fuerza de la metáfora de bondage.
  - La nota [a] se ancla en «respondió» y la nota [b] en «digo» para reflejar las alternativas del audit trail.
