base_translation:
  language: en
  yaml_path: translation/nt/john/008/034.yaml
  text: Jesus answered them[a], “Truly, truly, I say to you[b], everyone who practices sin is a slave of sin.”
  footnotes:
  - marker: a
    text: Or 'everyone who does sin.' The Greek participle can be rendered more literally, but 'practices sin' better conveys the ongoing or characteristic sense in context.
    reason: lexical_alternative
  - marker: b
    text: Or 'servant of sin.' The Greek word δοῦλος can mean 'servant' or 'slave'; here 'slave' is used because the sense of bondage is central to Jesus' point.
    reason: alternative_reading
