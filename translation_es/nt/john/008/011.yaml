translation:
  language: es
  text: 'Ella[a] dijo: «Nadie, Señor». Y Jesús dijo: «Yo tampoco te condeno; vete, y no peques más».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Versículo final del relato de la mujer sorprendida en adulterio (Juan 7:53–8:11). Véase la nota en Juan 7:53.
    reason: textual_variant
lexical_decisions:
- source_word: Οὐδείς
  english_pob_choice: No one
  chosen_spanish: Nadie
  alternatives_spanish:
  - Ninguno
  lexicon: BDAG
  rationale: El griego expresa negación absoluta de persona. «Nadie» es la forma natural y directa en español para conservar la brevedad y el valor absoluto del original.
- source_word: κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - señor
  - amo
  - maestro
  lexicon: BDAG
  rationale: En vocativo dirigido a Jesús, «Señor» conserva la carga reverencial y cristológica que el audit trail inglés mantiene con 'Lord'. «Señor» es el equivalente español más estable y bíblicamente reconocible aquí.
- source_word: κατακρίνω
  english_pob_choice: condemn
  chosen_spanish: condeno
  alternatives_spanish:
  - juzgo en contra de ti
  - sentencio
  lexicon: BDAG
  rationale: El verbo tiene sentido judicial de declarar culpable o imponer condena. «Condeno» reproduce ese valor jurídico con naturalidad en español y evita debilitar la fuerza de la negativa de Jesús.
- source_word: μηκέτι ἁμάρτανε
  english_pob_choice: sin no more
  chosen_spanish: no peques más
  alternatives_spanish:
  - no sigas pecando
  - no peques ya más
  lexicon: BDAG
  rationale: La combinación expresa cesación a partir de ahora, no solo una orden abstracta. «No peques más» es la formulación española idiomática que conserva el mandato de abandono continuo del pecado.
theological_decisions:
- issue: Finalidad textual del relato de la mujer tomada en adulterio
  english_pob_reading: Final verse of the story of the woman caught in adultery (John 7:53–8:11). See note on John 7:53.
  chosen_spanish_reading: Versículo final del relato de la mujer sorprendida en adulterio (Juan 7:53–8:11). Véase la nota en Juan 7:53.
  alternative_spanish_readings:
  - Perícopa final del relato...
  - Versículo final de la historia...
  rationale: Se conserva la advertencia textual del POB inglés porque afecta la ubicación canónica y la evaluación del pasaje. La redacción española mantiene el mismo aviso sin añadir una conclusión sobre autenticidad que no esté explicitada en el texto auditado.
  doctrine_reference: Crítica textual del Nuevo Testamento
translation_notes:
  revision_awareness: El texto inglés auditado no muestra revisiones aplicadas y el resumen de control indica alta concordancia; por eso la versión española sigue de cerca la lectura auditada sin introducir cambios interpretativos adicionales.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριε, en coherencia con el uso reverencial del POB en inglés.
  - Se usa «condeno» para κατακρίνω por su fuerza judicial directa.
  - «No peques más» conserva la idea aspectual de μηκέτι como cese desde este momento.
  - La nota textual se ancla en la a del texto, como en el original auditado.
