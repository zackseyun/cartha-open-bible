translation:
  language: es
  text: ¿Quién de ustedes me declara culpable[a] de pecado?[b] Si digo la verdad, ¿por qué ustedes no me creen?[c]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «prueba que soy culpable».
    reason: lexical_alternative
  - marker: b
    text: O «respecto al pecado». El griego puede expresar referencia general, no solo una acusación de una falta específica.
    reason: previous_rendering
  - marker: c
    text: O «no confían en mí». El griego puede incluir tanto creer a un hablante como confiar en él.
    reason: lexical_alternative
lexical_decisions:
- source_word: τίς ἐξ ὑμῶν
  english_pob_choice: Which one of you
  chosen_spanish: ¿Cuál de ustedes
  alternatives_spanish:
  - ¿Quién de ustedes?
  - ¿Cuál de vosotros?
  lexicon: BDAG
  rationale: La pregunta griega pide a alguien “de entre ustedes”. En español, «¿Cuál de ustedes?» conserva el desafío directo y suena natural en registro bíblico contemporáneo. «¿Quién de ustedes?» también es posible, pero «cuál» refleja mejor la selección dentro del grupo.
- source_word: ἐλέγχει
  english_pob_choice: convicts
  chosen_spanish: convence
  alternatives_spanish:
  - declara culpable
  - prueba culpable
  - reprende
  lexicon: BDAG
  rationale: ἐλέγχω puede abarcar exponer, reprender o probar culpabilidad. En español, «convencer de pecado» expresa bien la idea forense sin sonar demasiado técnica; mantiene la fuerza de la acusación mejor que «reprende».
- source_word: περὶ ἁμαρτίας
  english_pob_choice: of sin
  chosen_spanish: de pecado
  alternatives_spanish:
  - sobre pecado
  - en cuanto al pecado
  - respecto de pecado
  lexicon: BDAG
  rationale: La construcción con περί + genitivo indica referencia. En español, «de pecado» es la colocación más natural con «convencer» y conserva la amplitud de la acusación sin restringirla a una falta específica.
- source_word: ἀλήθειαν λέγω
  english_pob_choice: If I speak the truth
  chosen_spanish: Si digo la verdad
  alternatives_spanish:
  - Si hablo la verdad
  - Si estoy diciendo la verdad
  lexicon: BDAG
  rationale: «Decir la verdad» es la manera más directa y natural de expresar ἀλήθειαν λέγω en español. Mantiene la forma condicional del griego sin suavizarla a «ya que» o «puesto que».
- source_word: πιστεύετέ μοι
  english_pob_choice: do you not believe me
  chosen_spanish: no me creen
  alternatives_spanish:
  - no creen en mí
  - no me confían
  - no confían en mí
  lexicon: BDAG
  rationale: El verbo πιστεύω con dativo puede significar creer a alguien o confiar en alguien. En este contexto, «no me creen» reproduce de forma natural la acusación dirigida a los oyentes y deja abierta la dimensión relacional de confianza.
theological_decisions:
- issue: Fuerza retórica de la afirmación de Jesús sobre su inocencia y veracidad
  english_pob_reading: Render the questions straightforwardly without softening or expanding them.
  chosen_spanish_reading: Se mantienen las preguntas de forma directa, sin añadir explicación ni atenuar la acusación.
  alternative_spanish_readings:
  - ¿Quién de ustedes puede probar que he pecado?
  - ¿Cuál de ustedes puede mostrarme culpable de pecado?
  rationale: El versículo presenta un desafío frontal a los adversarios de Jesús y enlaza esa acusación con la verdad de su խոսar. La traducción conserva esa tensión cristológica sin interpretarla ni explicitarla más de lo que dice el griego.
  doctrine_reference: Credo Niceno-Constantinopolitano (381); Definición de Calcedonia (451)
- issue: Valor semántico de πιστεύω con dativo
  english_pob_reading: The Greek can carry both the sense of believing a speaker and trusting him.
  chosen_spanish_reading: «No me creen» se deja como traducción principal, con la implicación de fe/ confianza mantenida en el verbo.
  alternative_spanish_readings:
  - no confían en mí
  - no creen lo que digo
  rationale: En español, «creerme» es la opción más natural y fiel al dativo. La ambigüedad entre aceptar el testimonio de Jesús y confiar en él permanece disponible en el contexto, sin forzar una sola lectura.
  doctrine_reference: Teología bíblica del testimonio y la fe en Juan
translation_notes:
  revision_awareness: 'El inglés POB pasó de «convicts me concerning sin» a «convicts me of sin» por razones idiomáticas; el español adopta una solución igualmente natural con «convence de pecado», preservando el sentido forense y la amplitud de περὶ ἁμαρτίας. La lectura final mantiene la estructura retórica del griego y el impulso del audit trail: pregunta desafiante, condicional directa y rechazo de la incredulidad.'
  spanish_consistency_notes:
  - Se usa «ustedes» en lugar de «vosotros» para un español neutral latinoamericano.
  - Se mantiene «pecado» en singular, como en el griego, sin ampliar a «pecados».
  - Se traduce πιστεύω con dativo como «creerme», dejando abierta la dimensión de confianza sin sobrecargar el texto principal.
  - No se introduce «Cristo» ni otros títulos no presentes en el versículo.
