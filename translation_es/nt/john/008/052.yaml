  text: ⸀εἶπον αὐτῷ οἱ Ἰουδαῖοι· Νῦν ἐγνώκαμεν ὅτι δαιμόνιον ἔχεις. Ἀβραὰμ ἀπέθανεν καὶ οἱ προφῆται, καὶ σὺ λέγεις· Ἐάν τις τὸν λόγον μου τηρήσῃ, οὐ μὴ γεύσηται θανάτου εἰς τὸν αἰῶνα·
base_translation:
  language: en
  yaml_path: translation/nt/john/008/052.yaml
  text: The Jews said to him[a], “Now we know that you have a demon. Abraham died, and the prophets also, yet you say, ‘If anyone keeps my word[c][b], he will certainly never taste death forever.’”
  footnotes:
