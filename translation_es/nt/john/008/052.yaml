    text: Or, “you are demon-possessed.” The Greek is literally, “you have a demon.”
    reason: lexical_alternative
  - marker: b
    text: “Will certainly never taste death forever” is an emphatic Greek expression meaning “will never ever taste death.”
    reason: lexical_alternative
  - marker: c
    text: Or 'he will certainly never taste death forever'.
    reason: previous_rendering
