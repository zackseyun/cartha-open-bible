translation:
  language: es
  text: 'Los judíos le dijeron: «Ahora sabemos que tienes un demonio. Abraham murió, y también los profetas; pero tú dices: “Si alguien guarda[a] mi palabra[b][c], no probará la muerte jamás”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «obedece» o «atiende». El griego λόγος con τηρέω conserva la idea de guardar atentamente la palabra.'
    reason: lexical_alternative
  - marker: b
    text: «Palabra» traduce λόγος y mantiene el vocabulario característico de Juan; también podría entenderse como «mensaje».
    reason: lexical_alternative
  - marker: c
    text: 'La expresión griega es enfática: οὐ μὴ ... εἰς τὸν αἰῶνα, literalmente «de ningún modo ... para siempre». Se ha vertido de manera natural como «no probará la muerte jamás».'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ Ἰουδαῖοι
  english_pob_choice: The Jews
  chosen_spanish: los judíos
  alternatives_spanish:
  - los judeanos
  - los líderes judíos
  lexicon: BDAG
  rationale: Mantiene la referencia directa del griego y la solución ya auditada en inglés. «Judeanos» sería posible, pero menos natural en español; «líderes judíos» interpretaría más de lo que dice el texto.
- source_word: Νῦν ἐγνώκαμεν
  english_pob_choice: Now we know
  chosen_spanish: Ahora sabemos
  alternatives_spanish:
  - Ahora hemos llegado a saber
  - Ahora hemos conocido
  lexicon: BDAG
  rationale: La idea es el estado presente de comprensión alcanzada. «Ahora sabemos» es natural en español y conserva el valor resultativo sin volverse torpe.
- source_word: δαιμόνιον ἔχεις
  english_pob_choice: you have a demon
  chosen_spanish: tienes un demonio
  alternatives_spanish:
  - estás endemoniado
  - estás poseído por un demonio
  lexicon: BDAG
  rationale: Se preserva la formulación literal del griego, como en el texto inglés auditado. «Estás endemoniado» es una equivalencia interpretativa posible, pero borra la imagen verbal de «tener» un demonio.
- source_word: Ἀβραὰμ ἀπέθανεν
  english_pob_choice: Abraham died
  chosen_spanish: Abraham murió
  alternatives_spanish:
  - Abraham ha muerto
  lexicon: BDAG
  rationale: El aoristo se expresa con pasado simple en español. «Murió» es la forma natural y directa.
- source_word: οἱ προφῆται
  english_pob_choice: the prophets also
  chosen_spanish: también los profetas
  alternatives_spanish:
  - los profetas también
  lexicon: BDAG
  rationale: «También» conserva el valor aditivo de καί y el contraste argumentativo del verso. Se coloca antes para sonar más natural en español.
- source_word: καὶ σὺ λέγεις
  english_pob_choice: yet you say
  chosen_spanish: y tú dices
  alternatives_spanish:
  - pero tú dices
  - sin embargo tú dices
  lexicon: BDAG
  rationale: El griego usa καί con fuerza contrastiva en contexto. En español, el contraste queda suficientemente claro por la secuencia argumental; se mantiene «y» sin forzar una adversativa que no está explícita.
- source_word: Ἐάν τις
  english_pob_choice: If anyone
  chosen_spanish: Si alguien
  alternatives_spanish:
  - Si alguno
  lexicon: BDAG
  rationale: Equivale bien al indefinido general y es más idiomático en español contemporáneo.
- source_word: τὸν λόγον μου τηρήσῃ
  english_pob_choice: keeps my word
  chosen_spanish: guarda mi palabra
  alternatives_spanish:
  - obedece mi palabra
  - guarda mi mensaje
  lexicon: BDAG
  rationale: «Guardar» refleja bien τηρέω como conservar, atender y observar, sin reducirlo solo a obedecer. «Palabra» conserva λόγος y la dicción característica de Juan.
- source_word: οὐ μὴ γεύσηται θανάτου εἰς τὸν αἰῶνα
  english_pob_choice: he will certainly never taste death forever
  chosen_spanish: no probará la muerte jamás
  alternatives_spanish:
  - no probará muerte jamás
  - no gustará la muerte nunca, jamás
  lexicon: BDAG
  rationale: Se conserva la imagen de γεύομαι con «probar». «Jamás» expresa la negación enfática de οὐ μή y hace innecesaria una repetición pesada de «para siempre/eternamente» en español. La frase mantiene la tensión teológica del original sin interpretarla.
theological_decisions:
- issue: Sentido de «no probará la muerte»
  english_pob_reading: Retain the literal expression 'taste death' without resolving whether the reference is primarily to physical death, spiritual death, or eschatological death.
  chosen_spanish_reading: Mantener la expresión literal «probará la muerte» sin decidir si se trata principalmente de muerte física, espiritual o escatológica.
  alternative_spanish_readings:
  - no experimentará la muerte
  - no morirá jamás
  rationale: La escena conserva la objeción de los interlocutores frente a la afirmación de Jesús. Traducir literalmente preserva la ambigüedad teológica y narrativa del pasaje, que no debe resolverse en la traducción.
  doctrine_reference: Preservar la tensión teológica del texto sin cerrarla.
translation_notes:
  revision_awareness: El contexto inglés pasó por revisiones menores en la cláusula final para evitar la ambigüedad de 'forever/ever'; en español se optó por «jamás», que comunica la misma negación enfática sin introducir redundancia ni ambigüedad temporal. También se respetó la lectura literal de 'have a demon' en la línea principal, siguiendo la decisión auditada de no sustituirla por una paráfrasis interpretativa.
  spanish_consistency_notes:
  - Se usa «Dios»/«Yahvé» según corresponda, pero este verso no contiene esos términos.
  - «Palabra» se mantiene como traducción regular de λόγος en Juan.
  - «Probar la muerte» conserva la metáfora verbal del griego y coincide con el tratamiento POB del inglés.
  - La puntuación en comillas españolas sigue el estilo editorial del proyecto.
