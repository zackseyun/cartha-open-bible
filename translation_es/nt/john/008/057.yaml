translation:
  language: es
  text: 'Entonces los judíos le dijeron[a]: «Aún no tienes cincuenta años, ¿y has visto a Abraham?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los judeanos» o «los líderes judíos», según cuán ampliamente se entienda en contexto οἱ Ἰουδαῖοι.
    reason: alternative_reading
lexical_decisions:
- source_word: οἱ Ἰουδαῖοι
  english_pob_choice: the Jews
  chosen_spanish: los judíos
  alternatives_spanish:
  - los judeanos
  - los líderes judíos
  lexicon: BDAG
  rationale: El griego usa la designación narrativa amplia sin especificar solo a autoridades. «Los judíos» reproduce de forma directa la referencia elegida en la POB inglesa y mantiene la ambigüedad contextual documentada.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Entonces
  alternatives_spanish:
  - Por tanto
  - Así que
  lexicon: BDAG
  rationale: Marca la conexión discursiva con lo anterior. «Entonces» conserva la transición narrativa con naturalidad en español sin añadir fuerza inferencial excesiva.
- source_word: πεντήκοντα ἔτη οὔπω ἔχεις
  english_pob_choice: You are not yet fifty years old
  chosen_spanish: Aún no tienes cincuenta años
  alternatives_spanish:
  - Todavía no tienes cincuenta años
  - No has cumplido aún cincuenta años
  lexicon: BDAG
  rationale: El griego usa el verbo «tener» con la edad. En español, «tener cincuenta años» es el equivalente idiomático más natural y fiel, preservando el sentido temporal de οὔπω.
- source_word: ἑώρακας
  english_pob_choice: have you seen
  chosen_spanish: ¿has visto?
  alternatives_spanish:
  - ¿viste?
  - ¿has llegado a ver?
  lexicon: BDAG
  rationale: El perfecto de ὁράω se expresa con el presente perfecto español. La forma interrogativa conserva el asombro implícito en la pregunta retórica.
- source_word: Ἀβραάμ
  english_pob_choice: Abraham
  chosen_spanish: Abraham
  alternatives_spanish:
  - Abrán
  lexicon: BDAG
  rationale: Nombre propio bíblico estándar en español. Se mantiene la forma usual y transparente para lectura eclesial amplia.
theological_decisions:
- issue: Alcance de οἱ Ἰουδαῖοι en Juan
  english_pob_reading: the Jews
  chosen_spanish_reading: los judíos
  alternative_spanish_readings:
  - los judeanos
  - los líderes judíos
  rationale: Como en la POB inglesa, el texto no restringe explícitamente el grupo a dirigentes. Mantener «los judíos» conserva la tensión interpretativa sin resolverla de manera interpretativa.
  doctrine_reference: Principio de primacía del texto fuente y preservación de ambigüedad contextual.
- issue: Forma interrogativa en la segunda cláusula
  english_pob_reading: have you seen Abraham?
  chosen_spanish_reading: ¿has visto a Abraham?
  alternative_spanish_readings:
  - ¿viste a Abraham?
  - ¿has llegado a ver a Abraham?
  rationale: El griego presenta una pregunta directa con perfecto. El español con presente perfecto comunica mejor el valor resultativo y la incredulidad retórica.
  doctrine_reference: Coherencia aspectual en traducción bíblica; evitar pérdida del matiz retórico del perfecto.
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión final inglesa, especialmente en la segunda cláusula interrogativa, donde se optó por una pregunta directa con perfecto español para reflejar mejor ἑώρακας y el tono incrédulo del contexto.
  spanish_consistency_notes:
  - Se mantiene «los judíos» como equivalente estándar de οἱ Ἰουδαῖοι, en consonancia con el criterio POB documentado.
  - Se usa el presente perfecto español («has visto») para conservar el valor del perfecto griego.
  - «Entonces» reproduce la transición de οὖν con un español natural y sobrio.
  - Los nombres propios se transliteran según uso bíblico habitual en español.
  - La puntuación interrogativa sigue la sintaxis española sin alterar el orden del griego más de lo necesario.
