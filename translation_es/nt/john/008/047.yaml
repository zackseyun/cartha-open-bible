translation:
  language: es
  text: El que es de Dios oye las palabras de Dios. Por eso ustedes no oyen, porque[a] no son de Dios[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ustedes no oyen que no son de Dios». La conjunción griega ὅτι también puede leerse como «que», pero el sentido causal «porque» encaja mejor con el contexto.
    reason: alternative_reading
  - marker: b
    text: «De Dios» también puede verterse «de parte de Dios» o «procedentes de Dios». La expresión griega destaca la fuente o el origen.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ὢν
  english_pob_choice: the one who is
  chosen_spanish: el que es
  alternatives_spanish:
  - quien es
  - el que procede
  lexicon: BDAG
  rationale: El artículo con participio presente funciona sustantivamente y designa a una clase de persona. «El que es» conserva la fuerza singular representativa sin volver la frase más pesada en español.
- source_word: ἐκ τοῦ θεοῦ
  english_pob_choice: from God
  chosen_spanish: de Dios
  alternatives_spanish:
  - de parte de Dios
  - procedente de Dios
  lexicon: BDAG
  rationale: En este contexto ἐκ expresa origen o procedencia. «De Dios» es natural en español y mantiene la idea de fuente/origen que el audit trail inglés quiso preservar.
- source_word: τὰ ῥήματα τοῦ θεοῦ
  english_pob_choice: the words of God
  chosen_spanish: las palabras de Dios
  alternatives_spanish:
  - los dichos de Dios
  - las palabras de Dios
  lexicon: BDAG
  rationale: ῥήματα es plural y concreto; «palabras» lo reproduce con claridad. Se conserva el genitivo «de Dios» para mantener la solemnidad y la referencia directa al origen divino.
- source_word: ἀκούει / ἀκούετε
  english_pob_choice: hears / hear
  chosen_spanish: oye / oyen
  alternatives_spanish:
  - escucha / escuchan
  - oye / oye
  lexicon: BDAG
  rationale: «Oír» conserva el verbo básico y la repetición del griego. «Escuchar» podría sugerir más claramente atención o respuesta, pero también introduciría un matiz más interpretativo; por eso se prefiere «oír».
- source_word: διὰ τοῦτο
  english_pob_choice: For this reason
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por esta razón
  - Por lo tanto
  lexicon: BDAG
  rationale: La frase introduce consecuencia o explicación. «Por eso» suena natural en español y reproduce bien la fuerza inferencial sin sobrerformalizarla.
- source_word: ὑμεῖς
  english_pob_choice: you
  chosen_spanish: ustedes
  alternatives_spanish:
  - vosotros
  - ustedes mismos
  lexicon: BDAG
  rationale: El pronombre es enfático en griego, pero en español basta con el pronombre normal de segunda persona plural. «Ustedes» es neutral y apropiado para lectura eclesial amplia.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - que
  - ya que
  lexicon: BDAG
  rationale: Aquí ὅτι se entiende mejor con valor causal. «Porque» expresa de forma directa la razón de su incapacidad de oír, como en el audit trail inglés.
- source_word: ἐκ τοῦ θεοῦ οὐκ ἐστέ
  english_pob_choice: you are not from God
  chosen_spanish: no son de Dios
  alternatives_spanish:
  - no proceden de Dios
  - no son de Dios
  lexicon: BDAG
  rationale: Se conserva la expresión relacional/originaria con «de Dios», que en español es idiomática y suficientemente transparente. Mantiene la tensión joánica entre origen, pertenencia y procedencia sin resolverla en una categoría doctrinal posterior.
theological_decisions:
- issue: Sentido de «ser de Dios» en contexto joánico
  english_pob_reading: Retain the source/origin language 'from God' without specifying a later systematic category such as election, regeneration, or covenant membership alone.
  chosen_spanish_reading: Conservar «de Dios» como lenguaje de origen/procedencia sin convertirlo en una fórmula doctrinal más estrecha.
  alternative_spanish_readings:
  - pertenecer a Dios
  - haber nacido de Dios en sentido salvífico más estrecho
  rationale: El versículo contrapone a quienes tienen su origen en Dios con los opositores de Jesús. La traducción preserva esa tensión joánica sin cerrarla en un sistema doctrinal no explicitado por el texto.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
- issue: Fuerza de ἀκούω
  english_pob_reading: Translate as 'hear' rather than 'obey' in the main text.
  chosen_spanish_reading: Traducir con «oír» en el texto principal, no con «obedecer».
  alternative_spanish_readings:
  - escuchar
  - obedecer
  rationale: En contexto, oír verdaderamente implica respuesta, pero el verbo griego es «oír/escuchar». «Obedecer» interpretaría el efecto teológico en lugar de traducir la forma léxica.
  doctrine_reference: Primacía del idioma original sobre la tradición de traducción; preservar la tensión teológica.
translation_notes:
  revision_awareness: 'La redacción sigue el último pase revisado del audit trail inglés: se evita una puntuación más fuerte entre la segunda y la tercera proposición, y se mantiene el encadenamiento causal de ὅτι con «porque». No se introducen cambios doctrinales ni se añaden glosas interpretativas no sustentadas por el griego.'
  spanish_consistency_notes:
  - Se prefiere «Dios» sin artículos en la expresión fija «de Dios», coherente con el uso bíblico español y con la transparencia del origen griego.
  - Se usa «oír» de manera consistente para ἀκούω a fin de conservar la repetición verbal del verso.
  - Se mantiene un registro digno y publicable, evitando calcos innecesarios como «las palabras de Dios» sí, pero sin expandir a «los dichos» o a una paráfrasis explicativa.
