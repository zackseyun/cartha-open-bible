base_translation:
  language: en
  yaml_path: translation/nt/john/008/047.yaml
  text: The one who is from God hears the words of God[a]. For this reason you do not hear[b], because you are not from God.
  footnotes:
  - marker: a
    text: Or 'you do not hear that you are not from God.' The Greek conjunction ὅτι can also be read as 'that,' but the causal sense 'because' fits the context better.
    reason: alternative_reading
  - marker: b
    text: '''From God'' can also be rendered ''of God.'' The Greek expression emphasizes source or origin.'
    reason: lexical_alternative
