translation:
  language: es
  text: Pero yo no busco mi propia gloria; hay uno[b] que la busca y juzga[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «hay el que busca y juzga». El objeto implícito de «busca» es la gloria de Jesús, tomada de la cláusula anterior.'
    reason: lexical_alternative
  - marker: b
    text: El «uno» innominado comúnmente se entiende por el contexto como referencia al Padre, aunque el griego no lo dice explícitamente aquí.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐγὼ
  english_pob_choice: I
  chosen_spanish: yo
  alternatives_spanish:
  - yo mismo
  - yo
  lexicon: BDAG
  rationale: Se conserva el pronombre explícito para mantener el énfasis contrastivo del griego y del inglés POB, sin sobrecargarlo con una forma reflexiva que no añade sentido aquí.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δὲ introduce contraste con la acusación implícita; en español, "Pero" comunica mejor ese valor adversativo en un registro natural y digno.
- source_word: οὐ ζητῶ
  english_pob_choice: do not seek
  chosen_spanish: no busco
  alternatives_spanish:
  - no estoy buscando
  - no procuro
  lexicon: BDAG
  rationale: El presente simple suena natural en español y preserva el vínculo léxico con ζητῶν más adelante. "Buscar" conserva la correspondencia semántica básica con ζητέω.
- source_word: τὴν δόξαν μου
  english_pob_choice: my own glory
  chosen_spanish: mi propia gloria
  alternatives_spanish:
  - mi gloria
  - honor para mí
  lexicon: BDAG
  rationale: δόξα aquí expresa gloria/honor debido a una persona. "Mi propia gloria" explicita la negación de autoexaltación, siguiendo la fuerza que el inglés POB quiso hacer explícita.
- source_word: ἔστιν
  english_pob_choice: there is
  chosen_spanish: hay
  alternatives_spanish:
  - existe
  - está
  lexicon: BDAG
  rationale: El valor existencial se transmite de manera natural con "hay", manteniendo la indefinición deliberada del sujeto en el griego.
- source_word: ὁ ζητῶν
  english_pob_choice: One who seeks it
  chosen_spanish: uno que la busca
  alternatives_spanish:
  - el que la busca
  - el que busca
  lexicon: BDAG
  rationale: El participio articular se vuelve una construcción substantiva natural en español. Se explicita el objeto con "la" por el antecedente inmediato "gloria".
- source_word: καὶ κρίνων
  english_pob_choice: and judges
  chosen_spanish: y juzga
  alternatives_spanish:
  - y está juzgando
  - y sentencia
  lexicon: BDAG
  rationale: El participio presente se traduce con un verbo finito coordinado, como en el inglés POB, para fluidez. "Juzga" conserva el campo forense de κρίνω.
theological_decisions:
- issue: Identidad del sujeto no nombrado que busca y juzga
  english_pob_reading: The translation leaves the subject implicit as 'One,' without explicitly identifying him as the Father in the main text.
  chosen_spanish_reading: El texto deja el sujeto implícito como "uno", sin nombrarlo explícitamente como el Padre.
  alternative_spanish_readings:
  - hay uno, el Padre, que la busca y juzga
  - hay uno que la busca y juzga
  rationale: El griego no nombra al sujeto; el contexto joánico sugiere al Padre, pero el texto mismo conserva la indefinición. La traducción principal mantiene esa restricción y deja la identificación al contexto, sin resolverla en el cuerpo del versículo.
  doctrine_reference: Preservar la tensión textual y teológica; primacía del original sobre una identificación interpretativa explícita.
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia con el inglés POB y no requiere revisión sustantiva; se mantiene la misma decisión de dejar implícito al sujeto y de explicitar el objeto entendido de «buscar».
  spanish_consistency_notes:
  - Se mantiene "gloria" como equivalente de δόξα, en coherencia con el uso POB.
  - Se usa "juzga" para κρίνων por su naturalidad en español y su resonancia judicial.
  - No se introduce "Cristo" ni "Señor"; el versículo no lo exige.
  - La puntuación y el orden conservan el contraste inicial y la clausula final breve del original.
