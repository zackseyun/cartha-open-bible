translation:
  language: es
  text: 'Ellos le respondieron y le dijeron: «Abraham es nuestro padre». Jesús les dice: «Si ustedes fueran hijos de Abraham,[a] harían las obras de Abraham».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Si ustedes son hijos de Abraham, hacen las obras de Abraham». El verbo griego puede entenderse como una condición presentada de forma directa o como una condición contraria al hecho en este contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀπεκρίθησαν καὶ εἶπαν
  english_pob_choice: They answered and said
  chosen_spanish: respondieron y dijeron
  alternatives_spanish:
  - respondieron
  - contestaron y dijeron
  lexicon: BDAG
  rationale: Conservo la doble formulación verbal del griego, que en Juan marca una respuesta más enfática que un simple 'dijeron'. 'Respondieron y dijeron' suena natural en español y preserva la secuencia narrativa.
- source_word: Ὁ πατὴρ ἡμῶν Ἀβραάμ ἐστιν
  english_pob_choice: Abraham is our father
  chosen_spanish: Abraham es nuestro padre
  alternatives_spanish:
  - Nuestro padre es Abraham
  lexicon: BDAG
  rationale: Mantengo la afirmación relacional en un orden natural para el español, sin perder el contenido de filiación y pertenencia que el griego expresa.
- source_word: λέγει
  english_pob_choice: Jesus says
  chosen_spanish: Jesús les dice
  alternatives_spanish:
  - Jesús dijo
  lexicon: BDAG
  rationale: Conservo el presente histórico del griego con 'dice', que mantiene la vivacidad del diálogo en narración.
- source_word: τέκνα
  english_pob_choice: children
  chosen_spanish: hijos
  alternatives_spanish:
  - niños
  - descendientes
  lexicon: BDAG
  rationale: Aquí 'hijos' comunica mejor la relación filial y genealógica implícita que 'niños'. Aunque 'hijos' es masculino gramatical, en español puede funcionar de forma genérica en una relación de descendencia; 'descendientes' sería más explícito pero menos cercano al lenguaje del pasaje.
- source_word: Εἰ τέκνα τοῦ Ἀβραάμ ἐστε
  english_pob_choice: If you are Abraham’s children
  chosen_spanish: Si ustedes son hijos de Abraham
  alternatives_spanish:
  - Si son hijos de Abraham
  - Si ustedes fueran hijos de Abraham
  lexicon: BDAG
  rationale: El griego presenta una condición en indicativo, y la forma española en presente conserva esa fuerza directa. No introduzco una condicional contrafactual en el texto principal, porque la revisión inglesa final descartó esa lectura como base principal.
- source_word: τὰ ἔργα τοῦ Ἀβραὰμ
  english_pob_choice: the works of Abraham
  chosen_spanish: las obras de Abraham
  alternatives_spanish:
  - las obras de Abrahán
  - los hechos de Abraham
  lexicon: BDAG
  rationale: '''Obras'' conserva el valor ético-conductual de ἔργα en Juan y mantiene la referencia a acciones visibles, no solo a ideas o identidad interna.'
- source_word: ἐποιεῖτε
  english_pob_choice: you are doing
  chosen_spanish: están haciendo
  alternatives_spanish:
  - hacen
  - estarían haciendo
  lexicon: BDAG
  rationale: Sigo la revisión inglesa más reciente, que refleja el presente indicativo del griego. 'Están haciendo' transmite una acción en curso sin forzar una lectura contrafactual que el texto base no exige en esta forma.
theological_decisions:
- issue: Relación entre paternidad abrahámica y conducta
  english_pob_reading: Preserve theological tension rather than resolve it.
  chosen_spanish_reading: Conservar la tensión entre la afirmación de parentesco con Abraham y la acusación implícita en la conducta, sin convertirla en una negación explícita de descendencia física ni en una definición completa de filiación espiritual.
  alternative_spanish_readings:
  - Interpretar que niega por completo la descendencia física
  - Interpretar que afirma solo una filiación espiritual
  rationale: El versículo contrapone la reclamación 'Abraham es nuestro padre' con la evidencia de las obras. La traducción debe dejar esa tensión intacta, porque el texto inmediato no la resuelve de manera sistemática.
  doctrine_reference: Preservar la tensión teológica del pasaje sin ampliar la doctrina más allá del versículo.
translation_notes:
  revision_awareness: 'La base inglesa pasó por una revisión importante en la última etapa: se abandonó la lectura contrafactual (''you would be doing'') y se adoptó el presente indicativo (''you are doing'') para ἐποιεῖτε. La redacción española sigue esa decisión final y evita introducir en el texto principal una condicional contraria a la revisión más reciente. También se mantiene el presente histórico de λέγει mediante ''dice''.'
  spanish_consistency_notes:
  - Uso 'Abraham' sin tilde, conforme al nombre bíblico habitual en español y a la forma del texto fuente.
  - Conservo 'Jesús' como nombre propio estándar y 'obras' para ἔργα, evitando 'hechos' por menor precisión en este contexto joánico.
  - El pronombre explícito 'ustedes' ayuda a clarificar el plural en español y a mantener el tono directo del diálogo.
