review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: mantiene la doble fórmula de respuesta, la afirmación ''Abraham es nuestro padre'', el presente histórico ''Jesús les dice'' y el contraste entre filiación reclamada y obras. Sin embargo, ''están haciendo'' no representa de la mejor manera ἐποιεῖτε en esta construcción; en español suena progresivo y hasta afirmativo de una acción actual, mientras que el sentido en contexto apunta más naturalmente a una consecuencia esperada (''harían''). Además, el expediente inglés preservó explícitamente la alternativa condicional contrafactual en nota, y el español debería conservar esa posibilidad exegética.'
  spanish_quality_summary: El español es claro y legible, pero la cláusula final queda poco natural y algo engañosa con 'están haciendo las obras de Abraham', porque en el contexto Jesús justamente cuestiona que las hagan. Una formulación condicional irreal en el texto principal suena más idiomática y comunica mejor la reprensión implícita. El resto del versículo fluye bien en español eclesial neutral.
  glossary_alignment: No hay conflictos con la terminología de proyecto. 'Jesús', 'Abraham' y 'obras' están bien. 'Hijos' para τέκνα es aceptable en este contexto, aunque 'hijos de Abraham' debe entenderse genéricamente. La revisión principal afecta la representación verbal de ἐποιεῖτε y la preservación de la alternativa documentada.
  issues:
  - severity: medium
    issue: La frase 'están haciendo las obras de Abraham' no refleja bien la fuerza contextual de ἐποιεῖτε.
    rationale: Aunque el paquete inglés fue revisado a presente, en español el progresivo 'están haciendo' suena demasiado literal y poco idiomático en una condición de este tipo, e incluso parece afirmar la conducta que Jesús está cuestionando. 'Harían las obras de Abraham' transmite mejor la consecuencia esperada y la reprensión implícita.
  - severity: medium
    issue: Falta una nota al pie que preserve la alternativa documentada en el expediente inglés.
    rationale: El POB inglés conservó la posibilidad de entender el imperfecto en contexto como condición contraria al hecho. Dado que el español necesita optar por una formulación más natural, conviene documentar la otra lectura relevante en nota.
