translation:
  language: es
  text: y conocerán[a] la verdad, y la verdad los hará libres[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «llegarán a conocer la verdad».'
    reason: lexical_alternative
  - marker: b
    text: La libertad aquí queda sin especificar en la redacción del versículo; el contexto circundante la conecta con la libertad del pecado.
    reason: cross_reference
lexical_decisions:
- source_word: γνώσεσθε
  english_pob_choice: you will know
  chosen_spanish: conocerán
  alternatives_spanish:
  - sabrán
  - llegarán a conocer
  lexicon: BDAG
  rationale: El futuro de γινώσκω puede traducirse por «conocerán» en español natural y fiel. «Llegarán a conocer» expresa mejor el matiz ingresivo, pero alarga innecesariamente el verso; «sabrán» suena más cognitivo y menos relacional.
- source_word: τὴν ἀλήθειαν / ἡ ἀλήθεια
  english_pob_choice: the truth
  chosen_spanish: la verdad
  alternatives_spanish:
  - verdad
  lexicon: BDAG
  rationale: Se conserva el artículo en ambas menciones para reflejar la especificidad y la repetición retórica del griego. En español, «la verdad» es la forma natural y precisa.
- source_word: ἐλευθερώσει
  english_pob_choice: will set ... free
  chosen_spanish: los hará libres
  alternatives_spanish:
  - los liberará
  - los pondrá en libertad
  lexicon: BDAG
  rationale: «Hará libres» reproduce bien el valor causativo de ἐλευθερόω con una construcción idiomática en español. «Liberará» es posible, pero puede sonar más abstracto o solemne; «pondrá en libertad» es válido, aunque menos directo.
- source_word: ὑμᾶς
  english_pob_choice: you
  chosen_spanish: los
  alternatives_spanish:
  - les
  lexicon: BDAG
  rationale: En español, el objeto plural masculino mixto se expresa naturalmente con «los». El griego plural no especifica género, pero el español requiere una decisión morfosintáctica.
- source_word: καὶ ... καὶ
  english_pob_choice: and ... and
  chosen_spanish: y ... y
  alternatives_spanish:
  - entonces ... y
  lexicon: BDAG
  rationale: Se conserva la coordinación repetida del griego para mantener el ritmo y la estructura paralela del verso.
theological_decisions:
- issue: Alcance de la libertad prometida por «la verdad os hará libres»
  english_pob_reading: Render the statement without specifying political, psychological, or specifically spiritual freedom in the main text.
  chosen_spanish_reading: Presentar la promesa sin añadir un especificador en el texto principal.
  alternative_spanish_readings:
  - la verdad los hará espiritualmente libres
  - la verdad los librará del pecado
  rationale: El verso por sí solo no delimita el tipo de libertad con una glosa. Mantener la formulación abierta respeta la tensión teológica y deja que el contexto inmediato determine el alcance.
  doctrine_reference: Preservar la tensión teológica en el texto principal, sin resolverla por paráfrasis.
translation_notes:
  revision_awareness: Se corrigió la validación anterior incluyendo los marcadores [a] y [b] directamente en el texto español. El resultado conserva la estructura coordinada del griego y la ambigüedad teológica del verso sin glosa interpretativa en el cuerpo principal.
  spanish_consistency_notes:
  - Se mantuvo «la verdad» en ambas apariciones para reflejar el artículo griego.
  - Se evitó «Cristo», «Señor» y otras terminologías ajenas al pasaje.
  - La libertad se expresó con una construcción natural en español que conserva el sentido causativo de ἐλευθερόω.
  - Los marcadores de nota aparecen exactamente en el texto donde corresponde cada alternativa.
