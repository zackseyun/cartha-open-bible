- from: y conocerán la verdad[a], y la verdad[b] los hará libres.
  to: y conocerán[a] la verdad, y la verdad los hará libres[b].
  rationale: Se corrige el anclaje de las notas para que coincidan con el contenido explicado por cada una y se deja el texto principal con una reparación mínima. Aunque «conocerán» sigue siendo formalmente ambiguo en español por posible lectura de tercera plural, en contextos de sujeto tácito de segunda plural puede funcionar como tratamiento de ustedes en gran parte del mundo hispano; no obstante, la revisión marca la necesidad de atender esa concordancia en edición posterior si el proyecto prefiere explicitar «ustedes» o usar un registro con «os».
