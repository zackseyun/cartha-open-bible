    issue: Cambio de persona gramatical en «conocerán»
    rationale: γνώσεσθε es segunda persona plural («ustedes/vosotros conocerán/conoceréis»), no tercera plural. El texto español debe dirigirse a los oyentes, no hablar de ellos.
  - severity: medium
    issue: Anclaje incorrecto de la nota b
    rationale: La nota inglesa explica la libertad de «will set you free»; en español está colocada sobre «la verdad», lo que desvía el referente de la nota.
