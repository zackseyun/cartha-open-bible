base_translation:
  language: en
  yaml_path: translation/nt/john/008/033.yaml
  text: They answered him[a], “We are Abraham’s offspring and have never been enslaved to anyone. How can you say[c][b], ‘You will become free’?”
  footnotes:
  - marker: a
    text: Or “Abraham’s seed.” The Greek uses a singular collective expression for physical descent.
    reason: lexical_alternative
  - marker: b
    text: Or “have never served anyone.” The verb can mean serve, but in this context the sense of bondage/slavery is more prominent.
    reason: lexical_alternative
  - marker: c
    text: Or “You will be free.” The Greek more literally says “you will become free.”
    reason: lexical_alternative
