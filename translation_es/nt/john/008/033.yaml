translation:
  language: es
  text: 'Le respondieron[a]: «Somos descendencia de Abraham[b] y nunca hemos sido esclavos[c] de nadie. ¿Cómo dices tú[d]: “Ustedes llegarán a ser libres”[e]?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Le contestaron».
    reason: lexical_alternative
  - marker: b
    text: O «simiente de Abraham». El griego usa una expresión singular colectiva para la descendencia física.
    reason: lexical_alternative
  - marker: c
    text: O «nunca hemos servido a nadie». El verbo puede significar servir, pero aquí predomina el sentido de esclavitud o servidumbre.
    reason: lexical_alternative
  - marker: d
    text: O «¿Cómo puedes decir...?». El griego dice más literalmente «¿cómo dices tú...?», con el pronombre explícito para dar énfasis.
    reason: lexical_alternative
  - marker: e
    text: O «Ustedes serán libres». El griego dice más literalmente «llegarán a ser libres», con idea de llegar a ese estado.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθησαν πρὸς αὐτόν
  english_pob_choice: They answered him
  chosen_spanish: Le respondieron
  alternatives_spanish:
  - Le contestaron
  - Respondieron a él
  lexicon: BDAG
  rationale: En español, «le respondieron» expresa de forma natural la respuesta dirigida a Jesús sin calcar una construcción extraña. Mantiene el sentido directo del griego.
- source_word: Σπέρμα Ἀβραάμ
  english_pob_choice: Abraham’s offspring
  chosen_spanish: descendencia de Abraham
  alternatives_spanish:
  - simiente de Abraham
  - descendientes de Abraham
  lexicon: BDAG
  rationale: Σπέρμα es un singular colectivo. «Descendencia» preserva ese valor colectivo y la referencia a linaje físico, sin imponer el matiz más técnico o arcaico de «simiente».
- source_word: οὐδενὶ δεδουλεύκαμεν πώποτε
  english_pob_choice: have never been enslaved to anyone
  chosen_spanish: nunca hemos sido esclavos de nadie
  alternatives_spanish:
  - nunca hemos servido a nadie
  - nunca hemos estado en esclavitud bajo nadie
  lexicon: BDAG
  rationale: El contexto inmediato es el de esclavitud y libertad; por eso «esclavos» conserva con más fuerza la carga del verbo δουλεύω que «servir». «De nadie» reproduce el dativo con naturalidad en español.
- source_word: πώποτε
  english_pob_choice: never
  chosen_spanish: nunca
  alternatives_spanish:
  - jamás
  lexicon: BDAG
  rationale: «Nunca» es la forma más natural y concisa para el adverbio en una cláusula ya negada.
- source_word: πῶς σὺ λέγεις
  english_pob_choice: How can you say
  chosen_spanish: ¿Cómo dices tú
  alternatives_spanish:
  - ¿Cómo puedes decir
  - ¿Cómo es que dices tú
  lexicon: BDAG
  rationale: El griego expresa extrañeza o incredulidad. El español puede conservar ese tono con una pregunta directa; el pronombre explícito «tú» refleja el énfasis de σὺ.
- source_word: Ἐλεύθεροι γενήσεσθε
  english_pob_choice: You will become free
  chosen_spanish: que llegarán a ser libres
  alternatives_spanish:
  - que serán libres
  - que se harán libres
  lexicon: BDAG
  rationale: γενήσεσθε es futuro de γίνομαι, con sentido de llegar a ser. «Llegarán a ser libres» conserva mejor la idea de transición que un simple «serán libres». Se eligió tercera persona plural porque la cita en español queda integrada como contenido referido, manteniendo claridad sintáctica.
theological_decisions:
- issue: δουλεύω en un contexto de libertad y esclavitud
  english_pob_reading: enslaved
  chosen_spanish_reading: esclavos
  alternative_spanish_readings:
  - en esclavitud
  - servidores
  rationale: La discusión de los vv. 34–36 trata la esclavitud frente a la libertad. «Esclavos» preserva el peso social y teológico del contraste mejor que atenuarlo con «servidores».
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος; Translation philosophy §1'
- issue: Σπέρμα Ἀβραάμ como afirmación de ascendencia física
  english_pob_reading: Abraham’s offspring
  chosen_spanish_reading: descendencia de Abraham
  alternative_spanish_readings:
  - simiente de Abraham
  - descendientes de Abraham
  rationale: La frase afirma linaje físico, no una elaboración teológica posterior. «Descendencia» conserva la fuerza colectiva del singular griego sin sonar arcaica.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §6'
translation_notes:
  revision_awareness: No se registraron revisiones aplicadas; el último pase de revisión indicó que el texto permanecía sin cambios y con alta concordancia con la evaluación de control cruzado.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió «descendencia» sobre «simiente» por claridad y por conservar el sentido colectivo del singular griego.
  - Se usó «esclavos» para reflejar con fuerza el campo semántico de δουλεύω en el contexto inmediato de libertad/esclavitud.
  - La cita en español integra el contenido de manera natural con verbos de decir en tercera persona plural para evitar una sintaxis excesivamente literal.
