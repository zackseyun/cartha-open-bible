translation:
  language: es
  text: Así que si el Hijo los libera, [a]verdaderamente serán libres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como «realmente» o «de verdad». El adverbio griego subraya que esta libertad es genuina y completa.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν οὖν
  english_pob_choice: So if
  chosen_spanish: Así que, si
  alternatives_spanish:
  - Por tanto, si
  - Entonces, si
  lexicon: BDAG
  rationale: ἐὰν introduce una condición y οὖν marca una conclusión o inferencia. «Así que, si» conserva esa relación lógica con un español natural y fluido, sin volver la frase pesada.
- source_word: ὁ υἱός
  english_pob_choice: the Son
  chosen_spanish: el Hijo
  alternatives_spanish:
  - el hijo
  lexicon: BDAG
  rationale: En el contexto joánico, ὁ υἱός funciona como título cristológico referido a Jesús. «Hijo» con mayúscula implícita en contexto mantiene el valor titulado sin añadir formulación extra.
- source_word: ὑμᾶς
  english_pob_choice: you
  chosen_spanish: los
  alternatives_spanish:
  - a ustedes
  - los libera
  lexicon: BDAG
  rationale: El griego está en segunda persona plural. En español, «los» integra naturalmente el objeto directo plural y mantiene el alcance plural del pronombre sin sobrecargar la frase.
- source_word: ἐλευθερώσῃ
  english_pob_choice: sets free
  chosen_spanish: libera
  alternatives_spanish:
  - hace libres
  - pone en libertad
  lexicon: BDAG
  rationale: «Libera» reproduce de forma breve y directa el verbo de acción. «Pone en libertad» sería más explícito pero menos conciso; «hace libres» desplaza el foco al resultado.
- source_word: ὄντως
  english_pob_choice: truly
  chosen_spanish: verdaderamente
  alternatives_spanish:
  - realmente
  - de verdad
  - en verdad
  lexicon: BDAG
  rationale: ὄντως intensifica la realidad o genuinidad de la libertad. «Verdaderamente» conserva ese énfasis con un registro sobrio y natural.
- source_word: ἐλεύθεροι
  english_pob_choice: free
  chosen_spanish: libres
  alternatives_spanish:
  - libres de verdad
  lexicon: BDAG
  rationale: Como adjetivo predicativo, describe el estado resultante. «Libres» es el equivalente directo y mantiene la conexión léxica con ἐλευθερόω.
- source_word: ἔσεσθε
  english_pob_choice: you will be
  chosen_spanish: serán
  alternatives_spanish:
  - serán ustedes
  - van a ser
  lexicon: BDAG
  rationale: El futuro de εἰμί se expresa naturalmente con «serán». Aunque el griego es segunda persona plural, el sujeto implícito ya queda claro por «los»; no hace falta explicitar «ustedes».
theological_decisions:
- issue: Identidad de «el Hijo»
  english_pob_reading: A christological title referring to Jesus uniquely as the Son
  chosen_spanish_reading: Título cristológico que se refiere a Jesús de manera única como el Hijo
  alternative_spanish_readings:
  - un hijo genérico
  - un hijo en sentido general
  rationale: El contexto de Juan no permite leerlo como un hijo cualquiera. Traducir «el Hijo» preserva la referencia cristológica y la relación argumental con la autoridad de Jesús.
  doctrine_reference: Credo de Nicea-Constantinopla (381) y cristología joánica
- issue: Naturaleza de la libertad
  english_pob_reading: Freedom in the fullest or genuine sense, without narrowing it to merely political, social, or inward categories in translation
  chosen_spanish_reading: Libertad genuina y plena, sin restringirla a una sola esfera
  alternative_spanish_readings:
  - libertad espiritual solamente
  - libertad social solamente
  - libertad política solamente
  rationale: El adverbio ὄντως no permite reducir el sentido a una categoría única. «Verdaderamente» conserva la amplitud del texto y su fuerza teológica sin resolverla de antemano.
  doctrine_reference: Principio de preservar la tensión teológica del texto
translation_notes:
  revision_awareness: El texto base inglés pasó de «Therefore, if» a «So if» para reflejar con más naturalidad οὖν. La versión española adopta una apertura igualmente natural («Así que, si») y conserva el énfasis de ὄντως con «verdaderamente».
  spanish_consistency_notes:
  - Se mantiene «el Hijo» para el título cristológico, no «el hijo» común.
  - Se traduce ἐλευθερόω con «libera» y el adjetivo ἐλεύθεροι con «libres» para conservar la raíz léxica en español.
  - La segunda persona plural griega queda representada de forma natural en español sin forzar un plural explícito en cada elemento.
  - No se usa «SEÑOR» porque el verso no contiene κύριος ni un reemplazo del nombre divino.
