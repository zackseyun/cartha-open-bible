translation:
  language: es
  text: 'Entonces Jesús les habló otra vez, diciendo: «Yo soy la luz del mundo. El que me sigue no andará jamás en la oscuridad[a], sino que tendrá la luz de la vida[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «nunca andará en la oscuridad». La doble negación griega οὐ μὴ expresa una negación enfática muy fuerte.'
    reason: lexical_alternative
  - marker: b
    text: «La luz de la vida» también puede entenderse como «la luz que da vida».
    reason: alternative_reading
lexical_decisions:
- source_word: Πάλιν
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  - una vez más
  lexicon: BDAG
  rationale: Marca repetición de la acción discursiva. «Otra vez» es natural en español y conserva la idea de reanudación sin añadir matiz intensivo innecesario.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: por tanto
  alternatives_spanish:
  - entonces
  - así que
  lexicon: BDAG
  rationale: Conector de continuación/inferencia. En español, «por tanto» mantiene el enlace discursivo sin volverlo demasiado coloquial; aquí se integra de manera fluida en la narración.
- source_word: ἐλάλησεν
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  - les habló
  lexicon: BDAG
  rationale: λαλέω subraya el acto de hablar. «Habló» conserva ese valor más general, mientras que el complemento «les» queda claro por el contexto y por el destinatario explícito del texto.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - al decir
  lexicon: BDAG
  rationale: Participio introductorio de discurso directo. «Diciendo» mantiene la relación sintáctica con lo anterior y evita expandir el texto.
- source_word: Ἐγώ εἰμι
  english_pob_choice: I am
  chosen_spanish: Yo soy
  alternatives_spanish:
  - Yo estoy
  - Soy yo
  lexicon: BDAG
  rationale: El pronombre enfático se expresa de forma natural en español con «Yo soy». No se añade una marcada solemnización que el sintagma no exige por sí solo, aunque sí conserva la fuerza enfática básica.
- source_word: τὸ φῶς τοῦ κόσμου
  english_pob_choice: the light of the world
  chosen_spanish: la luz del mundo
  alternatives_spanish:
  - la luz del mundo entero
  - la luz para el mundo
  lexicon: BDAG
  rationale: Correspondencia directa y transparente del predicado nominal con genitivo. «Mundo» conserva el uso joánico de κόσμος sin reinterpretarlo.
- source_word: ὁ ἀκολουθῶν ἐμοὶ
  english_pob_choice: The one who follows me
  chosen_spanish: El que me sigue
  alternatives_spanish:
  - El que va tras mí
  - Quien me sigue
  lexicon: BDAG
  rationale: El participio articular se vuelve una construcción natural en español. «El que me sigue» preserva la fuerza singular representativa y la relación personal con Jesús.
- source_word: οὐ μὴ περιπατήσῃ
  english_pob_choice: will certainly not walk
  chosen_spanish: no andará jamás
  alternatives_spanish:
  - no caminará de ninguna manera
  - nunca andará
  lexicon: BDAG
  rationale: La combinación οὐ μὴ con subjuntivo aoristo expresa negación enfática. «No andará jamás» comunica con claridad esa intensidad en español sin recurrir a un giro arcaico.
- source_word: ἐν τῇ σκοτίᾳ
  english_pob_choice: in the darkness
  chosen_spanish: en la oscuridad
  alternatives_spanish:
  - en las tinieblas
  - en oscuridad
  lexicon: BDAG
  rationale: σκοτία puede referir tanto a la oscuridad física como al ámbito simbólico de tinieblas. «Oscuridad» es comprensible y sobrio en español; se conserva el artículo para mantener el valor definido del griego.
- source_word: ἕξει
  english_pob_choice: will have
  chosen_spanish: tendrá
  alternatives_spanish:
  - poseerá
  - contará con
  lexicon: BDAG
  rationale: Futuro simple de ἔχω. «Tendrá» es idiomático y suficiente, sin perder la idea de posesión/tenencia.
- source_word: τὸ φῶς τῆς ζωῆς
  english_pob_choice: the light of life
  chosen_spanish: la luz de la vida
  alternatives_spanish:
  - la luz que da vida
  - la luz vital
  lexicon: BDAG
  rationale: Se mantiene la estructura compacta del genitivo para preservar su ambigüedad productiva. «La luz de la vida» deja abierta la relación semántica sin resolverla interpretativamente.
theological_decisions:
- issue: Alcance cristológico de Ἐγώ εἰμι
  english_pob_reading: Render simply as 'I am' within the predicate statement 'I am the light of the world' without importing an explicit allusion to the divine name into the translation.
  chosen_spanish_reading: Traducir simplemente «Yo soy» dentro de «Yo soy la luz del mundo», sin forzar en el texto una alusión explícita al nombre divino.
  alternative_spanish_readings:
  - «Yo soy» con énfasis tipográfico o ampliación interpretativa
  - «Yo soy, el que soy, la luz del mundo»
  rationale: En este versículo la gramática une ἐγώ εἰμι con un predicado nominal; la traducción debe reflejar esa sintaxis simple. La posible resonancia teológica joánica queda disponible para el lector sin que el traductor la sobreexponga.
  doctrine_reference: Preservar la tensión teológica sin resolverla
- issue: Sentido de τὸ φῶς τῆς ζωῆς
  english_pob_reading: Retain the literal phrase 'the light of life' rather than interpretively expanding it.
  chosen_spanish_reading: Conservar «la luz de la vida» sin expandirla a una paráfrasis explicativa.
  alternative_spanish_readings:
  - «la luz que da vida»
  - «la luz vivificante»
  rationale: El genitivo es semánticamente abierto y puede entenderse de más de una manera. La traducción literal conserva esa riqueza y evita cerrar prematuramente el sentido.
  doctrine_reference: Preservar la tensión teológica sin resolverla
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto griego y el audit trail inglés. Se conservaron las decisiones clave: repetición discursiva con «otra vez», conexión con un conector suave, valor enfático de οὐ μὴ en una negación española natural, y la ambigüedad teológica de «la luz de la vida». No se introdujeron expansiones doctrinales ni equivalentes tradicionales no sustentados por el original.'
  spanish_consistency_notes:
  - Se usa «Jesús» para Ἰησοῦς, «mundo» para κόσμος, «oscuridad» para σκοτία y «vida» para ζωή.
  - Se evita «Señor» o sustitutos reverenciales no presentes en el griego.
  - «Yo soy» conserva la literalidad del predicado nominal sin añadir comentario interpretativo.
  - Las comillas angulares se emplean para el discurso directo según norma tipográfica española.
