    text: 'O: «nunca andará en la oscuridad». La doble negación griega οὐ μὴ expresa una negación enfática muy fuerte.'
    reason: lexical_alternative
  - marker: b
    text: «La luz de la vida» también puede entenderse como «la luz que da vida».
    reason: alternative_reading
  revision_rationale: 'Se añadió un conector natural para reflejar οὖν («Entonces»), y se reubicaron/corrigieron las notas para que coincidan con la auditoría inglesa y con los puntos léxicos realmente discutidos: la negación enfática en οὐ μὴ y la ambigüedad de «la luz de la vida». Se conservó el resto del texto porque es fiel, idiomático y teológicamente adecuado.'
