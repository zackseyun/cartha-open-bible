revisions:
- from: 'Jesús les habló otra vez[a], diciendo: «Yo soy la luz del mundo. El que me sigue no andará jamás en la oscuridad[b], sino que tendrá la luz de la vida».'
  to: 'Entonces Jesús les habló otra vez, diciendo: «Yo soy la luz del mundo. El que me sigue no andará jamás en la oscuridad[a], sino que tendrá la luz de la vida[b]».'
  rationale: 'Se añadió un conector natural para reflejar οὖν («Entonces»), y se reubicaron/corrigieron las notas para que coincidan con la auditoría inglesa y con los puntos léxicos realmente discutidos: la negación enfática en οὐ μὴ y la ambigüedad de «la luz de la vida». Se conservó el resto del texto porque es fiel, idiomático y teológicamente adecuado.'
