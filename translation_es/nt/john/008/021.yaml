    text: 'Griego en singular: «en su pecado». Algunas traducciones vierten «en sus pecados», pero el singular probablemente subraya una condición continua más que actos individuales.'
    reason: lexical_alternative
  - marker: c
    text: O «ustedes no pueden llegar».
    reason: lexical_alternative
  revision_rationale: 'La revisión conserva los aciertos del borrador, especialmente el singular «pecado», pero corrige dos puntos para alinearse mejor con el griego y con el audit trail inglés: (1) se refuerza la idea de partida en la segunda ocurrencia de ὑπάγω con «Adonde yo me voy»; y (2) se restituye ἐλθεῖν como «venir» en vez de «ir». También se ajusta la nota c para que corresponda a una alternativa real de la cláusula final, no al adverbio locativo.'
