  text: Εἶπεν οὖν πάλιν ⸀αὐτοῖς· Ἐγὼ ὑπάγω καὶ ζητήσετέ με, καὶ ἐν τῇ ἁμαρτίᾳ ὑμῶν ἀποθανεῖσθε· ὅπου ἐγὼ ὑπάγω ὑμεῖς οὐ δύνασθε ἐλθεῖν.
base_translation:
  language: en
  yaml_path: translation/nt/john/008/021.yaml
  text: So he said to them again[a], “I am going away, and you will seek me, and you will die in your sin. Where I am going[c][b], you are not able to come.”
  footnotes:
  - marker: a
    text: Or 'you will look for me.' The verb can denote searching for someone, and in John it may also carry a deeper spiritual sense.
    reason: lexical_alternative
  - marker: b
    text: 'Greek singular: ''in your sin.'' Some translations render ''in your sins,'' but the singular likely emphasizes a continuing condition rather than individual acts.'
    reason: lexical_alternative
  - marker: c
    text: Or 'you cannot come.'
    reason: lexical_alternative
