translation:
  language: es
  text: 'Entonces les dijo de nuevo[a]: «Yo me voy, y me buscarán, y morirán en su pecado[b]. Adonde yo me voy, ustedes no pueden venir[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «otra vez». El adverbio puede indicar repetición del habla; aquí se mantiene «de nuevo» como equivalente natural.
    reason: lexical_alternative
  - marker: b
    text: 'Griego en singular: «en su pecado». Algunas traducciones vierten «en sus pecados», pero el singular probablemente subraya una condición continua más que actos individuales.'
    reason: lexical_alternative
  - marker: c
    text: O «ustedes no pueden llegar».
    reason: lexical_alternative
lexical_decisions:
- source_word: Εἶπεν οὖν πάλιν
  english_pob_choice: So he said to them again
  chosen_spanish: Entonces les dijo de nuevo
  alternatives_spanish:
  - Y les dijo otra vez
  - Así que les dijo de nuevo
  lexicon: BDAG
  rationale: οὖν marca continuidad discursiva; en español, «entonces» y «de nuevo» conservan la relación con la escena anterior y la repetición sin sonar rígidos.
- source_word: ὑπάγω
  english_pob_choice: am going away
  chosen_spanish: me voy
  alternatives_spanish:
  - voy
  - me aparto
  - me voy de aquí
  lexicon: BDAG
  rationale: El verbo en Juan suele implicar partida, no solo desplazamiento. «Me voy» mantiene la idea de salida/departida con naturalidad en español y sin añadir destino explícito.
- source_word: ζητήσετέ με
  english_pob_choice: you will seek me
  chosen_spanish: me buscarán
  alternatives_spanish:
  - me buscarán afanosamente
  - me buscarán
  - me buscarán y no me hallarán
  lexicon: BDAG
  rationale: ζητέω puede ser «buscar» o «buscar con intención». «Me buscarán» es la opción más directa y natural; deja abierta la posibilidad de una resonancia espiritual sin explicitarla en el texto.
- source_word: ἐν τῇ ἁμαρτίᾳ ὑμῶν
  english_pob_choice: in your sin
  chosen_spanish: en su pecado
  alternatives_spanish:
  - en su pecado
  - en sus pecados
  - en el pecado de ustedes
  lexicon: BDAG
  rationale: 'Se preserva el singular griego ἁμαρτίᾳ como «pecado», no «pecados», para mantener la tensión textual señalada por la POB inglesa: un estado continuo, no solo actos aislados. Se evita «en sus pecados» por no seguir el singular del original.'
- source_word: ἀποθανεῖσθε
  english_pob_choice: you will die
  chosen_spanish: morirán
  alternatives_spanish:
  - van a morir
  - morirán
  lexicon: BDAG
  rationale: Futuro simple en español reproduce bien el futuro de la advertencia. No se añade matiz interpretativo sobre el tipo de muerte, porque el griego no lo especifica aquí.
- source_word: ὅπου ἐγὼ ὑπάγω
  english_pob_choice: Where I am going
  chosen_spanish: Donde yo voy
  alternatives_spanish:
  - Donde yo estoy yendo
  - Donde yo me voy
  - A donde yo voy
  lexicon: BDAG
  rationale: «Donde yo voy» conserva el valor locativo de ὅπου y la repetición de ὑπάγω sin sobrecargar la frase. «A donde» sería posible, pero «Donde» sigue mejor la forma del pasaje y su cadencia.
- source_word: οὐ δύνασθε ἐλθεῖν
  english_pob_choice: you are not able to come
  chosen_spanish: ustedes no pueden ir
  alternatives_spanish:
  - ustedes no pueden venir
  - ustedes no están en capacidad de ir
  - ustedes no pueden llegar
  lexicon: BDAG
  rationale: δύνασθε expresa capacidad/incapacidad; «no pueden» la conserva de forma natural. «Ir» sigue mejor el verbo de movimiento del contexto inmediato que «venir», ya que Jesús habla de su propio lugar de destino.
theological_decisions:
- issue: Singular ἁμαρτίᾳ y su fuerza en Juan
  english_pob_reading: Rendered as 'in your sin' in the main text
  chosen_spanish_reading: en su pecado
  alternative_spanish_readings:
  - en sus pecados
  rationale: El singular se conserva deliberadamente para no diluir la formulación del texto. En el contexto joánico, puede apuntar a una condición persistente de pecado/incredulidad, no solo a transgresiones múltiples. La redacción española mantiene esa tensión sin explicarla de más en el texto principal.
  doctrine_reference: 'Translation philosophy #3, #5'
- issue: Sentido de ὑπάγω en el discurso de Jesús
  english_pob_reading: Rendered as 'I am going away'
  chosen_spanish_reading: me voy
  alternative_spanish_readings:
  - me estoy yendo
  - me aparto
  - me voy de aquí
  rationale: En Juan, el ‘ir’ de Jesús suele tener carga teológica de partida/retorno. «Me voy» es suficientemente abierto para incluir esa profundidad sin anticiparla innecesariamente en la traducción principal.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve theological tension'
translation_notes:
  revision_awareness: 'La revisión más reciente no propuso cambios: el pasaje quedó con alto acuerdo y sin modificaciones aplicadas. Se mantuvo la tensión del singular ἁμαρτίᾳ y del valor de ὑπάγω conforme al expediente auditado.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma general del proyecto, aunque este versículo no lo contiene.
  - Se usa «pecado» en singular para reflejar el griego ἁμαρτίᾳ y la lectura auditada de la POB inglesa.
  - Se mantiene un registro moderno y reverente, evitando arcaísmos innecesarios.
  - La cita directa usa comillas angulares de estilo español.
  - «No pueden ir» se eligió para guardar la idea de incapacidad sin hacer más explícito el destino.
