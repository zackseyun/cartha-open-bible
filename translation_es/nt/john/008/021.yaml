revisions:
- from: 'Entonces les dijo de nuevo[a]: «Yo me voy, y me buscarán, y morirán en su pecado[b]. Donde yo voy[c], ustedes no pueden ir».'
  to: 'Entonces les dijo de nuevo[a]: «Yo me voy, y me buscarán, y morirán en su pecado[b]. Adonde yo me voy, ustedes no pueden venir[c]».'
  rationale: 'La revisión conserva los aciertos del borrador, especialmente el singular «pecado», pero corrige dos puntos para alinearse mejor con el griego y con el audit trail inglés: (1) se refuerza la idea de partida en la segunda ocurrencia de ὑπάγω con «Adonde yo me voy»; y (2) se restituye ἐλθεῖν como «venir» en vez de «ir». También se ajusta la nota c para que corresponda a una alternativa real de la cláusula final, no al adverbio locativo.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:04:22Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del griego y preserva adecuadamente varios puntos clave: la repetición («de nuevo»), el futuro de advertencia, y el singular de «pecado». Sin embargo, no refleja del todo la fuerza de ὑπάγω en ambas ocurrencias. En la primera cláusula, «me voy» es aceptable, pero en la segunda «Donde yo voy» debilita la repetición del matiz de partida presente en el audit trail inglés («Where I am going» con nota sobre ὑπάγω). Además, «no pueden ir» no es la mejor correspondencia para ἐλθεῖν aquí; «venir»/«llegar» encaja mejor con el verbo griego y con la formulación española más natural del dicho.'
  spanish_quality_summary: El español es generalmente claro y natural, pero «Donde yo voy, ustedes no pueden ir» suena algo áspero y menos idiomático que «Adonde yo me voy, ustedes no pueden venir» o «Adonde yo voy, ustedes no pueden venir». También conviene ajustar la nota c, ya que la alternativa actual («a donde yo voy») no corresponde al contraste relevante del inglés POB, que nota la alternativa sobre la cláusula final («you cannot come»), no sobre el adverbio locativo.
  glossary_alignment: 'No hay términos del glosario maestro especialmente controvertidos en este versículo. «Pecado» en singular está bien alineado con la decisión teológica documentada. No aparecen Yahvé, Mesías/Cristo, Espíritu, etc. La principal cuestión léxica es ὑπάγω/ἐλθεῖν: conviene mantener «me voy» para la partida de Jesús y «venir» para ἐλθεῖν, preservando mejor la distinción verbal del original.'
  issues:
  - severity: medium
    issue: La segunda ocurrencia de ὑπάγω quedó como «Donde yo voy».
    rationale: Aunque no es imposible, «voy» pierde parte del matiz de partida que el audit trail procura mantener con «am going away». En español, «adonde yo me voy» o «adonde yo voy» con mejor ajuste del resto de la frase comunica mejor el movimiento de salida.
  - severity: medium
    issue: ἐλθεῖν fue traducido como «ir» en lugar de «venir».
    rationale: El griego usa ἔρχομαι («venir/llegar»), no un verbo de ‘ir’. El inglés POB preserva esto con «come». En español, «no pueden venir» mantiene mejor la correspondencia léxica y suena más natural en el dicho completo.
  - severity: low
    issue: La nota c no refleja la alternativa relevante del audit trail inglés.
    rationale: La nota inglesa c corresponde a «you cannot come», es decir, a la cláusula de capacidad, no a una alternativa de «donde/adonde». La nota española debe alinearse con esa decisión o eliminarse si no se necesita.
  revised_spanish_text: 'Entonces les dijo de nuevo[a]: «Yo me voy, y me buscarán, y morirán en su pecado[b]. Adonde yo me voy, ustedes no pueden venir[c]».'
