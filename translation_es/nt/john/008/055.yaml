  text: καὶ οὐκ ἐγνώκατε αὐτόν, ἐγὼ δὲ οἶδα αὐτόν· κἂν εἴπω ὅτι οὐκ οἶδα αὐτόν, ἔσομαι ὅμοιος ⸀ὑμῖν ψεύστης· ἀλλὰ οἶδα αὐτὸν καὶ τὸν λόγον αὐτοῦ τηρῶ.
base_translation:
  language: en
  yaml_path: translation/nt/john/008/055.yaml
  text: Yet you have not known him[a], but I know him. If I were to say that I do not know him, I would be a liar like you. But I do know him[c][b], and I keep his word.
  footnotes:
  - marker: a
    text: Or 'you do not know him.' The Greek verb ἐγνώκατε is perfect in form, which may be rendered to emphasize their continuing lack of true knowledge.
    reason: lexical_alternative
  - marker: b
    text: Or 'If I say.' The Greek construction is hypothetical; 'If I were to say' brings out the sense in natural English.
    reason: lexical_alternative
  - marker: c
    text: '''Keep'' may also be rendered ''obey'' or ''observe''; in John, the verb often carries the sense of faithfully keeping or guarding God''s word.'
    reason: lexical_alternative
