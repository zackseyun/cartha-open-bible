revisions:
- from: Sin embargo, ustedes no han conocido[a] a él, pero yo lo conozco. Si yo dijera[b] que no lo conozco, sería un mentiroso como ustedes. Pero sí lo conozco, y guardo[c] su palabra.
  to: Pero ustedes no lo han conocido[a], y yo sí lo conozco. Si yo dijera[b] que no lo conozco, sería un mentiroso como ustedes. Pero sí lo conozco, y guardo[c] su palabra.
  rationale: Se corrige el complemento pronominal de «conocer» para lograr un español fiel y natural («lo», no «a él»), incluyendo la nota lexical alternativa. También se alisa levemente el arranque del verso para evitar una estructura contrastiva innecesariamente pesada, sin alterar el sentido ni las decisiones léxicas de la POB inglesa.
