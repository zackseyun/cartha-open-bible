translation:
  language: es
  text: Pero ustedes no lo han conocido[a], y yo sí lo conozco. Si yo dijera[b] que no lo conozco, sería un mentiroso como ustedes. Pero sí lo conozco, y guardo[c] su palabra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ustedes no lo conocen». El verbo ἐγνώκατε está en perfecto de forma; puede traducirse para subrayar la falta continua de verdadero conocimiento.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Si digo». La construcción griega es hipotética; «Si yo dijera» expresa con naturalidad ese sentido en español.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «observo» o «obedezco». En Juan, τηρέω suele implicar guardar fielmente, custodiar o cumplir la palabra de Dios.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγνώκατε
  english_pob_choice: have not known
  chosen_spanish: no han conocido
  alternatives_spanish:
  - no conocen
  - no han llegado a conocer
  lexicon: BDAG
  rationale: El perfecto griego expresa un estado presente resultante; en español, «no han conocido» conserva esa idea de falta persistente de conocimiento verdadero sin sonar forzado. «No conocen» es posible, pero atenúa la fuerza aspectual que la POB inglesa quiso preservar.
- source_word: οἶδα
  english_pob_choice: know
  chosen_spanish: conozco
  alternatives_spanish:
  - sé
  - he conocido
  lexicon: BDAG
  rationale: οἶδα funciona como verbo de estado en presente. «Conozco» transmite de manera natural ese valor actual y relacional en español. «Sé» sería correcto, pero aquí el complemento personal favorece «conocer».
- source_word: κἂν εἴπω
  english_pob_choice: If I were to say
  chosen_spanish: Si yo dijera
  alternatives_spanish:
  - si digo
  - aun si dijera
  lexicon: BDAG
  rationale: La construcción presenta una hipótesis contraria a la realidad o retórica. «Si yo dijera» reproduce mejor ese matiz que un simple presente español, manteniendo la fuerza condicional sin sobreexplicar.
- source_word: ἔσομαι
  english_pob_choice: I would be
  chosen_spanish: sería
  alternatives_spanish:
  - voy a ser
  - seré
  lexicon: BDAG
  rationale: Aunque el griego usa futuro, el contexto condicional pide en español el valor de consecuencia hipotética. «Sería» expresa de forma idiomática la relación lógica del enunciado.
- source_word: ὅμοιος ὑμῖν
  english_pob_choice: like you
  chosen_spanish: como ustedes
  alternatives_spanish:
  - igual que ustedes
  - parecido a ustedes
  lexicon: BDAG
  rationale: El comparativo directo se expresa naturalmente con «como ustedes». Se prefiere «ustedes» para claridad y tono inmediato en español latinoamericano.
- source_word: ψεύστης
  english_pob_choice: a liar
  chosen_spanish: un mentiroso
  alternatives_spanish:
  - un falso
  - uno que miente
  lexicon: BDAG
  rationale: El sustantivo denota a quien miente; «mentiroso» preserva la fuerza nominal y el filo acusatorio del pasaje.
- source_word: τὸν λόγον αὐτοῦ
  english_pob_choice: his word
  chosen_spanish: su palabra
  alternatives_spanish:
  - su mensaje
  - lo que él dice
  lexicon: BDAG
  rationale: En Juan, λόγος puede referirse a la palabra revelada de Dios. «Su palabra» mantiene la dicción joánica y la amplitud semántica entre palabra dicha y mensaje revelado.
- source_word: τηρῶ
  english_pob_choice: I keep
  chosen_spanish: guardo
  alternatives_spanish:
  - obedezco
  - observo
  - mantengo
  lexicon: BDAG
  rationale: En contexto joánico, τηρέω combina guardar, observar y custodiar fielmente. «Guardo» conserva esa amplitud mejor que «obedezco», que estrecharía el sentido a mera sumisión normativa.
theological_decisions:
- issue: Contraste entre el desconocimiento de los interlocutores y el conocimiento real de Jesús
  english_pob_reading: Render the statement straightforwardly as a claim of true knowledge and obedience without adding explanatory theological language.
  chosen_spanish_reading: 'Presentar el contraste de manera directa: ellos no han conocido a Dios, mientras Jesús sí lo conoce y guarda su palabra.'
  alternative_spanish_readings:
  - ustedes no conocen a Dios
  - ustedes no han llegado a conocerlo
  - yo tengo una relación especial con él
  rationale: El versículo formula una oposición tajante que debe quedar visible en español. Se evita suavizar la acusación o añadir explicaciones doctrinales que no están en el texto, pero también se evita diluir el contraste mediante una paráfrasis genérica.
  doctrine_reference: Affirmations; Translation philosophy items 1 and 3
- issue: Valor de τηρῶ en relación con la fidelidad a la palabra divina
  english_pob_reading: ‘Keep’ may also be rendered ‘obey’ or ‘observe’; in John, the verb often carries the sense of faithfully keeping or guarding God’s word.
  chosen_spanish_reading: «Guardo» como fidelidad activa y cuidadosa a su palabra.
  alternative_spanish_readings:
  - obedezco su palabra
  - observo su palabra
  - custodio su palabra
  rationale: «Guardo» deja abierta la gama joánica de fidelidad, observancia y custodia, sin reducir el término a obediencia legalista ni perder su matiz relacional.
  doctrine_reference: Johnine usage; lexical note on τηρέω
translation_notes:
  revision_awareness: Se revisó el ajuste del perfecto griego ἐγνώκατε hacia una forma española que preserve estado resultante; también se mantuvo la tensión lexical de τηρέω con una nota alternativa, en continuidad con el audit trail inglés y sin añadir glosas doctrinales externas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» según la convención del proyecto cuando aparezca el nombre divino; en este versículo el referente se expresa mediante «Dios» implícito en el contexto joánico y no requiere inserción del Tetragrámaton.
  - Se usa «ustedes» para el plural directo, coherente con español neutro latinoamericano.
  - Se conserva la distinción entre conocimiento relacional («conozco») y mera información.
  - La puntuación reproduce la estructura contrastiva de la frase griega con comas y punto y coma implícito en el ritmo español.
