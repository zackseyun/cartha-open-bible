  - severity: medium
    issue: «sentándose» no representa tan bien el valor previo de καθίσας.
    rationale: El participio aoristo señala una acción antecedente a la enseñanza. En español, «sentándose» puede sonar simultáneo; «se sentó» comunica mejor la secuencia narrativa.
  - severity: low
    issue: «iba hacia él» es menos idiomático que una expresión de acercamiento continuo.
    rationale: ἤρχετο πρὸς αὐτόν expresa que la gente seguía viniendo/acudiendo a él. «Todo el pueblo acudía a él» suena más natural y directo en español.
  - severity: low
    issue: «A la aurora» es correcto pero menos natural que «Al amanecer».
    rationale: Ambas opciones son fieles a Ὄρθρου, pero «Al amanecer» tiene mejor naturalidad en español contemporáneo general sin perder dignidad.
