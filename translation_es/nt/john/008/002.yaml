translation:
  language: es
  text: Al amanecer[a] volvió al templo, y todo el pueblo acudía a él; y se sentó y comenzó a enseñarles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Este versículo continúa el relato de la mujer sorprendida en adulterio (Juan 7:53–8:11), que está ausente en los manuscritos griegos más antiguos. Véase la nota sobre Juan 7:53.
    reason: textual_critical
lexical_decisions:
- source_word: Ὄρθρου
  english_pob_choice: At dawn
  chosen_spanish: A la aurora
  alternatives_spanish:
  - Al amanecer
  - Al alba
  - Al rayar el día
  lexicon: BDAG
  rationale: Ὄρθρου indica una hora temprana del día, cercana al amanecer. «A la aurora» conserva ese valor temporal con un registro natural y digno en español, sin forzar una perífrasis más explicativa que el griego no exige.
- source_word: παρεγένετο
  english_pob_choice: he came
  chosen_spanish: volvió
  alternatives_spanish:
  - vino
  - llegó
  - se presentó
  lexicon: BDAG
  rationale: El contexto ya ha situado a Jesús en el templo; por eso, en español «volvió» comunica bien la idea de regresar al lugar. El verbo griego puede expresar llegada o aparición en un sitio, y aquí el matiz de retorno es compatible con el relato inmediato.
- source_word: ἱερόν
  english_pob_choice: temple
  chosen_spanish: templo
  alternatives_spanish:
  - patio del templo
  - recinto del templo
  - atrio del templo
  lexicon: BDAG
  rationale: ἱερόν designa el complejo del templo, no solo el santuario interior. «Templo» es la forma más directa y transparente en español; el contexto narrativo mantiene la idea del espacio público donde enseñaba.
- source_word: καθίσας
  english_pob_choice: he sat down
  chosen_spanish: sentándose
  alternatives_spanish:
  - se sentó
  - habiéndose sentado
  - tomó asiento
  lexicon: BDAG
  rationale: El participio aoristo antecede a la acción principal. En español, «sentándose» conserva esa secuencia previa y refleja de modo natural la postura tradicional del maestro judío al enseñar.
- source_word: ἐδίδασκεν
  english_pob_choice: began to teach
  chosen_spanish: les enseñaba
  alternatives_spanish:
  - comenzó a enseñarles
  - estaba enseñándoles
  - les enseñó
  lexicon: BDAG
  rationale: El imperfecto puede expresar acción en desarrollo; el inglés POB optó por un matiz incoativo («began to teach»). En español, «les enseñaba» mantiene la acción durativa sin añadir un inicio explícito que el griego no obliga a marcar en esta forma.
theological_decisions:
- issue: Continuación del relato de la mujer sorprendida en adulterio (Jn 7:53–8:11) y su ausencia en los manuscritos griegos más antiguos
  english_pob_reading: This verse is a continuation of the story of the woman caught in adultery (John 7:53–8:11), which is absent from the earliest Greek manuscripts. See note on John 7:53.
  chosen_spanish_reading: Esta nota textual se conserva como observación histórica, sin incorporarla al cuerpo del versículo.
  alternative_spanish_readings:
  - No incluir ninguna nota
  - Trasladar la nota a una nota al pie en español
  rationale: La decisión inglesa es textual-crítica, no exegética. Como esta entrega es solo del versículo 8:2 y no incluye el aparato completo, se conserva la traducción del texto recibido sin añadir una nota anclada que no esté respaldada por una marca presente en el versículo.
  doctrine_reference: Texto crítico y transmisión del Nuevo Testamento
translation_notes:
  revision_awareness: La revisión inglesa eliminó una marca espuria de nota al pie al inicio de la frase («At[a] dawn» → «At dawn»). En español se evita introducir cualquier marcador no anclado en el texto, y no se agrega nota textual independiente porque no hay un ancla disponible dentro del versículo proporcionado.
  spanish_consistency_notes:
  - Se mantiene «templo» para ἱερόν, en continuidad con el uso auditado del inglés POB.
  - Se evita «Cristo» y cualquier terminología no presente en el verso.
  - 'El orden español sigue la progresión temporal del griego: momento del día, llegada, reacción del pueblo, sentarse, enseñar.'
  - «Les enseñaba» conserva el imperfecto sin sobreinterpretar el aspecto con un inicio explícito.
