    rationale: Aunque intenta reflejar ‘convicted’, en español ‘convicto’ se asocia fuertemente con una condena penal ya establecida. Aquí el sentido es de acusación o convicción interior de culpa por la conciencia.
  - severity: low
    issue: ‘comenzando desde los más ancianos’ suena innecesariamente forzado
    rationale: En español secuencial, ‘comenzando por los más ancianos’ es más natural y fiel al sentido de ἀρξάμενοι ἀπό.
  - severity: low
    issue: 'Orden final algo trabado: ‘Y Jesús quedó solo, y la mujer en medio, de pie’'
    rationale: La frase griega puede representarse con mejor fluidez en español como ‘con la mujer de pie en medio’, sin pérdida semántica.
