revisions:
- from: Pero los que lo oyeron, convictos por su conciencia, salían uno por uno, comenzando desde los más ancianos hasta el último. Y Jesús quedó solo, y la mujer en medio, de pie.[a]
  to: Pero los que lo oyeron, convencidos de culpa por su conciencia, salían uno por uno, comenzando por los más ancianos hasta el último. Y Jesús quedó solo, con la mujer de pie en medio.[a]
  rationale: Se revisa para mejorar la naturalidad y precisión del español sin apartarse del griego ni del razonamiento del POB inglés. ‘Convencidos de culpa por su conciencia’ conserva la fuerza moral interna de ἐλεγχόμενοι ὑπὸ τῆς συνειδήσεως mejor que ‘convictos’. ‘Comenzando por’ y ‘con la mujer de pie en medio’ son formulaciones más idiomáticas y fieles al flujo del versículo.
