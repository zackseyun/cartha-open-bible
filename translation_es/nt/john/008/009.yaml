translation:
  language: es
  text: Pero los que lo oyeron, convencidos de culpa por su conciencia, salían uno por uno, comenzando por los más ancianos hasta el último. Y Jesús quedó solo, con la mujer de pie en medio.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Continuación de la perícopa de la mujer sorprendida en adulterio (Juan 7:53–8:11). Véase la nota en Juan 7:53.
    reason: textual_variant
lexical_decisions:
- source_word: συνείδησις
  english_pob_choice: conscience
  chosen_spanish: conciencia
  alternatives_spanish:
  - consciencia
  - fuero interno
  lexicon: BDAG
  rationale: ‘Conciencia’ es el equivalente español más natural y fiel para la facultad moral interna que acusa o aprueba. ‘Consciencia’ es posible en algunos registros, pero ‘conciencia’ es la forma más extendida en español bíblico y contemporáneo. ‘Fuero interno’ explicita la dimensión moral, pero añade interpretación.
- source_word: ἐλέγχω
  english_pob_choice: convicted
  chosen_spanish: convictos
  alternatives_spanish:
  - reprochados
  - reprendidos
  - convencidos de culpa
  lexicon: BDAG
  rationale: Aquí el verbo expresa que, al oír, quedaron internamente acusados o sentenciados por su propia conciencia. ‘Convictos’ conserva la fuerza moral-judicial del inglés POB ‘convicted’ sin diluirla en una simple reprensión.
- source_word: πρεσβύτερος
  english_pob_choice: older ones
  chosen_spanish: los más ancianos
  alternatives_spanish:
  - los mayores
  - los ancianos
  lexicon: BDAG
  rationale: El contexto de una salida en secuencia desde los primeros hasta los últimos muestra contraste de edad o antigüedad, no un cargo eclesial. ‘Los más ancianos’ mantiene esa lectura de edad/seniority; ‘los ancianos’ podría sonar a oficio.
- source_word: ἕως τῶν ἐσχάτων
  english_pob_choice: down to the last
  chosen_spanish: hasta el último
  alternatives_spanish:
  - hasta los últimos
  - hasta el final
  lexicon: BDAG
  rationale: ‘Hasta el último’ reproduce el valor progresivo de la lista y la revisión inglesa que prefirió una formulación idiomática en vez de un ‘hasta’ meramente temporal. ‘Hasta el final’ sería menos preciso porque sugiere un cierre temporal más que una secuencia de personas.
- source_word: ἐν μέσῳ ἑστῶσα
  english_pob_choice: standing in the midst
  chosen_spanish: en medio, de pie
  alternatives_spanish:
  - de pie en medio
  - plantada en medio
  lexicon: BDAG
  rationale: La expresión griega presenta literalmente a la mujer ‘estando de pie en medio’. En español, ‘en medio, de pie’ conserva tanto la ubicación como la postura sin sonar forzado.
theological_decisions:
- issue: Estado del texto y continuidad de la perícopa adulterae
  english_pob_reading: Continuation of the pericope adulterae (John 7:53–8:11).
  chosen_spanish_reading: Continuación de la perícopa de la mujer sorprendida en adulterio (Juan 7:53–8:11).
  alternative_spanish_readings:
  - Pasaje no atestiguado en los manuscritos más antiguos
  - Texto de autenticidad discutida
  rationale: La nota textual debe reflejar que el pasaje se traduce como parte de una unidad tradicional, pero con advertencia crítica. En español conviene expresar la continuidad de la perícopa sin sobretraducirla ni ocultar la cuestión textual.
  doctrine_reference: Crítica textual del Nuevo Testamento; tradición manuscrita de Juan 7:53–8:11
translation_notes:
  revision_awareness: 'Se siguió la revisión inglesa más reciente que hizo más idiomática la secuencia temporal/ordinal de personas, optando en español por una progresión natural: ‘comenzando desde los más ancianos hasta el último’. No se adoptó ninguna lectura que suavice ‘convictos’ ni se cambió la referencia a la conciencia, porque ambas tienen respaldo directo en el griego y en el audit trail inglés.'
  spanish_consistency_notes:
  - Se preservó la distinción entre conciencia moral interna y mera opinión externa.
  - Se evitó ‘ancianos’ como título eclesial para no introducir una lectura no sustentada por el contexto.
  - La nota textual se ancló al final del versículo porque la continuidad de la perícopa afecta al conjunto del pasaje.
