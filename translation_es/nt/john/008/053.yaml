    issue: La frase «¿Quién dices que eres tú?» añade un verbo de habla no presente en el griego.
    rationale: τίνα σεαυτὸν ποιεῖς expresa hacerse o presentarse como alguien, no explícitamente decir. La traducción actual deriva hacia una interpretación posible, pero pierde el vínculo léxico e idiomático documentado por el POB.
  - severity: low
