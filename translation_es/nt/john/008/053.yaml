  source_alignment_summary: 'La mayor parte del versículo está bien alineada con el griego y con el rastro de auditoría inglés: «¿Acaso eres tú mayor que nuestro padre Abraham, que murió?» transmite correctamente la pregunta retórica con expectativa negativa; «Los profetas también murieron» preserva bien el paralelismo. Sin embargo, «¿Quién dices que eres tú?» no refleja con suficiente precisión τίνα σεαυτὸν ποιεῖς, que no significa literalmente «dices», sino «hacerte/presentarte como».'
  spanish_quality_summary: El borrador es claro y natural en español. No obstante, la última pregunta suaviza y desplaza el matiz acusatorio del original hacia un verbo de habla explícito («dices») que no está en el texto griego. Una formulación como «¿Quién te crees que eres?» sería demasiado coloquial; «¿Quién pretendes ser?» introduce otro matiz. La mejor reparación, manteniendo dignidad y legibilidad, es «¿Quién te haces pasar por?» o «¿Quién te haces ser?». Para español bíblico legible, «¿Quién te haces pasar por?» comunica bien la acusación de autopresentación identitaria.
  glossary_alignment: No hay conflictos con la terminología base del proyecto en este versículo. Los términos clave no implican Yahvé/Mesías/etc. «Mayor», «nuestro padre Abraham», y «profetas» están bien. El único ajuste necesario es una mejor representación idiomática de τίνα σεαυτὸν ποιεῖς.
  issues:
