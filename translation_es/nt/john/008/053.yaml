translation:
  language: es
  text: ¿Acaso eres tú mayor que nuestro padre Abraham[a], que murió? Los profetas también murieron. ¿Quién te haces pasar por?[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿No eres tú mayor que nuestro padre Abraham…?». El griego formula la pregunta esperando una respuesta negativa.'
    reason: lexical_alternative
  - marker: b
    text: 'O, más literalmente: «¿A quién te haces?». La expresión significa «¿quién te haces pasar por?» o «¿quién afirmas ser?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ σὺ
  english_pob_choice: Surely you are not
  chosen_spanish: ¿Acaso eres tú
  alternatives_spanish:
  - ¿No eres tú
  - ¿Acaso no eres tú
  - Seguro que no eres tú
  lexicon: μή + σύ en pregunta retórica
  rationale: En español, la combinación «¿acaso…?» conserva el matiz de pregunta que espera una respuesta negativa y mantiene el tono de desafío. Se evita una afirmación plana para no perder la fuerza interrogativa del griego.
- source_word: μείζων
  english_pob_choice: greater
  chosen_spanish: mayor
  alternatives_spanish:
  - más grande
  - superior
  - más importante
  lexicon: comparativo de μέγας
  rationale: «Mayor» es natural en español para comparar estatus o rango. «Más grande» suena más físico, y «superior» interpreta demasiado; por eso se prefiere el comparativo amplio y neutral.
- source_word: τοῦ πατρὸς ἡμῶν Ἀβραάμ
  english_pob_choice: than our father Abraham
  chosen_spanish: que nuestro padre Abraham
  alternatives_spanish:
  - que Abraham, nuestro padre
  - que Abraham
  lexicon: genitivo comparativo + πατήρ
  rationale: El comparativo griego se expresa naturalmente con «que» en español. «Nuestro padre Abraham» preserva el valor honorífico y ancestral de πατήρ sin convertirlo en una fórmula eclesiástica ajena al contexto judío.
- source_word: ὅστις ἀπέθανεν
  english_pob_choice: who died
  chosen_spanish: que murió
  alternatives_spanish:
  - quien murió
  - que ha muerto
  lexicon: pronombre relativo + aoristo de ἀποθνῄσκω
  rationale: «Que murió» sigue de cerca el hecho histórico del aoristo sin añadir un aspecto de relevancia presente que el griego no exige. «Quien» sería posible, pero «que» resulta más natural en español corriente.
- source_word: καὶ οἱ προφῆται ἀπέθανον
  english_pob_choice: The prophets also died
  chosen_spanish: Los profetas también murieron
  alternatives_spanish:
  - Y los profetas murieron también
  - Los profetas asimismo murieron
  lexicon: καί + οἱ προφῆται + ἀπέθανον
  rationale: Se mantiene el paralelismo con Abraham y la muerte de los profetas. «También» conserva la función aditiva de καί sin sobrecargar el orden español.
- source_word: τίνα σεαυτὸν ποιεῖς
  english_pob_choice: Who do you make yourself out to be?
  chosen_spanish: ¿Quién dices que eres tú?
  alternatives_spanish:
  - ¿A quién te haces tú?
  - ¿Quién te haces tú?
  - ¿Quién pretendes ser?
  lexicon: τίνα + σεαυτὸν + ποιεῖς
  rationale: 'La expresión griega es idiomática y acusa una auto-presentación identitaria. «¿Quién dices que eres tú?» comunica el sentido de reivindicación de identidad con dignidad y claridad en español, sin forzar una construcción antinatural como «te haces». '
theological_decisions:
- issue: Pregunta retórica con expectativa negativa
  english_pob_reading: The Greek question is framed to expect a negative answer.
  chosen_spanish_reading: «¿Acaso eres tú mayor…?» conserva la expectativa de respuesta negativa sin suavizar el desafío.
  alternative_spanish_readings:
  - «¿No eres tú mayor…?»
  - «¿Eres tú mayor…?»
  rationale: μή con σύ funciona como interrogación que presupone una negación. El español con «acaso» transmite mejor esa presión retórica que una simple oración declarativa, y evita resolver el conflicto a favor o en contra de Jesús.
  doctrine_reference: Preservar la tensión teológica sin resolverla en la traducción.
- issue: Autoidentificación acusada por los interlocutores
  english_pob_reading: Or 'Who do you make yourself?' The expression means 'Who do you make yourself out to be?' or 'Who are you claiming to be?'
  chosen_spanish_reading: «¿Quién dices que eres tú?» conserva la acusación de una identidad reclamada o presentada por Jesús.
  alternative_spanish_readings:
  - «¿Quién pretendes ser?»
  - «¿Quién te haces?»
  - «¿Quién dices ser?»
  rationale: El griego no es una mera pregunta neutra, sino una impugnación de identidad. La versión elegida evita calcar la construcción idiomática inglesa y mantiene la tensión sin introducir una explicación doctrinal o una paráfrasis excesiva.
  doctrine_reference: Mantener el matiz de impugnación identitaria del pasaje.
translation_notes:
  revision_awareness: 'Coincide sustancialmente con el control de alta concordancia: se preserva la pregunta retórica, el paralelismo Abraham/profetas y el cierre idiomático sobre la identidad reclamada. No se registraron revisiones aplicadas en el audit trail más reciente.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando corresponda a יהוה; este versículo no lo contiene.
  - Se evitó «Cristo/Mesías» porque no aparece en el texto.
  - «Mayor» y «murió/murieron» mantienen un registro sobrio y bíblico, compatible con el estilo POB en español.
  - La frase final se optó por una equivalencia óptima para no perder el sentido idiomático de τίνα σεαυτὸν ποιεῖς.
