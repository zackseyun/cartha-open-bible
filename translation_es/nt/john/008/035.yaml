translation:
  language: es
  text: Ahora el esclavo no permanece en la casa para siempre[a]; el hijo permanece para siempre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘sirviente’; δοῦλος puede significar también ‘siervo’, pero ‘esclavo’ preserva mejor el contraste de estatus dentro de la casa.
    reason: lexical_alternative
  - marker: b
    text: ‘El hijo’ puede también tener una referencia implícita a Jesús en el contexto circundante, aunque la redacción aquí también tiene tono proverbial.
    reason: theological_note
lexical_decisions:
- source_word: δοῦλος
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - criado
  lexicon: BDAG
  rationale: ‘Esclavo’ preserva mejor el contraste de estatus con ‘hijo’ y la idea de pertenencia no permanente en la casa. ‘Siervo’ suavizaría la fuerza lexical de δοῦλος y perdería parte del peso social del pasaje.
- source_word: μένει
  english_pob_choice: remain
  chosen_spanish: permanece
  alternatives_spanish:
  - se queda
  - habita
  - permanece
  lexicon: BDAG
  rationale: ‘Permanece’ reproduce bien la repetición del verbo y expresa continuidad de estado sin introducir matices ajenos.
- source_word: οἰκίᾳ
  english_pob_choice: house
  chosen_spanish: casa
  alternatives_spanish:
  - hogar
  - casa
  lexicon: BDAG
  rationale: ‘Casa’ es la correspondencia más directa y natural en español. ‘Hogar’ añadiría una carga afectiva no exigida por el griego.
- source_word: εἰς τὸν αἰῶνα
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  lexicon: BDAG
  rationale: ‘Para siempre’ es la forma idiomática y clara en español para expresar duración indefinida y permanente.
- source_word: υἱός
  english_pob_choice: son
  chosen_spanish: hijo
  alternatives_spanish:
  - hijo
  - el Hijo
  lexicon: BDAG
  rationale: ‘Hijo’ conserva el término griego y deja abierta la tensión entre una lectura proverbial y una posible referencia cristológica, sin resolverla de antemano.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Pero
  - Ahora
  lexicon: BDAG
  rationale: ‘Ahora’ funciona como marcador discursivo natural en español y mantiene el avance del argumento sin forzar una adversación explícita.
theological_decisions:
- issue: Posible resonancia cristológica de ‘el hijo’
  english_pob_reading: Retained the generic yet pointed expression 'the son' without capitalizing it.
  chosen_spanish_reading: Conservar ‘el hijo’ sin mayúscula inicial.
  alternative_spanish_readings:
  - el Hijo
  rationale: En este versículo la expresión funciona de modo proverbial dentro de una comparación doméstica, aunque también prepara el desarrollo cristológico inmediato. Mantener minúscula preserva la tensión sin anticipar una identificación explícita que el propio versículo no formula de manera inequívoca.
  doctrine_reference: Preservar la tensión teológica sin resolverla prematuramente.
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés en sus decisiones clave: δοῦλος como ‘slave/esclavo’, μένει como ‘remain/permanece’, οἰκίᾳ como ‘house/casa’, εἰς τὸν αἰῶνα como ‘forever/para siempre’, y υἱός como ‘son/hijo’. La revisión inglesa que cambió ''household'' por ''house'' se reflejó en ‘casa’, no en ‘hogar’ o ‘familia’.'
  spanish_consistency_notes:
  - Se mantuvo el paralelismo léxico entre las dos cláusulas con ‘permanece’ en ambos casos.
  - Se evitó ‘abide’/‘abide’ por no ser natural en español contemporáneo.
  - Se preservó la ambigüedad controlada de ‘el hijo’ sin capitalizarla.
  - El registro es moderno pero digno, apto para lectura eclesial amplia.
