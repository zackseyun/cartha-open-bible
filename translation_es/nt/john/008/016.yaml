translation:
  language: es
  text: Pero aun si yo juzgo[a], mi juicio es verdadero, porque no estoy solo, sino que estamos yo y el Padre que me envió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «si juzgo» o «si llegara a juzgar». La construcción griega puede traducirse de manera más formal, pero aquí probablemente tiene un matiz concesivo: «aun si yo juzgo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν κρίνω
  english_pob_choice: even if I do judge
  chosen_spanish: aun si yo juzgo
  alternatives_spanish:
  - si juzgo
  - si llegara a juzgar
  lexicon: BDAG
  rationale: ἐὰν con presente de subjuntivo expresa una condición potencial; en este contexto el matiz concesivo queda mejor en español con «aun si». Mantiene la posibilidad hipotética sin convertirla en afirmación absoluta ni suavizar la condición.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ introduce contraste respecto del contexto anterior; «Pero» conserva ese giro adversativo de manera natural en español.
- source_word: ἡ κρίσις ἡ ἐμὴ
  english_pob_choice: my judgment
  chosen_spanish: mi juicio
  alternatives_spanish:
  - mi sentencia
  - el juicio que es mío
  lexicon: BDAG
  rationale: La construcción posesiva se expresa de forma natural como «mi juicio». «Juicio» conserva la fuerza forense de κρίσις y funciona mejor en español que una paráfrasis más extensa.
- source_word: ἀληθινή
  english_pob_choice: 'true'
  chosen_spanish: verdadero
  alternatives_spanish:
  - válido
  - genuino
  lexicon: BDAG
  rationale: «Verdadero» reproduce bien el valor de ἀληθινή y conserva tanto la idea de autenticidad como la de validez judicial, sin perder el eco joánico del término.
- source_word: μόνος οὐκ εἰμί
  english_pob_choice: I am not alone
  chosen_spanish: no estoy solo
  alternatives_spanish:
  - no estoy por mi cuenta
  - no estoy aislado
  lexicon: BDAG
  rationale: La negación de soledad expresa bien el sentido relacional del griego. «No estoy solo» es idiomático y preserva que el punto no es mera presencia física, sino compañía/acompañamiento en el testimonio y el juicio.
- source_word: ὁ πέμψας με πατήρ
  english_pob_choice: the Father who sent me
  chosen_spanish: el Padre que me envió
  alternatives_spanish:
  - el Padre, el que me envió
  - el Padre que me ha enviado
  lexicon: BDAG
  rationale: El participio πέμψας funciona identificando al Padre por su acción de enviar; en español, la relativa «que me envió» reproduce de modo claro y fiel esa función. Se mantiene «Padre» con artículo porque el griego lo presenta así.
theological_decisions:
- issue: Relación entre el juicio de Jesús y el testimonio del Padre
  english_pob_reading: Jesus' judgment is true because it is not exercised independently of the Father who sent him.
  chosen_spanish_reading: El juicio de Jesús es verdadero porque no se ejerce de manera independiente del Padre que lo envió.
  alternative_spanish_readings:
  - Su juicio es verdadero porque el Padre lo respalda.
  - Su juicio es verdadero porque el Padre participa en él.
  rationale: 'La frase española conserva la base explícita del versículo: la verdad del juicio de Jesús se fundamenta en que no está solo y en su unión con el Padre que lo envió. Evita añadir formulaciones doctrinales posteriores y mantiene el argumento del texto.'
  doctrine_reference: 'Affirmations; Translation philosophy #3'
translation_notes:
  revision_awareness: 'Se siguió el estado de revisión más reciente indicado en el expediente inglés (latest_revision_pass: unchanged); por ello no se introdujeron ajustes textuales adicionales más allá de la adaptación española basada en el griego y el audit trail inglés.'
  spanish_consistency_notes:
  - Se mantuvo «Padre» con mayúscula por tratarse del uso teológico referido a Dios en el contexto joánico.
  - Se eligió «juicio» para conservar el campo semántico forense de κρίσις.
  - Se usó «aun si» para reflejar el posible valor concesivo de ἐὰν κρίνω sin perder naturalidad en español.
