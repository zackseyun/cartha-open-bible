translation:
  language: es
  text: En nuestra ley[a], Moisés mandó que tales mujeres fueran apedreadas. Entonces, ¿qué dices tú?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Continuación de la historia de la mujer sorprendida en adulterio (Juan 7:53–8:11). Véase la nota en Juan 7:53.
    reason: textual_critical
lexical_decisions:
- source_word: Ἐν δὲ τῷ νόμῳ ἡμῶν
  english_pob_choice: Now in our law
  chosen_spanish: En nuestra ley
  alternatives_spanish:
  - Ahora, en nuestra ley
  - Pues, en nuestra ley
  lexicon: νόμος (BDAG)
  rationale: Se conserva el marco jurídico de pertenencia (“nuestra ley”) sin añadir una partícula temporal innecesaria. “En” reproduce la locución de ámbito normativa del griego.
- source_word: Μωσῆς
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moisés
  lexicon: Μωϋσῆς / Μωσῆς
  rationale: Nombre propio estándar en español bíblico, sin variación relevante.
- source_word: ἐνετείλατο
  english_pob_choice: commanded
  chosen_spanish: mandó
  alternatives_spanish:
  - mandó
  - ordenó
  - instruyó
  lexicon: ἐντέλλομαι (BDAG)
  rationale: “Mandó” comunica la autoridad normativa del verbo y suena natural en español sin perder el tono legal de una prescripción mosaica.
- source_word: τὰς τοιαύτας
  english_pob_choice: such women
  chosen_spanish: tales mujeres
  alternatives_spanish:
  - esas mujeres
  - mujeres como esas
  lexicon: τοιοῦτος (BDAG)
  rationale: El femenino plural acusa referencia a mujeres de esa clase. “Tales mujeres” mantiene la deixis cualitativa y la referencia contextual a la mujer sorprendida en adulterio.
- source_word: λιθοβολεῖσθαι
  english_pob_choice: be stoned
  chosen_spanish: fueran apedreadas
  alternatives_spanish:
  - fueran lapidadas
  - debían ser apedreadas
  - fueran muertas a pedradas
  lexicon: λιθοβολέω (BDAG)
  rationale: En español bíblico contemporáneo “apedrear” expresa con claridad el castigo de muerte por lapidación. El subjuntivo pasivo imperfecto (“fueran apedreadas”) refleja bien el infinitivo pasivo en una subordinada de contenido.
- source_word: σὺ οὖν τί λέγεις;
  english_pob_choice: So what do you say?
  chosen_spanish: Entonces, ¿qué dices tú?
  alternatives_spanish:
  - Así que, ¿qué dices?
  - Entonces, ¿qué dices?
  lexicon: λέγω (BDAG)
  rationale: “Entonces” reproduce οὖν con valor inferencial. El pronombre explícito “tú” preserva el énfasis de σὺ, mostrando el desafío directo al interlocutor.
theological_decisions:
- issue: La frase “en nuestra ley” implica la autoridad de la ley de Moisés dentro del argumento de los acusadores.
  english_pob_reading: Now in our law, Moses commanded that such women be stoned.
  chosen_spanish_reading: En nuestra ley, Moisés mandó que tales mujeres fueran apedreadas.
  alternative_spanish_readings:
  - Ahora, en nuestra ley, Moisés mandó que tales mujeres fueran apedreadas.
  - En nuestra ley, Moisés ordenó que tales mujeres fueran apedreadas.
  rationale: No se atenúa la fuerza normativa de la apelación a la ley; se mantiene como argumento jurídico-teológico, no meramente cultural.
  doctrine_reference: Torá como norma de autoridad en el debate narrativo; cf. Deuteronomio 22:22–24.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el sentido auditado del griego y coincide con la decisión inglesa establecida: conservar el argumento legal (“nuestra ley”), el mandato mosaico (“mandó”) y el castigo de lapidación (“apedreadas”), sin cambios de revisión aplicados en el pass más reciente.'
  spanish_consistency_notes:
  - Se usa “Yahvé” solo cuando el texto lo exija; aquí no aparece el nombre divino.
  - “Apedreadas” conserva la fuerza penal de λιθοβολεῖσθαι sin sobreexplicar “a muerte”, igual que la decisión inglesa de “be stoned”.
  - La pregunta final mantiene el tono retador del singular σὺ con “tú” explícito.
