  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Moisés», «ley», «mandó» y «apedreadas» son adecuados. No intervienen aquí términos sensibles del glosario como Yahvé, Mesías, esclavo, carne, gracia, etc.
