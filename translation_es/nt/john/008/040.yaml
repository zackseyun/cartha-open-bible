  to: Pero ahora ustedes buscan matarme, a un hombre que les ha dicho la verdad que oyó de Dios. Abraham no hizo esto.
  rationale: 'Se corrige la cláusula relativa para que el español exprese con claridad y naturalidad el sentido de ὃς τὴν ἀλήθειαν ὑμῖν λελάληκα: Jesús es «un hombre que les ha dicho la verdad». También se simplifica «la cual oí de parte de Dios» a «que oyó de Dios» para un español más fluido, manteniendo el origen del mensaje en Dios. No se requieren notas al pie.'
