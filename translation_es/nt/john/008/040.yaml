review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del griego: conserva el contraste de νῦν δὲ, la intención de ζητεῖτέ με ἀποκτεῖναι, la autorreferencia de Jesús como ἄνθρωπον, el contenido definido de «la verdad», el origen «de Dios», y la cláusula final sobre Abraham. Sin embargo, la secuencia relativa en español («a un hombre que les he dicho la verdad») no refleja fielmente la sintaxis ni el sentido de ὃς τὴν ἀλήθειαν ὑμῖν λελάληκα; en español suena a error gramatical y oscurece que Jesús es el sujeto de «he dicho».'
  spanish_quality_summary: La frase central es poco natural y gramaticalmente defectuosa en español. Debe reformularse como «un hombre que les ha dicho la verdad» o «un hombre que les he dicho la verdad» evitando la discordancia creada por el relativo. El resto del versículo es claro y de registro adecuado. «Ustedes» es aceptable, aunque no indispensable.
  glossary_alignment: 'No hay conflicto con la terminología del proyecto: θεοῦ se traduce correctamente como «Dios» y ἄνθρωπον como «hombre». No intervienen términos sensibles como Yahvé/Mesías/esclavo. La decisión «de parte de Dios» es posible, pero «de Dios» o «que oí de Dios» suena más natural aquí; aun así, el problema principal es sintáctico, no glosarial.'
  issues:
  - severity: high
    issue: Construcción defectuosa en «a un hombre que les he dicho la verdad»
    rationale: En el griego, Jesús se describe como «un hombre que les ha dicho la verdad». El borrador español mezcla una relativa con primera persona («que les he dicho») de forma antinatural e incorrecta para el lector, y no preserva con claridad el sentido del original.
  - severity: low
    issue: «de parte de Dios» es algo más pesado que necesario
    rationale: παρὰ τοῦ θεοῦ indica fuente/origen. «Que oí de Dios» es más directo y natural en este contexto, sin pérdida de sentido. No es un error grave, pero conviene aligerarlo.
  revised_spanish_text: Pero ahora ustedes buscan matarme, a un hombre que les ha dicho la verdad que oyó de Dios. Abraham no hizo esto.
  revision_rationale: 'Se corrige la cláusula relativa para que el español exprese con claridad y naturalidad el sentido de ὃς τὴν ἀλήθειαν ὑμῖν λελάληκα: Jesús es «un hombre que les ha dicho la verdad». También se simplifica «la cual oí de parte de Dios» a «que oyó de Dios» para un español más fluido, manteniendo el origen del mensaje en Dios. No se requieren notas al pie.'
