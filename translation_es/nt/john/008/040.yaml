translation:
  language: es
  text: Pero ahora ustedes buscan matarme, a un hombre que les ha dicho la verdad que oyó de Dios. Abraham no hizo esto.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: νῦν δὲ
  english_pob_choice: But now
  chosen_spanish: Pero ahora
  alternatives_spanish:
  - Ahora, sin embargo
  - Pero por ahora
  lexicon: BDAG
  rationale: Conserva el contraste temporal y adversativo de δέ con νῦν de manera natural en español. «Pero ahora» reproduce bien la oposición enfática sin volver la frase pesada.
- source_word: ζητεῖτέ με ἀποκτεῖναι
  english_pob_choice: you are seeking to kill me
  chosen_spanish: ustedes buscan matarme
  alternatives_spanish:
  - ustedes intentan matarme
  - ustedes buscan quitarme la vida
  lexicon: BDAG
  rationale: «Buscar» mantiene el valor de ζητέω con infinitivo, y «matarme» expresa con claridad el infinitivo ἀποκτεῖναι. El giro suena natural en español y conserva la intención hostil sin añadir una modalidad legal o formal.
- source_word: ἄνθρωπον
  english_pob_choice: a man
  chosen_spanish: a un hombre
  alternatives_spanish:
  - a un ser humano
  lexicon: BDAG
  rationale: Se mantiene el valor léxico directo de ἄνθρωπος aplicado a Jesús. «Hombre» conserva la referencia personal y la fuerza encarnacional del término, sin diluirlo en una expresión más genérica.
- source_word: τὴν ἀλήθειαν
  english_pob_choice: the truth
  chosen_spanish: la verdad
  alternatives_spanish:
  - verdad
  lexicon: BDAG
  rationale: Se conserva el artículo para reflejar el contenido definido de ἀλήθεια en el discurso joánico. «La verdad» es la manera natural y precisa en español.
- source_word: ὑμῖν λελάληκα
  english_pob_choice: has told you
  chosen_spanish: les he dicho
  alternatives_spanish:
  - les he hablado
  - les he comunicado
  lexicon: BDAG
  rationale: El perfecto λελάληκα expresa una acción completada con vigencia presente. En español, «les he dicho» comunica con naturalidad la palabra ya pronunciada y su efecto vigente; se prefirió a una traducción más literal pero menos idiomática como «les he hablado».
- source_word: ἣν ἤκουσα παρὰ τοῦ θεοῦ
  english_pob_choice: that I heard from God
  chosen_spanish: la cual oí de parte de Dios
  alternatives_spanish:
  - que oí de Dios
  - que escuché de parte de Dios
  lexicon: BDAG
  rationale: παρά con genitivo marca procedencia. «De parte de Dios» conserva la idea de origen sin sobreespecificar «delante de la presencia de Dios» ni desplazar el sentido a otra relación teológica no explicitada en el texto.
- source_word: τοῦ θεοῦ
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: BDAG
  rationale: En español, «Dios» es el equivalente natural y reverente en esta construcción. No se añade «el» porque el uso normal no lo requiere.
- source_word: τοῦτο Ἀβραὰμ οὐκ ἐποίησεν
  english_pob_choice: Abraham did not do this
  chosen_spanish: Abraham no hizo esto
  alternatives_spanish:
  - Abraham no hizo tal cosa
  - Abraham no actuó así
  lexicon: BDAG
  rationale: Se conserva la cercanía al griego con un español directo. «Hizo esto» traduce bien ἐποίησεν con el demostrativo τοῦτο y mantiene el contraste con la conducta de Abraham.
theological_decisions:
- issue: Autorreferencia de Jesús como ἄνθρωπον
  english_pob_reading: a man
  chosen_spanish_reading: a un hombre
  alternative_spanish_readings:
  - a un ser humano
  rationale: El texto presenta a Jesús describiéndose a sí mismo con ἄνθρωπον. Traducir «a un hombre» preserva el sentido llano del término y la afirmación explícita de su humanidad, sin implicar ninguna negación de su divinidad.
  doctrine_reference: DOCTRINE.md Affirmations; Translation philosophy §4
- issue: Origen del mensaje en παρὰ τοῦ θεοῦ
  english_pob_reading: from God
  chosen_spanish_reading: de parte de Dios
  alternative_spanish_readings:
  - de Dios
  - de la presencia de Dios
  rationale: El griego dice θεοῦ, no «del Padre». «De parte de Dios» conserva el origen del dicho sin importar una especificación teológica que el versículo no formula. Esta elección mantiene la tensión joánica entre palabra recibida y palabra transmitida.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
translation_notes:
  revision_awareness: Se siguió el texto griego SBLGNT con el audit trail inglés de la POB; no se documentaron revisiones textuales ni notas heredadas para este versículo, y la propuesta mantiene la concordancia alta del control cruzado sin introducir variantes no atestiguadas.
  spanish_consistency_notes:
  - Se usó «Dios» como forma habitual y reverente para θεός.
  - Se evitó «SEÑOR» porque el texto aquí dice θεοῦ y no κύριος.
  - Se mantuvo el registro directo y sobrio del discurso de confrontación.
  - Se prefirió un español natural que conserve el orden informativo sin calcos innecesarios.
