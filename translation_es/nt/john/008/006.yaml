translation:
  language: es
  text: Ellos[a] decían esto para probarlo, para tener una acusación contra él. Pero Jesús, inclinándose, escribió en la tierra con su dedo, sin prestarles atención.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Continuación de la historia de la mujer sorprendida en adulterio (Juan 7:53–8:11). Véase la nota en Juan 7:53.
    reason: textual_critical
lexical_decisions:
- source_word: πειράζοντες
  english_pob_choice: to test
  chosen_spanish: para probarlo
  alternatives_spanish:
  - para tentarlo
  - para atraparlo
  lexicon: BDAG
  rationale: En este contexto el valor no es principalmente 'tentar' en sentido moral, sino poner a prueba a Jesús con intención hostil. 'Probarlo' conserva la idea de examen/hostilidad sin introducir una connotación religiosa menos precisa en español.
- source_word: κατηγορίαν
  english_pob_choice: accusation
  chosen_spanish: una acusación
  alternatives_spanish:
  - un cargo
  - una denuncia
  lexicon: BDAG
  rationale: '''Acusación'' comunica bien el sentido jurídico de una imputación formal contra él, y encaja con el trasfondo legal del pasaje.'
- source_word: κάτω κύψας
  english_pob_choice: bending down
  chosen_spanish: inclinándose
  alternatives_spanish:
  - agachándose
  - doblándose
  lexicon: interlinear/source syntax
  rationale: La construcción participial pide una forma adverbial en español. 'Inclinándose' reproduce con naturalidad el gesto corporal de bajar el cuerpo sin añadir más de lo que dice el griego.
- source_word: τῷ δακτύλῳ
  english_pob_choice: with his finger
  chosen_spanish: con el dedo
  alternatives_spanish:
  - con su dedo
  - con el dedo de él
  lexicon: lexical correspondence
  rationale: El posesivo no es necesario en español porque el sujeto inmediato ya es Jesús; 'con el dedo' preserva la sencillez del griego y su valor descriptivo.
- source_word: μὴ προσποιούμενος
  english_pob_choice: paying no attention
  chosen_spanish: sin hacer caso
  alternatives_spanish:
  - como si no oyera
  - ignorándolos
  lexicon: BDAG
  rationale: La partícula negativa con el participio comunica una conducta deliberada de no atender. 'Sin hacer caso' es una expresión idiomática natural en español y mantiene la idea de desatención intencional.
theological_decisions:
- issue: Alcance de la escena de prueba hostil
  english_pob_reading: They were saying this to test him, so that they might have an accusation against him.
  chosen_spanish_reading: Ellos decían esto para probarlo, para tener una acusación contra él.
  alternative_spanish_readings:
  - para tentarlo
  - para encontrar un cargo contra él
  rationale: 'No hay cambio doctrinal, pero sí una decisión de matiz: ''probarlo'' evita una lectura moralizante estrecha de ''tentar'' y conserva el carácter de maniobra hostil con posible trasfondo legal.'
  doctrine_reference: Jn 8:6 context; lexical/theological nuance only
- issue: Forma de describir la respuesta de Jesús
  english_pob_reading: But Jesus, bending down, wrote on the ground with his finger, paying no attention.
  chosen_spanish_reading: Pero Jesús, inclinándose, escribía en la tierra con el dedo, sin hacer caso.
  alternative_spanish_readings:
  - escribió en la tierra
  - escribía sobre el suelo
  rationale: El participio 'inclinándose' mantiene la estructura del griego y la acción continua de Jesús en la escena. 'Escribía' refleja el imperfecto descriptivo sin forzar un momento puntual; 'en la tierra' conserva el campo semántico de γῆ.
  doctrine_reference: Jn 8:6 narrative syntax
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la revisión auditada del inglés POB, que ajustó la segunda cláusula para reflejar mejor el participio ''bending down''. En español se conservó esa estructura participial con ''inclinándose'' y se mantuvieron los equivalentes léxicos auditados: ''probar'', ''acusación'' y una expresión idiomática para ''paying no attention''.'
  spanish_consistency_notes:
  - Se usó 'Jesús' en lugar de un pronombre repetido para claridad natural en español.
  - '''Tierra'' traduce γῆ de manera contextual; no se eligió ''suelo'' porque ''tierra'' mantiene la ambigüedad física del texto griego.'
  - Se evitó 'tentar' para no desplazar el énfasis hacia una tentación moral cuando el contexto legal-hostil es dominante.
