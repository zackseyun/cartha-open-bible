- from: Ellos[a] decían esto para probarlo, para tener una acusación contra él. Pero Jesús, inclinándose, escribía en la tierra con el dedo, sin hacer caso.
  to: Ellos[a] decían esto para probarlo, para tener una acusación contra él. Pero Jesús, inclinándose, escribió en la tierra con su dedo, sin prestarles atención.
  rationale: Se ajusta el verbo principal a un pretérito narrativo más natural en español bíblico ('escribió'), se refina la última frase a una formulación menos coloquial y más precisa ('sin prestarles atención'), y se alinea la razón de la nota con la auditoría textual del POB inglés. El resto del borrador conserva adecuadamente el sentido del griego y las decisiones léxicas documentadas.
