translation:
  language: es
  text: Ustedes son de su padre, el diablo, y quieren hacer los deseos de su padre. Él era homicida desde el principio, y no se ha mantenido firme en la verdad, porque no hay verdad en él. Siempre que habla la mentira[a], habla de lo suyo[b], porque es mentiroso y padre de ella[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Cuando miente» o «Cuando dice falsedad». El griego dice más literalmente: «Siempre que habla la mentira».'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «de lo suyo», es decir, de lo que le pertenece por naturaleza o carácter.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «padre de la mentira». Algunos entienden el pronombre de manera más general como «el padre de las mentiras».'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐκ τοῦ πατρὸς τοῦ διαβόλου
  english_pob_choice: from your father, the devil
  chosen_spanish: de su padre, el diablo
  alternatives_spanish:
  - de parte de su padre, el diablo
  - proceden de su padre, el diablo
  lexicon: BDAG
  rationale: ἐκ con εἰμί expresa origen o pertenencia. En español, «de su padre, el diablo» comunica esa procedencia/alineamiento sin volver la frase artificial. «De parte de» sería más interpretativo y menos directo.
- source_word: ἐπιθυμίας
  english_pob_choice: desires
  chosen_spanish: deseos
  alternatives_spanish:
  - codicias
  - ansias
  lexicon: BDAG
  rationale: «Deseos» conserva la amplitud semántica de ἐπιθυμία sin restringirlo a un matiz sexual como podría hacerlo «codicias» en español actual.
- source_word: θέλετε ποιεῖν
  english_pob_choice: you want to do
  chosen_spanish: quieren hacer
  alternatives_spanish:
  - quieren practicar
  - quieren cumplir
  lexicon: BDAG
  rationale: La construcción expresa voluntad/intención. «Quieren hacer» es natural y mantiene la responsabilidad volitiva sin añadir un matiz ajeno.
- source_word: ἀνθρωποκτόνος
  english_pob_choice: murderer
  chosen_spanish: homicida
  alternatives_spanish:
  - asesino
  - matador
  lexicon: BDAG
  rationale: «Homicida» conserva la fuerza de quien mata seres humanos y funciona bien en español bíblico moderno. «Asesino» es posible, pero suena más cargado y puede sugerir un acto puntual; aquí el rasgo es caracterológico.
- source_word: ἀπ’ ἀρχῆς
  english_pob_choice: from the beginning
  chosen_spanish: desde el principio
  alternatives_spanish:
  - desde el comienzo
  - desde el inicio
  lexicon: BDAG
  rationale: «Desde el principio» es la correspondencia más natural y refleja la dicción joánica habitual.
- source_word: ἐν τῇ ἀληθείᾳ ⸂οὐκ ἔστηκεν⸃
  english_pob_choice: has not stood in the truth
  chosen_spanish: no ha estado en la verdad
  alternatives_spanish:
  - no se ha mantenido en la verdad
  - no ha permanecido en la verdad
  lexicon: BDAG
  rationale: El griego conserva la imagen de estar/estar firme en la verdad. En español, «no ha estado en la verdad» respeta el alcance sin decidir demasiado sobre si hubo una permanencia previa; «permanecido» podría implicar más de lo que el texto exige.
- source_word: ἀλήθεια
  english_pob_choice: truth
  chosen_spanish: verdad
  alternatives_spanish:
  - verdad plena
  - realidad
  lexicon: BDAG
  rationale: Término estándar en Juan; no hay razón para variar su traducción.
- source_word: ὅταν λαλῇ τὸ ψεῦδος
  english_pob_choice: Whenever he speaks the lie
  chosen_spanish: Cuando habla la mentira[a]
  alternatives_spanish:
  - Siempre que habla la mentira
  - Cuando dice falsedad
  lexicon: BDAG
  rationale: El artículo con ψεῦδος es notable. «La mentira» preserva el sustantivo singular articulado y el carácter típico o totalizante de su hablar. Se añade nota porque en español también es natural «cuando miente» o «cuando dice falsedad».
- source_word: ἐκ τῶν ἰδίων λαλεῖ
  english_pob_choice: he speaks from his own
  chosen_spanish: habla de lo suyo[b]
  alternatives_spanish:
  - habla de sus propias cosas
  - habla desde lo que le pertenece
  lexicon: BDAG
  rationale: La frase es idiomática y no se limita a «recursos». «De lo suyo» conserva cercanía al griego y deja abierta la idea de lo que le pertenece por naturaleza o carácter. La nota aclara esa amplitud.
- source_word: ψεύστης
  english_pob_choice: a liar
  chosen_spanish: mentiroso
  alternatives_spanish:
  - embustero
  - falso
  lexicon: BDAG
  rationale: «Mentiroso» es el equivalente directo y natural del predicado nominal griego.
- source_word: ὁ πατὴρ αὐτοῦ
  english_pob_choice: its father
  chosen_spanish: padre de ella[c]
  alternatives_spanish:
  - su padre
  - padre de esto
  - padre de la mentira
  lexicon: BDAG
  rationale: El referente más próximo de αὐτοῦ es τὸ ψεῦδος, de modo que el sentido es que el diablo es padre/origen de la mentira. En español, «padre de ella» retiene el vínculo pronominal con «la mentira»; la nota permite la lectura alternativa más libre «padre de la mentira».
theological_decisions:
- issue: Referente de ὁ πατὴρ αὐτοῦ
  english_pob_reading: The phrase refers to 'the lie/falsehood,' meaning the devil is the father/source of it.
  chosen_spanish_reading: Se refiere a «la mentira», es decir, el diablo es su padre o fuente.
  alternative_spanish_readings:
  - 'Se refiere al diablo mismo: «su padre»'
  - Se entiende como la expresión generalizada «padre de la mentira»
  rationale: El antecedente inmediato más coherente es τὸ ψεῦδος. Traducir «padre de ella» mantiene la relación con la mentira sin convertirla en una paráfrasis plural ni en una afirmación extraña sobre un padre del diablo.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Si la frase implica que el diablo alguna vez estuvo en la verdad y luego cayó
  english_pob_reading: The translation avoids implying prior participation in the truth beyond what the Greek states.
  chosen_spanish_reading: La traducción evita afirmar más de lo que dice el griego sobre una permanencia previa en la verdad.
  alternative_spanish_readings:
  - No ha permanecido en la verdad, lo que podría sugerir una permanencia anterior
  rationale: «No ha estado en la verdad» conserva la imagen sin resolver una cuestión teológica discutida que el texto no explicita.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'La versión española sigue la revisión más reciente del POB en dos puntos clave: conserva la forma breve y directa de la negación en la cláusula sobre la verdad, y mantiene una solución cercana al griego en ἐκ τῶν ἰδίων λαλεῖ. También preserva la ambigüedad controlada del cierre sobre ὁ πατὴρ αὐτοῦ mediante una nota, sin expandirlo innecesariamente a una paráfrasis general.'
  spanish_consistency_notes:
  - Se usa «verdad» para ἀλήθεια de forma consistente con Juan.
  - Se usa «mentiroso» para ψεύστης y «mentira» para τὸ ψεῦδος, manteniendo la distinción entre rasgo personal y contenido falso.
  - Se traduce διάβολος como «el diablo» en lugar de suavizarlo.
  - Se mantiene «desde el principio» para ἀπ’ ἀρχῆς, conforme al uso joánico.
  - Se evita «SEÑOR» u otras sustituciones no pertinentes, ya que el texto no contiene el Tetragrámaton.
