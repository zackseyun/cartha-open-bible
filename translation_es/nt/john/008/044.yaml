source:
  edition: SBLGNT
  text: ὑμεῖς ἐκ τοῦ πατρὸς τοῦ διαβόλου ἐστὲ καὶ τὰς ἐπιθυμίας τοῦ πατρὸς ὑμῶν θέλετε ποιεῖν. ἐκεῖνος ἀνθρωποκτόνος ἦν ἀπ’ ἀρχῆς, καὶ ἐν τῇ ἀληθείᾳ ⸂οὐκ ἔστηκεν⸃, ὅτι οὐκ ἔστιν ἀλήθεια ἐν αὐτῷ. ὅταν λαλῇ τὸ ψεῦδος, ἐκ τῶν ἰδίων λαλεῖ, ὅτι ψεύστης ἐστὶν καὶ ὁ πατὴρ αὐτοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/john/008/044.yaml
  text: You are from your father[a], the devil, and you want to do your father's desires. He was a murderer from the beginning, and has not stood in the truth, because there is no truth in him. Whenever he speaks the lie, he speaks from his own[c][b], because he is a liar and its father.
  footnotes:
  - marker: a
    text: Or, more smoothly, 'Whenever he lies' or 'Whenever he speaks falsehood.' The Greek reads more literally, 'Whenever he speaks the lie.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'he speaks from his own'—that is, from what belongs to him by nature or character.
    reason: lexical_alternative
  - marker: c
    text: Or, 'and its father.' Some take this more generally as 'the father of lies.'
    reason: alternative_reading
