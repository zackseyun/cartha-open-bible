  glossary_alignment: No hay conflicto con la terminología base del proyecto. 'Jesús', 'Abraham' y la preservación de 'yo soy' están alineados con el expediente inglés y la decisión teológica documentada. La principal corrección requerida es de estilo y de colocación/uso de notas, no de glosario doctrinal.
