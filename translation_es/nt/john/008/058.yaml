translation:
  language: es
  text: 'Jesús les dijo: «En verdad, en verdad les digo: antes de que Abraham llegara a existir[a], yo soy[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «antes de que Abraham naciera». El verbo griego es más amplio: puede significar «llegar a existir» o «venir a la existencia».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «yo he sido». El griego dice «yo soy», conservando la forma de presente y su posible resonancia teológica.'
    reason: alternative_reading
lexical_decisions:
- source_word: εἶπεν αὐτοῖς Ἰησοῦς
  english_pob_choice: Jesus said to them
  chosen_spanish: Jesús les dijo
  alternatives_spanish:
  - Jesús les habló
  - Jesús dijo a ellos
  lexicon: BDAG
  rationale: La forma narrativa directa del griego se expresa de manera natural en español con 'les dijo'. Mantiene el destinatario explícito sin sobrecargar el registro.
- source_word: Ἀμὴν ἀμὴν
  english_pob_choice: Truly, truly
  chosen_spanish: De cierto, de cierto
  alternatives_spanish:
  - Amén, amén
  - En verdad, en verdad
  lexicon: BDAG
  rationale: Se conserva la fórmula solemne y duplicada. 'De cierto, de cierto' es una formulación tradicional y clara en español bíblico, y comunica la solemnidad sin convertir la frase en una simple transliteración litúrgica.
- source_word: λέγω ὑμῖν
  english_pob_choice: I say to you
  chosen_spanish: les digo
  alternatives_spanish:
  - les digo a ustedes
  - yo les digo
  lexicon: BDAG
  rationale: El dativo plural se expresa naturalmente con el pronombre clítico 'les'. El verbo en primera persona mantiene la fórmula joánica de declaración solemne.
- source_word: πρὶν Ἀβραὰμ γενέσθαι
  english_pob_choice: before Abraham came to be
  chosen_spanish: antes de que Abraham llegara a existir
  alternatives_spanish:
  - antes de que Abraham fuera
  - antes de que Abraham naciera
  - antes de que Abraham viniera a ser
  lexicon: BDAG
  rationale: '''Llegara a existir'' reproduce la amplitud de γενέσθαι mejor que ''naciera'', que estrecharía el sentido al nacimiento físico. También mantiene el contraste verbal con ''yo soy'' sin resolverlo hacia una paráfrasis excesiva.'
- source_word: ἐγὼ εἰμί
  english_pob_choice: I am
  chosen_spanish: yo soy
  alternatives_spanish:
  - yo he sido
  - yo existo
  lexicon: BDAG
  rationale: Se conserva el presente simple y absoluto del griego. 'Yo soy' permite que permanezca visible la tensión cristológica y no la reduce a una mera afirmación de preexistencia pasada.
- source_word: Ἀβραὰμ
  english_pob_choice: Abraham
  chosen_spanish: Abraham
  lexicon: BDAG
  rationale: Nombre propio estándar en español bíblico, sin necesidad de adaptación adicional.
theological_decisions:
- issue: Valor cristológico y resonancia divina de ἐγὼ εἰμί
  english_pob_reading: I am
  chosen_spanish_reading: yo soy
  alternative_spanish_readings:
  - yo he sido
  - yo existo
  rationale: La traducción mantiene el presente absoluto del griego y no lo suaviza a una mera referencia temporal al pasado. En español, 'yo soy' deja abierta la resonancia teológica del enunciado en su contexto, en lugar de resolverla anticipadamente.
  doctrine_reference: Afirmations; Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Alcance de γενέσθαι en contraste con ἐγὼ εἰμί
  english_pob_reading: came to be
  chosen_spanish_reading: llegara a existir
  alternative_spanish_readings:
  - naciera
  - fuera
  - viniera a ser
  rationale: La elección evita limitar el verbo a 'nacer' y preserva el contraste de existencia entre Abraham y Jesús. Así se refleja mejor la amplitud léxica del griego y la tensión narrativa del pasaje.
  doctrine_reference: BDAG; translation philosophy
translation_notes:
  revision_awareness: 'El contexto de auditoría inglesa muestra alta convergencia y sin revisiones aplicadas; se mantiene la misma resolución principal: conservar el presente absoluto de ἐγὼ εἰμί y la amplitud de γενέσθαι, sin añadir explicación al texto principal más allá de lo necesario.'
  spanish_consistency_notes:
  - Se prefirió 'De cierto, de cierto' por ser una fórmula bíblica natural en español y equivalente a la duplicación enfática griega.
  - Se evitó 'Cristo' porque el versículo nombra a Jesús directamente y no usa Χριστός.
  - Se mantuvo 'yo soy' en minúsculas iniciales dentro de la cita, según la puntuación española estándar y la cita directa.
  - El sujeto 'Jesús' va antes del verbo como en el griego y para una lectura natural en español.
