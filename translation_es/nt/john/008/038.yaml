translation:
  language: es
  text: Yo hablo lo que he visto con el Padre[a], y ustedes, entonces, hacen lo que han oído de su padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Yo hablo las cosas que he visto con el Padre, y ustedes, por tanto, hacen las cosas que han oído del padre». En la segunda cláusula, el referente de «padre» queda menos explícito aquí, aunque el contexto amplio lo aclara (véase v. 44).'
    reason: alternative_reading
lexical_decisions:
- source_word: ἃ
  english_pob_choice: what
  chosen_spanish: lo que
  alternatives_spanish:
  - las cosas que
  - aquello que
  lexicon: BDAG
  rationale: El relativo neutro plural funciona como complemento directo de la cláusula verbal; en español, «lo que» reproduce con naturalidad el valor global de contenido sin volverla innecesariamente pesada.
- source_word: ἑώρακα
  english_pob_choice: I have seen
  chosen_spanish: he visto
  alternatives_spanish:
  - vi
  lexicon: BDAG
  rationale: El perfecto griego expresa una visión pasada con relevancia presente; el perfecto español «he visto» mantiene ese matiz mejor que un simple pretérito.
- source_word: παρὰ τῷ πατρὶ
  english_pob_choice: with the Father
  chosen_spanish: con el Padre
  alternatives_spanish:
  - en presencia del Padre
  - delante del Padre
  lexicon: BDAG
  rationale: παρά con dativo aquí señala cercanía o presencia. «Con el Padre» conserva la relación directa y suena natural en español, sin convertir la idea en un mero origen.
- source_word: λαλῶ
  english_pob_choice: I speak
  chosen_spanish: hablo
  alternatives_spanish:
  - digo
  - expreso
  lexicon: BDAG
  rationale: La forma verbal griega presenta la acción de hablar de manera directa; en español «hablo» preserva esa simplicidad sin añadir una preposición que el griego no exige.
- source_word: οὖν
  english_pob_choice: then
  chosen_spanish: entonces
  alternatives_spanish:
  - por tanto
  - así que
  lexicon: BDAG
  rationale: La partícula marca una conexión inferencial o de continuación discursiva. «Entonces» mantiene el flujo conversacional con una fuerza lógica moderada.
- source_word: ἠκούσατε
  english_pob_choice: you have heard
  chosen_spanish: han oído
  alternatives_spanish:
  - oyeron
  lexicon: BDAG
  rationale: Aunque el aoristo admite pretérito simple, el presente perfecto español enlaza bien con el contraste de experiencia/acción en la frase paralela y conserva relevancia actual.
- source_word: παρὰ τοῦ πατρὸς
  english_pob_choice: from your father
  chosen_spanish: de su padre
  alternatives_spanish:
  - de el padre
  - del padre
  lexicon: BDAG
  rationale: παρά con genitivo indica procedencia; en español, «de su padre» deja implícita la referencia, como en el griego, y refleja la contraposición con «el Padre» en la primera cláusula sin resolver todavía de manera explícita la identidad del referente.
- source_word: ποιεῖτε
  english_pob_choice: do
  chosen_spanish: hagan
  alternatives_spanish:
  - hacen
  - practiquen
  lexicon: BDAG
  rationale: El presente griego aquí tiene valor característico; «hagan» en imperativo reproduce la fuerza exhortativa del contexto polémico y conserva el paralelismo con el mandato implícito de la declaración.
- source_word: πατήρ / πατρὸς
  english_pob_choice: Father / father
  chosen_spanish: Padre / padre
  lexicon: BDAG
  rationale: La mayúscula en «Padre» señala la referencia a Dios en relación con Jesús. La segunda ocurrencia se mantiene en minúscula para conservar la tensión contextual y no adelantar la identificación explicativa de Juan 8:44.
theological_decisions:
- issue: Si explicitar o no al segundo padre como el diablo en el texto principal
  english_pob_reading: Retain the more implicit 'your father' rather than 'the devil' or 'your father the devil.'
  chosen_spanish_reading: Mantener «su padre» de manera implícita, sin añadir «el diablo» en el texto principal.
  alternative_spanish_readings:
  - de su padre, el diablo
  - de el padre
  rationale: En el desarrollo inmediato del discurso, Juan 8:44 identifica al interlocutor paterno con claridad, pero este versículo conserva la progresión retórica. La traducción mantiene esa tensión y no adelanta la aclaración narrativa.
  doctrine_reference: Preservar la progresión del contexto sin resolver prematuramente la identificación.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del POB en inglés, que corrigió «speak of what» a un complemento más directo («speak what»). En español se reflejó esa alineación con «hablo lo que» y se mantuvieron «con el Padre» y «de su padre» para conservar el contraste contextual del versículo.
  spanish_consistency_notes:
  - Se emplea «Padre» con mayúscula para la referencia divina relacionada con Jesús y «padre» en minúscula para el referente contextual no explicitado.
  - Se prefirió «con» para παρά con dativo y «de» para παρά con genitivo, manteniendo el contraste relacional y de procedencia.
  - Se evitó añadir una identificación explícita del segundo padre en el cuerpo del texto para preservar la tensión interpretativa documentada.
