revisions:
- from: 'Entonces le decían a él[a]: «¿Dónde está tu Padre?» Jesús respondió: «No conocen ni a mí ni a mi Padre. Si me conocieran, conocerían también a mi Padre».'
  to: 'Entonces le decían: «¿Dónde está tu Padre?» Jesús respondió: «No me conocen ni a mí ni a mi Padre. Si me conocieran, conocerían también a mi Padre».[a]'
  rationale: 'Se hicieron dos reparaciones menores: se sustituyó «a él[a]» por el dativo idiomático «le», y se ajustó «No conocen ni a mí ni a mi Padre» a «No me conocen ni a mí ni a mi Padre» para un español más natural y fiel al valor relacional de οἶδα. La nota alternativa se conserva, pero su anclaje debe ir en la cláusula condicional, no en «a él».'
