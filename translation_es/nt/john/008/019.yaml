review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: pregunta directa sobre el Padre, respuesta de Jesús con la doble negación correlativa y condición contrafactual. Sin embargo, «No conocen ni a mí ni a mi Padre» suena menos natural y ligeramente menos fiel en español que «No me conocen ni a mí ni a mi Padre», porque el objeto directo personal con «conocer» normalmente pide la forma pronominal/duplicada en esta construcción. También conviene eliminar «a él[a]» en favor de «le», ya que αὐτῷ está suficientemente representado por el clítico y la expansión enfática no está motivada por el griego ni por el español idiomático.'
  spanish_quality_summary: El texto es claro y digno, pero requiere un ajuste menor de naturalidad sintáctica. «Entonces le decían» funciona bien para el imperfecto. La capitalización de «Padre» es coherente con la decisión teológica documentada. La condición «Si me conocieran, conocerían también a mi Padre» es buena y legible. La nota al pie está correctamente formulada y anclada.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Jesús», «Dios/Padre» implícito y «conocer» para οἶδα están bien alineados con el expediente inglés y con la teología joánica. La mayúscula en «Padre» es una excepción contextual justificada, no un problema de glosario.
  issues:
  - severity: medium
    issue: Expresión dativa «a él[a]» en lugar de «le»
    rationale: El griego αὐτῷ simplemente marca el destinatario. En español narrativo, «Entonces le decían» es más natural y suficiente; «a él» añade énfasis no exigido por el texto y vuelve más pesada la frase.
  - severity: medium
    issue: «No conocen ni a mí ni a mi Padre» es poco idiomático
    rationale: Aunque comprensible, en español natural con objeto personal y contraste enfático se prefiere «No me conocen ni a mí ni a mi Padre». Esto preserva mejor la fuerza de οὔτε...οὔτε sin sonar forzado.
  revised_spanish_text: 'Entonces le decían: «¿Dónde está tu Padre?» Jesús respondió: «No me conocen ni a mí ni a mi Padre. Si me conocieran, conocerían también a mi Padre».[a]'
  revised_footnotes:
  - marker: a
    text: 'O, más formalmente: «Si me hubieran conocido, habrían conocido también a mi Padre». El griego condicional puede traducirse para resaltar su fuerza contrafactual.'
    reason: lexical_alternative
  revision_rationale: 'Se hicieron dos reparaciones menores: se sustituyó «a él[a]» por el dativo idiomático «le», y se ajustó «No conocen ni a mí ni a mi Padre» a «No me conocen ni a mí ni a mi Padre» para un español más natural y fiel al valor relacional de οἶδα. La nota alternativa se conserva, pero su anclaje debe ir en la cláusula condicional, no en «a él».'
