translation:
  language: es
  text: 'Entonces le decían: «¿Dónde está tu Padre?» Jesús respondió: «No me conocen ni a mí ni a mi Padre. Si me conocieran, conocerían también a mi Padre».[a]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Si me hubieran conocido, habrían conocido también a mi Padre». El griego condicional puede traducirse para resaltar su fuerza contrafactual.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγον
  english_pob_choice: they were saying
  chosen_spanish: le decían
  alternatives_spanish:
  - decían
  - seguían diciendo
  lexicon: BDAG
  rationale: El imperfecto expresa acción continua o repetida; «le decían» conserva esa duratividad de forma natural en español sin forzar una repetición excesiva.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Entonces
  alternatives_spanish:
  - Así que
  - Por tanto
  lexicon: BDAG
  rationale: Marca continuidad discursiva. «Entonces» es la opción más natural en español para enlazar la escena sin sobrecargarla con un matiz inferencial más fuerte del necesario.
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - le
  lexicon: BDAG
  rationale: En español, el dativo de destinatario se expresa con «le» o, en estilo directo, puede explicitarse como «a él». Aquí se mantiene el referente sin perder fluidez en la cita.
- source_word: Ποῦ ἐστιν ὁ πατήρ σου;
  english_pob_choice: Where is your Father?
  chosen_spanish: ¿Dónde está tu Padre?
  alternatives_spanish:
  - ¿Dónde está tu padre?
  lexicon: BDAG
  rationale: «Padre» se capitaliza para reflejar la referencia divina en el contexto joánico, igual que en el criterio inglés. Se conserva la pregunta literal sin paráfrasis.
- source_word: ἀπεκρίθη
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - les respondió
  lexicon: BDAG
  rationale: «Respondió» es natural en español narrativo y cubre el valor de respuesta a la pregunta sin añadir información.
- source_word: Οὔτε ἐμὲ οἴδατε οὔτε τὸν πατέρα μου
  english_pob_choice: You know neither me nor my Father
  chosen_spanish: No conocen ni a mí ni a mi Padre
  alternatives_spanish:
  - No me conocen ni a mí ni a mi Padre
  - No conocen ni a mí ni a mi Padre en absoluto
  lexicon: BDAG
  rationale: Se mantiene la correlación negativa οὔτε...οὔτε con «ni...ni». «Conocen» conserva el campo semántico amplio de οἶδα, que incluye conocimiento relacional, sin estrecharlo a «reconocen» u «entienden».
- source_word: οἶδατε / ᾔδειτε
  english_pob_choice: know / knew
  chosen_spanish: conocieran / conocerían
  alternatives_spanish:
  - supieran / sabrían
  - conocían / conocerían
  lexicon: BDAG
  rationale: En español, «conocer» transmite mejor la relación personal implícita en Juan que «saber». Además, la pareja imperfecto-apódosis con «si... conocerían» preserva la fuerza contrafactual de la condición sin forzar un pretérito compuesto.
- source_word: εἰ ἐμὲ ᾔδειτε, καὶ τὸν πατέρα μου ἂν ᾔδειτε
  english_pob_choice: If you knew me, you would know my Father also
  chosen_spanish: Si me conocieran, conocerían también a mi Padre
  alternatives_spanish:
  - Si me hubieran conocido, habrían conocido también a mi Padre
  - Si me conocieran, también conocerían a mi Padre
  lexicon: BDAG
  rationale: La construcción condicional con imperfecto y ἄν se vierte de modo contrafactual natural en español con imperfecto de subjuntivo y condicional. Se conserva «también» para reflejar καί.
- source_word: πατήρ / πατέρα μου
  english_pob_choice: Father / my Father
  chosen_spanish: Padre / mi Padre
  alternatives_spanish:
  - padre / mi padre
  lexicon: BDAG
  rationale: Se capitaliza «Padre» por la referencia a Dios en el contexto inmediato, manteniendo coherencia con la traducción inglesa y la teología joánica.
theological_decisions:
- issue: Referencia divina de «Padre»
  english_pob_reading: Capitalized 'Father' throughout the verse
  chosen_spanish_reading: «Padre» capitalizado cuando refiere a Dios
  alternative_spanish_readings:
  - «padre» en minúscula
  rationale: El diálogo en Juan identifica inequívocamente al Padre de Jesús con Dios; la mayúscula ayuda a la lectura sin introducir contenido ajeno al texto.
  doctrine_reference: Juan 5:18; Juan 8:19; filosofía de traducción §6
- issue: Valor de οἶδα en el vínculo Jesús-Padre
  english_pob_reading: Retained 'know' rather than interpretive expansions like 'recognize' or 'understand'
  chosen_spanish_reading: Retener «conocer» como verbo amplio de relación y reconocimiento
  alternative_spanish_readings:
  - saber
  - reconocer
  - entender
  rationale: En español, «conocer» preserva mejor la dimensión relacional de Juan que «saber», y evita estrechar el enunciado a mera información intelectual.
  doctrine_reference: Juan 17:3; filosofía de traducción §3
translation_notes:
  revision_awareness: Se corrigió la validación anterior añadiendo el marcador [a] directamente en el texto principal junto al destinatario de la cita, de modo que la nota queda anclada y no hay notas huérfanas. La redacción mantiene la decisión auditada de expresar la relación con el Padre mediante un condicional contrafactual natural en español.
  spanish_consistency_notes:
  - Se mantiene «Padre» con mayúscula para la referencia divina, en coherencia con el criterio POB y con el contexto joánico.
  - Se usa «conocer» de forma consistente para οἶδα, evitando alternar con «saber» o «entender» dentro del mismo versículo.
  - La secuencia negativa «ni... ni...» conserva la correlación οὔτε...οὔτε sin añadir intensificadores no presentes en el griego.
