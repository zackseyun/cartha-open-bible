  text: διὰ τί τὴν λαλιὰν τὴν ἐμὴν οὐ γινώσκετε; ὅτι οὐ δύνασθε ἀκούειν τὸν λόγον τὸν ἐμόν.
base_translation:
  language: en
  yaml_path: translation/nt/john/008/043.yaml
  text: Why do you not understand my way of speaking? Because you are not able to hear my word[a][b].
  footnotes:
  - marker: a
    text: Or 'my speech' or 'my language.' The Greek term refers to Jesus's manner of speaking, distinguished here from 'my word' in the next clause.
    reason: lexical_alternative
  - marker: b
    text: Or 'you cannot hear my word.'
    reason: lexical_alternative
