translation:
  language: es
  text: ¿Por qué no entienden mi manera de hablar[a]? Porque no pueden oír mi palabra[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi habla», o «mi lenguaje». El término griego se refiere al modo de hablar de Jesús, distinto de «mi palabra» en la cláusula siguiente.
    reason: lexical_alternative
  - marker: b
    text: O «no pueden oír mi palabra».
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τί / Why
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿A qué viene que
  - ¿Por qué razón
  lexicon: BDAG
  rationale: La pregunta directa reproduce el valor interrogativo de διὰ τί de forma natural en español sin añadir matiz no presente en el griego.
- source_word: λαλιὰν
  english_pob_choice: way of speaking
  chosen_spanish: manera de hablar
  alternatives_spanish:
  - habla
  - modo de hablar
  - lenguaje
  lexicon: BDAG
  rationale: λαλιά aquí apunta al modo o patrón de habla de Jesús, no al contenido del mensaje. «Manera de hablar» preserva esa distinción frente a λόγος en la segunda cláusula y suena natural en español.
- source_word: γινώσκετε
  english_pob_choice: understand
  chosen_spanish: entienden
  alternatives_spanish:
  - comprenden
  - conocen
  - reconocen
  lexicon: BDAG
  rationale: En este contexto γινώσκω expresa comprensión de lo que Jesús está diciendo. «Entienden» comunica la idea sin forzar un tecnicismo y mantiene el contraste con la incapacidad posterior.
- source_word: ὅτι
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Ya que
  - Pues
  lexicon: BDAG
  rationale: Introduce la razón de la pregunta anterior; «Porque» es la conexión causal más clara y natural en español.
- source_word: δύνασθε
  english_pob_choice: you are not able
  chosen_spanish: no pueden
  alternatives_spanish:
  - no son capaces de
  - no les es posible
  lexicon: BDAG
  rationale: El griego expresa incapacidad. «No pueden» conserva esa fuerza de manera idiomática; la alternativa más literal «no son capaces de» sería más pesada sin aportar precisión adicional.
- source_word: ἀκούειν
  english_pob_choice: hear
  chosen_spanish: oír
  alternatives_spanish:
  - escuchar
  - prestar oído a
  lexicon: BDAG
  rationale: ἀκούω significa primariamente «oír». Aunque el contexto sugiere receptividad, el texto base preserva el sentido de audición y deja implícita la implicación teológica, como en el audit trail inglés.
- source_word: λόγον
  english_pob_choice: word
  chosen_spanish: palabra
  alternatives_spanish:
  - mensaje
  - enseñanza
  - palabra hablada
  lexicon: BDAG
  rationale: λόγος en esta cláusula se refiere a la palabra o mensaje de Jesús. «Palabra» mantiene la relación con el griego y la distinción respecto de λαλιὰν, sin imponer una paráfrasis más interpretativa.
- source_word: τὴν ἐμὴν / τὸν ἐμόν
  english_pob_choice: my
  chosen_spanish: mi
  alternatives_spanish:
  - mía
  - mío
  lexicon: BDAG
  rationale: El posesivo se expresa de modo natural como adjetivo posesivo en español y conserva el paralelismo entre «mi manera de hablar» y «mi palabra».
theological_decisions:
- issue: La incapacidad de oír la palabra de Jesús
  english_pob_reading: Render the statement straightforwardly as inability without importing a doctrinal explanation.
  chosen_spanish_reading: 'Se traduce como incapacidad real: «no pueden oír mi palabra».'
  alternative_spanish_readings:
  - no quieren oír mi palabra
  - no están dispuestos a oír mi palabra
  - no pueden ni quieren oír mi palabra
  - no les es posible oír mi palabra por endurecimiento judicial
  rationale: El versículo afirma incapacidad, no simple desinterés ni una explicación doctrinal explícita. La traducción mantiene la tensión del texto y evita resolver aquí la cuestión de si la imposibilidad es moral, espiritual o judicial.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: 'Revisión alineada con el audit trail inglés: se preserva la distinción entre λαλιὰν (modo de hablar) y λόγος (palabra), y se mantiene la fuerza de incapacidad en οὐ δύνασθε sin añadir una explicación doctrinal no explicitada en el versículo.'
  spanish_consistency_notes:
  - Se evita traducir ambos miembros con la misma palabra para no borrar la distinción léxica del griego.
  - «Oír» se conserva para ἀκούειν, mientras que el sentido de receptividad permanece implícito.
  - El texto principal usa español natural y publicable, sin depender de calcos del inglés.
