translation:
  language: es
  text: Entonces[a] los escribas y los fariseos le trajeron una mujer sorprendida en adulterio, y habiéndola puesto en medio,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Continuación de la historia de la mujer sorprendida en adulterio (Juan 7:53–8:11). Véase la nota sobre Juan 7:53.
    reason: textual_critical
lexical_decisions:
- source_word: ἄγουσιν
  english_pob_choice: brought
  chosen_spanish: le llevaron
  alternatives_spanish:
  - la trajeron
  - la condujeron
  - la llevaron
  lexicon: BDAG
  rationale: El presente histórico griego se vierte naturalmente al pasado narrativo en español. 'Llevaron' comunica el traslado hacia Jesús sin sonar tan calco como 'trajeron' y conserva la dirección implícita del movimiento.
- source_word: γραμματεῖς καὶ οἱ Φαρισαῖοι
  english_pob_choice: the scribes and the Pharisees
  chosen_spanish: los escribas y los fariseos
  alternatives_spanish:
  - los escribas y fariseos
  - los escribas y los fariseos
  lexicon: BDAG
  rationale: La expresión designa dos grupos identificables; se conserva la forma con artículo para mantener la fuerza referencial del griego y la fluidez del español.
- source_word: γυναῖκα
  english_pob_choice: a woman
  chosen_spanish: una mujer
  alternatives_spanish:
  - una esposa
  - una persona
  lexicon: BDAG
  rationale: El sustantivo básico es 'mujer'. No hay base en el contexto para especificar 'esposa'.
- source_word: ἐν μοιχείᾳ κατειλημμένην
  english_pob_choice: caught in adultery
  chosen_spanish: sorprendida en adulterio
  alternatives_spanish:
  - sorprendida cometiendo adulterio
  - capturada en adulterio
  - hallada en adulterio
  lexicon: BDAG
  rationale: '''Sorprendida'' expresa bien el matiz de haber sido hallada en el acto, y ''en adulterio'' conserva el valor de la frase sin hacerla más técnica o judicial de lo que exige el griego.'
- source_word: στήσαντες αὐτὴν ἐν μέσῳ
  english_pob_choice: having set her in the midst
  chosen_spanish: habiéndola puesto en medio
  alternatives_spanish:
  - y poniéndola en medio
  - habiéndola colocado en medio
  - habiéndola hecho quedar en medio
  lexicon: BDAG
  rationale: El participio aoristo se vierte con una acción previa en perfecto español perifrástico/compuesto. 'Puesto en medio' refleja el posicionamiento central sin añadir sujetos o matices no presentes en el texto.
theological_decisions:
- issue: Alcance de la nota textual sobre la perícopa de la mujer adúltera
  english_pob_reading: Continuation of the story of the woman caught in adultery (John 7:53–8:11). See note on John 7:53.
  chosen_spanish_reading: Se señala la continuidad narrativa de la perícopa de la mujer sorprendida en adulterio (Juan 7:53–8:11). Véase la nota sobre Juan 7:53.
  alternative_spanish_readings:
  - No se añade nota textual en este versículo
  - Se formula una nota más extensa sobre la tradición manuscrita
  rationale: El versículo forma parte de una sección textualmente discutida; la nota en español preserva esa observación sin ampliar indebidamente el comentario ni resolver la cuestión crítica más allá del audit trail inglés.
  doctrine_reference: Crítica textual del Nuevo Testamento; perícopa adulterae (Juan 7:53–8:11)
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el cotejo informó acuerdo alto y ninguna observación pendiente. Se mantiene la solución inglesa estable para el movimiento narrativo, el hallazgo en adulterio y la colocación de la mujer en medio.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' y no hay términos divinos en este versículo.
  - Se conserva el orden de los grupos sociales ('los escribas y los fariseos') para reflejar el griego y el inglés auditado.
  - '''Sorprendida en adulterio'' mantiene el valor idiomático de caught in adultery sin cargarlo con tecnicismos legales.'
  - La nota textual se ancla en el 'Entonces' inicial para reflejar la continuidad marcada por la POB inglesa.
