    issue: «en el tesoro» para γαζοφυλάκιον suena ambiguo en español
    rationale: Aunque literalmente cercano, en español «tesoro» puede entenderse como riqueza o cámara del tesoro, no como el sector del templo asociado a las ofrendas. «En la sala del tesoro» o «en el tesoro del templo» comunica mejor el referente locativo.
  - severity: low
    issue: Puntuación algo rígida con punto y coma antes de «y nadie...»
    rationale: El griego coordina las cláusulas sencillamente con καί; en español moderno una coma basta y suena más natural, sin afectar el sentido.
  revised_spanish_text: Habló estas palabras en la sala del tesoro, mientras enseñaba en el templo[a], y nadie lo prendió[b], porque todavía no había llegado su hora.
  revised_footnotes:
