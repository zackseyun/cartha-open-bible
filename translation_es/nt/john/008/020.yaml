translation:
  language: es
  text: Habló estas palabras en la sala del tesoro, mientras enseñaba en el templo[a], y nadie lo prendió[b], porque todavía no había llegado su hora.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en los atrios del templo»; el término griego se refiere al complejo del templo, no solo al santuario interior.
    reason: lexical_alternative
  - marker: b
    text: En Juan, «su hora» se refiere al momento fijado para el sufrimiento y la glorificación de Jesús; alternativamente, «su hora designada».
    reason: cross_reference
lexical_decisions:
- source_word: ταῦτα τὰ ῥήματα
  english_pob_choice: these words
  chosen_spanish: estas palabras
  alternatives_spanish:
  - estos dichos
  - estas cosas
  lexicon: BDAG
  rationale: ῥήματα suele referirse a palabras pronunciadas o dichos. «Palabras» es natural en español y conserva la referencia al discurso inmediato sin ampliar indebidamente el sentido.
- source_word: ἐλάλησεν
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  - pronunció
  lexicon: BDAG
  rationale: λαλέω enfatiza el acto de hablar. «Habló» es idiomático en español y mantiene el enlace directo con «estas palabras».
- source_word: ἐν τῷ γαζοφυλακίῳ
  english_pob_choice: in the treasury
  chosen_spanish: en el tesoro
  alternatives_spanish:
  - en la tesorería
  - en el área del tesoro
  lexicon: BDAG
  rationale: γαζοφυλάκιον designa el tesoro o recinto del tesoro del templo. «Tesoro» conserva la imagen breve y reconocible; el matiz del área del templo se explica en la nota.
- source_word: διδάσκων
  english_pob_choice: while teaching
  chosen_spanish: mientras enseñaba
  alternatives_spanish:
  - enseñando
  lexicon: BDAG
  rationale: El participio expresa simultaneidad con la acción principal. «Mientras enseñaba» lo hace explícito y suena natural en español.
- source_word: ἐν τῷ ἱερῷ
  english_pob_choice: in the temple
  chosen_spanish: en el templo
  alternatives_spanish:
  - en los atrios del templo
  - en el recinto del templo
  lexicon: BDAG
  rationale: ἱερόν se refiere al complejo del templo, no al santuario interior solamente. «Templo» es fiel y comprensible; la amplitud del término se aclara en la nota.
- source_word: οὐδεὶς
  english_pob_choice: no one
  chosen_spanish: nadie
  alternatives_spanish:
  - ninguno
  lexicon: BDAG
  rationale: «Nadie» es el equivalente español más natural y claro.
- source_word: ἐπίασεν
  english_pob_choice: seized
  chosen_spanish: lo prendió
  alternatives_spanish:
  - lo detuvo
  - lo apresó
  - lo agarró
  lexicon: BDAG
  rationale: πιάζω significa tomar, aprehender o prender con fuerza, a menudo con intención hostil. «Lo prendió» conserva la fuerza de aprehensión sin reducirlo solo a un arresto formal.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - pues
  lexicon: BDAG
  rationale: Aquí introduce la causa de que nadie lo prendiera. «Porque» expresa con claridad esa relación causal.
- source_word: οὔπω ἐληλύθει
  english_pob_choice: had not yet come
  chosen_spanish: todavía no había llegado
  alternatives_spanish:
  - aún no había llegado
  - todavía no venía
  lexicon: BDAG
  rationale: El tiempo verbal señala que el momento señalado no se había presentado todavía. «Había llegado» mantiene el valor de llegada/arribo y funciona bien en español.
- source_word: ἡ ὥρα αὐτοῦ
  english_pob_choice: his hour
  chosen_spanish: su hora
  alternatives_spanish:
  - su hora señalada
  - su hora designada
  - su tiempo
  lexicon: BDAG
  rationale: En Juan, «la hora» es un término cargado teológicamente y apunta al momento designado de la pasión y glorificación de Jesús. «Su hora» preserva la expresión literal y la tensión teológica del texto.
theological_decisions:
- issue: Uso joánico de «la hora»
  english_pob_reading: Retain the literal expression 'his hour' in the main text.
  chosen_spanish_reading: Mantener «su hora» en el texto principal.
  alternative_spanish_readings:
  - su hora señalada
  - su tiempo
  rationale: La expresión tiene peso teológico en Juan y no debe vaciarse en una simple referencia cronológica. Mantenerla literal conserva la tensión narrativa y cristológica del evangelio.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: Texto revisado a la luz del paquete fuente original griego, la traducción auditada en inglés y su revisión posterior, sin cambios pendientes reportados en el historial más reciente.
  spanish_consistency_notes:
  - Se mantuvo «templo» para ἱερόν y «tesoro» para γαζοφυλάκιον, con nota explicativa para evitar confusión entre recinto y santuario.
  - Se conservó la expresión joánica «su hora» por consistencia teológica con el auditable inglés POB.
  - Se prefirió «nadie lo prendió» para preservar el sentido hostil de πιάζω sin introducir una formalidad legal no requerida por el contexto.
