translation:
  language: es
  text: Así que les dije que morirán en sus pecados. Porque, a menos que crean que yo soy[a], morirán en sus pecados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «que yo soy». El griego no expresa un predicado explícito después de «yo soy», y la expresión puede tener una resonancia más profunda en el Evangelio de Juan.
    reason: alternative_reading
lexical_decisions:
- source_word: εἶπον οὖν ὑμῖν
  english_pob_choice: So I told you
  chosen_spanish: Así que les dije
  alternatives_spanish:
  - Por eso les dije
  - Entonces les dije
  lexicon: BDAG
  rationale: οὖν introduce una relación discursiva/inferencial; en español, «Así que» comunica bien esa conexión sin volver la frase pesada. El aoristo εἶπον se expresa naturalmente con pasado simple «dije». El dativo ὑμῖν se refleja con «les».
- source_word: ἀποθανεῖσθε
  english_pob_choice: you will die
  chosen_spanish: morirán
  alternatives_spanish:
  - perecerán
  - van a morir
  lexicon: BDAG
  rationale: El futuro de ἀποθνῄσκω se traduce de forma directa con «morirán». «Perecerán» añadiría un matiz interpretativo no exigido por el verbo.
- source_word: ἐν ταῖς ἁμαρτίαις ὑμῶν
  english_pob_choice: in your sins
  chosen_spanish: en sus pecados
  alternatives_spanish:
  - en su pecado
  - con sus pecados
  lexicon: BDAG
  rationale: Se conserva el plural «pecados» para reflejar ἁμαρτίαις. La preposición ἐν expresa esfera o estado; «en sus pecados» mantiene esa idea sin forzar una paráfrasis.
- source_word: ἐὰν γὰρ μὴ πιστεύσητε
  english_pob_choice: For unless you believe
  chosen_spanish: Porque, si no creen
  alternatives_spanish:
  - Pues, si no creen
  - Porque, a menos que crean
  lexicon: BDAG
  rationale: La combinación ἐὰν γὰρ μὴ introduce la razón de la advertencia previa. «Porque, si no creen» suena natural en español y conserva tanto la causalidad de γάρ como la condición negativa de ἐάν μή.
- source_word: πιστεύσητε
  english_pob_choice: you believe
  chosen_spanish: creen
  alternatives_spanish:
  - crean
  - tengan fe
  lexicon: BDAG
  rationale: En el contexto joánico, πιστεύω suele traducirse por «creer». Se usa el subjuntivo presente español «creen» dentro de la cláusula condicional; «tengan fe» sería posible, pero desplaza el foco lexical principal.
- source_word: ὅτι ἐγώ εἰμι
  english_pob_choice: that I am
  chosen_spanish: que Yo soy
  alternatives_spanish:
  - que yo soy
  - que soy yo
  - que Yo soy el que soy
  lexicon: BDAG
  rationale: Se preserva la ausencia de predicado explícito en el griego con «Yo soy». El español requiere verbo copulativo explícito; la mayúscula en «Yo» ayuda a respetar la fuerza enfática y la posible resonancia teológica sin añadir un complemento que el texto no da.
theological_decisions:
- issue: Cómo reflejar la expresión joánica ἐγώ εἰμι sin añadir un predicado implícito
  english_pob_reading: The phrase can be read either as an idiomatic self-identification ('I am') or as an absolute expression with deeper resonance; the English POB preserved this tension in a footnote.
  chosen_spanish_reading: que Yo soy[a]
  alternative_spanish_readings:
  - que soy
  - que Yo soy el que soy
  - que Yo soy el Mesías
  rationale: El griego carece de predicado explícito después de ἐγώ εἰμι. En español no conviene completar la frase con «he» u otro sustantivo no presente. «Yo soy» mantiene la literalidad y deja abierta la resonancia más profunda del enunciado, sin resolverla de antemano.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión inglesa reciente pasó de «that I am he» a «that I am» para reflejar más directamente el griego ἐγώ εἰμι sin añadir un predicado implícito. La versión española sigue esa misma dirección y evita suplir un complemento inexistente, optando por «Yo soy» en una construcción naturalmente idiomática en español.
  spanish_consistency_notes:
  - Se mantiene «pecados» en plural para conservar ἁμαρτίαις.
  - Se evita «Cristo» o «Mesías» porque el pasaje no contiene el título.
  - Se usa «creer» en vez de «tener fe» para alinearse con πιστεύω en contexto joánico.
  - La mayúscula en «Yo» es una decisión estilística para reflejar la fuerza enfática del original sin convertirla en una paráfrasis.
