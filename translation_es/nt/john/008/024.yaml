revisions:
- from: Así que les dije que morirán en sus pecados. Porque, si no creen que Yo soy[a], morirán en sus pecados.
  to: Así que les dije que morirán en sus pecados. Porque, a menos que crean que yo soy[a], morirán en sus pecados.
  rationale: Se ajusta la cláusula condicional a «a menos que crean» para reflejar mejor ἐὰν γὰρ μὴ y producir un español más natural. Se normaliza «yo» en minúscula según la ortografía española, sin perder la posible resonancia teológica. Se rehace la nota para que explique la literalidad y la ambigüedad teológica, en vez de repetir el mismo texto del cuerpo.
