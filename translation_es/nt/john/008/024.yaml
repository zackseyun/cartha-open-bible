  source_alignment_summary: 'El borrador refleja bien la estructura del griego: la advertencia se repite dos veces, conserva el plural «pecados» y mantiene ἐγώ εἰμι sin predicado explícito. Sin embargo, hay ajustes necesarios para mayor fidelidad idiomática y consistencia gramatical en español.'
  spanish_quality_summary: El texto es generalmente claro, pero «Porque, si no creen» es menos natural y menos preciso que «porque si no creen» o mejor «porque, a menos que crean». Además, «Yo» con mayúscula no es una convención normal en español bíblico moderno y suena interpretativo. También hay una inconsistencia gramatical en la decisión léxica sobre «creen» como si fuera subjuntivo; en el texto conviene usar «crean» tras «a menos que».
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «pecados» y «Jesús/Dios» no presentan problemas aquí. La elección de «Yo soy» debe normalizarse a «yo soy» en minúscula por convención ortográfica española, sin perder la tensión teológica; la nota puede explicar la resonancia joánica.
  issues:
  - severity: medium
    issue: «Porque, si no creen» es una solución algo torpe para ἐὰν γὰρ μὴ
    rationale: El griego combina explicación y condición negativa. En español, «porque, si no creen» se entiende, pero suena menos natural y menos fino que «porque, a menos que crean»; además este último refleja mejor el valor de «unless» documentado en el rastro inglés.
  - severity: medium
    issue: Uso de mayúscula en «Yo soy»
    rationale: Capitalizar el pronombre «Yo» no es ortografía estándar en español y añade un énfasis visual no marcado por el griego. La fuerza teológica debe preservarse por el fraseo y la nota, no por una mayúscula interpretativa.
  - severity: low
    issue: 'La nota al pie dice «O: “que Yo soy”» aunque el texto principal ya dice eso'
    rationale: La nota no aporta una alternativa real al lector español si repite exactamente el texto principal. Debe reformularse para explicar que el griego dice literalmente «yo soy» sin predicado explícito y que puede tener resonancia más profunda.
  revised_spanish_text: Así que les dije que morirán en sus pecados. Porque, a menos que crean que yo soy[a], morirán en sus pecados.
