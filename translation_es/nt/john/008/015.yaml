translation:
  language: es
  text: Ustedes juzgan según la carne[a]; yo no juzgo a nadie.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «según criterios humanos» o «según la apariencia exterior».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑμεῖς
  english_pob_choice: You
  chosen_spanish: Ustedes
  alternatives_spanish:
  - Ustedes mismos
  lexicon: BDAG
  rationale: El pronombre plural de segunda persona está explícito y marca contraste con ἐγώ. En español, «ustedes» transmite con naturalidad el sujeto plural; la intensificación adicional se deja implícita en la oposición sintáctica.
- source_word: κατὰ τὴν σάρκα
  english_pob_choice: according to the flesh
  chosen_spanish: según la carne
  alternatives_spanish:
  - según criterios humanos
  - según la apariencia exterior
  lexicon: BDAG
  rationale: La POB inglesa conserva «flesh» para no resolver el giro idiomático con una paráfrasis. «Según la carne» mantiene la textura del original y la tensión semántica de σάρξ; las alternativas expresan el sentido probable, pero interpretan más de lo que el griego exige en el texto principal.
- source_word: κρίνετε
  english_pob_choice: judge
  chosen_spanish: juzgan
  alternatives_spanish:
  - emiten juicio
  - dictaminan
  lexicon: BDAG
  rationale: El verbo κρίνω se traduce de manera directa con «juzgar». En español, «juzgan» es claro, breve y corresponde al paralelismo del versículo.
- source_word: ἐγὼ
  english_pob_choice: I
  chosen_spanish: yo
  alternatives_spanish:
  - yo mismo
  lexicon: BDAG
  rationale: El pronombre explícito refuerza el contraste con «ustedes». En español, «yo» es suficiente y conserva la antítesis del griego sin sobrerrepresentar énfasis.
- source_word: οὐ κρίνω οὐδένα
  english_pob_choice: I judge no one
  chosen_spanish: no juzgo a nadie
  alternatives_spanish:
  - no juzgo a ninguna persona
  - no emito juicio sobre nadie
  lexicon: BDAG
  rationale: La negación con οὐδένα se expresa de forma natural con «a nadie». Esta opción preserva la brevedad y la fuerza del griego, sin alterar el sentido.
theological_decisions:
- issue: Sentido de σάρξ en la expresión κατὰ τὴν σάρκα
  english_pob_reading: Rendered as 'flesh' in the main text, allowing the phrase to denote judgment by merely human, worldly, or outward criteria without collapsing it into a technical doctrine of 'sinful nature.'
  chosen_spanish_reading: Se mantiene «carne» en el texto principal para conservar el giro bíblico y no reducirlo a una sola paráfrasis interpretativa.
  alternative_spanish_readings:
  - según criterios humanos
  - según la apariencia exterior
  - según una naturaleza caída
  rationale: La guía doctrinal favorece «carne» cuando el término conserva su fuerza literal o idiomática, y aquí el contexto admite un juicio meramente humano o superficial. Mantener «carne» preserva la tensión léxica y evita una explicación cerrada que el griego no obliga a adoptar.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy #3; Contested terms table for σάρξ'
translation_notes:
  revision_awareness: 'El pasaje coincide con el paquete fuente y la auditoría inglesa: no hubo revisiones aplicadas en la última pasada, y el veredicto de revisión fue de alta concordancia. La presente redacción sigue esa decisión estable.'
  spanish_consistency_notes:
  - Se preservó la distinción entre «carne» como traducción principal de σάρξ y las alternativas interpretativas en nota.
  - Se mantuvo el paralelismo breve del griego con sujeto explícito en ambas cláusulas.
  - No se introdujo vocabulario eclesiástico tradicional que ocultara el matiz del texto fuente.
