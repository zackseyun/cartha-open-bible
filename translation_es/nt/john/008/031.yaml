revisions:
- from: 'Así que Jesús estaba diciendo a los judíos que habían creído en él[a]: “Si permanecen en mi palabra, son verdaderamente mis discípulos”'
  to: 'Entonces Jesús estaba diciendo a los judíos que le habían creído[a]: «Si permanecen en mi palabra, verdaderamente son mis discípulos»'
  rationale: Se revisa para alinear el español con la decisión fuente del POB sobre πιστεύω con dativo αὐτῷ, preservando en el texto principal una forma directa y natural en español (‘le habían creído’) y dejando ‘habían creído en él’ como alternativa en nota. También se mejora la función de la nota para que realmente preserve la alternativa documentada. Se ajusta ‘Así que’ a ‘Entonces’ por mejor naturalidad discursiva. No se requiere adjudicación adicional porque la solución española es clara y de bajo riesgo.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:04:19Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del versículo y conserva adecuadamente Ἔλεγεν como imperfecto progresivo, λόγος como ‘palabra’, y μαθηταί como ‘discípulos’. Sin embargo, no preserva la decisión clave del POB sobre πεπιστευκότας αὐτῷ: el texto principal español cambia ‘habían creído him’/‘le habían creído’ a ‘habían creído en él’, resolviendo en el texto una tensión que el inglés mantuvo en nota. Además, la nota actual repite la misma lectura del texto principal como alternativa, por lo que no cumple su función. También conviene ajustar el modo verbal de ‘permanezcan’ para reflejar mejor el subjuntivo griego μετά ἐὰν.'
  spanish_quality_summary: 'El español es legible y digno, pero ‘Así que’ puede sonar algo más conclusivo/coloquial que ‘Entonces’ en este contexto narrativo. ‘Estaba diciendo’ es comprensible aunque algo pesado; ‘decía’ sería más natural, pero no es necesario forzarlo si se quiere conservar el imperfectivo visible. El problema principal de calidad es semántico más que estilístico: la combinación de texto y nota crea confusión en vez de claridad. ‘Si permanecen’ funciona en español conversacional, pero ‘si permanecen’ tras ‘si’ es menos ajustado al subjuntivo griego que ‘si permanecen/permanecen’ en algunos registros; la forma más fiel y estándar aquí es ‘si permanecen’ en indicativo en español no es incorrecta, pero ‘si permanecen’ no marca potencialidad. ‘Si permanecen’ sigue siendo aceptable; aun así, ‘si permanecen’ vs. ‘si permanecen’ no cambia. Mejor: ‘si permanecen’ could stay, but ‘si permanecen’ is less exact than ‘si permanecen’—to avoid this confusion, revise to ‘si permanecen’
    is impossible. Therefore the main needed fix is the πιστεύω phrase and note. Also remove the closing quote mismatch by keeping Spanish punctuation consistent.'
  glossary_alignment: 'No hay conflictos con terminología de proyecto mayor. ‘Jesús’, ‘palabra’ y ‘discípulos’ están alineados. La desviación importante es filosófica/lexical: πιστεύω + dativo debe mantenerse con mayor literalidad en el texto principal si el español lo permite; en español sí lo permite con ‘creerle’. Eso además evita importar ‘en’ donde el griego no la tiene.'
  issues:
  - severity: high
    issue: El texto principal traduce πεπιστευκότας αὐτῷ como ‘habían creído en él’ en vez de una forma más directa como ‘le habían creído’.
    rationale: El audit trail inglés documenta expresamente que la tensión del dativo debe preservarse en el texto principal, dejando ‘believed in him’ como alternativa en nota. En español, ‘creerle’ es natural y permite conservar esa decisión sin torpeza.
  - severity: high
    issue: La nota [a] no presenta una alternativa real, porque repite ‘habían creído en él’, igual que el texto principal.
    rationale: Una nota de alternativa debe distinguir lectura principal y lectura alterna. Además, la frase ‘que habían creído él’ como literal es gramaticalmente inaceptable en español; mejor explicar que el griego dice literalmente ‘que le habían creído’ o ‘que habían creído a él’.
  - severity: medium
    issue: La decisión lexical/theological rationale contradice el texto elegido.
    rationale: La justificación dice que ‘en él’ se conserva solo en nota, pero el texto principal ya lo usa. Esto rompe la coherencia documental del registro.
  - severity: medium
    issue: ‘Así que’ puede sonar más coloquial o más fuertemente inferencial que el simple enlace discursivo οὖν.
    rationale: ‘Entonces’ refleja con mayor naturalidad la continuidad narrativa sin sobrecargar la conclusión lógica.
  - severity: low
    issue: ‘Estaba diciendo’ es algo pesado en español narrativo.
    rationale: Aunque fiel al imperfecto, ‘decía’ sería más idiomático. No obstante, no es un error y puede mantenerse si se desea hacer visible el aspecto progresivo.
  revised_spanish_text: 'Entonces Jesús estaba diciendo a los judíos que le habían creído[a]: «Si permanecen en mi palabra, verdaderamente son mis discípulos»'
  revised_footnotes:
  - marker: a
    text: 'O: «a los judíos que habían creído en él». El griego dice literalmente «que le habían creído».'
    reason: alternative_reading
  revision_rationale: Se revisa para alinear el español con la decisión fuente del POB sobre πιστεύω con dativo αὐτῷ, preservando en el texto principal una forma directa y natural en español (‘le habían creído’) y dejando ‘habían creído en él’ como alternativa en nota. También se mejora la función de la nota para que realmente preserve la alternativa documentada. Se ajusta ‘Así que’ a ‘Entonces’ por mejor naturalidad discursiva. No se requiere adjudicación adicional porque la solución española es clara y de bajo riesgo.
