translation:
  language: es
  text: 'Entonces Jesús estaba diciendo a los judíos que le habían creído[a]: «Si permanecen en mi palabra, verdaderamente son mis discípulos»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a los judíos que habían creído en él». El griego dice literalmente «que le habían creído».'
    reason: alternative_reading
lexical_decisions:
- source_word: Ἔλεγεν
  english_pob_choice: was saying
  chosen_spanish: estaba diciendo
  alternatives_spanish:
  - decía
  lexicon: BDAG
  rationale: El imperfecto griego sugiere una acción discursiva en curso; ‘estaba diciendo’ conserva mejor esa duración que un pretérito puntual. ‘Decía’ también sería posible, pero aquí ‘estaba diciendo’ hace más visible el aspecto imperfectivo.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - Entonces
  - Por tanto
  lexicon: BDAG
  rationale: Introduce continuidad inferencial o discursiva. ‘Así que’ suena natural en español moderno y mantiene la conexión sin forzar una conclusión demasiado técnica.
- source_word: πρὸς τοὺς πεπιστευκότας αὐτῷ Ἰουδαίους
  english_pob_choice: to the Jews who had believed him
  chosen_spanish: a los judíos que habían creído en él
  alternatives_spanish:
  - a los judíos que habían creído en Jesús
  - a los judíos creyentes
  lexicon: BDAG
  rationale: Se conserva la construcción directa del griego con dativo αὐτῷ como ‘en él’ solo en nota, porque el texto base no usa εἰς. ‘Habían creído’ refleja el participio perfecto πεπιστευκότας, y ‘judíos’ mantiene el sustantivo del texto sin suavizarlo con ‘creyentes’.
- source_word: Ἐὰν
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  lexicon: BDAG
  rationale: Introduce una condición real con subjuntivo; ‘si’ es la equivalencia natural y precisa en español.
- source_word: μείνητε
  english_pob_choice: remain
  chosen_spanish: permanecen
  alternatives_spanish:
  - se mantienen
  - perseveren
  - permanezcan
  lexicon: BDAG
  rationale: En español, ‘permanecer’ es correcto, pero en una cláusula condicional exhortativa ‘permanecen’ ofrece una fluidez idiomática mejor. Se conserva la idea joánica de continuidad, residencia o persistencia.
- source_word: ἐν τῷ λόγῳ τῷ ἐμῷ
  english_pob_choice: in my word
  chosen_spanish: en mi palabra
  alternatives_spanish:
  - en mi palabra/enseñanza
  - en mi enseñanza
  lexicon: BDAG
  rationale: Aunque λόγος puede implicar ‘palabra’, ‘mensaje’ o ‘enseñanza’, se mantiene ‘palabra’ para respetar el lenguaje joánico y la resonancia teológica. En español, ‘en mi palabra’ es natural y fiel.
- source_word: ἀληθῶς
  english_pob_choice: truly
  chosen_spanish: verdaderamente
  alternatives_spanish:
  - realmente
  - de veras
  lexicon: BDAG
  rationale: Expresa autenticidad o genuinidad con un tono digno y claro. ‘Verdaderamente’ preserva la fuerza adverbial sin sonar coloquial.
- source_word: μαθηταί μού ἐστε
  english_pob_choice: you are truly my disciples
  chosen_spanish: son verdaderamente mis discípulos
  alternatives_spanish:
  - son realmente mis discípulos
  - son mis verdaderos discípulos
  lexicon: BDAG
  rationale: ‘Discípulos’ es el equivalente regular en el contexto evangélico. Se prefiere ‘son’ para una formulación más fluida en español tras la cláusula condicional; el posesivo ‘mis’ mantiene la relación de pertenencia/seguimiento.
theological_decisions:
- issue: Construcción πιστεύω con dativo αὐτῷ
  english_pob_reading: who had believed him
  chosen_spanish_reading: que habían creído en él
  alternative_spanish_readings:
  - que habían creído él
  - que lo habían creído
  rationale: El griego literal usa dativo sin preposición. En español, ‘creer él’ es imposible, y ‘creerlo’ sonaría a creer una proposición, no a depositar fe en una persona. ‘Creído en él’ se adopta como solución natural y doctrinalmente reconocible, pero la nota conserva la tensión textual del griego y evita borrar la diferencia con una fórmula excesivamente interpretativa.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation tradition); §3 (Preserve theological tension rather than resolve it)
- issue: Referencia de λόγος aplicada a Jesús
  english_pob_reading: my word
  chosen_spanish_reading: mi palabra
  alternative_spanish_readings:
  - mi enseñanza
  - lo que digo
  rationale: ‘Palabra’ mantiene la densidad joánica y permite abarcar mensaje, enseñanza y dicho sin reducir el alcance del término. Traducirlo solo como ‘enseñanza’ aclararía un sentido posible, pero perdería resonancias literarias y teológicas del evangelio.
  doctrine_reference: John 1:1; John 8:31; POB terminology for λόγος
- issue: Orden y énfasis de ‘verdaderamente mis discípulos’
  english_pob_reading: you are truly my disciples
  chosen_spanish_reading: son verdaderamente mis discípulos
  alternative_spanish_readings:
  - son mis verdaderos discípulos
  - son realmente mis discípulos
  rationale: La forma española conserva la predicación de identidad y el adverbio de autenticidad. No se introduce una lectura más fuerte de ‘verdaderos discípulos’ que podría desplazar el foco desde la autenticidad del seguimiento hacia una cualidad ontológica distinta.
  doctrine_reference: Discipulado en el Evangelio de Juan; Translation philosophy §3
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el audit trail inglés; la presente propuesta sigue la lectura estable de alta concordancia y traslada sus decisiones léxicas al español sin introducir cambios no justificados.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando el texto fuente lo requiera explícitamente; este versículo no contiene el nombre divino.
  - Se mantiene ‘palabra’ para λόγος conforme al uso joánico y a la terminología POB.
  - Se conserva ‘judíos’ como término fuente del texto, sin sustituciones interpretativas.
  - La nota al pie preserva la tensión del dativo griego al permitir la alternativa ‘en él’ sin imponerla en el cuerpo principal.
