lexical_decisions:
- source_word: λέγουσιν
  english_pob_choice: said
  chosen_spanish: le dijeron
  alternatives_spanish:
  - decían
  - le decían
  lexicon: BDAG
  rationale: El presente histórico griego se vierte de manera natural en pasado simple en español narrativo; el dativo αὐτῷ exige explícitamente el complemento indirecto «le».
- source_word: Διδάσκαλε
  english_pob_choice: Teacher
  chosen_spanish: Maestro
  alternatives_spanish:
  - Maestro, Rabí
  - Doctor
  lexicon: BDAG
  rationale: «Διδάσκαλε» es un vocativo de respeto y de enseñanza; «Maestro» conserva la función sin introducir un matiz confesional más específico que el griego no exige aquí.
- source_word: κατείληπται
  english_pob_choice: has been caught
  chosen_spanish: ha sido sorprendida
  alternatives_spanish:
  - fue sorprendida
  - está sorprendida
  lexicon: BDAG
  rationale: El perfecto pasivo indica acción completada con resultado vigente; en español, «ha sido sorprendida» comunica bien ese estado resultante sin perder la pasiva.
- source_word: ἐπαυτοφώρῳ
  english_pob_choice: in the very act
  chosen_spanish: en el mismo acto
  alternatives_spanish:
  - en el acto mismo
  - en flagrante delito
  lexicon: BDAG
  rationale: Se conserva el valor idiomático de inmediatez y flagrancia sin recurrir a un giro demasiado técnico o policial que estreche el sentido.
- source_word: μοιχευομένη
  english_pob_choice: of committing adultery
  chosen_spanish: de adulterio
  alternatives_spanish:
  - mientras cometía adulterio
  - cometiendo adulterio
  lexicon: BDAG
  rationale: El participio presente queda bien integrado en español con la construcción nominal «sorprendida en el mismo acto de adulterio», que reproduce la relación idiomática sin forzar un calco verbal.
theological_decisions:
- issue: Continuidad textual de la perícopa de la mujer sorprendida en adulterio
  english_pob_reading: Continuation of the account of the woman caught in adultery (John 7:53–8:11). See note on John 7:53.
  chosen_spanish_reading: Continuación del relato de la mujer sorprendida en adulterio (Juan 7:53–8:11). Véase la nota sobre Juan 7:53.
  alternative_spanish_readings:
  - Pasaje incluido como continuación de Juan 7:53–8:11
  - Continuación del episodio de la mujer sorprendida en adulterio
  rationale: Aunque este versículo no repite por sí mismo la nota textual, la traducción conserva la marca de continuidad mediante la nota a pie de página, siguiendo el aviso crítico de la POB inglesa y el contexto manuscrito del pasaje.
  doctrine_reference: Crítica textual / tradición manuscrita del NT
translation_notes:
  revision_awareness: Se siguió la lectura inglesa POB sin cambios sustanciales; el texto griego y el audit trail concuerdan estrechamente con la versión publicada en inglés, y no se documentan revisiones aplicadas.
  spanish_consistency_notes:
  - Se prefirió «Maestro» para Διδάσκαλε por ser el vocativo natural y reverente en español.
  - Se mantuvo la pasiva perifrástica «ha sido sorprendida» para reflejar el perfecto pasivo griego.
  - «En el mismo acto» conserva el matiz idiomático de ἐπαυτοφώρῳ sin añadir connotaciones ajenas.
