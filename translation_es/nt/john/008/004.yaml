revisions:
- from: 'Le dijeron: «Maestro, esta mujer ha sido sorprendida en el mismo acto de adulterio».[a]'
  to: 'Le dijeron[a]: «Maestro, esta mujer ha sido sorprendida en el mismo acto de cometer adulterio».'
  rationale: 'Se ajusta únicamente la frase final para reflejar con mayor fidelidad y naturalidad el sentido de ἐπαυτοφώρῳ μοιχευομένη: la mujer fue atrapada mientras cometía adulterio. También se reubica el ancla de la nota para una integración más clara con el versículo.'
