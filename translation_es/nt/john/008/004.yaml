review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: λέγουσιν αὐτῷ → «Le dijeron», Διδάσκαλε → «Maestro», y el perfecto pasivo κατείληπται está adecuadamente representado con una forma perfecta pasiva en español. Sin embargo, «en el mismo acto de adulterio» no preserva con suficiente naturalidad ni precisión el valor combinado de ἐπαυτοφώρῳ μοιχευομένη, que describe haber sido atrapada mientras cometía adulterio, es decir, «en el mismo acto de cometer adulterio».'
  spanish_quality_summary: El español es claro y digno, pero la frase «en el mismo acto de adulterio» suena algo incompleta o poco idiomática en español eclesial general. Una leve reparación a «en el mismo acto de cometer adulterio» mejora naturalidad y fidelidad sin volverse calco. La colocación de la nota también conviene ajustarse al segmento narrativo principal, no necesariamente después de las comillas finales con punto exterior.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Maestro» para Διδάσκαλε es apropiado. No aparecen términos sensibles del glosario principal como Yahvé, Mesías, esclavo, etc. La nota textual mantiene correctamente la continuidad de la perícopa.
  issues:
  - severity: medium
    issue: La expresión «en el mismo acto de adulterio» no expresa plenamente el participio μοιχευομένη.
    rationale: El griego no solo nombra el delito, sino la acción en progreso al momento de ser atrapada. En español, «acto de adulterio» puede entenderse, pero suena menos natural y menos preciso que «acto de cometer adulterio» o «mientras cometía adulterio».
  - severity: low
    issue: La ubicación de la nota [a] al final de la cita puede ser menos precisa que anclarla a la cláusula narrativa.
    rationale: La nota se refiere a la continuidad textual del relato entero en este versículo; anclarla tras «Le dijeron[a]:» o tras el inicio del versículo puede integrarse mejor, aunque esto es secundario.
  revised_spanish_text: 'Le dijeron[a]: «Maestro, esta mujer ha sido sorprendida en el mismo acto de cometer adulterio».'
  revised_footnotes:
  - marker: a
    text: Continuación del relato de la mujer sorprendida en adulterio (Juan 7:53–8:11). Véase la nota sobre Juan 7:53.
    reason: textual_variant
  revision_rationale: 'Se ajusta únicamente la frase final para reflejar con mayor fidelidad y naturalidad el sentido de ἐπαυτοφώρῳ μοιχευομένη: la mujer fue atrapada mientras cometía adulterio. También se reubica el ancla de la nota para una integración más clara con el versículo.'
