translation:
  language: es
  text: 'Le dijeron[a]: «Maestro, esta mujer ha sido sorprendida en el mismo acto de cometer adulterio».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Continuación del relato de la mujer sorprendida en adulterio (Juan 7:53–8:11). Véase la nota sobre Juan 7:53.
