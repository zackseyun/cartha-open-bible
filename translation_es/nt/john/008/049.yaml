translation:
  language: es
  text: 'Jesús respondió[a]: «Yo no tengo un demonio, sino que honro a mi Padre, y ustedes me deshonran».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más interpretativa: «No estoy poseído por un demonio».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: BDAG
  rationale: La forma narrativa normal en español es «respondió»; conserva la función de respuesta en diálogo sin añadir matices no presentes. «Contestó» también sería posible, pero «respondió» suena más natural y sobrio en este contexto.
- source_word: δαιμόνιον
  english_pob_choice: a demon
  chosen_spanish: un demonio
  alternatives_spanish:
  - un espíritu demoníaco
  - estar endemoniado
  lexicon: BDAG
  rationale: 'Se mantiene el sentido léxico directo del acusativo con ἔχω: «tener un demonio». «Un demonio» preserva la fuerza de la expresión sin convertirla de entrada en una paráfrasis interpretativa.'
- source_word: οὐκ ἔχω
  english_pob_choice: do not have
  chosen_spanish: no tengo
  alternatives_spanish:
  - no poseo
  - no estoy endemoniado
  lexicon: BDAG
  rationale: La construcción española más natural y fiel al giro griego es «no tengo». «No poseo» suena más técnico y «no estoy endemoniado» ya interpreta el modismo más allá del texto base.
- source_word: τιμῶ
  english_pob_choice: honor
  chosen_spanish: honro
  alternatives_spanish:
  - doy honra a
  - honro
  lexicon: BDAG
  rationale: «Honro» conserva el contraste lexical con ἀτιμάζω. En español, el verbo directo es claro y evita una formulación más pesada como «doy honra a».
- source_word: τὸν πατέρα μου
  english_pob_choice: my Father
  chosen_spanish: a mi Padre
  alternatives_spanish:
  - a mi padre
  - a mi Padre
  lexicon: BDAG
  rationale: En Juan, «Padre» funciona como título relacional-teológico para Dios. La mayúscula señala ese valor sin cambiar el contenido; el dativo con «a» refleja bien el complemento de objeto de «honrar».
- source_word: ἀτιμάζετέ
  english_pob_choice: dishonor
  chosen_spanish: deshonran
  alternatives_spanish:
  - me tratan con deshonra
  - me deshonran
  lexicon: BDAG
  rationale: «Deshonran» reproduce de forma transparente el antónimo de τιμῶ. Mantiene el paralelismo honor/deshonra mejor que opciones más explicativas como «me faltan al respeto».
- source_word: με
  english_pob_choice: me
  chosen_spanish: me
  alternatives_spanish:
  - me
  lexicon: BDAG
  rationale: Se conserva el pronombre directo sin expansión, como objeto del verbo «deshonran».
theological_decisions:
- issue: Referencia de «mi Padre»
  english_pob_reading: Jesús se refiere a Dios como su Padre en un sentido distintivo joánico; en inglés se capitaliza Father.
  chosen_spanish_reading: Jesús se refiere a Dios como «mi Padre», con mayúscula en Padre para señalar el título divino-relacional.
  alternative_spanish_readings:
  - mi padre
  - mi Padre
  rationale: En el contexto de Juan, la referencia no es a un padre humano ordinario. La mayúscula ayuda a comunicar el valor teológico sin introducir palabras ajenas al texto.
  doctrine_reference: Credo niceno; filosofía de traducción §6
- issue: Sentido de «tener un demonio»
  english_pob_reading: Se conserva el modismo literal «have a demon» en el texto principal, con una alternativa interpretativa.
  chosen_spanish_reading: Se conserva el modismo literal «no tengo un demonio» en el texto principal.
  alternative_spanish_readings:
  - no estoy poseído por un demonio
  - no estoy endemoniado
  rationale: El griego es directo y la POB inglesa retiene esa literalidad; por eso el español principal también la mantiene. Las opciones interpretativas explican el sentido probable, pero son más amplias que el texto fuente.
  doctrine_reference: Filosofía de traducción §1, §3
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego y el trazado auditado en inglés. No se detectan revisiones aplicadas en el contexto inglés más reciente; por ello se conserva la lectura estable con una única nota para la alternativa interpretativa de δαιμόνιον + ἔχω.
  spanish_consistency_notes:
  - Se mantiene «Padre» con mayúscula por coherencia joánica y con la decisión inglesa de capitalizar Father.
  - Se usa «demonio» y no «espíritu demoníaco» para conservar el giro breve del griego.
  - Se preserva el contraste verbal honor/deshonran entre τιμῶ y ἀτιμάζετέ.
  - El tono es sobrio y publicable, sin añadir explicaciones dentro del versículo principal.
