translation:
  language: es
  text: 'Pero cuando[a] seguían preguntándole, se enderezó y les dijo: «El que de entre ustedes esté sin pecado sea el primero en arrojar una piedra contra ella».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Este versículo forma parte de la historia de la mujer sorprendida en adulterio (Juan 7:53–8:11), ausente de los manuscritos griegos más antiguos. Véase la nota en Juan 7:53.
    reason: textual_variant
lexical_decisions:
- source_word: ἐπέμενον ἐρωτῶντες
  english_pob_choice: continued questioning
  chosen_spanish: seguían preguntándole
  alternatives_spanish:
  - persistían en preguntarle
  - continuaban interrogándolo
  lexicon: BDAG
  rationale: La combinación imperfectiva expresa una acción sostenida y repetida. «Seguían preguntándole» conserva la continuidad del cuestionamiento sin sonar artificial en español.
- source_word: ἀνακύψας
  english_pob_choice: straightened up
  chosen_spanish: se enderezó
  alternatives_spanish:
  - se incorporó
  - levantó la cabeza
  lexicon: BDAG
  rationale: El participio aoristo indica un cambio físico de postura. «Se enderezó» comunica de forma natural que volvió a ponerse erguido desde una postura inclinada.
- source_word: ἀναμάρτητος
  english_pob_choice: without sin
  chosen_spanish: sin pecado
  alternatives_spanish:
  - sin pecado alguno
  - sin culpa
  - sin haber pecado
  lexicon: BDAG
  rationale: «Sin pecado» reproduce con naturalidad la cualidad moral del adjetivo y mantiene la tensión jurídica y ética del contexto. «Sin pecado alguno» sería más enfático, pero menos fluido.
- source_word: λίθον βαλέτω
  english_pob_choice: throw a stone
  chosen_spanish: arrojar una piedra
  alternatives_spanish:
  - lanzar una piedra
  - tirar una piedra
  lexicon: BDAG
  rationale: «Arrojar una piedra» conserva el registro digno y el valor forense del gesto de ejecutar el acto de apedrear. «Tirar» sería demasiado coloquial.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego bizantino provisto y coincide sustancialmente con la línea auditada en inglés; no se introdujeron cambios de sentido ni ajustes doctrinales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva la fórmula judicial «arrojar una piedra» para reflejar el acto de lapidación sin añadir interpretaciones.
  - «Sin pecado» preserva la ambigüedad moral/legal presente en el adjetivo griego.
