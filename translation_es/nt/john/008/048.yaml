translation:
  language: es
  text: 'Los judíos[a] le respondieron y le dijeron: «¿No decimos[b] con razón que tú eres samaritano y tienes un demonio[c]?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or «los judeanos» o «los líderes judíos» en algunos contextos; en Juan, «los judíos» a menudo se refiere a un grupo particular que se opone a Jesús, no a todo el pueblo judío sin excepción.
    reason: alternative_reading
  - marker: b
    text: 'O: «¿No decimos justamente…?»'
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «tener un demonio»; algunas traducciones lo vuelven más interpretativo como «estar endemoniado».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀπεκρίθησαν
  english_pob_choice: answered
  chosen_spanish: respondieron
  alternatives_spanish:
  - contestaron
  - respondieron diciendo
  lexicon: BDAG
  rationale: «Respondieron» reproduce el valor narrativo de ἀποκρίνομαι en un intercambio verbal y suena natural en español. Mantiene la función de respuesta sin añadir énfasis innecesario.
- source_word: οἱ Ἰουδαῖοι
  english_pob_choice: The Jews
  chosen_spanish: los judíos
  alternatives_spanish:
  - los judeanos
  - los líderes judíos
  lexicon: BDAG
  rationale: La forma griega es literalmente «los judíos». En este contexto se conserva la designación directa, y la nota aclara que en Juan a menudo se refiere a un grupo opositor concreto, no a todos los judíos sin excepción.
- source_word: εἶπαν αὐτῷ
  english_pob_choice: said to him
  chosen_spanish: le dijeron
  alternatives_spanish:
  - le hablaron
  - le dijeron en respuesta
  lexicon: BDAG
  rationale: «Le dijeron» es la continuación natural del relato después de «respondieron» y conserva la redundancia narrativa del griego sin recargar la frase.
- source_word: Οὐ καλῶς λέγομεν ἡμεῖς
  english_pob_choice: Are we not right in saying
  chosen_spanish: ¿No decimos con razón
  alternatives_spanish:
  - ¿No decimos justamente
  - ¿No hablamos correctamente cuando decimos
  lexicon: BDAG
  rationale: La pregunta retórica negativa en griego espera afirmación; «¿No decimos con razón?» preserva esa fuerza y el valor de καλῶς como «con razón/correctamente».
- source_word: Σαμαρίτης
  english_pob_choice: a Samaritan
  chosen_spanish: samaritano
  alternatives_spanish:
  - un samaritano
  lexicon: BDAG
  rationale: El predicado nominativo en español funciona naturalmente sin artículo en esta exclamación insultante. «Samaritano» conserva el valor étnico-religioso del término.
- source_word: δαιμόνιον ἔχεις
  english_pob_choice: have a demon
  chosen_spanish: tienes un demonio
  alternatives_spanish:
  - estás endemoniado
  - estás poseído por un demonio
  lexicon: BDAG
  rationale: 'Se mantiene la lectura más literal del griego: «tener un demonio». «Tienes» reproduce ἔχεις y evita la interpretación más explicativa de «estar poseído».'
theological_decisions:
- issue: Referencia de οἱ Ἰουδαῖοι en Juan
  english_pob_reading: The Jews
  chosen_spanish_reading: los judíos
  alternative_spanish_readings:
  - los judeanos
  - los líderes judíos
  rationale: Se conserva la correspondencia directa con el griego y, para no suavizar el texto, no se sustituye por una formulación más interpretativa en el cuerpo principal. La nota explica el alcance contextual del término en Juan para evitar una lectura indiscriminada.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; preserve contextual tension rather than resolve it.'
- issue: Formulación de la acusación demonológica
  english_pob_reading: have a demon
  chosen_spanish_reading: tienes un demonio
  alternative_spanish_readings:
  - estás endemoniado
  - estás poseído por un demonio
  rationale: La traducción principal sigue la estructura léxica del griego y evita transformar la acusación en una frase interpretativa. Esto preserva la dureza verbal del insulto tal como aparece en el texto fuente.
  doctrine_reference: Lexical transparency and source restraint.
translation_notes:
  revision_awareness: 'Coincide sustancialmente con la última pasada revisada: no se requiere cambio textual. Se conserva la lectura directa del griego, con nota aclaratoria para el alcance de «los judíos» y con una traducción literal de «tener un demonio».'
  spanish_consistency_notes:
  - Se mantiene «judíos» para reflejar el texto griego y el audit trail inglés, con aclaración contextual en nota.
  - Se usa «respondieron y le dijeron» para reproducir la doble verbalidad narrativa del griego.
  - Se prefiere «tienes un demonio» por transparencia léxica frente a opciones más interpretativas.
  - La puntuación interrogativa y el trato directo siguen la sintaxis natural del español sin perder la fuerza retórica del original.
