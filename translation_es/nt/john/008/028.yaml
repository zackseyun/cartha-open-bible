    text: «Levanten» puede aludir tanto al acto físico de levantarlo como, en el uso de Juan, a su exaltación.
    reason: lexical_alternative
  - marker: b
    text: 'O: «yo soy». El griego es simplemente ἐγώ εἰμι, sin predicado expreso.'
    reason: alternative_reading
