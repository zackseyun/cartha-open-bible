- from: 'Entonces Jesús dijo[a]: «Cuando levanten al Hijo del Hombre, entonces sabrán que yo soy[b], y que no hago nada por mi propia cuenta, sino que hablo estas cosas tal como me enseñó el Padre»[c].'
  to: 'Entonces Jesús dijo: «Cuando levanten[a] al Hijo del Hombre, entonces sabrán que yo soy[b], y que no hago nada por mi propia cuenta, sino que hablo estas cosas tal como me enseñó el Padre».'
  rationale: Se elimina una nota estilística innecesaria y se reubica la nota sobre ὑψώσητε al verbo correspondiente, para que el aparato español siga mejor el texto fuente y el rastro del POB sin cambiar el sentido principal de la traducción.
