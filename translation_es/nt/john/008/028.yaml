translation:
  language: es
  text: 'Entonces Jesús dijo: «Cuando levanten[a] al Hijo del Hombre, entonces sabrán que yo soy[b], y que no hago nada por mi propia cuenta, sino que hablo estas cosas tal como me enseñó el Padre».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Levanten» puede aludir tanto al acto físico de levantarlo como, en el uso de Juan, a su exaltación.
    reason: lexical_alternative
  - marker: b
    text: 'O: «yo soy». El griego es simplemente ἐγώ εἰμι, sin predicado expreso.'
    reason: alternative_reading
lexical_decisions:
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Entonces
  alternatives_spanish:
  - Así que
  - Por tanto
  lexicon: BDAG
  rationale: La partícula conecta el discurso con lo anterior; «Entonces» conserva la continuidad narrativa y suena natural en español sin cargar una inferencia demasiado fuerte.
- source_word: Ὅταν
  english_pob_choice: When
  chosen_spanish: Cuando
  alternatives_spanish:
  - Siempre que
  - Cada vez que
  lexicon: BDAG
  rationale: El griego introduce una contingencia futura específica; «Cuando» reproduce bien ese valor en español y evita la repetición que implicarían otras opciones.
- source_word: ὑψώσητε
  english_pob_choice: lift up
  chosen_spanish: levanten
  alternatives_spanish:
  - alcen
  - exalten
  - levanten en alto
  lexicon: BDAG
  rationale: «Levanten» conserva la imagen física sin resolver la ambigüedad joánica entre ser levantado en la cruz y exaltación. «Alcen» es posible, pero «levanten» resulta más natural y suficientemente abierto.
- source_word: τὸν υἱὸν τοῦ ἀνθρώπου
  english_pob_choice: the Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - el Hijo del Hombre
  lexicon: BDAG
  rationale: Es la forma estándar y más fiel para el autodesignación de Jesús; mantiene la resonancia bíblica y no la reemplaza por una paráfrasis explicativa.
- source_word: γνώσεσθε
  english_pob_choice: you will know
  chosen_spanish: sabrán
  alternatives_spanish:
  - conocerán
  - llegarán a saber
  lexicon: BDAG
  rationale: El futuro de γινώσκω aquí expresa reconocimiento o toma de conciencia futura; «sabrán» es idiomático y claro en español, aunque «conocerán» también sería posible.
- source_word: ἐγώ εἰμι
  english_pob_choice: I am he
  chosen_spanish: yo soy
  alternatives_spanish:
  - yo soy él
  - yo soy el que soy
  lexicon: BDAG
  rationale: Se preserva la elipsis del griego sin añadir un predicado. El español natural requiere una formulación breve; «yo soy» mantiene la tensión teológica y deja abierta la posible alusión solemne que la nota inglesa retiene.
- source_word: ἀπ’ ἐμαυτοῦ
  english_pob_choice: from myself
  chosen_spanish: por mi propia cuenta
  alternatives_spanish:
  - de mí mismo
  - por iniciativa propia
  lexicon: BDAG
  rationale: La idea es origen/iniciativa independiente. «Por mi propia cuenta» comunica bien esa autonomía negada por Jesús en español contemporáneo; no elimina el sentido literal, sino que lo hace inteligible.
- source_word: ποιῶ οὐδέν
  english_pob_choice: I do nothing
  chosen_spanish: no hago nada
  alternatives_spanish:
  - no hago nada en absoluto
  - no hago cosa alguna
  lexicon: BDAG
  rationale: Conserva la afirmación general de dependencia respecto del Padre. La negación simple es la equivalencia más natural y fiel.
- source_word: καθὼς ἐδίδαξέν με ὁ πατήρ
  english_pob_choice: just as the Father taught me
  chosen_spanish: tal como me enseñó el Padre
  alternatives_spanish:
  - como me enseñó el Padre
  - así como me enseñó el Padre
  lexicon: BDAG
  rationale: «Tal como» reproduce la correspondencia de καθώς sin sonar rígido. «El Padre» mantiene la referencia joánica al Padre celestial.
- source_word: ταῦτα λαλῶ
  english_pob_choice: I speak these things
  chosen_spanish: hablo estas cosas
  alternatives_spanish:
  - digo estas cosas
  - pronuncio estas cosas
  lexicon: BDAG
  rationale: λαλέω destaca el acto de hablar; «hablo estas cosas» conserva el demostrativo ταῦτα y evita forzar un giro más interpretativo.
theological_decisions:
- issue: Rendering of the elliptical ἐγώ εἰμι
  english_pob_reading: I am he
  chosen_spanish_reading: yo soy
  alternative_spanish_readings:
  - yo soy él
  - yo soy el que soy
  rationale: El griego carece de predicado expreso y puede leerse con cierta solemnidad. En español, la forma más fiel y sobria es «yo soy», que preserva la ambigüedad sin cerrarla. No se explicita «él» porque no aparece en el texto, y añadirlo debilitaría la tensión del dicho.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Sentido de ὑψώσητε en contexto joánico
  english_pob_reading: lift up
  chosen_spanish_reading: levanten
  alternative_spanish_readings:
  - crucifiquen
  - exalten
  - alcen
  rationale: 'El verbo conserva en Juan una doble referencia: levantamiento físico y exaltación. «Levanten» permite que el lector perciba esa doble carga sin convertirla en una sola interpretación.'
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: La versión inglesa auditada quedó sin cambios en la última revisión; se ha conservado su decisión de mantener la ambigüedad de ὑψώσητε y la forma elíptica de ἐγώ εἰμι, trasladándolas al español sin resolverlas interpretativamente.
  spanish_consistency_notes:
  - Se usó «Padre» con artículo definido solo en la mención relacional joánica habitual.
  - Se mantuvo «Hijo del Hombre» como título fijo, no como una paráfrasis antropológica.
  - Se prefirió una forma española natural que preserve la tensión teológica sin añadir glosas al texto principal.
  - La nota [b] se vincula directamente a la frase «yo soy» para conservar la ambigüedad del griego.
  - La nota [c] se vincula a «levanten» para mantener el doble sentido de ὑψώσητε.
