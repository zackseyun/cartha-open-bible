  text: εἶπεν ⸀οὖν ὁ Ἰησοῦς· Ὅταν ὑψώσητε τὸν υἱὸν τοῦ ἀνθρώπου, τότε γνώσεσθε ὅτι ἐγώ εἰμι, καὶ ἀπ’ ἐμαυτοῦ ποιῶ οὐδέν, ἀλλὰ καθὼς ἐδίδαξέν με ὁ ⸀πατὴρ ταῦτα λαλῶ.
base_translation:
  language: en
  yaml_path: translation/nt/john/008/028.yaml
  text: So Jesus said[a], “When you lift up the Son of Man, then you will know that I am he, and that I do nothing from myself, but just as the Father taught me[b], I speak these things.”
  footnotes:
  - marker: a
    text: 'Or: “I am.” The Greek is simply “I am” (ἐγώ εἰμι), without an expressed predicate.'
    reason: alternative_reading
  - marker: b
    text: “Lift up” can refer both to being raised up physically and, in John’s usage, to exaltation.
    reason: lexical_alternative
