review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del griego y en general preserva las decisiones del POB: «Entonces», «Cuando», «levanten», «el Hijo del Hombre», «yo soy», «no hago nada por mi propia cuenta», y «tal como me enseñó el Padre» son opciones defendibles y fieles. También conserva adecuadamente la ambigüedad de ὑψώσητε y la elipsis solemne de ἐγώ εἰμι. Sin embargo, hay un problema de alineación documental: la nota sobre «levanten» está anclada al cierre de la oración en vez de al verbo o frase pertinente, y la nota a sobre «dijo» no corresponde a una necesidad real del texto fuente ni del rastro de auditoría inglés.'
  spanish_quality_summary: El español es claro, natural y digno. No obstante, la nota a es innecesaria y distrae, porque «Entonces Jesús dijo» no crea una ambigüedad que requiera nota. Además, para mayor naturalidad y mejor ubicación de notas, conviene anclar la nota de «levanten» directamente en ese verbo. El resto del versículo lee bien en español eclesial amplio.
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto: «Jesús», «Hijo del Hombre», «Padre» y «yo soy» están bien manejados. La decisión de mantener «yo soy» en el texto principal es coherente con la rationale teológica documentada, incluso aunque el inglés principal use «I am he», porque aquí el propio expediente español justifica preservar la elipsis. «Levanten» mantiene correctamente la tensión entre levantamiento físico y exaltación.'
  issues:
  - severity: medium
    issue: Nota a innecesaria sobre «dijo»
    rationale: El griego εἶπεν no introduce una dificultad textual o semántica que requiera nota en español. La nota no proviene del rastro inglés y añade ruido editorial sin ayudar a la fidelidad.
  - severity: medium
    issue: Anclaje incorrecto de la nota sobre «levanten»
    rationale: La nota lexical sobre ὑψώσητε debe anclarse en «levanten», no al final de la cita. Así se preserva la correspondencia exacta entre nota y palabra fuente, como exige la disciplina del proyecto.
  revised_spanish_text: 'Entonces Jesús dijo: «Cuando levanten[a] al Hijo del Hombre, entonces sabrán que yo soy[b], y que no hago nada por mi propia cuenta, sino que hablo estas cosas tal como me enseñó el Padre».'
  revised_footnotes:
