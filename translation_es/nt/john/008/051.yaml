    changes_summary: Removed the redundant and unnatural final 'forever.' The Greek expression οὐ μὴ ... εἰς τὸν αἰῶνα is adequately conveyed by 'will certainly never see death.'
translation:
  language: es
  text: 'En verdad[a], en verdad, les digo: si alguien guarda mi palabra, no verá[b] la muerte jamás.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «En verdad, en verdad» reproduce el énfasis del doble ἀμήν y conserva el tono solemne del discurso de Jesús.
    reason: lexical_alternative
  - marker: b
    text: La expresión griega «no ver la muerte» es un modismo; aquí se mantiene de forma literal y la negación intensiva «jamás» comunica el alcance de οὐ μὴ ... εἰς τὸν αἰῶνα.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀμὴν ἀμὴν
  english_pob_choice: Truly, truly
  chosen_spanish: En verdad[a], en verdad
  alternatives_spanish:
  - Amén, amén
  - Ciertamente, ciertamente
  lexicon: BDAG
  rationale: Conserva la repetición enfática característica de Jesús en Juan. «En verdad» suena natural en español bíblico sin perder la solemnidad ni la fuerza del doble ἀμήν.
- source_word: λέγω ὑμῖν
  english_pob_choice: I say to you
  chosen_spanish: les digo
  alternatives_spanish:
  - les digo a ustedes
  - les hablo
  lexicon: BDAG
  rationale: «Les digo» expresa la dirección directa del discurso sin recargar la frase. El plural «les» refleja el destinatario del contexto inmediato, mientras la formulación sigue siendo breve y solemne.
- source_word: ἐάν τις
  english_pob_choice: if anyone
  chosen_spanish: si alguien
  alternatives_spanish:
  - si alguno
  - si una persona
  lexicon: BDAG
  rationale: «Si alguien» comunica bien el indefinido inclusivo del griego en español natural. Mantiene el alcance general sin volver la frase pesada.
- source_word: τὸν ἐμὸν λόγον
  english_pob_choice: my word
  chosen_spanish: mi palabra
  alternatives_spanish:
  - mi mensaje
  - lo que digo
  lexicon: BDAG
  rationale: «Palabra» es la opción más directa y conserva la resonancia joánica de λόγος sin explicitarlo como «mensaje» ni debilitar su fuerza como palabra dicha y recibida.
- source_word: τηρήσῃ
  english_pob_choice: keeps
  chosen_spanish: guarda
  alternatives_spanish:
  - obedece
  - conserva
  lexicon: BDAG
  rationale: «Guardar» puede abarcar obedecer, preservar y aferrarse a la palabra, y por eso preserva mejor la amplitud semántica de τηρέω que un verbo más estrecho como «obedecer».
- source_word: θάνατον
  english_pob_choice: death
  chosen_spanish: la muerte
  alternatives_spanish:
  - morirá
  - la muerte física
  lexicon: BDAG
  rationale: Se mantiene el sustantivo directo del griego, sin especificar si la referencia es física, escatológica o ambas. Esto respeta la tensión teológica que el texto deja abierta.
- source_word: οὐ μὴ θεωρήσῃ
  english_pob_choice: he will certainly never see
  chosen_spanish: no verá[b]
  alternatives_spanish:
  - jamás verá
  - de ningún modo verá
  lexicon: BDAG
  rationale: La negación enfática οὐ μὴ se expresa con «no verá ... jamás», que comunica con claridad la fuerza absoluta del griego. Se mantiene «verá» para respetar el verbo literal θεωρέω y el modismo «ver muerte».
- source_word: εἰς τὸν αἰῶνα
  english_pob_choice: forever
  chosen_spanish: jamás
  alternatives_spanish:
  - para siempre
  - nunca
  lexicon: BDAG
  rationale: Aunque literalmente la expresión apunta a «para siempre»/«por el siglo», en esta construcción con fuerte negación funciona idiomáticamente como «nunca jamás». «Jamás» evita redundancia en español y conserva el valor intensivo del griego.
theological_decisions:
- issue: Sentido de «ver la muerte»
  english_pob_reading: retain the idiom 'see death' without explicating it as physical death alone or eternal death alone
  chosen_spanish_reading: mantener el modismo «ver la muerte» sin resolverlo como muerte física solamente ni como muerte eterna solamente
  alternative_spanish_readings:
  - experimentar la muerte
  - gustar la muerte
  - ver la muerte eterna
  rationale: 'El griego conserva el modismo y no obliga a una aclaración doctrinal en el texto principal. La traducción mantiene la tensión: puede abarcar más que la mera muerte física, pero no la redefine.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Alcance del sujeto indefinido
  english_pob_reading: use 'anyone' with subsequent 'he'
  chosen_spanish_reading: usar «alguien» con verbo singular impersonal, sin introducir una glosa de género
  alternative_spanish_readings:
  - si alguno guarda mi palabra
  - si una persona guarda mi palabra
  rationale: El griego usa una construcción singular general. En español, «si alguien...» comunica inclusión sin necesidad de marcar género en el sujeto; el texto no requiere resolver un pronombre posterior explícito.
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral.'
translation_notes:
  revision_awareness: La revisión inglesa más reciente eliminó un «forever» final redundante y decidió que «will certainly never see death» basta para expresar οὐ μὴ ... εἰς τὸν αἰῶνα. En español, eso se refleja evitando un añadido como «para siempre» al final y usando «jamás» como intensificador idiomático natural.
  spanish_consistency_notes:
  - Se mantiene «palabra» para λόγος en coherencia con el uso joánico habitual.
  - Se preserva el modismo «ver la muerte» sin cambiarlo por una paráfrasis doctrinal.
  - La negación fuerte se expresa con «no ... jamás», que suena natural y evita una redundancia innecesaria.
  - El registro es reverente pero contemporáneo, apto para lectura pública e impresa.
