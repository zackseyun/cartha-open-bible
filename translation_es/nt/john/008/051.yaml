  text: ἀμὴν ἀμὴν λέγω ὑμῖν, ἐάν τις τὸν ⸂ἐμὸν λόγον⸃ τηρήσῃ, θάνατον οὐ μὴ θεωρήσῃ εἰς τὸν αἰῶνα.
base_translation:
  language: en
  yaml_path: translation/nt/john/008/051.yaml
  text: Truly[a], truly, I say to you, if anyone keeps my word[b], he will certainly never see death.
  footnotes:
  - marker: a
    text: Or 'he will certainly never experience death.' The Greek literally says 'see death,' an idiom that may denote experiencing death.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'forever' renders the Greek idiom εἰς τὸν αἰῶνα, used here with strong negation to mean 'never ever.'
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
