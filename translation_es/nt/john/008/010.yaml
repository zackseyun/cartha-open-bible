translation:
  language: es
  text: 'Entonces Jesús[a], al incorporarse y no ver a nadie más que a la mujer, le dijo: «Mujer, ¿dónde están aquellos acusadores tuyos? ¿Nadie te ha condenado?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Este versículo forma parte de la historia de la mujer sorprendida en adulterio (Juan 7:53–8:11), que falta en los manuscritos griegos más antiguos. Véase la nota sobre Juan 7:53.
    reason: textual_variant
lexical_decisions:
- source_word: Ἀνακύψας
  english_pob_choice: straightened up
  chosen_spanish: al incorporarse
  alternatives_spanish:
  - se enderezó
  - levantándose
  - alzó la vista
  lexicon: BDAG
  rationale: El griego indica que Jesús vuelve a alzarse desde una postura inclinada; en español, «incorporarse» comunica el cambio de postura sin introducir una acción no explícita.
- source_word: θεασάμενος
  english_pob_choice: seeing
  chosen_spanish: no ver
  alternatives_spanish:
  - al ver
  - viendo
  - al notar
  lexicon: BDAG
  rationale: La escena subraya la percepción visual de que ya no queda nadie alrededor; «no ver a nadie» reproduce la observación directa con naturalidad en español.
- source_word: κατήγοροί
  english_pob_choice: accusers
  chosen_spanish: acusadores
  alternatives_spanish:
  - denunciantes
  - querellantes
  - acusadores contra ti
  lexicon: BDAG
  rationale: El sustantivo describe a quienes presentan la acusación. «Acusadores» conserva la relación forense del término y coincide con el sentido del contexto.
- source_word: κατέκρινεν
  english_pob_choice: condemned
  chosen_spanish: te ha condenado
  alternatives_spanish:
  - te ha juzgado
  - te ha sentenciado
  - ha pronunciado condena contra ti
  lexicon: BDAG
  rationale: En este contexto legal, el verbo comunica una sentencia de culpabilidad. «Condenado» mantiene la fuerza judicial de la pregunta de Jesús.
