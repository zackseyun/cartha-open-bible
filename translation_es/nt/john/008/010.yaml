translation_notes:
  revision_awareness: 'El inglés POB no muestra cambios revisados en este versículo: la traducción vigente se mantuvo sin modificaciones, y la presente propuesta sigue de cerca sus decisiones léxicas principales (straightened up, seeing, condemned) con adaptación natural al español.'
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς según el estándar del proyecto.
  - Se evita «SEÑOR» porque el texto usa ὁ Ἰησοῦς, no un sustituto del nombre divino.
  - «Acusadores» conserva el matiz legal de κατήγοροί σου sin sobreexplicar la relación pronominal.
  - La pregunta final se formula en presente perfecto («¿te ha condenado?») para reflejar el valor resultativo del griego en español natural.
