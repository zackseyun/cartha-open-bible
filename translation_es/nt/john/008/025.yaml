  glossary_alignment: No hay términos del glosario mayor en juego aquí. «Jesús» está correcto. La elección «desde el principio» concuerda con la decisión POB auditada. La fórmula «lo que les he estado diciendo» preserva bien la fuerza discursiva continua.
