  source_alignment_summary: 'El borrador refleja correctamente el sentido básico del griego: Ἰησοῦς → «Jesús», ἐπορεύθη → «fue», εἰς τὸ ὄρος τῶν Ἐλαιῶν → «al monte de los Olivos». También preserva la nota textual del POB inglés. Sin embargo, para mejor fidelidad discursiva, «Pero» sobrerrepresenta δέ; en este contexto narrativo introductorio conviene «Y» o dejarlo sin conjunción. Dado que el inglés auditado eligió «But», la mejor solución en español eclesial natural es «Y Jesús…», evitando un contraste demasiado fuerte no exigido por el griego.'
