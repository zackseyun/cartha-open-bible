lexical_decisions:
- source_word: Ἰησοῦς
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - Jesús
  lexicon: nombre propio
  rationale: El nombre propio griego Ἰησοῦς corresponde de forma directa a «Jesús» en español.
- source_word: ἐπορεύθη
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - fue caminando
  - se dirigió
  - partió
  lexicon: BDAG
  rationale: El aoristo de πορεύομαι expresa movimiento simple hacia un destino; «fue» comunica de manera natural ese desplazamiento sin añadir matices no presentes en el griego.
- source_word: ὄρος
  english_pob_choice: Mount
  chosen_spanish: monte
  alternatives_spanish:
  - montaña
  - cerro
  lexicon: BDAG
  rationale: Con el complemento «de los Olivos», «monte» reproduce el topónimo tradicional y claro en español, equivalente a «Mount» en inglés.
- source_word: Ἐλαιῶν
  english_pob_choice: Olives
  chosen_spanish: de los Olivos
  alternatives_spanish:
  - de las aceitunas
  - de los olivos
  lexicon: BDAG
  rationale: El genitivo plural alude al lugar cubierto de olivos; la forma establecida en español es «monte de los Olivos», que conserva el valor geográfico del original.
theological_decisions:
- issue: Continuidad textual con la perícopa de la mujer adúltera
  english_pob_reading: This verse is a continuation of the story of the woman caught in adultery (John 7:53–8:11). See note on John 7:53 for textual evidence.
  chosen_spanish_reading: Este versículo se presenta con la nota de continuidad textual mediante la referencia al pasaje de Juan 7:53–8:11.
  alternative_spanish_readings:
  - No incluir ninguna nota de continuidad textual
  - Incluir una nota explicativa más extensa
  rationale: El griego del versículo no contiene la nota, pero el audit trail inglés la preserva por razones textuales. En español se mantiene esa misma advertencia en nota para no ocultar la tensión textual documentada.
  doctrine_reference: Crítica textual del NT; perícopa adulterae
translation_notes:
  revision_awareness: El texto griego recibido coincide con el audit trail inglés sin revisiones aplicadas; la decisión principal fue conservar la nota textual documentada y verter el movimiento con un verbo natural en español.
