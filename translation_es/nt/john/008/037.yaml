translation:
  language: es
  text: Sé que ustedes son descendencia de Abraham[a]; pero están buscando matarme, porque mi palabra no encuentra cabida en ustedes[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «simiente de Abraham» o «descendientes de Abraham».
    reason: lexical_alternative
  - marker: b
    text: O «mi palabra no encuentra espacio en ustedes».
    reason: lexical_alternative
lexical_decisions:
- source_word: σπέρμα Ἀβραάμ
  english_pob_choice: Abraham’s offspring
  chosen_spanish: descendencia de Abraham
  alternatives_spanish:
  - simiente de Abraham
  - hijos de Abraham
  lexicon: BDAG
  rationale: σπέρμα es un sustantivo singular colectivo que aquí señala descendencia física. En español, «descendencia» conserva ese sentido colectivo de manera natural y evita la posible rigidez o ambigüedad doctrinal de «simiente».
- source_word: ζητεῖτέ με ἀποκτεῖναι
  english_pob_choice: you are seeking to kill me
  chosen_spanish: están buscando matarme
  alternatives_spanish:
  - buscan matarme
  - están tratando de matarme
  lexicon: BDAG
  rationale: La forma presente progresiva expresa bien la acción en curso. «Buscando matarme» mantiene la fuerza verbal de ζητέω + infinitivo sin convertirlo demasiado pronto en una expresión de intención subjetiva.
- source_word: ὁ λόγος ὁ ἐμὸς
  english_pob_choice: my word
  chosen_spanish: mi palabra
  alternatives_spanish:
  - mi palabra dicha
  - mi mensaje
  lexicon: BDAG
  rationale: λόγος se traduce aquí de forma directa como «palabra», conservando el léxico joánico y la ambivalencia de sentido entre palabra, mensaje y discurso. «Mensaje» sería más interpretativo.
- source_word: οὐ χωρεῖ ἐν ὑμῖν
  english_pob_choice: has no place in you
  chosen_spanish: no encuentra cabida en ustedes
  alternatives_spanish:
  - no tiene lugar en ustedes
  - no cabe en ustedes
  lexicon: BDAG
  rationale: χωρέω puede implicar hacer lugar, recibir o dar espacio. «No encuentra cabida» preserva la imagen de receptividad interior sin estrechar el matiz a una sola opción como «entender» o «aceptar».
- source_word: ὅτι
  english_pob_choice: that / because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Aquí introduce la razón por la cual buscan matarlo. «Porque» comunica con claridad la relación causal que el contexto exige.
- source_word: οἶδα ὅτι
  english_pob_choice: I know that
  chosen_spanish: Sé que
  alternatives_spanish:
  - Yo sé que
  - Conozco que
  lexicon: BDAG
  rationale: La fórmula queda natural en español con «Sé que». Mantiene el carácter declarativo de οἶδα sin añadir énfasis innecesario.
theological_decisions:
- issue: σπέρμα Ἀβραάμ como afirmación de linaje físico sin resolver la tensión espiritual del contexto
  english_pob_reading: Render σπέρμα Ἀβραάμ in a plainly genealogical sense ('Abraham’s offspring') without importing the later distinction of spiritual children into this verse.
  chosen_spanish_reading: Traducirlo como descendencia física de Abraham, sin suavizar la confrontación que sigue ni convertir este enunciado en una afirmación de filiación espiritual.
  alternative_spanish_readings:
  - hijos de Abraham
  - linaje de Abraham
  rationale: El contexto inmediato afirma un hecho genealógico mientras expone la contradicción moral y espiritual de sus oyentes. «Descendencia» mantiene esa tensión sin resolverla prematuramente.
  doctrine_reference: Preservar la tensión teológica del pasaje sin armonizarla artificialmente.
translation_notes:
  revision_awareness: El texto griego y el control inglés coinciden de manera alta; no se requieren revisiones sustantivas. Se ha mantenido el valor colectivo de σπέρμα y la metáfora de χωρέω sin resolverla de forma explicativa.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se conservó un registro sobrio y publicable, evitando calcos innecesarios y manteniendo la sintaxis clara en español.
  - La traducción de λόγος como «palabra» preserva la terminología joánica habitual en el proyecto.
