  to: Tengo muchas cosas que decir y que juzgar acerca de ustedes[a]. Pero el que me envió es verdadero, y lo que oí de él[b], estas cosas digo al mundo.
  rationale: 'Se hizo un ajuste menor de estilo y naturalidad: «hablo al mundo» se cambió a «digo al mundo». El griego permite ambas posibilidades en contexto, y «digo» funciona mejor en español con el objeto explícito «estas cosas», evitando un calco rígido mientras conserva el sentido, el presente verbal y el énfasis discursivo.'
