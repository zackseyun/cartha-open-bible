translation:
  language: es
  text: Tengo muchas cosas que decir y que juzgar acerca de ustedes[a]. Pero el que me envió es verdadero, y lo que oí de él[b], estas cosas digo al mundo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sobre ustedes».
    reason: lexical_alternative
  - marker: b
    text: O «lo que oí de él, estas cosas digo al mundo». El griego repite explícitamente el demostrativo «estas cosas» para dar énfasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: πολλὰ
  english_pob_choice: many things
  chosen_spanish: muchas cosas
  alternatives_spanish:
  - mucho
  lexicon: BDAG
  rationale: El plural neutro sustantivado pide una solución plural en español. «Muchas cosas» conserva la pluralidad y suena natural; «mucho» perdería el matiz de pluralidad y quedaría menos idiomático.
- source_word: περὶ ὑμῶν
  english_pob_choice: concerning you
  chosen_spanish: acerca de ustedes
  alternatives_spanish:
  - sobre ustedes
  - con respecto a ustedes
  lexicon: BDAG
  rationale: La preposición περί con genitivo marca referencia o tema. «Acerca de ustedes» mantiene ese valor temático sin volver la frase pesada; en español también puede expresarse como «con respecto a ustedes», pero es más formal y menos directo.
- source_word: λαλεῖν
  english_pob_choice: to say
  chosen_spanish: decir
  alternatives_spanish:
  - hablar
  lexicon: BDAG
  rationale: En la primera pareja infinitiva, «decir» comunica el contenido verbal de forma más natural en español al lado de «juzgar». «Hablar» quedaría menos preciso en este paralelismo.
- source_word: κρίνειν
  english_pob_choice: to judge
  chosen_spanish: juzgar
  alternatives_spanish:
  - condenar
  - pronunciar juicio sobre
  lexicon: BDAG
  rationale: κρίνω conserva aquí un sentido amplio de juzgar o evaluar judicialmente. «Juzgar» preserva ese alcance sin restringirlo indebidamente a «condenar».
- source_word: ὁ πέμψας με
  english_pob_choice: the one who sent me
  chosen_spanish: el que me envió
  alternatives_spanish:
  - el que me mandó
  - quien me envió
  lexicon: BDAG
  rationale: El participio articular se vierte de manera natural como una relativa sustantivada. «El que me envió» mantiene la referencia personal implícita sin añadir «Padre», que no aparece explícitamente en el griego.
- source_word: ἀληθής
  english_pob_choice: '''true'''
  chosen_spanish: verdadero
  alternatives_spanish:
  - verdad
  - fiel
  - auténtico
  lexicon: BDAG
  rationale: En Juan, ἀληθής puede implicar verdadero, genuino o fiable. «Verdadero» es la opción más directa y digna en español, y conserva la amplitud semántica sin cerrar la lectura a solo «fiel» o «auténtico».
- source_word: ἃ ἤκουσα παρ’ αὐτοῦ
  english_pob_choice: what I heard from him
  chosen_spanish: lo que oí de él
  alternatives_spanish:
  - lo que escuché de él
  - las cosas que oí de él
  lexicon: BDAG
  rationale: 'El relativo neutro plural se vierte de forma idiomática como contenido: «lo que oí de él». Esta opción conserva la recepción de un mensaje y evita una literalidad torpe.'
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  lexicon: BDAG
  rationale: El demostrativo está expresamente repetido en griego para énfasis. «Estas cosas» mantiene ese recurso discursivo mejor que omitirlo o reducirlo a «esto».
- source_word: λαλῶ
  english_pob_choice: I speak
  chosen_spanish: hablo
  alternatives_spanish:
  - digo
  - hablo públicamente
  lexicon: BDAG
  rationale: Aquí λαλέω funciona como enunciación dirigida hacia afuera. «Hablo» preserva el presente y suena natural al final de la cláusula, mientras que «digo» sonaría redundante tras «tener cosas que decir».
- source_word: εἰς τὸν κόσμον
  english_pob_choice: to the world
  chosen_spanish: al mundo
  alternatives_spanish:
  - para el mundo
  - hacia el mundo
  lexicon: BDAG
  rationale: Con verbos de habla, εἰς puede indicar dirección hacia una audiencia. «Al mundo» es la equivalencia más natural en español y conserva el movimiento discursivo sin sobrecargar con un calco de «hacia/into».
theological_decisions:
- issue: Referente implícito de «el que me envió»
  english_pob_reading: An implicit reference to the Father is preserved without making the referent explicit in the translation.
  chosen_spanish_reading: Se conserva la referencia implícita al Padre sin nombrarlo explícitamente.
  alternative_spanish_readings:
  - Pero el Padre que me envió es verdadero
  rationale: El contexto joánico identifica al remitente como el Padre, pero el griego aquí usa solo la expresión participial. Mantener «el que me envió» respeta la forma del texto y evita introducir una explicitación que el versículo no formula.
  doctrine_reference: John 8:26; Translation philosophy §1, §3
- issue: Fuerza de κρίνειν
  english_pob_reading: Rendered broadly as 'to judge' rather than 'to condemn.'
  chosen_spanish_reading: Se traduce ampliamente como «juzgar», no como «condenar».
  alternative_spanish_readings:
  - condenar
  - pronunciar sentencia contra
  rationale: El contexto inmediato permite un sentido judicial amplio sin exigir la idea más estrecha de condenación. «Juzgar» preserva la tensión del pasaje y evita cerrar el alcance semántico.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: Se revisó la puntuación para reflejar la continuidad del griego sin imitar de manera rígida la puntuación inglesa. También se conservó la repetición enfática de «estas cosas» y se evitó añadir «Padre» en el texto principal, en línea con el control auditado del original.
  spanish_consistency_notes:
  - Se mantuvo «verdadero» para ἀληθής, coherente con el uso joánico y con el audit trail en inglés.
  - Se eligió «hablo» para λαλῶ en la cláusula final para diferenciarlo de «decir» en el infinitivo inicial, siguiendo la distinción funcional del griego y el criterio del POB inglés.
  - Se usó «al mundo» para εἰς τὸν κόσμον porque el movimiento está dirigido a una audiencia; en este contexto español suena más natural que «en el mundo» o «hacia el mundo».
  - Se evitó «SEÑOR» o una forma de ocultamiento para el referente divino, ya que aquí el griego no contiene κύριος ni el Tetragrámaton.
