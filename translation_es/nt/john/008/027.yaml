translation:
  language: es
  text: No entendieron[a] que les estaba hablando del Padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No supieron que les estaba hablando del Padre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐκ ἔγνωσαν
  english_pob_choice: They did not understand
  chosen_spanish: No entendieron
  alternatives_spanish:
  - No supieron
  - No conocieron
  - No reconocieron
  lexicon: BDAG
  rationale: γινώσκω aquí expresa falta de comprensión del sentido de las palabras de Jesús, no solo ausencia de información. «Entendieron» comunica bien esa fuerza cognitiva en español sin añadir interpretaciones ajenas al texto.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - —
  lexicon: BDAG
  rationale: Introduce la cláusula de contenido de lo que no llegaron a comprender; «que» es la equivalencia normal y transparente en español.
- source_word: τὸν πατέρα
  english_pob_choice: the Father
  chosen_spanish: el Padre
  alternatives_spanish:
  - el padre
  lexicon: BDAG
  rationale: En Juan, «el Padre» funciona como designación titular de Dios en relación con Jesús. En español, la mayúscula no es necesaria dentro del flujo de la frase, pero el artículo y la capitalización del sintagma en notas explican su referencia divina sin cambiar el contenido.
- source_word: αὐτοῖς
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - para ellos
  lexicon: BDAG
  rationale: 'El dativo con λέγω se expresa naturalmente en español con objeto indirecto: «les estaba hablando»; evita una construcción más rígida y conserva el destinatario del discurso.'
- source_word: ἔλεγεν
  english_pob_choice: was speaking
  chosen_spanish: estaba hablando
  alternatives_spanish:
  - estaba diciendo
  - les hablaba
  - hablaba
  lexicon: BDAG
  rationale: El imperfecto griego presenta una acción en curso. «Estaba hablando» reproduce bien el aspecto progresivo y suena natural en español.
theological_decisions:
- issue: Referente de «el Padre»
  english_pob_reading: Jesus was speaking about God the Father.
  chosen_spanish_reading: Jesús estaba hablando de Dios como Padre.
  alternative_spanish_readings:
  - Jesús estaba hablando de un padre humano
  - Jesús hablaba del Padre celestial
  rationale: El contexto inmediato de Juan usa «el Padre» como referencia a Dios en la relación única con Jesús. La traducción mantiene esa identificación sin introducir formulaciones doctrinales más amplias que el versículo no exige.
  doctrine_reference: Juan 8; afirmaciones de traducción sobre primacía del original y equivalencia óptima
- issue: Sentido de γινώσκω en este contexto
  english_pob_reading: Render as 'understand' rather than the more literal 'know.'
  chosen_spanish_reading: Renderizar como «entendieron» en lugar de «supieron» o «conocieron».
  alternative_spanish_readings:
  - No supieron
  - No conocieron
  - No reconocieron
  rationale: La escena trata del fracaso de los oyentes para captar el sentido de lo que Jesús decía. «Entendieron» expresa mejor esa falla cognitiva en español que un simple «saber».
  doctrine_reference: Philosophy of optimal equivalence; lectura contextual de γινώσκω
translation_notes:
  revision_awareness: 'El pasaje coincide con el audit trail inglés: no hubo revisiones aplicadas y el último pase quedó sin cambios, con alta concordancia. La propuesta española conserva esa lectura estable, con un ajuste natural de aspecto verbal al español («estaba hablando») y una solución léxica contextual para γινώσκω («entendieron»).'
  spanish_consistency_notes:
  - Se mantiene el referente divino de «el Padre» acorde con el contexto joánico.
  - Se evita «SEÑOR» o una sustitución devocional ajena al término griego.
  - La elección de «entendieron» preserva la tensión entre conocer y comprender sin borrar el matiz cognitivo.
  - «Les estaba hablando» refleja bien el dativo plural y el imperfecto aspectual del griego.
  - La nota alternativa conserva una posibilidad más literal, útil para trazabilidad textual.
