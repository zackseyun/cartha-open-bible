lexical_decisions:
- source_word: κύψας
  english_pob_choice: stooped
  chosen_spanish: se inclinó hacia abajo
  alternatives_spanish:
  - se agachó
  - se dobló hacia delante
  - se encorvó
  lexicon: BDAG
  rationale: El participio aoristo de κύπτω, con κάτω, expresa un movimiento físico de inclinarse o bajar el cuerpo. En español, «se inclinó hacia abajo» conserva el gesto corporal sin sonar demasiado coloquial ni introducir matices de vergüenza o cansancio que no están en el griego.
- source_word: ἔγραφεν
  english_pob_choice: wrote
  chosen_spanish: escribió
  alternatives_spanish:
  - estaba escribiendo
  - seguía escribiendo
  lexicon: BDAG
  rationale: El imperfecto de γράφω puede sugerir acción en curso, pero el español narrativo natural puede expresar ese trasfondo con un perfecto simple en una secuencia breve. Aquí «escribió» mantiene fluidez sin afirmar más de lo que el texto exige.
- source_word: γῆν
  english_pob_choice: ground
  chosen_spanish: suelo
  alternatives_spanish:
  - tierra
  - suelo de la tierra
  - polvo
  lexicon: BDAG
  rationale: γῆ en este contexto apunta a la superficie física delante de él. «Suelo» es natural en español y conserva la referencia concreta sin sobreespecificar como «tierra» en sentido de terreno o «polvo».
theological_decisions:
- issue: Valor textual de la perícopa de la mujer sorprendida en adulterio
  english_pob_reading: Continuation of the story of the woman caught in adultery (John 7:53–8:11).
  chosen_spanish_reading: Continuación de la historia de la mujer sorprendida en adulterio (Juan 7:53–8:11).
  alternative_spanish_readings:
  - Pasaje textual discutido asociado con Juan 7:53–8:11
  - Sección transmitida con variación textual
  rationale: La observación inglesa es textual, no doctrinal. En español conviene conservarla como nota de continuidad narrativa y de transmisión textual, sin suavizar la advertencia crítica ni resolverla en el texto principal.
  doctrine_reference: Crítica textual del Nuevo Testamento; perícopa adulterae
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el paquete inglés; el estado más reciente indica que el texto quedó sin cambios y con acuerdo alto en la revisión. Se mantuvo la misma lectura base y se ajustó solo la formulación española para naturalidad y fidelidad.
  spanish_consistency_notes:
  - Se mantuvo «escribió» para reflejar el acto verbal sin forzar el aspecto imperfectivo en una perífrasis pesada.
  - «Suelo» evita una traducción demasiado genérica o demasiado agrícola de γῆ en este contexto narrativo.
  - La nota textual se conserva como pie de página para respetar el tratamiento auditable del pasaje.
