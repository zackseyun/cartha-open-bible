translation:
  language: es
  text: Mientras decía estas cosas[a], muchos creyeron en él[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mientras hablaba estas cosas».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «pusieron su fe en él».'
    reason: alternative_reading
lexical_decisions:
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  lexicon: BDAG
  rationale: 'El demostrativo plural neutro se conserva mejor en plural: «estas cosas» refleja la referencia a lo dicho antes por Jesús y mantiene la vinculación discursiva que el inglés POB también preserva.'
- source_word: αὐτοῦ λαλοῦντος
  english_pob_choice: as he was saying
  chosen_spanish: Mientras decía
  alternatives_spanish:
  - mientras hablaba
  - cuando decía
  lexicon: BDAG
  rationale: El genitivo absoluto indica simultaneidad. «Mientras decía» es natural en español y conserva el valor temporal de acción en curso; «hablaba» sería posible, pero «decía» sigue más de cerca λαλέω aquí como discurso articulado.
- source_word: πολλοὶ
  english_pob_choice: many
  chosen_spanish: muchos
  alternatives_spanish:
  - muchas personas
  lexicon: BDAG
  rationale: El adjetivo funciona sustantivado. «Muchos» reproduce la concisión del griego sin añadir un sustantivo interpretativo como «personas».
- source_word: ἐπίστευσαν
  english_pob_choice: believed
  chosen_spanish: creyeron
  alternatives_spanish:
  - llegaron a creer
  - pusieron su fe
  lexicon: BDAG
  rationale: El aoristo presenta el hecho globalmente. «Creyeron» es el equivalente más directo en español y preserva el valor verbal simple; «llegaron a creer» añade un matiz ingresivo que no exige el texto.
- source_word: εἰς αὐτόν
  english_pob_choice: in him
  chosen_spanish: en él
  alternatives_spanish:
  - en Jesús
  - hacia él
  lexicon: BDAG
  rationale: En Juan, πιστεύω con εἰς expresa confianza dirigida a una persona. «Creyeron en él» es la forma idiomática y teológicamente adecuada en español, sin debilitar la relación personal que marca la construcción.
theological_decisions:
- issue: Construcción joánica πιστεύω εἰς αὐτόν
  english_pob_reading: believed in him
  chosen_spanish_reading: creyeron en él
  alternative_spanish_readings:
  - creyeron a él
  - pusieron su fe en él
  rationale: La frase española «creer en alguien» comunica confianza y adhesión personal, que es el peso normal de πιστεύω con εἰς en Juan. «Creer a él» suena menos natural en español y puede sonar a mera aceptación verbal; «pusieron su fe en él» explicita demasiado la relación.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for πίστις; Translation philosophy #3'
translation_notes:
  revision_awareness: Coincide con el expediente inglés POB en la lectura temporal de simultaneidad y en la fuerza relacional de πιστεύω εἰς αὐτόν. No se requiere revisión adicional según el último pase auditor, que quedó sin cambios.
  spanish_consistency_notes:
  - Se mantiene «creer en él» para la construcción joánica, en línea con la terminología POB y el uso idiomático natural del español.
  - Se preserva el plural de referencia discursiva con «estas cosas», evitando el singular «esto» que reduciría el eco del neutro plural griego.
  - El marcador [a] queda unido a la locución temporal y [b] a la alternativa de la expresión de fe, siguiendo el orden del texto español.
