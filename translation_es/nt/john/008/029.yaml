translation:
  language: es
  text: Y el que me envió está conmigo. No me ha dejado solo[a], porque yo siempre hago lo que le agrada[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente según el tiempo verbal: «no me dejó solo».'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «las cosas agradables para él» o «las cosas que le agradan».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ πέμψας
  english_pob_choice: the one who sent
  chosen_spanish: el que me envió
  alternatives_spanish:
  - el que me ha enviado
  - el que envió
  lexicon: BDAG
  rationale: El participio articular funciona sustantivamente y se refiere al Padre. En español, "el que me envió" conserva la relación personal y la naturalidad sin introducir explícitamente "Padre" en el texto principal.
- source_word: μετ’ ἐμοῦ ἐστιν
  english_pob_choice: is with me
  chosen_spanish: está conmigo
  alternatives_spanish:
  - está con respecto a mí
  - está con mi persona
  lexicon: BDAG
  rationale: μετά con genitivo expresa compañía/presencia. "Está conmigo" comunica la presencia continua de manera idiomática en español y mantiene el sentido relacional del griego.
- source_word: οὐκ ἀφῆκέν με μόνον
  english_pob_choice: He has not left me alone
  chosen_spanish: No me ha dejado solo
  alternatives_spanish:
  - No me dejó solo
  - No me ha abandonado solo
  lexicon: BDAG
  rationale: El aoristo puede reflejarse con perfecto en español para expresar una negación cuya validez continúa. "Solo" corresponde bien a μόνον en esta construcción predicativa.
- source_word: μόνον
  english_pob_choice: alone
  chosen_spanish: solo
  alternatives_spanish:
  - a solas
  - por mi cuenta
  lexicon: BDAG
  rationale: Aunque es un adjetivo, aquí funciona predicativamente con el objeto directo. "Solo" es la forma más natural y fiel en español.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Aquí introduce la razón de la no-abandono del Padre. "Porque" expresa con claridad la relación causal.
- source_word: τὰ ἀρεστὰ αὐτῷ
  english_pob_choice: what is pleasing to him
  chosen_spanish: lo que le agrada
  alternatives_spanish:
  - las cosas que le agradan
  - lo agradable para él
  lexicon: BDAG
  rationale: El plural neutro sustantivado puede traducirse de forma natural como un singular abstracto en español. "Lo que le agrada" conserva el sentido evaluativo de ἀρεστός sin forzar una construcción demasiado literal.
- source_word: ποιῶ πάντοτε
  english_pob_choice: I always do
  chosen_spanish: siempre hago
  alternatives_spanish:
  - hago siempre
  - estoy haciendo siempre
  lexicon: BDAG
  rationale: El presente indica acción habitual. "Siempre hago" es la ordenación más natural en español y mantiene la idea de constancia.
theological_decisions:
- issue: Referente de "el que me envió"
  english_pob_reading: A reference to the Father, kept as the relational expression in the text rather than replacing it with 'the Father.'
  chosen_spanish_reading: Se conserva la expresión relacional sin añadir "el Padre" en el texto principal.
  alternative_spanish_readings:
  - '"El Padre que me envió"'
  - '"El Padre me envió"'
  rationale: En Juan el referente es claro por el contexto, pero el griego presenta la expresión relacional. Mantenerla respeta el estilo joánico y evita suplir un elemento ausente en la frase.
  doctrine_reference: Juan 8:29; filosofía de traducción POB
translation_notes:
  revision_awareness: El contexto auditado en inglés no muestra revisiones aplicadas y recibió acuerdo alto; la redacción española sigue de cerca las decisiones léxicas aprobadas, ajustándolas a un español natural y reverente.
  spanish_consistency_notes:
  - Se mantiene "me envió" sin nombrar explícitamente al Padre en el texto principal, en coherencia con la referencia relacional del griego.
  - Se prefirió "lo que le agrada" para reflejar el neutro plural sustantivado τὰ ἀρεστά con naturalidad española.
  - Se usó el perfecto "ha dejado" para expresar la vigencia presente del no-abandono, en línea con la lectura auditada del inglés.
  - Se evita "SEÑOR" o sustituciones reverenciales no presentes en la base griega.
  - La puntuación separa las dos oraciones como en el original, preservando la relación causal introducida por "porque".
