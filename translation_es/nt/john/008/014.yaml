    rationale: 'El source evidence y SBLGNT leen ἢ («o»), y la traducción inglesa auditada lo conserva como «or», dejando «and» como variante en nota. Cambiarlo a «ni» no es una mera adaptación estilística: sustituye la coordinación disyuntiva del texto editado por una coordinación negativa copulativa española, y eso contradice la evidencia base.'
