    rationale: Si el texto principal dice «ni adónde voy», la nota «Algunos manuscritos leen “y adónde voy” en lugar de “ni adónde voy”» ya no refleja la verdadera relación entre la lectura base (ἢ = «o») y la variante («y»). Debe rehacerse con base en «o adónde voy».
