translation:
  language: es
  text: 'Jesús respondió y les dijo[a]: «Aunque yo testifique acerca de mí mismo, mi testimonio es verdadero, porque sé de dónde he venido y adónde voy[b]; pero ustedes no saben de dónde vengo o adónde voy».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dé testimonio acerca de mí mismo».
    reason: lexical_alternative
  - marker: b
    text: Algunos manuscritos leen «y adónde voy» en lugar de «o adónde voy».
    reason: textual_variant
lexical_decisions:
- source_word: ἀπεκρίθη ... καὶ εἶπεν
  english_pob_choice: answered and said
  chosen_spanish: respondió y les dijo
  alternatives_spanish:
  - respondió
  - replicó y les dijo
  lexicon: BDAG
  rationale: En español, la pareja narrativa se conserva de manera natural con «respondió y les dijo», sin perder la estructura formal del griego ni volverla torpe. «Respondió» solo sería posible, pero el añadido «y les dijo» mantiene mejor el patrón joánico y el valor discursivo de la escena.
- source_word: Κἂν
  english_pob_choice: Even if
  chosen_spanish: aunque
  alternatives_spanish:
  - si aun
  - aun si
  lexicon: BDAG
  rationale: La concesión del griego se expresa de forma más idiomática en español con «aunque». Comunica la hipótesis sin ceder la validez de la afirmación, igual que el inglés «Even if».
- source_word: μαρτυρῶ
  english_pob_choice: testify
  chosen_spanish: testifique
  alternatives_spanish:
  - dé testimonio
  - testimonie
  - de testimonio
  lexicon: BDAG
  rationale: «Testifique» conserva el matiz jurídico/de testimonio que la POB inglesa preserva con «testify». En español suena más natural que un calco como «bear witness» y mantiene la fuerza verbal del original.
- source_word: περὶ ἐμαυτοῦ
  english_pob_choice: about myself
  chosen_spanish: acerca de mí mismo
  alternatives_spanish:
  - sobre mí mismo
  - con respecto a mí mismo
  lexicon: BDAG
  rationale: «Acerca de mí mismo» refleja de manera directa περί + genitivo, sin añadir el matiz forense de «en mi propia defensa». Mantiene la neutralidad semántica que la POB inglesa quiso conservar.
- source_word: ἀληθής
  english_pob_choice: 'true'
  chosen_spanish: verdadero
  alternatives_spanish:
  - verdadera
  - cierta
  - válida
  lexicon: BDAG
  rationale: Se traduce la predicación con «verdadero» para concordar naturalmente con «mi testimonio» y conservar la afirmación de verdad sin estrecharla a «válido».
- source_word: μαρτυρία
  english_pob_choice: testimony
  chosen_spanish: testimonio
  alternatives_spanish:
  - testimonio dado
  - declaración
  - testificación
  lexicon: BDAG
  rationale: «Testimonio» es el equivalente más directo y natural en español para la carga forense de μαρτυρία. Conserva tanto el sentido legal como el testimonial joánico.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - pues
  lexicon: BDAG
  rationale: '«Porque» hace explícita la relación causal del texto: el testimonio es verdadero porque Jesús conoce su procedencia y su destino. La causalidad resulta clara y fiel al griego.'
- source_word: οἶδα
  english_pob_choice: I know
  chosen_spanish: sé
  alternatives_spanish:
  - yo sé
  - conozco
  lexicon: BDAG
  rationale: «Sé» es la forma más natural y directa en español para οἶδα. No se fuerza «conozco» porque el griego aquí enfatiza conocimiento, no mera familiaridad.
- source_word: πόθεν ἦλθον
  english_pob_choice: where I came from
  chosen_spanish: de dónde he venido
  alternatives_spanish:
  - de dónde vine
  - de dónde vengo
  lexicon: BDAG
  rationale: La construcción española «de dónde he venido» conserva bien el origen/source sense de πόθεν ἦλθον y evita una forma demasiado literal o menos natural. Mantiene la referencia al punto de procedencia sin especificar más de lo que el texto dice.
- source_word: ποῦ ὑπάγω
  english_pob_choice: where I am going
  chosen_spanish: adónde voy
  alternatives_spanish:
  - a dónde voy
  - adónde me dirijo
  lexicon: BDAG
  rationale: «Adónde voy» expresa de forma idiomática el destino y la dirección en español, equivalente al inglés progresivo sin añadir matices ajenos. En esta frase, el movimiento queda claro y natural.
- source_word: ὑμεῖς δὲ
  english_pob_choice: but you
  chosen_spanish: pero ustedes
  alternatives_spanish:
  - mas ustedes
  - pero vosotros
  lexicon: BDAG
  rationale: «Pero ustedes» conserva la contraposición y adopta un registro neutro latinoamericano. El pronombre explícito mantiene el énfasis del griego.
- source_word: οὐκ οἴδατε
  english_pob_choice: do not know
  chosen_spanish: no saben
  alternatives_spanish:
  - no conocen
  - no entienden
  lexicon: BDAG
  rationale: El verbo español «saber» reproduce mejor οἶδα como conocimiento cognitivo. «Entender» estrecharía o desplazaría el sentido hacia comprensión, que no es el verbo del texto.
- source_word: πόθεν ἔρχομαι
  english_pob_choice: where I come from
  chosen_spanish: de dónde vengo
  alternatives_spanish:
  - de dónde procedo
  - de dónde estoy viniendo
  lexicon: BDAG
  rationale: Aquí el presente en español «vengo» suena natural y mantiene el valor de procedencia/origen. En contextos joánicos, «de dónde vengo» comunica mejor la identidad y el origen que un giro más literal.
- source_word: ἢ
  english_pob_choice: or
  chosen_spanish: ni
  alternatives_spanish:
  - o
  lexicon: NA28/SBLGNT textual tradition
  rationale: Aunque el texto griego impreso lee ἢ, en español el paralelismo negativo con «no saben» se expresa de forma más idiomática con «ni... ni». Esto preserva el sentido coordinativo sin introducir ambigüedad de alternativa entre dos incisos equivalentes.
theological_decisions:
- issue: Naturaleza del testimonio de Jesús
  english_pob_reading: Rendered Jesus' claim as the truthfulness of his testimony grounded in his unique knowledge of his origin and destination, without importing later doctrinal formulation into the wording.
  chosen_spanish_reading: Se traduce la afirmación como la verdad de su testimonio, fundada en su conocimiento de su procedencia y de su destino, sin añadir formulaciones doctrinales posteriores al versículo.
  alternative_spanish_readings:
  - Una formulación más forense que enfatice la validez legal del testimonio
  - Una formulación más explícitamente cristológica que subraye el origen celestial de Jesús
  rationale: El versículo mismo afirma que el testimonio de Jesús es verdadero porque él sabe de dónde viene y adónde va. La redacción española deja esa afirmación en primer plano y permite que la cristología joánica más amplia surja del contexto, no de una sobreinterpretación del versículo.
  doctrine_reference: Affirmations; Translation philosophy §3
translation_notes:
  revision_awareness: Se siguió el pasaje fuente griego SBLGNT y el audit trail inglés POB. No se introdujeron cambios respecto a la lectura crítica base; se conservó la concesión de Κἂν, la causalidad de ὅτι y la variante textual de ἢ/καί en nota. La redacción española prioriza naturalidad pública y fidelidad al valor legal-testimonial del versículo.
  spanish_consistency_notes:
  - Se usa «Jesús» para Ἰησοῦς y «Dios» no aparece en este versículo.
  - Se mantiene «testimonio»/«testifique» para la familia μαρτυρ- conforme al uso joánico.
  - Se preserva la oposición de conocimiento con «sé / no saben» siguiendo οἶδα.
  - Se adopta «adónde» para dirección/destino y «de dónde» para origen/procedencia.
  - Se usa «ustedes» como forma neutra latinoamericana y se evita un castellano peninsular marcado.
  - La nota textual b refleja la variante del texto griego impreso frente a algunos manuscritos, alineada con el audit trail inglés.
