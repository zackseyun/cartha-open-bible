translation:
  language: es
  text: 'Jesús les dijo: «Si Dios fuera su Padre, me amarían, porque yo vine de Dios[a] y estoy aquí. Pues no he venido por mi propia cuenta[b], sino que él me envió».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «porque procedí de Dios y he venido».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Pues no he venido por mí mismo». El griego puede enfatizar tanto la fuente («de mí mismo») como la iniciativa independiente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Εἰ ... ἦν ... ἠγαπᾶτε ἂν
  english_pob_choice: If God were your Father, you would love me
  chosen_spanish: Si Dios fuera su Padre, ustedes me amarían
  alternatives_spanish:
  - Si Dios era su Padre, ustedes me amarían
  lexicon: BDAG
  rationale: La construcción condicional contraria a la realidad en griego se expresa con imperfecto + ἄν; en español, el subjuntivo imperfecto 'fuera' comunica mejor esa irrealidad que un indicativo. 'Me amarían' conserva el valor modal de la apódosis.
- source_word: θεὸς πατὴρ ὑμῶν
  english_pob_choice: God were your Father
  chosen_spanish: Dios fuera su Padre
  alternatives_spanish:
  - Dios fuera vuestro Padre
  lexicon: BDAG
  rationale: '''Dios ... su Padre'' mantiene la estructura relacional y es natural en español neutro. Se evita una formulación más literal que sonaría menos idiomática en el registro bíblico actual.'
- source_word: ἠγαπᾶτε
  english_pob_choice: would love
  chosen_spanish: me amarían
  alternatives_spanish:
  - me estarían amando
  lexicon: BDAG
  rationale: ἀγαπάω se traduce aquí con 'amar', y el imperfecto en el contexto condicional se vuelve naturalmente 'amarían' en español. Se evita la perífrasis progresiva porque no refleja tan bien el valor aspectual del pasaje.
- source_word: ἐγὼ γὰρ
  english_pob_choice: for I came from God and am here
  chosen_spanish: porque yo salí de Dios y estoy aquí
  alternatives_spanish:
  - pues yo salí de Dios y estoy aquí
  lexicon: BDAG
  rationale: La partícula γάρ introduce la razón de la afirmación anterior; 'porque' mantiene la relación causal de forma clara en español, aunque 'pues' queda como alternativa de tono más formal.
- source_word: ἐκ τοῦ θεοῦ ἐξῆλθον
  english_pob_choice: I came from God
  chosen_spanish: yo salí de Dios
  alternatives_spanish:
  - yo vine de Dios
  - yo procedo de Dios
  lexicon: BDAG
  rationale: ἐξέρχομαι con ἐκ expresa origen o procedencia. 'Salí de Dios' conserva con fuerza ese movimiento de salida/origen, sin introducir una terminología más técnica que la del texto griego. 'Procedo de Dios' se reserva como alternativa más formal.
- source_word: καὶ ἥκω
  english_pob_choice: and am here
  chosen_spanish: y estoy aquí
  alternatives_spanish:
  - y he llegado
  - y he venido
  lexicon: BDAG
  rationale: ἥκω marca llegada con estado presente; 'estoy aquí' transmite esa presencia resultante de modo idiomático en español. Se evita 'he venido' en el texto principal porque puede desplazar el énfasis hacia la acción pasada.
- source_word: οὐδὲ γὰρ ἀπ’ ἐμαυτοῦ ἐλήλυθα
  english_pob_choice: For I have not come on my own
  chosen_spanish: Pues no he venido por mi propia iniciativa
  alternatives_spanish:
  - Pues no he venido por mí mismo
  - Pues no he venido por mi propia cuenta
  lexicon: BDAG
  rationale: La frase puede señalar tanto origen como iniciativa independiente. 'Por mi propia iniciativa' hace explícita la idea de autonomía/autoenvío, que en español comunica bien el sentido sin perder la tensión del griego entre procedencia y autoridad.
- source_word: ἀλλ’ ἐκεῖνός με ἀπέστειλεν
  english_pob_choice: but he sent me
  chosen_spanish: sino que él me envió
  alternatives_spanish:
  - sino que Aquel me envió
  - sino que ese mismo me envió
  lexicon: BDAG
  rationale: ἐκεῖνος es enfático y remite a Dios; en español, 'él' es la forma más natural para mantener esa referencia sin forzar una traducción arcaizante. 'Sino que' preserva la oposición fuerte con la cláusula anterior.
theological_decisions:
- issue: Lenguaje de origen y misión de Jesús sin sobrerformularlo doctrinalmente
  english_pob_reading: I came from God and am here
  chosen_spanish_reading: yo salí de Dios y estoy aquí
  alternative_spanish_readings:
  - yo procedo de Dios y estoy aquí
  - yo vine de Dios y estoy aquí
  rationale: El griego afirma con claridad el origen divino y la presencia enviada de Jesús, pero usa verbos ordinarios de salida/llegada. La opción principal conserva esa afirmación sin añadir un tecnicismo doctrinal ajeno al registro del versículo.
  doctrine_reference: Cristología; filosofía de traducción §§1, 3, 6
- issue: Sentido de ἀπ’ ἐμαυτοῦ como origen o iniciativa no independiente
  english_pob_reading: I have not come on my own
  chosen_spanish_reading: no he venido por mi propia iniciativa
  alternative_spanish_readings:
  - no he venido por mí mismo
  - no he venido por mi propia cuenta
  rationale: El griego puede referirse tanto a procedencia autosuficiente como a iniciativa independiente. 'Por mi propia iniciativa' deja clara la negación de autonomía en el envío, sin perder la relación con la cláusula anterior sobre venir de Dios.
  doctrine_reference: Autoridad y envío; filosofía de traducción §§1, 3, 5
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió 'for' sobre 'because' y 'have not come on my own' sobre 'from myself'. La versión española adopta 'porque' para la relación causal natural del español bíblico moderno y 'por mi propia iniciativa' para reflejar la idea de no-autonomía que la revisión consideró más precisa.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para θεός, con mayúscula por ser referencia divina.
  - Se usa 'Jesús' como sujeto explícito al inicio, coherente con el estilo POB en español.
  - '''Envió'' conserva el lenguaje de misión de ἀποστέλλω sin sustituirlo por una paráfrasis explicativa.'
  - La puntuación y comillas siguen el uso editorial español de cita directa.
