translation:
  language: es
  text: Simón Pedro, Tomás llamado Dídimo[a], Natanael de Caná de Galilea, los hijos de Zebedeo y otros dos de sus discípulos estaban juntos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «Tomás llamado Dídimo». «Dídimo» es la forma griega del nombre/epíteto, tradicionalmente entendida como «gemelo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦσαν
  english_pob_choice: were
  chosen_spanish: estaban
  alternatives_spanish:
  - eran
  lexicon: BDAG
  rationale: El imperfecto de εἰμί describe un estado o situación en curso; en este contexto narrativo, «estaban» comunica naturalmente que se hallaban reunidos.
- source_word: ὁμοῦ
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - reunidos
  - en conjunto
  lexicon: BDAG
  rationale: ὁμοῦ indica estar en el mismo lugar o en compañía unos de otros. «Juntos» es la forma más natural y fiel en español.
- source_word: Σίμων Πέτρος
  english_pob_choice: Simon Peter
  chosen_spanish: Simón Pedro
  alternatives_spanish:
  - Simón, Pedro
  lexicon: transliteración estándar
  rationale: Se conservan los nombres propios en su forma habitual en español bíblico, sin añadir puntuación que altere la fluidez del grupo nominal.
- source_word: Θωμᾶς ὁ λεγόμενος Δίδυμος
  english_pob_choice: Thomas called Didymus
  chosen_spanish: Tomás llamado Dídimo
  alternatives_spanish:
  - Tomás, llamado Dídimo
  - Tomás, el llamado Dídimo
  lexicon: BDAG
  rationale: λεγόμενος se rinde con «llamado». Δίδυμος se conserva como «Dídimo» porque el POB inglés finalmente optó por reflejar más directamente el nombre griego, manteniendo un registro formal y transparente.
- source_word: Ναθαναὴλ ὁ ἀπὸ Κανὰ τῆς Γαλιλαίας
  english_pob_choice: Nathanael from Cana of Galilee
  chosen_spanish: Natanael de Caná de Galilea
  alternatives_spanish:
  - Natanael, de Caná de Galilea
  - Natanael, que era de Caná de Galilea
  lexicon: BDAG
  rationale: ἀπό con lugar de origen se expresa de manera natural con «de». Se conserva la designación geográfica completa «Caná de Galilea».
- source_word: οἱ τοῦ Ζεβεδαίου
  english_pob_choice: the sons of Zebedee
  chosen_spanish: los hijos de Zebedeo
  alternatives_spanish:
  - los hijos de Zebedeo
  lexicon: BDAG
  rationale: La construcción griega es idiomática y alude con certeza a los hijos de Zebedeo; en español «los hijos de» es la forma clara y exacta.
- source_word: ἄλλοι ἐκ τῶν μαθητῶν αὐτοῦ δύο
  english_pob_choice: two others of his disciples
  chosen_spanish: otros dos de sus discípulos
  alternatives_spanish:
  - dos otros de sus discípulos
  - otros dos discípulos suyos
  - dos más de sus discípulos
  lexicon: BDAG
  rationale: Se preserva el sentido partitivo de ἐκ con «de sus discípulos» y el orden natural español con «otros dos».
theological_decisions:
- issue: Tratamiento de Δίδυμος como nombre o glosa
  english_pob_reading: The POB English moved from 'Twin' back to 'Didymus' to reflect the Greek proper name more directly while preserving formal register.
  chosen_spanish_reading: «Dídimo» se conserva como nombre/epíteto transliterado en español, no como traducción semántica («gemelo»).
  alternative_spanish_readings:
  - Tomás llamado Gemelo
  - Tomás llamado el Gemelo
  rationale: El texto griego presenta Δίδυμος como designación estable de Tomás, y el POB inglés revisionado prefirió mantenerla como nombre propio formal. Traducirlo como «gemelo» explicaría el sentido, pero borraría esa forma tradicional y el vínculo transparente con el griego.
  doctrine_reference: Onomástica bíblica y equivalencia lexical; no implica doctrina
- issue: Lista coordinada de nombres y el valor de ὁμοῦ
  english_pob_reading: The English POB renders the clause as a simple list ending with 'were together.'
  chosen_spanish_reading: 'Se conserva una lista nominal seguida de una predicación de estado: «estaban juntos».'
  alternative_spanish_readings:
  - se hallaban juntos
  - estaban reunidos
  rationale: No hay carga doctrinal especial; la decisión busca reflejar el carácter descriptivo del pasaje sin sobrerrepresentar una reunión formal que el griego no explicita.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'El audit trail inglés muestra una revisión importante en Δίδυμος: se descartó ''Twin'' en favor de ''Didymus'' para reflejar más directamente el nombre griego y mantener un registro formal. La versión española sigue esa decisión con ''Dídimo'', conservando el nombre griego transliterado en lugar de interpretarlo como ''gemelo''.'
  spanish_consistency_notes:
  - Se usa «Caná de Galilea» de forma consistente con el designador geográfico completo del texto fuente.
  - Se prefiere «discípulos» para μαθηταί, siguiendo el valor estándar del término en el cuarto evangelio.
  - No se introduce mayúscula en «discípulos» ni se añade puntuación explicativa innecesaria dentro de la lista.
  - Se evita «SEÑOR» u otras convenciones de ocultamiento porque el versículo no contiene el Tetragrámaton ni κύριος con valor divino.
