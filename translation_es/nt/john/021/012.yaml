base_translation:
  language: en
  yaml_path: translation/nt/john/021/012.yaml
  text: Jesus said to them[a], “Come, eat breakfast.” But none of the disciples dared to ask him[b], “Who are you?” knowing that it was the Lord.
  footnotes:
  - marker: a
    text: Or “have breakfast.” The Greek verb refers specifically to the morning meal.
    reason: lexical_alternative
  - marker: b
    text: The verb translated “ask” can also carry the sense “question” or “examine closely.”
    reason: lexical_alternative
