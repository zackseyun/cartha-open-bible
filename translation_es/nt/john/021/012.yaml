translation:
  language: es
  text: 'Jesús les dijo: «Vengan[a], desayunen[b]». Pero ninguno de los discípulos se atrevió a preguntarle[c]: «¿Quién eres?», sabiendo que era el Señor.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Vengan aquí». El griego es una invitación imperativa directa.
    reason: lexical_alternative
  - marker: b
    text: O «tomen el desayuno». El verbo griego se refiere específicamente a la comida de la mañana.
    reason: lexical_alternative
  - marker: c
    text: El verbo también puede significar «interrogar» o «examinar más de cerca».
    reason: lexical_alternative
lexical_decisions:
- source_word: Δεῦτε
  english_pob_choice: Come
  chosen_spanish: Vengan
  alternatives_spanish:
  - Vengan aquí
  - Vengan, acerquense
  lexicon: BDAG
  rationale: Como invitación imperativa plural, Δεῦτε funciona naturalmente como llamado directo. «Vengan» conserva la cercanía y el tono exhortativo sin forzar un calco innecesario.
- source_word: ἀριστήσατε
  english_pob_choice: eat breakfast
  chosen_spanish: desayunen
  alternatives_spanish:
  - tomen el desayuno
  - coman desayuno
  lexicon: BDAG
  rationale: El verbo señala específicamente la comida de la mañana. En español, «desayunen» comunica con claridad esa referencia temporal y evita una perífrasis pesada en el cuerpo principal.
- source_word: οὐδεὶς δὲ
  english_pob_choice: But none
  chosen_spanish: Pero ninguno
  alternatives_spanish:
  - Y ninguno
  - Ahora bien, ninguno
  lexicon: BDAG
  rationale: «Pero» refleja el contraste suave de δέ entre la invitación de Jesús y la reacción de los discípulos. «Ninguno» mantiene el sujeto negativo sin añadir énfasis ajeno al texto.
- source_word: ἐτόλμα
  english_pob_choice: dared
  chosen_spanish: se atrevía
  alternatives_spanish:
  - osaba
  - se aventuraba
  lexicon: BDAG
  rationale: El imperfecto expresa una disposición continua o no realizada; «se atrevía» reproduce bien esa idea en español y preserva el matiz de falta de valentía para actuar.
- source_word: ἐξετάσαι
  english_pob_choice: to ask
  chosen_spanish: preguntarle
  alternatives_spanish:
  - interrogarle
  - examinarle
  lexicon: BDAG
  rationale: En este contexto de discurso directo, el verbo apunta a plantearle la pregunta. «Preguntarle» es la forma más natural y clara; el matiz más intenso de «examinar» queda como alternativa léxica.
- source_word: Σὺ τίς εἶ;
  english_pob_choice: Who are you?
  chosen_spanish: ¿Quién eres?
  alternatives_spanish:
  - Tú, ¿quién eres?
  - ¿Quién eres tú?
  lexicon: BDAG
  rationale: La pregunta de identidad se expresa con naturalidad en español como «¿Quién eres?». El pronombre enfático Σὺ queda implícito en el contexto, aunque puede reflejarse en una alternativa más enfática.
- source_word: εἰδότες ὅτι
  english_pob_choice: knowing that
  chosen_spanish: sabiendo que
  alternatives_spanish:
  - porque sabían que
  - ya que sabían que
  lexicon: BDAG
  rationale: El participio expresa una circunstancia concomitante o causal leve. «Sabiendo que» sigue de cerca la forma griega y evita introducir una causalidad más fuerte de la que exige el texto revisado.
- source_word: ὁ κύριός
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Dueño
  - el Maestro
  lexicon: BDAG
  rationale: En este contexto de reconocimiento posresurrección, κύριος identifica a Jesús como «el Señor». Se conserva el artículo para mantener la identificación narrativa concreta.
theological_decisions:
- issue: Renderización de κύριος referido a Jesús
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Señor
  - el Maestro
  rationale: La lectura del POB inglés sigue el valor cristológico de κύριος en este pasaje. En español, «el Señor» preserva esa identificación y su fuerza confesional sin rebajarla a un mero título de cortesía o autoridad humana.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Relación semántica del participio εἰδότες
  english_pob_reading: knowing that
  chosen_spanish_reading: sabiendo que
  alternative_spanish_readings:
  - porque sabían que
  - ya que sabían que
  rationale: La revisión inglesa eliminó la causalidad explícita de «because» para respetar mejor el participio griego. «Sabiendo que» conserva esa contigüidad sin añadir una inferencia causal más fuerte que la del original.
  doctrine_reference: Greek participle usage / source-text fidelity
translation_notes:
  revision_awareness: La versión inglesa revisada pasó de «because they knew» a «knowing», para reflejar con más precisión el participio εἰδότες sin sobreexplicar la relación causal. La propuesta española sigue esa corrección con «sabiendo que» y evita introducir una causalidad más fuerte en la cláusula final.
  spanish_consistency_notes:
  - Se mantiene «Jesús» como nombre propio, sin artículo.
  - Se usa «el Señor» para κύριος según el uso cristológico del pasaje y el criterio doctrinal del POB.
  - Se conserva un registro sobrio y natural; no se fuerza un calco sintáctico del griego.
  - Los marcadores de nota [a] y [b] aparecen exactamente en el texto principal, sin notas sueltas.
