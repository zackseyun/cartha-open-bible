translation:
  language: es
  text: 'Entonces aquel discípulo a quien Jesús amaba le dijo a Pedro: «Es el Señor». Entonces Simón Pedro, al oír que es el Señor, se ató el manto exterior[a] (porque estaba desnudo[b]) y se echó al mar.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la prenda exterior». El griego ἐπενδύτης designa una prenda de encima, sin precisar más su forma exacta.
    reason: lexical_alternative
  - marker: b
    text: O «porque iba poco vestido». El griego γυμνός puede significar literalmente desnudo o con vestimenta insuficiente, según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει οὖν
  english_pob_choice: So ... said / Then ... said
  chosen_spanish: Entonces ... le dijo
  alternatives_spanish:
  - Así que ... dijo
  - Luego ... dijo
  lexicon: BDAG
  rationale: οὖν marca continuidad narrativa y consecuencia; en español, «entonces» transmite bien ese avance sin sonar forzado. Se mantiene el valor verbal de λέγει con un pasado narrativo natural, «le dijo».
- source_word: ὁ μαθητὴς ἐκεῖνος ὃν ἠγάπα ὁ Ἰησοῦς
  english_pob_choice: that disciple whom Jesus loved
  chosen_spanish: aquel discípulo a quien Jesús amaba
  alternatives_spanish:
  - el discípulo a quien Jesús amaba
  - ese discípulo a quien Jesús amaba
  lexicon: BDAG
  rationale: Se conserva el demostrativo ἐκεῖνος con «aquel», que retiene la referencia característica sin borrar el matiz identificador. El relativo se vierte con «a quien Jesús amaba» para evitar una construcción rígida y conservar la relación personal del texto.
- source_word: ὁ κύριός ἐστιν
  english_pob_choice: It is the Lord
  chosen_spanish: Es el Señor
  alternatives_spanish:
  - Es el Señor Jesús
  - Es el Maestro
  lexicon: BDAG
  rationale: El griego expresa una confesión directa de reconocimiento; en español, la forma natural es «Es el Señor». Se mantiene la terminología POB para κύριος según el valor cristológico reconocido en el contexto.
- source_word: ἀκούσας
  english_pob_choice: when he heard
  chosen_spanish: al oír
  alternatives_spanish:
  - cuando oyó
  - habiendo oído
  lexicon: BDAG
  rationale: El participio aoristo se integra con una subordinación temporal breve y natural. «Al oír» conserva la simultaneidad narrativa sin sobrecargar la frase.
- source_word: τὸν ἐπενδύτην
  english_pob_choice: his outer garment
  chosen_spanish: el manto exterior
  alternatives_spanish:
  - la prenda exterior
  - el vestido de encima
  lexicon: BDAG
  rationale: ἐπενδύτης designa una prenda exterior. «Manto exterior» comunica la función de la prenda sin identificarla con una pieza más específica de lo que el texto permite. Se evita «abrigo» o «chaqueta» por anacronismo.
- source_word: διεζώσατο
  english_pob_choice: tied ... around himself
  chosen_spanish: se ató ...
  alternatives_spanish:
  - se ciñó ...
  - se ajustó ...
  lexicon: BDAG
  rationale: El verbo medio describe la acción de sujetar o ceñir la prenda al cuerpo. «Se ató» conserva el gesto concreto de asegurar la ropa, y junto con «manto exterior» resulta idiomático en español.
- source_word: ἦν γὰρ γυμνός
  english_pob_choice: for he was naked
  chosen_spanish: porque estaba desnudo
  alternatives_spanish:
  - pues estaba desnudo
  - porque iba poco vestido
  lexicon: BDAG
  rationale: γυμνός puede abarcar desnudez literal o vestimenta insuficiente, pero la revisión del audit trail favorece una traducción más directa. Se conserva «desnudo» y se documenta la alternativa semántica en nota para no borrar la tensión lexical.
- source_word: ἔβαλεν ἑαυτὸν εἰς τὴν θάλασσαν
  english_pob_choice: threw himself into the sea
  chosen_spanish: se echó al mar
  alternatives_spanish:
  - se arrojó al mar
  - se lanzó al mar
  lexicon: BDAG
  rationale: βάλλω con objeto reflexivo expresa una acción enérgica. «Se echó al mar» es la forma natural en español y conserva el impulso del movimiento; «mar» sigue la decisión inglesa de θάλασσα como «sea».
theological_decisions:
- issue: Título cristológico κύριος en reconocimiento de Jesús resucitado
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Maestro
  - dueño
  rationale: El contexto de reconocimiento posresurrección pide conservar la fuerza cristológica de κύριος. «Señor» sigue el valor doctrinal del POB y evita rebajar el título a un mero tratamiento de cortesía.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Sentido de γυμνός respecto del estado de Pedro
  english_pob_reading: naked
  chosen_spanish_reading: desnudo
  alternative_spanish_readings:
  - poco vestido
  - ligeramente vestido
  rationale: La revisión del material auditado favorece la lectura más directa del término. Aunque el contexto podría permitir vestimenta insuficiente, el texto no obliga a suavizarlo, y mantener «desnudo» preserva la tensión lexical documentada.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
translation_notes:
  revision_awareness: El texto español sigue la decisión revisada del audit trail para γυμνός como «desnudo», en lugar de una solución suavizada. También adopta una narración más natural para οὖν con «Entonces» y preserva la fraseología clave de ἐπενδύτης como prenda exterior, con nota alternativa para no cerrar la ambigüedad lexical.
  spanish_consistency_notes:
  - Se mantuvo «Señor» para κύριος en coherencia con el valor cristológico del POB.
  - Se eligió «mar» para θάλασσα siguiendo el equivalente inglés «sea» y la escena narrativa.
  - Se conservaron construcciones naturales del español sin perder el orden narrativo del griego.
  - Las notas alternas no contradicen el texto principal; solo documentan ambigüedades reales del léxico griego.
