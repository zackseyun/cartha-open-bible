review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: reconocimiento de Jesús como «el Señor», acción de Pedro al oírlo, prenda exterior, estado de desnudez y lanzamiento al mar. Sin embargo, «Al oír, pues, Simón Pedro que era el Señor» desajusta la sintaxis y debilita la claridad del participio ἀκούσας con su sujeto explícito. Además, «era el Señor» suena menos directo que el presente griego repetido «es el Señor».'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero la colocación de «pues» y el arranque «Al oír, pues, Simón Pedro...» resultan torpes. Una reordenación sencilla mejora mucho la naturalidad: «Entonces Simón Pedro, al oír que era/es el Señor...». También conviene mantener la puntuación parentética para «porque estaba desnudo», como en el audit trail inglés.'
  glossary_alignment: 'La terminología clave está bien alineada: «Señor» para κύριος, «Jesús», «desnudo» para γυμνός con nota alternativa, y una forma adecuada para ἐπενδύτης. No hay conflicto con los glosarios del proyecto. «Manto exterior» es aceptable, aunque «prenda exterior» sería algo más neutro; no es obligatorio cambiarlo.'
  issues:
  - severity: medium
    issue: Sintaxis poco natural en «Al oír, pues, Simón Pedro...»
    rationale: La secuencia española suena forzada y puede dificultar la identificación inmediata del sujeto del participio ἀκούσας. El griego se representa mejor con «Entonces Simón Pedro, al oír...» o «Simón Pedro, al oír...».
  - severity: medium
    issue: «que era el Señor» atenúa la inmediatez de ὁ κύριός ἐστιν
    rationale: Aunque en español puede aparecer por estilo indirecto, aquí la repetición del presente «es el Señor» puede conservarse sin dificultad y refleja mejor el énfasis del original y del audit trail inglés.
  - severity: low
    issue: Falta de inciso parentético en «porque estaba desnudo»
    rationale: La aclaración causal γὰρ funciona bien como inciso en español, y los paréntesis ayudan a reproducir el flujo narrativo del texto auditado.
  revised_spanish_text: 'Entonces aquel discípulo a quien Jesús amaba le dijo a Pedro: «Es el Señor». Entonces Simón Pedro, al oír que es el Señor, se ató el manto exterior[a] (porque estaba desnudo[b]) y se echó al mar.'
  revised_footnotes:
