  text: λέγει οὖν ὁ μαθητὴς ἐκεῖνος ὃν ἠγάπα ὁ Ἰησοῦς τῷ Πέτρῳ· Ὁ κύριός ἐστιν. Σίμων οὖν Πέτρος, ἀκούσας ὅτι ὁ κύριός ἐστιν, τὸν ἐπενδύτην διεζώσατο, ἦν γὰρ γυμνός, καὶ ἔβαλεν ἑαυτὸν εἰς τὴν θάλασσαν·
base_translation:
  language: en
  yaml_path: translation/nt/john/021/007.yaml
  text: So that disciple whom Jesus loved said to Peter[a], “It is the Lord.” Then Simon Peter, when he heard that it was the Lord, tied his outer garment around himself (for he was naked) and threw himself into the sea.
  footnotes:
  - marker: a
    text: Or, “for he was naked.” The Greek γυμνός can mean either literally naked or insufficiently/lightly clothed, depending on context.
    reason: lexical_alternative
