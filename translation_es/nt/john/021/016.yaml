review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del griego: mantiene la repetición de πάλιν δεύτερον, el patronímico «hijo de Juan», el uso de «amor/amar» para ἀγαπάω y φιλέω sin sobredistinguirlos, y el imperativo pastoral dirigido a las «ovejas». Sin embargo, la nota al pie actual explica dos expresiones de repetición, mientras que la auditoría inglesa preserva en nota la variación léxica entre ἀγαπάω y φιλέω. Esa información es más significativa para la trazabilidad del POB y debe conservarse en español.'
  spanish_quality_summary: El español es claro y digno. La frase «de nuevo, por segunda vez» funciona, aunque en el texto conviene conservar la coma para reflejar mejor la duplicación griega y apoyar la nota. «Apacienta mis ovejas» es inteligible y tradicional, pero «Pastorea mis ovejas» refleja mejor el valor de ποιμαίνω documentado en la auditoría inglesa («shepherd») y su alcance más amplio que solo alimentar. También conviene evitar el punto fuera de las comillas, prefiriendo puntuación española natural.
  glossary_alignment: 'No hay conflicto con los términos doctrinales del proyecto. «Señor» para κύριε, «Juan» para Ἰωάννου y «amo» para ambos verbos de amor están alineados. La principal desalineación está en la nota: debe documentar la variación ἀγαπάω/φιλέω, no sustituirla por una explicación de πάλιν/δεύτερον.'
  issues:
  - severity: medium
    issue: La nota al pie no preserva la decisión léxica principal sobre ἀγαπάω y φιλέω.
    rationale: La auditoría inglesa documenta explícitamente que Jesús usa ἀγαπάω y Pedro responde con φιλέω, manteniendo ambos como «love» en el texto principal. El borrador español pierde esa transparencia al dedicar la nota solo a la repetición de πάλιν δεύτερον.
  - severity: medium
    issue: «Apacienta» estrecha el campo semántico de ποιμαίνω frente a la decisión auditada «Shepherd».
    rationale: ποιμαίνω implica la labor pastoral más amplia de guiar, cuidar y pastorear. «Pastorea» preserva mejor la metáfora completa que «apacienta», que en español suele enfocarse más en alimentar o llevar a pastar.
  - severity: low
    issue: La puntuación del diálogo suena algo calcada.
    rationale: 'En español es más natural integrar la pregunta dentro de las comillas sin punto exterior: «… ¿me amas?». También ayuda una coma en «de nuevo, por segunda vez» para marcar la doble expresión.'
