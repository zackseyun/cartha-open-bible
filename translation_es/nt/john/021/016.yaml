translation:
  language: es
  text: 'Le dijo de nuevo, por segunda vez[a]: «Simón, hijo de Juan, ¿me amas?». Él le dijo: «Sí, Señor; tú sabes que te amo». Él le dijo: «Pastorea mis ovejas».[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego usa dos verbos distintos para «amar» en este diálogo: Jesús pregunta con agapaō, y Pedro responde con phileō. Muchos intérpretes ven una distinción; otros lo consideran una variación estilística. El texto principal traduce ambos como «amar» para no exagerar la diferencia.'
    reason: lexical_alternative
  - marker: b
    text: O «Apacienta mis ovejas».
    reason: lexical_alternative
lexical_decisions:
- source_word: πάλιν δεύτερον
  english_pob_choice: again a second time
  chosen_spanish: de nuevo, por segunda vez
  alternatives_spanish:
  - otra vez, por segunda vez
  - de nuevo, una segunda vez
  lexicon: BDAG
  rationale: La duplicación griega marca repetición enfática. En español, 'de nuevo' y 'por segunda vez' conservan ambos valores sin sonar forzados. Se evita reducirlo a una sola expresión para no perder la redundancia del original.
- source_word: Σίμων Ἰωάννου
  english_pob_choice: Simon, son of John
  chosen_spanish: Simón, hijo de Juan
  alternatives_spanish:
  - Simón, hijo de Jona
  - Simón Juan
  lexicon: BDAG
  rationale: El genitivo funciona naturalmente como patronímico. 'Hijo de Juan' es la forma española directa y fiel al griego de este pasaje; no se importa la forma tradicional 'Jona', que corresponde a otra tradición textual y otro contexto.
- source_word: ἀγαπᾷς
  english_pob_choice: do you love
  chosen_spanish: ¿me amas?
  alternatives_spanish:
  - ¿me quieres?
  - ¿me tienes amor?
  lexicon: BDAG
  rationale: '''Amar'' comunica en español la fuerza normal de ἀγαπάω sin añadir interpretación. ''Querer'' suaviza demasiado el verbo, y ''tener amor por'' suena demasiado analítico para el diálogo.'
- source_word: Ναί
  english_pob_choice: 'Yes'
  chosen_spanish: Sí
  alternatives_spanish:
  - Claro
  - Sí, Señor
  lexicon: BDAG
  rationale: Una afirmación simple conserva el tono directo del intercambio.
- source_word: κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - señor
  - Maestro
  lexicon: BDAG
  rationale: En este contexto Jesús es reconocido reverentemente; 'Señor' preserva el valor confesional que el POB inglés marca con 'Lord'.
- source_word: σὺ οἶδας
  english_pob_choice: you know
  chosen_spanish: tú sabes
  alternatives_spanish:
  - tú mismo sabes
  - bien sabes
  lexicon: BDAG
  rationale: El pronombre explícito aporta énfasis leve. 'Tú sabes' es natural en español y conserva esa focalización sin sobrecargar la frase.
- source_word: ὅτι φιλῶ σε
  english_pob_choice: that I love you
  chosen_spanish: que te amo
  alternatives_spanish:
  - que te quiero
  - que tengo afecto por ti
  lexicon: BDAG
  rationale: Aunque φιλέω puede sugerir afecto, en este contexto se mantiene 'amar' para no exagerar una distinción léxica que la POB inglesa decidió no imponer en el texto principal. Así se preserva la tensión documentada entre ἀγαπάω y φιλέω.
- source_word: Ποίμαινε
  english_pob_choice: Shepherd
  chosen_spanish: Apacienta
  alternatives_spanish:
  - Pastorea
  - Pastorea y cuida
  lexicon: BDAG
  rationale: 'El verbo ποιμαίνω implica la labor del pastor sobre el rebaño: guiar, cuidar y alimentar. ''Apacienta'' es una traducción española tradicional y clara que conserva la imagen pastoral sin sonar demasiado técnica.'
- source_word: τὰ πρόβατά μου
  english_pob_choice: my sheep
  chosen_spanish: mis ovejas
  alternatives_spanish:
  - mis ovejas
  - mi rebaño
  lexicon: BDAG
  rationale: '''Ovejas'' mantiene la imagen concreta del griego πρόβατα. ''Rebaño'' sería más abstracto y desplazaría el plural concreto del sustantivo.'
theological_decisions:
- issue: Distinguir o no ἀγαπάω y φιλέω en el diálogo
  english_pob_reading: The main text renders both with 'love' to avoid overstating the difference, while the footnote preserves the lexical variation.
  chosen_spanish_reading: El texto principal usa 'amar' en ambas respuestas/preguntas, sin forzar una distinción doctrinal cerrada.
  alternative_spanish_readings:
  - Usar 'amar' para ἀγαπάω y 'querer' para φιλέω
  - Usar 'amar profundamente' para ἀγαπάω y 'amar' para φιλέω
  rationale: El pasaje sí presenta una variación verbal real, pero no obliga por sí solo a una distinción teológica rígida. La traducción mantiene la tensión textual sin resolverla artificialmente.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El inglés auditado fue revisado para restituir πάλιν como 'again'; por eso el español mantiene explícitamente 'de nuevo' junto con 'por segunda vez'. También se conserva la decisión auditada de no marcar una distinción fuerte entre ἀγαπάω y φιλέω en el texto principal.
  spanish_consistency_notes:
  - Se usa 'Señor' para κύριε, coherente con el tratamiento reverente de Jesús en la tradición POB.
  - Se mantiene 'Amar'/'amas' para ἀγαπάω y φιλέω sin diferenciar el verbo en el cuerpo principal, siguiendo la cautela del audit trail.
  - '''Apacienta'' reproduce el imperativo pastoral de ποιμαίνω con un verbo natural en español bíblico.'
  - '''Ovejas'' conserva el sustantivo concreto de πρόβατα y evita una abstracción como ''rebaño''.'
