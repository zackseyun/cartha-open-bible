base_translation:
  language: en
  yaml_path: translation/nt/john/021/016.yaml
  text: He said to him again a second time[a], “Simon, son of John, do you love me?” He said to him, “Yes, Lord; you know that I love you.” He said to him[b], “Shepherd my sheep.”
  footnotes:
  - marker: a
    text: 'Greek uses two different verbs for ''love'' in this exchange: Jesus asks with agapaō, and Peter replies with phileō. Many interpreters see a distinction; others see stylistic variation. The main text renders both as ''love'' to avoid overstating the difference.'
    reason: lexical_alternative
  - marker: b
    text: Or 'again, a second time'.
    reason: previous_rendering
