    text: O «testifica acerca de estas cosas ... su testimonio es verdadero». El griego usa a lo largo del versículo vocabulario cognado de testimonio.
    reason: lexical_alternative
  revision_rationale: Se conserva el contenido del borrador porque es sustancialmente fiel al griego y al rastro de auditoría en inglés. Se corrige la anclación de la nota para cumplir la regla de marcadores únicos, y se ajusta la puntuación para un español más natural sin alterar el significado ni la relación léxica entre 'da testimonio' y 'testimonio'.
