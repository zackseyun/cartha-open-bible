translation:
  language: es
  text: Este es el discípulo que da testimonio[a] acerca de estas cosas y el que escribió estas cosas, y sabemos que su testimonio es verdadero.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «testifica acerca de estas cosas ... su testimonio es verdadero». El griego usa a lo largo del versículo vocabulario cognado de testimonio.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὗτός
  english_pob_choice: This
  chosen_spanish: Este
  alternatives_spanish:
  - Este mismo
  - Éste
  lexicon: demostrativo de identidad
  rationale: El demostrativo apunta al discípulo ya mencionado. «Este» mantiene la fuerza identificadora sin añadir explicaciones.
- source_word: μαθητὴς
  english_pob_choice: disciple
  chosen_spanish: discípulo
  alternatives_spanish:
  - seguidor
  - aprendiz
  lexicon: μαθητής
  rationale: En Juan, el término designa a un seguidor de Jesús; «discípulo» es la forma natural y fiel en español.
- source_word: μαρτυρῶν
  english_pob_choice: testifies
  chosen_spanish: da testimonio
  alternatives_spanish:
  - testifica
  - besa testimonio
  lexicon: μαρτυρέω
  rationale: «Da testimonio» conserva el lenguaje de testimonio y suena natural en español bíblico contemporáneo. Evita perder la relación cognada con el sustantivo siguiente.
- source_word: περὶ τούτων
  english_pob_choice: about these things
  chosen_spanish: acerca de estas cosas
  alternatives_spanish:
  - sobre estas cosas
  - acerca de estos asuntos
  lexicon: περί + pronombre demostrativo
  rationale: La preposición y el demostrativo se rinden de manera directa. «Estas cosas» preserva la referencia a lo narrado en el evangelio.
- source_word: ὁ γράψας ταῦτα
  english_pob_choice: who wrote these things
  chosen_spanish: el que escribió estas cosas
  alternatives_spanish:
  - el que ha escrito estas cosas
  - quien escribió estas cosas
  lexicon: γράφω
  rationale: El participio aoristo señala la acción completada de escribir. «El que escribió estas cosas» conserva el valor verbal y el paralelismo con la cláusula anterior.
- source_word: οἴδαμεν
  english_pob_choice: we know
  chosen_spanish: sabemos
  alternatives_spanish:
  - hemos llegado a saber
  - conocemos
  lexicon: οἶδα
  rationale: El perfecto con sentido presente se traduce naturalmente como «sabemos». Se conserva la primera persona plural sin identificar a los hablantes.
- source_word: ἀληθὴς
  english_pob_choice: 'true'
  chosen_spanish: verdadero
  alternatives_spanish:
  - verdaz
  - fiel
  - verídico
  lexicon: ἀληθής
  rationale: «Verdadero» expresa la afirmación sobre la testimonianza sin resolver si el énfasis es exactitud, confiabilidad o veracidad moral.
- source_word: αὐτοῦ ἡ μαρτυρία
  english_pob_choice: his testimony
  chosen_spanish: su testimonio
  alternatives_spanish:
  - su testimonio
  - su testimonio dado por él
  lexicon: genitivo posesivo + μαρτυρία
  rationale: En español, el genitivo se expresa de forma natural con posesivo. «Su testimonio» conserva la relación personal y la fuerza probatoria del término.
- source_word: μαρτυρία
  english_pob_choice: testimony
  chosen_spanish: testimonio
  alternatives_spanish:
  - testimonio
  - testigo
  lexicon: μαρτυρία
  rationale: Se mantiene la familia léxica con «da testimonio». «Testimonio» es el sustantivo más adecuado para esta afirmación final.
theological_decisions:
- issue: Voz del «sabemos»
  english_pob_reading: Render the first person plural straightforwardly as 'we know' without specifying the speaker(s).
  chosen_spanish_reading: «Sabemos» sin identificar quiénes integran el plural.
  alternative_spanish_readings:
  - «Sabemos» como voz editorial del evangelista
  - «Sabemos» como voz de una comunidad testificante
  rationale: El griego usa primera persona plural de modo explícito, pero no define sus referentes. La traducción preserva esa tensión y no la resuelve interpretativamente.
  doctrine_reference: Preservar la indeterminación textual y la posible voz editorial/comunitaria.
- issue: Relación cognada entre testificar y testimonio
  english_pob_reading: The Greek uses cognate witness/testimony language throughout the verse.
  chosen_spanish_reading: «Da testimonio ... su testimonio» mantiene la relación verbal-sustantivo en español.
  alternative_spanish_readings:
  - «testifica ... su testimonio»
  - «bears witness ... his witness»
  rationale: La POB destaca la repetición cognada; en español, «da testimonio» y «testimonio» conservan esa conexión de forma clara y natural.
  doctrine_reference: Mantener la correspondencia léxica del testimonio apostólico.
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente sin cambios sustantivos: el texto inglés final y el control cruzado muestran alta concordancia y no requieren ajustes adicionales. La redacción española conserva la misma estructura de testimonio y la indeterminación del plural «sabemos».'
  spanish_consistency_notes:
  - Se mantiene «discípulo» para μαθητής, en coherencia con Juan.
  - Se usa «testimonio» para μαρτυρία y la expresión verbal «da testimonio» para μαρτυρῶν, preservando la familia léxica.
  - Se evita introducir el nombre del testigo o resolver el sujeto de «sabemos».
  - La puntuación separa las dos cláusulas participiales con coma y punto y coma para reflejar el encadenamiento del original sin volverlo pesado.
