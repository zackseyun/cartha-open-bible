  text: λέγει αὐτῷ τὸ τρίτον· Σίμων ⸀Ἰωάννου, φιλεῖς με; ἐλυπήθη ὁ Πέτρος ὅτι εἶπεν αὐτῷ τὸ τρίτον· Φιλεῖς με; καὶ ⸀εἶπεν αὐτῷ· Κύριε, ⸂πάντα σὺ⸃ οἶδας, σὺ γινώσκεις ὅτι φιλῶ σε. λέγει αὐτῷ ⸀ὁ Ἰησοῦς· Βόσκε τὰ ⸀πρόβατά μου.
base_translation:
  language: en
  yaml_path: translation/nt/john/021/017.yaml
  text: He said to him the third time[a], “Simon, son of John, do you love me?” Peter was grieved because he said to him the third time, “Do you love me?” And he said to him, “Lord, you know all things; you know that I love you.” Jesus said to him[b], “Feed my sheep.”
  footnotes:
  - marker: a
    text: The Greek uses φιλέω here ('love, have affection for') where earlier in the exchange Jesus had used ἀγαπάω in two questions. Some interpreters see a meaningful distinction; others regard the verbs as overlapping in this context. The translation preserves the exchange with 'love' and does not force a sharper contrast than the Greek clearly requires.
    reason: lexical_alternative
  - marker: b
    text: 'Greek uses two verbs for ''know'' in Peter''s reply: οἶδα and γινώσκω. English normally renders both as ''know'' here; the repetition may suggest nuance, but not one that can be expressed naturally without over-interpretation.'
    reason: lexical_alternative
