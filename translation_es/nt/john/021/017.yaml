translation:
  language: es
  text: 'Él le dijo por tercera vez[a]: «Simón, hijo de Juan, ¿me amas?» Pedro se entristeció porque le dijo por tercera vez: «¿Me amas?» Y le dijo: «Señor, tú lo sabes todo; tú sabes que te amo». Jesús le dijo[b]: «Alimenta mis ovejas».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego usa φιλέω aquí («amar, tener afecto por») donde antes en el diálogo Jesús había usado ἀγαπάω en dos preguntas. Algunos intérpretes ven una distinción significativa; otros consideran que los verbos se superponen en este contexto. La traducción conserva el intercambio con «amar» y no fuerza un contraste más nítido del que el griego exige claramente.
    reason: lexical_alternative
  - marker: b
    text: 'En la respuesta de Pedro, el griego usa dos verbos para «saber»: οἶδα y γινώσκω. En español normalmente ambos se traducen como «saber» aquí; la repetición puede sugerir matiz, pero no uno que pueda expresarse con naturalidad sin sobreinterpretar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸ τρίτον
  english_pob_choice: the third time
  chosen_spanish: por tercera vez
  alternatives_spanish:
  - la tercera vez
  - tercera vez
  lexicon: BDAG
  rationale: El acusativo temporal griego funciona idiomáticamente como referencia reiterativa; en español, «por tercera vez» suena natural y mantiene el ritmo narrativo sin perder la repetición enfática.
- source_word: Σίμων Ἰωάννου
  english_pob_choice: Simon, son of John
  chosen_spanish: Simón, hijo de Juan
  alternatives_spanish:
  - Simón, hijo de Jonás
  - Simón Juan
  lexicon: BDAG
  rationale: El genitivo es mejor entendido como patronímico; «hijo de Juan» refleja directamente Ἰωάννου. No se adopta la forma tradicional «Jonás» porque no corresponde a esta lectura griega.
- source_word: φιλεῖς / φιλῶ
  english_pob_choice: love / love
  chosen_spanish: amas / amo
  alternatives_spanish:
  - quieres mucho / quiero mucho
  - te tengo afecto / te tengo afecto
  lexicon: BDAG
  rationale: «Amar» es el equivalente más natural y solemne en español para φιλέω en este contexto. Se evita forzar una diferenciación léxica artificial con otra raíz verbal en el texto principal, preservando la tensión del intercambio sin sobreinterpretarla.
- source_word: ἐλυπήθη
  english_pob_choice: was grieved
  chosen_spanish: se entristeció
  alternatives_spanish:
  - se apenó
  - se afligió
  lexicon: BDAG
  rationale: El pasivo comunica dolor real o pesar; «se entristeció» es claro y digno en español moderno. «Se afligió» sería más intenso, pero menos natural aquí.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Señor mío
  - Maestro
  lexicon: BDAG
  rationale: «Señor» es la forma estable y reverente para κύριε en este contexto de Jesús resucitado. Mantiene el valor devocional sin rebajarlo a mera cortesía.
- source_word: πάντα σὺ οἶδας
  english_pob_choice: you know all things
  chosen_spanish: tú lo sabes todo
  alternatives_spanish:
  - tú conoces todo
  - tú sabes todas las cosas
  lexicon: BDAG
  rationale: La construcción griega expresa amplitud total de conocimiento. «Lo sabes todo» suena idiomático y conserva la fuerza de πάντα sin volverlo rígidamente abstracto.
- source_word: σὺ γινώσκεις
  english_pob_choice: you know
  chosen_spanish: tú sabes
  alternatives_spanish:
  - tú conoces
  - tú entiendes
  lexicon: BDAG
  rationale: En español, repetir «sabes» permite reproducir la duplicación griega sin sobrecargar con una distinción artificial. «Conoces» sería válido, pero menos natural en esta confesión.
- source_word: Βόσκε
  english_pob_choice: Feed
  chosen_spanish: Apacienta
  alternatives_spanish:
  - Alimenta
  - Pastorea
  lexicon: BDAG
  rationale: Aunque βόσκω puede significar literalmente «alimentar/pastar», en español «apacentar» comunica el cuidado pastoral del rebaño con buena naturalidad. Se evita «pastorea» porque corresponde más directamente a ποιμαίνω, no a βόσκω.
- source_word: πρόβατά
  english_pob_choice: sheep
  chosen_spanish: ovejas
  alternatives_spanish:
  - corderos
  - rebaño
  lexicon: BDAG
  rationale: πρόβατα son ovejas; «ovejas» preserva la referencia lexical precisa y la distinción respecto de términos como «corderos» o «rebaño».
theological_decisions:
- issue: Diferenciación entre φιλέω y ἀγαπάω en la escena
  english_pob_reading: Render φιλέω as 'love' without implying a different kind of love in the main text
  chosen_spanish_reading: Traducir ambos verbos como «amar», sin convertir la alternancia en una distinción doctrinal explícita en el texto principal
  alternative_spanish_readings:
  - «amar» vs. «tener afecto por»
  - Marcar la alternancia con verbos distintos para sugerir matiz fuerte
  rationale: El intercambio ha generado interpretaciones teológicas amplias, pero el valor semántico no es lo bastante estable como para imponer una diferencia fija en español. El texto mantiene la tensión léxica y la deja para nota, evitando sobre-resolverla.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it; §5: Consistency of key terms, or documented exception.'
- issue: Alcance de «tú lo sabes todo / tú sabes que te amo»
  english_pob_reading: Translate straightforwardly as a strong statement of Jesus' comprehensive knowledge within the discourse
  chosen_spanish_reading: Conservar una afirmación fuerte de conocimiento total sin glosa doctrinal añadida
  alternative_spanish_readings:
  - «tú sabes todo acerca de esto»
  - Explicitar omnisciencia en forma doctrinal
  rationale: La frase griega afirma amplitud total; la traducción la respeta sin ampliar ni restringir su alcance. El texto habla con suficiente fuerza por sí mismo.
  doctrine_reference: Affirmations; Translation philosophy §1 and §3.
translation_notes:
  revision_awareness: Basado en el último pase revisado (gpt-5.4), sin cambios necesarios; se mantiene alta concordancia con el audit trail inglés y no se aplicaron revisiones posteriores.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero no aplica en este versículo.
  - Se usa «Señor» para κύριε según el valor reverente y cristológico del contexto joánico.
  - «Amar» se mantiene para φιλέω para no exagerar una distinción léxica discutida.
  - «Apacentar» se eligió para βόσκω por su cercanía funcional al cuidado del rebaño en español eclesial estándar.
  - «Ovejas» preserva la distinción léxica de πρόβατα frente a otros posibles términos pastorales.
