    rationale: 'El texto de la nota dice «O: “pescado”», pero el texto principal ya usa «pescado». Según el rastro inglés, la alternativa preservada es «anything to eat», no «fish». La nota debe reflejar la amplitud semántica de προσφάγιον y explicar por qué el texto principal contextualiza como «pescado».'
  - severity: low
    issue: El vocativo «Muchachos» es algo más interpretativo que el equivalente formal más cercano.
    rationale: Παιδία significa literalmente «niños/hijitos/children» como trato afectuoso. «Muchachos» suena natural en una escena de pesca con discípulos varones, pero conviene reconocer que es una elección idiomática más que estrictamente literal. Aun así, no distorsiona el sentido y no exige cambio.
  revised_spanish_text: 'Entonces Jesús les dijo: «Muchachos, ¿no tienen ustedes pescado[a]?». Ellos le contestaron: «No».'
  revised_footnotes:
  - marker: a
    text: 'O: «algo de comer». El griego προσφάγιον se refiere más específicamente a comida que se come con pan; en este contexto de pesca probablemente alude a pescado.'
