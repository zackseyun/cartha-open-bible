translation:
  language: es
  text: 'Entonces Jesús les dijo: «Muchachos, ¿no tienen ustedes pescado[a]?». Ellos le contestaron: «No».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «algo de comer». El griego προσφάγιον se refiere más específicamente a comida que se come con pan; en este contexto de pesca probablemente alude a pescado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει οὖν
  english_pob_choice: So said
  chosen_spanish: Entonces dijo
  alternatives_spanish:
  - Así que dijo
  - Luego dijo
  lexicon: BDAG
  rationale: οὖν funciona como conector discursivo; «Entonces» mantiene la progresión narrativa de manera natural en español sin sobrecargarla con una inferencia lógica más fuerte que la del contexto.
- source_word: Παιδία
  english_pob_choice: Children
  chosen_spanish: Muchachos
  alternatives_spanish:
  - Niños
  - Hijos
  - Amigos
  lexicon: BDAG
  rationale: Aunque el sentido básico es un vocativo afectuoso, en este contexto de discípulos varones en una escena de pesca «Muchachos» comunica cercanía y suena más natural en español que «Niños»; «Amigos» sería más interpretativo.
- source_word: μή τι
  english_pob_choice: do you not have any ...?
  chosen_spanish: ¿no tienen ustedes ...?
  alternatives_spanish:
  - ¿acaso no tienen ...?
  - ¿no tienen por casualidad ...?
  lexicon: BDAG
  rationale: μή τι en pregunta espera una respuesta negativa. En español, una pregunta directa con negación reproduce bien esa fuerza interrogativa sin añadir elementos no presentes en el griego.
- source_word: προσφάγιον
  english_pob_choice: fish
  chosen_spanish: pescado
  alternatives_spanish:
  - algo de comer
  - comida
  - algo para comer
  lexicon: BDAG
  rationale: La nota inglesa observa que el término se refiere más específicamente a comida que se come con pan, pero en este contexto de pesca apunta probablemente a pescado. «Pescado» conserva la concreción contextual sin expandir el sentido a una paráfrasis más amplia.
- source_word: ἔχετε
  english_pob_choice: you have
  chosen_spanish: tienen ustedes
  alternatives_spanish:
  - ustedes tienen
  - tienen
  lexicon: BDAG
  rationale: Se mantiene la posesión en presente. «Tienen ustedes» suena natural en la pregunta y preserva la referencia plural a los interlocutores.
- source_word: ἀπεκρίθησαν αὐτῷ
  english_pob_choice: They answered him
  chosen_spanish: Ellos le contestaron
  alternatives_spanish:
  - Le respondieron
  - Le dijeron
  lexicon: BDAG
  rationale: «Contestar» reproduce bien la respuesta breve y directa del relato. «Le respondieron» también sería válido, pero «contestaron» mantiene una cadencia narrativa clara en español.
- source_word: Οὔ
  english_pob_choice: 'No'
  chosen_spanish: 'No'
  alternatives_spanish:
  - No, no tenemos
  lexicon: BDAG
  rationale: La respuesta griega es concisa; se conserva igualmente breve en español.
theological_decisions:
- issue: Tratamiento de Παιδία como vocativo afectuoso
  english_pob_reading: Children
  chosen_spanish_reading: Muchachos
  alternative_spanish_readings:
  - Niños
  - Hijos
  - Amigos
  rationale: 'No hay decisión doctrinal, pero sí una decisión de tono: el vocativo en este contexto expresa cercanía y familiaridad sin que deba leerse literalmente como referencia a edad infantil. «Muchachos» transmite ese matiz en español y evita una impresión inadecuada.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador de nota [a] aparezca explícitamente en el texto principal. Además, se alineó el sustantivo con el contexto narrativo de pesca siguiendo el audio textual inglés y la observación léxica sobre προσφάγιον.
  spanish_consistency_notes:
  - Se mantiene el nombre divino fuera de este versículo porque no aparece en el texto fuente.
  - «Jesús» se conserva como forma estable del nombre propio.
  - La puntuación y el uso de comillas angulares siguen la convención tipográfica española.
  - Se eligió «pescado» para reflejar el sentido contextual de προσφάγιον sin ampliar innecesariamente el significado.
