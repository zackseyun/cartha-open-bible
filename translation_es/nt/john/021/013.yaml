translation:
  language: es
  text: Jesús viene[a] y toma el pan y les da, y el pescado igualmente[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vino, tomó el pan y les dio». El griego usa presentes históricos.
    reason: lexical_alternative
  - marker: b
    text: O «y de la misma manera el pescado».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔρχεται
  english_pob_choice: comes
  chosen_spanish: viene
  alternatives_spanish:
  - viene
  - llega
  lexicon: BDAG
  rationale: El presente histórico del griego se conserva de forma natural en español con «viene», que mantiene la vivacidad narrativa sin forzar un pretérito.
- source_word: λαμβάνει
  english_pob_choice: takes
  chosen_spanish: toma
  alternatives_spanish:
  - toma
  - recibe
  lexicon: BDAG
  rationale: En el contexto de repartir comida, «toma» expresa la acción simple de tomar el pan antes de darlo.
- source_word: τὸν ἄρτον
  english_pob_choice: the bread
  chosen_spanish: el pan
  alternatives_spanish:
  - el pan
  - un pan
  lexicon: BDAG
  rationale: El artículo griego señala un pan determinado en la escena; en español «el pan» reproduce bien esa referencia concreta.
- source_word: δίδωσιν αὐτοῖς
  english_pob_choice: gives it to them
  chosen_spanish: se lo da a ellos
  alternatives_spanish:
  - se lo da
  - lo da a ellos
  lexicon: BDAG
  rationale: En español, el dativo indirecto se expresa mejor con «se lo da», donde «lo» remite al pan ya mencionado. Se mantiene la referencia explícita a «ellos» para reflejar el dativo plural del griego.
- source_word: τὸ ὀψάριον
  english_pob_choice: the fish
  chosen_spanish: el pescado
  alternatives_spanish:
  - el pescado
  - el pez
  - el pescado cocido
  lexicon: BDAG
  rationale: En este contexto alimentario, «pescado» es el equivalente más natural y claro para el alimento servido; «pez» sería menos idiomático en español moderno.
- source_word: ὁμοίως
  english_pob_choice: likewise
  chosen_spanish: igualmente
  alternatives_spanish:
  - igualmente
  - de la misma manera
  - lo mismo
  lexicon: BDAG
  rationale: «Igualmente» conserva la brevedad y el paralelismo del adverbio griego, sin añadir explicaciones que el texto no da.
theological_decisions:
- issue: Presente histórico en la narración de la aparición de resurrección
  english_pob_reading: Retain the historical present ('comes ... takes ... gives')
  chosen_spanish_reading: Mantener el presente narrativo («viene ... toma ... da»)
  alternative_spanish_readings:
  - Pasar al pretérito simple («vino ... tomó ... dio»)
  rationale: La decisión es estilística y refleja mejor la textura narrativa del griego, sin cambiar el sentido ni introducir matices doctrinales.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: Se corrigió la validación anterior eliminando notas sueltas sin anclaje. En esta versión no se usan notas al pie, porque la redacción principal ya expresa de manera natural las decisiones léxicas relevantes.
  spanish_consistency_notes:
  - Se mantiene el nombre propio «Jesús» para Ἰησοῦς.
  - Se conserva el paralelismo verbal del griego con tres acciones breves en presente.
  - «Pescado» se usa como término alimentario natural en español, coherente con el contexto de una comida.
  - No se introduce terminología eclesiástica ajena al pasaje.
