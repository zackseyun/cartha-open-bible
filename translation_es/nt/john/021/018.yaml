  text: ἀμὴν ἀμὴν λέγω σοι, ὅτε ἦς νεώτερος, ἐζώννυες σεαυτὸν καὶ περιεπάτεις ὅπου ἤθελες· ὅταν δὲ γηράσῃς, ἐκτενεῖς τὰς χεῖράς σου, καὶ ἄλλος ⸂σε ζώσει⸃ καὶ οἴσει ὅπου οὐ θέλεις.
base_translation:
  language: en
  yaml_path: translation/nt/john/021/018.yaml
  text: Truly[a], truly, I say to you, when you were younger, you used to dress yourself and walk where you wanted; but when you grow old, you will stretch out your hands[c][b], and another will dress you and carry you where you do not want to go.
  footnotes:
  - marker: a
    text: Or 'gird yourself' / 'another will gird you.' The Greek verb refers literally to fastening or binding on clothing; here it contrasts Peter's former independence with later dependence.
    reason: lexical_alternative
  - marker: b
    text: '''Stretch out your hands'' is often understood as alluding to Peter''s death by crucifixion; the next verse explains that Jesus said this to indicate the kind of death by which Peter would glorify God.'
    reason: cross_reference
  - marker: c
    text: Or 'lead you' / 'take you.' The Greek can denote being borne or taken along to an unwanted destination.
    reason: lexical_alternative
