translation:
  language: es
  text: 'En verdad[a], en verdad, te digo: cuando eras más joven, tú mismo te vestías y andabas adonde querías; pero cuando envejezcas, extenderás tus manos[b], y otro te vestirá y te llevará[c] adonde no quieres ir.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Amén, amén». La fórmula griega es una afirmación solemne, y puede transliterarse; aquí se traduce para una lectura española fluida.
    reason: lexical_alternative
  - marker: b
    text: La expresión suele entenderse como una alusión a la muerte de Pedro por crucifixión; el versículo siguiente explica que Jesús dijo esto para indicar el tipo de muerte con que Pedro glorificaría a Dios.
    reason: cross_reference
  - marker: c
    text: O «te conducirá» / «te tomará». El verbo griego puede indicar ser llevado o conducido a un lugar no deseado.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀμὴν ἀμὴν
  english_pob_choice: Truly, truly
  chosen_spanish: En verdad, en verdad
  alternatives_spanish:
  - Amén, amén
  - Ciertamente, ciertamente
  lexicon: BDAG
  rationale: La duplicación enfática se conserva con una fórmula natural y solemne en español. «En verdad» comunica la fuerza performativa sin transliterar innecesariamente «amén» en el discurso directo.
- source_word: λέγω σοι
  english_pob_choice: I say to you
  chosen_spanish: te digo
  alternatives_spanish:
  - te digo a ti
  - yo te digo
  lexicon: BDAG
  rationale: En español, el dativo de destinatario se expresa de forma natural con «te». Mantiene el tono directo de Jesús sin sobrecargar la frase.
- source_word: ὅτε ἦς νεώτερος
  english_pob_choice: when you were younger
  chosen_spanish: cuando eras más joven
  alternatives_spanish:
  - cuando eras joven
  - cuando fueras más joven
  lexicon: BDAG
  rationale: «Más joven» refleja bien el comparativo νεώτερος y preserva la referencia implícita al contraste con la vejez posterior.
- source_word: ἐζώννυες σεαυτὸν
  english_pob_choice: you used to dress yourself
  chosen_spanish: tú mismo te vestías
  alternatives_spanish:
  - tú mismo te ceñías
  - te vestías por ti mismo
  lexicon: BDAG
  rationale: El verbo griego alude literalmente a ceñirse/asegurar la ropa, pero en español «vestirse» comunica la acción con naturalidad y mantiene el contraste con la acción posterior realizada por otro. Se conserva el matiz de autodirección con «tú mismo».
- source_word: περιεπάτεις ὅπου ἤθελες
  english_pob_choice: walk where you wanted
  chosen_spanish: andabas adonde querías
  alternatives_spanish:
  - caminabas adonde querías
  - ibas adonde querías
  lexicon: BDAG
  rationale: «Andabas» suena natural para el movimiento ordinario en español y conserva la imagen concreta de libertad personal. «Adonde» expresa con claridad el destino.
- source_word: ὅταν δὲ γηράσῃς
  english_pob_choice: but when you grow old
  chosen_spanish: pero cuando envejezcas
  alternatives_spanish:
  - pero cuando seas viejo
  - pero cuando llegues a viejo
  lexicon: BDAG
  rationale: «Envejezcas» traduce de forma directa la idea verbal futura y mantiene el giro prospectivo introducido por ὅταν. «Pero» refleja el contraste suave de δέ.
- source_word: ἐκτενεῖς τὰς χεῖράς σου
  english_pob_choice: you will stretch out your hands
  chosen_spanish: extenderás tus manos
  alternatives_spanish:
  - estirarás tus manos
  - alargarás tus manos
  lexicon: BDAG
  rationale: Se conserva la literalidad de la imagen sin resolverla en la traducción. «Extenderás» es el equivalente más natural y digno en español.
- source_word: ἄλλος σε ζώσει
  english_pob_choice: another will dress you
  chosen_spanish: otro te vestirá
  alternatives_spanish:
  - otro te ceñirá
  - otro te ajustará la ropa
  lexicon: BDAG
  rationale: Para sostener el paralelismo con la acción anterior, «vestirá» mantiene en español el contraste entre vestirse uno mismo y ser vestido por otro. La opción literal «ceñirá» se reserva como alternativa léxica por su posible lectura más técnica.
- source_word: οἴσει
  english_pob_choice: carry you
  chosen_spanish: te llevará
  alternatives_spanish:
  - te conducirá
  - te arrastrará
  lexicon: BDAG
  rationale: «Llevará» es un equivalente natural de φέρω en este contexto y puede sugerir traslado forzoso o no deseado sin explicitar más de lo que el texto dice.
- source_word: ὅπου οὐ θέλεις
  english_pob_choice: where you do not want to go
  chosen_spanish: adonde no quieres
  alternatives_spanish:
  - adonde no deseas ir
  - adonde no quieres ir
  lexicon: BDAG
  rationale: El español permite omitir «ir» porque el verbo de movimiento ya está implícito en el contexto. «Adonde no quieres» conserva la brevedad y la fuerza del destino no querido.
theological_decisions:
- issue: Si explicitar en el texto principal la alusión a la crucifixión
  english_pob_reading: Keep the wording literal and non-explicit in the main text
  chosen_spanish_reading: Mantener la formulación literal sin explicitar la crucifixión en el texto principal
  alternative_spanish_readings:
  - Extenderás tus manos hasta la cruz
  - Serás crucificado cuando seas viejo
  rationale: El versículo siguiente interpreta el sentido de la frase; por eso, el texto principal debe conservar la imagen abierta y dejar que la aclaración llegue donde el griego y el contexto la colocan. Así se preserva la tensión documental y exegética del pasaje.
  doctrine_reference: 'POB translation philosophy: preserve theological tension rather than resolve it prematurely.'
translation_notes:
  revision_awareness: 'Se siguió el estado de revisión más reciente sin cambios sustantivos: el texto inglés auditado mantiene la lectura literal en el cuerpo principal y reserva la alusión a la crucifixión para la nota de cruce. No se introdujeron expansiones doctrinales ni se alteró el paralelismo léxico central.'
  spanish_consistency_notes:
  - Se mantuvo «adonde» para destino/movimiento, evitando alternar con «donde» cuando el sentido es direccional.
  - Se conservó el paralelismo entre la acción de vestirse uno mismo y ser vestido por otro, sin forzar en el texto principal «ceñir» si en español suena excesivamente técnico.
  - «Envejezcas» se eligió para reflejar el futuro prospectivo del griego con una forma natural en español.
  - No se usó «SEÑOR» ni «Cristo» porque el versículo no contiene esos términos.
