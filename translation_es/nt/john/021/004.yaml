translation:
  language: es
  text: Cuando ya había amanecido[a], Jesús estaba de pie en la orilla; sin embargo, los discípulos no sabían[b] que era Jesús.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando ya había llegado la mañana». El griego dice más literalmente: «cuando ya había llegado la mañana».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no reconocían que era Jesús». El griego dice más literalmente: «no sabían que era Jesús».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Πρωΐας ... ἤδη γενομένης
  english_pob_choice: when daybreak had already come
  chosen_spanish: cuando ya había amanecido
  alternatives_spanish:
  - cuando ya había llegado la mañana
  - al alba, ya llegada
  lexicon: BDAG
  rationale: La construcción de genitivo absoluto pide una circunstancia temporal. «Amanecer» comunica de forma natural el inicio de la mañana y conserva el valor de πρωΐα sin forzar un calco; «ya había» refleja ἤδη con naturalidad en español.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y
  - Pero
  lexicon: BDAG
  rationale: Aquí δέ funciona como conector narrativo leve. «Ahora» mantiene el avance del relato en español sin cargar contraste indebido.
- source_word: ἔστη
  english_pob_choice: stood
  chosen_spanish: estaba
  alternatives_spanish:
  - estuvo de pie
  - se puso de pie
  lexicon: BDAG
  rationale: Aunque el griego usa un aoristo de «estar de pie», en español «estaba en la orilla» expresa de modo natural la presencia ya establecida en ese lugar. Se conserva la escena sin un giro forzado.
- source_word: εἰς τὸν αἰγιαλόν
  english_pob_choice: on the shore
  chosen_spanish: en la orilla
  alternatives_spanish:
  - sobre la playa
  - junto a la orilla
  lexicon: BDAG
  rationale: «Orilla» comunica bien αἰγιαλός en contexto costero. Se evita el calco de εἰς y se prioriza la ubicación natural en español.
- source_word: οὐ μέντοι
  english_pob_choice: yet
  chosen_spanish: pero
  alternatives_spanish:
  - sin embargo
  - no obstante
  lexicon: BDAG
  rationale: La combinación introduce un contraste concesivo. En español, «pero» es suficientemente natural aquí y conserva la oposición narrativa entre la presencia de Jesús y la falta de reconocimiento.
- source_word: ᾔδεισαν
  english_pob_choice: did not know
  chosen_spanish: no sabían
  alternatives_spanish:
  - no reconocieron
  - no se daban cuenta
  lexicon: BDAG
  rationale: Se mantiene el verbo cognitivo general de οἶδα. «No sabían» evita resolver la frase como «reconocieron», opción que el audit trail deja como alternativa interpretativa.
- source_word: οἱ μαθηταὶ
  english_pob_choice: the disciples
  chosen_spanish: los discípulos
  alternatives_spanish:
  - sus discípulos
  lexicon: BDAG
  rationale: El artículo define al grupo conocido en la escena. «Los discípulos» reproduce la referencia sin añadir posesión que no está en el griego.
- source_word: ὅτι Ἰησοῦς ἐστιν
  english_pob_choice: that it was Jesus
  chosen_spanish: que era Jesús
  alternatives_spanish:
  - que era Jesús allí
  - que se trataba de Jesús
  lexicon: BDAG
  rationale: En español la cláusula identificativa suele expresarse con «era Jesús». Conserva la identificación sin introducir explicaciones adicionales.
theological_decisions:
- issue: No reconocer a Jesús tras la resurrección
  english_pob_reading: Translate the disciples' failure as lack of knowledge/recognition without implying any doctrinal explanation for why they failed to identify him.
  chosen_spanish_reading: Se traduce la falta de conocimiento como tal, sin explicar por qué no lo reconocieron.
  alternative_spanish_readings:
  - Se traduce más interpretivamente como «no reconocieron que era Jesús»
  - Se explicita una causa de la falta de reconocimiento
  rationale: El verso sólo afirma el hecho narrativo de la no identificación; no da su causa. La versión española preserva esa reserva teológica y narrativa, evitando resolver una tensión que el texto deja abierta.
  doctrine_reference: Preservar la tensión teológica sin resolverla
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente del texto inglés: no se requieren cambios adicionales. La solución española mantiene el valor temporal del genitivo absoluto, el contraste de δέ/μέντοι y la lectura no interpretativa de οὐκ ᾔδεισαν.'
  spanish_consistency_notes:
  - Se usa «Jesús» de manera consistente para Ἰησοῦς.
  - Se evita «SEÑOR» u otro sustituto para el nombre divino porque el versículo no contiene referencia a יהוה.
  - «Orilla» se prefiere como equivalente natural de αἰγιαλός en este contexto marítimo.
  - Se conserva «no sabían» para mantener la decisión lexical de οἶδα frente a una paráfrasis de reconocimiento.
