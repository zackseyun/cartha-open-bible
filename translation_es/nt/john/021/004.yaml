  to: Cuando ya había amanecido[a], Jesús estaba de pie en la orilla; sin embargo, los discípulos no sabían[b] que era Jesús.
  rationale: Se ajusta ἔστη a un español más fiel ('estaba de pie') sin perder naturalidad. Se mantiene 'no sabían' para respetar οἶδα, y se añade una nota que preserve la alternativa contextual de reconocimiento documentada en el audit trail inglés. También se suaviza el conector adversativo a 'sin embargo' para reflejar mejor οὐ μέντοι y se limpian las notas al pie.
