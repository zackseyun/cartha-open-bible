translation:
  language: es
  text: Entonces Simón Pedro subió a la barca[a] y jaló la red a la orilla[b], llena de peces grandes, ciento cincuenta y tres; y, aunque eran tantos, la red no se rasgó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «subió»; el verbo griego dice literalmente «subió», pero en este contexto probablemente significa que Simón Pedro subió a la barca para jalar la red.
    reason: lexical_alternative
  - marker: b
    text: Literalmente «a la tierra»; aquí «a la orilla» expresa el sentido contextual en la escena de pesca.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνέβη
  english_pob_choice: went aboard
  chosen_spanish: subió
  alternatives_spanish:
  - subió a bordo
  - entró en la barca
  - subió
  lexicon: BDAG
  rationale: El verbo griego significa literalmente «subió», y en este contexto narrativo puede implicar que Pedro subió a la barca para manejar la red. En español, «subió» mantiene la ambigüedad útil y evita forzar una especificación que el griego no exige.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Entonces
  alternatives_spanish:
  - Así que
  - Por tanto
  - Luego
  lexicon: BDAG
  rationale: Marca continuidad narrativa con el contexto previo. «Entonces» suena natural en español bíblico moderno sin introducir una inferencia más fuerte que la del griego.
- source_word: εἵλκυσεν
  english_pob_choice: pulled
  chosen_spanish: arrastró
  alternatives_spanish:
  - jaló
  - tiró de
  - haló
  lexicon: BDAG
  rationale: El verbo expresa el acto de tirar con fuerza de la red. «Arrastró» conserva la fuerza física del movimiento; en contexto de una red pesada, comunica bien la acción sin suavizarla demasiado.
- source_word: δίκτυον
  english_pob_choice: net
  chosen_spanish: red
  alternatives_spanish:
  - red de pesca
  - malla
  lexicon: BDAG
  rationale: «Red» es el equivalente directo y natural en español para el implemento de pesca. No hace falta explicitar «de pesca» porque el contexto ya lo determina.
- source_word: εἰς τὴν γῆν
  english_pob_choice: onto the shore
  chosen_spanish: a tierra
  alternatives_spanish:
  - a la orilla
  - a la playa
  - a tierra
  lexicon: BDAG
  rationale: El griego dice literalmente «a/into la tierra». Dado el contexto de pesca, el español puede conservar esa literalidad sin perder claridad. Se evita imponer «orilla» o «playa» como si fueran más precisos de lo que el texto base permite.
- source_word: μεστὸν
  english_pob_choice: full of
  chosen_spanish: llena de
  alternatives_spanish:
  - lleno de
  - colmada de
  lexicon: BDAG
  rationale: La red es femenina en español, por lo que «llena de» concuerda naturalmente y expresa el estado de contenido completo.
- source_word: ἰχθύων μεγάλων
  english_pob_choice: large fish
  chosen_spanish: peces grandes
  alternatives_spanish:
  - peces enormes
  - peces de gran tamaño
  lexicon: BDAG
  rationale: «Peces grandes» es una traducción directa y sobria del sintagma. Mantiene el adjetivo cualitativo sin exagerarlo.
- source_word: ἑκατὸν πεντήκοντα τριῶν
  english_pob_choice: one hundred fifty-three
  chosen_spanish: ciento cincuenta y tres
  alternatives_spanish:
  - ciento cincuenta y tres
  lexicon: BDAG
  rationale: Se reproduce el número explícito de manera estándar en español. No hay razón textual para simplificarlo o interpretarlo simbólicamente.
- source_word: τοσούτων ὄντων
  english_pob_choice: though there were so many
  chosen_spanish: aunque eran tantos
  alternatives_spanish:
  - aunque había tantos
  - a pesar de que eran tantos
  lexicon: BDAG
  rationale: La construcción de genitivo absoluto expresa concesión. «Aunque eran tantos» conserva la relación concesiva de modo natural en español y refleja la tensión entre la gran cantidad y el resultado inesperado.
- source_word: ἐσχίσθη
  english_pob_choice: was not torn
  chosen_spanish: no se rasgó
  alternatives_spanish:
  - no se rompió
  - no se partió
  - no fue rasgada
  lexicon: BDAG
  rationale: El pasivo se expresa de forma natural con «no se rasgó». En español, este verbo comunica bien que la red permaneció intacta bajo tensión.
translation_notes:
  revision_awareness: 'Se siguió el texto griego SBLGNT y el expediente inglés auditado. El inglés opta por una equivalencia óptima con dos notas léxicas principales: ἀνέβη («went aboard» con alternativa «went up») y εἰς τὴν γῆν («onto the shore» con alternativa literal «to the land»). En español, se preservó la literalidad controlada en ambos puntos: «subió» con nota a, y «a tierra» con nota b. También se mantuvo la concesión de τοσούτων ὄντων con una formulación natural («aunque eran tantos») y se conservó el número exacto del texto.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general en el proyecto, pero este versículo no contiene el nombre divino.
  - Se eligió «red» y no «malla» para conservar el término común y directo del objeto pesquero.
  - Se evitó expandir «a tierra» a «a la orilla» porque el griego usa γῆ y la tradición auditada permite la literalidad contextual.
  - No hay decisiones doctrinales en este versículo; el contenido es narrativo y descriptivo.
