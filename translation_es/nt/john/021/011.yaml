    text: Or 'went up'; the Greek verb is literally 'went up,' but in context likely means that Simon Peter got into or onto the boat to pull in the net.
    reason: lexical_alternative
  - marker: b
    text: Literally 'to the land'; here 'shore' conveys the sense in context.
    reason: lexical_alternative
