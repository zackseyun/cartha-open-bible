  to: Entonces Simón Pedro subió a la barca[a] y jaló la red a la orilla[b], llena de peces grandes, ciento cincuenta y tres; y, aunque eran tantos, la red no se rasgó.
  rationale: Se corrige el anclaje de la nota [a], se ajusta ἀνέβη a una formulación contextual más natural y fiel al rastro auditado («subió a la barca»), se reemplaza «arrastró» por «jaló» para reflejar mejor εἵλκυσεν, y se usa «a la orilla» para expresar el sentido contextual de εἰς τὴν γῆν, preservando la literalidad en nota. Se elimina la nota [c] por innecesaria.
