translation:
  language: es
  text: Después de estas cosas[a], Jesús se reveló de nuevo a los discípulos junto al mar de Tiberíades, y se reveló de esta manera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'apareció'; el verbo griego puede denotar hacerse visible o darse a conocer.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μετὰ ταῦτα
  english_pob_choice: After these things
  chosen_spanish: Después de estas cosas
  alternatives_spanish:
  - Después de esto
  - Más tarde
  lexicon: BDAG
  rationale: Conserva el plural del demostrativo griego y el paso narrativo característico de Juan. 'Después de estas cosas' suena natural en español bíblico sin perder precisión temporal.
- source_word: ἐφανέρωσεν ἑαυτὸν
  english_pob_choice: revealed himself
  chosen_spanish: se reveló
  alternatives_spanish:
  - apareció
  - se dio a conocer
  lexicon: BDAG
  rationale: '''Se reveló'' mantiene el valor de manifestación del verbo φανερόω y la fuerza reflexiva de ἑαυτόν. En español expresa mejor la autodescarga de la presencia de Jesús que un simple ''apareció''.'
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: de nuevo
  alternatives_spanish:
  - otra vez
  - nuevamente
  lexicon: BDAG
  rationale: '''De nuevo'' es una equivalencia natural y sobria en español para la repetición de la manifestación, sin añadir matiz innecesario.'
- source_word: τοῖς μαθηταῖς
  english_pob_choice: to the disciples
  chosen_spanish: a los discípulos
  alternatives_spanish:
  - a sus discípulos
  lexicon: BDAG
  rationale: El posesivo no está explícito en el griego. Se omite para no introducir un matiz no marcado por el texto.
- source_word: ἐπὶ τῆς θαλάσσης τῆς Τιβεριάδος
  english_pob_choice: by the Sea of Tiberias
  chosen_spanish: junto al mar de Tiberíades
  alternatives_spanish:
  - a la orilla del mar de Tiberíades
  - por el mar de Tiberíades
  lexicon: BDAG
  rationale: '''Junto al'' comunica la localización cercana que exige el contexto narrativo y evita una calca poco natural de la preposición griega. ''Mar de Tiberíades'' sigue la designación joánica.'
- source_word: ἐφανέρωσεν δὲ οὕτως
  english_pob_choice: and he revealed himself in this way
  chosen_spanish: y así se reveló
  alternatives_spanish:
  - y así se manifestó
  - y de esta manera se reveló
  lexicon: BDAG
  rationale: Se mantiene el segundo verbo para conservar la cohesión literaria del versículo. 'Así' introduce la manera del relato que sigue, con una formulación breve y idiomática en español.
theological_decisions:
- issue: Lenguaje de la aparición/resurrección de Jesús
  english_pob_reading: revealed himself
  chosen_spanish_reading: se reveló
  alternative_spanish_readings:
  - apareció
  - se manifestó
  rationale: '''Se reveló'' preserva tanto la realidad de la aparición del Resucitado como el matiz de auto-manifestación del verbo griego, sin reducir el acontecimiento a mera percepción visual.'
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El audit trail en inglés no registra revisiones aplicadas; el consenso de revisión fue de alta concordancia y se mantiene la lectura principal de 'revealed himself' con su alternativa léxica documentada.
  spanish_consistency_notes:
  - Se usa 'Jesús' para Ἰησοῦς conforme al estándar del proyecto.
  - Se evita 'SEÑOR' porque aquí no aparece κύριος; el nombre propio del sujeto es explícito en el griego.
  - '''Mar de Tiberíades'' conserva la denominación geográfica del texto griego.'
  - La doble mención de ἐφανέρωσεν se preserva en español con 'se reveló' ... 'se reveló' para reflejar la repetición literaria.
