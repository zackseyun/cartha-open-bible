revisions:
- from: Después de estas cosas[a], Jesús se reveló de nuevo a los discípulos junto al mar de Tiberíades, y así se reveló.
  to: Después de estas cosas[a], Jesús se reveló de nuevo a los discípulos junto al mar de Tiberíades, y se reveló de esta manera.
  rationale: Se ajusta solo la cláusula final para reflejar mejor la función de οὕτως como introducción al modo en que ocurrió la manifestación, con un español más natural y fiel. Se conserva todo lo demás, incluida la nota léxica alternativa.
  reviewer_model: gpt-5.4
