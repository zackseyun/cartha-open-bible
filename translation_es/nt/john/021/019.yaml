translation:
  language: es
  text: 'Ahora bien, esto lo dijo para indicar[a] con qué clase de muerte glorificaría a Dios. Y después de decir esto, le dice[b]: «Sígueme».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de qué manera de muerte».
    reason: lexical_alternative
  - marker: b
    text: 'El griego usa un presente histórico: «le dice».'
    reason: lexical_alternative
lexical_decisions:
- source_word: σημαίνων
  english_pob_choice: to indicate
  chosen_spanish: indicar
  alternatives_spanish:
  - señalar
  - dar a entender
  lexicon: BDAG
  rationale: «Indicar» conserva la idea de dar a conocer algo de manera indirecta o implícita, sin volver explícito lo que el texto solo sugiere.
- source_word: ποίῳ θανάτῳ
  english_pob_choice: by what kind of death
  chosen_spanish: por qué clase de muerte
  alternatives_spanish:
  - por qué muerte
  - de qué manera de muerte
  lexicon: BDAG
  rationale: «Ποίῳ» añade un matiz cualitativo; «por qué clase de muerte» comunica mejor en español la pregunta por el tipo o modo de muerte que una simple equivalencia literal.
- source_word: δοξάσει
  english_pob_choice: he would glorify
  chosen_spanish: había de glorificar
  alternatives_spanish:
  - glorificaría
  - glorificará
  lexicon: BDAG
  rationale: En discurso indirecto tras un verbo pasado, «había de glorificar» mantiene el valor prospectivo del futuro griego sin perder naturalidad en español.
- source_word: τὸν θεόν
  english_pob_choice: God
  chosen_spanish: a Dios
  alternatives_spanish:
  - a Dios [sin preposición en estilo más literal]
  lexicon: BDAG
  rationale: Se mantiene el objeto directo personal en español con «a Dios», que es la forma natural y transparente de expresar el acusativo griego.
- source_word: Ἀκολούθει μοι
  english_pob_choice: Follow me
  chosen_spanish: Sígueme
  alternatives_spanish:
  - Continúa siguiéndome
  - Ven y sígueme
  lexicon: BDAG
  rationale: El imperativo presente conserva la fuerza de discipulado continuo, pero «Sígueme» es la forma más directa, idiomática y fiel en español bíblico actual.
- source_word: λέγει
  english_pob_choice: he says
  chosen_spanish: le dice
  alternatives_spanish:
  - le dijo
  lexicon: BDAG
  rationale: Se conserva el presente histórico del griego con un presente narrativo en español («le dice»), como rasgo estilístico del relato joánico.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora
  lexicon: BDAG
  rationale: Aquí δέ funciona como conector leve. «Pero» reproduce bien el giro discursivo inmediato del contexto sin sobrecargar la secuencia.
- source_word: καὶ τοῦτο εἰπὼν
  english_pob_choice: And after saying this
  chosen_spanish: Y después de decir esto
  alternatives_spanish:
  - Y habiendo dicho esto
  - Y cuando dijo esto
  lexicon: BDAG
  rationale: La construcción participial aorista se vierte con una temporal natural en español, manteniendo la secuencia narrativa.
theological_decisions:
- issue: La muerte de Pedro como glorificación de Dios
  english_pob_reading: The phrase is left as 'glorify God' without interpretive expansion, indicating that Peter's death would honor God.
  chosen_spanish_reading: «Glorificar a Dios» se mantiene sin ampliar el modo o la mecánica de esa glorificación.
  alternative_spanish_readings:
  - «Honrar a Dios»
  - «Dar gloria a Dios mediante su martirio»
  rationale: El texto afirma la relación entre esa muerte y la glorificación de Dios, pero no explica el mecanismo. La traducción conserva esa tensión sin resolverla interpretativamente.
  doctrine_reference: Preservar la tensión teológica documentada por la POB.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior asegurando que cada marcador de nota aparezca exactamente anclado en el texto español: [a] junto a «indicar» y [b] junto a «le dice». No se añadieron notas sin ancla.'
  spanish_consistency_notes:
  - Se usa «Dios» para θεόν, sin sustituirlo por una fórmula eclesiástica más tradicional.
  - Se mantiene «glorificar a Dios» para conservar la fuerza teológica del original.
  - Se elige «Sígueme» como imperativo natural y fiel al presente del griego.
  - El presente histórico de λέγει se preserva en español narrativo con «le dice».
