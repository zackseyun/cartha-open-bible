translation:
  language: es
  text: 'Simón Pedro les dijo[a]: «Voy a pescar». Ellos le dijeron: «Nosotros también vamos contigo». Salieron y subieron a la barca, y aquella noche no atraparon nada.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego usa el presente histórico («Simón Pedro dice...», «dicen...»), un rasgo narrativo común que en español suele rendirse con pasado para mayor naturalidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει / λέγουσιν
  english_pob_choice: said / said
  chosen_spanish: dijo / dijeron
  alternatives_spanish:
  - dice / dicen
  - les habló / le hablaron
  lexicon: BDAG
  rationale: El griego usa presente histórico; en español, el pasado narrativo es la forma natural y fiel para este tipo de relato. Se conserva el valor discursivo sin sonar artificial en la prosa bíblica moderna.
- source_word: Ὑπάγω ἁλιεύειν
  english_pob_choice: I am going to fish
  chosen_spanish: Voy a pescar
  alternatives_spanish:
  - Voy a ir a pescar
  - Me voy a pescar
  lexicon: BDAG
  rationale: Ὑπάγω introduce la acción inmediata de salir/ir, y el infinitivo expresa el propósito. «Voy a pescar» comunica de manera natural la intención sin sobretraducir el movimiento ya incluido en el verbo.
- source_word: Ἐρχόμεθα καὶ ἡμεῖς σὺν σοί
  english_pob_choice: We are also coming with you
  chosen_spanish: Nosotros también vamos contigo
  alternatives_spanish:
  - Nosotros también venimos contigo
  - También nosotros vamos con ustedes
  lexicon: BDAG
  rationale: Se preserva el énfasis de καὶ ἡμεῖς con «nosotros también». «Vamos contigo» expresa bien la compañía marcada por σὺν σοί en español natural.
- source_word: ἐξῆλθον
  english_pob_choice: They went out
  chosen_spanish: Salieron
  alternatives_spanish:
  - Fueron afuera
  - Se fueron
  lexicon: BDAG
  rationale: El verbo indica salida física. «Salieron» es el equivalente breve y directo en español, adecuado para la narración.
- source_word: ἐνέβησαν εἰς τὸ πλοῖον
  english_pob_choice: got into the boat
  chosen_spanish: subieron a la barca
  alternatives_spanish:
  - embarcaron en la barca
  - entraron en la barca
  lexicon: BDAG
  rationale: En contexto de pesca, πλοῖον se rinde mejor como «barca» en español bíblico readable. «Subieron a» expresa el embarque de manera idiomática y clara; «entraron en» sonaría menos natural para una embarcación.
- source_word: πλοῖον
  english_pob_choice: the boat
  chosen_spanish: la barca
  alternatives_spanish:
  - el barco
  - la embarcación
  lexicon: BDAG
  rationale: Dado el marco de pesca en el mar de Galilea, «barca» transmite mejor la escala y el entorno que «barco» en español actual, sin perder precisión.
- source_word: ἐν ἐκείνῃ τῇ νυκτί
  english_pob_choice: that night
  chosen_spanish: aquella noche
  alternatives_spanish:
  - esa noche
  - en aquella noche
  lexicon: BDAG
  rationale: La expresión temporal se vierte de forma idiomática con «aquella noche», que conserva la referencia definida del griego y suena natural en español.
- source_word: ἐπίασαν οὐδέν
  english_pob_choice: they caught nothing
  chosen_spanish: no pescaron nada
  alternatives_spanish:
  - no atraparon nada
  - no capturaron nada
  lexicon: BDAG
  rationale: En el contexto de pesca, πιάζω significa «captar/coger» con sentido de capturar peces. «No pescaron nada» es el equivalente más natural en español y comunica el fracaso total del esfuerzo.
theological_decisions:
- issue: Presente histórico en el diálogo
  english_pob_reading: Rendered in English past tense while noting the Greek historical present in a footnote.
  chosen_spanish_reading: Se traduce con pasado narrativo normal, sin nota textual adicional en el cuerpo.
  alternative_spanish_readings:
  - Simón Pedro dice a ellos...
  - Ellos le dicen...
  rationale: El presente histórico es un rasgo narrativo del griego que no requiere replicarse en español para ser fiel. El pasado mantiene la fluidez y no altera el sentido.
  doctrine_reference: Narrative tense / discourse convention; no doctrinal issue
- issue: ἐπίασαν οὐδέν en contexto pesquero
  english_pob_reading: they caught nothing
  chosen_spanish_reading: no pescaron nada
  alternative_spanish_readings:
  - no capturaron nada
  - no cogieron nada
  rationale: No hay tensión doctrinal; la decisión lexical conserva la imagen concreta del fracaso en la pesca y evita un término demasiado técnico o ambiguo en español.
  doctrine_reference: Lexical context only
translation_notes:
  revision_awareness: El texto griego y el contexto auditado en inglés muestran acuerdo alto y no requieren cambios respecto de una traducción española directa y natural. Se ha mantenido el contenido semántico completo, con una adaptación idiomática cuidadosa para el registro bíblico en español.
  spanish_consistency_notes:
  - Se usó «barca» por coherencia con el contexto de pesca y para evitar la escala excesiva de «barco».
  - Se mantuvo «pescar» como equivalente natural de la acción final, en lugar de un calco más técnico.
  - El diálogo conserva la cercanía relacional con el pronombre de segunda persona singular «contigo», conforme al griego σοί.
  - La nota textual se ancla solo en el primer verbo del versículo, porque el presente histórico afecta a la secuencia dialogal completa.
