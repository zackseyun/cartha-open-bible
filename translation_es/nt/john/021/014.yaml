translation:
  language: es
  text: Esta fue ya la tercera vez que Jesús fue manifestado a los discípulos, después de haber sido resucitado de entre los muertos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Esta fue ya la tercera vez que Jesús apareció a los discípulos, después de haber sido resucitado de entre los muertos»'
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦτο
  english_pob_choice: This
  chosen_spanish: Esto
  alternatives_spanish:
  - Este hecho
  - Esto mismo
  lexicon: BDAG
  rationale: El demostrativo apunta al episodio narrado inmediatamente antes; «Esto» conserva la referencia anafórica de forma natural en español.
- source_word: ἤδη
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - ya
  - para entonces
  lexicon: BDAG
  rationale: Aquí ἤδη marca el punto narrativo alcanzado; «ahora» expresa bien ese valor en una construcción española fluida.
- source_word: τρίτον
  english_pob_choice: the third time
  chosen_spanish: la tercera vez
  alternatives_spanish:
  - por tercera vez
  - terceramente
  lexicon: BDAG
  rationale: El acusativo funciona adverbialmente para indicar ocurrencia ordinal; en español, «la tercera vez» transmite con naturalidad el mismo valor.
- source_word: ἐφανερώθη
  english_pob_choice: was revealed
  chosen_spanish: se reveló
  alternatives_spanish:
  - se manifestó
  - apareció
  lexicon: BDAG
  rationale: El pasivo de φανερόω significa «ser revelado / manifestado». «Se reveló» conserva la idea de revelación y el matiz pasivo sin forzar un calco.
- source_word: ὁ Ἰησοῦς
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - Jesús el Señor
  lexicon: BDAG
  rationale: Nombre propio con artículo; en español se traduce simplemente «Jesús».
- source_word: τοῖς μαθηταῖς
  english_pob_choice: to the disciples
  chosen_spanish: a los discípulos
  alternatives_spanish:
  - a sus discípulos
  lexicon: BDAG
  rationale: El dativo expresa el destinatario de la revelación; «a los discípulos» sigue de cerca el griego, que no incluye explícitamente el posesivo «sus».
- source_word: ἐγερθεὶς
  english_pob_choice: after he had been raised
  chosen_spanish: después de haber sido levantado
  alternatives_spanish:
  - después de haber sido resucitado
  - después de haber sido levantado de los muertos
  lexicon: BDAG
  rationale: El participio aoristo pasivo de ἐγείρω indica acción anterior respecto del verbo principal. «Después de haber sido levantado» preserva la voz pasiva; «levantado» refleja mejor el alcance de ἐγείρω que una formulación meramente activa.
- source_word: ἐκ νεκρῶν
  english_pob_choice: from the dead
  chosen_spanish: de entre los muertos
  alternatives_spanish:
  - de los muertos
  - entre los muertos
  lexicon: BDAG
  rationale: La expresión es un modismo de resurrección. «De entre los muertos» conserva la imagen de salida desde el ámbito de los muertos y es una opción idiomática y fiel en español.
theological_decisions:
- issue: Voz pasiva en la referencia a la resurrección
  english_pob_reading: after he had been raised from the dead
  chosen_spanish_reading: después de haber sido levantado de entre los muertos
  alternative_spanish_readings:
  - después de que resucitó de entre los muertos
  - después de haber resucitado de entre los muertos
  rationale: El griego usa un participio pasivo, por lo que la traducción mantiene la pasividad en lugar de convertirla en una forma activa. Esto preserva la estructura del texto y el énfasis en la acción recibida por Jesús.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'Se siguió de cerca el texto griego de SBLGNT y se armonizó con el audit trail inglés: se mantuvo el demostrativo anafórico, el valor adverbial de ἤδη, el ordinal adverbial de τρίτον, el pasivo de ἐφανερώθη y el participio pasivo ἐγερθεὶς. No se detectaron revisiones posteriores en el paquete inglés.'
  spanish_consistency_notes:
  - Se prefirió «Jesús» sin artículo, como es natural en español para nombres propios.
  - Se evitó «SEÑOR» porque el versículo no contiene κύριος ni una cita directa del nombre divino.
  - Se mantuvo «discípulos» sin posesivo explícito, en línea con el griego.
  - «De entre los muertos» preserva el modismo de resurrección sin suavizarlo a una simple fórmula narrativa.
