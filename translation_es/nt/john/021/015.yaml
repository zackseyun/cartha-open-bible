translation:
  language: es
  text: 'Así, cuando habían desayunado[a], Jesús dijo a Simón Pedro: «Simón, hijo de Juan, ¿me amas más que estos[b]?». Le dijo: «Sí, Señor; tú sabes que te amo». Le dijo: «Alimenta mis corderos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego usa dos verbos distintos para «amar»: Jesús pregunta con ἀγαπάω, y Pedro responde con φιλέω. Muchos intérpretes ven una distinción; otros la toman como variación estilística. El texto principal traduce ambos con «amar» para no afirmar más de lo que el contexto deja claro.'
    reason: lexical_alternative
  - marker: b
    text: «Más que estos» puede significar «más que estos hombres» o «más que estas cosas». El griego deja implícita la comparación.
    reason: alternative_reading
lexical_decisions:
- source_word: ἠρίστησαν
  english_pob_choice: had eaten breakfast
  chosen_spanish: habían desayunado
  alternatives_spanish:
  - habían comido
  - habían tomado el desayuno
  lexicon: BDAG
  rationale: ἀριστάω se refiere al alimento de la mañana. «Habían desayunado» conserva el matiz temporal y el sentido específico de la comida matutina con naturalidad en español.
- source_word: λέγει
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - dice
  lexicon: BDAG
  rationale: Aunque el griego usa presente histórico, en español narrativo «dijo» suena natural y comunica el discurso sin aspereza.
- source_word: Σίμων Ἰωάννου
  english_pob_choice: Simon, son of John
  chosen_spanish: Simón, hijo de Juan
  alternatives_spanish:
  - Simón Juan
  - Simón, hijo de Jonás
  lexicon: BDAG
  rationale: El genitivo es un patronímico directo; «hijo de Juan» sigue el valor inmediato del griego. Se evita «Jonás» porque no corresponde al testimonio de este versículo.
- source_word: ἀγαπᾷς
  english_pob_choice: do you love
  chosen_spanish: ¿me amas
  alternatives_spanish:
  - ¿me tienes amor
  - ¿me quieres
  lexicon: BDAG
  rationale: «Amar» es el equivalente natural de ἀγαπάω aquí. En la pregunta directa de Jesús conviene mantener la sencillez y la fuerza relacional del verbo.
- source_word: πλέον τούτων
  english_pob_choice: more than these
  chosen_spanish: más que estos
  alternatives_spanish:
  - más que éstos
  - más que estos hombres
  - más que estas cosas
  lexicon: BDAG
  rationale: La expresión griega es elíptica y ambigua; «más que estos» preserva esa ambigüedad sin decidir si la comparación es con personas o cosas.
- source_word: κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - señor
  - maestro
  lexicon: BDAG
  rationale: En el contexto joánico, Pedro se dirige a Jesús con reverencia. «Señor» preserva la carga cristológica mejor que un simple tratamiento cortesano.
- source_word: οἶδας
  english_pob_choice: you know
  chosen_spanish: tú sabes
  alternatives_spanish:
  - tú conoces
  - tú estás consciente
  lexicon: BDAG
  rationale: «Saber» reproduce de manera directa y idiomática οἶδα, además de sonar natural en la apelación de Pedro.
- source_word: φιλῶ
  english_pob_choice: I love
  chosen_spanish: te amo
  alternatives_spanish:
  - te tengo afecto
  - te quiero
  lexicon: BDAG
  rationale: Aunque φιλέω puede sugerir afecto, en el cuerpo del texto conviene mantener «amar» para no cargar el pasaje con una distinción semántica más fuerte que la que el contexto obliga a afirmar. La alternancia queda documentada en las notas.
- source_word: Βόσκε
  english_pob_choice: Feed
  chosen_spanish: Apacienta
  alternatives_spanish:
  - Alimenta
  - Pastorea
  lexicon: BDAG
  rationale: βόσκω significa alimentar, pero en español bíblico «apacentar» comunica de forma más natural el cuidado de la imagen pastoral y se asocia con la acción de dar de comer al rebaño. Se evita «pastorear» porque en español puede sonar demasiado general para este imperativo puntual.
- source_word: ἀρνία
  english_pob_choice: lambs
  chosen_spanish: corderos
  alternatives_spanish:
  - corderitos
  - ovejas jóvenes
  lexicon: BDAG
  rationale: ἀρνίον designa un cordero o cordero joven. «Corderos» es claro, natural y suficientemente cercano al diminutivo sin sobrecargar el español.
- source_word: μου
  english_pob_choice: my
  chosen_spanish: mis
  alternatives_spanish:
  - de mí
  lexicon: BDAG
  rationale: El posesivo conserva de manera directa la pertenencia y el cuidado de Jesús sobre el rebaño.
theological_decisions:
- issue: Distinguir ἀγαπάω y φιλέω en la traducción principal
  english_pob_reading: Render both with 'love' in the main text, while preserving the lexical alternation in a footnote.
  chosen_spanish_reading: Traducir ambos con «amar» en el texto principal, mientras se preserva la alternancia léxica en la nota.
  alternative_spanish_readings:
  - Traducir ἀγαπάω como «amar» y φιλέω como «tener afecto por»
  - Leer la alternancia como jerarquía de amores
  rationale: La evidencia no obliga a concluir que Juan esté estableciendo una diferencia teológica rígida entre dos clases de amor. Por eso el texto principal mantiene «amar», y la nota deja constancia de la variación griega sin resolverla artificialmente.
  doctrine_reference: 'Translation philosophy §3; Contested terms: ἀγάπη → love'
- issue: Interpretación de πλέον τούτων
  english_pob_reading: Preserve the ambiguity with 'more than these.'
  chosen_spanish_reading: Conservar la ambigüedad con «más que estos».
  alternative_spanish_readings:
  - más que estos hombres
  - más que estas cosas
  rationale: El griego no especifica de manera explícita el término de comparación. Traducirlo con una opción cerrada estrecharía indebidamente el sentido.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: Ajusté el texto para anclar explícitamente las notas en el pasaje mediante los marcadores [a] y [b], corrigiendo la validación previa. Se mantuvo la ambigüedad del comparativo y la alternancia ἀγαπάω/φιλέω en nota, no en el cuerpo principal.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, aunque este versículo no la requiere.
  - Se usó «Señor» para κύριε por el contexto joánico y la dirección reverente a Jesús.
  - Se evitó «pastorea» en favor de «apacienta» para ajustar el valor de βόσκω dentro de un registro bíblico natural en español.
  - Los marcadores de nota aparecen exactamente en el texto principal y no se añadieron notas sin anclaje.
