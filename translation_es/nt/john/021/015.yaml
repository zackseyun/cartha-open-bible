  text: Ὅτε οὖν ἠρίστησαν λέγει τῷ Σίμωνι Πέτρῳ ὁ Ἰησοῦς· Σίμων ⸀Ἰωάννου, ἀγαπᾷς με πλέον τούτων; λέγει αὐτῷ· Ναί, κύριε, σὺ οἶδας ὅτι φιλῶ σε. λέγει αὐτῷ· Βόσκε τὰ ἀρνία μου.
base_translation:
  language: en
  yaml_path: translation/nt/john/021/015.yaml
  text: So when they had eaten breakfast[a], Jesus said to Simon Peter, “Simon, son of John, do you love me more than these?” He said to him, “Yes, Lord; you know that I love you.” He said to him[b], “Feed my lambs.”
  footnotes:
  - marker: a
    text: 'Greek has two different verbs here: Jesus asks with ἀγαπάω (''love''), and Peter replies with φιλέω (''love, have affection for''). Many interpreters see a distinction; others take the variation as stylistic. The main text renders both as ''love'' to avoid overstating a contrast the context does not make explicit.'
    reason: lexical_alternative
  - marker: b
    text: '''More than these'' may mean ''more than these men do'' or ''more than these things.'' The Greek leaves the comparison implicit.'
    reason: alternative_reading
