translation:
  language: es
  text: Ahora también hay muchas otras cosas que Jesús hizo[a] que, si se escribieran una por una, supongo que ni siquiera el mundo mismo podría contener los libros que se escribirían.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los libros que estarían siendo escritos». El griego puede expresar tanto la idea de «tener cabida para» como la de «contener», y el participio también puede traducirse de manera más literal, aunque en español suele sonar más natural con sentido de resultado futuro.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y
  - Pues
  lexicon: BDAG
  rationale: Se usa como transición discursiva suave al cierre del evangelio, manteniendo continuidad sin forzar oposición.
- source_word: ἄλλα πολλὰ
  english_pob_choice: many other things
  chosen_spanish: muchas otras cosas
  alternatives_spanish:
  - muchas cosas más
  - muchas otras obras
  lexicon: BDAG
  rationale: En español, «muchas otras cosas» conserva la amplitud neutra del plural y la idea de elementos adicionales no limitados a una sola categoría.
- source_word: ἃ ἐποίησεν
  english_pob_choice: that Jesus did
  chosen_spanish: que Jesús hizo
  alternatives_spanish:
  - que Jesús hizo y realizó
  - que Jesús obró
  lexicon: BDAG
  rationale: «Hizo» reproduce de manera amplia y natural el valor de ποιέω para acciones y hechos, sin estrecharlo a un solo tipo de actividad.
- source_word: ἅτινα
  english_pob_choice: which
  chosen_spanish: que
  alternatives_spanish:
  - las cuales
  - cosas que
  lexicon: BDAG
  rationale: La relativa en español funciona con naturalidad con «que»; evita rigidez y conserva el carácter explicativo del relativo griego.
- source_word: ἐὰν γράφηται
  english_pob_choice: if they were written
  chosen_spanish: si se escribieran
  alternatives_spanish:
  - si fueran escritas
  - si se escribiesen
  lexicon: BDAG
  rationale: El subjuntivo imperfecto en español expresa bien la hipótesis irreal; se mantiene el sentido de registro/escritura sin añadir «anotar» ni «redactar».
- source_word: καθ’ ἕν
  english_pob_choice: one by one
  chosen_spanish: una por una
  alternatives_spanish:
  - una a una
  - individualmente
  lexicon: BDAG
  rationale: Se preserva el valor distributivo de la expresión griega con una forma natural en español.
- source_word: οὐδ’ αὐτὸν ... τὸν κόσμον
  english_pob_choice: not even the world itself
  chosen_spanish: ni siquiera el mundo mismo
  alternatives_spanish:
  - ni aun el mundo mismo
  - ni siquiera el propio mundo
  lexicon: BDAG
  rationale: «Mismo» refleja el énfasis de αὐτόν; la negación intensiva se mantiene sin añadir matices doctrinales.
- source_word: οἶμαι
  english_pob_choice: I suppose
  chosen_spanish: pienso
  alternatives_spanish:
  - supongo
  - creo
  lexicon: BDAG
  rationale: «Pienso» conserva el tono personal y reflexivo del narrador en registro más natural para el español bíblico contemporáneo; la modestia del aparte sigue implícita.
- source_word: χωρήσειν
  english_pob_choice: could contain
  chosen_spanish: podría contener
  alternatives_spanish:
  - tendría cabida para
  - podría tener lugar para
  lexicon: BDAG
  rationale: «Contener» sigue la decisión del POB inglés y funciona bien en español para la imagen espacial; «podría» expresa la potencialidad del verbo futuro en contexto hipotético.
- source_word: τὰ γραφόμενα βιβλία
  english_pob_choice: the books being written
  chosen_spanish: los libros que se estarían escribiendo
  alternatives_spanish:
  - los libros escritos
  - los libros que serían escritos
  lexicon: BDAG
  rationale: Se conserva la idea de participio presente pasivo con una perífrasis progresiva, a la vez que el contexto hipotético apunta a libros resultantes de una escritura inagotable.
theological_decisions:
- issue: Hipérbole final sobre la suficiencia del mundo para contener los libros
  english_pob_reading: Preserved as deliberate hyperbolic testimony rather than flattened into a mere idiom like 'countless books.'
  chosen_spanish_reading: Se conserva como hipérbole deliberada de testimonio, sin reducirla a un mero «incontables libros».
  alternative_spanish_readings:
  - el mundo no podría contener todos los libros que se escribirían
  - serían tantos libros que no cabrían en el mundo
  rationale: La clausura del evangelio tiene fuerza retórica y testimonial. El español mantiene la imagen de contención espacial y la imposibilidad hiperbólica, en vez de disolverla en una cuantificación vaga.
  doctrine_reference: Translation philosophy §3; preservar la tensión retórica y testimonial del texto final
- issue: Valor del participio γραφόμενα en la clausura
  english_pob_reading: the books being written
  chosen_spanish_reading: los libros que se estarían escribiendo
  alternative_spanish_readings:
  - los libros que serían escritos
  - los libros escritos
  rationale: El español debe decidir entre forma y función. Se conserva la vivacidad del proceso de escritura, pero se aclara en la nota que el sentido natural del contexto apunta al resultado hipotético de ese escribir.
  doctrine_reference: Principio de equivalencia óptima; mantener la relación entre forma verbal y sentido contextual
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés al preferir una forma más cercana a χωρήσειν con «podría contener» y evitar una expresión demasiado libre; en español se optó por «ni siquiera el mundo mismo podría contener...» para preservar el registro formal y la imagen espacial. También se mantuvo la relación entre ἐὰν γράφηται y la hipótesis irreal con «si se escribieran», y el participio γραφόμενα se vertió de modo progresivo en el texto principal, con una nota que ofrece la alternativa resultativa.
  spanish_consistency_notes:
  - Se usa «Jesús» para Ἰησοῦς, sin variación.
  - Se traduce κόσμος como «mundo» en sentido de totalidad creada/humana, sin teologizarlo artificialmente.
  - No se introduce «Cristo» porque el versículo no lo contiene.
  - Se conserva un tono sobrio y final, adecuado para el cierre del evangelio.
  - La nota a evita perder la tensión entre la forma participial griega y la idiomaticidad española.
