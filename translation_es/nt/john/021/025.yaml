    rationale: La perífrasis condicional-progresiva es poco natural en español y no corresponde de manera limpia al participio griego. Introduce una sensación aspectual extraña. «Los libros que se escribirían» comunica mejor el resultado hipotético reconocido también en la nota del POB.
  - severity: low
