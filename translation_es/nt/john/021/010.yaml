translation:
  language: es
  text: 'Jesús les dijo: «Traigan[a] algunos de los peces que ahora han pescado».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Traigan de los peces que han pescado ahora».'
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - dice
  lexicon: BDAG
  rationale: Aunque el griego usa presente histórico, en español narrativo natural y digno se vierte normalmente con pasado simple. ‘Dijo’ conserva el valor narrativo sin sonar forzado.
- source_word: Ἰησοῦς
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  lexicon: BDAG
  rationale: Nombre propio directo y estándar en español.
- source_word: Ἐνέγκατε
  english_pob_choice: Bring
  chosen_spanish: Traigan
  alternatives_spanish:
  - Lleven aquí
  - Traigan aquí
  lexicon: BDAG
  rationale: El imperativo plural de φέρω pide una orden directa. ‘Traigan’ es la forma natural en español para llevar algo hacia el hablante, aquí Jesús.
- source_word: ἀπὸ τῶν ὀψαρίων
  english_pob_choice: some of the fish
  chosen_spanish: algunos de los peces
  alternatives_spanish:
  - parte de los peces
  - unos peces
  lexicon: BDAG
  rationale: El partitivo con ἀπό + genitivo se expresa bien en español con ‘algunos de’. ‘Peces’ mantiene el sentido referencial del sustantivo sin sobreespecificar tamaño o preparación.
- source_word: ὧν ἐπιάσατε
  english_pob_choice: that you have now caught
  chosen_spanish: que acaban de sacar
  alternatives_spanish:
  - que han pescado
  - que acaban de pescar
  lexicon: BDAG
  rationale: El relativo identifica los peces tomados en la acción reciente. ‘Sacar’ funciona bien en español costero y transmite el acto de extraer la pesca del agua sin añadir un matiz demasiado técnico.
- source_word: νῦν
  english_pob_choice: now
  chosen_spanish: acaban de
  alternatives_spanish:
  - ahora
  - recién
  lexicon: BDAG
  rationale: En este contexto νῦν señala inmediatez de la acción completada. ‘Acaban de’ naturaliza esa cercanía temporal en español mejor que un simple ‘ahora’.
translation_notes:
  revision_awareness: La revisión inglesa pasó de ‘just caught’ a ‘now caught’ para reflejar más directamente νῦν. En español se conserva la idea de inmediatez con ‘acaban de’, que expresa mejor esa cercanía temporal sin perder naturalidad.
  spanish_consistency_notes:
  - Se mantiene ‘Jesús’ como nombre propio sin artículo.
  - Se evita ‘SEÑOR’ porque el versículo no contiene κύριος ni una alusión directa al nombre divino.
  - ‘Peces’ traduce ὀψάρια de forma natural; no se introduce ‘pescado’ porque aquí el contexto es la captura reciente, no necesariamente la comida preparada.
