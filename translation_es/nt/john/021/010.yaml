review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica: presente histórico → pretérito narrativo («dijo»), imperativo plural («Traigan»), sentido partitivo de ἀπὸ τῶν ὀψαρίων («algunos de los peces»), y referencia a la captura reciente. Sin embargo, «acaban de sacar» se aleja innecesariamente de ἐπιάσατε, que en este contexto apunta a capturar/pescar, no meramente extraer del agua. Además, el borrador introduce «acaban de» donde el inglés auditado revisó deliberadamente a «now caught» para reflejar más directamente νῦν.'
  spanish_quality_summary: El español es natural y claro, pero «sacar» suena algo coloquial y menos preciso que «pescar». También conviene reflejar νῦν sin sobreinterpretarlo exclusivamente como perífrasis aspectual «acaban de». «Ahora han pescado» sería menos idiomático; «ahora pescaron» no funciona. La opción más equilibrada en español moderno y digno es «que ahora han pescado», aunque algo formal, porque conserva la explicitud del νῦν revisado en el audit trail.
  glossary_alignment: 'No hay conflictos con la terminología doctrinal del proyecto. «Jesús» está correcto. La decisión clave es léxica: ἐπιάσατε debe representarse mejor con «han pescado» o «pescaron» que con «sacaron».'
  issues:
  - severity: medium
    issue: «sacar» no representa con suficiente precisión ἐπιάσατε
    rationale: El verbo griego aquí denota capturar/pescar. «Sacar» enfoca extraer algo del agua o de la red, cambiando levemente la imagen semántica del original.
  - severity: medium
    issue: «acaban de» sobreinterpreta νῦν frente al audit trail inglés revisado
    rationale: El expediente inglés cambió «just caught» a «now caught» para reflejar más directamente νῦν. En español, «acaban de» añade un matiz aspectual de inmediatez que puede ser aceptable, pero ya no sigue la revisión documentada tan de cerca.
  revised_spanish_text: 'Jesús les dijo: «Traigan[a] algunos de los peces que ahora han pescado».'
