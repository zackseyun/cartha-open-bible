revisions:
- from: 'Jesús les dijo: «Traigan[a] algunos de los peces que acaban de sacar».'
  to: 'Jesús les dijo: «Traigan[a] algunos de los peces que ahora han pescado».'
  rationale: Se reemplaza «acaban de sacar» por «ahora han pescado» para reflejar con mayor fidelidad ἐπιάσατε («han pescado/capturado») y mantener explícito νῦν («ahora»), en línea con la revisión del audit trail inglés. Se conserva «Traigan» y el sentido partitivo «algunos de los peces».
  reviewer_model: gpt-5.4
