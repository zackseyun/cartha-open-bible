  - marker: a
    text: 'O, más literalmente: «Traigan de los peces que han pescado ahora».'
    reason: lexical_alternative
  revision_rationale: Se reemplaza «acaban de sacar» por «ahora han pescado» para reflejar con mayor fidelidad ἐπιάσατε («han pescado/capturado») y mantener explícito νῦν («ahora»), en línea con la revisión del audit trail inglés. Se conserva «Traigan» y el sentido partitivo «algunos de los peces».
