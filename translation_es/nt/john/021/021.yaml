translation:
  language: es
  text: 'Entonces Pedro, al verlo, le dice a Jesús: «Señor, ¿y este qué?»[a]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿y qué hay de él?». La frase griega es elíptica: literalmente, «Señor, y este—¿qué?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦτον
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - este hombre
  - él
  lexicon: BDAG
  rationale: El demostrativo acusativo se refiere al discípulo amado como objeto de la mirada de Pedro. En español, después de «al verlo» resulta natural usar un clítico («lo») y dejar la deixis en la pregunta final («este»), conservando tanto la referencia como el contraste.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - entonces
  - por tanto
  lexicon: BDAG
  rationale: Marca continuidad narrativa e inferencial. «Así que» transmite bien la conexión con lo anterior sin sonar excesivamente formal.
- source_word: ἰδὼν
  english_pob_choice: seeing him
  chosen_spanish: al verlo
  alternatives_spanish:
  - viendo a él
  - cuando lo vio
  lexicon: BDAG
  rationale: El participio aoristo se vierte con una construcción temporal breve y natural en español. «Al verlo» preserva la anterioridad inmediata y la fluidez narrativa.
- source_word: λέγει
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - dijo
  lexicon: BDAG
  rationale: Se mantiene el presente histórico del relato joánico, que la POB inglesa también conserva con «says».
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: El vocativo dirigido a Jesús se traduce por «Señor», siguiendo el valor habitual de κύριος en la POB y en español eclesial, sin desatender su carga titulativa.
- source_word: οὗτος δὲ τί;
  english_pob_choice: what about this man?
  chosen_spanish: ¿y este qué?
  alternatives_spanish:
  - ¿y este qué pasa?
  - ¿y este qué será?
  lexicon: BDAG
  rationale: La pregunta griega es elíptica; en español, «¿y este qué?» reproduce esa brevedad y el foco contrastivo de δέ. La deixis «este» conserva el señalamiento del otro discípulo sin añadir explicaciones no presentes en el texto.
theological_decisions:
- issue: Tratamiento de κύριε al dirigirse a Jesús
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Maestro
  rationale: La forma vocativa se dirige a Jesús con respeto y con peso titulativo. «Señor» es la equivalencia establecida y evita rebajar el matiz cristológico a un mero tratamiento de cortesía.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Conservación de la elipsis en la pregunta final
  english_pob_reading: 'Or, “And what about him?” The Greek is elliptical: literally, “Lord, and this one—what?”'
  chosen_spanish_reading: ¿y este qué?
  alternative_spanish_readings:
  - ¿y este qué pasa?
  - ¿y qué de este?
  rationale: La POB inglesa preserva la elipsis y la tensión del griego. La traducción escogida mantiene esa economía expresiva en español, sin expandir el sentido hacia una formulación interpretativa más explícita.
  doctrine_reference: JOHN 21:21 textual/semantic ellipsis
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la revisión inglesa más reciente: conserva la secuencia narrativa breve, refleja el participio con una construcción temporal y mantiene la elipsis de la pregunta final sin completar indebidamente el sentido.'
  spanish_consistency_notes:
  - Se usa «Señor» para κύριε en la dirección a Jesús, conforme al estándar del proyecto.
  - Se conserva el presente histórico («dice») para respetar el estilo narrativo de Juan.
  - La pregunta final mantiene la deixis («este») y la brevedad elíptica del griego; la nota ofrece una alternativa igualmente viable en español.
