source:
  edition: SBLGNT
  text: ἐξῆλθεν οὖν ⸂οὗτος ὁ λόγος⸃ εἰς τοὺς ἀδελφοὺς ὅτι ὁ μαθητὴς ἐκεῖνος οὐκ ἀποθνῄσκει. ⸂οὐκ εἶπεν δὲ⸃ αὐτῷ ὁ Ἰησοῦς ὅτι οὐκ ἀποθνῄσκει ἀλλ’· Ἐὰν αὐτὸν θέλω μένειν ἕως ἔρχομαι, τί πρὸς σέ;
base_translation:
  language: en
  yaml_path: translation/nt/john/021/023.yaml
  text: So this saying spread among the brothers that that disciple would not die[a]. Yet Jesus did not say to him that he would not die, but, “If I want him to remain until I come[c][b], what is that to you?”
  footnotes:
  - marker: a
    text: Or “this saying spread among the brothers.” The Greek λόγος can mean “word,” “statement,” or “report.”
    reason: lexical_alternative
  - marker: b
    text: “Brothers” here refers to the community of disciples; the Greek uses the masculine plural ἀδελφοί.
    reason: cultural_note
  - marker: c
    text: 'That is, Jesus did not promise that this disciple would never die; he stated a hypothetical condition: “If I want him to remain until I come …”'
    reason: cross_reference
