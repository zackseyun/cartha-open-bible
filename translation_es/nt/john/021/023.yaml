translation:
  language: es
  text: 'Así que este dicho[a] se difundió entre los hermanos[b] que aquel discípulo no moriría. Sin embargo, Jesús no le dijo que no moriría, sino: «Si yo quiero que él permanezca hasta que yo venga[c], ¿qué te importa a ti?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «afirmación» o «comentario». El griego λόγος puede referirse a un dicho, declaración o reporte circulado, no necesariamente a una «palabra» en sentido técnico.
    reason: lexical_alternative
  - marker: b
    text: «Hermanos» aquí designa la comunidad de discípulos; el plural masculino griego ἀδελφοί se conserva con este valor colectivo.
    reason: cultural_note
  - marker: c
    text: 'Es decir, Jesús no prometió que este discípulo nunca moriría; expresó una condición hipotética: «Si yo quiero que él permanezca hasta que yo venga…»'
    reason: cross_reference
lexical_decisions:
- source_word: ἐξῆλθεν
  english_pob_choice: spread
  chosen_spanish: se difundió
  alternatives_spanish:
  - salió
  - se extendió
  lexicon: BDAG
  rationale: El verbo griego con este complemento expresa la circulación de una noticia entre personas; en español, «se difundió» comunica bien la propagación del dicho sin perder la idea de expansión del rumor.
- source_word: οὗτος ὁ λόγος
  english_pob_choice: this saying
  chosen_spanish: esta [a]
  alternatives_spanish:
  - esta declaración
  - este dicho
  - este reporte
  lexicon: BDAG
  rationale: λόγος aquí designa una frase o afirmación circulada, no un «logos» teológico. En español, «esta» seguido de una nota permite conservar la ambigüedad entre «dicho», «afirmación» o «comentario» sin sobrecargar el texto principal.
- source_word: εἰς τοὺς ἀδελφοὺς
  english_pob_choice: among the brothers
  chosen_spanish: entre los hermanos
  alternatives_spanish:
  - entre los hermanos y hermanas
  - a los hermanos
  lexicon: BDAG
  rationale: La preposición con el verbo de difusión indica circulación dentro del grupo; «entre» refleja mejor ese valor que un simple «a». Se mantiene «hermanos» conforme al uso masculino plural del griego y a la convención POB documentada.
- source_word: ὁ μαθητὴς ἐκεῖνος
  english_pob_choice: that disciple
  chosen_spanish: aquel discípulo
  alternatives_spanish:
  - ese discípulo
  - el discípulo aquel
  lexicon: BDAG
  rationale: «Aquel» conserva la distancia demostrativa de ἐκεῖνος y su función de identificar al discípulo específico ya conocido en el contexto.
- source_word: οὐκ ἀποθνῄσκει
  english_pob_choice: would not die
  chosen_spanish: no moriría
  alternatives_spanish:
  - no muere
  - no estaba muriendo
  lexicon: BDAG
  rationale: En discurso indirecto, el español natural suele expresar el contenido con futuro o condicional de reporte. «No moriría» comunica el rumor sin sonar forzado y sin convertirlo en una afirmación presente absoluta.
- source_word: οὐκ εἶπεν δὲ
  english_pob_choice: Yet Jesus did not say
  chosen_spanish: Sin embargo, Jesús no le dijo
  alternatives_spanish:
  - Pero Jesús no le dijo
  - No obstante, Jesús no le dijo
  lexicon: BDAG
  rationale: «Sin embargo» recoge bien el valor contrastivo/correctivo de δέ en este contexto, en línea con la aclaración del evangelista.
- source_word: Ἐὰν αὐτὸν θέλω μένειν
  english_pob_choice: If I want him to remain
  chosen_spanish: Si yo quiero que él permanezca
  alternatives_spanish:
  - Si quiero que él quede
  - Si deseo que él permanezca
  lexicon: BDAG
  rationale: θέλω expresa voluntad; «quiero» es directo y preciso. «Permanecer» mantiene la resonancia joánica de μένω mejor que «quedarse» en este contexto formal.
- source_word: ἕως ἔρχομαι
  english_pob_choice: until I come
  chosen_spanish: hasta que yo venga
  alternatives_spanish:
  - hasta que venga
  - hasta mi venida
  lexicon: BDAG
  rationale: 'La construcción final se vierte de manera natural en español con subjuntivo futuro de reporte: «hasta que yo venga». Mantiene el sentido temporal sin introducir «regrese», que sería más interpretativo.'
- source_word: τί πρὸς σέ
  english_pob_choice: what is that to you?
  chosen_spanish: ¿qué te importa a ti?
  alternatives_spanish:
  - ¿qué es eso para ti?
  - ¿qué te importa?
  lexicon: BDAG
  rationale: El modismo griego desestima la preocupación de Pedro por el destino de otro discípulo. «¿Qué te importa a ti?» es idiomático en español y transmite bien la reprensión breve y directa.
theological_decisions:
- issue: La idea errónea sobre la muerte del discípulo
  english_pob_reading: Render the statement as a rumor/report without implying Jesus actually promised the disciple would never die.
  chosen_spanish_reading: Presentar la frase como una difusión de dicho, y luego aclarar explícitamente que Jesús no dijo que no moriría.
  alternative_spanish_readings:
  - «este reporte»
  - «esta declaración»
  rationale: 'El verso corrige una interpretación equivocada. La traducción española preserva esa tensión: primero muestra la circulación del dicho, luego reproduce la aclaración del evangelista sin suavizarla.'
  doctrine_reference: Primacía del texto original y preservación de la corrección narrativa (Juan 21:23).
translation_notes:
  revision_awareness: El texto español sigue la revisión final que prefirió una formulación más cercana a λόγος como «saying» en vez de un «report» demasiado interpretativo, pero conserva en español una nota que explicita la posible lectura de «dicho/afirmación» para mantener la ambigüedad lexical del original. También preserva la corrección narrativa sobre la supuesta no-muerte del discípulo y el valor hipotético de la cláusula condicional final.
  spanish_consistency_notes:
  - Se usa «Jesús» de forma constante para Ἰησοῦς.
  - Se mantiene «discípulo» para μαθητής y no se sustituye por «seguidor».
  - «Permanecer» se conserva para μένω por su resonancia joánica.
  - No se traduce ἀδελφοί como «hermanos y hermanas» porque el audit trail documenta la decisión de mantener el masculino plural con valor colectivo.
  - La puntuación española coloca la cita directa con comillas angulares y usa subjuntivo en «venga» para la temporalidad futura dependiente.
