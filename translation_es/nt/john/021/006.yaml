    reason: lexical_alternative
  revision_rationale: 'Se corrige la nota al pie para que refleje fielmente la decisión auditada sobre εὑρήσετε: el griego deja implícito el objeto, mientras que algunas traducciones pueden explicitarlo. También se mejora ligeramente la naturalidad del español con «multitud de peces», sin cambiar el sentido ni el registro.'
