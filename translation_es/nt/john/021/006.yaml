base_translation:
  language: en
  yaml_path: translation/nt/john/021/006.yaml
  text: But he said to them[a], “Cast the net on the right side of the boat, and you will find some.” So they cast it, and they were no longer able to haul it in because of the multitude of fish.
  footnotes:
