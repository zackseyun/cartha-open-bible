translation:
  language: es
  text: 'Pero él les dijo: «Echen la red al lado derecho de la barca, y encontrarán[a]». Entonces la echaron, y ya no podían sacarla por la multitud de peces.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y encontrarán algo» o «y encontrarán peces»; el objeto está implícito por el contexto de pesca y no se expresa de forma explícita en griego.
    reason: lexical_alternative
lexical_decisions:
- source_word: Βάλετε
  english_pob_choice: Cast
  chosen_spanish: Echen
  alternatives_spanish:
  - Lancen
  - Arrojen
  lexicon: BDAG
  rationale: En un contexto de pesca, βάλλω se refiere a lanzar o echar la red. «Echen» suena natural en español y conserva el valor de acción inmediata sin volverlo demasiado técnico.
- source_word: τὰ δεξιὰ μέρη τοῦ πλοίου
  english_pob_choice: the right side of the boat
  chosen_spanish: al lado derecho de la barca
  alternatives_spanish:
  - al lado derecho del bote
  - a la derecha de la barca
  - al costado derecho de la barca
  lexicon: BDAG
  rationale: μέρη apunta aquí al sector o lado de la embarcación, no a “partes” literales. «Al lado derecho de la barca» expresa con claridad la orientación espacial en español y evita el anglicismo náutico de «estribor».
- source_word: πλοίου
  english_pob_choice: boat
  chosen_spanish: barca
  alternatives_spanish:
  - barco
  - bote
  lexicon: BDAG
  rationale: En este marco de pesca galilea, «barca» es una opción natural y reverente en español bíblico, sin sugerir una nave mayor como «barco».
- source_word: τὸ δίκτυον
  english_pob_choice: the net
  chosen_spanish: la red
  alternatives_spanish:
  - la red de pesca
  - el trasmallo
  lexicon: BDAG
  rationale: δίκτυον designa la red de pesca; «la red» es la equivalencia directa y clara en español.
- source_word: εὑρήσετε
  english_pob_choice: you will find some
  chosen_spanish: encontrarán
  alternatives_spanish:
  - encontrarán algo
  - encontrarán peces
  - hallarán
  lexicon: BDAG
  rationale: El verbo literalmente es «encontrar». Como en griego no se expresa el objeto, la frase española se mantiene igualmente abierta. Se evita añadir «algunos» o «peces» en el texto principal para no sobreespecificar más allá del griego.
- source_word: οὐκέτι
  english_pob_choice: no longer
  chosen_spanish: ya no
  alternatives_spanish:
  - ya no más
  - no pudieron ya
  lexicon: BDAG
  rationale: οὐκέτι marca una negación temporal de cambio de situación. «Ya no» es la forma más natural y precisa en español.
- source_word: ἑλκύσαι
  english_pob_choice: to haul it in
  chosen_spanish: sacarla
  alternatives_spanish:
  - arrastrarla
  - recogerla
  - tirarla hacia dentro
  lexicon: BDAG
  rationale: En el contexto de una red cargada, la idea es sacarla del agua/cargarla hacia dentro. «Sacarla» es más natural en español que «arrastrarla», y evita una dureza innecesaria sin perder el sentido físico.
- source_word: ἴσχυον
  english_pob_choice: they were able
  chosen_spanish: podían
  alternatives_spanish:
  - eran capaces
  - tenían fuerza
  lexicon: BDAG
  rationale: ἰσχύω aquí expresa capacidad efectiva. «Podían» comunica la imposibilidad resultante de forma idiomática y fiel.
- source_word: ἀπὸ τοῦ πλήθους τῶν ἰχθύων
  english_pob_choice: because of the multitude of fish
  chosen_spanish: por la multitud de los peces
  alternatives_spanish:
  - por la multitud de peces
  - debido a la multitud de peces
  - a causa de la multitud de peces
  lexicon: BDAG
  rationale: ἀπό indica causa aquí. «Por la multitud de los peces» mantiene el registro formal de πλήθος que el audit trail inglés preserva con «multitude», y conserva la relación causal sin suavizarla.
- source_word: ἰχθύων
  english_pob_choice: fish
  chosen_spanish: los peces
  alternatives_spanish:
  - peces
  - pescados
  lexicon: BDAG
  rationale: ἰχθύες significa peces. En español, el plural articulado «los peces» es natural en el flujo narrativo y sigue el referente explícito del contexto de pesca.
translation_notes:
  revision_awareness: El texto español sigue de cerca la versión inglesa revisada para mantener el tono formal y la precisión de πλήθος como «multitud», pero ajusta la sintaxis al español natural. Se preservó la ambigüedad de εὑρήσετε en la nota, sin forzar un objeto en el cuerpo del versículo.
  spanish_consistency_notes:
  - Se emplea «barca» para πλοῖον en contexto pesquero, en coherencia con el estilo bíblico en español.
  - Se prefirió «red» para δίκτυον y no un tecnicismo pesquero.
  - Se conservó «multitud» para πλήθος, siguiendo la revisión inglesa y el registro elevado del pasaje.
  - Se evitó «SEÑOR» u otra terminología teológica no pertinente; el versículo no contiene referencias nominales a YHWH ni a Cristo.
