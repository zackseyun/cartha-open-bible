  text: ⸀Ἐπιστραφεὶς ὁ Πέτρος βλέπει τὸν μαθητὴν ὃν ἠγάπα ὁ Ἰησοῦς ἀκολουθοῦντα, ὃς καὶ ἀνέπεσεν ἐν τῷ δείπνῳ ἐπὶ τὸ στῆθος αὐτοῦ καὶ εἶπεν· Κύριε, τίς ἐστιν ὁ παραδιδούς σε;
base_translation:
  language: en
  yaml_path: translation/nt/john/021/020.yaml
  text: Peter turned and saw the disciple whom Jesus loved following[a], who had also leaned back against his chest at the supper and said, “Lord[b], who is the one betraying you?”
  footnotes:
