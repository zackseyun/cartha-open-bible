translation:
  language: es
  text: 'Pedro se volvió y vio al discípulo a quien Jesús amaba, que seguía[a]; el mismo que también se había recostado sobre su pecho en la cena y había dicho: «Señor, ¿quién es el que te traiciona?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «siguiendo»; el participio griego no expresa explícitamente a quién seguía.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐπιστραφεὶς
  english_pob_choice: turned
  chosen_spanish: se volvió
  alternatives_spanish:
  - giró
  - se dio la vuelta
  lexicon: BDAG
  rationale: El participio aoristo introduce la acción de Pedro. «Se volvió» conserva el movimiento narrativo de manera natural en español y no fuerza una forma demasiado literal como un gerundio o un participio absoluto.
- source_word: βλέπει
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - ve
  - miró
  lexicon: BDAG
  rationale: Aunque el griego usa presente histórico, en español narrativo «vio» comunica con naturalidad la secuencia pasada sin perder sentido.
- source_word: μαθητὴν
  english_pob_choice: disciple
  chosen_spanish: discípulo
  alternatives_spanish:
  - seguidor
  - alumno
  lexicon: BDAG
  rationale: «Discípulo» mantiene la continuidad joánica y el matiz técnico del término, mejor que un equivalente más genérico.
- source_word: ὃν ἠγάπα ὁ Ἰησοῦς
  english_pob_choice: whom Jesus loved
  chosen_spanish: a quien Jesús amaba
  alternatives_spanish:
  - a quien Jesús amó
  - que Jesús amaba
  lexicon: BDAG
  rationale: Se conserva el relativo personal y el valor durativo de ἀγαπάω en imperfecto con «amaba», acorde con el registro del texto.
- source_word: ἀκολουθοῦντα
  english_pob_choice: following
  chosen_spanish: que seguía
  alternatives_spanish:
  - siguiendo
  - que iba siguiendo
  lexicon: BDAG
  rationale: El participio presente se expresa de forma relativa en español para evitar un calco áspero. No se añade objeto explícito porque el griego tampoco lo especifica.
- source_word: ἀνέπεσεν
  english_pob_choice: leaned back
  chosen_spanish: se había recostado
  alternatives_spanish:
  - se echó hacia atrás
  - se había reclinado
  lexicon: BDAG
  rationale: En el contexto de comida reclinada, «se había recostado» comunica bien la postura. En español resulta más natural que un calco físico literal, pero conserva la imagen corporal.
- source_word: ἐν τῷ δείπνῳ
  english_pob_choice: at the supper
  chosen_spanish: en la cena
  alternatives_spanish:
  - durante la cena
  - en el banquete
  lexicon: BDAG
  rationale: «Cena» es la forma más natural y digna en español para δεῖπνον en este contexto. Evita una terminología litúrgica ajena al pasaje.
- source_word: ἐπὶ τὸ στῆθος αὐτοῦ
  english_pob_choice: against his chest
  chosen_spanish: en el pecho de él
  alternatives_spanish:
  - sobre su pecho
  - contra su pecho
  lexicon: BDAG
  rationale: «Pecho» preserva la imagen del griego con claridad y respeto. Se mantiene «de él» para dejar patente el referente de αὐτοῦ sin ambigüedad.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: En el vocativo dirigido a Jesús, «Señor» es la equivalencia estándar y más reverente, consistente con el valor cristológico de κύριε.
- source_word: ὁ παραδιδούς
  english_pob_choice: the one betraying
  chosen_spanish: el que te traiciona
  alternatives_spanish:
  - el que te entrega
  - el traidor
  lexicon: BDAG
  rationale: En este contexto pasional, παραδίδωμι se traduce naturalmente como «traicionar». Se conserva la fuerza verbal del participio con una relativa sustantivada.
theological_decisions:
- issue: Valor de παραδιδούς en el contexto de la pasión
  english_pob_reading: the one betraying
  chosen_spanish_reading: el que te traiciona
  alternative_spanish_readings:
  - el que te entrega
  - el traidor
  rationale: El contexto narrativo de la pasión y la referencia a Judas justifican «traiciona» como la forma más clara y teológicamente precisa en español. «Entrega» es posible, pero puede suavizar indebidamente la carga relacional y moral del término en este versículo.
  doctrine_reference: Contexto narrativo de la pasión; uso semántico de παραδίδωμι en los Evangelios
- issue: Presentación del discípulo amado como referente conocido en la narración
  english_pob_reading: the disciple whom Jesus loved
  chosen_spanish_reading: el discípulo a quien Jesús amaba
  alternative_spanish_readings:
  - el discípulo amado por Jesús
  - el discípulo que Jesús amaba
  rationale: Se conserva la designación joánica tradicional sin convertirla en un título más interpretativo. La forma relativa mantiene el carácter identificador del pasaje.
  doctrine_reference: Narrativa joánica; coherencia intratextual de Juan 13 y Juan 21
- issue: Expresión de la postura en la cena
  english_pob_reading: leaned back against his chest at the supper
  chosen_spanish_reading: se había recostado en el pecho de él en la cena
  alternative_spanish_readings:
  - se había reclinado sobre su pecho en la cena
  - se había recostado contra su pecho durante la cena
  rationale: La cena reclinada se conserva sin imponer un lenguaje eclesiástico posterior. «En el pecho de él» retiene la cercanía física descrita por el griego sin cambiar el sentido por una formulación más devocional.
  doctrine_reference: Trasfondo cultural del banquete del primer siglo
- issue: Supresión de un objeto explícito en el participio ἀκολουθοῦντα
  english_pob_reading: following
  chosen_spanish_reading: que seguía
  alternative_spanish_readings:
  - siguiendo
  - que seguía a Jesús
  rationale: Como el griego no explicita el objeto, se evita añadirlo. La traducción relativa permite fluidez en español sin sobreespecificar la escena.
  doctrine_reference: Precisión lexical y respeto por la elipsis del texto fuente
translation_notes:
  revision_awareness: 'La versión inglesa auditada pasó por una revisión que eliminó el objeto explícito «them» para respetar la elipsis del griego en ἀκολουθοῦντα. La redacción española sigue esa decisión: evita añadir un objeto no expresado y mantiene el seguimiento como rasgo narrativo abierto.'
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς y «Señor» para Κύριε, conforme a los estándares del proyecto.
  - Se usa «discípulo» de forma consistente con la terminología joánica.
  - «Traiciona» conserva la fuerza de παραδίδωμι en el contexto de la pasión; no se sustituye por una forma más neutral sin motivo textual.
  - La referencia a la cena conserva el trasfondo de reclinarse a la mesa sin introducir lenguaje litúrgico ajeno al pasaje.
