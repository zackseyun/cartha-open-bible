revisions:
- from: 'Pedro se volvió y vio al discípulo a quien Jesús amaba, que seguía[a]; el mismo que también se había recostado en el pecho de él en la cena y había dicho: «Señor, ¿quién es el que te traiciona?»'
  to: 'Pedro se volvió y vio al discípulo a quien Jesús amaba, que seguía[a]; el mismo que también se había recostado sobre su pecho en la cena y había dicho: «Señor, ¿quién es el que te traiciona?»'
  rationale: Se reemplaza «en el pecho de él» por «sobre su pecho» para lograr un español natural y fiel a la imagen del griego en el contexto de la cena reclinada. Se conserva la elipsis de ἀκολουθοῦντα y se ajusta levemente la nota para explicarla con más claridad en español.
