    text: About two hundred cubits is roughly 300 feet or 90 meters.
    reason: cultural_note
  - marker: b
    text: Or 'the net of fish.' The Greek expression may be rendered more literally, but here it likely means the net containing the fish.
    reason: lexical_alternative
  - marker: c
    text: Or 'shore' for 'land.'
    reason: lexical_alternative
