translation:
  language: es
  text: Pero los otros discípulos vinieron en la barquita[a], porque no estaban lejos de la tierra[c], sino como a doscientos codos[b], arrastrando la red con los peces[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Barquita» intenta reflejar el diminutivo griego πλοιάριον.
    reason: lexical_alternative
  - marker: b
    text: Un codo equivale aproximadamente a 45 centímetros; doscientos codos son unos 90 metros.
    reason: cultural_note
  - marker: c
    text: O «orilla».
    reason: lexical_alternative
  - marker: d
    text: El griego dice literalmente «la red de los peces»; puede entenderse como una red que llevaba o contenía los peces.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ ἄλλοι μαθηταὶ
  english_pob_choice: But the other disciples
  chosen_spanish: Pero los otros discípulos
  alternatives_spanish:
  - Y los otros discípulos
  - Entonces los otros discípulos
  lexicon: BDAG
  rationale: δὲ introduce transición con contraste suave; en español, «Pero» conserva bien el enlace adversativo con el verso anterior. ἄλλοι μαθηταί se traduce naturalmente como «los otros discípulos».
- source_word: τῷ πλοιαρίῳ
  english_pob_choice: in the small boat
  chosen_spanish: en la barquita
  alternatives_spanish:
  - en el pequeño bote
  - en la pequeña barca
  lexicon: BDAG
  rationale: πλοιάριον es diminutivo de πλοῖον; «barquita» preserva el matiz diminutivo sin sonar forzado. Se evita simplemente «barco» porque perdería la escala del original.
- source_word: ἦλθον
  english_pob_choice: came
  chosen_spanish: vinieron
  alternatives_spanish:
  - llegaron
  - fueron
  lexicon: BDAG
  rationale: El aoristo narrativo de ἔρχομαι admite «vinieron» con fluidez en español. «Llegaron» también sería posible, pero «vinieron» mantiene mejor el movimiento indicado por el verbo.
- source_word: οὐ γὰρ ἦσαν μακρὰν ἀπὸ τῆς γῆς
  english_pob_choice: for they were not far from the land
  chosen_spanish: porque no estaban lejos de la tierra
  alternatives_spanish:
  - porque no estaban lejos de la orilla
  - pues no estaban lejos del terreno
  lexicon: BDAG
  rationale: γῆ aquí contrasta con el agua y puede significar «tierra» o «orilla». Se eligió «tierra» como equivalente más literal y natural; la nota ofrece «orilla» como alternativa contextual.
- source_word: ἀλλὰ ὡς ἀπὸ πηχῶν διακοσίων
  english_pob_choice: but about two hundred cubits away
  chosen_spanish: sino como a doscientos codos
  alternatives_spanish:
  - sino a unos doscientos codos
  - sino aproximadamente a doscientos codos
  lexicon: BDAG
  rationale: ὡς marca aproximación, así que «como a» comunica bien el valor estimativo. Se conserva «codos» para mantener la medida antigua del texto fuente en vez de convertirla en el cuerpo principal.
- source_word: σύροντες
  english_pob_choice: dragging
  chosen_spanish: arrastrando
  alternatives_spanish:
  - tirando de
  - halando
  lexicon: BDAG
  rationale: El participio presente expresa acción concomitante mientras venían. «Arrastrando» reproduce la fuerza física de σύρω en el contexto de pesca.
- source_word: τὸ δίκτυον τῶν ἰχθύων
  english_pob_choice: the net of fish
  chosen_spanish: la red de los peces
  alternatives_spanish:
  - la red de peces
  - la red con los peces
  lexicon: BDAG
  rationale: 'El genitivo τῶν ἰχθύων se conserva de modo más literal como posesivo/relacional: «de los peces». Aunque el inglés POB optó por «of fish», la revisión posterior descartó «full of fish»; en español, «la red de los peces» mantiene la relación genitiva sin introducir contenido no explícito.'
translation_notes:
  revision_awareness: La redacción toma en cuenta la revisión más reciente del contexto inglés, que corrigió «the net full of fish» a «the net of fish» por mayor fidelidad al griego. Por eso el español evita expresiones como «llena de peces» y conserva la relación literal del genitivo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, aunque este verso no contiene el nombre divino.
  - Se prefirió «barquita» para reproducir el diminutivo de πλοιάριον sin perder naturalidad en español.
  - Se evitó convertir la medida antigua a metros en el texto principal; la equivalencia solo aparece en la nota.
  - «Tierra» se eligió como traducción principal de γῆ, dejando «orilla» como alternativa contextual.
  - La imagen de la red se dejó en forma genitiva literal para respetar el ajuste revisional del inglés POB y no añadir la idea de plenitud.
