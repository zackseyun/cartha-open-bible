base_translation:
  language: en
  yaml_path: translation/nt/john/021/022.yaml
  text: Jesus said to him[a], “If I want him to remain until I come[b], what is that to you? You follow me.”
  footnotes:
  - marker: a
    text: Or, 'If I will him to remain until I come.' The Greek verb can express either desire ('want') or will ('will/wish').
    reason: lexical_alternative
  - marker: b
    text: '''Until I come'' is left intentionally open; interpreters differ on whether this refers to Jesus'' later coming in a historical event or to his final coming.'
    reason: alternative_reading
