    issue: La nota [a] está formulada de manera incorrecta y no corresponde a la alternativa léxica documentada.
    rationale: El inglés POB da como alternativa «If I will him to remain until I come», es decir, una alternativa para θέλω («quiero» / «dispongo» / «quiero que»), no una reformulación completa como «hasta que yo quiera que él permanezca hasta que yo venga», que repite y desordena la cláusula.
  - severity: low
