  source_alignment_summary: 'El borrador español sigue bien el sentido del griego: condición con Ἐὰν, voluntad en θέλω, permanencia en μένειν, ambigüedad preservada en ἕως ἔρχομαι, reprensión directa en τί πρὸς σέ, y mandato final con pronombre enfático. Sin embargo, la nota [a] no refleja fielmente la nota inglesa ni el griego; introduce una alternativa inexistente en la forma actual y oscurece que la alternativa real es sobre «quiero»/«dispongo» más que sobre el orden entero de la cláusula.'
  spanish_quality_summary: El español principal es claro, natural y digno. «¿Qué te importa a ti?» funciona bien, y «Tú sígueme» preserva el énfasis sin sonar forzado. La única reparación necesaria es la nota [a]; además, la nota [b] es prescindible porque el énfasis puede mantenerse sin nota, y el encargo prioriza notas para alternativas significativas o ambigüedades reales.
  glossary_alignment: No hay conflictos con la terminología del proyecto. «Jesús» es correcto; no aparecen términos sensibles como Yahvé, Mesías/Cristo, Espíritu, esclavo, etc. «Permanezca» preserva bien μένειν conforme al razonamiento joánico documentado.
  issues:
