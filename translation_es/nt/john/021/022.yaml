translation:
  language: es
  text: 'Jesús le dijo: «Si yo quiero[a] que él permanezca hasta que yo venga, ¿qué te importa a ti? Tú sígueme».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Si dispongo que él permanezca hasta que yo venga». El verbo puede expresar tanto deseo como voluntad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει αὐτῷ ὁ Ἰησοῦς
  english_pob_choice: Jesus said to him
  chosen_spanish: Jesús le dijo
  alternatives_spanish:
  - Jesús le dice
  lexicon: BDAG
  rationale: Mantengo el presente histórico implícito en griego con un pasado narrativo natural en español, como suele hacerse en narración bíblica, sin perder la vivacidad del relato.
- source_word: Ἐὰν
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Supongamos que
  - En caso de que
  lexicon: BDAG
  rationale: La cláusula es condicional; «si» comunica de forma directa la condición sin añadir matices ajenos.
- source_word: θέλω
  english_pob_choice: I want
  chosen_spanish: yo quiero
  alternatives_spanish:
  - yo quiero hacerlo
  - yo quisiera
  lexicon: BDAG
  rationale: «Quiero» expresa con claridad la voluntad de Jesús y conserva la fuerza volitiva que el inglés POB decidió no suavizar hacia una mera intención.
- source_word: μένειν
  english_pob_choice: to remain
  chosen_spanish: permanecer
  alternatives_spanish:
  - quedarse
  - seguir
  lexicon: BDAG
  rationale: «Permanecer» reproduce bien el valor de μένω y mantiene la continuidad con el uso joánico del verbo, sin interpretar de más la situación del discípulo.
- source_word: ἕως ἔρχομαι
  english_pob_choice: until I come
  chosen_spanish: hasta que yo venga
  alternatives_spanish:
  - hasta mi venida
  - hasta que vuelva
  lexicon: BDAG
  rationale: «Hasta que yo venga» conserva la apertura del griego y evita precisar el tipo de venida, tal como hace el inglés POB.
- source_word: τί πρὸς σέ;
  english_pob_choice: what is that to you?
  chosen_spanish: ¿qué te importa a ti?
  alternatives_spanish:
  - ¿qué tiene eso que ver contigo?
  - ¿qué te va en eso?
  lexicon: BDAG
  rationale: La expresión es idiomática y de reprensión; «¿qué te importa a ti?» suena natural en español y conserva la fuerza del desvío de Jesús sin atenuarlo.
- source_word: σύ
  english_pob_choice: You
  chosen_spanish: Tú
  alternatives_spanish:
  - Y tú
  - En cuanto a ti
  lexicon: BDAG
  rationale: El pronombre explícito es enfático; lo conservo al inicio para reproducir el contraste con «él» y la insistencia personal del mandato.
- source_word: μοι ἀκολούθει
  english_pob_choice: follow me
  chosen_spanish: sígueme
  alternatives_spanish:
  - continúa siguiéndome
  - ven y sígueme
  lexicon: BDAG
  rationale: El imperativo singular queda naturalmente como «sígueme»; el matiz de continuidad del presente imperativo queda implícito y no requiere ampliación.
theological_decisions:
- issue: Alcance de «hasta que yo venga»
  english_pob_reading: Rendered generically as 'until I come' without specifying the referent.
  chosen_spanish_reading: 'Se deja igualmente genérico: «hasta que yo venga».'
  alternative_spanish_readings:
  - hasta que yo vuelva en la parusía
  - hasta que venga en un evento histórico concreto
  - hasta que yo venga en las apariciones de resurrección
  rationale: La frase no define su referent; la traducción debe conservar esa tensión y no resolverla doctrinalmente. Esto coincide con el audit trail inglés y con la cautela exegética del contexto inmediato.
  doctrine_reference: Preservar la ambigüedad teológica del texto; no forzar una lectura escatológica específica.
translation_notes:
  revision_awareness: La revisión inglesa reciente eliminó una coma para hacer más natural el imperativo «You follow me». En español, el equivalente natural es «Tú sígueme», conservando el énfasis del pronombre sin coma interpuesta.
  spanish_consistency_notes:
  - He mantenido «Jesús» y no «Cristo», en línea con el sujeto gramatical del relato.
  - He usado «permanecer» para μένω, coherente con la preferencia auditada del inglés POB.
  - He conservado la ambigüedad de «venir» sin añadir «volver» ni una referencia escatológica concreta.
  - La puntuación del imperativo enfatiza el pronombre, pero evita una formulación artificiosa.
