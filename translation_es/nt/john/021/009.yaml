translation:
  language: es
  text: Así que cuando salieron a tierra[a], vieron un fuego de carbón puesto allí, y pescado sobre él[b], y pan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «desembarcaron». El griego dice más literalmente «salieron a tierra».'
    reason: lexical_alternative
  - marker: b
    text: «Fuego de carbón» traduce un término también usado en Juan 18:18, enlazando verbalmente esta escena con el lugar de la negación anterior de Pedro.
    reason: cross_reference
lexical_decisions:
- source_word: Ὡς οὖν
  english_pob_choice: So when
  chosen_spanish: Así que, cuando
  alternatives_spanish:
  - Entonces, cuando
  - Así pues, cuando
  - Cuando
  lexicon: BDAG
  rationale: Ἡ combinación temporal y de conexión narrativa se expresa con una fórmula natural en español. «Así que, cuando» mantiene la transición sin volverla mecánica ni excesivamente literal.
- source_word: ἀπέβησαν εἰς τὴν γῆν
  english_pob_choice: they got out onto the land
  chosen_spanish: llegaron a tierra
  alternatives_spanish:
  - desembarcaron en tierra
  - bajaron a tierra
  - salieron a tierra
  lexicon: BDAG
  rationale: El griego indica el movimiento de salir de la barca y ponerse en tierra. «Llegaron a tierra» comunica esa acción con naturalidad en español y conserva la referencia a γῆ como «tierra/land», no solo «orilla».
- source_word: βλέπουσιν
  english_pob_choice: they saw
  chosen_spanish: vieron
  alternatives_spanish:
  - ven
  - observan
  - se encontraron con
  lexicon: BDAG
  rationale: El presente histórico del griego se vierte mejor en un pasado natural en español. «Vieron» conserva la secuencia narrativa sin perder el valor verbal del evento.
- source_word: ἀνθρακιὰν κειμένην
  english_pob_choice: a charcoal fire laid there
  chosen_spanish: una fogata de brasas puesta allí
  alternatives_spanish:
  - una lumbre de brasas allí puesta
  - un fuego de carbones puesto allí
  - una hoguera de brasas
  lexicon: BDAG
  rationale: ἀνθρακιά describe una fogata/brasero de brasas o carbón encendido. «Fogata de brasas» mantiene la imagen del fuego de brasas; «puesta allí» traduce el participio estativo κειμένην con una formulación natural que evita el calco rígido.
- source_word: ὀψάριον ἐπικείμενον
  english_pob_choice: fish lying on it
  chosen_spanish: pescado sobre ella
  alternatives_spanish:
  - pescado puesto sobre ella
  - pescado encima
  - pescado allí sobre las brasas
  lexicon: BDAG
  rationale: ὀψάριον en Juan se refiere a pescado como alimento. El participio ἐπικείμενον indica que estaba sobre la fogata/brasas; en español se puede expresar con «sobre ella» para hacer clara la relación implícita sin forzar un objeto innecesario.
- source_word: ἄρτον
  english_pob_choice: bread
  chosen_spanish: pan
  alternatives_spanish:
  - un pan
  - panes
  - un trozo de pan
  lexicon: BDAG
  rationale: Ἄρτος en este contexto se traduce de manera sencilla como «pan». Es la forma más natural y no añade una especificación de cantidad que el griego no exige.
theological_decisions:
- issue: Posible eco verbal con Juan 18:18 en «carbón/brasas»
  english_pob_reading: '''Charcoal fire'' translates a term also used in John 18:18, linking this scene verbally with Peter''s earlier denial setting.'
  chosen_spanish_reading: «Fogata de brasas» mantiene el vínculo léxico con el episodio anterior sin ocultarlo bajo una paráfrasis general.
  alternative_spanish_readings:
  - «brasero de carbón»
  - «fuego de carbón»
  - «brasas»
  rationale: El texto griego usa el mismo campo léxico que en Juan 18:18, por lo que conviene conservar la imagen de brasas/carbón. «Fogata de brasas» es suficientemente transparente y deja visible la conexión literaria con la negación de Pedro.
  doctrine_reference: Juan 18:18; Juan 21:9
- issue: Participio estativo κειμένην aplicado a la fogata
  english_pob_reading: laid there
  chosen_spanish_reading: puesta allí
  alternative_spanish_readings:
  - colocada allí
  - dispuesta allí
  - allí puesta
  rationale: No hay razón para espiritualizar o interpretar más allá del estado resultante del objeto. «Puesta allí» preserva la presencia fija del fuego sin sobreexplicar la escena.
  doctrine_reference: Gramática narrativa del griego koiné
translation_notes:
  revision_awareness: 'Alineado con el último pase auditado (sin cambios necesarios): se conservó la equivalencia óptima del inglés POB, manteniendo la conexión con Juan 18:18 mediante el léxico de brasas/carbón y el movimiento de desembarco sin sobrerreligiosizar el texto.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se usa «pan» como equivalente simple de ἄρτος, coherente con el registro narrativo.
  - Se evita «Cristo/Mesías» porque el versículo no contiene ese término.
  - Se conserva un estilo bíblico claro pero contemporáneo, sin calcos innecesarios del inglés.
