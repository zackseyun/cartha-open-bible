revisions:
- from: Así que, cuando llegaron a tierra[a], vieron una fogata de brasas puesta allí, y pescado sobre ella[b], y pan.
  to: Así que cuando salieron a tierra[a], vieron un fuego de carbón puesto allí, y pescado sobre él[b], y pan.
  rationale: Se ajusta «llegaron a tierra» a «salieron a tierra» para reflejar mejor ἀπέβησαν εἰς τὴν γῆν, y «fogata de brasas» a «fuego de carbón» para mayor precisión léxica, mejor español contextual y preservación más clara del vínculo con Juan 18:18. También se aligera la puntuación.
