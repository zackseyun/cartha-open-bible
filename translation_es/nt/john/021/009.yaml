review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia del griego: salida a tierra, percepción de un fuego de carbón, pescado sobre él y pan. También mantiene correctamente el presente histórico como pasado narrativo. Sin embargo, dos puntos requieren ajuste para mayor fidelidad: «fogata de brasas» suena más grande y menos preciso que ἀνθρακιά, y «llegaron a tierra» pierde algo del matiz de salir de la barca hacia tierra que el griego expresa y que la nota intenta preservar.'
  spanish_quality_summary: El español es claro y legible, pero «fogata de brasas» no es la opción más natural ni más exacta para una escena de cocina junto a la orilla; «fuego de carbón» suena más preciso y además refleja mejor el eco con Juan 18:18. La frase general mejora si se reduce la puntuación y se evita una formulación algo pesada.
  glossary_alignment: No hay conflictos con los términos base del proyecto. La principal cuestión léxica es ἀνθρακιά, donde conviene reflejar explícitamente el carbón para conservar el vínculo intertextual documentado. El resto («pan», «vieron», «a tierra») está dentro de los parámetros, con mejora recomendada en «salieron a tierra» para acercarse más a ἀπέβησαν εἰς τὴν γῆν.
  issues:
  - severity: medium
    issue: «Fogata de brasas» para ἀνθρακιὰν
    rationale: Puede sugerir una hoguera o fogata mayor que la escena requiere y diluye el valor léxico de «charcoal fire». «Fuego de carbón» o similar preserva mejor la precisión y el eco con Juan 18:18.
  - severity: medium
    issue: «Llegaron a tierra» para ἀπέβησαν εἰς τὴν γῆν
    rationale: Es entendible, pero enfatiza la llegada más que el acto de salir de la barca hacia tierra. «Salieron a tierra» se acerca mejor al movimiento expresado por ἀποβαίνω y armoniza con la nota.
  - severity: low
    issue: Puntuación algo cargada
    rationale: La coma después de «Así que» no es necesaria en esta construcción, y una redacción más fluida mejora la naturalidad sin cambiar el sentido.
  revised_spanish_text: Así que cuando salieron a tierra[a], vieron un fuego de carbón puesto allí, y pescado sobre él[b], y pan.
  revised_footnotes:
  - marker: a
    text: 'O: «desembarcaron». El griego dice más literalmente «salieron a tierra».'
    reason: lexical_alternative
  - marker: b
    text: «Fuego de carbón» traduce un término también usado en Juan 18:18, enlazando verbalmente esta escena con el lugar de la negación anterior de Pedro.
    reason: cross_reference
  revision_rationale: Se ajusta «llegaron a tierra» a «salieron a tierra» para reflejar mejor ἀπέβησαν εἰς τὴν γῆν, y «fogata de brasas» a «fuego de carbón» para mayor precisión léxica, mejor español contextual y preservación más clara del vínculo con Juan 18:18. También se aligera la puntuación.
