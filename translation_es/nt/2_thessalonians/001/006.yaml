translation:
  language: es
  text: pues es justo para Dios[a] retribuir con aflicción a los que los afligen
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «si en verdad es justo para Dios retribuir con tribulación a los que los afligen»'
