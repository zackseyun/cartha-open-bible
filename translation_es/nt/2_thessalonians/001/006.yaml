lexical_decisions:
- source_word: εἴπερ
  english_pob_choice: since
  chosen_spanish: pues
  alternatives_spanish:
  - ya que
  - puesto que
  - si en verdad
  lexicon: BDAG
  rationale: Aquí εἴπερ introduce una premisa asumida para razonar, no una condición dudosa. «Pues» comunica bien esa base causal o explicativa en español sin volver la frase pesada.
- source_word: δίκαιον
  english_pob_choice: just
  chosen_spanish: justo
  alternatives_spanish:
  - recto
  - righteous
  lexicon: BDAG
  rationale: El adjetivo describe lo moralmente correcto en un marco de juicio y retribución. «Justo» conserva ese sentido jurídico y natural en español.
- source_word: παρὰ θεῷ
  english_pob_choice: with God
  chosen_spanish: delante de Dios
  alternatives_spanish:
  - con Dios
  - ante Dios
  - a la vista de Dios
  lexicon: BDAG
  rationale: La expresión señala la evaluación conforme al juicio de Dios. «Delante de Dios» mantiene esa referencia de estándar divino sin sonar forzado en español; «con Dios» podría sugerir compañía más que criterio judicial.
- source_word: ἀνταποδοῦναι
  english_pob_choice: to repay
  chosen_spanish: retribuir
  alternatives_spanish:
  - recompensar
  - pagar de vuelta
  - dar retribución
  lexicon: BDAG
  rationale: El verbo expresa devolver en correspondencia, en contexto de retribución judicial. «Retribuir» conserva mejor la idea formal de correspondencia que «recompensar», y evita el tono coloquial de «pagar de vuelta».
- source_word: τοῖς θλίβουσιν ὑμᾶς
  english_pob_choice: to those who afflict you
  chosen_spanish: a los que os afligen
  alternatives_spanish:
  - a los que os causan aflicción
  - a los que os atribulan
  - a los que os oprimen
  lexicon: BDAG
  rationale: El participio θλίβουσιν denota causar presión, sufrimiento o persecución. «Afligen» conserva la fuerza verbal y mantiene el vínculo léxico con θλῖψιν en la misma cláusula.
- source_word: θλῖψιν
  english_pob_choice: affliction
  chosen_spanish: aflicción
  alternatives_spanish:
  - tribulación
  - angustia
  - opresión
  lexicon: BDAG
  rationale: «Aflicción» mantiene la relación léxica con «afligen» y comunica con claridad el sufrimiento como retribución. «Tribulación» es posible, pero en español suele sonar más tradicional y menos directa; «angustia» debilita el matiz de presión sufrida.
theological_decisions:
- issue: Naturaleza de la retribución divina
  english_pob_reading: The verse states that God justly repays persecutors with affliction, without specifying the full timing or mode of that judgment in this clause.
  chosen_spanish_reading: El versículo afirma que es justo delante de Dios retribuir aflicción a los perseguidores, sin precisar aquí el momento ni la forma completa de ese juicio.
  alternative_spanish_readings:
  - La aflicción se refiere exclusivamente al juicio final.
  - La aflicción incluye tanto juicios históricos presentes como el juicio final.
  rationale: El griego afirma la justicia de la retribución divina, pero no resuelve por sí mismo cuándo ni cómo se ejecuta. La redacción española conserva esa amplitud y no estrecha el texto a un esquema doctrinal particular.
  doctrine_reference: Preservar la tensión teológica sin resolverla de antemano.
translation_notes:
  revision_awareness: La versión española sigue el ajuste final del audit trail que prefería un equivalente natural para παρὰ θεῷ y mantiene la relación léxica entre θλίβουσιν y θλῖψιν. También refleja la lectura asumida de εἴπερ como premisa retórica, no como duda real.
  spanish_consistency_notes:
  - Se mantiene «afligen/aflicción» para reproducir la conexión de raíz entre verbo y sustantivo.
  - «Delante de Dios» se usa como equivalente idiomático de evaluación divina, coherente con el valor contextual de παρὰ θεῷ.
  - Se evita «SEÑOR» u otra sustitución porque el texto griego tiene θεῷ y no el Tetragrámaton.
