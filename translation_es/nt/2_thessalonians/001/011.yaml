translation:
  language: es
  text: Con este fin también oramos siempre por ustedes[a], para que nuestro Dios los tenga por dignos del llamamiento y cumpla todo buen propósito[b] y obra de fe[c] con poder.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los considere dignos del llamamiento» o «los haga dignos del llamamiento». El verbo griego puede significar «tener por dignos», «considerar dignos» o «hacer dignos».
    reason: alternative_reading
  - marker: b
    text: O «todo propósito de bondad» o «todo propósito para la bondad».
    reason: lexical_alternative
  - marker: c
    text: «Obra de fe» también puede entenderse como «obra producida por la fe»; en este contexto, «fe» podría leerse también como «fidelidad».
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰς ὃ
  english_pob_choice: To this end
  chosen_spanish: Con este fin
  alternatives_spanish:
  - Para esto
  - Para tal fin
  lexicon: BDAG
  rationale: La frase resumptiva apunta al propósito de la oración anterior; «Con este fin» conserva el valor teleológico de εἰς y suena natural en español.
- source_word: καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - incluso
  - además
  lexicon: BDAG
  rationale: Mantiene el matiz aditivo/enfático sin recargar la frase.
- source_word: προσευχόμεθα πάντοτε περὶ ὑμῶν
  english_pob_choice: we always pray for you
  chosen_spanish: oramos siempre por ustedes
  alternatives_spanish:
  - siempre oramos por ustedes
  - estamos orando siempre por ustedes
  lexicon: BDAG
  rationale: El presente indica acción habitual y continua; «oramos siempre por ustedes» es claro, natural y conserva el objeto de la oración con περὶ ὑμῶν.
- source_word: ἀξιώσῃ
  english_pob_choice: may count ... worthy
  chosen_spanish: los tenga por dignos
  alternatives_spanish:
  - los considere dignos
  - los haga dignos
  lexicon: BDAG
  rationale: «Tener por dignos» preserva el sentido evaluativo de «count/deem worthy» sin resolver indebidamente la tensión con el posible sentido causativo de «make worthy».
- source_word: τῆς κλήσεως
  english_pob_choice: of the calling
  chosen_spanish: de su llamamiento
  alternatives_spanish:
  - del llamamiento
  - de vuestro llamamiento
  lexicon: BDAG
  rationale: El griego no explicita posesivo; el contexto inmediato permite referirlo al llamamiento de Dios, y el español requiere resolver la relación con un posesivo natural.
- source_word: ὁ θεὸς ἡμῶν
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - Dios
  lexicon: BDAG
  rationale: Se conserva explícitamente el posesivo de la fuente griega.
- source_word: πληρώσῃ
  english_pob_choice: may fulfill
  chosen_spanish: cumpla
  alternatives_spanish:
  - lleve a cabo
  - realice plenamente
  lexicon: BDAG
  rationale: Aoristo subjuntivo en paralelo con ἀξιώσῃ; «cumpla» comunica bien la idea de llevar a efecto o realizar plenamente lo pedido.
- source_word: πᾶσαν εὐδοκίαν ἀγαθωσύνης
  english_pob_choice: every good resolve
  chosen_spanish: todo buen propósito
  alternatives_spanish:
  - todo propósito de bondad
  - toda buena voluntad
  lexicon: BDAG
  rationale: εὐδοκία puede implicar propósito, deseo o beneplácito; con ἀγαθωσύνης, «buen propósito» resulta idiomático y mantiene el énfasis moral sin sobreespecificar.
- source_word: ἔργον πίστεως
  english_pob_choice: work of faith
  chosen_spanish: obra de fe
  alternatives_spanish:
  - obra producida por la fe
  - trabajo de fe
  - obra fiel
  lexicon: BDAG
  rationale: La expresión paulina se mantiene compacta; «obra de fe» preserva la ambigüedad del genitivo entre obra surgida de la fe y obra caracterizada por la fe.
- source_word: πίστεως
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - fidelidad
  - confianza
  lexicon: BDAG
  rationale: Se conserva el valor básico de πίστις como «fe», dejando abierta la posibilidad semántica de «fidelidad» donde el contexto lo sugiera.
- source_word: ἐν δυνάμει
  english_pob_choice: with power
  chosen_spanish: con poder
  alternatives_spanish:
  - en poder
  - por poder
  lexicon: BDAG
  rationale: «Con poder» expresa de forma idiomática la esfera o el medio de la acción divina sin forzar la sintaxis española.
theological_decisions:
- issue: Sentido de ἀξιώσῃ en relación con el llamamiento divino
  english_pob_reading: may count you worthy of the calling
  chosen_spanish_reading: los tenga por dignos de su llamamiento
  alternative_spanish_readings:
  - los haga dignos de su llamamiento
  - los considere dignos de su llamamiento
  rationale: Se conserva la tensión entre evaluación divina y acción transformadora, evitando sugerir mérito autónomo por parte de los creyentes.
  doctrine_reference: Preservar la tensión léxica sin cerrarla dogmáticamente.
- issue: Interpretación de ἔργον πίστεως
  english_pob_reading: work of faith
  chosen_spanish_reading: obra de fe
  alternative_spanish_readings:
  - obra producida por la fe
  - obra de fidelidad
  rationale: La construcción se deja abierta, como en el POB inglés, para permitir tanto obra nacida de la fe como obra caracterizada por ella.
  doctrine_reference: 'Contested terms: πίστις renderizado como «fe» en el texto principal; alternativas preservadas en nota.'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el pasaje mantiene alta concordancia con el control de calidad y no requiere ajustes adicionales.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exige; este versículo no lo contiene.
  - Se mantiene «Dios» para θεός y «llamamiento» para κλῆσις, coherente con el registro teológico del conjunto.
  - Se evita «Cristo» porque no aparece en el versículo.
  - Se conserva la ambigüedad de ἀξιώσῃ y de ἔργον πίστεως mediante el texto principal y la nota.
  - La puntuación y el uso de mayúsculas siguen el estándar español actual con tono bíblico digno.
