review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el griego y el rastro del POB inglés en la estructura general: «Con este fin también oramos siempre por ustedes», la cláusula final con ἵνα, el paralelismo entre ἀξιώσῃ y πληρώσῃ, y la secuencia «todo buen propósito ... y obra de fe con poder». Sin embargo, en τῆς κλήσεως el borrador añade un posesivo no expreso en griego ni retenido en el POB inglés («su llamamiento»), cuando la decisión auditada fue preservar «the calling» sin posesivo. Eso debe corregirse a «del llamamiento».'
  spanish_quality_summary: El español es claro, natural y digno. «Con este fin», «oramos siempre por ustedes», «los tenga por dignos» y «obra de fe con poder» son legibles y fieles. La única reparación necesaria es evitar el añadido interpretativo del posesivo en el texto principal y en la nota asociada. También conviene ajustar la nota [a] para reflejar exactamente la alternativa inglesa principal («hacer dignos» además de «tener/considerar por dignos») sin mantener el posesivo añadido.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto: θεός = «Dios», πίστις = «fe», y no aparecen términos sensibles como Yahvé/Mesías/esclavo. La decisión «obra de fe» concuerda con el POB. La principal desalineación glosaria/auditiva es κλήσεως: debe quedar «llamamiento» sin posesivo añadido para respetar la decisión documentada de no suplementar «su» o «vuestro».'
  issues:
  - severity: medium
    issue: Se añadió un posesivo en «de su llamamiento»
    rationale: El griego tiene τῆς κλήσεως, «del llamamiento», sin posesivo explícito. El POB inglés documentó de manera deliberada que no debía añadirse «his/your». En español no es necesario resolverlo con posesivo; «del llamamiento» es natural y más fiel.
  - severity: low
    issue: La nota [a] repite el posesivo añadido
    rationale: Si el texto principal se corrige a «del llamamiento», la nota también debe alinearse para no reintroducir una interpretación no presente en la fuente ni en la auditoría inglesa.
  revised_spanish_text: Con este fin también oramos siempre por ustedes[a], para que nuestro Dios los tenga por dignos del llamamiento y cumpla todo buen propósito[b] y obra de fe[c] con poder.
  revised_footnotes:
  - marker: a
    text: O «los considere dignos del llamamiento» o «los haga dignos del llamamiento». El verbo griego puede significar «tener por dignos», «considerar dignos» o «hacer dignos».
    reason: alternative_reading
  - marker: b
    text: O «todo propósito de bondad» o «todo propósito para la bondad».
    reason: lexical_alternative
  - marker: c
    text: «Obra de fe» también puede entenderse como «obra producida por la fe»; en este contexto, «fe» podría leerse también como «fidelidad».
    reason: lexical_alternative
  revision_rationale: 'Se requiere una corrección pequeña pero importante: eliminar el posesivo no expreso en τῆς κλήσεως para respetar tanto la fuente griega como la decisión lexical documentada del POB inglés. El resto del versículo es fiel y natural en español, por lo que no hace falta una reescritura mayor.'
