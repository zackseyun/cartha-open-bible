review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: resultado inferido («ὥστε»), énfasis en «nosotros mismos», jactancia acerca de los tesalonicenses entre las iglesias de Dios, y la base de esa jactancia en su perseverancia y fe en medio de persecuciones y aflicciones. También conserva correctamente la nota alternativa para πίστις. Sin embargo, en español «nos jactamos de ustedes» suena algo áspero y puede sugerir matiz desfavorable; «hablamos con orgullo de ustedes» o «nos gloriamos por ustedes» serían más naturales. Dado que el proyecto permite evitar calcos de madera cuando el español resultaría poco natural, conviene ajustar esa formulación sin perder la fuerza retórica.'
  spanish_quality_summary: El texto es claro y ampliamente comprensible, pero «nos jactamos de ustedes» no es la opción más idiomática en español eclesial general. «Hablamos con orgullo de ustedes» mejora la naturalidad, aunque suaviza un poco; «nos gloriamos por ustedes» es más elevado pero menos común. También la repetición de «su» y «sus» es correcta. La puntuación y el registro son adecuados.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Dios», «fe», «perseverancia», «persecuciones» y «aflicciones» están bien alineados. La nota sobre πίστις debe mantenerse; conviene ajustar «lealtad perseverante» a una explicación más cercana al audit trail inglés («fidelidad constante» o similar) para no introducir un matiz nuevo demasiado específico.
  issues:
  - severity: medium
    issue: «nos jactamos de ustedes» es poco idiomático en español
    rationale: Aunque reproduce el verbo ἐγκαυχᾶσθαι con fuerza, en español suena torpe y algo negativo. El proyecto pide evitar calcos poco naturales; conviene una formulación que preserve la idea de gloriarse/boast sin degradar la legibilidad.
  - severity: low
    issue: La nota de πίστις añade «lealtad perseverante», que va un poco más allá del audit trail inglés
    rationale: El inglés habla de «steadfast fidelity». En español es mejor una formulación más directa como «fidelidad constante» para evitar ampliar innecesariamente el matiz.
  revised_spanish_text: de modo que nosotros mismos hablamos con orgullo de ustedes entre las iglesias de Dios por su perseverancia y fe[a] en todas sus persecuciones y aflicciones que están soportando.
  revised_footnotes:
  - marker: a
    text: O «fidelidad»; πίστις puede denotar tanto fe como fidelidad constante, especialmente en contextos de sufrimiento.
    reason: alternative_reading
  revision_rationale: Se revisa la expresión principal para lograr un español más natural y eclesialmente legible, sin perder el sentido de ἐγκαυχᾶσθαι. Se conserva la estructura argumental del versículo y la nota sobre πίστις, afinando su redacción para ajustarla mejor al audit trail inglés.
