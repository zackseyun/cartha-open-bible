translation:
  language: es
  text: de modo que nosotros mismos hablamos con orgullo de ustedes entre las iglesias de Dios por su perseverancia y fe[a] en todas sus persecuciones y aflicciones que están soportando.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fidelidad»; πίστις puede denotar tanto fe como fidelidad constante, especialmente en contextos de sufrimiento.
    reason: alternative_reading
lexical_decisions:
- source_word: ὥστε
  english_pob_choice: so that
  chosen_spanish: de modo que
  alternatives_spanish:
  - así que
  - por tanto
  lexicon: BDAG
  rationale: Introduce el resultado de lo anterior; «de modo que» conserva la relación consecutiva de forma natural en español.
- source_word: αὐτοὺς ἡμᾶς
  english_pob_choice: we ourselves
  chosen_spanish: nosotros mismos
  alternatives_spanish:
  - nosotros mismos, en persona
  - nosotros mismos, precisamente
  lexicon: BDAG
  rationale: La construcción enfática se mantiene con el pronombre explícito reforzado, sin forzar una calca.
- source_word: ἐν ὑμῖν
  english_pob_choice: about you
  chosen_spanish: de ustedes
  alternatives_spanish:
  - acerca de ustedes
  - con ustedes
  lexicon: BDAG
  rationale: En un contexto de jactancia, la relación puede expresarse en español como el objeto del comentario; «de ustedes» es natural y conserva el referente.
- source_word: ἐγκαυχᾶσθαι
  english_pob_choice: boast
  chosen_spanish: nos jactamos
  alternatives_spanish:
  - nos gloriamos
  - nos enorgullecemos
  lexicon: BDAG
  rationale: El verbo tiene fuerza retórica; «jactarse» preserva mejor esa intensidad que una formulación más suave.
- source_word: ἐν ταῖς ἐκκλησίαις τοῦ θεοῦ
  english_pob_choice: among the churches of God
  chosen_spanish: entre las iglesias de Dios
  alternatives_spanish:
  - en las iglesias de Dios
  lexicon: BDAG
  rationale: «Entre» reproduce mejor el ámbito comunitario en que ocurre la jactancia; «iglesias de Dios» mantiene el plural de asambleas pertenecientes a Dios.
- source_word: ὑπὲρ
  english_pob_choice: because of
  chosen_spanish: por
  alternatives_spanish:
  - a causa de
  - debido a
  lexicon: BDAG
  rationale: Aquí introduce la base o motivo; «por» es breve y natural en español para expresar la causa de la jactancia.
- source_word: ὑπομονῆς
  english_pob_choice: perseverance
  chosen_spanish: perseverancia
  alternatives_spanish:
  - paciencia
  - constancia
  - resistencia
  lexicon: BDAG
  rationale: En sufrimiento continuo, «perseverancia» comunica bien la resistencia sostenida y es idiomática en español moderno.
- source_word: πίστεως
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - fidelidad
  - confianza
  lexicon: BDAG
  rationale: Se conserva el valor principal de «fe»; en este contexto también puede oírse el matiz de fidelidad, por lo que se preserva la alternativa en la nota.
- source_word: ἐν πᾶσιν τοῖς διωγμοῖς ὑμῶν καὶ ταῖς θλίψεσιν
  english_pob_choice: in all your persecutions and afflictions
  chosen_spanish: en todas sus persecuciones y aflicciones
  alternatives_spanish:
  - entre todas sus persecuciones y aflicciones
  - en todas sus persecuciones y tribulaciones
  lexicon: BDAG
  rationale: Mantiene la distinción entre persecuciones hostiles y aflicciones generales, con un español claro y solemne.
- source_word: διωγμοῖς
  english_pob_choice: persecutions
  chosen_spanish: persecuciones
  alternatives_spanish:
  - hostigamientos
  - opresiones
  lexicon: BDAG
  rationale: Es el equivalente estándar para la oposición sufrida por causa de la fe.
- source_word: θλίψεσιν
  english_pob_choice: afflictions
  chosen_spanish: aflicciones
  alternatives_spanish:
  - tribulaciones
  - angustias
  - tribulaciones y presiones
  lexicon: BDAG
  rationale: «Aflicciones» mantiene el peso del término sin sonar excesivamente arcaico.
- source_word: αἷς ἀνέχεσθε
  english_pob_choice: that you are enduring
  chosen_spanish: que están soportando
  alternatives_spanish:
  - que están aguantando
  - que están padeciendo
  lexicon: BDAG
  rationale: «Soportar» reproduce bien el sentido de resistir/cargar con pruebas de manera continua.
theological_decisions:
- issue: πίστις puede significar «fe» o «fidelidad» en un contexto de sufrimiento
  english_pob_reading: faith, with a footnote noting possible 'faithfulness'
  chosen_spanish_reading: fe, con nota sobre la posibilidad de «fidelidad»
  alternative_spanish_readings:
  - fidelidad
  - confianza
  rationale: Se mantiene el término principal «fe» conforme al criterio del proyecto, pero se reconoce que en este contexto también puede implicar una lealtad perseverante bajo presión.
  doctrine_reference: 'DOCTRINE.md: tabla de términos controvertidos para πίστις; §3 de filosofía de traducción'
- issue: El énfasis de αὐτοὺς ἡμᾶς
  english_pob_reading: we ourselves
  chosen_spanish_reading: nosotros mismos
  alternative_spanish_readings:
  - nosotros mismos, en persona
  rationale: La frase conserva el énfasis apostólico sin añadir contenido interpretativo.
  doctrine_reference: Decisión estilística basada en la fuerza enfática del griego y en el audit trail en inglés
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior integrando el marcador [a] directamente en el texto español junto a «fe», de modo que la nota quede anclada correctamente. El resto del enunciado sigue de cerca el griego y el audit trail inglés, sin cambios de sentido respecto de la revisión más reciente.
  spanish_consistency_notes:
  - Se usa «Dios» para θεοῦ y no una sustitución reverencial no auditada.
  - «Iglesias de Dios» conserva el plural de ἐκκλησίαις.
  - La secuencia «persecuciones y aflicciones» mantiene la distinción léxica del original.
  - No se añade puntuación o expansión doctrinal fuera de lo requerido por el texto fuente.
