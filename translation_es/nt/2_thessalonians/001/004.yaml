- from: de modo que nosotros mismos nos jactamos de ustedes entre las iglesias de Dios por su perseverancia y fe[a] en todas sus persecuciones y aflicciones que están soportando.
  to: de modo que nosotros mismos hablamos con orgullo de ustedes entre las iglesias de Dios por su perseverancia y fe[a] en todas sus persecuciones y aflicciones que están soportando.
