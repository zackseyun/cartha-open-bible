  spanish_quality_summary: El español es claro y eclesialmente legible, pero puede alinearse mejor con la filosofía del proyecto y con la sintaxis griega. 'Jesús Mesías' suena marcado, pero es comprensible y preserva mejor la fuerza titular; en este saludo funciona mejor que la forma lexicalizada 'Jesucristo' dado el expediente doctrinal explícito. También conviene evitar añadir el segundo 'en'.
  glossary_alignment: 'Desalineación principal: Χριστός debe reflejarse como ''Mesías'' por defecto del proyecto y por la decisión teológica inglesa para este versículo; ''Jesucristo'' solo sería aceptable con carve-out documentado más fuerte, que aquí no supera la preferencia auditada. ''κύριος'' como ''Señor'' y ''θεός'' como ''Dios'' están bien. No hay tema de Yahvé en este texto.'
  issues:
