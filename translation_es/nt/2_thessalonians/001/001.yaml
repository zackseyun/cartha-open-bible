- from: 'Pablo, Silvano y Timoteo, a la iglesia de los tesalonicenses en Dios nuestro Padre y en el Señor Jesucristo[a]:'
  to: 'Pablo, Silvano y Timoteo, a la iglesia de los tesalonicenses en Dios nuestro Padre y el Señor Jesús Mesías[a]:'
