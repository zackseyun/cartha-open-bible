  text: Παῦλος καὶ Σιλουανὸς καὶ Τιμόθεος τῇ ἐκκλησίᾳ Θεσσαλονικέων ἐν θεῷ πατρὶ ἡμῶν καὶ κυρίῳ Ἰησοῦ Χριστῷ·
base_translation:
  language: en
  yaml_path: translation/nt/2_thessalonians/001/001.yaml
  text: 'Paul and Silvanus and Timothy[b][a], to the church of the Thessalonians in God our Father and the Lord Jesus Messiah:'
  footnotes:
  - marker: a
    text: Or 'Jesus Christ.' The Greek title Χριστός can be rendered 'Messiah' or, more traditionally, 'Christ.'
    reason: alternative_reading
  - marker: b
    text: Or 'the Lord Jesus the Messiah'.
    reason: previous_rendering
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4-2026-03-05
