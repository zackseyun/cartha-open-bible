    output_hash: ea97cfb056de6ab4aad013654479bf14ec1eb8ffd256f060480f5b34069e40d6
    temperature: 0.2
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T09:38:15Z'
    unchanged: false
    changes_summary: 'Changed ''Messiah'' to ''Christ'' for more natural formal register and consistency with standard rendering of Χριστῷ in this epistolary greeting; otherwise retained the draft. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: 'Pablo, Silvano y Timoteo, a la iglesia de los tesalonicenses en Dios nuestro Padre y el Señor Jesús Mesías[a]:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el Señor Jesucristo'. La forma tradicional española 'Jesucristo' lexicaliza el título Χριστός; aquí se traduce como 'Mesías' para conservar su fuerza titular más explícitamente.
    reason: alternative_reading
lexical_decisions:
- source_word: Παῦλος
  english_pob_choice: Paul
  chosen_spanish: Pablo
  alternatives_spanish:
  - Paulo
  lexicon: BDAG
  rationale: Nombre propio apostólico estándar en español; 'Pablo' es la forma natural y reconocible de Παῦλος.
- source_word: Σιλουανὸς
  english_pob_choice: Silvanus
  chosen_spanish: Silvano
  alternatives_spanish:
  - Silas
  lexicon: BDAG
  rationale: El griego aquí dice Σιλουανός; por eso se translitera como 'Silvano' y no se armoniza con la forma abreviada 'Silas' conocida de Hechos.
- source_word: Τιμόθεος
  english_pob_choice: Timothy
  chosen_spanish: Timoteo
  alternatives_spanish:
  - Timotéo
  lexicon: BDAG
  rationale: Nombre propio estándar en español; 'Timoteo' conserva la referencia personal sin calco innecesario.
- source_word: ἐκκλησίᾳ
  english_pob_choice: church
  chosen_spanish: iglesia
  alternatives_spanish:
  - asamblea
  lexicon: BDAG
  rationale: En el uso paulino, ἐκκλησία designa la comunidad cristiana reunida; 'iglesia' es el equivalente natural en español sin perder el sentido comunitario.
- source_word: Θεσσαλονικέων
  english_pob_choice: of the Thessalonians
  chosen_spanish: de los tesalonicenses
  alternatives_spanish:
  - en Tesalónica
  lexicon: BDAG
  rationale: El genitivo plural se refiere a las personas, no solo al lugar; 'de los tesalonicenses' sigue más de cerca la forma griega que una localización libre.
- source_word: θεῷ πατρὶ ἡμῶν
  english_pob_choice: God our Father
  chosen_spanish: Dios nuestro Padre
  alternatives_spanish:
  - Dios el Padre
  - Dios, nuestro Padre
  lexicon: BDAG
  rationale: La construcción con pronombre posesivo se expresa de forma natural en español como 'nuestro Padre', manteniendo el poseedor explícito de ἡμῶν.
- source_word: κυρίῳ
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: BDAG
  rationale: Para κύριος en referencia a Jesús, 'Señor' es el equivalente reverente y normal en español.
- source_word: Ἰησοῦ Χριστῷ
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesucristo
  alternatives_spanish:
  - Jesús Mesías
  - Jesús el Mesías
  lexicon: BDAG
  rationale: Aunque el POB inglés alterna entre 'Messiah' y 'Christ', en español la forma más natural y fiel al título ya fijado en el uso eclesial es 'Jesucristo', que mantiene unido el nombre y el título sin forzar una perífrasis poco idiomática en esta salutación.
theological_decisions:
- issue: Rendering of Χριστῷ in the title sequence Ἰησοῦ Χριστῷ
  english_pob_reading: Jesus Messiah / Jesus Christ
  chosen_spanish_reading: Jesucristo
  alternative_spanish_readings:
  - Jesús Mesías
  - Jesús el Mesías
  rationale: La política inglesa distingue entre título y nombre, pero en español esta salutación funciona mejor con la forma lexicalizada 'Jesucristo'. No se pretende negar el valor titular de Χριστός; simplemente se adopta la forma eclesial más natural para una fórmula epistolar fija.
  doctrine_reference: 'DOCTRINE.md: Translate titles; preserve naturalness when a title-name compound is lexicalized'
- issue: Relation expressed by ἐν θεῷ πατρὶ ἡμῶν καὶ κυρίῳ Ἰησοῦ Χριστῷ
  english_pob_reading: in God our Father and the Lord Jesus Messiah
  chosen_spanish_reading: en Dios nuestro Padre y en el Señor Jesucristo
  alternative_spanish_readings:
  - en unión con Dios nuestro Padre y con el Señor Jesucristo
  - perteneciente a Dios nuestro Padre y al Señor Jesucristo
  rationale: Se conserva la preposición 'en' para no resolver de más la relación teológica condensada del saludo paulino. En español puede sonar elíptico, pero preserva la misma tensión de esfera, unión o fundamento que el griego permite.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El audit trail inglés revisó varias veces la traducción de Χριστῷ entre 'Messiah' y 'Christ'; para español se optó por 'Jesucristo' como forma natural y eclesialmente transparente, manteniendo al mismo tiempo la lectura titulada del término. También se respetó la decisión de no expandir ἐν más allá de 'en'.
  spanish_consistency_notes:
  - Se usó 'Pablo', 'Silvano' y 'Timoteo' como nombres propios estándar en español.
  - '''iglesia'' refleja ἐκκλησίᾳ en sentido paulino comunitario.'
  - '''Señor'' mantiene la convención reverente para κύριος.'
  - La forma 'Jesucristo' evita una repetición poco natural en la línea de saludo, pero el pie [a] deja constancia de la alternativa titulada 'Jesús Mesías'.
