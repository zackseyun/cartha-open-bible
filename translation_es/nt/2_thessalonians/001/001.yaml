    rationale: El griego tiene un solo ἐν antes de 'θεῷ πατρὶ ἡμῶν καὶ κυρίῳ Ἰησοῦ Χριστῷ'. Repetir la preposición en español interpreta o reestructura levemente la sintaxis en lugar de conservar la compresión del original y del POB inglés.
  - severity: medium
    issue: '''Jesucristo'' sustituye la preferencia del proyecto por ''Mesías'' para Χριστός en este contexto.'
    rationale: El expediente inglés y la política doctrinal para este pasaje favorecen explícitamente 'Messiah'. En español, aunque 'Jesucristo' es muy natural, aquí conviene preservar la fuerza titular con 'Jesús Mesías' y dejar 'Jesucristo' como alternativa en nota.
