translation:
  language: es
  text: Siempre debemos dar gracias a Dios por ustedes, hermanos[a], como conviene, porque su fe[b] va creciendo abundantemente y el amor de todos y cada uno de ustedes[c] unos a otros aumenta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hermanos y hermanas»; el griego dice «hermanos» y puede dirigirse inclusivamente a toda la comunidad creyente.
    reason: lexical_alternative
  - marker: b
    text: O «su fidelidad va creciendo abundantemente»; la palabra griega puede denotar «fe», «confianza» o «fidelidad», aunque aquí «fe» es la traducción base.
    reason: alternative_reading
  - marker: c
    text: O «de cada uno de todos ustedes».
    reason: previous_rendering
lexical_decisions:
- source_word: Εὐχαριστεῖν
  english_pob_choice: to give thanks
  chosen_spanish: dar gracias
  alternatives_spanish:
  - agradecer
  - ser agradecidos
  lexicon: BDAG
  rationale: El infinitivo con ὀφείλομεν expresa obligación; en español, «dar gracias» conserva la fuerza verbal y suena natural en una fórmula de acción de gracias.
- source_word: ὀφείλομεν
  english_pob_choice: we ought
  chosen_spanish: debemos
  alternatives_spanish:
  - estamos obligados a
  - tenemos que
  lexicon: BDAG
  rationale: «Debemos» comunica deber/procedencia moral sin volver la frase excesivamente rígida; corresponde bien al tono pastoral de la oración.
- source_word: πάντοτε
  english_pob_choice: always
  chosen_spanish: siempre
  alternatives_spanish:
  - constantemente
  - sin cesar
  lexicon: BDAG
  rationale: «Siempre» es el equivalente temporal natural en español y preserva la idea de continuidad.
- source_word: περὶ ὑμῶν
  english_pob_choice: for you
  chosen_spanish: por ustedes
  alternatives_spanish:
  - acerca de ustedes
  - sobre ustedes
  lexicon: BDAG
  rationale: En fórmulas de agradecimiento, περί con personas se expresa mejor en español con «por» que con una construcción más literal como «acerca de».
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - hermanos en la fe
  lexicon: BDAG
  rationale: Se conserva el vocativo masculino plural como en el griego, con una palabra natural y eclesial en español. El sentido inclusivo puede señalarse en nota sin sustituir el término del texto.
- source_word: καθὼς ἄξιόν ἐστιν
  english_pob_choice: as is fitting
  chosen_spanish: como es digno
  alternatives_spanish:
  - como conviene
  - como es apropiado
  lexicon: BDAG
  rationale: «Digno» recoge la idea de conveniencia/procedencia moral de ἄξιος. Aunque «conviene» también es posible, «como es digno» mantiene mejor el tono de lo debido ante Dios.
- source_word: ὑπεραυξάνει
  english_pob_choice: is growing abundantly
  chosen_spanish: va creciendo abundantemente
  alternatives_spanish:
  - crece sobremanera
  - crece en gran manera
  lexicon: BDAG
  rationale: El compuesto intensifica el crecimiento; «va creciendo abundantemente» conserva el progreso continuo y la intensificación sin sonar forzado en español.
- source_word: ἡ πίστις
  english_pob_choice: faith
  chosen_spanish: su fe
  alternatives_spanish:
  - su fidelidad
  - su confianza
  lexicon: BDAG
  rationale: «Fe» es la traducción por defecto y la más natural aquí. Mantiene la referencia a la fe de los creyentes, mientras que la posible nuance de fidelidad queda preservada en nota.
- source_word: πλεονάζει
  english_pob_choice: is increasing
  chosen_spanish: aumenta
  alternatives_spanish:
  - se acrecienta
  - va en aumento
  lexicon: BDAG
  rationale: «Aumenta» es claro y fiel al incremento continuo; emparejado con «va creciendo abundantemente» reproduce la doble progresión del griego.
- source_word: ἡ ἀγάπη
  english_pob_choice: love
  chosen_spanish: el amor
  alternatives_spanish:
  - la caridad
  lexicon: BDAG
  rationale: En español contemporáneo, «amor» es la equivalencia directa y más natural para ἀγάπη en este contexto de amor fraternal.
- source_word: ἑνὸς ἑκάστου πάντων ὑμῶν
  english_pob_choice: each and every one of you
  chosen_spanish: de cada uno de todos ustedes
  alternatives_spanish:
  - de cada uno de ustedes
  - de todos y cada uno de ustedes
  lexicon: BDAG
  rationale: La secuencia griega es enfática y redundante. «De cada uno de todos ustedes» conserva esa acumulación distributiva, aunque sea algo pesada, para no borrar el énfasis del original.
- source_word: εἰς ἀλλήλους
  english_pob_choice: for one another
  chosen_spanish: hacia los demás
  alternatives_spanish:
  - unos a otros
  - los unos para los otros
  lexicon: BDAG
  rationale: La preposición expresa dirección relacional. «Hacia los demás» comunica la orientación mutua del amor en un español claro, sin forzar una fórmula demasiado literal.
theological_decisions:
- issue: Alcance inclusivo de ἀδελφοί
  english_pob_reading: brothers; the Greek says 'brothers' and can address the whole believing community inclusively.
  chosen_spanish_reading: hermanos
  alternative_spanish_readings:
  - hermanos y hermanas
  - hermanos en la fe
  rationale: Se mantiene el vocativo masculino plural del griego y la práctica doctrinal de no neutralizar el término en el texto principal. La inclusión del conjunto de la comunidad puede explicarse en nota sin alterar la lectura base.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #4: gender-accurate over gender-neutral'
- issue: Rango semántico de πίστις
  english_pob_reading: faith; footnote alternative faithfulness
  chosen_spanish_reading: fe
  alternative_spanish_readings:
  - fidelidad
  - confianza
  rationale: El contexto habla de la fe de los tesalonicenses en aumento; «fe» es la lectura base. Aun así, la posible resonancia de «fidelidad» no se elimina y se conserva como alternativa interpretativa.
  doctrine_reference: 'DOCTRINE.md contested terms: πίστις → faith; preserve meaningful alternatives in notes'
translation_notes:
  revision_awareness: 'El audit trail en inglés mantiene la lectura base con πίστις = ''faith'' y la frase enfática ''each and every one of you''. La versión española conserva ambos énfasis: ''su fe'' y ''de cada uno de todos ustedes'', sin suavizar la redundancia griega. También refleja la revisión inglesa que moderniza la fluidez de la acumulación distributiva, pero en español se ha optado por una forma algo más literal para no perder el peso retórico del original.'
  spanish_consistency_notes:
  - Se mantiene 'Dios' para θεῷ y no se usa una máscara reverencial.
  - Se traduce πίστις por 'fe' en el texto principal, reservando 'fidelidad' como alternativa en nota.
  - Se conserva 'hermanos' en el texto principal por fidelidad al vocativo griego masculino plural, con nota sobre su uso inclusivo.
  - La redundancia de ἑνὸς ἑκάστου πάντων ὑμῶν se preserva de forma visible para no borrar el énfasis del original.
  - Se evita 'SEÑOR' porque no aparece κύριος en este versículo.
