review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: obligación de dar gracias, destinatario divino, vocativo «hermanos», causal con ὅτι, crecimiento intensificado de la fe y aumento del amor mutuo. Sin embargo, hay desajustes importantes en dos puntos: «como es digno» no expresa bien καθὼς ἄξιόν ἐστιν en español natural; «como conviene» o «como es apropiado» es más fiel al sentido de propiedad. Además, los anclajes de notas b/c están intercambiados respecto del inglés auditado: la nota sobre πίστις debe ir con «fe», mientras que la nota sobre la frase distributiva debe ir con «cada uno».'
  spanish_quality_summary: 'El español es en general claro y eclesial, pero presenta giros poco naturales: «como es digno» suena calcado y puede malentenderse como dignidad intrínseca, no conveniencia. «de cada uno de todos ustedes» también suena torpe; «de todos y cada uno de ustedes» conserva el énfasis y mejora la legibilidad. «hacia los demás» es entendible, pero «unos a otros» corresponde mejor a εἰς ἀλλήλους y es más idiomático en contexto eclesial.'
  glossary_alignment: 'La terminología principal está alineada: θεῷ → «Dios», ἀδελφοί → «hermanos» con nota inclusiva, πίστις → «fe» con alternativa «fidelidad». No hay términos del glosario mayor en conflicto. El principal ajuste lexical es καθὼς ἄξιόν ἐστιν → «como conviene».'
  issues:
  - severity: medium
    issue: «como es digno» para καθὼς ἄξιόν ἐστιν
    rationale: En español moderno no es la forma más natural para expresar propiedad o conveniencia; puede sonar ambiguo o calcado. «Como conviene» preserva mejor el sentido documentado en el POB audit trail ('as is fitting').
  - severity: medium
    issue: Anclajes de notas b/c mal ubicados
    rationale: La nota sobre πίστις/fidelidad debe anclarse en «fe», no en la frase distributiva. La nota sobre «of each one of all of you» debe anclarse en la expresión «todos y cada uno de ustedes». Mantener la correspondencia exacta mejora trazabilidad con la auditoría inglesa.
  - severity: low
    issue: «de cada uno de todos ustedes» suena pesado en español
    rationale: Aunque intenta conservar la redundancia griega, resulta poco idiomático. «de todos y cada uno de ustedes» retiene el énfasis distributivo con mejor fluidez.
  - severity: low
    issue: «hacia los demás» para εἰς ἀλλήλους
    rationale: Es comprensible, pero pierde la mutualidad explícita de «unos a otros» y suena menos directo que la expresión idiomática española habitual.
