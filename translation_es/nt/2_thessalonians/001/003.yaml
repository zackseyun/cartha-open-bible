revisions:
- from: Siempre debemos dar gracias a Dios por ustedes[a], hermanos, como es digno, porque su fe va creciendo abundantemente y el amor de cada uno de todos ustedes[b] hacia los demás[c] aumenta.
  to: Siempre debemos dar gracias a Dios por ustedes, hermanos[a], como conviene, porque su fe[b] va creciendo abundantemente y el amor de todos y cada uno de ustedes[c] unos a otros aumenta.
  rationale: Se corrige «como es digno» a «como conviene» para reflejar con naturalidad el sentido de propiedad de καθὼς ἄξιόν ἐστιν. Se mejora la frase distributiva con «de todos y cada uno de ustedes», que conserva el énfasis del griego sin sonar forzada. Se cambia «hacia los demás» a «unos a otros» para expresar mejor la mutualidad de εἰς ἀλλήλους. También se reubican las notas para que coincidan con las decisiones léxicas auditadas en inglés.
  reviewer_model: gpt-5.4
