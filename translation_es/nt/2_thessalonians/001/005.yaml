translation:
  language: es
  text: Esto es evidencia[a] del juicio justo de Dios, para que se les considere dignos[b] del reino de Dios, por el cual también sufren[c],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como «prueba», «indicio» o «señal» del juicio justo de Dios.
    reason: lexical_alternative
  - marker: b
    text: 'También: «para que sean tenidos por dignos» o «como resultado de que se les considere dignos». La construcción griega puede expresar propósito o resultado.'
    reason: alternative_reading
  - marker: c
    text: 'También: «por causa del cual» o «en favor del cual».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔνδειγμα
  english_pob_choice: evidence
  chosen_spanish: evidencia
  alternatives_spanish:
  - prueba
  - indicio
  - señal
  lexicon: BDAG
  rationale: ἔνδειγμα designa algo que demuestra o señala una realidad. «Evidencia» es natural en español y conserva la fuerza inferencial sin volverla un «prueba» más tajante de lo que exige el contexto. Mantiene el carácter demostrativo del enunciado dependiente de la frase anterior.
- source_word: δικαίας κρίσεως
  english_pob_choice: righteous judgment
  chosen_spanish: juicio justo
  alternatives_spanish:
  - juicio recto
  - justo juicio
  lexicon: BDAG
  rationale: La combinación adjetivo-sustantivo se vierte de forma directa. «Juicio justo» preserva la cualidad moral del juicio de Dios y suena natural y bíblico en español; «recto» sería posible, pero aquí «justo» comunica mejor la carga teológica de δίκαιος.
- source_word: εἰς τὸ καταξιωθῆναι
  english_pob_choice: so that you may be counted worthy
  chosen_spanish: para que se les considere dignos
  alternatives_spanish:
  - para que sean tenidos por dignos
  - con el resultado de que se les considere dignos
  lexicon: BDAG
  rationale: La preposición con infinitivo articular expresa finalidad o resultado. En español, «para que» comunica bien ese avance. καταξιόω en pasivo significa «considerar/contar digno», no hacer inherentemente digno; por eso se evita una formulación que sugiera mérito propio.
- source_word: βασιλείας τοῦ θεοῦ
  english_pob_choice: the kingdom of God
  chosen_spanish: el reino de Dios
  alternatives_spanish:
  - el reino de Dios
  lexicon: BDAG
  rationale: Es el equivalente estándar y transparente de la frase. Conserva la expresión bíblica familiar y su peso teológico sin necesidad de variar el sintagma.
- source_word: ὑπὲρ ἧς
  english_pob_choice: for which
  chosen_spanish: por el cual
  alternatives_spanish:
  - por causa del cual
  - por el cual también
  lexicon: BDAG
  rationale: ὑπέρ con genitivo puede significar «por causa de», «a favor de» o «por el bien de». Aquí vincula el sufrimiento con el reino; «por el cual» es idiomático y preserva ese sentido benefactivo/causal.
- source_word: καὶ πάσχετε
  english_pob_choice: you are also suffering
  chosen_spanish: también sufren
  alternatives_spanish:
  - también padecen
  - están sufriendo también
  lexicon: BDAG
  rationale: El presente se vierte con una forma natural en español que refleje la acción continua en el contexto de persecución. «Sufren» mantiene la realidad del padecimiento y evita una expresión demasiado literal o pesada.
theological_decisions:
- issue: Relación entre el sufrimiento y la dignidad para el reino
  english_pob_reading: Their suffering serves as evidence within God's righteous judgment, with the purpose/result that they are counted worthy of the kingdom; it does not teach that suffering merits entry into the kingdom.
  chosen_spanish_reading: Su sufrimiento funciona como evidencia dentro del juicio justo de Dios, con el propósito o resultado de que se les considere dignos del reino; no enseña que el sufrimiento merezca la entrada al reino.
  alternative_spanish_readings:
  - Su sufrimiento les gana la dignidad para el reino.
  - Su sufrimiento produce por mérito su entrada al reino.
  rationale: El pasivo καταξιωθῆναι expresa ser considerados dignos, no adquirir dignidad por mérito. La sintaxis relaciona el sufrimiento con el juicio justo de Dios, no con una obra meritoria. Así se conserva la tensión teológica del texto sin introducir doctrina de mérito.
  doctrine_reference: Translation philosophy §3; orthodox historic Christian teaching
translation_notes:
  revision_awareness: Alineado con el último pase de revisión, que no requirió cambios y mostró alto acuerdo entre revisores. Se mantuvo la lectura de ἔνδειγμα como evidencia, el valor final o resultativo de εἰς τὸ καταξιωθῆναι, y el sentido benefactivo/causal de ὑπὲρ ἧς.
  spanish_consistency_notes:
  - Se usa «Dios» para θεοῦ, manteniendo el referente divino sin ocultarlo.
  - Se evita «Cristo» porque no aparece en este versículo ni en el paquete fuente.
  - «Juicio justo» conserva la fuerza moral de δικαίας sin volverla una formulación rígida.
  - La voz pasiva «se les considere dignos» preserva que la dignidad es atribuida, no autoproducida.
  - Se mantuvo el estilo bíblico claro y digno, sin calco excesivo del inglés.
