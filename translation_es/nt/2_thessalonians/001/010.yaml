review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura principal del griego: la venida futura, los dos infinitivos pasivos paralelos (''ser glorificado'' / ''ser admirado''), la referencia a ''sus santos'' y la cláusula causal con la repetición de πιστεύω. Sin embargo, ''acerca de ustedes'' no refleja bien ἐφ’ ὑμᾶς en este contexto, donde el sentido documentado y más natural es direccional/comunicativo: ''a ustedes''. Además, ''fue creído nuestro testimonio'' es comprensible pero poco natural en español; conviene mantener la familia léxica de ''creer'' con una forma pasiva más idiomática.'
  spanish_quality_summary: 'El texto es generalmente claro y digno, pero presenta dos tropiezos de naturalidad: ''fue creído nuestro testimonio acerca de ustedes'' suena forzado, y ''acerca de ustedes'' puede sugerir contenido sobre ellos en vez de testimonio dirigido a ellos. ''En aquel día'' es aceptable, aunque ''en ese día'' sería menos idiomático; no requiere cambio. ''Ser admirado'' es una solución válida, aunque algo más débil que ''ser objeto de asombro/admiración''; no es un error.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. 'Santos' para ἅγιοι y la nota sobre 'en/entre' están bien alineadas con el rastro POB. La repetición de πιστεύω debe preservarse mejor en español, idealmente con 'han creído' / 'fue creído por ustedes' o equivalente que mantenga la conexión léxica sin sacrificar naturalidad.
  issues:
  - severity: high
    issue: '''acerca de ustedes'' para ἐφ’ ὑμᾶς distorsiona el sentido contextual'
    rationale: El expediente inglés documenta correctamente el valor más probable como 'to you', es decir, testimonio dirigido a los tesalonicenses. 'Acerca de ustedes' cambia el foco a un testimonio sobre ellos, algo menos probable en contexto.
  - severity: medium
    issue: '''fue creído nuestro testimonio'' es gramatical pero poco idiomático'
    rationale: Aunque formalmente refleja el pasivo ἐπιστεύθη, en español bíblico-natural suena más claro 'nuestro testimonio fue creído por ustedes', que además explicita la relación con ἐφ’ ὑμᾶς sin perder la familia léxica de 'creer'.
  revised_spanish_text: en aquel día, cuando venga para ser glorificado entre sus santos[a] y ser admirado entre todos los que han creído, porque nuestro testimonio a ustedes fue creído por ustedes.
  revised_footnotes:
  - marker: a
    text: O «en sus santos». La preposición griega puede sugerir tanto que él es glorificado entre su pueblo santo como que su gloria se manifiesta en ellos.
    reason: lexical_alternative
  revision_rationale: Se corrige ἐφ’ ὑμᾶς de 'acerca de ustedes' a 'a ustedes' para reflejar el sentido direccional/comunicativo documentado en el expediente fuente. También se reordena la cláusula final a 'nuestro testimonio a ustedes fue creído por ustedes' para mantener la conexión léxica con πιστεύω y sonar más natural en español. Se conserva la nota sobre 'en/entre sus santos' porque preserva una ambigüedad significativa del griego.
