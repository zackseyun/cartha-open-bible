revisions:
- from: en aquel día, cuando venga para ser glorificado entre sus santos[a] y ser admirado entre todos los que han creído, porque fue creído nuestro testimonio acerca de ustedes.
  to: en aquel día, cuando venga para ser glorificado entre sus santos[a] y ser admirado entre todos los que han creído, porque nuestro testimonio a ustedes fue creído por ustedes.
  rationale: Se corrige ἐφ’ ὑμᾶς de 'acerca de ustedes' a 'a ustedes' para reflejar el sentido direccional/comunicativo documentado en el expediente fuente. También se reordena la cláusula final a 'nuestro testimonio a ustedes fue creído por ustedes' para mantener la conexión léxica con πιστεύω y sonar más natural en español. Se conserva la nota sobre 'en/entre sus santos' porque preserva una ambigüedad significativa del griego.
