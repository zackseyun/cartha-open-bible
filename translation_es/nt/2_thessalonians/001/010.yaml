translation:
  language: es
  text: en aquel día, cuando venga para ser glorificado entre sus santos[a] y ser admirado entre todos los que han creído, porque nuestro testimonio a ustedes fue creído por ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en sus santos». La preposición griega puede sugerir tanto que él es glorificado entre su pueblo santo como que su gloria se manifiesta en ellos.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅταν ἔλθῃ
  english_pob_choice: when he comes
  chosen_spanish: cuando venga
  alternatives_spanish:
  - cuando él venga
  - cuando haya venido
  lexicon: BDAG
  rationale: ὅταν con el aoristo subjuntivo marca una referencia futura definida. En español, «cuando venga» comunica naturalmente esa llegada futura sin recurrir a una forma pesada o arcaizante.
- source_word: ἐνδοξασθῆναι
  english_pob_choice: to be glorified
  chosen_spanish: ser glorificado
  alternatives_spanish:
  - ser mostrado en gloria
  - ser honrado
  lexicon: BDAG
  rationale: 'El infinitivo pasivo expresa propósito: que venga para ser glorificado. «Ser glorificado» preserva mejor el sentido de gloria divina que «ser honrado».'
- source_word: ἐν τοῖς ἁγίοις αὐτοῦ
  english_pob_choice: among his saints
  chosen_spanish: entre sus santos
  alternatives_spanish:
  - en sus santos
  - entre sus santos
  lexicon: BDAG
  rationale: ἐν admite tanto «en» como «entre» aquí. «Entre» suena más natural en español y conserva el matiz comunitario, sin excluir la posible idea de gloria manifestada en ellos. Se mantiene «santos» como equivalente usual de ἅγιοι en este contexto.
- source_word: θαυμασθῆναι
  english_pob_choice: to be marveled at
  chosen_spanish: ser admirado
  alternatives_spanish:
  - ser objeto de admiración
  - ser maravillado
  lexicon: BDAG
  rationale: El paralelo con ἐνδοξασθῆναι pide una construcción semejante. «Ser admirado» transmite bien la admiración asombrada sin volverlo meramente aprobación superficial. En español, «maravillado» resultaría menos natural con esta voz pasiva.
- source_word: ἐν πᾶσιν τοῖς πιστεύσασιν
  english_pob_choice: among all who have believed
  chosen_spanish: entre todos los que han creído
  alternatives_spanish:
  - en todos los que han creído
  - entre todos los creyentes
  lexicon: BDAG
  rationale: 'El participio preserva el valor verbal: «los que han creído» es más fiel que el sustantivo «creyentes». «Entre» mantiene el paralelismo con la primera frase preposicional.'
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - que
  lexicon: BDAG
  rationale: Aquí introduce la razón por la cual los tesalonicenses están incluidos entre los que han creído. «Porque» expresa con claridad la relación causal en español actual.
- source_word: ἐπιστεύθη
  english_pob_choice: was believed
  chosen_spanish: fue creído
  alternatives_spanish:
  - fue recibido con fe
  - fue aceptado
  lexicon: BDAG
  rationale: El pasivo de πιστεύω con τὸ μαρτύριον como sujeto significa que el testimonio fue creído. «Fue creído» conserva la relación léxica directa con πιστεύσασιν.
- source_word: τὸ μαρτύριον ἡμῶν
  english_pob_choice: our testimony
  chosen_spanish: nuestro testimonio
  alternatives_spanish:
  - nuestro testimonio apostólico
  - nuestro testimonio
  lexicon: BDAG
  rationale: μαρτύριον aquí es testimonio/proclamación apostólica. «Nuestro testimonio» es la expresión más concisa e idiomática en español, y preserva la fuerza de testimonio como evidencia declarada.
- source_word: ἐφ’ ὑμᾶς
  english_pob_choice: to you
  chosen_spanish: acerca de ustedes
  alternatives_spanish:
  - para ustedes
  - sobre ustedes
  lexicon: BDAG
  rationale: Aunque la frase puede entenderse como dirigida a ellos, el valor de ἐπί con acusativo permite una referencia que apunta hacia ellos. «Acerca de ustedes» hace explícita la relación de contenido/alcance del testimonio sin perder la idea de que les fue comunicado. Se evita sobreinterpretar la preposición como mera dirección si el contexto enfatiza el contenido del testimonio.
- source_word: ἐν τῇ ἡμέρᾳ ἐκείνῃ
  english_pob_choice: on that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - en ese día
  - en aquel día
  lexicon: BDAG
  rationale: Es una expresión temporal escatológica fija. «En aquel día» suena solemne y natural en español bíblico contemporáneo.
theological_decisions:
- issue: Referencia y matiz de «sus santos» en un contexto escatológico
  english_pob_reading: Rendered as 'his saints' referring to Christ's holy people, with the preposition expressed as 'among' rather than 'in.'
  chosen_spanish_reading: «entre sus santos» como referencia a su pueblo santo, con la preposición expresada de manera comunitaria, no interiorista.
  alternative_spanish_readings:
  - en sus santos
  - en medio de sus santos
  - entre sus santos
  rationale: El contexto inmediato vincula a los 'santos' con 'todos los que han creído', lo que favorece a los creyentes como referente. «Entre» evita cerrar la posible tensión entre la manifestación pública de su gloria y una posible idea de gloria mostrada en ellos. Se preserva así la ambigüedad lexical sin resolverla artificialmente.
  doctrine_reference: Preservar la tensión teológica y lexical; no forzar una sola lectura de la preposición ἐν.
- issue: Relación entre «creyeron» y «fue creído nuestro testimonio»
  english_pob_reading: Translated with the ordinary sense of believing the apostolic testimony.
  chosen_spanish_reading: 'Dos ocurrencias de πιστεύω mantenidas con el mismo núcleo léxico: «han creído» / «fue creído».'
  alternative_spanish_readings:
  - han creído / fue recibido con fe
  - creyeron / aceptaron nuestro testimonio
  rationale: La repetición de la familia πιστεύω en ambos miembros del verso es significativa. Conservarla en español mantiene la conexión entre la fe de los creyentes y la credibilidad del testimonio apostólico, sin introducir una paráfrasis doctrinalmente cargada.
  doctrine_reference: 'Contested terms table: πιστεύω se vierte con lenguaje de creer/fe según el contexto, preservando la relación entre fe y testimonio.'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego y el trazado de decisiones del POB en inglés: se reubicó la frase temporal para que el español fluya con naturalidad, se mantuvo el paralelismo entre los dos infinitivos pasivos, y se conservó la repetición de πιστεύω. También se respetó la alternativa lexical documentada para ἐν τοῖς ἁγίοις αὐτοῦ mediante una nota.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - Se mantiene «santos» para ἅγιοι por coherencia paulina y porque es inteligible en español eclesial amplio.
  - «Fue creído» conserva la voz pasiva y la vinculación con «han creído», evitando un giro más libre como «fue aceptado».
  - Se prefirió «entre» para ἐν en las dos frases paralelas a fin de conservar el paralelismo retórico del griego sin sonar rígido en español.
