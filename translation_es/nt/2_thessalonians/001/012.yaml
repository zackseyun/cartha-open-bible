    changes_summary: 'Revised the final clause to more directly reflect the Greek: added ''the'' before ''Lord Jesus Christ'' and rendered Χριστοῦ as ''Christ'' rather than ''the Messiah'' for formal consistency in this epistolary context. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: para que el nombre de nuestro Señor Jesús sea glorificado en ustedes[a], y ustedes en él, conforme a la gracia de nuestro Dios y Señor Jesús Mesías[b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entre ustedes» para ἐν ὑμῖν. La preposición griega puede llevar cualquiera de esos matices según el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «Cristo» en lugar de «Mesías». Χριστός es el título griego que subyace aquí.
    reason: alternative_reading
  - marker: c
    text: La frase final puede entenderse como una unión estrecha de «nuestro Dios y Señor Jesús Mesías», o como la referencia a dos sujetos distintos. La traducción conserva la forma del griego sin forzar la decisión.
    reason: theological_note
lexical_decisions:
- source_word: ὅπως
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  lexicon: BDAG
  rationale: Introduce la finalidad del contenido precedente. En español, «para que» expresa con naturalidad el valor telico sin añadir explicaciones.
- source_word: ἐνδοξασθῇ
  english_pob_choice: may be glorified
  chosen_spanish: sea glorificado
  alternatives_spanish:
  - sea honrado
  - sea hecho glorioso
  lexicon: BDAG
  rationale: El pasivo mantiene la forma del griego y la carga de la raíz de gloria. «Sea glorificado» conserva mejor el valor teológico que una paráfrasis más débil.
- source_word: τὸ ὄνομα
  english_pob_choice: the name
  chosen_spanish: el nombre
  alternatives_spanish:
  - su nombre
  lexicon: BDAG
  rationale: Se conserva literalmente porque «nombre» funciona aquí como metonimia de la persona y su reputación revelada; no conviene explicitar más de lo que el texto dice.
- source_word: τοῦ κυρίου ἡμῶν Ἰησοῦ
  english_pob_choice: of our Lord Jesus
  chosen_spanish: de nuestro Señor Jesús
  alternatives_spanish:
  - de Jesús, nuestro Señor
  lexicon: BDAG
  rationale: «Señor» es el equivalente habitual de κύριος en este contexto, y el orden mantiene la relación de posesión/título con naturalidad en español.
- source_word: ἐν ὑμῖν
  english_pob_choice: in you
  chosen_spanish: en ustedes
  alternatives_spanish:
  - entre ustedes
  - en medio de ustedes
  lexicon: BDAG
  rationale: El griego permite el matiz de «en» o «entre». Se eligió «en ustedes» por fidelidad formal al sintagma y porque preserva la posibilidad de una gloria manifestada en la comunidad.
- source_word: καὶ ὑμεῖς ἐν αὐτῷ
  english_pob_choice: and you in him
  chosen_spanish: y ustedes en él
  alternatives_spanish:
  - y ustedes en él mismo
  - y ustedes por él
  lexicon: BDAG
  rationale: 'Se conserva el paralelismo: el nombre del Señor es glorificado en los creyentes, y ellos en él. El pronombre masculino se entiende naturalmente como referido a Jesús.'
- source_word: κατὰ τὴν χάριν
  english_pob_choice: according to the grace
  chosen_spanish: conforme a la gracia
  alternatives_spanish:
  - según la gracia
  - de acuerdo con la gracia
  lexicon: BDAG
  rationale: κατά con acusativo expresa norma o base. «Conforme a» transmite bien esa relación sin cargarla de instrumentalidad que el texto no obliga a asumir.
- source_word: χάριν
  english_pob_choice: grace
  chosen_spanish: gracia
  alternatives_spanish:
  - favor
  lexicon: BDAG
  rationale: «Gracia» es el equivalente asentado y teológicamente apropiado en el uso paulino.
- source_word: τοῦ θεοῦ ἡμῶν καὶ κυρίου Ἰησοῦ Χριστοῦ
  english_pob_choice: of our God and Lord Jesus Messiah
  chosen_spanish: de nuestro Dios y del Señor Jesús Mesías
  alternatives_spanish:
  - de nuestro Dios y del Señor Jesús Cristo
  - de nuestro Dios y del Señor Jesús
  lexicon: BDAG
  rationale: Se traduce Χριστοῦ como «Mesías» de acuerdo con la norma del proyecto cuando el término funciona como título. Se mantiene la construcción compacta del griego sin forzar una aclaración sintáctica que cierre la relación entre «Dios» y «Señor Jesús Mesías».
theological_decisions:
- issue: Renderización de Χριστοῦ
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: La guía doctrinal del proyecto favorece «Mesías» cuando Χριστός funciona como título. Aquí se preserva su valor semántico sin convertirlo en un nombre litúrgico fijo.
  doctrine_reference: 'DOCTRINE.md: Χριστός → Mesías cuando funciona como título'
- issue: Referente de αὐτῷ
  english_pob_reading: him (the Lord Jesus)
  chosen_spanish_reading: él (el Señor Jesús)
  alternative_spanish_readings:
  - ello (el nombre)
  rationale: El pronombre masculino y el paralelismo recíproco favorecen referirlo a Jesús. Aun así, se mantiene la tensión documentada sin reescribir el texto para resolverla de modo artificial.
  doctrine_reference: Preservar la tensión textual y la referencia probable sin borrar la ambigüedad documentada
- issue: Relación final entre «Dios» y «Señor Jesús Mesías»
  english_pob_reading: 'a closely linked expression: ''our God and Lord Jesus Messiah'''
  chosen_spanish_reading: 'una expresión estrechamente vinculada: «nuestro Dios y del Señor Jesús Mesías»'
  alternative_spanish_readings:
  - 'dos referentes distintos: «nuestro Dios» y «del Señor Jesús Mesías»'
  rationale: El griego presenta una construcción compacta que puede leerse como una unión estrecha de los referidos o como dos referentes coordinados. La traducción española conserva la misma compacidad sin añadir aclaraciones que inclinen indebidamente la interpretación.
  doctrine_reference: Mantener la tensión teológica y sintáctica del original
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el historial de revisión del inglés POB: la línea final fue reajustada en el audit trail para reflejar más de cerca la sintaxis griega y luego se restauró «Messiah» según la política doctrinal. En español se siguió esa restauración y se mantuvo la compactación final del genitivo para no resolver la tensión interpretativa.'
  spanish_consistency_notes:
  - Se usa «Señor» para κύριος conforme al patrón del proyecto.
  - Se usa «Mesías» para Χριστός cuando actúa como título, no como nombre fijo.
  - Se conserva «gracia» para χάρις.
  - Se mantiene el paralelismo sintáctico «en ustedes / en él».
  - Se evita introducir «SEÑOR» como sustituto de Yahvé porque el texto aquí contiene κύριος referido a Jesús, no al nombre divino en una cita del AT.
