id: 2TH.1.12
reference: 2 Thessalonians 1:12
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: SBLGNT
  text: ὅπως ἐνδοξασθῇ τὸ ὄνομα τοῦ κυρίου ἡμῶν Ἰησοῦ ἐν ὑμῖν, καὶ ὑμεῖς ἐν αὐτῷ, κατὰ τὴν χάριν τοῦ θεοῦ ἡμῶν καὶ κυρίου Ἰησοῦ Χριστοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/2_thessalonians/001/012.yaml
  text: so that the name of our Lord Jesus may be glorified in you[a], and you in him[c][b], according to the grace of our God and the Lord Jesus Messiah.
  footnotes:
  - marker: a
    text: Or 'among you' for 'in you.' The Greek preposition can carry either nuance in context.
    reason: lexical_alternative
  - marker: b
    text: Or 'Christ' instead of 'Messiah.' The Greek title is Χριστός.
    reason: alternative_reading
  - marker: c
    text: The final phrase may be understood either as closely linking 'God' and 'Lord Jesus Messiah' in one expression, or as referring distinctly to 'our God' and 'the Lord Jesus Messiah.' The translation preserves the Greek wording without forcing the question.
    reason: alternative_reading
