review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: destinatarios afligidos, promesa de alivio compartido con Pablo y sus compañeros, momento escatológico de la revelación del Señor Jesús desde el cielo, y compañía angelical poderosa. Sin embargo, la nota al pie actual no preserva una alternativa real, porque repite exactamente la misma expresión ya puesta en el texto principal. Además, en español ''en la revelación'' suena menos natural para el valor temporal de ἐν τῇ ἀποκαλύψει que ''en la manifestación'', que mantiene la nominalización y comunica mejor el evento de revelación de una persona.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero requiere un ajuste menor para naturalidad y consistencia editorial. 'Los que están siendo afligidos' es fiel aunque algo pesado; puede mantenerse. 'Alivio con nosotros' funciona. 'En la revelación del Señor Jesús' es comprensible, pero 'en la manifestación del Señor Jesús' suena más natural en español bíblico moderno sin perder cercanía semántica. La nota debe corregirse porque actualmente es redundante y confusa.
  glossary_alignment: 'Se respetan bien los términos del proyecto: κύριος como ''Señor'', Ἰησοῦς como ''Jesús'', y ἄνεσις como ''alivio''. La decisión idiomática para μετ’ ἀγγέλων δυνάμεως αὐτοῦ como ''con sus ángeles poderosos'' es válida en español. La excepción necesaria es la nota: si el texto principal mantiene la forma idiomática, la alternativa útil en nota debe ser la más literal, ''con los ángeles de su poder'', no la misma frase del texto.'
  issues:
  - severity: medium
    issue: La nota al pie repite exactamente la lectura del texto principal.
    rationale: 'El texto principal ya dice ''con sus ángeles poderosos'', pero la nota ofrece ''O, más idiomáticamente: «con sus ángeles poderosos»''. Esto no aporta ninguna alternativa lexical real y contradice la lógica documentada del expediente inglés.'
  - severity: low
    issue: '''En la revelación'' es menos natural en español para una persona que se manifiesta.'
    rationale: Aunque es defendible, 'manifestación' comunica de forma más natural en español el evento escatológico de ἀποκάλυψις referido al Señor Jesús, sin paraphrasear ni perder la forma nominal.
  revised_spanish_text: y a ustedes, los que están siendo afligidos, alivio con nosotros en la manifestación del Señor Jesús desde el cielo, con sus ángeles poderosos[a].
  revised_footnotes:
  - marker: a
    text: 'O, más literalmente: «con los ángeles de su poder».'
    reason: lexical_alternative
  revision_rationale: Se corrige la nota al pie para que preserve una alternativa significativa y no repita el texto principal. También se cambia 'revelación' por 'manifestación' para un español más natural en este contexto cristológico-escatológico, manteniendo la estructura nominal del griego y el sentido del English POB audit trail.
