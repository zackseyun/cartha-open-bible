translation:
  language: es
  text: y a ustedes, los que están siendo afligidos, alivio con nosotros en la manifestación del Señor Jesús desde el cielo, con sus ángeles poderosos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «con los ángeles de su poder».'
    reason: lexical_alternative
lexical_decisions:
- source_word: θλιβομένοις
  english_pob_choice: who are being afflicted
  chosen_spanish: los que están siendo afligidos
  alternatives_spanish:
  - los que sufren aflicción
  - los que están siendo oprimidos
  lexicon: BDAG
  rationale: El participio presente pasivo pide una forma que conserve el carácter de proceso actual y de recepción de la acción. "Están siendo afligidos" mantiene la pasividad y el sentido de presión o tribulación sin convertirlo en un estado genérico.
- source_word: ἄνεσιν
  english_pob_choice: relief
  chosen_spanish: alivio
  alternatives_spanish:
  - descanso
  - descanso y alivio
  - reposo
  lexicon: BDAG
  rationale: '"Alivio" comunica mejor la liberación de presión que el simple "descanso", y en español suena natural en contraste directo con la aflicción presente. Conserva el valor de cese o mitigación de la opresión.'
- source_word: μεθ’ ἡμῶν
  english_pob_choice: with us
  chosen_spanish: con nosotros
  alternatives_spanish:
  - junto con nosotros
  lexicon: BDAG
  rationale: La preposición con genitivo expresa asociación simple. "Con nosotros" es la forma natural en español y mantiene la inclusión de Pablo y sus compañeros en la misma esperanza de alivio.
- source_word: ἐν τῇ ἀποκαλύψει
  english_pob_choice: at the revelation
  chosen_spanish: en la revelación
  alternatives_spanish:
  - cuando se revele
  - en el momento de la revelación
  lexicon: BDAG
  rationale: Se preserva la construcción nominal de ἀποκάλυψις y su fuerza escatológica. En español, "en la revelación" comunica el marco temporal sin añadir una paráfrasis verbal que borre la forma del original.
- source_word: ἀποκαλύψει
  english_pob_choice: revelation
  chosen_spanish: revelación
  alternatives_spanish:
  - aparición
  - manifestación
  - desvelamiento
  lexicon: BDAG
  rationale: '"Revelación" es el equivalente más directo y ya carga en español el sentido de dar a conocer o manifestar algo oculto. Preserva el peso escatológico del sustantivo.'
- source_word: κυρίου Ἰησοῦ
  english_pob_choice: the Lord Jesus
  chosen_spanish: el Señor Jesús
  alternatives_spanish:
  - el Dueño Jesús
  lexicon: BDAG
  rationale: Se mantiene la terminología cristológica establecida para κύριος como título, y Jesús como nombre propio. No se sustituye por "SEÑOR" porque el proyecto español usa "Yahvé" para el nombre divino, y aquí κύριος funciona como título aplicado a Jesús.
- source_word: ἀπ’ οὐρανοῦ
  english_pob_choice: from heaven
  chosen_spanish: desde el cielo
  alternatives_spanish:
  - desde el cielo arriba
  - del cielo
  lexicon: BDAG
  rationale: '"Desde el cielo" es natural y fiel al origen o procedencia indicada por ἀπό. En español evita la rigidez de un calco y conserva el sentido direccional/originario.'
- source_word: μετ’ ἀγγέλων δυνάμεως αὐτοῦ
  english_pob_choice: with his mighty angels
  chosen_spanish: con sus ángeles poderosos
  alternatives_spanish:
  - con los ángeles de su poder
  - con sus ángeles de poder
  lexicon: BDAG
  rationale: La revisión inglesa optó por una forma idiomática que refleja el sentido cualitativo del genitivo. En español, "sus ángeles poderosos" expresa de forma natural ese valor idiomático y evita una estructura demasiado extraña como "los ángeles de su poder", aunque esa sigue siendo una alternativa literal posible.
theological_decisions:
- issue: Relación entre κύριος y el nombre divino en un contexto cristológico
  english_pob_reading: the Lord Jesus
  chosen_spanish_reading: el Señor Jesús
  alternative_spanish_readings:
  - Jesús, el Señor
  - el Dueño Jesús
  rationale: En este versículo κύριος no traduce directamente el nombre divino del Antiguo Testamento, sino un título cristológico. Mantener "Señor" preserva el valor confesional del título sin confundirlo con la convención de masking para יהוה.
  doctrine_reference: Translation philosophy §3; defaults on κύριος / YHWH
- issue: Valor temporal-escatológico de ἐν τῇ ἀποκαλύψει
  english_pob_reading: at the revelation
  chosen_spanish_reading: en la revelación
  alternative_spanish_readings:
  - cuando se revele
  - en el momento de la revelación
  rationale: La frase vincula el alivio prometido con el evento escatológico de la manifestación de Jesús. La forma nominal conserva la estructura y no borra la tensión entre evento y tiempo señalado.
  doctrine_reference: Translation philosophy §1, §6
- issue: Construcción genitiva final μετ’ ἀγγέλων δυνάμεως αὐτοῦ
  english_pob_reading: with his mighty angels
  chosen_spanish_reading: con sus ángeles poderosos
  alternative_spanish_readings:
  - con los ángeles de su poder
  - con sus ángeles de poder
  rationale: El griego es compactado y puede entenderse como un genitivo cualitativo. La formulación española elegida mantiene el sentido idiomático sin perder la referencia a la potencia asociada a esos ángeles.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: La edición inglesa revisó la cláusula final desde una forma más literal («the angels of his power») a una más idiomática («his mighty angels»). La versión española sigue esa revisión y adopta una solución natural que conserva la fuerza semántica del genitivo sin perder transparencia frente al griego.
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς y «Señor» para κύριος, de acuerdo con el uso cristológico del texto.
  - Se eligió «alivio» para ἄνεσις por su adecuación al contraste con la aflicción presente.
  - La nota al pie preserva la alternativa idiomática del tramo final, ya que el español admite más de una solución legítima para el genitivo cualitativo.
  - No se usa «SEÑOR» como convención tipográfica porque aquí no se trata del reemplazo del tetragrámaton, sino del título aplicado a Jesús.
