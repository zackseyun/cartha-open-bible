translation:
  language: es
  text: Estos sufrirán el castigo[a] de destrucción eterna, lejos de la presencia del Señor y de la gloria de su poder.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente, «destrucción que procede de la presencia del Señor y de la gloria de su poder». La preposición griega puede entenderse tanto como separación («lejos de») como procedencia/origen («de»).
    reason: alternative_reading
lexical_decisions:
- source_word: οἵτινες
  english_pob_choice: These
  chosen_spanish: Estos
  alternatives_spanish:
  - Aquellos
  - Esos
  lexicon: BDAG
  rationale: Retoma a los referidos en el contexto inmediato con una deixis natural en español. 'Estos' conserva el valor resumptivo sin añadir más contenido que el del antecedente.
- source_word: δίκην τίσουσιν
  english_pob_choice: will pay the penalty
  chosen_spanish: sufrirán el castigo
  alternatives_spanish:
  - pagarán la pena
  - pagarán el castigo
  lexicon: BDAG
  rationale: La locución expresa una pena judicial. 'Sufrirán el castigo' comunica con claridad el valor penal en español actual; 'pagarán la pena' es posible, pero menos natural en registro bíblico contemporáneo.
- source_word: ὄλεθρον
  english_pob_choice: destruction
  chosen_spanish: destrucción
  alternatives_spanish:
  - ruina
  - perdición
  lexicon: BDAG
  rationale: '''Destrucción'' es la equivalencia más directa y transparente en este contexto de juicio. Evita precisar indebidamente la naturaleza exacta del castigo.'
- source_word: αἰώνιον
  english_pob_choice: eternal
  chosen_spanish: eterna
  alternatives_spanish:
  - perpetua
  - de duración eterna
  lexicon: BDAG
  rationale: Mantiene el sentido escatológico de duración final y continua que el contexto demanda.
- source_word: ἀπὸ προσώπου τοῦ κυρίου
  english_pob_choice: away from the presence of the Lord
  chosen_spanish: lejos de la presencia del Señor
  alternatives_spanish:
  - apartados de la presencia del Señor
  - fuera de la presencia del Señor
  lexicon: BDAG
  rationale: ἀπό admite separación, y πρόσωπον se traduce idiomáticamente como 'presencia'. 'Lejos de' conserva la idea de exclusión sin sonar forzado. 'Señor' sigue la convención para κύριος en este texto, donde el referente es inequívocamente divino.
- source_word: τῆς δόξης τῆς ἰσχύος αὐτοῦ
  english_pob_choice: the glory of his might
  chosen_spanish: la gloria de su poder
  alternatives_spanish:
  - la gloria de su fuerza
  - la gloria de su poderío
  lexicon: BDAG
  rationale: δόξα se mantiene como 'gloria'. ἰσχύς puede ser 'poder' o 'fuerza'; 'poder' resulta natural y solemne en español, sin perder la idea de capacidad vigorosa o majestad eficaz.
theological_decisions:
- issue: Sentido de ἀπό en la cláusula final
  english_pob_reading: 'separation/exclusion: ''away from the presence of the Lord'''
  chosen_spanish_reading: 'separación/exclusión: ''lejos de la presencia del Señor'''
  alternative_spanish_readings:
  - procedente de la presencia del Señor
  - que proviene de la presencia del Señor
  rationale: El griego permite tanto separación como procedencia/origen. La redacción principal conserva la lectura de exclusión, que encaja con el lenguaje de castigo. La ambigüedad se preserva en nota para no borrar una tensión interpretativa real.
  doctrine_reference: Preservar la tensión interpretativa sin resolverla doctrinalmente.
- issue: Naturaleza de la 'destrucción eterna'
  english_pob_reading: rendered as 'eternal destruction' without specifying annihilation or eternal conscious punishment
  chosen_spanish_reading: '''destrucción eterna'' sin precisar si implica aniquilación o castigo consciente eterno'
  alternative_spanish_readings:
  - aniquilación eterna
  - castigo eterno consciente
  rationale: La frase griega nombra la pena pero no define por sí sola la teoría completa del destino final. El español debe conservar esa amplitud semántica y evitar añadir una conclusión doctrinal no explícita en el texto.
  doctrine_reference: No importar al texto una conclusión doctrinal no resuelta por el griego.
translation_notes:
  revision_awareness: 'Coincide con el último pase revisado: no se requieren cambios sustantivos frente al audit trail inglés, y la formulación española preserva la misma tensión interpretativa sobre ἀπό.'
  spanish_consistency_notes:
  - Se mantiene 'Señor' para κύριος, coherente con el referente divino del contexto y con el tratamiento auditado en inglés.
  - Se traduce δόξα como 'gloria' e ἰσχύς como 'poder', manteniendo el paralelismo semántico sin sobreinterpretar.
  - No se introduce vocabulario doctrinal adicional sobre la forma del castigo final; la redacción permanece descriptiva y fiel al griego.
