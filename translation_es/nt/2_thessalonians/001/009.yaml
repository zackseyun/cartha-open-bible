  glossary_alignment: El uso de «Señor» para κύριος aquí concuerda con las decisiones auditadas y no entra en conflicto con la preferencia de «Yahvé», ya que el texto fuente griego dice κύριος y no el nombre divino explícito. No hay otros términos del glosario que requieran corrección.
