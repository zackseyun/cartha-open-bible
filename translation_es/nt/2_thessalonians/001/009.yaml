  source_alignment_summary: El borrador español refleja fielmente el griego y el rastro de auditoría del POB inglés. «Estos» retoma bien οἵτινες; «sufrirán el castigo» transmite adecuadamente δίκην τίσουσιν como pena judicial; «destrucción eterna» preserva ὄλεθρον αἰώνιον sin añadir una teoría doctrinal; y «lejos de la presencia del Señor» mantiene la lectura principal de ἀπό como separación, con la alternativa de procedencia correctamente preservada en nota. «La gloria de su poder» es una representación natural y fiel de τῆς δόξης τῆς ἰσχύος αὐτοῦ.
