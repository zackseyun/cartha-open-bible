translation:
  language: es
  text: Gracia a ustedes y paz de parte de Dios nuestro Padre y del Señor Jesús Mesías[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Jesús Cristo». El título griego Χριστός puede traducirse como «Mesías» o «Cristo»; aquí se ha optado por «Mesías» para preservar su sentido titular.'
    reason: alternative_reading
lexical_decisions:
- source_word: χάρις
  english_pob_choice: Grace
  chosen_spanish: Gracia
  alternatives_spanish:
  - favor
  lexicon: BDAG
  rationale: En saludos paulinos, χάρις funciona como fórmula de bendición con peso teológico. «Gracia» conserva tanto la fórmula epistolar como el uso teológico característico mejor que «favor», que en español suena más limitado o utilitario.
- source_word: ὑμῖν
  english_pob_choice: to you
  chosen_spanish: a ustedes
  alternatives_spanish:
  - para ustedes
  lexicon: BDAG
  rationale: El dativo en esta bendición se expresa de manera natural en español con «a ustedes». Mantiene la dirección del saludo sin forzar una literalidad extraña.
- source_word: εἰρήνη
  english_pob_choice: peace
  chosen_spanish: paz
  lexicon: BDAG
  rationale: «Paz» es la equivalencia natural y fiel para εἰρήνη en esta fórmula de saludo, preservando su sentido amplio de bienestar y plenitud.
- source_word: ἀπὸ
  english_pob_choice: from
  chosen_spanish: de parte de
  alternatives_spanish:
  - de
  - procedente de
  lexicon: BDAG
  rationale: En español, «de parte de» comunica con claridad el origen de la bendición en un saludo epistolar. Es más idiomático que un simple «de» y no añade contenido ajeno al texto.
- source_word: θεοῦ πατρὸς
  english_pob_choice: God our Father
  chosen_spanish: Dios nuestro Padre
  alternatives_spanish:
  - Dios Padre
  - Dios el Padre
  lexicon: BDAG
  rationale: El griego tiene «de Dios Padre» sin el posesivo explícito, pero la fórmula paulina y el español natural favorecen «nuestro Padre». Se conserva la relación filial implícita sin volverla rígida o extraña.
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: BDAG
  rationale: «Señor» es la forma española estándar para κύριος en contexto cristológico, conservando su valor titular y reverencial.
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesús Mesías
  alternatives_spanish:
  - Jesucristo
  - Jesús Cristo
  lexicon: BDAG
  rationale: Χριστός se traduce aquí como título, «Mesías», para preservar su sentido léxico. Aunque en español eclesial «Jesucristo» es muy conocido, «Jesús Mesías» deja visible el valor titulado del griego.
theological_decisions:
- issue: Renderización de Χριστός como título y no como nombre fijo
  english_pob_reading: Lord Jesus Messiah
  chosen_spanish_reading: el Señor Jesús Mesías
  alternative_spanish_readings:
  - el Señor Jesucristo
  - el Señor Jesús Cristo
  rationale: La tradición POB documenta que Χριστός puede traducirse como «Mesías» cuando conserva fuerza titulada. Aquí el contexto de saludo permite esa lectura sin perder inteligibilidad. Se evita una forma tradicional que neutralizaría el valor semántico del título.
  doctrine_reference: 'POB doctrine default: Χριστός → Mesías salvo razón idiomática o término fijo documentado.'
- issue: Suministro implícito de posesivo con 'Padre'
  english_pob_reading: God our Father
  chosen_spanish_reading: Dios nuestro Padre
  alternative_spanish_readings:
  - Dios Padre
  - Dios el Padre
  rationale: Aunque el griego carece de ἡμῶν, la fórmula epistolar paulina exige en español una expresión relacional natural. «Nuestro Padre» comunica esa relación sin convertir la aclaración en una adición doctrinal nueva.
  doctrine_reference: Principio de equivalencia óptima en fórmulas epistolares paulinas.
translation_notes:
  revision_awareness: El texto base inglés pasó por una revisión que alternó entre «Christ» y «Messiah»; la fijación más reciente restauró «Messiah» conforme a la política doctrinal del proyecto. La presente versión española sigue esa decisión y la hace visible con «Mesías», evitando un calco tradicional que ocultaría el valor del título griego.
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς y «Señor» para κύριος, de acuerdo con los valores estándar del proyecto.
  - «Gracia» y «paz» conservan el saludo paulino sin alterar su peso teológico.
  - Se evitó «SEÑOR» como máscara tipográfica para el nombre divino porque este versículo no contiene יהוה; el texto griego habla de Dios como Padre y del Señor Jesús Mesías.
  - La forma «de parte de» traduce el origen de la bendición de modo idiomático y claro en español.
