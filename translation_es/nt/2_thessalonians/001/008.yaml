translation:
  language: es
  text: en fuego llameante[a], infligiendo venganza[b] a los que no conocen a Dios y a los que no obedecen el evangelio de nuestro Señor Jesús,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'en una llama de fuego'.
    reason: alternative_reading
  - marker: b
    text: O 'imponiendo retribución'.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν φλογὶ πυρός
  english_pob_choice: in flaming fire
  chosen_spanish: en fuego llameante
  alternatives_spanish:
  - en una llama de fuego
  - en fuego de llama
  lexicon: BDAG
  rationale: La imagen griega es intensificada y literal; en español, 'fuego llameante' conserva el valor vívido sin sonar forzado. Mantiene la cualidad ardiente del sustantivo y del genitivo sin reducirlo a una mera metáfora genérica.
- source_word: διδόντος
  english_pob_choice: inflicting
  chosen_spanish: infligiendo
  alternatives_spanish:
  - dando
  - administrando
  - imponiendo
  lexicon: BDAG
  rationale: 'Aunque la forma básica es ''dar'', en esta construcción con ἐκδίκησιν el sentido es judicial: administrar o imponer una retribución. ''Infligiendo'' reproduce bien la acción activa y el matiz punitivo en español.'
- source_word: ἐκδίκησιν
  english_pob_choice: vengeance
  chosen_spanish: venganza
  alternatives_spanish:
  - retribución
  - justicia
  - castigo
  lexicon: BDAG
  rationale: '''Venganza'' es la equivalencia más directa y fuerte, y preserva la tensión teológica del pasaje como juicio divino. No se suaviza a ''justicia'' para no perder la severidad del término.'
- source_word: τοῖς μὴ εἰδόσι θεὸν
  english_pob_choice: those who do not know God
  chosen_spanish: a los que no conocen a Dios
  alternatives_spanish:
  - a los que no conocen Dios
  - a los que no saben de Dios
  lexicon: BDAG
  rationale: 'El participio perfecto funciona con sentido presente: un estado de no conocer. En español, ''conocer a Dios'' es natural y preciso, y conserva el objeto personal implícito en θεόν.'
- source_word: τοῖς μὴ ὑπακούουσιν
  english_pob_choice: those who do not obey
  chosen_spanish: a los que no obedecen
  alternatives_spanish:
  - a los que no están obedeciendo
  - a los que se niegan a obedecer
  lexicon: BDAG
  rationale: ὑπακούω significa obedecer o prestar oído. 'No obedecen' es la opción más directa y fiel; no añade un énfasis volitivo que el griego no exige.
- source_word: τῷ εὐαγγελίῳ
  english_pob_choice: the gospel
  chosen_spanish: el evangelio
  alternatives_spanish:
  - la buena noticia
  lexicon: BDAG
  rationale: '''Evangelio'' es el término técnico paulino establecido y plenamente inteligible en español eclesial. ''Buena noticia'' sería válido, pero menos preciso como término recurrente.'
- source_word: τοῦ κυρίου ἡμῶν Ἰησοῦ
  english_pob_choice: of our Lord Jesus
  chosen_spanish: de nuestro Señor Jesús
  alternatives_spanish:
  - de Jesús nuestro Señor
  lexicon: BDAG
  rationale: Se conserva 'Señor' para κύριος según la guía doctrinal, y el orden español natural mantiene la relación genitiva sin perder el título cristológico.
theological_decisions:
- issue: Naturaleza de ἐκδίκησις en el juicio divino
  english_pob_reading: vengeance
  chosen_spanish_reading: venganza
  alternative_spanish_readings:
  - retribución
  - justicia
  rationale: El término expresa castigo judicial ejecutado por el Señor revelado, no una emoción humana desordenada. 'Venganza' preserva la dureza del texto y su carácter de juicio divino sin resolver la tensión teológica.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; do not soften source-text claims.'
translation_notes:
  revision_awareness: 'Se corrigió el fallo de validación anterior anclando explícitamente ambos marcadores de nota en el texto español: [a] junto a la expresión de fuego y [b] junto a ''venganza''. No se añadieron notas sin anclaje.'
  spanish_consistency_notes:
  - Se mantiene 'Dios' para θεόν y 'Señor' para κύριος, conforme a la terminología del proyecto.
  - '''Evangelio'' se conserva como término paulino fijo, no como calco por ''buena noticia''.'
  - La sintaxis española respeta la relación participial del griego con una construcción natural y publicable.
  - No se suaviza ἐκδίκησις; se conserva la tensión judicial del pasaje con 'venganza'.
