translation:
  language: es
  text: Y ahora ustedes saben lo que lo[a] detiene, para que sea revelado en su propio tiempo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo que lo retiene». El griego usa una expresión neutra y no identifica aquí la fuerza que lo detiene.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «en su tiempo señalado». La frase griega puede llevar el sentido de un tiempo apropiado o designado.'
    reason: alternative_reading
lexical_decisions:
- source_word: τὸ κατέχον
  english_pob_choice: what is restraining
  chosen_spanish: qué es lo que lo detiene
  alternatives_spanish:
  - lo que lo detiene
  - lo que está deteniendo
  - la fuerza que lo detiene
  lexicon: BDAG
  rationale: El participio articular neutro en griego pide una expresión impersonal. «Qué es lo que lo detiene» conserva esa neutralidad y el sentido de impedir o retener sin identificar al agente.
- source_word: οἴδατε
  english_pob_choice: you know
  chosen_spanish: ustedes saben
  alternatives_spanish:
  - ustedes conocen
  - saben
  lexicon: BDAG
  rationale: «Ustedes saben» comunica de manera natural la certeza previa que Pablo presupone. Se usa «ustedes» para claridad en español y para evitar ambigüedad del plural verbal.
- source_word: εἰς τὸ ἀποκαλυφθῆναι
  english_pob_choice: so that he may be revealed
  chosen_spanish: para que él sea revelado
  alternatives_spanish:
  - para que sea revelado
  - a fin de que él sea revelado
  - para ser revelado
  lexicon: BDAG
  rationale: La construcción con εἰς + infinitivo articular expresa finalidad. «Para que él sea revelado» refleja esa intención sin añadir especificaciones interpretativas.
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: él
  alternatives_spanish:
  - lo
  - a él
  lexicon: BDAG
  rationale: El pronombre masculino retoma a la figura ya mencionada. Se explicita con «él» en castellano para mantener la referencia personal del griego.
- source_word: ἐν τῷ ἑαυτοῦ καιρῷ
  english_pob_choice: in his own time
  chosen_spanish: en su propio tiempo
  alternatives_spanish:
  - en su tiempo señalado
  - en su tiempo designado
  - en el tiempo que le corresponde
  lexicon: BDAG
  rationale: «καιρός» puede indicar un tiempo oportuno o señalado. «En su propio tiempo» sigue de cerca el sentido del texto y conserva la ambigüedad entre momento propio y momento designado.
theological_decisions:
- issue: Identidad de lo que detiene
  english_pob_reading: Render the Greek neutrally as 'what is restraining him' without identifying the restrainer.
  chosen_spanish_reading: 'Traducir de manera neutral: «qué es lo que lo detiene», sin identificar el elemento o agente restrictor.'
  alternative_spanish_readings:
  - el que lo detiene
  - la fuerza que lo detiene
  - lo que lo retiene
  rationale: El texto griego usa una forma neutra y no nombra al agente. La versión española conserva esa ambigüedad teológica en vez de resolverla.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Sentido de καιρός en contexto escatológico
  english_pob_reading: Translate as 'his own time' rather than a more interpretive 'appointed time.'
  chosen_spanish_reading: Usar «su propio tiempo» y no «su tiempo señalado» como lectura principal.
  alternative_spanish_readings:
  - su tiempo señalado
  - su tiempo designado
  - el tiempo oportuno
  rationale: Aunque καιρός puede insinuar un tiempo fijado u oportuno, «su propio tiempo» reproduce mejor la formulación griega y evita estrechar indebidamente el sentido.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve ambiguity where the source does not force a narrower reading.'
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no se registraron cambios necesarios y el cotejo externo indicó alto acuerdo.'
  spanish_consistency_notes:
  - Se mantuvo «él» para el referente masculino de αὐτόν sin introducir identificación adicional.
  - Se preservó la ambigüedad del neutro τὸ κατέχον con una formulación impersonal en español.
  - Se evitó «Cristo» y «SEÑOR» porque este versículo no los contiene ni los requiere.
  - Se usó «tiempo» para καιρός, con nota de posible matiz de tiempo señalado u oportuno.
