translation:
  language: es
  text: para que sean juzgados todos los que no creyeron la verdad, sino que se complacieron en la injusticia[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sean condenados». El verbo griego puede implicar un juicio adverso según el contexto, aunque más literalmente significa «sean juzgados».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: ἵνα introduce la relación de propósito o resultado; en español, «para que» comunica esa conexión de manera natural sin forzar una interpretación más precisa de la que permite el griego.
- source_word: κριθῶσιν
  english_pob_choice: may be judged
  chosen_spanish: sean juzgados
  alternatives_spanish:
  - sean condenados
  - sean juzgados
  lexicon: BDAG
  rationale: El verbo κρίνω en pasivo significa básicamente «ser juzgado». «Sean juzgados» preserva el sentido judicial básico y deja abierta la fuerza adversa que el contexto sugiere, en vez de explicitarla en la traducción principal.
- source_word: πάντες
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todos ellos
  - cada uno
  lexicon: BDAG
  rationale: «Todos» reproduce con naturalidad el valor del plural nominativo y funciona bien con la cláusula participial siguiente.
- source_word: οἱ μὴ πιστεύσαντες
  english_pob_choice: who did not believe
  chosen_spanish: los que no creyeron
  alternatives_spanish:
  - quienes no creyeron
  - los que no creyeron
  lexicon: BDAG
  rationale: 'El artículo con el participio aoristo funciona sustantivamente: «los que no creyeron». Elegí una forma fluida en español que conserva el carácter identificador del grupo sin añadir matices ajenos.'
- source_word: τῇ ἀληθείᾳ
  english_pob_choice: the truth
  chosen_spanish: la verdad
  alternatives_spanish:
  - la verdad
  - verdad
  lexicon: BDAG
  rationale: El artículo en griego sugiere una verdad definida, probablemente la verdad del evangelio en el contexto paulino. «La verdad» mantiene esa referencia concreta en español.
- source_word: ἀλλὰ
  english_pob_choice: but
  chosen_spanish: sino que
  alternatives_spanish:
  - pero
  - sino que
  lexicon: BDAG
  rationale: Aquí la contraposición no une dos predicados independientes de igual peso; en español, «sino que» expresa mejor el contraste entre no creer la verdad y complacerse en la injusticia.
- source_word: εὐδοκήσαντες
  english_pob_choice: took pleasure in
  chosen_spanish: se complacieron en
  alternatives_spanish:
  - se deleitaron en
  - tomaron placer en
  - aprobaron
  lexicon: BDAG
  rationale: εὐδοκέω puede significar tomar placer, deleitarse o aprobar. «Se complacieron en» conserva tanto el matiz afectivo como el voluntario del verbo, sin reducirlo a una mera aprobación intelectual.
- source_word: τῇ ἀδικίᾳ
  english_pob_choice: unrighteousness
  chosen_spanish: la injusticia
  alternatives_spanish:
  - la injusticia
  - la maldad
  - la iniquidad
  lexicon: BDAG
  rationale: ἀδικία abarca injusticia, maldad o conducta injusta. «Injusticia» mantiene el campo semántico moral y judicial del término, aunque en español también puede oírse con una fuerza más amplia que la estrictamente forense.
theological_decisions:
- issue: 'ἵνα κριθῶσιν: mantener el sentido básico de “ser juzgados” o explicitar “ser condenados”'
  english_pob_reading: may be judged
  chosen_spanish_reading: sean juzgados
  alternative_spanish_readings:
  - sean condenados
  rationale: La POB en inglés preserva la tensión entre el valor léxico básico de κρίνω y el resultado adverso que el contexto implica. En español, «sean juzgados» mantiene esa tensión; «sean condenados» resolvería el juicio hacia una conclusión que el verbo por sí solo no exige.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El texto español sigue de cerca el audit trail en inglés y conserva la decisión clave de κριθῶσιν como «sean juzgados», evitando interpretar de antemano el resultado como «condenados». También mantiene el contraste adversativo con «sino que» para reflejar con precisión la estructura griega.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se conserva «la verdad» con artículo definido para reflejar τῇ ἀληθείᾳ.
  - Se mantiene un registro sobrio y bíblico, sin recurrir a vocabulario eclesiástico arcaizante innecesario.
  - «Injusticia» traduce ἀδικία con una opción amplia y comprensible para lectores hispanohablantes de distintas regiones.
