revisions:
- from: Y por esto, Dios les envía una influencia de engaño[a], para que crean la mentira.
  to: Y por esto, Dios les envía una influencia engañosa[a], para que crean la mentira.
  rationale: Se cambia «una influencia de engaño» por «una influencia engañosa» para reflejar mejor la revisión inglesa auditada («a deluding influence») y para lograr un español más natural, sin debilitar la fuerza de ἐνέργειαν πλάνης ni alterar la agencia divina explícita. Se conserva la nota de alternativas léxicas, simplificada para evitar duplicar la lectura principal.
