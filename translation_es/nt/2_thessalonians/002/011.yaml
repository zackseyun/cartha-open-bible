translation:
  language: es
  text: Y por esto, Dios les envía una influencia engañosa[a], para que crean la mentira.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «una operación de engaño» o, tradicionalmente, «un fuerte engaño».'
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τοῦτο
  english_pob_choice: because of this
  chosen_spanish: y por esto
  alternatives_spanish:
  - porque de esto
  - por esta razón
  - así que
  lexicon: BDAG
  rationale: La expresión es causal y remite al contexto previo. «Y por esto» conserva la relación directa sin volverla meramente inferencial.
- source_word: πέμπει
  english_pob_choice: sends
  chosen_spanish: envía
  alternatives_spanish:
  - manda
  - está enviando
  - despacha
  lexicon: BDAG
  rationale: El presente indicativo se vierte naturalmente con un presente en español. «Envía» mantiene la acción directa atribuida a Dios.
- source_word: ἐνέργειαν
  english_pob_choice: a deluding influence / a working
  chosen_spanish: una influencia
  alternatives_spanish:
  - una operación
  - un obrar
  - una actividad
  lexicon: BDAG
  rationale: En español, «influencia» comunica con naturalidad el efecto operativo sin sonar forzado. Mantiene la idea de una acción efectiva, aunque no traduce de manera rígida la estructura nominal griega.
- source_word: πλάνης
  english_pob_choice: deluding / delusion
  chosen_spanish: de engaño
  alternatives_spanish:
  - de delirio
  - de extravío
  - de error
  lexicon: BDAG
  rationale: «Engaño» preserva el campo semántico de desviación falsa y funciona bien con «influencia» en español. Evita una formulación excesivamente técnica o poco idiomática.
- source_word: ἐνέργειαν πλάνης
  english_pob_choice: a deluding influence
  chosen_spanish: una influencia de engaño
  alternatives_spanish:
  - un obrar de engaño
  - una operación de engaño
  - una influencia engañosa
  lexicon: BDAG
  rationale: La construcción genitiva se conserva de forma transparente. «Influencia de engaño» deja visible la relación entre la acción efectiva y su cualidad engañosa, sin resolver la ambigüedad del griego de manera innecesaria.
- source_word: εἰς τὸ πιστεῦσαι
  english_pob_choice: so that they may believe
  chosen_spanish: para que crean
  alternatives_spanish:
  - a fin de que crean
  - de modo que crean
  - con el resultado de que crean
  lexicon: BDAG
  rationale: La construcción expresa propósito o resultado. «Para que crean» es la forma más natural y fiel en español.
- source_word: τῷ ψεύδει
  english_pob_choice: the lie
  chosen_spanish: la mentira
  alternatives_spanish:
  - la falsedad
  - lo falso
  - la falsedad concreta
  lexicon: BDAG
  rationale: Aunque «el mentir» podría sugerirse en abstracto, aquí el artículo y el contexto favorecen un referente definido. «La mentira» es el equivalente más claro y bíblicamente inteligible en español.
theological_decisions:
- issue: Agencia divina en el endurecimiento judicial
  english_pob_reading: God sends them a deluding influence
  chosen_spanish_reading: Dios les envía una influencia de engaño
  alternative_spanish_readings:
  - Dios permite que venga sobre ellos una influencia de engaño
  - Dios los entrega al engaño
  rationale: El griego presenta a Dios como sujeto directo de πέμπει. La traducción conserva esa agencia explícita sin suavizarla a mera permisividad. Así se mantiene la tensión teológica del juicio divino frente al rechazo previo de la verdad.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión más reciente del POB inglés, que prefirió una formulación más natural para ἐνέργειαν πλάνης («a deluding influence») sin abandonar la estructura semántica básica. La versión española adopta una solución igualmente natural («una influencia de engaño») y conserva la tensión del texto sobre la acción divina.
  spanish_consistency_notes:
  - Se usa «Dios» para ὁ θεός, conforme al estándar del proyecto.
  - Se traduce πλάνη/πλανάω con vocabulario de engaño, manteniendo la relación con la mentira en el contexto.
  - Se evita «señor» u otras fórmulas de sustitución, ya que no aparece el Tetragrámaton en este versículo.
  - «La mentira» preserva la referencia definida del artículo griego con πιστεῦσαι τῷ ψεύδει.
