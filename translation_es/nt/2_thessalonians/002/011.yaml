    issue: «una influencia de engaño» es poco idiomático en español
    rationale: Aunque comprensible, la construcción suena forzada. El inglés auditado ya optó por una formulación más natural («a deluding influence»), y en español «una influencia engañosa» reproduce mejor ese sentido sin perder fidelidad.
  - severity: low
    issue: La nota léxica puede reordenarse para que la forma principal revisada no aparezca solo como alternativa
    rationale: Si el texto principal pasa a «una influencia engañosa», la nota debe reflejar como alternativas las otras posibilidades documentadas, incluida la forma más literal «una operación de engaño» y la tradicional «un fuerte engaño».
  revised_spanish_text: Y por esto, Dios les envía una influencia engañosa[a], para que crean la mentira.
