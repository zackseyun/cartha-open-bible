translation:
  language: es
  text: ¿No recuerdan que, cuando todavía estaba con ustedes, les decía estas cosas?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: μνημονεύετε
  english_pob_choice: remember
  chosen_spanish: recuerdan
  alternatives_spanish:
  - se acuerdan
  - recuerdan bien
  lexicon: BDAG
  rationale: El presente interrogativo se expresa naturalmente en español con «recuerdan». Mantiene la idea de tener presente una instrucción previa sin cargar el texto con un matiz más técnico que el griego no exige aquí.
- source_word: ἔτι
  english_pob_choice: still
  chosen_spanish: todavía
  alternatives_spanish:
  - aún
  - todavía seguía
  lexicon: BDAG
  rationale: En la construcción temporal con ὢν, «todavía» comunica la continuidad pasada de modo claro y fluido en español.
- source_word: ὢν πρὸς ὑμᾶς
  english_pob_choice: while I was still with you
  chosen_spanish: cuando todavía estaba con ustedes
  alternatives_spanish:
  - mientras todavía estaba con ustedes
  - mientras estaba con ustedes
  lexicon: BDAG
  rationale: El participio con πρὸς ὑμᾶς expresa presencia personal entre ellos; «cuando todavía estaba con ustedes» preserva ese sentido temporal y relacional con buena naturalidad en español.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - estos asuntos
  - esto
  lexicon: BDAG
  rationale: El demostrativo plural apunta a las instrucciones ya mencionadas. «Estas cosas» conserva el plural y la referencia anafórica sin forzar una paráfrasis.
- source_word: ἔλεγον
  english_pob_choice: I was telling
  chosen_spanish: les decía
  alternatives_spanish:
  - les estaba diciendo
  - les iba diciendo
  lexicon: BDAG
  rationale: El imperfecto expresa acción continua o repetida en el pasado. «Les decía» reproduce bien ese valor imperfectivo en español y suena más natural que una forma más pesada.
