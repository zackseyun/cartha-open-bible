translation:
  language: es
  text: Y entonces será revelado el que no tiene ley, a quien el Señor Jesús matará con el soplo[a] de su boca y anulará por la manifestación de su venida[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con el espíritu de su boca». El griego πνεῦμα puede significar «soplo» o «espíritu»; aquí «soplo» encaja mejor con la expresión idiomática.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «por la manifestación de su presencia». «Venida» es el sentido contextual habitual de παρουσία aquí, aunque «presencia» pertenece al alcance del término.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκαλυφθήσεται
  english_pob_choice: will be revealed
  chosen_spanish: será revelado
  alternatives_spanish:
  - será descubierto
  - será puesto de manifiesto
  lexicon: BDAG
  rationale: El futuro pasivo pide una forma pasiva en español; «será revelado» conserva el valor apocalíptico de hacerse manifiesto sin introducir un agente que el griego no expresa.
- source_word: ὁ ἄνομος
  english_pob_choice: the lawless one
  chosen_spanish: el impío
  alternatives_spanish:
  - el sin ley
  - el hombre de iniquidad
  lexicon: BDAG
  rationale: Aunque el inglés POB optó por una forma sustantivada cercana a la estructura griega, en español «el impío» comunica con naturalidad la noción de ἄνομος como contrario a Dios y a la ley, sin sobrecargar la frase. Se evita «sin ley», que suena menos idiomático, y «hombre de iniquidad», que procede de una formulación contextual más amplia y no de este versículo.
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: BDAG
  rationale: «Señor» es el equivalente natural y reverente de κύριος en este contexto cristológico.
- source_word: Ἰησοῦς
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  lexicon: BDAG
  rationale: Nombre propio estándar en español.
- source_word: ἀνελεῖ
  english_pob_choice: will slay
  chosen_spanish: matará
  alternatives_spanish:
  - dará muerte a
  - fulminará
  lexicon: BDAG
  rationale: ἀναιρέω aquí significa quitar la vida / matar. «Matará» es la opción más clara y directa en español; se mantiene la fuerza judicial del verbo sin añadir matices no explícitos.
- source_word: τῷ πνεύματι τοῦ στόματος αὐτοῦ
  english_pob_choice: with the breath of his mouth
  chosen_spanish: con el soplo de su boca
  alternatives_spanish:
  - con el espíritu de su boca
  lexicon: BDAG
  rationale: En esta locución, πνεῦμα puede significar «soplo» o «espíritu». Siguiendo la lectura preferida por el POB inglés, «soplo» encaja mejor con la imagen idiomática y con el eco de juicio profético; se preserva la alternativa semántica en nota.
- source_word: καταργήσει
  english_pob_choice: bring to nothing
  chosen_spanish: anulará
  alternatives_spanish:
  - reducirá a nada
  - destruirá
  - dejará sin efecto
  lexicon: BDAG
  rationale: καταργέω expresa anular, invalidar o dejar sin eficacia. «Anulará» mantiene la idea de desactivar o dejar sin efecto al adversario sin forzar el verbo hacia una aniquilación que el léxico no exige.
- source_word: τῇ ἐπιφανείᾳ
  english_pob_choice: by the appearance
  chosen_spanish: con la manifestación
  alternatives_spanish:
  - por la aparición
  - mediante la aparición
  lexicon: BDAG
  rationale: ἐπιφάνεια puede ser «aparición» o «manifestación». En español, «manifestación» expresa bien la visibilidad reveladora del evento y resulta natural en la construcción instrumental.
- source_word: τῆς παρουσίας αὐτοῦ
  english_pob_choice: of his coming
  chosen_spanish: de su venida
  alternatives_spanish:
  - de su presencia
  lexicon: BDAG
  rationale: En contextos escatológicos, παρουσία suele referirse a la venida. «Venida» es la opción contextual más clara y mantiene el valor futuro y público del término; «presencia» se conserva como posibilidad semántica del lexema.
theological_decisions:
- issue: Identidad del adversario escatológico
  english_pob_reading: the lawless one
  chosen_spanish_reading: el impío
  alternative_spanish_readings:
  - el sin ley
  - el hombre de iniquidad
  rationale: El griego de este versículo usa ὁ ἄνομος, no la expresión más amplia del contexto inmediato. «El impío» traduce el carácter moral y teológico del personaje sin importar una formulación ajena al enunciado puntual. No se resuelve la tensión entre una designación estrictamente literal y una más interpretativa; simplemente se elige la opción más natural para el español bíblico.
  doctrine_reference: Original-language primacy; preserve contextual tension rather than harmonize.
- issue: Medio de la victoria del Señor Jesús
  english_pob_reading: with the breath of his mouth
  chosen_spanish_reading: con el soplo de su boca
  alternative_spanish_readings:
  - con el espíritu de su boca
  rationale: Se conserva la imagen de juicio verbal y vital que sugiere el idiomático griego. «Soplo» sigue la lectura preferida por el POB inglés y mantiene el probable eco de Isaías 11:4; la alternativa «espíritu» queda disponible porque πνεῦμα lo permite léxicamente.
  doctrine_reference: Preserve lexical ambiguity where source language supports it.
translation_notes:
  revision_awareness: Se incorporó el ajuste de la revisión inglesa más reciente en el tono formal del verbo de destrucción, aunque en español se optó por «anulará» para expresar con precisión el valor de καταργήσει. El resto del versículo se mantiene alineado con el texto griego y con la decisión inglesa de preservar las alternativas léxicas en nota.
  spanish_consistency_notes:
  - Se mantiene «Jesús» como nombre propio y «Señor» como traducción de κύριος en sentido cristológico.
  - Se usa «soplo» para πνεῦμα en la expresión idiomática, reservando «espíritu» para la nota alternativa.
  - Se traduce παρουσία como «venida» en el texto principal y «presencia» en nota, para conservar la tensión léxica documentada.
  - «Anulará» se escogió para καταργήσει por su valor de dejar sin efecto, evitando una intensificación innecesaria hacia «destruirá».
  - Se evitó introducir «hombre» en ὁ ἄνομος porque el artículo sustantiva el adjetivo, y el español permite una designación breve como «el impío».
