translation:
  language: es
  text: cuya venida es según la actividad de Satanás[a], con todo poder y señales y prodigios de mentira[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «presencia» o «llegada». El término griego puede referirse al advenimiento de una figura más que a una presencia estática.'
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse como «prodigios mentirosos» o «prodigios de falsedad».
    reason: lexical_alternative
lexical_decisions:
- source_word: οὗ
  english_pob_choice: whose
  chosen_spanish: cuya
  alternatives_spanish:
  - de quien
  - cuyo
  lexicon: BDAG
  rationale: El relativo genitivo retoma al personaje del contexto previo; en español, «cuya» conserva de manera natural la relación posesiva sin añadir palabras innecesarias.
- source_word: παρουσία
  english_pob_choice: coming
  chosen_spanish: venida
  alternatives_spanish:
  - presencia
  - llegada
  lexicon: BDAG
  rationale: En contexto escatológico, el término apunta a la irrupción/advenimiento de una figura. «Venida» es natural en español bíblico y mantiene el sentido de llegada/manifestación futura.
- source_word: κατ’ ἐνέργειαν
  english_pob_choice: according to the working
  chosen_spanish: según la obra
  alternatives_spanish:
  - conforme a la actividad
  - según la operación
  lexicon: BDAG
  rationale: La frase expresa modo o conformidad con la actividad eficaz de Satanás. «Según la obra» conserva el valor operativo sin sonar artificial en español.
- source_word: Σατανᾶ
  english_pob_choice: Satan
  chosen_spanish: Satanás
  alternatives_spanish:
  - el Adversario
  lexicon: BDAG
  rationale: Nombre propio estándar del NT en español. Se conserva la forma transliterada usual.
- source_word: ἐν πάσῃ δυνάμει
  english_pob_choice: with all power
  chosen_spanish: con todo poder
  alternatives_spanish:
  - con todo tipo de poder
  - con todo el poder
  lexicon: BDAG
  rationale: «Con» expresa bien el acompañamiento/instrumentalidad; «todo poder» preserva el alcance intensivo de πάσῃ sin estrecharlo a milagros explícitos.
- source_word: σημείοις
  english_pob_choice: signs
  chosen_spanish: señales
  alternatives_spanish:
  - signos
  - señales milagrosas
  lexicon: BDAG
  rationale: «Señales» es el equivalente más natural y bíblicamente transparente para σημεῖα, manteniendo la idea de actos que señalan o autentican.
- source_word: τέρασιν
  english_pob_choice: wonders
  chosen_spanish: prodigios
  alternatives_spanish:
  - maravillas
  - portentos
  lexicon: BDAG
  rationale: «Prodigios» comunica fenómenos extraordinarios con dignidad bíblica en español y preserva el paralelismo con «señales».
- source_word: ψεύδους
  english_pob_choice: wonders of falsehood
  chosen_spanish: de mentira
  alternatives_spanish:
  - de falsedad
  - mentirosos
  lexicon: BDAG
  rationale: El genitivo califica la frase final como caracterizada por la mentira/falsedad. En español, «prodigios de mentira» conserva la tensión del original mejor que resolverla con un adjetivo simple.
theological_decisions:
- issue: Naturaleza de las señales y prodigios satánicos
  english_pob_reading: The verse describes the lawless one's coming as accompanied by real displays of power that are characterized by falsehood or used deceptively, without specifying whether they are wholly counterfeit or genuinely supernatural.
  chosen_spanish_reading: El versículo presenta la venida del inicuo acompañada de poder, señales y prodigios que pertenecen a la mentira o están marcados por ella, sin definir si son solo trucos o si implican manifestaciones sobrenaturales reales.
  alternative_spanish_readings:
  - señales y prodigios completamente falsos
  - milagros verdaderos producidos por Satanás
  rationale: 'La redacción española conserva la tensión teológica del texto: atribuye el fenómeno a la obra de Satanás y al mismo tiempo mantiene el calificativo de mentira sin resolver metafísicamente la naturaleza exacta de esas manifestaciones.'
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del audit trail que prefirió «wonders of falsehood» frente a «false wonders», para no sugerir simplemente trucos falsos sino prodigios asociados con la mentira/decepción. La versión española mantiene esa misma tensión con «prodigios de mentira».
  spanish_consistency_notes:
  - Se mantuvo el nombre propio «Satanás» de forma consistente con la terminología POB.
  - «Venida» se usa en sentido escatológico para παρουσία, evitando una opción demasiado estática como «presencia».
  - La frase final conserva la ambigüedad del genitivo ψεύδους sin forzar una interpretación doctrinal cerrada.
