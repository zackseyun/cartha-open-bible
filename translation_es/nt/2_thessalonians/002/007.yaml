revisions:
- from: Porque ya está operando el misterio de la iniquidad[a]; solo el que ahora lo restringe[b], hasta que desaparezca de en medio.
  to: Porque el misterio de la iniquidad ya está en acción[a]; solo que el que ahora restringe seguirá haciéndolo hasta que esté fuera de en medio[b].
  rationale: Se corrige la sintaxis española para que la cláusula con «solo» sea completa y natural, se elimina el objeto añadido «lo» para preservar la ambigüedad del griego, y se reemplaza «desaparezca de en medio» por «esté fuera de en medio», que se acerca mejor a ἕως ἐκ μέσου γένηται sin imponer agencia. También se realinean las notas para reflejar mejor el rastro de auditoría inglés, conservando la alternativa sobre la expresión final y añadiendo la alternativa de ἐνεργεῖται. No hace falta adjudicación adicional porque la reparación es textual y no resuelve una cuestión doctrinal nueva.
