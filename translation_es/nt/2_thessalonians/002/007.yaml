translation:
  language: es
  text: Porque el misterio de la iniquidad ya está en acción[a]; solo que el que ahora restringe seguirá haciéndolo hasta que esté fuera de en medio[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ya está operando».'
    reason: alternative_reading
  - marker: b
    text: 'O: «hasta que sea removido» o «hasta que sea quitado de en medio». El griego es menos explícito acerca de cómo ocurre esto. También puede entenderse: «el que ahora retiene/restringe».'
    reason: lexical_alternative
lexical_decisions:
- source_word: μυστήριον
  english_pob_choice: mystery
  chosen_spanish: misterio
  alternatives_spanish:
  - secreto
  lexicon: BDAG
  rationale: «Misterio» mantiene el valor paulino de una realidad oculta que ahora está en curso, sin reducirla a una simple información desconocida.
- source_word: ἐνεργεῖται
  english_pob_choice: is already at work
  chosen_spanish: está operando
  alternatives_spanish:
  - está ya trabajando
  - está ya en acción
  - ya actúa
  lexicon: BDAG
  rationale: «Está operando» comunica una actividad presente y continua; conserva la idea de una fuerza en funcionamiento sin añadir un sujeto ni una explicación ajena al griego.
- source_word: ἀνομίας
  english_pob_choice: lawlessness
  chosen_spanish: iniquidad
  alternatives_spanish:
  - desorden
  - ilegalidad
  - anomia
  lexicon: BDAG
  rationale: El término griego apunta a ausencia de ley y oposición al orden de Dios. En español, «iniquidad» preserva mejor el peso moral y bíblico que un calco técnico, aunque «anomia» sería demasiado opaco para lectura pública.
- source_word: μόνον
  english_pob_choice: only
  chosen_spanish: solo
  alternatives_spanish:
  - únicamente
  - pero solo
  lexicon: BDAG
  rationale: «Solo» reproduce la fuerza restrictiva de μόνον de manera natural en español y mantiene la relación limitativa con lo anterior.
- source_word: ὁ κατέχων
  english_pob_choice: the one who now restrains
  chosen_spanish: el que ahora lo restringe
  alternatives_spanish:
  - el que ahora lo detiene
  - el retenedor
  - el que ahora lo frena
  lexicon: BDAG
  rationale: '«Restringe» refleja el valor de κατέχω en este contexto: contener, detener, limitar. Se conserva la ambigüedad sobre la identidad del sujeto, tal como la deja el griego.'
- source_word: ἄρτι
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - por ahora
  - en este momento
  lexicon: BDAG
  rationale: Marca el tiempo presente de la acción restrictiva; «ahora» es la equivalencia más directa y transparente.
- source_word: ἕως ἐκ μέσου γένηται
  english_pob_choice: until he is out of the way
  chosen_spanish: hasta que desaparezca de en medio
  alternatives_spanish:
  - hasta que esté fuera del camino
  - hasta que sea removido
  - hasta que salga de en medio
  lexicon: BDAG
  rationale: La expresión es idiomática y algo elíptica. «Desaparezca de en medio» transmite el estado resultante sin forzar un agente explícito ni cerrar la ambigüedad del modo en que ocurre.
theological_decisions:
- issue: Identidad de ὁ κατέχων ('el que restringe')
  english_pob_reading: Render generically as 'the one who now restrains' without identifying the restrainer.
  chosen_spanish_reading: 'Traducir de forma genérica: «el que ahora lo restringe», sin identificar quién es.'
  alternative_spanish_readings:
  - el poder que restringe
  - el Espíritu Santo
  - el Estado romano
  - el gobernante
  rationale: El texto griego menciona una figura o agente restrictivo, pero no lo identifica aquí. La traducción debe conservar esa indeterminación y no resolver una discusión escatológica debatida.
  doctrine_reference: Preservar la tensión teológica del original; primacía del texto fuente sobre la tradición interpretativa.
- issue: Agencia implícita en ἕως ἐκ μέσου γένηται
  english_pob_reading: Use 'until he is out of the way' rather than an explicitly agentive passive such as 'until he is taken out of the way.'
  chosen_spanish_reading: Usar «hasta que desaparezca de en medio» en vez de una pasiva más explícita como «hasta que sea removido».
  alternative_spanish_readings:
  - hasta que sea quitado de en medio
  - hasta que lo saquen de en medio
  - hasta que quede fuera de la manera
  rationale: El griego permite un resultado de estar fuera de en medio sin indicar con claridad un agente de remoción. Conviene no imponer una causalidad que el texto no formula abiertamente.
  doctrine_reference: Primacía del griego original; preservar la ambigüedad donde el texto la mantiene.
translation_notes:
  revision_awareness: No se reportan revisiones aplicadas en el expediente. El borrador sigue el estado más reciente sin cambios, con alta coincidencia entre revisores.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni una cita directa que lo requiera.
  - Se usa «misterio» para μυστήριον conforme a la decisión paulina documentada.
  - Se evita identificar al restrenedor, preservando la ambigüedad teológica del texto fuente.
  - Se evita «Señor» como sustituto no solicitado y no aparece terminología eclesiástica añadida.
  - La puntuación y el orden buscan una lectura pública natural en español sin perder la estructura limitativa del griego.
