review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido principal del griego: contraste enfático («Pero nosotros»), obligación de dar gracias, vocativo a los destinatarios, elección divina, lectura principal ἀπαρχήν como «primicias», y los medios/ámbitos de salvación mediante santificación y fe. Sin embargo, falta en español la nota cultural correspondiente a ἀδελφοί que sí está preservada en el POB inglés, y el anclaje actual de la nota textual en «ustedes[a]» es menos preciso que anclarla en «primicias[a]», donde recae la variante.'
  spanish_quality_summary: El español es claro, natural y digno. «Debemos siempre dar gracias», «amados por el Señor», y «mediante la santificación del Espíritu y la fe en la verdad» son plenamente legibles. La única mejora recomendada es recolocar la nota textual al término afectado por la variante y añadir la nota sobre «hermanos» para conservar la justificación auditada y evitar pérdida de información contextual.
  glossary_alignment: 'La terminología concuerda con los lineamientos del proyecto: θεός = «Dios», κύριος = «Señor» (no como sustituto de YHWH aquí, sino por el griego κύριος referido a Cristo/el Señor), πνεῦμα = «Espíritu» con lectura pneumatológica contextual, ἀπαρχή = «primicias», σωτηρία = «salvación», πίστις = «fe», ἀλήθεια = «verdad». No hay conflictos con el glosario base.'
  issues:
  - severity: medium
    issue: Falta la nota cultural sobre «hermanos» que sí preserva el POB inglés.
    rationale: El rastro de auditoría inglés incluye explícitamente una nota para ἀδελφοί indicando que puede abarcar a toda la comunidad creyente. Omitirla pierde una decisión documentada del proyecto.
  - severity: low
    issue: La nota textual está anclada en «ustedes[a]» en vez de en «primicias[a]».
    rationale: La variante textual afecta directamente ἀπαρχήν / ἀπ’ ἀρχῆς, por lo que el marcador debe ubicarse en la palabra o frase relevante para mayor precisión editorial.
  revised_spanish_text: Pero nosotros debemos siempre dar gracias a Dios por ustedes, hermanos[b] amados por el Señor, porque Dios los escogió como primicias[a] para salvación, mediante la santificación del Espíritu y la fe en la verdad.
  revised_footnotes:
  - marker: a
    text: 'O, según algunos manuscritos: «porque Dios los escogió desde el principio para salvación». El texto principal sigue la lectura «como primicias» (ἀπαρχήν); la alternativa refleja la variante ἀπ’ ἀρχῆς («desde el principio»).'
    reason: textual_variant
  - marker: b
    text: «Hermanos» traduce el plural masculino ἀδελφοί; este tratamiento puede incluir a toda la comunidad creyente.
    reason: cultural_note
  revision_rationale: 'Se conserva el texto base porque es fiel y natural, pero se realizan dos reparaciones menores: mover la nota textual al término afectado por la variante («primicias») y añadir la nota cultural sobre «hermanos» para mantener íntegro el rastro de decisiones del POB inglés.'
