translation:
  language: es
  text: Pero nosotros debemos siempre dar gracias a Dios por ustedes, hermanos[b] amados por el Señor, porque Dios los escogió como primicias[a] para salvación, mediante la santificación del Espíritu y la fe en la verdad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, según algunos manuscritos: «porque Dios los escogió desde el principio para salvación». El texto principal sigue la lectura «como primicias» (ἀπαρχήν); la alternativa refleja la variante ἀπ’ ἀρχῆς («desde el principio»).'
    reason: textual_variant
  - marker: b
    text: «Hermanos» traduce el plural masculino ἀδελφοί; este tratamiento puede incluir a toda la comunidad creyente.
    reason: cultural_note
lexical_decisions:
- source_word: Ἡμεῖς δὲ
  english_pob_choice: But we
  chosen_spanish: Pero nosotros
  alternatives_spanish:
  - Y nosotros
  - Mas nosotros
  lexicon: BDAG
  rationale: δέ marca contraste, y el pronombre explícito ἡμεῖς se conserva naturalmente con nosotros para dar el énfasis paulino sin sonar forzado.
- source_word: ὀφείλομεν
  english_pob_choice: ought
  chosen_spanish: debemos
  alternatives_spanish:
  - estamos obligados a
  - tenemos que
  lexicon: BDAG
  rationale: En español, debemos comunica obligación moral o debida conveniencia de manera natural y fiel, sin endurecerlo como coerción.
- source_word: εὐχαριστεῖν τῷ θεῷ πάντοτε περὶ ὑμῶν
  english_pob_choice: always to give thanks to God for you
  chosen_spanish: siempre dar gracias a Dios por ustedes
  alternatives_spanish:
  - siempre agradecer a Dios por ustedes
  - dar siempre gracias a Dios por ustedes
  lexicon: BDAG
  rationale: Dar gracias a Dios es la forma más idiomática y reverente en español; por ustedes conserva la relación personal del περὶ ὑμῶν.
- source_word: ἀδελφοὶ
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - hermanos/as
  lexicon: BDAG
  rationale: Hermanos conserva el masculino plural del griego y puede abarcar a toda la comunidad creyente sin añadir una expansión no indicada en el texto principal.
- source_word: ἠγαπημένοι ὑπὸ κυρίου
  english_pob_choice: beloved by the Lord
  chosen_spanish: amados por el Señor
  alternatives_spanish:
  - amados del Señor
  - queridos por el Señor
  lexicon: BDAG
  rationale: Amados por el Señor refleja el participio pasivo adjetival con calidez bíblica y sin introducir una formulación más devocional que la del griego.
- source_word: εἵλατο
  english_pob_choice: chose
  chosen_spanish: escogió
  alternatives_spanish:
  - eligió
  - seleccionó
  lexicon: BDAG
  rationale: Escogió es el equivalente natural de chose y preserva la idea de elección divina sin añadir un matiz doctrinal específico.
- source_word: ἀπαρχὴν
  english_pob_choice: as firstfruits
  chosen_spanish: como primicias
  alternatives_spanish:
  - como primeras porciones
  - como primeros frutos
  lexicon: BDAG
  rationale: Primicias es el término bíblico natural en español para ἀπαρχήν y comunica la imagen cultual/agroalimentaria del texto.
- source_word: εἰς σωτηρίαν
  english_pob_choice: for salvation
  chosen_spanish: para salvación
  alternatives_spanish:
  - hacia salvación
  - en vista de la salvación
  lexicon: BDAG
  rationale: Para salvación reproduce el valor final/teleológico de εἰς con claridad y sencillez en español.
- source_word: ἐν ἁγιασμῷ πνεύματος
  english_pob_choice: through sanctification by the Spirit
  chosen_spanish: mediante la santificación del Espíritu
  alternatives_spanish:
  - en santificación del Espíritu
  - por la santificación del Espíritu
  lexicon: BDAG
  rationale: Mediante expresa bien el medio o ámbito instrumental. Del Espíritu sigue la lectura del POB de referir πνεύματος al Espíritu Santo en este contexto soteriológico.
- source_word: πίστει ἀληθείας
  english_pob_choice: faith in the truth
  chosen_spanish: la fe en la verdad
  alternatives_spanish:
  - fe en la verdad
  - la fidelidad de la verdad
  lexicon: BDAG
  rationale: La fe en la verdad conserva la comprensión objetiva de ἀληθείας y evita forzar la expresión hacia una lectura subjetiva menos probable.
theological_decisions:
- issue: Sentido de πνεύματος en ἁγιασμῷ πνεύματος
  english_pob_reading: the Holy Spirit
  chosen_spanish_reading: el Espíritu Santo
  alternative_spanish_readings:
  - el espíritu humano
  rationale: En este contexto paulino de salvación y santificación, la referencia al Espíritu Santo es la lectura más natural. El español la puede expresar de manera implícita con mayúscula en Espíritu sin agregar palabras ajenas al texto.
  doctrine_reference: Mantener la lectura pneumatológica habitual del pasaje sin cerrar indebidamente otras posibilidades gramaticales.
- issue: Alcance de ἀδελφοί
  english_pob_reading: brothers may include the whole believing community
  chosen_spanish_reading: hermanos
  alternative_spanish_readings:
  - hermanos y hermanas
  - comunidad de creyentes
  rationale: Se conserva el vocativo masculino plural del griego en el texto principal; la posible inclusión de toda la comunidad queda reconocida por el uso eclesial del término, sin ampliarlo de modo interpretativo en la línea principal.
  doctrine_reference: Respetar la forma del original y dejar la inclusión comunitaria como posibilidad contextual, no como sustitución textual.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que toda nota de pie incluida tenga su marca correspondiente en el texto principal. Se evitó agregar una nota no anclada para no repetir el error de marcador ausente.
  spanish_consistency_notes:
  - Se mantuvo Yahvé solo cuando aparezca el nombre divino; aquí el texto dice θεῷ y κυρίου, por lo que se traduce Dios y el Señor respectivamente.
  - Se conservó el registro paulino formal con verbos naturales en español y sin calcos innecesarios.
  - Se eligió primicias para ἀπαρχὴν y se dejó la variante textual en nota, siguiendo el expediente inglés.
  - La frase la fe en la verdad refleja la estructura del griego sin convertirla en una paráfrasis explicativa.
