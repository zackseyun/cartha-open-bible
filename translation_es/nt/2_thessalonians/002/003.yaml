translation:
  language: es
  text: Que nadie los engañe de ninguna manera, porque ese día no vendrá sin que primero venga la rebelión[a] y sea revelado el hombre sin ley[b], el hijo de la destrucción.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la apostasía» o «la defección». El término griego puede denotar una rebelión decisiva, a menudo entendida como una deserción religiosa.
    reason: alternative_reading
  - marker: b
    text: Algunos manuscritos leen «el hombre de pecado» en lugar de «el hombre sin ley».
    reason: textual_variant
lexical_decisions:
- source_word: μή τις ὑμᾶς ἐξαπατήσῃ
  english_pob_choice: Let no one deceive you
  chosen_spanish: Que nadie los engañe
  alternatives_spanish:
  - Que nadie los engañe a ustedes
  - No permitan que nadie los engañe
  lexicon: BDAG
  rationale: ἐξαπατάω significa engañar o inducir a error; «engañe» es el equivalente natural en español y conserva la fuerza de advertencia sin añadir matices no presentes. Se usa «nadie» para reflejar μή τις y el tono prohibitivo.
- source_word: κατὰ μηδένα τρόπον
  english_pob_choice: in any way
  chosen_spanish: de ninguna manera
  alternatives_spanish:
  - en ninguna forma
  - por ningún medio
  lexicon: BDAG
  rationale: El modismo intensifica la prohibición. «De ninguna manera» transmite con claridad que no se acepte ninguna clase de engaño y suena natural en español bíblico contemporáneo.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Aquí introduce la razón de la advertencia. «Porque» expresa la relación causal de modo directo y claro en español.
- source_word: ἡ ἀποστασία
  english_pob_choice: the rebellion
  chosen_spanish: la rebelión
  alternatives_spanish:
  - la apostasía
  - la caída
  lexicon: BDAG
  rationale: ἀποστασία puede abarcar rebelión, revuelta o apostasía. Se conserva el sentido amplio con «rebelión», siguiendo la decisión inglesa de no cerrar prematuramente el debate a una sola lectura teológica. «Apostasía» queda como alternativa válida y tradicional.
- source_word: πρῶτον
  english_pob_choice: first
  chosen_spanish: primero
  alternatives_spanish:
  - antes
  - en primer lugar
  lexicon: BDAG
  rationale: Marca secuencia temporal. «Primero» es la forma más directa y natural en español.
- source_word: ἀποκαλυφθῇ
  english_pob_choice: is revealed
  chosen_spanish: sea revelado
  alternatives_spanish:
  - sea manifestado
  - sea dado a conocer
  lexicon: BDAG
  rationale: El pasivo indica que esta figura es hecha visible o manifestada. «Sea revelado» conserva el matiz apocalíptico y funciona bien en español formal.
- source_word: ὁ ἄνθρωπος τῆς ἀνομίας
  english_pob_choice: the man of lawlessness
  chosen_spanish: el hombre de la anarquía
  alternatives_spanish:
  - el hombre de la maldad
  - el hombre de la iniquidad
  lexicon: BDAG
  rationale: ἀνομία se refiere a ausencia o desprecio de ley; en español, «anarquía» comunica con fuerza la idea de falta de ley, aunque en uso común puede sonar más político. Se elige para preservar la fuerza lexical del griego, sin sustituirla por un término devocional más suave. «Maldad» o «iniquidad» serían menos precisos o más tradicionales.
- source_word: ὁ υἱὸς τῆς ἀπωλείας
  english_pob_choice: the son of destruction
  chosen_spanish: el hijo de la destrucción
  alternatives_spanish:
  - el hijo de perdición
  - el destinado a la destrucción
  lexicon: BDAG
  rationale: La expresión semítica se conserva de manera bastante literal. «Destrucción» mantiene la forma del griego y es comprensible; «perdición» es tradicional, pero menos transparente para lectores modernos.
theological_decisions:
- issue: Sentido de ἀποστασία
  english_pob_reading: Rendered broadly as 'the rebellion'
  chosen_spanish_reading: la rebelión
  alternative_spanish_readings:
  - la apostasía
  - la caída
  rationale: Se mantiene la amplitud semántica del término para no resolver de antemano una discusión escatológica. La nota preserva la alternativa «apostasía», que sigue siendo una lectura posible y teológicamente relevante.
  doctrine_reference: Translation philosophy §3
- issue: Lectura textual de τῆς ἀνομίας
  english_pob_reading: 'Followed SBLGNT: ''of lawlessness'''
  chosen_spanish_reading: de la anarquía
  alternative_spanish_readings:
  - de la iniquidad
  - de la maldad
  rationale: El texto base leído es ἀνομίας, por lo que se traduce directamente con un equivalente que conserve la idea de falta de ley. Se evita sustituirlo por la variante tradicional «sin»/«pecado» porque no pertenece al texto fuente dado.
  doctrine_reference: Translation philosophy §4
- issue: Sujeto implícito de 'no vendrá'
  english_pob_reading: Explicitly supplied 'that day' in English
  chosen_spanish_reading: ese día
  alternative_spanish_readings:
  - ese momento
  - el día del Señor
  rationale: El referente queda implícito por el contexto inmediato y se expone en español para evitar ambigüedad. «Ese día» mantiene la referencia contextual sin añadir una glosa doctrinal no presente en el versículo.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'El texto fuente y el audit trail inglés coinciden en el sentido global: advertencia contra el engaño, la necesidad de la rebelión previa y la revelación del hombre de lawlessness. Se conservó la tensión semántica de ἀποστασία con una nota alternativa, y se siguió el texto SBLGNT en ἀνομίας, dejando constancia del conocido variante manuscrita. No se aplicaron revisiones previas adicionales.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma por defecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se eligió «rebelión» para ἀποστασία y se dejó «apostasía» en nota para coherencia con el criterio del proyecto.
  - Se usó «anarquía» para ἀνομία por fidelidad lexical; si en contextos futuros se requiere mayor naturalidad estilística, deberá justificarse caso por caso.
  - «Destrucción» conserva la metáfora de υἱὸς τῆς ἀπωλείας sin suavizarla a un término eclesiástico tradicional.
