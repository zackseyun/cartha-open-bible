translation:
  language: es
  text: el que se opone y se exalta sobre todo lo que se llama dios o objeto de culto, de modo que se sienta en el templo de Dios[a], presentándose a sí mismo como Dios[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «santuario de Dios» para «templo de Dios».
    reason: lexical_alternative
  - marker: b
    text: O «presentándose a sí mismo como un dios».
    reason: alternative_reading
lexical_decisions:
- source_word: ἀντικείμενος
  english_pob_choice: the one who opposes
  chosen_spanish: el que se opone
  alternatives_spanish:
  - el opositor
  - el que se enfrenta
  lexicon: BDAG
  rationale: El participio con artículo funciona sustantivamente; en español, «el que se opone» conserva la acción continua de oposición sin convertirlo en un título técnico.
- source_word: ὑπεραιρόμενος
  english_pob_choice: exalts himself over
  chosen_spanish: se exalta sobre
  alternatives_spanish:
  - se eleva por encima de
  - se engrandece sobre
  lexicon: BDAG
  rationale: La forma media comunica autoexaltación. «Se exalta sobre» es natural en español y mantiene la fuerza reflexiva.
- source_word: ἐπὶ πάντα λεγόμενον θεὸν
  english_pob_choice: over every so-called god
  chosen_spanish: sobre todo lo que se llama dios
  alternatives_spanish:
  - sobre todo dios así llamado
  - sobre todo llamado dios
  lexicon: BDAG
  rationale: «λεγόμενον» pide una expresión de designación, no de afirmación ontológica. «Todo lo que se llama dios» preserva esa tensión y suena más natural que un calco rígido.
- source_word: σέβασμα
  english_pob_choice: object of worship
  chosen_spanish: objeto de culto
  alternatives_spanish:
  - objeto de adoración
  - objeto de veneración
  lexicon: BDAG
  rationale: El término abarca un objeto de reverencia religiosa en general. «Objeto de culto» es claro y mantiene la amplitud sin precisar indebidamente el tipo de devoción.
- source_word: εἰς τὸν ναὸν τοῦ θεοῦ
  english_pob_choice: in the temple of God
  chosen_spanish: en el templo de Dios
  alternatives_spanish:
  - en el santuario de Dios
  lexicon: BDAG
  rationale: ναός puede referirse al templo o al santuario; aquí «templo de Dios» es la opción más transparente y concordante con el uso común en español, sin cerrar la lectura interpretativa.
- source_word: καθίσαι
  english_pob_choice: takes his seat
  chosen_spanish: se sienta
  alternatives_spanish:
  - toma asiento
  - se coloca sentado
  lexicon: BDAG
  rationale: El infinitivo aoristo tras ὥστε expresa resultado. En español, «se sienta» comunica el acto de asentarse; no se añadió una imagen más interpretativa que el griego no exige.
- source_word: ἀποδεικνύντα ἑαυτὸν
  english_pob_choice: displaying himself
  chosen_spanish: presentándose a sí mismo
  alternatives_spanish:
  - mostrándose a sí mismo
  - demostrando ser
  lexicon: BDAG
  rationale: El participio indica hacer visible o demostrar la propia identidad. «Presentándose a sí mismo» evita sobrecargar con una afirmación verbal explícita y conserva la autopresentación pública.
- source_word: ὅτι ἔστιν θεός
  english_pob_choice: as being God
  chosen_spanish: como Dios
  alternatives_spanish:
  - que es Dios
  - como un dios
  lexicon: BDAG
  rationale: En este contexto la autoafirmación es máxima y blasfema; «como Dios» conserva la fuerza del reclamo. La posible lectura «como un dios» queda preservada en nota porque el griego anartro permite esa tensión.
theological_decisions:
- issue: 'Cómo rendir θεός final: «Dios» o «un dios»'
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - un dios
  rationale: 'El contexto lo presenta como una pretensión suprema: se sienta en el templo de Dios y se muestra como Dios. En español, «Dios» reproduce mejor la intensidad blasfema del reclamo; la alternativa anartrónica «un dios» se conserva para no borrar la ambigüedad léxica del original.'
  doctrine_reference: Preservar la tensión lexical y teológica del original; primacía del texto fuente sobre la tradición traductora.
- issue: Cómo traducir ναός sin resolver la discusión interpretativa
  english_pob_reading: temple of God
  chosen_spanish_reading: templo de Dios
  alternative_spanish_readings:
  - santuario de Dios
  rationale: «Templo de Dios» es la forma más clara y natural en español. «Santuario» es posible, pero puede estrechar demasiado el alcance del término y dar por resuelta una cuestión interpretativa que el griego deja abierta.
  doctrine_reference: Equivalencia óptima; mantener abierta la tensión interpretativa del pasaje.
translation_notes:
  revision_awareness: Se revisó el pasaje contra el griego SBLGNT y el rastro auditado en inglés. La versión final mantiene la oposición, la autoexaltación, la amplitud de σέβασμα y la ambigüedad de θεός sin mecanizar el inglés.
  spanish_consistency_notes:
  - Se prefirió «Dios» para θεός final, manteniendo en nota la posibilidad anartrónica «un dios».
  - Se optó por «templo de Dios» como equivalencia principal de ναός, con «santuario de Dios» como alternativa.
  - «Objeto de culto» se usa para σέβασμα por ser más natural en español que «objeto de adoración», sin perder el rango semántico.
  - La formulación «se opone / se exalta» conserva los participios sustantivados y la acción continua del griego.
