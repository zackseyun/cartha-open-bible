translation:
  language: es
  text: y con todo engaño[a] de injusticia para los que perecen[b], porque no aceptaron[c] el amor de la verdad, para ser salvos[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «decepción de injusticia».
    reason: lexical_alternative
  - marker: b
    text: O «para los que están pereciendo».
    reason: lexical_alternative
  - marker: c
    text: O «no recibieron» o «no acogieron el amor de la verdad».
    reason: lexical_alternative
  - marker: d
    text: O «a fin de ser salvos».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπάτῃ
  english_pob_choice: deception
  chosen_spanish: decepción
  alternatives_spanish:
  - engaño
  - decepción
  lexicon: BDAG
  rationale: ἀπάτη expresa engaño o decepción activa. "Decepción" conserva el matiz de acción engañosa y evita suavizar demasiado el término; en español resulta comprensible y cercano al valor instrumental de ἐν.
- source_word: ἀδικίας
  english_pob_choice: of unrighteousness
  chosen_spanish: de injusticia
  alternatives_spanish:
  - de maldad
  - de iniquidad
  - injusta
  lexicon: BDAG
  rationale: El genitivo cualifica el tipo de engaño. "Injusticia" mantiene el sustantivo y el peso moral del griego; "maldad" o "iniquidad" sonarían más interpretativos o tradicionales sin necesidad textual.
- source_word: τοῖς ἀπολλυμένοις
  english_pob_choice: for those who are perishing
  chosen_spanish: para los que perecen
  alternatives_spanish:
  - para los que se pierden
  - a los que perecen
  - entre los que perecen
  lexicon: BDAG
  rationale: El participio presente expresa un estado en curso. "Perecen" conserva esa progresividad y encaja con el valor direccional de la frase; "se pierden" sería posible, pero menos directo para el verbo ἀπόλλυμι.
- source_word: ἀνθ’ ὧν
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - por lo cual
  - a causa de lo cual
  lexicon: BDAG
  rationale: La construcción introduce la razón de su perdición. "Porque" comunica con naturalidad el valor causal sin cargar el castellano con una literalidad poco fluida.
- source_word: ἀγάπην
  english_pob_choice: love
  chosen_spanish: amor
  alternatives_spanish:
  - amor
  - afecto
  lexicon: BDAG
  rationale: ἀγάπη se traduce de forma normal por "amor". Mantiene la fuerza relacional y no reduce la frase a aceptación intelectual.
- source_word: τῆς ἀληθείας
  english_pob_choice: of the truth
  chosen_spanish: de la verdad
  alternatives_spanish:
  - de la verdad
  - por la verdad
  - de la realidad
  lexicon: BDAG
  rationale: 'Se conserva el genitivo como relación objetiva: "el amor de la verdad". Esto mantiene la frase paulina sin paraphrasearla como "amor por la verdad", aunque esa lectura también sea posible en español.'
- source_word: ἐδέξαντο
  english_pob_choice: did not accept
  chosen_spanish: no recibieron
  alternatives_spanish:
  - no aceptaron
  - no acogieron
  - no recibieron ni aceptaron
  lexicon: BDAG
  rationale: δέχομαι admite recibir/aceptar/recibir con disposición. "No recibieron" preserva la alternativa lexical que la POB inglesa documenta en nota y suena natural con un objeto abstracto como "el amor de la verdad".
- source_word: εἰς τὸ σωθῆναι αὐτούς
  english_pob_choice: so as to be saved
  chosen_spanish: para ser salvos
  alternatives_spanish:
  - a fin de ser salvos
  - para que fueran salvos
  - para su salvación
  lexicon: BDAG
  rationale: La construcción final expresa propósito. "Para ser salvos" es claro y fiel; mantiene el sentido teleológico sin forzar una perífrasis más pesada.
theological_decisions:
- issue: 'Valor del grupo "τοῖς ἀπολλυμένοις": estado en curso o etiqueta decretiva'
  english_pob_reading: those who are perishing
  chosen_spanish_reading: los que perecen
  alternative_spanish_readings:
  - los condenados
  - los que se pierden
  - los que están pereciendo
  rationale: Se conserva la lectura aspectual/progresiva del participio presente. "Los que perecen" evita convertir la frase en un rótulo doctrinal cerrado y preserva la tensión teológica del texto.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Relación entre "el amor de la verdad" y la respuesta humana
  english_pob_reading: the love of the truth
  chosen_spanish_reading: el amor de la verdad
  alternative_spanish_readings:
  - amor por la verdad
  - el amor que proviene de la verdad
  rationale: La frase queda en una forma que reproduce la ambigüedad controlada del genitivo y mantiene el énfasis paulino en la verdad como objeto amado y rechazado.
  doctrine_reference: Original-language primacy over translation tradition; preserve theological tension where genuine.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que ajustó la relación de τοῖς ἀπολλυμένοις hacia un valor direccional ('for those who are perishing') sin alterar el resto del versículo. En español se reflejó con 'para los que perecen', manteniendo además la construcción causal de ἀνθ’ ὧν y el propósito de εἰς τὸ σωθῆναι αὐτούς.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' fuera de este versículo porque no aparece el tetragrámaton.
  - Se conserva el sustantivo 'amor' para ἀγάπη, conforme al criterio del proyecto y al contexto inmediato.
  - '''Injusticia'' se eligió para ἀδικίας por su valor moral y por la concordancia con la estructura nominal del griego.'
  - Se usó 'salvos' para expresar el infinitivo de propósito de modo natural en español, sin añadir vocabulario doctrinal extra.
