    text: O «no recibieron» o «no acogieron el amor de la verdad».
    reason: lexical_alternative
  - marker: d
    text: O «a fin de ser salvos».
    reason: lexical_alternative
  revision_rationale: Se ajusta el texto principal a la decisión léxica auditada para ἐδέξαντο («aceptaron») y se corrige la nota correspondiente para preservar las alternativas «recibieron/acogieron». Además, se mejora la naturalidad española cambiando «decepción» por «engaño» en el texto principal, dejando la otra opción en nota. El resto del verso se conserva por su fidelidad suficiente al griego y a la auditoría inglesa.
