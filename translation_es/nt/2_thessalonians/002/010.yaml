revisions:
- from: y con toda [a]decepción de injusticia para los que perecen[b], porque no recibieron el amor de la verdad, para ser salvos[c][d].
  to: y con todo engaño[a] de injusticia para los que perecen[b], porque no aceptaron[c] el amor de la verdad, para ser salvos[d].
  rationale: Se ajusta el texto principal a la decisión léxica auditada para ἐδέξαντο («aceptaron») y se corrige la nota correspondiente para preservar las alternativas «recibieron/acogieron». Además, se mejora la naturalidad española cambiando «decepción» por «engaño» en el texto principal, dejando la otra opción en nota. El resto del verso se conserva por su fidelidad suficiente al griego y a la auditoría inglesa.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:16:57Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: ἐν πάσῃ ἀπάτῃ ἀδικίας, τοῖς ἀπολλυμένοις, ἀνθ’ ὧν, y εἰς τὸ σωθῆναι αὐτούς están mayormente preservados. Sin embargo, hay dos desajustes con la auditoría inglesa y con la legibilidad española: (1) el texto principal usa «no recibieron» donde la POB inglesa eligió «did not accept» y dejó «receive/welcome» como alternativas; en español «aceptaron» expresa mejor la negativa culpable con un objeto abstracto; (2) la nota c repite la lectura ya puesta en el texto principal («no recibieron»), lo que deja sin reflejo en nota la alternativa principal inglesa. También «decepción» suena menos natural que «engaño» en esta construcción española.'
  spanish_quality_summary: El español es claro y digno, pero «toda decepción de injusticia» suena algo poco idiomático; «todo engaño de injusticia» fluye mejor sin perder formalidad. «Para los que perecen» es aceptable, aunque algo rígido; se mantiene por alineación con la revisión inglesa. La secuencia de notas necesita repararse para que las alternativas realmente sean alternativas y no duplicados del texto principal.
  glossary_alignment: 'No hay conflictos con la terminología doctrinal principal del proyecto. «injusticia», «amor», «verdad» y «salvos» son adecuados. La decisión sobre τοῖς ἀπολλυμένοις conserva correctamente el aspecto progresivo sin convertirlo en etiqueta decretiva. El punto a corregir es léxico-estilístico: δέχομαι debe representarse en el texto principal como «aceptaron», dejando «recibieron/acogieron» en nota, conforme a la auditoría inglesa.'
  issues:
  - severity: medium
    issue: El texto principal usa «no recibieron» para ἐδέξαντο en lugar de la opción auditada «did not accept».
    rationale: Aunque «recibieron» es posible, la POB inglesa estableció «accept» como elección principal y dejó «receive/welcome» como alternativas. En español, «no aceptaron el amor de la verdad» transmite mejor la negativa responsable.
  - severity: medium
    issue: La nota c no funciona como alternativa real porque repite la lectura del texto principal.
    rationale: 'La nota dice «O “no recibieron” o “no acogieron...”», pero el texto ya dice «no recibieron». Debe invertirse: texto principal «no aceptaron» y nota con «no recibieron / no acogieron».'
  - severity: low
    issue: «decepción de injusticia» suena menos natural en español que «engaño de injusticia».
    rationale: Ambas opciones son defendibles, pero «engaño» es más idiomático en esta combinación nominal y preserva bien ἀπάτη. Conviene dejar «decepción» como alternativa en nota.
  revised_spanish_text: y con todo engaño[a] de injusticia para los que perecen[b], porque no aceptaron[c] el amor de la verdad, para ser salvos[d].
  revised_footnotes:
  - marker: a
    text: O «decepción de injusticia».
    reason: lexical_alternative
  - marker: b
