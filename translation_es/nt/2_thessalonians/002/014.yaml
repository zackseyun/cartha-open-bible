    reason: lexical_alternative
  - marker: b
    text: O, más tradicionalmente, «Cristo».
    reason: alternative_reading
  revision_rationale: Se ajusta la apertura a un español más natural («A eso») manteniendo el valor referencial de εἰς ὃ, y se corrige el anclaje de la nota tradicional para que recaiga sobre «Mesías», que es el término al que realmente ofrece la alternativa «Cristo».
