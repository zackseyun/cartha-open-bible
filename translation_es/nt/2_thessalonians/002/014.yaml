translation:
  language: es
  text: A eso los llamó por medio de nuestro evangelio, para[a] la obtención de la gloria de nuestro Señor Jesús Mesías[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Para la obtención de la gloria» también puede entenderse como «para poseer la gloria» o «para participar de la gloria» de nuestro Señor Jesús Mesías.
    reason: lexical_alternative
  - marker: b
    text: O, más tradicionalmente, «Cristo».
    reason: alternative_reading
lexical_decisions:
- source_word: εἰς ⸀ὃ
  english_pob_choice: to which
  chosen_spanish: a lo cual
  alternatives_spanish:
  - para lo cual
  - a esto
  lexicon: BDAG
  rationale: La relación del relativo retoma el fin o meta del llamado previo. «A lo cual» mantiene el movimiento direccional del griego sin sobreespecificar el antecedente.
- source_word: ἐκάλεσεν
  english_pob_choice: he called
  chosen_spanish: los llamó
  alternatives_spanish:
  - los convocó
  - los invitó
  lexicon: BDAG
  rationale: καλέω en contexto paulino conserva el sentido de llamado eficaz o salvador, pero el texto español debe permanecer abierto y no cargar una lectura doctrinal más estrecha que la del verso mismo.
- source_word: διὰ τοῦ εὐαγγελίου ἡμῶν
  english_pob_choice: through our gospel
  chosen_spanish: por medio de nuestro evangelio
  alternatives_spanish:
  - a través de nuestro evangelio
  - mediante nuestro evangelio
  lexicon: BDAG
  rationale: διά con genitivo expresa medio o instrumento. «Por medio de» es natural en español y conserva el valor instrumental de la frase apostólica.
- source_word: εὐαγγελίου
  english_pob_choice: gospel
  chosen_spanish: evangelio
  alternatives_spanish:
  - buena noticia
  lexicon: BDAG
  rationale: «Evangelio» es el término establecido y respeta mejor su peso teológico en Pablo que una paráfrasis como «buena noticia».
- source_word: εἰς περιποίησιν
  english_pob_choice: for obtaining of
  chosen_spanish: para la obtención de
  alternatives_spanish:
  - para poseer
  - para compartir
  lexicon: BDAG
  rationale: περιποίησις puede implicar obtención, posesión o adquisición. Aquí «obtención de» conserva la finalidad y evita cerrar prematuramente la ambigüedad entre obtener y poseer.
- source_word: δόξης
  english_pob_choice: the glory
  chosen_spanish: la gloria
  alternatives_spanish:
  - gloria
  - el esplendor
  lexicon: BDAG
  rationale: El sustantivo se refiere a la gloria asociada con el Señor Jesucristo. En español, el artículo ayuda a que la frase suene natural y concreta sin añadir contenido ajeno.
- source_word: τοῦ κυρίου ἡμῶν
  english_pob_choice: of our Lord
  chosen_spanish: de nuestro Señor
  alternatives_spanish:
  - de nuestro Maestro
  lexicon: BDAG
  rationale: «Señor» preserva el valor cristológico de κύριος y coincide con el uso bíblico habitual sin perder la referencia reverente del título.
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesús Mesías
  alternatives_spanish:
  - Jesús Cristo
  lexicon: BDAG
  rationale: Se mantiene «Mesías» porque Χριστός funciona como título; así se preserva la decisión de la POB de no vaciar el contenido semántico del término en favor de una forma más tradicional pero menos transparente.
theological_decisions:
- issue: Naturaleza del llamado en Pablo
  english_pob_reading: Render ἐκάλεσεν simply as 'he called' without specifying 'effectually called' or reducing it to a mere invitation.
  chosen_spanish_reading: «los llamó» sin añadir «eficazmente» ni reducirlo a una mera invitación.
  alternative_spanish_readings:
  - los llamó eficazmente
  - los invitó
  rationale: El versículo afirma un llamado mediado por el evangelio apostólico; la traducción debe conservar esa fuerza sin importar una formulación confesional posterior ni rebajar el verbo a una simple invitación.
  doctrine_reference: Affirmations; preservar la tensión teológica sin resolverla artificialmente.
- issue: Rendición de Χριστοῦ
  english_pob_reading: Translate as 'Messiah' in the main text.
  chosen_spanish_reading: Traducir Χριστοῦ como «Mesías» en el texto principal.
  alternative_spanish_readings:
  - Cristo
  rationale: La pauta doctrinal pide «Mesías» cuando el título está en juego. Aquí el contexto mantiene el valor titular, por lo que la elección conserva la transparencia semántica.
  doctrine_reference: 'Contested terms table: Χριστός → Mesías (where title; Christ where name-like).'
translation_notes:
  revision_awareness: El audit trail inglés muestra una ida y vuelta en Χριστός/Christ/Messiah; la decisión final restaurada fue Messiah. También se afinó la frase de περιποίησις para mantener naturalidad sin perder la ambigüedad entre obtener y poseer. La versión española sigue esa decisión final y evita fijar una sola lectura de περιποίησις.
  spanish_consistency_notes:
  - Se mantiene «Mesías» de forma coherente con la política del proyecto para Χριστός cuando funciona como título.
  - «Señor» se usa para κύριος en armonía con el registro bíblico en español.
  - La construcción «por medio de nuestro evangelio» conserva el medio instrumental de διά.
  - Las notas al pie están ancladas exactamente en el texto mediante [a] y [b].
