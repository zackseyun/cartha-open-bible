revisions:
- from: Así que, hermanos[a], manténganse firmes y retengan las tradiciones que les fueron enseñadas, ya sea por palabra o por nuestra carta.
  to: Así que, hermanos[a], permanezcan firmes y aférrense a las tradiciones que les fueron enseñadas, ya sea de palabra o por nuestra carta.
  rationale: 'Se ajustan los dos imperativos para reflejar con más fidelidad y naturalidad la exhortación griega: «permanezcan firmes» para στήκετε y «aférrense a las tradiciones» para κρατεῖτε τὰς παραδόσεις. Además, «de palabra» es la expresión española más natural para el contraste con la carta escrita.'
