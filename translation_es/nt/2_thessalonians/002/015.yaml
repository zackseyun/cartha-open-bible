review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: mantiene la conclusión inferencial, el vocativo «hermanos», los dos imperativos, «tradiciones», y el contraste entre transmisión oral y escrita. Sin embargo, hay un problema de persona verbal: el griego usa imperativos de segunda persona plural activa («στήκετε», «κρατεῖτε»), mientras que «manténganse» introduce un matiz de tercera persona/ustedes con se pronominal menos directo que el paralelismo simple del original. También «retengan» suena algo menos idiomático aquí que «mantengan firmemente» o «aférrense».'
  spanish_quality_summary: El español es claro y digno, pero puede mejorarse para mayor naturalidad y paralelismo exhortativo. «Permanezcan firmes y aférrense a las tradiciones» suena más natural en español eclesial general y expresa mejor la combinación de perseverar y sujetarse firmemente. El resto del verso está bien construido y la nota es adecuada.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: «hermanos» conserva ἀδελφοί con nota inclusiva; «tradiciones» preserva παράδοσις y su carga de transmisión; «carta» es una elección natural para ἐπιστολή. No hay conflictos con glosario principal.'
  issues:
  - severity: medium
    issue: «manténganse firmes» no refleja de la manera más fiel y directa el imperativo plural activo στήκετε
    rationale: Aunque comprensible, esta forma pronominal suena menos directa que el griego y rompe un poco el paralelismo con el segundo imperativo. «Permanezcan firmes» o «estén firmes» representa mejor la exhortación continua.
  - severity: medium
    issue: «retengan las tradiciones» es menos idiomático que una formulación de adhesión firme
    rationale: κρατεῖτε aquí no se refiere tanto a retener objetos como a aferrarse o mantener firmemente una tradición recibida. «Aférrense a las tradiciones» o «mantengan firmemente las tradiciones» comunica mejor el sentido exhortativo.
  revised_spanish_text: Así que, hermanos[a], permanezcan firmes y aférrense a las tradiciones que les fueron enseñadas, ya sea de palabra o por nuestra carta.
  revised_footnotes:
  - marker: a
    text: O «hermanos y hermanas»; el griego dice «hermanos», pero probablemente se dirige a toda la congregación.
    reason: lexical_alternative
  revision_rationale: 'Se ajustan los dos imperativos para reflejar con más fidelidad y naturalidad la exhortación griega: «permanezcan firmes» para στήκετε y «aférrense a las tradiciones» para κρατεῖτε τὰς παραδόσεις. Además, «de palabra» es la expresión española más natural para el contraste con la carta escrita.'
