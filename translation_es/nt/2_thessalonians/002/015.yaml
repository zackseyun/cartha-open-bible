translation:
  language: es
  text: Así que, hermanos[a], permanezcan firmes y aférrense a las tradiciones que les fueron enseñadas, ya sea de palabra o por nuestra carta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hermanos y hermanas»; el griego dice «hermanos», pero probablemente se dirige a toda la congregación.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄρα οὖν
  english_pob_choice: So then
  chosen_spanish: Así que
  alternatives_spanish:
  - Por tanto
  - De modo que
  lexicon: BDAG
  rationale: La combinación inferencial introduce una conclusión a partir del argumento anterior. «Así que» transmite con naturalidad en español la fuerza conclusiva sin volver la frase rígida o excesivamente formal.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - amados hermanos
  lexicon: BDAG
  rationale: El vocativo plural masculino se conserva como «hermanos», siguiendo la forma del original. En español, esta forma puede abarcar a la congregación mixta; por eso se añade una nota para explicitar el posible alcance inclusivo sin reemplazar la forma fuente en el texto principal.
- source_word: στήκετε
  english_pob_choice: stand firm
  chosen_spanish: manténganse firmes
  alternatives_spanish:
  - permanezcan firmes
  - estén firmes
  lexicon: BDAG
  rationale: El imperativo pide perseverancia continua. «Manténganse firmes» comunica bien la idea de estabilidad y resistencia en español moderno, con una fuerza equivalente a «stand firm».
- source_word: κρατεῖτε
  english_pob_choice: hold fast
  chosen_spanish: retengan
  alternatives_spanish:
  - mantengan firme
  - aférrese a
  lexicon: BDAG
  rationale: κρατεῖτε implica sujetar con firmeza y no soltar. «Retengan» conserva ese sentido de adherirse con firmeza; el complemento «las tradiciones» completa la idea de apego a lo recibido.
- source_word: παραδόσεις
  english_pob_choice: traditions
  chosen_spanish: las tradiciones
  alternatives_spanish:
  - las enseñanzas
  - lo transmitido
  lexicon: BDAG
  rationale: «Tradiciones» es el equivalente más directo de παράδοσις y conserva el sentido de algo transmitido o entregado. «Enseñanzas» debilitaría esa idea de transmisión heredada.
- source_word: ἐδιδάχθητε
  english_pob_choice: you were taught
  chosen_spanish: les fueron enseñadas
  alternatives_spanish:
  - fueron instruidos
  - recibieron enseñanza
  lexicon: BDAG
  rationale: La pasiva imperfectiva se vierte con una pasiva natural en español. Aunque «tradiciones» es femenino plural, la forma pasiva mantiene el foco en los destinatarios como receptores de la instrucción apostólica.
- source_word: διὰ λόγου
  english_pob_choice: by word
  chosen_spanish: por palabra
  alternatives_spanish:
  - de palabra
  - oralmente
  lexicon: BDAG
  rationale: Aquí λόγος contrasta con la carta escrita; «por palabra» preserva la oposición breve entre transmisión oral y escrita. La alternativa «oralmente» explicita el sentido, pero atenúa el paralelismo del griego.
- source_word: δι’ ἐπιστολῆς ἡμῶν
  english_pob_choice: by our letter
  chosen_spanish: por nuestra carta
  alternatives_spanish:
  - mediante nuestra carta
  - por carta nuestra
  lexicon: BDAG
  rationale: «Nuestra carta» conserva el posesivo de ἡμῶν y el contraste con la palabra dicha. «Carta» es preferible a «epístola» en español general por claridad y naturalidad, sin perder el referente escrito.
theological_decisions:
- issue: παραδόσεις en un contexto usado en debates sobre la tradición apostólica
  english_pob_reading: traditions
  chosen_spanish_reading: las tradiciones
  alternative_spanish_readings:
  - las enseñanzas
  - lo transmitido
  rationale: El griego señala aquello que fue entregado y enseñado, tanto por vía oral como escrita. «Las tradiciones» refleja ese contenido transmitido sin ampliar el versículo hacia afirmaciones eclesiológicas posteriores que el texto no formula explícitamente.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 5
- issue: ἀδελφοί probablemente dirigido a una congregación mixta
  english_pob_reading: brothers
  chosen_spanish_reading: hermanos
  alternative_spanish_readings:
  - hermanos y hermanas
  rationale: Se mantiene la forma masculina del vocativo por fidelidad al original, pero se reconoce que en uso paulino puede abarcar a toda la comunidad. La nota resguarda esa posible inclusión sin sustituir la forma fuente.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: 'El pasaje coincide con la revisión más reciente: el texto griego, la traducción inglesa POB y el control cruzado muestran alto acuerdo, sin cambios aplicados en la última pasada.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera; este versículo no lo contiene.
  - Se mantiene la distinción entre transmisión oral («por palabra») y escrita («por nuestra carta»).
  - «Tradiciones» se conserva por la fuerza semántica de παράδοσις y por consistencia con el audit trail inglés.
  - La nota sobre «hermanos» preserva la tensión entre la forma masculina del griego y el probable alcance congregacional.
