translation:
  language: es
  text: Ahora, nuestro Señor Jesús Mesías mismo, y Dios nuestro Padre, que nos amó y nos dio aliento[a] eterno y buena esperanza por gracia,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «consuelo» o «consolación» para παράκλησις.
    reason: lexical_alternative
lexical_decisions:
- source_word: Αὐτὸς
  english_pob_choice: himself
  chosen_spanish: mismo
  alternatives_spanish:
  - él mismo
  - mismo él
  lexicon: BDAG
  rationale: El intensivo αὐτός refuerza la referencia personal de los sujetos coordinados. En español, «mismo» después del sujeto reproduce ese énfasis de manera natural y digna sin añadir explicación.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y
  - Pero
  lexicon: BDAG
  rationale: δέ introduce una transición suave hacia la oración/benedición. «Ahora» conserva el movimiento discursivo sin cargar contraste fuerte.
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: BDAG
  rationale: Se mantiene la equivalencia estándar para κύριος en este título cristológico, con el registro reverente propio del contexto.
- source_word: Ἰησοῦς Χριστός
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesucristo
  alternatives_spanish:
  - Jesús el Mesías
  - Jesús Mesías
  lexicon: BDAG
  rationale: Aunque el proyecto suele preferir «Mesías» para Χριστός como título, en español de registro bíblico y eclesial «Jesucristo» funciona como forma fija y transparente. Aquí se conserva la unidad nominal habitual del texto litúrgico, sin perder el referente cristológico.
- source_word: θεὸς ὁ πατὴρ ἡμῶν
  english_pob_choice: God our Father
  chosen_spanish: Dios nuestro Padre
  alternatives_spanish:
  - Dios, nuestro Padre
  - nuestro Dios y Padre
  lexicon: BDAG
  rationale: La apposición se vierte de modo natural como «Dios nuestro Padre», manteniendo juntos θεός y πατήρ sin sobrepuntuar la línea.
- source_word: ὁ ἀγαπήσας
  english_pob_choice: who loved
  chosen_spanish: que nos amó
  alternatives_spanish:
  - el que nos amó
  - quien nos amó
  lexicon: BDAG
  rationale: El participio articular aoristo se expresa idiomáticamente con una relativa. «Nos amó» conserva el valor de acción pasada sin sobredetallar el aspecto.
- source_word: δοὺς
  english_pob_choice: gave
  chosen_spanish: nos dio
  alternatives_spanish:
  - ha dado
  - otorgó
  lexicon: BDAG
  rationale: El aoristo coordinado con ἀγαπήσας se traduce con pasado simple para mantener la secuencia natural del griego y la claridad del español.
- source_word: παράκλησιν
  english_pob_choice: encouragement
  chosen_spanish: consuelo
  alternatives_spanish:
  - aliento
  - confortación
  - consuelo/estímulo
  lexicon: BDAG
  rationale: παράκλησις admite «consuelo», «confortación» y «aliento/encouragement». Dado el contexto de ánimo y sostén en la carta, «consuelo» comunica bien el efecto pastoral y respeta la amplitud semántica del término. Se preserva la alternativa léxica en nota.
- source_word: αἰωνίαν
  english_pob_choice: eternal
  chosen_spanish: eterno
  alternatives_spanish:
  - duradero
  - para siempre
  lexicon: BDAG
  rationale: «Eterno» es el equivalente directo y natural de αἰώνιος en este contexto, sin pérdida de alcance duradero.
- source_word: ἐλπίδα ἀγαθὴν
  english_pob_choice: good hope
  chosen_spanish: buena esperanza
  alternatives_spanish:
  - esperanza buena
  - esperanza provechosa
  lexicon: BDAG
  rationale: La combinación adjetival se vierte literalmente pero con orden natural en español. «Buena» conserva el valor positivo/beneficioso del adjetivo sin ampliar el sentido.
- source_word: ἐν χάριτι
  english_pob_choice: by grace
  chosen_spanish: por gracia
  alternatives_spanish:
  - en gracia
  - mediante gracia
  lexicon: BDAG
  rationale: ἐν se entiende aquí con matiz instrumental/causal. «Por gracia» es idiomático y comunica bien que el dar de Dios ocurre en el ámbito o medio de la gracia.
theological_decisions:
- issue: Construcción con sujeto coordinado singular y participios singulares
  english_pob_reading: Retain the Greek's singular relative-participial construction without forcing an explanatory expansion, allowing the coordinated blessing to stand while the descriptive clause is rendered once.
  chosen_spanish_reading: Mantener la construcción con participio singular y sujeto coordinado, sin añadir una expansión interpretativa.
  alternative_spanish_readings:
  - Hacer que los participios se refieran solo a Dios nuestro Padre
  - Reformular para repetir ambos sujetos como antecedente explícito de «que nos amó y nos dio»
  rationale: El griego presenta una coordinación seguida de modificadores singulares. La traducción española debe dejar visible ese fenómeno sintáctico y su peso teológico sin resolverlo por paráfrasis. La versión dada mantiene la ambigüedad controlada del original.
  doctrine_reference: Cristología alta; principios de fidelidad sintáctica del texto
- issue: Valor de παράκλησις en contexto epistolar
  english_pob_reading: encouragement
  chosen_spanish_reading: consuelo
  alternative_spanish_readings:
  - aliento
  - confortación
  - encouragement
  rationale: En español, «consuelo» abarca tanto el alivio afectivo como el sostén exhortativo. Aunque «aliento» también es posible, «consuelo» preserva mejor la amplitud de παράκλησις y su uso pastoral en la correspondencia paulina.
  doctrine_reference: Uso pastoral del lenguaje de consolación en las cartas paulinas
translation_notes:
  revision_awareness: 'Se tomó en cuenta el historial de revisiones inglés: la preferencia restaurada por «Messiah» frente a «Christ» en el texto fuente. En español, sin embargo, se optó por «Jesucristo» como forma bíblica estable y plenamente transparente para lectores hispanohablantes, sin alterar el contenido cristológico ni introducir una paráfrasis. También se consideró la elección inglesa de «encouragement» para παράκλησις; en español se seleccionó «consuelo» como equivalente funcionalmente amplio y se preservó la alternativa semántica en nota.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y «Señor» para κύριος conforme al uso del proyecto.
  - «Por gracia» conserva el matiz instrumental de ἐν χάριτι sin forzar una construcción más pesada.
  - La puntuación refleja una sola frase de bendición/oración, en línea con el griego.
  - Se evitó «SEÑOR» como máscara tipográfica; el nombre divino no aparece aquí de forma explícita.
