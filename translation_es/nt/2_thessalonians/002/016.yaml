revisions:
- from: Ahora, nuestro Señor Jesucristo mismo[a], y Dios nuestro Padre, que nos amó y nos dio consuelo eterno y buena esperanza por gracia,
  to: Ahora, nuestro Señor Jesús Mesías mismo, y Dios nuestro Padre, que nos amó y nos dio aliento[a] eterno y buena esperanza por gracia,
