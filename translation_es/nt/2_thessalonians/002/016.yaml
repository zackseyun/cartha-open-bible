    rationale: «Consuelo» es defendible, pero el expediente inglés escogió «encouragement» por el contexto de fortalecimiento en v.17. En español, «aliento» refleja mejor ese eje semántico sin perder naturalidad; las otras posibilidades pueden quedar en nota.
