translation:
  language: es
  text: que anime[a] sus corazones y los fortalezca[b] en toda buena obra y palabra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘consuele’; παρακαλέσαι también puede significar ‘consolar’ o ‘exhortar’.
    reason: lexical_alternative
  - marker: b
    text: O ‘los establezca’ o ‘los confirme’ en toda buena obra y palabra.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρακαλέσαι
  english_pob_choice: encourage
  chosen_spanish: consuele
  alternatives_spanish:
  - anime
  - exhorte
  lexicon: BDAG
  rationale: παρακαλέω puede abarcar consolar, animar o exhortar. Aquí, por el ruego de bendición tras la mención del consuelo eterno de Dios en 2:16, 'consuele' conserva bien el matiz de alivio y ánimo sin restringirlo solo a exhortación moral.
- source_word: καρδίας
  english_pob_choice: hearts
  chosen_spanish: corazones
  alternatives_spanish:
  - interior
  - mente
  lexicon: BDAG
  rationale: '''Corazones'' conserva el término antropológico bíblico καρδία y mantiene el lenguaje natural en español para el centro interior de la persona.'
- source_word: στηρίξαι
  english_pob_choice: strengthen
  chosen_spanish: los fortalezca
  alternatives_spanish:
  - los establezca
  - los confirme
  lexicon: BDAG
  rationale: στηρίζω puede significar hacer firme, establecer o confirmar. 'Fortalezca' comunica de forma natural en español el efecto de firmeza interior que pide la oración.
- source_word: ἐν παντὶ
  english_pob_choice: in every
  chosen_spanish: en toda
  alternatives_spanish:
  - en cada
  - en todo
  lexicon: BDAG
  rationale: La preposición ἐν con dativo marca la esfera o ámbito. En español, 'en toda' reproduce bien la idea distributiva de παντί con un sustantivo colectivo en singular.
- source_word: ἔργῳ
  english_pob_choice: work
  chosen_spanish: obra
  alternatives_spanish:
  - trabajo
  - acto
  lexicon: BDAG
  rationale: En español bíblico, 'obra' es una equivalencia natural para ἔργον y encaja mejor con el par 'obra y palabra' que 'trabajo', que suena más laboral que ético.
- source_word: λόγῳ
  english_pob_choice: word
  chosen_spanish: palabra
  alternatives_spanish:
  - mensaje
  - discurso
  lexicon: BDAG
  rationale: λόγος aquí se refiere de modo natural a la expresión verbal. 'Palabra' conserva la brevedad y el paralelismo con 'obra' sin perder precisión.
- source_word: ἀγαθῷ
  english_pob_choice: good
  chosen_spanish: buena
  alternatives_spanish:
  - beneficiosa
  - recta
  lexicon: BDAG
  rationale: ἀγαθός modifica tanto 'obra' como 'palabra'. 'Buena' es la opción más directa y clara en español, y mantiene el valor general del adjetivo sin sobreespecificarlo.
- source_word: ὑμῶν
  english_pob_choice: your
  chosen_spanish: sus
  alternatives_spanish:
  - vuestros
  - tus
  lexicon: BDAG
  rationale: El pronombre genitivo plural se expresa en español con el posesivo de cortesía/neutro 'sus', que funciona bien en lectura eclesial general.
theological_decisions:
- issue: Valor de παρακαλέω en una plegaria apostólica
  english_pob_reading: encourage
  chosen_spanish_reading: consuele
  alternative_spanish_readings:
  - anime
  - exhorte
  rationale: La oración pide una acción divina sobre el interior de los creyentes. 'Consuele' mantiene el campo semántico de alivio y ánimo, y no reduce el verbo al mero mandato o a la persuasión.
  doctrine_reference: Translation philosophy §6
- issue: στηρίξαι como firmeza espiritual
  english_pob_reading: strengthen
  chosen_spanish_reading: fortalezca
  alternative_spanish_readings:
  - establezca
  - confirme
  rationale: El verbo expresa el resultado deseado de ser hecho firme en la vida cristiana. 'Fortalezca' comunica esa firmeza sin perder naturalidad en español.
  doctrine_reference: Translation philosophy §6
- issue: Paralelismo entre ἔργῳ y λόγῳ
  english_pob_reading: work and word
  chosen_spanish_reading: obra y palabra
  alternative_spanish_readings:
  - hecho y palabra
  - acto y palabra
  rationale: Conservar el binomio 'obra y palabra' respeta el paralelismo del griego y evita diluir la simetría semántica del texto.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; se mantiene la lectura óptima equivalente ya aprobada, con decisión española ajustada para naturalidad y fidelidad semántica.
  spanish_consistency_notes:
  - Se preserva el paralelismo breve 'obra y palabra' para reflejar el griego.
  - Se usa 'corazones' para καρδίας, manteniendo la antropología bíblica del texto.
  - Se evita 'SEÑOR' o términos sustitutivos porque aquí no aparece el nombre divino en el versículo.
  - '''Buena'' se aplica a ambos sustantivos implícitamente, de acuerdo con el dativo singular griego ἀγαθῷ.'
