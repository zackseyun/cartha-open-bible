revisions:
- from: para que no sean sacudidos rápidamente de su mente[a], ni alarmados, ni por un espíritu ni por una palabra ni por una carta, como si fuera de nosotros[b], en el sentido de que el día del Señor ha llegado.
  to: para que no sean sacudidos rápidamente de su mente[a], ni alarmados, ni por un espíritu ni por un mensaje ni por una carta, como si viniera de nosotros, en el sentido de que el día del Señor ha llegado[b].
  rationale: Se ajusta λόγου a «mensaje» para seguir la decisión léxica auditada y mejorar la claridad contextual; se vuelve idiomática la falsa atribución con «como si viniera de nosotros»; y se reubica la nota [b] a «ha llegado», que es donde realmente pertenece según el expediente inglés y el griego ἐνέστηκεν. Se conserva «de su mente» por fidelidad cercana al original, con alternativa en nota.
  reviewer_model: gpt-5.4
