translation:
  language: es
  text: para que no sean sacudidos rápidamente de su mente[a], ni alarmados, ni por un espíritu ni por un mensaje ni por una carta, como si viniera de nosotros, en el sentido de que el día del Señor ha llegado[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de su entendimiento».
    reason: lexical_alternative
  - marker: b
    text: O «está presente». El perfecto griego puede expresar que el día del Señor se afirma como ya presente.
    reason: alternative_reading
lexical_decisions:
- source_word: ταχέως
  english_pob_choice: quickly
  chosen_spanish: rápidamente
  alternatives_spanish:
  - pronto
  - con rapidez
  lexicon: BDAG
  rationale: El adverbio modifica la idea de ser sacudidos; «rápidamente» conserva la fuerza del aviso sin convertirlo en una referencia temporal de «pronto».
- source_word: σαλευθῆναι
  english_pob_choice: be shaken
  chosen_spanish: sean sacudidos
  alternatives_spanish:
  - sean conmovidos
  - sean perturbados
  lexicon: BDAG
  rationale: La imagen verbal de sacudimiento se mantiene en español con un pasivo natural. «Sacudidos» preserva la metáfora de inestabilidad.
- source_word: ἀπὸ τοῦ νοὸς
  english_pob_choice: from your mind
  chosen_spanish: de su mente
  alternatives_spanish:
  - de su entendimiento
  - de su juicio
  lexicon: BDAG
  rationale: En español, «mente» comunica mejor el estado mental o de comprensión al que apunta la frase; mantiene la cercanía al griego sin sonar forzado.
- source_word: θροεῖσθαι
  english_pob_choice: alarmed
  chosen_spanish: alarmados
  alternatives_spanish:
  - perturbados
  - atemorizados
  lexicon: BDAG
  rationale: El verbo expresa ser inquietados o puestos en alarma. «Alarmados» reproduce bien la fuerza emocional y el paralelismo del texto.
- source_word: πνεύματος
  english_pob_choice: a spirit
  chosen_spanish: un espíritu
  alternatives_spanish:
  - una declaración espiritual
  - una revelación profética
  lexicon: BDAG
  rationale: Se conserva el valor literal de πνεῦμα en el triángulo de posibles fuentes; la lectura interpretativa queda resguardada en nota porque el contexto admite una referencia a un supuesto mensaje espiritual.
- source_word: λόγου
  english_pob_choice: a message
  chosen_spanish: una palabra
  alternatives_spanish:
  - un mensaje
  - una comunicación oral
  lexicon: BDAG
  rationale: El griego λόγος contrasta con la carta y puede abarcar una comunicación verbal. «Palabra» mantiene la amplitud semántica del original mejor que una especificación demasiado estrecha.
- source_word: ἐπιστολῆς
  english_pob_choice: a letter
  chosen_spanish: una carta
  alternatives_spanish:
  - una epístola
  lexicon: BDAG
  rationale: «Carta» es el equivalente natural y directo para correspondencia escrita; evita el registro más eclesiástico de «epístola».
- source_word: ὡς δι’ ἡμῶν
  english_pob_choice: as if from us
  chosen_spanish: como si fuera de nosotros
  alternatives_spanish:
  - como si viniera de nosotros
  - como si procediera de nosotros
  lexicon: BDAG
  rationale: La frase deja ver una atribución falsa. «Como si fuera de nosotros» es idiomático en español y conserva la idea de procedencia atribuida indebidamente.
- source_word: ἐνέστηκεν
  english_pob_choice: has come
  chosen_spanish: ha llegado
  alternatives_spanish:
  - está presente
  - ya está aquí
  lexicon: BDAG
  rationale: El perfecto puede expresar que algo ya se ha hecho presente. «Ha llegado» comunica de forma natural la afirmación errónea sobre el día del Señor, y la alternativa más literal queda en nota.
- source_word: ἡμέρα τοῦ κυρίου
  english_pob_choice: the day of the Lord
  chosen_spanish: el día del Señor
  alternatives_spanish:
  - el día de Yahvé
  lexicon: BDAG
  rationale: Se conserva la expresión escatológica establecida; aunque el proyecto suele usar «Yahvé» para el nombre divino, aquí el texto griego cita la fórmula fija «κύριος», por lo que «Señor» es la forma más reconocible y fiel al giro textual del pasaje.
theological_decisions:
- issue: Alcance de ἐνέστηκεν en la afirmación escatológica
  english_pob_reading: has come
  chosen_spanish_reading: ha llegado
  alternative_spanish_readings:
  - está presente
  - ya está aquí
  rationale: El perfecto presenta el día del Señor como ya introducido en la situación del hablante. «Ha llegado» traduce con claridad esa afirmación de presencia consumada; la lectura más literal «está presente» se conserva como posibilidad interpretativa.
  doctrine_reference: 'Contested terms: κύριος → Señor; Translation philosophy #3'
- issue: Sentido de πνεύματος en la tríada de posibles fuentes
  english_pob_reading: a spirit
  chosen_spanish_reading: un espíritu
  alternative_spanish_readings:
  - una declaración espiritual
  - una revelación profética
  rationale: La formulación griega, junto con «palabra» y «carta», apunta a una supuesta fuente espiritual o profética. La traducción principal mantiene la literalidad, sin decidir de manera definitiva por una paráfrasis interpretativa.
  doctrine_reference: 'Translation philosophy #3'
translation_notes:
  revision_awareness: Tomé en cuenta la revisión más reciente del POB en inglés, especialmente el ajuste de la cláusula final a «to the effect that», reflejado en español con «en el sentido de que» para evitar ambigüedad y conservar precisión. También mantuve la estructura de advertencia negativa y el trípode «espíritu / palabra / carta» según el audit trail, sin suavizar la tensión semántica entre la literalidad de πνεύματος y su posible lectura como revelación profética.
  spanish_consistency_notes:
  - Usé «Señor» en «el día del Señor» porque el griego cita la fórmula fija κύριος; no se trata aquí de sustituir un nombre divino subyacente por «Yahvé» en el texto principal.
  - Mantuve «un espíritu» y no lo expandí a «Espíritu Santo», porque el contexto compara tres posibles fuentes de información y no identifica explícitamente al Espíritu Santo.
  - Elegí «palabra» para λόγου conforme a la amplitud del griego y a la triada del pasaje; «mensaje» sería válido, pero menos literal en esta construcción.
  - La frase «como si fuera de nosotros» conserva la atribución falsa implícita en δι’ ἡμῶν sin introducir una explicación más larga que el texto no exige.
  - «En el sentido de que» refleja mejor ὡς ὅτι que una simple subordinada causal o comparativa en español.
