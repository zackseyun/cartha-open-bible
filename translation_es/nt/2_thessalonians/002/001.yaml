translation:
  language: es
  text: Ahora les pedimos, hermanos[a], respecto de la venida de nuestro Señor Jesús Mesías[b] y de nuestra reunión hacia él,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hermanos» es la forma de tratamiento de Pablo; en contexto, probablemente se dirige a toda la comunidad creyente.
    reason: lexical_alternative
  - marker: b
    text: O «Jesucristo». El título griego Χριστός se traduce aquí como «Mesías» para preservar su sentido.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἐρωτῶμεν
  english_pob_choice: we ask
  chosen_spanish: les rogamos
  alternatives_spanish:
  - les pedimos
  - les solicitamos
  - les suplicamos
  lexicon: BDAG; sentido epistolar de ἐρωτάω
  rationale: En español, «rogamos» conserva el tono pastoral y deferente del verbo griego en una exhortación fraterna. «Les pedimos» sería más neutro, pero pierde un poco la calidez implícita; «suplicamos» sonaría demasiado intenso para este contexto.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y
  - Pero
  - Pues
  lexicon: BDAG
  rationale: Aquí δέ marca transición discursiva. «Ahora» reproduce ese giro sin introducir una oposición fuerte y suena natural en español.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - hermanos/as
  - familia
  lexicon: BDAG
  rationale: Se mantiene la forma masculina vocativa del texto fuente como en la POB inglesa. En español, «hermanos» es la fórmula eclesial natural y puede abarcar a toda la comunidad; no se expande en el texto principal para no borrar la forma gramatical del original.
- source_word: ὑπὲρ
  english_pob_choice: concerning
  chosen_spanish: respecto de
  alternatives_spanish:
  - acerca de
  - sobre
  - en cuanto a
  lexicon: BDAG
  rationale: Con este genitivo, ὑπέρ introduce el tema del que se habla. «Respecto de» es claro, formal y evita el matiz benefactivo de «por».
- source_word: παρουσίας
  english_pob_choice: coming
  chosen_spanish: venida
  alternatives_spanish:
  - presencia
  - llegada
  lexicon: BDAG
  rationale: Aunque παρουσία puede significar «presencia», en contexto escatológico de Jesús designa su advenimiento. «Venida» conserva esa referencia futura y es una opción natural y reverente en español.
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: BDAG
  rationale: «Señor» es la equivalencia estable y adecuada para κύριος en este título cristológico. Mantiene la fuerza de autoridad y la resonancia bíblica sin necesidad de parafrasear.
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesús Mesías
  alternatives_spanish:
  - Jesús Cristo
  - Jesús el Mesías
  lexicon: BDAG; política POB para Χριστός
  rationale: Se conserva «Mesías» porque Χριστός funciona aquí como título. «Jesús Cristo» resultaría poco idiomático en español y «Jesús el Mesías» añade un artículo que el griego no expresa.
- source_word: ἐπισυναγωγῆς
  english_pob_choice: gathering together
  chosen_spanish: reunión
  alternatives_spanish:
  - recolección
  - junta
  - asamblea
  lexicon: BDAG
  rationale: El sustantivo indica una reunión o juntamiento hacia Cristo. «Reunión» es breve y natural; el contexto ya aporta la idea de congregación «con él», por lo que no hace falta expandir más en el cuerpo del texto.
- source_word: ἐπ’ αὐτόν
  english_pob_choice: to him
  chosen_spanish: con él
  alternatives_spanish:
  - hacia él
  - a él
  - ante él
  lexicon: BDAG
  rationale: La preposición con acusativo expresa dirección hacia Cristo, pero en español la construcción más natural con «reunión» es «con él». Esto comunica el destino relacional sin forzar una literalidad poco idiomática.
theological_decisions:
- issue: Χριστοῦ como título cristológico
  english_pob_reading: Jesus Messiah
  chosen_spanish_reading: Jesús Mesías
  alternative_spanish_readings:
  - Jesús Cristo
  rationale: La política doctrinal de la POB favorece traducir Χριστός como «Mesías» cuando funciona como título. En este versículo no se trata de un nombre fijo idiomático sino de una designación titular, por lo que «Mesías» preserva el sentido original.
  doctrine_reference: 'DOCTRINE.md: traducir títulos; conservar «Cristo» solo donde sea nombre fijo o por justificación contextual'
translation_notes:
  revision_awareness: 'El contexto auditado muestra que la POB inglesa osciló entre «Jesus Messiah» y «Jesus Christ», y luego restauró «Messiah» por política doctrinal. La presente versión sigue esa decisión, trasladándola al español como «Jesús Mesías». También preserva la coordinación sin resolverla: la venida del Señor y nuestra reunión con él quedan unidas pero no explicadas más allá de lo que el griego expresa.'
  spanish_consistency_notes:
  - «Yahvé» no aparece en este versículo.
  - Se mantiene el tratamiento fraternal en masculino plural como en el original y en la POB inglesa.
  - No se introduce una terminología eclesiástica más técnica que «reunión», para respetar la amplitud de ἐπισυναγωγή.
  - La relación entre «venida» y «reunión» se deja abierta, sin imponer un esquema escatológico adicional.
