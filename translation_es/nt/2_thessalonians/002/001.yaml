  text: Ἐρωτῶμεν δὲ ὑμᾶς, ἀδελφοί, ὑπὲρ τῆς παρουσίας τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ καὶ ἡμῶν ἐπισυναγωγῆς ἐπ’ αὐτόν,
base_translation:
  language: en
  yaml_path: translation/nt/2_thessalonians/002/001.yaml
  text: Now we ask you[a], brothers, concerning the coming of our Lord Jesus Messiah and our gathering together to him[b],
  footnotes:
