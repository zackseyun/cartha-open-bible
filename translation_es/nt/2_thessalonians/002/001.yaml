review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura general del versículo y acierta en decisiones clave como «venida», «Señor» y «Jesús Mesías». Sin embargo, no preserva fielmente dos matices importantes del griego y del rastro de auditoría POB: ἐρωτῶμεν aquí se alinea mejor con «pedimos» que con «rogamos», ya que el inglés auditado fijó «we ask» para una apelación pastoral suave, y ἐπ’ αὐτόν significa orientación/movimiento «a/hacia él», no «con él». Además, el pie de nota inglés sobre el alcance inclusivo de «brothers» no fue preservado, mientras que el borrador añadió una nota sobre «con él» que justifica una desviación del sentido fuente.'
  spanish_quality_summary: El español es fluido y eclesialmente legible. No obstante, «les rogamos» suena algo más intenso de lo necesario, y «nuestra reunión con él» puede sugerir compañía más que reunión dirigida hacia Cristo. «Nuestro encuentro con él» sería natural, pero se aleja de la decisión POB sobre ἐπισυναγωγή como «gathering together»; por eso conviene mantener «nuestra reunión[a] hacia él» o mejor «nuestra reunión con él» solo si se nota la pérdida, lo cual aquí no es aceptable en texto principal. Una formulación más fiel y todavía natural es «nuestra reunión junto a él»? Aun así, la orientación direccional se conserva mejor con «hacia él».
  glossary_alignment: Buena alineación con la terminología del proyecto en «Jesús Mesías» y «Señor». Falta, sin embargo, la nota exigida por la auditoría sobre «hermanos» como vocativo posiblemente inclusivo. También conviene mantener una nota alternativa para «Jesucristo», reflejando la nota inglesa sobre Χριστός.
  issues:
  - severity: medium
    issue: «les rogamos» intensifica ἐρωτῶμεν más de lo que indica la decisión POB
    rationale: La auditoría inglesa fijó «we ask» frente a opciones más fuertes como «urge» o «beseech». En español, «les pedimos» reproduce mejor esa apelación pastoral suave; «rogamos» suena más suplicante.
  - severity: high
    issue: «con él» no preserva el sentido de ἐπ’ αὐτόν
    rationale: La construcción griega expresa dirección/orientación hacia Cristo («to him» en la POB inglesa). «Con él» cambia el matiz a compañía o asociación y suaviza un detalle semántico importante del original.
  - severity: medium
    issue: Falta la nota sobre el alcance inclusivo de «hermanos»
    rationale: La POB inglesa conserva «brothers» en el texto principal pero añade una nota aclarando que probablemente se dirige a toda la comunidad creyente. Esa razón documentada debe preservarse en español.
  - severity: low
    issue: Falta la nota alternativa tradicional «Jesucristo»/«Jesús Cristo»
    rationale: La auditoría inglesa incluye nota de alternativa tradicional para Χριστός como «Christ». En español conviene reflejarla como «Jesucristo», forma tradicional idiomática.
  revised_spanish_text: Ahora les pedimos, hermanos[a], respecto de la venida de nuestro Señor Jesús Mesías[b] y de nuestra reunión hacia él,
  revised_footnotes:
