    text: «Hermanos» es la forma de tratamiento de Pablo; en contexto, probablemente se dirige a toda la comunidad creyente.
    reason: lexical_alternative
  - marker: b
    text: O «Jesucristo». El título griego Χριστός se traduce aquí como «Mesías» para preservar su sentido.
    reason: alternative_reading
  revision_rationale: Se ajusta ἐρωτῶμεν a «les pedimos» para reflejar mejor la apelación pastoral suave del original y de la POB inglesa; se corrige ἐπ’ αὐτόν de «con él» a «hacia él» para conservar la orientación direccional del griego; se añade la nota inclusiva sobre «hermanos» exigida por la auditoría; y se incorpora la nota alternativa tradicional para Χριστός como «Jesucristo». No se requiere adjudicación adicional porque son correcciones claras y de bajo riesgo doctrinal.
