    text: Or 'Jesus Christ.' The Greek title Χριστός is rendered 'Messiah' here to preserve its meaning.
    reason: alternative_reading
  - marker: b
    text: '''Brothers'' is Paul''s form of address; in context he is likely addressing the whole believing community.'
    reason: lexical_alternative
