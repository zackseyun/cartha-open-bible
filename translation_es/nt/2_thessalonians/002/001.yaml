revisions:
- from: Ahora les rogamos[a], hermanos, respecto de la venida de nuestro Señor Jesús Mesías y de nuestra reunión con él[b],
  to: Ahora les pedimos, hermanos[a], respecto de la venida de nuestro Señor Jesús Mesías[b] y de nuestra reunión hacia él,
  rationale: Se ajusta ἐρωτῶμεν a «les pedimos» para reflejar mejor la apelación pastoral suave del original y de la POB inglesa; se corrige ἐπ’ αὐτόν de «con él» a «hacia él» para conservar la orientación direccional del griego; se añade la nota inclusiva sobre «hermanos» exigida por la auditoría; y se incorpora la nota alternativa tradicional para Χριστός como «Jesucristo». No se requiere adjudicación adicional porque son correcciones claras y de bajo riesgo doctrinal.
