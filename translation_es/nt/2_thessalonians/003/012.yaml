translation:
  language: es
  text: Ahora, a tales personas les mandamos y exhortamos en el Señor Jesús Mesías[a] que, trabajando con tranquilidad[b][c], coman su propio pan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el Señor Jesús Cristo». Χριστός se vierte aquí como «Mesías» porque funciona como título.
    reason: alternative_reading
  - marker: b
    text: O «en quietud». La expresión denota una manera de trabajar serena y estable, en contraste con la ociosidad perturbadora.
    reason: lexical_alternative
  - marker: c
    text: O «que, trabajando en quietud, coman».
    reason: previous_rendering
lexical_decisions:
- source_word: τοῖς δὲ τοιούτοις
  english_pob_choice: Now to such people
  chosen_spanish: Ahora, a tales personas
  alternatives_spanish:
  - Pero a tales personas
  - Ahora a tales
  lexicon: BDAG
  rationale: El dativo retoma a las personas ociosas y desordenadas del contexto. «A tales personas» conserva la referencia sin sobrecargar el español, y «Ahora» traduce δέ como transición suave.
- source_word: παραγγέλλομεν
  english_pob_choice: we command
  chosen_spanish: les mandamos
  alternatives_spanish:
  - les ordenamos
  - les instruimos
  lexicon: BDAG
  rationale: παραγγέλλω expresa mandato con autoridad; «mandamos» mantiene esa fuerza apostólica en un español claro y natural.
- source_word: καὶ παρακαλοῦμεν
  english_pob_choice: and urge
  chosen_spanish: y les exhortamos
  alternatives_spanish:
  - y les rogamos
  - y les animamos
  lexicon: BDAG
  rationale: παρακαλέω aquí añade apelación pastoral sin debilitar el mandato anterior. «Exhortamos» conserva la doble carga de autoridad y ruego, aunque es más formal que «urge».
- source_word: ἐν κυρίῳ Ἰησοῦ Χριστῷ
  english_pob_choice: in the Lord Jesus Messiah
  chosen_spanish: en el Señor Jesús Mesías
  alternatives_spanish:
  - en el Señor Jesús Cristo
  - por el Señor Jesús Mesías
  lexicon: BDAG
  rationale: Se mantiene «Señor» para κύριος y «Mesías» para Χριστός, conforme a la política del proyecto cuando Χριστός funciona como título. «En» conserva mejor el ámbito o autoridad expresado por ἐν que un instrumental «por».
- source_word: μετὰ ἡσυχίας
  english_pob_choice: with quietness
  chosen_spanish: en quietud
  alternatives_spanish:
  - con quietud
  - en silencio
  - quietamente
  lexicon: BDAG
  rationale: La expresión griega describe un modo de vida y trabajo sereno, no mero mutismo. «En quietud» preserva el sustantivo y evita una paráfrasis excesiva, aunque «con quietud» también sería posible.
- source_word: ἐργαζόμενοι
  english_pob_choice: working
  chosen_spanish: trabajando
  alternatives_spanish:
  - al trabajar
  - mientras trabajan
  lexicon: BDAG
  rationale: El participio presente se vierte de forma compacta con «trabajando», que mantiene la relación circunstancial con el mandato principal.
- source_word: τὸν ἑαυτῶν ἄρτον
  english_pob_choice: their own bread
  chosen_spanish: su propio pan
  alternatives_spanish:
  - el pan de su propio trabajo
  - su propio alimento
  lexicon: BDAG
  rationale: «Pan» conserva la metáfora concreta de ἄρτος y su valor bíblico tradicional; «su propio» refleja el posesivo enfático ἑαυτῶν.
- source_word: ἐσθίωσιν
  english_pob_choice: they should eat
  chosen_spanish: coman
  alternatives_spanish:
  - deben comer
  - puedan comer
  lexicon: BDAG
  rationale: El subjuntivo final bajo ἵνα puede expresar resultado/intención. «Coman» mantiene la economía del español y el valor exhortativo sin añadir modalización innecesaria.
theological_decisions:
- issue: Rendering of Χριστός
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: Se conserva «Mesías» porque Χριστός funciona aquí como título, no como simple nombre fijo. Esto mantiene visible la carga semántica del griego y sigue la política doctrinal del proyecto.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Mesías (where title; Cristo where name-like)'
- issue: Force of apostolic instruction
  english_pob_reading: Retain both 'command' and 'urge'
  chosen_spanish_reading: les mandamos y les exhortamos
  alternative_spanish_readings:
  - les instruimos
  - les exhortamos
  rationale: El versículo combina mandato autoritativo con apelación pastoral. Conservar ambos verbos evita suavizar indebidamente la fuerza apostólica del texto.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #6'
translation_notes:
  revision_awareness: El texto español sigue el estado más reciente del audit trail, pero restituye la terminología doctrinalmente preferida para Χριστός como «Mesías». También refleja la revisión que ajustó la frase participial para sonar natural sin perder el valor circumstancial de «trabajando quietamente».
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος y «Mesías» para Χριστός, en línea con la terminología por defecto del proyecto.
  - «En quietud»/«con quietud» se conserva como expresión nominal para no reducir el matiz a un simple adverbio.
  - «Pan» se preserva como metáfora concreta y bíblica de sustento, en vez de sustituirla por un término más general.
  - El mandato y la exhortación se distinguen mediante dos verbos en español, reflejando la doble forma verbal del griego.
