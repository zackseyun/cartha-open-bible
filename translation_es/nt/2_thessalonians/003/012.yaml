review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: mantiene los dos verbos principales («mandamos» / «exhortamos»), conserva «en el Señor Jesús Mesías» para ἐν κυρίῳ Ἰησοῦ Χριστῷ, y traduce literalmente «su propio pan». Sin embargo, «para que» introduce con más fuerza finalidad que contenido de mandato, y «trabajando en quietud» suena algo rígido en español. Además, falta la nota alternativa correspondiente al inglés POB sobre la otra posible estructuración de la frase participial.'
  spanish_quality_summary: 'El texto es mayormente claro y digno, pero «en quietud» y especialmente «trabajando en quietud» resultan algo poco idiomáticos en español bíblico natural. «Con tranquilidad» comunica mejor la idea de una manera serena y ordenada de trabajar sin reducirla a silencio. También es más fluido omitir «les» repetido en ambos verbos: «mandamos y exhortamos».'
  glossary_alignment: 'Buena alineación con la terminología del proyecto: «Señor» para κύριος, «Jesús», «Mesías» para Χριστός como título, y «pan» para ἄρτον. No hay conflicto con «Yahvé» porque no aparece el nombre divino. La decisión de mantener ambos verbos del mandato apostólico está correctamente preservada.'
  issues:
  - severity: medium
    issue: «para que» puede sonar demasiado finalista
    rationale: Tras «mandamos y exhortamos», el ἵνα aquí se entiende bien como contenido/resultante del mandato. «Que» suena más natural y cercano al valor del original y al audit trail inglés.
  - severity: medium
    issue: «trabajando en quietud» es poco natural en español
    rationale: Aunque intenta preservar el sustantivo de μετὰ ἡσυχίας, la combinación no fluye bien. «Trabajando con tranquilidad» o «tranquilamente» expresa mejor una labor serena y ordenada, en contraste con la ociosidad perturbadora.
  - severity: low
    issue: Falta una nota para la estructuración alternativa de la frase participial
    rationale: El inglés POB conserva una nota sobre la alternativa «that, working with quietness, they should eat». En español conviene preservar esa alternativa porque la revisión principal reestructura ligeramente la frase para mayor naturalidad.
  revised_spanish_text: Ahora, a tales personas les mandamos y exhortamos en el Señor Jesús Mesías[a] que, trabajando con tranquilidad[b][c], coman su propio pan.
  revised_footnotes:
  - marker: a
    text: O «en el Señor Jesús Cristo». Χριστός se vierte aquí como «Mesías» porque funciona como título.
    reason: alternative_reading
  - marker: b
    text: O «en quietud». La expresión denota una manera de trabajar serena y estable, en contraste con la ociosidad perturbadora.
    reason: lexical_alternative
  - marker: c
    text: O «que, trabajando en quietud, coman».
    reason: previous_rendering
  revision_rationale: Se ajusta ἵνα a «que» para reflejar mejor el contenido del mandato en español, se mejora la naturalidad de μετὰ ἡσυχίας ἐργαζόμενοι con «trabajando con tranquilidad», y se añade la nota que preserva la formulación más literal previamente documentada.
