  text: τοῖς δὲ τοιούτοις παραγγέλλομεν καὶ παρακαλοῦμεν ⸂ἐν κυρίῳ Ἰησοῦ Χριστῷ⸃ ἵνα μετὰ ἡσυχίας ἐργαζόμενοι τὸν ἑαυτῶν ἄρτον ἐσθίωσιν.
base_translation:
  language: en
  yaml_path: translation/nt/2_thessalonians/003/012.yaml
  text: Now to such people we command and urge in the Lord Jesus Messiah that[a], working quietly[c][b], they should eat their own bread.
  footnotes:
  - marker: a
    text: Or 'in the Lord Jesus Christ.' The Greek title Χριστός is rendered 'Messiah' here because it functions as a title.
    reason: alternative_reading
  - marker: b
    text: Or 'quietly.' The phrase means in a quiet, settled manner, in contrast to disruptive idleness.
    reason: lexical_alternative
  - marker: c
    text: Or 'that, working with quietness, they should eat'.
    reason: previous_rendering
