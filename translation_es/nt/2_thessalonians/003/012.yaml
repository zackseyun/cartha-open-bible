revisions:
- from: Ahora, a tales personas les mandamos y les exhortamos en el Señor Jesús Mesías[a], para que, trabajando en quietud[b], coman su propio pan.
  to: Ahora, a tales personas les mandamos y exhortamos en el Señor Jesús Mesías[a] que, trabajando con tranquilidad[b][c], coman su propio pan.
  rationale: Se ajusta ἵνα a «que» para reflejar mejor el contenido del mandato en español, se mejora la naturalidad de μετὰ ἡσυχίας ἐργαζόμενοι con «trabajando con tranquilidad», y se añade la nota que preserva la formulación más literal previamente documentada.
  reviewer_model: gpt-5.4
