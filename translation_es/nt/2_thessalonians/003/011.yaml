  - marker: b
    text: 'Tradicionalmente, «siendo entrometidos» o «siendo chismosos entrometidos». El griego hace un juego de palabras: no hacen ningún «trabajo», pero sí se «ocupan de más» en asuntos que no les corresponden.'
    reason: lexical_alternative
