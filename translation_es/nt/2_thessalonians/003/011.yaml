revisions:
- from: Porque oímos que algunos entre ustedes andan desordenadamente[a], sin trabajar en nada[b], sino entrometiéndose.
  to: Porque oímos que algunos entre ustedes andan desordenadamente[a], sin hacer ningún trabajo[b], sino entrometiéndose.
  rationale: Se ajusta una frase poco idiomática («sin trabajar en nada») a un español más natural y fiel («sin hacer ningún trabajo»), preservando la fuerza enfática de μηδέν. También se corrige la nota b para alinearla mejor con la auditoría inglesa y con el juego verbal del griego, sin añadir expansión interpretativa al texto principal.
  reviewer_model: gpt-5.4
