review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: ἀκούομεν γάρ = «Porque oímos», τινας... ἐν ὑμῖν = «algunos entre ustedes», περιπατοῦντας ἀτάκτως = conducta desordenada, y el contraste μηδὲν ἐργαζομένους ἀλλὰ περιεργαζομένους queda claro. Sin embargo, «sin trabajar en nada» suena menos idiomático y puede sugerir ‘no trabajar sobre ningún asunto’ más que ‘no hacer ningún trabajo en absoluto’.'
  spanish_quality_summary: El español es claro y digno, pero tiene un punto mejorable de naturalidad. «Andan desordenadamente» es aceptable aunque algo rígido; queda respaldado por la nota. El problema principal es «sin trabajar en nada[b]», que en español general suena poco natural frente a «sin hacer ningún trabajo» o «no haciendo ningún trabajo». Además, la nota b no corresponde bien al texto base inglés auditado, que preserva como alternativa tradicional «being busybodies», no «ocupándose en lo ajeno».
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. Las decisiones léxicas principales son adecuadas. Conviene alinear mejor la nota b con la auditoría inglesa y mantener el juego de palabras entre ἐργάζομαι y περιεργάζομαι de forma más idiomática en español.
  issues:
  - severity: medium
    issue: «sin trabajar en nada» es poco idiomático en español
    rationale: Aunque intenta reflejar μηδὲν ἐργαζομένους, en español natural comunica mejor «sin hacer ningún trabajo», que expresa la negación enfática sin torpeza.
  - severity: medium
    issue: La nota b no sigue de cerca la alternativa documentada en el POB inglés
    rationale: El inglés conserva «Traditionally ‘being busybodies’». La nota española cambia a «ocupándose en lo ajeno», que explica el sentido pero no preserva bien la tradición léxica documentada.
  revised_spanish_text: Porque oímos que algunos entre ustedes andan desordenadamente[a], sin hacer ningún trabajo[b], sino entrometiéndose.
