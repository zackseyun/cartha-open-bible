base_translation:
  language: en
  yaml_path: translation/nt/2_thessalonians/003/011.yaml
  text: For we hear that some among you are walking disorderly[a], doing no work at all[b], but meddling.
  footnotes:
  - marker: a
    text: Or 'walking idly' or 'living undisciplined lives.' The Greek adverb can describe behavior that is out of order or idle in relation to the community's expectations.
    reason: lexical_alternative
  - marker: b
    text: 'Traditionally ''being busybodies.'' The Greek makes a wordplay: they are ''doing no work'' yet are ''working around'' in matters that do not belong to them.'
    reason: lexical_alternative
