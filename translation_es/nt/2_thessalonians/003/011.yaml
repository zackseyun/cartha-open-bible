translation:
  language: es
  text: Porque oímos que algunos entre ustedes andan desordenadamente[a], sin hacer ningún trabajo[b], sino entrometiéndose.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «viven desordenadamente», o «andan sin disciplina». El adverbio griego puede describir una conducta fuera de orden o una vida ociosa en relación con las expectativas de la comunidad.
    reason: lexical_alternative
  - marker: b
    text: 'Tradicionalmente, «siendo entrometidos» o «siendo chismosos entrometidos». El griego hace un juego de palabras: no hacen ningún «trabajo», pero sí se «ocupan de más» en asuntos que no les corresponden.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκούομεν
  english_pob_choice: we hear
  chosen_spanish: oímos
  alternatives_spanish:
  - estamos oyendo
  - hemos oído
  lexicon: BDAG
  rationale: El presente indica un reporte actual o una noticia vigente. «Oímos» conserva ese valor de comunicación recibida sin forzar un perfecto ni una perífrasis excesiva.
- source_word: γάρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque en efecto
  lexicon: BDAG
  rationale: Introduce la explicación de la exhortación anterior. «Porque» mantiene la relación causal/explanatoria de manera natural en español.
- source_word: τινας
  english_pob_choice: some
  chosen_spanish: algunos
  alternatives_spanish:
  - ciertas personas
  - algunos de ustedes
  lexicon: BDAG
  rationale: Designa un grupo indefinido dentro de la comunidad. «Algunos» es la forma más natural y suficientemente precisa.
- source_word: περιπατοῦντας
  english_pob_choice: are walking
  chosen_spanish: andan
  alternatives_spanish:
  - viven
  - se conducen
  lexicon: BDAG
  rationale: El verbo griego funciona como idiomático de conducta o manera de vida. «Andan» preserva la metáfora sin sonar forzado en español.
- source_word: ἐν ὑμῖν
  english_pob_choice: among you
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - en medio de ustedes
  - entre ustedes mismos
  lexicon: BDAG
  rationale: Expresa ubicación dentro de la comunidad. «Entre ustedes» comunica bien la pertenencia al grupo y es idiomático.
- source_word: ἀτάκτως
  english_pob_choice: disorderly
  chosen_spanish: desordenadamente
  alternatives_spanish:
  - sin disciplina
  - fuera de orden
  - desordenados
  lexicon: BDAG
  rationale: El adverbio puede aludir a conducta fuera de orden, indisciplinada o ociosa. «Desordenadamente» conserva el alcance general sin reducirlo solo a la pereza.
- source_word: μηδὲν ἐργαζομένους
  english_pob_choice: doing no work at all
  chosen_spanish: sin trabajar en nada
  alternatives_spanish:
  - no trabajando en absoluto
  - sin hacer ningún trabajo
  lexicon: BDAG
  rationale: La frase subraya una negativa enfática al trabajo productivo. «Sin trabajar en nada» reproduce esa fuerza de manera idiomática y clara.
- source_word: ἀλλὰ
  english_pob_choice: but
  chosen_spanish: sino
  alternatives_spanish:
  - pero
  - antes bien
  lexicon: BDAG
  rationale: Hay contraste fuerte entre no trabajar y una actividad impropia. «Sino» funciona bien en español cuando la primera cláusula es negativa.
- source_word: περιεργαζομένους
  english_pob_choice: meddling
  chosen_spanish: entrometiéndose
  alternatives_spanish:
  - metiéndose en lo ajeno
  - entrometiéndose en asuntos ajenos
  - haciendo de fisgones
  lexicon: BDAG
  rationale: 'El verbo juega con ἐργάζομαι: no trabajan, pero «trabajan alrededor» en lo que no les corresponde. La revisión inglesa prefirió una forma breve; en español, «entrometiéndose» conserva el sentido verbal y la naturalidad.'
translation_notes:
  revision_awareness: La versión inglesa revisada redujo la expansión interpretativa de περιεργαζομένους a un simple «meddling». En español se preserva esa sobriedad con «entrometiéndose», sin añadir especificaciones ajenas al griego, y se mantiene la fuerza del contraste entre no trabajar y ocuparse impropiamente. También se conserva el valor amplio de ἀτάκτως sin limitarlo solo a ociosidad.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el tetragrámaton; no aplica en este versículo.
  - Se eligió «entrometiéndose» para mantener el verbo y el matiz de conducta impropia, evitando un nominalismo como «buscavidas» o una expansión demasiado interpretativa.
  - «Entre ustedes» expresa adecuadamente la referencia comunitaria de ἐν ὑμῖν sin cambiar el alcance del texto.
  - El adverbio «desordenadamente» deja abierta la tensión entre desorden, indisciplina y ociosidad, como en el audit trail inglés.
