lexical_decisions:
- source_word: χάρις
  english_pob_choice: grace
  chosen_spanish: gracia
  alternatives_spanish:
  - favor
  - don gracioso
  lexicon: BDAG
  rationale: En esta doxología paulina, χάρις conserva su sentido técnico de favor inmerecido y benevolencia eficaz; «gracia» es el equivalente natural y teológicamente preciso en español.
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: En el título cristológico, κύριος funciona como apelativo reverente de autoridad. «Señor» es el término español estándar y fiel al valor del griego.
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesús Mesías
  alternatives_spanish:
  - Jesús Cristo
  - Jesucristo
  lexicon: BDAG
  rationale: Se mantiene el nombre propio «Jesús» y se vierte Χριστός como título, «Mesías», para conservar la transparencia semántica que exige el proyecto.
- source_word: μετὰ πάντων ὑμῶν
  english_pob_choice: with all of you
  chosen_spanish: con todos ustedes
  alternatives_spanish:
  - con todos vosotros
  - esté con todos ustedes
  lexicon: BDAG
  rationale: μετά con genitivo se traduce naturalmente por «con». La forma «con todos ustedes» expresa de modo claro e inclusivo la bendición dirigida a toda la comunidad.
theological_decisions:
- issue: Renderización de Χριστοῦ en la bendición final
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: El griego conserva aquí el valor titular de Χριστός; por coherencia con la directriz del proyecto, se traduce como «Mesías» y no se oculta detrás de una forma meramente tradicionalizada.
  doctrine_reference: 'DOCTRINE.md: traducir títulos; transliterar nombres; tabla de términos en disputa para Χριστός'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; este borrador mantiene la misma solución semántica central, con ajuste de estilo al español y preservación de la transparencia titular de Χριστός.
  spanish_consistency_notes:
  - Se mantiene «Mesías» para Χριστός conforme a la política terminológica del proyecto.
  - Se usa «Señor» para κύριος en un contexto cristológico de bendición.
  - La bendición se formula en español natural con subjuntivo («esté con»), necesario para reflejar la fuerza desiderativa/benedictoria del griego.
  - «Ustedes» se emplea como registro neutral latinoamericano; el alcance comunitario de πάντων ὑμῶν queda explícito en el texto.
