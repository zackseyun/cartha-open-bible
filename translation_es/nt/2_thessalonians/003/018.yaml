review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del griego: «gracia» para χάρις, «Señor» para κυρίου, «Jesús Mesías» para Ἰησοῦ Χριστοῦ conforme a la pauta del proyecto, y «con todos ustedes» para μετὰ πάντων ὑμῶν. La bendición optativa «esté con» expresa correctamente el verbo implícito del griego.'
  spanish_quality_summary: 'El texto principal es claro, natural y digno en español. El único problema relevante está en la nota: no presenta una verdadera alternativa, porque repite exactamente el mismo texto en vez de reflejar la alternativa tradicional documentada en el rastro inglés.'
  glossary_alignment: 'Buena alineación con la terminología del proyecto: «gracia», «Señor», «Jesús», «Mesías». No hay conflicto con los valores léxicos ni teológicos documentados. La excepción necesaria es que la nota alternativa debe usar la forma tradicional «Cristo», no repetir «Mesías».'
  issues:
  - severity: medium
    issue: La nota al pie alternativa repite el texto principal en lugar de ofrecer la variante tradicional documentada.
    rationale: El rastro inglés preserva como alternativa tradicional «Jesus Christ». En español, la nota debe reflejar esa alternativa como «Jesús Cristo» o, más idiomáticamente, «Jesucristo». Repetir «Jesús Mesías» hace inútil la nota y no preserva la decisión auditada.
  revised_spanish_text: La gracia de nuestro Señor Jesús Mesías esté con todos ustedes[a].
  revised_footnotes:
  - marker: a
    text: 'O, más tradicionalmente: «La gracia de nuestro Señor Jesucristo esté con todos ustedes».'
    reason: alternative_reading
  revision_rationale: Se conserva íntegro el texto principal porque es fiel al griego y a la política terminológica del proyecto. Solo se corrige la nota al pie para que sí preserve la alternativa tradicional correspondiente a «Jesus Christ», expresada idiomáticamente en español como «Jesucristo».
