revisions:
- from: El saludo va de mi propia mano—la de Pablo—, lo cual es una señal en toda carta[a]; así escribo.
  to: El saludo es de mi propia mano—la de Pablo—, lo cual es una señal en toda carta[a]; así escribo.
  rationale: Se hizo una reparación menor para que el español suene más natural y digno sin alterar el sentido del griego ni la decisión auditada del POB. «Es de mi propia mano» expresa mejor el autógrafo personal de Pablo que «va de mi propia mano». Se mantuvo «la de Pablo» para conservar la autoidentificación enfática del genitivo Παύλου, así como «señal», «carta» y «así escribo». La nota conserva la alternativa documentada y la expresa en español más claro.
