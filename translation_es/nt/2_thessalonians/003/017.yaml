translation:
  language: es
  text: El saludo es de mi propia mano—la de Pablo—, lo cual es una señal en toda carta[a]; así escribo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «El saludo de mi propia mano—la de Pablo—, que es una señal en toda carta; así escribo». La cláusula final también puede traducirse más literalmente: «así escribo» o «de este modo escribo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀσπασμὸς
  english_pob_choice: greeting
  chosen_spanish: saludo
  alternatives_spanish:
  - greeting
  - salutación
  lexicon: BDAG
  rationale: En el contexto epistolar, ἀσπασμός denota un saludo de cierre. «Saludo» es natural en español y mantiene el valor epistolar sin recurrir a un término más eclesiástico o arcaico.
- source_word: τῇ ἐμῇ χειρὶ
  english_pob_choice: by my own hand
  chosen_spanish: de mi propia mano
  alternatives_spanish:
  - con mi mano
  - por mi mano
  lexicon: BDAG
  rationale: La dative idiomática indica autógrafo o autoría manuscrita. «De mi propia mano» comunica con claridad que Pablo escribe personalmente esta parte.
- source_word: Παύλου
  english_pob_choice: Paul's
  chosen_spanish: la de Pablo
  alternatives_spanish:
  - de Pablo
  - Pablo
  lexicon: BDAG
  rationale: El genitivo identifica la mano como la de Pablo. En español, la apposición «la de Pablo» mantiene la referencia a la mano personal sin forzar una construcción poco natural.
- source_word: ὅ
  english_pob_choice: which
  chosen_spanish: lo cual
  alternatives_spanish:
  - que
  - el cual
  lexicon: BDAG
  rationale: El relativo retoma el saludo/autógrafo anterior. «Lo cual» permite una referencia neutra y clara al conjunto de la cláusula previa.
- source_word: σημεῖον
  english_pob_choice: a sign
  chosen_spanish: una señal
  alternatives_spanish:
  - un signo
  - una marca
  lexicon: BDAG
  rationale: Aquí σημεῖον funciona como señal de autenticación. «Señal» es natural en español y conserva el sentido de marca identificadora.
- source_word: ἐν πάσῃ ἐπιστολῇ
  english_pob_choice: in every letter
  chosen_spanish: en toda carta
  alternatives_spanish:
  - en cada carta
  - en toda epístola
  lexicon: BDAG
  rationale: «Carta» reproduce el registro epistolar en español moderno mejor que «epístola». «Toda» refleja el sentido distributivo de πάσῃ.
- source_word: οὕτως γράφω
  english_pob_choice: this is how I write
  chosen_spanish: así escribo
  alternatives_spanish:
  - de este modo escribo
  - así es como escribo
  lexicon: BDAG
  rationale: οὕτως puede apuntar al modo de escribir o resumir la práctica habitual. «Así escribo» es breve, natural y mantiene la posible fuerza de fórmula autógrafa.
theological_decisions:
- issue: Función del autógrafo de Pablo como marca de autenticidad
  english_pob_reading: The verse is rendered as an authentication statement about Paul's personal handwriting in his letters.
  chosen_spanish_reading: La frase se entiende como una nota de autenticación sobre la escritura personal de Pablo en sus cartas.
  alternative_spanish_readings:
  - 'Podría leerse más estrechamente como referencia solo al saludo presente: «así escribo».'
  - Podría verse simplemente como observación estilística sin implicación de autenticación.
  rationale: El contexto inmediato («una señal en toda carta») favorece entender la cláusula como marca de autenticidad. La redacción española conserva esa tensión sin cerrarla excesivamente ni añadir doctrina ajena al texto.
  doctrine_reference: Translation philosophy §3 (preservar la tensión teológica en lugar de resolverla)
translation_notes:
  revision_awareness: Se siguió la revisión auditada que precisó la frase como «by my own hand» en lugar de «in my own hand», reflejando mejor el dativo griego de autoría manuscrita. La versión española conserva esa precisión con «de mi propia mano» y mantiene la estructura autógrafa del cierre.
  spanish_consistency_notes:
  - Se evita «SEÑOR» o terminología eclesiástica no presente en el versículo.
  - «Carta» se usa de forma consistente para ἐπιστολή por claridad moderna.
  - La puntuación con rayas reproduce la pausa enfática del autógrafo, sin añadir contenido.
  - Se conserva la posible ambigüedad de οὕτως γράφω entre modo actual y fórmula habitual.
