translation:
  language: es
  text: 'Porque aun cuando estábamos con ustedes, les mandábamos esto: si alguno no quiere[a] trabajar, tampoco coma[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice «no está dispuesto a trabajar», subrayando la falta de voluntad, no la incapacidad.
    reason: lexical_alternative
  - marker: b
    text: 'O: «ni coma»; también, «que no coma».'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ γὰρ
  english_pob_choice: For even
  chosen_spanish: Porque aun
  alternatives_spanish:
  - Porque incluso
  - Pues aun
  - Porque también
  lexicon: BDAG
  rationale: La combinación introduce una explicación con énfasis. «Porque aun» conserva el valor explicativo de γάρ y el matiz enfático de καί, sin sonar forzado en español.
- source_word: ὅτε ἦμεν πρὸς ὑμᾶς
  english_pob_choice: when we were with you
  chosen_spanish: cuando estábamos con ustedes
  alternatives_spanish:
  - cuando estábamos con vosotros
  - cuando nos hallábamos con ustedes
  - cuando estábamos presentes con ustedes
  lexicon: BDAG
  rationale: πρός con personas expresa compañía o presencia; «con ustedes» es natural en español y evita una traducción demasiado literal de «presente con».
- source_word: τοῦτο
  english_pob_choice: this
  chosen_spanish: esta instrucción
  alternatives_spanish:
  - esto
  - este mandato
  - esta orden
  lexicon: BDAG
  rationale: Aunque el demostrativo apunta al contenido siguiente, en español el antecedente se vuelve claro y natural como «esta instrucción» en el contexto del verbo de mando. Es una explicitación leve, no una paráfrasis amplia.
- source_word: παρηγγέλλομεν
  english_pob_choice: we were commanding
  chosen_spanish: les dábamos esta instrucción
  alternatives_spanish:
  - les mandábamos
  - les ordenábamos
  - les dábamos este mandato
  lexicon: BDAG
  rationale: El imperfecto sugiere acción repetida o habitual en el pasado. «Les dábamos esta instrucción» comunica esa fuerza iterativa con un registro digno y fluido; «ordenábamos» sería más rígido, y «mandábamos» menos preciso.
- source_word: εἴ τις
  english_pob_choice: if anyone
  chosen_spanish: si alguno
  alternatives_spanish:
  - si alguien
  - si cualquier persona
  - si alguno de ustedes
  lexicon: BDAG
  rationale: La expresión es indefinida y general. «Si alguno» conserva bien el alcance genérico y permite luego mantener la singularidad gramatical del mandato.
- source_word: οὐ θέλει ἐργάζεσθαι
  english_pob_choice: is not willing to work
  chosen_spanish: no quiere trabajar
  alternatives_spanish:
  - no está dispuesto a trabajar
  - no desea trabajar
  - se rehúsa a trabajar
  lexicon: BDAG
  rationale: θέλει expresa voluntad o disposición, no incapacidad. En español, «no quiere trabajar» comunica con claridad esa falta de voluntad sin endurecer el texto más de lo que el griego requiere.
- source_word: μηδὲ ἐσθιέτω
  english_pob_choice: neither let him eat
  chosen_spanish: tampoco coma
  alternatives_spanish:
  - ni coma
  - que tampoco coma
  - ni siquiera coma
  lexicon: BDAG
  rationale: El imperativo con μήδε continúa la consecuencia prohibitiva. «Tampoco coma» preserva la fuerza del mandato en español natural; el sujeto implícito mantiene la singularidad representativa del griego.
theological_decisions:
- issue: Incapacidad versus falta de voluntad para trabajar
  english_pob_reading: 'The verse addresses unwillingness, not inability: ''if anyone is not willing to work.'''
  chosen_spanish_reading: 'El versículo se refiere a la falta de voluntad, no a la incapacidad: «si alguno no quiere trabajar».'
  alternative_spanish_readings:
  - si alguno no puede trabajar
  - si alguno no está en condiciones de trabajar
  rationale: El verbo θέλει trata de voluntad. Traducirlo como incapacidad introduciría una lectura más severa y socialmente distinta de la que el texto griego afirma.
  doctrine_reference: Translation philosophy §1, §3
- issue: Mantenimiento de la singularidad representativa en el mandato final
  english_pob_reading: 'Retain gender-accurate singular with representative force: ''let him eat.'''
  chosen_spanish_reading: 'Mantener una singularidad representativa en el mandato final: «tampoco coma».'
  alternative_spanish_readings:
  - tampoco coman
  - que tampoco coma
  rationale: El griego usa un singular impersonal/representativo. El español puede reflejarlo con un verbo en tercera singular sin forzar un masculino personal explícito.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: 'El contexto auditado muestra alta concordancia con una revisión menor: se ajustó el imperfecto inglés para sonar más natural sin cambiar el sentido. La redacción española refleja ese mismo valor iterativo con «les dábamos esta instrucción».'
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico contemporáneo, sin recurrir a fórmulas eclesiásticas arcaizantes.
  - Se preservó la diferencia semántica entre voluntad e incapacidad en el verbo de querer.
  - Se evitó traducir mecánicamente la estructura griega cuando el español exige una leve explicitación ('esta instrucción').
  - La cláusula final conserva la singularidad representativa del original mediante «coma» en tercera persona singular.
