translation:
  language: es
  text: Y si alguno no obedece[a] a nuestra palabra por medio de esta carta[b], tomad nota de esa persona[c]; no os asociéis con él[d], para que se avergüence.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "atienda" o "escuche". El verbo griego puede expresar obedecer o prestar atención obediente a una instrucción.
    reason: lexical_alternative
  - marker: b
    text: O "por esta carta" o "en esta carta". La preposición griega puede indicar el medio por el cual llega la instrucción.
    reason: lexical_alternative
  - marker: c
    text: O "marcad" o "señalad". El verbo puede entenderse como reconocer, identificar o tomar nota de la persona.
    reason: lexical_alternative
  - marker: d
    text: O "no tengáis trato con él". El contexto apunta a una separación disciplinaria con propósito correctivo; compárese el v. 15, donde todavía debe ser advertido como hermano.
    reason: cross_reference
lexical_decisions:
- source_word: ὑπακούει
  english_pob_choice: does not obey
  chosen_spanish: no obedece
  alternatives_spanish:
  - no atiende
  - no escucha
  lexicon: BDAG
  rationale: ὑπακούω expresa obediencia a una instrucción o autoridad. En español, "no obedece" conserva bien la fuerza normativa del mandato apostólico y encaja con "nuestra palabra".
- source_word: τῷ λόγῳ ἡμῶν
  english_pob_choice: our word
  chosen_spanish: nuestra palabra
  alternatives_spanish:
  - nuestra instrucción
  - lo que decimos
  lexicon: BDAG
  rationale: λόγος aquí apunta al mensaje o instrucción apostólica, no a una sola frase pronunciada. "Nuestra palabra" preserva la expresión original y resulta natural en español bíblico contemporáneo.
- source_word: διὰ τῆς ἐπιστολῆς
  english_pob_choice: through this letter
  chosen_spanish: por medio de esta carta
  alternatives_spanish:
  - por esta carta
  - en esta carta
  lexicon: BDAG
  rationale: διά con genitivo indica medio o instrumento. "Por medio de" expresa con claridad que la palabra apostólica llega mediante la carta presente. "Carta" es la equivalencia natural de ἐπιστολή en español.
- source_word: σημειοῦσθε
  english_pob_choice: take note of
  chosen_spanish: señalad
  alternatives_spanish:
  - tomad nota de
  - marcad
  - observad
  lexicon: BDAG
  rationale: El imperativo medio pide identificar o marcar a la persona desobediente. "Señalad" conserva la fuerza del mandato y puede abarcar tanto notar como dejar constancia, sin sonar excesivamente técnico.
- source_word: τοῦτον
  english_pob_choice: that person
  chosen_spanish: a ése
  alternatives_spanish:
  - a esa persona
  - a éste
  lexicon: BDAG
  rationale: El demostrativo señala específicamente al individuo desobediente. "A ése" mantiene la referencia deíctica y suena natural en español, sin perder el tono directo del griego.
- source_word: μὴ συναναμίγνυσθαι αὐτῷ
  english_pob_choice: do not associate with him
  chosen_spanish: no os juntéis con él
  alternatives_spanish:
  - no os asociéis con él
  - no tengáis trato con él
  - no os mezcléis con él
  lexicon: BDAG
  rationale: συναναμίγνυμι implica asociarse o mezclarse con alguien. "No os juntéis con él" comunica una separación relacional real en español natural, conservando el matiz disciplinario sin imponer una categoría eclesiástica técnica.
- source_word: ἐντραπῇ
  english_pob_choice: he may be ashamed
  chosen_spanish: se avergüence
  alternatives_spanish:
  - sienta vergüenza
  - quede avergonzado
  - llegue a avergonzarse
  lexicon: BDAG
  rationale: ἐντρέπω en este contexto apunta a llegar a una conciencia de vergüenza con fin correctivo. "Se avergüence" preserva el propósito moral y evita convertirlo en humillación vindicativa.
- source_word: τις
  english_pob_choice: anyone
  chosen_spanish: alguno
  alternatives_spanish:
  - alguien
  - cualquiera
  lexicon: BDAG
  rationale: El indefinido es general. "Alguno" funciona bien en la construcción condicional y mantiene el alcance abierto del caso.
- source_word: αὐτῷ
  english_pob_choice: him
  chosen_spanish: él
  alternatives_spanish:
  - esa persona
  - a él
  lexicon: BDAG
  rationale: El pronombre griego es masculino singular y remite a las palabras anteriores. "Con él" conserva la referencia masculina representativa del original y fluye de manera natural en español.
theological_decisions:
- issue: Naturaleza de la medida disciplinaria expresada por μὴ συναναμίγνυσθαι αὐτῷ
  english_pob_reading: A form of social/church disassociation intended to correct a disobedient believer, not a declaration of final condemnation.
  chosen_spanish_reading: Una separación relacional o disciplinaria dentro de la comunidad, con fin correctivo, no una condena final.
  alternative_spanish_readings:
  - excomunión plena en sentido técnico
  - simple evitación casual sin dimensión comunitaria
  rationale: El contexto inmediato, especialmente 2 Tesalonicenses 3:15, muestra que la persona sigue siendo tratada como hermano y que la medida busca corregir. Por eso, "no os juntéis con él" conserva la tensión pastoral sin cargar el texto con una categoría eclesiástica posterior.
  doctrine_reference: Conservar la tensión teológica sin resolverla; no importar categorías doctrinales que el pasaje no afirma.
- issue: Fuerza final de ἐντραπῇ
  english_pob_reading: The intended result is restorative shame leading to repentance or correction.
  chosen_spanish_reading: La vergüenza buscada es correctiva y restauradora.
  alternative_spanish_readings:
  - humillación pública como fin en sí mismo
  - simple bochorno emocional
  rationale: La cláusula de propósito y el versículo siguiente indican un objetivo remedial. "Se avergüence" preserva esa finalidad sin sugerir crueldad ni rebajar la seriedad del texto.
  doctrine_reference: No introducir afirmaciones doctrinales que el texto no exige.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego de 2 Tesalonicenses 3:14 y se ajusta al trazado auditado de la POB inglesa. Se mantuvieron las opciones léxicas clave ('obedecer', 'palabra', 'por medio de esta carta', 'señalad', 'no os juntéis', 'se avergüence') y se preservó la intención correctiva de la exhortación. No se detectaron revisiones previas aplicadas en el expediente fuente.
  spanish_consistency_notes:
  - Se emplea "carta" para ἐπιστολή, coherente con el registro epistolar del pasaje.
  - Se usa el mandato en segunda persona plural ('señalad', 'no os juntéis') porque el griego presenta imperativos plurales.
  - La frase "a ése" conserva la deixis del demostrativo sin añadir una paráfrasis interpretativa.
  - '"Se avergüence" mantiene el valor de propósito de ἵνα ἐντραπῇ sin sobretraducir a humillación pública.'
  - Se evita el término técnico "excomunión" porque el contexto inmediato matiza la medida como correctiva y fraterna.
