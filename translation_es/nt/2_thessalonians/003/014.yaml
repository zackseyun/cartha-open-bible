  text: Εἰ δέ τις οὐχ ὑπακούει τῷ λόγῳ ἡμῶν διὰ τῆς ἐπιστολῆς, τοῦτον σημειοῦσθε, ⸀μὴ ⸀συναναμίγνυσθαι αὐτῷ, ἵνα ἐντραπῇ·
base_translation:
  language: en
  yaml_path: translation/nt/2_thessalonians/003/014.yaml
  text: And if anyone does not obey our word through this letter[a], take note of that person; do not associate with him[d][c][b], so that he may be ashamed.
  footnotes:
  - marker: a
    text: Or 'by this letter' or 'in this letter.' The Greek phrase can denote the means by which the instruction comes.
    reason: lexical_alternative
  - marker: b
    text: Or 'mark' or 'keep note of.'
    reason: lexical_alternative
  - marker: c
    text: Or 'do not keep company with him.'
    reason: lexical_alternative
  - marker: d
    text: 'The aim is corrective: compare v. 15, where he is still to be warned ''as a brother.'''
    reason: cross_reference
