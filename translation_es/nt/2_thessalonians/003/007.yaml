translation:
  language: es
  text: Pues ustedes mismos saben cómo deben imitarnos[a], ya que no actuamos desordenadamente entre ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más específicamente en este contexto: «no fuimos ociosos entre ustedes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: αὐτοὶ
  english_pob_choice: yourselves
  chosen_spanish: ustedes mismos
  alternatives_spanish:
  - ustedes
  - ustedes mismos
  lexicon: BDAG
  rationale: El pronombre intensivo refuerza a los destinatarios ya implícitos en el verbo «saben». «Ustedes mismos» conserva ese énfasis de forma natural en español.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque
  lexicon: BDAG
  rationale: Introduce la razón de la exhortación anterior. «Porque» expresa con claridad la relación causal en español.
- source_word: οἴδατε
  english_pob_choice: you know
  chosen_spanish: saben
  alternatives_spanish:
  - conocen
  - saben
  lexicon: BDAG
  rationale: οἶδα suele tener valor presente de conocimiento. «Saben» es idiomático y directo en español.
- source_word: πῶς
  english_pob_choice: how
  chosen_spanish: de qué manera
  alternatives_spanish:
  - cómo
  - de qué manera
  lexicon: BDAG
  rationale: Aquí introduce el modo de la imitación. «De qué manera» mantiene el matiz de modo con fluidez en español.
- source_word: δεῖ
  english_pob_choice: you ought to
  chosen_spanish: deben
  alternatives_spanish:
  - deben
  - les conviene
  - es necesario que
  lexicon: BDAG
  rationale: La revisión inglesa optó por una formulación más natural que conserva la obligación. «Deben» comunica bien la obligación/ necesidad sin sonar forzado.
- source_word: μιμεῖσθαι
  english_pob_choice: to imitate
  chosen_spanish: imitarnos
  alternatives_spanish:
  - imitarnos
  - seguir nuestro ejemplo
  lexicon: BDAG
  rationale: El verbo significa imitar o emular. «Imitarnos» conserva el vínculo verbal directo con el original y con la forma inglesa auditada.
- source_word: ἡμᾶς
  english_pob_choice: us
  chosen_spanish: nos
  alternatives_spanish:
  - nos
  - a nosotros
  lexicon: BDAG
  rationale: 'El objeto directo personal se refleja con el pronombre enclítico en español: «imitarnos».'
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: ya que
  alternatives_spanish:
  - porque
  - ya que
  lexicon: BDAG
  rationale: Marca la base explicativa de la exhortación. «Ya que» suena natural y causal en español.
- source_word: οὐκ ἠτακτήσαμεν
  english_pob_choice: we did not behave disorderly
  chosen_spanish: no nos portamos desordenadamente
  alternatives_spanish:
  - no actuamos desordenadamente
  - no vivimos desordenadamente
  - no fuimos indisciplinados
  lexicon: BDAG
  rationale: ἀτακτέω denota conducta fuera de orden o disciplina. «Portarse desordenadamente» preserva el sentido amplio de conducta, sin reducirlo en la traducción principal a «ociosos» o «perezosos».
- source_word: ἐν ὑμῖν
  english_pob_choice: among you
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - entre ustedes
  - en medio de ustedes
  lexicon: BDAG
  rationale: La expresión señala la conducta en el contexto comunitario de los destinatarios. «Entre ustedes» es la manera más natural y precisa en español.
theological_decisions:
- issue: Alcance de ἀτακτέω en el contexto inmediato
  english_pob_reading: The main text keeps the broader sense of disorderly or undisciplined conduct, while acknowledging the contextual alternative 'we were not idle among you.'
  chosen_spanish_reading: El texto principal mantiene el sentido amplio de conducta desordenada o indisciplinada, y deja constancia de la alternativa contextual «no fuimos ociosos entre ustedes».
  alternative_spanish_readings:
  - no fuimos ociosos entre ustedes
  - no actuamos sin disciplina entre ustedes
  rationale: En 2 Tesalonicenses 3 el pasaje se relaciona con la ociosidad, pero ἀτακτέω es más amplio que «ociosidad». La redacción principal evita estrechar el sentido, y la nota conserva la alternativa contextual.
  doctrine_reference: Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que sustituyó una formulación demasiado literal por «you ought to imitate» para reflejar mejor δεῖ sin perder la obligación. En español se siguió ese ajuste con «deben», manteniendo el balance entre obligación y naturalidad. También se respetó la decisión auditada de conservar en el texto principal el sentido amplio de ἀτακτέω, en vez de reducirlo a «ociosidad».
  spanish_consistency_notes:
  - Se mantiene el pronombre intensivo con «ustedes mismos» para reflejar el énfasis de αὐτοὶ.
  - «Entre ustedes» reproduce con naturalidad ἐν ὑμῖν en un marco comunitario.
  - Se evitó «siervos» o vocabulario eclesiástico no presente; el verso trata de conducta y ejemplo, no de estatus ministerial.
