    issue: “malos” para ἀτόπων es demasiado genérico
    rationale: ἄτοπος no significa simplemente “malo”; el término incluye matices como impropio, absurdo o irrazonable, y en contexto describe opositores moralmente desviados. “Malos” pierde ese perfil específico.
  - severity: medium
    issue: La nota [a] no armoniza bien con el texto principal
    rationale: La nota ofrece “de los hombres perversos” como alternativa para ἀτόπων, pero “perversos” ya se usa en el texto para πονηρῶν. Eso confunde qué término griego está siendo glosado y borra la distinción entre los dos adjetivos.
  - severity: low
    issue: El binomio “malos y perversos” resulta semánticamente cercano
    rationale: Aunque no es incorrecto, en español suena algo redundante. Una leve reparación mejora la legibilidad y refleja mejor la doble caracterización del griego.
  revised_spanish_text: y que seamos librados[a] de los hombres malvados y perversos, porque no todos tienen fe[b].
