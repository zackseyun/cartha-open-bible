    reason: lexical_alternative
  - marker: b
    text: 'O “porque no todos son fieles”. El griego dice literalmente: “porque no de todos es la fe”.'
    reason: alternative_reading
  revision_rationale: Se ajusta ἀτόπων de “malos” a “malvados” para dar mayor fuerza moral y evitar una expresión demasiado vaga, mientras se mantiene una pareja natural en español con “perversos”. También se corrige la nota [a] para que la alternativa recaiga claramente sobre el primer adjetivo griego sin duplicar “perversos” como si glosara ambos términos.
