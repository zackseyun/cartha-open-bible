translation:
  language: es
  text: y que seamos librados[a] de los hombres malvados y perversos, porque no todos tienen fe[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “de los hombres irrazonables y perversos”. El primer adjetivo griego puede significar “impropios”, “absurdos” o “irrazonables”, y en contexto se refiere a opositores moralmente desviados.
    reason: lexical_alternative
  - marker: b
    text: 'O “porque no todos son fieles”. El griego dice literalmente: “porque no de todos es la fe”.'
    reason: alternative_reading
lexical_decisions:
- source_word: ῥυσθῶμεν
  english_pob_choice: we may be delivered
  chosen_spanish: seamos librados
  alternatives_spanish:
  - seamos rescatados
  - seamos librados de
  lexicon: BDAG
  rationale: 'El aoristo pasivo subjuntivo con ἵνα expresa propósito: “que seamos librados/rescatados”. En español, “librados” comunica bien la idea de ser apartados o preservados de una amenaza hostil, sin añadir un matiz más fuerte de rescate que no exige el griego.'
- source_word: ἀτόπων
  english_pob_choice: wicked
  chosen_spanish: malos
  alternatives_spanish:
  - perversos
  - inmorales
  - desordenados
  lexicon: BDAG
  rationale: Ἄτοπος puede abarcar “impropio”, “absurdo”, “fuera de lugar” o, en contexto, personas moralmente torcidas. Aquí la POB inglesa optó por “wicked” tras revisar la naturalidad contextual. En español, “malos” es más natural como primer término y deja que “perversos” conserve la intensidad moral sin forzar un equivalente técnico.
- source_word: πονηρῶν
  english_pob_choice: evil
  chosen_spanish: perversos
  alternatives_spanish:
  - malvados
  - malos
  - malignos
  lexicon: BDAG
  rationale: Πονηρός es un término moral claro de maldad. “Perversos” permite distinguirlo de ἀτόπων y refleja bien la idea de conducta moral desviada, manteniendo la distinción semántica que el audit trail inglés también intenta preservar con dos adjetivos distintos.
- source_word: ἀνθρώπων
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - personas
  - gente
  lexicon: BDAG
  rationale: El plural masculino gramatical se refiere a opositores concretos. Siguiendo la decisión auditada de conservar la referencia masculina cuando el griego lo hace, “hombres” es la opción más fiel y mantiene la precisión del original.
- source_word: πίστις
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - fidelidad
  - confianza
  lexicon: BDAG
  rationale: El valor por defecto de πίστις es “fe”, y en este contexto la frase más natural es que no todos poseen fe. “Fidelidad” es posible en abstracto, pero aquí sería menos probable y alteraría el sentido más directo de la cláusula.
- source_word: οὐ γὰρ πάντων ἡ πίστις
  english_pob_choice: for not all have faith
  chosen_spanish: porque no todos tienen fe
  alternatives_spanish:
  - porque no de todos es la fe
  - porque no todos son fieles
  lexicon: BDAG
  rationale: 'La frase griega es elíptica; en español conviene explicitar el verbo para que la lectura sea natural: “porque no todos tienen fe”. Esto conserva el sentido de la construcción sin convertirla en una afirmación doctrinal más amplia de lo que el texto establece.'
theological_decisions:
- issue: Ambigüedad de πίστις en una cláusula elíptica
  english_pob_reading: faith
  chosen_spanish_reading: fe
  alternative_spanish_readings:
  - fidelidad
  - confianza
  rationale: La línea principal del POB inglés y su nota preservan la posibilidad alternativa, pero el contexto inmediato de oposición y hostilidad favorece la lectura de “fe” como creencia/adhesión. Se mantiene la tensión semántica en nota para no borrar el rango de πίστις.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (πίστις → faith; alternativas anotadas cuando hay ambigüedad genuina)'
translation_notes:
  revision_awareness: La versión inglesa más reciente cambió ἀτόπων de “perverse” a “wicked” por naturalidad contextual junto a “evil”. Esta propuesta sigue esa revisión al distinguir dos adjetivos en español (“malos y perversos”) y preserva la nota alternativa para el rango semántico de ἀτόπος.
  spanish_consistency_notes:
  - Se conserva “fe” para πίστις conforme al valor por defecto del proyecto; se reserva “fidelidad” para la lectura alternativa en nota.
  - Se mantiene la distinción de los dos adjetivos griegos con dos equivalentes españoles distintos, evitando colapsarlos en un solo término.
  - La estructura de finalidad con “y que” sigue el ἵνα del original y su relación con el verbo pasivo.
  - Se usa “hombres” para respetar el masculino plural griego y la decisión auditada de no neutralizar sin necesidad.
