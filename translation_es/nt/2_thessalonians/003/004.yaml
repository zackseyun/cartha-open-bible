translation:
  language: es
  text: Y tenemos confianza en el Señor con respecto a ustedes, que están haciendo y harán lo que mandamos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πεποίθαμεν
  english_pob_choice: we have confidence
  chosen_spanish: tenemos confianza
  alternatives_spanish:
  - confiamos
  - estamos seguros
  lexicon: BDAG
  rationale: El perfecto expresa un estado asentado de confianza; en español, «tenemos confianza» conserva mejor ese valor resultante que un presente simple más puntual. También suena natural y digno en registro bíblico moderno.
- source_word: ἐν κυρίῳ
  english_pob_choice: in the Lord
  chosen_spanish: en el Señor
  alternatives_spanish:
  - por el Señor
  - delante del Señor
  lexicon: BDAG
  rationale: La frase mantiene el marco teológico de la confianza situada en relación con el Señor. «En el Señor» es la equivalencia natural en español y preserva la esfera o base de la confianza sin sobreinterpretar el matiz.
- source_word: ἐφ’ ὑμᾶς
  english_pob_choice: concerning you
  chosen_spanish: con respecto a ustedes
  alternatives_spanish:
  - acerca de ustedes
  - en cuanto a ustedes
  lexicon: BDAG
  rationale: La preposición con acusativo indica el objeto o referencia de la confianza. «Con respecto a» comunica de forma formal y clara la referencia hacia los destinatarios, siguiendo la revisión inglesa que prefirió un giro más natural y formal.
- source_word: παραγγέλλομεν
  english_pob_choice: we command
  chosen_spanish: mandamos
  alternatives_spanish:
  - ordenamos
  - damos instrucciones
  lexicon: BDAG
  rationale: παραγγέλλω lleva fuerza autoritativa. «Mandamos» conserva la autoridad apostólica sin suavizarla a mera sugerencia, y funciona de manera natural en español bíblico contemporáneo.
- source_word: ποιεῖτε
  english_pob_choice: you are doing
  chosen_spanish: están haciendo
  alternatives_spanish:
  - hacen
  - están cumpliendo
  lexicon: BDAG
  rationale: El presente se expresa bien en progresivo español para reflejar la acción actual y en curso, en paralelo con el futuro inmediato del siguiente verbo.
- source_word: ποιήσετε
  english_pob_choice: will do
  chosen_spanish: harán
  alternatives_spanish:
  - seguirán haciendo
  - cumplirán
  lexicon: BDAG
  rationale: El futuro indicativo señala una expectativa de obediencia continuada. «Harán» es la forma más directa y natural, mientras que el sentido de continuidad ya queda sugerido por la coordinación con el presente.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - pues que
  - porque
  lexicon: BDAG
  rationale: Introduce el contenido de la confianza, no su causa. «Que» reproduce de forma limpia la subordinación en español.
- source_word: ἃ
  english_pob_choice: what
  chosen_spanish: lo que
  alternatives_spanish:
  - las cosas que
  - aquello que
  lexicon: BDAG
  rationale: El relativo neutro plural se refiere al contenido de lo mandado. «Lo que» es la forma más natural en español para abarcar ese objeto colectivo sin forzar el plural.
theological_decisions:
- issue: Base teológica de la confianza apostólica
  english_pob_reading: Paul's confidence is expressed as being in the Lord, not merely in the Thessalonians themselves.
  chosen_spanish_reading: La confianza está puesta en el Señor y no solo en la respuesta humana de los tesalonicenses.
  alternative_spanish_readings:
  - La confianza es simplemente acerca de los tesalonicenses.
  - La confianza descansa solo en su carácter.
  rationale: La expresión ἐν κυρίῳ sitúa la confianza dentro de la relación con el Señor; la traducción conserva esa base teológica y evita convertirla en mera evaluación humana.
  doctrine_reference: 'Translation philosophy §1, §3; Contested terms: κύριος → Señor'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que sustituyó «about you» por «concerning you» para ἐφ’ ὑμᾶς; por eso se eligió «con respecto a ustedes», manteniendo un registro formal y natural. También se preservó la fuerza autoritativa de παραγγέλλομεν y el contraste aspectual presente/futuro de ποιεῖτε / ποιήσετε.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος en este contexto, como equivalente natural del audit trail inglés «Lord».
  - Se conserva un español moderno y eclesialmente amplio, evitando arcaísmos innecesarios.
  - «Mandamos» se usa para reflejar la autoridad apostólica de παραγγέλλομεν sin diluirla en «instruimos».
