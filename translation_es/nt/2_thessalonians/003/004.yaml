  source_alignment_summary: 'El borrador español refleja fielmente el griego: πεποίθαμεν se conserva bien como «tenemos confianza»; ἐν κυρίῳ mantiene la base teológica con «en el Señor»; ἐφ’ ὑμᾶς queda bien representado por «con respecto a ustedes»; y la secuencia verbal presente/futuro en ποιεῖτε καὶ ποιήσετε se preserva con «están haciendo y harán». También mantiene correctamente ὅτι como contenido de la confianza y παραγγέλλομεν con fuerza autoritativa en «mandamos».'
