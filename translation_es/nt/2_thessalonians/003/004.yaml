  glossary_alignment: 'La terminología está alineada con las pautas del proyecto en este versículo: κύριος se traduce como «Señor» (no hay razón contextual aquí para «Yahvé»), y las demás elecciones léxicas respetan tanto el sentido fuente como las decisiones del POB en inglés. No hay conflicto con términos doctrinalmente sensibles del glosario.'
