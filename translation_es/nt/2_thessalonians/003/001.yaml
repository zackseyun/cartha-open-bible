  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego en casi todos los elementos clave: Τὸ λοιπὸν como marcador discursivo, προσεύχεσθε como exhortación, περὶ ἡμῶν como intercesión, ὁ λόγος τοῦ κυρίου, la metáfora τρέχῃ/δοξάζηται y la comparación final. Sin embargo, la colocación de ''hermanos'' altera levemente la estructura vocativa del original, donde ἀδελφοί funciona como vocativo insertado tras el marcador inicial. Además, el punto final no refleja la puntuación fuente ni la auditada, que dejan la oración abierta hacia el v. 2.'
  spanish_quality_summary: El español es claro y digno, pero mejora si se coloca 'hermanos' después de 'Por lo demás', lo que suena más natural en una apelación epistolar y refleja mejor el vocativo griego. También conviene conservar la coma final, ya que el versículo continúa sintácticamente. El resto del fraseo es legible y eclesialmente natural.
  glossary_alignment: 'La terminología concuerda con las pautas del proyecto: κύριος -> ''Señor'' es correcto aquí; ἀδελφοί -> ''hermanos'' en el texto principal con nota alternativa está bien; λόγος -> ''palabra'' y τρέχῃ -> ''corra'' preservan la decisión auditada más literal. No hay conflicto con la política de ''Yahvé'' porque el texto griego dice κύριος, no el tetragrámaton.'
  issues:
  - severity: medium
    issue: Posición de 'hermanos'
    rationale: El original tiene el vocativo ἀδελφοί inmediatamente después del marcador inicial ('Τὸ λοιπὸν ... ἀδελφοί'). En español, 'Por lo demás, hermanos, oren...' refleja mejor tanto la estructura como el tono epistolar que 'oren por nosotros, hermanos'.
  - severity: medium
    issue: Puntuación final
    rationale: El griego y el English POB conservan una coma final porque la petición continúa en el siguiente versículo. El punto final en español cierra prematuramente la sintaxis.
  revised_spanish_text: Por lo demás, hermanos, oren por nosotros, para que la palabra del Señor[a] corra y sea glorificada, así como también entre ustedes,
  revised_footnotes:
  - marker: a
