    changes_summary: Revised 'spread rapidly' to the more literal 'run' for τρέχῃ, and 'be honored' to 'be glorified' for δοξάζηται. Also retained the explicit 'also' and the source-text word order more closely with 'just as also among you.'
translation:
  language: es
  text: Por lo demás, hermanos, oren por nosotros, para que la palabra del Señor[a] corra y sea glorificada, así como también entre ustedes,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘hermanos y hermanas’; el griego dice ‘hermanos’ y puede dirigirse a toda la congregación de manera representativa.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τὸ λοιπὸν
  english_pob_choice: Finally
  chosen_spanish: Por lo demás
  alternatives_spanish:
  - Finalmente
  - En cuanto al resto
  lexicon: BDAG
  rationale: Funciona como marcador discursivo de cierre, no como referencia temporal estricta. 'Por lo demás' es natural en español y preserva el valor epistolar de transición final sin sobrecargar con un adverbio demasiado rígido.
- source_word: προσεύχεσθε
  english_pob_choice: pray
  chosen_spanish: oren
  alternatives_spanish:
  - oren continuamente
  - estén orando
  lexicon: BDAG
  rationale: El imperativo plural exhorta a la oración; en español, 'oren' es claro y reverente. No se explicita aquí el matiz durativo porque el contexto no lo exige con fuerza suficiente para forzar una perífrasis.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  lexicon: BDAG
  rationale: Se conserva el vocativo masculino plural como forma representativa del grupo congregacional. En español, 'hermanos' es idiomático y comunica el mismo registro eclesial sin expandir el texto principal.
- source_word: περὶ ἡμῶν
  english_pob_choice: for us
  chosen_spanish: por nosotros
  alternatives_spanish:
  - acerca de nosotros
  - en favor de nosotros
  lexicon: BDAG
  rationale: Con προσεύχομαι, περί + genitivo se expresa naturalmente en español como 'orar por'. 'Por nosotros' mantiene la relación normal de intercesión mejor que una versión más literal y menos natural.
- source_word: ὁ λόγος τοῦ κυρίου
  english_pob_choice: the word of the Lord
  chosen_spanish: la palabra del Señor
  alternatives_spanish:
  - la palabra de Yahvé
  - el mensaje del Señor
  lexicon: BDAG
  rationale: '''Palabra'' reproduce bien λόγος en este contexto de proclamación. ''Señor'' sigue el valor de κύριος en el uso cristológico del texto; aunque el proyecto usa ''Yahvé'' para יהוה, aquí el griego dice κύριος, por lo que ''Señor'' es la correspondencia auditada más directa.'
- source_word: τρέχῃ
  english_pob_choice: may run
  chosen_spanish: corra
  alternatives_spanish:
  - se difunda rápidamente
  - avance con rapidez
  lexicon: BDAG
  rationale: La metáfora de correr se conserva en español mediante 'corra', tal como la revisión más literal del audit trail. Aunque alude al avance veloz del mensaje, el texto griego mantiene la imagen verbal y no exige explicarla en el cuerpo principal.
- source_word: δοξάζηται
  english_pob_choice: be glorified
  chosen_spanish: sea glorificada
  alternatives_spanish:
  - sea glorificado
  - sea honrada
  lexicon: BDAG
  rationale: Se conserva el pasivo de δοξάζω con 'sea glorificada', siguiendo la decisión revisada del inglés. En español, aplicado a 'la palabra', el femenino concuerda con el sustantivo y mantiene la resonancia cultual y honorífica del verbo.
- source_word: καθὼς καὶ πρὸς ὑμᾶς
  english_pob_choice: just as also among you
  chosen_spanish: así como también entre ustedes
  alternatives_spanish:
  - justamente como también con ustedes
  - así como también junto a ustedes
  lexicon: BDAG
  rationale: La comparación se entiende mejor en español con 'entre ustedes', que comunica el ámbito de la experiencia previa en la comunidad. 'También' preserva el καί explícito del griego, y 'así como' mantiene la relación comparativa.
theological_decisions:
- issue: Alcance inclusivo de ἀδελφοί en un saludo congregacional
  english_pob_reading: brothers
  chosen_spanish_reading: hermanos
  alternative_spanish_readings:
  - hermanos y hermanas
  rationale: Se mantiene el plural masculino representativo en el texto principal, como en el audit trail inglés. En una comunidad mixta, el vocativo puede abarcar a toda la congregación sin necesidad de expandirse en la línea principal.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Metáfora del avance de la palabra en τρέχῃ
  english_pob_reading: may run
  chosen_spanish_reading: corra
  alternative_spanish_readings:
  - se difunda rápidamente
  - avance con rapidez
  rationale: 'La metáfora se conserva en vez de interpretarse de manera explicativa. Esto respeta la tensión retórica del original: la palabra es presentada como algo que corre libremente, no solo como un concepto abstracto de expansión.'
  doctrine_reference: DOCTRINE.md §optimal equivalence
- issue: δοξάζηται aplicado a 'la palabra del Señor'
  english_pob_reading: be glorified
  chosen_spanish_reading: sea glorificada
  alternative_spanish_readings:
  - sea honrada
  - sea glorificado
  rationale: Aunque en español 'glorificar' suele usarse más con Dios o Cristo, el pasivo aquí conserva la elevación reverente de la palabra del Señor, tal como el audit trail revisado. No se sustituye por 'honrada' para no rebajar la carga doxológica del verbo.
  doctrine_reference: DOCTRINE.md §Translation philosophy; lexical force of δοξάζω
- issue: κύριος en una expresión cristiana fija
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Maestro
  rationale: El griego usa κύριος, no el tetragrámaton. Por eso se mantiene 'Señor' como correspondencia directa y eclesialmente comprensible; 'Yahvé' no sería aquí una sustitución textual justificada.
  doctrine_reference: DOCTRINE.md §YHWH / κύριος policy
translation_notes:
  revision_awareness: El inglés auditado pasó de una paráfrasis más interpretativa ('spread rapidly' / 'be honored') a una formulación más literal ('run' / 'be glorified'), y la presente versión española sigue esa revisión conservando la metáfora verbal y el pasivo doxológico. También se retuvo el comparativo explícito 'also' mediante 'también'.
  spanish_consistency_notes:
  - Se emplea 'Yahvé' en el proyecto solo para יהוה; aquí el texto griego dice κύριος, por lo que 'Señor' es la forma consistente.
  - '''hermanos'' se mantiene como vocativo congregacional representativo, conforme al patrón del audit trail inglés.'
  - La puntuación y el orden general buscan ser publicables sin perder la cercanía al flujo griego.
