    reason: lexical_alternative
  revision_rationale: Se reordenó el vocativo para reflejar mejor la estructura del griego y sonar más natural en español epistolar. También se cambió el punto final por coma para mantener la continuidad sintáctica con el versículo siguiente. No fue necesario ajustar la terminología principal.
