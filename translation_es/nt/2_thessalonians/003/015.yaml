    rationale: La alternativa «consider him an enemy» corresponde a ἡγεῖσθε + ἐχθρόν, no a «hermano». Debe marcarse en la frase «consideren como enemigo» para reflejar fielmente el rastro de auditoría inglés y evitar confusión interpretativa.
  - severity: low
