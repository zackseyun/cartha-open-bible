translation:
  language: es
  text: Y no lo consideren como enemigo[a], sino amonéstenlo como a un hermano[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo consideren enemigo».
    reason: lexical_alternative
  - marker: b
    text: «Hermano» aquí se refiere a un creyente o miembro de la comunidad cristiana; el término funciona de manera representativa.
    reason: cultural_note
lexical_decisions:
- source_word: ἡγεῖσθε
  english_pob_choice: regard
  chosen_spanish: consideren
  alternatives_spanish:
  - vean
  - estimen
  - tengan por
  lexicon: BDAG
  rationale: El verbo expresa la manera de valorar o considerar a una persona; «consideren» comunica bien esa evaluación en español natural y conserva el sentido relacional de la exhortación.
- source_word: ἐχθρὸν
  english_pob_choice: enemy
  chosen_spanish: enemigo
  alternatives_spanish:
  - adversario
  - oponente
  - foe
  lexicon: BDAG
  rationale: «Enemigo» es la equivalencia directa y clara para ἐχθρός en este contexto, donde se contrasta con la corrección fraterna.
- source_word: νουθετεῖτε
  english_pob_choice: admonish
  chosen_spanish: amonéstenlo
  alternatives_spanish:
  - adviértanlo
  - corríjanlo
  - instrúyanlo
  lexicon: BDAG
  rationale: νουθετέω combina advertencia y corrección pastoral; «amonestar» conserva ese matiz mejor que un simple «advertir» o «instruir».
- source_word: ἀδελφόν
  english_pob_choice: brother
  chosen_spanish: hermano
  alternatives_spanish:
  - hermano o hermana
  - fellow believer
  lexicon: BDAG
  rationale: La forma masculina singular se mantiene como «hermano» en el texto principal, siguiendo la decisión POB de no neutralizar aquí el término, mientras el contexto comunitario se puede aclarar en nota.
- source_word: ὡς
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - igual que
  - cual
  lexicon: BDAG
  rationale: «Como» es la forma más directa y natural para marcar la categoría o manera en ambas cláusulas.
- source_word: καὶ μὴ ... ἀλλὰ
  english_pob_choice: And do not ... but ...
  chosen_spanish: Y no ... sino ...
  alternatives_spanish:
  - Y no ... pero ...
  - No ... sino ...
  lexicon: BDAG
  rationale: La correlación adversativa se expresa con claridad en español mediante «Y no ... sino ...», preservando el contraste fuerte del griego sin sobrecargar la sintaxis.
theological_decisions:
- issue: Postura disciplinaria frente a un creyente desobediente
  english_pob_reading: 'The verse distinguishes church discipline from personal hostility: the person is not to be treated as an enemy but corrected as a fellow believer.'
  chosen_spanish_reading: 'El versículo distingue la disciplina de la iglesia de la hostilidad personal: no se debe tratar a la persona como enemigo, sino corregirla como a un hermano.'
  alternative_spanish_readings:
  - El versículo podría leerse de forma más general como consejo sobre un conflicto interpersonal, no necesariamente disciplinario.
  - No lo tomen como enemigo, pero sí exhórtenlo como a un hermano.
  rationale: El contexto inmediato (3:14–15) trata de una persona dentro de la comunidad que debe ser señalada y apartada socialmente para su corrección. Por eso la traducción mantiene la tensión entre corrección real y reconocimiento fraternal continuo.
  doctrine_reference: Translation philosophy §3; afirmaciones de ortodoxia ecuménica sin sobreextensión denominacional
- issue: Valor representativo de «hermano»
  english_pob_reading: '''Brother'' here refers to a fellow believer; the term may be used representatively for a member of the Christian community.'
  chosen_spanish_reading: «Hermano» aquí se refiere a un creyente o miembro de la comunidad cristiana; el término funciona de manera representativa.
  alternative_spanish_readings:
  - hermano o hermana
  - fiel
  rationale: En español, una nota aclara el alcance representativo sin borrar la forma masculina del texto fuente, preservando tanto la literalidad como la referencia comunitaria.
  doctrine_reference: Poética y semántica comunitaria del NT; filosofía de precisión léxica de POB
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el audit trail inglés: se mantiene la contraposición fuerte entre trato hostil y corrección pastoral, sin suavizar νουθετέω ni neutralizar ἀδελφός. No hubo revisiones aplicadas en el pasaje fuente; la redacción española sigue esa lectura de alta concordancia.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, aunque este versículo no contiene el tetragrámaton.
  - Se conserva «hermano» en el texto principal, con nota explicativa sobre su valor representativo en la comunidad.
  - «Amonéstenlo» traduce el imperativo plural con objeto clítico, manteniendo el tono exhortativo y correctivo.
  - La construcción «Y no ... sino ...» refleja adecuadamente la coordinación adversativa del griego.
