  source_alignment_summary: 'El borrador transmite bien el sentido del griego: no considerar/tratar al desobediente como enemigo, sino corregirlo pastoralmente como hermano. «consideren», «enemigo» y «amonéstenlo» reflejan adecuadamente ἡγεῖσθε, ἐχθρόν y νουθετεῖτε. La nota sobre «hermano» preserva correctamente el valor representativo comunitario.'
  spanish_quality_summary: 'El español es claro y natural, pero hay un pequeño problema de anclaje y correspondencia de notas: la nota léxica inglesa se refiere a la frase verbal principal («regard/consider him as an enemy»), no a «hermano». En el borrador, ambas notas quedan ancladas al final sobre «hermano», lo que desubica la alternativa léxica. Conviene mover la nota léxica al segmento «consideren como enemigo» y dejar la nota cultural en «hermano».'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Hermano» respeta la decisión POB de no neutralizar ἀδελφόν en el texto principal; «amonéstenlo» preserva bien la fuerza de νουθετεῖτε; no aparecen términos sensibles del glosario general que requieran ajuste.
