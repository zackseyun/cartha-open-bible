translation:
  language: es
  text: Ahora, que el Señor dirija sus corazones hacia el amor de Dios y hacia la constancia del Mesías[a][b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hacia el amor por Dios»; o «hacia el amor de Dios». El genitivo griego permite estas lecturas.
    reason: alternative_reading
  - marker: b
    text: O «hacia la constancia del Mesías»; o «hacia la constancia para el Mesías». El genitivo griego es ambiguo.
    reason: alternative_reading
  - marker: c
    text: Griego «Christ»; aquí se traduce «Mesías» porque funciona como título.
    reason: lexical_alternative
lexical_decisions:
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: BDAG
  rationale: Conservo el equivalente bíblico estándar en español para κύριος. Aquí funciona como título con peso divino/cristológico; «Señor» mantiene ese alcance sin forzar una identificación más específica de la que exige el verso.
- source_word: κατευθύναι
  english_pob_choice: direct
  chosen_spanish: dirija
  alternatives_spanish:
  - guíe
  - enderece
  lexicon: BDAG
  rationale: 'El optativo expresa una petición: «que ... dirija». En español, «dirigir» conserva la idea de orientar o encaminar los corazones de manera natural y fiel al sentido del verbo.'
- source_word: καρδίας
  english_pob_choice: hearts
  chosen_spanish: corazones
  alternatives_spanish:
  - interior
  - mente
  - ser interior
  lexicon: BDAG
  rationale: «Corazones» preserva la metáfora antropológica bíblica del centro de pensamiento, voluntad y afecto. Otras opciones aclaran, pero debilitan la imagen original.
- source_word: ἀγάπην
  english_pob_choice: love
  chosen_spanish: amor
  alternatives_spanish:
  - amor
  - caridad
  lexicon: BDAG
  rationale: «Amor» es el equivalente directo y natural de ἀγάπη en este contexto. «Caridad» sería demasiado eclesiástico y menos preciso para el español actual.
- source_word: τοῦ θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - para Dios
  - de parte de Dios
  - de Dios / amor a Dios
  lexicon: BDAG
  rationale: 'Mantengo la ambigüedad del genitivo: puede referirse al amor de Dios, al amor hacia Dios, o al ámbito del amor divino. «De Dios» no resuelve la tensión interpretativa que el griego deja abierta.'
- source_word: ὑπομονὴν
  english_pob_choice: steadfastness
  chosen_spanish: constancia
  alternatives_spanish:
  - perseverancia
  - resistencia
  - paciencia perseverante
  lexicon: BDAG
  rationale: El término expresa perseverancia firme bajo presión. «Constancia» suena natural en español y conserva la idea de firmeza continua; «perseverancia» también sería posible, pero «constancia» se enlaza mejor con la petición del verso.
- source_word: τοῦ Χριστοῦ
  english_pob_choice: of Messiah
  chosen_spanish: del Mesías
  alternatives_spanish:
  - de Cristo
  - del Mesías
  - del Ungido
  lexicon: BDAG
  rationale: 'Sigo la política del proyecto de traducir Χριστός como «Mesías» cuando funciona como título. El genitivo sigue abierto: puede ser la constancia del Mesías, la constancia hacia él, o una constancia configurada por él.'
theological_decisions:
- issue: Genitivo ambiguo en τὴν ἀγάπην τοῦ θεοῦ
  english_pob_reading: Rendered literally as 'the love of God' without resolving whether it means God's love, love for God, or participation in divine love.
  chosen_spanish_reading: «el amor de Dios» sin precisar si es amor de Dios, amor hacia Dios, o el amor en esfera divina.
  alternative_spanish_readings:
  - amor por Dios
  - amor de parte de Dios
  - amor de Dios (posesivo)
  rationale: El griego es realmente abierto, y la traducción debe conservar esa tensión teológica. En el texto principal dejo la fórmula literal y en nota recojo la alternativa interpretativa.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
- issue: Genitivo ambiguo en τὴν ὑπομονὴν τοῦ Χριστοῦ
  english_pob_reading: Rendered as 'the steadfastness of the Messiah' to preserve ambiguity.
  chosen_spanish_reading: «la constancia del Mesías» manteniendo abierta la relación del genitivo.
  alternative_spanish_readings:
  - constancia hacia el Mesías
  - constancia del Mesías
  - constancia como la del Mesías
  rationale: 'La frase puede leerse de varias maneras: como constancia propia del Mesías, dirigida al Mesías, o caracterizada por él. La redacción principal preserva esa ambigüedad sin resolverla prematuramente.'
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
- issue: Rendering of Χριστοῦ as title rather than fixed name
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: Sigo la decisión del POB en inglés de traducir el título por «Messiah/Mesías» cuando funciona como título. Así se conserva el sentido de Χριστός sin importar una forma litúrgica donde el título es semánticamente relevante.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός.'
translation_notes:
  revision_awareness: El contexto auditado muestra una ida y vuelta entre «Cristo» y «Mesías»; la corrección final restauró «Mesías» por coherencia con la política del proyecto. También se documenta que el verso contiene dos genitivos deliberadamente ambiguos. Mi borrador sigue esa línea y mantiene ambas ambigüedades en el texto principal, con notas alternativas breves.
  spanish_consistency_notes:
  - Mantengo «Señor» para κύριος y «Mesías» para Χριστός, de acuerdo con la política del proyecto.
  - Uso «amor» y «constancia» como equivalentes naturales de ἀγάπη y ὑπομονή, sin resolver los genitivos griegos.
  - Conservo el tono de oración optativa con «Que ... dirija».
  - Las notas al pie no duplican markers y están ancladas en el texto donde corresponde.
