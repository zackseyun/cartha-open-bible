base_translation:
  language: en
  yaml_path: translation/nt/2_thessalonians/003/005.yaml
  text: Now may the Lord direct your hearts into the love of God and into the steadfastness of Messiah[a][b][c].
  footnotes:
  - marker: a
    text: Or 'into love for God.' The Greek can also mean 'into God's love.'
    reason: alternative_reading
  - marker: b
    text: Or 'into the Messiah's steadfastness,' or 'into steadfastness for the Messiah.'
    reason: alternative_reading
  - marker: c
    text: Greek 'Christ'; translated 'Messiah' here because the term functions as a title.
    reason: lexical_alternative
