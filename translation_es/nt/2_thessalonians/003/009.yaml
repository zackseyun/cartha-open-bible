translation:
  language: es
  text: no porque no tengamos el derecho[a], sino para que nos demos a ustedes como ejemplo[b], para que nos imiten.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «autoridad» o «poder» para «el derecho». El contexto favorece el sentido de una prerrogativa o reclamación legítima.
    reason: lexical_alternative
  - marker: b
    text: O «como modelo» o «como patrón».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξουσίαν
  english_pob_choice: the right
  chosen_spanish: el derecho
  alternatives_spanish:
  - la autoridad
  - el poder
  lexicon: BDAG
  rationale: En este contexto Pablo habla de una prerrogativa legítima para recibir sustento, no de poder coercitivo. «El derecho» comunica mejor esa idea de reclamación legítima que «la autoridad» o «el poder».
- source_word: ἑαυτοὺς
  english_pob_choice: ourselves
  chosen_spanish: nos diéramos a nosotros mismos
  alternatives_spanish:
  - nos presentáramos
  - nos ofreciéramos
  lexicon: BDAG
  rationale: El reflexivo debe conservar la referencia a Pablo y sus compañeros. En español, la construcción con «nos diéramos» mantiene el valor de entrega de sí, aunque se integra naturalmente con la frase «como ejemplo».
- source_word: τύπον
  english_pob_choice: an example
  chosen_spanish: como ejemplo
  alternatives_spanish:
  - como modelo
  - como patrón
  lexicon: BDAG
  rationale: τύπος aquí expresa un patrón digno de imitación. «Ejemplo» es claro y fiel en español contemporáneo; «modelo» y «patrón» quedan como alternativas posibles, pero «ejemplo» comunica bien la fuerza exhortativa.
- source_word: δῶμεν
  english_pob_choice: give
  chosen_spanish: diéramos
  alternatives_spanish:
  - presentáramos
  - diese(r)mos
  lexicon: BDAG
  rationale: Se conserva la imagen de «dar» en la expresión «nos diéramos ... como ejemplo», que refleja mejor la metáfora griega que una paráfrasis más suelta.
- source_word: εἰς τὸ μιμεῖσθαι
  english_pob_choice: for you to imitate
  chosen_spanish: para que nos imiten
  alternatives_spanish:
  - para imitarnos
  - a fin de que nos imiten
  lexicon: BDAG
  rationale: La construcción expresa finalidad. En español, «para que nos imiten» es natural y conserva el sentido telico del griego sin sobrecargar la sintaxis.
- source_word: μιμεῖσθαι ἡμᾶς
  english_pob_choice: imitate us
  chosen_spanish: nos imiten
  alternatives_spanish:
  - imiten nuestro ejemplo
  - nos sigan
  lexicon: BDAG
  rationale: «Imiten» reproduce directamente el verbo del original y evita expandir el sentido a una frase más interpretativa como «seguir nuestro ejemplo».
- source_word: οὐχ ὅτι οὐκ
  english_pob_choice: not because we do not
  chosen_spanish: no porque no tengamos
  alternatives_spanish:
  - no es que no tengamos
  - no porque carezcamos de
  lexicon: BDAG
  rationale: La doble negación introduce una aclaración de motivo. «No porque no tengamos» mantiene el contraste retórico y suena natural en español.
- source_word: ἀλλ’ ἵνα
  english_pob_choice: but in order to
  chosen_spanish: sino para que
  alternatives_spanish:
  - sino a fin de que
  - sino más bien para que
  lexicon: BDAG
  rationale: La adversativa con propósito se expresa con naturalidad mediante «sino para que», que conserva el contraste y la finalidad. En el flujo español, esta forma es más idiomática que una calca rígida.
theological_decisions:
- issue: Sentido de ἐξουσίαν en el marco del trabajo apostólico
  english_pob_reading: Paul says he and his companions possess a legitimate right to support, which they voluntarily did not exercise here.
  chosen_spanish_reading: Pablo afirma que él y sus compañeros tenían un derecho legítimo al sustento, aunque no lo ejercieron en esta ocasión.
  alternative_spanish_readings:
  - Pablo afirma que tenían autoridad para recibir sustento.
  - Pablo afirma que tenían poder para recibir sustento.
  rationale: El contexto inmediato trata del hecho de no ser carga para nadie, por lo que el matiz principal es un derecho legítimo y no una afirmación amplia de autoridad. «Derecho» preserva mejor esa restricción contextual.
  doctrine_reference: Principio de primacía del texto original y de mantener el alcance inmediato del argumento paulino sin ampliarlo indebidamente.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB en inglés, que ajustó la segunda cláusula para reflejar con más cercanía ἵνα y la estructura de propósito. Por eso se conserva la relación entre negación inicial, finalidad positiva y el cierre de propósito con «para que».
  spanish_consistency_notes:
  - Se usa «derecho» para ἐξουσίαν, en coherencia con la decisión auditada del POB en inglés.
  - Se mantiene el verbo «imiten» para μιμεῖσθαι, evitando una paráfrasis interpretativa.
  - 'La estructura general conserva la tensión retórica: negación de la motivación negativa, afirmación del propósito positivo y el resultado ejemplar.'
  - Se prefiere un español natural pero cercano a la sintaxis del griego, sin sustituir el valor de propósito por una explicación libre.
