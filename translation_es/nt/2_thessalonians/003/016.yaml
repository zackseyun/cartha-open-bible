translation:
  language: es
  text: Y el mismo Señor de paz les dé paz[a] en todo tiempo y de toda manera[b]. El Señor esté con todos ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «siempre» por «en todo tiempo».
    reason: lexical_alternative
  - marker: b
    text: O «en toda forma» por «de toda manera».
    reason: lexical_alternative
lexical_decisions:
- source_word: Αὐτὸς
  english_pob_choice: himself
  chosen_spanish: el mismo
  alternatives_spanish:
  - él mismo
  - mismo
  lexicon: BDAG
  rationale: El valor intensivo de αὐτός con ὁ κύριος se conserva naturalmente en español con «el mismo», que enfatiza al sujeto sin sonar forzado. «Él mismo» también es posible, pero aquí «el mismo Señor» fluye mejor en una fórmula benedictoria.
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: BDAG
  rationale: En este contexto de bendición paulina, κύριος funciona como título reverente; «Señor» es la equivalencia estable en español e integra bien la referencia cristológica implícita sin añadir identificación explícita que el griego no formula aquí.
- source_word: τῆς εἰρήνης
  english_pob_choice: of peace
  chosen_spanish: de paz
  alternatives_spanish:
  - de la paz
  lexicon: BDAG
  rationale: 'El genitivo expresa relación o caracterización: «el Señor de paz». En español, «de paz» reproduce esa expresión titular con naturalidad; «de la paz» sería más literal pero menos idiomático en este giro.'
- source_word: δῴη
  english_pob_choice: may ... give
  chosen_spanish: les dé
  alternatives_spanish:
  - quiera darles
  - pueda darles
  lexicon: BDAG
  rationale: El optativo aoristo en contexto benedictorio expresa deseo o petición. En español, el subjuntivo presente «les dé» comunica bien ese matiz de ruego sin necesidad de un auxiliar adicional.
- source_word: τὴν εἰρήνην
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - la paz
  lexicon: BDAG
  rationale: Aunque el griego lleva artículo, en español la expresión benedictoria es naturalmente «dar paz». Se conserva la repetición enfática del sustantivo sin sobrecargarla con un artículo impropio en la primera mención.
- source_word: διὰ παντὸς
  english_pob_choice: at all times
  chosen_spanish: en todo tiempo
  alternatives_spanish:
  - siempre
  - continuamente
  lexicon: BDAG
  rationale: La frase señala continuidad temporal. «En todo tiempo» mantiene esa fuerza de manera clara y sobria; «siempre» es posible, pero menos literal respecto a la estructura de la expresión griega.
- source_word: ἐν παντὶ τρόπῳ
  english_pob_choice: in every way
  chosen_spanish: en todo modo
  alternatives_spanish:
  - de todo modo
  - en cada manera
  - en todo sentido
  lexicon: BDAG
  rationale: τρόπος se refiere a modo/manera. «En todo modo» reproduce la amplitud de la frase con un registro sobrio; «de todo modo» podría confundirse con una locución concesiva en español.
- source_word: μετὰ πάντων ὑμῶν
  english_pob_choice: with all of you
  chosen_spanish: con todos ustedes
  alternatives_spanish:
  - con todos vosotros
  - con ustedes todos
  lexicon: BDAG
  rationale: La cláusula final funciona como bendición. «Con todos ustedes» expresa el plural inclusivo de πάντων ὑμῶν de forma natural en español latinoamericano y mantiene el sentido de presencia/acompañamiento.
theological_decisions:
- issue: Referencia de «el Señor» en la bendición final
  english_pob_reading: Retain 'Lord' without specifying beyond the text, while allowing the likely Pauline reference to the Lord Jesus to stand implicitly.
  chosen_spanish_reading: Mantener «el Señor» sin explicitar más de lo que dice el texto, dejando implícita la referencia cristológica probable.
  alternative_spanish_readings:
  - «el Señor Jesús»
  - «Dios»
  rationale: El griego dice solo ὁ κύριος. En una despedida paulina, la referencia suele ser al Señor Jesús, pero la traducción no debe añadir una precisión ausente. «El Señor» preserva la ambigüedad controlada del original y sigue siendo plenamente compatible con la lectura cristológica tradicional.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3
- issue: Fuerza de la última cláusula
  english_pob_reading: 'Translate as an implied benedictory wish: ''The Lord be with all of you.'''
  chosen_spanish_reading: 'Traducirla como bendición/deseo implícito: «El Señor esté con todos ustedes».'
  alternative_spanish_readings:
  - «El Señor es con todos ustedes»
  - «El Señor sea con todos ustedes»
  rationale: En griego falta el verbo, pero la cláusula funciona como bendición. El presente de subjuntivo «esté» expresa adecuadamente el deseo benedictorio en español; «sea» resultaría menos natural y «es» volvería demasiado afirmativa la fórmula.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: El pasaje coincide con el texto griego SBLGNT y con la auditoría inglesa de alta concordancia; no se requirieron correcciones textuales ni reajustes de sentido. La versión española sigue el mismo valor benedictorio, el énfasis de αὐτός y la amplitud temporal y modal de διὰ παντὸς / ἐν παντὶ τρόπῳ.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος de manera consistente con el registro cristológico de la serie.
  - Se usa «paz» para εἰρήνη en ambos lugares, conservando la repetición enfática del texto.
  - La bendición final se vierte con subjuntivo («esté»), conforme al valor desiderativo implícito del original.
  - Se adopta español latinoamericano formal con «ustedes» para la clausura comunitaria inclusiva.
