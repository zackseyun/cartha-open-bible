revisions:
- from: Y el mismo Señor de paz les dé paz[a] en todo tiempo y en todo modo[b]. El Señor esté con todos ustedes.
  to: Y el mismo Señor de paz les dé paz[a] en todo tiempo y de toda manera[b]. El Señor esté con todos ustedes.
  rationale: Se conserva la traducción general, pero se sustituye «en todo modo» por «de toda manera» para expresar ἐν παντὶ τρόπῳ con español más natural y amplio en registro bíblico moderno. También se corrige la nota alternativa correspondiente para que ofrezca una opción idiomática real en español. No se requieren cambios doctrinales ni estructurales adicionales.
