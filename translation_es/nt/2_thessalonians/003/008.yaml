translation:
  language: es
  text: ni comimos gratis el pan de nadie[a], sino con trabajo y fatiga, trabajando noche y día para no ser una carga a ninguno de ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «ni comimos el pan de nadie sin costo». El griego conserva literalmente «pan», aunque puede referirse más ampliamente a alimento o sustento material.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐδὲ ... ἀλλ’
  english_pob_choice: nor ... but
  chosen_spanish: ni ... sino
  alternatives_spanish:
  - y no ... sino
  - ni ... pero
  lexicon: BDAG
  rationale: La correlación negativa y contrastiva del griego se expresa con naturalidad en español con «ni ... sino», conservando el contraste fuerte entre no recibir y sí trabajar.
- source_word: δωρεὰν
  english_pob_choice: free of charge
  chosen_spanish: gratis
  alternatives_spanish:
  - sin costo
  - sin pagar
  lexicon: BDAG
  rationale: El adverbio señala ausencia de pago o compensación; «gratis» es idiomático y mantiene el matiz económico del contexto.
- source_word: ἄρτον
  english_pob_choice: bread
  chosen_spanish: pan
  alternatives_spanish:
  - alimento
  - comida
  lexicon: BDAG
  rationale: Se conserva el sustantivo concreto «pan», que refleja el griego literalmente y puede funcionar metonímicamente por alimento o sustento.
- source_word: παρά τινος
  english_pob_choice: from anyone
  chosen_spanish: de nadie
  alternatives_spanish:
  - de ninguno
  - de alguna persona
  lexicon: BDAG
  rationale: La negación abarca cualquier proveedor posible; «de nadie» transmite bien la amplitud de la negación en español, aunque el griego usa una forma indefinida positiva en el sintagma preposicional.
- source_word: ἐν κόπῳ καὶ μόχθῳ
  english_pob_choice: with labor and hardship
  chosen_spanish: con trabajo y fatiga
  alternatives_spanish:
  - en trabajo y fatiga
  - con afán y fatiga
  - con labor y esfuerzo
  lexicon: BDAG
  rationale: Los dos sustantivos cercanos refuerzan el esfuerzo intenso y agotador. «Trabajo y fatiga» es claro en español y conserva la acumulación semántica sin sonar arcaico.
- source_word: νυκτὸς καὶ ἡμέρας
  english_pob_choice: night and day
  chosen_spanish: noche y día
  alternatives_spanish:
  - de noche y de día
  - día y noche
  lexicon: BDAG
  rationale: La expresión temporal idiomática se vierte de manera natural como «noche y día», manteniendo la idea de continuidad constante.
- source_word: ἐργαζόμενοι
  english_pob_choice: working
  chosen_spanish: trabajando
  alternatives_spanish:
  - laborando
  - haciendo trabajo
  lexicon: BDAG
  rationale: El participio describe la acción concomitante; «trabajando» es la forma más natural y directa en español.
- source_word: πρὸς τὸ μὴ ἐπιβαρῆσαί
  english_pob_choice: so as not to burden
  chosen_spanish: para no ser una carga
  alternatives_spanish:
  - a fin de no agobiar
  - para no gravar
  lexicon: BDAG
  rationale: El verbo se refiere a imponer peso o carga. En español, «ser una carga» comunica con claridad el efecto buscado por el propósito expresado en el griego.
- source_word: τινα ὑμῶν
  english_pob_choice: any of you
  chosen_spanish: ninguno de ustedes
  alternatives_spanish:
  - cualquiera de ustedes
  - a alguno de ustedes
  lexicon: BDAG
  rationale: El singular indefinido con genitivo distributivo se traduce naturalmente en plural genérico español como «ninguno de ustedes», preservando el sentido de no gravar a persona alguna entre ellos.
translation_notes:
  revision_awareness: Se siguió el contexto auditado en inglés, manteniendo la metáfora concreta de «pan», la negación contrastiva «nor ... but» y la finalidad del verbo de carga; no se aplicaron cambios revisados posteriores porque el expediente indica alta concordancia y ningún cambio reciente.
  spanish_consistency_notes:
  - Se prefirió «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se mantuvo «pan» por fidelidad al griego y por coherencia con el valor metonímico auditado.
  - «Ser una carga» preserva el sentido económico/social del verbo sin introducir una interpretación más fuerte de la necesaria.
  - El plural de cortesía/dirigido a la comunidad se expresa como «ustedes», en registro neutral latinoamericano.
