review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura οὐδὲ ... ἀλλ’ y conserva literalmente «pan», así como la idea de trabajar «noche y día» para no imponer carga material a los tesalonicenses. Sin embargo, «de nadie gratis» suena menos natural y algo ambiguo en español; el griego expresa que no comieron pan recibido sin pago/de balde de parte de nadie. Además, «para ninguno de ustedes» tras «ser una carga» es menos idiomático que «a ninguno de ustedes».
  spanish_quality_summary: La redacción es en general clara y fiel, pero necesita un ajuste de naturalidad y precisión sintáctica. «Ni comimos pan de nadie gratis» puede entenderse como si «nadie» fuera gratis, y «para ninguno de ustedes» no es la construcción más natural con «ser una carga». Una revisión menor mejora la fluidez sin perder literalidad.
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. «Pan» preserva la decisión léxica documentada para ἄρτον. «Trabajo y fatiga» y «noche y día» son adecuados. El matiz de ἐπιβαρῆσαί se mantiene mejor en español con «ser una carga a ninguno de ustedes».
  issues:
  - severity: medium
    issue: «de nadie gratis» es poco natural y potencialmente ambiguo
    rationale: δωρεὰν modifica el hecho de comer/recibir pan sin pago, no a «nadie». En español suena más claro «pan gratis de parte de nadie» o, mejor, una estructura equivalente como «no comimos gratis el pan de nadie» o «no comimos pan de nadie de balde».
  - severity: low
    issue: «ser una carga para ninguno de ustedes» es menos idiomático que «ser una carga a ninguno de ustedes»
    rationale: Con «ser una carga», el complemento personal en español fluye mejor con «a». Esto también refleja mejor el objeto personal de ἐπιβαρῆσαί τινα ὑμῶν.
  - severity: low
    issue: La nota al pie tiene comillas y puntuación algo torpes al inicio
    rationale: 'Puede pulirse a un formato más natural en español: «O bien: “ni comimos el pan de nadie sin costo”...» manteniendo la misma información léxica.'
  revised_spanish_text: ni comimos gratis el pan de nadie[a], sino con trabajo y fatiga, trabajando noche y día para no ser una carga a ninguno de ustedes.
  revised_footnotes:
