translation:
  language: es
  text: Ahora les ordenamos[a], hermanos, en el nombre de nuestro Señor Jesús el Mesías[c], que se aparten[b] de todo hermano que anda desordenadamente[e] y no conforme a la tradición que recibieron de nosotros[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hermanos» traduce el plural masculino ἀδελφοί; Pablo se dirige a la iglesia como un todo.
    reason: lexical_alternative
  - marker: b
    text: O «mantenerse alejados de»; el griego expresa apartarse de una relación cercana.
    reason: lexical_alternative
  - marker: c
    text: O «Cristo». «Mesías» conserva el valor titular de Χριστός.
    reason: alternative_reading
  - marker: d
    text: Algunos manuscritos suavizan la sintaxis con «que ustedes recibieron de nosotros» o «que él recibió de nosotros». El texto impreso lee «recibieron de nosotros».
    reason: textual_variant
  - marker: e
    text: O «vive desordenadamente».
    reason: alternative_reading
lexical_decisions:
- source_word: Παραγγέλλομεν
  english_pob_choice: we command
  chosen_spanish: les ordenamos
  alternatives_spanish:
  - les mandamos
  - les damos esta orden
  lexicon: BDAG
  rationale: παραγγέλλω expresa una instrucción con autoridad; en español, «ordenamos» comunica mejor esa fuerza que un verbo más débil como «exhortamos». Se mantiene el tono apostólico del contexto.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - hermanos en la fe
  lexicon: BDAG
  rationale: El vocativo masculino plural se conserva como «hermanos», siguiendo la forma gramatical del griego. Como el destinatario es la iglesia entera, la nota explica la inclusión sin borrar la forma fuente.
- source_word: ἐν ὀνόματι τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ
  english_pob_choice: in the name of our Lord Jesus Messiah
  chosen_spanish: en el nombre de nuestro Señor Jesús Mesías
  alternatives_spanish:
  - por la autoridad de nuestro Señor Jesús Mesías
  - en el nombre de nuestro Señor Jesucristo
  lexicon: BDAG
  rationale: La expresión idiomática natural es «en el nombre de». «Señor» conserva κύριος, y «Mesías» sigue la guía del proyecto para Χριστός cuando funciona como título y no como forma fija eclesiástica.
- source_word: στέλλεσθαι ὑμᾶς ἀπὸ
  english_pob_choice: to keep away from
  chosen_spanish: que se aparten de
  alternatives_spanish:
  - que se mantengan alejados de
  - que se retiren de
  lexicon: BDAG
  rationale: El infinitivo medio con ἀπό sugiere distanciarse de la asociación cercana. «Apartarse de» suena natural en español y conserva la fuerza práctica sin convertirlo en una expulsión técnica que el texto no explicita.
- source_word: παντὸς ἀδελφοῦ
  english_pob_choice: every brother
  chosen_spanish: todo hermano
  alternatives_spanish:
  - cada hermano
  - todo creyente
  lexicon: BDAG
  rationale: Se mantiene el singular masculino del griego y la referencia a un miembro de la comunidad cristiana. «Todo hermano» es conciso y fiel al alcance distributivo.
- source_word: ἀτάκτως
  english_pob_choice: disorderly
  chosen_spanish: desordenadamente
  alternatives_spanish:
  - de manera indisciplinada
  - en forma desordenada
  lexicon: BDAG
  rationale: ἀτάκτως apunta a conducta fuera de orden o disciplina. «Desordenadamente» conserva ese valor sin estrecharlo prematuramente a «ocioso».
- source_word: περιπατοῦντος
  english_pob_choice: who is walking disorderly
  chosen_spanish: anda
  alternatives_spanish:
  - vive
  - se conduce
  lexicon: BDAG
  rationale: El verbo de caminar como metáfora de conducta se expresa de forma natural con «anda». Esto conserva la imagen de conducta habitual sin sonar forzado en español.
- source_word: μὴ κατὰ τὴν παράδοσιν
  english_pob_choice: not according to the tradition
  chosen_spanish: no conforme a la tradición
  alternatives_spanish:
  - no de acuerdo con la tradición
  - no conforme a la enseñanza transmitida
  lexicon: BDAG
  rationale: παράδοσις significa algo transmitido/entregado. «Tradición» es la equivalencia más directa y mantiene la referencia a la transmisión apostólica; «conforme a» expresa bien la norma o patrón.
- source_word: ἣν παρελάβοσαν παρ’ ἡμῶν
  english_pob_choice: that they received from us
  chosen_spanish: que recibieron de nosotros
  alternatives_spanish:
  - que ellos recibieron de nosotros
  - que vosotros recibisteis de nosotros
  lexicon: BDAG
  rationale: El texto impreso presenta la tercera persona plural παρελάβοσαν, por lo que «recibieron» sigue la lectura atestiguada. Se documenta la variante textual porque otras formas suavizan la sintaxis singular/plural.
theological_decisions:
- issue: Rendering Χριστοῦ as title
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: Se preserva el valor titular de Χριστός según la guía del proyecto. En este contexto no funciona como nombre fijo litúrgico sino como título cristológico, por eso «Mesías» es la opción principal.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Mesías cuando funciona como título'
- issue: Scope of separation commanded by στέλλεσθαι ὑμᾶς ἀπό
  english_pob_reading: to keep away from
  chosen_spanish_reading: que se aparten de
  alternative_spanish_readings:
  - que se mantengan alejados de
  - que se retiren de
  rationale: La orden implica distanciamiento de la asociación con el hermano desordenado, pero no define por sí sola una expulsión formal. «Apartarse de» preserva esa tensión sin resolverla en una categoría eclesiástica más fuerte de la que el texto da.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El audit trail en inglés muestra una oscilación entre «Christ» y «Messiah», y entre «who is living disorderly» y «who is walking disorderly». Para esta versión española se sigue la línea restaurada que favorece «Mesías» para Χριστός y se mantiene la metáfora de caminar mediante «anda», con una formulación natural en español. También se conserva la lectura impresa plural «recibieron», documentando la variante que suaviza la sintaxis.
  spanish_consistency_notes:
  - Se usa «Señor» para κύριος de forma consistente con el español bíblico y la convención del proyecto.
  - «Mesías» se reserva aquí para Χριστός como título; no se sustituye por «Cristo» salvo nota alternativa.
  - «Tradición» se entiende como transmisión apostólica, no como tradición eclesiástica posterior.
  - «Apartarse de» evita tanto la mera evasión informal como la tecnificación de una disciplina eclesial no explicitada.
  - Se mantiene el tono solemne pero claro, apto para lectura pública en español latinoamericano.
