  text: Παραγγέλλομεν δὲ ὑμῖν, ἀδελφοί, ἐν ὀνόματι τοῦ κυρίου ⸀ἡμῶν Ἰησοῦ Χριστοῦ στέλλεσθαι ὑμᾶς ἀπὸ παντὸς ἀδελφοῦ ἀτάκτως περιπατοῦντος καὶ μὴ κατὰ τὴν παράδοσιν ἣν ⸀παρελάβοσαν παρ’ ἡμῶν.
base_translation:
  language: en
  yaml_path: translation/nt/2_thessalonians/003/006.yaml
  text: Now we command you[a], brothers, in the name of our Lord Jesus Messiah[e][d][c][b], to keep away from every brother who is walking disorderly and not according to the tradition that they received from us.
  footnotes:
  - marker: a
    text: '"Brothers" translates the masculine plural ἀδελφοί; Paul is addressing the church as a whole.'
    reason: lexical_alternative
  - marker: b
    text: Or "to withdraw from"; the Greek means to keep oneself away from close association.
    reason: lexical_alternative
  - marker: c
    text: '"Messiah" could also be rendered "Christ."'
    reason: alternative_reading
  - marker: d
    text: Some manuscripts read "which you received from us" or "which he received from us," smoothing the syntax after "every brother." The printed text reads "they received from us."
    reason: textual_variant
  - marker: e
    text: Or 'who walks disorderly'.
    reason: previous_rendering
  ai_draft:
    model_id: gpt-5.4
