translation:
  language: es
  text: Pero ustedes[a], hermanos, no se cansen de hacer el bien.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hermanos y hermanas»; el griego dice «hermanos» y puede dirigirse inclusivamente a toda la comunidad creyente.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑμεῖς δέ
  english_pob_choice: But as for you
  chosen_spanish: Pero ustedes
  alternatives_spanish:
  - Pero ustedes, en cambio
  - Y ustedes
  lexicon: BDAG
  rationale: δέ introduce contraste con lo anterior; ὑμεῖς es enfático. En español, «Pero ustedes» conserva el contraste y la focalización sin volver pesado el giro.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - hermanos/as
  - hermandad
  lexicon: BDAG
  rationale: El vocativo plural masculino se refleja como «hermanos». En español bíblico es natural y fiel, y la posible inclusión de toda la comunidad queda para la nota, no para la paráfrasis del texto principal.
- source_word: μὴ ἐγκακήσητε
  english_pob_choice: do not grow weary
  chosen_spanish: no se cansen
  alternatives_spanish:
  - no se desalienten
  - no pierdan ánimo
  - no desmayen
  lexicon: BDAG
  rationale: ἐγκακέω aquí expresa el dejar de perseverar por cansancio o desaliento. «No se cansen» comunica bien la prohibición y mantiene el sentido de resistencia continua sin añadir un matiz no necesario.
- source_word: καλοποιοῦντες
  english_pob_choice: in doing good
  chosen_spanish: de hacer el bien
  alternatives_spanish:
  - en hacer el bien
  - al hacer el bien
  - haciendo el bien
  lexicon: BDAG
  rationale: El participio presente indica la actividad continua en la que no deben cansarse. «De hacer el bien» suena natural en español y preserva la idea de acción benéfica sostenida.
theological_decisions:
- issue: Alcance inclusivo de ἀδελφοί en un saludo/exhortación congregacional
  english_pob_reading: brothers; the Greek can address the whole believing community inclusively
  chosen_spanish_reading: hermanos; el griego puede incluir a toda la comunidad creyente
  alternative_spanish_readings:
  - hermanos y hermanas
  - hermanos/as
  - personas creyentes
  rationale: Se mantiene la forma masculina plural en el texto principal por fidelidad al vocativo griego y al criterio del POB; la inclusión de la comunidad completa se explica en nota para no borrar la forma léxica original.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: 'El texto sigue de cerca el paquete fuente y el auditoría inglesa: contraste con δέ, vocativo plural masculino con nota de inclusión, prohibición con μή + aoristo subjuntivo, y participio presente que expresa actividad continua. No se detectaron revisiones pendientes en el pasaje base.'
  spanish_consistency_notes:
  - Se evita «Señor» o equivalentes porque este versículo no contiene el nombre divino.
  - Se mantiene «hermanos» en el texto principal por consistencia con la política léxica del POB, con nota inclusiva donde corresponde.
  - La construcción «no se cansen de hacer el bien» conserva la naturalidad del español sin diluir la exhortación perseverante del griego.
