translation:
  language: es
  text: Pero el Señor es fiel[a], quien los fortalecerá y los guardará del maligno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «del mal». El griego τοῦ πονηροῦ puede leerse tanto en masculino («el maligno») como en neutro («el mal»).'
    reason: alternative_reading
lexical_decisions:
- source_word: πιστὸς
  english_pob_choice: faithful
  chosen_spanish: fiel
  alternatives_spanish:
  - confiable
  - fiel y digno de confianza
  lexicon: BDAG
  rationale: El adjetivo predicativo describe la confiabilidad y la fidelidad constante del Señor. «Fiel» es la equivalencia más natural y teológicamente plena en español, y conserva bien el valor relacional del original.
- source_word: δέ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Marca contraste con la afirmación anterior sobre la falta de fe de algunos. «Pero» reproduce de modo claro la fuerza adversativa en español.
- source_word: ὁ κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Señor Jesús
  - el Señor
  lexicon: BDAG
  rationale: Se mantiene el título doctrinal «Señor». En este contexto paulino probablemente alude al Señor Jesús, pero la identificación se deja implícita, como en el texto base.
- source_word: στηρίξει
  english_pob_choice: will strengthen
  chosen_spanish: los fortalecerá
  alternatives_spanish:
  - los afirmará
  - los establecerá
  - los hará firmes
  lexicon: BDAG
  rationale: El verbo puede significar establecer, hacer firmes o fortalecer. «Fortalecerá» expresa con naturalidad la intención pastoral de dar firmeza y se coordina bien con la promesa de protección que sigue.
- source_word: φυλάξει
  english_pob_choice: will guard
  chosen_spanish: los guardará
  alternatives_spanish:
  - los protegerá
  - los velará
  lexicon: BDAG
  rationale: «Guardar» conserva el sentido activo de vigilancia y custodia del verbo φυλάσσω, y suena natural en español bíblico contemporáneo.
- source_word: ἀπὸ
  english_pob_choice: from
  chosen_spanish: de
  alternatives_spanish:
  - de parte de
  - contra
  lexicon: BDAG
  rationale: La preposición expresa alejamiento o rescate fuera del alcance de la amenaza; en español, «de» en la expresión «guardará del» comunica bien esa relación.
- source_word: τοῦ πονηροῦ
  english_pob_choice: the evil one
  chosen_spanish: el maligno
  alternatives_spanish:
  - el malo
  - el mal
  - el malvado
  lexicon: BDAG
  rationale: La forma griega admite lectura masculina («el maligno») o neutra («el mal»). La traducción principal adopta la lectura personal tradicional y coherente con el uso del NT, sin borrar la ambigüedad textual al preservarla en una nota.
theological_decisions:
- issue: Referente de τοῦ πονηροῦ
  english_pob_reading: the evil one
  chosen_spanish_reading: el maligno
  alternative_spanish_readings:
  - el mal
  rationale: La forma griega con artículo y genitivo singular puede entenderse como masculino o neutro. Para mantener la tensión interpretativa documentada por la POB inglesa, el texto principal usa la lectura personal («el maligno») y la nota conserva la posibilidad abstracta («el mal»).
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente indica acuerdo alto y ningún cambio necesario; por eso se mantiene la solución principal con la misma tensión teológica preservada en nota.
  spanish_consistency_notes:
  - Se mantiene «Señor» como título para κύριος, sin ampliar innecesariamente la identificación explícita en el texto principal.
  - Se usa «fiel» para πιστός y «fortalecerá / guardará» para sostener el paralelismo verbal del griego.
  - La nota a pie conserva la ambigüedad de τοῦ πονηροῦ sin resolverla de forma dogmática.
