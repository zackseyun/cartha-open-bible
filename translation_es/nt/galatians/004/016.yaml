translation:
  language: es
  text: Así que[a], ¿me he convertido en enemigo de ustedes por decirles la verdad?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por hablarles con verdad». El participio griego ἀληθεύων puede significar «hablar con verdad» o «decir la verdad».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὥστε
  english_pob_choice: So then
  chosen_spanish: Así que
  alternatives_spanish:
  - De manera que
  - Por tanto
  - Entonces
  lexicon: BDAG
  rationale: La conjunción inferencial introduce una conclusión a partir del argumento previo. «Así que» transmite bien esa transición discursiva en español sin sonar rígido.
- source_word: ἐχθρὸς
  english_pob_choice: enemy
  chosen_spanish: enemigo
  alternatives_spanish:
  - hostil
  - adversario
  lexicon: BDAG
  rationale: El predicado nominativo expresa una relación de enemistad; «enemigo» es el equivalente más claro y natural en español.
- source_word: ὑμῶν
  english_pob_choice: your
  chosen_spanish: su
  alternatives_spanish:
  - de ustedes
  - de vosotros
  lexicon: BDAG
  rationale: El genitivo depende de «enemigo»; en español la relación posesiva se expresa naturalmente con «su». En contexto, el plural se entiende por el destinatario comunitario.
- source_word: γέγονα
  english_pob_choice: have I become
  chosen_spanish: me he convertido
  alternatives_spanish:
  - he llegado a ser
  - he pasado a ser
  - me he vuelto
  lexicon: BDAG
  rationale: El perfecto de γίνομαι destaca un estado resultante. «Me he convertido» conserva bien la idea de cambio con implicación presente, de manera idiomática en español.
- source_word: ἀληθεύων
  english_pob_choice: by telling
  chosen_spanish: por decir
  alternatives_spanish:
  - al decir
  - por hablarles con verdad
  - por decirles la verdad
  lexicon: BDAG
  rationale: El participio presente expresa medio o circunstancia. «Por decir» mantiene la función causal/circunstancial y deja abierta la opción léxica entre «hablar verdad» y «decir la verdad»; el contexto hace explícita la relación con la verdad.
- source_word: ὑμῖν
  english_pob_choice: you
  chosen_spanish: les
  alternatives_spanish:
  - a ustedes
  - a vosotros
  lexicon: BDAG
  rationale: El dativo marca a los destinatarios del habla veraz. En español, el objeto indirecto plural «les» refleja de forma natural la dirección del discurso.
theological_decisions:
- issue: Valor de ἀληθεύων en la confrontación paulina
  english_pob_reading: Paul asks whether his truthful speech to the Galatians has made him seem like their enemy.
  chosen_spanish_reading: Pablo pregunta si el hecho de decirles la verdad lo ha convertido en su enemigo.
  alternative_spanish_readings:
  - si su veracidad general lo ha convertido en su enemigo
  - si al hablarles con verdad se ha vuelto su enemigo
  rationale: La escena inmediata es de reprensión y apelación directa. La traducción conserva la relación entre verdad hablada y enemistad percibida, sin ampliar el sentido hacia una noción más general de «veracidad» que el contexto no exige.
  doctrine_reference: Retórica paulina; fidelidad al testimonio verdadero frente a la oposición humana.
translation_notes:
  revision_awareness: 'El texto sigue de cerca la resolución auditada del POB inglés: la pregunta retórica conserva el perfecto resultativo de γίνομαι y el participio ἀληθεύων se entiende como el modo o circunstancia de la enemistad aparente. No se registraron revisiones posteriores en el paquete fuente.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo requiera; aquí no aparece.
  - Se mantuvo un registro directo y no arcaizante de la pregunta retórica.
  - La nota textual se ancla en la ambigüedad léxica de ἀληθεύων, tal como en el audit trail inglés.
