base_translation:
  language: en
  yaml_path: translation/nt/galatians/004/027.yaml
  text: 'For it is written: “Rejoice[a], barren woman who is not bearing children; break forth and cry out, you who are not in labor[c][b]; because the children of the desolate woman are more numerous than those of the woman who has a husband.”'
  footnotes:
