revisions:
- from: 'Porque está escrito: “Alégrate[a], mujer estéril, la que no da a luz; prorrumpe y grita, la que no está de parto[b]; porque más numerosos son los hijos de la desolada[c] que los de la que tiene marido.”'
  to: 'Porque está escrito: «Alégrate[a][b], mujer estéril que no da a luz; prorrumpe y grita, tú que no estás de parto; porque más numerosos son los hijos de la desolada[c] que los de la que tiene marido».'
  rationale: Se ajusta el anclaje de la nota [b] para que corresponda a una alternativa léxica real de la unidad citada y no solo a «de parto». También se suaviza la redacción poética en español al unir «mujer estéril» con «que no da a luz» y usar «tú que no estás de parto», sin alterar el sentido ni la estructura del original.
