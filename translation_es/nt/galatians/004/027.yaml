translation:
  language: es
  text: 'Porque está escrito: «Alégrate[a][b], mujer estéril que no da a luz; prorrumpe y grita, tú que no estás de parto; porque más numerosos son los hijos de la desolada[c] que los de la que tiene marido».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Cita de Isaías 54:1.
    reason: cross_reference
  - marker: b
    text: 'O: «Regocíjate, mujer estéril que no da a luz; estalla y grita».'
    reason: lexical_alternative
  - marker: c
    text: «La desolada» traduce un término que aquí también puede implicar «abandonada», «desamparada» o «desierta» en sentido figurado.
    reason: lexical_alternative
lexical_decisions:
- source_word: γέγραπται
  english_pob_choice: it is written
  chosen_spanish: está escrito
  alternatives_spanish:
  - queda escrito
  - se ha escrito
  lexicon: BDAG
  rationale: La fórmula pasiva perfecta introduce una cita bíblica con autoridad vigente. En español, «está escrito» comunica de manera natural esa fuerza formularia sin perder el carácter textual de la cita.
- source_word: Εὐφράνθητι
  english_pob_choice: Rejoice
  chosen_spanish: Alégrate
  alternatives_spanish:
  - Regocíjate
  - Alégrate mucho
  lexicon: BDAG
  rationale: El imperativo expresa gozo/exultación. «Alégrate» es idiomático en español bíblico contemporáneo y mantiene el tono exhortativo elevado.
- source_word: στεῖρα
  english_pob_choice: barren woman
  chosen_spanish: mujer estéril
  alternatives_spanish:
  - estéril
  - mujer infecunda
  lexicon: BDAG
  rationale: El adjetivo funciona sustantivado en vocativo implícito. «Mujer estéril» explicita a la persona dirigida y conserva la fuerza del término sin suavizarlo.
- source_word: ἡ οὐ τίκτουσα
  english_pob_choice: who is not bearing children
  chosen_spanish: la que no da a luz
  alternatives_spanish:
  - la que no está dando a luz
  - la que no tiene hijos
  lexicon: BDAG
  rationale: El participio presente indica una situación continua de no dar a luz. «La que no da a luz» es breve, natural y respeta la imagen de maternidad del texto.
- source_word: ῥῆξον
  english_pob_choice: break forth
  chosen_spanish: prorrumpe
  alternatives_spanish:
  - irrumpe
  - estalla
  lexicon: BDAG
  rationale: El verbo transmite un desbordamiento repentino ligado al clamor. «Prorrumpe» conserva el registro profético y la idea de salida súbita, mejor que una paráfrasis más libre.
- source_word: βόησον
  english_pob_choice: cry out
  chosen_spanish: grita
  alternatives_spanish:
  - clama
  - da un grito
  lexicon: BDAG
  rationale: El mandato refuerza el llamado a una voz fuerte. «Grita» es claro y directo en español; mantiene el paralelismo con el verbo anterior.
- source_word: ἡ οὐκ ὠδίνουσα
  english_pob_choice: you who are not in labor
  chosen_spanish: la que no está de parto
  alternatives_spanish:
  - la que no siente dolores de parto
  - la que no sufre parto
  lexicon: BDAG
  rationale: ὠδίνω alude a los dolores/estado del parto. «No está de parto» comunica el estado maternal sin añadir más explicación de la necesaria y conserva el paralelismo con «la que no da a luz».
- source_word: πολλὰ τὰ τέκνα
  english_pob_choice: the children ... are more numerous
  chosen_spanish: más numerosos son los hijos
  alternatives_spanish:
  - muchos son los hijos
  - son más los hijos
  lexicon: BDAG
  rationale: El griego presenta una afirmación comparativa sobre la cantidad de hijos. La inversión «más numerosos son los hijos» mantiene el énfasis del comparativo y suena bien en español escrito.
- source_word: τῆς ἐρήμου
  english_pob_choice: of the desolate woman
  chosen_spanish: de la desolada
  alternatives_spanish:
  - de la abandonada
  - de la desierta
  lexicon: BDAG
  rationale: En el contexto de Isaías, ἔρημος puede describir desolación o abandono figurado. «La desolada» conserva esa ambigüedad de manera compacta; en español evita reducir el sentido a un mero lugar físico.
- source_word: μᾶλλον ἢ
  english_pob_choice: more numerous than
  chosen_spanish: que
  alternatives_spanish:
  - que los de
  - más que
  lexicon: BDAG
  rationale: La comparación ya queda expresada por «más numerosos». En español, la partícula comparativa «que» es suficiente y evita redundancia.
- source_word: τῆς ἐχούσης τὸν ἄνδρα
  english_pob_choice: those of the woman who has a husband
  chosen_spanish: los de la que tiene marido
  alternatives_spanish:
  - los de la mujer que tiene esposo
  - los de la casada
  lexicon: BDAG
  rationale: ἄνδρα aquí significa «marido» en contraste con la desolada. «La que tiene marido» reproduce la estructura del griego y el contraste sin introducir un equivalente más interpretativo como «casada».
theological_decisions:
- issue: Cita de Isaías 54:1 en el argumento de Gálatas 4
  english_pob_reading: Translate the quotation straightforwardly without importing Paul's later allegorical identification into the wording of the citation itself.
  chosen_spanish_reading: Traducir la cita de Isaías de manera directa, dejando que el contexto de Pablo explique su función argumentativa sin anticiparla en la redacción de la cita.
  alternative_spanish_readings:
  - Redactar la cita insinuando desde el texto la alegoría paulina
  - Aclarar dentro de la cita su aplicación a la Jerusalén de arriba
  rationale: La frase es una cita escrituraria autónoma. La traducción debe preservar su imagen profética propia; la lectura teológica de Pablo pertenece al desarrollo inmediato del pasaje, no a la formulación de la cita.
  doctrine_reference: Hermenéutica paulina / cita profética en Gálatas 4
- issue: Término figurado ἔρημος en la comparación de hijos
  english_pob_reading: “Desolate woman” renders a term that can also mean “deserted” or “forsaken” in this figurative context.
  chosen_spanish_reading: «La desolada» como equivalencia figurada breve, manteniendo abierta la posibilidad de abandono o desamparo.
  alternative_spanish_readings:
  - la abandonada
  - la desierta
  - la desamparada
  rationale: El griego admite más de un matiz en el contexto figurado. «Desolada» es suficientemente amplio para no cerrar indebidamente el sentido, y conserva el tono poético de la cita.
  doctrine_reference: Isaías 54:1 / intertextualidad profética
translation_notes:
  revision_awareness: Se revisó la formulación para mantener el paralelismo profético del griego y la cita de Isaías sin mezclarla con la explicación paulina. No se requirieron cambios respecto del último pase de revisión en el inglés; la versión española adopta una equivalencia óptima con terminología consistente y notas para las alternativas relevantes.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como convención general del proyecto, pero este versículo no contiene el nombre divino explícito.
  - Se prefirió «mujer estéril» y no una simple forma adjetival aislada para hacer claro el vocativo implícito.
  - Se conservó el contraste entre «la que no da a luz» y «la que tiene marido» sin normalizarlo a expresiones más interpretativas.
  - Las notas [b] y [c] recogen ambigüedades léxicas reales del griego que el español no debe ocultar.
