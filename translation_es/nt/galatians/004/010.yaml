translation:
  language: es
  text: Ustedes observan días y meses y tiempos y años[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Ustedes observan días y meses y tiempos señalados y años». La lista se refiere a observancias calendáricas; «tiempos señalados» es una posible traducción de καιρούς.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡμέρας
  english_pob_choice: days
  chosen_spanish: días
  alternatives_spanish:
  - días especiales
  lexicon: BDAG
  rationale: El acusativo plural de ἡμέρα se traduce de forma directa como «días». En el contexto, la referencia apunta a observancias calendáricas, pero el sustantivo por sí mismo no exige añadir «especiales» en el texto principal.
- source_word: παρατηρεῖσθε
  english_pob_choice: are observing
  chosen_spanish: observan
  alternatives_spanish:
  - están observando
  - guardan
  - observan cuidadosamente
  lexicon: BDAG
  rationale: El verbo en presente puede expresar observar, vigilar o guardar. Aquí el valor básico de «observan» comunica bien la práctica de atender a esas fechas sin introducir énfasis adicional que el texto griego no explicita.
- source_word: μῆνας
  english_pob_choice: months
  chosen_spanish: meses
  lexicon: BDAG
  rationale: Equivale de manera directa al plural de μήν; se conserva literalmente dentro de la serie calendárica.
- source_word: καιρούς
  english_pob_choice: seasons
  chosen_spanish: estaciones
  alternatives_spanish:
  - tiempos
  - tiempos señalados
  - momentos señalados
  lexicon: BDAG
  rationale: καιρός puede aludir a un tiempo señalado o apropiado. «Estaciones» es una opción natural en español para mantener la serie temporal sin cerrar de antemano la posible alusión a tiempos fijados o designados; la nota permite la alternativa «tiempos señalados».
- source_word: ἐνιαυτούς
  english_pob_choice: years
  chosen_spanish: años
  alternatives_spanish:
  - años del calendario
  - ciclos anuales
  lexicon: BDAG
  rationale: Se traduce literalmente como «años», completando la secuencia ascendente de observancias calendáricas.
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  lexicon: BDAG
  rationale: Cada καί se vierte coordinadamente como «y» para conservar el ritmo acumulativo de la lista.
theological_decisions:
- issue: Si explicitar en el texto principal que se trata de observancias religiosas o judías
  english_pob_reading: Keep the temporal terms in the main text without adding 'special,' 'sacred,' or 'festival' language.
  chosen_spanish_reading: Mantener los términos temporales en el texto principal sin añadir «sagrados», «festivos» o «señalados» como glosa interpretativa.
  alternative_spanish_readings:
  - Ustedes observan días especiales y meses y estaciones y años.
  - Ustedes observan días religiosos y meses y estaciones y años.
  rationale: El griego enumera unidades de tiempo sin modificadores. El contexto de Gálatas indica observancia ritual/calendárica, pero esa precisión conviene dejarla para una nota, no para el cuerpo del verso.
  doctrine_reference: Contexto paulino sobre observancias calendáricas; cf. Gálatas 4:9–11
translation_notes:
  revision_awareness: La revisión en inglés eliminó «carefully» porque παρατηρεῖσθε queda suficientemente representado con «are observing». En español se siguió la misma decisión al usar simplemente «observan», sin añadir adverbios de intensidad ni matices que el griego no exige.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención del proyecto solo cuando el texto lo requiera; este versículo no lo contiene.
  - Se prefirió «observan» frente a «guardan» para evitar imponer un sentido más técnico o confesional que el verbo griego no obliga en este contexto.
  - «Estaciones» conserva la ambigüedad de καιρούς y deja abierta la lectura de tiempos señalados en la nota.
  - El orden de la lista se conserva para reflejar la cadencia acumulativa del original griego.
