- from: Ustedes observan días y meses y estaciones y años[a].
  to: Ustedes observan días y meses y tiempos y años[a].
  rationale: Se cambia «estaciones» por «tiempos» porque en español «estaciones» suele entenderse como estaciones del año, mientras que καιρούς aquí abarca tiempos fijados dentro de una secuencia calendárica. «Tiempos» mantiene el texto principal sobrio y fiel, y la nota conserva la alternativa más específica «tiempos señalados».
