translation:
  language: es
  text: pero está bajo tutores y administradores[a] hasta el tiempo señalado por su padre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'mayordomos' para 'administradores'; el término griego se refiere a quienes administran una casa o patrimonio.
    reason: lexical_alternative
  - marker: b
    text: O 'hasta el tiempo fijado por el padre'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - sino
  - mas
  lexicon: BDAG
  rationale: Conserva el contraste adversativo con el versículo anterior y suena natural en español contemporáneo.
- source_word: ὑπὸ
  english_pob_choice: under
  chosen_spanish: bajo
  alternatives_spanish:
  - sujeto a
  - bajo la autoridad de
  lexicon: BDAG
  rationale: Expresa subjeción o control sobre la persona, manteniendo la imagen relacional del original.
- source_word: ἐπιτρόπους
  english_pob_choice: guardians
  chosen_spanish: tutores
  alternatives_spanish:
  - guardianes
  - curadores
  lexicon: BDAG
  rationale: En español, 'tutores' comunica con claridad la idea de personas encargadas del cuidado y supervisión de un menor. 'Guardianes' puede sonar más general o más fuerte de lo necesario, y 'curadores' no es tan natural aquí.
- source_word: οἰκονόμους
  english_pob_choice: stewards
  chosen_spanish: administradores
  alternatives_spanish:
  - mayordomos
  - gerentes
  lexicon: BDAG
  rationale: El término apunta a quienes administran una casa o patrimonio. 'Administradores' conserva la función de gestión y es inteligible en español amplio. 'Mayordomos' es posible, pero puede sonar más tradicional o menos transparente hoy.
- source_word: ἄχρι τῆς προθεσμίας
  english_pob_choice: until the time set
  chosen_spanish: hasta el tiempo señalado
  alternatives_spanish:
  - hasta el tiempo fijado
  - hasta la fecha señalada
  lexicon: BDAG
  rationale: '''Tiempo señalado'' reproduce la idea de una fecha o plazo previamente determinado sin forzar una redacción demasiado técnica.'
- source_word: τοῦ πατρός
  english_pob_choice: by his father
  chosen_spanish: por su padre
  alternatives_spanish:
  - de su padre
  - por el padre
  lexicon: BDAG
  rationale: El genitivo se entiende como el padre que determina el momento. 'Por su padre' expresa mejor esa agencia en español y mantiene la relación posesiva implícita en el contexto del heredero.
theological_decisions:
- issue: Relación del hijo heredero con los tutores y administradores
  english_pob_reading: The heir is under guardians and stewards until the time set by his father.
  chosen_spanish_reading: El heredero permanece bajo tutela y administración ajenas hasta que el padre determine el tiempo.
  alternative_spanish_readings:
  - El heredero está bajo tutores y administradores hasta el tiempo señalado por su padre.
  - El heredero está sometido a tutores y administradores hasta la fecha fijada por su padre.
  rationale: 'La lectura conserva la analogía legal y familiar de Pablo: un heredero verdadero, pero todavía sin ejercer plenamente su libertad mientras dure el período establecido por el padre. No se añade contenido doctrinal ajeno al símil.'
  doctrine_reference: Galatians 4:1-2; household heir analogy in Pauline argument
- issue: Sentido del genitivo en τοῦ πατρός
  english_pob_reading: '''until the time set by his father'''
  chosen_spanish_reading: '''hasta el tiempo señalado por su padre'''
  alternative_spanish_readings:
  - '''hasta el tiempo señalado del padre'''
  - '''hasta el tiempo fijado por el padre'''
  rationale: La forma elegida mantiene la idea de que el padre es quien fija el plazo. No se absolutiza una lectura teológica particular; se traduce la función contextual dentro de la comparación.
  doctrine_reference: Galatians 4:2; genitive of agency/possession in context
translation_notes:
  revision_awareness: Se tomó en cuenta el auditor de inglés de la POB, que favorece 'guardians' y 'stewards' como distinciones funcionales, así como la alternativa 'the time set' / 'the appointed time'. La versión española mantiene la misma estructura semántica y el valor relacional del genitivo sin depender mecánicamente del inglés.
  spanish_consistency_notes:
  - Se usa 'tutores' para ἐπιτρόπους y 'administradores' para οἰκονόμους, preservando la distinción funcional del original.
  - '''Tiempo señalado'' mantiene la noción de plazo previamente fijado y evita una paráfrasis más extensa.'
  - '''Por su padre'' explicita la agencia del padre conforme al contexto del heredero.'
  - El estilo es formal y eclesialmente legible, sin recurrir a 'SEÑOR' ni a formulaciones tradicionales no sustentadas por el texto.
