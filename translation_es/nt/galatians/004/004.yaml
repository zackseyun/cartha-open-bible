  - severity: low
    issue: Puntuación final no sigue la continuación sintáctica del original
    rationale: El griego termina con coma porque el pensamiento sigue en el versículo siguiente. En una traducción versificada esto puede conservarse; al menos no debería cerrarse con un punto si se busca máxima fidelidad formal al texto fuente inmediato.
