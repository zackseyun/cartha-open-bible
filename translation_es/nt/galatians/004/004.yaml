translation:
  language: es
  text: Pero cuando llegó la plenitud[a] del tiempo, Dios envió[b] a su Hijo, nacido de una mujer[c], nacido bajo la ley[d],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el tiempo cumplido» o «el cumplimiento del tiempo».
    reason: lexical_alternative
  - marker: b
    text: O «envió». El verbo griego es una forma intensificada de «enviar», con el sentido de «enviar fuera» o «mandar».
    reason: lexical_alternative
  - marker: c
    text: O «de una mujer». La frase subraya el nacimiento humano real del Hijo.
    reason: lexical_alternative
  - marker: d
    text: Es decir, bajo la jurisdicción de la ley mosaica.
    reason: cross_reference
lexical_decisions:
- source_word: ὅτε δὲ
  english_pob_choice: But when
  chosen_spanish: Pero cuando
  alternatives_spanish:
  - Ahora cuando
  - Cuando
  lexicon: BDAG
  rationale: La combinación temporal con δέ en español se expresa de forma natural con «Pero cuando», conservando el movimiento discursivo sin exagerar la oposición.
- source_word: ἦλθεν
  english_pob_choice: had come
  chosen_spanish: llegó
  alternatives_spanish:
  - había llegado
  - vino
  lexicon: BDAG
  rationale: El aoristo marca la llegada/completación del momento señalado; «llegó» comunica bien el punto culminante sin recargar la frase con una pluscuamperfecta que en español suena menos directa aquí.
- source_word: τὸ πλήρωμα τοῦ χρόνου
  english_pob_choice: the fullness of time
  chosen_spanish: la plenitud del tiempo
  alternatives_spanish:
  - el tiempo cumplido
  - la plenitud del momento
  - la completación del tiempo
  lexicon: BDAG
  rationale: «Plenitud» reproduce bien πλήρωμα y mantiene la idea de un tiempo que ha alcanzado su cumplimiento previsto. «Del tiempo» preserva el genitivo sin convertirlo en paráfrasis.
- source_word: ἐξαπέστειλεν
  english_pob_choice: sent out
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - envió fuera
  - despachó
  lexicon: BDAG
  rationale: El verbo compuesto añade fuerza, pero en español «envió» expresa de manera natural la misión divina. La nota preserva la intensidad del griego sin forzar un calco poco idiomático.
- source_word: ὁ θεὸς
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: BDAG
  rationale: Correspondencia directa del sujeto nominativo; en español no se requiere artículo.
- source_word: τὸν υἱὸν αὐτοῦ
  english_pob_choice: his Son
  chosen_spanish: a su Hijo
  alternatives_spanish:
  - a su Hijo
  lexicon: BDAG
  rationale: El acusativo con posesivo se expresa naturalmente con objeto directo precedido por «a». «Hijo» va con mayúscula por referencia cristológica clara en el contexto.
- source_word: γενόμενον
  english_pob_choice: born
  chosen_spanish: nacido
  alternatives_spanish:
  - llegado a ser
  - hecho
  lexicon: BDAG
  rationale: En la construcción con ἐκ γυναικός, γίνομαι funciona idiomáticamente para nacimiento humano. «Nacido» es la equivalencia española clara y fiel.
- source_word: ἐκ γυναικός
  english_pob_choice: of a woman
  chosen_spanish: de una mujer
  alternatives_spanish:
  - de mujer
  - procedente de una mujer
  lexicon: BDAG
  rationale: «De una mujer» conserva la idea de origen indicada por ἐκ y expresa el nacimiento humano real del Hijo sin alterar el sentido.
- source_word: γενόμενον ὑπὸ νόμον
  english_pob_choice: born under the law
  chosen_spanish: nacido bajo la ley
  alternatives_spanish:
  - nacido sujeto a la ley
  - hecho bajo la ley
  lexicon: BDAG
  rationale: Se conserva el paralelismo con la cláusula anterior y la relación de sujeción de ὑπὸ νόμον. «La ley» refleja el uso paulino, entendido en contexto como la ley mosaica.
- source_word: νόμον
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - ley
  - la ley mosaica
  lexicon: BDAG
  rationale: Aunque el griego no usa artículo, el español normalmente lo requiere aquí. El contexto de Gálatas especifica la ley mosaica sin necesidad de sobreexplicarla en el texto principal.
theological_decisions:
- issue: La humanidad real del Hijo en γενόμενον ἐκ γυναικός
  english_pob_reading: Render as 'born of a woman' to express real human birth.
  chosen_spanish_reading: «Nacido de una mujer» afirma un nacimiento humano real sin negar la preexistencia del Hijo.
  alternative_spanish_readings:
  - hecho de una mujer
  - procedente de una mujer
  rationale: La frase mantiene la fuerza encarnacional del pasaje y comunica con claridad la verdadera humanidad de Jesús. «Nacido» es preferible en español por fidelidad idiomática y precisión teológica.
  doctrine_reference: Credo Niceno; Definición de Calcedonia
- issue: El alcance de ὑπὸ νόμον
  english_pob_reading: Understand as the Mosaic law and render 'under the law.'
  chosen_spanish_reading: «Bajo la ley» conserva la formulación paulina y remite, por el contexto, a la ley mosaica.
  alternative_spanish_readings:
  - bajo ley
  - sujeto a la ley
  rationale: La traducción mantiene la tensión lexical de Pablo sin sustituirla por una explicación expansiva. El contexto de Gálatas permite entender la referencia mosaica sin perder concisión.
  doctrine_reference: Contexto paulino de Gálatas; ley mosaica en la argumentación del pacto
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacían falta cambios; el borrador español sigue de cerca la estructura del griego y conserva las decisiones auditadas del POB inglés, especialmente la fuerza de ἐξαπέστειλεν, la humanidad real expresada por γενόμενον ἐκ γυναικός y el sentido paulino de ὑπὸ νόμον.
  spanish_consistency_notes:
  - Se usa «Dios» sin artículo, conforme al sujeto griego.
  - Se conserva el paralelismo participial con dos cláusulas de «nacido».
  - «Ley» se entiende en sentido paulino/mosaico sin introducir ampliación en el texto principal.
  - Las notas mantienen alternativas relevantes sin duplicar marcadores.
