translation:
  language: es
  text: Pero el hijo de la esclava nació según la carne[a], mientras que el hijo de la libre nació por promesa[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "según medios humanos" / "de manera humana". Griego: "según la carne".'
    reason: lexical_alternative
  - marker: b
    text: 'O: "por medio de la promesa". La frase señala un nacimiento que resulta de la promesa de Dios, no meramente de la procreación humana ordinaria.'
    reason: lexical_alternative
lexical_decisions:
- source_word: παιδίσκης
  english_pob_choice: slave woman
  chosen_spanish: esclava
  alternatives_spanish:
  - muchacha esclava
  - sirvienta
  - criada
  lexicon: BDAG
  rationale: En el contraste Sarah-Agar, el rasgo decisivo es la condición de esclavitud. En español, 'esclava' comunica con claridad ese estatuto y preserva la fuerza social y argumentativa del término griego.
- source_word: κατὰ σάρκα
  english_pob_choice: according to the flesh
  chosen_spanish: según la carne
  alternatives_spanish:
  - de manera humana
  - según medios humanos
  - en el orden natural
  lexicon: BDAG
  rationale: Se mantiene 'carne' para conservar el término paulino σάρξ y su tensión teológica. 'Según la carne' es idiomático en español bíblico y refleja la oposición con 'por medio de la promesa' sin suavizar el contraste.
- source_word: σάρξ
  english_pob_choice: flesh
  chosen_spanish: carne
  alternatives_spanish:
  - naturaleza humana
  - condición humana
  - medios humanos
  lexicon: BDAG
  rationale: Aquí σάρξ no designa pecado sino el ámbito de la generación humana ordinaria. 'Carne' preserva la terminología paulina y evita interpretar de más el contraste.
- source_word: γεγέννηται
  english_pob_choice: was born
  chosen_spanish: nació
  alternatives_spanish:
  - ha nacido
  - fue engendrado
  lexicon: BDAG
  rationale: En español, el perfecto pasivo griego se expresa con naturalidad en pretérito simple en esta oposición narrativa. 'Nació' es claro y fluido, sin perder el sentido de nacimiento ya realizado.
- source_word: ἐλευθέρας
  english_pob_choice: free woman
  chosen_spanish: la libre
  alternatives_spanish:
  - la mujer libre
  - la mujer libremente nacida
  lexicon: BDAG
  rationale: El adjetivo sustantivado contrasta con 'la esclava'. En español, 'la libre' mantiene la concisión del griego y deja visible la antítesis social.
- source_word: δι’ ἐπαγγελίας
  english_pob_choice: through promise
  chosen_spanish: por medio de la promesa
  alternatives_spanish:
  - por la promesa
  - mediante la promesa
  lexicon: BDAG
  rationale: La frase anartrosa puede sonar extraña si se vuelve demasiado literal; 'por medio de la promesa' comunica la mediación/instrumentalidad y conserva la referencia a la promesa divina sin añadir contenido ajeno.
- source_word: ὁ μὲν ... ὁ δὲ
  english_pob_choice: the son ... while the son
  chosen_spanish: el hijo ... mientras que el hijo
  alternatives_spanish:
  - uno ... y el otro
  - el uno ... pero el otro
  lexicon: BDAG
  rationale: Se explicita 'el hijo' para que la comparación sea natural en español y se conserve la referencia implícita del contexto, sin introducir información nueva.
theological_decisions:
- issue: Contraste entre nacimiento 'según la carne' y nacimiento 'por medio de la promesa'
  english_pob_reading: The verse contrasts natural human birth with birth resulting from God's promise, without implying that physical birth itself is sinful.
  chosen_spanish_reading: El versículo contrasta el nacimiento humano ordinario con el nacimiento que resulta de la promesa de Dios, sin insinuar que la existencia corporal o el nacimiento físico sean malos.
  alternative_spanish_readings:
  - El versículo podría parafrasearse como 'de manera humana' frente a 'por medio de la promesa'.
  - Podría traducirse 'según medios humanos' para explicitar el matiz.
  rationale: Mantener 'según la carne' conserva la terminología de Pablo y la tensión interpretativa del texto. La nota permite aclarar que el sentido es contrastivo y covenantal, no una condena de la corporalidad.
  doctrine_reference: Translation philosophy §3, §5; tabla de términos discutidos para σάρξ
- issue: Valor de la promesa en δι’ ἐπαγγελίας
  english_pob_reading: The phrase points to birth resulting from God's promise rather than merely ordinary human procreation.
  chosen_spanish_reading: La frase apunta a un nacimiento que depende de la promesa de Dios, no solo de la procreación humana ordinaria.
  alternative_spanish_readings:
  - nacimiento por promesa
  - nacimiento mediante la promesa
  rationale: '''Por medio de la promesa'' mantiene la mediación y evita reducir el matiz a una fórmula religiosa vacía. La referencia implícita es la promesa hecha a Abraham y Sara.'
  doctrine_reference: Génesis 18:10-14; Gálatas 4:21-31
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el packet griego y la auditoría inglesa. Se conservan las decisiones ya estabilizadas: παιδίσκη = ''esclava'', κατὰ σάρκα = ''según la carne'', ἐλευθέρα = ''la libre'', δι’ ἐπαγγελίας = ''por medio de la promesa''. No se detectaron cambios de revisión relevantes en la versión más reciente.'
  spanish_consistency_notes:
  - Se evita 'SEÑOR' porque este versículo no contiene el nombre divino ni κύριος.
  - Se usa 'promesa' sin artículo adicional para reflejar la anartrosidad del griego y la fluidez del español.
  - '''La esclava'' y ''la libre'' conservan el paralelismo sustantivado del original.'
  - La nota de 'carne' preserva la tensión paulina sin convertirla en 'naturaleza pecaminosa'.
