review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura contrastiva del griego: hijo de la esclava frente al hijo de la libre, ''según la carne'' frente a ''por medio de la promesa''. Conserva adecuadamente σάρξ como ''carne'' y παιδίσκη como ''esclava''. Sin embargo, ''por medio de la promesa'' introduce artículo donde el griego tiene una frase anartrosa y donde el English POB prefirió ''through promise'', además de omitir la alternativa documentada ''by promise''.'
  spanish_quality_summary: 'El español es claro y digno. ''Según la carne'' funciona en registro bíblico y ''la libre'' es comprensible, aunque algo más marcada que ''la mujer libre''. El principal problema de calidad es la nota [a]: ''fue nacido'' no es español natural y no sirve como alternativa válida en una nota léxica. También conviene alinear la nota sobre la promesa con la auditoría inglesa.'
  glossary_alignment: 'Se alinea bien con los términos del proyecto: σάρξ -> ''carne'', παιδίσκη -> ''esclava'', ἐλευθέρα -> ''la libre''. No hay conflicto con Yahvé/Mesías/etc. La única desalineación relevante es δι’ ἐπαγγελίας: mejor ''por promesa'' en el texto principal, con nota para ''por medio de la promesa'' o ''mediante la promesa'' si se desea preservar el matiz instrumental.'
  issues:
  - severity: medium
    issue: La nota [a] propone 'fue nacido' como alternativa para γεγέννηται.
    rationale: '''Fue nacido'' es antinatural en español contemporáneo y no constituye una alternativa útil ni fiel para una Biblia legible. Si se mantiene nota, debe ofrecer ''ha nacido'' o explicación del perfecto, no una forma no idiomática.'
  - severity: medium
    issue: El texto principal traduce δι’ ἐπαγγελίας como 'por medio de la promesa'.
    rationale: Aunque comprensible, añade artículo y hace más explícita la instrumentalidad que el griego anartro no exige. El English POB documentó como principal 'through promise' y como alternativa 'by promise'; en español 'por promesa' preserva mejor la concisión y el contraste.
  - severity: low
