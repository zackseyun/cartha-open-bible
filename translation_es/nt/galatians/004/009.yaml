translation:
  language: es
  text: Pero ahora, habiendo llegado a conocer a Dios —o más bien, habiendo sido conocidos por Dios—, ¿cómo es que vuelven otra vez a los elementos débiles y pobres[a], a los cuales quieren ser esclavizados otra vez desde el principio?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «principios elementales», «espíritus elementales» o «cosas elementales» para στοιχεῖα. «Elementos débiles y pobres» conserva la ambigüedad del griego; puede referirse a principios básicos, a elementos del mundo o a poderes elementales.
    reason: lexical_alternative
lexical_decisions:
- source_word: γνόντες
  english_pob_choice: having come to know
  chosen_spanish: habiendo llegado a conocer
  alternatives_spanish:
  - habiendo conocido
  - después de conocer
  lexicon: BDAG
  rationale: El aoristo participial expresa el ingreso a una relación de conocimiento; en español, «habiendo llegado a conocer» preserva ese matiz inceptivo sin sonar forzado.
- source_word: θεόν
  english_pob_choice: God
  chosen_spanish: a Dios
  alternatives_spanish:
  - a Dios verdadero
  lexicon: BDAG
  rationale: Se trata del objeto directo de γνόντες y refiere al Dios verdadero en contraste con el antiguo cautiverio pagano; en español conviene la forma normal «a Dios».
- source_word: γνωσθέντες ὑπὸ θεοῦ
  english_pob_choice: having been known by God
  chosen_spanish: habiendo sido conocidos por Dios
  alternatives_spanish:
  - siendo conocidos por Dios
  - habiendo sido reconocidos por Dios
  lexicon: BDAG
  rationale: La pasiva debe mantenerse explícita para conservar la iniciativa divina; «por Dios» traduce ὑπό + genitivo de manera natural y auditable.
- source_word: πῶς
  english_pob_choice: how can
  chosen_spanish: ¿cómo es que
  alternatives_spanish:
  - ¿cómo pueden
  - ¿por qué
  lexicon: BDAG
  rationale: En la pregunta retórica, πῶς expresa sorpresa e incredulidad; «¿cómo es que» comunica mejor ese tono que un simple «cómo».
- source_word: ἐπιστρέφετε πάλιν
  english_pob_choice: you turn back again
  chosen_spanish: vuelven otra vez
  alternatives_spanish:
  - regresan otra vez
  - se apartan otra vez y vuelven
  lexicon: BDAG
  rationale: La forma presente conserva la acción actual/reiterada, y «otra vez» refleja πάλιν; se evitó una construcción demasiado literal que sonaría pesada en español.
- source_word: ἐπὶ τὰ ἀσθενῆ καὶ πτωχὰ στοιχεῖα
  english_pob_choice: to the weak and poor elemental principles
  chosen_spanish: a los elementos débiles y pobres
  alternatives_spanish:
  - a los principios elementales débiles y pobres
  - a los espíritus elementales débiles y pobres
  - a los principios básicos débiles y pobres
  lexicon: BDAG
  rationale: Se preserva la ambigüedad de στοιχεῖα sin resolverla dogmáticamente. «Elementos» es un equivalente español viable y no cierra si se trata de principios básicos o poderes elementales; «débiles y pobres» mantiene los adjetivos del original.
- source_word: οἷς
  english_pob_choice: to which
  chosen_spanish: a los cuales
  alternatives_spanish:
  - a lo cual
  - a quienes
  lexicon: BDAG
  rationale: El relativo neutro plural concuerda mejor con «elementos»; se eligió una forma impersonal en español que conserva la referencia neutra.
- source_word: πάλιν ἄνωθεν
  english_pob_choice: all over again
  chosen_spanish: de nuevo
  alternatives_spanish:
  - otra vez desde el principio
  - nuevamente desde arriba
  lexicon: BDAG
  rationale: La combinación intensifica la repetición y el reinicio; «de nuevo» es idiomático en español, aunque la intensidad completa queda reforzada por el contexto y por «otra vez».
- source_word: δουλεύειν
  english_pob_choice: to be enslaved
  chosen_spanish: ser esclavizados
  alternatives_spanish:
  - estar sujetos como esclavos
  - servir
  - ser hechos esclavos
  lexicon: BDAG
  rationale: Se mantiene el valor de esclavitud, en línea con la fuerza léxica que el POB asigna a δουλεύω/δοῦλος cuando el contexto es de sujeción opresiva. «Ser esclavizados» evita suavizar el término a «servir».
- source_word: θέλετε
  english_pob_choice: you want
  chosen_spanish: quieren
  alternatives_spanish:
  - desean
  - están dispuestos a
  lexicon: BDAG
  rationale: Expresa voluntad/intención en segunda persona plural; en este contexto, «quieren» suena natural y conserva el reproche paulino.
theological_decisions:
- issue: Sentido de στοιχεῖα en Gálatas 4:9
  english_pob_reading: elemental principles
  chosen_spanish_reading: elementos débiles y pobres
  alternative_spanish_readings:
  - principios elementales
  - espíritus elementales
  - cosas elementales
  rationale: El término es debatido en Pablo y puede aludir a principios básicos, a los componentes elementales del mundo o a poderes asociados con el antiguo orden. La traducción principal conserva la ambigüedad con «elementos» en vez de especificar una lectura demonológica o pedagógica.
  doctrine_reference: Preservar la tensión exegética sin resolverla de manera indebida.
- issue: Fuerza de «habiendo sido conocidos por Dios»
  english_pob_reading: God's knowing them is presented as primary and corrective to their knowing God
  chosen_spanish_reading: la iniciativa de Dios queda destacada como primaria y correctiva
  alternative_spanish_readings:
  - simple reconocimiento relacional
  - pasiva meramente estilística
  rationale: μᾶλλον δέ corrige y profundiza la afirmación anterior; mantener la pasiva en español preserva la primacía de la acción divina sin añadir sistemas doctrinales ajenos al versículo.
  doctrine_reference: No importar formulaciones doctrinales no exigidas por el texto; conservar el énfasis de la frase.
translation_notes:
  revision_awareness: 'Coincide con la última pasada revisada: no se requieren cambios sustanciales respecto del análisis auditado en inglés. Se conservó la corrección de μᾶλλον δέ, la pasiva divina de γνωσθέντες y la ambigüedad de στοιχεῖα.'
  spanish_consistency_notes:
  - Se mantuvo «Dios» en concordancia con la terminología POB para θεός.
  - Se prefirió «ser esclavizados» para reflejar la fuerza de δουλεύειν sin rebajarla a «servir».
  - Se usó una puntuación de incisos con rayas para reproducir el matiz correctivo de «o más bien».
  - El relativo «a los cuales» mantiene el referente neutro plural del griego.
