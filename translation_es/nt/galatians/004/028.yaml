translation:
  language: es
  text: Ahora ustedes, hermanos[a], como Isaac, son hijos de la promesa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Hermanos'' aquí usa la forma masculina plural como un modo representativo de dirigirse a la congregación, probablemente incluyendo tanto a hombres como a mujeres.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑμεῖς
  english_pob_choice: you
  chosen_spanish: ustedes
  alternatives_spanish:
  - vosotros
  - tú
  lexicon: BDAG
  rationale: El pronombre es de segunda persona plural; en español neutral latinoamericano, 'ustedes' comunica naturalmente el plural sin perder el énfasis del griego.
- source_word: δέ
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - pero
  - y
  lexicon: BDAG
  rationale: Marca una transición suave en el discurso; 'Ahora' reproduce bien el valor conectivo sin forzar un contraste adversativo.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - hermanos/as
  lexicon: BDAG
  rationale: Se conserva la forma masculina plural del vocativo, que funciona de manera representativa para la congregación mixta, tal como lo documenta la POB en inglés.
- source_word: κατὰ Ἰσαὰκ
  english_pob_choice: like Isaac
  chosen_spanish: como Isaac
  alternatives_spanish:
  - según Isaac
  - a la manera de Isaac
  lexicon: BDAG
  rationale: La relación es comparativa y tipológica; 'como Isaac' es la forma más natural en español y mantiene la analogía del texto griego.
- source_word: ἐπαγγελίας
  english_pob_choice: of promise
  chosen_spanish: de la promesa
  alternatives_spanish:
  - de promesa
  - prometidos
  lexicon: BDAG
  rationale: El genitivo expresa pertenencia o relación con la promesa; 'hijos de la promesa' conserva la formulación paulina y su fuerza teológica.
- source_word: τέκνα
  english_pob_choice: children
  chosen_spanish: hijos
  alternatives_spanish:
  - hijos e hijas
  - descendencia
  lexicon: BDAG
  rationale: Aquí 'hijos' mantiene bien el valor filial del predicado y permite una expresión fluida en español. La nota de inclusión se conserva en el vocativo plural representativo, como en la POB inglesa.
- source_word: ἐστέ
  english_pob_choice: are
  chosen_spanish: son
  alternatives_spanish:
  - están
  - resultan ser
  lexicon: BDAG
  rationale: Verbo copulativo simple de segunda persona plural; 'son' transmite de manera directa la identificación predicativa.
theological_decisions:
- issue: Vocativo masculino plural con inclusión congregacional
  english_pob_reading: '''Brothers'' uses the masculine plural form as a representative address to the congregation, likely including both men and women.'
  chosen_spanish_reading: '''Hermanos'' conserva el vocativo masculino plural como forma representativa dirigida a toda la congregación, probablemente incluyendo a hombres y mujeres.'
  alternative_spanish_readings:
  - '''Hermanos y hermanas'''
  - '''hermanas y hermanos'''
  rationale: No se sustituye la forma documentada del texto por una expansión interpretativa en el cuerpo principal. La inclusión se explica en nota para mantener la huella léxica del original y de la POB inglesa.
  doctrine_reference: Uso representativo del masculino plural en el discurso paulino
- issue: Relación de los creyentes con Isaac y la promesa
  english_pob_reading: '''like Isaac, are children of promise'' preserves both the comparison with Isaac and the covenantal status Paul assigns to the readers.'
  chosen_spanish_reading: '''como Isaac, son hijos de la promesa'' conserva la comparación con Isaac y el estatuto pactal que Pablo atribuye a los destinatarios.'
  alternative_spanish_readings:
  - '''son hijos prometidos, como Isaac'''
  - '''son hijos de promesa, como Isaac'''
  rationale: La sintaxis española permite mantener la comparación y el predicado sin intensificar más allá del texto. 'Hijos de la promesa' refleja bien el genitivo y la resonancia bíblica de la expresión.
  doctrine_reference: Tipología paulina y lenguaje de la promesa en la alianza
translation_notes:
  revision_awareness: 'Coincide con la lectura auditada: no hubo revisiones pendientes en la POB inglesa y el cotejo reporta alta concordancia. La versión española conserva la misma estructura básica: transición (''Ahora''), vocativo representativo (''hermanos''), comparación (''como Isaac'') y predicado (''hijos de la promesa'').'
  spanish_consistency_notes:
  - Se mantiene 'hijos de la promesa' como expresión paulina estable, sin sustituirla por un giro más explicativo.
  - Se evita 'Cristo' o cualquier terminología no presente en el versículo.
  - El estilo es formal y publicable, con puntuación española y sintaxis natural en español.
  - La nota sobre 'hermanos' se ancla exactamente en el vocativo, siguiendo la convención requerida.
