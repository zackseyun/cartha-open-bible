translation:
  language: es
  text: Así también nosotros, cuando éramos niños, estábamos esclavizados bajo los principios elementales del mundo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "los espíritus elementales del mundo"; el término griego puede referirse ya sea a principios o elementos básicos, ya sea a poderes espirituales cósmicos.
    reason: alternative_reading
lexical_decisions:
- source_word: οὕτως καὶ
  english_pob_choice: So also
  chosen_spanish: Así también
  alternatives_spanish:
  - Igualmente
  - Del mismo modo también
  lexicon: BDAG
  rationale: Expresa con naturalidad la comparación con el ejemplo anterior y conserva el matiz correlativo de la construcción griega.
- source_word: ἡμεῖς
  english_pob_choice: we
  chosen_spanish: nosotros
  alternatives_spanish:
  - nosotros mismos
  lexicon: BDAG
  rationale: Mantiene el pronombre plural explícito como en el griego, con valor enfático dentro de la analogía.
- source_word: ὅτε
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - mientras
  lexicon: BDAG
  rationale: Introduce correctamente la cláusula temporal en español sin alterar la relación de tiempo.
- source_word: νήπιοι
  english_pob_choice: children
  chosen_spanish: niños
  alternatives_spanish:
  - menores
  - infantes
  lexicon: BDAG
  rationale: En este contexto Pablo habla de inmadurez dentro de la analogía de herencia; "niños" comunica esa inmadurez de forma natural en español.
- source_word: ὑπὸ
  english_pob_choice: under
  chosen_spanish: bajo
  alternatives_spanish:
  - sujetos a
  lexicon: BDAG
  rationale: Conserva la imagen de subordinación o dominio que el contexto desarrolla con el lenguaje de estar "bajo".
- source_word: τὰ στοιχεῖα τοῦ κόσμου
  english_pob_choice: the elemental principles of the world
  chosen_spanish: los principios elementales del mundo
  alternatives_spanish:
  - los espíritus elementales del mundo
  - los elementos del mundo
  - las bases elementales del mundo
  lexicon: BDAG
  rationale: La frase es debatida; "principios elementales" mantiene la posible referencia a estructuras básicas o rudimentos sin decidir en el texto principal por una lectura personalizada de poderes cósmicos.
- source_word: ἤμεθα δεδουλωμένοι
  english_pob_choice: were enslaved
  chosen_spanish: estábamos esclavizados
  alternatives_spanish:
  - habíamos quedado esclavizados
  - estábamos en esclavitud
  lexicon: BDAG
  rationale: Reproduce con claridad la fuerza pasiva/perfectiva del griego y conserva el peso léxico de δουλόω con "esclavizados" en lugar de suavizarlo a "siervos".
theological_decisions:
- issue: Sentido de τὰ στοιχεῖα τοῦ κόσμου
  english_pob_reading: Rendered non-personally as 'the elemental principles of the world' in the main text, with a note allowing 'the elemental spirits of the world'.
  chosen_spanish_reading: '"los principios elementales del mundo" en el texto principal, con nota que admite "los espíritus elementales del mundo".'
  alternative_spanish_readings:
  - los espíritus elementales del mundo
  - los elementos del mundo
  - los rudimentos del mundo
  rationale: El contexto inmediato enfatiza una condición de inmadurez y sujeción; por eso la versión principal no personaliza la frase. Sin embargo, el término griego puede aludir también a poderes cósmicos, y esa tensión se conserva en la nota.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'El registro concuerda con la revisión más reciente del POB en inglés: no se documentaron cambios aplicados y el cotejo final indicó alto acuerdo.'
  spanish_consistency_notes:
  - Se mantuvo "esclavizados" para conservar la fuerza léxica de δουλόω, evitando suavizarlo a "siervos".
  - Se eligió "principios elementales" como equivalente principal de τὰ στοιχεῖα τοῦ κόσμου por su amplitud semántica y por la tensión exegética documentada.
  - '"Así también" reproduce de modo natural el valor correlativo de οὕτως καὶ sin perder la referencia al argumento precedente.'
  - '"Niños" expresa inmadurez contextual; no se tomó literalmente como referencia biológica a la infancia.'
  - Se usó puntuación española estándar y se colocó la nota donde aparece la frase ambigua en el texto principal.
