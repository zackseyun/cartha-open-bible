translation:
  language: es
  text: Mis hijos[a], por quienes de nuevo sufro dolores de parto hasta que el Mesías[b] sea formado en ustedes[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hijitos». «Mis hijos» reproduce la ternura del vocativo sin añadir un diminutivo que el sustantivo griego no exige.
    reason: lexical_alternative
  - marker: b
    text: 'O «Cristo». Χριστός se traduce aquí como título: «Mesías».'
    reason: alternative_reading
  - marker: c
    text: O «entre ustedes», resaltando el posible sentido corporativo de ἐν ὑμῖν.
    reason: lexical_alternative
lexical_decisions:
- source_word: τέκνα μου
  english_pob_choice: My children
  chosen_spanish: Mis hijos
  alternatives_spanish:
  - Mis hijos pequeños
  - Mis hijitos
  lexicon: BDAG
  rationale: τέκνα es un vocativo afectuoso en plural; en español, «mis hijos» comunica cercanía y relación filial sin añadir diminutivos que el sustantivo no exige.
- source_word: οὓς
  english_pob_choice: for whom
  chosen_spanish: por quienes
  alternatives_spanish:
  - a quienes
  - para quienes
  lexicon: BDAG
  rationale: 'El relativo acusativo se integra de modo natural al español con una construcción de finalidad/relación: «por quienes sufro dolores de parto». Conserva el vínculo con el objeto del verbo sin sonar forzado.'
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: de nuevo
  alternatives_spanish:
  - otra vez
  lexicon: BDAG
  rationale: Marca repetición. «De nuevo» es natural, sobrio y fiel al valor adverbial del griego.
- source_word: ὠδίνω
  english_pob_choice: am again suffering birth pains
  chosen_spanish: sufro dolores de parto
  alternatives_spanish:
  - estoy con dolores de parto
  - estoy sufriendo dolores de parto
  - estoy de parto
  lexicon: BDAG
  rationale: ὠδίνω conserva la imagen vívida de parto; «sufro dolores de parto» mantiene el tenor metafórico y el tono pastoral. Se omite la redundancia de «de nuevo» dentro del verbo porque ya está expresada por πάλιν.
- source_word: μέχρις οὗ
  english_pob_choice: until
  chosen_spanish: hasta que
  alternatives_spanish:
  - hasta el momento en que
  lexicon: BDAG
  rationale: Introduce la meta temporal de la metáfora. «Hasta que» es la equivalencia más idiomática y precisa en español.
- source_word: μορφωθῇ
  english_pob_choice: is formed
  chosen_spanish: sea formado
  alternatives_spanish:
  - tome forma
  - llegue a formarse
  lexicon: BDAG
  rationale: El pasivo subjuntivo aoristo pide una forma pasiva en español. «Sea formado» conserva la pasividad y la imagen de dar forma sin explicar más de lo que el texto dice.
- source_word: Χριστός
  english_pob_choice: Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: 'Siguiendo el criterio del proyecto, Χριστός se traduce como título: «Mesías». Esto mantiene la referencia titulal y evita convertirlo en un nombre litúrgico fijo sin necesidad contextual.'
- source_word: ἐν ὑμῖν
  english_pob_choice: in you
  chosen_spanish: en ustedes
  alternatives_spanish:
  - entre ustedes
  lexicon: BDAG
  rationale: La preposición puede expresar interioridad o sentido corporativo. «En ustedes» conserva la posibilidad de formación interior en la comunidad plural, tal como lo permite el griego.
theological_decisions:
- issue: Alcance de «el Mesías sea formado en ustedes»
  english_pob_reading: The phrase refers to the Messiah's character/life taking shape within the Galatian believers, without specifying a later doctrinal mechanism beyond Paul's pastoral metaphor.
  chosen_spanish_reading: La frase alude a que la vida o forma del Mesías se vaya plasmando en la comunidad creyente, sin convertir la metáfora en una formulación doctrinal técnica.
  alternative_spanish_readings:
  - que el Mesías sea formado entre ustedes, en sentido corporativo
  - que Cristo llegue a formarse en ustedes
  rationale: El griego admite una lectura individual y corporativa. La traducción preserva la metáfora y la ambigüedad controlada, sin resolverla hacia una explicación doctrinal más estrecha de la que el texto da.
  doctrine_reference: Preservar la tensión teológica y metafórica del texto.
translation_notes:
  revision_awareness: 'El auditorio en inglés pasó por una revisión que osciló entre «the Messiah» y «Christ»; el registro español mantiene la decisión auditada del paquete fuente: Χριστός como «Mesías», conforme a la política del proyecto, sin borrar la alternativa tradicional «Cristo» indicada en nota.'
  spanish_consistency_notes:
  - Se mantiene el vocativo plural afectuoso con «Mis hijos».
  - Se conserva la metáfora del parto con léxico natural en español.
  - «Mesías» se usa para Χριστός en el texto principal, siguiendo la convención del proyecto.
  - La pluralidad de «ustedes» respeta el destinatario colectivo del pasaje.
  - La puntuación reproduce una sola cláusula con cierre de sentido equivalente al original.
