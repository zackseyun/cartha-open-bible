translation:
  language: es
  text: Sean como yo[a], porque yo también soy como ustedes[c], hermanos[b]; les ruego, no me hicieron ningún mal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «como yo».'
    reason: lexical_alternative
  - marker: b
    text: «Hermanos» aquí se dirige a la comunidad creyente y probablemente incluye tanto a hombres como a mujeres.
    reason: cultural_note
  - marker: c
    text: 'O: «yo también llegué a ser como ustedes»; el griego es elíptico, y a veces se sobreentiende un verbo para aclarar el sentido en el contexto.'
    reason: alternative_reading
lexical_decisions:
- source_word: Γίνεσθε
  english_pob_choice: Become
  chosen_spanish: Háganse
  alternatives_spanish:
  - Sean
  - Vuélvanse
  lexicon: BDAG
  rationale: El imperativo presente de γίνομαι pide una acción/estado asumido con continuidad; en español, «háganse» conserva la idea de llegar a ser o ponerse en esa condición mejor que un simple «sean».
- source_word: ὡς ἐγώ
  english_pob_choice: as I am
  chosen_spanish: como yo
  alternatives_spanish:
  - como yo soy
  - como yo estoy
  lexicon: BDAG
  rationale: La comparación es el núcleo de la frase. «Como yo» es natural en español y mantiene la brevedad elíptica del griego sin añadir más de lo necesario.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Aquí introduce la razón del ruego de Pablo; «porque» expresa con claridad la relación causal señalada por el texto griego y por la POB inglesa.
- source_word: κἀγὼ ὡς ὑμεῖς
  english_pob_choice: I also am as you are
  chosen_spanish: yo también soy como ustedes
  alternatives_spanish:
  - yo también llegué a ser como ustedes
  - yo también soy como vosotros
  lexicon: BDAG
  rationale: La revisión inglesa reciente prefirió «am» en vez de «became» para reflejar la elipsis griega. En español, «soy como ustedes» comunica esa misma comparación directa sin forzar un verbo suplido que el griego no expresa explícitamente.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - hermanos/as
  lexicon: BDAG
  rationale: Se conserva el vocativo masculino plural de forma literal. En español, «hermanos» es la forma base y puede abarcar a toda la comunidad; la aclaración inclusiva se documenta en nota.
- source_word: δέομαι ὑμῶν
  english_pob_choice: I beg you
  chosen_spanish: les ruego
  alternatives_spanish:
  - les suplico
  - les imploro
  lexicon: BDAG
  rationale: «Ruego» transmite la intensidad respetuosa de δέομαι sin sonar excesivamente arcaico. Se usa «les» para hacer explícito el destinatario plural en español.
- source_word: οὐδέν με ἠδικήσατε
  english_pob_choice: you did me no wrong
  chosen_spanish: ustedes no me hicieron ningún mal
  alternatives_spanish:
  - no me agraviaron en nada
  - no me ofendieron en nada
  lexicon: BDAG
  rationale: ἀδικέω puede implicar hacer mal, agraviar o tratar injustamente. «No me hicieron ningún mal» conserva el sentido general y es natural en español actual, sin perder la negación enfática de οὐδέν.
theological_decisions:
- issue: Inclusive force of ἀδελφοί in a mixed church audience
  english_pob_reading: Main text keeps 'brothers' and explains inclusive force in a footnote.
  chosen_spanish_reading: El texto principal dice «hermanos» y una nota aclara que se dirige a la comunidad creyente e incluye probablemente a hombres y mujeres.
  alternative_spanish_readings:
  - hermanos y hermanas
  - hermanos/as
  rationale: Se preserva la forma masculina plural del original, que la POB inglesa retiene por fidelidad formal, sin dejar de documentar su probable alcance inclusivo.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Ellipsis in κἀγὼ ὡς ὑμεῖς
  english_pob_reading: The Greek is elliptical; 'became' is supplied in earlier English but later revised to 'am' to reflect the direct comparison more closely.
  chosen_spanish_reading: Se refleja la comparación con «yo también soy como ustedes», sin suplir explícitamente «llegué a ser», porque la revisión inglesa más reciente desaconseja fijar un pasado que el griego no expresa aquí.
  alternative_spanish_readings:
  - yo también llegué a ser como ustedes
  - yo también era como ustedes
  rationale: La frase griega es elíptica y admite una reconstrucción que puede sonar temporalmente más fuerte de lo que el texto exige. El español elegido mantiene la tensión y la fluidez sin resolverla indebidamente.
  doctrine_reference: DOCTRINE.md Translation philosophy §2
translation_notes:
  revision_awareness: La revisión inglesa reciente cambió la segunda cláusula de «I also became as you are» a «I also am as you are» para seguir más de cerca la elipsis griega. La versión española adopta esa misma dirección y evita introducir un pasado no explícito. También se respeta el ajuste puntuacional que separa con punto y coma la primera súplica de la afirmación final.
  spanish_consistency_notes:
  - Se mantuvo «hermanos» para el vocativo plural masculino, con nota de alcance inclusivo.
  - Se evitó «Cristo/mesías» y no hay términos teológicos que requieran normalización adicional en este versículo.
  - Se eligió un registro claro y digno, apto para lectura pública, sin calco rígido del inglés.
