review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura del griego: imperativo de γίνομαι, comparación doble con ὡς, valor causal de ὅτι, vocativo ἀδελφοί, ruego de δέομαι y cierre con οὐδέν με ἠδικήσατε. Sin embargo, la nota [a] invierte la relación entre texto principal y alternativa: el texto español dice «como yo», mientras que la POB inglesa lleva «as I am» en el texto principal y «like me» como alternativa. En español, además, «ustedes no me hicieron ningún mal» suena algo pesado y menos preciso que una formulación más natural como «no me hicieron ningún mal en nada» o mejor «no me trataron injustamente en nada»/«no me hicieron ningún mal»; pero el principal problema es de naturalidad y puntuación, no de sentido básico.'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero «Háganse como yo» suena algo forzado; «Sean como yo» o «Lleguen a ser como yo» serían opciones, aunque «háganse» es defendible por γίνομαι. Más importante, la puntuación y el flujo mejoran si se evita repetir «ustedes» después de «les ruego». También conviene alinear la nota [c] con la función real de la nota inglesa: la inglesa no da una alternativa para δέομαι sino para la cláusula elíptica «I also am as you are».'
  glossary_alignment: '«Hermanos» con nota inclusiva está bien alineado con la política. No hay términos del glosario mayor que entren en juego aparte de eso. La principal desalineación es con la auditoría inglesa de notas: [a] y [c] no corresponden a las mismas decisiones léxicas/documentales que en la POB auditada.'
  issues:
  - severity: high
    issue: La nota [a] no refleja correctamente la decisión principal/alternativa de ὡς ἐγώ.
    rationale: El texto inglés auditado tiene en el cuerpo «as I am» y en nota la alternativa «like me». El borrador español pone en el texto «como yo» y en nota «como yo soy», invirtiendo el eje documentado.
  - severity: high
    issue: La nota [c] está asignada al lugar equivocado y con contenido equivocado.
    rationale: La nota inglesa [c] explica la elipsis de κἀγὼ ὡς ὑμεῖς, no ofrece una alternativa para δέομαι. En español debe anclarse en la segunda cláusula comparativa, no en «les ruego».
  - severity: medium
    issue: «ustedes no me hicieron ningún mal» es menos natural tras «les ruego».
    rationale: La repetición explícita de «ustedes» es innecesaria en español y entorpece el ritmo. Se puede conservar el sentido con una redacción más idiomática.
  - severity: low
    issue: «Háganse como yo» es defendible pero algo tosco en español bíblico contemporáneo.
    rationale: γίνομαι pide devenir, pero en español la combinación «hacerse como alguien» puede sonar menos natural que «sean como yo» o «háganse como yo soy». Dado el patrón documental de la POB, una leve normalización mejora la legibilidad.
