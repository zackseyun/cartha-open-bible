base_translation:
  language: en
  yaml_path: translation/nt/galatians/004/015.yaml
  text: Where then is your blessedness? For I testify to you that[a], if possible[b], you would have torn out your eyes and given them to me.
  footnotes:
  - marker: a
    text: Or 'your blessedness' or 'your blessing.' The Greek μακαρισμός can refer to a state or declaration of being blessed.
    reason: lexical_alternative
  - marker: b
    text: Literally 'having gouged out your eyes.' The expression is likely hyperbolic for their former devotion, though some take it as hinting at Paul's bodily condition.
    reason: lexical_alternative
