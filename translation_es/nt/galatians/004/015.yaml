translation:
  language: es
  text: ¿Dónde está, pues, vuestra bienaventuranza?[a] Porque os aseguro que, si hubiera sido posible[b], os habríais sacado los ojos y me los habríais dado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vuestra bendición» o «vuestra dicha». μακαρισμός puede referirse al estado de ser bendecido o a la declaración de bendición.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «habiéndoos sacado vuestros ojos». La expresión probablemente es hiperbólica para describir su anterior devoción, aunque algunos la entienden como una alusión a la condición corporal de Pablo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ποῦ οὖν
  english_pob_choice: Where then
  chosen_spanish: ¿Dónde está, pues, ...?
  alternatives_spanish:
  - ¿Dónde, pues, está ...?
  - ¿Qué ha sido, pues, de ...?
  lexicon: BDAG
  rationale: La pregunta retórica en español puede sonar más natural con el orden interrogativo usual; 'pues' conserva la fuerza inferencial de οὖν sin recargar la frase.
- source_word: ὁ μακαρισμὸς ὑμῶν
  english_pob_choice: your blessedness
  chosen_spanish: vuestra bienaventuranza
  alternatives_spanish:
  - vuestra bendición
  - vuestra dicha
  - vuestra felicidad
  lexicon: BDAG
  rationale: μακαρισμός puede referirse al estado de ser bienaventurado o a la declaración de ello. 'Bienaventuranza' mantiene el sustantivo abstracto y el registro formal, y evita reducirlo a una emoción pasajera.
- source_word: μαρτυρῶ γὰρ ὑμῖν
  english_pob_choice: For I testify to you
  chosen_spanish: Porque os doy testimonio
  alternatives_spanish:
  - Porque os testifico
  - Porque doy testimonio a favor vuestro
  lexicon: BDAG
  rationale: La fórmula mantiene el tono solemne y forense de μαρτυρέω. 'Dar testimonio' es natural en español bíblico contemporáneo sin perder precisión.
- source_word: εἰ δυνατὸν
  english_pob_choice: if possible
  chosen_spanish: si hubiera sido posible
  alternatives_spanish:
  - si fuera posible
  - si había sido posible
  lexicon: BDAG
  rationale: El contexto expresa una hipérbole retrospectiva; el pluscuamperfecto de subjuntivo en español comunica mejor la situación contrafactual implícita que un simple 'si fuera posible'.
- source_word: τοὺς ὀφθαλμοὺς ὑμῶν ⸀ἐξορύξαντες
  english_pob_choice: you would have torn out your eyes
  chosen_spanish: os habríais sacado los ojos
  alternatives_spanish:
  - os los habríais arrancado
  - habríais arrancado vuestros ojos
  lexicon: BDAG
  rationale: ἐξορύσσω es vívido y violento. 'Sacarse los ojos' preserva la imagen corporal directa en español y suena idiomático sin diluir la fuerza de la expresión.
- source_word: ἐδώκατέ μοι
  english_pob_choice: and given them to me
  chosen_spanish: y me los habríais dado
  alternatives_spanish:
  - y me los habríais entregado
  - y me los habríais dado a mí
  lexicon: BDAG
  rationale: El objeto implícito son 'los ojos', por eso se explicita con 'los'. La repetición de 'habríais' mantiene la cohesión de la construcción contrafactual en español.
theological_decisions:
- issue: Si conservar la imagen corporal concreta de los ojos o generalizarla como gesto de gran entrega
  english_pob_reading: Retain the literal image 'torn out your eyes' in the main text.
  chosen_spanish_reading: Conservar la imagen concreta de 'sacar los ojos' en el texto principal.
  alternative_spanish_readings:
  - habríais hecho cualquier cosa por mí
  - me habríais dado todo
  rationale: El griego nombra explícitamente 'los ojos' y usa un verbo intensamente gráfico. La traducción debe preservar esa concreción y dejar abierta la interpretación de hipérbole o de posible alusión a la condición corporal de Pablo.
  doctrine_reference: Preservar la tensión interpretativa sin resolverla en la traducción.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que prefirió 'blessedness' frente a 'sense of blessing' para reflejar más directamente μακαρισμός y mantener un registro más formal. En español, 'bienaventuranza' preserva mejor ese sustantivo abstracto y ese nivel de formalidad.
  spanish_consistency_notes:
  - Se usó 'bienaventuranza' para μακαρισμός, en coherencia con un registro formal y con la decisión revisada del POB inglés.
  - Se mantuvo el plural de segunda persona ('vuestra', 'os') para conservar el destinatario colectivo.
  - Se preservó la imagen literal de los ojos para no resolver la tensión exegética en la propia traducción.
  - La puntuación sigue el orden retórico del griego con una pregunta seguida de explicación causal.
