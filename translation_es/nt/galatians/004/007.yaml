translation:
  language: es
  text: Así que ya no eres esclavo, sino hijo[a]; y si hijo, también heredero por medio de Dios[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'hijo'. El griego usa 'hijo' para preservar la lógica de herencia y adopción del pasaje, aunque Pablo aplica este estatus a todos los creyentes.
    reason: lexical_alternative
  - marker: b
    text: Algunos manuscritos leen 'heredero de Dios por medio de Cristo' (o 'por medio del Mesías') en lugar de 'heredero por medio de Dios'.
    reason: textual_variant
lexical_decisions:
- source_word: ὥστε
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - por tanto
  - entonces
  lexicon: BDAG
  rationale: Introduce la conclusión inferida de la argumentación anterior con un conector natural en español, conservando la fuerza lógica de ὥστε sin volverlo mecánico.
- source_word: οὐκέτι
  english_pob_choice: no longer
  chosen_spanish: ya no
  alternatives_spanish:
  - no todavía
  - no más
  lexicon: BDAG
  rationale: Expresa el cambio de estado con naturalidad en español y preserva el matiz temporal de una condición anterior que ha cesado.
- source_word: εἶ
  english_pob_choice: you are
  chosen_spanish: eres
  alternatives_spanish:
  - tú eres
  lexicon: BDAG
  rationale: Segunda persona singular del presente de 'ser', sin añadir énfasis innecesario.
- source_word: δοῦλος
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - criado
  lexicon: BDAG
  rationale: Se mantiene el peso lexical de una condición de servidumbre/bondad que contrasta con la filiación y la herencia. 'Esclavo' preserva mejor el choque retórico que 'siervo'.
- source_word: ἀλλὰ
  english_pob_choice: but
  chosen_spanish: sino
  alternatives_spanish:
  - pero
  - más bien
  lexicon: BDAG
  rationale: En español, 'sino' transmite con precisión el contraste correctivo entre dos estados mutuamente excluyentes.
- source_word: υἱός
  english_pob_choice: son
  chosen_spanish: hijo
  alternatives_spanish:
  - niño
  - descendiente
  lexicon: BDAG
  rationale: Se traduce como 'hijo' para conservar el valor filiativo y hereditario del término en el argumento paulino, mientras que una nota puede preservar la observación sobre el lenguaje masculino singular del griego.
- source_word: εἰ δὲ
  english_pob_choice: and if
  chosen_spanish: y si
  alternatives_spanish:
  - ahora bien, si
  - pero si
  lexicon: BDAG
  rationale: Mantiene la progresión argumentativa con una coordinación fluida en español.
- source_word: κληρονόμος
  english_pob_choice: heir
  chosen_spanish: heredero
  alternatives_spanish:
  - coheredero
  - inheredero
  lexicon: BDAG
  rationale: Término natural y exacto para quien recibe una herencia; conserva la lógica legal de adopción/herencia del pasaje.
- source_word: διὰ θεοῦ
  english_pob_choice: through God
  chosen_spanish: por Dios
  alternatives_spanish:
  - a través de Dios
  - mediante Dios
  - por medio de Dios
  lexicon: BDAG
  rationale: El griego con διά + genitivo puede expresarse en español con 'por' o 'por medio de'. 'Por Dios' es conciso y fiel al vínculo instrumental/mediador del texto base SBLGNT, sin introducir una glosa interpretativa no presente en el manuscrito adoptado.
theological_decisions:
- issue: Lenguaje filial masculino singular (υἱός)
  english_pob_reading: son
  chosen_spanish_reading: hijo
  alternative_spanish_readings:
  - hijo/niño
  - hijo(a)
  rationale: El griego usa un sustantivo masculino singular que forma parte de una argumentación sobre filiación e herencia. 'Hijo' conserva el valor jurídico-teológico del pasaje; la aplicación a todos los creyentes no se pierde, y cualquier aclaración inclusiva puede hacerse en nota sin borrar la forma del término fuente.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral'
- issue: Lectura textual al final del versículo (διὰ θεοῦ)
  english_pob_reading: through God
  chosen_spanish_reading: por Dios
  alternative_spanish_readings:
  - por medio de Dios
  - a través de Dios
  - heredero de Dios por medio de Cristo
  rationale: Se sigue el texto griego base SBLGNT, que lee διὰ θεοῦ. La traducción debe reflejar esa lectura principal, mientras que las variantes manuscritas notables quedan fuera del texto principal y, si se documentan, se reservan para nota textual.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; preserve alternatives in footnotes where warranted'
translation_notes:
  revision_awareness: La revisión más reciente indicó acuerdo alto y no requirió cambios; esta versión sigue el texto griego SBLGNT, conserva la fuerza inferencial de ὥστε, mantiene la oposición esclavo/hijo y documenta la variante manuscrita final sin desplazar la lectura base.
  spanish_consistency_notes:
  - Se usa 'esclavo' para δοῦλος, en coherencia con el criterio POB de preservar la fuerza lexical cuando el contraste teológico es central.
  - Se usa 'hijo' para υἱός en el texto principal, con nota aclaratoria para no neutralizar la lógica de filiación e herencia.
  - '''Por Dios'' refleja de forma breve el διά con genitivo del texto base; la variante ''por medio de Cristo/Mesías'' queda restringida a nota textual.'
  - Se prefirió 'Así que' como conector conclusivo natural en español, sin debilitar la inferencia del versículo.
