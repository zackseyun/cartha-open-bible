  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T09:43:30Z'
    unchanged: false
    changes_summary: 'Recast the opening to reflect that the trial was theirs because of Paul''s bodily condition, not ''my bodily trial.'' Added ''me'' after ''treat'' to account for the implied object, and changed ''Messiah Jesus'' to ''Christ Jesus'' for more natural formal register and consistency with common NT rendering. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: Y aunque mi condición corporal fue para ustedes una prueba[a], no me trataron con desprecio ni con repugnancia[b]; más bien, me recibieron como a un ángel de Dios, como al Mesías Jesús[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su prueba en mi carne», reflejando la dificultad textual y sintáctica de la frase.'
    reason: alternative_reading
  - marker: b
    text: Literalmente, «no escupieron»; una expresión de rechazo o aversión.
    reason: lexical_alternative
  - marker: c
    text: 'Griego: «Cristo Jesús». Se traduce «el Mesías Jesús» aquí porque Χριστός funciona como título.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πειρασμὸν
  english_pob_choice: trial
  chosen_spanish: prueba
  alternatives_spanish:
  - tentación
  - prueba dura
  - aflicción
  lexicon: BDAG
  rationale: En este contexto no se trata de una incitación al pecado, sino de una circunstancia penosa ligada a la condición física de Pablo. 'Prueba' comunica bien la carga de la situación sin importar una lectura moral ajena al pasaje.
- source_word: ὑμῶν
  english_pob_choice: you / your
  chosen_spanish: ustedes
  alternatives_spanish:
  - de ustedes
  - su
  lexicon: BDAG
  rationale: 'El griego presenta una dificultad sintáctica y textual: puede entenderse como ''su prueba'' o como la experiencia de ustedes ante la condición de Pablo. En español, ''fue para ustedes una prueba'' conserva la relación sin forzar una literalidad torpe.'
- source_word: ἐν τῇ σαρκί μου
  english_pob_choice: my bodily condition
  chosen_spanish: mi condición corporal
  alternatives_spanish:
  - en mi carne
  - en mi cuerpo
  - mi condición física
  lexicon: BDAG
  rationale: Aquí σάρξ se refiere al estado físico de Pablo, no a la 'carne' en sentido moral. 'Condición corporal' expresa el sentido corporal con claridad natural en español y evita una lectura doctrinal incorrecta.
- source_word: ἐξουθενήσατε
  english_pob_choice: treat with contempt
  chosen_spanish: tratar con desprecio
  alternatives_spanish:
  - despreciar
  - desestimar
  - menospreciar
  lexicon: BDAG
  rationale: El verbo implica considerar a alguien como insignificante o indigno. 'Tratar con desprecio' mantiene la fuerza interpersonal y es claro en español contemporáneo.
- source_word: ἐξεπτύσατε
  english_pob_choice: disgust
  chosen_spanish: repugnancia
  alternatives_spanish:
  - rechazo
  - asco
  - escupir
  lexicon: BDAG
  rationale: El verbo literalmente alude a escupir como gesto de rechazo; en español, 'repugnancia' transmite la fuerza idiomática de aversión sin perder el tono del pasaje. Se conserva además el contraste con el recibimiento positivo.
- source_word: ἐδέξασθέ
  english_pob_choice: welcomed
  chosen_spanish: me recibieron
  alternatives_spanish:
  - me acogieron
  - me aceptaron
  - me dieron la bienvenida
  lexicon: BDAG
  rationale: El verbo en voz media expresa una recepción personal y favorable. 'Me recibieron' es natural y suficientemente cálido en español; 'acogieron' o 'dieron la bienvenida' serían alternativas posibles.
- source_word: ἄγγελον θεοῦ
  english_pob_choice: an angel of God
  chosen_spanish: un ángel de Dios
  alternatives_spanish:
  - un mensajero de Dios
  lexicon: BDAG
  rationale: Aunque ἄγγελος puede significar 'mensajero', en esta comparación elevada encaja mejor el sentido común de 'ángel'. Mantener 'ángel de Dios' preserva la imagen retórica del texto.
- source_word: Χριστὸν Ἰησοῦν
  english_pob_choice: Messiah Jesus
  chosen_spanish: el Mesías Jesús
  alternatives_spanish:
  - Cristo Jesús
  - Mesías Jesús
  lexicon: BDAG
  rationale: Χριστός funciona aquí como título, no como simple nombre propio. Se mantiene 'Mesías' para conservar el valor titular exigido por la política del proyecto y la tensión cristológica del texto.
theological_decisions:
- issue: Valor de las dos comparaciones con ὡς
  english_pob_reading: Paul was received with extraordinary honor, not identified ontologically with Christ.
  chosen_spanish_reading: Pablo fue recibido con un honor extraordinario, no identificado ontológicamente con Cristo.
  alternative_spanish_readings:
  - La segunda comparación intensifica la primera sin implicar identidad.
  - Fueron fórmulas retóricas de recepción, no afirmaciones sobre la naturaleza de Pablo.
  rationale: Las dos frases con ὡς describen el modo de recepción. La traducción debe conservar la fuerza retórica sin sugerir que Pablo fuera divino o equivalente a Jesús.
  doctrine_reference: Credo Niceno; Definición de Calcedonia
- issue: Sentido de σάρξ en el pasaje
  english_pob_reading: Physical bodily condition
  chosen_spanish_reading: Condición corporal/física de Pablo
  alternative_spanish_readings:
  - carne
  - naturaleza pecaminosa
  rationale: El contexto inmediato apunta a una debilidad o enfermedad física. Traducirlo de forma moralizante introduciría una interpretación no sustentada por el texto.
  doctrine_reference: Uso contextual de σάρξ en el NT
- issue: Relación textual de 'ustedes' con la prueba
  english_pob_reading: The Galatians' experience of Paul's condition can be expressed either as 'your trial' or as a trial to you.
  chosen_spanish_reading: Una prueba para ustedes a causa de mi condición corporal
  alternative_spanish_readings:
  - su prueba en mi carne
  - la prueba de ustedes en mi carne
  rationale: El griego permite una relación sintáctica difícil. La redacción elegida conserva la ambigüedad razonable sin imponer una reconstrucción demasiado técnica en el texto principal.
  doctrine_reference: Principios de traducción sintáctica prudente
translation_notes:
  revision_awareness: 'La propuesta sigue el giro revisado del audit trail: la prueba recae sobre los destinatarios a causa de la condición corporal de Pablo, no sobre ''mi prueba corporal'' en sentido estrictamente posesivo. También conserva la decisión revisada de traducir Χριστός como ''Mesías'' y no como ''Cristo'', para no borrar el valor titular documentado. Se mantiene la expresión idiomática de rechazo ligada a ''escupir'', pero en el texto principal se opta por una formulación española natural.'
  spanish_consistency_notes:
  - Se usa 'Y' al inicio para reproducir el conector del griego.
  - '''Mesías'' se mantiene por coherencia con la política terminológica del proyecto.'
  - '''carne'' se evita en el cuerpo principal porque aquí no corresponde al sentido moral de σάρξ.'
  - Las dos comparaciones con 'como' se conservan para reflejar la estructura retórica del original.
  - Los marcadores de nota aparecen solo donde hay alternativa real o tensión léxica documentada.
