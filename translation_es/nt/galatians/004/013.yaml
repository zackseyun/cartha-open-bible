translation:
  language: es
  text: Pero ustedes saben que fue a causa de una enfermedad de la carne[a] que primero les proclamé las buenas nuevas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a causa de una debilidad corporal». El griego dice literalmente «a causa de una debilidad/enfermedad de la carne». Aquí «carne» se refiere al cuerpo, no a un sentido moral.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἴδατε
  english_pob_choice: you know
  chosen_spanish: ustedes saben
  alternatives_spanish:
  - saben
  - ustedes ya saben
  lexicon: BDAG
  rationale: οἶδα tiene valor presente con sentido de conocimiento seguro. «Ustedes saben» reproduce la apelación directa de Pablo de manera natural en español.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ introduce un giro suave en el discurso; «Pero» conserva el matiz de transición/contraste del texto.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - cómo
  lexicon: BDAG
  rationale: Aquí introduce el contenido de lo que los gálatas saben; «que» es la subordinación más natural en español.
- source_word: δι’ ἀσθένειαν
  english_pob_choice: because of an illness
  chosen_spanish: a causa de una enfermedad
  alternatives_spanish:
  - por una debilidad
  - a causa de una debilidad corporal
  - por una dolencia
  lexicon: BDAG
  rationale: διά con acusativo expresa causa. ἀσθένεια puede ser «debilidad» o «enfermedad»; el contexto físico y la nota auditada de la POB en inglés favorecen una afección corporal, por eso se usa «enfermedad».
- source_word: τῆς σαρκὸς
  english_pob_choice: of the flesh
  chosen_spanish: del cuerpo
  alternatives_spanish:
  - de la carne
  - física
  - corporal
  lexicon: BDAG
  rationale: σάρξ aquí no parece tener sentido ético, sino corporal. En español, «del cuerpo» comunica con claridad el sentido físico sin introducir una posible lectura moral de «carne».
- source_word: εὐηγγελισάμην
  english_pob_choice: I first proclaimed the good news
  chosen_spanish: les proclamé las buenas nuevas
  alternatives_spanish:
  - les anuncié el evangelio
  - les prediqué el evangelio
  - les proclamé el evangelio
  lexicon: BDAG
  rationale: εὐαγγελίζω refiere a la proclamación evangelística. «Proclamé las buenas nuevas» sigue el registro de la POB en inglés y evita un calco eclesiástico innecesario.
- source_word: ὑμῖν
  english_pob_choice: to you
  chosen_spanish: les
  alternatives_spanish:
  - a ustedes
  - para ustedes
  lexicon: BDAG
  rationale: El dativo indirecto se expresa naturalmente con clítico de objeto indirecto en español; «les» mantiene la referencia directa a los gálatas.
- source_word: τὸ πρότερον
  english_pob_choice: I first
  chosen_spanish: primero
  alternatives_spanish:
  - por primera vez
  - antes
  - al principio
  lexicon: BDAG
  rationale: La expresión idiomática apunta a la ocasión inicial de la predicación de Pablo entre ellos. «Primero» colocado cerca del verbo comunica esa prioridad temporal de forma natural.
theological_decisions:
- issue: Sentido de σάρξ en ἀσθένειαν τῆς σαρκὸς
  english_pob_reading: 'literal/physical sense: ''illness of the flesh'''
  chosen_spanish_reading: 'sentido físico: «una enfermedad del cuerpo»'
  alternative_spanish_readings:
  - «una debilidad corporal»
  - «una debilidad de la carne»
  - «una enfermedad de la carne»
  rationale: El contexto es el recuerdo de la visita inicial de Pablo a Galacia; no hay base aquí para el sentido moral de σάρξ. La redacción española conserva la referencia corporal y evita importar la lectura de «naturaleza pecaminosa».
  doctrine_reference: 'DOCTRINE.md: Contested terms table for σάρξ'
translation_notes:
  revision_awareness: La versión sigue de cerca el pasaje griego y el criterio auditado de la POB en inglés. Se mantiene el valor causal de διά + acusativo, el sentido físico de ἀσθένεια, y la referencia corporal de σάρξ sin abrir una lectura moral no sustentada por el contexto.
  spanish_consistency_notes:
  - Se usa «buenas nuevas» para mantener coherencia con la terminología POB de εὐαγγελίζω.
  - Se prefirió «cuerpo» en lugar de «carne» porque aquí σάρξ funciona de manera física y «carne» en español podría sonar teológicamente cargada o ambigua.
  - «Ustedes» y «les» conservan la segunda persona plural del destinatario sin sobrecargar el estilo.
