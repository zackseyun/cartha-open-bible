translation:
  language: es
  text: Pero la Jerusalén de arriba es libre[a], y ella es nuestra madre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la cual es nuestra madre». El relativo griego puede traducirse de forma más formal, pero aquí Pablo personifica a Jerusalén como madre.
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Mas
  - Y
  lexicon: BDAG
  rationale: Marca contraste con la Jerusalén presente del contexto inmediato. En español, «Pero» transmite bien la fuerza adversativa sin sonar arcaico.
- source_word: ἄνω
  english_pob_choice: above
  chosen_spanish: de arriba
  alternatives_spanish:
  - celestial
  - del cielo
  lexicon: BDAG
  rationale: «De arriba» conserva la imagen espacial del griego y evita interpretar de más el contraste. Mantiene el paralelismo con la Jerusalén terrenal/presente del contexto.
- source_word: Ἰερουσαλήμ
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Yerusalén
  lexicon: BDAG
  rationale: Nombre propio en forma estándar del español bíblico actual.
- source_word: ἐλευθέρα
  english_pob_choice: free
  chosen_spanish: es libre
  alternatives_spanish:
  - es libre como mujer
  - es una mujer libre
  lexicon: BDAG
  rationale: El adjetivo predicativo expresa el estado de la Jerusalén de arriba dentro de la alegoría. «Es libre» es fiel y no añade «mujer», que el griego no dice explícitamente aquí.
- source_word: ἥτις
  english_pob_choice: and she
  chosen_spanish: y ella
  alternatives_spanish:
  - y la cual
  - que
  lexicon: BDAG
  rationale: Aunque el relativo griego puede sonar más formal como «la cual», en español la personificación de Jerusalén como figura femenina se expresa con naturalidad mediante «ella».
- source_word: μήτηρ
  english_pob_choice: mother
  chosen_spanish: madre
  alternatives_spanish:
  - madre nuestra
  - madre de nosotros
  lexicon: BDAG
  rationale: Traducción directa del sustantivo, conservando la metáfora maternal central del pasaje.
- source_word: ἡμῶν
  english_pob_choice: our
  chosen_spanish: nuestra
  alternatives_spanish:
  - de nosotros
  lexicon: BDAG
  rationale: Posesivo idiomático en español; mantiene la relación comunitaria del pronombre sin dureza sintáctica.
theological_decisions:
- issue: Personificación de la Jerusalén de arriba
  english_pob_reading: 'Render as a personified feminine figure: ''and she is our mother.'''
  chosen_spanish_reading: «y ella es nuestra madre»
  alternative_spanish_readings:
  - «y la cual es nuestra madre»
  - «que es nuestra madre»
  rationale: La alegoría paulina personifica a la Jerusalén de arriba como figura materna. En español, el pronombre personal «ella» comunica con claridad esa personificación sin sobreinterpretar el texto.
  doctrine_reference: Gálatas 4:21-31; alegoría de Sara y Agar, Jerusalén de arriba y la libertad en Cristo
- issue: Contraste espacial y teológico de «de arriba»
  english_pob_reading: above
  chosen_spanish_reading: «de arriba»
  alternative_spanish_readings:
  - «celestial»
  - «del cielo»
  rationale: «De arriba» preserva el contraste del texto con la Jerusalén presente y no restringe prematuramente la imagen a una localización únicamente celestial.
  doctrine_reference: Gálatas 4:25-26
translation_notes:
  revision_awareness: El texto griego y el contexto de Gálatas 4:21-31 respaldan la personificación de Jerusalén. Se siguió la línea del POB inglés al mantener la metáfora maternal y el contraste de «above / de arriba» sin añadir interpretaciones extra al adjetivo ἄνω.
  spanish_consistency_notes:
  - Se usa «Jerusalén» como nombre propio estándar.
  - Se mantiene el pronombre femenino «ella» para reflejar la personificación del relativo ἥτις en contexto.
  - No se reemplazó «es libre» por una formulación explicativa más amplia, para conservar la fuerza predicativa del griego.
