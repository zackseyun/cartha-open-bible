translation:
  language: es
  text: Pero en aquel tiempo[a], cuando no conocían a Dios, eran esclavos de aquellos que por naturaleza no son dioses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “antes, no conociendo a Dios, eran esclavos de aquellos que por naturaleza no son realmente dioses.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀλλὰ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Mas
  - Sin embargo
  - No obstante
  lexicon: BDAG
  rationale: Expresa el contraste de apertura de manera natural en español, manteniendo la fuerza adversativa sin volverlo artificial.
- source_word: τότε μὲν
  english_pob_choice: at that time
  chosen_spanish: en aquel tiempo
  alternatives_spanish:
  - entonces
  - en ese tiempo
  - antaño
  lexicon: BDAG
  rationale: Conserva el valor temporal y remite a una etapa pasada de su vida, sin añadir un matiz demasiado coloquial o demasiado arcaico.
- source_word: οὐκ εἰδότες θεὸν
  english_pob_choice: when you did not know God
  chosen_spanish: cuando no conocían a Dios
  alternatives_spanish:
  - al no conocer a Dios
  - cuando no sabían de Dios
  - mientras no conocían a Dios
  lexicon: BDAG
  rationale: El participio se entiende naturalmente como circunstancia temporal. 'Conocer a Dios' reproduce el sentido relacional de οἶδα en este contexto paulino.
- source_word: θεὸν
  english_pob_choice: God
  chosen_spanish: a Dios
  alternatives_spanish:
  - a Dios
  - al Dios verdadero
  lexicon: BDAG
  rationale: El singular anartro apunta al Dios verdadero frente a los 'dioses' del final del versículo; el objeto directo con 'a' es el español normal y claro.
- source_word: ἐδουλεύσατε
  english_pob_choice: you were enslaved
  chosen_spanish: estaban esclavizados
  alternatives_spanish:
  - eran esclavos de
  - servían a
  - quedaron esclavizados
  lexicon: BDAG
  rationale: '''Esclavizados'' preserva la fuerza de δουλεύω como servidumbre/bondaje, en línea con el campo semántico de esclavitud en Gálatas.'
- source_word: τοῖς ... οὖσι θεοῖς
  english_pob_choice: to those that by nature are not gods
  chosen_spanish: a aquellos que por naturaleza no son dioses
  alternatives_spanish:
  - a seres que por naturaleza no son dioses
  - a esos que en realidad no son dioses
  - a los llamados dioses que por naturaleza no son dioses
  lexicon: BDAG
  rationale: Mantiene el referente genérico del griego y la negación ontológica sin introducir 'ídolos' ni aclaraciones interpretativas no presentes en el texto.
- source_word: φύσει μὴ
  english_pob_choice: by nature are not
  chosen_spanish: por naturaleza no son
  alternatives_spanish:
  - naturalmente no son
  - no son por naturaleza
  - en realidad no son
  lexicon: BDAG
  rationale: Reproduce la modificación de φύσει sobre la negación de forma idiomática en español y conserva la afirmación sobre lo que esas entidades son en realidad.
- source_word: θεοῖς
  english_pob_choice: gods
  chosen_spanish: dioses
  alternatives_spanish:
  - deidades
  - seres divinos
  lexicon: BDAG
  rationale: El plural común, en minúscula, preserva el contraste con Dios y evita neutralizar la afirmación de Pablo.
theological_decisions:
- issue: Tensión ontológica sobre los objetos de culto antiguos
  english_pob_reading: those that by nature are not gods
  chosen_spanish_reading: aquellos que por naturaleza no son dioses
  alternative_spanish_readings:
  - aquellos que no son realmente dioses
  - seres que por naturaleza no son dioses
  rationale: La traducción conserva la negación fuerte del texto sin resolverla hacia una categoría no explicitada (ídolos, demonios o simples imaginaciones). Así se mantiene la tensión teológica documentada en el POB.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto principal. La redacción sigue de cerca el griego y el audit trail inglés, con el mismo contraste temporal y la misma tensión ontológica.
  spanish_consistency_notes:
  - Se usó 'Dios' con mayúscula para θεὸν, y 'dioses' en minúscula para θεοῖς.
  - '''Esclavizados'' preserva la fuerza de δουλεύω, coherente con la política POB sobre la familia de δοῦλος/δουλεύω.'
  - Se prefirió 'en aquel tiempo'/'cuando no conocían a Dios' como solución temporal natural para τότε μὲν οὐκ εἰδότες.
  - No se introdujo 'Cristo', 'Señor' ni otras glosas no presentes en el versículo.
