revisions:
- from: Ellos los celan[a] no con buena intención. Más bien, quieren excluirlos[b], para que ustedes los celen.
  to: Ellos muestran celo por ustedes[a], pero no de buena manera. Más bien, quieren excluirlos[b], para que ustedes muestren celo por ellos.
  rationale: Se reemplaza 'los celan / los celen' por 'muestran celo por ustedes / muestren celo por ellos' porque esta formulación expresa con claridad el campo semántico de ζηλόω en español neutral y conserva la simetría retórica entre las dos apariciones del verbo. También se ajusta 'no con buena intención' a 'no de buena manera' para reflejar mejor οὐ καλῶς sin sobreinterpretar. La nota [b] se limpia para evitar repetir el mismo término del texto principal.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:24:52Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura del griego: interés de los opositores por los gálatas, evaluación negativa (οὐ καλῶς), propósito de exclusión (ἐκκλεῖσαι), y finalidad de redirigir la lealtad hacia ellos (ἵνα αὐτοὺς ζηλοῦτε). También preserva la repetición de ζηλόω en ambas mitades. Sin embargo, la elección principal ''los celan / los celen'' no refleja fielmente el sentido de ζηλόω en español moderno neutral, porque ''celar'' normalmente significa vigilar, custodiar u ocultar, y puede inducir una lectura errónea de ''tener celos''.'
  spanish_quality_summary: La frase es mayormente clara, pero 'Ellos los celan' y 'ustedes los celen' suenan poco naturales y ambiguas para lectura eclesial general. 'No con buena intención' es comprensible, aunque 'no de buena manera' o similar se acerca más al valor adverbial. Conviene una formulación idiomática que mantenga la simetría verbal sin forzar el español.
  glossary_alignment: 'No hay conflicto con los términos doctrinales del proyecto. La decisión problemática es léxica: para ζηλόω, el español debe evitar ''celar'' por su ambigüedad. Una solución más fiel y legible es ''muestran celo por ustedes ... para que ustedes muestren celo por ellos'', que preserva el paralelismo semántico y retórico sin usar un verbo engañoso.'
  issues:
  - severity: high
    issue: Uso de 'celan / celen' para ζηλόω
    rationale: En español neutral moderno, 'celar' no comunica naturalmente 'mostrar celo por / buscar con interés intenso', sino vigilar, guardar o sentir celos. Esto distorsiona el sentido fuente y reduce la inteligibilidad.
  - severity: medium
    issue: '''No con buena intención'' intensifica la motivación interna más que el adverbial οὐ καλῶς'
    rationale: La idea de mala motivación está implicada por el contexto, pero el griego dice más ampliamente 'no bien / no de buena manera'. Puede mantenerse una expresión más cercana sin perder naturalidad.
  - severity: low
    issue: Nota a [b] incluye 'excluirlos' como alternativa idéntica al texto principal
    rationale: La nota debe aportar una alternativa o aclaración real; repetir la misma palabra no añade valor.
  revised_spanish_text: Ellos muestran celo por ustedes[a], pero no de buena manera. Más bien, quieren excluirlos[b], para que ustedes muestren celo por ellos.
  revised_footnotes:
  - marker: a
    text: O 'los cortejan' o 'los buscan con celo'. El verbo griego ζηλόω puede expresar interés intenso, celo o un intento de ganar la lealtad de alguien.
    reason: lexical_alternative
  - marker: b
    text: O 'dejarlos fuera'. El sentido probable es que quieren apartarlos de Pablo y de sus compañeros para que busquen a los opositores en su lugar.
    reason: alternative_reading
  revision_rationale: Se reemplaza 'los celan / los celen' por 'muestran celo por ustedes / muestren celo por ellos' porque esta formulación expresa con claridad el campo semántico de ζηλόω en español neutral y conserva la simetría retórica entre las dos apariciones del verbo. También se ajusta 'no con buena intención' a 'no de buena manera' para reflejar mejor οὐ καλῶς sin sobreinterpretar. La nota [b] se limpia para evitar repetir el mismo término del texto principal.
