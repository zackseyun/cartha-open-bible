translation:
  language: es
  text: Ellos muestran celo por ustedes[a], pero no de buena manera. Más bien, quieren excluirlos[b], para que ustedes muestren celo por ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los cortejan' o 'los buscan con celo'. El verbo griego ζηλόω puede expresar interés intenso, celo o un intento de ganar la lealtad de alguien.
    reason: lexical_alternative
  - marker: b
    text: O 'dejarlos fuera'. El sentido probable es que quieren apartarlos de Pablo y de sus compañeros para que busquen a los opositores en su lugar.
    reason: alternative_reading
lexical_decisions:
- source_word: ζηλοῦσιν
  english_pob_choice: are zealous for
  chosen_spanish: los celan
  alternatives_spanish:
  - están celosos por ustedes
  - los cortejan
  - los buscan con celo
  lexicon: BDAG
  rationale: ζηλόω puede expresar celo, interés intenso o afán de ganar la lealtad de alguien. En este contexto la POB inglesa retuvo 'zealous' para conservar la repetición con ζηλοῦτε; en español, 'celar' comunica ese campo semántico con naturalidad y permite mantener la misma raíz verbal en ambas apariciones.
- source_word: ὑμᾶς
  english_pob_choice: you
  chosen_spanish: los / ustedes
  alternatives_spanish:
  - los
  - ustedes
  lexicon: BDAG
  rationale: El acusativo plural directo se expresa naturalmente en español con pronombre de objeto directo antes del verbo y con el sujeto implícito posterior en la cláusula final. Se mantiene el destinatario plural sin necesidad de repetirlo de forma pesada.
- source_word: οὐ καλῶς
  english_pob_choice: not in a good way
  chosen_spanish: no con buena intención
  alternatives_spanish:
  - no de buena manera
  - no honradamente
  - no rectamente
  lexicon: BDAG
  rationale: La frase califica el celo como moralmente defectuoso o motivado de forma indebida. 'No con buena intención' suena natural en español y conserva la valoración negativa sin volverla demasiado interpretativa.
- source_word: ἀλλὰ
  english_pob_choice: Rather
  chosen_spanish: Más bien
  alternatives_spanish:
  - sino
  - pero
  lexicon: BDAG
  rationale: Introduce un contraste correctivo fuerte. 'Más bien' reproduce bien ese giro explicativo en español y encaja con la sintaxis de la oración.
- source_word: ἐκκλεῖσαι
  english_pob_choice: to shut you out
  chosen_spanish: excluirlos
  alternatives_spanish:
  - expulsarlos
  - dejarlos fuera
  - apartarlos
  lexicon: BDAG
  rationale: ἐκκλείω significa excluir o dejar fuera. 'Excluirlos' es la opción más directa y sobria en español. El contexto permite entender una exclusión relacional respecto de Pablo y su círculo, sin precisar más de lo que el texto exige.
- source_word: θέλουσιν
  english_pob_choice: they want
  chosen_spanish: quieren
  alternatives_spanish:
  - desean
  - pretenden
  lexicon: BDAG
  rationale: Verbo volitivo simple. 'Quieren' es claro y suficiente, y preserva el tono de intención manipuladora.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: Introduce propósito. 'Para que' expresa con naturalidad la finalidad de la acción en español.
- source_word: αὐτοὺς
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  lexicon: BDAG
  rationale: El pronombre retoma a los opositores mencionados en el contexto. En español conviene mantener el objeto directo pronominal 'los' para conservar la relación gramatical de la cláusula.
- source_word: ζηλοῦτε
  english_pob_choice: you may be zealous for
  chosen_spanish: ustedes los celen
  alternatives_spanish:
  - ustedes estén celosos por ellos
  - ustedes los busquen con celo
  - ustedes se interesen por ellos
  lexicon: BDAG
  rationale: 'Se conserva la repetición léxica con el primer verbo usando el mismo campo semántico (''celar''). Esto ayuda a reflejar la ironía del verso: ellos los celan para que ustedes los celen a ellos.'
theological_decisions:
- issue: Sentido de la exclusión en ἐκκλεῖσαι ὑμᾶς
  english_pob_reading: The agitators want to exclude the Galatians from Paul and his associates, redirecting their loyalty toward the agitators.
  chosen_spanish_reading: Los agitadores quieren excluir a los gálatas de la influencia y la comunión de Pablo y sus compañeros, para ganar su lealtad.
  alternative_spanish_readings:
  - Quieren excluirlos de la salvación
  - quieren apartarlos de la iglesia en sentido absoluto
  - quieren dejar fuera a los gálatas de toda bendición
  rationale: El contexto inmediato (vv. 16–20) trata la relación de Pablo con los gálatas y la presión de los rivales. La traducción española evita sobreespecificar una exclusión soteriológica o eclesiológica total que el verso no explicita.
  doctrine_reference: Contexto epistolar y flujo argumental de Gálatas 4:16–20
- issue: Repetición irónica de ζηλόω/ζηλοῦτε
  english_pob_reading: The English POB keeps 'zealous' in both halves to preserve rhetorical symmetry.
  chosen_spanish_reading: La versión española conserva la repetición con 'celan' y 'celen' para mantener la simetría retórica.
  alternative_spanish_readings:
  - usar 'están celosos' / 'estén celosos'
  - usar 'buscan' / 'busquen'
  rationale: La simetría del verbo es parte del efecto retórico del versículo. Mantener la misma raíz verbal en español preserva mejor la ironía y la manipulación descritas por el texto.
  doctrine_reference: Retórica paulina y paralelismo léxico
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa más reciente, que sustituyó 'eager' por 'zealous' para reflejar con mayor precisión la repetición de ζηλοῦσιν/ζηλοῦτε. La versión española preserva esa consistencia con 'celan' y 'celen'. También se respetó el matiz relacional de ἐκκλεῖσαι, evitando una formulación excesivamente doctrinalizada.
  spanish_consistency_notes:
  - Se usa 'celar' para mantener coherencia con el campo semántico de ζηλόω en ambas mitades del versículo.
  - Se prefiere 'más bien' para el contraste de ἀλλά, siguiendo un español claro y natural.
  - Se conserva 'excluir' para ἐκκλεῖσαι como término preciso y sobrio.
  - Se mantiene el pronombre plural de tratamiento 'ustedes' implícito en la segunda cláusula para claridad y registro bíblico contemporáneo.
