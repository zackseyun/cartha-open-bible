translation:
  language: es
  text: 'Y porque ustedes son hijos[a], Dios envió el Espíritu de su Hijo a nuestros corazones[c], clamando: «Abba[b], Padre»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hijos» conserva aquí el lenguaje de adopción y herencia de Pablo; la referencia incluye a todos los creyentes, no solo a los varones.
    reason: cultural_note
  - marker: b
    text: Abba es una forma aramea de tratamiento para «Padre», conservada aquí por su énfasis y cercanía originales.
    reason: lexical_alternative
  - marker: c
    text: Algunos manuscritos leen «vuestros corazones» en lugar de «nuestros corazones».
    reason: textual_variant
lexical_decisions:
- source_word: ὅτι δέ
  english_pob_choice: And because
  chosen_spanish: Y porque
  alternatives_spanish:
  - Porque
  - Y ya que
  lexicon: BDAG
  rationale: ὅτι introduce la base o explicación, y δέ añade una leve conexión discursiva. «Y porque» conserva ambas fuerzas en un español natural y fluido.
- source_word: ἐστε
  english_pob_choice: you are
  chosen_spanish: ustedes son
  alternatives_spanish:
  - son
  - ustedes están siendo
  lexicon: BDAG
  rationale: El presente de εἰμί expresa un estado actual. Se usa «ustedes son» para mantener claridad y una referencia directa a los destinatarios.
- source_word: υἱοί
  english_pob_choice: sons
  chosen_spanish: hijos
  alternatives_spanish:
  - hijos varones
  - hijos e hijas
  lexicon: BDAG
  rationale: Aunque el griego es masculino plural y en inglés POB retiene «sons» por el marco de adopción/herencia, en español «hijos» puede conservar esa fuerza legal sin sonar forzado ni excluir el valor corporativo del pasaje. La nota teológica explica que el argumento de herencia sigue presente.
- source_word: ἐξαπέστειλεν
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: BDAG
  rationale: El aoristo de ἐξαποστέλλω marca una acción completa de Dios. «Envió» es el equivalente natural y fiel en español.
- source_word: τὸ πνεῦμα τοῦ υἱοῦ αὐτοῦ
  english_pob_choice: the Spirit of his Son
  chosen_spanish: el Espíritu de su Hijo
  alternatives_spanish:
  - el espíritu de su Hijo
  - el Espíritu que pertenece a su Hijo
  lexicon: BDAG
  rationale: Se mantiene la relación genitiva sin reinterpretarla. La mayúscula en «Espíritu» refleja el contexto pneumatológico y la referencia personal al Espíritu Santo.
- source_word: εἰς τὰς καρδίας ἡμῶν
  english_pob_choice: into our hearts
  chosen_spanish: a nuestros corazones
  alternatives_spanish:
  - en nuestros corazones
  - dentro de nuestros corazones
  lexicon: BDAG
  rationale: El griego εἰς con sentido resultativo/direccional puede expresarse en español con «a» o «en». Se elige «a nuestros corazones» para conservar el movimiento de entrada y evitar una sobreliteralidad extraña.
- source_word: κρᾶζον
  english_pob_choice: crying
  chosen_spanish: clamando
  alternatives_spanish:
  - gritando
  - exclamando
  lexicon: BDAG
  rationale: El participio presente describe la acción continua del Espíritu. «Clamando» preserva la intensidad verbal de κράζω sin reducirla a mera voz alta.
- source_word: Αββα
  english_pob_choice: Abba
  chosen_spanish: Abba
  alternatives_spanish:
  - Papá
  - Padre
  lexicon: BDAG
  rationale: Se translitera el vocativo arameo para retener su énfasis original y su textura lingüística dentro del texto griego.
- source_word: ὁ πατήρ
  english_pob_choice: Father
  chosen_spanish: Padre
  alternatives_spanish:
  - el Padre
  lexicon: BDAG
  rationale: En aposición vocativa a «Abba», «Padre» funciona mejor en español que «el Padre». Mantiene la dirección personal del clamor.
theological_decisions:
- issue: Valor de υἱοί en el argumento de adopción e herencia
  english_pob_reading: sons
  chosen_spanish_reading: hijos
  alternative_spanish_readings:
  - hijos varones
  - hijos e hijas
  rationale: El contexto inmediato de Gálatas 3–4 habla de filiación e herencia. En español, «hijos» comunica esa filiación corporativa con menos carga sexista que una traducción rígidamente masculina, sin perder el punto argumental de Pablo.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral when context allows) + adoption/inheritance context in Galatians 4
- issue: Lector original del clamor 'Abba, Padre'
  english_pob_reading: the Spirit is the one crying
  chosen_spanish_reading: el Espíritu es quien clama
  alternative_spanish_readings:
  - los creyentes claman por medio del Espíritu
  - el creyente clama en el Espíritu
  rationale: La concordancia del participio κρᾶζον con τὸ πνεῦμα indica que el sujeto explícito del clamor es el Espíritu. La traducción española mantiene esa lectura implícitamente al presentar el participio como acción del Espíritu.
  doctrine_reference: Greek syntax (participial agreement) and the POB’s note that the Spirit is the explicit subject of the cry
- issue: Variante textual en el posesivo con 'corazones'
  english_pob_reading: our hearts
  chosen_spanish_reading: nuestros corazones
  alternative_spanish_readings:
  - sus corazones
  - vuestros corazones
  rationale: Se sigue el texto SBLGNT dado (ἡμῶν = 'nuestros'). La nota conserva la variante conocida 'vuestros corazones' como transparencia textual, equivalente funcional a la nota inglesa sobre 'your hearts'.
  doctrine_reference: Textual criticism / manuscript variant awareness
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego SBLGNT proporcionado y el auditrastro inglés de la POB. Se preservó la lectura de primera persona plural «nuestros corazones» según ἡμῶν, y se trasladó el clamor «Abba, Padre» con transliteración del vocativo arameo y una nota explicativa. No se introdujeron cambios doctrinales adicionales ni glosas no sustentadas por la fuente.
  spanish_consistency_notes:
  - Se mantuvo «Espíritu» con mayúscula por el contexto del Espíritu Santo.
  - Se evitó «Señor» como sustituto de Yahvé porque este versículo no contiene el tetragrámaton ni una cita directa del nombre divino.
  - «Hijos» se emplea aquí como término de filiación; la nota teológica explica el marco de herencia sin neutralizar innecesariamente el lenguaje paulino.
  - La elección de «a nuestros corazones» refleja el movimiento del griego εἰς y evita una lectura estática excesiva.
