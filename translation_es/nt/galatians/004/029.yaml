translation:
  language: es
  text: Pero, así como entonces el que nació según la carne[a] perseguía al que nació según el Espíritu[b], así también sucede ahora.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "el que nació por medios humanos ordinarios"; literalmente, "el que nació según la carne".
    reason: lexical_alternative
  - marker: b
    text: O "al que era según el Espíritu"; el verbo "nació" se suple de la primera cláusula para hacer explícito el paralelismo en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλ’
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Mas
  - Sin embargo
  lexicon: BDAG
  rationale: Introduce un contraste directo con la explicación anterior; «Pero» es natural, breve y fiel al valor adversativo de ἀλλά.
- source_word: ὥσπερ τότε ... οὕτως καὶ νῦν
  english_pob_choice: just as then ... so also it is now
  chosen_spanish: así como entonces ... así también ahora
  alternatives_spanish:
  - tal como entonces ... así también ahora
  - como entonces ... así también ahora
  lexicon: BDAG
  rationale: Mantiene la correlación comparativa y el contraste temporal sin añadir elementos ajenos al griego.
- source_word: ὁ ... γεννηθεὶς
  english_pob_choice: the one born
  chosen_spanish: el que nació
  alternatives_spanish:
  - el nacido
  - el que fue nacido
  lexicon: BDAG
  rationale: El participio aoristo sustantivado se expresa de forma natural en español con una cláusula relativa; «nació» preserva la referencia al nacimiento sin sonar forzado.
- source_word: κατὰ σάρκα
  english_pob_choice: according to the flesh
  chosen_spanish: según la carne
  alternatives_spanish:
  - de acuerdo con la carne
  - por medios humanos ordinarios
  lexicon: BDAG
  rationale: Conserva la correspondencia léxica con σάρξ y la contraposición paulina con el Espíritu, sin sustituirla por una paráfrasis interpretativa.
- source_word: ἐδίωκε
  english_pob_choice: persecuted
  chosen_spanish: perseguía
  alternatives_spanish:
  - hostigaba
  - acosaba
  lexicon: BDAG
  rationale: El imperfecto griego sugiere acción repetida o característica en el relato; «perseguía» comunica bien esa continuidad en español.
- source_word: τὸν κατὰ πνεῦμα
  english_pob_choice: the one born according to the Spirit
  chosen_spanish: al que nació según el Espíritu
  alternatives_spanish:
  - al que era según el Espíritu
  - al que nació por el Espíritu
  lexicon: BDAG
  rationale: Se repite el verbo «nació» para hacer explícito el paralelismo que el inglés también aclaraba. «Espíritu» se capitaliza por el contexto salvífico y paulino, entendiendo la referencia al Espíritu Santo.
- source_word: πνεῦμα
  english_pob_choice: Spirit
  chosen_spanish: Espíritu
  alternatives_spanish:
  - espíritu
  lexicon: BDAG
  rationale: En este contraste con «carne» y dentro de la alegoría de Gálatas, la referencia es al Espíritu Santo; la mayúscula ayuda a comunicar esa decisión interpretativa.
- source_word: νῦν
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - en este tiempo
  - en la actualidad
  lexicon: BDAG
  rationale: Adverbio temporal simple y directo que enlaza el patrón antiguo con la situación presente de Pablo.
theological_decisions:
- issue: Sentido de κατὰ σάρκα en el contraste Ismael/Isaac
  english_pob_reading: Refers to birth by ordinary human procreation/human means, not specifically to a sinful nature.
  chosen_spanish_reading: Se refiere al nacimiento según el orden natural o por medios humanos, no a la idea de una naturaleza pecaminosa.
  alternative_spanish_readings:
  - según una naturaleza pecaminosa
  - en un sentido moralmente carnal
  rationale: El contexto inmediato contrapone nacimiento natural y nacimiento por promesa/Espíritu. La traducción «según la carne» mantiene la tensión léxica sin cargarla con un matiz moral que el pasaje no exige.
  doctrine_reference: 'DOCTRINE.md: σάρξ default ''flesh'' (literal) / ''sinful nature'' (metaphorical), context-dependent'
- issue: Referencia de πνεῦμα
  english_pob_reading: Holy Spirit
  chosen_spanish_reading: Espíritu Santo
  alternative_spanish_readings:
  - espíritu humano
  - principio espiritual
  rationale: En el marco de Gálatas 4 y la oposición con la carne, la lectura más probable es la del Espíritu Santo; la mayúscula en el texto español comunica esta decisión sin alejarse del griego.
  doctrine_reference: Contexto paulino de Espíritu vs. carne
translation_notes:
  revision_awareness: Se corrigió la validación anterior eliminando notas al pie no ancladas en el texto. El versículo ahora se presenta sin marcadores de nota, porque la formulación principal ya expresa las decisiones léxicas necesarias.
  spanish_consistency_notes:
  - Se usa «carne» para σάρξ, manteniendo la terminología paulina y la contraposición con «Espíritu».
  - Se usa «Espíritu» con mayúscula por la lectura contextual del Espíritu Santo.
  - Se conserva el paralelismo verbal con «nació» en ambas mitades del verso para reflejar la estructura griega.
  - «Perseguía» transmite mejor el imperfecto narrativo que una forma más estática.
