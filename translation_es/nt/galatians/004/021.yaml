translation:
  language: es
  text: Díganme[a], ustedes que quieren estar bajo la ley, ¿no escuchan la ley?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¿no oyen la ley?». El verbo griego puede significar tanto «oír» como «escuchar», y aquí probablemente alude a atender la Escritura que Pablo citará enseguida.
    reason: lexical_alternative
lexical_decisions:
- source_word: Λέγετέ μοι
  english_pob_choice: Tell me
  chosen_spanish: Díganme
  alternatives_spanish:
  - Háblenme
  - Díganme ustedes
  lexicon: BDAG
  rationale: El imperativo plural de λέγω introduce un desafío directo y requiere en español una forma imperativa natural y enérgica. «Díganme» conserva el tono exhortativo/interpelante mejor que una expresión más literal como «Digan a mí».
- source_word: οἱ ὑπὸ νόμον θέλοντες εἶναι
  english_pob_choice: you who want to be under the law
  chosen_spanish: ustedes que quieren estar bajo la ley
  alternatives_spanish:
  - ustedes que desean estar bajo la ley
  - los que quieren estar bajo la ley
  lexicon: BDAG
  rationale: El participio con artículo se dirige a un grupo caracterizado por ese deseo; «ustedes que quieren» mantiene ese valor vocativo en español. «Estar bajo la ley» preserva el idiomatismo paulino y la imagen relacional/jurídica del griego ὑπὸ νόμον sin explicitar más de lo que el texto exige.
- source_word: νόμον / τὸν νόμον
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la Ley
  - ley
  lexicon: BDAG
  rationale: En Gálatas, νόμος remite al ámbito mosaico y también a la Escritura que Pablo cita enseguida. «La ley» conserva la repetición retórica entre «estar bajo la ley» y «oír/escuchar la ley», sin capitalizar prematuramente el término.
- source_word: οὐκ ἀκούετε
  english_pob_choice: do you not listen to
  chosen_spanish: ¿no escuchan
  alternatives_spanish:
  - ¿no oyen
  - ¿no prestan atención a
  lexicon: BDAG
  rationale: ἀκούω puede significar «oír» o «escuchar». Aquí el sentido es de atender/hechar oído obedientemente al contenido de la ley; «escuchan» comunica mejor esa fuerza que un mero «oyen».
theological_decisions:
- issue: Referencia de «la ley» en la pregunta retórica
  english_pob_reading: Rendered as 'the law' without capitalization, while allowing the contextual sense to point to the Mosaic Law/Scripture.
  chosen_spanish_reading: Se mantiene «la ley» en minúsculas, dejando que el contexto muestre si se trata de la ley mosaica y de la Escritura citada a continuación.
  alternative_spanish_readings:
  - «la Ley» con mayúscula para marcar la Torá mosaica
  - «la ley de Moisés» para explicitar el referente
  rationale: Pablo juega con νόμος tanto como esfera bajo la cual algunos quieren vivir como como texto escritural que deberían escuchar. En español, la minúscula conserva esa tensión y evita cerrar demasiado pronto el alcance del término.
  doctrine_reference: Gálatas 4:21; uso paulino de νόμος en Gálatas
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el acuerdo alto del texto fuente y del audio-trail inglés: conserva el imperativo directo, la relación idiomática «bajo la ley», y la ambigüedad deliberada de ἀκούω en forma natural para el español. No se requirieron revisiones textuales adicionales.'
  spanish_consistency_notes:
  - Se mantiene «ley» en minúsculas para respetar el juego retórico con νόμος.
  - Se usa «escuchen» y no «oigan» en el texto principal para reflejar la idea de atender al contenido, no solo percibir sonido.
  - La puntuación reproduce la interpelación del griego con coma vocativa y pregunta final directa.
