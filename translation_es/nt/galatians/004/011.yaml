revisions:
- from: Me temo por ustedes[a], que de algún modo haya trabajado en vano entre ustedes.
  to: Temo por ustedes[a], que de algún modo he trabajado en vano por ustedes.
  rationale: Se corrige la construcción inicial a un español idiomático («Temo por ustedes»), se alinea κεκοπίακα con el perfecto indicativo auditado («he trabajado»), y se ajusta εἰς ὑμᾶς a «por ustedes» para preservar mejor la dirección del esfuerzo apostólico. Se mantiene «de algún modo» y «en vano» por fidelidad al expediente fuente. La nota conserva la alternativa con «no sea que», aunque el texto principal prefiere la formulación más natural y moderna.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:36:13Z'
