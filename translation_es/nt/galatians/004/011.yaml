translation:
  language: es
  text: Temo por ustedes[a], que de algún modo he trabajado en vano por ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Temo por ustedes, no sea que de algún modo he trabajado en vano por ustedes»; también podría traducirse «Me da miedo por ustedes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: φοβοῦμαι
  english_pob_choice: I fear
  chosen_spanish: Me temo
  alternatives_spanish:
  - Temo
  - Tengo miedo
  lexicon: BDAG
  rationale: El verbo deponente expresa aquí una preocupación presente de Pablo. En español, «me temo» comunica temor/aprehensión con un tono natural y pastoral, sin volverlo una simple emoción vaga ni endurecerlo excesivamente.
- source_word: ὑμᾶς
  english_pob_choice: for you
  chosen_spanish: por ustedes
  alternatives_spanish:
  - de ustedes
  - sobre ustedes
  lexicon: BDAG
  rationale: Con φοβοῦμαι, el acusativo señala a quienes son objeto de la preocupación. «Por ustedes» transmite bien la idea de preocupación por su bienestar espiritual en español natural.
- source_word: μή πως
  english_pob_choice: that somehow
  chosen_spanish: que de algún modo
  alternatives_spanish:
  - que quizá
  - no sea que
  lexicon: BDAG
  rationale: La secuencia introduce el contenido temido con incertidumbre. «Que de algún modo» conserva esa apertura sin imponer un matiz más arcaico como «no sea que», aunque esa alternativa sigue siendo posible.
- source_word: εἰκῇ
  english_pob_choice: in vain
  chosen_spanish: en vano
  alternatives_spanish:
  - sin resultado
  - para nada
  lexicon: BDAG
  rationale: «En vano» es el equivalente directo y transparente del adverbio, preservando la idea de falta de fruto o resultado.
- source_word: κεκοπίακα
  english_pob_choice: I have labored
  chosen_spanish: haya trabajado
  alternatives_spanish:
  - haya laborado
  - haya fatigado
  lexicon: BDAG
  rationale: El perfecto griego expresa una acción ya realizada con relevancia presente; en el contexto subordinado por μή πως, el español requiere una forma que suene naturalmente hipotética. «Haya trabajado» mantiene el sentido del esfuerzo realizado sin perder fluidez.
- source_word: εἰς ὑμᾶς
  english_pob_choice: over you
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - para ustedes
  - con ustedes
  lexicon: BDAG
  rationale: La preposición con κοπιάω puede indicar labor dirigida hacia personas. «Entre ustedes» refleja mejor el ámbito del ministerio paulino en español que «sobre ustedes», que sonaría artificial, y preserva la dirección relacional del esfuerzo.
theological_decisions:
- issue: Alcance de la preocupación de Pablo
  english_pob_reading: The verse expresses pastoral apprehension that Paul's missionary labor among the Galatians may prove fruitless.
  chosen_spanish_reading: El versículo expresa la preocupación pastoral de que el trabajo misionero de Pablo entre los gálatas pueda resultar inútil.
  alternative_spanish_readings:
  - Una inquietud meramente personal sin énfasis en el posible fracaso del trabajo apostólico.
  - Una advertencia general sin referencia al posible vacío del ministerio.
  rationale: La combinación del temor con el perfecto de κοπιάω apunta a la posibilidad de que la obra ya realizada quede sin fruto. La traducción conserva ese peso apostólico y no lo reduce a ansiedad genérica.
  doctrine_reference: Gálatas 4:11; cf. Gálatas 4:19
- issue: Valor aspectual del perfecto κεκοπίακα
  english_pob_reading: I have labored
  chosen_spanish_reading: haya trabajado
  alternative_spanish_readings:
  - he trabajado
  - trabajé
  rationale: El perfecto griego no se traslada bien con un indicativo simple en español dentro de una subordinación de temor. El subjuntivo perfecto español expresa con naturalidad una acción ya realizada cuyo resultado se evalúa como posible fracaso.
  doctrine_reference: Aspecto verbal griego; cf. BDAG κοπιάω
translation_notes:
  revision_awareness: Seguí el pasaje griego directo y el audit trail inglés, pero ajusté la sintaxis al español para conservar el matiz de preocupación pastoral y el valor perfectivo de κεκοπίακα. También evité «SEÑOR/Cristo» porque no aparecen en este versículo.
  spanish_consistency_notes:
  - Usé «gálatas»/«ustedes» en registro neutral y reverente, sin arcaismos innecesarios.
  - Mantuve «en vano» para εἰκῇ por ser la equivalencia más estable y transparente.
  - Elegí «haya trabajado» para reflejar mejor el perfecto griego dentro del alcance de μή πως.
  - Evité «sobre ustedes» porque suena poco natural en español y no añade precisión al sentido del texto.
