  verdict: revise
  source_alignment_summary: 'El borrador capta bien la preocupación pastoral de Pablo y la idea de trabajo potencialmente inútil, pero no preserva con suficiente fidelidad dos decisiones auditadas: φοβοῦμαι ὑμᾶς se expresa mejor en español como «Temo por ustedes» que como «Me temo por ustedes», y κεκοπίακα debe reflejarse como indicativo perfecto («he trabajado») según la revisión inglesa auditada, no como subjuntivo perfecto («haya trabajado»).'
  spanish_quality_summary: «Me temo por ustedes» suena poco natural en español general; la formulación idiomática es «Temo por ustedes» o «Me temo que…». Además, «entre ustedes» es legible, pero aquí «por ustedes» preserva mejor la dirección del esfuerzo apostólico hacia ellos sin sonar extraño. La oración revisada queda más clara, natural y digna.
  glossary_alignment: 'No hay términos del glosario mayor en juego. La revisión sí alinea mejor las decisiones léxicas auditadas: φοβοῦμαι → «Temo», ὑμᾶς → «por ustedes», μή πως → «que de algún modo», εἰκῇ → «en vano», κεκοπίακα → «he trabajado», εἰς ὑμᾶς → «por ustedes».'
  issues:
  - severity: medium
    issue: «Me temo por ustedes» es una construcción poco natural en español.
    rationale: En español estándar, «me temo» normalmente introduce una proposición («me temo que…»), mientras que para expresar preocupación por personas se usa de manera más idiomática «Temo por ustedes».
  - severity: high
    issue: «haya trabajado» no refleja la decisión auditada sobre κεκοπίακα.
    rationale: La revisión inglesa cambió expresamente a «I have labored» para reflejar el perfecto indicativo griego. El español puede mantener esa fuerza con «he trabajado» después de «que de algún modo», sin necesidad de convertirlo en una posibilidad subjuntiva.
  - severity: medium
    issue: «entre ustedes» debilita la fuerza direccional de εἰς ὑμᾶς frente al audit trail.
    rationale: Aunque es posible en contexto ministerial, el expediente inglés prefirió una expresión dirigida hacia los destinatarios. En español, «por ustedes» comunica con naturalidad el esfuerzo invertido en ellos.
  revised_spanish_text: Temo por ustedes[a], que de algún modo he trabajado en vano por ustedes.
