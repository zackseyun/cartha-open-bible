translation:
  language: es
  text: para que redimiera a los que están bajo la ley, para que recibiéramos la adopción[a] como hijos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O simplemente, «adopción». El término griego es literalmente «adopción como hijos», lo que resalta el pleno estatus filial y los derechos de herencia; el referente incluye a todos los creyentes, mujeres y hombres por igual.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: En ambos miembros introduce propósito. «Para que» expresa con naturalidad el valor final sin perder la relación causal-telica del griego.
- source_word: τοὺς ὑπὸ νόμον
  english_pob_choice: those under the law
  chosen_spanish: los que están bajo la ley
  alternatives_spanish:
  - los sujetos a la ley
  - los que están bajo la Ley
  lexicon: BDAG
  rationale: La expresión es substantiva y designa personas bajo la jurisdicción de la ley mosaica. «Están bajo la ley» conserva la imagen de sujeción sin volverla demasiado técnica.
- source_word: νόμον
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la Ley
  - la ley de Moisés
  lexicon: BDAG
  rationale: En Gálatas, νόμος suele referirse a la ley mosaica; en español, «la ley» es natural y suficientemente específica por el contexto inmediato.
- source_word: ἐξαγοράσῃ
  english_pob_choice: redeem
  chosen_spanish: redimiera
  alternatives_spanish:
  - comprara de vuelta
  - liberara por rescate
  lexicon: BDAG
  rationale: «Redimir» conserva el sentido de rescate/compraventa con fuerza teológica establecida en español bíblico, sin reducirlo a una mera metáfora económica.
- source_word: τὴν υἱοθεσίαν
  english_pob_choice: adoption as sons
  chosen_spanish: la adopción[a] como hijos
  alternatives_spanish:
  - la adopción filial
  - la adopción como hijos
  lexicon: BDAG
  rationale: La construcción griega es literalmente «adopción como hijos». En español, «adopción» sola puede funcionar, pero se añade la nota para preservar la fuerza filial e inheritaria del término, y el encabezado textual usa «como hijos» para transparentar el matiz sin sonar forzado.
- source_word: ἀπολάβωμεν
  english_pob_choice: we might receive
  chosen_spanish: recibiéramos
  alternatives_spanish:
  - obtuviéramos
  - recibiésemos
  lexicon: BDAG
  rationale: El subjuntivo final exige una forma orientada a propósito. «Recibiéramos» mantiene el valor de propósito y resulta más fluido en español contemporáneo que una perífrasis más literal.
theological_decisions:
- issue: Traducción de υἱοθεσία y su alcance inclusivo
  english_pob_reading: adoption as sons, with a note clarifying that the referent includes all believers, women and men alike
  chosen_spanish_reading: la adopción como hijos, con nota aclarando que el referente incluye a todos los creyentes
  alternative_spanish_readings:
  - la adopción
  - la filiación
  - la adopción filial
  rationale: Se conserva el término filial marcado por el griego para no diluir el énfasis paulino en estatus e herencia. La nota permite explicitar el alcance inclusivo sin borrar la forma masculina del original.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Alcance de «los que están bajo la ley»
  english_pob_reading: those under the law refers primarily to persons under the Mosaic law
  chosen_spanish_reading: se refiere principalmente a quienes están bajo la ley mosaica
  alternative_spanish_readings:
  - se refiere a todos los sometidos a la ley
  - se refiere a los judíos
  rationale: En el contexto inmediato de Gálatas 4:4–5, la referencia principal es a quienes están bajo la ley de Moisés. La traducción mantiene esa identificación contextual sin cerrarla de manera excesivamente restrictiva en el texto principal.
  doctrine_reference: Contexto inmediato de Gálatas 4:4–5
translation_notes:
  revision_awareness: El borrador sigue el pass más reciente sin cambios sustantivos, en concordancia alta con la revisión inglesa. Se mantuvo la doble cláusula de propósito, el valor de rescate de ἐξαγοράσῃ y el matiz filial de υἱοθεσία, preservando la tensión entre una traducción natural y la forma literal del griego.
  spanish_consistency_notes:
  - Se usa «ley» para νόμος de manera coherente con el contexto paulino de Gálatas.
  - Se usa «redimir» para ἐξαγοράζω, evitando alternar con «comprar de vuelta» dentro del mismo versículo.
  - Se mantiene «adopción» con nota explicativa para no perder el matiz de filiación e herencia.
  - La primera cláusula usa pretérito imperfecto de subjuntivo («redimiera») para reflejar la finalidad de ἵνα con un español natural y reverente.
