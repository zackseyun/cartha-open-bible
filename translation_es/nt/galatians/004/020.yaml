translation:
  language: es
  text: Pero quisiera estar ahora con ustedes y cambiar mi tono[a], porque estoy perplejo respecto de ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cambiar mi voz»; el griego dice literalmente «cambiar mi voz», pero aquí probablemente significa el tono o la manera de hablar de Pablo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤθελον
  english_pob_choice: I wish I could
  chosen_spanish: quisiera
  alternatives_spanish:
  - desearía
  - me gustaría
  lexicon: BDAG
  rationale: El imperfecto expresa un deseo presente no realizado. En español, «quisiera» comunica de forma natural ese deseo mitigado y actual sin volverlo demasiado fuerte ni demasiado hipotético.
- source_word: παρεῖναι πρὸς ὑμᾶς
  english_pob_choice: be with you
  chosen_spanish: estar con ustedes
  alternatives_spanish:
  - estar presentes con ustedes
  - estar junto a ustedes
  lexicon: BDAG
  rationale: La idea es presencia personal en relación con los gálatas. «Estar con ustedes» suena natural en español y conserva la cercanía interpersonal del griego.
- source_word: ἄρτι
  english_pob_choice: right now
  chosen_spanish: ahora
  alternatives_spanish:
  - justo ahora
  - en este momento
  lexicon: BDAG
  rationale: La partícula enfatiza inmediatez. «Ahora» mantiene la urgencia sin recargar la frase; el contexto ya aporta la vivacidad temporal.
- source_word: ἀλλάξαι τὴν φωνήν μου
  english_pob_choice: change my tone
  chosen_spanish: cambiar mi tono
  alternatives_spanish:
  - cambiar mi voz
  - cambiar la manera en que hablo
  lexicon: BDAG
  rationale: φωνή puede significar literalmente «voz», pero aquí el contexto pastoral favorece el sentido de manera de hablar. «Tono» reproduce bien esa fuerza idiomática en español y evita una lectura meramente fisiológica.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Introduce la razón del deseo de Pablo. «Porque» es la equivalencia más directa y clara en español contemporáneo.
- source_word: ἀποροῦμαι
  english_pob_choice: I am perplexed
  chosen_spanish: estoy perplejo
  alternatives_spanish:
  - estoy desconcertado
  - estoy atónito
  - estoy sin saber qué pensar
  lexicon: BDAG
  rationale: El verbo expresa estar en duda, sin salida o confundido. «Estoy perplejo» conserva ese matiz cognitivo y afectivo sin añadir una interpretación más fuerte de la necesaria.
- source_word: ἐν ὑμῖν
  english_pob_choice: about you
  chosen_spanish: respecto de ustedes
  alternatives_spanish:
  - acerca de ustedes
  - por ustedes
  - en relación con ustedes
  lexicon: BDAG
  rationale: Con ἀπορέω, la preposición puede indicar referencia o esfera. «Respecto de ustedes» transmite de manera natural que la perplejidad de Pablo se relaciona con ellos, sin forzar un literalismo extraño.
theological_decisions:
- issue: Sentido de φωνή en contexto pastoral
  english_pob_reading: Paul refers to changing his manner or tone of address, not merely his literal voice.
  chosen_spanish_reading: Pablo se refiere a cambiar su tono o manera de dirigirse a ellos, no solo a su voz física.
  alternative_spanish_readings:
  - cambiar el sonido literal de su voz
  - cambiar su voz en sentido físico
  rationale: El contexto inmediato es una reprensión afectuosa y preocupada; por eso el término apunta mejor al modo de hablar que al sonido vocal. Esta decisión sigue el análisis contextual del POB en inglés.
  doctrine_reference: Interpretación contextual del discurso pastoral de Pablo; no implica una cuestión doctrinal.
translation_notes:
  revision_awareness: El pasaje fue revisado y se mantuvo sin cambios sustantivos en el último pase; la concordancia de revisión indicó alto acuerdo y ningún ajuste adicional necesario.
  spanish_consistency_notes:
  - Se mantiene «ustedes» para el destinatario plural, en consonancia con un español latinoamericano neutral.
  - Se usa «Yahvé» como forma predeterminada solo cuando el texto lo requiere; este versículo no contiene el nombre divino.
  - «Tono» se emplea como equivalente idiomático de φωνή en un contexto retórico, no como sustituto arbitrario de «voz».
