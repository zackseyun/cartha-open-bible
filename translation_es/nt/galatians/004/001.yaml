    rationale: El English POB preserva explícitamente la alternativa «servant» para δοῦλος y explica por qué se eligió «slave». La revisión española debe conservar esa evidencia auditada mediante una nota equivalente anclada en el texto.
  - severity: low
    issue: «Aunque sea señor de todo» introduce un matiz potencial menos directo que el concesivo factual del griego.
    rationale: El participio ὤν con «aunque» expresa concesión basada en un hecho, no posibilidad. En español, el indicativo («aunque es») comunica mejor ese valor aquí.
