translation:
  language: es
  text: Ahora digo que, mientras el heredero es un niño[a], en nada difiere de un esclavo[b], aunque es señor de todo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un menor». El griego νήπιος puede referirse a un niño inmaduro y, en este contexto, a alguien que todavía no ha alcanzado la mayoría de edad.
    reason: lexical_alternative
  - marker: b
    text: O «un siervo». El griego δοῦλος a menudo denota un esclavo o una persona en servidumbre; aquí se usa «esclavo» para preservar la fuerza de la comparación de Pablo.
    reason: lexical_alternative
lexical_decisions:
- source_word: Λέγω δέ
  english_pob_choice: Now I say
  chosen_spanish: Ahora digo
  alternatives_spanish:
  - Pero digo
  - Y digo
  lexicon: BDAG
  rationale: λέγω δέ funciona como marcador discursivo que introduce una explicación o desarrollo. «Ahora digo» preserva el giro introductorio en español sin cargarlo de contraste fuerte.
- source_word: ἐφ’ ὅσον χρόνον
  english_pob_choice: as long as
  chosen_spanish: mientras
  alternatives_spanish:
  - durante todo el tiempo que
  - mientras que
  lexicon: BDAG
  rationale: La expresión marca duración limitada; «mientras» comunica bien esa idea en español natural y mantiene la relación temporal del original.
- source_word: ὁ κληρονόμος
  english_pob_choice: the heir
  chosen_spanish: el heredero
  alternatives_spanish:
  - el que hereda
  - el heredero legal
  lexicon: BDAG
  rationale: κληρονόμος designa al que recibe una herencia. «Heredero» es la equivalencia más directa y clara en español.
- source_word: νήπιός
  english_pob_choice: a child
  chosen_spanish: un niño
  alternatives_spanish:
  - un menor
  - un infante
  lexicon: BDAG
  rationale: νήπιος puede referirse a un niño inmaduro o a alguien que aún no tiene edad plena. En este contexto de herencia, «un niño» conserva la idea de minoridad y sigue siendo natural en español; la nota preserva la alternativa de sentido.
- source_word: οὐδὲν διαφέρει
  english_pob_choice: differs in nothing
  chosen_spanish: en nada difiere
  alternatives_spanish:
  - no difiere en nada
  - es en nada distinto
  lexicon: BDAG
  rationale: La frase expresa ausencia total de diferencia práctica. «En nada difiere» mantiene de cerca la estructura del griego y su fuerza comparativa.
- source_word: δούλου
  english_pob_choice: a slave
  chosen_spanish: de un esclavo
  alternatives_spanish:
  - de un siervo
  - de un sirviente
  lexicon: BDAG
  rationale: δοῦλος suele requerir «esclavo» cuando la sujeción es central. Aquí Pablo contrasta la condición efectiva del heredero con la de un esclavo, por lo que conservar esa fuerza es importante.
- source_word: κύριος πάντων ὤν
  english_pob_choice: though he is lord of all
  chosen_spanish: aunque sea señor de todo
  alternatives_spanish:
  - aunque es dueño de todo
  - siendo señor de todo
  lexicon: BDAG
  rationale: κύριος aquí expresa autoridad/señorío, no un título litúrgico. «Señor de todo» reproduce la ironía del contraste; «aunque» explicita el valor concesivo del participio.
theological_decisions:
- issue: Valor de δοῦλος en la comparación paulina
  english_pob_reading: slave
  chosen_spanish_reading: esclavo
  alternative_spanish_readings:
  - siervo
  - sirviente
  rationale: La comparación depende de una condición de sujeción real y no meramente de servicio voluntario. «Esclavo» preserva mejor la fuerza retórica y semántica del argumento de Pablo.
  doctrine_reference: 'DOCTRINE.md Contested terms: δοῦλος'
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto griego y el criterio auditado de la POB en inglés. Se mantuvo la tensión lexical de νήπιος con una nota, y se preservó δοῦλος como «esclavo» por la fuerza retórica del contraste heredero/esclavo. No se introdujeron cambios de sentido respecto del paquete fuente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» no aplica aquí porque no aparece el nombre divino en el versículo.
  - Se usa «señor» para κύριος como término de autoridad, no como sustituto litúrgico de un nombre divino.
  - «Esclavo» se conserva por coherencia con la terminología POB para δοῦλος cuando la sujeción es el punto retórico.
  - La puntuación y el orden procuran una lectura natural en español sin añadir contenido interpretativo.
