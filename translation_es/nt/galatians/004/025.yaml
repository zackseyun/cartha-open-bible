translation:
  language: es
  text: Ahora bien, Agar es el monte Sinaí en Arabia[a], y corresponde a la Jerusalén actual, porque está esclavizada junto con sus hijos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Ahora esta Agar es el monte Sinaí en Arabia». El artículo griego antes de «Agar» produce una cláusula sintácticamente difícil; algunas traducciones la reflejan de manera más explícita.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸ δὲ Ἁγὰρ
  english_pob_choice: Now Hagar
  chosen_spanish: Ahora bien, Agar
  alternatives_spanish:
  - Ahora Agar
  - Ahora esta Agar
  lexicon: BDAG
  rationale: δέ introduce una continuación explicativa suave; en español, «Ahora bien» conserva ese giro discursivo. El artículo griego antes de «Hagar» es sintácticamente difícil; como en el inglés POB, el español lo resuelve de forma natural sin forzar «esta».
- source_word: Σινᾶ ὄρος
  english_pob_choice: Mount Sinai
  chosen_spanish: el monte Sinaí
  alternatives_spanish:
  - monte Sinaí
  - el monte del Sinaí
  lexicon: BDAG
  rationale: La identificación apposicional se expresa de manera idiomática en español como «el monte Sinaí», preservando el nombre propio y la relación con Hagar.
- source_word: ἐν τῇ Ἀραβίᾳ
  english_pob_choice: in Arabia
  chosen_spanish: en Arabia
  alternatives_spanish:
  - en la Arabia
  - en la región de Arabia
  lexicon: BDAG
  rationale: «Arabia» reproduce el término geográfico sin sobredeterminación histórica. Se evita explicar el alcance provincial porque el texto no lo hace.
- source_word: συστοιχεῖ
  english_pob_choice: corresponds to
  chosen_spanish: corresponde a
  alternatives_spanish:
  - está en paralelo con
  - se corresponde con
  - coincide con
  lexicon: BDAG
  rationale: El verbo expresa alineación o correspondencia en el argumento alegórico de Pablo. «Corresponde a» conserva esa relación sin añadir interpretación extra.
- source_word: τῇ νῦν Ἰερουσαλήμ
  english_pob_choice: the present Jerusalem
  chosen_spanish: la Jerusalén de ahora
  alternatives_spanish:
  - la Jerusalén presente
  - la Jerusalén actual
  lexicon: BDAG
  rationale: νῦν marca contraste temporal con la Jerusalén de arriba del versículo siguiente. «De ahora» mantiene la referencia temporal con buena naturalidad en español.
- source_word: δουλεύει
  english_pob_choice: is enslaved
  chosen_spanish: está esclavizada
  alternatives_spanish:
  - es esclava
  - está en esclavitud
  - vive esclavizada
  lexicon: BDAG
  rationale: Se mantiene la fuerza de δουλεύει con lenguaje de esclavitud, siguiendo la decisión auditada del POB de no suavizar el contraste. «Está esclavizada» es directo y natural en español.
- source_word: μετὰ τῶν τέκνων αὐτῆς
  english_pob_choice: with her children
  chosen_spanish: junto con sus hijos
  alternatives_spanish:
  - con sus hijos
  - junto a sus hijos
  lexicon: BDAG
  rationale: μετά con genitivo expresa asociación; «junto con» comunica mejor la coexistencia en la misma condición de esclavitud que un simple «con». «Hijos» mantiene el valor familiar/allegórico de τέκνα.
theological_decisions:
- issue: Identificación alegórica de Agar con Sinaí/Jerusalén
  english_pob_reading: 'Render the statement directly without softening the identification: ''Hagar is Mount Sinai in Arabia, and she corresponds to the present Jerusalem.'''
  chosen_spanish_reading: 'Se traduce la identificación de modo directo: «Agar es el monte Sinaí en Arabia, y corresponde a la Jerusalén de ahora».'
  alternative_spanish_readings:
  - Agar representa el monte Sinaí en Arabia
  - Agar simboliza el monte Sinaí en Arabia
  rationale: El griego usa una identificación directa seguida de una correspondencia explícita. El español conserva esa fuerza retórica sin convertirla en una explicación interpretativa más débil.
  doctrine_reference: Galatians 4:24-26; allegorical argument in Pauline hermeneutics
- issue: δουλεύει y el lenguaje de esclavitud
  english_pob_reading: for she is enslaved with her children
  chosen_spanish_reading: porque está esclavizada junto con sus hijos
  alternative_spanish_readings:
  - porque es esclava junto con sus hijos
  - porque vive esclavizada con sus hijos
  rationale: Se mantiene el peso teológico y social de la esclavitud como imagen del estado de la Jerusalén presente. No se reemplaza por «sirve» o «sierva», para no diluir la fuerza del contraste en el pasaje.
  doctrine_reference: Romans 8:15; Galatians 4:1-7, 21-31
translation_notes:
  revision_awareness: 'Se siguió de cerca el audit trail inglés: se mantuvo la identificación directa, la correspondencia de συστοιχεῖ, el contraste temporal de νῦν y la fuerza de δουλεύει como esclavitud, usando una formulación española natural y publicable.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «esclavizada» para δουλεύει, en continuidad con la decisión POB auditada de preservar el campo semántico de esclavitud.
  - Se traduce τέκνα como «hijos» aquí por el paralelismo familiar/allegórico del contexto, sin excluir el sentido inclusivo general de «children».
  - «Agar» se mantiene como forma española estándar del nombre, coherente con el uso bíblico común y con el inglés POB.
