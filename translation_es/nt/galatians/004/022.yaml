translation:
  language: es
  text: 'Porque está escrito que Abraham tuvo dos hijos[a]: uno de la esclava y uno de la mujer libre.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «uno de la sierva». El griego παιδίσκη puede referirse a una servidora femenina, pero aquí «la esclava» hace explícito el contraste entre esclavitud y libertad en el argumento de Pablo.
    reason: lexical_alternative
lexical_decisions:
- source_word: γέγραπται
  english_pob_choice: it is written
  chosen_spanish: está escrito
  alternatives_spanish:
  - ha sido escrito
  lexicon: BDAG
  rationale: La fórmula bíblica estándar en español conserva la cita con autoridad escritural de manera natural; 'está escrito' transmite bien el valor perfecto pasivo sin sonar forzado.
- source_word: γὰρ
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Aquí introduce la razón del argumento inmediato; 'porque' es claro y fluido en español, sin perder la conexión lógica.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - a saber que
  lexicon: BDAG
  rationale: Introduce el contenido de la cita de manera directa y natural en español.
- source_word: Ἀβραὰμ
  english_pob_choice: Abraham
  chosen_spanish: Abraham
  alternatives_spanish:
  - Abrahán
  lexicon: BDAG
  rationale: Nombre propio bíblico usual y reconocible; 'Abraham' coincide con el uso estándar en el castellano eclesial amplio.
- source_word: δύο υἱοὺς
  english_pob_choice: two sons
  chosen_spanish: dos hijos
  alternatives_spanish:
  - dos varones
  - dos hijos varones
  lexicon: BDAG
  rationale: '''Hijos'' reproduce con naturalidad el plural masculino del griego y resulta idiomático en español; ''hijos varones'' sería más explícito pero más pesado.'
- source_word: ἔσχεν
  english_pob_choice: had
  chosen_spanish: tuvo
  alternatives_spanish:
  - había tenido
  - engendró
  lexicon: BDAG
  rationale: En este contexto genealógico, 'tuvo' expresa de modo natural la relación de paternidad sin introducir una paráfrasis interpretativa como 'engendró'.
- source_word: ἕνα ... καὶ ἕνα
  english_pob_choice: one ... and one
  chosen_spanish: uno ... y uno
  alternatives_spanish:
  - uno ... y el otro
  lexicon: BDAG
  rationale: Conserva el paralelismo balanceado del griego. En español, la repetición de 'uno' mantiene la simetría retórica.
- source_word: ἐκ
  english_pob_choice: by
  chosen_spanish: de
  alternatives_spanish:
  - por
  - a través de
  lexicon: BDAG
  rationale: El griego expresa procedencia/relación de nacimiento; en español, 'de' funciona de manera natural en este contexto familiar ('uno de la esclava').
- source_word: παιδίσκης
  english_pob_choice: slave woman
  chosen_spanish: la esclava
  alternatives_spanish:
  - la sierva
  - la sirvienta
  - la esclava mujer
  lexicon: BDAG
  rationale: 'La opción inglesa privilegia el contraste esclavitud/libertad. En español, ''esclava'' mantiene ese contraste de forma directa y evita suavizar el término con ''sierva'' o ''sirvienta''. El artículo sustantiva la frase y permite una construcción fluida: ''uno de la esclava''.'
- source_word: ἐλευθέρας
  english_pob_choice: free woman
  chosen_spanish: la libre
  alternatives_spanish:
  - la mujer libre
  - la mujer de condición libre
  lexicon: BDAG
  rationale: El adjetivo sustantivado griego se vierte naturalmente como 'la libre', preservando el paralelismo con 'la esclava' y la antítesis central del pasaje.
theological_decisions:
- issue: Contraste esclavitud/libertad en la alegoría de Pablo
  english_pob_reading: Render παιδίσκη/ἐλευθέρα as 'slave woman'/'free woman' so the status contrast remains explicit.
  chosen_spanish_reading: Traducir como 'la esclava' y 'la libre' para que el contraste social-teológico quede explícito en español.
  alternative_spanish_readings:
  - la sierva / la libre
  - la sirvienta / la libre
  rationale: El argumento de Pablo en el contexto inmediato depende del contraste entre esclavitud y libertad. En español, sustantivar con 'la esclava' y 'la libre' conserva esa fuerza sin añadir elementos ajenos al texto.
  doctrine_reference: DOCTRINE.md translation philosophy §1; término polémico esclavo/siervo (según contexto)
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego de SBLGNT y coincide con la evaluación de alta concordancia del audit trail en inglés; no se registraron revisiones sustantivas en el pasaje fuente.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' en la política general del proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió 'la esclava' frente a 'la sierva' para no atenuar el contraste semántico central del pasaje.
  - La sintaxis breve en español conserva el paralelismo 'uno... y uno' del griego.
