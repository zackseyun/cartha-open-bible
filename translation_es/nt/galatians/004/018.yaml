    text: Or 'to be zealous' / 'to show zeal.' The Greek infinitive ζηλοῦσθαι can be understood differently, but the passive sense fits the immediate contrast with those who seek the Galatians in the previous verse.
    reason: alternative_reading
  - marker: b
    text: Literally 'in a good [thing/matter].' The phrase likely means with good motives or for a good purpose.
    reason: lexical_alternative
