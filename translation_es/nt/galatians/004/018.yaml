translation:
  language: es
  text: Pero es bueno ser buscados con celo por un buen motivo[a][b], siempre, y no solo cuando estoy presente con ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Alternativamente: «ser celosamente buscados» o «mostrar celo». El griego ζηλοῦσθαι puede entenderse de distintas maneras, pero aquí el sentido pasivo encaja mejor con el contraste del versículo anterior.'
    reason: alternative_reading
  - marker: b
    text: 'Literalmente: «en un bien» o «en una cosa buena». La expresión probablemente apunta a un motivo bueno o a una causa buena.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καλὸν
  english_pob_choice: it is good
  chosen_spanish: es bueno
  alternatives_spanish:
  - bueno
  lexicon: BDAG
  rationale: El adjetivo funciona de manera impersonal con el infinitivo; en español, «es bueno» expresa con naturalidad esa construcción sin perder el valor predicativo.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Marca contraste con la advertencia y la motivación incorrecta del versículo anterior; «Pero» conserva bien el giro adversativo.
- source_word: ζηλοῦσθαι
  english_pob_choice: to be zealous
  chosen_spanish: ser objeto de celo
  alternatives_spanish:
  - ser buscado con celo
  - ser procurado con celo
  - ser celosamente buscado
  lexicon: BDAG
  rationale: 'El contexto inmediato favorece el valor pasivo del verbo: no «tener celo» sino ser el objeto del celo de otros. «Ser objeto de celo» mantiene esa tensión léxica sin convertirlo en una formulación extraña.'
- source_word: ἐν καλῷ
  english_pob_choice: in a good matter / for a good purpose
  chosen_spanish: por un buen motivo
  alternatives_spanish:
  - en una buena causa
  - en una buena cosa
  - para un buen propósito
  lexicon: BDAG
  rationale: La preposición puede ser idiomática; en español, «por un buen motivo» comunica con claridad la calidad moral de la intención sin restringir innecesariamente el alcance de la frase.
- source_word: πάντοτε
  english_pob_choice: at all times
  chosen_spanish: siempre
  alternatives_spanish:
  - en todo tiempo
  - en todo momento
  lexicon: BDAG
  rationale: «Siempre» es la forma más natural y fiel para la idea temporal general, y funciona bien con la limitación siguiente.
- source_word: καὶ μὴ μόνον
  english_pob_choice: and not only
  chosen_spanish: y no solo
  alternatives_spanish:
  - y no solamente
  - y no meramente
  lexicon: BDAG
  rationale: Traduce de manera directa la coordinación y la restricción; «no solo» suena natural y mantiene el contraste con la presencia de Pablo.
- source_word: ἐν τῷ παρεῖναί με πρὸς ὑμᾶς
  english_pob_choice: when I am present with you
  chosen_spanish: cuando estoy presente con ustedes
  alternatives_spanish:
  - mientras estoy con ustedes
  - durante mi presencia entre ustedes
  lexicon: BDAG
  rationale: El infinitivo articular con ἐν expresa tiempo; «cuando estoy presente con ustedes» transmite el contraste temporal entre la presencia de Pablo y su ausencia con una dicción clara y publicable.
theological_decisions:
- issue: Sentido pasivo de ζηλοῦσθαι en el contexto de Gálatas 4:17–18
  english_pob_reading: the Galatians being eagerly sought by others
  chosen_spanish_reading: ser objeto de celo por parte de otros
  alternative_spanish_readings:
  - que otros muestren celo por ustedes
  - ser buscados con celo
  rationale: El contexto inmediato habla de personas que buscan ganar a los gálatas con intenciones malas. Por eso, el sentido pasivo preserva la relación con el versículo anterior y evita borrar la tensión entre un celo bueno y un celo manipulado.
  doctrine_reference: Contexto literario inmediato (Gálatas 4:17–18); uso de ζηλόω en la argumentación paulina
translation_notes:
  revision_awareness: 'Se tomó en cuenta la revisión más reciente del POB inglés, que ajustó la idea de ζηλοῦσθαι para conservar mejor el matiz del griego dentro del contraste de los versículos 17–18. La versión española refleja ese equilibrio: mantiene el valor pasivo y la cualidad moral del motivo, con una expresión natural para lectura pública.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque no aparece el tetragrámaton ni κύριος con sentido divino en este versículo.
  - Se evita «Cristo/Mesías» porque el pasaje no contiene Χριστός.
  - «Espíritu» no aparece; no se requiere decisión terminológica adicional.
  - Se mantiene un registro bíblico moderno y claro, sin arcaismos innecesarios.
