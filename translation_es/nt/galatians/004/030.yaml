translation:
  language: es
  text: Pero ¿qué dice la Escritura? «Expulsa a la esclava[a] y a su hijo[c][b], porque el hijo de la esclava no heredará de ningún modo con el hijo de la mujer libre».
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sierva». El término griego designa a una mujer esclava o en servidumbre; aquí se usa «esclava» porque el contraste entre esclavitud y libertad es central en el pasaje.
    reason: lexical_alternative
  - marker: b
    text: La cita evoca Génesis 21:10.
    reason: cross_reference
  - marker: c
    text: 'El griego tiene una negación enfática: «no heredará de ningún modo», también «ciertamente no heredará».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Mas
  - Sin embargo
  lexicon: BDAG
  rationale: Marca el giro contrastivo del argumento de Pablo. En español, «Pero» es la forma más natural y directa para reproducir ese contraste inicial sin añadir matiz innecesario.
- source_word: τί λέγει ἡ γραφή
  english_pob_choice: what does the Scripture say
  chosen_spanish: ¿qué dice la Escritura?
  alternatives_spanish:
  - ¿qué dice la Escritura santa?
  - ¿qué dice la Escritura misma?
  lexicon: BDAG
  rationale: Conserva la fórmula personificada de cita y el tiempo presente. «La Escritura» refleja el artículo griego y funciona con naturalidad en español bíblico contemporáneo.
- source_word: Ἔκβαλε
  english_pob_choice: Cast out
  chosen_spanish: Expulsa
  alternatives_spanish:
  - Échala fuera
  - Destierra
  lexicon: BDAG
  rationale: ἐκβάλλω expresa expulsión enérgica. «Expulsa» transmite esa fuerza en español actual; evita suavizar el mandato y mantiene la severidad del texto citado.
- source_word: παιδίσκην
  english_pob_choice: slave woman
  chosen_spanish: la esclava
  alternatives_spanish:
  - la esclava mujer
  - la sierva
  lexicon: BDAG
  rationale: El contraste esclavitud/libertad es central en el pasaje, y en español «esclava» comunica mejor esa oposición que opciones más débiles como «sierva». Se omite «mujer» porque el sustantivo femenino ya está implícito en el contexto.
- source_word: υἱὸν αὐτῆς
  english_pob_choice: her son
  chosen_spanish: a su hijo
  alternatives_spanish:
  - a su hijo varón
  - a su hijo propio
  lexicon: BDAG
  rationale: La construcción posesiva es directa. En español, el orden natural del imperativo con complemento es «expulsa a... y a su hijo», sin necesidad de ampliar el sentido.
- source_word: οὐ γὰρ μὴ κληρονομήσει
  english_pob_choice: for ... will certainly not inherit
  chosen_spanish: porque ... no heredará en absoluto
  alternatives_spanish:
  - porque ... de ningún modo heredará
  - porque ... ciertamente no heredará
  lexicon: BDAG
  rationale: La negación enfática οὐ μή con futuro exige una negación fuerte. «No heredará en absoluto» reproduce la rotundidad sin sonar arcaico; conserva la exclusión categórica del texto.
- source_word: κληρονομήσει
  english_pob_choice: inherit
  chosen_spanish: heredará
  alternatives_spanish:
  - recibirá la herencia
  - obtendrá en herencia
  lexicon: BDAG
  rationale: «Heredará» es la equivalencia estándar y suficientemente precisa en el contexto legal-familiar de la promesa y la herencia.
- source_word: μετὰ τοῦ υἱοῦ
  english_pob_choice: with the son
  chosen_spanish: con el hijo
  alternatives_spanish:
  - junto con el hijo
  - al lado del hijo
  lexicon: BDAG
  rationale: μετά con genitivo expresa asociación en la herencia. «Con el hijo» es claro y natural en español, y conserva la idea de compartir el mismo ámbito de herencia.
- source_word: τῆς ἐλευθέρας
  english_pob_choice: the free woman
  chosen_spanish: de la libre
  alternatives_spanish:
  - de la mujer libre
  - de la libre mujer
  lexicon: BDAG
  rationale: El adjetivo sustantivado se mantiene con concisión. «De la libre» es fiel al griego y preserva el paralelo con «la esclava»; «mujer libre» sería una expansión interpretativa innecesaria.
theological_decisions:
- issue: Renderizar παιδίσκη en el contraste alegórico de Gálatas 4
  english_pob_reading: slave woman
  chosen_spanish_reading: la esclava
  alternative_spanish_readings:
  - la sierva
  - la bondwoman
  rationale: El argumento de Pablo en el contexto inmediato depende del contraste esclavitud/libertad. «La esclava» mantiene esa tensión lexical y teológica de modo transparente para el lector español.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1; contested slavery terminology policy'
- issue: Intensidad de la negación en οὐ γὰρ μὴ κληρονομήσει
  english_pob_reading: will certainly not inherit
  chosen_spanish_reading: no heredará en absoluto
  alternative_spanish_readings:
  - de ningún modo heredará
  - ciertamente no heredará
  rationale: La construcción griega expresa una exclusión categórica. El español elegido comunica esa certeza negativa sin exagerar ni atenuar el alcance del texto.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
- issue: Eco a Génesis 21:10 en la cita paulina
  english_pob_reading: The quotation echoes Genesis 21:10.
  chosen_spanish_reading: La cita evoca Génesis 21:10.
  alternative_spanish_readings:
  - La cita alude a Génesis 21:10.
  - La cita repite Génesis 21:10.
  rationale: La frase paulina es una cita/eco reconocible del relato de Agar e Ismael. La nota ayuda a ubicar la procedencia sin introducir contenido adicional en el versículo.
  doctrine_reference: Source alignment / intertextuality policy
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se registraron cambios posteriores; el dictamen de alta concordancia permanece estable.'
  spanish_consistency_notes:
  - Se mantiene «Escritura» como sustantivo reverente y natural para ἡ γραφή.
  - Se usa «esclava» para παιδίσκη, en coherencia con el eje esclavitud/libertad del contexto gálata.
  - Se conserva «libre» como adjetivo sustantivado («de la libre») para reflejar el paralelismo con «la esclava».
  - 'La negación enfática se vierte con una construcción española fuerte pero fluida: «no heredará en absoluto».'
  - Los marcadores de nota se colocan directamente sobre las palabras afectadas y se usan una sola vez cada uno.
