review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: Pablo dice que el relato previo se está usando/interpretando alegóricamente; las dos mujeres corresponden a dos pactos; uno procede del monte Sinaí y produce descendencia para esclavitud; esta figura es Agar. Sin embargo, hay dos puntos mejorables para alinearse mejor con la evidencia y con el uso bíblico en español: «pactos» suena menos establecido que «alianzas» para διαθῆκαι en este contexto paulino, y «que da hijos» atenúa la imagen más concreta de γεννῶσα (“engendrando/dando a luz hijos”).'
  spanish_quality_summary: El español es claro y legible, pero «están siendo interpretadas» resulta algo pesado; en español natural y digno se puede mantener la pasiva de sentido con «se interpretan alegóricamente» sin perder la decisión teológica. Además, «uno, del monte Sinaí» fluye mejor como «una del monte Sinaí» para concordar con «alianza», y «que engendra hijos para esclavitud» preserva mejor la metáfora maternal del original.
  glossary_alignment: La elección «esclavitud» está bien alineada con la preferencia del proyecto por términos fuertes de sujeción. No hay términos del glosario principal en conflicto. Para διαθήκη, aunque «pacto» es posible, «alianza» es la opción bíblica más estándar y transparente en este contexto salvífico-paulino.
  issues:
  - severity: medium
    issue: «pactos» para διαθῆκαι
    rationale: Es defendible, pero en español bíblico contemporáneo «alianzas» suele comunicar mejor el concepto paulino/canónico de διαθήκη y evita un matiz demasiado contractual o moderno de «pacto».
  - severity: medium
    issue: «que da hijos» debilita γεννῶσα
    rationale: El participio mantiene imaginería de maternidad/engendramiento. «Da hijos» suena algo idiomático pero menos preciso que «engendra hijos» o «da a luz hijos».
  - severity: low
    issue: Perífrasis «están siendo interpretadas» algo pesada
    rationale: Aunque gramaticalmente válida, en español natural una construcción con «se interpretan alegóricamente» preserva bien el valor sin sonar forzada.
  revised_spanish_text: 'Estas cosas se interpretan alegóricamente[a], pues estas mujeres son dos alianzas: una, del monte Sinaí, que engendra hijos para esclavitud[b]; ella es Agar.'
  revised_footnotes:
