translation:
  language: es
  text: 'Estas cosas se interpretan alegóricamente[a], pues estas mujeres son dos alianzas: una, del monte Sinaí, que engendra hijos para esclavitud[b]; ella es Agar.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «las cuales cosas se interpretan alegóricamente» o «las cuales cosas son una alegoría». La expresión griega indica que Pablo usa el relato previo de manera alegórica.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «en esclavitud».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἅτινά
  english_pob_choice: These things
  chosen_spanish: Estas cosas
  alternatives_spanish:
  - las cuales
  - que
  lexicon: BDAG
  rationale: El relativo neutro plural remite al relato previo; «Estas cosas» conserva la referencia anafórica de modo natural en español y evita un calco innecesario.
- source_word: ἀλληγορούμενα
  english_pob_choice: are being interpreted allegorically
  chosen_spanish: están siendo interpretadas alegóricamente
  alternatives_spanish:
  - se interpretan alegóricamente
  - son una alegoría
  lexicon: BDAG
  rationale: El participio pasivo presente exige una formulación que exprese uso interpretativo en curso. «Están siendo interpretadas alegóricamente» mantiene la acción retórica sin afirmar que el relato sea alegoría en esencia.
- source_word: αὗται
  english_pob_choice: these women
  chosen_spanish: estas mujeres
  alternatives_spanish:
  - estas
  - estas cosas
  lexicon: BDAG
  rationale: El demostrativo femenino plural apunta a las dos mujeres mencionadas en el contexto; añadir «mujeres» aclara el antecedente de manera idiomática.
- source_word: διαθῆκαι
  english_pob_choice: covenants
  chosen_spanish: pactos
  alternatives_spanish:
  - alianzas
  - testamentos
  - convenios
  lexicon: BDAG
  rationale: En español bíblico, «pacto» comunica bien διαθήκη y evita la ambigüedad moderna de «testamento». Aunque «covenant» suele ser «pacto», aquí el plural y el paralelismo permiten «pactos» como opción natural y fiel.
- source_word: ἀπὸ ὄρους Σινᾶ
  english_pob_choice: from Mount Sinai
  chosen_spanish: del monte Sinaí
  alternatives_spanish:
  - desde el monte Sinaí
  - de Sinaí
  lexicon: BDAG
  rationale: La expresión de origen se vierte con la preposición natural «de/del»; «monte Sinaí» es la forma española estable y clara para el referente geográfico.
- source_word: εἰς δουλείαν
  english_pob_choice: for slavery
  chosen_spanish: para esclavitud
  alternatives_spanish:
  - hacia esclavitud
  - en esclavitud
  - para servidumbre
  lexicon: BDAG
  rationale: Se mantiene la fuerza de δουλεία con «esclavitud», conforme a la preferencia del proyecto por el lenguaje de esclavitud cuando la sujeción es central. «Para» refleja bien la dirección/resultado de εἰς.
- source_word: γεννῶσα
  english_pob_choice: bearing children
  chosen_spanish: que da hijos
  alternatives_spanish:
  - pariendo hijos
  - que engendra hijos
  - dando hijos
  lexicon: BDAG
  rationale: El participio femenino singular describe a la figura-covenio asociada con Agar. «Que da hijos» conserva la imagen materna de manera natural en español y evita una literalidad pesada.
- source_word: ἥτις ἐστὶν Ἁγάρ
  english_pob_choice: she is Hagar
  chosen_spanish: ella es Agar
  alternatives_spanish:
  - la cual es Agar
  - que es Agar
  lexicon: BDAG
  rationale: Con un antecedente femenino singular, el español fluye mejor con «ella es Agar», preservando la identificación alegórica sin volverla impersonal.
theological_decisions:
- issue: Modo en que Pablo usa el relato de Sara y Agar
  english_pob_reading: Paul says the narrative is being spoken/used allegorically, not that the historical persons are unreal or merely symbolic.
  chosen_spanish_reading: Pablo usa el relato de manera alegórica, sin negar su referencia histórica.
  alternative_spanish_readings:
  - Pablo afirma que Sara y Agar no son reales y solo representan ideas
  - Estas cosas son literalmente una alegoría
  rationale: 'La pasiva de ἀλληγορούμενα indica un uso hermenéutico del relato. La traducción conserva esa tensión: hay interpretación alegórica, pero no se borra la historicidad del relato subyacente.'
  doctrine_reference: Preservar la tensión teológica y hermenéutica del texto sin resolverla artificialmente.
- issue: Valor de δουλεία en este contexto
  english_pob_reading: slavery
  chosen_spanish_reading: esclavitud
  alternative_spanish_readings:
  - servidumbre
  - cautiverio
  - bondad
  rationale: El contraste paulino requiere la fuerza semántica de esclavitud; «servidumbre» suaviza demasiado el término y no refleja igual de bien el campo de sujeción que plantea el texto.
  doctrine_reference: 'Terminología de esclavitud/sujeción: usar el término fuerte cuando la condición de dominio es central.'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el último estado revisado del texto base en inglés: se conserva la idea de interpretación alegórica con una pasiva progresiva en español, y se refleja εἰς δουλείαν con una frase final de resultado/dirección («para esclavitud»).'
  spanish_consistency_notes:
  - Se eligió «pactos» para διαθῆκαι en vez de «testamentos», por coherencia con el uso paulino y la terminología bíblica habitual en español.
  - Se mantuvo «Agar» como forma española estándar del nombre propio.
  - Se optó por «esclavitud» para δουλεία conforme al léxico fuerte del contexto y a la política terminológica del proyecto.
  - La pasiva perifrástica «están siendo interpretadas» busca reproducir el valor procesual del participio presente pasivo sin sonar forzada en español.
