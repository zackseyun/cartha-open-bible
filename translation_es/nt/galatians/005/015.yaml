translation:
  language: es
  text: Pero si se muerden y se devoran unos a otros, tengan cuidado[a] no sea que sean consumidos unos por otros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «adviertan, para que no sean consumidos unos por otros».'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰ δὲ
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Si, pero
  - Mas si
  lexicon: BDAG
  rationale: εἰ introduce una condición y δέ agrega un giro adversativo; en español, «Pero si» comunica bien esa transición sin forzar un giro más solemne que el griego.
- source_word: ἀλλήλους
  english_pob_choice: one another
  chosen_spanish: unos a otros
  alternatives_spanish:
  - el uno al otro
  - entre sí
  lexicon: BDAG
  rationale: El pronombre recíproco pide una forma recíproca en español. «Unos a otros» mantiene la mutua referencia comunitaria y suena natural en este contexto exhortativo.
- source_word: δάκνετε
  english_pob_choice: bite
  chosen_spanish: se muerden
  alternatives_spanish:
  - muerden
  - se están mordiendo
  lexicon: BDAG
  rationale: El verbo es literalmente «morder». Se eligió la forma pronominal recíproca «se muerden» para reflejar con claridad la acción mutua de ἀλλήλους en español, sin perder el sentido violento de la imagen.
- source_word: κατεσθίετε
  english_pob_choice: devour
  chosen_spanish: se devoran
  alternatives_spanish:
  - se comen
  - se devoran entre sí
  lexicon: BDAG
  rationale: «Devorar» conserva la intensificación del compuesto griego y mantiene la imagen animalizada. La forma pronominal recíproca ayuda a expresar que la acción es mutua dentro de la comunidad.
- source_word: βλέπετε
  english_pob_choice: watch out
  chosen_spanish: miren
  alternatives_spanish:
  - cuiden
  - estén atentos
  lexicon: BDAG
  rationale: Como imperativo plural, βλέπετε pide vigilancia. En español, «miren» funciona como aviso urgente; la advertencia se completa con la cláusula negativa que sigue.
- source_word: μὴ ὑπ’ ἀλλήλων ἀναλωθῆτε
  english_pob_choice: that you are not consumed by one another
  chosen_spanish: que no sean consumidos unos por otros
  alternatives_spanish:
  - que no se destruyan unos a otros
  - para que no los consuman unos a otros
  lexicon: BDAG
  rationale: El pasivo de ἀναλίσκω se rinde con «sean consumidos», que conserva la idea de destrucción/consumo sin suavizarla. «Unos por otros» refleja la agencia recíproca expresada por ὑπὸ ἀλλήλων.
theological_decisions:
- issue: Imagen de violencia mutua dentro de la comunidad
  english_pob_reading: Retain the animalistic imagery literally ('bite,' 'devour,' 'consumed') rather than softening it to general conflict language.
  chosen_spanish_reading: 'Conservar literalmente la imagen animalizada: «se muerden», «se devoran» y «sean consumidos».'
  alternative_spanish_readings:
  - si siguen dañándose y destruyéndose mutuamente
  - si se atacan y terminan perjudicándose
  rationale: La fuerza retórica de Pablo depende de la metáfora de agresión y destrucción. Suavizarla borraría la advertencia moral y comunitaria que el texto quiere provocar.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: No hubo revisiones aplicadas en el pasaje fuente; el último pase editorial indicó que no eran necesarios cambios y el acuerdo de revisión fue alto.
  spanish_consistency_notes:
  - Se mantiene el pronombre divino fuera de este versículo, por lo que no hay decisión sobre Yahvé en el texto principal.
  - Se preserva la reciprocidad con formas reflexivas en español para no perder el matiz mutuo de ἀλλήλους y ὑπ’ ἀλλήλων.
  - Se conserva la imaginería de violencia verbal sin atenuarla, en continuidad con la decisión inglesa de mantener «bite / devour / consumed».
