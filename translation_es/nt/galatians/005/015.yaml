  source_alignment_summary: El borrador preserva bien la estructura condicional y la imaginería fuerte de δάκνετε / κατεσθίετε / ἀναλωθῆτε. Sin embargo, la combinación «se muerden ... unos a otros» y «se devoran unos a otros» resulta redundante en español, y «miren que no sean consumidos» suena menos natural para una advertencia comunitaria que una formulación tipo «tengan cuidado, no sea que...».
  spanish_quality_summary: El texto es comprensible, pero necesita pulido para sonar natural y digno en español eclesial neutral. «Miren que» es coloquial y algo débil aquí; además, el pie de nota actual no corresponde al anclaje en el texto, porque la variante afecta a la cláusula de advertencia, no a «muerden».
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. Se mantiene correctamente la imaginería literal: «muerden», «devoran», «consumidos».'
  issues:
