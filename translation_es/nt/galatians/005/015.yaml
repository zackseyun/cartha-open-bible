    issue: Redundancia recíproca en «se muerden ... unos a otros» y «se devoran unos a otros».
    rationale: El griego expresa reciprocidad con ἀλλήλους; en español conviene marcarla una sola vez por verbo o con una construcción uniforme. La doble marcación hace la frase pesada.
  - severity: medium
    issue: «Miren que no sean consumidos» no refleja con suficiente naturalidad el valor exhortativo de βλέπετε μή.
    rationale: La advertencia imperativa se expresa mejor con «tengan cuidado, no sea que...» o «cuídense de que no...», más fieles al tono de warning del griego y a la decisión inglesa 'watch out'.
  - severity: high
    issue: La nota al pie está mal anclada.
    rationale: El marcador [a] aparece en «muerden», pero la nota ofrece una alternativa para toda la cláusula de advertencia («adviertan, para que no...»). Debe moverse al segmento pertinente o eliminarse.
