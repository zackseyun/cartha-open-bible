  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Prójimo» es la mejor opción para πλησίον en esta cita. La decisión de mantener «Amarás» respeta el tono escritural. La revisión propuesta no altera ninguna preferencia doctrinal o léxica principal del POB, sino que mejora la naturalidad y la precisión contextual de λόγος y πεπλήρωται.
