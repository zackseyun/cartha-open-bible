    text: Or “in one word.” The Greek says literally “in one word/statement,” meaning in a single saying or command.
    reason: lexical_alternative
  - marker: b
    text: Or “has been fulfilled” or, interpretively, “is summed up.” The Greek verb more literally means “is fulfilled,” which may also imply that the law’s intent reaches its completion in this command.
