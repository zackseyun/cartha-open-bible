translation:
  language: es
  text: 'Porque toda la ley halla su cumplimiento en un solo mandamiento: «Amarás a tu prójimo como a ti mismo».[a][b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en una sola palabra». El griego dice literalmente «en una palabra/expresión», es decir, en un solo dicho o mandamiento.
    reason: lexical_alternative
  - marker: b
    text: O «ha sido cumplida» o, de manera interpretativa, «se resume». El verbo griego significa más literalmente «es cumplida» o «halla su cumplimiento», y también puede implicar que la intención de la ley alcanza su plenitud en este mandamiento.
    reason: alternative_reading
lexical_decisions:
- source_word: ὁ γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque
  lexicon: BDAG
  rationale: γάρ introduce la explicación o fundamento de la afirmación anterior. «Porque» comunica bien esa relación causal/explicativa en español y mantiene el tono natural del argumento.
- source_word: πᾶς νόμος
  english_pob_choice: the whole law
  chosen_spanish: toda la ley
  alternatives_spanish:
  - la ley entera
  - el conjunto de la ley
  lexicon: BDAG
  rationale: Con el artículo y en singular, νόμος se refiere a la ley como un todo. «Toda la ley» preserva el alcance comprehensivo de πᾶς con una formulación idiomática en español.
- source_word: ἐν ἑνὶ λόγῳ
  english_pob_choice: in one statement
  chosen_spanish: en una sola declaración
  alternatives_spanish:
  - en una sola palabra
  - en un solo dicho
  - en una sola sentencia
  lexicon: BDAG
  rationale: λόγος puede significar «palabra», «declaración», «dicho» o «mensaje». Aquí introduce la cita resumida de un mandamiento, por lo que «declaración» transmite bien el sentido sin sugerir erróneamente una sola palabra léxica.
- source_word: πεπλήρωται
  english_pob_choice: is fulfilled
  chosen_spanish: se cumple
  alternatives_spanish:
  - ha sido cumplida
  - está cumplida
  - se ha cumplido
  lexicon: BDAG
  rationale: El perfecto pasivo expresa un estado presente resultante de cumplimiento. «Se cumple» conserva la idea de cumplimiento vigente en español y evita forzar una perífrasis menos natural en este contexto.
- source_word: Ἀγαπήσεις
  english_pob_choice: You shall love
  chosen_spanish: Amarás
  alternatives_spanish:
  - Debes amar
  - Amarás tú
  - Amarás al
  lexicon: BDAG
  rationale: 'La forma futura indicativa cita el mandamiento bíblico, que en español se reproduce naturalmente con futuro de mandato: «Amarás». Mantiene el tono de la cita de Levítico 19:18.'
- source_word: τὸν πλησίον σου
  english_pob_choice: your neighbor
  chosen_spanish: a tu prójimo
  alternatives_spanish:
  - a tu vecino
  - a tu semejante
  - a la persona cercana a ti
  lexicon: BDAG
  rationale: πλησίον en este contexto ético remite al «prójimo». Esa palabra es la más fiel y reconocible para la cita del mandamiento, y conserva su alcance relacional sin estrecharlo a «vecino».
- source_word: ὡς σεαυτόν
  english_pob_choice: as yourself
  chosen_spanish: como a ti mismo
  alternatives_spanish:
  - como tú mismo
  - igual que a ti mismo
  lexicon: BDAG
  rationale: Es la forma estándar y precisa de la comparación en el mandamiento. «Como a ti mismo» es idiomático en español y refleja bien el valor comparativo de ὡς.
theological_decisions:
- issue: Relación entre la ley y el mandamiento del amor
  english_pob_reading: Paul states that the law as a whole finds its fulfillment in the command to love one's neighbor.
  chosen_spanish_reading: Pablo afirma que toda la ley se cumple en el mandamiento de amar al prójimo.
  alternative_spanish_readings:
  - Pablo dice que la ley queda resumida en este mandamiento.
  - Pablo quiere decir que solo la parte ética de la ley está en vista.
  rationale: πληρόω expresa cumplimiento, no solo resumen. «Se cumple» conserva ese peso más fuerte y deja abierta la relación exacta entre cumplimiento y resumen sin añadir una conclusión doctrinal que el griego no formula explícitamente.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: La revisión más reciente no requirió cambios; el acuerdo de revisión fue alto y se mantuvo el enfoque ya validado.
  spanish_consistency_notes:
  - Se preservó el valor de νόμος como «ley» en sentido amplio, sin limitarlo explícitamente a una subsección.
  - Se evitó «Cristo» o terminología no pertinente; no hay sustituciones doctrinales adicionales.
  - «Prójimo» se mantuvo por su correspondencia estable con πλησίον en la cita de Levítico 19:18.
  - El tiempo verbal «se cumple» busca reflejar el perfecto pasivo griego con naturalidad en español, manteniendo el matiz de cumplimiento presente.
