translation:
  language: es
  text: ¡Ojalá[a] hasta se mutilaran[b] los que los están perturbando!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «se cortaran». En este contexto, Pablo probablemente va más allá de la circuncisión y alude con ironía a una mutilación o castración.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «se cortaran». El verbo también puede entenderse más literalmente como «se cortaran», pero en este contexto probablemente implica ir más allá de la circuncisión hacia la automutilación o castración.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὄφελον
  english_pob_choice: I wish
  chosen_spanish: ¡Ojalá!
  alternatives_spanish:
  - Desearía
  - Quisiera
  lexicon: BDAG
  rationale: ὄφελον expresa un deseo fuerte; en español, «¡Ojalá!» comunica de manera natural esa aspiración optativa sin volver el registro forzado o arcaico.
- source_word: καὶ
  english_pob_choice: even
  chosen_spanish: también
  alternatives_spanish:
  - incluso
  - aun
  lexicon: BDAG
  rationale: Aquí καί intensifica la afirmación y la secuencia verbal; «también» conserva la idea de añadidura/escalada sin introducir una especificación interpretativa más fuerte que el griego por sí mismo.
- source_word: ἀποκόψονται
  english_pob_choice: would mutilate themselves
  chosen_spanish: se mutilaran
  alternatives_spanish:
  - se cortaran
  - se castraran
  - se amputaran
  lexicon: BDAG
  rationale: El verbo permite un juego de palabras fuerte con el tema de la circuncisión y apunta a una acción de auto-corte/auto-lesión. «Se mutilaran» mantiene la dureza retórica y evita decidir demasiado estrechamente por «castraran», aunque esa posibilidad queda anotada como alternativa.
- source_word: οἱ ἀναστατοῦντες
  english_pob_choice: those who are upsetting
  chosen_spanish: los que los están inquietando
  alternatives_spanish:
  - los que los están perturbando
  - los que los están causando problemas
  - los que los están trastornando
  lexicon: BDAG
  rationale: El participio describe a quienes están causando agitación o perturbación. «Inquietando» conserva el sentido de desestabilizar/trastornar sin imponer un matiz más técnico de «confusión» que el contexto no exige en español.
- source_word: ὑμᾶς
  english_pob_choice: you
  chosen_spanish: los
  alternatives_spanish:
  - ustedes
  - a ustedes
  lexicon: BDAG
  rationale: El pronombre de objeto plural se integra naturalmente en español mediante clíticos dobles y el contexto ya identifica a los destinatarios; el referente colectivo se mantiene sin redundancia.
theological_decisions:
- issue: Fuerza retórica del dicho de Pablo frente a los promotores de la circuncisión
  english_pob_reading: Paul is using sharp irony/hyperbole to wish that the circumcision advocates would go beyond circumcision and emasculate themselves.
  chosen_spanish_reading: Pablo usa una ironía hiperbólica para desear que quienes promueven la circuncisión vayan más allá del rito y se hagan un daño corporal mayor.
  alternative_spanish_readings:
  - Pablo solo desea que se aparten de la comunidad
  - Pablo expresa un deseo general de destrucción para ellos
  rationale: El contexto inmediato es la controversia sobre la circuncisión en Gálatas 5. La traducción debe conservar el golpe retórico del pasaje y su juego verbal, sin diluirlo en una exclusión genérica ni convertirlo en una maldición indefinida.
  doctrine_reference: Prioridad del sentido original y de la fuerza discursiva del texto sobre el suavizado tradicional.
translation_notes:
  revision_awareness: La revisión inglesa más reciente pasó de «emasculate themselves» a «mutilate themselves» para no especificar demasiado la acción de ἀποκόψονται. La versión española sigue ese ajuste con «se mutilaran», manteniendo la fuerza retórica y dejando abierta la posibilidad de la alusión más precisa en la nota.
  spanish_consistency_notes:
  - Se preserva «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se evita «Cristo»/«Mesías» porque no aparecen en el texto.
  - Se mantiene un registro digno y contemporáneo, con puntuación exclamativa acorde al valor optativo de ὄφελον.
  - La segunda persona plural se expresa de forma implícita en «los» y en el contexto de la carta, sin necesidad de añadir «ustedes» en el cuerpo del texto.
