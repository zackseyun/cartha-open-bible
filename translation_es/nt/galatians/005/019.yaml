translation:
  language: es
  text: 'Ahora son evidentes las obras de la carne[a]: inmoralidad sexual, impureza, sensualidad,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la naturaleza pecaminosa». El griego dice literalmente «la carne» (σάρξ), que Pablo usa aquí en sentido metafórico para la orientación humana caída; se conserva «carne» para no perder esa tensión.
    reason: alternative_reading
lexical_decisions:
- source_word: φανερὰ
  english_pob_choice: evident
  chosen_spanish: evidentes
  alternatives_spanish:
  - obvias
  - manifiestas
  - claras
  lexicon: BDAG
  rationale: El adjetivo indica algo visible o claramente aparente. «Evidentes» suena natural en español moderno y conserva la idea de que las obras pueden reconocerse sin dificultad.
- source_word: δέ
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Pues
  - Y
  - Pero
  lexicon: BDAG
  rationale: Aquí δέ introduce un giro discursivo suave. «Ahora» funciona bien en español para enlazar con lo anterior sin forzar un contraste fuerte.
- source_word: τὰ ἔργα
  english_pob_choice: the works
  chosen_spanish: las obras
  alternatives_spanish:
  - las acciones
  - los hechos
  - las obras
  lexicon: BDAG
  rationale: «Obras» conserva la correspondencia léxica con el contraste paulino inmediato entre «obras de la carne» y el fruto del Espíritu.
- source_word: τῆς σαρκός
  english_pob_choice: of the flesh
  chosen_spanish: de la carne
  alternatives_spanish:
  - de la naturaleza pecaminosa
  - del pecado
  - de la naturaleza humana caída
  lexicon: BDAG
  rationale: Se mantiene «carne» para preservar la metáfora paulina y la tensión teológica del término σάρξ, en vez de reemplazarla por una glosa interpretativa más explícita.
- source_word: ἅτινά ἐστιν
  english_pob_choice: ':'
  chosen_spanish: ':'
  alternatives_spanish:
  - que son
  - a saber
  - las cuales son
  lexicon: BDAG
  rationale: Los dos puntos reproducen de forma natural la función appositiva e introductoria de la lista sin repetir innecesariamente el verbo.
- source_word: πορνεία
  english_pob_choice: sexual immorality
  chosen_spanish: fornicación
  alternatives_spanish:
  - inmoralidad sexual
  - conducta sexual inmoral
  lexicon: BDAG
  rationale: Dado el registro bíblico tradicional y la amplitud semántica del término, «fornicación» mantiene fuerza léxica y es reconocible en contexto eclesial; puede abarcar el campo de conducta sexual ilícita que el griego expresa.
- source_word: ἀκαθαρσία
  english_pob_choice: impurity
  chosen_spanish: impureza
  alternatives_spanish:
  - inmundicia
  - suciedad moral
  lexicon: BDAG
  rationale: «Impureza» es la correspondencia más directa y natural en español para la suciedad moral/ética del término, sin caer en arcaísmo.
- source_word: ἀσέλγεια
  english_pob_choice: sensuality
  chosen_spanish: sensualidad
  alternatives_spanish:
  - desenfreno
  - licencia
  - lascivia
  lexicon: BDAG
  rationale: «Sensualidad» refleja el sentido de conducta desvergonzada o desenfrenada, especialmente en el ámbito sexual, y coincide con la opción inglesa auditada.
theological_decisions:
- issue: Cómo rendir σάρξ en un contexto ético paulino
  english_pob_reading: flesh
  chosen_spanish_reading: carne
  alternative_spanish_readings:
  - naturaleza pecaminosa
  - naturaleza humana caída
  rationale: La decisión conserva la metáfora paulina de «carne» para no diluir el término en una explicación interpretativa. Esto respeta la tensión teológica documentada por la POB inglesa y mantiene la conexión con el contraste carne/Espíritu del capítulo.
  doctrine_reference: 'DOCTRINE.md: contested terms table for σάρξ; Translation philosophy #3'
- issue: Matiz del listado vicioso como ejemplo representativo
  english_pob_reading: sexual immorality, impurity, sensuality
  chosen_spanish_reading: fornicación, impureza, sensualidad
  alternative_spanish_readings:
  - inmoralidad sexual, impureza, desenfreno
  - fornicación, inmundicia, lascivia
  rationale: El griego presenta una lista representativa de prácticas. La serie elegida mantiene el registro bíblico, la claridad para lectura pública y la amplitud semántica sin añadir o restringir indebidamente el alcance del original.
  doctrine_reference: BDAG; contexto inmediato de Gálatas 5:19-21
translation_notes:
  revision_awareness: Coincide con el audit trail inglés de alta concordancia; no se detectan revisiones aplicadas posteriores. Se preserva la decisión clave sobre σάρξ como «carne», y se adapta el inicio con una transición natural en español.
  spanish_consistency_notes:
  - Se mantiene el término técnico paulino «carne» en lugar de una glosa interpretativa, en continuidad con otros pasajes del mismo marco conceptual.
  - «Impureza» y «sensualidad» siguen de cerca las opciones auditadas en inglés, con equivalentes naturales en español.
  - La puntuación con dos puntos reproduce la función de lista del original griego y del texto inglés auditado.
