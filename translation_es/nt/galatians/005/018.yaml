translation:
  language: es
  text: Pero si son guiados por el Espíritu[a][b], no están bajo la ley.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «si están siendo guiados por el Espíritu».'
    reason: lexical_alternative
  - marker: b
    text: «Bajo la ley» se refiere a estar bajo la autoridad o jurisdicción de la ley; compárese Gálatas 5:23.
    reason: cross_reference
lexical_decisions:
- source_word: εἰ
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - si es que
  - en caso de que
  lexicon: BDAG
  rationale: Introduce una cláusula condicional directa; en español, «si» comunica con naturalidad la condición del griego sin añadir matices innecesarios.
- source_word: δὲ
  english_pob_choice: but
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: «Pero» conserva el contraste leve con el contexto inmediato de la carne y el Espíritu, y suena natural al inicio de la oración en español.
- source_word: πνεύματι
  english_pob_choice: the Spirit
  chosen_spanish: el Espíritu
  alternatives_spanish:
  - espíritu
  - el Espíritu Santo
  lexicon: BDAG
  rationale: En el contexto de Gálatas 5:16–25, el referente es el Espíritu divino; en español conviene explicitar el artículo y usar mayúscula por referencia personal y teológica.
- source_word: ἄγεσθε
  english_pob_choice: are led
  chosen_spanish: son guiados
  alternatives_spanish:
  - están siendo guiados
  - son conducidos
  lexicon: BDAG
  rationale: El pasivo presente admite una lectura continua; «son guiados» mantiene la voz pasiva y suena más natural en español que una traducción demasiado mecánica.
- source_word: ὑπὸ νόμον
  english_pob_choice: under the law
  chosen_spanish: bajo la ley
  alternatives_spanish:
  - bajo la Ley
  - sujetos a la ley
  - bajo la autoridad de la ley
  lexicon: BDAG
  rationale: La expresión paulina indica estar bajo el régimen o jurisdicción de la ley mosaica; «bajo la ley» conserva la forma idiomática y permite que la nota explique la fuerza jurídica del giro.
theological_decisions:
- issue: Referencia de πνεύματι
  english_pob_reading: the Holy Spirit
  chosen_spanish_reading: el Espíritu
  alternative_spanish_readings:
  - el Espíritu Santo
  - espíritu
  rationale: El contraste en el pasaje es entre carne y Espíritu; traducir «el Espíritu» preserva el sentido teológico sin sobreexplicar. La mayúscula ayuda a evitar ambigüedad con un espíritu humano.
  doctrine_reference: Gal 5:16–25; filosofía de traducción §1, §3
- issue: Sentido de ὑπὸ νόμον
  english_pob_reading: not under the law
  chosen_spanish_reading: no están bajo la ley
  alternative_spanish_readings:
  - no están sujetos a la ley
  - no están bajo la jurisdicción de la ley
  rationale: La frase no describe una simple ausencia de norma, sino la condición de estar bajo el dominio/jurisdicción de la ley en el argumento de Pablo. «Bajo la ley» conserva el idioma paulino y la nota puede aclarar su alcance.
  doctrine_reference: Gálatas 5:18; filosofía de traducción §3, §5
translation_notes:
  revision_awareness: 'El borrador sigue el texto griego SBLGNT y se alinea con el registro inglés POB de alta concordancia: mantiene la condición con εἰ, el contraste de δὲ, el referente pneumatológico de πνεύματι como el Espíritu, el pasivo presente de ἄγεσθε con una alternativa aspectual en nota, y la expresión paulina ὑπὸ νόμον como un giro de jurisdicción legal. No se detectaron revisiones textuales pendientes en el audit trail.'
  spanish_consistency_notes:
  - Se usa «Espíritu» con mayúscula por referencia al Espíritu divino en el contexto inmediato.
  - Se conserva «ley» en singular para reflejar el sintagma paulino ὑπὸ νόμον y evitar una expansión interpretativa.
  - La formulación «son guiados» mantiene la voz pasiva del griego sin forzar una perífrasis demasiado literal.
  - El orden oración-inicial «Pero si...» reproduce la relación adversativa-condicional del original con naturalidad en español.
