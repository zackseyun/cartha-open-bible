translation:
  language: es
  text: Tengo confianza en el Señor respecto de ustedes[a], en que no pensarán otra cosa; pero el que los perturba llevará el juicio, quienquiera que sea.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no adoptarán otra opinión». El verbo griego puede referirse no solo a pensar en general, sino a mantener una postura o juicio determinado.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «sea quien sea» o «no importa quién sea». La construcción griega expresa que la identidad del perturbador no altera el hecho de que cargará con el juicio.'
    reason: alternative_reading
lexical_decisions:
- source_word: πέποιθα
  english_pob_choice: I am confident
  chosen_spanish: confío
  alternatives_spanish:
  - tengo confianza
  - estoy confiado
  lexicon: BDAG
  rationale: El perfecto de πείθω expresa un estado firme de confianza. En español, «confío» comunica con naturalidad esa confianza estable sin volver la frase pesada o artificial.
- source_word: εἰς ὑμᾶς
  english_pob_choice: about you
  chosen_spanish: en ustedes
  alternatives_spanish:
  - acerca de ustedes
  - con respecto a ustedes
  lexicon: BDAG
  rationale: Con πέποιθα, εἰς puede expresar la dirección de la confianza hacia las personas. «En ustedes» preserva la cercanía de la construcción y funciona bien en español; no se optó por una paráfrasis más explicativa para no sobreinterpretar.
- source_word: ἐν κυρίῳ
  english_pob_choice: in the Lord
  chosen_spanish: en el Señor
  alternatives_spanish:
  - por el Señor
  - por medio del Señor
  lexicon: BDAG
  rationale: La locución paulina se conserva de manera directa. «El Señor» respeta la equivalencia habitual de κύριος en este contexto y mantiene la base teológica de la confianza.
- source_word: οὐδὲν ἄλλο φρονήσετε
  english_pob_choice: you will think nothing else
  chosen_spanish: no pensarán nada diferente
  alternatives_spanish:
  - no adoptarán otra opinión
  - no tendrán otro parecer
  lexicon: BDAG
  rationale: φρονέω aquí puede referirse al modo de pensar o a la postura mental. La forma elegida conserva la idea de mente/opinión sin forzar un giro doctrinal más interpretativo en el texto principal.
- source_word: ταράσσων
  english_pob_choice: is troubling
  chosen_spanish: perturba
  alternatives_spanish:
  - inquieta
  - altera
  lexicon: BDAG
  rationale: El participio presente destaca una acción en curso. «Perturba» transmite agitación real y encaja bien con el efecto comunitario que el texto describe.
- source_word: βαστάσει
  english_pob_choice: will bear
  chosen_spanish: llevará
  alternatives_spanish:
  - soportará
  - cargará con
  lexicon: BDAG
  rationale: βαστάζω conserva la imagen de llevar/cargar. «Llevará» permite mantener esa metáfora sin precisar indebidamente si se trata de castigo, culpa o sentencia.
- source_word: τὸ κρίμα
  english_pob_choice: the judgment
  chosen_spanish: su juicio
  alternatives_spanish:
  - el juicio
  - la sentencia
  lexicon: BDAG
  rationale: κρίμα puede abarcar juicio, veredicto o sentencia resultante. Se prefirió «su juicio» para hacer explícita la relación con el perturbador y evitar importar la idea de condenación eterna que el versículo no especifica.
- source_word: ὅστις ἐὰν ᾖ
  english_pob_choice: whoever he may be
  chosen_spanish: quienquiera que sea
  alternatives_spanish:
  - sea quien sea
  - no importa quién sea
  lexicon: BDAG
  rationale: La construcción indefinida expresa irrelevancia de la identidad del perturbador. «Quienquiera que sea» mantiene ese valor concesivo-indefinido con buen tono literario en español.
theological_decisions:
- issue: Alcance de la confianza de Pablo hacia los gálatas
  english_pob_reading: Paul expresses confidence regarding their future mindset, grounded in the Lord, without guaranteeing an unconditional outcome.
  chosen_spanish_reading: Pablo expresa una confianza real, fundada en el Señor, respecto de la respuesta futura de los gálatas, sin convertirla en una garantía absoluta desligada de su exhortación.
  alternative_spanish_readings:
  - Pablo garantiza infaliblemente la perseverancia de todos
  - Pablo solo expresa optimismo humano
  rationale: La frase combina confianza personal y fundamento en el Señor con una expectativa futura. La redacción española conserva esa tensión sin resolverla en determinismo ni en mera cortesía.
  doctrine_reference: Preservar la tensión teológica del texto sin sobreafirmarla.
- issue: Sentido de τὸ κρίμα
  english_pob_reading: A general statement of divine/judicial judgment on the troubler, without specifying eternal condemnation.
  chosen_spanish_reading: Una advertencia general de juicio sobre el perturbador, sin especificar si se trata de condenación eterna, sentencia comunitaria u otra forma concreta de juicio.
  alternative_spanish_readings:
  - condenación eterna
  - solo disciplina eclesial o consecuencias sociales
  rationale: κρίμα es más amplio que «condenación». «Su juicio» mantiene el peso de la advertencia y deja abierta la forma concreta del juicio, conforme al alcance del griego.
  doctrine_reference: No introducir más contenido doctrinal del que el versículo declara.
translation_notes:
  revision_awareness: 'Se tomó como base el texto griego SBLGNT y el audito inglés POB, atendiendo la revisión que ajustó el orden natural de «in the Lord about you». En español se mantuvo ese orden semántico: confianza fundada en el Señor y dirigida a los gálatas. También se conservó la tensión lexical de φρονέω («pensar / adoptar postura») y de κρίμα («juicio» sin especificar condenación).'
  spanish_consistency_notes:
  - Se usó «Señor» para κύριος en la locución paulina ἐν κυρίῳ, de acuerdo con la convención del proyecto y el contexto cristológico.
  - Se optó por «perturba» para el participio presente ταράσσων por su fuerza y naturalidad en español.
  - Se evitó «condenación» en κρίμα para no cerrar una ambigüedad que el texto no resuelve.
  - Se eligió «quienquiera que sea» para reflejar la indefinitud de ὅστις ἐὰν ᾖ sin añadir explicación doctrinal en el cuerpo del verso.
