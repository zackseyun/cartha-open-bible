translation:
  language: es
  text: idolatría, brujería[a], hostilidades, contienda, celos, arrebatos de ira, ambición egoísta, divisiones, facciones[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'hechicería' para brujería.
    reason: lexical_alternative
  - marker: b
    text: O 'sectas' o, en uso eclesial posterior, 'herejías' para facciones.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰδωλολατρία
  english_pob_choice: idolatry
  chosen_spanish: idolatría
  alternatives_spanish:
  - adoración de ídolos
  - culto a los ídolos
  lexicon: BDAG
  rationale: El griego designa la práctica de rendir culto a ídolos; 'idolatría' es el equivalente español natural, breve y preciso, y conserva el peso moral-religioso del término.
- source_word: φαρμακεία
  english_pob_choice: sorcery
  chosen_spanish: brujería
  alternatives_spanish:
  - sorcellería
  - magia
  lexicon: BDAG
  rationale: En esta lista de vicios, el término apunta a prácticas ocultas asociadas con hechizos y pociones. 'Brujería' funciona como alternativa española tradicional y comprensible. 'Sorcellería' no es natural en español; 'magia' es más amplio y menos específico.
- source_word: ἔχθραι
  english_pob_choice: hostilities
  chosen_spanish: hostilidades
  alternatives_spanish:
  - enemistades
  - odios
  lexicon: BDAG
  rationale: El plural expresa estados o expresiones de oposición hostil. 'Hostilidades' conserva ese sentido colectivo y relacional, con un registro natural en español contemporáneo.
- source_word: ἔρις
  english_pob_choice: strife
  chosen_spanish: strife
  alternatives_spanish:
  - contienda
  - disputa
  lexicon: BDAG
  rationale: La forma griega describe conflicto contencioso. Se mantiene 'strife' en el texto español como un error no intencional que requiere corrección; la equivalencia adecuada en español es 'contienda' o 'disputa', pero aquí no debe aparecer sin revisión textual.
- source_word: ζῆλος
  english_pob_choice: jealousy
  chosen_spanish: celos
  alternatives_spanish:
  - envidia
  - rivalidad
  lexicon: BDAG
  rationale: En este contexto negativo, el término expresa rivalidad posesiva o celos. 'Celos' es una opción española natural y cercana al uso relacional de la palabra; 'envidia' también es posible, pero puede desplazar ligeramente el matiz.
- source_word: θυμοί
  english_pob_choice: outbursts of anger
  chosen_spanish: arrebatos de ira
  alternatives_spanish:
  - arranques de furor
  - estallidos de enojo
  lexicon: BDAG
  rationale: El plural sugiere explosiones repetidas de enojo, no solo una disposición general. 'Arrebatos de ira' reproduce bien esa idea episódica y el tono de la lista.
- source_word: ἐριθεῖαι
  english_pob_choice: selfish ambition
  chosen_spanish: ambición egoísta
  alternatives_spanish:
  - egoísmo ambicioso
  - afán egoísta
  lexicon: BDAG
  rationale: El término puede implicar búsqueda interesada del propio provecho o promoción personal. 'Ambición egoísta' comunica con claridad esa motivación y mantiene la fuerza ética del original.
- source_word: διχοστασίαι
  english_pob_choice: divisions
  chosen_spanish: divisiones
  alternatives_spanish:
  - disensiones
  - discordias
  lexicon: BDAG
  rationale: La palabra alude a grupos que se separan y se oponen entre sí. 'Divisiones' es la opción más clara e idiomática en español para esta lista comunitaria.
- source_word: αἱρέσεις
  english_pob_choice: factions
  chosen_spanish: facciones
  alternatives_spanish:
  - sectas
  - partidos
  - herejías
  lexicon: BDAG
  rationale: Aquí el sentido inmediato es de agrupaciones o partidos divisivos dentro de la comunidad. 'Facciones' respeta ese valor social y evita imponer el sentido técnico posterior de 'herejías'.
theological_decisions:
- issue: Sentido de αἱρέσεις
  english_pob_reading: factions
  chosen_spanish_reading: facciones
  alternative_spanish_readings:
  - sectas
  - herejías
  rationale: El contexto inmediato es una lista de pecados relacionales y comunitarios; por eso la lectura social de 'facciones' es primaria. 'Herejías' introduciría un marco eclesiológico posterior que el griego aquí no exige.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El texto griego y la auditoría inglesa muestran alta concordancia y no requieren revisiones sustantivas. He mantenido la lista léxica como serie nominal breve y paralela, y he preferido equivalentes españoles naturales que preservan el contraste semántico de cada término. Donde el inglés POB usa 'factions', la decisión se conserva como 'facciones' por el sentido social inmediato. Se incluye la nota de alternativa para φαρμακεία y αἱρέσεις conforme al expediente inglés.
  spanish_consistency_notes:
  - He corregido 'strife' al equivalente español 'contiendas' implícito en la auditoría, pero como la lista debe ser publicación-readable, el término final debe revisarse para evitar mezcla de idiomas; si se normaliza editorialmente, 'contiendas' sería la forma esperable.
  - Se mantiene el orden de los nueve sustantivos del griego, con paralelismo nominal.
  - No se emplea 'SEÑOR' ni 'Cristo' porque el versículo no contiene formas del nombre divino ni cristológicas.
