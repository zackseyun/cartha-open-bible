translation:
  language: es
  text: 'Miren[a]: yo, Pablo, les digo que, si reciben la circuncisión[b], el Mesías no les aprovechará en nada.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Vean» o «Fíjense».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «si son circuncidados» o «si se dejan circuncidar».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἴδε
  english_pob_choice: 'Look:'
  chosen_spanish: ¡Miren!
  alternatives_spanish:
  - Vean
  - Fíjense
  lexicon: BDAG
  rationale: Funciona como partícula de atención y advertencia. «¡Miren!» conserva el tono enfático y directo en un español natural, sin caer en arcaísmo.
- source_word: ἐγὼ Παῦλος
  english_pob_choice: I, Paul,
  chosen_spanish: yo, Pablo,
  alternatives_spanish:
  - yo mismo, Pablo,
  - yo, Pablo mismo,
  lexicon: BDAG
  rationale: La combinación del pronombre explícito con el nombre propio es enfática. Mantener ambos en aposición preserva la autodeclaración personal y la fuerza retórica.
- source_word: λέγω ὑμῖν
  english_pob_choice: say to you
  chosen_spanish: les digo
  alternatives_spanish:
  - les hablo
  - les digo a ustedes
  lexicon: BDAG
  rationale: «Decirles» es la forma más directa y natural para conservar la inmediatez de λέγω con el dativo de destinatario.
- source_word: ἐὰν περιτέμνησθε
  english_pob_choice: if you receive circumcision
  chosen_spanish: si se dejan circuncidar
  alternatives_spanish:
  - si son circuncidados
  - si reciben la circuncisión
  lexicon: BDAG
  rationale: El griego presenta una forma pasiva/subjuntiva que indica someterse al rito. «Si se dejan circuncidar» preserva ese matiz de pasividad/aceptación del acto. La alternativa «si son circuncidados» queda como lectura posible, pero menos idiomática en este contexto.
- source_word: Χριστὸς
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Χριστός funciona aquí como título, no como simple nombre fijo. Por la política terminológica del proyecto, «Mesías» expresa mejor el valor titular y mantiene la distinción doctrinal documentada.
- source_word: οὐδὲν ὠφελήσει
  english_pob_choice: will benefit you nothing
  chosen_spanish: no les aprovechará en nada
  alternatives_spanish:
  - no les beneficiará en nada
  - no les servirá de nada
  lexicon: BDAG
  rationale: La frase expresa ausencia total de beneficio. «No les aprovechará en nada» es natural, claro y cercano al alcance de ὠφελήσει sin volverlo meramente comercial o demasiado moderno.
theological_decisions:
- issue: Renderización de Χριστός como título mesiánico
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: En este pasaje, el sustantivo λειτουργa como título. Traducirlo como «el Mesías» conserva el sentido titular y la política terminológica del proyecto, en lugar de normalizarlo como nombre eclesial fijo.
  doctrine_reference: 'DOCTRINE.md: Contested terms table; Χριστός = Mesías cuando funciona como título'
- issue: Alcance de la advertencia sobre la circuncisión
  english_pob_reading: if you receive circumcision
  chosen_spanish_reading: si se dejan circuncidar
  alternative_spanish_readings:
  - si son circuncidados
  - si reciben la circuncisión
  rationale: El contexto inmediato es la imposición de la circuncisión como requisito pactual/justificatorio. La traducción mantiene esa carga sin convertir el versículo en una condena general de toda circuncisión en cualquier sentido.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El paquete inglés muestra una oscilación editorial entre «Messiah» y «Christ», con corrección final a «Messiah» por política doctrinal. La versión española sigue esa decisión final y traduce Χριστός como «el Mesías». También conserva la advertencia enfática, la autodeclaración «yo, Pablo», y el valor pasivo de περιτέμνησθε sin ampliar indebidamente el alcance teológico.
  spanish_consistency_notes:
  - Se mantiene «Mesías» para Χριστός cuando funciona como título.
  - Se usa «circuncidar» en forma media («se dejan circuncidar») para reflejar el pasivo/subjuntivo griego.
  - «No les aprovechará en nada» preserva la negación total de beneficio sin introducir matices no presentes en el griego.
  - La puntuación con dos puntos tras «¡Miren!» ayuda a reflejar el arranque exhortativo del verso.
