revisions:
- from: '¡Miren[a]: yo, Pablo, les digo que, si se dejan circuncidar[b], el Mesías no les aprovechará en nada.'
  to: 'Miren[a]: yo, Pablo, les digo que, si reciben la circuncisión[b], el Mesías no les aprovechará en nada.'
  rationale: Se ajusta Ἴδε a «Miren[a]:» con puntuación más natural para español y mejor colocación de la nota. Se cambia «si se dejan circuncidar» por «si reciben la circuncisión[b]» para alinearse más estrechamente con la decisión lexical auditada del POB, preservando el sentido pasivo de περιτέμνησθε sin añadir un matiz más fuerte de iniciativa personal. Se conserva «el Mesías» y «no les aprovechará en nada» por fidelidad al source y al rationale documentado.
