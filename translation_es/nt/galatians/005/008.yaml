lexical_decisions:
- source_word: πεισμονὴ
  english_pob_choice: persuasion
  chosen_spanish: persuasión
  alternatives_spanish:
  - influencia
  - persuasividad
  - ser persuadidos
  lexicon: BDAG
  rationale: πεισμονή es un sustantivo raro que puede referirse a la persuasión o al estado/efecto de haber sido convencido. En español, «persuasión» conserva ese valor abstracto y el campo semántico del sustantivo sin convertirlo en una paráfrasis más libre.
- source_word: ἐκ
  english_pob_choice: from
  chosen_spanish: no procede de
  alternatives_spanish:
  - viene de
  - surge de
  - proviene de
  lexicon: BDAG
  rationale: ἐκ expresa origen o procedencia. «No procede de» comunica con naturalidad en español la idea de origen y mantiene la negación del origen de esta persuasión.
- source_word: τοῦ καλοῦντος ὑμᾶς
  english_pob_choice: the one who calls you
  chosen_spanish: quien los llama
  alternatives_spanish:
  - el que los llama
  - quien les llama
  - el que los está llamando
  lexicon: BDAG
  rationale: El participio presente sustantivado καλοῦντος conserva una acción en curso. «Quien los llama» mantiene ese valor verbal y suena natural en español. Se usa «los» como forma de tratamiento neutral/publicable para una pluralidad no especificada en el contexto de la cita.
- source_word: οὐκ
  english_pob_choice: not
  chosen_spanish: 'no'
  alternatives_spanish:
  - no es
  - nada
  lexicon: BDAG
  rationale: Negación directa y sencilla, necesaria para preservar el contraste del versículo.
theological_decisions:
- issue: Identidad implícita de quien llama
  english_pob_reading: Rendered generically as 'the one who calls you' without explicitly supplying 'God' in the main text.
  chosen_spanish_reading: Se mantiene la referencia implícita como «quien los llama», sin añadir «Dios» en el texto principal.
  alternative_spanish_readings:
  - «Dios, quien los llama» como expansión interpretativa
  - «el Dios que los llama»
  rationale: El contexto paulino sugiere a Dios, pero el griego usa una expresión participial y no el sustantivo explícito «Dios». Para no resolver en la traducción una identificación que el texto deja implícita, se conserva la formulación abierta.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.'
translation_notes:
  revision_awareness: El pasaje coincide plenamente con el texto fuente y el control cruzado; no se requieren revisiones adicionales respecto del borrador inglés auditado.
  spanish_consistency_notes:
  - Se mantiene el término abstracto «persuasión» para πεισμονή, en línea con la decisión inglesa.
  - La elección «no procede de» preserva el origen indicado por ἐκ sin introducir explicaciones.
  - Se evita explicitar «Dios» en el cuerpo del verso para respetar la forma participial del original.
  - La nota al pie conserva la alternativa léxica documentada en el audit trail inglés mediante «influencia».
