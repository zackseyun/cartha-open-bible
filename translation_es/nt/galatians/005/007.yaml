translation:
  language: es
  text: Corrían bien[a]. ¿Quién les impidió obedecer a la verdad?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Quién les impidió ser persuadidos por la verdad?» El verbo griego puede significar «obedecer» o «ser persuadido».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐτρέχετε
  english_pob_choice: You were running
  chosen_spanish: Corrían
  alternatives_spanish:
  - Ustedes corrían
  - Iban corriendo
  lexicon: BDAG
  rationale: El imperfecto griego expresa una acción pasada en curso; en español, "corrían" conserva la metáfora atlética sin añadir elementos no explícitos como "la carrera".
- source_word: καλῶς
  english_pob_choice: well
  chosen_spanish: bien
  alternatives_spanish:
  - de buena manera
  - correctamente
  lexicon: BDAG
  rationale: '"Bien" es el equivalente natural y conciso en español para modificar el verbo de movimiento y mantener el sentido de progreso adecuado.'
- source_word: τίς
  english_pob_choice: Who
  chosen_spanish: ¿Quién
  alternatives_spanish:
  - ¿Qué persona
  lexicon: BDAG
  rationale: El pronombre interrogativo es personal y señala al agente que produjo el impedimento.
- source_word: ἐνέκοψεν
  english_pob_choice: hindered
  chosen_spanish: estorbó
  alternatives_spanish:
  - obstaculizó
  - impidió
  - detuvo
  lexicon: BDAG
  rationale: El verbo griego puede sugerir la idea de cortar el paso o impedir el avance. "Estorbó" comunica esa acción de obstaculizar de forma clara y natural en español, manteniendo la imagen de avance interrumpido.
- source_word: τῇ ἀληθείᾳ
  english_pob_choice: the truth
  chosen_spanish: la verdad
  alternatives_spanish:
  - verdad
  lexicon: BDAG
  rationale: El dativo con el infinitivo se entiende con πείθεσθαι en relación con la verdad recibida; "la verdad" refleja de manera natural el artículo griego y preserva la referencia concreta al evangelio verdadero.
- source_word: μὴ πείθεσθαι
  english_pob_choice: from obeying / from being persuaded by
  chosen_spanish: para no obedecer
  alternatives_spanish:
  - para no ser persuadidos
  - para no dejarse persuadir
  lexicon: BDAG
  rationale: En este contexto, πείθω en forma media/pasiva puede significar "obedecer" o "ser persuadido". Se elige "obedecer" como sentido principal por el marco exhortativo de Gálatas, sin excluir la alternativa semántica en la nota.
theological_decisions:
- issue: Sentido de πείθεσθαι con τῇ ἀληθείᾳ
  english_pob_reading: obeying the truth
  chosen_spanish_reading: obedecer a la verdad
  alternative_spanish_readings:
  - ser persuadidos por la verdad
  - dejarse persuadir por la verdad
  rationale: El contexto inmediato trata de la respuesta práctica de los gálatas al evangelio. "Obedecer" conserva la dimensión ética de la respuesta a la verdad, mientras que la alternativa relacionada con la persuasión se mantiene para respetar la tensión léxica del verbo griego.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se registraron cambios posteriores en el pasaje y el texto se mantiene en alto acuerdo con la auditoría inglesa.'
  spanish_consistency_notes:
  - Se mantiene el registro bíblico claro y contemporáneo, evitando calcos innecesarios.
  - '"La verdad" conserva el artículo griego sin convertir la frase en una abstracción genérica.'
  - '"Obedecer" se usa como elección principal, pero la nota preserva la alternativa semántica de "ser persuadidos".'
  - Se evita añadir "la carrera" porque no aparece explícitamente en el griego, aunque la metáfora atlética permanece implícita.
