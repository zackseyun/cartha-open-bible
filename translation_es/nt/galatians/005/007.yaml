- from: Corrían bien[a]. ¿Quién los estorbó para no obedecer a la verdad?
  to: Corrían bien[a]. ¿Quién les impidió obedecer a la verdad?
  rationale: Se reemplaza «los estorbó para no obedecer» por «les impidió obedecer» porque expresa el mismo sentido de ἐνέκοψεν… μὴ πείθεσθαι de manera más natural y clara en español neutral. Se conserva la metáfora de progreso con «Corrían bien» y la tensión léxica de πείθεσθαι en la nota, ahora formulada con sintaxis española más fluida.
