    issue: «no satisfarán» para οὐ μὴ τελέσητε
    rationale: τελέω aquí no es principalmente «satisfacer» un deseo, sino «llevarlo a cabo / cumplirlo / realizarlo». La versión actual puede sugerir que el deseo sigue presente pero no queda saciado, en vez de enfatizar que no será ejecutado.
  - severity: low
    issue: «anden por el Espíritu» puede sonar algo poco idiomático
    rationale: Aunque es comprensible y defendible como calco moderado de «walk by the Spirit», en español bíblico más natural suelen oírse «anden según el Espíritu» o «caminen por el Espíritu». No es error grave, pero la combinación con «anden» mejora si se cambia a «según».
