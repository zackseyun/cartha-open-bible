translation:
  language: es
  text: 'Pero yo digo: anden según el Espíritu, y de ninguna manera llevarán a cabo el deseo de la carne[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la naturaleza pecaminosa». El griego dice «carne», término que en Pablo puede denotar la naturaleza humana caída en oposición al Espíritu.'
    reason: alternative_reading
lexical_decisions:
- source_word: Λέγω δέ
  english_pob_choice: But I say
  chosen_spanish: Pero yo digo
  alternatives_spanish:
  - Ahora digo
  - Y yo digo
  lexicon: BDAG
  rationale: δέ introduce una transición con matiz adversativo suave; «Pero yo digo» conserva el giro retórico de Pablo y suena natural en español.
- source_word: πνεύματι
  english_pob_choice: by the Spirit
  chosen_spanish: por el Espíritu
  alternatives_spanish:
  - en el Espíritu
  - guiados por el Espíritu
  lexicon: BDAG
  rationale: El dativo se entiende mejor de manera instrumental o de esfera junto con περιπατεῖτε. En este contexto, el referente es el Espíritu Santo; «por el Espíritu» mantiene esa referencia y funciona bien en español.
- source_word: περιπατεῖτε
  english_pob_choice: walk
  chosen_spanish: anden
  alternatives_spanish:
  - caminen
  - vivan
  - conducirse
  lexicon: BDAG
  rationale: En español, el imperativo «anden» preserva la metáfora de caminar y expresa un estilo de vida continuo sin volverlo demasiado explicativo.
- source_word: ἐπιθυμίαν
  english_pob_choice: the desire
  chosen_spanish: el deseo
  alternatives_spanish:
  - el anhelo
  - la codicia
  - la concupiscencia
  lexicon: BDAG
  rationale: Aquí ἐπιθυμία es negativa por su relación con «de la carne», pero «deseo» conserva el término amplio sin cargarlo de una interpretación más estrecha que el griego.
- source_word: σαρκὸς
  english_pob_choice: the flesh
  chosen_spanish: la carne
  alternatives_spanish:
  - la naturaleza pecaminosa
  - la naturaleza humana caída
  lexicon: BDAG
  rationale: Se mantiene el vocabulario paulino de σάρξ como «carne», porque preservar el término ayuda a no resolver de antemano la tensión teológica y sigue de cerca la terminología original.
- source_word: οὐ μὴ τελέσητε
  english_pob_choice: you will certainly not carry out
  chosen_spanish: no satisfarán
  alternatives_spanish:
  - no cumplirán
  - no llevarán a cabo
  - de ninguna manera realizarán
  lexicon: BDAG
  rationale: La negación enfática οὐ μή con subjuntivo aoristo comunica certeza fuerte. «No satisfarán» transmite de forma natural la idea de llegar a realizar el deseo; es menos literal que «llevarán a cabo», pero sigue bien el sentido del contexto moral.
theological_decisions:
- issue: Referente de πνεύματι
  english_pob_reading: Holy Spirit
  chosen_spanish_reading: el Espíritu Santo
  alternative_spanish_readings:
  - el espíritu humano
  - un principio espiritual general
  rationale: En Gálatas 5 el contraste con la carne apunta claramente al Espíritu Santo. Capitalizar «Espíritu» en el texto refleja esa decisión contextual sin añadir contenido ajeno al pasaje.
  doctrine_reference: Translation philosophy §3; preservar la tensión teológica sin resolverla más allá del contexto.
- issue: Sentido de σάρξ
  english_pob_reading: the flesh
  chosen_spanish_reading: la carne
  alternative_spanish_readings:
  - la naturaleza pecaminosa
  - la naturaleza humana caída
  rationale: Se conserva «la carne» en el texto principal para mantener la categoría paulina. Las opciones interpretativas se reservan como alternativas, pero no se sustituyen en el cuerpo del versículo.
  doctrine_reference: 'Contested terms table: σάρξ'
translation_notes:
  revision_awareness: Coincide con el pasaje base sin revisiones posteriores reportadas; se mantiene la lectura del audit trail inglés sin cambios de sentido relevantes.
  spanish_consistency_notes:
  - Se conserva el paralelismo entre Espíritu y carne con mayúsculas solo en «Espíritu» cuando el referente es el Espíritu Santo.
  - El imperativo plural «anden» refleja el llamado comunitario y el carácter continuo de περιπατεῖτε.
  - Se evita sustituir «carne» por una glosa doctrinal en el texto principal para preservar la tensión léxica documentada.
