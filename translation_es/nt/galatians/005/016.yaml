  source_alignment_summary: 'El borrador capta bien el sentido general del griego: mantiene el contraste retórico de Λέγω δέ, interpreta πνεύματι como referencia al Espíritu, conserva la metáfora de περιπατεῖτε, y preserva «la carne» con nota alternativa. Sin embargo, «no satisfarán el deseo» no refleja con suficiente precisión τελέσητε, que aquí significa realizar, llevar a cabo, consumar. «Satisfacer» desplaza el sentido hacia saciar un deseo más que ejecutarlo.'
  spanish_quality_summary: El español es claro y eclesialmente legible. No obstante, «anden por el Espíritu» suena menos natural que «anden según el Espíritu» o «caminen por el Espíritu» en este contexto paulino; aun así, puede tolerarse. La reparación principal necesaria está en el verbo final para alinear mejor sentido y claridad. También conviene mantener la nota al pie anclada en «carne» como en el borrador.
  glossary_alignment: 'Se alinea bien con la terminología del proyecto: «Espíritu» capitalizado para πνεύματι en contexto del Espíritu Santo, «la carne» para σάρξ en el texto principal, y alternativa interpretativa en nota. No hay conflicto con Yahvé/Mesías ni otros términos base. El único desajuste importante es léxico-semántico en τελέσητε.'
  issues:
