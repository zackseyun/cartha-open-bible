revisions:
- from: 'Pero yo digo: anden por el Espíritu, y no satisfarán el deseo de la carne[a].'
  to: 'Pero yo digo: anden según el Espíritu, y de ninguna manera llevarán a cabo el deseo de la carne[a].'
  rationale: Se revisa el final para reflejar mejor la fuerza de οὐ μὴ τελέσητε como negación enfática de realizar o ejecutar el deseo, no de satisfacerlo. También se ajusta «por el Espíritu» a «según el Espíritu» para un español más natural con «anden», sin perder la referencia contextual al Espíritu Santo ni la metáfora paulina del caminar.
