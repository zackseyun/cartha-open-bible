translation:
  language: es
  text: Un poco de levadura fermenta toda la masa[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Un poco de levadura leuda toda la masa»'
    reason: lexical_alternative
lexical_decisions:
- source_word: μικρὰ
  english_pob_choice: a little
  chosen_spanish: Un poco de
  alternatives_spanish:
  - una pequeña cantidad de
  - poca
  lexicon: BDAG
  rationale: El griego indica cantidad pequeña, no solo tamaño. «Un poco de» es natural en español y conserva el valor proverbial de una cantidad mínima con gran efecto.
- source_word: ζύμη
  english_pob_choice: leaven
  chosen_spanish: levadura
  alternatives_spanish:
  - fermento
  - leudo
  lexicon: BDAG
  rationale: En español moderno «levadura» comunica el agente de fermentación con claridad. Aunque «levadura» puede sonar más cotidiano que «leudadura», mantiene la imagen concreta del proverbio y es comprensible para lectores eclesiales amplios.
- source_word: ὅλον
  english_pob_choice: the whole
  chosen_spanish: toda
  alternatives_spanish:
  - la entera
  - todo
  lexicon: BDAG
  rationale: El griego enfatiza totalidad. Con «masa» en femenino, «toda» expresa de forma natural la idea de totalidad sin añadir palabras innecesarias.
- source_word: φύραμα
  english_pob_choice: batch of dough
  chosen_spanish: masa
  alternatives_spanish:
  - masa de pan
  - lump of dough
  lexicon: BDAG
  rationale: φύραμα designa la masa amasada. «Masa» es la forma más natural y fiel en español; «masa de pan» explicita demasiado, y «lump» no corresponde bien al registro español.
- source_word: ζυμοῖ
  english_pob_choice: leavens
  chosen_spanish: leuda
  alternatives_spanish:
  - fermenta
  - hace leudar
  lexicon: BDAG
  rationale: El verbo significa causar que la masa fermente o se leude. «Leuda» conserva la relación directa con el sustantivo «levadura» y mantiene el carácter proverbial breve del original. Aunque es menos frecuente que «fermenta», resulta suficientemente inteligible en este contexto.
theological_decisions:
- issue: Imagen proverbial sin explicación interpretativa explícita
  english_pob_reading: Retain the concrete image of leaven and dough without making the implied application explicit in the translation.
  chosen_spanish_reading: Conservar la imagen concreta de levadura y masa sin explicitar en el texto principal la aplicación sobre la influencia corruptora.
  alternative_spanish_readings:
  - Un poco de falsa enseñanza se extiende por toda la comunidad
  - Un poco de levadura obra a través de toda la masa
  rationale: Pablo enuncia un proverbio; la explicación contextual pertenece al entorno inmediato, no al verso mismo. Mantener la imagen preserva la fuerza retórica y evita introducir una glosa interpretativa en el texto principal.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El pasaje coincide con el texto fuente griego y con el auditoría inglesa de alta concordancia; no se documentan revisiones que afecten la traducción propuesta.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico claro y contemporáneo.
  - Se usa «levadura» para la imagen central, evitando la transliteración o una paráfrasis explicativa.
  - «Masa» conserva la imagen material del griego sin sobredeterminar el tipo de masa.
