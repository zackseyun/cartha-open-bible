review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: una pequeña cantidad de agente fermentador afecta toda la masa. Conserva correctamente la imagen proverbial sin explicarla. Sin embargo, el verbo español «leuda» suena poco natural para lectores amplios y debilita la legibilidad, y la nota alternativa con «fermento fermenta» resulta menos idiomática que la alternativa documentada en inglés con «levadura/masa».'
  spanish_quality_summary: «Un poco de levadura» y «toda la masa» son claros y fieles. La frase completa necesita un ajuste menor para sonar natural y ampliamente inteligible en español eclesial contemporáneo. «Leuda» existe, pero es marcado y menos transparente que «fermenta» o una perífrasis. La mejor reparación mínima es usar «fermenta», manteniendo la metáfora concreta.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Levadura» corresponde bien a ζύμη en este contexto. No hay términos teológicos sensibles aquí. El ajuste propuesto mantiene la decisión de preservar la imagen de levadura y masa, y la nota alternativa puede reflejar la opción más literal/tradicional «leuda» si se desea preservar ese matiz léxico.
  issues:
  - severity: medium
    issue: «Leuda» es poco natural en el texto principal
    rationale: Aunque puede defenderse léxicamente para ζυμοῖ, en español general y eclesial amplio no es la forma más transparente. «Fermenta» comunica con mayor claridad el efecto sobre la masa sin introducir explicación interpretativa.
  - severity: low
    issue: La nota alternativa actual es menos útil que la alternativa auditada
    rationale: El inglés preserva una alternativa de formulación («yeast» / «whole lump»). En español conviene ofrecer una alternativa que realmente represente otro camino léxico o tradicional; «leuda» funciona mejor como alternativa que como texto principal.
  revised_spanish_text: Un poco de levadura fermenta toda la masa[a].
