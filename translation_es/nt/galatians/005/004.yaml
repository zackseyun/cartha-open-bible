revisions:
- from: Ustedes que[a] son justificados por la ley[b] han sido separados del Mesías[c]; han caído de la gracia.
  to: Ustedes que son justificados por ley[b] han sido desligados del Mesías[c][a]; han caído de la gracia.
  rationale: Se ajustó «por la ley» a «por ley» para seguir la decisión documentada sobre el griego sin artículo. Se fortaleció «han sido separados» a «han sido desligados» para reflejar mejor la fuerza de severación relacional en κατηργήθητε ἀπὸ Χριστοῦ, manteniendo español natural. Se reemplazó la nota redundante [a] por una alternativa léxica real y se conservaron las alternativas relevantes del expediente inglés sobre «Mesías/Cristo».
