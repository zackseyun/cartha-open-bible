translation:
  language: es
  text: Ustedes que son justificados por ley[b] han sido desligados del Mesías[c][a]; han caído de la gracia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «separados del Mesías» o «cortados del Mesías».
    reason: lexical_alternative
  - marker: b
    text: O «los que son justificados por ley». El griego puede traducirse de manera más formal así; aquí se mantiene la fuerza directa de segunda persona.
    reason: lexical_alternative
  - marker: c
    text: O «de Cristo». Χριστός puede traducirse como «Mesías» o, en ciertos contextos, como «Cristo». Aquí se entiende como título.
    reason: alternative_reading
lexical_decisions:
- source_word: κατηργήθητε
  english_pob_choice: have been severed
  chosen_spanish: han sido separados
  alternatives_spanish:
  - han sido apartados
  - han sido desligados
  - han sido cortados
  lexicon: BDAG
  rationale: En este contexto con ἀπὸ Χριστοῦ, el pasivo transmite separación relacional fuerte. «Han sido separados» conserva esa fuerza sin sonar excesivamente idiomático o violento en español; «desligados» es posible pero menos natural, y «cortados» sería más abrupto.
- source_word: ἀπὸ Χριστοῦ
  english_pob_choice: from the Messiah
  chosen_spanish: del Mesías
  alternatives_spanish:
  - de Cristo
  lexicon: BDAG
  rationale: ἀπό marca separación, y Χριστός se rinde como «Mesías» cuando funciona claramente como título. Aquí el sentido es relacional y mesiánico, no simplemente nominal.
- source_word: οἵτινες
  english_pob_choice: You who
  chosen_spanish: Ustedes que
  alternatives_spanish:
  - Los que
  - Quienes
  lexicon: BDAG
  rationale: El relativo identifica al subgrupo dentro de los gálatas. «Ustedes que» mantiene el tono directo de segunda persona y suena natural en español.
- source_word: ἐν νόμῳ
  english_pob_choice: by law
  chosen_spanish: por la ley
  alternatives_spanish:
  - mediante la ley
  - en ley
  lexicon: BDAG
  rationale: La frase expresa el ámbito o base sobre la cual buscan justicia. En español, «por la ley» comunica bien esa base/instrumento sin introducir una paráfrasis más amplia.
- source_word: δικαιοῦσθε
  english_pob_choice: are being justified
  chosen_spanish: son justificados
  alternatives_spanish:
  - están siendo justificados
  - buscan ser justificados
  - son declarados justos
  lexicon: BDAG
  rationale: El presente pasivo se refleja de manera bastante directa como «son justificados». Esta opción conserva la fuerza verbal sin convertir el texto en una explicación interpretativa. «Están siendo justificados» sería más literal pero más pesado; «buscan ser justificados» explicita demasiado la intención.
- source_word: τῆς χάριτος
  english_pob_choice: from grace
  chosen_spanish: de la gracia
  alternatives_spanish:
  - de gracia
  - fuera de la gracia
  lexicon: BDAG
  rationale: Con ἐκπίπτω, el genitivo se expresa naturalmente en español como «caer de la gracia». Se evita una construcción más explícita que altere el modismo.
- source_word: ἐξεπέσατε
  english_pob_choice: have fallen away
  chosen_spanish: han caído
  alternatives_spanish:
  - se han apartado
  - han caído fuera
  - han caído de
  lexicon: BDAG
  rationale: El aoristo marca una caída con resultado definido. «Han caído de la gracia» reproduce el modismo español clásico y mantiene la imagen relacional. Se eligió «han caído» para no sobreexplicar el verbo griego.
theological_decisions:
- issue: Alcance de la separación de Cristo/Mesías y posible tensión doctrinal sobre la perseverancia o la pérdida de gracia
  english_pob_reading: 'Retain the direct warning language without importing a denominational conclusion: ''have been severed from the Messiah; you have fallen away from grace.'''
  chosen_spanish_reading: 'Mantener el aviso directo: «han sido separados del Mesías; han caído de la gracia».'
  alternative_spanish_readings:
  - «han sido alejados del Mesías; se han apartado de la gracia»
  - «han perdido su relación con el Mesías; han abandonado la gracia»
  rationale: La frase paulina es severa y no debe suavizarse ni resolverse doctrinalmente en la traducción. «Han sido separados» y «han caído de la gracia» preservan la advertencia relacional y dejan intacta la tensión teológica del texto.
  doctrine_reference: Preservar la tensión teológica sin decidir entre lecturas confesionales sobre la perseverancia o la apostasía.
translation_notes:
  revision_awareness: La tradición auditada del POB en inglés pasó de una paráfrasis más intencional («are seeking to be justified») a una forma más directa («are being justified») para reflejar mejor el presente pasivo de δικαιοῦσθε. La versión española sigue esa decisión al conservar un presente pasivo claro («son justificados») y mantiene el resto de la advertencia sin suavizarla.
  spanish_consistency_notes:
  - Se usa «Mesías» para Χριστός conforme a la política del proyecto cuando el contexto es titular y no meramente nominal.
  - Se evita «SEÑOR» como sustituto de nombre divino porque el versículo no contiene el Tetragrámaton ni κύριος.
  - «gracia» se conserva sin ampliación interpretativa, en paralelo con el modismo de caída relacional.
  - La formulación «han sido separados» evita un calco duro y conserva la intensidad semántica del pasivo griego.
