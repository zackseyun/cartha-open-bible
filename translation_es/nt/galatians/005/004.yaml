review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: advertencia directa a un subgrupo, separación con respecto al Mesías y caída respecto de la gracia. Sin embargo, dos elecciones no siguen del todo el expediente inglés ni la mejor fuerza del griego: «separados» atenúa un poco la fuerza de κατηργήθητε con ἀπὸ Χριστοῦ frente a «severed»/«cut off», y «por la ley» introduce artículo donde el inglés auditado prefirió omitirlo por la anartrosidad de νόμῳ.'
  spanish_quality_summary: El español es claro y legible, pero puede mejorarse para sonar más idiomático y más preciso. «Ustedes que son justificados…» funciona, aunque «los que son justificados…» o mantener «ustedes que…» sin nota redundante sería más limpio. «Han caído de la gracia» suena algo menos natural que «han caído de la gracia» en registro bíblico tradicional; esa parte puede quedarse. La mayor mejora es fortalecer «han sido separados» a «han sido separados/cortados»; entre opciones naturales y fieles, «han quedado separados» o «han sido separados» siguen siendo más débiles que «han sido desligados» o «han quedado separados». En conjunto, el mejor ajuste es «han sido separados del Mesías» -> «han sido separados del Mesías» no basta; conviene «han quedado separados del Mesías» o «han sido apartados del Mesías». Aun así, la opción más fiel al expediente es «han sido separados del Mesías»? No; el inglés enfatiza severance. Se recomienda «han sido desligados del Mesías».
  glossary_alignment: Alinea bien con Mesías para Χριστός y gracia para χάρις. No hay problemas con Yahvé u otros términos del glosario. Debe ajustarse «por la ley» a «por ley» para respetar la decisión documentada sobre νόμῳ sin artículo, y conviene mantener una nota para la alternativa «de Cristo».
  issues:
  - severity: medium
    issue: «por la ley» añade artículo no presente en ἐν νόμῳ
    rationale: El expediente inglés prefirió «by law» precisamente porque νόμῳ es anartro y expresa base/esfera. En español, «por ley» preserva mejor esa decisión sin perder claridad.
  - severity: medium
    issue: «han sido separados» debilita la fuerza de κατηργήθητε ἀπὸ Χριστοῦ
    rationale: La auditoría inglesa escogió «have been severed» y registró «alienated/cut off» como alternativas. «Separados» es comprensible pero algo más blando. «Desligados» o «separados de» con nota alternativa puede acercarse mejor a la fuerza relacional de ruptura.
  - severity: low
    issue: La nota [a] es redundante y poco útil
    rationale: El texto ya dice «Ustedes que». La nota «O ‘ustedes que’» no aporta una alternativa real. Conviene reemplazarla por una nota que preserve la alternativa formal «los que son justificados por ley» o eliminarla.
  revised_spanish_text: Ustedes que son justificados por ley[b] han sido desligados del Mesías[c][a]; han caído de la gracia.
