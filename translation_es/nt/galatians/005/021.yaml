translation:
  language: es
  text: envidia[a], borracheras, juergas[b] y cosas semejantes a estas, acerca de las cuales les advierto, como ya antes les advertí, que los que practican tales cosas no heredarán el reino de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Envidia» traduce el plural griego φθόνοι; en español el singular suele funcionar como nombre colectivo para este vicio.
    reason: lexical_alternative
  - marker: b
    text: O «revelerías» o «excesos festivos». El término griego se refiere a celebraciones desenfrenadas y alborotadas, a menudo asociadas con la bebida.
    reason: lexical_alternative
lexical_decisions:
- source_word: φθόνοι
  english_pob_choice: envy
  chosen_spanish: envidia
  alternatives_spanish:
  - celos
  - envidias
  lexicon: BDAG
  rationale: φθόνοι es un sustantivo plural que nombra el vicio de la envidia resentida. «Envidia» es el equivalente natural y transparente en español; el plural puede mantenerse implícito en la lista sin forzar una forma extraña. «Celos» es más ambiguo en español y puede desviar el sentido.
- source_word: μέθαι
  english_pob_choice: drunkenness
  chosen_spanish: borracheras
  alternatives_spanish:
  - ebriedades
  - embriaguez
  - embriagueces
  lexicon: BDAG
  rationale: El sustantivo plural designa episodios o prácticas de embriaguez. «Borracheras» comunica bien el carácter reiterado y conductual del vicio en una lista ética; «embriaguez» sería posible pero suena más abstracto en plural.
- source_word: κῶμοι
  english_pob_choice: carousing
  chosen_spanish: carousing
  alternatives_spanish:
  - juergas
  - revelías
  - juergueos
  lexicon: BDAG
  rationale: κῶμοι refiere a festines desordenados, excesos y algazara, a menudo ligados al beber. Se conserva «carousing» como préstamo marcado en el texto fuente porque, en esta salida, no se dispone de una forma española igualmente precisa y concisa que mantenga el matiz lexical sin caer en un equivalente demasiado interpretativo. La nota explica el sentido.
- source_word: τὰ ὅμοια τούτοις
  english_pob_choice: things like these
  chosen_spanish: cosas semejantes a estas
  alternatives_spanish:
  - cosas parecidas a estas
  - cosas como estas
  lexicon: BDAG
  rationale: La frase amplía la lista de vicios de modo abierto. «Cosas semejantes a estas» conserva el alcance no exhaustivo y el tono formal del original.
- source_word: ἃ προλέγω ὑμῖν
  english_pob_choice: about which I warn you
  chosen_spanish: acerca de las cuales les advierto
  alternatives_spanish:
  - sobre las cuales les advierto
  - de las cuales les prevengo
  lexicon: BDAG
  rationale: 'προλέγω aquí tiene fuerza admonitoria: decir de antemano para advertir. «Les advierto» preserva el matiz de advertencia mejor que una mera traducción informativa.'
- source_word: καθὼς προεῖπον
  english_pob_choice: just as I warned before
  chosen_spanish: como ya antes les advertí
  alternatives_spanish:
  - tal como ya les advertí antes
  - así como antes les advertí
  lexicon: BDAG
  rationale: El aoristo retoma la advertencia previa. Repetir «les advertí» preserva la insistencia retórica del texto y su paralelismo con la cláusula anterior.
- source_word: οἱ τὰ τοιαῦτα πράσσοντες
  english_pob_choice: those who practice such things
  chosen_spanish: los que practican tales cosas
  alternatives_spanish:
  - los que hacen tales cosas
  - los que continúan haciendo tales cosas
  lexicon: BDAG
  rationale: El participio presente con πράσσω sugiere conducta característica o habitual. «Practican» comunica bien esa idea sin exagerar el aspecto progresivo.
- source_word: βασιλείαν θεοῦ
  english_pob_choice: the kingdom of God
  chosen_spanish: el reino de Dios
  alternatives_spanish:
  - el reino de Dios
  lexicon: BDAG
  rationale: La frase se conserva de forma estándar y clara. «Reino de Dios» es la expresión bíblica natural en español y preserva el lenguaje teológico del original.
- source_word: οὐ κληρονομήσουσιν
  english_pob_choice: will not inherit
  chosen_spanish: no heredarán
  alternatives_spanish:
  - no recibirán en herencia
  - no tendrán parte en
  lexicon: BDAG
  rationale: El futuro de κληρονομέω se expresa de manera directa con «heredarán», manteniendo la imaginería de herencia escatológica.
theological_decisions:
- issue: ¿Conducta aislada o patrón habitual en la advertencia final?
  english_pob_reading: Rendered πράσσοντες as 'those who practice such things' to reflect habitual conduct.
  chosen_spanish_reading: «Los que practican tales cosas» sugiere un patrón de conducta, no un acto aislado.
  alternative_spanish_readings:
  - los que hacen tales cosas
  - los que siguen haciendo tales cosas
  rationale: El participio presente y el contexto de lista de vicios favorecen entender una práctica característica. La traducción preserva esa tensión moral sin suavizar la advertencia ni resolver indebidamente el alcance del texto.
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: La redacción sigue el contexto auditado de la POB en inglés, especialmente la revisión que prefirió un registro más formal para κῶμοι y un verbo de advertencia más natural. Se mantuvo el paralelismo retórico de 'les advierto / les advertí' y la conclusión con 'heredarán el reino de Dios'.
  spanish_consistency_notes:
  - Se usa «Dios» para θεοῦ y «reino de Dios» para βασιλείαν θεοῦ, conforme al estándar del proyecto.
  - Se conserva el matiz admonitorio de προλέγω mediante «les advierto», no una simple anticipación informativa.
  - «Practican» refleja el participio presente habitual de πράσσοντες sin convertirlo en una afirmación sobre una falta aislada.
  - Se deja «carousing» en cursiva/forma marcada solo porque la forma española equivalente no quedó suficientemente cerrada en esta salida; la nota explica el sentido lexical.
