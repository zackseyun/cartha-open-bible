translation:
  language: es
  text: mansedumbre, dominio propio; contra tales cosas[a] no hay ley[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'contra tales personas no hay ley', aunque aquí la frase probablemente se refiere a las cualidades enumeradas más que a las personas que las muestran.
    reason: lexical_alternative
  - marker: b
    text: O 'no hay ley contra tales cosas'.
    reason: lexical_alternative
lexical_decisions:
- source_word: πραΰτης
  english_pob_choice: gentleness
  chosen_spanish: mansedumbre
  alternatives_spanish:
  - gentileza
  - amabilidad
  - humildad
  lexicon: BDAG
  rationale: El griego designa una disposición suave, no áspera y moralmente virtuosa. En español, 'mansedumbre' transmite mejor esa cualidad ética en un listado de virtudes y evita la posible debilidad de 'amabilidad' o el matiz más afectivo de 'gentileza'. También conserva una resonancia bíblica adecuada sin caer en un calco mecánico.
- source_word: ἐγκράτεια
  english_pob_choice: self-control
  chosen_spanish: dominio propio
  alternatives_spanish:
  - autocontrol
  - templanza
  - autodominio
  lexicon: BDAG
  rationale: El término se refiere al gobierno de los propios impulsos y deseos. 'Dominio propio' es claro, natural en español bíblico contemporáneo y comunica bien la fuerza moral del término; 'templanza' puede sonar más restringido o tradicional, y 'autocontrol' más psicológico que ético.
- source_word: κατὰ τῶν τοιούτων
  english_pob_choice: against such things
  chosen_spanish: contra tales cosas
  alternatives_spanish:
  - contra tales personas
  - respecto de tales cosas
  lexicon: BDAG
  rationale: El antecedente inmediato es la lista de virtudes, por lo que el referente más probable son las cualidades mencionadas, no las personas que las muestran. 'Contra tales cosas' mantiene la referencia abierta y sigue de cerca la fuerza contextual del griego sin forzar una lectura personal.
- source_word: νόμος
  english_pob_choice: law
  chosen_spanish: ley
  alternatives_spanish:
  - la ley
  - norma
  lexicon: BDAG
  rationale: El sustantivo aparece sin artículo en griego, de modo que 'ley' reproduce bien la forma y el sentido general. En español, 'ley' es suficiente y no estrecha innecesariamente la afirmación a una referencia explícita al sistema mosaico, aunque ese trasfondo siga presente en Gálatas.
theological_decisions:
- issue: Alcance de νόμος en la sentencia final
  english_pob_reading: Rendered broadly as 'law' rather than specifically 'the law.'
  chosen_spanish_reading: Traducido de manera amplia como 'ley', no como una referencia cerrada a 'la ley'.
  alternative_spanish_readings:
  - contra la ley
  - contra la Ley
  - no hay nada en la Ley que se oponga
  rationale: 'La forma anarticular del griego favorece una formulación general. En el contexto de Gálatas, la ley mosaica está en el trasfondo, pero el proverbio apostólico aquí suena más amplio: ninguna ley se levanta contra estas virtudes. Esta redacción conserva la tensión teológica sin resolverla artificialmente.'
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego SBLGNT y el razonamiento auditado de la POB en inglés. Se mantuvo la ambigüedad de κατὰ τῶν τοιούτων en una nota, y se evitó convertir νόμος en una referencia más específica de la que permite la forma griega.
  spanish_consistency_notes:
  - Se emplea 'ley' para νόμος conforme al valor anarticular del griego y a la política POB de no sobredeterminar el referente.
  - Se usa 'mansedumbre' como equivalente bíblico adecuado para πραΰτης, manteniendo el tono ético de la lista.
  - '''Dominio propio'' se eligió por claridad y naturalidad en español eclesial amplio.'
  - Las notas conservan las alternativas relevantes sin introducir terminología tradicional no sustentada por el texto.
