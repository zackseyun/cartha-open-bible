translation:
  language: es
  text: Ahora bien, los que pertenecen a Mesías han crucificado la carne con sus pasiones y deseos[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los que pertenecen a Cristo».'
    reason: alternative_reading
  - marker: b
    text: «La carne» aquí se refiere a la naturaleza humana caída en oposición al Espíritu; algunas traducciones la vierten como «la naturaleza pecaminosa».
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ ... τοῦ Χριστοῦ
  english_pob_choice: those who belong to Messiah
  chosen_spanish: los que son de Mesías
  alternatives_spanish:
  - los que pertenecen a Mesías
  - los que son de Cristo
  - los que pertenecen a Cristo
  lexicon: BDAG
  rationale: La construcción articular con genitivo expresa pertenencia o relación de posesión. En español, «son de» conserva de forma natural esa pertenencia sin añadir una perífrasis más pesada. Se mantiene «Mesías» porque el POB inglés documenta Χριστός como título y la política de la obra favorece esa forma en lugar de «Cristo» cuando funciona como título.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora bien
  alternatives_spanish:
  - Ahora
  - Pero
  - Y
  lexicon: BDAG
  rationale: δέ introduce una transición suave desde el contexto anterior. «Ahora bien» transmite mejor ese giro discursivo en español que un adversativo fuerte como «pero», sin sobrerrepresentar contraste.
- source_word: σάρκα
  english_pob_choice: the flesh
  chosen_spanish: la carne
  alternatives_spanish:
  - la naturaleza pecaminosa
  - la naturaleza humana caída
  lexicon: BDAG
  rationale: Se conserva «carne» para mantener la tensión teológica paulina y el vocabulario técnico del texto. Aunque el contexto apunta a la naturaleza humana caída en oposición al Espíritu, el POB inglés retuvo «flesh» y dejó la glosa interpretativa en nota; en español se sigue la misma estrategia.
- source_word: ἐσταύρωσαν
  english_pob_choice: have crucified
  chosen_spanish: han crucificado
  alternatives_spanish:
  - crucificaron
  - han clavado en la cruz
  lexicon: BDAG
  rationale: El aoristo se vierte con perfecto compuesto en español para expresar una acción decisiva con relevancia permanente. «Han crucificado» mantiene la imagen explícita de la cruz sin rebajarla a «matar» o «poner a muerte».
- source_word: σὺν
  english_pob_choice: along with
  chosen_spanish: con
  alternatives_spanish:
  - junto con
  - además de
  lexicon: BDAG
  rationale: La preposición expresa acompañamiento. «Con» es suficiente y natural en español; «junto con» también sería posible, pero aquí «con» mantiene fluidez sin perder el sentido.
- source_word: παθήμασιν
  english_pob_choice: passions
  chosen_spanish: pasiones
  alternatives_spanish:
  - afectos
  - emociones
  lexicon: BDAG
  rationale: En este contexto ético, πάθημα no significa «sufrimientos» sino impulsos o afecciones desordenadas. «Pasiones» reproduce bien esa fuerza moral y encaja con el paralelismo con «deseos».
- source_word: ἐπιθυμίαις
  english_pob_choice: desires
  chosen_spanish: deseos
  alternatives_spanish:
  - codicias
  - apetitos
  lexicon: BDAG
  rationale: ἐπιθυμία puede ser deseo fuerte, a menudo moralmente desviado en Pablo. «Deseos» es amplio y entendible, y evita restringir indebidamente el término a una sola clase de deseo.
theological_decisions:
- issue: Rendering Χριστοῦ
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: Se sigue la decisión doctrinal del POB de traducir Χριστός como título («Mesías») cuando no funciona simplemente como forma fija de nombre. Esto preserva la referencia mesiánica del genitivo sin ocultarla bajo una forma litúrgica tradicional.
  doctrine_reference: 'DOCTRINE.md: Χριστός default ''Messiah'' where title; ''Christ'' where name-like'
- issue: Rendering σάρξ in Pauline ethical contrast
  english_pob_reading: flesh
  chosen_spanish_reading: carne
  alternative_spanish_readings:
  - naturaleza pecaminosa
  - naturaleza humana caída
  rationale: La metáfora paulina de σάρξ conserva una tensión que no conviene resolver demasiado pronto. «Carne» mantiene el término fuente; la interpretación de «naturaleza pecaminosa» queda como alternativa explicativa, no como sustituto en el texto principal.
  doctrine_reference: 'DOCTRINE.md: σάρξ default ''flesh'' / ''sinful nature''; preserve tension where possible'
translation_notes:
  revision_awareness: La redacción sigue el sentido del SBLGNT y mantiene la decisión auditada del POB de leer Χριστοῦ como título («Mesías») y σάρξ como «flesh/carne», con la glosa interpretativa preservada en nota. También se tuvo en cuenta la revisión posterior que restituyó «Messiah» frente a una pasada intermedia que había usado «Christ».
  spanish_consistency_notes:
  - 'Se mantiene el paralelismo de la frase final: «la carne, con sus pasiones y deseos».'
  - Se evita «Cristo» en el texto principal para respetar la política terminológica documentada.
  - «Han crucificado» conserva el valor perfecto de una acción decisiva con efecto presente.
  - El registro es bíblico y publicable, pero evita arcaísmos innecesarios.
