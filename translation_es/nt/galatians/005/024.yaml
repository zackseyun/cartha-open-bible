- from: Ahora bien, los que son de Mesías han crucificado la carne, con sus pasiones y deseos[a][b].
  to: Ahora bien, los que pertenecen a Mesías han crucificado la carne con sus pasiones y deseos[a][b].
  rationale: Se reemplaza «son de» por «pertenecen a» para expresar de manera más natural y precisa en español la pertenencia indicada por τοῦ Χριστοῦ. También se elimina la coma antes de «con sus pasiones y deseos» para respetar mejor la sintaxis del original y la fluidez del español. Se mantienen «Mesías» y «carne» conforme a la política terminológica y al razonamiento teológico documentado.
