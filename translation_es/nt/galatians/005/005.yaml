translation:
  language: es
  text: Porque por el Espíritu[a], por la fe[b], aguardamos con anhelo la esperanza de la rectitud[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'en el Espíritu'. El dativo griego πνεύματι puede entenderse como medio ('por el Espíritu') o esfera ('en el Espíritu').
    reason: lexical_alternative
  - marker: b
    text: O 'desde la fe'. La preposición ἐκ es literalmente 'de' o 'desde'; aquí se traduce con un español natural que conserve la relación de base o fuente.
    reason: lexical_alternative
  - marker: c
    text: O 'justicia'. El griego δικαιοσύνη puede denotar 'rectitud' o 'justicia'; en este contexto paulino, el inglés POB privilegia el sentido de 'righteousness', por lo que 'justicia' se conserva como alternativa.
    reason: alternative_reading
lexical_decisions:
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Conecta la frase con lo anterior como explicación o fundamento. 'Porque' mantiene el flujo argumentativo de Pablo en un español claro y natural.
- source_word: πνεύματι
  english_pob_choice: through the Spirit
  chosen_spanish: por el Espíritu
  alternatives_spanish:
  - en el Espíritu
  - mediante el Espíritu
  lexicon: BDAG
  rationale: El dativo puede ser instrumental o de esfera. 'Por el Espíritu' preserva la fuerza de medio/agencia sin cerrar indebidamente la ambigüedad, y el contexto de Gálatas favorece el Espíritu Santo.
- source_word: ἐκ πίστεως
  english_pob_choice: by faith
  chosen_spanish: por la fe
  alternatives_spanish:
  - desde la fe
  - a partir de la fe
  lexicon: BDAG
  rationale: ἐκ señala origen o base. 'Por la fe' es la forma más natural en español y conserva la relación de fundamento sin convertirla en una paráfrasis.
- source_word: ἐλπίδα
  english_pob_choice: the hope
  chosen_spanish: la esperanza
  alternatives_spanish:
  - esperanza
  lexicon: BDAG
  rationale: El sustantivo admite artículo en español para una construcción idiomática y clara. 'La esperanza' mantiene el objeto directo del verbo.
- source_word: δικαιοσύνης
  english_pob_choice: righteousness
  chosen_spanish: de la justicia
  alternatives_spanish:
  - de la rectitud
  - de la justicia de Dios
  lexicon: BDAG
  rationale: Se eligió 'justicia' para conservar el rango semántico doctrinal de δικαιοσύνη y abrir tanto la dimensión forense como la ética, sin imponer una expansión interpretativa.
- source_word: ἀπεκδεχόμεθα
  english_pob_choice: eagerly await
  chosen_spanish: aguardamos con anhelo
  alternatives_spanish:
  - esperamos con ansias
  - aguardamos
  lexicon: BDAG
  rationale: El verbo implica espera intensa y expectante. 'Aguardamos con anhelo' expresa esa expectativa paciente y enfática mejor que un simple 'esperamos'.
theological_decisions:
- issue: Referente de πνεύματι
  english_pob_reading: Holy Spirit
  chosen_spanish_reading: el Espíritu Santo
  alternative_spanish_readings:
  - el espíritu humano
  rationale: En el contexto inmediato de Gálatas 5, la oposición implícita con la carne y la dinámica redentora apuntan al Espíritu Santo. La mayúscula en 'Espíritu' mantiene esa lectura sin ocultar el dato gramatical del original.
  doctrine_reference: Mantenimiento de la tensión léxica con apoyo contextual; no se resuelve una ambigüedad gramatical sin base textual.
- issue: Sentido de ἐλπίδα δικαιοσύνης
  english_pob_reading: 'objective genitive-like sense: ''the hope of righteousness'''
  chosen_spanish_reading: la esperanza de la justicia
  alternative_spanish_readings:
  - la justicia esperada
  - la esperanza producida por la justicia
  rationale: 'La frase conserva la ambigüedad productiva del genitivo: puede apuntar a la esperanza vinculada con la justicia/justificación, sin transformar el texto en una explicación. ''La esperanza de la justicia'' es la opción más directa y fiel al griego.'
  doctrine_reference: La justicia en Pablo admite matiz forense y covenantal; la traducción no debe estrecharla prematuramente.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB que prefirió 'through the Spirit' y 'by faith', así como la nota previa sobre la posible lectura de πνεύματι como 'in the Spirit'. La versión española conserva la relación instrumental con 'por el Espíritu' y 'por la fe', y mantiene la ambigüedad útil del genitivo 'de la justicia' sin sobre-explicar.
  spanish_consistency_notes:
  - Se usó 'Espíritu' con mayúscula para reflejar el probable referente al Espíritu Santo, coherente con el contexto paulino.
  - Se prefirió 'justicia' en el texto principal, manteniendo la alternativa semántica en nota para no perder la tensión doctrinal.
  - '''Aguardamos con anhelo'' conserva el matiz de expectativa paciente y ferviente del verbo griego.'
  - No se introdujo 'Cristo' ni otra terminología no presente en el verso.
  - La estructura española prioriza legibilidad pública sin abandonar la correspondencia semántica con el griego.
