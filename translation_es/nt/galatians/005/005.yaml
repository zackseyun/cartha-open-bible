base_translation:
  language: en
  yaml_path: translation/nt/galatians/005/005.yaml
  text: For through the Spirit[a], by faith[d][c][b], we eagerly await the hope of righteousness.
  footnotes:
  - marker: a
    text: Or 'by faith.' The Greek phrase is literally 'from faith'; compare Paul's frequent use of πίστις ('faith'), which can in some contexts also be understood as 'faithfulness' or 'trust.'
    reason: lexical_alternative
  - marker: b
    text: Or 'justice.' The Greek δικαιοσύνη can denote righteousness or justice; in Paul, 'righteousness' is the default rendering here.
    reason: alternative_reading
  - marker: c
    text: Or 'in the Spirit.' The dative πνεύματι may be understood instrumentally ('by the Spirit') or as sphere ('in the Spirit').
    reason: lexical_alternative
  - marker: d
    text: Or 'we, by the Spirit, from faith, eagerly await'.
    reason: previous_rendering
