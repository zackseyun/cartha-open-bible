    rationale: Hay desalineación interna entre la nota, la decisión léxica y la decisión inglesa auditada; esto puede confundir al lector y al equipo editorial.
  revised_spanish_text: Porque por el Espíritu[a], por la fe[b], aguardamos con anhelo la esperanza de la rectitud[c].
