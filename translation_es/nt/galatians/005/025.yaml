translation:
  language: es
  text: Si vivimos por el Espíritu[a], andemos también por el Espíritu.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Si vivimos en el Espíritu, andemos también en el Espíritu»; o, con el matiz de στοιχέω, «sigamos el paso del Espíritu».'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰ
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Ya que
  lexicon: BDAG
  rationale: La partícula condicional se refleja con «Si» para conservar la estructura condicional del griego y el impulso exhortativo de Pablo. «Ya que» sería posible por el contexto, pero suaviza la forma condicional.
- source_word: ζῶμεν
  english_pob_choice: we live
  chosen_spanish: vivimos
  alternatives_spanish:
  - estamos vivos
  lexicon: BDAG
  rationale: El verbo ζώω se entiende aquí como vida en sentido relacional/espiritual, no mera existencia biológica. «Vivimos» es la equivalencia natural en español y mantiene la imagen de vida derivada del Espíritu.
- source_word: πνεύματι
  english_pob_choice: by the Spirit
  chosen_spanish: por el Espíritu
  alternatives_spanish:
  - en el Espíritu
  - por espíritu
  lexicon: BDAG
  rationale: El dativo se expresa de forma instrumental/relacional con «por el Espíritu», que suena natural en español y comunica la fuente o el medio de la vida cristiana. El contexto de Gálatas 5 favorece el Espíritu Santo, por eso se capitaliza.
- source_word: καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - y
  lexicon: BDAG
  rationale: '«También» reproduce el valor ascensivo de καί en la exhortación: si una realidad es verdadera, la conducta correspondiente debe seguirla.'
- source_word: στοιχῶμεν
  english_pob_choice: let us walk
  chosen_spanish: caminemos
  alternatives_spanish:
  - mantengámonos en línea
  - sigamos al paso
  lexicon: BDAG
  rationale: El subjuntivo exhortativo se vierte con «caminemos», que conserva la metáfora ética paulina de andar/conducta. Las opciones más específicas («mantengámonos en línea», «sigamos al paso») explicitan la fuerza de στοιχέω, pero resultan menos fluidas en el texto principal.
theological_decisions:
- issue: Referente de πνεύματι
  english_pob_reading: the Holy Spirit
  chosen_spanish_reading: el Espíritu Santo
  alternative_spanish_readings:
  - el espíritu humano
  rationale: En el contraste inmediato entre carne y Espíritu en Gálatas 5, el referente más probable es el Espíritu Santo. La capitalización en la traducción española comunica esa decisión interpretativa sin borrar el trasfondo gramatical del griego.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological tension rather than resolve it only where ambiguity is genuine.'
translation_notes:
  revision_awareness: 'El pasaje presenta alta concordancia entre el texto griego y el antecedente inglés: la única decisión interpretativa relevante es πνεύματι, donde el contexto favorece el Espíritu Santo. La revisión más reciente no introdujo cambios, y no se requieren ajustes adicionales.'
  spanish_consistency_notes:
  - Se usa «Espíritu» con mayúscula cuando el contexto señala al Espíritu Santo.
  - Se prefiere «caminemos» en el texto principal por claridad, manteniendo en nota la alternativa más cercana a στοιχέω.
  - «por el Espíritu» conserva la relación instrumental/relacional indicada por el dativo griego.
