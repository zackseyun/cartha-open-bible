translation:
  language: es
  text: Porque ustedes fueron llamados a la libertad[a], hermanos; solo no usen su libertad como ocasión[b] para la carne[c], sino que por medio del amor sirvan unos a otros[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hermanos» traduce el plural masculino griego y, en esta carta, se dirige a toda la comunidad creyente, incluidas las mujeres.
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse como «como una ocasión» o «como una oportunidad»; el sentido es el de un punto de apoyo para el egoísmo pecaminoso.
    reason: lexical_alternative
  - marker: c
    text: «La carne» aquí no se refiere solo al cuerpo físico, sino a los impulsos humanos caídos; algunas traducciones dicen «la naturaleza pecaminosa».
    reason: alternative_reading
  - marker: d
    text: El verbo traducido «sirvan» está relacionado con la palabra para «esclavo» y expresa una entrega mutua en servicio.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὑμεῖς
  english_pob_choice: you
  chosen_spanish: ustedes
  alternatives_spanish:
  - vosotros
  lexicon: BDAG
  rationale: El pronombre explícito se conserva de manera natural en español con «ustedes», manteniendo el énfasis del griego sin añadir una redundancia artificial.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - En efecto
  lexicon: BDAG
  rationale: La conjunción explica y fundamenta la exhortación anterior; «Porque» preserva mejor la relación argumentativa.
- source_word: ἐπ’ ἐλευθερίᾳ
  english_pob_choice: to freedom
  chosen_spanish: a la libertad
  alternatives_spanish:
  - para la libertad
  - en libertad
  lexicon: BDAG
  rationale: La preposición con dativo expresa meta o esfera de la llamada. «A la libertad» suena natural en español y comunica bien el destino de la vocación.
- source_word: ἐκλήθητε
  english_pob_choice: were called
  chosen_spanish: fueron llamados
  alternatives_spanish:
  - fueron convocados
  lexicon: BDAG
  rationale: El pasivo de καλέω se conserva como llamado efectivo; «fueron llamados» es transparente y fiel.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - hermanos/as
  lexicon: BDAG
  rationale: Se mantiene la forma masculina plural del griego, que en esta carta incluye a toda la comunidad creyente. La inclusividad se explica en nota, no se neutraliza en el texto principal.
- source_word: μόνον
  english_pob_choice: only
  chosen_spanish: solo
  alternatives_spanish:
  - solamente
  - únicamente
  lexicon: BDAG
  rationale: Marca restricción enfática; «solo» reproduce bien el límite impuesto a la afirmación anterior.
- source_word: μὴ...εἰς ἀφορμὴν
  english_pob_choice: do not use ... as an opportunity
  chosen_spanish: no usen ... como ocasión
  alternatives_spanish:
  - no hagan de ... una base
  - no conviertan ... en oportunidad
  lexicon: BDAG
  rationale: «Ocasión» conserva el sentido de punto de arranque o oportunidad, sin perder la advertencia ética del pasaje.
- source_word: τὴν ἐλευθερίαν
  english_pob_choice: your freedom
  chosen_spanish: su libertad
  alternatives_spanish:
  - la libertad de ustedes
  lexicon: BDAG
  rationale: Se mantiene el sustantivo clave del versículo y la referencia posesiva implícita de manera natural en español.
- source_word: τῇ σαρκί
  english_pob_choice: the flesh
  chosen_spanish: la carne
  alternatives_spanish:
  - la naturaleza pecaminosa
  - la naturaleza humana caída
  lexicon: BDAG
  rationale: Se preserva el término paulino «carne» para no diluir la tensión teológica del texto; el sentido ético/antropológico queda implícito y puede aclararse en nota.
- source_word: διὰ τῆς ἀγάπης
  english_pob_choice: through love
  chosen_spanish: por medio del amor
  alternatives_spanish:
  - por amor
  - mediante el amor
  lexicon: BDAG
  rationale: La construcción instrumental se expresa de forma natural con «por medio de», manteniendo la mediación del amor.
- source_word: δουλεύετε
  english_pob_choice: serve
  chosen_spanish: sírvanse
  alternatives_spanish:
  - háganse esclavos unos de otros
  - sean siervos unos de otros
  lexicon: BDAG
  rationale: Aunque el verbo comparte raíz con δοῦλος, en este mandato recíproco el español «sírvanse» comunica mejor la exhortación sin borrar del todo el trasfondo de servicio ligado a esclavitud, que queda documentado.
- source_word: ἀλλήλοις
  english_pob_choice: one another
  chosen_spanish: unos a otros
  alternatives_spanish:
  - mutuamente
  lexicon: BDAG
  rationale: El recíproco se vierte con la forma idiomática y natural en español «unos a otros».
theological_decisions:
- issue: ἀδελφοί en un saludo/exhortación a comunidad mixta
  english_pob_reading: brothers
  chosen_spanish_reading: hermanos
  alternative_spanish_readings:
  - hermanos y hermanas
  - personas creyentes
  rationale: Se conserva la forma masculina plural del original, que en el contexto paulino nombra representativamente a la comunidad entera. La inclusión de mujeres se puede notar sin cambiar el texto principal.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: σάρξ como término paulino ético-teológico
  english_pob_reading: the flesh
  chosen_spanish_reading: la carne
  alternative_spanish_readings:
  - la naturaleza pecaminosa
  - la naturaleza humana caída
  rationale: El proyecto prefiere preservar el término cargado de Pablo en lugar de interpretarlo de antemano. «La carne» mantiene la ambigüedad controlada del original y evita una paráfrasis doctrinal.
  doctrine_reference: 'DOCTRINE.md Contested terms: σάρξ'
- issue: δουλεύετε con objeto recíproco
  english_pob_reading: serve one another
  chosen_spanish_reading: sírvanse unos a otros
  alternative_spanish_readings:
  - háganse esclavos unos de otros
  - sean servidores unos de otros
  rationale: El mandato es recíproco y ético; en español, «sírvanse» es la forma más clara. La resonancia con el vocabulario de esclavitud se preserva en la documentación para no perder la fuerza léxica.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §1, §6; Contested terms: δοῦλος'
translation_notes:
  revision_awareness: El texto sigue el pasaje sin cambios de la revisión más reciente del inglés POB; se mantuvo la misma resolución de ἀδελφοί, ἐπ’ ἐλευθερίᾳ, σάρξ y δουλεύετε, adaptada al español con equivalencia óptima y con notas para conservar las tensiones léxicas documentadas.
  spanish_consistency_notes:
  - Se usa «libertad» para ἐλευθερία de forma consistente.
  - Se mantiene «la carne» para σάρξ, no una paráfrasis doctrinal.
  - Se conserva el registro comunitario con «hermanos» y la aclaración inclusiva en nota.
  - «Sírvanse unos a otros» refleja el mandato recíproco sin perder la relación con δουλεύω.
  - La puntuación reproduce la cadencia del griego con una pausa fuerte tras «hermanos» y un contraste claro antes de la cláusula final.
