translation:
  language: es
  text: No lleguemos a ser vanagloriosos[a], provocándonos unos a otros, envidiándonos unos a otros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vanidosos». El término griego denota estar movido por una gloria vacía o por autoimportancia.
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ γινώμεθα
  english_pob_choice: Let us not become
  chosen_spanish: No lleguemos a ser
  alternatives_spanish:
  - No seamos
  - No nos hagamos
  lexicon: BDAG
  rationale: μή con subjuntivo de primera persona plural expresa una exhortación prohibitiva. «No lleguemos a ser» conserva el matiz ingressivo de γίνομαι mejor que un simple estatismo («no seamos»), sin sonar forzado en español.
- source_word: κενόδοξοι
  english_pob_choice: conceited
  chosen_spanish: vanidosos
  alternatives_spanish:
  - con la vana gloria
  - presumidos
  - concebidos
  lexicon: BDAG
  rationale: κενόδοξος denota estar impulsado por gloria vacía o autoimportancia infundada. «Vanidosos» comunica bien la idea de una autoexaltación vacía en español natural; se evita «vanagloriosos» como forma más marcada y menos transparente para lectura general. La nota conserva la alternativa más etimológica del inglés POB («vainglorious») mediante «vanidosos» con matiz de vaciedad.
- source_word: ἀλλήλους
  english_pob_choice: one another
  chosen_spanish: unos a otros
  alternatives_spanish:
  - los unos a los otros
  - entre sí
  lexicon: BDAG
  rationale: Pronombre recíproco estándar en español. «Unos a otros» mantiene el tono formal y refleja con claridad la reciprocidad del griego.
- source_word: προκαλούμενοι
  english_pob_choice: provoking
  chosen_spanish: provocándonos
  alternatives_spanish:
  - desafiándonos
  - irritándonos
  lexicon: BDAG
  rationale: El participio describe la acción recíproca que brota de la vanidad. «Provocándonos» conserva el sentido amplio de incitar, retar o estimular a conflicto, sin limitarlo a mera molestia.
- source_word: ἀλλήλοις
  english_pob_choice: one another
  chosen_spanish: unos a otros
  alternatives_spanish:
  - entre sí
  - recíprocamente
  lexicon: BDAG
  rationale: El dativo recíproco se vierte idiomáticamente como «unos a otros». Se preserva así la coordinación paralela con el participio siguiente.
- source_word: φθονοῦντες
  english_pob_choice: envying
  chosen_spanish: envidiándonos
  alternatives_spanish:
  - teniéndonos envidia
  - envidiando a los demás
  lexicon: BDAG
  rationale: φθονέω significa sentir envidia hacia otro. «Envidiándonos» reproduce la reciprocidad del griego y mantiene el paralelismo participial con «provocándonos».
theological_decisions:
- issue: Relación de los participios con la exhortación principal
  english_pob_reading: 'The participles are rendered as attendant descriptions of what conceit produces: ''provoking one another, envying one another.'''
  chosen_spanish_reading: 'Los participios se traducen como descripciones concomitantes de lo que produce la vanidad: «provocándonos unos a otros, envidiándonos unos a otros».'
  alternative_spanish_readings:
  - 'Podrían leerse como ampliaciones casi imperativas: «No lleguemos a ser vanidosos al provocarnos unos a otros y envidiarnos unos a otros».'
  rationale: La estructura griega presenta κενόδοξοι como predicado principal tras γινώμεθα, mientras que los participios describen conductas asociadas. La traducción preserva esa relación sintáctica sin forzar una conexión lógica más específica de la que el texto exige.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión textual y no resolverla de antemano.'
translation_notes:
  revision_awareness: 'Coincide con el pasaje griego SBLGNT y con la auditoría inglesa: la lectura principal es exhortativa, con participios de acción concomitante; no se registran revisiones aplicadas en la fuente auditada.'
  spanish_consistency_notes:
  - Se mantiene «unos a otros» para ambas ocurrencias de ἀλλήλους/ἀλλήλοις, reflejando la reciprocidad del griego y la coordinación paralela del verso.
  - Se evitó «Cristo»/«Mesías» porque el versículo no contiene ese vocabulario.
  - Se eligió un español natural pero formal, sin suavizar la fuerza moral negativa de κενόδοξοι.
  - La nota al pie conserva la alternativa léxica relevante del POB inglés y explica la base semántica del término griego.
