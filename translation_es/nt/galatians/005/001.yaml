revisions:
- from: Para libertad el Mesías nos libertó[a]; por tanto, permanezcan firmes[b], y no se dejen someter otra vez a un yugo de esclavitud.
  to: Para ser libres, el Mesías nos hizo libres[a]; por tanto, permanezcan firmes y no otra vez se sometan[b] a un yugo de esclavitud.
  rationale: Se ajusta la apertura a un español idiomático («Para ser libres») sin perder la finalidad destacada por el griego y por la auditoría inglesa; se reemplaza «nos libertó» por «nos hizo libres» para mayor naturalidad y mejor eco con «libres»; y se corrige la nota b para que refleje la alternativa lexical documentada para ἐνέχεσθε. No se requiere adjudicación adicional porque son mejoras claras de estilo y alineación, no una disputa textual o doctrinal compleja.
