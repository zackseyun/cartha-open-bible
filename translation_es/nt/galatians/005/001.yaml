base_translation:
  language: en
  yaml_path: translation/nt/galatians/005/001.yaml
  text: For freedom Messiah set us free[a]; therefore stand firm[b], and do not again be held by a yoke of slavery.
  footnotes:
  - marker: a
    text: Or, 'In freedom Messiah has set us free.' The opening dative phrase is compressed and can be understood in more than one closely related way.
    reason: alternative_reading
  - marker: b
    text: Traditional English often has 'do not be entangled again with a yoke of slavery.' The Greek verb can carry the sense of becoming subject to or ensnared by something.
    reason: lexical_alternative
