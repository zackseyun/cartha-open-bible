    changes_summary: 'Changed ''the Messiah'' to ''Christ'' for more standard formal register and consistency with the Greek proper name Χριστός; adjusted word order from ''be held again'' to ''again be held'' for more natural English while preserving the sense of ἐνέχεσθε. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: Para ser libres, el Mesías nos hizo libres[a]; por tanto, permanezcan firmes y no otra vez se sometan[b] a un yugo de esclavitud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «En libertad el Mesías nos hizo libres». La frase inicial en dativo está comprimida y puede entenderse de más de una manera estrechamente relacionada.'
    reason: alternative_reading
  - marker: b
    text: 'Tradicionalmente: «no se enreden otra vez con un yugo de esclavitud». El verbo griego puede comunicar la idea de quedar sujetos a algo o enredados en ello.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τῇ ἐλευθερίᾳ
  english_pob_choice: For freedom
  chosen_spanish: Para libertad
  alternatives_spanish:
  - En libertad
  - Para ser libres
  lexicon: BDAG
  rationale: La frase dativa está comprimida y puede expresar finalidad o resultado. «Para libertad» conserva la fuerza final/propósito y mantiene el paralelismo con el verbo de liberar.
- source_word: Χριστός
  english_pob_choice: Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Aquí Χριστός funciona como título, no como simple nombre propio. «Mesías» preserva el sentido teológico e histórico-judaico que el auditor inglés documenta.
- source_word: ἠλευθέρωσεν
  english_pob_choice: set us free
  chosen_spanish: nos libertó
  alternatives_spanish:
  - nos hizo libres
  - nos liberó
  lexicon: BDAG
  rationale: El verbo σημαίνει liberar/hacer libre. «Nos libertó» es natural en español y mantiene la relación léxica con ἐλευθερία al inicio del versículo.
- source_word: στήκετε
  english_pob_choice: stand firm
  chosen_spanish: permanezcan firmes
  alternatives_spanish:
  - estén firmes
  - manténganse firmes
  lexicon: BDAG
  rationale: El imperativo presente exhorta a una firmeza continua. «Permanezcan firmes» expresa esa permanencia de forma clara y digna en español.
- source_word: οὖν
  english_pob_choice: therefore
  chosen_spanish: por tanto
  alternatives_spanish:
  - así que
  - entonces
  lexicon: BDAG
  rationale: Marca inferencia lógica. «Por tanto» comunica con claridad la conclusión que Pablo extrae de la afirmación previa.
- source_word: ζυγῷ δουλείας
  english_pob_choice: a yoke of slavery
  chosen_spanish: un yugo de esclavitud
  alternatives_spanish:
  - un yugo de servidumbre
  - un yugo de esclavización
  lexicon: BDAG
  rationale: ζυγός conserva la metáfora agrícola de sujeción; δουλεία tiene fuerza de esclavitud/bondaje. «Esclavitud» preserva mejor la oposición fuerte con libertad que «servidumbre».
- source_word: ἐνέχεσθε
  english_pob_choice: be held
  chosen_spanish: se dejen someter
  alternatives_spanish:
  - queden sujetos
  - se vean envueltos
  lexicon: BDAG
  rationale: El verbo puede implicar quedar sujeto o atrapado por algo. «Se dejen someter» refleja la pasividad y la idea de quedar bajo dominio, sin perder la imagen del yugo.
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  - nuevamente
  lexicon: BDAG
  rationale: Adverbio simple de repetición/retorno a un estado previo. «Otra vez» es claro y idiomático en español.
theological_decisions:
- issue: Cómo traducir Χριστός en un versículo donde funciona como título mesiánico
  english_pob_reading: Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: La lectura inglesa documentada privilegia el título para conservar su contenido. En español, «Mesías» comunica mejor ese valor que el uso heredado de «Cristo» como nombre casi fijo.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
- issue: Qué fuerza dar a δουλεία en contraste con libertad
  english_pob_reading: slavery
  chosen_spanish_reading: esclavitud
  alternative_spanish_readings:
  - servidumbre
  - cautiverio
  rationale: El contexto contrasta libertad con su opuesto de manera fuerte y jurídica. «Esclavitud» conserva esa intensidad mejor que un término más suave o abstracto.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος family; original-language primacy'
translation_notes:
  revision_awareness: El audit trail inglés revisó la traducción varias veces entre «the Messiah» y «Christ», y finalmente restauró «Messiah» por fidelidad doctrinal a Χριστός como título. También ajustó el orden adverbial en la cláusula final para mantener naturalidad sin cambiar el sentido. La presente versión sigue esa última decisión teológica y mantiene la fuerza metafórica de «yugo de esclavitud».
  spanish_consistency_notes:
  - Se mantuvo «Mesías» para Χριστός, de acuerdo con la preferencia doctrinal del proyecto para títulos mesiánicos.
  - Se usó «esclavitud» para δουλεία por su mayor fuerza semántica frente a «servidumbre».
  - La estructura de la primera cláusula conserva la ambigüedad comprimida del dativo griego mediante una nota breve y anclada.
  - El tono es formal y publicable, sin calcos rígidos ni archaísmos innecesarios.
