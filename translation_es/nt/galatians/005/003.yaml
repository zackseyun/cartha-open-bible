revisions:
- from: Y doy testimonio además a todo hombre que se circuncida[a][b], que está obligado a guardar toda la ley[c].
  to: Y testifico de nuevo a todo hombre[a] que recibe la circuncisión[b], que está obligado a guardar toda la ley[c].
  rationale: Se reemplazó «doy testimonio además» por «testifico de nuevo» para reflejar con precisión δὲ + πάλιν y mejorar la naturalidad del español. Se ajustó «que se circuncida» a «que recibe la circuncisión» para alinearse mejor con la decisión auditada en inglés y evitar una reflexividad potencialmente más fuerte de la que exige el participio griego. Se conservaron las notas esenciales con redacción pulida.
