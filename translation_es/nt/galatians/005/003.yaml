base_translation:
  language: en
  yaml_path: translation/nt/galatians/005/003.yaml
  text: And I testify again to every man who receives circumcision that he is obligated to keep the whole law[a][b][c].
  footnotes:
  - marker: a
    text: Or 'to every person.' The Greek says 'every man' with a representative/generic sense.
    reason: lexical_alternative
  - marker: b
    text: Or 'who is circumcised' or 'who lets himself be circumcised.' The Greek participle can be rendered in several close ways; the context favors one submitting to circumcision in this dispute.
    reason: alternative_reading
  - marker: c
    text: Literally 'is a debtor'; that is, he is under obligation.
    reason: lexical_alternative
