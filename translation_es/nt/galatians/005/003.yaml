translation:
  language: es
  text: Y testifico de nuevo a todo hombre[a] que recibe la circuncisión[b], que está obligado a guardar toda la ley[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a toda persona». El griego dice «a todo hombre» con sentido representativo o genérico.
    reason: lexical_alternative
  - marker: b
    text: O «que es circuncidado» o «que se deja circuncidar». El participio griego puede traducirse de varias maneras cercanas; el contexto favorece a quien se somete a la circuncisión en esta controversia.
    reason: alternative_reading
  - marker: c
    text: Literalmente «es deudor»; es decir, está bajo obligación.
    reason: lexical_alternative
lexical_decisions:
- source_word: μαρτύρομαι
  english_pob_choice: I testify
  chosen_spanish: doy testimonio
  alternatives_spanish:
  - testifico
  - doy testimonio solemnemente
  - declaro
  lexicon: BDAG
  rationale: μαρτύρομαι expresa una afirmación solemne y personal. «Doy testimonio» conserva ese peso formal en español sin sonar arcaico; «testifico» sería viable, pero «doy testimonio» resulta más natural y transparente.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: además
  alternatives_spanish:
  - y
  - ahora
  - pero
  lexicon: BDAG
  rationale: Aquí δέ enlaza con continuidad y refuerzo discursivo. «Además» comunica bien el añadido retórico de Pablo sin introducir una oposición que el contexto no exige.
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: además
  alternatives_spanish:
  - otra vez
  - de nuevo
  - una vez más
  lexicon: BDAG
  rationale: πάλιν marca repetición o renovada insistencia. En este contexto, «además» transmite mejor la reiteración enfática en español y evita una redundancia poco natural con «doy testimonio».
- source_word: παντὶ ἀνθρώπῳ
  english_pob_choice: to every man
  chosen_spanish: a todo hombre
  alternatives_spanish:
  - a toda persona
  - a todos
  - a cada hombre
  lexicon: BDAG
  rationale: El griego usa un singular distributivo masculino con valor representativo. «A todo hombre» conserva la forma fuente y la fuerza general; la nota aclara el sentido genérico para no ocultar la huella del original.
- source_word: περιτεμνομένῳ
  english_pob_choice: who receives circumcision
  chosen_spanish: que se circuncida
  alternatives_spanish:
  - que recibe la circuncisión
  - que es circuncidado
  - que se deja circuncidar
  lexicon: BDAG
  rationale: El participio presente sugiere a la persona que entra en el acto de circuncidarse en este debate. «Que se circuncida» es natural en español y mantiene la idea de participación activa sin añadir una interpretación más fuerte que la del griego.
- source_word: ὀφειλέτης
  english_pob_choice: obligated
  chosen_spanish: está obligado
  alternatives_spanish:
  - es deudor
  - queda obligado
  - está bajo obligación
  lexicon: BDAG
  rationale: ὀφειλέτης designa a quien tiene una obligación/deuda. «Está obligado» traduce con claridad el valor jurídico-covenantal del término sin sugerir una deuda meramente financiera.
- source_word: ὅλον τὸν νόμον
  english_pob_choice: the whole law
  chosen_spanish: toda la ley
  alternatives_spanish:
  - la ley completa
  - la ley entera
  - todo el ley
  lexicon: BDAG
  rationale: La expresión enfatiza totalidad. «Toda la ley» es idiomática en español y preserva el alcance total que Pablo exige aquí.
- source_word: ποιῆσαι
  english_pob_choice: to keep
  chosen_spanish: guardar
  alternatives_spanish:
  - hacer
  - observar
  - cumplir
  lexicon: BDAG
  rationale: Aunque el verbo significa literalmente «hacer», con νόμος el sentido es cumplir u observar. «Guardar» comunica bien la obediencia requerida por la ley y es claro en español bíblico contemporáneo.
theological_decisions:
- issue: Alcance de la advertencia de Pablo sobre la circuncisión y la obligación a la ley
  english_pob_reading: Paul refers to a person who submits to circumcision as a requirement within the Galatian controversy, thereby placing himself under obligation to keep the whole law.
  chosen_spanish_reading: Pablo se refiere a quien se somete a la circuncisión como requisito en la controversia de Galacia, colocándose así bajo la obligación de guardar toda la ley.
  alternative_spanish_readings:
  - Pablo habla de cualquier varón circuncidado, incluso de los circuncidados en la infancia.
  - Pablo se refiere solo al rito físico, sin implicar obligación legal adicional.
  rationale: El participio presente y el contexto inmediato de 5:2 apuntan a quienes consideran la circuncisión como exigencia religiosa. La traducción mantiene esa referencia contextual sin ampliar indebidamente el sujeto ni diluir la fuerza legal de la afirmación.
  doctrine_reference: Translation philosophy §§1, 3, 4
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el pasaje quedó estable tras la última pasada y el cotejo reportó alta concordancia con observaciones menores.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se evitó «Cristo» porque el versículo no contiene Χριστός.
  - «Ley» se conserva para νόμος siguiendo el uso paulino y el audit trail en inglés.
  - «Circuncida» se eligió para reflejar el participio presente con matiz de acción/participación en el debate, no solo estado étnico o pasado ritual.
