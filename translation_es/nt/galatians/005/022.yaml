    issue: Rendición poco precisa de χρηστότης
    rationale: El borrador usa «bondad» para χρηστότης, pero el rastro POB lo entiende como «kindness». En español, «amabilidad» o «benignidad» preserva mejor ese matiz relacional.
  - severity: medium
    issue: Rendición poco natural de ἀγαθωσύνη
    rationale: «Benevolencia» para ἀγαθωσύνη fue elegida para evitar repetición, pero desplaza el sentido hacia benevolencia activa y no refleja tan directamente «goodness». «Bondad» es más fiel y natural.
  - severity: low
    issue: Duplicación en alternativas de μακροθυμία
    rationale: En las decisiones léxicas aparece «longanimidad» dos veces. No afecta el texto bíblico, pero conviene corregir en metadatos editoriales.
  revised_spanish_text: Pero el fruto del Espíritu es amor, gozo, paz, paciencia, amabilidad, bondad, fe[a].
  revised_footnotes:
  - marker: a
    text: O «fidelidad». El griego pistis puede denotar fe, confianza o fidelidad; el texto principal sigue la decisión del proyecto de traducirlo como «fe», mientras preserva «fidelidad» como alternativa legítima en esta lista de virtudes.
    reason: alternative_reading
