translation:
  language: es
  text: Pero el fruto del Espíritu es amor, gozo, paz, paciencia, amabilidad, bondad, fe[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fidelidad». El griego pistis puede denotar fe, confianza o fidelidad; el texto principal sigue la decisión del proyecto de traducirlo como «fe», mientras preserva «fidelidad» como alternativa legítima en esta lista de virtudes.
    reason: alternative_reading
lexical_decisions:
- source_word: Ὁ δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Mas
  - Y
  lexicon: BDAG
  rationale: La conjunción adversativa debe conservar el contraste con la lista anterior de las obras de la carne. En español, «Pero» es la opción más natural y clara al inicio de la cláusula.
- source_word: καρπὸς
  english_pob_choice: fruit
  chosen_spanish: fruto
  alternatives_spanish:
  - fruta
  - producto
  - resultado
  lexicon: BDAG
  rationale: Se mantiene la metáfora singular de un solo «fruto», no «frutos», porque el griego presenta estas virtudes como un conjunto unificado.
- source_word: τοῦ πνεύματός
  english_pob_choice: of the Spirit
  chosen_spanish: del Espíritu
  alternatives_spanish:
  - del espíritu
  lexicon: BDAG
  rationale: Se capitaliza «Espíritu» porque el contexto paulino inmediato apunta al Espíritu Santo, en contraste con la carne.
- source_word: ἀγάπη
  english_pob_choice: love
  chosen_spanish: amor
  alternatives_spanish:
  - caridad
  lexicon: BDAG
  rationale: «Amor» es la equivalencia moderna y bíblicamente transparente; «caridad» suena más eclesiástico o arcaico en español actual.
- source_word: χαρά
  english_pob_choice: joy
  chosen_spanish: gozo
  alternatives_spanish:
  - alegría
  lexicon: BDAG
  rationale: «Gozo» conserva el tono bíblico y sostiene bien la serie de virtudes; «alegría» sería posible, pero puede sonar más circunstancial.
- source_word: εἰρήνη
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - bienestar
  - armonía
  lexicon: BDAG
  rationale: «Paz» es el equivalente normal y mantiene tanto la dimensión interpersonal como la interior sin añadir especificación innecesaria.
- source_word: μακροθυμία
  english_pob_choice: patience
  chosen_spanish: paciencia
  alternatives_spanish:
  - longanimidad
  - longanimidad
  lexicon: BDAG
  rationale: Se usa la forma clara y contemporánea «paciencia». «Longanimidad» es más técnica o tradicional y menos accesible.
- source_word: χρηστότης
  english_pob_choice: kindness
  chosen_spanish: bondad
  alternatives_spanish:
  - amabilidad
  - benignidad
  lexicon: BDAG
  rationale: El griego puede abarcar una disposición amable y benévola; en español, «bondad» ofrece una cobertura amplia y digna dentro de la lista de virtudes.
- source_word: ἀγαθωσύνη
  english_pob_choice: goodness
  chosen_spanish: benevolencia
  alternatives_spanish:
  - bondad
  - rectitud
  lexicon: BDAG
  rationale: Para evitar repetir «bondad» y reflejar el matiz activo de benevolencia moral, se elige «benevolencia». Esta opción intenta distinguir el término del anterior sin salir del campo semántico.
- source_word: πίστις
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - fidelidad
  - confianza
  lexicon: BDAG
  rationale: Se mantiene la decisión doctrinal y lexical del proyecto de traducir πίστις como «fe» por defecto. En esta lista de virtudes también podría leerse «fidelidad», por lo que se preserva la tensión con una nota.
theological_decisions:
- issue: Referente de πνεῦμα
  english_pob_reading: Holy Spirit
  chosen_spanish_reading: Espíritu Santo
  alternative_spanish_readings:
  - espíritu humano
  rationale: El contraste con «la carne» en Gálatas 5 y el argumento paulino favorecen que el referente sea el Espíritu Santo y no el espíritu humano.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Sentido de πίστις en una lista de virtudes
  english_pob_reading: faith
  chosen_spanish_reading: fe
  alternative_spanish_readings:
  - fidelidad
  rationale: Se conserva la lectura por defecto del proyecto, pero se reconoce que en este contexto también es defendible el sentido de «fidelidad», especialmente por la proximidad a otras cualidades éticas.
  doctrine_reference: 'Contested terms: πίστις'
translation_notes:
  revision_awareness: Se revisó el texto frente al audit trail en inglés y al griego SBLGNT. No se detectaron revisiones textuales que requirieran cambios adicionales; se mantuvieron las decisiones clave sobre el contraste adversativo, el singular metafórico de «fruto», el referente de «Espíritu» y la tensión semántica de πίστις.
  spanish_consistency_notes:
  - Se mantuvo una sintaxis breve y bíblica, sin calco rígido del inglés.
  - Se evitó «SEÑOR» porque el versículo no contiene el nombre divino explícito.
  - «Bondad» y «benevolencia» se diferenciaron para no colapsar dos términos griegos vecinos.
  - La nota sobre πίστις preserva la ambigüedad documentada por el proyecto sin resolverla de forma absoluta.
