review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura y el argumento del griego: contraste enfático de ἐγώ, vocativo ἀδελφοί, doble ἔτι, pasiva de διώκομαι y conclusión inferencial con ἄρα. Sin embargo, dos elecciones principales se apartan innecesariamente del rastro auditado inglés y de la mejor claridad fuente-destino en español: σκάνδαλον se vierte mejor aquí como «ofensa» en el texto principal, conservando «piedra de tropiezo» como alternativa; y la nota sobre ἄρα («O “por tanto”») no preserva una alternativa significativa del expediente inglés, que documenta la nota alternativa para σκάνδαλον, no para ἄρα.'
  spanish_quality_summary: El español es natural y digno, pero «el escándalo de la cruz» suena menos preciso en registro bíblico actual que «la ofensa de la cruz» y puede sugerir principalmente ‘indignación pública’ o ‘escena escandalosa’ en vez del carácter ofensivo/provocador del mensaje de la cruz. «Ha quedado anulado» es aceptable y claro. El resto del versículo lee bien.
  glossary_alignment: 'La terminología general está alineada: «hermanos», «circuncisión», «cruz». No hay conflicto con términos troncales del proyecto. La decisión «escándalo» para σκάνδαλον no contradice una regla fija del glosario, pero sí se aleja del razonamiento documentado de la POB inglesa, que prefirió «offense» como sentido principal y dejó «stumbling block» como alternativa. Conviene reflejar eso en español con «ofensa» principal y «piedra de tropiezo» en nota.'
  issues:
  - severity: medium
    issue: «escándalo» para σκάνδαλον en el texto principal
    rationale: Aunque léxicamente posible, en este contexto paulino la POB inglesa documentó como sentido principal ‘offense’, no ‘scandal’. En español «ofensa» comunica mejor la provocación/rechazo que produce la cruz, mientras que «escándalo» puede desviar el sentido.
  - severity: low
    issue: Nota b sobre «Entonces»
    rationale: La nota «O “por tanto”» no corresponde a una alternativa preservada como significativa en el expediente auditado y añade una nota innecesaria. Las notas deben reservarse para alternativas semánticamente relevantes o documentadas.
  - severity: low
    issue: Anclaje de notas mejorable
    rationale: La alternativa de σκάνδαλον debe quedar anclada al término correspondiente en el texto principal; al quitar la nota de ἄρα, conviene renumerar para mantener marcadores únicos y ordenados.
  revised_spanish_text: Pero yo[a], hermanos, si todavía predico la circuncisión, ¿por qué todavía soy perseguido? Entonces la ofensa[b] de la cruz ha quedado anulada.
