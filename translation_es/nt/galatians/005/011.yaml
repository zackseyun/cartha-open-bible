    reason: lexical_alternative
  - marker: b
    text: O «la piedra de tropiezo de la cruz».
    reason: alternative_reading
  revision_rationale: Se cambia «escándalo» por «ofensa» para ajustarse mejor al sentido principal documentado para σκάνδαλον en el expediente inglés y para mayor precisión semántica en español. Se elimina la nota sobre «Entonces» por no ser necesaria ni especialmente significativa en este contexto, y se conserva la alternativa relevante «piedra de tropiezo» como única nota semántica adicional.
