translation:
  language: es
  text: Pero yo[a], hermanos, si todavía predico la circuncisión, ¿por qué todavía soy perseguido? Entonces la ofensa[b] de la cruz ha quedado anulada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hermanos y hermanas»; el griego ἀδελφοί puede dirigirse a un grupo mixto.
    reason: lexical_alternative
  - marker: b
    text: O «la piedra de tropiezo de la cruz».
    reason: alternative_reading
lexical_decisions:
- source_word: ἐγὼ
  english_pob_choice: I
  chosen_spanish: yo
  alternatives_spanish:
  - yo mismo
  - yo, por mi parte
  lexicon: uso normal del pronombre personal griego
  rationale: Se mantiene el énfasis del pronombre explícito ἐγώ con yo, conservando el contraste personal de Pablo sin sobretraducirlo.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - hermanas y hermanos
  - hermanos/as
  lexicon: BDAG
  rationale: ἀδελφοί es vocativo plural masculino; en español, hermanos conserva la forma del texto y funciona naturalmente como vocativo eclesial. La posible inclusión de mujeres queda indicada en la nota.
- source_word: περιτομὴν
  english_pob_choice: circumcision
  chosen_spanish: circuncisión
  alternatives_spanish:
  - la circuncisión
  - el rito de la circuncisión
  lexicon: BDAG
  rationale: Es el equivalente directo y auditable de περιτομή. En este contexto conserva el debate paulino sobre la práctica/obligación de la circuncisión sin añadir paráfrasis.
- source_word: ἔτι
  english_pob_choice: still
  chosen_spanish: todavía
  alternatives_spanish:
  - aún
  - todavía lo
  lexicon: BDAG
  rationale: Todavía reproduce bien el valor temporal y lógico de ἔτι en ambas ocurrencias, con un registro natural en español y sin perder el argumento hipotético de Pablo.
- source_word: κηρύσσω
  english_pob_choice: am still preaching
  chosen_spanish: predico
  alternatives_spanish:
  - sigo predicando
  - anuncio
  lexicon: BDAG
  rationale: El presente simple en español expresa adecuadamente el valor progresivo del presente griego en este contexto. Predicar mantiene el carácter público y proclamatorio de κηρύσσω en el discurso paulino.
- source_word: διώκομαι
  english_pob_choice: am still being persecuted
  chosen_spanish: soy perseguido
  alternatives_spanish:
  - sigo siendo perseguido
  - me persiguen
  lexicon: BDAG
  rationale: Soy perseguido conserva la voz pasiva del griego y el sentido de hostilidad religiosa. Se evita una paráfrasis más libre para mantener el paralelismo argumentativo del versículo.
- source_word: ἄρα
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - por tanto
  - así que
  - luego
  lexicon: BDAG
  rationale: ἄρα introduce una conclusión inferida; Entonces reproduce de manera natural y formal ese enlace lógico, en línea con la revisión inglesa más directa.
- source_word: κατήργηται
  english_pob_choice: has been removed
  chosen_spanish: ha quedado anulado
  alternatives_spanish:
  - ha sido anulado
  - ha sido abolido
  - ha sido dejado sin efecto
  lexicon: BDAG
  rationale: El perfecto pasivo expresa un estado resultante. Anulado comunica bien la idea de quedar sin eficacia operativa, sin añadir una abstracción excesiva ni perder la fuerza del verbo καταργέω.
- source_word: σκάνδαλον
  english_pob_choice: offense
  chosen_spanish: escándalo
  alternatives_spanish:
  - ofensa
  - obstáculo
  - piedra de tropiezo
  lexicon: BDAG
  rationale: Aunque la POB inglesa eligió offense, en español escándalo refleja con fuerza la reacción de rechazo y tropiezo que provoca la cruz en este contexto paulino. Se mantiene el término tradicionalmente reconocible sin borrar la tensión teológica.
- source_word: σταυροῦ
  english_pob_choice: cross
  chosen_spanish: cruz
  alternatives_spanish:
  - madero
  - patíbulo
  lexicon: BDAG
  rationale: Cruz es el equivalente estándar y teológicamente central de σταυρός en Pablo. Es la forma más clara y reconocible para el lector hispano, sin añadir interpretación extra.
theological_decisions:
- issue: Vocativo plural masculino en una audiencia posiblemente mixta
  english_pob_reading: brothers
  chosen_spanish_reading: hermanos
  alternative_spanish_readings:
  - hermanos y hermanas
  - hermanas y hermanos
  rationale: Se conserva la forma masculina del vocativo como reflejo del griego y de la decisión inglesa de mantener brothers en el texto principal. La posible referencia inclusiva se aclara en nota para no neutralizar el término fuente.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Sentido de σκάνδαλον τοῦ σταυροῦ
  english_pob_reading: the offense of the cross
  chosen_spanish_reading: el escándalo de la cruz
  alternative_spanish_readings:
  - la ofensa de la cruz
  - la piedra de tropiezo de la cruz
  rationale: La cruz es presentada como algo que provoca rechazo y tropiezo. Escándalo conserva esa tensión en español y mantiene la ambivalencia semántica de σκάνδαλον sin diluirla. La alternativa más literal queda atestiguada en la nota.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 6
- issue: Valor lógico de ἄρα
  english_pob_reading: Then
  chosen_spanish_reading: Entonces
  alternative_spanish_readings:
  - por tanto
  - así que
  rationale: Se adopta una conclusión directa y formal, coherente con la revisión inglesa que prefirió una conexión más directa para ἄρα. Entonces mantiene la inferencia sin sonar demasiado coloquial.
  doctrine_reference: DOCTRINE.md §Translation philosophy 2
translation_notes:
  revision_awareness: La versión inglesa revisada cambió 'In that case' por 'Then' para reflejar ἄρα de manera más directa y formal. La presente redacción española sigue esa misma dirección con Entonces, y conserva la tensión de σκάνδαλον con escándalo, mientras la nota ofrece la alternativa más literal piedra de tropiezo. No se introdujeron cambios doctrinales adicionales respecto del audit trail.
  spanish_consistency_notes:
  - Se mantiene el registro paulino directo y argumentativo del versículo.
  - Se conserva la forma masculina del vocativo con aclaración en nota para posible audiencia mixta.
  - Se evita el eufemismo en σκάνδαλον para no borrar la fuerza retórica de la cruz.
  - La sintaxis española reproduce la estructura condicional e inferencial del griego sin expandirla.
