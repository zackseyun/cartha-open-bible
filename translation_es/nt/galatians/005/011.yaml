revisions:
- from: Pero yo[a], hermanos, si todavía predico la circuncisión, ¿por qué todavía soy perseguido? Entonces[b] el escándalo[c] de la cruz ha quedado anulado.
  to: Pero yo[a], hermanos, si todavía predico la circuncisión, ¿por qué todavía soy perseguido? Entonces la ofensa[b] de la cruz ha quedado anulada.
  rationale: Se cambia «escándalo» por «ofensa» para ajustarse mejor al sentido principal documentado para σκάνδαλον en el expediente inglés y para mayor precisión semántica en español. Se elimina la nota sobre «Entonces» por no ser necesaria ni especialmente significativa en este contexto, y se conserva la alternativa relevante «piedra de tropiezo» como única nota semántica adicional.
