    text: O «Cristo Jesús». Aquí Χριστός se vierte como «Mesías» para conservar su valor de título.
    reason: alternative_reading
  - marker: b
    text: 'πίστις también puede traducirse como «fidelidad» o «confianza»; el texto principal sigue la opción por defecto del proyecto: «fe».'
    reason: lexical_alternative
  - marker: c
    text: O «la fe que está activa por medio del amor», «la fe que se expresa por medio del amor» o «la fe hecha efectiva por medio del amor».
    reason: lexical_alternative
  revision_rationale: 'La revisión mantiene el sentido del borrador pero ajusta el texto y las notas al expediente inglés y al griego: (1) restaura la nota de alternativas para πίστις, (2) concentra en otra nota las alternativas de ἐνεργουμένη, como en el POB inglés, y (3) mejora la naturalidad y precisión de la cláusula final con «obra por medio del amor». No requiere adjudicación adicional porque el asunto es de alineación editorial y estilo, no de incertidumbre textual o doctrinal grave.'
