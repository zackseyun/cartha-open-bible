translation:
  language: es
  text: Pues en Mesías Jesús ni la circuncisión ni la incircuncisión valen algo[a], sino la fe[b] que obra por medio del amor[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Cristo Jesús». Aquí Χριστός se vierte como «Mesías» para conservar su valor de título.
    reason: alternative_reading
  - marker: b
    text: 'πίστις también puede traducirse como «fidelidad» o «confianza»; el texto principal sigue la opción por defecto del proyecto: «fe».'
    reason: lexical_alternative
  - marker: c
    text: O «la fe que está activa por medio del amor», «la fe que se expresa por medio del amor» o «la fe hecha efectiva por medio del amor».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν Χριστῷ Ἰησοῦ
  english_pob_choice: in Messiah Jesus
  chosen_spanish: en Mesías Jesús
  alternatives_spanish:
  - en Cristo Jesús
  lexicon: BDAG
  rationale: Se conserva ἐν como «en», manteniendo la idea de unión o esfera relacional. Χριστός se vierte como «Mesías» siguiendo la decisión del POB inglés para el título, en vez de convertirlo automáticamente en nombre propio.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  lexicon: BDAG
  rationale: Introduce la razón o fundamento de lo anterior; «Porque» es natural en español y conserva el valor explicativo de γάρ.
- source_word: περιτομή
  english_pob_choice: circumcision
  chosen_spanish: circuncisión
  lexicon: BDAG
  rationale: Término léxico estándar. En Gálatas también funciona como marcador identitario y de pacto, pero «circuncisión» mantiene esa carga sin añadir explicación.
- source_word: τι ἰσχύει
  english_pob_choice: counts for anything
  chosen_spanish: tienen valor alguno
  alternatives_spanish:
  - importan en algo
  - cuentan para algo
  - tienen poder alguno
  lexicon: BDAG
  rationale: La expresión idiomática no alude a fuerza física sino a eficacia o relevancia práctica. «Tienen valor alguno» comunica de forma idiomática que ni la circuncisión ni la incircuncisión tienen peso decisivo aquí.
- source_word: ἀκροβυστία
  english_pob_choice: uncircumcision
  chosen_spanish: incircuncisión
  alternatives_spanish:
  - estar incircunciso
  - estado de incircuncisión
  lexicon: BDAG
  rationale: Se conserva el paralelismo con «circuncisión» mediante el sustantivo abstracto «incircuncisión», que refleja el contraste categorial del griego.
- source_word: ἀλλὰ
  english_pob_choice: but
  chosen_spanish: sino
  alternatives_spanish:
  - pero
  - más bien
  lexicon: BDAG
  rationale: Marca contraste fuerte con lo negado antes; «sino» es el equivalente más natural cuando la segunda cláusula reemplaza a la primera.
- source_word: πίστις
  english_pob_choice: faith
  chosen_spanish: la fe
  alternatives_spanish:
  - la fidelidad
  - la confianza
  lexicon: BDAG
  rationale: Se sigue el valor principal elegido por el POB inglés. Se conserva la amplitud semántica sin resolver de antemano el debate entre fe, fidelidad o confianza.
- source_word: δι’ ἀγάπης
  english_pob_choice: through love
  chosen_spanish: por el amor
  alternatives_spanish:
  - a través del amor
  - mediante el amor
  lexicon: BDAG
  rationale: διά con genitivo expresa medio o instrumento. «Por el amor» es natural en español y mantiene la relación de medio sin sobrerreformularla.
- source_word: ἐνεργουμένη
  english_pob_choice: working
  chosen_spanish: que actúa
  alternatives_spanish:
  - que obra
  - que está activa
  - que se hace efectiva
  lexicon: BDAG
  rationale: El participio presente medio/pasivo modifica a πίστις y puede entenderse como fe en acción. «Que actúa» preserva la fuerza verbal y evita cerrar la ambigüedad hacia una sola lectura técnica.
theological_decisions:
- issue: Rendering Χριστός as a title
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: Se mantiene la decisión del POB de traducir el título cuando funciona titularmente. Esto conserva el valor semántico de Χριστός sin depender de una forma eclesiástica fosilizada.
  doctrine_reference: 'DOCTRINE.md: Translate titles; preserve title/name distinction where supported by context'
- issue: Rendering πίστις amid lexical tension
  english_pob_reading: faith
  chosen_spanish_reading: fe
  alternative_spanish_readings:
  - fidelidad
  - confianza
  rationale: La base doctrinal del proyecto favorece «fe» en el texto principal, pero se preserva la amplitud del término griego. No se fuerza una resolución del debate teológico sobre si aquí predomina fe subjetiva, fidelidad o confianza.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for πίστις; Preserve theological tension rather than resolve it'
- issue: Relation of faith and love
  english_pob_reading: faith working through love
  chosen_spanish_reading: la fe que actúa por el amor
  alternative_spanish_readings:
  - la fe que obra por el amor
  - la fe activa por medio del amor
  - la fe expresándose por el amor
  rationale: La frase mantiene la idea de una fe operante mediada por el amor, sin convertirla en una paráfrasis interpretativa excesiva. La elección conserva tanto la acción de la fe como el medio expresado por διά.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than flattening participial constructions'
translation_notes:
  revision_awareness: 'Se ajustó el texto para anclar todos los marcadores de nota dentro de la traducción: [a] en «valor alguno», [b] en «actúa», y [c] en «amor». Se evitó crear notas sin anclaje y se mantuvo la decisión del POB inglés de traducir Χριστός como «Mesías».'
  spanish_consistency_notes:
  - Se usa «Mesías» en lugar de «Cristo» para seguir la política del proyecto cuando Χριστός funciona como título.
  - Se mantuvo el paralelismo «circuncisión/incircuncisión» con sustantivos abstractos.
  - «Porque» refleja adecuadamente γάρ como conector explicativo.
  - «La fe que actúa» conserva la fuerza verbal del participio ἐνεργουμένη sin sobreinterpretarlo.
  - La puntuación sigue el español moderno y el sentido del griego de una sola proposición contrastiva.
