translation:
  language: es
  text: Porque la carne desea lo que está contra el Espíritu[a], y el Espíritu lo que está contra la carne; pues estos se oponen entre sí[b], para que no hagan lo que quieren hacer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la naturaleza pecaminosa» para «la carne»; el término griego es σάρξ (sarx), y aquí Pablo lo usa con un sentido ético más amplio que el del cuerpo físico.
    reason: lexical_alternative
  - marker: b
    text: O «el espíritu» si se entiende como el espíritu humano y no como el Espíritu Santo.
    reason: alternative_reading
lexical_decisions:
- source_word: σάρξ
  english_pob_choice: the flesh
  chosen_spanish: la carne
  alternatives_spanish:
  - la naturaleza pecaminosa
  - la naturaleza humana caída
  lexicon: BDAG
  rationale: Conserva el término metafórico de Pablo sin resolverlo prematuramente en una paráfrasis interpretativa. En español, «carne» es la forma más directa y eclesialmente legible para σάρξ en este contexto ético.
- source_word: ἐπιθυμεῖ
  english_pob_choice: desires
  chosen_spanish: desea
  alternatives_spanish:
  - apetece
  - codicia
  - tiene deseos de
  lexicon: BDAG
  rationale: «Desea» comunica de manera natural el valor del verbo sin cargarlo con connotaciones demasiado sexuales o arcaicas. El matiz hostil queda expresado por la construcción siguiente con «contra».
- source_word: κατὰ τοῦ πνεύματος / κατὰ τῆς σαρκός
  english_pob_choice: what is against the Spirit / what is against the flesh
  chosen_spanish: lo que está contra el Espíritu / lo que está contra la carne
  alternatives_spanish:
  - contra el Espíritu / contra la carne
  - lo opuesto al Espíritu / lo opuesto a la carne
  lexicon: BDAG
  rationale: El griego expresa oposición con κατά + genitivo. En español, «lo que está contra» mantiene la fuerza relacional y evita un calco torpe como «desea contra».
- source_word: πνεῦμα
  english_pob_choice: the Spirit
  chosen_spanish: el Espíritu
  alternatives_spanish:
  - el espíritu
  lexicon: BDAG
  rationale: Aquí el contexto inmediato de Gálatas 5 favorece el Espíritu Santo como contraparte de la carne. Se capitaliza en español para reflejar esa lectura teológica contextual.
- source_word: ἀλλήλοις ἀντίκειται
  english_pob_choice: oppose each other
  chosen_spanish: se oponen entre sí
  alternatives_spanish:
  - están en oposición mutua
  - se contradicen entre sí
  lexicon: BDAG
  rationale: La forma reflexiva recíproca en español reproduce bien la mutualidad de ἀλλήλοις ἀντίκειται y sugiere oposición activa sin sobreexplicar el vínculo.
- source_word: ἵνα μὴ
  english_pob_choice: so that ... not
  chosen_spanish: para que no
  alternatives_spanish:
  - a fin de que no
  - con el resultado de que no
  lexicon: BDAG
  rationale: «Para que no» transmite la cláusula de propósito/resultado con naturalidad en español y conserva la finalidad práctica del conflicto descrito.
- source_word: ἃ ἐὰν θέλητε
  english_pob_choice: the things you want
  chosen_spanish: lo que quieren
  alternatives_spanish:
  - lo que deseen
  - las cosas que quieren
  - lo que ustedes quieran
  lexicon: BDAG
  rationale: El giro indefinido griego se rinde de forma idiomática como «lo que quieren». Se evita añadir un énfasis excesivo en «ustedes» que el griego no exige.
- source_word: ποιῆτε
  english_pob_choice: do
  chosen_spanish: hagan
  alternatives_spanish:
  - hagan eso
  - practiquen
  - realicen
  lexicon: BDAG
  rationale: «Hagan» sigue de cerca ποιέω con una formulación natural en español y mantiene la simplicidad del cierre del versículo.
theological_decisions:
- issue: Sentido de σάρξ en contexto paulino ético
  english_pob_reading: Retain 'flesh' in the main text rather than paraphrasing it as 'sinful nature.'
  chosen_spanish_reading: Mantener «carne» en el texto principal, no «naturaleza pecaminosa».
  alternative_spanish_readings:
  - la naturaleza pecaminosa
  - la naturaleza humana caída
  rationale: La guía doctrinal pide preservar la tensión lexicoteológica de σάρξ y documentar la alternativa en notas o decisiones, no incorporarla al texto principal. «Carne» conserva la metáfora paulina y evita cerrar el sentido en una glosa interpretativa.
  doctrine_reference: 'DOCTRINE.md: Contested terms — σάρξ'
- issue: Referente de πνεῦμα
  english_pob_reading: Translate as 'Spirit' (Holy Spirit) rather than 'spirit' (human spirit).
  chosen_spanish_reading: Traducir «Espíritu» con mayúscula en el texto principal.
  alternative_spanish_readings:
  - espíritu
  - el espíritu humano
  rationale: En Gálatas 5 el contraste entre carne y Espíritu apunta al Espíritu Santo en el marco argumental de Pablo. La mayúscula ayuda a comunicar esa lectura contextual sin eliminar la posibilidad documental de la otra.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; original-language primacy over translation tradition'
translation_notes:
  revision_awareness: 'Coincide con la última pasada revisada: no se requieren cambios respecto del audit trail inglés; se mantuvo la decisión de conservar la metáfora de «la carne» y de capitalizar «Espíritu» por el contexto inmediato de Gálatas 5.'
  spanish_consistency_notes:
  - Se mantuvo el paralelismo entre «la carne» y «el Espíritu» para preservar la estructura antitética del griego.
  - «Se oponen entre sí» refleja la reciprocidad de ἀλλήλοις sin forzar un tecnicismo.
  - Se eligió «lo que quieren» para representar el indefinido griego de manera natural en español.
  - Las notas a y b documentan las alternativas semánticas preservadas por el POB inglés.
