translation:
  language: es
  text: De aquí en adelante, que nadie me cause molestias[a], porque yo llevo en mi cuerpo las marcas de Jesús.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «marcas de esclavitud» o «marcas de pertenencia»; el término puede referirse a marcas corporales que identifican propiedad o lealtad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Τοῦ λοιποῦ
  english_pob_choice: From now on
  chosen_spanish: De aquí en adelante
  alternatives_spanish:
  - Desde ahora
  - En adelante
  - Por lo demás
  lexicon: BDAG
  rationale: La expresión funciona idiomáticamente como marcador temporal de cierre; «de aquí en adelante» conserva el sentido de inicio temporal sin sonar rígido ni anticuado.
- source_word: κόπους
  english_pob_choice: trouble
  chosen_spanish: molestias
  alternatives_spanish:
  - problemas
  - dificultades
  - fastidio
  lexicon: BDAG
  rationale: En la construcción κόπους παρέχειν, el sentido es causar aflicción, inconveniente o molestia. «Molestias» comunica bien la fuerza pragmática en español sin volverla demasiado coloquial.
- source_word: μοι μηδεὶς παρεχέτω
  english_pob_choice: let no one cause me
  chosen_spanish: que nadie me cause
  alternatives_spanish:
  - que nadie me dé
  - que nadie me provoque
  - que nadie me haga pasar
  lexicon: BDAG
  rationale: El imperativo negativo se expresa naturalmente con «que nadie...». «Causar» refleja παρέχω en este contexto como ocasionar algo a alguien, manteniendo el dativo μοι como objeto indirecto.
- source_word: στίγματα
  english_pob_choice: marks
  chosen_spanish: marcas
  alternatives_spanish:
  - señales
  - estigmas
  - marcas de hierro
  lexicon: BDAG
  rationale: «Marcas» es la opción más transparente y neutra para στίγματα. Evita fijar prematuramente si son cicatrices, señales de pertenencia o marcas de esclavitud/propiedad, tensión que el texto conserva.
- source_word: τοῦ Ἰησοῦ
  english_pob_choice: of Jesus
  chosen_spanish: de Jesús
  alternatives_spanish:
  - de Jesús pertenecientes a
  - para Jesús
  - propias de Jesús
  lexicon: BDAG
  rationale: Se conserva el genitivo simple sin explicitar una relación más estrecha de la que exige el texto. En español, «de Jesús» mantiene la ambigüedad significativa.
- source_word: ἐν τῷ σώματί μου
  english_pob_choice: on my body
  chosen_spanish: en mi cuerpo
  alternatives_spanish:
  - sobre mi cuerpo
  - en mi propio cuerpo
  lexicon: BDAG
  rationale: Aunque el inglés POB opta por «on my body» por idiomatismo, el griego dice literalmente «en mi cuerpo». En español, «en mi cuerpo» respeta mejor la preposición y sigue siendo natural.
- source_word: βαστάζω
  english_pob_choice: I bear
  chosen_spanish: llevo
  alternatives_spanish:
  - soporto
  - cargo
  - porto
  lexicon: BDAG
  rationale: «Llevo» reproduce con naturalidad la idea de portar o llevar algo visible sobre el cuerpo. «Soporto» introduciría una carga interpretativa de sufrimiento que no es obligatoria en el verbo.
theological_decisions:
- issue: Naturaleza de las στίγματα de Pablo
  english_pob_reading: Rendered neutrally as 'the marks of Jesus' without specifying whether these are literal scars, metaphorical signs of allegiance, or both.
  chosen_spanish_reading: «las marcas de Jesús» sin precisar si son cicatrices literales, marcas de pertenencia o ambas cosas.
  alternative_spanish_readings:
  - cicatrices de Jesús
  - marcas de pertenencia a Jesús
  - señales de su lealtad a Jesús
  rationale: El verso mantiene una tensión interpretativa deliberada. La traducción debe preservar esa ambigüedad en vez de resolverla a favor de una sola lectura.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El audit trail inglés no requirió cambios de revisión; la redacción española sigue esa lectura alta de acuerdo y conserva la misma ambigüedad interpretativa sin intensificarla.
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς según el criterio del proyecto.
  - Se usa «cuerpo» para σῶμα en sentido directo y físico.
  - Se evita «Cristo» porque el texto contiene el nombre propio, no el título χριστός.
  - La nota al pie conserva la alternativa lexical relevante sin sobreexplicar el texto principal.
