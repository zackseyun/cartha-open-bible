review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del griego: Τοῦ λοιποῦ como marcador temporal de cierre, κόπους παρέχειν como causar problemas/molestias, y στίγματα de forma neutra como «marcas». Sin embargo, la nota al pie se aparta del rastro auditado en inglés al introducir «marcas de esclavitud», que estrecha y desplaza el matiz de ownership/allegiance hacia una interpretación más fuerte que el original no exige.'
  spanish_quality_summary: El español es claro, natural y digno. «De aquí en adelante» funciona, aunque «Desde ahora» sería algo más conciso; no es necesario cambiarlo. «Que nadie me cause molestias» es comprensible, pero «molestias» puede sonar algo leve para el tono de Pablo; aun así, sigue siendo aceptable. El ajuste necesario está principalmente en la nota, para evitar sobreinterpretación y mejorar fidelidad terminológica.
  glossary_alignment: 'No hay conflictos con los términos base del proyecto: «Jesús» está bien, y no aparecen términos sensibles como Yahvé/Mesías/esclavo. La decisión «marcas de Jesús» preserva correctamente la neutralidad documentada para στίγματα. La excepción necesaria es corregir la glosa de la nota para alinearla con el inglés POB: «brand-marks» se puede reflejar como «marcas de marca» o mejor «marcas impresas/ marcas de propiedad», sin convertirlo en «marcas de esclavitud».'
  issues:
  - severity: medium
    issue: La nota al pie introduce «marcas de esclavitud»
    rationale: El audit trail inglés dice «brand-marks» y explica identificación de propiedad o lealtad. «Marcas de esclavitud» añade una especificación social-teológica más estrecha que el texto y la nota inglesa no obligan, y puede sesgar la interpretación.
  - severity: low
    issue: «Molestias» puede sonar algo débil
    rationale: κόπους en esta expresión significa causar problemas/trouble. «Molestias» es posible y natural, pero puede percibirse como menos fuerte que «problemas» o «dificultades». No exige cambio obligatorio.
  revised_spanish_text: De aquí en adelante, que nadie me cause molestias[a], porque yo llevo en mi cuerpo las marcas de Jesús.
  revised_footnotes:
  - marker: a
    text: O «marcas impresas»; el término puede referirse a marcas corporales que identifican propiedad o lealtad.
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel, natural y mantiene la neutralidad interpretativa de στίγματα. Se corrige únicamente la nota al pie para alinearla con la evidencia léxica y el audit trail inglés, evitando la sobreinterpretación de «marcas de esclavitud».
