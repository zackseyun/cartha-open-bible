review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del griego: exhortación a no cansarse en hacer el bien, promesa de cosechar en el tiempo debido, y condición de perseverar. También mantiene la diferenciación entre μὴ ἐγκακῶμεν y μὴ ἐκλυόμενοι. Sin embargo, la nota [a] no corresponde bien al alcance de τὸ καλὸν ποιοῦντες; el inglés auditado ofrece ''let us not lose heart in doing what is good'', mientras que la nota española actual solo alterna el complemento (''al hacer lo que es bueno'') y no recoge la alternativa principal del verbo ἐγκακέω.'
  spanish_quality_summary: El texto es claro, natural y digno en español. 'No nos cansemos de hacer el bien' y 'a su debido tiempo segaremos' son muy legibles. 'Si no desmayamos' funciona, aunque 'si no desfallecemos' o 'si no nos rendimos' también serían posibles; no hace falta cambiarlo. La única reparación necesaria es ajustar las notas para que representen fielmente el expediente auditado y no creen una alternativa incompleta.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen términos sensibles como Yahvé, Mesías, Espíritu o δοῦλος. Las decisiones léxicas principales ('hacer el bien', 'segaremos', 'desmayamos') son compatibles con el expediente inglés y con un español eclesial natural.
  issues:
  - severity: medium
    issue: La nota [a] no reproduce la alternativa documentada para μὴ ἐγκακῶμεν.
    rationale: El expediente inglés conserva como alternativa 'let us not lose heart in doing what is good'. La nota española actual solo ofrece 'al hacer lo que es bueno', que modifica la expresión de τὸ καλὸν ποιοῦντες pero omite la alternativa verbal principal ('no perdamos el ánimo' / 'no desmayemos'). Eso debilita la trazabilidad del razonamiento léxico.
  revised_spanish_text: Y no nos cansemos de hacer el bien[a], porque a su debido tiempo segaremos[b], si no desmayamos[c].
  revised_footnotes:
  - marker: a
    text: 'O: «no perdamos el ánimo al hacer lo que es bueno».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «en el tiempo oportuno».'
    reason: lexical_alternative
  - marker: c
    text: 'Lit.: «si no nos agotamos» o «si no desfallecemos».'
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal, que es fiel y natural, y se corrige únicamente la nota [a] para reflejar la alternativa auditada para ἐγκακέω junto con τὸ καλὸν ποιοῦντες. También se normalizan las razones de las notas como 'lexical_alternative' para mantener consistencia con el expediente inglés.
