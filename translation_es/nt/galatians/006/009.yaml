translation:
  language: es
  text: Y no nos cansemos de hacer el bien[a], porque a su debido tiempo segaremos[b], si no desmayamos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «al hacer lo que es bueno».'
    reason: alternative_reading
  - marker: b
    text: 'O: «en el tiempo oportuno».'
    reason: alternative_reading
  - marker: c
    text: 'Lit.: «si no nos agotamos» o «si no desfallecemos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸ καλὸν
  english_pob_choice: doing good
  chosen_spanish: hacer el bien
  alternatives_spanish:
  - hacer lo bueno
  - practicar el bien
  - hacer lo que es bueno
  lexicon: BDAG
  rationale: El sintagma articular con ποιέω funciona como una expresión ética idiomática. En español, «hacer el bien» transmite naturalmente la idea de obrar correctamente sin volverlo demasiado abstracto ni perder el valor moral del adjetivo καλόν.
- source_word: ποιοῦντες
  english_pob_choice: in doing
  chosen_spanish: hacer
  alternatives_spanish:
  - mientras hacemos
  - al hacer
  - en hacer
  lexicon: BDAG
  rationale: El participio presente se integra mejor en español como complemento verbal ligado a la exhortación. «Hacer» conserva la acción continua implícita sin sonar rígido.
- source_word: μὴ ἐγκακῶμεν
  english_pob_choice: let us not grow weary
  chosen_spanish: no nos cansemos
  alternatives_spanish:
  - no perdamos el ánimo
  - no desmayemos
  - no nos desanimemos
  lexicon: BDAG
  rationale: El verbo puede abarcar cansancio, desaliento o pérdida de ánimo. «No nos cansemos» mantiene la fuerza exhortativa y encaja con la imagen de perseverancia; la alternativa de perder el ánimo queda disponible como matiz cercano.
- source_word: καιρῷ ... ἰδίῳ
  english_pob_choice: in due time
  chosen_spanish: a su debido tiempo
  alternatives_spanish:
  - en el tiempo oportuno
  - en su propio tiempo
  - en el tiempo señalado
  lexicon: BDAG
  rationale: καιρός con ἴδιος señala un tiempo fijado o apropiado. «A su debido tiempo» expresa bien la idea de un momento oportuno y esperado, con una cadencia natural en español.
- source_word: θερίσομεν
  english_pob_choice: we will reap
  chosen_spanish: segaremos
  alternatives_spanish:
  - cosecharemos
  - recogeremos la cosecha
  - siegaremos
  lexicon: BDAG
  rationale: El futuro mantiene la metáfora agrícola. «Segaremos» conserva la imagen de la siega presente en el verbo griego y resulta comprensible en español bíblico; «cosecharemos» sería una alternativa más transparente, pero menos cercana a la metáfora verbal del original.
- source_word: μὴ ἐκλυόμενοι
  english_pob_choice: if we do not give up
  chosen_spanish: si no desmayamos
  alternatives_spanish:
  - si no nos fatigamos
  - si no nos agotamos
  - si no abandonamos
  lexicon: BDAG
  rationale: El participio expresa dejar de resistir por agotamiento o desfallecimiento. «No desmayamos» preserva la distinción respecto de «no nos cansemos» y comunica bien la idea de no aflojar ni rendirse por fatiga.
theological_decisions:
- issue: Distinción entre ἐγκακῶμεν y ἐκλυόμενοι
  english_pob_reading: 'Render them with differentiated but related English: ''grow weary'' and ''give up.'''
  chosen_spanish_reading: «no nos cansemos» y «si no desmayamos»
  alternative_spanish_readings:
  - «no perdamos el ánimo» y «si no abandonamos»
  - «no nos desanimemos» y «si no desfallecemos»
  rationale: 'Pablo usa dos expresiones relacionadas pero no idénticas. La traducción las diferencia para no aplanar la exhortación: una apunta al cansancio en la acción del bien y la otra al desfallecimiento que impediría la cosecha prometida.'
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: El texto coincide con el sentido y la distinción retórica del pasaje en el pasaje fuente; no se requirieron revisiones adicionales respecto del borrador base auditable.
  spanish_consistency_notes:
  - Se usa «hacer el bien» para τὸ καλὸν ποιοῦντες, manteniendo un registro bíblico claro y natural en español.
  - Se evita «Cristo» y otros términos no presentes en el versículo.
  - «Segaremos» conserva la metáfora agrícola y corresponde al futuro griego.
  - Las dos exhortaciones negativas se diferencian léxicamente para reflejar ἐγκακῶμεν y ἐκλυόμενοι sin fusionarlas.
