lexical_decisions:
- source_word: ἀλλήλων
  english_pob_choice: one another’s
  chosen_spanish: los unos ... de los otros
  alternatives_spanish:
  - unos a otros
  - mutuamente
  lexicon: BDAG
  rationale: El pronombre recíproco pide una formulación mutua y comunitaria. «Los unos ... de los otros» conserva esa reciprocidad de manera natural en español y mantiene el sentido distributivo del griego sin volverla una paráfrasis.
- source_word: τὰ βάρη
  english_pob_choice: burdens
  chosen_spanish: las cargas
  alternatives_spanish:
  - los pesos
  - las cargas pesadas
  lexicon: BDAG
  rationale: βάρη denota literalmente «pesos», pero en este contexto ético se refiere a dificultades o presiones que se llevan. «Cargas» comunica bien esa idea en español y evita una literalidad extraña.
- source_word: βαστάζετε
  english_pob_choice: Carry
  chosen_spanish: Lleven
  alternatives_spanish:
  - Carguen
  - Sostengan
  lexicon: BDAG
  rationale: El imperativo presente plural expresa acción continua. «Lleven» es imperativo natural y conserva la fuerza exhortativa; además funciona bien con «cargas».
- source_word: οὕτως
  english_pob_choice: in this way
  chosen_spanish: y así
  alternatives_spanish:
  - de este modo
  - así
  lexicon: BDAG
  rationale: La partícula enlaza la obediencia con el resultado. «Y así» refleja de forma clara la relación inferencial sin sobredesarrollarla.
- source_word: ἀναπληρώσετε
  english_pob_choice: you will fulfill
  chosen_spanish: cumplirán
  alternatives_spanish:
  - llevarán a cabo plenamente
  - completarán
  lexicon: BDAG
  rationale: El futuro indica el resultado de obedecer el mandato. En español, «cumplirán» es la manera más natural de expresar la idea con νόμον, manteniendo el valor normativo del término.
- source_word: νόμον
  english_pob_choice: law
  chosen_spanish: la ley
  alternatives_spanish:
  - la norma
  - el principio
  lexicon: BDAG
  rationale: νόμος normalmente significa «ley». «La ley» preserva la terminología paulina y la carga intertextual del término mejor que una expansión interpretativa como «principio».
- source_word: τοῦ Χριστοῦ
  english_pob_choice: of Messiah
  chosen_spanish: del Mesías
  alternatives_spanish:
  - de Cristo
  lexicon: BDAG
  rationale: Según la norma del proyecto, Χριστός como título se traduce «Mesías». En esta construcción genitiva, «la ley del Mesías» conserva el matiz titular y el trasfondo judío-mesiánico del griego.
theological_decisions:
- issue: Traducción de Χριστοῦ como título mesiánico
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: El texto griego usa Χριστός como título, no como un nombre litúrgico fijo que deba conservarse sin traducción. Mantener «Mesías» sigue la política del proyecto y evita perder el contenido titular del término.
  doctrine_reference: 'DOCTRINE.md: traducir títulos; transliterar nombres; tratamiento de Χριστός'
translation_notes:
  revision_awareness: Se siguió el texto griego SBLGNT y el patrón auditado de la POB en inglés. Se conservó la decisión teológica de traducir Χριστός como «Mesías», aun cuando una revisión posterior en el audit trail introdujo «Christ» por consistencia epistolar; la corrección regresiva restauró «Messiah», por lo que la lectura base aquí es la titulada y fuente-corroborada.
  spanish_consistency_notes:
  - Se prefirió «cargas» para βάρη por naturalidad y por conservar el campo semántico de peso/burden sin añadir interpretación.
  - Se mantuvo el futuro «cumplirán» para ἀναπληρώσετε, que en español expresa bien el resultado esperado del mandato.
  - «Ley del Mesías» evita la máscara tradicional «SEÑOR» y sigue la política del proyecto para Χριστός como título.
