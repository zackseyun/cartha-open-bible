translation:
  language: es
  text: La gracia de nuestro Señor Jesús Mesías[a] sea con el espíritu de ustedes, hermanos[b]. Amén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más tradicionalmente, 'Jesucristo'. El título griego Χριστός se traduce aquí como 'Mesías' para preservar su significado.
    reason: alternative_reading
  - marker: b
    text: '''Hermanos'' aquí se dirige a la comunidad creyente y puede incluir tanto hombres como mujeres; alternativamente, ''hermanos y hermanas''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: χάρις
  english_pob_choice: grace
  chosen_spanish: gracia
  alternatives_spanish:
  - favor
  - don gracioso
  lexicon: BDAG
  rationale: En la fórmula paulina de bendición, 'gracia' es el equivalente natural y teológicamente cargado en español; conserva el peso soteriológico y el uso litúrgico sin debilitar el sentido.
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: BDAG
  rationale: '''Señor'' reproduce el valor confesional de κύριος en el contexto cristiano y es la forma española estable para este título.'
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesús Mesías
  alternatives_spanish:
  - Jesús Cristo
  - Jesucristo
  lexicon: BDAG
  rationale: Se conserva el valor titular de Χριστός como 'Mesías' para reflejar su significado, no solo su forma heredada. En español, 'Jesús Mesías' mantiene la relación nombre+título de manera clara y transparente.
- source_word: μετὰ τοῦ ... ὑμῶν
  english_pob_choice: be with your
  chosen_spanish: sea con tu
  alternatives_spanish:
  - esté con ustedes
  - esté con vuestro
  lexicon: BDAG
  rationale: El griego es una bendición elíptica; en español se completa naturalmente con 'sea con'. Se eligió el singular 'tu' porque el griego usa un genitivo singular ('tu espíritu') aunque el destinatario es colectivo.
- source_word: πνεύματος
  english_pob_choice: your spirit
  chosen_spanish: espíritu
  alternatives_spanish:
  - espíritu interior
  - ser
  lexicon: BDAG
  rationale: '''Espíritu'' preserva la imagen paulina sin reducirla a un pronombre genérico o a una paráfrasis antropológica. Se mantiene la tensión entre la dirección al grupo y la forma singular del sustantivo.'
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - familia
  lexicon: BDAG
  rationale: '''Hermanos'' es una traducción directa y natural del vocativo plural masculino. En español, la nota preserva el alcance comunitario sin sustituir la forma del griego en el texto principal.'
- source_word: ἀμήν
  english_pob_choice: Amen
  chosen_spanish: Amén
  alternatives_spanish:
  - Así sea
  lexicon: BDAG
  rationale: Se mantiene la transliteración tradicional 'Amén', que funciona como cierre litúrgico reconocible en español.
theological_decisions:
- issue: Χριστός como título en la bendición final
  english_pob_reading: Jesus Messiah
  chosen_spanish_reading: Jesús Mesías
  alternative_spanish_readings:
  - Jesús Cristo
  - Jesucristo
  rationale: Se conserva el sentido titular de Χριστός para no vaciar el término en un mero nombre fijo. 'Mesías' expresa mejor el contenido semántico del griego y armoniza con la filosofía del proyecto de traducir títulos.
  doctrine_reference: 'DOCTRINE.md: Translate titles; contested terms table for Χριστός'
- issue: Alcance comunitario de ἀδελφοί
  english_pob_reading: brothers
  chosen_spanish_reading: hermanos
  alternative_spanish_readings:
  - hermanos y hermanas
  rationale: Se mantiene la forma masculina plural del vocativo como reflejo del griego, sin borrar que el destinatario es la comunidad creyente en conjunto. La nota aclara la inclusión posible sin absorberla en el texto principal.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral'
- issue: Relación entre 'tu espíritu' y el destinatario plural
  english_pob_reading: your spirit
  chosen_spanish_reading: tu espíritu
  alternative_spanish_readings:
  - vuestro espíritu
  - el espíritu de ustedes
  rationale: El griego tiene singular en el sintagma 'del espíritu de ustedes', y en español conviene conservar esa tensión entre un destinatario colectivo y un posesivo singular. 'Tu' se usa aquí como correspondencia formal a la construcción griega, no como referencia a un individuo aislado.
  doctrine_reference: 'Gramática del griego koiné en fórmulas benedictorias; DOCTRINE.md: preserve source tensions'
translation_notes:
  revision_awareness: Se verificó el paquete fuente, la traducción inglesa auditada y las decisiones léxicas/teológicas existentes. No se detectaron revisiones aplicadas en el historial más reciente; la redacción española sigue la tensión del original entre la bendición singular ('tu espíritu') y el vocativo plural ('hermanos').
  spanish_consistency_notes:
  - Se mantuvo 'Mesías' para Χριστός conforme al criterio del proyecto, evitando 'Cristo' como forma automática.
  - Se usó 'Señor' para κύριος por convención confesional en español.
  - Se preservó 'Amén' como cierre litúrgico estándar.
  - La nota de 'hermanos' conserva el alcance comunitario sin masculinizar más allá del griego.
