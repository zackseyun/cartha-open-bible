translation:
  language: es
  text: Porque ni siquiera los que son circuncidados[a], ellos mismos, guardan la ley; sino que quieren que ustedes sean circuncidados para que se gloríen en la carne de ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los circuncidados». El griego usa un participio sustantivado: «los que son circuncidados / los circuncidados».'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐδὲ γὰρ
  english_pob_choice: For not even
  chosen_spanish: Porque ni siquiera
  alternatives_spanish:
  - Porque tampoco
  - Pues ni siquiera
  lexicon: BDAG
  rationale: Combina la fuerza explicativa de γάρ con la negación enfática de οὐδὲ. 'Porque ni siquiera' suena natural en español y conserva el énfasis argumentativo de Pablo.
- source_word: οἱ περιτεμνόμενοι
  english_pob_choice: those who are circumcised
  chosen_spanish: los que son circuncidados
  alternatives_spanish:
  - los circuncidados
  - los que se circuncidan
  lexicon: BDAG
  rationale: El participio con artículo funciona sustantivamente. 'Los que son circuncidados' mantiene la referencia descriptiva sin convertirla en una paráfrasis interpretativa como 'los que promueven la circuncisión'.
- source_word: αὐτοὶ
  english_pob_choice: themselves
  chosen_spanish: ni siquiera
  alternatives_spanish:
  - ellos mismos
  - por su parte
  lexicon: BDAG
  rationale: La fuerza de αὐτοὶ queda absorbida en la construcción enfática 'ni siquiera ...'; en español evita una repetición torpe y mantiene el contraste que Pablo subraya.
- source_word: νόμον φυλάσσουσιν
  english_pob_choice: keep the law
  chosen_spanish: guardan la ley
  alternatives_spanish:
  - observan la ley
  - cumplen la ley
  lexicon: BDAG
  rationale: '''Guardar la ley'' reproduce bien el sentido de φυλάσσω en contexto paulino y conserva el tono de cumplimiento normativo. ''Cumplen'' es posible, pero menos cercano al valor verbal del griego.'
- source_word: ἀλλὰ θέλουσιν
  english_pob_choice: but they want
  chosen_spanish: sino que quieren
  alternatives_spanish:
  - pero quieren
  - más bien quieren
  lexicon: BDAG
  rationale: Después de una negación, 'sino que' expresa con claridad el contraste adversativo de ἀλλά. 'Quieren' conserva la voluntad o intención, sin añadir intensidad no pedida por el texto.
- source_word: ὑμᾶς περιτέμνεσθαι
  english_pob_choice: you to be circumcised
  chosen_spanish: que ustedes sean circuncidados
  alternatives_spanish:
  - que se circunciden
  - que ustedes se hagan circuncidar
  lexicon: BDAG
  rationale: La pasiva del infinitivo se vierte de modo natural como 'que ustedes sean circuncidados'. Es más claro en español que mantener una construcción infinitiva literal y evita ambigüedad sobre agencia.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para
  alternatives_spanish:
  - para que
  - a fin de que
  lexicon: BDAG
  rationale: En español, 'para gloriarse' comunica con naturalidad la finalidad del ἵνα + subjuntivo. Es breve y evita sobrecargar la frase.
- source_word: ἐν τῇ ὑμετέρᾳ σαρκὶ
  english_pob_choice: in your flesh
  chosen_spanish: en su carne
  alternatives_spanish:
  - en vuestra carne
  - en su cuerpo
  lexicon: BDAG
  rationale: Se mantiene 'carne' para σάρξ, conforme al valor literal en este contexto de circuncisión y al criterio doctrinal de no importar 'naturaleza humana' o 'pecaminosa' sin base textual. En español bíblico, 'carne' conserva el vínculo con la señal física.
- source_word: καυχήσωνται
  english_pob_choice: they may boast
  chosen_spanish: se gloriarse
  alternatives_spanish:
  - se jacten
  - alardear
  lexicon: BDAG
  rationale: '''Gloriarse'' preserva el registro paulino y la fuerza retórica de καυχάομαι en un contexto negativo. ''Jactarse'' es posible, pero ''gloriarse'' corresponde mejor al tono bíblico sin perder la censura implícita.'
theological_decisions:
- issue: Sentido de σάρξ en el contexto de la circuncisión
  english_pob_reading: literal bodily 'flesh' referring to the physical mark of circumcision
  chosen_spanish_reading: carne en sentido literal y corporal
  alternative_spanish_readings:
  - carne como 'naturaleza pecaminosa'
  - cuerpo
  rationale: El contexto inmediato trata de la circuncisión y del motivo visible de gloria de los agitadores. Por eso 'carne' debe leerse corporalmente, no como una alusión a la naturaleza pecaminosa. Traducirlo de otro modo oscurecería la referencia física del pasaje.
  doctrine_reference: 'DOCTRINE.md: σάρξ = ''carne'' según el contexto; evitar importar automáticamente el sentido metafórico'
- issue: Valor de οἱ περιτεμνόμενοι como etiqueta del grupo
  english_pob_reading: descriptive label 'those who are circumcised'
  chosen_spanish_reading: 'designación descriptiva: ''los que son circuncidados'''
  alternative_spanish_readings:
  - '''los circuncidados'''
  - '''los que se circuncidan'''
  rationale: La construcción griega es un participio sustantivado. La traducción española conserva esa designación descriptiva sin convertirla en una glosa doctrinal. La forma elegida permite que el lector perciba la descripción y el tono polémico del argumento.
  doctrine_reference: Principio de primacía del original; no paraphrase beyond source evidence
translation_notes:
  revision_awareness: 'La revisión más reciente quedó sin cambios: el sentido del verso, el tratamiento de σάρξ y la designación sustantivada del grupo permanecen estables respecto del audit trail inglés.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el nombre divino en otros contextos; este versículo no lo contiene.
  - '''Carne'' se conserva de manera literal por el contexto de circuncisión.'
  - Se evita 'naturaleza pecaminosa' para σάρξ porque el pasaje no lo requiere.
  - '''Gloriarse'' preserva el registro paulino frente a opciones más coloquiales.'
  - La nota textual se limita a la alternativa de traducción del participio sustantivado, conforme al audit trail inglés.
