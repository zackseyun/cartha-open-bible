translation:
  language: es
  text: Porque ni la circuncisión cuenta para nada[a], ni la incircuncisión[b], sino una nueva creación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vale para algo» o «tiene algún valor».
    reason: lexical_alternative
  - marker: b
    text: O simplemente «nueva creación»; menos probable en este contexto, «nueva criatura».
    reason: lexical_alternative
lexical_decisions:
- source_word: οὔτε γὰρ
  english_pob_choice: For neither
  chosen_spanish: Porque ni
  alternatives_spanish:
  - Pues ni
  - Porque ni siquiera
  lexicon: BDAG
  rationale: γάρ aporta explicación o fundamento; en español, «porque» mantiene esa conexión causal/explicativa. οὔτε introduce la primera parte de la correlación negativa, bien reproducida con «ni». El orden resulta natural en español sin perder el enlace argumentativo con el contexto inmediato.
- source_word: περιτομή
  english_pob_choice: circumcision
  chosen_spanish: la circuncisión
  alternatives_spanish:
  - circuncisión
  - la señal de la circuncisión
  lexicon: BDAG
  rationale: Se conserva el término concreto y técnico del rito, que en Pablo también carga significado identitario judío-covenantal. En español, «la circuncisión» preserva esa fuerza sin expandir el sentido más allá del texto.
- source_word: τί ἐστιν
  english_pob_choice: counts for anything
  chosen_spanish: cuenta para nada
  alternatives_spanish:
  - es algo
  - vale algo
  - tiene valor
  lexicon: BDAG
  rationale: El griego expresa insignificancia o falta de valor decisivo. «Cuenta para nada» comunica con naturalidad la idea de que no tiene peso determinante, siguiendo la revisión inglesa que aclaró el modismo sin volverlo interpretativamente pesado.
- source_word: οὔτε ἀκροβυστία
  english_pob_choice: nor uncircumcision
  chosen_spanish: ni la incircuncisión
  alternatives_spanish:
  - ni la no circuncisión
  - ni el estado de incircunciso
  lexicon: BDAG
  rationale: Como contraparte de «circuncisión», «incircuncisión» es el correlato tradicional y preciso en este contexto paulino. Evita una paráfrasis extensa y mantiene la oposición ritual/identitaria del pasaje.
- source_word: ἀλλὰ
  english_pob_choice: but
  chosen_spanish: sino
  alternatives_spanish:
  - pero
  - más bien
  lexicon: BDAG
  rationale: En español, después de una negación correlativa, «sino» reproduce mejor el contraste fuerte del griego que «pero». Marca que la verdadera afirmación sustituye a las dos categorías previas.
- source_word: καινὴ κτίσις
  english_pob_choice: a new creation
  chosen_spanish: una nueva creación
  alternatives_spanish:
  - nueva creación
  - una nueva criatura
  lexicon: BDAG
  rationale: '«Creación» preserva la amplitud paulina del término κτίσις: no solo una criatura individual, sino una realidad renovada. «Nueva» expresa la cualidad de novedad en sentido de nuevo orden o nueva condición, manteniendo la lectura de la POB inglesa.'
theological_decisions:
- issue: Significado de la oposición entre circuncisión/incircuncisión y nueva creación
  english_pob_reading: Paul denies salvific or covenant-defining significance to either ritual status in comparison with the decisive reality of new creation.
  chosen_spanish_reading: Pablo niega que cualquiera de los dos estados rituales tenga peso decisivo; lo decisivo es la nueva creación.
  alternative_spanish_readings:
  - Solo habla de marcadores sociales sin alcance teológico mayor
  - Afirma que ambos estados son igualmente válidos como camino
  rationale: El griego dice que ni una ni otra categoría «cuentan para nada» frente a la «nueva creación». La traducción mantiene ese contraste sin domesticarlo ni suavizar su alcance teológico.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La base inglesa pasó de «is anything» a «counts for anything» para captar mejor τί ἐστιν; la versión española sigue esa revisión con «cuenta para nada», que expresa con naturalidad la falta de valor decisivo. También se conservó la fuerza adversativa de ἀλλὰ con «sino», más idiomático que «pero» tras una negación correlativa.
  spanish_consistency_notes:
  - Se mantiene «circuncisión/incircuncisión» como pareja técnica en sentido paulino.
  - «Nueva creación» se conserva como formulación principal para evitar reducir κτίσις a «criatura».
  - La puntuación reproduce una sola oración con contraste final enfático, acorde con la sintaxis breve del griego.
