translation:
  language: es
  text: Porque el que siembra a su propia carne[a] cosechará corrupción[b] de la carne, pero el que siembra al Espíritu[c] cosechará vida eterna del Espíritu.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a su propia naturaleza pecaminosa». El griego σάρξ puede significar «carne» literalmente o, en el contraste ético de Pablo, la orientación humana caída opuesta al Espíritu.
    reason: lexical_alternative
  - marker: b
    text: O «destrucción» o «decadencia». El término griego puede denotar corrupción, ruina o deterioro.
    reason: lexical_alternative
  - marker: c
    text: Es decir, el Espíritu Santo; algunos traducen «espíritu» en minúscula, pero en Gálatas este contraste normalmente se refiere al Espíritu de Dios.
    reason: alternative_reading
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: La conjunción introduce una explicación o fundamento de la exhortación anterior. «Porque» transmite bien ese valor explicativo en español sin volver la frase forzada.
- source_word: ὁ σπείρων
  english_pob_choice: the one who sows
  chosen_spanish: el que siembra
  alternatives_spanish:
  - quien siembra
  - el sembrador
  lexicon: BDAG
  rationale: El participio articular funciona de modo sustantivo y general. «El que siembra» conserva el sentido proverbial y la estructura paralela del versículo.
- source_word: εἰς τὴν σάρκα ἑαυτοῦ
  english_pob_choice: to his own flesh
  chosen_spanish: para su propia carne
  alternatives_spanish:
  - a su propia carne
  - para su propia naturaleza pecaminosa
  lexicon: BDAG
  rationale: Con σπείρω, εἰς puede expresar finalidad o dirección idiomática, por lo que «para» resulta natural en español. Se conserva «carne» para mantener el vocabulario paulino y la tensión teológica; «su propia» refleja ἑαυτοῦ.
- source_word: ἐκ τῆς σαρκὸς
  english_pob_choice: from the flesh
  chosen_spanish: de la carne
  alternatives_spanish:
  - de la propia carne
  - a partir de la carne
  lexicon: BDAG
  rationale: ἐκ marca origen. «De la carne» es la correspondencia más directa y mantiene el paralelismo con «del Espíritu».
- source_word: θερίσει
  english_pob_choice: will reap
  chosen_spanish: cosechará
  alternatives_spanish:
  - segará
  - recogerá
  lexicon: BDAG
  rationale: «Cosechará» conserva la imagen agrícola y es natural en español moderno. Aunque «segará» es más literal, suena más arcaico; «recogerá» debilita la metáfora.
- source_word: φθοράν
  english_pob_choice: corruption
  chosen_spanish: corrupción
  alternatives_spanish:
  - destrucción
  - degradación
  - ruina
  lexicon: BDAG
  rationale: '«Corrupción» preserva el rango semántico de φθορά: ruina, deterioro y corrupción. No estrecha el término a aniquilación ni solo a decadencia física.'
- source_word: ὁ δὲ σπείρων
  english_pob_choice: but the one who sows
  chosen_spanish: pero el que siembra
  alternatives_spanish:
  - mas el que siembra
  - pero quien siembra
  lexicon: BDAG
  rationale: «Pero» conserva el contraste de δέ. Se repite la misma estructura sustantivada para mantener el paralelismo antitético.
- source_word: εἰς τὸ πνεῦμα
  english_pob_choice: to the Spirit
  chosen_spanish: para el Espíritu
  alternatives_spanish:
  - al Espíritu
  - para el espíritu
  lexicon: BDAG
  rationale: En Gálatas, el contraste carne/Espíritu se refiere naturalmente al Espíritu Santo. Se capitaliza «Espíritu» para indicar ese referente contextual, siguiendo la decisión auditada en inglés.
- source_word: ἐκ τοῦ πνεύματος
  english_pob_choice: from the Spirit
  chosen_spanish: del Espíritu
  alternatives_spanish:
  - de parte del Espíritu
  - a partir del Espíritu
  lexicon: BDAG
  rationale: Se mantiene el valor de origen de ἐκ y el paralelismo con «de la carne». La forma contraída «del» es la más natural en español.
- source_word: ζωὴν αἰώνιον
  english_pob_choice: eternal life
  chosen_spanish: vida eterna
  alternatives_spanish:
  - vida del siglo venidero
  - vida para siempre
  lexicon: BDAG
  rationale: «Vida eterna» es la equivalencia natural y estable de la expresión. Conserva el valor escatológico sin añadir paráfrasis.
theological_decisions:
- issue: Sentido de σάρξ en el contraste paulino
  english_pob_reading: flesh
  chosen_spanish_reading: carne
  alternative_spanish_readings:
  - naturaleza pecaminosa
  - naturaleza humana caída
  rationale: Se conserva «carne» para no resolver de antemano la tensión paulina con una glosa interpretativa. Aunque el contexto ético permite pensar en la orientación pecaminosa, el término técnico de Pablo queda más visible así.
  doctrine_reference: 'DOCTRINE.md: Contested terms — σάρξ; preserve theological tension where genuine ambiguity exists'
- issue: Referente de πνεῦμα
  english_pob_reading: Spirit
  chosen_spanish_reading: Espíritu
  alternative_spanish_readings:
  - espíritu
  rationale: En este pasaje la oposición carne/Espíritu apunta al Espíritu Santo. La mayúscula comunica ese referente contextual sin perder la identificación con el término griego.
  doctrine_reference: 'DOCTRINE.md: original-language primacy; contextual theological referent'
- issue: Valor de φθορά
  english_pob_reading: corruption
  chosen_spanish_reading: corrupción
  alternative_spanish_readings:
  - destrucción
  - ruina
  - decadencia
  rationale: «Corrupción» mantiene la amplitud del término entre ruina moral y descomposición/ruina escatológica. Evita reducir el sentido a destrucción total o solo deterioro físico.
  doctrine_reference: 'DOCTRINE.md: preserve semantic range where warranted'
translation_notes:
  revision_awareness: El texto base y el control de revisión más reciente coinciden sin cambios sustantivos; se mantiene la misma lectura auditada del original griego y del POB en inglés, con ajustes idiomáticos propios del español.
  spanish_consistency_notes:
  - Se conserva la terminología paulina clave «carne» / «Espíritu» para reflejar el contraste original.
  - 'Se mantiene la metáfora agrícola con un verbo natural en español: «siembra» / «cosechará».'
  - Se evita sustituir «carne» por una paráfrasis explicativa en el cuerpo del texto; la alternativa queda en nota.
  - La capitalización de «Espíritu» sigue la lectura contextual del Espíritu Santo, coherente con el audit trail en inglés.
