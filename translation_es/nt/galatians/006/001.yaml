translation:
  language: es
  text: Hermanos[a], aunque un hombre[c] sea sorprendido[b] en alguna transgresión, ustedes que son espirituales restauren a uno así en un espíritu de mansedumbre, cuidándose cada uno a sí mismo, no sea que tú también seas tentado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Hermanos'' traduce una forma masculina plural que puede dirigirse a un grupo mixto de creyentes; compárese ''hermanos y hermanas''.'
    reason: lexical_alternative
  - marker: b
    text: O 'sea sobrevenido' o 'sea tomado por sorpresa' en alguna transgresión.
    reason: alternative_reading
  - marker: c
    text: '''Un hombre'' vierte un término singular genérico para un ser humano; alternativamente, ''alguien'' o ''una persona''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀδελφοί
  english_pob_choice: Brothers
  chosen_spanish: Hermanos
  alternatives_spanish:
  - Hermanos y hermanas
  - Hermanos/as
  - Creyentes
  lexicon: BDAG
  rationale: El vocativo plural masculino puede dirigirse a un grupo mixto de creyentes. Mantengo la forma masculina visible en el texto principal para reflejar con transparencia la forma griega, y la nota aclara su alcance inclusivo.
- source_word: ἐὰν καὶ
  english_pob_choice: even if
  chosen_spanish: aunque
  alternatives_spanish:
  - si también
  - si aun
  - incluso si
  lexicon: BDAG
  rationale: La concesión del griego se expresa con naturalidad en español como 'aunque', que comunica bien que el caso es posible y no meramente hipotético.
- source_word: προλημφθῇ
  english_pob_choice: is caught
  chosen_spanish: sea sorprendido
  alternatives_spanish:
  - sea alcanzado
  - sea atrapado
  - sea tomado por sorpresa
  lexicon: BDAG
  rationale: '''Sea sorprendido'' conserva la idea de ser sobrevenido o tomado por sorpresa, que la nota amplia con ''overtaken''/''caught by surprise''. En español evita una dureza innecesaria sin perder la tensión interpretativa.'
- source_word: ἄνθρωπος
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  - un ser humano
  lexicon: BDAG
  rationale: El sustantivo singular genérico mantiene su forma masculina en el texto principal, como en la POB inglesa. La nota preserva su valor representativo sin neutralizarlo en la línea principal.
- source_word: ἔν τινι παραπτώματι
  english_pob_choice: in some trespass
  chosen_spanish: en alguna transgresión
  alternatives_spanish:
  - en algún tropiezo
  - en alguna falta
  - en algún pecado
  lexicon: BDAG
  rationale: '''Transgresión'' conserva el peso moral de παράπτωμα. ''Alguna'' refleja el indefinido τινι y evita precisar más de lo que el griego permite.'
- source_word: οἱ πνευματικοὶ
  english_pob_choice: you who are spiritual
  chosen_spanish: ustedes, los espirituales
  alternatives_spanish:
  - ustedes que son espirituales
  - ustedes, los que son del Espíritu
  - ustedes, los espirituales maduros
  lexicon: BDAG
  rationale: La construcción sustantivada se vierte con naturalidad como 'los espirituales'. Mantiene la referencia a personas caracterizadas por el Espíritu sin añadir una glosa doctrinal no explícita.
- source_word: καταρτίζετε
  english_pob_choice: should restore
  chosen_spanish: restauren
  alternatives_spanish:
  - reparen
  - restituyan
  - pongan en orden
  lexicon: BDAG
  rationale: El imperativo presente plural expresa acción exhortativa. 'Restauren' es natural en español y conserva la idea de devolver a la condición adecuada, sin exagerar el matiz técnico.
- source_word: τὸν τοιοῦτον
  english_pob_choice: such a one
  chosen_spanish: a tal persona
  alternatives_spanish:
  - a uno así
  - a ese hombre
  - a esa persona
  lexicon: BDAG
  rationale: '''Tal persona'' preserva el referente singular y la precisión demostrativa del griego. Es más fluido que ''tal uno'' y evita añadir género innecesario en la referencia inmediata.'
- source_word: ἐν πνεύματι πραΰτητος
  english_pob_choice: in a spirit of gentleness
  chosen_spanish: en un espíritu de mansedumbre
  alternatives_spanish:
  - con espíritu de mansedumbre
  - en un espíritu de gentileza
  - con mansedumbre
  lexicon: BDAG
  rationale: '''Espíritu de mansedumbre'' conserva el paralelismo formal con el griego. ''Mansedumbre'' es el equivalente tradicional más preciso para πραΰτης y evita reducirlo a mera ''gentileza''.'
- source_word: σκοπῶν σεαυτόν
  english_pob_choice: watching yourself
  chosen_spanish: vigilándote a ti mismo
  alternatives_spanish:
  - mirándote a ti mismo
  - vigilando tu propia conducta
  - poniendo atención en ti mismo
  lexicon: BDAG
  rationale: El participio expresa vigilancia continua mientras se restaura al otro. 'Vigilándote a ti mismo' conserva la advertencia reflexiva y hace explícito el pronombre enfático del griego.
- source_word: μὴ καὶ σὺ πειρασθῇς
  english_pob_choice: lest you also be tempted
  chosen_spanish: no sea que tú también seas tentado
  alternatives_spanish:
  - para que tú tampoco seas tentado
  - no sea que también tú seas probado
  - no vaya a ser que tú también caigas en tentación
  lexicon: BDAG
  rationale: En este contexto moral, 'tentado' es la lectura más probable de πειράζω. 'No sea que' reproduce bien la advertencia preventiva del griego; 'también' refleja καὶ.
theological_decisions:
- issue: Alcance inclusivo de Ἀδελφοί y ἄνθρωπος
  english_pob_reading: Retain 'Brothers' and 'a man' in the main text, with footnotes noting representative/generic force.
  chosen_spanish_reading: Mantener 'Hermanos' y 'un hombre' en el texto principal, con notas que explican su valor representativo y posible inclusión de todo el grupo.
  alternative_spanish_readings:
  - Hermanos y hermanas
  - una persona
  - alguien
  rationale: 'La POB inglesa opta por preservar la forma masculina del original y aclarar su alcance en nota. El español sigue el mismo principio: transparencia formal en el texto base y aclaración del posible referente mixto o genérico en nota, sin borrar la forma gramatical del griego.'
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
- issue: Nuance de προλημφθῇ
  english_pob_reading: Render as 'is caught' in the main text, preserving 'is overtaken'/'is caught by surprise' as alternatives in a footnote.
  chosen_spanish_reading: Traducir con 'sea sorprendido' y dejar en nota la posibilidad de 'sea sobrevenido' o 'sea tomado por sorpresa'.
  alternative_spanish_readings:
  - sea sobrevenido
  - sea alcanzado
  - sea tomado por sorpresa
  rationale: La frase admite la idea de ser atrapado en el acto o de ser sobrevenido inesperadamente por la caída. 'Sea sorprendido' permite esa tensión sin cerrarla, mientras la nota conserva la alternativa interpretativa necesaria.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Sentido de πνεύματι πραΰτητος
  english_pob_reading: in a spirit of gentleness
  chosen_spanish_reading: en un espíritu de mansedumbre
  alternative_spanish_readings:
  - con mansedumbre
  - en un espíritu de gentileza
  rationale: '''Mansedumbre'' sostiene mejor el campo semántico bíblico de πραΰτης que ''gentileza'', que en español puede sonar demasiado débil o social. La formulación conserva la ambigüedad respetuosa entre disposición interior y modo de actuar.'
  doctrine_reference: Lexical/theological consistency with virtue language in Pauline ethics
translation_notes:
  revision_awareness: Esta versión sigue de cerca la POB inglesa revisada, especialmente en el tratamiento del vocativo plural masculino, del sustantivo genérico singular y de la frase verbal con valor concesivo y preventivo. No se han incorporado revisiones posteriores al pass indicado; el registro es consistente con el estado auditado de mayor acuerdo.
  spanish_consistency_notes:
  - Se mantiene 'Hermanos' para Ἀδελφοί, con nota de alcance inclusivo, en coherencia con el principio de lenguaje género-accurado.
  - '''Espíritu'' no se capitaliza porque aquí πνεύματι apunta a una disposición/actitud, no al Espíritu Santo nombrado explícitamente.'
  - '''Transgresión'' y ''tentado'' preservan la gravedad moral del pasaje sin forzar una equivalencia doctrinal más específica.'
  - 'La cadencia principal procura ser publicable y natural en español, pero conserva la correspondencia estructural del original: vocativo, concesiva, exhortación, participio de vigilancia y cláusula de advertencia.'
