  to: Hermanos[a], aunque un hombre[c] sea sorprendido[b] en alguna transgresión, ustedes que son espirituales restauren a uno así en un espíritu de mansedumbre, cuidándose cada uno a sí mismo, no sea que tú también seas tentado.
  rationale: La revisión corrige la mezcla poco natural de 'ustedes' con 'vigilándote', reordena las notas para que sus anclas coincidan con los términos explicados, y mejora levemente la fluidez con 'ustedes que son espirituales' y 'a uno así' sin apartarse del sentido del griego ni del razonamiento léxico-teológico documentado.
