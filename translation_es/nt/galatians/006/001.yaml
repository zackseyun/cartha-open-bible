review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja en general bien el griego y el rastro de auditoría inglés: conserva ''Hermanos'', mantiene el valor concesivo de ἐὰν καὶ, traduce προλημφθῇ con una opción que deja abierta la idea de ser sorprendido/sobrevenido, preserva el imperativo de restaurar, y mantiene la advertencia final de tentación. Sin embargo, hay un problema importante de concordancia en σκοπῶν σεαυτόν: el griego pasa del plural exhortativo (''ustedes'') a una advertencia singular distributiva (''mirándote/cuidándote a ti mismo'' dirigida a cada restaurador). El español actual mezcla ''ustedes'' con ''vigilándote'', lo cual suena gramaticalmente defectuoso en español general. Además, la colocación de las notas b/c quedó invertida respecto a sus anclas semánticas.'
  spanish_quality_summary: La redacción es mayormente clara y digna, pero necesita un ajuste para naturalidad y precisión. 'Ustedes, los espirituales' funciona, aunque 'ustedes que son espirituales' fluye mejor. 'Vigilándote a ti mismo' choca con el tratamiento de segunda persona plural usado en el resto del versículo; conviene reformular a un plural natural como 'cuidándose cada uno a sí mismo' o 'vigilándose a ustedes mismos'. También es preferible alinear las notas con las palabras que realmente explican.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: no hay nombres divinos ni títulos mesiánicos aquí; πνεῦμα se conserva como ''espíritu'' en minúscula por contexto; πραΰτης como ''mansedumbre'' está bien justificado; παράπτωμα como ''transgresión'' es aceptable aunque ''falta'' o ''tropiezo'' serían algo más naturales. Se mantiene correctamente la política de lenguaje de género con ''Hermanos'' y ''un hombre'' en el texto principal y aclaraciones en nota.'
  issues:
  - severity: high
    issue: Mezcla no natural de tratamiento plural y singular en 'ustedes ... vigilándote a ti mismo'
    rationale: El texto español resulta gramaticalmente torpe. Aunque el griego usa singular distributivo en el participio, en español neutral conviene expresarlo con una forma plural natural ('cuidándose cada uno a sí mismo') para preservar el sentido sin romper la sintaxis.
  - severity: medium
    issue: Las notas [b] y [c] están ancladas a palabras equivocadas
    rationale: En el texto, [b] aparece tras 'hombre' pero su contenido explica προλημφθῇ; [c] aparece tras 'mismo' pero su contenido explica 'un hombre'. Las anclas deben corresponder al término explicado.
  - severity: low
    issue: '''tal persona'' neutraliza ligeramente la singularidad masculina representativa de τὸν τοιοῦτον tras ''un hombre'''
    rationale: No es una infidelidad grave, pero 'a tal hombre' o 'a uno así' mantendría mejor la continuidad formal con el antecedente. Aun así, 'tal persona' sigue siendo comprensible y aceptable si se prioriza naturalidad.
