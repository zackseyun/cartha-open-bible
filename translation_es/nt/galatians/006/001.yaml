base_translation:
  language: en
  yaml_path: translation/nt/galatians/006/001.yaml
  text: Brothers[a], even if a man is caught in some trespass, you who are spiritual should restore such a one in a spirit of gentleness, watching yourself[c][b], lest you also be tempted.
  footnotes:
  - marker: a
    text: '''Brothers'' translates a masculine plural form that can address a mixed group of fellow believers; compare ''brothers and sisters.'''
    reason: lexical_alternative
  - marker: b
