translation:
  language: es
  text: Así pues[a], mientras tengamos oportunidad, hagamos el bien hacia todos, y especialmente hacia los que son de la familia de la fe[b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mientras tengamos tiempo». Καιρός enfatiza un tiempo oportuno o adecuado, no simplemente tiempo en general.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «la familia de la fe» o «los miembros de la familia de la fe». El griego usa lenguaje de hogar para quienes pertenecen a la comunidad creyente.'
    reason: lexical_alternative
  - marker: c
    text: «Fe» también puede entenderse como «la fe» en el sentido de la confesión cristiana compartida.
    reason: alternative_reading
lexical_decisions:
- source_word: ἄρα οὖν
  english_pob_choice: So then
  chosen_spanish: Así pues
  alternatives_spanish:
  - Por tanto
  - De modo que
  lexicon: BDAG
  rationale: Los dos marcadores inferenciales introducen una conclusión. "Así pues" conserva ese enlace lógico en un español natural y digno, sin sonar forzado ni excesivamente formal.
- source_word: ὡς καιρὸν ἔχομεν
  english_pob_choice: as we have opportunity
  chosen_spanish: mientras tengamos oportunidad
  alternatives_spanish:
  - así como tengamos oportunidad
  - mientras haya tiempo
  lexicon: BDAG
  rationale: καιρός enfatiza una ocasión o tiempo oportuno, no sólo duración cronológica. "Mientras tengamos oportunidad" comunica bien la idea de un momento favorable para actuar. Se mantiene la posibilidad de la lectura temporal sin reducirla a "tiempo" en general.
- source_word: ἐργαζώμεθα
  english_pob_choice: let us do
  chosen_spanish: hagamos
  alternatives_spanish:
  - trabajemos
  - practiquemos
  lexicon: BDAG
  rationale: El subjuntivo exhortativo pide una acción comunitaria continua. "Hagamos" es la forma natural en español para este mandato inclusivo y evita un calco pesado como "trabajemos el bien".
- source_word: τὸ ἀγαθὸν
  english_pob_choice: what is good
  chosen_spanish: el bien
  alternatives_spanish:
  - lo bueno
  - lo que es bueno
  lexicon: BDAG
  rationale: El neutro sustantivado expresa una cualidad moral. En español, "el bien" suena más natural y mantiene la sustancia ética de la expresión sin añadir explicación innecesaria.
- source_word: πρὸς πάντας
  english_pob_choice: toward everyone
  chosen_spanish: hacia todos
  alternatives_spanish:
  - para con todos
  - para todos
  lexicon: BDAG
  rationale: La preposición πρός con acusativo marca dirección de la acción. "Hacia todos" comunica el alcance universal de manera clara y directa.
- source_word: μάλιστα δὲ
  english_pob_choice: and especially
  chosen_spanish: y especialmente
  alternatives_spanish:
  - pero especialmente
  - sobre todo
  lexicon: BDAG
  rationale: μάλιστα introduce una prioridad dentro del mandato universal. "Y especialmente" conserva el matiz aditivo del griego y evita convertir la frase en contraste.
- source_word: τοὺς οἰκείους τῆς πίστεως
  english_pob_choice: those who are of the household of faith
  chosen_spanish: los que son de la familia de la fe
  alternatives_spanish:
  - los miembros de la familia de la fe
  - los de la casa de la fe
  - los que pertenecen a la fe
  lexicon: BDAG
  rationale: οἰκεῖοι tiene el campo semántico de miembros del hogar o familia. "Familia de la fe" conserva la metáfora doméstica y la pertenencia comunitaria; "los que son de" mantiene el giro relacional sin institucionalizarlo de más. Se prefirió "familia" sobre "casa" por mayor naturalidad en español, sin perder la imagen de pertenencia.
- source_word: πίστεως
  english_pob_choice: faith
  chosen_spanish: la fe
  alternatives_spanish:
  - fe
  - la fidelidad
  - la fe cristiana
  lexicon: BDAG
  rationale: Por defecto del proyecto, πίστις se traduce como "fe". En este genitivo, la expresión identifica el ámbito o comunidad marcada por la fe; "la fe" en español mantiene abierta esa referencia sin forzar una lectura más estrecha.
theological_decisions:
- issue: Alcance y prioridad de la beneficencia cristiana
  english_pob_reading: The verse commands doing good to all people, with particular priority given to fellow believers.
  chosen_spanish_reading: El versículo manda hacer el bien a todos, con una prioridad especial hacia los creyentes.
  alternative_spanish_readings:
  - El versículo manda hacerlo sólo a los creyentes
  - El versículo elimina toda prioridad especial hacia los creyentes
  rationale: 'El griego establece un alcance universal en πρὸς πάντας y luego añade una prioridad con μάλιστα. La traducción española conserva ambos polos: obligación amplia y énfasis particular, sin resolver la tensión al nivel de la redacción.'
  doctrine_reference: Preservar la tensión teológica en vez de resolverla
- issue: Sentido de τῆς πίστεως en la expresión de la familia
  english_pob_reading: '''Faith'' is retained in the main text as the identifying characteristic of the household.'
  chosen_spanish_reading: '"La fe" se mantiene como rasgo identificador de la familia.'
  alternative_spanish_readings:
  - '"La fe" como confesión doctrinal compartida'
  - '"Fidelidad" como cualidad ética'
  rationale: El texto no obliga a estrechar la frase hacia una institución ni hacia una abstracción doctrinal específica. Mantener "la fe" permite que la imagen de familia quede definida por el ámbito creyente, de manera fiel al griego y comprensible en español.
  doctrine_reference: 'Términos en disputa: πίστις → fe'
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el último estado revisado del POB inglés, sin cambios sustantivos de contenido: mantiene la conclusión inferencial, el matiz oportuno de καιρός, el mandato exhortativo, el alcance universal de πρὸς πάντας y la prioridad marcada por μάλιστα hacia la comunidad de fe. No se detectaron revisiones pendientes en el audit trail inglés.'
  spanish_consistency_notes:
  - Se mantiene "Yahvé" como norma general del proyecto, aunque este versículo no contiene el tetragrama.
  - Se usa "fe" y no "fidelidad" porque el contexto del audit trail favorece la lectura comunitaria creyente.
  - '"Familia de la fe" conserva la metáfora doméstica sin forzar un lenguaje eclesiástico tradicional que el griego no exige.'
