lexical_decisions:
- source_word: Ἴδετε
  english_pob_choice: See
  chosen_spanish: Vean
  alternatives_spanish:
  - Miren
  - Vean ustedes
  lexicon: BDAG
  rationale: El imperativo plural de ὁράω funciona aquí como llamado de atención. «Vean» conserva la fuerza directa y es natural en español bíblico moderno.
- source_word: πηλίκοις
  english_pob_choice: large
  chosen_spanish: cuán grandes
  alternatives_spanish:
  - qué grandes
  - tan grandes
  - de qué tamaño
  lexicon: BDAG
  rationale: La construcción expresa tamaño o magnitud; en español, «cuán grandes» comunica mejor la exclamación de medida y mantiene la ambigüedad entre tamaño físico e intensidad retórica.
- source_word: γράμμασιν
  english_pob_choice: letters
  chosen_spanish: letras
  alternatives_spanish:
  - caracteres
  - escritura
  lexicon: BDAG
  rationale: Aquí se refiere a las letras trazadas en la escritura, no al contenido de la carta. «Letras» es el equivalente más directo y preciso para el efecto visual del pasaje.
- source_word: ὑμῖν
  english_pob_choice: to you
  chosen_spanish: les
  alternatives_spanish:
  - a ustedes
  - para ustedes
  lexicon: BDAG
  rationale: El dativo funciona como objeto indirecto de ἔγραψα. En español, el clítico «les» es la forma más natural y fiel en la oración.
- source_word: ἔγραψα
  english_pob_choice: I have written
  chosen_spanish: he escrito
  alternatives_spanish:
  - escribí
  - les escribí
  lexicon: BDAG
  rationale: En contexto epistolar, el perfecto compuesto suena natural en español y preserva la inmediatez del texto recibido, como en la opción inglesa.
- source_word: τῇ ἐμῇ χειρί
  english_pob_choice: with my own hand
  chosen_spanish: de mi propia mano
  alternatives_spanish:
  - con mi propia mano
  - por mi propia mano
  lexicon: BDAG
  rationale: La frase instrumental enfatiza que Pablo escribe personalmente. «De mi propia mano» es una fórmula idiomática, clara y digna en español; mantiene el valor enfático de ἐμῇ.
theological_decisions:
- issue: Sentido de πηλίκοις γράμμασιν
  english_pob_reading: physical size of the letters
  chosen_spanish_reading: tamaño físico de las letras
  alternative_spanish_readings:
  - cuánto tiempo ha sido la carta
  - qué larga carta les he escrito
  rationale: La combinación con γράμμασιν y la mención inmediata de escribir «de mi propia mano» favorecen la lectura sobre el tamaño de la letra manuscrita. Se conserva la posibilidad alternativa porque históricamente ha sido defendida y afecta el énfasis retórico del versículo.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión léxica cuando la ambigüedad es real.'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el pasaje permanece en alto acuerdo con el texto fuente y con la evaluación de revisión.
  spanish_consistency_notes:
  - Se mantiene «mano» en sentido instrumental y enfático, sin convertirlo en una paráfrasis sobre autoría general.
  - Se conserva el tono exhortativo del imperativo plural con un verbo breve y directo.
  - La ambigüedad de πηλίκοις se deja visible mediante nota, sin resolverla por completo en el cuerpo del texto.
