review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el griego: Ἴδετε como llamado de atención, πηλίκοις γράμμασιν como referencia principal al tamaño de las letras, ὑμῖν como objeto indirecto, y τῇ ἐμῇ χειρί como énfasis en que Pablo escribe personalmente. También preserva correctamente la lectura alternativa en nota.'
  spanish_quality_summary: El español es claro y digno, pero «con cuán grandes letras» suena algo forzado y poco idiomático en español actual. Además, la nota usa «Miren» mientras el texto principal usa «Vean», lo cual no es grave pero sí innecesariamente inconsistente. «Con qué letras tan grandes» o «con qué letras tan grandes les he escrito» comunica mejor el sentido visual y la naturalidad.
  glossary_alignment: No hay términos del glosario de alto impacto en este versículo. La elección de «letras» concuerda con la decisión POB sobre γράμμασιν, y «de mi propia mano» preserva bien el énfasis de τῇ ἐμῇ χειρί, aunque «con mi propia mano» sería más estrictamente instrumental.
  issues:
  - severity: medium
    issue: «con cuán grandes letras» es poco natural en español contemporáneo
    rationale: Aunque comprensible, la secuencia suena calcada y rígida. El griego pide una expresión de tamaño perceptible en la escritura; en español general resulta más idiomático «con qué letras tan grandes».
  - severity: low
    issue: La explicación léxica dice que «cuán grandes» mantiene ambigüedad entre tamaño físico e intensidad retórica
    rationale: La decisión teológica del inglés favorece tamaño físico de las letras, no una ambigüedad retórica adicional en la línea principal. La ambigüedad relevante ya está preservada en la nota alternativa sobre una carta larga.
  - severity: low
    issue: Ligera tensión entre el instrumental griego y la fórmula española elegida
    rationale: «De mi propia mano» es idiomático y aceptable, pero «con mi propia mano» refleja más directamente el valor instrumental de τῇ ἐμῇ χειρί. No obstante, no es un error mayor.
  revised_spanish_text: Vean con qué letras tan grandes les he escrito de mi propia mano[a].
