  rationale: 'Se ajusta la sintaxis para un español natural y fiel al griego: «cree que es algo» en lugar de «se cree ser algo». Se cambia «no siendo nada» por «cuando no es nada» para reflejar mejor la relación participial según la decisión auditada en inglés. La nota léxica se corrige a una alternativa idiomática en español para φρεναπατᾷ.'
