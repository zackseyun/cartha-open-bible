review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite correctamente la estructura y el sentido básico del griego: una condición explicativa («εἰ γὰρ»), la autoevaluación errada («δοκεῖ … εἶναί τι»), el contraste con la realidad («μηδὲν ὤν») y el resultado reflexivo («φρεναπατᾷ ἑαυτόν»). Sin embargo, «se cree ser algo» suena poco natural en español; el sentido se preserva mejor con «cree que es algo» o «se cree algo».'
  spanish_quality_summary: La redacción es mayormente clara, pero «se cree ser algo» es una construcción forzada. «No siendo nada» es comprensible, aunque «cuando no es nada» refleja mejor la decisión inglesa auditada y suena más natural. La nota «se delude a sí mismo» no es español idiomático; debe cambiarse a «se engaña a sí mismo»/«se ilusiona acerca de sí mismo» o, mejor, mantener la alternativa léxica con «se engaña a sí mismo» en el texto y «o “se hace ilusiones acerca de sí mismo”» en nota.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. La decisión sobre δοκεῖ debe priorizar español natural; «cree que es algo» conserva bien la autoestimación. Para φρεναπατᾷ, «se engaña a sí mismo» es correcto; una alternativa nota más idiomática que «se delude» sería «o “se hace ilusiones acerca de sí mismo”».
  issues:
  - severity: medium
    issue: 'Construcción poco natural: «se cree ser algo»'
    rationale: Aunque entendible, no es la forma más idiomática en español neutro. El griego expresa una autoevaluación proposicional; «cree que es algo» la comunica con claridad y dignidad.
  - severity: low
    issue: «No siendo nada» es menos natural que «cuando no es nada»
    rationale: El audit trail inglés justificó «when he is nothing» para no cargar el participio con concesión. «Cuando no es nada» sigue más de cerca esa decisión y mejora la fluidez en español.
  - severity: medium
    issue: 'Nota al pie no idiomática: «se delude a sí mismo»'
    rationale: «Delude» no es español. La nota debe reformularse en español natural y fiel al matiz léxico alternativo de φρεναπατᾷ.
  revised_spanish_text: Porque si alguno cree que es algo, cuando no es nada[a], se engaña a sí mismo.
