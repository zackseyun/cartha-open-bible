translation:
  language: es
  text: Porque si alguno cree que es algo, cuando no es nada[a], se engaña a sí mismo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se hace ilusiones acerca de sí mismo».
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰ γὰρ
  english_pob_choice: For if
  chosen_spanish: Porque si
  alternatives_spanish:
  - Pues si
  - Porque, si
  lexicon: BDAG
  rationale: La combinación introduce una explicación condicional vinculada con la exhortación previa. «Porque si» conserva el valor explicativo de γάρ y el condicional de εἰ en un español natural.
- source_word: δοκεῖ
  english_pob_choice: thinks
  chosen_spanish: se cree
  alternatives_spanish:
  - piensa
  - supone
  - imagina
  lexicon: BDAG
  rationale: Aquí δοκέω expresa la autoevaluación del sujeto. «Se cree» comunica bien esa valoración subjetiva y mantiene el sentido de estimarse a sí mismo de manera engañosa.
- source_word: τις
  english_pob_choice: anyone
  chosen_spanish: alguno
  alternatives_spanish:
  - alguien
  - una persona
  lexicon: BDAG
  rationale: τις es indefinido y general. «Alguno» preserva esa amplitud sin perder la referencia singular representativa del griego.
- source_word: εἶναί τι
  english_pob_choice: he is something
  chosen_spanish: ser algo
  alternatives_spanish:
  - ser alguien importante
  - valer algo
  lexicon: BDAG
  rationale: La expresión idiomática τι εἶναι indica considerarse significativo. «Ser algo» reproduce el contraste conciso con «nada» y conserva la fuerza del giro.
- source_word: μηδὲν ὤν
  english_pob_choice: when he is nothing
  chosen_spanish: no siendo nada
  alternatives_spanish:
  - aunque no es nada
  - siendo nada
  lexicon: BDAG
  rationale: El participio expresa la condición real del sujeto. «No siendo nada» deja abierta la relación sintáctica sin sobrecargarla con una concesión explícita.
- source_word: φρεναπατᾷ
  english_pob_choice: deceives
  chosen_spanish: se engaña
  alternatives_spanish:
  - se delude
  - se deja engañar
  lexicon: BDAG
  rationale: El verbo significa engañar o extraviar la mente. «Se engaña» es la equivalencia más clara y natural en español; «se delude» quedaría más marcado y menos idiomático.
- source_word: ἑαυτόν
  english_pob_choice: himself
  chosen_spanish: a sí mismo
  alternatives_spanish:
  - a sí mismo mismo
  lexicon: BDAG
  rationale: El pronombre reflexivo vuelve sobre el sujeto genérico singular. «A sí mismo» reproduce de forma natural el valor reflexivo del griego.
theological_decisions:
- issue: Masculino singular representativo
  english_pob_reading: he / himself
  chosen_spanish_reading: se / sí mismo con sujeto singular genérico
  alternative_spanish_readings:
  - se / sí mismos
  - la persona / a sí misma
  rationale: El griego usa formas masculinas singulares representativas. En español, «alguno ... se ... a sí mismo» conserva la singularidad genérica sin pluralizar ni neutralizar indebidamente el texto.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: la nota [a] ahora está anclada explícitamente en el texto («no siendo nada[a]»). No se introdujeron cambios textuales adicionales respecto del sentido auditado.'
  spanish_consistency_notes:
  - Mantengo el contraste breve y punzante entre «ser algo» y «no siendo nada», que refleja la concisión del griego.
  - Uso «se engaña a sí mismo» como equivalente idiomático de φρεναπατᾷ ἑαυτόν, preservando el matiz de autoengaño mental.
  - «Porque si» respeta el arranque explicativo-condicional y suena natural en español bíblico contemporáneo.
