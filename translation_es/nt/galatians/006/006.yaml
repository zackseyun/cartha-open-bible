translation:
  language: es
  text: Ahora, el que es instruido en la palabra comparta todos los bienes buenos[a] con el que instruye.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «comparta con el que instruye con toda clase de bienes buenos»; probablemente incluye apoyo material.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Κοινωνείτω
  english_pob_choice: let ... share
  chosen_spanish: comparta
  alternatives_spanish:
  - tenga comunión
  - participe
  - comparta con
  lexicon: BDAG
  rationale: El imperativo presente exige una acción continua. «Comparta» conserva la idea de compartir de manera práctica y encaja bien con el dativo de persona. «Tenga comunión» sería posible, pero en español puede sonar demasiado abstracto aquí.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y
  - Pero
  lexicon: BDAG
  rationale: δέ introduce una transición suave; «Ahora» reproduce ese valor discursivo sin cargar el verso con contraste.
- source_word: ὁ κατηχούμενος
  english_pob_choice: the one who is taught
  chosen_spanish: el que es instruido
  alternatives_spanish:
  - el que es enseñado
  - el catecúmeno
  lexicon: BDAG
  rationale: El participio pasivo describe a quien recibe instrucción. «Instruido» es natural en español y evita introducir el sentido técnico posterior de «catecúmeno» como término eclesiástico fijo.
- source_word: τὸν λόγον
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - la enseñanza
  lexicon: BDAG
  rationale: λόγος aquí se refiere al contenido proclamado o enseñado. «La palabra» conserva la formulación paulina habitual y es transparente en español.
- source_word: τῷ κατηχοῦντι
  english_pob_choice: the one who teaches
  chosen_spanish: el que instruye
  alternatives_spanish:
  - el que enseña
  - el instructor
  lexicon: BDAG
  rationale: El participio activo nombra a quien imparte la instrucción. «Instruye» mantiene la correspondencia con «es instruido» y suena natural en el registro del verso.
- source_word: ἐν πᾶσιν ἀγαθοῖς
  english_pob_choice: all good things
  chosen_spanish: en todos los bienes
  alternatives_spanish:
  - con todos los bienes
  - en toda clase de bienes
  lexicon: BDAG
  rationale: La expresión es amplia y probablemente incluye apoyo material, pero no debe estrecharse indebidamente. «En todos los bienes» preserva la amplitud del griego y la ambigüedad útil del texto.
theological_decisions:
- issue: Naturaleza de la participación requerida
  english_pob_reading: The verse instructs the taught person to share good things, likely including material support, with the teacher of the word.
  chosen_spanish_reading: El verso manda que quien recibe instrucción comparta bienes con quien instruye, con posible referencia a apoyo material.
  alternative_spanish_readings:
  - Solo pide comunión espiritual general, sin implicar apoyo material.
  - Se refiere exclusivamente a sostén económico.
  rationale: La combinación de κοινωνέω con el dativo personal y la frase «en todos los bienes» sugiere una participación práctica. La redacción española conserva esa amplitud sin reducirla solo a dinero ni vaciarla en mera fraternidad abstracta.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: He seguido el ajuste de la revisión inglesa que eliminó «in» para expresar con más naturalidad la idea de compartir bienes con el maestro, manteniendo a la vez la amplitud del griego y el registro formal.
  spanish_consistency_notes:
  - Se mantiene «la palabra» para λόγος, en línea con el uso paulino habitual.
  - Se evita «siervo» o terminología eclesiástica posterior, porque el griego describe una relación de instrucción, no un cargo técnico.
  - «Bienes» conserva la amplitud de ἀγαθά y permite la lectura de apoyo material sin imponerla como única posibilidad.
