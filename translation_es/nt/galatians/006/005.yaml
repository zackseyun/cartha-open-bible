translation:
  language: es
  text: Pues cada uno llevará su propia carga[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «soportará su propia carga». El griego usa φορτίον («carga»), distinto de βάρη («cargas» o «pesos») en el versículo 2.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἕκαστος
  english_pob_choice: each one
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada cual
  - todos
  lexicon: BDAG
  rationale: ἕκαστος es distributivo singular; «cada uno» conserva esa referencia individual de forma natural en español y mantiene el contraste con la responsabilidad personal del versículo.
- source_word: γὰρ
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: La partícula introduce una explicación o fundamento del contexto inmediato; «porque» funciona bien en español moderno y mantiene la relación lógica sin añadir énfasis extra.
- source_word: τὸ ἴδιον
  english_pob_choice: his own
  chosen_spanish: su propia
  alternatives_spanish:
  - su propio
  - su
  lexicon: BDAG
  rationale: ἴδιος subraya posesión o pertenencia propia. En español, «su propia» comunica esa idea con claridad y evita imponer un género más marcado de lo necesario en la superficie del texto.
- source_word: φορτίον
  english_pob_choice: load
  chosen_spanish: carga
  alternatives_spanish:
  - peso
  - carga propia
  - bulto
  lexicon: BDAG
  rationale: «Carga» es el equivalente natural de φορτίον y, a diferencia de «peso», conserva la imagen de algo que se lleva. Además permite mantener la distinción léxica frente a «φορτία/βάρη» en el contexto inmediato, sin traducir todo con «carga» de manera indistinta donde el griego diferencia.
- source_word: βαστάσει
  english_pob_choice: will carry
  chosen_spanish: llevará
  alternatives_spanish:
  - cargará
  - soportará
  - portará
  lexicon: BDAG
  rationale: El futuro activo expresa una acción venidera; «llevará» es idiomático, concreto y fiel a la imagen de cargar/transportar algo. «Soportará» sería más abstracto y «portará» más marcado.
theological_decisions:
- issue: Distinción entre v. 2 y v. 5 (cargas vs. carga propia)
  english_pob_reading: The verse is rendered to preserve the lexical distinction between 'burdens' in v.2 and 'load' here, without forcing a theological contradiction or harmonization beyond the Greek.
  chosen_spanish_reading: El versículo mantiene la distinción entre las cargas que se ayudan a llevar en v. 2 y la carga propia que cada uno llevará aquí, sin resolverla artificialmente en la traducción.
  alternative_spanish_readings:
  - Traducir ambos versículos con «carga» y dejar la diferencia implícita
  - Suavizar el contraste con una formulación más general sobre responsabilidad
  rationale: 'Pablo usa vocabulario distinto en el contexto inmediato. «Carga» en v. 5 preserva el contraste con la ayuda mutua de v. 2 y deja visible la tensión textual: unos pesos se comparten, pero cada persona sigue responsable de lo suyo. La traducción no impone una explicación doctrinal específica en el texto principal.'
  doctrine_reference: Translation philosophy §§3, 5
translation_notes:
  revision_awareness: El texto coincide con el último pase revisado del inglés POB (sin cambios en la revisión más reciente) y conserva la decisión auditada de distinguir φορτίον de βάρη en el contexto inmediato.
  spanish_consistency_notes:
  - Se emplea «carga» para φορτίον y no «burden» calco ni «peso» como equivalente principal.
  - «Cada uno» conserva el distributivo singular del griego.
  - «Su propia» evita perder la fuerza de ἴδιον.
  - La nota al pie mantiene la alternativa lexical documentada y la distinción con el versículo 2.
