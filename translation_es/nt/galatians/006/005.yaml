review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: ἕκαστος = «cada uno», βαστάσει = «llevará», y τὸ ἴδιον φορτίον = «su propia carga». Sin embargo, «Porque» para γὰρ al inicio de frase suena más causal y menos natural aquí que «Pues», que conserva mejor el valor explicativo/discursivo de γάρ. Además, la nota al pie no preserva con suficiente precisión la alternativa inglesa documentada («bear his own burden») y propone «peso», que debilita la imagen de algo que se lleva.'
  spanish_quality_summary: El español es claro y legible, pero puede mejorarse ligeramente para sonar más natural en contexto paulino y mantener mejor la distinción léxica. «Pues cada uno llevará su propia carga» fluye mejor que «Porque cada uno...». La nota actual también puede afinarse para evitar una alternativa menos fiel («peso»).
  glossary_alignment: No hay conflictos con la terminología del proyecto. La elección de «carga» para φορτίον es adecuada y preserva la distinción con v. 2. No se involucran términos sensibles del glosario mayor.
  issues:
  - severity: medium
    issue: «Porque» para γὰρ al inicio de la oración
    rationale: Aunque posible, «porque» en español suele introducir una causa más directamente subordinada. En este contexto, γάρ funciona como conector explicativo; «pues» suena más natural y conserva mejor la relación lógica sin forzar subordinación.
  - severity: medium
    issue: La nota al pie propone «su propio peso» como alternativa
    rationale: «Peso» no refleja tan bien φορτίον ni la alternativa auditada en inglés («bear his own burden»). Es mejor ofrecer «soportará su propia carga» o «llevará su propia carga»/«su propia carga» según la necesidad, y explicar la distinción con βάρη en v. 2.
  revised_spanish_text: Pues cada uno llevará su propia carga[a].
