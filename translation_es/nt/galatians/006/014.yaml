base_translation:
  language: en
  yaml_path: translation/nt/galatians/006/014.yaml
  text: But far be it from me to boast except in the cross of our Lord Jesus Messiah[a], through which the world has been crucified to me[b], and I to the world.
  footnotes:
  - marker: a
    text: Or 'through whom,' if the relative pronoun is taken to refer to the Lord Jesus Messiah rather than to 'the cross.'
    reason: alternative_reading
  - marker: b
    text: Greek 'Jesus Christ.' The title Χριστός is rendered 'Messiah' here to preserve its meaning.
    reason: lexical_alternative
