translation:
  language: es
  text: Pero lejos esté de mí gloriarme, sino en la cruz de nuestro Señor Jesús Mesías[a], por medio de la cual[b] el mundo ha sido crucificado para mí, y yo al mundo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «Jesús Cristo». Aquí Χριστός se ha traducido como «Mesías» para conservar su valor de título.'
    reason: lexical_alternative
  - marker: b
    text: O «por quien», si el relativo se toma como referido al Señor Jesús Mesías más bien que a «la cruz».
    reason: alternative_reading
lexical_decisions:
- source_word: μὴ γένοιτο
  english_pob_choice: far be it from me
  chosen_spanish: lejos esté de mí
  alternatives_spanish:
  - de ninguna manera
  - nunca tal
  lexicon: BDAG
  rationale: La expresión griega es una repulsa enfática. En español, «lejos esté de mí» conserva el tono idiomático y personal del rechazo sin sonar forzada; transmite mejor la fuerza retórica que una calca literal.
- source_word: καυχᾶσθαι
  english_pob_choice: to boast
  chosen_spanish: gloriarme
  alternatives_spanish:
  - boast
  - jactarme
  lexicon: BDAG
  rationale: En este contexto paulino, el verbo apunta a presumir o gloriarse en algo como base de honra. «Gloriarme» funciona con dignidad en español bíblico y mantiene el contraste con el único motivo legítimo de orgullo.
- source_word: εἰ μὴ
  english_pob_choice: except
  chosen_spanish: sino
  alternatives_spanish:
  - excepto
  - salvo
  lexicon: BDAG
  rationale: Aquí introduce la única excepción válida al rechazo anterior. «Sino» expresa con naturalidad esa restricción exclusiva en español.
- source_word: σταυρῷ
  english_pob_choice: cross
  chosen_spanish: cruz
  alternatives_spanish:
  - madero
  - estaca
  lexicon: BDAG
  rationale: En el contexto de la pasión y de Pablo, «cruz» es la equivalencia más clara y reconocible, sin perder el peso teológico del instrumento de ejecución.
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: BDAG
  rationale: «Señor» es el equivalente natural y reverente de κύριος en el registro bíblico, y conserva el valor confesional del título.
- source_word: Χριστοῦ
  english_pob_choice: Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Se sigue la decisión del proyecto de traducir Χριστός cuando funciona como título. «Mesías» preserva el contenido semántico de ungido/rey esperado, en lugar de tratarlo como nombre fijo.
- source_word: δι’ οὗ
  english_pob_choice: through which
  chosen_spanish: por quien[a]
  alternatives_spanish:
  - por lo cual
  - por medio del cual
  lexicon: BDAG
  rationale: La proximidad gramatical favorece que el antecedente sea σταυρῷ («cruz»), de modo que la traducción base es «por quien/por lo cual» según se resuelva el antecedente en la nota. Se preserva la tensión sintáctica en lugar de imponer una sola lectura.
- source_word: κόσμος
  english_pob_choice: the world
  chosen_spanish: el mundo
  alternatives_spanish:
  - el orden del mundo presente
  lexicon: BDAG
  rationale: Aquí κόσμος designa el orden mundano en relación opuesta a Dios, pero «el mundo» mantiene la amplitud del término y es la forma más natural en español.
- source_word: ἐσταύρωται
  english_pob_choice: has been crucified
  chosen_spanish: ha sido crucificado
  alternatives_spanish:
  - está crucificado
  - fue crucificado
  lexicon: BDAG
  rationale: El perfecto pasivo expresa una acción completada con efecto vigente. «Ha sido crucificado» conserva ese resultado permanente mejor que un simple pasado o presente.
- source_word: κἀγὼ κόσμῳ
  english_pob_choice: and I to the world
  chosen_spanish: y yo para el mundo
  alternatives_spanish:
  - y yo al mundo
  - y yo he sido crucificado para el mundo
  lexicon: BDAG
  rationale: El verbo queda elidido en griego y se sobreentiende del miembro anterior. «Para el mundo» reproduce el paralelismo breve y el sentido relacional de separación mutua sin sobreexplicar la elipsis.
theological_decisions:
- issue: Título cristológico Χριστοῦ en la frase «Ἰησοῦ Χριστοῦ»
  english_pob_reading: Jesus Messiah
  chosen_spanish_reading: Jesús Mesías
  alternative_spanish_readings:
  - Jesús Cristo
  rationale: Se mantiene la política del proyecto de traducir Χριστός cuando actúa como título, no como nombre fijo. «Mesías» comunica el valor semántico del ungido esperado y evita borrar la carga teológica del término.
  doctrine_reference: 'DOCTRINE.md: traducir títulos; preservar el sentido del título Χριστός'
- issue: Antecedente de δι’ οὗ
  english_pob_reading: 'the cross is the antecedent and means: ''through which'''
  chosen_spanish_reading: 'la cruz es el antecedente y el medio: «por quien» / «por lo cual»'
  alternative_spanish_readings:
  - 'Jesús Mesías es el antecedente implícito: «por quien»'
  - por medio de quien
  rationale: La sintaxis griega hace que el antecedente inmediato sea σταυρῷ, que concuerda con el relativo. La traducción española conserva esa posibilidad y la nota permite leer la referencia como la cruz o, secundariamente, como una referencia personal al Señor mediante el recurso retórico del relativo.
  doctrine_reference: 'DOCTRINE.md: primacía del original; conservar tensiones interpretativas no resueltas por la tradición'
- issue: Valor de καυχᾶσθαι en contraste retórico
  english_pob_reading: to boast
  chosen_spanish_reading: gloriarse
  alternative_spanish_readings:
  - jactarse
  - boast
  rationale: En español bíblico, «gloriarse» expresa bien la idea de tomar orgullo en algo, y funciona con naturalidad en el contraste paulino sin sonar peyorativo en exceso.
  doctrine_reference: 'DOCTRINE.md: equivalencia por sentido en términos retóricos paulinos'
translation_notes:
  revision_awareness: El texto español sigue la última decisión de revisión que restauró «Mesías» para Χριστός, en lugar de «Cristo», y mantiene la lectura sintáctica más cercana al griego con la nota alternativa sobre el antecedente de δι’ οὗ. No se adoptó una traducción que ocultara la tensión entre la referencia al Señor y la referencia a la cruz.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - «Señor» se conserva para κύριος conforme al uso bíblico del título.
  - «Mesías» se usa para Χριστός según la política del proyecto y la revisión más reciente.
  - La elipsis final («y yo para el mundo») se conserva por paralelismo y fluidez natural en español.
