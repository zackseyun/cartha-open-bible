  to: Cuantos quieren causar buena impresión en la carne[a], esos los obligan a ustedes a circuncidarse, solo para que no sean perseguidos por la cruz del Mesías[b][c].
  rationale: Se corrige la alineación de notas para reflejar fielmente el audit trail inglés, especialmente la nota tradicional sobre 'Cristo'. También se mejora la naturalidad del español con 'causar buena impresión' y se explicita mejor el objeto de 'obligan' sin alterar el sentido del griego.
