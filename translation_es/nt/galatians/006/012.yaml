translation:
  language: es
  text: Cuantos quieren causar buena impresión en la carne[a], esos los obligan a ustedes a circuncidarse, solo para que no sean perseguidos por la cruz del Mesías[b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''causar una impresión favorable externamente''.'
    reason: lexical_alternative
  - marker: b
    text: 'Tradicional: ''la cruz de Cristo''.'
    reason: alternative_reading
  - marker: c
    text: 'O: ''a causa de la cruz del Mesías''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅσοι
  english_pob_choice: As many as
  chosen_spanish: Cuantos
  alternatives_spanish:
  - Todos los que
  - Los que
  lexicon: BDAG
  rationale: Conserva el valor distributivo y comprehensivo del pronombre relativo cuantificativo, con un español natural y directo.
- source_word: θέλουσιν
  english_pob_choice: want to
  chosen_spanish: quieren
  alternatives_spanish:
  - desean
  - pretenden
  lexicon: BDAG
  rationale: Expresa voluntad presente de forma clara y natural; 'quieren' comunica bien la intención sin sobrecargar el estilo.
- source_word: εὐπροσωπῆσαι
  english_pob_choice: make a good showing
  chosen_spanish: dar una buena apariencia
  alternatives_spanish:
  - hacer una buena demostración
  - quedar bien
  lexicon: BDAG
  rationale: La idea es presentarse favorablemente o causar impresión externa; 'dar una buena apariencia' conserva esa evaluación de apariencia exterior sin endurecer demasiado el giro idiomático.
- source_word: ἐν σαρκί
  english_pob_choice: in the flesh
  chosen_spanish: en la carne
  alternatives_spanish:
  - externamente
  - en asuntos externos
  lexicon: BDAG
  rationale: Se mantiene 'carne' para preservar el término paulino y su carga teológica; el contexto apunta a marcadores externos como la circuncisión, pero la tensión de σάρξ se conserva en el texto principal.
- source_word: οὗτοι
  english_pob_choice: these are
  chosen_spanish: esos
  alternatives_spanish:
  - éstos
  - ellos
  lexicon: BDAG
  rationale: El demostrativo añade énfasis; 'esos' refleja esa distancia retórica y señala a los mismos mencionados.
- source_word: ἀναγκάζουσιν
  english_pob_choice: are forcing
  chosen_spanish: les obligan
  alternatives_spanish:
  - los fuerzan
  - los constriñen
  lexicon: BDAG
  rationale: La coerción es central; 'obligan' comunica presión real en español contemporáneo de manera fluida y fiel.
- source_word: ὑμᾶς περιτέμνεσθαι
  english_pob_choice: you to be circumcised
  chosen_spanish: a circuncidarse
  alternatives_spanish:
  - a recibir la circuncisión
  - a que se circunciden
  lexicon: BDAG
  rationale: El infinitivo pasivo se vierte naturalmente como 'circuncidarse' con complemento de obligación; mantiene el hecho concreto del rito.
- source_word: μόνον ἵνα
  english_pob_choice: only so that
  chosen_spanish: solo para que
  alternatives_spanish:
  - únicamente para que
  - solo con el fin de que
  lexicon: BDAG
  rationale: Preserva el valor limitativo de μόνον y el propósito de ἵνα en un español ágil y preciso.
- source_word: τῷ σταυρῷ
  english_pob_choice: for the cross
  chosen_spanish: por la cruz
  alternatives_spanish:
  - a causa de la cruz
  - a raíz de la cruz
  lexicon: BDAG
  rationale: La dative con pasivo expresa relación causal o motivo de persecución; 'por la cruz' funciona de modo natural y deja abierta la relación exacta.
- source_word: τοῦ Χριστοῦ
  english_pob_choice: of the Messiah
  chosen_spanish: del Mesías
  alternatives_spanish:
  - de Cristo
  lexicon: BDAG
  rationale: Se sigue la directriz del proyecto de traducir Χριστός como 'Mesías' cuando funciona como título; aquí no es un nombre litúrgico fijo sino un genitivo titular.
- source_word: μὴ διώκωνται
  english_pob_choice: they may not be persecuted
  chosen_spanish: no sean perseguidos
  alternatives_spanish:
  - no les persigan
  - no sufran persecución
  lexicon: BDAG
  rationale: 'El subjuntivo pasivo final expresa propósito: evitar la persecución. ''No sean perseguidos'' es idiomático y mantiene el sentido de pasivo.'
theological_decisions:
- issue: Renderización de Χριστοῦ en la frase τῷ σταυρῷ τοῦ Χριστοῦ
  english_pob_reading: the cross of the Messiah
  chosen_spanish_reading: la cruz del Mesías
  alternative_spanish_readings:
  - la cruz de Cristo
  rationale: Se preserva el valor titular de Χριστός según la pauta del proyecto. 'Mesías' mantiene el contenido semántico y evita una traslación automática al uso eclesiástico tradicional cuando no es la mejor opción según el texto.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
- issue: Sentido de ἐν σαρκί
  english_pob_reading: in the flesh
  chosen_spanish_reading: en la carne
  alternative_spanish_readings:
  - externamente
  - en asuntos externos
  rationale: Se conserva 'carne' para no resolver de antemano la carga paulina de σάρξ. El contexto sugiere apariencia externa y señal corporal, pero el texto principal mantiene el término teológicamente cargado.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for σάρξ; Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'La traducción sigue el último pase de revisión sin cambios: el contexto auditado muestra alta concordancia y no requiere ajustes adicionales. Se respetan las decisiones léxicas del POB inglés, especialmente sobre σάρξ, el valor titular de Χριστός y el matiz causal de la persecución.'
  spanish_consistency_notes:
  - Se mantiene 'Mesías' para Χριστός conforme a la política del proyecto y a la lectura titulativa del genitivo.
  - '''Carne'' se conserva como término paulino, con nota para la posible lectura idiomática externa.'
  - El demostrativo 'esos' refleja el énfasis retórico de οὗτοι sin añadir información.
  - La construcción 'no sean perseguidos' reproduce el pasivo de διώκωνται en español natural.
