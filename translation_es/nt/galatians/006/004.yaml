translation:
  language: es
  text: Pero que cada uno examine[a] su propia obra, y entonces tendrá su motivo de gloriarse[b] solo en sí mismo y no en la otra persona[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pruebe» o «someta a prueba». El verbo griego puede expresar un examen evaluativo de la propia conducta.
    reason: lexical_alternative
  - marker: b
    text: O «base para gloriarse» o simplemente «gloriarse». El término griego puede referirse tanto al acto de gloriarse como a la base para ello.
    reason: lexical_alternative
  - marker: c
    text: 'Griego: «el otro», en contraste con uno mismo; es decir, otra persona.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔργον
  english_pob_choice: work
  chosen_spanish: obra
  alternatives_spanish:
  - trabajo
  - obra hecha
  - acción
  lexicon: BDAG
  rationale: «Obra» es un equivalente natural y amplio en español para ἔργον aquí, y puede abarcar conducta, actuación o lo realizado sin reducir el sentido a un acto aislado. Mantiene bien el contraste con compararse con otros.
- source_word: δοκιμαζέτω
  english_pob_choice: let ... test
  chosen_spanish: examine
  alternatives_spanish:
  - pruebe
  - someta a prueba
  - evalúe
  lexicon: BDAG
  rationale: En este contexto el verbo pide una evaluación personal de la propia conducta. «Examinar» comunica la idea de revisar con atención sin añadir la connotación de aprobación previa o resultado favorable.
- source_word: ἕκαστος
  english_pob_choice: each one
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada persona
  - todos
  lexicon: BDAG
  rationale: «Cada uno» conserva la fuerza distributiva del griego y suena natural en español, manteniendo el sujeto singular implícito en los verbos siguientes.
- source_word: ἑαυτοῦ
  english_pob_choice: his own
  chosen_spanish: su propia
  alternatives_spanish:
  - de sí mismo
  - su
  lexicon: BDAG
  rationale: El reflexivo se refiere a la obra del propio sujeto. «Su propia» preserva esa relación sin necesidad de explicitarla más de lo que el griego exige.
- source_word: εἰς ἑαυτὸν μόνον
  english_pob_choice: in himself alone
  chosen_spanish: solo en sí mismo
  alternatives_spanish:
  - en sí mismo únicamente
  - con respecto a sí mismo solamente
  - solo respecto de sí
  lexicon: BDAG
  rationale: La preposición con el reflexivo expresa foco sobre uno mismo frente a la comparación con otro. «Solo en sí mismo» es una formulación idiomática en español que conserva el énfasis limitativo de μόνον.
- source_word: καύχημα
  english_pob_choice: reason for boasting
  chosen_spanish: motivo de gloriarse
  alternatives_spanish:
  - razón para jactarse
  - motivo de orgullo
  - gloria
  lexicon: BDAG
  rationale: καύχημα puede referirse tanto al acto de gloriarse como a la base de ese gloriarse. «Motivo de gloriarse» mantiene la ambigüedad útil del griego y evita cargar el texto con la tonalidad moderna negativa de «orgullo» o «jactancia».
- source_word: ἕξει
  english_pob_choice: he will have
  chosen_spanish: tendrá
  alternatives_spanish:
  - poseerá
  - habrá
  lexicon: BDAG
  rationale: El futuro simple español transmite con claridad el resultado consecuente del examen de la propia obra.
- source_word: τὸν ἕτερον
  english_pob_choice: the other person
  chosen_spanish: el otro
  alternatives_spanish:
  - la otra persona
  - otro
  - el otro hombre
  lexicon: BDAG
  rationale: ἕτερον contrasta con el propio sujeto y puede traducirse de forma natural como «el otro». El contexto deja claro que se trata de otra persona frente a uno mismo, sin necesidad de añadir más.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Ahora bien
  - Y
  lexicon: BDAG
  rationale: «Pero» expresa bien el leve contraste con la exhortación anterior y conserva el enlace discursivo del griego.
theological_decisions:
- issue: Sentido de καύχημα en Pablo
  english_pob_reading: Rendered as 'reason for boasting' rather than a flat 'boast.'
  chosen_spanish_reading: «Motivo de gloriarse» en vez de una simple palabra como «gloria» o «jactancia».
  alternative_spanish_readings:
  - motivo de jactarse
  - razón para presumir
  - gloria
  rationale: 'La expresión española preserva la tensión del texto: no fuerza una valoración moral positiva o negativa, sino que deja el énfasis en la base del gloriarse. Así se evita resolver anticipadamente el alcance paulino del término.'
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente.
- issue: Lenguaje masculino singular representativo
  english_pob_reading: Used 'his own' and 'he will have' for the singular generic subject.
  chosen_spanish_reading: «Cada uno ... tendrá ... su propia» en singular genérico.
  alternative_spanish_readings:
  - cada persona ... tendrá ... su propia
  - cada uno ... tendrá ... su propio
  rationale: El griego usa masculino singular con sentido genérico. El español conserva esa estructura con una formulación natural y fiel al valor distributivo del original.
  doctrine_reference: Fidelidad al sujeto singular genérico del texto fuente.
translation_notes:
  revision_awareness: Se siguió el consenso alto del control cruzado; no hubo revisiones aplicadas en el ciclo más reciente, y la redacción española conserva la misma decisión exegética del texto fuente y del audit trail inglés.
  spanish_consistency_notes:
  - Se mantuvo el valor contrastivo entre la propia obra y la comparación con otra persona.
  - Se eligió «gloriarse» para reflejar el campo semántico de καύχημα sin introducir un juicio de valor ajeno al pasaje.
  - Se respetó el sujeto singular genérico con «cada uno» y los verbos en tercera persona singular.
  - Se evitó «SEÑOR» u otra convención de ocultamiento porque este versículo no contiene el nombre divino.
