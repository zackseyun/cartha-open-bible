translation:
  language: es
  text: Y todos los que anden[a] conforme a esta regla—paz sobre ellos y misericordia,[b][c] y sobre el Israel de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sigan esta norma». El verbo griego sugiere caminar en línea con una regla o mantener el paso con ella.'
    reason: lexical_alternative
  - marker: b
    text: 'La expresión «el Israel de Dios» es discutida: Pablo puede referirse a los judíos creyentes, a toda la iglesia, o al pueblo de Dios en un sentido más amplio. La traducción conserva la redacción griega sin resolver el debate.'
    reason: alternative_reading
  - marker: c
    text: La «y» final puede entenderse como la adición de un grupo más («y sobre el Israel de Dios») o como una reformulación del mismo grupo («aun sobre el Israel de Dios»).
    reason: alternative_reading
lexical_decisions:
- source_word: ὅσοι
  english_pob_choice: as many as
  chosen_spanish: todos los que
  alternatives_spanish:
  - cuantos
  - cuantos sean
  lexicon: BDAG
  rationale: En español, «todos los que» conserva bien el valor distributivo e indefinido del griego sin sonar forzado. Mantiene la amplitud del referente que el inglés expresó con «as many as».
- source_word: τῷ κανόνι τούτῳ
  english_pob_choice: by this rule
  chosen_spanish: conforme a esta regla
  alternatives_spanish:
  - según esta norma
  - por esta regla
  - de acuerdo con esta norma
  lexicon: BDAG
  rationale: κανών aquí expresa una norma o patrón de conducta. «Conforme a esta regla» comunica la idea de vivir en línea con ese criterio, con un español natural y sobrio.
- source_word: στοιχήσουσιν
  english_pob_choice: will walk by
  chosen_spanish: anden
  alternatives_spanish:
  - caminen
  - vivan conforme a
  - marchen en línea con
  lexicon: BDAG
  rationale: El verbo griego conserva la metáfora de andar en orden o en línea con una norma. «Anden» mantiene esa imagen mejor que una paráfrasis más plana como «siguen».
- source_word: εἰρήνη
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - paz y tranquilidad
  - paz
  lexicon: BDAG
  rationale: «Paz» es la equivalencia directa y natural para εἰρήνη en una bendición apostólica.
- source_word: ἔλεος
  english_pob_choice: mercy
  chosen_spanish: misericordia
  alternatives_spanish:
  - misericordia
  - compasión
  lexicon: BDAG
  rationale: «Misericordia» es el término más natural en español bíblico para ἔλεος en una fórmula de bendición, y preserva el paralelismo con «paz».
- source_word: ἐπ’ αὐτοὺς ... καὶ ἐπὶ
  english_pob_choice: upon them ... and upon
  chosen_spanish: sobre ellos ... y sobre
  alternatives_spanish:
  - sobre ellos ... y sobre
  - para ellos ... y para
  lexicon: BDAG
  rationale: «Sobre» conserva la repetición de ἐπί y el tono benedictorio del texto griego, sin suavizarlo demasiado con «para».
- source_word: Ἰσραὴλ τοῦ θεοῦ
  english_pob_choice: the Israel of God
  chosen_spanish: el Israel de Dios
  alternatives_spanish:
  - el Israel de Dios
  - el Israel perteneciente a Dios
  - el Israel de Yahvé
  lexicon: BDAG
  rationale: Se preserva la construcción genitiva de forma transparente. «El Israel de Dios» deja abierta la referencia interpretativa sin resolverla en la traducción.
theological_decisions:
- issue: Referente de «el Israel de Dios»
  english_pob_reading: Rendered literally as 'the Israel of God' without specifying whether Paul means believing Jews specifically, the whole church, or the people of God more broadly.
  chosen_spanish_reading: Se traduce literalmente como «el Israel de Dios», sin aclarar si se trata de judíos creyentes, de la iglesia entera o del pueblo de Dios en sentido más amplio.
  alternative_spanish_readings:
  - los creyentes de Israel
  - la iglesia como el Israel verdadero
  - todo el pueblo de Dios
  rationale: El griego permite más de una lectura y el texto no obliga a una sola. La traducción literal preserva la tensión teológica documentada en el audit trail.
  doctrine_reference: Preservar la tensión teológica sin resolverla en la traducción.
- issue: Valor de la conjunción final antes de «el Israel de Dios»
  english_pob_reading: Translated as a second 'and upon,' allowing either an additional group or an appositional/restated group to remain possible.
  chosen_spanish_reading: Se mantiene «y sobre», dejando posible tanto una lectura aditiva como una lectura explicativa o de reanudación.
  alternative_spanish_readings:
  - «aun sobre el Israel de Dios»
  - «es decir, sobre el Israel de Dios»
  rationale: La partícula καί admite más de una función contextual. «Y sobre» evita imponer en el texto principal una decisión sintáctica o teológica.
  doctrine_reference: Preservar la tensión teológica sin resolverla en la traducción.
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto griego y el audit trail inglés, preservando la metáfora de caminar conforme a una norma, el tono de bendición con repetición de ἐπί, y la ambigüedad interpretativa de «el Israel de Dios» sin añadir aclaraciones doctrinales no exigidas por el texto.
  spanish_consistency_notes:
  - Se usa «Dios» para θεοῦ, conforme al estándar del proyecto.
  - Se traduce κανών como «regla» y no como «norma» en el texto principal, pero se documenta «norma» como alternativa contextual.
  - Se mantiene el orden benedictorio «paz ... y misericordia» con repetición de «sobre» para reflejar la estructura griega.
  - No se introduce «Cristo» ni «SEÑOR», porque el versículo no lo requiere.
