base_translation:
  language: en
  yaml_path: translation/nt/galatians/006/016.yaml
  text: And as many as will walk by this rule—peace be upon them and mercy[c][b][a], and upon the Israel of God.
  footnotes:
  - marker: a
    text: Or 'all who will follow this standard.' The verb carries the sense of walking in line with or keeping in step with a rule.
    reason: lexical_alternative
  - marker: b
    text: '''The Israel of God'' is debated: Paul may mean believing Jews, the whole church, or God''s people more broadly. The translation preserves the Greek wording without resolving the debate.'
    reason: alternative_reading
  - marker: c
    text: The final 'and' may be read either as adding a further group ('and upon the Israel of God') or as restating the same group ('even upon the Israel of God').
    reason: alternative_reading
