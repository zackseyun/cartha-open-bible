review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura principal del griego: advertencia pasiva (''No se dejen engañar''), afirmación sobre Dios, y el principio proverbial de siembra/cosecha. Sin embargo, ''no puede ser burlado'' introduce un matiz modal de imposibilidad que no está explícito en οὐ μυκτηρίζεται, donde el sentido auditado es una pasiva simple: ''no es burlado'' / ''no se puede burlar de Dios'' solo como inferencia. Además, ''pues lo que'' funciona, pero ''porque todo lo que'' refleja mejor ὃ γὰρ ἐὰν como generalización indefinida.'
  spanish_quality_summary: El español es claro y legible, con buen registro bíblico. No obstante, 'Dios no puede ser burlado' suena algo interpretativo; 'de Dios nadie se burla' sería idiomático, pero se aleja de la pasiva auditada. La mejor reparación mínima es 'Dios no es burlado'. El resto fluye bien. 'El hombre' es comprensible como genérico en registro tradicional, y la nota ayuda a evitar ambigüedad.
  glossary_alignment: No hay conflicto con la terminología de proyecto principal. 'Dios' es correcto para θεός. El manejo de ἄνθρωπος como 'el hombre' concuerda con la decisión inglesa de preservar el masculino genérico, acompañado de nota. El par agrícola 'siembre/segará' mantiene la metáfora literal.
  issues:
  - severity: medium
    issue: '''no puede ser burlado'' añade modalidad no explícita'
    rationale: οὐ μυκτηρίζεται es una pasiva indicativa presente, no una construcción de posibilidad. El rastro inglés auditado eligió 'is not mocked', no 'cannot be mocked'.
  - severity: low
    issue: '''pues lo que'' podría expresar con más fuerza la generalidad de ὃ γὰρ ἐὰν'
    rationale: '''Todo lo que'' en español refleja mejor el valor indefinido-general de la construcción condicional relativa griega.'
  revised_spanish_text: 'No se dejen engañar: Dios no es burlado, porque todo lo que el hombre siembre, eso también segará.[a]'
