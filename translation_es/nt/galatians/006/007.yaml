translation:
  language: es
  text: 'No se dejen engañar: Dios no es burlado, porque todo lo que el hombre siembre, eso también segará.[a]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'una persona'—el griego dice 'el hombre' como singular representativo de un ser humano en general.
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ πλανᾶσθε
  english_pob_choice: Do not be deceived
  chosen_spanish: No se dejen engañar
  alternatives_spanish:
  - No se dejen llevar por el error
  - No se dejen extraviar
  lexicon: BDAG
  rationale: El imperativo plural pasivo en griego expresa una advertencia directa. En español, 'No se dejen engañar' conserva bien la idea de no caer bajo engaño sin sonar forzado, y mantiene el tono exhortativo de Pablo.
- source_word: θεὸς
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: BDAG
  rationale: θεός aquí designa a Dios de manera directa y no requiere perífrasis. 'Dios' es la forma natural y fiel en español.
- source_word: οὐ μυκτηρίζεται
  english_pob_choice: is not mocked
  chosen_spanish: no puede ser burlado
  alternatives_spanish:
  - no es objeto de burla
  - no es despreciado con mofa
  - no puede ser ridiculizado
  lexicon: BDAG
  rationale: μυκτηρίζεται comunica la idea de burlarse, despreciar o tratar con desprecio. 'No puede ser burlado' preserva la fuerza proverbial en un español natural. La pasiva se expresa de manera idiomática sin perder el sentido de imposibilidad de tratar a Dios con burla impune.
- source_word: ὃ γὰρ ἐὰν
  english_pob_choice: for whatever
  chosen_spanish: pues lo que
  alternatives_spanish:
  - porque lo que
  - pues cualquiera que
  lexicon: BDAG
  rationale: La construcción introduce una generalización proverbial. 'Pues lo que' reproduce bien el valor indefinido y condicional del griego en español actual.
- source_word: σπείρῃ
  english_pob_choice: sows
  chosen_spanish: siembre
  alternatives_spanish:
  - siembra
  - plante
  lexicon: BDAG
  rationale: El verbo agrícola debe conservarse literalmente. 'Siembre' mantiene el aspecto de acción potencial/general del griego y funciona naturalmente con la estructura condicional del versículo.
- source_word: ἄνθρωπος
  english_pob_choice: a man
  chosen_spanish: el hombre
  alternatives_spanish:
  - una persona
  - alguien
  - el ser humano
  lexicon: BDAG
  rationale: El griego usa un singular masculino con valor representativo general. 'El hombre' conserva ese singular genérico en español y mantiene la fuerza proverbial del dicho. La lectura inclusiva se preserva en nota.
- source_word: τοῦτο καὶ θερίσει
  english_pob_choice: this he will also reap
  chosen_spanish: eso también segará
  alternatives_spanish:
  - esto también cosechará
  - eso mismo también lo segará
  lexicon: BDAG
  rationale: La correlación entre siembra y cosecha debe quedar clara. 'Eso también segará' conserva la correspondencia proverbial y evita redundancia innecesaria en español. 'Segará' preserva el registro bíblico y el paralelismo agrícola.
theological_decisions:
- issue: Valor genérico de ἄνθρωπος
  english_pob_reading: a man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - una persona
  - alguien
  - el ser humano
  rationale: El texto griego emplea un singular masculino con fuerza representativa para toda la humanidad. En español, 'el hombre' preserva ese singular genérico sin neutralizar la forma del original. La nota explica que el sentido abarca a cualquier persona.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
- issue: Fuerza proverbial de la negación sobre Dios
  english_pob_reading: God is not mocked
  chosen_spanish_reading: Dios no puede ser burlado
  alternative_spanish_readings:
  - Dios no es objeto de burla
  - Dios no puede ser ridiculizado
  rationale: La afirmación no solo niega un hecho; declara que burlarse de Dios es imposible en el sentido de quedar sin efecto ante él. 'No puede ser burlado' comunica mejor esa fuerza proverbial y judicial que una simple pasiva descriptiva.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 2
translation_notes:
  revision_awareness: La revisión en inglés fue marcada como sin cambios necesarios y con alto acuerdo entre evaluaciones; por eso el español sigue de cerca las decisiones léxicas y la estructura proverbial del original, sin añadir matices no sustentados.
  spanish_consistency_notes:
  - Se mantuvo 'Dios' para θεός, sin sustitución por una forma litúrgica en mayúsculas.
  - Se conservó el campo agrícola con 'siembre' / 'segará' para respetar el paralelismo del versículo.
  - La nota al pie se usa solo para aclarar el singular genérico de ἄνθρωπος, tal como en el audit trail inglés.
