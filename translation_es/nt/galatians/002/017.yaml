translation:
  language: es
  text: Pero si[a], buscando ser justificados en el Mesías, nosotros mismos también fuimos hallados pecadores, ¿entonces el Mesías es servidor del pecado? ¡De ningún modo!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Mesías: tradicionalmente se vierte «Cristo» aquí y en la siguiente ocurrencia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ζητοῦντες
  english_pob_choice: while seeking
  chosen_spanish: buscando
  alternatives_spanish:
  - mientras buscamos
  - al buscar
  lexicon: BDAG
  rationale: El participio contemporáneo expresa la acción en curso con valor circunstancial; «buscando» es natural en español y conserva la relación temporal sin forzar una perífrasis pesada.
- source_word: δικαιωθῆναι
  english_pob_choice: to be justified
  chosen_spanish: ser justificados
  alternatives_spanish:
  - ser declarados justos
  - ser declarados justificados
  lexicon: BDAG
  rationale: «Justificados» mantiene el término paulino forense ya establecido en español e inglés POB; la alternativa explicativa sería válida, pero menos compacta en el texto principal.
- source_word: ἐν Χριστῷ
  english_pob_choice: in Messiah
  chosen_spanish: en Cristo
  alternatives_spanish:
  - en el Mesías
  lexicon: BDAG
  rationale: 'Aquí se sigue el ajuste de la revisión auditada: Χριστῷ/Χριστός se vierte como «Cristo» en esta cláusula para reflejar directamente el término griego y mantener la consistencia interna del verso, sin perder el valor titular.'
- source_word: εὑρέθημεν
  english_pob_choice: were found
  chosen_spanish: fuimos hallados
  alternatives_spanish:
  - resultamos
  - nos encontraron
  lexicon: BDAG
  rationale: La pasiva preserva la forma y el matiz retórico del griego, sin explicar de más el modo del hallazgo.
- source_word: καὶ αὐτοὶ ἁμαρτωλοί
  english_pob_choice: we ourselves also were found to be sinners
  chosen_spanish: nosotros mismos también fuimos hallados pecadores
  alternatives_spanish:
  - nosotros también resultamos pecadores
  - nosotros mismos también quedamos como pecadores
  lexicon: BDAG
  rationale: «Nosotros mismos» reproduce el énfasis de αὐτοὶ; «pecadores» conserva el predicado nominal con claridad directa.
- source_word: Χριστός
  english_pob_choice: Messiah
  chosen_spanish: Cristo
  alternatives_spanish:
  - Mesías
  lexicon: BDAG
  rationale: 'Se mantiene «Cristo» en esta ocurrencia por la decisión revisada en el audit trail: la traducción final del inglés POB volvió a «Christ» para reflejar el griego más directamente y conservar la consistencia dentro del versículo.'
- source_word: ἁμαρτίας διάκονος
  english_pob_choice: a servant of sin
  chosen_spanish: servidor de pecado
  alternatives_spanish:
  - esclavo del pecado
  - servidor del pecado
  lexicon: BDAG
  rationale: «Servidor» reproduce de manera más neutral y funcional διάκονος que «ministro»; se evita «esclavo» porque el griego aquí apunta a agencia/relación de servicio, no a δοῦλος. Se conserva la tensión retórica sin suavizarla.
- source_word: μὴ γένοιτο
  english_pob_choice: May it never be!
  chosen_spanish: ¡De ningún modo!
  alternatives_spanish:
  - ¡En ninguna manera!
  - ¡Jamás!
  lexicon: BDAG
  rationale: La fórmula expresa una negación enfática y repudiativa; «¡De ningún modo!» comunica bien la fuerza idiomática en español contemporáneo y culto.
theological_decisions:
- issue: ¿Implica Pablo que Cristo produce o fomenta el pecado?
  english_pob_reading: is Messiah then a servant of sin?
  chosen_spanish_reading: ¿entonces Cristo es servidor de pecado?
  alternative_spanish_readings:
  - ¿entonces Cristo es servidor del pecado?
  - ¿entonces Cristo es ministro de pecado?
  rationale: Se conserva la pregunta retórica como posibilidad implicada que Pablo rechaza de inmediato, sin resolverla en una explicación doctrinal añadida. «Servidor de pecado» mantiene la tensión del original y evita cargar el texto con una formulación más eclesiástica que podría suavizar el golpe retórico.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: 'El borrador toma en cuenta el audit trail: el inglés POB pasó de «Messiah» a «Christ» por revisión, y luego se restauró «Messiah» en otra pasada por política doctrinal. Para el español de este verso se adopta «Cristo» en ambas apariciones, en línea con la última lectura auditada que prioriza la correspondencia directa con Χριστῷ/Χριστός dentro del texto base revisado, mientras se mantiene la fuerza retórica de la pregunta y la negación final.'
  spanish_consistency_notes:
  - Se conserva la pasiva «fuimos hallados» para εὑρέθημεν, evitando una paráfrasis interpretativa.
  - «servidor de pecado» se usa de manera consistente con el valor funcional de διάκονος y con la tensión polémica del pasaje.
  - La exclamación final «¡De ningún modo!» reproduce la repulsa en estilo sobrio y bíblico, sin caer en calco arcaizante.
  - La nota sobre «Cristo» explica la elección léxica sin introducir una doble forma en el texto principal.
