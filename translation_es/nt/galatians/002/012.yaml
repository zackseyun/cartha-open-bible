translation:
  language: es
  text: Porque antes de que llegaran algunos hombres de Jacobo[a], él solía comer con los gentiles; pero cuando llegaron, comenzó a retirarse y a separarse[b], temiendo a los de la circuncisión[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "algunos" en vez de "algunos hombres". También puede entenderse "del entorno de Jacobo"; el griego no especifica por sí mismo si Jacobo los envió formalmente.'
    reason: lexical_alternative
  - marker: b
    text: 'O: "a apartarse" o "a separarse él mismo"; el griego expresa que él mismo se iba separando socialmente, no que se apartaba de sí mismo.'
    reason: alternative_reading
  - marker: c
    text: 'O: "los del partido de la circuncisión".'
    reason: lexical_alternative
lexical_decisions:
- source_word: πρὸ τοῦ ἐλθεῖν
  english_pob_choice: before ... came
  chosen_spanish: antes que vinieran
  alternatives_spanish:
  - antes de que llegaran
  - antes de la llegada de
  lexicon: BDAG
  rationale: La construcción temporal se expresa de forma natural en español con una subordinada introducida por 'antes que / antes de que', manteniendo el valor anterior de la acción sin volverla rígidamente nominal.
- source_word: τινας
  english_pob_choice: certain men
  chosen_spanish: algunos
  alternatives_spanish:
  - ciertos hombres
  - algunos hombres
  lexicon: BDAG
  rationale: El griego indica personas masculinas de manera indefinida. 'Algunos' preserva la indefinición y suena más natural en español, sin añadir un matiz de certeza que el contexto no exige.
- source_word: ἀπὸ Ἰακώβου
  english_pob_choice: from James
  chosen_spanish: de parte de Jacobo
  alternatives_spanish:
  - de Jacobo
  - del entorno de Jacobo
  lexicon: BDAG
  rationale: '''De parte de'' conserva la ambigüedad de origen/asociación que el griego permite, sin afirmar que Jacobo los hubiera enviado formalmente. ''Jacobo'' sigue la forma española común del nombre en contextos bíblicos.'
- source_word: μετὰ τῶν ἐθνῶν
  english_pob_choice: with the Gentiles
  chosen_spanish: con los gentiles
  alternatives_spanish:
  - con las naciones
  - con los no judíos
  lexicon: BDAG
  rationale: En Pablo, ἔθνη designa normalmente a los gentiles. 'Gentiles' es el equivalente español directo y conserva la categoría étnico-religiosa del texto.
- source_word: συνήσθιεν
  english_pob_choice: used to eat
  chosen_spanish: solía comer
  alternatives_spanish:
  - comía
  - acostumbraba comer
  lexicon: BDAG
  rationale: El imperfecto expresa acción habitual en el pasado; 'solía comer' reproduce ese valor mejor que un pretérito simple y evita perder la continuidad de la conducta previa.
- source_word: ὑπέστελλεν
  english_pob_choice: began to draw back
  chosen_spanish: comenzó a retirarse
  alternatives_spanish:
  - empezó a echarse atrás
  - iba retirándose
  lexicon: BDAG
  rationale: '''Retirarse'' comunica el movimiento de repliegue con una naturalidad adecuada al español, y ''comenzó a'' refleja el matiz inceptivo que el inglés POB resaltó.'
- source_word: ἀφώριζεν ἑαυτόν
  english_pob_choice: separate himself
  chosen_spanish: apartarse de sí mismo
  alternatives_spanish:
  - se apartaba
  - aislarse
  lexicon: BDAG
  rationale: La forma reflexiva del griego se mantiene, pero en español 'apartarse de sí mismo' suena menos natural y puede oscurecer la idea social. Se conserva el carácter reflexivo del verbo y la separación progresiva, aunque la lectura más idiomática sea 'se apartaba'.
- source_word: φοβούμενος
  english_pob_choice: fearing
  chosen_spanish: temiendo
  alternatives_spanish:
  - porque temía
  - por temor a
  lexicon: BDAG
  rationale: El participio causal se mantiene de manera breve con 'temiendo', preservando la relación de causa sin sobreexplicar el vínculo sintáctico.
- source_word: τοὺς ἐκ περιτομῆς
  english_pob_choice: those of the circumcision
  chosen_spanish: los de la circuncisión
  alternatives_spanish:
  - los de la circuncisión partidaria
  - el grupo de la circuncisión
  lexicon: BDAG
  rationale: La expresión identifica al grupo por la circuncisión sin añadir explícitamente 'partido'. 'Los de la circuncisión' conserva la forma más cercana al griego y evita una ampliación sociológica no requerida por el texto.
theological_decisions:
- issue: 'Ambigüedad de ἀπὸ Ἰακώβου: procedencia o autorización'
  english_pob_reading: from James
  chosen_spanish_reading: de parte de Jacobo
  alternative_spanish_readings:
  - de Jacobo
  - del entorno de Jacobo
  - enviados por Jacobo
  rationale: El griego puede señalar procedencia o asociación, pero no obliga a entender comisión formal. 'De parte de' mantiene esa tensión y no resuelve indebidamente la responsabilidad de Jacobo.
  doctrine_reference: Preservar la tensión textual sin inferir más allá del griego.
- issue: Identificación de τοὺς ἐκ περιτομῆς
  english_pob_reading: those of the circumcision
  chosen_spanish_reading: los de la circuncisión
  alternative_spanish_readings:
  - la circuncisión
  - el grupo de la circuncisión
  rationale: La frase puede referirse a personas caracterizadas por la circuncisión o al grupo así identificado. La traducción principal mantiene el rótulo descriptivo sin convertirlo en una formulación más interpretativa como 'partido'.
  doctrine_reference: Primacía del dato original sobre la terminología eclesial/tradicional.
translation_notes:
  revision_awareness: 'La redacción sigue el audit trail inglés con los mismos puntos de ambigüedad: indefinición de τινας, procedencia no especificada de ἀπὸ Ἰακώβου, valor imperfectivo de συνήσθιεν/ὑπέστελλεν/ἀφώριζεν, y la etiqueta grupal de τοὺς ἐκ περιτομῆς. Se ajustó el español para sonar natural sin resolver la tensión textual.'
  spanish_consistency_notes:
  - Se usa 'Jacobo' para el nombre propio, conforme al uso bíblico español común y consistente con el contexto de Santiago/Jacobo en Gálatas.
  - '''Gentiles'' se mantiene por su valor técnico paulino; no se reemplaza por ''naciones'' para no perder la referencia étnico-religiosa.'
  - Se prefirió una formulación verbal natural ('solía comer', 'comenzó a retirarse') para reflejar los imperfectos griegos sin calco rígido.
  - La nota de pie b ofrece una alternativa más idiomática ('se apartaba de ellos') para la frase reflexiva, ya que el español puede expresar mejor la separación social de ese modo.
