revisions:
- from: Porque antes que vinieran algunos de parte de Jacobo[a], él solía comer con los gentiles; pero cuando vinieron, comenzó a retirarse y a apartarse de sí mismo[b], temiendo a los de la circuncisión[c].
  to: Porque antes de que llegaran algunos hombres de Jacobo[a], él solía comer con los gentiles; pero cuando llegaron, comenzó a retirarse y a separarse[b], temiendo a los de la circuncisión[c].
  rationale: La revisión corrige una mala lectura semántica grave ('apartarse de sí mismo'), reduce una sobreinterpretación probable ('de parte de Jacobo'), y pule el español para mayor naturalidad y precisión, manteniendo las alternativas y la ambigüedad documentadas en el rastro de auditoría inglés.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:27:06Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del griego: acción habitual pasada (''solía comer''), contraste temporal, retirada progresiva y motivo de temor. Sin embargo, dos elecciones no preservan con suficiente fidelidad el sentido documentado: ''de parte de Jacobo'' tiende a implicar representación o encargo más de lo que permite ἀπὸ Ἰακώβου, y ''apartarse de sí mismo'' malinterpreta la reflexividad de ἀφώριζεν ἑαυτόν, que significa separarse él mismo de otros, no de sí mismo.'
  spanish_quality_summary: El español es mayormente claro y digno, pero 'apartarse de sí mismo' resulta antinatural y semánticamente erróneo. También 'algunos' sin 'hombres' es posible, pero dado que el inglés auditado preserva la referencia personal explícita, 'algunos hombres' mejora la claridad. 'Antes de que llegaran' suena más natural que 'antes que vinieran' en español general.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. 'Gentiles' y 'los de la circuncisión' están bien alineados. El nombre 'Jacobo' es aceptable en contexto bíblico. La principal corrección terminológica es evitar 'de parte de', que sobreinterpreta la relación con Jacobo frente al griego y al razonamiento teológico auditado.
  issues:
  - severity: high
    issue: '"apartarse de sí mismo" traduce mal ἀφώριζεν ἑαυτόν'
    rationale: El reflexivo griego indica que Pedro se separaba él mismo del grupo, no que se apartaba de su propio ser. En español esa formulación es extraña y cambia el sentido.
  - severity: medium
    issue: '"de parte de Jacobo" sugiere representación formal'
    rationale: Aunque el borrador afirma que conserva ambigüedad, en español 'de parte de' normalmente implica venir en nombre de alguien. El inglés POB y la decisión teológica buscan no atribuir autorización formal.
  - severity: low
    issue: '"algunos" sin ''hombres'' pierde una referencia personal explícita'
    rationale: τινας aquí es masculino personal. 'Algunos' puede funcionar, pero 'algunos hombres' preserva mejor el referente y coincide con la nota léxica auditada.
  - severity: low
    issue: '"antes que vinieran" es menos natural que "antes de que llegaran"'
    rationale: Ambas son posibles, pero la segunda es más ampliamente idiomática en español neutro contemporáneo sin perder fuerza temporal.
  revised_spanish_text: Porque antes de que llegaran algunos hombres de Jacobo[a], él solía comer con los gentiles; pero cuando llegaron, comenzó a retirarse y a separarse[b], temiendo a los de la circuncisión[c].
  revised_footnotes:
  - marker: a
    text: 'O: "algunos" en vez de "algunos hombres". También puede entenderse "del entorno de Jacobo"; el griego no especifica por sí mismo si Jacobo los envió formalmente.'
    reason: lexical_alternative
  - marker: b
    text: 'O: "a apartarse" o "a separarse él mismo"; el griego expresa que él mismo se iba separando socialmente, no que se apartaba de sí mismo.'
    reason: alternative_reading
  - marker: c
    text: 'O: "los del partido de la circuncisión".'
    reason: lexical_alternative
  revision_rationale: La revisión corrige una mala lectura semántica grave ('apartarse de sí mismo'), reduce una sobreinterpretación probable ('de parte de Jacobo'), y pule el español para mayor naturalidad y precisión, manteniendo las alternativas y la ambigüedad documentadas en el rastro de auditoría inglés.
