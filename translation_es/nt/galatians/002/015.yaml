review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido básico del griego: Ἡμεῖς = «Nosotros», φύσει = «por nacimiento», Ἰουδαῖοι = «judíos», ἐξ ἐθνῶν = «de entre los gentiles», ἁμαρτωλοί = «pecadores». También conserva acertadamente el contraste étnico citado por Pablo sin expandirlo doctrinalmente. Sin embargo, el añadido de «somos» no es necesario y hace la línea un poco más pesada que el original nominal; además, el orden de notas [a][b] en español no sigue el orden lógico del modelo auditado, donde la nota cultural sobre «por nacimiento» debe anclarse allí y la alternativa léxica al final.'
  spanish_quality_summary: El español es claro y ampliamente legible, pero «Nosotros somos judíos por nacimiento» suena más natural y más cercano al griego como «Nosotros, judíos por nacimiento». También conviene reubicar los marcadores de nota a las palabras pertinentes. Fuera de eso, la redacción es digna y comprensible.
  glossary_alignment: 'La terminología clave está bien alineada con el proyecto: «judíos», «gentiles», «pecadores». No hay conflictos con glosario mayor. La decisión «por nacimiento» para φύσει sigue correctamente la justificación documentada.'
  issues:
  - severity: medium
    issue: Redacción algo innecesariamente explícita con «somos»
    rationale: El griego no tiene verbo expreso y funciona como una afirmación nominal tersa. En español, «Nosotros, judíos por nacimiento...» preserva mejor esa concisión y suena natural.
  - severity: medium
    issue: Anclaje y orden de notas mejorables
    rationale: La nota sobre «por nacimiento» debe marcar esa frase, y la nota alternativa sobre «gentiles pecadores» debe marcar la frase final correspondiente. En el borrador ambas notas aparecen juntas al final, lo que oscurece su referencia.
  - severity: low
    issue: Alternativa de nota más idiomática en español
    rationale: «No pecadores gentiles» es menos natural que «no “gentiles pecadores”», que refleja mejor la alternativa compacta del inglés y el contraste del griego.
  revised_spanish_text: Nosotros, judíos por nacimiento[a], y no pecadores de entre los gentiles[b],
  revised_footnotes:
