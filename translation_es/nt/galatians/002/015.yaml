translation:
  language: es
  text: Nosotros, judíos por nacimiento[a], y no pecadores de entre los gentiles[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Por nacimiento» vierte una expresión que literalmente significa «por naturaleza», aquí referida al origen étnico natural.
    reason: cultural_note
  - marker: b
    text: 'O: «no “gentiles pecadores”».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἡμεῖς
  english_pob_choice: We
  chosen_spanish: Nosotros
  alternatives_spanish:
  - Nosotros mismos
  - Somos
  lexicon: BDAG
  rationale: Conservo el pronombre explícito para reflejar la fuerza enfática del sujeto griego. En español, 'Nosotros' suena natural al inicio de la cláusula y mantiene el contraste personal.
- source_word: φύσει
  english_pob_choice: by birth
  chosen_spanish: por nacimiento
  alternatives_spanish:
  - por naturaleza
  - de nacimiento
  lexicon: BDAG
  rationale: El contexto es de origen étnico/natural, no de constitución moral. 'Por nacimiento' comunica bien esa idea en español moderno sin perder la fuerza idiomática de φύσει.
- source_word: Ἰουδαῖοι
  english_pob_choice: Jews
  chosen_spanish: judíos
  alternatives_spanish:
  - el pueblo judío
  - judeanos
  lexicon: BDAG
  rationale: '''Judíos'' es el equivalente nominal normal en este contraste étnico. Mantiene la referencia grupal del plural griego con claridad.'
- source_word: ἐξ ἐθνῶν
  english_pob_choice: from among the Gentiles
  chosen_spanish: de entre los gentiles
  alternatives_spanish:
  - de entre las naciones
  - de entre los no judíos
  lexicon: BDAG
  rationale: La construcción preposicional se conserva con 'de entre' para reflejar el sentido de pertenencia/extracción. 'Gentiles' es el término estándar en Pablo para ἔθνη en este contexto.
- source_word: ἁμαρτωλοί
  english_pob_choice: sinners
  chosen_spanish: pecadores
  alternatives_spanish:
  - personas pecadoras
  - sindicato moral
  lexicon: BDAG
  rationale: '''Pecadores'' preserva el término convencional paulino y la dureza del contraste étnico-religioso expresado en el verso, sin suavizarlo indebidamente.'
theological_decisions:
- issue: Si el verso debe suavizarse para evitar que parezca una superioridad moral judía sobre los gentiles
  english_pob_reading: The translation preserves Paul's quoted ethnic contrast without softening it, while not expanding it into a doctrinal claim of inherent Jewish righteousness.
  chosen_spanish_reading: La traducción conserva el contraste étnico citado por Pablo sin suavizarlo, pero sin convertirlo en una afirmación doctrinal de superioridad moral judía.
  alternative_spanish_readings:
  - No somos como los gentiles pecadores
  - Somos judíos y no pecadores como los gentiles
  rationale: El griego formula el contraste de modo breve y directo. Conviene mantener esa tersura en español, dejando que el contexto más amplio haga la matización, en vez de importar una explicación interpretativa al verso mismo.
  doctrine_reference: Gálatas 2:15 en su contexto inmediato; coherencia con la distinción entre cita polémica y afirmación doctrinal
translation_notes:
  revision_awareness: 'Coincide con el pasaje auditado en inglés en la decisión principal: mantener el contraste étnico literal y reflejar φύσει con un español natural que indique origen de nacimiento, no moralidad intrínseca. No se detectaron revisiones posteriores que alteren la lectura de base.'
  spanish_consistency_notes:
  - Se usa 'gentiles' para ἔθνη en sentido paulino, conforme al uso bíblico habitual y al contexto contrastivo con 'judíos'.
  - Se evita 'SEÑOR' u otras sustituciones no pertinentes; no aparece κύριος en este verso.
  - '''Pecadores'' conserva la tensión lexical y teológica del texto sin amplificación interpretativa.'
  - La puntuación y el orden siguen el paralelismo breve del griego, con estilo claro y publicable en español.
