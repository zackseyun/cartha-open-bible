translation:
  language: es
  text: Porque el que obró por medio de Pedro para el apostolado entre los circuncisos[a] obró también por medio de mí para los gentiles[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, 'para el apostolado de la circuncisión'.
    reason: lexical_alternative
  - marker: b
    text: O 'para las naciones'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνεργήσας
  english_pob_choice: worked
  chosen_spanish: obró
  alternatives_spanish:
  - estuvo actuando
  - trabajó
  - obró eficazmente
  lexicon: BDAG
  rationale: Se conserva la repetición verbal con ἐνήργησεν y el sentido de acción eficaz sin añadir una explicación causal no explícita en el griego.
- source_word: Πέτρῳ
  english_pob_choice: through Peter
  chosen_spanish: en Pedro
  alternatives_spanish:
  - por medio de Pedro
  - a través de Pedro
  lexicon: BDAG
  rationale: El dativo puede expresarse instrumentalmente en español; 'en Pedro' mantiene brevedad y evita sobrecargar la frase, aunque 'por medio de Pedro' sería una alternativa explícita.
- source_word: εἰς ἀποστολὴν
  english_pob_choice: for apostleship
  chosen_spanish: para el apostolado
  alternatives_spanish:
  - para el oficio apostólico
  - para una misión apostólica
  lexicon: BDAG
  rationale: '''Apostolado'' comunica la orientación al ministerio/apostólica función con naturalidad en español, preservando la fuerza direccional de εἰς.'
- source_word: τῆς περιτομῆς
  english_pob_choice: to the circumcised
  chosen_spanish: de los circuncisos
  alternatives_spanish:
  - de la circuncisión
  - para los circuncisos
  lexicon: BDAG
  rationale: Se mantiene la metonimia paulina, donde 'circuncisión' designa al pueblo circuncidado; 'de los circuncisos' conserva mejor el contraste judíos/gentiles que una paráfrasis explícita.
- source_word: ἐνήργησεν
  english_pob_choice: worked
  chosen_spanish: obró
  alternatives_spanish:
  - estuvo actuando
  - trabajó
  - obró eficazmente
  lexicon: BDAG
  rationale: Se conserva el mismo verbo que para ἐνεργήσας para reflejar el paralelismo deliberado entre Pedro y Pablo.
- source_word: ἐμοὶ
  english_pob_choice: through me
  chosen_spanish: en mí
  alternatives_spanish:
  - por medio de mí
  - a través de mí
  lexicon: BDAG
  rationale: El dativo se vierte de forma natural en español sin insertar 'por medio de' de manera obligatoria; el contexto de ministerio apostólico sostiene la referencia instrumental.
- source_word: τὰ ἔθνη
  english_pob_choice: the Gentiles
  chosen_spanish: las naciones
  alternatives_spanish:
  - los gentiles
  - los pueblos
  lexicon: BDAG
  rationale: Se privilegia 'naciones' para conservar el campo semántico de ἔθνη y la posible resonancia bíblica; en contexto paulino también puede apuntar a los no judíos.
theological_decisions:
- issue: Sujeto implícito de la acción divina
  english_pob_reading: For the one who worked through Peter... also worked through me...
  chosen_spanish_reading: Porque el que obró en Pedro... obró también en mí...
  alternative_spanish_readings:
  - Porque Dios, que obró en Pedro...
  - Porque el que actuó en Pedro...
  rationale: Se retiene la construcción participial sin explicitar 'Dios', respetando la forma del griego y la decisión del POB de preservar la tensión teológica y sintáctica.
  doctrine_reference: Primacía del texto original; evitar resolver prematuramente el sujeto implícito.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando toda nota al pie sin anclaje en el texto; la versión presente no incluye marcadores de nota.
  spanish_consistency_notes:
  - 'Se mantuvo un paralelismo verbal uniforme: ''obró... obró''.'
  - '''Naciones'' preserva una alternativa semántica legítima de ἔθνη sin imponer exclusivamente ''gentiles''.'
  - La frase 'de los circuncisos' conserva la metonimia paulina sin añadir una explicación intratextual.
  - El español evita calcos innecesarios y sigue una sintaxis natural, pero sin ampliar el contenido más allá del griego.
