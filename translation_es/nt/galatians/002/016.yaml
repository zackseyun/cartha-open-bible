base_translation:
  language: en
  yaml_path: translation/nt/galatians/002/016.yaml
  text: Yet knowing that a person is not justified by works of the law except through faith in Jesus Messiah[a], even we have believed in Messiah Jesus, so that we might be justified by faith in Messiah and not by works of the law[c][b], because by works of the law no flesh will be justified.
