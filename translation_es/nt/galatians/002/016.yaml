revisions:
- from: Y, sabiendo que una persona no es justificada por obras de la ley, sino[a] por la fe en Jesucristo, aun nosotros hemos creído en Cristo Jesús, para que seamos justificados por la fe en Cristo y no por obras de la ley[b], porque por obras de la ley no será justificada ninguna carne[c].
  to: Pero sabiendo que una persona no es justificada por obras de la ley, excepto por medio de la fe en Jesús Mesías[a], aun nosotros hemos creído en Mesías Jesús, para que seamos justificados por la fe en Mesías[b] y no por obras de la ley, porque por obras de la ley no será justificada ninguna carne[c].
  rationale: 'Se revisa para alinear el versículo con la terminología obligatoria del proyecto y con el audit trail inglés: Χριστός debe renderizarse como «Mesías» en este contexto. También se mejora la naturalidad y fidelidad discursiva de εἰδότες δὲ con «Pero sabiendo que», y se explicita mejor ἐὰν μὴ διὰ πίστεως con «excepto por medio de la fe». Se conservan «justificada», «obras de la ley» y «ninguna carne», así como las notas sobre la lectura alternativa de πίστις Χριστοῦ.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:14:49Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español conserva en gran medida la estructura argumentativa y los términos paulinos clave: δικαιόω con «justificar», ἐξ ἔργων νόμου con «por obras de la ley», y πᾶσα σάρξ con «ninguna carne». También mantiene correctamente las notas sobre la lectura alternativa de πίστις Χριστοῦ. Sin embargo, no sigue la política terminológica del proyecto para Χριστός, ya que usa «Jesucristo / Cristo Jesús / Cristo» donde el rastro auditado inglés restauró explícitamente «Mesías / Mesías Jesús / Mesías». Además, «Y, sabiendo que» suena menos natural y menos fiel al leve adversativo de δέ que «Pero sabiendo que» o «Sin embargo, sabiendo que».'
  spanish_quality_summary: 'El español es claro y legible, pero tiene varios detalles mejorables: la coma tras «Y» es poco natural; «sino[a] por la fe» funciona, pero «excepto por medio de la fe» refleja mejor ἐὰν μὴ διὰ y evita una contraposición demasiado rígida. La frase «ninguna carne» es aceptable como hebraísmo/idiotismo bíblico y queda bien aclarada con nota. El conjunto gana en naturalidad y en alineación doctrinal si se cambia a «Mesías».'
  glossary_alignment: 'Desalineado en el punto principal de Χριστός: por defecto del proyecto debe traducirse «Mesías» cuando el título sigue activo, y aquí el audit trail inglés ya corrigió una regresión para restaurarlo. Alineado en «Jesús», «Dios» no aplica, «justificar», «obras de la ley» y «carne».'
  issues:
  - severity: high
    issue: Χριστός se tradujo como «Cristo»/«Jesucristo» en lugar de «Mesías».
    rationale: La política del proyecto y el audit trail para este versículo exigen restaurar el valor titular de Χριστός como «Mesías». El propio historial inglés marcó como regresión usar «Christ» en este pasaje.
  - severity: medium
    issue: «Y, sabiendo que» no refleja bien el δέ adversativo y suena forzado en español.
    rationale: Aunque no es imposible, la combinación con coma inicial resulta poco idiomática. «Pero sabiendo que» o «Sin embargo, sabiendo que» comunica mejor el enlace discursivo.
  - severity: medium
    issue: «sino por la fe» comprime demasiado ἐὰν μὴ διὰ πίστεως.
    rationale: El griego expresa excepción/medio («excepto por medio de la fe»). «Sino» no es erróneo, pero una formulación más explícita preserva mejor la relación lógica y el matiz instrumental.
  - severity: low
    issue: La decisión léxica que justifica «Jesucristo / Cristo» contradice su propia referencia doctrinal.
    rationale: La explicación afirma seguir la política de traducir Χριστός como «Mesías», pero el texto principal no lo hace. Conviene corregir la salida, no adjudicar más.
  revised_spanish_text: Pero sabiendo que una persona no es justificada por obras de la ley, excepto por medio de la fe en Jesús Mesías[a], aun nosotros hemos creído en Mesías Jesús, para que seamos justificados por la fe en Mesías[b] y no por obras de la ley, porque por obras de la ley no será justificada ninguna carne[c].
  revised_footnotes:
  - marker: a
    text: O, «por medio de la fidelidad de Jesús Mesías».
    reason: alternative_reading
  - marker: b
    text: O, «por la fidelidad de Mesías».
    reason: alternative_reading
  - marker: c
    text: Lit. «ninguna carne».
    reason: lexical_alternative
  revision_rationale: 'Se revisa para alinear el versículo con la terminología obligatoria del proyecto y con el audit trail inglés: Χριστός debe renderizarse como «Mesías» en este contexto. También se mejora la naturalidad y fidelidad discursiva de εἰδότες δὲ con «Pero sabiendo que», y se explicita mejor ἐὰν μὴ διὰ πίστεως con «excepto por medio de la fe». Se conservan «justificada», «obras de la ley» y «ninguna carne», así como las notas sobre la lectura alternativa de πίστις Χριστοῦ.'
