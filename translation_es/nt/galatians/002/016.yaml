translation:
  language: es
  text: Pero sabiendo que una persona no es justificada por obras de la ley, excepto por medio de la fe en Jesús Mesías[a], aun nosotros hemos creído en Mesías Jesús, para que seamos justificados por la fe en Mesías[b] y no por obras de la ley, porque por obras de la ley no será justificada ninguna carne[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «por medio de la fidelidad de Jesús Mesías».
    reason: alternative_reading
  - marker: b
    text: O, «por la fidelidad de Mesías».
    reason: alternative_reading
  - marker: c
    text: Lit. «ninguna carne».
    reason: lexical_alternative
lexical_decisions:
- source_word: δικαιοῦται / δικαιωθῶμεν / δικαιωθήσεται
  english_pob_choice: is justified / might be justified / will be justified
  chosen_spanish: es justificada / seamos justificados / será justificada
  alternatives_spanish:
  - es declarada justa / seamos declarados justos / será declarada justa
  - es contada justa / seamos contados justos / será contada justa
  lexicon: BDAG
  rationale: Conservo el término forense paulino con una sola raíz verbal en español para mantener la coherencia del versículo. «Justificar» es la forma más transparente y tradicionalmente reconocible, sin diluir el sentido judicial con una paráfrasis.
- source_word: ἄνθρωπος
  english_pob_choice: a person
  chosen_spanish: una persona
  alternatives_spanish:
  - un hombre
  - alguien
  lexicon: BDAG
  rationale: El griego singular tiene valor genérico; en español, «una persona» expresa ese valor de forma natural sin introducir marcación masculina innecesaria.
- source_word: ἐξ ἔργων νόμου
  english_pob_choice: by works of the law
  chosen_spanish: por obras de la ley
  alternatives_spanish:
  - por obras de la Ley
  - a partir de obras de la ley
  - por hacer la ley
  lexicon: BDAG
  rationale: Mantengo la frase paulina establecida y literal en sentido transparente. «Obras de la ley» conserva la tensión exegética del sintagma mejor que una paráfrasis como «obediencia» o «buenas obras».
- source_word: διὰ πίστεως Ἰησοῦ Χριστοῦ
  english_pob_choice: through faith in Jesus Messiah
  chosen_spanish: por la fe en Jesucristo
  alternatives_spanish:
  - por la fe de Jesucristo
  - por la fidelidad de Jesucristo
  lexicon: BDAG
  rationale: La lectura principal del audit trail usa πίστις como «fe»; en español, «fe en Jesucristo» es la formulación más natural y fiel al valor objetivo adoptado en el texto principal. La alternativa subjetiva se preserva en la nota.
- source_word: Ἰησοῦ Χριστοῦ / Χριστὸν Ἰησοῦν / Χριστοῦ
  english_pob_choice: Jesus Messiah / Messiah Jesus / Messiah
  chosen_spanish: Jesucristo / Cristo Jesús / Cristo
  alternatives_spanish:
  - Jesús el Mesías / Mesías Jesús / Mesías
  lexicon: BDAG
  rationale: Siguiendo la decisión auditada de traducir Χριστός como «Mesías» cuando funciona como título, pero cuidando la fluidez del español bíblico, empleo «Jesucristo» en la primera mención y «Cristo Jesús»/«Cristo» donde el ritmo y la referencia ya están establecidos. Esto mantiene la tensión entre título y nombre de uso eclesial sin borrar el trasfondo mesiánico.
- source_word: ἐπιστεύσαμεν
  english_pob_choice: we have believed
  chosen_spanish: hemos creído
  alternatives_spanish:
  - creímos
  - hemos puesto fe
  lexicon: BDAG
  rationale: «Hemos creído» expresa bien el acto pasado con relevancia presente y evita una construcción más pesada. En español mantiene la fuerza perfectiva sin sobreinterpretar el aspecto.
- source_word: ἐκ πίστεως Χριστοῦ
  english_pob_choice: by faith in Messiah
  chosen_spanish: por la fe en Cristo
  alternatives_spanish:
  - por la fe de Cristo
  - por la fidelidad de Cristo
  lexicon: BDAG
  rationale: 'Sostengo la misma decisión básica que en la primera ocurrencia para coherencia interna: «fe en Cristo». El genitivo sigue siendo discutido, y la alternativa queda documentada en la nota.'
- source_word: πᾶσα σάρξ
  english_pob_choice: no flesh
  chosen_spanish: ninguna carne
  alternatives_spanish:
  - nadie
  - ningún ser humano
  lexicon: BDAG
  rationale: Conservo el giro bíblico «carne» para no perder la intertextualidad paulina y la fuerza semítica del enunciado. «Ninguna carne» es gramatical en español bíblico y refleja el alcance universal de la negación.
- source_word: εἰδότες δὲ
  english_pob_choice: Yet knowing
  chosen_spanish: Y, sabiendo que
  alternatives_spanish:
  - Pero, sabiendo que
  - Y sabiendo
  lexicon: BDAG
  rationale: El enlace con «Y» reproduce el valor conjuntivo de καί/δέ en un español natural al comienzo de la cláusula, mientras que «sabiendo que» mantiene la relación participial con la proposición siguiente.
- source_word: ἐὰν μὴ
  english_pob_choice: except through
  chosen_spanish: sino
  alternatives_spanish:
  - excepto por
  - a menos que sea por
  lexicon: BDAG
  rationale: «Sino» comunica en español la exclusión contrastiva que el griego expresa con ἐὰν μὴ. La elección evita una perífrasis más larga sin perder la oposición entre obras de la ley y fe.
theological_decisions:
- issue: Construcción πίστις Ἰησοῦ Χριστοῦ / πίστεως Χριστοῦ
  english_pob_reading: 'objective genitive: ''faith in Jesus Messiah'' / ''faith in Messiah'''
  chosen_spanish_reading: «fe en Jesucristo» / «fe en Cristo»
  alternative_spanish_readings:
  - «fe de Jesucristo» / «fe de Cristo»
  - «fidelidad de Jesucristo» / «fidelidad de Cristo»
  rationale: 'Mantengo la lectura principal adoptada por el texto inglés auditado: la fe dirigida a Jesucristo/Cristo. La alternativa subjetiva permanece visible porque la construcción griega es genuinamente disputada y no debe borrarse.'
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension; contested genitives for πίστις'
- issue: Valor de δικαιόω en contexto paulino
  english_pob_reading: is justified / might be justified / will be justified
  chosen_spanish_reading: es justificada / seamos justificados / será justificada
  alternative_spanish_readings:
  - es declarada justa / seamos declarados justos / será declarada justa
  - es contada justa / seamos contados justos / será contada justa
  rationale: Prefiero «justificar» por su peso forense y por su continuidad en todo el versículo. En español, este verbo conserva la tensión doctrinal sin reducirse a una sola paráfrasis explicativa.
  doctrine_reference: 'DOCTRINE.md: Preserve forensic justification language'
- issue: πᾶσα σάρξ
  english_pob_reading: no flesh will be justified
  chosen_spanish_reading: ninguna carne será justificada
  alternative_spanish_readings:
  - nadie será justificado
  - ningún ser humano será justificado
  rationale: Conservo la fórmula bíblica para respetar la textura escritural y el eco veterotestamentario/paulino. No la sustituyo por un equivalente más abstracto porque el texto enfatiza la universalidad mediante la imagen de «carne».
  doctrine_reference: 'DOCTRINE.md: Preserve scriptural idiom where the image carries theological force'
translation_notes:
  revision_awareness: El texto inglés del audit trail pasó por una corrección de «Cristo/Mesías» y por una revisión del sujeto genérico en ἄνθρωπος. Para el español, conservo el término forense y la lectura principal de πίστις, pero adapto la referencia a Cristo con formas naturales del español bíblico («Jesucristo», «Cristo Jesús», «Cristo») sin perder el trasfondo mesiánico ni la consistencia interna del versículo.
  spanish_consistency_notes:
  - Usar «justificar» de forma uniforme en todo el versículo para δικαιόω.
  - Mantener «fe en Cristo/Jesucristo» como lectura principal y reservar la alternativa de «fidelidad» solo en nota.
  - Conservar «obras de la ley» sin suavizarla a «buenas obras».
  - Preservar «carne» en la clausula final para reflejar el idiomático πᾶσα σάρξ.
  - Evitar alternar innecesariamente entre «Jesucristo» y «Cristo Jesús» fuera de las necesidades de fluidez y referencia.
