translation:
  language: es
  text: Entonces, después de catorce años, subí otra vez a Jerusalén con Bernabé, llevando también a Tito.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἔπειτα
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - Después
  lexicon: BDAG
  rationale: Funciona como conector discursivo de continuidad narrativa. «Entonces» mantiene la secuencia con naturalidad en español sin añadir énfasis temporal innecesario.
- source_word: διὰ δεκατεσσάρων ἐτῶν
  english_pob_choice: after fourteen years
  chosen_spanish: después de catorce años
  alternatives_spanish:
  - tras catorce años
  - después de un intervalo de catorce años
  lexicon: BDAG
  rationale: La construcción temporal expresa tiempo transcurrido antes del siguiente evento; en español, «después de catorce años» es la forma más natural y fiel al valor idiomático.
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  - nuevamente
  lexicon: BDAG
  rationale: Marca repetición del viaje. «Otra vez» conserva el sentido repetitivo de forma clara y natural en español.
- source_word: ἀνέβην
  english_pob_choice: I went up
  chosen_spanish: subí
  alternatives_spanish:
  - subí a
  - fui
  lexicon: BDAG
  rationale: El verbo griego conserva la imagen de ascenso asociada a Jerusalén. En español, «subí» preserva esa dirección geográfica sin sonar forzado; el complemento «a Jerusalén» queda explícito por el destino.
- source_word: εἰς Ἱεροσόλυμα
  english_pob_choice: to Jerusalem
  chosen_spanish: a Jerusalén
  alternatives_spanish:
  - hacia Jerusalén
  - hasta Jerusalén
  lexicon: BDAG
  rationale: «εἰς» indica destino. «A Jerusalén» es la equivalencia más directa y natural en español.
- source_word: μετὰ Βαρναβᾶ
  english_pob_choice: with Barnabas
  chosen_spanish: con Bernabé
  alternatives_spanish:
  - junto con Bernabé
  - acompañado de Bernabé
  lexicon: BDAG
  rationale: Se conserva el nombre bíblico en su forma corriente en español, «Bernabé». «Con» expresa simple acompañamiento como en el griego y en la traducción inglesa auditada.
- source_word: συμπαραλαβὼν
  english_pob_choice: taking along
  chosen_spanish: llevando también
  alternatives_spanish:
  - tomando también
  - trayendo también
  lexicon: BDAG
  rationale: El participio expresa acción acompañante respecto del verbo principal. «Llevando también» transmite con naturalidad que Tito iba como persona añadida al grupo.
- source_word: καὶ Τίτον
  english_pob_choice: also taking Titus along
  chosen_spanish: también a Tito
  alternatives_spanish:
  - y a Tito
  - además a Tito
  lexicon: BDAG
  rationale: El καί tiene fuerza aditiva. «También a Tito» refleja que Tito acompañaba además de Bernabé, sin diluir la relación participial.
translation_notes:
  revision_awareness: El texto griego y la lectura inglesa auditada muestran alta concordancia; no se documentan variantes textuales ni cambios de revisión relevantes para este versículo. La redacción española sigue directamente el valor temporal, direccional y aditivo del griego con equivalencia idiomática natural.
  spanish_consistency_notes:
  - Se usa «Bernabé» y «Tito» con la ortografía española habitual.
  - Se conserva «subí» para mantener la imagen de ascenso vinculada a Jerusalén.
  - No se introducen notas, porque no hay tensión lexical o textual que requiera alternativa documentada en este versículo.
