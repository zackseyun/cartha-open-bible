translation:
  language: es
  text: Y ya no vivo yo, sino que el Mesías vive en mí. Y la vida que ahora vivo en la carne, la vivo por la fe en el Hijo de Dios[a], que me amó y se entregó por mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «por la fidelidad del Hijo de Dios».
    reason: alternative_reading
lexical_decisions:
- source_word: Χριστός
  english_pob_choice: Messiah / Christ (with revision history and doctrinal tension)
  chosen_spanish: Cristo
  alternatives_spanish:
  - Mesías
  lexicon: Χριστός
  rationale: En español, “Cristo” es el equivalente léxico más asentado y directo de Χριστός como nombre/título cristológico en este contexto. Aunque el proyecto suele preferir “Mesías” cuando el griego funciona claramente como título traducible, aquí la audit trail inglesa muestra una decisión revisada que volvió a “Christ” por correspondencia más directa y consistencia de registro; por eso el español conserva “Cristo” como forma natural y de alta correspondencia formal.
- source_word: ζῶ / ζῇ
  english_pob_choice: live / lives
  chosen_spanish: vivo / vive
  alternatives_spanish:
  - estoy vivo / vive
  - vivo / está viviendo
  lexicon: ζάω
  rationale: El verbo de vida se traduce de manera simple y directa con “vivo” y “vive”. Mantiene el contraste retórico entre la primera persona y la acción de Cristo sin introducir perífrasis innecesarias.
- source_word: ἐν σαρκί
  english_pob_choice: in the flesh
  chosen_spanish: en la carne
  alternatives_spanish:
  - en mi cuerpo
  - en la carne mortal
  lexicon: σάρξ
  rationale: Se conserva el valor paulino de σάρξ como “carne”, porque el contexto habla de existencia terrenal encarnada y no exige interpretar “naturaleza pecaminosa”. “En la carne” reproduce mejor la tensión léxica del original que una paráfrasis explicativa.
- source_word: ἐν πίστει
  english_pob_choice: by faith
  chosen_spanish: por la fe
  alternatives_spanish:
  - en fe
  - con fe
  lexicon: πίστις
  rationale: El griego usa ἐν con πίστει; en español, “por la fe” expresa con naturalidad el medio o esfera de la vida cristiana, sin perder el sentido de dependencia confiada. Se evita “fe” sin artículo, que sonaría menos idiomático aquí.
- source_word: τῇ τοῦ υἱοῦ τοῦ θεοῦ
  english_pob_choice: in the Son of God / by the faithfulness of the Son of God
  chosen_spanish: en el Hijo de Dios
  alternatives_spanish:
  - por la fidelidad del Hijo de Dios
  - con la fidelidad del Hijo de Dios
  lexicon: υἱός / θεός / πίστις
  rationale: 'La frase griega es sintácticamente ambigua respecto de πίστις, y la nota inglesa preserva la alternativa subjetiva “faithfulness”. En el texto principal, el español sigue la lectura más inmediata y ampliamente inteligible: “por la fe en el Hijo de Dios”. La nota conserva la alternativa “fidelidad del Hijo de Dios” para no borrar la tensión exegética.'
- source_word: παραδόντος ἑαυτὸν ὑπὲρ ἐμοῦ
  english_pob_choice: gave himself for me
  chosen_spanish: se entregó por mí
  alternatives_spanish:
  - se dio por mí
  - se entregó en favor de mí
  lexicon: παραδίδωμι
  rationale: “Se entregó” comunica el acto voluntario y sacrificial de παραδίδωμι con naturalidad española, sin volverlo demasiado técnico. “Por mí” conserva el sentido sustitutivo/benefactivo del ὑπέρ griego.
theological_decisions:
- issue: Ambigüedad de πίστει τῇ τοῦ υἱοῦ τοῦ θεοῦ
  english_pob_reading: 'by faith in the Son of God, with footnoted alternative: by the faithfulness of the Son of God'
  chosen_spanish_reading: 'por la fe en el Hijo de Dios, con nota alternativa: por la fidelidad del Hijo de Dios'
  alternative_spanish_readings:
  - por la fidelidad del Hijo de Dios
  - por la fe del Hijo de Dios
  rationale: Se mantiene la lectura objetiva principal porque es la más clara en español y corresponde al flujo natural de la cláusula. Pero la alternativa subjetiva se preserva para reflejar la ambigüedad paulina real, tal como lo hace el audit trail inglés. No se resuelve dogmáticamente la cuestión en la traducción principal.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy #3; contested πίστις constructions'
- issue: Valor cristológico de Χριστός
  english_pob_reading: Messiah / Christ with revision awareness
  chosen_spanish_reading: Cristo
  alternative_spanish_readings:
  - Mesías
  rationale: Aunque el proyecto tiene una preferencia por “Mesías” cuando Χριστός actúa como título traducible, la historia de revisiones inglesa muestra una vuelta a “Christ” por correspondencia directa y consistencia. En español, “Cristo” es la forma más estable y auditables de corresponder al griego sin perder inteligibilidad eclesial.
  doctrine_reference: 'DOCTRINE.md: terminology policy for Χριστός / Messiah language'
translation_notes:
  revision_awareness: 'El texto español toma en cuenta el historial de revisión del inglés: la oscilación entre “Messiah” y “Christ” en Χριστός, y la decisión de mantener la ambigüedad de πίστις con una nota alternativa. Por eso el español usa una formulación natural y formalmente cercana al griego, sin ocultar la lectura alternativa de “fidelidad” en la nota.'
  spanish_consistency_notes:
  - Se mantiene “Cristo” como equivalente directo y de registro eclesial común para Χριστός.
  - Se usa “carne” para σάρξ, evitando moralizar el término como “naturaleza pecaminosa”.
  - Se usa “por la fe” para ἐν πίστει por naturalidad idiomática en español.
  - Se conserva “se entregó por mí” para el acto sacrificial de παραδόντος ἑαυτὸν ὑπὲρ ἐμοῦ.
  - La nota a marca a queda anclada en “Hijo de Dios” para reflejar la ambigüedad de la construcción genitiva.
