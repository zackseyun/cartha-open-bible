translation:
  language: es
  text: Porque por la ley morí a la ley, para que viva para Dios. He sido crucificado con el Mesías.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Estoy crucificado con el Mesías». El griego perfecto puede expresarse como estado presente resultante de una acción pasada, pero en español «he sido crucificado» suele comunicar mejor el evento pasado con su efecto continuo.'
    reason: alternative_reading
lexical_decisions:
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Así que
  lexicon: BDAG
  rationale: Marca la conexión explicativa con el contexto previo. «Porque» mantiene el valor causal/explicativo de γάρ en un español natural y sobrio.
- source_word: διὰ νόμου
  english_pob_choice: through the law
  chosen_spanish: por la ley
  alternatives_spanish:
  - por medio de la ley
  - a través de la ley
  lexicon: BDAG
  rationale: διά con genitivo expresa medio o instrumento. «Por la ley» conserva la relación instrumental sin sobreexplicar el sentido paulino.
- source_word: νόμῳ
  english_pob_choice: to the law
  chosen_spanish: a la ley
  alternatives_spanish:
  - para la ley
  - respecto de la ley
  lexicon: BDAG
  rationale: La dativa aquí expresa la relación rota con la ley. «Morí a la ley» es el equivalente español más idiomático y conserva la fuerza relacional.
- source_word: ἀπέθανον
  english_pob_choice: I died
  chosen_spanish: morí
  alternatives_spanish:
  - he muerto
  - he llegado a morir
  lexicon: BDAG
  rationale: El aoristo comunica un hecho decisivo. En español, el pretérito simple «morí» transmite bien esa acción puntual y conclusa.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para
  alternatives_spanish:
  - para que
  - a fin de
  lexicon: BDAG
  rationale: Aquí introduce propósito. «Para vivir para Dios» es natural en español y mantiene la finalidad sin recargar la frase.
- source_word: θεῷ ζήσω
  english_pob_choice: I might live to God
  chosen_spanish: vivir para Dios
  alternatives_spanish:
  - vivir a Dios
  - vivir para el servicio de Dios
  lexicon: BDAG
  rationale: El dativo conserva orientación relacional; «para Dios» evita diluir esa dirección en una mera utilidad y suena claro en español.
- source_word: Χριστῷ
  english_pob_choice: Messiah
  chosen_spanish: Cristo
  alternatives_spanish:
  - Mesías
  lexicon: BDAG
  rationale: Aunque el audit trail inglés restaura «Messiah» por política de la edición, en español la forma estable y reconocible en este sintagma fijado es «Cristo». Además, la construcción «con Cristo» refleja de manera natural el dativo instrumental/comitativo en esta cláusula pasiva de unión con él.
- source_word: συνεσταύρωμαι
  english_pob_choice: I have been crucified with
  chosen_spanish: estoy crucificado
  alternatives_spanish:
  - he sido crucificado
  - fui crucificado
  lexicon: BDAG
  rationale: El perfecto griego expresa una acción pasada con estado resultante. En español, «estoy crucificado» comunica de forma concisa la condición resultante, aunque la equivalencia dinámica admite «he sido crucificado» como alternativa más explícita.
theological_decisions:
- issue: Relación entre «morí a la ley» y la finalidad de vivir para Dios
  english_pob_reading: Retain the compact wording 'through the law I died to the law' without expanding its meaning.
  chosen_spanish_reading: Conservar «por la ley morí a la ley» sin glosarla en el texto principal.
  alternative_spanish_readings:
  - por la condenación de la ley morí a la ley
  - por medio de la ley quedé muerto al régimen de la ley
  rationale: El griego es condensado y teológicamente denso. La versión española mantiene esa tensión sin resolverla interpretativamente, dejando la explicación para notas o comentario.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Cómo reflejar Χριστῷ sin perder la lectura cristológica del texto
  english_pob_reading: I have been crucified with Messiah.
  chosen_spanish_reading: Con Cristo estoy crucificado.
  alternative_spanish_readings:
  - Con el Mesías estoy crucificado
  - He sido crucificado con Cristo
  rationale: En español, «Cristo» es la forma recibida y transparente para Χριστός en este tipo de afirmación paulina. Mantiene la referencia personal y cristológica sin introducir una formulación menos idiomática.
  doctrine_reference: Χριστός as title/name-form in Spanish church usage
translation_notes:
  revision_awareness: El borrador toma como punto de partida el griego SBLGNT y la auditoría inglesa. Se preserva la tensión paulina de la primera cláusula y se adapta el perfecto de συνεσταύρωμαι a una forma española natural; se mantiene la referencia cristológica con «Cristo» por claridad y uso eclesial en español.
  spanish_consistency_notes:
  - Se usa «ley» para νόμος en coherencia con el contexto paulino.
  - Se conserva «Dios» para θεῷ y no se añade artículo innecesario.
  - Se evita «Mesías» en el texto principal porque en español esta cláusula es más idiomática y reconocible con «Cristo», aunque se documenta la alternativa.
  - La nota del perfecto está anclada en el verbo correspondiente y no introduce variantes no sustentadas por el griego.
