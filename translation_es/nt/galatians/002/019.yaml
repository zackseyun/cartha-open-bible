  spanish_quality_summary: El borrador es generalmente claro, pero «para vivir para Dios» resulta menos natural que «para que viva para Dios», que además refleja mejor ἵνα + subjuntivo. «Con Cristo estoy crucificado» suena algo calcado y menos idiomático en español actual que «He sido crucificado con el Mesías». La revisión mejora naturalidad, dignidad y legibilidad sin perder concisión.
  glossary_alignment: 'Hay un desajuste relevante con la terminología del proyecto: Χριστός debe rendirse normalmente como «Mesías», y aquí el audit trail inglés restauró explícitamente «Messiah». No hay justificación suficiente en esta unidad para apartarse a «Cristo». «Dios» y «ley» están bien. No hay otros conflictos terminológicos mayores.'
  issues:
