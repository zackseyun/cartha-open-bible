  - severity: medium
    issue: συνεσταύρωμαι fue vertido como «estoy crucificado».
    rationale: Aunque intenta reflejar estado resultante, en español esta formulación suena poco natural y no representa tan bien el perfecto griego como «he sido crucificado», que conserva evento pasado con resultado presente.
  - severity: medium
    issue: La finalidad con ἵνα quedó como «para vivir para Dios».
    rationale: Es comprensible, pero «para que viva para Dios» refleja mejor la estructura verbal de propósito y suena más fluido en español bíblico moderno.
