revisions:
- from: A ellos no cedimos ni por un momento[a] en sometimiento, para que la verdad del evangelio permaneciera entre ustedes[b].
  to: A ellos no cedimos ni por un momento[a] en sumisión, para que la verdad del evangelio permaneciera para ustedes[b].
  rationale: Se ajusta πρὸς ὑμᾶς a «para ustedes» para seguir la decisión principal documentada y evitar el matiz locativo de «entre ustedes». Se cambia «en sometimiento» por «en sumisión» por mayor naturalidad y fidelidad al sentido de ὑποταγή en este contexto. También se normaliza la nota alternativa.
