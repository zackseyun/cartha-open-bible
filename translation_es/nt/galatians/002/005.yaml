translation:
  language: es
  text: A ellos no cedimos ni por un momento[a] en sumisión, para que la verdad del evangelio permaneciera para ustedes[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «ni siquiera por una hora»; un modismo que significa «ni por un momento».
    reason: lexical_alternative
  - marker: b
    text: 'O: «con ustedes».'
    reason: alternative_reading
lexical_decisions:
- source_word: οἷς
  english_pob_choice: To them
  chosen_spanish: A ellos
  alternatives_spanish:
  - Para ellos
  - Con ellos
  lexicon: BDAG
  rationale: El dativo retoma a los hombres mencionados antes; en español, «a ellos» conserva esa referencia personal de manera natural sin añadir una relación no indicada por el griego.
- source_word: οὐδὲ πρὸς ὥραν
  english_pob_choice: even for a moment
  chosen_spanish: ni por un momento[a]
  alternatives_spanish:
  - ni siquiera por una hora
  - ni por un instante
  lexicon: BDAG
  rationale: La expresión es idiomática y significa un lapso brevísimo. «Ni por un momento» comunica bien la fuerza en español actual; la nota preserva el sentido más literal de «ni siquiera por una hora».
- source_word: εἴξαμεν
  english_pob_choice: did not yield
  chosen_spanish: no cedimos
  alternatives_spanish:
  - no dimos lugar
  - no nos dejamos llevar
  lexicon: BDAG
  rationale: El verbo expresa ceder o dar paso. «No cedimos» mantiene la negativa activa y evita absorber el matiz dentro del sustantivo siguiente.
- source_word: τῇ ὑποταγῇ
  english_pob_choice: in submission
  chosen_spanish: en sometimiento
  alternatives_spanish:
  - en sumisión
  - en sujeción
  lexicon: BDAG
  rationale: El dativo indica la esfera o manera del ceder. «En sometimiento» conserva el peso de subordinación del término sin suavizarlo en exceso; «sumisión» y «sujeción» también serían posibles, pero pueden sonar más eclesiásticas o técnicas.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  lexicon: BDAG
  rationale: Introduce finalidad. «Para que» es la equivalencia natural y clara en español.
- source_word: ἡ ἀλήθεια τοῦ εὐαγγελίου
  english_pob_choice: the truth of the gospel
  chosen_spanish: la verdad del evangelio
  alternatives_spanish:
  - la verdad de la buena noticia
  lexicon: BDAG
  rationale: «Evangelio» preserva el término paulino establecido y el sentido teológico habitual de εὐαγγέλιον; «verdad» mantiene el valor de realidad fiel o genuina del mensaje.
- source_word: διαμείνῃ
  english_pob_choice: might remain
  chosen_spanish: permaneciera
  alternatives_spanish:
  - siguiera permaneciendo
  - continuara
  lexicon: BDAG
  rationale: El subjuntivo con ἵνα expresa propósito y continuidad preservada. «Permaneciera» es una solución fluida y fiel al valor de permanecer/continuar.
- source_word: πρὸς ὑμᾶς
  english_pob_choice: for you
  chosen_spanish: entre ustedes[b]
  alternatives_spanish:
  - con ustedes
  - para ustedes
  lexicon: BDAG
  rationale: 'La preposición πρός con acusativo puede sugerir relación o referencia hacia los destinatarios. «Entre ustedes» preserva la posibilidad de que la verdad del evangelio permanezca en su ámbito; la nota recoge la lectura alternativa «con ustedes». '
theological_decisions:
- issue: Fuerza de la negativa de Pablo ante los oponentes
  english_pob_reading: Paul states that he did not yield to them at all, preserving the integrity of the gospel message.
  chosen_spanish_reading: Pablo declara que no cedió en absoluto, manteniendo la integridad del evangelio.
  alternative_spanish_readings:
  - Pablo se negó a someterse personalmente
  - Pablo rechazó hacer una concesión institucional
  rationale: El griego habla de no ceder «en sometimiento» sin precisar más. La redacción española conserva esa tensión y evita estrechar indebidamente el alcance de la afirmación.
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: 'Coincide con la última revisión: no se requieren cambios respecto del pasaje base auditado; se mantiene la equivalencia óptima y la ambigüedad útil del texto griego.'
  spanish_consistency_notes:
  - Se usó «evangelio» de forma consistente con el valor paulino de εὐαγγέλιον.
  - «A ellos» mantiene el referente del dativo sin introducir una preposición interpretativa excesiva.
  - «Sometimiento» conserva la dureza del término y evita suavizar τῇ ὑποταγῇ.
  - La nota sobre πρὸς ὑμᾶς preserva la alternativa «con ustedes», que en español también es posible por el valor relacional de πρός.
  - Se evitó el calco «por una hora» en el texto principal para priorizar naturalidad, dejando la literalidad en nota.
