review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura griega y la finalidad de ἵνα, y conserva correctamente «no cedimos» y «la verdad del evangelio». Sin embargo, dos decisiones no reflejan bien el expediente inglés ni la mejor lectura del griego: «entre ustedes» se aparta de la opción principal documentada para πρὸς ὑμᾶς («for you») y cambia el matiz a ubicación/esfera; además «en sometimiento» suena poco natural en español y no expresa tan bien la idea de ceder «en sumisión/sujeción».'
  spanish_quality_summary: El texto es mayormente claro, pero «en sometimiento» resulta forzado y poco idiomático para lectura bíblica continua. «Entre ustedes» también suena menos preciso aquí que «para ustedes», porque introduce un matiz espacial no presente como opción principal en la auditoría. Las notas necesitan normalización tipográfica en español.
  glossary_alignment: No hay conflicto con los términos troncales del proyecto. «Evangelio» está bien conservado. La revisión propuesta mejora la fidelidad semántica sin afectar la terminología base.
  issues:
  - severity: medium
    issue: «entre ustedes» para πρὸς ὑμᾶς
    rationale: La auditoría inglesa adopta «for you» como lectura principal y deja «with you» como alternativa. «Entre ustedes» añade un matiz locativo/social distinto y desplaza el sentido de beneficio o referencia hacia los destinatarios.
  - severity: medium
    issue: «en sometimiento» para τῇ ὑποταγῇ
    rationale: Aunque comprensible, es una formulación poco natural en español bíblico general. «en sumisión» expresa mejor la manera/esfera del ceder y mantiene el peso de subordinación sin sonar torpe.
  - severity: low
    issue: Redacción de la nota b
    rationale: 'La forma «''O: «con ustedes».''» tiene puntuación y comillas innecesariamente anglicadas. Conviene normalizarla a español claro.'
  revised_spanish_text: A ellos no cedimos ni por un momento[a] en sumisión, para que la verdad del evangelio permaneciera para ustedes[b].
