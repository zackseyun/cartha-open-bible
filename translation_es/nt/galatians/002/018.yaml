translation:
  language: es
  text: Porque si reconstruyo[a] lo que derribé[b], demuestro que yo mismo soy transgresor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «vuelvo a edificar» o «edifico de nuevo».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «destruí» o «deshice».'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰ γὰρ
  english_pob_choice: For if
  chosen_spanish: Porque si
  alternatives_spanish:
  - Si
  - Pues si
  - Porque, si
  lexicon: BDAG
  rationale: Mantiene la fuerza condicional de εἰ y la conexión explicativa de γάρ en un español natural. 'Porque si' conserva bien la relación con el argumento anterior sin endurecer la sintaxis.
- source_word: ἃ ... ταῦτα
  english_pob_choice: the things ...
  chosen_spanish: lo que
  alternatives_spanish:
  - las cosas que
  - aquello que
  - esas cosas
  lexicon: BDAG
  rationale: El correlativo plural e inanimado se expresa con naturalidad en español con 'lo que', que evita una repetición torpe y sigue siendo suficientemente concreto en el contexto metafórico.
- source_word: κατέλυσα
  english_pob_choice: tore down
  chosen_spanish: destruí
  alternatives_spanish:
  - derribé
  - demolí
  - deshice
  lexicon: BDAG
  rationale: En español, 'destruí' comunica la acción de deshacer o echar abajo algo dentro de la metáfora de construcción. 'Derribé' también es posible, pero 'destruí' mantiene mejor el contraste con 'vuelvo a edificar'.
- source_word: πάλιν οἰκοδομῶ
  english_pob_choice: rebuild
  chosen_spanish: vuelvo a edificar
  alternatives_spanish:
  - edifico de nuevo
  - reconstruyo
  - edifico otra vez
  lexicon: BDAG
  rationale: '''Vuelvo a edificar'' conserva el valor de πάλιν y la imagen de construcción sin forzar un verbo compuesto menos idiomático. Además mantiene la progresión verbal del griego.'
- source_word: παραβάτην
  english_pob_choice: transgressor
  chosen_spanish: transgresor
  alternatives_spanish:
  - violador
  - quebrantador
  - infractor
  lexicon: BDAG
  rationale: '''Transgresor'' reproduce el matiz moral-legal de παραβάτης y coincide con la decisión inglesa documentada, sin reducirlo a un simple incumplimiento administrativo.'
- source_word: ἐμαυτὸν συνιστάνω
  english_pob_choice: I prove myself to be
  chosen_spanish: me presento a mí mismo como
  alternatives_spanish:
  - me demuestro como
  - me muestro como
  - me pruebo a mí mismo como
  lexicon: BDAG
  rationale: En este contexto συνιστάνω significa hacer aparecer o establecer a alguien como algo. 'Me presento a mí mismo como' preserva el reflexivo y deja abierta la fuerza de 'mostrar/probar' sin sonar artificial en español.
translation_notes:
  revision_awareness: 'El borrador corrige la validación anterior: los marcadores de nota [a] y [b] ahora aparecen exactamente en el texto español en los dos puntos léxicos pertinentes. Se conservó la lectura de alto acuerdo del auditor inglés y no se introdujeron cambios textuales adicionales.'
  spanish_consistency_notes:
  - 'Se mantuvo un registro verbal natural en español con presente gnómico/argumentativo: ''Porque si vuelvo a edificar...''.'
  - '''Transgresor'' se preserva como término técnico-moral, evitando reemplazos más laxos como ''infractor''.'
  - La metáfora de construcción se conserva de forma coherente entre 'destruí' y 'vuelvo a edificar'.
  - No se añadieron notas teológicas porque el versículo no exige una decisión doctrinal explícita más allá del léxico.
