revisions:
- from: Pero cuando Cefas[a] vino a Antioquía, le resistí cara a cara, porque estaba condenado[b].
  to: Pero cuando Cefas[a] vino a Antioquía, me opuse a él en su cara, porque era reprensible[b].
  rationale: 'Se revisa para mejorar la naturalidad y precisión semántica en español: ''me opuse a él'' expresa mejor ἀντέστην en contexto de confrontación abierta; ''en su cara'' conserva con más fidelidad el matiz de κατὰ πρόσωπον αὐτῷ; y ''era reprensible'' evita la sobrelectura judicial de ''estaba condenado'' mientras sigue reflejando que Cefas estaba objetivamente en falta, en línea con la nota alternativa del POB inglés.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:38:49Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: transición temporal/contrastiva, nombre transliterado ''Cefas'', llegada a Antioquía, confrontación directa y razón causal. Sin embargo, dos elecciones no preservan del todo el matiz del POB auditado: ''le resistí'' suena menos idiomático y menos preciso que ''me opuse'', y ''estaba condenado'' puede sugerir una condena formal más fuerte que el griego/perífrasis resultativa en este contexto, donde el POB preserva ''stood condemned'' con alternativa ''clearly in the wrong''.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero ''le resistí cara a cara'' suena algo forzado. Una formulación más natural y fiel es ''me opuse a él en su cara'' o ''me opuse a él cara a cara''; la primera refleja mejor el giro ''to his face''. También conviene ajustar la cláusula final para evitar una lectura judicial excesivamente dura. '
  glossary_alignment: 'Buena alineación con la política del proyecto al conservar ''Cefas'' y explicarlo en nota. No hay términos teológicos de glosario mayor en disputa. La principal cuestión es léxica/idiomática: ἀντέστην y κατεγνωσμένος ἦν deben sonar naturales en español sin perder la fuerza de confrontación y el matiz de estar reprensible/ya condenado por los hechos.'
  issues:
  - severity: medium
    issue: '''le resistí'' para ἀντέστην'
    rationale: Aunque semánticamente cercano, en español bíblico-natural 'resistir a alguien' aquí suena menos idiomático que 'oponerse a él'. El contexto es confrontación abierta, no mera resistencia.
  - severity: medium
    issue: '''cara a cara'' para κατὰ πρόσωπον αὐτῷ sin referencia pronominal'
    rationale: '''Cara a cara'' puede entenderse como encuentro mutuo, pero el griego enfatiza ''a su cara / to his face''. Conviene explicitar ''a él'' y/o ''en su cara'' para conservar el filo directo del original.'
  - severity: medium
    issue: '''estaba condenado'' para κατεγνωσμένος ἦν'
    rationale: Es formalmente posible, pero en español actual tiende a oírse como condena judicial o definitiva. En contexto, 'era reprensible' comunica mejor el estado de culpabilidad/reprobación sin sobrecargar el sentido; la alternativa de nota puede conservar 'claramente equivocado'.
  revised_spanish_text: Pero cuando Cefas[a] vino a Antioquía, me opuse a él en su cara, porque era reprensible[b].
  revised_footnotes:
  - marker: a
    text: Cefas es el nombre arameo de Pedro.
    reason: cross_reference
  - marker: b
    text: 'O: «porque estaba claramente equivocado».'
    reason: lexical_alternative
  revision_rationale: 'Se revisa para mejorar la naturalidad y precisión semántica en español: ''me opuse a él'' expresa mejor ἀντέστην en contexto de confrontación abierta; ''en su cara'' conserva con más fidelidad el matiz de κατὰ πρόσωπον αὐτῷ; y ''era reprensible'' evita la sobrelectura judicial de ''estaba condenado'' mientras sigue reflejando que Cefas estaba objetivamente en falta, en línea con la nota alternativa del POB inglés.'
