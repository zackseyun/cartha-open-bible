translation:
  language: es
  text: Pero cuando Cefas[a] vino a Antioquía, me opuse a él en su cara, porque era reprensible[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Cefas es el nombre arameo de Pedro.
    reason: cross_reference
  - marker: b
    text: 'O: «porque estaba claramente equivocado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὅτε δὲ
  english_pob_choice: But when
  chosen_spanish: Pero cuando
  alternatives_spanish:
  - Ahora bien, cuando
  - Y cuando
  lexicon: —
  rationale: Mantiene la transición temporal y el matiz leve de contraste de δέ con un español natural y sobrio.
- source_word: Κηφᾶς
  english_pob_choice: Cephas
  chosen_spanish: Cefas
  alternatives_spanish:
  - Pedro
  lexicon: —
  rationale: Se translitera el nombre propio según la práctica del POB; 'Cefas' conserva la forma del griego Κηφᾶς y evita sustituirla por el nombre más familiar 'Pedro'.
- source_word: ἦλθεν
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - arribó
  lexicon: BDAG
  rationale: '''Vino'' expresa de manera natural el movimiento hacia Antioquía y corresponde al valor básico de ἔρχομαι en este contexto.'
- source_word: εἰς Ἀντιόχειαν
  english_pob_choice: to Antioch
  chosen_spanish: a Antioquía
  alternatives_spanish:
  - hacia Antioquía
  - dentro de Antioquía
  lexicon: BDAG
  rationale: En español, con verbos de movimiento, 'a Antioquía' es la forma idiomática y fiel; evita el calco 'dentro de'.
- source_word: κατὰ πρόσωπον αὐτῷ
  english_pob_choice: to his face
  chosen_spanish: cara a cara
  alternatives_spanish:
  - en su cara
  - directamente
  lexicon: BDAG
  rationale: '''Cara a cara'' conserva el sentido idiomático de confrontación directa sin sonar rudo o antinatural en español.'
- source_word: ἀντέστην
  english_pob_choice: I opposed
  chosen_spanish: le resistí
  alternatives_spanish:
  - me le opuse
  - lo enfrenté
  lexicon: BDAG
  rationale: '''Resistirle'' mantiene con fuerza el valor de ἀνθίστημι (''ponerse en contra, resistir'') y suena más cercano al perfil semántico del griego que un simple ''me opuse''.'
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: —
  rationale: Introduce la razón de la oposición de manera clara y directa, como en el texto fuente.
- source_word: κατεγνωσμένος ἦν
  english_pob_choice: he stood condemned
  chosen_spanish: estaba condenado
  alternatives_spanish:
  - era tenido por culpable
  - estaba claramente equivocado
  lexicon: BDAG
  rationale: La construcción perifrástica expresa un estado resultante; 'estaba condenado' preserva esa fuerza pasiva, aunque en español puede percibirse más fuerte que la opción interpretativa 'estaba claramente equivocado'.
theological_decisions:
- issue: Forma del nombre Κηφᾶς
  english_pob_reading: Retain 'Cephas' in the main text
  chosen_spanish_reading: Mantener 'Cefas' en el texto principal
  alternative_spanish_readings:
  - Traducir como 'Pedro' por familiaridad
  rationale: La decisión es onomástica y de transparencia textual, no doctrinal. Dado que el griego dice Κηφᾶς, se conserva la forma transliterada 'Cefas' para reflejar mejor el original; una nota puede identificarlo con Pedro para el lector.
  doctrine_reference: Transliterar nombres propios cuando el texto griego los presenta así; identificar equivalencias en nota si ayuda a la lectura.
- issue: Fuerza de κατεγνωσμένος ἦν
  english_pob_reading: he stood condemned
  chosen_spanish_reading: estaba condenado
  alternative_spanish_readings:
  - estaba claramente equivocado
  - era culpable
  rationale: Se preserva la lectura pasiva/resultativa del griego, sin diluirla en una paráfrasis evaluativa. La traducción deja abierta la tensión entre condenación formal y estar en falta, tal como el POB inglés la mantiene.
  doctrine_reference: Evitar suavizar el estado pasivo cuando el griego presenta una acusación o juicio implícito.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el sentido del griego SBLGNT y la solución auditada del POB en inglés: translitera Κηφᾶς como Cefas, conserva la confrontación directa con una expresión idiomática natural en español, y mantiene la tensión de κατεγνωσμένος ἦν con una forma pasiva/resultativa que no la rebaja a mera opinión.'
  spanish_consistency_notes:
  - Se usa 'Cefas' y no 'Pedro' para mantener la transparencia del nombre propio griego.
  - '''Cara a cara'' se eligió para reproducir la idiomática de κατὰ πρόσωπον sin calco rígido.'
  - '''Estaba condenado'' conserva la pasividad/resultatividad de la construcción griega, aunque la nota ofrece la alternativa interpretativa documentada.'
