revisions:
- from: Pero subí en respuesta a una revelación[a], y les expuse el evangelio que proclamo entre los gentiles; pero en privado, a los de reputación[b], para que quizá no estuviera corriendo, o hubiera corrido[c], en vano.
  to: Pero subí en respuesta a una revelación[a], y les expuse el evangelio que proclamo entre los gentiles; pero en privado, a los de mayor reputación[b], no fuera que estuviera corriendo, o hubiera corrido[c], en vano.
  rationale: Se corrige la lógica de μή πως con «no fuera que», que expresa prevención/cautela de manera fiel y natural en español. También se mejora «a los de reputación» a «a los de mayor reputación» para sonar más idiomático sin sobreinterpretar τοῖς δοκοῦσιν. Se conservan las notas léxicas del POB y la distinción entre la carrera presente y la pasada.
