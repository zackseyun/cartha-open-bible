translation:
  language: es
  text: Pero subí en respuesta a una revelación[a], y les expuse el evangelio que proclamo entre los gentiles; pero en privado, a los de mayor reputación[b], no fuera que estuviera corriendo, o hubiera corrido[c], en vano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por causa de una revelación».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «a los que parecían influyentes».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «no fuera que yo estuviera corriendo o hubiera corrido en vano».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνέβην
  english_pob_choice: I went up
  chosen_spanish: subí
  alternatives_spanish:
  - fui
  - subí a Jerusalén
  lexicon: BDAG
  rationale: ἀναβαίνω significa básicamente ‘subir’ o ‘ir arriba’. Como el destino no se expresa en este versículo, el español mantiene el verbo simple ‘subí’ sin añadir ‘a Jerusalén’.
- source_word: κατὰ ἀποκάλυψιν
  english_pob_choice: in response to a revelation
  chosen_spanish: en respuesta a una revelación
  alternatives_spanish:
  - por causa de una revelación
  - según una revelación
  lexicon: BDAG
  rationale: La frase indica la base o motivo del viaje. ‘En respuesta a’ comunica de manera natural que una revelación provocó la acción, sin cerrar la alternativa de causalidad que el inglés POB dejó abierta.
- source_word: ἀνεθέμην
  english_pob_choice: I laid before them
  chosen_spanish: les expuse
  alternatives_spanish:
  - les presenté
  - les sometí
  lexicon: BDAG
  rationale: Aquí ἀνατίθεμαι expresa poner algo delante de otros para consideración. ‘Les expuse’ conserva el acto de presentar el evangelio sin sugerir subordinación formal, como podría hacerlo ‘les sometí’.
- source_word: τὸ εὐαγγέλιον
  english_pob_choice: the gospel
  chosen_spanish: el evangelio
  alternatives_spanish:
  - la buena noticia
  lexicon: BDAG
  rationale: ‘Evangelio’ es el equivalente estándar y más natural para εὐαγγέλιον en el uso paulino.
- source_word: ἐν τοῖς ἔθνεσιν
  english_pob_choice: among the Gentiles
  chosen_spanish: entre los gentiles
  alternatives_spanish:
  - entre las naciones
  lexicon: BDAG
  rationale: En este contexto paulino, ἔθνη se refiere a no judíos. ‘Gentiles’ preserva ese sentido técnico mejor que ‘naciones’.
- source_word: κατ’ ἰδίαν
  english_pob_choice: privately
  chosen_spanish: en privado
  alternatives_spanish:
  - privadamente
  - a solas
  lexicon: BDAG
  rationale: La frase indica un ámbito separado de la presentación pública. ‘En privado’ es claro, idiomático y fiel al matiz adverbial.
- source_word: τοῖς δοκοῦσιν
  english_pob_choice: those of repute
  chosen_spanish: a los de reputación
  alternatives_spanish:
  - a los que parecían influyentes
  - a los reconocidos
  lexicon: BDAG
  rationale: δοκέω aquí describe a personas consideradas importantes o de peso. ‘De reputación’ preserva la idea de estimación pública sin decidir más de lo que el griego dice.
- source_word: εἰς κενὸν
  english_pob_choice: in vain
  chosen_spanish: en vano
  alternatives_spanish:
  - sin resultado
  - de balde
  lexicon: BDAG
  rationale: ‘En vano’ es la forma más natural y tradicional para εἰς κενόν, y transmite bien la idea de labor sin fruto.
- source_word: τρέχω / ἔδραμον
  english_pob_choice: I should be running, or had run
  chosen_spanish: estuviera corriendo, o hubiera corrido
  alternatives_spanish:
  - corriera, o hubiera corrido
  - estuviera corriendo, o corrí
  lexicon: BDAG
  rationale: Se conserva la distinción entre la acción en curso y la acción ya realizada. El español usa tiempos subjuntivos/compuestos que reflejan mejor la cautela de μή πως sin convertirlo en una afirmación cerrada.
theological_decisions:
- issue: Si la presentación privada del evangelio implica sumisión doctrinal o simple consulta estratégica
  english_pob_reading: 'The wording remains neutral: Paul ''laid before them'' the gospel without implying doctrinal inferiority or mere consultation for authorization.'
  chosen_spanish_reading: 'La redacción permanece neutral: Pablo les expone el evangelio sin insinuar inferioridad doctrinal ni una mera búsqueda de autorización.'
  alternative_spanish_readings:
  - Pablo sometió su evangelio para aprobación
  - Pablo solo les informó, sin componente evaluativo
  rationale: 'El verbo griego no obliga a una idea fuerte de subordinación. Mantener la neutralidad preserva la tensión del pasaje: presentación real, pero no necesariamente sumisión doctrinal.'
  doctrine_reference: Hechos 15; Gálatas 1–2
- issue: Cómo reflejar la cláusula final de cautela para no suavizar la tensión temporal del griego
  english_pob_reading: lest somehow I should be running, or had run, in vain
  chosen_spanish_reading: para que quizá no estuviera corriendo, o hubiera corrido, en vano
  alternative_spanish_readings:
  - por miedo de que estuviera corriendo, o hubiera corrido, en vano
  - para que quizá no corriera, ni hubiera corrido, en vano
  rationale: El griego conserva una tensión entre la carrera presente y la pasada. La traducción intenta mantener ambos valores verbales sin resolver artificialmente la diferencia.
  doctrine_reference: Filipenses 2:16; Gálatas 5:7
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que cambió ‘though privately’ por ‘but privately’ para reflejar con mayor directitud δὲ. En español se reproduce esa oposición con ‘pero en privado’, manteniendo el contraste parentético. También se respeta la solución verbal dual de la cláusula final, conservando la tensión entre la carrera presente y la pasada.
  spanish_consistency_notes:
  - Se usa ‘gentiles’ para ἔθνη en sentido paulino técnico.
  - Se evita añadir ‘a Jerusalén’ porque el destino no aparece explícito en el versículo.
  - ‘Evangelio’ se mantiene como término fijo paulino.
  - ‘En vano’ conserva el valor estable de εἰς κενόν.
  - La expresión ‘a los de reputación’ conserva la ambigüedad del participio δοκοῦσιν sin ampliarla en exceso.
