  - severity: low
    issue: «a los de reputación» suena poco idiomático
    rationale: Aunque refleja la idea básica de τοῖς δοκοῦσιν, en español natural resulta algo duro. «a los de mayor reputación» conserva la neutralidad del POB y mejora la fluidez.
