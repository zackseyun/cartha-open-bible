translation:
  language: es
  text: Pero de los que eran tenidos por algo[a] —lo que alguna vez fueron no me importa; Dios no muestra parcialidad[b]—, pues a mí, los que eran tenidos por algo no me añadieron nada[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los que parecían ser algo».'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «Dios no recibe el rostro de un hombre», un modismo que significa «Dios no muestra parcialidad».'
    reason: cultural_note
  - marker: c
    text: 'O: «no me impusieron nada más».'
    reason: lexical_alternative
lexical_decisions:
- source_word: τῶν δοκούντων εἶναί τι / οἱ δοκοῦντες
  english_pob_choice: those who were reputed to be something / those of reputation
  chosen_spanish: los que eran tenidos por algo / los que eran tenidos por algo
  alternatives_spanish:
  - los que parecían ser algo
  - los que eran considerados importantes
  - los influyentes
  lexicon: BDAG
  rationale: δοκέω expresa aquí la reputación o consideración pública, no solo apariencia subjetiva. «Tenidos por algo» conserva el matiz de valoración social y también la distancia retórica de Pablo sin convertirlo en un insulto más fuerte de lo que el texto exige.
- source_word: ὁποῖοί ποτε ἦσαν
  english_pob_choice: whatever they once were
  chosen_spanish: lo que alguna vez hayan sido
  alternatives_spanish:
  - lo que eran
  - de la clase que fueran
  - lo que fueron
  lexicon: BDAG
  rationale: La cláusula relativiza el antiguo estatus de esas personas. «Alguna vez» refleja ποτε con naturalidad, y la forma verbal en subjuntivo aporta en español una generalidad equivalente al valor del griego sin forzar una cronología más marcada de la necesaria.
- source_word: οὐδέν μοι διαφέρει
  english_pob_choice: makes no difference to me
  chosen_spanish: no me importa
  alternatives_spanish:
  - nada me importa
  - no me hace diferencia
  - no me afecta
  lexicon: BDAG
  rationale: La expresión griega es idiomática. «No me importa» comunica de forma natural que su estatus previo no altera el juicio de Pablo. Se conserva el tono de desapego, aunque la frase española es algo más breve que la inglesa.
- source_word: πρόσωπον θεὸς ἀνθρώπου οὐ λαμβάνει
  english_pob_choice: God shows no partiality
  chosen_spanish: Yahvé no muestra parcialidad
  alternatives_spanish:
  - Dios no hace acepción de personas
  - Dios no mira la cara del hombre
  - Dios no tiene favoritismos
  lexicon: BDAG
  rationale: El griego dice literalmente que Dios no recibe el rostro de un hombre, un modismo de favoritismo. Se traduce con el nombre divino «Yahvé» por la norma del proyecto para יהוה; aquí el sentido idiomático se expresa como «no muestra parcialidad». «Acepción de personas» es posible, pero suena más tradicional; «parcialidad» es más transparente en español moderno.
- source_word: ἐμοὶ γὰρ
  english_pob_choice: to me, indeed
  chosen_spanish: pues a mí, de parte de los que eran tenidos por algo
  alternatives_spanish:
  - porque a mí
  - ya que a mí
  - pues en mi caso
  lexicon: BDAG
  rationale: γάρ introduce la razón o explicación de la observación anterior. «Pues» conserva ese enlace discursivo; «a mí» mantiene explícita la referencia personal del dativo. La colocación «de parte de» ayuda a que la frase fluya con naturalidad en español.
- source_word: οὐδὲν προσανέθεντο
  english_pob_choice: added nothing
  chosen_spanish: nada me añadieron
  alternatives_spanish:
  - no me añadieron nada
  - nada me impusieron
  - nada añadieron a mi mensaje
  lexicon: BDAG
  rationale: προσανατίθημι aquí puede entenderse como añadir, imponer o contribuir algo más. «Nada me añadieron» sigue de cerca la forma del griego y deja abierta la tensión contextual entre no añadir instrucciones y no imponer cargas. La traducción evita decidir demasiado estrechamente entre ambas posibilidades.
theological_decisions:
- issue: Cómo renderizar la declaración sobre la imparcialidad divina sin borrar el modismo griego
  english_pob_reading: God shows no partiality
  chosen_spanish_reading: Yahvé no muestra parcialidad
  alternative_spanish_readings:
  - Dios no hace acepción de personas
  - Dios no mira el rostro del hombre
  - Dios no se deja llevar por apariencias
  rationale: El texto griego usa un hebraísmo/idioma de favoritismo. En español, «no muestra parcialidad» comunica el sentido sin perder la fuerza ética de la afirmación. Se emplea «Yahvé» conforme a la norma del proyecto para el nombre divino, manteniendo la referencia al Dios bíblico en continuidad con la tradición del texto de Gálatas.
  doctrine_reference: Imparcialidad divina (cf. Deuteronomio 10:17; Romanos 2:11; Santiago 2:1)
- issue: Si el versículo debe sonar despectivo hacia los líderes de Jerusalén o solo insistir en la independencia del evangelio de Pablo
  english_pob_reading: The translation preserves a measured distancing tone without turning the line into an attack on the leaders.
  chosen_spanish_reading: La traducción conserva una distancia retórica medida sin convertir la línea en un ataque contra los líderes.
  alternative_spanish_readings:
  - Una versión más áspera podría sonar desdeñosa.
  - Una versión más suave podría neutralizar el matiz polémico.
  rationale: 'Pablo no está negando necesariamente la legitimidad de esos hombres, sino afirmando que su reputación no determina la verdad ni la autoridad de su evangelio. La redacción española mantiene esa tensión: reconoce su prestigio social, pero deja claro que eso no alteró la evaluación de Pablo.'
  doctrine_reference: Autoridad apostólica y suficiencia del evangelio (cf. Gálatas 1:11-12; 2:9)
- issue: Cómo traducir el cierre para no resolver de antemano si Pablo habla de añadidos al mensaje o de imposiciones personales
  english_pob_reading: added nothing / or 'imposed nothing further on me'
  chosen_spanish_reading: nada me añadieron
  alternative_spanish_readings:
  - nada me impusieron
  - nada añadieron a mi mensaje
  - no me agregaron nada
  rationale: El verbo griego admite una gama de sentidos cercanos. «Nada me añadieron» es suficientemente literal y deja intacta la ambigüedad útil del pasaje, sin fijar prematuramente si el énfasis recae en instrucciones, cargas o adiciones al contenido del evangelio.
  doctrine_reference: Discernimiento del texto apostólico y delimitación de la autoridad humana frente al evangelio recibido
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente que prefirió «indeed» por un registro más formal y por su ajuste a γάρ. En español se reflejó ese enlace con «pues», manteniendo un tono formal y una conexión causal/discursiva natural. También se preservó la decisión auditada de no debilitar el matiz retórico de «reputed/those of reputation», optando por una expresión española igualmente distanciadora pero no excesivamente injuriosa.
  spanish_consistency_notes:
  - Se usó «Yahvé» para el nombre divino, conforme a la norma del proyecto.
  - Se mantuvo el tono sobrio y argumentativo de Pablo, evitando una paráfrasis expansiva.
  - «Parcialidad» se eligió por claridad moderna, pero la nota conserva el modismo literal del griego.
  - Las notas al pie conservan las alternativas relevantes sin duplicar marcadores.
