translation:
  language: es
  text: y al reconocer la gracia que me había sido dada, Jacobo, Cefas y Juan, los que eran considerados columnas, nos dieron a mí y a Bernabé las diestras de comunión[a], para que nosotros fuéramos a los gentiles[b] y ellos a la circuncisión[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «las manos derechas de comunión».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «las naciones».'
    reason: lexical_alternative
  - marker: c
    text: 'Literalmente: «a la circuncisión», es decir, a los judíos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: γνόντες
  english_pob_choice: recognizing
  chosen_spanish: al reconocer
  alternatives_spanish:
  - al saber
  - al reconocer plenamente
  - al darse cuenta de
  lexicon: BDAG
  rationale: El participio aoristo introduce la base de la acción posterior. En español, 'al reconocer' conserva tanto la percepción como la aceptación de lo que ya era evidente, sin endurecer el matiz a un simple acto mental.
- source_word: χάριν
  english_pob_choice: grace
  chosen_spanish: gracia
  alternatives_spanish:
  - favor
  - benevolencia
  - gracia y favor
  lexicon: BDAG
  rationale: El término paulino se mantiene como 'gracia' para conservar su valor teológico habitual y su posible resonancia con el llamamiento apostólico, sin reducirlo a un favor meramente humano.
- source_word: δοθεῖσάν μοι
  english_pob_choice: had been given to me
  chosen_spanish: me había sido dada
  alternatives_spanish:
  - me fue dada
  - que me había sido otorgada
  - dada a mí
  lexicon: BDAG
  rationale: El pluscuamperfecto pasivo en español expresa con naturalidad que la gracia antecede al gesto de reconocimiento y subraya que la acción es recibida, no producida por Pablo.
- source_word: οἱ δοκοῦντες στῦλοι εἶναι
  english_pob_choice: who were regarded as pillars
  chosen_spanish: los que eran considerados columnas
  alternatives_spanish:
  - los que parecían ser columnas
  - los que eran tenidos por columnas
  - los reputados como columnas
  lexicon: BDAG
  rationale: '''Considerados columnas'' conserva el valor de reputación o reconocimiento público sin introducir el tono potencialmente despectivo de ''parecían ser''. ''Columnas'' mantiene la metáfora eclesial del texto.'
- source_word: δεξιὰς ... κοινωνίας
  english_pob_choice: the right hands of fellowship
  chosen_spanish: las diestras de comunión
  alternatives_spanish:
  - las manos derechas de comunión
  - las diestras de compañerismo
  - las manos de comunión
  lexicon: BDAG
  rationale: Se conserva el plural literal 'diestras' para reflejar δεξιὰς. 'Comunión' reproduce el campo semántico de κοινωνία en un registro eclesial comprensible en español; 'compañerismo' o 'fellowship' sonarían menos naturales o más interpretativos aquí.
- source_word: ἔθνη
  english_pob_choice: Gentiles
  chosen_spanish: los gentiles
  alternatives_spanish:
  - las naciones
  - los pueblos no judíos
  lexicon: BDAG
  rationale: En Gálatas el contraste con 'la circuncisión' apunta a los no judíos; 'gentiles' es el equivalente español más preciso y ampliamente reconocido en contexto bíblico.
- source_word: περιτομήν
  english_pob_choice: the circumcised
  chosen_spanish: la circuncisión
  alternatives_spanish:
  - los circuncidados
  - la circuncisión, es decir, los judíos
  lexicon: BDAG
  rationale: Se mantiene el sustantivo abstracto como en el griego, preservando la metonimia y el contraste retórico con 'los gentiles'. En español, 'la circuncisión' sigue siendo inteligible en este marco apostólico.
theological_decisions:
- issue: Cómo traducir κοινωνία en el contexto de la aprobación apostólica y la división de misión
  english_pob_reading: the right hands of fellowship
  chosen_spanish_reading: las diestras de comunión
  alternative_spanish_readings:
  - las diestras de compañerismo
  - las diestras de colaboración
  - las manos derechas de comunión
  rationale: El contexto no describe solo amistad, sino un gesto formal de reconocimiento y comunión en la obra apostólica. 'Comunión' conserva el valor de participación compartida sin borrar el matiz relacional y eclesial que el término puede tener.
  doctrine_reference: Hechos 15; Gálatas 2:9; 1 Juan 1:3
- issue: Si traducir περιτομή como un grupo de personas o conservar el abstracto
  english_pob_reading: the circumcised
  chosen_spanish_reading: la circuncisión
  alternative_spanish_readings:
  - los circuncidados
  - los judíos
  rationale: Se preserva la forma metonímica del griego para no perder la tensión textual entre dos esferas de misión. En una nota se puede aclarar que se refiere al pueblo judío si el lector lo necesita.
  doctrine_reference: Romanos 2:28-29; Gálatas 5:6
- issue: Valor de χάρις en el llamamiento apostólico
  english_pob_reading: the grace that had been given to me
  chosen_spanish_reading: la gracia que me había sido dada
  alternative_spanish_readings:
  - el favor que me había sido dado
  - la gracia concedida a mí
  rationale: '''Gracia'' mantiene la categoría paulina central sin empobrecerla a mero favor. En este pasaje se trata de una gracia recibida y reconocida, relacionada con el llamado y la comisión apostólica.'
  doctrine_reference: 1 Corintios 15:10; Efesios 3:7-8
translation_notes:
  revision_awareness: 'He seguido el estado revisado más reciente del contexto inglés: la expresión final volvió a ''right hands of fellowship'' para ajustarse mejor al plural δεξιὰς y a κοινωνίας. En español, eso llevó a ''las diestras de comunión'', manteniendo tanto el plural como el valor de κοινωνία sin depender de una traducción eclesiástica rígida. También conservé la contraposición misión a los gentiles / misión a la circuncisión como contraste retórico del pasaje.'
  spanish_consistency_notes:
  - Se usó 'Jacobo' para Ἰάκωβος, en línea con una transliteración estable y coherente con el registro del proyecto.
  - '''Cefas'' se mantuvo para Κηφᾶς, no ''Pedro'', por fidelidad al nombre griego usado en el texto.'
  - Se prefirió 'gentiles' por claridad contextual y coherencia con el uso bíblico en Gálatas.
  - '''Diestras'' conserva el plural explícito de δεξιὰς; evitar la singular ayuda a reflejar la morfología griega.'
  - No se introdujo 'SEÑOR' ni otras sustituciones devocionales, porque este versículo no contiene el tetragrámaton ni una cita directa que lo requiera.
