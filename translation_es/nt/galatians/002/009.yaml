review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego en la estructura principal: reconocimiento de la gracia dada a Pablo, identificación de Jacobo/Cefas/Juan como columnas, gesto formal de acuerdo, y reparto de misión entre gentiles y circuncisión. Sin embargo, hay dos desajustes importantes con el rastro auditado: (1) la nota [a] está anclada en «me había sido dada», pero su contenido («la mano derecha de comunión») corresponde a δεξιὰς κοινωνίας, no a esa frase; (2) la nota [b] introduce «compartida misión», que no refleja bien el inglés auditado ni su alternativa documentada. Además, «Bernabé y a mí» invierte el orden del griego y del inglés POB, aunque no altera sustancialmente el sentido.'
  spanish_quality_summary: 'El español es generalmente claro y digno. «Al reconocer», «gracia», «Cefas», «columnas» y «gentiles» están bien. «Las diestras de comunión» es fiel pero algo menos natural que «las manos derechas de comunión»; aun así, es aceptable en registro bíblico. Hay un error ortográfico en la nota [c]: «Literamente» debe ser «Literalmente». También conviene reordenar «a mí y a Bernabé» para seguir el original y mejorar la precisión formal.'
  glossary_alignment: 'Buena alineación con la terminología del proyecto: Χάρις -> «gracia»; Κηφᾶς -> «Cefas»; ἔθνη -> «gentiles». La decisión de mantener «la circuncisión» en el texto principal es defendible por fidelidad al griego y está bien aclarada en nota. No hay conflicto con los glosarios mayores del proyecto.'
  issues:
  - severity: high
    issue: La nota [a] está colocada en la frase equivocada
    rationale: En el texto español, [a] aparece tras «me había sido dada», pero el contenido de la nota habla de «la mano derecha de comunión», que corresponde a δεξιὰς κοινωνίας. Esto rompe la trazabilidad entre texto y nota.
  - severity: medium
    issue: La nota [b] no preserva bien la alternativa auditada
    rationale: El inglés auditado preserva una alternativa ligada a «fellowship/partnership», no «compartida misión». Esa formulación española suena poco natural y demasiado interpretativa.
  - severity: low
    issue: Orden de los objetos indirectos/directos menos cercano al original
    rationale: El griego y el inglés POB dicen «a mí y a Bernabé» / «to Barnabas and me»; el borrador pone «a Bernabé y a mí». No es incorrecto en español, pero puede alinearse mejor con la fuente.
  - severity: low
    issue: Error ortográfico en nota [c]
    rationale: Debe decir «Literalmente», no «Literamente».
