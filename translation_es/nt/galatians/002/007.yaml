translation:
  language: es
  text: Pero, por el contrario[a], al ver que se me había encomendado el evangelio para los incircuncisos, así como a Pedro se le había encomendado para los circuncisos,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, 'el evangelio de la incircuncisión ... de la circuncisión', es decir, el evangelio encomendado para esos grupos.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Mas
  - Sin embargo
  lexicon: BDAG
  rationale: Introduce una oposición directa y natural en español. 'Pero' conserva el contraste fuerte del griego sin sobrecargar el registro.
- source_word: τοὐναντίον
  english_pob_choice: on the contrary
  chosen_spanish: por el contrario
  alternatives_spanish:
  - al contrario
  - todo lo contrario
  lexicon: BDAG
  rationale: Esta locución intensifica la adversativa anterior y reproduce bien el valor idiomático del griego en español claro y digno.
- source_word: ἰδόντες
  english_pob_choice: when they saw
  chosen_spanish: al ver
  alternatives_spanish:
  - cuando vieron
  - viendo
  lexicon: BDAG
  rationale: El participio aoristo expresa la circunstancia que acompaña a la cláusula principal; 'al ver' es la forma española más natural y compacta.
- source_word: πεπίστευμαι
  english_pob_choice: I had been entrusted
  chosen_spanish: se me había encomendado
  alternatives_spanish:
  - me había sido confiado
  - se me había confiado
  lexicon: BDAG
  rationale: El verbo griego aquí comunica comisión/encargo. 'Encomendar' conserva mejor en español la idea de una misión confiada que una simple recepción pasiva.
- source_word: τὸ εὐαγγέλιον
  english_pob_choice: the gospel
  chosen_spanish: el evangelio
  alternatives_spanish:
  - la buena noticia
  lexicon: BDAG
  rationale: Mantiene el término paulino establecido y su peso teológico en contexto.
- source_word: τῆς ἀκροβυστίας
  english_pob_choice: for the uncircumcised
  chosen_spanish: para los incircuncisos
  alternatives_spanish:
  - de la incircuncisión
  - para los no circuncidados
  lexicon: BDAG
  rationale: Se preserva el marcador covenantal/identitario del griego. 'Para' expresa la esfera o destinatarios de la comisión, como en el análisis POB en inglés.
- source_word: καθὼς
  english_pob_choice: just as
  chosen_spanish: así como
  alternatives_spanish:
  - igual que
  - tal como
  lexicon: BDAG
  rationale: Marca comparación y paralelismo entre la comisión de Pablo y la de Pedro con una formulación natural en español.
- source_word: Πέτρος
  english_pob_choice: Peter
  chosen_spanish: Pedro
  lexicon: BDAG
  rationale: Nombre propio estándar en español.
- source_word: τῆς περιτομῆς
  english_pob_choice: for the circumcised
  chosen_spanish: de los circuncisos
  alternatives_spanish:
  - para los circuncisos
  - de la circuncisión
  lexicon: BDAG
  rationale: Conserva el paralelismo con 'los incircuncisos' y el lenguaje marcado por la circuncisión del original. La elección 'de' sigue más de cerca el genitivo griego, aunque el sentido funcional incluye el grupo destinatario.
theological_decisions:
- issue: Cómo reflejar ἀκροβυστία / περιτομή sin sustituirlos por etnónimos interpretativos
  english_pob_reading: Rendered as 'the uncircumcised' and 'the circumcised' in the main text.
  chosen_spanish_reading: '''los incircuncisos'' y ''los circuncisos'''
  alternative_spanish_readings:
  - '''los gentiles'' y ''los judíos'''
  - '''la incircuncisión'' y ''la circuncisión'''
  rationale: El griego usa marcadores de estado de circuncisión con función identitaria y pactual. En español, los sustantivos personales ('los incircuncisos' / 'los circuncisos') preservan esa forma sin borrar la tensión lexical ni reemplazarla por una paráfrasis etnográfica.
  doctrine_reference: Hechos 15; Gálatas 2:7-9
- issue: Cómo expresar la comisión con πεπίστευμαι
  english_pob_reading: I had been entrusted
  chosen_spanish_reading: se me había encomendado
  alternative_spanish_readings:
  - me había sido confiado
  - se me había confiado
  rationale: El punto no es mera posesión del evangelio sino una comisión recibida. 'Encomendar' comunica mejor la idea de encargo apostólico y mantiene la pasiva divina/impersonal del texto.
  doctrine_reference: 1 Corintios 9:17; 1 Tesalonicenses 2:4
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios y el cruce de control reporta alta concordancia; por eso la propuesta española sigue de cerca la segmentación del audit trail inglés sin añadir interpretaciones nuevas.
  spanish_consistency_notes:
  - Se mantiene 'evangelio' como término técnico paulino.
  - '''Incircuncisos/circuncisos'' conserva el marcador de circuncisión del griego y evita reemplazos por ''gentiles/judíos''.'
  - '''Se me había encomendado'' traduce el perfecto pasivo de modo natural y con fuerza de comisión.'
  - 'La puntuación reproduce la oposición fuerte: ''Pero, por el contrario, ...''.'
