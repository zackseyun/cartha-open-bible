translation:
  language: es
  text: Pero a causa de los falsos hermanos[a] introducidos clandestinamente[b], que se infiltraron para espiar[c] nuestra libertad que tenemos en Mesías Jesús[d], para esclavizarnos—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Falsos hermanos» conserva el término familiar de Pablo; la expresión se refiere a personas que se presentaban como compañeros creyentes.
    reason: cultural_note
  - marker: b
    text: O «introducidos secretamente».
    reason: alternative_reading
  - marker: c
    text: O «para acechar». «Espiar» conserva mejor el sentido hostil y exploratorio del verbo.
    reason: lexical_alternative
  - marker: d
    text: O «en Cristo Jesús». El POB inglés traduce Χριστός como «Mesías» aquí para conservar el valor titular.
    reason: alternative_reading
lexical_decisions:
- source_word: παρεισάκτους
  english_pob_choice: secretly brought in
  chosen_spanish: introducidos clandestinamente
  alternatives_spanish:
  - introducidos secretamente
  - metidos a escondidas
  lexicon: BDAG
  rationale: La idea central es la introducción oculta de personas ajenas al grupo. «Introducidos clandestinamente» conserva ese valor de manera natural en español y distingue este adjetivo del verbo siguiente, sin duplicar exactamente el mismo matiz verbal.
- source_word: ψευδαδέλφους
  english_pob_choice: false brothers
  chosen_spanish: falsos hermanos
  alternatives_spanish:
  - falsos creyentes
  - falsos hermanos de fe
  lexicon: BDAG
  rationale: Se preserva el lenguaje familiar y polémico de Pablo. «Hermanos» refleja la forma masculina del término y evita debilitar la fuerza del contraste con una paráfrasis más neutral.
- source_word: παρεισῆλθον
  english_pob_choice: slipped in
  chosen_spanish: se infiltraron
  alternatives_spanish:
  - se deslizaron adentro
  - entraron a escondidas
  lexicon: BDAG
  rationale: El verbo transmite entrada encubierta con intención hostil. «Se infiltraron» suena natural en español y comunica bien la idea de penetración sigilosa sin volverlo demasiado coloquial.
- source_word: κατασκοπῆσαι
  english_pob_choice: to spy out
  chosen_spanish: para espiar
  alternatives_spanish:
  - para vigilar
  - para observar secretamente
  lexicon: BDAG
  rationale: El infinitivo expresa el propósito de una exploración hostil y encubierta. «Espiar» conserva esa carga semántica con claridad; se añade «para» para marcar el propósito en español.
- source_word: ἐλευθερίαν
  english_pob_choice: freedom
  chosen_spanish: libertad
  alternatives_spanish:
  - libertad personal
  - libre condición
  lexicon: BDAG
  rationale: «Libertad» es el equivalente natural y directo en español. Mantiene el peso social y teológico del término paulino sin forzar una glosa explicativa.
- source_word: ἐν Χριστῷ Ἰησοῦ
  english_pob_choice: in Messiah Jesus
  chosen_spanish: en Mesías Jesús
  alternatives_spanish:
  - en Cristo Jesús
  - en el Mesías Jesús
  lexicon: BDAG
  rationale: Se sigue el criterio del proyecto de traducir Χριστός como «Mesías» cuando conserva sentido titular. En español, la forma sin artículo mantiene el carácter identificador del nombre-título y evita una lectura excesivamente litúrgica.
- source_word: καταδουλώσουσιν
  english_pob_choice: enslave
  chosen_spanish: esclavizarnos
  alternatives_spanish:
  - someternos
  - reducirnos a esclavitud
  lexicon: BDAG
  rationale: El verbo expresa la reducción a esclavitud; «esclavizarnos» conserva esa fuerza léxica. Se prefiere esta forma por su contundencia y por coherencia con el tratamiento del lenguaje de esclavitud cuando es central.
theological_decisions:
- issue: Cómo traducir Χριστῷ Ἰησοῦ
  english_pob_reading: in Messiah Jesus
  chosen_spanish_reading: en Mesías Jesús
  alternative_spanish_readings:
  - en Cristo Jesús
  rationale: Se mantiene la decisión del POB inglés de traducir Χριστός como título («Mesías») y no como mero nombre fijo. En este contexto, Pablo presenta a Jesús como el Mesías de manera significativa, no solo como una fórmula eclesial establecida.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
- issue: Naturaleza del acto final expresado por καταδουλόω
  english_pob_reading: so that they might enslave us
  chosen_spanish_reading: para esclavizarnos
  alternative_spanish_readings:
  - para reducirnos a esclavitud
  - para someternos
  rationale: Se conserva la dureza del término griego, que habla de llevar a otros a condición servil. «Esclavizarnos» es lo suficientemente fuerte para no diluir la imagen y permanece fiel a la intención hostil del pasaje.
  doctrine_reference: Lexical force of καταδουλόω in BDAG and project slavery-language policy
translation_notes:
  revision_awareness: El borrador sigue el estado de revisión más reciente indicado como sin cambios; se alineó con la decisión inglesa de distinguir παρεισάκτους («introducidos clandestinamente») de παρεισῆλθον («se infiltraron»), y de mantener Χριστός como «Mesías» por coherencia terminológica. También se conservó la fuerza de καταδουλόω sin suavizarla a una equivalencia más débil.
  spanish_consistency_notes:
  - Se mantiene «Mesías» para Χριστός conforme al criterio del proyecto, evitando «Cristo» salvo que el contexto lo exigiera.
  - Se preserva el lenguaje de esclavitud con «esclavizarnos», no con «someternos», para no rebajar la fuerza semántica.
  - El orden de la cláusula sigue el griego y la puntuación española para que la relación causal/purpose quede clara en una sola oración.
  - Se usa «falsos hermanos» para conservar la imagen familiar polémica de Pablo y la correspondencia con el POB inglés.
