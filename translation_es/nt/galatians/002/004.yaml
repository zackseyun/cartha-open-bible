  source_alignment_summary: 'El borrador refleja bien la sintaxis y el sentido global del griego: la causa introducida por διὰ, el carácter encubierto de παρεισάκτους/παρεισῆλθον, el propósito hostil de κατασκοπῆσαι, la libertad poseída ἐν Χριστῷ Ἰησοῦ y la finalidad de καταδουλώσουσιν. Sin embargo, omite en español el matiz posesivo explícito de ἡμῶν en «nuestra libertad» al separar luego con una aposición algo pesada («la que tenemos...»), y la nota sobre «falsos hermanos» está ausente aunque el inglés la preserva por razones exegéticas importantes.'
