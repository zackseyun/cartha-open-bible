translation:
  language: es
  text: No anulo la gracia de Dios, porque si la justicia[a] fuera por la ley, entonces el Mesías[b] murió en vano[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «rectitud».
    reason: lexical_alternative
  - marker: b
    text: Griego Χριστός; aquí se traduce «el Mesías» porque funciona como título.
    reason: lexical_alternative
  - marker: c
    text: O «por nada».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀθετῶ
  english_pob_choice: nullify
  chosen_spanish: anulo
  alternatives_spanish:
  - dejo sin efecto
  - rechazo
  - invalidó
  lexicon: BDAG
  rationale: «Anular» comunica bien la acción de dejar sin efecto o volver inoperante algo; en español mantiene la fuerza paulina de no hacer inválida la gracia de Dios.
- source_word: χάριν
  english_pob_choice: grace
  chosen_spanish: gracia
  alternatives_spanish:
  - favor
  lexicon: BDAG
  rationale: «Gracia» es el equivalente teológico normal y conserva el sentido paulino sin desplazarlo hacia un matiz meramente cortesano o abstracto de «favor».
- source_word: διὰ νόμου
  english_pob_choice: comes through the law
  chosen_spanish: por la ley
  alternatives_spanish:
  - a través de la ley
  - mediante la ley
  - por medio de la ley
  lexicon: BDAG
  rationale: La construcción griega expresa medio o agencia; en español, «por la ley» reproduce con naturalidad esa relación y evita añadir un verbo no presente en el griego.
- source_word: δικαιοσύνη
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justificación
  lexicon: BDAG
  rationale: La guía doctrinal del proyecto permite «justicia» como alternativa válida; aquí conserva la tensión entre la categoría paulina y su posible matiz de rectitud/corrección del pacto. Se evita resolverla con «justificación», que desplazaría el sustantivo del texto.
- source_word: Χριστός
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Se mantiene «Mesías» porque el texto fuente usa Χριστός como título, no simplemente como nombre fijo, y eso sigue el criterio del POB para este caso.
- source_word: δωρεὰν
  english_pob_choice: for nothing
  chosen_spanish: en vano
  alternatives_spanish:
  - sin motivo
  - sin causa
  - para nada
  lexicon: BDAG
  rationale: «En vano» reproduce bien la idea de inutilidad o falta de propósito del argumento, y en español resulta bíblico y claro.
theological_decisions:
- issue: Sentido de δικαιοσύνη en el argumento de Gálatas
  english_pob_reading: If righteousness were obtainable through the law, the Messiah's death would be pointless.
  chosen_spanish_reading: Si la justicia fuera por la ley, la muerte del Mesías habría sido en vano.
  alternative_spanish_readings:
  - Si la justicia fuera por la ley, entonces el Mesías murió por nada.
  - Si la rectitud fuera por la ley, entonces el Mesías murió inútilmente.
  rationale: Se conserva la inferencia paulina sin expandirla. «Justicia» mantiene el valor doctrinal amplio que el POB audita como alternativa de traducción; no se resuelve la tensión entre justicia forense, rectitud del pacto y justificación.
  doctrine_reference: Mantener la tensión teológica; no colapsar δικαιοσύνη en un solo tecnicismo doctrinal.
- issue: Valor de δωρεάν al final de la cláusula
  english_pob_reading: then Messiah died for nothing.
  chosen_spanish_reading: entonces el Mesías murió en vano.
  alternative_spanish_readings:
  - entonces el Mesías murió por nada.
  - entonces el Mesías murió inútilmente.
  rationale: La idea principal es la inutilidad de la muerte del Mesías bajo el supuesto condicional de la frase. «En vano» es idiomático y preserva el peso retórico de Paul sin agregar explicación.
  doctrine_reference: Preservar el argumento condicional de Pablo sin suavizarlo.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el historial de revisiones del POB: la traducción inglesa estabilizada volvió a «Messiah» tras una revisión que había cambiado indebidamente Χριστός a «Christ». En español se siguió la decisión auditada de traducir el título como «el Mesías». También se respetó la alternativa léxica documentada para δικαιοσύνη, preservando la tensión entre «justicia» y posibles matices de rectitud/justificación.'
  spanish_consistency_notes:
  - Se usa «Mesías» para Χριστός conforme al criterio documentado del POB en este pasaje.
  - Se usa «gracia» para χάρις y «en vano» para δωρεάν, manteniendo el registro paulino.
  - No se introduce «SEÑOR» ni otro sustituto para el nombre divino, ya que el versículo no contiene יהוה ni κύριος.
  - La puntuación sigue el español bíblico moderno, con cláusulas bien separadas para reflejar la lógica condicional del griego.
