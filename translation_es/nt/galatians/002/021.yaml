  to: No anulo la gracia de Dios, porque si la justicia[a] fuera por la ley, entonces el Mesías[b] murió en vano[c].
  rationale: Se conserva el texto base casi intacto, pero se corrigen las notas para ajustarlas estrictamente a la evidencia fuente y al rastro de auditoría inglés. Se elimina la nota innecesaria sobre «gracia/favor», se quita «justificación» como alternativa impropia para δικαιοσύνη en este registro, y se simplifica la puntuación para una lectura española más fluida sin alterar el sentido.
