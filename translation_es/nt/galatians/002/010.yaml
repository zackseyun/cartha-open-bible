translation:
  language: es
  text: Solo nos pidieron que nos acordáramos de los pobres, y eso mismo me esforcé en hacer.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: μόνον
  english_pob_choice: only
  chosen_spanish: solo que
  alternatives_spanish:
  - únicamente que
  - solamente que
  lexicon: BDAG
  rationale: μóνον marca la única condición o petición ligada al acuerdo; en español, 'solo que' transmite bien esa restricción sin endurecer innecesariamente la sintaxis.
- source_word: τῶν πτωχῶν
  english_pob_choice: the poor
  chosen_spanish: los pobres
  alternatives_spanish:
  - los necesitados
  lexicon: BDAG
  rationale: πτωχός se refiere de forma directa a personas pobres; 'los pobres' conserva el sentido simple y establecido del término.
- source_word: ἵνα μνημονεύωμεν
  english_pob_choice: that we should remember
  chosen_spanish: que nos acordáramos
  alternatives_spanish:
  - que recordáramos
  - que tuviéramos presente
  lexicon: BDAG
  rationale: μνημονεύω aquí pide mantener en la mente con una orientación práctica; 'acordarse de' suena natural en español y comunica preocupación continua por ellos.
- source_word: ὃ
  english_pob_choice: which
  chosen_spanish: lo cual
  alternatives_spanish:
  - lo que
  - lo cual
  lexicon: BDAG
  rationale: El relativo retoma la petición anterior como un todo; 'lo cual' permite enlazar con naturalidad la cláusula siguiente.
- source_word: ἐσπούδασα
  english_pob_choice: was eager
  chosen_spanish: estaba ansioso
  alternatives_spanish:
  - me esforcé por
  - me apresuré a
  - tenía empeño en
  lexicon: BDAG
  rationale: σπουδάζω expresa diligencia e intención pronta; 'estaba ansioso por' conserva la disposición activa y el énfasis de prontitud que refleja la lectura inglesa.
- source_word: αὐτὸ τοῦτο ποιῆσαι
  english_pob_choice: exactly what I was eager to do
  chosen_spanish: exactamente lo que yo estaba ansioso por hacer
  alternatives_spanish:
  - justo eso mismo era lo que quería hacer
  - eso mismo era precisamente lo que me apresuraba a hacer
  lexicon: BDAG
  rationale: La doble demostrativa intensifica la idea de 'esta misma cosa'; 'exactamente lo que' comunica en español esa fuerza enfática de manera natural y fiel.
