translation:
  language: es
  text: Y también los demás judíos se unieron a él en la hipocresía[a], de modo que incluso Bernabé fue arrastrado por la hipocresía de ellos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los otros judíos».
    reason: lexical_alternative
  - marker: b
    text: O «fue llevado por la corriente de la hipocresía de ellos».
    reason: lexical_alternative
lexical_decisions:
- source_word: συνυπεκρίθησαν
  english_pob_choice: joined him in hypocrisy
  chosen_spanish: se hicieron cómplices con él en hipocresía
  alternatives_spanish:
  - actuaron hipócritamente con él
  - se unieron a él en hipocresía
  lexicon: BDAG
  rationale: El verbo compuesto expresa participación conjunta en una conducta hipócrita. «Se hicieron cómplices» comunica la dimensión corporativa y activa sin diluir la culpa moral; «con él» conserva la asociación marcada por el dativo.
- source_word: αὐτῷ
  english_pob_choice: him
  chosen_spanish: con él
  alternatives_spanish:
  - a él
  - junto con él
  lexicon: BDAG
  rationale: El dativo señala asociación con la conducta de Pedro. En español, «con él» expresa de forma natural esa vinculación relacional.
- source_word: οἱ λοιποὶ Ἰουδαῖοι
  english_pob_choice: the rest of the Jews
  chosen_spanish: los demás judíos
  alternatives_spanish:
  - el resto de los judíos
  - los otros judíos
  lexicon: BDAG
  rationale: «Los demás» conserva la idea de grupo remanente dentro de los ya mencionados y suena natural en español contemporáneo.
- source_word: Ἰουδαῖοι
  english_pob_choice: Jews
  chosen_spanish: judíos
  alternatives_spanish:
  - judeanos
  lexicon: BDAG
  rationale: En este contexto paulino se refiere al pueblo judío como grupo étnico-religioso; «judíos» es la opción más clara y fiel.
- source_word: συναπήχθη
  english_pob_choice: was carried away
  chosen_spanish: fue arrastrado
  alternatives_spanish:
  - fue llevado
  - fue llevado por la corriente
  lexicon: BDAG
  rationale: El pasivo sugiere quedar movido por la influencia ajena. «Fue arrastrado» preserva esa fuerza de presión social y el matiz moral del verbo.
- source_word: ὑποκρίσει
  english_pob_choice: hypocrisy
  chosen_spanish: hipocresía
  alternatives_spanish:
  - pretexto
  - insinceridad
  lexicon: BDAG
  rationale: El sustantivo nombra la conducta fingida denunciada por Pablo. «Hipocresía» es el equivalente más transparente y concordante con el énfasis repetido en el versículo.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el griego SBLGNT y conserva el paralelismo del original: participación conjunta en hipocresía, seguida del efecto de arrastre sobre Bernabé. Se respetó la repetición de «hipocresía» en ambos miembros de la oración, como en el griego y en la POB inglesa.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque no aparece aquí un término divino equivalente.
  - Se mantiene «judíos» como término étnico-religioso según el contexto paulino.
  - «Hipocresía» se repite para reflejar la reiteración léxica del original y del audit trail inglés.
