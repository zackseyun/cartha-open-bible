base_translation:
  language: en
  yaml_path: translation/nt/galatians/002/014.yaml
  text: But when I saw that they were not walking in step with the truth of the gospel[a], I said to Cephas before them all, “If you, though a Jew, live like a Gentile and not like a Jew[b], how do you compel the Gentiles to live like Jews?”
