review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del griego: reproche público a Cefas, contraste entre vivir como gentil y no como judío, y la coerción hacia los gentiles. Sin embargo, en Ἰουδαΐζειν el texto principal se aparta del sentido elegido y documentado por la auditoría inglesa (''vivir como judíos'') y además la nota b repite la misma lectura del texto en vez de preservar la alternativa tradicional.'
  spanish_quality_summary: El español es claro y digno en general. 'Le dije a Cefas delante de todos' y el contraste 'como gentil ... como judío' funcionan bien. No obstante, 'caminaban en línea con' suena algo calcado; 'andaban en línea con' o 'no iban de acuerdo con' serían opciones más idiomáticas, pero no es un error grave. El problema principal es léxico y de notas, no de fluidez general.
  glossary_alignment: '''Cefas'' respeta la decisión de transliterar Κηφᾶς. No hay conflictos con terminología de proyecto como Yahvé/Mesías. La desviación relevante está en Ἰουδαΐζειν: según el audit trail, la forma principal debe evitar el tecnicismo potencialmente anacrónico ''judaizar'' y reservarlo como alternativa tradicional en nota.'
  issues:
  - severity: high
    issue: La traducción principal de Ἰουδαΐζειν como 'judaizar' no sigue la decisión auditada 'vivir como judíos'.
    rationale: La auditoría inglesa documenta explícitamente que la lectura principal debe ser descriptiva y moderna para evitar connotaciones doctrinales posteriores. El español puede expresar esto con naturalidad como 'vivir como judíos'.
  - severity: high
    issue: La nota b es incorrecta porque repite exactamente el texto principal en vez de ofrecer la alternativa tradicional.
    rationale: Si el texto principal dice 'judaizar', la nota no añade información. Dado el audit trail, la nota debe preservar 'judaizar' solo como lectura tradicional cuando el texto principal use 'vivir como judíos'.
  - severity: medium
    issue: La formulación 'caminaban en línea con la verdad del evangelio' es comprensible pero algo calcada en español.
    rationale: Aunque preserva la metáfora de alineación, 'andaban en línea con' suena un poco más natural que 'caminaban en línea con'. No requiere adjudicación especial y puede mejorarse en una revisión ligera.
  revised_spanish_text: 'Pero cuando vi que no andaban[a] en línea con la verdad del evangelio, le dije a Cefas delante de todos: «Si tú, aunque eres judío, vives como gentil y no como judío, ¿cómo obligas a los gentiles a vivir como judíos[b]?».'
  revised_footnotes:
