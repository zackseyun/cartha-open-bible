translation:
  language: es
  text: 'Pero cuando vi que no andaban[a] en línea con la verdad del evangelio, le dije a Cefas delante de todos: «Si tú, aunque eres judío, vives como gentil y no como judío, ¿cómo obligas a los gentiles a vivir como judíos[b]?».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «no andaban rectamente» con la verdad del evangelio.
    reason: lexical_alternative
  - marker: b
    text: 'Traducción tradicional: «¿Cómo obligas a los gentiles a judaizar?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὀρθοποδοῦσιν
  english_pob_choice: were not walking in step
  chosen_spanish: no caminaban en línea
  alternatives_spanish:
  - no caminaban rectamente
  - no iban al paso
  - no andaban en línea
  lexicon: BDAG
  rationale: El verbo sugiere caminar rectamente o alineadamente; en español, «caminar en línea» conserva la idea de conformidad de conducta sin sonar forzado. Mantiene el vínculo metafórico con la verdad del evangelio.
- source_word: πρὸς τὴν ἀλήθειαν τοῦ εὐαγγελίου
  english_pob_choice: with the truth of the gospel
  chosen_spanish: en línea con la verdad del evangelio
  alternatives_spanish:
  - con la verdad del evangelio
  - de acuerdo con la verdad del evangelio
  - frente a la verdad del evangelio
  lexicon: BDAG
  rationale: πρός aquí expresa conformidad o alineación, no solo dirección. «En línea con» reproduce esa relación de ajuste a la verdad del evangelio y mantiene el matiz de la imagen verbal anterior.
- source_word: Κηφᾶς
  english_pob_choice: Cephas
  chosen_spanish: Cefas
  alternatives_spanish:
  - Pedro
  lexicon: BDAG
  rationale: Se conserva la forma del nombre que aparece en el griego, transliterada al español como «Cefas», en lugar de sustituirla por «Pedro».
- source_word: ἐθνικῶς
  english_pob_choice: like a Gentile
  chosen_spanish: como gentil
  alternatives_spanish:
  - de manera gentil
  - a la manera de un gentil
  - como un gentil
  lexicon: BDAG
  rationale: El adverbio describe modo de vida y se corresponde naturalmente con «como gentil» en español, preservando el contraste étnico-social del texto.
- source_word: Ἰουδαϊκῶς
  english_pob_choice: like a Jew
  chosen_spanish: como judío
  alternatives_spanish:
  - a la manera judía
  - como un judío
  lexicon: BDAG
  rationale: Se mantiene el paralelismo con ἐθνικῶς mediante «como judío», una formulación clara y directa en español.
- source_word: ἀναγκάζεις
  english_pob_choice: compel
  chosen_spanish: obligas
  alternatives_spanish:
  - fuerzas
  - compeles
  - presionas
  lexicon: BDAG
  rationale: «Obligas» expresa con naturalidad la fuerza coercitiva del verbo en español y funciona bien en el contexto de presión para adoptar una conducta.
- source_word: Ἰουδαΐζειν
  english_pob_choice: to live like Jews
  chosen_spanish: judaizar
  alternatives_spanish:
  - vivir como judíos
  - adoptar costumbres judías
  lexicon: BDAG
  rationale: Se conserva el verbo tradicional «judaizar» porque el griego usa un infinitivo verbal con fuerza lexical específica; además, el audit trail inglés preserva esa alternativa tradicional en nota. En español, el término es comprensible y mantiene la tensión lexical sin diluirla.
theological_decisions:
- issue: Cómo traducir Ἰουδαΐζειν sin resolver la tensión entre descripción social y término histórico-teológico
  english_pob_reading: 'to live like Jews / traditional rendering: Judaize'
  chosen_spanish_reading: judaizar
  alternative_spanish_readings:
  - vivir como judíos
  - adoptar costumbres judías
  rationale: El contexto inmediato trata de conducta, mesa compartida y presión identitaria. Aun así, el verbo griego es más específico que una simple paráfrasis. Por eso se conserva «judaizar», con nota para la lectura más descriptiva, manteniendo la tensión léxica sin cargar el texto con una explicación ajena.
  doctrine_reference: Evitar anacronismos polémicos; conservar el problema social-teológico del pasaje tal como aparece en el griego y en la auditoría inglesa.
- issue: Relación entre la conducta de Cefas y la verdad del evangelio
  english_pob_reading: not walking in step with the truth of the gospel
  chosen_spanish_reading: no caminaban en línea con la verdad del evangelio
  alternative_spanish_readings:
  - no andaban rectamente según la verdad del evangelio
  - no seguían el ritmo de la verdad del evangelio
  rationale: La traducción conserva la imagen de caminar y la idea de desalineación respecto de la verdad del evangelio. No se atenúa el juicio de Pablo ni se transforma en una mera discrepancia de opinión.
  doctrine_reference: Preservar la tensión ética del texto paulino sin suavizarla ni doctrinalizarla.
translation_notes:
  revision_awareness: La redacción sigue el pasaje griego SBLGNT y el audio-trail inglés POB con acuerdo alto. Se conserva la elección revisada de πῶς como «cómo» en sentido directo de manera/incongruencia, no de capacidad. Se retiene la tensión de Ἰουδαΐζειν con nota sobre la alternativa descriptiva «vivir como judíos».
  spanish_consistency_notes:
  - Se mantiene la transliteración de Κηφᾶς como «Cefas», coherente con el uso del nombre en el griego.
  - «Evangelio» se usa de forma estable para εὐαγγέλιον.
  - Se conserva el paralelismo entre «como gentil» y «como judío» para reflejar el contraste del original.
  - El tono es formal y publicable, sin usar un calco rígido donde el español requiere una formulación más natural.
