translation:
  language: es
  text: 'El Mesías nos redimió de la maldición de la ley, al hacerse maldición por nosotros[a][b], porque está escrito[c]: «Maldito todo el que cuelga de un árbol[d]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Cristo nos redimió».
    reason: lexical_alternative
  - marker: b
    text: O «en favor de nosotros»; posiblemente «en nuestro lugar».
    reason: lexical_alternative
  - marker: c
    text: O «pues está escrito».
    reason: alternative_reading
  - marker: d
    text: ξύλον significa literalmente «madera» o «árbol»; «árbol» conserva la redacción de la cita bíblica.
    reason: lexical_alternative
lexical_decisions:
- source_word: Χριστός
  english_pob_choice: The Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Se mantiene el valor titular de Χριστός como “Mesías”, siguiendo el criterio del proyecto para el griego cuando el sentido de título está activo. “Cristo” se reserva aquí solo como alternativa histórica, pero no como forma principal.
- source_word: ἐξηγόρασεν
  english_pob_choice: redeemed
  chosen_spanish: redimió
  alternatives_spanish:
  - compró para liberar
  - rescató
  lexicon: BDAG
  rationale: “Redimió” conserva la fuerza de liberación mediante costo de compra y es idiomático en español sin perder el trasfondo comercial-salvífico del verbo.
- source_word: τῆς κατάρας τοῦ νόμου
  english_pob_choice: the curse of the law
  chosen_spanish: la maldición de la ley
  alternatives_spanish:
  - la maldición causada por la ley
  - la maldición asociada a la ley
  lexicon: BDAG
  rationale: “Maldición” refleja bien κατάρα y preserva el peso jurídico y pactal de la expresión. “De la ley” mantiene la relación genitiva sin añadir interpretación excesiva.
- source_word: γενόμενος
  english_pob_choice: by becoming
  chosen_spanish: al hacerse
  alternatives_spanish:
  - habiendo llegado a ser
  - cuando se hizo
  lexicon: BDAG
  rationale: “Al hacerse” expresa en español el valor participial de medio/forma de cumplimiento que el inglés POB rinde con “by becoming”, sin volver la frase rígida.
- source_word: ὑπὲρ ἡμῶν
  english_pob_choice: for us
  chosen_spanish: por nosotros
  alternatives_spanish:
  - en favor de nosotros
  - en nuestro lugar
  lexicon: BDAG
  rationale: 'Se usa “por nosotros” porque en español conserva la amplitud de ὑπέρ: beneficencia y representación. No se fija de antemano solo el matiz sustitutivo, que permanece como posibilidad contextual.'
- source_word: κατάρα
  english_pob_choice: a curse
  chosen_spanish: maldición
  alternatives_spanish:
  - una maldición
  - maldito
  lexicon: BDAG
  rationale: 'Aquí el predicado funciona mejor en español como sustantivo “maldición”, de modo que la frase quede natural: “al hacerse maldición por nosotros”. Esto conserva la dureza del original sin suavizarla a un mero adjetivo.'
- source_word: ὅτι γέγραπται
  english_pob_choice: because it is written
  chosen_spanish: porque está escrito
  alternatives_spanish:
  - pues está escrito
  - porque se ha escrito
  lexicon: BDAG
  rationale: Se sigue la lectura causal reflejada en el inglés POB. “Porque está escrito” es la fórmula más clara y natural en español para introducir la cita bíblica.
- source_word: Ἐπικατάρατος
  english_pob_choice: Cursed
  chosen_spanish: Maldito
  alternatives_spanish:
  - Maldito
  - Accursed
  lexicon: BDAG
  rationale: “Maldito” es el equivalente bíblico-natural en español y reproduce el tono declarativo de la cita veterotestamentaria.
- source_word: κρεμάμενος
  english_pob_choice: hangs
  chosen_spanish: es colgado
  alternatives_spanish:
  - está colgado
  - pende
  lexicon: BDAG
  rationale: “Es colgado” comunica la pasiva implícita del participio dentro de la cita, y suena natural en español bíblico contemporáneo.
- source_word: ξύλου
  english_pob_choice: tree
  chosen_spanish: árbol
  alternatives_spanish:
  - madero
  - madera
  lexicon: BDAG
  rationale: Se elige “árbol” para conservar la correspondencia intertextual con la cita de la Escritura y el valor literal de ξύλον, tal como el inglés POB preserva “tree”.
theological_decisions:
- issue: Alcance de ὑπὲρ ἡμῶν y la relación con la expiación/sustitución
  english_pob_reading: for us
  chosen_spanish_reading: por nosotros
  alternative_spanish_readings:
  - en favor de nosotros
  - en nuestro lugar
  rationale: “Por nosotros” mantiene la amplitud semántica de ὑπέρ sin resolver de manera explícita si el énfasis principal es benefactivo o sustitutivo. Así se preserva la tensión teológica documentada en el auditorio inglés.
  doctrine_reference: Preservar la tensión teológica, no cerrarla en la traducción principal.
- issue: Cómo expresar la maldición en la frase predicativa final
  english_pob_reading: by becoming a curse for us
  chosen_spanish_reading: al hacerse maldición por nosotros
  alternative_spanish_readings:
  - al hacerse una maldición por nosotros
  - al hacerse maldito por nosotros
  rationale: La forma predicativa con sustantivo mantiene el paralelismo del griego y evita diluir la afirmación cristológica. Se conserva la contundencia del texto sin introducir una explicación doctrinal ajena al versículo.
  doctrine_reference: Mantener la afirmación textual de identificación con la maldición sin sobre-explicarla.
translation_notes:
  revision_awareness: El pasaje muestra alta concordancia con el texto fuente y con el registro auditado en inglés; no se detectaron cambios sustanciales en la última revisión, por lo que la redacción española sigue de cerca la decisión óptima-equivalente ya establecida.
  spanish_consistency_notes:
  - Se mantiene «Mesías» para Χριστός de acuerdo con el estándar del proyecto.
  - Se conserva «redimió» para ἐξηγόρασεν por su equilibrio entre liberación y costo.
  - Se traduce ὑπέρ con «por» para no fijar de antemano solo el matiz sustitutivo.
  - Se usa «árbol» en la cita para reflejar la intertextualidad con Deuteronomio y la decisión auditada en inglés.
