    text: ξύλον significa literalmente «madera» o «árbol»; «árbol» conserva la redacción de la cita bíblica.
    reason: lexical_alternative
  revision_rationale: 'Se corrige la nota sobre ὑπὲρ ἡμῶν para alinearla con la decisión lexical y teológica auditada del POB inglés: el texto principal conserva «por nosotros», la alternativa principal expresa beneficio/representación, y la lectura sustitutiva queda como posibilidad. También se mejora la naturalidad y fidelidad estilística de la cita con «cuelga» en lugar de «es colgado».'
