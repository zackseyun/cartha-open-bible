  to: 'El Mesías nos redimió de la maldición de la ley, al hacerse maldición por nosotros[a][b], porque está escrito[c]: «Maldito todo el que cuelga de un árbol[d]».'
  rationale: 'Se corrige la nota sobre ὑπὲρ ἡμῶν para alinearla con la decisión lexical y teológica auditada del POB inglés: el texto principal conserva «por nosotros», la alternativa principal expresa beneficio/representación, y la lectura sustitutiva queda como posibilidad. También se mejora la naturalidad y fidelidad estilística de la cita con «cuelga» en lugar de «es colgado».'
