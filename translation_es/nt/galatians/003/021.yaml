translation:
  language: es
  text: ¿Entonces la ley está contra las promesas de Dios? ¡De ninguna manera! Porque si se hubiera dado una ley capaz de dar vida, entonces realmente la rectitud[a] habría venido de la ley.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «justicia».
    reason: lexical_alternative
lexical_decisions:
- source_word: νόμος
  english_pob_choice: law
  chosen_spanish: ley
  alternatives_spanish:
  - la Ley
  lexicon: BDAG
  rationale: En este versículo Pablo habla hipotéticamente de la ley como categoría, aunque el trasfondo mosaico sigue presente. «Ley» en español conserva esa amplitud mejor que una mayúscula teológica fija.
- source_word: κατὰ
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - en contra de
  - opuesta a
  lexicon: BDAG
  rationale: Con genitivo, κατά expresa oposición. «Contra» es la equivalencia más natural y directa en la pregunta retórica.
- source_word: ἐπαγγελιῶν
  english_pob_choice: promises
  chosen_spanish: promesas
  alternatives_spanish:
  - promesa
  lexicon: BDAG
  rationale: El plural está explícito en griego y conviene preservarlo en español. Remite a las promesas divinas ya desarrolladas en el contexto.
- source_word: μὴ γένοιτο
  english_pob_choice: May it never be!
  chosen_spanish: ¡De ninguna manera!
  alternatives_spanish:
  - ¡Jamás!
  - ¡Que nunca suceda!
  lexicon: BDAG
  rationale: Es la fórmula paulina de rechazo enfático. «¡De ninguna manera!» transmite bien la fuerza idiomática en español moderno y solemne.
- source_word: ἐδόθη
  english_pob_choice: had been given
  chosen_spanish: se hubiera dado
  alternatives_spanish:
  - fue dada
  - habría sido dada
  lexicon: BDAG
  rationale: El aoristo pasivo en la condición se vierte de manera natural con pluscuamperfecto de subjuntivo en español, manteniendo la estructura hipotética.
- source_word: δυνάμενος
  english_pob_choice: was able to
  chosen_spanish: capaz de
  alternatives_spanish:
  - que pudiera
  - con poder para
  lexicon: BDAG
  rationale: El participio expresa capacidad atribuida a la ley. «Capaz de» es idiomático y conserva la idea de posibilidad efectiva.
- source_word: ζῳοποιῆσαι
  english_pob_choice: give life
  chosen_spanish: dar vida
  alternatives_spanish:
  - hacer vivir
  - vivificar
  lexicon: BDAG
  rationale: «Dar vida» es la equivalencia más natural y transparente en español, preservando el sentido de dar vida o vivificar sin tecnicismos innecesarios.
- source_word: ὄντως
  english_pob_choice: really
  chosen_spanish: realmente
  alternatives_spanish:
  - de verdad
  - verdaderamente
  lexicon: BDAG
  rationale: El adverbio refuerza la conclusión. «Realmente» comunica ese énfasis de forma clara y actual.
- source_word: ἐκ νόμου
  english_pob_choice: from the law
  chosen_spanish: de la ley
  alternatives_spanish:
  - a partir de la ley
  - por la ley
  lexicon: BDAG
  rationale: «De la ley» preserva de forma transparente la relación de origen/fuente de ἐκ y suena natural en español.
- source_word: δικαιοσύνη
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  lexicon: BDAG
  rationale: En la tradición de este proyecto, δικαιοσύνη en pasajes paulinos admite «justicia» como opción principal cuando el contexto toca la relación correcta ante Dios. Se mantiene la alternativa «rectitud» como posible matiz, sin borrar la tensión semántica.
theological_decisions:
- issue: Sentido de δικαιοσύνη en el argumento paulino
  english_pob_reading: righteousness; justice in footnote
  chosen_spanish_reading: justicia; «rectitud» en nota como alternativa semántica
  alternative_spanish_readings:
  - rectitud
  - justicia
  rationale: El griego δικαιοσύνη puede abarcar justicia/rectitud. Dado que el argumento contrasta ley y promesa en relación con la condición correcta ante Dios, «justicia» funciona bien en español y deja abierta la dimensión forense y relacional; se conserva una nota para la alternativa más literal/estrecha «rectitud».
  doctrine_reference: 'DOCTRINE.md Contested terms table: δικαιοσύνη → righteousness; justice preserved in footnotes for Pauline passages'
translation_notes:
  revision_awareness: 'Coincide con el pase de revisión más reciente: no se requieren cambios respecto del audit trail inglés; se mantuvo la equivalencia óptima y la decisión sobre δικαιοσύνη con nota alternativa.'
  spanish_consistency_notes:
  - Se mantuvo «ley» en minúscula para el uso categorial e hipotético de νόμος.
  - Se preservó la pregunta retórica y la exclamación paulina con un registro natural en español.
  - «Dar vida» y «de la ley» siguen de cerca las relaciones griegas sin calco torpe.
  - La nota sobre δικαιοσύνη usa el marcador [a] exactamente donde aparece el término traducido.
