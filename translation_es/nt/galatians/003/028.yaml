    changes_summary: 'Changed ''Messiah Jesus'' to ''Christ Jesus'' to reflect the Greek Χριστῷ Ἰησοῦ in standard formal English usage and maintain natural register; no other changes needed. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: No hay judío ni griego; no hay esclavo ni libre; no hay varón y mujer[a]; porque todos ustedes son uno en Mesías Jesús[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «No hay varón ni mujer»; el griego literalmente dice «varón y mujer», probablemente aludiendo a Génesis 1:27.
    reason: alternative_reading
  - marker: b
    text: 'Griego: «en Mesías Jesús»; se traduce «Mesías» porque Χριστός es aquí un título.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐκ ἔνι
  english_pob_choice: There is no
  chosen_spanish: No hay
  alternatives_spanish:
  - no existe
  - no hay tal cosa como
  lexicon: BDAG
  rationale: La negación existencial repetida se expresa con naturalidad en español con «no hay», conservando el patrón enfático sin volver la frase artificial.
- source_word: Ἰουδαῖος
  english_pob_choice: Jew
  chosen_spanish: judío
  alternatives_spanish:
  - judeo
  lexicon: BDAG
  rationale: En este contraste con «griego», el sentido étnico-religioso es el principal; «judío» es la equivalencia española clara y establecida.
- source_word: Ἕλλην
  english_pob_choice: Greek
  chosen_spanish: griego
  alternatives_spanish:
  - gentil
  lexicon: BDAG
  rationale: El griego dice literalmente «griego»; mantenerlo conserva el par concreto de Pablo y evita ampliar indebidamente a «gentil».
- source_word: δοῦλος
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - criado
  lexicon: BDAG
  rationale: En la pareja social con «libre», el rasgo de sujeción es central; «esclavo» refleja mejor la fuerza lexical que «siervo».
- source_word: ἐλεύθερος
  english_pob_choice: free
  chosen_spanish: libre
  alternatives_spanish:
  - liberto
  - libre de
  lexicon: BDAG
  rationale: Es el contrapunto natural de «esclavo» y conserva el contraste social breve del texto.
- source_word: ἄρσεν
  english_pob_choice: male
  chosen_spanish: varón
  alternatives_spanish:
  - macho
  - hombre
  lexicon: BDAG
  rationale: Aunque el inglés opta por «male» para precisión biológica, en español «varón» comunica mejor ese valor de sexo/género sin sonar tan zoológico como «macho»; «hombre» sería menos preciso.
- source_word: θῆλυ
  english_pob_choice: female
  chosen_spanish: mujer
  alternatives_spanish:
  - hembra
  lexicon: BDAG
  rationale: Para evitar una expresión extraña en español, se usa «mujer» como término humano correspondiente; el par «varón y mujer» mantiene la referencia antropológica y la posible alusión a Génesis 1:27.
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - ni
  - e
  lexicon: BDAG
  rationale: Se conserva la conjunción coordinante distinta de los pares previos con οὐδὲ, manteniendo la forma del posible eco de Génesis 1:27.
- source_word: πάντες
  english_pob_choice: all
  chosen_spanish: todos ustedes
  alternatives_spanish:
  - todos
  lexicon: BDAG
  rationale: El pronombre ὑμεῖς hace explícita la segunda persona plural; «todos ustedes» preserva esa dirección directa y su alcance colectivo.
- source_word: ὑμεῖς
  english_pob_choice: you
  chosen_spanish: ustedes
  alternatives_spanish:
  - vosotros
  - vos
  lexicon: BDAG
  rationale: En español neutro latinoamericano, «ustedes» comunica la segunda persona plural de modo natural y respetuoso.
- source_word: εἷς
  english_pob_choice: one
  chosen_spanish: uno
  alternatives_spanish:
  - una sola cosa
  - un solo cuerpo
  - unidos
  lexicon: BDAG
  rationale: «Uno» conserva la formulación escueta del texto y su afirmación de unidad corporativa sin desarrollar interpretaciones no explícitas.
- source_word: ἐν Χριστῷ Ἰησοῦ
  english_pob_choice: in Messiah Jesus
  chosen_spanish: en Mesías Jesús
  alternatives_spanish:
  - en Cristo Jesús
  lexicon: BDAG
  rationale: Se mantiene «Mesías» para Χριστός conforme a la política terminológica del proyecto, pues aquí λειτουργa como título; «Jesús» conserva el nombre propio.
theological_decisions:
- issue: Cómo renderizar ἄρσεν καὶ θῆλυ sin borrar el posible eco de Génesis 1:27
  english_pob_reading: male and female
  chosen_spanish_reading: varón y mujer
  alternative_spanish_readings:
  - macho y hembra
  - varón y hembra
  - hombre y mujer
  rationale: «Varón y mujer» mantiene la referencia humana y evita el calco zoológico de «macho y hembra», pero sigue dejando visible la tensión entre precisión lexical y posible alusión creacional. No se suaviza a una formulación genérica que borre el eco bíblico.
  doctrine_reference: Preservar la tensión lexical y la posible intertextualidad sin resolverla interpretativamente.
- issue: Cómo entender εἷς ἐστε en relación con las distinciones sociales y sexuales previas
  english_pob_reading: you are all one
  chosen_spanish_reading: todos ustedes son uno
  alternative_spanish_readings:
  - son un solo cuerpo
  - son una sola persona
  - están unidos
  rationale: La frase afirma unidad en Mesías Jesús, no la desaparición explícita de las distinciones creadas o sociales. «Uno» conserva esa sobriedad doctrinal sin añadir más de lo que dice el verso.
  doctrine_reference: No importar afirmaciones doctrinales que el texto no formula.
- issue: Si traducir Χριστός como nombre fijo o como título en esta cláusula final
  english_pob_reading: Messiah Jesus
  chosen_spanish_reading: Mesías Jesús
  alternative_spanish_readings:
  - Cristo Jesús
  rationale: Se sigue la directriz del proyecto de traducir Χριστός como «Mesías» cuando funciona con fuerza titulativa. Esto conserva la carga semántica del título sin convertirlo en un mero nombre litúrgico.
  doctrine_reference: Terminología titulativa transparente frente a forma eclesiástica heredada.
translation_notes:
  revision_awareness: El inglés auditado pasó por una corrección regresiva entre «Christ Jesus» y «Messiah Jesus»; para el español se retiene consistentemente «Mesías Jesús» conforme a la política del proyecto y al valor titulativo de Χριστός en este contexto.
  spanish_consistency_notes:
  - 'Se usa español neutro latinoamericano: «ustedes» y formas sencillas, sin arcaísmos innecesarios.'
  - «Mesías» se mantiene de forma uniforme para Χριστός en la cláusula final, coherente con la terminología del proyecto.
  - Se preserva el paralelismo de las negaciones con «No hay… no hay… no hay…» para reflejar la insistencia del griego.
  - La nota sobre «varón y mujer» queda anclada al pasaje por la posible alusión a Génesis 1:27.
  - «Esclavo» se conserva por la fuerza social del término en contraste con «libre».
