    reason: lexical_alternative
  - marker: b
    text: O «oír de fe», o «el mensaje oído con fe».
    reason: alternative_reading
  revision_rationale: 'Se corrigen los anclajes de notas para que correspondan al griego y a la auditoría inglesa: la alternativa de ἐν ὑμῖν se coloca en «entre ustedes», y se añade la nota requerida para la ambigüedad de ἀκοῆς πίστεως. El texto base en español no requiere cambios sustantivos de redacción.'
