translation:
  language: es
  text: Así que, ¿el que les suministra el Espíritu y obra milagros entre ustedes[a] lo hace por obras de la ley, o por oír con fe[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en ustedes».
    reason: lexical_alternative
  - marker: b
    text: O «oír de fe», o «el mensaje oído con fe».
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπιχορηγῶν
  english_pob_choice: supplies
  chosen_spanish: suministra
  alternatives_spanish:
  - provee
  - da generosamente
  lexicon: BDAG
  rationale: '''Suministra'' conserva la idea de proveer continuamente lo necesario, con un matiz de abastecimiento que encaja bien con el participio presente sin sonar demasiado interpretativo.'
- source_word: τὸ πνεῦμα
  english_pob_choice: the Spirit
  chosen_spanish: el Espíritu
  alternatives_spanish:
  - el Espíritu Santo
  lexicon: BDAG
  rationale: La referencia es al Espíritu en sentido definido; 'el Espíritu' mantiene la sobriedad del griego y evita añadir una expansión no expresada explícitamente en el texto.
- source_word: ἐνεργῶν δυνάμεις
  english_pob_choice: works miracles
  chosen_spanish: obra milagros
  alternatives_spanish:
  - obra poderes
  - obra obras poderosas
  lexicon: BDAG
  rationale: '''Obra milagros'' comunica de modo natural el sentido evidente de actos poderosos de Dios; ''obra poderes'' sería más literal pero menos idiomático en español.'
- source_word: ἐν ὑμῖν
  english_pob_choice: among you
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - en ustedes
  lexicon: BDAG
  rationale: En el contexto de acciones visibles en la comunidad, 'entre ustedes' expresa con claridad la lectura comunitaria preferida en la POB; la alternativa literal 'en ustedes' se conserva en una nota porque el griego permite ambas posibilidades.
- source_word: ἔργων νόμου
  english_pob_choice: works of the law
  chosen_spanish: obras de la ley
  alternatives_spanish:
  - obras de la Ley
  lexicon: BDAG
  rationale: La expresión paulina establecida se conserva casi literalmente como 'obras de la ley', manteniendo su fuerza técnica y su contraste argumental.
- source_word: νόμου
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - ley
  lexicon: BDAG
  rationale: Aunque el artículo no aparece explícito en griego, en el argumento paulino la referencia convencional es a la ley mosaica; el español requiere el artículo para sonar natural.
- source_word: ἀκοῆς πίστεως
  english_pob_choice: hearing with faith
  chosen_spanish: oír con fe
  alternatives_spanish:
  - oír de fe
  - el mensaje oído con fe
  lexicon: BDAG
  rationale: Esta opción reproduce de manera clara la contraposición de Pablo entre las obras de la ley y la recepción por el oír unido a la fe, sin resolver en exceso la compacta relación genitiva del griego.
- source_word: πίστεως
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - fidelidad
  - confianza
  lexicon: BDAG
  rationale: '''Fe'' es la traducción de base más adecuada aquí para mantener el contraste paulino central; otras posibilidades son menos probables en este pasaje.'
theological_decisions:
- issue: La expresión ἀκοῆς πίστεως es sintácticamente compacta y admite más de una lectura cercana.
  english_pob_reading: hearing with faith
  chosen_spanish_reading: oír con fe
  alternative_spanish_readings:
  - oír de fe
  - el mensaje oído con fe
  rationale: La opción elegida preserva el contraste retórico de Pablo entre recibir por obras de la ley y recibir mediante el oír acompañado por fe. Las alternativas siguen siendo posibles y no deben borrarse sin comentario.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla de manera unilateral.
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requieren cambios sustantivos; la versión española mantiene el mismo equilibrio entre claridad idiomática y fidelidad al griego.'
  spanish_consistency_notes:
  - Se mantiene «Espíritu» con artículo definido, sin expandir a «Espíritu Santo», porque el griego no lo explicita aquí.
  - Se preserva la expresión paulina técnica «obras de la ley» sin sustituirla por formulaciones más explicativas.
  - La nota sobre ἐν ὑμῖν se ancla correctamente en «entre ustedes» para reflejar la lectura contextual preferida y la alternativa literal.
  - «Oír con fe» evita sobreinterpretar ἀκοῆς πίστεως, pero deja abierta la ambigüedad reconocida en la nota.
  - El tono general es formal y publicable, sin calcos rígidos innecesarios.
