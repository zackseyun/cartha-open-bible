  source_alignment_summary: 'El borrador refleja bien el griego: πάντες/ἐστε como alcance colectivo, γάρ como conexión causal, υἱοὶ θεοῦ como filiación, διὰ τῆς πίστεως como medio, y ἐν Χριστῷ Ἰησοῦ como unión/esfera en Mesías Jesús. También sigue correctamente la decisión del POB de traducir Χριστός como título (''Mesías'').'
  spanish_quality_summary: 'El español es claro y publicable, pero la nota [a] está defectuosa: dice ''O “hijos”'' cuando el texto principal ya dice ''hijos'', así que no ofrece una alternativa real y no reproduce la función de la nota inglesa (''children of God''). Conviene reparar esa nota para aclarar que una alternativa más inclusiva sería ''hijos e hijas de Dios'' o ''los hijos de Dios'', mientras se explica por qué se conserva ''hijos''.'
  glossary_alignment: 'Alineación general buena con las pautas: θεοῦ→''Dios'', Χριστός→''Mesías'', Ἰησοῦς→''Jesús''. ''Hijos'' para υἱοὶ es aceptable en español y preserva mejor el matiz de filiación/herencia que una neutralización plena. ''Por medio de la fe'' y ''en Mesías Jesús'' también concuerdan con el expediente inglés y la política del proyecto.'
  issues:
  - severity: medium
    issue: La nota [a] no presenta una alternativa válida
    rationale: El texto principal ya usa 'hijos de Dios', pero la nota dice 'O “hijos”'. Eso es redundante y no comunica la alternativa ni la explicación auditada en inglés sobre 'children of God' frente a 'sons of God'.
  - severity: low
    issue: La redacción de la nota [a] puede aclarar mejor el matiz representativo
    rationale: Dado que en español 'hijos' puede abarcar grupos mixtos, la nota debe explicar con precisión que el griego usa υἱοὶ y preserva el matiz filial y de herencia, a la vez que señala una alternativa española posible si el lector busca explicitación inclusiva.
  revised_spanish_text: Porque todos ustedes son hijos de Dios[a] por medio de la fe en Mesías Jesús[b].
  revised_footnotes:
  - marker: a
    text: O “hijos e hijas de Dios”. El griego dice literalmente “hijos”, preservando el matiz filial y de herencia de la expresión paulina.
    reason: lexical_alternative
  - marker: b
    text: O “Cristo Jesús”. En esta traducción se prefiere “Mesías” para rendir el título griego Χριστός.
    reason: lexical_alternative
  revision_rationale: Se mantiene el texto principal, que es fiel y natural, pero se corrige la nota [a] para que ofrezca una alternativa real y refleje mejor la justificación léxica y teológica del expediente inglés. No se requiere cambio en el cuerpo del versículo.
