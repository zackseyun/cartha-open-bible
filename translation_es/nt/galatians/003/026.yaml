translation:
  language: es
  text: Porque todos ustedes son hijos de Dios[a] por medio de la fe en Mesías Jesús[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “hijos”. El griego dice literalmente “hijos”, preservando el matiz filial y de herencia de la expresión paulina.
    reason: lexical_alternative
  - marker: b
    text: O “Cristo Jesús”. En esta traducción se prefiere “Mesías” para rendir el título griego Χριστός.
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντες
  english_pob_choice: all
  chosen_spanish: todos ustedes
  alternatives_spanish:
  - todos
  - ustedes todos
  - todos vosotros
  lexicon: BDAG
  rationale: El griego plural subraya la totalidad del grupo destinatario. En español, 'todos ustedes' mantiene esa fuerza colectiva con naturalidad y evita ambigüedad de número sin añadir paráfrasis.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque en efecto
  lexicon: BDAG
  rationale: γάρ introduce la base o razón del enunciado anterior. 'Porque' preserva la relación causal/explicativa en un español claro y publicable.
- source_word: υἱοὶ
  english_pob_choice: sons
  chosen_spanish: hijos
  alternatives_spanish:
  - hijos varones
  - hijos e hijas
  - niños
  lexicon: BDAG
  rationale: Aunque el griego es masculino plural, en español 'hijos' puede conservar la filiación y la herencia sin sonar tan marcado como 'hijos varones'. Dado el registro y la inteligibilidad para una audiencia amplia, se opta por una forma que preserve la relación filial sin introducir una nota de género que en español moderno podría oscurecer el sentido. La tensión entre forma masculina y alcance inclusivo se documenta en nota.
- source_word: θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - de Dios Padre
  lexicon: BDAG
  rationale: 'Genitivo posesivo simple: expresa pertenencia o relación filial con Dios. ''De Dios'' es la correspondencia más directa y sobria.'
- source_word: διὰ τῆς πίστεως
  english_pob_choice: through faith
  chosen_spanish: por medio de la fe
  alternatives_spanish:
  - por la fe
  - a través de la fe
  - mediante la fe
  lexicon: BDAG
  rationale: διά con genitivo comunica medio o instrumento. 'Por medio de' conserva ese valor causal/instrumental con buena fluidez en español y evita reducir la frase a una mera etiqueta doctrinal.
- source_word: ἐν Χριστῷ Ἰησοῦ
  english_pob_choice: in Messiah Jesus
  chosen_spanish: en Mesías Jesús
  alternatives_spanish:
  - en Cristo Jesús
  - unidos a Mesías Jesús
  lexicon: BDAG
  rationale: Χριστός funciona como título, y la política del proyecto favorece 'Mesías' para mantener el valor semántico del término griego. 'En' preserva la unión/esfera relacional paulina sin convertirla en una fórmula diferente. Se mantiene el nombre propio 'Jesús' en orden natural del español.
theological_decisions:
- issue: Lenguaje filial masculino y alcance de la promesa
  english_pob_reading: sons of God
  chosen_spanish_reading: hijos de Dios
  alternative_spanish_readings:
  - hijos varones de Dios
  - hijos e hijas de Dios
  - hijas e hijos de Dios
  rationale: El griego usa υἱοὶ, no un término neutro. Sin embargo, en español contemporáneo 'hijos de Dios' puede comunicar filiación e herencia de manera idiomática y sin forzar una masculinización explícita que no aporta claridad adicional. La nota documenta la alternativa 'hijos'/'children' del inglés y la tensión de género/representatividad.
  doctrine_reference: Gender-accurate over gender-neutral
- issue: Tratamiento de Χριστός como título
  english_pob_reading: Messiah Jesus
  chosen_spanish_reading: Mesías Jesús
  alternative_spanish_readings:
  - Cristo Jesús
  - Jesucristo
  rationale: Dado que Χριστός es título, no mero apellido, 'Mesías' preserva mejor la carga semántica original en español. 'Mesías Jesús' mantiene la decisión del POB inglés de evitar la transliteración tradicional cuando la prioridad es el sentido del título.
  doctrine_reference: Translate titles; transliterate names
translation_notes:
  revision_awareness: El expediente inglés muestra una oscilación editorial entre 'Messiah Jesus' y 'Christ Jesus', con restitución final de 'Messiah'. Para el español se sigue la política del proyecto de traducir Χριστός como 'Mesías', manteniendo la coherencia con la decisión doctrinal documentada y con el título griego del versículo, sin depender mecánicamente de la forma inglesa estabilizada tardíamente.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para θεοῦ y 'fe' para πίστεως, sin explicitar matices no presentes en el griego.
  - '''Por medio de'' conserva el valor instrumental de διά con genitivo.'
  - '''Mesías'' se usa como traducción de Χριστός; no se adopta ''Cristo'' salvo cuando una decisión editorial del proyecto lo requiera en otro contexto.'
  - La nota sobre 'hijos' documenta la tensión entre fidelidad gramatical y naturalidad en español, sin borrar la marca masculina del griego en la explicación.
  - El orden 'Mesías Jesús' sigue la preferencia del proyecto por traducir el título y conservar el nombre propio.
