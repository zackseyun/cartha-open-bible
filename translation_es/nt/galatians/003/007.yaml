    issue: «Reconozcan» para Γινώσκετε
    rationale: El griego es un imperativo de conocimiento/entendimiento. «Reconozcan» añade un matiz de admisión o reconocimiento que no es necesario aquí. «Sepan» o «Entiendan» reflejan mejor el valor exhortativo básico.
  - severity: medium
    issue: Falta de notas que preserven alternativas significativas del expediente inglés
    rationale: El POB inglés conservó notas para «Know», «those of faith» y πίστις. El borrador español no incluye ninguna, perdiendo parte del razonamiento auditado y creando una leve neutralización de decisiones fuente-significativas.
  - severity: low
    issue: «los que son de fe» es algo pesado
    rationale: Es fiel, pero menos natural en español que una forma más compacta. Puede resolverse con «los de fe» en texto principal y una nota literal, o mantenerse si se prioriza transparencia. La revisión propone la opción más fluida con apoyo de nota.
  revised_spanish_text: Sepan, pues,[a] que los de fe,[b] estos son hijos[c] de Abraham.
