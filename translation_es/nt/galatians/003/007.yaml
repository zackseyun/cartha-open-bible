translation:
  language: es
  text: Sepan, pues,[a] que los de fe,[b] estos son hijos[c] de Abraham.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Entonces».
    reason: lexical_alternative
  - marker: b
    text: Lit. «los que son de fe». «Fe» también puede traducirse «confianza» o, en algunos contextos, «fidelidad».
    reason: lexical_alternative
  - marker: c
    text: O «hijos e hijas de Abraham» o «descendientes de Abraham». El griego dice literalmente «hijos».
    reason: lexical_alternative
lexical_decisions:
- source_word: Γινώσκετε
  english_pob_choice: Know
  chosen_spanish: Reconozcan
  alternatives_spanish:
  - Sepan
  - Entiendan
  lexicon: BDAG
  rationale: El imperativo plural pide una respuesta directa; «reconozcan» conserva la apelación exhortativa y suena natural en español bíblico sin perder el matiz de percepción/aceptación de una verdad ya expuesta.
- source_word: ἄρα
  english_pob_choice: then
  chosen_spanish: pues
  alternatives_spanish:
  - entonces
  - por tanto
  - así que
  lexicon: BDAG
  rationale: Marca inferencia lógica a partir del argumento previo. «Pues» expresa bien la conclusión en español y mantiene el enlace discursivo sin volverse pesado.
- source_word: οἱ ἐκ πίστεως
  english_pob_choice: those of faith
  chosen_spanish: los que son de fe
  alternatives_spanish:
  - los de fe
  - los que proceden de la fe
  - los que tienen fe
  lexicon: BDAG
  rationale: La construcción ἐκ con πίστις señala pertenencia/origen o base de identidad. «Los que son de fe» preserva el valor relacional y evita reducirlo a una mera cualidad interior.
- source_word: πίστεως
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - confianza
  - fidelidad
  lexicon: BDAG
  rationale: El sentido predominante en este contexto paulino es la fe como base de pertenencia en contraste con las obras de la ley. «Fe» es la opción más fiel y transparente.
- source_word: οὗτοι
  english_pob_choice: these
  chosen_spanish: son
  alternatives_spanish:
  - éstos son
  - estos
  lexicon: BDAG
  rationale: El demostrativo aporta énfasis en griego. En español, la estructura natural se logra sin duplicarlo; el énfasis queda suficientemente sugerido por la frase completa y por el contraste implícito del argumento.
- source_word: υἱοί
  english_pob_choice: sons
  chosen_spanish: hijos
  alternatives_spanish:
  - hijos varones
  - descendientes
  - hijos e hijas
  lexicon: BDAG
  rationale: Aunque el inglés POB preserva «sons» por el valor lexical, en español «hijos» comunica con claridad la relación de pertenencia/descendencia sin sonar artificial. Aquí la referencia es representativa y genealógica, por lo que «hijos» es el equivalente idiomático más natural y fiel.
- source_word: Ἀβραάμ
  english_pob_choice: Abraham’s
  chosen_spanish: de Abraham
  alternatives_spanish:
  - abrahámicos
  - de Abrahán
  lexicon: BDAG
  rationale: El genitivo se expresa de forma directa en español con «de Abraham», conservando la relación de pertenencia/linaje sin forzar un posesivo ajeno al idioma.
theological_decisions:
- issue: Sonship language in a representative/genealogical context
  english_pob_reading: sons
  chosen_spanish_reading: hijos
  alternative_spanish_readings:
  - hijos varones
  - descendientes
  - hijos e hijas
  rationale: El griego usa υἱοί, pero en español la traducción literal «hijos» suele incluir la fuerza representativa sin requerir una marcación masculina que aquí sonarían menos natural. Se mantiene la idea de pertenencia a Abraham dentro del argumento paulino.
  doctrine_reference: Gender-accurate over gender-neutral.
- issue: Faith as identity marker
  english_pob_reading: those of faith
  chosen_spanish_reading: los que son de fe
  alternative_spanish_readings:
  - los que tienen fe
  - los de fe
  rationale: La expresión conserva que la fe no solo es una cualidad, sino el criterio de pertenencia que Pablo contrapone al régimen de la ley. Se evita suavizarla a una simple posesión interna.
  doctrine_reference: Pauline argument on justification by faith in Galatians 3.
translation_notes:
  revision_awareness: The English audit trail favors a concise inferential connective, a compact phrase for οἱ ἐκ πίστεως, and a masculine lexical form for υἱοί. In Spanish, the draft preserves the inferential logic and the faith-based identity marker while using the idiomatic and publication-readable equivalent «hijos» for υἱοί, since Spanish «hijos» can cover the representative sense without obscuring the argument.
  spanish_consistency_notes:
  - Se mantuvo «Abraham» por coherencia bíblica en español.
  - Se usó «fe» como término doctrinal estándar para πίστις en este contexto.
  - No se añadió nota de alternativa porque el español elegido no introduce ambigüedad textual nueva y la frase fluye de manera natural.
