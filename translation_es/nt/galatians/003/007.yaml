review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador comunica correctamente la estructura básica del versículo: mandato inferencial + identificación de «los de fe» como descendencia de Abraham. Sin embargo, atenúa dos decisiones importantes del expediente POB: Γινώσκετε se acerca mejor a «Sepan» que a «Reconozcan» en este contexto, y οἱ ἐκ πίστεως debe conservarse de modo más ceñido como grupo definido por la fe, idealmente con nota por la literalidad. Además, aunque «hijos» es idiomático en español, el expediente inglés preserva explícitamente la fuerza de υἱοί como «sons», por lo que conviene anclar una nota alternativa para evitar neutralización silenciosa.'
  spanish_quality_summary: El español es claro y legible, pero «Reconozcan» sugiere más bien admitir o reconocer algo ya identificado, mientras que «Sepan» suena más natural y directo para un imperativo exhortativo epistolar. «Los que son de fe» es comprensible, aunque algo pesado; «los de fe» es más compacto pero requiere nota aclaratoria. La frase revisada suena más natural y mantiene dignidad bíblica.
  glossary_alignment: 'No hay conflicto con términos del glosario principal. La cuestión principal es la política de género-precisión para υἱοί: en español «hijos» puede mantenerse en texto principal, pero debe explicitarse la alternativa «hijos de Abraham»/«descendientes» según el expediente; aquí la mejor solución es mantener «hijos» y añadir nota de alternativa inclusiva, paralela al inglés. También conviene conservar la nota sobre πίστις como «fe / confianza / fidelidad» y la literalidad de «los de fe».'
  issues:
