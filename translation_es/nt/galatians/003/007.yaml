revisions:
- from: Reconozcan, pues, que los que son de fe son hijos de Abraham.
  to: Sepan, pues,[a] que los de fe,[b] estos son hijos[c] de Abraham.
  rationale: La revisión acerca Γινώσκετε a un imperativo español más natural («Sepan»), preserva mejor la compacidad y fuerza identitaria de οἱ ἐκ πίστεως con una nota literal, reintroduce las alternativas auditadas sobre πίστις, y mantiene «hijos» para reflejar υἱοί mientras añade una nota que evita perder la dimensión inclusiva/comprensiva en español.
