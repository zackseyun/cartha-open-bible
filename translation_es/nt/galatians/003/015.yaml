    text: O «testamento» para «alianza».
    reason: lexical_alternative
  revision_rationale: Se revisa principalmente διαθήκη a «alianza» para reflejar mejor la decisión contextual del POB sobre «covenant» en Gálatas 3 y el trasfondo abrahámico. También se ajusta la cláusula final a una formulación más ceñida al griego («ni le añade nada») y se pulen las notas para un español más natural y preciso.
