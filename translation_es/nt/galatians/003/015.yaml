translation:
  language: es
  text: 'Hermanos[a], hablo en términos humanos: aun una alianza ratificada por un hombre[b], nadie la anula ni le añade nada.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hermanos» traduce el plural masculino adelphoi; Pablo se dirige a otros creyentes, probablemente incluyendo a mujeres.
    reason: cultural_note
  - marker: b
    text: O «testamento» para «alianza».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀδελφοί
  english_pob_choice: Brothers
  chosen_spanish: Hermanos
  alternatives_spanish:
  - Hermanos y hermanas
  - Creyentes
  lexicon: BDAG
  rationale: El vocativo plural masculino se conserva como forma directa de tratamiento. En español, «hermanos» es natural y puede abarcar al grupo mixto sin forzar una explicitación que el griego no expresa en la forma del vocativo.
- source_word: κατὰ ἄνθρωπον λέγω
  english_pob_choice: I am speaking in human terms
  chosen_spanish: hablo en términos humanos
  alternatives_spanish:
  - hablo según el hombre
  - hablo desde una perspectiva humana
  lexicon: BDAG
  rationale: La expresión es idiomática y presenta una analogía ordinaria. «En términos humanos» comunica bien el valor explicativo sin volverla rígidamente literal.
- source_word: ὅμως
  english_pob_choice: even
  chosen_spanish: aun
  alternatives_spanish:
  - sin embargo
  - incluso
  lexicon: BDAG
  rationale: 'Aquí introduce un ejemplo reforzador: «aun» conserva ese matiz de énfasis dentro del argumento.'
- source_word: ἀνθρώπου
  english_pob_choice: by a man
  chosen_spanish: por un hombre
  alternatives_spanish:
  - de un hombre
  - humano
  lexicon: BDAG
  rationale: El genitivo se conserva de manera concreta y natural en español. «Por un hombre» mantiene la referencia personal y el marco legal del ejemplo.
- source_word: κεκυρωμένην
  english_pob_choice: ratified
  chosen_spanish: ratificado
  alternatives_spanish:
  - confirmado
  - validado
  - legalmente confirmado
  lexicon: BDAG
  rationale: El participio perfecto pasivo apunta a algo establecido formalmente y vigente. «Ratificado» reproduce bien la fuerza jurídica del término.
- source_word: διαθήκην
  english_pob_choice: covenant
  chosen_spanish: pacto
  alternatives_spanish:
  - alianza
  - testamento
  - covenant
  lexicon: BDAG
  rationale: Aunque «covenant» es la opción inglesa, en español «pacto» comunica el sentido contractual/legal del pasaje con claridad y sin sonar arcaico. Se preserva la tensión legal-teológica del argumento paulino sin imponer una sola tradición terminológica.
- source_word: ἀθετεῖ
  english_pob_choice: sets aside
  chosen_spanish: lo anula
  alternatives_spanish:
  - lo deja sin efecto
  - lo invalida
  - lo deshecha
  lexicon: BDAG
  rationale: El verbo expresa invalidar o hacer inoperante un acuerdo. «Lo anula» es natural en español jurídico y conserva la fuerza de cancelación.
- source_word: ἐπιδιατάσσεται
  english_pob_choice: adds to it
  chosen_spanish: le añade condiciones
  alternatives_spanish:
  - le añade estipulaciones
  - lo modifica ulteriormente
  - le agrega disposiciones
  lexicon: BDAG
  rationale: El verbo sugiere añadir disposiciones o cláusulas adicionales. «Le añade condiciones» explicita el valor legal implícito en el contexto y resulta más claro que un simple «le añade».
theological_decisions:
- issue: Cómo renderizar διαθήκη en un contexto paulino de argumento legal/promisorio
  english_pob_reading: covenant
  chosen_spanish_reading: pacto
  alternative_spanish_readings:
  - alianza
  - testamento
  - covenant
  rationale: En Gálatas 3 el argumento gira en torno a la promesa y su carácter vinculante. «Pacto» conserva el peso jurídico del ejemplo y es suficientemente amplio para el trasfondo bíblico. Se evita «testamento» porque en español puede desviar la lectura hacia una categoría más técnica y menos contextual aquí.
  doctrine_reference: Gálatas 3:15; lectura del pacto abrahámico en el argumento paulino
translation_notes:
  revision_awareness: El inglés POB se mantuvo sin cambios en la revisión más reciente; esta propuesta sigue el mismo sentido y ajusta solo la formulación española para naturalidad y precisión legal.
  spanish_consistency_notes:
  - Se conserva el tratamiento plural directo en vocativo.
  - Se mantiene el registro jurídico del pasaje con «pacto», «ratificado» y «anula».
  - «Aun» reproduce el valor enfático de ὅμως dentro del argumento.
  - «Le añade condiciones» explicita la idea de añadir cláusulas sin perder el matiz legal.
