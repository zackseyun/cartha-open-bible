translation:
  language: es
  text: 'Pero la ley no es de la fe; sino[b]: «El que las hace vivirá por ellas[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vivirá en ellas».
    reason: lexical_alternative
  - marker: b
    text: Cita de Levítico 18:5.
    reason: cross_reference
lexical_decisions:
- source_word: νόμος
  english_pob_choice: law
  chosen_spanish: ley
  alternatives_spanish:
  - la Ley
  lexicon: BDAG
  rationale: Se mantiene el término amplio y paulino “ley” para no cerrar el sentido únicamente a la Ley mosaica en la redacción principal, aunque el contexto la tenga en vista.
- source_word: ἐκ
  english_pob_choice: from
  chosen_spanish: de
  alternatives_spanish:
  - desde
  - a partir de
  lexicon: BDAG
  rationale: «De» reproduce de manera natural la relación de origen/principio expresada por ἐκ en español, sin añadir una paráfrasis interpretativa.
- source_word: πίστεως
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - confianza
  - fidelidad
  lexicon: BDAG
  rationale: Se conserva «fe» como el principio contrastado con la ley; no se fuerza una lectura subjetiva ni se resuelve la tensión teológica del pasaje.
- source_word: ἀλλὰ
  english_pob_choice: rather
  chosen_spanish: sino
  alternatives_spanish:
  - pero
  - más bien
  lexicon: BDAG
  rationale: «Sino» introduce bien la contraposición y encaja con la cita bíblica que sigue, manteniendo la fuerza de la oposición.
- source_word: ὁ ποιήσας
  english_pob_choice: the one who does
  chosen_spanish: el que las hace
  alternatives_spanish:
  - el que las cumple
  - quien las haga
  lexicon: BDAG
  rationale: Se opta por una forma española natural y genérica. «Las» deja implícitos los mandamientos/obras a los que apunta el pronombre griego, sin explicitar más de lo que el texto permite.
- source_word: αὐτὰ
  english_pob_choice: them
  chosen_spanish: las
  alternatives_spanish:
  - las cosas
  - ellas
  lexicon: BDAG
  rationale: El pronombre se traduce con concordancia femenina plural en español porque remite a los mandamientos u ordenanzas aludidos por el contexto y por la cita de Levítico 18:5.
- source_word: ζήσεται
  english_pob_choice: will live
  chosen_spanish: vivirá
  alternatives_spanish:
  - vivirá para
  - tendrá vida
  lexicon: BDAG
  rationale: Se usa el futuro simple, claro y bíblicamente natural en español, conservando el valor futuro de la forma verbal griega.
- source_word: ἐν αὐτοῖς
  english_pob_choice: by them
  chosen_spanish: por ellas
  alternatives_spanish:
  - en ellas
  - a causa de ellas
  lexicon: BDAG
  rationale: «Por ellas» expresa el valor de medio o base que el audit trail inglés identifica como predominante, sin excluir que una traducción más literal sea posible.
theological_decisions:
- issue: Contraste entre ley y fe
  english_pob_reading: 'The verse preserves Paul’s antithesis without softening it: the law is not characterized as arising from faith, but speaks in terms of doing.'
  chosen_spanish_reading: 'El versículo mantiene la antítesis paulina: la ley no se presenta como procedente de la fe, sino como un principio de hacer.'
  alternative_spanish_readings:
  - La ley no se basa en la fe
  - La ley no opera por fe
  rationale: Se conserva la tensión teológica sin armonizarla artificialmente. «De la fe» permite seguir de cerca el griego ἐκ πίστεως y evita interpretar de más el contraste.
  doctrine_reference: Preservar la tensión teológica del texto sin resolverla por paráfrasis
translation_notes:
  revision_awareness: 'Se siguió el pasaje griego SBLGNT y el auditable English POB: se mantuvo la oposición ἐκ πίστεως / ὁ ποιήσας ... ζήσεται ἐν αὐτοῖς, sin añadir explicaciones doctrinales en el cuerpo del texto.'
  spanish_consistency_notes:
  - Se usó «ley» en minúscula para corresponder al tratamiento no capitalizado del inglés POB.
  - Se evitó «Cristo» o terminología no presente en el versículo.
  - La cita bíblica se formuló con un español natural y sobrio, apto para lectura pública.
