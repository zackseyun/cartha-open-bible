translation:
  language: es
  text: Ahora bien, un mediador no es de uno[a], pero Dios es uno[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Más literalmente, «de uno»; el sentido puede ser «no es de una sola parte» o «no actúa para uno solo».
    reason: alternative_reading
  - marker: b
    text: «Dios es uno» probablemente evoca la confesión monoteísta de Israel; compárese Deuteronomio 6:4.
    reason: cross_reference
lexical_decisions:
- source_word: μεσίτης
  english_pob_choice: mediator
  chosen_spanish: mediador
  alternatives_spanish:
  - intermediario
  - árbitro
  - gozne
  lexicon: BDAG
  rationale: «Mediador» es el equivalente natural y preciso en español para un término que designa a quien está entre dos partes para relacionarlas o concertar un acuerdo. Conserva el matiz jurídico/covenantal del argumento sin añadir interpretación no requerida.
- source_word: ἑνὸς
  english_pob_choice: of one / one party alone
  chosen_spanish: de uno
  alternatives_spanish:
  - de una sola parte
  - de una sola persona
  - de uno solo
  lexicon: BDAG
  rationale: La construcción griega es breve y ambigua. «De uno» mantiene la literalidad y la tensión del enunciado, evitando explicar más de lo que el texto dice. En español suena incompleto de manera intencional, como en el griego.
- source_word: οὐκ ἔστιν
  english_pob_choice: is not
  chosen_spanish: no es
  alternatives_spanish:
  - no pertenece
  - no concierne
  - no procede
  lexicon: BDAG
  rationale: Se mantiene la negación simple y directa para conservar el carácter enigmático y comprimido de la frase.
- source_word: θεός
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - el único Dios
  lexicon: BDAG
  rationale: «Dios» es el equivalente normal y fiel para θεός en este contexto monoteísta.
- source_word: εἷς ἐστιν
  english_pob_choice: is one
  chosen_spanish: es uno
  alternatives_spanish:
  - es uno solo
  - es uno y único
  lexicon: BDAG
  rationale: «Es uno» conserva la sencillez enfática del griego y permite oír la posible resonancia confesional sin explicitarla dentro del texto principal.
theological_decisions:
- issue: La cláusula breve y difícil sobre el mediador
  english_pob_reading: A mediator is not of one.
  chosen_spanish_reading: Un mediador no es de uno.
  alternative_spanish_readings:
  - Un mediador no actúa para uno solo.
  - Un mediador no pertenece a una sola parte.
  rationale: La traducción preserva la tensión interpretativa de Gálatas 3:20 sin resolverla en una paráfrasis doctrinal. No se especifica si el énfasis es sobre una sola parte, una sola persona o la función mediadora en general; se deja la expresión en su ambigüedad controlada, como exige el texto griego.
  doctrine_reference: Preservar la tensión exegética del pasaje sin sobreexplicarlo.
- issue: La afirmación final sobre la unidad de Dios
  english_pob_reading: God is one.
  chosen_spanish_reading: Dios es uno.
  alternative_spanish_readings:
  - Dios es uno solo.
  - Dios es uno y único.
  rationale: «Dios es uno» reproduce la forma concisa del griego y deja abierta la resonancia con la confesión de Deuteronomio 6:4, sin convertirla en una cita explícita ni en una expansión interpretativa.
  doctrine_reference: Monoteísmo bíblico; posible eco de Dt 6:4.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación asegurando que los marcadores de nota aparezcan exactamente en el texto español. También se preservó la literalidad exigida por la revisión más reciente de la POB: «de uno» en lugar de una expansión explicativa. La frase final mantiene la concisión del griego y su posible eco confesional.'
  spanish_consistency_notes:
  - Se prefirió «mediador» por coherencia con la terminología técnica usada en español para μεσίτης.
  - Se evitó «Mesías» porque no aparece en el verso y no corresponde al léxico aquí.
  - 'Se mantuvo el orden y contraste de la oración: transición con «Ahora bien» y oposición con «pero».'
  - Se respetó la ambigüedad de «de uno» sin convertirla en interpretación completa.
