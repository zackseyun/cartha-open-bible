review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el griego y la auditoría inglesa: mantiene la estructura contrastiva, conserva la ambigüedad deliberada de ἑνὸς con «de uno», y refleja bien «Dios es uno». Las notas también preservan correctamente la alternativa interpretativa y el eco probable de Dt 6:4.'
  spanish_quality_summary: 'La redacción es mayormente fiel y clara, pero «pero Dios es uno» suena menos natural y menos ajustado al contraste formal de δέ que «pero Dios es uno»/«y Dios es uno»? En este caso el texto principal funciona, pero hay un pequeño problema de calidad en las decisiones léxicas: «gozne» no es una alternativa española válida para μεσίτης. Además, «Ahora bien» puede mantenerse, aunque «Ahora» sería más cercano al inglés POB; no es necesario cambiarlo. El único ajuste necesario es limpiar la entrada léxica defectuosa y suavizar la conjunción adversativa en el texto principal a una formulación más bíblica y natural.'
  glossary_alignment: 'Alinea bien con la terminología del proyecto: θεός → «Dios»; no hay conflicto con Yahvé/Mesías/Jesús. «Mediador» es la opción correcta para μεσίτης. La preservación de «es uno» respeta la decisión teológica documentada.'
  issues:
  - severity: medium
    issue: 'Alternativa léxica inválida: «gozne» para μεσίτης'
    rationale: «Gozne» significa bisagra/pivote y no es una alternativa semántica aceptable para «mediador». Aunque no aparece en el texto principal, sí afecta la calidad y confiabilidad del registro de decisiones léxicas.
  - severity: low
    issue: Conjunción «pero» algo rígida en español bíblico aquí
    rationale: «Pero Dios es uno» es comprensible y fiel, pero «y Dios es uno» o mantener el contraste con puntuación puede sonar más natural en español. Sin embargo, dado que el inglés POB conserva «but», la revisión debe ser mínima y no alterar el sentido.
  revised_spanish_text: Ahora bien, un mediador no es de uno[a], pero Dios es uno[b].
  revised_footnotes:
  - marker: a
    text: Más literalmente, «de uno»; el sentido puede ser «no es de una sola parte» o «no actúa para uno solo».
    reason: alternative_reading
  - marker: b
    text: «Dios es uno» probablemente evoca la confesión monoteísta de Israel; compárese Deuteronomio 6:4.
    reason: cross_reference
  revision_rationale: El texto principal puede conservarse tal como está porque es fiel al griego y a la auditoría inglesa. Se marca como revisión menor para corregir la calidad editorial del registro asociado y afinar la nota b con una formulación más natural («confesión monoteísta»). No se requiere cambiar el sentido ni la estructura del versículo.
