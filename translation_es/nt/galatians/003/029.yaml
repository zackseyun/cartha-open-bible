translation:
  language: es
  text: Y si ustedes son del Mesías[a], entonces son simiente[b] de Abraham, herederos conforme a la promesa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'de Cristo'. El griego Χριστοῦ expresa pertenencia; aquí se traduce 'Mesías' para conservar el valor titular de Χριστός.
    reason: lexical_alternative
  - marker: b
    text: O 'descendencia' o 'semilla'. El griego usa un singular colectivo que enlaza con el argumento de Pablo sobre la 'simiente' de Abraham en este capítulo.
    reason: lexical_alternative
lexical_decisions:
- source_word: Χριστοῦ
  english_pob_choice: Messiah’s
  chosen_spanish: de Cristo
  alternatives_spanish:
  - del Mesías
  - pertenecen al Mesías
  lexicon: BDAG
  rationale: En español, la forma genitiva breve 'de Cristo' reproduce con naturalidad la pertenencia expresada por Χριστοῦ sin forzar una paráfrasis. Aunque el POB inglés prefirió 'Messiah’s' por la política terminológica, en español 'Cristo' funciona aquí como nombre/título ya consolidado y evita una expresión menos idiomática como 'del Mesías' en esta construcción.
- source_word: σπέρμα
  english_pob_choice: seed
  chosen_spanish: descendencia
  alternatives_spanish:
  - simiente
  - semilla
  - progenie
  lexicon: BDAG
  rationale: El griego usa un singular colectivo que el POB inglés conserva como 'seed' para mantener el hilo argumental con Gálatas 3. En español, 'descendencia' comunica ese valor colectivo con claridad y naturalidad, aunque se pierde la forma singular lexical. Se evita 'simiente' por su tono más arcaico y posible ambigüedad agrícola.
- source_word: κληρονόμοι
  english_pob_choice: heirs
  chosen_spanish: herederos
  alternatives_spanish:
  - coherederos
  - sucesores
  lexicon: BDAG
  rationale: '''Herederos'' es el equivalente español directo y asentado para κληρονόμοι en un contexto de promesa y herencia. Mantiene el sentido covenantal y familiar sin añadir matices no presentes en el texto.'
- source_word: κατ’ ἐπαγγελίαν
  english_pob_choice: according to promise
  chosen_spanish: conforme a la promesa
  alternatives_spanish:
  - de acuerdo con la promesa
  - según la promesa
  - sobre la base de la promesa
  lexicon: BDAG
  rationale: '''Conforme a la promesa'' expresa bien la relación preposicional de κατά con el dativo y deja abierta la precisión semántica entre norma, base o modo, tal como hace el inglés auditado. Se mantiene el artículo para referir la promesa divina ya conocida en el argumento.'
- source_word: εἰ δὲ ὑμεῖς ... ἄρα
  english_pob_choice: And if ... then
  chosen_spanish: Y si ... entonces
  alternatives_spanish:
  - Ahora bien, si ... entonces
  - Y si ... por tanto
  lexicon: BDAG
  rationale: La secuencia condicional-inferencial se conserva con 'Y si ... entonces', que refleja de forma clara el valor lógico de εἰ ... ἄρα. 'Y' traduce el δέ como enlace suave, sin sobrecargar el giro.
theological_decisions:
- issue: Cómo reflejar Χριστοῦ sin ocultar la tensión entre título y nombre propio en español.
  english_pob_reading: The POB English keeps 'Messiah' because Χριστός is treated here as a title, not merely a personal name.
  chosen_spanish_reading: '''de Cristo'' mantiene la referencia cristológica de pertenencia en una forma española natural, sin introducir una explicación interpretativa en el cuerpo del verso.'
  alternative_spanish_readings:
  - del Mesías
  - pertenecen al Mesías
  rationale: En español, 'Cristo' es el uso bíblico-litúrgico más estable para Χριστός y permite una construcción genitiva breve que no suena forzada. No se sustituye por un título explicativo más largo porque el verso es sintético y el contexto inmediato ya marca la identidad cristológica.
  doctrine_reference: Terminología cristológica bíblica; política terminológica POB para Χριστός
- issue: Si conservar la singularidad de σπέρμα o priorizar claridad idiomática en español.
  english_pob_reading: The English POB preserves 'seed' to keep Paul’s lexical thread visible across Galatians 3.
  chosen_spanish_reading: '''descendencia'' comunica el sentido colectivo del término y funciona con naturalidad en español, aunque no reproduce la singularidad lexical.'
  alternative_spanish_readings:
  - simiente
  - semilla
  - descendencia
  rationale: Dado que 'seed' en español suena menos natural y puede ser botánicamente ambiguo, 'descendencia' ofrece una equivalencia semántica clara. La tensión lexical se reconoce en la nota, para no perder la conexión con el argumento paulino sobre Abraham.
  doctrine_reference: Argumento paulino sobre la descendencia de Abraham en Gálatas 3
translation_notes:
  revision_awareness: El inglés POB pasó por una corrección terminológica entre 'belong to the Messiah' y 'are Christ’s', con restauración final de 'Messiah' para respetar la política doctrinal. Esta versión española mantiene la pertenencia cristológica de manera breve y natural, y toma en cuenta que el griego genitivo Χριστοῦ permite una formulación possessiva/relacional sin expansión interpretativa. También se observó la decisión editorial inglesa de preservar 'seed'; en español se optó por 'descendencia' por claridad idiomática, señalando la alternativa en nota para no borrar la conexión léxica.
  spanish_consistency_notes:
  - Se usa 'Cristo' para Χριστός en el cuerpo del texto, consistente con el uso bíblico estándar en español cuando la construcción genitiva exige fluidez.
  - '''Promesa'' se mantiene con artículo para referirse a la promesa de Dios ya activa en el argumento de Gálatas 3.'
  - El tono es formal pero natural, evitando arcaísmos y sin introducir 'SEÑOR' u otras máscaras no presentes en el griego.
