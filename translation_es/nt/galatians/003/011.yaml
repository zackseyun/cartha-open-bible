translation:
  language: es
  text: Ahora es evidente que nadie es justificado delante de Dios por la ley, porque «El justo vivirá por fe[a][b]».
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Pablo está citando Habacuc 2:4.
    reason: cross_reference
  - marker: b
    text: O, «por fidelidad».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι δὲ
  english_pob_choice: Now ... that
  chosen_spanish: Ahora ... que
  alternatives_spanish:
  - Pero ... que
  - Y ... que
  lexicon: BDAG
  rationale: δὲ señala una transición suave en el argumento. «Ahora» conserva ese avance discursivo en español sin forzar una oposición más fuerte de la que el griego exige.
- source_word: ἐν νόμῳ
  english_pob_choice: by the law
  chosen_spanish: por la ley
  alternatives_spanish:
  - en la ley
  - bajo la ley
  lexicon: BDAG
  rationale: En este contexto jurídico, ἐν con νόμῳ expresa esfera o medio. «Por la ley» comunica con naturalidad el medio o criterio por el cual alguien no es justificado.
- source_word: οὐδεὶς
  english_pob_choice: no one
  chosen_spanish: nadie
  alternatives_spanish:
  - ninguna persona
  lexicon: BDAG
  rationale: «Nadie» preserva la universalidad de la negación de forma natural en español y mantiene el alcance absoluto del griego.
- source_word: δικαιοῦται
  english_pob_choice: is justified
  chosen_spanish: es justificado
  alternatives_spanish:
  - es declarado justo
  - es absuelto
  lexicon: BDAG
  rationale: El verbo tiene fuerza forense en Pablo. «Es justificado» conserva el término técnico de manera reconocible en el discurso paulino en español.
- source_word: παρὰ τῷ θεῷ
  english_pob_choice: before God
  chosen_spanish: delante de Dios
  alternatives_spanish:
  - ante Dios
  - en la presencia de Dios
  lexicon: BDAG
  rationale: La expresión indica la posición de una persona en relación con el juicio divino. «Delante de Dios» mantiene el matiz relacional y judicial.
- source_word: δῆλον
  english_pob_choice: it is evident
  chosen_spanish: es evidente
  alternatives_spanish:
  - está claro
  - es obvio
  lexicon: BDAG
  rationale: El predicado impersonal se vierte de modo natural como «es evidente», conservando el tono argumentativo de Pablo.
- source_word: Ὁ δίκαιος
  english_pob_choice: The righteous
  chosen_spanish: El justo
  alternatives_spanish:
  - El recto
  - El que es justo
  lexicon: BDAG
  rationale: En la cita de Habacuc, el sustantivo/adjetivo substantivado se traduce con el término bíblico «justo», que es claro y fiel al valor nominal del griego.
- source_word: ἐκ πίστεως
  english_pob_choice: by faith
  chosen_spanish: por fe
  alternatives_spanish:
  - a partir de la fe
  - desde la fe
  lexicon: BDAG
  rationale: La preposición ἐκ puede expresar origen o base. En español, «por fe» reproduce bien la relación instrumental/fundacional sin sonar forzado.
- source_word: ζήσεται
  english_pob_choice: will live
  chosen_spanish: vivirá
  alternatives_spanish:
  - vivirá plenamente
  - seguirá viviendo
  lexicon: BDAG
  rationale: El futuro simple español refleja de manera directa el futuro griego y mantiene la forma sentenciosa de la cita.
theological_decisions:
- issue: La lectura de δικαιοῦται en un contexto paulino forense
  english_pob_reading: is justified
  chosen_spanish_reading: es justificado
  alternative_spanish_readings:
  - es declarado justo
  - es absuelto
  rationale: La versión española conserva el lenguaje técnico de justificación para no diluir la tensión doctrinal del pasaje. Aunque «declarado justo» o «absuelto» explicitan el matiz forense, «es justificado» mantiene continuidad terminológica con el argumento paulino.
  doctrine_reference: Justificación forense en Pablo; no resolver la tensión entre declaración legal y transformación moral más allá de lo que el texto afirma.
- issue: La cita de Habacuc 2:4 y la posible alternativa semántica de πίστις
  english_pob_reading: The righteous will live by faith
  chosen_spanish_reading: El justo vivirá por fe
  alternative_spanish_readings:
  - El justo vivirá por fidelidad
  - El justo, por la fe, vivirá
  rationale: Se mantiene «fe» como traducción principal de πίστις, siguiendo el criterio del proyecto. La alternativa «fidelidad» queda implícitamente conservada como posibilidad lexical, pero no se eleva al texto principal para no desplazar la lectura más directa del pasaje.
  doctrine_reference: Conservar la tensión lexical de πίστις; preferir 'fe' en el texto principal y reservar 'fidelidad' como alternativa interpretativa.
translation_notes:
  revision_awareness: Se siguió el pasaje griego SBLGNT y el audit trail inglés. La redacción española conserva la estructura argumentativa, el valor forense de δικαιοῦται y la cita de Habacuc 2:4, manteniendo la alternativa semántica de πίστις en nota sin desplazar la lectura principal.
  spanish_consistency_notes:
  - Se usa «Dios» para θεός conforme al estándar del proyecto.
  - Se usa «fe» como traducción principal de πίστις, con la alternativa «fidelidad» en nota.
  - Se preserva el tono forense de «justificado» para δικαιοῦται.
  - Se mantiene «Yahvé» como norma del proyecto, pero aquí no aparece el tetragrámaton.
