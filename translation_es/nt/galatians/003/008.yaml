review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del griego: la Escritura es personificada, Dios es el sujeto de «justifica», «por la fe» traduce adecuadamente ἐκ πίστεως, y «las naciones» preserva correctamente la repetición de ἔθνη y su vínculo con la cita abrahámica. También «anunció de antemano el evangelio» reproduce aceptablemente προευηγγελίσατο. Sin embargo, las notas no siguen fielmente el rastro de auditoría inglés: la nota [b] fue colocada en «naciones» pero su contenido trata de δικαιοῖ («declara justas»), mientras que la alternativa documentada en inglés para este tramo corresponde a προευηγγελίσατο («predicó/anunció de antemano el evangelio»).'
  spanish_quality_summary: El español principal es claro, natural y digno. «Previendo», «la Escritura», «por la fe» y «En ti serán bendecidas todas las naciones» suenan bien en español eclesial general. La única reparación necesaria es de consistencia editorial y de anclaje de notas, no de fluidez del texto base.
  glossary_alignment: 'Hay buena alineación con las decisiones del proyecto: θεός = «Dios», δικαιοῖ = «justifica», ἔθνη = «naciones» con alternativa «gentiles», y la cita mantiene «En ti». No hay conflicto con los glosarios principales. La corrección requerida es trasladar la nota alternativa al verbo «anunció de antemano el evangelio», conforme a la decisión inglesa sobre προευηγγελίσατο.'
  issues:
  - severity: medium
    issue: La nota [b] está mal anclada y no corresponde a la decisión léxica auditada.
    rationale: 'En el texto inglés, la nota b da la alternativa para προευηγγελίσατο: «preached the gospel beforehand to Abraham». En el borrador español, [b] aparece en «naciones» y ofrece «declara justas a las naciones», lo cual introduce una alternativa distinta para δικαιοῖ que no está documentada como nota en el POB inglés.'
  - severity: low
    issue: La nota [c] de referencia cruzada no es necesaria para preservar una ambigüedad o alternativa significativa del original.
    rationale: No es errónea en contenido, pero el encargo prioriza conservar las notas del rastro auditado y añadir nuevas solo cuando el español cree una ambigüedad real o cuando el inglés ya las preservó. Aquí no hace falta una nota extra.
  revised_spanish_text: 'Y la Escritura[a], previendo que Dios justifica a las naciones por la fe, anunció[a] de antemano el evangelio a Abraham: «En ti serán bendecidas todas las naciones».'
  revised_footnotes:
  - marker: a
    text: O «los gentiles»; el griego ἔθνη puede significar «naciones» o «gentiles».
    reason: lexical_alternative
  - marker: b
    text: O «predicó de antemano el evangelio a Abraham».
    reason: lexical_alternative
  revision_rationale: 'Se conserva el texto principal casi intacto, pero se corrige el aparato de notas para que coincida con el original griego y con la auditoría inglesa: la alternativa de ἔθνη permanece como nota en «Escritura»? No—debe anclarse en «naciones», y la alternativa de προευηγγελίσατο se añade en el verbo correspondiente. También se elimina la nota extra de referencia cruzada por no ser necesaria.'
