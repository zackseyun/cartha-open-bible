translation:
  language: es
  text: 'Y la Escritura[a], previendo que Dios justifica a las naciones[b] por la fe, anunció de antemano el evangelio a Abraham: «En ti serán bendecidas todas las naciones»[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los gentiles»; el griego ἔθνη puede significar «naciones» o «gentiles».
    reason: lexical_alternative
  - marker: b
    text: O «declara justas a las naciones».
    reason: lexical_alternative
  - marker: c
    text: Cita de Génesis 12:3; la fórmula griega mantiene el eco directo de la promesa a Abraham.
    reason: cross_reference
lexical_decisions:
- source_word: προϊδοῦσα
  english_pob_choice: foreseeing
  chosen_spanish: previendo
  alternatives_spanish:
  - habiendo previsto
  - viendo de antemano
  lexicon: BDAG
  rationale: El participio aoristo expresa percepción previa. «Previendo» conserva la anterioridad de manera natural en español y evita una formulación pesada.
- source_word: ἡ γραφή
  english_pob_choice: the Scripture
  chosen_spanish: la Escritura
  alternatives_spanish:
  - Escritura
  - la Escritura santa
  lexicon: BDAG
  rationale: Aquí γραφή funciona como referencia personificada a la Escritura; el artículo se mantiene y el sustantivo singular refleja el uso paulino.
- source_word: ἐκ πίστεως
  english_pob_choice: by faith
  chosen_spanish: por la fe
  alternatives_spanish:
  - a partir de la fe
  - sobre la base de la fe
  lexicon: BDAG
  rationale: «Por la fe» es idiomático en español y comunica bien el medio o base sin forzar una paráfrasis.
- source_word: δικαιοῖ
  english_pob_choice: justifies
  chosen_spanish: justifica
  alternatives_spanish:
  - declara justo
  - cuenta como justo
  lexicon: BDAG
  rationale: «Justifica» conserva la fuerza forense y teológica del verbo en Pablo sin añadir glosa interpretativa.
- source_word: τὰ ἔθνη
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los gentiles
  lexicon: BDAG
  rationale: Se conserva «naciones» para reflejar la repetición lexical del griego y el vínculo con la promesa a Abraham.
- source_word: προευηγγελίσατο
  english_pob_choice: proclaimed the good news beforehand
  chosen_spanish: anunció de antemano el evangelio
  alternatives_spanish:
  - predicó de antemano el evangelio
  - anunció de antemano las buenas nuevas
  lexicon: BDAG
  rationale: El verbo contiene explícitamente el componente de εὐαγγέλιον; «anunció de antemano el evangelio» preserva ese sentido sin perder claridad en español.
- source_word: τῷ Ἀβραὰμ
  english_pob_choice: to Abraham
  chosen_spanish: a Abraham
  lexicon: BDAG
  rationale: Dativo de destinatario directo, con transliteración estándar del nombre.
- source_word: Ἐνευλογηθήσονται
  english_pob_choice: will be blessed
  chosen_spanish: serán bendecidas
  alternatives_spanish:
  - serán benditos
  - recibirán bendición
  lexicon: BDAG
  rationale: El pasivo futuro se refleja directamente con «serán bendecidas», manteniendo el carácter promisorio de la cita.
- source_word: ἐν σοὶ
  english_pob_choice: In you
  chosen_spanish: En ti
  alternatives_spanish:
  - por ti
  - en unión contigo
  lexicon: BDAG
  rationale: Se sigue de cerca la fórmula de la cita y se conserva el valor relacional/covenantal de la preposición.
- source_word: πάντα τὰ ἔθνη
  english_pob_choice: all the nations
  chosen_spanish: todas las naciones
  alternatives_spanish:
  - todos los pueblos
  lexicon: BDAG
  rationale: Se mantiene la misma opción que en la primera ocurrencia para preservar la repetición textual y la conexión con el relato de Abraham.
theological_decisions:
- issue: 'ἔθνη: «naciones» vs. «gentiles»'
  english_pob_reading: “nations” in both occurrences
  chosen_spanish_reading: «las naciones» en ambos lugares
  alternative_spanish_readings:
  - «los gentiles» en la primera ocurrencia y «las naciones» en la cita
  - «los gentiles» en ambas ocurrencias
  rationale: Aunque «gentiles» es posible en el trasfondo paulino, «naciones» conserva mejor la repetición del texto griego y hace visible la conexión con la promesa a Abraham. Así se mantiene la tensión lexical sin resolverla prematuramente.
  doctrine_reference: Consistencia de términos clave y preservación de la conexión promesa-cumplimiento
translation_notes:
  revision_awareness: Se revisó la elección de términos a la luz del pasaje griego y del audit trail inglés; no se detectaron cambios posteriores necesarios respecto de la lectura base, y se preservó la repetición de ἔθνη como «naciones».
  spanish_consistency_notes:
  - Se mantiene «Escritura» como sujeto personificado, en singular.
  - «Justifica» conserva el valor forense sin sustituirlo por una paráfrasis.
  - Se usa «las naciones» de manera uniforme para reflejar la repetición del griego.
  - «Evangelio» traduce el componente de προευηγγελίσατο sin diluirlo en un simple «anunció».
