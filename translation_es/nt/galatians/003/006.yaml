translation:
  language: es
  text: Así como Abraham creyó a Dios[a], y le fue contado como rectitud,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «justicia».
    reason: lexical_alternative
lexical_decisions:
- source_word: καθὼς
  english_pob_choice: Just as
  chosen_spanish: Así como
  alternatives_spanish:
  - justo como
  - como
  lexicon: BDAG
  rationale: Introduce una comparación directa y natural en español, conservando el valor comparativo que fundamenta el argumento de Pablo.
- source_word: Ἀβραὰμ
  english_pob_choice: Abraham
  chosen_spanish: Abraham
  alternatives_spanish:
  - Abrahán
  lexicon: Nombre propio tradicional
  rationale: Se conserva la forma bíblica ampliamente reconocible y coherente con el nombre transliterado en la tradición española.
- source_word: ἐπίστευσεν
  english_pob_choice: believed
  chosen_spanish: creyó
  alternatives_spanish:
  - tuvo fe
  - confió
  lexicon: BDAG
  rationale: El aoristo de πιστεύω aquí pide una acción puntual de fe; «creyó» es el equivalente más directo y sobrio en español.
- source_word: τῷ θεῷ
  english_pob_choice: God
  chosen_spanish: a Dios
  alternatives_spanish:
  - en Dios
  - Dios
  lexicon: BDAG
  rationale: Con πιστεύω en este contexto, el dativo se entiende mejor como aceptar o creerle a Dios; en español, «creyó a Dios» preserva la fuerza de tomar a Dios por su palabra sin trasladarlo a la formulación más interpretativa «creyó en Dios».
- source_word: ἐλογίσθη
  english_pob_choice: was counted
  chosen_spanish: le fue contado
  alternatives_spanish:
  - le fue acreditado
  - le fue considerado
  lexicon: BDAG
  rationale: La pasiva de λογίζομαι conserva un sentido forense/de cómputo. «Le fue contado» mantiene esa idea sin cargar el texto con una paráfrasis más explicativa.
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - para él
  lexicon: BDAG
  rationale: El pronombre dativo se expresa naturalmente en español con clítico indirecto, manteniendo la referencia a Abraham.
- source_word: εἰς δικαιοσύνην
  english_pob_choice: as righteousness
  chosen_spanish: como justicia
  alternatives_spanish:
  - para justicia
  - como rectitud
  lexicon: BDAG
  rationale: Se adopta «justicia» para preservar la alternativa léxica documentada para δικαιοσύνη en pasajes paulinos, manteniendo la tensión terminológica indicada por el audit trail. «Como justicia» deja abierto el valor de estado/resultado del cálculo divino sin convertirlo en una explicación doctrinal adicional.
theological_decisions:
- issue: Renderización de δικαιοσύνη en la cita paulina de Génesis
  english_pob_reading: righteousness with footnoted justice alternative
  chosen_spanish_reading: justicia con nota que reconoce «rectitud» como alternativa posible
  alternative_spanish_readings:
  - justicia
  - rectitud
  rationale: El audit trail inglés conserva «justice» como alternativa para δικαιοσύνη. En español, «justicia» mantiene esa tensión semántica y evita borrar el matiz jurídico-forense presente en Pablo. Se añade una nota para indicar la alternativa, sin imponer una sola equivalencia cerrada.
  doctrine_reference: 'DOCTRINE.md: términos controvertidos, δικαιοσύνη'
translation_notes:
  revision_awareness: La puntuación final se deja con coma, en consonancia con la revisión auditada que observa que el griego continúa sintácticamente en el versículo siguiente.
  spanish_consistency_notes:
  - Se conserva el estilo sobrio y argumentativo del texto paulino.
  - Se evita «fe en Dios» para no debilitar la relación dativa de πιστεύω con el acto de creerle a Dios.
  - La elección de «justicia» responde al tratamiento auditado de δικαιοσύνη y queda explicitada en nota.
  - La coma final sigue la revisión inglesa que evita cerrar la unidad sintáctica en este versículo.
