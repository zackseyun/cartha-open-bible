revisions:
- from: Así como Abraham creyó a Dios[a], y le fue contado como justicia,
  to: Así como Abraham creyó a Dios[a], y le fue contado como rectitud,
  rationale: 'Se corrige δικαιοσύνην para reflejar la decisión principal documentada en el audit trail inglés: mantener en el texto la línea de «righteousness» y preservar «justice» como alternativa en nota. En español, «rectitud» es la mejor opción breve y natural para esa función aquí; «justicia» queda como alternativa léxica válida en la nota. El resto del versículo puede mantenerse.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:34:16Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la sintaxis y el sentido del griego: «Así como» refleja καθὼς, «Abraham creyó a Dios» preserva correctamente el dativo con πιστεύω, y «le fue contado» comunica adecuadamente la pasiva de ἐλογίσθη. Sin embargo, el punto principal a corregir es δικαιοσύνην: el audit trail inglés eligió explícitamente la lectura principal «righteousness» con nota alternativa «justice». En español, el equivalente principal más fiel a esa decisión es «rectitud», no «justicia», dejando «justicia» en nota como alternativa lexical.'
  spanish_quality_summary: 'El español es claro y natural, con buen registro bíblico moderno. «Creyó a Dios» y «le fue contado» suenan bien y son fieles. La única debilidad de calidad es la nota actual: repite la palabra principal («justicia») en vez de ofrecer una alternativa real, y además entra en conflicto con la decisión teológica documentada.'
  glossary_alignment: 'Alineación general buena con la terminología del proyecto: «Dios» y el resto del léxico no presentan problemas. La desviación está en δικαιοσύνη: el proyecto admite «justicia / rectitud» según contexto, pero aquí el audit trail ya fijó como principal la línea de «righteousness» con alternativa «justice». Por eso en español conviene «rectitud» como texto principal y «justicia» como nota alternativa.'
  issues:
  - severity: high
    issue: La traducción principal de δικαιοσύνην como «justicia» no sigue la decisión principal del audit trail inglés.
    rationale: El English POB usa «as righteousness» y conserva «justice» solo en nota por tratarse de un término paulino controvertido. Traducir el texto principal con «justicia» invierte esa jerarquía semántica y doctrinal.
  - severity: high
    issue: La nota al pie [a] es errónea porque repite la misma palabra del texto principal.
    rationale: La nota dice «O «justicia»» cuando el texto ya tiene «justicia». Una nota lexical_alternative debe preservar una alternativa real y útil para el lector.
  - severity: medium
    issue: La sección de decisiones teológicas en español no coincide con la nota propuesta.
    rationale: Dice que la nota reconoce «rectitud» como alternativa posible, pero la nota real del borrador ofrece «justicia». Hay inconsistencia interna entre metadatos y texto.
  revised_spanish_text: Así como Abraham creyó a Dios[a], y le fue contado como rectitud,
  revised_footnotes:
  - marker: a
    text: O «justicia».
    reason: lexical_alternative
  revision_rationale: 'Se corrige δικαιοσύνην para reflejar la decisión principal documentada en el audit trail inglés: mantener en el texto la línea de «righteousness» y preservar «justice» como alternativa en nota. En español, «rectitud» es la mejor opción breve y natural para esa función aquí; «justicia» queda como alternativa léxica válida en la nota. El resto del versículo puede mantenerse.'
