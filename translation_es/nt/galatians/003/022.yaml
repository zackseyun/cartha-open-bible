translation:
  language: es
  text: Pero la Escritura encerró todo[a] bajo el pecado, para que la promesa sea dada por fe[b] en Jesús el Mesías a los que creen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todas las cosas».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «por la fidelidad de Jesús el Mesías».'
    reason: alternative_reading
lexical_decisions:
- source_word: συνέκλεισεν
  english_pob_choice: imprisoned
  chosen_spanish: encerró
  alternatives_spanish:
  - aprisionó
  - encarceló
  - confinó
  lexicon: BDAG
  rationale: El verbo griego expresa la idea de cerrar o poner bajo restricción. En español, "encerró" comunica bien esa acción sin sonar demasiado forzado; mantiene la imagen de sujeción sin cargarla con una metáfora carcelaria más fuerte de lo que exige el texto.
- source_word: ἡ γραφή
  english_pob_choice: the Scripture
  chosen_spanish: la Escritura
  alternatives_spanish:
  - Escritura
  lexicon: BDAG
  rationale: Se conserva la personificación paulina de la Escritura como sujeto singular con artículo. "La Escritura" es natural en español y preserva la unidad del testimonio bíblico.
- source_word: τὰ πάντα
  english_pob_choice: everything
  chosen_spanish: todo
  alternatives_spanish:
  - todas las cosas
  - todo lo demás
  - todo cuanto existe
  lexicon: BDAG
  rationale: El neutro plural es de alcance universal. "Todo" reproduce esa amplitud de manera natural en español sin limitarlo solo a personas o a un subconjunto concreto.
- source_word: ὑπὸ ἁμαρτίαν
  english_pob_choice: under sin
  chosen_spanish: bajo el pecado
  alternatives_spanish:
  - bajo el dominio del pecado
  - bajo el poder del pecado
  lexicon: BDAG
  rationale: '"Bajo el pecado" sigue de cerca la metáfora paulina de sujeción. La preposición "bajo" conserva la relación de sometimiento que el griego expresa.'
- source_word: ἡ ἐπαγγελία
  english_pob_choice: the promise
  chosen_spanish: la promesa
  alternatives_spanish:
  - la promesa dada
  - el prometido don
  lexicon: BDAG
  rationale: El sustantivo significa normalmente "promesa". Se mantiene esa forma directa y transparente.
- source_word: ἐκ πίστεως Ἰησοῦ Χριστοῦ
  english_pob_choice: by faith in Jesus the Messiah
  chosen_spanish: por fe en Jesús el Mesías
  alternatives_spanish:
  - por la fidelidad de Jesús el Mesías
  - por la fe de Jesús el Mesías
  lexicon: BDAG
  rationale: 'Se adopta en el texto principal la lectura objetiva más común: fe en Jesús. Se conserva la alternativa subjetiva en nota porque la construcción griega es realmente disputada y la tensión interpretativa debe permanecer visible.'
- source_word: Χριστοῦ
  english_pob_choice: Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Se sigue la preferencia del proyecto por "Mesías" cuando Χριστός funciona como título. En español, además, la forma con artículo es clara y adecuada al contexto cristológico.
- source_word: δοθῇ
  english_pob_choice: might be given
  chosen_spanish: fuera dada
  alternatives_spanish:
  - pudiera ser dada
  - se diera
  lexicon: BDAG
  rationale: El aoristo pasivo subjuntivo tras ἵνα expresa finalidad. "Fuera dada" comunica bien el valor de propósito en un español solemne y fluido.
- source_word: τοῖς πιστεύουσιν
  english_pob_choice: to those who believe
  chosen_spanish: a los que creen
  alternatives_spanish:
  - a los creyentes
  - a los que están creyendo
  lexicon: BDAG
  rationale: El participio presente describe a quienes están en la acción de creer. "A los que creen" mantiene ese valor verbal y evita reducirlo solo a una etiqueta nominal.
theological_decisions:
- issue: Construcción debatida πίστεως Ἰησοῦ Χριστοῦ
  english_pob_reading: 'objective genitive: faith in Jesus Messiah, with an alternative note for the subjective reading'
  chosen_spanish_reading: 'fe en Jesús el Mesías, con nota alternativa: la fidelidad de Jesús el Mesías'
  alternative_spanish_readings:
  - la fe de Jesús el Mesías
  - la fidelidad de Jesús el Mesías
  rationale: La frase paulina es genuinamente discutida en la exégesis. El texto principal sigue la lectura objetiva por claridad y por continuidad con el sentido habitual de "fe" en el proyecto, pero la nota preserva la lectura subjetiva para no borrar la tensión teológica documentada.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión interpretativa de pistis Christou; una lectura principal puede coexistir con una nota de alternativa.'
translation_notes:
  revision_awareness: No se registraron revisiones aplicadas en el paquete de auditoría; la versión más reciente fue marcada como sin cambios necesarios. El draft sigue la línea aprobada del inglés POB y traslada al español tanto la lectura principal como la alternativa crítica donde corresponde.
  spanish_consistency_notes:
  - Se usó "Escritura" con artículo, en paralelo al inglés POB.
  - Se mantuvo "Mesías" para Χριστός, conforme al estándar del proyecto.
  - Se evitó "SEÑOR" porque el pasaje no contiene κύριος ni una alusión inmediata al nombre divino.
  - Se preservó la ambigüedad de πίστεως Ἰησοῦ Χριστοῦ mediante nota, sin resolverla en el texto principal.
  - '"Todo" se usa con valor inclusivo general, y la nota aclara la alternativa más literal.'
