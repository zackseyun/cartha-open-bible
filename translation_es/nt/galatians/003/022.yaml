  revision_rationale: Se mantiene el contenido del borrador, pero se ajusta el anclaje de la nota alternativa para que corresponda correctamente a la construcción disputada πίστεως Ἰησοῦ Χριστοῦ, y se mejora la fluidez del subjuntivo final con 'sea dada'.
