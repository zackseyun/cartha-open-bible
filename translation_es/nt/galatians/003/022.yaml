    rationale: La nota alternativa corresponde a ἐκ πίστεως Ἰησοῦ Χριστοῦ en conjunto. Anclarla en 'Mesías' puede sugerir erróneamente que la variante afecta al título 'Mesías' y no a la relación genitiva de πίστις.
  - severity: low
    issue: '''fuera dada'' suena algo forzado en español actual'
    rationale: Aunque es gramatical, 'sea dada' o 'se diera' comunica mejor la finalidad del subjuntivo tras ἵνα en un español moderno y eclesialmente legible.
  revised_spanish_text: Pero la Escritura encerró todo[a] bajo el pecado, para que la promesa sea dada por fe[b] en Jesús el Mesías a los que creen.
  revised_footnotes:
  - marker: a
    text: 'O: «todas las cosas».'
    reason: lexical_alternative
