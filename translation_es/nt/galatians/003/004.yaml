translation:
  language: es
  text: ¿Han padecido tantas cosas en vano?—si es que realmente fue en vano[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Han experimentado tantas cosas en vano?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: τοσαῦτα
  english_pob_choice: so many things
  chosen_spanish: tantas cosas
  alternatives_spanish:
  - tantas cosas sufridas
  - muchas cosas
  lexicon: BDAG
  rationale: El neutro plural apunta a una pluralidad amplia de experiencias; «tantas cosas» conserva ese plural sin añadir precisión no presente en el griego. En español, «cosas» es una forma natural de abarcar la experiencia completa que Pablo evoca.
- source_word: ἐπάθετε
  english_pob_choice: did you suffer
  chosen_spanish: padecieron
  alternatives_spanish:
  - experimentaron
  - sufrieron
  lexicon: BDAG
  rationale: πάσχω puede significar «sufrir» o más ampliamente «experimentar». Aquí se conserva la fuerza de padecimiento asociada al contexto paulino, pero en español «padecieron» suena más natural que un calco duro y mantiene la posible ambivalencia entre sufrimiento y experiencia vivida.
- source_word: εἰκῇ
  english_pob_choice: in vain
  chosen_spanish: en vano
  alternatives_spanish:
  - sin resultado
  - para nada
  lexicon: BDAG
  rationale: «En vano» es la equivalencia idiomática más directa y fiel, y preserva la idea de futilidad sin expandir el sentido.
- source_word: εἴ γε
  english_pob_choice: if indeed
  chosen_spanish: si es que
  alternatives_spanish:
  - si realmente
  - si de veras
  lexicon: BDAG
  rationale: La combinación modal introduce una reserva retórica. «Si es que» transmite en español la cautela de Pablo y su tono de corrección retórica.
- source_word: καὶ
  english_pob_choice: really
  chosen_spanish: realmente
  alternatives_spanish:
  - de hecho
  - incluso
  lexicon: BDAG
  rationale: Aquí καὶ intensifica la cláusula condicional. «Realmente» comunica esa intensificación de manera natural en español sin crear una repetición extraña.
- source_word: εἰκῇ
  english_pob_choice: in vain
  chosen_spanish: en vano
  alternatives_spanish:
  - sin resultado
  - para nada
  lexicon: BDAG
  rationale: 'Se conserva la repetición del adverbio para mantener el efecto retórico del griego: la posibilidad inquietante de que todo haya sido inútil.'
translation_notes:
  revision_awareness: El griego SBLGNT presenta una pregunta retórica breve con repetición de εἰκῇ; la versión española conserva esa repetición y el matiz de cautela de εἴ γε καὶ εἰκῇ sin añadir contenido interpretativo. No se introdujeron cambios respecto del contexto de auditoría en inglés; se tomó la alternativa léxica de πάσχω con una solución española que puede abarcar sufrimiento y experiencia.
  spanish_consistency_notes:
  - Se mantuvo «en vano» en ambos lugares para reproducir la repetición enfática del original.
  - Se prefirió «padecieron» en el texto principal y se dejó «experimentaron» como alternativa en nota, siguiendo la tensión léxica documentada en el inglés POB.
  - La puntuación con raya reproduce el matiz retórico de la segunda cláusula en español claro y publicable.
