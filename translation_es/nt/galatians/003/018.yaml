review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el argumento del griego: contrasta la herencia «de la ley» con la que viene «por medio de una promesa», y conserva adecuadamente el matiz de κεχάρισται como dádiva graciosa. Sin embargo, «graciosamente» en español moderno suele oírse como ‘de manera chistosa/agradable’ más que como marcador de gracia inmerecida, y por eso no preserva con suficiente claridad la decisión léxica-teológica documentada en el English POB.'
  spanish_quality_summary: La redacción es clara y natural en general. «Porque» al inicio funciona, pero la mayor necesidad de corrección es léxica y estilística en «se la ha concedido graciosamente», que suena algo forzada y potencialmente ambigua. «Se la ha dado por gracia» comunica mejor el valor de χαρίζομαι en español eclesial legible.
  glossary_alignment: 'No hay conflictos con la terminología del proyecto en nombres divinos o títulos. «Herencia», «la ley», «promesa» y «Dios» están bien alineados. La única desalineación práctica está en la representación de χαρίζομαι: conviene evitar «graciosamente» y usar una formulación que exprese gracia/favor inmerecido con claridad.'
  issues:
  - severity: medium
    issue: «graciosamente» no comunica con claridad el matiz de gracia de κεχάρισται
    rationale: Aunque formalmente puede derivarse de «gracia», en español actual «graciosamente» suele entenderse como ‘con gracia’, ‘agradablemente’ o incluso ‘de manera cómica’. Eso debilita la decisión del English POB de hacer explícita la fuerza de χαρίζομαι.
  - severity: low
    issue: La combinación «ha concedido ... por medio de una promesa» resulta algo pesada
    rationale: No es incorrecta, pero una formulación más llana mejora la legibilidad sin perder precisión semántica ni el contraste ley/promesa.
  revised_spanish_text: Porque si la herencia es de la ley[a], ya no es de una promesa; pero Dios se la ha dado a Abraham por gracia, por medio de una promesa.
  revised_footnotes:
  - marker: a
    text: O «ha concedido a Abraham por promesa».
    reason: lexical_alternative
  revision_rationale: 'Se mantiene el sentido del original y del English POB, pero se sustituye «graciosamente» por «por gracia» para comunicar de manera inequívoca el matiz de χαρίζομαι en español moderno y eclesial. También se reordena la cláusula final para mayor naturalidad: «Dios se la ha dado a Abraham por gracia, por medio de una promesa». No requiere adjudicación adicional.'
