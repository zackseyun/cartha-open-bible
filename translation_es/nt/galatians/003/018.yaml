revisions:
- from: Porque si la herencia es de la ley[a], ya no es de una promesa; pero a Abraham Dios se la ha concedido graciosamente por medio de una promesa.
  to: Porque si la herencia es de la ley[a], ya no es de una promesa; pero Dios se la ha dado a Abraham por gracia, por medio de una promesa.
  rationale: 'Se mantiene el sentido del original y del English POB, pero se sustituye «graciosamente» por «por gracia» para comunicar de manera inequívoca el matiz de χαρίζομαι en español moderno y eclesial. También se reordena la cláusula final para mayor naturalidad: «Dios se la ha dado a Abraham por gracia, por medio de una promesa». No requiere adjudicación adicional.'
