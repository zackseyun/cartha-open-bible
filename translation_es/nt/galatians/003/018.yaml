translation:
  language: es
  text: Porque si la herencia es de la ley[a], ya no es de una promesa; pero Dios se la ha dado a Abraham por gracia, por medio de una promesa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ha concedido a Abraham por promesa».
    reason: lexical_alternative
lexical_decisions:
- source_word: κληρονομία
  english_pob_choice: inheritance
  chosen_spanish: herencia
  alternatives_spanish:
  - heredencia
  lexicon: BDAG
  rationale: «Herencia» es el equivalente natural en español para lo que se recibe como heredero y conserva el sentido paulino de un bien prometido que se obtiene por derecho de filiación o concesión, no por mérito.
- source_word: νόμου
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - ley
  lexicon: BDAG
  rationale: Aunque el griego no tiene artículo aquí, en español el contexto paulino exige identificar la referencia como la Ley mosaica; por eso se usa «la ley» como término técnico y reconocido.
- source_word: ἐκ νόμου
  english_pob_choice: from the law
  chosen_spanish: de la ley
  alternatives_spanish:
  - basada en la ley
  - por la ley
  lexicon: BDAG
  rationale: «De la ley» preserva la idea de origen/fuente del griego ἐκ, manteniendo el contraste con «de una promesa» sin añadir una relación causal más fuerte de la que el texto exige.
- source_word: ἐπαγγελίας
  english_pob_choice: a promise
  chosen_spanish: una promesa
  alternatives_spanish:
  - promesa
  lexicon: BDAG
  rationale: La forma anartrosa se refleja naturalmente en español con «una promesa», que conserva el contraste formal con «la ley» y sugiere la promesa específica dada a Abraham sin sobrecargarla.
- source_word: οὐκέτι
  english_pob_choice: no longer
  chosen_spanish: ya no
  alternatives_spanish:
  - no más
  - ya no es
  lexicon: BDAG
  rationale: '«Ya no» expresa con claridad la exclusión lógica de Pablo: si la herencia es de la ley, entonces deja de ser de promesa.'
- source_word: τῷ δὲ Ἀβραὰμ
  english_pob_choice: but to Abraham
  chosen_spanish: pero a Abraham
  alternatives_spanish:
  - pero para Abraham
  lexicon: BDAG
  rationale: 'El dativo se expresa naturalmente como destinatario: «a Abraham». «Pero» mantiene el giro contrastivo del δέ frente a la primera cláusula.'
- source_word: δι’ ἐπαγγελίας
  english_pob_choice: through a promise
  chosen_spanish: por medio de una promesa
  alternatives_spanish:
  - por una promesa
  - mediante una promesa
  lexicon: BDAG
  rationale: «Por medio de una promesa» conserva el valor instrumental de διά y evita sonar mecánico; además mantiene visible que la promesa es el medio de la concesión divina.
- source_word: κεχάρισται
  english_pob_choice: has graciously given
  chosen_spanish: ha concedido graciosamente
  alternatives_spanish:
  - ha dado gratuitamente
  - ha otorgado por gracia
  lexicon: BDAG
  rationale: El perfecto de χαρίζομαι se refleja con «ha concedido», y el adverbio «graciosamente» preserva el matiz de gracia que el English POB hizo explícito; «otorgado por gracia» es posible, pero «concedido graciosamente» suena más natural y mantiene la fuerza benévola del verbo.
- source_word: ὁ θεός
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios mismo
  lexicon: BDAG
  rationale: Se mantiene el sujeto explícito «Dios» al final de la cláusula, como en el griego, y sin añadir intensificación innecesaria.
theological_decisions:
- issue: Relación ley/promesa como fuentes excluyentes de la herencia
  english_pob_reading: If the inheritance is from the law, it is no longer from a promise.
  chosen_spanish_reading: Si la herencia es de la ley, ya no es de una promesa.
  alternative_spanish_readings:
  - Si la herencia viene de la ley, entonces no proviene de una promesa.
  - Si la herencia procede de la ley, ya no procede de una promesa.
  rationale: 'La redacción española conserva la exclusión lógica del argumento paulino sin suavizarla: la herencia no puede tener simultáneamente a la ley y a la promesa como fuente última.'
  doctrine_reference: Gálatas 3; promesa abrahámica vs. ley mosaica en la argumentación paulina
- issue: Matiz de gracia en κεχάρισται
  english_pob_reading: God has graciously given it to Abraham through a promise.
  chosen_spanish_reading: Dios se la ha concedido graciosamente por medio de una promesa.
  alternative_spanish_readings:
  - Dios se la ha otorgado gratuitamente por medio de una promesa.
  - Dios se la ha dado por gracia por medio de una promesa.
  rationale: Se mantiene el componente de favor inmerecido que el verbo χαρίζομαι aporta al argumento. «Concedido graciosamente» expresa esa benevolencia sin convertir el verbo en una fórmula doctrinal ajena al texto.
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: 'El pasaje muestra alta concordancia con la revisión más reciente: no hubo cambios textuales necesarios en el contenido base. La única cuestión de traducción fue cómo hacer audible en español el matiz de χάρις/χαρίζομαι sin perder naturalidad; por eso se optó por «concedido graciosamente», en línea con el audit trail inglés.'
  spanish_consistency_notes:
  - Se mantiene «la ley» como término técnico paulino y «una promesa» para reproducir el contraste anartro/articular de la cláusula.
  - «Herencia» conserva el campo semántico de recibir como heredero, coherente con el argumento de Gálatas 3.
  - Se usa «por medio de» para διά con instrumentalidad, evitando ambigüedad causal.
  - 'El sujeto divino queda explícito al final: «Dios».'
  - La nota[a] preserva una alternativa léxica válida sin duplicar el contenido principal.
