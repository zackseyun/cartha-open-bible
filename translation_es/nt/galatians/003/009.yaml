revisions:
- from: Así que[a], los que son de fe son bendecidos junto con Abraham, el fiel.
  to: Así que, los que son de fe son bendecidos junto con Abraham, el fiel[a].
  rationale: Se conserva el texto principal prácticamente intacto por su buena fidelidad y legibilidad, pero se reubica la nota para reflejar la ambigüedad documentada de πιστός con Abraham, tal como exige el expediente inglés. Esto preserva mejor la evidencia fuente y la decisión teológica de no sobrerresolver entre 'fiel' y 'creyente'.
