translation:
  language: es
  text: Así que, los que son de fe son bendecidos junto con Abraham, el fiel[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con Abraham, el creyente» o «con Abraham creyente».'
    reason: alternative_reading
lexical_decisions:
- source_word: ὥστε
  english_pob_choice: So then
  chosen_spanish: Así que
  alternatives_spanish:
  - Por tanto
  - De modo que
  lexicon: BDAG
  rationale: Expresa bien el valor inferencial de ὥστε y suena natural en español sin perder la continuidad argumentativa.
- source_word: οἱ ἐκ πίστεως
  english_pob_choice: those who are of faith
  chosen_spanish: los que son de fe
  alternatives_spanish:
  - los que proceden de la fe
  - los que pertenecen a la fe
  lexicon: BDAG
  rationale: Conserva la construcción identitaria del griego; 'de fe' refleja la pertenencia o caracterización sin convertirla en una paráfrasis más libre.
- source_word: πίστεως
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - fidelidad
  - confianza
  lexicon: BDAG
  rationale: En este contexto Pablo habla de personas caracterizadas por la fe; 'fe' sigue el valor doctrinal y terminológico habitual del proyecto.
- source_word: εὐλογοῦνται
  english_pob_choice: are blessed
  chosen_spanish: son bendecidos
  alternatives_spanish:
  - reciben bendición
  - están siendo bendecidos
  lexicon: BDAG
  rationale: Mantiene la voz pasiva y la idea de bendición recibida, no producida por mérito propio.
- source_word: σὺν
  english_pob_choice: along with
  chosen_spanish: junto con
  alternatives_spanish:
  - con
  - al lado de
  lexicon: BDAG
  rationale: '''Junto con'' conserva la idea de compartir la bendición con Abraham de forma clara y natural en español.'
- source_word: τῷ πιστῷ Ἀβραάμ
  english_pob_choice: Abraham, the faithful one
  chosen_spanish: Abraham, el fiel
  alternatives_spanish:
  - Abraham, el creyente
  - Abraham, el fiel Abraham
  lexicon: BDAG
  rationale: '''El fiel'' reproduce de manera concisa el adjetivo con artículo y deja abierta la tensión entre ''fiel'' y ''creyente'', sin resolverla en exceso en el texto principal.'
theological_decisions:
- issue: Cómo rendir πιστός aplicado a Abraham en un contexto dominado por la fe
  english_pob_reading: 'faithful Abraham / Abraham, the faithful one; footnote: “with Abraham the believer” or “with believing Abraham.”'
  chosen_spanish_reading: Abraham, el fiel
  alternative_spanish_readings:
  - Abraham, el creyente
  - con Abraham, el creyente
  rationale: El adjetivo πιστός puede referirse a 'fiel' o 'creyente'. En este versículo, la referencia inmediata es Abraham dentro del argumento sobre la fe; 'el fiel' preserva la ambigüedad útil del original y evita decidir prematuramente entre fidelidad y creencia. Se conserva la posibilidad de lectura alternativa en nota.
  doctrine_reference: Preserve theological tension rather than over-resolving contested readings.
translation_notes:
  revision_awareness: La redacción inglesa revisada pasó de una formulación más compacta (“with faithful Abraham”) a una más natural (“along with Abraham, the faithful one”), destacando mejor la relación de σὺν con Abraham. La versión española sigue esa orientación, pero mantiene la economía sintáctica propia del español bíblico actual.
  spanish_consistency_notes:
  - Se mantiene 'fe' para πίστις conforme al uso del proyecto.
  - '''Bendecidos'' conserva el pasivo teológico de εὐλογοῦνται.'
  - '''Junto con'' refleja σὺν sin volverlo una simple conjunción vaga.'
  - '''El fiel'' preserva la tensión semántica de πιστός sin forzar ''creyente'' en el texto principal.'
