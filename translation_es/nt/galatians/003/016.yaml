base_translation:
  language: en
  yaml_path: translation/nt/galatians/003/016.yaml
  text: Now the promises were spoken to Abraham and to his offspring[a]. It does not say, “And to offsprings,” as referring to many, but as referring to one[c][b], “And to your offspring,” who is Messiah.
