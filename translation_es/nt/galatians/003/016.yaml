translation:
  language: es
  text: 'Ahora bien, las promesas fueron dichas a Abraham y a su descendencia[a]. No dice: «Y a las descendencias»[b], como refiriéndose a muchas, sino como refiriéndose a una sola: «Y a tu descendencia», que es el Mesías[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «semilla» en todo este versículo; el griego usa un sustantivo colectivo singular central para el argumento de Pablo.
    reason: lexical_alternative
  - marker: b
    text: 'Griego: «Y a las semillas»; Pablo resalta la forma plural de la expresión, en contraste con el singular.'
    reason: lexical_alternative
  - marker: c
    text: O «Cristo».
    reason: alternative_reading
lexical_decisions:
- source_word: ἐρρέθησαν
  english_pob_choice: were spoken
  chosen_spanish: fueron dichas
  alternatives_spanish:
  - fueron habladas
  - fueron pronunciadas
  lexicon: BDAG
  rationale: El pasivo de λέγω se expresa de manera natural en español con «fueron dichas», manteniendo la idea de comunicación verbal sin forzar un calco.
- source_word: ἐπαγγελίαι
  english_pob_choice: promises
  chosen_spanish: promesas
  alternatives_spanish:
  - promesas divinas
  - promesa
  lexicon: BDAG
  rationale: «Promesas» es el equivalente directo y claro para el uso paulino de las promesas de Dios.
- source_word: σπέρμα / σπέρματι
  english_pob_choice: offspring
  chosen_spanish: descendencia
  alternatives_spanish:
  - semilla
  - descendencia
  - linaje
  lexicon: BDAG
  rationale: «Descendencia» comunica bien el sustantivo colectivo singular que necesita el argumento de Pablo, y suena natural en español bíblico contemporáneo.
- source_word: τοῖς σπέρμασιν
  english_pob_choice: offsprings
  chosen_spanish: las descendencias
  alternatives_spanish:
  - las semillas
  - los descendientes
  lexicon: BDAG
  rationale: La forma plural debe permanecer visible para que el contraste singular/plural del argumento no se pierda. «Las descendencias» es algo inusual en español, pero conserva esa tensión gramatical como hace el inglés de trabajo.
- source_word: ὡς ἐπὶ πολλῶν
  english_pob_choice: as referring to many
  chosen_spanish: como hablando de muchas
  alternatives_spanish:
  - como refiriéndose a muchas
  - como de muchas
  lexicon: BDAG
  rationale: La frase explica el punto de Pablo y se vierte de modo idiomático, sin perder la relación con el plural.
- source_word: ἀλλ’ ὡς ἐφ’ ἑνός
  english_pob_choice: but as referring to one
  chosen_spanish: sino como de una sola
  alternatives_spanish:
  - sino como hablando de una
  - sino como refiriéndose a una sola
  lexicon: BDAG
  rationale: Se preserva la oposición singular/plural y se mantiene la continuidad con la frase anterior.
- source_word: Χριστός
  english_pob_choice: Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Aquí Χριστός funciona como título, no solo como nombre fijo; por eso se conserva «Mesías», de acuerdo con la convención del proyecto para el valor titular del término.
theological_decisions:
- issue: Identificación del descendiente prometido en la cita paulina
  english_pob_reading: who is Messiah
  chosen_spanish_reading: la cual es el Mesías
  alternative_spanish_readings:
  - la cual es Cristo
  - que es el Mesías
  rationale: El texto de Pablo identifica al descendiente singular prometido con el título mesiánico. En español, «el Mesías» mantiene explícito el sentido titular de Χριστός y evita ocultarlo tras un simple nombre propio.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Mesías cuando funciona como título'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el registro de revisiones del contexto inglés: la oscilación entre «Messiah» y «Christ» fue adjudicada y luego corregida a favor de «Messiah». En español se sigue esa corrección, preservando el valor titular de Χριστός. También se respetó la nota sobre el singular/plural de σπέρμα y la tensión retórica del argumento de Pablo.'
  spanish_consistency_notes:
  - Se usó «descendencia» para σπέρμα / σπέρματι, en coherencia con un sustantivo colectivo singular.
  - Se mantuvo visible el plural en «las descendencias» para reflejar el contraste del griego.
  - Se tradujo Χριστός como «Mesías», no como «Cristo», por su función titular en este versículo.
  - Se conservó una puntuación que marca la explicación de Pablo sin suavizarla en exceso.
  - La nota alternativa sobre «semilla» queda disponible porque el término griego es central para el argumento y puede crear una elección lexical sensible en español.
