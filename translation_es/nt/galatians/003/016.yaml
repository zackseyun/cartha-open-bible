review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego en la estructura principal: las promesas fueron dirigidas a Abraham y a su descendencia; Pablo contrasta singular y plural de σπέρμα; y Χριστός se vierte correctamente como «Mesías» según la política del proyecto. Sin embargo, dos giros españoles debilitan la fidelidad formal del argumento: «como hablando de muchas» no refleja bien el valor explicativo de ὡς ἐπὶ πολλῶν, y «la cual es el Mesías» introduce una relativa femenina marcada por concordancia con «descendencia», cuando el griego cambia a masculino singular (ὅς) para identificar al referente personal. Conviene ajustar ambos puntos.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «las descendencias» suena forzado y solo se justifica por el argumento paulino; por eso el apoyo de nota es importante. Además, «como hablando de muchas» resulta menos natural y menos preciso que «como refiriéndose a muchas». «La cual es el Mesías» es comprensible, pero en español suena algo rígido y puede oscurecer que Pablo apunta a una persona; «que es el Mesías» fluye mejor sin perder precisión.
  glossary_alignment: 'La terminología clave está bien alineada: ἐπαγγελίαι → «promesas»; σπέρμα → «descendencia» con nota alternativa «semilla»; plural visible en «descendencias» con nota sobre «semillas»; Χριστός → «Mesías» con nota alternativa «Cristo». No hay conflicto con las directrices del proyecto.'
  issues:
  - severity: medium
    issue: «como hablando de muchas» no representa bien ὡς ἐπὶ πολλῶν
    rationale: El griego expresa referencia/aplicación a muchos, no el acto de hablar. «Como refiriéndose a muchas» preserva mejor el punto explicativo de Pablo y suena más natural en español.
  - severity: medium
    issue: «la cual es el Mesías» oscurece el cambio a referente personal masculino en ὅς ἐστιν Χριστός
    rationale: La relativa femenina concuerda con «descendencia», pero el griego usa masculino singular para señalar a una persona. «que es el Mesías» comunica mejor la identificación personal sin forzar la gramática española.
  - severity: low
    issue: La nota b dice «forma singular/plural del enunciado»
    rationale: La idea es entendible, pero puede expresarse con más precisión como «la forma plural de la expresión» o «del término», ya que Pablo contrasta la formulación singular y plural.
