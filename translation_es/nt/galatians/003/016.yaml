revisions:
- from: 'Ahora bien, las promesas fueron dichas a Abraham y a su descendencia[a]. No dice: «Y a las descendencias»[b], como hablando de muchas, sino como de una sola: «Y a tu descendencia», la cual es el Mesías[c].'
  to: 'Ahora bien, las promesas fueron dichas a Abraham y a su descendencia[a]. No dice: «Y a las descendencias»[b], como refiriéndose a muchas, sino como refiriéndose a una sola: «Y a tu descendencia», que es el Mesías[c].'
  rationale: 'Se hicieron ajustes menores para reflejar con más precisión el argumento griego y mejorar la naturalidad del español: «como refiriéndose» expresa mejor la idea de referencia a muchos/uno; «que es el Mesías» evita una relativa femenina rígida y deja más clara la identificación personal del descendiente prometido. Se afinó también la redacción de la nota b.'
