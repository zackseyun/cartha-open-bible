review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: mantiene la formulación relativamente literal de ἐξ ἔργων νόμου, conserva la universalidad de Ὅσοι / πᾶς ὃς, y traduce con fidelidad la cita escrituraria. Sin embargo, la nota [b] omite la negación οὐκ, lo que invierte el sentido del texto citado en la glosa literal.'
  spanish_quality_summary: El español es claro y de registro bíblico digno. «Porque todos los que son de las obras de la ley» suena algo rígido, pero es defendible por la decisión de preservar la tensión paulina. «Escrito está» y «permanece» funcionan bien. El único problema material es la nota [b], que necesita corrección para no contradecir el texto principal.
  glossary_alignment: No hay conflicto con la terminología del proyecto. «La ley», «maldición» y «Maldito» están bien alineados. La elección de «son de las obras de la ley» sigue correctamente la racionalidad léxica y teológica documentada por el POB inglés.
  issues:
  - severity: high
    issue: La nota al pie [b] omite la negación de οὐκ.
    rationale: 'La nota dice: «permanece en todas las cosas...», pero el griego y el texto principal dicen «no permanece...». Esto altera de forma sustancial el significado de la cita y debe corregirse.'
  - severity: low
    issue: La nota [b] no reproduce explícitamente «todo el que».
    rationale: No es un error grave, porque la nota está enfocada en la alternativa léxica para ἐμμένει y el segmento posterior, pero una formulación más completa mejora la precisión de la glosa literal.
  revised_spanish_text: 'Porque todos los que son de las obras de la ley están bajo maldición[a], pues escrito está: «Maldito todo el que no permanece[b] en todas las cosas escritas en el libro de la ley, para hacerlas».'
  revised_footnotes:
  - marker: a
    text: O “dependen de las obras de la ley”.
    reason: alternative_reading
  - marker: b
    text: Lit. “todo el que no permanece en todas las cosas escritas en el libro de la ley, para hacerlas”.
    reason: lexical_alternative
  revision_rationale: Se mantiene el texto principal, porque es fiel al griego y a las decisiones auditadas del POB. Solo se corrige la nota [b] para incluir la negación omitida y reflejar con precisión la glosa literal del original.
