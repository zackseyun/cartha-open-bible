translation:
  language: es
  text: 'Porque todos los que son de las obras de la ley están bajo maldición[a], pues escrito está: «Maldito todo el que no permanece[b] en todas las cosas escritas en el libro de la ley, para hacerlas».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “dependen de las obras de la ley”.
    reason: alternative_reading
  - marker: b
    text: Lit. “todo el que no permanece en todas las cosas escritas en el libro de la ley, para hacerlas”.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὅσοι
  english_pob_choice: For all who
  chosen_spanish: Porque todos los que
  alternatives_spanish:
  - Todos los que
  - Pues todos los que
  lexicon: BDAG
  rationale: Conserva el alcance universal del plural y la fuerza explicativa de γάρ. «Porque» comunica bien esa conexión lógica en español sin perder naturalidad.
- source_word: ἐξ ἔργων νόμου
  english_pob_choice: are of works of the law
  chosen_spanish: son de las obras de la ley
  alternatives_spanish:
  - dependen de las obras de la ley
  - se rigen por las obras de la ley
  lexicon: BDAG
  rationale: Se mantiene una formulación relativamente literal para no resolver de antemano la tensión paulina. «Son de» conserva la idea de pertenencia o caracterización por medio de la expresión fuente.
- source_word: νόμου
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - Ley
  lexicon: BDAG
  rationale: La forma con artículo es la más natural y fiel al marco judío-covenantal del pasaje.
- source_word: ὑπὸ κατάραν
  english_pob_choice: under a curse
  chosen_spanish: bajo maldición
  alternatives_spanish:
  - bajo una maldición
  - bajo el maleficio
  lexicon: BDAG
  rationale: «Bajo maldición» es la manera más natural en español para expresar sujeción a una maldición. Se evita «el maleficio», que cambia el registro y la noción bíblica.
- source_word: γέγραπται
  english_pob_choice: it is written
  chosen_spanish: escrito está
  alternatives_spanish:
  - está escrito
  - porque está escrito
  lexicon: BDAG
  rationale: La inversión es una fórmula bíblica tradicional y clara en español, sin alejarse del valor de autoridad escritural del perfecto pasivo.
- source_word: Ἐπικατάρατος
  english_pob_choice: Cursed
  chosen_spanish: Maldito
  alternatives_spanish:
  - Maldito
  - Anatema
  lexicon: BDAG
  rationale: «Maldito» reproduce con fuerza directa la declaración de maldición. «Anatema» sería demasiado técnico y menos transparente en este contexto.
- source_word: πᾶς ὃς
  english_pob_choice: everyone who
  chosen_spanish: todo el que
  alternatives_spanish:
  - todo aquel que
  - quienquiera que
  lexicon: BDAG
  rationale: Equivale de modo natural al valor universal del griego singular representativo. «Todo el que» es idiomático y preciso.
- source_word: ἐμμένει
  english_pob_choice: remain in
  chosen_spanish: permanece
  alternatives_spanish:
  - persiste
  - se mantiene
  - continúa
  lexicon: BDAG
  rationale: «Permanece» conserva con mayor cercanía la continuidad y adhesión duradera que exige ἐμμένει. Se evita «cumple» porque resolvería demasiado el sentido.
- source_word: πᾶσιν τοῖς γεγραμμένοις
  english_pob_choice: in all the things written
  chosen_spanish: en todas las cosas escritas
  alternatives_spanish:
  - en todo lo escrito
  - en todas las cosas que están escritas
  lexicon: BDAG
  rationale: Se sigue de cerca la amplitud de πᾶσιν sin suavizarla. «Cosas escritas» preserva la referencia al contenido textual, aunque suene algo más formal.
- source_word: ἐν τῷ βιβλίῳ τοῦ νόμου
  english_pob_choice: in the book of the law
  chosen_spanish: en el libro de la ley
  alternatives_spanish:
  - en el rollo de la ley
  lexicon: BDAG
  rationale: «Libro» es la equivalencia natural en español para βιβλίον en este giro. «Rollo» es históricamente posible, pero menos idiomático y no necesario para la traducción principal.
- source_word: τοῦ ποιῆσαι αὐτά
  english_pob_choice: to do them
  chosen_spanish: para hacerlas
  alternatives_spanish:
  - para practicarlas
  - para cumplirlas
  lexicon: BDAG
  rationale: «Para hacerlas» reproduce con sencillez el infinitivo final y el pronombre neutro plural. «Cumplirlas» interpretaría más de lo que el griego dice.
theological_decisions:
- issue: Interpretación de ἐξ ἔργων νόμου
  english_pob_reading: Rendered relatively literally as “are of works of the law” rather than interpretively as “rely on works of the law.”
  chosen_spanish_reading: Traducido relativamente literal como «son de las obras de la ley», en vez de interpretarlo como «dependen de las obras de la ley».
  alternative_spanish_readings:
  - dependen de las obras de la ley
  - confían en las obras de la ley
  rationale: La expresión paulina es teológicamente cargada y admite debate. Mantener una formulación literal preserva la tensión interpretativa sin introducir una explicación doctrinal en la línea principal.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla de forma interpretativa.
- issue: Alcance de κατάρα / maldición
  english_pob_reading: under a curse
  chosen_spanish_reading: bajo maldición
  alternative_spanish_readings:
  - bajo una maldición
  - bajo maldición divina
  rationale: Se conserva el sentido judicial/escriturario del término sin añadir especificación que el texto no explicita. «Maldición» mantiene la fuerza bíblica del pasaje.
  doctrine_reference: El lenguaje de juicio del texto debe permanecer sin atenuación.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del POB inglés, que cambió «continue in» por «remain in» para reflejar con mayor cercanía ἐμμένει. Por eso la línea española usa «permanece» y mantiene la estructura formal del enunciado y de la cita.
  spanish_consistency_notes:
  - Se mantuvo «la ley» con artículo, coherente con el patrón POB y con el marco paulino.
  - Se prefirió «Maldito» en la cita para conservar el tono de cita bíblica y evitar tecnicismos innecesarios.
  - Se respetó el paralelismo de la cláusula final con una traducción directa de τοῦ ποιῆσαι αὐτά como «para hacerlas».
  - La nota a se ubica en la expresión «son de las obras de la ley» para señalar la alternativa interpretativa reconocida por el POB inglés.
