translation:
  language: es
  text: 'Ahora bien, esto es lo que quiero decir: la ley[a], que llegó cuatrocientos treinta años después, no invalida un pacto previamente ratificado por Dios, para dejar sin efecto[b] la promesa.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no anula».
    reason: lexical_alternative
  - marker: b
    text: O «para anular» o «para abolir».
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦτο δὲ λέγω
  english_pob_choice: Now this is what I mean
  chosen_spanish: Ahora bien, esto es lo que quiero decir
  alternatives_spanish:
  - Ahora digo esto
  - Esto es lo que estoy diciendo
  lexicon: BDAG
  rationale: La frase introduce una explicación discursiva de Pablo; en español, «esto es lo que quiero decir» comunica con naturalidad ese valor explicativo sin perder el presente discursivo del griego.
- source_word: διαθήκην
  english_pob_choice: a covenant
  chosen_spanish: un pacto
  alternatives_spanish:
  - una alianza
  - un convenio
  lexicon: BDAG
  rationale: Aunque la POB inglesa eligió «covenant» por el trasfondo abrahámico, en español «pacto» es el término más claro y eclesialmente inteligible para διαθήκη en este contexto; mantiene el sentido relacional y jurídico sin desplazarse a «testamento».
- source_word: προκεκυρωμένην
  english_pob_choice: previously ratified
  chosen_spanish: previamente ratificado
  alternatives_spanish:
  - previamente confirmado
  - ya validado de antemano
  lexicon: BDAG
  rationale: El participio perfecto con prefijo expresa una ratificación anterior ya establecida; «previamente ratificado» conserva la fuerza legal y la anterioridad temporal.
- source_word: ὑπὸ τοῦ θεοῦ
  english_pob_choice: by God
  chosen_spanish: por Dios
  alternatives_spanish:
  - por Dios mismo
  lexicon: BDAG
  rationale: Es una frase agentiva directa; «por Dios» reproduce la sencillez del griego sin añadir énfasis no presente en el texto.
- source_word: ὁ ... γεγονὼς νόμος
  english_pob_choice: the law, which came
  chosen_spanish: la ley, que llegó
  alternatives_spanish:
  - la ley, que vino
  - la ley, que apareció
  lexicon: BDAG
  rationale: El participio γεγονὼς describe la llegada histórica posterior de la ley; «que llegó» es idiomático en español y conserva la comparación temporal.
- source_word: μετὰ τετρακόσια καὶ τριάκοντα ἔτη
  english_pob_choice: four hundred and thirty years later
  chosen_spanish: cuatrocientos treinta años después
  alternatives_spanish:
  - 430 años después
  - después de cuatrocientos treinta años
  lexicon: BDAG
  rationale: La expresión temporal se vierte con naturalidad en español como «después», manteniendo el intervalo histórico marcado por μετά.
- source_word: οὐκ ἀκυροῖ
  english_pob_choice: does not invalidate
  chosen_spanish: no invalida
  alternatives_spanish:
  - no anula
  - no deja sin efecto
  lexicon: BDAG
  rationale: «Invalida» comunica bien la fuerza jurídica/efectiva de ἀκυρόω en contraste con el pacto ya ratificado; se mantiene la tensión legal sin suavizarla.
- source_word: εἰς τὸ καταργῆσαι
  english_pob_choice: so as to abolish
  chosen_spanish: de modo que anule
  alternatives_spanish:
  - para abolir
  - para dejar sin efecto
  lexicon: BDAG
  rationale: El infinitivo de propósito/resulto expresa finalidad; «de modo que anule» conserva el peso de καταργέω sin requerir una formulación excesivamente literal o dura en español.
- source_word: τὴν ἐπαγγελίαν
  english_pob_choice: the promise
  chosen_spanish: la promesa
  alternatives_spanish:
  - la promesa hecha
  - el compromiso
  lexicon: BDAG
  rationale: «Promesa» es la correspondencia estándar y precisa para ἐπαγγελία en el argumento paulino sobre Abraham.
theological_decisions:
- issue: διαθήκη en el argumento paulino
  english_pob_reading: covenant
  chosen_spanish_reading: pacto
  alternative_spanish_readings:
  - alianza
  - testamento
  rationale: En este versículo, Pablo contrasta la promesa dada por Dios con la ley posterior. «Pacto» preserva la dimensión relacional y jurídico-salvífica del pasaje en español, sin introducir una lectura testamentaria ajena al contexto.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological tension rather than resolve it beyond the text'
translation_notes:
  revision_awareness: La redacción sigue el texto griego SBLGNT y el auditorial inglés, pero ajusta la elección de διαθήκη a «pacto» por claridad y fidelidad semántica en español; no se observan revisiones aplicadas en el registro inglés reciente.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y no se introduce «Señor» como sustituto del nombre divino.
  - Se conserva el contraste jurídico entre «pacto», «no invalida» y «promesa» para reflejar la argumentación paulina.
  - La puntuación reproduce una sola oración con dos segmentos explicativos, acorde al griego y al inglés auditado.
