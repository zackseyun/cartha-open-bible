translation:
  language: es
  text: ¿Por qué, entonces, la ley? Fue añadida[a] por causa de las transgresiones[b], hasta que viniera la simiente[c] a quien había sido hecha la promesa, habiendo sido ordenada[d] por medio de ángeles, por mano de un mediador.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «agregada».
    reason: lexical_alternative
  - marker: b
    text: «Por causa de las transgresiones» puede significar para restringirlas, exponerlas o tratarlas; el griego no lo especifica más estrechamente.
    reason: alternative_reading
  - marker: c
    text: O «descendencia» o «descendiente».
    reason: lexical_alternative
  - marker: d
    text: O «establecida» o «dispuesta».
    reason: lexical_alternative
lexical_decisions:
- source_word: Τί οὖν ὁ νόμος;
  english_pob_choice: Why then the law?
  chosen_spanish: ¿Por qué, entonces, la ley?
  alternatives_spanish:
  - ¿Qué, pues, la ley?
  - ¿Qué es, entonces, la ley?
  lexicon: τίς; οὖν; νόμος
  rationale: La pregunta es elíptica y en Pablo funciona de modo idiomático para preguntar por la función o propósito de la ley, no por una definición abstracta. «¿Por qué, entonces, la ley?» conserva ese valor argumental en español natural.
- source_word: νόμος
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - Ley
  lexicon: νόμος
  rationale: En este contexto paulino se refiere a la ley mosaica como entidad reconocible. Mantener el artículo ayuda a conservar el valor específico del término sin volverlo un nombre abstracto.
- source_word: τῶν παραβάσεων χάριν
  english_pob_choice: because of transgressions
  chosen_spanish: por causa de las transgresiones
  alternatives_spanish:
  - a causa de las transgresiones
  - con referencia a las transgresiones
  lexicon: χάριν; παράβασις
  rationale: La preposición con genitivo admite razón o finalidad. «Por causa de» conserva la ambigüedad del griego sin decidir si la ley fue dada para restringir, revelar o multiplicar las transgresiones.
- source_word: προσετέθη
  english_pob_choice: was added
  chosen_spanish: fue añadida
  alternatives_spanish:
  - fue agregada
  - se le añadió
  lexicon: προστίθημι
  rationale: El aoristo pasivo expresa que la ley fue añadida como algo suplementario. «Fue añadida» es fiel, claro y mantiene la relación subordinada en el argumento.
- source_word: ἄχρις οὗ ἔλθῃ
  english_pob_choice: until ... should come
  chosen_spanish: hasta que viniera
  alternatives_spanish:
  - hasta que llegara
  - hasta que venga
  lexicon: ἄχρις; ἔρχομαι
  rationale: La cláusula marca un límite temporal esperado desde la perspectiva de la adición de la ley. «Viniera» reproduce bien el valor prospectivo del subjuntivo sin sonar forzado.
- source_word: τὸ σπέρμα
  english_pob_choice: the seed
  chosen_spanish: la descendencia
  alternatives_spanish:
  - la simiente
  - el descendiente
  - la posteridad
  lexicon: σπέρμα
  rationale: En español «descendencia» comunica el referente singular-colectivo con mayor naturalidad que «simiente», pero conserva el vínculo con la promesa abrahámica. Se mantiene la tensión entre un sentido colectivo y uno focalizado en una figura singular.
- source_word: ᾧ ἐπήγγελται
  english_pob_choice: to whom the promise had been made
  chosen_spanish: a la que había sido hecha la promesa
  alternatives_spanish:
  - a quien se le había hecho la promesa
  - a quien había sido prometido
  lexicon: ἐπαγγέλλομαι
  rationale: El relativo dativo se traduce de forma explícita en español. La voz pasiva refleja que la promesa fue hecha previamente y permanece como antecedente del argumento, sin añadir contenido que el griego no especifica.
- source_word: διαταγεὶς
  english_pob_choice: having been ordained
  chosen_spanish: habiendo sido ordenada
  alternatives_spanish:
  - habiendo sido establecida
  - habiendo sido dispuesta
  lexicon: διατάσσω
  rationale: El participio alude a la institución o disposición formal de la ley. «Habiendo sido ordenada» sigue de cerca la opción revisada del inglés POB («ordained») y mantiene un registro más formal.
- source_word: δι’ ἀγγέλων
  english_pob_choice: through angels
  chosen_spanish: por medio de ángeles
  alternatives_spanish:
  - a través de ángeles
  - mediante ángeles
  lexicon: ἄγγελος
  rationale: διά con genitivo expresa mediación o agencia. «Por medio de ángeles» conserva con claridad el carácter mediado de la entrega de la ley.
- source_word: ἐν χειρὶ μεσίτου
  english_pob_choice: by the hand of a mediator
  chosen_spanish: en mano de un mediador
  alternatives_spanish:
  - por mano de un mediador
  - por la mano de un mediador
  lexicon: χείρ; μεσίτης
  rationale: La expresión griega es concreta e idiomática. «En mano de un mediador» preserva la imagen literal sin perder inteligibilidad en español; se evita sustituirla por una paráfrasis más abstracta como «por medio de un mediador» en el texto principal.
theological_decisions:
- issue: Sentido de «por causa de las transgresiones»
  english_pob_reading: Rendered broadly as 'because of transgressions' without specifying whether the law was given to restrain, expose, or multiply transgressions.
  chosen_spanish_reading: Se traduce «por causa de las transgresiones» sin especificar si la ley las restringe, las expone o las incrementa.
  alternative_spanish_readings:
  - para restringir las transgresiones
  - para poner al descubierto las transgresiones
  - con respecto a las transgresiones
  rationale: La frase de Pablo es concisa y debatida. La versión española conserva esa tensión y evita resolverla más allá de lo que afirma el griego.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
- issue: Alcance de σπέρμα en el argumento paulino
  english_pob_reading: Used 'seed' in the main text.
  chosen_spanish_reading: Se usa «descendencia» en el texto principal, manteniendo la posibilidad de un sentido singular y colectivo.
  alternative_spanish_readings:
  - simiente
  - descendiente
  - posteridad
  rationale: En español «descendencia» es más natural que «simiente», pero sigue enlazando con la promesa a Abraham y no elimina el valor argumental singular-colectivo del término.
  doctrine_reference: Primacía de la lengua original sobre la tradición de traducción; consistencia de términos clave o excepción documentada.
- issue: Mediación angélica y mediador
  english_pob_reading: '''having been ordained through angels by the hand of a mediator.'''
  chosen_spanish_reading: 'Se conserva la mediación doble: por medio de ángeles y en mano de un mediador.'
  alternative_spanish_readings:
  - a través de ángeles y por medio de un mediador
  - mediante ángeles y mediante un mediador
  rationale: El griego presenta la entrega de la ley como un acto mediado, no directo. La formulación española mantiene esa estructura sin aclararla indebidamente.
  doctrine_reference: No borrar una mediación expresada por el texto.
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado de «put into effect» a «ordained» para διαταγεὶς; el español sigue esa revisión con «habiendo sido ordenada», conservando un registro formal y el sentido de institución/disposición. También se mantuvo la ambigüedad de τῶν παραβάσεων χάριν y se decidió no suavizar la mediación concreta de ἐν χειρὶ μεσίτου.
  spanish_consistency_notes:
  - Se mantiene «ley» para νόμος en coherencia paulina.
  - Se evita «Cristo» porque el verso no contiene χριστός; no hay motivo para introducir un título no presente.
  - Se conserva el singular colectivo implícito de σπέρμα con «descendencia», sin borrar el eco abrahámico.
  - Se preserva la imagen concreta de «en mano de un mediador» para no diluir el griego.
  - La puntuación reproduce la pregunta inicial y la cadena participial final como en el original.
