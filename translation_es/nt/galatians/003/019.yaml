revisions:
- from: ¿Por qué, entonces, la ley? Fue añadida[a] por causa de las transgresiones[b], hasta que viniera la descendencia[c] a la que había sido hecha la promesa, habiendo sido ordenada[d] por medio de ángeles, en mano de un mediador.
  to: ¿Por qué, entonces, la ley? Fue añadida[a] por causa de las transgresiones[b], hasta que viniera la simiente[c] a quien había sido hecha la promesa, habiendo sido ordenada[d] por medio de ángeles, por mano de un mediador.
  rationale: Se revisa para mejorar la fidelidad al argumento léxico de σπέρμα con «simiente», corregir el modismo «ἐν χειρὶ μεσίτου» con un español natural y preciso («por mano de un mediador»), y afinar la nota sobre «por causa de las transgresiones» para que refleje mejor la ambigüedad documentada en el expediente inglés. Los demás elementos del borrador son sustancialmente fieles y pueden mantenerse.
