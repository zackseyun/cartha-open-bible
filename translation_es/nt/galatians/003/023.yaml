translation:
  language: es
  text: Pero antes de que viniera la fe[a], éramos custodiados bajo la ley[d][b][c], encerrados hasta la fe que iba a ser revelada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «antes de que viniera la fe»; el griego incluye el artículo y puede apuntar a la era de la fe inaugurada con Cristo.
    reason: alternative_reading
  - marker: b
    text: O «guardados» para «custodiados».
    reason: lexical_alternative
  - marker: c
    text: O «aprisionados» o «encerrados por completo» para «encerrados».
    reason: lexical_alternative
  - marker: d
    text: πίστις también puede significar «fidelidad» o «confianza», aunque aquí «fe» encaja mejor en el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: Πρὸ τοῦ ... ἐλθεῖν
  english_pob_choice: before ... came
  chosen_spanish: antes de que viniera
  alternatives_spanish:
  - antes de la venida de
  - antes de que llegara
  lexicon: BDAG
  rationale: El infinitivo articular con πρό expresa relación temporal. «Antes de que viniera» conserva la temporalidad con español natural y sin volver la frase demasiado rígida.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Ahora bien
  - Y
  lexicon: BDAG
  rationale: δέ marca un giro suave de contraste con el argumento anterior; «Pero» es la opción más directa y natural en español.
- source_word: τὴν πίστιν
  english_pob_choice: faith
  chosen_spanish: la fe
  alternatives_spanish:
  - la fe
  - la fidelidad
  - la confianza
  lexicon: BDAG
  rationale: Se mantiene «la fe» por defecto del proyecto y por coherencia con el contexto salvífico de Gálatas 3. La presencia del artículo puede sugerir una realidad histórico-salvífica, pero en español conviene conservar la forma breve sin sobreinterpretar.
- source_word: ὑπὸ νόμον
  english_pob_choice: under the law
  chosen_spanish: bajo la ley
  alternatives_spanish:
  - bajo la ley
  - bajo la Ley
  - bajo la norma
  lexicon: BDAG
  rationale: La expresión paulina se refiere al régimen o autoridad de la ley mosaica. «Bajo la ley» es claro y fiel; se evita introducir terminología eclesiástica ajena al original.
- source_word: ἐφρουρούμεθα
  english_pob_choice: were being guarded
  chosen_spanish: estábamos siendo guardados
  alternatives_spanish:
  - éramos guardados
  - estábamos custodiados
  - estábamos siendo custodiados
  lexicon: BDAG
  rationale: El imperfecto pasivo indica acción continua en pasado. «Estábamos siendo guardados» preserva el aspecto progresivo y el verbo de vigilancia de φρουρέω.
- source_word: συγκλειόμενοι
  english_pob_choice: confined
  chosen_spanish: encerrados
  alternatives_spanish:
  - confinados
  - aprisionados
  - encerrados y confinados
  lexicon: BDAG
  rationale: El participio añade la idea de quedar contenido o encerrado. «Encerrados» comunica bien la restricción sin sonar excesivamente literal o anticuado.
- source_word: εἰς
  english_pob_choice: until
  chosen_spanish: hasta
  alternatives_spanish:
  - hasta que
  - para
  lexicon: BDAG
  rationale: En este contexto εἰς expresa dirección temporal hacia el momento de la revelación. «Hasta» refleja bien ese límite temporal, siguiendo el ajuste de la revisión inglesa.
- source_word: τὴν μέλλουσαν πίστιν
  english_pob_choice: the faith that was about to be revealed
  chosen_spanish: la fe que había de ser revelada
  alternatives_spanish:
  - la fe que iba a ser revelada
  - la fe que estaba por revelarse
  - la fe que sería revelada
  lexicon: BDAG
  rationale: Se conserva la cualidad futura de μέλλουσαν con una construcción natural en español. «Había de ser revelada» mantiene un tono digno y el pasivo revelatorio del texto.
- source_word: ἀποκαλυφθῆναι
  english_pob_choice: to be revealed
  chosen_spanish: ser revelada
  alternatives_spanish:
  - ser descubierta
  - darse a conocer
  lexicon: BDAG
  rationale: El verbo pasivo de ἀποκαλύπτω se traduce con «ser revelada», que preserva el vocabulario revelatorio paulino y evita diluir el matiz teológico.
theological_decisions:
- issue: 'Sentido de πίστις: fe individual o realidad histórico-salvífica'
  english_pob_reading: Rendered as 'faith' while preserving the salvation-historical sense in context.
  chosen_spanish_reading: Se traduce «la fe» y se conserva, en el contexto, la posible referencia a la irrupción de una nueva etapa salvífica.
  alternative_spanish_readings:
  - la fidelidad
  - la fe como nuevo orden del pacto
  rationale: En Gálatas 3, Pablo contrapone la etapa anterior a la venida de Cristo con la que sigue. El artículo puede apuntar a una realidad salvífica inaugurada, pero no conviene explicitar más de lo que el verso dice. «La fe» mantiene la tensión sin resolverla artificialmente.
  doctrine_reference: Preservar la tensión léxica y teológica de πίστις sin convertirla en una paráfrasis doctrinal.
- issue: Valor de εἰς con el participio final
  english_pob_reading: Changed 'for the faith' to 'until the faith' to better reflect εἰς here in context as a temporal/resultative movement toward the coming revelation of faith.
  chosen_spanish_reading: «Hasta» se usa con valor temporal, indicando el límite previo a la revelación de la fe.
  alternative_spanish_readings:
  - para la fe
  - hacia la fe
  rationale: La revisión inglesa muestra que εἰς aquí no conviene leerlo como mera finalidad abstracta, sino como orientación temporal hacia el momento de la revelación. «Hasta» expresa mejor ese límite sin añadir interpretación innecesaria.
  doctrine_reference: Mantener la relación temporal del texto sin borrar el matiz de movimiento hacia la revelación.
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó «for the faith» por «until the faith» para reflejar mejor εἰς en contexto como orientación temporal hacia la revelación venidera. La versión española sigue ese ajuste con «hasta» y conserva el resto de la estructura y del ritmo de la oración.
  spanish_consistency_notes:
  - Se mantiene «la fe» conforme al uso estándar del proyecto para πίστις, dejando abierta la posibilidad de un matiz histórico-salvífico en nota.
  - Se evita «SEÑOR» u այլ masking conventions, no aplicables aquí; tampoco se introduce terminología tradicional que desplace el valor paulino de «ley».
  - «Bajo la ley» y «encerrados» conservan el tono restrictivo de los verbos griegos sin endurecer la frase más de lo que exige el contexto.
  - La secuencia «estábamos siendo guardados» preserva el imperfecto pasivo y el carácter continuo de la acción.
