    rationale: Aunque intenta reproducir el imperfecto pasivo progresivo, en español suena forzado. «Éramos custodiados» o «estábamos bajo custodia» expresa mejor la acción continua pasada con buena legibilidad y mantiene el campo semántico de φρουρέω.
  - severity: low
