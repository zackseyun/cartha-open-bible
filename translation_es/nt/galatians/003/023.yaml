revisions:
- from: Pero antes de que viniera la fe[a], nosotros estábamos siendo guardados bajo la ley[b][c][d], encerrados hasta la fe que había de ser revelada.
  to: Pero antes de que viniera la fe[a], éramos custodiados bajo la ley[d][b][c], encerrados hasta la fe que iba a ser revelada.
  rationale: 'Se hizo una reparación menor de estilo y fidelidad idiomática: «éramos custodiados» representa mejor ἐφρουρούμεθα en español natural que «estábamos siendo guardados», sin perder el matiz pasivo ni la continuidad pasada. Se mantuvo «la fe» para πίστις y «hasta» para εἰς según la revisión auditada. También se ajustaron las notas para que correspondan exactamente al texto revisado y conserven las alternativas léxicas relevantes.'
