    rationale: Si el texto principal usa «guardados», la alternativa «custodiados» está bien, pero al mejorar el texto conviene ajustar la nota para que la alternativa siga siendo significativa y no redundante.
  - severity: low
    issue: La combinación «encerrados hasta la fe» resulta algo rígida
    rationale: No es infiel, pero «encerrados hasta que fuera revelada la fe» o mantener la construcción relativa con mejor ritmo mejora la naturalidad. Dado que el inglés auditado conserva «until the faith...», se puede mantener «hasta la fe que iba a ser revelada» sin problema.
