  text: Πρὸ τοῦ δὲ ἐλθεῖν τὴν πίστιν ὑπὸ νόμον ἐφρουρούμεθα ⸀συγκλειόμενοι εἰς τὴν μέλλουσαν πίστιν ἀποκαλυφθῆναι.
base_translation:
  language: en
  yaml_path: translation/nt/galatians/003/023.yaml
  text: But before faith came[a], we were being guarded under the law[d][c][b], confined until the faith that was about to be revealed.
  footnotes:
  - marker: a
    text: Or 'before the faith came'; the Greek includes the article and may point to the era of faith inaugurated with Christ.
    reason: alternative_reading
  - marker: b
    text: Or 'held in custody' for 'were being guarded.'
    reason: lexical_alternative
  - marker: c
    text: Or 'imprisoned' or 'shut up' for 'confined.'
    reason: lexical_alternative
  - marker: d
    text: πίστις can also mean 'faithfulness' or 'trust,' though 'faith' best fits the context here.
    reason: lexical_alternative
