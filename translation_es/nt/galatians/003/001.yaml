revisions:
- from: ¡Oh, gálatas insensatos[a], quién les fascinó[b], a ustedes, ante cuyos ojos Jesucristo[c] fue presentado públicamente como crucificado[d]!
  to: ¡Oh, gálatas insensatos[a], ¿quién los fascinó[b], ante cuyos ojos Jesús el Mesías[c] fue presentado públicamente como crucificado[d]?
  rationale: Se corrige la puntuación española, se elimina la redundancia «a ustedes», y se restituye «Jesús el Mesías» para seguir la decisión léxica y teológica auditada del POB de traducir Χριστός como título significativo en este versículo. Se mantienen las alternativas léxicas documentadas para ἐβάσκανεν y προεγράφη/ἐσταυρωμένος.
