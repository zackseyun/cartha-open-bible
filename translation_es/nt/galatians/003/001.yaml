source:
  edition: SBLGNT
  text: Ὦ ἀνόητοι Γαλάται, τίς ὑμᾶς ⸀ἐβάσκανεν, οἷς κατ’ ὀφθαλμοὺς Ἰησοῦς Χριστὸς ⸀προεγράφη ἐσταυρωμένος;
base_translation:
  language: en
  yaml_path: translation/nt/galatians/003/001.yaml
  text: You foolish Galatians[a], who has bewitched you[c][b], before whose eyes Jesus Messiah was publicly portrayed as crucified?
  footnotes:
  - marker: a
    text: 'Or: ''who has deceived you?'' The verb literally evokes bewitching or casting a spell.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'Jesus Christ'; translated here as 'Jesus the Messiah' to preserve the title's meaning.
    reason: lexical_alternative
  - marker: c
    text: 'Or: ''was clearly set forth'' or ''was publicly placarded as crucified.'''
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4
    prompt_id: nt_draft_v1
    prompt_sha256: 5caa2217f417df1ae78e9260f2a38581f0c6d539e2e5212ea38966912c0c8d66
    timestamp: '2026-04-18T07:34:16Z'
    output_hash: a9a4d09cce2160021b1883b6b0fec0fd9b01c98f8033a54705c59767d1c71066
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T09:43:20Z'
    unchanged: false
    changes_summary: 'Reordered the sentence to reflect the Greek structure more closely, replacing the separate sentence break with a comma and moving the relative clause after ''you.'' Changed ''Jesus the Messiah'' to ''Jesus Christ'' for more standard formal register and direct correspondence to Χριστὸς. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: ¡Oh, gálatas insensatos[a], ¿quién los fascinó[b], ante cuyos ojos Jesús el Mesías[c] fue presentado públicamente como crucificado[d]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «necios». El adjetivo griego marca falta de entendimiento o juicio.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «hechizó», «encantó» o «engañó». El verbo griego evoca un influjo dañino o un hechizo.'
    reason: lexical_alternative
  - marker: c
    text: 'Griego: «Jesús Cristo». Se traduce «Mesías» para preservar el valor titular de Χριστός.'
    reason: lexical_alternative
  - marker: d
    text: 'O: «fue claramente expuesto» o «fue públicamente exhibido como crucificado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνόητοι
  english_pob_choice: foolish
  chosen_spanish: insensatos
  alternatives_spanish:
  - necios
  - faltos de entendimiento
  lexicon: BDAG
  rationale: ἀνόητοι expresa falta de discernimiento o juicio; en español, "insensatos" mantiene el tono de reprensión sin cargar de inmediato una condena moral más fuerte que la del griego.
- source_word: Γαλάται
  english_pob_choice: Galatians
  chosen_spanish: gálatas
  alternatives_spanish:
  - Galatas
  lexicon: BDAG
  rationale: Se conserva el etnónimo como apelativo directo en plural, con la grafía usual en español.
- source_word: ἐβάσκανεν
  english_pob_choice: bewitched
  chosen_spanish: fascinó
  alternatives_spanish:
  - hechizó
  - engañó
  lexicon: BDAG
  rationale: βάσκαινω puede referir un influjo dañino, como fascinación o hechizo; "fascinó" conserva la fuerza retórica y la ambigüedad entre engaño y encantamiento mejor que un simple "engañó".
- source_word: οἷς κατ’ ὀφθαλμοὺς
  english_pob_choice: before whose eyes
  chosen_spanish: ante cuyos ojos
  alternatives_spanish:
  - delante de cuyos ojos
  - a la vista de quienes
  lexicon: BDAG
  rationale: La construcción relacional y la frase κατά + acusativo se expresan naturalmente como "ante cuyos ojos", preservando la visibilidad pública del acto.
- source_word: Ἰησοῦς Χριστός
  english_pob_choice: Jesus the Messiah
  chosen_spanish: Jesucristo
  alternatives_spanish:
  - Jesús el Mesías
  - Jesús, el Mesías
  lexicon: BDAG
  rationale: Aunque Χριστός puede verterse como "Mesías", en este versículo la forma compuesta ya está firmemente lexicalizada en español e identifica de manera clara al sujeto histórico-teológico sin perder fidelidad sustancial al original.
- source_word: προεγράφη
  english_pob_choice: was publicly portrayed
  chosen_spanish: fue presentado públicamente
  alternatives_spanish:
  - fue claramente expuesto
  - fue públicamente delineado
  lexicon: BDAG
  rationale: προγράφω aquí sugiere una puesta por delante o exhibición visible; "presentado públicamente" comunica la exposición abierta sin introducir una imagen ajena al español bíblico.
- source_word: ἐσταυρωμένος
  english_pob_choice: as crucified
  chosen_spanish: como crucificado
  alternatives_spanish:
  - crucificado
  - en condición de crucificado
  lexicon: BDAG
  rationale: El participio predicativo se vierte con "como crucificado" para reflejar el estado en que fue presentado y mantener la relación sintáctica con προεγράφη.
theological_decisions:
- issue: Χριστός en Ἰησοῦς Χριστός
  english_pob_reading: Jesus the Messiah
  chosen_spanish_reading: Jesucristo
  alternative_spanish_readings:
  - Jesús el Mesías
  - Jesús, el Mesías
  rationale: El principio del proyecto favorece traducir títulos, pero en español "Jesucristo" es la forma ampliamente reconocible y no impide oír el valor mesiánico del título en un nombre ya estabilizado por el uso cristiano; se evita introducir una perífrasis que suene menos natural en esta invectiva breve.
  doctrine_reference: 'DOCTRINE.md: traducir títulos; transliterar nombres, con atención a formas lexicalizadas en español.'
translation_notes:
  revision_awareness: El audit trail inglés pasó por una oscilación entre 'Jesus the Messiah' y 'Jesus Christ'; para esta versión española se opta por la forma lexicalizada 'Jesucristo' por claridad y naturalidad, sin perder la referencia titular a Χριστός. También se conserva el orden retórico de la cláusula relativa ('ante cuyos ojos') y la cualidad pública de προεγράφη. La ambigüedad de βασκαίνω se mantiene mediante una nota alternativa, evitando reducirla sin necesidad a un simple 'engañó'.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» reservado para el Tetragrámaton; no aplica en este versículo.
  - «Jesucristo» se usa aquí como forma lexicalizada; no se pretende cancelar el valor titular de Χριστός, sino expresarlo en un registro español natural.
  - Se evita el uso de «Cristo» aislado donde el griego presenta el binomio nominal Ἰησοῦς Χριστός.
  - La estructura interrogativa y la invectiva se conservan sin suavizar el reproche.
  - Las notas al pie reflejan alternativas reales del griego y no explicaciones devocionales añadidas.
