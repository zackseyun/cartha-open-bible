translation:
  language: es
  text: Pero ahora que ha venido la fe[a], ya no estamos bajo un guardián[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la fe». El griego puede entenderse también como «la fe» con fuerza histórica-salvífica.'
    reason: alternative_reading
  - marker: b
    text: El término griego παιδαγωγός se refiere a un guardián o supervisor doméstico de un menor, no principalmente a un maestro de escuela.
    reason: cultural_note
lexical_decisions:
- source_word: ἐλθούσης
  english_pob_choice: now that ... has come
  chosen_spanish: ahora que ha venido
  alternatives_spanish:
  - cuando vino
  - después de haber venido
  lexicon: BDAG
  rationale: El participio aoristo en genitivo absoluto se expresa mejor en español con una cláusula temporal natural. «Ha venido» conserva la llegada completada con relevancia presente, como en el audit trail inglés.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ introduce un contraste suave con el estado anterior; «Pero» mantiene el giro lógico de la secuencia paulina.
- source_word: πίστεως
  english_pob_choice: faith
  chosen_spanish: la fe
  alternatives_spanish:
  - la fe, en sentido de la fe inaugurada
  - la fidelidad
  lexicon: BDAG
  rationale: «Fe» es el equivalente normal y claro en español. La posible fuerza histórica-salvífica del artículo se deja abierta en la formulación y en la nota, sin imponer «la fe» como época técnica en el texto principal.
- source_word: οὐκέτι
  english_pob_choice: no longer
  chosen_spanish: ya no
  alternatives_spanish:
  - no ya
  - no más
  lexicon: BDAG
  rationale: «Ya no» expresa con naturalidad la cesación de la condición anterior y su efecto presente.
- source_word: ὑπὸ
  english_pob_choice: under
  chosen_spanish: bajo
  alternatives_spanish:
  - sujetos a
  - bajo la autoridad de
  lexicon: BDAG
  rationale: «Bajo» conserva la metáfora paulina de estar bajo supervisión o control, sin explicitarla más de lo que el griego permite.
- source_word: παιδαγωγόν
  english_pob_choice: guardian
  chosen_spanish: un guardián
  alternatives_spanish:
  - un tutor
  - un supervisor doméstico
  - un disciplinador
  lexicon: BDAG
  rationale: El παιδαγωγός era un supervisor/guardián doméstico de un menor, no principalmente un maestro escolar. «Guardián» recoge mejor esa función que «tutor» en español contemporáneo.
- source_word: ἐσμεν
  english_pob_choice: we are
  chosen_spanish: estamos
  alternatives_spanish:
  - somos
  lexicon: BDAG
  rationale: El presente de εἰμί puede traducirse de manera natural como «estamos» cuando el contexto describe una condición actual de sujeción; en español suena más idiomático que «somos bajo».
theological_decisions:
- issue: Sentido de «la fe» en el giro salvífico-histórico
  english_pob_reading: Rendered as 'faith has come,' expressing the salvation-historical transition Paul is describing.
  chosen_spanish_reading: «ha venido la fe» expresa la transición salvífica sin convertir la frase en una paráfrasis doctrinal.
  alternative_spanish_readings:
  - «ha venido la fe» con nota de época inaugurada
  - «ha venido la fe, es decir, la fe mesiánica»
  rationale: 'El texto griego permite entender una llegada con relevancia histórica. En español se conserva la ambigüedad útil: puede leerse como la llegada de la fe en sentido salvífico, sin imponer una glosa interpretativa en el cuerpo principal.'
  doctrine_reference: Preservar la tensión teológica sin resolverla; πίστις se traduce por defecto como «fe» salvo que el contexto exija otra cosa.
- issue: Valor de παιδαγωγός
  english_pob_reading: A household guardian or supervisor of a minor, not chiefly a classroom teacher.
  chosen_spanish_reading: «guardián» evita identificarlo con un maestro de aula y mantiene la idea de supervisión doméstica.
  alternative_spanish_readings:
  - «tutor»
  - «supervisor»
  - «custodio»
  rationale: La referencia cultural del término griego es importante para no domesticarlo con un sentido pedagógico moderno. «Guardián» es la opción más transparente y fiel al uso social antiguo.
  doctrine_reference: Nota cultural, no doctrinal; evita una lectura anacrónica del término.
translation_notes:
  revision_awareness: El pasaje coincide estrechamente con el texto fuente y con el audit trail inglés. La traducción sigue la misma lectura de οὐκέτι ὑπὸ παιδαγωγόν ἐσμεν, conservando la metáfora de sujeción y la nota cultural sobre παιδαγωγός. No se registran revisiones posteriores en el contexto provisto.
  spanish_consistency_notes:
  - Se mantiene «fe» y no «fidelidad», en consonancia con el uso por defecto de πίστις en el proyecto y con el audit trail inglés.
  - Se usa «guardián» para παιδαγωγός por continuidad con la decisión inglesa y porque evita el falso amigo «tutor» en sentido escolar.
  - «Ya no estamos bajo» reproduce el contraste temporal y la metáfora espacial de ὑπό sin añadir interpretaciones externas.
