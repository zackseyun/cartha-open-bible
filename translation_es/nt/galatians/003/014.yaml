review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español preserva bien la estructura de doble propósito de ἵνα, la bendición de Abraham, «Mesías Jesús», «la promesa del Espíritu» y «por medio de la fe». Sin embargo, no sigue el expediente inglés en un punto clave: el texto base inglés decidió «to the Gentiles» como lectura principal para εἰς τὰ ἔθνη, dejando «to the nations» en nota. El borrador invierte esa decisión y además invierte la dirección de la nota. También la nota [c] no refleja fielmente la alternativa inglesa, que es «el Espíritu prometido», no «la promesa del Espíritu prometido».'
  spanish_quality_summary: El español es claro y digno, pero «en Mesías Jesús» suena poco natural en español eclesial general; «en el Mesías Jesús» sería más idiomático, aunque el expediente inglés no introduce artículo. Aun así, el problema principal corregible sin reabrir adjudicación es la inversión de «naciones/gentiles» y la formulación incorrecta de la nota [c]. El resto lee con buena fluidez.
  glossary_alignment: Alinea bien con la política de Χριστός → «Mesías» y πνεῦμα → «Espíritu». No hay conflicto con Yahvé ni otros términos del glosario. Pero desalineó εἰς τὰ ἔθνη respecto de la decisión léxica documentada del POB inglés, que escogió «gentiles» en el texto principal y preservó «naciones» solo como alternativa.
  issues:
  - severity: high
    issue: Se invirtió la decisión principal para εἰς τὰ ἔθνη.
    rationale: El expediente inglés auditado eligió «to the Gentiles» como texto principal por el contexto paulino, con «to the nations» en nota. El borrador español pone «a las naciones» en el texto y «a los gentiles» en nota, contradiciendo la decisión documentada.
  - severity: medium
    issue: La nota [c] no corresponde a la alternativa preservada en el expediente inglés.
    rationale: La alternativa inglesa es «receive the promised Spirit», que en español corresponde a «recibir el Espíritu prometido» o equivalente. «La promesa del Espíritu prometido» introduce una formulación distinta y más pesada, no la alternativa auditada.
  - severity: low
    issue: «En Mesías Jesús» resulta algo rígido en español.
    rationale: Aunque comprensible y defendible por correspondencia formal, en español natural suele sonar mejor «en el Mesías Jesús» o, tradicionalmente, «en Cristo Jesús». No obstante, dado que la política del proyecto favorece «Mesías» y el inglés base usa «in Messiah Jesus», esto no exige cambio forzoso en esta revisión.
  revised_spanish_text: para que la bendición de Abraham viniera a los gentiles[a] en Mesías Jesús[b], para que recibiéramos la promesa del Espíritu[c] por medio de la fe.
  revised_footnotes:
