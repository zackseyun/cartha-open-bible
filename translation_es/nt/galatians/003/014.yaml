    changes_summary: 'Changed ''Messiah Jesus'' to ''Christ Jesus'' for closer correspondence to the Greek and more natural consistency in formal translation style; otherwise retained the draft. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: para que la bendición de Abraham viniera a los gentiles[a] en Mesías Jesús[b], para que recibiéramos la promesa del Espíritu[c] por medio de la fe.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a las naciones».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «en Cristo Jesús».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «recibiéramos el Espíritu prometido».'
    reason: alternative_reading
lexical_decisions:
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  lexicon: BDAG
  rationale: ἵνα expresa propósito en ambas cláusulas; en español, «para que» comunica naturalmente esa finalidad sin perder la estructura doble del versículo.
- source_word: εἰς τὰ ἔθνη
  english_pob_choice: to the Gentiles
  chosen_spanish: a las naciones
  alternatives_spanish:
  - a los gentiles
  lexicon: BDAG
  rationale: Aquí ἔθνη admite tanto «naciones» como «gentiles». Opto por «naciones» en el texto principal para conservar la forma más cercana al griego; el contexto paulino permite la lectura étnica, pero la traducción no debe resolverla de antemano.
- source_word: εὐλογία
  english_pob_choice: blessing
  chosen_spanish: bendición
  alternatives_spanish:
  - bendición de Dios
  lexicon: BDAG
  rationale: «Bendición» reproduce bien el sustantivo y mantiene la referencia a la bendición abrahámica del contexto.
- source_word: τοῦ Ἀβραὰμ
  english_pob_choice: of Abraham
  chosen_spanish: de Abraham
  alternatives_spanish:
  - de Abrahán
  lexicon: BDAG
  rationale: Se conserva el nombre tradicional ampliamente reconocible en español, con el genitivo posesivo simple.
- source_word: γένηται
  english_pob_choice: might come
  chosen_spanish: viniera
  alternatives_spanish:
  - llegara
  - llegase
  lexicon: BDAG
  rationale: El verbo γίνομαι aquí funciona idiomáticamente como llegada/ocurrencia de la bendición; «viniera» suena natural en español y preserva la finalidad del ἵνα.
- source_word: ἐν Χριστῷ Ἰησοῦ
  english_pob_choice: in Messiah Jesus
  chosen_spanish: en Mesías Jesús
  alternatives_spanish:
  - en Cristo Jesús
  lexicon: BDAG
  rationale: Se mantiene «Mesías» para Χριστός según la política de títulos, ya que aquí conserva con transparencia el sentido titular y la conexión con la promesa abrahámica.
- source_word: ἐπαγγελίαν
  english_pob_choice: promise
  chosen_spanish: promesa
  alternatives_spanish:
  - promesa hecha
  lexicon: BDAG
  rationale: La forma simple «promesa» es la mejor equivalencia y enlaza con el argumento de Gálatas sobre la promesa.
- source_word: τοῦ πνεύματος
  english_pob_choice: of the Spirit
  chosen_spanish: del Espíritu
  alternatives_spanish:
  - del Espíritu prometido
  lexicon: BDAG
  rationale: 'La construcción se conserva abierta: puede referirse a la promesa relativa al Espíritu o al Espíritu prometido. El español mantiene esa ambigüedad sin sobreinterpretarla.'
- source_word: λάβωμεν
  english_pob_choice: we might receive
  chosen_spanish: recibiéramos
  alternatives_spanish:
  - recibamos
  - llegáramos a recibir
  lexicon: BDAG
  rationale: En una subordinada final con ἵνα, el subjuntivo imperfecto en español expresa adecuadamente la finalidad retrospectiva del pasaje («para que recibiéramos»).
- source_word: διὰ τῆς πίστεως
  english_pob_choice: through faith
  chosen_spanish: por medio de la fe
  alternatives_spanish:
  - por la fe
  - mediante la fe
  lexicon: BDAG
  rationale: «Por medio de la fe» preserva el valor instrumental de διά y suena claro y digno en español bíblico contemporáneo.
theological_decisions:
- issue: Χριστός como título cristológico
  english_pob_reading: Messiah Jesus
  chosen_spanish_reading: Mesías Jesús
  alternative_spanish_readings:
  - Cristo Jesús
  rationale: Se mantiene el valor titular de Χριστός, conforme al criterio de traducir títulos. «Mesías» evita ocultar la resonancia judía y mesiánica del texto.
  doctrine_reference: 'DOCTRINE.md: traducir títulos; Χριστός → Mesías cuando funciona como título.'
- issue: εἰς τὰ ἔθνη y la relación judío/gentil
  english_pob_reading: to the Gentiles
  chosen_spanish_reading: a las naciones
  alternative_spanish_readings:
  - a los gentiles
  rationale: La lectura principal conserva la tensión semántica del griego y no fuerza la interpretación étnica en el cuerpo del texto. La nota ofrece la alternativa interpretativa tradicional en el contexto paulino.
  doctrine_reference: 'DOCTRINE.md: preservar tensiones léxicas cuando el contexto no obliga a resolverlas.'
- issue: τοῦ πνεύματος como genitivo abierto
  english_pob_reading: the promise of the Spirit
  chosen_spanish_reading: la promesa del Espíritu
  alternative_spanish_readings:
  - la promesa hecha por el Espíritu
  - el Espíritu prometido
  rationale: Se conserva la ambigüedad del genitivo sin decidir entre una promesa acerca del Espíritu o el Espíritu como el prometido. Esto respeta la cautela exegética del expediente inglés.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica en lugar de resolverla prematuramente.'
translation_notes:
  revision_awareness: 'El expediente inglés pasó por una corrección de ida y vuelta en torno a Χριστός: una revisión temporal cambió «Messiah Jesus» a «Christ Jesus», pero la fijación más reciente restauró «Messiah Jesus» conforme a la política del proyecto. La versión española sigue esa decisión restaurada y conserva también la ambigüedad de τοῦ πνεύματος. '
  spanish_consistency_notes:
  - Se usó «Mesías» para Χριστός de manera consistente con la política del proyecto y con el estado más reciente del expediente.
  - Se prefirió «naciones» en el texto principal y se dejó «gentiles» en nota para mantener abierta la tensión léxica de ἔθνη.
  - «Espíritu» se capitaliza por referencia al Espíritu Santo en este contexto.
  - La puntuación y la sintaxis buscan ser modernas y publicables sin desplazar el contenido argumental del griego.
