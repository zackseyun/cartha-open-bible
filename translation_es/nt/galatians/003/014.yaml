    text: 'O: «recibiéramos el Espíritu prometido».'
    reason: alternative_reading
  revision_rationale: 'Se corrige el texto principal para reflejar la decisión léxica auditada del POB inglés: εἰς τὰ ἔθνη debe aparecer como «a los gentiles» en el cuerpo del texto, con «a las naciones» en nota. También se corrige la nota [c] para preservar la alternativa real del expediente inglés («el Espíritu prometido») sin crear una paráfrasis distinta. Se mantiene «Mesías Jesús» por coherencia con la política terminológica del proyecto y el expediente inglés.'
