  source_alignment_summary: 'El borrador español refleja correctamente la estructura y el sentido general del griego: ὥστε como conclusión inferencial, νόμος como «la ley», γέγονεν con valor resultativo, εἰς Χριστόν con sentido contextual de meta/terminus, y ἵνα…δικαιωθῶμεν como finalidad. También preserva bien «Mesías» para Χριστόν conforme a la política del proyecto. Sin embargo, «tutor» para παιδαγωγός debilita el matiz documentado en el expediente inglés, que recalca que no se trata principalmente de un maestro sino de un guardián/supervisor doméstico. Esa es la principal desalineación léxica.'
