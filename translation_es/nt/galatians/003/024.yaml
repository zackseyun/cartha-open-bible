  glossary_alignment: 'Buena alineación general con el glosario del proyecto: Χριστός se vierte como «Mesías», δικαιωθῶμεν como «seamos justificados», y no hay conflictos con otros términos clave. La excepción problemática es παιδαγωγός: el expediente POB favorece «guardian» por razones histórico-lexicales; en español, «guardián» o «custodio» se ajustan mejor que «tutor».'
