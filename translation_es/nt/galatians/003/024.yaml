base_translation:
  language: en
  yaml_path: translation/nt/galatians/003/024.yaml
  text: So then[a], the law has become our guardian until Messiah[b], so that we might be justified by faith.
  footnotes:
  - marker: a
    text: Or 'our custodian'; traditionally 'our tutor.' The Greek παιδαγωγός refers to a household guardian or supervisor for a child, not primarily a classroom teacher.
    reason: lexical_alternative
  - marker: b
    text: Literally 'unto the Messiah'; the phrase may also be understood as 'leading to the Messiah.'
    reason: alternative_reading
