translation:
  language: es
  text: Así que, la ley ha venido a ser nuestro guardián[a] hasta el Mesías[b], para que seamos justificados por la fe.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nuestro custodio»; tradicionalmente, «nuestro tutor». El griego παιδαγωγός se refiere a un guardián o supervisor doméstico de un menor, no principalmente a un maestro de aula.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «hacia el Mesías»; también puede entenderse como «conduce al Mesías». El contexto favorece la idea de meta o término de la función de la ley.
    reason: alternative_reading
lexical_decisions:
- source_word: ὥστε
  english_pob_choice: So then
  chosen_spanish: Así que
  alternatives_spanish:
  - por tanto
  - de modo que
  lexicon: BDAG
  rationale: ὥστε introduce una conclusión inferida del argumento anterior. «Así que» comunica bien ese resultado lógico en español sin darle un matiz puramente final como podría sugerir «de modo que».
- source_word: νόμος
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la Ley
  - la ley de Moisés
  lexicon: BDAG
  rationale: En Gálatas, νόμος se refiere normalmente a la ley mosaica como categoría reconocible. «La ley» conserva ese valor general y evita especificar más de lo que el contexto exige.
- source_word: παιδαγωγός
  english_pob_choice: guardian
  chosen_spanish: tutor
  alternatives_spanish:
  - guardián
  - custodio
  - disciplinador
  lexicon: BDAG
  rationale: El POB en inglés documenta que παιδαγωγός no era principalmente un maestro de aula, sino un supervisor o tutor doméstico de un menor. En español, «tutor» transmite esa función relacional y educativa con más naturalidad que «guardián», aunque se reconoce la tensión con el sentido histórico-social del término.
- source_word: ἡμῶν
  english_pob_choice: our
  chosen_spanish: nuestro
  alternatives_spanish:
  - de nosotros
  lexicon: BDAG
  rationale: El pronombre posesivo refleja la relación del sustantivo con los creyentes incluidos en el argumento paulino.
- source_word: γέγονεν
  english_pob_choice: has become
  chosen_spanish: ha venido a ser
  alternatives_spanish:
  - ha llegado a ser
  - se ha convertido en
  lexicon: BDAG
  rationale: El perfecto comunica un estado resultante. «Ha venido a ser» conserva ese valor de resultado sin sonar forzado en español, y evita la ambigüedad de un simple pretérito.
- source_word: εἰς Χριστόν
  english_pob_choice: until Messiah
  chosen_spanish: hasta el Mesías
  alternatives_spanish:
  - hasta Cristo
  - para el Mesías
  - hacia el Mesías
  lexicon: BDAG
  rationale: La preposición εἰς puede expresar dirección o meta/terminus. En este contexto, el sentido temporal-teleológico se puede expresar naturalmente con «hasta». Se usa «Mesías» conforme a la preferencia del proyecto para Χριστός como título, preservando la tensión entre el valor literal «hacia/para» y el sentido contextual de límite temporal.
- source_word: Χριστόν
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Se traduce el título Χριστός por «Mesías» conforme a la política del proyecto, ya que aquí funciona como título y no como nombre litúrgico fijo.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: ἵνα introduce finalidad. «Para que» es la opción más natural y precisa en español contemporáneo.
- source_word: ἐκ πίστεως
  english_pob_choice: by faith
  chosen_spanish: por la fe
  alternatives_spanish:
  - a partir de la fe
  - mediante la fe
  lexicon: BDAG
  rationale: La frase expresa base o medio en el argumento paulino. «Por la fe» conserva el valor instrumental/causal de forma idiomática en español.
- source_word: δικαιωθῶμεν
  english_pob_choice: might be justified
  chosen_spanish: seamos justificados
  alternatives_spanish:
  - seamos declarados justos
  - seamos declarados rectos
  lexicon: BDAG
  rationale: El subjuntivo aoristo pasivo con ἵνα se vierte con un subjuntivo final en español. «Justificados» mantiene el lenguaje forense paulino sin añadir paráfrasis interpretativa.
theological_decisions:
- issue: Cómo expresar εἰς Χριστόν sin borrar la ambigüedad direccional/temporal
  english_pob_reading: Rendered contextually as 'until the Messiah,' while noting that the phrase may also be understood as 'leading to the Messiah.'
  chosen_spanish_reading: «hasta el Mesías»
  alternative_spanish_readings:
  - «hacia el Mesías»
  - «para el Mesías»
  rationale: El contexto de Gálatas 3 presenta la ley como una tutela provisional con referencia a un punto de llegada. «Hasta» comunica esa función temporal sin cerrar por completo la posibilidad de una lectura direccional en el griego.
  doctrine_reference: Preservar la tensión semántica del texto sin resolverla artificialmente.
translation_notes:
  revision_awareness: El audit trail inglés muestra una oscilación entre 'the Messiah' y 'Christ', con una corrección final que restituye 'Messiah' por política del proyecto. La versión española sigue esa resolución y traduce Χριστός como «el Mesías», manteniendo además la lectura contextual de εἰς como meta/terminus temporal.
  spanish_consistency_notes:
  - Se mantiene «Mesías» para Χριστός conforme a la terminología del proyecto.
  - Se conserva el lenguaje forense de «justificados» para δικαιωθῶμεν.
  - «Tutor» se eligió por su naturalidad en español, aunque la nota explica la función histórica del παιδαγωγός.
  - No se introduce «SEÑOR» ni otras sustituciones tradicionales, porque este versículo no contiene el tetragrámaton ni κύριος aplicado directamente al nombre divino.
