translation:
  language: es
  text: Porque todos los que fueron bautizados en Mesías, se han revestido de Mesías[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Cristo» en ambas apariciones de «Mesías».
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «se han vestido con Mesías».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅσοι
  english_pob_choice: as many of you as
  chosen_spanish: todos los que
  alternatives_spanish:
  - tantos como
  - los que
  lexicon: BDAG
  rationale: Conserva el valor correlative de ὅσοι y la referencia directa a los destinatarios, con un español natural y publicable.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Mantiene la conexión explicativa con el argumento anterior; «Porque» funciona bien en español al inicio de una cláusula justificativa.
- source_word: εἰς
  english_pob_choice: into
  chosen_spanish: en
  alternatives_spanish:
  - dentro de
  - hacia
  lexicon: BDAG
  rationale: «En Mesías» suena más natural en español y conserva la idea de incorporación/unión expresada por εἰς sin añadir una explicación doctrinal que el griego no formula explícitamente.
- source_word: Χριστὸν
  english_pob_choice: Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Se mantiene el criterio POB de traducir Χριστός como «Mesías» cuando el título está en juego; aquí la imagen es de incorporación a la persona titulada como el Ungido.
- source_word: ἐβαπτίσθητε
  english_pob_choice: were baptized
  chosen_spanish: fueron bautizados
  alternatives_spanish:
  - fueron sumergidos
  - fueron inmersos
  lexicon: BDAG
  rationale: «Fueron bautizados» preserva el pasivo y es la forma idiomática y comprensible en español, sin resolver la cuestión de modo o eficacia sacramental.
- source_word: ἐνεδύσασθε
  english_pob_choice: have put on
  chosen_spanish: se han revestido
  alternatives_spanish:
  - han vestido
  - se han puesto
  lexicon: BDAG
  rationale: La imagen de vestirse se expresa con precisión y dignidad mediante «revestirse», que mantiene el sentido metafórico del verbo griego mejor que una formulación más llana.
theological_decisions:
- issue: Relación entre bautismo e incorporación a Mesías sin imponer una teoría sacramental o del modo del bautismo.
  english_pob_reading: were baptized into Messiah
  chosen_spanish_reading: fueron bautizados en Mesías
  alternative_spanish_readings:
  - fueron bautizados dentro de Mesías
  - fueron bautizados hacia Mesías
  - fueron sumergidos en Mesías
  rationale: La preposición «en» conserva la incorporación/unión expresada por εἰς, pero no fuerza una interpretación sobre el medio, el modo ni la eficacia sacramental del bautismo. Así se preserva la tensión teológica del texto.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
- issue: Metáfora de vestirse con Mesías y su posible traducción literal o más explicativa.
  english_pob_reading: have put on Messiah / Literally “have clothed yourselves with Messiah.”
  chosen_spanish_reading: de Mesías se han revestido
  alternative_spanish_readings:
  - han puesto a Mesías
  - se han vestido de Mesías
  rationale: «Revestirse» comunica la metáfora con claridad y mantiene el paralelismo con el griego. La inversión sintáctica evita sonar artificial y conserva el énfasis retórico del texto.
  doctrine_reference: Mantener la metáfora sin diluirla.
translation_notes:
  revision_awareness: 'El texto griego y el audit trail inglés están en alto acuerdo y no muestran revisiones sustantivas; por eso la versión española sigue de cerca la lectura establecida, conservando las dos tensiones documentadas: εἰς + Χριστόν y la metáfora de ἐνεδύσασθε.'
  spanish_consistency_notes:
  - Se mantiene «Mesías» según el criterio POB para Χριστός en su uso titular.
  - Se evita «SEÑOR» y no hay términos divinos directos en este versículo.
  - «Revestirse» se usa como metáfora consistente con el valor de ἐνεδύσασθε y con el comentario literal del POB inglés.
  - La puntuación y el orden buscan una lectura natural en español sin alejarse del paralelismo del griego.
