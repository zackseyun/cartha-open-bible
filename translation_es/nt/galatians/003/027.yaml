    rationale: La nota dice «se han vestido con Mesías» o «se han revestido de Mesías». La combinación es aceptable, pero conviene dejar claro que la principal equivalencia literal del verbo es «se han vestido con Mesías», mientras el texto principal puede usar «revestido de» por idiomaticidad.
  revised_spanish_text: Porque todos los que fueron bautizados en Mesías, se han revestido de Mesías[a][b].
