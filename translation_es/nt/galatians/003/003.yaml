translation:
  language: es
  text: ¿Son tan insensatos? Habiendo comenzado por el Espíritu[a], ¿ahora están siendo perfeccionados[c] por la carne[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el Espíritu».
    reason: lexical_alternative
  - marker: b
    text: O «por esfuerzo humano»; también posiblemente «por la naturaleza pecaminosa».
    reason: lexical_alternative
  - marker: c
    text: O «están siendo completados».
    reason: lexical_alternative
lexical_decisions:
- source_word: οὕτως
  english_pob_choice: so
  chosen_spanish: tan
  alternatives_spanish:
  - así de
  - de tal modo
  lexicon: BDAG
  rationale: 'En la pregunta retórica expresa grado, no modo; «tan» comunica naturalmente la intensidad de la reprensión: «tan insensatos son».'
- source_word: ἀνόητοί
  english_pob_choice: foolish
  chosen_spanish: insensatos
  alternatives_spanish:
  - necios
  - faltos de juicio
  lexicon: BDAG
  rationale: «Insensatos» conserva el juicio negativo directo sin volverse coloquial o insultante en exceso; es adecuado para una reprensión paulina.
- source_word: ἐναρξάμενοι
  english_pob_choice: having begun
  chosen_spanish: Habiendo comenzado
  alternatives_spanish:
  - Después de comenzar
  - Habiendo empezado
  lexicon: BDAG
  rationale: El participio aoristo antecede a la acción principal y marca un inicio ya realizado antes del contraste posterior.
- source_word: πνεύματι
  english_pob_choice: by the Spirit
  chosen_spanish: por el Espíritu
  alternatives_spanish:
  - en el Espíritu
  - por el espíritu
  lexicon: BDAG
  rationale: La mayúscula señala al Espíritu Santo conforme al contexto de Gálatas 3; «por» refleja bien el valor instrumental frente a «por la carne».
- source_word: σαρκὶ
  english_pob_choice: by the flesh
  chosen_spanish: por la carne
  alternatives_spanish:
  - por esfuerzo humano
  - por la naturaleza pecaminosa
  - en la carne
  lexicon: BDAG
  rationale: Se preserva el término paulino «carne» para mantener la tensión teológica entre Espíritu y carne, en vez de resolverla prematuramente como mera capacidad humana o solo pecado interior.
- source_word: ἐπιτελεῖσθε
  english_pob_choice: are being perfected
  chosen_spanish: van a ser perfeccionados
  alternatives_spanish:
  - son perfeccionados
  - están siendo completados
  lexicon: BDAG
  rationale: La forma pasiva/procesual se vierte de manera natural en español como un proceso hacia la consumación. «Perfeccionados» sigue la decisión inglesa; el giro con «van a ser» hace el proceso más idiomático sin perder el sentido de culminación.
theological_decisions:
- issue: Referente de πνεύματι
  english_pob_reading: the Holy Spirit
  chosen_spanish_reading: el Espíritu Santo
  alternative_spanish_readings:
  - el espíritu
  - el Espíritu
  rationale: El contexto inmediato en Gálatas 3 trata del Espíritu recibido por la fe y de la obra divina, así que la lectura personal del Espíritu Santo es la más probable y debe quedar explícita en español.
  doctrine_reference: Pneumatology in Galatians 3; contextual reading of πνεύματι
- issue: Sentido de σάρξ en contraste con el Espíritu
  english_pob_reading: flesh
  chosen_spanish_reading: carne
  alternative_spanish_readings:
  - esfuerzo humano
  - naturaleza pecaminosa
  rationale: Se mantiene la imagen paulina de contraste entre Espíritu y carne. «Carne» conserva la tensión lexicoteológica del texto y evita reducirla a una sola paráfrasis doctrinal.
  doctrine_reference: Pauline σάρξ; contested term maintained lexically
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios y el cotejo externo reportó alta concordancia; por eso la redacción sigue de cerca las decisiones auditadas del inglés POB, manteniendo las tensiones léxicas principales sin resolverlas de forma reductora.
  spanish_consistency_notes:
  - Se mantiene «Espíritu» con mayúscula por el referente al Espíritu Santo, en coherencia con el contexto paulino.
  - Se conserva «carne» como término técnico paulino, sin reemplazarlo por «esfuerzo humano» en el texto principal.
  - La pregunta retórica se vierte con orden natural del español, pero sin atenuar la reprensión del griego.
