translation:
  language: es
  text: 'Solo esto quiero saber de ustedes: ¿recibieron el Espíritu[a] por obras de la ley[b], o por el oír con fe[c]?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Aquí 'el Espíritu' se entiende como el Espíritu Santo; el griego no añade 'Santo'.
    reason: theological_note
  - marker: b
    text: '''Fe'' también podría matizarse como ''fidelidad'', aunque aquí es menos probable; la construcción griega es comprimida.'
    reason: lexical_alternative
  - marker: c
    text: O 'por el oír de la fe'; la expresión también puede entenderse como 'por oír el mensaje con fe'.
    reason: alternative_reading
lexical_decisions:
- source_word: τοῦτο μόνον
  english_pob_choice: This only
  chosen_spanish: Solo esto
  alternatives_spanish:
  - Esto solamente
  - Solo una cosa
  lexicon: οὗτος + μόνος
  rationale: Conserva el énfasis inicial y el tono enfático de la pregunta paulina sin volverse rígido en español.
- source_word: θέλω μαθεῖν
  english_pob_choice: I want to learn
  chosen_spanish: quiero saber
  alternatives_spanish:
  - quiero aprender
  - quiero averiguar
  lexicon: θέλω + μανθάνω
  rationale: En español, 'quiero saber' comunica con naturalidad la intención de conocer o comprobar, manteniendo el valor interrogativo de μαθεῖν sin sonar artificial.
- source_word: ἀφ’ ὑμῶν
  english_pob_choice: from you
  chosen_spanish: de ustedes
  alternatives_spanish:
  - de vosotros
  - de ustedes todos
  lexicon: ἀπό + σύ
  rationale: Refleja la pluralidad del pronombre y suena natural en español latinoamericano neutral.
- source_word: ἐξ ἔργων νόμου
  english_pob_choice: by works of the law
  chosen_spanish: por obras de la ley
  alternatives_spanish:
  - a base de obras de la ley
  - mediante obras de la ley
  lexicon: ἐκ + ἔργον + νόμος
  rationale: '''Por'' expresa bien la idea instrumental o de medio en la pregunta y mantiene la fórmula paulina establecida para ἔργων νόμου.'
- source_word: τὸ πνεῦμα
  english_pob_choice: the Spirit
  chosen_spanish: el Espíritu
  alternatives_spanish:
  - el Espíritu Santo
  - el espíritu
  lexicon: πνεῦμα
  rationale: El contexto de Gálatas 3 apunta al Espíritu de Dios recibido por los creyentes; se capitaliza como término personal/divino, sin añadir 'Santo' porque no está explícito en el griego.
- source_word: ἐλάβετε
  english_pob_choice: did you receive
  chosen_spanish: recibieron
  alternatives_spanish:
  - han recibido
  - recibisteieron
  lexicon: λαμβάνω
  rationale: El aoristo funciona naturalmente como pasado simple en esta pregunta retórica.
- source_word: ἐξ ἀκοῆς πίστεως
  english_pob_choice: by hearing with faith
  chosen_spanish: por oír con fe
  alternatives_spanish:
  - por el oír de la fe
  - por oír el mensaje con fe
  lexicon: ἀκοή + πίστις
  rationale: '''Oír con fe'' mantiene la relación entre el acto de escuchar y la fe, y evita decidir prematuramente por una lectura nominal demasiado cerrada. La construcción griega es comprimida, por lo que se preserva cierta amplitud en español.'
- source_word: πίστεως
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - fidelidad
  - confianza
  lexicon: πίστις
  rationale: Se sigue la equivalencia estándar del proyecto. 'Fidelidad' queda como posible matiz discutido, pero no se impone en el texto principal.
theological_decisions:
- issue: Referente de 'el Espíritu'
  english_pob_reading: The phrase refers to the Holy Spirit given to believers.
  chosen_spanish_reading: La frase se refiere al Espíritu Santo dado a los creyentes.
  alternative_spanish_readings:
  - Puede aludir de modo más general a una experiencia espiritual o poder espiritual
  rationale: El contexto inmediato de Gálatas 3 habla de la recepción del don de Dios a los creyentes, por lo que la lectura personal/divina es la más probable.
  doctrine_reference: Gálatas 3:1-5; Hechos 2:38-39
translation_notes:
  revision_awareness: 'Se siguió el trazado en inglés sin cambios relevantes: la versión conserva el contraste entre ''obras de la ley'' y la recepción ''por oír con fe'', y mantiene abierta la ambigüedad comprimida de ἀκοῆς πίστεως mediante una nota alternativa.'
  spanish_consistency_notes:
  - Se mantiene 'ley' para νόμος en la fórmula paulina establecida.
  - Se usa 'Espíritu' con mayúscula por el referente personal/divino, coherente con el contexto.
  - '''Fe'' se conserva como traducción principal de πίστις, dejando ''fidelidad'' solo como matiz alternativo en nota.'
  - La pregunta se mantiene en segunda persona plural para reflejar el griego y el contexto de la carta.
