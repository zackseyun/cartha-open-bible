  source_alignment_summary: 'El borrador español refleja fielmente el griego y el rastro de auditoría POB: «Solo» preserva μόνον; «estaban oyendo» representa bien la perífrasis imperfecta ἀκούοντες ἦσαν; «El que antes nos perseguía» corresponde al participio sustantivado con ποτέ; «ahora anuncia la fe» mantiene νῦν εὐαγγελίζεται τὴν πίστιν sin sobreinterpretar; y «intentaba destruir» comunica adecuadamente ἐπόρθει en español idiomático.'
