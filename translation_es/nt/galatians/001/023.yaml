translation:
  language: es
  text: 'Solo estaban oyendo[a]: «El que antes nos perseguía, ahora anuncia la fe que antes intentaba destruir».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el evangelio»; el griego dice «la fe», probablemente con el sentido de la fe cristiana o del mensaje de fe que antes atacaba Pablo.
    reason: lexical_alternative
lexical_decisions:
- source_word: μόνον
  english_pob_choice: only
  chosen_spanish: Solo
  alternatives_spanish:
  - Solamente
  - Únicamente
  lexicon: BDAG
  rationale: 'Expresa la idea de limitación: su conocimiento no iba más allá de ese informe.'
- source_word: ἀκούοντες ἦσαν
  english_pob_choice: were only hearing
  chosen_spanish: estaban oyendo
  alternatives_spanish:
  - seguían oyendo
  - iban oyendo
  lexicon: BDAG
  rationale: La perífrasis imperfecta transmite una recepción continua o repetida del informe; en español, «estaban oyendo» conserva ese valor aspectual con naturalidad.
- source_word: ὁ διώκων ἡμᾶς ποτε
  english_pob_choice: the one who formerly persecuted us
  chosen_spanish: el que antes nos perseguía
  alternatives_spanish:
  - quien antes nos perseguía
  - nuestro antiguo perseguidor
  lexicon: BDAG
  rationale: El participio sustantivado con ποτέ funciona como una descripción identificadora de Pablo por su actividad previa; «el que antes nos perseguía» es fiel y natural.
- source_word: νῦν εὐαγγελίζεται
  english_pob_choice: now proclaims
  chosen_spanish: ahora anuncia
  alternatives_spanish:
  - ahora proclama
  - ahora proclama la buena noticia de
  lexicon: BDAG
  rationale: εὐαγγελίζεται es lenguaje de proclamación del evangelio. «Anuncia» comunica bien esa acción en español sin duplicar innecesariamente «buena noticia» antes del objeto.
- source_word: τὴν πίστιν
  english_pob_choice: the faith
  chosen_spanish: la fe
  alternatives_spanish:
  - el evangelio
  - la fe y confianza
  lexicon: BDAG
  rationale: Con el artículo, πίστις aquí puede referirse a la fe cristiana como contenido confesional o cuerpo de creencia, no solo al acto subjetivo de creer. «La fe» preserva esa amplitud.
- source_word: ἥν ποτε ἐπόρθει
  english_pob_choice: he once tried to destroy
  chosen_spanish: que antes intentaba destruir
  alternatives_spanish:
  - que antes devastaba
  - que antes procuraba arruinar
  lexicon: BDAG
  rationale: πορθέω tiene el sentido de devastar o destruir. «Intentaba destruir» recoge la intención hostil y suena idiomático en español.
theological_decisions:
- issue: Sentido de τὴν πίστιν
  english_pob_reading: '''the faith'' refers to the Christian faith/message Paul now proclaims'
  chosen_spanish_reading: «la fe» se entiende como la fe cristiana / el mensaje de fe que Pablo ahora anuncia
  alternative_spanish_readings:
  - «la fe» como la acción de creer
  - «el evangelio» como traducción interpretativa
  rationale: El contraste con la persecución previa favorece una referencia objetiva al contenido confesional cristiano. Mantener «la fe» conserva la tensión interpretativa sin forzar una paráfrasis.
  doctrine_reference: 'Contested terms table: πίστις → fe; alternativas documentadas donde el contexto exige decisión interpretativa.'
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente indicada como unchanged; no se requieren ajustes adicionales respecto del control de revisión. '
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando el texto lo exija; aquí no aparece el tetragrama.
  - «Fe» se conserva como traducción principal de πίστις, en coherencia con el registro del proyecto y con la nota que documenta la alternativa interpretativa «evangelio».
  - Se usa puntuación española con comillas angulares no requeridas; se preserva un estilo sobrio y publicable.
