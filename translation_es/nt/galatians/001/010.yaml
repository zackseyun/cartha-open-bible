translation:
  language: es
  text: ¿Pues ahora persuado[a] a los hombres, o a Dios? ¿O busco agradar a los hombres? Si todavía agradara a los hombres, no sería esclavo de Mesías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿ahora busco ganar la aprobación de los hombres, o de Dios?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἄρτι
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - en este momento
  - por ahora
  lexicon: No se añade entrada léxica nueva; correspondencia contextual del adverbio temporal ἄρτι.
  rationale: Expresa la situación presente de Pablo de forma natural en español y mantiene el contraste implícito con un estado anterior.
- source_word: πείθω
  english_pob_choice: persuading
  chosen_spanish: persuado
  alternatives_spanish:
  - trato de convencer
  - busco ganar la aprobación de
  lexicon: BDAG (sentido de persuadir/convencer)
  rationale: «Persuado» conserva el valor verbal directo de πείθω. En español, la pregunta retórica funciona sin necesidad de expandir a «ganar aprobación», que sería una interpretación más explícita que el griego no exige aquí.
- source_word: ἀνθρώπους
  english_pob_choice: people
  chosen_spanish: a los hombres
  alternatives_spanish:
  - a las personas
  - a la gente
  lexicon: No se añade entrada léxica nueva; ἄνθρωπος en plural humano genérico.
  rationale: «Hombres» aquí puede funcionar en sentido genérico de seres humanos, pero en español contemporáneo puede sonar marcado. Aun así, se mantiene por la fuerza retórica breve del contraste y porque la pregunta paralela con «a Dios» pide un sustantivo personal directo. Se reconoce la alternativa inclusiva en nota.
- source_word: θεόν
  english_pob_choice: God
  chosen_spanish: a Dios
  alternatives_spanish:
  - a Dios mismo
  lexicon: θεός → Dios
  rationale: Correspondencia directa y estándar del objeto del contraste retórico.
- source_word: ζητῶ
  english_pob_choice: am I seeking
  chosen_spanish: busco
  alternatives_spanish:
  - estoy buscando
  - trato de buscar
  lexicon: BDAG
  rationale: El presente simple en español comunica bien la acción actual y evita una progresión innecesaria.
- source_word: ἀρέσκειν / ἤρεσκον
  english_pob_choice: to please / pleasing
  chosen_spanish: agradar / agradara
  alternatives_spanish:
  - complacer / complaciera
  - gustar / gustara
  lexicon: BDAG
  rationale: «Agradar» reproduce la relación interpersonal de buscar el favor de otros. Se evita «gustar» porque en este contexto puede sonar menos deliberado y menos acorde con la idea de complacer a otros.
- source_word: Χριστοῦ
  english_pob_choice: the Messiah’s
  chosen_spanish: de Mesías
  alternatives_spanish:
  - de Cristo
  lexicon: Χριστός → Mesías
  rationale: Se conserva la terminología preferida del proyecto para Χριστός cuando funciona como título. «De Mesías» es gramaticalmente posible en español y mantiene la decisión doctrinal de no sustituir automáticamente por «Cristo».
- source_word: δοῦλος
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - sirviente
  lexicon: BDAG
  rationale: «Esclavo» preserva la fuerza de pertenencia absoluta y sumisión total presente en δοῦλος. «Siervo» debilitaría el contraste paulino con agradar a los hombres.
theological_decisions:
- issue: Cómo rendir Χριστοῦ δοῦλος sin suavizar la pertenencia exclusiva
  english_pob_reading: the Messiah’s slave
  chosen_spanish_reading: esclavo de Mesías
  alternative_spanish_readings:
  - siervo de Mesías
  - servidor de Mesías
  rationale: El argumento de Pablo contrapone la aprobación humana con una lealtad indivisa a Cristo/Mesías. Mantener «esclavo» conserva el peso de δοῦλος; mantener «Mesías» respeta la política terminológica del proyecto para Χριστός como título.
  doctrine_reference: 'Contested terms: Χριστός, δοῦλος'
- issue: Tratamiento de ἀνθρώπους en una pregunta retórica
  english_pob_reading: people
  chosen_spanish_reading: los hombres
  alternative_spanish_readings:
  - las personas
  - la gente
  rationale: Aunque «personas» es más inclusivo en español, el paralelismo breve «a los hombres, o a Dios» reproduce mejor la antítesis retórica del griego. La alternativa se mantiene como posibilidad semántica sin borrar el tono del original.
  doctrine_reference: ἄνθρωπος genérico plural
translation_notes:
  revision_awareness: El inglés POB pasó por una revisión que ajustó πείθω hacia una formulación más cercana a «persuade» y restauró «Messiah» frente a una variante con «Christ». La presente versión española sigue el valor verbal directo de πείθω con «persuado» y conserva «Mesías» según la política del proyecto, manteniendo el contraste con δοῦλος como «esclavo».
  spanish_consistency_notes:
  - Se usa «Mesías» para Χριστός como título, en línea con la política del proyecto, y no «Cristo» en el texto principal.
  - Se conserva «esclavo» para δοῦλος por la fuerza semántica de pertenencia y subordinación absoluta.
  - La pregunta retórica se mantiene en forma breve y paralela para reflejar la estructura del griego.
  - La nota textual alternativa se ancla en «persuado» para no sobrecargar el texto principal.
