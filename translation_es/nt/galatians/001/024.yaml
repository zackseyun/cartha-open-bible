    rationale: Aunque comprensible, «a causa de mí» suena más natural y digna en español general y eclesial, sin perder el matiz causal del POB inglés.
  - severity: medium
    issue: El marcador de nota está anclado en «Dios» en lugar de la expresión que traduce ἐν ἐμοὶ.
    rationale: La nota explica la alternativa literal de «ἐν ἐμοὶ» («en mí»), por lo que el marcador debe aparecer junto a «a causa de mí», no sobre «Dios», para respetar la disciplina de anclaje.
  revised_spanish_text: Y glorificaban a Dios a causa de mí[a].
