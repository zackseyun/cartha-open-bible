lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Y entonces
  - Así que
  lexicon: BDAG καί
  rationale: Se conserva la coordinación simple del griego y del POB inglés. En español, «Y» inicia con naturalidad la continuación narrativa sin añadir inferencia.
- source_word: ἐδόξαζον
  english_pob_choice: glorified
  chosen_spanish: glorificaban
  alternatives_spanish:
  - glorificaron
  - daban gloria
  - alababan
  lexicon: BDAG δοξάζω
  rationale: El imperfecto griego sugiere acción continua o repetida; «glorificaban» conserva mejor ese aspecto que un aoristo castellano. Se mantiene el sentido de dar gloria a Dios, no solo alabarlo.
- source_word: ἐν ἐμοὶ
  english_pob_choice: because of me
  chosen_spanish: por causa de mí
  alternatives_spanish:
  - en mí
  - a causa de mí
  - por medio de mí
  lexicon: BDAG ἐν
  rationale: El POB inglés opta por una lectura causal/relacional. En español, «por causa de mí» comunica de forma clara esa relación sin perder del todo la tensión con la literalidad de «en mí», que queda preservada en la nota.
- source_word: τὸν θεόν
  english_pob_choice: God
  chosen_spanish: a Dios
  alternatives_spanish:
  - a Dios
  lexicon: BDAG θεός
  rationale: Como objeto directo de «glorificaban», en español corresponde marcar el complemento personal con «a Dios». Se mantiene el referente estándar y exacto del texto.
theological_decisions:
- issue: Sentido de ἐν ἐμοὶ
  english_pob_reading: 'causal/associative: ''because of me'''
  chosen_spanish_reading: 'causal/relacional: ''por causa de mí'''
  alternative_spanish_readings:
  - 'locativo/literal: ''en mí'''
  rationale: El contexto inmediato es la reacción de las iglesias al testimonio sobre la conversión y el ministerio de Pablo. La traducción principal comunica esa respuesta a lo que Dios hizo en relación con Pablo, sin sugerir que Pablo sea la esfera de la gloria divina. La nota conserva la lectura más literal para no borrar la ambigüedad documentada.
  doctrine_reference: Preservar la tensión textual documentada; no resolverla de manera excesiva cuando el griego admite más de una relación semántica.
translation_notes:
  revision_awareness: El audio textual y la revisión inglesa indican alto acuerdo y ausencia de cambios. La versión española sigue esa solución, conservando la decisión causal en el cuerpo principal y la alternativa literal en nota.
  spanish_consistency_notes:
  - Se usa «Dios» como equivalente de θεός.
  - Se conserva «glorificaban» para reflejar el imperfecto griego.
  - Se evita «SEÑOR» porque el texto no contiene κύριος.
  - Se mantiene una formulación pública y natural en español, sin suavizar la fuerza relacional de ἐν ἐμοὶ.
