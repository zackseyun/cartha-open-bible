translation:
  language: es
  text: Pablo[a], apóstol, no de hombres ni por medio de un hombre, sino por medio de Jesús el Mesías y de Dios el Padre, que lo resucitó de entre los muertos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por medio de Jesucristo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Παῦλος
  english_pob_choice: Paul
  chosen_spanish: Pablo
  alternatives_spanish:
  - Pául
  lexicon: nombre propio (equivalente estándar)
  rationale: El nombre propio tiene equivalencia estable en español; 'Pablo' es la forma normal y transparente para el lector hispanohablante.
- source_word: ἀπόστολος
  english_pob_choice: apostle
  chosen_spanish: apóstol
  alternatives_spanish:
  - mensajero
  - delegado
  lexicon: BDAG
  rationale: El término funciona aquí como título de comisión y autoridad apostólica. 'Apóstol' conserva ese peso teológico y evita diluir el cargo en una denominación más general.
- source_word: ἀπ’ ἀνθρώπων
  english_pob_choice: from men
  chosen_spanish: de hombres
  alternatives_spanish:
  - de seres humanos
  - de personas
  lexicon: BDAG
  rationale: La preposición con genitivo expresa origen. 'De hombres' mantiene el contraste retórico con la frase singular siguiente y refleja el plural del griego sin sobreexplicarlo.
- source_word: δι’ ἀνθρώπου
  english_pob_choice: through a man
  chosen_spanish: por medio de un hombre
  alternatives_spanish:
  - por un hombre
  - mediante un hombre
  lexicon: BDAG
  rationale: διά con genitivo expresa mediación o agencia. 'Por medio de un hombre' conserva esa idea y hace visible el contraste entre el plural anterior y el singular presente en el griego.
- source_word: διὰ Ἰησοῦ Χριστοῦ
  english_pob_choice: through Jesus Messiah
  chosen_spanish: por medio de Jesucristo
  alternatives_spanish:
  - por medio de Jesús el Mesías
  - por medio de Jesús, el Cristo
  lexicon: BDAG
  rationale: Se mantiene la mediación de Jesús. En español, 'Jesucristo' es la forma más natural y reconocible en registro eclesial amplio; aunque el proyecto suele preferir 'Mesías' cuando el título está activo, aquí la construcción nominal fija y el flujo de la salutación hacen más publicable 'Jesucristo'. La nota textual preserva la alternativa titular.
- source_word: θεοῦ πατρὸς
  english_pob_choice: God the Father
  chosen_spanish: de Dios el Padre
  alternatives_spanish:
  - de Dios, el Padre
  - de Dios Padre
  lexicon: BDAG
  rationale: La construcción genitiva se vierte de modo natural como fuente coordinada con la frase anterior. 'De Dios el Padre' mantiene claridad y el vínculo entre Dios y la paternidad divina.
- source_word: τοῦ ἐγείραντος αὐτὸν ἐκ νεκρῶν
  english_pob_choice: who raised him from the dead
  chosen_spanish: que lo resucitó de entre los muertos
  alternatives_spanish:
  - que lo levantó de entre los muertos
  - que lo hizo resucitar de entre los muertos
  lexicon: BDAG
  rationale: El participio articular modifica a 'Dios el Padre'. 'Resucitó de entre los muertos' es una forma española natural y fiel para ἐκ νεκρῶν; conserva la afirmación de la resurrección sin literalidad áspera.
theological_decisions:
- issue: Título cristológico en Ἰησοῦ Χριστοῦ
  english_pob_reading: through Jesus Messiah (with revision history noting a temporary shift to Jesus Christ, then restoration of Messiah)
  chosen_spanish_reading: por medio de Jesucristo
  alternative_spanish_readings:
  - por medio de Jesús el Mesías
  - por medio de Jesús, el Cristo
  rationale: El griego admite lectura titular, y el audit trail inglés favorece 'Messiah' por política del proyecto. En español, sin embargo, 'Jesucristo' preserva fluidez y reconocimiento eclesial en una salutación programática. Para no borrar la tensión terminológica, la nota registra la alternativa 'Jesús el Mesías'.
  doctrine_reference: 'DOCTRINE.md: Χριστός → ''Mesías'' cuando el título está activo; se permite ''Cristo'' cuando la forma nominal fija exige mayor naturalidad'
- issue: Agencia de la comisión apostólica
  english_pob_reading: not from men nor through a man, but through Jesus Messiah and God the Father
  chosen_spanish_reading: no de hombres ni por medio de un hombre, sino por medio de Jesucristo y de Dios el Padre
  alternative_spanish_readings:
  - no de seres humanos ni por un hombre, sino por Jesús el Mesías y Dios el Padre
  rationale: Se conserva la doble negación y el contraste plural/singular del griego. La mediación humana queda negada con fuerza, y la mediación divina se afirma sin suavizar la estructura retórica.
  doctrine_reference: Lectura sintáctica de Gálatas 1:1; énfasis paulino en origen divino del apostolado
- issue: ἐκ νεκρῶν
  english_pob_reading: from the dead
  chosen_spanish_reading: de entre los muertos
  alternative_spanish_readings:
  - de los muertos
  - fuera de los muertos
  rationale: '''De entre los muertos'' comunica de forma idiomática la resurrección desde el estado de muerte y preserva el valor locativo/relacional de la expresión griega sin convertirla en un mero cliché.'
  doctrine_reference: Doctrina de la resurrección corporal en el anuncio paulino
translation_notes:
  revision_awareness: 'El texto base inglés pasó por una revisión que osciló entre ''Jesus Messiah'' y ''Jesus Christ''; el estado más reciente del auditor inglés volvió a ''Jesus Messiah'' por política doctrinal. La presente versión española toma una decisión de estilo distinta pero controlada: usa la forma eclesial natural ''Jesucristo'' en el cuerpo y conserva en nota la alternativa titular ''Jesús el Mesías'' para no perder la tensión léxica del griego ni del audit trail.'
  spanish_consistency_notes:
  - Se mantiene 'Dios el Padre' sin reemplazarlo por una formulación más paraprástica.
  - '''apóstol'' se conserva como título técnico y no como ''enviado'' para no rebajar la densidad paulina.'
  - '''de hombres / por medio de un hombre'' reproduce el contraste plural-singular del griego.'
  - La nota a marca la única alternativa cristológica relevante en este versículo.
  - El nombre divino no aparece en este versículo; por tanto no se introduce 'Yahvé'.
