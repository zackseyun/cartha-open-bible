review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite correctamente la bendición epistolar básica del griego: «gracia», «paz», procedencia «de», y la estructura «de Dios nuestro Padre y del Señor…». Sin embargo, no preserva la decisión auditada del POB para Ἰησοῦ Χριστοῦ, donde Χριστός se entiende como título y debe reflejarse como «Mesías», con la alternativa tradicional en nota. Además, la nota actual invierte erróneamente la relación principal/alternativa respecto al expediente inglés.'
  spanish_quality_summary: El español es claro y natural, de registro bíblico moderno y digno. «Gracia a ustedes y paz de Dios nuestro Padre…» suena bien en español general eclesial. La única reparación necesaria es terminológica en el nombre/título cristológico y su nota asociada.
  glossary_alignment: Alineación parcial. θεός → «Dios», κύριος → «Señor», χάρις → «gracia», εἰρήνη → «paz» están bien. Pero Χριστός debería seguir la pauta del proyecto como «Mesías» aquí, porque el expediente inglés documenta explícitamente que en Gal 1:3 conserva fuerza titular; por tanto «Jesucristo» en texto principal no se alinea con la decisión lexical/theological auditada.
  issues:
  - severity: high
    issue: Χριστοῦ se tradujo como «Jesucristo» en vez de «Jesús Mesías».
    rationale: El expediente inglés y la decisión teológica documentada para este versículo prefieren «Jesus Messiah» porque Χριστός aún funciona como título, no como mero apellido litúrgico. El español debe preservar esa decisión salvo razón contextual fuerte, que aquí no supera la directriz ya auditada.
  - severity: medium
    issue: La nota al pie presenta la opción principal y la alternativa al revés.
    rationale: 'El inglés tiene texto principal «Jesus Messiah» con nota «Or: “Jesus Christ.”». En español, si el texto principal se corrige a «Jesús Mesías», la nota debe dar la alternativa tradicional «Jesucristo» o «Jesús Cristo», no «Jesús el Mesías».'
  - severity: low
    issue: La forma «Jesucristo» fusionada es muy natural en español, pero aquí oscurece la fuerza titular que el proyecto busca mantener.
    rationale: No es un problema de legibilidad sino de fidelidad al razonamiento lexical/doctrinal específico de esta unidad.
  revised_spanish_text: Gracia a ustedes y paz de Dios nuestro Padre y del Señor Jesús Mesías.[a]
