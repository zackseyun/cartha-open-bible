lexical_decisions:
- source_word: χάρις
  english_pob_choice: Grace
  chosen_spanish: Gracia
  alternatives_spanish:
  - favor
  lexicon: BDAG
  rationale: En la fórmula epistolar paulina, χάρις funciona como saludo de bendición y también como eco teológico. «Gracia» conserva ese doble alcance en español y es la equivalencia natural y fiel.
- source_word: ὑμῖν
  english_pob_choice: to you
  chosen_spanish: a ustedes
  alternatives_spanish:
  - para ustedes
  lexicon: BDAG
  rationale: El dativo de destinatario se expresa con naturalidad en español con «a ustedes». Mantiene el carácter directo del saludo sin añadir matices no presentes en el griego.
- source_word: εἰρήνη
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - bienestar
  lexicon: BDAG
  rationale: «Paz» es la traducción estable y semánticamente adecuada en este saludo, conservando tanto el trasfondo judío como la resonancia teológica paulina.
- source_word: ἀπό
  english_pob_choice: from
  chosen_spanish: de
  alternatives_spanish:
  - proveniente de
  lexicon: BDAG
  rationale: La preposición introduce fuente u origen; en español, «de» es la forma más natural y precisa en esta construcción.
- source_word: θεοῦ πατρὸς
  english_pob_choice: God our Father
  chosen_spanish: Dios nuestro Padre
  alternatives_spanish:
  - Dios, nuestro Padre
  - Dios el Padre
  lexicon: BDAG
  rationale: El encadenamiento genitivo permite entender naturalmente «nuestro» con «Padre»; en español, «Dios nuestro Padre» reproduce bien la relación sin sobrecargar la frase.
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: «Señor» preserva el título cristológico y su peso bíblico en español. No se sustituye por un término más explicativo porque aquí el título es parte de la fórmula fija.
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesucristo
  alternatives_spanish:
  - Jesús el Mesías
  - Jesús Cristo
  lexicon: BDAG
  rationale: Aunque el POB inglés documenta la opción de traducir Χριστός como «Messiah», el español bíblico estándar y más legible aquí es «Jesucristo», que conserva la referencia cristológica sin sonar forzado en la fórmula de saludo.
theological_decisions:
- issue: Tratamiento de Χριστός en la fórmula cristológica final
  english_pob_reading: Jesus Messiah (with alternative note to Jesus Christ in English audit trail, later revision toggling between translated title and traditional form)
  chosen_spanish_reading: Jesucristo
  alternative_spanish_readings:
  - Jesús el Mesías
  - Jesús Cristo
  rationale: En español, la forma unida «Jesucristo» es la más natural y reconocible en una bendición inicial. Aunque el proyecto suele preferir «Mesías» para Χριστός cuando funciona claramente como título, aquí la fórmula nominal cristalizada se comunica mejor con la forma tradicional, sin negar su contenido titulado.
  doctrine_reference: 'Contested terms table: Χριστός → Mesías cuando el título es explícito; mantener la forma tradicional cuando el uso nominal fijo exige mayor naturalidad y claridad en español.'
translation_notes:
  revision_awareness: El registro inglés muestra una oscilación editorial entre «Jesus Messiah» y «Jesus Christ», con restauración posterior de la lectura titulada. Para el español, se optó por la forma más idiomática y eclesialmente legible («Jesucristo»), manteniendo la conciencia de la tensión traductológica entre título y nombre fijo.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para θεοῦ y «Señor» para κυρίου, siguiendo el patrón del POB y la terminología bíblica española estándar.
  - Se evitó «SEÑOR» como máscara tipográfica para el nombre divino, porque aquí aparece θεοῦ y no el tetragrámaton.
  - «Gracia» y «paz» conservan la fórmula paulina de saludo sin expandir el sentido más allá de lo que el griego exige.
  - La puntuación y el orden de la frase siguen el flujo natural del español, sin perder la relación fuente-destinatario del original.
