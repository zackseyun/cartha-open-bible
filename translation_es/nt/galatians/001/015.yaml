translation:
  language: es
  text: Pero cuando el que me apartó desde el vientre de mi madre y me llamó por su gracia se complació[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desde el nacimiento»; compárese el lenguaje de llamado profético en Jeremías 1:5 e Isaías 49:1.
    reason: cross_reference
lexical_decisions:
- source_word: ὅτε δὲ
  english_pob_choice: But when
  chosen_spanish: Pero cuando
  alternatives_spanish:
  - Mas cuando
  - Y cuando
  lexicon: BDAG
  rationale: Conserva la fuerza temporal de ὅτε y el matiz contrastivo de δέ. «Pero cuando» suena natural en español y mantiene el giro de la oración.
- source_word: εὐδόκησεν
  english_pob_choice: was pleased
  chosen_spanish: fue agradado
  alternatives_spanish:
  - se complació
  - quiso
  - decidió
  lexicon: BDAG
  rationale: Se busca reflejar la idea de beneplácito/divino agrado de εὐδοκέω sin convertirla meramente en decisión. En español, una pasiva perifrástica mantiene la referencia a la acción respecto de Dios, aunque resulte menos idiomática que una activa; se deja así visible la tensión del original.
- source_word: ὁ ἀφορίσας με
  english_pob_choice: he who set me apart
  chosen_spanish: el que me apartó
  alternatives_spanish:
  - el que me separó
  - el que me destinó
  - el que me consagró aparte
  lexicon: BDAG
  rationale: La construcción con participio articular se vierte de modo sustantivo. «Apartó» comunica la distinción/consecración implícita en ἀφορίζω sin introducir de más una lectura doctrinal cerrada como «destinó».
- source_word: ἐκ κοιλίας μητρός μου
  english_pob_choice: from my mother’s womb
  chosen_spanish: desde el vientre de mi madre
  alternatives_spanish:
  - desde el seno de mi madre
  - desde el vientre materno
  - desde mi nacimiento
  lexicon: BDAG
  rationale: «Desde el vientre de mi madre» conserva la imaginería concreta y el idioma bíblico del griego. Se evita la paráfrasis «desde mi nacimiento» porque debilita la metáfora original y la referencia intertextual.
- source_word: καλέσας
  english_pob_choice: called
  chosen_spanish: me llamó
  alternatives_spanish:
  - me convocó
  - me llamó a
  lexicon: BDAG
  rationale: «Llamó» es el equivalente natural y teológicamente adecuado en el uso paulino de vocación divina. Se mantiene la sencillez del verbo sin expansión explicativa.
- source_word: διὰ τῆς χάριτος αὐτοῦ
  english_pob_choice: through his grace
  chosen_spanish: por su gracia
  alternatives_spanish:
  - a través de su gracia
  - mediante su gracia
  lexicon: BDAG
  rationale: La preposición διά con genitivo expresa medio o instrumento. En español, «por su gracia» es claro, fiel y digno; conserva el carácter instrumental de la gracia en el llamamiento.
theological_decisions:
- issue: Cómo rendir εὐδόκησεν sin resolver demasiado la relación entre beneplácito divino y acto de llamar
  english_pob_reading: was pleased
  chosen_spanish_reading: fue agradado
  alternative_spanish_readings:
  - se complació
  - quiso
  - decidió
  rationale: La frase mantiene el matiz de beneplácito y no reduce el verbo a mera voluntad o decisión. Aunque «fue agradado» es menos común en español, sirve para no borrar la tensión teológica entre el agrado soberano de Dios y su acción de llamar.
  doctrine_reference: Preservar la tensión teológica sin cerrarla prematuramente.
- issue: Si ἀφορίσας debe traducirse como «separó», «apartó» o algo más doctrinal
  english_pob_reading: set me apart
  chosen_spanish_reading: me apartó
  alternative_spanish_readings:
  - me separó
  - me destinó
  - me consagró aparte
  rationale: «Apartó» refleja el sentido de distinción/consagración de ἀφορίζω sin imponer una sistematización posterior. Se evita «destinó», porque desplaza el énfasis hacia destino o decreto, y se evita «consagró», porque añade lenguaje cultual no explícito en el verso.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: 'Se siguió la lectura final auditada del inglés POB (optimal-equivalence): he who / set me apart / from my mother’s womb / called me through his grace / was pleased. En español, la principal tensión fue cómo expresar εὐδόκησεν: se optó por una forma que conserve el beneplácito divino sin neutralizarlo en mera decisión. También se mantuvo la imaginería concreta de κοιλίας μητρός μου y el medio instrumental de διά τῆς χάριτος αὐτοῦ.'
  spanish_consistency_notes:
  - Se mantuvo «gracia» para χάρις conforme al criterio del proyecto.
  - Se usó «apartó» para ἀφορίζω, evitando «escogió» o «destinó» para no sobreinterpretar.
  - Se conservó «vientre de mi madre» por transparencia bíblica y por la nota de alternativa intertextual.
  - La puntuación y el orden buscan sonar naturales en español sin perder la estructura temporal del griego.
