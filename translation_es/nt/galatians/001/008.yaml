translation:
  language: es
  text: Pero aun si nosotros o un ángel del cielo les anunciara[a] algo contrario a lo que les anunciamos[b], sea anatema[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «les predicara el evangelio» o «les proclamara buenas noticias». El griego usa el verbo «anunciar buenas noticias».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «algo distinto de lo que» o «algo más allá de lo que».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «sea maldito» o «esté bajo maldición».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ καὶ ἐὰν
  english_pob_choice: But even if
  chosen_spanish: Pero aun si
  alternatives_spanish:
  - Pero incluso si
  - Y aun si
  lexicon: BDAG
  rationale: Conserva el fuerte contraste de ἀλλά y el énfasis de καί + ἐάν con un español natural y sobrio.
- source_word: ἡμεῖς ἢ ἄγγελος ἐξ οὐρανοῦ
  english_pob_choice: we or an angel from heaven
  chosen_spanish: nosotros o un ángel del cielo
  alternatives_spanish:
  - nosotros mismos o un ángel del cielo
  - nosotros o un mensajero del cielo
  lexicon: BDAG
  rationale: Mantiene la auto-inclusión enfática de Pablo y la imagen de un mensajero celestial sin añadir matices no requeridos.
- source_word: εὐαγγελίζηται
  english_pob_choice: should proclaim good news
  chosen_spanish: les anunciara[a]
  alternatives_spanish:
  - les predicara[a]
  - les proclamara la buena noticia[a]
  lexicon: BDAG
  rationale: En español, «anunciar» comunica el verbo verbal del texto sin forzar el sustantivo «evangelio»; la nota preserva la alternativa lexical de «proclamar buenas noticias».
- source_word: παρ’ ὃ
  english_pob_choice: contrary to what
  chosen_spanish: algo distinto de lo que
  alternatives_spanish:
  - algo contrario a lo que
  - algo más allá de lo que
  lexicon: BDAG
  rationale: «Distinto de lo que» expresa la desviación respecto del mensaje anterior sin volver demasiado idiomático el valor polémico de παρά; la nota cubre la alternativa más fuerte «contrario a».
- source_word: εὐηγγελισάμεθα
  english_pob_choice: we proclaimed
  chosen_spanish: les anunciamos[c]
  alternatives_spanish:
  - les proclamamos[c]
  - les anunciamos como buena noticia[c]
  lexicon: BDAG
  rationale: Conserva la conexión verbal con εὐαγγελίζηται mediante «anunciar» y mantiene el objeto indirecto explícito del texto griego.
- source_word: ἀνάθεμα ἔστω
  english_pob_choice: let him be accursed
  chosen_spanish: sea anatema
  alternatives_spanish:
  - sea maldito
  - esté bajo maldición
  lexicon: BDAG
  rationale: «Sea anatema» preserva la fórmula solemne y la tensión teológica del término sin sustituirla por una explicación interpretativa.
theological_decisions:
- issue: Fórmula de maldición / juicio apostólico
  english_pob_reading: Paul pronounces a real curse judgment on anyone proclaiming a message contrary to the apostolic gospel, rendered 'let him be accursed.'
  chosen_spanish_reading: Pablo pronuncia un juicio de maldición real sobre cualquiera que anuncie un mensaje distinto del apostólico, expresado como «sea anatema».
  alternative_spanish_readings:
  - sea maldito
  - esté bajo maldición
  - sea excomulgado
  rationale: «Anatema» conserva la gravedad judicial del griego y evita reducir el dicho a una mera fórmula eclesiástica posterior o a una paráfrasis explicativa.
  doctrine_reference: Gálatas 1:8; BDAG ἀνάθεμα
- issue: Valor de παρά con relativo en el contexto
  english_pob_reading: ‘contrary to what’ or ‘different from what’ or ‘beyond what’ we proclaimed.
  chosen_spanish_reading: La frase se entiende como desviación real respecto del mensaje ya proclamado, sin necesidad de elegir entre oposición frontal y mera diferencia de contenido.
  alternative_spanish_readings:
  - contrario a lo que
  - más allá de lo que
  - diferente de lo que
  rationale: «Distinto de lo que» mantiene abierta la tensión semántica de παρά y permite que el contexto polémico haga el resto; la nota lexical registra la alternativa más fuerte.
  doctrine_reference: Gálatas 1:8; comentario lexical sobre παρά
translation_notes:
  revision_awareness: 'Se siguió el pasaje griego SBLGNT y el hilo auditado en inglés. No se necesitó revisión textual adicional; se conservaron las tres tensiones señaladas por el POB inglés: el verbo de «anunciar buenas noticias», el valor de παρά con relativo y la fórmula ἀνάθεμα ἔστω.'
  spanish_consistency_notes:
  - Se usó «anatema» para preservar la fórmula técnica y solemne del término.
  - Se evitó «evangelio» como sustantivo en la cláusula principal para respetar el verbo griego εὐαγγελίζηται.
  - Se mantuvo el trato indirecto plural «les» conforme al griego ὑμῖν.
  - La puntuación refleja una sola oración condicional con imperativo/jussivo final.
