translation:
  language: es
  text: 'Como ya hemos dicho antes, ahora vuelvo a decir: si alguien les anuncia un evangelio contrario a lo que recibieron[a], sea maldito[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «más allá de lo que recibieron»; la frase puede señalar una desviación del mensaje recibido.
    reason: lexical_alternative
  - marker: b
    text: 'O «sea bajo maldición»; griego: anathema estō.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς προειρήκαμεν
  english_pob_choice: As we have said before
  chosen_spanish: Como ya hemos dicho antes
  alternatives_spanish:
  - Como hemos dicho previamente
  - Tal como dijimos antes
  lexicon: BDAG
  rationale: ὡς introduce la referencia a lo ya dicho; προειρήκαμεν expresa una acción previa con vigencia actual. «Como ya hemos dicho antes» suena natural en español y conserva la referencia retrospectiva sin perder el matiz de continuidad.
- source_word: ἄρτι πάλιν λέγω
  english_pob_choice: so now I say again
  chosen_spanish: ahora vuelvo a decir
  alternatives_spanish:
  - ahora digo de nuevo
  - en este momento repito
  lexicon: BDAG
  rationale: ἄρτι señala el momento presente y πάλιν la repetición. «Ahora vuelvo a decir» integra ambos valores de forma idiomática; el «de nuevo» implícito queda reforzado por el contexto y por la frase siguiente.
- source_word: εἴ τις ὑμᾶς εὐαγγελίζεται
  english_pob_choice: if anyone is preaching a gospel to you
  chosen_spanish: si alguien les anuncia un evangelio
  alternatives_spanish:
  - si alguien les predica un evangelio
  - si alguien les proclama buenas noticias
  lexicon: BDAG
  rationale: εὐαγγελίζεται remite a anunciar buenas nuevas, pero en Gálatas el contraste polémico exige mencionar «evangelio». «Anuncia un evangelio» conserva la fuerza verbal y el carácter de mensaje proclamado sin volver la frase demasiado pesada.
- source_word: παρ’ ὃ
  english_pob_choice: contrary to what
  chosen_spanish: contrario a lo que
  alternatives_spanish:
  - más allá de lo que
  - diferente de lo que
  lexicon: BDAG
  rationale: La construcción con παρά y relativo indica desviación respecto del mensaje recibido. «Contrario a lo que» refleja bien esa oposición normativa en el contexto de la carta.
- source_word: παρελάβετε
  english_pob_choice: you received
  chosen_spanish: recibieron
  alternatives_spanish:
  - aceptaron
  - les fue entregado
  lexicon: BDAG
  rationale: παραλαμβάνω en este contexto se refiere a recibir una tradición o mensaje. «Recibieron» es preciso, claro y mantiene la relación con la transmisión apostólica.
- source_word: ἀνάθεμα ἔστω
  english_pob_choice: let him be accursed
  chosen_spanish: sea anatema
  alternatives_spanish:
  - sea maldito
  - que sea anatema
  lexicon: BDAG
  rationale: ἀνάθεμα expresa quedar bajo maldición o consagrado a destrucción. «Sea anatema» preserva el término técnico y la solemnidad del juicio; evita suavizar la fuerza del griego y deja visible la tensión teológica del pasaje.
theological_decisions:
- issue: Fuerza del juicio en ἀνάθεμα ἔστω
  english_pob_reading: let him be accursed
  chosen_spanish_reading: sea anatema
  alternative_spanish_readings:
  - sea maldito
  - quede bajo maldición
  rationale: El griego es una fórmula solemne e imprecatoria. Mantener «anatema» conserva la dureza judicial del término y evita una explicación interpretativa que atenúe el alcance de la condena.
  doctrine_reference: Juicio divino / maldición en el lenguaje apostólico
- issue: Sentido de παρ’ ὃ frente a ‘beyond what’
  english_pob_reading: contrary to what you received
  chosen_spanish_reading: contrario a lo que recibieron
  alternative_spanish_readings:
  - más allá de lo que recibieron
  - distinto de lo que recibieron
  rationale: Aunque παρά puede sugerir ‘más allá’, el contexto de Gálatas 1 favorece oposición a la tradición recibida, no solo excederla. «Contrario a» comunica mejor la desviación doctrinal denunciada por Pablo.
  doctrine_reference: Fidelidad al evangelio apostólico
- issue: Conservar el carácter proclamativo de εὐαγγελίζεται
  english_pob_reading: is preaching a gospel
  chosen_spanish_reading: anuncia un evangelio
  alternative_spanish_readings:
  - predica un evangelio
  - proclama un evangelio
  rationale: En español, «anunciar un evangelio» mantiene el acto de proclamación sin convertir la construcción en una paráfrasis excesiva. Además, preserva el paralelismo con el contenido recibido por la comunidad.
  doctrine_reference: Naturaleza del evangelio predicado
translation_notes:
  revision_awareness: 'Se siguió el pasaje griego SBLGNT y el audit trail inglés de la POB. No hubo revisiones aplicadas en la última pasada, y la concordancia revisora fue alta/agreed, por lo que la presente versión mantiene las decisiones léxicas principales: referencia retrospectiva, repetición enfática, proclamación del evangelio, contraste doctrinal y la fórmula de condena ‘anathema’.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se eligió «evangelio» por el campo semántico consolidado en Gálatas; no se tradujo como ‘buenas noticias’ para conservar la terminología paulina.
  - «Anatema» se mantiene sin glosa en el cuerpo para reflejar la carga técnica y solemne del término griego.
  - El tratamiento de segunda persona plural «recibieron» mantiene la dirección comunitaria del original griego ὑμᾶς / παρελάβετε.
