  to: Porque han oído acerca de mi anterior manera de vivir en el judaísmo[a][b], que perseguía a la iglesia de Dios[c] más allá de toda medida y la asolaba[d].
  rationale: Se ajusta el verbo inicial a un registro más neutral latinoamericano («han oído»), se restaura la nota léxica faltante para καθ’ ὑπερβολὴν anclándola en la frase intensificadora, y se elimina la nota sobre «iglesia/asamblea» para alinearse con la decisión principal y el patrón de notas del POB inglés en este versículo. Se conservan las elecciones fieles «manera de vivir», «judaísmo», «iglesia de Dios» y «la asolaba».
