translation:
  language: es
  text: Porque han oído acerca de mi anterior manera de vivir en el judaísmo[a][b], que perseguía a la iglesia de Dios[c] más allá de toda medida y la asolaba[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi conducta anterior» o «mi anterior manera de vivir».
    reason: lexical_alternative
  - marker: b
    text: O «la religión judía».
    reason: lexical_alternative
  - marker: c
    text: O «excesivamente» o «en grado extraordinario».
    reason: lexical_alternative
  - marker: d
    text: O «la estaba destruyendo» o «trataba de destruirla».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναστροφήν
  english_pob_choice: way of life
  chosen_spanish: manera de vivir
  alternatives_spanish:
  - conducta
  - modo de vivir
  lexicon: BDAG
  rationale: ἀναστροφήν abarca la conducta general y el estilo de vida. «Manera de vivir» conserva esa amplitud con un español natural y menos restrictivo que un término puntual como «conducta».
- source_word: ποτε
  english_pob_choice: former
  chosen_spanish: anterior
  alternatives_spanish:
  - antigua
  - de antes
  - anteriormente
  lexicon: BDAG
  rationale: El adverbio marca el contraste con la vida presente de Pablo. «Anterior» funciona bien unido a «manera de vivir» y mantiene el valor temporal sin añadir matices innecesarios.
- source_word: Ἰουδαϊσμῷ
  english_pob_choice: Judaism
  chosen_spanish: el judaísmo
  alternatives_spanish:
  - la religión judía
  - la manera de vivir judía
  lexicon: BDAG
  rationale: El término apunta al marco religioso-identitario judío de la etapa anterior de Pablo. «Judaísmo» es el equivalente directo y más transparente en español.
- source_word: καθ’ ὑπερβολὴν
  english_pob_choice: beyond measure
  chosen_spanish: más allá de toda medida
  alternatives_spanish:
  - excesivamente
  - en grado extraordinario
  lexicon: BDAG
  rationale: La expresión intensifica la persecución. «Más allá de toda medida» preserva la fuerza retórica del griego y su sentido de exceso sin reducirlo a una sola adverbialización técnica.
- source_word: ἐδίωκον
  english_pob_choice: was persecuting
  chosen_spanish: perseguía
  alternatives_spanish:
  - estaba persiguiendo
  - perseguía continuamente
  lexicon: BDAG
  rationale: El imperfecto griego expresa acción continua en el pasado. En español, el imperfecto simple «perseguía» comunica esa duración de forma natural y fiel.
- source_word: ἐκκλησίαν τοῦ θεοῦ
  english_pob_choice: the church of God
  chosen_spanish: la iglesia de Dios
  alternatives_spanish:
  - la asamblea de Dios
  lexicon: BDAG
  rationale: En este contexto, ἐκκλησία se refiere a la comunidad mesiánica concreta. «Iglesia» es la forma española estable y clara para esta referencia, mientras que «asamblea» sería posible pero menos idiomática.
- source_word: ἐπόρθουν
  english_pob_choice: was ravaging
  chosen_spanish: la asolaba
  alternatives_spanish:
  - la devastaba
  - la destruía
  - intentaba destruirla
  lexicon: BDAG
  rationale: El verbo comunica devastación violenta, más fuerte que una mera oposición. «Asolaba» conserva esa dureza y la continuidad del imperfecto; además, permite evitar repetir demasiado «destruir» sin perder fuerza.
theological_decisions:
- issue: 'ἐκκλησία τοῦ θεοῦ: “iglesia” frente a “asamblea”'
  english_pob_reading: the church of God
  chosen_spanish_reading: la iglesia de Dios
  alternative_spanish_readings:
  - la asamblea de Dios
  rationale: La POB inglesa opta por «church» para comunicar con claridad la comunidad de creyentes a la que Pablo perseguía. En español, «iglesia» cumple esa función de modo natural y no añade una carga doctrinal ajena al texto.
  doctrine_reference: Ecclesiology / comunidad del pueblo de Dios
translation_notes:
  revision_awareness: 'Se ha mantenido el acuerdo alto con el auditorio inglés: se conservaron los tres ejes léxicos principales del versículo —ἀναστροφήν, Ἰουδαϊσμῷ, ἐπόρθουν— con equivalentes españoles que preservan duración, identidad religiosa y violencia del verbo. No se introdujeron cambios textuales respecto del pasaje base; la versión sigue la lectura estable del SBLGNT y refleja las alternativas documentadas por la POB inglesa en notas.'
  spanish_consistency_notes:
  - Se usó «iglesia de Dios» para mantener coherencia con la terminología POB y con el referente comunitario del contexto paulino.
  - Se prefirió el imperfecto en español («perseguía», «asolaba») para reflejar el aspecto durativo del griego.
  - Se evitó «SEÑOR» o perífrasis reverencial porque aquí no aparece κύριος; θεοῦ se rindió simplemente por «Dios».
  - La frase «más allá de toda medida» conserva la intensidad de καθ’ ὑπερβολὴν sin rebajarla a un adverbio más débil.
