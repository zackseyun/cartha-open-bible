translation:
  language: es
  text: que no es otro evangelio[a]; sino que hay algunos que los perturban y quieren distorsionar el evangelio del Mesías[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "un evangelio diferente".
    reason: lexical_alternative
  - marker: b
    text: O "pervertir" el evangelio del Mesías.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄλλο
  english_pob_choice: another gospel
  chosen_spanish: otro evangelio
  alternatives_spanish:
  - un evangelio diferente
  - otro evangelio distinto
  lexicon: BDAG
  rationale: En español, el adjetivo 'otro' reproduce con naturalidad la idea de que no se trata de un evangelio adicional o distinto. Como el referente está implícito por el contexto inmediato, no hace falta añadir más que 'evangelio' en la traducción.
- source_word: εἰ μή
  english_pob_choice: except that
  chosen_spanish: sino que
  alternatives_spanish:
  - excepto que
  - salvo que
  lexicon: BDAG
  rationale: '''Sino que'' expresa bien la corrección/excepción explicativa introducida por εἰ μή en este contexto, con un flujo natural en español y sin forzar una condicionalidad que el griego no exige.'
- source_word: ταράσσοντες
  english_pob_choice: troubling
  chosen_spanish: perturbando
  alternatives_spanish:
  - inquietando
  - causando confusión
  lexicon: BDAG
  rationale: '''Perturbando'' conserva la fuerza verbal y el tono pastoral del participio. Evita suavizar el sentido en comparación con opciones como ''inquietando'', y mantiene la idea de desorden provocado a los destinatarios.'
- source_word: θέλοντες
  english_pob_choice: wanting
  chosen_spanish: quieren
  alternatives_spanish:
  - desean
  - pretenden
  lexicon: BDAG
  rationale: Aquí el participio expresa intención. 'Quieren' es una manera natural y sobria de renderizar esa voluntad orientada a la acción sin introducir una lectura más interpretativa como 'pretenden'.
- source_word: μεταστρέψαι
  english_pob_choice: distort
  chosen_spanish: torcer
  alternatives_spanish:
  - desfigurar
  - pervertir
  lexicon: BDAG
  rationale: '''Torcer'' comunica alteración desviada o deformación del contenido del evangelio con una imagen idiomática fuerte y comprensible. Es menos arcaizante que ''pervertir'' y menos abstracta que ''desfigurar''.'
- source_word: εὐαγγέλιον
  english_pob_choice: gospel
  chosen_spanish: evangelio
  alternatives_spanish:
  - buena noticia
  lexicon: BDAG
  rationale: '''Evangelio'' es el equivalente técnico establecido en el contexto paulino. ''Buena noticia'' sería posible, pero aquí debilitaría la referencia terminológica ya consolidada en la epístola.'
- source_word: Χριστοῦ
  english_pob_choice: the Messiah
  chosen_spanish: del Mesías
  alternatives_spanish:
  - de Cristo
  lexicon: BDAG
  rationale: Se mantiene 'Mesías' conforme al criterio del proyecto para Χριστός como título. La forma posesiva 'del Mesías' preserva el vínculo con el evangelio que pertenece a él o lo concierne, sin perder la carga judía-mesiánica.
theological_decisions:
- issue: Χριστός como título, no nombre litúrgico fijo
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: La terminología del proyecto favorece 'Mesías' cuando Χριστός funciona como título. En este versículo, la expresión 'evangelio del Mesías' mantiene la orientación temática de Pablo y evita sustituir el título por una forma eclesiástica más tradicional sin necesidad textual.
  doctrine_reference: 'Contested terms table: Χριστός → Mesías (cuando funciona como título)'
translation_notes:
  revision_awareness: El inglés auditado pasó por una oscilación entre 'the Messiah' y 'Christ', con restauración final de 'Messiah' por coherencia doctrinal del proyecto. La redacción española sigue deliberadamente ese estado final y conserva el título mesiánico en el texto principal.
  spanish_consistency_notes:
  - 'Se mantuvo el orden lógico del griego: primero la negación del ''otro evangelio'', luego la aclaración de que hay personas perturbando a los destinatarios.'
  - '''Evangelio'' se conserva como término técnico paulino, sin glosarlo como ''buena noticia''.'
  - El posesivo 'del Mesías' reproduce de forma natural τοῦ Χριστοῦ sin convertirlo en nombre propio no traducido.
  - La puntuación con punto y coma ayuda a reflejar la estructura contrastiva del griego sin sobrecargar el español.
