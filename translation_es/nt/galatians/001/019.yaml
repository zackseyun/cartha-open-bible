review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la sintaxis básica del griego: contraste con δέ, negación de ver a otros apóstoles, y excepción introducida por εἰ μὴ. También preserva adecuadamente la lectura principal de que Jacobo queda dentro de la excepción. Sin embargo, el nombre propio ''Jacobo'' no sigue el uso más ampliamente inteligible en español bíblico general para Ἰάκωβος en el NT, donde ''Santiago'' suele ser la forma esperada y eclesialmente reconocible; mantener ''Jacobo'' requeriría una política onomástica más explícita y consistente.'
  spanish_quality_summary: 'La frase es clara y natural: ''Pero no vi a ningún otro de los apóstoles, sino a…'' suena bien en español. La nota al pie, sin embargo, puede mejorarse en redacción: ''como no clasificando'' es poco idiomático; ''como que no clasifica'' o ''sin clasificar necesariamente'' fluye mejor. Además, conviene anclar la nota directamente al nombre o a la cláusula excepcional, no al punto final.'
  glossary_alignment: 'No hay conflicto con la terminología principal del proyecto respecto a Yahvé, Mesías, Señor, etc. ''Señor'' para κύριος es correcto aquí. ''Apóstoles'' y ''hermano'' también están bien. La única desalineación relevante es onomástica: ''Jacobo'' frente a la forma bíblica española más reconocible ''Santiago'' para Ἰάκωβος en este contexto del NT.'
  issues:
  - severity: medium
    issue: Uso de 'Jacobo' en lugar de 'Santiago'
    rationale: Aunque 'Jacobo' puede defenderse etimológicamente, en español bíblico eclesial general Gal 1:19 se reconoce más naturalmente como 'Santiago, el hermano del Señor'. Esto mejora inteligibilidad y recepción sin alterar el sentido fuente.
  - severity: low
    issue: Redacción poco natural de la nota al pie
    rationale: La frase 'como no clasificando a Jacobo como apóstol' suena forzada en español. Una redacción más idiomática preserva mejor la intención auditada del inglés.
  - severity: low
    issue: Ubicación del marcador de nota
    rationale: Es preferible colocar el marcador junto al nombre o frase pertinente antes del punto final, para anclar claramente la variante a la construcción excepcional.
  revised_spanish_text: Pero no vi a ningún otro de los apóstoles, sino a Santiago[a], el hermano del Señor.
  revised_footnotes:
  - marker: a
    text: 'O: «no vi a ningún otro apóstol; sólo a Santiago, el hermano del Señor». Algunos entienden esta redacción como que no clasifica necesariamente a Santiago como apóstol.'
    reason: alternative_reading
  revision_rationale: Se mantiene la estructura sintáctica y el sentido teológico del original, pero se ajusta el nombre propio a la forma española bíblica más reconocible ('Santiago') y se mejora la naturalidad de la nota al pie. También se coloca el marcador en una posición más precisa dentro del texto.
