translation:
  language: es
  text: Pero no vi a ningún otro de los apóstoles, sino a Santiago[a], el hermano del Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no vi a ningún otro apóstol; sólo a Santiago, el hermano del Señor». Algunos entienden esta redacción como que no clasifica necesariamente a Santiago como apóstol.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἕτερον
  english_pob_choice: other
  chosen_spanish: otro
  alternatives_spanish:
  - otro más
  - diferente
  lexicon: BDAG
  rationale: En la construcción partitiva con τῶν ἀποστόλων, ἕτερον significa ‘otro’ dentro del conjunto. ‘Otro’ comunica de manera natural el valor de excepción sin añadir matices ajenos.
- source_word: δέ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Mas
  - Y
  lexicon: BDAG
  rationale: δέ introduce un leve contraste o continuación. ‘Pero’ funciona bien en español y conserva el giro adversativo del contexto inmediato.
- source_word: τῶν ἀποστόλων
  english_pob_choice: apostles
  chosen_spanish: de los apóstoles
  alternatives_spanish:
  - de los mensajeros
  - de los enviados
  lexicon: BDAG
  rationale: En contexto paulino se trata del círculo apostólico reconocido. ‘Apóstoles’ es el término más claro y fiel para la referencia histórica y eclesial.
- source_word: οὐκ εἶδον
  english_pob_choice: I saw none
  chosen_spanish: no vi a ningún
  alternatives_spanish:
  - no vi
  - no vi a ninguno
  lexicon: BDAG
  rationale: La negación simple con el complemento partitivo se expresa naturalmente en español como ‘no vi a ningún’. Mantiene el sentido directo de la negación sin forzar una paráfrasis.
- source_word: εἰ μὴ
  english_pob_choice: except
  chosen_spanish: sino
  alternatives_spanish:
  - excepto
  - salvo
  lexicon: BDAG
  rationale: Aquí εἰ μή introduce una excepción idiomática. ‘Sino’ es muy natural en español después de una negación y preserva la relación de contraste/excepción.
- source_word: Ἰάκωβον
  english_pob_choice: James
  chosen_spanish: Jacobo
  alternatives_spanish:
  - Santiago
  - James
  lexicon: BDAG
  rationale: Para el nombre Ἰάκωβος, ‘Jacobo’ mantiene una forma española tradicional y reconocible, evitando mezclar con la forma litúrgica ‘Santiago’ cuando el texto no la exige.
- source_word: ἀδελφὸν
  english_pob_choice: brother
  chosen_spanish: hermano
  alternatives_spanish:
  - pariente
  - consanguíneo
  lexicon: BDAG
  rationale: El sentido ordinario y directo es el familiar. No hay indicio en el texto de que deba suavizarse a un término más amplio de parentesco.
- source_word: τοῦ κυρίου
  english_pob_choice: the Lord’s
  chosen_spanish: del Señor
  alternatives_spanish:
  - de Yahvé
  - del Señor Jesús
  lexicon: BDAG
  rationale: En el marco del NT, κύριος referido a Jesús se traduce de forma natural como ‘Señor’. En español, ‘del Señor’ preserva el posesivo sin sobrecargar el texto; el referente queda claro por el contexto.
theological_decisions:
- issue: Si la frase incluye o no a Jacobo entre los apóstoles
  english_pob_reading: 'The main text preserves the most natural syntactic sense: Paul saw no other apostles except James, implying James is included within that exception.'
  chosen_spanish_reading: 'La traducción principal conserva el sentido sintáctico natural: Pablo no vio a ningún otro de los apóstoles sino a Jacobo, lo que deja a Jacobo dentro de la excepción.'
  alternative_spanish_readings:
  - Algunos entienden que Pablo no vio a ningún otro apóstol, y que la mención de Jacobo no lo clasifica necesariamente como apóstol.
  rationale: εἰ μὴ introduce la excepción más inmediata a la negación anterior. La formulación española mantiene esa estructura sin imponer una explicación interpretativa dentro del texto principal.
  doctrine_reference: Sintaxis de excepción con εἰ μή; discusión histórica sobre el alcance del término ἀπόστολος en Gálatas 1:19.
translation_notes:
  revision_awareness: No se observan revisiones posteriores que alteren el sentido base; se conserva el acuerdo alto del texto inglés POB y la lectura sintáctica del griego sin cambios sustantivos.
  spanish_consistency_notes:
  - Se usa ‘Señor’ para κύριος conforme al uso del NT cuando se refiere a Jesús.
  - Se mantiene ‘Jacobo’ como forma española de Ἰάκωβος para coherencia onomástica.
  - La negación con excepción se expresa con ‘no vi a ningún… sino a…’, una construcción natural en español que preserva la fuerza de οὐκ εἶδον / εἰ μὴ.
