revisions:
- from: Pero no vi a ningún otro de los apóstoles, sino a Jacobo, el hermano del Señor.[a]
  to: Pero no vi a ningún otro de los apóstoles, sino a Santiago[a], el hermano del Señor.
  rationale: Se mantiene la estructura sintáctica y el sentido teológico del original, pero se ajusta el nombre propio a la forma española bíblica más reconocible ('Santiago') y se mejora la naturalidad de la nota al pie. También se coloca el marcador en una posición más precisa dentro del texto.
  reviewer_model: gpt-5.4
