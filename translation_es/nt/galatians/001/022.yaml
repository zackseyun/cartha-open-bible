  - severity: low
    issue: La combinación «personalmente desconocido por rostro» recarga dos maneras de expresar la misma idea
    rationale: «personalmente» ya comunica parte del valor de τῷ προσώπῳ; añadir «por rostro» produce torpeza estilística. «De vista» funciona mejor como complemento específico.
