lexical_decisions:
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: valor discursivo de δέ en contexto paulino
  rationale: Marca una transición suave con contraste respecto al contexto anterior; «Pero» conserva ese movimiento de manera natural en español.
- source_word: ἀγνοούμενος
  english_pob_choice: personally unknown
  chosen_spanish: desconocido
  alternatives_spanish:
  - no reconocido
  - ignorado
  lexicon: BDAG
  rationale: El participio expresa falta de conocimiento/reconocimiento. En español, «desconocido» es la opción más natural y fiel, sin añadir matices no presentes en el griego.
- source_word: τῷ προσώπῳ
  english_pob_choice: by face
  chosen_spanish: por rostro
  alternatives_spanish:
  - por vista
  - en persona
  - de vista
  lexicon: BDAG
  rationale: La expresión es idiomática y alude a reconocimiento personal o visual. «Por rostro» conserva la imagen literal del original, aunque suene menos idiomático; se mantiene para no aplanar la metáfora explícita del texto.
- source_word: ἐκκλησίαις
  english_pob_choice: churches
  chosen_spanish: iglesias
  alternatives_spanish:
  - asambleas
  - congregaciones
  lexicon: BDAG
  rationale: En el uso paulino se refiere a comunidades cristianas; «iglesias» es la equivalencia más clara y estable en español.
- source_word: Ἰουδαίας
  english_pob_choice: Judea
  chosen_spanish: Judea
  alternatives_spanish:
  - la región de Judea
  lexicon: BDAG
  rationale: Es un topónimo geográfico directo y la forma convencional en español es suficiente.
- source_word: ἐν Χριστῷ
  english_pob_choice: in Messiah
  chosen_spanish: en Mesías
  alternatives_spanish:
  - en Cristo
  lexicon: BDAG
  rationale: Χριστός funciona aquí como título. Se mantiene «Mesías» conforme al criterio del proyecto para conservar su fuerza titular y la referencia al Ungido.
theological_decisions:
- issue: Renderizado de Χριστῷ en ἐν Χριστῷ
  english_pob_reading: in Messiah
  chosen_spanish_reading: en Mesías
  alternative_spanish_readings:
  - en Cristo
  rationale: La lectura auditada del POB privilegia el valor titular de Χριστός. En español, «Mesías» preserva mejor esa cualidad y evita reducirlo a un nombre fijo.
  doctrine_reference: 'DOCTRINE.md: Χριστός → Mesías cuando el título siga audible'
translation_notes:
  revision_awareness: 'He seguido el estado revisado más reciente del expediente: se descartó añadir «todavía» porque no está explícito, se mantuvo la referencia idiomática de τῷ προσώπῳ y se restauró Mesías como opción preferente para Χριστῷ. La versión española conserva esa tensión entre literalidad e inteligibilidad.'
  spanish_consistency_notes:
  - Se usa «Mesías» para Χριστός conforme al criterio del proyecto y al estado de revisión más reciente.
  - «iglesias» y «Judea» siguen la terminología usual de la serie POB en español.
  - Se evitó suavizar ἀγνοούμενος con una paráfrasis excesiva; el texto permanece cercano a la sintaxis del original.
  - Las notas al pie preservan alternativas reales del expediente inglés sin introducir opciones ajenas.
