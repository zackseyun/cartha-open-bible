translation:
  language: es
  text: Pues les hago saber, hermanos[a], que el evangelio anunciado por mí no es según el hombre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hermanos y hermanas».'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «según el hombre»; la frase también puede significar «según criterios humanos» o «de origen humano».
    reason: lexical_alternative
lexical_decisions:
- source_word: Γνωρίζω
  english_pob_choice: I make known to you
  chosen_spanish: les hago saber
  alternatives_spanish:
  - les informo
  - les doy a conocer
  lexicon: BDAG
  rationale: El verbo introduce una aclaración solemne y funciona como marcador discursivo. «Les hago saber» conserva el valor de comunicar formalmente sin sonar forzado en español.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Pues
  alternatives_spanish:
  - Porque
  - En efecto
  lexicon: BDAG
  rationale: Aquí γάρ enlaza con la explicación del contexto previo; «Pues» mantiene la conexión causal/expositiva en español con buen flujo.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - hermanas y hermanos
  lexicon: BDAG
  rationale: La forma gramatical es masculina plural y en Pablo suele dirigirse a toda la comunidad creyente. «Hermanos» preserva el término del texto, y la nota puede explicitar el alcance inclusivo.
- source_word: εὐαγγέλιον
  english_pob_choice: gospel
  chosen_spanish: evangelio
  alternatives_spanish:
  - buena noticia
  lexicon: BDAG
  rationale: «Evangelio» es la equivalencia estable y técnica para el término paulino, más precisa que una paráfrasis amplia.
- source_word: τὸ εὐαγγελισθὲν ὑπ’ ἐμοῦ
  english_pob_choice: proclaimed by me
  chosen_spanish: anunciado por mí
  alternatives_spanish:
  - predicado por mí
  - proclamado por mí
  lexicon: BDAG
  rationale: El participio pasivo remite a la acción de proclamar el evangelio. «Anunciado» conserva el acto público de dar a conocer el mensaje de manera natural en español.
- source_word: κατὰ ἄνθρωπον
  english_pob_choice: not according to man
  chosen_spanish: conforme al hombre
  alternatives_spanish:
  - según el hombre
  - de origen humano
  - según criterios humanos
  lexicon: BDAG
  rationale: Se preserva la literalidad de la construcción preposicional para no resolver de antemano la tensión semántica. En el contexto inmediato también puede insinuar origen o norma humana, por lo que «conforme al hombre» deja abierta esa ambigüedad controlada.
theological_decisions:
- issue: 'Sentido de κατὰ ἄνθρωπον: origen humano vs. norma humana'
  english_pob_reading: not according to man
  chosen_spanish_reading: no es conforme al hombre
  alternative_spanish_readings:
  - no es de origen humano
  - no es según criterios humanos
  rationale: El contexto cercano (especialmente la continuación del argumento en 1:12) apunta a que Pablo niega una procedencia meramente humana; sin embargo, la frase griega admite también una lectura normativa. La redacción española mantiene esa tensión sin cerrarla demasiado.
  doctrine_reference: Preservar la tensión lexical y contextual; no resolver indebidamente la frase.
translation_notes:
  revision_awareness: Esta versión corrige la validación anterior incorporando los marcadores de nota exactamente en el texto español, junto a una formulación más literal de Γνωρίζω ὑμῖν y una opción que mantiene la ambigüedad de κατὰ ἄνθρωπον.
  spanish_consistency_notes:
  - Se mantiene un registro formal y eclesial, pero con español natural.
  - «Evangelio» se conserva como término técnico paulino.
  - «Hermanos» se deja en el texto principal por fidelidad al plural masculino griego, con nota inclusiva.
  - La frase final evita sobreinterpretar el griego y conserva la tensión fuente/norma que el contexto permite.
