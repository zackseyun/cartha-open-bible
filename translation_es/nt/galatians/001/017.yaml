translation:
  language: es
  text: Ni subí a Jerusalén a los que eran apóstoles antes que yo, sino que me fui a Arabia, y volví de nuevo a Damasco.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: οὐδὲ
  english_pob_choice: Nor did
  chosen_spanish: Ni
  alternatives_spanish:
  - Tampoco
  - Ni siquiera
  lexicon: BDAG
  rationale: En español, «Ni» conserva la continuidad negativa con el contexto anterior y reproduce bien la fuerza enlazadora de οὐδὲ sin añadir énfasis que el griego no exige.
- source_word: ἀνῆλθον
  english_pob_choice: go up
  chosen_spanish: subí
  alternatives_spanish:
  - fui
  - ascendí
  lexicon: BDAG
  rationale: 'Para Jerusalén, el valor habitual es geográfico: subir. «Subí» comunica esa dirección natural en español y mantiene el matiz del verbo sin sonar forzado.'
- source_word: Ἱεροσόλυμα
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalem
  lexicon: BDAG
  rationale: Nombre propio estándar en español.
- source_word: πρὸς τοὺς πρὸ ἐμοῦ ἀποστόλους
  english_pob_choice: to those who were apostles before me
  chosen_spanish: a los apóstoles que eran antes que yo
  alternatives_spanish:
  - a los apóstoles anteriores a mí
  - a aquellos que eran apóstoles antes que yo
  lexicon: BDAG
  rationale: El giro español conserva la idea relacional de πρός con valor de dirección/contacto implícito y mantiene πρὸ ἐμοῦ como prioridad temporal, no como superioridad jerárquica. «Que eran antes que yo» suena más natural que una literalidad dura, pero sigue reflejando el texto.
- source_word: ἀλλὰ
  english_pob_choice: but
  chosen_spanish: sino que
  alternatives_spanish:
  - pero
  - antes bien
  lexicon: BDAG
  rationale: Como la segunda cláusula corrige o contrasta la primera en un movimiento narrativo, «sino que» expresa mejor el cambio de rumbo que un simple «pero».
- source_word: ἀπῆλθον
  english_pob_choice: went away
  chosen_spanish: me fui
  alternatives_spanish:
  - me marché
  - partí
  lexicon: BDAG
  rationale: En contexto de viaje, «me fui» comunica el alejamiento/departida de ἀπῆλθον de manera natural y equivalente al valor del prefijo ἀπ-.
- source_word: Ἀραβίαν
  english_pob_choice: Arabia
  chosen_spanish: Arabia
  alternatives_spanish:
  - Arabia
  lexicon: BDAG
  rationale: Nombre geográfico estándar en español; el texto no delimita su extensión histórica.
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: de nuevo
  alternatives_spanish:
  - otra vez
  - nuevamente
  lexicon: BDAG
  rationale: «De nuevo» es la forma más sobria y clara para marcar el retorno posterior sin cargar el flujo narrativo.
- source_word: ὑπέστρεψα
  english_pob_choice: returned
  chosen_spanish: volví
  alternatives_spanish:
  - regresé
  - volví otra vez
  lexicon: BDAG
  rationale: «Volví» funciona bien en español para un regreso de viaje y refleja el sentido de retorno de ὑποστρέφω con naturalidad.
- source_word: Δαμασκόν
  english_pob_choice: Damascus
  chosen_spanish: Damasco
  alternatives_spanish:
  - Damasco
  lexicon: BDAG
  rationale: Nombre propio estándar en español.
theological_decisions:
- issue: “a los apóstoles que eran antes que yo” y el posible matiz de autoridad
  english_pob_reading: 'Temporal priority: apostles prior to Paul''s own apostleship/calling'
  chosen_spanish_reading: 'Prioridad temporal: apóstoles anteriores a la propia llamada/apostolado de Pablo'
  alternative_spanish_readings:
  - apóstoles de mayor rango que yo
  - apóstoles superiores a mí
  rationale: La construcción griega πρὸ ἐμοῦ apunta naturalmente a anterioridad temporal. La versión española evita introducir una jerarquía doctrinal no expresada por el texto y conserva la tensión observacional del pasaje.
  doctrine_reference: No importar una lectura jerárquica donde el texto solo establece anterioridad temporal; preservar la tensión exegética.
translation_notes:
  revision_awareness: El griego, la morfología y la auditoría inglesa muestran un enunciado de viaje con negación enlazada al contexto anterior, contraste con ἀλλά, y prioridad temporal en πρὸ ἐμοῦ. No hubo revisiones en el registro inglés; la redacción española sigue ese trazado sin expandir el sentido.
  spanish_consistency_notes:
  - Se mantiene «Jerusalén», «Arabia» y «Damasco» como nombres propios estándar.
  - Se evita «SEÑOR» u otras convenciones no pertinentes; no aparece léxico teológico que requiera adaptación terminológica especial.
  - «Ni» al inicio conserva la conexión negativa con el contexto previo sin reintroducir una frase completa innecesaria.
  - «Sino que» refleja el contraste fuerte de ἀλλὰ en una narración de desplazamiento.
  - La referencia a los apóstoles se formula en clave temporal, no jerárquica, conforme al análisis auditado.
