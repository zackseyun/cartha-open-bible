revisions:
- from: Ni subí a Jerusalén a los apóstoles que eran antes que yo, sino que me fui a Arabia, y volví de nuevo a Damasco.
  to: Ni subí a Jerusalén a los que eran apóstoles antes que yo, sino que me fui a Arabia, y volví de nuevo a Damasco.
  rationale: Se reemplaza «a los apóstoles que eran antes que yo» por «a los que eran apóstoles antes que yo» para reflejar con claridad que la anterioridad es temporal respecto del apostolado/llamado de Pablo, no una jerarquía, y para lograr un español más natural. Se conserva el resto porque representa fielmente el contraste narrativo y la secuencia del griego.
