review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la secuencia básica del griego: negación enlazada, no subir a Jerusalén, contraste con ir a Arabia y luego regresar a Damasco. También preserva bien el sentido temporal de πρὸ ἐμοῦ como anterioridad, no jerarquía. Sin embargo, «a los apóstoles que eran antes que yo» no expresa con suficiente naturalidad ni precisión en español la idea de «a los que eran apóstoles antes que yo».'
  spanish_quality_summary: La redacción es mayormente clara, pero «subí a Jerusalén a los apóstoles» suena forzada por la cercanía de dos complementos con «a», y «los apóstoles que eran antes que yo» resulta poco idiomático y ambiguo en español. Una leve reformulación mejora la legibilidad sin apartarse del griego.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Los nombres propios están bien. «apóstoles» es correcto. No hay términos teológicos sensibles del glosario mayor en este versículo.
  issues:
  - severity: medium
    issue: 'Frase poco natural: «a los apóstoles que eran antes que yo»'
    rationale: Aunque intenta preservar πρὸ ἐμοῦ, en español esta redacción suena extraña y puede entenderse como existencia previa o estatus indefinido, en vez de «los que ya eran apóstoles antes que yo». El inglés auditado hace explícito «who were apostles before me», y el español debe hacer lo mismo.
  - severity: low
    issue: Ritmo sintáctico mejorable en «subí a Jerusalén a los apóstoles»
    rationale: La construcción no es incorrecta, pero la repetición de «a» entorpece la lectura. Añadir «para ver» sería interpretativo; en cambio, mantener «subí a Jerusalén, a los que eran apóstoles antes que yo» o mejor «subí a Jerusalén adonde estaban...» también añadiría contenido. La solución mínima es rehacer solo el objeto de πρὸς τοὺς πρὸ ἐμοῦ ἀποστόλους.
  - severity: low
    issue: Redundancia leve en «volví de nuevo»
    rationale: 'No es erróneo, porque πάλιν + ὑπέστρεψα admite refuerzo, pero en español más natural y sobrio es «volví a Damasco» o «regresé de nuevo». Dado que πάλιν sí está presente, conviene conservarlo de manera fluida: «volví de nuevo a Damasco» sigue siendo aceptable, pero «volví a Damasco» podría perder el adverbio. Se propone mantener «de nuevo».'
  revised_spanish_text: Ni subí a Jerusalén a los que eran apóstoles antes que yo, sino que me fui a Arabia, y volví de nuevo a Damasco.
  revision_rationale: Se reemplaza «a los apóstoles que eran antes que yo» por «a los que eran apóstoles antes que yo» para reflejar con claridad que la anterioridad es temporal respecto del apostolado/llamado de Pablo, no una jerarquía, y para lograr un español más natural. Se conserva el resto porque representa fielmente el contraste narrativo y la secuencia del griego.
