lexical_decisions:
- source_word: ἔπειτα
  english_pob_choice: Then
  chosen_spanish: Después
  alternatives_spanish:
  - Entonces
  - Luego
  lexicon: BDAG
  rationale: Expresa con naturalidad la secuencia narrativa del griego y conserva el avance temporal sin sonar forzado en español.
- source_word: ἦλθον
  english_pob_choice: I went
  chosen_spanish: fui
  alternatives_spanish:
  - vine
  - llegué
  lexicon: BDAG
  rationale: En un contexto narrativo de desplazamiento, «fui» comunica movimiento desde el punto de referencia del hablante con fluidez natural; mantiene la idea básica del verbo sin sobretraducirlo.
- source_word: εἰς
  english_pob_choice: into
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - a las regiones de
  lexicon: BDAG
  rationale: El griego marca dirección hacia un destino. En español, con verbos de movimiento y destinos geográficos plurales, «a» suele ser la forma más natural y suficientemente direccional; el matiz puede explicitarse en nota.
- source_word: κλίματα
  english_pob_choice: regions
  chosen_spanish: regiones
  alternatives_spanish:
  - distritos
  - territorios
  lexicon: BDAG
  rationale: El término apunta a zonas geográficas amplias; «regiones» es el equivalente más claro y amplio en español, sin reducir indebidamente la extensión del lugar.
- source_word: Συρίας
  english_pob_choice: Syria
  chosen_spanish: Siria
  alternatives_spanish:
  - Siria
  lexicon: N/A
  rationale: Transliteración estándar al español del nombre geográfico.
- source_word: Κιλικίας
  english_pob_choice: Cilicia
  chosen_spanish: Cilicia
  alternatives_spanish:
  - Cilicia
  lexicon: N/A
  rationale: Transliteración estándar al español del nombre geográfico.
translation_notes:
  revision_awareness: El texto inglés auditado mantiene la lectura direccional de εἰς con «into» y opta por «regions» para κλίματα; no hay revisiones posteriores que alteren esa decisión. La versión española conserva la secuencia narrativa y deja explícita en nota la alternativa direccional y la posible equivalencia «distritos».
  spanish_consistency_notes:
  - Se mantiene «regiones» para κλίματα por coherencia con el valor geográfico amplio ya documentado.
  - «Después» conserva el enlace temporal de ἔπειτα sin introducir una paráfrasis interpretativa.
  - La preposición «a» en español absorbe naturalmente la dirección del movimiento; la nota a registra la opción más explícita «hacia».
