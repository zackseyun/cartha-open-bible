translation:
  language: es
  text: Me asombra que tan pronto deserten de aquel que los llamó en la gracia de Mesías[a], a un evangelio diferente[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por la gracia del Mesías». La preposición puede expresar esfera o medio.
    reason: alternative_reading
  - marker: b
    text: O «a otro evangelio».
    reason: lexical_alternative
lexical_decisions:
- source_word: Θαυμάζω
  english_pob_choice: I am astonished
  chosen_spanish: Me asombra
  alternatives_spanish:
  - Me maravilla
  - Me admira
  lexicon: BDAG
  rationale: «Me asombra» comunica bien la sorpresa fuerte de Pablo en español moderno y conserva el matiz de desconcierto o reproche implícito en el verbo.
- source_word: οὕτως ταχέως
  english_pob_choice: so quickly
  chosen_spanish: tan pronto
  alternatives_spanish:
  - tan rápidamente
  - tan de prisa
  lexicon: BDAG
  rationale: La combinación adverbial enfatiza la rapidez sorprendente del cambio. «Tan pronto» suena natural en español y retiene la idea de una desviación prematura.
- source_word: μετατίθεσθε
  english_pob_choice: deserting
  chosen_spanish: estén desertando
  alternatives_spanish:
  - se estén apartando
  - estén volviéndose atrás
  - estén transfiriéndose
  lexicon: BDAG
  rationale: En contexto no se trata de simple movimiento, sino de abandono de una relación y de una llamada. «Desertar» preserva esa fuerza relacional y de defección.
- source_word: τοῦ καλέσαντος ὑμᾶς
  english_pob_choice: the one who called you
  chosen_spanish: de aquel que los llamó
  alternatives_spanish:
  - del que los llamó
  - de quien los llamó
  lexicon: BDAG
  rationale: El participio aoristo señala una llamada previa; «de aquel que los llamó» mantiene la referencia personal sin añadir explícitamente «Dios» en el texto principal.
- source_word: ἐν χάριτι
  english_pob_choice: in the grace of the Messiah
  chosen_spanish: en la gracia de Mesías
  alternatives_spanish:
  - por la gracia de Mesías
  - en la gracia del Mesías
  - por la gracia del Mesías
  lexicon: BDAG
  rationale: Se conserva «en» para no cerrar de antemano la relación semántica de ἐν, que puede expresar esfera o medio. «Gracia» sigue siendo la opción natural para χάρις.
- source_word: Χριστοῦ
  english_pob_choice: the Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Se mantiene el valor titular de Χριστός según el criterio del proyecto, evitando convertirlo en un nombre litúrgico fijo cuando el contexto favorece su sentido de título.
- source_word: εἰς ἕτερον εὐαγγέλιον
  english_pob_choice: for a different gospel
  chosen_spanish: para un evangelio diferente
  alternatives_spanish:
  - a un evangelio diferente
  - hacia un evangelio diferente
  - para otro evangelio
  lexicon: BDAG
  rationale: «Evangelio diferente» refleja ἕτερον con la diferencia cualitativa que se desarrolla en el contexto inmediato. «Para» reproduce de modo idiomático la dirección del movimiento implícito en εἰς.
theological_decisions:
- issue: Identidad de «aquel que los llamó»
  english_pob_reading: Kept the expression as 'the one who called you' without explicitly supplying 'God' in the main text.
  chosen_spanish_reading: Se mantiene «aquel que los llamó» sin explicitar «Dios» en el texto principal.
  alternative_spanish_readings:
  - Dios que los llamó
  - Cristo que los llamó
  rationale: El griego no nombra al sujeto de manera explícita; conservarlo implícito evita resolver interpretativamente una tensión que el texto deja abierta.
  doctrine_reference: Preservar la restricción del texto y no importar una identificación teológica no explicitada.
translation_notes:
  revision_awareness: El registro en inglés pasó por una corrección de 'Christ' a 'Messiah' para reflejar mejor Χριστοῦ como título. La versión española sigue esa decisión y evita el nombre litúrgico fijo donde el contexto sostiene el valor titular. También se respetó la tensión del sujeto implícito de 'el que los llamó', sin resolverla en el cuerpo del texto.
  spanish_consistency_notes:
  - Se mantiene «Mesías» para Χριστός, conforme al criterio del proyecto.
  - «Evangelio» se usa como término técnico estable; no se introduce una paráfrasis explicativa adicional.
  - No se añade explícitamente el nombre de Dios en la cláusula de la llamada, para conservar la ambigüedad del griego.
  - La preposición «en» se conserva para reflejar la posible relación de esfera o medio en ἐν χάριτι.
