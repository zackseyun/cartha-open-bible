translation:
  language: es
  text: Ahora, lo que les escribo[a], miren que, delante de Dios[b], no miento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «estoy escribiéndoles».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «en la presencia de Dios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἃ
  english_pob_choice: what
  chosen_spanish: lo que
  alternatives_spanish:
  - las cosas que
  - aquello que
  lexicon: BDAG
  rationale: El relativo neutro plural funciona idiomáticamente como introducción del contenido de la afirmación de Pablo; en español, «lo que» comunica con naturalidad ese valor sin forzar un plural literal.
- source_word: δὲ
  english_pob_choice: now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y
  - Pero
  lexicon: BDAG
  rationale: δέ marca un giro discursivo suave; «Ahora» conserva ese cambio de tono y encaja bien al inicio de una frase epistolar en español.
- source_word: γράφω
  english_pob_choice: am writing
  chosen_spanish: les escribo
  alternatives_spanish:
  - estoy escribiéndoles
  - escribo
  lexicon: BDAG
  rationale: El presente epistolar se expresa de forma natural con un presente simple en español; «les escribo» mantiene inmediatez sin sonar afectado.
- source_word: ὑμῖν
  english_pob_choice: to you
  chosen_spanish: les
  alternatives_spanish:
  - a ustedes
  - a vosotros
  lexicon: BDAG
  rationale: El dativo de destinatario se refleja con el pronombre de complemento indirecto en español; «les» es natural y sobrio en español neutro.
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: ¡miren!
  alternatives_spanish:
  - ¡he aquí!
  - ¡vean!
  lexicon: BDAG
  rationale: ἰδού añade énfasis solemne; en español moderno, «¡miren!» transmite la misma llamada de atención mejor que un calco arcaico, sin perder el tono enfático.
- source_word: ἐνώπιον τοῦ θεοῦ
  english_pob_choice: before God
  chosen_spanish: delante de Dios
  alternatives_spanish:
  - en la presencia de Dios
  - ante Dios
  lexicon: BDAG
  rationale: La fórmula mantiene su fuerza de responsabilidad solemne; «delante de Dios» es clara, digna y conserva el matiz de comparecencia ante Dios.
- source_word: οὐ ψεύδομαι
  english_pob_choice: I am not lying
  chosen_spanish: no miento
  alternatives_spanish:
  - no estoy mintiendo
  - no digo mentira
  lexicon: BDAG
  rationale: El presente negativo expresa una negación directa y enfática en español; «no miento» es breve, idiomático y fiel a la fuerza assertiva del griego.
theological_decisions:
- issue: Fuerza de la apelación a Dios
  english_pob_reading: 'Rendered as a solemn God-invoking assertion: ''before God, I am not lying.'''
  chosen_spanish_reading: 'Como una afirmación solemne hecha delante de Dios: «delante de Dios, no miento».'
  alternative_spanish_readings:
  - como una mera intensificación retórica sin fuerza de rendición de cuentas
  - como una fórmula jurídica explícita de juramento
  rationale: ἐνώπιον τοῦ θεοῦ comunica responsabilidad y solemnidad ante Dios. La traducción conserva esa gravedad sin convertir la frase en un juramento técnico que el griego no formula de manera explícita.
  doctrine_reference: Testimonio veraz y conciencia delante de Dios (cf. integridad apostólica)
- issue: Valor de ἰδού en el discurso
  english_pob_reading: The Greek includes an emphatic particle (ἰδού), traditionally 'behold.'
  chosen_spanish_reading: Se expresa con «¡miren!» para conservar el énfasis de ἰδού.
  alternative_spanish_readings:
  - omitirlo por estilo
  - traducirlo como «he aquí»
  rationale: El texto griego añade un llamado enfático que no conviene borrar. En español, «¡miren!» reproduce el recurso retórico con naturalidad contemporánea y mantiene la fuerza exhortativa.
  doctrine_reference: Énfasis retórico y solemnidad epistolar
translation_notes:
  revision_awareness: La revisión inglesa más reciente restauró ἰδού con ‘behold’; por eso el español también lo representa con un marcador enfático explícito. Se mantuvo la estructura solemne de la apelación a Dios y un verbo negativo directo, sin introducir un matiz de juramento más fuerte que el del griego.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεοῦ conforme al estándar del proyecto.
  - Se evitó «Cristo» o terminología no presente en el versículo.
  - La puntuación con comas y signo de exclamación refleja la pausa enfática del texto griego sin añadir contenido.
  - El tono es formal y publicable, pero no arcaizante.
