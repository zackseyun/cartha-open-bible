  to: Ahora, lo que les escribo[a], miren que, delante de Dios[b], no miento.
  rationale: Se reemplaza «¡miren!» por «miren que» para reflejar mejor el valor enfático de ἰδού dentro de una afirmación solemne, evitando un imperativo demasiado coloquial o abrupto. Se mantienen las demás decisiones, que son fieles y naturales en español.
