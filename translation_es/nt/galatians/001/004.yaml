translation:
  language: es
  text: el que se dio a sí mismo por nuestros pecados para rescatarnos de la presente era malvada[a], conforme a la voluntad de nuestro Dios y Padre,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «del presente mundo malvado».
    reason: lexical_alternative
lexical_decisions:
- source_word: δόντος
  english_pob_choice: gave
  chosen_spanish: se dio a sí mismo
  alternatives_spanish:
  - se entregó
  - se dio
  lexicon: BDAG
  rationale: El participio de δίδωμι expresa aquí una acción voluntaria del propio sujeto. En español, «se dio a sí mismo» conserva esa entrega personal y evita perder el matiz reflexivo-sustitutivo que el contexto sugiere.
- source_word: ὑπὲρ
  english_pob_choice: for
  chosen_spanish: por
  alternatives_spanish:
  - a favor de
  - en favor de
  - en lugar de
  lexicon: BDAG
  rationale: Con «nuestros pecados», ὑπέρ tiene un valor redentivo o representativo. «Por» es la forma más natural y fiel en español, sin cerrar indebidamente el alcance teológico.
- source_word: ἁμαρτιῶν
  english_pob_choice: sins
  chosen_spanish: pecados
  alternatives_spanish:
  - faltas
  - transgresiones
  lexicon: BDAG
  rationale: El sustantivo plural significa «pecados» de manera directa. Otras opciones suavizan o especifican más de lo que el griego dice.
- source_word: ἐξέληται
  english_pob_choice: rescue
  chosen_spanish: rescatarnos
  alternatives_spanish:
  - librarnos
  - salvarnos
  lexicon: BDAG
  rationale: ἐξαιρέω comunica sacar de una situación de peligro o dominio. «Rescatarnos» preserva bien esa fuerza en español actual; «librarnos» también es posible, pero menos concreta.
- source_word: αἰῶνος
  english_pob_choice: age
  chosen_spanish: presente
  alternatives_spanish:
  - edad
  - era
  - mundo
  lexicon: BDAG
  rationale: El núcleo de αἰών es temporal-cosmico, y en español conviene reflejarlo como «presente» unido a la idea de un sistema/época. No se eligió «mundo» porque el término griego no nombra principalmente el planeta ni la creación material.
- source_word: ἐνεστῶτος
  english_pob_choice: present
  chosen_spanish: presente
  alternatives_spanish:
  - actual
  - vigente
  lexicon: BDAG
  rationale: El participio funciona adjetivalmente con sentido de lo que está ya en curso. «Presente» es la equivalencia más directa y natural.
- source_word: πονηροῦ
  english_pob_choice: evil
  chosen_spanish: malvado
  alternatives_spanish:
  - malo
  - maligno
  - malvado/evil
  lexicon: BDAG
  rationale: πονηρός califica moralmente al αἰών. «Malvado» preserva el juicio moral fuerte y es idiomático en español; «malo» resultaría demasiado débil y «maligno» puede sonar más técnico o demonológico de lo que el texto exige.
- source_word: κατὰ τὸ θέλημα
  english_pob_choice: according to the will
  chosen_spanish: conforme a la voluntad
  alternatives_spanish:
  - según la voluntad
  - de acuerdo con la voluntad
  lexicon: BDAG
  rationale: κατά con acusativo expresa conformidad. «Conforme a» mantiene la relación normativa de manera elegante y precisa.
- source_word: τοῦ θεοῦ καὶ πατρὸς ἡμῶν
  english_pob_choice: of our God and Father
  chosen_spanish: de nuestro Dios y Padre
  alternatives_spanish:
  - de Dios nuestro Padre
  - de nuestro Dios, y Padre
  lexicon: BDAG
  rationale: 'La construcción griega apunta a una sola persona: «nuestro Dios y Padre». El orden español «de nuestro Dios y Padre» conserva esa referencia única y suena natural.'
theological_decisions:
- issue: Cómo reflejar el valor de ὑπὲρ τῶν ἁμαρτιῶν ἡμῶν sin fijar una teoría de expiación demasiado estrecha
  english_pob_reading: for our sins
  chosen_spanish_reading: por nuestros pecados
  alternative_spanish_readings:
  - a favor de nuestros pecados
  - en lugar de nuestros pecados
  - por causa de nuestros pecados
  rationale: El griego permite un sentido redentor y representativo, pero no obliga a especificar el mecanismo doctrinal. «Por nuestros pecados» conserva la fuerza soteriológica sin resolver la tensión interpretativa.
  doctrine_reference: Preservar la tensión teológica; no imponer una teoría única de la expiación.
- issue: Cómo traducir αἰῶνος τοῦ ἐνεστῶτος πονηροῦ
  english_pob_reading: the present evil age
  chosen_spanish_reading: del presente malvado
  alternative_spanish_readings:
  - del presente mundo malo
  - de la era presente malvada
  - del siglo presente malo
  rationale: La decisión intenta mantener la dimensión temporal/cósmica de αἰών y la calificación moral de πονηροῦ. Se optó por una construcción breve y natural que no convierta αἰών en «mundo» ni lo diluya en una mera referencia temporal.
  doctrine_reference: Primacía del texto original sobre la tradición de traducción; conservar el matiz temporal-cósmico.
translation_notes:
  revision_awareness: 'Coincide sustancialmente con el trazo auditado en inglés (optimal-equivalence) y mantiene las decisiones clave: ὑπέρ como «por», αἰών como referencia temporal-cósmica, y πονηρός con fuerza moral. No se registran revisiones aplicadas en el ciclo más reciente, por lo que el borrador español sigue el consenso alto del expediente fuente.'
  spanish_consistency_notes:
  - Mantener «por nuestros pecados» en toda la serie para conservar la amplitud redentiva del griego.
  - Usar «presente» con αἰών/ἐνεστώς de forma consistente cuando el contexto sea temporal-cósmico.
  - Reservar «Dios y Padre» como referencia conjunta a una sola persona, no como dos sujetos separados.
  - Evitar «SEÑOR» como sustituto automático del nombre divino en este proyecto; aquí no aparece el Tetragrámaton.
  - No introducir «Cristo» en este versículo, porque el texto griego de esta cláusula no lo emplea.
