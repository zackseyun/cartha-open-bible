translation:
  language: es
  text: Y yo avanzaba en el judaísmo[b] por encima de muchos de mis contemporáneos entre mi pueblo, siendo mucho más celoso de las tradiciones de mis padres[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mis tradiciones ancestrales».
    reason: lexical_alternative
  - marker: b
    text: «Judaísmo» también puede traducirse «la religión judía» o «la manera de vivir judía», según cómo se entienda Ἰουδαϊσμός en el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: προέκοπτον
  english_pob_choice: was advancing
  chosen_spanish: adelantaba
  alternatives_spanish:
  - progresaba
  - avanzaba
  lexicon: BDAG
  rationale: El imperfecto griego expresa una acción pasada en curso. «Adelantaba» conserva ese progreso continuo y suena natural en español sin perder el matiz comparativo.
- source_word: Ἰουδαϊσμῷ
  english_pob_choice: Judaism
  chosen_spanish: el judaísmo
  alternatives_spanish:
  - la religión judía
  - la manera de vivir judía
  lexicon: BDAG
  rationale: «Judaísmo» es la correspondencia directa y concisa del término, y funciona bien en el contraste paulino del contexto.
- source_word: ὑπὲρ πολλοὺς συνηλικιώτας
  english_pob_choice: beyond many of my contemporaries
  chosen_spanish: por encima de muchos de mis contemporáneos
  alternatives_spanish:
  - más que muchos de mis pares
  - por encima de muchos de los de mi misma edad
  lexicon: BDAG
  rationale: La construcción comparativa pide una frase que exprese superioridad respecto de otros de la misma edad. «Contemporáneos» comunica con naturalidad la idea de coetáneos/pares.
- source_word: ἐν τῷ γένει μου
  english_pob_choice: among my people
  chosen_spanish: entre mi pueblo
  alternatives_spanish:
  - entre los de mi pueblo
  - en mi nación
  lexicon: BDAG
  rationale: γένος puede referirse al grupo étnico o de parentesco. «Entre mi pueblo» conserva la referencia colectiva sin introducir «raza», que sería más ambiguo en español.
- source_word: περισσοτέρως
  english_pob_choice: far more
  chosen_spanish: mucho más
  alternatives_spanish:
  - grandemente más
  - muchísimo más
  lexicon: BDAG
  rationale: El adverbio intensifica el celo en grado comparativo. «Mucho más» reproduce esa intensificación de forma idiomática.
- source_word: ζηλωτὴς ὑπάρχων
  english_pob_choice: being ... zealous
  chosen_spanish: siendo celoso
  alternatives_spanish:
  - siendo muy celoso
  - siendo un ferviente celoso
  lexicon: BDAG
  rationale: La construcción participial se vierte de manera natural con «siendo». «Celoso» aquí expresa el sentido de devoción intensa o fervor por una causa, sin convertirlo en el sustantivo técnico «zelote».
- source_word: τῶν πατρικῶν μου παραδόσεων
  english_pob_choice: the traditions of my fathers
  chosen_spanish: las tradiciones de mis padres
  alternatives_spanish:
  - las tradiciones de mis antepasados
  - las tradiciones paternas
  lexicon: BDAG
  rationale: πατρικός apunta a lo heredado de los padres/antepasados. «De mis padres» sigue de cerca la correspondencia del audit trail inglés y suena plenamente natural en español.
theological_decisions:
- issue: Ἰουδαϊσμός como identidad religiosa/cultural
  english_pob_reading: Judaism could also be rendered “the Jewish religion” or “the Judean way of life,” depending on how broadly Ἰουδαϊσμός is understood in context.
  chosen_spanish_reading: «El judaísmo» se mantiene como denominación global de la identidad religiosa y cultural, sin desglosarla en la traducción principal.
  alternative_spanish_readings:
  - «la religión judía»
  - «la manera de vivir judía»
  rationale: El contexto autobiográfico de Pablo admite la referencia al sistema religioso-ético judío en sentido amplio. La forma breve «judaísmo» preserva esa amplitud sin añadir interpretación en el texto principal.
  doctrine_reference: Uso contextual de Ἰουδαϊσμός
- issue: πατρικῶν μου παραδόσεων y la herencia de los padres
  english_pob_reading: the traditions of my fathers
  chosen_spanish_reading: «las tradiciones de mis padres» como referencia a la tradición heredada.
  alternative_spanish_readings:
  - «las tradiciones de mis antepasados»
  - «la tradición de mis padres»
  rationale: La frase expresa continuidad heredada más que simple opinión personal. «De mis padres» conserva la fuerza de tradición recibida y respeta el lenguaje familiar del original.
  doctrine_reference: Transmisión de tradiciones heredadas
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el último estado auditado en inglés, que prefirió «the traditions of my fathers» sobre una paráfrasis más amplia. Para el español se conservó esa correspondencia léxica con «las tradiciones de mis padres», manteniendo la comparación, el imperfecto progresivo y el matiz de herencia tradicional. No se adoptó una traducción mecánica del inglés: se volvió a la forma griega para decidir «adelantaba», «judaísmo», «entre mi pueblo» y «siendo celoso».'
  spanish_consistency_notes:
  - Se mantuvo «judaísmo» en minúscula por tratarse del nombre común del sistema religioso/cultural.
  - «Padres» traduce de forma natural πατρικῶν en este contexto y conserva la idea de tradición heredada.
  - «Celoso» se usa en su valor de fervor o devoción intensa, no en el sentido emocional moderno de envidia o recelo.
  - La comparación «por encima de muchos de mis contemporáneos» refleja ὑπὲρ πολλοὺς συνηλικιώτας sin forzar el texto hacia una glosa explicativa.
