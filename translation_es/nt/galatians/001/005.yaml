  text: a quien sea la gloria por los siglos de los siglos. Amén.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ᾧ
  english_pob_choice: to whom
  chosen_spanish: a quien
  alternatives_spanish:
  - para quien
  - de quien
  lexicon: BDAG
  rationale: El dativo relativo introduce la doxología dirigida al antecedente inmediato. En español, «a quien» expresa con naturalidad la dirección del homenaje/doxología sin añadir contenido verbal innecesario.
- source_word: ἡ δόξα
  english_pob_choice: glory
  chosen_spanish: la gloria
  alternatives_spanish:
  - el honor
  - la alabanza
  lexicon: BDAG
  rationale: «Gloria» es el equivalente más estable y teológicamente fiel en un contexto doxológico; conserva el peso formal del término griego mejor que «honor» o «alabanza».
- source_word: εἰς τοὺς αἰῶνας τῶν αἰώνων
  english_pob_choice: forever and ever
  chosen_spanish: por los siglos de los siglos
  alternatives_spanish:
  - para siempre
  - por siempre y para siempre
  lexicon: BDAG
  rationale: La expresión griega es una fórmula idiomática fija de duración sin fin. «Por los siglos de los siglos» reproduce bien el carácter solemne y tradicional de la frase en español bíblico, sin perder la fuerza idiomática.
- source_word: ἀμήν
  english_pob_choice: Amen
  chosen_spanish: Amén
  alternatives_spanish:
  - Amén.
  lexicon: BDAG
  rationale: Se conserva la transliteración litúrgica habitual en español bíblico, como afirmación solemne final.
theological_decisions:
- issue: Verbo implícito en la doxología
  english_pob_reading: to whom be the glory
  chosen_spanish_reading: a quien sea la gloria
  alternative_spanish_readings:
  - a quien pertenece la gloria
  - a quien es la gloria
  rationale: El griego no expresa un verbo finito. En español, «sea» mantiene el carácter doxológico y oracional, evitando introducir una afirmación más explicativa que la del original. «Pertenece» o «es» serían posibles, pero alteran el registro de la fórmula.
  doctrine_reference: Doxología; uso de verbo suplido en fórmulas litúrgicas
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran alta concordancia y no registran revisiones sustantivas; por eso no se introducen notas textuales ni variantes. Se conserva el sentido doxológico directo de la línea final.
  spanish_consistency_notes:
  - Se mantiene «gloria» como traducción de δόξα en contexto doxológico.
  - Se conserva «Amén» como forma litúrgica estándar en español.
  - La preposición «a» en «a quien» refleja la dirección del dativo relativo sin sobretraducir.
