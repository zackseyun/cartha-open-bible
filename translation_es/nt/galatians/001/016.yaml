translation:
  language: es
  text: para revelar a su Hijo en mí[a], para que yo lo anunciara entre los gentiles, no consulté inmediatamente con carne y sangre[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a mí» o «por mí».
    reason: alternative_reading
  - marker: b
    text: «Carne y sangre» es un modismo que significa un ser humano o seres humanos.
    reason: cultural_note
lexical_decisions:
- source_word: ἀποκαλύψαι
  english_pob_choice: to reveal
  chosen_spanish: revelar
  alternatives_spanish:
  - desvelar
  - descubrir
  lexicon: BDAG
  rationale: Revela la acción de dar a conocer por iniciativa divina. «Revelar» es el equivalente natural y fiel en español, sin diluir el sentido de disclosure del verbo griego.
- source_word: υἱὸν αὐτοῦ
  english_pob_choice: his Son
  chosen_spanish: su Hijo
  alternatives_spanish:
  - el Hijo de él
  lexicon: BDAG
  rationale: La construcción posesiva española «su Hijo» reproduce el título cristológico con naturalidad y sin perder la relación filial del griego.
- source_word: ἐν ἐμοὶ
  english_pob_choice: in me
  chosen_spanish: en mí
  alternatives_spanish:
  - a mí
  - por mí
  lexicon: BDAG
  rationale: 'Se conserva la preposición literal para mantener la ambigüedad documentada: revelación interior, revelación dirigida a Pablo, o revelación realizada a través de Pablo.'
- source_word: εὐαγγελίζωμαι αὐτὸν
  english_pob_choice: so that I might proclaim him
  chosen_spanish: para que yo lo anunciara
  alternatives_spanish:
  - para que yo lo proclamara
  - para que yo anunciara las buenas nuevas acerca de él
  lexicon: BDAG
  rationale: «εὐαγγελίζομαι» con objeto directo personal permite un español breve que mantenga el objeto directo «lo». «Anunciarlo» conserva la referencia directa a Cristo sin convertirla en una paráfrasis más explicativa.
- source_word: ἐν τοῖς ἔθνεσιν
  english_pob_choice: among the Gentiles
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - entre los gentiles
  lexicon: BDAG
  rationale: En español, «naciones» mantiene el valor más literal de ἔθνη, mientras que el contexto paulino puede implicar a los no judíos. Se evita fijar demasiado pronto una equivalencia confesional cerrada.
- source_word: εὐθέως
  english_pob_choice: immediately
  chosen_spanish: inmediatamente
  alternatives_spanish:
  - al instante
  - enseguida
  lexicon: BDAG
  rationale: Adverbio temporal directo y sobrio, adecuado al tono narrativo-argumentativo del pasaje.
- source_word: οὐ προσανεθέμην
  english_pob_choice: I did not immediately consult
  chosen_spanish: no me aconsejé
  alternatives_spanish:
  - no consulté
  - no conferí
  lexicon: BDAG
  rationale: El verbo medio admite la idea de consultar o confabular con otros. «No me aconsejé» conserva la idea relacional de buscar consejo y evita una equivalencia demasiado técnica o pesada.
- source_word: σαρκὶ καὶ αἵματι
  english_pob_choice: with flesh and blood
  chosen_spanish: con carne y sangre
  alternatives_spanish:
  - con seres humanos
  - con meros humanos
  lexicon: BDAG
  rationale: Se retiene el giro idiomático con su fuerza imagística paulina. Aunque el español podría aclararlo con una equivalencia interpretativa, la forma literal es reconocible y preserva la tensión semítica/helénica del original.
theological_decisions:
- issue: Ambigüedad de ἐν ἐμοὶ
  english_pob_reading: Retain the literal and ambiguous “in me” in the main text
  chosen_spanish_reading: Mantener «en mí» en el texto principal
  alternative_spanish_readings:
  - a mí
  - por mí
  rationale: La frase admite varias relaciones semánticas y no conviene resolverla en el texto principal. La traducción mantiene la ambigüedad documentada y la deja abierta al lector, como hace el audit trail en inglés.
  doctrine_reference: Preservar la tensión interpretativa sin resolverla prematuramente.
- issue: Sentido personal de εὐαγγελίζωμαι αὐτόν
  english_pob_reading: proclaim him
  chosen_spanish_reading: anunciarlo
  alternative_spanish_readings:
  - proclamarlo
  - anunciar las buenas nuevas acerca de él
  rationale: El objeto directo masculino singular permite que Cristo siga siendo el centro del anuncio. «Anunciarlo» mantiene esa relación sin transformar el verbo en una paráfrasis menos directa.
  doctrine_reference: Cristología y misión paulina.
translation_notes:
  revision_awareness: El borrador sigue el pasaje griego directo y el audit trail inglés de alta concordancia; no se identificaron revisiones aplicadas en la fuente inglesa reciente, por lo que se conserva la ambigüedad principal de ἐν ἐμοὶ y el giro idiomático de σαρκὶ καὶ αἵματι.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece el tetragrámaton.
  - Se prefiere «naciones» en el texto principal por mayor literalidad, con «gentiles» como alternativa contextual implícita.
  - Se conserva el objeto directo pronominal «lo» para mantener la referencia personal a Cristo.
