translation:
  language: es
  text: 'y todos los hermanos[a] conmigo, a las iglesias de Galacia:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “hermanos y hermanas”. El griego dice “hermanos”, pero puede incluir a creyentes de ambos sexos.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: BDAG
  rationale: La conjunción enlaza el saludo de este versículo con el emisor del versículo anterior; en español, ‘y’ reproduce con naturalidad esa continuidad epistolar.
- source_word: οἱ σὺν ἐμοὶ πάντες ἀδελφοί
  english_pob_choice: all the brothers with me
  chosen_spanish: todos los hermanos que están conmigo
  alternatives_spanish:
  - todos los hermanos conmigo
  - todos los hermanos que me acompañan
  - todos los hermanos y hermanas que están conmigo
  lexicon: BDAG
  rationale: ‘ἀδελφοί’ es plural masculino y la POB inglesa lo mantiene como ‘brothers’, dejando la posible inclusión de hermanas en nota. En español, ‘hermanos’ conserva la fuerza lexical; ‘que están conmigo’ expresa de forma natural la relación espacial/acompañante del griego σὺν ἐμοὶ.
- source_word: ἐκκλησίαις
  english_pob_choice: churches
  chosen_spanish: iglesias
  alternatives_spanish:
  - asambleas
  - congregaciones
  lexicon: BDAG
  rationale: En fórmulas paulinas de dirección, ἐκκλησίαις se traduce de manera más natural y reconocible como ‘iglesias’, manteniendo el sentido de comunidades reunidas.
- source_word: τῆς Γαλατίας
  english_pob_choice: of Galatia
  chosen_spanish: de Galacia
  alternatives_spanish:
  - en Galacia
  lexicon: BDAG
  rationale: El genitivo indica pertenencia o asociación territorial; ‘de Galacia’ sigue de cerca la construcción griega y su equivalente epistolar habitual.
theological_decisions:
- issue: Inclusión posible de creyentes de ambos sexos en ἀδελφοί
  english_pob_reading: The Greek says “brothers,” but may include fellow believers of both sexes.
  chosen_spanish_reading: El griego dice “hermanos”, pero puede incluir a creyentes de ambos sexos.
  alternative_spanish_readings:
  - hermanos y hermanas
  - hermanos, en sentido inclusivo
  rationale: Se conserva la forma masculina plural del texto, sin borrar la observación auditada de que el referente puede ser mixto. La nota permite la alternativa inclusiva sin imponerla en el texto principal.
  doctrine_reference: Uso lexical inclusivo en comunidades cristianas primitivas; distinción entre forma gramatical y referencia posible.
translation_notes:
  revision_awareness: Se siguió la corrección reciente del inglés POB que mantiene minúscula la conjunción inicial por continuidad epistolar. También se evitó una traducción mecánica de σὺν ἐμοὶ, optando por una frase española natural que conserva la relación de compañía.
  spanish_consistency_notes:
  - Se mantuvo ‘iglesias’ para ἐκκλησίαις, coherente con el uso paulino y con la POB inglesa.
  - Se conservó ‘hermanos’ como equivalente principal de ἀδελφοί, con nota inclusiva para reflejar la tensión lexical documentada.
  - La puntuación con dos puntos al final reproduce el tono epistolar del original y de la base inglesa auditada.
