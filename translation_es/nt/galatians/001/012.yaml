translation:
  language: es
  text: Porque yo no lo recibí de una fuente humana[a], ni me lo enseñaron, sino que fue por medio de una revelación de Jesús Mesías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por medio de una revelación acerca de Jesús Mesías».'
    reason: alternative_reading
lexical_decisions:
- source_word: οὐδὲ γὰρ ἐγὼ
  english_pob_choice: For I neither
  chosen_spanish: Porque yo no
  alternatives_spanish:
  - Pues yo tampoco
  - Porque ni yo
  lexicon: γάρ / οὐδέ / ἐγώ
  rationale: Mantiene la función explicativa de γάρ con «Porque» y conserva el énfasis de ἐγώ con «yo». «No» inicia la correlación negativa que en español fluye de forma natural con la segunda cláusula negada.
- source_word: παρὰ ἀνθρώπου
  english_pob_choice: from a human source
  chosen_spanish: de una fuente humana
  alternatives_spanish:
  - de un hombre
  - de una persona
  - de un ser humano
  lexicon: BDAG
  rationale: La construcción griega es singular y genérica; en español, «fuente humana» preserva el contraste entre origen humano y revelación divina sin sugerir una persona específica ni sonar idiomáticamente rígido.
- source_word: παρέλαβον
  english_pob_choice: received
  chosen_spanish: recibí
  alternatives_spanish:
  - acepté
  - obtuve
  lexicon: BDAG
  rationale: «Recibí» refleja el sentido de transmisión de enseñanza o tradición con fuerza natural en español y conserva la idea de algo entregado a Pablo, no producido por él.
- source_word: ἐδιδάχθην
  english_pob_choice: was taught
  chosen_spanish: fui enseñado
  alternatives_spanish:
  - fui instruido
  - me enseñaron
  lexicon: BDAG
  rationale: El pasivo subraya que Pablo no recibió esa enseñanza de parte de otro. «Fui enseñado» mantiene la forma pasiva y el contraste con la revelación.
- source_word: δι’ ἀποκαλύψεως
  english_pob_choice: through a revelation
  chosen_spanish: por medio de una revelación
  alternatives_spanish:
  - mediante una revelación
  - a través de una revelación
  lexicon: BDAG
  rationale: «Por medio de» expresa bien el valor instrumental de διά y suena natural en español; además conserva la concreción eventiva de «una revelación».
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: of Jesus Messiah
  chosen_spanish: de Jesús Mesías
  alternatives_spanish:
  - de Jesús Cristo
  - de Jesús el Mesías
  - acerca de Jesús Mesías
  lexicon: BDAG
  rationale: Se conserva «Mesías» según el criterio del proyecto para Χριστός. El genitivo se deja deliberadamente abierto con «de», que puede leerse como origen o contenido de la revelación; la nota preserva la alternativa interpretativa sin resolverla de antemano.
theological_decisions:
- issue: Genitivo en ἀποκαλύψεως Ἰησοῦ Χριστοῦ
  english_pob_reading: 'revelation of Jesus Messiah, with footnoted alternative: revelation about Jesus Messiah'
  chosen_spanish_reading: revelación de Jesús Mesías, con apertura a lectura de origen o de contenido
  alternative_spanish_readings:
  - revelación acerca de Jesús Mesías
  - revelación de parte de Jesús Mesías
  rationale: El contexto inmediato enfatiza que el evangelio no vino por mediación humana, sino por revelación divina. En español, «de Jesús Mesías» conserva la ambigüedad gramatical del genitivo griego sin fijarlo indebidamente; la nota ofrece la lectura alternativa de contenido.
  doctrine_reference: Preservar la tensión interpretativa del genitivo sin resolverla dogmáticamente
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que ajustó la frase inglesa de «from Jesus the Messiah» a «of Jesus Messiah» para reflejar con más precisión el genitivo griego y mantener abierta la ambigüedad entre origen y contenido. La versión española sigue esa misma cautela con «de Jesús Mesías» y añade una nota alternativa equivalente.
  spanish_consistency_notes:
  - Se conserva el énfasis paulino en primera persona con «yo».
  - Se mantiene «Mesías» como equivalente de Χριστός según el criterio terminológico del proyecto.
  - La combinación «fuente humana» / «revelación de Jesús Mesías» preserva el contraste entre mediación humana y revelación divina.
  - La puntuación reproduce la secuencia de negaciones y contraste del griego sin añadir matices no sustentados por el texto.
