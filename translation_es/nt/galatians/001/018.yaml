translation:
  language: es
  text: Entonces, después de tres años, subí a Jerusalén para visitar a Cefas[a][b], y me quedé con él quince días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «visitar a Cefas»; el verbo griego también puede implicar un encuentro personal para conocer a alguien.
    reason: lexical_alternative
  - marker: b
    text: Cefas es el nombre arameo de Pedro.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἔπειτα
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - Después
  lexicon: BDAG
  rationale: Marca la secuencia narrativa; «Entonces» conserva el avance del relato en un español natural y digno.
- source_word: μετὰ ἔτη τρία
  english_pob_choice: after three years
  chosen_spanish: después de tres años
  alternatives_spanish:
  - tras tres años
  - al cabo de tres años
  lexicon: BDAG
  rationale: La construcción temporal expresa el mismo intervalo sin añadir matiz interpretativo.
- source_word: ἀνῆλθον
  english_pob_choice: went up
  chosen_spanish: subí
  alternatives_spanish:
  - fui
  - subí a
  lexicon: BDAG
  rationale: Jerusalén está en una elevación geográfica; «subí» preserva esa fuerza verbal en español. La preposición «a» completa la construcción natural.
- source_word: Ἱεροσόλυμα
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Hierosolima
  lexicon: BDAG
  rationale: Nombre geográfico estándar en español bíblico y moderno.
- source_word: ἱστορῆσαι
  english_pob_choice: to visit
  chosen_spanish: visitar
  alternatives_spanish:
  - conocer
  - entrevistarse con
  lexicon: BDAG
  rationale: El audit trail inglés descartó una expansión demasiado interpretativa y optó por «to visit»; en español «visitar» es la correspondencia natural y suficientemente amplia para el encuentro personal con Cefas.
- source_word: Κηφᾶν
  english_pob_choice: Cephas
  chosen_spanish: Cefas
  alternatives_spanish:
  - Pedro
  lexicon: BDAG
  rationale: Pablo usa aquí el nombre «Cefas», y el proyecto preserva esa forma en transliteración española en lugar de armonizarla con «Pedro».
- source_word: ἐπέμεινα πρὸς αὐτὸν
  english_pob_choice: I stayed with him
  chosen_spanish: me quedé con él
  alternatives_spanish:
  - permanecí con él
  - estuve con él
  lexicon: BDAG
  rationale: Expresa presencia continuada durante el período indicado con un español idiomático y fiel al matiz de permanencia.
- source_word: ἡμέρας δεκαπέντε
  english_pob_choice: fifteen days
  chosen_spanish: quince días
  alternatives_spanish:
  - por quince días
  lexicon: BDAG
  rationale: La duración acusativa se entiende naturalmente con el verbo precedente; «quince días» mantiene la concisión del griego.
theological_decisions:
- issue: Identidad de Κηφᾶς
  english_pob_reading: Cephas is preserved as a name-form distinct from Peter in the text, with a footnote clarifying the relation.
  chosen_spanish_reading: Cefas se conserva como forma nominal propia, con nota aclaratoria sobre su relación con Pedro.
  alternative_spanish_readings:
  - Pedro
  - Cefas (sin nota)
  rationale: No hay armonización interna en el texto fuente; preservar «Cefas» respeta el testimonio de Pablo y la distinción onomástica del pasaje.
  doctrine_reference: Nombres propios y consistencia textual; no implica una afirmación doctrinal adicional.
translation_notes:
  revision_awareness: La versión inglesa revisada cambió de «to get acquainted with» a «to visit» para evitar expansión interpretativa; la redacción española sigue esa decisión y conserva la nota alternativa donde el verbo griego admite el matiz de un encuentro personal.
  spanish_consistency_notes:
  - Se conserva «Cefas» en todo el versículo para mantener la forma del nombre presente en el original.
  - «Entonces» y «después de tres años» reproducen la secuencia temporal sin duplicar innecesariamente el sentido.
  - La puntuación sigue el patrón español con coma tras el inciso temporal y antes de la cláusula final.
