revisions:
- from: Así que, mis hermanos amados y anhelados, mi gozo y corona, estén firmes en el Señor de esta manera[a], amados.
  to: Así que, mis hermanos[a] amados y anhelados, mi gozo y corona[b], estén firmes de esta manera en el Señor, amados.
  rationale: Se añadió la nota faltante para στέφανος, en consonancia con la auditoría inglesa y con las decisiones léxicas ya documentadas. También se ajustó ligeramente la posición de «de esta manera» para lograr un español más natural, manteniendo el sentido adverbial de οὕτως y la exhortación a permanecer firmes en el Señor.
