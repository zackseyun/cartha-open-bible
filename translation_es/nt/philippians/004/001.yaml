review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el tono del griego: ὥστε = «Así que», ἀδελφοί μου ἀγαπητοὶ καὶ ἐπιπόθητοι = «mis hermanos amados y anhelados», χαρὰ καὶ στέφανός μου = «mi gozo y corona», στήκετε ἐν κυρίῳ = «estén firmes en el Señor». Sin embargo, hay una desalineación con la auditoría inglesa: el POB inglés conserva también la alternativa léxica de στέφανος mediante nota («victor’s crown»), y el español declara esa intención en las decisiones teológicas pero no la implementa en las notas. Además, la colocación «en el Señor de esta manera» es comprensible, pero en español suena algo trabada; una leve reubicación mejora la naturalidad sin perder el valor de οὕτως.'
  spanish_quality_summary: 'El español es claro, digno y eclesialmente legible. «Amados» y «gozo» funcionan bien. «Anhelados» es fiel aunque algo menos idiomático; aun así es aceptable. La principal mejora es estilística: «estén firmes de esta manera en el Señor» o «así estén firmes en el Señor» suena más natural que «en el Señor de esta manera». También conviene añadir la nota prometida para «corona».'
  glossary_alignment: 'La terminología está en línea con las pautas del proyecto: κύριος = «Señor», ἀδελφοί = «hermanos» con nota inclusiva, ἀγαπητοί = «amados». No hay conflicto con términos doctrinales mayores. Falta, no obstante, preservar en notas la alternativa léxica de στέφανος, ya documentada por el POB inglés y por las decisiones internas del borrador.'
  issues:
  - severity: medium
    issue: Falta la nota léxica para «corona» (στέφανος).
    rationale: El POB inglés incluye una nota sobre el matiz de «victor’s crown», y el propio borrador español afirma que esa nota se mantendría. Al omitirse, se pierde parte de la evidencia léxica auditada.
  - severity: low
    issue: La secuencia «en el Señor de esta manera» es algo forzada en español.
    rationale: Aunque reproduce el orden auditado en inglés, en español suena más natural reubicar «de esta manera» antes de «en el Señor» o usar «así», siempre que se conserve el valor adverbial de οὕτως.
  revised_spanish_text: Así que, mis hermanos[a] amados y anhelados, mi gozo y corona[b], estén firmes de esta manera en el Señor, amados.
  revised_footnotes:
  - marker: a
    text: «Hermanos» reproduce la forma masculina del griego; en el contexto, Pablo se dirige a los creyentes de la congregación en su conjunto, no solo a los varones.
    reason: cultural_note
  - marker: b
    text: O «corona de vencedor»; el término griego se refiere a una corona o guirnalda otorgada al ganador.
    reason: lexical_alternative
  revision_rationale: Se añadió la nota faltante para στέφανος, en consonancia con la auditoría inglesa y con las decisiones léxicas ya documentadas. También se ajustó ligeramente la posición de «de esta manera» para lograr un español más natural, manteniendo el sentido adverbial de οὕτως y la exhortación a permanecer firmes en el Señor.
