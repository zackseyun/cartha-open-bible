translation:
  language: es
  text: Así que, mis hermanos[a] amados y anhelados, mi gozo y corona[b], estén firmes de esta manera en el Señor, amados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hermanos» reproduce la forma masculina del griego; en el contexto, Pablo se dirige a los creyentes de la congregación en su conjunto, no solo a los varones.
    reason: cultural_note
  - marker: b
    text: O «corona de vencedor»; el término griego se refiere a una corona o guirnalda otorgada al ganador.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὥστε
  english_pob_choice: So then
  chosen_spanish: Así que
  alternatives_spanish:
  - Por tanto
  - De modo que
  lexicon: BDAG
  rationale: Expresa con naturalidad la conclusión inferida que introduce la exhortación, sin sonar excesivamente formal en español.
- source_word: ἀδελφοί μου
  english_pob_choice: my beloved brothers
  chosen_spanish: mis hermanos
  alternatives_spanish:
  - mis hermanos y hermanas
  - mis hermanos en la fe
  lexicon: BDAG
  rationale: Conserva la forma vocativa masculina plural del griego con un equivalente claro y bíblicamente reconocible en español. El contexto congregacional está implícito en la dirección a la iglesia, sin necesidad de ampliar el texto principal.
- source_word: ἀγαπητοὶ
  english_pob_choice: beloved
  chosen_spanish: amados
  alternatives_spanish:
  - queridos
  - amados míos
  lexicon: BDAG
  rationale: ‘Amados’ reproduce el tono afectuoso y la repetición enfática del original con una fórmula natural en español.
- source_word: ἐπιπόθητοι
  english_pob_choice: longed-for
  chosen_spanish: anhelados
  alternatives_spanish:
  - muy deseados
  - largamente anhelados
  lexicon: BDAG
  rationale: ‘Anhelados’ comunica bien la idea de deseo profundo y mantiene la concisión del adjetivo griego.
- source_word: χαρὰ
  english_pob_choice: joy
  chosen_spanish: gozo
  alternatives_spanish:
  - alegría
  - regocijo
  lexicon: BDAG
  rationale: '‘Gozo’ preserva un registro bíblico natural en español y funciona bien como predicado nominal personal: ‘mi gozo’.'
- source_word: στέφανος
  english_pob_choice: crown
  chosen_spanish: corona
  alternatives_spanish:
  - guirnalda
  - corona de vencedor
  lexicon: BDAG
  rationale: ‘Corona’ es la equivalencia más idiomática en español; el sentido de corona victoriosa o guirnalda se mantiene para nota si se requiere.
- source_word: στήκετε
  english_pob_choice: stand firm
  chosen_spanish: estén firmes
  alternatives_spanish:
  - permanezcan firmes
  - manténganse firmes
  lexicon: BDAG
  rationale: Reproduce la exhortación imperativa de perseverancia con una formulación natural y clara en español.
- source_word: ἐν κυρίῳ
  english_pob_choice: in the Lord
  chosen_spanish: en el Señor
  alternatives_spanish:
  - unidos al Señor
  - en unión con el Señor
  lexicon: BDAG
  rationale: Se conserva la frase paulina establecida y transparente en español. Aquí ‘Señor’ refleja el κύριος del original sin añadir una paráfrasis interpretativa.
- source_word: οὕτως
  english_pob_choice: in this way
  chosen_spanish: de esta manera
  alternatives_spanish:
  - así
  - de este modo
  lexicon: BDAG
  rationale: Mantiene el valor adverbial y la relación con la exhortación precedente, con una colocación fluida en español.
theological_decisions:
- issue: Alcance inclusivo de ἀδελφοί
  english_pob_reading: The main text keeps 'brothers' as a gender-accurate rendering of the masculine vocative, with a footnote indicating the congregationally inclusive sense.
  chosen_spanish_reading: El texto principal conserva ‘mis hermanos’ como forma que refleja el vocativo masculino del griego; una nota aclara que el destinatario es la congregación en conjunto.
  alternative_spanish_readings:
  - mis hermanos y hermanas
  - mis hermanos y hermanas en la fe
  - ustedes, hermanos
  rationale: En español, ‘hermanos’ mantiene la correspondencia gramatical y el registro bíblico, mientras que la nota evita perder el alcance congregacional del pasaje. No se sustituye por una formulación neutral en el cuerpo principal para no borrar la forma del original.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
- issue: Matiz de στέφανος
  english_pob_reading: '''Crown'' is the most idiomatic English rendering, with the wreath/victor’s crown nuance noted in a footnote.'
  chosen_spanish_reading: ‘Corona’ se mantiene en el texto principal; una nota explica que el término apunta a una corona o guirnalda de vencedor.
  alternative_spanish_readings:
  - guirnalda
  - corona de vencedor
  - corona victoriosa
  rationale: ‘Corona’ es la forma más natural y ampliamente comprensible en español. La nota conserva la tensión léxica del término griego sin imponer una paráfrasis interpretativa en el texto principal.
  doctrine_reference: BDAG, s.v. στέφανος; política POB sobre alternativas léxicas
- issue: Relación sintáctica de οὕτως con el imperativo
  english_pob_reading: '''Stand firm in the Lord in this way'' after revision.'
  chosen_spanish_reading: ‘estén firmes en el Señor de esta manera’
  alternative_spanish_readings:
  - ‘de esta manera estén firmes en el Señor’
  - ‘estén firmes de esta manera en el Señor’
  rationale: La colocación final de ‘de esta manera’ sigue de cerca la revisión auditada del inglés y sugiere naturalmente que el modo de permanecer firmes se define por lo precedente, sin forzar el orden del español.
  doctrine_reference: SBLGNT; revisión auditada del POB inglés
translation_notes:
  revision_awareness: El texto español sigue la revisión más reciente del audit trail inglés al colocar ‘de esta manera’ después de ‘en el Señor’, reflejando mejor la relación del adverbio con el imperativo. También conserva la repetición afectuosa de ‘amados’ y la fuerza exhortativa de ‘estén firmes’.
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ solo cuando aparece el nombre divino en el original; aquí el texto dice κύριος y se traduce como ‘Señor’ según el patrón paulino del pasaje.
  - Se mantuvo ‘gozo’ para χαρά y ‘corona’ para στέφανος como términos bíblicos naturales en español.
  - La nota sobre ‘hermanos’ evita expandir innecesariamente el texto principal y conserva la precisión morfológica del vocativo griego.
