  text: ὥστε, ἀδελφοί μου ἀγαπητοὶ καὶ ἐπιπόθητοι, χαρὰ καὶ στέφανός μου, οὕτως στήκετε ἐν κυρίῳ, ἀγαπητοί.
base_translation:
  language: en
  yaml_path: translation/nt/philippians/004/001.yaml
  text: So then[a], my beloved and longed-for brothers, my joy and crown, stand firm in the Lord in this way[b], beloved.
  footnotes:
  - marker: a
    text: “Brothers” renders the masculine Greek form; in context Paul is addressing fellow believers in the congregation, not males only.
    reason: cultural_note
  - marker: b
    text: Or “victor’s crown”; the Greek term refers to a wreath awarded to a winner.
    reason: lexical_alternative
