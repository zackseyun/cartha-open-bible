translation:
  language: es
  text: Y mi Dios suplirá toda necesidad de ustedes conforme a sus riquezas en gloria en Mesías Jesús[a][b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en Cristo Jesús».'
    reason: lexical_alternative
  - marker: b
    text: 'O posiblemente: «gloriosamente», para «en gloria».'
    reason: alternative_reading
  - marker: c
    text: 'O: «en gloria en Cristo Jesús».'
    reason: previous_rendering
lexical_decisions:
- source_word: ὁ δὲ θεός μου
  english_pob_choice: And my God
  chosen_spanish: Y mi Dios
  alternatives_spanish:
  - Pero mi Dios
  - Ahora bien, mi Dios
  lexicon: BDAG
  rationale: δέ es una partícula conectiva ligera; en español, «Y» conserva la continuidad del discurso sin introducir un contraste más fuerte del que exige el griego, y «mi Dios» preserva el matiz personal.
- source_word: πληρώσει
  english_pob_choice: will supply
  chosen_spanish: suplirá
  alternatives_spanish:
  - cumplirá
  - llenará
  lexicon: BDAG
  rationale: En este contexto πληρόω expresa proporcionar lo que falta. «Suplirá» transmite bien la idea de provisión necesaria sin perder naturalidad en español.
- source_word: πᾶσαν χρείαν ὑμῶν
  english_pob_choice: every need of yours
  chosen_spanish: toda necesidad de ustedes
  alternatives_spanish:
  - cada necesidad de ustedes
  - toda su necesidad
  lexicon: BDAG
  rationale: χρεία significa necesidad o falta; «toda necesidad de ustedes» conserva el valor distributivo de πᾶσαν y el sentido relacional del genitivo ὑμῶν.
- source_word: κατὰ τὸ πλοῦτος αὐτοῦ
  english_pob_choice: according to his riches
  chosen_spanish: conforme a sus riquezas
  alternatives_spanish:
  - según sus riquezas
  - de acuerdo con sus riquezas
  lexicon: BDAG
  rationale: κατά con acusativo marca medida o norma. «Conforme a» expresa mejor esa medida que un simple origen («de») y evita reducir la frase a un mero punto de procedencia.
- source_word: ἐν δόξῃ
  english_pob_choice: in glory
  chosen_spanish: en gloria
  alternatives_spanish:
  - gloriosamente
  - con gloria
  lexicon: BDAG
  rationale: Se mantiene la forma preposicional porque el alcance exacto de la frase es algo abierto en griego. «En gloria» preserva esa ambigüedad con claridad en español.
- source_word: ἐν Χριστῷ Ἰησοῦ
  english_pob_choice: in Messiah Jesus
  chosen_spanish: en Mesías Jesús
  alternatives_spanish:
  - en Cristo Jesús
  lexicon: BDAG
  rationale: Aquí Χριστός funciona como título, no como nombre propio fijo; por eso se traduce «Mesías» según la práctica del POB, manteniendo la referencia cristológica del texto.
theological_decisions:
- issue: Traducir Χριστός como título en ἐν Χριστῷ Ἰησοῦ
  english_pob_reading: in Messiah Jesus
  chosen_spanish_reading: en Mesías Jesús
  alternative_spanish_readings:
  - en Cristo Jesús
  rationale: El enfoque del POB favorece traducir el título cuando el contexto lo permite. En este versículo no hay necesidad de conservar la transliteración tradicional, y «Mesías» comunica directamente el valor semántico del título.
  doctrine_reference: 'Contested terms: Χριστός → Mesías (where title; Christ where name-like)'
- issue: Valor de κατὰ τὸ πλοῦτος αὐτοῦ
  english_pob_reading: according to his riches
  chosen_spanish_reading: conforme a sus riquezas
  alternative_spanish_readings:
  - según sus riquezas
  - de acuerdo con sus riquezas
  rationale: La frase expresa medida o patrón de provisión, no solo origen. «Conforme a» ayuda a mantener la idea de una provisión acorde con la riqueza de Dios.
  doctrine_reference: Measure/standard reading of κατά + accusative
translation_notes:
  revision_awareness: 'Se atendió la revisión más reciente del inglés que ajustó el orden para reflejar mejor «every need of yours» y consolidó la frase final sin pausa interna. En español se reflejó esa estructura con «toda necesidad de ustedes» y una clausula final continua: «en gloria, en Mesías Jesús».'
  spanish_consistency_notes:
  - Se mantuvo «Mesías» para Χριστός conforme al criterio del proyecto, sin convertirlo en «Cristo».
  - Se evitó «SEÑOR» o fórmulas litúrgicas de máscara para θεός/κύριος, ya que el versículo nombra explícitamente a Dios como sujeto.
  - «Suplirá» se eligió por claridad semántica y naturalidad, sin debilitar el sentido de provisión abundante.
  - No se añadieron notas al pie porque no se necesitaba una variante textual o léxica anclada en el texto español.
