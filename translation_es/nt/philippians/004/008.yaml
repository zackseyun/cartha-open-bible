  - severity: medium
    issue: «en esto pensad» suena arcaizante y regionalmente menos neutral
    rationale: El objetivo es español neutral latinoamericano, moderno pero digno. «Piensen en estas cosas» o «consideren estas cosas» comunica λογίζεσθε con claridad y naturalidad. Además, «estas cosas» refleja bien ταῦτα.
  - severity: low
    issue: Puntuación mejorable en la enumeración final
    rationale: Un guion largo o punto y coma antes de la cláusula resumidora ayuda a reproducir el énfasis discursivo del original y del rastro inglés, aunque no es un error de fidelidad mayor.
