revisions:
- from: Por lo demás, hermanos[a], todo lo que es verdadero, todo lo honorable, todo lo justo, todo lo puro, todo lo amable, todo lo digno de aprobación, si hay alguna virtud y si hay algún elogio, en esto pensad.
  to: Por lo demás, hermanos[a], todo lo que es verdadero, todo lo honorable, todo lo justo, todo lo puro, todo lo agradable, todo lo digno de aprobación—si hay alguna virtud y si hay algún elogio—piensen en estas cosas.
  rationale: Se corrige προσφιλῆ a «agradable» para evitar la ambigüedad de «amable» y acercarse mejor a ‘lovely/pleasing’. Se reemplaza «en esto pensad» por «piensen en estas cosas» para un español neutral latinoamericano, moderno y claro, manteniendo el mandato deliberativo de λογίζεσθε y el referente plural de ταῦτα. Se conserva «hermanos» con nota inclusiva, y el resto del léxico queda sustancialmente fiel al griego y a las decisiones auditadas en inglés.
