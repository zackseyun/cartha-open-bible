translation:
  language: es
  text: Por lo demás, hermanos[a], todo lo que es verdadero, todo lo honorable, todo lo justo, todo lo puro, todo lo agradable, todo lo digno de aprobación—si hay alguna virtud y si hay algún elogio—piensen en estas cosas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hermanos y hermanas»; el griego «hermanos» puede dirigirse a toda la comunidad creyente.
    reason: cultural_note
lexical_decisions:
- source_word: Τὸ λοιπόν
  english_pob_choice: Finally
  chosen_spanish: Por lo demás
  alternatives_spanish:
  - Finalmente
  - En fin
  lexicon: BDAG
  rationale: Como marcador discursivo de transición conclusiva, «Por lo demás» conserva bien el valor de cierre exhortativo sin sonar tan abrupto como «Finalmente» en español. Mantiene la fuerza de resumir lo que sigue.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - hermanos/as
  lexicon: BDAG
  rationale: El griego usa el masculino plural representativo. En español, «hermanos» puede abarcar a toda la comunidad creyente sin forzar una neutralización explícita en el texto principal; la posible inclusividad queda indicada en nota.
- source_word: ὅσα
  english_pob_choice: whatever
  chosen_spanish: todo lo que
  alternatives_spanish:
  - cuanto
  - todas las cosas que
  lexicon: BDAG
  rationale: La serie distributiva se expresa con naturalidad en español mediante «todo lo que», que evita la dureza de repetir «cualquier cosa que» y preserva el catálogo de cualidades.
- source_word: ἀληθῆ
  english_pob_choice: 'true'
  chosen_spanish: verdadero
  alternatives_spanish:
  - verdad
  - auténtico
  lexicon: BDAG
  rationale: «Verdadero» comunica con claridad la cualidad moral y cognitiva del término en esta lista de virtudes.
- source_word: σεμνά
  english_pob_choice: honorable
  chosen_spanish: honorable
  alternatives_spanish:
  - digno
  - respetable
  - decoroso
  lexicon: BDAG
  rationale: «Honorable» reproduce bien el matiz de lo serio, digno de respeto y moralmente decoroso, y se alinea con el uso auditado en inglés.
- source_word: δίκαια
  english_pob_choice: just
  chosen_spanish: justo
  alternatives_spanish:
  - recto
  - recto y equitativo
  - recto ante Dios
  lexicon: BDAG
  rationale: En esta lista ética, «justo» mantiene el valor de lo recto y conforme al orden debido, sin trasladarlo innecesariamente a un registro más específicamente teológico.
- source_word: ἁγνά
  english_pob_choice: pure
  chosen_spanish: puro
  alternatives_spanish:
  - limpio
  - casto
  lexicon: BDAG
  rationale: «Puro» es la equivalencia más directa y amplia para la pureza moral e interior del término.
- source_word: προσφιλῆ
  english_pob_choice: lovely
  chosen_spanish: amable
  alternatives_spanish:
  - agradable
  - amable de amar
  - amable en el sentido de digno de afecto
  lexicon: BDAG
  rationale: El griego designa lo que merece amor o atracción afectiva. En español, «amable» puede expresar esa cualidad de ser digno de aprecio y afecto, aunque en uso corriente también pueda sugerir cortesía; aquí se conserva por su brevedad y naturalidad en la lista.
- source_word: εὔφημα
  english_pob_choice: commendable
  chosen_spanish: digno de aprobación
  alternatives_spanish:
  - loable
  - admirable
  - de buena fama
  lexicon: BDAG
  rationale: «Digno de aprobación» refleja con bastante precisión la idea de algo bien hablado o bien considerado, y evita restringir el sentido a una simple reputación social.
- source_word: εἴ τις ἀρετὴ
  english_pob_choice: if there is any virtue
  chosen_spanish: si hay alguna virtud
  alternatives_spanish:
  - si hay alguna excelencia moral
  - si hay algo excelente
  lexicon: BDAG
  rationale: «Virtud» conserva la forma nominal breve del griego y su valor de excelencia moral, en continuidad con la traducción inglesa auditada.
- source_word: ἔπαινος
  english_pob_choice: praise
  chosen_spanish: elogio
  alternatives_spanish:
  - alabanza
  - reconocimiento
  lexicon: BDAG
  rationale: En este contexto enumerativo, «elogio» mantiene el sentido de una palabra o juicio favorable. Se evita «alabanza» para no inclinar la frase hacia un tono exclusivamente litúrgico cuando el griego es más general.
- source_word: ταῦτα λογίζεσθε
  english_pob_choice: think about these things
  chosen_spanish: en esto pensad
  alternatives_spanish:
  - piensen en estas cosas
  - consideren estas cosas
  - mediten en estas cosas
  lexicon: BDAG
  rationale: «λογίζεσθε» pide una atención mental deliberada, no mera reflexión ocasional. «En esto pensad» es breve, imperativo y fiel al mandato, preservando el objeto resumido del pronombre neutro plural.
theological_decisions:
- issue: Alcance inclusivo de ἀδελφοί
  english_pob_reading: brothers; Greek 'brothers' can address the whole believing community.
  chosen_spanish_reading: hermanos, con nota de posible inclusión de toda la comunidad creyente
  alternative_spanish_readings:
  - hermanos y hermanas
  - hermanos/as
  - hermanos (en sentido inclusivo)
  rationale: Se conserva la forma masculina plural del texto griego, como en la POB inglesa, pero se aclara en nota que puede dirigirse al conjunto de creyentes. Esto evita borrar la forma léxica original y, a la vez, evita una lectura excluyente.
  doctrine_reference: Uso representativo del masculino plural en el discurso paulino; cf. la práctica de la POB inglesa
- issue: Naturaleza de la lista de virtudes
  english_pob_reading: whatever is true... if there is any virtue and if there is any praise
  chosen_spanish_reading: serie ética abierta de cualidades y valores que merecen atención mental
  alternative_spanish_readings:
  - lista de virtudes cristianas estrictas
  - lista de rasgos morales generales
  rationale: El griego presenta una enumeración amplia y abierta, no limitada solo a virtudes eclesiales. La formulación española mantiene ese carácter general sin convertir la lista en algo más estrecho de lo que el texto permite.
  doctrine_reference: Ética paulina general; no se introduce una distinción doctrinal adicional
translation_notes:
  revision_awareness: 'La traducción sigue de cerca la última decisión inglesa revisada, sin cambios en el sentido global. Se mantiene la equivalencia óptima: transición conclusiva con valor natural en español, serie distributiva preservada, y cierre imperativo breve. No se detectan revisiones adicionales aplicadas en el pasaje inglés que requieran desviación en español.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el Tetragrámaton ni una cita explícita que lo requiera.
  - Se prefirió «hermanos» por fidelidad formal, con nota inclusiva en lugar de neutralizar el texto principal.
  - «Todo lo que» reproduce la repetición distributiva de ὅσα sin sonoridad artificial.
  - «En esto pensad» conserva el mandato final con una cadencia bíblica natural en español contemporáneo.
