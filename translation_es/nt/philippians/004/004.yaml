translation:
  language: es
  text: ¡Regocíjense en el Señor siempre[a]; otra vez diré[b], ¡regocíjense!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Alégrense en el Señor siempre».'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «otra vez diré, regocíjense».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Χαίρετε
  english_pob_choice: Rejoice
  chosen_spanish: Regocíjense
  alternatives_spanish:
  - Alégrense
  - Regocíjense ustedes
  lexicon: BDAG
  rationale: El imperativo presente de segunda persona plural pide una exhortación continua. «Regocíjense» conserva el valor exhortativo y la fuerza verbal de χαίρω, con un registro digno y natural en español bíblico.
- source_word: ἐν
  english_pob_choice: in
  chosen_spanish: en
  alternatives_spanish:
  - por
  - a causa de
  - dentro de
  lexicon: BDAG
  rationale: «En» mantiene la lectura de esfera o relación con el Señor sin forzar una causalidad o instrumentalidad que el griego no especifica aquí.
- source_word: κυρίῳ
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Maestro
  lexicon: BDAG
  rationale: En este contexto paulino, κύριος alude a Cristo; «el Señor» es la forma española establecida y fiel a la referencia cristológica.
- source_word: πάντοτε
  english_pob_choice: always
  chosen_spanish: siempre
  alternatives_spanish:
  - en todo tiempo
  - constantemente
  lexicon: BDAG
  rationale: «Siempre» expresa con naturalidad la continuidad adverbial de πάντοτε en español contemporáneo.
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  - una vez más
  lexicon: BDAG
  rationale: «Otra vez» reproduce la repetición enfática de πάλιν y suena natural antes del verbo de habla introducido por Pablo.
- source_word: ἐρῶ
  english_pob_choice: I will say
  chosen_spanish: diré
  alternatives_spanish:
  - voy a decir
  - volveré a decir
  lexicon: BDAG
  rationale: El futuro de λέγω se conserva con «diré», manteniendo el matiz temporal del griego sin añadir una perífrasis innecesaria.
- source_word: χαίρετε
  english_pob_choice: rejoice
  chosen_spanish: regocíjense
  alternatives_spanish:
  - alégrense
  lexicon: BDAG
  rationale: Se traduce de manera consistente con la primera ocurrencia para preservar el énfasis retórico de la repetición. «Regocíjense» comunica mejor la exhortación solemne que una forma más coloquial.
theological_decisions:
- issue: Sentido de «en el Señor»
  english_pob_reading: 'A sphere/relationship reading: believers are commanded to rejoice in relation to and union with the Lord, not merely to rejoice about him.'
  chosen_spanish_reading: 'Lectura de esfera o relación: se exhorta a alegrarse dentro de la relación con el Señor, no solo por él como motivo externo.'
  alternative_spanish_readings:
  - 'Lectura causal: alegrarse por el Señor'
  - 'Lectura instrumental: alegrarse gracias al Señor'
  rationale: «En el Señor» conserva la amplitud de ἐν κυρίῳ y no cierra la tensión entre esfera, relación y causa. Así se preserva el alcance teológico documentado en el POB inglés.
  doctrine_reference: Mantener la tensión semántica sin resolverla de manera reductiva.
translation_notes:
  revision_awareness: El último repaso indicó alta concordancia y no requirió cambios; esta versión sigue el texto griego y conserva la repetición imperativa y la amplitud de ἐν κυρίῳ.
  spanish_consistency_notes:
  - Se usa «el Señor» de forma consistente para κύριος en el sentido cristológico del pasaje.
  - Se mantiene «regocíjense» en ambas ocurrencias de χαίρετε para reproducir la repetición enfática.
  - El orden y la puntuación reflejan la estructura breve y exhortativa del verso griego.
