translation:
  language: es
  text: Lo que también aprendieron, recibieron, oyeron y vieron en mí[b], practiquen estas cosas[a]; y el Dios de paz estará con ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hagan estas cosas».'
    reason: lexical_alternative
  - marker: b
    text: «Vieron en mí» también puede expresarse como «vieron en mi ejemplo» o «vieron en mi vida».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἃ
  english_pob_choice: what
  chosen_spanish: lo que
  alternatives_spanish:
  - las cosas que
  - lo que ustedes
  lexicon: BDAG
  rationale: El relativo neutro plural se vierte de manera natural en español con una construcción neutra como 'lo que', que conserva la referencia al contenido de la enseñanza sin forzar un sustantivo explícito.
- source_word: ἐμάθετε
  english_pob_choice: learned
  chosen_spanish: aprendieron
  alternatives_spanish:
  - conocieron
  - recibieron enseñanza
  lexicon: BDAG
  rationale: El aoristo expresa algo ya adquirido en el pasado; 'aprendieron' mantiene el sentido de formación recibida y el paralelismo con los otros verbos.
- source_word: παρελάβετε
  english_pob_choice: received
  chosen_spanish: recibieron
  alternatives_spanish:
  - aceptaron
  - recibieron como tradición
  lexicon: BDAG
  rationale: '''Recibieron'' conserva la amplitud de recibir instrucción o entrega de contenido, sin especificar ''tradición'' en el texto principal donde el griego no lo explicita.'
- source_word: ἠκούσατε
  english_pob_choice: heard
  chosen_spanish: oyeron
  alternatives_spanish:
  - escucharon
  lexicon: BDAG
  rationale: '''Oyeron'' reproduce de modo directo la recepción auditiva en la serie verbal y mantiene el paralelismo con los demás verbos del versículo.'
- source_word: εἴδετε ἐν ἐμοί
  english_pob_choice: saw in me
  chosen_spanish: vieron en mí
  alternatives_spanish:
  - vieron en mi ejemplo
  - vieron en mi vida
  lexicon: BDAG
  rationale: La preposición y el complemento personal se mantienen de forma cercana al griego. La POB inglesa deja abierta la expansión a 'example/life'; en español, el texto principal conserva la transparencia, y la nota recoge la posible ampliación interpretativa.
- source_word: ταῦτα πράσσετε
  english_pob_choice: practice these things
  chosen_spanish: practiquen estas cosas
  alternatives_spanish:
  - hagan estas cosas
  - pongan en práctica estas cosas
  lexicon: BDAG
  rationale: πράσσω sugiere una acción continuada o habitual. 'Practiquen' comunica bien la idea de poner en práctica de manera perseverante, y 'estas cosas' retoma el plural neutro del relativo anterior.
- source_word: ὁ θεὸς τῆς εἰρήνης
  english_pob_choice: the God of peace
  chosen_spanish: el Dios de paz
  alternatives_spanish:
  - el Dios de la paz
  - el Dios que da paz
  lexicon: BDAG
  rationale: Se conserva la fórmula paulina con un genitivo directo y sobrio. 'De paz' reproduce la relación del genitivo sin interpretarla más allá de lo que el griego exige.
- source_word: ἔσται μεθ’ ὑμῶν
  english_pob_choice: will be with you
  chosen_spanish: estará con ustedes
  alternatives_spanish:
  - estará entre ustedes
  - será con ustedes
  lexicon: BDAG
  rationale: El futuro de εἰμί expresa presencia asegurada. 'Con ustedes' refleja μεθ’ ὑμῶν de manera natural en español y mantiene el tono de promesa pastoral.
theological_decisions:
- issue: Relación entre obediencia y presencia divina
  english_pob_reading: Rendered as a straightforward exhortation followed by promise, without implying a mechanistic condition beyond the text.
  chosen_spanish_reading: Se expresa como una exhortación seguida de promesa, sin convertirla en una fórmula causal o condicional más fuerte de lo que el griego presenta.
  alternative_spanish_readings:
  - si practican estas cosas, Dios estará con ustedes
  - y entonces el Dios de paz estará con ustedes
  rationale: El griego une las cláusulas con καί y no formula explícitamente una condición. La traducción española conserva esa secuencia exhortación-promesa, dejando intacta la tensión pastoral del texto.
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: La versión inglesa más reciente no requirió cambios; la redacción española sigue su decisión de mantener la secuencia de verbos y la promesa sin sobrerinterpretar la relación entre ambas cláusulas. Se ha ajustado el español para lograr naturalidad y transparencia, conservando la apertura semántica de εἴδετε ἐν ἐμοί y πράσσετε.
  spanish_consistency_notes:
  - Se usa «Dios» para θεός, conforme al criterio base del proyecto.
  - Se usa «paz» en la fórmula paulina «el Dios de paz» para mantener el genitivo directo.
  - Se prefiere «ustedes» como tratamiento plural neutro latinoamericano.
  - Se conserva «aprendieron / recibieron / oyeron / vieron» en paralelo para reflejar la cadena verbal del griego.
