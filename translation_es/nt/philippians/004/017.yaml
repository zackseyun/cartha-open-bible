translation:
  language: es
  text: No es que yo busque el don[a], sino que busco el fruto que aumenta a la cuenta de ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la ofrenda»; el griego δόμα se refiere al don recibido, sin requerir necesariamente una terminología cultual.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιζητῶ
  english_pob_choice: I seek
  chosen_spanish: busco
  alternatives_spanish:
  - busco con empeño
  - procuro
  - persigo
  lexicon: BDAG
  rationale: El verbo expresa una búsqueda activa; en español, «busco» comunica bien la acción y mantiene el contraste retórico del versículo sin sonar forzado.
- source_word: δόμα
  english_pob_choice: the gift
  chosen_spanish: el regalo
  alternatives_spanish:
  - el don
  - la ofrenda
  - el obsequio
  lexicon: BDAG
  rationale: δόμα designa el don o regalo dado por los filipenses. «Regalo» es natural en español y conserva la referencia al aporte recibido, sin añadir una interpretación más técnica que el griego no exige aquí.
- source_word: καρπὸν
  english_pob_choice: the fruit
  chosen_spanish: el fruto
  alternatives_spanish:
  - el resultado
  - la ganancia
  - la cosecha
  lexicon: BDAG
  rationale: Se conserva la metáfora de «fruto», como en el texto fuente y en la traducción inglesa, para no aplanar el sentido hacia un mero beneficio material.
- source_word: πλεονάζοντα
  english_pob_choice: that increases
  chosen_spanish: que aumenta
  alternatives_spanish:
  - que abunda
  - que crece
  - que se multiplica
  lexicon: BDAG
  rationale: El participio indica aumento continuo o crecimiento; «que aumenta» es idiomático y mantiene la idea de progreso sin exageración interpretativa.
- source_word: εἰς λόγον ὑμῶν
  english_pob_choice: to your account
  chosen_spanish: para su cuenta
  alternatives_spanish:
  - a su cuenta
  - para su crédito
  - en su cuenta
  lexicon: BDAG
  rationale: Aquí λόγος tiene un matiz contable/comercial, por lo que «cuenta» preserva la metáfora de crédito o abono. Se eligió la tercera persona por cortesía y referencia implícita a los filipenses en español, manteniendo la relación con el sentido contable del griego.
- source_word: οὐχ ὅτι ... ἀλλὰ
  english_pob_choice: Not that ... but
  chosen_spanish: No es que ... sino que
  alternatives_spanish:
  - No que ... sino que
  - No digo que ... pero
  - No es que ... sino más bien
  lexicon: BDAG
  rationale: La construcción introduce aclaración y contraste. «No es que ... sino que» reproduce el giro natural en español y mantiene la estructura argumentativa del original.
translation_notes:
  revision_awareness: La redacción sigue el texto griego de Filipenses 4:17 y el rastro auditado en inglés. Se evita añadir «itself», en consonancia con la revisión posterior del inglés POB, y se conserva la metáfora financiera de εἰς λόγον ὑμῶν mediante «para su cuenta».
  spanish_consistency_notes:
  - Se mantiene «fruto» para καρπός y no se sustituye por «resultado» para conservar la metáfora.
  - «Cuenta» reproduce el campo semántico contable de λόγος en contexto, coherente con la decisión inglesa de «to your account».
  - Se prefiere «regalo» como equivalente directo de δόμα, con nota alternativa para «ofrenda» por posible matiz contextual.
