  revision_rationale: Se corrige «Cristo» a «Mesías» para seguir la decisión doctrinal y léxica final del POB sobre Χριστῷ en este versículo, preservando la alternativa tradicional en nota. También se ajusta «pensamientos» a «mentes» para reflejar mejor νοήματα en paralelo con «corazones» y mantener la simetría del texto fuente.
