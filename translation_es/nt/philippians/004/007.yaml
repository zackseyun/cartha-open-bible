translation:
  language: es
  text: Y la paz de Dios, que sobrepasa todo entendimiento, guardará sus corazones y sus mentes en Mesías Jesús[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en Cristo Jesús».
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰρήνη
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - tranquilidad
  - bienestar integral
  lexicon: BDAG
  rationale: «Paz» es el equivalente natural y fiel en español para εἰρήνη aquí; conserva tanto la dimensión relacional como la interior sin ampliar indebidamente el sentido.
- source_word: τοῦ θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - que proviene de Dios
  - desde Dios
  lexicon: BDAG
  rationale: El genitivo se mantiene de forma directa como «de Dios», sin explicitar en la línea principal una relación de fuente que el griego no formula de manera explícita.
- source_word: ὑπερέχουσα
  english_pob_choice: which surpasses
  chosen_spanish: que sobrepasa
  alternatives_spanish:
  - que excede
  - que rebasa
  lexicon: BDAG
  rationale: «Que sobrepasa» reproduce el participio con claridad y mantiene la idea de superioridad respecto a la capacidad humana de comprender.
- source_word: πάντα νοῦν
  english_pob_choice: all understanding
  chosen_spanish: todo entendimiento
  alternatives_spanish:
  - toda comprensión
  - toda mente
  lexicon: BDAG
  rationale: Aunque νοῦς puede referirse a «mente», en esta construcción el sentido es la comprensión humana en general; «todo entendimiento» conserva bien ese alcance en español.
- source_word: φρουρήσει
  english_pob_choice: will guard
  chosen_spanish: guardará
  alternatives_spanish:
  - protegerá
  - velará por
  lexicon: BDAG
  rationale: «Guardará» retiene la imagen de vigilancia y protección, incluso con matiz militar, sin sonar artificial en español.
- source_word: καρδίας
  english_pob_choice: hearts
  chosen_spanish: corazones
  alternatives_spanish:
  - corazones e interior
  - centro de la persona
  lexicon: BDAG
  rationale: «Corazones» preserva el valor bíblico del centro de la vida interior, afectiva y volitiva.
- source_word: νοήματα
  english_pob_choice: minds
  chosen_spanish: pensamientos
  alternatives_spanish:
  - mente
  - razonamientos
  lexicon: BDAG
  rationale: En español, «pensamientos» comunica de manera natural la actividad mental concreta y evita la posible rigidez de «mentes» en paralelo con «corazones».
- source_word: ἐν Χριστῷ Ἰησοῦ
  english_pob_choice: in Christ Jesus
  chosen_spanish: en Cristo Jesús
  alternatives_spanish:
  - en Mesías Jesús
  - en el Mesías Jesús
  lexicon: BDAG
  rationale: Aunque el proyecto suele traducir Χριστός como «Mesías» cuando el título tiene fuerza semántica, en esta fórmula paulina el giro «en Cristo Jesús» funciona en español como expresión estable y fiel al registro eclesial/canónico, y el auditorial inglés final también volvió a esa forma. En una frase preposicional tan fija, «Cristo Jesús» comunica mejor la unidad de la locución sin perder la referencia cristológica.
theological_decisions:
- issue: Renderización de ἐν Χριστῷ Ἰησοῦ en una fórmula paulina estable
  english_pob_reading: in Christ Jesus
  chosen_spanish_reading: en Cristo Jesús
  alternative_spanish_readings:
  - en Mesías Jesús
  - en el Mesías Jesús
  rationale: La frase expresa la esfera o ámbito de seguridad en relación con Jesús. En español, «en Cristo Jesús» es la forma más natural y reconocible para esta fórmula, y evita que «Mesías Jesús» suene forzado en un sintagma tan cristalizado. Se conserva la referencia al título cristológico sin introducir una construcción menos idiomática.
  doctrine_reference: 'Contested terms: Χριστός → Mesías (cuando el título lo requiere); excepción contextual en fórmulas paulinas fijas'
- issue: Relación entre «corazones» y «pensamientos»
  english_pob_reading: hearts and your minds
  chosen_spanish_reading: corazones y pensamientos
  alternative_spanish_readings:
  - corazones y mentes
  - corazón y mente
  rationale: El paralelismo griego distingue el centro afectivo-volitivo y la actividad cognitiva. «Corazones y pensamientos» permite mantener esa distinción sin imponer una dicotomía antropológica más técnica que la del texto.
  doctrine_reference: 'Anthropological vocabulary: καρδία / νόημα'
- issue: Alcance de la paz de Dios como protección
  english_pob_reading: will guard
  chosen_spanish_reading: guardará
  alternative_spanish_readings:
  - protegerá
  - mantendrá vigilados
  rationale: El verbo conserva la imagen de custodia activa y no reduce la frase a un mero estado emocional. Se mantiene la tensión entre paz interior y protección real de la vida interior.
  doctrine_reference: Philippians 4:7; προστασία divina / paz de Dios
translation_notes:
  revision_awareness: El contexto auditado muestra una oscilación reciente entre «Messiah Jesus» y «Christ Jesus», con una corrección de regresión que restauró «Messiah Jesus» en inglés por política del proyecto. Para el español, se optó por la forma idiomática y estable «Cristo Jesús», ya que funciona naturalmente como equivalente de la fórmula paulina y se ajusta al uso bíblico en español sin cambiar el contenido de fondo.
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y publicación-readable, sin calcos excesivos.
  - 'Se preservó la estructura sintáctica del original: coordinación inicial, participio relativo, futuro de guardia y complemento final locativo/relacional.'
  - No se introdujeron notas al pie porque la lectura española principal no requiere una alternativa textual marcada en este versículo.
  - «Pensamientos» se eligió para νοήματα a fin de evitar la ambigüedad de «mentes» en plural y conservar el paralelismo con «corazones».
