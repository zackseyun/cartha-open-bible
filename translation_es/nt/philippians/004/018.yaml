translation:
  language: es
  text: 'Pero he recibido todo[a], y tengo más que suficiente. Estoy plenamente provisto, habiendo recibido de Epafrodito lo que ustedes enviaron: un aroma fragante, un sacrificio aceptable, agradable a Dios.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O posiblemente: «lo he recibido en plenitud» o «he recibido la paga completa».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέχω
  english_pob_choice: I have received
  chosen_spanish: he recibido
  alternatives_spanish:
  - lo tengo en pleno
  - he recibido en plenitud
  lexicon: BDAG
  rationale: En este contexto de apoyo material, el verbo puede expresar que Pablo tiene en sus manos lo debido o recibido plenamente. «He recibido» conserva esa idea de recepción sin añadir una metáfora comercial que el español no necesita en el texto principal.
- source_word: πάντα
  english_pob_choice: everything
  chosen_spanish: todo
  alternatives_spanish:
  - todas las cosas
  - todo ello
  lexicon: BDAG
  rationale: El acusativo neutro plural abarca la totalidad de lo enviado. «Todo» es natural en español y mantiene el alcance completo.
- source_word: περισσεύω
  english_pob_choice: I abound
  chosen_spanish: tengo abundancia
  alternatives_spanish:
  - abundo
  - me sobra
  lexicon: BDAG
  rationale: La idea es de superabundancia o sobra suficiente. «Tengo abundancia» comunica bien esa plenitud en español contemporáneo sin sonar forzado.
- source_word: πεπλήρωμαι
  english_pob_choice: I am fully supplied
  chosen_spanish: estoy plenamente provisto
  alternatives_spanish:
  - estoy lleno
  - he sido llenado
  lexicon: BDAG
  rationale: El perfecto señala un estado presente resultante del regalo. «Estoy plenamente provisto» expresa de manera clara ese estado de suficiencia.
- source_word: δεξάμενος
  english_pob_choice: having received
  chosen_spanish: habiendo recibido
  alternatives_spanish:
  - después de recibir
  - al recibir
  lexicon: BDAG
  rationale: El participio explica la manera en que Pablo está plenamente provisto. «Habiendo recibido» conserva la relación temporal y de circunstancia.
- source_word: παρὰ Ἐπαφροδίτου
  english_pob_choice: from Epaphroditus
  chosen_spanish: de Epafrodito
  alternatives_spanish:
  - por medio de Epafrodito
  lexicon: BDAG
  rationale: La preposición indica procedencia inmediata del envío a través de Epafrodito. «De Epafrodito» es directo y deja el contexto aclarar que él fue el mensajero.
- source_word: τὰ παρ’ ὑμῶν
  english_pob_choice: what came from you
  chosen_spanish: lo que vino de parte de ustedes
  alternatives_spanish:
  - lo que ustedes enviaron
  - lo que procedía de ustedes
  lexicon: BDAG
  rationale: La expresión remite al don originado en los filipenses. «De parte de ustedes» mantiene esa procedencia personal y comunitaria sin volverla demasiado técnica.
- source_word: ὀσμὴν εὐωδίας
  english_pob_choice: a fragrant aroma
  chosen_spanish: un aroma fragante
  alternatives_spanish:
  - un olor fragante
  - un suave aroma
  lexicon: BDAG
  rationale: La frase evoca lenguaje sacrificial del Antiguo Testamento. «Un aroma fragante» es natural en español y conserva la imagen cultual sin deshacerla.
- source_word: θυσίαν δεκτήν
  english_pob_choice: an acceptable sacrifice
  chosen_spanish: un sacrificio aceptable
  alternatives_spanish:
  - un sacrificio grato
  - una ofrenda aceptada
  lexicon: BDAG
  rationale: Pablo describe el regalo como ofrenda sacrificial. «Sacrificio aceptable» preserva el peso cultual y la evaluación positiva de Dios.
- source_word: εὐάρεστον τῷ θεῷ
  english_pob_choice: pleasing to God
  chosen_spanish: agradable a Dios
  alternatives_spanish:
  - que agrada a Dios
  - bien visto por Dios
  lexicon: BDAG
  rationale: La expresión comunica el favor divino respecto de la ofrenda. «Agradable a Dios» es idiomático en español y retiene el juicio favorable sin atenuarlo.
theological_decisions:
- issue: Lenguaje sacrificial aplicado al don de los filipenses
  english_pob_reading: 'Retain the offering language as real metaphorical worship: ''a fragrant aroma, an acceptable sacrifice, pleasing to God.'''
  chosen_spanish_reading: 'Conservar el lenguaje de ofrenda como metáfora cultual real: «un aroma fragante, un sacrificio aceptable, agradable a Dios».'
  alternative_spanish_readings:
  - reducirlo a una simple expresión de gratitud
  - parafrasearlo como 'una ofrenda que Dios recibe con agrado'
  rationale: Pablo usa deliberadamente imágenes de sacrificio para interpretar el regalo como acto de adoración. Mantener la secuencia aroma–sacrificio–agrado conserva esa fuerza teológica sin introducir doctrinas extrañas al texto.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego y el criterio óptimo del registro inglés POB. No se detectaron revisiones recientes que obliguen a cambios adicionales; se conserva la ambigüedad léxica de ἀπέχω en la nota, como en el audit trail inglés.
  spanish_consistency_notes:
  - Se usa «Dios» para τῷ θεῷ, conforme a la terminología base del proyecto.
  - Se mantiene «Epafrodito» para Ἐπαφρόδιτος como forma española estándar del nombre.
  - Se conserva la metáfora sacrificial sin suavizarla, porque el contexto inmediato la sostiene.
  - «Aroma fragante» y «sacrificio aceptable» reproducen el tono cultual sin caer en arcaísmo excesivo.
