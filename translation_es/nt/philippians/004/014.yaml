translation:
  language: es
  text: Sin embargo,[a] hicieron bien al participar conmigo[b] en mi aflicción.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «No obstante» o «Con todo», para el contraste inicial.'
    reason: lexical_alternative
  - marker: b
    text: 'También: «al tomar parte conmigo en mi aflicción» o «al solidarizarse conmigo en mi aflicción».'
    reason: lexical_alternative
lexical_decisions:
- source_word: πλὴν
  english_pob_choice: Nevertheless
  chosen_spanish: Sin embargo
  alternatives_spanish:
  - No obstante
  - Sin embargo
  lexicon: BDAG
  rationale: Expresa el contraste suave con lo anterior sin volver la frase demasiado fuerte. En español, 'Sin embargo' suena natural y conserva el giro discursivo de apertura.
- source_word: καλῶς ἐποιήσατε
  english_pob_choice: you did well
  chosen_spanish: hicieron bien
  alternatives_spanish:
  - actuaron bien
  - obraron bien
  lexicon: BDAG
  rationale: La combinación adverbial + aoristo se vierte con una evaluación directa y idiomática. 'Hicieron bien' mantiene el elogio explícito sin cargar el texto con una paráfrasis.
- source_word: συγκοινωνήσαντές
  english_pob_choice: to share with
  chosen_spanish: al compartir
  alternatives_spanish:
  - al participar con
  - al hacerse partícipes con
  lexicon: BDAG
  rationale: El participio aoristo expresa una participación solidaria en la situación de Pablo. 'Al compartir' conserva la idea relacional y activa en un español natural.
- source_word: μου
  english_pob_choice: my
  chosen_spanish: mi
  alternatives_spanish:
  - mi
  - de mí
  lexicon: BDAG
  rationale: El posesivo se expresa de forma directa en español con 'mi', porque modifica naturalmente 'aflicción'.
- source_word: τῇ θλίψει
  english_pob_choice: in my affliction
  chosen_spanish: en mi aflicción
  alternatives_spanish:
  - en mi angustia
  - en mi tribulación
  lexicon: BDAG
  rationale: θλῖψις denota presión, aflicción o angustia. 'Aflicción' preserva el peso del término sin subirlo a un registro más técnico o escatológico como 'tribulación'.
translation_notes:
  revision_awareness: La redacción sigue de cerca el ajuste final del audit trail inglés, que prefirió 'sharing in my affliction' frente a una formulación más indirecta. En español se mantuvo esa relación participativa con 'al compartir en mi aflicción', evitando una paráfrasis más libre.
  spanish_consistency_notes:
  - Se mantiene 'aflicción' para θλῖψις, en consonancia con el registro de la POB inglesa.
  - Se usa 'Sin embargo' para πλὴν como contraste suave y natural en español.
  - '''Compartir'' refleja la participación solidaria sin introducir terminología eclesiástica no sustentada por el texto.'
