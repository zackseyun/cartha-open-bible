  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: πλὴν introduce un contraste leve, καλῶς ἐποιήσατε se transmite naturalmente como «hicieron bien», y τῇ θλίψει como «mi aflicción» es fiel. Sin embargo, «compartir en mi aflicción» suena menos natural en español y no expresa con suficiente claridad la idea de participación solidaria de συγκοινωνήσαντές μου. El español mejora con una formulación que explicite la participación con Pablo en su aflicción.'
  spanish_quality_summary: El texto es claro y digno, pero «compartir en mi aflicción» resulta algo calcado y poco idiomático en español bíblico natural. «Participar conmigo en mi aflicción» o «tomar parte conmigo en mi aflicción» suena mejor y preserva mejor la relación personal. Además, la nota de alternativa actual repite en parte la mejora principal y conviene ajustarla.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. «Aflicción» para θλῖψις está bien. La principal cuestión es estilístico-lexical: συγκοινωνήσαντές pide una expresión de coparticipación más natural que «compartir en».'
  issues:
