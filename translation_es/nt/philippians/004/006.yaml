  glossary_alignment: No hay conflictos con la terminología doctrinal principal del proyecto. «Dios» está bien. La distinción «oración / súplica» se preserva correctamente. La excepción recomendada es sustituir «afanosos» por «preocupen» por fidelidad semántica y naturalidad del español.
