translation:
  language: es
  text: No se preocupen por nada[a], sino que, en todo, mediante la oración y la súplica[b], con acción de gracias, sean dadas a conocer sus peticiones a Dios[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No estén ansiosos por nada».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «petición» para «súplica».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «ante Dios» para «a Dios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: μηδὲν
  english_pob_choice: anything
  chosen_spanish: nada
  alternatives_spanish:
  - ninguna cosa
  - en absoluto
  lexicon: BDAG
  rationale: El negativo μηδέν con el verbo prohibitivo expresa una prohibición general. En español, «nada» comunica de forma natural la amplitud de «about anything» sin añadir matices ajenos.
- source_word: μεριμνᾶτε
  english_pob_choice: be anxious
  chosen_spanish: sean afanosos
  alternatives_spanish:
  - estén ansiosos
  - se preocupen
  lexicon: BDAG
  rationale: El verbo denota cuidado ansioso, inquietud o preocupación. «Sean afanosos» conserva la fuerza de la exhortación y evita reducirlo solo a un sentimiento pasajero; «estén ansiosos» suena posible, pero menos idiomático en este mandato general.
- source_word: ἐν παντὶ
  english_pob_choice: in everything
  chosen_spanish: en todo
  alternatives_spanish:
  - en toda circunstancia
  - en todas las cosas
  lexicon: BDAG
  rationale: «En todo» reproduce bien la amplitud inclusiva del griego y suena natural en español bíblico contemporáneo.
- source_word: τῇ προσευχῇ
  english_pob_choice: prayer
  chosen_spanish: la oración
  alternatives_spanish:
  - la plegaria
  - la oración dirigida a Dios
  lexicon: BDAG
  rationale: προσευχή es el término general para oración; «la oración» es la equivalencia más directa y clara en español.
- source_word: τῇ δεήσει
  english_pob_choice: petition
  chosen_spanish: la súplica
  alternatives_spanish:
  - la petición
  - la imploración
  lexicon: BDAG
  rationale: δέησις añade el matiz de ruego/entreaty más específico que προσευχή. «Súplica» conserva esa distinción mejor que «petición» en español, aunque esta última sigue siendo una alternativa válida.
- source_word: μετ’ εὐχαριστίας
  english_pob_choice: with thanksgiving
  chosen_spanish: con acción de gracias
  alternatives_spanish:
  - con gratitud
  - dando gracias
  lexicon: BDAG
  rationale: La construcción nominal se refleja bien con «con acción de gracias», expresión estable y fiel al peso litúrgico del sustantivo εὐχαριστία.
- source_word: τὰ αἰτήματα ὑμῶν
  english_pob_choice: your requests
  chosen_spanish: sus peticiones
  alternatives_spanish:
  - sus solicitudes
  - lo que piden
  lexicon: BDAG
  rationale: αἰτήματα se refiere a lo pedido concretamente. «Peticiones» mantiene el paralelismo con «súplica» sin volver la frase redundante en exceso.
- source_word: γνωριζέσθω
  english_pob_choice: let ... be made known
  chosen_spanish: sean dadas a conocer
  alternatives_spanish:
  - se hagan conocer
  - sean conocidas
  lexicon: BDAG
  rationale: El imperativo pasivo se reproduce con una pasiva perifrástica en español. «Sean dadas a conocer» conserva la pasividad y el matiz de manifestación/comunicación al decirlo ante Dios.
- source_word: πρὸς τὸν θεόν
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - ante Dios
  - para con Dios
  lexicon: BDAG
  rationale: «A Dios» es la correspondencia directa de πρὸς en este contexto de hacer conocidas las peticiones. «Ante Dios» es una alternativa interpretativa que expresa orientación, pero el texto griego favorece la dirección relacional básica.
theological_decisions:
- issue: Distinción entre ansiedad y exhortación general a la preocupación/cuidado
  english_pob_reading: Do not be anxious about anything
  chosen_spanish_reading: No se afanen por nada
  alternative_spanish_readings:
  - No se preocupen por nada
  - No estén ansiosos por nada
  rationale: El griego prohíbe la inquietud ansiosa de manera total. «Afanarse» comunica bien ese cuidado cargado de ansiedad en un registro bíblico natural; «preocuparse» puede ser más comprensible, pero suaviza el matiz de urgencia interior.
  doctrine_reference: Filipenses 4:6
- issue: Relación entre oración, súplica y gratitud
  english_pob_reading: by prayer and petition with thanksgiving
  chosen_spanish_reading: mediante la oración y la súplica, con acción de gracias
  alternative_spanish_readings:
  - por medio de la oración y la petición, con gratitud
  - en oración y súplica, con agradecimiento
  rationale: El griego distingue προσευχή y δέησις; conservar ambos términos evita borrar la progresión desde la oración general hasta el ruego específico. La gratitud/acción de gracias permanece unida a ambas, como exige el texto.
  doctrine_reference: Filipenses 4:6
- issue: Dirección de las peticiones hacia Dios
  english_pob_reading: let your requests be made known to God
  chosen_spanish_reading: sean dadas a conocer a Dios
  alternative_spanish_readings:
  - se hagan conocer ante Dios
  - sean conocidas por Dios
  rationale: El imperativo pasivo debe mantenerse. «A Dios» refleja la dirección del acto de hacer conocidas las peticiones; no se debe convertir el verso en una simple instrucción psicológica o devocional sin destinatario.
  doctrine_reference: Filipenses 4:6
translation_notes:
  revision_awareness: La base auditada en inglés se mantuvo sin revisiones sustantivas; el cierre de acuerdo alto confirma que no hubo cambios necesarios en la lectura objetivo. La redacción española busca preservar esa misma equivalencia óptima, con ajustes idiomáticos mínimos para naturalidad y claridad.
  spanish_consistency_notes:
  - Se usó «Dios» para θεόν, conforme al estándar del proyecto.
  - Se conservó la distinción entre «oración» y «súplica» para reflejar προσευχή y δέησις.
  - Se mantuvo la pasiva de γνωριζέσθω con una construcción natural en español.
  - La nota sobre «ante Dios» se deja como alternativa, no como traducción principal, porque el griego favorece «a Dios» en esta cláusula.
