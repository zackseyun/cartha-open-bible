translation:
  language: es
  text: Saluden a cada santo en Mesías Jesús[a]. Los hermanos[b] que están conmigo los saludan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en Cristo Jesús».'
    reason: lexical_alternative
  - marker: b
    text: «Hermanos» puede, según el contexto, referirse más ampliamente a los compañeros creyentes que están con Pablo, incluso a un grupo mixto.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀσπάσασθε
  english_pob_choice: Greet
  chosen_spanish: Saluden
  alternatives_spanish:
  - Den saludos a
  - Saluden a
  lexicon: BDAG
  rationale: El imperativo en contexto epistolar expresa enviar saludos; «saluden» es natural, directo y conserva el valor comunicativo del saludo.
- source_word: πάντα ἅγιον
  english_pob_choice: every saint
  chosen_spanish: todo[a] santo
  alternatives_spanish:
  - cada santo
  - todo creyente apartado
  lexicon: BDAG
  rationale: La combinación distributiva de πᾶς con singular se rinde de forma natural en español con «todo santo». Mantiene el sentido de los creyentes como apartados para Dios sin forzar una perífrasis explicativa en el texto principal.
- source_word: ἐν Χριστῷ Ἰησοῦ
  english_pob_choice: in Messiah Jesus
  chosen_spanish: en Mesías Jesús
  alternatives_spanish:
  - en Cristo Jesús
  lexicon: BDAG
  rationale: Se conserva el valor titulativo de Χριστός con «Mesías», según el criterio doctrinal del POB para evitar ocultar el título original detrás de una forma tradicional fijada. La preposición «en» se mantiene de manera transparente.
- source_word: ἀσπάζονται
  english_pob_choice: greet
  chosen_spanish: los saludan
  alternatives_spanish:
  - les envían saludos
  - los saludan
  lexicon: BDAG
  rationale: En el cierre de carta, el presente medio se expresa de modo natural con «saludan». Se prefiere «los saludan» porque el objeto directo ὑμᾶς se puede reproducir sin ambigüedad en español.
- source_word: οἱ σὺν ἐμοὶ ἀδελφοί
  english_pob_choice: The brothers with me
  chosen_spanish: Los hermanos que están conmigo
  alternatives_spanish:
  - Los hermanos conmigo
  - Los hermanos y hermanas que están conmigo
  lexicon: BDAG
  rationale: «ἀδελφοί» es masculino plural; sin embargo, en español «los hermanos que están conmigo» puede referirse naturalmente al grupo de compañeros de Pablo y evita una lectura demasiado estrecha. El audit trail inglés señaló la posible amplitud contextual del término; esa posibilidad se refleja aquí sin alterar el texto principal.
theological_decisions:
- issue: Uso de «Mesías» para Χριστός en la frase «ἐν Χριστῷ Ἰησοῦ»
  english_pob_reading: in Messiah Jesus
  chosen_spanish_reading: en Mesías Jesús
  alternative_spanish_readings:
  - en Cristo Jesús
  rationale: Se preserva la lectura titulativa y cristológica del término griego. El registro español evita la sustitución tradicional automática por «Cristo» para mantener la política terminológica del POB y su transparencia ante el original.
  doctrine_reference: DOCTRINE.md / terminología base del POB para Χριστός
- issue: Alcance posible de ἀδελφοί
  english_pob_reading: ‘Brothers’ may in context refer more broadly to fellow believers with Paul, including a mixed group.
  chosen_spanish_reading: Los hermanos que están conmigo
  alternative_spanish_readings:
  - Los hermanos y hermanas que están conmigo
  - Los creyentes que están conmigo
  rationale: El griego usa un masculino plural. El texto principal conserva la forma masculina; la formulación española queda abierta a un grupo mixto sin introducir de forma obligatoria una expansión inclusiva que el griego no explicita.
  doctrine_reference: Principio de fidelidad lexical y nota contextual del POB
translation_notes:
  revision_awareness: El contexto de auditoría muestra una ida y vuelta entre «Cristo Jesús» y «Mesías Jesús». Se siguió la restauración final de «Mesías» por coherencia con la política doctrinal/terminológica del POB. También se tuvo en cuenta la nota inglesa sobre el posible alcance más amplio de «brothers», reflejándola con una redacción española que no cierra indebidamente la referencia.
  spanish_consistency_notes:
  - Se mantuvo «Mesías» para Χριστός en coherencia con la política POB indicada en el historial de revisión.
  - «Saluden» y «los saludan» conservan el tono epistolar breve y natural del cierre paulino.
  - La nota a evita perder la fuerza distributiva de πᾶς/ἅγιος sin sobrecargar el texto principal.
  - Se evitó «siervos» o «creyentes» donde el griego y la auditoría favorecen la referencia explícita a hermanos/compañeros.
