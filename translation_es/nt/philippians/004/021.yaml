    issue: La nota al pie actual no preserva la alternativa léxica principal documentada para ἐν Χριστῷ Ἰησοῦ.
    rationale: El audit trail inglés conserva explícitamente «Or “in Christ Jesus.”». En español debe mantenerse una nota equivalente, especialmente porque el texto principal usa la opción doctrinalmente preferida «Mesías Jesús» frente a la forma tradicional.
  - severity: low
    issue: El anclaje «todo[a] santo» es inadecuado en el texto principal.
    rationale: Los marcadores de nota deben aparecer como [a], [b], etc., no incrustados dentro de la palabra. Además, la forma con corchetes interrumpe la lectura y no corresponde al formato requerido.
  - severity: low
    issue: «Todo santo» es posible, pero «cada santo» suena más natural en español en este contexto distributivo.
    rationale: Ambas opciones reflejan πᾶς + singular, pero «cada santo» evita una leve rigidez y conserva bien el valor distributivo sin pérdida semántica.
  - severity: low
    issue: Falta en español la nota contextual sobre «hermanos» que sí está preservada en inglés.
    rationale: No es obligatorio expandir el texto principal, pero la nota ayuda a evitar una inferencia demasiado estrecha y sigue el rastro de auditoría inglés.
