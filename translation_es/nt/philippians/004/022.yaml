translation:
  language: es
  text: Todos los santos los saludan, especialmente los de la casa de César[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los que son de la casa de César». La expresión se refiere a personas asociadas con la casa imperial, no necesariamente a familiares de César.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀσπάζονται
  english_pob_choice: greet
  chosen_spanish: os saludan
  alternatives_spanish:
  - os envían saludos
  - os saludan cordialmente
  lexicon: BDAG
  rationale: El verbo epistolar griego expresa un saludo directo. En español, «os saludan» conserva la acción interpersonal sin añadir más contenido del que aporta el texto. Se evita una paráfrasis más extensa para mantener la brevedad formularia del cierre paulino.
- source_word: πάντες οἱ ἅγιοι
  english_pob_choice: All the saints
  chosen_spanish: todos los santos
  alternatives_spanish:
  - todos los santos de Dios
  - todos los creyentes
  - todos los consagrados
  lexicon: BDAG
  rationale: ἅγιοι en uso paulino designa a los miembros del pueblo de Dios. «Santos» preserva el término técnico y su carga teológica, en lugar de diluirlo con una glosa interpretativa.
- source_word: μάλιστα δὲ
  english_pob_choice: especially
  chosen_spanish: y especialmente
  alternatives_spanish:
  - especialmente
  - y particularmente
  lexicon: BDAG
  rationale: La idea de énfasis especial se mantiene con «especialmente». Se añade «y» para reflejar de manera natural la continuidad discursiva del griego con δέ, sin sobrecargar la frase.
- source_word: οἱ ἐκ τῆς Καίσαρος οἰκίας
  english_pob_choice: those of Caesar’s household
  chosen_spanish: los de la casa de César
  alternatives_spanish:
  - los de la casa de César[a]
  - los que pertenecen a la casa de César
  - los de la familia de César
  lexicon: BDAG
  rationale: 'ἐκ + genitivo aquí indica pertenencia o asociación con la casa imperial. «Los de la casa de César» conserva la ambigüedad controlada del original: puede referirse a personas vinculadas al entorno imperial, no necesariamente a familiares de César. «Casa» evita reducir el sentido a «familia» y mantiene la referencia institucional.'
- source_word: Καίσαρος
  english_pob_choice: Caesar’s
  chosen_spanish: de César
  alternatives_spanish:
  - del César
  - del emperador
  lexicon: BDAG
  rationale: El nombre/título propio se vierte con el equivalente histórico y reconocido «César». Se evita «emperador» porque interpreta el título en lugar de reflejar la forma nominal del griego.
theological_decisions:
- issue: Sentido de ἅγιοι en saludo paulino
  english_pob_reading: A designation for believers/holy ones, rendered lexically as 'saints' rather than paraphrased.
  chosen_spanish_reading: Un designador de la comunidad creyente, rendido como «santos» y no parafraseado.
  alternative_spanish_readings:
  - los creyentes
  - el pueblo de Dios
  rationale: La traducción conserva el término tradicional-lexical porque el texto no define aquí una clase excepcional de cristianos, sino al conjunto de los destinatarios del lenguaje paulino. Mantener «santos» preserva la tensión teológica y la consistencia terminológica.
  doctrine_reference: Preservar la tensión teológica; consistencia léxica de términos clave.
- issue: Alcance de οἱ ἐκ τῆς Καίσαρος οἰκίας
  english_pob_reading: The phrase refers to persons associated with the imperial household, not necessarily Caesar’s family members.
  chosen_spanish_reading: La frase se entiende como personas vinculadas al entorno doméstico/administrativo imperial, no necesariamente familiares de César.
  alternative_spanish_readings:
  - familia de César
  - casa imperial de César
  rationale: La POB inglesa documenta la restricción semántica de la expresión. En español, «casa» conserva esa amplitud institucional y evita estrechar indebidamente el referente a parentesco sanguíneo.
  doctrine_reference: Precisión histórica y lexical; evitar sobrelectura del término de parentesco.
translation_notes:
  revision_awareness: 'Se siguió el contexto auditado en inglés: ''greet'' como saludo epistolar, ''saints'' como término paulino establecido, y la frase sobre la casa de César con su ambigüedad histórica conservada. No se detectaron revisiones recientes que alteren el sentido base.'
  spanish_consistency_notes:
  - Se mantuvo «César» como título propio histórico, coherente con el griego Καίσαρ.
  - Se evitó «SEÑOR» o equivalentes de máscara porque no hay aquí el nombre divino.
  - El cierre epistolar se hizo breve y natural en español, sin perder el paralelismo del original.
  - La nota al pie queda anclada en «saludan[a]» para señalar la alternativa verbal sin duplicar marcadores.
