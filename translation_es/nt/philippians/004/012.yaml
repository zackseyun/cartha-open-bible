translation:
  language: es
  text: 'Sé también ser humillado[a], y sé también tener abundancia. En todo y en todas las circunstancias[b] he aprendido el secreto[c]: tanto de estar saciado como de tener hambre, tanto de tener abundancia como de padecer necesidad.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Más literalmente: «ser rebajado» o «ser llevado a una condición humilde». El griego usa un infinitivo medio/pasivo; aquí se evita «humillarme» porque en español puede sugerir auto-humillación voluntaria.'
    reason: lexical_alternative
  - marker: b
    text: La duplicación «en todo y en todas las circunstancias» conserva la amplitud retórica de ἐν παντὶ καὶ ἐν πᾶσιν sin reducirla a una sola expresión.
    reason: spanish_style_note
  - marker: c
    text: 'Más literalmente: «he sido iniciado». Pablo usa metafóricamente lenguaje de iniciación para expresar que ha aprendido un secreto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἶδα
  english_pob_choice: I know how
  chosen_spanish: sé
  alternatives_spanish:
  - sé cómo
  - he aprendido a
  lexicon: BDAG
  rationale: Con los infinitivos que siguen, el sentido es de habilidad práctica adquirida por experiencia. En español, «sé» transmite naturalmente ese saber-hacer sin volver la frase artificial; el complemento lo da el resto de la oración.
- source_word: ταπεινοῦσθαι
  english_pob_choice: to be brought low
  chosen_spanish: humillarme
  alternatives_spanish:
  - ser humillado
  - ser abatido
  - bajarme
  lexicon: BDAG
  rationale: El verbo pasivo/medio apunta a ser rebajado o pasar por humillación. «Humillarme» conserva la fuerza de la experiencia sufrida y encaja bien con la polaridad de la frase, aunque admite la matización pasiva implícita en el contexto.
- source_word: περισσεύειν
  english_pob_choice: to abound
  chosen_spanish: tener abundancia
  alternatives_spanish:
  - abundar
  - tener de sobra
  - sobrarme
  lexicon: BDAG
  rationale: En español, el infinitivo «abundar» puede sonar menos natural en esta construcción; «tener abundancia» comunica el mismo campo semántico de tener más que suficiente sin perder el paralelismo con «padecer necesidad».
- source_word: ἐν παντὶ καὶ ἐν πᾶσιν
  english_pob_choice: In everything and in all circumstances
  chosen_spanish: En todo y en todas las cosas
  alternatives_spanish:
  - En todo y en toda situación
  - En cualquier cosa y en todo
  lexicon: BDAG
  rationale: La doble expresión griega conserva amplitud retórica. «En todo y en todas las cosas» mantiene ambas cláusulas sin fusionarlas y refleja bien la plenitud distributiva del original.
- source_word: μεμύημαι
  english_pob_choice: I have learned the secret
  chosen_spanish: he sido iniciado
  alternatives_spanish:
  - he aprendido el secreto
  - me han iniciado
  lexicon: BDAG
  rationale: El griego usa lenguaje de iniciación. La POB inglesa conserva esa metáfora en nota; en español, «he sido iniciado» la preserva de modo auditable, evitando ocultar la tensión entre el sentido literal y el sentido idiomático contextual.
- source_word: χορτάζεσθαι
  english_pob_choice: to be well fed
  chosen_spanish: estar saciado
  alternatives_spanish:
  - estar bien alimentado
  - estar lleno
  lexicon: BDAG
  rationale: El verbo se refiere a quedar satisfecho con alimento. «Estar saciado» es breve, natural y mantiene la oposición directa con «tener hambre».
- source_word: πεινᾶν
  english_pob_choice: to be hungry
  chosen_spanish: tener hambre
  alternatives_spanish:
  - hambrear
  - estar hambriento
  lexicon: BDAG
  rationale: Es la manera más clara y idiomática en español de expresar la necesidad de alimento, manteniendo el contraste verbal con «estar saciado».
- source_word: ὑστερεῖσθαι
  english_pob_choice: to be in need
  chosen_spanish: padecer necesidad
  alternatives_spanish:
  - estar necesitado
  - carecer
  - faltarme
  lexicon: BDAG
  rationale: «Padecer necesidad» expresa la carencia de manera digna y precisa, y corresponde bien al rango semántico de falta o privación que el inglés POB traduce como «to be in need».
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail inglés, que distinguió claramente entre las dos expresiones de amplitud («in everything» / «in all circumstances»). La versión española preserva esa duplicación con «En todo y en todas las cosas» y mantiene la metáfora de iniciación de μεμύημαι, en línea con la nota inglesa sobre el sentido literal.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera; aquí no aparece.
  - Se mantuvo un registro sobrio y eclesial, evitando arcaísmos innecesarios.
  - Se preservó la repetición verbal de «sé» para reflejar el paralelismo de οἶδα... οἶδα.
  - La tensión entre el sentido literal de iniciación y el sentido idiomático de aprendizaje quedó visible en la nota, en vez de neutralizarse.
