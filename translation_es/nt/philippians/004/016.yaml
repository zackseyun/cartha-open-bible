translation:
  language: es
  text: porque aun en Tesalónica me enviaron una y otra vez para suplir mi necesidad.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de manera más idiomática, «me enviaron para mis necesidades más de una vez». El griego dice literalmente «para mi necesidad» en singular.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - pues
  lexicon: BDAG
  rationale: Introduce una cláusula explicativa causal; «porque» es la correspondencia natural y transparente en español para el valor de ὅτι aquí.
- source_word: ἐν Θεσσαλονίκῃ
  english_pob_choice: in Thessalonica
  chosen_spanish: en Tesalónica
  alternatives_spanish:
  - mientras estaba en Tesalónica
  lexicon: BDAG
  rationale: Mantiene el valor locativo básico sin añadir una lectura temporal que el griego no exige.
- source_word: ἅπαξ καὶ δὶς
  english_pob_choice: once and again
  chosen_spanish: una y otra vez
  alternatives_spanish:
  - más de una vez
  - una vez y otra
  lexicon: BDAG
  rationale: La fórmula española conserva la repetición enfática del original y suena natural; evita reducir demasiado el matiz a una simple paráfrasis numérica.
- source_word: εἰς τὴν χρείαν μοι
  english_pob_choice: to meet my need
  chosen_spanish: para mi necesidad
  alternatives_spanish:
  - para cubrir mi necesidad
  - en mi necesidad
  lexicon: BDAG
  rationale: χρεία está en singular, por eso se conserva «necesidad». «Para mi necesidad» refleja la dirección del envío hacia esa carencia sin introducir un verbo de interpretación que no está explícito en el griego.
- source_word: ἐπέμψατε
  english_pob_choice: you sent
  chosen_spanish: me enviaste
  alternatives_spanish:
  - enviaste
  - me mandaste
  lexicon: BDAG
  rationale: El verbo expresa simplemente «enviar». Se incluye «me» porque el dativo μοι hace explícito que el envío fue dirigido a Pablo; «enviar» es la opción más directa y fiel.
translation_notes:
  revision_awareness: La redacción española sigue de cerca el estado revisado del POB inglés, que prefería una formulación más natural que conserve la relación causal de ὅτι, la locución repetitiva de ἅπαξ καὶ δὶς y la dirección concreta de εἰς τὴν χρείαν μοι sin sobrerinterpretarla.
  spanish_consistency_notes:
  - Se usa «Tesalónica» para el topónimo, en coherencia con el estándar castellano usual y con la forma inglesa auditada.
  - Se conserva el singular «necesidad» para χρεία, respetando la singularidad del sustantivo griego.
  - No se añade una nota textual porque el pasaje no presenta variante relevante en el paquete proporcionado.
