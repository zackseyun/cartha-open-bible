translation:
  language: es
  text: Le ruego a Evodia[a], y le ruego a Síntique, que piensen de la misma manera en el Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que tengan un mismo sentir en el Señor»; también posiblemente «que estén de acuerdo en el Señor».
    reason: lexical_alternative
lexical_decisions:
- source_word: Εὐοδίαν
  english_pob_choice: Euodia
  chosen_spanish: Evodia
  alternatives_spanish:
  - Euodia
  lexicon: N/A (nombre propio transliterado)
  rationale: Se translitera el nombre propio al español de manera natural. «Evodia» evita una forma demasiado anglicada y mantiene la referencia personal del texto griego.
- source_word: παρακαλῶ
  english_pob_choice: I urge
  chosen_spanish: exhorto
  alternatives_spanish:
  - ruego
  - insto
  - les imploro
  lexicon: BDAG
  rationale: El verbo παρακαλέω expresa aquí una petición insistente y pastoral. «Exhorto» conserva la fuerza apelativa y el tono exhortativo sin suavizarlo demasiado.
- source_word: Συντύχην
  english_pob_choice: Syntyche
  chosen_spanish: Síntique
  alternatives_spanish:
  - Syntique
  lexicon: N/A (nombre propio transliterado)
  rationale: Se translitera el nombre propio de forma hispana y legible. La tilde marca la pronunciación natural en español.
- source_word: τὸ αὐτὸ φρονεῖν
  english_pob_choice: to think the same way
  chosen_spanish: a pensar de la misma manera
  alternatives_spanish:
  - a tener la misma mente
  - a estar de acuerdo
  - a tener el mismo sentir
  lexicon: BDAG
  rationale: La frase combina la idea de mente/disposición con contenido de concordia. «Pensar de la misma manera» conserva el componente cognitivo y relacional sin imponer una equivalencia demasiado rígida.
- source_word: ἐν κυρίῳ
  english_pob_choice: in the Lord
  chosen_spanish: en el Señor
  alternatives_spanish:
  - unidos en el Señor
  - en unión con el Señor
  lexicon: BDAG
  rationale: '«Señor» es la traducción española habitual de κύριος en este marco cristológico. Aquí la frase mantiene el ámbito en que debe darse la unidad: dentro de la relación con el Señor.'
theological_decisions:
- issue: 'Alcance de τὸ αὐτὸ φρονεῖν: unidad de pensamiento vs. simple acuerdo práctico'
  english_pob_reading: to think the same way / to be of the same mind / to agree in the Lord
  chosen_spanish_reading: a pensar de la misma manera en el Señor
  alternative_spanish_readings:
  - a tener la misma mente en el Señor
  - a estar de acuerdo en el Señor
  rationale: El griego permite tanto una orientación de mente como de acuerdo práctico, pero el texto conserva explícitamente φρονεῖν. La redacción española retiene esa tensión sin reducirla solo a «estar de acuerdo».
  doctrine_reference: Filipenses 2:2; 4:2
translation_notes:
  revision_awareness: 'El pasaje muestra una alta convergencia con el análisis inglés: nombres propios transliterados, παρακαλέω con valor exhortativo, y τὸ αὐτὸ φρονεῖν como una llamada a unidad de pensamiento/disposición. No se detectaron revisiones textuales que alteren la traducción base.'
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος de forma consistente con la terminología cristológica del proyecto.
  - Se usa transliteración española estándar para nombres propios griegos.
  - La frase verbal conserva la repetición de exhortación para reflejar la estructura enfática del griego.
