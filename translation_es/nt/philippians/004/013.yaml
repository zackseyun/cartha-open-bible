translation:
  language: es
  text: Todo lo puedo[a] por medio del que me fortalece[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Puedo con todo»; en contexto, la idea es de capacidad o suficiencia en toda circunstancia.'
    reason: lexical_alternative
  - marker: b
    text: El griego dice «del que me fortalece» y no nombra explícitamente a Cristo en este versículo, aunque el contexto apunta a él.
    reason: alternative_reading
lexical_decisions:
- source_word: πάντα
  english_pob_choice: in all things / to do all things
  chosen_spanish: todo
  alternatives_spanish:
  - todas las cosas
  - en todas las cosas
  - en toda circunstancia
  lexicon: BDAG
  rationale: El acusativo plural abarca un campo amplio. En español, «todo lo puedo» conserva esa amplitud y suena natural en una formulación breve y memorable, sin restringir innecesariamente el alcance del griego.
- source_word: ἰσχύω
  english_pob_choice: I am able
  chosen_spanish: puedo
  alternatives_spanish:
  - soy capaz
  - tengo fuerza
  - puedo hacer
  lexicon: BDAG
  rationale: El verbo expresa capacidad o suficiencia. «Puedo» transmite de forma idiomática la idea de capacidad habilitada sin añadir un complemento más pesado que el español no exige.
- source_word: ἐν
  english_pob_choice: through
  chosen_spanish: en
  alternatives_spanish:
  - por
  - mediante
  - a través de
  lexicon: BDAG
  rationale: La preposición griega es ἐν, no un equivalente directo de «through». En español, «en el que» preserva la construcción relacional con el participio y evita imponer una preposición interpretativa no presente en la superficie del texto.
- source_word: τῷ ἐνδυναμοῦντί με
  english_pob_choice: the one who strengthens me
  chosen_spanish: el que me fortalece
  alternatives_spanish:
  - el que me da fuerza
  - el que me da poder
  - el que me fortalece a mí
  lexicon: BDAG
  rationale: El participio articular se vuelve naturalmente una sustantivación en español. «El que me fortalece» mantiene la fuerza verbal continua y evita introducir un nombre o título que el versículo no explicita.
theological_decisions:
- issue: Referente implícito del participio articular
  english_pob_reading: Retain the indefinite substantive expression without adding 'Christ' or 'Messiah' to the main text.
  chosen_spanish_reading: Conservar la expresión indefinida «el que me fortalece» sin añadir «Cristo» ni «Mesías» al texto principal.
  alternative_spanish_readings:
  - Cristo que me fortalece
  - el Mesías que me fortalece
  rationale: Aunque el contexto más amplio apunta a Jesús, este versículo en griego no lo nombra explícitamente. La traducción española debe respetar esa reserva textual y dejar el referente implícito en el texto principal.
  doctrine_reference: Primacía del texto original; no importar al versículo principal una identificación doctrinal que el griego no formula explícitamente.
translation_notes:
  revision_awareness: El texto griego dice πάντα ἰσχύω ἐν τῷ ἐνδυναμοῦντί με. La revisión inglesa reciente añadió «to do» por naturalidad idiomática, pero el griego no contiene un verbo equivalente; por eso el español opta por «todo lo puedo», que comunica la capacidad global sin forzar una paráfrasis más explícita. Se preserva la fuerza del participio con «el que me fortalece» y se mantiene la reserva referencial del original.
  spanish_consistency_notes:
  - Se usa «fortalece» para ἐνδυναμόω, en continuidad con el valor de capacidad/poder que el audit trail inglés traduce como strengthen.
  - Se evita «Cristo» en el texto principal para no sobreespecificar el referente del participio.
  - La fórmula breve «Todo lo puedo» es idiomática en español y mantiene la amplitud de πάντα sin perder naturalidad.
  - Las notas siguen el orden y la función de las del audit trail inglés, adaptadas a una lectura española sin duplicar el contenido del texto principal.
