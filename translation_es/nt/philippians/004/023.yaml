translation:
  language: es
  text: La gracia del Señor Jesús Mesías[a] sea con el espíritu de ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «La gracia del Señor Jesús Mesías sea con el espíritu de ustedes».'
    reason: alternative_reading
lexical_decisions:
- source_word: χάρις
  english_pob_choice: grace
  chosen_spanish: gracia
  alternatives_spanish:
  - favor
  - benevolencia
  lexicon: BDAG
  rationale: En la bendición paulina, χάρις conserva su peso teológico y suena natural en español como «gracia». «Favor» o «benevolencia» estrechan demasiado el alcance.
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: BDAG
  rationale: «Señor» es la forma cristiana normal para κύριος y corresponde al uso doctrinal del NT, especialmente en una fórmula benedictoria.
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Christ / Jesus Messiah
  chosen_spanish: Jesús Mesías
  alternatives_spanish:
  - Jesucristo
  - Jesús Cristo
  lexicon: BDAG
  rationale: Se conserva el título traducido «Mesías» según la decisión auditable de la POB inglesa para Χριστός cuando funciona con fuerza titular. En español se mantiene el nombre propio «Jesús» separado para claridad.
- source_word: μετὰ
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - entre
  - junto con
  lexicon: BDAG
  rationale: Con genitivo, μετά expresa compañía o presencia; «con» es la equivalencia más natural y fiel en español.
- source_word: πνεύματος
  english_pob_choice: spirit
  chosen_spanish: espíritu
  alternatives_spanish:
  - Espíritu
  lexicon: BDAG
  rationale: La lectura inglesa toma el referente como el espíritu humano de los filipenses, no explícitamente el Espíritu Santo. El español mantiene la minúscula para conservar esa distinción.
- source_word: ὑμῶν
  english_pob_choice: your
  chosen_spanish: vuestro
  alternatives_spanish:
  - su
  - de ustedes
  lexicon: BDAG
  rationale: «Vuestro» preserva bien el plural posesivo del griego. Aunque es más común en algunos registros peninsulares, aquí sigue siendo claro y bíblico en español leído en iglesias.
theological_decisions:
- issue: Cómo traducir Χριστός en la fórmula «κυρίου Ἰησοῦ Χριστοῦ»
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: Se sigue la filosofía documentada de traducir el título cuando sigue funcionando como título, aun en una fórmula casi fija. «Mesías» hace visible el contenido titular de Χριστός sin perder reverencia ni precisión.
  doctrine_reference: 'Contested terms table: Χριστός → ''Messiah'' where title; ''Christ'' where name-like'
- issue: Si πνεύματος debe escribirse con mayúscula por referencia al Espíritu Santo
  english_pob_reading: lowercase 'spirit'
  chosen_spanish_reading: espíritu
  alternative_spanish_readings:
  - Espíritu
  rationale: La evidencia auditada favorece el espíritu humano o la vida interior de los destinatarios. Por eso no se capitaliza, para no imponer una lectura pneumatológica no explicitada por el texto.
  doctrine_reference: BDAG / audit note on πνεύματος as human spirit or inward life
translation_notes:
  revision_awareness: 'El pasaje coincide sustancialmente con el texto griego SBLGNT y con la auditoría inglesa. El único punto de tensión relevante es Χριστοῦ: la POB inglesa opta por «Messiah» como título traducido, mientras que la forma española más habitual sería «Cristo». Se conserva la decisión titulativa por fidelidad al expediente; también se mantiene «espíritu» en minúscula según la lectura auditada del referente humano/interno.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino en la versión española general, pero aquí no aparece el tetragrámaton.
  - Se mantiene «Mesías» como traducción del título Χριστός cuando actúa titularmente, conforme al expediente auditado.
  - «Espíritu» no se capitaliza porque el contexto no exige una referencia explícita al Espíritu Santo.
  - «Vuestro» refleja el plural del griego y es adecuado para un destinatario colectivo.
