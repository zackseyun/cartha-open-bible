    rationale: Aunque semánticamente correcto, «vuestro» no es la opción preferida para español neutral latinoamericano / ampliamente legible en iglesia, que es el objetivo de estilo del proyecto. Conviene reemplazarlo por una forma plural no peninsular.
  - severity: low
