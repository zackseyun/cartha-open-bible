translation:
  language: es
  text: Que su amabilidad[a] sea conocida por todas las personas. El Señor está cerca[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «gentileza», «indulgencia» o «razonabilidad».
    reason: lexical_alternative
  - marker: b
    text: «Está cerca» puede significar que el Señor está presente muy cerca, que su venida está próxima, o ambas cosas.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπιεικές
  english_pob_choice: gentleness
  chosen_spanish: gentileza
  alternatives_spanish:
  - amabilidad
  - mansedumbre
  - clemencia
  lexicon: BDAG
  rationale: ἐπιεικές expresa una cualidad ética de trato considerado, cediendo con otros y libre de dureza. «Gentileza» mantiene esa amplitud en español sin reducirla solo a suavidad emocional. Evita también la lectura jurídica de «clemencia», que sería demasiado estrecha aquí.
- source_word: γνωσθήτω
  english_pob_choice: be known
  chosen_spanish: sea conocida
  alternatives_spanish:
  - sea evidente
  - sea reconocida
  lexicon: BDAG
  rationale: El imperativo pasivo aoristo pide una formulación pasiva natural en español. «Sea conocida» conserva con claridad la idea de hacerse patente ante otros.
- source_word: πᾶσιν ἀνθρώποις
  english_pob_choice: all people
  chosen_spanish: todos los seres humanos
  alternatives_spanish:
  - todas las personas
  - a todos
  lexicon: BDAG
  rationale: La referencia es inclusiva y no masculina específica. «Todos los seres humanos» explicita esa inclusión con un registro sobrio y público; también deja intacta la universalidad del mandato.
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Amo
  - el Maestro
  lexicon: BDAG
  rationale: Se conserva el título teológico habitual en español para κύριος, sin perder el peso reverencial del término.
- source_word: ἐγγύς
  english_pob_choice: near
  chosen_spanish: está cerca
  alternatives_spanish:
  - está próximo
  - está al alcance
  lexicon: BDAG
  rationale: '«Está cerca» preserva la ambigüedad productiva del griego: cercanía en presencia y/o cercanía temporal. No resuelve la frase hacia solo un sentido escatológico.'
theological_decisions:
- issue: Sentido de ὁ κύριος ἐγγύς
  english_pob_reading: The Lord is near
  chosen_spanish_reading: El Señor está cerca
  alternative_spanish_readings:
  - El Señor está cerca de ustedes
  - El Señor viene pronto
  rationale: La frase griega permite tanto cercanía de presencia como proximidad de venida. La redacción española mantiene esa tensión sin estrecharla a una sola interpretación.
  doctrine_reference: Preservar la tensión interpretativa del texto base.
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del audit trail en cuanto a preferir una equivalencia formal y más estándar para ἐπιεικές, pero en español se eligió «gentileza» por ser la opción más natural y fiel al matiz ético del término en este contexto. También se mantuvo la ambigüedad de ὁ κύριος ἐγγύς.
  spanish_consistency_notes:
  - Se evita «SEÑOR» en mayúsculas como convención de sustitución; se usa «el Señor» según el estándar del proyecto en español.
  - Se conserva un registro bíblico moderno y digno, sin caer en arcaismos innecesarios.
  - La expresión inclusiva «todos los seres humanos» evita una lectura masculinizada del plural griego.
  - La nota de cercanía del Señor se mantiene abierta para no cancelar la tensión teológica del original.
