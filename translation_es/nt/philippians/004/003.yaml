base_translation:
  language: en
  yaml_path: translation/nt/philippians/004/003.yaml
  text: Yes[a], I ask you also, true companion, help these women, who contended alongside me in the gospel[b], together with Clement and the rest of my fellow workers, whose names are in the book of life.
