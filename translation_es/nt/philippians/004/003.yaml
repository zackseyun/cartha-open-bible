translation:
  language: es
  text: Sí[a], te ruego también a ti, verdadero compañero, ayuda a estas mujeres, que han luchado junto conmigo en el evangelio[b], junto con Clemente y el resto de mis colaboradores, cuyos nombres están en el libro de la vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «verdadero compañero de yugo»; algunos quizá lo entiendan como un nombre propio, «Syzygus».
    reason: alternative_reading
  - marker: b
    text: O «han contendido junto conmigo» o «han trabajado codo a codo conmigo».
    reason: lexical_alternative
lexical_decisions:
- source_word: ναί
  english_pob_choice: 'Yes'
  chosen_spanish: Sí
  alternatives_spanish:
  - Desde luego
  - Ciertamente
  lexicon: BDAG
  rationale: Recoge la afirmación inicial breve y enfática de Pablo con una respuesta natural en español.
- source_word: ἐρωτῶ
  english_pob_choice: I ask
  chosen_spanish: te ruego
  alternatives_spanish:
  - te pido
  - te suplico
  lexicon: BDAG
  rationale: En este contexto exhortativo, 'ruego' preserva la fuerza personal de la súplica sin volverlo demasiado duro; el complemento con 'te' mantiene la dirección directa del vocativo.
- source_word: γνήσιε σύζυγε
  english_pob_choice: true companion
  chosen_spanish: verdadero compañero
  alternatives_spanish:
  - verdadero yugo-compañero
  - auténtico compañero
  - Syzygus
  lexicon: BDAG
  rationale: Tomo σύζυγος como vocativo descriptivo y no como nombre propio; 'compañero' comunica la relación de colaboración de manera natural en español. 'Verdadero' conserva el matiz de γνήσιος. La imagen literal de 'yugo' se reserva en nota por ser poco natural como texto principal.
- source_word: συλλαμβάνου
  english_pob_choice: help
  chosen_spanish: ayuda
  alternatives_spanish:
  - apoya
  - asiste
  - coopera con
  lexicon: BDAG
  rationale: El imperativo pide apoyo activo. 'Ayuda' es claro y suficientemente fuerte, y evita reducir o exagerar la metáfora verbal.
- source_word: αὐταῖς
  english_pob_choice: these women
  chosen_spanish: a estas mujeres
  alternatives_spanish:
  - a ellas
  lexicon: BDAG
  rationale: El contexto identifica a dos mujeres; el español gana claridad con el sustantivo explícito en lugar del pronombre solamente.
- source_word: συνήθλησάν μοι
  english_pob_choice: contended alongside me
  chosen_spanish: han luchado junto conmigo
  alternatives_spanish:
  - han contendido junto conmigo
  - han competido a mi lado
  lexicon: BDAG
  rationale: '''Luchado'' comunica la idea de esfuerzo compartido con una imagen cercana al griego συναθλέω; ''junto conmigo'' mantiene la asociación personal. ''Contendido'' sería más literal, pero menos natural para el lector común.'
- source_word: ἐν τῷ εὐαγγελίῳ
  english_pob_choice: in the gospel
  chosen_spanish: en el evangelio
  alternatives_spanish:
  - por el evangelio
  - en la obra del evangelio
  lexicon: BDAG
  rationale: Conserva la cercanía sintáctica al griego y la expresión paulina estable sin explicitar más de lo que el texto dice.
- source_word: συνεργῶν
  english_pob_choice: fellow workers
  chosen_spanish: colaboradores
  alternatives_spanish:
  - compañeros de trabajo
  - cooperadores
  - fellow workers
  lexicon: BDAG
  rationale: '''Colaboradores'' es un equivalente transparente para συνεργός en español y suena natural en un registro bíblico moderno; mantiene la idea de cooperación ministerial.'
- source_word: βίβλῳ ζωῆς
  english_pob_choice: book of life
  chosen_spanish: libro de la vida
  alternatives_spanish:
  - libro de vida
  - rollo de la vida
  lexicon: BDAG
  rationale: '''Libro de la vida'' es la forma estable y clara en español para esta expresión bíblica consolidada.'
theological_decisions:
- issue: Sentido de γνήσιε σύζυγε
  english_pob_reading: 'A descriptive address to an unnamed male coworker: "true companion"'
  chosen_spanish_reading: 'Una apelación descriptiva a un colaborador varón no nombrado: "verdadero compañero"'
  alternative_spanish_readings:
  - Un nombre propio, "Syzygus"
  - Una metáfora más literal, "verdadero yugo-compañero"
  rationale: La lectura descriptiva encaja bien con el vocativo y evita introducir un nombre propio sin necesidad textual. Como el griego admite una frase nominal apelativa, el español principal puede comunicar la relación sin forzar una traducción técnica.
  doctrine_reference: Filipenses 4:3; BDAG s.v. σύζυγος, γνήσιος
- issue: Alcance de συνήθλησάν μοι ἐν τῷ εὐαγγελίῳ
  english_pob_reading: '"contended alongside me in the gospel"'
  chosen_spanish_reading: '"han luchado junto conmigo en el evangelio"'
  alternative_spanish_readings:
  - '"han contendido junto conmigo en el evangelio"'
  - '"han trabajado codo a codo conmigo en el evangelio"'
  rationale: Mantengo la idea de combate/esfuerzo compartido del verbo συναθλέω, sin diluirla en mera cooperación laboral. 'En el evangelio' preserva la construcción breve del original y deja abierta la referencia al ámbito de su labor.
  doctrine_reference: Filipenses 1:27; 4:3
translation_notes:
  revision_awareness: El texto español sigue de cerca el consenso del audit trail inglés (lectura descriptiva de σύζυγος, verbo de apoyo activo para συλλαμβάνου, y conservación de la imagen de lucha de συνήθλησάν μοι). No se registran revisiones previas aplicadas en el expediente, y no se introducen cambios doctrinales adicionales.
  spanish_consistency_notes:
  - Se usa 'evangelio' para εὐαγγέλιον de forma consistente con el registro paulino habitual y con la auditoría inglesa.
  - Se evita 'Cristo' porque no aparece en este versículo y no hay razón para introducir terminología ajena al texto.
  - Se mantiene 'libro de la vida' como expresión fija, sin desarrollar la metáfora.
  - '''Colaboradores'' traduce συνεργῶν en un registro bíblico natural, sin desplazar la relación personal implícita en el genitivo ''mis''.'
