revisions:
- from: Sí[a], te ruego también a ti, verdadero compañero, ayuda a estas mujeres, que han luchado junto conmigo en el evangelio[b], con Clemente y los demás de mis colaboradores, cuyos nombres están en el libro de la vida.
  to: Sí[a], te ruego también a ti, verdadero compañero, ayuda a estas mujeres, que han luchado junto conmigo en el evangelio[b], junto con Clemente y el resto de mis colaboradores, cuyos nombres están en el libro de la vida.
  rationale: Se ajusta la frase sobre Clemente y los demás colaboradores para reflejar con precisión la coordinación del griego y mejorar la naturalidad del español. También se pule la nota alternativa de «yokefellow» a una forma más idiomática en español.
