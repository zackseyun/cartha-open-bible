    text: O «verdadero compañero de yugo»; algunos quizá lo entiendan como un nombre propio, «Syzygus».
    reason: alternative_reading
  - marker: b
    text: O «han contendido junto conmigo» o «han trabajado codo a codo conmigo».
    reason: lexical_alternative
  revision_rationale: Se ajusta la frase sobre Clemente y los demás colaboradores para reflejar con precisión la coordinación del griego y mejorar la naturalidad del español. También se pule la nota alternativa de «yokefellow» a una forma más idiomática en español.
