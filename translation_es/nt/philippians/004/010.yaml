base_translation:
  language: en
  yaml_path: translation/nt/philippians/004/010.yaml
  text: I rejoiced greatly in the Lord that now at last you have revived your concern for me[a]; indeed, you were concerned[b], but you lacked opportunity.
  footnotes:
