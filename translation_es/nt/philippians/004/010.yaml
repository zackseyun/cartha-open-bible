    text: Or 'you have revived your concern for me'; literally, 'you have blossomed again' concerning me.
    reason: lexical_alternative
  - marker: b
    text: Or 'you were thinking of me'; the Greek verb can mean to think about, be minded toward, or be concerned for someone.
    reason: lexical_alternative
