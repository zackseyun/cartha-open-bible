translation:
  language: es
  text: Ahora, a nuestro Dios y Padre sea la gloria por los siglos de los siglos[a]. Amén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O más literalmente, «por las edades de las edades».
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y
  - Pero
  lexicon: BDAG
  rationale: Marca una transición conclusiva en un cierre doxológico; «Ahora» conserva el matiz de enlace discursivo sin forzar contraste adversativo.
- source_word: θεῷ καὶ πατρὶ ἡμῶν
  english_pob_choice: our God and Father
  chosen_spanish: al Dios y Padre nuestro
  alternatives_spanish:
  - a nuestro Dios y Padre
  - al Dios, incluso nuestro Padre
  lexicon: BDAG
  rationale: Se entiende como una sola referencia conjunta en estilo español natural; el posesivo final «nuestro» cubre ambos sustantivos sin perder la unidad de la expresión.
- source_word: ἡ δόξα
  english_pob_choice: be the glory
  chosen_spanish: la gloria
  alternatives_spanish:
  - sea la gloria
  - le pertenece la gloria
  lexicon: BDAG
  rationale: El griego es una cláusula nominal sin verbo; en español, en una doxología, puede mantenerse la forma nominal con pausa litúrgica implícita. No se introduce un verbo que no está en el texto griego.
- source_word: εἰς τοὺς αἰῶνας τῶν αἰώνων
  english_pob_choice: forever and ever
  chosen_spanish: por los siglos de los siglos
  alternatives_spanish:
  - por los siglos eternos
  - para siempre y por siempre
  lexicon: BDAG
  rationale: Este modismo expresa duración sin fin; «por los siglos de los siglos» es una equivalencia española estable, elevada y fiel, sin aplanar la fuerza idiomática del griego.
- source_word: ἀμήν
  english_pob_choice: Amen
  chosen_spanish: Amén
  alternatives_spanish:
  - Así sea
  - Verdaderamente
  lexicon: BDAG
  rationale: Se conserva como afirmación litúrgica fija, en su forma transliterada tradicional.
theological_decisions:
- issue: Verbalidad implícita en la doxología griega
  english_pob_reading: be the glory
  chosen_spanish_reading: la gloria
  alternative_spanish_readings:
  - sea la gloria
  - le pertenece la gloria
  rationale: El griego no expresa verbo; en español, la forma nominal mantiene el carácter doxológico sin añadir una cópula interpretativa. La frase sigue funcionando como atribución de gloria a Dios.
  doctrine_reference: Doxología paulina; estructura nominal del griego koiné
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando la nota al pie no anclada. La presente redacción mantiene una equivalencia natural en español y evita introducir marcadores sin referencia en el texto.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y se conserva el orden doxológico natural en español.
  - «Padre» se traduce de forma directa sin añadir explicaciones no presentes en el original.
  - No se usa «SEÑOR» porque el texto griego aquí dice θεῷ, no κύριος.
  - La clausula final se vierte con el modismo reverente español «por los siglos de los siglos» en lugar de una traducción más literal y menos idiomática.
