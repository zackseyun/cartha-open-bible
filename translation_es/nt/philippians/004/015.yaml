review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: conocimiento de los filipenses, referencia al inicio del evangelio, salida de Macedonia, exclusividad de su apoyo y la expresión idiomática sobre dar y recibir. Sin embargo, dos giros del español principal no preservan con suficiente naturalidad y precisión la fuerza del original/POB: «participó conmigo» suena menos idiomático que «compartió conmigo» en este contexto de apoyo material, y «en asunto de dar y recibir» omite el artículo y resulta poco natural frente a la construcción más fiel «en el asunto de dar y recibir».'
  spanish_quality_summary: La redacción es mayormente clara y digna, pero tiene pequeñas asperezas idiomáticas. «Y ustedes mismos también saben» es aceptable, aunque algo cargado; no requiere cambio. «En asunto de dar y recibir» sí suena antinatural en español general. «Excepto ustedes solos» es comprensible, pero con el resto del versículo funciona mejor si se conserva y se ajusta solo lo necesario. También conviene capitalizar el vocativo como «Filipenses» tras la coma inicial.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Evangelio», «iglesia» y el tratamiento de κοινωνέω encajan con las decisiones documentadas. La nota alternativa sobre sentido contable debe mantenerse. El ajuste principal es estilístico-lexical dentro del rango ya documentado por el inglés POB.
  issues:
  - severity: medium
    issue: «participó conmigo» para ἐκοινώνησεν
    rationale: Aunque posible, en este contexto de apoyo económico/comunitario suena menos idiomático que «compartió conmigo» y comunica peor la idea de involucramiento tangible que el inglés POB fijó como «shared with me».
  - severity: medium
    issue: «en asunto de dar y recibir» carece de naturalidad
    rationale: La omisión del artículo produce una frase extraña en español. «En el asunto de dar y recibir» conserva mejor la función de εἰς λόγον y la decisión lexical del POB.
  - severity: low
    issue: Vocativo «filipenses» en minúscula
    rationale: Como apelativo directo tras coma inicial, «Filipenses» se lee mejor con mayúscula en este contexto editorial.
  revised_spanish_text: Y ustedes mismos también saben[a], Filipenses, que al comienzo del evangelio, cuando salí de Macedonia, ninguna iglesia compartió conmigo en el asunto de dar y recibir, excepto ustedes solos.
  revised_footnotes:
  - marker: a
    text: O «en la cuenta de dar y recibir».
    reason: lexical_alternative
  revision_rationale: 'Se hicieron correcciones menores para mejorar fidelidad idiomática al griego y alineación con el inglés POB: «compartió conmigo» representa mejor ἐκοινώνησεν en contexto de apoyo material; «en el asunto de dar y recibir» corrige una construcción poco natural; y «Filipenses» se capitaliza como vocativo. No hay cambio doctrinal ni necesidad de adjudicación adicional.'
