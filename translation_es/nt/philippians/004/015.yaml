translation:
  language: es
  text: Y ustedes mismos también saben[a], Filipenses, que al comienzo del evangelio, cuando salí de Macedonia, ninguna iglesia compartió conmigo en el asunto de dar y recibir, excepto ustedes solos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en la cuenta de dar y recibir».
    reason: lexical_alternative
lexical_decisions:
- source_word: Οἴδατε
  english_pob_choice: you ... know
  chosen_spanish: saben
  alternatives_spanish:
  - han sabido
  - están enterados
  lexicon: BDAG
  rationale: Οἴδατε expresa un estado de conocimiento; en español, «saben» comunica de forma natural ese valor estativo sin forzar un perfecto perifrástico.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora
  - Pero
  lexicon: BDAG
  rationale: Aquí δέ avanza el discurso sin contraste fuerte; «Y» conserva la conexión discursiva de manera natural en español.
- source_word: καὶ ὑμεῖς
  english_pob_choice: you yourselves also
  chosen_spanish: ustedes mismos también
  alternatives_spanish:
  - ustedes también
  - ustedes mismos
  lexicon: BDAG
  rationale: Se preserva tanto la adición de καί como el énfasis del pronombre personal, que en español se expresa con «ustedes mismos también».
- source_word: Φιλιππήσιοι
  english_pob_choice: Philippians
  chosen_spanish: filipenses
  alternatives_spanish:
  - habitantes de Filipos
  - filipenses, ustedes
  lexicon: BDAG
  rationale: El vocativo se vierte con la designación epistolar habitual y entendible en español, manteniendo el tono directo de la carta.
- source_word: ἐν ἀρχῇ τοῦ εὐαγγελίου
  english_pob_choice: at the beginning of the gospel
  chosen_spanish: al comienzo del evangelio
  alternatives_spanish:
  - en el comienzo del evangelio
  - al principio del evangelio
  lexicon: BDAG
  rationale: «Al comienzo» preserva la referencia temporal de la frase sin añadir interpretación; «evangelio» mantiene la correspondencia establecida por POB para εὐαγγέλιον.
- source_word: ἐξῆλθον ἀπὸ Μακεδονίας
  english_pob_choice: I departed from Macedonia
  chosen_spanish: salí de Macedonia
  alternatives_spanish:
  - partí de Macedonia
  - me fui de Macedonia
  lexicon: BDAG
  rationale: El aoristo se traduce como salida puntual y natural en español. «Salí» conserva la acción sin sobrerrepresentar el matiz formal de «departed».
- source_word: οὐδεμία ... ἐκκλησία
  english_pob_choice: no church
  chosen_spanish: ninguna iglesia
  alternatives_spanish:
  - ninguna congregación
  - no hubo iglesia
  lexicon: BDAG
  rationale: «Iglesia» reproduce el valor institucional/comunitario de ἐκκλησία en contexto paulino y mantiene la negación enfática de οὐδεμία.
- source_word: ἐκοινώνησεν
  english_pob_choice: shared with me
  chosen_spanish: participó conmigo
  alternatives_spanish:
  - compartió conmigo
  - tuvo comunión conmigo
  lexicon: BDAG
  rationale: κοινωνέω aquí expresa participación concreta en apoyo; «participó conmigo» conserva la idea de colaboración real sin restringirla a un tecnicismo comercial.
- source_word: εἰς λόγον δόσεως καὶ λήμψεως
  english_pob_choice: in the matter of giving and receiving
  chosen_spanish: en asunto de dar y recibir
  alternatives_spanish:
  - en la cuenta de dar y recibir
  - en el asunto de dar y recibir
  lexicon: BDAG
  rationale: La frase idiomática se vierte de manera clara y fiel para lectores actuales. «Asunto» reproduce el sentido general de relación/participación, y la alternativa contable queda reflejada en la nota.
- source_word: εἰ μὴ ὑμεῖς μόνοι
  english_pob_choice: except you alone
  chosen_spanish: excepto ustedes solos
  alternatives_spanish:
  - salvo ustedes solos
  - excepto ustedes únicamente
  lexicon: BDAG
  rationale: «Solo(s)» preserva la exclusividad enfática del griego y suena natural en español; «ustedes» mantiene el plural explícito.
theological_decisions:
- issue: Naturaleza de la participación de la iglesia en el apoyo a Pablo
  english_pob_reading: shared with me in the matter of giving and receiving
  chosen_spanish_reading: participó conmigo en asunto de dar y recibir
  alternative_spanish_readings:
  - compartió conmigo en la cuenta de dar y recibir
  - tuvo comunión conmigo en el asunto de dar y recibir
  rationale: Se conserva la idea de apoyo mutuo concreto sin convertir el texto en un lenguaje exclusivamente contable o en una fórmula eclesiástica más cargada de tradición. La redacción deja visible la reciprocidad económica y relacional del pasaje.
  doctrine_reference: Filipenses 4:15; uso paulino de κοινωνέω en contexto de apoyo material
- issue: Alcance de εἰς λόγον δόσεως καὶ λήμψεως
  english_pob_reading: in the matter of giving and receiving
  chosen_spanish_reading: en asunto de dar y recibir
  alternative_spanish_readings:
  - en la cuenta de dar y recibir
  - en el balance de dar y recibir
  rationale: Se evita imponer una sola lectura técnica en el texto principal. La frase principal comunica la relación de intercambio solidario; la posibilidad contable queda reconocida como alternativa legítima.
  doctrine_reference: Filipenses 4:15; correspondencia financiera/comunitaria en el corpus paulino
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; por eso se mantiene la estructura semántica del texto inglés auditado, corrigiendo solo la anclación de la nota para que aparezca explícitamente en el versículo.
  spanish_consistency_notes:
  - Se conserva «evangelio» para εὐαγγέλιον, conforme a la terminología POB y al uso natural en español.
  - Se usa «iglesia» para ἐκκλησία por el sentido comunitario paulino.
  - Se traduce κοινωνέω con «participó conmigo» para mantener la idea de colaboración concreta sin reducir el término a una sola dimensión financiera.
  - La nota [a] queda anclada en «dar y recibir», que es el lugar natural donde surge la alternativa lexical en español.
