translation:
  language: es
  text: Cada uno[a] debe mirar no solo por sus propios intereses, sino también por los intereses de los demás.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Cada uno mirando no a sus propias cosas, sino también a las cosas de los demás».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἕκαστοι
  english_pob_choice: Each of you
  chosen_spanish: Cada uno
  alternatives_spanish:
  - Cada uno de ustedes
  - Cada cual
  lexicon: BDAG
  rationale: ἕκαστοι es distributivo y se dirige a los creyentes individualmente dentro del grupo. «Cada uno» conserva esa fuerza sin forzar una expresión demasiado pesada en español.
- source_word: σκοποῦντες
  english_pob_choice: should look to
  chosen_spanish: debe velar
  alternatives_spanish:
  - debe mirar por
  - debe fijarse en
  - debe poner atención en
  lexicon: BDAG
  rationale: σκοπέω aquí implica dirigir la atención y el cuidado hacia algo. «Velar» comunica vigilancia y consideración práctica, y funciona con naturalidad en este contexto exhortativo.
- source_word: τὰ ἑαυτῶν
  english_pob_choice: your own interests
  chosen_spanish: lo suyo propio
  alternatives_spanish:
  - sus propios intereses
  - sus cosas propias
  - lo que les pertenece
  lexicon: BDAG
  rationale: La frase griega es más amplia que «posesiones»; puede abarcar intereses, asuntos o lo que compete a uno. «Lo suyo propio» mantiene esa amplitud sin imponer una sola especificación.
- source_word: ἀλλὰ καὶ
  english_pob_choice: not only ... but also
  chosen_spanish: sino también
  alternatives_spanish:
  - pero también
  - no solo ... sino también
  lexicon: BDAG
  rationale: En español, «no por lo suyo propio, sino también por lo de los demás» reproduce con naturalidad la combinación de contraste y adición del griego.
- source_word: τὰ ἑτέρων
  english_pob_choice: the interests of others
  chosen_spanish: lo de los demás
  alternatives_spanish:
  - los intereses de los demás
  - las cosas de los demás
  - lo ajeno
  lexicon: BDAG
  rationale: Como τὰ ἑαυτῶν, la expresión es amplia. «Lo de los demás» conserva la generalidad de asuntos, bienestar o intereses sin estrechar el sentido.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés coinciden en un sentido exhortativo y distributivo; no se observaron cambios textuales ni decisiones revisadas que alteren la traducción base.
  spanish_consistency_notes:
  - Se evitó «Cristo»/«Mesías» porque el versículo no contiene ese término.
  - Se mantuvo un registro amplio con «lo suyo propio» y «lo de los demás» para no restringir innecesariamente τὰ ἑαυτῶν y τὰ ἑτέρων a meros bienes materiales.
  - La nota a conserva la alternativa más literal que el POB inglés documenta, adaptada al español natural.
