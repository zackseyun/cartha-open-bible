review_pass:
  verdict: revise
  source_alignment_summary: El borrador capta bien la exhortación distributiva de ἕκαστοι y el contraste ἀλλὰ καὶ, y preserva adecuadamente la alternativa más literal en nota. Sin embargo, «velar por» tiende a enfatizar vigilancia/protección más que dirigir la atención o consideración, y «lo suyo propio / lo de los demás» suena menos natural y algo impreciso en español eclesial moderno para el sentido contextual de intereses/asuntos.
  spanish_quality_summary: La frase es comprensible, pero «Cada uno debe velar» queda algo rígida y singulariza el verbo tras un sujeto distributivo de forma menos idiomática que «Cada uno ... mire». Además, «lo suyo propio» es pesado y poco elegante; «sus propios intereses» y «los intereses de los demás» expresan mejor el sentido contextual y leen con más naturalidad.
  glossary_alignment: No hay términos del glosario principal directamente implicados. La revisión sigue la decisión documentada del POB para τὰ ἑαυτῶν / τὰ ἑτέρων como «interests» en contexto, en vez de mantener una formulación española demasiado amplia que debilita la claridad contextual.
  issues:
  - severity: medium
    issue: «velar» no refleja con suficiente precisión σκοποῦντες en este contexto
    rationale: σκοπέω aquí significa dirigir la atención o consideración hacia algo. «Velar por» en español suele sugerir cuidar o proteger vigilando, lo cual desplaza el matiz de atención considerada que el POB documentó con «look to».
  - severity: medium
    issue: «lo suyo propio / lo de los demás» suena poco natural y menos claro
    rationale: Aunque intenta conservar amplitud semántica, en contexto Pablo contrasta los propios intereses con los de otros. La expresión actual resulta torpe y puede leerse como pertenencias o asuntos vagos, en vez de preocupaciones/intereses en sentido ético comunitario.
  - severity: low
    issue: La estructura española no explicita tan bien el patrón «no solo ... sino también»
    rationale: El borrador comunica el contraste, pero una formulación con «no solo ... sino también» refleja más claramente ἀλλὰ καὶ y mejora la fluidez exhortativa.
  revised_spanish_text: Cada uno[a] debe mirar no solo por sus propios intereses, sino también por los intereses de los demás.
  revised_footnotes:
  - marker: a
    text: 'O, más literalmente: «Cada uno mirando no a sus propias cosas, sino también a las cosas de los demás».'
    reason: lexical_alternative
  revision_rationale: Se ajusta σκοποῦντες a «mirar por», que en español comunica mejor la idea de atender o tener en consideración. Se reemplaza «lo suyo propio / lo de los demás» por «sus propios intereses / los intereses de los demás» para seguir la decisión contextual del POB y mejorar la naturalidad. También se explicita «no solo ... sino también» para reflejar con mayor fidelidad ἀλλὰ καὶ.
