revisions:
- from: Cada uno[a] debe velar, no por lo suyo propio, sino también por lo de los demás.
  to: Cada uno[a] debe mirar no solo por sus propios intereses, sino también por los intereses de los demás.
  rationale: Se ajusta σκοποῦντες a «mirar por», que en español comunica mejor la idea de atender o tener en consideración. Se reemplaza «lo suyo propio / lo de los demás» por «sus propios intereses / los intereses de los demás» para seguir la decisión contextual del POB y mejorar la naturalidad. También se explicita «no solo ... sino también» para reflejar con mayor fidelidad ἀλλὰ καὶ.
