translation:
  language: es
  text: completen mi gozo[a], para que piensen lo mismo, teniendo el mismo amor, unidos en alma[b][c], pensando una sola cosa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «colmen mi gozo»; también, «hagan pleno mi gozo».
    reason: lexical_alternative
  - marker: b
    text: O «de una sola alma»; alternativamente, «unidos en espíritu».
    reason: lexical_alternative
  - marker: c
    text: O «pensando en un solo propósito».
    reason: lexical_alternative
lexical_decisions:
- source_word: πληρώσατέ
  english_pob_choice: complete
  chosen_spanish: completen
  alternatives_spanish:
  - llenan
  - hagan pleno
  - colmén
  lexicon: BDAG
  rationale: El imperativo aoristo pide llevar el gozo de Pablo a su plenitud. «Completen» comunica bien la idea de plenitud sin perder la fuerza exhortativa del mandato.
- source_word: μου τὴν χαρὰν
  english_pob_choice: my joy
  chosen_spanish: mi gozo
  alternatives_spanish:
  - mi alegría
  - el gozo que tengo
  - mi deleite
  lexicon: BDAG
  rationale: «Gozo» conserva mejor el registro bíblico y la relación afectiva del posesivo en español; «mi alegría» sería posible, pero suena más cotidiano y menos preciso en este contexto paulino.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  - que
  lexicon: BDAG
  rationale: Aquí introduce el propósito o resultado buscado por el mandato; «para que» es la forma natural en español para ese valor final.
- source_word: τὸ αὐτὸ φρονῆτε
  english_pob_choice: you may think the same way
  chosen_spanish: piensen lo mismo
  alternatives_spanish:
  - tengan el mismo modo de pensar
  - estén de acuerdo
  - piensen de la misma manera
  lexicon: BDAG
  rationale: φρονέω en Filipenses suele apuntar al modo de pensar o actitud compartida. «Piensen lo mismo» mantiene la repetición retórica del pasaje y evita reducirlo a mera uniformidad externa.
- source_word: τὴν αὐτὴν ἀγάπην ἔχοντες
  english_pob_choice: having the same love
  chosen_spanish: teniendo el mismo amor
  alternatives_spanish:
  - compartiendo el mismo amor
  - manteniendo el mismo amor
  lexicon: BDAG
  rationale: Se conserva la estructura participial con una traducción transparente. «Amor» sigue el valor normal de ἀγάπη en el proyecto y en Pablo.
- source_word: σύμψυχοι
  english_pob_choice: being united in soul
  chosen_spanish: siendo unidos en alma
  alternatives_spanish:
  - siendo de una misma alma
  - uniendo el alma
  - siendo de una sola alma
  lexicon: BDAG
  rationale: La imagen es fuerte y relativamente rara. «Unidos en alma» preserva el contenido literal sin forzar una paráfrasis más abstracta; el participio «siendo» refleja la forma gramatical griega.
- source_word: τὸ ἓν φρονοῦντες
  english_pob_choice: thinking one thing
  chosen_spanish: pensando una sola cosa
  alternatives_spanish:
  - pensando en una sola cosa
  - teniendo un solo propósito
  - pensando en lo mismo
  lexicon: BDAG
  rationale: La frase intensifica la llamada a la unidad y repite φρονέω. «Una sola cosa» permite una traducción cercana al griego sin convertirla en un eslogan interpretativo.
theological_decisions:
- issue: Cómo reflejar la repetición de φρονέω sin imponer una uniformidad doctrinal excesiva
  english_pob_reading: Use 'think the same way' and 'thinking one thing' to preserve the repeated lexical pattern without flattening it into a single English idiom.
  chosen_spanish_reading: Usar «piensen lo mismo» y «pensando una sola cosa» para conservar el patrón repetido de φρονέω sin convertirlo en una exigencia de uniformidad institucional absoluta.
  alternative_spanish_readings:
  - sean de un mismo parecer ... de un solo parecer
  - tengan la misma mente ... concentrados en un solo propósito
  rationale: El versículo construye la unidad mediante repetición y variación. La traducción debe mantener esa tensión retórica y pastoral, no resolverla a una sola formulación doctrinal rígida.
  doctrine_reference: Conservar la tensión teológica y retórica del texto; consistencia de términos clave, o excepción documentada.
- issue: Valor de σύμψυχοι entre unidad interior y metáfora del alma
  english_pob_reading: Or 'of one soul'; alternatively, 'one in spirit.'
  chosen_spanish_reading: «siendo unidos en alma» conserva la imagen interior de una vida compartida, sin sustituirla por una explicación doctrinal más amplia.
  alternative_spanish_readings:
  - de una sola alma
  - unidos en espíritu
  - de un mismo sentir interior
  rationale: «Alma» mantiene el vocabulario metafórico y permite al lector percibir la fuerza de la imagen. «Espíritu» podría sonar más teológicamente cargado y menos literal en este contexto.
  doctrine_reference: Mantener el campo semántico de la imagen; no colapsar alma y Espíritu Santo sin evidencia contextual.
translation_notes:
  revision_awareness: La redacción sigue de cerca la última revisión inglesa, especialmente la estructura participial reforzada con «siendo» antes de la unidad interior. También conserva la repetición de φρονέω en dos expresiones distintas para reflejar el patrón retórico del griego y el auditable enfoque de la POB.
  spanish_consistency_notes:
  - Se mantiene «gozo» para χαρά en coherencia con el tono paulino y con el valor de alegría gozosa, no meramente emocional.
  - Se usa «amor» para ἀγάπη según el estándar del proyecto.
  - Se preserva el paralelismo de los cuatro miembros del versículo con verbos principales y participios.
  - «Alma» se deja sin sustituir por «espíritu» en el texto principal para no borrar la metáfora explícita del griego.
