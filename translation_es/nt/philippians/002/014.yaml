translation:
  language: es
  text: Hagan todo sin murmuraciones ni discusiones[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sin murmuraciones ni disputas».
    reason: lexical_alternative
  - marker: b
    text: «Discusiones» también puede entenderse como «cuestionamientos» en algunos contextos, aunque aquí el sentido probablemente apunta a disputas contenciosas.
    reason: lexical_alternative
lexical_decisions:
- source_word: Πάντα
  english_pob_choice: Do everything
  chosen_spanish: Hagan todo
  alternatives_spanish:
  - Hagan todas las cosas
  - Hagan todo lo que hagan
  lexicon: BDAG
  rationale: El acusativo plural de πᾶς expresa alcance total. En español, «Hagan todo» comunica esa amplitud de forma natural y directa sin añadir elementos ajenos al griego.
- source_word: ποιεῖτε
  english_pob_choice: Do
  chosen_spanish: Hagan
  alternatives_spanish:
  - Sigan haciendo
  - Realicen
  lexicon: BDAG
  rationale: El imperativo presente conserva fuerza exhortativa continua. «Hagan» funciona con naturalidad en español y mantiene el carácter de mandato práctico.
- source_word: χωρὶς
  english_pob_choice: without
  chosen_spanish: sin
  alternatives_spanish:
  - apartados de
  - fuera de
  lexicon: BDAG
  rationale: «Sin» es el equivalente más claro y normal en español para esta construcción, manteniendo la relación de exclusión exigida por el griego.
- source_word: γογγυσμῶν
  english_pob_choice: grumbling
  chosen_spanish: murmurar
  alternatives_spanish:
  - quejas
  - refunfuños
  - murmuraciones
  lexicon: BDAG
  rationale: γογγυσμός denota protesta o queja murmurada. «Murmurar» conserva el matiz de queja baja o subrepticia y evita el tono demasiado débil de «quejarse» en este contexto.
- source_word: διαλογισμῶν
  english_pob_choice: arguing
  chosen_spanish: discutir
  alternatives_spanish:
  - contender
  - pelear
  - disputar
  lexicon: BDAG
  rationale: Aquí διαλογισμός apunta a un intercambio contencioso, no solo a razonamiento interno. «Discutir» comunica bien la idea de disputa verbal entre personas en español contemporáneo.
translation_notes:
  revision_awareness: El texto griego es breve y directo; la versión española mantiene el mandato universal y la doble prohibición con un registro natural, sin suavizar el valor exhortativo ni convertir los sustantivos de queja/disputa en lenguaje más abstracto.
  spanish_consistency_notes:
  - Se mantiene «sin» para χωρὶς, en línea con su valor preposicional de exclusión.
  - Se traduce γογγυσμῶν con un verbo nominalizado en español («murmurar») para conservar el matiz de queja murmurada sin forzar un sustantivo poco idiomático.
  - Se traduce διαλογισμῶν como «discutir» por la fuerza interpersonal del contexto; no se opta por «razonar» o «cuestionar» como sentido principal porque aquí el inglés POB también privilegia la disputa contenciosa.
