review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura causal y el sentido general del griego: ἐπειδὴ introduce la razón, ἐπιποθῶν ἦν expresa un estado continuo en pasado, πάντας ὑμᾶς conserva el énfasis en la totalidad del grupo, y ἀδημονῶν comunica aflicción intensa. También preserva correctamente la nota alternativa sobre la posible lectura implícita de oír/que habían oído.'
  spanish_quality_summary: 'El español es claro y digno, pero dos giros suenan menos naturales de lo ideal: “tenía anhelo por” es algo forzado en español bíblico natural, y “todos ustedes” sin preposición tras un verbo de anhelo queda menos idiomático. “Anhelaba verlos a todos” o “anhelaba a todos ustedes” suena mejor. Además, el pluscuamperfecto “habían oído” no es necesario y endurece la frase; el aoristo se puede expresar naturalmente con “oyeron” sin perder el sentido.'
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. No aparecen Yahvé, Mesías/Cristo ni otros términos del glosario sensible. La elección de “angustiado” es aceptable para ἀδημονῶν, aunque “muy afligido” también sería posible.
  issues:
  - severity: medium
    issue: “tenía anhelo por todos ustedes” suena poco idiomático
    rationale: Aunque intenta reflejar el valor durativo de ἐπιποθῶν ἦν, en español natural este giro resulta rígido. “anhelaba verlos a todos” o “anhelaba a todos ustedes” comunica mejor el afecto continuo.
  - severity: low
    issue: Uso de pluscuamperfecto en “ustedes habían oído”
    rationale: El griego tiene aoristo simple ἠκούσατε. En español, “oyeron” o “supieron” basta y suena más directo; el pluscuamperfecto añade una capa temporal no exigida por el texto.
  - severity: low
    issue: Pronombre explícito “él” en “que él estaba enfermo”
    rationale: No es incorrecto, pero es innecesario en español porque el referente es claro por contexto. Una formulación más fluida evita sobreexplicación.
  revised_spanish_text: puesto que anhelaba verlos a todos y estaba profundamente angustiado porque oyeron que estaba enfermo[a].
  revised_footnotes:
