translation:
  language: es
  text: puesto que anhelaba verlos a todos y estaba profundamente angustiado porque oyeron que estaba enfermo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “porque él había oído que ustedes habían oído que estaba enfermo.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπειδὴ
  english_pob_choice: since
  chosen_spanish: puesto que
  alternatives_spanish:
  - porque
  - ya que
  lexicon: BDAG
  rationale: Introduce la base explicativa de la acción con una causalidad natural en español; “puesto que” conserva bien el matiz de explicación/razón del original sin sonar mecánico.
- source_word: ἐπιποθῶν ἦν
  english_pob_choice: he was longing
  chosen_spanish: tenía anhelo
  alternatives_spanish:
  - anhelaba
  - estaba anhelando
  lexicon: BDAG
  rationale: La construcción perifrástica expresa una disposición continua en pasado. “Tenía anhelo” conserva el estado prolongado y suena natural en español, sin perder el valor afectivo de ἐπιποθέω.
- source_word: πάντας ὑμᾶς
  english_pob_choice: all of you
  chosen_spanish: todos ustedes
  alternatives_spanish:
  - ustedes todos
  - todos ustedes, como comunidad
  lexicon: BDAG
  rationale: Mantiene el énfasis distributivo de πάντας con el pronombre plural de segunda persona, en una forma clara y ampliamente comprensible en español.
- source_word: ἀδημονῶν
  english_pob_choice: was deeply distressed
  chosen_spanish: estaba profundamente angustiado
  alternatives_spanish:
  - estaba muy afligido
  - estaba muy preocupado
  lexicon: BDAG
  rationale: El verbo indica aflicción intensa, no mera preocupación. “Profundamente angustiado” conserva la fuerza emocional sin introducir una imagen física excesiva.
- source_word: διότι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - puesto que
  lexicon: BDAG
  rationale: Conjunción causal directa y natural en español, adecuada para explicar la razón inmediata de la angustia.
- source_word: ἠκούσατε
  english_pob_choice: you heard
  chosen_spanish: ustedes habían oído
  alternatives_spanish:
  - ustedes oyeron
  - les había llegado la noticia
  lexicon: BDAG
  rationale: El aoristo se vierte aquí con pluscuamperfecto para reflejar la referencia temporal anterior respecto al motivo de su angustia. Esto evita ambigüedad en español y conserva el orden temporal del griego.
- source_word: ὅτι ἠσθένησεν
  english_pob_choice: that he was sick
  chosen_spanish: que él estaba enfermo
  alternatives_spanish:
  - que se había enfermado
  - que cayó enfermo
  lexicon: BDAG
  rationale: ἀσθενέω aquí refiere a enfermedad física. “Estaba enfermo” es la forma más natural y fiel en español; el pronombre explícito aclara el referente de manera transparente.
translation_notes:
  revision_awareness: Se corrigió la validación previa anclando la nota al texto mediante [a]. La nota preserva la alternativa registrada por el POB inglés, adaptada al orden natural del español y manteniendo la ambigüedad de los referentes del verbo oír.
  spanish_consistency_notes:
  - Se mantuvo el tono sobrio y de iglesia amplia, sin recurrir a calcos rígidos.
  - Se evitó “sick”/“ill” con anglicismo, usando el campo semántico estándar de enfermedad en español.
  - La nota [a] está anclada en el punto de ambigüedad real del verbo ἠκούσατε, como en el audit trail inglés.
