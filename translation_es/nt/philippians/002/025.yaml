review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: Pablo juzga necesario enviar a Epafrodito y lo describe con cinco designaciones. Sin embargo, hay dos puntos a reparar para ajustarse mejor al audit trail inglés y al griego: (1) λειτουργὸν se documentó en inglés como ''minister'', con nota alternativa ''servant''; el español principal ''servidor'' invierte esa prioridad léxica y debilita el matiz más digno del término. (2) τῆς χρείας μου se expresa con más naturalidad y fidelidad como ''a mi necesidad'' o mejor ''para atender mi necesidad'' que ''para mi necesidad'', que suena poco idiomático. También conviene añadir la nota alternativa para ἀπόστολον (''apóstol''), preservando la alternativa significativa del inglés.'
  spanish_quality_summary: El español es claro y ampliamente legible, pero 'compañero de milicia' suena algo rígido y menos natural que 'compañero de armas' o 'compañero de lucha'; aun así, es defendible por dignidad y metáfora militar. La frase final 'servidor para mi necesidad' resulta poco natural. Una leve reestructuración mejora fluidez sin apartarse del original.
  glossary_alignment: No hay conflicto con los términos doctrinales globales. 'Enviado' para ἀπόστολον concuerda con la decisión contextual de no usar el sentido técnico de 'apóstol', pero debe conservarse la alternativa en nota. Para λειτουργὸν, conviene alinear el texto principal con 'ministro' y dejar 'servidor' como alternativa explicativa, siguiendo la auditoría inglesa.
  issues:
  - severity: medium
    issue: λειτουργὸν está vertido como 'servidor' en el texto principal
    rationale: La POB inglesa eligió 'minister' como término principal y reservó 'servant' como alternativa. En español, 'ministro' preserva mejor la dignidad del servicio sin imponer necesariamente un cargo eclesiástico, especialmente si se aclara en nota.
  - severity: medium
    issue: Falta una nota para la alternativa de ἀπόστολον
    rationale: El audit trail inglés conserva explícitamente la alternativa 'apostle'. Dado que 'enviado' es la lectura principal en español, debe preservarse la alternativa significativa 'apóstol' en nota.
  - severity: low
    issue: La expresión 'para mi necesidad' suena poco idiomática
    rationale: Aunque intenta reflejar τῆς χρείας μου, en español bíblico natural funciona mejor 'para atender mi necesidad' o 'en ayuda de mi necesidad', sin perder el sentido práctico.
  revised_spanish_text: Pero consideré necesario enviarles a Epafrodito, mi hermano, colaborador y compañero de milicia, y enviado[a] de parte de ustedes y ministro[b] para atender mi necesidad.
  revised_footnotes:
  - marker: a
    text: O «apóstol», es decir, uno enviado por ustedes.
    reason: alternative_reading
  - marker: b
    text: O «servidor de mi necesidad». Aquí el término expresa a alguien que presta un servicio para una necesidad concreta, no necesariamente un cargo eclesiástico.
    reason: lexical_alternative
  revision_rationale: 'Se ajusta el texto principal para seguir más de cerca las decisiones léxicas documentadas por la POB inglesa: ''ministro'' como equivalente principal de λειτουργός, con ''servidor'' relegado a nota; se añade la alternativa ''apóstol'' para ἀπόστολον; y se mejora la naturalidad de la frase final con ''para atender mi necesidad''.'
