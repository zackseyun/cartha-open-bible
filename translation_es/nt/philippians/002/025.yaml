revisions:
- from: Pero consideré necesario enviarles a Epafrodito, mi hermano, colaborador y compañero de milicia, y enviado de parte de ustedes y servidor[a] para mi necesidad.
  to: Pero consideré necesario enviarles a Epafrodito, mi hermano, colaborador y compañero de milicia, y enviado[a] de parte de ustedes y ministro[b] para atender mi necesidad.
  rationale: 'Se ajusta el texto principal para seguir más de cerca las decisiones léxicas documentadas por la POB inglesa: ''ministro'' como equivalente principal de λειτουργός, con ''servidor'' relegado a nota; se añade la alternativa ''apóstol'' para ἀπόστολον; y se mejora la naturalidad de la frase final con ''para atender mi necesidad''.'
  reviewer_model: gpt-5.4
