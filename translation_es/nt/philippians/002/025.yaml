translation:
  language: es
  text: Pero consideré necesario enviarles a Epafrodito, mi hermano, colaborador y compañero de milicia, y enviado[a] de parte de ustedes y ministro[b] para atender mi necesidad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «apóstol», es decir, uno enviado por ustedes.
    reason: alternative_reading
  - marker: b
    text: O «servidor de mi necesidad». Aquí el término expresa a alguien que presta un servicio para una necesidad concreta, no necesariamente un cargo eclesiástico.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀναγκαῖον
  english_pob_choice: necessary
  chosen_spanish: necesario
  alternatives_spanish:
  - indispensable
  - obligatorio
  lexicon: BDAG
  rationale: Conserva la idea de conveniencia o necesidad evaluada por Pablo sin endurecerla más allá del griego.
- source_word: ἡγησάμην
  english_pob_choice: I considered
  chosen_spanish: consideré
  alternatives_spanish:
  - juzgué
  - estimé
  lexicon: BDAG
  rationale: El aoristo medio expresa la valoración personal de Pablo; «consideré» reproduce bien esa decisión reflexiva en español.
- source_word: πέμψαι
  english_pob_choice: to send
  chosen_spanish: enviar
  alternatives_spanish:
  - mandar
  - remitir
  lexicon: BDAG
  rationale: El infinitivo simplemente indica la acción de enviar; «enviar» es la opción más natural y fiel sin añadir la idea de retorno.
- source_word: ἀδελφὸν
  english_pob_choice: brother
  chosen_spanish: hermano
  alternatives_spanish:
  - hermano en la fe
  lexicon: BDAG
  rationale: Mantiene el parentesco espiritual con la misma sobriedad del griego, sin explicitar más de lo que el texto dice.
- source_word: συνεργὸν
  english_pob_choice: fellow worker
  chosen_spanish: colaborador
  alternatives_spanish:
  - cooperador
  - compañero de trabajo
  lexicon: BDAG
  rationale: «Colaborador» comunica bien la labor compartida y resulta idiomático en español bíblico contemporáneo.
- source_word: συστρατιώτην
  english_pob_choice: fellow soldier
  chosen_spanish: compañero de milicia
  alternatives_spanish:
  - compañero de armas
  - camarada de armas
  lexicon: BDAG
  rationale: Conserva la metáfora militar. En español, «compañero de milicia» suena digno y reconocible, aunque algo más formal que «compañero de armas».
- source_word: ἀπόστολον
  english_pob_choice: messenger
  chosen_spanish: enviado
  alternatives_spanish:
  - mensajero
  - apóstol
  lexicon: BDAG
  rationale: 'Sigue la lectura contextual de la POB inglesa: no el oficio técnico de apóstol, sino uno enviado por la iglesia de Filipos. «Enviado» preserva el matiz sin sobrecargar el cargo.'
- source_word: λειτουργὸν
  english_pob_choice: minister
  chosen_spanish: servidor
  alternatives_spanish:
  - ministro
  - siervo
  lexicon: BDAG
  rationale: Aunque el inglés usa «minister», en español «servidor» evita la asociación automática con un cargo eclesiástico moderno y mantiene la idea de servicio práctico.
- source_word: τῆς χρείας μου
  english_pob_choice: to my need
  chosen_spanish: para mi necesidad
  alternatives_spanish:
  - en mi necesidad
  - a mi necesidad
  lexicon: BDAG
  rationale: La frase genitiva expresa el ámbito de la ayuda prestada a Pablo; «para mi necesidad» conserva la finalidad práctica del servicio.
theological_decisions:
- issue: 'Sentido de ἀπόστολον: cargo apostólico técnico vs. representante enviado'
  english_pob_reading: messenger
  chosen_spanish_reading: enviado
  alternative_spanish_readings:
  - apóstol
  - mensajero
  rationale: El contexto inmediato identifica a Epafrodito como alguien enviado por la comunidad filipense, no como portador del oficio apostólico técnico. «Enviado» evita confundir al lector y conserva la relación de comisión.
  doctrine_reference: Oficio apostólico en el NT; comisión representativa de la iglesia local
- issue: Qué matiz dar a λειτουργὸν en un contexto de ayuda personal
  english_pob_reading: minister
  chosen_spanish_reading: servidor
  alternative_spanish_readings:
  - ministro
  - servidor a mi necesidad
  rationale: La frase no exige un cargo litúrgico. «Servidor» mantiene el valor de servicio concreto y evita importar una categoría eclesiástica posterior.
  doctrine_reference: Diaconía/servicio cristiano; uso no técnico de λειτουργός
translation_notes:
  revision_awareness: 'El texto sigue de cerca el griego SBLGNT y el criterio de la POB inglesa: ἀπόστολον se entiende en sentido contextual de representante enviado, no como título técnico; λειτουργὸν se vierte en clave de servicio práctico. No se añadió la idea de «de vuelta» en πέμψαι, porque el griego solo dice «enviar».'
  spanish_consistency_notes:
  - Se mantuvo «Epafrodito» como transliteración habitual en español.
  - 'Se eligió un orden natural en español: sujeto tácito, verbo principal, complemento directo, y luego la cadena de aposiciones.'
  - «Compañero de milicia» conserva la metáfora militar sin modernizarla en exceso.
  - Se evitó «Cristo» y otras terminologías no presentes en este versículo.
  - La nota al pie se ancla en «servidor» porque esa es la alternativa semántica más relevante en español para λειτουργὸν.
