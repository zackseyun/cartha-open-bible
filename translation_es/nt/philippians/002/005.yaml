translation:
  language: es
  text: Tengan esta actitud entre ustedes[a], la cual también estaba en Mesías Jesús[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Tengan esta actitud entre ustedes, la cual también tienen en Mesías Jesús».'
    reason: alternative_reading
