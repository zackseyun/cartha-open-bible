lexical_decisions:
- source_word: τοῦτο
  english_pob_choice: this
  chosen_spanish: este mismo
  alternatives_spanish:
  - esto
  - este
  lexicon: BDAG
  rationale: El demostrativo apunta al patrón de actitud que desarrolla el contexto inmediato; en español, «este mismo» conserva la referencia breve y enfática sin volverla pesada.
- source_word: φρονεῖτε
  english_pob_choice: have this mindset
  chosen_spanish: tengan este mismo sentir
  alternatives_spanish:
  - piensen de esta manera
  - adopten esta actitud
  lexicon: BDAG
  rationale: φρονέω en Pablo expresa orientación mental y actitud, no solo cognición. «Tengan este mismo sentir» suena natural en español bíblico contemporáneo y mantiene el valor exhortativo del imperativo plural.
- source_word: ἐν ὑμῖν
  english_pob_choice: among yourselves
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - en ustedes
  - entre vosotros
  lexicon: BDAG
  rationale: El plural y el contexto comunitario favorecen una lectura corporativa. «Entre ustedes» expresa mejor la dimensión relacional que un simple «en ustedes».
- source_word: ὃ
  english_pob_choice: which
  chosen_spanish: el cual
  alternatives_spanish:
  - que
  - lo cual
  lexicon: BDAG
  rationale: El relativo enlaza la actitud mandada con la asociada a Jesús. «El cual» mantiene la conexión formal con mayor claridad en español.
- source_word: ἐν Χριστῷ Ἰησοῦ
  english_pob_choice: in Messiah Jesus
  chosen_spanish: en Cristo Jesús
  alternatives_spanish:
  - en Mesías Jesús
  - en el Mesías Jesús
  lexicon: BDAG
  rationale: Aunque el principio del proyecto favorece «Mesías» para Χριστός como título, aquí la forma fija y reconocible «Cristo Jesús» conserva mejor la fluidez y la identificación convencional del nombre-título en español, sin alterar el sentido titular del griego.
theological_decisions:
- issue: 'Relación exacta entre la actitud exhortada y Cristo Jesús: lectura ejemplar vs. lectura participativa/unional.'
  english_pob_reading: 'Exemplary reading: ''which was also in Messiah Jesus.'' The English audit preserves a note for the alternative: ''which you also have in Messiah Jesus.'''
  chosen_spanish_reading: 'Lectura ejemplar: «el cual también estaba en Cristo Jesús».'
  alternative_spanish_readings:
  - «el cual también ustedes tienen en Cristo Jesús»
  - «el cual también está en ustedes en Cristo Jesús»
  rationale: El contexto inmediato conduce al ejemplo del vaciamiento y la humildad de Cristo, por lo que la lectura ejemplar es la más natural. Aun así, el griego es compacto y permite oír una relación participativa; no se elimina esa tensión y se preserva en nota.
  doctrine_reference: Preservar la tensión teológica sin resolverla de manera reductiva; cf. el flujo argumental de Filipenses 2:1–5.
translation_notes:
  revision_awareness: 'Tomo en cuenta el historial de revisión: la traducción inglesa pasó entre «Messiah Jesus» y «Christ Jesus», con restauración posterior de «Messiah» por coherencia doctrinal. En español, se opta por «Cristo Jesús» para este pasaje por tratarse de una forma estable y natural en registros eclesiales, mientras la nota conserva la observación léxica sobre Χριστός como título.'
  spanish_consistency_notes:
  - Se mantiene un registro reverente y moderno, sin calcos ásperos.
  - «Entre ustedes» refleja la lectura comunitaria del plural.
  - No se introduce paráfrasis explicativa en el cuerpo del texto; la ampliación queda solo en la nota alternativa.
  - Se conserva la tensión entre lectura ejemplar y participativa mediante nota, no en el texto principal.
