- from: manteniendo firmemente la palabra de vida[a], para mi gloria en el día del Mesías[b], para que no haya corrido en vano ni me haya fatigado en vano.
  to: manteniendo firmemente la palabra de vida[a], como motivo de gloria para mí en el día del Mesías[b], de que no corrí en vano ni trabajé en vano.
  rationale: Se revisa καύχημα a «motivo de gloria para mí» para reflejar mejor el sentido de ocasión de gloriarse; se cambia la cláusula final a «de que no corrí… ni trabajé…» para corresponder a ὅτι con aoristos indicativos; y se sustituye «me haya fatigado» por «trabajé» para conservar el matiz de labor esforzada de κοπίασα. Las notas existentes se mantienen porque siguen siendo pertinentes y correctamente ancladas.
