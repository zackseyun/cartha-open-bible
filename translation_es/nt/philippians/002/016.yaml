translation:
  language: es
  text: manteniendo firmemente la palabra de vida[a], como motivo de gloria para mí en el día del Mesías[b], de que no corrí en vano ni trabajé en vano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «manteniendo por delante» o «presentando la palabra de vida».
    reason: lexical_alternative
  - marker: b
    text: 'Lectura tradicional: «el día de Cristo».'
    reason: alternative_reading
lexical_decisions:
- source_word: λόγον ζωῆς
  english_pob_choice: the word of life
  chosen_spanish: la palabra de vida
  alternatives_spanish:
  - el mensaje de vida
  lexicon: BDAG
  rationale: 'λόγος puede significar «palabra» o «mensaje». «La palabra de vida» conserva la expresión breve del griego y su posible doble fuerza: palabra que da vida y palabra acerca de la vida.'
- source_word: ἐπέχοντες
  english_pob_choice: holding fast
  chosen_spanish: manteniendo firmemente
  alternatives_spanish:
  - aferrándose a
  - sosteniendo firmemente
  lexicon: BDAG
  rationale: ἐπέχω puede significar «retener firmemente» o «ofrecer/poner por delante». En este contexto exhortativo, «manteniendo firmemente» expresa bien la idea de perseverar en la palabra; la posible idea de exhibirla o proclamarla queda preservada en la nota.
- source_word: καύχημα
  english_pob_choice: a boast
  chosen_spanish: mi gloria
  alternatives_spanish:
  - motivo de gloria
  - motivo de orgullo
  lexicon: BDAG
  rationale: καύχημα se refiere a aquello en lo que uno se gloría o se jacta. En español, «mi gloria» comunica de manera natural el valor personal de ese motivo de orgullo, sin perder el sentido de ocasión para jactarse ante Dios.
- source_word: ἡμέραν Χριστοῦ
  english_pob_choice: the day of the Messiah
  chosen_spanish: el día del Mesías
  alternatives_spanish:
  - el día de Cristo
  lexicon: BDAG
  rationale: Χριστός tiene aquí sentido titular, no meramente nominal. Siguiendo la preferencia terminológica del proyecto, se traduce «Mesías» para conservar el peso escatológico y real del título; «Cristo» queda como alternativa tradicional.
- source_word: οὐκ εἰς κενὸν
  english_pob_choice: not in vain
  chosen_spanish: en vano
  alternatives_spanish:
  - sin resultado
  - sin propósito
  lexicon: BDAG
  rationale: Es un modismo estándar de inutilidad o falta de fruto. «En vano» es la equivalencia española más natural y conserva el paralelismo retórico del texto.
- source_word: ἔδραμον
  english_pob_choice: I did run
  chosen_spanish: haya corrido
  alternatives_spanish:
  - corrí
  - he corrido
  lexicon: BDAG
  rationale: τρέχω se usa metafóricamente para la carrera y el esfuerzo ministerial de Pablo. En español, «haya corrido» suena natural dentro de la cláusula final y mantiene la metáfora de la carrera.
- source_word: ἐκοπίασα
  english_pob_choice: labor
  chosen_spanish: me haya fatigado
  alternatives_spanish:
  - haya trabajado arduamente
  - me haya afanado
  lexicon: BDAG
  rationale: κοπιάω subraya trabajo penoso y esfuerzo intenso. «Me haya fatigado» conserva la carga de esfuerzo y hace buen paralelismo con «haya corrido».
theological_decisions:
- issue: Renderización de Χριστοῦ como título escatológico
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: En esta frase, Χριστός funciona como título mesiánico y escatológico, no como simple nombre propio. La forma «Mesías» preserva ese valor titulado y sigue la terminología doctrinal del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms table — Χριστός default ''Mesiah'' where title; ''Christ'' where name-like.'
translation_notes:
  revision_awareness: La redacción sigue de cerca el griego de SBLGNT y toma la traducción inglesa auditada como contexto, pero recupera la preferencia doctrinal del proyecto para Χριστός como «Mesías». También conserva la ambigüedad de ἐπέχω mediante una nota, como hizo el POB en inglés. La revisión inglesa que osciló entre «the day of Christ» y «the day of Messiah» se resuelve aquí de manera consistente con la política terminológica del proyecto.
  spanish_consistency_notes:
  - Se mantiene «palabra de vida» para λόγον ζωῆς, evitando «mensaje» salvo que el contexto lo requiriera más explícitamente.
  - «Mesías» se usa para Χριστός por su valor titular; no se introduce «Cristo» en el texto principal.
  - «En vano» conserva el modismo del griego y el paralelismo doble de la oración.
  - El verbo finito en subjuntivo perfecto («haya corrido», «me haya fatigado») corresponde a la cláusula final de resultado/propósito negativa del griego.
  - La nota sobre ἐπέχω preserva la tensión entre retener y presentar, sin resolverla de manera excesiva.
