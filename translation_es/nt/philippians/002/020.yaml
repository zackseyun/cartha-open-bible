translation:
  language: es
  text: Porque no tengo a nadie tan afín a mí[a] que de verdad se preocupe por lo que les concierne[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de espíritu afín»; más literalmente, «de alma igual».
    reason: lexical_alternative
  - marker: b
    text: O «se preocupe de verdad por su bienestar» o «se interese sinceramente por lo que les concierne».
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐδένα
  english_pob_choice: no one
  chosen_spanish: nadie
  alternatives_spanish:
  - no tengo a nadie
  - no tengo a ninguna persona
  lexicon: BDAG
  rationale: El griego presenta el objeto directo negativo de ἔχω; en español, «nadie» expresa la negación personal con naturalidad y sin añadir comparación no explícita.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Puesto que
  lexicon: BDAG
  rationale: Mantiene la fuerza explicativa de la partícula y enlaza con el razonamiento previo de manera natural en español.
- source_word: ἔχω
  english_pob_choice: I have
  chosen_spanish: tengo
  alternatives_spanish:
  - poseo
  - cuento con
  lexicon: BDAG
  rationale: «Tener» reproduce el giro idiomático sin forzar un matiz posesivo más fuerte que el del griego.
- source_word: ἰσόψυχον
  english_pob_choice: like him
  chosen_spanish: de igual ánimo
  alternatives_spanish:
  - de espíritu afín
  - de alma igual
  - de igual espíritu
  lexicon: BDAG
  rationale: La forma griega expresa afinidad interior y de disposición; «de igual ánimo» conserva ese sentido sin caer en un calco opaco, y evita borrar la tensión lexical entre semejanza interior y formulación relacional concreta.
- source_word: ὅστις
  english_pob_choice: who
  chosen_spanish: que
  alternatives_spanish:
  - el cual
  - quien
  lexicon: BDAG
  rationale: La relativa en español queda más fluida con «que» y conserva la subordinación descriptiva del griego.
- source_word: γνησίως
  english_pob_choice: genuinely
  chosen_spanish: genuinamente
  alternatives_spanish:
  - verdaderamente
  - sinceramente
  lexicon: BDAG
  rationale: Reproduce la idea de autenticidad real, no meramente formal, que el adverbio expresa en el contexto pastoral.
- source_word: τὰ περὶ ὑμῶν
  english_pob_choice: your welfare
  chosen_spanish: lo que a ustedes les concierne
  alternatives_spanish:
  - sus asuntos
  - lo relacionado con ustedes
  - su bienestar
  lexicon: BDAG
  rationale: La frase griega es más amplia que «bienestar» y abarca las circunstancias e intereses de los destinatarios; la opción elegida preserva esa amplitud sin perder claridad en español.
- source_word: μεριμνήσει
  english_pob_choice: will care about
  chosen_spanish: se preocupe por
  alternatives_spanish:
  - velará por
  - estará preocupado por
  - se interesará por
  lexicon: BDAG
  rationale: En este contexto el verbo denota cuidado solícito y pastoral, no ansiedad pecaminosa; «se preocupe por» comunica preocupación activa y benevolente.
theological_decisions:
- issue: El alcance pastoral de μεριμνήσει
  english_pob_reading: will genuinely care about your welfare / be concerned for what concerns you
  chosen_spanish_reading: genuinamente se preocupe por lo que a ustedes les concierne
  alternative_spanish_readings:
  - genuinamente se interese por ustedes
  - velará por sus asuntos
  rationale: No se atenúa el componente de cuidado concreto ni se convierte en simple emoción. La lectura conserva la orientación pastoral del verso, coherente con el uso positivo del verbo en este contexto.
  doctrine_reference: Filipenses 2:20; cf. Filipenses 2:21
- issue: ἰσόψυχον como afinidad interna
  english_pob_reading: like him / of kindred spirit / equal-souled
  chosen_spanish_reading: de igual ánimo
  alternative_spanish_readings:
  - de espíritu afín
  - de alma igual
  rationale: Se conserva la idea de disposición compartida, vinculada al ejemplo de Timoteo en el contexto inmediato. No se sustituye por un término eclesial tradicional que borraría la imagen de afinidad personal.
  doctrine_reference: Filipenses 2:19-22
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que movió la interpretación de ἰσόψυχον desde una formulación general de ‘like-minded’ hacia una referencia más contextual a la afinidad con Timoteo; en español se reflejó con ‘de igual ánimo’ para conservar esa cercanía relacional sin perder la fuerza lexical del griego. También se mantuvo la idea de γνησίως ... μεριμνήσει como cuidado genuino y pastoral, no mera preocupación interna.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera; aquí no aparece ningún referente al nombre divino.
  - Se evitó «Cristo» porque este versículo no contiene Χριστός como designación directa.
  - Se tradujo δοῦλος/siervo no aplicable en este versículo; no se introdujo terminología ajena al pasaje.
  - Se mantuvo un registro neutral y bíblico, apto para lectura pública, sin depender de fórmulas tradicionales que oculten matices del griego.
