translation:
  language: es
  text: para que lleguéis a ser irreprensibles y puros, hijos de Dios sin mancha en medio de una generación torcida y perversa[b], entre quienes resplandecéis[a] como luces[c] en el mundo
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "os mostráis como luces".
    reason: lexical_alternative
  - marker: b
    text: '"Generación torcida y perversa" probablemente alude a Deuteronomio 32:5, contrastando a los hijos de Dios con una generación corrupta.'
    reason: cross_reference
  - marker: c
    text: O "luminares".
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: Expresa finalidad/resulto de manera natural en español y conserva la fuerza de propósito de la cláusula.
- source_word: γένησθε
  english_pob_choice: you may become
  chosen_spanish: lleguéis a ser
  alternatives_spanish:
  - seáis
  - lleguéis a ser
  - podáis llegar a ser
  lexicon: BDAG
  rationale: γίνομαι indica llegar a ser o hacerse; 'lleguéis a ser' mantiene el matiz de proceso mejor que un simple 'seáis'.
- source_word: ἄμεμπτοι
  english_pob_choice: blameless
  chosen_spanish: irreprensibles
  alternatives_spanish:
  - sin reproche
  - impecables
  lexicon: BDAG
  rationale: '''Irreprensibles'' comunica la idea moral de no tener culpa o reproche, con buen registro bíblico en español.'
- source_word: ἀκέραιοι
  english_pob_choice: pure
  chosen_spanish: puros
  alternatives_spanish:
  - íntegros
  - sin mezcla
  - inocentes
  lexicon: BDAG
  rationale: '''Puros'' funciona bien en español para la integridad moral y preserva la distinción con ἄμεμπτοι, aunque ambos campos se solapan.'
- source_word: τέκνα θεοῦ
  english_pob_choice: children of God
  chosen_spanish: hijos de Dios
  alternatives_spanish:
  - hijos e hijas de Dios
  - hijos de Dios
  lexicon: BDAG
  rationale: En español bíblico, 'hijos de Dios' es la forma más estable y natural para τέκνα θεοῦ, sin perder el valor colectivo e inclusivo del término.
- source_word: ἄμωμα
  english_pob_choice: without blemish
  chosen_spanish: sin mancha
  alternatives_spanish:
  - sin defecto
  - sin blemish
  lexicon: BDAG
  rationale: '''Sin mancha'' conserva la imagen de integridad/ausencia de defecto y refleja bien el lenguaje sacrificial implícito.'
- source_word: μέσον γενεᾶς
  english_pob_choice: in the midst of a generation
  chosen_spanish: en medio de una generación
  alternatives_spanish:
  - en medio de una generación
  - entre una generación
  lexicon: BDAG
  rationale: '''En medio de'' reproduce con precisión la relación espacial/social del griego y mantiene el contraste comunitario.'
- source_word: σκολιᾶς καὶ διεστραμμένης
  english_pob_choice: crooked and twisted
  chosen_spanish: torcida y perversa
  alternatives_spanish:
  - torcida y desviada
  - corrupta y perversa
  lexicon: BDAG
  rationale: '''Torcida y perversa'' conserva la dureza moral del texto y la cadencia conocida del eco bíblico sin suavizarlo.'
- source_word: ἐν οἷς
  english_pob_choice: among whom
  chosen_spanish: entre quienes
  alternatives_spanish:
  - entre los cuales
  - en medio de quienes
  lexicon: BDAG
  rationale: Como el referente es personal/colectivo, 'entre quienes' suena natural y preciso en español.
- source_word: φαίνεσθε
  english_pob_choice: you shine
  chosen_spanish: resplandecéis
  alternatives_spanish:
  - aparecéis
  - brilláis
  lexicon: BDAG
  rationale: El verbo admite 'aparecer' o 'brillar'; aquí 'resplandecéis' prioriza el sentido luminoso en contexto con φωστῆρες.
- source_word: φωστῆρες
  english_pob_choice: lights
  chosen_spanish: luminares
  alternatives_spanish:
  - luces
  - estrellas
  lexicon: BDAG
  rationale: '''Luminares'' preserva el tono elevado y la imagen de cuerpos/luz; ''luces'' es más simple pero menos preciso para el matiz del término.'
- source_word: ἐν κόσμῳ
  english_pob_choice: in the world
  chosen_spanish: en el mundo
  alternatives_spanish:
  - en el universo
  - en la tierra
  lexicon: BDAG
  rationale: '''Mundo'' es el equivalente natural para κόσμος en este contexto humano y ético.'
theological_decisions:
- issue: Relación entre 'sin mancha' e 'hijos de Dios' y posible eco de Deuteronomio 32:5
  english_pob_reading: Render as 'children of God without blemish' and preserve the ethical-covenantal echo without making it overly explicit in the main text.
  chosen_spanish_reading: '''hijos de Dios, sin mancha'' deja que la cualidad recaiga de forma natural sobre el sujeto colectivo, manteniendo el eco bíblico sin explicitarlo en el texto principal.'
  alternative_spanish_readings:
  - '''hijos de Dios sin mancha'' como una sola unidad'
  - '''hijos de Dios, irreprensibles'' con el adjetivo aplicado al conjunto'
  rationale: El griego permite entender 'ἄμωμα' como cualidad de los hijos de Dios; la puntuación española puede reflejar esa relación sin añadir explicación interpretativa en el cuerpo del versículo.
  doctrine_reference: Deuteronomio 32:5; Filipenses 2:15
- issue: 'Sentido de φαίνεσθε con φωστῆρες: ''parecer'' vs. ''brillar'''
  english_pob_reading: The alternative 'you appear as lights' is preserved in a footnote, but the main text uses 'you shine as lights.'
  chosen_spanish_reading: '''resplandecéis'' expresa el sentido luminoso principal, mientras la nota conserva ''aparecer'' como alternativa válida.'
  alternative_spanish_readings:
  - '''aparecéis como luminares'''
  - '''brilláis como luces'''
  rationale: Con φωστῆρες, el contexto favorece una imagen de luz real; aun así, el verbo puede significar 'aparecer', por lo que conviene mantener esa tensión en nota.
  doctrine_reference: Filipenses 2:15; uso léxico de φαίνω
- issue: Elección entre 'luminares' y 'luces' para φωστῆρες
  english_pob_reading: '''Luminaries'' is preserved as an alternative; ''lights'' is the main English rendering.'
  chosen_spanish_reading: '''luminares'' se usa en el texto principal para conservar la elevación y amplitud semántica del término.'
  alternative_spanish_readings:
  - '''luces'''
  - '''estrellas'''
  rationale: '''Luminares'' es más preciso y menos restringido que ''estrellas''; también mantiene el registro poético del pasaje.'
  doctrine_reference: Filipenses 2:15
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios adicionales y el control cruzado mostró alto acuerdo (1.0); por eso mantengo la solución óptima ya establecida, con notas conservando las alternativas léxicas relevantes.
  spanish_consistency_notes:
  - Se preservó 'Yahvé' no aplica aquí porque el versículo usa θεοῦ y κόσμῳ, no el tetragrámaton.
  - Se mantuvo un registro bíblico natural en español, evitando calcos innecesarios como 'sin culpa' o 'en el cual'.
  - La alternancia entre 'irreprensibles' y 'sin mancha' refleja dos adjetivos griegos distintos (ἄμεμπτοι / ἄμωμα) y evita fusionarlos.
  - '''Resplandecéis'' y la nota ''aparecéis'' conservan la tensión léxica de φαίνω sin perder la imagen de luz.'
