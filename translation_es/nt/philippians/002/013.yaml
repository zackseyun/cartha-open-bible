  glossary_alignment: No hay conflictos con el glosario principal del proyecto. «Dios» es correcto para θεός. La decisión entre «actúa/obra» debe favorecer una mayor coherencia interna con ἐνεργῶν / ἐνεργεῖν. La alternativa «beneplácito» sería más técnica; «buena voluntad» puede mantenerse en nota, pero en texto principal conviene «según su buena voluntad».
