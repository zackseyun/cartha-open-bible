translation:
  language: es
  text: Porque Dios es el que obra en ustedes tanto el querer como el obrar[a][b], según su buena voluntad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tanto para querer como para obrar».
    reason: lexical_alternative
  - marker: b
    text: O «por su beneplácito».
    reason: lexical_alternative
lexical_decisions:
- source_word: γάρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: La partícula introduce la base explicativa de la exhortación anterior; «porque» conserva bien esa relación causal/explicativa en español sin sonar forzado.
- source_word: ὁ ἐνεργῶν
  english_pob_choice: the one working
  chosen_spanish: el que actúa
  alternatives_spanish:
  - el que trabaja
  - el que obra
  lexicon: BDAG
  rationale: El participio sustantivado expresa una acción continua de Dios. En español, «el que actúa» comunica ese sentido de agencia activa de forma natural; «trabaja» sonaría menos idiomático para Dios y «obra» puede resultar más tradicional pero menos transparente aquí.
- source_word: ἐν ὑμῖν
  english_pob_choice: in you
  chosen_spanish: en ustedes
  alternatives_spanish:
  - entre ustedes
  - en vosotros
  lexicon: BDAG
  rationale: Se conserva la preposición y la posibilidad de lectura individual o colectiva. «Ustedes» mantiene el plural claro en un español amplio y no resuelve la tensión entre aplicación personal y comunitaria.
- source_word: τὸ θέλειν
  english_pob_choice: to will
  chosen_spanish: querer
  alternatives_spanish:
  - el querer
  - desear
  lexicon: BDAG
  rationale: El infinitivo articular denota volición. «Querer» es el equivalente verbal más natural en español y mantiene la fuerza de decisión/voluntad sin reducirla a simple deseo.
- source_word: τὸ ἐνεργεῖν
  english_pob_choice: to work
  chosen_spanish: obrar
  alternatives_spanish:
  - trabajar
  - actuar
  - el obrar
  lexicon: BDAG
  rationale: Se eligió «obrar» porque preserva mejor la correspondencia con ἐνεργῶν y suena natural en la pareja «querer/obrar». «Trabajar» sería más mecánico; «actuar» es posible, pero pierde la resonancia léxica interna.
- source_word: ὑπὲρ τῆς εὐδοκίας
  english_pob_choice: for his good pleasure
  chosen_spanish: por su buena voluntad
  alternatives_spanish:
  - para su buena voluntad
  - según su buena voluntad
  - por su beneplácito
  lexicon: BDAG
  rationale: Se mantiene εὐδοκία con un equivalente comprensible en español. «Buena voluntad» comunica bien la idea, aunque «beneplácito» sería más técnico; se evita sobrecargar el versículo con un término menos accesible. El «su» está justificado por el sujeto inmediato, Dios.
theological_decisions:
- issue: Agencia divina en el querer y el obrar humanos
  english_pob_reading: Retained the dual expression 'both to will and to work' without softening either side.
  chosen_spanish_reading: Se conserva la doble expresión «querer» y «obrar» sin diluirla ni fusionarla.
  alternative_spanish_readings:
  - querer y actuar
  - desear y hacer
  - dar el querer y el hacer
  rationale: El versículo atribuye a Dios la operación tanto en la volición como en la acción. La traducción evita resolver la tensión entre agencia divina y respuesta humana, manteniendo ambos polos explícitos.
  doctrine_reference: Preservar la tensión teológica del texto sin imponer una explicación sistemática particular.
translation_notes:
  revision_awareness: La revisión inglesa reciente eliminó una coma para mayor fluidez; en español se adoptó una sintaxis igualmente fluida sin coma antes de «tanto para querer como para obrar».
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός, conforme al estándar del proyecto.
  - Se conserva el paralelismo verbal «querer/obrar» para reflejar la estructura doble del griego.
  - No se usa «Señor» ni una máscara equivalente, porque el texto dice explícitamente «Dios».
  - La expresión «por su buena voluntad» deja abierta la relación semántica de ὑπέρ con el genitivo, tal como el audit trail inglés distingue entre propósito y conformidad.
