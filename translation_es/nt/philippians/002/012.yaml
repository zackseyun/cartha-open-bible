  text: Ὥστε, ἀγαπητοί μου, καθὼς πάντοτε ὑπηκούσατε, μὴ ὡς ἐν τῇ παρουσίᾳ μου μόνον ἀλλὰ νῦν πολλῷ μᾶλλον ἐν τῇ ἀπουσίᾳ μου, μετὰ φόβου καὶ τρόμου τὴν ἑαυτῶν σωτηρίαν κατεργάζεσθε,
base_translation:
  language: en
  yaml_path: translation/nt/philippians/002/012.yaml
  text: So then[a], my beloved, just as you have always obeyed—not only in my presence, but now much more in my absence—work out your own salvation with fear and trembling[c][b],
