translation:
  language: es
  text: Así que[a], amados míos, así como siempre han obedecido, no solo en mi presencia, sino ahora mucho más en mi ausencia, con temor y temblor[c], lleven a cabo su propia salvación[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «aún más en mi ausencia».
    reason: lexical_alternative
  - marker: b
    text: «Lleven a cabo» significa vivir y llevar la salvación a su expresión en la vida, no ganarla por mérito.
    reason: alternative_reading
  - marker: c
    text: «Temor y temblor» expresa reverencia solemne y humildad seria delante de Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὥστε
  english_pob_choice: So then
  chosen_spanish: Así que
  alternatives_spanish:
  - Por tanto
  - De modo que
  lexicon: BDAG
  rationale: Marca la inferencia y transición lógica del contexto anterior; «Así que» suena natural en español y conserva el enlace argumentativo sin endurecer el estilo.
- source_word: ἀγαπητοί μου
  english_pob_choice: my beloved
  chosen_spanish: amados míos
  alternatives_spanish:
  - mis amados
  - mis queridos
  lexicon: BDAG
  rationale: Expresa el tono afectuoso y pastoral del vocativo. «Amados míos» mantiene la cercanía sin perder dignidad.
- source_word: καθὼς πάντοτε ὑπηκούσατε
  english_pob_choice: just as you have always obeyed
  chosen_spanish: así como siempre han obedecido
  alternatives_spanish:
  - como siempre han obedecido
  - tal como siempre obedecieron
  lexicon: BDAG
  rationale: El aoristo resume un patrón continuo ya establecido; el presente perfecto en español comunica mejor su relevancia continua para la exhortación.
- source_word: παρουσίᾳ / ἀπουσίᾳ
  english_pob_choice: presence / absence
  chosen_spanish: presencia / ausencia
  alternatives_spanish:
  - estar presente / estar ausente
  lexicon: BDAG
  rationale: Se conserva el contraste nominal directo del griego, claro y natural en español.
- source_word: πολλῷ μᾶλλον
  english_pob_choice: much more
  chosen_spanish: mucho más
  alternatives_spanish:
  - aún más
  - con mayor razón
  lexicon: BDAG
  rationale: Reproduce la intensificación comparativa de forma simple y idiomática.
- source_word: μετὰ φόβου καὶ τρόμου
  english_pob_choice: with fear and trembling
  chosen_spanish: con temor y temblor
  alternatives_spanish:
  - con reverente temor
  - con asombro y temblor
  lexicon: BDAG
  rationale: Se mantiene la expresión tradicional y su fuerza solemne. «Temor» y «temblor» conservan la gravedad de la fórmula sin suavizarla.
- source_word: τὴν ἑαυτῶν σωτηρίαν
  english_pob_choice: your own salvation
  chosen_spanish: su propia salvación
  alternatives_spanish:
  - la salvación de ustedes mismos
  - su salvación
  lexicon: BDAG
  rationale: «Salvación» preserva el peso teológico de σωτηρία; «su propia» recoge ἑαυτῶν y evita diluir la responsabilidad personal.
- source_word: κατεργάζεσθε
  english_pob_choice: work out
  chosen_spanish: ocupen en llevar a efecto
  alternatives_spanish:
  - trabajen en
  - lleven a cabo
  lexicon: BDAG
  rationale: Se evita «trabajar por» para no sugerir mérito de salvación. La expresión comunica la idea de desarrollar o llevar a expresión en la vida lo que ya está en vista. Se eligió una formulación menos mecánica en español para no sonar forzada.
theological_decisions:
- issue: Sentido de «su propia salvación» y el verbo imperativo
  english_pob_reading: An exhortation to live out and bring to expression the salvation already in view, not to earn salvation by works.
  chosen_spanish_reading: Una exhortación a llevar a efecto y manifestar en la vida la salvación ya contemplada, no a merecerla por obras.
  alternative_spanish_readings:
  - Una orden de alcanzar la salvación por esfuerzo humano
  - Una invitación meramente ética sin contenido salvífico
  rationale: El contexto y el verbo κατεργάζεσθε no exigen una lectura de mérito. La redacción española mantiene la tensión doctrinal sin resolverla artificialmente y evita una formulación que sugiera salvación por obras.
  doctrine_reference: Preservar la tensión teológica del texto, en consonancia con Filipenses 2:13.
- issue: «con temor y temblor»
  english_pob_reading: Reverent seriousness and humble awe before God.
  chosen_spanish_reading: Temor reverente y humildad seria delante de Dios.
  alternative_spanish_readings:
  - Miedo crudo
  - Solo respeto formal sin peso emocional
  rationale: La fórmula se conserva porque transmite solemnidad y dependencia, no mero pánico. La nota permite aclarar el matiz sin sustituir el texto bíblico.
  doctrine_reference: Lectura reverente y sobria, no terrorista ni trivial.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego y el audit trail inglés, pero ajusta el orden y la fluidez para un español bíblico moderno. Se evitó una calca como «trabajen su salvación» para no introducir ambigüedad de mérito; además, el contraste presencia/ausencia se mantuvo nominalmente para conservar el paralelismo retórico.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma general del proyecto solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se prefirió «salvación» para σωτηρία por su peso teológico usual en el NT.
  - Se mantuvo «temor y temblor» por corresponder a una expresión establecida y auditable en el audit trail.
  - No se introdujo «Cristo» ni otra terminología no presente en el versículo.
