translation:
  language: es
  text: No hagan nada por ambición egoísta[a] ni por vanagloria[b], sino que, con humildad, consideren unos a otros como más importantes que ustedes mismos[c],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por rivalidad egoísta» o «por afán de partido».
    reason: lexical_alternative
  - marker: b
    text: O «vanidad vacía» o «presunción vacía».
    reason: lexical_alternative
  - marker: c
    text: O «consideren unos a otros como superiores a ustedes mismos».
    reason: lexical_alternative
lexical_decisions:
- source_word: μηδὲν
  english_pob_choice: Do nothing
  chosen_spanish: No hagan nada
  alternatives_spanish:
  - No hagan cosa alguna
  - No hagan nada en absoluto
  lexicon: BDAG
  rationale: El indefinido negativo funciona aquí como prohibición general. «No hagan nada» comunica con naturalidad el alcance absoluto del mandamiento, sin recargar el español.
- source_word: κατ’ ἐριθείαν
  english_pob_choice: from selfish ambition
  chosen_spanish: por ambición egoísta
  alternatives_spanish:
  - por rivalidad egoísta
  - por afán de partido
  lexicon: BDAG
  rationale: ἐριθεία apunta a una búsqueda egoísta y partidista, no solo a competencia neutral. «Ambición egoísta» conserva la fuerza moral del motivo y suena natural en español.
- source_word: κατὰ κενοδοξίαν
  english_pob_choice: empty conceit
  chosen_spanish: vanagloria
  alternatives_spanish:
  - vanidad vacía
  - presunción vacía
  lexicon: BDAG
  rationale: κενοδοξία es literalmente «gloria vacía». En español, «vanagloria» mantiene bien la idea de autoexaltación vacía y conserva el registro tradicional sin perder claridad.
- source_word: τῇ ταπεινοφροσύνῃ
  english_pob_choice: in humility
  chosen_spanish: con humildad
  alternatives_spanish:
  - en humildad
  - por humildad
  lexicon: BDAG
  rationale: El dativo expresa modo o medio. «Con humildad» es idiomático en español y refleja adecuadamente la actitud o disposición con la que debe actuarse.
- source_word: ἡγούμενοι
  english_pob_choice: regard
  chosen_spanish: consideren
  alternatives_spanish:
  - estimen
  - tengan por
  lexicon: BDAG
  rationale: El participio tiene sentido evaluativo/cognitivo. «Consideren» expresa el acto de valorar a otros de cierta manera, con claridad en español contemporáneo.
- source_word: ἀλλήλους
  english_pob_choice: one another
  chosen_spanish: a los demás
  alternatives_spanish:
  - unos a otros
  - entre sí
  lexicon: BDAG
  rationale: El contexto exhorta a una actitud comunitaria general. «A los demás» evita una repetición pesada y en español sigue comunicando la referencia recíproca implícita en el versículo.
- source_word: ὑπερέχοντας ἑαυτῶν
  english_pob_choice: as more important than yourselves
  chosen_spanish: como más importantes que ustedes mismos
  alternatives_spanish:
  - como superiores a ustedes mismos
  - como más valiosos que ustedes mismos
  lexicon: BDAG
  rationale: ὑπερέχω puede denotar superioridad o excelencia. «Más importantes» reproduce la comparación sin imponer una superioridad ontológica; «ustedes mismos» mantiene el contraste reflexivo del griego.
theological_decisions:
- issue: Alcance de la prohibición inicial y tono exhortativo
  english_pob_reading: Do nothing from selfish ambition or empty conceit
  chosen_spanish_reading: No hagan nada por ambición egoísta ni por vanagloria
  alternative_spanish_readings:
  - No hagan nada por rivalidad ni por vanagloria
  - No hagan nada por ambición partidista ni por vanagloria
  rationale: El versículo prohíbe dos motivaciones internas para la acción, no solo ciertos actos externos. La redacción mantiene esa amplitud ética y la relación causal de las motivaciones.
  doctrine_reference: Ética paulina de la humildad y la unidad comunitaria (Fil 2:1-4).
- issue: Sentido de ὑπερέχοντας en la comparación con los demás
  english_pob_reading: regard one another as more important than yourselves
  chosen_spanish_reading: consideren a los demás como más importantes que ustedes mismos
  alternative_spanish_readings:
  - consideren a los demás como superiores a ustedes mismos
  - tengan por superiores a los demás
  rationale: Se evita una formulación que pueda sonar ontológica o jerárquica absoluta. La comparación apunta al trato y la estimación práctica dentro de la comunidad.
  doctrine_reference: Humildad cristiana y servicio mutuo en la comunidad creyente (Rom 12:10; Fil 2:3).
translation_notes:
  revision_awareness: El texto inglés de trabajo pasó de “empty pride” a “empty conceit” para acercarse más a κενοδοξία; por eso la versión española evita “orgullo” como término principal y usa “vanagloria”, que conserva mejor la idea de gloria vacía. También se mantuvo la comparación final en clave funcional (“más importantes”) para respetar la tensión entre superioridad y valor relativo sin absolutizarla.
  spanish_consistency_notes:
  - 'Se mantuvo el tratamiento de segunda persona plural formal de ámbito eclesial: «ustedes».'
  - Se preservó una estructura exhortativa breve y directa, compatible con el tono parenético de Pablo.
  - «Ambición egoísta» y «vanagloria» reflejan los dos motivos negativos como causas internas, no simples rasgos de conducta.
