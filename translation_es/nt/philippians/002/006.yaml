translation:
  language: es
  text: quien[a], aunque estaba en la forma de Dios, no consideró que el ser igual a Dios fuera algo a lo cual aferrarse[b][c],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «existiendo en la forma de Dios»; ὑπάρχων puede entenderse de manera concesiva («aunque estaba») o estática («existiendo»), y los comentaristas discrepan.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «algo a qué aferrarse» o «algo que arrebatar».'
    reason: alternative_reading
  - marker: c
    text: Lit. «el ser igual a Dios».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν μορφῇ θεοῦ
  english_pob_choice: in the form of God
  chosen_spanish: en forma de Dios
  alternatives_spanish:
  - en la naturaleza de Dios
  - en muy naturaleza Dios
  lexicon: BDAG
  rationale: μορφή se conserva como «forma» para no sustituir la expresión paulina por una paráfrasis doctrinal más amplia. «En forma de Dios» mantiene la alta cristología del pasaje sin borrar la terminología del texto griego.
- source_word: ὑπάρχων
  english_pob_choice: though he was
  chosen_spanish: aunque estaba
  alternatives_spanish:
  - existiendo
  - siendo
  - aunque existía
  lexicon: BDAG
  rationale: El participio admite un matiz concesivo; en español, «aunque estaba» comunica bien la contraposición retórica del himno y deja implícito el estado previo de Cristo. «Existiendo» se preserva como posibilidad interpretativa, pero suena menos natural en este contexto.
- source_word: ἁρπαγμὸν
  english_pob_choice: something to be grasped
  chosen_spanish: algo a lo cual aferrarse
  alternatives_spanish:
  - algo para ser tomado
  - algo que arrebatar
  - algo para agarrarse
  lexicon: BDAG
  rationale: ἁρπαγμός es un cruce interpretativo real. En español, «a lo cual aferrarse» expresa la idea de retener/aprovechar algo para propio beneficio sin decidir de manera excesiva entre las lecturas de “apropiarse” y “aprovechar”. La nota preserva la alternativa más literal «algo a ser tomado/aferrado» en la zona semántica del término.
- source_word: ἡγήσατο
  english_pob_choice: did not consider
  chosen_spanish: no consideró
  alternatives_spanish:
  - no estimó
  - no juzgó
  - no tuvo por
  lexicon: BDAG
  rationale: ἡγέομαι aquí significa considerar, valorar o estimar. «No consideró» es la opción más natural y fiel en español contemporáneo.
- source_word: τὸ εἶναι ἴσα θεῷ
  english_pob_choice: equality with God
  chosen_spanish: que el ser igual a Dios
  alternatives_spanish:
  - la igualdad con Dios
  - el ser igual a Dios
  - estar en igualdad con Dios
  lexicon: BDAG
  rationale: La construcción infinitiva se vierte de forma idiomática en español como «que el ser igual a Dios», conservando la relación verbal y la idea de igualdad de estatus. «Igual a Dios» evita el calco rígido, pero mantiene la fuerza de ἴσα.
theological_decisions:
- issue: Cristología de μορφή θεοῦ
  english_pob_reading: Retain “in the form of God” in the main text.
  chosen_spanish_reading: Mantener «en forma de Dios» en el texto principal.
  alternative_spanish_readings:
  - en la naturaleza de Dios
  - siendo Dios por naturaleza
  rationale: La traducción debe conservar la formulación paulina sin sustituirla por una síntesis dogmática posterior. «Forma de Dios» deja intacta la tensión cristológica y permite que el contexto la desarrolle.
  doctrine_reference: Credo Niceno-Constantinopolitano (381); Definición de Calcedonia (451)
- issue: Sentido de ἁρπαγμός respecto a la igualdad con Dios
  english_pob_reading: Render as “something to be exploited” in the main text and preserve “something to be grasped” as a footnote alternative.
  chosen_spanish_reading: Traducir con una expresión que mantenga abierta la cuestión de si se trata de aferrarse, apropiarse o aprovechar.
  alternative_spanish_readings:
  - algo para ser tomado
  - algo para ser aprovechado
  - algo para aferrarse
  rationale: El contexto inmediato enfatiza la renuncia y el vaciamiento, por lo que no conviene cerrar prematuramente el sentido. La formulación española mantiene la tensión exegética sin borrar la lectura tradicional ni la posibilidad de una lectura de ventaja/aprovechamiento.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla artificialmente
translation_notes:
  revision_awareness: 'El expediente inglés muestra una evolución revisada del rendimiento de ἁρπαγμός: de una redacción interpretativa («something to be exploited») a una más directa («something to be grasped») para reflejar mejor el término griego. La versión española sigue esa cautela y evita un cierre excesivamente interpretativo, manteniendo la ambigüedad controlada del original. También conserva la nota concesiva sobre ὑπάρχων, acorde con el análisis del audit trail.'
  spanish_consistency_notes:
  - Se usa «Dios» para θεός, sin mayúsculas reverenciales añadidas fuera del término mismo.
  - Se mantiene «forma de Dios» como calco controlado y auditable de μορφή.
  - Se opta por una construcción española natural para el infinitivo articular («que el ser igual a Dios»), preservando el valor semántico sin forzar sintaxis extraña.
  - Las notas al pie usan marcadores únicos en orden y cada una está anclada en el texto principal.
