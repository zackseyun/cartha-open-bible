translation:
  language: es
  text: Pero ustedes conocen su carácter probado[a], que como un hijo con su padre, sirvió conmigo para el evangelio[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «carácter genuino probado»; el término se refiere al carácter mostrado como genuino mediante la prueba.
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «como un hijo con su padre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Ahora bien
  - Y
  lexicon: BDAG
  rationale: Mantiene el giro contrastivo o de transición con naturalidad en español.
- source_word: δοκιμὴν
  english_pob_choice: proven character
  chosen_spanish: carácter probado
  alternatives_spanish:
  - carácter demostrado
  - probada calidad
  - prueba
  lexicon: BDAG
  rationale: δοκιμή expresa la cualidad mostrada como genuina a través de la prueba; 'carácter probado' conserva esa idea sin reducirla a 'prueba' abstracta.
- source_word: αὐτοῦ
  english_pob_choice: his
  chosen_spanish: su
  alternatives_spanish:
  - de él
  lexicon: BDAG
  rationale: Pronombre posesivo simple y natural para referirse a Timoteo.
- source_word: γινώσκετε
  english_pob_choice: you know
  chosen_spanish: conocen
  alternatives_spanish:
  - saben
  - reconocen
  lexicon: BDAG
  rationale: En este contexto, el matiz de conocimiento previo compartido se expresa bien con 'conocen' en español.
- source_word: ὡς πατρὶ τέκνον
  english_pob_choice: like a child with his father
  chosen_spanish: como hijo con su padre
  alternatives_spanish:
  - como un niño con su padre
  - como un hijo con un padre
  lexicon: BDAG
  rationale: Preserva la analogía familiar sin forzar 'like' literal ni convertir τέκνον en 'siervo' o 'hijo' con carga doctrinal añadida.
- source_word: σὺν ἐμοὶ
  english_pob_choice: with me
  chosen_spanish: conmigo
  alternatives_spanish:
  - junto conmigo
  - al lado mío
  lexicon: BDAG
  rationale: Equivale de forma directa y natural a la cooperación cercana en el servicio.
- source_word: ἐδούλευσεν
  english_pob_choice: he served
  chosen_spanish: sirvió
  alternatives_spanish:
  - trabajó
  - prestó servicio
  - sirvió como esclavo
  lexicon: BDAG
  rationale: Aunque el verbo pertenece al campo de δουλεύω, aquí el contexto ministerial permite 'sirvió' como la opción española más natural y fiel al uso idiomático del POB en este verso.
- source_word: εἰς τὸ εὐαγγέλιον
  english_pob_choice: for the gospel
  chosen_spanish: para el evangelio
  alternatives_spanish:
  - por el evangelio
  - al servicio del evangelio
  lexicon: BDAG
  rationale: Expresa finalidad/dirección de manera clara en español y conserva el objeto del servicio como el evangelio.
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del POB en inglés: se prefirió una equivalencia más directa de δοκιμή como ''proven character'' y una relación comparativa más natural para ὡς πατρὶ τέκνον, evitando una construcción demasiado literal que sonara forzada en español.'
  spanish_consistency_notes:
  - Se mantiene 'evangelio' para εὐαγγέλιον, en coherencia con el registro eclesial actual del proyecto.
  - Se evita 'siervo' o 'esclavo' para ἐδούλευσεν porque el contexto ministerial del versículo y el audit trail en inglés favorecen 'sirvió'.
  - '''Carácter probado'' conserva la tensión lexical de δοκιμή entre prueba y genuinidad sin añadir explicaciones intrusivas al texto principal.'
  - El uso de 'conocen' refleja conocimiento compartido presente, coherente con γινώσκετε.
