translation:
  language: es
  text: para que al nombre de Jesús toda rodilla se doble[a], de los que están en el cielo y en la tierra y debajo de la tierra[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en el nombre de Jesús».'
    reason: lexical_alternative
  - marker: b
    text: Lit. «de celestiales, terrenales y subterráneos»; en español se expresa como los ámbitos o grupos correspondientes para mayor naturalidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - de modo que
  - a fin de que
  lexicon: BDAG
  rationale: ἵνα expresa propósito/resultado; en español, «para que» preserva ese valor final de manera natural y digna.
- source_word: ἐν τῷ ὀνόματι Ἰησοῦ
  english_pob_choice: at the name of Jesus
  chosen_spanish: en el nombre de Jesús
  alternatives_spanish:
  - al nombre de Jesús
  - ante el nombre de Jesús
  lexicon: BDAG
  rationale: Se conserva la preposición ἐν con «en», que es la opción más directa y transparente; el matiz de respuesta reverente queda en el contexto de la rodilla que se dobla.
- source_word: πᾶν γόνυ
  english_pob_choice: every knee
  chosen_spanish: toda rodilla
  alternatives_spanish:
  - cada rodilla
  - toda persona
  lexicon: BDAG
  rationale: Se mantiene la imagen corporal literal de homenaje universal, sin convertirla en una paráfrasis abstracta.
- source_word: κάμψῃ
  english_pob_choice: should bow
  chosen_spanish: se doble
  alternatives_spanish:
  - se incline
  - se arrodille
  lexicon: BDAG
  rationale: El verbo κάμπτω significa doblar o inclinar; en este contexto, «se doble» conserva la imagen física de flexión de la rodilla mejor que una paráfrasis más interpretativa.
- source_word: ἐπουρανίων
  english_pob_choice: in heaven
  chosen_spanish: de los que están en el cielo
  alternatives_spanish:
  - de los celestiales
  - de los seres celestiales
  lexicon: BDAG
  rationale: La forma griega es un genitivo sustantivado; en español se expresa con una referencia personal/sustantivada para mantener la fuerza del conjunto triádico sin perder naturalidad.
- source_word: ἐπιγείων
  english_pob_choice: on earth
  chosen_spanish: de los que están en la tierra
  alternatives_spanish:
  - de los terrenales
  - de los seres de la tierra
  lexicon: BDAG
  rationale: Se conserva el paralelismo con la primera cláusula y el alcance de esfera/ámbito de la expresión griega.
- source_word: καταχθονίων
  english_pob_choice: under the earth
  chosen_spanish: debajo de la tierra
  alternatives_spanish:
  - en el mundo inferior
  - en el inframundo
  lexicon: BDAG
  rationale: Se mantiene la imagen espacial del griego sin introducir un término más interpretativo como «inframundo».
theological_decisions:
- issue: Alcance cósmico de la tríada «ἐπουρανίων καὶ ἐπιγείων καὶ καταχθονίων»
  english_pob_reading: A cosmic, universal scope of all created realms is preserved without specifying more than the text states about the identity of each group.
  chosen_spanish_reading: Se preserva un alcance cósmico y universal de los ámbitos nombrados, sin precisar más de lo que el texto dice sobre la identidad de cada grupo.
  alternative_spanish_readings:
  - una explicitación de ángeles, humanos y muertos
  - una lectura más interpretiva con demonios e inframundo
  rationale: El versículo subraya la universalidad del homenaje a Jesús; la traducción mantiene esa amplitud y evita sobreespecificar identidades no explícitas en el griego.
  doctrine_reference: Filipenses 2:10; cf. Isaías 45:23
- issue: Relación entre el nombre de Jesús y la reverencia expresa
  english_pob_reading: at the name of Jesus
  chosen_spanish_reading: en el nombre de Jesús
  alternative_spanish_readings:
  - ante el nombre de Jesús
  - al nombre de Jesús
  rationale: La preposición española más cercana al griego es «en»; la reverencia se expresa no por cambiar la preposición, sino por el acto de doblar la rodilla en ese nombre.
  doctrine_reference: Filipenses 2:9-11
translation_notes:
  revision_awareness: Se tuvo en cuenta la última revisión inglesa que prefirió una estructura genitiva más directa para ἐπουρανίων καὶ ἐπιγείων καὶ καταχθονίων; por eso el español evita una mera serie adverbial y conserva la relación mediante «de los que están...», manteniendo el paralelo de esferas sin sobreinterpretación.
  spanish_consistency_notes:
  - Se usa «Jesús» según el estándar del proyecto para Ἰησοῦς.
  - Se preserva «nombre» sin sustituirlo por una paráfrasis de autoridad o presencia, para no perder el vínculo lexical directo con ὀνόματι.
  - «toda rodilla» mantiene la imagen física y retórica del original.
  - Las expresiones espaciales se distribuyen de forma paralela para reflejar la tríada griega con claridad y ritmo.
  - Las notas al pie están ancladas explícitamente en [a] y [b] dentro del texto para cumplir la validación del registro.
