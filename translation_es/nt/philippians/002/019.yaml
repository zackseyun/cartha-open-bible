translation:
  language: es
  text: Pero espero en el Señor Jesús enviarles pronto a Timoteo, para que yo también me anime[a] al saber las cosas acerca de ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «cuando conozca lo referente a ustedes» o «habiendo sabido las cosas acerca de ustedes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐλπίζω
  english_pob_choice: I hope
  chosen_spanish: espero
  alternatives_spanish:
  - confío
  - aguardo
  lexicon: BDAG
  rationale: «Espero» reproduce el valor presente de expectativa confiada de ἐλπίζω y funciona de manera natural en español sin perder la intención personal de Pablo.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Ahora bien
  - Y
  lexicon: BDAG
  rationale: «Pero» conserva el giro discursivo suave que marca δέ y corresponde bien al enlace con el contexto anterior.
- source_word: ἐν κυρίῳ Ἰησοῦ
  english_pob_choice: in the Lord Jesus
  chosen_spanish: en el Señor Jesús
  alternatives_spanish:
  - por el Señor Jesús
  - en el Señor Jesucristo
  lexicon: BDAG
  rationale: Se mantiene la preposición «en» y el título «Señor» para κύριος, siguiendo el valor relacional de la frase y la guía doctrinal del proyecto para κύριος.
- source_word: Τιμόθεον
  english_pob_choice: Timothy
  chosen_spanish: Timoteo
  alternatives_spanish:
  - Timotheo
  lexicon: Transliteración estándar
  rationale: Nombre propio transliterado con la forma usual en español bíblico.
- source_word: ταχέως
  english_pob_choice: soon
  chosen_spanish: pronto
  alternatives_spanish:
  - enseguida
  - rápidamente
  lexicon: BDAG
  rationale: «Pronto» expresa mejor el matiz temporal de expectativa de envío que «rápidamente», que focalizaría más la velocidad del acto.
- source_word: πέμψαι
  english_pob_choice: to send
  chosen_spanish: enviar
  alternatives_spanish:
  - mandar
  - despachar
  lexicon: BDAG
  rationale: El infinitivo aoristo se expresa de forma natural con «enviar»; «despachar» sería demasiado administrativo y «mandar» menos preciso en registro.
- source_word: ὑμῖν
  english_pob_choice: to you
  chosen_spanish: les
  alternatives_spanish:
  - a ustedes
  - para ustedes
  lexicon: BDAG
  rationale: El dativo de destinatario se integra de modo idiomático en español con pronombre de objeto indirecto.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: «Para que» comunica con claridad la finalidad de la cláusula sin forzar el registro.
- source_word: κἀγὼ
  english_pob_choice: I too
  chosen_spanish: yo también
  alternatives_spanish:
  - también yo
  - aun yo
  lexicon: BDAG
  rationale: «Yo también» conserva la inclusión enfática de Pablo junto con otros y suena natural en español.
- source_word: εὐψυχῶ
  english_pob_choice: may be encouraged
  chosen_spanish: sea animado
  alternatives_spanish:
  - sea alentado
  - me sienta con ánimo
  lexicon: BDAG
  rationale: «Sea animado» transmite el estado de buen ánimo/fortalecimiento interior del verbo sin perder su fuerza afectiva.
- source_word: γνοὺς
  english_pob_choice: when I learn
  chosen_spanish: cuando conozca
  alternatives_spanish:
  - al saber
  - habiendo sabido
  lexicon: BDAG
  rationale: Aunque el participio aoristo apunta formalmente a una acción previa, en español la relación temporal se expresa mejor con «cuando conozca» para mantener fluidez y sentido.
- source_word: τὰ περὶ ὑμῶν
  english_pob_choice: the things concerning you
  chosen_spanish: lo referente a ustedes
  alternatives_spanish:
  - las cosas acerca de ustedes
  - las noticias acerca de ustedes
  lexicon: BDAG
  rationale: Se preserva el valor relativamente literal de τὰ περὶ ὑμῶν sin volverlo opaco; «lo referente a ustedes» recoge el alcance general de sus circunstancias o noticias.
theological_decisions:
- issue: Rendering of κύριος in ἐν κυρίῳ Ἰησοῦ
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Dueño
  - Maestro
  rationale: Se mantiene «Señor» como título cristológico estándar y como equivalente más fiel al uso de κύριος en este contexto, sin ocultar el valor reverencial del nombre de Jesús.
  doctrine_reference: 'Contested terms: κύριος → Señor'
translation_notes:
  revision_awareness: 'La versión española sigue la última revisión del texto base inglés en la cláusula final: se evitó una paráfrasis como «cómo están» y se conservó una expresión más cercana a γνοὺς τὰ περὶ ὑμῶν, reflejando la decisión revisada del POB en inglés.'
  spanish_consistency_notes:
  - Se conserva «Señor Jesús» de manera consistente con la guía del proyecto para κύριος.
  - «Timoteo» sigue la transliteración bíblica estándar en español.
  - Se eligió un registro sobrio y publicable, evitando tanto un calco duro como una paráfrasis excesiva.
  - La nota al pie está anclada en el texto con [a] y corresponde a la alternativa lexical preservada por el audit trail inglés.
