translation:
  language: es
  text: Así que, si hay algún aliento en Mesías, si algún consuelo que proviene del amor, si alguna comunión del Espíritu[a], si hay algún afecto entrañable y compasión,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «participación en el Espíritu»; menos probable, «comunión en espíritu».'
    reason: alternative_reading
lexical_decisions:
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - Por tanto
  - Entonces
  lexicon: BDAG
  rationale: Expresa bien la conexión inferencial y discursiva de οὖν en un español natural, sin volver demasiado solemne la transición.
- source_word: παράκλησις
  english_pob_choice: encouragement
  chosen_spanish: exhortación
  alternatives_spanish:
  - ánimo
  - consuelo
  - aliento
  lexicon: BDAG
  rationale: El contexto enumera motivos y apelaciones para la unidad; «exhortación» conserva la fuerza de llamada/estímulo de παράκλησις. Aunque «ánimo» o «aliento» suenan naturales, pueden perder parte de la carga exhortativa.
- source_word: ἐν Χριστῷ
  english_pob_choice: in Messiah
  chosen_spanish: en Mesías
  alternatives_spanish:
  - en Cristo
  lexicon: BDAG
  rationale: Se conserva «Mesías» siguiendo la decisión terminológica del proyecto para Χριστός cuando funciona como título. «En» mantiene el valor básico de ἐν.
- source_word: παραμύθιον
  english_pob_choice: comfort
  chosen_spanish: consuelo
  alternatives_spanish:
  - confort
  - consuelo tierno
  - consolación
  lexicon: BDAG
  rationale: «Consuelo» comunica bien el valor de palabra consoladora o alivio afectivo y permite distinguirlo de παράκλησις, que se vertió como «exhortación».
- source_word: ἀγάπης
  english_pob_choice: from love
  chosen_spanish: del amor
  alternatives_spanish:
  - por amor
  - que proviene del amor
  lexicon: BDAG
  rationale: 'El genitivo se expresa de modo natural como origen o procedencia: consuelo que proviene del amor. «Del amor» es idiomático en español y no fuerza una paráfrasis excesiva.'
- source_word: κοινωνία
  english_pob_choice: fellowship
  chosen_spanish: comunión
  alternatives_spanish:
  - participación
  - compañerismo
  - fellowship
  lexicon: BDAG
  rationale: «Comunión» preserva la dimensión relacional y compartida de κοινωνία en un registro eclesial comprensible en español, sin reducirla a mera socialidad.
- source_word: πνεύματος
  english_pob_choice: of the Spirit
  chosen_spanish: del Espíritu
  alternatives_spanish:
  - en espíritu
  - del espíritu
  lexicon: BDAG
  rationale: Dado el contexto de bendiciones cristianas, la lectura más probable apunta al Espíritu Santo. Se mantiene la referencia directa sin intentar resolver en exceso la ambigüedad del genitivo.
- source_word: σπλάγχνα
  english_pob_choice: affection
  chosen_spanish: afectos entrañables
  alternatives_spanish:
  - entrañas
  - ternura
  - afecto profundo
  lexicon: BDAG
  rationale: σπλάγχνα tiene un trasfondo corporal idiomático para afecto profundo; «afectos entrañables» conserva la intensidad afectiva sin sonar demasiado anatómico o arcaizante.
- source_word: οἰκτιρμοί
  english_pob_choice: compassion
  chosen_spanish: compasiones
  alternatives_spanish:
  - misericordias
  - piedades
  - compasión
  lexicon: BDAG
  rationale: «Compasiones» refleja el plural del griego y mantiene la correspondencia con σπλάγχνα; aunque menos común en español moderno, aquí conserva mejor el paralelismo del texto.
theological_decisions:
- issue: Sentido de ἐν Χριστῷ y su terminología cristológica
  english_pob_reading: in Messiah
  chosen_spanish_reading: en Mesías
  alternative_spanish_readings:
  - en Cristo
  rationale: Se conserva el título mesiánico en español por fidelidad a la política terminológica del proyecto y porque el contexto permite leer Χριστός como título, no solo como nombre propio.
  doctrine_reference: Cristología / terminología titularya de Χριστός.
- issue: Ambigüedad de κοινωνία πνεύματος
  english_pob_reading: fellowship of the Spirit
  chosen_spanish_reading: comunión del Espíritu
  alternative_spanish_readings:
  - participación en el Espíritu
  - comunión en el espíritu
  rationale: La redacción principal asume la referencia más probable al Espíritu Santo, pero la construcción sigue siendo compacta; por eso conviene mantener abierta la ambigüedad genitiva sin cerrarla artificialmente.
  doctrine_reference: Pneumatología; preservar tensión interpretativa.
translation_notes:
  revision_awareness: 'El contexto auditado del inglés POB pasó por una corrección regresiva importante: se restauró «Messiah» para Χριστός después de que una revisión temporal lo cambiara a «Christ» contra la política del proyecto. La traducción española sigue esa decisión y evita neutralizar el título mesiánico. También se tuvo en cuenta que el POB inglés conservó una nota alternativa para κοινωνία πνεύματος, por lo que la versión española incluye una nota equivalente.'
  spanish_consistency_notes:
  - Se preserva «Mesías» para Χριστός conforme a la política del proyecto.
  - Se mantiene el paralelismo de cuatro miembros condicionales con estructura clara en español.
  - La nota [a] se ancla en «Espíritu» para reflejar la ambigüedad de πνεύματος sin eliminarla.
  - «Compasiones» conserva el plural del griego y el paralelismo con «afectos entrañables».
