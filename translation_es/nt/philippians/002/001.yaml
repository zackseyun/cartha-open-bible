- from: Así que, si hay alguna exhortación[a] en Mesías, si algún consuelo del amor, si alguna comunión del Espíritu, si algunos afectos entrañables y compasiones,
  to: Así que, si hay algún aliento en Mesías, si algún consuelo que proviene del amor, si alguna comunión del Espíritu[a], si hay algún afecto entrañable y compasión,
  rationale: Se ajusta παράκλησις a «aliento» para reflejar mejor el sentido de encouragement documentado por el POB y distinguirlo de παραμύθιον = «consuelo». Se hace más explícito el genitivo de ἀγάπης con «que proviene del amor» para una lectura española más natural y fiel a la rationale auditada. Se mantiene «Mesías» y «comunión del Espíritu» con su nota alternativa. Se simplifica la cola final a «afecto entrañable y compasión» para mayor naturalidad sin pérdida sustancial de sentido.
