translation:
  language: es
  text: se humilló a sí mismo, haciéndose obediente hasta la muerte[a], incluso muerte en una cruz[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hasta morir»; la frase significa que su obediencia se extendió hasta la muerte misma.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «muerte, incluso de cruz»; el sentido es «incluso muerte en una cruz».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐταπείνωσεν
  english_pob_choice: he humbled
  chosen_spanish: se humilló
  alternatives_spanish:
  - se abajó
  - se rebajó
  lexicon: BDAG
  rationale: El verbo expresa el acto voluntario de hacerse bajo; en español, «se humilló» comunica con naturalidad esa auto-humillación sin perder la fuerza activa del griego.
- source_word: ἑαυτὸν
  english_pob_choice: himself
  chosen_spanish: a sí mismo
  alternatives_spanish:
  - él mismo
  lexicon: BDAG
  rationale: El reflexivo explícito se conserva para mantener el énfasis en que la acción recae sobre el propio sujeto y no es pasiva ni impuesta.
- source_word: γενόμενος
  english_pob_choice: becoming
  chosen_spanish: haciéndose
  alternatives_spanish:
  - volviéndose
  - llegando a ser
  lexicon: BDAG
  rationale: 'El participio se vierte de modo natural como una acción concomitante: la humillación se expresa mediante el hacerse obediente, sin fijar más secuencia temporal de la que el griego exige.'
- source_word: ὑπήκοος
  english_pob_choice: obedient
  chosen_spanish: obediente
  alternatives_spanish:
  - sumiso
  lexicon: BDAG
  rationale: «Obediente» es el equivalente directo y claro del adjetivo; mantiene la fuerza ética y cristológica del término sin suavizarlo.
- source_word: μέχρι θανάτου
  english_pob_choice: to the point of death
  chosen_spanish: hasta la muerte
  alternatives_spanish:
  - hasta morir
  - hasta el punto de la muerte
  lexicon: BDAG
  rationale: 'La locución señala extensión límite: la obediencia llega hasta la muerte misma. «Hasta la muerte» es la forma más natural en español y conserva esa totalidad.'
- source_word: δὲ
  english_pob_choice: even
  chosen_spanish: y
  alternatives_spanish:
  - incluso
  - sí, y
  lexicon: BDAG
  rationale: Aquí el valor intensificador se integra con «y muerte de cruz», siguiendo la compresión del griego. En español, una coordinación simple transmite el remate enfático sin sonar forzada.
- source_word: σταυροῦ
  english_pob_choice: on a cross
  chosen_spanish: de cruz
  alternatives_spanish:
  - en una cruz
  - por crucifixión
  lexicon: BDAG
  rationale: El genitivo condensado se refleja de forma breve y fiel en «de cruz», preservando el carácter escandaloso y concreto de la crucifixión.
theological_decisions:
- issue: Intensificación final de θανάτου δὲ σταυροῦ
  english_pob_reading: 'An emphatic escalation: ''even death on a cross'', not a mere restatement of death.'
  chosen_spanish_reading: 'Una culminación enfática: «y muerte de cruz», que no repite solo la idea de morir sino que subraya el tipo vergonzoso de muerte.'
  alternative_spanish_readings:
  - «e incluso muerte de cruz»
  - «y aun muerte en cruz»
  rationale: El griego culmina en la vergüenza concreta de la crucifixión. En español, la forma elegida conserva el cierre contundente sin añadir interpretación doctrinal extra.
  doctrine_reference: Filipenses 2:8; la humillación y obediencia del Mesías hasta la muerte infame de cruz.
translation_notes:
  revision_awareness: 'Se siguió de cerca el aviso auditado del inglés POB: la frase final es una intensificación, no una simple repetición. La versión española conserva esa culminación con una estructura breve y natural. No se documentaron cambios textuales relevantes respecto al testigo griego SBLGNT.'
  spanish_consistency_notes:
  - Se mantuvo «se humilló» para reflejar la acción voluntaria y activa del verbo.
  - Se prefirió «obediente» por claridad y fuerza léxica en el contexto cristológico.
  - Se evitó traducir el título con fórmulas eclesiásticas añadidas; el texto permanece sobrio y directo.
  - La clausula final se dejó concisa para preservar el golpe retórico del griego.
