translation:
  language: es
  text: Por eso Dios también lo exaltó hasta lo sumo y le otorgó el nombre que está por encima de todo nombre[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se lo concedió» para «le otorgó».'
    reason: lexical_alternative
  - marker: b
    text: «El nombre» puede indicar no solo un nombre pronunciado, sino también estatus, rango o título; el versículo aún no precisa cuál es ese nombre.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὸ καὶ
  english_pob_choice: Therefore ... also
  chosen_spanish: Por eso ... también
  alternatives_spanish:
  - Por tanto ... también
  - Por consiguiente ... también
  lexicon: BDAG
  rationale: διό expresa inferencia; καί añade énfasis. «Por eso ... también» conserva ambas fuerzas de modo natural en español.
- source_word: ὁ θεός
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: BDAG
  rationale: El sujeto es explícito y definido; en español se mantiene el uso normal de «Dios» sin artículo en referencia divina personal.
- source_word: ὑπερύψωσεν
  english_pob_choice: highly exalted
  chosen_spanish: lo exaltó sobremanera
  alternatives_spanish:
  - lo exaltó hasta lo sumo
  - lo exaltó al máximo
  lexicon: BDAG
  rationale: El compuesto intensifica «exaltar»; «sobremanera» preserva esa fuerza sin sonar artificial en español.
- source_word: ἐχαρίσατο
  english_pob_choice: graciously gave
  chosen_spanish: le concedió
  alternatives_spanish:
  - le otorgó
  - le dio graciosamente
  - le concedió por gracia
  lexicon: BDAG
  rationale: La forma media de χαρίζομαι conserva el matiz de gracia/favor. «Concedió» expresa el acto de otorgar con dignidad y deja visible el matiz benefactivo; la idea de gracia se explica en la nota léxica si se desea contrastar con «dio».
- source_word: τὸ ὄνομα
  english_pob_choice: the name
  chosen_spanish: el nombre
  alternatives_spanish:
  - el título
  lexicon: BDAG
  rationale: El griego dice literalmente «nombre»; no se resuelve en el texto principal como «título», aunque pueda implicar estatus o dignidad.
- source_word: τὸ ὑπὲρ πᾶν ὄνομα
  english_pob_choice: that is above every name
  chosen_spanish: que está por encima de todo nombre
  alternatives_spanish:
  - que está sobre todo nombre
  - que es superior a todo nombre
  lexicon: BDAG
  rationale: La estructura comparativa se conserva con una formulación natural en español. «Por encima de todo nombre» mantiene el alcance universal sin adelantar la identificación del nombre.
theological_decisions:
- issue: Identidad de «el nombre»
  english_pob_reading: Retained as 'the name' without specifying it in the main text.
  chosen_spanish_reading: Se mantiene como «el nombre» sin identificarlo en el texto principal.
  alternative_spanish_readings:
  - Una referencia al nombre «Jesús»
  - Una referencia al título divino «Señor» desarrollado en los versículos siguientes
  rationale: El versículo no especifica cuál es el nombre; la traducción preserva la apertura textual en vez de importar una conclusión interpretativa desde 2:10–11.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla anticipadamente.
translation_notes:
  revision_awareness: El pasaje se alinea plenamente con la revisión más reciente, que no introdujo cambios respecto del estado previo. La redacción española sigue la decisión del POB en inglés de mantener abierta la identidad de «el nombre» y de preservar el valor intensivo de los verbos griegos sin sobreinterpretación.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y no se introduce «SEÑOR» en este versículo.
  - Se traduce el intensivo ὑπερύψωσεν con una expresión española igualmente enfática.
  - «Concedió» conserva el matiz de otorgamiento benefactivo de ἐχαρίσατο sin fijar innecesariamente «dio» en el cuerpo principal.
  - La nota b explica la posible amplitud semántica de «nombre» sin resolver la referencia dentro del versículo.
