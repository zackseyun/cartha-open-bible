revisions:
- from: Así que recíbanlo en el Señor con toda alegría[a], y tengan en honor a personas como él.
  to: Así que denle la bienvenida en el Señor con toda alegría[a], y tengan en alta estima a tales personas.
  rationale: Se ajustó «recíbanlo» a «denle la bienvenida» para reflejar mejor la acogida cordial de προσδέχεσθε. Se cambió «personas como él» por «tales personas» para seguir más de cerca τοὺς τοιούτους y la revisión del POB inglés. Se reemplazó «tengan en honor» por «tengan en alta estima» para una expresión española más natural que conserva el sentido de considerar a tales personas como dignas de honor. Se mantiene la nota sobre el plural masculino porque preserva una alternativa significativa del original.
