  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: imperativo de recepción, conector inferencial, frase paulina «en el Señor», plenitud de gozo, y mandato de honrar a personas de esa clase. Sin embargo, «personas como él» se aparta innecesariamente del ajuste revisado del POB inglés («such people») y del plural representativo τοὺς τοιούτους; además, «recíbanlo» es aceptable pero algo menos cálido que προσδέχεσθε según la propia justificación léxica.'
  spanish_quality_summary: El español es claro y natural, pero puede mejorarse en precisión y fluidez eclesial. «Denle la bienvenida» comunica mejor la acogida cordial que pide el contexto, y «a tales personas» o «a personas así» suena más fiel y directo que «a personas como él». «Tengan en honor» es comprensible, aunque en español bíblico natural funciona mejor «tengan en alta estima» o «honren».
  glossary_alignment: 'No hay conflictos con la terminología principal del proyecto. «Señor» para κύριος aquí es apropiado. No hay términos teológicos clave del glosario mal manejados. La única tensión relevante es estilística/lexical: el español debería seguir más de cerca la decisión auditada para τοὺς τοιούτους.'
  issues:
  - severity: medium
    issue: «personas como él» no refleja de la mejor manera τοὺς τοιούτους
    rationale: El griego dice literalmente «tales personas/de tal clase». La auditoría inglesa fue revisada precisamente para acercarse a «such people». «Como él» introduce una explicitación ejemplificadora que no es necesaria aquí y debilita la formulación más general del original.
  - severity: medium
    issue: «recíbanlo» es menos cálido que la fuerza de προσδέχεσθε
    rationale: Según la decisión léxica auditada, el verbo pide más que aceptación básica. «Denle la bienvenida» preserva mejor la acogida cordial y pastoral sin sonar forzado.
  - severity: low
    issue: «tengan en honor» es algo calcado y menos idiomático
    rationale: Aunque entendible, en español moderno y digno suena más natural «tengan en alta estima» o «honren a tales personas», manteniendo el sentido de ἐντίμους ἔχετε.
  revised_spanish_text: Así que denle la bienvenida en el Señor con toda alegría[a], y tengan en alta estima a tales personas.
