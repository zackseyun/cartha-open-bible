translation:
  language: es
  text: Así que denle la bienvenida en el Señor con toda alegría[a], y tengan en alta estima a tales personas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tales hombres». El griego usa aquí una expresión masculina plural.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσδέχεσθε
  english_pob_choice: welcome
  chosen_spanish: recíbanlo
  alternatives_spanish:
  - denle la bienvenida
  - acéptenlo
  lexicon: BDAG
  rationale: El verbo pide una recepción activa y cordial; «reciban» conserva la idea de dar acogida, y el objeto directo masculino singular sigue al referente concreto del contexto.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - Por tanto
  - Entonces
  lexicon: valor inferencial del conector
  rationale: «Así que» expresa bien la relación conclusiva sin sonar excesivamente rígido en español actual.
- source_word: ἐν κυρίῳ
  english_pob_choice: in the Lord
  chosen_spanish: en el Señor
  alternatives_spanish:
  - como perteneciente al Señor
  - en unión con el Señor
  lexicon: BDAG
  rationale: Se mantiene la frase paulina compacta y reconocible, sin expandirla más allá de lo que exige el griego.
- source_word: μετὰ πάσης χαρᾶς
  english_pob_choice: with all joy
  chosen_spanish: con toda alegría
  alternatives_spanish:
  - con gran alegría
  - con plena alegría
  lexicon: BDAG
  rationale: «Toda alegría» reproduce el alcance de πάσης y suena natural en español; «alegría» comunica bien el matiz emocional de χαρά.
- source_word: τοὺς τοιούτους
  english_pob_choice: such people
  chosen_spanish: personas como él
  alternatives_spanish:
  - personas así
  - tales personas
  lexicon: BDAG
  rationale: Aunque el griego usa plural masculino, en español «personas como él» transmite con naturalidad el referente ejemplar y permite reflejar el matiz masculino en el siguiente elemento, sin volver la frase áspera.
- source_word: ἐντίμους ἔχετε
  english_pob_choice: hold such people in honor
  chosen_spanish: tengan en honor
  alternatives_spanish:
  - honren a tales personas
  - trátenlas con honor
  lexicon: BDAG
  rationale: «Tener en honor» conserva el valor de considerar y tratar como dignos de honor; es una expresión clara y suficientemente literal para ἔχετε ἐντίμους.
theological_decisions:
- issue: Alcance de «en el Señor»
  english_pob_reading: Keeps the compact Pauline phrase intact and preserves its relational/spiritual sense without paraphrase.
  chosen_spanish_reading: Mantener «en el Señor» sin explicación adicional.
  alternative_spanish_readings:
  - como creyentes del Señor
  - en comunión con el Señor
  rationale: El contexto paulino permite conservar la fórmula breve y teológicamente densa; añadir explicación reduciría su fuerza y su auditabilidad textual.
  doctrine_reference: unión con Cristo / pertenencia al Señor
translation_notes:
  revision_awareness: La revisión inglesa cambió de «people like him» a «such people» para acercarse más a τοὺς τοιούτους. La versión española refleja esa mayor literalidad con «personas como él», manteniendo naturalidad y señalando el matiz masculino en la nota.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κυρίῳ, conforme al uso paulino y a la frase fija «en el Señor».
  - «Alegría» se eligió como equivalente natural de χαρά en un registro bíblico actual.
  - La nota al pie conserva el dato gramatical del masculino plural sin recargar el texto principal.
  - «Personas» evita la restricción genérica de «hombres» en el cuerpo del texto, pero la nota preserva la alternativa masculina documentada.
