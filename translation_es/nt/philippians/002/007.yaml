translation:
  language: es
  text: sino que se vació a sí mismo[a], tomando la forma de esclavo[b], llegando a ser en semejanza humana[c]; y siendo hallado en apariencia como un ser humano[d]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se hizo nada».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «la forma de un siervo».'
    reason: lexical_alternative
  - marker: c
    text: 'Griego: γενόμενος ἐν ὁμοιώματι ἀνθρώπων, lit. «llegando a ser en la semejanza de los seres humanos». «Semejanza» conserva ὁμοίωμα y no debe leerse como una negación de su verdadera humanidad.'
    reason: cross_reference
  - marker: d
    text: 'O: «como un hombre»; aquí ἄνθρωπος es genérico, no específico de género.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  english_pob_choice: but
  chosen_spanish: sino que
  alternatives_spanish:
  - pero
  lexicon: —
  rationale: Introduce el contraste fuerte con la cláusula anterior de modo natural en español; aquí ‘sino que’ funciona mejor que un simple ‘pero’ para enlazar con el verbo principal y mantener el giro adversativo del griego.
- source_word: ἑαυτὸν
  english_pob_choice: himself
  chosen_spanish: a sí mismo
  alternatives_spanish:
  - él mismo
  lexicon: —
  rationale: Mantiene el valor reflexivo directo del pronombre sin añadir énfasis ajeno al texto.
- source_word: ἐκένωσεν
  english_pob_choice: emptied himself
  chosen_spanish: se vació a sí mismo
  alternatives_spanish:
  - se hizo nada
  - se despojó de sí mismo
  lexicon: BDAG
  rationale: Conserva la metáfora de vaciar/emptiar asociada a κενόω. En español ‘se vació a sí mismo’ preserva el tenor literal y deja que los participios siguientes expliquen el modo de ese vaciamiento, sin convertirlo en una teoría cristológica desarrollada.
- source_word: μορφὴν
  english_pob_choice: form
  chosen_spanish: forma
  alternatives_spanish:
  - naturaleza
  - condición
  lexicon: BDAG
  rationale: ‘Forma’ mantiene la correspondencia con μορφή y deja intacto el paralelismo con σχήματι más adelante. No se resuelve en ‘naturaleza’ ni en ‘condición’ para no borrar la tensión deliberada del pasaje.
- source_word: δούλου
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - criado
  lexicon: BDAG
  rationale: Se conserva la fuerza lexical de δοῦλος. En este contexto de humillación, ‘esclavo’ es más preciso que ‘siervo’ y sigue el criterio POB de no suavizar el término.
- source_word: λαβών
  english_pob_choice: taking
  chosen_spanish: tomando
  alternatives_spanish:
  - habiendo tomado
  lexicon: —
  rationale: Participio aoristo de medio/ modo; ‘tomando’ suena natural en español y mantiene la relación modal con el vaciamiento.
- source_word: γενόμενος ἐν ὁμοιώματι ἀνθρώπων
  english_pob_choice: becoming in the likeness of men
  chosen_spanish: viniendo a ser en semejanza de los seres humanos
  alternatives_spanish:
  - llegando a ser en semejanza de los hombres
  - haciéndose en semejanza de los seres humanos
  lexicon: BDAG
  rationale: ‘Viniendo a ser’ refleja el sentido de γίνομαι con un matiz de llegada a un estado/condición, sin forzar ‘nacer’ si el griego no lo dice explícitamente. ‘Semejanza’ preserva ὁμοίωμα sin reducirlo a mera apariencia. ‘Seres humanos’ traduce el plural genérico ἀνθρώπων de forma inclusiva y no marcada por género.
- source_word: σχήματι εὑρεθεὶς ὡς ἄνθρωπος
  english_pob_choice: being found in appearance as a man
  chosen_spanish: hallado en apariencia como un ser humano
  alternatives_spanish:
  - hallado en forma exterior como ser humano
  - reconocido en aspecto como hombre
  lexicon: BDAG
  rationale: ‘Apariencia’ reproduce el valor visible/externo de σχῆμα y distingue este término de μορφή. ‘Como un ser humano’ evita restringir innecesariamente ἄνθρωπος a un masculino genérico cuando el griego es inclusivo; además mantiene la observación auditada de que el sustantivo es genérico.
theological_decisions:
- issue: Sentido de ‘se vació a sí mismo’ (ἐκένωσεν) sin imponer una teoría kenótica
  english_pob_reading: Retain the metaphor 'emptied himself' and let the participles define the manner of the self-emptying.
  chosen_spanish_reading: Conservar la metáfora ‘se vació a sí mismo’ y dejar que los participios (‘tomando...’, ‘viniendo a ser...’, ‘hallado...’) definan el modo de ese vaciamiento.
  alternative_spanish_readings:
  - se despojó de sus atributos divinos
  - se hizo nada
  rationale: El versículo explica el vaciamiento por medio de acciones concretas de humillación e incorporación humana. La traducción debe preservar esa tensión sin adelantar una conclusión doctrinal que el texto no formula por sí mismo.
  doctrine_reference: Credo de Nicea (381); Definición de Calcedonia (451)
- issue: Relación entre ‘semejanza de los seres humanos’ y ‘apariencia como un ser humano’
  english_pob_reading: Translate ὁμοίωμα as 'likeness' without suggesting mere appearance or a denial of true humanity.
  chosen_spanish_reading: Traducir ὁμοίωμα como ‘semejanza’ y σχήμα como ‘apariencia’, manteniendo la tensión entre ambos sin convertirla en negación de la verdadera humanidad de Cristo.
  alternative_spanish_readings:
  - mera apariencia humana
  - plena identidad expresada sin matiz
  rationale: La primera cláusula preserva la semejanza; la segunda, el aspecto visible. Juntas conservan el balance del griego y evitan resolver en exceso si Pablo quiere enfatizar la similitud, la manifestación externa o ambas cosas.
  doctrine_reference: Definición de Calcedonia (451)
- issue: Valor genérico de ἄνθρωπος en el cierre de la frase
  english_pob_reading: Or 'as a human being' / 'as a man'; the Greek singular ἄνθρωπος is generic (not gender-specific).
  chosen_spanish_reading: Usar ‘como un ser humano’ para expresar el valor genérico de ἄνθρωπος sin introducir un masculino marcado innecesario.
  alternative_spanish_readings:
  - como un hombre
  - como una persona humana
  rationale: En español, ‘ser humano’ comunica con claridad el valor genérico y evita que ‘hombre’ se lea como exclusión de mujeres o como una especificación más fuerte de la que el griego exige.
  doctrine_reference: —
translation_notes:
  revision_awareness: La redacción toma en cuenta la revisión más reciente del inglés POB que pasó de una formulación tipo ‘being born in human likeness’ a ‘becoming in the likeness of men’ para reflejar más directamente γενόμενος y distinguir σχήματι de μορφή. En español se decide ‘viniendo a ser...’ y ‘hallado en apariencia...’ para conservar esa distinción sin forzar ‘nacer’ donde el griego no lo dice explícitamente.
  spanish_consistency_notes:
  - Se mantiene ‘esclavo’ para δοῦλος, conforme al criterio POB de conservar la fuerza lexical.
  - Se usa ‘semejanza’ para ὁμοίωμα y ‘apariencia’ para σχῆμα, manteniendo la distinción terminológica.
  - Se evita ‘Señor’ como sustituto de Yahvé porque este versículo no contiene el nombre divino.
  - Se emplea un masculino genérico evitado cuando el español permite una formulación inclusiva y fiel (‘ser humano’).
