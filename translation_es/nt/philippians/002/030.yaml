translation:
  language: es
  text: porque, por la obra del Mesías[a], estuvo cerca de la muerte, arriesgando su vida para suplir lo que faltaba en vuestro servicio hacia mí[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por la obra de Cristo».'
    reason: alternative_reading
  - marker: b
    text: «Lo que faltaba» se refiere al servicio que los filipenses no podían prestar personalmente por su ausencia, no a falta de voluntad de su parte.
    reason: cultural_note
lexical_decisions:
- source_word: διὰ τὸ ἔργον Χριστοῦ
  english_pob_choice: for the work of the Messiah
  chosen_spanish: por la obra del Mesías
  alternatives_spanish:
  - porque, por causa de la obra del Mesías
  - por la obra de Cristo
  lexicon: BDAG
  rationale: διά con acusativo expresa causa o motivo; en español, 'por' transmite bien ese valor sin añadir una explicación más fuerte que el griego. 'Obra' conserva ἔργον de manera directa. 'Mesías' sigue la política del proyecto para Χριστός como título, no como mero nombre propio.
- source_word: Χριστοῦ
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Aquí Χριστοῦ funciona como título cristológico. 'Mesías' preserva el valor semántico y evita convertirlo en una forma litúrgica fija sin necesidad textual.
- source_word: ἤγγισεν
  english_pob_choice: he came near to death
  chosen_spanish: llegó hasta la muerte
  alternatives_spanish:
  - estuvo cerca de la muerte
  - se acercó a la muerte
  lexicon: BDAG
  rationale: El verbo expresa que alcanzó el umbral de la muerte. 'Llegó hasta la muerte' mantiene la idea de proximidad extrema y suena natural en español.
- source_word: παραβολευσάμενος τῇ ψυχῇ
  english_pob_choice: risking his life
  chosen_spanish: arriesgando su vida
  alternatives_spanish:
  - poniendo en peligro su vida
  - jugándose la vida
  lexicon: BDAG
  rationale: El participio indica exposición peligrosa. 'Su vida' es la mejor equivalencia contextual para ψυχή aquí, porque se refiere a la vida terrenal y no requiere 'alma' en español.
- source_word: ἵνα ἀναπληρώσῃ
  english_pob_choice: to make up for
  chosen_spanish: para suplir
  alternatives_spanish:
  - para completar
  - para llenar
  lexicon: BDAG
  rationale: La cláusula final expresa propósito de suplir una carencia práctica. 'Suplir' comunica bien ἀναπληρόω en este contexto sin insinuar una falta moral.
- source_word: τὸ ὑμῶν ὑστέρημα
  english_pob_choice: what was lacking
  chosen_spanish: lo que faltaba
  alternatives_spanish:
  - vuestra carencia
  - lo que estaba faltando
  lexicon: BDAG
  rationale: ὑστέρημα denota una ausencia práctica, no culpa. 'Lo que faltaba' es claro, neutral y fiel al matiz del texto.
- source_word: τῆς πρός με λειτουργίας
  english_pob_choice: your service to me
  chosen_spanish: en vuestro servicio para conmigo
  alternatives_spanish:
  - de vuestro servicio para conmigo
  - en vuestra ministración para conmigo
  lexicon: BDAG
  rationale: λειτουργία puede ser 'servicio' o 'ministerio'. Aquí 'servicio para conmigo' conserva la referencia al apoyo prestado a Pablo sin imponer un registro eclesiástico más técnico que el contexto no exige.
theological_decisions:
- issue: Rendering of Χριστός as a title in a Pauline context
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: El pasaje habla de la obra de Cristo como título mesiánico. Traducirlo como 'Mesías' mantiene audible la carga teológica del término, en consonancia con la política del proyecto y con el griego original.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
translation_notes:
  revision_awareness: 'El borrador en inglés pasó por una revisión que ajustó la relación causal de διά con acusativo y revirtió un cambio no deseado de ''Messiah'' a ''Christ''. Este draft español sigue la línea corregida: mantiene a Χριστός como ''Mesías'' y refleja la causalidad con ''por''.'
  spanish_consistency_notes:
  - Se mantiene 'Mesías' para Χριστός conforme a la terminología del proyecto.
  - '''Vida'' se usa para ψυχή según el valor contextual de riesgo físico, no ''alma''.'
  - '''Servicio'' conserva la amplitud de λειτουργία y evita sobrecargar el verso con vocabulario técnico eclesial.'
  - 'La puntuación reproduce el flujo causal del griego: causa, acción de riesgo y propósito final.'
