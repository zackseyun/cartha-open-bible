translation:
  language: es
  text: Confío en el Señor en que yo mismo también vendré pronto[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Tengo confianza en el Señor en que yo también vendré pronto».'
    reason: lexical_alternative
lexical_decisions:
- source_word: πέποιθα
  english_pob_choice: I am confident
  chosen_spanish: tengo confianza
  alternatives_spanish:
  - estoy convencido
  - confío
  lexicon: BDAG
  rationale: El perfecto de πείθω expresa un estado presente de confianza asentada. «Tengo confianza» conserva ese sentido resultativo con español natural y digno, sin endurecerlo como certeza absoluta.
- source_word: ἐν κυρίῳ
  english_pob_choice: in the Lord
  chosen_spanish: en el Señor
  alternatives_spanish:
  - por el Señor
  - con el Señor
  lexicon: BDAG
  rationale: Se mantiene la expresión paulina estándar y su idea de esfera o fundamento de la confianza. «Señor» es el equivalente normal de κύριος en este contexto.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: de que
  alternatives_spanish:
  - que
  lexicon: BDAG
  rationale: Introduce de manera natural en español el contenido de la confianza de Pablo. «De que» evita una construcción demasiado dura tras «tengo confianza».
- source_word: καὶ αὐτός
  english_pob_choice: I myself also
  chosen_spanish: yo mismo también
  alternatives_spanish:
  - también yo mismo
  - yo también personalmente
  lexicon: BDAG
  rationale: La combinación de καί con αὐτός aporta énfasis personal además de adición. «Yo mismo también» conserva ambos matices sin perder fluidez.
- source_word: ταχέως
  english_pob_choice: soon
  chosen_spanish: pronto
  alternatives_spanish:
  - dentro de poco
  - en breve
  lexicon: BDAG
  rationale: Aquí la referencia es temporal, no al modo de viajar. «Pronto» es la opción más natural y fiel en español.
- source_word: ἐλεύσομαι
  english_pob_choice: will come
  chosen_spanish: iré
  alternatives_spanish:
  - vendré
  lexicon: BDAG
  rationale: Aunque ἔρχομαι suele traducirse «venir» desde la perspectiva de los destinatarios, el español fluye mejor con «iré» cuando Pablo habla de su desplazamiento hacia ellos. La idea direccional hacia los filipenses queda implícita en el contexto.
theological_decisions:
- issue: El alcance de la confianza de Pablo respecto al Señor
  english_pob_reading: I am confident in the Lord that I myself also will come soon.
  chosen_spanish_reading: Tengo confianza en el Señor de que yo mismo también iré pronto.
  alternative_spanish_readings:
  - Confío en el Señor que yo mismo también vendré pronto.
  - Tengo confianza en el Señor de que yo mismo también vendré pronto.
  rationale: 'Se preserva la dependencia teológica: la expectativa de Pablo está fundada «en el Señor», no en optimismo personal. La redacción no convierte la frase en una revelación absoluta ni elimina la tensión implícita del texto.'
  doctrine_reference: Mantener la tensión teológica sin resolverla de más
translation_notes:
  revision_awareness: La versión inglesa revisada ajustó el orden de «I myself also» para reflejar mejor καὶ αὐτός. En español se reflejó con «yo mismo también», manteniendo el énfasis personal y la adición sin forzar el orden inglés. También se respetó «soon» como valor temporal y la dependencia «en el Señor» como base de la confianza.
  spanish_consistency_notes:
  - Se usó «Señor» para κύριος, conforme al estándar del proyecto.
  - Se eligió «tengo confianza» para conservar el valor presente del perfecto πέποιθα con naturalidad en español.
  - «Yo mismo también» reproduce el énfasis de καὶ αὐτός sin añadir información.
  - «Iré» se eligió por fluidez idiomática; en nota se mantiene la alternativa «vendré» para conservar la perspectiva deíctica posible.
