    reason: lexical_alternative
  - marker: b
    text: “Servicio” también puede traducirse “ministerio” o “servicio sacerdotal”; el griego conserva aquí un lenguaje de culto.
    reason: lexical_alternative
  - marker: c
    text: 'O: “su fidelidad”.'
    reason: alternative_reading
  revision_rationale: Se conserva la estructura y el sentido del borrador, pero se ajusta la cláusula final a un español más natural con “junto con todos ustedes”, sin apartarse del valor compartido de συγχαίρω. También se completa la nota sobre λειτουργία para incluir “servicio sacerdotal”, alternativa documentada en la auditoría inglesa y útil para preservar el matiz cultual del original.
