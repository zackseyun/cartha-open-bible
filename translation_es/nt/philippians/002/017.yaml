  text: ἀλλὰ εἰ καὶ σπένδομαι ἐπὶ τῇ θυσίᾳ καὶ λειτουργίᾳ τῆς πίστεως ὑμῶν, χαίρω καὶ συγχαίρω πᾶσιν ὑμῖν·
base_translation:
  language: en
  yaml_path: translation/nt/philippians/002/017.yaml
  text: But even if I am being poured out as a drink offering upon the sacrifice and service of your faith[c][b][a], I rejoice and rejoice with all of you.
