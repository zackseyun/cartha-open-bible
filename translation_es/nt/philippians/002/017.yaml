translation:
  language: es
  text: Pero aun si soy derramado como ofrenda de libación sobre el sacrificio y servicio de su fe[a][b][c], me regocijo y me regocijo junto con todos ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “soy derramado como libación”.'
    reason: lexical_alternative
  - marker: b
    text: “Servicio” también puede traducirse “ministerio” o “servicio sacerdotal”; el griego conserva aquí un lenguaje de culto.
    reason: lexical_alternative
  - marker: c
    text: 'O: “su fidelidad”.'
    reason: alternative_reading
lexical_decisions:
- source_word: σπένδομαι
  english_pob_choice: I am being poured out as a drink offering
  chosen_spanish: soy derramado como ofrenda de libación
  alternatives_spanish:
  - soy derramado
  - soy ofrecido como libación
  lexicon: BDAG
  rationale: El verbo conserva la imagen cultual de una libación derramada. En español, “ofrenda de libación” comunica mejor el sentido sacrificial que un simple “derramado”, sin perder la metáfora original.
- source_word: ἐπὶ
  english_pob_choice: upon
  chosen_spanish: sobre
  alternatives_spanish:
  - sobre
  - en relación con
  - a
  lexicon: BDAG
  rationale: Con los sustantivos cultuales que siguen, la preposición expresa adecuadamente la idea de algo derramado sobre la ofrenda de los filipenses.
- source_word: θυσίᾳ
  english_pob_choice: sacrifice
  chosen_spanish: sacrificio
  alternatives_spanish:
  - ofrenda
  lexicon: BDAG
  rationale: θυσία es el término sacrificial estándar; “sacrificio” preserva la imagen de culto y su conexión con el lenguaje de ofrenda.
- source_word: λειτουργίᾳ
  english_pob_choice: service
  chosen_spanish: servicio
  alternatives_spanish:
  - ministerio
  - servicio sacerdotal
  lexicon: BDAG
  rationale: Aunque λειτουργία puede tener matiz de servicio sagrado o ministerial, la revisión inglesa reciente optó por “service” como versión más neutral. En español, “servicio” mantiene la referencia cultual sin sobrecargarla con un término más interpretativo.
- source_word: πίστεως
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - fidelidad
  lexicon: BDAG
  rationale: Por defecto del proyecto, πίστις se traduce “fe” en el texto principal. Aquí encaja de modo natural como la respuesta creyente de la comunidad, presentada casi como una ofrenda.
- source_word: χαίρω
  english_pob_choice: I rejoice
  chosen_spanish: me regocijo
  alternatives_spanish:
  - me alegro
  - me gozo
  lexicon: BDAG
  rationale: “Me regocijo” conserva el tono fuerte y repetido del gozo paulino en Filipenses y corresponde bien al presente del original.
- source_word: συγχαίρω
  english_pob_choice: rejoice with
  chosen_spanish: me regocijo con
  alternatives_spanish:
  - me alegro con
  - me gozo con
  lexicon: BDAG
  rationale: El verbo compuesta expresa gozo compartido; “me regocijo con” reproduce directamente la idea de alegrarse junto con otros, como en la revisión inglesa final.
- source_word: πᾶσιν ὑμῖν
  english_pob_choice: with all of you
  chosen_spanish: con todos ustedes
  alternatives_spanish:
  - con ustedes todos
  - con todos vosotros
  lexicon: BDAG
  rationale: La frase inclusiva se expresa de manera natural en español con “con todos ustedes”, manteniendo el énfasis comunitario del original.
theological_decisions:
- issue: Imaginería cultual aplicada a la posible muerte de Pablo
  english_pob_reading: Paul describes himself metaphorically as being poured out as a drink offering in addition to the Philippians' sacrifice and service.
  chosen_spanish_reading: Pablo se describe metafóricamente como derramado como ofrenda de libación, añadido al sacrificio y servicio de la fe de los filipenses.
  alternative_spanish_readings:
  - Pablo solo habla de estar derramado junto a su servicio
  - Pablo usa una metáfora menos explícitamente sacrificial
  rationale: La acumulación de σπένδομαι, θυσία y λειτουργία exige conservar el marco sacrificial. Traducirlo de forma más genérica diluiría la tensión teológica y literaria del versículo.
  doctrine_reference: Filipenses 2:17; lenguaje sacrificial del NT
- issue: Valor de πίστις como fe o fidelidad
  english_pob_reading: Or 'your faithfulness.'
  chosen_spanish_reading: fe
  alternative_spanish_readings:
  - fidelidad
  rationale: La lectura principal sigue el uso normal de πίστις como fe. Se conserva la alternativa porque en contexto puede percibirse una cualidad de fidelidad comunitaria, aunque es menos probable como sentido primario.
  doctrine_reference: Filipenses 2:17; πίστις
- issue: Repetición de la alegría en συγχαίρω
  english_pob_reading: I rejoice and rejoice with all of you.
  chosen_spanish_reading: me regocijo y me regocijo con todos ustedes.
  alternative_spanish_readings:
  - me alegro y me alegro con todos ustedes
  - me regocijo y comparto mi alegría con todos ustedes
  rationale: Se conserva la repetición del texto griego y la decisión inglesa revisada de reflejar συγχαίρω de modo directo con un verbo de regocijo compartido.
  doctrine_reference: Filipenses 2:17; vocabulario de gozo paulino
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó 'priestly service' por 'service' para λειτουργίᾳ y cambió 'share my joy with' por 'rejoice with'. La versión española sigue esa actualización con 'servicio' y 'me regocijo con', manteniendo además la imaginería sacrificial explícita de σπένδομαι, θυσία y λειτουργία.
  spanish_consistency_notes:
  - Se usa “Yahvé” cuando corresponda al tetragrámaton, pero este versículo no lo contiene.
  - “Fe” se mantiene como traducción principal de πίστις, con la alternativa “fidelidad” solo en nota.
  - Se conserva la repetición verbal para reflejar el paralelismo enfático del griego.
  - El registro es sobrio y eclesial, pero evita vocabulario tradicionalizante no exigido por el texto.
