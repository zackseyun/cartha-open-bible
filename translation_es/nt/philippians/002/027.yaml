translation:
  language: es
  text: Porque en verdad estuvo enfermo, a punto de morir[a]; pero Dios tuvo misericordia de él, y no solo de él, sino también de mí[b], para que yo no tuviera tristeza sobre tristeza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cerca de la muerte» o «al borde de la muerte».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «tristeza sobre tristeza», un modismo que expresa aflicción acumulada.
    reason: cultural_note
lexical_decisions:
- source_word: ἠσθένησεν
  english_pob_choice: was sick
  chosen_spanish: estuvo enfermo
  alternatives_spanish:
  - se enfermó
  - estuvo débil
  - estuvo mal de salud
  lexicon: BDAG
  rationale: El verbo ἀσθενέω aquí se entiende en contexto físico. «Estuvo enfermo» comunica la condición de enfermedad de manera natural en español y conserva la idea de un estado real, no meramente de fragilidad.
- source_word: παραπλήσιον θανάτῳ
  english_pob_choice: nearly to death
  chosen_spanish: a punto de morir
  alternatives_spanish:
  - casi muerto
  - cerca de la muerte
  - al borde de la muerte
  lexicon: BDAG
  rationale: La construcción indica proximidad a la muerte, no muerte misma. «A punto de morir» transmite bien esa cercanía sin exagerarla.
- source_word: ἠλέησεν
  english_pob_choice: had mercy on
  chosen_spanish: tuvo misericordia de
  alternatives_spanish:
  - mostró misericordia a
  - se compadeció de
  lexicon: BDAG
  rationale: «Tuvo misericordia de» es una forma natural y teológicamente fuerte en español para ἐλεάω. Mantiene el peso de la acción divina sin rebajarla a mera lástima.
- source_word: οὐκ αὐτὸν δὲ μόνον ἀλλὰ καὶ ἐμέ
  english_pob_choice: and not on him only but also on me
  chosen_spanish: y no solo de él, sino también de mí
  alternatives_spanish:
  - y no solamente de él, sino también de mí
  - no únicamente de él, sino también de mí
  lexicon: BDAG
  rationale: El griego retoma el objeto de la misericordia y extiende el beneficio a Pablo. En español, «no solo de él, sino también de mí» mantiene el contraste y evita una construcción artificial.
- source_word: ἵνα μὴ
  english_pob_choice: so that I might not
  chosen_spanish: para que no tuviera
  alternatives_spanish:
  - para no tener
  - a fin de no tener
  lexicon: BDAG
  rationale: La cláusula expresa propósito con resultado evitado. «Para que no tuviera» conserva el valor final de ἵνα μὴ en un español claro y sobrio.
- source_word: λύπην ἐπὶ λύπην
  english_pob_choice: sorrow upon sorrow
  chosen_spanish: tristeza sobre tristeza
  alternatives_spanish:
  - dolor sobre dolor
  - pena sobre pena
  - tristeza tras tristeza
  lexicon: BDAG
  rationale: Se conserva la repetición enfática del sustantivo para reflejar la acumulación de aflicción. «Tristeza» funciona con naturalidad en español moderno y mantiene la idea de pesar acumulado.
- source_word: σχῶ
  english_pob_choice: have
  chosen_spanish: tuviera
  alternatives_spanish:
  - tuviese
  - experimentara
  - soportara
  lexicon: BDAG
  rationale: El verbo ἔχω aquí se entiende con el sentido de poseer o tener una experiencia. En español, «tuviera» se integra naturalmente con la frase idiomática anterior.
theological_decisions:
- issue: La misericordia de Dios como causa directa de la recuperación y del alivio de Pablo
  english_pob_reading: but God had mercy on him, and not on him only but also on me
  chosen_spanish_reading: pero Dios tuvo misericordia de él, y no solo de él, sino también de mí
  alternative_spanish_readings:
  - pero Dios se compadeció de él, y no solo de él, sino también de mí
  - pero Dios le mostró misericordia, y no solo a él, sino también a mí
  rationale: La frase conserva a Dios como sujeto activo de misericordia y mantiene el beneficio extendido a Pablo. No se suaviza a un mero sentimiento divino ni se desplaza el foco del acto misericordioso.
  doctrine_reference: Misericordia divina y providencia en el cuidado de los creyentes.
- issue: La expresión idiomática de aflicción acumulada
  english_pob_reading: so that I might not have sorrow upon sorrow
  chosen_spanish_reading: para que no tuviera tristeza sobre tristeza
  alternative_spanish_readings:
  - para que no tuviera pena sobre pena
  - para que no experimentara dolor tras dolor
  rationale: Se preserva la repetición para no borrar la fuerza retórica del griego. La expresión no se interpreta doctrinalmente más allá de su valor idiomático de dolor acumulado.
  doctrine_reference: Lenguaje bíblico de aflicción y consuelo.
translation_notes:
  revision_awareness: 'Coincide sustancialmente con el audit trail inglés: se mantiene la enfermedad física de ἠσθένησεν, la proximidad a la muerte en παραπλήσιον θανάτῳ, la misericordia divina de ἠλέησεν, y la repetición idiomática de λύπην ἐπὶ λύπην. No se requieren revisiones sustantivas respecto del sentido base; solo se ajusta la naturalidad del español con conservación del paralelismo.'
  spanish_consistency_notes:
  - Se usa «Dios» para θεός conforme al estándar del proyecto.
  - Se evita «SEÑOR» o sustitutos para el nombre divino, ya que aquí el texto griego dice θεός.
  - Se mantiene la repetición de «tristeza sobre tristeza» para reflejar el énfasis del original.
  - La puntuación sigue el flujo retórico de la oración griega y del audit trail inglés.
