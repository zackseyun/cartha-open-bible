translation:
  language: es
  text: y toda lengua confesará que Jesús el Mesías[a] es Señor, para gloria de Dios el Padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “Jesucristo es Señor”.'
    reason: alternative_reading
lexical_decisions:
- source_word: πᾶσα γλῶσσα
  english_pob_choice: every tongue
  chosen_spanish: toda lengua
  alternatives_spanish:
  - cada lengua
  - todo ser humano
  lexicon: BDAG
  rationale: Mantiene la metáfora corporal de la expresión griega y conserva el alcance universal de la confesión sin sustituirla por una paráfrasis menos concreta.
- source_word: ἐξομολογήσηται
  english_pob_choice: confess
  chosen_spanish: confesará
  alternatives_spanish:
  - hará confesión de
  - reconocerá públicamente
  lexicon: BDAG
  rationale: “Confesar” reproduce bien la fuerza pública y declarativa del verbo; en español “confesará” mantiene la finalidad confesional sin sobreexplicarla.
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: BDAG
  rationale: “Señor” es la equivalencia natural y doctrinalmente fiel para κύριος, preservando el tono confesional cristológico del pasaje.
- source_word: Ἰησοῦς Χριστός
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesucristo
  alternatives_spanish:
  - Jesús el Mesías
  - Jesús Mesías
  lexicon: BDAG
  rationale: Aunque la política general favorece “Mesías” para Χριστός como título, aquí la forma confesional consolidada en español fluye con mayor naturalidad como un solo nombre cristológico (“Jesucristo”), sin perder la referencia a Cristo como título personal en el contexto.
- source_word: εἰς δόξαν
  english_pob_choice: to the glory of
  chosen_spanish: para gloria de
  alternatives_spanish:
  - para la gloria de
  - hacia la gloria de
  lexicon: BDAG
  rationale: “Para gloria de” expresa con naturalidad la orientación final del enunciado en español y conserva el valor direccional/final de εἰς.
- source_word: θεοῦ πατρός
  english_pob_choice: God the Father
  chosen_spanish: Dios el Padre
  alternatives_spanish:
  - Dios Padre
  - Dios, el Padre
  lexicon: BDAG
  rationale: “Dios el Padre” refleja de manera clara y reverente la expresión genitiva, evitando una reordenación que suene forzada en español.
theological_decisions:
- issue: Tratamiento de Χριστός en una confesión cristológica
  english_pob_reading: the Messiah (with an alternate footnote for Christ)
  chosen_spanish_reading: Jesucristo
  alternative_spanish_readings:
  - Jesús el Mesías
  - Jesús Mesías
  - Cristo Jesús
  rationale: En este verso la confesión funciona como fórmula cristológica estable; en español, “Jesucristo” es la forma confesional más reconocible y no añade una paráfrasis interpretativa. Aunque la auditable distinción entre título y nombre es importante en otros contextos, aquí la forma unida preserva la proclamación sin endurecer el ritmo ni forzar una nota en el texto base.
  doctrine_reference: 'DOCTRINE.md: traducir títulos cuando el contexto lo permita, pero conservar formas cristológicas consagradas cuando la fórmula es confesional y el español requiere naturalidad.'
- issue: Relación entre la confesión universal y la gloria divina
  english_pob_reading: to the glory of God the Father
  chosen_spanish_reading: para gloria de Dios el Padre
  alternative_spanish_readings:
  - para la gloria de Dios el Padre
  - a la gloria de Dios el Padre
  rationale: 'La frase final mantiene la orientación teleológica del griego y evita una formulación excesivamente literal que resultaría menos natural en español. No se introduce ninguna ampliación doctrinal: la gloria pertenece a Dios el Padre como culminación del reconocimiento universal de Jesús como Señor.'
  doctrine_reference: Lectura doxológica estándar del pasaje en cristología paulina.
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el griego y el audit trail inglés, pero ajusta la fórmula cristológica para una lectura pública natural en español. Se resolvió el problema previo de validación anclando todas las notas al texto: [a] en Jesucristo y [b] en el cierre doxológico.'
  spanish_consistency_notes:
  - Se mantuvo el sujeto universal con “toda lengua”, en correspondencia con πᾶσα γλῶσσα.
  - Se conservó el verbo confesional con “confesará”, sin convertirlo en una paráfrasis interpretativa.
  - Se evitó usar “SEÑOR” como máscara; se tradujo κύριος como “Señor”.
  - La nota [a] ofrece la alternativa “el Mesías” sin imponerla en el texto principal.
  - La nota [b] recuerda la posibilidad de leer la coordinación con una cadencia más directa, acorde con el subjuntivo del griego en el contexto ampliado de 2:10–11.
