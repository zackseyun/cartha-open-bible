lexical_decisions:
- source_word: οἱ πάντες
  english_pob_choice: they all
  chosen_spanish: todos
  alternatives_spanish:
  - todos ellos
  - ellos todos
  lexicon: none
  rationale: El grupo articular plural se refiere al conjunto de personas en vista. «Todos» es natural en español y conserva el énfasis colectivo sin añadir información.
- source_word: γὰρ
  english_pob_choice: for
  chosen_spanish: pues
  alternatives_spanish:
  - porque
  - ya que
  - en efecto
  lexicon: none
  rationale: «Pues» expresa bien la conexión explicativa con el contexto anterior y suena idiomático en español bíblico contemporáneo.
- source_word: τὰ ἑαυτῶν
  english_pob_choice: their own interests
  chosen_spanish: sus propios intereses
  alternatives_spanish:
  - sus propias cosas
  - sus propias preocupaciones
  lexicon: BDAG
  rationale: El neutro plural idiomático apunta a aquello que les pertenece o concierne. «Sus propios intereses» reproduce la fuerza moral del contraste y corresponde al sentido elegido en el POB inglés.
- source_word: ζητοῦσιν
  english_pob_choice: seek
  chosen_spanish: buscan
  alternatives_spanish:
  - buscan afanosamente
  - persiguen
  lexicon: BDAG
  rationale: «Buscar» conserva el verbo básico y el paralelismo con la segunda mitad del versículo. En español, «buscan» comunica con claridad la acción habitual sin exagerar el matiz.
- source_word: τὰ Ἰησοῦ Χριστοῦ
  english_pob_choice: those of Jesus Messiah
  chosen_spanish: los de Jesús Mesías
  alternatives_spanish:
  - los intereses de Jesús Mesías
  - los de Jesús Cristo
  lexicon: none
  rationale: Se conserva el plural neutro elíptico con «los de», para no expandir innecesariamente el griego. «Mesías» mantiene el valor titular de Χριστός según la política del POB; se evita «Cristo» como forma predeterminada salvo razón idiomática o documental específica.
theological_decisions:
- issue: Cómo verter Χριστοῦ en la expresión Ἰησοῦ Χριστοῦ
  english_pob_reading: Jesus Messiah
  chosen_spanish_reading: Jesús Mesías
  alternative_spanish_readings:
  - Jesús Cristo
  rationale: La fuente griega conserva Χριστοῦ con valor titular, no meramente como apellido. Por eso se traduce «Mesías», manteniendo la distinción terminológica del POB y la carga cristológica del título.
  doctrine_reference: 'Contested terms: Χριστός → Mesías (cuando funciona como título)'
- issue: Alcance de τὰ ἑαυτῶν frente al contraste con τὰ Ἰησοῦ Χριστοῦ
  english_pob_reading: their own interests
  chosen_spanish_reading: sus propios intereses
  alternative_spanish_readings:
  - sus propias cosas
  - sus propios asuntos
  rationale: El contraste paulino enfrenta lo que les concierne a ellos con lo que concierne a Jesús Mesías. «Intereses» transmite de modo comprensible el valor semántico del idiomático neutro plural sin diluir el reproche.
  doctrine_reference: No aplica
translation_notes:
  revision_awareness: La nota inglesa conserva una alternativa léxica para τὰ ἑαυτῶν («their own interests» / «their own things»). En español se mantiene la misma decisión de fondo con «sus propios intereses» y se ofrece una alternativa breve en nota. También se refleja la revisión del POB inglés que prefirió mantener Χριστός como Mesías, no como Cristo, por ser un título todavía cargado de sentido.
  spanish_consistency_notes:
  - Se usó «Mesías» de manera consistente para Χριστός, conforme a la política del proyecto.
  - «Jesús Mesías» conserva el orden nombre-título sin convertirlo en un nombre compuesto tradicional.
  - El plural neutro elíptico se resolvió con «los de» para evitar una expansión interpretativa excesiva.
  - «Pues» y «buscan» mantienen un registro bíblico moderno, claro y dignificado.
