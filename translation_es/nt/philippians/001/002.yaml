lexical_decisions:
- source_word: χάρις
  english_pob_choice: Grace
  chosen_spanish: Gracia
  alternatives_spanish:
  - favor
  - don gracioso
  lexicon: BDAG
  rationale: En el saludo paulino, χάρις funciona como fórmula de bendición y como término teológico. «Gracia» conserva ambas dimensiones sin diluirlas.
- source_word: ὑμῖν
  english_pob_choice: to you
  chosen_spanish: a ustedes
  alternatives_spanish:
  - para ustedes
  lexicon: BDAG
  rationale: El dativo epistolar se expresa de forma natural en español con «a ustedes».
- source_word: εἰρήνη
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - bienestar
  lexicon: BDAG
  rationale: «Paz» es la equivalencia directa y mantiene la fuerza convencional del saludo cristiano y judío.
- source_word: ἀπὸ
  english_pob_choice: from
  chosen_spanish: de parte de
  alternatives_spanish:
  - de
  lexicon: BDAG
  rationale: «De parte de» explicita bien la procedencia relacional del saludo en español sin perder la idea de fuente.
- source_word: θεοῦ πατρὸς ἡμῶν
  english_pob_choice: God our Father
  chosen_spanish: Dios nuestro Padre
  alternatives_spanish:
  - Dios, nuestro Padre
  - nuestro Dios y Padre
  lexicon: BDAG
  rationale: 'La construcción se entiende naturalmente como apposición: Dios, quien es nuestro Padre. «Dios nuestro Padre» es claro y fiel.'
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: «Señor» preserva el valor cristológico de κύριος en el NT y corresponde al uso establecido en español bíblico.
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesucristo
  alternatives_spanish:
  - Jesús el Mesías
  - Jesús, el Mesías
  lexicon: BDAG
  rationale: Aunque el marco doctrinal del proyecto suele preferir «Mesías» para Χριστός cuando el título está en foco, en este saludo paulino la forma nominal compuesta «Jesucristo» es la opción española más natural y reconocible, sin alterar el contenido christológico del original.
theological_decisions:
- issue: Cómo verter Χριστοῦ en la fórmula de saludo paulina
  english_pob_reading: Messiah / Christ (history of revision showed tension, but latest regression fix restored Messiah in English policy context)
  chosen_spanish_reading: Jesucristo
  alternative_spanish_readings:
  - Jesús el Mesías
  - Jesús, el Mesías
  rationale: En español, la fórmula fija «Jesucristo» comunica con claridad la referencia a Jesús como el Cristo/Mesías. En un saludo breve y litúrgico, evita una ruptura de registro y sigue siendo plenamente fiel al título subyacente.
  doctrine_reference: 'Χριστός: preferencia por «Mesías» cuando el título debe quedar transparente; en nombres cristológicos fijos puede mantenerse la forma tradicional idiomática.'
translation_notes:
  revision_awareness: El contexto inglés muestra una oscilación editorial entre «Messiah» y «Christ» para Χριστοῦ, con una restauración posterior de «Messiah» por coherencia doctrinal. En español, se optó por «Jesucristo» como forma idiomática estable y no marcada, sin forzar una transliteración que resultaría menos natural en este saludo epistolar.
  spanish_consistency_notes:
  - Se mantuvo «Dios» y no una máscara reverencial para θεοῦ, conforme al estándar del proyecto.
  - «Señor» se usó para κύριος por su valor cristológico establecido.
  - No se añadió nota textual porque el griego carece de variantes relevantes en el paquete fuente.
  - La puntuación sigue el registro epistolar natural del español moderno y la estructura del original griego.
