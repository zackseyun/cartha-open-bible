  glossary_alignment: 'Hay buena alineación con el glosario en «Dios», «Señor» y «gracia». No hay nombre divino involucrado. La desviación está en Χριστοῦ: el proyecto indica normalmente «Mesías» cuando funciona como título, y el historial auditado para este versículo corrigió una regresión para volver a «Messiah». Por eso «Jesucristo» no está suficientemente alineado con la política terminológica del proyecto para este registro.'
