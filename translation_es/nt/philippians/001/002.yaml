revisions:
- from: Gracia a ustedes y paz de parte de Dios nuestro Padre y del Señor Jesucristo.
  to: Gracia a ustedes y paz de parte de Dios nuestro Padre y del Señor[a] Jesús el Mesías[b][c].
  rationale: Se conserva el saludo paulino en español natural, pero se corrige Χριστοῦ a «Mesías» para alinearlo con la política terminológica y con el historial auditado de este versículo. Se usa «Jesús el Mesías» en vez de «Jesús Mesías» porque es más idiomático en español y sigue comunicando claramente el valor titular; las notas preservan la alternativa tradicional y la formulación más literal/documentada.
