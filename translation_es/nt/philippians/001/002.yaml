  source_alignment_summary: 'El borrador español refleja correctamente la estructura básica del saludo: χάρις... καὶ εἰρήνη, ἀπὸ, θεοῦ πατρὸς ἡμῶν, καὶ κυρίου Ἰησοῦ Χριστοῦ. «Gracia», «a ustedes», «paz» y «de parte de Dios nuestro Padre y del Señor...» son fieles y naturales. Sin embargo, la decisión principal sobre Ἰησοῦ Χριστοῦ no sigue la orientación léxica y teológica auditada del POB, que aquí restituye explícitamente «Messiah/Mesías» en vez de «Christ/Cristo» como título traducible.'
