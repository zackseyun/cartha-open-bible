translation:
  language: es
  text: 'Y esto oro: que vuestro amor abunde cada vez más y más en conocimiento[a] y en todo discernimiento[b],'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con conocimiento»; la preposición griega también puede entenderse en un sentido estrechamente asociado.
    reason: lexical_alternative
  - marker: b
    text: O «toda perspicacia» o «toda percepción moral».
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ τοῦτο
  english_pob_choice: And this
  chosen_spanish: Y por esto
  alternatives_spanish:
  - Y esto
  - Y por ello
  lexicon: οὗτος
  rationale: Conserva el enlace con el contexto anterior y el valor demostrativo/correlativo de τοῦτο. «Por esto» comunica naturalmente la referencia causal o motivadora implícita en español, sin añadir elementos ajenos al griego.
- source_word: προσεύχομαι
  english_pob_choice: I pray
  chosen_spanish: oro
  alternatives_spanish:
  - ruego
  - estoy orando
  lexicon: προσεύχομαι
  rationale: En español, «oro» expresa de forma directa y digna la acción presente de Pablo. Mantiene el tono de oración continua sin forzar una perífrasis progresiva.
- source_word: ἵνα
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - para que
  - a fin de que
  lexicon: ἵνα
  rationale: Aquí introduce el contenido de la petición; «que» resulta natural en español tras un verbo de oración y preserva la relación sintáctica del griego.
- source_word: ἀγάπη
  english_pob_choice: love
  chosen_spanish: amor
  alternatives_spanish:
  - caridad
  lexicon: ἀγάπη
  rationale: Se mantiene el término bíblico usual «amor», coherente con el uso pastoral y la amplitud semántica de ἀγάπη. «Caridad» sonaría más restringido en español actual.
- source_word: ἔτι μᾶλλον καὶ μᾶλλον
  english_pob_choice: still more and more
  chosen_spanish: cada vez más y más
  alternatives_spanish:
  - más y más
  - aún más y más
  lexicon: μᾶλλον
  rationale: Reproduce el matiz de incremento continuo y reiterado. «Cada vez más y más» comunica bien la intensificación acumulativa del doble comparativo.
- source_word: περισσεύῃ
  english_pob_choice: may abound
  chosen_spanish: abunde
  alternatives_spanish:
  - sobreabunde
  - crezca
  lexicon: περισσεύω
  rationale: «Abunde» conserva la imagen de abundancia y el valor desiderativo/subjuntivo del verbo en el marco de la oración. «Sobreabunde» sería más enfático, pero menos natural en español común.
- source_word: ἐν ἐπιγνώσει
  english_pob_choice: in knowledge
  chosen_spanish: en conocimiento
  alternatives_spanish:
  - con conocimiento
  - en pleno conocimiento
  lexicon: ἐπίγνωσις
  rationale: Se respeta la preposición y el sustantivo de conocimiento. «Conocimiento» es la forma más sobria y fiel aquí; «pleno conocimiento» añade intensidad que el texto no exige explícitamente.
- source_word: πάσῃ αἰσθήσει
  english_pob_choice: all discernment
  chosen_spanish: todo discernimiento
  alternatives_spanish:
  - todo entendimiento
  - toda percepción moral
  lexicon: αἴσθησις
  rationale: «Discernimiento» captura la capacidad de percibir y evaluar correctamente, que es la fuerza contextual de αἴσθησις. Se conserva «todo» para reproducir πάσῃ y su amplitud distributiva.
translation_notes:
  revision_awareness: La versión española sigue de cerca la lectura del griego SBLGNT y concuerda con el estado de alta coincidencia del registro inglés POB. No se introdujeron notas alternativas porque las alternativas léxicas principales pueden explicarse adecuadamente en las decisiones léxicas, sin necesidad de ambigüedad textual en la línea principal.
  spanish_consistency_notes:
  - Se usa «amor» para ἀγάπη, conforme al estándar del proyecto.
  - Se evita «SEÑOR» o sustitutos no pertinentes, ya que no aparecen en este versículo.
  - «Conocimiento» y «discernimiento» conservan el contraste semántico entre ἐπίγνωσις y αἴσθησις sin sobretraducir.
  - 'El orden español se ajusta para sonar natural, pero mantiene la progresión: oración, crecimiento del amor, ámbito de conocimiento y discernimiento.'
