translation:
  language: es
  text: a causa de su participación en el evangelio desde el primer día hasta ahora,[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para el evangelio». La frase griega puede expresar tanto el ámbito de su participación compartida como su meta o propósito.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπὶ
  english_pob_choice: because of
  chosen_spanish: a causa de
  alternatives_spanish:
  - por
  - debido a
  - en razón de
  lexicon: BDAG
  rationale: Con el dativo τῇ κοινωνίᾳ, ἐπί expresa aquí la base o motivo; en español, «a causa de» comunica de forma natural esa relación causal sin volver la frase pesada.
- source_word: κοινωνίᾳ
  english_pob_choice: partnership
  chosen_spanish: participación
  alternatives_spanish:
  - sociedad
  - comunión
  - compañerismo
  - asociación
  lexicon: BDAG
  rationale: En este contexto, κοινωνία no es solo afecto relacional, sino participación activa y compartida en la obra del evangelio. «Participación» preserva esa fuerza mejor que «compañerismo» en español bíblico actual.
- source_word: ὑμῶν
  english_pob_choice: your
  chosen_spanish: de ustedes
  alternatives_spanish:
  - vuestro
  - su
  lexicon: pronombre posesivo genitivo
  rationale: El genitivo marca a los filipenses como los participantes de esa κοινωνία. En español, «de ustedes» resulta claro y neutral para un registro latinoamericano amplio.
- source_word: εἰς τὸ εὐαγγέλιον
  english_pob_choice: in the gospel
  chosen_spanish: en el evangelio
  alternatives_spanish:
  - para el evangelio
  - hacia el evangelio
  lexicon: BDAG
  rationale: Aunque εἰς puede tener matiz direccional, en esta construcción funciona de manera idiomática para expresar el ámbito o propósito de la participación compartida. «En el evangelio» mantiene esa relación sin añadir interpretación excesiva.
- source_word: εὐαγγέλιον
  english_pob_choice: gospel
  chosen_spanish: evangelio
  alternatives_spanish:
  - buena noticia
  lexicon: BDAG
  rationale: «Evangelio» es el término técnico y teológicamente cargado en Pablo; «buena noticia» sería posible, pero debilita el peso terminológico del pasaje.
- source_word: ἀπὸ τῆς πρώτης ἡμέρας
  english_pob_choice: from the first day
  chosen_spanish: desde el primer día
  alternatives_spanish:
  - a partir del primer día
  - desde el día primero
  lexicon: BDAG
  rationale: La frase señala el punto inicial de la participación de los filipenses. «Desde el primer día» es natural y fiel al valor temporal del griego.
- source_word: ἄχρι τοῦ νῦν
  english_pob_choice: until now
  chosen_spanish: hasta ahora
  alternatives_spanish:
  - hasta el presente
  - hasta hoy
  lexicon: BDAG
  rationale: ἄχρι + expresión temporal marca continuidad hasta el momento presente; «hasta ahora» conserva esa continuidad con estilo contemporáneo y sobrio.
theological_decisions:
- issue: 'Alcance de εἰς τὸ εὐαγγέλιον: esfera o propósito'
  english_pob_reading: The Greek phrase can express either the sphere of their shared participation or its goal/purpose.
  chosen_spanish_reading: La frase puede expresar el ámbito de su participación compartida o su meta/propósito.
  alternative_spanish_readings:
  - para el evangelio
  - en el evangelio
  rationale: Se mantiene la tensión semántica documentada por el POB inglés. «En el evangelio» es la forma principal, pero la nota conserva las dos posibilidades sin resolver artificialmente una ambigüedad real del griego.
  doctrine_reference: Philippians 1:5; κοινωνία with εἰς-construction in Pauline usage
translation_notes:
  revision_awareness: El texto griego y el auditor inglés coinciden en lectura alta; no se detectaron revisiones aplicadas ni cambios de última hora que obliguen a ajustar la decisión española.
  spanish_consistency_notes:
  - Se usa «evangelio» de forma consistente para εὐαγγέλιον.
  - Se prefiere «participación» por su cercanía al valor activo de κοινωνία en este contexto.
  - La nota al pie conserva la ambigüedad de εἰς τὸ εὐαγγέλιον sin sobreexplicarla en el texto principal.
  - El tono es formal y publicable, con español neutral latinoamericano.
