translation:
  language: es
  text: para que aprueben lo que es excelente[a], a fin de que sean puros e irreprochables[b] para el día del Mesías[c],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «las cosas que importan», «las cosas que difieren» o «lo que es mejor».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «sinceros y sin ofensa»; o más literalmente, «sin tropiezo».'
    reason: lexical_alternative
  - marker: c
    text: 'Lectura tradicional: «para el día de Cristo».'
    reason: alternative_reading
lexical_decisions:
- source_word: δοκιμάζειν
  english_pob_choice: discern / approve
  chosen_spanish: disciernan
  alternatives_spanish:
  - aprueben
  - examinen
  - prueben y aprueben
  lexicon: BDAG
  rationale: El verbo puede implicar probar, examinar y luego aprobar lo aprobado. En español, «discernir» comunica bien el juicio evaluativo y moral del contexto, sin volver la frase áspera. Se mantiene el matiz de evaluación, aunque la nota recoge la posibilidad de «aprobar».
- source_word: τὰ διαφέροντα
  english_pob_choice: what is best / the things that are excellent
  chosen_spanish: las cosas que son excelentes
  alternatives_spanish:
  - lo que es mejor
  - las cosas excelentes
  - lo que importa
  lexicon: BDAG
  rationale: La expresión literalmente apunta a «las cosas que difieren», pero en este contexto funciona como aquello que sobresale o es superior. «Las cosas que son excelentes» preserva el valor comparativo y suena natural en español, sin perder la tensión lexical.
- source_word: εἰλικρινεῖς
  english_pob_choice: pure
  chosen_spanish: sinceros
  alternatives_spanish:
  - puros
  - genuinos
  - íntegros
  lexicon: BDAG
  rationale: El término puede abarcar pureza o sinceridad. En español, «sinceros» encaja bien con la idea de integridad interior y evita una repetición dura con «sin tropiezo». Se deja abierta la alternativa «puros» porque la dimensión ética de pureza también está presente.
- source_word: ἀπρόσκοποι
  english_pob_choice: blameless
  chosen_spanish: sin tropiezo
  alternatives_spanish:
  - irreprensibles
  - sin ofensa
  - sin culpa
  lexicon: BDAG
  rationale: La palabra puede referirse a no tropezar o no hacer tropezar/ofender. «Sin tropiezo» conserva esa imagen verbal y la ambigüedad útil del griego mejor que un equivalente más interpretativo como «irreprensibles».
- source_word: εἰς ἡμέραν Χριστοῦ
  english_pob_choice: for the day of Messiah
  chosen_spanish: para el día del Mesías
  alternatives_spanish:
  - para el día de Cristo
  - hasta el día del Mesías
  lexicon: BDAG
  rationale: El griego orienta hacia una meta o finalidad, y «para» es natural en español. Χριστός funciona aquí como título escatológico; por eso se traduce «Mesías» según la terminología base del proyecto, manteniendo el sentido titular más que el nombre litúrgico.
theological_decisions:
- issue: Cómo traducir Χριστοῦ en la frase escatológica final
  english_pob_reading: day of Messiah, con nota que registra la lectura tradicional day of Christ
  chosen_spanish_reading: el día del Mesías
  alternative_spanish_readings:
  - el día de Cristo
  rationale: Aquí Χριστός tiene valor titular y escatológico, no simplemente un nombre propio. Por consistencia con la política terminológica del proyecto, se elige «Mesías». Se conserva en nota la forma tradicional «Cristo» como alternativa reconocible.
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός → Mesías cuando funciona como título; Cristo cuando es forma fija o nombre-like'
translation_notes:
  revision_awareness: 'El contexto inglés pasó por una revisión que osciló entre «discern what is best» y «approve the things that are excellent», además de una corrección doctrinal que restauró «Messiah» frente a «Christ». La versión española intenta mantener ambos impulsos: un verbo de juicio evaluativo («disciernan») y un complemento que expresa excelencia («las cosas que son excelentes»), sin borrar la tensión lexical de τὰ διαφέροντα ni la lectura titular de Χριστοῦ.'
  spanish_consistency_notes:
  - Se mantiene «Mesías» para Χριστός en la cláusula final, conforme al criterio terminológico del proyecto.
  - «Sin tropiezo» conserva la imagen verbal de ἀπρόσκοποι y deja espacio a la idea de no causar ni sufrir obstáculo.
  - No se traduce δοκιμάζειν como un simple «aprobar» porque en español podría sonar demasiado volitivo; «discernir» refleja mejor el proceso evaluativo implícito.
