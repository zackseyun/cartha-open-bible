translation:
  language: es
  text: teniendo la misma lucha que ustedes vieron en mí y ahora oyen de mí[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «teniendo la misma lucha que ustedes vieron en mí y ahora oyen en mí».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀγῶνα
  english_pob_choice: struggle
  chosen_spanish: lucha
  alternatives_spanish:
  - combate
  - lucha intensa
  lexicon: BDAG
  rationale: ἀγών puede referirse a una contienda o esfuerzo intenso. «Lucha» conserva la idea de conflicto sufriente y continuo, y funciona de forma natural en español sin volverlo demasiado militar.
- source_word: ἔχοντες
  english_pob_choice: having
  chosen_spanish: teniendo
  alternatives_spanish:
  - experimentando
  - enfrentando
  lexicon: BDAG
  rationale: El participio se puede verter de manera directa con «teniendo», manteniendo la relación sintáctica con el contexto inmediato y la estructura participial del griego.
- source_word: οἷον
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - tal como
  - como
  lexicon: BDAG
  rationale: Aquí οἷον introduce una comparación con lo visto y oído acerca de Pablo. «Que» resulta la forma más fluida en español y preserva el sentido comparativo sin sobrecargar la frase.
- source_word: εἴδετε
  english_pob_choice: you saw
  chosen_spanish: vieron
  alternatives_spanish:
  - vieron ustedes
  - presenciaron
  lexicon: BDAG
  rationale: El aoristo señala algo que los filipenses observaron directamente. «Vieron» mantiene esa referencia histórica de manera natural; el sujeto explícito «ustedes» queda implícito por el verbo.
- source_word: ἀκούετε
  english_pob_choice: hear
  chosen_spanish: oyen
  alternatives_spanish:
  - escuchan
  - están oyendo
  lexicon: BDAG
  rationale: El presente de ἀκούω puede expresarse con «oyen». La construcción «ahora oyen en mí» sigue de cerca el paralelo griego y evita una expansión interpretativa.
- source_word: ἐν ἐμοί
  english_pob_choice: in me / in me
  chosen_spanish: en mí
  alternatives_spanish:
  - en mi caso
  - acerca de mí
  lexicon: BDAG
  rationale: Se conserva la repetición literal de ἐν ἐμοί en ambos miembros del paralelismo. Aunque en español suena algo más compacto que en inglés, «en mí» mantiene la tensión del texto y no introduce explicaciones ajenas al griego.
theological_decisions:
- issue: Valor de νῦν en el paralelismo final
  english_pob_reading: now hear in me
  chosen_spanish_reading: ahora oyen en mí
  alternative_spanish_readings:
  - todavía oyen en mí
  - ahora siguen oyendo en mí
  rationale: El contexto permite oír νῦν como «ahora», marcando el contraste temporal del testimonio actual sobre Pablo. No se adopta «todavía» porque sería una expansión interpretativa respecto del griego y del texto inglés revisado.
  doctrine_reference: Ninguna; decisión de tempo/aspecto textual.
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada para eliminar una expansión interpretativa final y volver a la formulación más directa «hear in me». Esta propuesta española sigue esa misma decisión de paralelismo y evita añadir «todavía» u otra explicitación equivalente.
  spanish_consistency_notes:
  - Se mantiene «en mí» en ambos miembros para conservar el paralelismo del griego.
  - Se usa «lucha» como equivalente principal de ἀγών, en línea con la decisión inglesa de «struggle».
  - No se introduce «Cristo», «Señor» ni otras fórmulas no presentes en el versículo.
  - El orden español se ajusta para sonar natural sin perder la secuencia semántica del original.
