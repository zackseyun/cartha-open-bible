    output_hash: 4f83479b8aedfa2a1b41cbdaaa5ab9e042d39be672f0e484ca3ad09694132506
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T09:58:33Z'
    unchanged: false
    changes_summary: 'Changed ''slaves'' to ''servants'' for more natural formal register for δοῦλοι in the epistolary greeting, and changed ''Messiah Jesus'' to ''Christ Jesus'' for standard rendering and consistency with the Greek Χριστοῦ/ἐν Χριστῷ. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy), slave restored (revision_pass had changed δοῦλος → servant against DOCTRINE.md policy)]'
translation:
  language: es
  text: 'Pablo y Timoteo, esclavos de Mesías Jesús, a todos los santos en Mesías Jesús que están en Filipos, junto con los supervisores[a] y los diáconos:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «obispos». El griego ἐπίσκοποι significa literalmente quienes supervisan; «obispos» es la forma eclesial tradicional, pero puede sugerir desarrollos institucionales posteriores.
    reason: lexical_alternative
lexical_decisions:
- source_word: δοῦλοι
  english_pob_choice: slaves
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  - criados
  lexicon: BDAG
  rationale: El griego δοῦλος expresa la condición de pertenencia y sujeción, no solo una función de servicio. Siguiendo la decisión auditada de la POB en Filipenses 1:1, 'esclavos' conserva esa fuerza léxica mejor que 'siervos'.
- source_word: Χριστοῦ Ἰησοῦ / Χριστῷ Ἰησοῦ
  english_pob_choice: Messiah Jesus
  chosen_spanish: Mesías Jesús
  alternatives_spanish:
  - Cristo Jesús
  lexicon: BDAG
  rationale: Χριστός funciona aquí como título, y la política POB pide traducir títulos cuando el contexto lo permite. 'Mesías' preserva el sentido titular frente a la forma ya lexicalizada 'Cristo'.
- source_word: ἁγίοις
  english_pob_choice: saints
  chosen_spanish: santos
  alternatives_spanish:
  - los santos
  - personas santas
  lexicon: BDAG
  rationale: '''Santos'' es el equivalente más natural y breve en el saludo paulino, y mantiene la identidad covenantal/comunitaria del grupo sin añadir palabras ausentes en el griego.'
- source_word: ἐν Χριστῷ Ἰησοῦ
  english_pob_choice: in Messiah Jesus
  chosen_spanish: en Mesías Jesús
  alternatives_spanish:
  - unidos a Mesías Jesús
  - en Cristo Jesús
  lexicon: BDAG
  rationale: Se conserva la preposición locativa/unionista 'en' para no diluir la formulación paulina. La repetición de la misma expresión en el versículo se mantiene por fidelidad estructural.
- source_word: τοῖς οὖσιν ἐν Φιλίπποις
  english_pob_choice: who are in Philippi
  chosen_spanish: que están en Filipos
  alternatives_spanish:
  - los que están en Filipos
  - que viven en Filipos
  lexicon: BDAG
  rationale: La participio griega se vuelve una relativa natural en español, preservando el sentido locativo explícito sin sobrecargar la sintaxis.
- source_word: σὺν
  english_pob_choice: together with
  chosen_spanish: junto con
  alternatives_spanish:
  - con
  - en compañía de
  lexicon: BDAG
  rationale: '''Junto con'' refleja asociación de manera clara y digna en español, más expresiva que un simple ''con'' en una lista de destinatarios y oficios.'
- source_word: ἐπισκόποις
  english_pob_choice: overseers
  chosen_spanish: obispos
  alternatives_spanish:
  - supervisores
  - inspectores
  lexicon: BDAG
  rationale: Aunque la POB inglesa opta por 'overseers' para evitar connotaciones eclesiales posteriores, en español 'obispos' es el término más natural y reconocido para el cargo. Se documenta la alternativa para no ocultar la tensión semántica entre función básica y desarrollo institucional.
- source_word: διακόνοις
  english_pob_choice: deacons
  chosen_spanish: diáconos
  alternatives_spanish:
  - servidores
  - ministros
  lexicon: BDAG
  rationale: En este contexto de oficio eclesial, 'diáconos' es el equivalente establecido y claro; 'servidores' diluiría el posible valor técnico del término.
theological_decisions:
- issue: Cómo representar Χριστός como título mesiánico en el saludo
  english_pob_reading: Messiah Jesus
  chosen_spanish_reading: Mesías Jesús
  alternative_spanish_readings:
  - Cristo Jesús
  rationale: La lectura auditada trata Χριστός como título y no como nombre propio. En español, 'Mesías' mantiene esa dimensión teológica y evita que el término se vuelva meramente tradicional o litúrgico.
  doctrine_reference: 'DOCTRINE.md: Translate titles; contested terms table for Χριστός'
- issue: Cómo mantener la fuerza social/jurídica de δοῦλοι
  english_pob_reading: slaves
  chosen_spanish_reading: esclavos
  alternative_spanish_readings:
  - siervos
  - servidores
  rationale: La decisión inglesa subraya la condición vinculante de pertenencia. 'Esclavos' conserva esa tensión y evita suavizar el término hacia una relación puramente voluntaria o honorífica.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; contested terms table for δοῦλος'
- issue: Cómo entender ἐπισκόποις dentro de la fórmula de saludo
  english_pob_reading: overseers
  chosen_spanish_reading: obispos
  alternative_spanish_readings:
  - supervisores
  rationale: El griego denota supervisión/encargo. En la historia eclesial, 'obispos' es el término español estable para ese cargo; aun así, la nota marca que la palabra griega base es funcionalmente 'supervisores' para no borrar la tensión histórica.
  doctrine_reference: 'DOCTRINE.md: preserve lexical transparency; office terminology notes'
translation_notes:
  revision_awareness: La historia de revisiones en inglés osciló entre 'slaves/servants' y 'Messiah Jesus/Christ Jesus'. Esta versión sigue la restauración posterior que revirtió la domesticación de δοῦλοι y la sustitución de Χριστός por 'Christ', y lo hace en español con 'esclavos' y 'Mesías Jesús'.
  spanish_consistency_notes:
  - Se mantiene 'Mesías' tanto en el saludo como en la frase 'en Mesías Jesús' para conservar la repetición del griego.
  - Se evita traducir δοῦλοι como 'siervos' para no perder la fuerza semántica documentada por la auditoría.
  - '''obispos'' se anota por la tensión entre la equivalencia funcional griega y el término eclesial español ya asentado.'
