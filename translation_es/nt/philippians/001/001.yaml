  text: Παῦλος καὶ Τιμόθεος δοῦλοι ⸂Χριστοῦ Ἰησοῦ⸃ πᾶσιν τοῖς ἁγίοις ἐν Χριστῷ Ἰησοῦ τοῖς οὖσιν ἐν Φιλίπποις σὺν ἐπισκόποις καὶ διακόνοις·
base_translation:
  language: en
  yaml_path: translation/nt/philippians/001/001.yaml
  text: 'Paul and Timothy[a], slaves of Messiah Jesus, to all the saints in Messiah Jesus who are in Philippi[c][b], together with the overseers and deacons:'
  footnotes:
  - marker: a
    text: Or 'Christ Jesus.' The Greek title Χριστός can be rendered either way in English; here it is translated as 'Messiah' to preserve its titular sense.
    reason: alternative_reading
  - marker: b
    text: Or 'servants' or 'bondservants.'
    reason: lexical_alternative
  - marker: c
    text: Or 'bishops' for 'overseers.'
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4
