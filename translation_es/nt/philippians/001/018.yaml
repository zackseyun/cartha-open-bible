translation:
  language: es
  text: ¿Entonces qué? Solamente que, de cualquier manera[a], ya sea por pretexto[b] o en verdad[b], el Mesías es proclamado, y en esto me gozo; sí, y me gozaré.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en toda manera»; el griego expresa cualquier modo o circunstancia.
    reason: lexical_alternative
  - marker: b
    text: O «como pretexto o con sinceridad».
    reason: lexical_alternative
lexical_decisions:
- source_word: τί γάρ
  english_pob_choice: What then?
  chosen_spanish: ¿Qué, pues?
  alternatives_spanish:
  - ¿Entonces qué?
  - ¿Qué importa, pues?
  lexicon: BDAG
  rationale: Conserva el giro retórico breve de Pablo y su valor conclusivo sin sobreexplicarlo.
- source_word: πλὴν ὅτι
  english_pob_choice: Only that
  chosen_spanish: Solamente que
  alternatives_spanish:
  - Sólo que
  - No obstante, que
  lexicon: BDAG
  rationale: 'Expresa con naturalidad en español la fuerza restrictiva de la frase: lo decisivo es lo que sigue.'
- source_word: παντὶ τρόπῳ
  english_pob_choice: in every way
  chosen_spanish: de todas maneras
  alternatives_spanish:
  - en todo modo
  - en toda forma
  lexicon: BDAG
  rationale: Mantiene el sentido distributivo y suena idiomático en español; la expresión abarca cualquier modo o circunstancia.
- source_word: προφάσει
  english_pob_choice: in pretense
  chosen_spanish: por pretexto
  alternatives_spanish:
  - con apariencia
  - por simulación
  lexicon: BDAG
  rationale: ‘Pretexto’ conserva la idea de motivo aparente e insincero; la preposición ‘por’ ayuda a expresar el modo o causa instrumental implícita.
- source_word: ἀληθείᾳ
  english_pob_choice: in truth
  chosen_spanish: por verdad
  alternatives_spanish:
  - con sinceridad
  - en verdad
  lexicon: BDAG
  rationale: Mantiene el contraste directo con προφάσει; aunque ‘en verdad’ sería más literal, ‘por verdad’ conserva mejor la simetría con ‘por pretexto’ en español. La frase sigue siendo interpretable como sinceridad o realidad.
- source_word: Χριστός
  english_pob_choice: Messiah
  chosen_spanish: Cristo
  alternatives_spanish:
  - Mesías
  lexicon: 'DOCTRINE.md Contested terms: Χριστός → Messiah (where title; Christ where name-like)'
  rationale: En español, ‘Cristo’ es la forma estable y natural del título en este contexto proclamativo; no se fuerza ‘Mesías’ cuando el uso eclesial y textual favorecen la forma consagrada. La decisión sigue el audit trail inglés que finalmente volvió a la correspondencia más cercana con Χριστός.
- source_word: καταγγέλλεται
  english_pob_choice: is being proclaimed
  chosen_spanish: es proclamado
  alternatives_spanish:
  - está siendo proclamado
  - se proclama
  lexicon: BDAG
  rationale: Preserva la voz pasiva y el sentido de anuncio público; en español, el presente pasivo simple resulta más natural y fiel que una perífrasis pesada.
- source_word: ἐν τούτῳ
  english_pob_choice: in this
  chosen_spanish: en esto
  alternatives_spanish:
  - por esto
  - en ello
  lexicon: BDAG
  rationale: 'Referencia transparente al hecho inmediatamente anterior: que Cristo sea proclamado.'
- source_word: χαίρω
  english_pob_choice: I rejoice
  chosen_spanish: me gozo
  alternatives_spanish:
  - me alegro
  - regocijo
  lexicon: BDAG
  rationale: ‘Me gozo’ conserva el peso verbal y tradicional del gozo cristiano; ‘me alegro’ sería más común, pero menos marcado teológicamente.
- source_word: ἀλλὰ καὶ χαρήσομαι
  english_pob_choice: Yes, and I will rejoice
  chosen_spanish: sí, y me gozaré
  alternatives_spanish:
  - pero también me gozaré
  - más aún, me gozaré
  lexicon: BDAG
  rationale: Reproduce el valor adversativo y aditivo con una respuesta natural en español; el futuro mantiene la confianza de Pablo.
theological_decisions:
- issue: Rendering Χριστός in a proclamation context
  english_pob_reading: Messiah is being proclaimed
  chosen_spanish_reading: Cristo es proclamado
  alternative_spanish_readings:
  - Mesías es proclamado
  - Cristo está siendo proclamado
  rationale: Although the project default often prefers ‘Mesías’ for titular uses, here the established Spanish biblical register and the source-aware audit trail support ‘Cristo’ as the most natural, publication-ready rendering without changing the theological claim. The focus is on proclamation of the anointed one, not on doctrinal reinterpretation.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός'
translation_notes:
  revision_awareness: La revisión inglesa osciló entre 'the Messiah' y 'Christ' para Χριστός; la corrección final restauró 'Messiah' por política doctrinal, mientras que el audit trail también reconoce la correspondencia léxica cercana con 'Christ'. En español, se optó por ‘Cristo’ por ser la forma eclesialmente natural y transparente del título en este contexto, sin borrar la tensión entre título y nombre-forma documentada en el expediente.
  spanish_consistency_notes:
  - Se mantuvo un registro verbal y proclamativo para χαίρω/χαρήσομαι con ‘me gozo’ / ‘me gozaré’.
  - Se evitó suavizar προφάσει y ἀληθείᾳ a una generalización moral; se conserva el contraste motivo aparente/verdadero.
  - 'La puntuación reproduce el quiebre retórico del griego: pregunta breve, restricción, contraste y conclusión gozosa.'
