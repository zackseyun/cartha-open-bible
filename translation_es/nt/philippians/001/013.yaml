translation:
  language: es
  text: de manera que mis cadenas en el Mesías[a] se han hecho conocidas en todo el pretorio[b] y entre todos los demás.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mis cadenas por el Mesías». También puede entenderse: «mis cadenas en el Mesías».'
    reason: alternative_reading
  - marker: b
    text: 'O: «en toda la guardia imperial»; el término puede referirse a la guardia imperial o al cuartel o residencia imperial.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὥστε
  english_pob_choice: so that
  chosen_spanish: de manera que
  alternatives_spanish:
  - así que
  - de modo que
  lexicon: BDAG
  rationale: Introduce el resultado de lo anterior con una locución natural en español y conserva el valor consecutivo del griego.
- source_word: τοὺς δεσμούς μου
  english_pob_choice: my chains
  chosen_spanish: mis cadenas
  alternatives_spanish:
  - mis prisiones
  - mis vínculos
  lexicon: BDAG
  rationale: El griego dice literalmente 'mis cadenas', y el contexto carcelario se mantiene sin suavizar la fuerza lexical.
- source_word: ἐν Χριστῷ
  english_pob_choice: in Messiah
  chosen_spanish: en Mesías
  alternatives_spanish:
  - en Cristo
  - por el Mesías
  lexicon: BDAG
  rationale: Se conserva la preposición 'en' porque el griego la usa explícitamente; 'Mesías' sigue la terminología del proyecto para Χριστός como título. La lectura causal de la situación queda disponible sin forzarla en la redacción principal.
- source_word: πραιτωρίῳ
  english_pob_choice: imperial guard / praetorium
  chosen_spanish: pretorio
  alternatives_spanish:
  - guardia imperial
  - residencia imperial
  lexicon: BDAG
  rationale: '''Pretorio'' mantiene la amplitud semántica del término y permite la alternativa contextual que el aparato inglés preserva, sin decidir de manera cerrada entre guardia y residencia.'
- source_word: τοῖς λοιποῖς πᾶσιν
  english_pob_choice: all the rest
  chosen_spanish: todos los demás
  alternatives_spanish:
  - todos los otros
  - todo el resto
  lexicon: BDAG
  rationale: Expresa el alcance inclusivo del sintagma de manera natural en español y sigue de cerca la estructura griega.
theological_decisions:
- issue: Relación de ἐν Χριστῷ con las cadenas de Pablo
  english_pob_reading: The English audit trail preserves ambiguity between 'in Messiah' and 'my chains in the Messiah' while also recognizing a causal connection to Paul's imprisonment.
  chosen_spanish_reading: '''en Mesías'' se mantiene en la frase principal, dejando abierta la relación exacta entre la esfera, la identidad y la causa de las cadenas.'
  alternative_spanish_readings:
  - '''por Mesías'''
  - '''en Cristo'''
  rationale: El texto griego permite una relación semántica amplia; la traducción principal no resuelve indebidamente la tensión entre localización/esfera y motivo. La nota conserva la lectura alternativa y evita perder el matiz documentado por el audit trail.
  doctrine_reference: Preservar la tensión textual cuando el original admite más de una relación semántica; no normalizar a una explicación teológica única.
translation_notes:
  revision_awareness: El borrador anterior falló porque incluía marcadores de nota no anclados en el texto. Esta versión coloca [a] en «Mesías» y [b] en «pretorio», de modo que cada nota tenga un ancla exacta en la traducción.
  spanish_consistency_notes:
  - Se mantiene 'Mesías' para Χριστός según la política del proyecto.
  - '''Pretorio'' conserva la ambigüedad histórica del término griego sin cerrar prematuramente el referente.'
  - '''todos los demás'' traduce inclusivamente τοῖς λοιποῖς πᾶσιν con registro natural y bíblico a la vez.'
