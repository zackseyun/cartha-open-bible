translation:
  language: es
  text: Pues me parece justo pensar esto acerca de todos ustedes[a], porque los tengo en mi corazón, ya que, tanto en mis cadenas como en la defensa y confirmación del evangelio, todos ustedes son partícipes conmigo[b] de la gracia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «porque ustedes me tienen en su corazón». La cláusula griega puede leerse de ambas maneras.'
    reason: alternative_reading
  - marker: b
    text: 'O: «copartícipes conmigo». συγκοινωνούς expresa participación compartida.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δίκαιον
  english_pob_choice: it is right
  chosen_spanish: me parece justo
  alternatives_spanish:
  - es justo
  - es correcto
  - es conveniente
  lexicon: BDAG
  rationale: δίκαιον expresa lo que es justo o apropiado. «Me parece justo» mantiene el sentido ético y personal de la frase paulina sin sonar forzado en español.
- source_word: φρονεῖν
  english_pob_choice: to think
  chosen_spanish: pensar
  alternatives_spanish:
  - tener esta actitud
  - sentir
  - tener este sentir
  lexicon: BDAG
  rationale: φρονέω puede abarcar pensamiento y disposición interior. «Pensar esto» conserva la formulación compacta del griego y deja abierta la dimensión de actitud.
- source_word: ὑπὲρ πάντων ὑμῶν
  english_pob_choice: about all of you
  chosen_spanish: acerca de todos ustedes
  alternatives_spanish:
  - sobre todos ustedes
  - en cuanto a todos ustedes
  - respecto de todos ustedes
  lexicon: BDAG
  rationale: Con φρονεῖν, ὑπέρ funciona como referencia o consideración respecto de personas. «Acerca de» es natural en español y evita una traducción demasiado literal o ambigua.
- source_word: διὰ τὸ ἔχειν με ἐν τῇ καρδίᾳ ὑμᾶς
  english_pob_choice: because I have you in my heart
  chosen_spanish: porque los tengo en mi corazón
  alternatives_spanish:
  - porque ustedes me tienen en su corazón
  lexicon: BDAG
  rationale: 'La lectura principal sigue la comprensión tradicional y coherente con el contexto: Pablo lleva a los filipenses en su corazón. Se usa «los tengo en mi corazón» para expresar esa relación afectiva de modo natural y fiel.'
- source_word: δεσμοῖς
  english_pob_choice: chains
  chosen_spanish: cadenas
  alternatives_spanish:
  - prisiones
  - lazos
  lexicon: BDAG
  rationale: «Cadenas» conserva la imagen concreta de δεσμοί y la referencia a la prisión de Pablo sin diluir el valor figurativo y material del término.
- source_word: ἀπολογίᾳ
  english_pob_choice: defense
  chosen_spanish: defensa
  alternatives_spanish:
  - apología
  - alegato
  - defensa legal
  lexicon: BDAG
  rationale: ἀπολογία aquí se refiere a la defensa de Pablo en favor del evangelio. «Defensa» es claro y fiel; «apología» podría sonar técnico o engañoso en español contemporáneo.
- source_word: βεβαιώσει
  english_pob_choice: confirmation
  chosen_spanish: confirmación
  alternatives_spanish:
  - establecimiento
  - ratificación
  - afirmación
  lexicon: BDAG
  rationale: βεβαίωσις expresa el acto de fortalecer o dejar firmemente establecido. «Confirmación» funciona bien en español y refleja la pareja semántica con «defensa».
- source_word: συγκοινωνούς
  english_pob_choice: fellow sharers with me
  chosen_spanish: conmigo partícipes
  alternatives_spanish:
  - copartícipes conmigo
  - socios conmigo
  - participantes conmigo
  lexicon: BDAG
  rationale: συγκοινωνός denota participación compartida. «Conmigo partícipes» conserva la idea de participación conjunta y evita la redundancia de «fellow sharers»; «partícipes» tiene buena tradición bíblica y claridad.
- source_word: χάριτος
  english_pob_choice: grace
  chosen_spanish: la gracia
  alternatives_spanish:
  - favor
  - benevolencia
  lexicon: BDAG
  rationale: χάρις es un término teológico central. Se mantiene «gracia» para respetar su fuerza doctrinal y su continuidad con el uso bíblico habitual, sin sustituirlo por un equivalente más genérico.
theological_decisions:
- issue: Ambigüedad sintáctica en la cláusula del corazón
  english_pob_reading: because I have you in my heart
  chosen_spanish_reading: porque los tengo en mi corazón
  alternative_spanish_readings:
  - porque ustedes me tienen en su corazón
  rationale: La cláusula griega admite dos lecturas. Se adopta la que mejor encaja con el flujo inmediato del afecto de Pablo y con la declaración precedente. La lectura alternativa se conserva como posibilidad real del texto.
  doctrine_reference: Preservar la ambigüedad interpretativa cuando el griego la permite, sin resolverla indebidamente.
- issue: Sentido de συγκοινωνούς μου τῆς χάριτος
  english_pob_reading: all of you are fellow partakers with me of grace
  chosen_spanish_reading: todos ustedes son conmigo partícipes de la gracia
  alternative_spanish_readings:
  - todos ustedes son partícipes conmigo de la gracia
  - todos ustedes comparten conmigo la gracia
  rationale: La construcción destaca participación conjunta, no mera asociación. «Conmigo partícipes de la gracia» conserva el vínculo comunal y la terminología teológica de χάρις.
  doctrine_reference: Mantener la noción de participación compartida en la gracia, sin reducirla a simple compañerismo.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente que suaviza la estructura de la cláusula causal y prefiere una expresión más precisa para συγκοινωνούς μου τῆς χάριτος. La versión española adopta una sintaxis fluida con «ya que» y mantiene la idea de participación común con «conmigo partícipes de la gracia».
  spanish_consistency_notes:
  - Se mantiene «evangelio» para εὐαγγέλιον, coherente con la terminología bíblica estándar.
  - Se evita «Cristo» porque no aparece en el versículo; no se añade terminología no sustentada por el texto.
  - Se conserva el orden natural del español, sin reproducir mecánicamente la sintaxis griega.
  - «Cadenas» refleja el plural de δεσμοῖς y el tono concreto de la prisión apostólica.
