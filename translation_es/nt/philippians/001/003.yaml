translation:
  language: es
  text: Doy gracias a mi Dios en cada recuerdo de ustedes.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Doy gracias a mi Dios por cada recuerdo de ustedes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Εὐχαριστῶ
  english_pob_choice: I thank
  chosen_spanish: Doy gracias
  alternatives_spanish:
  - Agradezco
  - Gracias doy
  lexicon: BDAG
  rationale: El verbo griego expresa una acción de agradecimiento en primera persona. En español, 'doy gracias' preserva con naturalidad ese acto verbal y mantiene el tono de oración de acción de gracias.
- source_word: τῷ θεῷ μου
  english_pob_choice: my God
  chosen_spanish: a mi Dios
  alternatives_spanish:
  - a mi Dios
  - para mi Dios
  lexicon: BDAG
  rationale: El dativo con εὐχαριστέω se expresa naturalmente en español con la preposición 'a'. Se conserva el posesivo 'mi' y el referente divino se traduce como 'Dios'.
- source_word: ἐπὶ
  english_pob_choice: at
  chosen_spanish: en
  alternatives_spanish:
  - por
  - al recordar
  - ante
  lexicon: BDAG
  rationale: Aquí la preposición introduce la ocasión o circunstancia del agradecimiento. 'En cada recuerdo de ustedes' comunica de forma idiomática esa ocasión sin imponer de más la causalidad de 'por'.
- source_word: πάσῃ
  english_pob_choice: every
  chosen_spanish: cada
  alternatives_spanish:
  - todo
  - toda
  lexicon: BDAG
  rationale: Con un sustantivo singular como μνείᾳ, 'cada' conserva mejor el valor distributivo que 'todo' en español contemporáneo.
- source_word: μνείᾳ
  english_pob_choice: remembrance
  chosen_spanish: recuerdo
  alternatives_spanish:
  - remembranza
  - memoria
  - mención
  lexicon: BDAG
  rationale: '''Recuerdo'' expresa bien la idea de memoria/contemplación que está detrás de μνεία. ''Mención'' sería posible en otro contexto, pero aquí el tono de agradecimiento favorece el sentido de recordación.'
- source_word: ὑμῶν
  english_pob_choice: of you
  chosen_spanish: de ustedes
  alternatives_spanish:
  - de vosotros
  - de ustedes todos
  lexicon: BDAG
  rationale: El plural se conserva de manera clara y natural en español latinoamericano con 'ustedes'.
translation_notes:
  revision_awareness: La redacción sigue de cerca el griego y el trazado del POB en inglés, pero ajusta la sintaxis al español para evitar el calco 'at every remembrance' y conservar la ocasión del agradecimiento con una formulación natural.
  spanish_consistency_notes:
  - Se usa 'Dios' según el valor de θεῷ; no hay indicio aquí de una cita del nombre divino que requiera 'Yahvé'.
  - '''Doy gracias'' mantiene la fuerza verbal de εὐχαριστῶ sin expandir el sentido a una frase más interpretativa.'
  - El plural implícito del pronombre se hace explícito como 'ustedes' para claridad en español latinoamericano.
