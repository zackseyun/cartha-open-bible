translation:
  language: es
  text: Y la mayoría de los hermanos[a], habiendo llegado a confiar en el Señor a causa de mis cadenas, se atreven mucho más a hablar la palabra sin temor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hermanos y hermanas»; aquí el término probablemente se refiere más ampliamente a compañeros creyentes.
    reason: lexical_alternative
lexical_decisions:
- source_word: πλείονας
  english_pob_choice: most
  chosen_spanish: la mayoría de
  alternatives_spanish:
  - la mayor parte de
  - la mayoría
  lexicon: BDAG
  rationale: El partitivo con artículo expresa el mayor número del grupo; en español, «la mayoría de» comunica naturalmente ese valor sin forzar un comparativo literal.
- source_word: ἀδελφῶν
  english_pob_choice: brothers
  chosen_spanish: los hermanos
  alternatives_spanish:
  - los hermanos y hermanas
  - los creyentes
  - los hermanos/as
  lexicon: BDAG
  rationale: Se conserva el masculino plural gramatical del griego en el texto principal. La nota mantiene la posibilidad de referencia inclusiva a compañeros creyentes.
- source_word: ἐν κυρίῳ
  english_pob_choice: in the Lord
  chosen_spanish: en el Señor
  alternatives_spanish:
  - por el Señor
  - a causa del Señor
  lexicon: BDAG
  rationale: La locución paulina se mantiene de forma directa en español. Aquí funciona como esfera o base de la confianza, no como agente causal directo.
- source_word: πεποιθότας
  english_pob_choice: having become confident
  chosen_spanish: habiendo cobrado confianza
  alternatives_spanish:
  - estando confiados
  - habiendo quedado persuadidos
  lexicon: BDAG
  rationale: El perfecto participial expresa un estado consolidado a partir de una convicción previa; «habiendo cobrado confianza» conserva ese matiz de proceso cumplido con estado resultante.
- source_word: τοῖς δεσμοῖς μου
  english_pob_choice: because of my chains
  chosen_spanish: por mis cadenas
  alternatives_spanish:
  - a causa de mis cadenas
  - por mi encarcelamiento
  lexicon: BDAG
  rationale: «δεσμοῖς» es literalmente «cadenas»; en español, «por mis cadenas» puede expresar la causa de su valentía con concisión. Se conserva la imagen concreta del original.
- source_word: περισσοτέρως
  english_pob_choice: all the more
  chosen_spanish: mucho más
  alternatives_spanish:
  - todavía más
  - con mayor valentía
  lexicon: BDAG
  rationale: La comparación intensiva se traduce de manera idiomática y natural; «mucho más» comunica el aumento de intensidad sin añadir contenido ajeno.
- source_word: τολμᾶν
  english_pob_choice: dare
  chosen_spanish: se atreven
  alternatives_spanish:
  - osan
  - se animan a
  lexicon: BDAG
  rationale: «Atreverse» reproduce bien el valor de valentía/resolución previa al infinitivo, con un tono claro y actual en español.
- source_word: ἀφόβως
  english_pob_choice: fearlessly
  chosen_spanish: sin temor
  alternatives_spanish:
  - sin miedo
  - valientemente
  lexicon: BDAG
  rationale: Se preserva explícitamente la ausencia de temor. «Sin temor» es formal y transparente, y evita el desplazamiento semántico hacia una valentía más general.
- source_word: τὸν λόγον
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - la palabra de Dios
  lexicon: BDAG
  rationale: Aquí λόγος se entiende como el mensaje proclamado. «La palabra» es la traducción más cercana y evita añadir «de Dios», que no aparece en el griego.
- source_word: λαλεῖν
  english_pob_choice: to speak
  chosen_spanish: hablar
  alternatives_spanish:
  - proclamar
  - decir
  lexicon: BDAG
  rationale: λαλέω es un verbo general de habla; «hablar» refleja con precisión la acción sin intensificarla indebidamente a «proclamar».
theological_decisions:
- issue: Alcance de ἀδελφοί
  english_pob_reading: Rendered as 'brothers' in the main text, with a footnote noting likely inclusive reference to fellow believers.
  chosen_spanish_reading: Se traduce «los hermanos» en el texto principal, con nota de posible referencia inclusiva a creyentes en general.
  alternative_spanish_readings:
  - los hermanos y hermanas
  - los creyentes
  rationale: El plural masculino gramatical se conserva en la línea principal, siguiendo la filosofía de precisión de género del proyecto. La nota retiene la posibilidad contextual de un grupo mixto de creyentes.
  doctrine_reference: Precisión de género frente a lenguaje inclusivo por contexto
- issue: Relación de la confianza con el Señor y con las cadenas
  english_pob_reading: '''having become confident in the Lord because of my chains'''
  chosen_spanish_reading: «habiendo cobrado confianza en el Señor por mis cadenas» mantiene la confianza como derivada del contexto de Pablo y situada en el Señor.
  alternative_spanish_readings:
  - habiendo cobrado confianza en el Señor a causa de mis cadenas
  - confiados en el Señor por mis cadenas
  rationale: La sintaxis española permite conservar tanto la esfera de confianza («en el Señor») como la causa desencadenante («por mis cadenas») sin diluir el vínculo entre ambas.
  doctrine_reference: Lectura sintáctica y causal del participio perfecto
- issue: Naturaleza de τὸν λόγον
  english_pob_reading: the word
  chosen_spanish_reading: «la palabra»
  alternative_spanish_readings:
  - el mensaje
  - la palabra de Dios
  rationale: No se añade un especificador teológico que el griego no expresa. En el contexto paulino, la referencia al anuncio del evangelio queda suficientemente marcada por el sustantivo solo.
  doctrine_reference: Fidelidad semántica al texto griego
translation_notes:
  revision_awareness: El borrador sigue de cerca el contexto auditado en inglés y no introduce cambios respecto del sentido acordado. Se mantiene la imagen concreta de «cadenas», el matiz de estado resultante en «habiendo cobrado confianza» y la ausencia de una intensificación no sustentada en «hablar».
  spanish_consistency_notes:
  - Se usa «Señor» para κύριος en esta frase paulina, conforme al uso establecido del proyecto.
  - Se mantiene el género masculino plural en «los hermanos» en el texto principal, con nota aclaratoria de posible inclusión amplia.
  - «La palabra» conserva la sobriedad del λόγος sin añadir «de Dios».
  - '«Sin temor»/«se atreven» reproduce bien la progresión: confianza, audacia, ausencia de miedo.'
