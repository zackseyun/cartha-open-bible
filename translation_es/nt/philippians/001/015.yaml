translation:
  language: es
  text: Algunos, en verdad, proclaman al Mesías por envidia y rivalidad[a], pero otros por buena voluntad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Mesías» traduce el título griego Χριστός; la alternativa tradicional es «Cristo».
    reason: lexical_alternative
lexical_decisions:
- source_word: Τινὲς … τινὲς
  english_pob_choice: Some … others
  chosen_spanish: Algunos … otros
  alternatives_spanish:
  - Ciertos … otros
  - Algunas personas … otros
  lexicon: Pronombre indefinido τινες
  rationale: La construcción μέν … δέ contrasta dos grupos indeterminados; «algunos … otros» es natural en español y conserva bien el contraste.
- source_word: διὰ φθόνον
  english_pob_choice: because of envy
  chosen_spanish: por envidia
  alternatives_spanish:
  - a causa de envidia
  - desde la envidia
  lexicon: διά + acusativo (causa)
  rationale: Aquí διά con acusativo expresa motivo/causa; «por envidia» es conciso, natural y fiel al valor causal.
- source_word: ἔριν
  english_pob_choice: rivalry
  chosen_spanish: rivalidad
  alternatives_spanish:
  - contienda
  - discordia
  lexicon: BDAG / campo semántico de ἔρις
  rationale: En el contexto de motivos competitivos, «rivalidad» reproduce mejor la idea de competencia que una traducción más genérica o más arcaica.
- source_word: δι’ εὐδοκίαν
  english_pob_choice: because of goodwill
  chosen_spanish: por buena voluntad
  alternatives_spanish:
  - por benevolencia
  - por buen propósito
  - a causa de buena voluntad
  lexicon: BDAG / sentido de motivo
  rationale: La frase contrasta con envidia y rivalidad, por lo que conviene un valor de motivo. «Buena voluntad» es claro y positivo sin sobreinterpretar.
- source_word: τὸν Χριστόν
  english_pob_choice: the Messiah
  chosen_spanish: al Mesías
  alternatives_spanish:
  - a Cristo
  lexicon: Χριστός como título
  rationale: 'Siguiendo la decisión terminológica del proyecto, Χριστός se traduce como título: «Mesías». El artículo apoya un uso titular más que un nombre fijo.'
- source_word: κηρύσσουσιν
  english_pob_choice: proclaim
  chosen_spanish: proclaman
  alternatives_spanish:
  - predican
  - anuncian
  lexicon: BDAG
  rationale: «Proclaman» conserva el sentido de anuncio/heraldo de κηρύσσω y suena idiomático en español contemporáneo.
translation_notes:
  revision_awareness: La revisión inglesa eliminó un segundo «also» por fluidez, manteniendo el contraste de los dos grupos. El español sigue esa misma línea con una sola correlación adversativa natural y no añade elementos que el griego no exige.
  spanish_consistency_notes:
  - Se mantuvo el contraste μέν … δέ con «Algunos … pero otros».
  - Se preservó el valor causal de διά + acusativo con «por».
  - Se tradujo Χριστός como «Mesías» según la terminología base del proyecto, dejando constancia de la alternativa «Cristo» en nota.
  - «Buena voluntad» conserva el matiz de εὐδοκία sin imponer una paráfrasis doctrinal.
