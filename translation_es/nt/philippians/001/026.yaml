translation:
  language: es
  text: para que su motivo de jactancia[a] en Mesías Jesús abunde[b] por causa de mí[c], por mi regreso a ustedes otra vez[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «jactancia», o «razón para gloriarse».
    reason: lexical_alternative
  - marker: b
    text: O «se multiplique»; el verbo griego enfatiza crecimiento en abundancia.
    reason: lexical_alternative
  - marker: c
    text: Literalmente «en mí»; aquí el sentido probable es «por causa de mí» o «a causa de mí».
    reason: lexical_alternative
  - marker: d
    text: O «mediante mi venida de nuevo a ustedes»; el griego expresa la repetición con «otra vez/de nuevo».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  lexicon: BDAG
  rationale: Introduce una cláusula de propósito/resultadо que en español natural se expresa bien con «para que», manteniendo la relación con lo anterior.
- source_word: τὸ καύχημα ὑμῶν
  english_pob_choice: your boasting
  chosen_spanish: su motivo de gloria
  alternatives_spanish:
  - su jactancia
  - su gloria de la que se jactan
  lexicon: BDAG
  rationale: καύχημα puede referirse no solo al acto de jactarse, sino al motivo o contenido de esa jactancia. En español, «motivo de gloria» conserva mejor esa base/ocasión de regocijo que un simple verbo o sustantivo de jactancia.
- source_word: περισσεύῃ
  english_pob_choice: may abound
  chosen_spanish: abunde
  alternatives_spanish:
  - se desborde
  - aumente
  lexicon: BDAG
  rationale: «Abunde» conserva la idea de incremento y abundancia del subjuntivo, sin perder el tono paulino.
- source_word: ἐν Χριστῷ Ἰησοῦ
  english_pob_choice: Messiah Jesus
  chosen_spanish: en Mesías Jesús
  alternatives_spanish:
  - en Cristo Jesús
  lexicon: BDAG
  rationale: Se mantiene «Mesías» por la política del proyecto para Χριστός como título. En español, la preposición «en» se conserva porque modifica naturalmente el ámbito de la gloria/boast, no solo la persona nombrada.
- source_word: ἐν ἐμοὶ
  english_pob_choice: because of me
  chosen_spanish: por causa de mí
  alternatives_spanish:
  - en mí
  - a causa de mí
  - por mí
  lexicon: BDAG
  rationale: Aunque la forma es literalmente «en mí», el contexto favorece valor idiomático causal. «Por causa de mí» comunica esa relación sin borrar la tensión entre forma y sentido.
- source_word: διὰ τῆς ἐμῆς παρουσίας
  english_pob_choice: through my coming to you again
  chosen_spanish: mediante mi nueva venida a ustedes
  alternatives_spanish:
  - por mi nueva llegada a ustedes
  - por mi regreso a ustedes
  lexicon: BDAG
  rationale: παρουσία aquí apunta a la llegada/presencia de Pablo en relación con los filipenses. «Nueva venida» conserva el valor de retorno; «mediante» refleja el instrumento o medio por el cual aumenta ese motivo de gloria.
- source_word: πάλιν πρὸς ὑμᾶς
  english_pob_choice: to you again
  chosen_spanish: a ustedes
  alternatives_spanish:
  - de nuevo a ustedes
  - otra vez a ustedes
  lexicon: BDAG
  rationale: La idea de repetición ya quedó expresada en «nueva venida»; por ello, no se duplica de forma pesada. «A ustedes» mantiene el movimiento direccional de πρὸς ὑμᾶς.
theological_decisions:
- issue: Rendering of Χριστός as a title
  english_pob_reading: Messiah Jesus
  chosen_spanish_reading: Mesías Jesús
  alternative_spanish_readings:
  - Cristo Jesús
  rationale: Se sigue la preferencia del proyecto por traducir Χριστός como «Mesías» cuando funciona como título. En español, esto preserva el contenido semántico del griego sin depender de la forma litúrgica heredada.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
- issue: Interpretation of ἐν ἐμοὶ
  english_pob_reading: because of me
  chosen_spanish_reading: por causa de mí
  alternative_spanish_readings:
  - en mí
  - a causa de mí
  rationale: 'La frase puede sonar locativa de forma literal, pero el sentido contextual es causal/instrumental: la situación de Pablo será ocasión del aumento del motivo de gloria de los filipenses. La traducción elegida no elimina la ambigüedad, pero sí expresa el sentido más probable.'
  doctrine_reference: Uso contextual de preposiciones en el griego paulino
translation_notes:
  revision_awareness: 'El audit trail en inglés pasó por varias correcciones: primero se intentó una paráfrasis con ‘reason for boasting’, luego se ajustó la sintaxis para acercarla al griego, y finalmente se restauró ‘Messiah’ por política doctrinal. La presente versión española sigue esa última decisión, pero mantiene la tensión de καύχημα como ‘motivo de gloria’ y de ἐν ἐμοὶ como causal, no meramente locativo.'
  spanish_consistency_notes:
  - Se conserva «Mesías» de forma consistente con la política del proyecto para Χριστός.
  - Se evita «SEÑOR» porque el texto no contiene κύριος en esta cláusula.
  - «Por causa de mí» refleja el valor contextual de ἐν ἐμοὶ sin convertirlo en una frase teológica técnica.
  - La repetición de ‘de nuevo’ se evita en el cuerpo principal para no sobrecargar el español, ya que la idea de retorno queda expresada en «nueva venida».
