source:
  edition: SBLGNT
  text: ἵνα τὸ καύχημα ὑμῶν περισσεύῃ ἐν Χριστῷ Ἰησοῦ ἐν ἐμοὶ διὰ τῆς ἐμῆς παρουσίας πάλιν πρὸς ὑμᾶς.
base_translation:
  language: en
  yaml_path: translation/nt/philippians/001/026.yaml
  text: so that your boasting in Messiah Jesus may abound because of me through my coming to you again[a][b][c][d].
  footnotes:
  - marker: a
    text: Or “your boasting may abound in Messiah Jesus.”
    reason: lexical_alternative
