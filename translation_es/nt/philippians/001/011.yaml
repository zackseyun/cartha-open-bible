translation:
  language: es
  text: llenos del fruto de justicia[a] que viene por medio de Jesús el Mesías[b], para gloria y alabanza de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «rectitud».'
    reason: lexical_alternative
  - marker: b
    text: «Mesías» traduce Χριστός como título.
    reason: lexical_alternative
lexical_decisions:
- source_word: πεπληρωμένοι
  english_pob_choice: filled
  chosen_spanish: llenos
  alternatives_spanish:
  - llenos de
  - colmados
  lexicon: BDAG
  rationale: El participio perfecto expresa un estado resultante; en español, 'llenos' comunica con naturalidad ese estado permanente sin sobrecargar la frase con una perífrasis demasiado pesada.
- source_word: καρπὸν
  english_pob_choice: fruit
  chosen_spanish: fruto
  alternatives_spanish:
  - fruto espiritual
  - producción
  lexicon: BDAG
  rationale: '''Fruto'' conserva la metáfora paulina de resultado visible y producido, sin explicitar más de lo que el texto permite.'
- source_word: δικαιοσύνης
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  lexicon: BDAG
  rationale: En este contexto, 'justicia' mantiene abierta la tensión semántica entre justicia y rectitud moral, como lo preserva el audit trail inglés con la nota alternativa.
- source_word: διὰ Ἰησοῦ Χριστοῦ
  english_pob_choice: that comes through Jesus Messiah
  chosen_spanish: que viene por medio de Jesús Mesías
  alternatives_spanish:
  - que viene por medio de Jesús Cristo
  - por medio de Jesús Mesías
  lexicon: BDAG
  rationale: διά con genitivo expresa medio/agency. 'Por medio de' comunica esa mediación de forma natural en español; 'viene' mantiene la idea de procedencia del fruto sin añadir causalidad excesiva. 'Mesías' preserva el valor titulativo de Χριστός según la política del proyecto.
- source_word: Χριστοῦ
  english_pob_choice: Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Se conserva 'Mesías' como equivalente titulativo de Χριστός, evitando convertirlo en un mero apellido religioso.
- source_word: εἰς δόξαν καὶ ἔπαινον θεοῦ
  english_pob_choice: to the glory and praise of God
  chosen_spanish: para la gloria y alabanza de Dios
  alternatives_spanish:
  - para gloria y alabanza de Dios
  - con miras a la gloria y alabanza de Dios
  lexicon: BDAG
  rationale: '''Para'' reproduce bien el valor final/teleológico de εἰς en español. ''Gloria'' y ''alabanza'' siguen de cerca los dos sustantivos griegos sin necesidad de expansión interpretativa.'
theological_decisions:
- issue: Sentido de 'fruto de justicia'
  english_pob_reading: An ethical/spiritual fruit characterized by righteousness and produced through Jesus Messiah.
  chosen_spanish_reading: Un fruto ético y espiritual caracterizado por la justicia y producido por medio de Jesús Mesías.
  alternative_spanish_readings:
  - el fruto que consiste en justicia
  - el fruto contado como justicia
  rationale: La frase griega admite más de un matiz del genitivo. La redacción española conserva la ambigüedad útil y evita resolverla de manera dogmática o más precisa de lo que el texto exige.
  doctrine_reference: Preservar la tensión lexical/theological rather than over-specify the genitival relationship.
translation_notes:
  revision_awareness: El manuscrito inglés más reciente volvió a 'Jesus Messiah' tras una corrección que había introducido 'Christ' contra la política doctrinal del proyecto. La versión española sigue esa decisión y mantiene 'Mesías' para Χριστός. También conserva la nota de alternativa semántica para δικαιοσύνη, aquí expresada como 'justicia'.
  spanish_consistency_notes:
  - Se mantiene 'Jesús Mesías' en lugar de 'Jesucristo' para reflejar el valor titulativo de Χριστός en el marco POB.
  - '''justicia'' se usa como equivalente principal de δικαιοσύνη, con nota alternativa ''rectitud'' para preservar la tensión semántica.'
  - '''para la gloria y alabanza de Dios'' sigue el propósito final de εἰς sin añadir elementos interpretativos.'
