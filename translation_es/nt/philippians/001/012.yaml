translation:
  language: es
  text: Ahora quiero que sepan, hermanos[a], que lo que me ha pasado más bien ha servido para el avance del evangelio,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O hermanos y hermanas; el griego dice «hermanos» y puede referirse a toda la comunidad creyente.
    reason: lexical_alternative
lexical_decisions:
- source_word: Γινώσκειν δὲ ὑμᾶς βούλομαι
  english_pob_choice: I want you to know
  chosen_spanish: Ahora quiero que sepan
  alternatives_spanish:
  - Quiero que sepan
  - Deseo que sepan
  - Quiero hacerles saber
  lexicon: BDAG
  rationale: La construcción epistolar expresa intención de informar; en español, «quiero que sepan» comunica de manera natural y directa el matiz volitivo sin volver la frase rígida. «Ahora» refleja el δέ de transición suave.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - hermanos(as)
  - hermanos y hermanas en la fe
  lexicon: BDAG
  rationale: Se conserva el plural masculino del texto griego como vocativo. En español, «hermanos» mantiene el valor comunitario y puede abarcar a toda la congregación sin sobreexplicar en el texto principal.
- source_word: τὰ κατ’ ἐμὲ
  english_pob_choice: what has happened to me
  chosen_spanish: lo que me ha pasado
  alternatives_spanish:
  - mis circunstancias
  - las cosas que me conciernen
  - lo que me concierne
  lexicon: BDAG
  rationale: La expresión abarca la situación de Pablo en conjunto. «Lo que me ha pasado» es idiomático en español y conserva la amplitud referencial sin reducirla a un solo aspecto.
- source_word: μᾶλλον
  english_pob_choice: actually
  chosen_spanish: más bien
  alternatives_spanish:
  - en realidad
  - de hecho
  - más que eso
  lexicon: BDAG
  rationale: Aquí μᾶλλον matiza un resultado inesperado o contrario a lo que podría suponerse. «Más bien» conserva ese giro correctivo y resulta natural en español formal.
- source_word: εἰς προκοπὴν
  english_pob_choice: served to advance
  chosen_spanish: ha servido para el avance
  alternatives_spanish:
  - ha contribuido al avance
  - ha redundado en el avance
  - ha servido para promover
  lexicon: BDAG
  rationale: La preposición con el sustantivo indica dirección hacia el progreso. «Ha servido para el avance» reproduce la relación de resultado sin forzar un verbo más interpretativo.
- source_word: τοῦ εὐαγγελίου
  english_pob_choice: the gospel
  chosen_spanish: del evangelio
  alternatives_spanish:
  - de la buena noticia
  - del evangelio de Cristo
  lexicon: BDAG
  rationale: Se mantiene «evangelio» como término eclesial ya asentado en español y como equivalencia directa de εὐαγγέλιον. La alternativa «buena noticia» es posible, pero aquí el registro epistolar favorece el término tradicional y preciso.
- source_word: ἐλήλυθεν
  english_pob_choice: has actually served to advance
  chosen_spanish: ha servido
  alternatives_spanish:
  - ha resultado
  - ha llegado a servir
  - ha venido a
  lexicon: BDAG
  rationale: El perfecto expresa un estado resultante que permanece vigente. En español, el perfecto compuesto «ha servido» comunica ese efecto continuo en forma natural.
theological_decisions:
- issue: Alcance inclusivo de ἀδελφοί
  english_pob_reading: brothers, with a footnote noting possible inclusive reference to the whole believing community
  chosen_spanish_reading: hermanos, con nota sobre posible sentido inclusivo
  alternative_spanish_readings:
  - hermanos y hermanas
  - hermanos/as
  - la comunidad creyente
  rationale: Se conserva el vocativo masculino plural del griego en el texto principal y se deja constancia de la posible referencia a toda la comunidad. Esto sigue el patrón auditable del POB en inglés sin sustituir prematuramente el término del original.
  doctrine_reference: Uso epistolar comunitario del Nuevo Testamento; política de precisión lexical
- issue: Sentido de εὐαγγέλιον
  english_pob_reading: gospel, with footnote noting 'Or gospel.'
  chosen_spanish_reading: evangelio
  alternative_spanish_readings:
  - buena noticia
  - evangelio
  rationale: En español, «evangelio» es la correspondencia más estable y natural para εὐαγγέλιον en este contexto. Se mantiene también el potencial de alternativa semántica en nota para reflejar el rango de sentido del término griego, como hace el POB inglés.
  doctrine_reference: Terminología neotestamentaria; semántica de εὐαγγέλιον
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que afinó la idea de resultado a «served to advance the gospel». En español se reflejó esa misma relación con «ha servido para el avance del evangelio», evitando una paráfrasis más libre como «ha promovido» o «ha resultado en» para conservar la cercanía al patrón εἰς + sustantivo.
  spanish_consistency_notes:
  - Se usa «evangelio» en lugar de «buena noticia» para mantener consistencia terminológica con el registro neotestamentario del POB cuando el contexto es eclesial y epistolar.
  - Se evitó traducir δέ con una conjunción fuerte; «Ahora» mantiene la transición suave del original.
  - Se conservó el orden lógico del griego sin calco extremo, priorizando una frase española publicable y transparente.
