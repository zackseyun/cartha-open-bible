translation:
  language: es
  text: Pero permanecer en la carne es más necesario por el bien de ustedes[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «seguir viviendo en el cuerpo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸ ἐπιμένειν
  english_pob_choice: to remain
  chosen_spanish: permanecer
  alternatives_spanish:
  - quedarse
  - seguir viviendo
  lexicon: BDAG
  rationale: El infinitivo articular funciona sustantivamente; «permanecer» comunica bien la idea de continuar en la vida terrenal y suena natural en español, sin perder el matiz de continuación.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Aquí δέ introduce contraste con la posibilidad anterior de partir para estar con Cristo, por lo que «Pero» reproduce mejor el giro argumentativo.
- source_word: ἐν τῇ σαρκὶ
  english_pob_choice: in the flesh
  chosen_spanish: en la carne
  alternatives_spanish:
  - en el cuerpo
  - en esta vida
  lexicon: BDAG
  rationale: Se conserva el sentido literal de σάρξ como existencia corporal/terrenal. «Carne» mantiene la tensión lexical documentada y evita moralizar el término como «naturaleza pecaminosa».
- source_word: ἀναγκαιότερον
  english_pob_choice: more necessary
  chosen_spanish: más necesario
  alternatives_spanish:
  - más preciso
  - más indispensable
  lexicon: BDAG
  rationale: El comparativo se expresa de forma directa y clara con «más necesario», que corresponde bien al grado comparativo del griego.
- source_word: δι’ ὑμᾶς
  english_pob_choice: for your sake
  chosen_spanish: por causa de ustedes
  alternatives_spanish:
  - para ustedes
  - a favor de ustedes
  lexicon: BDAG
  rationale: «Por causa de ustedes» conserva la orientación benefactora/pastoral de la expresión sin sonar demasiado abstracta; es una opción natural en español bíblico contemporáneo.
theological_decisions:
- issue: Sentido de σάρξ en este versículo
  english_pob_reading: sentido literal de vida encarnada/terrenal; no "sinful nature"
  chosen_spanish_reading: «la carne» como existencia corporal/terrenal
  alternative_spanish_readings:
  - «la naturaleza pecaminosa»
  - «el cuerpo» como paráfrasis interpretativa
  rationale: El contexto contrasta partir para estar con Cristo con permanecer en la vida presente para beneficio de los filipenses. Por eso se evita cargar σάρξ con un sentido moral que el pasaje no exige.
  doctrine_reference: 'Contested terms table: σάρξ = ''flesh'' (literal) / ''sinful nature'' (metaphorical), context-dependent.'
translation_notes:
  revision_awareness: El texto coincide con la última revisión del inglés POB, que no introdujo cambios. La versión española sigue de cerca la decisión auditada de leer σάρξ literalmente y de entender el infinitivo articular como continuidad de la vida terrenal.
  spanish_consistency_notes:
  - Se mantiene «carne» para σάρξ en sentido literal, en coherencia con el criterio terminológico del proyecto.
  - Se usa «Pero» para δὲ porque el contexto inmediato es contrastivo.
  - La nota al pie conserva la alternativa lexical documentada en el inglés POB, adaptada con naturalidad al español.
  - «Por causa de ustedes» refleja el beneficio orientado del dativo sin añadir interpretación doctrinal.
