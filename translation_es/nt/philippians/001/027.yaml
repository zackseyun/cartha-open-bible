source:
  edition: SBLGNT
  text: Μόνον ἀξίως τοῦ εὐαγγελίου τοῦ Χριστοῦ πολιτεύεσθε, ἵνα εἴτε ἐλθὼν καὶ ἰδὼν ὑμᾶς εἴτε ἀπὼν ⸀ἀκούω τὰ περὶ ὑμῶν, ὅτι στήκετε ἐν ἑνὶ πνεύματι, μιᾷ ψυχῇ συναθλοῦντες τῇ πίστει τοῦ εὐαγγελίου,
base_translation:
  language: en
  yaml_path: translation/nt/philippians/001/027.yaml
  text: Only conduct yourselves in a manner worthy of the gospel of Messiah[a], so that whether I come and see you or am absent, I may hear about you that you are standing firm in one spirit, with one soul striving together for the faith of the gospel[e][d][c][b],
