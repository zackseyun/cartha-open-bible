  - marker: c
    text: Or 'in one Spirit.'
    reason: alternative_reading
  - marker: d
    text: Or 'with one mind.'
    reason: lexical_alternative
  - marker: e
    text: Or 'contending side by side for faith in the gospel.'
    reason: alternative_reading
