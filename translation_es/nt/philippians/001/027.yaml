    changes_summary: 'Replaced ''live as citizens'' with ''conduct yourselves'' for a more natural and broadly accurate rendering of πολιτεύεσθε in this context; changed ''Messiah'' to ''Christ'' to match τοῦ Χριστοῦ and common formal register; changed ''hear of you'' to ''hear about you'' for more natural English. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: Solo condúzcanse de una manera digna del evangelio de Mesías[b], para que, ya sea que vaya y los vea, o que esté ausente, oiga acerca de ustedes que están firmes en un mismo espíritu[c], con una misma alma[d], luchando juntos[e] por la fe del evangelio.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «vivan como ciudadanos». El verbo griego tiene matices cívicos.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «del evangelio de Cristo».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «en un mismo Espíritu».'
    reason: alternative_reading
  - marker: d
    text: 'O: «con una misma mente».'
    reason: lexical_alternative
  - marker: e
    text: 'O: «luchando codo a codo por la fe en el evangelio».'
    reason: alternative_reading
lexical_decisions:
- source_word: Μόνον
  english_pob_choice: Only
  chosen_spanish: Solo
  alternatives_spanish:
  - Solamente
  - Solo esto
  lexicon: BDAG
  rationale: Expresa el énfasis introductorio sin añadir contenido ajeno; en español 'Solo' comunica la misma focalización retórica.
- source_word: ἀξίως
  english_pob_choice: in a manner worthy of
  chosen_spanish: de una manera digna de
  alternatives_spanish:
  - dignamente de
  - como corresponde al
  lexicon: BDAG
  rationale: Mantiene el valor adverbial ético de la frase y su relación con la conducta exigida por el evangelio.
- source_word: πολιτεύεσθε
  english_pob_choice: conduct yourselves
  chosen_spanish: condúzcanse
  alternatives_spanish:
  - vivan como ciudadanos
  - compórtense
  lexicon: BDAG
  rationale: La elección española conserva la idea de conducta pública y ética; no se explotó explícitamente la metáfora cívica en el texto principal, porque la lectura inglesa auditada terminó en una forma más amplia y natural de 'conduct yourselves'.
- source_word: εὐαγγελίου
  english_pob_choice: gospel
  chosen_spanish: evangelio
  alternatives_spanish:
  - buena noticia
  lexicon: BDAG
  rationale: '''Evangelio'' es el equivalente estable en español para el término paulino y preserva su peso teológico.'
- source_word: Χριστοῦ
  english_pob_choice: Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Se conserva la decisión doctrinal de traducir el título como 'Mesías' cuando λειτουργa como título, manteniendo la distinción frente a su uso ya lexicalizado como nombre propio.
- source_word: ἀκούω τὰ περὶ ὑμῶν
  english_pob_choice: I may hear about you
  chosen_spanish: oiga acerca de ustedes
  alternatives_spanish:
  - oiga de ustedes
  - escuche noticias de ustedes
  lexicon: BDAG
  rationale: La construcción española refleja el idiomático τὰ περὶ ὑμῶν sin volverlo demasiado literal ni perder el matiz de información recibida.
- source_word: στήκετε
  english_pob_choice: are standing firm
  chosen_spanish: están firmes
  alternatives_spanish:
  - se mantienen firmes
  - permanecen firmes
  lexicon: BDAG
  rationale: '''Están firmes'' conserva la idea de estabilidad y perseverancia sin recargar el progresivo inglés con una perífrasis innecesaria en español.'
- source_word: ἐν ἑνὶ πνεύματι
  english_pob_choice: in one spirit
  chosen_spanish: en un mismo espíritu[c]
  alternatives_spanish:
  - en un solo espíritu
  - en un mismo Espíritu
  lexicon: BDAG
  rationale: La opción conserva la ambigüedad textual entre disposición compartida y posible referencia al Espíritu Santo; 'mismo' ayuda a expresar unidad. La nota marca la lectura alternativa mayúscula.
- source_word: μιᾷ ψυχῇ
  english_pob_choice: with one soul
  chosen_spanish: con una misma alma[d]
  alternatives_spanish:
  - con una sola alma
  - con un mismo sentir
  lexicon: BDAG
  rationale: Se retiene el sustantivo concreto 'alma' para no diluir ψυχή en puro cognitivismo; 'misma' expresa la unidad del grupo. La nota preserva la alternativa inglesa 'with one mind' como posible matiz.
- source_word: συναθλοῦντες
  english_pob_choice: striving together
  chosen_spanish: combatiendo juntos[e]
  alternatives_spanish:
  - luchando juntos
  - compitiendo codo a codo
  lexicon: BDAG
  rationale: El verbo comparte imaginería atlética/agonística; 'combatiendo juntos' transmite el esfuerzo conjunto y la intensidad del término sin sonar forzado. La nota conserva la alternativa 'contending side by side'.
- source_word: πίστει
  english_pob_choice: faith
  chosen_spanish: la fe
  alternatives_spanish:
  - la fidelidad
  - la confianza
  lexicon: BDAG
  rationale: Se conserva el valor estándar de πίστις como 'fe', ya que el contexto no obliga a desplazarlo a 'fidelidad' o 'confianza'.
- source_word: τῇ πίστει τοῦ εὐαγγελίου
  english_pob_choice: for the faith of the gospel
  chosen_spanish: por la fe del evangelio
  alternatives_spanish:
  - por la fe en el evangelio
  - por la fidelidad del evangelio
  lexicon: BDAG
  rationale: La construcción española reproduce la relación genitiva con la misma apertura interpretativa que el inglés auditado, sin resolver en exceso si se trata de la fe perteneciente al evangelio o suscitada por él.
theological_decisions:
- issue: 'Sentido de πνεύματι: unidad humana compartida o referencia al Espíritu Santo'
  english_pob_reading: in one spirit
  chosen_spanish_reading: en un mismo espíritu[c]
  alternative_spanish_readings:
  - en un mismo Espíritu
  - en un solo espíritu
  rationale: La proximidad de 'con una misma alma' favorece una lectura de unidad y resolución compartidas entre los creyentes, pero la mayúscula queda abierta como posibilidad teológica sin resolverla en el texto principal.
  doctrine_reference: Preservar la tensión teológica documentada, sin cerrarla indebidamente.
- issue: 'Valor de Χριστός en este contexto: título mesiánico o nombre litúrgico fijo'
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: Se sigue la política doctrinal de traducir Χριστός como título cuando el contexto lo permite; aquí no hay razón para tratarlo como nombre fijo en la línea principal.
  doctrine_reference: 'DOCTRINE.md: Χριστός se traduce normalmente como ''Mesías'' cuando funciona como título.'
translation_notes:
  revision_awareness: 'La versión española sigue la lectura corregida del audit trail: Χριστός se mantiene como ''Mesías'' según la política doctrinal restaurada; πολιτεύεσθε se vierte con un imperativo de conducta general en vez de explotar de forma rígida la metáfora cívica; y τὰ περὶ ὑμῶν se naturaliza como ''oiga acerca de ustedes''.'
  spanish_consistency_notes:
  - Se mantuvo 'evangelio' para εὐαγγέλιον en todo el verso.
  - Se usó 'Mesías' para Χριστός conforme al criterio POB en este pasaje.
  - La ambigüedad de 'espíritu/Espíritu' queda explícitamente preservada en nota.
  - '''Fe'' se conserva en singular para πίστις, sin desplazarla a fidelidad en el texto principal.'
  - Se evitó la fórmula eclesiástica 'en un solo cuerpo' u otras expansiones no sustentadas por el griego.
