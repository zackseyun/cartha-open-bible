review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: exhortación principal, propósito de oír noticias, firmeza en unidad, y esfuerzo conjunto por la fe del evangelio. Conserva correctamente «Mesías» para Χριστοῦ y mantiene la ambigüedad de πνεύματι con nota. Sin embargo, la nota [a] no preserva fielmente la alternativa del inglés/greigo, porque el texto principal ya dice «condúzcanse» y la nota repite esa misma forma en vez de ofrecer la alternativa cívica; además, «combatiendo juntos» suena algo bélico y menos natural que una opción que conserve mejor la idea de esfuerzo conjunto/agonístico de συναθλοῦντες.'
  spanish_quality_summary: El español es claro y digno, mayormente natural y legible. «Solo … condúzcanse de una manera digna» funciona, aunque es más idiomático «compórtense» o «vivan». «Con una misma alma» es fiel pero algo marcado; se sostiene por la nota. La reparación principal necesaria es la nota [a], y conviene suavizar «combatiendo juntos» a «luchando juntos» para mejorar naturalidad sin perder fuerza.
  glossary_alignment: 'Buen alineamiento con la terminología del proyecto: Χριστοῦ -> «Mesías», εὐαγγέλιον -> «evangelio», πνεῦμα -> «espíritu» con alternativa «Espíritu» en nota. No hay conflicto con Yahvé ni otros términos de la guía. La única desalineación documental es que la nota léxica de πολιτεύεσθε no presenta la alternativa cívica correcta.'
  issues:
  - severity: medium
    issue: La nota [a] repite el texto principal en vez de ofrecer la alternativa léxica documentada.
    rationale: El inglés auditado pone como texto principal «conduct yourselves» y como nota la alternativa cívica «live as citizens». En español, la nota debe reflejar «vivan como ciudadanos», no «condúzcanse».
  - severity: low
