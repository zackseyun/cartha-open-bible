revisions:
- from: Solo [a] condúzcanse de una manera digna del evangelio de Mesías[b], para que, ya sea que vaya y los vea, o que esté ausente, oiga acerca de ustedes que están firmes en un mismo espíritu[c], con una misma alma[d], combatiendo juntos[e] por la fe del evangelio.
  to: Solo condúzcanse de una manera digna del evangelio de Mesías[b], para que, ya sea que vaya y los vea, o que esté ausente, oiga acerca de ustedes que están firmes en un mismo espíritu[c], con una misma alma[d], luchando juntos[e] por la fe del evangelio.[a]
  rationale: Se corrige la nota de πολιτεύεσθε para que preserve la alternativa cívica documentada en vez de duplicar el texto principal. También se mejora la naturalidad de συναθλοῦντες con «luchando juntos». Se mantiene «Mesías», la ambigüedad de «espíritu/Espíritu», y la literalidad intencional de «una misma alma» y «la fe del evangelio».
