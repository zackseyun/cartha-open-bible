  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. πίστις se mantiene como «fe», y «gozo en la fe» sigue la decisión teológica documentada con alternativas en nota.
