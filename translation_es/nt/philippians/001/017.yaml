    text: O «Cristo».
    reason: alternative_reading
  - marker: b
    text: Literalmente, «en mis cadenas»; es decir, en mi encarcelamiento.
    reason: lexical_alternative
  revision_rationale: Se corrige la principal falla de fidelidad y legibilidad al sustituir «en mis prisiones» por «en mi encarcelamiento», que refleja mejor la metonimia de τοῖς δεσμοῖς μου en español natural. También se restituye la nota [b] al lugar correcto, siguiendo el aparato del inglés auditado. Además, se suaviza «levantar aflicción» a «causar más aflicción», una formulación más idiomática en español que conserva la intención de θλῖψιν ἐγείρειν y expresa mejor el matiz de aumentar el sufrimiento de Pablo.
