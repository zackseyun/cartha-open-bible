translation:
  language: es
  text: Pero los otros proclaman al Mesías[a] por ambición egoísta, no con sinceridad, pensando causar más aflicción para mí en mi encarcelamiento[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Cristo».
    reason: alternative_reading
  - marker: b
    text: Literalmente, «en mis cadenas»; es decir, en mi encarcelamiento.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐριθείας
  english_pob_choice: selfish ambition
  chosen_spanish: ambición egoísta
  alternatives_spanish:
  - rivalidad
  - ambición facciosa
  lexicon: BDAG
  rationale: El griego expresa una motivación de búsqueda de provecho propio y rivalidad partidista. «Ambición egoísta» conserva esa fuerza sin reducirlo a simple egoísmo general, y «egoísta» hace explícita la orientación del motivo en español.
- source_word: Χριστόν
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Aquí Χριστός funciona como título, no solo como nombre fijo. Siguiendo el criterio doctrinal del proyecto, se traduce por «Mesías» para mantener el valor titular y la lectura auditable del término griego.
- source_word: καταγγέλλουσιν
  english_pob_choice: proclaim
  chosen_spanish: proclaman
  alternatives_spanish:
  - anuncian
  - predican
  lexicon: BDAG
  rationale: «Proclaman» conserva el sentido público y declarativo de καταγγέλλω sin limitarlo al acto técnico de predicar en un contexto eclesiástico.
- source_word: ἁγνῶς
  english_pob_choice: sincerely
  chosen_spanish: con sinceridad
  alternatives_spanish:
  - puramente
  - con motivos puros
  lexicon: BDAG
  rationale: El adverbio se refiere a la pureza de intención. «Con sinceridad» comunica esa honestidad de motivación en español natural, especialmente con la negación inmediata del texto.
- source_word: οἰόμενοι
  english_pob_choice: thinking
  chosen_spanish: pensando
  alternatives_spanish:
  - suponiendo
  - imaginando
  lexicon: BDAG
  rationale: El participio se vierte de manera directa como una acción concomitante de intención. «Pensando» es natural en español y mantiene la relación con el propósito que sigue.
- source_word: θλῖψιν ἐγείρειν
  english_pob_choice: to raise up affliction
  chosen_spanish: levantar aflicción
  alternatives_spanish:
  - causar aflicción
  - provocar aflicción
  lexicon: BDAG
  rationale: Se conserva la metáfora verbal de ἐγείρειν («levantar/poner en movimiento») con «levantar», y «aflicción» reproduce θλῖψις sin suavizarla. Aunque algo más literal que otras opciones, mantiene la tensión del texto entre intención hostil y formulación idiomática.
- source_word: τοῖς δεσμοῖς μου
  english_pob_choice: for me in my imprisonment
  chosen_spanish: en mis prisiones
  alternatives_spanish:
  - en mis cadenas
  - en mi prisión
  lexicon: BDAG
  rationale: δεσμοί significa literalmente «cadenas», pero el contexto lo usa metonímicamente por prisión/encarcelamiento. «En mis prisiones» refleja la pluralidad del griego y mantiene la idea de cautiverio; la forma es comprensible para el lector moderno sin perder la referencia concreta.
theological_decisions:
- issue: Renderizar Χριστός como título mesiánico
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: El contexto habla del contenido de la proclamación, así que el valor titular de Χριστός es prominente. Traducirlo por «Mesías» evita tratarlo como nombre propio fijo y sigue la directriz doctrinal del proyecto.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Messiah (where title; Christ where name-like)'
- issue: Mantener el contraste moral del versículo
  english_pob_reading: out of selfish ambition, not sincerely
  chosen_spanish_reading: por ambición egoísta, no con sinceridad
  alternative_spanish_readings:
  - por rivalidad, no con pureza
  - por ambición facciosa, no con sinceridad
  rationale: El griego contrapone una motivación impura con una ausencia de sinceridad. La traducción conserva la oposición moral y no la diluye en una fórmula meramente psicológica.
  doctrine_reference: No aplica doctrina específica; decisión de coherencia semántica y ética del pasaje.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail al preferir una formulación más formal y cercana a «raise up affliction», pero la vierte en español como «levantar aflicción» para conservar la metáfora del griego sin caer en una construcción extraña. También se conserva el contraste «los otros» → «los otros»/«pero los otros» como en el contexto inmediato del versículo.
  spanish_consistency_notes:
  - Se usa «Mesías» de forma consistente con la política del proyecto para Χριστός cuando actúa como título.
  - «Proclaman» mantiene el registro público y no técnico del verbo griego.
  - «En mis prisiones» intenta reflejar el plural metonímico de δεσμοῖς, sin perder inteligibilidad en español.
  - La puntuación separa claramente las cláusulas participiales y el motivo hostil, como en el griego.
