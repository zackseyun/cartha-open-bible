translation:
  language: es
  text: Porque a ustedes se les ha concedido por gracia, por causa de Mesías[a], no solo creer en él[b], sino también padecer por él[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘Cristo’. Aquí Χριστός se vierte como ‘Mesías’ porque funciona como título y no como nombre.
    reason: lexical_alternative
  - marker: b
    text: O ‘confiar en él’.
    reason: lexical_alternative
  - marker: c
    text: O ‘por su causa’ / ‘por causa de él’.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Introduce la razón o explicación del enunciado anterior; en español, ‘Porque’ mantiene bien la conexión discursiva sin sonar mecánica.
- source_word: ἐχαρίσθη
  english_pob_choice: it has been graciously granted
  chosen_spanish: les fue concedido por gracia
  alternatives_spanish:
  - les fue concedido
  - se les dio gratuitamente
  lexicon: BDAG
  rationale: χαρίζομαι expresa un dar generoso y gracioso; ‘les fue concedido por gracia’ preserva tanto la pasividad como el matiz de don.
- source_word: τὸ ὑπὲρ Χριστοῦ
  english_pob_choice: for the sake of Messiah
  chosen_spanish: en favor de Mesías
  alternatives_spanish:
  - por causa de Mesías
  - por Mesías
  - a favor de Mesías
  lexicon: BDAG
  rationale: ὑπέρ aquí introduce la relación de causa/beneficio respecto de Cristo. ‘En favor de Mesías’ conserva la idea de referencia y beneficio sin convertirlo en una mera locución causal. Se mantiene ‘Mesías’ conforme a la política del proyecto para Χριστός como título.
- source_word: πιστεύειν εἰς αὐτόν
  english_pob_choice: to believe in him
  chosen_spanish: creer en él
  alternatives_spanish:
  - confiar en él
  - creer en él y confiar en él
  lexicon: BDAG
  rationale: El idiomático πιστεύειν εἰς apunta a creer/poner fe en una persona. ‘Creer en él’ es natural y fiel; ‘confiar’ sería una alternativa válida, pero menos directa aquí.
- source_word: πάσχειν
  english_pob_choice: to suffer
  chosen_spanish: padecer
  alternatives_spanish:
  - sufrir
  - experimentar sufrimiento
  lexicon: BDAG
  rationale: ‘Padecer’ mantiene la fuerza verbal y resulta más formal/digno en español bíblico que ‘sufrir’, sin perder claridad.
- source_word: ὑπὲρ αὐτοῦ
  english_pob_choice: for him
  chosen_spanish: por él
  alternatives_spanish:
  - por su causa
  - por su sake
  lexicon: BDAG
  rationale: ὑπέρ en este segundo uso expresa sufrimiento por causa de él o en relación con él; ‘por él’ es breve y natural en español, y deja abierta la relación causal/sustitutiva sin sobreespecificarla.
theological_decisions:
- issue: Mantener la concesión divina explícita para creer y padecer
  english_pob_reading: Retain the explicit gift language for both believing and suffering
  chosen_spanish_reading: Mantener explícito que a ustedes les fue concedido por gracia tanto creer como padecer
  alternative_spanish_readings:
  - Suavizarlo como ‘se les permitió’
  - Reformular para no atribuir ambos actos a un don divino
  rationale: El griego presenta tanto la fe como el padecimiento como parte de lo concedido. La traducción conserva esa tensión teológica sin resolverla ni atenuarla.
  doctrine_reference: Preservar la tensión teológica del texto.
- issue: Elección de ‘Mesías’ para Χριστός
  english_pob_reading: Χριστός rendered as 'Messiah' because it functions as a title rather than a name
  chosen_spanish_reading: ‘Mesías’ en vez de ‘Cristo’
  alternative_spanish_readings:
  - Cristo
  - el Cristo
  rationale: Siguiendo la guía del proyecto y la decisión inglesa auditada, Χριστός funciona aquí como título. ‘Mesías’ evita la fosilización litúrgica de ‘Cristo’ donde el título es relevante.
  doctrine_reference: Terminología cristológica del proyecto POB.
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente restableció ‘Messiah’ después de una pasada que había cambiado Χριστός a ‘Christ’. La redacción española sigue la misma política del proyecto: traducir Χριστός como ‘Mesías’ en el texto principal y reservar ‘Cristo’ como alternativa anotada. También se evitó trasladar mecánicamente el orden inglés; el sintagma inicial se integró en español como una cláusula natural (‘Porque a ustedes les fue concedido por gracia, en favor de Mesías...’).'
  spanish_consistency_notes:
  - Se mantiene ‘Mesías’ de forma consistente para Χριστός en el texto principal.
  - ‘Creer en él’ conserva la construcción de fe personal sin introducir ‘confiar’ como lectura principal.
  - ‘Padecer’ se eligió por dignidad formal, aunque ‘sufrir’ permanece como alternativa válida.
  - Las notas usan marcadores únicos y todos aparecen anclados en el texto.
  - Se preserva la concesión divina explícita, sin rebajarla a simple permiso.
