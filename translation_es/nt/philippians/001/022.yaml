review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del griego: continuidad de la vida presente (τὸ ζῆν = «seguir viviendo»), σάρξ como existencia corporal/terrenal («en la carne»), καρπὸς ἔργου como labor productiva, y la incertidumbre final («no sé»). Sin embargo, la redacción española no preserva del todo la solución principal del English POB para καρπὸς ἔργου, ya que pone en el texto principal «fruto de trabajo» mientras que el inglés fijó como preferente «fruitful labor» y dejó «fruit of labor» como alternativa. También la segunda cláusula puede acercarse mejor al énfasis formal del griego.'
  spanish_quality_summary: El español es mayormente natural y digno, pero «fruto de trabajo» suena algo áspero e incompleto en español general; «trabajo fructífero» o «labor fructífera» fluye mejor. Además, «sin embargo no sé qué escogeré» es correcto, pero una colocación más cercana al griego y al ajuste auditado sería «y cuál escogeré, no lo sé» o «pero cuál escogeré, no lo sé».
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: «carne» conserva σάρξ con la nota alternativa «cuerpo»; no hay conflicto con Mesías/Cristo, Yahvé, etc. La principal desalineación es que el texto principal en español debería reflejar la opción preferida equivalente a «fruitful labor», no la alternativa literalizada «fruto de trabajo».'
  issues:
  - severity: medium
    issue: La opción principal para καρπὸς ἔργου en el texto español no coincide con la decisión preferida del POB inglés.
    rationale: El audit trail fijó «fruitful labor» como lectura principal y reservó «fruit of labor» como alternativa. «Fruto de trabajo» en el texto principal invierte esa prioridad y además suena menos natural en español.
  - severity: low
    issue: La frase «fruto de trabajo» es poco idiomática en español.
    rationale: Aunque comprensible, carece de artículo y resulta rígida. «trabajo fructífero» comunica mejor la compresión griega sin perder sentido.
  - severity: low
    issue: La segunda cláusula puede reflejar mejor el orden y la tensión retórica del griego.
    rationale: El inglés auditado movió «which I will choose I do not know» para acercarse al original. En español, «y cuál escogeré, no lo sé» reproduce mejor ese efecto que «sin embargo no sé qué escogeré».
  revised_spanish_text: Pero si seguir viviendo en la carne[a] significa para mí trabajo fructífero[b], y cuál escogeré, no lo sé.
  revised_footnotes:
