revisions:
- from: Pero si seguir viviendo en la carne[b][a] significa para mí fruto de trabajo, sin embargo no sé qué escogeré.
  to: Pero si seguir viviendo en la carne[a] significa para mí trabajo fructífero[b], y cuál escogeré, no lo sé.
  rationale: Se revisa el texto principal para alinear καρπὸς ἔργου con la decisión preferida del POB («fruitful labor»), usando «trabajo fructífero», que además es más natural en español. Se conserva «en la carne» con nota alternativa «en el cuerpo» para mantener la dicción paulina y la decisión teológica documentada. También se ajusta la cláusula final a «y cuál escogeré, no lo sé» para reflejar mejor el orden y la tensión del griego y del English POB auditado. Se simplifican las notas para que solo recojan alternativas reales al texto revisado.
