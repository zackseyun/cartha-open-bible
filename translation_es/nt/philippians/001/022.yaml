translation:
  language: es
  text: Pero si seguir viviendo en la carne[a] significa para mí trabajo fructífero[b], y cuál escogeré, no lo sé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el cuerpo».
    reason: lexical_alternative
  - marker: b
    text: O «fruto del trabajo».
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸ ζῆν
  english_pob_choice: to go on living
  chosen_spanish: seguir viviendo
  alternatives_spanish:
  - vivir
  - continuar viviendo
  lexicon: BDAG
  rationale: El infinitivo articular expresa continuación de la vida presente; «seguir viviendo» comunica bien esa continuidad sin añadir interpretación excesiva.
- source_word: ἐν σαρκί
  english_pob_choice: in the flesh
  chosen_spanish: en la carne
  alternatives_spanish:
  - en el cuerpo
  - en la vida corporal
  lexicon: BDAG
  rationale: Se conserva «carne» porque refleja el término paulino σάρξ y, en este contexto, indica existencia terrenal corporal, no «naturaleza pecaminosa».},{
- source_word: καρπὸς ἔργου
  english_pob_choice: fruitful labor
  chosen_spanish: fruto de trabajo
  alternatives_spanish:
  - fruto del trabajo
  - trabajo fructífero
  lexicon: BDAG
  rationale: La construcción griega es compacta; «fruto de trabajo» conserva la relación entre καρπός y ἔργου sin forzar una reformulación demasiado explicativa. Dado que el español admite menos naturalmente un adjetivo equivalente directo, se privilegia la claridad literal.
- source_word: αἱρήσομαι
  english_pob_choice: I will choose
  chosen_spanish: escogeré
  alternatives_spanish:
  - elegiré
  - preferiré
  lexicon: BDAG
  rationale: En este contexto Pablo habla de optar entre dos posibilidades; «escogeré» es natural y claro en español.
- source_word: οὐ γνωρίζω
  english_pob_choice: I do not know
  chosen_spanish: no sé
  alternatives_spanish:
  - no lo sé
  - no puedo decir
  lexicon: BDAG
  rationale: Aquí γνωρίζω funciona como expresión de incertidumbre; «no sé» reproduce con naturalidad ese valor idiomático.
theological_decisions:
- issue: Sentido de σάρξ en este versículo
  english_pob_reading: physical earthly existence ('in the flesh')
  chosen_spanish_reading: existencia terrenal corporal ('en la carne')
  alternative_spanish_readings:
  - naturaleza pecaminosa
  - en el cuerpo
  rationale: El contexto contrasta la vida presente con la posible partida para estar con el Mesías; por eso σάρξ no se entiende como corrupción moral, sino como vida encarnada en esta esfera terrenal.
  doctrine_reference: 'Término controvertido: σάρξ = carne (literal) / naturaleza pecaminosa (metafórico)'
translation_notes:
  revision_awareness: 'La redacción sigue la revisión auditada que ajustó la segunda cláusula para reflejar más de cerca el griego: se mantiene la contraposición con «sin embargo» y el orden final «no sé qué escogeré». También se conserva el valor de continuidad de τὸ ζῆν y la lectura física de σάρξ.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque el versículo no contiene κύριος ni una alusión directa al nombre divino.
  - Se prefirió «carne» como término técnico paulino, con nota alternativa para «cuerpo».
  - Se mantuvo una sintaxis cercana al griego en la segunda cláusula para respetar el giro de incertidumbre de Pablo.
  - No se usó «Cristo» porque el versículo no lo contiene; la terminología cristológica no aplica aquí.
