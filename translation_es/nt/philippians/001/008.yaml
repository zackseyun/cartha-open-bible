translation:
  language: es
  text: Porque Dios es mi testigo, de cuánto los anhelo a todos ustedes con las entrañas[a] de Mesías Jesús[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «compasión».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Cristo Jesús».'
    reason: alternative_reading
lexical_decisions:
- source_word: μάρτυς
  english_pob_choice: witness
  chosen_spanish: testigo
  alternatives_spanish:
  - testimonio
  - testificante
  lexicon: BDAG
  rationale: En la fórmula idiomática «Dios es mi testigo», «testigo» reproduce de manera natural el valor forense y solemne de μάρτυς, manteniendo el sentido de juramento/apelación a Dios como garante de la sinceridad de Pablo.
- source_word: γάρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Y es que
  lexicon: BDAG
  rationale: «Porque» conserva la relación conectiva con el contexto previo y funciona con naturalidad en español al introducir la base de la afirmación.
- source_word: ὡς
  english_pob_choice: how
  chosen_spanish: de cómo
  alternatives_spanish:
  - cómo
  - cuánto
  lexicon: BDAG
  rationale: Aquí ὡς introduce el contenido o la intensidad del anhelo; «de cómo» expresa ese matiz de modo/intensidad sin forzar una paráfrasis.
- source_word: ἐπιποθῶ
  english_pob_choice: long for
  chosen_spanish: anhelo
  alternatives_spanish:
  - deseo intensamente
  - suspиро por
  - ardientemente deseo
  lexicon: BDAG
  rationale: «Anhelo» comunica con claridad el fuerte deseo personal de Pablo y conserva una fuerza emocional semejante a «long for» sin volverse arcaico.
- source_word: πάντας ὑμᾶς
  english_pob_choice: all of you
  chosen_spanish: a todos ustedes
  alternatives_spanish:
  - a todos vosotros
  - a cada uno de ustedes
  lexicon: BDAG
  rationale: La expresión mantiene el valor distributivo de πάντας y su alcance sobre toda la comunidad, en un español natural y amplio para lectura eclesial.
- source_word: σπλάγχνοις
  english_pob_choice: affections
  chosen_spanish: entrañas
  alternatives_spanish:
  - afectos
  - compasión
  - entrañas de compasión
  lexicon: BDAG
  rationale: El término griego apunta a las partes internas como sede de sentimientos profundos. «Entrañas» preserva la fuerza corporal e idiomática del original mejor que una abstracción como «afectos», dejando visible la tensión léxica del texto.
- source_word: Χριστοῦ Ἰησοῦ
  english_pob_choice: Messiah Jesus
  chosen_spanish: Mesías Jesús
  alternatives_spanish:
  - Cristo Jesús
  lexicon: BDAG
  rationale: Siguiendo la política del proyecto, Χριστός se vierte normalmente como «Mesías» cuando funciona como título. Aquí ese valor titular sigue activo, por lo que «Mesías Jesús» refleja mejor el griego que la forma tradicionalizada «Cristo Jesús».
theological_decisions:
- issue: Traducción de Χριστοῦ en la construcción paulina de título-nombre
  english_pob_reading: Messiah Jesus
  chosen_spanish_reading: Mesías Jesús
  alternative_spanish_readings:
  - Cristo Jesús
  rationale: El proyecto distingue entre título y forma cristianizada fija. Aunque «Cristo Jesús» es muy extendido, la lectura fuente favorece mantener el valor titular de Χριστός, sin borrar la decisión doctrinal documentada de la POB.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
translation_notes:
  revision_awareness: La versión inglesa pasó por una revisión que cambió temporalmente «Messiah Jesus» por «Christ Jesus» y luego se restauró «Messiah Jesus» por coherencia con la política doctrinal del proyecto. La presente versión española sigue la lectura restaurada y mantiene esa decisión visible mediante la nota correspondiente.
  spanish_consistency_notes:
  - Se usa «Dios» para ὁ θεός conforme al estándar del proyecto.
  - Se mantiene «Mesías» como traducción titular de Χριστός en lugar de «Cristo».
  - «Entrañas» conserva el matiz corporal y afectivo de σπλάγχνοις, con nota alternativa para la lectura idiomática.
  - La puntuación y el orden verbal están ajustados a un español bíblico moderno, sin depender mecánicamente del inglés.
