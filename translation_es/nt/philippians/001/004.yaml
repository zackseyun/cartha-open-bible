translation:
  language: es
  text: siempre, en cada una de mis súplicas[a] por todos ustedes, haciendo la súplica con gozo,[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «oraciones»; también «peticiones» o «ruegos» para δέησις. El griego enfatiza una súplica o apelación dentro de la oración.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «haciendo la súplica»; el griego conserva la construcción nominal, en vez de usar simplemente «orando».
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντοτε
  english_pob_choice: always
  chosen_spanish: siempre
  alternatives_spanish:
  - en todo momento
  lexicon: BDAG
  rationale: El adverbio expresa una acción habitual y continua; «siempre» es la equivalencia natural y fiel en español.
- source_word: ἐν πάσῃ δεήσει μου
  english_pob_choice: in every prayer of mine
  chosen_spanish: en toda mi súplica
  alternatives_spanish:
  - en cada una de mis súplicas
  - en toda mi oración
  lexicon: BDAG
  rationale: Mantiene el valor distributivo de πάσῃ y el posesivo μου. «Súplica» conserva mejor el matiz de ruego/entreaty de δέησις que «oración», aunque sigue siendo idiomático en español.
- source_word: δέησις
  english_pob_choice: prayer
  chosen_spanish: súplica
  alternatives_spanish:
  - oración
  - petición
  - ruego
  lexicon: BDAG
  rationale: La POB en inglés documenta la alternativa «petition/request» para δέησις. En español, «súplica» preserva con claridad el sentido de petición dirigida a Dios y evita suavizar el término a una oración genérica.
- source_word: ὑπὲρ πάντων ὑμῶν
  english_pob_choice: for all of you
  chosen_spanish: por todos ustedes
  alternatives_spanish:
  - en favor de todos ustedes
  - por ustedes todos
  lexicon: BDAG
  rationale: «Por todos ustedes» comunica con naturalidad el valor intercesor de ὑπέρ con genitivo, sin perder el alcance inclusivo de πάντων.
- source_word: μετὰ χαρᾶς
  english_pob_choice: with joy
  chosen_spanish: con gozo
  alternatives_spanish:
  - con alegría
  - gozosamente
  lexicon: BDAG
  rationale: «Gozo» conserva un registro bíblico claro y corresponde bien a χαρά; además mantiene la construcción preposicional del griego.
- source_word: τὴν δέησιν ποιούμενος
  english_pob_choice: making the prayer with joy
  chosen_spanish: haciendo la súplica con gozo
  alternatives_spanish:
  - ofreciendo la súplica con gozo
  - presentando la súplica con gozo
  lexicon: BDAG
  rationale: La construcción con ποιέω + sustantivo se refleja sin sustituirla por un verbo más interpretativo como «orar». «Haciendo la súplica» conserva el eco formal del griego, conforme a la revisión del inglés POB.
theological_decisions:
- issue: Distinción entre δέησις y una oración genérica
  english_pob_reading: The Greek specifically emphasizes an entreaty or appeal in prayer.
  chosen_spanish_reading: La frase se vierte como «súplica» para conservar el énfasis en el ruego dirigido a Dios, no solo en la oración en sentido amplio.
  alternative_spanish_readings:
  - oración
  - petición
  rationale: El contexto es claramente intercesor; traducir δέησις como «súplica» mantiene la intensidad de la apelación y respeta la tensión léxica documentada por la POB en inglés.
  doctrine_reference: Uso léxico del NT; cf. oración intercesora en Filipenses 1:4.
- issue: Construcción idiomática con ποιούμενος
  english_pob_reading: Literally, 'making the prayer with joy.'
  chosen_spanish_reading: Se conserva la idea de «haciendo la súplica» en vez de simplificar a «orando», para no borrar la construcción nominal verbal del original.
  alternative_spanish_readings:
  - orando con gozo
  - presentando la súplica con gozo
  rationale: La POB revisó su inglés para reflejar más de cerca el sustantivo δέησις y el participio ποιούμενος. El español sigue esa decisión y preserva el énfasis formal del texto fuente.
  doctrine_reference: Precisión retórica y lexical; no afecta doctrina.
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente cambió de ''praying with joy'' a ''making the prayer with joy'' para reflejar con mayor cercanía δέησις y ποιούμενος. Esta versión española sigue esa revisión: conserva el sustantivo de súplica y la construcción verbal «haciendo», en vez de reducir todo a un verbo genérico.'
  spanish_consistency_notes:
  - Se usó «súplica» de manera consistente para δέησις, siguiendo la alternativa léxica ya documentada en la POB inglesa.
  - «Con gozo» mantiene la preposición del griego y evita convertir la frase en un adverbio.
  - La mayúscula/registro no requiere términos eclesiásticos tradicionales; se prioriza claridad moderna y fidelidad al matiz intercesor.
