revisions:
- from: Los de antes [a] lo hacen por amor, sabiendo que estoy puesto para la defensa del evangelio[b].
  to: Los primeros[a] lo hacen por amor, sabiendo que he sido designado para la defensa del evangelio[b].
  rationale: Se ajusta οἱ μὲν a «Los primeros» para reflejar mejor el contraste con el grupo opuesto del contexto inmediato y evitar la ambigüedad temporal de «Los de antes». Se reemplaza «estoy puesto» por «he sido designado» para expresar de manera natural en español el valor contextual de κεῖμαι como situación/encargo establecido para la defensa del evangelio, en línea con la decisión auditada «am appointed». Se conservan «por amor», «sabiendo» y «defensa del evangelio», y se mantiene la nota léxica sobre «buena nueva».
