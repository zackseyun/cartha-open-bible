  - severity: medium
    issue: «Los de antes» para οἱ μὲν
    rationale: En español sugiere anterioridad temporal más que el contraste entre dos grupos ('los unos... los otros') que depende de οἱ μὲν / οἱ δέ. «Los primeros» expresa mejor la relación contrastiva y suena natural.
  - severity: high
    issue: «estoy puesto» para κεῖμαι
    rationale: Aunque intenta mantener pasividad de estado, en español suena poco idiomático y puede percibirse como ubicación física o calco. El audit trail inglés favorece 'am appointed'; «he sido designado» o «estoy designado» preserva mejor el sentido contextual de encargo/función en la defensa del evangelio.
