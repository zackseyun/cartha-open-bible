translation:
  language: es
  text: Los primeros[a] lo hacen por amor, sabiendo que he sido designado para la defensa del evangelio[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «los primeros ... por amor», con el verbo implícito por el contexto.
    reason: alternative_reading
  - marker: b
    text: O «de la buena nueva».
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ μὲν
  english_pob_choice: The former do so
  chosen_spanish: Los de antes [a] lo hacen
  alternatives_spanish:
  - Los primeros lo hacen
  - Los unos lo hacen
  lexicon: —
  rationale: El griego es elíptico y contrasta con οἱ δέ del versículo siguiente. En español, «los de antes» conserva ese contraste y la referencia implícita a un grupo anterior, mientras que «lo hacen» repone el verbo por el contexto, como en el audit trail inglés.
- source_word: ἐξ ἀγάπης
  english_pob_choice: out of love
  chosen_spanish: por amor
  alternatives_spanish:
  - desde el amor
  - a causa del amor
  lexicon: BDAG
  rationale: ἐκ/ἐξ con un sustantivo abstracto expresa motivo. «Por amor» es natural en español y mantiene la fuerza causal sin perder la referencia a ἀγάπη.
- source_word: εἰδότες
  english_pob_choice: knowing
  chosen_spanish: sabiendo
  alternatives_spanish:
  - porque saben
  - estando conscientes
  lexicon: BDAG
  rationale: El participio expresa la base de la acción. «Sabiendo» conserva la conexión participial sin convertirla en una subordinada explicativa más fuerte que el griego.
- source_word: εἰς ἀπολογίαν
  english_pob_choice: for the defense
  chosen_spanish: para la defensa
  alternatives_spanish:
  - para una defensa
  - para defender
  lexicon: BDAG
  rationale: ἀπολογία tiene sentido de defensa razonada o jurídica. «Para la defensa» preserva el valor final de εἰς y sugiere bien el matiz forense que se mantiene en el inglés POB.
- source_word: τοῦ εὐαγγελίου
  english_pob_choice: of the good news
  chosen_spanish: del evangelio
  alternatives_spanish:
  - de la buena nueva
  - del evangelio de Dios
  lexicon: BDAG
  rationale: Aunque el inglés opta por «good news» para transparencia, en español «evangelio» es el término bíblico natural y fiel al referente técnico del texto. Aquí se mantiene el vocabulario tradicional y claro para lectores eclesiales.
- source_word: κεῖμαι
  english_pob_choice: am appointed
  chosen_spanish: estoy puesto
  alternatives_spanish:
  - he sido designado
  - estoy destinado
  lexicon: BDAG
  rationale: El verbo puede expresar una situación establecida o designada. «Estoy puesto» conserva la pasividad de estado y evita traducirlo como una simple postura física; en español, además, encaja con la idea de una condición fijada para la defensa del evangelio.
theological_decisions:
- issue: Sentido de κεῖμαι en el contexto del encarcelamiento de Pablo
  english_pob_reading: am appointed
  chosen_spanish_reading: estoy puesto
  alternative_spanish_readings:
  - he sido designado
  - estoy destinado
  rationale: La frase debe comunicar que la situación de Pablo tiene un carácter ordenado y dado, sin añadir una afirmación doctrinal más fuerte que el contexto. «Estoy puesto» mantiene la idea de estado dispuesto para una tarea, en línea con el valor contextual que el inglés POB resumió como «appointed».
  doctrine_reference: Providencia divina y vocación apostólica en el contexto paulino
translation_notes:
  revision_awareness: El pasaje presenta una cláusula elíptica en οἱ μὲν y un verbo de estado/colocación en κεῖμαι. La redacción española sigue el trazado auditado del inglés POB, pero ajusta el término de εὐαγγέλιον a la convención bíblica española «evangelio», que aquí resulta más natural y transparente que una traducción literal por sentido.
  spanish_consistency_notes:
  - Se mantiene «amor» para ἀγάπη conforme al valor doctrinal estándar del proyecto.
  - «Evangelio» se usa como término técnico estable, sin borrar la alternativa semántica de «buena nueva», que queda preservada en nota.
  - La elipsis de οἱ μὲν se hace explícita con «lo hacen» para que el contraste con el siguiente versículo sea legible en español.
  - «Estoy puesto» intenta conservar el matiz de estado dispuesto/ordenado de κεῖμαι sin reificarlo como ubicación física.
