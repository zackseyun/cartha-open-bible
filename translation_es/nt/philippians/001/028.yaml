translation:
  language: es
  text: y sin dejarse intimidar en nada por los que se oponen a ustedes[a]. Esto es una señal para ellos de destrucción[c][b], pero de su salvación—y esto procede de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «asustarse» o «amedrentarse».
    reason: lexical_alternative
  - marker: b
    text: O «evidencia» o «indicio» de destrucción.
    reason: lexical_alternative
  - marker: c
    text: La expresión «y esto procede de Dios» puede referirse de manera específica a la salvación o, de modo más amplio, a todo el cuadro anterior.
    reason: alternative_reading
lexical_decisions:
- source_word: πτυρόμενοι
  english_pob_choice: being frightened
  chosen_spanish: dejarse intimidar
  alternatives_spanish:
  - asustarse
  - amedrentarse
  - dejarse atemorizar
  lexicon: BDAG
  rationale: El verbo expresa ser amedrentado o intimidado por la oposición. «Dejarse intimidar» comunica bien la pasividad frente a la presión y conserva la fuerza del mandato sin sonar torpe en español.
- source_word: ἐν μηδενί
  english_pob_choice: in anything
  chosen_spanish: en nada
  alternatives_spanish:
  - de ninguna manera
  - en ningún aspecto
  - en nada en absoluto
  lexicon: BDAG
  rationale: 'La expresión tiene valor totalizante: no en nada / en ningún respecto. «En nada» es breve, natural y refleja de cerca el alcance de la negación.'
- source_word: ἀντικειμένων
  english_pob_choice: those who oppose you
  chosen_spanish: los que se oponen a ustedes
  alternatives_spanish:
  - los opositores
  - los adversarios
  - los que están contra ustedes
  lexicon: BDAG
  rationale: El participio describe personas que se oponen activamente. La construcción relativa conserva el sentido relacional y evita una nominalización demasiado abstracta.
- source_word: ἔνδειξις
  english_pob_choice: sign
  chosen_spanish: señal
  alternatives_spanish:
  - evidencia
  - indicio
  - prueba
  lexicon: BDAG
  rationale: «Señal» es claro y natural en español, y mantiene la idea de un hecho que apunta a una realidad mayor sin precisar más de lo que el griego dice.
- source_word: ἀπωλείας
  english_pob_choice: destruction
  chosen_spanish: destrucción
  alternatives_spanish:
  - ruina
  - perdición
  lexicon: BDAG
  rationale: «Destrucción» reproduce el peso escatológico/judicial del término sin añadir una precisión doctrinal que el texto no explicita.
- source_word: σωτηρίας
  english_pob_choice: salvation
  chosen_spanish: salvación
  alternatives_spanish:
  - liberación
  lexicon: BDAG
  rationale: En este contexto paulino, «salvación» conserva mejor el valor teológico que «liberación», que sería más amplio y menos marcado.
- source_word: τοῦτο ἀπὸ θεοῦ
  english_pob_choice: and this from God
  chosen_spanish: y esto procede de Dios
  alternatives_spanish:
  - y esto es de Dios
  - y esto viene de Dios
  lexicon: BDAG
  rationale: 'La frase queda deliberadamente amplia en el griego: puede referirse solo a la salvación o a todo el cuadro anterior. «Procede de Dios» mantiene esa amplitud y suena natural en español sin cerrar la ambigüedad.'
theological_decisions:
- issue: Referente de τοῦτο («esto»)
  english_pob_reading: 'Kept deliberately broad in the main text: ''this from God.'''
  chosen_spanish_reading: 'Se mantiene amplio: «y esto procede de Dios».'
  alternative_spanish_readings:
  - «y esta salvación procede de Dios»
  - «y esta señal procede de Dios»
  rationale: El griego permite más de un antecedente. La redacción española conserva la tensión interpretativa en vez de resolverla prematuramente, de acuerdo con el criterio de no borrar ambigüedades teológicas documentadas.
  doctrine_reference: Preservar la tensión teológica cuando el texto la permite.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la última revisión inglesa: cambió la equivalencia de ἐν μηδενί a una formulación más directa («en nada»), evitó una sobreexplicación en torno a τοῦτο, y conservó la ambigüedad controlada de la cláusula final. También se mantiene el valor relacional de «los que se oponen» y el matiz evidencial de ἔνδειξις.'
  spanish_consistency_notes:
  - Se usa «Dios» para θεός y no una perífrasis devocional.
  - Se prefiere «salvación» por el peso paulino del término.
  - No se introduce «Cristo» ni terminología eclesiástica ajena al versículo.
  - La negación total se expresa con «en nada», de modo sobrio y natural.
  - Las notas a pie de página usan marcadores únicos y corresponden a los puntos lexicográficos o de ambigüedad reales del verso.
