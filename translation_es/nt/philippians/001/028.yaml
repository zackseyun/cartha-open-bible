- from: y sin dejarse intimidar en nada por los que se oponen a ustedes[a]. Esto es para ellos una señal de destrucción[c][b], pero de su salvación; y esto procede de Dios.
  to: y sin dejarse intimidar en nada por los que se oponen a ustedes[a]. Esto es una señal para ellos de destrucción[c][b], pero de su salvación—y esto procede de Dios.
  rationale: Se corrige la nota léxica [a] para que preserve alternativas reales a πτυρόμενοι en vez de repetir la lectura principal; se mejora el orden de la frase a «Esto es una señal para ellos...» por naturalidad y ajuste al griego; y se sustituye el punto y coma por raya para representar mejor la cláusula final ambigua «y esto procede de Dios».
