translation:
  language: es
  text: Pues para mí, vivir es Mesías[a], y morir es ganancia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Cristo».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμοὶ
  english_pob_choice: to me
  chosen_spanish: para mí
  alternatives_spanish:
  - a mí
  - para mí
  lexicon: BDAG
  rationale: El dativo personal expresa la perspectiva subjetiva de Pablo. En español, «para mí» comunica de forma natural esa orientación personal y mantiene el matiz de evaluación personal del enunciado.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque
  lexicon: BDAG
  rationale: γάρ introduce explicación o fundamentación del pensamiento anterior. «Porque» es un conector natural en español y preserva la relación argumentativa sin forzar el orden.
- source_word: τὸ ζῆν
  english_pob_choice: to live
  chosen_spanish: el vivir
  alternatives_spanish:
  - vivir
  - la vida
  lexicon: BDAG
  rationale: El infinitivo articular funciona sustantivamente. «El vivir» conserva mejor el paralelismo con «el morir» y refleja la forma compacta del griego.
- source_word: Χριστός
  english_pob_choice: Christ
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  - Mesías
  lexicon: BDAG
  rationale: El proyecto prefiere «Mesías» para Χριστός salvo razones contextuales especiales. Aquí el griego lleva la carga titulataria y la forma «Mesías» preserva esa fuerza mejor que «Cristo», mientras que la nota mantiene la alternativa reconocida por la tradición y por el audit trail inglés.
- source_word: τὸ ἀποθανεῖν
  english_pob_choice: to die
  chosen_spanish: el morir
  alternatives_spanish:
  - morir
  - la muerte
  lexicon: BDAG
  rationale: Como con τὸ ζῆν, el infinitivo articular se vierte naturalmente como sustantivo verbal. «El morir» conserva la simetría con «el vivir» y la brevedad del original.
- source_word: κέρδος
  english_pob_choice: gain
  chosen_spanish: ganancia
  alternatives_spanish:
  - ganancia
  - provecho
  - beneficio
  lexicon: BDAG
  rationale: «Ganancia» reproduce bien el valor de beneficio obtenido y es la opción más directa y digna en este contraste. «Provecho» o «beneficio» serían posibles, pero «ganancia» mantiene la concisión del sustantivo griego.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés están en alta concordancia; no se requerían revisiones textuales ni de sentido. La principal decisión fue conservar la fuerza titular de Χριστός en español con «Mesías», siguiendo la preferencia terminológica del proyecto y anotando la alternativa tradicional.
  spanish_consistency_notes:
  - Se mantiene la distinción entre «Mesías» como título y «Cristo» como alternativa reconocida, en línea con la política del proyecto.
  - Se preserva el paralelismo poético entre «el vivir» y «el morir», reflejando la estructura breve y equilibrada del griego.
  - «Ganancia» se usa en sentido de beneficio, no comercial; el contexto contrasta valor supremo y pérdida/beneficio implícito en el discurso paulino.
