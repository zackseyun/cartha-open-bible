    issue: Χριστός fue traducido como «Cristo» en vez de «Mesías».
    rationale: La decisión final auditada en inglés restauró «Messiah», y la política del proyecto favorece «Mesías» cuando el título sigue siendo significativo. La justificación española depende de una revisión intermedia ya anulada.
  - severity: medium
    issue: La nota [a] no preserva la alternativa léxica correcta para αἰσχυνθήσομαι.
    rationale: La alternativa documentada en el audit trail inglés es la lectura media/deponente «I will not be ashamed», no una simple reformulación pasiva «no quedaré avergonzado». En español conviene reflejar esa diferencia con «no me avergonzaré» o equivalente.
