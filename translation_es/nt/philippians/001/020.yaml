translation:
  language: es
  text: conforme a mi anhelo intenso y esperanza de que no seré avergonzado[a] en nada, sino que con toda valentía, como siempre y aun ahora, el Mesías[b] será engrandecido en mi cuerpo, ya sea por vida o por muerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no me avergonzaré».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Cristo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: κατὰ
  english_pob_choice: in keeping with
  chosen_spanish: conforme a
  alternatives_spanish:
  - de acuerdo con
  - en consonancia con
  lexicon: BDAG
  rationale: κατά expresa aquí conformidad con el anhelo y la esperanza de Pablo. «Conforme a» conserva esa idea relacional en español sin sonar rígido.
- source_word: ἀποκαραδοκίαν
  english_pob_choice: eager expectation
  chosen_spanish: anhelo intenso
  alternatives_spanish:
  - expectación ansiosa
  - expectativa intensa
  lexicon: BDAG
  rationale: El sustantivo es enfático y visual; «anhelo intenso» comunica la tensión expectante sin perder naturalidad en español.
- source_word: ἐλπίδα
  english_pob_choice: hope
  chosen_spanish: esperanza
  alternatives_spanish:
  - esperanza confiada
  lexicon: BDAG
  rationale: En contexto paulino se trata de una esperanza firme, no de deseo incierto. «Esperanza» mantiene el valor bíblico usual y la coordinación con el primer sustantivo.
- source_word: ἐν οὐδενί
  english_pob_choice: in anything
  chosen_spanish: en nada
  alternatives_spanish:
  - en ningún aspecto
  - en nada en absoluto
  lexicon: BDAG
  rationale: La negación es total y distributiva. «En nada» es idiomático en español y refleja la amplitud del griego.
- source_word: αἰσχυνθήσομαι
  english_pob_choice: I will not be put to shame
  chosen_spanish: seré avergonzado
  alternatives_spanish:
  - quedaré avergonzado
  - seré puesto en vergüenza
  lexicon: BDAG
  rationale: Aunque la voz griega puede leerse como pasiva de vergüenza pública, en español «ser avergonzado» mantiene esa fuerza sin una perífrasis demasiado pesada. La nota conserva la alternativa de «no avergonzarme» implícita en el verbo.
- source_word: παρρησίᾳ
  english_pob_choice: boldness
  chosen_spanish: valentía
  alternatives_spanish:
  - denuedo
  - franqueza
  lexicon: BDAG
  rationale: Aquí el contexto es testimonio público y posible honra/vergüenza; «valentía» comunica mejor la audacia visible que «franqueza», sin borrar el componente de libertad para hablar.
- source_word: μεγαλυνθήσεται
  english_pob_choice: will be magnified
  chosen_spanish: será engrandecido
  alternatives_spanish:
  - será magnificado
  - será exaltado
  lexicon: BDAG
  rationale: El verbo significa ser hecho o mostrado grande. «Será engrandecido» preserva la imagen verbal en un español claro y reverente.
- source_word: Χριστός
  english_pob_choice: Messiah
  chosen_spanish: Cristo
  alternatives_spanish:
  - Mesías
  lexicon: BDAG
  rationale: Aunque el proyecto prefiere «Mesías» cuando λειτουργa como título, el audit trail inglés volvió a «Christ» por registro epistolar y fidelidad formal al término griego. En español, «Cristo» funciona aquí como forma estable y reconocible en este contexto paulino.
- source_word: ἐν τῷ σώματί μου
  english_pob_choice: in my body
  chosen_spanish: en mi cuerpo
  alternatives_spanish:
  - por medio de mi cuerpo
  - a través de mi cuerpo
  lexicon: BDAG
  rationale: La referencia es al testimonio encarnado de Pablo, en vida o en muerte. «En mi cuerpo» es directo y conserva la localización corporal del griego.
- source_word: διὰ ζωῆς … διὰ θανάτου
  english_pob_choice: through life or through death
  chosen_spanish: por vida o por muerte
  alternatives_spanish:
  - a través de la vida o de la muerte
  - mediante vida o muerte
  lexicon: BDAG
  rationale: διά con genitivo expresa circunstancia o medio. «Por vida o por muerte» mantiene el paralelismo breve y natural, sin añadir interpretación.
theological_decisions:
- issue: Tratamiento de Χριστός en una confesión paulina
  english_pob_reading: Messiah
  chosen_spanish_reading: Cristo
  alternative_spanish_readings:
  - Mesías
  rationale: El término aquí conserva fuerza titular, pero en español la forma eclesial y tradicionalmente inteligible en una carta paulina es «Cristo». La decisión sigue el ajuste del audit trail inglés al registro epistolar, evitando una solución artificial y manteniendo la identidad de Jesús como el ungido esperado.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Messiah/Mesías where title; Christ/Cristo where name-like or established Pauline register'
- issue: 'αἰσχυνθήσομαι: vergüenza pública o vergüenza interior'
  english_pob_reading: I will not be put to shame
  chosen_spanish_reading: no seré avergonzado
  alternative_spanish_readings:
  - no quedaré avergonzado
  - no seré puesto en vergüenza
  rationale: La escena es de vindicación pública en el testimonio de Pablo. «No seré avergonzado» preserva tanto la posibilidad de reproche público como la lectura más interior; la ambigüedad no se elimina, sino que se deja abierta como en el griego.
  doctrine_reference: BDAG αἰσχύνομαι; context of public witness and honor/shame in Paul
translation_notes:
  revision_awareness: El texto inglés pasó por una oscilación entre «Messiah» y «Christ» y terminó restaurando «Messiah» en la revisión final, aunque el historiado de cambios señala la tensión entre fidelidad formal al griego y el registro epistolar. En español se optó por «Cristo» como forma plenamente asentada y auditables según el uso paulino, sin introducir «Mesías» en el texto principal para no forzar una desalineación estilística con el resto de la carta.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque el verso no contiene κύριος ni una cita explícita del nombre divino.
  - Se mantuvo «cuerpo» para σῶμα, conservando la concreción corporal del testimonio de Pablo.
  - «Por vida o por muerte» reproduce el paralelismo de διὰ + genitivo sin explicitar más de lo que el griego dice.
  - 'La puntuación sigue la sintaxis del original: una cláusula de expectativa, una cláusula adversativa y una frase final de medios o circunstancias.'
