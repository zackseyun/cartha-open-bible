    changes_summary: 'Revised ''torn'' to ''hard pressed'' for closer lexical accuracy to συνέχομαι; changed ''since'' to ''having'' to reflect the participial construction; rendered Μεσσίας as ''Christ'' to match the Greek Χριστῷ; and adjusted ''much better'' to ''far better'' for a more natural rendering of πολλῷ ... κρεῖσσον. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: Pero estoy[a] apremiado entre los dos, teniendo el deseo de partir y estar con Mesías[b], porque eso es mucho mejor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estoy presionado». El griego sugiere estar apretado o constreñido por dos opciones.
    reason: lexical_alternative
  - marker: b
    text: O «Cristo». En este proyecto, Χριστός se traduce normalmente «Mesías» cuando funciona como título.
    reason: alternative_reading
lexical_decisions:
- source_word: συνέχομαι
  english_pob_choice: am hard pressed
  chosen_spanish: me siento apremiado
  alternatives_spanish:
  - estoy oprimido
  - estoy constreñido
  - me veo presionado
  lexicon: BDAG
  rationale: El verbo expresa presión interna o estar retenido por fuerzas contrapuestas. «Me siento apremiado» comunica la tensión sin introducir una imagen demasiado fuerte o ajena al contexto.
- source_word: ἐκ τῶν δύο
  english_pob_choice: between the two
  chosen_spanish: entre las dos
  alternatives_spanish:
  - por las dos
  - de las dos
  lexicon: BDAG
  rationale: El contexto exige una relación de alternancia o tensión entre dos opciones; «entre las dos» conserva el sentido idiomático mejor que una traducción más literal.
- source_word: τὴν ἐπιθυμίαν ἔχων
  english_pob_choice: having the desire
  chosen_spanish: teniendo el deseo
  alternatives_spanish:
  - con el deseo
  - pues tengo el deseo
  - anhelando
  lexicon: BDAG
  rationale: Se mantiene el sustantivo «deseo» y la estructura participial del griego con «teniendo», sin convertirla en una paráfrasis más libre.
- source_word: ἀναλῦσαι
  english_pob_choice: to depart
  chosen_spanish: partir
  alternatives_spanish:
  - morir
  - partir de esta vida
  - irse
  lexicon: BDAG
  rationale: El infinitivo funciona como eufemismo para la muerte o la partida. «Partir» preserva esa reserva semántica mejor que explicitar «morir».
- source_word: Χριστῷ
  english_pob_choice: Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Se conserva el título cristológico tal como exige la política del proyecto para Χριστός cuando funciona como título, no como nombre litúrgico fijo.
- source_word: πολλῷ μᾶλλον κρεῖσσον
  english_pob_choice: far better
  chosen_spanish: mucho mejor
  alternatives_spanish:
  - muchísimo mejor
  - con mucho mejor
  - mucho más excelente
  lexicon: BDAG
  rationale: La construcción intensifica la comparación; «mucho mejor» reproduce con naturalidad la fuerza del comparativo en español.
theological_decisions:
- issue: Fellowship with Christ after departure without over-specifying the afterlife
  english_pob_reading: to depart and be with the Messiah
  chosen_spanish_reading: partir y estar con Mesías
  alternative_spanish_readings:
  - morir e ir inmediatamente al cielo
  - partir para estar con Cristo
  rationale: 'La frase española conserva lo que el texto dice explícitamente: partir y estar con el Mesías. No se añade una formulación doctrinal sobre el estado intermedio que el versículo no expresa.'
  doctrine_reference: Preservar la tensión teológica sin resolverla más allá del texto.
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «torn» a «hard pressed» para συνέχομαι, de «Christ» a «Messiah» por política terminológica, y de «much better» a «far better»; la presente redacción sigue esas decisiones, manteniendo la construcción participial y el eufemismo de ἀναλῦσαι sin expandir el sentido.
  spanish_consistency_notes:
  - Se mantiene «Mesías» de forma coherente con la política del proyecto para Χριστός.
  - Se evitó «SEÑOR» u otras sustituciones no presentes en el verso.
  - «Partir» conserva la reserva del eufemismo griego sin añadir interpretación doctrinal.
  - La puntuación con punto y coma ayuda a reflejar la coordinación del original sin sobrecargar la sintaxis.
