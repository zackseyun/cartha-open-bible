    issue: 'Cláusula final poco idiomática: «tienen en nosotros un modelo»'
    rationale: Aunque entendible, esta redacción suena menos natural y transparenta menos claramente el valor de τύπον ἡμᾶς después de καθὼς. «Como nos tienen a nosotros por modelo» o «como modelo» expresa mejor la relación sintáctica y el plural enfático del original.
