translation:
  language: es
  text: Hermanos[a], únanse a imitarme, y mantengan la vista en los que andan de este modo[b], así como nos tienen a nosotros por modelo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hermanos y hermanas»; la forma griega es masculina plural, pero probablemente se dirige a toda la congregación.
    reason: cultural_note
  - marker: b
    text: O «ejemplo».
    reason: lexical_alternative
lexical_decisions:
- source_word: Συμμιμηταί
  english_pob_choice: join in imitating
  chosen_spanish: únanse a imitarme
  alternatives_spanish:
  - sean imitadores conmigo
  - imítenme junto con otros
  - hagan causa común en imitarme
  lexicon: BDAG
  rationale: El griego expresa una imitación compartida o conjunta. En español, «únanse a imitarme» conserva la idea colectiva sin sonar forzado. Evita reducir el matiz a una simple imitación individual.
- source_word: γίνεσθε
  english_pob_choice: join in imitating
  chosen_spanish: únanse
  alternatives_spanish:
  - sean
  - lleguen a ser
  lexicon: BDAG
  rationale: El imperativo de γίνομαι aquí no necesita un «lleguen a ser» literal; su fuerza se integra naturalmente en el llamado exhortativo. «Únanse» transmite bien el carácter de participación conjunta.
- source_word: ἀδελφοί
  english_pob_choice: Brothers
  chosen_spanish: Hermanos
  alternatives_spanish:
  - Hermanos y hermanas
  - Hermanos, es decir, creyentes
  lexicon: BDAG
  rationale: La forma griega es masculina plural y el POB inglés retiene ese rasgo en el texto principal. «Hermanos» mantiene la forma del vocativo; la amplitud congregacional puede aclararse en nota.
- source_word: σκοπεῖτε
  english_pob_choice: keep your eyes on
  chosen_spanish: mantengan la vista en
  alternatives_spanish:
  - observen
  - presten atención a
  - fíjense en
  lexicon: BDAG
  rationale: El verbo implica atención cuidadosa y sostenida. «Mantengan la vista en» comunica esa vigilancia continua en español natural, sin perder la idea de observación atenta.
- source_word: οὕτω περιπατοῦντας
  english_pob_choice: those who walk this way
  chosen_spanish: los que andan de este modo
  alternatives_spanish:
  - los que viven así
  - los que se conducen de este modo
  lexicon: BDAG
  rationale: «Andar» conserva la metáfora paulina de caminar como forma de vida. «De este modo» representa bien οὕτω con naturalidad en español y sin sobreinterpretar el contenido.
- source_word: τύπον
  english_pob_choice: pattern
  chosen_spanish: modelo
  alternatives_spanish:
  - patrón
  - ejemplo
  lexicon: BDAG
  rationale: τύπος puede referirse a un ejemplo normativo o a un patrón a seguir. «Modelo» funciona bien en español y preserva el sentido de guía a imitar; «patrón» es posible, pero suena menos natural aquí.
- source_word: ἡμᾶς
  english_pob_choice: us
  chosen_spanish: en nosotros
  alternatives_spanish:
  - a nosotros
  - nos
  lexicon: BDAG
  rationale: El plural debe conservarse. «En nosotros» refleja el valor relacional del texto y mantiene abierto que Pablo incluye a sus colaboradores, como indica el pronombre plural.
theological_decisions:
- issue: Alcance inclusivo de ἀδελφοί
  english_pob_reading: Retain 'Brothers' in the main text and clarify broader congregational reference in a footnote.
  chosen_spanish_reading: Retener «Hermanos» en el texto principal y aclarar en nota que probablemente incluye a toda la congregación.
  alternative_spanish_readings:
  - Hermanos y hermanas
  - Hermanos, es decir, creyentes
  rationale: La forma griega es masculina plural; el texto principal debe reflejar esa forma. Dado que el contexto probablemente abarca a toda la congregación, una nota preserva el sentido inclusivo sin borrar la forma fuente.
  doctrine_reference: Precisión morfológica con nota de alcance contextual
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia con el audit trail inglés; no se detectan revisiones aplicadas en la fuente de control. Se conservó el plural de ἀδελφοί y el plural de ἡμᾶς, y se mantuvo la metáfora de caminar/andar sin suavizarla.
  spanish_consistency_notes:
  - Se prefirió «Hermanos» para mantener la forma vocativa masculina plural, con nota de alcance inclusivo.
  - Se eligió «andar» para preservar la metáfora paulina de conducta de vida.
  - «Modelo» se usa como equivalente natural de τύπος sin perder la idea normativa.
  - El pronombre plural de ἡμᾶς se reflejó con «en nosotros» para no singularizar indebidamente el referente.
