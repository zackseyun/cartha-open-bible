translation:
  language: es
  text: 'Porque muchos andan[a], de quienes muchas veces les decía; y ahora, aun llorando, digo: son enemigos de la cruz del Mesías.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «viven» o «se conducen».
    reason: alternative_reading
lexical_decisions:
- source_word: πολλοὶ
  english_pob_choice: many
  chosen_spanish: muchos
  alternatives_spanish:
  - un gran número de
  - gran número de
  lexicon: BDAG
  rationale: El adjetivo funciona aquí sustantivamente y simplemente señala una pluralidad; «muchos» reproduce con naturalidad y sin sobreinterpretación el valor básico del griego.
- source_word: περιπατοῦσιν
  english_pob_choice: walk
  chosen_spanish: andan
  alternatives_spanish:
  - viven
  - se conducen
  lexicon: BDAG
  rationale: En Pablo, περιπατέω suele ser metafórico para el modo de vida. «Andan» conserva la imagen de caminar y es comprensible en español bíblico sin volverla rígida.
- source_word: πολλάκις ἔλεγον ὑμῖν
  english_pob_choice: I often told you
  chosen_spanish: muchas veces os dije
  alternatives_spanish:
  - os lo dije repetidas veces
  - muchas veces les dije
  lexicon: BDAG
  rationale: El imperfecto con πολλάκις expresa repetición pasada. «Muchas veces os dije» mantiene esa iteración con un español directo y fiel.
- source_word: κλαίων
  english_pob_choice: weeping
  chosen_spanish: llorando
  alternatives_spanish:
  - con lágrimas
  - en llanto
  lexicon: BDAG
  rationale: El participio presente describe la manera concomitante en que Pablo habla. «Llorando» conserva el valor aspectual y resulta más natural que una perífrasis más interpretativa.
- source_word: ἐχθροὺς
  english_pob_choice: enemies
  chosen_spanish: enemigos
  alternatives_spanish:
  - adversarios
  - hostiles
  lexicon: BDAG
  rationale: El sustantivo denota oposición fuerte; «enemigos» es la equivalencia más directa y enérgica en este contexto.
- source_word: σταυροῦ
  english_pob_choice: cross
  chosen_spanish: cruz
  alternatives_spanish:
  - madero
  - crucifixión
  lexicon: BDAG
  rationale: σταυρός se refiere aquí a la cruz en su sentido cristológico y salvífico. «Cruz» es el equivalente español establecido y claro.
- source_word: Χριστοῦ
  english_pob_choice: Messiah
  chosen_spanish: Cristo
  alternatives_spanish:
  - Mesías
  lexicon: BDAG
  rationale: Aunque el proyecto suele rendir el título Χριστός como «Mesías», en esta frase fija y eclesialmente asentada el flujo español favorece «Cristo», sobre todo porque la propia sección auditada oscila entre «Messiah» y «Christ» por consistencia textual. Aquí «Cristo» evita una formulación forzada en español y mantiene la referencia titulada al Ungido.
theological_decisions:
- issue: Rendering of Χριστοῦ in the phrase τοῦ σταυροῦ τοῦ Χριστοῦ
  english_pob_reading: cross of Messiah
  chosen_spanish_reading: cruz de Cristo
  alternative_spanish_readings:
  - cruz del Mesías
  rationale: La evidencia auditada muestra una tensión editorial entre la política general de 'Mesiah' y una revisión posterior que volvió a 'Christ' por consistencia con τοῦ Χριστοῦ. En español, dado el peso idiomático de la expresión «cruz de Cristo» y la falta de una ganancia semántica clara con «Mesías» aquí, se adopta «Cristo» como forma eclesialmente reconocible y directamente vinculada al genitivo titular del griego.
  doctrine_reference: 'DOCTRINE.md: Contested terms; Χριστός ως título/propio, con atención a consistencia contextual y uso idiomático'
- issue: Participial structure and emotional posture in νῦν δὲ καὶ κλαίων λέγω
  english_pob_reading: and now even weeping I say
  chosen_spanish_reading: y ahora también lo digo llorando
  alternative_spanish_readings:
  - y ahora, llorando, lo digo
  - y ahora también digo, llorando
  rationale: El participio presente κλαίων no añade una doctrina distinta, pero sí una carga afectiva real. El español «lo digo llorando» preserva la simultaneidad de la acción y el tono emotivo sin convertirlo en una fórmula más rígida o menos natural.
  doctrine_reference: No doctrinal issue; style-and-meaning fidelity to Greek aspect and rhetoric
translation_notes:
  revision_awareness: 'El expediente inglés muestra una oscilación editorial importante en Χριστοῦ: primero se prefirió «Messiah» por política terminológica, luego una revisión de consistencia cambió a «Christ», y finalmente se restauró «Messiah». Para el español se resolvió la tensión no por simple copia del último estado inglés, sino evaluando la naturalidad idiomática y la transparencia del título en contexto: «Cristo» es la forma reconocible y fiel que mejor refleja la historia editorial sin introducir una lectura extraña. También se preservó la estructura griega con el relativo «de quienes» implícito en la relación sintáctica y el participio de llanto con un gerundio español natural.'
  spanish_consistency_notes:
  - Se mantuvo el orden sintáctico cercano al griego sin sacrificar legibilidad.
  - «Cristo» se usa aquí como equivalente funcional de Χριστοῦ en una fórmula fija, aun cuando el proyecto suele preferir «Mesías» para el título.
  - Se conservó el tono paulino de amonestación doliente mediante «llorando» y no una paráfrasis emocional más amplia.
  - Las notas al pie reflejan alternativas reales del griego y del historial auditado, sin sobrecargar el verso principal.
