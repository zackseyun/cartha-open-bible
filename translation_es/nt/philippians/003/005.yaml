translation:
  language: es
  text: circuncidado el octavo día, del pueblo de Israel, de la tribu de Benjamín, hebreo de hebreos[a]; según la ley, fariseo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hebreo nacido de hebreos», subrayando el origen y la identidad hebrea de Pablo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: περιτομῇ ὀκταήμερος
  english_pob_choice: circumcised on the eighth day
  chosen_spanish: circuncidado al octavo día
  alternatives_spanish:
  - circuncidado el octavo día
  - circuncidado en el octavo día
  lexicon: BDAG
  rationale: La frase griega condensa un marcador identitario judío. En español, 'circuncidado al octavo día' conserva la referencia temporal y suena natural sin perder el valor covenantal.
- source_word: ἐκ γένους Ἰσραήλ
  english_pob_choice: from the people of Israel
  chosen_spanish: del pueblo de Israel
  alternatives_spanish:
  - de la nación de Israel
  - del linaje de Israel
  - de la estirpe de Israel
  lexicon: BDAG
  rationale: γένος aquí señala origen étnico o pertenencia de pueblo. 'Del pueblo de Israel' mantiene ese sentido de ascendencia e identidad colectiva en español claro.
- source_word: φυλῆς Βενιαμίν
  english_pob_choice: of the tribe of Benjamin
  chosen_spanish: de la tribu de Benjamín
  alternatives_spanish:
  - de la tribu de Benjamin
  lexicon: BDAG
  rationale: La genitiva identifica tribu/linaje. La forma estándar en español bíblico es 'de la tribu de Benjamín'.
- source_word: Ἑβραῖος ἐξ Ἑβραίων
  english_pob_choice: a Hebrew of Hebrews
  chosen_spanish: hebreo de hebreos
  alternatives_spanish:
  - hebreo nacido de hebreos
  - hebreo entre hebreos
  lexicon: BDAG
  rationale: La expresión es enfática e idiomática. 'Hebreo de hebreos' reproduce mejor la fuerza compacta del griego y evita añadir una explicación que el texto no explicita.
- source_word: κατὰ νόμον
  english_pob_choice: according to the law
  chosen_spanish: en cuanto a la ley
  alternatives_spanish:
  - según la ley
  - con respecto a la ley
  - en lo tocante a la ley
  lexicon: BDAG
  rationale: La construcción introduce un criterio de evaluación respecto de la Torá. 'En cuanto a la ley' comunica bien ese valor relacional y mantiene el registro formal.
- source_word: Φαρισαῖος
  english_pob_choice: a Pharisee
  chosen_spanish: fariseo
  alternatives_spanish:
  - un fariseo
  lexicon: BDAG
  rationale: Se conserva el término histórico-sectario en transliteración española habitual. Como predicativo nominal, el artículo puede omitirse en español sin perder el sentido.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el paquete griego y el audit trail inglés: mantiene la secuencia de credenciales de Pablo, conserva la compresión idiomática de Ἑβραῖος ἐξ Ἑβραίων con una equivalencia española natural, y refleja la revisión inglesa que prefirió ''Hebrew of Hebrews'' como forma más cercana al griego. No se introducen elementos interpretativos adicionales.'
  spanish_consistency_notes:
  - Se usó 'Benjamín' con acento ortográfico español.
  - '''Fariseo'' se dejó sin artículo por economía y porque funciona naturalmente como predicativo en español.'
  - La nota al pie marca una alternativa léxica real sin desplazar la traducción principal.
