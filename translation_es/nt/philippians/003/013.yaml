translation:
  language: es
  text: 'Hermanos[a], yo no me considero como alguien que ya lo haya alcanzado. Pero una cosa: olvidando lo que queda atrás y extendiéndome hacia lo que está delante,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hermanos» traduce el vocativo masculino griego adelphoi; Pablo suele usarlo para toda la comunidad creyente, incluidas las mujeres.
    reason: cultural_note
lexical_decisions:
- source_word: ἀδελφοί
  english_pob_choice: Brothers
  chosen_spanish: Hermanos
  alternatives_spanish:
  - Hermanos y hermanas
  - Hermanos/as
  - Hermanos y hermanas en la fe
  lexicon: BDAG
  rationale: Mantiene la forma masculina plural del vocativo griego y el trato directo natural en español. Como en el texto inglés POB, la inclusión del conjunto creyente se preserva en nota, sin neutralizar la forma del original en la línea principal.
- source_word: ἐγὼ ἐμαυτὸν
  english_pob_choice: I do not consider myself
  chosen_spanish: yo mismo no considero
  alternatives_spanish:
  - no me considero
  - yo no me considero
  - yo mismo no me tengo por
  lexicon: BDAG
  rationale: Reproduce el énfasis del pronombre explícito con 'yo mismo' y conserva el sentido reflexivo de autoevaluación de λογίζομαι sin añadir matices ajenos.
- source_word: λογίζομαι
  english_pob_choice: consider
  chosen_spanish: considero
  alternatives_spanish:
  - estimo
  - pienso
  - reputo
  lexicon: BDAG
  rationale: '''Considero'' es la opción más natural y fiel al sentido de evaluación mental o estimación personal. Evita un calco rígido y mantiene el valor discursivo del verbo.'
- source_word: κατειληφέναι
  english_pob_choice: to have taken hold of it
  chosen_spanish: haberlo alcanzado
  alternatives_spanish:
  - haberlo tomado
  - haberlo asido
  - haberlo conseguido
  lexicon: BDAG
  rationale: El verbo sugiere haber aprehendido o tomado posesión de algo; en el contexto inmediato de 3:12, 'alcanzado' comunica bien la idea de haber llegado a la meta o haberla obtenido, sin perder la metáfora de apropiación. El objeto implícito se expresa con 'lo' para evitar oscuridad en español.
- source_word: ἓν δέ
  english_pob_choice: But one thing
  chosen_spanish: Pero una cosa
  alternatives_spanish:
  - Pero una sola cosa
  - Sin embargo, una cosa
  - Pero esto una cosa
  lexicon: BDAG
  rationale: Conserva el giro abrupto y elipsis del griego. 'Pero' refleja la transición adversativa del δέ, y 'una cosa' deja abierta la frase exactamente como en el original y en la auditoría inglesa.
- source_word: τὰ μὲν ὀπίσω
  english_pob_choice: the things behind
  chosen_spanish: lo que queda atrás
  alternatives_spanish:
  - las cosas de atrás
  - las cosas que quedan atrás
  - lo de atrás
  lexicon: BDAG
  rationale: Aunque el griego plural articula 'las cosas', en español 'lo que queda atrás' suena más natural y conserva el referente general retrospectivo sin forzar un plural abstracto. Se mantiene la orientación espacial/metafórica del contraste.
- source_word: ἐπιλανθανόμενος
  english_pob_choice: forgetting
  chosen_spanish: olvidando
  alternatives_spanish:
  - olvidándome de
  - dejando atrás
  - pasando por alto
  lexicon: BDAG
  rationale: '''Olvidando'' es la equivalencia directa y adecuada. En este contexto no implica amnesia literal sino dejar de dar peso a lo pasado, como en la lectura inglesa POB.'
- source_word: τοῖς δὲ ἔμπροσθεν
  english_pob_choice: the things ahead
  chosen_spanish: lo que está delante
  alternatives_spanish:
  - las cosas delante
  - lo que viene adelante
  - las cosas que están delante
  lexicon: BDAG
  rationale: '''Lo que está delante'' transmite la orientación futura de forma idiomática y respeta la contraposición con ''lo que queda atrás''. La elección mantiene el valor direccional del griego sin sobrerelaboración.'
- source_word: ἐπεκτεινόμενος
  english_pob_choice: reaching forward
  chosen_spanish: extendiéndome
  alternatives_spanish:
  - estirándome hacia
  - alcanzando hacia adelante
  - tendiéndome hacia adelante
  lexicon: BDAG
  rationale: El participio expresa un esfuerzo de extensión hacia adelante. 'Extendiéndome' conserva el movimiento corporal/metafórico y la progresión rítmica de la cláusula, con un registro digno y claro en español.
theological_decisions:
- issue: Vocativo masculino ἀδελφοί en una comunidad mixta
  english_pob_reading: Brothers[a] ... Paul often uses it for the whole believing community, including women.
  chosen_spanish_reading: Hermanos[a] ... Pablo usa con frecuencia este vocativo para toda la comunidad creyente, incluidas las mujeres.
  alternative_spanish_readings:
  - Hermanos y hermanas
  - Hermanos/as
  - Amados hermanos y hermanas
  rationale: Se conserva la forma formal del vocativo del original y se evita borrar la señal lingüística masculina del griego. La nota explica el alcance inclusivo habitual, reproduciendo la intención auditada del POB inglés sin imponer un equivalente no textual en la línea principal.
  doctrine_reference: uso vocativo paulino; inclusividad del auditorio eclesial en la recepción del texto
- issue: Sentido de κατειληφέναι en el contexto de la carrera cristiana
  english_pob_reading: to have taken hold of it
  chosen_spanish_reading: haberlo alcanzado
  alternative_spanish_readings:
  - haberlo tomado
  - haberlo obtenido
  - haberlo asido
  rationale: El contexto de Filipenses 3:12–14 describe una meta todavía no plenamente poseída. 'Alcanzado' mantiene la tensión entre apropiación y meta final, sin resolverla demasiado hacia logro meramente intelectual ni hacia posesión jurídica.
  doctrine_reference: perseverancia cristiana; tensión entre ya/todavía no en la carrera de la fe
- issue: Imagen progresiva de olvidar lo pasado y extenderse a lo venidero
  english_pob_reading: forgetting the things behind and reaching forward to the things ahead
  chosen_spanish_reading: olvidando lo que queda atrás y extendiéndome hacia lo que está delante
  alternative_spanish_readings:
  - olvidando las cosas de atrás y estirándome hacia las cosas delante
  - dejando atrás lo pasado y avanzando hacia lo que viene
  rationale: La metáfora atlética/progresiva se conserva sin convertirla en paráfrasis interpretativa. 'Lo que queda atrás' / 'lo que está delante' mantiene la tensión direccional y la secuencia participial del griego, importante para la exhortación paulina.
  doctrine_reference: santificación progresiva; perseverancia y enfoque escatológico
translation_notes:
  revision_awareness: 'La versión inglesa revisada cambió el punto y coma por un punto tras la primera cláusula. La redacción española sigue esa división natural con una oración breve y una transición clara: ''Hermanos..., yo mismo no considero...'' / ''Pero una cosa...''. También se respetó la austeridad del griego, sin añadir un verbo implícito en ''una cosa''.'
  spanish_consistency_notes:
  - Se mantiene 'Hermanos' en la línea principal, con explicación inclusiva en nota, para conservar la forma vocativa del original y la práctica editorial del POB.
  - '''Yo mismo'' refleja el énfasis de ἐγώ ἐμαυτόν, evitando una versión neutralizada.'
  - '''Lo que queda atrás'' y ''lo que está delante'' preservan el contraste espacial/metafórico y funcionan con naturalidad en español.'
  - Se evitó 'Cristo' u otra terminología doctrinal no presente en este versículo; no hay necesidad de introducir léxico teológico adicional.
  - 'La puntuación busca un ritmo similar al inglés auditado: dos unidades principales, con una pausa fuerte tras la primera afirmación.'
