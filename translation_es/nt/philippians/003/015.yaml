review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español capta bien la inferencia de οὖν, el sentido contextual de τέλειοι como «maduros», la exhortación de φρονῶμεν y la promesa de ἀποκαλύψει. Sin embargo, no preserva de manera consistente el cambio de persona del griego: Pablo pasa de primera persona plural («pensemos») a segunda persona plural («si ustedes piensan»). El borrador usa «piensan», que en español sin pronombre expreso suena a tercera persona plural y debilita la apelación directa del original.'
  spanish_quality_summary: El español es claro y digno, pero «si en algo piensan de otro modo» resulta ambiguo por la persona verbal y menos natural que una forma explícita de segunda persona plural. También conviene ajustar la nota b, porque la nota actual no refleja una alternativa realmente distinta del texto principal, sino casi una mera repetición.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Dios» para θεός y «maduros» para τέλειοι concuerdan con el expediente léxico y teológico. No se requieren cambios de glosario mayores.
  issues:
  - severity: medium
    issue: Ambigüedad de persona en «si en algo piensan de otro modo»
    rationale: El griego φρονεῖτε es segunda persona plural. En español, «piensan» sin «ustedes» se entiende normalmente como tercera persona plural, lo que no preserva con claridad el contraste entre «pensemos» y «ustedes piensan».
  - severity: low
    issue: Nota b poco útil como alternativa lexical
    rationale: «Si en algo piensan de otra manera» apenas difiere de «si en algo piensan de otro modo». La nota debería reflejar mejor la alternativa del inglés auditado, por ejemplo «si en algo piensan diferente» o una opción más literal como «si en algo tienen otra manera de pensar».
  revised_spanish_text: Por tanto,[a] todos los que somos maduros pensemos de esta manera; y si en algo ustedes piensan de otro modo,[b] Dios también les revelará esto.
  revised_footnotes:
  - marker: a
    text: O «perfectos». El griego τέλειοι puede significar «perfectos», pero aquí probablemente se refiere a madurez espiritual.
    reason: lexical_alternative
  - marker: b
    text: O «si en algo piensan diferente».
    reason: lexical_alternative
  revision_rationale: La revisión hace explícita la segunda persona plural en la cláusula condicional para reflejar con fidelidad φρονεῖτε y evitar una lectura de tercera persona en español. También simplifica la nota b para que ofrezca una alternativa real y natural.
