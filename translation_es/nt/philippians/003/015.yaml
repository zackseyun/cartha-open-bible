revisions:
- from: Por tanto,[a] todos los que somos maduros pensemos de esta manera; y si en algo piensan de otro modo,[b] Dios también les revelará esto.
  to: Por tanto,[a] todos los que somos maduros pensemos de esta manera; y si en algo ustedes piensan de otro modo,[b] Dios también les revelará esto.
  rationale: La revisión hace explícita la segunda persona plural en la cláusula condicional para reflejar con fidelidad φρονεῖτε y evitar una lectura de tercera persona en español. También simplifica la nota b para que ofrezca una alternativa real y natural.
