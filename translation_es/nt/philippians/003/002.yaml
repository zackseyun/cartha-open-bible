translation:
  language: es
  text: Cuídense[a] de los perros; cuídense de los malos obreros; cuídense de la mutilación[b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Tengan cuidado de». El griego repite el mismo imperativo tres veces para dar énfasis.
    reason: lexical_alternative
  - marker: b
    text: Pablo usa «la mutilación» como un fuerte contraste con «la circuncisión» en el versículo siguiente.
    reason: cross_reference
  - marker: c
    text: O «los mutiladores»; el sustantivo griego es literalmente «mutilación», un juego despectivo con la palabra para «circuncisión».
    reason: lexical_alternative
lexical_decisions:
- source_word: Βλέπετε
  english_pob_choice: Watch out for
  chosen_spanish: Cuídense de
  alternatives_spanish:
  - Estén alerta de
  - Tengan cuidado con
  lexicon: BDAG
  rationale: El imperativo presente repetido tres veces expresa una advertencia urgente. «Cuídense de» transmite de manera natural en español esa llamada a la vigilancia y conserva la repetición enfática del griego sin sonar rígido.
- source_word: τοὺς κύνας
  english_pob_choice: the dogs
  chosen_spanish: los perros
  alternatives_spanish:
  - los canes
  - los perros inmundos
  lexicon: BDAG
  rationale: Se conserva la metáfora literal y el tono despectivo de la expresión. «Los perros» es claro, directo y no suaviza el insulto con explicaciones que el griego no añade.
- source_word: τοὺς κακοὺς ἐργάτας
  english_pob_choice: the evil workers
  chosen_spanish: los malos obreros
  alternatives_spanish:
  - los obreros malos
  - los obreros perversos
  - los trabajadores malos
  lexicon: BDAG
  rationale: «Κακούς» puede expresarse como «malos» o «malvados»; aquí «malos obreros» conserva la concisión y el paralelismo con los dos miembros anteriores. «Obreros» mantiene el sentido de ἐργάτας sin introducir una connotación eclesiástica ajena.
- source_word: τὴν κατατομήν
  english_pob_choice: the mutilation
  chosen_spanish: la mutilación
  alternatives_spanish:
  - los mutiladores
  - la falsa circuncisión
  - el mutilamiento
  lexicon: BDAG
  rationale: Se mantiene el sustantivo abstracto y el juego polémico con περιτομή («circuncisión») del versículo siguiente. «La mutilación» preserva el filo retórico del término sin reemplazarlo por una paráfrasis interpretativa.
theological_decisions:
- issue: Cómo reflejar κατατομήν frente a la terminología de la circuncisión en el contexto inmediato
  english_pob_reading: Translate it as the polemical term 'the mutilation' rather than soften it to a neutral reference to circumcision.
  chosen_spanish_reading: Traducirlo como «la mutilación» y no como una expresión neutral de circuncisión.
  alternative_spanish_readings:
  - los mutiladores
  - la falsa circuncisión
  rationale: Pablo usa un contra-término despectivo, no el vocablo normal para circuncisión. «La mutilación» conserva el contraste con la frase del versículo siguiente y mantiene la tensión teológica y retórica del original.
  doctrine_reference: Filipenses 3:2-3; juego de palabras con περιτομή / κατατομή
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés coinciden en la estructura tripartita imperativa y en el valor polémico de κατατομήν. No se detectan revisiones posteriores que alteren la lectura; se mantiene la decisión de preservar el choque retórico sin suavizarlo.
  spanish_consistency_notes:
  - Se usa «Dios» y no hay nombres divinos en este versículo.
  - «Obreros» se mantiene en sentido literal de ἐργάτας, evitando «trabajadores» por mayor fuerza de acusación y paralelismo con el griego.
  - «Cuídense de» reproduce el tono de advertencia y funciona bien con la repetición triple del mandato.
  - Se conserva «la mutilación» como término abstracto y despectivo, coherente con el juego léxico del contexto.
