translation:
  language: es
  text: Más que eso[a], considero que todas las cosas son pérdida a causa del valor incomparable[b] del conocimiento de Mesías Jesús, mi Señor, por quien he sufrido la pérdida de todas las cosas, y las considero basura[c], para ganar al Mesías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ciertamente más bien».'
    reason: alternative_reading
  - marker: b
    text: 'O: «excelencia» o «valor sobresaliente» del conocimiento de. El griego usa un participio sustantivado que expresa superioridad o valor superior.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «desecho» o «estiércol». El término griego es fuerte y despectivo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ μενοῦνγε καὶ
  english_pob_choice: More than that
  chosen_spanish: Más que eso
  alternatives_spanish:
  - Ciertamente más bien
  - Y aun más
  lexicon: BDAG
  rationale: La secuencia intensifica y hace avanzar el argumento respecto de lo anterior. «Más que eso» comunica esa progresión discursiva en español natural sin sobrerrepetir partículas.
- source_word: ἡγοῦμαι
  english_pob_choice: I consider
  chosen_spanish: considero
  alternatives_spanish:
  - cuento
  - estimo
  - reputo
  lexicon: BDAG
  rationale: El verbo expresa una valoración razonada. «Considero» mantiene la fuerza evaluativa y funciona de manera consistente en ambas apariciones del versículo.
- source_word: πάντα
  english_pob_choice: all things
  chosen_spanish: todas las cosas
  alternatives_spanish:
  - todo
  - todo lo demás
  lexicon: BDAG
  rationale: La expresión es amplia y abarcadora. «Todas las cosas» conserva el alcance total del griego sin reducirlo indebidamente.
- source_word: ζημίαν
  english_pob_choice: loss
  chosen_spanish: pérdida
  alternatives_spanish:
  - daño
  - perjuicio
  - desventaja
  lexicon: BDAG
  rationale: En esta metáfora contable, «pérdida» es la equivalencia natural y precisa en español, y mantiene la valoración negativa de Pablo.
- source_word: διὰ τὸ ὑπερέχον τῆς γνώσεως
  english_pob_choice: because of the surpassing value of the knowledge of
  chosen_spanish: a causa de la excelencia del conocimiento de
  alternatives_spanish:
  - a causa del valor incomparable del conocimiento de
  - por la superioridad del conocimiento de
  lexicon: BDAG
  rationale: El participio sustantivado ὑπερέχον expresa superioridad o excelencia. «Excelencia» preserva esa cualidad sin forzar una perífrasis demasiado pesada, y «conocimiento» mantiene el sustantivo explícito del griego.
- source_word: Χριστοῦ Ἰησοῦ
  english_pob_choice: Messiah Jesus
  chosen_spanish: Mesías Jesús
  alternatives_spanish:
  - Cristo Jesús
  lexicon: BDAG
  rationale: Siguiendo el criterio doctrinal de la obra, Χριστός se traduce como título. En español, «Mesías» conserva el valor titular y la referencia bíblica directa.
- source_word: τοῦ κυρίου μου
  english_pob_choice: my Lord
  chosen_spanish: mi Señor
  alternatives_spanish:
  - mi dueño
  - mi maestro
  lexicon: BDAG
  rationale: κύριος se traduce por defecto como «Señor» por su peso cristológico. La posesión se mantiene con «mi Señor».
- source_word: δι’ ὃν
  english_pob_choice: for whose sake
  chosen_spanish: por quien
  alternatives_spanish:
  - por cuya causa
  - por causa de quien
  lexicon: BDAG
  rationale: La relación causal y personal del giro queda bien expresada en español con «por quien», que suena natural y conserva la orientación sacrificial del contexto.
- source_word: ἐζημιώθην
  english_pob_choice: I have suffered the loss
  chosen_spanish: he sufrido la pérdida
  alternatives_spanish:
  - he perdido
  - he sido despojado de
  lexicon: BDAG
  rationale: El pasivo aoristo comunica pérdida sufrida, no solo una decisión abstracta. «He sufrido la pérdida» conserva ese matiz de padecimiento e incursión en pérdida.
- source_word: σκύβαλα
  english_pob_choice: rubbish
  chosen_spanish: basura
  alternatives_spanish:
  - desecho
  - refuse
  - estiércol
  lexicon: BDAG
  rationale: El término es fuerte y despectivo. «Basura» comunica bien la desvalorización en español contemporáneo, aunque el original admite opciones más crudas.
- source_word: ἵνα Χριστὸν κερδήσω
  english_pob_choice: so that I may gain Messiah
  chosen_spanish: para ganar a Mesías
  alternatives_spanish:
  - para que gane a Mesías
  - a fin de ganar a Mesías
  lexicon: BDAG
  rationale: ἵνα expresa propósito, y κερδήσω continúa la metáfora de ganancia/pérdida. «Para ganar a Mesías» preserva esa economía verbal en español.
theological_decisions:
- issue: Rendering Χριστός as title rather than name-like form
  english_pob_reading: Messiah Jesus / gain Messiah
  chosen_spanish_reading: Mesías Jesús / ganar a Mesías
  alternative_spanish_readings:
  - Cristo Jesús / ganar a Cristo
  rationale: En este versículo Χριστός mantiene fuerza titular y no funciona simplemente como un nombre fijo. La traducción «Mesías» conserva el peso semántico del título y la lectura pactal del pasaje.
  doctrine_reference: 'DOCTRINE.md contested terms: Χριστός → Mesías (cuando es título; Cristo cuando es forma fijada por uso o necesidad idiomática)'
translation_notes:
  revision_awareness: El texto español sigue el último estado revisado del audit trail inglés, especialmente la corrección de «surpassing worth of knowing» a una construcción más cercana a τὸ ὑπερέχον τῆς γνώσεως. También conserva la decisión doctrinal de traducir Χριστός como «Mesías» en este contexto titular.
  spanish_consistency_notes:
  - Se mantiene «Mesías» para Χριστός de forma consistente con el criterio doctrinal dado.
  - «Señor» se conserva para κύριος por su peso cristológico y el uso estándar en español bíblico.
  - Se distingue entre valoración intelectual («considero») y pérdida sufrida («he sufrido la pérdida»), siguiendo la estructura verbal del griego.
  - «Basura» traduce el término despectivo σκύβαλα sin suavizarlo más allá de lo que permite el español de lectura pública.
