revisions:
- from: y ser hallado en él[a], no teniendo mi propia justicia[b] procedente de la ley, sino la que es por la fe en el Mesías[c]—la justicia de Dios basada en la fe.
  to: y ser hallado en él, no teniendo mi propia justicia[a] procedente de la ley, sino la que es por la fe en el Mesías[b]—la justicia que viene de Dios basada en la fe.
  rationale: Se movió la nota de la construcción πίστεως Χριστοῦ al sintagma correcto ('por la fe en el Mesías'), se eliminó la nota innecesaria sobre 'Cristo' porque contradice la decisión final auditada de usar 'Mesías', y se simplificó la nota léxica para que encaje con el español. Además, 'la justicia que viene de Dios' expresa con mayor claridad en español el valor de ἐκ θεοῦ sin perder el sentido de procedencia.
