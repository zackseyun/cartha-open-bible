translation:
  language: es
  text: y ser hallado en él, no teniendo mi propia justicia[a] procedente de la ley, sino la que es por la fe en el Mesías[b]—la justicia que viene de Dios basada en la fe.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, 'rectitud' (para ambos usos de 'justicia').
    reason: lexical_alternative
  - marker: b
    text: O, 'por la fidelidad del Mesías'.
    reason: alternative_reading
lexical_decisions:
- source_word: εὑρεθῶ
  english_pob_choice: be found
  chosen_spanish: ser hallado
  alternatives_spanish:
  - ser encontrado
  - resultar hallado
  lexicon: BDAG
  rationale: Conserva la voz pasiva y el matiz de resultar “hallado” en un estado o condición, sin sobreinterpretar el verbo.
- source_word: ἐν αὐτῷ
  english_pob_choice: in him
  chosen_spanish: en él
  alternatives_spanish:
  - unido a él
  - en Cristo
  lexicon: BDAG
  rationale: La frase paulina se mantiene de forma directa; en español, 'en él' conserva la formulación relacional sin estrecharla a una paráfrasis explicativa.
- source_word: μὴ ἔχων
  english_pob_choice: not having
  chosen_spanish: no teniendo
  alternatives_spanish:
  - sin tener
  - careciendo de
  lexicon: BDAG
  rationale: Respeta el participio con fuerza circunstancial y la negación directa, sin añadir un giro más interpretativo.
- source_word: δικαιοσύνην
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia/rectitud
  lexicon: BDAG
  rationale: Aunque el texto inglés principal usa 'righteousness', en español 'justicia' es un equivalente lexical válido y sobrio; se preserva la alternativa semántica en nota porque el término también puede abarcar 'rectitud'.
- source_word: τὴν ἐκ νόμου
  english_pob_choice: from the law
  chosen_spanish: procedente de la ley
  alternatives_spanish:
  - de la ley
  - derivada de la ley
  lexicon: BDAG
  rationale: '''Procedente de'' expresa claramente el origen sin sonar forzado, y evita la ambigüedad de un simple ''de'' en español.'
- source_word: διὰ πίστεως Χριστοῦ
  english_pob_choice: through faith in Messiah
  chosen_spanish: por la fe en el Mesías
  alternatives_spanish:
  - por la fidelidad del Mesías
  - por la fe en Cristo
  lexicon: BDAG
  rationale: Se mantiene la lectura principal de 'fe en' porque el inglés POB la adopta como texto base, y se conserva la alternativa de fidelidad del Mesías por la tensión exegética documentada. 'Mesías' respeta el valor titular de Χριστοῦ.
- source_word: Χριστοῦ
  english_pob_choice: Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Siguiendo la política del proyecto, el título se traduce como 'Mesías' cuando su fuerza titular está activa; aquí forma parte del contraste teológico de la frase.
- source_word: τὴν ἐκ θεοῦ δικαιοσύνην
  english_pob_choice: the righteousness from God
  chosen_spanish: la justicia de Dios
  alternatives_spanish:
  - la justicia procedente de Dios
  - la justicia que viene de Dios
  lexicon: BDAG
  rationale: 'La construcción griega puede expresarse naturalmente como genitivo de procedencia: ''de Dios''. Esto preserva el paralelismo con la frase anterior y la fuente divina de la justicia.'
- source_word: ἐπὶ τῇ πίστει
  english_pob_choice: based on faith
  chosen_spanish: basada en la fe
  alternatives_spanish:
  - sobre la fe
  - apoyada en la fe
  lexicon: BDAG
  rationale: '''Basada en'' comunica bien el valor de fundamento/basis de ἐπί con dativo y resulta idiomática en español contemporáneo.'
theological_decisions:
- issue: Construcción πίστεως Χριστοῦ
  english_pob_reading: 'through faith in Messiah; footnote alternative: faithfulness of the Messiah'
  chosen_spanish_reading: 'por la fe en el Mesías; alternativa: por la fidelidad del Mesías'
  alternative_spanish_readings:
  - por la fe en Cristo
  - por la fidelidad de Cristo
  rationale: Se mantiene la lectura principal de fe dirigida al Mesías, pero se deja explícita la alternativa de fidelidad del Mesías, porque el griego permite esa tensión y el audit trail la preserva.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension; contested terms table for πίστις and Χριστός'
- issue: δικαιοσύνη en contexto paulino
  english_pob_reading: 'righteousness; footnote alternative: justice'
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  - justicia/rectitud
  rationale: A diferencia del inglés POB, en español 'justicia' funciona con naturalidad y mantiene abierta la amplitud semántica. La nota conserva la posibilidad de 'rectitud' para revisión semántica.
  doctrine_reference: 'DOCTRINE.md: contested terms table for δικαιοσύνη'
- issue: Χριστοῦ como título
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: Se sigue la terminología del proyecto para el uso titular de Χριστός, evitando la forma fija 'Cristo' cuando el sentido mesiánico es explícito.
  doctrine_reference: 'Project terminology defaults: Χριστός / Messiah language'
translation_notes:
  revision_awareness: El borrador inglés pasó por una oscilación entre 'Christ' y 'Messiah'; la corrección final restauró 'Messiah' conforme a la política del proyecto. En español se refleja esa decisión con 'Mesías' en el texto principal y se deja 'Cristo' como alternativa anotada.
  spanish_consistency_notes:
  - Se usa 'Mesías' de manera consistente para Χριστός cuando funciona como título, conforme al estándar del proyecto.
  - '''Justicia'' se usa en el texto principal por naturalidad en español; la nota conserva la alternativa ''rectitud'' para no borrar la tensión léxica.'
  - La puntuación con raya mantiene el inciso explicativo del original y del texto inglés POB.
  - No se introduce 'SEÑOR' ni otras sustituciones devocionales no atestiguadas por el griego de este versículo.
