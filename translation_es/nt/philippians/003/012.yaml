translation:
  language: es
  text: No es que ya lo haya recibido[a] ni que ya haya sido perfeccionado[b]; pero sigo adelante para ver si también logro alcanzar aquello para lo cual también fui alcanzado por Cristo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'obtenido'; el griego deja el objeto implícito por el contexto inmediato.
    reason: lexical_alternative
  - marker: b
    text: O 'haya llegado a la perfección' o 'haya sido hecho completo'.
    reason: lexical_alternative
  - marker: c
    text: Griego Christos; alternativamente 'Mesías'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλαβον
  english_pob_choice: have already received it
  chosen_spanish: lo haya recibido
  alternatives_spanish:
  - lo haya obtenido
  - lo haya alcanzado
  - lo haya tomado
  lexicon: BDAG
  rationale: El verbo λαμβάνω aquí remite a algo ya referido por el contexto inmediato. En español, 'recibirlo' mantiene esa referencia implícita sin añadir un objeto distinto ni endurecer el matiz hacia 'obtener' como si fuera solo logro personal.
- source_word: τετελείωμαι
  english_pob_choice: have already been perfected
  chosen_spanish: haya sido perfeccionado
  alternatives_spanish:
  - haya llegado a la perfección
  - haya sido hecho completo
  - haya sido consumado
  lexicon: BDAG
  rationale: El perfecto pasivo de τελειόω exige en español una forma pasiva/resultativa. 'Perfeccionado' conserva el estado alcanzado que Pablo niega, sin resolver la tensión teológica más allá de lo que dice el texto.
- source_word: διώκω
  english_pob_choice: I press on
  chosen_spanish: prosigo
  alternatives_spanish:
  - persigo
  - sigo adelante
  - me esfuerzo
  lexicon: BDAG
  rationale: En este contexto de avance continuo, 'prosigo' comunica bien la idea de avance perseverante y evita una lectura demasiado agresiva de 'persigo', aunque el trasfondo de 'perseguir' sigue presente en el verbo griego.
- source_word: καταλάβω
  english_pob_choice: I may also take hold of
  chosen_spanish: logre asir
  alternatives_spanish:
  - logre alcanzar
  - logre tomar
  - logre aprehender
  lexicon: BDAG
  rationale: '''Asir'' conserva la fuerza concreta de καταλαμβάνω y permite mantener el paralelismo léxico con el pasivo posterior. ''Logre'' expresa la eventualidad del subjuntivo griego.'
- source_word: ἐφ’ ᾧ
  english_pob_choice: that for which
  chosen_spanish: para lo cual
  alternatives_spanish:
  - por lo cual
  - con el fin de lo cual
  - para aquello para lo cual
  lexicon: BDAG
  rationale: 'La frase apunta a propósito o meta: Cristo se apoderó de Pablo con un fin. ''Para lo cual'' expresa ese carácter final sin sobreinterpretar la relación causal.'
- source_word: κατελήμφθην
  english_pob_choice: I too was taken hold of
  chosen_spanish: fui asido
  alternatives_spanish:
  - fui tomado
  - fui atrapado
  - fui aprehendido
  lexicon: BDAG
  rationale: Se preserva el vínculo verbal con καταλάβω mediante 'asir/asido'. La pasiva muestra que la iniciativa fue de Cristo, no de Pablo.
- source_word: Χριστοῦ
  english_pob_choice: Christ
  chosen_spanish: Cristo
  alternatives_spanish:
  - Mesías
  lexicon: BDAG
  rationale: En este contexto paulino, 'Cristo' funciona de manera establecida y natural en español bíblico. La nota puede dejar constancia de la equivalencia conceptual con 'Mesías' sin forzar el registro.
theological_decisions:
- issue: How to render τετελείωμαι without implying a doctrinal claim of sinless perfection
  english_pob_reading: have already been perfected
  chosen_spanish_reading: haya sido perfeccionado
  alternative_spanish_readings:
  - haya llegado a la perfección
  - haya sido hecho completo
  rationale: 'La traducción conserva el valor resultativo de la forma verbal y, al mismo tiempo, mantiene la tensión de Pablo: todavía no ha alcanzado la meta. No se añade una doctrina extratextual de impecabilidad o perfección absoluta.'
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: 'Coincide con la última pasada de revisión: no hubo cambios posteriores necesarios según el seguimiento de revisiones y la verificación cruzada de alta concordancia.'
  spanish_consistency_notes:
  - Se mantuvo la correlación léxica entre 'asir' y 'fui asido' para reflejar el juego verbal del griego.
  - Se evitó 'SEÑOR' o una glosa litúrgica; aquí Χριστοῦ se conserva como 'Cristo' por el uso paulino estable.
  - 'La puntuación y el orden de cláusulas siguen el contraste del original: negación inicial, contraste con ''pero'', y meta expresada con infinitivo/subjuntivo de finalidad.'
