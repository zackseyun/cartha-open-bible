lexical_decisions:
- source_word: πλὴν
  english_pob_choice: Only
  chosen_spanish: Solo
  alternatives_spanish:
  - Sin embargo
  - No obstante
  - Solo que
  lexicon: BDAG
  rationale: Aquí πλήν funciona como transición correctiva o limitadora, no como una simple excepción. «Solo» conserva esa restricción inicial en un español natural y sobrio.
- source_word: εἰς ὃ ἐφθάσαμεν
  english_pob_choice: with what we have attained
  chosen_spanish: con lo que hemos alcanzado
  alternatives_spanish:
  - hacia lo que hemos alcanzado
  - en lo que hemos alcanzado
  - a lo que hemos llegado
  lexicon: BDAG
  rationale: La construcción apunta al punto o nivel ya alcanzado. «Con lo que hemos alcanzado» mantiene la relación idiomática con el verbo exhortativo sin introducir un sustantivo ajeno al griego.
- source_word: ἐφθάσαμεν
  english_pob_choice: we have attained
  chosen_spanish: hemos alcanzado
  alternatives_spanish:
  - hemos llegado
  - hemos obtenido
  - hemos arribado
  lexicon: BDAG
  rationale: El aoristo mira a un punto ya logrado con relevancia presente. «Hemos alcanzado» comunica bien ese avance o nivel conseguido en español actual.
- source_word: τῷ αὐτῷ
  english_pob_choice: with / by the same
  chosen_spanish: en el mismo paso
  alternatives_spanish:
  - según la misma regla
  - con el mismo criterio
  - por la misma norma
  lexicon: BDAG
  rationale: El dativo con αὐτός expresa conformidad con lo mismo. Como el texto griego no explicita un sustantivo como «regla» o «norma», «en el mismo paso» conserva la imagen de caminar en línea y evita añadir una precisión no presente en el verso.
- source_word: στοιχεῖν
  english_pob_choice: keep in step
  chosen_spanish: sigamos en el mismo paso
  alternatives_spanish:
  - andemos en orden
  - sigamos la misma línea
  - vivamos consistentemente
  lexicon: BDAG
  rationale: στοιχέω suele expresar caminar alineados con un estándar. «Sigamos en el mismo paso» preserva la metáfora y su fuerza exhortativa en español claro.
theological_decisions:
- issue: Si añadir explícitamente «regla», «norma» o «estándar» para τῷ αὐτῷ
  english_pob_reading: Do not supply the noun in the main text; render the sense idiomatically as 'keep in step with what we have attained.'
  chosen_spanish_reading: No añadir «regla», «norma» o «estándar» en el texto principal; expresar la idea de concordancia de manera idiomática.
  alternative_spanish_readings:
  - andemos según la misma regla
  - sigamos la misma norma
  - mantengámonos en el mismo criterio
  rationale: El texto griego dado deja implícito el referente de conformidad. Añadirlo en la línea principal daría más precisión que la que ofrece el original; por eso se preserva la ambigüedad y se evita depender de formulaciones tradicionales.
  doctrine_reference: Primacía del original sobre la tradición de traducción; conservar la ambigüedad donde el griego la deja abierta.
translation_notes:
  revision_awareness: El texto griego SBLGNT y el análisis del inglés POB coinciden en no explicitar un sustantivo como «regla» en la línea principal; se mantiene esa decisión y se refleja la alternativa tradicional en nota.
  spanish_consistency_notes:
  - Se usa «Solo» para πλήν en valor restrictivo/correctivo.
  - Se evita «Señor» u otra terminología de máscara porque no aplica aquí.
  - «Hemos alcanzado» conserva la idea de logro previo con vigencia presente.
  - La metáfora de andar/caminar se conserva mediante «sigamos en el mismo paso» sin sobreexplicar el sustantivo implícito.
