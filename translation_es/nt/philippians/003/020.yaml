translation:
  language: es
  text: Porque nuestra ciudadanía[a] está en los cielos[b], de donde también esperamos con anhelo a un Salvador, el Señor Jesús, el Mesías[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “comunidad cívica”.
    reason: lexical_alternative
  - marker: b
    text: Griego “en los cielos”; también puede expresarse idiomáticamente “en el cielo”.
    reason: lexical_alternative
  - marker: c
    text: O “el Señor Jesús Cristo”.
    reason: alternative_reading
lexical_decisions:
- source_word: πολίτευμα
  english_pob_choice: citizenship
  chosen_spanish: ciudadanía
  alternatives_spanish:
  - patria
  - comunidad política
  - commonwealth
  lexicon: BDAG
  rationale: En este contexto el sustantivo conserva un matiz cívico/político de pertenencia. "Ciudadanía" transmite bien esa idea en español moderno y mantiene el contraste con la lealtad terrenal implícita en el pasaje. "Patria" suena más afectivo que cívico; "comunidad política" es demasiado pesado; "commonwealth" no es natural en español.
- source_word: ἐν οὐρανοῖς
  english_pob_choice: in heaven
  chosen_spanish: en los cielos
  alternatives_spanish:
  - en el cielo
  - en el cielo[s]
  lexicon: BDAG
  rationale: El griego usa plural, y aquí conviene conservarlo en español con "los cielos" para no borrar la forma del original. "En el cielo" sería más idiomático, pero perdería esa señal. Dado que el POB inglés también preserva la pluralidad como nota, el español puede hacerlo sin perder claridad.
- source_word: ὑπάρχει
  english_pob_choice: is
  chosen_spanish: está
  alternatives_spanish:
  - existe
  - se encuentra
  lexicon: BDAG
  rationale: El verbo afirma una realidad presente. En español, "está" comunica la localización/estado de manera natural y suficiente aquí; "existe" suena más abstracto, y "se encuentra" es más perifrástico.
- source_word: ἐξ οὗ
  english_pob_choice: from where
  chosen_spanish: de donde
  alternatives_spanish:
  - desde donde
  - de allí
  lexicon: BDAG
  rationale: La frase retoma "los cielos" como lugar de procedencia del Salvador esperado. "De donde" conserva bien la relación espacial y suena natural en español.
- source_word: σωτῆρα
  english_pob_choice: Savior
  chosen_spanish: Salvador
  alternatives_spanish:
  - libertador
  - redentor
  lexicon: BDAG
  rationale: '"Salvador" es la equivalencia directa y estándar para el término cristológico en este contexto. "Libertador" enfatiza solo una parte del sentido; "redentor" introduce un matiz más técnico que el griego aquí no exige.'
- source_word: ἀπεκδεχόμεθα
  english_pob_choice: eagerly await
  chosen_spanish: aguardamos con ansias
  alternatives_spanish:
  - esperamos con anhelo
  - aguardamos expectantes
  lexicon: BDAG
  rationale: El compuesto expresa espera intensa y sostenida. "Aguardamos con ansias" reproduce bien la expectativa activa y el tono del verbo sin sonar artificial; "esperamos con anhelo" es viable, pero menos directo.
- source_word: κύριον
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: BDAG
  rationale: '"Señor" es la forma habitual y más fiel para κύριος en cristología neotestamentaria. "Dueño" o "Maestro" reducirían o desplazarían el peso reverencial y bíblico del título.'
- source_word: Χριστόν
  english_pob_choice: Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Se sigue la preferencia del proyecto para traducir el título Χριστός como "Mesías" cuando funciona titularmente. En español, "Mesías" conserva la fuerza de título esperado y evita convertirlo sin más en un nombre fijo.
theological_decisions:
- issue: Renderización de κύριον Ἰησοῦν Χριστόν como título cristológico
  english_pob_reading: the Lord Jesus Messiah
  chosen_spanish_reading: el Señor Jesús Mesías
  alternative_spanish_readings:
  - el Señor Jesús, el Mesías
  - el Señor Jesús Cristo
  rationale: El griego presenta una cadena de títulos/nombres que culmina en Χριστόν. Mantener "Mesías" en la traducción principal preserva la decisión documental del proyecto de traducir el título, sin borrar su valor cristológico. La aposición con coma sería más explicativa, pero el griego no exige esa pausa; "Cristo" quedaría demasiado cercano a una transliteración tradicional y menos alineado con la guía de términos disputados.
  doctrine_reference: 'Contested terms: Χριστός → Mesías (cuando funciona como título)'
translation_notes:
  revision_awareness: El registro inglés atravesó una oscilación documentada entre "Messiah" y "Christ" por coherencia estilística y luego volvió a "Messiah" por la política terminológica del proyecto. En español se mantiene de forma consistente la opción titulada "Mesías", que sigue el principio vigente de traducir Χριστός cuando actúa como título, sin borrar la tensión auditada entre el nombre convencional y la traducción semántica.
  spanish_consistency_notes:
  - Se preservó el plural de οὐρανοῖς con "los cielos" para no desactivar una señal formal del griego.
  - Se eligió "ciudadanía" para mantener el campo cívico de πολίτευμα sin introducir una abstracción más amplia que la del texto.
  - '"Señor" se mantiene para κύριος por consistencia cristológica y porque el contexto refiere a Jesús.'
  - '"Mesías" se usa como título y no como nombre propio fijo, siguiendo la norma del proyecto para Χριστός.'
  - La puntuación con coma no se insertó en el texto principal para no sobrerinterpretar la sintaxis; la alternativa se conserva en nota.
