- from: Porque nuestra ciudadanía[a] está en los cielos[b], de donde también aguardamos con ansias a un Salvador, el Señor Jesús Mesías[c].
  to: Porque nuestra ciudadanía[a] está en los cielos[b], de donde también esperamos con anhelo a un Salvador, el Señor Jesús, el Mesías[c].
