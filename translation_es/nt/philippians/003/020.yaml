    issue: La frase “el Señor Jesús Mesías” suena poco natural en español.
    rationale: Aunque preserva cada elemento griego, en español esa cadena nominal resulta dura y puede leerse como nombre compuesto extraño. “El Señor Jesús, el Mesías” mantiene la decisión teológica de traducir Χριστός como título y mejora claramente la legibilidad.
  - severity: low
