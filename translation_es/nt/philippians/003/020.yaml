    rationale: El inglés documenta “commonwealth”, pero “comunidad política” es pesada y menos idiomática como nota breve. “Patria” o “estado” tampoco son exactos; conviene una alternativa más cercana a “comunidad cívica” o simplemente conservar una sola nota más útil.
