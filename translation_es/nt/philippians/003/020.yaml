review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: πολίτευμα como pertenencia cívica, ἐξ οὗ como procedencia desde los cielos, σωτῆρα como título cristológico, y Χριστόν como “Mesías” según la política del proyecto. Sin embargo, ὑπάρχει se expresa mejor con “está” o “se encuentra” en esta construcción locativa, y la cadena final κύριον Ἰησοῦν Χριστόν queda poco natural en español como “el Señor Jesús Mesías”.'
  spanish_quality_summary: El texto es claro y comprensible, pero requiere una mejora de naturalidad y dignidad eclesial en la frase final. “Aguardamos con ansias” es entendible, aunque algo coloquial/intenso; “esperamos con anhelo” suena más bíblico y estable. La secuencia “el Señor Jesús Mesías” resulta torpe en español; una aposición con coma preserva mejor el valor titular de “Mesías” sin sonar como un calco áspero.
  glossary_alignment: 'Buena alineación general con el glosario: “ciudadanía” para πολίτευμα y “Mesías” para Χριστός son aciertos. “Señor” para κύριος también está bien. No hay conflicto con Yahvé ni otros términos disputados. La excepción recomendada es estilística-sintáctica: mantener “Mesías” pero en aposición española natural.'
  issues:
