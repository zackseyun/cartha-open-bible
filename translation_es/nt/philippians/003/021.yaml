revisions:
- from: el cual transformará el cuerpo de nuestra humillación para que sea conforme al cuerpo de su gloria[a][b], según la eficacia[c] con la cual también puede sujetar a sí mismo todas las cosas.
  to: el cual transformará el cuerpo de nuestra humillación para que sea conforme al cuerpo de su gloria[a][b], según la operación[c] por la cual también puede sujetar todas las cosas a sí mismo.
  rationale: Se ajusta «eficacia» a «operación» para reflejar mejor ἐνέργεια como poder en acción, en línea con la auditoría inglesa. También se corrige el orden de «sujetar todas las cosas a sí mismo» para expresar con claridad y fidelidad que «todas las cosas» son el objeto sometido y «a sí mismo» es el término de la sujeción. Se conserva el resto del fraseo porque representa bien la forma y el peso teológico del original.
