review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el griego en los elementos principales: μετασχηματίσει = «transformará», τὸ σῶμα τῆς ταπεινώσεως ἡμῶν = «el cuerpo de nuestra humillación», σύμμορφον = «conforme», y mantiene el alcance de «todas las cosas». Sin embargo, hay dos problemas de alineación fina: «según la eficacia» no representa tan bien ἐνέργεια como «según la operación» o «según la acción eficaz», y «sujetar a sí mismo todas las cosas» invierte en español la relación del complemento; el griego significa «sujetar todas las cosas a sí mismo».'
  spanish_quality_summary: El texto es generalmente legible y digno, pero «según la eficacia con la cual también puede» suena algo abstracto y poco natural en español bíblico actual. Además, «sujetar a sí mismo todas las cosas» puede entenderse como si él mismo fuera el objeto sujetado, no el término de la sujeción. Una leve reparación mejora claridad y fidelidad sin perder formalidad.
  glossary_alignment: 'No hay conflicto con la terminología de proyecto. No aparecen términos controlados como Yahvé, Mesías, esclavo, etc. La decisión de mantener «el cuerpo de nuestra humillación» y «el cuerpo de su gloria» concuerda con la revisión inglesa auditada. La excepción necesaria es léxica: para ἐνέργεια, «operación» o «acción eficaz» refleja mejor el sustantivo que «eficacia» sola.'
  issues:
  - severity: medium
    issue: «según la eficacia» para κατὰ τὴν ἐνέργειαν
    rationale: ἐνέργεια denota operación activa, poder en acción, no solo efectividad abstracta. «Eficacia» en español puede sonar demasiado resultativa y menos dinámica que el original.
  - severity: high
    issue: «sujetar a sí mismo todas las cosas» desordena la sintaxis de ὑποτάξαι ἑαυτῷ τὰ πάντα
    rationale: La construcción correcta en español es «sujetar todas las cosas a sí mismo» o «someter a sí mismo todas las cosas». Tal como está, puede leerse de manera confusa o equivocada.
  - severity: low
    issue: La nota [c] no corresponde bien al texto principal
    rationale: 'Si el texto usa «eficacia», la nota «O: según la operación» funciona, pero dado que «operación» es más fiel al griego, conviene elevarla al texto principal y ajustar la nota a una alternativa secundaria, o eliminarla.'
