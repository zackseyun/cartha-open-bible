translation:
  language: es
  text: el cual transformará el cuerpo de nuestra humillación para que sea conforme al cuerpo de su gloria[a][b], según la operación[c] por la cual también puede sujetar todas las cosas a sí mismo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «el cuerpo de nuestra humillación».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «el cuerpo de su gloria».
    reason: lexical_alternative
  - marker: c
    text: 'O: «según la acción eficaz por la cual también puede».'
    reason: lexical_alternative
lexical_decisions:
- source_word: μετασχηματίσει
  english_pob_choice: will transform
  chosen_spanish: transformará
  alternatives_spanish:
  - cambiará
  - reformará
  lexicon: BDAG
  rationale: El verbo indica un cambio real de forma o condición. «Transformará» comunica bien esa fuerza futura en español y evita debilitar el verbo con un simple «cambiará».
- source_word: τὸ σῶμα τῆς ταπεινώσεως ἡμῶν
  english_pob_choice: the body of our humiliation
  chosen_spanish: el cuerpo de nuestra humillación
  alternatives_spanish:
  - nuestro cuerpo humillado
  - nuestro cuerpo vil
  lexicon: BDAG
  rationale: Sigo de cerca la construcción genitiva para no perder la tensión lexical. «Nuestra humillación» mantiene la referencia a una condición presente de bajeza/abatimiento, sin suavizarla hacia una idea meramente afectiva.
- source_word: σύμμορφον
  english_pob_choice: to be conformed to / be like
  chosen_spanish: para que sea conforme a
  alternatives_spanish:
  - para que sea semejante a
  - para que tenga la misma forma que
  lexicon: BDAG
  rationale: «Conforme a» preserva la idea de correspondencia fuerte entre el cuerpo presente y el cuerpo glorioso, y evita diluir el matiz de forma compartida que sí está en el griego.
- source_word: τῷ σώματι τῆς δόξης αὐτοῦ
  english_pob_choice: his glorious body
  chosen_spanish: el cuerpo de su gloria
  alternatives_spanish:
  - su cuerpo glorioso
  - el cuerpo perteneciente a su gloria
  lexicon: BDAG
  rationale: Prefiero conservar la estructura posesiva del griego («de su gloria») porque la frase une cuerpo y gloria sin convertirla enseguida en un adjetivo interpretativo. «Cuerpo glorioso» es posible, pero borra un poco la forma del original.
- source_word: κατὰ τὴν ἐνέργειαν
  english_pob_choice: according to the working / by the power
  chosen_spanish: según la eficacia
  alternatives_spanish:
  - según la operación
  - de acuerdo con el poder en acción
  lexicon: BDAG
  rationale: «Eficacia» comunica la idea de energía operante, efectiva, en acción. Mantiene el peso dinámico del sustantivo sin imponer una traducción demasiado técnica o eclesiástica.
- source_word: τοῦ δύνασθαι αὐτὸν
  english_pob_choice: that enables him / by which he is able
  chosen_spanish: con la cual también puede
  alternatives_spanish:
  - por la cual también es capaz
  - que le permite también
  lexicon: BDAG
  rationale: El infinitivo explica la eficacia en términos de capacidad real. «Con la cual también puede» conserva la relación causal sin volver la frase redundante en español.
- source_word: ὑποτάξαι ἑαυτῷ τὰ πάντα
  english_pob_choice: to subject all things to himself
  chosen_spanish: sujetar a sí mismo todas las cosas
  alternatives_spanish:
  - someter todas las cosas a sí
  - poner todas las cosas bajo su autoridad
  lexicon: BDAG
  rationale: «Sujetar» preserva la fuerza verbal del griego y mantiene el alcance total de «todas las cosas». Evito «autoridad» porque introduce una paráfrasis que el texto no explicita.
theological_decisions:
- issue: Relación entre la humillación presente y la glorificación futura del cuerpo
  english_pob_reading: The verse is rendered to describe a future transformation of believers' present lowly bodily condition into likeness with Messiah's glorious body, without specifying more than the Greek states about the mechanics of resurrection.
  chosen_spanish_reading: El versículo describe una transformación futura del cuerpo actualmente humillado de los creyentes a conformidad con el cuerpo de la gloria de Cristo, sin añadir detalles sobre el mecanismo de la resurrección.
  alternative_spanish_readings:
  - El versículo podría explicitar «resurrección» para facilitar la lectura doctrinal.
  - Podría leerse más libremente como una simple renovación moral del creyente.
  rationale: 'La forma española debe conservar la tensión escatológica del original: hay cambio corporal real y futura conformidad con la gloria de Cristo, pero el texto no desarrolla aquí el proceso. Evito ampliar o reducir el alcance teológico.'
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: 'La redacción final se ajusta al último paso de revisión del inglés POB, que volvió a una equivalencia más cercana: «el cuerpo de nuestra humillación», «conforme a», y «según la eficacia/operación». La versión española refleja esa misma preferencia por conservar las construcciones del original sin perder legibilidad.'
  spanish_consistency_notes:
  - Uso «Yahvé» no aplica en este versículo.
  - Mantengo «cuerpo» de forma consistente para σῶμα en ambos miembros.
  - Conservo «gloria» como sustantivo para δόξα, en lugar de convertirlo solo en adjetivo.
  - «Sujetar a sí mismo todas las cosas» preserva el alcance universal de τὰ πάντα.
