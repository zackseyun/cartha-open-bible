translation:
  language: es
  text: Prosigo hacia la meta, para el premio del llamamiento de lo alto de Dios en Mesías Jesús[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «llamamiento celestial» o «llamamiento desde arriba».
    reason: lexical_alternative
  - marker: b
    text: 'Griego: «en Cristo Jesús»; se traduce «en Mesías Jesús» porque Χριστός aquí funciona como título.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κατὰ σκοπόν
  english_pob_choice: toward the goal
  chosen_spanish: hacia la meta
  alternatives_spanish:
  - con la meta en vista
  - según la meta
  lexicon: BDAG
  rationale: En este contexto atlético, la expresión apunta a un objetivo fijo. «Hacia la meta» conserva la imagen de avance dirigido y suena natural en español.
- source_word: διώκω
  english_pob_choice: I press on
  chosen_spanish: Prosigo
  alternatives_spanish:
  - Sigo adelante
  - Persigo
  lexicon: BDAG
  rationale: El verbo en Filipenses 3 mantiene la metáfora de esfuerzo continuo y avance. «Prosigo» comunica perseverancia sin perder el tono enérgico del original.
- source_word: εἰς τὸ βραβεῖον
  english_pob_choice: for the prize
  chosen_spanish: para el premio
  alternatives_spanish:
  - hacia el premio
  - para ganar el premio
  lexicon: BDAG
  rationale: εἰς señala la meta o finalidad. «Para el premio» expresa el propósito de manera directa y fiel sin añadir elementos ajenos al griego.
- source_word: ἄνω
  english_pob_choice: upward
  chosen_spanish: de arriba
  alternatives_spanish:
  - celestial
  - desde arriba
  lexicon: BDAG
  rationale: En español, «de arriba» reproduce con claridad la fuerza direccional/locativa de ἄνω y preserva la posible tensión entre movimiento hacia lo alto y procedencia desde arriba. Se evita fijar prematuramente la imagen como «celestial».
- source_word: κλήσεως τοῦ θεοῦ
  english_pob_choice: of the upward call of God
  chosen_spanish: de la vocación de arriba de Dios
  alternatives_spanish:
  - del llamamiento de arriba de Dios
  - de la llamada de arriba de Dios
  lexicon: BDAG
  rationale: Se eligió «vocación» para κλῆσις porque en español eclesial puede conservar el sentido de llamado sin sonar demasiado técnico. «De arriba de Dios» deja visible la relación genitiva y la cualidad «de arriba» sin convertirla en una paráfrasis interpretativa cerrada.
- source_word: Χριστῷ
  english_pob_choice: Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: De acuerdo con la política del proyecto, Χριστός se traduce como «Mesías» cuando funciona como título.
- source_word: ἐν Χριστῷ Ἰησοῦ
  english_pob_choice: in Messiah Jesus
  chosen_spanish: en Mesías Jesús
  alternatives_spanish:
  - en Cristo Jesús
  lexicon: BDAG
  rationale: Se mantiene la frase preposicional de manera directa y coherente con la decisión titulativa para Χριστός.
theological_decisions:
- issue: Sentido de ἄνω κλήσεως
  english_pob_reading: upward call
  chosen_spanish_reading: vocación de arriba
  alternative_spanish_readings:
  - llamamiento celestial
  - llamada desde arriba
  rationale: 'La frase conserva la ambigüedad productiva del original: puede sugerir tanto un llamado que viene de arriba como uno orientado hacia arriba. No se resuelve la tensión al reducirla a una sola idea más abstracta.'
  doctrine_reference: Preservar la tensión léxica y metafórica del texto sin armonizarla prematuramente.
- issue: Uso de «Mesías» para Χριστός
  english_pob_reading: Messiah Jesus
  chosen_spanish_reading: Mesías Jesús
  alternative_spanish_readings:
  - Cristo Jesús
  rationale: Se conserva el valor titulado de Χριστός, siguiendo la práctica del proyecto y evitando convertirlo automáticamente en un nombre litúrgico fijo.
  doctrine_reference: Política terminológica del proyecto sobre Χριστός como título.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB en inglés, que aclaró la genitividad de «the upward call of God» frente a «God’s upward call». La versión española intenta reflejar esa relación con una construcción más explícita («de Dios») sin abandonar el paralelismo y la fuerza metafórica del verso.
  spanish_consistency_notes:
  - Se mantiene «Mesías» para Χριστός conforme al estándar del proyecto.
  - Se evita «SEÑOR» porque no aparece el nombre divino en este verso.
  - «Prosigo» y «hacia la meta» conservan la metáfora atlética dominante en el contexto inmediato de Filipenses 3.
  - La formulación «de arriba» busca ser suficientemente literal sin sonar rígida en español.
  - Las notas al pie están ancladas directamente en la frase correspondiente del texto para cumplir la validación.
