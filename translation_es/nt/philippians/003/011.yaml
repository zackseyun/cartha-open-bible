translation:
  language: es
  text: si de alguna manera puedo alcanzar la resurrección de entre los muertos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «la resurrección salida de entre los muertos». El griego usa una forma inusual que puede resaltar la idea de resurrección de entre los muertos.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἴ πως
  english_pob_choice: if somehow
  chosen_spanish: si de alguna manera
  alternatives_spanish:
  - si por algún medio
  - si de algún modo
  - si acaso
  lexicon: BDAG
  rationale: Conserva el matiz de posibilidad tentativa y la humildad de la forma griega sin volverla más fuerte de lo que permite el texto. «De alguna manera» es natural en español y mantiene la incertidumbre del modo, no del resultado prometido por Dios.
- source_word: καταντήσω
  english_pob_choice: I may attain
  chosen_spanish: logro llegar
  alternatives_spanish:
  - pueda alcanzar
  - pueda llegar a
  - alcance
  lexicon: BDAG
  rationale: El verbo griego expresa llegar a una meta u objetivo. En español, «llegar a» comunica bien la idea de arribo hacia una meta escatológica; «logro llegar» refleja la orientación del subjuntivo futuro/posible sin sonar rígido.
- source_word: εἰς
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - hasta
  lexicon: BDAG
  rationale: La preposición griega marca dirección o meta. En español, la combinación con «llegar a» reproduce de manera natural ese movimiento hacia un objetivo.
- source_word: ἐξανάστασιν
  english_pob_choice: the resurrection
  chosen_spanish: la resurrección
  alternatives_spanish:
  - la resurrección de entre los muertos
  - la resurrección completa
  lexicon: BDAG
  rationale: El sustantivo denota resurrección; no se fuerza en el texto principal un neologismo como «ex-resurrección». La forma española conserva la claridad y deja la rareza morfológica para la nota.
- source_word: τὴν ἐκ νεκρῶν
  english_pob_choice: from the dead
  chosen_spanish: de entre los muertos
  alternatives_spanish:
  - de los muertos
  - desde entre los muertos
  - fuera de entre los muertos
  lexicon: BDAG
  rationale: «De entre los muertos» mantiene con más precisión la relación partitiva o de salida expresada por ἐκ, sin sonar tan pesado como una paráfrasis más literal. Preserva la imagen de resurrección desde el ámbito de los muertos.
theological_decisions:
- issue: Si la forma inusual ἐξανάστασις debe sugerir una resurrección especial o distinta.
  english_pob_reading: Render it as 'the resurrection from the dead' in the main text; preserve possible distinctiveness in a note.
  chosen_spanish_reading: «la resurrección de entre los muertos» en el texto principal, con nota sobre la posible fuerza distintiva de la forma griega.
  alternative_spanish_readings:
  - la ex-resurrección de entre los muertos
  - la resurrección de entre los muertos
  rationale: La forma griega es inusual, pero el texto no exige crear una palabra española artificial. La traducción principal debe ser transparente y legible; la posible diferencia semántica de ἐξανάστασις respecto de ἀνάστασις queda preservada sin exagerarla.
  doctrine_reference: Preservar la tensión teológica y lexical en vez de resolverla de manera especulativa.
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requieren cambios adicionales; la decisión central sigue siendo una equivalencia óptima que preserve la rareza de ἐξανάστασις sin imponer un neologismo en el texto principal.'
  spanish_consistency_notes:
  - Se usa «resurrección» como término principal para ἐξανάστασις, con una nota que conserva la alternativa más literal.
  - «de entre los muertos» refleja mejor ἐκ νεκρῶν que un simple «de los muertos» y mantiene la dirección de salida.
  - El subjuntivo y la condición tentativa de εἴ πως se conservan con una formulación natural en español.
  - No se emplea «Cristo» ni terminología de título aquí; no aplica una decisión cristológica específica.
  - La nota evita sobreinterpretar la forma griega como doctrina de una resurrección separada, siguiendo el audit trail inglés.
