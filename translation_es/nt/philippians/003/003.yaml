  text: ἡμεῖς γάρ ἐσμεν ἡ περιτομή, οἱ πνεύματι θεοῦ λατρεύοντες καὶ καυχώμενοι ἐν Χριστῷ Ἰησοῦ καὶ οὐκ ἐν σαρκὶ πεποιθότες,
base_translation:
  language: en
  yaml_path: translation/nt/philippians/003/003.yaml
  text: For we are the circumcision[a], who worship by the Spirit of God and boast in Messiah Jesus and put no confidence in the flesh[c][b],
  footnotes:
  - marker: a
    text: Or, with a textual variant, “who worship God in spirit.”
    reason: textual_variant
  - marker: b
    text: “Messiah” translates the title Christos.
    reason: lexical_alternative
  - marker: c
    text: “Flesh” here refers to bodily or human grounds for confidence, such as circumcision or status.
    reason: cultural_note
  ai_draft:
