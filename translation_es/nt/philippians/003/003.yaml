  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T09:58:50Z'
    unchanged: false
    changes_summary: 'Changed ''Messiah Jesus'' to ''Christ Jesus'' for closer correspondence to Χριστῷ Ἰησοῦ and more natural consistency in formal English. No other changes needed. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: Porque nosotros somos la circuncisión, los que adoramos por el Espíritu de Dios[a] y nos gloriamos en Mesías Jesús[b] y no confiamos en la carne[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, con una variante textual, «los que adoran a Dios en espíritu».
    reason: textual_variant
  - marker: b
    text: «Mesías» traduce el título Christos.
    reason: lexical_alternative
  - marker: c
    text: «Carne» aquí se refiere a bases corporales o humanas de confianza, como la circuncisión o el estatus.
    reason: cultural_note
lexical_decisions:
- source_word: γάρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque, en efecto
  lexicon: BDAG
  rationale: Conserva la relación explicativa con el contexto anterior en un español natural. 'Porque' es la opción más directa y fiel al valor discursivo de γάρ aquí.
- source_word: ἡ περιτομή
  english_pob_choice: the circumcision
  chosen_spanish: la circuncisión
  alternatives_spanish:
  - los verdaderamente circuncisos
  - el pueblo de la circuncisión
  lexicon: BDAG
  rationale: 'Mantiene el término concreto del pacto y deja visible la ironía paulina: la identidad verdadera se define por la circuncisión en sentido teológico, no solo por la marca física.'
- source_word: πνεύματι θεοῦ
  english_pob_choice: by the Spirit of God
  chosen_spanish: por el Espíritu de Dios
  alternatives_spanish:
  - en el Espíritu de Dios
  - con el Espíritu de Dios
  lexicon: BDAG
  rationale: Con el texto griego dado, la construcción apunta de forma natural a la agencia o esfera del Espíritu de Dios. 'Por' comunica bien esa mediación en español.
- source_word: λατρεύοντες
  english_pob_choice: worship
  chosen_spanish: adoramos
  alternatives_spanish:
  - damos culto
  - servimos en culto
  lexicon: BDAG
  rationale: '''Adorar'' expresa de manera clara y reverente el servicio religioso debido a Dios. En español suena más natural que un calco como ''servir en culto'', sin perder el sentido de culto rendido a Dios.'
- source_word: καυχώμενοι
  english_pob_choice: boast
  chosen_spanish: nos gloriamos
  alternatives_spanish:
  - nos jactamos
  - nos alabamos
  lexicon: BDAG
  rationale: '''Nos gloriamos'' preserva el matiz paulino de orgullo/seguridad fundamentada en algo, con un registro más eclesial y menos áspero que ''nos jactamos'', sin borrar la tensión retórica del verbo.'
- source_word: Χριστῷ Ἰησοῦ
  english_pob_choice: Messiah Jesus
  chosen_spanish: Mesías Jesús
  alternatives_spanish:
  - Cristo Jesús
  - Jesucristo
  lexicon: BDAG
  rationale: Se conserva 'Mesías' para Χριστός según la norma del proyecto; 'Jesús' mantiene el nombre propio. El orden refleja el griego y preserva el valor titular de Χριστός.
- source_word: σαρκὶ
  english_pob_choice: flesh
  chosen_spanish: la carne
  alternatives_spanish:
  - la naturaleza humana
  - lo humano
  lexicon: BDAG
  rationale: Se conserva 'carne' para σάρξ, porque el contraste depende del término cargado de sentido bíblico y no solo de una paráfrasis antropológica. En este verso se refiere a credenciales humanas y carnales de confianza.
- source_word: πεποιθότες
  english_pob_choice: put no confidence
  chosen_spanish: no confiamos
  alternatives_spanish:
  - no ponemos confianza
  - no depositamos nuestra confianza
  lexicon: BDAG
  rationale: '''No confiamos'' expresa el estado de confianza negado por el participio perfecto en una forma idiomática y fluida en español. La idea de confianza asentada queda implícita en el contraste con la carne.'
theological_decisions:
- issue: Sentido de σάρξ en este contexto
  english_pob_reading: flesh refers to bodily or human grounds for confidence, such as circumcision or status
  chosen_spanish_reading: la carne refiere principalmente a bases corporales y humanas de confianza religiosa, como la circuncisión o el estatus
  alternative_spanish_readings:
  - la carne como naturaleza pecaminosa interior
  - la carne como el cuerpo físico sin matiz moral
  rationale: En Filipenses 3 el argumento inmediato enumera circuncisión, linaje, ley y privilegios. Por eso 'carne' no debe reducirse aquí a una mera noción de pecado interior; el contraste es con credenciales humanas de las que uno podría presumir.
  doctrine_reference: 'Contested terms table: σάρξ se traduce de forma contextual como ''carne'' (literal/metafórica) y no se estrecha automáticamente a ''naturaleza pecaminosa''.'
- issue: Alcance de πνεύματι θεοῦ
  english_pob_reading: reference to the Spirit of God as the means/sphere of worship
  chosen_spanish_reading: referencia al Espíritu de Dios como medio o esfera del culto
  alternative_spanish_readings:
  - el espíritu humano del creyente
  - adorar a Dios en un sentido meramente interior
  rationale: Con θεοῦ en el texto base, la lectura natural es la del Espíritu de Dios. 'Por el Espíritu de Dios' conserva esa relación y evita deslizar el sentido hacia una interioridad humana no explícita.
  doctrine_reference: La lectura se alinea con la comprensión trinitaria del culto cristiano y con el texto griego transmitido.
- issue: Valor titular de Χριστός
  english_pob_reading: Messiah Jesus
  chosen_spanish_reading: Mesías Jesús
  alternative_spanish_readings:
  - Cristo Jesús
  - Jesús el Cristo
  rationale: Se preserva 'Mesías' para mantener la carga de título y evitar que el término quede fosilizado como mero nombre propio. Esto sigue la política doctrinal del proyecto para Χριστός cuando funciona como título.
  doctrine_reference: 'Terminología POB para Χριστός: ''Mesías'' salvo justificación idiomática o tradicional documentada.'
translation_notes:
  revision_awareness: El expediente inglés tuvo oscilación entre 'Messiah Jesus' y 'Christ Jesus'; para el español se siguió la política del proyecto de traducir Χριστός como 'Mesías', manteniendo así la lectura titulada y el orden más cercano al griego. También se conservó el contraste fuerte de 'flesh' como 'carne' y el matiz cultual de 'worship'/'λατρεύοντες'.
  spanish_consistency_notes:
  - Se mantuvo 'Mesías' para Χριστός conforme a la terminología del proyecto y a la lectura titulada del texto.
  - Se prefirió 'por el Espíritu de Dios' para reflejar la agencia/sfera del culto sin introducir una paráfrasis más explicativa que el griego no exige.
  - '''La carne'' conserva el lenguaje bíblico cargado de σάρξ y permite el contraste con las credenciales humanas mencionadas en el contexto inmediato.'
  - La puntuación y el orden conservan la cadencia paulina sin añadir elementos no presentes en el verso.
