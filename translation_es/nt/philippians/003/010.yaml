revisions:
- from: para conocerlo[a], y el poder de su resurrección, y la comunión de sus padecimientos, siendo conformado a su muerte[b],
  to: para conocerlo, y el poder de su resurrección, y la comunión[a] de sus padecimientos, siendo hecho semejante a su muerte[b],
  rationale: Se corrige el anclaje de la nota [a] para que corresponda a κοινωνίαν, se elimina una alternativa no auditada («conocerlo íntimamente»), y se reemplaza «siendo conformado» por una formulación más natural en español («siendo hecho semejante») que sigue reflejando el participio presente y el sentido de conformidad progresiva al modelo de la muerte de Cristo.
