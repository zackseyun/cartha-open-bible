review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: finalidad («para conocerlo»), poder de la resurrección, κοινωνία de los padecimientos y el participio de conformación a la muerte. Sin embargo, «siendo conformado» suena poco natural en español y «la comunión de sus padecimientos» puede preservarse, pero conviene aclarar en nota la alternativa participativa ya atestiguada en la auditoría inglesa.'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero presenta una construcción algo forzada: «siendo conformado» es un calco participial menos idiomático que «siendo hecho semejante» o «llegando a ser hecho semejante». Además, «padecimientos» es aceptable, aunque «sufrimientos» sería más inmediato para lectores amplios; no obstante, no exige cambio. El resto fluye adecuadamente.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Cristo» no aparece en el versículo; «resurrección», «poder» y «muerte» están bien. La decisión sobre κοινωνία se mantiene alineada con la revisión inglesa al conservar el sustantivo («comunión»), pero la nota debe incluir explícitamente «participación en sus padecimientos» o «comunión en sus padecimientos» para resguardar el matiz participativo.
  issues:
  - severity: medium
    issue: «siendo conformado a su muerte» suena poco natural en español
    rationale: Aunque sigue de cerca el inglés y el griego, en español moderno eclesial esta pasiva con «conformado a» resulta dura y algo calcada. «siendo hecho semejante a su muerte» conserva el participio y el proceso, pero con mejor naturalidad.
  - severity: low
    issue: La nota [a] añade «conocerlo íntimamente», alternativa no documentada en la auditoría inglesa
    rationale: El rastro inglés solo preserva «to come to know». «Conocerlo íntimamente» puede ser interpretativo y va más allá de la alternativa auditada.
  - severity: low
    issue: La nota [a] está anclada en «conocerlo», pero su contenido trata de κοινωνία
    rationale: La auditoría inglesa ubica la nota a tras «him», pero su contenido explica una alternativa para «the fellowship of his sufferings». En español conviene reubicar el marcador al sintagma correspondiente para evitar confusión y para que el anclaje corresponda al contenido real de la nota.
  revised_spanish_text: para conocerlo, y el poder de su resurrección, y la comunión[a] de sus padecimientos, siendo hecho semejante a su muerte[b],
  revised_footnotes:
  - marker: a
    text: O «comunión en sus padecimientos» o «participación en sus padecimientos».
    reason: lexical_alternative
  - marker: b
    text: O «llegando a ser hecho semejante a su muerte».
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de la nota [a] para que corresponda a κοινωνίαν, se elimina una alternativa no auditada («conocerlo íntimamente»), y se reemplaza «siendo conformado» por una formulación más natural en español («siendo hecho semejante») que sigue reflejando el participio presente y el sentido de conformidad progresiva al modelo de la muerte de Cristo.
