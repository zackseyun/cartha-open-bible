translation:
  language: es
  text: para conocerlo, y el poder de su resurrección, y la comunión[a] de sus padecimientos, siendo hecho semejante a su muerte[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «comunión en sus padecimientos» o «participación en sus padecimientos».
    reason: lexical_alternative
  - marker: b
    text: O «llegando a ser hecho semejante a su muerte».
    reason: lexical_alternative
lexical_decisions:
- source_word: γνῶναι
  english_pob_choice: to know
  chosen_spanish: conocerlo
  alternatives_spanish:
  - llegar a conocerlo
  - conocerlo íntimamente
  lexicon: BDAG
  rationale: El infinitivo aoristo expresa meta o propósito. En español, «conocerlo» comunica de forma natural la relación y la experiencia implícitas sin cargar la frase con paráfrasis.
- source_word: δύναμιν
  english_pob_choice: power
  chosen_spanish: poder
  alternatives_spanish:
  - fuerza
  - potencia
  lexicon: BDAG
  rationale: «Poder» es el equivalente más claro y común para δύναμις en este contexto, donde se refiere a la eficacia de la resurrección de Cristo.
- source_word: ἀναστάσεως
  english_pob_choice: resurrection
  chosen_spanish: resurrección
  alternatives_spanish:
  - levantamiento
  - alzamiento
  lexicon: BDAG
  rationale: «Resurrección» es el término preciso y establecido para el acontecimiento teológico descrito por Pablo.
- source_word: κοινωνίαν
  english_pob_choice: the fellowship of
  chosen_spanish: la comunión de
  alternatives_spanish:
  - la participación en
  - el compartir de
  lexicon: BDAG
  rationale: La auditoría inglesa preserva el sustantivo «fellowship» para reflejar la secuencia nominal griega. En español, «comunión de» mantiene esa estructura y es bíblicamente inteligible, aunque puede sugerir matiz de participación activa que se aclara mejor por el contexto.
- source_word: παθημάτων
  english_pob_choice: sufferings
  chosen_spanish: padecimientos
  alternatives_spanish:
  - sufrimientos
  - aflicciones
  lexicon: BDAG
  rationale: «Padecimientos» conserva el sentido de sufrimientos padecidos y suena natural en español bíblico, sin perder el carácter personal y costoso del término.
- source_word: συμμορφιζόμενος
  english_pob_choice: being conformed
  chosen_spanish: siendo conformado
  alternatives_spanish:
  - conformándose
  - siendo hecho semejante
  lexicon: BDAG
  rationale: El participio presente indica un proceso continuo. «Siendo conformado» conserva la forma participial y la idea de transformación progresiva hacia la semejanza con la muerte de Cristo.
- source_word: τῷ θανάτῳ αὐτοῦ
  english_pob_choice: to his death
  chosen_spanish: a su muerte
  alternatives_spanish:
  - a la muerte que sufrió
  - hasta su muerte
  lexicon: BDAG
  rationale: La dativo-complemento de συμμορφιζόμενος se expresa de manera idiomática como «a su muerte», manteniendo el foco en la muerte de Cristo como patrón de conformación.
theological_decisions:
- issue: κοινωνίαν παθημάτων αὐτοῦ como participación real en los sufrimientos de Cristo
  english_pob_reading: Paul speaks of real participation or sharing in Christ's sufferings, not merely emotional sympathy.
  chosen_spanish_reading: Pablo habla de una comunión real en los padecimientos de Cristo, no solo de simpatía emocional.
  alternative_spanish_readings:
  - fellowship con sus sufrimientos en sentido más abstracto
  - participación en sus sufrimientos
  rationale: «Comunión de sus padecimientos» conserva la fuerza participativa del genitivo y evita reducir κοινωνία a mera actitud interior. El contexto paulino favorece una participación real en el patrón de sufrimiento de Cristo.
  doctrine_reference: Cristología paulina; participación en los padecimientos de Cristo (cf. Rom. 8:17; 2 Co. 4:10-11)
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del auditorio inglés, que prefería preservar el sustantivo correspondiente a κοινωνία y mantener la secuencia nominal griega. En español se optó por «comunión de» para respetar esa decisión auditada, aunque se reconoce que «participación en» también sería posible. Se mantuvo el valor progresivo del participio con «siendo conformado».
  spanish_consistency_notes:
  - Se usó «Yahvé» por norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se evitó «Cristo» porque el griego aquí usa pronombres referidos a Jesús; la referencia queda clara por el contexto inmediato.
  - «Padecimientos» se eligió por dignidad y claridad, sin borrar la posibilidad semántica de «sufrimientos».
