translation:
  language: es
  text: en cuanto al celo, persiguiendo a la iglesia; en cuanto a la justicia[a] bajo la ley[b], habiendo llegado a ser irreprochable.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «rectitud».
    reason: lexical_alternative
  - marker: b
    text: Lit. «en la ley».
    reason: lexical_alternative
lexical_decisions:
- source_word: κατὰ
  english_pob_choice: as to
  chosen_spanish: en cuanto a
  alternatives_spanish:
  - respecto de
  - en lo tocante a
  lexicon: BDAG
  rationale: κατά introduce el ámbito o criterio bajo el cual se evalúa a Pablo. «En cuanto a» conserva la estructura repetida del verso y suena natural en español sin perder el valor categorial.
- source_word: ζῆλος
  english_pob_choice: zeal
  chosen_spanish: celo
  alternatives_spanish:
  - ardor
  - entusiasmo
  lexicon: BDAG
  rationale: «Celo» comunica bien la intensidad religiosa de ζῆλος en un contexto judío y paulino. Mantiene el matiz de entrega fervorosa sin volverse demasiado genérico.
- source_word: διώκων
  english_pob_choice: persecuting
  chosen_spanish: persiguiendo
  alternatives_spanish:
  - persecutando
  - hostigando
  lexicon: BDAG
  rationale: El verbo describe la acción hostil contra la iglesia. «Persiguiendo» es la forma más directa y idiomática en español; en este contexto conserva la fuerza de persecución sin requerir una forma más pesada.
- source_word: ἐκκλησίαν
  english_pob_choice: the church
  chosen_spanish: la iglesia
  alternatives_spanish:
  - la asamblea
  - la congregación
  lexicon: BDAG
  rationale: En Pablo, ἐκκλησία refiere a la comunidad cristiana. «La iglesia» es la equivalencia más clara para el lector español y mantiene el referente eclesial del texto.
- source_word: δικαιοσύνην
  english_pob_choice: righteousness
  chosen_spanish: la justicia
  alternatives_spanish:
  - la rectitud
  - la justicia/rectitud
  lexicon: BDAG
  rationale: 'Aquí se preserva la alternativa lexical documentada en el audit trail: δικαιοσύνη puede leerse como «justicia» o «rectitud». Se eligió «justicia» porque permite conservar el paralelismo con el ámbito legal de la ley, sin ocultar la tensión semántica.'
- source_word: ἐν νόμῳ
  english_pob_choice: under the law
  chosen_spanish: bajo la ley
  alternatives_spanish:
  - en la ley
  - dentro de la ley
  lexicon: BDAG
  rationale: Aunque el griego dice literalmente «en la ley», «bajo la ley» refleja mejor en español la esfera normativa o el marco de evaluación. Además conserva la interpretación auditada del POB inglés.
- source_word: γενόμενος
  english_pob_choice: having become
  chosen_spanish: habiendo llegado a ser
  alternatives_spanish:
  - habiendo sido
  - llegando a ser
  lexicon: BDAG
  rationale: El participio aoristo se vierte con un perfecto participial en español para reflejar un estado alcanzado en la trayectoria anterior de Pablo. «Habiendo llegado a ser» mantiene el valor aspectual sin forzar un simple adjetivo.
- source_word: ἄμεμπτος
  english_pob_choice: blameless
  chosen_spanish: irreprochable
  alternatives_spanish:
  - sin culpa
  - intachable
  lexicon: BDAG
  rationale: «Irreprochable» expresa bien la idea de estar libre de acusación o reproche dentro del marco indicado por la ley, sin sugerir impecabilidad absoluta. En español conserva un registro digno y sobrio.
theological_decisions:
- issue: Alcance de la irreprochabilidad de Pablo
  english_pob_reading: Paul claims blamelessness with respect to righteousness measured by the law, not absolute moral perfection before God.
  chosen_spanish_reading: Pablo afirma haber sido irreprochable en relación con la justicia medida por la ley, no moralmente perfecto en sentido absoluto delante de Dios.
  alternative_spanish_readings:
  - Pablo afirma una perfección moral absoluta.
  - Pablo habla solo de manera irónica.
  rationale: La estructura gramatical vincula ἄμεμπτος con δικαιοσύνη τὴν ἐν νόμῳ. Por eso la traducción debe restringir el alcance de la afirmación al marco legal, evitando una lectura de sin pecado o una ironía no marcada por el texto.
  doctrine_reference: Filipenses 3:6; cf. Romanos 3:20
- issue: Sentido de δικαιοσύνη en un contexto paulino
  english_pob_reading: Or “justice” for “righteousness.”
  chosen_spanish_reading: Se mantiene «justicia» en el texto principal como alternativa viva a «rectitud», sin convertirla en una glosa doctrinal cerrada.
  alternative_spanish_readings:
  - rectitud
  - justicia/rectitud
  rationale: El POB inglés preserva la tensión lexical entre «righteousness» y «justice». En español, «justicia» es válido y auditable, pero también podría sugerir un campo más amplio; por eso se reconoce en la decisión lexical como opción contextual y no se borra la alternativa de «rectitud».
  doctrine_reference: BDAG δικαιοσύνη
translation_notes:
  revision_awareness: El texto sigue de cerca el estado revisado más reciente del audit trail en inglés, que no requirió cambios sustantivos. Se conserva la estructura paralela de κατὰ ... κατὰ ..., la relación de ἄμεμπτος con la justicia definida por la ley, y la alternativa lexical para δικαιοσύνη documentada en el POB.
  spanish_consistency_notes:
  - Se mantuvo «la iglesia» para ἐκκλησία, coherente con el uso paulino del término.
  - Se evitó «SEÑOR» o terminología de sustitución no presente en el pasaje.
  - «Bajo la ley» reproduce la lectura inglesa auditada y comunica mejor el marco normativo que una traducción literalmente calcaica.
  - «Irreprochable» conserva el matiz evaluativo sin afirmar impecabilidad absoluta.
