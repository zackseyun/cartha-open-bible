translation:
  language: es
  text: Su fin es destrucción, su dios es el vientre[a], y su gloria está en su vergüenza; ellos tienen la mente puesta en las cosas terrenales[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su dios es su apetito».
    reason: lexical_alternative
  - marker: b
    text: O «ponen la mente en las cosas terrenales».
    reason: lexical_alternative
lexical_decisions:
- source_word: τέλος
  english_pob_choice: end
  chosen_spanish: fin
  alternatives_spanish:
  - resultado
  - desenlace
  lexicon: BDAG
  rationale: '«Fin» conserva la fuerza breve y compacta del griego y permite la misma amplitud semántica que «end» en inglés: término y resultado final.'
- source_word: ἀπώλεια
  english_pob_choice: destruction
  chosen_spanish: destrucción
  alternatives_spanish:
  - ruina
  - perdición
  lexicon: BDAG
  rationale: «Destrucción» es la equivalencia directa y natural en español, y mantiene la gravedad escatológica sin recurrir a un término más arcaico.
- source_word: κοιλία
  english_pob_choice: belly
  chosen_spanish: vientre
  alternatives_spanish:
  - estómago
  - apetito
  lexicon: BDAG
  rationale: «Vientre» preserva la imagen corporal concreta del griego. «Apetito» interpreta la metáfora, y «estómago» suaviza un poco el efecto imagístico.
- source_word: δόξα
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - orgullo
  - vanagloria
  lexicon: BDAG
  rationale: '«Gloria» es el equivalente léxico directo y conserva la ironía del pasaje: atribuyen gloria precisamente a lo que debería producir vergüenza.'
- source_word: αἰσχύνη
  english_pob_choice: shame
  chosen_spanish: vergüenza
  alternatives_spanish:
  - deshonra
  - oprobio
  lexicon: BDAG
  rationale: «Vergüenza» comunica bien la idea de deshonra moral y mantiene el contraste con «gloria» en español.
- source_word: τὰ ἐπίγεια
  english_pob_choice: earthly things
  chosen_spanish: las cosas terrenales
  alternatives_spanish:
  - las cosas de la tierra
  - lo terrenal
  lexicon: BDAG
  rationale: «Las cosas terrenales» refleja con claridad el plural neutro y su alcance general, y suena natural en español bíblico contemporáneo.
- source_word: φρονοῦντες
  english_pob_choice: are set on / their minds are set on
  chosen_spanish: tienen la mente puesta en
  alternatives_spanish:
  - están pensando en
  - se ocupan de
  lexicon: BDAG
  rationale: La forma participial indica una orientación mental estable; «tienen la mente puesta en» reproduce bien esa fijación continua sin perder legibilidad.
- source_word: ὧν ... ὧν
  english_pob_choice: their ... their
  chosen_spanish: su ... su
  alternatives_spanish:
  - de ellos ... de ellos
  - cuyo ... cuyo
  lexicon: Greek grammar
  rationale: El repetido genitivo relativo se vierte de manera natural con posesivos en español, manteniendo la caracterización reiterada sin rigidez sintáctica.
theological_decisions:
- issue: Metáfora de 'el vientre'
  english_pob_reading: The POB retained the concrete metaphor 'the belly' in the main text, with a note allowing 'their appetite' as an alternative.
  chosen_spanish_reading: Se conserva «el vientre» en el texto principal, con nota para la alternativa interpretativa «su apetito».
  alternative_spanish_readings:
  - su apetito
  - su estómago
  rationale: El griego presenta una imagen corporal concreta; mantenerla evita diluir la fuerza retórica de Pablo. La alternativa «apetito» explica la metáfora sin reemplazarla en el cuerpo principal.
  doctrine_reference: Filipenses 3:19
- issue: Orientación mental final
  english_pob_reading: Their minds are set on earthly things.
  chosen_spanish_reading: «Tienen la mente puesta en las cosas terrenales» reproduce la orientación estable de φρονοῦντες.
  alternative_spanish_readings:
  - piensan en cosas terrenales
  - se fijan en las cosas terrenales
  rationale: La cláusula final describe una disposición persistente, no solo un pensamiento momentáneo. La expresión elegida comunica esa orientación de manera natural y fiel.
  doctrine_reference: Filipenses 3:19
translation_notes:
  revision_awareness: 'El texto sigue la revisión auditada del inglés POB que refinó la última cláusula de una traducción más general a una formulación más precisa de οἱ τὰ ἐπίγεια φρονοῦντες. En español se adoptó una equivalencia formalmente fiel con naturalidad idiomática: «tienen la mente puesta en».'
  spanish_consistency_notes:
  - 'Se mantuvo la secuencia paralela de tres miembros: destino final, objeto de devoción, y contraste vergonzoso.'
  - Se evitó «SEÑOR» o sustituciones reverenciales porque el versículo no contiene el nombre divino.
  - «Vientre» conserva la imagen concreta que el audit trail inglés decidió mantener.
  - «Las cosas terrenales» traduce de forma neutra el plural griego τὰ ἐπίγεια sin convertirlo en una abstracción.
  - La puntuación con punto y coma y raya ayuda a reflejar la sintaxis encadenada del original sin sobrecargarla.
