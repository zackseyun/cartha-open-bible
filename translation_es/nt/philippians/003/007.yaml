translation:
  language: es
  text: Pero todo lo que para mí era ganancia, lo he considerado[a] pérdida por causa del Mesías[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «contado».
    reason: lexical_alternative
  - marker: b
    text: O «Cristo».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀλλὰ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Mas
  - Sin embargo
  lexicon: BDAG
  rationale: Marca el contraste fuerte con lo anterior; «Pero» es natural en español y conserva la transición argumentativa.
- source_word: ἅτινα
  english_pob_choice: whatever things
  chosen_spanish: cualquier cosa que
  alternatives_spanish:
  - todo lo que
  - las cosas que
  lexicon: BDAG
  rationale: El relativo indefinido abarca el conjunto de ventajas previas sin restringirlo a un sustantivo concreto.
- source_word: κέρδη
  english_pob_choice: gains
  chosen_spanish: ganancia
  alternatives_spanish:
  - ganancias
  - provecho
  - ventajas
  lexicon: BDAG
  rationale: En singular colectivo, «ganancia» mantiene la metáfora contable y su contraparte con «pérdida».
- source_word: ἥγημαι
  english_pob_choice: I have considered
  chosen_spanish: he considerado
  alternatives_spanish:
  - he estimado
  - he contado
  - considero
  lexicon: BDAG
  rationale: El perfecto expresa una valoración ya formada con efecto presente; «he considerado» comunica bien ese estado resultante.
- source_word: διὰ τὸν Χριστόν
  english_pob_choice: because of the Messiah
  chosen_spanish: por causa de Mesías
  alternatives_spanish:
  - debido a Mesías
  - a causa de Mesías
  - por causa de Cristo
  lexicon: BDAG
  rationale: διά con acusativo expresa causa o motivo. Se conserva «Mesías» según la preferencia terminológica del proyecto para Χριστός como título.
- source_word: ζημίαν
  english_pob_choice: loss
  chosen_spanish: pérdida
  alternatives_spanish:
  - detrimento
  - daño
  - perjuicio
  lexicon: BDAG
  rationale: «Pérdida» es el equivalente más natural y mantiene el contraste económico con «ganancia».
theological_decisions:
- issue: Renderización de Χριστός como título
  english_pob_reading: the Messiah / Christ (lexical alternative acknowledged in English audit trail)
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: En este contexto Χριστός funciona como título, no como nombre propio fijo. Se preserva la decisión doctrinal del proyecto de traducirlo como «Mesías» cuando el uso es titular.
  doctrine_reference: 'Contested terms table: Χριστός → Mesías (cuando es título; Cristo cuando es uso ya nombre-forma)'
- issue: Valor aspectual del perfecto ἥγημαι
  english_pob_reading: I have considered / I have counted
  chosen_spanish_reading: he considerado
  alternative_spanish_readings:
  - he contado
  - considero
  rationale: Se conserva el sentido de evaluación concluida con resultado vigente, sin perder la fuerza de la reevaluación paulina.
  doctrine_reference: 'Aspecto verbal griego: perfecto con estado resultante'
translation_notes:
  revision_awareness: La revisión inglesa osciló entre «the Messiah» y «Christ» por la política terminológica de Χριστός. En español se eligió «Mesías» para seguir la directriz del proyecto; la alternativa «Cristo» queda documentada en nota. También se evitó calcar «whatever things» con una fórmula demasiado pesada, optando por una construcción española natural que preserve la amplitud del referente.
  spanish_consistency_notes:
  - Se mantiene el contraste contable del verso con ganancia/pérdida.
  - «Mesías» se usa aquí como título traducido, no como nombre propio litúrgico.
  - El orden de la cláusula final conserva la causalidad de διά con acusativo sin añadir explicaciones ajenas al texto.
