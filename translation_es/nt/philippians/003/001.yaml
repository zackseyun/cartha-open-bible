    reason: lexical_alternative
  - marker: d
    text: 'O: «es una salvaguarda para ustedes».'
    reason: lexical_alternative
  revision_rationale: Se añade la nota inclusiva exigida por el expediente inglés para ἀδελφοί, se mejora la naturalidad de la cláusula con ὀκνηρόν, y se depura la nota de Τὸ λοιπόν eliminando una alternativa española poco idiomática. No se requieren cambios doctrinales ni una relectura profunda del pasaje.
