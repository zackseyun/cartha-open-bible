- from: Por lo demás, hermanos míos, alégrense en el Señor. Escribirles las mismas cosas, para mí no es molesto[a][c][d], y para ustedes es seguro.
  to: Por lo demás[a], hermanos míos[b], alégrense en el Señor. Escribirles las mismas cosas no me resulta molesto[c], y para ustedes es seguro[d].
