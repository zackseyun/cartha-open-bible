translation:
  language: es
  text: Por lo demás[a], hermanos míos[b], alégrense en el Señor. Escribirles las mismas cosas no me resulta molesto[c], y para ustedes es seguro[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Finalmente» o «En cuanto a lo demás».'
    reason: lexical_alternative
  - marker: b
    text: «Hermanos» aquí se dirige a toda la congregación; es decir, «hermanos y hermanas».
    reason: cultural_note
  - marker: c
    text: 'O: «no me es tedioso» o «no me es una carga».'
    reason: lexical_alternative
  - marker: d
    text: 'O: «es una salvaguarda para ustedes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Τὸ λοιπόν
  english_pob_choice: Finally
  chosen_spanish: Por lo demás
  alternatives_spanish:
  - Finalmente
  - En cuanto a lo demás
  - Por el resto
  lexicon: BDAG
  rationale: La expresión λειτουργa como conector discursivo. En español, «Por lo demás» comunica mejor el cambio de sección sin sugerir necesariamente cierre definitivo, algo importante en una carta que continúa.
- source_word: ἀδελφοί μου
  english_pob_choice: my brothers
  chosen_spanish: hermanos míos
  alternatives_spanish:
  - hermanos y hermanas míos
  - mis hermanos
  - hermanos
  lexicon: BDAG
  rationale: Conserva el plural masculino del griego y el tono fraternal directo. La lectura inclusiva queda implícita por el destinatario congregacional, sin sustituir la forma gramatical del original en el texto principal.
- source_word: χαίρετε
  english_pob_choice: rejoice
  chosen_spanish: alégrense
  alternatives_spanish:
  - regocíjense
  - gozarse
  lexicon: BDAG
  rationale: Es un imperativo plural. «Alégrense» suena natural en español y preserva la exhortación a la alegría; «regocíjense» es posible pero más marcado en registro.
- source_word: ἐν κυρίῳ
  english_pob_choice: in the Lord
  chosen_spanish: en el Señor
  alternatives_spanish:
  - en el Señor Jesús
  - en Señor
  lexicon: BDAG
  rationale: Se mantiene la fórmula preposicional directa. Aunque el proyecto usa «Yahvé» para el nombre divino, aquí κύριος forma la expresión cristiana estable «en el Señor», que el contexto paulino hace referencia a Cristo.
- source_word: τὰ αὐτὰ
  english_pob_choice: the same things
  chosen_spanish: las mismas cosas
  alternatives_spanish:
  - estas mismas cosas
  - lo mismo
  lexicon: BDAG
  rationale: La frase es intencionalmente amplia en el griego y puede abarcar exhortaciones o enseñanzas anteriores. «Las mismas cosas» mantiene esa amplitud sin precisar de más.
- source_word: γράφειν
  english_pob_choice: to write
  chosen_spanish: escribir
  alternatives_spanish:
  - el escribir
  - escribírselas
  lexicon: BDAG
  rationale: El infinitivo funciona naturalmente como verbo sustantivado en español dentro de la construcción impersonal.
- source_word: οὐκ ὀκνηρόν
  english_pob_choice: is not troublesome for me
  chosen_spanish: no es molesto
  alternatives_spanish:
  - no me resulta pesado
  - no me es tedioso
  - no es una carga para mí
  lexicon: BDAG
  rationale: «ὀκνηρός» expresa la idea de algo gravoso, molesto o que causa desgana. «No es molesto» conserva la idea sin añadir un matiz demasiado psicológico como «tedioso».
- source_word: ἀσφαλές
  english_pob_choice: safe for you
  chosen_spanish: es seguro
  alternatives_spanish:
  - es una salvaguarda
  - les resulta seguro
  - es de seguridad para ustedes
  lexicon: BDAG
  rationale: El adjetivo comunica seguridad/protección. En español, «es seguro» es claro y suficientemente amplio; la nota conserva la alternativa más interpretativa de tipo protector.
theological_decisions:
- issue: Alcance de κύριος en la exhortación
  english_pob_reading: in the Lord
  chosen_spanish_reading: en el Señor
  alternative_spanish_readings:
  - en el Yahvé
  - en el Señor Jesús
  rationale: Aunque el proyecto distingue Yahvé para el nombre divino, aquí el uso paulino de κύριος en esta fórmula es cristológico y litúrgico. Mantener «el Señor» evita forzar una identificación que el contexto inmediato no explicita en la superficie de la frase.
  doctrine_reference: 'DOCTRINE.md § Translation philosophy #2'
- issue: Relación entre el escribir repetidamente y la seguridad de los destinatarios
  english_pob_reading: safe for you
  chosen_spanish_reading: es seguro
  alternative_spanish_readings:
  - es una salvaguarda para ustedes
  - les resulta seguro
  rationale: La lectura principal conserva el valor adjetival simple del griego. La dimensión protectora no se pierde, pero tampoco se intensifica indebidamente en el cuerpo del texto.
  doctrine_reference: 'DOCTRINE.md § Translation philosophy #3'
- issue: Direccionamiento a la comunidad
  english_pob_reading: my brothers
  chosen_spanish_reading: hermanos míos
  alternative_spanish_readings:
  - hermanos y hermanas míos
  - hermanos
  rationale: El griego usa masculino plural, y la comunidad es tratada corporativamente. El español principal preserva esa forma, mientras la nota permite la lectura inclusiva sin reescritura del texto base.
  doctrine_reference: 'DOCTRINE.md § Translation philosophy #4'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; por eso esta propuesta sigue de cerca el consenso alto del texto fuente y del audit trail inglés, ajustando únicamente la formulación española para fluidez y fidelidad idiomática.
  spanish_consistency_notes:
  - Se mantuvo «Señor» para κύριος en esta fórmula paulina, en coherencia con el uso cristológico de la expresión y sin ocultar el nombre divino donde el contexto lo requiera explícitamente.
  - Se prefirió «hermanos míos» por fidelidad al masculino plural del griego; la inclusión congregacional queda disponible en la nota, no en el texto principal.
  - «Las mismas cosas» conserva la ambigüedad deliberada de τὰ αὐτά.
  - La combinación de notas cubre las alternativas relevantes del audit trail sin duplicar marcadores.
