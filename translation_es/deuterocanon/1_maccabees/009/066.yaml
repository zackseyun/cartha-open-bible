translation:
  language: es
  text: Y golpeó a Odomera y a sus hermanos y a los hijos de Fasirón en su campamento[a], y comenzó a golpear y a avanzar con sus fuerzas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Griego literalmente, «ens su tienda/morada»; en este contexto militar, el sentido es «ens su campamento» o «encampamiento».
    reason: lexical_alternative
  - marker: b
    text: 'Griego literalmente: «comenzó a golpear y a subir»; aquí «avanzar» expresa mejor el sentido militar de ἀναβαίνειν.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπάτεξεν
  english_pob_choice: struck
  chosen_spanish: golpeó
  alternatives_spanish:
  - hirió
  - pegó
  - atacó
  lexicon: LSJ
  rationale: El aoristo de πατάσσω expresa un golpe/asalto concreto. En español, «golpeó» conserva la acción física y militar sin sonar arcaico como «hirió» o demasiado interpretativo como «atacó».
- source_word: Ὀδομηρὰ
  english_pob_choice: Odomera
  chosen_spanish: Odomera
  alternatives_spanish:
  - Odomerah
  lexicon: transliteración propia del nombre
  rationale: Se mantiene el nombre propio en transliteración, siguiendo la forma griega y la práctica del proyecto.
- source_word: τοὺς ἀδελφοὺς αὐτοῦ
  english_pob_choice: his brothers
  chosen_spanish: a sus hermanos
  alternatives_spanish:
  - a sus parientes
  - a sus consanguíneos
  lexicon: BDAG
  rationale: ἀδελφοί significa normalmente «hermanos». En este contexto narrativo y genealógico, la equivalencia literal es la más fiel y clara.
- source_word: τοὺς υἱοὺς Φασιρὼν
  english_pob_choice: the sons of Phasiron
  chosen_spanish: a los hijos de Fasirón
  alternatives_spanish:
  - a los descendientes de Fasirón
  lexicon: BDAG
  rationale: υἱοί puede ser «hijos» o «descendientes». Dado el carácter narrativo y nominal de la frase, «hijos de» reproduce bien la relación genealógica.
- source_word: ἐν τῷ σκηνώματι αὐτῶν
  english_pob_choice: in their camp
  chosen_spanish: en su campamento
  alternatives_spanish:
  - en su tienda
  - en su encampamento
  lexicon: LSJ
  rationale: σκηνῶμα remite literalmente a tienda o habitación, pero en contexto militar plural el sentido natural es «campamento». En español, «su campamento» es idiomático y preciso.
- source_word: ἐξηρξατο
  english_pob_choice: he began
  chosen_spanish: comenzó
  alternatives_spanish:
  - empezó
  - se puso a
  lexicon: BDAG
  rationale: El verbo marca inicio de una acción. «Comenzó» preserva ese valor aspectual de modo claro y digno.
- source_word: τύπτειν
  english_pob_choice: to strike
  chosen_spanish: a golpear
  alternatives_spanish:
  - a herir
  - a pegar
  lexicon: BDAG
  rationale: La repetición verbal del griego se conserva con «golpear», que mantiene la concreción de τύπτω sin suavizar el paralelo con el verbo anterior.
- source_word: ἀναβαίνειν
  english_pob_choice: to advance
  chosen_spanish: a avanzar
  alternatives_spanish:
  - a subir
  - a subir y avanzar
  lexicon: LSJ
  rationale: Aunque literalmente es «subir», en lenguaje militar puede indicar progresar o avanzar. «Avanzar» expresa mejor la fuerza bélica en español.
- source_word: ἐν ταῖς δυνάμεσιν
  english_pob_choice: with his forces
  chosen_spanish: con sus fuerzas
  alternatives_spanish:
  - con las fuerzas
  - con sus tropas
  lexicon: BDAG
  rationale: δυνάμεις en plural denota fuerzas militares. En español, el posesivo implícito se hace explícito como en la lectura inglesa para que la frase sea natural y siga el sentido narrativo.
translation_notes:
  revision_awareness: No se registran revisiones aplicadas; el pasaje muestra alto acuerdo entre la traducción inglesa auditada y el texto griego, por lo que la redacción española sigue de cerca la sintaxis y las decisiones léxicas documentadas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando corresponda; este versículo no contiene el nombre divino.
  - Se usa «campamento» para σκηνῶμα por el contexto bélico, evitando una traducción literal que sonarían extraña en español.
  - Se conserva la repetición verbal del griego («golpeó... a golpear») para no nivelar el paralelismo narrativo.
  - 'Los nombres propios se transliteran de forma consistente: Odomera, Fasirón.'
