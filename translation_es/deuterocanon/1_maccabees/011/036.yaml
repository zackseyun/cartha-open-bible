  text: Y ninguna de estas cosas será anulada desde ahora y para todo tiempo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀθετήσεται
  english_pob_choice: shall be set aside
  chosen_spanish: será dejada de lado
  alternatives_spanish:
  - será anulada
  - será invalidada
  - será rechazada
  lexicon: LSJ
  rationale: El pasivo futuro de ἀθετέω expresa aquí que lo acordado no quedará sin efecto ni será descartado. «Será dejada de lado» conserva la pasividad y la idea de apartar o invalidar sin introducir un tecnicismo jurídico más fuerte de lo que pide el contexto.
- source_word: οὐδὲν τούτων
  english_pob_choice: none of these things
  chosen_spanish: ninguna de estas cosas
  alternatives_spanish:
  - nada de estas cosas
  - ninguna de ellas
  - ninguno de estos elementos
  lexicon: LSJ
  rationale: La frase remite a las concesiones o disposiciones previas y mantiene fuerza plural y demostrativa. En español, «ninguna de estas cosas» es natural y transparente, y refleja el alcance total de la negación.
- source_word: ἀπὸ τοῦ νῦν
  english_pob_choice: from now on
  chosen_spanish: desde ahora
  alternatives_spanish:
  - desde este momento
  - de aquí en adelante
  - en adelante
  lexicon: LSJ
  rationale: «Desde ahora» reproduce la referencia temporal inmediata con español claro y contemporáneo. Mantiene el matiz de inicio presente sin sonar arcaico.
- source_word: ἐπὶ τὸν ἅπαντα χρόνον
  english_pob_choice: for all time
  chosen_spanish: por todo tiempo
  alternatives_spanish:
  - para siempre
  - por todo el tiempo
  - para todo tiempo
  lexicon: LSJ
  rationale: La expresión griega intensifica la permanencia del decreto. «Por todo tiempo» conserva el alcance temporal amplio sin convertirlo en una formulación más idiomática pero potencialmente más absoluta que el griego.
