translation:
  language: es
  text: Y se volvió contra ellos en batalla[a], y los desbarató, y huyeron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice literalmente «se volvió hacia ellos guerra» (ἐπέστρεψεν πρὸς αὐτοὺς πόλεμον), una expresión comprimida. Aquí se traduce «se volvió contra ellos en batalla» para expresar con claridad el sentido de reanudar la lucha contra ellos.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπέστρεψεν
  english_pob_choice: turned back
  chosen_spanish: se volvió
  alternatives_spanish:
  - regresó
  - giró
  - dio vuelta
  lexicon: LSJ
  rationale: ἐπιστρέφω significa 'volver, girar hacia'. 'Se volvió' conserva la fuerza direccional del preverbio ἐπί- y el movimiento de reorientación hacia el enemigo, tal como el inglés POB eligió 'turned back'. 'Regresó' daría un matiz de retorno físico al punto de origen que el griego no exige aquí; 'giró' es demasiado mecánico para una narración militar.
- source_word: πρὸς αὐτοὺς πόλεμον
  english_pob_choice: against them in battle
  chosen_spanish: contra ellos en batalla
  alternatives_spanish:
  - hacia ellos en guerra
  - para hacerles la guerra
  - contra ellos en guerra
  lexicon: LSJ
  rationale: 'El griego tiene una construcción comprimida: πόλεμον (acusativo de πόλεμος, ''guerra/batalla'') funciona como objeto interno o acusativo de contenido de ἐπέστρεψεν. πρὸς αὐτούς indica dirección hostil. La revisión inglesa POB pasó de ''to make war against them'' a ''against them in battle'', prefiriendo una formulación más directa; el español sigue este mismo criterio con ''contra ellos en batalla''. Se usa ''batalla'' en lugar de ''guerra'' porque el contexto es un choque puntual, no un conflicto prolongado; πόλεμος puede cubrir ambos sentidos, pero aquí la narración apunta a un enfrentamiento concreto.'
- source_word: ἐτροπώσατο
  english_pob_choice: routed
  chosen_spanish: los derrotó
  alternatives_spanish:
  - los puso en fuga
  - los hizo retroceder
  - los desbarató
  lexicon: LSJ
  rationale: τροπόω (de τροπή, 'vuelta, giro') denota específicamente hacer que el enemigo vuelva en huida, es decir, ponerlo en desbandada. 'Los puso en fuga' sería la opción más etimológicamente fiel y reproducible del inglés 'routed', pero en la cadena «los puso en fuga, y huyeron» se genera una leve redundancia. 'Los derrotó' es el término militar español más natural y de dignidad narrativa adecuada; la cláusula siguiente ('y huyeron') aporta el dato de la huida efectiva que τροπόω implica. 'Los desbarató' sería también preciso pero resulta más arcaico para lectores modernos.
- source_word: ἔφυγον
  english_pob_choice: they fled
  chosen_spanish: huyeron
  alternatives_spanish:
  - escaparon
  - se dieron a la fuga
  - se fugaron
  lexicon: LSJ
  rationale: Aoristo de φεύγω; 'huyeron' es el equivalente directo, conciso y de registro apropiado para la narración bélica. 'Se dieron a la fuga' sería más descriptivo pero innecesariamente prolijo en este contexto asindético de tres cláusulas breves.
translation_notes:
  revision_awareness: 'El inglés POB experimentó una revisión (2026-04-23, gpt-5.4): de «turned back to make war against them» se pasó a «turned back against them in battle», con el fin de lograr una formulación más directa y natural del giro ἐπέστρεψεν πρὸς αὐτοὺς πόλεμον sin sacrificar el sentido completo. El borrador español recoge esta forma revisada final («se volvió contra ellos en batalla») y no la lectura previa a la revisión.'
  spanish_consistency_notes:
  - No aparecen nombres divinos (יהוה, θεός, κύριος) ni títulos mesiánicos en este versículo; las convenciones de proyecto para Yahvé, Mesías, etc. no son aplicables aquí.
  - Se usa 'batalla' para πόλεμον en este contexto de choque puntual; en pasajes donde πόλεμος designe un conflicto prolongado debería evaluarse 'guerra'.
  - La triple estructura καὶ … καὶ … καὶ … se preserva con «Y … y … y …» para mantener la cadencia asindética del griego, coherente con el estilo narrativo macabeo.
  - No hay nombres propios ni topónimos en este versículo que requieran decisiones de transliteración.
