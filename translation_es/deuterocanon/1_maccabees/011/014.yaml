translation:
  language: es
  text: Pero el rey Alejandro se hallaba en Cilicia en aquellos días[a], porque los de aquellas regiones se rebelaban.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «los de aquellos lugares se rebelaban».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀλέξανδρος
  english_pob_choice: Alexander
  chosen_spanish: Alejandro
  alternatives_spanish:
  - Alexander
  lexicon: LSJ
  rationale: Se vierte el nombre propio al español convencional como 'Alejandro', forma idiomática y reconocible en español bíblico.
- source_word: ὁ βασιλεὺς
  english_pob_choice: King
  chosen_spanish: el rey
  alternatives_spanish:
  - rey
  lexicon: LSJ
  rationale: El artículo y el título se expresan de forma natural en español como 'el rey', conservando el valor titulativo del griego.
- source_word: ἦν ἐν Κιλικίᾳ
  english_pob_choice: was in Cilicia
  chosen_spanish: estaba en Cilicia
  alternatives_spanish:
  - se hallaba en Cilicia
  - estuvo en Cilicia
  lexicon: LSJ
  rationale: '''Estaba'' expresa bien el estado/ubicación durativa del imperfecto ἦν, con una locución natural en español.'
- source_word: κατὰ τοὺς καιροὺς ἐκείνους
  english_pob_choice: in those days
  chosen_spanish: en aquellos días
  alternatives_spanish:
  - en ese tiempo
  - en aquellos tiempos
  lexicon: LSJ
  rationale: La expresión temporal plural se reproduce de manera natural con 'en aquellos días', que mantiene el matiz idiomático y el plural del original.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: LSJ
  rationale: Se conserva la relación causal explícita que introduce la cláusula siguiente.
- source_word: ἀπεστάτουν
  english_pob_choice: were rebelling
  chosen_spanish: se rebelaban
  alternatives_spanish:
  - estaban rebelándose
  - se sublevaban
  lexicon: LSJ
  rationale: El imperfecto indica una acción en curso; 'se rebelaban' preserva ese valor durativo sin forzar una lectura más técnica de 'apostasía' que no aparece explícita en el contexto inmediato.
- source_word: οἱ ἀπὸ τῶν τόπων ἐκείνων
  english_pob_choice: those from those regions
  chosen_spanish: los de aquellas regiones
  alternatives_spanish:
  - los de aquellos lugares
  - los habitantes de aquellas regiones
  lexicon: LSJ
  rationale: Se evita añadir 'gente' o 'personas' porque el griego usa una construcción elíptica ('los de...'); 'los de aquellas regiones' refleja la sobriedad del original y su referencia geográfica.
translation_notes:
  revision_awareness: La redacción sigue el griego directamente y coincide con el sentido confirmado por el control inglés POB y su revisión más reciente, que prefirió una formulación más cercana al griego para οἱ ἀπὸ τῶν τόπων ἐκείνων sin añadir 'people'.
  spanish_consistency_notes:
  - Se mantiene 'Alejandro' como nombre propio españolizado, no como transliteración inglesa.
  - Se conserva el plural temporal de κατὰ τοὺς καιροὺς ἐκείνους con 'aquellos días'.
  - La cláusula causal queda explícita con 'porque', en línea con el valor de ὅτι en el contexto.
  - No se introduce terminología interpretativa adicional; 'los de aquellas regiones' sigue la elipsis del griego.
