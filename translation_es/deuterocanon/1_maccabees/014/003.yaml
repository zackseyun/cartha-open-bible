translation:
  language: es
  text: Y fue y atacó el campamento de Demetrio, y lo capturó, y lo llevó ante Arsaces[a], y lo puso en prisión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego πρὸς Ἀρσάκην usa πρὸς con acusativo, que indica movimiento hacia una persona. En el contexto de conducir a un prisionero ante un monarca, ''ante'' recoge la implicación de presentación directa ante él. Alternativa más neutral: ''a Arsaces''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπορεύθη
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - marchó
  - partió
  - se dirigió
  lexicon: LSJ
  rationale: Aoristo pasivo de πορεύομαι como verbo de movimiento narrativo simple. 'Fue' es el equivalente más natural en español y, unido a 'y atacó', forma la construcción idiomática 'fue y atacó', que preserva la parataxis del griego sin añadir connotación militar específica que el texto no requiere. El POB inglés eligió 'went' por la misma razón.
- source_word: ἐπάταξεν
  english_pob_choice: struck
  chosen_spanish: atacó
  alternatives_spanish:
  - golpeó
  - hirió
  - derrotó
  - asaltó
  lexicon: LSJ
  rationale: 'πάτασσω significa ''golpear'' o ''herir''. El POB inglés eligió ''struck'' para preservar la directness sin importar el resultado completo (''defeated''). En español, ''golpeó el campamento'' suena forzado; ''atacó'' es la opción más natural para una acción militar sobre un campamento y mantiene la misma apertura de resultado que el griego: el verbo no exige que el campamento haya sido destruido, solo que fue agredido.'
- source_word: παρεμβολὴν
  english_pob_choice: camp
  chosen_spanish: campamento
  alternatives_spanish:
  - campo militar
  - campamento militar
  lexicon: LSJ
  rationale: παρεμβολή en contexto militar designa el campamento o acantonamiento de tropas. 'Campamento' es preciso, conciso e idiomático en español; 'campo militar' es más circunloquente. Corresponde al 'camp' del POB inglés.
- source_word: συνέλαβεν
  english_pob_choice: captured
  chosen_spanish: capturó
  alternatives_spanish:
  - apresó
  - tomó preso
  - arrestó
  lexicon: LSJ
  rationale: συλλαμβάνω significa aferrar, capturar. 'Capturó' es el cognado más directo y natural en contexto militar, evitando las connotaciones legales modernas de 'arrestó'. 'Apresó' es igualmente válido en español pero ligeramente menos neutro que el griego.
- source_word: ἤγαγεν
  english_pob_choice: brought
  chosen_spanish: llevó
  alternatives_spanish:
  - condujo
  - trajo
  lexicon: LSJ
  rationale: ἄγω indica conducir a alguien hacia un destino. 'Llevó' fluye con naturalidad junto a la frase destino 'ante Arsaces' y corresponde al 'brought' del POB inglés. 'Condujo' sería igualmente válido pero algo más formal.
- source_word: Ἀρσάκην
  english_pob_choice: Arsaces
  chosen_spanish: Arsaces
  alternatives_spanish:
  - Arsaces
  lexicon: LSJ
  rationale: Nombre propio transliterado según convención estándar. La forma 'Arsaces' para Ἀρσάκης es la convencional en español e inglés, usada en las principales traducciones y obras de referencia sobre el período seléucida y parto.
- source_word: ἔθετο
  english_pob_choice: put
  chosen_spanish: puso
  alternatives_spanish:
  - colocó
  - metió
  - encerró
  lexicon: LSJ
  rationale: τίθημι significa literalmente 'poner' o 'colocar'. 'Puso' conserva la fuerza concreta del griego; el sentido de encarcelamiento ya está expresado por la frase siguiente 'en prisión'. El POB inglés eligió 'put' por la misma razón, evitando un verbo interpretativo como 'encerró'.
- source_word: ἐν φυλακῇ
  english_pob_choice: in prison
  chosen_spanish: en prisión
  alternatives_spanish:
  - bajo custodia
  - bajo guardia
  - en cautiverio
  lexicon: LSJ
  rationale: φυλακή puede significar guardia, vigilancia o prisión; combinado con el verbo 'poner', el contexto apunta claramente al encarcelamiento. 'En prisión' es la traducción más directa y apropiada; 'en cautiverio' añadiría una connotación de esclavitud o deportación que el griego no impone.
translation_notes:
  revision_awareness: 'El texto inglés del POB fue revisado por el modelo gpt-5.4 el 23 de abril de 2026 sin cambios y con acuerdo total del revisor independiente (gemini-3.1-pro-preview, puntuación 1.0). El borrador español sigue el mismo enfoque de equivalencia óptima: preserva la parataxis narrativa del griego con καὶ repetido, renderizado como ''y... y... y...'', y no introduce variaciones semánticas respecto al original griego ni al rastro auditado en inglés.'
  spanish_consistency_notes:
  - Este versículo no contiene términos teológicos clave del proyecto (YHWH, Mesías, espíritu, justicia, etc.); los valores por defecto del proyecto no aplican aquí.
  - '''Demetrio'' y ''Arsaces'' son transliteraciones estándar de nombres propios griegos al español, coherentes con el uso convencional en obras de referencia académica y bíblica en español.'
  - La construcción paratáctica 'Y fue y atacó... y lo capturó... y lo llevó... y lo puso...' refleja fielmente el estilo narrativo del griego con καὶ repetido, apropiado para prosa bíblica narrativa en español moderno.
