translation:
  language: es
  text: y Antioco, el gran rey de Asia, que vino contra ellos en guerra, con ciento veinte elefantes, caballeria y carros de guerra, y una fuerza muy grande, fue aplastado por ellos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἀντίοχον
  english_pob_choice: Antiochus
  chosen_spanish: Antíoco
  alternatives_spanish:
  - Antioquía
  lexicon: LSJ
  rationale: Nombre propio transliterado al español por convención histórica y eclesial; no se traduce.
- source_word: τὸν μέγαν βασιλέα τῆς Ἀσίας
  english_pob_choice: the great king of Asia
  chosen_spanish: el gran rey de Asia
  alternatives_spanish:
  - el poderoso rey de Asia
  - el gran rey sobre Asia
  lexicon: LSJ
  rationale: Conserva la estructura appositiva del griego y vierte μέγαν con 'gran', que es la opción más directa y natural en español para un título real.
- source_word: τὸν πορευθέντα ἐπʼ αὐτοὺς εἰς πόλεμον
  english_pob_choice: who came against them in war
  chosen_spanish: que vino contra ellos en guerra
  alternatives_spanish:
  - que marchó contra ellos para la guerra
  - que avanzó contra ellos en batalla
  lexicon: LSJ
  rationale: '''Vino contra'' mantiene el sentido hostil de πορεύομαι en contexto militar sin forzar una perífrasis más técnica que el español no exige.'
- source_word: ἔχοντα
  english_pob_choice: having
  chosen_spanish: con
  alternatives_spanish:
  - teniendo
  - llevando
  lexicon: LSJ
  rationale: En la lista militar, 'con' reproduce de modo idiomático la relación de acompañamiento entre Antíoco y su armamento/fuerza.
- source_word: ἑκατὸν εἴκοσι ἐλέφαντας
  english_pob_choice: one hundred twenty elephants
  chosen_spanish: ciento veinte elefantes
  alternatives_spanish:
  - cien y veinte elefantes
  lexicon: LSJ
  rationale: Número cardinal directo y natural en español; no altera el contenido cuantitativo.
- source_word: ἵππον
  english_pob_choice: cavalry
  chosen_spanish: caballería
  alternatives_spanish:
  - jinetes
  - caballos
  lexicon: LSJ
  rationale: Aunque el singular griego es literalmente 'caballo', en inventario militar designa la fuerza montada; 'caballería' conserva el valor colectivo que la POB inglesa documenta.
- source_word: ἅρματα
  english_pob_choice: chariots
  chosen_spanish: carros
  alternatives_spanish:
  - carros de guerra
  - carros guerreros
  lexicon: LSJ
  rationale: '''Carros'' es una forma natural y suficientemente precisa en español; el contexto bélico impide leerlo como vehículo común.'
- source_word: δύναμιν πολλὴν σφόδρα
  english_pob_choice: a very great force
  chosen_spanish: una fuerza muy grande en extremo
  alternatives_spanish:
  - un ejército muy grande
  - una fuerza sumamente grande
  lexicon: LSJ
  rationale: '''Fuerza'' preserva la amplitud militar de δύναμις; ''muy grande en extremo'' intensifica πολλὴν σφόδρα sin perder la fuerza expresiva del griego.'
- source_word: συνετρίβη
  english_pob_choice: was crushed
  chosen_spanish: fue aplastado
  alternatives_spanish:
  - fue quebrantado
  - fue derrotado
  lexicon: LSJ
  rationale: '''Aplastado'' mantiene la imagen fuerte del pasivo de συντρίβω, más intensa que un simple ''derrotado''.'
- source_word: ἀπʼ αὐτῶν
  english_pob_choice: by them
  chosen_spanish: por ellos
  alternatives_spanish:
  - a manos de ellos
  - por parte de ellos
  lexicon: LSJ
  rationale: Marca agencia de forma directa y natural en español.
translation_notes:
  revision_awareness: Base revisada a partir del texto griego de Swete (1909) y del aparato auditado en inglés; no se requieren cambios respecto del sentido o la puntuación esencial del versículo.
  spanish_consistency_notes:
  - Se mantiene 'Asia' como nombre geográfico propio, sin artículo.
  - '''Antíoco'' sigue la transliteración habitual y evita latinizar innecesariamente el nombre.'
  - Se conserva el orden acumulativo de la lista militar para reflejar la enumeración del griego.
