translation:
  language: es
  text: Y el rey Demetrio oyo, y reunio muchisimas fuerzas, y salio a su encuentro para combatir.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Δημήτριος ὁ βασιλεὺς
  english_pob_choice: King Demetrius
  chosen_spanish: Demetrio el rey
  alternatives_spanish:
  - el rey Demetrio
  - Rey Demetrio
  lexicon: N/A
  rationale: Se conserva el orden nominal del griego con el nombre propio seguido del título. 'El rey' mantiene la designación real sin introducir un artículo posesivo o una reformulación más libre.
- source_word: ἤκουσεν
  english_pob_choice: heard
  chosen_spanish: oyó
  alternatives_spanish:
  - escuchó
  - se enteró
  lexicon: LSJ
  rationale: '''Oír'' reproduce de manera directa el valor básico del aoristo de ἀκούω y funciona bien para la noticia que desencadena la reacción de Demetrio. ''Se enteró'' explicita demasiado el matiz de noticia recibida.'
- source_word: συνήγαγεν
  english_pob_choice: gathered
  chosen_spanish: reunió
  alternatives_spanish:
  - juntó
  - movilizó
  lexicon: LSJ
  rationale: '''Reunió'' conserva la idea de traer juntas las fuerzas sin especificar de más el procedimiento militar. ''Movilizó'' sería más técnico e interpretativo.'
- source_word: δυνάμεις πολλὰς σφόδρα
  english_pob_choice: very many forces
  chosen_spanish: muchísimas fuerzas
  alternatives_spanish:
  - muchas fuerzas
  - grandísimas fuerzas
  lexicon: LSJ
  rationale: La combinación intensificadora se vierte naturalmente como 'muchísimas'. 'Fuerzas' mantiene el plural militar amplio de δυνάμεις, sin reducirlo a 'ejército'.
- source_word: ἐξῆλθεν
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - salió fuera
  - marchó
  lexicon: LSJ
  rationale: '''Salió'' es la forma natural en español y conserva el movimiento de salida del verbo griego. ''Marchó'' agrega un matiz militar no explícito en el verbo.'
- source_word: εἰς συνάντησιν αὐτῷ
  english_pob_choice: to meet him
  chosen_spanish: al encuentro de él
  alternatives_spanish:
  - para encontrarse con él
  - a su encuentro
  lexicon: LSJ
  rationale: '''Al encuentro de él'' refleja de cerca la estructura direccional del griego y deja que el contexto determine la hostilidad. Se evita ''contra él'' porque esa lectura todavía no la da la frase por sí sola.'
- source_word: εἰς πόλεμον
  english_pob_choice: in battle
  chosen_spanish: para combatir
  alternatives_spanish:
  - para la guerra
  - a la guerra
  lexicon: LSJ
  rationale: '''Πόλεμον'' se refiere a guerra o combate; aquí, con el contexto inmediato, ''para combatir'' comunica la finalidad bélica de manera natural en español. Se prefiere una formulación verbal para unirla con ''salió al encuentro''.'
translation_notes:
  revision_awareness: 'El texto griego y el audit trail inglés coinciden estrechamente y no requieren revisión sustantiva. Se mantuvo la relación sintáctica básica: noticia recibida, reunión de fuerzas y salida al encuentro para combate.'
  spanish_consistency_notes:
  - Se usó 'Y' inicial para reflejar el encadenamiento narrativo del griego.
  - '''Fuerzas'' se conserva como término militar amplio, en línea con la decisión inglesa.'
  - No se introdujo 'Cristo', 'SEÑOR' ni otra terminología no presente en el versículo.
  - El cierre 'para combatir' evita sobrerinterpretar εἰς πόλεμον como una guerra formal específica.
