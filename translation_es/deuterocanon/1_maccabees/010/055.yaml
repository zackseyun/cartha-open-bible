translation:
  language: es
  text: 'Y el rey Ptolomeo respondió, diciendo: «Es un buen día, en que volviste a la tierra de tus padres y te sentaste en el trono de su reino.»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπεκρίθη
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió diciendo
  lexicon: LSJ
  rationale: El verbo introduce la réplica de Ptolomeo. «Respondió» conserva la función narrativa de respuesta directa sin forzar un calco rígido.
- source_word: Ἀγαθὴ ἡμέρα
  english_pob_choice: It is a good day
  chosen_spanish: Buen día
  alternatives_spanish:
  - Es un buen día
  - Un buen día es este
  lexicon: LSJ
  rationale: La frase griega es una exclamación nominal. «Buen día» mantiene la valoración positiva y suena natural en español, sin añadir más de lo que el texto expresa.
- source_word: ἀνέστρεψας
  english_pob_choice: you returned
  chosen_spanish: volviste
  alternatives_spanish:
  - regresaste
  - volviste de nuevo
  lexicon: LSJ
  rationale: En este contexto el verbo indica regreso a la tierra ancestral. «Volviste» es idiomático y preserva la dirección del movimiento.
- source_word: γῆν πατέρων σου
  english_pob_choice: the land of your fathers
  chosen_spanish: la tierra de tus padres
  alternatives_spanish:
  - la tierra de tus antepasados
  - tu tierra ancestral
  lexicon: LSJ
  rationale: Se mantiene la referencia familiar y dinástica del griego con una formulación natural en español.
- source_word: ἐκάθισας
  english_pob_choice: sat
  chosen_spanish: te sentaste
  alternatives_spanish:
  - tomaste asiento
  - fuiste sentado
  lexicon: LSJ
  rationale: El aoristo se vierte con una acción concreta y simple. «Te sentaste» conserva la imagen de entronización sin interpretarla excesivamente.
- source_word: ἐπὶ θρόνου βασιλείας αὐτῶν
  english_pob_choice: on the throne of their kingdom
  chosen_spanish: sobre el trono de su reino
  alternatives_spanish:
  - en el trono de su reino
  - sobre el trono real de ellos
  lexicon: LSJ
  rationale: Se conserva la construcción con trono + reino para reflejar el genitivo griego y la idea dinástica ligada a los padres.
