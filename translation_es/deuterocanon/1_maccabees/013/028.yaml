translation:
  language: es
  text: Y erigió siete pirámides[a], una frente a la otra, para su padre y su madre y sus cuatro hermanos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «una opuesta a la otra». La frase griega describe los monumentos dispuestos en posición enfrentada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔστησεν
  english_pob_choice: set up
  chosen_spanish: levantó
  alternatives_spanish:
  - erigió
  - colocó
  lexicon: BDAG
  rationale: En contexto de monumentos funerarios, el verbo griego expresa la acción concreta de alzar o instalar estructuras. «Levantó» comunica bien la acción física sin sonar demasiado técnico o arcaico en español.
- source_word: ἑπτὰ πυραμίδας
  english_pob_choice: seven pyramids
  chosen_spanish: siete pirámides
  alternatives_spanish:
  - siete monumentos en forma de pirámide
  - siete memoriales piramidales
  lexicon: LSJ
  rationale: El sustantivo πυραμίς se refleja de manera directa con «pirámides». El texto no precisa más sobre la forma arquitectónica, así que conviene no sobreinterpretar en la traducción principal.
- source_word: μίαν κατέναντι τῆς μιᾶς
  english_pob_choice: one opposite the other
  chosen_spanish: una frente a la otra
  alternatives_spanish:
  - una opuesta a la otra
  - una enfrentada a la otra
  lexicon: LSJ
  rationale: La construcción griega indica disposición recíproca. «Una frente a la otra» es natural en español y preserva la relación espacial sin perder la literalidad de fondo.
- source_word: τῷ πατρὶ καὶ τῇ μητρὶ
  english_pob_choice: for his father and mother
  chosen_spanish: para su padre y su madre
  alternatives_spanish:
  - para el padre y la madre
  - en honor de su padre y su madre
  lexicon: BDAG
  rationale: El dativo puede expresar dedicación o finalidad conmemorativa. «Para» mantiene esa flexibilidad; el posesivo «su» se sobreentiende del contexto narrativo y evita una construcción menos natural en español.
- source_word: τέσσαρσιν ἀδελφοῖς
  english_pob_choice: four brothers
  chosen_spanish: sus cuatro hermanos
  alternatives_spanish:
  - cuatro hermanos
  - sus cuatro hermanos varones
  lexicon: BDAG
  rationale: ἀδελφοῖς se refiere aquí a hermanos varones. En español, el posesivo ayuda a unir esta cláusula con el referente implícito del contexto, sin alterar el sentido de parentesco.
translation_notes:
  revision_awareness: El texto inglés auditado revisó «one opposite another» a «one opposite the other» por naturalidad. La versión española adopta «una frente a la otra», que conserva esa misma relación recíproca con expresión idiomática natural en español.
  spanish_consistency_notes:
  - Se mantiene «pirámides» en el texto principal porque el griego usa πυραμίδας y el audit trail inglés decidió conservar el término directo.
  - Se evita expandir innecesariamente la finalidad de los monumentos; «para» reproduce el valor dativo sin añadir interpretación doctrinal o histórica.
  - No hay terminología divina o cristológica en este versículo, así que no aplica normalización especial.
