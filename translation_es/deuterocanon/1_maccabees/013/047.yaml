translation:
  language: es
  text: Y Simón llegó a un acuerdo con ellos y no combatió contra ellos[a]. Los expulsó de la ciudad y purificó las casas en las cuales estaban los ídolos[b]; y así entró en ella con himnos y bendiciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «llegó a un arreglo con ellos». El participio griego puede sugerir una acomodación práctica más que un combate directo.
    reason: lexical_alternative
  - marker: b
    text: Es decir, casas donde estaban imágenes idolátricas; la purificación probablemente fue tanto religiosa como material.
    reason: cultural_note
lexical_decisions:
- source_word: συνευδὼν
  english_pob_choice: came to terms with
  chosen_spanish: llegó a un acuerdo con
  alternatives_spanish:
  - se puso de acuerdo con
  - concertó términos con
  - hizo un arreglo con
  lexicon: LSJ
  rationale: El participio sugiere un entendimiento práctico o una acomodación antes de la expulsión. «Llegó a un acuerdo con» conserva esa idea sin reducirla a mera simpatía ni hacerla más técnica de lo que exige el contexto.
- source_word: ἐπολέμησεν
  english_pob_choice: fight against
  chosen_spanish: peleó contra
  alternatives_spanish:
  - hizo guerra contra
  - combatió contra
  lexicon: LSJ
  rationale: El verbo expresa conflicto militar. «Peleó contra» es natural en español y mantiene la fuerza del enfrentamiento.
- source_word: ἐξέβαλεν
  english_pob_choice: drove ... out
  chosen_spanish: los expulsó
  alternatives_spanish:
  - los echó
  - los arrojó fuera
  lexicon: LSJ
  rationale: El verbo es enérgico y describe sacar a alguien fuera de un lugar. «Los expulsó» comunica bien el acto sin introducir connotaciones ajenas.
- source_word: ἐκαθάρισεν
  english_pob_choice: cleansed
  chosen_spanish: purificó
  alternatives_spanish:
  - limpió
  - limpió ritualmente
  - purgó
  lexicon: LSJ
  rationale: Como el texto menciona ídolos, la acción no es mera limpieza material sino una eliminación de impureza cultual. «Purificó» preserva esa dimensión religiosa en español.
- source_word: τὰ εἴδωλα
  english_pob_choice: the idols
  chosen_spanish: los ídolos
  alternatives_spanish:
  - las imágenes
  - las estatuas de ídolos
  lexicon: LSJ
  rationale: El contexto es de objetos paganos asociados con contaminación religiosa. «Los ídolos» es la equivalencia más directa y clara.
- source_word: ὑμνῶν
  english_pob_choice: with hymns
  chosen_spanish: con himnos
  alternatives_spanish:
  - entonando himnos
  - cantando himnos
  lexicon: LSJ
  rationale: El participio indica la manera de entrar. «Con himnos» conserva la brevedad y el tono litúrgico del griego.
- source_word: εὐλογῶν
  english_pob_choice: blessings
  chosen_spanish: bendiciones
  alternatives_spanish:
  - bendiciendo
  - con bendición
  lexicon: LSJ
  rationale: La forma participial queda bien en un sustantivo plural coordinado con «himnos», y refleja la acción de bendecir en tono celebrativo.
theological_decisions:
- issue: Naturaleza de la purificación de las casas con ídolos
  english_pob_reading: Rendered ἐκαθάρισεν as 'cleansed' rather than a merely physical 'cleaned.'
  chosen_spanish_reading: Traducir ἐκαθάρισεν como «purificó» en vez de «limpió» o un verbo puramente material.
  alternative_spanish_readings:
  - limpió
  - limpió ritualmente
  rationale: El texto sugiere una remoción de contaminación asociada con la idolatría, no solo aseo doméstico. «Purificó» conserva esa carga cultual sin añadir formulación litúrgica ajena al pasaje.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
translation_notes:
  revision_awareness: 'Se siguió el sentido del griego de Swete 1909 y el audit trail inglés: el participio συνευδὼν se entendió como acuerdo o acomodo, ἐπολέμησεν como conflicto militar negado, ἐξέβαλεν como expulsión enérgica, y ἐκαθάρισεν como purificación cultual. También se respetó la revisión inglesa que subraya la simultaneidad/estado de las imágenes en las casas y el paralelismo final con himnos y bendiciones.'
  spanish_consistency_notes:
  - Se usa «Simón» como nombre propio estándar.
  - Se evita «SEÑOR» o sustituciones no presentes en el texto; el versículo no contiene el nombre divino.
  - «Himnos y bendiciones» mantiene el paralelismo del griego entre participios coordinados.
  - Se prefirió un registro bíblico moderno, claro y digno, sin arcaísmos innecesarios.
