    text: Or 'made an agreement with them.' The Greek participle can suggest reaching an accommodation rather than engaging them in battle.
    reason: lexical_alternative
  - marker: b
    text: That is, houses where idol-images had been kept; the cleansing is likely religious as well as physical.
    reason: cultural_note
