  yaml_path: translation/deuterocanon/1_maccabees/013/047.yaml
  text: And Simon came to terms with them and did not fight against them[a]. He drove them out of the city and cleansed the houses in which the idols were[b], and so he entered it with hymns and blessings.
  footnotes:
