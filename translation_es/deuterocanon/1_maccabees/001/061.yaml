translation:
  language: es
  text: Y colgaron a los infantes de sus cuellos, y a los de su casa[a], y a quienes los habían circuncidado[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus familiares» o «sus allegados» para τοὺς οἰκείους αὐτῶν, término que designa a los miembros del hogar o parientes cercanos.
    reason: lexical_alternative
  - marker: b
    text: El griego emplea un único verbo («colgaron») con los tres objetos directos en estilo comprimido; algunos lectores pueden entender que los dos últimos grupos fueron igualmente ejecutados de esa forma.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐκρέμασαν
  english_pob_choice: hung
  chosen_spanish: colgaron
  alternatives_spanish:
  - ahorcaron
  - suspendieron
  - los colgaron
  lexicon: LSJ
  rationale: Aoristo activo de κρεμάννυμι, «colgar/suspender». «Colgaron» es el equivalente más natural en narrativa española; «ahorcaron» implica ejecución judicial específica, sentido que el griego no marca explícitamente (igual razonamiento que el POB inglés para descartar «hanged»); «suspendieron» resulta demasiado neutro para el horror del contexto.
- source_word: τὰ βρέφη
  english_pob_choice: the infants
  chosen_spanish: los infantes
  alternatives_spanish:
  - los bebés
  - los niños pequeños
  - los recién nacidos
  lexicon: LSJ
  rationale: βρέφη designa criaturas muy pequeñas, lactantes. «Infantes» preserva la especificidad de edad y el tono grave que requiere el texto; «bebés» es coloquial y reduce el peso narrativo; «recién nacidos» sobrespecifica la edad.
- source_word: ἐκ τῶν τραχήλων αὐτῶν
  english_pob_choice: from their necks
  chosen_spanish: de sus cuellos
  alternatives_spanish:
  - por el cuello
  - del cuello
  - colgados al cuello
  lexicon: LSJ
  rationale: 'La preposición ἐκ con τραχήλων indica el punto de suspensión. «De sus cuellos» sigue de cerca la construcción griega, como el POB inglés prefirió «from» sobre «by». El pronombre «sus» es igualmente ambiguo en español que αὐτῶν en griego: puede referir al cuello de los infantes o —según la interpretación histórica más extendida— al cuello de sus madres, a quienes los bebés fueron colgados como castigo.'
- source_word: τοὺς οἰκείους αὐτῶν
  english_pob_choice: their household members
  chosen_spanish: sus familiares
  alternatives_spanish:
  - los de su casa
  - sus allegados
  - los suyos
  - su familia
  lexicon: LSJ
  rationale: οἰκεῖοι designa a quienes pertenecen al oikos (hogar), pudiendo incluir parientes de sangre y miembros del hogar no consanguíneos. «Familiares» es el término más claro en español neutro y cubre ese espectro; «los de su casa» preserva mejor el sentido doméstico original pero resulta perifrástico; «allegados» acentúa la proximidad personal. La nota [a] recoge las alternativas.
- source_word: τοὺς περιτετμηκότας αὐτούς
  english_pob_choice: those who had circumcised them
  chosen_spanish: a quienes los habían circuncidado
  alternatives_spanish:
  - a los que los circuncidaron
  - a sus circuncidadores
  lexicon: LSJ
  rationale: Participio perfecto activo de περιτέμνω; identifica a los ejecutores del rito. El pluscuamperfecto español «habían circuncidado» refleja la acción anterior al hecho principal, capturando la fuerza temporal del perfecto griego de manera paralela a la decisión del POB inglés («had circumcised»). «Circuncidadores» es conciso pero suena técnico y no refleja el aspecto de anterioridad.
theological_decisions:
- issue: Un único verbo finito (ἐκρέμασαν) gobierna los tres objetos acusativos en serie
  english_pob_reading: 'The verse is rendered as an elliptical list of additional victims after the main verb: they hung the infants, and also their household members, and those who had circumcised them.'
  chosen_spanish_reading: 'El verbo «colgaron» gobierna los tres objetos directos sin importar un segundo verbo: los infantes, sus familiares y quienes los habían circuncidado.'
  alternative_spanish_readings:
  - 'Podría leerse que los dos últimos grupos fueron ejecutados de modo distinto, añadiendo un segundo verbo ausente en el griego: «…y a sus familiares los mataron, y a quienes los habían circuncidado».'
  - Una expansión interpretiva podría separar las tres cláusulas como ejecuciones independientes para mayor claridad narrativa.
  rationale: El griego tiene un único verbo finito seguido de tres acusativos en asíndeton coordinado con καί. La traducción más transparente —y la que sigue el POB inglés— deja que ese único verbo gobierne los tres objetos, preservando la brutal compresión del texto sin importar acciones no atestiguadas. El español «Y colgaron … y a sus familiares, y a quienes…» reproduce esa elipsis con naturalidad.
  doctrine_reference: Filosofía de traducción §§1, 3, 5
translation_notes:
  revision_awareness: 'La revisión más reciente del registro inglés (2026-04-23, gemini-3.1-pro-preview) no introdujo cambios; el estado es «unchanged: true». La verificación cruzada arrojó «minor-issues» con una concordancia del 85 % en un único pase. El borrador español sigue las mismas decisiones léxicas y estructurales del texto inglés auditado. Se corrige la ubicación de los marcadores de nota respecto al texto inglés: en el POB inglés [a] aparece tras «necks» pero glosa «household members», y [b] aparece tras «household members» pero describe la estructura verbal; en la versión española los marcadores se anclan en los términos que cada nota efectivamente comenta.'
  spanish_consistency_notes:
  - No aparece el nombre divino (יהוה / Yahvé) ni κύριος en este versículo; la convención terminológica del proyecto no incide aquí.
  - El versículo no contiene vocabulario cristológico (Χριστός/Mesías) ni pneumatológico (πνεῦμα); los valores predeterminados del proyecto no afectan esta traducción.
  - δοῦλος no está presente; la distinción «esclavo»/«siervo» no aplica.
  - «Circuncidaron» / «habían circuncidado» es terminología técnica del rito judío; se mantiene sin suavizar, en coherencia con la filosofía de transparencia del POB.
  - El uso de la «a» personal española ante objetos directos de persona («a los infantes», «a sus familiares», «a quienes…») es obligatorio gramaticalmente y no altera el sentido del griego.
