translation:
  language: es
  text: Y los escarnió,[a] y se rió de ellos y los mancilló,[b] y habló con arrogancia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Gr. ἐμυκτήρισεν, de μυκτηρίζω (relacionado con μύκτηρ, «nariz»): literalmente mostrar desprecio arrugando la nariz. También posible: «se mofó de ellos».'
    reason: lexical_alternative
  - marker: b
    text: 'Gr. ἐμίανεν, de μιαίνω: manchar, contaminar, profanar. El término tiene fuerza moral y cúltica. Alternativas: «los profanó», «los contaminó».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμυκτήρισεν
  english_pob_choice: sneered at
  chosen_spanish: escarnió
  alternatives_spanish:
  - se mofó de ellos
  - los despreció
  - los menospreció
  lexicon: LSJ
  rationale: μυκτηρίζω deriva de μύκτηρ ('nariz'), evocando el gesto físico de arrugar la nariz en señal de desdén. 'Escarnió' (escarnecer) conserva la fuerza del desprecio formal y burlesco sin requerir una perífrasis gestual. 'Se mofó de ellos' sería igualmente válido pero más coloquial; 'despreció' aplana el matiz burlesco del original.
- source_word: κατεγέλασεν
  english_pob_choice: laughed at
  chosen_spanish: se rió de ellos
  alternatives_spanish:
  - los ridiculizó
  - los escarnió
  lexicon: LSJ
  rationale: καταγελάω significa reírse de alguien o burlarse con risa. 'Se rió de ellos' preserva la imagen verbal concreta y mantiene la distinción respecto al verbo anterior (ἐμυκτήρισεν). 'Los ridiculizó' es más abstracto y colapsa la imagen. La acumulación de verbos distintos es retóricamente intencional.
- source_word: ἐμίανεν
  english_pob_choice: defiled
  chosen_spanish: mancilló
  alternatives_spanish:
  - los profanó
  - los contaminó
  - los deshonró
  lexicon: LSJ
  rationale: μιαίνω denota manchar, contaminar o profanar con fuerza moral y cúltica. 'Mancilló' preserva esa resonancia de ultraje ritual/moral sin especificar el modo concreto, en paralelo con la decisión inglesa de usar 'defiled'. 'Profanó' añade un matiz cúltico más preciso que el griego no exige aquí; 'contaminó' tiene connotaciones más físicas.
- source_word: ἐλάλησεν ὑπερηφάνως
  english_pob_choice: spoke arrogantly
  chosen_spanish: habló con arrogancia
  alternatives_spanish:
  - habló con soberbia
  - habló insolentemente
  - habló con altivez
  lexicon: LSJ
  rationale: ὑπερηφάνως es el adverbio de ὑπερήφανος ('arrogante, altivo, insolente'). 'Habló con arrogancia' es la construcción más natural en español moderno; 'con soberbia' también es posible y tiene una connotación moral igualmente fuerte. Se prefiere 'arrogancia' por ser más preciso y menos ambiguo que 'soberbia' (que en algunos registros connota vanidad estética).
- source_word: καὶ … καὶ … καὶ … καὶ
  english_pob_choice: and … and … and … and
  chosen_spanish: y … y … y … y
  alternatives_spanish:
  - omitir conjunciones repetidas para mayor fluidez
  lexicon: LSJ
  rationale: La repetición de καί crea un efecto acumulativo que subraya la sucesión de actos de desprecio. Se conserva la repetición de 'y' en español, siguiendo la misma decisión retórica del inglés POB, para reflejar el ritmo y la cadencia del griego.
translation_notes:
  revision_awareness: La última revisión inglesa (modelo gpt-5.4, 2026-04-23) no introdujo cambios; el texto inglés fue declarado estable. El acuerdo de revisión cruzada fue de 0,95 con calificación «minor-issues». El borrador español sigue la misma filosofía de equivalencia óptima, conservando la acumulación retórica de las conjunciones repetidas y la fuerza diferenciada de cada verbo de desprecio. No se detectaron tensiones léxicas o teológicas adicionales que el inglés no hubiera ya documentado.
  spanish_consistency_notes:
  - Este versículo no contiene el nombre divino ni términos mesiánicos; las convenciones de proyecto para Yahvé, Mesías o Espíritu no se activan.
  - La repetición de 'y' (καὶ × 4) se conserva deliberadamente para reflejar el efecto acumulativo del griego, en línea con la decisión inglesa.
  - Se usa 'mancilló' en lugar de 'profanó' para no sobre-interpretar el referente cúltico; la fuerza moral-ritual queda señalada en la nota al pie.
  - '''Escarnió'' se prefiere sobre ''se mofó'' por su registro más formal y digno, coherente con el estilo de prosa histórica del libro.'
  - No aparecen términos σάρξ, δοῦλος, χάρις, δικαιοσύνη ni πνεῦμα en este versículo; no se requieren decisiones de terminología de proyecto para ellos.
