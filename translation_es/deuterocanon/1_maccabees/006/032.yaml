translation:
  language: es
  text: Y Judas se apartó de la ciudadela[a] y acampó en Bet-Zacarías, frente al campamento del rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el Acra», la ciudadela fortificada en Jerusalen.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπῆρεν
  english_pob_choice: moved away
  chosen_spanish: se apartó
  alternatives_spanish:
  - se alejó
  - partió
  - se retiró
  lexicon: LSJ
  rationale: El verbo griego indica separación o alejamiento de un lugar. «Se apartó» transmite el desplazamiento sin añadir la idea de repliegue militar que «se retiró» podría sugerir.
- source_word: ἄκρας
  english_pob_choice: the citadel
  chosen_spanish: la ciudadela
  alternatives_spanish:
  - el Acra
  - la fortaleza
  lexicon: LSJ
  rationale: En 1 Macabeos, ἄκρα puede referirse a la fortaleza de Jerusalén conocida como el Acra. «Ciudadela» conserva el sentido común de fortificación y resulta natural en español; el nombre técnico se mantiene como alternativa.
- source_word: παρενέβαλεν
  english_pob_choice: encamped
  chosen_spanish: acampó
  alternatives_spanish:
  - plantó el campamento
  - hizo campamento
  - acamparon
  lexicon: LSJ
  rationale: El verbo militar significa establecer el campamento. «Acampó» es la forma más directa y clara en español, manteniendo el matiz militar del contexto.
- source_word: εἰς Βεθζαχαριά
  english_pob_choice: at Beth-zachariah
  chosen_spanish: en Bet-Zacarías
  alternatives_spanish:
  - a Bet-Zacarías
  - hacia Bet-Zacarías
  lexicon: LSJ
  rationale: Aunque εἰς sugiere movimiento hacia el lugar, en español con «acampó» la localización se expresa naturalmente con «en». Se conserva el nombre propio transliterado según la norma del proyecto.
- source_word: ἀπέναντι
  english_pob_choice: opposite
  chosen_spanish: frente a
  alternatives_spanish:
  - enfrente de
  - opuesto a
  - a la vista de
  lexicon: LSJ
  rationale: La preposición expresa posición frente a otro lugar. «Frente a» es claro y idiomático en español, sin perder la relación espacial.
- source_word: παρεμβολῆς
  english_pob_choice: camp
  chosen_spanish: campamento
  alternatives_spanish:
  - campaña
  - ejército acampado
  lexicon: LSJ
  rationale: El sustantivo designa un campamento militar. «Campamento» reproduce bien la imagen y evita ambigüedad con otras posibles acepciones.
- source_word: τοῦ βασιλέως
  english_pob_choice: the king’s
  chosen_spanish: del rey
  alternatives_spanish:
  - del soberano
  - del monarca
  lexicon: LSJ
  rationale: El genitivo posesivo se expresa de manera natural en español como «del rey». Mantiene la referencia sencilla y directa del texto.
translation_notes:
  revision_awareness: El pasaje coincide plenamente con el griego de Swete (1909) y con el control de auditoría en inglés; no se reportan revisiones aplicadas ni cambios de última pasada.
