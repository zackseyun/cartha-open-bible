translation:
  language: es
  text: en el anyo ciento cincuenta; y fabrico contra ellos maquinas para lanzar proyectiles y maquinas de asedio.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἔτους πεντηκοστοῦ καὶ ἑκατοστοῦ
  english_pob_choice: in the one hundred and fiftieth year
  chosen_spanish: en el año ciento cincuenta
  alternatives_spanish:
  - en el año ciento cincuenta y uno
  - en el año ciento cincuenta del reinado
  lexicon: LSJ
  rationale: 'La fórmula genitiva griega de datación se expresa de manera natural en español como una referencia temporal absoluta: ''en el año ciento cincuenta''. Conserva el valor cronológico sin forzar un calco del orden griego.'
- source_word: ἐποίησεν
  english_pob_choice: he made
  chosen_spanish: fabricó
  alternatives_spanish:
  - hizo
  - construyó
  - preparó
  lexicon: LSJ
  rationale: En este contexto militar, ποιέω indica la producción o preparación de dispositivos de guerra. 'Fabricó' comunica mejor la idea de elaborar artefactos concretos que un 'hizo' demasiado general, sin añadir más de lo que el griego permite.
- source_word: ἐπʼ αὐτούς
  english_pob_choice: against them
  chosen_spanish: contra ellos
  alternatives_spanish:
  - para usarlos contra ellos
  - sobre ellos
  lexicon: LSJ
  rationale: La preposición con acusativo en contexto hostil señala dirección adversativa. 'Contra ellos' reproduce ese valor de oposición de forma clara y natural en español.
- source_word: βελοστασίεις
  english_pob_choice: missile-launchers
  chosen_spanish: lanzamisiles
  alternatives_spanish:
  - máquinas de lanzar proyectiles
  - lanzadores de proyectiles
  - máquinas lanzadardos
  lexicon: LSJ
  rationale: El término refiere a dispositivos para lanzar proyectiles. 'Lanzamisiles' es una solución breve y comprensible para el lector moderno, manteniendo el sentido funcional sin especificar indebidamente una pieza de artillería concreta.
- source_word: μηχανάς
  english_pob_choice: siege engines
  chosen_spanish: máquinas de asedio
  alternatives_spanish:
  - ingenios de asedio
  - máquinas de guerra
  - máquinas
  lexicon: LSJ
  rationale: En lenguaje militar, μηχαναί designa ingenios técnicos usados en asedios. 'Máquinas de asedio' conserva el referente contextual y evita la vaguedad de un simple 'máquinas'.
translation_notes:
  revision_awareness: 'El texto griego es breve y estable; el audit trail inglés también quedó sin revisiones aplicadas. La única tensión relevante es léxica: βελοστασίεις admite una gama de dispositivos de lanzamiento, por lo que se mantiene una nota alternativa en español para no estrechar indebidamente el sentido.'
  spanish_consistency_notes:
  - Se usa 'año' para la fórmula de datación, siguiendo el valor idiomático del genitivo griego.
  - 'Se conserva el paralelismo militar entre los dos objetos: ''lanzamisiles'' y ''máquinas de asedio''.'
  - No se introduce terminología eclesiástica ni interpretativa ajena al contexto histórico-militar.
