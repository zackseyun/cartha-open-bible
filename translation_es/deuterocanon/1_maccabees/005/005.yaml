translation:
  language: es
  text: Y fueron encerrados por él en las torres[a], y acampó contra ellos, y los dedicó a la destrucción, y quemó sus torres con fuego[b], junto con todos los que estaban en ellas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fueron puestos bajo el anatema». El verbo griego implica dedicar personas o cosas a la destrucción, no simplemente maldecirlas.
    reason: lexical_alternative
  - marker: b
    text: El griego tiene un pronombre singular femenino, es decir, «las torres de ella»; probablemente se refiere a la ciudad en el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: διεκλείσθησαν
  english_pob_choice: were shut up
  chosen_spanish: fueron encerrados
  alternatives_spanish:
  - fueron confinados
  - fueron atrapados
  - fueron cerrados dentro
  lexicon: LSJ
  rationale: El pasivo expresa que quedaron cerrados o confinados por la acción de Judas. «Fueron encerrados» conserva la idea de quedar sin salida sin añadir un detalle militar más específico de lo que el griego exige.
- source_word: πύργους
  english_pob_choice: towers
  chosen_spanish: torres
  alternatives_spanish:
  - fortalezas
  - torres fortificadas
  - baluartes
  lexicon: LSJ
  rationale: El sentido ordinario es «torres». En contexto militar pueden funcionar como estructuras defensivas, pero «torres» mantiene la correspondencia directa con el griego y sigue siendo claro en español.
- source_word: παρέβαλεν ἐπʼ αὐτούς
  english_pob_choice: he encamped against them
  chosen_spanish: acampó contra ellos
  alternatives_spanish:
  - levantó su campamento contra ellos
  - los sitió
  - acampó frente a ellos
  lexicon: LSJ
  rationale: El verbo alude literalmente a tender o colocar un campamento; en el contexto implica una postura hostil. «Acampó contra ellos» conserva la imagen concreta y deja que la idea de sitio surja del contexto.
- source_word: ἀνεθεμάτισεν
  english_pob_choice: devoted them to destruction
  chosen_spanish: los dedicó a la destrucción
  alternatives_spanish:
  - los puso bajo anatema
  - los puso bajo la maldición de destrucción
  - los destruyó por completo
  lexicon: LSJ
  rationale: El verbo no significa solo «maldecir», sino poner bajo una consagración para destrucción. «Los dedicó a la destrucción» conserva la fuerza sacral y bélica del término sin depender de una fórmula eclesiástica menos transparente.
- source_word: ἐνεπύρισεν
  english_pob_choice: burned
  chosen_spanish: quemó
  alternatives_spanish:
  - incendió
  - prendió fuego a
  - consumió con fuego
  lexicon: LSJ
  rationale: El verbo denota poner en llamas. «Quemó» es natural y fiel; la frase siguiente «con fuego» conserva el énfasis del griego.
- source_word: αὐτῆς
  english_pob_choice: its
  chosen_spanish: sus
  alternatives_spanish:
  - de ella
  - de la ciudad
  - sus propias
  lexicon: LSJ
  rationale: El pronombre singular femenino probablemente remite a la ciudad implícita en el contexto. En español, «sus torres» es la forma más natural y transparente para un lector, sin perder la referencia contextual.
- source_word: σὺν πᾶσιν τοῖς ἐνοῦσιν
  english_pob_choice: along with all who were in them
  chosen_spanish: junto con todos los que estaban en ellas
  alternatives_spanish:
  - con todos los que estaban dentro
  - junto con todos los habitantes que había en ellas
  - con todos los que se hallaban allí
  lexicon: LSJ
  rationale: La frase incluye a todas las personas dentro de las torres. «Estaban en ellas» mantiene el referente local inmediato y traduce el alcance total de πᾶσιν sin sobreespecificar quiénes eran.
theological_decisions:
- issue: ἀνεθεμάτισεν en contexto de guerra santa / anatema
  english_pob_reading: devoted them to destruction
  chosen_spanish_reading: los dedicó a la destrucción
  alternative_spanish_readings:
  - los puso bajo anatema
  - los destinó al exterminio
  - los destruyó por completo
  rationale: El griego evoca la idea de poner algo bajo una prohibición o consagración que conduce a su destrucción, no meramente a una maldición. La redacción elegida preserva esa carga teológica y lexical sin importar una jerga tradicional que podría oscurecer el sentido para lectores modernos.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el texto griego y la auditoría inglesa aprobada, manteniendo las mismas decisiones clave: encierro pasivo, asedio implícito, sentido técnico de ἀνεθεμάτισεν y el pronombre singular de «sus torres». No se introdujeron cambios de sentido respecto de la revisión más reciente, que no requirió modificaciones.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto solo cuando corresponda; este versículo no contiene el nombre divino.
  - «Torres» y «torres» conservan el mismo término para πύργους en todo el versículo.
  - «Dedicó a la destrucción» conserva el matiz de ban/anatema sin sustituirlo por una simple maldición.
  - 'El complemento final se formuló con un referente claro en español: «en ellas».'
