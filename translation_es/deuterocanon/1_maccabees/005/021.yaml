translation:
  language: es
  text: Y Simon fue a Galilea, y libro muchas batallas contra las naciones; y las naciones fueron aplastadas delante de el.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπορεύθη
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - anduvo
  - viajó
  lexicon: LSJ
  rationale: El aoristo de πορεύομαι expresa movimiento o desplazamiento; en español, «fue» es natural y fiel sin añadir matiz militar que el verbo por sí mismo no exige.
- source_word: εἰς τὴν Γαλιλαίαν
  english_pob_choice: into Galilee
  chosen_spanish: a Galilea
  alternatives_spanish:
  - a la Galilea
  - hacia Galilea
  lexicon: LSJ
  rationale: El griego indica dirección hacia la región. En español, «a Galilea» conserva esa orientación de modo fluido y sobrio.
- source_word: συνῆψεν πόλεμους πολλοὺς
  english_pob_choice: fought many battles
  chosen_spanish: trაბó muchas batallas
  alternatives_spanish:
  - peleó muchas batallas
  - entabló muchas guerras
  - hizo muchas guerras
  lexicon: LSJ
  rationale: La expresión griega es idiomática para librar combate o guerra. «Trabar batallas» mantiene el valor de entablar combate y refleja bien el tono narrativo bélico sin volverse abstracto.
- source_word: πρὸς τὰ ἔθνη
  english_pob_choice: against the nations
  chosen_spanish: contra las naciones
  alternatives_spanish:
  - contra los gentiles
  - frente a las naciones
  lexicon: LSJ
  rationale: «Naciones» reproduce el sentido básico de ἔθνη en este contexto militar. «Contra» conserva el valor hostil del griego y evita cargar de más el término con una lectura teológica.
- source_word: συνετρίβη
  english_pob_choice: were crushed
  chosen_spanish: fueron aplastadas
  alternatives_spanish:
  - fueron quebrantadas
  - fueron trituradas
  - fueron derrotadas
  lexicon: LSJ
  rationale: El pasivo de συντρίβω comunica ser roto o hecho pedazos. «Aplastadas» conserva la fuerza de la imagen mejor que «derrotadas», que sería más débil.
- source_word: ἀπὸ προσώπου αὐτοῦ
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - ante él
  - en su presencia
  lexicon: LSJ
  rationale: La expresión idiomática indica que las naciones no resistieron ante su avance. «Delante de él» comunica con naturalidad en español esa idea de colapso ante su presencia o empuje.
theological_decisions:
- issue: ἔθνη en contexto militar
  english_pob_reading: nations
  chosen_spanish_reading: las naciones
  alternative_spanish_readings:
  - los gentiles
  rationale: Aquí ἔθνη designa pueblos o grupos no israelitas enfrentados militarmente, pero el contexto no obliga a traducirlo por «gentiles», que en español puede sonar más técnico o confesional. «Las naciones» preserva la neutralidad del texto.
  doctrine_reference: Léxico histórico-narrativo de 1 Macabeos; uso contextual de ἔθνη
- issue: ἀπὸ προσώπου αὐτοῦ como derrota ante el avance de Simón
  english_pob_reading: before him
  chosen_spanish_reading: delante de él
  alternative_spanish_readings:
  - ante él
  - frente a él
  rationale: La frase no describe solo ubicación, sino rendición o derrumbe ante la acción de Simón. «Delante de él» mantiene la imagen espacial del griego y deja ver la fuerza del colapso militar.
  doctrine_reference: Uso idiomático griego de ἀπὸ προσώπου con sentido de presencia/avance
translation_notes:
  revision_awareness: La versión inglesa POB fue revisada y quedó sin cambios; esta propuesta sigue de cerca el sentido acordado, manteniendo la fuerza bélica del original griego y la neutralidad contextual de ἔθνη.
  spanish_consistency_notes:
  - Se mantiene «Simón» como nombre propio sin artículo.
  - Se usa «Galilea» sin ampliación explicativa, conforme al movimiento espacial del griego.
  - Se evita «SEÑOR» o vocabulario cultual ajeno, ya que no aparece en el versículo.
  - Se conserva un registro narrativo sobrio y bíblico, sin intensificar indebidamente el combate más allá del texto.
