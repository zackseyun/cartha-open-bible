translation:
  language: es
  text: 'Pero los habitantes de Jope[a] cometieron una gran impiedad: invitaron a los judíos que habitaban entre ellos a embarcarse, con sus mujeres y sus hijos, en las embarcaciones provistas por ellos, como si no hubiera ninguna hostilidad contra ellos;'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Jope es el nombre español tradicional de Joppa.
    reason: cultural_note
lexical_decisions:
- source_word: Ἰοππῖται
  english_pob_choice: the people of Joppa
  chosen_spanish: los de Joppe
  alternatives_spanish:
  - el pueblo de Joppe
  - los habitantes de Joppe
  lexicon: LSJ
  rationale: El griego designa a los habitantes/cuerpo cívico de la ciudad. «Los de Joppe» conserva el valor colectivo sin sonar rígido; evita una paráfrasis excesiva y mantiene la referencia local.
- source_word: τηλικοῦτο
  english_pob_choice: such a great
  chosen_spanish: una gran
  alternatives_spanish:
  - tan grande
  - tan enorme
  lexicon: LSJ
  rationale: La intensificación queda expresada de forma natural en español con «una gran». El contexto ya muestra que no se trata de una simple falta, sino de una impiedad notable.
- source_word: συνετελέσαντο
  english_pob_choice: committed
  chosen_spanish: cometieron
  alternatives_spanish:
  - llevaron a cabo
  - realizaron
  lexicon: LSJ
  rationale: Con un objeto como δυσσέβημα, el verbo tiene sentido de perpetrar una acción mala. «Cometieron» es el equivalente idiomático más fiel en español.
- source_word: δυσσέβημα
  english_pob_choice: act of impiety
  chosen_spanish: impiedad
  alternatives_spanish:
  - acto de impiedad
  - acto impío
  - impiedad grave
  lexicon: LSJ
  rationale: Se preserva la carga religioso-moral del término. En español, «impiedad» comunica esa falta de reverencia y piedad mejor que una palabra genérica como «maldad».
- source_word: παρακαλέσαντες
  english_pob_choice: they invited
  chosen_spanish: invitaron
  alternatives_spanish:
  - rogaron a
  - llamaron a
  lexicon: LSJ
  rationale: Aquí el gesto es una invitación engañosa, no solo una exhortación. «Invitaron» reproduce bien la cortesía aparente del engaño.
- source_word: τοὺς ἐν ἑαυτοῖς οἰκοῦντας Ἰουδαίους
  english_pob_choice: the Jews living among them
  chosen_spanish: los judíos que habitaban entre ellos
  alternatives_spanish:
  - los judíos que vivían entre ellos
  - los judíos que residían en medio de ellos
  lexicon: LSJ
  rationale: «Habitaban entre ellos» conserva la idea relacional del griego y suena más sobrio y bíblico que una paráfrasis más libre, sin perder claridad.
- source_word: ἐμβῆναι
  english_pob_choice: to embark
  chosen_spanish: a embarcarse
  alternatives_spanish:
  - a subir a bordo
  - a subir a las naves
  lexicon: LSJ
  rationale: El infinitivo apunta específicamente a subir a una nave. «Embarcarse» es preciso y natural en español marítimo.
- source_word: τὰ παρακατασταθέντα ὑπʼ αὐτῶν σκάφη
  english_pob_choice: the boats provided by them
  chosen_spanish: las embarcaciones provistas por ellos
  alternatives_spanish:
  - los barcos preparados por ellos
  - las naves suministradas por ellos
  lexicon: LSJ
  rationale: «Provistas por ellos» refleja que fueron puestas a disposición por los de Joppe. «Embarcaciones» conserva un registro algo más formal y amplio que «barcos».
- source_word: σὺν γυναιξὶ καὶ τέκνοις
  english_pob_choice: with their wives and children
  chosen_spanish: con sus mujeres y sus hijos
  alternatives_spanish:
  - con sus esposas y sus hijos
  - con sus mujeres e hijos
  lexicon: LSJ
  rationale: Se mantiene la inclusión de la familia en el grupo que iba a embarcar. «Mujeres» reproduce de modo más directo el griego que «esposas», aunque puede abarcar esa idea según el contexto.
- source_word: ὡς μηδεμίας ἐνεστώσης πρὸς αὐτοὺς δυσμενείας
  english_pob_choice: as though there were no hostility toward them at all
  chosen_spanish: como si no hubiera ninguna hostilidad contra ellos en absoluto
  alternatives_spanish:
  - como si no existiera ninguna enemistad contra ellos
  - como si no hubiera ningún malquerer hacia ellos
  lexicon: LSJ
  rationale: La construcción expresa una falsa apariencia de seguridad. «Hostilidad contra ellos» mantiene la fuerza de δυσμένεια y «en absoluto» preserva el énfasis de μηδεμίας.
theological_decisions:
- issue: Religious-moral force of δυσσέβημα
  english_pob_reading: act of impiety
  chosen_spanish_reading: impiedad
  alternative_spanish_readings:
  - acto de impiedad
  - acto impío
  - maldad
  rationale: El texto no describe solo una estratagema, sino una acción evaluada en términos de piedad frente a impiedad. «Impiedad» conserva esa carga religiosa sin introducir categorías doctrinales ajenas al pasaje.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el único marcador de nota, [a], aparezca en el texto principal exactamente donde corresponde. La redacción mantiene la lectura de alta concordancia del auditable inglés POB y del griego, sin añadir notas no ancladas.
  spanish_consistency_notes:
  - Se usó «los de Joppe» para el grupo cívico, con nota cultural anclada al topónimo tradicional.
  - Se evitó sustituir «impiedad» por un equivalente más débil, para conservar el juicio religioso del griego.
  - «Embarcarse» y «embarcaciones provistas por ellos» siguen de cerca el sentido marítimo del pasaje.
  - Se mantuvo el orden narrativo y la cláusula de apariencia falsa («como si...») sin amplificar el contenido.
