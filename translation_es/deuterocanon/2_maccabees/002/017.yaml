translation:
  language: es
  text: Acepta el sacrificio[a] por todo tu pueblo Israel[b], y preserva tu porción y conságrala.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Recibe la ofrenda por todo tu pueblo Israel».'
    reason: lexical_alternative
  - marker: b
    text: «Tu porción» probablemente se refiere a Israel como el pueblo que pertenece a Dios; alternativamente, «tu herencia».
    reason: alternative_reading
lexical_decisions:
- source_word: πρόσδεξαι
  english_pob_choice: Accept
  chosen_spanish: Acepta
  alternatives_spanish:
  - Recibe
  - Acoge
  lexicon: LSJ
  rationale: El imperativo de προσδέχομαι en lenguaje de oración pide que Dios reciba favorablemente la ofrenda. «Acepta» es natural en español y conserva ese matiz cultual sin volverlo demasiado literal o frío.
- source_word: θυσίαν
  english_pob_choice: the sacrifice
  chosen_spanish: el sacrificio
  alternatives_spanish:
  - la ofrenda
  lexicon: LSJ
  rationale: θυσία denota una ofrenda sacrificial. «Sacrificio» mantiene la especificidad cultual del griego y la elección auditada del POB en inglés.
- source_word: ὑπὲρ παντὸς τοῦ λαοῦ σου Ἰσραήλ
  english_pob_choice: for all your people Israel
  chosen_spanish: por todo tu pueblo Israel
  alternatives_spanish:
  - en favor de todo tu pueblo Israel
  - por todo tu pueblo, Israel
  lexicon: LSJ
  rationale: ὑπέρ con genitivo expresa beneficio o representación. «Por» funciona naturalmente en español para esa relación; «todo» conserva παντός y el conjunto colectivo de Israel.
- source_word: διαφύλαξον
  english_pob_choice: preserve
  chosen_spanish: preserva
  alternatives_spanish:
  - guarda
  - mantén a salvo
  lexicon: LSJ
  rationale: El verbo significa preservar, guardar o mantener seguro. «Preserva» encaja bien en una súplica dirigida a Dios y sigue de cerca la decisión inglesa.
- source_word: τὴν μερίδα σου
  english_pob_choice: your portion
  chosen_spanish: tu porción
  alternatives_spanish:
  - tu heredad
  - tu herencia
  - tu parte
  lexicon: LSJ
  rationale: μερίς/μερίδα significa literalmente porción o parte. «Porción» preserva la metáfora sin interpretarla de antemano como «heredad» o «herencia».
- source_word: καθαγίασον
  english_pob_choice: sanctify it
  chosen_spanish: santifícala
  alternatives_spanish:
  - hazla santa
  - conságrala
  lexicon: LSJ
  rationale: El verbo significa hacer santo o consagrar. En español, «santifícala» es breve, reverente y conserva el registro sacro; el pronombre femenino concuerda con «porción».
theological_decisions:
- issue: Referente de «tu porción»
  english_pob_reading: Retain the metaphor 'your portion' for Israel rather than interpret it explicitly as 'your inheritance' or 'your people.'
  chosen_spanish_reading: Conservar «tu porción» para Israel, sin explicitarlo como «tu herencia» o «tu pueblo».
  alternative_spanish_readings:
  - tu herencia
  - tu pueblo escogido
  - tu parte asignada
  rationale: El griego mantiene la metáfora. Como el texto ya nombra a Israel como tu pueblo, conservar «porción» evita sobreinterpretar y preserva la tensión teológica documentada.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; consistency of key terms, or documented exception.'
translation_notes:
  revision_awareness: El registro inglés fue revisado y quedó sin cambios; el consenso de control cruzado fue alto, con observación principal sobre el manejo de la metáfora de «tu porción». La traducción española conserva esa metáfora y ajusta solo la formulación natural en español.
  spanish_consistency_notes:
  - Se mantuvo «Israel» sin artículo añadido para respetar la concisión del griego.
  - 'Se usó «santifícala» para reflejar un objeto femenino singular implícito: «tu porción».'
  - Se preservó «porción» en vez de armonizarla con «herencia» o «pueblo», siguiendo la decisión auditada del POB.
