translation:
  language: es
  text: Y el comienzo de este mal resultó duro y gravoso para todos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la imposición de este mal resultó severa y difícil de soportar para todos».'
