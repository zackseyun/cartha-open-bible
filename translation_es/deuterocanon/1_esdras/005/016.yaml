translation:
  language: es
  text: los hijos de Anéis[a], ciento uno; los hijos de Arom, los hijos de Basái, trescientos veintitrés; los hijos de Arseifoureit[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La lista griega aquí diverge del paralelo hebreo aproximado en Nehemías 7:23, que lee «los hijos de Bezai».
    reason: alternative_reading
  - marker: b
    text: El nombre «Arseifoureit» es incierto en griego; el paralelo hebreo aproximado podría apuntar a «Harif».
    reason: textual_variant
lexical_decisions:
- source_word: υἱοὶ
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - hijos de
  lexicon: LSJ
  rationale: En este contexto de lista censal y genealógica, υἱοὶ introduce un grupo familiar o clan descendiente del antepasado nombrado. En español, «los hijos de» conserva de forma transparente esa relación genealógica.
- source_word: Ἀννείς
  english_pob_choice: Anneis
  chosen_spanish: Anéis
  alternatives_spanish:
  - Annis
  - Anneis
  lexicon: transliteración del griego
  rationale: Es un nombre propio y debe transliterarse. «Anéis» busca mantenerse cercano a la forma griega y resultar pronunciable en español, sin armonizarlo artificialmente con el paralelo hebreo aproximado.
- source_word: ἑκατὸν εἷς
  english_pob_choice: one hundred one
  chosen_spanish: ciento uno
  alternatives_spanish:
  - ciento uno
  - cien y uno
  lexicon: LSJ
  rationale: El griego da un cardinal simple. En español, «ciento uno» es la forma natural y fiel para 101.
- source_word: Ἀρόμ
  english_pob_choice: Arom
  chosen_spanish: Arom
  alternatives_spanish:
  - Aram
  lexicon: transliteración del griego
  rationale: Nombre propio transliterado directamente del testimonio griego principal. Se conserva la forma griega en lugar de armonizarla con posibles paralelos hebreos.
- source_word: Βασσαί
  english_pob_choice: Bassai
  chosen_spanish: Basái
  alternatives_spanish:
  - Bassai
  - Bezai
  lexicon: transliteración del griego
  rationale: Se translitera el nombre griego, pero se adapta con acentuación española para facilitar la lectura. No se sustituye por la forma hebrea aproximada porque el texto base es el griego.
- source_word: τριακόσιοι εἴκοσι τρεῖς
  english_pob_choice: three hundred twenty-three
  chosen_spanish: trescientos veintitrés
  alternatives_spanish:
  - trescientos veintitrés
  - trescientos y veintitrés
  lexicon: LSJ
  rationale: Número cardinal directo; en español moderno la forma sin «y» entre centenas y decenas es la más natural y precisa.
- source_word: Ἀρσειφουρείθ
  english_pob_choice: Arseiphoureith
  chosen_spanish: Arseifoureit
  alternatives_spanish:
  - Arseiphoureith
  - Harif
  lexicon: transliteración del griego
  rationale: El nombre es incierto y probablemente refleja divergencia textual respecto del paralelo hebreo. Se mantiene una transliteración cercana al griego, con grafía española manejable, sin resolverla en favor de la forma hebrea probable.
translation_notes:
  revision_awareness: Se siguió el testimonio griego como fuente principal, preservando la divergencia con el paralelo hebreo aproximado. Se optó por transliteraciones españolas legibles para los nombres propios y por numerales naturales en español.
  spanish_consistency_notes:
  - Se usa «los hijos de» para la fórmula genealógica, coherente con listas censales bíblicas.
  - Se conserva el orden y la puntuación de la lista para reflejar la estructura del griego.
  - Las notas al pie mantienen la tensión textual sin armonizar indebidamente el pasaje con Nehemías 7:23.
