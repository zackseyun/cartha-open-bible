translation:
  language: es
  text: Y muchos perdieron el juicio[a] por causa de las mujeres, y se hicieron esclavos por causa de ellas;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «muchos fueron extraviados en sus propias mentes por causa de las mujeres». La expresión griega es algo idiomática y combina un verbo de perder la razón con «sus propias mentes/pensamientos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπενοήθησαν
  english_pob_choice: lost their senses
  chosen_spanish: perdieron el juicio
  alternatives_spanish:
  - perdieron el sentido
  - quedaron fuera de sí
  - se volvieron locos
  lexicon: LSJ
  rationale: El griego expresa volverse irracional o perder sensatez. «Perdieron el juicio» comunica esa pérdida de discernimiento en un español natural, sin suavizar demasiado el giro idiomático.
- source_word: ταῖς ἰδίαις διανοίαις
  english_pob_choice: their senses
  chosen_spanish: el juicio
  alternatives_spanish:
  - sus propias mentes
  - sus propios pensamientos
  - su entendimiento
  lexicon: LSJ
  rationale: La frase literal apunta a la propia mente/pensamiento; unida al verbo, refuerza la idea de desvarío mental. En español, «perdieron el juicio» conserva esa fuerza idiomática de manera clara y fiel.
- source_word: διὰ τὰς γυναῖκας
  english_pob_choice: because of women
  chosen_spanish: por causa de las mujeres
  alternatives_spanish:
  - a causa de las mujeres
  - por las mujeres
  - debido a las mujeres
  lexicon: LSJ
  rationale: διά con acusativo expresa causa o motivo. «Por causa de» mantiene el valor causal de forma sobria y transparente.
- source_word: δοῦλοι
  english_pob_choice: slaves
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  - criados
  - sirvientes
  lexicon: LSJ
  rationale: El término señala subordinación real y no un servicio voluntario. En coherencia con la política del proyecto, «esclavos» preserva la fuerza social del vocablo.
- source_word: ἐγένοντο
  english_pob_choice: became
  chosen_spanish: se hicieron
  alternatives_spanish:
  - llegaron a ser
  - se volvieron
  - pasaron a ser
  lexicon: LSJ
  rationale: El verbo indica cambio de estado. «Se hicieron» es natural en español y conserva ese matiz de transición.
- source_word: διʼ αὐτάς
  english_pob_choice: because of them
  chosen_spanish: por causa de ellas
  alternatives_spanish:
  - a causa de ellas
  - por ellas
  - debido a ellas
  lexicon: LSJ
  rationale: La repetición del valor causal de διά con acusativo se mantiene en español para reflejar la insistencia del griego y el paralelismo de la línea.
theological_decisions:
- issue: Rendering of δοῦλοι as a contested term
  english_pob_reading: slaves
  chosen_spanish_reading: esclavos
  alternative_spanish_readings:
  - siervos
  - bondados? no
  rationale: No hay aquí una carga doctrinal más amplia, pero el término describe una condición de sujeción concreta. «Esclavos» es la equivalencia más fiel y mantiene la decisión lexical del POB inglés.
  doctrine_reference: 'DOCTRINE.md Contested terms: δοῦλος'
