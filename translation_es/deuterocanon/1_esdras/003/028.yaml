base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_esdras/003/028.yaml
  text: They kill and are killed[a], and they do not disobey the king’s word; and if they are victorious, they bring everything to the king[b], and whatever else they plunder.
  footnotes:
  - marker: a
    text: Or, more formally, 'if they are victorious.'
    reason: lexical_alternative
  - marker: b
    text: The Greek literally says 'the king’s word,' an idiom meaning his command or order.
    reason: lexical_alternative
