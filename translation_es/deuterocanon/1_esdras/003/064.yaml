translation:
  language: es
  text: y en su juicio no hay nada injusto[a]. Y esta es la fuerza, el reino, la autoridad y la majestad de todos los siglos[b]. Bendito sea el Dios de la verdad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el juicio de la verdad», si no se quiere conservar en español la personificación femenina implícita en el griego.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «de todos los siglos»; más idiomáticamente, «por siempre».
    reason: lexical_alternative
lexical_decisions:
- source_word: κρίσις
  english_pob_choice: judgment
  chosen_spanish: juicio
  alternatives_spanish:
  - sentencia
  - juzgamiento
  lexicon: BDAG
  rationale: En este contexto forense y doxológico, κρίσις se refiere al acto o resultado de juzgar. «Juicio» conserva mejor ese campo semántico en español que «justicia», que podría desplazar el foco hacia una cualidad moral abstracta.
- source_word: αὐτῆς
  english_pob_choice: her
  chosen_spanish: su
  alternatives_spanish:
  - de ella
  - de ello
  lexicon: BDAG
  rationale: El antecedente griego es ἀλήθεια, un sustantivo femenino. En español, el posesivo «su» evita forzar el género y mantiene la personificación sin volver la frase pesada; la nota explica que el referente es la verdad personificada.
- source_word: ἄδικον
  english_pob_choice: unjust
  chosen_spanish: injusto
  alternatives_spanish:
  - incorrecto
  - malvado
  lexicon: BDAG
  rationale: ἄδικον describe aquello que carece de justicia en un marco judicial. «Injusto» es la equivalencia más directa y mantiene la fuerza jurídica que el audit trail destaca.
- source_word: ἰσχύς
  english_pob_choice: strength
  chosen_spanish: fuerza
  alternatives_spanish:
  - poder
  - mientras
  lexicon: BDAG
  rationale: ἰσχύς designa fuerza o vigor; «fuerza» es natural en español y guarda el paralelismo con los títulos reales que siguen.
- source_word: βασίλειον
  english_pob_choice: kingdom
  chosen_spanish: reino
  alternatives_spanish:
  - realeza
  - dominio real
  - soberanía
  lexicon: LSJ
  rationale: En la secuencia doxológica, βασίλειον apunta a la esfera o condición real. «Reino» es la forma más transparente y readable en español, sin perder el sentido de dominio regio.
- source_word: ἐξουσία
  english_pob_choice: authority
  chosen_spanish: autoridad
  alternatives_spanish:
  - poder
  - derecho de mandar
  lexicon: BDAG
  rationale: ἐξουσία enfatiza autoridad legítima más que fuerza bruta. «Autoridad» preserva esa distinción y armoniza con «reino» y «majestad».
- source_word: μεγαλειότης
  english_pob_choice: majesty
  chosen_spanish: majestad
  alternatives_spanish:
  - grandeza
  - magnificencia
  lexicon: BDAG
  rationale: El término pertenece al registro elevado de la doxología. «Majestad» reproduce bien la solemnidad del griego y evita suavizar el tono.
- source_word: τῶν πάντων αἰώνων
  english_pob_choice: of all the ages
  chosen_spanish: de todos los siglos
  alternatives_spanish:
  - por todos los siglos
  - por todos los tiempos
  - para siempre
  lexicon: BDAG
  rationale: La forma griega es literalmente «de todos los siglos/edades». «De todos los siglos» conserva la estructura y evita sustituirla sin necesidad por una fórmula más idiomática pero menos transparente.
- source_word: εὐλογητός
  english_pob_choice: Blessed is
  chosen_spanish: Bendito sea
  alternatives_spanish:
  - Alabado sea
  - Bendecido sea
  lexicon: BDAG
  rationale: Como fórmula doxológica, εὐλογητός se vierte naturalmente con «Bendito sea» en español litúrgico y moderno. Mantiene el valor de bendición declarativa del original.
- source_word: ὁ θεὸς τῆς ἀληθείας
  english_pob_choice: the God of truth
  chosen_spanish: el Dios de la verdad
  alternatives_spanish:
  - el Dios verdadero
  - el Dios de fidelidad
  lexicon: BDAG
  rationale: El genitivo vincula a Dios con la verdad como rasgo caracterizador. «El Dios de la verdad» sigue de cerca la sintaxis griega y evita convertirlo en un atributo diferente como «el Dios verdadero».
theological_decisions:
- issue: Personificación femenina de la verdad en el posesivo
  english_pob_reading: Retain feminine personification with 'her judgment'
  chosen_spanish_reading: Conservar la personificación con el posesivo implícito de «su juicio» y explicar en nota que el referente griego es femenino
  alternative_spanish_readings:
  - su juicio neutro
  - el juicio de ella
  rationale: El griego usa formas femeninas para el antecedente ἀλήθεια. En español, «su» permite mantener la personificación sin forzar una marca de género artificial; la nota hace explícita la opción de leerlo de modo impersonal si no se desea sostener la personificación literaria.
  doctrine_reference: DOCTRINE.md § Translation philosophy 1, 3, 5
- issue: Valor de αἰώνων en la doxología
  english_pob_reading: Translate literally as 'of all the ages'
  chosen_spanish_reading: Traducir literalmente como «de todos los siglos»
  alternative_spanish_readings:
  - para siempre y para siempre
  - por los siglos de los siglos
  - por siempre
  rationale: La secuencia no exige una fórmula eclesiástica fija; el griego dice literalmente «de todos los siglos/edades». «De todos los siglos» mantiene la transparencia auditable y evita domesticar la expresión con una frase más tradicional que el texto no requiere.
  doctrine_reference: DOCTRINE.md § Translation philosophy 1, 6
translation_notes:
  revision_awareness: 'Concordamos con el audit trail inglés en los puntos principales: κρίσις como «juicio», ἄδικον como «injusto», y αἰώνων de manera literal. No se aplicaron revisiones sustantivas en el paso más reciente; la presente versión conserva la transparencia léxica y la personificación de la verdad sin añadir formulaciones doctrinalmente más fuertes que el griego.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y no se introduce «SEÑOR» como sustituto.
  - Se usa «fuerza / reino / autoridad / majestad» en paralelo, evitando mezclar registros.
  - La traducción de αἰώνων conserva la estructura literal, coherente con el enfoque de transparencia del POB.
  - El texto principal usa español natural, pero no reinterpreta el sintagma final como una fórmula litúrgica fija si el griego no la exige.
