translation:
  language: es
  text: Y todos los vasos fueron traídos[a], los de oro y plata[b], cinco mil cuatrocientos sesenta y nueve en total.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice «fueron traídos arriba», una formulación que puede reflejar el regreso de los vasos del templo a Jerusalén. Una traducción más sencilla es «fueron traídos».
    reason: lexical_alternative
  - marker: b
    text: El paralelo hebreo de Esdras 1:9–10 presenta una enumeración y cifras distintas; aquí se sigue el griego de 1 Esdras.
    reason: alternative_reading
lexical_decisions:
- source_word: τὰ δὲ πάντα σκεύη
  english_pob_choice: all the vessels
  chosen_spanish: todos los vasos
  alternatives_spanish:
  - todos los utensilios
  - todos los artículos
  lexicon: LSJ
  rationale: σκεύη en este contexto de tesoro del templo puede significar vasos, utensilios o artículos. «Vasos» conserva el sentido de objetos sagrados o de servicio y suena natural en español bíblico sin imponer una especificación más estrecha de la que da el griego.
- source_word: ἐκομίσθη
  english_pob_choice: were brought up
  chosen_spanish: fueron traídos
  alternatives_spanish:
  - fueron llevados
  - fueron transportados
  - fueron traídos de vuelta
  lexicon: LSJ
  rationale: El aoristo pasivo indica traslado. En español, «fueron traídos» transmite el movimiento sin forzar una dirección explícita que el griego no expresa de manera absoluta. Se evita aquí «subidos» o «traídos arriba» por sonar más artificial en español.
- source_word: χρυσᾶ καὶ ἀργυρᾶ
  english_pob_choice: the gold and silver ones
  chosen_spanish: los de oro y plata
  alternatives_spanish:
  - los vasos de oro y de plata
  - los dorados y plateados
  lexicon: LSJ
  rationale: Los adjetivos dependen de σκεύη implícito. En español, repetir «vasos» es posible, pero «los de oro y plata» mantiene la elipsis del griego y resulta claro. Se conserva la referencia a los mismos objetos sin añadir una clasificación no explicitada.
- source_word: πεντακισχίλια τετρακόσια ἑξήκοντα ἐννέα
  english_pob_choice: five thousand four hundred and sixty-nine
  chosen_spanish: cinco mil cuatrocientos sesenta y nueve
  alternatives_spanish:
  - '5.469'
  - cinco mil 469
  lexicon: LSJ
  rationale: El total cardinal es directo y no presenta ambigüedad. Se expresa en palabras para mantener el registro bíblico y la fluidez litúrgica en español.
theological_decisions:
- issue: Relación entre el texto griego de 1 Esdras y el paralelo hebreo de Esdras 1:9–10
  english_pob_reading: The parallel Hebrew inventory in Ezra 1:9–10 differs in its itemization and numbers; this translation follows the Greek text of 1 Esdras here.
  chosen_spanish_reading: Se traduce según el griego de 1 Esdras, sin armonizarlo con el inventario paralelo hebreo de Esdras 1:9–10.
  alternative_spanish_readings:
  - armonizar con el hebreo paralelo
  - mencionar explícitamente la diferencia en una nota más amplia
  rationale: El testimonio primario aquí es el griego de 1 Esdras. El paralelo hebreo sirve como control comparativo, pero no debe imponer su redacción ni sus cifras sobre este versículo. La decisión preserva la tensión textual documentada en la tradición del inventario.
  doctrine_reference: Principio de crítica textual y prioridad del testimonio base; no es una cuestión doctrinal, sino de fidelidad al testimonio textual.
translation_notes:
  revision_awareness: El borrador sigue el texto griego de Swete 1909 como ancla primaria. Se conserva la misma decisión auditada del inglés para ἐκομίσθη («were brought up»), pero en español se opta por «fueron traídos» por naturalidad y porque el matiz direccional ya puede inferirse del contexto del retorno al templo. No se introducen cambios respecto del sentido total ni de la cifra.
  spanish_consistency_notes:
  - Se mantiene «vasos» para σκεύη, coherente con el registro templario.
  - Se evita «SEÑOR» u otra sustitución no pertinente, porque el versículo no contiene el nombre divino.
  - El número se escribe con palabras, siguiendo el estilo bíblico del proyecto.
  - Las notas preservan la tensión textual con el paralelo hebreo sin armonización forzada.
