  spanish_consistency_notes:
  - Se conserva el tono exclamativo del inicio con «¡Cuán…!».
  - «Tirano» mantiene la carga polémica del término τύραννος.
  - La nota [a] queda unida al sintagma «piedad ancestral» para evitar una nota suelta.
