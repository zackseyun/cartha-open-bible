lexical_decisions:
- source_word: Ὡς
  english_pob_choice: How
  chosen_spanish: ¡Cuán!
  alternatives_spanish:
  - ¡Cómo!
  - ¡Oh, cuán!
  lexicon: LSJ
  rationale: En español, la exclamación natural que conserva el tono afectivo y laudatorio del griego es «Cuán», con signo de admiración inicial para reflejar el énfasis.
- source_word: ἡδὺς
  english_pob_choice: sweet
  chosen_spanish: dulce
  alternatives_spanish:
  - agradable
  - grato
  lexicon: LSJ
  rationale: «Dulce» conserva la paradoja retórica de que la muerte resulte atractiva o deleitosa a causa de la fidelidad religiosa.
- source_word: πᾶς τρόπος θανάτου
  english_pob_choice: every kind of death
  chosen_spanish: toda clase de muerte
  alternatives_spanish:
  - todo tipo de muerte
  - toda manera de morir
  lexicon: LSJ
  rationale: La expresión es distributiva y abarcadora; «toda clase de muerte» comunica bien la amplitud sin sonar forzada en español.
- source_word: διὰ τὴν πάτριον ἡμῶν εὐσέβειαν
  english_pob_choice: because of our ancestral piety
  chosen_spanish: por nuestra piedad ancestral
  alternatives_spanish:
  - a causa de nuestra piedad ancestral
  - por nuestra ancestral devoción
  lexicon: BDAG
  rationale: Con acusativo, διὰ expresa causa; «por» es natural en español. «Piedad ancestral» conserva el vínculo con los antepasados y el matiz reverente de εὐσέβεια, evitando una paráfrasis doctrinal más amplia.
- source_word: ἔφη
  english_pob_choice: he said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  - afirmó
  lexicon: LSJ
  rationale: Es la introducción simple de un discurso; «dijo» es la equivalencia más directa y sobria.
- source_word: πρὸς τὸν τύραννον
  english_pob_choice: to the tyrant
  chosen_spanish: al tirano
  alternatives_spanish:
  - al déspota
  - al rey
  lexicon: LSJ
  rationale: «Tirano» reproduce la carga evaluativa del término griego en este contexto de persecución, mejor que un título neutral.
theological_decisions:
- issue: εὐσέβεια en contexto de martirio
  english_pob_reading: piety / godliness
  chosen_spanish_reading: piedad
  alternative_spanish_readings:
  - devoción
  - godliness
  rationale: En español, «piedad» comunica reverencia y fidelidad religiosa sin perder la referencia a una práctica devota heredada de los antepasados. Se evita «devoción» por ser más general y menos marcado en el registro bíblico.
  doctrine_reference: Translation philosophy §6; consistency of key terms per §5
translation_notes:
