translation:
  language: es
  text: Pero cuando oyeron los alicientes[a] y vieron los tormentos[b], no solo no temieron, sino que incluso razonaron filosóficamente contra el tirano[c],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'las persuasiones' o 'los halagos'. El término griego (ἐπαγωγάς) alude a intentos de convencer o atraer a los mártires mediante ofertas o promesas, antes o junto con las amenazas.
    reason: lexical_alternative
  - marker: b
    text: Literalmente 'cosas terribles' (δεινά); en contexto se refiere a los suplicios o horrores exhibidos por el tirano ante ellos.
    reason: lexical_alternative
  - marker: c
    text: El griego dice literalmente 'filosofaron contra el tirano' (ἀντεφιλοσόφησαν), con el prefijo ἀντί- que indica respuesta y oposición. El POB inglés revisó la redacción a 'reasoned philosophically with' por fluidez en inglés, pero el español puede recuperar la fuerza adversativa de la fuente sin artificiosidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπαγωγὰς
  english_pob_choice: the inducements
  chosen_spanish: los alicientes
  alternatives_spanish:
  - las persuasiones
  - los incentivos
  - los halagos
  - los ofrecimientos
  lexicon: LSJ
  rationale: El término griego denota cosas que intentan atraer o llevar a alguien hacia algo. 'Alicientes' en español capta tanto la dimensión persuasiva como la atractiva, adecuada para un contexto donde la coacción se mezcla con promesas u ofertas. 'Las persuasiones' sería más literal pero resulta algo forzado en español moderno; 'los incentivos' es posible pero tiene connotaciones más económicas o laborales; 'alicientes' mantiene el tono narrativo del martirologio.
- source_word: δεινά
  english_pob_choice: the tortures
  chosen_spanish: los tormentos
  alternatives_spanish:
  - las cosas terribles
  - las torturas
  - los horrores
  - los suplicios
  lexicon: LSJ
  rationale: El griego es amplio ('cosas terribles'), pero el contexto inmediato de martirio apunta a sufrimientos infligidos. 'Tormentos' es natural en español para el lenguaje del martirologio, semánticamente algo más amplio que 'torturas' (lo que corresponde mejor al griego δεινά) y al mismo tiempo concreto. Se prefiere sobre 'suplicios' por ser más accesible al lector contemporáneo.
- source_word: οὐ μόνον οὐκ ἐφοβήθησαν
  english_pob_choice: they not only were not afraid
  chosen_spanish: no solo no temieron
  alternatives_spanish:
  - no solamente no tuvieron miedo
  - no se limitaron a no temer
  - no solo no se atemorizaron
  lexicon: BDAG
  rationale: Se preserva la estructura de doble negación enfática del griego. 'No solo no temieron' es idiomático en español para el giro retórico οὐ μόνον οὐκ y resulta directo y legible. La voz activa 'temieron' equivale bien al deponente aoristo ἐφοβήθησαν en este contexto.
- source_word: ἀντεφιλοσόφησαν
  english_pob_choice: reasoned philosophically with
  chosen_spanish: razonaron filosóficamente contra
  alternatives_spanish:
  - filosofaron en oposición a
  - respondieron filosóficamente a
  - discutieron filosóficamente con
  - razonaron filosóficamente frente a
  lexicon: LSJ
  rationale: El compuesto ἀντί+φιλοσοφέω significa 'filosofar en respuesta/oposición'. El POB inglés revisó 'argued philosophy against' → 'reasoned philosophically with' por fluidez, suavizando la fuerza del prefijo ἀντί-. El español 'razonaron filosóficamente contra el tirano' permite recuperar esa fuerza adversativa sin resultar forzado, siendo al mismo tiempo más fiel a la morfología del griego. Se preserva el elemento φιλοσοφ- conforme a la decisión teológica del proyecto.
- source_word: τῷ τυράννῳ
  english_pob_choice: the tyrant
  chosen_spanish: el tirano
  alternatives_spanish:
  - el rey
  - el déspota
  - el soberano
  lexicon: BDAG
  rationale: Traducción directa del término griego. El autor de 4 Macabeos elige deliberadamente τύραννος (tirano) y no βασιλεύς (rey), incorporando así una evaluación moral del gobernante. 'El tirano' en español preserva ese juicio sin ambigüedad.
theological_decisions:
- issue: Preservación de la terminología filosófica de ἀντεφιλοσόφησαν
  english_pob_reading: reasoned philosophically with the tyrant
  chosen_spanish_reading: razonaron filosóficamente contra el tirano
  alternative_spanish_readings:
  - discutieron filosóficamente con el tirano
  - respondieron filosóficamente al tirano
  rationale: '4 Macabeos enmarca deliberadamente el martirio judío en el lenguaje de la razón y la filosofía estoica. Aplanar ἀντεφιλοσόφησαν a una simple ''disputa'' o ''discusión'' perdería la apuesta teológica central del libro: que la piedad razonada es superior al poder tiránico. El español conserva el lexema filosófico (''filosóficamente'') y adicionalmente restituye la fuerza del prefijo ἀντί- con ''contra'', que el POB inglés había suavizado a ''with'' por razones idiomáticas propias del inglés, no de la fuente griega.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
translation_notes:
  revision_awareness: El POB inglés revisó la redacción de 'argued philosophy against the tyrant' a 'reasoned philosophically with the tyrant' para lograr un inglés más fluido, suavizando el prefijo adversativo ἀντί-. El español 'razonaron filosóficamente contra el tirano' recupera conscientemente esa fuerza adversativa de la fuente griega, lo cual es posible en español sin producir torpeza idiomática. Esta divergencia del texto inglés revisado está justificada en la morfología del compuesto griego y es explicitada en la nota [c].
  spanish_consistency_notes:
  - No hay menciones del nombre divino en este versículo; el proyecto de terminología YHWH → 'Yahvé' no aplica aquí.
  - El término 'tirano' (τύραννος) se traduce consistentemente como 'el tirano' sin suavizarlo a 'rey' o 'soberano', preservando el juicio moral del autor de 4 Macabeos.
  - El elemento filosófico de ἀντεφιλοσόφησαν se mantiene visible en español ('filosóficamente') conforme a la política del proyecto para 4 Macabeos de no aplanar su vocabulario filosófico-estoico.
