translation:
  language: es
  text: No te vuelvas también loco como tus hermanos, con la misma locura, sino, persuadido por el rey, sálvate.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Μὴ μανῇς
  english_pob_choice: Do not be driven mad
  chosen_spanish: No te vuelvas loco
  alternatives_spanish:
  - No enloquezcas
  - No te vuelvas insensato
  lexicon: LSJ
  rationale: μαίνομαι expresa volverse loco, enloquecer o estar fuera de juicio. «No te vuelvas loco» conserva la fuerza verbal y suena natural en español, sin suavizar el reproche.
- source_word: καὶ σὺ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - además
  - igual que tú
  lexicon: LSJ
  rationale: καὶ σὺ añade al destinatario a los hermanos mencionados; «también» reproduce bien ese valor aditivo en español.
- source_word: τοῖς ἀδελφοῖς σου
  english_pob_choice: as your brothers
  chosen_spanish: con tus hermanos
  alternatives_spanish:
  - como tus hermanos
  - igual que tus hermanos
  lexicon: LSJ
  rationale: 'La relación es comparativa/asociativa: no se trata simplemente de identidad sino de compartir su conducta. «Con tus hermanos» mantiene esa asociación y fluye mejor con el verbo en español.'
- source_word: τὴν αὐτὴν μανίαν
  english_pob_choice: the same madness
  chosen_spanish: la misma locura
  alternatives_spanish:
  - la misma locura furiosa
  - la misma insania
  lexicon: LSJ
  rationale: μανία significa locura, delirio, frenesí. «Locura» es idiomática y permite conservar la repetición con el verbo «volverse loco».
- source_word: πεισθεὶς
  english_pob_choice: be persuaded
  chosen_spanish: persuadido
  alternatives_spanish:
  - dejándote persuadir
  - habiendo sido persuadido
  lexicon: LSJ
  rationale: El participio aoristo pasivo de πείθω puede expresar haber sido convencido o dejarse persuadir. En español, «persuadido» integra bien la idea participial sin añadir más de lo que el texto exige.
- source_word: τῷ βασιλεῖ
  english_pob_choice: by the king
  chosen_spanish: por el rey
  alternatives_spanish:
  - al rey
  - del rey
  lexicon: LSJ
  rationale: Con el participio pasivo, el dativo funciona como agente o fuente de persuasión. «Por el rey» hace explícita esa relación en español.
- source_word: σῶζε σεαυτόν
  english_pob_choice: save yourself
  chosen_spanish: sálvate
  alternatives_spanish:
  - presérvate
  - salva tu vida
  lexicon: LSJ
  rationale: σῴζω aquí apunta a conservar la propia vida ante el peligro. «Sálvate» es breve, directo y fiel al imperativo griego.
translation_notes:
  revision_awareness: La redacción sigue de cerca el griego de Swete 1909 y toma como guía el ajuste reciente del POB en inglés, especialmente la conservación explícita del campo léxico de la locura y del matiz exhortativo de καὶ σὺ. Se evita una paráfrasis moralizante y se mantiene la advertencia abrupta del original.
  spanish_consistency_notes:
  - Se usa «rey» de forma literal porque el griego dice βασιλεῖ, sin necesidad de ampliar a un título más interpretativo.
  - Se prefirió «locura» sobre «insania» para una lectura publicable y natural en español, pero se conservó la fuerza despectiva del pasaje.
  - El participio pasivo se integró como complemento adjetival («persuadido») para evitar una construcción demasiado pesada en español.
