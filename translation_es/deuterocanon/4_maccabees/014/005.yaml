translation:
  language: es
  text: Pero todos ellos, como si corrieran por un camino hacia la inmortalidad[a], se apresuraban hacia la muerte a través de las torturas[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «por la senda hacia la inmortalidad».'
    reason: lexical_alternative
  - marker: b
    text: «A través de las torturas» puede también traducirse «a través de los tormentos».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sin embargo
  - Mas
  lexicon: BDAG
  rationale: ἀλλά es la conjunción adversativa fuerte por excelencia en griego. «Pero» es su equivalente natural en español moderno y preserva la misma fuerza adversativa que «But» en el POB inglés. «Sin embargo» sería más débil y circunlocutorio; «mas» resulta arcaico para el registro al que apunta la POB.
- source_word: πάντες
  english_pob_choice: all of them
  chosen_spanish: todos ellos
  alternatives_spanish:
  - todos
  - cada uno de ellos
  lexicon: BDAG
  rationale: El nominativo plural πάντες retoma a un grupo ya identificado en el contexto previo. El POB inglés optó por «all of them» para hacer explícita la referencia colectiva; «todos ellos» cumple la misma función en español sin añadir ni quitar peso al original. El simple «todos» sería también posible, pero «todos ellos» da la misma densidad referencial del inglés.
- source_word: ὥσπερ
  english_pob_choice: as though
  chosen_spanish: como si
  alternatives_spanish:
  - cual si
  - como
  lexicon: BDAG
  rationale: ὥσπερ introduce aquí un símil, no una comparación de igualdad real (no corren literalmente por un camino a la inmortalidad, sino que su ardor se asemeja a eso). El POB inglés lo capturó con «as though». En español, «como si» + subjuntivo es la construcción gramaticalmente canónica para este tipo de comparación hipotética; el subjuntivo imperfecto «corrieran» refleja la simultaneidad con el pasado del verbo principal (ἔσπευδον). «Cual si» sería más literario pero menos accesible.
- source_word: ἐπʼ ἀθανασίας ὁδόν
  english_pob_choice: on a road to immortality
  chosen_spanish: por el camino de la inmortalidad
  alternatives_spanish:
  - por la senda de la inmortalidad
  - hacia el camino de la inmortalidad
  lexicon: BDAG
  rationale: ὁδός denota camino/ruta/senda; ἀθανασίας es genitivo de ἀθανασία (inmortalidad). La construcción ἐπί + acusativo con τρέχοντες indica movimiento a lo largo del camino. «Por el camino de la inmortalidad» reproduce la imagen de desplazamiento a lo largo de una vía caracterizada por la inmortalidad, sin forzar un calco. «Senda» es alternativa legítima (véase nota [a]); «sendero» tiene connotación más estrecha.
- source_word: τρέχοντες
  english_pob_choice: running
  chosen_spanish: corrieran
  alternatives_spanish:
  - marcharan a la carrera
  lexicon: BDAG
  rationale: τρέχω = correr; el participio presente τρέχοντες se integra en la cláusula comparativa «como si corrieran». La forma de subjuntivo imperfecto «corrieran» es la solución gramatical española para el participio bajo el regente «como si» con verbo principal en tiempo pasado (ἔσπευδον → se apresuraban). Preserva la metáfora atlética/del viaje del original.
- source_word: ἐπὶ τὸν … θάνατον
  english_pob_choice: toward death
  chosen_spanish: hacia la muerte
  alternatives_spanish:
  - a la muerte
  lexicon: BDAG
  rationale: 'ἐπί con acusativo expresa dirección hacia un punto final. «Hacia la muerte» preserva la imagen de movimiento direccional ya establecida en el versículo y es paralela a «por el camino de la inmortalidad», manteniendo la tensión retórica del texto: correr hacia la inmortalidad equivale a apresurarse hacia la muerte.'
- source_word: διὰ τῶν βασάνων
  english_pob_choice: through tortures
  chosen_spanish: a través de las torturas
  alternatives_spanish:
  - por medio de los tormentos
  - mediante las torturas
  lexicon: BDAG
  rationale: διά + genitivo expresa el medio o la vía a través de la cual se produce la acción. βάσανοι designa tormentos físicos severos. «A través de las torturas» preserva tanto el sentido instrumental como la imagen de tránsito (pasar por las torturas para llegar a la muerte), en paralelo con «por el camino». «Tormentos» es alternativa legítima de registro más literario (véase nota [b]).
- source_word: ἔσπευδον
  english_pob_choice: were hurrying
  chosen_spanish: se apresuraban
  alternatives_spanish:
  - se precipitaban
  - se afanaban
  lexicon: BDAG
  rationale: ἔσπευδον es imperfecto de σπεύδω (apresurarse, estar ansioso por). El imperfecto denota una acción durativa/continuada en el pasado. «Se apresuraban» es el equivalente español más natural del imperfecto de movimiento urgente; reproduce tanto el sentido durativo como la intensidad del original. «Se precipitaban» añadiría una connotación de caída/descontrol ausente en el griego.
theological_decisions:
- issue: Significado de ἀθανασία en contexto de martirio
  english_pob_reading: immortality
  chosen_spanish_reading: inmortalidad
  alternative_spanish_readings:
  - vida eterna
  - incorruptibilidad
  rationale: 'ἀθανασία denota literalmente la condición de no-muerte (ἀ- privativo + θάνατος). En este contexto de martirio el término lleva peso teológico considerable: los mártires corren hacia la muerte física precisamente porque la perciben como umbral de la inmortalidad. La traducción española sigue la decisión del POB inglés de preservar «inmortalidad» sin expandirla interpretativamente a «vida eterna», manteniendo así la tensión teológica entre θάνατος e ἀθανασία que el texto explota deliberadamente. Resolver esa tensión hacia «vida eterna» supondría una glosa teológica no avalada por la fuente.'
  doctrine_reference: 'Filosofía de traducción POB: primacía del texto fuente; preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: 'El registro inglés (latest_revision_pass: 2026-04-23, unchanged: true; applied_revisions: []) no muestra revisiones aplicadas ni cambios pendientes. El borrador español parte del texto griego fuente directamente y utiliza el rastro de auditoría del POB inglés como contexto verificado, no como texto base de traducción mecánica. Se reubicó el marcador [a] tras «inmortalidad» en lugar de tras «todos ellos» (posición del inglés) para anclar con mayor precisión la nota sobre ὁδόν; la nota de pie inglesa [a] versa sobre «road/path», no sobre «all of them», por lo que la reubicación es más fiel a la intención documental.'
  spanish_consistency_notes:
  - No aparece el nombre divino (יהוה/κύριος) en este versículo; la convención «Yahvé» no tiene aplicación aquí.
  - No hay lenguaje mesiánico (Χριστός/Mesías) en este versículo.
  - βάσανοι se traduce como «torturas» (primario) siguiendo la elección «tortures» del POB inglés, con «tormentos» como alternativa documentada en nota; se mantiene coherencia con la pauta del proyecto.
  - ἀθανασία → «inmortalidad» es coherente con la pauta de no sustituir términos fuente por glosas teológicas interpretativas («vida eterna»).
  - El imperfecto ἔσπευδον se traslada mediante imperfecto español «se apresuraban», preservando el aspecto durativo en ambas lenguas.
