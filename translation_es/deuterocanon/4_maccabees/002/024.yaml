translation:
  language: es
  text: ¿Cómo, entonces, alguien podría decir, si la razón domina a las pasiones, no domina también al olvido y a la ignorancia?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Πῶς οὖν
  english_pob_choice: How then
  chosen_spanish: ¿Cómo, entonces,
  alternatives_spanish:
  - ¿Cómo, pues,
  - Entonces, ¿cómo
  lexicon: LSJ
  rationale: Conserva la pregunta retórica y el giro argumentativo; «entonces» mantiene el valor inferencial de οὖν sin sonar forzado.
- source_word: εἴποι τις ἄν
  english_pob_choice: someone might say
  chosen_spanish: podría decirse
  alternatives_spanish:
  - alguien podría decir
  - uno podría decir
  lexicon: LSJ
  rationale: La forma hipotética introduce una objeción implícita; en español, la pasiva impersonal suena natural y preserva el matiz hipotético.
- source_word: τῶν παθῶν
  english_pob_choice: the passions
  chosen_spanish: las pasiones
  alternatives_spanish:
  - los impulsos
  - las emociones
  lexicon: LSJ
  rationale: «Pasiones» mantiene el vocabulario antropológico-filosófico del contexto y corresponde al valor que la POB inglesa documenta.
- source_word: ὁ λογισμὸς
  english_pob_choice: reason
  chosen_spanish: la razón
  alternatives_spanish:
  - el razonamiento
  - el juicio racional
  lexicon: LSJ
  rationale: En este argumento λογισμός es la facultad rectora de juicio racional; «razón» es la equivalencia más natural y fiel en español.
- source_word: κρατεῖ
  english_pob_choice: rules over
  chosen_spanish: domina
  alternatives_spanish:
  - rige sobre
  - tiene poder sobre
  - vence a
  lexicon: LSJ
  rationale: «Domina» expresa con claridad la idea de control o preeminencia sin perder la fuerza del verbo griego.
- source_word: λήθης
  english_pob_choice: forgetfulness
  chosen_spanish: la falta de memoria
  alternatives_spanish:
  - el olvido
  - la olvidanza
  lexicon: LSJ
  rationale: «Falta de memoria» comunica el sentido abstracto de λήθη de modo claro y moderno; se evita «olvido» si puede sonar demasiado a acto puntual más que a estado.
- source_word: ἀγνοίας
  english_pob_choice: ignorance
  chosen_spanish: la ignorancia
  alternatives_spanish:
  - el desconocimiento
  - la falta de conocimiento
  lexicon: LSJ
  rationale: «Ignorancia» corresponde directamente a ἀγνοία y conserva el paralelismo abstracto con λήθη.
theological_decisions:
- issue: Sentido antropológico-filosófico de πάθη y λογισμός
  english_pob_reading: Render πάθη as 'passions' and λογισμός as 'reason'
  chosen_spanish_reading: Traducir πάθη como «pasiones» y λογισμός como «razón»
  alternative_spanish_readings:
  - Traducir πάθη como «emociones»
  - Traducir λογισμός como «juicio racional»
  rationale: El pasaje pertenece al argumento sostenido de 4 Macabeos sobre la capacidad de la razón piadosa para dominar las pasiones. «Pasiones» y «razón» preservan ese marco conceptual sin desplazarlo hacia psicologismos modernos.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §§1, 5, 6'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios y el cotejo cruzado reportó alta concordancia; por eso se mantiene la solución conceptual de la POB inglesa, adaptada a un español natural y fiel al griego.
  spanish_consistency_notes:
  - Se conservó el paralelismo entre «pasiones» y «razón», tal como en la POB inglesa.
  - Se evitó «SEÑOR» u այլ sustituciones no pertinentes, porque no aparecen en este versículo.
  - «Falta de memoria» se eligió para λήθη para mantener el tono abstracto y no reducirlo a un olvido puntual.
