  rationale: Se revisa para lograr un español más natural y legible sin perder el sentido del griego ni las decisiones del POB inglés. La nueva redacción conserva la magnitud y la frecuencia implícitas en πηλίκοις καὶ πόσαις, mantiene la relación sintáctica que aplica ruedas e instrumentos ardientes a los hijos, y refleja mejor el imperfecto ἐβασανίζετο con «era el tormento». También se reemplaza el tecnicismo poco transparente «cauterios» en el texto principal por «hierros candentes», dejando la equivalencia formal en nota.
