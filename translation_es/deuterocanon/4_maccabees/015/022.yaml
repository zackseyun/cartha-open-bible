translation:
  language: es
  text: ¡Cuán grande y cuán frecuente[a] era el tormento[b] de la madre, mientras sus hijos eran torturados con ruedas y hierros candentes[c]!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuántas veces». El griego empareja πηλίκοις («cuán grande») y πόσαις, que puede expresar número o frecuencia; el español usa «cuán frecuente» para una formulación más natural.
    reason: lexical_alternative
  - marker: b
    text: O «era torturada con torturas». El griego repite formas cognadas de la raíz βάσανος/βασανίζω para fuerza retórica.
    reason: lexical_alternative
  - marker: c
    text: 'Gr. «cauterios»: instrumentos para quemar; también «hierros al rojo vivo» o «hierros de marcar».'
    reason: lexical_alternative
lexical_decisions:
- source_word: πηλίκοις
  english_pob_choice: how greatly
  chosen_spanish: cuán grandes
  alternatives_spanish:
  - cuán intensas
  - cuán grandes
  lexicon: LSJ
  rationale: Adjetivo interrogativo-exclamativo en dativo plural que modifica a βασάνοις (torturas). El inglés POB lo rindió adverbialmente («how greatly»); el español lo mantiene como adjetivo («cuán grandes») modificando directamente a «torturas», lo que es más fiel a la sintaxis griega y resulta natural en español. La fuerza retórica de magnitud queda preservada.
- source_word: πόσαις
  english_pob_choice: how often (revised from 'how many times')
  chosen_spanish: cuántas
  alternatives_spanish:
  - cuántas veces
  - con qué frecuencia
  lexicon: LSJ
  rationale: Adjetivo interrogativo en dativo plural que indica número o cantidad, también modificando a βασάνοις. En lugar de una expresión adverbial («cuántas veces», «con qué frecuencia»), el español lo mantiene como adjetivo prenominal («cuántas torturas»), respetando la estructura sintáctica griega. La revisión inglesa cambió 'how many times' por 'how often'; el español recupera el valor cuantitativo del griego mediante el adjetivo nominal.
- source_word: τότε
  english_pob_choice: then
  chosen_spanish: entonces
  alternatives_spanish:
  - en aquel momento
  - en ese instante
  lexicon: LSJ
  rationale: Adverbio narrativo que marca la transición retórica. «Entonces» es la equivalencia concisa y natural en español, coherente con el POB inglés.
- source_word: μήτηρ
  english_pob_choice: the mother
  chosen_spanish: la madre
  alternatives_spanish:
  - su madre
  lexicon: LSJ
  rationale: El griego tiene artículo (ἡ μήτηρ) pero no posesivo explícito. «La madre» preserva la forma del texto; el contexto narrativo hace claro de quién se habla, al igual que en el inglés POB.
- source_word: βασανιζομένων
  english_pob_choice: were being tortured
  chosen_spanish: eran torturados
  alternatives_spanish:
  - eran atormentados
  - padecían tortura
  lexicon: LSJ
  rationale: Participio de presente pasivo en genitivo plural. «Eran torturados» mantiene la voz pasiva, el tiempo imperfectivo y la raíz cognada con «torturas» y «torturada», reproduciendo la acumulación retórica del griego (βασανιζομένων / ἐβασανίζετο / βασάνοις).
- source_word: τροχοῖς
  english_pob_choice: wheels
  chosen_spanish: ruedas
  alternatives_spanish:
  - potros
  - ruedas de tortura
  lexicon: LSJ
  rationale: Dativo plural de τροχός, instrumento de tortura rotatorio. «Ruedas» es la traducción más directa y evita importar especificaciones no presentes en el griego (como «potros», que nombra un instrumento diferente). Coincide con el POB inglés.
- source_word: καυτηρίοις
  english_pob_choice: cauteries
  chosen_spanish: cauterios
  alternatives_spanish:
  - hierros candentes
  - hierros al rojo vivo
  - marcas de fuego
  lexicon: LSJ
  rationale: Dativo plural de καυτήριον, instrumento utilizado para quemar o cauterizar. «Cauterios» es un calco técnico que existe en español médico-literario y preserva la precisión formal del término griego, al igual que el inglés «cauteries». Las alternativas más interpretativas («hierros candentes») reducen la polivalencia del original.
- source_word: ἐβασανίζετο
  english_pob_choice: was tortured
  chosen_spanish: fue torturada
  alternatives_spanish:
  - era atormentada
  - padecía tortura
  lexicon: LSJ
  rationale: Imperfecto pasivo de βασανίζω referido a la madre. «Fue torturada» mantiene la raíz cognada y el valor pasivo. Se elige el pretérito perfecto simple (fue) en lugar del imperfecto (era) para preservar el sentido acumulado de la pregunta retórica; el imperfecto griego expresa duración durante el tormento de los hijos, aspecto que la cláusula subordinada («mientras sus hijos eran torturados») ya articula.
- source_word: βασάνοις
  english_pob_choice: with torments
  chosen_spanish: torturas
  alternatives_spanish:
  - tormentos
  - suplicios
  lexicon: LSJ
  rationale: Dativo plural instrumental del sustantivo βάσανος. «Torturas» completa el triplete cognado español (torturas / torturada / torturados) que reproduce la acumulación retórica griega (βασάνοις / ἐβασανίζετο / βασανιζομένων). El inglés POB usó «torments» para el sustantivo y «tortured» para los verbos; el español unifica la raíz por fidelidad a la retórica del original.
theological_decisions:
- issue: Naturaleza del sufrimiento de la madre
  english_pob_reading: The verse speaks of the mother's real and intense suffering in response to witnessing her sons' torture, without specifying that she herself underwent the same physical instruments.
  chosen_spanish_reading: La pregunta retórica afirma la intensidad real del tormento de la madre, sin precisar si fue sometida a los mismos instrumentos físicos que sus hijos.
  alternative_spanish_readings:
  - La madre fue torturada físicamente con los mismos instrumentos
  - El sufrimiento de la madre es puramente emocional o compasivo, sin connotación de tormento físico
  rationale: 'La triple repetición del campo léxico βάσανος/βασανίζω subraya la intensidad del sufrimiento de la madre, pero la sintaxis griega vincula τροχοῖς y καυτηρίοις directamente a los hijos («siendo torturados con ruedas y cauterios»). La formulación española mantiene esta tensión sin resolverla: la madre «fue torturada» con una brutalidad que el texto certifica pero no especifica en su mecanismo. Esta ambigüedad es teológicamente deliberada y debe preservarse.'
  doctrine_reference: Preservar la tensión teológica antes que resolverla (criterio POB inglés)
translation_notes:
  revision_awareness: 'La revisión del POB inglés (2026-04-23, gpt-5.4) cambió «how many times» por «how often» para πόσαις. El borrador español opta por «cuántas» como adjetivo que modifica a «torturas», lo que recupera el valor cuantitativo de πόσαις (LSJ: «how many») preservado en la versión inglesa original antes de la revisión, y lo hace desde la estructura sintáctica griega (dativo adjetival + βασάνοις) en lugar de seguir mecánicamente la forma adverbial del POB inglés revisado.'
  spanish_consistency_notes:
  - No hay terminología de YHWH/nombre divino en este versículo.
  - No hay terminología cristológica ni pneumatológica relevante.
  - La raíz cognada βάσανος/βασανίζω se unifica en español con la raíz tortur- (torturas/torturada/torturados) para reproducir la acumulación retórica del griego.
  - «Cauterios» se emplea para καυτηρίοις, coherente con la preferencia por precisión formal sobre paráfrasis interpretativa.
  - La pregunta retórica lleva signos de apertura y cierre de interrogación conforme a las convenciones del español (¿...?).
