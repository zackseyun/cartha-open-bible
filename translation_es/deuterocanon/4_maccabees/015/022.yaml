  source_alignment_summary: El borrador capta bien la estructura básica del griego y preserva acertadamente la repetición retórica del campo léxico βασαν- mediante «torturada / torturados / torturas». También mantiene correctamente «la madre», «entonces», «ruedas» y la subordinada que vincula los instrumentos a los hijos, no a la madre. Sin embargo, «¿Con cuán grandes y cuántas torturas…?» suena poco natural en español y fuerza demasiado la sintaxis griega. Además, «fue torturada» debilita el imperfecto ἐβασανίζετο frente al proceso durativo resaltado por «mientras sus hijos eran torturados».
  spanish_quality_summary: 'La redacción actual es comprensible, pero resulta rígida y poco idiomática para español eclesial legible. «Con cuán grandes y cuántas torturas» es torpe; «cauterios» es demasiado técnico y poco transparente para lectores generales. Conviene conservar la fuerza retórica y la precisión, pero con una formulación más natural: «¡Cuán grande y cuán frecuente fue el tormento…!» y «hierros candentes» con nota que preserve la alternativa formal.'
  glossary_alignment: No hay conflictos con la terminología troncal del proyecto (Dios, Yahvé, Mesías, etc.). La decisión de mantener la cognación de βασανίζω/βάσανος es válida en principio, pero en español conviene equilibrar fidelidad retórica y naturalidad. Para καυτηρίοις, la nota puede conservar «cauterios» como alternativa formal mientras el texto principal use una expresión más clara.
  issues:
  - severity: medium
    issue: Sintaxis española poco natural en «¿Con cuán grandes y cuántas torturas…?»
    rationale: Aunque intenta reflejar el dativo plural griego, el resultado suena forzado y poco idiomático. El POB español debe priorizar español claro sin paraprasear más allá de la evidencia.
  - severity: medium
    issue: «Fue torturada» no refleja bien el imperfecto ἐβασανίζετο
    rationale: El imperfecto presenta sufrimiento en curso, en paralelo con «mientras sus hijos eran torturados». «Era atormentada» o «sufría tormentos» representa mejor ese aspecto.
  - severity: low
    issue: «Cauterios» es demasiado técnico para el texto principal
    rationale: Es defendible en nota léxica, pero en el cuerpo del texto «hierros candentes» comunica mejor el referente sin perder fidelidad básica.
