translation:
  language: es
  text: Pero la madre exhortaba a cada hijo por separado[a] y a todos ellos juntos[b] hacia la muerte por causa de la piedad[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'uno por uno'. El griego contrasta la exhortación dirigida a cada hijo por separado con la exhortación dirigida al grupo entero.
    reason: lexical_alternative
  - marker: b
    text: O 'a todos juntos' o 'a todos a la vez'. El griego subraya tanto la totalidad del grupo como su consideración conjunta.
    reason: lexical_alternative
  - marker: c
    text: O 'hacia una muerte de piedad', es decir, una muerte sufrida por causa de la reverencia a Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ καὶ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Pero también
  - Mas también
  - Sin embargo
  lexicon: LSJ
  rationale: ἀλλά marca contraste o continuación discursiva leve; el καί añade énfasis. El POB inglés optó por 'But' sin reflejar el καί de forma separada, evitando sobrecargar la frase. En español, 'Pero' logra el mismo giro discursivo de forma natural. 'Pero también' traduciría el καί más literalmente pero resulta redundante en este punto del discurso.
- source_word: καθʼ ἕνα
  english_pob_choice: each … individually
  chosen_spanish: a cada hijo individualmente
  alternatives_spanish:
  - uno por uno
  - a cada uno
  - a cada hijo por separado
  lexicon: LSJ
  rationale: El giro κατά + εἷς expresa distribución ('uno por uno'). El POB inglés explicita la fuerza distributiva con 'each son individually.' En español, 'a cada hijo individualmente' reproduce esa misma explicitación; 'uno por uno' es más coloquial pero conserva bien el valor distributivo y se ofrece como alternativa en nota.
- source_word: παῖδα
  english_pob_choice: son
  chosen_spanish: hijo
  alternatives_spanish:
  - niño
  - muchacho
  - vástago
  lexicon: LSJ
  rationale: παῖς puede significar 'niño,' 'hijo' o 'muchacho.' En este contexto los referentes son los hijos varones de la madre, por lo que 'hijo' es la traducción más precisa y natural en español, en línea con la elección 'son' del POB inglés.
- source_word: ὁμοῦ πάντας
  english_pob_choice: all of them together
  chosen_spanish: a todos ellos juntos
  alternatives_spanish:
  - a todos juntos
  - a todos a la vez
  lexicon: LSJ
  rationale: ὁμοῦ aporta el sentido de 'en conjunto' y πάντας (acus. pl.) la totalidad. 'A todos ellos juntos' preserva ambos elementos; el pronombre 'ellos' ancla la referencia a los hijos ya mencionados. 'A todos juntos' es igualmente válido y más conciso.
- source_word: ἡ μήτηρ
  english_pob_choice: the mother
  chosen_spanish: la madre
  lexicon: LSJ
  rationale: Referencia nominal directa; el artículo determinado del griego se representa con 'la' en español sin dificultad.
- source_word: προέτρεπεν
  english_pob_choice: urged … toward
  chosen_spanish: exhortaba
  alternatives_spanish:
  - instaba
  - alentaba
  - impulsaba
  lexicon: LSJ
  rationale: προτρέπω significa 'exhortar,' 'animar,' 'impulsar hacia.' El imperfecto griego indica acción continuada o repetida; 'exhortaba' reproduce ese aspecto imperfectivo en español. La dirección hacia la muerte está expresada por ἐπί + acusativo en la frase siguiente, por lo que no se necesita añadir 'hacia' al verbo mismo. 'Instaba' es más enérgico; 'impulsaba' preservaría el prefijo προ- (hacia adelante), pero 'exhortaba' es más natural en contexto de exhortación religiosa.
- source_word: τὸν τῆς εὐσεβείας θάνατον
  english_pob_choice: toward death for the sake of godliness
  chosen_spanish: hacia la muerte por causa de la piedad
  alternatives_spanish:
  - hacia la muerte en aras de la piedad
  - hacia la muerte que la piedad exige
  - hacia una muerte de piedad
  lexicon: LSJ
  rationale: 'ἐπί + acusativo expresa dirección (''hacia''). El genitivo τῆς εὐσεβείας califica θάνατον: puede leerse como la muerte caracterizada por la piedad o la muerte sufrida por causa de ella. El POB inglés optó por ''for the sake of godliness,'' haciendo explícita la relación causal/teleológica. ''Por causa de la piedad'' reproduce esa opción interpretativa en español de forma clara; ''en aras de'' es más elevado pero igualmente correcto. Se conserva la tensión semántica del genitivo en nota.'
- source_word: τῆς εὐσεβείας
  english_pob_choice: godliness
  chosen_spanish: piedad
  alternatives_spanish:
  - devoción religiosa
  - reverencia hacia Dios
  - fidelidad a Dios
  lexicon: LSJ
  rationale: εὐσέβεια es el término central de 4 Macabeos para la devoción reverente hacia Dios y la fidelidad a su ley. El POB inglés eligió 'godliness' por su accesibilidad moderna. En español bíblico, 'piedad' es el equivalente canónico establecido (cf. 1 Tim 4:8; Tit 1:1) y recoge el mismo campo semántico de reverencia y fidelidad religiosa. Aunque en español coloquial 'piedad' puede evocar 'compasión,' el contexto teológico-martirial disipa esa ambigüedad. 'Devoción' es más transparente pero más débil; 'reverencia hacia Dios' es explicativo en exceso.
theological_decisions:
- issue: Traducción de εὐσέβεια en contexto de martirio
  english_pob_reading: godliness
  chosen_spanish_reading: piedad
  alternative_spanish_readings:
  - devoción religiosa
  - reverencia hacia Dios
  rationale: '4 Macabeos articula la muerte de los hermanos como expresión suprema de εὐσέβεια: la devoción fiel a Dios y a la Torá ante la presión del tirano. El POB inglés optó por ''godliness'' como término accesible que preserva la dimensión religiosa sin importar vocabulario técnico posterior. En español, ''piedad'' cumple la misma función: es el término bíblico-teológico establecido para la disposición de reverencia y fidelidad hacia Dios, y no introduce anacrónicos matices doctrinales. Se anota en nota la ambigüedad del genitivo griego (''muerte de piedad'' vs. ''muerte por la piedad'').'
  doctrine_reference: Filosofía de traducción §6; coherencia de términos clave §5; teología del martirio en 4 Macabeos
- issue: Fuerza direccional de ἐπί + acusativo con θάνατον
  english_pob_reading: toward death
  chosen_spanish_reading: hacia la muerte
  alternative_spanish_readings:
  - a la muerte
  - para la muerte
  rationale: 'ἐπί + acusativo expresa dirección o meta: la exhortación de la madre orienta a los hijos hacia la muerte como destino. ''Hacia la muerte'' preserva esa fuerza direccional mejor que la mera preposición ''a,'' que puede leerse como dativo de destino sin la misma intensidad de impulso deliberado. El contexto martirial refuerza que la madre no solo permite sino que activamente orienta a sus hijos en esa dirección.'
  doctrine_reference: LSJ s.v. ἐπί B.III; narrativa martirial de 4 Macabeos
translation_notes:
  revision_awareness: El POB inglés pasó por una revisión (2026-04-23, gpt-5.4) que eliminó 'on' de 'on toward,' dejando 'toward death.' El español 'hacia la muerte' refleja directamente esa lectura final depurada, sin necesidad de ajuste adicional. No se detectan otros cambios en el historial de revisiones que afecten las opciones léxicas o teológicas del borrador español.
  spanish_consistency_notes:
  - '''Piedad'' se usa aquí para εὐσέβεια; este término debe coordinarse con su traducción en todos los demás versículos de 4 Macabeos que usen εὐσέβεια o cognados (εὐσεβής, εὐσεβῶς) para mantener coherencia terminológica a lo largo del libro.'
  - El imperfecto 'exhortaba' preserva el aspecto imperfectivo del griego προέτρεπεν; mantener esta distinción aspectual en el conjunto del capítulo ayuda a reproducir la caracterización narrativa de la acción sostenida de la madre.
  - Yahvé no aparece en este versículo; la norma del proyecto de usar 'Yahvé' para יהוה/YHWH no se aplica aquí.
  - '''Hijo'' (para παῖς en contexto de los hermanos mártires) debe verificarse frente a los versículos circundantes del capítulo 15 para asegurar uniformidad en el tratamiento de παῖς / τέκνον a lo largo del discurso narrativo.'
