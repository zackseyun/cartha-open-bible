translation:
  language: es
  text: Les mutiló las pupilas de los ojos[a], les cortó las lenguas y los mató con diversas torturas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'κόραι τῶν ὀμμάτων: lit. «las pupilas de los ojos». El verbo ἐπήρωσεν (mutilar, inutilizar) con este objeto implica la destrucción violenta de la vista, sin que el griego precise si la extracción fue literal. Algunas versiones optan por «vació las cuencas» o «cegó», pero estos van más allá de lo que el término indica.'
    reason: lexical_alternative
  - marker: b
    text: 'βασάνοις ποικίλαις: dativo instrumental; ποικίλαις puede traducirse también «variadas» o «de toda clase». La alternativa «con tormentos variados» es igualmente válida.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τὰς τῶν ὀμμάτων κόρας
  english_pob_choice: the pupils of their eyes
  chosen_spanish: las pupilas de los ojos
  alternatives_spanish:
  - las cuencas de los ojos
  - los globos oculares
  - los ojos
  lexicon: LSJ
  rationale: κόρη en contexto anatómico designa la pupila, el centro del ojo. 'Las pupilas de los ojos' refleja la precisión del original, en paralelo con la decisión POB en inglés. 'Las cuencas' remitiría a las órbitas, no al objeto exacto; 'los globos oculares' es calco anatómico moderno que supera el sentido del término griego. En español se emplea el artículo definido con dativo posesivo 'les' en lugar del posesivo explícito, que es la construcción más natural.
- source_word: ἐπήρωσεν
  english_pob_choice: mutilated (revised from 'gouged out')
  chosen_spanish: mutiló
  alternatives_spanish:
  - sacó
  - vació
  - cegó
  - destruyó
  lexicon: LSJ
  rationale: ἐπηρόω significa mutilar, inutilizar, privar de un miembro o sentido. La revisión del POB en inglés pasó de 'gouged out' a 'mutilated' para mayor fidelidad léxica, al no exigir el griego una extracción física literal. 'Mutiló' sigue esa lectura revisada y es el equivalente más directo en español. 'Cegó' recoge solo el resultado; 'sacó' o 'vació' sobreespecifican la acción de un modo que el griego no exige.
- source_word: γλώσσας ἐξέτεμεν
  english_pob_choice: cut out their tongues
  chosen_spanish: les cortó las lenguas
  alternatives_spanish:
  - les extirpó las lenguas
  - les arrancó las lenguas
  - les cercenó las lenguas
  lexicon: LSJ
  rationale: ἐκτέμνω significa cortar, extirpar. 'Cortó las lenguas' es la traducción más directa e idiomática en español; el dativo de interés 'les' indica posesión, que en español sustituye al posesivo. 'Extirpó' es demasiado clínico para el tono narrativo; 'arrancó' introduce violencia no específicamente marcada en el verbo griego.
- source_word: βασάνοις ποικίλαις
  english_pob_choice: with various tortures
  chosen_spanish: con diversas torturas
  alternatives_spanish:
  - con tormentos variados
  - con toda clase de tormentos
  - mediante tormentos múltiples
  lexicon: LSJ
  rationale: βάσανοι son torturas/tormentos; ποικίλαις indica variedad o multiplicidad de tipos. 'Diversas torturas' mantiene el dativo instrumental y la idea de pluralidad. El adjetivo antepuesto 'diversas' enfatiza la variedad, fiel a ποικίλαις. 'Tormentos' es igualmente válido y se ofrece como variante en nota.
- source_word: ἀπέκτεινεν
  english_pob_choice: killed them
  chosen_spanish: los mató
  alternatives_spanish:
  - les dio muerte
  - los ejecutó
  - los ultimó
  lexicon: LSJ
  rationale: ἀποκτείνω es el verbo griego estándar para matar. 'Los mató' es directo, sin adornos y completamente natural en español moderno. El objeto 'los' se infiere del contexto, como el griego también elide el objeto explícito aquí. 'Les dio muerte' es más formal pero no añade fidelidad.
translation_notes:
  revision_awareness: El POB en inglés fue revisado de «He gouged out the pupils of their eyes» a «He mutilated the pupils of their eyes» (revisión de 2026-04-23, modelo gemini-3.1-pro-preview) para mayor precisión léxica respecto de ἐπήρωσεν, que no exige necesariamente extracción física. El español «mutiló» adopta esta lectura revisada y no vuelve a la opción «sacó/vació» que correspondería al descartado «gouged out».
  spanish_consistency_notes:
  - No aparece terminología teológica especial en este versículo (YHWH, Mesías, espíritu, etc.), por lo que no se aplican los valores predeterminados del proyecto.
  - El sujeto tácito de tercera persona singular ('él') es coherente con el contexto narrativo de 4 Macabeos 18, donde el perseguidor (Antíoco) es el agente implícito.
  - Los pronombres 'les' (dativo posesivo) y 'los' (acusativo) mantienen referencia consistente a las víctimas del martirio a lo largo de la cláusula.
  - Se usa dativo posesivo ('les mutiló las pupilas', 'les cortó las lenguas') en lugar del posesivo adjetivo ('sus pupilas', 'sus lenguas'), conforme al uso más natural del español latinoamericano moderno.
