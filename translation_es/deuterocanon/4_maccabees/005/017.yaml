lexical_decisions:
- source_word: διὸ
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: LSJ
  rationale: Introduce la conclusión inferida del contexto previo con una fórmula natural y formal en español.
- source_word: δὴ
  english_pob_choice: indeed
  chosen_spanish: en efecto
  alternatives_spanish:
  - ciertamente
  - de hecho
  lexicon: LSJ
  rationale: Reproduce el matiz enfático de la partícula sin sobrecargar el estilo ni duplicar la conclusión ya marcada por 'Por tanto'.
- source_word: κατʼ οὐδένα τρόπον
  english_pob_choice: in no way
  chosen_spanish: 'no'
  alternatives_spanish:
  - de ningún modo
  - en ninguna manera
  lexicon: LSJ
  rationale: El giro griego expresa negación absoluta; en español, la construcción 'no quebrantar' comunica esa fuerza de manera fluida y directa.
- source_word: παρανομεῖν
  english_pob_choice: break the law
  chosen_spanish: quebrantar la ley
  alternatives_spanish:
  - transgredir la ley
  - actuar contra la ley
  lexicon: LSJ
  rationale: '''Quebrantar la ley'' conserva el sentido jurídico y moral del verbo y es un equivalente idiomático digno en español bíblico moderno.'
- source_word: ἀξιοῦμεν
  english_pob_choice: we consider it right
  chosen_spanish: consideramos justo
  alternatives_spanish:
  - juzgamos propio
  - estimamos correcto
  lexicon: LSJ
  rationale: La expresión refleja el juicio deliberado de lo que se estima debido o justo, ajustándose al valor del infinitivo en contexto.
theological_decisions:
- issue: Naturaleza de 'la ley' en el contexto
  english_pob_reading: Rendered generically as 'the law' without specifying Mosaic law in the English text.
  chosen_spanish_reading: '''la ley'' sin mayúscula ni aclaración adicional'
  alternative_spanish_readings:
  - la Ley
  - la ley de Moisés
  rationale: El griego no añade calificativo explícito; mantener la forma genérica preserva la cautela textual y evita importar una precisión no expresada aquí.
  doctrine_reference: Primacía del texto original y preservación de la tensión contextual sin resolverla artificialmente.
translation_notes:
