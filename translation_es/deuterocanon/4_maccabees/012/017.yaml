translation:
  language: es
  text: No renunciaré al testimonio de mis hermanos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el testimonio de mis hermanos» puede entenderse como «el testimonio dado por mis hermanos»; en este contexto la palabra también evoca matices asociados con el martirio.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὐκ
  english_pob_choice: not
  chosen_spanish: 'No'
  alternatives_spanish:
  - No ...
  lexicon: LSJ
  rationale: La negación griega gobierna directamente el verbo; en español se expresa de forma simple y natural con «No» al inicio de la oración.
- source_word: ἀπαντυμολοῶ
  english_pob_choice: I will renounce
  chosen_spanish: renunciaré
  alternatives_spanish:
  - negaré
  - retractaré
  - repudiaré
  lexicon: LSJ
  rationale: El verbo apunta a rechazar o repudiar bajo presión. «Renunciaré» conserva la fuerza de la negativa y encaja bien con el contexto martirial sin añadir un matiz más fuerte que el del griego.
- source_word: μαρτυρίας
  english_pob_choice: testimony
  chosen_spanish: testimonio
  alternatives_spanish:
  - testimonio
  - testigo
  - martirio
  lexicon: LSJ
  rationale: «Testimonio» reproduce el sentido básico de μαρτυρία sin convertirlo en una traducción interpretativa como «martirio». El trasfondo martirial queda sugerido por el contexto, no explicitado en la palabra.
- source_word: τῶν ἀδελφῶν μου
  english_pob_choice: of my brothers
  chosen_spanish: de mis hermanos
  alternatives_spanish:
  - de mis hermanos
  - de mis hermanos y hermanas
  lexicon: LSJ
  rationale: El referente narrativo son hermanos varones; por eso se conserva el valor específico del plural masculino con «mis hermanos».
theological_decisions:
- issue: Si μαρτυρίας debe leerse explícitamente como lenguaje de martirio
  english_pob_reading: testimony
  chosen_spanish_reading: testimonio
  alternative_spanish_readings:
  - martirio
  - testimonio connota martirio
  rationale: 'Siguiendo la auditoría inglesa, se evita traducir el sustantivo como «martirio», porque eso impondría una interpretación que el griego no expresa de manera directa. La tensión teológica permanece: en 4 Macabeos el testimonio está enmarcado por el sufrimiento de los mártires, pero aquí el término sigue siendo ordinario.'
  doctrine_reference: Preservar la tensión lexical y teológica sin resolverla de manera excesiva; optimal-equivalence.
translation_notes:
  revision_awareness: El texto griego es breve y de alta concordancia con la auditoría inglesa; no se detectan revisiones aplicadas ni cambios necesarios respecto del sentido base. Se mantiene la elección «testimonio» para μαρτυρίας, con nota alternativa que preserva la resonancia martirial sin convertirla en una paráfrasis.
  spanish_consistency_notes:
  - Se mantiene el registro sobrio y bíblico, con español moderno y digno.
  - Se evita «Cristo»/«Señor» o vocabulario eclesial ajeno al versículo.
  - La nota usa una alternativa semántica cercana sin desplazar el sentido principal del texto.
