translation:
  language: es
  text: El autocontrol, pues, es dominio sobre los deseos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: σωφροσύνη
  english_pob_choice: self-control
  chosen_spanish: templanza
  alternatives_spanish:
  - autodominio
  - autocontrol
  - sobriedad
  lexicon: LSJ
  rationale: El inglés POB eligió una virtud ética práctica. En español, «templanza» es una traducción clásica y comprensible para esa virtud; conserva el campo moral de moderación y gobierno de sí, aunque no reproduce de forma mecánica el inglés «self-control». Se prefiere aquí por su naturalidad bíblica y filosófica.
- source_word: δὴ τοίνυν
  english_pob_choice: then
  chosen_spanish: pues
  alternatives_spanish:
  - entonces
  - por tanto
  - así pues
  lexicon: LSJ
  rationale: Las partículas griegas marcan una transición inferencial con énfasis. «Pues» comunica bien esa conexión discursiva en español sin sobrecargar la frase. «Entonces» y «por tanto» serían posibles, pero aquí sonarían más rígidas o más explícitamente conclusivas que el griego.
- source_word: ἐστὶν
  english_pob_choice: is
  chosen_spanish: es
  alternatives_spanish:
  - consiste en
  - resulta ser
  lexicon: LSJ
  rationale: Copulativo simple en una definición. «Es» conserva la estructura definicional sin añadir matices no presentes en el griego.
- source_word: ἐπικράτεια
  english_pob_choice: mastery
  chosen_spanish: dominio
  alternatives_spanish:
  - maestría
  - control
  - señorío
  lexicon: LSJ
  rationale: «Dominio» transmite la idea de prevalecer o ejercer gobierno sobre algo, equivalente funcional de «mastery». «Control» es posible, pero menos fuerte; «maestría» puede sonar más abstracta; «señorío» suena más marcado y menos natural en este contexto ético.
- source_word: τῶν ἐπιθυμιῶν
  english_pob_choice: over desires
  chosen_spanish: sobre los deseos
  alternatives_spanish:
  - sobre las pasiones
  - sobre las ansias
  - sobre los apetitos
  lexicon: LSJ
  rationale: «Deseos» conserva el sentido amplio de ἐπιθυμίαι sin restringirlo a apetitos físicos o pasiones intensas. La preposición «sobre» refleja de forma idiomática la relación de dominio expresada por ἐπικράτεια.
translation_notes:
  revision_awareness: 'El texto griego y el contexto de auditoría inglesa muestran alta concordancia: se trata de una definición breve y directa de una virtud ética. No se requirieron revisiones textuales ni ajustes doctrinales.'
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y publicable, evitando calcos excesivamente literales.
  - No se añadió ninguna nota doctrinal porque el pasaje es definicional y no presenta tensión teológica explícita.
  - «Deseos» se dejó en plural para reflejar el genitivo plural griego.
  - La puntuación reproduce una afirmación sentenciosa breve, coherente con el tono del original.
