translation:
  language: es
  text: Pero no así los pecadores y los transgresores[a], quienes amaron un día en la participación de su pecado; su deseo estaba en la pequeñez de la corrupción[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Gr. παράνομοι, literalmente «los que actúan fuera/contra la ley» o «los sin-ley». Se preservan como categorías distintas ἁμαρτωλοί (pecadores) y παράνομοι (transgresores de la ley), evitando colapsar los dos términos en uno solo.
    reason: lexical_alternative
  - marker: b
    text: 'Gr. ἐν μικρότητι σαπρίας. μικρότης puede significar «pequeñez», «brevedad» (temporal, contrastando con la eternidad de los piadosos en el v. 3) o «mezquindad» (moral); σαπρία denota descomposición o podredumbre. También posible: «en la brevedad de la podredumbre» o «en la mezquindad de la corrupción».'
    reason: textual_variant
lexical_decisions:
- source_word: καὶ οὐχ οὕτως
  english_pob_choice: But not so
  chosen_spanish: Pero no así
  alternatives_spanish:
  - Y no así
  - No de esta manera
  lexicon: LSJ
  rationale: '''Pero no así'' reproduce la fuerza contrastiva que marca la transición desde los justos (v. 3) a los impíos. ''Pero'' refuerza la oposición más naturalmente que ''Y'' en español, y ''así'' calca el οὕτως sin expansión.'
- source_word: οἱ ἁμαρτωλοὶ καὶ παράνομοι
  english_pob_choice: the sinners and the lawless
  chosen_spanish: los pecadores y los transgresores
  alternatives_spanish:
  - los pecadores y los que viven fuera de la ley
  - los pecadores y los rebeldes a la ley
  - los malvados e inicuos
  lexicon: BDAG
  rationale: Se preservan las dos categorías distintas. ἁμαρτωλοί = 'pecadores' (registro neutro y directo). παράνομοι (para + nomos) porta fuerza jurídico-moral de «actuar contra la ley»; 'transgresores' captura esa dimensión legal sin ser artificioso, y es preferible a 'los sin-ley' (calco torpe) o 'los malvados' (que colapsa ambos términos). Véase nota [a].
- source_word: οἱ ἠγάπησαν ἡμέραν
  english_pob_choice: who loved a day
  chosen_spanish: quienes amaron un día
  alternatives_spanish:
  - que amaron el día
  - que se complacieron en un día
  lexicon: LSJ
  rationale: 'El griego es comprimido: ἡμέραν en singular acusativo, objeto directo de ἠγάπησαν. ''Amaron un día'' preserva la singularidad que sugiere un breve lapso de tiempo apreciado, en contraste con la plantación eterna de los piadosos (v. 3). ''El día'' (artículo definido) generalizaría indebidamente.'
- source_word: ἐν μετοχῇ ἁμαρτίας αὐτῶν
  english_pob_choice: in sharing their sin
  chosen_spanish: en la participación de su pecado
  alternatives_spanish:
  - en compartir su pecado
  - en la comunión de su pecado
  - en la complicidad de su pecado
  lexicon: BDAG
  rationale: μετοχή denota participación o acción compartida. 'En la participación de su pecado' sigue el ἐν + sustantivo del griego y es más precisa que 'en compartir' (que introduce un infinitivo no presente en el texto). 'Comunión' (κοινωνία) podría confundirse con terminología eucarística; se prefiere 'participación'.
- source_word: ἐν μικρότητι σαπρίας
  english_pob_choice: in the smallness of corruption
  chosen_spanish: en la pequeñez de la corrupción
  alternatives_spanish:
  - en la brevedad de la corrupción
  - en la mezquindad de la podredumbre
  - en la corrupción mezquina
  lexicon: LSJ
  rationale: μικρότης abarca 'pequeñez', 'brevedad' (temporal) y 'mezquindad' (moral). El inglés POB final optó por 'smallness' tras revisar 'brevity' y 'petty'; el español 'pequeñez' sigue esa decisión y mantiene la ambigüedad productiva entre tamaño y valor moral sin colapsar la frase. σαπρία denota descomposición o podredumbre; 'corrupción' es amplio y sostenido en el registro. 'Podredumbre' estaría igualmente justificado. Véase nota [b].
- source_word: ἡ ἐπιθυμία αὐτῶν
  english_pob_choice: their desire was
  chosen_spanish: su deseo estaba
  alternatives_spanish:
  - su anhelo era
  - su codicia estaba
  lexicon: BDAG
  rationale: ἐπιθυμία es 'deseo' o 'anhelo' (no necesariamente concupiscencia sexual). 'Su deseo estaba en…' reproduce la estructura griega con ἐν y el sujeto nominal, resultando en español natural. 'Codicia' añadiría matiz codicioso no exigido por el contexto.
translation_notes:
  revision_awareness: 'El inglés POB pasó por dos revisiones en ἐν μικρότητι σαπρίας: primero «petty corruption» (corrupción mezquina), luego «the brevity of corruption» (gemini, apelando al sentido temporal de μικρότης como «brevedad»), y finalmente «the smallness of corruption» (gpt-5.4, priorizando el sentido cuantitativo). La tensión entre los tres sentidos de μικρότης —brevedad, pequeñez y mezquindad— es legítima y no fue resuelta definitivamente en el inglés. La versión española «la pequeñez de la corrupción» sigue el estado final del texto inglés, pero la nota [b] preserva «brevedad» y «mezquindad» como alternativas documentadas en el historial de revisiones, para transparencia de la cadena de auditoría POB.'
  spanish_consistency_notes:
  - No aparece יהוה/κύριος ni terminología mesiánica en este versículo; las convenciones de nomenclatura del proyecto no aplican aquí.
  - ἁμαρτία → 'pecado' (uso estándar del proyecto; sin tensión terminológica en este contexto).
  - ἐπιθυμία → 'deseo' (no 'lujuria' ni 'codicia'); el contexto apunta a ambición o inclinación general, no a concupiscencia sexual.
  - El versículo termina con coma en el griego, indicando que la frase continúa; la traducción española preserva esa apertura sintáctica con coma final.
  - Se evitó la fraseología Reina-Valera («los impíos», «las malas concupiscencias») en favor de equivalentes modernos y anclados en el léxico griego.
