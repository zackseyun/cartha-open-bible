translation:
  language: es
  text: Fueron expulsados de la herencia que el Señor les dio; la dispersión de Israel está entre toda nación[a], según la palabra de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Israel está disperso entre toda nación».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπερρίφησαν
  english_pob_choice: were cast out
  chosen_spanish: fueron arrojados
  alternatives_spanish:
  - fueron rechazados
  - fueron expulsados
  - fueron desechados
  lexicon: BDAG
  rationale: El aoristo pasivo indica remoción forzosa y violenta. 'Fueron arrojados' preserva esa fuerza física y la gravedad del destierro; 'fueron rechazados' desplazaría el énfasis hacia lo emocional-relacional más que hacia el acto de expulsión, y 'fueron expulsados' tiene un matiz administrativo que el griego no requiere.
- source_word: κληρονομίας
  english_pob_choice: inheritance
  chosen_spanish: herencia
  alternatives_spanish:
  - patrimonio
  - posesión
  lexicon: BDAG
  rationale: '''Herencia'' es el término estándar en el español bíblico para la porción covenantal dada por Dios, especialmente la tierra. Conserva el peso teológico de una donación divina transmitida; ''patrimonio'' es más jurídico-secular y ''posesión'' aplana la dimensión de don recibido.'
- source_word: Κύριος
  english_pob_choice: Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  lexicon: BDAG
  rationale: Los valores predeterminados del proyecto reservan 'Yahvé' para יהוה/YHWH en texto hebreo, e indican que cuando la fuente inmediata es el griego κύριος que cita o alude al nombre divino, se debe explicar la decisión. Los Salmos de Salomón se conservan únicamente en griego; no existe Vorlage hebreo atestiguado que permita verificar si κύριος aquí sustituye al Tetragrámaton. El POB inglés documentó explícitamente la elección 'Lord' como norma del proyecto para κύριος en contexto covenantal. Se adopta 'el Señor' en coherencia con esa decisión auditada, reconociendo que en un texto deuterocanonical de origen lingüístico incierto la equivalencia con el nombre divino hebreo es probable pero no verificable.
- source_word: διασπορὰ
  english_pob_choice: dispersion
  chosen_spanish: la dispersión
  alternatives_spanish:
  - la diáspora
  - el destierro
  - el esparcimiento
  lexicon: BDAG
  rationale: El griego emplea el sustantivo, no una cláusula verbal. 'La dispersión' preserva esa forma nominal y el sentido técnico establecido de Israel esparcido entre las naciones. 'La diáspora' es un calco comprensible en español, pero 'dispersión' es más transparente para un lector hispano general. 'El destierro' interpretaría demasiado al implicar exilio político más que esparcimiento geográfico.
- source_word: ῥῆμα
  english_pob_choice: word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el decreto
  - el mandato
  - el dicho
  lexicon: BDAG
  rationale: '''La palabra'' es la traducción más directa y deja abierto si el énfasis recae en el habla divina, la promesa o el decreto. ''El decreto'' y ''el mandato'' estrecharían la interpretación más allá de lo que el griego exige, siguiendo la misma lógica del POB inglés.'
theological_decisions:
- issue: 'Rendering of διασπορά: nominal vs. verbal'
  english_pob_reading: 'Retained the nominal expression: ''the dispersion of Israel is among every nation'''
  chosen_spanish_reading: la dispersión de Israel está entre todas las naciones
  alternative_spanish_readings:
  - Israel está disperso entre todas las naciones
  rationale: La cláusula griega es nominal (ἡ διασπορὰ τοῦ Ἰσραὴλ como sujeto, ἐν παντὶ ἔθνει como predicado locativo). Preservar la forma nominal en español es gramaticalmente natural y mantiene la fidelidad a la construcción de la fuente sin suavizar ni interpretar en exceso, en línea con la decisión documentada en el POB inglés.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency of key terms, or documented exception.
- issue: Κύριος como alusión al nombre divino en texto deuterocanonical
  english_pob_reading: Lord — Per project doctrine, κύριος is normally rendered 'Lord.' Here it refers to Israel's God in a covenantal setting.
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  rationale: Dado que los Salmos de Salomón no tienen Vorlage hebreo atestiguado que confirme el Tetragrámaton en esta posición, y que el POB inglés documentó explícitamente 'Lord' como la elección del proyecto para κύριος aquí, se mantiene 'el Señor'. La tensión entre 'el Señor' (seguir el griego) y 'Yahvé' (seguir la norma del proyecto para el nombre divino) se registra en decisión léxica.
  doctrine_reference: If the immediate source is Greek κύριος quoting or alluding to the divine name, explain the decision.
translation_notes:
  revision_awareness: El POB inglés pasó revisión sin cambios (modelo gpt-5.4, 2026-04-23) y obtuvo acuerdo pleno (1.0) del revisor gemini-3.1-pro-preview. No hay revisiones aplicadas que modifiquen el texto base. Este borrador español se alinea con la versión estable auditada del inglés.
  spanish_consistency_notes:
  - '''el Señor'' para κύριος en contexto covenantal deuterocanonical, coherente con la decisión auditada del POB inglés y con la instrucción del proyecto de explicar κύριος cuando alude al nombre divino.'
  - '''Dios'' para θεός per los valores predeterminados del proyecto.'
  - '''la dispersión'' preserva la forma nominal de διασπορά, evitando la interpretación verbal que el texto griego no requiere.'
  - '''herencia'' para κληρονομία en contexto de don covenantal divino, terminología estándar del español bíblico.'
  - El número del marcador de nota al pie [a] sigue la secuencia del POB inglés para facilitar la comparación cruzada.
