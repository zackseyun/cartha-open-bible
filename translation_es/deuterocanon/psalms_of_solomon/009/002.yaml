  source_alignment_summary: 'El borrador sigue bien el griego y el rastro auditado en los puntos principales: ἀπερρίφησαν como expulsión forzosa, κληρονομίας como herencia, διασπορά conservada como sustantivo, y ῥῆμα como palabra. También preserva la alternativa nominal/verbal en nota. Sin embargo, ἐν παντὶ ἔθνει significa ''en toda nación'' o ''entre toda nación / entre cada nación'', no ''entre todas las naciones'' como plural explícito; el inglés auditado ya tomó el singular distributivo (''among every nation''), y el español debería reflejarlo mejor.'
  spanish_quality_summary: El español es claro y digno, pero puede afinarse para mayor fidelidad y naturalidad. 'Fueron arrojados de la herencia' es entendible, aunque 'expulsados de la herencia' suena más idiomático en español bíblico sin perder la fuerza de remoción. La cláusula nominal funciona bien, pero conviene ajustar 'entre todas las naciones' a 'entre toda nación' para seguir el singular distributivo del griego. La nota también debe armonizarse con ese ajuste.
  glossary_alignment: Buena alineación general con la terminología del proyecto y las decisiones del POB inglés. El uso de 'el Señor' para κύριος está documentado y explicado de forma suficiente para este texto griego deuterocanónico. 'La dispersión' y 'la palabra de Dios' también concuerdan con las decisiones auditadas.
  issues:
  - severity: medium
    issue: ἐν παντὶ ἔθνει se vertió como 'entre todas las naciones'
    rationale: El griego usa singular distributivo ('en toda nación', 'entre cada nación'), y el POB inglés lo preserva con 'among every nation'. El plural español introduce una pequeña nivelación no requerida por la fuente.
  - severity: low
    issue: La nota alternativa repite el plural 'todas las naciones'
    rationale: Si se corrige el texto principal para reflejar el singular distributivo, la nota también debe ajustarse para mantener coherencia con la fuente y con la alternativa inglesa.
  - severity: low
    issue: '''Arrojados de la herencia'' es algo áspero en español'
    rationale: Aunque fiel en fuerza semántica, 'expulsados de la herencia' o 'echados fuera de la herencia' suena más natural. No es un error grave, pero sí una mejora estilística útil.
  revised_spanish_text: Fueron expulsados de la herencia que el Señor les dio; la dispersión de Israel está entre toda nación[a], según la palabra de Dios.
