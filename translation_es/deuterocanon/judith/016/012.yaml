translation:
  language: es
  text: Los hijos de doncellas los traspasaron, y los hirieron como a hijos de desertores[a]; perecieron ante la línea de batalla[b] de mi Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los hirieron como a hijos de fugitivos». La expresión griega con «desertor/fugitivo» es difícil y puede evocar debilidad, inestabilidad o deshonra.
    reason: lexical_alternative
  - marker: b
    text: O «perecieron desde la línea de batalla de mi Señor» / «fuera de la formación de batalla de mi Señor». La frase preposicional griega es algo difícil.
    reason: alternative_reading
lexical_decisions:
- source_word: υἱοὶ κορασίων
  english_pob_choice: The sons of maidens
  chosen_spanish: Los hijos de doncellas
  alternatives_spanish:
  - los hijos de jóvenes
  - los hijos de muchachas
  - los hijos de mozas
  lexicon: LSJ
  rationale: κοράσιον denota una joven o muchacha. El inglés POB eligió 'maidens' en la revisión final para un registro formal y literario. 'Doncellas' reproduce ese mismo nivel de formalidad en español y mantiene la imagen llamativa de que incluso los hijos de mujeres jóvenes y aparentemente vulnerables derrotaron al enemigo. 'Jóvenes' sería más neutro y moderno; 'muchachas' resultaría demasiado coloquial para un himno.
- source_word: κατεκέντησαν
  english_pob_choice: pierced them through
  chosen_spanish: los traspasaron
  alternatives_spanish:
  - los atravesaron
  - los acribillaron
  - los acuchillaron
  lexicon: LSJ
  rationale: El compuesto κατα+κεντέω intensifica el simple 'pinchar/herir con un objeto punzante'; la fuerza es atravesar de parte a parte. 'Traspasaron' en español transmite exactamente esa idea de perforación completa con arma. 'Acribillaron' implicaría múltiples heridas en lugar de una acción de atravesar; 'atravesaron' es sinónimo válido pero 'traspasaron' resulta más vívido y preciso.
- source_word: παῖδας
  english_pob_choice: children
  chosen_spanish: hijos
  alternatives_spanish:
  - niños
  - muchachos
  - siervos
  lexicon: LSJ
  rationale: παῖς puede significar niño, muchacho o servidor según el contexto. Aquí aparece en genitivo dependiente de αὐτομολούντων ('de desertores'), funcionando como comparación con personas indefensas o despreciadas en batalla. 'Hijos de desertores' en español es la construcción más natural y evoca la imagen de herencia de vergüenza y debilidad; 'niños de desertores' sonaría redundante junto a la idea de inmadurez ya implícita.
- source_word: αὐτομολούντων
  english_pob_choice: deserters
  chosen_spanish: desertores
  alternatives_spanish:
  - fugitivos
  - traidores
  - renegados
  lexicon: LSJ
  rationale: 'αὐτομολέω significa desertar o pasarse al bando contrario. El inglés POB revisado eligió ''deserters'' sobre ''runaways'' para reflejar más exactamente el sentido léxico. ''Desertores'' en español es el calco directo y más preciso: evoca cobardía, instabilidad y deshonra en contexto militar, que es la fuerza retórica de la comparación. ''Fugitivos'' perdería el matiz de traición; ''traidores'' añadiría una dimensión moral no necesariamente presente en el original.'
- source_word: ἐτίτρωσκον
  english_pob_choice: wounded
  chosen_spanish: herían
  alternatives_spanish:
  - hirieron
  - laceraban
  - lastimaban
  lexicon: LSJ
  rationale: El imperfecto griego ἐτίτρωσκον indica acción repetida o continua. El español 'herían' (imperfecto de 'herir') reproduce fielmente esa aspecto durativo, a diferencia del pretérito indefinido 'hirieron', que indicaría acción puntual. Este es un punto donde el español puede ser más preciso que el inglés 'wounded', que no marca el aspecto tan claramente.
- source_word: ἀπώλοντο
  english_pob_choice: they perished
  chosen_spanish: perecieron
  alternatives_spanish:
  - fueron destruidos
  - murieron
  - se perdieron
  lexicon: LSJ
  rationale: 'El aoristo medio-pasivo de ἀπόλλυμι expresa resultado definitivo sin especificar el agente con precisión. ''Perecieron'' es el equivalente más natural en español: preserva el matiz de destrucción inevitable sin sobrespecificar causalidad. ''Murieron'' sería demasiado genérico; ''fueron destruidos'' añade pasividad agente más explícita que el griego.'
- source_word: ἐκ παρατάξεως
  english_pob_choice: before the battle line
  chosen_spanish: ante la línea de batalla
  alternatives_spanish:
  - desde la formación de batalla
  - frente al orden de batalla
  - en la ordenanza de batalla
  lexicon: LSJ
  rationale: 'παράταξις designa el ordenamiento o línea de combate. La preposición ἐκ es ambigua: puede ser ablativa (''desde'', ''de'') o indicar posición en relación con la formación. El inglés POB optó por ''before'' para dar sentido espacial de perecer frente a la formación del Señor. ''Ante'' en español reproduce ese sentido con la misma elegancia; ''desde la línea de batalla'' sería otra lectura válida preservada en nota.'
- source_word: κυρίου μου
  english_pob_choice: my Lord
  chosen_spanish: mi Señor
  alternatives_spanish:
  - el Señor mi Dios
  - mi amo
  lexicon: LSJ
  rationale: κύριος se renderiza 'Señor' siguiendo las convenciones del proyecto para el texto griego deuterocanónico (véase decisión teológica). El posesivo 'μου' es explícito en el griego y se conserva. 'Mi Señor' es la expresión natural en español del mismo sintagma. 'Mi amo' diluiría el tono doxológico del himno.
theological_decisions:
- issue: Renderización de κυρίου μου en texto griego deuterocanónico
  english_pob_reading: my Lord
  chosen_spanish_reading: mi Señor
  alternative_spanish_readings:
  - Yahvé mío
  - mi Dios
  rationale: El valor por defecto del proyecto establece que יהוה/YHWH en hebreo se traduce como 'Yahvé' en el texto español principal. Sin embargo, Judith es un libro deuterocanónico cuyo texto base aquí es el griego κύριος, sin equivalente hebreo directo con el tetragrama. Las instrucciones del proyecto requieren explicar la decisión cuando la fuente inmediata es κύριος griego que cita o alude al nombre divino. En este himno (Jdt 16), κύριος claramente designa a Dios, pero dado que el texto fuente es κύριος (no YHWH en letras hebreas), se emplea 'Señor' —en consonancia con el inglés POB 'Lord'— en lugar de 'Yahvé'. Usar 'Yahvé' aquí habría introducido una especificidad hebrea no atestiguada en el texto fuente griego.
  doctrine_reference: 'DOCTRINE.md Términos contestados: κύριος → Lord; יהוה → Yahvé (reservado para el tetragrama hebreo)'
translation_notes:
  revision_awareness: 'El inglés POB pasó por una revisión (azure-gpt-5.4, 2026-04-23) que ajustó dos términos clave: κορασίων de «young women» a «maidens» (registro más formal y literal) y αὐτομολούντων de «runaway children» a «the children of deserters» (más exacto léxicamente). El borrador español sigue ambas decisiones revisadas: «doncellas» refleja el mismo nivel de formalidad que «maidens», y «desertores» reproduce el semantismo de defección militar más precisamente que cualquier equivalente a «runaway». Además, el imperfecto español «herían» para ἐτίτρωσκον aprovecha un recurso gramatical que el inglés no pudo explotar igualmente, dotando al texto de mayor precisión aspectual sin apartarse del original griego.'
  spanish_consistency_notes:
  - «Señor» se emplea para el griego κύριος en texto deuterocanónico sin tetragrama hebreo subyacente; «Yahvé» queda reservado para contextos donde el original hebreo atestigua יהוה.
  - «Doncellas» para κοράσιον sigue el registro formal adoptado en la revisión del inglés POB ('maidens'), manteniendo coherencia con el tono hímnico de Jdt 16.
  - «Desertores» para αὐτομολούντων sigue la decisión revisada del inglés POB ('deserters') y es la opción lexicalmente más precisa en español militar.
  - El imperfecto «herían» para ἐτίτρωσκον preserva el aspecto durativo del griego, coherente con la política del proyecto de no aplanar distinciones aspectuales cuando la lengua meta las puede expresar con naturalidad.
  - «Perecieron» para ἀπώλοντο mantiene la misma voz usada en otros himnos del corpus donde el verbo griego aparece en contexto de destrucción colectiva.
