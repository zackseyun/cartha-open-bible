  source_alignment_summary: 'El borrador español sigue de cerca el griego y el rastro del POB inglés en casi todos los puntos clave: υἱοὶ κορασίων → «hijos de doncellas», κατεκέντησαν → «traspasaron», αὐτομολούντων → «desertores», ἀπώλοντο → «perecieron», κυρίου μου → «mi Señor». También preserva bien la dificultad de ἐκ παρατάξεως con una nota. Sin embargo, el anclaje de la nota [a] en «doncellas» no corresponde al contenido de la nota inglesa preservada para la primera mitad del versículo, que en realidad documenta una alternativa sobre la cláusula difícil con αὐτομολούντων, no sobre κορασίων. Además, el texto español actual convierte la segunda acción en «los herían» con objeto repetido, cuando el griego/inglés comparativo se representa mejor como «los hirieron como a hijos de desertores» o «los herían como se hiere a hijos de desertores».'
