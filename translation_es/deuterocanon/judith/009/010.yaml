translation:
  language: es
  text: Golpea al esclavo con el engaño de mis labios contra el gobernante, y al gobernante contra su servidor; quebranta su soberbia[a] por mano de mujer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su alzamiento» o «su insolencia». El sustantivo griego ἀνάστεμα es poco frecuente y puede denotar tanto la exaltación orgullosa de los enemigos como su levantamiento físico o militar.
    reason: lexical_alternative
lexical_decisions:
- source_word: πάταξον
  english_pob_choice: Strike
  chosen_spanish: Golpea
  alternatives_spanish:
  - Hiere
  - Fulmina
  lexicon: LSJ
  rationale: Imperativo de πατάσσω, golpear/herir. El POB inglés eligió 'Strike' por su claridad y por no especificar muerte. En español, 'Golpea' (golpear) es igualmente claro, moderno y neutro en cuanto al resultado, sin el arcaísmo de 'Hiere' (herir), que en el registro oral moderno sugiere herida específica. Se mantiene el imperativo directo propio de la oración.
- source_word: δοῦλον
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  lexicon: LSJ
  rationale: 'Conforme a los criterios del proyecto, δοῦλος → ''esclavo'' cuando el POB inglés optó por ''slave'' para mantener la fuerza del estatus jurídico. El contraste social con ''gobernante'' (ἄρχων) es esencial en el contexto: Judit pide que Dios enfrente al subordinado con el poderoso. ''Siervo'' suavizaría esa polaridad.'
- source_word: ἐκ χειλέων ἀπάτης μου
  english_pob_choice: with the deceit of my lips
  chosen_spanish: con el engaño de mis labios
  alternatives_spanish:
  - desde mis labios engañosos
  - por el engaño de mis labios
  lexicon: LSJ
  rationale: Literalmente 'desde labios de mi engaño' (genitivo atributivo ἀπάτης → mis labios engañosos). La revisión del POB inglés eliminó 'words' para no añadir lo que el griego no dice; 'con el engaño de mis labios' sigue esa corrección y expresa el medio instrumental de manera natural en español. Judit reconoce abiertamente que su arma es la palabra deceptiva.
- source_word: ἐπʼ ἄρχοντι / ἄρχοντα
  english_pob_choice: against ruler
  chosen_spanish: contra el gobernante
  alternatives_spanish:
  - contra el príncipe
  - contra el jefe
  - contra un gobernante
  lexicon: LSJ
  rationale: ἄρχων designa a quien ejerce autoridad. El POB inglés prefirió el término genérico 'ruler' sobre el más estrecho 'prince'. En español 'gobernante' es el equivalente moderno y neutro que evita el colorido monárquico de 'príncipe'. La forma singular anarticular del griego se resuelve con artículo determinado en español para fluidez, sin alterar la referencia genérica.
- source_word: θεράποντι
  english_pob_choice: attendant
  chosen_spanish: servidor
  alternatives_spanish:
  - asistente
  - sirviente
  lexicon: LSJ
  rationale: 'θεράπων denota un asistente personal de rango superior al δοῦλος genérico. El POB inglés usó ''attendant'' precisamente para distinguir los dos términos de subordinación. En español ''servidor'' preserva esa distinción: tiene connotación de servicio personal voluntario o de lealtad, diferente del ''esclavo'' (δοῦλος). ''Asistente'' también sería válido pero resulta más burocrático.'
- source_word: θραῦσον
  english_pob_choice: shatter
  chosen_spanish: quebranta
  alternatives_spanish:
  - destroza
  - aplasta
  - quiebra
  lexicon: LSJ
  rationale: θραύω expresa ruptura violenta y decisiva. El POB inglés eligió 'shatter' por su intensidad sobre 'break'. En español 'quebranta' (quebrantar) posee la misma energía en el registro de oración o salmo —cf. Sal 2:9— sin añadir imágenes ausentes en el griego. 'Destroza' es más coloquial; 'aplasta' introduce la imagen de presión que el verbo griego no requiere.
- source_word: τὸ ἀνάστεμα
  english_pob_choice: their arrogance
  chosen_spanish: su soberbia
  alternatives_spanish:
  - su alzamiento
  - su insolencia
  - su orgullo
  lexicon: LSJ
  rationale: ἀνάστεμα es un sustantivo poco frecuente (del verbo ἀνίστημι, levantarse/alzarse) que puede denotar tanto exaltación orgullosa como levantamiento físico. El POB inglés optó por 'arrogance' para el sentido moral y preservó las alternativas en nota. En español 'soberbia' capta ese sentido moral de engreimiento exaltado y se integra bien en el registro de oración. La alternativa 'alzamiento' (levantamiento) se recoge en nota [a].
- source_word: ἐν χειρὶ θηλείας
  english_pob_choice: by the hand of a woman
  chosen_spanish: por mano de mujer
  alternatives_spanish:
  - por la mano de una mujer
  - por mano femenina
  lexicon: LSJ
  rationale: Fórmula bíblica de agencia. El POB inglés preservó explícitamente el género (θηλείας). En español 'por mano de mujer' es la expresión idiomática bíblica establecida (cf. Jue 4:9; 9:54), con artículo cero antes de 'mano' y 'mujer', que en ese registro resulta más solemne que 'por la mano de una mujer'. Se preserva íntegramente la agencia femenina marcada en el griego.
theological_decisions:
- issue: Agencia femenina explícita en la oración de Judit
  english_pob_reading: by the hand of a woman
  chosen_spanish_reading: por mano de mujer
  alternative_spanish_readings:
  - por la mano de una mujer
  rationale: 'El griego marca explícitamente el género con θηλείας (adjetivo femenino de θῆλυς). La traducción española mantiene esa marca sin neutralizarla. La expresión es teológicamente central: Judit pide que Dios derrote al enemigo precisamente a través del instrumento que el enemigo desprecia, una mujer. ''Por mano de mujer'' preserva la idiomaticidad bíblica y la fuerza narrativo-teológica del texto.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 4 — precisión de género
- issue: Autoconciencia de la decepción en la oración de Judit
  english_pob_reading: with the deceit of my lips
  chosen_spanish_reading: con el engaño de mis labios
  alternative_spanish_readings:
  - desde mis labios engañosos
  rationale: 'Judit invoca a Dios pidiéndole que use su propio engaño como instrumento divino. La frase ἐκ χειλέων ἀπάτης μου constituye una admisión en primera persona que el texto no suaviza. La traducción española mantiene esa tensión teológica sin eufemismos: Judit no pide perdón por el engaño sino que lo convierte en arma de su oración.'
  doctrine_reference: DOCTRINE.md §Translation philosophy — preservar tensiones documentadas
translation_notes:
  revision_awareness: 'El POB inglés fue revisado (2026-04-23, modelo gpt-5.4) para reemplazar ''with the deceitful words of my lips'' por ''with the deceit of my lips'', eliminando el añadido ''words'' que no tiene respaldo en ἐκ χειλέων ἀπάτης μου. El español ''con el engaño de mis labios'' se alinea con la versión revisada y es también más fiel al griego: no introduce ''palabras'' ni otro elemento ausente en la fuente.'
  spanish_consistency_notes:
  - No aparece el nombre divino (יהוה/κύριος) en este versículo; la cláusula 'Yahvé' del proyecto no aplica aquí.
  - '''Esclavo'' para δοῦλος conforme a los criterios del proyecto cuando el POB inglés optó por ''slave''.'
  - '''Servidor'' para θεράπων distingue el segundo término de subordinación de ''esclavo'', siguiendo la misma distinción mantenida en inglés entre ''slave'' y ''attendant''.'
  - '''Gobernante'' para ἄρχων — opción moderna y genérica, coherente con el uso del POB inglés de ''ruler'' sobre ''prince''.'
  - La expresión 'por mano de mujer' es la fórmula bíblica canónica en español para ἐν χειρὶ θηλείας; se prefiere sobre una paráfrasis moderna para honrar tanto la fuente como la tradición literaria bíblica en lengua española.
