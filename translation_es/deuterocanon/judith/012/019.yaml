translation:
  language: es
  text: Y tomándolo, comió y bebió delante de él lo que su esclava[a] había preparado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'su sierva'. El griego tiene ἡ δούλη αὐτῆς, la forma femenina de δοῦλος ('esclavo'), que denota condición de esclavitud. Se prefiere 'esclava' en lugar de las formas más suaves 'sierva' o 'criada', conforme a la política del proyecto de preservar la carga léxica del término.
    reason: lexical_alternative
lexical_decisions:
- source_word: λαβοῦσα
  english_pob_choice: taking it
  chosen_spanish: tomando
  alternatives_spanish:
  - habiendo tomado
  - tomándolo
  lexicon: BDAG
  rationale: Participio aoristo de λαμβάνω, femenino nominativo singular. En español, 'tomando' reproduce el valor participial de acción precedente de modo natural sin necesidad de añadir el objeto implícito ('ello'), ya que el pronombre encubierto del verbo principal lo absorbe. 'Habiendo tomado' resultaría más pesado; 'tomándolo' añadiría un pronombre que el griego no registra explícitamente.
- source_word: ἔφαγεν
  english_pob_choice: she ate
  chosen_spanish: comió
  alternatives_spanish:
  - comió de ello
  lexicon: BDAG
  rationale: Aoristo simple de ἐσθίω. El español no requiere objeto explícito porque la cláusula de relativo posterior ('lo que... había preparado') identifica lo consumido. 'Comió' es la traducción directa y natural.
- source_word: ἔπιεν
  english_pob_choice: and drank
  chosen_spanish: y bebió
  alternatives_spanish:
  - y ella bebió
  lexicon: BDAG
  rationale: Aoristo de πίνω, coordinado con ἔφαγεν. La secuencia 'comió y bebió' es idiomática en español y preserva la pareja de acciones sin añadir peso. Repetir 'ella' antes de 'bebió' sería redundante y ajeno al estilo narrativo.
- source_word: κατέναντι αὐτοῦ
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - frente a él
  - en presencia de él
  - enfrente de él
  lexicon: BDAG
  rationale: La preposición κατέναντι denota posición espacial directamente enfrente. 'Delante de él' es la opción más natural y concisa en español para el contexto de un banquete. 'Frente a él' funciona igualmente bien pero es ligeramente más formal; 'en presencia de él' añadiría connotación ceremonial no registrada en el griego.
- source_word: ἃ
  english_pob_choice: what
  chosen_spanish: lo que
  alternatives_spanish:
  - aquello que
  - las cosas que
  lexicon: BDAG
  rationale: Pronombre relativo neutro plural que refiere colectivamente a los alimentos preparados. 'Lo que' es el equivalente español más fluido para el relativo colectivo y no fragmenta la frase. 'Aquello que' sería más enfático de lo que el texto requiere; 'las cosas que' rompería el ritmo narrativo.
- source_word: ἡτοίμασεν
  english_pob_choice: had prepared
  chosen_spanish: había preparado
  alternatives_spanish:
  - preparó
  - tenía preparado
  lexicon: BDAG
  rationale: Aoristo de ἑτοιμάζω. Aunque el griego usa el aoristo, la relación temporal con respecto al acto de comer y beber exige en español un pluscuamperfecto ('había preparado'), que indica que la preparación fue anterior a los eventos principales. Esta es la misma decisión tomada en el POB inglés. 'Preparó' perdería esa anterioridad; 'tenía preparado' es válido pero más coloquial.
- source_word: ἡ δούλη αὐτῆς
  english_pob_choice: her maidslave
  chosen_spanish: su esclava
  alternatives_spanish:
  - su sierva
  - su criada
  - su sirvienta
  lexicon: BDAG
  rationale: δούλη es el femenino de δοῦλος e indica una persona en condición de esclavitud vinculante. Conforme a la política del proyecto (paralela a la de δοῦλος → 'esclavo'), se prefiere 'esclava' para preservar el estatus socioeconómico que el término griego designa explícitamente. 'Sierva' o 'criada' suavizarían la relación de servidumbre más allá de lo que el texto sustenta, reproduciendo el mismo problema que motivó la regresión documentada en el historial de revisiones del POB inglés.
theological_decisions:
- issue: Traducción de δούλη en relación con la política del proyecto sobre δοῦλος/δούλη
  english_pob_reading: her maidslave
  chosen_spanish_reading: su esclava
  alternative_spanish_readings:
  - su sierva
  - su criada
  - su sirvienta
  rationale: 'El historial de revisiones del POB inglés registra un proceso controvertido: el borrador original tenía ''female slave'' (conforme a DOCTRINE.md), la revisión automática lo sustituyó por ''maidservant'' (ablandando el término), y una corrección de regresión posterior restauró la fuerza del término como ''maidslave''. El español ''esclava'' está alineado directamente con la postura corregida: δούλη designa a una mujer en situación de esclavitud y no debe atenuarse a ''sierva'' o ''criada''. Esto preserva la tensión léxica documentada y evita repetir la sustitución que fue revertida en el texto inglés.'
  doctrine_reference: 'DOCTRINE.md: tabla de términos controvertidos para δοῦλος/δούλη; Filosofía de traducción §1 y §5'
translation_notes:
  revision_awareness: 'El registro inglés del POB documenta una disputa de revisión significativa en torno a δούλη: el borrador inicial usaba ''female slave'', una revisión automática (azure-gpt-5.4) lo sustituyó por ''maidservant'' alegando un registro más natural, y una corrección de regresión posterior (claude-sonnet-4-6) lo restauró como ''maidslave'' por incumplimiento de DOCTRINE.md. El español ''esclava'' sigue la postura corregida y no reproduce el ablandamiento que fue revertido. No se introducen suavizaciones adicionales en el texto español.'
  spanish_consistency_notes:
  - Se mantiene 'esclava' (no 'sierva', 'criada' ni 'sirvienta') como equivalente de δούλη, en paralelo con 'esclavo' para δοῦλος, conforme a los valores predeterminados del proyecto.
  - El participio λαβοῦσα se traduce con gerundio ('tomando') sin objeto explícito, lo que es natural en español narrativo; el objeto se recupera contextualmente de la cláusula de relativo final.
  - Se usa pluscuamperfecto 'había preparado' para ἡτοίμασεν con el fin de marcar la anterioridad temporal respecto a los eventos principales, aunque el griego emplea un aoristo simple.
  - No hay referencia al nombre divino (יהוה / YHWH / κύριος) en este versículo; la política de 'Yahvé' no aplica aquí.
  - La frase κατέναντι αὐτοῦ ('delante de él') refiere espacialmente a Holofernes en el contexto del banquete, sin implicaciones teológicas que requieran nota adicional.
