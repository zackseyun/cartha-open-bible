translation:
  language: es
  text: En aquel día mataron a más de trescientos hombres, y también hicieron de él una celebración alegre[a], después de echar mano de los profanos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice literalmente «condujeron la alegría»; el sentido es que hicieron de ese día una celebración o fiesta. La expresión «celebración alegre» también recoge el valor de μετὰ χαρᾶς, «con gozo».
    reason: lexical_alternative
  - marker: b
    text: La cláusula final es sintácticamente difícil en el texto griego empleado aquí. «Después de echar mano de los profanos» también puede entenderse como «después de someter a los impíos», ya que χειρωσάμενοι puede significar apoderarse de alguien o subyugarlo.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀνεῖλον
  english_pob_choice: they killed
  chosen_spanish: mataron
  alternatives_spanish:
  - dieron muerte
  - eliminaron
  lexicon: LSJ
  rationale: Aoristo de ἀναιρέω en contexto narrativo con sentido homicida claro. 'Mataron' es el equivalente español moderno más directo y sin ambigüedad, paralelo al inglés 'they killed'. 'Dieron muerte' sería más formal pero menos conciso.
- source_word: ὑπὲρ τοὺς τριακοσίους ἄνδρας
  english_pob_choice: more than three hundred men
  chosen_spanish: a más de trescientos hombres
  alternatives_spanish:
  - sobre trescientos hombres
  - más de trescientos varones
  lexicon: LSJ
  rationale: ὑπέρ con acusativo expresa superación numérica ('más de/sobre'). 'A más de trescientos hombres' reproduce la construcción con la preposición acusativa española estándar ante objeto directo de persona. 'Ἄνδρας' especifica varones adultos; 'hombres' refleja esa especificidad frente a 'personas'.
- source_word: ἤγαγον εὐφροσύνην μετὰ χαρᾶς
  english_pob_choice: made it a joyful celebration
  chosen_spanish: lo convirtieron en una celebración alegre
  alternatives_spanish:
  - lo celebraron con alegría
  - hicieron de ese día una fiesta gozosa
  - guardaron ese día con regocijo
  lexicon: LSJ
  rationale: El griego usa el giro idiomático ἄγω + εὐφροσύνη ('llevar/conducir la alegría') para indicar la celebración festiva del día. La revisión del inglés POB ajustó 'observed it as a celebration with joy' al más fluido 'made it a joyful celebration'. En español 'lo convirtieron en una celebración alegre' captura igualmente el carácter eventivo del idioma griego. El elemento μετὰ χαρᾶς ('con gozo/alegría'), que la revisión inglesa absorbió en el adjetivo 'joyful', queda explicado en la nota al pie para mantener trazabilidad con el texto griego.
- source_word: βεβήλους
  english_pob_choice: the profane
  chosen_spanish: los profanos
  alternatives_spanish:
  - los impíos
  - los irreverentes
  - los hombres sin piedad
  lexicon: LSJ
  rationale: βέβηλος designa lo que está fuera del ámbito sagrado, lo profano o irreverente. El uso sustantivado permite 'los profanos' en español, calco semántico directo del inglés POB 'the profane'. La alternativa 'los impíos' desplazaría el matiz hacia la falta de piedad religiosa activa, más que la condición de profanidad; se preserva en nota.
- source_word: χειρωσάμενοι
  english_pob_choice: having laid hands on
  chosen_spanish: habiendo puesto mano sobre
  alternatives_spanish:
  - habiéndolos sometido
  - habiéndolos apresado
  - habiéndolos tomado en sus manos
  lexicon: LSJ
  rationale: χειρόω (aoristo participio medio) puede significar 'poner en la mano propia', 'apoderarse de' o 'someter/subyugar'. El inglés POB optó por 'having laid hands on' para mantener la acción física abierta y no resolver la dificultad sintáctica del pasaje. 'Habiendo puesto mano sobre' replica esa estrategia de literalidad controlada en español, dejando la ambigüedad documentada en la nota.
theological_decisions:
- issue: Caracterización religiosa de βεβήλους
  english_pob_reading: the profane
  chosen_spanish_reading: los profanos
  alternative_spanish_readings:
  - los impíos
  - los hombres sin piedad
  rationale: El término marca a estos hombres como religiosamente contaminados o irreverentes desde la perspectiva del narrador. 'Los profanos' conserva esa fuerza evaluativa sin importar una categoría teológica más elaborada de la que el griego mismo enuncia. 'Los impíos' podría sobreinterpretar hacia una maldad activa no necesariamente implicada en βέβηλος.
  doctrine_reference: Filosofía de traducción §1, §6
- issue: Interpretación de la cláusula difícil ἣν καὶ ἤγαγον εὐφροσύνην μετὰ χαρᾶς βεβήλους χειρωσάμενοι
  english_pob_reading: they also made it a joyful celebration, having laid hands on the profane
  chosen_spanish_reading: también lo convirtieron en una celebración alegre, habiendo puesto mano sobre los profanos
  alternative_spanish_readings:
  - también lo celebraron con alegría, habiendo sometido a los impíos
  - hicieron de ese día una fiesta gozosa después de apoderarse de los profanos
  rationale: 'El texto griego transmitido es sintácticamente incómodo (los metadatos del proyecto señalan ''major_mismatch''). El español sigue la misma estrategia del inglés POB: mantenerse cerca del texto testimonio sin resolver la cláusula en una paráfrasis más suave no directamente garantizada por el testigo. El participio χειρωσάμενοι se vierte con ''habiendo puesto mano sobre'' para preservar la apertura semántica; la nota documenta la alternativa ''habiéndolos sometido''.'
  doctrine_reference: Filosofía de traducción §1, §3
translation_notes:
  revision_awareness: El inglés POB fue revisado (2026-04-23, modelo gpt-5.4) de «observed it as a celebration with joy» a la forma más fluida «made it a joyful celebration», absorbiendo μετὰ χαρᾶς en el adjetivo 'joyful' en lugar de expresarlo como frase separada. El español sigue esa decisión de revisión con «lo convirtieron en una celebración alegre», manteniendo el elemento de gozo implícito en el adjetivo y explícito en la nota al pie [a], lo que garantiza trazabilidad con el griego fuente sin duplicar la información en el texto principal.
  spanish_consistency_notes:
  - No aparece el Nombre divino (יהוה/κύριος) ni terminología mesiánica en este versículo; los valores predeterminados del proyecto (Yahvé, Mesías, etc.) no se aplican aquí.
  - '''Los profanos'' (βεβήλους) se adopta como término preferido frente a ''los impíos'' en coherencia con la decisión léxica del inglés POB, que priorizó la cercanía léxica a βέβηλος sobre la carga teológica de ''impious''.'
  - El verbo 'mataron' para ἀνεῖλον mantiene el registro narrativo directo; en otros versículos del mismo libro donde aparezca el mismo verbo debería usarse consistentemente 'mataron' o 'dieron muerte' según el contexto inmediato.
