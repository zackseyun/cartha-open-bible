translation:
  language: es
  text: No nos castigues por la impureza[a] de ellos, ni nos llames a cuentas por la profanación[b], para que no se jacten los sin ley en su furor, ni se regocijen en el orgullo de su lengua, diciendo
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «No tomes venganza contra nosotros por la impureza de ellos». El verbo griego puede expresar castigo o venganza retributiva.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «desecración». El sustantivo alude a tratar como común lo que es santo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκδίκησῃς
  english_pob_choice: punish
  chosen_spanish: castigues
  alternatives_spanish:
  - nos vengues
  - nos tomes venganza
  lexicon: BDAG
  rationale: En una súplica dirigida a Dios, «castigar» comunica una acción retributiva sin introducir en español la connotación de venganza personal. Mantiene el valor judicial del verbo mejor que una paráfrasis más general.
- source_word: ἀκαθαρσίᾳ
  english_pob_choice: uncleanness
  chosen_spanish: impureza
  alternatives_spanish:
  - inmundicia
  - contaminación ritual
  lexicon: BDAG
  rationale: «Impureza» preserva el registro cultual y moral del término griego y suena natural en español bíblico contemporáneo. «Inmundicia» sería más fuerte pero menos preciso aquí.
- source_word: εὐθύνῃς
  english_pob_choice: call us to account
  chosen_spanish: llames a cuentas
  alternatives_spanish:
  - hagas rendir cuentas
  - nos juzgues
  lexicon: LSJ
  rationale: La expresión española conserva la idea de exigir responsabilidad o revisar judicialmente la situación. Evita reducir el verbo a «juzgar», que sería más amplio y menos exacto.
- source_word: βεβηλώσει
  english_pob_choice: profanation
  chosen_spanish: profanación
  alternatives_spanish:
  - desecración
  - desacralización
  lexicon: BDAG
  rationale: «Profanación» mantiene el contraste con lo sagrado de manera directa y conserva la tensión lexical frente a «impureza». Es la opción más estable y auditable en español.
- source_word: παράνομοι
  english_pob_choice: the lawless
  chosen_spanish: los sin ley
  alternatives_spanish:
  - los inicuos
  - los transgresores
  lexicon: BDAG
  rationale: «Los sin ley» reproduce el valor moral-jurídico del griego con transparencia. Aunque «los lawless» suele verterse como «los impíos» en tradición bíblica, aquí se preserva mejor el matiz legal del término.
- source_word: καυχήσωνται
  english_pob_choice: boast
  chosen_spanish: se jacten
  alternatives_spanish:
  - se gloríen
  - presuman
  lexicon: BDAG
  rationale: «Jactarse» expresa con precisión la arrogancia verbal del verbo y combina bien con el contexto hostil. También mantiene la distinción con el siguiente verbo de regocijo.
- source_word: ἀγαλλιάσωνται
  english_pob_choice: exult
  chosen_spanish: se regocijen
  alternatives_spanish:
  - exulten
  - se alegren grandemente
  lexicon: BDAG
  rationale: «Regocijarse» conserva el tono de alegría intensa, aunque en español puede sonar un poco más solemne que «alegrarse». Se usa para no perder el paralelismo con la jactancia previa.
- source_word: ὑπερηφανίᾳ γλώσσης αὐτῶν
  english_pob_choice: the pride of their tongue
  chosen_spanish: el orgullo de su lengua
  alternatives_spanish:
  - la soberbia de su lengua
  - su arrogante hablar
  lexicon: LSJ
  rationale: La imagen griega es viva e idiomática; «el orgullo de su lengua» la reproduce con fidelidad y permite que el lector perciba la metáfora sin normalizarla demasiado.
- source_word: θυμῷ αὐτῶν
  english_pob_choice: their wrath
  chosen_spanish: furor
  alternatives_spanish:
  - ira
  - rabia
  lexicon: BDAG
  rationale: El contexto exige un término más elevado que «ira» y más formal que «rabia». «Furor» refleja bien el impulso violento y coincide con la revisión del inglés POB hacia un registro más solemne.
theological_decisions:
- issue: A quién se refiere «de ellos» en la primera cláusula
  english_pob_reading: The pronoun τούτων is taken as 'their,' referring to hostile outsiders whose uncleanness should not be charged to the Jewish petitioners.
  chosen_spanish_reading: «de ellos» se toma como referencia a los hostiles externos mencionados implícitamente, no como una abstracción impersonal.
  alternative_spanish_readings:
  - «de estas cosas» si τούτων se entiende de modo más abstracto
  - «de estos» si se quisiera destacar a los opositores como demostrativo
  rationale: La secuencia «nosotros / ellos / los sin ley» favorece una referencia personal y relacional. Mantenerla en español conserva la tensión de la súplica sin resolverla artificialmente.
  doctrine_reference: Primacía del texto original y conservación de la tensión literaria-teológica.
- issue: Relación entre impureza y profanación
  english_pob_reading: The prayer distinguishes 'uncleanness' from 'profanation/desecration' rather than collapsing them.
  chosen_spanish_reading: Se distinguen «impureza» y «profanación» como dos nociones relacionadas pero no idénticas.
  alternative_spanish_readings:
  - unificarlas como «impureza»
  - unificarlas como «profanación»
  rationale: El griego presenta dos sustantivos distintos; la versión española debe conservar esa diferencia para no borrar la progresión del ruego. La primera remite a contaminación cultual; la segunda, a tratar lo santo como común.
  doctrine_reference: Respeto de la diferenciación léxica del texto fuente.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail, que mantuvo la estructura del borrador inglés y ajustó ἐν θυμῷ αὐτῶν a «in their wrath». En español se refleja ese tono más formal con «furor», preservando además la distinción entre la primera referencia cultual («impureza») y la segunda («profanación»).
  spanish_consistency_notes:
  - Se usa «Yahvé» solo donde aparezca el nombre divino explícito; aquí no ocurre.
  - Se mantiene «los sin ley» para παράνομοι por su fuerza moral-jurídica.
  - Se conservan las imágenes corporales y metafóricas («lengua», «llamarnos a cuentas») sin normalizarlas a un español abstracto.
  - La puntuación respeta la estructura orante del griego con una sola cadena de peticiones y propósitos.
