translation:
  language: es
  text: ¿Un hombre guarda la ira contra otro hombre, y busca sanidad del Señor?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἄνθρωπος
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: BDAG
  rationale: El singular masculino funciona aquí de manera representativa y conserva la forma general del griego sin volverlo demasiado abstracto.
- source_word: συντηρεῖ
  english_pob_choice: keeps
  chosen_spanish: guarda
  alternatives_spanish:
  - mantiene
  - conserva
  - alberga
  lexicon: BDAG
  rationale: En español, 'guardar la ira' expresa bien la idea de retenerla o atesorarla contra otro, con un giro natural y claro.
- source_word: ὀργήν
  english_pob_choice: anger
  chosen_spanish: la ira
  alternatives_spanish:
  - el enojo
  - el furor
  lexicon: BDAG
  rationale: '''Ira'' preserva la intensidad léxica del sustantivo griego y encaja bien en un dicho sapiencial.'
- source_word: παρὰ Κυρίου
  english_pob_choice: from the Lord
  chosen_spanish: del Señor
  alternatives_spanish:
  - de Yahvé
  - de parte del Señor
  lexicon: BDAG
  rationale: 'La preposición con ζητεῖ ἴασιν se expresa de forma natural en español como origen o procedencia: ''del Señor''. Aunque el proyecto prefiere ''Yahvé'' para el tetragrámaton, aquí el griego usa κύριος en una formulación sapiencial no claramente citacional del nombre divino hebreo, por lo que ''Señor'' es la opción más transparente.'
- source_word: ζητεῖ
  english_pob_choice: seeks
  chosen_spanish: busca
  alternatives_spanish:
  - pide
  - procura
  lexicon: BDAG
  rationale: '''Buscar'' es el equivalente directo y mantiene el matiz de solicitar activamente algo.'
- source_word: ἴασιν
  english_pob_choice: healing
  chosen_spanish: sanidad
  alternatives_spanish:
  - curación
  - restauración
  lexicon: BDAG
  rationale: '''Sanidad'' conserva la amplitud de ἴασις, que puede referirse tanto a curación física como a restauración más amplia; ''curación'' sería más estrecha en español.'
theological_decisions:
- issue: Testimonio textual discrepante entre el hebreo provisto y el paralelo griego
  english_pob_reading: The English POB follows the Greek witness for Sirach 28:3 and documents that the supplied Hebrew is unrelated to this verse.
  chosen_spanish_reading: 'La redacción española sigue el griego: ''Un hombre guarda la ira contra otro hombre, y busca sanidad del Señor''.'
  alternative_spanish_readings:
  - 'Traducir literalmente el hebreo suministrado: ''Pesé todo en la balanza, y no hallé nada más liviano que el salvado'''
  rationale: 'El paquete de fuentes muestra una discrepancia fuerte: el hebreo dado no corresponde al contenido de Sirach 28:3, mientras que el griego sí encaja con el contexto sapiencial de resentimiento y perdón. Para mantener fidelidad al versículo correcto, la traducción española sigue el griego y deja constancia implícita del trasfondo textual en la documentación.'
  doctrine_reference: 'PHILOSOPHY.md: primacía de la fuente original con documentación transparente'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión posterior que reemplazó un borrador no relacionado con una traducción del hebreo; sin embargo, el paquete fuente para esta tarea sigue aportando el paralelo griego de Sirach 28:3, que es el texto pertinente para este versículo. La versión española final se alinea con ese paralelo y documenta la discrepancia textual.
  spanish_consistency_notes:
  - Se mantiene el tratamiento reverente de κύριος como 'Señor' en una formulación griega directa.
  - '''Ira'' y ''sanidad'' conservan un registro bíblico claro sin recaer en calcos rígidos.'
  - El marcador de nota [a] aparece en el texto y la explicación textual correspondiente se limita a la discrepancia de testigos.
