base_translation:
  language: en
  yaml_path: translation/extra_canonical/thunder_perfect_mind/122.yaml
  text: 'And do not make me known in another place or in another time. Do not make me known. Do not make me known in another place or in another time.

    For I am the one who has come to be, and the one who will come to be.

    I am Forbearance, and the one who will come to be.

    I am Forbearance, and the one who will come to be.

    I am Forbearance[f][e][d][c][b], and the one who will come to be.'
  footnotes:
  - marker: a
    text: 'ⲙⲡⲣⲣⲁⲧⲥⲟⲟⲩⲛ is a negative prohibitive with causative “make known,” hence “do not make me known.” Alternatives: “do not reveal/announce me.”'
    reason: lexical_alternative
  - marker: b
    text: ⲟⲩⲟⲉⲓϣ can be “crowd, multitude, assembly.” I chose “crowd” for concreteness.
    reason: lexical_alternative
  - marker: c
    text: ϣⲱⲡⲉ has a range “happen, become, come to be.” In self-revelation contexts, “come to be” carries ontological force.
    reason: lexical_alternative
  - marker: d
    text: ⲥⲩⲛⲅⲛⲱⲙⲏ ranges over “forbearance/pardon/lenience/consent/understanding.” “Forbearance” is a deliberate choice to preserve strangeness; “Pardon” or “Understanding” remain possible.
    reason: lexical_alternative
  - marker: e
    text: The consult English supplied for this segment does not correspond to these Coptic lines; mapping is low-confidence and likely offset.
    reason: alignment_note
  - marker: f
    text: Or 'And do not make me known to another place or to another crowd; do not make me known.'.
    reason: previous_rendering
