  glossary_alignment: 'No hay terminología bíblica-proyecto en conflicto directo aquí. El problema principal es de alineación léxica con la decisión inglesa auditada: ⲙⲡⲣⲣⲁⲧⲥⲟⲟⲩⲛ debe expresarse con un causativo natural en español (“no me den a conocer”), y ⲥⲩⲛⲅⲛⲱⲙⲏ debería reflejar el campo de ‘forbearance/pardon/lenience’ más que “Tolerancia”.'
