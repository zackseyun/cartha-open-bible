translation:
  language: es
  text: 'Y no me den a conocer en otro lugar ni en otro tiempo. No me den a conocer. No me den a conocer en otro lugar ni en otro tiempo.


    Porque yo soy el que ha llegado a ser, y el que llegará a ser.


    Yo soy la Indulgencia[a], y el que llegará a ser.


    Yo soy la Indulgencia[a], y el que llegará a ser.


    Yo soy la Indulgencia[a], y el que llegará a ser.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ⲥⲩⲛⲅⲛⲱⲙⲏ también puede entenderse como “forbearance”, “lenidad”, “perdón” o “comprensión”. Se adopta “Indulgencia” para conservar el matiz de clemencia o tolerancia contenida sin reducir el término a un sentido puramente jurídico ni puramente cognitivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲙⲡⲣⲣⲁⲧⲥⲟⲟⲩⲛ
  english_pob_choice: do not make known
  chosen_spanish: no me hagan conocer
  alternatives_spanish:
  - no me revelen
  - no me anuncien
  lexicon: Crum; causativo de ⲥⲟⲟⲩⲛ
  rationale: El prohibitivo negativo con causativo expresa “no causar que me conozcan”. En español, “no me hagan conocer” conserva la fuerza causal y evita una reformulación interpretativa como “no me revelen”, aunque esta sigue siendo posible.
- source_word: ⲕⲉⲙⲁ
  english_pob_choice: another place
  chosen_spanish: otro lugar
  alternatives_spanish:
  - otro sitio
  - en otro lugar
  - allá
  lexicon: Crum
  rationale: ⲕⲉ + ⲙⲁ es “otro lugar”. “Otro lugar” es natural y transparente en español.
- source_word: ⲟⲩⲟⲉⲓϣ
  english_pob_choice: time / season
  chosen_spanish: tiempo
  alternatives_spanish:
  - momento
  - estación
  - temporada
  lexicon: Crum
  rationale: 'La revisión auditada corrige la lectura previa: aquí el término corresponde a “tiempo” o “estación”, no a “multitud”. “Tiempo” es la opción más neutra y fiel.'
- source_word: ϣⲱⲡⲉ
  english_pob_choice: has come to be / will come to be
  chosen_spanish: ha llegado a ser / llegará a ser
  alternatives_spanish:
  - ha venido a ser / vendrá a ser
  - ha sido hecho / será hecho
  lexicon: Crum
  rationale: En el registro ontológico del texto, “llegar a ser” preserva mejor la idea de devenir sin reducirla a mero acontecimiento. “Ha llegado a ser” / “llegará a ser” refleja ese matiz en español.
- source_word: ⲥⲩⲛⲅⲛⲱⲙⲏ
  english_pob_choice: Forbearance
  chosen_spanish: Tolerancia
  alternatives_spanish:
  - Forbearancia
  - Piedad
  - Lenidad
  - Pardon
  lexicon: LSJ; Crum
  rationale: Como autodesignación, el inglés POB eligió “Forbearance” para preservar una cualidad de contención/lenidad sin cerrar el sentido. En español, “Tolerancia” comunica esa misma contención de manera comprensible y digna, aunque queda como una opción interpretativa entre varias posibles.
theological_decisions:
- issue: Autorrevelación y repetición enfática
  english_pob_reading: Do not make me known... For I am the one who has come to be, and the one who will come to be.
  chosen_spanish_reading: No me hagan conocer... Porque yo soy el que ha llegado a ser, y el que llegará a ser.
  alternative_spanish_readings:
  - No me revelen...
  - Porque yo soy el que ha venido a ser, y el que vendrá a ser.
  rationale: La frase mantiene el tono de advertencia sobre la manifestación de la voz hablante y conserva la repetición como énfasis retórico. No se suaviza la tensión ontológica de ⲣⲱⲙⲉ/ϣⲱⲡⲉ mediante una traducción meramente funcional.
  doctrine_reference: autorrevelación / ontología del devenir en texto gnóstico
- issue: Título autodesignativo ⲥⲩⲛⲅⲛⲱⲙⲏ
  english_pob_reading: Forbearance
  chosen_spanish_reading: Tolerancia
  alternative_spanish_readings:
  - Forbearancia
  - Lenidad
  - Pardon
  rationale: Se preserva el carácter de término raro y la ambigüedad semántica. “Tolerancia” es suficientemente amplia para no reducirlo a una sola acepción jurídica o cognitiva, y funciona bien como nombre propio del hablante en español.
  doctrine_reference: lexical/theological tension preservada
translation_notes:
  revision_awareness: 'La revisión auditada corrige dos puntos importantes: ⲟⲩⲟⲉⲓϣ no significa “multitud” sino “tiempo/estación”, y ⲙⲡⲣⲣⲁⲧⲥⲟⲟⲩⲛ ⲙⲙⲟⲓ se mantiene como prohibición de “hacer conocer” y no como lectura basada en “ignorancia”. La versión española sigue esa revisión, conserva la repetición del pasaje y evita introducir una paráfrasis no sustentada por el coptic.'
  spanish_consistency_notes:
  - Se mantiene el paralelismo repetido de las tres últimas líneas para reflejar el efecto retórico del original.
  - Se usa “otro lugar / otro tiempo” de forma uniforme para corresponder a ⲕⲉⲙⲁ / ⲟⲩⲟⲉⲓϣ.
  - Se evita “Señor” u otros términos tradicionales ajenos al segmento, ya que no aparecen en este pasaje.
  - Se conserva la mayúscula en “Tolerancia” porque funciona como autodesignación/título en la boca del hablante.
