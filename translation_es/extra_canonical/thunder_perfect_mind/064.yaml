translation:
  language: es
  text: 'Porque ella es sabia[a], y ella es una pequeña[b];

    no apartes las cosas grandes en partes

    lejos de la pequeñez—

    pues conocen la pequeñez.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Alternativa literal: ‘porque ella es sabia’.'
    reason: lexical_alternative
  - marker: b
    text: ‘Pequeña’ traduce el valor literal de ⲟⲩⲕⲟⲩⲉⲓ; la revisión textual descarta aquí ‘fool’/‘necia’.
    reason: textual_variant
lexical_decisions:
- source_word: ϫⲉ
  english_pob_choice: for
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - ya que
  - porque
  lexicon: Crum; Layton (particles)
  rationale: Introduce la cláusula explicativa/causal de manera natural en español, manteniendo el valor conectivo del original.
- source_word: ⲥⲥⲁⲃⲉⲕ
  english_pob_choice: wise
  chosen_spanish: sabia
  alternatives_spanish:
  - sapiente
  - docta
  lexicon: Crum s.v. ⲥⲁⲃⲉ
  rationale: El verbo/adjetivo coptó expresa que ella es sabia; el femenino español conserva la referencia explícita a la voz femenina del texto.
- source_word: ⲟⲩⲕⲟⲩⲉⲓ
  english_pob_choice: small one
  chosen_spanish: una pequeña
  alternatives_spanish:
  - una pequeña criatura
  - una pequeña / simple
  - una ignorante
  lexicon: Crum s.v. ⲕⲟⲩⲉⲓ; NH usage
  rationale: Se evita ‘fool’ porque la revisión textual corrigió esa lectura; ‘pequeña’ conserva la oposición semántica con ‘grande’ y refleja el valor literal de ‘small/childlike’.
- source_word: ⲙⲡⲣⲧⲥⲧⲟ
  english_pob_choice: do not take away
  chosen_spanish: no apartes
  alternatives_spanish:
  - no quites
  - no retires
  - no apartes / no sustraigas
  lexicon: Crum s.v. ⲧⲥⲧⲱ
  rationale: ‘Apartar’ transmite bien la idea concreta de retirar o mover algo fuera de su lugar, compatible con la construcción negativa jussiva.
- source_word: ⲙⲛⲧⲛⲟϭ
  english_pob_choice: greatness
  chosen_spanish: las cosas grandes
  alternatives_spanish:
  - la grandeza
  - lo grande
  lexicon: Crum s.v. ⲛⲟϭ
  rationale: La revisión inglesa entiende aquí una referencia a ‘great things’; en español se preserva esa concreción para que la oposición con ‘pequeñez’ sea clara.
- source_word: ϩⲉⲛⲙⲉⲣⲟⲥ
  english_pob_choice: parts
  chosen_spanish: en partes
  alternatives_spanish:
  - por partes
  - en porciones
  - en fragmentos
  lexicon: Crum s.v. ⲙⲉⲣⲟⲥ (from Gk meros)
  rationale: ‘En partes’ reproduce la distribución/fraccionamiento indicado por el original y mantiene el paralelo del pasaje.
- source_word: ⲉⲃⲟⲗ ϩⲛ ⲧⲙⲛⲧⲕⲟⲩⲉⲓ
  english_pob_choice: from smallness
  chosen_spanish: lejos de la pequeñez
  alternatives_spanish:
  - de la pequeñez
  - fuera de la pequeñez
  - apartándolas de la pequeñez
  lexicon: Crum s.v. ⲉⲃⲟⲗ; Crum s.v. ⲕⲟⲩⲉⲓ
  rationale: La combinación de dirección ‘away/from’ con ϩⲛ se vierte mejor con una expresión de alejamiento; ‘lejos de’ comunica el movimiento de apartar sin introducir una lectura doctrinal ajena.
- source_word: ⲙⲛⲧⲕⲟⲩⲉⲓ
  english_pob_choice: smallness
  chosen_spanish: pequeñez
  alternatives_spanish:
  - pequeñez
  - smallness
  - minoridad
  lexicon: Crum s.v. ⲕⲟⲩⲉⲓ
  rationale: El abstracto coptó contrasta directamente con ‘grandeza/cosas grandes’; ‘pequeñez’ preserva esa tensión semántica mejor que ‘ignorancia’.
- source_word: ⲥⲟⲩⲱⲛ
  english_pob_choice: know
  chosen_spanish: conocen
  alternatives_spanish:
  - saben
  - reconocen
  - llegan a conocer
  lexicon: Crum s.v. ⲥⲟⲟⲩⲛ
  rationale: Se mantiene el valor ordinario de ‘conocer/saber’ conforme a la revisión textual; el plural español sigue el sujeto implícito del original.
theological_decisions:
- issue: Paradoja sapiencial y tono de la frase
  english_pob_reading: For she is wise, and she is a small one; nor turn away great things in parts from smallness—for they know smallness.
  chosen_spanish_reading: Porque ella es sabia, y ella es una pequeña; no apartes las cosas grandes en partes lejos de la pequeñez—pues conocen la pequeñez.
  alternative_spanish_readings:
  - Porque ella es sabia, y ella es una pequeña; no apartes las cosas grandes en partes—pues conocen la pequeñez.
  - Porque ella es sabia, y ella es una pequeña; no apartes las cosas grandes por partes lejos de la pequeñez—pues conocen la pequeñez.
  rationale: La formulación conserva la paradoja entre sabiduría y pequeñez sin convertirla en mandato imperativo sobre la mujer/voz del texto. El segundo hemistiquio sigue la revisión que entiende una advertencia sobre no fragmentar lo grande y no separarlo de la pequeñez.
  doctrine_reference: Lectura literaria/sapiencial del himno; no se formula una doctrina específica.
translation_notes:
  revision_awareness: 'This draft follows the latest source-grounded revision that corrects the earlier English misreadings: ⲥⲥⲁⲃⲉ is a feminine predication (‘she is wise’), ⲟⲩⲕⲟⲩⲉⲓ is rendered as ‘small one/smallness’ rather than ‘fool,’ and the final clause is read as a straightforward knowledge statement rather than a limitative ‘until’. The Spanish preserves that corrected sense and avoids introducing the discarded ‘ignorance’ reading.'
  spanish_consistency_notes:
  - Usa ‘pequeña/pequeñez’ para mantener la misma raíz semántica en todo el segmento.
  - Evita ‘Cristo/Señor’ u otra terminología ajena, ya que el texto no la exige.
  - Mantiene la oposición ‘sabia’ / ‘pequeña’ de manera explícita y femenina, conforme al coptó.
  - ‘Conocen’ sigue el plural implícito del original y no introduce un sujeto nuevo.
