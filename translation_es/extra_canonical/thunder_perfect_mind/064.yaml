    reason: lexical_alternative
  revision_rationale: Se ajusta la línea central para reflejar mejor la revisión fuente, evitando un imperativo de segunda persona demasiado específico y una locución espacial poco natural. Se conserva la oposición semántica «pequeña / pequeñez / cosas grandes» y se simplifican las notas a la única decisión léxica que realmente necesita aclaración.
