    text: ⲟⲩⲕⲟⲩⲉⲓ literally ‘small/child’; here rendered ‘fool’ to sharpen the antithesis with ‘wise.’ ‘Simple/ignorant’ are viable alternatives.
    reason: lexical_alternative
  - marker: b
    text: If ⲥⲟⲩⲱⲛ is not ⲥⲟⲟⲩⲛ ‘know’ but a removal verb, the line could read ‘until they remove ignorance.’
    reason: alternative_reading
  - marker: c
    text: ‘Do not take away greatness in parts’ could also be ‘do not remove the great things by portions.’ The object may be implicit or resumed elsewhere in the larger unit.
    reason: alignment_note
  - marker: d
    text: Or 'For be wise—and be a fool;'.
    reason: previous_rendering
  - marker: e
    text: Or 'and do not take away greatness in parts;\nin ignorance, until they come to know ignorance—\nfor they know ignorance.'.
    reason: previous_rendering
