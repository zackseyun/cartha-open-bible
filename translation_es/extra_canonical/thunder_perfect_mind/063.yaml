translation:
  language: es
  text: Pero cada vez que aparezcas[c][b][a], me ocultaré de ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “te reveles”.'
    reason: lexical_alternative
  - marker: b
    text: 'Esta línea forma una mitad de un par paradójico que suele transmitirse junto con su contraparte: “cuando te ocultas, aparezco”; “cuando apareces, me oculto”.'
    reason: cross_reference
  - marker: c
    text: 'O: “Porque cada vez que aparezcas, me ocultaré de ti”. La partícula coptó aquí es adversativa; por eso se prefirió “Pero”.'
    reason: source_note
lexical_decisions:
- source_word: ⲟⲩⲟⲉⲓⲉ
  english_pob_choice: appear
  chosen_spanish: aparezcas
  alternatives_spanish:
  - te manifiestes
  - te reveles
  lexicon: Crum, Coptic Dictionary (s.v. ouoeie)
  rationale: En esta oposición paralela, el valor central es “venir a la vista” o “hacerse presente”. “Aparezcas” conserva la inmediatez y la fuerza antitética del original sin volverlo explicativo.
- source_word: ⲥⲧⲟ
  english_pob_choice: conceal myself
  chosen_spanish: me ocultaré
  alternatives_spanish:
  - me esconderé
  - me encubriré
  lexicon: Crum, Coptic Dictionary (s.v. sto)
  rationale: El verbo coptizado apunta a ocultar/esconder. “Me ocultaré” mantiene el sujeto personal y el matiz reflexivo natural en español, con un registro sobrio y literario.
- source_word: ϫⲉ / ⲇⲉ
  english_pob_choice: But whenever you appear, I will conceal myself from you.
  chosen_spanish: Pero cada vez que
  alternatives_spanish:
  - Y cada vez que
  - Porque cada vez que
  lexicon: Layton, Coptic Grammar §195; adjudication note on ⲇⲉ
  rationale: El texto coptó contiene una partícula adversativa (ⲇⲉ), por lo que “Pero” reproduce mejor el giro contrastivo que “Porque”. “Cada vez que” expresa el valor iterativo de la cláusula.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del audit trail que corrigió la partícula ⲇⲉ de “For” a “But” por ser adversativa, no causal. La redacción española adopta ese ajuste y mantiene la simetría paradójica señalada en el contexto inglés.
  spanish_consistency_notes:
  - Se prefirió “Pero” para reflejar ⲇⲉ como contraste, no causalidad.
  - “Aparezcas” conserva el paralelismo con “me ocultaré” y evita una paráfrasis más interpretativa.
  - Se mantuvo un registro poético claro, apto para publicación, sin introducir terminología doctrinal ajena al texto.
