  - marker: a
    text: The sequence ⲕⲉⲙⲁ likely represents the Greek loan ⲕⲣⲓⲙⲁ (“judgment”); OCR may have dropped ⲣⲓ. If not ⲕⲣⲓⲙⲁ, the sense is uncertain and could reflect another noun.
    reason: textual_variant
  - marker: b
    text: ⲟⲉⲓϣ commonly means “strength/power”; hence “any other power.”
    reason: cultural_note
