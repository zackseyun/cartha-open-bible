    issue: La nota [a] está anclada en ‘Porque de esto’ en lugar de en ‘juicio’.
    rationale: La nota explica la probable lectura textual de ⲕⲣⲓⲙⲁ (‘juicio’), no la expresión causal ⲉⲧⲃⲉ ⲡⲁⲓ. Tal como está, induce a error sobre qué elemento del texto es incierto.
  - severity: low
    issue: ‘Porque de esto’ es poco idiomático en español.
    rationale: Aunque refleja formalmente el inglés, en español suena forzado. ‘Por eso’ conserva el valor causal y mejora la legibilidad sin añadir contenido.
  - severity: low
    issue: La nota [b] podría anclarse con mayor precisión en ‘poder’.
    rationale: La explicación sobre ⲟⲉⲓϣ corresponde directamente al término ‘poder’; su ubicación actual es menos problemática que la de [a], pero conviene mantener anclajes semánticamente exactos.
