translation:
  language: es
  text: Por eso, no permitan que se me oiga; y no permitan que se me conozca por juicio[a] ni por ningún otro poder[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La secuencia copta probablemente refleja el préstamo griego ⲕⲣⲓⲙⲁ (“juicio”); si la OCR omitió ⲣⲓ, el sentido sigue siendo probable, aunque no absolutamente seguro.
    reason: textual_variant
  - marker: b
    text: ⲟⲉⲓϣ suele significar “fuerza” o “poder”; por eso el cierre también puede entenderse como “por cualquier otro poder”.
    reason: cultural_note
lexical_decisions:
- source_word: ⲉⲧⲃⲉ ⲡⲁⲓ
  english_pob_choice: Because of this
  chosen_spanish: Porque de esto
  alternatives_spanish:
  - Por esta razón
  - A causa de esto
  lexicon: Crum; Lambdin §303
  rationale: Mantiene el valor causal explícito del original sin volverlo más explicativo de lo que exige la frase.
- source_word: ⲙⲡⲣ ⲣⲁⲧ ⲥⲱⲧⲙ ⲛⲥⲱⲓ
  english_pob_choice: do not let me be heard
  chosen_spanish: no permitan que se me oiga
  alternatives_spanish:
  - no me hagan oír
  - no permitan que me escuchen
  lexicon: Crum s.v. ⲥⲱⲧⲙ; Lambdin §167
  rationale: La construcción causativa negativa se vierte en español con una pasiva impersonal natural, conservando el matiz de ‘hacer/permitir oír’ sin forzar un calco.
- source_word: ⲙⲡⲣ ⲣⲁⲧ ⲥⲟⲟⲩⲛ ⲙⲙⲟⲓ
  english_pob_choice: do not let me be known
  chosen_spanish: no permitan que se me conozca
  alternatives_spanish:
  - no me den a conocer
  - no permitan que me conozcan
  lexicon: Crum s.v. ⲥⲟⲟⲩⲛ
  rationale: Se preserva el paralelismo con la primera prohibición y el valor causativo de la forma coptica.
- source_word: ⲛ ⲕⲣⲓⲙⲁ ⲏ ⲛⲕⲉⲟⲩⲟⲉⲓϣ
  english_pob_choice: by judgment or by any other power
  chosen_spanish: por juicio o por cualquier otro poder
  alternatives_spanish:
  - mediante juicio o mediante cualquier otra fuerza
  - a través de juicio o de cualquier otro poder
  lexicon: LSJ s.v. κρῖμα; Crum s.v. ⲟⲉⲓϣ
  rationale: ‘Por’ conserva el valor instrumental sin añadir agencia. ‘Juicio’ mantiene la lectura probable del préstamo griego, y ‘poder’ traduce el campo semántico de ⲟⲉⲓϣ.
theological_decisions:
- issue: 'Valor de la prohibición: pasiva impersonal versus formulación más literal'
  english_pob_reading: do not let me be heard / do not let me be known
  chosen_spanish_reading: no permitan que se me oiga / no permitan que se me conozca
  alternative_spanish_readings:
  - no me hagan oír / no me hagan conocer
  - no permitan que me escuchen / no permitan que me conozcan
  rationale: La pasiva impersonal expresa mejor la fuerza causativa-negativa de la construcción coptica sin introducir sujetos innecesarios o una voz activa artificial.
  doctrine_reference: Gramática de la prohibición y el valor causativo del jussivo negativo; no hay afirmación doctrinal adicional.
translation_notes:
  revision_awareness: 'Se revisó el texto inglés auditado y sus notas: la lectura de ⲕⲣⲓⲙⲁ como ‘juicio’ es probable pero no totalmente segura, y ⲟⲉⲓϣ apunta a ‘poder/fuerza’. No se adoptaron cambios respecto del último pasaje auditado, pero sí se ajustó el español para sonar más natural y conservar el paralelismo.'
  spanish_consistency_notes:
  - Se mantuvo el paralelismo entre las dos prohibiciones con la misma estructura verbal.
  - Se prefirió ‘poder’ para ⲟⲉⲓϣ en coherencia con el audit trail inglés, aunque ‘fuerza’ sigue siendo una alternativa válida.
  - Se usó ‘juicio’ para la probable lectura de ⲕⲣⲓⲙⲁ sin cargarla con matices doctrinales adicionales.
