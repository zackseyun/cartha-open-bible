  spanish_quality_summary: El español es mayormente claro, pero puede mejorarse en naturalidad y en la colocación de las notas. ‘No permitan que se me oiga / conozca’ es aceptable y mantiene el matiz causativo-permisivo. La frase inicial necesita ajuste idiomático.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. ‘Juicio’ para la probable lectura de ⲕⲣⲓⲙⲁ y ‘poder’ para ⲟⲉⲓϣ están bien. No intervienen términos teológicos sensibles del glosario principal.
  issues:
