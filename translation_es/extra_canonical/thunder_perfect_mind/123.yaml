review_pass:
  verdict: revise
  source_alignment_summary: El borrador español preserva la triple repetición y la fórmula «Yo soy el perdón», pero «el que ha de llegar» no representa bien ⲡⲉⲧⲛⲁϣⲱⲡⲉ (‘lo que/el que llegará a ser, vendrá a ser, sucederá’). «Llegar» desplaza el sentido hacia movimiento/venida física y reduce la ambigüedad ontológica/eventiva documentada en el inglés POB.
  spanish_quality_summary: El español es legible y mantiene la cadencia, pero puede mejorarse con una opción más fiel y natural como «el que ha de llegar a ser». También conviene ajustar la nota para reflejar con precisión las alternativas auditadas en inglés; «el que ha de hacerse» suena menos natural y menos preciso que «el que llegará a ser».
  glossary_alignment: No hay términos del glosario principal especialmente implicados. «Perdón» para ⲥⲩⲛⲅⲛⲱⲙⲏ está bien alineado con la decisión inglesa «forgiveness». «Yo soy» para ⲁⲛⲟⲕ ⲡⲉ también es correcto. El único desajuste léxico importante está en ⲡⲉⲧⲛⲁϣⲱⲡⲉ.
  issues:
  - severity: high
    issue: «el que ha de llegar» mistraduce ⲡⲉⲧⲛⲁϣⲱⲡⲉ
    rationale: El verbo copto ϣⲱⲡⲉ significa «llegar a ser, suceder, acontecer», no «llegar» sin más. La versión española introduce una idea de venida física ausente del fundamento léxico y del rastro de auditoría inglés.
  - severity: medium
    issue: La nota a explica de forma imprecisa la ambigüedad
    rationale: Dice que «el que ha de llegar» conserva la ambigüedad entre evento y persona, pero en realidad la reduce. Además, «el que ha de hacerse» no refleja tan bien la alternativa auditada como «el que llegará a ser» o «lo que ha de suceder».
  revised_spanish_text: el que ha de llegar a ser[a]. Yo soy el perdón[b], y el que ha de llegar a ser[a]. Yo soy el perdón[b], y el que ha de llegar a ser[a]. Yo soy el perdón[b]...
  revised_footnotes:
  - marker: a
    text: El copto puede entenderse también como «lo que ha de suceder» o «lo que llegará a ser»; se eligió «el que ha de llegar a ser» para conservar, en la medida de lo posible, la ambigüedad entre referente personal e impersonal presente en el original.
    reason: alternative_reading
  - marker: b
    text: El término copto es un préstamo del griego συγγνώμη, que en uso cristiano puede significar perdón, indulgencia o clemencia; se eligió «perdón» por ser la opción más clara y natural.
    reason: lexical_alternative
  revision_rationale: Se corrige el valor léxico de ⲡⲉⲧⲛⲁϣⲱⲡⲉ para reflejar «llegar a ser / suceder» en vez de «llegar». Esto preserva mejor la base copta y la nota inglesa auditada, sin perder la cadencia repetitiva del pasaje.
