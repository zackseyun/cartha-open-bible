translation:
  language: es
  text: el que ha de llegar[a]. Yo soy el perdón[b], y el que ha de llegar[a]. Yo soy el perdón[b], y el que ha de llegar[a]. Yo soy el perdón[b]...
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El copto puede entenderse también como «lo que ha de acontecer» o «el que ha de hacerse»; se eligió «el que ha de llegar» para conservar la ambigüedad entre evento y persona sin sonar forzado en español.
    reason: alternative_reading
  - marker: b
    text: El término copto es un préstamo del griego συγγνώμη, que en uso cristiano puede significar perdón, indulgencia o clemencia; se eligió «perdón» por ser la opción más clara y natural.
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲁⲛⲟⲕ ⲡⲉ
  english_pob_choice: I am
  chosen_spanish: Yo soy
  alternatives_spanish:
  - Soy
  - Yo mismo soy
  lexicon: Construcción copulativa/enfática del copto sahídico
  rationale: Conservo la fórmula directa de identidad y la cadencia enfática del original, sin volverla más interpretativa de lo que exige el texto.
- source_word: ⲡⲉⲧⲛⲁϣⲱⲡⲉ
  english_pob_choice: what/who will come to be
  chosen_spanish: el que ha de llegar
  alternatives_spanish:
  - lo que ha de acontecer
  - el que ha de llegar a ser
  lexicon: Copt. ϣⲱⲡⲉ 'llegar a ser, suceder'; relativo futuro
  rationale: Opto por una frase sustantivada natural en español que conserve la ambigüedad entre persona y acontecimiento, pero aquí suene más idiomática que un calco rígido.
- source_word: ⲧⲉⲥⲩⲛⲅⲛⲱⲙⲏ
  english_pob_choice: the forgiveness
  chosen_spanish: el perdón
  alternatives_spanish:
  - el perdón y la indulgencia
  - el perdón / el perdón misericordioso
  lexicon: Préstamo griego συγγνώμη vía copto; uso cristiano de 'forgiveness/pardon'
  rationale: En español, 'perdón' comunica con claridad el valor cristiano de συγγνώμη sin introducir una perífrasis más pesada que el ritmo del himno.
- source_word: ⲁⲩⲱ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - también
  - e
  lexicon: Conjunción copta coordinante
  rationale: Mantengo la coordinación simple para reproducir la serie repetitiva del texto.
translation_notes:
  revision_awareness: La nota de revisión señala que el copto repite tres veces la secuencia «I am the forgiveness, and the one who will come to be», y que el relativo futuro debe leerse como un sustantivo («the one who will come to be») más que como un encabezado interrogativo o temático. La versión española preserva las tres repeticiones y el cierre con puntos suspensivos, conforme al estado revisado del texto base.
  spanish_consistency_notes:
  - Se mantuvo la repetición triple exigida por la revisión textual.
  - Se evitó traducir el relativo futuro como interrogativa o encabezado, siguiendo la corrección del audit trail.
  - Se conservó un registro sobrio y litúrgico, sin sustituir el valor léxico del préstamo griego por terminología eclesiástica más tradicionalista.
