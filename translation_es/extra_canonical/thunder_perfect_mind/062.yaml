translation:
  language: es
  text: Y cuando ustedes se escondan,[a][b][c] yo soy el que será visto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'ⲥⲙⲓⲛⲉ puede llevar también la idea de ‘hacerse pequeño’ o ‘disminuir’; otra posibilidad sería: ‘Y cuando ustedes se hagan pequeños, yo soy el que será visto.’'
    reason: lexical_alternative
  - marker: b
    text: El fragmento fuente también parece contener material de líneas adyacentes (‘en el comienzo de la creación’ y ‘una aparición visible de un niño pequeño’); aquí se traduce solo la cláusula de esconder/ser visto según la alineación del bloque.
    reason: source_note
  - marker: c
    text: 'Si el ⲙⲡⲣⲙⲉⲥⲧⲱⲥ final pertenece a esta cola, también es posible leer: ‘Y no se escondan; yo soy el que será visto.’'
    reason: alternative_reading
lexical_decisions:
- source_word: ⲥⲙⲓⲛⲉ
  english_pob_choice: hide yourselves
  chosen_spanish: se escondan
  alternatives_spanish:
  - se hagan pequeños
  - se humillen
  - se oculten
  lexicon: Crum; Layton
  rationale: El contexto inmediato opone el ocultarse con el ser visto, por lo que ‘se escondan’ conserva el contraste perceptible de la línea. En español, el reflexivo mantiene la idea de acción sobre sí mismos sin sobrecargar con una interpretación ética que el pasaje no exige.
- source_word: ⲙⲓⲉ
  english_pob_choice: be seen
  chosen_spanish: ser visto
  alternatives_spanish:
  - aparecer
  - volverse visible
  - ser manifestado
  lexicon: Crum; Layton
  rationale: ‘Ser visto’ preserva el valor pasivo/resultativo de la forma copta y la reversión poética esconder/ser visto. ‘Aparecer’ es posible, pero ‘ser visto’ mantiene mejor la correspondencia con la antítesis de la cláusula anterior.
- source_word: ⲁⲩⲱ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - y entonces
  - también
  lexicon: Conjunción copta estándar
  rationale: La conjunción es aditiva; ‘y’ reproduce el enlace simple del original sin introducir contraste o secuencia no marcados.
