translation:
  language: es
  text: No es mi defensa cuando me llaman[a], y la injusticia[b] que ustedes han considerado, la dejan para abrir sus bocas y juzgarme[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El inicio del segmento incluye ⲁⲡⲟⲗⲟⲅⲓⲁ («defensa») y luego una forma de ⲙⲟⲩⲧ («llamar»). Dado el contexto forense, «cuando me llaman» expresa mejor una convocatoria o citación que una simple llamada.
    reason: source_note
  - marker: b
    text: «Injusticia» refleja el compuesto copto ϫⲓⲛϭⲟⲛⲥ. La lectura anterior «número» pertenece a una alineación equivocada y no a este pasaje.
    reason: textual_variant
  - marker: c
    text: La cláusula final conserva el verbo judicial de origen griego en el fragmento copto, de ahí «juzgarme».
    reason: source_note
lexical_decisions:
- source_word: ⲁⲡⲟⲗⲟⲅⲓⲁ
  english_pob_choice: defense
  chosen_spanish: defensa
  alternatives_spanish:
  - apología
  - alegato
  - explicación
  lexicon: LSJ via Coptic loan; Greek loanword in Coptic
  rationale: El préstamo griego indica una respuesta en causa propia, no una simple explicación. En español, «defensa» conserva el valor jurídico-retórico con naturalidad.
- source_word: ϫⲓⲛϭⲟⲛⲥ
  english_pob_choice: injustice
  chosen_spanish: injusticia
  alternatives_spanish:
  - violencia
  - opresión
  - daño
  lexicon: Crum; Coptic usage of ϭⲟⲛⲥ in the compound ϫⲓⲛϭⲟⲛⲥ
  rationale: El compuesto no significa «número» aquí, sino un acto o estado de injusticia/violencia. «Injusticia» es la opción más directa y legible para el español, sin perder la carga acusatoria del pasaje.
- source_word: ⲡⲉⲧⲛⲧⲁⲉⲓⲙⲟⲉⲓⲛ
  english_pob_choice: what you have considered
  chosen_spanish: que han considerado
  alternatives_spanish:
  - que han pensado
  - que han tomado en cuenta
  - que han juzgado
  lexicon: Crum; inferred adjacent clause from Coptic fragment
  rationale: La forma sugiere una cláusula relativa con sentido de pensamiento/consideración. «Han considerado» mantiene el valor cognitivo sin forzar una interpretación más fuerte de la que el fragmento permite.
- source_word: ⲭⲣⲟⲉⲓ
  english_pob_choice: open
  chosen_spanish: abrir
  alternatives_spanish:
  - abrir de par en par
  - desplegar
  lexicon: Crum; Coptic verb for opening
  rationale: El contexto de «abrir sus bocas» hace que el infinitivo español más natural sea «abrir», manteniendo el gesto corporal del texto.
- source_word: ⲧⲉⲣⲟⲟⲩ
  english_pob_choice: their mouths
  chosen_spanish: sus bocas
  alternatives_spanish:
  - la boca
  - sus labios
  lexicon: Crum; plural noun for mouths
  rationale: «Bocas» conserva el plural del fragmento y el efecto retórico del acto de hablar/atacar. En español es más literal y expresivo que singularizarlo.
- source_word: ⲉⲣⲓⲕⲣⲓⲛⲉ ⲙⲙⲟ[ⲓ
  english_pob_choice: judge me
  chosen_spanish: juzgarme
  alternatives_spanish:
  - fallarme
  - condenarme
  - sentenciarme
  lexicon: LSJ via Greek loan; judicial semantic range
  rationale: El verbo prestado de griego conserva claramente el campo judicial. «Juzgarme» es la traducción más sobria y exacta; las alternativas intensifican el resultado pero añaden más interpretación.
theological_decisions:
- issue: Tensión entre «defensa» y el acto de acusar/juzgar
  english_pob_reading: It is not my defense when they call... and... open their mouths to judge me.
  chosen_spanish_reading: No es mi defensa cuando llaman... para abrir sus bocas y juzgarme.
  alternative_spanish_readings:
  - No es mi defensa cuando me llaman...
  - No es mi alegato cuando llaman...
  rationale: 'El fragmento Coptic conserva una escena de juicio o controversia: defensa, consideración, apertura de bocas para juzgar. La traducción evita suavizar el conflicto y mantiene la secuencia forense.'
  doctrine_reference: Not doctrinally determinative; preserves rhetorical/juridical imagery of the source
translation_notes:
  revision_awareness: 'Se siguió la revisión adjudicada como corrección mayor: el segmento no corresponde al antiguo borrador sobre «no hablo / muchas palabras», sino a un pasaje forense con «defensa», «injusticia», «considerado» y «juzgarme». La traducción española se alineó con el fragmento coptico y con la lectura revisada del auditor inglés, evitando la interpretación desalineada previa.'
  spanish_consistency_notes:
  - Se mantuvo «defensa» para ⲁⲡⲟⲗⲟⲅⲓⲁ y «juzgarme» para el verbo judicial final, conservando el tono procesal del texto.
  - «Injusticia» se prefirió a opciones más amplias como «violencia» porque es la forma más transparente y coherente con el contexto de acusación.
  - No se introdujo vocabulario cristiano tradicional ajeno al fragmento; la redacción busca ser fiel, sobria y legible en español contemporáneo.
