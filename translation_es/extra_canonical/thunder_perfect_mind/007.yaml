translation:
  language: es
  text: 'No me ignores.[a]


    Porque yo soy el primero y el último;

    yo soy la honrada y la despreciada;

    yo soy la ramera y la santa;[d]

    yo soy la esposa[b] y la virgen[c][e].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El copto tiene aquí un imperativo negativo de tipo cognitivo; «No me ignores» expresa de manera natural la advertencia sin convertirla en una simple instrucción intelectual.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, el copto dice «mujer». Se traduce «esposa» para hacer más nítido el contraste con «virgen», siguiendo la opción ya documentada en el texto inglés de la POB.
    reason: lexical_alternative
  - marker: c
    text: Abreviatura nag hammadi de παρθένος («virgen»).
    reason: cultural_note
  - marker: d
    text: «Santa» conserva la resonancia de «santa/pura/casta» sin recurrir a un término eclesiástico más técnico.
    reason: lexical_alternative
  - marker: e
    text: 'O: «yo soy la honrada y la despreciada».'
    reason: alternative_reading
lexical_decisions:
- source_word: ⲙⲡⲣⲣⲁⲧⲥⲟⲟⲩⲛ
  english_pob_choice: do not be ignorant
  chosen_spanish: No me ignores
  alternatives_spanish:
  - No seas ignorante de mí
  - No me desconozcas
  lexicon: Crum, Coptic Dictionary
  rationale: La construcción negativa exhortativa pide una advertencia cognitiva fuerte; en español, «No me ignores» comunica con naturalidad la fuerza imperativa y relacional del original, sin perder el tono de reprensión. Se evita una calca pesada.
- source_word: ⲙⲙⲟⲉⲓ (likely ⲙⲙⲟⲓ)
  english_pob_choice: of me
  chosen_spanish: me
  alternatives_spanish:
  - de mí
  - acerca de mí
  lexicon: Crum, Coptic Dictionary
  rationale: El objeto de conocimiento en español se expresa mejor con complemento directo/pronominal en esta exhortación. «Me» mantiene la referencia personal y la fluidez del verso.
- source_word: ⲅⲁⲣ
  english_pob_choice: for
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: Crum, Coptic Dictionary (particles)
  rationale: Introduce la base causal de la afirmación con un conector natural en español. «Porque» conserva la relación discursiva simple del original.
- source_word: ⲧϣⲟⲣⲡ
  english_pob_choice: the first
  chosen_spanish: el primero
  alternatives_spanish:
  - la primera
  - el comienzo
  lexicon: Crum, Coptic Dictionary
  rationale: Se mantiene el paralelismo tradicional con «el último». Aunque el hablante es presentado en registros femeninos en otras líneas, aquí la serie nominal abstracta en español funciona de modo natural con el artículo masculino genérico sustantivado.
- source_word: ⲑⲁⲉ
  english_pob_choice: the last
  chosen_spanish: el último
  alternatives_spanish:
  - el final
  lexicon: Crum, Coptic Dictionary
  rationale: Contraparte directa de «el primero», con el mismo valor antitético y la misma cadencia.
- source_word: (ⲧ)ⲧⲁⲉⲓⲏⲩ
  english_pob_choice: the honored one
  chosen_spanish: la honrada
  alternatives_spanish:
  - la honrada y glorificada
  - la gloriosa
  lexicon: Crum, Coptic Dictionary
  rationale: Se conserva el participio/adjetivo sustantivado en femenino para reflejar las cláusulas femeninas simétricas del copto. «Honrada» reproduce el campo semántico de honor/gloria sin sobrecargar el verso.
- source_word: (ⲧ)ϣⲏϣ (OCR as printed)
  english_pob_choice: the scorned
  chosen_spanish: la despreciada
  alternatives_spanish:
  - la deshonrada
  - la escarnecida
  lexicon: Crum (sense uncertain here)
  rationale: La evidencia del audit trail señala que la lectura OCR es incierta y que el sentido esperado es el de un polo antitético de rechazo. «Despreciada» mantiene esa oposición en un español claro y digno.
- source_word: ⲡⲟⲣⲛⲏ
  english_pob_choice: whore
  chosen_spanish: ramera
  alternatives_spanish:
  - prostituta
  lexicon: LSJ (Greek loanword) / Crum
  rationale: «Ramera» conserva un registro fuerte y poético, acorde con el golpe retórico del poema, y corresponde al tono crudo que el POB mantiene en inglés con «whore».
- source_word: ⲥⲉⲙⲛⲏ
  english_pob_choice: holy one
  chosen_spanish: santa
  alternatives_spanish:
  - pura
  - consagrada
  lexicon: Crum, Coptic Dictionary
  rationale: El sentido base es «santa, pura, casta». En español, «santa» preserva la resonancia religiosa sin forzar una terminología eclesiástica excesiva y encaja con el paralelo de «ramera».
- source_word: ⲥϩⲓⲙⲉ
  english_pob_choice: wife
  chosen_spanish: esposa
  alternatives_spanish:
  - mujer
  lexicon: Crum, Coptic Dictionary
  rationale: El copto significa literalmente «mujer», pero la POB inglesa escogió «wife» para intensificar el contraste con «virgin». En español, «esposa» reproduce ese contraste de manera clara y natural. Se conserva en nota la base literal «mujer».
- source_word: ⲡⲁⲣ (abbr. for παρθένος)
  english_pob_choice: virgin
  chosen_spanish: virgen
  lexicon: LSJ (παρθένος) / Nag Hammadi scribal conventions
  rationale: Es la equivalencia estándar de παρθένος y funciona como polo opuesto de «esposa». Mantiene el peso simbólico y la cadencia del original.
translation_notes:
  revision_awareness: El audit trail inglés muestra una revisión que eliminó «one» de «the honored one» para restaurar el paralelismo; esta decisión se refleja en español con series breves y simétricas («la honrada / la despreciada», «la ramera / la santa», «la esposa / la virgen»). También se respetó la lectura cautelosa del segundo polo por la incertidumbre del OCR y se evitó suavizar el registro fuerte de «whore».
  spanish_consistency_notes:
  - Se mantiene «No me ignores» como equivalente natural del imperativo negativo cognitivo.
  - Se conserva el paralelismo rítmico mediante artículos y adjetivos sustantivados femeninos donde corresponde.
  - «Ramera» y «santa» preservan el contraste retórico fuerte del original sin eclesiasticismos innecesarios.
  - «Esposa» traduce la opción interpretativa ya documentada por la POB inglesa; la literalidad «mujer» queda reservada a la nota.
  - Se usa «virgen» para παρθένος conforme a la convención nag hammadi y al paralelismo antitético.
