  text: 'Do not be ignorant of me.

    For I am the first and the last;

    I am the honored and the scorned[a];

    I am the whore and the holy one[d];

    I am the wife[b] and the virgin[c][e].'
  footnotes:
  - marker: a
    text: OCR reads ϣⲏϣ (“great/many”), which would not oppose “honored.” Many editors emend or read a form meaning “despised/scorned.” Rendering follows the expected paradox; reading remains tentative.
    reason: alignment_note
  - marker: b
    text: Coptic ⲥϩⲓⲙⲉ = “woman.” In contrast with παρθένος, many translators choose “wife” to make the antithesis starker; base sense is noted here.
    reason: lexical_alternative
  - marker: c
    text: ⲡⲁⲣ is a Nag Hammadi-style abbreviation for Greek παρθένος (“virgin”).
    reason: cultural_note
  - marker: d
    text: ⲥⲉⲙⲛⲏ can mean “holy, pure, chaste.” “Holy one” keeps the religious resonance without ecclesiastical overtones.
    reason: lexical_alternative
  - marker: e
    text: Or 'I am the honored one and the scorned'.
    reason: previous_rendering
