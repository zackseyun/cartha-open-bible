translation:
  language: es
  text: Yo soy la esclava de quien me preparó. Yo soy la gobernante de mi descendencia. Pero él es quien me engendró antes del día de mi nacimiento.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ⲧϩⲙϩⲁⲗ
  english_pob_choice: servant
  chosen_spanish: esclava
  alternatives_spanish:
  - sierva
  - servidora
  lexicon: Coptic ⲧϩⲙϩⲁⲗ; término de servidumbre con género femenino en este contexto.
  rationale: En español, ‘esclava’ conserva con más fuerza la relación de pertenencia/servicio que el paralelo auditado en inglés (‘servant’), y refleja el carácter marcado del original sin suavizarlo. Se evita ‘sierva’ por tender a atenuar el peso social del término.
- source_word: ⲙⲡⲉⲛⲧⲁϥⲥⲃⲧⲱⲧ
  english_pob_choice: prepared me
  chosen_spanish: me preparó
  alternatives_spanish:
  - me dispuso
  - me hizo
  - me formó
  lexicon: Coptic verbal construction with the sense of preparing, arranging, making ready.
  rationale: ‘Preparó’ sigue de cerca el valor semántico documentado por el audit trail inglés y evita introducir una lectura más fuerte como ‘formó’ o más interpretativa como ‘dispuso’.
- source_word: ⲧϫⲟⲉⲓⲥ
  english_pob_choice: ruler
  chosen_spanish: gobernante
  alternatives_spanish:
  - señora
  - jefa
  - dueña
  lexicon: Coptic title of authority; English POB notes possible leadership title rather than only ‘ruler’.
  rationale: Como la edición inglesa preserva la posibilidad de un título de liderazgo, ‘gobernante’ comunica autoridad sin convertir la frase en una imagen doméstica o posesiva. ‘Señora’ sería más ambiguo y ‘dueña’ iría demasiado lejos.
- source_word: ⲙⲛⲧϣⲏⲣⲉ
  english_pob_choice: offspring
  chosen_spanish: descendencia
  alternatives_spanish:
  - hijos
  - progenie
  - linaje
  lexicon: Coptic collective nominalization from ‘child’, with abstract/collective sense.
  rationale: ‘Descendencia’ reproduce bien el sentido colectivo y permite mantener el carácter paradójico del dicho. ‘Hijos’ suena demasiado concreto y masculino; ‘linaje’ desplaza el foco hacia estirpe social.
- source_word: ⲡⲁⲓ ⲇⲉ ⲛⲧⲁϥ[ϫⲡⲟⲉⲓ]
  english_pob_choice: But he is the one who begot me
  chosen_spanish: Pero él es quien me engendró
  alternatives_spanish:
  - Pero él es quien me dio a luz
  - Pero él es quien me hizo nacer
  lexicon: Coptic generative verb with birth/engendering force, retained in the English POB with ‘begot’.
  rationale: ‘Engendró’ mantiene el vínculo generativo y el tono del dicho, sin neutralizarlo con una expresión menos específica como ‘me hizo nacer’.
- source_word: ⲉⲗⲗⲱ / ϩⲁⲧⲉϩⲏ
  english_pob_choice: before the day of my birth
  chosen_spanish: antes del día de mi nacimiento
  alternatives_spanish:
  - antes del día en que nací
  - antes del día de mi engendramiento
  lexicon: Temporal phrase indicating precedence relative to the day of birth; the English audit trail reads ‘before’.
  rationale: ‘Antes del día de mi nacimiento’ conserva la paradoja temporal de manera clara y natural en español, siguiendo de cerca la lectura auditada.
theological_decisions:
- issue: Paradoja de maternidad/paternidad y autoidentificación
  english_pob_reading: I am the servant of the one who prepared me. I am the ruler of my offspring. But he is the one who begot me before the day of my birth.
  chosen_spanish_reading: Yo soy la esclava de quien me preparó. Yo soy la gobernante de mi descendencia. Pero él es quien me engendró antes del día de mi nacimiento.
  alternative_spanish_readings:
  - Yo soy la sierva de quien me preparó. Yo soy la cabeza de mi descendencia. Pero él es quien me engendró antes del día de mi nacimiento.
  - Yo soy la esclava de quien me preparó. Yo soy la dueña de mi descendencia. Pero él es quien me engendró antes del día de mi nacimiento.
  rationale: La formulación debe conservar la tensión deliberada entre subordinación y autoridad, así como el enunciado paradójico sobre el origen anterior al nacimiento. ‘Gobernante’ y ‘descendencia’ permiten mantener esa tensión sin domesticarla ni resolverla.
  doctrine_reference: Fuente literaria de Nag Hammadi; no se pretende armonización doctrinal con lecturas bíblicas tradicionales.
translation_notes:
  revision_awareness: La revisión académica identificó una desalineación grave del borrador anterior con un OCR erróneo de otra parte del texto. Este borrador sigue la alineación corregida del pasaje real en Thunder 14:4-8 según el informe de revisión, y por eso usa ‘preparó’, ‘gobernante’ y ‘engendró’ en lugar de las lecturas equivocadas previas.
  spanish_consistency_notes:
  - Se mantiene ‘Yo soy’ para reproducir la anáfora del original y del audit trail inglés.
  - Se evita ‘SEÑOR’ y se usa un término de autoridad no litúrgico, acorde con el carácter no bíblico-canónico del texto.
  - Se conserva un registro digno y moderno, sin depender de fórmulas arcaizantes.
  - ‘Esclava’ se usa aquí por la fuerza relacional del original; no se normaliza a ‘sierva’ por defecto.
