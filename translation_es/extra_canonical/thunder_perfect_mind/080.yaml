lexical_decisions:
- source_word: ϩⲓⲣⲏⲛⲏ (loan from Greek εἰρήνη)
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - tranquilidad
  - armonía
  lexicon: Crum; Layton; LSJ (for Greek loans)
  rationale: '"Paz" es el equivalente natural y de mayor fuerza en español para mantener el contraste directo con "guerra" sin suavizar el paralelismo del poema.'
- source_word: ⲡⲟⲗⲉⲙⲟⲥ (loan from Greek πόλεμος)
  english_pob_choice: war
  chosen_spanish: guerra
  alternatives_spanish:
  - batalla
  - conflicto
  lexicon: Crum; Layton; LSJ
  rationale: '"Guerra" conserva la oposición máxima frente a "paz" y reproduce mejor el peso antitético del original que opciones más débiles como "conflicto".'
- source_word: ⲉⲧⲃⲉ ⲁⲛⲟⲕ ("because of me")
  english_pob_choice: because of me
  chosen_spanish: por mí
  alternatives_spanish:
  - a causa de mí
  - en razón de mí
  lexicon: Crum; Layton
  rationale: '"Por mí" expresa de forma breve y natural la causalidad del copto; en español mantiene la ambigüedad poética del enunciado sin añadir matices devocionales no presentes en el texto.'
- source_word: ⲝⲉⲛⲟⲥ (loan from Greek ξένος)
  english_pob_choice: foreigner
  chosen_spanish: extranjera
  alternatives_spanish:
  - forastera
  - extraña
  lexicon: Crum; Layton; LSJ
  rationale: Se eligió el femenino para concordar con la voz del discurso en este segmento y "extranjera" para conservar el contraste cívico con "ciudadana"; "extraña" sería más amplio, pero menos preciso.
- source_word: ⲡⲟⲗⲓⲧⲏⲥ (loan from Greek πολίτης)
  english_pob_choice: citizen
  chosen_spanish: ciudadana
  alternatives_spanish:
  - ciudadana urbana
  - vecina
  lexicon: Crum; Layton; LSJ
  rationale: '"Ciudadana" mantiene el binomio cívico exacto con "extranjera" y preserva la tensión social del original.'
- source_word: ⲉⲓ (perfect/aorist of 'to come')
  english_pob_choice: has come
  chosen_spanish: ha venido
  alternatives_spanish:
  - ha llegado
  - ha surgido
  lexicon: Crum; Layton
  rationale: '"Ha venido" reproduce el valor perfectivo de llegada/irrupción y funciona con naturalidad en español; "ha surgido" sería más interpretativo.'
translation_notes:
  revision_awareness: Se tuvo en cuenta el audit trail en inglés y sus notas de alternativas léxicas. Dado que el segmento es breve y no presenta decisiones doctrinales explícitas, la revisión se concentró en la equivalencia poética, el paralelismo antitético y la naturalidad del español. También se respetó el ajuste cívico de «extranjera/ciudadana» que el inglés subraya con «foreigner/citizen».
  spanish_consistency_notes:
  - Se mantuvo un registro de género femenino en la autodeclaración («extranjera», «ciudadana») por concordancia interna del pasaje.
  - Se preservó el paralelismo léxico paz/guerra para no debilitar la paradoja del texto.
  - No se introdujo terminología eclesiástica posterior ni se suavizó la causalidad del pasaje.
