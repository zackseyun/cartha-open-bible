translation:
  language: es
  text: Porque yo soy el primero y el último[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Cf. Isaías 44:6 y Apocalipsis 22:13, donde aparecen fórmulas muy similares.
    reason: cross_reference
  - marker: b
    text: ⲑⲁⲉ también puede leerse como «el fin»; se elige «el último» para conservar el paralelismo balanceado.
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲅⲁⲣ
  english_pob_choice: for
  chosen_spanish: Porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: conector causal coptico
  rationale: La partícula introduce la razón de la afirmación anterior; «Porque» mantiene la relación causal de forma natural en español.
- source_word: ⲁⲛⲟⲕ
  english_pob_choice: I am
  chosen_spanish: yo soy
  alternatives_spanish:
  - soy
  - yo
  lexicon: pronombre copto sahídico
  rationale: Conservar el verbo explícito reproduce el tono de autoidentificación solemne del original y del audit trail inglés.
- source_word: ⲧϣⲟⲣⲡ
  english_pob_choice: the first
  chosen_spanish: el primero
  alternatives_spanish:
  - el primero en el orden
  - el comienzo
  lexicon: sustantivo/adjetivo copto sahídico
  rationale: El término funciona aquí como título identitario en paralelo con el segundo miembro; «el primero» conserva la simetría con «el último».
- source_word: ⲁⲩⲱ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: conjunción sahídica
  rationale: La simple coordinación en español mantiene el paralelismo antitético.
- source_word: ⲑⲁⲉ
  english_pob_choice: the last
  chosen_spanish: el último
  alternatives_spanish:
  - el fin
  - el final
  lexicon: sustantivo copto sahídico
  rationale: Aunque puede significar «el fin», la opción «el último» refleja mejor la correspondencia balanceada con «el primero» y la lectura elegida por POB en inglés.
theological_decisions:
- issue: Fórmula de autoidentificación absoluta con eco bíblico
  english_pob_reading: For I am the first and the last.
  chosen_spanish_reading: Porque yo soy el primero y el último.
  alternative_spanish_readings:
  - Porque yo soy el comienzo y el fin.
  - Pues yo soy el primero y el final.
  rationale: No se atenúa la pretensión de identidad; se conserva la forma directa y solemne. «El primero y el último» mantiene el eco intertextual sin imponer una interpretación doctrinal adicional.
  doctrine_reference: Isaías 44:6; Apocalipsis 22:13
translation_notes:
  revision_awareness: Se siguió el texto copto citable del fragmento y el audit trail inglés de POB sin cambios relevantes en la revisión más reciente; la decisión principal fue mantener la equivalencia paralela entre «the first» y «the last» en español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero aquí no aparece el nombre divino.
  - Se conserva un registro solemne y bíblico, sin modernizar el enunciado hasta volverlo parafrástico.
  - Las notas usan marcas únicas y corresponden exactamente a los anclajes en el texto.
