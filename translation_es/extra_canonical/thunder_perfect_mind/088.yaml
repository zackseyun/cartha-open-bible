  - Se evita ‘SEÑOR’ o equivalentes no presentes en el original.
  - ‘dominio de sí mismo’ conserva el registro ético sin forzar un tecnicismo eclesiástico.
  - La construcción repetida ‘de sí mismo’ mantiene el paralelismo con el inglés auditado y con el contraste del copto.
  - Se respeta el límite del fragmento sin traducir la preposición final aislada como si cerrara la frase.
