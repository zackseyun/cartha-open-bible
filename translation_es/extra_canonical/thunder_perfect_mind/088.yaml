lexical_decisions:
- source_word: ⲁⲛⲟⲕ ⲧⲉ
  english_pob_choice: I am the
  chosen_spanish: Yo soy el
  alternatives_spanish:
  - Yo soy
  - Soy yo el
  lexicon: Predicación sahídica con sujeto explícito de primera persona; ⲧⲉ marca concordancia femenina en la voz del enunciador.
  rationale: Mantiene la afirmación directa en primera persona. En español conviene expresar el sujeto para conservar la fuerza enfática del original sin sonar artificial.
- source_word: ⲧⲁϣϭⲏⲗ
  english_pob_choice: self-control
  chosen_spanish: dominio de sí mismo
  alternatives_spanish:
  - autodominio
  - contención
  - disciplina
  lexicon: Sustantivo ético de control o contención de sí; el audit trail inglés prefiere ‘self-control’ frente a opciones más estrechas.
  rationale: ‘Dominio de sí mismo’ comunica con claridad la virtud moral y conserva el matiz de control/contención mejor que una sola palabra española que podría sonar demasiado técnica o estrecha.
- source_word: ⲉⲕⲟⲗ
  english_pob_choice: lack of self-control
  chosen_spanish: falta de dominio de sí mismo
  alternatives_spanish:
  - descontrol
  - intemperancia
  - falta de contención
  lexicon: Término opuesto que probablemente expresa falta de restricción o licenciosidad; el inglés evita estrecharlo solo a lo sexual.
  rationale: ‘Falta de dominio de sí mismo’ mantiene el paralelismo con la primera expresión y preserva la amplitud semántica del contraste sin reducirlo a ‘licenciosidad’.
