  text: 'greatness in parts from smallness[a].

    For they know smallness from greatness.

    Why do you curse me and honor me?

    You have wounded, and you have shown mercy.

    Do not cast out the first things[c][b],'
  footnotes:
  - marker: a
    text: The OCR likely read ⲧⲙⲛⲧⲕⲟⲩⲉⲓ where ⲧⲙⲛⲧⲕⲟⲩⲓ (“smallness”) is expected in antithesis with “greatness.” Some editors read “understanding” here; the mapping is not certain.
    reason: alignment_note
  - marker: b
    text: ⲡⲟⲩϩⲧ is taken as “poverty” (hence wretchedness), but could be “affliction/destitution.” The prepositional complex “ⲉⲃⲟⲗ ⲛⲛϣⲟⲣⲡ” is rendered “from the beginnings” to preserve the temporal layering.
    reason: lexical_alternative
  - marker: c
    text: Or 'greatness in outlying places,\nin the smallness that grows old,[a]\nknow smallness, for\nit comes forth from the other greatness.\nDo not forget me,\nand do not cast me away.\nDo not gaze at me,\nnor bring poverty out against me from the beginnings.[b]'.
    reason: previous_rendering
