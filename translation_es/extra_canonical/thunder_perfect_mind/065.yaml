translation:
  language: es
  text: 'grandeza en partes desde la pequeñez[a].


    Porque conocen la pequeñez desde la grandeza.


    ¿Por qué me maldicen y me honran?


    Me han herido, y me han mostrado misericordia.


    No desechéis las cosas primeras.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La secuencia inicial es el punto más discutido del segmento; el OCR y la alineación permiten una lectura de 'desde la pequeñez', aunque algunos testigos/editoriales han propuesto otras soluciones. Aquí se preserva la antítesis 'grandeza/pequeñez' que domina el pasaje.
    reason: textual_variant
lexical_decisions:
- source_word: ⲙⲛⲧⲛⲟϭ
  english_pob_choice: greatness
  chosen_spanish: grandeza
  alternatives_spanish:
  - magnitud
  - grandeza
  lexicon: Crum, s.v. ⲛⲟϭ; abstract with ⲙⲛⲧ-
  rationale: El abstracto coptico con ⲙⲛⲧ- expresa la cualidad de ser grande; en español, 'grandeza' reproduce bien el contraste con 'pequeñez'.
- source_word: ⲉⲃⲟⲗ ϩⲛ
  english_pob_choice: from
  chosen_spanish: desde
  alternatives_spanish:
  - de
  - desde
  lexicon: Crum, s.v. ⲉⲃⲟⲗ; preposición compuesta
  rationale: La relación espacial/origen se expresa de modo natural con 'desde'; conserva el movimiento de procedencia sin añadir explicación.
- source_word: ⲧⲙⲛⲧⲕⲟⲩⲉⲓ
  english_pob_choice: the smallness
  chosen_spanish: la pequeñez
  alternatives_spanish:
  - la pequeñez
  - la pequeñez
  - la pequeñez
  lexicon: Crum, s.v. ⲕⲟⲩⲓ ('small, little')
  rationale: La antítesis con 'grandeza' pide 'pequeñez' más que 'entendimiento'; mantiene la tensión semántica que el audit trail considera decisiva.
- source_word: ⲉϣⲁⲩⲥⲟⲩⲱⲛ
  english_pob_choice: they know
  chosen_spanish: conocen
  alternatives_spanish:
  - saben
  - conocen
  lexicon: Crum, s.v. ⲥⲟⲩⲱⲛ
  rationale: En este contexto gnómico, 'conocen' suena más natural en español que 'saben' y conserva el sentido de reconocimiento.
- source_word: ⲧⲉⲧⲛⲥⲁϩⲟⲩ
  english_pob_choice: you curse me
  chosen_spanish: me maldicen
  alternatives_spanish:
  - me maldicen
  - me maldicen
  lexicon: Crum, s.v. ⲥⲁϩⲟⲩ
  rationale: 'Sigo la lectura revisada del audit trail: el verbo aquí es ''maldicen'', no ''olvidan''; en español, la forma directa conserva la carga retórica del reproche.'
- source_word: ⲧⲉⲧⲛⲧⲁⲉⲓⲟ
  english_pob_choice: you honor me
  chosen_spanish: me honran
  alternatives_spanish:
  - me honran
  - me glorifican
  lexicon: Crum, s.v. ⲧⲁⲉⲓⲟ
  rationale: '''Honran'' reproduce el valor de reconocimiento/estima; ''glorifican'' sería más interpretativo y menos inmediato.'
- source_word: ⲁⲧⲉⲧⲛϣⲱϥ
  english_pob_choice: you have wounded
  chosen_spanish: me han herido
  alternatives_spanish:
  - me han herido
  - me han devastado
  lexicon: Crum, s.v. ϣⲱϥ
  rationale: El perfecto coptico exige pasado completivo; 'me han herido' mantiene la violencia sin exagerar más allá del léxico.
- source_word: ⲁⲧⲉⲧⲛⲛⲁ
  english_pob_choice: you have shown mercy
  chosen_spanish: me han mostrado misericordia
  alternatives_spanish:
  - me han tenido misericordia
  - me han mostrado misericordia
  lexicon: Crum, s.v. ⲛⲁ
  rationale: '''Mostrar misericordia'' conserva la construcción verbal y el contraste directo con ''herido''.'
- source_word: ⲙⲡⲣⲡⲟⲩϩⲧ ⲉⲃⲟⲗ
  english_pob_choice: do not cast out
  chosen_spanish: No desechéis
  alternatives_spanish:
  - No desechéis
  - No expulséis
  lexicon: Crum, likely s.v. ⲡⲟⲩϩⲧ/ⲡⲱⲣϫ; OCR-uncertain
  rationale: El segmento final es textual y lexicalmente incierto, pero el sentido prohibitivo se conserva mejor en español con 'No desechéis', que evita una reconstrucción demasiado técnica y mantiene la amonestación.
- source_word: ⲛⲛϣⲟⲣⲡ
  english_pob_choice: the first things
  chosen_spanish: las cosas primeras
  alternatives_spanish:
  - las primeras cosas
  - las cosas primeras
  lexicon: Crum, s.v. ϣⲟⲣⲡ ('beginning, first')
  rationale: '''Las cosas primeras'' refleja el plural y su temporalidad inicial; es más fiel que una sola abstracción como ''los comienzos'' en esta línea prohibitiva.'
translation_notes:
  revision_awareness: 'Este borrador corrige la mala segmentación previa del bloque siguiendo la revisión aplicada: la línea inicial se entiende como contraste de procedencia entre grandeza y pequeñez; la segunda mitad adopta la serie retórica ''maldicen / honran / hieren / muestran misericordia'', y el cierre conserva la advertencia sobre ''las cosas primeras''.'
  spanish_consistency_notes:
  - Se mantiene 'grandeza' frente a 'pequeñez' para sostener la antítesis lexical del original.
  - Se usa 'maldicen' y 'honran' conforme a la revisión del audit trail, evitando la lectura anterior de 'olvidar' y 'cast out'.
  - '''Me han herido'' y ''me han mostrado misericordia'' conservan el paralelismo verbal del perfecto coptico.'
  - '''Las cosas primeras'' deja abierta la capa temporal sin fijarla doctrinalmente.'
