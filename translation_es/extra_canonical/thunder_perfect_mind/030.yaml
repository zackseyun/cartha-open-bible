revisions:
- from: No me dejes[a] fuera, y me encontrarás en riquezas[b].
  to: No me dejes expulsada[a], y me encontrarás en riquezas[b].
  rationale: Se recomienda un ajuste menor para reflejar mejor la fuerza de «cast out» en el original/audit trail. «Expulsada» conserva la exclusión activa mejor que «fuera», mientras que «riquezas» ya está bien. También se añade la nota de desalineación porque forma parte del contexto textual auditado y evita reintroducir la lectura errónea anterior.
