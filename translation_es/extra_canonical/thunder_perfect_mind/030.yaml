translation:
  language: es
  text: No me dejes expulsada[a], y me encontrarás en riquezas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No me dejes fuera» o «No me dejes excluida».'
    reason: lexical_alternative
  - marker: b
    text: El historial de revisión inglés indica que este segmento fue desalineado antes con «Yo soy guerra y paz»; aquí corresponde más bien una exhortación a los oyentes seguida de una promesa de hallazgo en riquezas.
    reason: alignment_note
lexical_decisions:
- source_word: ⲙⲡⲣⲕⲁⲁⲧ ⲉⲓⲛⲏϫ ⲉⲃⲟⲗ
  english_pob_choice: Do not leave me cast out
  chosen_spanish: No me dejes fuera
  alternatives_spanish:
  - No me dejes excluida
  - No me dejes rechazada
  lexicon: Coptic negative imperative with verbal idiom; Crum, Coptic Dictionary (paralelos de salida/expulsión); audit trail POB English revised from misaligned previous line
  rationale: El Coptico expresa una prohibición directa de dejar a la hablante en estado de exclusión o afuera; en español, 'fuera' conserva la imagen sin sobrecargarla. 'Excluida' y 'rechazada' explicitan el sentido, pero van un poco más allá de la forma breve del original.
- source_word: ⲧⲉⲧⲛⲁϭⲓⲛⲉ ⲙⲙⲟⲉⲓ ϩⲛ ⲙⲙⲛⲧⲣⲙⲙⲁⲟ
  english_pob_choice: you will find me in riches
  chosen_spanish: me encontrarás en riquezas
  alternatives_spanish:
  - me encontrarás en abundancia
  - me hallarás en riquezas
  lexicon: Coptic future of 'find' plus prepositional phrase with 'riches/wealth'; Crum, Coptic Dictionary (loanword ⲣⲙⲙⲁⲟ)
  rationale: '''Riquezas'' reproduce la imagen concreta de wealth/possessions y coincide con la decisión inglesa. ''Abundancia'' suaviza el sustantivo material y pierde parte del matiz lexical de riqueza.'
- source_word: ⲉⲓⲛⲏϫ ⲉⲃⲟⲗ
  english_pob_choice: cast out
  chosen_spanish: fuera
  alternatives_spanish:
  - expulsada
  - arrojada fuera
  lexicon: Coptic idiom of being thrown/put out; Crum, Coptic Dictionary
  rationale: Aunque el inglés POB usa 'cast out', el segmento coptico parece apuntar al estado de estar afuera/expulsada. En español, 'fuera' evita duplicar la violencia verbal sin perder la exclusión implícita.
theological_decisions:
- issue: Voz e identidad de la hablante en una línea con posible desalineación textual
  english_pob_reading: The English audit trail shows that the previous 'I am war and peace' rendering was misaligned; this segment should instead read as an admonition to seekers.
  chosen_spanish_reading: Se traduce como una exhortación negativa y una promesa de hallazgo, sin insertar la autodefinición 'Yo soy guerra y paz'.
  alternative_spanish_readings:
  - Yo soy guerra y paz
  - No me rechaces y me encontrarás en riquezas
  rationale: La revisión indica que la línea correcta no contiene la fórmula de autodeclaración de identidad, sino una advertencia a no abandonar a la hablante y una promesa de encontrarla. Por fidelidad al segmento corregido, se omite la autoidentificación ajena a este pasaje.
  doctrine_reference: No aplica una doctrina específica; decisión guiada por crítica textual y alineación del pasaje.
translation_notes:
  revision_awareness: La versión inglesa inicial estaba gravemente desalineada y fue corregida en la revisión posterior; esta propuesta sigue la lectura revisada del copto, evitando incorporar la línea anterior 'I am war and peace.'
  spanish_consistency_notes:
  - Se mantiene un tono sobrio y publicable, sin lenguaje arcaizante innecesario.
  - '''Riquezas'' conserva la concreción del sustantivo del original y evita una paráfrasis teológica.'
  - No se introduce 'Señor' ni otra terminología no presente en el segmento.
  - Las notas de alternativa se limitan a opciones reales motivadas por el copto y por la propia incertidumbre de alineación del pasaje.
