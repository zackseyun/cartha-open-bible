  verdict: revise
  source_alignment_summary: 'El borrador español sigue correctamente la revisión principal del audit trail: este segmento no dice «Yo soy guerra y paz», sino una exhortación a no dejar a la hablante en condición de exclusión, seguida de la promesa «y me encontrarán/ encontrarás en riquezas». Sin embargo, «No me dejes fuera» suaviza demasiado el matiz de ⲉⲓⲛⲏϫ ⲉⲃⲟⲗ, que el inglés auditado fijó como «cast out».'
  spanish_quality_summary: El español es natural y legible, pero «dejes fuera» queda algo coloquial e impreciso frente al peso idiomático de expulsión/exclusión. Además, la combinación singular «No me dejes… me encontrarás» puede mantenerse, pero conviene reforzar el primer miembro para reflejar mejor el original. Las notas actuales son aceptables, aunque falta una nota de alineación, ya documentada en inglés, y la alternativa «excluida» funciona mejor como posible glosa que como texto principal.
  glossary_alignment: 'No hay términos doctrinales del glosario mayor en juego. La decisión clave es lexical: conservar el sentido de «cast out» con un español más fiel que «fuera». «Riquezas» está bien alineado con el audit trail inglés y preferible a «abundancia», que diluye el matiz material.'
  issues:
  - severity: medium
    issue: «No me dejes fuera» atenúa el sentido de «cast out».
    rationale: El Coptico y el audit trail inglés apuntan a una exclusión/expulsión más fuerte que la mera localización «fuera». En español, «No me dejes expulsada» o «No me dejes echada fuera» preserva mejor la fuerza.
  - severity: low
    issue: Falta la nota de desalineación heredada del audit trail inglés.
    rationale: El historial inglés documenta que el segmento fue previamente mal alineado con «I am war and peace». Esa información textual sigue siendo útil en español.
  - severity: low
    issue: La nota «No me dejes excluida» como alternativa es mejor que el texto principal, no solo una variante estilística.
    rationale: Si se mantiene «fuera» en el texto, la nota no compensa plenamente la pérdida semántica. Conviene subir la fuerza lexical al texto principal y dejar «fuera» o «excluida» como alternativas según corresponda.
  revised_spanish_text: No me dejes expulsada[a], y me encontrarás en riquezas[b].
