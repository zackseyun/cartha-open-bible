translation:
  language: es
  text: 'Yo soy la madre de mi padre[a],

    y yo soy la hermana de mi esposo[d][c][b],

    y él es mi descendencia.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El OCR muestra ‘cabeza’ (ⲧϩⲙϩⲁⲗ); la mayoría de las ediciones leen ‘madre’ (ⲧⲙⲁⲁⲩ) en esta línea.
    reason: lexical_alternative
  - marker: b
    text: La secuencia OCR ‘ⲧϫⲟⲉⲓⲥ ⲙⲡⲁϫⲡⲟ’ también puede leerse ‘señora de mi señor’; la línea recibida de Thunder es ‘hermana de mi esposo’ (ⲧⲥⲱⲛⲧ ⲙⲡⲁⲣⲱⲙⲉ).
    reason: lexical_alternative
  - marker: c
    text: ‘Descendencia’ también puede verterse ‘hijo’ o ‘hija’; el copt o subyacente usa con frecuencia ⲣⲏⲣⲉ para ‘niño/hijo’.
    reason: lexical_alternative
  - marker: d
    text: Este bloque de OCR se extiende hacia contenido adyacente, por lo que los límites de línea son inciertos; la traducción se limita al paralelismo paradojal atestiguado para el segmento 11.
    reason: source_note
lexical_decisions:
- source_word: ⲁⲛⲟⲕ ⲧⲉ
  english_pob_choice: I am
  chosen_spanish: Yo soy
  alternatives_spanish:
  - Soy
  lexicon: General sahídico
  rationale: Conserva la cadencia declarativa del original y el tono enfático de la autoidentificación poética, con un español natural.
- source_word: ⲧⲙⲁⲁⲩ (OCR leído como ⲧϩⲙϩⲁⲗ)
  english_pob_choice: mother
  chosen_spanish: madre
  alternatives_spanish:
  - cabeza
  lexicon: Crum, s.v. ⲧⲙⲁⲁⲩ; ⲧϩⲙϩⲁⲗ
  rationale: Se conserva la lectura establecida de la línea como ‘madre’, porque sostiene el par paradojal attestado; ‘cabeza’ solo explicita la duda OCR.
- source_word: ⲡⲁ… / ⲡⲓⲱⲧ
  english_pob_choice: of my father
  chosen_spanish: de mi padre
  alternatives_spanish:
  - de mi casa
  lexicon: Crum, s.v. ⲡⲓⲱⲧ; ⲡⲏⲓ
  rationale: La línea tradicional y el contexto del poema favorecen ‘padre’; ‘casa’ queda como lectura alternativa posible del fragmento dudoso.
- source_word: 'ⲧϫⲟⲉⲓⲥ ⲙⲡⲁϫⲡⲟ / lectura recibida: ⲧⲥⲱⲛⲧ ⲙⲡⲁⲣⲱⲙⲉ'
  english_pob_choice: sister of my husband
  chosen_spanish: hermana de mi esposo
  alternatives_spanish:
  - ama de mi señor
  - señora de mi señor
  lexicon: Crum, s.v. ⲥⲱⲛⲧ; ϫⲟⲉⲓⲥ
  rationale: Se sigue la lectura recibida del Thunder para esta sección, porque preserva el paralelismo genealógico del pasaje; se deja constancia de la posibilidad de ‘señora/ama de mi señor’ derivada del OCR.
- source_word: ⲛⲧⲟϥ ⲇⲉ ⲡⲉ …
  english_pob_choice: and he is my offspring
  chosen_spanish: y él es mi descendencia
  alternatives_spanish:
  - y él es mi hijo
  - y él es mi criatura
  lexicon: Crum, s.v. ⲣⲏⲣⲉ
  rationale: ‘Descendencia’ conserva el registro genealógico y la paradoja del pasaje sin cerrar del todo las posibilidades de ‘hijo’ o ‘criatura’.
translation_notes:
  revision_awareness: 'Se siguió la lectura recibida del inglés POB y su aparato crítico: se privilegió la forma establecida del enunciado paradojal frente a la OCR dudosa, y se mantuvieron las alternativas relevantes en notas.'
  spanish_consistency_notes:
  - Se mantuvo la terminología genealógica literal (‘madre’, ‘padre’, ‘hermana’, ‘esposo’, ‘descendencia’) para conservar la paradoja del texto.
  - Se evitó ‘SEÑOR’ como máscara y se prefirió ‘esposo’/‘señor’ solo donde el aparato inglés lo exige o lo problematiza.
  - La puntuación replica la estructura anafórica del original con paralelismo en tres miembros.
