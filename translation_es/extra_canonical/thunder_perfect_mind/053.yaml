translation:
  language: es
  text: 'Yo soy la que ustedes han despreciado,

    y la que han deliberado en mi contra.

    Yo soy la que ustedes han tomado,

    y la que ustedes han hecho vivir.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ⲕⲁⲧⲁⲫⲣⲟⲛⲓ
  english_pob_choice: despised
  chosen_spanish: despreciado
  alternatives_spanish:
  - menospreciado
  - tratado con desprecio
  lexicon: Crum, s.v. ⲕⲁⲧⲁⲫⲣⲟⲛⲉⲓ (préstamo de Gk καταφρονέω)
  rationale: El sentido base es ‘mirar por debajo’, ‘despreciar’; en español, ‘despreciado’ comunica ese menosprecio sin cargarlo innecesariamente hacia ‘perseguido’.
- source_word: ⲙⲉⲉⲩⲉ ⲉⲣⲟⲓ
  english_pob_choice: deliberated upon me
  chosen_spanish: deliberado en mi contra
  alternatives_spanish:
  - pensado acerca de mí
  - deliberado sobre mí
  - maquinado contra mí
  lexicon: Crum, s.v. ⲙⲉⲉⲩⲉ
  rationale: El verbo marca una acción mental dirigida al objeto; ‘deliberado en mi contra’ conserva la idea de deliberación con una orientación hostil implícita, sin convertirla en ‘planear’ si el texto no lo exige.
- source_word: ϩⲱⲡ
  english_pob_choice: seized
  chosen_spanish: tomado
  alternatives_spanish:
  - aprehendido
  - agarrado
  - arrebatado
  lexicon: Crum, s.v. ϩⲱⲡ
  rationale: Aunque ‘seized’ puede ser ‘tomado’, ‘aprehendido’ o ‘arrestado’, aquí ‘tomado’ funciona mejor en español por la brevedad paralela del pasaje y mantiene la fuerza del verbo sin introducir un matiz judicial no explicitado.
- source_word: ⲟⲩⲟⲛϩ ⲙⲙⲟⲓ
  english_pob_choice: made alive
  chosen_spanish: hecho vivir
  alternatives_spanish:
  - dado vida
  - vivificado
  - hecho viviente
  lexicon: Crum, s.v. ⲟⲩⲱⲛϩ
  rationale: La construcción transitiva significa ‘hacer vivo / dar vida a’. ‘Hecho vivir’ conserva la forma verbal activa y el paralelismo con ‘tomado’.
- source_word: ⲁⲛⲟⲕ ⲧⲉ
  english_pob_choice: I am she
  chosen_spanish: Yo soy la que
  alternatives_spanish:
  - Yo soy ella
  - Yo soy la mujer que
  lexicon: Layton, Coptic Grammar §13; Crum (predicative articles)
  rationale: Aunque el Coptic sugiere una voz femenina, el español no puede reproducir de forma natural ‘yo soy ella’ en estos encadenamientos sin sonar forzado; ‘la que’ preserva la referencia femenina y la fluidez sintáctica.
theological_decisions:
- issue: Mantener la voz femenina del hablante sin masculinizarla
  english_pob_reading: The English POB uses 'I am she' to preserve the feminine predicative article.
  chosen_spanish_reading: Yo soy la que...
  alternative_spanish_readings:
  - Yo soy ella
  - Yo soy la mujer que...
  rationale: El artículo predicativo femenino del copto señala una voz femenina. En español, ‘la que’ es la forma más natural para conservar esa marca sin perder legibilidad.
  doctrine_reference: N/A (poetic/philological decision rather than doctrinal)
- issue: No introducir la nota del topic marker ⲛ̄ⲧⲟⲟⲧ en esta unidad
  english_pob_reading: Earlier English audit notes treated ⲛ̄ⲧⲟⲟⲧ as a topic marker, but the later revision corrects it as part of the previous clause.
  chosen_spanish_reading: Se omite cualquier equivalente como ‘así ustedes’ o ‘en cuanto a ustedes’.
  alternative_spanish_readings:
  - Así ustedes
  - En cuanto a ustedes
  rationale: La revisión más reciente indica que esa forma pertenece a la cláusula anterior y no debe reflejarse aquí. Omitirla evita arrastrar una lectura corregida fuera de lugar.
  doctrine_reference: N/A (revision-control decision)
translation_notes:
  revision_awareness: 'This draft follows the latest corrected English audit trail, which removed the earlier mistaken topic-marker reading and restored the four-line parallel structure: despised / deliberated / seized / made alive. It also respects the later revision that eliminated duplicated lines and stray breaks.'
  spanish_consistency_notes:
  - Conservo la paralelismo de cuatro miembros en una sola unidad poética.
  - Uso ‘la que’ para reflejar la femenina predicativa sin forzar ‘ella’ en español.
  - Evito cualquier eco de ‘as for you’ porque la revisión final lo descarta.
  - Mantengo verbos breves y de alta intensidad para sostener el ritmo del original.
