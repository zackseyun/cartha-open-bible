review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue en general la secuencia correcta del copto y respeta la corrección auditada de no incluir un tópico inicial tipo ‘en cuanto a ustedes’. Conserva bien ‘despreciado’ y la voz femenina con ‘la que’. Sin embargo, ‘han deliberado en mi contra’ sobreinterpreta hostilidad que el copto/POB no exige, y ‘han tomado’ debilita o desvía el sentido de ϩⲱⲡ (‘asir/aprehender’).
  spanish_quality_summary: 'El español es legible, pero hay dos giros mejorables: ‘deliberado en mi contra’ suena algo forzado y añade matiz; ‘han tomado’ en español moderno es demasiado amplio y puede sonar impropio aquí. Conviene reforzar el paralelismo repitiendo ‘Yo soy la que…’ en cada hemistiquio, como en el inglés auditado.'
  glossary_alignment: No hay terminología teológica mayor en juego. La decisión ‘Yo soy la que’ alinea bien con la preservación de la voz femenina de ⲁⲛⲟⲕ ⲧⲉ. ‘Despreciado’ está bien alineado con καταφρονέω. Deben ajustarse ‘deliberated upon me’ a ‘han deliberado sobre mí’ y ‘seized’ a ‘han apresado’ o equivalente más fuerte que ‘tomado’.
  issues:
  - severity: medium
    issue: ‘han deliberado en mi contra’ añade una orientación hostil no explícita
    rationale: La decisión inglesa documenta ‘deliberate upon me’ y explícitamente evita importar ‘plot against me’ salvo que el contexto lo exija. ‘En mi contra’ empuja la línea hacia ‘maquinar contra mí’.
  - severity: medium
    issue: ‘han tomado’ no refleja bien ϩⲱⲡ
    rationale: El copto aquí significa ‘asir, apoderarse, apresar’. En español, ‘tomar’ es demasiado amplio y puede perder la fuerza verbal preservada por ‘seize’.
  - severity: low
    issue: Paralelismo incompleto en las líneas 2 y 4
    rationale: Aunque elipsis de ‘Yo soy la que’ es posible en español, repetirlo mantiene mejor el ritmo enfático y la estructura del original/POB.
  revised_spanish_text: 'Yo soy la que ustedes han despreciado,


    y yo soy la que han deliberado sobre mí.


    Yo soy la que ustedes han apresado,


    y yo soy la que ustedes han hecho vivir.'
  revision_rationale: 'Se corrigen dos puntos léxicos para ajustarse mejor al copto y al rastro de auditoría inglés: ‘sobre mí’ evita introducir hostilidad no exigida, y ‘apresado’ preserva mejor la fuerza de ϩⲱⲡ que ‘tomado’. También se repone el paralelismo completo con ‘Yo soy la que…’ en cada línea para reflejar la estructura repetitiva del original.'
