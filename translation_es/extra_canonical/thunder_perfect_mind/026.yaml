translation:
  language: es
  text: 'Ustedes que me conocen[a], no me conozcan;


    y los que no me han conocido, que me conozcan[b],


    porque yo soy conocimiento e ignorancia.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Ignorancia» traduce aquí el valor del préstamo griego ἀγνωσία en el copto; «desconocimiento» o «no saber» podrían suavizar el tono peyorativo, pero no conservan igual de bien la paradoja. En la línea verbal se vierte con «no me conozcan» para evitar la ambigüedad de «ignórenme» en español, que puede sugerir ‘hacer caso omiso’.
    reason: lexical_alternative
  - marker: b
    text: El OCR aportado mezcla líneas de otro pasaje cercano; esta redacción sigue la colocación estándar de la estrofa «conocimiento / ignorancia» en Thunder 4.
    reason: source_note
lexical_decisions:
- source_word: ⲥⲟⲟⲩⲛ (verb)
  english_pob_choice: know
  chosen_spanish: conocer
  alternatives_spanish:
  - saber
  - reconocer
  - percibir
  lexicon: Crum, Coptic Dictionary; Layton, Coptic Grammar (usage)
  rationale: Conocer mantiene el paralelismo directo con «me conocen / me han conocido» y funciona mejor en español que un abstracto como «saber» para una relación personal de conocimiento.
- source_word: ⲁⲅⲛⲟⲉⲓ (verb) / loan from Gk. ἀγνοεῖν
  english_pob_choice: be ignorant
  chosen_spanish: ignórenme
  alternatives_spanish:
  - desconózcanme
  - sean ignorantes de mí
  - no me conozcan
  lexicon: Crum (s.v. ⲁⲅⲛⲟⲉ); LSJ (ἀγνοέω)
  rationale: En español, «ser ignorante de mí» suena poco natural y demasiado explicativo; «ignórenme» conserva la fuerza imperativa y el contraste paradójico del pasaje, aunque desplaza el matiz abstracto hacia un verbo más idiomático.
- source_word: ⲅⲛⲱⲥⲓⲥ (noun)
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - gnosis
  - saber
  - conocer
  lexicon: LSJ (γνῶσις); Crum (loan usage)
  rationale: «Conocimiento» es el equivalente español natural del sustantivo y preserva la antítesis conceptual con «ignorancia».
- source_word: ⲁⲅⲛⲱⲥⲓⲁ (noun)
  english_pob_choice: ignorance
  chosen_spanish: ignorancia
  alternatives_spanish:
  - desconocimiento
  - no-saber
  - falta de conocimiento
  lexicon: LSJ (ἄγνοια/ἀγνωσία); Crum (loan usage)
  rationale: «Ignorancia» reproduce de modo directo el par semántico con «conocimiento» y mantiene la tensión retórica del original.
translation_notes:
  revision_awareness: La versión inglesa POB para este segmento está en acuerdo alto con la disposición estándar de la estrofa y no requiere revisión sustancial; el principal reto en español es conservar el imperativo paradojal sin volverlo artificial.
  spanish_consistency_notes:
  - Se mantiene el contraste terminológico conocimiento/ignorancia, alineado con la decisión inglesa para γνῶσις/ἀγνωσία.
  - Se usa un imperativo directo («ignórenme») por naturalidad idiomática española, aunque el copto subyacente permite una formulación más abstracta.
  - No se introduce vocabulario eclesiástico ajeno al segmento; la traducción conserva el tono aforístico y antitético del original.
