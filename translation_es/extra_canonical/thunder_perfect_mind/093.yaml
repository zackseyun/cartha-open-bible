translation:
  language: es
  text: 'La llamada de mi nombre — soy yo.


    Yo soy el clamor, y yo soy el oír.


    Ustedes me oyen en su llamada[a]; me llaman con un sonido que …[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Alternativa posible: “en su clamor” o “en su llamada”, según se oiga el sustantivo subyacente como más vocal o más nominal.'
    reason: alternative_reading
  - marker: b
    text: La línea está incompleta en el testimonio; el final se deja con puntos suspensivos para respetar la fractura del manuscrito.
    reason: textual_variant
lexical_decisions:
- source_word: ⲡⲱϣⲥ / ⲡ-ⲱϣ
  english_pob_choice: the calling of my name
  chosen_spanish: la llamada de mi nombre
  alternatives_spanish:
  - el clamor de mi nombre
  - el grito de mi nombre
  lexicon: Crum; revisión adjudicada del audit trail
  rationale: El audit trail revisado corrige la lectura de “sound” hacia el sentido de ‘calling/crying out’. En español, “llamada” conserva el valor nominal y el vínculo con el nombre sin volverlo demasiado interpretativo.
- source_word: ⲁⲛⲟⲕ ⲧⲉ
  english_pob_choice: it is I
  chosen_spanish: soy yo
  alternatives_spanish:
  - es yo
  - soy yo, en verdad
  lexicon: Layton; partículas de énfasis copulativo
  rationale: La construcción enfática se expresa de forma natural y breve con “soy yo”, manteniendo la identificación tajante del original.
- source_word: ⲁϣⲕⲁⲕ ⲉⲃⲟⲗ
  english_pob_choice: I am the crying out
  chosen_spanish: yo soy el clamor
  alternatives_spanish:
  - yo soy el gritar
  - yo soy el clamor que se alza
  lexicon: Crum s.v. ⲁϣⲕⲁⲕ; nota adjudicada
  rationale: La forma nominalizada pide un sustantivo. “Clamor” transmite bien la acción vocal intensa sin forzar un gerundio poco natural en español.
- source_word: ⲥⲱⲧⲙ
  english_pob_choice: the hearing
  chosen_spanish: el oír
  alternatives_spanish:
  - la escucha
  - el escuchar
  lexicon: Crum s.v. ⲥⲱⲧⲙ; nota adjudicada
  rationale: La nominalización simple “el oír” conserva el paralelo con “el clamor” y evita suavizar el verbo de percepción.
- source_word: ⲧⲉⲧⲛⲥⲱⲧⲙ ⲉⲣⲟⲓ
  english_pob_choice: You hear me
  chosen_spanish: Ustedes me oyen
  alternatives_spanish:
  - ustedes me escuchan
  - vosotros me oís
  lexicon: Crum; uso transitive de ⲥⲱⲧⲙ
  rationale: “Oír” reproduce la percepción auditiva directa del verbo y mantiene un tono natural en español amplio; el plural se conserva por el addressee retórico.
- source_word: ⲙⲟⲩⲧⲉ ⲉⲣⲟⲓ
  english_pob_choice: call me
  chosen_spanish: me llaman
  alternatives_spanish:
  - me nombran
  - me invocan
  lexicon: Crum s.v. ⲙⲟⲩⲧⲉ
  rationale: “Llamar” es el equivalente más directo y coherente con la ‘llamada’ del primer verso. “Invocan” sería más religioso y menos literal.
- source_word: ⲟⲩⲡⲱϣⲥ (reconstructed)
  english_pob_choice: a sound
  chosen_spanish: un sonido
  alternatives_spanish:
  - una voz
  - un clamor
  lexicon: Crum s.v. ⲡⲱϣⲥ; reconstrucción tentativa del audit trail
  rationale: La línea final queda fragmentaria en el OCR; “un sonido” preserva la abertura y la incertidumbre del texto sin fingir completitud.
translation_notes:
  revision_awareness: 'He incorporado la corrección del audit trail: el pasaje no debe leerse como “undefiled”, sino como una serie nominalizada centrada en el clamor/llamado y el oír. También mantengo la línea final abierta porque el Coptic OCR y la reconstrucción siguen inciertos.'
  spanish_consistency_notes:
  - Conservo un paralelismo breve y enfático entre clamor/oír, siguiendo el giro del original.
  - Evito términos eclesiásticos más cargados como “invocar” o “proclamar” porque no están exigidos por el texto.
  - Mantengo el tratamiento en segunda persona plural para respetar la retórica dirigida al auditorio.
