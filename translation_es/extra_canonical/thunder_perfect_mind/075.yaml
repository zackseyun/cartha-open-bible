    reason: alignment_note
  - marker: b
    text: ⲛⲧⲁ- can mark ‘because of (me/us/etc.)’; an alternative reconstruction would yield ‘and I am War,’ which also appears in some translations of Thunder’s paradoxes.
    reason: alternative_reading
  - marker: c
    text: ϩⲛ ⲟⲩϣⲱⲥ may mean ‘in insolence’ or ‘in shamelessness’; due to uncertainty it is not rendered in the main line.
    reason: lexical_alternative
  - marker: d
    text: 'Parallels: elsewhere in Thunder the speaker says ‘I am peace, and because of me there is war,’ maintaining the paradoxical self-revelation motif.'
    reason: cross_reference
  - marker: e
    text: Or 'I have come, and they call me the First — and they despise me.'.
    reason: previous_rendering
