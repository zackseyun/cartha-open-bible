translation:
  language: es
  text: Soy la honrada[a] y la que ellos bendicen, y la que ellos desprecian con desdén. Soy Paz, y a causa de mí hay Guerra[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La lectura inglesa corregida entiende aquí ‘la honrada’ y no ‘he venido’ ni ‘la primera’; la marca señala el carácter titular del sintagma.
    reason: source_note
  - marker: b
    text: ‘A causa de mí hay Guerra’ sigue la lectura causal preferida por el audit trail; una reconstrucción alternativa, menos probable según la revisión, sería ‘y soy Guerra’.
    reason: alternative_reading
lexical_decisions:
- source_word: ⲧⲁⲉⲓⲏⲟⲩ
  english_pob_choice: the honored one
  chosen_spanish: la honrada
  alternatives_spanish:
  - la honrada y exaltada
  - la honrada/estimada
  lexicon: Crum; cualitativo de ⲧⲁⲉⲓⲟ (‘honrar’/‘ser honrado’)
  rationale: La evidencia revisada corrige la falsa lectura de ‘venir’. En español, ‘la honrada’ conserva el valor cualitativo y el tono titular sin añadir explicación no sustentada.
- source_word: ⲧⲉⲧⲟⲩⲥⲙⲟⲩⲧ
  english_pob_choice: the one they bless
  chosen_spanish: la que ellos bendicen
  alternatives_spanish:
  - la que ellos llaman bendita
  - la que ellos alaban
  lexicon: Crum; verbo relacionado con ‘bendecir’/‘nombrar’ según reconstrucción del pasaje
  rationale: Mantengo ‘bendicen’ porque el audit trail inglés lo adopta como lectura principal; el español refleja el acto verbal sin convertirlo en ‘llaman’, que no está apoyado por la revisión final.
- source_word: ⲧⲉⲧⲟⲩⲕⲁⲧⲁⲫⲣⲟⲛⲓⲛ ⲙⲙⲟⲥ
  english_pob_choice: they despise me
  chosen_spanish: la que ellos desprecian con desprecio
  alternatives_spanish:
  - la que ellos desprecian
  - la que ellos desprecian con desdén
  lexicon: Greek καταφρονεῖν; objeto directo femenino singular
  rationale: ‘Con desprecio’ conserva la intensificación explícita de ϩⲛ ⲟⲩϣⲱⲥ que el texto inglés inserta en la línea revisada. Evito suavizarlo con una paráfrasis más libre.
- source_word: ϩⲛ ⲟⲩϣⲱⲥ
  english_pob_choice: with contempt
  chosen_spanish: con desprecio
  alternatives_spanish:
  - en insolencia
  - en desvergüenza
  - con desdén
  lexicon: 'Lexical uncertainty: possible abstract noun meaning ‘insolence/shamelessness’'
  rationale: 'Como el inglés POB decidió no omitirlo en la versión revisada y lo vertebró como ‘with contempt’, el español usa la forma más natural y fiel: ‘con desprecio’. Elegí ‘desprecio’ sobre ‘desdén’ por correspondencia más directa con el registro de la escena.'
- source_word: ϯⲣⲏⲛⲏ
  english_pob_choice: Peace
  chosen_spanish: Paz
  alternatives_spanish:
  - paz
  lexicon: Greek εἰρήνη
  rationale: Se mantiene el nombre/título en mayúscula inicial como en el inglés POB, dado su valor formular y autoidentificatorio.
- source_word: ⲛⲧⲁ ⲡⲡⲟⲗⲉⲙⲟⲥ
  english_pob_choice: because of me there is War
  chosen_spanish: a causa de mí hay guerra
  alternatives_spanish:
  - y hay guerra por mí
  - por causa mía hay guerra
  lexicon: ⲛⲧⲁ- causal + πόλεμος
  rationale: ‘A causa de mí’ expresa bien la relación causal del griego/copto sin forzar una identidad ontológica (‘yo soy Guerra’), que el audit trail señala como alternativa posible pero no preferida.
theological_decisions:
- issue: Paradoja Peace/War como autorrevelación
  english_pob_reading: I am Peace, and because of me there is War.
  chosen_spanish_reading: Soy Paz, y a causa de mí hay guerra.
  alternative_spanish_readings:
  - Soy Paz, y hay guerra por mí
  - Soy Paz, y por mí hay guerra
  rationale: Conservo el contraste paradójico sin resolverlo. No convierto ‘guerra’ en un nombre propio ni en una alegoría explicativa; la tensión debe quedar visible como en el texto fuente y en la tradición auditada.
  doctrine_reference: Motivo de paradoja revelatoria en Thunder, Perfect Mind; no doctrinal dogma sistemático
translation_notes:
  revision_awareness: 'El borrador previo fue corregido por una adjudicación de alta confianza: ⲧⲁⲉⲓⲏⲟⲩ no se lee como ‘he venido’, sino como una forma cualitativa relacionada con ‘honrado’; además, ⲧⲉⲧⲟⲩⲥⲙⲟⲩⲧ/ⲣⲟⲥ no debe traducirse como ‘me llaman el Primero’. Esta versión sigue la línea revisada del audit trail inglés, incluyendo la frase completa con la intensificación ‘with contempt’.'
  spanish_consistency_notes:
  - Uso ‘Paz’ con mayúscula por su función titulizante y paralela a ‘War’ en el inglés auditado.
  - Evito ‘SEÑOR’ u otras sustituciones no presentes en el texto fuente.
  - Mantengo ‘guerra’ en minúscula porque funciona como sustantivo común, no como nombre propio.
  - No añado ‘yo soy’ implícito donde el español ya exige el verbo copulativo para fluidez idiomática.
