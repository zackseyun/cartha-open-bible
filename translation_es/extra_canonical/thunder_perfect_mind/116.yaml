  rationale: Se mantiene la lectura de obediencia porque es la escogida por la POB inglesa y porque armoniza con el tono amonestador del pasaje. No se introduce la alternativa 'solitarios' en el texto principal para no debilitar la exhortación del segmento.
  doctrine_reference: No aplica una doctrina cristiana específica; decisión de lectura léxica y contextual del texto gnóstico/cóptico.
