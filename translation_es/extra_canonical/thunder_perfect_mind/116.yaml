lexical_decisions:
- source_word: ϣⲟⲟⲡ
  english_pob_choice: be / become
  chosen_spanish: Sed
  alternatives_spanish:
  - Sean
  - Lleguen a ser
  lexicon: Crum; Layton, Coptic in 20 Lessons
  rationale: En un mandato exhortativo, el Coptico funciona de modo imperativo. En español, 'Sed' conserva la fuerza directiva y la concisión del original mejor que una paráfrasis más explicativa.
- source_word: ⲟⲩⲁⲁⲧ
  english_pob_choice: obedient
  chosen_spanish: obedientes
  alternatives_spanish:
  - sumisos
  - solitarios
  lexicon: Crum, 482b; Westendorf
  rationale: La lectura de obediencia está respaldada por el contexto exhortativo y por la auditoría inglesa; en español, 'obedientes' es la forma natural y transparente para esa decisión léxica.
- source_word: ⲁⲩⲱ
  english_pob_choice: and
  chosen_spanish: ;
  alternatives_spanish:
  - y
  - además
  lexicon: Crum, 6a
  rationale: La conjunción une dos imperativos. En español, se puede reflejar mejor con una pausa fuerte y repetición verbal breve para conservar el paralelismo exhortativo.
- source_word: ⲙⲙⲟⲓ
  english_pob_choice: me
  chosen_spanish: recíbeme
  alternatives_spanish:
  - acógeme
  - tómame
  lexicon: Crum, 205a
  rationale: El pronombre objeto apunta a la recepción de la voz hablante. 'Recíbeme' es la equivalencia española más directa y sobria para el valor imperativo sugerido por el conjunto.
theological_decisions:
- issue: 'Valor de ⲟⲩⲁⲁⲧ: obediencia frente a ''único/solitario'''
  english_pob_reading: obedient
  chosen_spanish_reading: obedientes
  alternative_spanish_readings:
