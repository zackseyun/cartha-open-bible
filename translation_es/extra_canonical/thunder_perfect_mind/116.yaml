translation:
  language: es
  text: Sed obedientes[a], ustedes que obedecen[b]; recíbeme.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La forma cóptica del primer verbo suele expresar existencia o volverse; aquí se vierte como mandato breve ('Sed') para conservar la fuerza exhortativa del pasaje.
    reason: lexical_alternative
  - marker: b
    text: ⲟⲩⲁⲁⲧ también puede significar 'solitario/único'; se sigue la lectura 'obedientes' por el contexto y la auditoría inglesa, pero la alternativa permanece posible.
    reason: lexical_alternative
lexical_decisions:
- source_word: ϣⲟⲟⲡ
  english_pob_choice: be / become
  chosen_spanish: Sed
  alternatives_spanish:
  - Sean
  - Lleguen a ser
  lexicon: Crum; Layton, Coptic in 20 Lessons
  rationale: En un mandato exhortativo, el Coptico funciona de modo imperativo. En español, 'Sed' conserva la fuerza directiva y la concisión del original mejor que una paráfrasis más explicativa.
- source_word: ⲟⲩⲁⲁⲧ
  english_pob_choice: obedient
  chosen_spanish: obedientes
  alternatives_spanish:
  - sumisos
  - solitarios
  lexicon: Crum, 482b; Westendorf
  rationale: La lectura de obediencia está respaldada por el contexto exhortativo y por la auditoría inglesa; en español, 'obedientes' es la forma natural y transparente para esa decisión léxica.
- source_word: ⲁⲩⲱ
  english_pob_choice: and
  chosen_spanish: ;
  alternatives_spanish:
  - y
  - además
  lexicon: Crum, 6a
  rationale: La conjunción une dos imperativos. En español, se puede reflejar mejor con una pausa fuerte y repetición verbal breve para conservar el paralelismo exhortativo.
- source_word: ⲙⲙⲟⲓ
  english_pob_choice: me
  chosen_spanish: recíbeme
  alternatives_spanish:
  - acógeme
  - tómame
  lexicon: Crum, 205a
  rationale: El pronombre objeto apunta a la recepción de la voz hablante. 'Recíbeme' es la equivalencia española más directa y sobria para el valor imperativo sugerido por el conjunto.
theological_decisions:
- issue: 'Valor de ⲟⲩⲁⲁⲧ: obediencia frente a ''único/solitario'''
  english_pob_reading: obedient
  chosen_spanish_reading: obedientes
  alternative_spanish_readings:
  - únicos
  - solitarios
  rationale: Se mantiene la lectura de obediencia porque es la escogida por la POB inglesa y porque armoniza con el tono amonestador del pasaje. No se introduce la alternativa 'solitarios' en el texto principal para no debilitar la exhortación del segmento.
  doctrine_reference: No aplica una doctrina cristiana específica; decisión de lectura léxica y contextual del texto gnóstico/cóptico.
translation_notes:
  revision_awareness: La auditoría inglesa señala una alineación de página baja y advierte que parte del material vecino puede pertenecer a una admonición adyacente. Por eso el español se mantiene breve y conservador, sin incorporar contenido no seguro del entorno inmediato.
  spanish_consistency_notes:
  - Se usó 'obedientes' para mantener la decisión auditada de la POB inglesa y evitar una traducción mecánica hacia 'solitarios'.
  - Se prefirió 'Sed' como imperativo conciso para ϣⲟⲟⲡ, en lugar de una expansión explicativa.
  - Se mantuvo un tono directo y ceremonial, adecuado para publicación, sin añadir glosas al cuerpo principal.
  - El verbo 'recíbeme' conserva el objeto directo explícito y la relación personal del hablante con el receptor.
