  spanish_consistency_notes:
  - Se usó 'obedientes' para mantener la decisión auditada de la POB inglesa y evitar una traducción mecánica hacia 'solitarios'.
  - Se prefirió 'Sed' como imperativo conciso para ϣⲟⲟⲡ, en lugar de una expansión explicativa.
  - Se mantuvo un tono directo y ceremonial, adecuado para publicación, sin añadir glosas al cuerpo principal.
  - El verbo 'recíbeme' conserva el objeto directo explícito y la relación personal del hablante con el receptor.
