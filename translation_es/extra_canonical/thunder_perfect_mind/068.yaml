translation:
  language: es
  text: ¿Por qué me desprecias entre los que son pequeños? Yo soy la Mente[a], y mi Reposo[b]. Tú eres el conocimiento de mi tipo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: Nous; Intelecto. The Coptic ⲡⲛⲟⲩⲥ is a loan from Greek νοῦς.'
    reason: lexical_alternative
  - marker: b
    text: 'Or: Descanso; Reposo también puede leerse como ''repose''.'
    reason: lexical_alternative
  - marker: c
    text: El sintagma final es textual y filológicamente incierto en el testimonio OCR, aunque la revisión lo relaciona con el paralelo bien atestiguado 'el conocimiento de mi especie/clase/linaje'.
    reason: textual_variant
lexical_decisions:
- source_word: ⲡⲛⲟⲩⲥ
  english_pob_choice: Mind
  chosen_spanish: Mente
  alternatives_spanish:
  - Intelecto
  - Nous
  lexicon: Crum; préstamo del griego νοῦς
  rationale: «Mente» conserva el campo intelectual de νοῦς y suena natural en español; «Intelecto» sería posible pero más técnico, y «Nous» se reserva para nota explicativa si se desea mantener el préstamo.
- source_word: ⲧⲁⲛⲁⲡⲁⲩⲥⲓⲥ
  english_pob_choice: my Rest
  chosen_spanish: mi Reposo
  alternatives_spanish:
  - mi Descanso
  - mi Reposo
  lexicon: Crum; de gr. ἀνάπαυσις
  rationale: Se elige «Reposo» para conservar la elevación conceptual de ἀνάπαυσις, sin perder claridad en español. «Descanso» sería más cotidiano, pero algo menos solemne.
- source_word: ⲥⲁⲛⲁⲓ
  english_pob_choice: smallness
  chosen_spanish: pequeños
  alternatives_spanish:
  - pequeñez
  - infancia
  - juventud
  lexicon: Crum; lectura contextual incierta
  rationale: Dado el contexto de reprensión, el plural sustantivado «los que son pequeños» expresa bien el grupo caracterizado por pequeñez sin fijar demasiado si la referencia es a pequeñez, infancia o juventud.
- source_word: ⲥⲉⲥⲱ
  english_pob_choice: despise
  chosen_spanish: desprecias
  alternatives_spanish:
  - desprecias
  - desestimas
  - despreci as
  lexicon: Crum
  rationale: «Desprecias» comunica con precisión el verbo de menosprecio usado en la reprensión.
- source_word: ⲛⲧⲱⲧⲛ / reconstructed plural addressee in the corrected reading
  english_pob_choice: You
  chosen_spanish: Tú
  alternatives_spanish:
  - Ustedes
  - Vosotros
  lexicon: Revisión textual indicada por el aparato auditivo; plural reconstruido en el griego/cóptico subyacente
  rationale: Aunque el audit trail corrige la línea hacia un destinatario plural en la reconstrucción subyacente, el español del verso se mantiene con la forma singular del discurso directo tal como queda en la línea coptizante disponible; se nota la tensión en las decisiones y se evita una pluralización no garantizada por el tramo OCR conservado.
- source_word: ⲙⲡⲁⲅⲓⲛⲉ / well-attested Thunder parallel
  english_pob_choice: knowledge of my kind
  chosen_spanish: el conocimiento de mi tipo
  alternatives_spanish:
  - el conocimiento de mi especie
  - el conocimiento de mi clase
  - el conocimiento de mi linaje
  lexicon: Paralelo bien atestiguado en Thunder; campo semántico de genos/kind
  rationale: «Mi tipo» es literal pero algo duro; se conserva para no borrar la tensión del paralelo auditado. «Mi clase» o «mi linaje» podrían sonar más naturales, pero desplazan el matiz semántico.
theological_decisions:
- issue: Dirección del reproche y sujeto del desprecio
  english_pob_reading: Why do you despise me among those who are small?
  chosen_spanish_reading: ¿Por qué me desprecias entre los que son pequeños?
  alternative_spanish_readings:
  - ¿Por qué me despreciáis entre los que son pequeños?
  - ¿Por qué desprecias a los pequeños y me desprecias a mí?
  rationale: La revisión textual indica que el pasaje corrige un mal arranque de la versión previa. En español se preserva el reproche directo en primera persona, sin introducir elementos no asegurados. Se mantiene la ambigüedad entre singular/plural del destinatario solo en la nota crítica, no en el cuerpo del verso.
  doctrine_reference: Ninguna; decisión textual/retórica, no doctrinal
- issue: Valor de la autodesignación 'Mind'
  english_pob_reading: I am the Mind
  chosen_spanish_reading: Yo soy la Mente
  alternative_spanish_readings:
  - Yo soy el Intelecto
  - Yo soy el Nous
  rationale: «Mente» reproduce el valor sapiencial-filosófico de νοῦς sin cargarlo de terminología técnica excesiva. La forma no es doctrinalmente cargada, pero sí filosófica; se evita «Nous» en el texto principal por legibilidad.
  doctrine_reference: Ninguna; elección lexical-filosófica
- issue: Identificación del último sintagma
  english_pob_reading: You are the knowledge of my kind
  chosen_spanish_reading: Tú eres el conocimiento de mi tipo
  alternative_spanish_readings:
  - Tú eres el conocimiento de mi clase
  - Tú eres el conocimiento de mi linaje
  rationale: Se conserva una traducción cercana al audit trail porque el cóptico recuperado y la revisión mencionan un paralelo de Thunder con 'my kind'. Dado que la reconstrucción no es absolutamente segura en el nivel del español, se evita sobreexplicar o armonizar con una lectura más interpretativa.
  doctrine_reference: Ninguna; decisión de fidelidad textual
translation_notes:
  revision_awareness: 'La versión inglesa auditada fue corregida por revisión automática desde un borrador erróneo que leía un imperativo de acercamiento y una autoidentificación con ''knowledge of my seeking''. La revisión señala que el tramo debe entenderse como un reproche: ''Why do you despise me among those who are small? ... You are the knowledge of my kind''. El español sigue esa corrección y evita heredar el error previo.'
  spanish_consistency_notes:
  - Se mantiene «Mente» para ⲡⲛⲟⲩⲥ en consonancia con el uso POB y con el campo semántico de νοῦς.
  - Se evita 'Señor'/'Cristo' y otra terminología ajena, porque este fragmento no la contiene.
  - Se usa «Reposo» con mayúscula inicial solo por tratarse de un predicado reverencial dentro de la autodesignación poética; podría normalizarse a minúscula si se requiere uniformidad editorial.
  - La forma «Tú eres» sigue el español estándar; no se fuerza pluralidad gramatical porque el estado textual del verso es inestable en este punto.
