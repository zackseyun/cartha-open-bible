translation:
  language: es
  text: Y yo soy ella a quien ustedes prendieron. Yo soy ella a quien ustedes dispersaron, y me reunieron. Yo soy ella delante de quien ustedes se avergonzaron, y no tuvieron vergüenza hacia mí.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ⲁⲙⲁϩⲧⲉ
  english_pob_choice: seized
  chosen_spanish: atraparon
  alternatives_spanish:
  - agarraron
  - apresaron
  - tomaron
  lexicon: Crum, Coptic Dictionary
  rationale: El verbo coptológico indica acción de tomar por fuerza o sujetar; «atraparon» comunica captura sin añadir un matiz judicial demasiado específico. Evita suavizar la fuerza del original.
- source_word: ϫⲟⲟⲩⲥ ⲉⲃⲟⲗ
  english_pob_choice: scattered
  chosen_spanish: dispersaron
  alternatives_spanish:
  - esparcieron
  - desparramaron
  - diseminaron
  lexicon: Crum, Coptic Dictionary
  rationale: «Dispersaron» reproduce bien la imagen de separación y dispersión colectiva, con registro sobrio y bíblicamente reconocible en español.
- source_word: ⲥⲱⲟⲩϩ
  english_pob_choice: gathered me in
  chosen_spanish: me reunieron
  alternatives_spanish:
  - me juntaron
  - me recogieron
  - me congregaron
  lexicon: Crum, Coptic Dictionary
  rationale: El copto expresa reunir/recoger de vuelta; «me reunieron» mantiene la simetría con «dispersaron» y es natural en español.
- source_word: ϣⲓⲡⲉ
  english_pob_choice: ashamed
  chosen_spanish: se avergonzaron
  alternatives_spanish:
  - tuvieron vergüenza
  - quedaron avergonzados
  - se sintieron avergonzados
  lexicon: Crum, Coptic Dictionary
  rationale: La forma verbal en español debe reflejar el estado/acto de vergüenza frente a la hablante; «se avergonzaron» es directo y fiel.
- source_word: ⲣⲁⲧϣⲓ
  english_pob_choice: barbarians / foreigners
  chosen_spanish: desvergonzados
  alternatives_spanish:
  - sin pudor
  - sin vergüenza
  - impuros
  lexicon: Crum, Coptic Dictionary
  rationale: Aquí el estado del texto copto no apoya la lectura étnica del pasaje equivalente en inglés; el tramo revisado concluye con la idea de actuar sin vergüenza hacia la hablante. Por eso se vierte como «desvergonzados conmigo», preservando la antítesis ética de la línea anterior sin importar un término cultural ajeno al segmento alineado.
theological_decisions:
- issue: 'Estado final de la última cláusula: vergüenza frente a la hablante versus falta de vergüenza hacia ella'
  english_pob_reading: you were shameless toward me
  chosen_spanish_reading: fueron desvergonzados conmigo
  alternative_spanish_readings:
  - no tuvieron vergüenza de mí
  - actuaron sin vergüenza hacia mí
  rationale: El copto del segmento revisado sostiene una acusación de falta de vergüenza dirigida a la hablante. «Desvergonzados conmigo» conserva la fuerza del reproche y la relación interpersonal sin introducir un objeto innecesariamente rígido.
  doctrine_reference: Poética gnóstica del texto de Nag Hammadi; fidelidad al paralelo sintáctico del segmento ciego-alineado.
translation_notes:
  revision_awareness: 'Se siguió la revisión crítica más reciente que corrigió un desalineamiento severo: el pasaje no trata de Egipto ni de «barbaros» en este segmento, sino de las acciones de capturar, dispersar, reunir y avergonzarse. La traducción española se construyó directamente desde el copto alineado y la auditoría inglesa revisada, no desde el renderizado previo erróneo.'
  spanish_consistency_notes:
  - Se mantuvo la primera persona femenina («ella») porque el copto y la auditoría inglesa la exigen.
  - Se evitó introducir «Cristo», «Señor» o terminología eclesiástica no presente en el segmento.
  - «Desvergonzados conmigo» se eligió para conservar el contraste con «se avergonzaron» y respetar el tono acusatorio del original.
  - No se añadieron notas al pie porque este segmento no presenta variantes textuales ni ambigüedades léxicas que requieran marcadores anclados en el texto.
