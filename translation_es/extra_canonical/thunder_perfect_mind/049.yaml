  yaml_path: translation/extra_canonical/thunder_perfect_mind/049.yaml
  text: And I am she whom you seized[a]. I am she whom you scattered, and you gathered me in. I am she before whom you were ashamed[c][b-alt][b], and you were shameless toward me.
  footnotes:
  - marker: a
    text: “In Egypt” is inferred from context; the fragment shows the feminine locative ϩⲏⲧⲥ (“within her”), with the feminine noun ‘Egypt’ (ⲕⲏⲙⲉ) not visible here.
    reason: alignment_note
  - marker: b
    text: Coptic ⲣⲁⲧϣⲓ literally means “people of (another) speech/tongue.” We render it as “barbarians” to preserve the stark cultural contrast; “foreigners” is a viable alternative.
    reason: cultural_note
  - marker: b-alt
    text: 'Or: “among the foreigners.”'
    reason: lexical_alternative
  - marker: c
    text: Or 'I am the one whose image is great in Egypt[a], and I am the one without an image among the barbarians[b].'.
    reason: previous_rendering
