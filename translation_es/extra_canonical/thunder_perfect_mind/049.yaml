revisions:
- from: Y yo soy ella a quien ustedes atraparon. Yo soy ella a quien ustedes dispersaron, y ustedes me reunieron. Yo soy ella delante de quien ustedes se avergonzaron, y fueron desvergonzados conmigo.
  to: Y yo soy ella a quien ustedes prendieron. Yo soy ella a quien ustedes dispersaron, y me reunieron. Yo soy ella delante de quien ustedes se avergonzaron, y no tuvieron vergüenza hacia mí.
  rationale: Se ajusta el registro de 'atraparon' a 'prendieron' para mayor dignidad literaria y se corrige la última cláusula a una forma idiomática que preserve el sentido de falta de vergüenza dirigida hacia la hablante. No se requieren notas, porque la dificultad ya queda resuelta en el texto español sin nueva ambigüedad.
