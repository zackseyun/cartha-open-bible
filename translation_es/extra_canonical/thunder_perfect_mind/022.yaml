translation:
  language: es
  text: 'Los que dicen la verdad acerca de mí, mienten acerca de mí,


    y los que han mentido acerca de mí, dicen la verdad acerca de mí.


    Los que me conocen, desconózcanme,


    y los que no me han conocido[a], que me conozcan.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La secuencia copta en este punto es fragmentaria; el POB inglés reconstruye la cola final como una exhortación: “que me conozcan”.'
    reason: textual_variant
lexical_decisions:
- source_word: ⲙⲉ
  english_pob_choice: truth
  chosen_spanish: verdad
  alternatives_spanish:
  - realidad
  - lo verdadero
  lexicon: Crum, Coptic Dictionary s.v. ⲙⲉ
  rationale: En este paralelismo paradoxal, ⲙⲉ apunta al campo semántico de 'verdad'; 'verdad' es la equivalencia española más natural y mantiene el contraste con 'mienten'.
- source_word: ϫⲓϭⲟⲗ
  english_pob_choice: lie
  chosen_spanish: mentir
  alternatives_spanish:
  - decir mentira
  - falsear
  - mentirse
  lexicon: Crum, Coptic Dictionary s.v. ϭⲟⲗ/ϫⲓϭⲟⲗ
  rationale: El POB inglés lo traduce como el acto de mentir para sostener el juego antitético con 'speak the truth'; en español, 'mentir' preserva el paralelismo verbal y la fuerza ética del contraste.
- source_word: ⲥⲟⲟⲩⲛ
  english_pob_choice: know
  chosen_spanish: conocer
  alternatives_spanish:
  - saber
  - reconocer
  lexicon: Coptic lexical tradition; see Layton on knowledge verbs
  rationale: En esta sección relacional, 'conocer' comunica mejor una relación personal que el mero saber factual y corresponde bien al inglés POB 'know me'.
- source_word: ⲁⲣⲓⲁⲧⲥⲟⲟⲩⲛ
  english_pob_choice: be ignorant of me
  chosen_spanish: ignórense de mí
  alternatives_spanish:
  - sean ignorantes de mí
  - desconózcanme
  - permanezcan ignorantes de mí
  lexicon: Coptic imperative construction in Thunder; compare imperative negation/privation patterns
  rationale: Se conserva el choque retórico del imperativo. 'Ignórense de mí' es menos idiomático que otras opciones, pero retiene la dureza formal del giro y el mandato paradoxal del original; se evita suavizarlo a un simple 'desconózcanme'.
- source_word: ⲛⲉⲧⲉⲙⲡⲟⲩ...
  english_pob_choice: those who have not known me, let them know me
  chosen_spanish: los que no me han conocido, que me conozcan
  alternatives_spanish:
  - los que no me conocieron, que me conozcan
  - los que no me han conocido, que lleguen a conocerme
  lexicon: Thunder alignment tradition; imperative/resultative clause
  rationale: La construcción exhortativa final se vierte con subjuntivo exhortativo en español para reflejar el mandato del original sin añadir matices interpretativos.
theological_decisions:
- issue: Paradoja revelatoria de verdad/mentira y conocimiento/ignorancia
  english_pob_reading: 'The text deliberately turns speech about the speaker into paradox: truth becomes falsehood, falsehood becomes truth; knowledge becomes ignorance, ignorance becomes knowledge.'
  chosen_spanish_reading: 'El español conserva la paradoja sin resolverla: decir verdad acerca de la hablante puede aparecer como mentira, y viceversa; conocerla puede volverse ignorarla, e ignorarla puede volverse conocerla.'
  alternative_spanish_readings:
  - Suavizar la paradoja con una lectura explicativa
  - Reordenar los verbos para hacerla más idiomática
  rationale: La pieza depende de la inversión retórica, así que la traducción debe preservar la tensión teológica y literaria en vez de aclararla demasiado.
  doctrine_reference: Retórica sapiencial/gnóstica de inversión paradoxal; fidelidad literaria a la forma del texto
- issue: Forma imperativa final y valor de mandato
  english_pob_reading: '''those who have not known me, let them know me'' is retained as an imperative/exhortative closure.'
  chosen_spanish_reading: '''los que no me han conocido, que me conozcan'' mantiene un cierre exhortativo natural en español.'
  alternative_spanish_readings:
  - '''que lleguen a conocerme'''
  - '''que me conozcan y sepan'''
  rationale: El subjuntivo exhortativo transmite el mandato sin introducir un complemento no atestiguado como 'lleguen a' o 'sepan'.
  doctrine_reference: Modalidad exhortativa en español; preservación del paralelismo semítico/gnóstico
translation_notes:
  revision_awareness: 'Se tuvo en cuenta que el tramo había sido corregido por un revisor como una paráfrasis errónea de ''I am the utterance of my name''. El texto español sigue el ajuste final reconocido en el historial: el pasaje antitético de verdad/mentira y conocimiento/ignorancia. También se respetó que la lectura final del inglés POB es más confiable que el borrador anterior, pero se evitó repetir la frase errónea.

    '
  spanish_consistency_notes:
  - Se mantiene 'mí' en primera persona singular para el hablante del poema.
  - Se usa 'conocer' en sentido relacional, no meramente intelectual.
  - No se introduce 'Cristo', 'Señor' ni otras equivalencias doctrinales ajenas al Coptico.
  - La exhortación final usa subjuntivo para reflejar el mandato implícito del original.
  - Se conserva el paralelismo sintáctico en cuatro miembros para respetar la estructura retórica del pasaje.
