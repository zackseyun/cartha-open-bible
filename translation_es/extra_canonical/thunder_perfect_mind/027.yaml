  lexicon: Coptic OCR reconstruction in audit trail; common Coptic semantic field
  rationale: “el rico” es la forma más directa, natural y fiel para el término de riqueza material/estatus que indica el audit trail.
- source_word: ⲛⲍⲏⲧⲉ
  english_pob_choice: the exaltation of seeking
  chosen_spanish: la exaltación de la búsqueda
  alternatives_spanish:
  - la exaltación del buscar
  - la elevación de la búsqueda
  lexicon: English POB revised reading from audit trail; Greek/Coptic seeking semantic field
  rationale: El audit trail corrige el valor anterior y lo relaciona con “seeking”. “Búsqueda” transmite con claridad el sustantivo verbal en español sin perder la elevación/encumbramiento implícita en “exaltation”.
theological_decisions:
- issue: Conservar el paralelismo paradoxal sin imponer una lectura doctrinal ajena
  english_pob_reading: I am the un-shut and the rich. The exaltation of seeking,
  chosen_spanish_reading: Yo soy el que no se cierra y el rico. La exaltación de la búsqueda,
  alternative_spanish_readings:
  - Yo soy el abierto y el rico. La exaltación de la búsqueda,
  - Yo soy el no cerrado y el rico. La elevación de la búsqueda,
  rationale: El texto pertenece a una serie de autoidentificaciones paradójicas. La redacción española debe preservar esa tensión sin suavizarla a una metáfora doctrinal fija. “El que no se cierra” mantiene la extrañeza del original y evita decidir prematuramente entre sentidos posibles como ‘unopened’, ‘unhearing’ o ‘unshut’ cuando el propio audit trail admite ambigüedad.
  doctrine_reference: No aplica una doctrina cristiana normativa; se sigue la estrategia auditada de preservar la paradoja literaria del himno.
translation_notes:
  revision_awareness: 'La revisión más reciente corrige una mala traducción previa: no corresponde ‘shame and pride’, sino ‘the un-shut and the rich. The exaltation of seeking,’ según el informe de adjudicación. Esta versión española sigue esa corrección y evita reutilizar la lectura descartada.'
  spanish_consistency_notes:
  - Se mantiene el tono litúrgico-poético del texto de Thunder, pero con español moderno y claro.
  - Se evita ‘Cristo’, ‘Señor’ u otras equivalencias teológicas ajenas al pasaje, porque el audit trail no las sustenta.
  - ‘La búsqueda’ se usa como sustantivación natural de ‘seeking’, en vez de un calco más rígido que oscurezca el sentido.
  - La capitalización y puntuación siguen una lectura poética continua, con coma final como en el inglés auditado.
