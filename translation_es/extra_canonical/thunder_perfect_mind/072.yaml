translation:
  language: es
  text: 'La voz de los ángeles que fueron enviados en la palabra[a], y de los dioses[b],

    de los dioses que salen por medio del consejo[c];

    y de los espíritus[d] de los seres humanos que existen conmigo[e],

    y de las mujeres que existen dentro[f].

    Yo soy ella[g] — ustedes[h] ...'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La palabra ‘palabra’ traduce ⲡⲗⲟⲅⲟⲥ; ‘Logos’ sería posible, pero se prefiere el término español más accesible, conservando la posible resonancia técnica.
    reason: lexical_alternative
  - marker: b
    text: El copto ⲛ̄ⲛⲟⲩⲧⲉ puede leerse como plural (‘dioses’) o, en algunos contextos, singular (‘Dios’); aquí se mantiene el plural por la sintaxis y el paralelismo de la lista.
    reason: alternative_reading
  - marker: c
    text: ‘Consejo’ conserva el valor de plan, designio o deliberación de ϣⲟϫⲛⲉ; no debe leerse aquí como ‘voz’.
    reason: source_note
  - marker: d
    text: ⲡⲛⲁ es un nomen sacrum abreviado para ‘espíritu’, no ‘mente’.
    reason: source_note
  - marker: e
    text: ‘Conmigo’ es una equivalencia idiomática natural para el acompañamiento expresado por la preposición copta.
    reason: spanish_style_note
  - marker: f
    text: ⲛ̄ϩⲏⲧ significa literalmente ‘en el interior / en el corazón’; ‘dentro’ preserva esa interioridad sin estrecharla demasiado.
    reason: lexical_alternative
  - marker: g
    text: La fórmula femenina se mantiene explícita para no neutralizar la voz hablante del pasaje.
    reason: theological_note
  - marker: h
    text: La secuencia final está cortada en el manuscrito/OCR; la marca de plural reproduce el valor de segunda persona plural sin completar la frase.
    reason: textual_variant
lexical_decisions:
- source_word: ⲥⲓⲥ
  english_pob_choice: voice
  chosen_spanish: voz
  alternatives_spanish:
  - silencio
  - quietud
  lexicon: Coptic (Sahidic) OCR-corrected reading in context
  rationale: La revisión de fuente indica que ⲥⲓⲥ es un error OCR por ⲥⲙⲏ, por lo que el sentido es “voz”. En español, “voz” conserva la estructura catalogal y evita introducir una lectura de “silencio” ya descartada por la corrección textual.
- source_word: ⲛ̄ⲛⲁⲅⲅⲉⲗⲟⲥ
  english_pob_choice: angels
  chosen_spanish: ángeles
  alternatives_spanish:
  - mensajeros
  lexicon: Greek loanword ἄγγελος via Coptic
  rationale: Se mantiene el valor celestial/cultual del plural, que en español se expresa naturalmente como “ángeles”.
- source_word: ⲛ̄ⲧⲁⲩⲧⲁⲟⲩⲟ
  english_pob_choice: were sent forth
  chosen_spanish: fueron enviados
  alternatives_spanish:
  - fueron proferidos
  - fueron emitidos
  lexicon: Coptic verb phrase; OCR/source review correction
  rationale: La revisión fuente corrige la lectura “those who are first” y la interpreta como “who were sent forth”. En español, “fueron enviados” es la forma más clara y fiel al valor pasivo/resultado del giro verbal.
- source_word: ϩⲙ̄ ⲡⲗⲟⲅⲟⲥ
  english_pob_choice: in the word
  chosen_spanish: en la palabra
  alternatives_spanish:
  - dentro de la Palabra
  - en el Logos
  lexicon: Greek λόγος via Coptic
  rationale: La preposición indica interioridad, pero el auditable inglés POB quedó en “the word” tras la revisión. En español, “palabra” es más natural y mantiene la ambigüedad entre palabra común y sentido técnico sin sobreespecificar.
- source_word: ⲛ̄ⲛⲟⲩⲧⲉ
  english_pob_choice: gods
  chosen_spanish: dioses
  alternatives_spanish:
  - Dios
  - seres divinos
  lexicon: Coptic noun ⲛⲟⲩⲧⲉ in plural use
  rationale: Se conserva el plural explícito indicado por la auditoría inglesa. “Dioses” evita desactivar la pluralidad y mantiene la tensión teológica que el texto presenta.
- source_word: ⲉⲃⲟⲗ ϩⲓⲧⲙ̄ ⲡϣⲟϫⲛⲉ
  english_pob_choice: go out by means of the counsel
  chosen_spanish: salen por medio del consejo
  alternatives_spanish:
  - salen por medio del consejo/plan
  - proceden mediante el consejo
  lexicon: Coptic phrase with ϣⲟϫⲛⲉ = counsel/plan/advice
  rationale: 'Se sigue la corrección de fuente: ϣⲟϫⲛⲉ significa “consejo”. “Por medio de” conserva el medio instrumental del original y “salen” refleja ⲉⲃⲟⲗ con suficiente literalidad en español.'
- source_word: ⲡⲛⲁ
  english_pob_choice: spirits
  chosen_spanish: espíritus
  alternatives_spanish:
  - almas
  - mentes
  lexicon: Coptic nomen sacrum for ⲡⲛⲉⲩⲙⲁ
  rationale: La revisión fuente identifica el término como abreviatura sacra de “espíritu”. En español, “espíritus” conserva el campo semántico correcto y evita la lectura cognitiva de “mente”.
- source_word: ⲛ̄ⲣⲱⲙⲉ
  english_pob_choice: humans
  chosen_spanish: los humanos
  alternatives_spanish:
  - los hombres
  - la humanidad
  lexicon: Coptic ⲣⲱⲙⲉ (human, man)
  rationale: Se elige un plural inclusivo y directo; “los humanos” conserva el referente genérico sin masculinizarlo.
- source_word: ⲛ̄ⲙⲙⲁⲉⲓ
  english_pob_choice: with me
  chosen_spanish: conmigo
  alternatives_spanish:
  - junto a mí
  - a mi lado
  lexicon: Coptic prepositional construction
  rationale: “Conmigo” es la equivalencia española más natural y conserva la relación de acompañamiento.
- source_word: ⲛ̄ϩⲏⲧ
  english_pob_choice: within
  chosen_spanish: dentro
  alternatives_spanish:
  - en el interior de
  - en el corazón
  lexicon: Coptic ϩⲏⲧ (heart, inner part)
  rationale: El inglés auditado usa “within”, y en español “dentro” mantiene la interioridad abierta sin restringirla a “corazón”.
- source_word: ⲁⲛⲟⲕ ⲧⲉ
  english_pob_choice: I am she
  chosen_spanish: Yo soy ella
  alternatives_spanish:
  - Soy yo, la mujer
  - Yo soy la que es ella
  lexicon: Coptic first-person copular formula with feminine form
  rationale: Se conserva explícitamente la autodeclaración femenina del original y de la auditoría inglesa.
- source_word: ⲧⲉⲧ-
  english_pob_choice: you [pl.]
  chosen_spanish: ustedes [pl.]
  alternatives_spanish:
  - vosotros [pl.]
  - ustedes
  lexicon: Coptic second-person plural prefix
  rationale: El fragmento queda truncado; se conserva la marca de plural para transparencia y para reflejar el corte del manuscrito/OCR.
theological_decisions:
- issue: Pluralidad de “dioses”
  english_pob_reading: the gods
  chosen_spanish_reading: los dioses
  alternative_spanish_readings:
  - Dios
  - seres divinos
  rationale: La auditoría inglesa sostiene el plural por razones sintácticas y de paralelismo. Mantener “los dioses” en español preserva la tensión del texto y evita armonizarlo prematuramente con monoteísmo posterior.
  doctrine_reference: Monoteísmo bíblico frente a lenguaje plural en textos antiguos; preservar la polisemia histórica sin forzar resolución doctrinal
- issue: Identidad de la voz femenina
  english_pob_reading: I am she
  chosen_spanish_reading: Yo soy ella
  alternative_spanish_readings:
  - Soy yo, la mujer
  - Yo soy la que es ella
  rationale: El original marca género femenino en la autodenominación. La traducción española debe conservarlo para no borrar la voz literaria y teológica del pasaje.
  doctrine_reference: Cristología/sujeto hablante en literatura gnóstica; fidelidad literaria al hablante femenino
- issue: Valor de ϣⲟϫⲛⲉ como “consejo”
  english_pob_reading: counsel
  chosen_spanish_reading: consejo
  alternative_spanish_readings:
  - plan
  - consejo/plan
  rationale: Se evita ‘voz’ porque la revisión de fuente corrige expresamente ese error. ‘Consejo’ es el equivalente más directo y mantiene la textura semántica de deliberación, plan o designio.
  doctrine_reference: Semántica del discurso revelatorio; no suavizar ni desplazar el término por una lectura errónea
- issue: ⲡⲛⲁ como ‘espíritus’
  english_pob_reading: the spirits of humans
  chosen_spanish_reading: los espíritus de los humanos
  alternative_spanish_readings:
  - las mentes de los humanos
  - el espíritu de los humanos
  rationale: La revisión fuente identifica un nomen sacrum para ‘espíritu’; traducirlo como ‘espíritus’ respeta la forma abreviada y la lectura corregida.
  doctrine_reference: Distinción bíblica entre espíritu y mente; mantener el campo pneumatológico
translation_notes:
  revision_awareness: 'La versión inglesa auditada pasó por una corrección sustancial: se descartó la lectura anterior de ‘silence / those who are first / within the Word’ y se adoptó una reconstrucción fuente-cercana con ‘voice / sent forth / the word’, además de corregir ‘voice’ a ‘counsel’, ‘mind’ a ‘spirits’, y ‘wise’ a ‘women’. La presente versión española sigue esas correcciones y evita heredar las lecturas previas ya rechazadas.'
  spanish_consistency_notes:
  - Se mantiene el plural explícito de ‘dioses’ para no borrar la tensión textual documentada.
  - Se usa ‘palabra’ en vez de ‘Logos’ para accesibilidad, pero se deja constancia de la alternativa técnica.
  - Se conserva el femenino de la voz hablante (‘Yo soy ella’).
  - Se evita ‘señor’/‘SEÑOR’ porque no corresponde al material fuente de este pasaje.
  - Se prefieren formas transparentes y no eclesiásticamente domesticadas cuando la fuente conserva ambigüedad.
