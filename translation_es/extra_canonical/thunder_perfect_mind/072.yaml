  text: 'The voice of the angels who were sent forth in the word[a], and of the gods,

    the gods that go out by means of the counsel;

    and the spirits of humans who exist with me,

    and the women who exist within[m][l][k][j][i][h][g][f][e][d][c][b].

    I am she — you [pl.] ...'
  footnotes:
  - marker: a
    text: ⲥⲓⲥ is uncertain; it could be a noun “silence/quiet” or an imperative “be silent.” The translation adopts “silence” to preserve the catalogic structure.
    reason: alignment_note
  - marker: b
    text: ⲛ̄ⲧⲁⲩⲧⲁⲟⲩⲟ is tentatively parsed as “those who are first.” If misread, the line may refer to a different quality of the angels.
    reason: alternative_reading
  - marker: c
    text: “Word” renders ⲡⲗⲟⲅⲟⲥ (Greek λόγος). “Logos” could be used here; we chose English for accessibility.
    reason: lexical_alternative
  - marker: d
    text: ⲛ̄ⲛⲟⲩⲧⲉ may be read as plural “gods” (as translated) or singular “God” depending on syntax; both are attested uses in Coptic.
    reason: alternative_reading
  - marker: e
    text: ⲡϣⲟϫⲛⲉ can mean “voice” or “sound”; both senses are active in Thunder’s play on speech, name, and utterance.
    reason: lexical_alternative
  - marker: f
    text: ⲡⲛⲁ is variously “mind,” “thought,” or “spirit.” Context with “of humans” led to “mind.”
    reason: lexical_alternative
  - marker: g
    text: The phrase ⲛⲓⲙⲉⲧϣⲟⲟⲡ (“the beings/existents”) likely runs across the line break (…ⲉⲛⲓⲙⲉⲧ | ϣⲟⲟⲡ…).
