  text: And in the spirit of every man who exists with me[a], and the women who are in me— I am the honored one[f][e][d][c][b], and the one who is praised.
  footnotes:
  - marker: a
    text: ⲧⲁⲉⲓⲏⲟⲩ is uncertain; ‘form/appearance/image’ are possible. ‘Form’ is chosen to keep the self-referential tone without over-specifying a Greek loan.
    reason: lexical_alternative
  - marker: b
    text: ⲧⲉⲧⲟⲩⲥⲙⲟⲩ could parse as ‘their name’ (ⲧⲟⲩ- poss.) or as a verbal form ‘you (pl.) praise.’ The present draft reads ‘your (pl.) name’ cautiously.
    reason: lexical_alternative
  - marker: c
    text: The join ⲉⲛⲓⲙⲉⲧ | ϣⲟⲟⲡ is treated as ⲛⲓⲙⲉⲧϣⲟⲟⲡ ‘those who are,’ matching common ⲙⲉⲧ- participial formations.
    reason: alignment_note
  - marker: d
    text: Or 'I am my form, and your name.'.
    reason: previous_rendering
  - marker: e
    text: Or 'within the heart'.
    reason: previous_rendering
  - marker: f
    text: Or 'of men, those who are'.
    reason: previous_rendering
