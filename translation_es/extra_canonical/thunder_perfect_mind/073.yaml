translation:
  language: es
  text: Y en el espíritu de todo hombre que existe conmigo, y de las mujeres que están en mí, yo soy la honrada[a], y la que es alabada[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El término copto, según la revisión del audit trail, no significa «forma» ni «imagen», sino «la honrada»; se conserva el matiz de título pasivo y no se sustituye por una paráfrasis.
    reason: lexical_alternative
  - marker: b
    text: El copto admite también el valor verbal de «alabar»; por eso «alabada» recoge el sentido pasivo («la que es alabada») sin cerrar todas las ambigüedades del original.
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲙ̄ⲡⲛⲁ
  english_pob_choice: in the spirit
  chosen_spanish: en el espíritu
  alternatives_spanish:
  - en el aliento
  - en el viento
  lexicon: Crum; Layton
  rationale: El contexto interior/animador del pasaje favorece «espíritu»; «viento» o «aliento» serían posibles etimológicamente, pero aquí no conservan tan bien el sentido de presencia interior que el copto sugiere.
- source_word: ⲣⲱⲙⲉ
  english_pob_choice: men
  chosen_spanish: hombre
  alternatives_spanish:
  - ser humano
  - persona
  lexicon: Crum
  rationale: El pasaje contrapone varones y mujeres; por eso en español conviene mantener «hombre» en singular genérico dentro de la construcción «todo hombre», sin borrar el paralelo de género.
- source_word: ⲛⲓϩⲓⲟⲙⲉ
  english_pob_choice: the women
  chosen_spanish: las mujeres
  alternatives_spanish:
  - las hembras
  - las esposas
  lexicon: Crum
  rationale: El sustantivo corresponde directamente a «mujeres»; esa traducción conserva el paralelismo con «todo hombre» sin introducir matices no atestiguados.
- source_word: ⲛ̄ⲙⲙⲁⲉⲓ
  english_pob_choice: with me
  chosen_spanish: conmigo
  alternatives_spanish:
  - conmigo misma
  - junto a mí
  lexicon: Crum
  rationale: La forma enclítica en español se expresa con naturalidad como «conmigo»; así se conserva la cercanía relacional del copto sin rigidizar la sintaxis.
- source_word: ⲛ̄ϩⲏⲧ
  english_pob_choice: in me
  chosen_spanish: en mí
  alternatives_spanish:
  - dentro de mí
  - en mi interior
  lexicon: Crum
  rationale: 'La revisión fuente-copto corrige la lectura anterior: no es «corazón» sino la preposición con sufijo de primera persona. «En mí» es la equivalencia más directa y sobria.'
- source_word: ⲁⲛⲟⲕ ⲧⲉ
  english_pob_choice: I am
  chosen_spanish: yo soy
  alternatives_spanish:
  - soy yo
  lexicon: Layton
  rationale: La declaración copta con voz femenina se traduce de manera natural como «yo soy», manteniendo el tono solemne y autoidentificador.
- source_word: ⲧⲁⲉⲓⲏⲟⲩ
  english_pob_choice: the honored one
  chosen_spanish: la honrada
  alternatives_spanish:
  - la honrada y honrable
  - la que es honrada
  lexicon: Crum (s.v. εἶδος/idea loans); revision-aware
  rationale: La revisión asentada en el audit trail identifica este término como derivado de la raíz de «honrar». En español, «la honrada» conserva la pasiva implícita y el valor de título paradójico propio de Thunder.
- source_word: ⲧⲉⲧⲟⲩⲥⲙⲟⲩ
  english_pob_choice: the one who is praised
  chosen_spanish: la que es alabada
  alternatives_spanish:
  - la que es bendecida
  - la alabada
  lexicon: Crum; revision-aware
  rationale: La revisión correcta rechaza «nombre» y confirma el valor verbal de «alabar/pregonar». «Alabada» es un equivalente natural en español que mantiene el pasivo y la ambigüedad poética del original.
theological_decisions:
- issue: Auto-descripción paradójica de la voz que habla como «la honrada» y «la que es alabada»
  english_pob_reading: I am the honored one, and the one who is praised.
  chosen_spanish_reading: yo soy la honrada, y la que es alabada
  alternative_spanish_readings:
  - yo soy la honrada, y la alabada
  - yo soy la honrada, y la que es alabada por todos
  rationale: 'El texto conserva la auto-presentación paradójica característica de Thunder: una voz femenina que se identifica simultáneamente con honor recibido y alabanza. La traducción debe sostener ese doble movimiento sin explicarlo o suavizarlo.'
  doctrine_reference: Retórica paradójica de Thunder, Perfect Mind; fidelidad a la voz literaria del texto fuente.
translation_notes:
  revision_awareness: Se ha seguido la última revisión fuente-correctiva del audit trail, que rechazó las lecturas anteriores de «forma», «nombre» y «en el corazón», y reafirmó el sentido de honor/alabanza y la lectura de «en mí». La traducción española refleja esos cambios y evita depender de la versión inglesa previa cuando esta había sido corregida.
  spanish_consistency_notes:
  - Se mantiene «espíritu» para ⲡⲛⲁ en lugar de «viento» o «aliento», conforme al sentido interior del pasaje.
  - Se conserva el paralelismo hombre/mujeres para reflejar la estructura de género del original.
  - «En mí» reproduce la corrección textual frente a una lectura más interpretativa como «en el corazón».
  - Las formas «honrada» y «alabada» sostienen el carácter pasivo y laudatorio del copto sin volverlo explicativo.
  - No se introduce «Cristo», «Señor» ni terminología doctrinal ajena al fragmento.
