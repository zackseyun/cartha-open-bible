translation:
  language: es
  text: Yo soy el nombre de la voz[a] y la voz del nombre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Voz» también puede entenderse como «sonido»; ambas opciones reflejan el copt. ⲫⲱⲛⲏ. Se prefiere «voz» por su matiz personal y audible.
    reason: lexical_alternative
  - marker: b
    text: La región del OCR muestra vocativos vecinos («oyentes», «ángeles»). Algunas letras pueden estar mal leídas (ⲥ por ⲫ; omisión de ⲣ), por lo que ⲡⲓⲛⲁ se entiende como ⲡⲣⲁⲛ («el nombre») y ⲧⲥⲙⲏ como ⲧⲫⲱⲛⲏ («la voz»).
    reason: alignment_note
lexical_decisions:
- source_word: ⲁⲛⲟⲕ
  english_pob_choice: I am
  chosen_spanish: Yo soy
  alternatives_spanish:
  - Soy
  - Yo
  lexicon: Crum; Layton, Coptic Grammar
  rationale: La forma enfática de primera persona se conserva mejor en español con el pronombre explícito y el verbo copulativo; mantiene el tono de autorrevelación del original y la simetría retórica.
- source_word: ⲡⲣⲁⲛ
  english_pob_choice: the name
  chosen_spanish: el nombre
  alternatives_spanish:
  - nombre
  lexicon: Crum s.v. ⲣⲁⲛ
  rationale: Se conserva el sustantivo concreto con artículo definido para reflejar la construcción paralela y la identidad nominal del enunciado.
- source_word: ⲫⲱⲛⲏ
  english_pob_choice: voice
  chosen_spanish: voz
  alternatives_spanish:
  - sonido
  lexicon: Crum s.v. ⲫⲱⲛⲏ; Greek φωνή
  rationale: ‘Voz’ preserva la matización personal y audible que el inglés POB también prioriza; ‘sonido’ queda como alternativa válida para el alcance acústico más amplio.
- source_word: ⲛ̄ⲧⲉ
  english_pob_choice: of
  chosen_spanish: de
  alternatives_spanish:
  - —
  lexicon: Layton, Coptic Grammar §81–83
  rationale: La relación genitiva se expresa de modo directo con ‘de’, manteniendo la estructura especular del verso.
- source_word: ⲁⲩⲱ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - así como
  lexicon: Crum s.v. ⲁⲩⲱ
  rationale: ‘Y’ reproduce la coordinación simple y el paralelismo estrecho sin añadir matices ajenos al texto.
theological_decisions:
- issue: Paralelismo identidad/voz-nombre
  english_pob_reading: I am the name of the voice and the voice of the name.
  chosen_spanish_reading: Yo soy el nombre de la voz y la voz del nombre.
  alternative_spanish_readings:
  - Soy el nombre de la voz y la voz del nombre.
  - Yo soy el nombre del sonido y el sonido del nombre.
  rationale: Se preserva el chiasmo y la tensión conceptual entre nombre y voz. ‘Voz’ mantiene mejor la resonancia personal y revelatoria, sin eliminar la posibilidad acústica que el original también permite.
  doctrine_reference: Tensión retórica y simbólica del texto no canónico; no se formula una doctrina definida.
translation_notes:
  revision_awareness: 'El contexto auditado del inglés POB indica una nota textual importante: el OCR presenta lecturas vecinas inciertas, y la edición inglesa resuelve el paralelismo como ‘name / voice’ con posible lectura alternativa ‘sound’. Dado que el aviso de alineación es de baja confianza, se conserva en español la lectura estable del audit trail inglés sin forzar una normalización mayor. No se añaden reconstrucciones textuales no sustentadas por el paquete fuente.'
  spanish_consistency_notes:
  - Se mantiene ‘voz’ como término principal para conservar la decisión del POB en inglés y evitar una prosa demasiado abstracta.
  - La puntuación sigue el paralelismo de dos miembros coordinados por ‘y’.
  - No se introduce ‘Cristo’, ‘Señor’ ni otros equivalentes tradicionales ajenos al texto fuente.
