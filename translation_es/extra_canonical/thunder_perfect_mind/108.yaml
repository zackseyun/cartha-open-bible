translation:
  language: es
  text: el nombre de la voz y la voz del nombre. Yo soy el signo de la letra y la manifestación de la división[a]. Y yo […]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «separación». «División» conserva mejor el sustantivo abstracto del original auditado.
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲡⲣⲁⲛ
  english_pob_choice: name
  chosen_spanish: nombre
  alternatives_spanish:
  - nombre propio
  - el nombre
  lexicon: Crum (Sahidic Coptic)
  rationale: ⲡⲣⲁⲛ significa “nombre”; en español, “el nombre” mantiene la estructura nominal y la repetición paralela con “voz” sin añadir interpretación.
- source_word: ⲧⲥⲙⲏ
  english_pob_choice: 'within / inside (audit note: the OCR context also shows ''voice'' in the mapped English fragment, but the source packet clarifies the intended Coptic sense in the surrounding issue)'
  chosen_spanish: voz
  alternatives_spanish:
  - voz interior
  - interior
  lexicon: Crum (Sahidic Coptic) / source packet note
  rationale: Dado el texto copticrado visible en el expediente de revisión, la palabra en este segmento funciona como parte de la secuencia 'nombre de la voz / voz del nombre'. Por eso se traduce literalmente como 'voz' en la frase auditada, en vez de seguir la alineación errónea del consult text sobre 'within'.
- source_word: ⲥⲏⲙⲉⲓⲟⲛ
  english_pob_choice: sign
  chosen_spanish: señal
  alternatives_spanish:
  - signo
  lexicon: Crum (Sahidic Coptic)
  rationale: Para el sustantivo 'sign' en un registro gnóstico/poético, 'señal' suena natural en español y conserva el valor de marca o indicio visible; 'signo' también sería posible, pero 'señal' evita una tonalidad demasiado técnica.
- source_word: ⲁⲡⲟⲩⲱⲛϩ / manifestative wording in the aligned witness
  english_pob_choice: manifestation
  chosen_spanish: manifestación
  alternatives_spanish:
  - revelación
  - aparición
  lexicon: Crum (Sahidic Coptic)
  rationale: '''Manifestación'' reproduce con fidelidad la idea de hacerse patente o visible, y encaja con el paralelo ''señal''. ''Revelación'' sería más interpretativa y ''aparición'' demasiado específica.'
- source_word: ⲇⲓⲁⲗⲩⲥⲓⲥ / division wording in the aligned witness
  english_pob_choice: division
  chosen_spanish: división
  alternatives_spanish:
  - separación
  - partición
  lexicon: Crum (Sahidic Coptic)
  rationale: '''División'' conserva el sustantivo abstracto y la tensión del original sin suavizarla. ''Separación'' sería viable, pero desplaza el matiz hacia el acto de separar más que hacia el estado de división.'
translation_notes:
  revision_awareness: 'La revisión más reciente detectó un error mayor de alineación: la versión inglesa anterior saltaba a otro segmento (“For what is within you…”). Por eso este borrador español sigue el Coptic OCR y el comentario de revisión, no el consult text desalineado.'
  spanish_consistency_notes:
  - Se mantiene un español sobrio y publicable, evitando calcos innecesarios.
  - Se conserva la repetición paralela 'nombre / voz / nombre' para reflejar la estructura del segmento.
  - No se introdujo vocabulario doctrinal ajeno al pasaje.
  - Las notas se anclan solo donde el texto español muestra exactamente [a] y [b].
