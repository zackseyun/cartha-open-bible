  text: 'I am the decree of those who ask me[a],

    and the voice of the voices in the place of the gods—

    the voice of the angels that they shout.

    Within the word and among the gods[f][e][d][c][b],

    the gods sent forth by means of the shout.'
  footnotes:
  - marker: a
    text: ‘Word’ translates ⲗⲟⲅⲟⲥ; some readers may prefer ‘Logos’ to signal a technical term.
    reason: lexical_alternative
  - marker: b
    text: Reading ⲡⲟⲩⲁϩⲥⲁϩⲛⲉ as ‘garment of oneness’ is tentative; OCR and segmentation may be off.
    reason: alignment_note
  - marker: c
    text: ‘Shout’ for ϣⲟϫⲛⲉ could also be ‘outcry’ or ‘tumult,’ preserving the sonic imagery.
    reason: lexical_alternative
  - marker: d
    text: The phrase ‘ⲥⲓⲥ ⲛ̄ⲛⲁⲅⲅⲉⲗⲟⲥ ⲛ̄ⲧⲁⲩⲧⲁⲟⲩⲟ’ is uncertain; translation reflects a best guess pending improved transcription.
    reason: alignment_note
  - marker: e
    text: Or 'I am the garment of oneness for those who ask me,'.
    reason: previous_rendering
  - marker: f
    text: Or 'I am one within the word'.
    reason: previous_rendering
