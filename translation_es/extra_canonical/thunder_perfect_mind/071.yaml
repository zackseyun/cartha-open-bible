translation:
  language: es
  text: 'Soy el decreto de los que me preguntan[a],

    y la voz de las voces en el lugar de los dioses—

    la voz de los ángeles que ellos gritan.

    Dentro de la palabra y entre los dioses[f][e][d][c][b],

    los dioses enviados por medio del grito.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘Decreto’ traduce el valor revisado de ⲡⲟⲩⲁϩⲥⲁϩⲛⲉ; la lectura anterior como ‘garment of oneness’ fue descartada por el audit trail.
    reason: source_note
  - marker: b
    text: La última cláusula es sintácticamente incierta en el testimonio copt. y depende de una segmentación revisada; el español sigue la mejor lectura disponible sin exagerar seguridad.
    reason: source_note
  - marker: c
    text: ‘Grito’ mantiene la imaginería sonora de ϣⲟϫⲛⲉ; también podría entenderse como ‘clamor’ o ‘vocerío’.
    reason: lexical_alternative
  - marker: d
    text: La frase sobre los ángeles es textual y gramaticalmente incierta en el OCR, pero el sentido general apunta a seres angélicos que emiten un grito.
    reason: textual_variant
  - marker: e
    text: 'O: ‘Soy uno dentro de la palabra’.'
    reason: alternative_reading
  - marker: f
    text: 'O: ‘entre los dioses dentro de la palabra’.'
    reason: alternative_reading
lexical_decisions:
- source_word: ⲡⲟⲩⲁϩⲥⲁϩⲛⲉ
  english_pob_choice: decree
  chosen_spanish: decreto
  alternatives_spanish:
  - mandato
  - orden
  lexicon: Crum (Coptic)
  rationale: El audit trail revisado corrige la lectura anterior de 'garment of oneness' y confirma el compuesto como 'decree/command'. 'Decreto' conserva el valor formal y autoritativo sin añadir matices ajenos.
- source_word: ⲁⲓⲧⲉ
  english_pob_choice: ask
  chosen_spanish: preguntan
  alternatives_spanish:
  - piden
  - solicitan
  - me buscan
  lexicon: Crum (Coptic)
  rationale: Aunque la glosa base es 'ask', en español 'preguntar' resulta natural con objeto personal ('me preguntan') y mantiene la relación directa y dialogal del texto.
- source_word: ⲥⲙⲏ
  english_pob_choice: voice
  chosen_spanish: voz
  alternatives_spanish:
  - sonido
  - clamor
  lexicon: Crum (Coptic)
  rationale: Se conserva 'voz' para reproducir la imaginería recurrente de voces en Thunder y el paralelo con 'las voces' del verso.
- source_word: ⲛⲟⲩⲧⲉ
  english_pob_choice: gods
  chosen_spanish: dioses
  alternatives_spanish:
  - deidades
  lexicon: Crum (Coptic)
  rationale: La morfología plural exige plural en español. 'Dioses' preserva la textura mítica/polemizante sin neutralizarla a singular.
- source_word: ⲗⲟⲅⲟⲥ
  english_pob_choice: word
  chosen_spanish: palabra
  alternatives_spanish:
  - Logos
  - verbo
  lexicon: LSJ (Greek); Crum (loanwords)
  rationale: '''Palabra'' es el equivalente base más claro en español y evita sobrecargar el pasaje con capitalización técnica que el contexto poético no exige.'
- source_word: ϣⲟϫⲛⲉ
  english_pob_choice: shout
  chosen_spanish: grito
  alternatives_spanish:
  - clamor
  - vocerío
  - algarabía
  lexicon: Crum (Coptic)
  rationale: '''Grito'' transmite la intensidad sonora y funciona bien con el verbo ''gritan''. ''Clamor'' es posible, pero menos directo.'
- source_word: ⲁⲅⲅⲉⲗⲟⲥ
  english_pob_choice: angels
  chosen_spanish: ángeles
  alternatives_spanish:
  - mensajeros
  lexicon: LSJ (Greek); Crum (loanwords)
  rationale: En este contexto la lectura como seres celestiales es la más natural y coincide con la elección inglesa de 'angels'.
- source_word: ⲙⲡⲙⲁ
  english_pob_choice: place
  chosen_spanish: lugar
  alternatives_spanish:
  - espacio
  - ámbito
  - reino
  lexicon: Crum (Coptic)
  rationale: '''Lugar'' mantiene la referencia espacial simple y evita interpretar el sintagma como un ''reino'' o ''ámbito'' más doctrinal de lo que el texto exige.'
- source_word: ⲧⲁⲟⲩⲟ
  english_pob_choice: shout
  chosen_spanish: gritan
  alternatives_spanish:
  - claman
  - vociferan
  - prorrumpen
  lexicon: Crum (Coptic)
  rationale: El audit trail indica que la línea habla de los ángeles 'that they shout'; por eso el español mantiene un verbo de emisión sonora en tercera persona plural.
theological_decisions:
- issue: Mantenimiento del plural 'dioses'
  english_pob_reading: The text retains the plural morphology of ⲛⲟⲩⲧⲉ as 'gods'.
  chosen_spanish_reading: Se conserva 'dioses' sin singularizar ni sustituir por 'Dios'.
  alternative_spanish_readings:
  - Dios
  - seres divinos
  rationale: La evidencia lingüística señala plural explícito. Singularizarlo borraría una tensión importante del texto y del audit trail, que no autoriza una armonización monoteizante.
  doctrine_reference: Crum (Coptic) + audit trail of source-language plural morphology
- issue: Sonic imagery around the final clause
  english_pob_reading: The gods sent forth by means of the shout.
  chosen_spanish_reading: Los dioses enviados por medio del grito.
  alternative_spanish_readings:
  - los dioses lanzados con el grito
  - los dioses emitidos por el grito
  rationale: Aunque la sintaxis es difícil, el español conserva el vínculo entre plural divino y emisión sonora sin forzar una reescritura interpretativa. 'Enviados' sigue el sentido de 'send forth' del registro revisado.
  doctrine_reference: Applied revision noting the line-break/verb completion and the source's unresolved syntax
translation_notes:
  revision_awareness: Se incorporó la revisión crítica que corrige la lectura de ⲡⲟⲩⲁϩⲥⲁϩⲛⲉ como 'decree/command' y la observación de que el ⲟⲩ final pertenece al verbo de la línea siguiente, no a un 'one'. También se respetó la capitalización revisada de la cuarta línea y la incertidumbre sintáctica final del pasaje.
  spanish_consistency_notes:
  - Se usa 'dioses' de forma consistente para ⲛⲟⲩⲧⲉ, sin alternar con 'deidades' en el texto principal.
  - Se mantiene el registro sonoro con 'voz' / 'voces' / 'grito' para reproducir el paralelismo del pasaje.
  - '''Palabra'' se usa para ⲗⲟⲅⲟⲥ; no se capitaliza como ''Logos'' en el cuerpo principal porque el contexto poético no lo exige.'
  - Se evita reintroducir la lectura errónea de 'garment of oneness' en el texto principal; solo se menciona en la nota de revisión.
