review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien el paralelismo fuente: lo visto «afuera» se ve «dentro», seguido por la identificación «lo visible» y «tu garment». Sin embargo, «vestido» en español suele entenderse como una prenda específica (dress), mientras que el copto préstamo de ἱμάτιον y la decisión auditada inglesa piden un término más general como «vestidura».'
  spanish_quality_summary: La redacción es clara y poética. «Afuera de ti / dentro de ti» suena natural y conserva la antítesis. El único tropiezo de calidad es «tu vestido», que en español general puede inducir una imagen demasiado concreta y menos digna que «tu vestidura».
  glossary_alignment: No hay términos del glosario doctrinal mayor en juego. La decisión clave auditada para ἱμάτιον = «garment» se alinea mejor en español con «vestidura» que con «vestido». «Lo visible» refleja bien ὁρατόν usado sustantivamente.
  issues:
  - severity: medium
    issue: «vestido» restringe indebidamente el sentido de ἱμάτιον
    rationale: '«Vestido» en español moderno suele significar una prenda específica femenina o un tipo concreto de atuendo. El original y la auditoría inglesa buscan un término general y algo formal, metafóricamente apto: «garment». «Vestidura» preserva mejor ese registro y amplitud semántica.'
  revised_spanish_text: Y lo que ves afuera de ti, lo ves dentro de ti; es lo visible, y es tu vestidura.
  revision_rationale: Se mantiene intacta la estructura paralela y la antítesis espacial del borrador, pero se sustituye «vestido» por «vestidura» para reflejar con mayor fidelidad el valor general y poético de ἱμάτιον / «garment» sin introducir una prenda específica.
