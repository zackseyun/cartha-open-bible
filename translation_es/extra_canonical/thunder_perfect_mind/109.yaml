revisions:
- from: Y lo que ves afuera de ti, lo ves dentro de ti; es lo visible, y es tu vestido.
  to: Y lo que ves afuera de ti, lo ves dentro de ti; es lo visible, y es tu vestidura.
  rationale: Se mantiene intacta la estructura paralela y la antítesis espacial del borrador, pero se sustituye «vestido» por «vestidura» para reflejar con mayor fidelidad el valor general y poético de ἱμάτιον / «garment» sin introducir una prenda específica.
  reviewer_model: gpt-5.4
