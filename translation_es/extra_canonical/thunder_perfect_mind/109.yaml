translation:
  language: es
  text: Y lo que ves afuera de ti, lo ves dentro de ti; es lo visible, y es tu vestidura.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ⲛⲁⲩ
  english_pob_choice: see
  chosen_spanish: ves
  alternatives_spanish:
  - miras
  - contemplas
  lexicon: Crum; uso sahídico común
  rationale: «Ver» conserva la percepción visual directa del original y la cadencia simple del paralelo. En español, «ves» reproduce con naturalidad la reiteración de la frase sin añadir matices interpretativos.
- source_word: ⲉⲃⲟⲗ
  english_pob_choice: outside
  chosen_spanish: afuera
  alternatives_spanish:
  - fuera
  - desde fuera
  lexicon: Crum; preposición/adverbio sahídico
  rationale: El sentido de exterioridad se expresa de forma idiomática con «afuera», manteniendo el contraste con «dentro» y el movimiento espacial del original.
- source_word: ⲉϩⲟⲩⲛ
  english_pob_choice: inside
  chosen_spanish: dentro
  alternatives_spanish:
  - dentro de ti
  - adentro
  lexicon: Crum; preposición/adverbio sahídico
  rationale: «Dentro» conserva la antítesis con «afuera» sin sobrecargar el verso. El complemento explícito «de ti» alinea el referente con el contexto inmediato.
- source_word: ⲟⲣⲁⲧⲟⲛ (Greek loan ὁρατόν)
  english_pob_choice: what is visible
  chosen_spanish: lo visible
  alternatives_spanish:
  - lo que es visible
  - la cosa visible
  lexicon: LSJ (ὁρατός) como préstamo substantivado en textos coptos
  rationale: El adjetivo griego funciona sustantivamente; «lo visible» preserva esa fuerza nominal en español de manera breve y natural, sin convertirlo en una frase explicativa más larga.
- source_word: ⲓⲙⲁⲧⲓⲟⲛ (Greek loan ἱμάτιον)
  english_pob_choice: garment
  chosen_spanish: vestido
  alternatives_spanish:
  - vestidura
  - ropa
  - manto
  lexicon: LSJ (ἱμάτιον) ampliamente prestado al copto
  rationale: «Vestido» expresa la idea de prenda o cobertura visible en español claro y sobrio. Se evita «ropa» por ser demasiado general y «manto» por introducir una concreción no exigida por el texto.
theological_decisions:
- issue: Relación entre lo visible exterior e interior
  english_pob_reading: And what you see outside you, you see inside you; it is what is visible, and it is your garment.
  chosen_spanish_reading: Y lo que ves afuera de ti, lo ves dentro de ti; es lo visible, y es tu vestido.
  alternative_spanish_readings:
  - Y lo que ves fuera de ti, lo ves dentro de ti; es lo que se ve, y es tu vestidura.
  - Y lo que ves afuera de ti, lo ves en tu interior; es lo visible, y es tu ropa.
  rationale: La línea sostiene una tensión poética entre exterioridad e interioridad sin resolverla explicativamente. La traducción conserva esa antítesis y la identificación metafórica final con una prenda visible, evitando espiritualizar o explicar de más el enunciado.
  doctrine_reference: Poética sapiencial/gnóstica del texto; respeto a la tensión retórica sin armonización doctrinal externa
translation_notes:
  revision_awareness: Se siguió el estado más reciente del expediente inglés, que marca la revisión como sin cambios y con alta concordancia; por ello no se introdujeron variantes textuales ni notas de incertidumbre adicionales. La alineación coptó-español se apoyó en el segmento consultado y en las decisiones léxicas ya auditadas en inglés.
  spanish_consistency_notes:
  - Se mantiene un español sobrio y publicable, con paralelismo sintáctico cercano al original.
  - Se preserva la antítesis afuera/dentro y la nominalización de «lo visible».
  - Se evita el calco rígido de «garment» con «prenda» porque «vestido» conserva mejor el tono literario del pasaje.
