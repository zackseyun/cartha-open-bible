translation:
  language: es
  text: Mira[a] hacia la tierra, y me encontrarás entre los que ven; y no mires al estercolero de estiércol.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El copto revisado apunta a un imperativo de «mirar hacia» o «mirar fuera», no a un verbo de movimiento; por eso se evita traducirlo como «salir».
    reason: source_note
lexical_decisions:
- source_word: ⲛⲁⲩ ⲉⲃⲟⲗ
  english_pob_choice: Look out
  chosen_spanish: ¡Mira[a] hacia
  alternatives_spanish:
  - ¡Mira fuera
  - ¡Mira de frente
  lexicon: Crum; Layton
  rationale: La lectura revisada entiende un imperativo de ver/mirar con ⲉⲃⲟⲗ, no un movimiento de salida. «Mira hacia» conserva el sentido direccional y la fuerza imperativa.
- source_word: ϩⲓ ⲡⲕⲁϩ
  english_pob_choice: upon the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - el suelo
  - el terreno
  lexicon: Crum; Layton
  rationale: ⲕⲁϩ puede ser tierra o suelo; «la tierra» preserva el alcance amplio y solemne del original.
- source_word: ⲧⲉⲧⲛⲁϭⲓⲛⲉ
  english_pob_choice: you will find
  chosen_spanish: me encontrarás
  alternatives_spanish:
  - me hallarás
  - lo encontrarás
  lexicon: Layton
  rationale: El futuro simple español expresa bien el valor predictivo de la forma coptica.
- source_word: ⲉⲧⲛⲏⲟⲩ
  english_pob_choice: those who see
  chosen_spanish: los que ven
  alternatives_spanish:
  - los que miran
  - los videntes
  lexicon: Crum; Layton
  rationale: Se conserva la ambigüedad sin forzar una lectura sustantivada. «Los que ven» es transparente y fiel al relativo verbal.
- source_word: ⲙⲡⲣⲛⲁⲩ
  english_pob_choice: do not look upon
  chosen_spanish: no mires sobre
  alternatives_spanish:
  - no mires
  - no observes
  lexicon: Crum; Layton
  rationale: La prohibición se mantiene con un imperativo negativo directo. «Sobre» reproduce la relación espacial de ϩⲓ/ⲉⲡⲓ- en español de manera natural.
- source_word: ⲉⲡⲓⲧⲕⲟⲩⲡⲣⲓⲁ ⲛⲧⲉ ⲡⲓⲕⲱⲕ
  english_pob_choice: the dung-heap of dung
  chosen_spanish: el montón de estiércol de estiércol
  alternatives_spanish:
  - el estercolero de estiércol
  - el montón de excremento
  lexicon: Crum; Liddell–Scott
  rationale: Se conserva la redundancia enfática del coptico. «Estiércol» es más natural en español que una calca directa y sigue siendo suficientemente literal.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente que corrige la apertura a un imperativo de ver/mirar y conserva la cláusula relativa como «los que ven», en lugar de la lectura anterior de «los que están viniendo». También se mantuvo la imagen redundante del «dung-heap of dung» sin añadir «me» en la última prohibición.
  spanish_consistency_notes:
  - Se mantuvo «la tierra» para ⲡⲕⲁϩ, en línea con el tono cosmológico del texto.
  - Se prefirió «estiércol» para reflejar el campo semántico de κοπρία/ⲕⲱⲕ sin recurrir a un eufemismo.
  - La sintaxis española intenta conservar el paralelismo imperativo-prohibitivo del original.
