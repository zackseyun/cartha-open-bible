review_pass:
  verdict: revise
  source_alignment_summary: El borrador español capta correctamente el imperativo inicial, «me encontrarás» y «los que ven», y conserva la imagen enfática del estercolero. Sin embargo, «no mires sobre» no refleja un español natural para «do not look upon», y la construcción «montón de estiércol de estiércol» suena torpe. Conviene ajustar la sintaxis sin perder la tautología deliberada del copto.
  spanish_quality_summary: La frase inicial es legible, pero el conjunto necesita pulido idiomático. «Mira hacia la tierra» funciona, aunque «Mira la tierra» o «Mira hacia la tierra» son opciones; el problema principal es «no mires sobre», que es poco natural, y la repetición final necesita una formulación más digna y fluida en español eclesial general.
  glossary_alignment: 'No hay términos teológicos clave del glosario general en este segmento. Las decisiones léxicas principales están bien encaminadas: ⲉⲧⲛⲏⲟⲩ como «los que ven» sigue el rastro auditado actual; la imagen de κοπρία/ⲕⲱⲕ debe conservar la duplicación semántica, pero en español conviene expresarla como «estercolero de estiércol» en vez de «montón de estiércol de estiércol».'
  issues:
  - severity: medium
    issue: «no mires sobre» es una construcción antinatural en español
    rationale: Aunque intenta reproducir una relación espacial, en español «mirar sobre» no es idiomático aquí. «No mires al...» o «no pongas la vista en...» comunica fielmente la prohibición sin calco torpe.
  - severity: medium
    issue: «montón de estiércol de estiércol» conserva la redundancia pero suena mecánico
    rationale: La doble expresión del copto debe mantenerse, pero con una forma más natural. «Estercolero de estiércol» o «montón de excremento» serían mejores; la primera preserva mejor la doble imagen de montón + estiércol.
  - severity: low
    issue: El signo inicial de exclamación no es necesario
    rationale: El original es imperativo, no necesariamente exclamativo. Quitar la exclamación da un tono más sobrio y digno sin perder fuerza.
  revised_spanish_text: Mira[a] hacia la tierra, y me encontrarás entre los que ven; y no mires al estercolero de estiércol.
  revised_footnotes:
  - marker: a
    text: El copto revisado apunta a un imperativo de «mirar hacia» o «mirar fuera», no a un verbo de movimiento; por eso se evita traducirlo como «salir».
    reason: source_note
  revision_rationale: Se mantiene la decisión textual auditada de leer un imperativo («Mira») y de traducir ⲉⲧⲛⲏⲟⲩ como «los que ven». Se corrige «no mires sobre» por «no mires al», que es español natural y fiel al sentido prohibitivo. También se reemplaza «montón de estiércol de estiércol» por «estercolero de estiércol», que conserva la redundancia enfática del copto con mejor legibilidad.
