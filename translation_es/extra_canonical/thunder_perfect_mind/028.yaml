  text: Look out upon the earth, and you will find me among those who see; and do not look upon the dung-heap of dung.
  footnotes:
  - marker: a
    text: ⲉⲧⲛⲏⲟⲩ literally "who see" (relative + verb of seeing). It could also be taken as "the visible ones" or even "the seers" depending on context.
    reason: lexical_alternative
  - marker: b
    text: ⲕⲟⲡρία (Greek loan) + Coptic ⲕⲱⲕ both denote manure/dung; the double expression heightens the image of abjection, hence "dung-heap of dung."
    reason: cultural_note
  - marker: c
    text: Consult text gives "I am without shame; I am ashamed" for this block, but the Coptic here speaks of going out upon the earth and a dung-heap prohibition; the mismatch likely reflects a heuristic line mapping.
    reason: alignment_note
  - marker: d
    text: Or 'I will go out upon the earth; you will find me among those who see; neither look upon me on the dung-heap of dung.'.
    reason: previous_rendering
