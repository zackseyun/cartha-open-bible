  text: 'I am the midwife and the mother.[1]

    I am the virgin[2] and the woman.[1]

    I am the mother of my father[3][2], and the virgin of my—[3]'
  footnotes:
  - marker: '1'
    text: Several English editions read ‘I am the midwife and she who bears not.’ The Coptic here reads ⲧⲙⲁⲁⲩ (‘the mother’), producing the paradox ‘midwife/mother.’ Given medium alignment confidence, we prioritize the lexeme over tradition.
    reason: alignment_note
  - marker: '2'
    text: ⲥⲱⲛⲉ can also be translated ‘maiden,’ which some may prefer for its stylistic register; ‘virgin’ underscores the antithesis with ‘woman.’
    reason: lexical_alternative
  - marker: '3'
    text: The manuscript line breaks after ⲙⲡⲁ (‘of my …’), leaving the object unpreserved in this excerpt. We mark the lacuna rather than conjecturing a completion.
    reason: textual_variant
