translation:
  language: es
  text: 'Soy la partera y la madre.[a]

    Soy la virgen[b] y la mujer.[a]

    Soy la madre de mi padre[c][b], y la virgen de mi—[c]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: En el copto de este fragmento, la primera pareja lee literalmente ‘la partera y la madre’, no ‘la que no da a luz’. Se conserva así la paradoja textual atestiguada por el manuscrito.
    reason: textual_variant
  - marker: b
    text: ⲥⲱⲛⲉ también puede verterse ‘doncella’; se prefiere ‘virgen’ porque hace más visible la antítesis con ‘mujer’.
    reason: lexical_alternative
  - marker: c
    text: El manuscrito corta la línea después de ⲙⲡⲁ (‘de mi…’). Se deja la frase incompleta sin conjeturar una continuación.
    reason: textual_variant
lexical_decisions:
- source_word: ⲧϣⲉⲗⲉⲉⲧ
  english_pob_choice: midwife
  chosen_spanish: partera
  alternatives_spanish:
  - comadrona
  - madrina de partos
  lexicon: Crum; CDO
  rationale: En español, ‘partera’ comunica de manera natural y directa el oficio obstétrico de ⲧϣⲉⲗⲉⲉⲧ. Mantiene la paradoja con ‘madre’ sin sonar técnica o extraña. ‘Comadrona’ sería válido, pero ‘partera’ es más ampliamente neutro y claro.
- source_word: ⲧⲙⲁⲁⲩ
  english_pob_choice: the mother
  chosen_spanish: la madre
  alternatives_spanish:
  - la que da a luz
  - la que engendra
  lexicon: Crum; CDO
  rationale: La elección ‘la madre’ sigue de cerca el sustantivo coptico y preserva la tensión paradójica con ‘partera’. Aunque algunas tradiciones inglesas leen ‘she who bears not’, el texto coptico aquí da ‘madre’, y el español debe reflejar ese dato.
- source_word: ⲧⲥⲱⲛⲉ
  english_pob_choice: the virgin
  chosen_spanish: la virgen
  alternatives_spanish:
  - la doncella
  - la doncella virgen
  lexicon: Crum; CDO
  rationale: ‘Virgen’ es la opción más transparente y fiel para la antítesis con ‘mujer’. ‘Doncella’ suaviza el contraste y puede desplazar el matiz sexual/religioso que el par sugiere.
- source_word: ⲧⲥϩⲓⲙⲉ
  english_pob_choice: the woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - la esposa
  lexicon: Crum; CDO
  rationale: ‘Mujer’ reproduce el término genérico del original y conserva el contraste con ‘virgen’. ‘Esposa’ sería demasiado específico y no está respaldado por el léxico aquí.
- source_word: ⲧⲉ … ⲁⲛⲟⲕ (cleft construction)
  english_pob_choice: I am the …
  chosen_spanish: Soy la …
  alternatives_spanish:
  - Yo soy la …
  - Es la … que yo soy
  lexicon: Layton, Coptic Grammar (usage); Crum (syntax examples)
  rationale: En español, ‘Soy la …’ preserva la identificación enfática del copto sin recargar la sintaxis. ‘Yo soy’ sería igualmente posible, pero la forma breve conserva mejor el ritmo sentencioso del pasaje.
- source_word: ⲧⲙⲁⲁⲩ ⲛⲧⲉ ⲡⲁⲉⲓⲱⲧ
  english_pob_choice: the mother of my father
  chosen_spanish: la madre de mi padre
  lexicon: Crum; CDO
  rationale: Se traduce literalmente para mantener el impacto del parentesco paradójico. El español permite conservar la estructura sin necesidad de explicación interpretativa dentro del versículo.
- source_word: ⲧⲥⲱⲛⲉ ⲙⲡⲁ—
  english_pob_choice: the virgin of my—
  chosen_spanish: la virgen de mi—
  alternatives_spanish:
  - la doncella de mi—
  lexicon: Crum; CDO
  rationale: Se conserva el corte abrupto del manuscrito y del audit trail inglés, sin completar la frase. El guion largo marca la lacuna y evita inventar un referente ausente.
theological_decisions:
- issue: Conservar la paradoja ‘partera / madre’ frente a una traducción tradicional que podría suavizarla.
  english_pob_reading: The English audit prioritizes the Coptic lexeme ‘mother’ over the traditional ‘she who bears not,’ because the manuscript reads ⲧⲙⲁⲁⲩ (‘the mother’).
  chosen_spanish_reading: ‘Soy la partera y la madre’ conserva la paradoja textual del copto, sin reintroducir una negación que no está presente en esta lectura.
  alternative_spanish_readings:
  - ‘Soy la partera y la que no da a luz’
  - ‘Soy la partera y la que no engendra’
  rationale: El punto doctrinal/textual aquí no es una enseñanza distinta, sino la fidelidad al testimonio manuscrito tal como ha sido auditado. Traducir ‘madre’ en vez de una negación respeta la tensión concreta del fragmento.
  doctrine_reference: Textual criticism; lexical fidelity to the source manuscript
- issue: Mantener ‘virgen’ en contraste con ‘mujer’ sin atenuarlo por eufemismo.
  english_pob_reading: The English audit chooses ‘virgin’ and notes ‘maiden’ as a stylistic alternative, emphasizing the antithesis with ‘woman’.
  chosen_spanish_reading: ‘la virgen’ frente a ‘la mujer’ preserva la antítesis fuerte que el original y el audit trail ponen en juego.
  alternative_spanish_readings:
  - ‘la doncella’
  - ‘la joven’
  rationale: ‘Doncella’ puede ser útil estilísticamente, pero ‘virgen’ es el equivalente más directo y conserva mejor la oposición semántica que el texto explota.
  doctrine_reference: Lexical-semantic opposition in Nag Hammadi Coptic
translation_notes:
  revision_awareness: Se siguió la revisión más reciente que eliminó el punto final tras la segunda línea para conservar mejor la cadencia fragmentaria. En español se mantiene esa cadencia sin puntuación final en la segunda línea, y se preserva la ruptura lacunosa del final.
  spanish_consistency_notes:
  - Se usa ‘partera’ para ⲧϣⲉⲗⲉⲉⲧ, coherente con el campo semántico obstétrico y con el audit trail inglés.
  - Se usa ‘madre’ para ⲧⲙⲁⲁⲩ porque el texto copto atestiguado así lo lee; no se reintroduce la tradición inglesa ‘she who bears not’.
  - Se mantiene ‘virgen’ para ⲥⲱⲛⲉ y ‘mujer’ para ⲥϩⲓⲙⲉ, conservando la oposición esperada.
  - Se preserva el fragmento final con raya larga para indicar lacuna sin completar el objeto ausente.
  - La voz en primera persona sigue el valor enfático del copto cleft construction sin forzar una sintaxis extraña en español.
