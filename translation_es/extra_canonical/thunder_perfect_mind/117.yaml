  yaml_path: translation/extra_canonical/thunder_perfect_mind/117.yaml
  text: The one who will judge me at the end—judge him! You who are in many sins, and intemperances, and empty passions, and temporary pleasures!
  footnotes:
  - marker: a
    text: '‘at the end’: OCR shows ⲛⲉⲗⲟⲥ; read here as ⲧⲉⲗⲟⲥ (Greek τέλος) on contextual grounds.'
    reason: alignment_note
  - marker: b
    text: '‘that increase’: ⲉⲧϣⲁⲉⲓⲏⲧ is uncertain in the OCR; possible sense ‘are excessive/abundant’.'
    reason: lexical_alternative
  - marker: c
    text: '‘as well’: the fragment ‘ⲡⲣⲟⲥ ⲡⲉ’ may introduce a following object; translation supplies additive force to preserve cadence without overcommitting.'
    reason: alignment_note
  - marker: d
    text: Or 'The one who will judge me at the end will judge those who are'.
    reason: previous_rendering
  - marker: e
    text: Or 'in sins and in ignorances and in passions that increase, and in pleasures as well.'.
    reason: previous_rendering
