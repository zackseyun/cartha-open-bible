translation:
  language: es
  text: El que me juzga por la ley[a]—¡júzgalo![b] Ustedes que están en muchos pecados, e intemperancias, y pasiones vacías, y placeres temporales.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La revisión del expediente lee aquí ‘ley’ (νόμος), no ‘fin’.
    reason: textual_variant
  - marker: b
    text: El imperativo es abrupto en el original; el español conserva la fuerza directa de la reprensión.
    reason: spanish_style_note
lexical_decisions:
- source_word: ⲕⲣⲓⲛⲉ
  english_pob_choice: judge
  chosen_spanish: juzga / júzgalo
  alternatives_spanish:
  - condena
  - decide
  lexicon: Coptic loan from Greek κρίνω
  rationale: Conserva el valor judicial/ético del verbo y, en el imperativo, el choque retórico del original. En español, el imperativo con clítico (‘júzgalo’) mantiene la fuerza directa.
- source_word: ⲛⲟⲙⲟⲥ
  english_pob_choice: law
  chosen_spanish: ley
  alternatives_spanish:
  - norma
  - mandato
  lexicon: Greek νόμος in Coptic
  rationale: La lectura revisada del audit trail indica que no es ‘fin’, sino ‘ley’. ‘Ley’ es el equivalente natural y fiel en español.
- source_word: ⲛⲟⲃⲉ
  english_pob_choice: sins
  chosen_spanish: pecados
  alternatives_spanish:
  - faltas
  - crímenes
  lexicon: Sahidic ⲛⲟⲃⲉ ‘sin’
  rationale: ‘Pecados’ es el término bíblico y teológicamente transparente en español para el catálogo moral del pasaje.
- source_word: ⲙⲛⲧⲁⲧⲁⲙⲁϩⲧⲉ
  english_pob_choice: intemperances
  chosen_spanish: intemperancias
  alternatives_spanish:
  - falta de dominio propio
  - descontrol
  lexicon: Nominal formation from ⲁⲙⲁϩⲧⲉ
  rationale: El audit trail corrige la lectura de ‘ignorancias’ a ‘intemperances’. En español, ‘intemperancias’ preserva el registro moral y la forma abstracta del original.
- source_word: ⲡⲁⲑⲟⲥ
  english_pob_choice: passions
  chosen_spanish: pasiones
  alternatives_spanish:
  - aflicciones
  - sufrimientos
  lexicon: Greek πάθος in ethical lists
  rationale: En listas de vicios, ‘pasiones’ es el equivalente usual y conserva la fuerza ética del préstamo griego.
- source_word: ⲉⲧϣⲟⲩⲉⲓⲧ / OCR issue around ⲉⲧϣⲁⲉⲓⲏⲧ
  english_pob_choice: empty
  chosen_spanish: vacías
  alternatives_spanish:
  - vanas
  - sin contenido
  lexicon: Uncertain OCR; likely Greek/Coptic term meaning empty
  rationale: Sigo la revisión del audit trail que entiende este segmento como ‘empty’, no ‘that increase’. ‘Vacías’ expresa bien la noción de vaciedad moral en español.
- source_word: ⲡⲣⲟⲥⲕⲁⲓⲣⲟⲥ / OCR fragment ⲡⲣⲟⲥ ⲡⲉ
  english_pob_choice: temporary
  chosen_spanish: temporales
  alternatives_spanish:
  - pasajeros
  - momentáneos
  lexicon: Greek πρόσκαιρος
  rationale: La revisión indica que el fragmento apunta a ‘temporary’. ‘Temporales’ es claro, natural y fiel al matiz de lo pasajero.
- source_word: ϩⲁ
  english_pob_choice: at
  chosen_spanish: por
  alternatives_spanish:
  - en
  - según
  lexicon: Standard Sahidic preposition ϩⲁ
  rationale: La reconstrucción revisada ‘by the law’ se expresa de forma más natural en español con ‘por la ley’, manteniendo el sentido instrumental/normativo.
theological_decisions:
- issue: 'Cambio de lectura: ‘fin’ vs. ‘ley’ en la frase inicial'
  english_pob_reading: The one who will judge me at the end—judge him!
  chosen_spanish_reading: El que me juzga por la ley—¡júzgalo!
  alternative_spanish_readings:
  - El que me juzga al final—¡júzgalo!
  - El que me juzga al fin—¡júzgalo!
  rationale: El expediente de revisión adjudica que el OCR subyacente debe leerse como ‘ley’ (νόμος), no como ‘fin’. La traducción española refleja esa corrección y conserva el enlace con el contexto inmediato indicado en el audit trail.
  doctrine_reference: Hermenéutica textual; coherencia intratextual
- issue: Catálogo de vicios con términos abstractos
  english_pob_reading: many sins, and intemperances, and empty passions, and temporary pleasures
  chosen_spanish_reading: muchos pecados, e intemperancias, y pasiones vacías, y placeres temporales
  alternative_spanish_readings:
  - muchos pecados, y desórdenes, y pasiones vacías, y placeres pasajeros
  - muchos pecados, y falta de dominio propio, y deseos vacíos, y placeres temporales
  rationale: Se preserva la enumeración moral y el carácter abstracto de los términos, evitando suavizar el tono del original. ‘Intemperancias’ y ‘pasiones vacías’ mantienen el registro ético del listado.
  doctrine_reference: Ética moral; lenguaje ascético
- issue: Imperativo directo y cambio de destinatario
  english_pob_reading: judge him! You who are in many sins...
  chosen_spanish_reading: ¡júzgalo! Ustedes que están en muchos pecados...
  alternative_spanish_readings:
  - ¡júzguenlo! Ustedes que están en muchos pecados...
  - ¡júzgalo! Ustedes que existís en muchos pecados...
  rationale: La frase conserva el giro abrupto del original, con cambio de segunda persona a plural. ‘Están’ es idiomático y no borra la fuerza acusatoria del pasaje.
  doctrine_reference: Retórica profética; apelación directa
translation_notes:
  revision_awareness: 'Se revisó el estado de corrección más reciente del expediente: se rechazó la lectura anterior ‘fin’ y se adoptó la lectura textual corregida ‘ley’. También se siguió la corrección del catálogo moral: ‘intemperancias’, ‘pasiones vacías’ y ‘placeres temporales’. Se mantuvo la fuerza imperativa y el cambio abrupto de destinatario.'
  spanish_consistency_notes:
  - Se evitó ‘SEÑOR’ porque no aparece aquí el Tetragrámaton ni una cita explícita que requiera esa convención.
  - Se conservó ‘ley’ según la revisión textual, en vez de reintroducir ‘fin’.
  - ‘Intemperancias’ y ‘pasiones vacías’ reflejan el registro ascético-moral del pasaje sin suavizarlo.
  - La puntuación con raya e imperativo separado busca reproducir la brusquedad retórica del original.
