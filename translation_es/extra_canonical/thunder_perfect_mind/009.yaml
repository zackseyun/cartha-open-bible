translation:
  language: es
  text: Yo soy la esposa y la virgen[a][b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ⲥϩⲓⲙⲉ puede significar “mujer” o “esposa”. Dado el contraste con ⲡⲁⲣⲑⲉⲛⲟⲥ (“virgen”), se prefiere “esposa” para conservar la paradoja; “mujer” sigue siendo una posibilidad legítima.
    reason: lexical_alternative
  - marker: b
    text: ⲡⲁⲣⲑⲉⲛⲟⲥ es un préstamo griego que normalmente se traduce “virgen”; “doncella” sería una alternativa de tono más poético.
    reason: lexical_alternative
  - marker: c
    text: La palabra ⲡⲁⲣⲑⲉⲛⲟⲥ está partida en el salto de línea OCR (ⲡⲁⲣ | ⲑⲉⲛⲟⲥ), lo que reduce un poco la seguridad de alineación para los límites exactos de este segmento.
    reason: textual_variant
