translation:
  language: es
  text: Miren, entonces, sus palabras; vuelvan la mirada[a] hacia todos los escritos[b] que han sido completados[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘Vuelvan la mirada’ conserva la imagen direccional de ‘turn toward’; también podría verterse ‘vuelvan hacia’ o ‘dirijan la atención a’.
    reason: lexical_alternative
  - marker: b
    text: ‘Escritos’ traduce de manera prudente el término incierto del original; según el caso, también podría entenderse ‘libros’ o ‘rollos’.
    reason: lexical_alternative
  - marker: c
    text: El término subyacente puede significar ‘completos’, ‘terminados’ o incluso, por extensión, ‘perfectos’. Aquí ‘han sido completados’ evita sugerir perfección moral.
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲟⲩⲉⲓϣ
  english_pob_choice: Look
  chosen_spanish: Miren
  alternatives_spanish:
  - Vean
  - Miren ustedes
  lexicon: Crum; imperativo de atención en sahídico
  rationale: Conserva el tono imperativo de atención sin arcaísmo excesivo; en español, ‘Miren’ suena natural y exhortativo.
- source_word: ⲉⲧⲛⲁϩⲧⲉ
  english_pob_choice: then
  chosen_spanish: entonces
  alternatives_spanish:
  - luego
  - después
  lexicon: partícula adverbial contextual
  rationale: ‘Entonces’ preserva la continuidad discursiva sugerida por el audit trail inglés y funciona bien en español.
- source_word: ⲡⲱⲧ ⲉϩⲣⲁⲓ
  english_pob_choice: turn toward
  chosen_spanish: vuelvan la mirada hacia
  alternatives_spanish:
  - vuelvan hacia
  - dirijan la atención a
  lexicon: Crum; movimiento/orientación hacia un objeto
  rationale: ‘Vuelvan la mirada hacia’ mantiene la metáfora direccional y expresa atención visual, que encaja con el sentido del imperativo.
- source_word: ⲡⲟⲩⲕⲏⲛⲏ
  english_pob_choice: writings
  chosen_spanish: escritos
  alternatives_spanish:
  - obras escritas
  - libros
  lexicon: campo semántico de loanword incierto; probable referencia a escritos
  rationale: ‘Escritos’ es el equivalente español más amplio y prudente frente a la incertidumbre del préstamo subyacente, sin forzar ‘libros’ o ‘rollos’.
- source_word: ⲧⲉⲗⲓⲟⲛ
  english_pob_choice: have been completed
  chosen_spanish: han sido completados
  alternatives_spanish:
  - están completos
  - han sido terminados
  lexicon: τέλειον/τέλειος; completitud consumada
  rationale: ‘Han sido completados’ refleja estado resultante de завершamiento y evita el matiz moral de ‘perfectos’.
theological_decisions:
- issue: No hay afirmaciones teológicas explícitas en este segmento; el punto sensible es el alcance de la exhortación y el sentido de ‘completados’
  english_pob_reading: Look, then, at his words; turn toward all the writings that have been completed.
  chosen_spanish_reading: Miren, entonces, sus palabras; vuelvan la mirada hacia todos los escritos que han sido completados.
  alternative_spanish_readings:
  - Miren, entonces, sus palabras; vuelvan hacia todos los escritos que están completos.
  - Vean, entonces, sus palabras; dirijan la atención a todos los escritos terminados.
  rationale: Se preserva la neutralidad semántica de ‘completed’ sin introducir perfección moral ni una lectura doctrinal adicional. El segmento funciona como exhortación a atender textos escritos, no como una proposición dogmática.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El audio de revisión señala que una versión previa era una alucinación por desalineación. Esta redacción se ajusta al texto coptó disponible y evita importar la lectura errónea de ‘Look, then…’.
  spanish_consistency_notes:
  - Se evita ‘perfectos’ para no cargar ‘completados’ con un valor moral no garantizado por el contexto.
  - Se mantiene una sintaxis natural en español, pero con correspondencia estrecha al valor exhortativo y direccional del original.
  - No se incluyen notas sin anclaje; los marcadores [a] y [b] aparecen exactamente en el texto principal.
