translation:
  language: es
  text: y a la que desprecian con escarnio[a]. Yo soy paz[b], y por causa de mí ha llegado a ser guerra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La cláusula relativa refleja el segmento cóptico omitido en un borrador previo; 'con escarnio' intenta conservar el matiz de desprecio público o burlón.
    reason: source_note
  - marker: b
    text: '''Yo soy paz'' sigue el texto revisado sin la adversativa inicial; otras posibilidades como ''reposo'' o ''la paz'' son menos directas o más marcadas en español.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲧⲉⲧⲟⲩⲕⲁⲧⲁⲫⲣⲟⲛⲓ / ⲙⲙⲟⲥ ϩⲛ ⲟⲩϣⲱⲥ
  english_pob_choice: the one they despise in scorn
  chosen_spanish: a la que desprecian con escarnio
  alternatives_spanish:
  - a la que desprecian en escarnio
  - a la que desprecian con desprecio
  lexicon: Coptic relative clause + prepositional phrase; the noun phrase carries a feminine referent and the sense of contempt/scorn.
  rationale: El español necesita una cláusula relativa clara para conservar el referente femenino y el matiz de desprecio intensificado por ϩⲛ ⲟⲩϣⲱⲥ. 'Con escarnio' preserva el tono injurioso mejor que una simple repetición de 'desprecio'.
- source_word: ⲁⲛⲟⲕ
  english_pob_choice: I am
  chosen_spanish: Yo soy
  alternatives_spanish:
  - Soy
  - Yo
  lexicon: Coptic deictic first-person pronoun used in self-identification formula.
  rationale: '''Yo soy'' conserva la fórmula de autoidentificación solemne del texto y su ritmo poético en español.'
- source_word: ϯⲣⲏⲛⲏ
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - la paz
  - reposo
  lexicon: Loan from Greek εἰρήνη in Coptic, standard sense 'peace'.
  rationale: '''Paz'' es la equivalencia directa y natural en español. Se evita ''reposo'' porque debilita el contraste con ''guerra'' y no es el sentido principal aquí.'
- source_word: ϣⲱⲡⲉ
  english_pob_choice: has come to be
  chosen_spanish: ha llegado a ser
  alternatives_spanish:
  - ha surgido
  - ha acontecido
  - ha venido a ser
  lexicon: Coptic verb 'to become, happen, come to be'.
  rationale: '''Ha llegado a ser'' mantiene el valor de devenir/venir a existir sin reducirlo a un mero evento puntual.'
- source_word: ⲉⲧⲃⲏⲏⲧ
  english_pob_choice: because of
  chosen_spanish: por causa de
  alternatives_spanish:
  - a causa de
  - debido a
  - por
  lexicon: Preposition meaning 'for the sake of, because of'.
  rationale: '''Por causa de'' hace explícita la causalidad del griego/cóptico y suena natural en un registro sobrio y litérario.'
- source_word: ⲡⲡⲟⲗⲉⲙⲟⲥ
  english_pob_choice: war
  chosen_spanish: guerra
  alternatives_spanish:
  - guerra
  - combate
  - batalla
  lexicon: Loan from Greek πόλεμος (polemos).
  rationale: '''Guerra'' es la traducción más directa y transparente; mantiene el paralelismo antitético con ''paz''.'
theological_decisions:
- issue: No añadir una adversativa al inicio
  english_pob_reading: The revised English audit trail removed 'But' because the Coptic opening conjunction does not require adversative force here.
  chosen_spanish_reading: Se omite cualquier 'pero' o 'mas' inicial.
  alternative_spanish_readings:
  - Pero yo soy paz
  - Y yo soy paz
  rationale: La revisión auditada indica que no hay base suficiente para una adversativa inicial. El español sigue esa cautela para no introducir una relación lógica no atestiguada.
  doctrine_reference: Principio de transparencia textual y fidelidad al audit trail; no expansión interpretativa sin soporte en la fuente.
translation_notes:
  revision_awareness: La versión inglesa auditada fue corregida para restaurar la cláusula 'the one they despise in scorn' y para eliminar el 'But' inicial no sustentado por el cóptico. Esta traducción española sigue esa revisión y evita tanto la omisión como la adversativa añadida.
  spanish_consistency_notes:
  - Se mantiene el registro poético y sobrio, con sintaxis simple y clara.
  - '''Paz'' y ''guerra'' se conservan como antítesis directas para preservar el paralelismo.'
  - No se emplea 'SEÑOR' ni terminología eclesiástica ajena al pasaje.
  - 'Los marcadores de nota aparecen exactamente en el texto: [a] y [b].'
