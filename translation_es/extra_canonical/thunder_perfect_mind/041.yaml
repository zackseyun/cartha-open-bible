translation:
  language: es
  text: 'Yo soy la que se encuentra en los que tienen miedo,

    y soy fuerza en el temblor.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ϯⲛⲁⲕⲣⲣⲱ
  english_pob_choice: is found
  chosen_spanish: se encuentra
  alternatives_spanish:
  - es hallada
  - se halla
  lexicon: 'Crum (krrō: be found/meet); uso poético de verbo pronominal en español'
  rationale: ‘Se encuentra’ comunica el valor resultativo y gnómico sin forzar un futuro literal; mantiene la cadencia de autoafirmación del texto y evita un calco pesado.
- source_word: ⲛⲉⲧⲛϣⲟϫⲛⲉ
  english_pob_choice: those who are afraid
  chosen_spanish: los que tienen miedo
  alternatives_spanish:
  - los temerosos
  - los que temen
  lexicon: Crum (ϣⲟϫⲛⲉ ‘fear; be afraid’); relativa plural sustantivada
  rationale: La morfología apunta a personas, no a un sustantivo abstracto; ‘los que tienen miedo’ conserva ese valor y suena natural en español. Se evita ‘temerosos’ por su matiz más fijo y adjetival.
- source_word: ⲕⲗⲏϣ
  english_pob_choice: trembling
  chosen_spanish: temblor
  alternatives_spanish:
  - tembloroso
  - tremblor
  lexicon: Crum (ⲕⲗⲏϣ ‘tremble, trembling’)
  rationale: ‘Temblor’ mantiene el sustantivo abstracto del original y preserva el contraste poético ‘fuerza en temblor’. En español, ‘en el temblor’ resulta más idiomático que ‘en temblando’ o una forma adjetival.
- source_word: ⲟⲩϩⲟⲟⲩ (expected)
  english_pob_choice: strength
  chosen_spanish: fuerza
  alternatives_spanish:
  - poder
  - vigor
  lexicon: Crum (ϩⲟⲟⲩ ‘strength, vigor’)
  rationale: ‘Fuerza’ es la equivalencia más directa y clara para el slot esperado por el testimonio paralelo; conserva el sentido de potencia firme sin introducir matices doctrinales ajenos.
- source_word: ⲁⲛⲟⲕ
  english_pob_choice: I am
  chosen_spanish: Yo soy
  alternatives_spanish:
  - Soy
  - Yo
  lexicon: Standard Sahidic pronoun
  rationale: Se conserva la anáfora explícita del original. ‘Yo soy’ suena más natural y enfático en español que una simple ‘Soy’ en este contexto poético.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente que eliminó notas editoriales del borrador inglés y dejó una traducción limpia; por eso el español también se presenta sin notas y con formulación fluida.
  spanish_consistency_notes:
  - Se mantiene el sujeto explícito ‘Yo’ para reproducir la anáfora del texto fuente.
  - Se usa lenguaje de género femenino (‘la que’) conforme a la voz establecida en Thunder, sin añadir explicación en el cuerpo del texto.
  - No se introduce ‘en todos los miedos’ ni otras lecturas abstractas, porque la morfología favorece una referencia a personas.
  - Se evita ‘Cristo’, ‘Señor’ o terminología bíblica ajena; este segmento no la requiere.
