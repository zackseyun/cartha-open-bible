  lexicon: Crum; valor nominal de ⲥⲱⲧⲙ
  rationale: En el fragmento conservado el sustantivo apunta al acto/facultad de oír. «Audición» mantiene el campo acústico de manera natural en español y evita desplazar el sentido hacia obediencia o interpretación.
- source_word: ⲁⲡⲟⲗⲟⲅⲓⲁ
  english_pob_choice: defense
  chosen_spanish: defensa
  alternatives_spanish:
  - respuesta
  - discurso
  - réplica
  lexicon: Loanword griego ἀπολογία; Crum s.v. préstamos
  rationale: El testimonio inglés revisado conserva «my defense» en la reconstrucción del pasaje fragmentario. «Defensa» es el equivalente español más directo y mantiene el tono jurídico/apologético del término, sin forzar una paráfrasis.
- source_word: ⲡϫⲓⲛϭⲟⲛⲥ
  english_pob_choice: injustice
  chosen_spanish: injusticia
  alternatives_spanish:
  - violencia
  - opresión
  - agravio
  lexicon: Crum s.v. ϭⲟⲛⲥ; nominalización con ⲫ/ⲡϫⲓⲛ-
  rationale: La revisión indica que este segmento debe reflejar el texto coptológico real y fragmentario, donde el lexema pertenece al campo de injusticia/violencia, no a ‘grasped’. «Injusticia» es la opción más estable y clara en español bíblico contemporáneo.
translation_notes:
  revision_awareness: 'La versión inglesa previa fue corregida por una desalineación grave: el texto consultado no correspondía a este segmento fragmentario de Thunder 20:4-8. Por ello, la redacción española evita reconstrucciones no sustentadas y conserva solo los miembros legibles del fragmento, sin importar material de Thunder 19:28-32.'
  spanish_consistency_notes:
  - Se evita introducir palabras no garantizadas por el OCR fragmentario.
  - «Audición» y «defensa» preservan el registro auditable sin añadir contenido inexistente.
  - «Injusticia» sigue la revisión crítica que corrige la mala alineación anterior.
