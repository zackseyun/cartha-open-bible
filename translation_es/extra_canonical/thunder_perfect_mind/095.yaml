  footnotes:
  - marker: a
    text: The OCR’s ⲉⲩϣⲁⲛⲙⲟⲩ[ is likely ⲉⲩϣⲁⲛⲙⲟϣⲧ ‘they are able to reach/attain,’ but could also be ⲉⲩϣⲁⲛⲙⲟⲩⲧⲉ ‘they are able to know’; the translation follows the ‘reach/attain’ reading to pair with the following ‘grasp’ paradox.
    reason: alignment_note
  - marker: b
    text: ⲁⲡⲟⲗⲟⲅⲓⲁ (ἀπολογία) can mean ‘defense’ or ‘reply’; here ‘speech’ is chosen to keep the balanced sound-field with ‘hearing.’
    reason: lexical_alternative
  - marker: c
    text: 'ⲡϫⲓⲛϭⲟⲛⲥ is a nominalized form (‘the taking/strength’). The sense is ‘not subject to seizure’—hence ‘cannot be grasped.’ Alternatives: ‘cannot be seized,’ ‘cannot be comprehended.’'
    reason: lexical_alternative
  - marker: d
    text: Or 'I am the hearing within reach of everyone, and the speech that cannot be grasped.'.
    reason: previous_rendering
