base_translation:
  language: en
  yaml_path: translation/extra_canonical/thunder_perfect_mind/033.yaml
  text: 'Look at me as I come forth among those who are honored[1];

    and in the least places you will find me.

    And do not cast me out among those who are destitute in worthlessness[d][c][b][a][5][4][3][2];

    for I—I am compassionate.'
  footnotes:
  - marker: '1'
    text: ‘In the place of the house’ reads ⲱⲕ as ‘house’ (οἶκος). If ⲱⲕ is ‘hunger/need’, the line would read ‘in the least places—in the place of need—you will see me’.
    reason: lexical_alternative
  - marker: '2'
    text: The verb ⲉⲛⲥⲱⲉⲓ literally means ‘you will see’; many English renderings use ‘find’ for idiomatic sense.
    reason: lexical_alternative
  - marker: '3'
    text: ⲙ̄ⲛ̄ⲧⲁⲭⲣⲏⲥⲧⲏⲣⲟⲥ is a Greek loan (ἀχρήστ-), denoting uselessness or worthlessness.
    reason: cultural_note
  - marker: '4'
    text: ⲟⲩϣⲁⲛϩⲧⲏⲥ is uncertain; possible senses include ‘one to be humbled’, ‘one to be scorned’, or even ‘one to be honored’. The poem elsewhere balances honor/disgrace paradoxes.
    reason: alignment_note
  - marker: '5'
    text: The opening ‘Come to me, you who come forth among those cast down’ reflects the present OCR; some editions front the admonition (‘Do not be arrogant toward me when I am cast down’).
    reason: textual_variant
  - marker: a
    text: Or 'Come to me, you who come forth among those cast down;'.
    reason: previous_rendering
  - marker: b
    text: Or 'and in the least places—in the place of the house—you will see me.'.
    reason: previous_rendering
  - marker: c
    text: Or 'Do not lift yourself up over me among those who trample in worthlessness;'.
    reason: previous_rendering
  - marker: d
    text: Or 'for I—I am one who is to be humbled.'.
    reason: previous_rendering
