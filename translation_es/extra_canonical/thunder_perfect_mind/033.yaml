translation:
  language: es
  text: 'Mírenme cuando salgo entre los honrados[a];


    y en los lugares más bajos[b] me encontrarán.


    Y no me echen fuera entre los desposeídos en medio de la inutilidad[c][d];


    pues yo, yo soy compasiva.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mientras salgo». La forma subraya la acción concomitante de primera persona en el copto.'
    reason: alternative_reading
  - marker: b
    text: 'O: «los lugares más humildes» o «los lugares mínimos». El griego prestado de ‘lo más pequeño’ admite matices de rango o de ubicación.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «la falta de provecho». ⲙ̄ⲛ̄ⲧⲁⲭⲣⲏⲥⲧⲏⲣⲟⲥ expresa la cualidad de no ser útil o aprovechable.'
    reason: lexical_alternative
  - marker: d
    text: 'O: «la carencia de valor» en sentido de desprecio social. La frase conserva la aspereza evaluativa del original.'
    reason: cultural_note
lexical_decisions:
- source_word: ⲉⲣⲟⲓ (ⲉⲣⲟⲉⲓ)
  english_pob_choice: at me / look at me
  chosen_spanish: Mírenme
  alternatives_spanish:
  - Mírenme a mí
  - Miren hacia mí
  lexicon: Layton
  rationale: El audit trail inglés explica que el valor básico es un objeto preposicional con sentido de dirección/atención hacia la hablante. En español, «Mírenme» conserva la fuerza imperativa y el enfoque visual sin añadir un verbo no atestiguado como «mirar» en el coptic de manera excesiva; el contexto del pasaje ya sostiene la idea de atención visual.
- source_word: ⲉⲉⲓⲛⲏⲩ
  english_pob_choice: as I come forth
  chosen_spanish: cuando salgo
  alternatives_spanish:
  - al salir
  - mientras salgo
  lexicon: Layton
  rationale: La revisión aplicada corrige una lectura de segunda persona y establece un valor de primera persona circunstancial. «Cuando salgo» comunica la acción concomitante sin exagerar el aspecto ni introducir un participio forzado en español.
- source_word: ⲛⲉⲧⲧⲁⲉⲓⲏⲩ
  english_pob_choice: those who are honored
  chosen_spanish: los honrados
  alternatives_spanish:
  - los que son honrados
  - los honorables
  lexicon: Uncertain / from ⲧⲁⲉⲓⲟ
  rationale: La revisión establece «those who are honored» y descarta «cast down». En español, «los honrados» preserva el contraste honor/deshonor que estructura el poema y evita una paráfrasis moralizante.
- source_word: ⲛⲧⲉⲧⲛϭⲓⲛⲉ ⲙⲙⲟⲓ (reconstructed behind garbled OCR)
  english_pob_choice: you will find me
  chosen_spanish: me encontrarán
  alternatives_spanish:
  - me hallarán
  - me verán
  lexicon: Layton
  rationale: El audit trail señala que el sentido real es «you will find me», no «you will see me». «Me encontrarán» mantiene el valor idiomático y la correspondencia con la revisión textual, sin perder naturalidad en español.
- source_word: ⲗⲁⲭⲓⲥⲧⲟⲥ ⲧⲟⲡⲟⲥ
  english_pob_choice: the least places
  chosen_spanish: los lugares más bajos
  alternatives_spanish:
  - los lugares mínimos
  - los lugares más humildes
  lexicon: Greek loan (λαχίστ-; τόπος)
  rationale: El griego prestado apunta a una pluralidad de lugares de menor rango o importancia. «Los lugares más bajos» es idiomático en español y conserva la escala social/literal de bajeza espacial sin endurecerla en una sola imagen.
- source_word: ⲙ̄ⲛ̄ⲧⲁⲭⲣⲏⲥⲧⲏⲣⲟⲥ
  english_pob_choice: worthlessness
  chosen_spanish: la inutilidad
  alternatives_spanish:
  - la carencia de valor
  - la inutilidad / la falta de provecho
  lexicon: Greek loan (ἀχρήστ-)
  rationale: El término denota falta de utilidad, no simplemente insulto. «Inutilidad» conserva el núcleo semántico de ἀχρήστ- y suena natural en español contemporáneo, manteniendo la dureza evaluativa del original.
- source_word: ⲉⲃⲟⲗ
  english_pob_choice: cast out
  chosen_spanish: echen fuera
  alternatives_spanish:
  - expulsen
  - arrojen fuera
  lexicon: Layton
  rationale: La construcción con el verbo de expulsión y ἐβολ sostiene una salida forzada. «Echen fuera» reproduce bien el valor verbal y su registro es bíblico pero claro.
- source_word: ⲟⲩϣⲁⲛϩⲧⲏⲥ
  english_pob_choice: compassionate
  chosen_spanish: compasiva
  alternatives_spanish:
  - misericordiosa
  - compasivo/a
  lexicon: Coptic lexicon tradition; uncertain head form
  rationale: La revisión mayoritaria corrige la lectura especulativa y toma el término como «compassionate/merciful». En español, «compasiva» es la opción más directa y digna; el género concuerda con la voz hablante del poema.
theological_decisions:
- issue: 'Auto-descripción final: compasión vs. humillación'
  english_pob_reading: for I—I am compassionate
  chosen_spanish_reading: pues yo, yo soy compasiva
  alternative_spanish_readings:
  - pues yo, yo soy misericordiosa
  - porque yo soy compasiva
  rationale: La revisión textual rechaza la lectura de humillación y fija un rasgo moral/relacional de compasión. Mantener «compasiva» evita borrar la tensión del poema entre honor, humillación y valor, pero no introduce una doctrina ajena.
  doctrine_reference: Carácter divino compasivo; cf. Ex 34:6 en lenguaje bíblico amplio
- issue: Paradoja honor/bajeza en la autodefinición
  english_pob_reading: among those who are honored / in the least places
  chosen_spanish_reading: entre los honrados / en los lugares más bajos
  alternative_spanish_readings:
  - entre los honorados / en los lugares mínimos
  - entre los que son honrados / en los lugares más humildes
  rationale: El poema trabaja con contrastes de exaltación y humillación. La traducción conserva ese par sin resolverlo alegóricamente, respetando la tensión poética del original.
  doctrine_reference: Literary-theological paradox in the hymn's self-presentation
translation_notes:
  revision_awareness: 'Se siguió la revisión textual más reciente que corrige tres errores mayores del borrador previo: (1) la voz es primera persona («as I come forth»), no una invitación en segunda persona; (2) el núcleo final es «compassionate», no «one who is to be humbled»; y (3) la línea media significa «you will find me», no «you will see me» ni una referencia a ‘house’. También se evitó la lectura de ‘trample’ en favor de la destitución/inutilidad indicada por el control de fuentes.'
  spanish_consistency_notes:
  - Se usa «Dios» y terminología cristiana solo cuando el texto lo exige; aquí no aparecen.
  - Se mantiene «compasiva» para la auto-descripción final y no se sustituye por «misericordiosa» en el texto principal, aunque ambas son viables.
  - Se preserva la imagen de honor/bajeza sin nivelarla a una simple exhortación moral.
  - El registro es poético y sobrio, apto para lectura pública, sin depender de calcos innecesarios del inglés.
