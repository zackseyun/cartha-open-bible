base_translation:
  language: en
  yaml_path: translation/extra_canonical/thunder_perfect_mind/018.yaml
  text: '[...] and the one who boasts brings these to me[a]. I am the silence that is incomprehensible, and the thought whose remembrance is great. I am the voice whose sound is manifold[f][e][d][c][b], and the word that is multiple.'
  footnotes:
  - marker: a
    text: ⲉⲗⲗⲱ is likely ἠχώ (‘echo’), mis-OCR’d; the echo/cry pair recurs in Thunder’s sound imagery.
    reason: alignment_note
  - marker: b
    text: ‘His offspring’ for ⲡⲕⲁⲣⲱϥ is tentative; alternatives include ‘his head’ or ‘his fruit.’ Context favors birth imagery.
    reason: lexical_alternative
  - marker: c
    text: ϩⲣⲟⲟⲩ literally ‘day’; idiomatically can denote ‘time.’
    reason: lexical_alternative
  - marker: d
    text: ⲡⲗⲟⲅⲟⲥ is the Greek λόγος; we render ‘Word’ to reflect its elevated register.
    reason: cultural_note
  - marker: e
    text: The phrase ⲉⲧⲉⲛⲁϣⲉ ⲡⲉⲥⲣⲡⲙⲉⲉⲩⲉ is morphologically opaque; ‘shape of my thought’ is a cautious placeholder.
    reason: alignment_note
  - marker: f
    text: Or 'I am the echo and the one who cries out; from him these come forth— I am his offspring, the one brought to birth in time; and my power is from him. I am the shape of my thought; I am the name that is called day by day, and the Word that is mine.'.
    reason: previous_rendering
