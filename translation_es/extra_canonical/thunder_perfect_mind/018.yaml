translation:
  language: es
  text: '[...] y el que se jacta me trae estas cosas. Yo soy el silencio que no se puede comprender, y el pensamiento cuyo recuerdo es grande. Yo soy la voz cuyo sonido es múltiple[a], y la palabra que es múltiple[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘cuyo sonido es múltiple’ traduce el sintagma corregido; también puede entenderse como ‘de sonido variado’.
    reason: lexical_alternative
  - marker: b
    text: ‘palabra’ refleja λόγος/ⲡⲗⲟⲅⲟⲥ; una alternativa posible, más solemne, sería ‘Palabra’.
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲡⲕⲁⲣⲱϥ
  english_pob_choice: the silence that is incomprehensible
  chosen_spanish: el silencio que no se puede comprender
  alternatives_spanish:
  - el silencio incomprensible
  - el silencio que no puede ser alcanzado
  lexicon: Coptic Crum; adjudicated reading in revision note
  rationale: La revisión autoritativa corrige el tramo a ‘silence’. En español, ‘silencio que no se puede comprender’ preserva la tensión semántica sin suavizarla; mantiene la idea de inaccesibilidad/comprehensión fallida.
- source_word: ⲉⲧⲉⲙⲁⲩⲧⲁϩⲟϥ
  english_pob_choice: that is incomprehensible
  chosen_spanish: que no se puede comprender
  alternatives_spanish:
  - incomprensible
  - que no puede ser alcanzado
  lexicon: Coptic Crum; adjudicated reading in revision note
  rationale: Sigo el valor de ‘reach/comprehend’ indicado por la revisión. La perífrasis verbal es más natural en español y conserva el sentido de imposibilidad cognitiva.
- source_word: ⲧⲉⲡⲓⲛⲟⲓ / ⲧⲉⲡⲓⲛⲟⲓⲁ
  english_pob_choice: the thought whose remembrance is great
  chosen_spanish: el pensamiento cuyo recuerdo es grande
  alternatives_spanish:
  - la idea cuyo recuerdo es grande
  - el pensamiento de gran recuerdo
  lexicon: Greek ἐπίνοια loanword; Coptic + audit revision
  rationale: El texto y la revisión apuntan a ‘thought’/ἐπίνοια. ‘Pensamiento’ conserva el préstamo conceptual sin forzar una interpretación filosófica ajena.
- source_word: ⲉⲧⲉⲛⲁϣⲉ ⲡⲉⲥⲣⲡⲙⲉⲉⲩⲉ
  english_pob_choice: whose remembrance is great
  chosen_spanish: cuyo recuerdo es grande
  alternatives_spanish:
  - de memoria grande
  - cuya memoria es grande
  lexicon: Coptic Crum; adjudicated reading in revision note
  rationale: La revisión identifica ⲛⲁϣⲉ como ‘great’ y ⲣ-ⲡ-ⲙⲉⲉⲩⲉ como ‘remember’. ‘Recuerdo’ es claro y fiel en español contemporáneo.
- source_word: ⲧⲉⲥⲙⲏ
  english_pob_choice: the voice whose sound is manifold
  chosen_spanish: la voz
  alternatives_spanish:
  - la voz
  - el sonido
  lexicon: Coptic Crum 340a; revision note
  rationale: La revisión corrige este segmento a ‘voice’. Mantengo ‘voz’ como equivalente directo y ampliamente inteligible.
- source_word: ⲉⲧⲉⲛⲁϣⲱⲥ ϩⲣⲟⲟⲩ
  english_pob_choice: whose sound is manifold
  chosen_spanish: cuyo sonido es múltiple
  alternatives_spanish:
  - cuyo ruido es múltiple
  - cuyo sonido es variado
  lexicon: Coptic Crum; revision note
  rationale: ‘Sound’ y ‘manifold’ quedan bien representados por ‘sonido’ y ‘múltiple’. Evito ‘ruido’ por su matiz demasiado áspero.
- source_word: ⲡⲗⲟⲅⲟⲥ
  english_pob_choice: the Word that is multiple
  chosen_spanish: la palabra que es múltiple
  alternatives_spanish:
  - el Verbo que es múltiple
  - la Palabra que es múltiple
  lexicon: LSJ; Greek λόγος loanword in Coptic
  rationale: La POB inglesa capitaliza ‘Word’ por su resonancia elevada, pero en español ‘Palabra’ puede sonar más natural y mantener el registro alto; aquí, por fidelidad al léxico común del pasaje y para evitar una cristianización innecesaria, prefiero ‘palabra’. La forma ‘múltiple’ conserva la pluralidad del original.
translation_notes:
  revision_awareness: 'He seguido la revisión adjudicada que corrige errores graves del borrador anterior: ⲡⲕⲁⲣⲱϥ no es ‘offspring’ sino ‘silence’; ⲉⲧⲉⲙⲁⲩⲧⲁϩⲟϥ expresa incomprensibilidad; ⲧⲉⲡⲓⲛⲟⲓ/ⲧⲉⲡⲓⲛⲟⲓⲁ remite a ‘thought’; ⲧⲉⲥⲙⲏ es ‘voice’; y ⲉⲧⲉⲛⲁϣⲱⲥ ϩⲣⲟⲟⲩ describe el sonido. La línea final se ha ajustado para que el sentido global siga de cerca el texto coptó y la lectura corregida del audit trail.'
  spanish_consistency_notes:
  - He evitado traducir mecánicamente desde la versión inglesa previa y he priorizado la revisión del coptó en el audit trail.
  - Mantengo ‘pensamiento’, ‘voz’, ‘sonido’ y ‘palabra’ como términos consistentes con el pasaje y con la corrección textual.
  - No se introducen mayúsculas teológicas innecesarias; ‘palabra’ se deja en minúscula por fidelidad al contexto inmediato.
  - Las notas a pie de página están ancladas exactamente en los segmentos marcados [a] y [b].
