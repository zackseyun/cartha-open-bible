    text: ⲧⲱⲱⲛ + ⲉⲃⲟⲗ can mean ‘cast out’ or ‘proclaimed out’; ‘cried out’ was chosen to preserve the audible/voiced motif.
    reason: lexical_alternative
  - marker: '3'
    text: The OCR reads ⲛⲉⲗⲟⲥ; I take this as ⲛⲟⲙⲟⲥ (Greek ‘law’). If this is wrong, the juridical sense would change.
    reason: alignment_note
  - marker: '4'
