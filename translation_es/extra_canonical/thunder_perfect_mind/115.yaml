translation:
  language: es
  text: Yo soy el nombre clamado entre los que están muertos; y yo soy el que está presente—solo y en unidad. El que me juzgue conforme a la ley—
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ⲁⲛⲟⲕ
  english_pob_choice: I am
  chosen_spanish: Yo soy
  alternatives_spanish:
  - Soy
  - Yo estoy
  lexicon: Gramática básica copta de primera persona
  rationale: Conserva la autoidentificación enfática y el ritmo repetitivo del poema sin perder naturalidad en español.
- source_word: '(ⲡⲓ)ⲣⲁⲛ (OCR: ⲡⲓⲛⲁ)'
  english_pob_choice: the name
  chosen_spanish: el nombre
  alternatives_spanish:
  - nombre
  lexicon: Coptic Crum s.v. ⲣⲁⲛ
  rationale: Sigue la decisión auditada de leer una forma probable de 'nombre' pese al OCR. En español, 'el nombre' mantiene la fórmula nominal y el tono solemne.
- source_word: ⲧⲁⲧⲧⲱⲱⲛ ⲉⲃⲟⲗ
  english_pob_choice: cried out
  chosen_spanish: clamado
  alternatives_spanish:
  - gritado
  - proclamado
  lexicon: Verbo copto tⲱⲛ/tⲱⲱⲛ + ⲉⲃⲟⲗ
  rationale: '''Clamado'' conserva la fuerza audible/voceada elegida por el POB en inglés y suena más natural y digno que un calco más duro.'
- source_word: ϩⲛ ⲛⲉⲧⲙⲟⲟⲩⲧ
  english_pob_choice: among those who are dead
  chosen_spanish: entre los que están muertos
  alternatives_spanish:
  - entre los muertos
  - entre los que han muerto
  lexicon: Preposición copta ϩⲛ + relativo plural ⲛⲉⲧ-; ⲙⲟⲟⲩⲧ = muerto
  rationale: '''Entre'' refleja mejor la preposición que ''en'', y ''los que están muertos'' mantiene el valor relacional del participio sin endurecerlo innecesariamente.'
- source_word: ⲭⲉ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - y también
  lexicon: Partícula copta copulativa
  rationale: Mantiene la cadencia coordinativa simple del pasaje.
- source_word: ⲡⲉⲧ ϣⲟⲟⲡ
  english_pob_choice: the one who is present
  chosen_spanish: el que está presente
  alternatives_spanish:
  - el que existe
  - el que aparece
  lexicon: Copto ϣⲟⲟⲡ = estar presente/ser
  rationale: '''Está presente'' preserva la matiz de presencia manifestada que el audit trail destacó, sin reducirlo a mera existencia.'
- source_word: ⲟⲩⲁⲁⲧ
  english_pob_choice: alone
  chosen_spanish: solo
  alternatives_spanish:
  - solitario
  - a solas
  lexicon: Copto ⲟⲩⲁⲁⲧ
  rationale: '''Solo'' es la forma más directa y idiomática para el matiz de estar sin compañía.'
- source_word: 'ⲙⲛⲧⲟⲩⲁⲁⲧ (OCR: ⲙⲛⲧⲁⲓ)'
  english_pob_choice: in unity
  chosen_spanish: en unidad
  alternatives_spanish:
  - en la unidad
  - en la unificación
  lexicon: Copto ⲙⲛⲧ- abstracto + ⲟⲩⲁⲁⲧ
  rationale: '''En unidad'' reproduce la paradoja breve y mantiene la lectura auditada de una abstracción de oneness/unity.'
- source_word: ⲡⲉⲧⲛⲁⲕⲣⲓⲛⲉ ⲙⲙⲟⲓ
  english_pob_choice: the one who will judge me
  chosen_spanish: El que me juzgue
  alternatives_spanish:
  - El que me juzgará
  - quien me juzgará
  lexicon: Préstamo griego κρίνειν en copto; futuro ⲛⲁ-
  rationale: El español permite una relativa futura natural con subjuntivo. Esta solución conserva la proyección futura del juicio sin sonar pesada.
- source_word: 'ϩⲁ ⲡⲓ ⲛⲟⲙⲟⲥ (OCR: ⲛⲉⲗⲟⲥ)'
  english_pob_choice: by the law
  chosen_spanish: conforme a la ley
  alternatives_spanish:
  - por la ley
  - según la ley
  lexicon: Griego νόμος en copto
  rationale: '''Conforme a la ley'' expresa bien el criterio normativo/jurídico del pasaje y evita una interpretación mecánicamente instrumental de ''por''.'
translation_notes:
  revision_awareness: La redacción sigue el texto inglés auditado y su última revisión, pero adapta la sintaxis al español con una forma más natural ('Yo soy...', 'solo y en unidad') y conserva la tensión jurídica final sin añadir material ausente en la fuente.
  spanish_consistency_notes:
  - Se mantiene 'ley' para νόμος y no se sustituye por 'Torá', porque el audit trail inglés trata el término como fórmula jurídica general.
  - Se usa 'unidad' y no 'uno' para reflejar la abstracción nominal propuesta por la auditoría y evitar perder el contraste con 'solo'.
  - Se evita 'SEÑOR' o terminología bíblica convencional no atestiguada en la fuente; el pasaje no contiene un equivalente de YHWH en este segmento.
