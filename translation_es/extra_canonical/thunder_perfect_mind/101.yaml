translation:
  language: es
  text: Libérense.[a] O si se liberan de él, ¿quién podrá apresarlos? Porque su interior es su exterior,[b] y el que forma lo exterior es el que forma lo interior.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sueltense» / «desháganse». El copto aquí favorece una lectura de liberación o desprendimiento, no de ‘llamar’ o ‘escuchar’.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «lo de dentro es lo de fuera». La formulación española conserva el paralelismo interior/exterior del copto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲕⲁ … ⲉⲃⲟⲗ
  english_pob_choice: Release yourselves
  chosen_spanish: Libérense
  alternatives_spanish:
  - Suéltense
  - Libérense ustedes
  - Desháganse
  lexicon: Crum Coptic; ⲕⲁ- con ⲉⲃⲟⲗ
  rationale: El Coptic aquí expresa una liberación/reflexión directa, no un grito; por eso el español debe reflejar el mandato de soltarse o liberarse, con tono imperativo natural.
- source_word: ⲁⲙⲁϩⲧⲉ
  english_pob_choice: seize
  chosen_spanish: apresar
  alternatives_spanish:
  - asir
  - capturar
  - agarrar
  lexicon: Crum Coptic
  rationale: ‘Apresar’ preserva la fuerza física del verbo y suena natural en español bíblico-literario sin suavizar demasiado la imagen de captura.
- source_word: ⲥⲁϩⲟⲩⲛ
  english_pob_choice: inside
  chosen_spanish: interior
  alternatives_spanish:
  - dentro
  - adentro
  - lo de dentro
  lexicon: Crum Coptic, sahooun
  rationale: La revisión confirma que el sentido aquí es espacial (‘inside’), así que ‘interior’ comunica mejor el contraste con ‘exterior’ que un verbo o una idea intelectual como ‘entender’.
- source_word: ⲛϩⲏⲧϥ / external-inner contrast
  english_pob_choice: your inside is your outside
  chosen_spanish: su interior es su exterior
  alternatives_spanish:
  - lo de dentro es lo de fuera
  - su dentro es su fuera
  lexicon: Contexto del pasaje; contraste coptico de interior/exterior
  rationale: En español ‘interior/exterior’ conserva el paralelismo y evita una formulación demasiado coloquial o extraña. Mantiene el sentido de equivalencia entre lo interno y lo externo.
- source_word: ⲡⲉⲧⲣⲡⲗⲁⲥⲥⲉ
  english_pob_choice: the one who fashions
  chosen_spanish: el que forma
  alternatives_spanish:
  - el que modela
  - el que plasma
  - el que moldea
  lexicon: Crum Coptic; verbal formation/shape-making
  rationale: ‘Forma’ reproduce la idea de dar forma, compatible con la imaginería de creación sin introducir una connotación técnica ajena.
theological_decisions:
- issue: Lectura del verso como exhortación a la liberación y no como ‘llamado/escucha’
  english_pob_reading: Release yourselves. Or if you release yourselves from him, who will be able to seize you?
  chosen_spanish_reading: Libérense. O si se liberan de él, ¿quién podrá apresarlos?
  alternative_spanish_readings:
  - Escuchen
  - Oigan
  - Sálganse
  rationale: 'La evidencia coptica y la revisión auditada descartan la lectura de ‘gritar/escuchar’ para este segmento. El español debe seguir la revisión corregida: una exhortación a liberarse, no una fórmula de audición.'
  doctrine_reference: fidelidad textual y control de misalineación
- issue: Paralelismo interior/exterior como afirmación de correspondencia total
  english_pob_reading: For your inside is your outside, and the one who fashions the outside is the one who fashions the inside.
  chosen_spanish_reading: Porque su interior es su exterior, y el que forma lo exterior es el que forma lo interior.
  alternative_spanish_readings:
  - Porque lo de dentro es lo de fuera
  - Porque su dentro es su fuera
  rationale: Se conserva la tensión poética de la equivalencia interior/exterior sin explicitar una interpretación filosófica adicional. ‘Interior/exterior’ es suficientemente claro y mantiene el paralelismo formal.
  doctrine_reference: retórica poética del texto gnóstico
- issue: Tratamiento del sujeto implícito ‘him’
  english_pob_reading: if you release yourselves from him
  chosen_spanish_reading: si se liberan de él
  alternative_spanish_readings:
  - si se liberan de ese
  - si se liberan de éste
  rationale: ‘Él’ es la opción más natural y mantiene la referencia personal sin sobreespecificar el antecedente, respetando la economía del original.
  doctrine_reference: economía referencial del texto
translation_notes:
  revision_awareness: The English POB audit trail shows a major correction from a mistranslated ‘cry out / understand’ reading to the current liberation-and-interiority wording. The Spanish draft follows the corrected reading and preserves the footnoted alternative potential only at the lexical level, not the rejected misreading.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando el texto lo exija; aquí no aparece ningún nombre divino.
  - Se mantiene ‘interior/exterior’ para conservar el contraste formal del copto.
  - Se evita ‘siervo’ porque el pasaje no contiene δοῦλος ni un campo semántico de servidumbre.
  - El imperativo plural de tratamiento neutral en español se expresa con ‘Libérense’, acorde con la exhortación directa del original.
