translation:
  language: es
  text: 'No te preocupes por [a] tus partes echadas fuera [b][c] [...]



    [...] el que [...] establece [...]



    porque yo estoy entre los que


    son pequeños [...]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego prestado en el copto puede entenderse como ‘preocuparse por / ocuparse de’; aquí se traduce con un mandato negativo de desatención.
    reason: lexical_alternative
  - marker: b
    text: ‘echadas fuera’ sigue la advertencia del aparato crítico; no se adopta una lectura de ‘acercarse’ porque la evidencia del fragmento no la sostiene.
    reason: textual_variant
  - marker: c
    text: El tramo es fragmentario y no permite completar con seguridad el referente exacto de ‘partes’.
    reason: source_note
lexical_decisions:
- source_word: ⲙⲡⲣⲙⲉⲗⲉⲧⲁ
  english_pob_choice: Do not care
  chosen_spanish: No te preocupes por
  alternatives_spanish:
  - No te ocupes de
  - No cuides de
  lexicon: Loan from Greek μελετάω / negated imperative ⲙⲡⲣ-
  rationale: La forma negativa pide un mandato de desatención o no preocupación; ‘No te preocupes por’ comunica bien el valor exhortativo sin forzar una paráfrasis.
- source_word: ⲗⲁⲁⲧⲉ ⲉⲃⲟⲗ
  english_pob_choice: parts that are cast out
  chosen_spanish: partes que están arrojadas fuera
  alternatives_spanish:
  - partes echadas fuera
  - las partes expulsadas
  lexicon: Crum; uso sahídico de movimiento/separación con ⲉⲃⲟⲗ
  rationale: Se conserva la idea de separación externa/expulsión, que en español se expresa naturalmente con ‘arrojadas fuera’.
- source_word: ⲧⲱⲃ︤ⲡ︥
  english_pob_choice: establish
  chosen_spanish: establece
  alternatives_spanish:
  - pon en orden
  - afirma
  lexicon: Crum ⲧⲟⲃⲥ ‘set upright, establish’
  rationale: ‘Establece’ mantiene el valor de fijar, asentar o poner firme, y funciona bien como imperativo.
- source_word: ⲥⲉⲥⲱ
  english_pob_choice: they will be lifted up
  chosen_spanish: serán levantados
  alternatives_spanish:
  - serán exaltados
  - se alzarán
  lexicon: OCR ambiguo; posible verbo de alzar/elevar
  rationale: Dado el carácter incierto del tramo final, ‘serán levantados’ conserva la elevación sin decidir más de lo que el texto permite.
- source_word: ⲛⲥⲁⲛⲁⲓ
  english_pob_choice: the small (ones)
  chosen_spanish: los pequeños
  alternatives_spanish:
  - los pequeños (unos)
  - los de condición pequeña
  lexicon: Crum ⲥⲁⲛⲁⲓ ‘small, little’
  rationale: ‘Los pequeños’ es una solución natural y fiel para el colectivo nominal.
- source_word: ⲛⲉⲣⲙⲛ
  english_pob_choice: among
  chosen_spanish: entre
  alternatives_spanish:
  - en medio de
  - entre los
  lexicon: Crum ⲉⲣⲙⲛ ‘among, in the midst of’
  rationale: ‘Entre’ refleja bien la localización relacional del hablante en el grupo de los pequeños.
theological_decisions:
- issue: Rendición del fragmento en estado lacunoso sin reconstruir más de lo sustentado
  english_pob_reading: The translation reflects the actual fragmentary Coptic provided, not a misaligned consult text from a different page.
  chosen_spanish_reading: La traducción mantiene la fragmentariedad y no reconstruye el sentido completo más allá de lo visible.
  alternative_spanish_readings:
  - Reconstrucción más plena del tramo
  - Paráfrasis interpretativa continua
  rationale: En un texto fragmentario, la fidelidad exige conservar lagunas y no completar de forma especulativa. La redacción española respeta esos cortes mediante puntos suspensivos y evita afirmar más de lo que el OCR sostiene.
  doctrine_reference: Principio de suficiencia textual y cautela exegética en pasajes fragmentarios
- issue: Elección de imagen verbal para ⲗⲁⲁⲧⲉ ⲉⲃⲟⲗ
  english_pob_reading: The phrase means parts that are cast out, not 'draw near'.
  chosen_spanish_reading: ‘arrojadas fuera’ conserva la imagen de expulsión/separación.
  alternative_spanish_readings:
  - apartadas
  - expulsadas
  rationale: La imagen de salida o expulsión es más consistente con el aviso del aparato que con una lectura de acercamiento. ‘Arrojadas fuera’ transmite con fuerza esa separación.
  doctrine_reference: Lexicografía contextual y prioridad del original sobre una consult text desalineada
translation_notes:
  revision_awareness: Se siguió la revisión más reciente que corrige una antigua desalineación con otro pasaje de Thunder. El segmento Coptico disponible corresponde a una lectura fragmentaria de advertencia sobre ‘no preocuparse’ y ‘partes arrojadas fuera’, no a ‘acercarse’ ni ‘miembros’. La versión española evita la reconstrucción indebida y preserva la cautela textual.
  spanish_consistency_notes:
  - Se usa un español neutral y reverente, sin calcos innecesarios.
  - Se preservan los puntos suspensivos para reflejar las lagunas del fragmento.
  - No se introducen términos eclesiásticos ajenos al texto como sustitutos interpretativos.
