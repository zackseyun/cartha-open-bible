    son pequeños [...]'
  rationale: 'Se corrige el principal problema formal del borrador: la nota [d] estaba mal anclada y además arrastraba una lectura (‘serán levantados’) que no aparecía en el texto español conservado. También se elimina el femenino injustificado ‘la que’ por una forma neutral más prudente (‘el que […]’ aquí como equivalente no marcado del inglés auditado ‘the one who […]’ en un tramo sumamente lacunoso). Finalmente, se suaviza ‘están arrojadas fuera’ a ‘echadas fuera’ para un español más natural sin perder el sentido de expulsión/separación.'
