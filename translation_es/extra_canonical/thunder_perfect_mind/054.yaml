translation:
  language: es
  text: 'Yo soy aquella de quien ustedes se esconden,[a]


    y ustedes me revelan.


    Pero cuando ustedes se ocultan,


    yo misma apareceré.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: “Se esconden” traduce aquí el verbo copto de ocultarse/esconderse en relación con la hablante; no significa “dispersan” ni “rechazan”. La imagen central es ocultamiento frente a revelación/aparición.
    reason: lexical_alternative
lexical_decisions:
- source_word: ϩⲱⲡ
  english_pob_choice: hide
  chosen_spanish: ocultar
  alternatives_spanish:
  - esconder
  - cubrir
  lexicon: Crum, Coptic Dictionary
  rationale: 'El Coptico aquí expresa una acción dirigida contra la hablante: “ocultar” conserva bien ese sentido y suena natural en español. “Esconder” es posible, pero “ocultar” mantiene mejor el matiz relacional y el paralelismo con “revelar”.'
- source_word: ⲟⲩⲟⲛϩ / ⲟⲩⲟⲛϩⲧ
  english_pob_choice: reveal / appear
  chosen_spanish: revelar / aparecer
  alternatives_spanish:
  - manifestar / manifestarse
  - dar a conocer / hacerse visible
  lexicon: Crum, Coptic Dictionary
  rationale: El par coptico admite tanto “revelar” como el valor de “aparecer” en el movimiento de ocultamiento a manifestación. En español, “revelar” preserva la acción ejercida por los interlocutores y “aparecer” refleja la auto-manifestación de la hablante en la segunda mitad.
- source_word: ⲧⲁ...ⲧⲉⲧⲛϩⲱⲡ ⲉⲣⲟⲉⲓ
  english_pob_choice: I am she from whom you hide
  chosen_spanish: Yo soy la que ustedes ocultan
  alternatives_spanish:
  - Yo soy aquella a quien ustedes ocultan
  - Yo soy la mujer de la que ustedes se esconden
  lexicon: Coptic grammar (relative/direct object construction); Crum, Coptic Dictionary
  rationale: La construcción coptica apunta a la hablante como objeto directo de la acción de ocultar. “La que ustedes ocultan” comunica la relación sin forzar una paráfrasis más larga. Se prefirió “la que” por concordancia natural con la autoidentificación femenina del texto.
- source_word: ⲟⲩⲁⲛ ⲇⲉ ⲉⲧⲉⲧⲛϣⲁⲛϩⲱⲡ ⲙⲙⲱⲧⲛ
  english_pob_choice: But whenever you hide yourselves
  chosen_spanish: Pero cuando ustedes se ocultan
  alternatives_spanish:
  - Pero siempre que se ocultan
  - Pero cada vez que se esconden
  lexicon: Coptic conditional-temporal construction; Crum, Coptic Dictionary
  rationale: La partícula temporal/condicional se traduce de forma natural como “cuando” en español, manteniendo la idea iterativa de la frase. Se añadió “ustedes” para claridad, y “se ocultan” refleja el mismo verbo de la primera línea con voz media reflexiva en español.
- source_word: ⲁⲛⲟⲕ ϩⲱⲱⲧ
  english_pob_choice: I myself
  chosen_spanish: yo misma
  alternatives_spanish:
  - yo misma por mi parte
  - yo misma, precisamente
  lexicon: Coptic emphatic pronoun construction; Spanish idiom
  rationale: La partícula enfática se expresa bien con “yo misma”, que conserva el énfasis sin añadir contenido interpretativo. En español resulta más fluido que un calco literal.
translation_notes:
  revision_awareness: 'Se revisó el error mayor del borrador previo, que seguía una consulta inglesa mal alineada (“scattered/gathered”). La presente redacción se basa en el Coptico del segmento: ocultar / revelar / ocultarse / aparecer, sin incorporar el motivo de reunir o dispersar ajeno a este pasaje.'
  spanish_consistency_notes:
  - Se mantuvo el sujeto femenino (“la que”, “yo misma”) porque el texto y la tradición del discurso en primera persona femenina lo requieren.
  - Se prefirió “ocultar/revelar” para conservar el paralelismo semántico con el Coptico.
  - No se introdujo lenguaje doctrinal ajeno; el registro intenta ser sobrio, poético y transparente al original.
