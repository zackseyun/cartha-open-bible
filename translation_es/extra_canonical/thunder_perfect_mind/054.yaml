  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. Las decisiones 'ocultar', 'revelar' y 'aparecer' son coherentes con el expediente léxico coptico. La excepción necesaria es ajustar la primera cláusula para reflejar mejor la construcción relacional documentada, no un objeto directo.
