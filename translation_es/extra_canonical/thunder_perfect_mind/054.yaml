  rationale: 'Se ajusta la primera línea para reflejar el sentido aprobado en el expediente auditado: los interlocutores se esconden de la hablante, no la ocultan simplemente como objeto directo. ''Aquella de quien ustedes se esconden'' mantiene la autoidentificación femenina, suena natural en español y preserva mejor el paralelismo con ''cuando ustedes se ocultan''. La nota se mantiene y afina para explicar tanto la corrección léxica frente a la lectura antigua desalineada como el valor relacional del verbo en este contexto.'
