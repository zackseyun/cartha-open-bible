translation:
  language: es
  text: Y no me expulses entre los que carecen de inutilidad[a]; porque yo—yo soy misericordioso, y soy duro de corazón[c]. No odies mi obediencia[b][d]; y mi debilidad[e], ámala[f][g][h].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La secuencia copta es difícil. El POB inglés preserva la tensión semántica de un término ligado a ‘inutilidad/valía nula’; en español se ha optado por una traducción muy literal, aunque suene extraña, para no introducir la imagen interpretativa de «dung-heap» que la revisión rechazó.
    reason: lexical_alternative
  - marker: b
    text: 'La revisión textual corrige la lectura previa: aquí no significa «dejar» sino «odiar».'
    reason: textual_variant
  - marker: c
    text: 'Se conserva la antítesis del original coptо: «misericordioso» frente a «duro de corazón».'
    reason: theological_note
  - marker: d
    text: ⲧⲁⲙⲛ̄ⲧⲥⲧⲙⲏⲧ fue revisado como «obediencia», no «humillación».
    reason: textual_variant
  - marker: e
    text: La revisión auditada indica «debilidad» para el último sustantivo, no «autocontrol».
    reason: textual_variant
  - marker: f
    text: 'El verbo es imperativo: «ámala».'
    reason: source_note
  - marker: g
    text: Se evita añadir una preposición como «en» para no forzar una relación sintáctica no apoyada por el tramo conservado.
    reason: spanish_style_note
  - marker: h
    text: La colocación final mantiene el cierre breve y exhortativo del pasaje.
    reason: spanish_style_note
lexical_decisions:
- source_word: ⲙ̄ⲡⲣ̄ⲛⲟⲩϫⲧ ⲉⲃⲟⲗ
  english_pob_choice: do not cast (me) out
  chosen_spanish: no me expulses
  alternatives_spanish:
  - no me arrojes fuera
  - no me saques
  - no me rechaces
  lexicon: Crum; Layton
  rationale: El prohibitivo negativo expresa expulsión; en español, «expulses» conserva mejor la fuerza relacional y judicial que una fórmula más débil como «rechaces».
- source_word: ϩⲛ̄ ⲛⲉⲧ ϣⲁⲁⲧ ϩⲛ̄ ⲟⲩⲙⲛ̄ⲧⲁⲭⲣⲏⲥⲧⲏⲣⲟⲥ
  english_pob_choice: among those who are lacking in worthlessness
  chosen_spanish: entre los que carecen de inutilidad
  alternatives_spanish:
  - entre los que están en la inutilidad
  - entre los que carecen de valor
  - entre los desechados
  lexicon: Crum; Greek cognate ἀχρηστία
  rationale: 'La frase es difícil: el POB inglés preserva la tensión semántica de ἀχρηστία/‘worthlessness’. «Carecen de inutilidad» suena extrañado en español, pero mantiene la literalidad de la construcción y evita imponer la imagen de ‘basurero’ o ‘desgracia’ sin base explícita en este tramo.'
- source_word: ⲟⲩϣⲁⲛϩⲧⲏⲥ
  english_pob_choice: merciful
  chosen_spanish: misericordioso
  alternatives_spanish:
  - compasivo
  - de corazón tierno
  - benigno
  lexicon: Crum
  rationale: «Misericordioso» es el equivalente natural y eclesialmente claro para la disposición de ‘corazón blando’ sin suavizar el contraste retórico.
- source_word: ⲟⲩⲁⲧϩⲏⲧ
  english_pob_choice: hard-hearted
  chosen_spanish: duro de corazón
  alternatives_spanish:
  - sin corazón
  - implacable
  - despiadado
  lexicon: Crum
  rationale: La antítesis con ⲟⲩϣⲁⲛϩⲧⲏⲥ se conserva mejor con la pareja idiomática «misericordioso / duro de corazón».
- source_word: ⲙⲉⲥⲧⲉ
  english_pob_choice: leave
  chosen_spanish: odies
  alternatives_spanish:
  - abandones
  - dejes
  - rechaces
  lexicon: Crum
  rationale: La revisión auditada muestra que el verbo es «odiar», no «dejar»; por eso se traduce literalmente como una prohibición de odio.
- source_word: ⲧⲁⲙⲛ̄ⲧⲥⲧⲙⲏⲧ
  english_pob_choice: my obedience
  chosen_spanish: mi obediencia
  alternatives_spanish:
  - mi escucha
  - mi sumisión
  - mi docilidad
  lexicon: Crum; source review
  rationale: La revisión indica que el sustantivo nombra obediencia, no humillación. «Mi obediencia» preserva el paralelismo ético con el mandato de no odiarla.
- source_word: ⲧⲁⲉⲅⲕⲣⲁⲧⲉⲓⲁ
  english_pob_choice: my self-control
  chosen_spanish: mi debilidad
  alternatives_spanish:
  - mi dominio propio
  - mi continencia
  - mi autocontrol
  lexicon: Greek loan ἐγκράτεια; source review
  rationale: 'Aunque el compuesto griego normalmente significa ‘dominio propio’, la revisión auditada corrige la lectura del tramo final: aquí el contexto requiere «mi debilidad», no «autocontrol». Se mantiene la tensión con el imperativo «ámala».'
- source_word: ⲙⲉⲣⲓⲧⲥ
  english_pob_choice: love it
  chosen_spanish: ámala
  alternatives_spanish:
  - quiérela
  - ámalo
  - tenla por amor
  lexicon: Crum
  rationale: Imperativo de amar; en español el objeto femenino concuerda con «mi debilidad».
- source_word: ⲙⲛ̄ⲧϭⲱⲃ
  english_pob_choice: my weakness
  chosen_spanish: mi debilidad
  alternatives_spanish:
  - mi fragilidad
  - mi flaqueza
  - mi pobreza
  lexicon: Crum
  rationale: La revisión establece «weakness»; «debilidad» es el equivalente más claro y sobrio en español.
theological_decisions:
- issue: 'Paradoja ética: misericordioso y duro de corazón'
  english_pob_reading: I—I am merciful, and I am hard-hearted.
  chosen_spanish_reading: yo—yo soy misericordioso, y soy duro de corazón.
  alternative_spanish_readings:
  - yo—yo soy compasivo, y soy implacable.
  - yo—yo soy tierno de corazón, y soy duro de corazón.
  rationale: Se conserva el contraste deliberadamente paradójico sin armonizarlo. «Misericordioso / duro de corazón» mantiene la tensión moral que el texto subraya.
  doctrine_reference: Poética sapiencial/gnóstica del contraste retórico; no se resuelve dogmáticamente.
- issue: Relación entre obediencia y rechazo
  english_pob_reading: Do not hate my obedience
  chosen_spanish_reading: No odies mi obediencia.
  alternative_spanish_readings:
  - No rechaces mi obediencia.
  - No aborrezcas mi obediencia.
  rationale: La revisión textual corrige el verbo a «odiar». La traducción conserva el imperativo negativo directo y el valor ético de la obediencia como rasgo digno de amor, no de desprecio.
  doctrine_reference: Ética de obediencia como virtud; sin implicación doctrinal cristológica obligatoria.
- issue: 'Sentido de la última línea: debilidad amada'
  english_pob_reading: and my self-control, love it in my weakness.
  chosen_spanish_reading: y mi debilidad, ámala.
  alternative_spanish_readings:
  - y mi debilidad, ámala en mi fragilidad.
  - y mi debilidad, ámala allí.
  rationale: La evidencia revisada no apoya «autocontrol»; por eso se adopta «debilidad». El imperativo final queda breve para no introducir relaciones sintácticas no atestiguadas.
  doctrine_reference: Tensión retórica de poder/debilidad; no se doctrinaliza más allá del texto.
translation_notes:
  revision_awareness: 'He seguido la revisión adjudicada como fuente principal para los tres puntos corregidos por error de alineación: no hay referencia a ver ni a un «dung-heap»; el segundo miembro trata de «obediencia»; y el cierre final lee «debilidad» con un imperativo de amor. La traducción española evita reinstalar las lecturas descartadas por el control de calidad.'
  spanish_consistency_notes:
  - Se usó un registro bíblico sobrio y contemporáneo.
  - Se evitó 'Señor'/'Cristo' porque no aparecen en el tramo fuente.
  - Se mantuvo la paradoja retórica sin suavizarla.
  - Las notas distinguen variantes textuales de simples alternativas estilísticas.
