base_translation:
  language: en
  yaml_path: translation/extra_canonical/thunder_perfect_mind/034.yaml
  text: And do not cast me out among those who are lacking in worthlessness[a]; for I—I am merciful, and I am hard‑hearted. Do not hate my obedience; and my self-control[h][g][f][e][d][c][b], love it in my weakness.
  footnotes:
  - marker: a
    text: The underlying noun likely means ‘worthlessness/uselessness’; ‘dung‑heap’ concretizes the image and is traditional in Thunder renderings, but ‘in disgrace’ is a plausible alternative.
    reason: lexical_alternative
  - marker: b
    text: ⲛⲟⲩϫⲧ ⲉⲃⲟⲗ expresses expulsion; the direct object ‘me’ is implied by context, not explicit in this excerpt.
    reason: alignment_note
  - marker: c
    text: 'ⲟⲩϣⲁⲛϩⲧⲏⲥ vs. ⲟⲩⲁⲧϩⲏⲧ: literally ‘soft‑hearted’ vs ‘hard‑hearted/without heart’; rendered as ‘merciful … hard‑hearted’ to preserve the ethical paradox.'
    reason: lexical_alternative
  - marker: d
    text: ⲧⲁⲙⲛ̄ⲧⲥⲧⲙⲏⲧ could be ‘my humiliation,’ ‘my disgrace,’ or ‘my state of contempt’; chosen ‘humiliation’ for readability.
    reason: lexical_alternative
  - marker: e
    text: ⲧⲁⲙⲛ̄ⲧϭⲱⲃ may be read as a collective singular ‘my kingdom’ or as plural ‘my kingdoms’; plural retained here to echo the poem’s expansiveness.
    reason: lexical_alternative
  - marker: f
    text: Or 'And when you see me on the dung‑heap, do not cast me out;'.
    reason: previous_rendering
  - marker: g
    text: Or 'Do not leave my humiliation;'.
    reason: previous_rendering
  - marker: h
    text: Or 'and my self‑control you will find in my kingdoms.'.
    reason: previous_rendering
