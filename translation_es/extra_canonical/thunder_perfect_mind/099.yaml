translation:
  language: es
  text: Estoy entre ustedes, ustedes que [...] salen de [...]. ¿Quién será el que los suelte? O, si los suelta de ello, ¿quién podrá [...]?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ϣⲟⲟⲡ ⲛⲧⲏⲏⲧⲉ
  english_pob_choice: I am among you
  chosen_spanish: Estoy entre ustedes
  alternatives_spanish:
  - Estoy en medio de ustedes
  - Estoy con ustedes
  lexicon: Crum; uso pronominal y locativo en copto sahídico
  rationale: La construcción expresa presencia entre el grupo; en español 'entre ustedes' comunica de forma natural la ubicación relacional sin añadir énfasis ajeno al fragmento.
- source_word: ⲉⲧⲉⲧⲛ[...] ⲧⲏⲛⲉ ⲉⲃⲟⲗ
  english_pob_choice: you who [...] yourselves out
  chosen_spanish: ustedes que [...] se sacan fuera
  alternatives_spanish:
  - ustedes que [...] se apartan
  - ustedes que [...] salen fuera
  lexicon: Crum; valor verbal fragmentario con sujeto de 2ª plural
  rationale: Sigo la revisión que identifica ⲧⲏⲛⲉ como 'ustedes' y ⲉⲃⲟⲗ como 'fuera'. 'Se sacan fuera' conserva la direccionalidad del verbo sin afirmar más de lo que el fragmento permite.
- source_word: ⲕⲁ ... ⲉⲃⲟⲗ
  english_pob_choice: release
  chosen_spanish: soltará
  alternatives_spanish:
  - liberará
  - dejará ir
  lexicon: Crum; verbo de soltar/releasar con particula adverbial
  rationale: En español 'soltar' transmite bien la acción de liberar con un objeto pronominal implícito y evita sobreteologizar el verbo.
- source_word: ⲛϩⲏⲧϥ
  english_pob_choice: from it
  chosen_spanish: de ello
  alternatives_spanish:
  - dentro de ello
  - de eso
  lexicon: Crum; sufijo pronominal 3ms
  rationale: '''De ello'' mantiene la referencia indeterminada del antecedente fragmentario y no fuerza una lectura específica como ''dentro de él''.'
theological_decisions:
- issue: Referencia ambigua del antecedente de 'it'
  english_pob_reading: '''from it'' could refer to the mill or the bread; the English POB chose a paradoxical reading in its earlier audit trail but the revision discarded the hallucinated bread/mill line.'
  chosen_spanish_reading: '''de ello'' mantiene la ambigüedad del antecedente fragmentario'
  alternative_spanish_readings:
  - de la muela
  - del molino
  - de la masa
  rationale: Como el testimonio revisado muestra que la lectura segura es fragmentaria y no autoriza 'pan' o 'molino' como texto corrido, el español conserva la indeterminación. Esto evita introducir una concreción no sustentada por el copto preservado.
  doctrine_reference: Principio de fidelidad textual y retención de ambigüedad en pasajes fragmentarios
translation_notes:
  revision_awareness: 'Se incorporó la revisión crítica que corrige la hallucinated bread/mill reading: ⲧⲏⲛⲉ es ''ustedes'', ⲕⲁ ... ⲉⲃⲟⲗ es ''soltar/liberar'', y el pasaje debe mantenerse como un fragmento con lagunas y antecedente incierto. Por eso no se añaden notas ancladas que obliguen a una lectura textual no asegurada.'
  spanish_consistency_notes:
  - Se evita 'SEÑOR' y cualquier terminología doctrinal no presente en el fragmento.
  - Se preserva el tono en segunda persona plural con 'ustedes'.
  - Se mantiene la puntuación interrogativa en español para reflejar la secuencia del original fragmentario.
  - No se usan notas al pie porque no hay una alternativa segura que requiera anclaje textual adicional.
