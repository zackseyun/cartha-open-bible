translation:
  language: es
  text: 'Soy la hija y la mujer[a].


    Soy la madre de mi padre


    y la hija de mi esposo[d][c][b],


    y él es mi hijo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ⲥϩⲓⲙⲉ también puede significar ‘esposa’; se elige ‘mujer’ para conservar el rango semántico amplio y el contraste tajante con ‘hija’.
    reason: lexical_alternative
  - marker: b
    text: En este pasaje algunas ediciones/lecturas tienen ‘hermana de mi esposo’ (ⲥⲛⲁⲓ ⲙⲡⲁϩⲁⲓ) en lugar de ‘hija de mi esposo’. El OCR aquí lee ⲧⲥⲱⲛⲉ (‘hija’), pero existe posible confusión de formas de letra.
    reason: textual_variant
  - marker: c
    text: 'La tradición habitual de Thunder en este punto continúa: ‘y él es mi hijo’. Si la palabra dañada fuera realmente ⲡⲁϫⲟⲉⲓⲥ, la línea diría: ‘y él es mi Señor’.'
    reason: alternative_reading
  - marker: d
    text: 'Un medio verso siguiente, incompleto, comienza: ‘Soy la humillación de mi …’ (ⲁⲛⲟⲕ ⲧⲉ ⲧϩⲙϩⲁⲗ ⲛⲧⲉ ⲡⲁ—). No se traduce aquí para evitar conjeturas.'
    reason: alignment_note
lexical_decisions:
- source_word: ⲥⲱⲛⲉ
  english_pob_choice: daughter
  chosen_spanish: hija
  alternatives_spanish:
  - muchacha
  - niña
  lexicon: Crum; Layton
  rationale: En contexto de parentesco, el sentido básico es ‘hija’. Conserva el paralelismo con ‘mujer’ y el carácter paradójico de la frase.
- source_word: ⲥϩⲓⲙⲉ
  english_pob_choice: woman
  chosen_spanish: mujer
  alternatives_spanish:
  - esposa
  lexicon: Crum; Layton
  rationale: ‘Mujer’ preserva el rango semántico amplio del copto y evita restringir prematuramente el término a ‘esposa’, aunque esa lectura siga siendo posible.
- source_word: ⲙⲁⲁⲩ
  english_pob_choice: mother
  chosen_spanish: madre
  alternatives_spanish:
  - mamá
  lexicon: Crum; Layton
  rationale: Término de parentesco directo y no ambiguo; ‘madre’ reproduce la fuerza del enunciado.
- source_word: ⲉⲓⲱⲧ
  english_pob_choice: father
  chosen_spanish: padre
  alternatives_spanish:
  - papá
  lexicon: Crum; Layton
  rationale: Es el equivalente normal y fiel para el término de parentesco básico.
- source_word: ϩⲁⲓ (as ⲡⲁϩⲁⲓ across a line break)
  english_pob_choice: husband
  chosen_spanish: esposo
  alternatives_spanish:
  - marido
  lexicon: Crum; Layton
  rationale: ‘Esposo’ conserva el vínculo conyugal en español neutral y corresponde al valor habitual de ⲡϩⲁⲓ en este contexto.
- source_word: ⲛⲧⲟϥ ⲡⲉ ⲡⲁϫⲡⲟ (OCR-uncertain)
  english_pob_choice: he is my offspring
  chosen_spanish: él es mi descendencia
  alternatives_spanish:
  - él es mi progenie
  - él es mi hijo
  lexicon: Contextual; compare published NHC VI,2 editions
  rationale: ‘Descendencia’ mantiene la relación genealógica y permite cierta amplitud semántica, sin forzar una especificación más estrecha que el testimonio textual incierto. En español suena más natural que un calco literal y conserva el efecto paradójico.
- source_word: ϩⲙϩⲁⲗ (not translated in main line due to fragment)
  english_pob_choice: humiliation
  chosen_spanish: humillación
  alternatives_spanish:
  - humildad
  - vergüenza
  - degradación
  lexicon: Crum; Layton
  rationale: 'Aunque el fragmento no se traduce en la línea principal, conviene fijar el campo léxico: ϩⲙϩⲁⲗ apunta a humillación/vergüenza o debilidad, y ‘humillación’ es la opción más cercana y neutral en español.'
translation_notes:
  revision_awareness: Se siguió el estado revisado más reciente del expediente inglés, que no introdujo cambios adicionales; se mantuvo la lectura principal ‘daughter/woman’ y la cláusula ‘he is my offspring’ como opción más probable, señalando la incertidumbre textual en nota.
  spanish_consistency_notes:
  - Se mantuvo ‘hija/mujer/madre/padre/esposo’ para preservar la cadena genealógica paradójica del pasaje.
  - Se evitó ‘Cristo’, ‘Señor’ u otras equivalencias doctrinales no presentes en este fragmento.
  - ‘Descendencia’ se usó como equivalente natural de ‘offspring’ sin perder el matiz genealógico.
  - Las notas marcan las variantes textuales sin convertirlas en parte del texto principal.
