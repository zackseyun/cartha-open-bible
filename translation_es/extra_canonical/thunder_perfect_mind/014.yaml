  text: 'I am the daughter and the woman[a].

    I am the mother of my father

    and the daughter of my husband[d][c][b],

    and he is my offspring.'
  footnotes:
  - marker: a
    text: ⲥϩⲓⲙⲉ can also mean ‘wife’; ‘woman’ is chosen to keep the wider semantic range and the poem’s stark pairing with ‘daughter.’
    reason: lexical_alternative
  - marker: b
    text: Some editions/readings at this locus have ‘sister of my husband’ (ⲥⲛⲁⲓ ⲙⲡⲁϩⲁⲓ) rather than ‘daughter of my husband.’ The OCR here reads ⲧⲥⲱⲛⲉ (daughter), but letter-shape confusion is possible.
    reason: textual_variant
  - marker: c
    text: The phrase ‘and he is my offspring’ follows the common Thunder tradition here; if the damaged word is actually ⲡⲁϫⲟⲉⲓⲥ, the line would read ‘and he is my lord.’
    reason: alternative_reading
  - marker: d
    text: An incomplete following half-line begins ‘I am the humiliation of my …’ (ⲁⲛⲟⲕ ⲧⲉ ⲧϩⲙϩⲁⲗ ⲛⲧⲉ ⲡⲁ—). It is not translated here to avoid conjecture.
    reason: alignment_note
