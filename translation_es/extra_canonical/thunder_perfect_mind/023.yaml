translation:
  language: es
  text: 'Los que mienten acerca de mí dicen la verdad acerca de mí.[a]


    Los que me conocen, que me ignoren,


    y los que no me han conocido, que me conozcan.


    Porque yo soy conocimiento e ignorancia.


    Yo soy—'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La primera cláusula sigue la lectura corregida del pasaje, donde el OCR estaba muy corrupto; el sentido recuperado es antitético: ''los que mienten acerca de mí / dicen la verdad acerca de mí''.'
    reason: source_note
lexical_decisions:
- source_word: ⲛⲉⲧϫⲓϭⲟⲗ ... ϫⲱ ⲛⲧⲙⲉ ...
  english_pob_choice: Those who lie about me tell the truth about me.
  chosen_spanish: Los que mienten acerca de mí dicen la verdad acerca de mí.
  alternatives_spanish:
  - Los que falsamente me acusan dicen la verdad acerca de mí.
  - Los que hablan mentira sobre mí dicen la verdad acerca de mí.
  lexicon: Coptic (Sahidic) standard lexica; OCR-based adjudicated reading
  rationale: La lectura corregida del Coptic apunta a un paralelismo antitético entre ‘mentir’ y ‘decir la verdad’. En español, ‘mienten acerca de mí’ conserva la acusación directa y ‘dicen la verdad acerca de mí’ mantiene el contraste retórico sin añadir interpretación ajena al texto.
- source_word: ⲥⲟⲟⲩⲛ
  english_pob_choice: know
  chosen_spanish: conocen
  alternatives_spanish:
  - saben
  - reconocen
  lexicon: Coptic (Sahidic) standard lexica
  rationale: 'Aquí el saber es relacional: ‘conocer’ expresa mejor el vínculo con la voz que habla que un simple dato intelectual. En español, ‘conocen’ mantiene la resonancia personal y el paralelismo con ‘me han conocido’.'
- source_word: ⲙⲁⲣⲟⲩⲣⲁⲧⲥⲟⲟⲩⲛ / OCR jussive antithesis
  english_pob_choice: let them be ignorant of me
  chosen_spanish: que me ignoren
  alternatives_spanish:
  - que sean ignorantes de mí
  - que permanezcan sin conocerme
  lexicon: Coptic (Sahidic) standard lexica; adjudicated restoration
  rationale: La forma jussiva exige una traducción volitiva. ‘Que me ignoren’ reproduce el mandato paradojal con naturalidad en español y conserva la tensión del original mejor que una paráfrasis explicativa.
- source_word: ⲙⲁⲣⲟⲩⲥⲟⲟⲩⲛ
  english_pob_choice: let them know me
  chosen_spanish: que me conozcan
  alternatives_spanish:
  - que lleguen a conocerme
  - que me reconozcan
  lexicon: Coptic (Sahidic) standard lexica
  rationale: Se preserva la misma raíz verbal que en la cláusula anterior para reflejar el contraste entre conocer e ignorar. ‘Que me conozcan’ es natural, directo y fiel al paralelismo.
- source_word: ⲡⲥⲟⲟⲩⲛ
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - saber
  - conocer
  lexicon: Coptic (Sahidic) standard lexica
  rationale: El sustantivo abstracto se vierte como ‘conocimiento’ para mantener el balance con ‘ignorancia’. ‘Saber’ como sustantivo suena menos estable en este contraste formal.
- source_word: ⲧⲙⲛⲧⲁⲧⲥⲟⲟⲩⲛ
  english_pob_choice: ignorance
  chosen_spanish: ignorancia
  alternatives_spanish:
  - falta de conocimiento
  - no conocimiento
  lexicon: Coptic (Sahidic) standard lexica
  rationale: ‘Ignorancia’ es el correlato natural de ‘conocimiento’ y preserva el oxímoron central. Aunque ‘no conocimiento’ sería más literal, suena menos idiomático en español.
- source_word: ⲁⲛⲟⲕ ⲅⲁⲣ ⲡⲉ
  english_pob_choice: For I am
  chosen_spanish: Porque yo soy
  alternatives_spanish:
  - Pues yo soy
  - Ya que yo soy
  lexicon: Coptic (Sahidic) standard lexica
  rationale: El causativo ⲅⲁⲣ permite ‘porque/pues’. ‘Porque yo soy’ mantiene la fuerza causal y la cadencia enfática del ‘Yo soy’ repetido en Thunder.
translation_notes:
  revision_awareness: 'La versión inglesa auditada fue revisada por un adjudicador que corrigió dos errores mayores del borrador: la primera línea no significa ‘he cried out openly’, sino ‘los que mienten acerca de mí dicen la verdad acerca de mí’; y la segunda no significa ‘los que me conocen me conocerán’, sino ‘los que me conocen, que me ignoren’. La traducción española sigue esa lectura adjudicada y evita reproducir el OCR erróneo.'
  spanish_consistency_notes:
  - Se usa ‘mienten acerca de mí’ para mantener el tono de acusación y el paralelo con ‘dicen la verdad acerca de mí’.
  - ‘Conocen / me conozcan’ conserva la repetición verbal exigida por el juego entre conocer e ignorar.
  - ‘Conocimiento e ignorancia’ reproduce la antítesis abstracta con registros naturales en español.
  - Se evita ‘SEÑOR’ o terminología eclesiástica aquí porque el pasaje no contiene el tetragrámaton ni léxico cristológico convencional.
