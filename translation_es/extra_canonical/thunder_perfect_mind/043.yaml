  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ⲧⲥⲟⲟⲩⲛ
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - sabiduría
  - conocimiento
  lexicon: Crum Coptic Dictionary; audit trail on ⲥⲟⲟⲩⲛ as noun
  rationale: El sustantivo con artículo expresa ‘knowledge’; en español, ‘conocimiento’ conserva ese valor nominal y el motivo recurrente saber/ignorar. ‘Sabiduría’ sería más interpretativo y desplazaría el paralelo con ‘ignorancia’.
- source_word: ⲉⲗⲗⲏⲛ
  english_pob_choice: Greek
  chosen_spanish: griegos
  alternatives_spanish:
  - griego
  - helenos
  lexicon: Greek loanword via Coptic (LSJ)
  rationale: El plural del texto revisado requiere un sustantivo plural en español. ‘Griegos’ preserva el contraste cultural directo sin añadir tono erudito excesivo.
- source_word: ⲧⲙⲛⲧⲁⲧⲥⲟⲟⲩⲛ
  english_pob_choice: ignorance
  chosen_spanish: ignorancia
  alternatives_spanish:
  - falta de conocimiento
  - desconocimiento
  lexicon: Coptic morphology and audit revision
  rationale: La revisión del expediente identifica esta forma como ‘ignorance’. ‘Ignorancia’ mantiene el antónimo natural de ‘conocimiento’ y conserva la tensión paradoxal del pasaje.
- source_word: ⲫⲁⲡ
  english_pob_choice: judgment
  chosen_spanish: juicio
  alternatives_spanish:
  - juicio
  - sentencia
  - veredicto
  lexicon: Coptic definite article + ϩⲁⲡ; audit revision
  rationale: La lectura revisada entiende la forma como ‘the judgment’. En español, ‘juicio’ es la opción más directa y sobria; ‘sentencia’ o ‘veredicto’ estrechan demasiado el matiz.
- source_word: ⲃⲁⲣⲃⲁⲣⲟⲥ
  english_pob_choice: barbarian
  chosen_spanish: bárbaros
  alternatives_spanish:
  - bárbaro
  - no griegos
  - extranjeros
  lexicon: Greek loanword via Coptic (LSJ)
  rationale: Se conserva ‘bárbaros’ para mantener la oposición cultural dura del original, que el expediente auditado preserva explícitamente. ‘Extranjeros’ domesticaría la carga retórica.
theological_decisions:
- issue: Tensión paradójica entre conocimiento e ignorancia / sentido y sabiduría
  english_pob_reading: The source was revised away from a paraphrase that obscured the paradox into a pair centered on knowledge and ignorance.
  chosen_spanish_reading: La traducción conserva la antítesis ‘conocimiento / ignorancia’ sin suavizarla, y deja intacta la autodeclaración paradójica del hablante.
  alternative_spanish_readings:
  - sabiduría / necedad
  - entendimiento / ceguera
  rationale: El texto depende de una afirmación simultánea y contradictoria en apariencia; sustituirla por un lenguaje moralizante o psicologizante borraría la tensión literaria documentada en el expediente.
  doctrine_reference: Retórica paradójica del himno; no hay afirmación doctrinal normativa a sistematizar.
translation_notes:
  revision_awareness: 'El expediente muestra una revisión mayor que corrigió una lectura errónea basada en OCR: el texto no habla de ‘juicio’ ni de ‘it’, sino de ‘conocimiento/ignorancia’ y pluralidad étnica (‘griegos’, ‘bárbaros’). La versión española sigue esa lectura revisada y evita reintroducir las lecturas descartadas.'
  spanish_consistency_notes:
  - Se mantiene el patrón anafórico ‘Y yo soy…’ para reflejar la cadencia del original y del POB inglés.
  - Se usa plural en ‘griegos’ y ‘bárbaros’ conforme a la revisión crítica del texto.
  - No se añaden notas al pie porque el pasaje revisado no presenta una alternativa textual activa que deba marcarse en el cuerpo español.
