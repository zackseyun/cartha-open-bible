revisions:
- from: 'Y yo soy el conocimiento de los griegos y la ignorancia de ellos.


    Y yo soy el juicio de los griegos y de los bárbaros.'
  to: 'Estoy sin sentido, y soy sabia.


    Soy el conocimiento del griego y del bárbaro.[a]'
  rationale: Se corrige el borrador para alinearlo con la evidencia fuente y con la decisión auditada final del POB inglés. ‘Sin sentido’ reproduce mejor la fuerza privativa de ‘without sense’ que opciones moralizantes; ‘sabia’ refleja el valor adjetival de ‘wise’ y concuerda con la voz femenina de Thunder, Perfect Mind. ‘Conocimiento’ mantiene el motivo saber/ignorancia documentado sin introducir la lectura descartada ‘ignorancia’. Se usan singulares genéricos (‘del griego ... del bárbaro’) conforme al texto final auditado. Se conserva una nota breve porque el expediente inglés sí preservó una alternativa de formulación.
