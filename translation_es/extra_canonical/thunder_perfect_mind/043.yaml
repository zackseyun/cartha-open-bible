  source_alignment_summary: 'El borrador español sigue una revisión intermedia ya revertida y no el estado auditado final en inglés. El testigo y la traducción POB final apoyan: ‘I am without sense, and I am wise. / I am the knowledge of the Greek and of the barbarian.’ El español actual introduce ‘ignorancia’, ‘juicio’ y plurales (‘griegos’, ‘bárbaros’) que no corresponden al texto final auditado ni al source payload dado.'
  spanish_quality_summary: 'El español es comprensible, pero está construido sobre una base equivocada. Además, la repetición ‘Y yo soy’ en ambas líneas suena más pesada de lo necesario. Una formulación directa y paralela preserva mejor el tono paradójico y la legibilidad: ‘Estoy sin sentido, y soy sabia. / Soy el conocimiento del griego y del bárbaro.’'
  glossary_alignment: 'No hay términos teológicos de glosario mayor implicados aquí. Léxicamente, debe respetarse la decisión POB: ⲛⲁⲥⲓⲉ = ‘without sense’ (mejor ‘sin sentido’ que ‘insensata’ para conservar la fuerza privativa), ⲥⲟⲟⲩⲛ cualitativo = ‘wise’ (en español ‘sabia’ por concordancia con la voz femenina del poema), ⲡ/ⲧⲥⲟⲟⲩⲛ = ‘conocimiento’, ⲉⲗⲗⲏⲛ / ⲃⲁⲣⲃⲁⲣⲟⲥ = singulares genéricos ‘del griego’ y ‘del bárbaro’.'
