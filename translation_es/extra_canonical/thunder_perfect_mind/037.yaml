lexical_decisions:
- source_word: ⲥⲁϩⲟⲩ / negative imperative in context
  english_pob_choice: Do not curse
  chosen_spanish: No maldigas
  alternatives_spanish:
  - No maldigas
  - No maldiagas
  - No pronuncies maldición sobre
  lexicon: Crum; audit trail revision
  rationale: El ajuste crítico del audit trail muestra que el verbo es “maldecir/maldigar” en mandato negativo. En español, “No maldigas” conserva la fuerza imperativa y evita calcos artificiales.
- source_word: ⲙ̄ⲡⲁϣⲟⲩϣⲟⲩ
  english_pob_choice: my boast
  chosen_spanish: mi jactancia
  alternatives_spanish:
  - mi orgullo
  - mi vanagloria
  - mi jactancia
  lexicon: Crum; audit trail revision
  rationale: El audit trail corrige el valor desde ‘weakness’ a ‘boast/pride’. ‘Jactancia’ preserva el matiz de autoexaltación y el tono áspero del texto.
- source_word: ⲁⲛⲟⲕ ⲇⲉ ⲧⲉⲧϣⲟⲟⲡ
  english_pob_choice: But I am she who exists
  chosen_spanish: Pero yo soy la que existe
  alternatives_spanish:
  - Pero yo soy la que está
  - Pero yo soy la que existe
  - Pero yo soy la que es
  lexicon: Layton Grammar; Crum
  rationale: La forma copulativa femenina relativa se refleja mejor con ‘la que existe’. Mantiene el valor enfático de identidad y presencia sin introducir ‘Cristo’ u otra identificación ajena.
- source_word: ⲛ̄ⲛ̄ⲫⲟⲃⲟⲥ ⲧⲏⲣⲟⲩ
  english_pob_choice: in every fear
  chosen_spanish: en todo temor
  alternatives_spanish:
  - en todo temor
  - en cada temor
  - en todo miedo
  lexicon: Loanword (Gk. phobos); Layton Syntax
  rationale: ‘Phobos’ puede traducirse por ‘temor’ o ‘miedo’; aquí ‘temor’ suena más literario y conserva la amplitud totalizante de ‘every fear’.
- source_word: ⲡⲛⲏϣⲁⲧ ⲛ̄ⲟⲩⲥⲧⲱⲧ
  english_pob_choice: the strength in trembling
  chosen_spanish: la fuerza en el temblor
  alternatives_spanish:
  - la fuerza en el temblor
  - la fortaleza en el temblor
  - la fuerza del temblor
  lexicon: Crum; audit trail revision
  rationale: El audit trail establece ‘strength in trembling’. ‘La fuerza en el temblor’ reproduce con naturalidad el paralelismo y evita sobreinterpretar el sintagma.
- source_word: ⲁⲛⲟⲕ ⲧⲉ
  english_pob_choice: I am she
  chosen_spanish: yo soy la que
  alternatives_spanish:
  - yo soy la que
  - yo soy ella que
  - yo soy
  lexicon: Layton Grammar
  rationale: La fórmula femenina relativa se vierte como ‘yo soy la que’ para mantener el carácter formular y permitir que la cláusula continúe con naturalidad en el segmento truncado.
translation_notes:
  revision_awareness: 'El audit trail muestra una corrección importante: el pasaje anterior fue revisado desde lecturas erróneas de ''guard''/''weakness'' hacia ''curse''/''boast'', y desde lecturas erróneas de ''smallness of heart'' hacia ''strength in trembling''. La versión española sigue la lectura revisada y conserva la línea truncada del manuscrito.'
  spanish_consistency_notes:
  - Se mantuvo 'yo soy la que' para reflejar la construcción femenina relativa del copto y la cadencia anafórica del poema.
  - Se eligió 'temor' en vez de 'miedo' por consistencia con un registro más elevado y por el paralelismo con el griego phobos.
  - No se introdujeron términos doctrinales ajenos al texto; se respetó la ambigüedad poética del fragmento.
  - Las notas alternativas se dejaron donde el texto auditado conserva ambigüedad o truncamiento manuscrito.
