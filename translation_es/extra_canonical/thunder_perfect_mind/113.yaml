  text: 'You yourselves also[1]—the angels and those who have been sent[2]—

    I am the sign[3] that points out[4] among the dead[b][a][5][4][3][2][1]; yet I am the one who—[5]'
  footnotes:
  - marker: '1'
    text: ϩⲱⲧ can mean ‘alone/only’; here used adverbially with the reflexive ⲧⲏⲩⲧⲛ̄ (‘yourselves’).
    reason: lexical_alternative
  - marker: '2'
    text: 'ⲛⲉⲛⲧⲁⲩⲧⲛ̄ⲛⲟⲟⲩ = ‘those who (have) seen you’: ⲛⲉ (those who) + ⲛⲧⲁⲩ- (3pl first perfect) + ⲧⲛ̄ (2pl obj.) + ⲛⲟⲟⲩ (see). Aspect could be rendered ‘have seen’.'
    reason: cultural_note
  - marker: '3'
    text: ⲡⲓⲛⲁ is here taken as ‘sign’; ‘mark’ is also possible depending on dialectal usage.
    reason: lexical_alternative
  - marker: '4'
    text: ⲧⲁⲧⲧⲱⲱⲛ ⲉⲃⲟⲗ is rendered ‘that points out’; alternatives include ‘that brings forth’ or ‘that divides,’ the last aligning with some English traditions for this line, but the lexeme is uncertain in this slice.
    reason: lexical_alternative
  - marker: '5'
    text: The clause introduced by ⲡⲉⲧ (‘the one who …’) appears truncated in this OCR segment; likely continues on the next line/folio.
    reason: textual_variant
  - marker: a
    text: Or 'those who saw you'.
    reason: previous_rendering
  - marker: b
    text: Or 'You yourselves alone'.
    reason: previous_rendering
