translation:
  language: es
  text: 'También ustedes mismos[a]—los ángeles y los que han sido enviados[b]—


    Yo soy la señal[c] que pone de manifiesto[d] entre los muertos; sin embargo, yo soy el que[e]—'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También posible: «ustedes mismos solos», pero la corrección auditada favorece aquí el sentido de «también / igualmente», no el de «solos».'
    reason: textual_variant
  - marker: b
    text: La lectura copta corregida entiende aquí «los que han sido enviados»; el inglés POB anterior ofrecía una alternativa basada en una mala segmentación, pero la revisión textual la descartó.
    reason: textual_variant
  - marker: c
    text: «Señal» y «signo» son ambos posibles para ⲡⲓⲛⲁ; se eligió «señal» por naturalidad en español.
    reason: lexical_alternative
  - marker: d
    text: El copto ⲧⲁⲧⲧⲱⲱⲛ ⲉⲃⲟⲗ es incierto en esta línea; también podría entenderse como «que divide» o «que saca a la luz». Se traduce aquí de forma más idiomática que el calco «señala afuera».
    reason: lexical_alternative
  - marker: e
    text: El segmento copto que sigue está truncado en este testimonio OCR y parece continuar en la línea o folio siguiente.
    reason: textual_variant
lexical_decisions:
- source_word: ⲧⲱⲧⲛ̄ + ϩⲱⲧ ⲧⲏⲩⲧⲛ̄
  english_pob_choice: You yourselves also
  chosen_spanish: Ustedes mismos también
  alternatives_spanish:
  - Ustedes mismos
  - También ustedes mismos
  lexicon: Crum s.v. ϩⲱⲱ= / ϩⲱⲧ; Layton, Coptic Grammar (pronombres reflexivos)
  rationale: La revisión auditada corrige la lectura de ϩⲱⲧ como ‘alone’ y la entiende aquí como valor enclítico de ‘también/igual’, reforzando el pronombre reflexivo. ‘Ustedes mismos también’ conserva el énfasis y el orden natural del español.
- source_word: ⲛ̄ⲛⲁⲅⲅⲉⲗⲟⲥ
  english_pob_choice: the angels
  chosen_spanish: los ángeles
  alternatives_spanish:
  - los mensajeros
  lexicon: Crum s.v. ⲁⲅⲅⲉⲗⲟⲥ
  rationale: El préstamo griego en copto apunta de manera normal a seres celestiales. ‘Ángeles’ es la equivalencia más transparente y probable en este contexto cosmológico.
- source_word: ⲛⲉⲛⲧⲁⲩⲧⲛ̄ⲛⲟⲟⲩ
  english_pob_choice: those who have been sent
  chosen_spanish: los que han sido enviados
  alternatives_spanish:
  - los enviados
  - los que enviaron
  lexicon: Crum s.v. ⲧⲛ̄ⲛⲟⲟⲩ; Layton, Coptic Grammar (primera perfecta / pasiva impersonal)
  rationale: 'Se sigue la corrección auditada: no es ‘ver’, sino ‘enviar’. El giro copto puede leerse pasivamente, por lo que ‘los que han sido enviados’ preserva el sentido y la ambigüedad pasiva sin forzarla.'
- source_word: ⲡⲓⲛⲁ
  english_pob_choice: the sign
  chosen_spanish: la señal
  alternatives_spanish:
  - el signo
  - la marca
  lexicon: Crum s.v. ⲛⲁ (sign/mark)
  rationale: ‘Señal’ funciona bien en español moderno y conserva el alcance semiótico de ‘sign’. ‘Signo’ sería también posible, pero ‘señal’ suena más natural en esta formulación.
- source_word: ⲧⲁⲧⲧⲱⲱⲛ ⲉⲃⲟⲗ
  english_pob_choice: that points out
  chosen_spanish: que señala afuera
  alternatives_spanish:
  - que apunta
  - que da a conocer
  - que divide
  lexicon: Crum s.v. ⲧⲱⲱⲛ; ⲉⲃⲟⲗ (‘afuera’, ‘hacia fuera’)
  rationale: El compuesto es lexicamente incierto en este segmento. ‘Señala afuera’ mantiene la imagen de dirección externa del original y evita adoptar sin más ‘divide’, que el propio aparato considera posible pero menos seguro. La formulación es algo literal, pero sigue mejor la tensión del texto.
- source_word: ⲛⲉⲧⲙⲟⲟⲩⲧ
  english_pob_choice: the dead
  chosen_spanish: los muertos
  alternatives_spanish:
  - los muertos yacentes
  lexicon: Crum s.v. ⲙⲟⲟⲩⲧ
  rationale: Equivalencia directa y natural para el plural sustantivado copto.
- source_word: ⲭⲉ
  english_pob_choice: yet
  chosen_spanish: sin embargo
  alternatives_spanish:
  - y
  - pero
  lexicon: Crum s.v. ⲭⲉ
  rationale: ‘Sin embargo’ reproduce bien el giro adversativo y el cambio de foco hacia la cláusula truncada.
- source_word: ⲡⲉⲧ
  english_pob_choice: the one who—
  chosen_spanish: el que—
  alternatives_spanish:
  - quien—
  - la que—
  lexicon: Layton, Coptic Grammar (cláusulas relativas)
  rationale: La cláusula está truncada en el OCR; el guion final conserva la interrupción textual. En español, ‘el que’ es una solución neutra y legible para el relativo incompleto.
