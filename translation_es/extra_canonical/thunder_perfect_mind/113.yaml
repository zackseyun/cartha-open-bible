  revision_awareness: 'Se tuvo en cuenta la revisión auditada más reciente: (1) se corrigió ⲧⲛ̄ⲛⲟⲟⲩ como ‘enviar’, no ‘ver’; (2) se corrigió ϩⲱⲧ ⲧⲏⲩⲧⲛ̄ como ‘también’, no ‘solos’; (3) se mantuvo la cautela sobre el valor de ⲧⲁⲧⲧⲱⲱⲛ ⲉⲃⲟⲗ y el corte textual final.'
