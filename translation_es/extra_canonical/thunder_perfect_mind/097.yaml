translation:
  language: es
  text: Escúchame en mansedumbre,[b] y aprende de mí en aspereza.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El cóptico ⲧⲉⲣⲟⲟⲩ puede rendirse como «aspereza», «dureza» o «severidad». Se escogió «aspereza» porque conserva con más naturalidad en español la antítesis con «mansedumbre».
    reason: lexical_alternative
  - marker: b
    text: El OCR de este tramo incluye fragmentos cercanos con lenguaje de «juzgar» y «fuerza», pero el pareado aquí traducido se centra en la exhortación «escúchame / aprende de mí».
    reason: alignment_note
lexical_decisions:
- source_word: ⲥⲱⲧⲙ (inferred)
  english_pob_choice: listen
  chosen_spanish: Escúchame
  alternatives_spanish:
  - Óyeme
  - Escucha
  lexicon: 'Crum (ⲥⲱⲧⲙ: hear, listen)'
  rationale: El imperativo inicial pide una respuesta atenta; en español, «escúchame» conserva el valor de oír con atención y mantiene el tono exhortativo del paralelismo.
- source_word: ⲭⲣⲟⲉⲓ
  english_pob_choice: gentleness
  chosen_spanish: mansedumbre
  alternatives_spanish:
  - gentileza
  - suavidad
  - humildad
  lexicon: 'Crum (ⲭⲣⲟⲉⲓ: gentle, mild, meekness)'
  rationale: «Mansedumbre» es un término bíblico y readable en español que preserva la virtud de suavidad/meekness sin reducirla a mera cortesía.
- source_word: ⲕⲁⲁⲥ
  english_pob_choice: learn
  chosen_spanish: aprende
  alternatives_spanish:
  - sé enseñado
  - recibe enseñanza
  lexicon: 'Crum, Coptic Dictionary (ⲕⲁⲁⲥ: learn, be taught)'
  rationale: El verbo imperativo directo corresponde al paralelismo de dos mandatos; «aprende» refleja bien el valor de aprender/ser enseñado sin añadir contenido.
- source_word: ⲉⲣⲟⲓ
  english_pob_choice: from me
  chosen_spanish: de mí
  alternatives_spanish:
  - de parte de mí
  - a partir de mí
  lexicon: 'Layton, Coptic Grammar (ⲉⲣⲟ- + pronominal: ‘from/to/at (a person)’ )'
  rationale: En español, «aprende de mí» es la construcción natural para una fuente de enseñanza; se conserva la relación de procedencia indicada por el coptico.
- source_word: ⲧⲉⲣⲟⲟⲩ
  english_pob_choice: harshness
  chosen_spanish: dureza
  alternatives_spanish:
  - aspereza
  - severidad
  - rugosidad
  lexicon: 'Crum (ⲣⲟⲟⲩ/ⲧⲉⲣⲟⲟⲩ: hard, harsh; harshness/roughness)'
  rationale: «Dureza» mantiene la oposición semántica con «mansedumbre» y suena natural en español contemporáneo; también permite abarcar la gama dureza/aspereza/severidad documentada en el léxico.
theological_decisions:
- issue: Antítesis ética entre mansedumbre y dureza
  english_pob_reading: Listen to me in gentleness, and learn from me in harshness.
  chosen_spanish_reading: Escúchame en mansedumbre, y aprende de mí en dureza.
  alternative_spanish_readings:
  - Escúchame en gentileza, y aprende de mí en aspereza.
  - Óyeme en mansedumbre, y aprende de mí en severidad.
  rationale: No hay una tesis doctrinal explícita aquí, sino una contraposición retórica que debe conservarse limpia. La versión española mantiene el contraste sin suavizarlo ni moralizarlo más de lo que el copto permite.
  doctrine_reference: Ninguna; decisión retórico-lexical basada en el paralelismo del texto.
