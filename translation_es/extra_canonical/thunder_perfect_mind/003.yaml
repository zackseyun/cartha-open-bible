base_translation:
  language: en
  yaml_path: translation/extra_canonical/thunder_perfect_mind/003.yaml
  text: 'And you hearers, listen to me.

    You who wait for me, take me to yourselves,

    and do not cast me from your sight,

    and do not let your voice hate me, nor your hearing.'
  footnotes:
  - marker: a
    text: ⲧⲟϣⲧ can mean wait/expect as well as long for/ yearn. The rendering "wait for" favors the anticipatory aspect; "long for me" is possible in context.
    reason: lexical_alternative
  - marker: b
    text: ⲡⲱⲧ normally means “run/flee.” Some English traditions have “do not send me away from your sight,” reflecting a different construal or a supplementary clause in other witnesses.
    reason: alternative_reading
  - marker: c
    text: ⲧⲟⲩⲛ literally “make/be heavy,” often used idiomatically of dull or odious speech/senses. “Make hateful” captures the evaluative force; “make heavy” is a more literal but opaque option.
    reason: lexical_alternative
  - marker: d
    text: The sequence around ⲡⲉⲧⲛϩⲟⲩⲟ ⲧⲱⲉⲓ … ⲡⲣⲣⲁⲧⲥⲱⲧⲙ is fragmentary here and may have referenced “your eye/way.” I translate only the clearly legible voice/hearing pair.
    reason: alignment_note
  - marker: e
    text: Or 'and do not run from me;\ndo not make your voice hateful to me — nor your hearing.'.
    reason: previous_rendering
