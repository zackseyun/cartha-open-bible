translation:
  language: es
  text: 'Y ustedes, oyentes, escúchenme.


    Ustedes que me esperan, tomenme consigo[a],


    y no me aparten de su vista,


    y no hagan odiosa su voz para mí, ni su oído.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Me esperan» sigue el valor de expectativa de ⲧⲟϣⲧ; también podría traducirse «me anhelan» o «me aguardan».
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲛⲣⲉϥⲥⲱⲧⲙ
  english_pob_choice: hearers
  chosen_spanish: oyentes
  alternatives_spanish:
  - los que oyen
  - escuchas
  lexicon: Crum; gramática sahídica sobre participios nominales con r̄ef-
  rationale: El participio nominal plural funciona como vocativo para un grupo caracterizado por oír. «Oyentes» conserva la identidad colectiva y suena natural en español bíblico contemporáneo.
- source_word: ⲥⲱⲧⲙ ⲉⲣⲟⲓ
  english_pob_choice: listen to me
  chosen_spanish: escúchenme
  alternatives_spanish:
  - óiganme
  - escuchen hacia mí
  lexicon: Crum (sōtm)
  rationale: Aunque el verbo base es «oír», en un mandato directo a un grupo ya llamado «oyentes», «escúchenme» expresa mejor la atención obediente que pide el texto.
- source_word: ⲧⲟϣⲧ
  english_pob_choice: wait for
  chosen_spanish: me esperan
  alternatives_spanish:
  - me aguardan
  - me anhelan
  - me esperan con expectativa
  lexicon: 'Crum (tošt: wait for, expect; also desire)'
  rationale: El sentido central es de espera anticipatoria. «Me esperan» conserva esa expectativa sin añadir una intensidad devocional que el copto no obliga a poner en primer plano.
- source_word: ⲡⲉⲧⲛϩⲟ / ⲛⲉⲧⲧⲟϣⲧ
  english_pob_choice: take me to yourselves
  chosen_spanish: tomenme consigo
  alternatives_spanish:
  - acójanme
  - atráiganme a ustedes
  - recíbanme
  lexicon: Crum; construcción pronominal de acogida/inclusión
  rationale: La idea no es solo movimiento físico, sino recepción cercana. «Tomenme consigo» comunica la incorporación del hablante a la esfera de los oyentes sin forzar una interpretación más fuerte que el contexto.
- source_word: ⲙⲡⲣⲛⲟⲩϫⲧ ⲉⲃⲟⲗ ϩⲙ ⲡⲉⲧⲛϩⲟ
  english_pob_choice: do not cast me from your sight
  chosen_spanish: no me aparten de su vista
  alternatives_spanish:
  - no me echen de su presencia
  - no me arrojen de su mirada
  - no me saquen de su vista
  lexicon: OCR/codex review; Coptic phrase with ϩⲟ “face/sight”
  rationale: La revisión textual establece que la expresión significa «no me echen de su vista/presencia». «Aparten de su vista» mantiene el sentido sin sobrecargar con un castellano demasiado literal o arcaizante.
- source_word: ⲡⲉⲧⲛϩⲣⲟⲟⲩ / ⲕⲁⲁⲩ
  english_pob_choice: your voice
  chosen_spanish: su voz
  alternatives_spanish:
  - su hablar
  - su sonido
  - su palabra
  lexicon: Crum; revisión textual del tramo final
  rationale: El texto revisado habla de la voz de los interlocutores. «Su voz» es la equivalencia más directa y clara en español.
- source_word: ⲙⲡⲣⲧⲣⲉ
  english_pob_choice: do not let
  chosen_spanish: no hagan
  alternatives_spanish:
  - no permitan
  - no dejen
  - no hagan que
  lexicon: Crum; causativa negativa en copto sahídico
  rationale: La construcción negativa causativa se vierte de modo natural con «no hagan… para mí» / «no hagan odiosa…», evitando una perífrasis excesivamente técnica.
- source_word: ⲧⲟⲩⲛ
  english_pob_choice: make hateful
  chosen_spanish: odiosa
  alternatives_spanish:
  - pesada
  - repugnante
  - detestable
  lexicon: 'Crum (toun: heavy; idiomatically odious/unpleasant in sensory-speech contexts)'
  rationale: «Odiosa» conserva el valor evaluativo del giro idiomático. «Pesada» sería más literal pero opaca; «odiosa» comunica mejor el efecto pretendido en español.
- source_word: ⲣⲁⲧⲥⲱⲧⲙ / hearing
  english_pob_choice: your hearing
  chosen_spanish: su oído
  alternatives_spanish:
  - su audición
  - su capacidad de oír
  - su escuchar
  lexicon: Crum; reconstrucción del tramo fragmentario
  rationale: El segmento final preserva la pareja voz/oído. «Su oído» es breve, natural y mantiene el paralelismo con «su voz».
translation_notes:
  revision_awareness: 'La revisión textual identificó que el OCR del copto era defectuoso en el tramo medio-final: no corresponde leer «run from me» ni «make your voice hateful» según la primera hipótesis del borrador inglés. Por eso la versión española sigue la lectura corregida del manuscrito: «no me aparten de su vista» y «no hagan odiosa su voz para mí», manteniendo además la clausula fragmentaria final con cautela.'
  spanish_consistency_notes:
  - Se conservó el vocativo plural «oyentes» para reflejar el participio nominal.
  - Se evitó «Cristo», «SEÑOR» u otra terminología no atestiguada en este pasaje.
  - El texto español mantiene una cadencia paralelística cercana al audit trail inglés sin depender de él de manera mecánica.
  - «Su oído» se retiene pese a la fragmentariedad del copto porque el audit trail reconoce una pareja voz/oído claramente legible.
