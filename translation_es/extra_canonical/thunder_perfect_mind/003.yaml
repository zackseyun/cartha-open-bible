  glossary_alignment: 'No hay términos teológicos mayores en juego. Las decisiones léxicas principales están bien encaminadas: «oyentes», «escúchenme», «me esperan», «su vista». La nota sobre ⲧⲟϣⲧ debe conservarse. La explicación léxica de ⲧⲟⲩⲛ queda algo desfasada por la revisión textual inglesa, pero en la traducción final el sentido de rechazo/aversión sigue adecuadamente expresado.'
