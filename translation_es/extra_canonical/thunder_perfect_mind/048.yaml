  text: And you have called me “Lawlessness.” I am she whom you pursued[a]; and I am the one you have seized; I am she whom you scattered[g][f][e][d][c][b], and you have known.
  footnotes:
  - marker: a
    text: ‘Lawlessness’ renders anomia; alternatives include ‘law‑breaking’ or ‘iniquity,’ but these either soften or theologize the charge-title.
    reason: lexical_alternative
  - marker: b
    text: OCR shows ⲛⲥⲱⲥ (‘after him/her’), but Thunder’s formula and nearby ⲙⲙⲟⲉⲓ (‘me’) suggest ⲛⲥⲁⲓ (‘after me’). Rendering keeps ‘me’ while noting possible OCR error.
    reason: alignment_note
  - marker: c
    text: ϫⲟⲟⲩ ⲉⲃⲟⲗ can be ‘cry out’ or ‘proclaim’ with an outward/public nuance; ‘proclaimed openly’ is a valid alternative.
    reason: lexical_alternative
  - marker: d
    text: Or 'And do not call me “lawlessness.”'.
    reason: previous_rendering
  - marker: e
    text: Or 'I am the one you have chased after me;'.
    reason: previous_rendering
  - marker: f
    text: Or 'I am the one you have cried out openly—'.
    reason: previous_rendering
  - marker: g
    text: Or 'and you did not know.'.
    reason: previous_rendering
