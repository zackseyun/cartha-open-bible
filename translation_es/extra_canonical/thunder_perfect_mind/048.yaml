  source_alignment_summary: El borrador español acierta en la estructura general y en los verbos principales revisados por la auditoría (llamado, persiguieron, dispersaron, han conocido), pero falla de manera importante en ⲁⲛⲟⲙⲓⲁ al traducirlo como «Desorden», que no preserva el sentido de ‘lawlessness/anomia’. También la frase «la que ustedes se apoderaron» es gramaticalmente incorrecta en español y no expresa bien ‘whom you have seized’.
  spanish_quality_summary: 'El texto es comprensible, pero tiene dos problemas de calidad: «Desorden» suena semánticamente desviado respecto del original y del POB, y «la que ustedes se apoderaron» es antinatural e incorrecto; debe decir «de la que ustedes se apoderaron» o mejor «a la que ustedes prendieron/apresaron». Conviene además suavizar la repetición de sujetos para un español más natural sin perder el paralelismo.'
  glossary_alignment: 'No hay términos teológicos mayores del glosario del proyecto implicados aquí, pero sí una decisión léxica clave: ⲁⲛⲟⲙⲓⲁ debe reflejar ‘anomia / falta de ley / ilegalidad / iniquidad’ y no «Desorden». Para mantener el filo acusatorio sin teologizar en exceso, «Ilegalidad» funciona mejor que «Desorden»; «anarquía» introduciría matices ajenos, e «iniquidad» teologiza más de lo documentado.'
  issues:
  - severity: high
    issue: «Desorden» para ⲁⲛⲟⲙⲓⲁ
    rationale: El original y la auditoría inglesa insisten en ‘Lawlessness/anomia’. «Desorden» desplaza el sentido hacia caos o falta de orden, no hacia transgresión o ausencia de ley.
  - severity: high
    issue: Construcción «la que ustedes se apoderaron»
    rationale: Es gramaticalmente defectuosa en español porque «apoderarse» exige «de». Además suena torpe dentro del paralelismo. Debe reformularse con un verbo transitivo o con la preposición requerida.
  - severity: medium
    issue: Registro y fluidez del paralelismo
    rationale: La repetición de «yo soy la que ustedes...» puede mantenerse, pero conviene ajustar la sintaxis para que suene digna y natural en español eclesial amplio.
