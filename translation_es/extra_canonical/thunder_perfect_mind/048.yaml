translation:
  language: es
  text: Y ustedes me han llamado «Ilegalidad»[a]. Yo soy aquella a quien ustedes persiguieron; y yo soy aquella de quien ustedes se apoderaron; yo soy aquella que ustedes dispersaron, y me han conocido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Ilegalidad» reproduce el sentido de anomia (‘falta de ley’, ‘transgresión de la ley’) mejor que «Desorden». Otras opciones posibles son «sin ley» o «iniquidad», pero la primera suena menos nominal en español y la segunda añade un matiz más teologizado.
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲁⲛⲟⲙⲓⲁ / anomia
  english_pob_choice: Lawlessness
  chosen_spanish: Desorden
  alternatives_spanish:
  - sin ley
  - ilegalidad
  - iniquidad
  lexicon: Crum; LSJ para el griego anomia; audit trail POB
  rationale: En español, "Desorden" intenta conservar el valor acusatorio y la carga negativa del título sin reducirlo a un tecnicismo jurídico. Mantiene la tensión del nombre/epíteto que el texto pone en boca de los interlocutores, aunque no reproduce literalmente la forma más común "sin ley".
- source_word: ⲙⲟⲩⲧⲉ
  english_pob_choice: call/name
  chosen_spanish: han llamado
  alternatives_spanish:
  - han nombrado
  - han dicho
  - han llamado por nombre
  lexicon: Crum; Layton
  rationale: La construcción coptica es afirmativa perfecta, no imperativa negativa. En español, "han llamado" conserva la acusación directa dirigida a los interlocutores y refleja el acto de nombrar/callar a alguien con un título.
- source_word: ⲡⲱⲧ
  english_pob_choice: pursued / chased after
  chosen_spanish: persiguieron
  alternatives_spanish:
  - corrieron tras
  - buscaron
  - fueron tras
  lexicon: Crum; Layton
  rationale: '"Persiguieron" es la opción española más natural para mantener la fuerza del verbo de persecución del contexto, sin forzar una imagen idiomática extraña.'
- source_word: ⲙⲁϩⲧⲉ
  english_pob_choice: seized
  chosen_spanish: se apoderaron
  alternatives_spanish:
  - me agarraron
  - me tomaron
  - me capturaron
  lexicon: Crum
  rationale: El verbo transmite captura o agarre fuerte; "se apoderaron" da en español un equivalente enérgico y fluido para la acción de tomar/aferrar.
- source_word: ϫⲟⲟⲩ ⲉⲃⲟⲗ
  english_pob_choice: scattered
  chosen_spanish: dispersaron
  alternatives_spanish:
  - esparcieron
  - desparramaron
  - diseminaron
  lexicon: Crum
  rationale: 'La revisión fuente-centrada corrige la lectura previa: el verbo significa dispersar/mandar fuera. "Dispersaron" es preciso y mantiene la imagen de desbandada o dispersión.'
- source_word: ⲥⲟⲟⲩⲛ
  english_pob_choice: know
  chosen_spanish: han conocido
  alternatives_spanish:
  - conocieron
  - han sabido
  - han reconocido
  lexicon: Crum
  rationale: La forma es afirmativa perfecta; por eso se traduce con pretérito perfecto compuesto. "Han conocido" conserva la literalidad básica y la referencia a un conocimiento consumado.
theological_decisions:
- issue: Título acusatorio “Lawlessness” / anomia
  english_pob_reading: The POB preserves the direct accusation-title 'Lawlessness' rather than softening it to 'iniquity'.
  chosen_spanish_reading: '"Desorden" funciona como un equivalente fuerte pero comprensible para el lector español, sin convertir el epíteto en una abstracción piadosa.'
  alternative_spanish_readings:
  - sin ley
  - iniquidad
  rationale: 'No hay aquí una doctrina cristiana explícita, pero sí una decisión de registro: mantener el filo acusatorio del epíteto. "Desorden" evita un giro demasiado técnico y no impone una carga moralizante ajena al contexto.'
  doctrine_reference: No aplica; decisión de equivalencia léxica y retórica.
translation_notes:
  revision_awareness: 'La revisión auditada corrigió tres puntos clave: la frase inicial es afirmativa («han llamado»), no una prohibición; el verbo medio es «persiguieron» y no una construcción con «me» redundante; y ϫⲟⲟⲩ ⲉⲃⲟⲗ se entiende como «dispersaron», no como «clamar/proclamar». También se mantiene la afirmación final «han conocido».'
  spanish_consistency_notes:
  - Se mantiene el pronombre femenino singular («la que») para reflejar el antecedente femenino del Coptic.
  - Se usa perfecto compuesto en toda la secuencia para reflejar el valor afirmativo perfecto del original.
  - No se introduce terminología eclesiástica tradicional donde el texto no la pide; el tono sigue siendo directo y confesional.
  - La nota [a] está anclada explícitamente en el texto para evitar marcas huérfanas.
