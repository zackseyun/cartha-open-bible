revisions:
- from: '...te hizo un modelo dentro de ti. Y lo que ves afuera de ti, me ves a mí dentro de ti. Es visible, y es tu vestido. Escúchenme, ustedes los oyentes.'
  to: '...a ti, él lo hizo una imagen dentro de ustedes. Y lo que ven fuera de ustedes, me ven a mí dentro de ustedes. Es visible, y es su vestidura. Escúchenme, oyentes.[a]'
  rationale: Se corrige la primera cláusula para preservar la relación de participantes del texto auditado, se unifica el tratamiento en plural para concordar con ‘oyentes’, y se mejora el registro poético con ‘vestidura’. Se añade una nota mínima porque la cláusula inicial sigue siendo algo abrupta en español debido a la incertidumbre del mapeo y del referente pronominal.
