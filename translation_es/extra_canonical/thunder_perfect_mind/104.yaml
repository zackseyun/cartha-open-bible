translation:
  language: es
  text: '...a ti, él lo hizo una imagen dentro de ustedes. Y lo que ven fuera de ustedes, me ven a mí dentro de ustedes. Es visible, y es su vestidura. Escúchenme, oyentes.[a]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La transmisión y el mapeo de este bloque siguen siendo algo inciertos. La cláusula inicial refleja la relación distinguida en la auditoría inglesa (‘él lo hizo una imagen dentro de ustedes’), aunque el referente de ‘lo’ no está explícito en español sin mayor paráfrasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲙⲡⲉⲧⲛⲥⲁϩⲟⲩⲛ
  english_pob_choice: within you
  chosen_spanish: dentro de ti
  alternatives_spanish:
  - en ti
  - dentro de ustedes
  lexicon: Coptic positional use of ⲥⲁϩⲟⲩⲛ in the aligned audit context
  rationale: El contexto auditado muestra oposición interior/exterior; “dentro de ti” conserva la localización interna con naturalidad en español.
- source_word: ⲡⲉⲧⲛⲥⲁⲛⲃⲟⲗ
  english_pob_choice: outside you
  chosen_spanish: afuera de ti
  alternatives_spanish:
  - fuera de ti
  - en lo exterior
  lexicon: Coptic positional use of ⲥⲁⲛⲃⲟⲗ in the aligned audit context
  rationale: Se preserva la antítesis con “dentro de ti” y el sentido espacial directo del griego/cóptico en el texto auditado.
- source_word: ⲧⲛⲛⲁⲩ ⲉⲣⲟϥ
  english_pob_choice: what you see
  chosen_spanish: lo que ves
  alternatives_spanish:
  - lo que miras
  - aquello que ves
  lexicon: Coptic verb ⲛⲁⲩ ‘ver’ with relative construction
  rationale: La construcción relativa exige una frase nominal; “lo que ves” es la forma más clara y fiel en español.
- source_word: ⲟⲩⲟⲛϩ ⲉⲃⲟⲗ
  english_pob_choice: visible
  chosen_spanish: visible
  alternatives_spanish:
  - manifiesto
  - puesto de manifiesto
  lexicon: Coptic adjective/participle from ⲟⲛϩ + ⲉⲃⲟⲗ
  rationale: La lectura revisada entiende el segmento como un predicado de estado; “visible” reproduce el valor semántico sin forzar una paráfrasis.
- source_word: ⲧⲉⲧⲛϩⲃⲥⲱ
  english_pob_choice: your garment
  chosen_spanish: tu vestido
  alternatives_spanish:
  - tu manto
  - tu ropa
  lexicon: Coptic OCR-corrupted segment interpreted from the revision note as garment-language
  rationale: “Vestido” comunica con precisión la imagen de prenda/vestidura y es idiomático en español; se evita sobreespecificar el tipo de prenda.
- source_word: ⲥⲱⲧⲙ
  english_pob_choice: listen
  chosen_spanish: Escúchenme
  alternatives_spanish:
  - óiganme
  - escúchame
  lexicon: Coptic ⲥⲱⲧⲙ ‘hear/listen’
  rationale: Se mantiene el imperativo plural del texto dirigido a los oyentes, con un registro solemne y claro.
- source_word: ⲁⲕⲣⲟⲁⲧⲏⲥ
  english_pob_choice: hearers
  chosen_spanish: ustedes los oyentes
  alternatives_spanish:
  - oyentes
  - los que oyen
  lexicon: Greek loan ἀκροατής
  rationale: “Oyentes” conserva el préstamo semántico; añadir “ustedes” hace explícito el vocativo plural en español.
theological_decisions:
- issue: Contraste interior/exterior
  english_pob_reading: you see me within you / what you see outside you
  chosen_spanish_reading: lo que ves afuera de ti, me ves a mí dentro de ti
  alternative_spanish_readings:
  - lo que ves fuera de ti, me ves a mí dentro de ti
  - lo que ves en lo exterior, me ves a mí en tu interior
  rationale: La formulación española reproduce la tensión retórica entre exterior e interior sin suavizarla ni espiritualizarla más allá del texto.
  doctrine_reference: No doctrinal prooftexting; preserves the paradoxical mystical imagery of the source.
- issue: Predicación de visibilidad
  english_pob_reading: It is visible
  chosen_spanish_reading: Es visible
  alternative_spanish_readings:
  - Está visible
  - Se ve
  rationale: Se conserva el valor afirmativo de estado/manifestación sin introducir un sujeto no atestiguado.
  doctrine_reference: Hermeneutics of the source text; no doctrinal expansion.
translation_notes:
  revision_awareness: 'La versión previa fue corregida siguiendo la revisión que identifica el pasaje como continuidad del motivo interior/exterior, no como una exhortación a “acercarse/lejos”. Se evitó reproducir la lectura errónea de ⲥⲁϩⲟⲩⲛ/ⲥⲁⲛⲃⲟⲗ como movimiento espacial hacia/desde el hablante, y se adoptó la sintaxis revisada: modelo interior, visión exterior, visibilidad, vestidura y llamado a los oyentes.'
  spanish_consistency_notes:
  - Se conserva un registro solemne pero natural en español.
  - No se introducen términos eclesiásticos tradicionales no requeridos por el texto.
  - Se mantiene la imagen corporal/espacial del original sin interpretar alegóricamente en exceso.
