translation:
  language: es
  text: Y me honras[a]. Me despreciaste, y me viste[e][d][c][b]. No desparramen las primeras cosas [...]. No mediten [...]. Sus miembros [...].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La forma revisada en el audit trail coptológico corrige la lectura anterior: aquí se toma ⲧⲁⲉⲓⲟ en el sentido de ‘honrar’, no ‘abrazar’.'
    reason: textual_variant
  - marker: b
    text: El tramo coptológico incluye una laguna y una alineación incierta; por eso se deja la elipsis sin intentar reconstrucción excesiva.
    reason: source_note
  - marker: c
    text: ⲗⲁⲁⲧⲉ conserva un sentido corporal; en español puede entenderse como ‘miembros’ o ‘miembros/limbs’ en sentido anatómico.
    reason: lexical_alternative
  - marker: d
    text: La repetición ‘me viste’ conserva el paralelismo retórico de la línea revisada sin añadir explicaciones interpretativas.
    reason: spanish_style_note
  - marker: e
    text: La secuencia ‘me despreciaste, y me viste’ sigue la lectura corregida del texto fuente y no la versión preliminar basada en una mala alineación.
    reason: textual_variant
lexical_decisions:
- source_word: ⲧⲁⲉⲓⲟ
  english_pob_choice: embrace
  chosen_spanish: honras
  alternatives_spanish:
  - me abrazas
  - me recibes
  - me acoges
  lexicon: Crum; Layton
  rationale: El audit trail inglés mantiene ‘embrace’, pero la revisión posterior corrige la alineación coptológica y establece que ⲧⲁⲉⲓⲟ significa ‘honor’. En español, ‘honras’ preserva el valor semántico confirmado por la revisión y evita seguir una lectura ya descartada.
- source_word: ⲁⲧⲉⲧⲛϣⲱϥ
  english_pob_choice: despised
  chosen_spanish: despreciaste
  alternatives_spanish:
  - menospreciaste
  - afrentaste
  - devastaste
  lexicon: Crum; W. E. Crum, A Coptic Dictionary, s.v. ϣⲱϥ
  rationale: La revisión identifica esta forma como perfecto de segunda persona plural de ϣⲱϥ, con sentido de ‘despreciar/arrasar’. ‘Despreciaste’ comunica bien el rechazo personal en español y conserva la fuerza relacional del texto.
- source_word: ⲁⲧⲉⲧⲛⲛⲁ
  english_pob_choice: you saw me
  chosen_spanish: me viste
  alternatives_spanish:
  - me miraste
  - me contemplaste
  - me observaste
  lexicon: Crum; Coptic grammatical parsing in audit review
  rationale: La forma revisada se entiende como ‘ustedes me vieron’. ‘Me viste’ es la formulación directa y natural en español, manteniendo la evidencia textual sin añadir matices no atestiguados.
- source_word: ⲙⲡⲣⲡⲟⲩϩⲧ ⲉⲃⲟⲗ
  english_pob_choice: Do not scatter
  chosen_spanish: No desparramen
  alternatives_spanish:
  - No derramen
  - No esparzan
  - No dispersen
  lexicon: Crum; alignment review
  rationale: El audit trail revisado lee el verbo como ‘scatter/pour out’ y no como ‘fear’. ‘Desparramen’ conserva la imagen de dispersar/verter ampliamente en un español vivo, aunque ‘esparzan’ también sería posible.
- source_word: ⲛⲛϣⲟⲣⲡ
  english_pob_choice: the first things
  chosen_spanish: las primeras cosas
  alternatives_spanish:
  - las primicias
  - los primeros asuntos
  - las primeras obras
  lexicon: Crum; alignment review
  rationale: La revisión mantiene una referencia a ‘the first things/beginnings’. ‘Las primeras cosas’ sigue de cerca el valor literal y evita especificar ‘obras’ o ‘asuntos’ sin base suficiente.
- source_word: ⲙⲉⲗⲉⲧⲁ
  english_pob_choice: Do not ponder
  chosen_spanish: No mediten
  alternatives_spanish:
  - No reflexionen
  - No mediten en
  - No consideren
  lexicon: Greek loan via Crum; LSJ μελετάω
  rationale: El préstamo griego expresa la idea de pensar/darse a considerar. ‘No mediten’ es una solución idiomática en español que conserva la prohibición intelectual del pasaje.
- source_word: ⲗⲁⲁⲧⲉ
  english_pob_choice: members / limbs
  chosen_spanish: miembros
  alternatives_spanish:
  - limbos
  - extremidades
  - partes del cuerpo
  lexicon: Crum; Layton
  rationale: El inglés revisado usa ‘members’; en español ‘miembros’ es el equivalente más natural y mantiene la corporalidad sin aclarar de más. No obstante, se conserva el sentido anatómico general del término.
theological_decisions:
- issue: Tensión entre la lectura temprana ‘embrace’ y la revisión coptológica ‘honor’
  english_pob_reading: The latest revision pass corrects the English line to ‘And you honor me.’
  chosen_spanish_reading: Y me honras.
  alternative_spanish_readings:
  - Y me abrazas.
  - Y me recibes.
  rationale: Se sigue la revisión más reciente, que declara un error grave de alineación en la lectura anterior. En un texto de testimonio textual complejo, la prioridad es la correspondencia con el coptológico auditado, no la repetición de una decisión ya corregida.
  doctrine_reference: Principio de fidelidad textual y prioridad de la base fuente sobre una tradición de traducción previa
- issue: 'Conservación de la secuencia de reproche y visión: ‘me despreciaste, y me viste’'
  english_pob_reading: You despised me, and you saw me.
  chosen_spanish_reading: Me despreciaste, y me viste.
  alternative_spanish_readings:
  - Me afrentaste, y me contemplaste.
  - Me rechazaste, y me miraste.
  rationale: La relación entre desprecio y visión se mantiene sin suavizarla. ‘Ver’ se deja como percepción directa, no como interpretación devocional, porque el texto revisado no añade ese matiz.
  doctrine_reference: Preservación del paralelismo y de la confrontación retórica del poema
- issue: Prohibición de ‘desparramar’ las primeras cosas
  english_pob_reading: Do not scatter the first things [...]
  chosen_spanish_reading: No desparramen las primeras cosas [...].
  alternative_spanish_readings:
  - No esparzan las primeras cosas [...].
  - No dispersen las primeras cosas [...].
  rationale: La revisión textual apoya una imagen de dispersión/derramamiento. ‘Desparramar’ conserva la fisicidad del gesto y la ambigüedad entre dispersar y verter, sin resolverla excesivamente.
  doctrine_reference: Respeto por la imaginería concreta del texto gnóstico-poético
- issue: Imprecisión del tramo final marcado por lagunas OCR
  english_pob_reading: Do not ponder [...] your limbs [...]
  chosen_spanish_reading: No mediten [...]. Sus miembros [...].
  alternative_spanish_readings:
  - No reflexionen [...]. Sus miembros [...].
  - No mediten [...]. Sus miembros dentro de ustedes [...].
  rationale: Se mantiene la fragmentariedad del testimonio en lugar de reconstruir demasiado. El español conserva los corchetes y la elipsis para señalar que el soporte fuente es incompleto.
  doctrine_reference: Principio de honestidad textual ante lagunas y alineación incierta
translation_notes:
  revision_awareness: 'He seguido la revisión más reciente que corrige la mala alineación previa: ⲧⲁⲉⲓⲟ = ‘honor’, ⲁⲧⲉⲧⲛϣⲱϥ = ‘despreciaste’, ⲁⲧⲉⲧⲛⲛⲁ = ‘me viste’, ⲙⲡⲣⲡⲟⲩϩⲧ ⲉⲃⲟⲗ = ‘no desparramen’, y se preserva la fragmentación donde el OCR es incierto.'
  spanish_consistency_notes:
  - He usado ‘honras’ para ⲧⲁⲉⲓⲟ según la corrección textual, no ‘abrazas’.
  - He evitado ‘SEÑOR’ u otros reemplazos teológicos ajenos al texto.
  - He conservado los corchetes y la elipsis para señalar lagunas no reconstruibles.
  - He preferido un registro sobrio y poético, sin suavizar el reproche del pasaje.
