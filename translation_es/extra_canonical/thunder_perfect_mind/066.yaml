  text: And you embrace me[a]. You despised me, and you saw me[e][d][c][b]. Do not scatter the first things [...] Do not ponder [...] your limbs [...]
  footnotes:
  - marker: a
    text: ⲧⲁⲉⲓⲟ can also be rendered “receive” or “welcome,” a recurring imperative in Thunder. “Embrace” is chosen for bodily resonance.
    reason: lexical_alternative
  - marker: b
    text: The OCR includes ⲙⲡⲣⲡⲟⲩϩⲧ (“do not fear”) and ⲛⲛϣⲟⲣⲡ (likely “first things/beginnings”), but the mapping to this sub-unit is uncertain; these are not carried into the main line pending firmer alignment.
    reason: alignment_note
  - marker: c
    text: ⲗⲁⲁⲧⲉ may also be translated “members.” “Limbs” keeps the corporeal edge felt in this poem’s body imagery.
    reason: lexical_alternative
  - marker: d
    text: The pair “shamelessness // shame” is preserved to keep the poem’s paradox rather than smoothing it into a single ethical stance.
    reason: parallelism_note
  - marker: e
    text: Or 'And you, embrace me without shame; and from shamelessness — and from shame — put my limbs to shame within you.'.
    reason: previous_rendering
