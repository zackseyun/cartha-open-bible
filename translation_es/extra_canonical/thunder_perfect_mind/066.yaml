  glossary_alignment: 'No hay términos teológicos principales en juego, pero sí una decisión léxica clave: ⲧⲁⲉⲓⲟ debe seguir la opción documentada del POB inglés, ‘embrace’, no la lectura anterior ‘honor’. ⲗⲁⲁⲧⲉ debe reflejar la corporeidad; en español ‘extremidades’ o ‘miembros’ sirven, pero conviene evitar notas que contradigan el audit trail. También debe respetarse la incertidumbre de alineación en notas, no convertir una revisión intermedia en base definitiva.'
