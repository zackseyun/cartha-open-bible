translation:
  language: es
  text: 'Presten atención a mí con mansedumbre.[a]


    Yo soy la que permanece sobre la faz de la tierra,[b]

    y yo soy la que es arrojada de la faz de la tierra.[c]

    Yo soy la preparación de toda persona.[d]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con mansedumbre». ⲙⲏϣⲉ puede significar tanto ''mansedumbre'' como ''gentileza''.'
    reason: lexical_alternative
  - marker: b
    text: La lectura del Coptic fue corregida a 'la que permanece/abide' a partir de una errata OCR en la forma transmitida; por eso se usa 'permanece' en lugar de una abstracción.
    reason: textual_variant
  - marker: c
    text: 'O: «es echada». El verbo coptico admite matices de arrojar, echar o expulsar; se eligió la forma más sobria y directa.'
    reason: lexical_alternative
  - marker: d
    text: La traducción conserva 'preparación' porque el texto corregido no significa 'miedo'.
    reason: textual_variant
lexical_decisions:
- source_word: ⲧⲛϫⲓ ⲥⲃⲱ ⲉⲣⲟⲉⲓ
  english_pob_choice: Give heed to me
  chosen_spanish: Presten atención a mí
  alternatives_spanish:
  - Atiéndanme
  - Reciban instrucción de mí
  lexicon: Crum; Layton (ϫⲓ + ⲥⲃⲱ)
  rationale: La frase funciona como exhortación en segunda persona plural. En español, 'presten atención a mí' comunica la fuerza imperativa sin forzar un registro escolar de 'instrucción' y sin perder la direccionalidad del original.
- source_word: ϩⲛ ⲟⲩⲙⲏϣⲉ
  english_pob_choice: in gentleness
  chosen_spanish: con mansedumbre
  alternatives_spanish:
  - con gentileza
  - en humildad
  lexicon: Crum s.v. ⲙⲏϣⲉ
  rationale: El inglés POB deja abierta la gama 'gentleness/meekness'. En español, 'mansedumbre' conserva mejor el matiz bíblico y la cualidad de apacibilidad que 'gentileza', que suena más social que espiritual.
- source_word: ⲧⲁϣϭⲏⲗ / corrected ⲧⲉⲧϭⲱ ⲉⲃⲟⲗ
  english_pob_choice: the one who remains
  chosen_spanish: la que permanece
  alternatives_spanish:
  - la que se queda
  - la que perdura
  lexicon: Coptic ϭⲱ ⲉⲃⲟⲗ
  rationale: Sigo la revisión adjudicada que corrige una lectura OCR errónea y entiende el verbo como 'permanecer/abidir'. En español, 'permanece' reproduce bien la continuidad del sujeto personificado.
- source_word: ϩⲓϫⲙ ⲡϩⲟ ⲙⲡⲕⲁϩ
  english_pob_choice: upon the face of the earth
  chosen_spanish: sobre la faz de la tierra
  alternatives_spanish:
  - sobre la superficie de la tierra
  - en la faz de la tierra
  lexicon: Crum s.v. ⲡϩⲟ; ⲕⲁϩ
  rationale: '''Faz de la tierra'' conserva el giro idiomático y el peso poético del original, además de corresponder al ''face of the earth'' del audit trail.'
- source_word: ⲉⲧⲛⲟⲩϫⲉ ⲙⲙⲟⲥ ⲉⲃⲟⲗ
  english_pob_choice: who is cast off
  chosen_spanish: es arrojada
  alternatives_spanish:
  - es echada
  - es expulsada
  lexicon: Coptic ⲛⲟⲩϫⲉ
  rationale: La revisión indica que el sentido es 'ser arrojada/expulsada' más que 'aflojar'. 'Es arrojada' mantiene la violencia del verbo sin añadir una interpretación excesiva.
- source_word: ⲧⲥⲟⲃⲧⲉ
  english_pob_choice: the preparation
  chosen_spanish: la preparación
  alternatives_spanish:
  - el preparo
  - lo preparado
  lexicon: Crum s.v. ⲥⲟⲃⲧⲉ
  rationale: La revisión adjudicada corrige la lectura errónea 'fear' y confirma 'preparación'. En español, el sustantivo 'preparación' es natural y fiel a la forma nominal del coptico.
- source_word: ⲙⲡⲣⲱⲙⲉ ⲛⲓⲙ
  english_pob_choice: of every person
  chosen_spanish: de toda persona
  alternatives_spanish:
  - de todo ser humano
  - de cada persona
  lexicon: Crum s.v. ⲣⲱⲙⲉ; ⲛⲓⲙ
  rationale: '''Toda persona'' transmite el distributivo y evita un masculino genérico innecesario. Mantiene la amplitud antropológica del coptico.'
translation_notes:
  revision_awareness: 'Se incorporó la revisión crítica más reciente: se corrigieron las lecturas OCR problemáticas del segmento y se abandonaron las antiguas opciones ''la que permanece'' como abstracción, ''quien loosens it off'' y ''miedo''. El español se ajusta al análisis final del coptico, manteniendo el paralelismo poético y la personificación del hablante.'
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' y no aparecen términos teológicos que requieran equivalencias especiales de este proyecto.
  - Se mantuvo un español neutral y publicable, con 'mansedumbre' como término bíblico natural.
  - '''Faz de la tierra'' preserva el valor idiomático y poético del original sin modernizarlo en exceso.'
  - '''Toda persona'' evita sesgo de género y sigue el distributivo de ⲛⲓⲙ.'
