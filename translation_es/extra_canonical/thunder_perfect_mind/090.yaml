  yaml_path: translation/extra_canonical/thunder_perfect_mind/090.yaml
  text: 'Give heed to me in gentleness.[a]

    I am the one who remains upon the face of the earth,[b]

    and I am the one who is cast off the face of the earth.[c]

    I am the preparation of every person.[d][e][f][g]'
  footnotes:
  - marker: a
    text: 'Or: ‘in meekness.’ The noun ⲙⲏϣⲉ commonly denotes meekness/gentleness.'
    reason: lexical_alternative
  - marker: b
    text: The noun ⲧⲁϣϭⲏⲗ is taken as a substantivized quality, ‘steadfast/abiding (one).’ Alternatives include ‘the abiding one’ or abstract ‘steadfastness.’
    reason: lexical_alternative
  - marker: c
    text: ⲛⲟⲩϫⲉ primarily ‘loosen, unbind’; hence ‘loosen it off.’ ‘Dissolve’ or ‘destroy’ are interpretive alternatives depending on context.
    reason: lexical_alternative
  - marker: d
    text: ⲥⲟⲃⲧⲉ can carry shades from ‘fear’ to ‘terror/dread.’ ‘Fear’ here leaves the valence open.
    reason: lexical_alternative
  - marker: e
    text: Or 'the steadfast one dwelling'.
    reason: previous_rendering
  - marker: f
    text: Or 'who loosens it off'.
    reason: previous_rendering
  - marker: g
    text: Or 'the fear'.
    reason: previous_rendering
