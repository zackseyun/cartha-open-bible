base_translation:
  language: en
  yaml_path: translation/extra_canonical/thunder_perfect_mind/084.yaml
  text: '...is the one who sees what comes before me[A]. I am the light.

    I have not gone out — I, I —.B

    a non-darkness and the root of darkness is from within me.

    I am the desire of a vision,

    and the self-control of the heart that exists within me[d][c][b][a][E][D][C][B],

    I am the hearing that is acceptable to everyone.'
  footnotes:
  - marker: A
    text: Heuristic mapping for this segment expects a 'near/far (day)' paradox; the OCR here contains a light/dark and faculties sequence. Translation follows the OCR with noted uncertainty.
    reason: alignment_note
  - marker: B
    text: ⲙⲡⲕⲱ ⲉⲃⲟⲗ can be read prohibitive ('do not go out') or past ('I did not go out'). The declarative 'I have not gone out' fits the surrounding 'I am' declarations.
    reason: lexical_alternative
  - marker: C
    text: ⲧⲛⲟⲩⲛⲉ is uncertain; possible senses include 'brightness' (to pair with 'non-darkness') or a cognitive term like 'understanding/noēsis.' The rendering balances the immediate antithesis; context may favor a cognitive gloss.
    reason: lexical_alternative
  - marker: D
    text: ⲙⲫⲏⲧ ⲉⲥϣⲟⲟⲡ ⲛϩⲏⲧ is taken with 'vision' as 'vision of the heart that is within.' Other segmentations (‘that is within the heart’) are possible.
    reason: lexical_alternative
  - marker: E
    text: ⲟⲩⲟⲛ ('one') may nuance as 'unity' or 'alone.' 'In one' keeps the prepositional form; alternatives include 'in unity' or 'in the One.'
    reason: lexical_alternative
  - marker: a
    text: Or 'It is the one who sees the day.A\nI come before;'.
    reason: previous_rendering
  - marker: b
    text: Or 'and brightness.C\nDarkness is not outside; it is within.'.
    reason: previous_rendering
  - marker: c
    text: Or 'I am the desire of the mind,\nvision of the heart that is within,D\nand self-control.'.
    reason: previous_rendering
  - marker: d
    text: Or 'I am the hearing that is complete in one.E'.
    reason: previous_rendering
