translation:
  language: es
  text: '...es el que ve lo que viene antes que yo. Yo soy la luz.


    No he salido —yo, yo—.[a]


    Soy una no-oscuridad, y la raíz de la oscuridad está dentro de mí.[b]


    Soy el deseo de una visión,


    y el dominio propio del corazón que está dentro.[c]


    Soy el escuchar que es aceptable para todos.[d]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No salí»; el Coptic también permite una lectura prohibitiva (‘no salgas’), pero aquí se sigue la cadencia declarativa de las afirmaciones en primera persona.'
    reason: alternative_reading
  - marker: b
    text: 'La frase conserva la paradoja literal de la lectura auditada: ‘no-oscuridad’ junto con ‘la raíz de la oscuridad está dentro de mí’.'
    reason: lexical_alternative
  - marker: c
    text: También puede entenderse, de manera más literal, como «el dominio propio de un corazón que está dentro»; la redacción elegida busca claridad sin perder la sintaxis básica.
    reason: lexical_alternative
  - marker: d
    text: 'O: «el oír que es aceptable para todos».'
    reason: alternative_reading
lexical_decisions:
- source_word: ⲉϩⲣⲁⲓ ⲉⲧⲟⲟⲧ
  english_pob_choice: come before
  chosen_spanish: viene antes que yo
  alternatives_spanish:
  - viene delante de mí
  - aparece antes de mí
  lexicon: Coptic (Sahidic) verbal/prepositional phrase
  rationale: Conserva la relación espacial y temporal de ‘before me’ sin añadir un objeto no explícito; ‘que yo’ refleja el comparativo relacional del auditable English POB.
- source_word: ⲫⲱⲧ
  english_pob_choice: light
  chosen_spanish: luz
  alternatives_spanish:
  - resplandor
  - iluminación
  lexicon: Greek loan φῶς via Coptic
  rationale: ‘Luz’ es el equivalente natural y más fiel en español para el término del contraste ontológico del pasaje.
- source_word: ⲙⲡⲕⲱ ⲉⲃⲟⲗ
  english_pob_choice: have not gone out
  chosen_spanish: No he salido
  alternatives_spanish:
  - No salí
  - No salgo
  lexicon: Coptic negative perfect/prohibitive with ⲙⲡ- + ⲕⲱ ⲉⲃⲟⲗ
  rationale: La forma declarativa en pasado perfecto/resultado se traduce naturalmente como ‘No he salido’, manteniendo el ritmo de afirmaciones en primera persona.
- source_word: ⲟⲩⲁⲧⲛⲟⲕⲉ
  english_pob_choice: a non-darkness
  chosen_spanish: una no-oscuridad
  alternatives_spanish:
  - una ausencia de oscuridad
  - algo no oscuro
  lexicon: Coptic privative ⲁⲧ- + ⲛⲟⲕⲉ
  rationale: Se conserva la morfología privativa marcada en una forma española igualmente marcada, en lugar de suavizarla a una abstracción menos visible.
- source_word: ⲙⲡⲛⲟⲕⲉ / ⲟⲩⲉⲃⲟⲗ ⲛϩⲏⲧ
  english_pob_choice: darkness / from within
  chosen_spanish: la oscuridad / está dentro de mí
  alternatives_spanish:
  - la oscuridad / está en mí
  - la oscuridad / procede de dentro de mí
  lexicon: Coptic spatial and genitive construction
  rationale: ‘Dentro de mí’ conserva la fuerza de procedencia interior del Coptic. En el español, ‘está dentro de mí’ expresa el locus interior de manera clara y publicable.
- source_word: ⲧⲉⲡⲓⲑⲩⲙⲓⲁ ⲛⲟⲩϩⲟⲣⲁⲥⲓⲥ
  english_pob_choice: the desire of a vision
  chosen_spanish: el deseo de una visión
  alternatives_spanish:
  - el deseo de una visión contemplada
  - el anhelo de una visión
  lexicon: Greek ἐπιθυμία and ὅρασις via Coptic
  rationale: 'Se sigue la lectura auditada: genitivo de ‘visión’, no ‘mente’. ‘Deseo’ y ‘visión’ mantienen el paralelismo nominal del original.'
- source_word: ⲧⲉⲅⲕⲣⲁⲧⲓⲁ
  english_pob_choice: self-control
  chosen_spanish: dominio propio
  alternatives_spanish:
  - autodominio
  - autocontrol
  lexicon: Greek ἐγκράτεια via Coptic
  rationale: ‘Dominio propio’ es un equivalente sobrio y ampliamente comprensible en español, fiel al valor ético/ascético del término.
- source_word: ⲙⲫⲏⲧ
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - mente
  - interior
  lexicon: Coptic ⲫⲏⲧ (heart)
  rationale: En español bíblico y filosófico, ‘corazón’ preserva mejor el centro interior afectivo-volitivo que ‘mente’ y evita importar una psicología ajena al texto.
- source_word: ⲉⲥϣⲟⲟⲡ ⲛϩⲏⲧ
  english_pob_choice: that exists within
  chosen_spanish: que está dentro
  alternatives_spanish:
  - que existe dentro
  - que habita dentro
  lexicon: Coptic existence/locative construction
  rationale: La fórmula española mantiene la interioridad sin forzar una metáfora adicional; ‘está dentro’ es fiel y natural.
- source_word: ⲡⲥⲱⲧⲙ
  english_pob_choice: hearing
  chosen_spanish: el escuchar
  alternatives_spanish:
  - la audición
  - el oír
  lexicon: Coptic nominal from verb 'to hear'
  rationale: ‘El escuchar’ conserva el valor verbal-nominal del copt. sin convertirlo en un sustantivo demasiado técnico; además suena más vivo en español que ‘la audición’.
- source_word: ϣⲏⲡ
  english_pob_choice: acceptable
  chosen_spanish: aceptable
  alternatives_spanish:
  - bien recibido
  - grato
  lexicon: Coptic qualitative of ϣⲱⲡ
  rationale: 'Se conserva la lectura corregida del audit trail: no ‘completo’, sino ‘aceptable/recibible’. ‘Aceptable’ es la forma más directa.'
- source_word: ⲛⲟⲩⲟⲛ
  english_pob_choice: everyone
  chosen_spanish: para todos
  alternatives_spanish:
  - para cualquiera
  - para todo el mundo
  lexicon: Coptic dative with ⲟⲩⲟⲛ 'everyone/anyone'
  rationale: ‘Para todos’ expresa el alcance distributivo y evita el error de leerlo como el numeral ‘uno’. Mantiene la universalidad del enunciado.
theological_decisions:
- issue: Lectura de la secuencia inicial como afirmación de presencia/precedencia, no como ‘el día’ ni como una nueva cláusula independiente.
  english_pob_reading: It is the one who sees what comes before me.
  chosen_spanish_reading: es el que ve lo que viene antes que yo.
  alternative_spanish_readings:
  - es el que ve el día
  - soy yo quien viene antes
  rationale: La revisión auditada corrige la antigua mala alineación. En español se preserva la relación relacional ‘before me’ sin introducir ‘el día’ ni transformar la estructura en una autodeclaración distinta.
  doctrine_reference: Principio de primacía del texto base y de no introducir contenido no sustentado por el original
- issue: Conservar la paradoja ‘no oscuridad’ sin suavizarla a una simple negación abstracta.
  english_pob_reading: a non-darkness, and the root of darkness is from within me.
  chosen_spanish_reading: una no-oscuridad, y la raíz de la oscuridad está dentro de mí.
  alternative_spanish_readings:
  - una ausencia de oscuridad
  - no soy oscuridad
  rationale: La forma marcada ‘no-oscuridad’ preserva el choque semántico del privativo copt. y mantiene la tensión retórica del pasaje.
  doctrine_reference: Respeto de la tensión lexical del original; no normalización interpretativa
- issue: Interpretación de ⲛⲟⲩ como genitivo con ϩⲟⲣⲁⲥⲓⲥ (‘visión’), no como νοῦς (‘mente’).
  english_pob_reading: I am the desire of a vision
  chosen_spanish_reading: Soy el deseo de una visión
  alternative_spanish_readings:
  - Soy el deseo de la mente
  - Soy el anhelo de visión
  rationale: El audit trail corrige explícitamente la lectura de ‘mind’. El español sigue esa decisión para no reintroducir una interpretación descartada.
  doctrine_reference: Fidelidad filológica al segmentado coptológico auditado
- issue: Sentido de ϣⲏⲡ ⲛⲟⲩⲟⲛ como ‘aceptable para todos’, no ‘completo en uno’.
  english_pob_reading: I am the hearing that is acceptable to everyone.
  chosen_spanish_reading: Soy el escuchar que es aceptable para todos.
  alternative_spanish_readings:
  - Soy el oír perfecto en uno
  - Soy la audición completa
  rationale: Se mantiene la revisión aplicada que descarta la lectura de ‘uno’. ‘Para todos’ expresa la dative/distributive force del copt. con claridad pastoral.
  doctrine_reference: Fidelidad textual y rechazo de una resegmentación no soportada por el original
translation_notes:
  revision_awareness: 'Se tomó en cuenta el audit trail inglés y las correcciones aplicadas: se descartó la antigua mala alineación con ‘el día’, la falsa lectura de ⲧⲛⲟⲩⲛⲉ como ‘brightness’, la confusión de ⲛⲟⲩ con νοῦς, y la lectura de ⲟⲩⲟⲛ como ‘one’. La versión española sigue esas revisiones y evita reintroducir esos errores.'
  spanish_consistency_notes:
  - Se usa ‘Dios’/‘Yahvé’ según los defaults del proyecto, pero este pasaje no los requiere.
  - Se conserva un registro digno y publicable, sin cristianizar ni armonizar indebidamente un texto no bíblico.
  - Se eligió ‘dominio propio’ para ἐγκράτεια por claridad; ‘self-control’ en el audit trail no exige un término técnico fijo en español.
  - Las notas al pie se anclan solo donde aparecen los marcadores en el texto, para cumplir la validación y mantener trazabilidad.
