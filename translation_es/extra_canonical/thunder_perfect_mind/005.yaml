translation:
  language: es
  text: Mantente vigilante[a],[b] y, en cuanto a tu oír, no te hagas sordo a mí en ningún lugar ni según ningún otro pensamiento[c]; y no me ignores. Porque yo soy el primero[d][c], y yo soy el último.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: Mantente en guardia; Estate atento.'
    reason: lexical_alternative
  - marker: b
    text: La colocación de esta cláusula es incierta en las líneas mapeadas; algunas ediciones podrían unirla con la exhortación siguiente o la precedente.
    reason: textual_variant
  - marker: c
    text: La expresión puede entenderse también como 'en ningún lugar ni conforme a otro pensamiento'.
    reason: alternative_reading
  - marker: d
    text: 'Or: ''y tú que oyes, óyeme, no según un lugar ni según otro pensamiento''.'
    reason: alternative_reading
lexical_decisions:
- source_word: ⲧⲱⲉⲓ
  english_pob_choice: be watchful
  chosen_spanish: Mantente vigilante
  alternatives_spanish:
  - Estate alerta
  - Ten cuidado
  - Mantente en guardia
  lexicon: Crum; Layton
  rationale: El imperativo pide vigilancia activa; 'mantente vigilante' conserva el tono exhortativo sin sonar forzado en español.
- source_word: ⲥⲱⲧⲙ
  english_pob_choice: hear
  chosen_spanish: oír
  alternatives_spanish:
  - escuchar
  lexicon: Crum
  rationale: En este contexto se trata del acto de oír/recibir la voz; 'tu oír' refleja el sustantivo implícito del Coptic y evita convertirlo en un sujeto distinto.
- source_word: ⲙⲡⲣⲣⲁⲧⲥⲱⲧⲙ
  english_pob_choice: do not be deaf
  chosen_spanish: no te hagas sordo
  alternatives_spanish:
  - no seas sordo
  - no te muestres sordo
  - no cierres el oído
  lexicon: Crum
  rationale: El griego/cóptico auditado expresa una negación de sordera o no-escucha; 'no te hagas sordo' preserva la fuerza idiomática y el matiz conductual.
- source_word: ⲙⲁ
  english_pob_choice: place
  chosen_spanish: lugar
  alternatives_spanish:
  - sitio
  - parte
  lexicon: Crum
  rationale: La nota inglesa aclara que la frase puede significar 'en cualquier lugar'; 'lugar' mantiene la concreción espacial y permite esa lectura.
- source_word: ⲕⲁⲧⲁ ⲛⲕⲉⲟⲩⲙⲉⲩⲉ
  english_pob_choice: according to any other thought
  chosen_spanish: según ningún otro pensamiento
  alternatives_spanish:
  - en ningún otro pensamiento
  - ni conforme a otro pensamiento
  - ni bajo ningún otro pensamiento
  lexicon: Greek loanword; Crum
  rationale: '''Según'' reproduce la preposición y conserva la extrañeza del giro; ''pensamiento'' traduce ⲟⲩⲙⲉⲩⲉ y mantiene la tensión entre ubicación y orientación mental.'
- source_word: ⲙⲡⲣⲣⲁⲧⲥⲟⲟⲩⲛ
  english_pob_choice: do not be ignorant
  chosen_spanish: no me ignores
  alternatives_spanish:
  - no seas ignorante de mí
  - no permanezcas ignorante de mí
  - no me desconozcas
  lexicon: Crum
  rationale: El Coptic lleva un prohibitivo con valor de no-ignorancia; en español, 'no me ignores' comunica una exhortación fuerte y natural, aunque el trasfondo sea epistémico.
- source_word: ⲧϣⲟⲣⲡ
  english_pob_choice: the first
  chosen_spanish: el primero
  alternatives_spanish:
  - la primera
  - el que es primero
  lexicon: Crum
  rationale: Se conserva el paralelismo con 'el último' y la autodesignación paradójica del hablante.
- source_word: ⲑⲁⲉ
  english_pob_choice: the last
  chosen_spanish: el último
  alternatives_spanish:
  - la última
  - el final
  lexicon: Crum
  rationale: Es el contrapunto fijo de 'el primero'; 'el último' es la equivalencia más estable y clara en español.
- source_word: ⲁⲛⲟⲕ (…ⲧⲉ)
  english_pob_choice: I am
  chosen_spanish: yo soy
  alternatives_spanish:
  - soy yo
  - yo estoy
  lexicon: Layton (grammar)
  rationale: La copulativa explícita mantiene el paralelismo de las autoafirmaciones y el tono solemne del texto.
theological_decisions:
- issue: Autopresentación paradójica como 'el primero' y 'el último'
  english_pob_reading: For I am the first, and I am the last.
  chosen_spanish_reading: Porque yo soy el primero, y yo soy el último.
  alternative_spanish_readings:
  - Porque soy la primera, y soy la última.
  - Porque yo soy el primero y el último.
  rationale: El texto preserva la fórmula de autoidentificación paradójica sin suavizarla. Se mantiene el masculino gramatical por el hablante no especificado en la fuente; no se introduce una lectura devocional posterior.
  doctrine_reference: Apocalipsis 1:17; 2:8; 22:13 (fórmula de primero y último)
- issue: Relación entre 'oír' y 'no ser sordo'
  english_pob_reading: and as for your hearing, do not be deaf to me in any place or in any other thought
  chosen_spanish_reading: y, en cuanto a tu oír, no te hagas sordo a mí en ningún lugar ni según ningún otro pensamiento
  alternative_spanish_readings:
  - y, respecto de tu oído, no me oigas en ningún lugar ni según ningún otro pensamiento
  - y, en cuanto a tu escuchar, no cierres el oído a mí en ningún lugar ni en ningún otro pensamiento
  rationale: 'Se conserva la tensión auditiva de la corrección revisada: no se trata de ''escucharme'', sino de no oír sordamente a la voz. ''Tu oír'' refleja el sustantivo implícito del original sin imponer un sujeto distinto.'
  doctrine_reference: none
translation_notes:
  revision_awareness: 'La versión inglesa revisada corrigió una mala lectura de la línea cóptica: no dice ''you who hear—hear me'', sino una advertencia a no ser sordos respecto de la voz del hablante. También aclaró que ⲕⲁⲧⲁ ⲙⲁ puede funcionar como ''en cualquier lugar''. La propuesta española sigue esa revisión y conserva la ambigüedad espacial/mental mediante ''en ningún lugar ni según ningún otro pensamiento''.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' fuera de esta unidad porque no aparece el nombre divino.
  - Se conserva el paralelismo 'el primero / el último' sin sustituirlo por una paráfrasis.
  - No se usa 'Cristo' ni 'Mesías' porque el texto no los contiene.
  - Se elige un registro solemne y claro, evitando arcaísmos innecesarios.
  - Las notas usan marcadores únicos y cada una está anclada en el texto donde corresponde.
