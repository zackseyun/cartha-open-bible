  - marker: c
    text: 'O bien, según una lectura anterior: «y tú que oyes, óyeme, no según un lugar ni según otro pensamiento».'
    reason: previous_rendering
  revision_rationale: 'Se corrige ''no me ignores'' a ''no me desconozcas'' para preservar el sentido de no permanecer ignorante respecto de la hablante. Se mejora ''tu oír'' a ''tu oído'' por naturalidad sin perder el valor nominal. Se rehace por completo el sistema de notas para que refleje fielmente la auditoría inglesa: la alternativa léxica de ''watchful'', la nota de incertidumbre de colocación en la cláusula afectada y la lectura anterior solo como antecedente de traducción, no como opción principal actual. También se eliminan marcadores superfluos y se restablece su correspondencia exacta con el texto.'
