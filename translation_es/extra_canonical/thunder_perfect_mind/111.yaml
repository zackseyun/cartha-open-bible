revisions:
- from: 'al que me creó.

    Yo soy la que proclamaré su nombre.

    Miren, pues, sus palabras,

    y todas las escrituras que han sido completadas.

    Escuchen, entonces, ustedes que oyen,

    y también ustedes mismos, los ángeles.'
  to: 'al que me creó.


    Yo soy quien proclamará su nombre.


    Miren, pues, sus palabras,


    y todos los escritos que han sido completados.


    Escuchen, por tanto, oyentes,


    y también ustedes mismos, los ángeles.'
  rationale: 'Se corrigen tres puntos menores: (1) se repara la sintaxis de la autoidentificación futura con «quien proclamará», evitando además imponer género no necesario; (2) se cambia «escrituras» por «escritos» para no introducir una connotación canónica ausente en «writings»; (3) se mejora «ustedes que oyen» a «oyentes» por mayor naturalidad y cercanía al sustento léxico de la auditoría. No hacen falta notas nuevas.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-08T03:17:57Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue en lo esencial la secuencia corregida del copto según la auditoría inglesa: referencia al creador, autoidentificación, proclamación del nombre, exhortación a mirar las palabras/escritos y llamado a los oyentes/ángeles. No reproduce la antigua alucinación de «hearing/speech». Sin embargo, hay pequeños puntos de fidelidad y naturalidad: «la que proclamaré» es gramaticalmente incorrecto en español para el futuro de primera persona y además sobredetermina femenino donde el copto/inglés no lo exige; «escrituras» puede sonar canónicamente cargado frente a «writings»; y «ustedes que oyen» es menos idiomático que «oyentes».'
  spanish_quality_summary: El texto es legible y digno, pero necesita un ajuste menor para español natural y preciso. «Yo soy la que proclamaré» debe repararse; «los escritos que han sido completados» suena más fiel que «las escrituras que han sido completadas» en este contexto fragmentario; y la cadencia mejora con «Escuchen, por tanto, oyentes».
  glossary_alignment: 'No hay términos teológicos del glosario principal en juego. Las decisiones léxicas relevantes están bien encaminadas: ϣⲁϫⲉ → «palabras», ⲛⲁⲅⲅⲉ → «ángeles». Para ⲛⲁⲕⲣⲟⲁⲧⲏⲥ conviene «oyentes» por mayor cercanía al préstamo griego y a la nota inglesa sobre «hearers».'
  issues:
  - severity: high
    issue: «Yo soy la que proclamaré su nombre»
    rationale: 'La construcción es defectuosa en español: mezcla una relativa femenina («la que») con futuro de primera persona sin apoyo contextual. El inglés dice «I am the one who will cry out his name», que en español se vierte naturalmente «Yo soy quien proclamará su nombre» o «Yo soy la que proclamará...». Dado que el género del hablante no debe forzarse aquí en la traducción, «quien proclamará» es la opción más segura.'
  - severity: medium
    issue: «las escrituras» para English POB «the writings»
    rationale: «Escrituras» en español eclesial suele evocar las Escrituras sagradas, pero la auditoría inglesa usa deliberadamente «writings» y señala fragmentación/alineación incierta. «Los escritos» preserva mejor el sentido sin añadir carga canónica.
  - severity: low
    issue: «ustedes que oyen»
    rationale: Es comprensible, pero «oyentes» es más natural, más conciso y refleja mejor el valor de ⲛⲁⲕⲣⲟⲁⲧⲏⲥ / «hearers» documentado en la auditoría.
  revised_spanish_text: 'al que me creó.


