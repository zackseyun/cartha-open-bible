  revision_rationale: 'Se corrigen tres puntos menores: (1) se repara la sintaxis de la autoidentificación futura con «quien proclamará», evitando además imponer género no necesario; (2) se cambia «escrituras» por «escritos» para no introducir una connotación canónica ausente en «writings»; (3) se mejora «ustedes que oyen» a «oyentes» por mayor naturalidad y cercanía al sustento léxico de la auditoría. No hacen falta notas nuevas.'
