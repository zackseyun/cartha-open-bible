translation:
  language: es
  text: 'al que me creó.

    Yo soy la que proclamaré su nombre.

    Miren, pues, sus palabras,

    y todas las escrituras que han sido completadas.

    Escuchen, entonces, ustedes que oyen,

    y también ustedes mismos, los ángeles.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ⲁⲛⲟⲕ ⲡⲉ
  english_pob_choice: I am
  chosen_spanish: Yo soy
  alternatives_spanish:
  - Soy
  lexicon: Layton, Coptic Grammar (usage); Crum
  rationale: Conserva la autoidentificación enfática del copto sin recargar el español; en una declaración poética, «Yo soy» mantiene naturalidad y fuerza.
- source_word: ⲧⲛⲁⲭⲱ ⲙ̄ⲡⲉϥⲣⲁⲛ
  english_pob_choice: I will cry out his name
  chosen_spanish: proclamaré su nombre
  alternatives_spanish:
  - clamaré su nombre
  - gritaré su nombre
  lexicon: Crum, Coptic Dictionary
  rationale: El verbo coptico sugiere la emisión/declamación del nombre; «proclamaré» expresa bien la acción pública y solemne en español sin volverla demasiado coloquial.
- source_word: ϣⲁϫⲉ
  english_pob_choice: words
  chosen_spanish: palabras
  alternatives_spanish:
  - palabra
  - dichos
  lexicon: Crum, Coptic Dictionary
  rationale: El contexto inmediato pide el contenido verbal al que se debe mirar; «palabras» es la opción más directa y fluida en español.
- source_word: ⲥⲙⲏ
  english_pob_choice: hearers/hearing
  chosen_spanish: los que oyen
  alternatives_spanish:
  - oyentes
  - escuchas
  lexicon: Crum, Coptic Dictionary
  rationale: Aunque el inglés POB había tomado «hearers» en el entorno auditivo, aquí el copto disponible en la línea conservada apunta a un llamado directo a quienes oyen; «los que oyen» es claro y no introduce tecnicismo.
- source_word: ⲛⲁⲅⲅⲉ
  english_pob_choice: the angels
  chosen_spanish: los ángeles
  alternatives_spanish:
  - ángeles
  lexicon: loanword; Greek ἄγγελοι
  rationale: El préstamo griego se mantiene con el equivalente español estándar «ángeles», el más fiel y reconocible.
theological_decisions:
- issue: Atribución del sujeto que habla en una sección fragmentaria
  english_pob_reading: The English audit trail shows an earlier hallucinated line about hearing/speech, but the corrected review identifies a sequence of self-identification, proclamation of a name, and address to hearers and angels.
  chosen_spanish_reading: 'Se traduce la secuencia corregida de la fuente: autoidentificación, proclamación del nombre, mandato de mirar las palabras y exhortación a los oyentes y a los ángeles.'
  alternative_spanish_readings:
  - Mantener la vieja línea de «la que oye y la palabra que no puede ser captada»
  - Unir el texto con la versión auditada anterior
  rationale: La revisión posterior indica que la lectura anterior era una contaminación por mala alineación. Para ser fieles al testimonio de la fuente, la traducción debe seguir la secuencia corregida y no repetir el error textual.
  doctrine_reference: Principio de fidelidad textual y control de contaminación por alineación errónea
translation_notes:
  revision_awareness: 'La auditoría en inglés señala explícitamente que la traducción previa era un hallazgo completo por mala alineación con un consult text duplicado. Esta versión sigue la secuencia corregida indicada por la revisión: autoidentificación, proclamación del nombre, mirada a sus palabras, y exhortación final a los oyentes y a los ángeles.'
  spanish_consistency_notes:
  - Se evita una calca de estilo bíblico tradicional donde el español moderno resulta más claro.
  - No se introduce terminología doctrinal ajena a la fuente; se conserva el tono poético y fragmentario del texto.
  - Se mantiene «Yo soy» para la autoidentificación y «ángeles» para el préstamo griego final.
