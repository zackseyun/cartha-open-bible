    rationale: El inglés auditado escogió «utterance» para mantener tono oracular y distinguirlo de «word». «Expresión» es posible, pero más amplia y menos verbal/perfomativa que «enunciación».
  - severity: low
    issue: Puntuación vocativa en la pregunta final
    rationale: Añadir coma en «ustedes, que me odian» mejora la lectura y el registro sin alterar el sentido.
