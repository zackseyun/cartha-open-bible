translation:
  language: es
  text: Soy la voz, cuya resonancia es múltiple[a], y la palabra cuya apariencia es múltiple[b]. Soy la expresión de mi nombre. ¿Por qué, ustedes que me odian, me aman, y odian a los que me aman?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Resonancia'' intenta reflejar el sonido manifiesto y no solo el timbre literal; el griego/cóptico corregido apunta a la cualidad audible de la voz.'
    reason: lexical_alternative
  - marker: b
    text: '''Apariencia'' mantiene el paralelo con ''voz'' y deja abierta la idea de manifestación visible sin imponer una interpretación técnica de ''forma''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲧⲉⲥⲙⲏ
  english_pob_choice: voice
  chosen_spanish: voz
  alternatives_spanish:
  - sonido
  - voz
  lexicon: Crum
  rationale: En este contexto, la lectura corregida exige 'voz' como equivalente natural de 'voice'. 'Sonido' sería posible, pero 'voz' conserva mejor la identidad enunciativa del yo poético.
- source_word: ⲛⲁϣⲱⲥ
  english_pob_choice: manifold
  chosen_spanish: múltiple
  alternatives_spanish:
  - variada
  - abundante
  lexicon: Crum
  rationale: Se traduce con un adjetivo que preserve la idea de multiplicidad sin cargarlo hacia una interpretación doctrinal. 'Múltiple' mantiene la rareza del original.
- source_word: ϩⲣⲟⲟⲩ
  english_pob_choice: sound
  chosen_spanish: resonancia
  alternatives_spanish:
  - sonido
  - eco
  lexicon: Crum
  rationale: El inglés auditado corrige la línea a 'whose sound is manifold'. En español, 'resonancia' permite conservar el matiz audible y evitar la redundancia de 'voz ... sonido'.
- source_word: ⲡⲗⲟⲅⲟⲥ
  english_pob_choice: word
  chosen_spanish: palabra
  alternatives_spanish:
  - Logos
  - Verbo
  lexicon: LSJ / Coptic loanword lists
  rationale: Aunque el audit trail permite 'Word' o 'Logos', aquí 'palabra' es la opción más clara y fiel para un español lector de iglesia, sin perder el paralelismo con 'voz'.
- source_word: ⲛⲁϣⲉ
  english_pob_choice: appearance
  chosen_spanish: apariencia
  alternatives_spanish:
  - aspecto
  - forma
  lexicon: Crum
  rationale: 'Se conserva la idea visible del término corregido por el auditor: ''whose appearance is manifold''. ''Apariencia'' es transparente en español y adecuada al paralelismo.'
- source_word: ⲡϣⲁϫⲉ
  english_pob_choice: utterance
  chosen_spanish: expresión
  alternatives_spanish:
  - declaración
  - enunciado
  lexicon: Crum
  rationale: '''Expresión'' reproduce bien el acto de manifestar el nombre sin sonar demasiado técnico. Evita solaparse con ''palabra'' del verso anterior.'
- source_word: ⲣⲁⲛ
  english_pob_choice: name
  chosen_spanish: nombre
  lexicon: Crum
  rationale: Equivalencia directa y estándar.
- source_word: ⲙⲟⲥⲧⲉ
  english_pob_choice: hate
  chosen_spanish: odiar
  alternatives_spanish:
  - aborrecer
  - detestar
  lexicon: Crum
  rationale: Se mantiene la fuerza fuerte y polémica del verbo, que estructura el contraste retórico del pasaje.
- source_word: ⲙⲉ
  english_pob_choice: love
  chosen_spanish: amar
  alternatives_spanish:
  - querer
  - amar
  lexicon: Crum
  rationale: '''Amar'' conserva el paralelismo agudo con ''odiar'' y el tono paradójico del texto.'
- source_word: ⲉⲧⲃⲉ ⲟⲩ
  english_pob_choice: Why?
  chosen_spanish: ¿Por qué?
  alternatives_spanish:
  - ¿A causa de qué?
  - ¿Por qué motivo?
  lexicon: Crum
  rationale: El auditor corrige este segmento como interrogativo; se traduce de forma directa y natural en español.
translation_notes:
  revision_awareness: 'La versión anterior fue invalidada por una mala lectura grave del Coptic y por arrastrar una línea ajena (''staff/rod/counsel''). Aquí se sigue la revisión auditada: ''Soy la voz... y la palabra...'' con la interrogación final ''¿Por qué...?'' y sin incorporar material de otra sección.'
  spanish_consistency_notes:
  - Se evita 'Verbo' y 'Logos' en el texto principal para no forzar un término técnico donde el español corriente ya expresa bien el paralelo voz/palabra.
  - Se mantiene el contraste 'odiar/amar' como núcleo retórico del pasaje.
  - La puntuación reproduce la estructura sentenciosa del original y la corrección auditada.
