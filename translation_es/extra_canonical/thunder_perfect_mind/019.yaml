base_translation:
  language: en
  yaml_path: translation/extra_canonical/thunder_perfect_mind/019.yaml
  text: I am the voice whose sound is manifold[a], and the word whose appearance is manifold. I am the utterance of my name. Why, you who hate me, do you love me[g][f][e][d][c][b], and hate those who love me?
  footnotes:
  - marker: a
    text: ⲙⲉⲉⲩⲉ can mean thought, understanding, or counsel; I choose “counsel” here to pair an intellectual force with a ‘staff.’ Some English traditions read “power,” which is less direct to the Coptic.
    reason: lexical_alternative
  - marker: b
    text: “He is my rod when I grow old by day” renders ϩⲣⲟⲟⲩ literally; it may be idiomatic for “as I grow old” or “in old age.” ⲥⲙⲏ here is uncertain in the OCR and could reflect an implement term or be confounded with an age-term.
    reason: alignment_note
  - marker: c
    text: ⲡⲗⲟⲅⲟⲥ is left as “Logos” to preserve resonance; “Word” is a reasonable alternative.
    reason: lexical_alternative
  - marker: d
    text: ⲉⲧⲉ ⲛⲁ ϣⲉ ⲡⲉϥⲉⲓⲛⲉ could be rendered “whatever his will will happen/bring to pass,” with an implicit “for me” supplied by context in some translations.
    reason: alternative_reading
  - marker: e
    text: The closing love/hate sayings often mark a transition to the address-to-audience sections in Thunder; their presence here may reflect a stanza boundary issue in the alignment.
    reason: alignment_note
  - marker: f
    text: The staff/rod pairing forms deliberate parallelism of reciprocal support across life-stages.
    reason: parallelism_note
  - marker: g
    text: Or 'I am the staff of his counsel in his youth; and he is my rod when I grow old by day; and the Logos is what his will shall be; I am the utterance of my name—because of those who hate me, you love me, and you hate those who love me.'.
    reason: previous_rendering
