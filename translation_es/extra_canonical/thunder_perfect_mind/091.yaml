translation:
  language: es
  text: 'Yo soy la que está debajo de la tierra[a],

    y ellos suben a mí[b] desde la parte baja de la tierra.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El copto ⲡϩⲟ ⲙⲡⲕⲁϩ podría verterse «inframundo», pero esa opción introduce connotaciones míticas que no están explícitas en el texto; «debajo de la tierra» conserva el sentido locativo con menor carga interpretativa.
    reason: lexical_alternative
  - marker: b
    text: 'La secuencia ⲉⲧⲛⲟⲩϫⲉ ⲙⲙⲟⲥ aparece partida por un salto de línea en el OCR; aquí se entiende como una sola unidad verbal: «suben a mí».'
    reason: source_note
lexical_decisions:
- source_word: ⲡϩⲟ ⲙⲡⲕⲁϩ
  english_pob_choice: beneath the earth
  chosen_spanish: debajo de la tierra
  alternatives_spanish:
  - bajo la tierra
  - en lo profundo de la tierra
  - el inframundo
  lexicon: Crum, Coptic Dictionary (sentido general)
  rationale: El sintagma coptico expresa una ubicación inferior con respecto a la tierra; en español, «debajo de la tierra» conserva el sentido locativo sin introducir el peso mítico de «inframundo». «Tierra» mantiene el alcance cosmológico, no solo suelo o terreno.
- source_word: ⲉⲧⲛⲟⲩϫⲉ
  english_pob_choice: they ascend
  chosen_spanish: suben
  alternatives_spanish:
  - ascienden
  - suben hacia arriba
  - se elevan
  lexicon: Crum (verbo de movimiento ascendente)
  rationale: El valor central es el movimiento hacia arriba. «Suben» es natural en español y comunica la dirección sin perder el impulso ascendente del original; «ascienden» sería más solemne, pero menos directo.
- source_word: ⲙⲙⲟⲥ
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - hacia mí
  - para mí
  lexicon: Morfología pronominal sahídica
  rationale: El pronombre objetivo/direccional se rinde de forma idiomática con «a mí», que expresa meta del movimiento en español de manera clara.
- source_word: ⲉⲃⲟⲗ ϩⲓϫⲙ
  english_pob_choice: from the lower part of the earth
  chosen_spanish: desde la parte baja de la tierra
  alternatives_spanish:
  - desde abajo de la tierra
  - desde lo más bajo de la tierra
  - desde la parte inferior de la tierra
  lexicon: Crum (locución preposicional compuesta)
  rationale: La locución sugiere un origen o punto de partida «desde» una zona inferior. «Parte baja» conserva la idea espacial del griego/coptico sin cargar el texto con formulaciones más interpretativas.
- source_word: ⲕⲁϩ
  english_pob_choice: earth
  chosen_spanish: tierra
  alternatives_spanish:
  - suelo
  - terreno
  - mundo
  lexicon: Crum
  rationale: «Tierra» es la equivalencia más amplia y adecuada en el registro cosmológico del pasaje.
theological_decisions:
- issue: Posible lectura de “below the earth” como “inframundo”
  english_pob_reading: The phrase is rendered “beneath the earth” to preserve the locative sense without importing mythic connotations not explicit in Coptic.
  chosen_spanish_reading: «debajo de la tierra» mantiene la ubicación inferior sin convertirla en un lugar mitológico explícito.
  alternative_spanish_readings:
  - «inframundo»
  - «mundo subterráneo»
  rationale: El copto no exige una identificación con un ámbito de muertos o mito. La elección española evita añadir una carga doctrinal o imaginaria no garantizada por el texto.
  doctrine_reference: Precaución de no sobreespecificar la geografía simbólica del texto
- issue: Mantenimiento del movimiento ascendente explícito
  english_pob_reading: “they ascend to me” preserves the upward motion of the Coptic verb.
  chosen_spanish_reading: «y ellos suben a mí» conserva el ascenso y la dirección hacia la hablante.
  alternative_spanish_readings:
  - «y ascienden a mí»
  - «y vienen hacia mí»
  rationale: El verbo debe seguir indicando movimiento vertical. «Suben» es más natural en español y conserva la fuerza del original; «vienen» perdería la verticalidad.
  doctrine_reference: Respeto al valor aspectual y direccional del verbo
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios, pero el control cruzado marcó problemas mayores; por eso se mantiene una solución conservadora que sigue de cerca el sentido espacial del copto y evita ampliaciones interpretativas.
  spanish_consistency_notes:
  - Se mantiene «tierra» para ⲕⲁϩ en todo el segmento.
  - Se evita «inframundo» en el texto principal para no introducir una lectura no explicitada por la fuente.
  - Se conserva la primera persona femenina del original con «la que está» y «a mí», sin agregar títulos o glosas.
  - 'El ritmo de dos miembros se preserva: una afirmación de ubicación y una de movimiento ascendente.'
