lexical_decisions:
- source_word: ⲥⲁⲃⲟⲗ
  english_pob_choice: Justice
  chosen_spanish: Justicia
  alternatives_spanish:
  - rectitud
  - derechura
  - justeza
  lexicon: Crum, Coptic Dictionary (1939)
  rationale: El término coptic ⲥⲁⲃⲟⲗ cubre la idea de lo recto/justo y puede personificarse en esta voz en primera persona. 'Justicia' mantiene esa fuerza abstracta y personificada en español, con claridad natural para un registro bíblico-literario.
- source_word: implied_legal_role
  english_pob_choice: advocate
  chosen_spanish: abogada
  alternatives_spanish:
  - defensora
  - abogada defensora
  - defensora jurídica
  lexicon: Decisión contextual/legal a partir del encuadre del segmento
  rationale: La nota inglesa señala que la función legal se infiere del encuadre del segmento. En español, 'abogada' comunica mejor esa función que un calco más opaco, y conserva el paralelismo breve de las declaraciones 'Soy...'. El femenino sigue la personificación del hablante.
theological_decisions:
- issue: Personificación de un atributo moral/jurídico en primera persona
  english_pob_reading: I am Justice; I am the advocate.
  chosen_spanish_reading: Soy Justicia; soy la abogada.
  alternative_spanish_readings:
  - Yo soy Justicia; yo soy la abogada.
  - Soy la Justicia; soy la abogada.
  rationale: Se conserva la personificación retórica del original y del inglés POB, sin convertirla en explicación abstracta. El español admite la omisión del pronombre por énfasis estilístico; la mayúscula en 'Justicia' ayuda a señalar la personificación sin añadir palabras extra.
  doctrine_reference: Convención literaria/retórica del texto; no hay afirmación doctrinal cristiana directa en este segmento.
translation_notes:
  revision_awareness: El contexto de auditoría inglesa marca el pasaje como de concordancia problemática y con una nota de alineación provisional para 'advocate'. Por eso la versión española mantiene una formulación breve y revisable, evitando ampliar el contenido más allá de lo que el testimonio fuente y la segmentación permiten.
  spanish_consistency_notes:
  - Se preserva el paralelismo breve de dos declaraciones en primera persona.
  - '''Justicia'' se usa como término personificado, no como simple abstracción explicativa.'
  - '''abogada'' sigue la inferencia legal del audit trail inglés, sin sobrecargar el verso con un giro más interpretativo.'
