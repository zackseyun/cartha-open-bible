translation:
  language: es
  text: 'Yo soy la que no guarda festividad[a][b],

    y yo soy la que tiene festividades en gran número.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Festividad» también puede traducir el matiz de «fiesta» o «banquete» asociado al préstamo griego ἑορτή.
    reason: lexical_alternative
  - marker: b
    text: «En gran número» puede entenderse también como «son muchas» o «son abundantes», según la lectura de ⲕⲁϩ.
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲙⲛⲧⲁⲧ(ⲉⲟⲣⲧⲏ)
  english_pob_choice: keeps no festival
  chosen_spanish: no guarda festividad
  alternatives_spanish:
  - no celebra festividad
  - está sin festividad
  - no tiene festividad
  lexicon: Crum s.v. ἑορτή; Layton, A Coptic Grammar (forma nominal privativa)
  rationale: En español, «guardar festividad» conserva la idea de observar una fiesta ritual sin volverla demasiado técnica. «No guarda festividad» mantiene la fuerza privativa del original y el paralelo poético con la segunda mitad.
- source_word: ϩⲛ ⲟⲩ ⲕⲁϩ
  english_pob_choice: are many
  chosen_spanish: en gran número
  alternatives_spanish:
  - son muchas
  - son abundantes
  - en multitud
  lexicon: Crum s.v. ⲕⲁϩ (multitud/abundancia)
  rationale: La lectura apunta a abundancia o multitud. «En gran número» conserva la incertidumbre del valor exacto y sigue de cerca la idea de multiplicidad sin fijar innecesariamente un matiz cuantitativo único.
- source_word: ⲡⲁⲓ …
  english_pob_choice: I am she who
  chosen_spanish: Yo soy la que
  alternatives_spanish:
  - Yo soy la que es
  - Yo soy aquella que
  - Yo soy la mujer que
  lexicon: Layton, A Coptic Grammar (construcción relativa predicativa con demostrativo)
  rationale: La voz poética es femenina y repetitiva; «Yo soy la que» preserva el género, la solemnidad y la estructura paralelística mejor que una paráfrasis más libre.
translation_notes:
  revision_awareness: Texto alineado con la consulta coptica y con la traducción inglesa auditada; se conserva el paralelismo antitético y la ambigüedad léxica señalada en el aparato inglés. No se registran revisiones posteriores con cambios sustantivos.
  spanish_consistency_notes:
  - Se mantiene el sujeto femenino explícito («la que») para reproducir la voz del poema.
  - Se evita «Cristo», «Señor» u այլ terminología no presente en el fragmento.
  - La puntuación conserva el encabalgamiento y la simetría de las dos proposiciones.
