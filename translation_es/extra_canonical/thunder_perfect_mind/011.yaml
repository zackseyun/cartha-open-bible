lexical_decisions:
- source_word: ⲡⲥⲟⲗⲥⲗ
  english_pob_choice: members
  chosen_spanish: miembros
  alternatives_spanish:
  - partes del cuerpo
  - miembros del cuerpo
  - extremidades
  lexicon: Crum, s.v. ⲥⲱⲗ / ⲥⲟⲗ
  rationale: «Miembros» conserva el valor colectivo de partes corporales y mantiene, como en la solución inglesa, una resonancia más amplia que una referencia puramente anatómica. En español también puede sugerir pertenencia orgánica y relación corporal sin cerrar el sentido a «extremidades».
- source_word: ⲛⲁϣⲉ
  english_pob_choice: barren one
  chosen_spanish: la estéril
  alternatives_spanish:
  - la mujer estéril
  - la infecunda
  - la infértil
  lexicon: Crum, s.v. ⲛⲁϣⲉ
  rationale: El texto exige una designación personificada; «la estéril» reproduce la concisión del original y de la solución inglesa, sin añadir un sustantivo innecesario. En español, la forma femenina es la más natural porque el contexto ya es explícitamente femenino.
- source_word: ⲛⲉⲥϣⲏⲣⲉ
  english_pob_choice: her children
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus niños
  - sus descendientes
  - sus criaturas
  lexicon: Crum, s.v. ϣⲏⲣⲉ
  rationale: Aunque el inglés POB opta por «children», en español «hijos» es la correspondencia más idiomática y suficientemente amplia para el plural con posesivo femenino. Mantiene el contraste paradojal sin volverlo demasiado neutro o explicativo.
- source_word: ⲁⲛⲟⲕ ⲧⲉ
  english_pob_choice: I am
  chosen_spanish: Yo soy
  alternatives_spanish:
  - Soy
  - Soy yo
  lexicon: Gramática copta de Layton, uso de la cópula de 1ª persona singular
  rationale: Se conserva la cadencia repetitiva del enunciado en primera persona. «Yo soy» suena natural en español y preserva la fuerza enfática del copto sin reescritura interpretativa.
- source_word: ⲁⲩⲱ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - También
  - Además
  lexicon: Crum, s.v. ⲁⲩⲱ
  rationale: La conjunción simple reproduce la parataxis del original. «Y» mantiene el enlace directo entre las autoidentificaciones sin suavizar la tensión poética.
- source_word: (genitival phrase for “of my mother”)
  english_pob_choice: of my mother
  chosen_spanish: de mi madre
  alternatives_spanish:
  - de la madre
  - de mi Madre
  lexicon: Crum, s.v. ⲙⲁⲩ (madre)
  rationale: La posesión se expresa de manera directa y clara en español. Se evita capitalizar «Madre» porque el contexto no exige una lectura titulativa; la forma común transmite mejor el vínculo corporal aludido por el texto.
theological_decisions:
- issue: 'Valoración de la paradoja «la estéril: sus hijos son muchos»'
  english_pob_reading: The line is preserved as a paradoxical self-identification without resolving whether it should be read figuratively or literally.
  chosen_spanish_reading: La frase se mantiene como paradoja poética, sin explicarla ni armonizarla.
  alternative_spanish_readings:
  - La mujer estéril, cuyos hijos son muchos
  - La estéril, aunque sus hijos son muchos
  rationale: El copto y la auditoría inglesa conservan la tensión retórica. El español debe dejar intacta esa oscilación entre esterilidad y fecundidad múltiple, sin convertirla en una explicación doctrinal o alegórica cerrada.
  doctrine_reference: Poética de la paradoja; no se propone una definición doctrinal
