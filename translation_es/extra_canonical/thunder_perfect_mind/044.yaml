translation:
  language: es
  text: Yo soy ella — la griega y la bárbara[a][c][d]; yo soy ella que se manifestará[b] en Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Griega» y «bárbara» reproducen en singular un binario grecorromano que contrasta a los griegos con los no griegos; Thunder abraza con frecuencia ambos lados de esos pares.
    reason: cultural_note
  - marker: b
    text: O, «aparecerá». «Se manifestará» se elige para conservar un matiz revelatorio y solemne.
    reason: lexical_alternative
  - marker: c
    text: El copto muestra artículos plurales («los griegos … los bárbaros»). Aquí se usa un par singular para conservar la cadencia de autoidentificación; el sentido sigue siendo inclusivo de ambos colectivos.
    reason: parallelism_note
  - marker: d
    text: El OCR de este bloque incluye segmentos iniciales inciertos y la consulta en inglés no corresponde exactamente a estas líneas; por eso la traducción se limita a las frases seguras del pasaje.
    reason: alignment_note
lexical_decisions:
- source_word: ⲁⲛⲟⲕ ⲧⲉ
  english_pob_choice: I am she
  chosen_spanish: Yo soy ella
  alternatives_spanish:
  - Yo soy (femenino)
  - Yo soy la que soy (en femenino)
  lexicon: Layton, Coptic Grammar; uso de la forma femenina en Thunder
  rationale: Conserva la voz femenina autoidentificadora del original y sigue la cadencia repetida del pasaje, sin convertirla en una fórmula más interpretativa.
- source_word: ⲛⲉⲗⲗⲏⲛ
  english_pob_choice: the Greeks
  chosen_spanish: la griega
  alternatives_spanish:
  - los griegos
  - las griegas
  lexicon: Crum, Coptic Dictionary (Ἕλλην)
  rationale: El artículo plural copto señala un colectivo, pero en este dicho la POB inglesa opta por una identidad singular para sostener la cadencia de autoidentificación. En español, la singular femenina mantiene ese ritmo y la voz de “ella”, aunque la referencia sigue abarcando al conjunto greco-hablante.
- source_word: ⲛⲃⲁⲣⲃⲁⲣⲟⲥ
  english_pob_choice: the barbarian
  chosen_spanish: la bárbara
  alternatives_spanish:
  - los bárbaros
  - las bárbaras
  lexicon: Crum; préstamo griego βάρβαρος
  rationale: 'Sigue la misma estrategia que para ⲛⲉⲗⲗⲏⲛ: se conserva el par identitario en singular para no romper el paralelismo retórico, aunque el copto tenga forma plural.'
- source_word: ⲥⲉⲓⲛⲉ
  english_pob_choice: be manifest
  chosen_spanish: será manifestada
  alternatives_spanish:
  - aparecerá
  - será vista
  lexicon: Crum; uso en literatura gnóstica
  rationale: “Manifestada” preserva el matiz revelatorio y solemne de la POB inglesa; en español suena más natural que un calco rígido y mantiene la pasiva/resultativa implícita.
- source_word: ⲕⲏⲙⲉ
  english_pob_choice: Egypt
  chosen_spanish: Egipto
  alternatives_spanish:
  - Kemet
  lexicon: Crum (topónimo nativo copto para Egipto)
  rationale: Se traduce el topónimo por la forma común en español para inteligibilidad pública; “Kemet” queda como opción especializada, pero no es necesaria aquí.
theological_decisions:
- issue: Autorreferencia femenina y pares identitarios universales
  english_pob_reading: I am she — the Greek and the barbarian
  chosen_spanish_reading: Yo soy ella — la griega y la bárbara
  alternative_spanish_readings:
  - Yo soy ella — la griega y la bárbara/los bárbaros
  - Yo soy la griega y la bárbara
  rationale: No se neutraliza la voz femenina del poema ni se sustituye el par cultural por un giro eclesiástico tradicional. La formulación conserva la tensión entre singularidad de la voz y amplitud inclusiva del contraste cultural.
  doctrine_reference: Poética gnóstica del texto; no se introduce una lectura dogmática ajena al fragmento
translation_notes:
  revision_awareness: Se siguió el estado de revisión más reciente (“unchanged”) y el aviso de alineación dudosa; la versión española se mantiene restringida a los segmentos seguros, sin intentar resolver las zonas inciertas del OCR.
  spanish_consistency_notes:
  - Se conserva “Yo soy ella” para respetar la voz femenina recurrente del texto.
  - Se usa “manifestada” para reflejar el valor revelatorio de be manifest.
  - Se traduce el topónimo como “Egipto” por claridad pública.
  - Se mantienen los artículos/pares con concordancia femenina en español para sostener la estrategia retórica del inglés POB.
