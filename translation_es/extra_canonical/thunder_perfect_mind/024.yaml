  yaml_path: translation/extra_canonical/thunder_perfect_mind/024.yaml
  text: 'Know me, let them know me.

    For I am knowledge and ignorance.

    I am shame and boldness.

    I am shameless; I am ashamed.

    I am strength, and'
  footnotes:
  - marker: a
    text: Parrhesia (ⲡⲁⲣⲣⲏⲥⲓⲁ) can mean frank speech, outspokenness, or confident boldness in public.
    reason: lexical_alternative
  - marker: b
    text: ϫⲓⲡⲏⲧ is a distinct term from ϣⲓⲡⲉ; it often denotes modesty or bashfulness rather than disgrace.
    reason: lexical_alternative
  - marker: c
    text: The initial line could be read as “Wise ones, be wise,” depending on how the jussive ⲙⲁⲣⲟⲩ is construed with ⲥⲟⲩⲱⲛⲧ.
    reason: alignment_note
  - marker: d
    text: Or 'Let the wise be wise.'.
    reason: previous_rendering
  - marker: e
    text: Or 'I am fear too.'.
    reason: previous_rendering
  - marker: f
    text: Or 'I am without shame; I am bashfulness.'.
    reason: previous_rendering
