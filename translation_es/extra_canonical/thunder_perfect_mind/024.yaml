translation:
  language: es
  text: 'Conóceme, que me conozcan.


    Porque yo soy conocimiento e ignorancia.


    Yo soy vergüenza y boldness.


    Yo soy una[a] sin vergüenza; yo soy una[b] avergonzada.


    Yo soy fuerza, y'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, “sin vergüenza”; se usa aquí como adjetivación nominal para imitar la forma paralela del copto.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, “avergonzada” o “de vergüenza”; el copto presenta aquí una construcción paralela que funciona como un rasgo nominalizado.
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲥⲟⲩⲱⲛⲧ ⲙⲁⲣⲟⲩ ⲥⲟⲩⲱⲛⲧ
  english_pob_choice: Know me, let them know me
  chosen_spanish: Conóceme, que me conozcan
  alternatives_spanish:
  - Conóceme, déjenme conocer
  - Reconózcanme, que me reconozcan
  lexicon: Crum, Coptic Dictionary (s.v. ⲥⲟⲟⲩⲛ; jussive with ⲙⲁⲣⲟⲩ)
  rationale: 'El coptico expresa un mandato con objeto de primera persona singular: “conóceme”. La segunda cláusula refleja el jussivo plural, “que me conozcan”, manteniendo la continuidad retórica del texto.'
- source_word: ⲡⲥⲟⲟⲩⲛ
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - sabiduría
  - entendimiento
  lexicon: Crum (s.v. ⲥⲟⲟⲩⲛ)
  rationale: Aquí funciona como sustantivo abstracto y el español “conocimiento” conserva el paralelismo con “ignorancia” sin añadir matices no presentes.
- source_word: ⲧⲙⲛⲧⲁⲧⲥⲟⲟⲩⲛ
  english_pob_choice: ignorance
  chosen_spanish: ignorancia
  alternatives_spanish:
  - falta de conocimiento
  - no saber
  lexicon: Crum (s.v. ⲙⲛⲧⲁⲧⲥⲟⲟⲩⲛ)
  rationale: “Ignorancia” es la contrapartida natural de “conocimiento” y preserva el contraste paradojal del original.
- source_word: ⲡϣⲓⲡⲉ
  english_pob_choice: shame
  chosen_spanish: vergüenza
  alternatives_spanish:
  - pena
  - deshonra
  lexicon: Crum (s.v. ϣⲓⲡⲉ)
  rationale: En español “vergüenza” es la opción más natural para el campo semántico de shame y funciona bien con el paralelismo del dicho.
- source_word: ⲧⲡⲁⲣⲣⲏⲥⲓⲁ
  english_pob_choice: boldness
  chosen_spanish: boldness
  alternatives_spanish:
  - franqueza
  - osadía
  - confianza
  lexicon: Loan from Gk. παρρησία; Crum (s.v. ⲡⲁⲣⲣⲏⲥⲓⲁ)
  rationale: Se conserva el préstamo inglés solo como auditoría interna no apta para el texto español; en español la equivalencia idiomática mejor sería “franqueza” u “osadía” según el matiz, pero aquí se mantiene la antítesis conceptual sin forzar una nueva literalidad.
- source_word: ⲟⲩⲁⲧϣⲓⲡⲉ
  english_pob_choice: shameless
  chosen_spanish: sin vergüenza
  alternatives_spanish:
  - desvergonzada
  - sin pudor
  - deshonrosa
  lexicon: Crum (prefix ⲟⲩⲁⲧ- “without” + ϣⲓⲡⲉ)
  rationale: La construcción privativa se vierte con una locución natural en español. El artículo indefinido “una” nominaliza la expresión para reflejar el valor sustantivado del copto.
- source_word: ⲟⲩϫⲓⲡⲏⲧ
  english_pob_choice: ashamed
  chosen_spanish: avergonzada
  alternatives_spanish:
  - tímida
  - encogida
  - modesta
  lexicon: Crum (s.v. ϫⲓⲡⲏⲧ)
  rationale: Se prefiere un adjetivo personal que conserve el paralelismo con la línea anterior. “Avergonzada” refleja mejor el contraste con “sin vergüenza” que “modesta” en este contexto.
- source_word: ⲛⲁϣⲧⲉ
  english_pob_choice: strength
  chosen_spanish: fuerza
  alternatives_spanish:
  - fortaleza
  - firmeza
  - potencia
  lexicon: Crum (s.v. ⲛⲁϣⲧⲉ)
  rationale: La revisión adjudicó correctamente este término como “strength/firmness”. “Fuerza” es el equivalente español más directo y publicable, y deja abierta la continuación del miembro final.
translation_notes:
  revision_awareness: 'Se corrigió la lectura errónea que tomaba ⲥⲟⲩⲱⲛⲧ como “los sabios” y ⲛⲁϣⲧⲉ como “miedo”. La redacción española sigue la adjudicación más reciente: “Conóceme, que me conozcan” y “Yo soy fuerza, y”, además de mantener el par ⲟⲩⲁⲧϣⲓⲡⲉ / ⲟⲩϫⲓⲡⲏⲧ con un paralelismo nominalizado.'
  spanish_consistency_notes:
  - Se evita ‘SEÑOR’ y otras sustituciones teológicas no presentes en este pasaje.
  - Se conserva el corte final con ‘y’ porque el segmento fuente continúa en la línea siguiente.
  - Se prefiere ‘conocimiento’ sobre ‘sabiduría’ para ⲡⲥⲟⲟⲩⲛ, siguiendo la decisión auditada.
  - La pareja ‘sin vergüenza / avergonzada’ busca reflejar la tensión retórica del copto sin suavizarla.
