    text: ⲭⲓⲥⲃⲱ can be rendered ‘whisper against’ or ‘revile,’ highlighting secretive or abusive speech.
    reason: lexical_alternative
  - marker: b
    text: ⲛⲟⲩⲟⲛϩ ⲉⲃⲟⲗ is taken as an adverbial ‘in the open’; the exact idiomatic value is uncertain in this line’s segmentation.
    reason: alignment_note
  - marker: c
    text: The public/private contrast (‘in the open’/‘in your soul’) is a recurrent device in Thunder, pairing overt acknowledgment with hidden opposition.
    reason: parallelism_note
  - marker: d
    text: Or 'you who prosper in the open'.
    reason: previous_rendering
  - marker: e
    text: Or 'and you cry out.'.
    reason: previous_rendering
  - marker: f
    text: Or 'and you slander in your soul.'.
    reason: previous_rendering
  - marker: g
    text: 'Or ''Those who know me: I am the one.''.'
    reason: previous_rendering
