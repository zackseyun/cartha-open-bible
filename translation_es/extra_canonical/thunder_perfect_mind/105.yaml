translation:
  language: es
  text: 'Me ven[a], expulsada de entre ustedes,


    y son derrotados.


    Escúchenme, los que oyen,


    y aprendan mis palabras,


    ustedes que me conocen.


    Yo soy...'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La lectura sigue la corrección fuente-fundada del audit trail: aquí el sentido no es ''prosperar'', sino ser expulsada o arrojada desde dentro de ellos. Por eso se traduce con lenguaje de expulsión.'
    reason: source_note
lexical_decisions:
- source_word: ⲧⲉⲧⲛⲛⲁⲩ ⲉⲣⲟⲓ
  english_pob_choice: you look on me
  chosen_spanish: Me ves
  alternatives_spanish:
  - Me miras
  - Me ves de frente
  lexicon: Crum; Layton
  rationale: Se conserva la relación directa del verbo de ver/mirar hacia la primera persona. En español, 'me ves' suena natural y mantiene la inmediatez del reproche o constatación.
- source_word: ⲙⲡⲉⲧⲛⲥⲁⲛϩⲟⲩ
  english_pob_choice: cast out from yourselves
  chosen_spanish: echada de vosotros
  alternatives_spanish:
  - expulsada de vosotros
  - arrojada de vosotros
  lexicon: Crum 345a; revisión fuente-grounded
  rationale: La revisión textual corrige la lectura previa; el sentido es un estado de ser expulsada/rechazada 'de dentro de vosotros'. En español se reduce a 'echada de vosotros' para conservar la imagen de expulsión sin sobreexplicar.
- source_word: ⲧⲉⲧⲛⲣⲥⲱⲧⲉ
  english_pob_choice: you are defeated
  chosen_spanish: sois derrotados
  alternatives_spanish:
  - son vencidos
  - fracasáis
  lexicon: Crum 363a; revisión fuente-grounded
  rationale: 'Se sigue la corrección del audit trail: no es ''gritar'', sino ''ser derrotados''/''fallar''. ''Sois derrotados'' conserva el paralelo antitético y el tono sentencioso.'
- source_word: ⲥⲱⲧⲙ ⲉⲣⲟⲓ
  english_pob_choice: listen to me
  chosen_spanish: Escuchadme
  alternatives_spanish:
  - Oídme
  - Escúchenme
  lexicon: Standard Sahidic usage
  rationale: '''Escuchadme'' recoge el imperativo apelativo y funciona bien en registro poético. Mantiene el carácter de exhortación directa.'
- source_word: ⲁⲕⲣⲟⲁⲧⲏⲥ
  english_pob_choice: hearers
  chosen_spanish: ustedes que oyen
  alternatives_spanish:
  - oyentes
  - los que oyen
  lexicon: Greek loanword ἀκροατής
  rationale: Se evita 'oyentes' por sonoridad menos natural en este contexto, pero se conserva la idea de quienes escuchan/oyen. 'Ustedes' ajusta el registro a español neutral latinoamericano.
- source_word: ⲭⲓⲥⲃⲱ
  english_pob_choice: learn my words
  chosen_spanish: aprendan mis palabras
  alternatives_spanish:
  - reciban mi enseñanza
  - aprendan de mí
  lexicon: Crum 319b; revisión fuente-grounded
  rationale: La corrección textual entiende este verbo como 'aprender/recibir enseñanza'. 'Aprendan mis palabras' es fiel al contenido y natural en español.
- source_word: ⲛⲉⲧⲥⲟⲟⲩⲛ ⲙⲙⲟⲓ
  english_pob_choice: you who know me
  chosen_spanish: ustedes que me conocen
  alternatives_spanish:
  - los que me conocen
  - quienes me conocen
  lexicon: Standard Sahidic
  rationale: Se conserva la relativa directa y el segundo plural explícito. 'Conocerme' expresa la relación personal implícita en el original.
- source_word: ⲁⲛⲟⲕ ⲡⲉ
  english_pob_choice: I am the one
  chosen_spanish: Yo soy...
  alternatives_spanish:
  - Yo soy
  - Yo soy la que soy
  lexicon: Standard copular formula
  rationale: El pasaje continúa con una fórmula de autoidentificación, pero el segmento dado corta la frase. Se deja con puntos suspensivos para respetar la discontinuidad textual sin inventar un complemento.
translation_notes:
  revision_awareness: 'El audit trail inglés contiene una revisión importante: la lectura previa ''you who prosper in the open / and you cry out / and you slander in your soul'' fue corregida como una mala interpretación del Coptic OCR. La traducción española sigue la lectura revisada: ''Me ves, echada de vosotros, y sois derrotados. Escuchadme... aprendan mis palabras... Yo soy...''.'
  spanish_consistency_notes:
  - Se mantiene un registro poético y directo, con segunda persona plural explícita.
  - Se usa 'ustedes' junto con formas verbales de segunda persona plural cuando ayuda a la fluidez, evitando arcaísmos.
  - No se introduce terminología cristiana tradicional ajena al texto; se prioriza la restitución de la línea según la revisión textual.
  - Se conserva la elipsis final porque el segmento termina en fórmula incompleta de autoidentificación.
