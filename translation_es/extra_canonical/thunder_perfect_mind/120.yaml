translation:
  language: es
  text: Me encontrarán en el lugar que está allí, y vivirán, y no perecerán. Por eso, no se resistan a oírme.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ⲥⲉⲛⲁϭⲓⲛⲉ
  english_pob_choice: will find
  chosen_spanish: me encontrarán
  alternatives_spanish:
  - me hallarán
  - me encontrarán allí
  lexicon: Crum; Layton
  rationale: El verbo copt. ϭⲓⲛⲉ puede expresar hallar/encontrar, y el contexto revisado exige un resultado de búsqueda, no una exhortación a obedecer. ‘Encontrarán’ reproduce bien la acción futura y natural en español.
- source_word: ⲙⲡⲙⲁ ⲉⲧⲙⲙⲁⲩ
  english_pob_choice: the place that is there
  chosen_spanish: el lugar que está allí
  alternatives_spanish:
  - el lugar que está allá
  - el lugar de allí
  lexicon: Crum
  rationale: La deixis del copto ⲉⲧⲙⲙⲁⲩ se conserva con ‘allí’, y ‘lugar que está allí’ sigue de cerca la estructura sin sonar rígido en español.
- source_word: ⲱⲛϩ
  english_pob_choice: live
  chosen_spanish: vivirán
  alternatives_spanish:
  - estarán vivos
  - tendrán vida
  lexicon: Crum
  rationale: ‘Vivirán’ mantiene la sencillez verbal del original y corresponde al uso narrativo-futuro del pasaje.
- source_word: ⲛⲥⲉⲧⲙⲥⲱⲧ ⲉⲃⲟⲗ
  english_pob_choice: they will not perish
  chosen_spanish: no perecerán
  alternatives_spanish:
  - no se perderán
  - no serán destruidos
  lexicon: Crum; audit trail revision
  rationale: La revisión final del inglés aclara que la negación expresa ausencia de perecer. En español, ‘no perecerán’ es directo, fiel y no introduce una paráfrasis interpretativa adicional.
- source_word: ⲙⲡⲣⲣⲁⲧⲥⲱⲧⲙ ⲛⲥⲱⲓ
  english_pob_choice: do not be disobedient to me
  chosen_spanish: no me desobedezcan
  alternatives_spanish:
  - no se nieguen a obedecerme
  - no se resistan a oírme
  lexicon: Layton Syntax; Crum
  rationale: El negativo jussivo con ⲣⲁⲧ- más ‘oír’ en el audit trail apunta a una desobediencia/hecho de no atender. La formulación española ‘no me desobedezcan’ expresa mejor esa fuerza que una mera ‘no escuchen’.
translation_notes:
  revision_awareness: 'El texto inglés pasó por una revisión importante: se corrigió una lectura previa que añadía ángeles y espíritus, y se estableció que el pasaje dice que ‘me encontrarán en el lugar que está allí, y vivirán, y no perecerán; por eso, no me desobedezcan’. La versión española sigue esa lectura revisada y evita toda adición no sustentada por el copto.'
  spanish_consistency_notes:
  - Se preservó el valor deíctico de ⲉⲧⲙⲙⲁⲩ con ‘allí’ en vez de neutralizarlo.
  - No se introdujo material del testimonio previo con ángeles/espíritus, porque la revisión crítica lo descartó.
  - Se mantuvo un tono imperativo sobrio y publicable, acorde con el registro del POB.
  - Se eligió ‘desobedezcan’ para reflejar la relación entre oír/hear y obediencia en el trasfondo copto sin sobrecargar la frase.
