review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue en general la revisión inglesa correcta: refleja ‘me encontrarán’, ‘el lugar que está allí’, ‘vivirán’ y ‘no perecerán’, y evita la antigua alucinación sobre ángeles y espíritus. Sin embargo, la apertura con ‘Y’ no está motivada en español como inicio autónomo del bloque y suena demasiado dependiente del contexto previo; además, la cláusula final puede alinearse mejor con el matiz auditivo/obediencial documentado en el rastro de auditoría.'
  spanish_quality_summary: El texto es claro y legible, pero ‘Y me encontrarán…’ como arranque de unidad queda algo tosco en español. ‘No me desobedezcan’ es comprensible, aunque reduce el matiz de atender/escuchar presente en el copto y en las decisiones léxicas auditadas. Una formulación como ‘no se resistan a oírme’ preserva mejor ese valor sin volverse rígida.
  glossary_alignment: No hay términos del glosario principal especialmente implicados aquí. El borrador respeta bien las decisiones léxicas relevantes del pasaje, salvo que en ⲙⲡⲣⲣⲁⲧⲥⲱⲧⲙ ⲛⲥⲱⲓ conviene reflejar el componente de ‘oír/escuchar’ documentado en la rationale, no solo ‘desobedecer’.
  issues:
  - severity: medium
    issue: 'Conjunción inicial innecesaria: ‘Y me encontrarán…’'
    rationale: Como segmento autónomo en español, comenzar con ‘Y’ suena dependiente y menos natural. El valor conjuntivo no necesita conservarse si perjudica la fluidez; ‘Me encontrarán…’ mantiene el sentido.
  - severity: medium
    issue: La cláusula final ‘no me desobedezcan’ estrecha demasiado el matiz del copto
    rationale: El audit trail documenta para ⲙⲡⲣⲣⲁⲧⲥⲱⲧⲙ ⲛⲥⲱⲓ una idea de no demorarse/no resistirse a oír. ‘No me desobedezcan’ comunica resultado pragmático, pero pierde el componente explícito de oír/escuchar que conviene conservar en español.
  revised_spanish_text: Me encontrarán en el lugar que está allí, y vivirán, y no perecerán. Por eso, no se resistan a oírme.
  revision_rationale: Se quita la conjunción inicial para mejorar la naturalidad del español en un bloque independiente y se ajusta la última cláusula para reflejar mejor el matiz de ‘oír/atender’ documentado en el copto y en la auditoría inglesa, sin apartarse del sentido exhortativo.
