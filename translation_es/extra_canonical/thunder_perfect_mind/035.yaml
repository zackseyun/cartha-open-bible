    text: ⲛ̄ⲧⲉⲧⲛ̄ with ⲧⲁⲉⲅⲕⲣⲁⲧⲉⲓⲁ could also be read as “of you (pl.),” i.e., “my self‑control concerning you” or “over you.”
    reason: alignment_note
  - marker: b
    text: ⲧⲏⲛⲉ marks intensity; alternatives include “much” or “exceedingly.”
    reason: lexical_alternative
  - marker: c
    text: ⲥⲁϩⲟⲩ ⲙ̄ⲡⲁϣⲟⲩϣⲟⲩ could be understood more concretely as “the band of slaughter,” hence “those killed in violence.”
    reason: alignment_note
