  yaml_path: translation/extra_canonical/thunder_perfect_mind/035.yaml
  text: 'Do not despise my lowliness[a];

    and my self-control toward you—love her in my poverty.

    Do not laugh at me excessively;

    and do not despise my fault[d][c][b], and do not curse my boasting.'
  footnotes:
