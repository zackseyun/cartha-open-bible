translation:
  language: es
  text: 'No desprecies mi bajeza[a];

    y mi dominio propio hacia ustedes—ámala en mi pobreza.

    No te rías excesivamente de mí[b];

    y no desprecies mi falta, y no maldigas mi jactancia.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ⲙ̄ⲡⲣ̄ⲙⲉⲥⲧⲉ puede entenderse también como “no aborrezcas” o “no desdenes”; “desprecies” conserva bien el tono de rechazo del original.
    reason: lexical_alternative
  - marker: b
    text: ⲧⲏⲛⲉ intensifica la acción; también podría traducirse “mucho” o “en exceso”.
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲙ̄ⲡⲣ̄ⲙⲉⲥⲧⲉ
  english_pob_choice: do not despise
  chosen_spanish: No desprecies
  alternatives_spanish:
  - No aborrezcas
  - No desdenes
  lexicon: Crum, s.v. ⲙⲉⲥⲧⲉ
  rationale: El imperativo negativo pide una forma breve y fuerte; «despreciar» conserva bien el tono de rechazo o menosprecio sin volver el español arcaico.
- source_word: ⲙⲛ̄ⲧⲥⲧⲙⲏⲧ
  english_pob_choice: lowliness
  chosen_spanish: bajeza
  alternatives_spanish:
  - humillación
  - insignificancia
  - humildad
  lexicon: Crum, s.v. ⲥⲧⲙⲏⲧ
  rationale: «Bajeza» comunica estado bajo o despreciable; evita convertir el término en una virtud interior como «humildad», que sería menos fiel al matiz del sustantivo.
- source_word: ⲉⲅⲕⲣⲁⲧⲉⲓⲁ
  english_pob_choice: self-control
  chosen_spanish: dominio propio
  alternatives_spanish:
  - autocontrol
  - continencia
  - autodominio
  lexicon: Préstamo del griego ἐγκράτεια
  rationale: «Dominio propio» es una equivalencia natural en español eclesial y conserva la idea ética de gobierno de sí mismo. «Autocontrol» también sería posible, pero suena más moderno y menos sobrio.
- source_word: ⲛ̄ⲧⲉⲧⲛ̄ (with ⲧⲁⲉⲅⲕⲣⲁⲧⲉⲓⲁ)
  english_pob_choice: toward you
  chosen_spanish: hacia ustedes
  alternatives_spanish:
  - de ustedes
  - sobre ustedes
  lexicon: Construcción genitiva copta ⲛ̄ⲧⲉ + pronombre dependiente
  rationale: La relación es orientativa y personal; «hacia ustedes» mantiene ese vínculo sin sugerir posesión («de ustedes») ni superioridad rígida («sobre ustedes»).
- source_word: ⲙⲉⲣⲓⲧⲥ
  english_pob_choice: love her
  chosen_spanish: ámala
  alternatives_spanish:
  - ámela
  - quiérela
  lexicon: Crum, s.v. ⲙⲉⲣⲓ
  rationale: El objeto femenino se puede resolver en español con el enclítico de objeto directo. «Ámala» conserva el imperativo afectivo sin añadir explicaciones.
- source_word: ϩⲛ̄
  english_pob_choice: in
  chosen_spanish: en
  alternatives_spanish:
  - entre
  - dentro de
  lexicon: Preposición estándar
  rationale: «En mi pobreza» reproduce de manera natural la localización o condición expresada por la preposición.
- source_word: ⲙⲛ̄ⲧϭⲱⲃ
  english_pob_choice: poverty
  chosen_spanish: pobreza
  alternatives_spanish:
  - necesidad
  - miseria
  - carencia
  lexicon: Crum, s.v. ϭⲱⲃ
  rationale: «Pobreza» es la correspondencia más directa y clara; mantiene el estado de indigencia sin intensificarlo innecesariamente.
- source_word: ⲕⲱ ⲧⲏⲛⲉ
  english_pob_choice: laugh ... excessively
  chosen_spanish: rías excesivamente
  alternatives_spanish:
  - te rías mucho
  - te burlas demasiado
  - te rías en exceso
  lexicon: Crum, s.v. ⲕⲱ; ⲧⲏⲛⲉ
  rationale: «Excesivamente» reproduce bien la fuerza intensiva de ⲧⲏⲛⲉ y suena más sobrio que «mucho» o «demasiado» en este contexto.
- source_word: ⲥⲁϩⲟⲩ
  english_pob_choice: curse
  chosen_spanish: maldigas
  alternatives_spanish:
  - abras
  - invoces mal contra
  - insultes
  lexicon: Crum, s.v. ⲥⲁϩⲟⲩ
  rationale: La revisión auditada corrige la lectura errónea previa; «maldigas» transmite el valor verbal de maldecir/cursar, preservando la intensidad del mandato negativo.
- source_word: ϣⲟⲩϣⲟⲩ
  english_pob_choice: boasting
  chosen_spanish: jactancia
  alternatives_spanish:
  - alarde
  - fanfarronería
  - vanagloria
  lexicon: Crum, s.v. ϣⲟⲩϣⲟⲩ
  rationale: «Jactancia» es un equivalente natural y solemne para la ostentación de sí; evita sesgos doctrinales posteriores y funciona bien en registro literario.
theological_decisions:
- issue: 'Valor de la auto-descripción negativa: ''lowliness'' no como virtud sino como estado bajo'
  english_pob_reading: my lowliness
  chosen_spanish_reading: mi bajeza
  alternative_spanish_readings:
  - mi humildad
  - mi humillación
  rationale: Se mantiene el sentido de condición despreciada o baja, no una virtud moral interior. En español, «bajeza» conserva mejor esa tensión que «humildad», que podría suavizarla demasiado.
  doctrine_reference: Tensión lexical del elogio/auto-humillación en literatura gnóstica; evitar moralización cristiana automática.
- issue: Interpretación de la relación con el destinatario en 'my self-control toward you'
  english_pob_reading: my self-control toward you
  chosen_spanish_reading: mi dominio propio hacia ustedes
  alternative_spanish_readings:
  - mi dominio propio de ustedes
  - mi autocontrol sobre ustedes
  rationale: La nota inglesa indica que el genitivo puede leerse relacionalmente. «Hacia ustedes» conserva esa apertura sin fijar una lectura posesiva o dominadora.
  doctrine_reference: Ambigüedad sintáctica coptológica; no decidir más de lo que el texto sostiene.
- issue: 'Línea final re-adjudicada: no ''assembly of violence'' sino ''curse my boasting'''
  english_pob_reading: and do not curse my boasting
  chosen_spanish_reading: y no maldigas mi jactancia
  alternative_spanish_readings:
  - y no maldigas mi alarde
  - y no maldigas mi vanagloria
  rationale: La revisión marcada como major-issues corrige una mala lectura anterior. Se adopta la forma ya justificada por el audit trail, manteniendo el paralelismo imperativo y el valor verbal de maldecir.
  doctrine_reference: Control textual y filológico; prioridad de la lectura revisada sobre una reconstrucción especulativa.
translation_notes:
  revision_awareness: 'Se siguió la revisión auditada más reciente sobre la línea final: el texto no dice nada como ''assembly of violence'', sino ''no maldigas mi jactancia''. También se respetó la nota inglesa sobre la posible lectura relacional de ''toward you'' en la primera línea y la intensidad de ⲧⲏⲛⲉ en la tercera.'
  spanish_consistency_notes:
  - Se mantuvo un registro digno y sobrio, sin arcaísmos innecesarios.
  - Se preservó la distinción entre desprecio, maldición y jactancia, evitando fusionar los verbos en una sola idea.
  - Se usó tratamiento de segunda persona plural coherente en la línea relacional.
  - No se introdujeron términos eclesiásticos no respaldados por el texto fuente.
