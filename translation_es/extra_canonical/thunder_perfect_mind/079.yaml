lexical_decisions:
- source_word: ϩⲙⲡⲉϩⲟⲟⲩ ⲉⲛⲕⲟⲗⲁⲥⲓⲥ
  english_pob_choice: in the day of punishment
  chosen_spanish: en el día del castigo
  alternatives_spanish:
  - en el día de la punición
  - en el día del castigo y la condena
  lexicon: Greek loan ⲕⲟⲗⲁⲥⲓⲥ
  rationale: «Castigo» comunica de manera natural el sentido del préstamo griego para un lector español amplio, manteniendo el matiz de juicio/punición sin cargar la frase con interpretación adicional.
- source_word: ⲛⲉⲣⲱⲧⲛ
  english_pob_choice: to you
  chosen_spanish: a vosotros
  alternatives_spanish:
  - a ustedes
  - a ti
  lexicon: Coptic pronoun
  rationale: El plural coptico se refleja con un destinatario plural en español; se usa «vosotros» por su precisión gramatical en una forma breve y pública, aunque «a ustedes» también sería posible según registro regional.
- source_word: ⲁⲕⲥⲱⲧⲙ
  english_pob_choice: you heard
  chosen_spanish: escuchasteis
  alternatives_spanish:
  - oísteis
  - oyeron
  - escucharon
  lexicon: Coptic verb for hearing/listening
  rationale: «Escuchasteis» conserva un verbo de oír/escuchar en segunda persona plural y suena más natural en español bíblico contemporáneo que una construcción demasiado literal.
theological_decisions:
- issue: Segmento fragmentario y desalineado con respecto a la línea vecina
  english_pob_reading: The English audit trail notes that the phrase about honor/praise belongs to a neighboring line and should not be translated here.
  chosen_spanish_reading: 'Se traduce solo el contenido legible de este segmento: «En el día del castigo[a], a vosotros[b] escuchasteis.»'
  alternative_spanish_readings:
  - En el día del castigo, a vosotros escuchasteis.
  - En el día de la punición, os escuchasteis.
  rationale: La evidencia coptica OCR sitúa aquí las expresiones «en el día del castigo», «a vosotros» y «escuchasteis». La versión española evita importar el hemistiquio antitético de honor/praisa que pertenece a otra sección y no debe injertarse en este fragmento.
  doctrine_reference: No aplica; decisión textual y de alineación, no doctrinal.
