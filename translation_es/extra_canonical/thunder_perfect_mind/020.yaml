    text: The opening “Concerning those who hate me” construes ⲉⲧⲃⲉ as topical; ⲡⲁⲣⲁⲛ is likely a carryover from the previous line and is not translated here due to uncertainty.
    reason: alignment_note
  - marker: b
    text: “Confess” translates ϩⲟⲙⲟⲗⲟⲅⲉⲓ (Gk. ὁμολογέω); “acknowledge” or “profess” are possible alternatives.
    reason: lexical_alternative
  - marker: c
    text: “Deny” renders ⲁⲣⲛⲁ; “disown” or “renounce” could also fit depending on register.
    reason: lexical_alternative
