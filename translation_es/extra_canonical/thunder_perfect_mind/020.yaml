translation:
  language: es
  text: ¿Por qué[a], ustedes que me odian, me aman, y odian a los que me aman? Ustedes que me niegan, me confiesan[b], y ustedes que me confiesan, me niegan[c]. Ustedes que dicen—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La secuencia copta ⲉⲧⲃⲉ ⲟⲩ se entiende aquí como interrogativa: «¿Por qué?». Una lectura anterior la tomó en sentido tópico («con respecto a»), pero la revisión auditada favorece claramente el valor causal/interrogativo.'
    reason: source_note
  - marker: b
    text: «Confiesan» traduce ϩⲟⲙⲟⲗⲟⲅⲉⲓ (del griego ὁμολογέω); también podría vertirse «reconocen» o «profesan», pero «confesar» mantiene el paralelo con «negar».
    reason: lexical_alternative
  - marker: c
    text: «Niegan» representa ⲁⲣⲛⲁ; otras posibilidades son «reniegan» o «desconocen», aunque «negar» conserva mejor la simetría verbal.
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲉⲧⲃⲉ ⲟⲩ
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿A causa de qué
  - ¿Por qué razón
  lexicon: Crum 472a; Layton §226
  rationale: La secuencia expresa interrogación causal/explicativa; en español, «¿Por qué?» reproduce mejor el valor interrogativo que una lectura topical como «con respecto a».
- source_word: ⲙⲟⲥⲧⲉ
  english_pob_choice: hate
  chosen_spanish: odiar
  alternatives_spanish:
  - aborrecer
  - detestar
  lexicon: Crum 195a
  rationale: El verbo básico indica odio; «odiar» es claro y natural en español contemporáneo, sin intensificar más de lo que exige el texto.
- source_word: ⲙⲉ
  english_pob_choice: love
  chosen_spanish: amar
  alternatives_spanish:
  - querer
  - amar
  lexicon: Crum 155b
  rationale: El pasaje opone amar/odiar. «Amar» conserva esa antítesis con la misma fuerza formal que la frase coptica y evita debilitarla con un «querer» más ambiguo.
- source_word: ⲁⲣⲛⲁ
  english_pob_choice: deny
  chosen_spanish: negar
  alternatives_spanish:
  - renunciar a
  - desconocer
  lexicon: Crum 19b
  rationale: «Negar» es el equivalente más directo y natural para este contexto de confesión/negación. Mantiene la simetría con «confesar».
- source_word: ϩⲟⲙⲟⲗⲟⲅⲉⲓ
  english_pob_choice: confess
  chosen_spanish: confesar
  alternatives_spanish:
  - reconocer
  - profesar
  lexicon: Crum 710a
  rationale: La traducción estándar de ὁμολογέω en contexto religioso es «confesar»; en español conserva el paralelo ritual y polémico con «negar».
- source_word: ⲛⲉⲧ-
  english_pob_choice: those who
  chosen_spanish: ustedes que
  alternatives_spanish:
  - los que
  - quienes
  lexicon: Layton §188
  rationale: El análisis revisado entiende estas formas como vocativos dirigidos a un segundo plural; por eso se traduce con «ustedes que» y no como tercera persona.
- source_word: ⲛⲉⲧϫⲉ
  english_pob_choice: those who say
  chosen_spanish: ustedes que dicen—
  alternatives_spanish:
  - quienes dicen—
  - 'ustedes que dicen:'
  lexicon: Crum 596b
  rationale: Se mantiene el carácter fragmentario del final y el corte abrupto del manuscrito, usando raya final para reflejar la cláusula inacabada.
theological_decisions:
- issue: La tensión entre amar y odiar dirigida a los mismos interlocutores
  english_pob_reading: 'The text addresses the same addressees with contradictory actions: they love and hate, deny and confess.'
  chosen_spanish_reading: 'El texto se dirige a los mismos interlocutores con acciones contradictorias: aman y odian, niegan y confiesan.'
  alternative_spanish_readings:
  - Se podría suavizar como una mera ironía retórica, pero el contraste permanece fuerte.
  - Se podría leer como paralelismo poético sin tensión personal directa, pero el vocativo mantiene la confrontación.
  rationale: La poesía exige conservar la paradoja sin resolverla. La versión española mantiene el choque retórico entre amar/odiar y negar/confesar, que es central al pasaje.
  doctrine_reference: Retórica poética y antítesis interna del texto; no se introduce una armonización doctrinal externa.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión que corrigió dos errores graves del borrador inglés: ⲉⲧⲃⲉ ⲟⲩ significa «¿Por qué?», no «concerning», y ⲙⲉ significa «amar», no «conocer». También se incorporó la corrección gramatical de los imperativos y vocativos: «ustedes que...» en lugar de «those who...» como sujetos de tercera persona.'
  spanish_consistency_notes:
  - Se mantiene «confesar/negar» como par verbal fijo para conservar la antítesis del pasaje.
  - Se prefiere «amar/odiar» por ser la oposición explícita del copt. en esta línea revisada.
  - Se conserva el final truncado con raya para no añadir material no atestiguado.
  - No se usa «Cristo», «SEÑOR» ni terminología eclesial ajena, porque este fragmento no la requiere.
