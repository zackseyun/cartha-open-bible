translation:
  language: es
  text: 'Aférrense a ustedes mismos[a];


    porque su interior es su exterior,


    y el que da forma a su exterior


    es el que lo hizo un modelo[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ‘Agárrense ustedes mismos’. El copto ⲁⲙⲁϩⲧⲉ expresa la idea de agarrar o aferrarse con firmeza.'
    reason: lexical_alternative
  - marker: b
    text: 'El cierre traduce el campo de τύπος: ‘modelo, patrón, impresión’. También podría entenderse como ‘lo marcó’ o ‘lo selló’; se conserva aquí la idea de una forma impresa, no solo de una formación general.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲁⲙⲁϩⲧⲉ
  english_pob_choice: Take hold of yourselves
  chosen_spanish: Tomen posesión de ustedes mismos
  alternatives_spanish:
  - Aférrense a ustedes mismos
  - Tómense a ustedes mismos
  lexicon: Crum; verbo de agarrar, tomar, apoderarse
  rationale: El contexto exige un imperativo dirigido al oyente. En español, ‘tomen posesión de ustedes mismos’ comunica la idea de agarrarse/poseerse a sí mismos sin perder el tono exhortativo y evita la ambigüedad de ‘aparecer’.
- source_word: ⲥⲁϩⲟⲩⲛ
  english_pob_choice: inside
  chosen_spanish: interior
  alternatives_spanish:
  - dentro
  - adentro
  lexicon: Crum; sustantivo/adverbio de interioridad
  rationale: La revisión demuestra que aquí significa ‘dentro/interior’, no ‘sabio’. ‘Interior’ funciona bien en una sentencia nominal y conserva la oposición con ‘exterior’.
- source_word: ⲥⲁⲃⲟⲗ
  english_pob_choice: outside
  chosen_spanish: exterior
  alternatives_spanish:
  - afuera
  - afuera de ustedes
  lexicon: Crum; ‘outside, exterior’
  rationale: Se mantiene la correlación semántica con ⲥⲁϩⲟⲩⲛ. ‘Exterior’ es natural en español para una afirmación gnómica y refleja el contraste interior/exterior del texto.
- source_word: ⲣⲡⲗⲁⲥⲥⲉ
  english_pob_choice: fashions
  chosen_spanish: da forma
  alternatives_spanish:
  - moldea
  - forma
  - modela
  lexicon: Práctico para πλάσσω; formar/moldear
  rationale: ‘Da forma’ preserva el acto de conformar sin sonar excesivamente técnico. ‘Moldea’ también sería válido, pero ‘da forma’ encaja con el paralelismo de la cláusula final.
- source_word: ⲣⲧⲩⲡⲟⲥ
  english_pob_choice: made ... a pattern
  chosen_spanish: lo formó
  alternatives_spanish:
  - lo hizo un modelo
  - lo hizo un patrón
  - lo selló
  lexicon: τύπος; impresión, patrón, modelo
  rationale: El campo semántico incluye ‘marca/impresión/patrón’, pero la construcción del cierre pide un verbo natural en español. ‘Lo formó’ recoge la creación/impresión sin introducir un objeto extraño en la clausula final.
theological_decisions:
- issue: Relación entre interior y exterior
  english_pob_reading: your inside is your outside
  chosen_spanish_reading: su interior es su exterior
  alternative_spanish_readings:
  - lo de dentro es lo de fuera
  - su interior coincide con su exterior
  rationale: La línea no formula una tesis moral explicativa sino una afirmación gnómica de identidad o correspondencia. ‘Su interior es su exterior’ conserva la tensión sin suavizarla en exceso.
  doctrine_reference: Antropología simbólica en Thunder, Perfect Mind; no se armoniza con categorías doctrinales ajenas al texto.
translation_notes:
  revision_awareness: 'Se revisó el audit trail y la corrección crítica: el texto anterior estaba afectado por errores graves de léxico coptico (ⲁⲙⲁϩⲧⲉ = tomar/agarrar; ⲥⲁϩⲟⲩⲛ = interior; ⲥⲁⲃⲟⲗ = exterior). La presente versión sigue la lectura corregida y evita trasladar al español las lecturas erróneas de ‘aparecer’, ‘sabio’ o ‘endurecimiento’.'
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico-literario, pero con español claro y moderno.
  - Se preservó la paradoja interior/exterior sin normalizarla.
  - Se evitó ‘SEÑOR’ u otra terminología no presente en el original.
  - ‘Lo formó’ se eligió por fluidez, pero las notas mantienen el vínculo con el léxico de ‘patrón/molde’ del final.
