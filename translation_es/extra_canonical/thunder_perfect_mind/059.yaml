translation:
  language: es
  text: 'Soy la no instruida[a][b],


    y ustedes aprenden de mí.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La OCR también incluye ⲟⲩϣⲓⲡⲉ / ⲙⲛⲧⲁⲧϣⲓⲡⲉ (“conocimiento/ignorancia”) y ⲙⲛⲧϭⲁ (“pequeñez”), que probablemente continúan en una línea adyacente. Dada la confianza media de alineación, no se reflejan en este pareado.
    reason: alignment_note
  - marker: b
    text: También podría traducirse como “la no enseñada” o “la no educada”. Se prefiere “la no instruida” para evitar connotaciones modernas de escolarización formal y conservar la paradoja.
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲉⲧϩⲁⲉⲓⲏⲟⲩ
  english_pob_choice: the unlearned one
  chosen_spanish: la ignorante
  alternatives_spanish:
  - la no instruida
  - la que no ha sido enseñada
  - la no aprendida
  lexicon: Crum, Coptic Dictionary; Layton, Coptic Grammar
  rationale: La construcción relativa describe a la hablante como alguien que no ha sido instruida. En español, ‘ignorante’ conserva la paradoja y la fuerza contrastiva del dicho, aunque puede sonar más fuerte que ‘no instruida’; por eso se registra la alternativa en nota.
- source_word: ⲛⲧⲉⲧⲛⲧⲱⲡ
  english_pob_choice: you learn
  chosen_spanish: ustedes aprenden
  alternatives_spanish:
  - ustedes aprenderán
  - ustedes son enseñados
  lexicon: Crum, s.v. ⲧⲱⲡ; Layton, on periphrastic future ⲛⲧⲉⲧⲛ-
  rationale: La forma coptica tiene valor futuro/intencional de segunda persona plural; en español, el presente gnómico ‘aprenden’ funciona bien para una sentencia proverbial y mantiene el contraste con la hablante. Se conserva el plural ‘ustedes’ por la marca de segunda plural.
- source_word: ⲉⲃⲟⲗ ϩⲛ
  english_pob_choice: from
  chosen_spanish: de
  alternatives_spanish:
  - a partir de
  - desde
  lexicon: Crum, prepositional idioms
  rationale: La expresión idiomática ‘learn from someone’ se naturaliza en español como ‘aprender de’. ‘De’ transmite la relación fuente/origen sin calco forzado.
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés existente: la lectura principal es ‘the unlearned one’, con nota de alternativa ‘uneducated/untaught’; también se respetó la observación de alineación media, evitando añadir elementos de líneas vecinas.'
  spanish_consistency_notes:
  - 'Se mantuvo el contraste sintáctico breve del original: autodefinición + consecuencia paradójica.'
  - ‘Ignorante’ se usa aquí como renderización de estado no instruido, no como juicio moral.
  - Se prefirió el presente español para expresar valor gnómico e inmediato en una frase sapiencial breve.
