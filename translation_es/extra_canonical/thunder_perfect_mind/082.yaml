base_translation:
  language: en
  yaml_path: translation/extra_canonical/thunder_perfect_mind/082.yaml
  text: 'I am the union and the dissolution[a];

    I am the abiding[d][c][b],

    and I am the dissolution.'
  footnotes:
  - marker: a
    text: Reading ⲡⲡⲱⲧⲣ ⲙⲛ ⲡⲕⲱⲗⲉⲃⲟⲗ as “the First and the Outside.” The compound likely reflects kol + ebol (outside). Some editors might prefer “the Outer.”
    reason: lexical_alternative
  - marker: b
    text: Monē (ⲙⲟⲛⲏ) can denote dwelling, abode, or rest. “Dwelling” chosen for concreteness; “Rest” is possible contextually.
    reason: lexical_alternative
  - marker: c
    text: ⲡⲕⲱⲗ is a set phrase in Coptic Gnostic literature for “the All,” i.e., the totality.
    reason: cultural_note
  - marker: d
    text: Or 'I am the First and the Outside[a];\nI am the Dwelling[b];\nand I am the All[c] — I am.'.
    reason: previous_rendering
