translation:
  language: es
  text: 'Yo soy la unión y la disolución[a];


    yo soy la permanencia[b],


    y yo soy la disolución.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El auditor corrige una lectura anterior equivocada: aquí no significa «el Primero» ni «el Exterior», sino «la unión».'
    reason: source_note
  - marker: b
    text: «Permanencia» procura reflejar el valor de ⲧⲙⲟⲛⲏ como estado de permanecer o morar. También podría leerse «morada», pero aquí «permanencia» conserva mejor el contraste con «disolución».
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲡⲱⲧⲣ
  english_pob_choice: the union
  chosen_spanish: la unión
  alternatives_spanish:
  - el vínculo
  - la unión, el enlazamiento
  lexicon: Crum 275a
  rationale: El auditor corrigió la lectura falsa «the First»; el término coptó se entiende aquí como unión/junción. «Unión» conserva el sentido relacional y abstracto sin añadir matiz doctrinal ajeno.
- source_word: ⲕⲱⲗⲉⲃⲟⲗ
  english_pob_choice: the dissolution
  chosen_spanish: la disolución
  alternatives_spanish:
  - el desatamiento
  - la desunión
  lexicon: Crum 103b
  rationale: El texto auditado entiende esta forma como «dissolution/loosening». «Disolución» es el equivalente español más natural para conservar la paradoja con «unión».
- source_word: ⲧⲙⲟⲛⲏ
  english_pob_choice: the abiding
  chosen_spanish: el permanecer
  alternatives_spanish:
  - la permanencia
  - la morada
  - el habitar
  lexicon: 'Greek monē → Coptic loan (monē: abode/dwelling/rest)'
  rationale: En español, «el abiding» literal sonaría forzado; «permanecer» transmite la idea verbal de continuidad indicada por el auditor, sin perder la oposición con «disolución». Mantengo una forma sustantivada para seguir la estructura de identidades del pasaje.
- source_word: ⲡⲕⲱⲗ
  english_pob_choice: the dissolution
  chosen_spanish: la disolución
  alternatives_spanish:
  - la totalidad
  - el todo
  lexicon: Crum 103b
  rationale: 'Sigo la revisión adjudicada: no es «the All», sino otra ocurrencia de «dissolution». Repetir «la disolución» en español preserva la reiteración del original y su efecto retórico.'
- source_word: ⲁⲛⲟⲕ
  english_pob_choice: I am
  chosen_spanish: Yo soy
  alternatives_spanish:
  - Soy
  - Yo estoy
  lexicon: Crum
  rationale: La fórmula coptó-gnóstica se conserva con «Yo soy» para mantener el peso performativo y la cadencia de las declaraciones identitarias.
theological_decisions:
- issue: Mantenimiento de la paradoja identitaria del pasaje
  english_pob_reading: I am the union and the dissolution; I am the abiding, and I am the dissolution.
  chosen_spanish_reading: Yo soy la unión y la disolución; yo soy el permanecer, y yo soy la disolución.
  alternative_spanish_readings:
  - Yo soy la unión y la disolución; yo soy la permanencia, y yo soy la disolución.
  - Yo soy la unión y la disolución; yo soy la morada, y yo soy la disolución.
  rationale: 'La frase presenta una autoidentificación paradójica. En español conviene preservar la tensión semántica sin resolverla: «unión/disolución» y «permanecer/disolución» mantienen el contraste retórico señalado por el texto coptó y la corrección del auditor, evitando introducir una interpretación doctrinal adicional.'
  doctrine_reference: Poética de la autoidentificación paradójica en literatura gnóstica; principio de no neutralizar tensiones léxicas del original.
translation_notes:
  revision_awareness: 'La versión inglesa previa fue revisada sustancialmente por el adjudicador: descartó las lecturas falsas «the First», «the Outside» y «the All», y reanalizó el segmento como «union / dissolution / abiding». Esta traducción española sigue la lectura corregida y evita reproducir la etapa anterior errónea.'
  spanish_consistency_notes:
  - He conservado la primera persona singular con «Yo soy» para respetar la fórmula identitaria del pasaje.
  - He preferido sustantivos abstractos breves («unión», «disolución») para mantener la paralelía y la repetición.
  - No he introducido términos cristianos tradicionales que no están respaldados por el análisis del pasaje.
