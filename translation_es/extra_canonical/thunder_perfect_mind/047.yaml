translation:
  language: es
  text: 'Entre los pueblos[a], me han llamado «Muerte».


    Yo soy ella a quien llaman «Ley», y ustedes me han llamado «ilegalidad».


    Yo soy ella a quien persiguieron, y yo soy ella a quien capturaron.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «En muchos lugares, me han llamado “Ley,” y ustedes me han llamado “Ilegalidad.”»'
    reason: alternative_reading
lexical_decisions:
- source_word: ϩⲛⲙⲁⲛⲓⲙ
  english_pob_choice: among the peoples
  chosen_spanish: Entre los pueblos
  alternatives_spanish:
  - entre las naciones
  - en muchos lugares
  lexicon: Coptic locative phrase; Crum, Coptic Dictionary
  rationale: Mantengo el valor locativo/plural amplio sin forzar una precisión que el OCR no garantiza. «Pueblos» conserva el matiz colectivo social del inglés auditado y funciona de manera natural en español.
- source_word: ⲙⲟⲩⲧⲉ
  english_pob_choice: name/call
  chosen_spanish: llamar
  alternatives_spanish:
  - nombrar
  - decir
  lexicon: Crum, Coptic Dictionary; uso sahídico de ⲙⲟⲩⲧⲉ ⲉⲣⲟⲥ ϫⲉ …
  rationale: «Llamar» expresa de forma natural el acto de atribuir un nombre o título, y permite conservar la cita nominal entre comillas.
- source_word: ⲡⲙⲟⲩ
  english_pob_choice: Death
  chosen_spanish: Muerte
  alternatives_spanish:
  - la muerte
  lexicon: Crum, Coptic Dictionary
  rationale: Capitalizo el término como nombre/título citado, siguiendo la función onomástica indicada por la auditoría en inglés.
- source_word: ⲡⲛⲟⲙⲟⲥ
  english_pob_choice: Law
  chosen_spanish: Ley
  alternatives_spanish:
  - la ley
  - norma
  lexicon: Greek loan νόμος in Coptic
  rationale: «Ley» es el equivalente natural y conserva la antítesis formal con «ilegalidad». En español, la mayúscula en la cita ayuda a reflejar el valor titular.
- source_word: ⲧⲁⲛⲟⲙⲓⲁ
  english_pob_choice: Lawlessness
  chosen_spanish: ilegalidad
  alternatives_spanish:
  - anarquía
  - infracción de la ley
  lexicon: Greek loan ἀνομία in Coptic
  rationale: Opto por «ilegalidad» para una publicación legible en español actual. Conserva el contraste semántico con «Ley», aunque no reproduce de modo literal el calco «lawlessness».
- source_word: ⲁⲛⲟⲕ ⲧⲉ …
  english_pob_choice: I am she …
  chosen_spanish: Yo soy ella …
  alternatives_spanish:
  - Soy yo, la que …
  - Yo soy la que …
  lexicon: Sahidic copular construction with feminine ⲧⲉ
  rationale: Conservo la autoidentificación femenina que la auditoría considera necesaria para la voz del texto. «Ella» mantiene el paralelismo y evita masculinizar o neutralizar la forma.
- source_word: ⲧⲉ ϣⲁⲩⲙⲟⲩⲧⲉ ⲉⲣⲟⲥ
  english_pob_choice: whom they call
  chosen_spanish: a quien llaman
  alternatives_spanish:
  - a quien nombran
  - que llaman
  lexicon: Sahidic relative clause; habitual present
  rationale: «A quien llaman» refleja bien el relativo y el presente habitual, manteniendo la fluidez en español.
- source_word: ⲁⲧⲉⲧⲛⲙⲟⲩⲧⲉ
  english_pob_choice: you have called
  chosen_spanish: me han llamado
  alternatives_spanish:
  - me han nombrado
  - ustedes me han llamado
  lexicon: Sahidic perfect 2nd plural; Crum, grammar notes
  rationale: Uso el perfecto compuesto para conservar el valor perfectivo. Añadir «ustedes» aclara el plural explícito del Coptic y evita ambigüedad en español.
- source_word: ⲡⲱⲧ ⲛⲥⲱⲥ
  english_pob_choice: pursued me
  chosen_spanish: persiguieron
  alternatives_spanish:
  - me persiguieron
  - corrieron tras de mí
  lexicon: Crum, Coptic Dictionary; idiomatic usage
  rationale: «Persiguieron» expresa de forma idiomática el movimiento dirigido hacia la hablante sin cargar demasiado el verbo con matices no atestiguados.
- source_word: ⲁⲙⲁϩⲧⲉ
  english_pob_choice: seized
  chosen_spanish: capturaron
  alternatives_spanish:
  - me capturaron
  - me apresaron
  - me agarraron
  lexicon: Crum, Coptic Dictionary
  rationale: «Capturaron» transmite con claridad la toma física y confrontativa del verbo, y suena más natural que un calco como «se apoderaron de» en este contexto.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión que exigía conservar la fórmula explícita «Yo soy ella» en la primera cláusula y el contraste entre el presente habitual «llaman» y el perfecto «han llamado». La redacción española mantiene esa estructura anafórica y el paralelismo de los dos miembros.
  spanish_consistency_notes:
  - Se preserva la voz femenina con «ella», coherente con la construcción copulativa del copto.
  - Se mantiene el contraste entre el presente habitual («llaman») y el perfecto compuesto («han llamado»).
  - Se usa mayúscula en los términos citados para reflejar su función titulativa en la escena.
  - «Ley» / «ilegalidad» conserva la antítesis del audit trail en inglés, aunque la nota ofrece la alternativa más literal.
