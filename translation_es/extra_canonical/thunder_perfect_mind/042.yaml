translation:
  language: es
  text: Porque ¿por qué me odian, griegos? ¿Porque soy una bárbara? Y yo soy el conocimiento de griego y bárbaro. Yo soy el juicio.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ⲧⲉⲧⲛⲙⲉⲥⲧⲉ / hate me
  english_pob_choice: you hate me
  chosen_spanish: me odian
  alternatives_spanish:
  - me detestan
  - me aborrecen
  lexicon: Coptic verb for hatred in context of direct address
  rationale: «Me odian» reproduce con naturalidad el reproche directo del texto y conserva la fuerza relacional del original sin añadir matices no atestiguados.
- source_word: ⲅⲁⲣ / for
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: Coptic causal particle
  rationale: «Porque» introduce de forma clara la pregunta causal en español y mantiene el vínculo lógico de la secuencia.
- source_word: ⲧⲃⲁⲣⲃⲁⲣⲟⲥ / barbarian
  english_pob_choice: barbarian
  chosen_spanish: bárbara
  alternatives_spanish:
  - bárbaro
  - extranjera
  lexicon: Greek loanword βάρβαρος in Coptic
  rationale: Se conserva «bárbara» para mantener el contraste identitario y el golpe retórico; el femenino concuerda con la voz femenina del hablante.
- source_word: ⲧⲥⲟⲟⲩⲛ / knowledge
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - saber
  - conocimiento
  lexicon: Coptic noun for knowing/knowledge
  rationale: «Conocimiento» es la opción más estable en español para el sustantivo, y conserva la abstracción del término sin convertirlo en verbo o explicación.
- source_word: ⲡϩⲁⲡ / judgment
  english_pob_choice: judgment
  chosen_spanish: juicio
  alternatives_spanish:
  - sentencia
  - juicio
  lexicon: Coptic/Greek legal term for judgment
  rationale: «Juicio» reproduce el campo jurídico del término y su concisión proverbial.
translation_notes:
  revision_awareness: La revisión reciente corrige una lectura previa completamente errónea basada en OCR defectuoso; el texto fuente apoya la secuencia «me odian... porque soy una bárbara... conocimiento... juicio», no la imagen de enfermedad o médico.
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y publicable en español neutro.
  - No se incorporan notas al pie porque la lectura corregida del pasaje no requiere alternativas textuales ancladas en el verso principal.
  - Se preserva el paralelismo retórico con frases breves y directas.
