translation:
  language: es
  text: Escúchame, ustedes que escuchan; y aprendan mis palabras, ustedes que me conocen.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: 'ⲥⲱⲧⲙ / english POB: hear'
  english_pob_choice: Hear me
  chosen_spanish: Escúchame
  alternatives_spanish:
  - Óiganme
  - Escuchenme
  lexicon: Crum, Coptic Dictionary
  rationale: El verbo coptico prioriza 'oír/escuchar' más que 'obedecer'. En español, 'Escúchame' conserva el matiz auditivo y la fuerza exhortativa del vocativo inicial sin introducir la idea de obediencia que el texto revisado no exige.
- source_word: 'ⲛⲉⲧⲥⲱⲧⲙ / english POB: you who hear'
  english_pob_choice: you who hear
  chosen_spanish: ustedes que escuchan
  alternatives_spanish:
  - los que oyen
  - ustedes oyentes
  lexicon: Crum, Coptic Dictionary
  rationale: La cláusula relativa se vuelve más natural en español con 'ustedes que escuchan'. Mantiene el paralelismo con la primera exhortación y reproduce el eco lexical de 'oír/escuchar' sin volverla una categoría técnica innecesaria.
- source_word: ϣⲁϫⲉ
  english_pob_choice: words
  chosen_spanish: palabras
  alternatives_spanish:
  - dichos
  - mensajes
  - enseñanzas
  lexicon: Crum, Coptic Dictionary
  rationale: '''Palabras'' refleja bien el plural coptico y mantiene el foco en el contenido que debe ser aprendido. ''Enseñanzas'' sería interpretativo; ''dichos'' suena más proverbial de lo que el contexto inmediato requiere.'
- source_word: 'ⲛⲉⲧⲥⲟⲟⲩⲛ ⲙⲙⲟⲓ / english POB: you who know me'
  english_pob_choice: you who know me
  chosen_spanish: ustedes que me conocen
  alternatives_spanish:
  - los que me conocen
  - ustedes conocedores de mí
  lexicon: Crum, Coptic Dictionary
  rationale: Se conserva la relación personal del complemento directo 'me'. 'Conocedores de mí' suena forzado en español y desplaza el valor relacional del original.
theological_decisions:
- issue: Relación entre oír y obedecer en la línea inicial
  english_pob_reading: The revised POB reading prefers 'Hear me, you who hear' rather than 'Obey me,' because the Coptic verb primarily denotes hearing/listening and the text uses hearing as a revelatory motif.
  chosen_spanish_reading: Escúchame, ustedes que escuchan
  alternative_spanish_readings:
  - Obedéceme, ustedes que obedecen
  - Óiganme, ustedes obedientes
  rationale: 'El español debe preservar la tensión lexical: el original revisado favorece la escucha, no la obediencia. ''Escúchame'' mantiene la resonancia semítica/revelatoria sin borrar el matiz de audición que la revisión recupera.'
  doctrine_reference: no doctrinal import; source-level lexical/thematic decision
translation_notes:
  revision_awareness: La revisión inglesa más reciente corrigió el primer hemistiquio de 'Obey me' a 'Hear me' por el valor primario de ⲥⲱⲧⲙ como 'hear/listen'. También eliminó marcas de nota del texto principal y mantuvo 'my words' como lectura estable. La versión española sigue esa revisión y no reintroduce 'obedecer'.
  spanish_consistency_notes:
  - Se mantiene un registro reverente y claro, apto para lectura litúrgica o académica.
  - Se evita 'obedecer' para no contradecir la revisión textual y la evidencia copta.
  - '''Escuchar'' se usa de forma consistente en ambos miembros para reforzar el paralelismo del verso.'
