translation:
  language: es
  text: Y me hallarás en grandeza[a]; y no me mires saliendo entre los que son honrados[b], y búscame en los lugares más pequeños.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La voz coptа admite un campo semántico cercano a “grandeza”, “exaltación” o, en ciertos contextos, “riqueza”. Aquí se opta por “grandeza” por claridad y por seguir la revisión auditada.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, “los que son honrados”. La frase conserva el valor resultativo del participio y evita reducirlo a un mero título social.
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲧⲉⲧⲛⲁϭⲓⲛⲉ
  english_pob_choice: you (pl.) will find
  chosen_spanish: me hallarás
  alternatives_spanish:
  - me encontrarás
  - ustedes me hallarán
  lexicon: Crum; Layton
  rationale: El sentido básico es “hallar/encontrar”; en español, “hallar” mantiene un registro digno y cercano al uso bíblico sin forzar arcaísmo excesivo. Se conserva el valor futuro dirigido al lector plural implícito.
- source_word: ⲙⲙⲟⲉⲓ
  english_pob_choice: me (direct object)
  chosen_spanish: me
  lexicon: Layton pronoun charts
  rationale: El enclítico de primera persona singular exige el objeto directo “me” en español.
- source_word: ϩⲛ
  english_pob_choice: in
  chosen_spanish: en
  alternatives_spanish:
  - entre
  - dentro de
  lexicon: Crum
  rationale: La preposición admite varios valores; aquí “en” da una equivalencia natural y suficiente para el marco locativo del pasaje.
- source_word: ⲙⲙⲛⲧⲣⲙⲁⲟ
  english_pob_choice: greatness
  chosen_spanish: grandeza
  alternatives_spanish:
  - honra
  - riqueza
  - exaltación
  lexicon: Crum; audit trail revision note
  rationale: Sigo la decisión lexical auditada de no usar “wealth” en esta línea de la traducción inglesa revisada, y mantengo una forma española amplia que conserva la idea de elevación/estatura social o valor sin estrecharla demasiado.
- source_word: ⲟⲩⲇⲉ ⲙⲡⲣⲛⲁⲩ ⲉⲣⲟⲉⲓ
  english_pob_choice: and do not look at me
  chosen_spanish: y no me mires
  alternatives_spanish:
  - y no me veas
  - y no pongas la vista en mí
  lexicon: Crum; Layton
  rationale: La prohibición negativa pide un verbo natural en español; “mirar” conserva la fuerza de atención visual y la forma directiva.
- source_word: ⲉⲉⲓⲛⲏⲩ ⲉⲃⲟⲗ
  english_pob_choice: going out / coming forth
  chosen_spanish: saliendo
  alternatives_spanish:
  - saliendo hacia afuera
  - saliendo fuera
  lexicon: Crum
  rationale: Para mantener la imagen de movimiento hacia afuera con fluidez española, empleo el gerundio “saliendo”.
- source_word: ⲛⲉⲧⲧⲁⲉⲓⲏⲩ
  english_pob_choice: among those who are honored
  chosen_spanish: entre los que son honrados
  alternatives_spanish:
  - entre los honrados
  - entre los que están honrados
  lexicon: Contextual; audit trail revision note
  rationale: La revisión auditada identifica el término como el participio plural relativo de ‘honrar’, por lo que en español conviene “los que son honrados” para conservar la pasividad/resultativo sin perder claridad.
- source_word: ⲛⲉⲗⲁⲭⲓⲥⲧⲟⲥ
  english_pob_choice: the least (ones)
  chosen_spanish: los lugares más pequeños
  alternatives_spanish:
  - los lugares más mínimos
  - los sitios más bajos
  lexicon: Greek loan (elachistos)
  rationale: Aunque el análisis gramatical es incierto en el borde final del segmento, la línea recuperable apunta a un contraste con lo elevado/honrado; “lugares más pequeños” mantiene ese contraste sin añadir contenido no atestiguado.
theological_decisions:
- issue: Contraste entre grandeza/honra y lo pequeño/least
  english_pob_reading: in greatness ... among those who are honored ... in the least places
  chosen_spanish_reading: en grandeza ... entre los que son honrados ... en los lugares más pequeños
  alternative_spanish_readings:
  - en riqueza ... entre los honrados ... en los lugares mínimos
  - en elevación ... entre los nobles ... en los sitios más bajos
  rationale: La línea preserva un contraste social/valorativo entre lo alto y lo bajo. En español, “grandeza” y “lugares más pequeños” permiten conservar esa tensión sin sobreespecificar la dimensión económica.
  doctrine_reference: Poetic inversion / apophatic self-presentation in Thunder, Perfect Mind
translation_notes:
  revision_awareness: La revisión más reciente corrigió la línea inglesa para volver de ‘wealth’ a ‘greatness’ en el primer miembro y mantuvo ‘those who are honored’ para el segundo. También señaló que el tramo final es una zona textual inestable; por eso el español evita reconstrucciones excesivas y conserva una redacción prudente.
  spanish_consistency_notes:
  - Se mantiene el registro sobrio y poético típico de los textos de Thunder, Perfect Mind.
  - Se usa ‘hallar’ y ‘honrados’ para un tono bíblico sin caer en un calco rígido.
  - No se introduce ‘Cristo’, ‘Señor’ ni otras equivalencias doctrinales ajenas al segmento.
  - Los marcadores [a] y [b] aparecen exactamente en el texto, como requiere la validación.
