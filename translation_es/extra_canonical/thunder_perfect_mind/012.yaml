translation:
  language: es
  text: Yo soy la partera y la que no da a luz[a]. Yo soy el consuelo de mis dolores de parto. Yo soy la novia y el novio[b][c][d]. Yo soy la madre de mi padre y la hermana de mi esposo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El copto de este tramo es incierto; muchas tradiciones en inglés leen ‘whose wedding is great’, pero el texto visible y la colación auditada favorecen ‘la partera’ y ‘la que no da a luz’.
    reason: source_note
  - marker: b
    text: En el testimonio copto citado por la auditoría, las líneas siguientes parecen pertenecer a paradojas adyacentes; por eso se conserva aquí solo el bloque que lee ‘novia y novio’.
    reason: textual_variant
  - marker: c
    text: La palabra para ‘esposo’ no está claramente visible en este segmento; por eso se traduce de forma más general como ‘esposo’ en lugar de forzar ‘marido’ u otra precisión no atestiguada.
    reason: lexical_alternative
  - marker: d
    text: También podría leerse, con otra segmentación, ‘Yo soy la novia y el novio’ como una sola paradoja de unión nupcial.
    reason: alternative_reading
lexical_decisions:
- source_word: ⲧⲙⲉⲥⲓⲱ
  english_pob_choice: the midwife
  chosen_spanish: la partera
  alternatives_spanish:
  - la comadrona
  - la matrona
  lexicon: Coptic noun in the opening paradox; OCR and prior English audit support the sense ‘midwife’
  rationale: ‘Partera’ is the clearest neutral Spanish equivalent for a woman who asiste un parto, and it preserves the paradoxical self-identification without over-literalizing the uncertain Coptic form.
- source_word: ⲙⲁⲥⲙⲓⲥⲉ
  english_pob_choice: does not give birth
  chosen_spanish: no da a luz
  alternatives_spanish:
  - no alumbra
  - no pare
  lexicon: Negated verbal form in the same paradox
  rationale: Spanish ‘dar a luz’ is the most natural and dignified way to express childbirth in this register, and it keeps the negation direct without adding a noun for ‘husband’ not clearly present in the source.
- source_word: ⲡⲥⲟⲗⲥⲗ ⲛⲛⲁⲛⲁⲁⲕⲉ
  english_pob_choice: the comfort of my labor pains
  chosen_spanish: el consuelo de mis dolores de parto
  alternatives_spanish:
  - el alivio de mis dolores de parto
  - el consuelo de mis trabajos de parto
  lexicon: Phrase naming comfort/solace in relation to labor pains
  rationale: ‘Consuelo’ matches the English audit trail closely, while ‘dolores de parto’ is the most transparent Spanish rendering for labor pains. This preserves the emotional and bodily contrast in the line.
- source_word: ⲁⲩⲱ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: Sahidic coordinating conjunction
  rationale: Standard Spanish coordination is sufficient and natural here; no special theological force is required.
- source_word: ⲁⲛⲟⲕ
  english_pob_choice: I am
  chosen_spanish: Yo soy
  alternatives_spanish:
  - Soy
  lexicon: Independent first-person pronoun plus copular assertion
  rationale: Thunder’s repeated self-declarations warrant the explicit ‘Yo soy’ to preserve emphatic cadence and the rhetorical pattern visible in the source and English audit.
- source_word: ⲧⲙⲁⲁⲩ
  english_pob_choice: mother
  chosen_spanish: madre
  alternatives_spanish:
  - mamá
  lexicon: Common noun for mother
  rationale: ‘Madre’ is the dignified, publication-ready option and fits the paradoxical relational structure of the saying.
- source_word: ⲧⲥϩⲓⲙⲉ
  english_pob_choice: sister
  chosen_spanish: hermana
  alternatives_spanish:
  - hermana carnal
  lexicon: Common noun for sister
  rationale: The ordinary relational term is the best Spanish equivalent and keeps the terse parallelism of the line.
- source_word: ⲁⲛⲟⲕ ⲧⲉ
  english_pob_choice: I am the ...
  chosen_spanish: Yo soy la ...
  alternatives_spanish:
  - Yo soy el ...
  lexicon: Nominal predication with first-person emphasis
  rationale: Spanish article agreement follows the feminine terms in the first half of the sentence and the masculine terms in the second half, reflecting the paradox rather than smoothing it away.
translation_notes:
  revision_awareness: La versión inglesa anterior había dependido de una lectura equivocada del pasaje; la auditoría posterior corrigió el bloque con base en el copto visible, identificando ‘la partera’, ‘la que no da a luz’ y ‘el consuelo de mis dolores de parto’ en lugar de la antigua lectura sobre boda y matrimonio. Esta propuesta sigue esa revisión y evita importar la lectura descartada como texto principal.
  spanish_consistency_notes:
  - Se mantiene ‘Yo soy’ en cada cláusula para reproducir la anáfora del original.
  - Se prefieren términos naturales y sobrios (‘partera’, ‘dolores de parto’, ‘madre’, ‘hermana’) sin perder el carácter paradójico del texto.
  - No se introduce vocabulario doctrinal cristiano no atestiguado en el bloque; el pasaje conserva su registro sapiencial/paradójico.
  - Se evita añadir un sustantivo equivalente a ‘husband’ donde el copto del segmento no lo muestra con claridad.
