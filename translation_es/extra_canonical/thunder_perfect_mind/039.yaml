translation:
  language: es
  text: Yo soy la que es débil, y soy fuerte.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ⲥⲧⲱⲧ
  english_pob_choice: weak
  chosen_spanish: débil
  alternatives_spanish:
  - débilmente dotada
  - enferma
  - sin fuerzas
  lexicon: Crum, s.v. ⲥⲧⲱⲧ
  rationale: 'El Coptic presenta una predicación de estado con identidad: “yo soy la que es débil”. En español, “débil” conserva esa cualidad sin añadir matices no atestiguados. Evito “pobre” o “frágil” porque desplazan el sentido hacia condición social o delicadeza física.'
- source_word: ϭⲟⲟⲃ
  english_pob_choice: abandon / forsake
  chosen_spanish: abandonar
  alternatives_spanish:
  - dejar
  - desamparar
  - desertar
  lexicon: Crum, s.v. ϭⲟⲟⲃ
  rationale: Aunque el inglés POB osciló entre varias posibilidades en la historia de la línea, el Coptic aquí no requiere un verbo de súplica en esta forma revisada. En español no aparece un equivalente verbal en el texto base porque la revisión aprobada dejó la construcción de identidad y contraste, no una petición.
- source_word: ⲧⲁϫⲣⲉ
  english_pob_choice: strong / power / authority
  chosen_spanish: fuerte
  alternatives_spanish:
  - con poder
  - en autoridad
  - fuerte de poder
  lexicon: Crum, s.v. ⲧⲁϫⲣⲉ
  rationale: La adjudicación revisada del inglés fija el contraste como “I am strong”. En español, “fuerte” es la correspondencia más natural y fiel para la oposición con “débil”. Se evita “en poder” o “en autoridad” porque sobreespecifican el campo semántico sin apoyo suficiente en este segmento.
theological_decisions:
- issue: Identidad poética en primera persona femenina
  english_pob_reading: I am she who is weak, and I am strong.
  chosen_spanish_reading: Yo soy la que es débil, y yo soy fuerte.
  alternative_spanish_readings:
  - Yo soy la que es débil, y yo soy poder
  - Yo soy débil, y yo soy fuerte
  rationale: La línea funciona como autoidentificación enfática, no como mandamiento ni diálogo directo. Conservé el femenino explícito (“la que”) porque el inglés POB y el Coptic lo sostienen. “Soy fuerte” reproduce el contraste sin convertirlo en abstracción impersonal.
  doctrine_reference: Poética sapiencial / discurso en primera persona; sin afirmación doctrinal adicional
translation_notes:
  revision_awareness: 'El paquete de revisión indica que la antigua lectura basada en el consult text era una mala traducción y que la forma correcta es la autoidentificación: “I am she who is weak, and I am strong.” La presente versión española sigue esa corrección y no incorpora los elementos de súplica del consult text, porque no pertenecen al Coptic alineado ni al texto revisado.'
  spanish_consistency_notes:
  - 'Se mantuvo el femenino singular en la autoidentificación: “la que”.'
  - Se prefirió “fuerte” por claridad y naturalidad en español frente a “con poder” o “en autoridad”.
  - No se añadieron notas al pie porque la lectura revisada ya quedó suficientemente determinada por el texto fuente y la historia de revisión.
