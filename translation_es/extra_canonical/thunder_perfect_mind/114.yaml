  text: '… with those who were sent[a];

    I am the one cast out;

    among the dead — but I am the one who exists alone[g][f][e][d][c][b], and the everlasting.'
  footnotes:
  - marker: a
    text: The opening “… with those who have not known [—]” is provisional. The OCR may conflate the verb “to know” (ⲥⲟⲟⲩⲛ) with the noun “mind” (Greek nous), and the object pronoun is unreadable; it could be “me,” “you (pl.),” or “us.”
    reason: alignment_note
  - marker: b
    text: '“Cast out” renders ⲧⲱⲱⲛ ⲉⲃⲟⲗ; alternatives: “driven out,” “expelled.”'
    reason: lexical_alternative
  - marker: c
    text: '“Alone” translates ⲟⲩⲁⲁⲧ; alternatives: “solitary,” “unique.”'
    reason: lexical_alternative
  - marker: d
    text: ⲙⲛⲧⲁⲓ likely continues to ⲙⲛⲧⲁⲓⲱⲛ (“eternal, age(-long)”). I rendered “the everlasting”; “the eternal” is also possible.
    reason: textual_variant
  - marker: e
    text: 'Paradox is intentional: presence “in those who die” contrasted with self-existence “alone” and “everlasting.” This tension is a hallmark of Thunder’s voice and is retained rather than harmonized.'
    reason: parallelism_note
  - marker: f
    text: Or '… with those who have not known [—];'.
    reason: previous_rendering
  - marker: g
    text: Or 'in those who die'.
    reason: previous_rendering
