translation:
  language: es
  text: '… con aquellos que fueron enviados[a];


    yo soy la que fue arrojada[b];


    entre los muertos, pero yo soy la que existe sola[c], y la eterna[d][e].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El verbo copto corresponde a ‘enviar’; el inglés auditado corrigió una lectura anterior que entendía ‘conocer’.
    reason: textual_variant
  - marker: b
    text: ‘Arrojada’ reproduce el valor brusco del idiomático copto ⲧⲱⲱⲛ ⲉⲃⲟⲗ; también puede traducirse ‘expulsada’ o ‘echada fuera’.
    reason: lexical_alternative
  - marker: c
    text: '‘Sola’ traduce el valor de singleness/uniqueness del copto; alternativas: ‘solitaria’, ‘única’.'
    reason: lexical_alternative
  - marker: d
    text: El final copto probablemente continúa hacia una forma relacionada con ‘eternidad / aeón’. Por eso se vierte aquí ‘la eterna’; también sería posible ‘la perdurable’.
    reason: textual_variant
  - marker: e
    text: 'El pasaje conserva una paradoja deliberada: entre los muertos, y a la vez existente sola y eterna.'
    reason: theological_note
lexical_decisions:
- source_word: ⲛⲉⲧⲁⲩⲧⲛ̄ⲛⲟⲟⲩ
  english_pob_choice: those who were sent
  chosen_spanish: aquellos que fueron enviados
  alternatives_spanish:
  - los que fueron enviados
  - los enviados
  lexicon: Crum s.v. ⲧⲛ̄ⲛⲟⲟⲩ
  rationale: El verbo coptico significa 'enviar', no 'conocer'. En español, 'fueron enviados' conserva la pasiva y la referencia a personas comisionadas o despachadas.
- source_word: ⲧⲱⲱⲛ ⲉⲃⲟⲗ
  english_pob_choice: cast out
  chosen_spanish: fue arrojada
  alternatives_spanish:
  - fue expulsada
  - fue echada fuera
  lexicon: Crum s.v. ⲧⲱⲱⲛ; uso idiomático coptico
  rationale: El POB inglés lee el giro como 'cast out', pero el español 'arrojada' transmite el tono abrupto y oracular del pasaje. 'Expulsada' y 'echada fuera' son posibles, pero menos incisivas aquí.
- source_word: ⲛⲉⲧⲙⲟⲟⲩⲧ
  english_pob_choice: among the dead
  chosen_spanish: entre los muertos
  alternatives_spanish:
  - entre los que están muertos
  - entre los difuntos
  lexicon: Crum s.v. ⲙⲟⲩ; forma estativa
  rationale: La forma coptica expresa estado de muerte, no proceso. 'Entre los muertos' conserva esa lectura nominal y la preposición de ubicación colectiva.
- source_word: ϩⲛ
  english_pob_choice: in / among
  chosen_spanish: entre
  alternatives_spanish:
  - en
  - dentro de
  lexicon: Crum s.v. ϩⲛ
  rationale: Con un grupo plural, el español natural y fiel es 'entre'. Mantiene la relación locativa/comitativa sin volverla demasiado abstracta.
- source_word: ⲡⲉⲧ ϣⲟⲟⲡ
  english_pob_choice: the one who exists
  chosen_spanish: la que existe
  alternatives_spanish:
  - la que es
  - la que subsiste
  lexicon: Crum s.v. ϣⲟⲟⲡ
  rationale: Se conserva el valor ontológico de 'existir'. 'La que existe' es directo y evita convertirlo en una simple presencia circunstancial.
- source_word: ⲟⲩⲁⲁⲧ
  english_pob_choice: alone
  chosen_spanish: sola
  alternatives_spanish:
  - solitaria
  - única
  lexicon: Crum s.v. ⲟⲩⲁⲁⲧ
  rationale: En español, 'sola' funciona naturalmente con el verbo 'existir' y mantiene la desnudez del contraste. 'Única' desplaza el sentido hacia singularidad conceptual.
- source_word: ⲙⲛⲧⲁⲓ(ⲱⲛ)
  english_pob_choice: the everlasting
  chosen_spanish: la perdurable
  alternatives_spanish:
  - la eterna
  - la de la era
  lexicon: Crum s.v. ⲙⲛ̄ⲧ- + gr. αἰών
  rationale: Dado el estado textual incierto y la fuerza nominal del final, 'la perdurable' preserva la idea de permanencia sin forzar una reconstrucción demasiado específica. 'La eterna' también es posible, pero 'perdurable' evita una uniformidad excesiva con fórmulas doctrinales ya fijadas.
theological_decisions:
- issue: Paradoja de presencia en la muerte y autoexistencia solitaria
  english_pob_reading: 'The paradox is intentional: presence “in those who die” contrasted with self-existence “alone” and “everlasting.” This tension is retained rather than harmonized.'
  chosen_spanish_reading: 'Se conserva la tensión: estar entre los muertos y, sin embargo, existir sola y perdurable.'
  alternative_spanish_readings:
  - armonizar el pasaje como una mera metáfora espiritual
  - suavizar el contraste con una frase explicativa
  rationale: El testimonio poético del texto depende de la coexistencia de extremos. En español, mantener la yuxtaposición sin explicación preserva la voz aforística y la tensión teológica del original.
  doctrine_reference: Poética de Thunder, Perfect Mind; tensión apofática y paradoja retórica
translation_notes:
  revision_awareness: Se siguió la revisión más reciente que corrigió la lectura errónea de ‘conocer’ a ‘ser enviados’ y la relectura de ‘en aquellos que mueren’ a ‘entre los muertos’. También se tuvo en cuenta la nota de incertidumbre textual sobre el final ⲙⲛⲧⲁⲓ(ⲱⲛ), por lo que la versión española evita sobreespecificar más allá de lo atestiguado.
  spanish_consistency_notes:
  - Se usa voz femenina en coherencia con el yo hablante del texto de Thunder.
  - Se prefiere ‘entre los muertos’ por la lectura estativa del coptico y la revisión adjudicada.
  - Se evita ‘Cristo/Señor’ u otro vocabulario eclesiástico ajeno al pasaje.
  - La puntuación reproduce la cadencia fragmentaria del original y del inglés auditado.
