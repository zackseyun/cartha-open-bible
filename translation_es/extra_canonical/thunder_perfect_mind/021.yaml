translation:
  language: es
  text: 'Los que me niegan me confiesan[a],


    y los que me confiesan me niegan.


    Los que dicen la verdad sobre mí mienten sobre mí,


    y los que mienten sobre mí dicen la verdad sobre mí.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El texto inglés orientador de consulta para este segmento dice: «Yo soy la voz cuyo sonido es múltiple…», pero el Coptic aquí contiene el pareado de negar/confesar. Esto sugiere un desajuste de alineación en esta parte de la página; la traducción sigue el Coptic tal como está dado.'
    reason: alignment_note
lexical_decisions:
- source_word: ⲁⲣⲛⲁ
  english_pob_choice: deny
  chosen_spanish: negar
  alternatives_spanish:
  - renunciar a
  - desconocer
  lexicon: Crum, s.v. ⲁⲣⲛⲁ; Layton, A Coptic Grammar
  rationale: «Negar» conserva el paralelismo confesional con «confesar» y reproduce la fuerza antitética del par copticocristiano sin suavizarlo.
- source_word: ϩⲟⲙⲟⲗⲟⲅⲉⲓ
  english_pob_choice: confess
  chosen_spanish: confesar
  alternatives_spanish:
  - reconocer
  - profesar
  lexicon: Crum, s.v. ϩⲟⲙⲟⲗⲟⲅⲉⲓ; Liddell-Scott for the Greek loan; Layton, A Coptic Grammar
  rationale: «Confesar» mantiene el registro religioso-jurídico del préstamo griego y el contraste tradicional con «negar».
- source_word: ⲛⲉⲧ– (relative)
  english_pob_choice: those who
  chosen_spanish: los que
  alternatives_spanish:
  - quienes
  - los cuales
  lexicon: Layton, A Coptic Grammar § relative clauses
  rationale: «Los que» es la equivalencia natural y neutral para el relativo sustantivado en español, con buena fluidez y sin añadir matiz no presente en el original.
- source_word: ⲙⲉ
  english_pob_choice: truth
  chosen_spanish: la verdad
  alternatives_spanish:
  - verdad
  - lo verdadero
  lexicon: Crum, s.v. ⲙⲉ
  rationale: El sustantivo español «la verdad» reproduce el valor nominal y la construcción idiomática «decir la verdad acerca de mí».
theological_decisions:
- issue: Paradoja confesional de negar/confesar
  english_pob_reading: Those who deny me confess me, and those who confess me deny me.
  chosen_spanish_reading: Los que me niegan me confiesan, y los que me confiesan me niegan.
  alternative_spanish_readings:
  - Los que me reniegan me confiesan, y los que me confiesan me reniegan.
  - Los que me niegan me profesan, y los que me profesan me niegan.
  rationale: Se conserva la paradoja invertida del original sin resolverla ni atenuarla; «negar/confesar» es el par más directo y el más fiel al registro confesional del texto.
  doctrine_reference: Registro confesional y paradojal del discurso; fidelidad semántica al Coptic y al audit trail inglés.
- issue: Segundo pareado sobre verdad y mentira
  english_pob_reading: Those who speak truth about me lie about me, and those who lie about me speak truth about me.
  chosen_spanish_reading: Los que dicen la verdad acerca de mí mienten acerca de mí, y los que mienten acerca de mí dicen la verdad acerca de mí.
  alternative_spanish_readings:
  - Los que hablan verdad sobre mí mienten sobre mí, y los que mienten sobre mí hablan verdad sobre mí.
  - Los que dicen verdad de mí mienten de mí, y los que mienten de mí dicen verdad de mí.
  rationale: El Coptic reconstruido y la revisión aplicada muestran que este hemistiquio falta en el borrador anterior; se restituye íntegramente. «Acerca de mí» conserva el sentido relacional sin forzar un valor doctrinal añadido.
  doctrine_reference: Restitución textual según la revisión aplicada y el OCR coptológico del segmento.
translation_notes:
  revision_awareness: 'La revisión aplicada corrigió una omisión importante: el texto copto del segmento no termina en el pareado negar/confesar, sino que continúa con el pareado verdad/mentira. La presente versión española incorpora ambos pares y mantiene el orden paradojal indicado por el testimonio coptológico y el audit trail inglés. También se evitó depender de la formulación consultiva inicial en inglés, que no correspondía al segmento coptó correcto.'
  spanish_consistency_notes:
  - Se mantuvo «mí» en los cuatro miembros para reflejar el objeto pronominal de primera persona singular y la cohesión retórica del pasaje.
  - Se prefirió «acerca de mí» a «sobre mí» para un español más natural, sin cambiar el sentido relacional del original.
  - Se conservó la simetría verbal «niegan/confiesan» y «dicen la verdad/mienten» para que el paralelismo y la inversión retórica queden claros.
