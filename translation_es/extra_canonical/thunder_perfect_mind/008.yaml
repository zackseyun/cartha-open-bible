translation:
  language: es
  text: Soy la prostituta[a] y la santa[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Prostituta» es la equivalencia neutral de ⲡⲟⲣⲛⲏ; el inglés POB eligió «whore» para conservar el impacto estigmatizante. En español, «prostituta» evita un término demasiado arcaico o más insultante que el alcance del original.
    reason: lexical_alternative
  - marker: b
    text: ⲥⲉⲙⲛⲏ puede significar ‘reverenciada’, ‘augusta’ o ‘santa’. Aquí se traduce como «santa» para conservar el paralelo nominal con «prostituta» y la tensión paradojal del dicho.
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲁⲛⲟⲕ … ⲧⲉ
  english_pob_choice: I am
  chosen_spanish: Soy
  alternatives_spanish:
  - Yo soy
  - Soy yo
  lexicon: Crum; Layton, Coptic Grammar (construcción copulativa)
  rationale: La construcción coptica de primera persona copulativa expresa identificación directa. En español, «Soy» conserva la repetición enfática del autoidentificarse sin añadir sujeto explícito innecesario.
- source_word: ⲡⲟⲣⲛⲏ
  english_pob_choice: whore
  chosen_spanish: la prostituta
  alternatives_spanish:
  - la ramera
  - la meretriz
  lexicon: LSJ (pornē); Crum (préstamo griego en copto)
  rationale: El POB inglés preserva la fuerza de choque de «whore», pero en español contemporáneo «prostituta» comunica el referente léxico de manera clara y pública sin cargar una injuria arcaica que podría sonar más idiomática que textual.
- source_word: ⲥⲉⲙⲛⲏ
  english_pob_choice: holy one
  chosen_spanish: la santa
  alternatives_spanish:
  - la santa mujer
  - la reverenciada
  - la augusta
  lexicon: LSJ (semnē, ‘revered/august/holy’); Crum
  rationale: El adjetivo sustantivado funciona como un paralelo nominal de «prostituta». «La santa» mantiene esa simetría y el contraste sacro/profano, sin perder la posible carga de ‘reverenciada’ que el contexto permite.
translation_notes:
  revision_awareness: El contexto de auditoría en inglés no presenta revisiones aplicadas; el dictamen de alta concordancia se mantiene. La elección española busca fidelidad semántica y efecto retórico equivalente, sin introducir expansión interpretativa.
  spanish_consistency_notes:
  - 'Se conserva el contraste nominal paralelo: «la prostituta» // «la santa».'
  - No se usa «Cristo», «Señor» ni terminología bíblica convencional ajena al texto fuente.
  - La puntuación refleja una sentencia breve y tajante, acorde con el tono oracular del segmento.
