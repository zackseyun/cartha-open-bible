translation:
  language: es
  text: Yo soy la madre y la hija[a][b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El copto ⲥϩⲓⲙⲉ normalmente significa 'mujer'; aquí se vierte 'hija' para conservar la pareja antitética con 'madre' en esta secuencia.
    reason: lexical_alternative
  - marker: b
    text: Es probable que el fragmento ⲑⲉⲛⲟⲥ continúe ⲡⲁⲣⲑⲉⲛⲟⲥ ('virgen') desde una línea adyacente, pero su ubicación dentro de este bloque es incierta.
    reason: alignment_note
  - marker: c
    text: 'O: ''Yo soy la madre; yo soy la hija''.'
    reason: previous_rendering
lexical_decisions:
- source_word: ⲁⲛⲟⲕ ⲡⲉ / ⲧⲉ (marco copulativo de primera persona)
  english_pob_choice: I am
  chosen_spanish: Yo soy
  alternatives_spanish:
  - Soy
  - Yo soy (copulativo)
  lexicon: Layton; Crum
  rationale: Conserva la afirmación en primera persona y el tono sentencioso del original. En español, añadir el pronombre enfatiza el yo discursivo del texto sin volverlo excesivamente pesado.
- source_word: ⲧⲙⲁⲁⲩ
  english_pob_choice: mother
  chosen_spanish: madre
  alternatives_spanish:
  - madre (literal)
  - mamá
  lexicon: Crum
  rationale: El sustantivo copto significa de forma común 'madre'; 'madre' es la equivalencia directa y digna en español.
- source_word: ⲧϣⲉⲉⲣⲉ / ⲧⲥϩⲓⲙⲉ (lectura relacionada en el aparato auditado)
  english_pob_choice: daughter
  chosen_spanish: hija
  alternatives_spanish:
  - mujer
  - femenina
  - esposa
  - hija
  lexicon: Crum
  rationale: Aunque el campo léxico base puede ser 'mujer/femenina', el contexto antitético con 'madre' en esta sección favorece 'hija' para reproducir la pareja relacional y el paralelismo del pasaje, como ya refleja la decisión auditada en inglés.
theological_decisions:
- issue: Autorreferencialidad paradójica en la voz poética
  english_pob_reading: I am the mother and the daughter.
  chosen_spanish_reading: Yo soy la madre y la hija.
  alternative_spanish_readings:
  - Soy la madre y la hija.
  - Yo soy la madre; yo soy la hija.
  rationale: La línea presenta una identidad paradójica en primera persona. Mantener una sola cláusula con 'y' sigue el ajuste auditado del inglés y preserva el efecto retórico sin desdoblar artificialmente la sintaxis.
  doctrine_reference: poética gnóstica / voz enigmática del texto
- issue: Posible ambigüedad del término femenino copto frente a 'hija'
  english_pob_reading: daughter (with lexical note on woman/female)
  chosen_spanish_reading: hija
  alternative_spanish_readings:
  - mujer
  - femenina
  rationale: 'La traducción española debe resolver la misma tensión que el inglés auditado: el término copto puede denotar ''mujer/femenina'', pero el paralelismo con ''madre'' hace que ''hija'' sea la mejor opción funcional para el lector español.'
  doctrine_reference: Crm. / sentido léxico contextual
translation_notes:
  revision_awareness: La lectura sigue la revisión auditada que corrige la sintaxis inglesa a una sola cláusula con 'and' entre los dos sustantivos, y toma en cuenta la observación textual de que el copto no repite el marco 'I am' para la segunda mitad.
  spanish_consistency_notes:
  - Se mantiene 'madre'/'hija' como pareja relacional paralela, evitando 'mujer' para no diluir el contraste interno del segmento.
  - Se usa 'Yo soy' en registro solemne y publicable, coherente con la voz ritual/aforística del texto.
  - La nota al pie marca explícitamente la tensión léxica heredada del aparato inglés, sin introducir terminología eclesial ajena al pasaje.
