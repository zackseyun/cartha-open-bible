translation:
  language: es
  text: 'Esto es mío:


    Yo surgí en una tierra[a],


    y ustedes llegaron a manifestarse en el conocimiento;


    una tierra está en su corazón[b]—ustedes reciben a los de afuera[c], en lugares.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La lectura del copto aquí es incierta en el OCR; la revisión del expediente corrige una antigua lectura de «oscuridad» y favorece «tierra» o «suelo».
    reason: textual_variant
  - marker: b
    text: 'El posesivo y la sintaxis son ambiguos en el OCR; también podría leerse con matiz colectivo: «una tierra está dentro de ustedes».'
    reason: lexical_alternative
  - marker: c
    text: La frase no parece ser solo adverbial; puede implicar a «los de afuera» como grupo sustantivado.
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲧⲉ ⲡⲁⲓ ⲙⲙⲟⲉⲓ
  english_pob_choice: This is mine
  chosen_spanish: Esto es mío
  alternatives_spanish:
  - Esta es mi voz
  - Esta es mi palabra
  lexicon: Sahidic Coptic (OCR-uncertain segmentation)
  rationale: La construcción es dudosa por el OCR; el español breve «Esto es mío» conserva el valor deíctico sin forzar un sustantivo no atestiguado.
- source_word: ⲉⲓⲉⲃⲟⲗ
  english_pob_choice: came forth
  chosen_spanish: salí
  alternatives_spanish:
  - salí hacia afuera
  - vine fuera
  lexicon: Sahidic Coptic (ei ebol)
  rationale: El giro idiomático expresa salir/proceder desde un lugar; «salí» mantiene la cadencia directa en español.
- source_word: ⲕⲁϩ
  english_pob_choice: earth
  chosen_spanish: tierra
  alternatives_spanish:
  - suelo
  - terreno
  - tierra/ground
  lexicon: Sahidic Coptic
  rationale: Se evita la falsa opción «oscuridad». «Tierra» es la equivalencia natural y fiel al valor de suelo/ground atestiguado por la revisión.
- source_word: ⲛⲧⲉⲧⲛϣⲟⲟⲡ ⲉⲃⲟⲗ
  english_pob_choice: you came to be manifest
  chosen_spanish: llegaron a manifestarse
  alternatives_spanish:
  - aparecieron
  - vinieron a estar manifestos
  lexicon: Sahidic Coptic
  rationale: El verbo combina llegar a ser con la idea de salir afuera/manifestarse; el español refleja esa exteriorización sin sobreexplicar.
- source_word: ⲉⲡⲓⲥⲧⲏⲙ
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - sabiduría
  - entendimiento
  lexicon: Greek loan (ἐπιστήμη) in Coptic
  rationale: «Conocimiento» conserva el sentido primario y su registro abstracto, adecuado para la oposición del pasaje.
- source_word: ⲛϩⲏⲧ
  english_pob_choice: in your heart
  chosen_spanish: en su corazón
  alternatives_spanish:
  - dentro de su corazón
  - en lo íntimo de ustedes
  lexicon: Sahidic Coptic
  rationale: La expresión fija de interioridad se vierte con un posesivo plural de cortesía/neutralidad en español («su»), conservando el plural del contexto.
- source_word: ⲛⲉⲃⲟⲗ
  english_pob_choice: outside
  chosen_spanish: a los de afuera
  alternatives_spanish:
  - a lo de afuera
  - a las cosas de afuera
  lexicon: Sahidic Coptic
  rationale: La revisión señala que no es solo un adverbio sino un grupo sustantivado. «A los de afuera» comunica la referencia plural sin añadir contenido inexistente.
- source_word: ⲧⲟⲡⲟⲥ
  english_pob_choice: places
  chosen_spanish: lugares
  alternatives_spanish:
  - sitios
  - emplazamientos
  lexicon: Greek loan (τόπος) in Coptic
  rationale: «Lugares» es la equivalencia española más directa y sobria para el plural concreto del préstamo griego.
theological_decisions:
- issue: ⲕⲁϩ no significa 'darkness' here
  english_pob_reading: I came forth in an earth; an earth is in your heart
  chosen_spanish_reading: Yo salí de una tierra; una tierra está en su corazón
  alternative_spanish_readings:
  - Yo salí de una oscuridad; una oscuridad está en su corazón
  rationale: 'Se sigue la corrección aducida por la revisión: ⲕⲁϩ se entiende como ''earth/ground''. Traducir ''oscuridad'' introduciría un error léxico no sustentado por el Coptic.'
  doctrine_reference: Ninguna; decisión de crítica léxica y fidelidad textual.
- issue: ⲛⲧⲉⲧⲛϣⲟⲟⲡ ⲉⲃⲟⲗ expresa manifestación exterior, no 'seek'
  english_pob_reading: you came to be manifest / you receive those outside
  chosen_spanish_reading: llegaron a manifestarse / ustedes reciben a los de afuera
  alternative_spanish_readings:
  - aparecieron / buscan afuera
  rationale: La revisión identifica ϣⲱⲡ como 'receive/take', no 'seek'. El español evita la lectura corregida 'buscar' y conserva la exterioridad/manifestación del movimiento del texto.
  doctrine_reference: Ninguna; decisión de crítica léxica y coherencia semántica.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión aplicada que corrige dos errores mayores del borrador inglés: ⲕⲁϩ no es «darkness» sino «earth/ground», y el verbo no es «seek» sino «receive/take». Por eso el español evita cualquier lectura de oscuridad o búsqueda y sigue la semántica de tierra/suelo, manifestación y recepción de los de afuera. También se conservó la incertidumbre OCR del arranque de la línea inicial, sin inventar un sustantivo inexistente.'
  spanish_consistency_notes:
  - Se usa «tierra» para ⲕⲁϩ, no «oscuridad».
  - Se mantiene el plural del pasaje con «ustedes» y «su» como posesivo neutral.
  - Se evita «Cristo», «SEÑOR» u otra terminología eclesiástica no presente en el texto.
  - Se conserva un español legible y sobrio, con ritmo paralelo cercano al original.
