    text: 'El posesivo y la sintaxis son ambiguos en el OCR; también podría leerse con matiz colectivo: «una tierra está dentro de ustedes».'
    reason: lexical_alternative
  - marker: c
    text: La frase no parece ser solo adverbial; puede implicar a «los de afuera» como grupo sustantivado.
    reason: lexical_alternative
