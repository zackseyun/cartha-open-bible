review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien el sentido base del copto según el audit trail inglés: la primera cláusula conserva la idea de atención deliberada hacia la hablante, y la segunda refleja adecuadamente el contraste con ⲧⲱⲡ ⲉⲃⲟⲗ como ‘rechazar’, con la alternativa de expulsión en nota. No hay indicios de desviación teológica o semántica mayor.'
  spanish_quality_summary: 'El español es claro, pero ‘en quien has puesto tu mente’ suena menos natural en español que una formulación con ‘en mí’ o ‘has fijado tu mente en mí’. Además, la nota a) necesita mejor español: ‘puesto en tu corazón sobre mí’ es un calco torpe; conviene ‘has puesto tu corazón en mí’ y mantener las alternativas. También falta tilde en ‘copto’.'
  glossary_alignment: No hay términos del glosario doctrinal principal en juego. La decisión ‘mente’ para ϩⲏⲧ es coherente con el rationale documentado, con ‘corazón’ reservado para la nota literal. ‘Rechazado’ sigue correctamente la elección inglesa para ⲧⲱⲡ ⲉⲃⲟⲗ, preservando en nota la alternativa ‘echado fuera’.
  issues:
  - severity: medium
    issue: La frase principal ‘aquel en quien has puesto tu mente’ es poco idiomática en español.
    rationale: Aunque comprensible, suena traducida del inglés. Una forma como ‘aquel en quien has fijado tu mente’ preserva mejor el valor deliberado de la construcción copta y lee con más naturalidad.
  - severity: medium
    issue: 'La nota a) contiene un calco poco natural: ‘puesto en tu corazón sobre mí’.'
    rationale: La nota debe reflejar el literal de manera inteligible en español. ‘Has puesto tu corazón en mí’ comunica mejor la imagen subyacente sin perder el vínculo con la explicación léxica.
  - severity: low
    issue: Falta tilde en ‘copto’ en la nota b).
    rationale: Corrección ortográfica menor, pero conviene normalizarla.
