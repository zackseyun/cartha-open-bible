translation:
  language: es
  text: Yo soy aquel en quien has fijado tu mente,[a] y me has rechazado.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Lit. ‘has puesto tu corazón en mí’; alternativas: ‘has meditado en mí’, ‘me has considerado’.'
    reason: lexical_alternative
  - marker: b
    text: O ‘y me has echado fuera’. El verbo copto con ⲉⲃⲟⲗ suele llevar la idea de expulsión.
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲕⲁϩ ⲛϩⲏⲧ + ϣⲟⲡ
  english_pob_choice: set your mind (on)
  chosen_spanish: has puesto tu mente (en mí)
  alternatives_spanish:
  - has meditado en mí
  - has pensado en mí
  - me has considerado
  lexicon: Crum, Coptic Dictionary; Layton, Coptic Grammar
  rationale: La construcción coptica describe una acción deliberada e interior del pensamiento o atención. En español, ‘poner la mente en’ conserva bien esa idea de atención intencional sin volverla demasiado literal o arcaica.
- source_word: ϩⲏⲧ
  english_pob_choice: mind
  chosen_spanish: mente
  alternatives_spanish:
  - corazón
  lexicon: Crum, Coptic Dictionary
  rationale: Aunque ϩⲏⲧ puede abarcar ‘corazón’ como sede del pensamiento, en español ‘mente’ comunica mejor la función cognitiva que el audit trail inglés decidió destacar.
- source_word: ⲧⲱⲡ ⲉⲃⲟⲗ
  english_pob_choice: reject
  chosen_spanish: rechazado
  alternatives_spanish:
  - echado fuera
  - expulsado
  - arrojado fuera
  lexicon: Crum, Coptic Dictionary
  rationale: El compuesto puede significar expulsar o echar fuera. ‘Rechazar’ sigue la elección del POB en inglés y encaja con el contraste entre fijar la mente en alguien y luego apartarlo. Se conserva la posible fuerza de expulsión en la nota.
translation_notes:
  revision_awareness: 'La redacción sigue el audit trail inglés revisado: mantiene ‘set your mind’ como idea principal, evita calcar mecánicamente el inglés y conserva la alternativa semántica de expulsión en nota. También respeta la decisión de no incorporar frases adicionales del OCR por la incertidumbre de alineación.'
  spanish_consistency_notes:
  - Se usa ‘mente’ de forma consistente para la sede del pensamiento.
  - Se evita ‘SEÑOR’ u otra terminología no pertinente al pasaje.
  - El tono es sobrio y publicable, con puntuación española normalizada.
  - Las notas a pie de página preservan la tensión lexical entre ‘rechazar’ y ‘echar fuera’.
