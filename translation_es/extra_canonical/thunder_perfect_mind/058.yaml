- from: Yo soy aquel en quien has puesto tu mente,[a] y me has rechazado.[b]
  to: Yo soy aquel en quien has fijado tu mente,[a] y me has rechazado.[b]
  rationale: Se ajusta la primera cláusula para un español más natural y digno, manteniendo la fuerza cognitiva de la construcción copta. Se rehace la nota literal para evitar un calco extraño y se corrige la ortografía en la nota b).
