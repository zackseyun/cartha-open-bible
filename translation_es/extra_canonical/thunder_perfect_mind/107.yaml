  rationale: 'La revisión es menor y no cambia el sentido: sustituye ‘el oír’ por ‘la escucha’ para una nominalización más natural en español poético, y ‘que no puede ser asida’ por ‘que no se puede asir’ para mejorar la fluidez sin perder la imagen de inaprensibilidad. Se conserva intacta la estructura semiótica y las adjudicaciones textuales ya establecidas.'
