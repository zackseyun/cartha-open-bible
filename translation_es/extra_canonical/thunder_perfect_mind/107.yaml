base_translation:
  language: en
  yaml_path: translation/extra_canonical/thunder_perfect_mind/107.yaml
  text: 'I am the hearing that is attainable to all[a];

    I am the speech that cannot be grasped;

    the name of the sound and the sound of the name;

    I am the sign of this[g][f][e][d][c][b], and the manifestation.'
  footnotes:
  - marker: a
    text: ϣⲏⲡ can mean “great,” but in this Thunder collocation many editors take it as “attainable/within reach,” yielding the paradox with the following clause.
    reason: lexical_alternative
  - marker: b
    text: ⲉⲙⲁⲩ/ⲙⲁⲩ is deictic (“there”). Some translations read an inaccessibility contrast here (“the speech that cannot be grasped”), which may reflect a different underlying reading.
    reason: alternative_reading
  - marker: c
    text: ⲥⲙⲁϩⲧⲉ = “remembrance/memory.” The pronominal object ⲙⲙⲟϥ (“of it/him”) likely refers to the “speech/word.”
    reason: lexical_alternative
  - marker: d
    text: ⲥⲙⲏ may be “sound,” “voice,” or “report.” I choose “sound” to preserve the abstract acoustic pair with “name.”
    reason: lexical_alternative
  - marker: e
    text: ⲟⲩⲱⲛϩ ⲉⲃⲟⲗ could be rendered “light that shines out” to make the outward aspect explicit.
    reason: lexical_alternative
  - marker: f
    text: Or 'I am the speech that is there;\nI am its remembrance—'.
    reason: previous_rendering
  - marker: g
    text: Or 'I am the sign as well, and the light that goes forth.'.
    reason: previous_rendering
