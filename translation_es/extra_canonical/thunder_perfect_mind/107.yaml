translation:
  language: es
  text: 'Yo soy la escucha que está al alcance de todos[a];


    soy el habla que no se puede asir;


    el nombre del sonido y el sonido del nombre;


    yo soy el signo de esto y la manifestación.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ϣⲏⲡ puede significar “grande”, pero en esta colocación de Thunder muchos editores lo entienden como “al alcance” o “accesible”, lo que preserva el contraste con la cláusula siguiente.
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲥⲱⲧⲙ
  english_pob_choice: hearing
  chosen_spanish: oír
  alternatives_spanish:
  - escuchar
  - audición
  lexicon: Crum; Layton
  rationale: Se conserva el campo auditivo y la formulación nominal del original en una forma natural para el español poético. ‘Oír’ mantiene el motivo acústico sin moralizarlo como obediencia.
- source_word: ⲉⲧϣⲏⲡ
  english_pob_choice: attainable
  chosen_spanish: está al alcance
  alternatives_spanish:
  - es accesible
  - está a la mano
  lexicon: Crum; Kasser (uso sahídico)
  rationale: La idea no es simplemente ‘grande’, sino una cualidad paradójica de accesibilidad. ‘Al alcance’ comunica esa cercanía sin perder la tensión con la cláusula siguiente.
- source_word: ⲛϩⲱⲃ ⲛⲓⲙ
  english_pob_choice: to all
  chosen_spanish: de todos
  alternatives_spanish:
  - para todos
  - a todos
  lexicon: Crum
  rationale: Funciona idiomáticamente como universalidad. ‘De todos’ integra bien la estructura española con el valor distributivo del original.
- source_word: ⲡϣⲁϫⲉ
  english_pob_choice: speech
  chosen_spanish: habla
  alternatives_spanish:
  - palabra
  - discurso
  lexicon: Crum; Layton
  rationale: ‘Habla’ conserva el carácter vivo y performativo del término mejor que ‘palabra’, que en español puede cargar más peso teológico o lexicalizado.
- source_word: ⲉⲧⲉⲙⲁⲩϣⲁⲙⲁϩⲧⲉ ⲙⲙⲟϥ
  english_pob_choice: the speech that cannot be grasped
  chosen_spanish: que no puede ser asida
  alternatives_spanish:
  - que no pueden asir
  - que no se puede comprender
  lexicon: Crum; análisis morfológico del Coptic audit trail
  rationale: La revisión muestra que la frase expresa imposibilidad de asir/atrapar, no ‘estar allí’ ni ‘remembrance’. ‘Asida’ conserva el contraste con la accesibilidad del verso anterior y evita interpretar demasiado hacia una mera comprensión intelectual.
- source_word: ⲣⲁⲛ
  english_pob_choice: name
  chosen_spanish: nombre
  lexicon: Crum
  rationale: Término directo y estable; mantiene el paralelismo con ‘sonido’.
- source_word: ⲥⲙⲏ
  english_pob_choice: sound
  chosen_spanish: sonido
  alternatives_spanish:
  - voz
  - ruido
  lexicon: Crum
  rationale: ‘Sonido’ reproduce el emparejamiento abstracto con ‘nombre’ y evita personificarlo como ‘voz’.
- source_word: ⲥⲏⲙⲉⲓ(ον)
  english_pob_choice: sign
  chosen_spanish: signo
  alternatives_spanish:
  - señal
  - marca
  lexicon: Greek loanword (σημεῖον) via Crum
  rationale: ‘Signo’ es la equivalencia más directa y permite mantener la cadena semiótica del pasaje.
- source_word: ⲡⲁⲓ
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - de esto
  - este
  lexicon: Crum
  rationale: El deíctico resume lo ya dicho; en español, ‘de esto’ resulta menos fluido en la construcción nominal, y ‘esto’ mantiene la referencia sin sobreexplicar.
- source_word: ⲟⲩⲱⲛϩ ⲉⲃⲟⲗ
  english_pob_choice: the manifestation
  chosen_spanish: la manifestación
  alternatives_spanish:
  - la revelación
  - lo manifiesto
  lexicon: Crum
  rationale: 'La adjudicación revisada corrige la lectura anterior: no es ‘luz’, sino el sustantivo de ‘revelar/manifiestar’. ‘Manifestación’ es sobria, fiel y publicable.'
translation_notes:
  revision_awareness: 'Se integró la revisión adjudicada que corrige dos errores mayores del borrador inglés: (1) la segunda línea no alude a una frase de ‘remembrance’, sino a una imposibilidad de asir el habla; (2) el cierre no dice ‘la luz que sale’, sino ‘la manifestación’. Por eso el español adopta ‘que no puede ser asida’ y ‘la manifestación’, manteniendo además el paralelismo auditivo nombre/sonido/signo del tramo final.'
  spanish_consistency_notes:
  - Se evitó ‘SEÑOR’ o terminología litúrgica ajena porque el pasaje no trata del Tetragrámaton ni de una cita bíblica griega.
  - ‘Habla’ y ‘sonido’ se eligieron para conservar el registro abstracto y no convertir el pasaje en una afirmación doctrinal ajena al texto.
  - El deíctico final se traduce como ‘esto’ para reflejar el valor resumptivo del coptico sin añadir interpretación.
  - La puntuación mantiene una cadencia paralelística adecuada para lectura pública en español.
