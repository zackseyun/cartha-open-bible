review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue correctamente las dos adjudicaciones clave del rastro inglés: ⲉⲧⲉⲙⲁⲩϣⲁⲙⲁϩⲧⲉ ⲙⲙⲟϥ se refleja como una cláusula de imposibilidad de asir, no como ‘está allí/recuerdo’; y ⲡⲥⲏⲙⲉⲓⲟⲛ ⲙⲡⲁⲓ ... ⲡⲟⲩⲱⲛϩ ⲉⲃⲟⲗ se traduce con ‘el signo de esto y la manifestación’, no con ‘luz’ ni con un falso ‘también’. También preserva bien la secuencia semiótica oír/habla/nombre/sonido/signo/manifestación.'
  spanish_quality_summary: El texto es generalmente claro y digno, pero requiere un pequeño ajuste de naturalidad y precisión idiomática. ‘El oír’ suena más forzado en español que una nominalización más natural como ‘la audición’ o ‘el escuchar’; y ‘que no puede ser asida’ es fiel pero algo rígido y literario en exceso. Una leve revisión puede mantener la fuerza poética sin calco innecesario.
  glossary_alignment: 'No hay conflictos con la terminología doctrinal del proyecto. Las elecciones ‘habla’, ‘sonido’, ‘signo’ y ‘manifestación’ son coherentes con las decisiones léxicas auditadas. La única mejora recomendada es estilística: preferir una forma nominal más natural para ⲥⲱⲧⲙ y una pasiva más idiomática para ‘cannot be grasped’.'
  issues:
  - severity: medium
    issue: ‘Yo soy el oír’ suena poco natural en español estándar.
    rationale: Aunque intenta conservar el sustantivo abstracto de ‘hearing’, en español ‘el oír’ resulta marcado y algo tosco. ‘La audición’ sería técnica; ‘el escuchar’ es más natural pero algo verbal. ‘La escucha’ ofrece buen equilibrio entre abstracción, legibilidad y tono poético.
  - severity: low
    issue: ‘que no puede ser asida’ es correcto pero algo duro.
    rationale: ‘Asida’ es comprensible, pero en español corriente-litúrgico suena menos fluido que ‘que no se puede asir’. Esta opción conserva el matiz de ‘grasped’ sin deslizarse hacia ‘comprender’.
  - severity: low
    issue: Leve desajuste entre texto y decisión léxica de ⲛϩⲱⲃ ⲛⲓⲙ.
    rationale: La decisión léxica lista ‘de todos’, pero el texto usa ‘de todos’ dentro de ‘al alcance de todos’, mientras el audit trail inglés favorece ‘to all’. La revisión puede armonizar mejor con ‘para todos’ dentro de la frase española sin pérdida de sentido.
  revised_spanish_text: 'Yo soy la escucha que está al alcance de todos[a];


    soy el habla que no se puede asir;


    el nombre del sonido y el sonido del nombre;


    yo soy el signo de esto y la manifestación.'
  revised_footnotes:
