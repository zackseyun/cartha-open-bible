translation:
  language: es
  text: 'Yo soy la que clama,

    y soy echada fuera sobre la faz de la tierra.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ⲭⲣⲟⲉⲓ
  english_pob_choice: cry out
  chosen_spanish: clama
  alternatives_spanish:
  - clamo con voz fuerte
  - grita
  - exclama
  lexicon: Crum; Layton, Coptic in 20 Lessons
  rationale: En español, «clamar» conserva el acto audible y público del verbo sin volver la línea innecesariamente explicativa. Evita una paráfrasis demasiado libre y mantiene el tono enfático del original.
- source_word: ⲕⲁ ⲉⲃⲟⲗ
  english_pob_choice: cast out
  chosen_spanish: echada fuera
  alternatives_spanish:
  - arrojada fuera
  - expulsada
  - echada
  lexicon: 'Crum (ⲕⲁ: throw, cast) + directional ⲉⲃⲟⲗ ''out'''
  rationale: «Echada fuera» reproduce la fuerza expulsiva de la construcción copta y encaja bien con el pasivo resultante en español. «Expulsada» sería posible, pero pierde un poco el golpe imagístico de «cast out».
- source_word: ϩⲙ ⲡϫⲓⲛⲓ
  english_pob_choice: upon the face (surface)
  chosen_spanish: sobre la faz
  alternatives_spanish:
  - sobre la superficie
  - sobre el rostro
  - en la faz
  lexicon: Crum; set phrase with 'face/surface'
  rationale: «Faz» conserva el eco idiomático de «face/surface» que el POB quiso mantener. En español bíblico y literario es natural, solemne y suficientemente cercano al giro de la fuente.
translation_notes:
  revision_awareness: Se siguió la traducción revisada y alineada con el segmento copto fuente (Thunder, Perfect Mind, bloque 14), evitando la lectura equivocada previa y preservando el paralelismo breve de dos miembros.
  spanish_consistency_notes:
  - Se mantuvo el sujeto femenino explícito («la que» / «la que clama») conforme al inglés POB «she».
  - Se prefirió «faz» en lugar de una modernización plana como «superficie» para conservar la cadencia y el color idiomático del original.
  - No se añadieron notas al pie porque la versión española puede expresar el sentido principal sin necesidad de variantes ancladas en el texto.
