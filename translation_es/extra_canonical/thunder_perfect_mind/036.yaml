  text: It is the utterance according to prudence of my seeking[a], and it is the knowledge of my searching[d][c][b]. But I am she who exists in all fears and in courage.
  footnotes:
  - marker: a
    text: ⲡⲛⲏϣⲁⲧ can mean ‘manliness, virility’ and by extension ‘courage’; alternatives include ‘boldness.’ “Courage” was chosen to preserve the ethical opposite of ‘fear’ without gendered nuance.
    reason: lexical_alternative
  - marker: b
    text: The initial noun is uncertain due to the OCR reading ⲉⲧⲕⲉⲟⲩⲁⲩ. The rendering “utterance/saying” is provisional; the structure likely intends something like ‘the [saying] according to prudence of my seeking.’
    reason: alignment_note
  - marker: c
    text: Fear // courage forms a deliberate antithesis; the line asserts presence in both contraries rather than choosing one.
    reason: parallelism_note
  - marker: d
    text: Or 'But I am in their fear and in courage.'.
    reason: previous_rendering
