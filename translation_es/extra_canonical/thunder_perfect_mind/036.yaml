translation:
  language: es
  text: Es el enunciado[a] según la prudencia de mi búsqueda, y es el conocimiento de mi indagación. Pero yo soy la que existe en todos los temores[b] y en la valentía[c][d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El segmento nominal inicial es incierto en la fuente; «enunciado» es una solución provisional. También podría entenderse como «expresión», «dicho» o «proclamación».
    reason: alignment_note
  - marker: b
    text: La fuente contrapone deliberadamente «temores» y «valentía»; el plural se conserva para no perder el alcance universal de la afirmación.
    reason: parallelism_note
  - marker: c
    text: «Valentía» traduce un término que también puede significar «virilidad», «valor» o «audacia»; se eligió para expresar el opuesto ético de «temores» sin matiz de género.
    reason: lexical_alternative
  - marker: d
    text: 'O: «Pero yo estoy en todos los temores y en la valentía». Esta lectura alternativa debilita la autoidentificación femenina explícita que probablemente conserva el copto.'
    reason: previous_rendering
lexical_decisions:
- source_word: ⲧⲁⲣⲕⲁⲧⲁ
  english_pob_choice: according to
  chosen_spanish: según
  alternatives_spanish:
  - de acuerdo con
  - conforme a
  lexicon: Greek κατά (loan into Coptic)
  rationale: ‘Según’ reproduce con naturalidad el valor de conformidad/criterio que la fuente expresa con kata, sin volver rígida la frase en español.
- source_word: ⲫⲣⲟⲛⲓ
  english_pob_choice: prudence
  chosen_spanish: prudencia
  alternatives_spanish:
  - entendimiento
  - discernimiento
  - pensamiento
  lexicon: Greek φρόνησις (via Coptic spelling)
  rationale: ‘Prudencia’ conserva el registro sapiencial/filosófico y mantiene la relación con la idea de un obrar o decir conforme a juicio.
- source_word: ⲣⲓⲧⲉ
  english_pob_choice: seeking
  chosen_spanish: búsqueda
  alternatives_spanish:
  - buscar
  - indagación
  - persecución
  lexicon: Crum 358a (ⲣⲓⲧⲉ ‘seek’)
  rationale: Para el sintagma posesivo ‘of my seeking’, ‘búsqueda’ suena más idiomático en español que un gerundio sustantivado, y conserva el matiz de proceso.
- source_word: ⲥⲁϩⲟⲩ
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - saber
  - sabiduría
  - entendimiento
  lexicon: Crum 327b (ⲥⲁϩⲟⲩ ‘knowledge’)
  rationale: ‘Conocimiento’ es la equivalencia más directa y sobria para el sustantivo epistémico del texto.
- source_word: ⲁϣⲟⲩϣⲟⲩ
  english_pob_choice: searching
  chosen_spanish: indagación
  alternatives_spanish:
  - búsqueda
  - exploración
  - investigación
  lexicon: Crum 35a (ϣⲟⲩϣⲟⲩ ‘to search, seek’)
  rationale: ‘Indagación’ equilibra el paralelismo con ‘búsqueda’ y evita repetir el mismo lema español dos veces en la cláusula, sin perder el sentido de búsqueda activa.
- source_word: ϣⲟⲟⲡ
  english_pob_choice: exist in / be present in
  chosen_spanish: existe en
  alternatives_spanish:
  - está en
  - está presente en
  - permanece en
  lexicon: Crum 589b (ϣⲟⲟⲡ ‘be present, exist’)
  rationale: La relativa ‘yo soy la que existe en…’ refleja la identificación fuerte del original y conserva la afirmación de presencia/ser sin exagerar la paráfrasis.
- source_word: ⲫⲟⲃⲟⲥ
  english_pob_choice: fear
  chosen_spanish: temores
  alternatives_spanish:
  - miedos
  - terror
  - dread
  lexicon: Greek φόβος (loan)
  rationale: El plural de la fuente pide un plural en español; ‘temores’ mantiene amplitud semántica y evita sonar demasiado psicológico o coloquial.
- source_word: ⲡⲛⲏϣⲁⲧ
  english_pob_choice: courage
  chosen_spanish: valor
  alternatives_spanish:
  - coraje
  - courage
  - audacia
  lexicon: Crum 231a (ⲛⲏϣⲁⲧ ‘manhood, courage’)
  rationale: ‘Valor’ comunica la contraparte ética de ‘temores’ en un español más natural y digno, sin el matiz de género explícito del etimón.
- source_word: ⲁⲩⲱ
  english_pob_choice: and
  chosen_spanish: y
  lexicon: Crum 42a (ⲁⲩⲱ ‘and’)
  rationale: Conector simple y transparente para mantener la coordinación del paralelismo.
- source_word: ⲁⲛⲟⲕ ⲇⲉ
  english_pob_choice: But I
  chosen_spanish: Pero yo
  alternatives_spanish:
  - Yo, sin embargo
  - Y yo
  lexicon: —
  rationale: ‘Pero yo’ reproduce el giro contrastivo del pivote en primera persona con una transición natural en español.
- source_word: ⲧⲉⲧϣⲟⲟⲡ
  english_pob_choice: she who exists
  chosen_spanish: la que existe
  alternatives_spanish:
  - la que está
  - la que permanece
  - la que es
  lexicon: Coptic relative form
  rationale: La forma relativa femenina exige una traducción identificadora; ‘la que existe’ conserva el sujeto enfático sin convertirlo en una mera copula.
theological_decisions:
- issue: Presencia en ‘todos los temores’ y no ‘en sus temores’
  english_pob_reading: But I am she who exists in all fears and in courage.
  chosen_spanish_reading: Pero yo soy la que existe en todos los temores y en el valor.
  alternative_spanish_readings:
  - Pero yo soy la que existe en sus temores y en el valor
  - Pero yo soy la que existe en los temores y en el valor
  rationale: La lectura revisada del Coptic entiende ⲧⲏⲣⲟⲩ como cuantificador plural ‘todos’, no posesivo. Por eso el español debe reflejar universalidad, no posesión.
  doctrine_reference: a revisión gramatical del texto coptico; no aplica doctrina cristiana normativa
- issue: Autoidentificación femenina fuerte
  english_pob_reading: I am she who exists ...
  chosen_spanish_reading: yo soy la que existe ...
  alternative_spanish_readings:
  - yo existo ...
  - soy ...
  rationale: La construcción con pronombre relativo mantiene la autoidentificación femenina que el original marca de modo load-bearing; reducirla a ‘yo existo’ debilitaría la forma literaria.
  doctrine_reference: a revisión gramatical del texto coptico; no aplica doctrina cristiana normativa
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión adjudicada que corrige la lectura previa ‘in their fear’ por ‘in all fears’ y exige una forma relativa femenina (‘she who exists’). La versión española adopta ese ajuste y evita un posesivo que la fuente no sostiene. También se integró la advertencia de que el segmento inicial es incierto, por lo que la primera cláusula se traduce de modo provisional.
  spanish_consistency_notes:
  - Se usó ‘valor’ para ⲡⲛⲏϣⲁⲧ por ser más natural en español que ‘courage’, sin perder la oposición a ‘temores’.
  - Se evitó ‘Señor’/masculinización implícita; no aparece terminología cristiana no sustentada por la fuente.
  - Se mantuvo una solución sobria para el inicio oscuro del pasaje, sin sobrerreconstruir la sintaxis coptica.
