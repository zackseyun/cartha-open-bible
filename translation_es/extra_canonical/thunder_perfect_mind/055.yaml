translation:
  language: es
  text: Yo soy ella, delante de cuyo rostro ustedes se avergonzaron, y estuvieron sin vergüenza[a] hacia mí[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «vergonzosamente».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «en mi presencia».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲁⲛⲟⲕ
  english_pob_choice: I am
  chosen_spanish: Yo soy
  alternatives_spanish:
  - Yo
  lexicon: Layton, Coptic Grammar; Crum, Coptic Dictionary (s.v. ⲁⲛⲟⲕ)
  rationale: Conserva la autodeclaración en primera persona y el ritmo enfático del original. En español, 'Yo soy' reproduce mejor la fórmula identitaria que un simple 'Yo'.
- source_word: feminine speaker marker / ⲧⲁⲓ
  english_pob_choice: she
  chosen_spanish: ella
  alternatives_spanish:
  - la que
  - la mujer
  lexicon: Applied revision based on source grammar and Thunder context
  rationale: La revisión documentada indica que la forma femenina es significativa para la identidad de la hablante. 'Ella' preserva esa marca gramatical sin neutralizarla.
- source_word: ϩⲱⲱⲧ
  english_pob_choice: face
  chosen_spanish: rostro
  alternatives_spanish:
  - cara
  - presencia
  lexicon: 'Crum, Coptic Dictionary (ϩⲱⲱⲧ: head, face, presence)'
  rationale: '''Rostro'' mantiene la concreción de ''face'' en un español digno y natural. ''Presencia'' sería más interpretativo y perdería la imagen corporal concreta.'
- source_word: ⲉ ⲧⲟⲟⲧϥ
  english_pob_choice: before / in the presence of
  chosen_spanish: delante de
  alternatives_spanish:
  - en la presencia de
  - ante
  lexicon: Layton, Coptic Grammar (prepositional phrase ⲉ ⲧⲟⲟⲧⲥ/ϥ)
  rationale: '''Delante de'' expresa la relación espacial e idiomática de estar ante alguien y combina bien con ''rostro'' en español.'
- source_word: ⲁⲩⲉⲓ … ⲃⲟⲗ (with ⲁⲛⲧⲉⲧⲛ)
  english_pob_choice: you were ashamed
  chosen_spanish: ustedes se avergonzaron
  alternatives_spanish:
  - ustedes estuvieron avergonzados
  - ustedes sintieron vergüenza
  lexicon: Context-driven; cf. parallel line in Thunder; morphological segmentation uncertain
  rationale: El contexto antitético con 'sin vergüenza' exige un verbo de vergüenza. 'Se avergonzaron' traduce con claridad el resultado/estado sin perder la fuerza del pasaje.
- source_word: ⲙⲛⲧⲁⲧ…
  english_pob_choice: without shame
  chosen_spanish: sin vergüenza
  alternatives_spanish:
  - vergonzosamente
  - sin pudor
  lexicon: Crum, Coptic Dictionary (privative ⲁⲧ-; nominalizer ⲙⲛⲧ- forming abstract noun 'shamelessness')
  rationale: La expresión sustantiva/abstracta se vuelve naturalmente adverbial en español como contraste exacto de 'se avergonzaron'. 'Sin vergüenza' conserva la dureza del original y evita suavizarlo.
- source_word: ⲙⲙⲟⲉⲓ
  english_pob_choice: toward me
  chosen_spanish: hacia mí
  alternatives_spanish:
  - contra mí
  - con respecto a mí
  lexicon: General Coptic pronominal object usage
  rationale: '''Hacia mí'' mantiene la orientación relacional del objeto pronominal sin cargarlo innecesariamente con hostilidad.'
translation_notes:
  revision_awareness: Se atendió la revisión que exige preservar la voz femenina de la hablante ('ella') y se evitó neutralizarla en una forma impersonal. También se conservó la tensión entre la vergüenza de los destinatarios y su actitud desvergonzada hacia la hablante.
  spanish_consistency_notes:
  - Se usa 'rostro' para mantener la imagen concreta de ϩⲱⲱⲧ y no diluirla en 'presencia' salvo en nota.
  - '''Delante de'' funciona como equivalente idiomático de la construcción copta de estar ante alguien.'
  - '''Sin vergüenza'' mantiene el paralelismo con ''se avergonzaron'' y refleja la fuerza de la oposición semántica.'
