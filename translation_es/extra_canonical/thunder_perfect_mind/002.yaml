  text: 'Consider me[1], and I found myself among those who seek me,

    you who watch for me—you yourselves;[3]

    and you hearers, listen to me.

    You who are troubled in heart, receive me to yourselves[d][c][b][a][4][3][2],

    and do not turn away from me.[4]'
  footnotes:
  - marker: '1'
    text: 'OCR shows ⲁⲓϭⲓⲛⲉ (1sg. perfect, ‘I found’), but the chain of imperatives and the collocation with ‘those who seek me’ favor reading/understanding an imperative ϭⲓⲛⲉ ⲙⲙⲟⲓ ‘find me.’ If the indicative is confirmed, an alternative would be: ‘and I am found among those who seek me.’'
    reason: alignment_note
  - marker: '2'
    text: ϣⲟⲡⲧ ranges over ‘strength/firmness/courage’; alternatives include ‘take courage’ or ‘be firm.’
    reason: lexical_alternative
  - marker: '3'
    text: ⲉⲧⲏⲩⲧⲛ is an emphatic independent pronoun ‘you yourselves,’ intensifying the address. It can be left implicit, but we preserve it to keep the rhetorical force.
    reason: cultural_note
  - marker: '4'
    text: ⲡⲱⲧ is literally ‘run/flee’; ‘turn away’ renders the relational sense in context. ‘Do not flee from me’ is a viable alternative.
    reason: lexical_alternative
