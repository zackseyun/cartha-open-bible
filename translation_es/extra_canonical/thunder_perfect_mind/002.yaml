translation:
  language: es
  text: 'Considérenme, y me hallé entre los que me buscan;


    ustedes, los que velan por mí[a], ustedes mismos;


    y ustedes, los oyentes, escúchenme.


    Ustedes que están turbados de corazón, recíbanme[b] a ustedes mismos,


    y no se aparten de mí[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Ustedes mismos» también podría dejarse implícito en español, pero se conserva para reflejar el énfasis del pronombre independiente copto.
    reason: spanish_style_note
  - marker: b
    text: 'También: «acójanme».'
    reason: lexical_alternative
  - marker: c
    text: 'También: «no huyan de mí».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲙⲉⲉⲩⲉ ⲉⲣⲟⲓ
  english_pob_choice: Consider me
  chosen_spanish: Considérame
  alternatives_spanish:
  - Medítame
  - Piensa en mí
  - Pondera en mí
  lexicon: Crum s.v. ⲙⲉⲉⲩⲉ
  rationale: ⲙⲉⲉⲩⲉ expresa considerar/ponderar; en español, «considérame» conserva el carácter exhortativo directo sin introducir un registro excesivamente devocional ni sonar forzado.
- source_word: ⲁⲓϭⲓⲛⲉ ⲙⲙⲟⲓ
  english_pob_choice: I found myself among those who seek me
  chosen_spanish: me hallé entre los que me buscan
  alternatives_spanish:
  - me encontré entre los que me buscan
  - me hallé entre quienes me buscan
  lexicon: Crum s.v. ϭⲓⲛⲉ
  rationale: La revisión aprobada identifica un perfecto de primera persona, no un imperativo. «Me hallé» comunica el valor resultativo del perfecto sin forzar una lectura imperativa.
- source_word: ⲛⲉⲧϣⲓⲛⲉ ⲛⲥⲱⲓ
  english_pob_choice: those who seek me
  chosen_spanish: los que me buscan
  alternatives_spanish:
  - los que me buscan con empeño
  - los que me buscan
  lexicon: Crum s.v. ϣⲓⲛⲉ
  rationale: ϣⲓⲛⲉ significa buscar/seek. «Los que me buscan» es natural en español y mantiene el sentido participial sin ampliar el matiz más allá de lo requerido.
- source_word: ⲧⲉⲧⲛⲉⲣⲟⲉⲓⲥ ⲉⲣⲟⲓ
  english_pob_choice: you who watch for me—you yourselves;
  chosen_spanish: ustedes, los que velan por mí, ustedes mismos;
  alternatives_spanish:
  - ustedes, los que me vigilan, ustedes mismos;
  - ustedes, los que están alertas por mí, ustedes mismos;
  lexicon: Crum s.v. ⲣⲟⲉⲓⲥ
  rationale: ⲣⲟⲉⲓⲥ significa vigilar/estar despierto/velar. «Velan por mí» refleja mejor la vigilancia atenta que «vigilan», y evita el matiz acusatorio de una vigilancia hostil.
- source_word: ⲉⲧⲏⲩⲧⲛ
  english_pob_choice: you yourselves
  chosen_spanish: ustedes mismos
  alternatives_spanish:
  - ustedes mismos
  - ustedes en persona
  lexicon: Layton, Coptic Grammar §75; Crum s.v. ⲏⲩ
  rationale: El pronombre independiente intensifica el llamado. «Ustedes mismos» preserva esa fuerza enfática de forma idiomática en español.
- source_word: ⲛⲣⲉϥⲥⲱⲧⲙ
  english_pob_choice: you hearers,
  chosen_spanish: ustedes, los oyentes,
  alternatives_spanish:
  - ustedes, los que oyen,
  - ustedes, los escuchas,
  lexicon: Crum s.v. ⲣⲉϥ- + ⲥⲱⲧⲙ
  rationale: 'La revisión adjudicada corrigió una lectura verbal: es un sustantivo agente plural, «los oyentes» o «los escuchas». «Los oyentes» es claro, digno y fiel al valor nominal.'
- source_word: ⲥⲱⲧⲙ ⲉⲣⲟⲓ
  english_pob_choice: listen to me
  chosen_spanish: escúchenme
  alternatives_spanish:
  - óiganme
  - escuchen mi voz
  lexicon: Crum s.v. ⲥⲱⲧⲙ
  rationale: ⲥⲱⲧⲙ es oír/escuchar; en este contexto exhortativo, «escúchenme» conserva la idea de prestar atención obediente mejor que un simple «óiganme».
- source_word: ⲛⲉⲧⲧⲟϣⲧ ⲉⲃⲟⲗ ϩⲏⲧ
  english_pob_choice: You who are troubled in heart
  chosen_spanish: Ustedes que están turbados de corazón
  alternatives_spanish:
  - Ustedes que están angustiados de corazón
  - Ustedes que tienen el corazón turbado
  lexicon: Crum s.v. ⲧⲟϣⲧ; ϩⲏⲧ
  rationale: «Turbados de corazón» preserva el afecto interior del original y suena natural en español culto; evita sobredeterminar el matiz como mera ansiedad o miedo.
- source_word: ϣⲟⲡⲧ
  english_pob_choice: be strong
  chosen_spanish: recíbannme
  alternatives_spanish:
  - acójanme
  - tómenme
  lexicon: Crum s.v. ϣⲱⲡ; object suffix -ⲧ
  rationale: La corrección textual muestra que la forma no significa «ser fuertes», sino «recibirme / tomarme». «Recíbannme» reproduce el imperativo con objeto directo de primera persona.
- source_word: ⲉⲣⲱⲧⲛ
  english_pob_choice: to yourselves
  chosen_spanish: a ustedes mismos
  alternatives_spanish:
  - para ustedes mismos
  - a sí mismos
  lexicon: Crum s.v. ⲣⲱⲧⲛ
  rationale: El sintagma preposicional intensifica la incorporación del hablante a su destinatario. «A ustedes mismos» conserva esa direccionalidad sin volverse artificial.
- source_word: ⲙⲡⲣⲡⲱⲧ ⲛⲥⲱⲓ
  english_pob_choice: do not turn away from me
  chosen_spanish: no se aparten de mí
  alternatives_spanish:
  - no huyan de mí
  - no se alejen de mí
  lexicon: Crum s.v. ⲡⲱⲧ
  rationale: ⲡⲱⲧ literalmente es correr/huir. En español, «no se aparten de mí» mantiene el sentido relacional de separación sin perder la fuerza del movimiento de huida.
translation_notes:
  revision_awareness: 'This draft incorporates the adjudicated corrections in the audit trail: ⲁⲓϭⲓⲛⲉ is rendered as a first-person perfect (''me hallé''), ⲣⲟⲉⲓⲥ as a vocative participial phrase (''los que velan por mí''), ⲛⲣⲉϥⲥⲱⲧⲙ as a plural agent noun (''los oyentes''), and ϣⲟⲡⲧ ⲉⲣⲱⲧⲛ as ''recíbannme a ustedes mismos.'' The Spanish text also preserves the emphatic pronoun behind ⲉⲧⲏⲩⲧⲛ and the relational force of the closing negative imperative.'
  spanish_consistency_notes:
  - Se usa español neutral y reverente, evitando arcaísmos innecesarios.
  - Se mantiene la distinción entre oír/escuchar según el contexto exhortativo.
  - «Yahvé», «Mesías» y otros términos no aparecen aquí, por lo que no se activan las normas de terminología fija.
  - Los pronombres enfáticos se conservan cuando el español lo permite sin sonar redundante en exceso.
