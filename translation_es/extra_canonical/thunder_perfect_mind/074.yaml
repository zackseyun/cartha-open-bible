translation:
  language: es
  text: 'los que existen conmigo, y los pobres.


    Lo que está dentro, en el corazón: yo soy ella.


    Yo soy la honrada,


    y la que ellos alaban[a],


    y la que ellos desprecian en escarnio[e][d][c][b].


    Yo soy'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ⲥⲙⲟⲟⲩ puede significar «bendecir» o «alabar», y a veces «nombrar». Se eligió «alaban» porque forma una antítesis clara con «desprecian».
    reason: lexical_alternative
  - marker: b
    text: El pronombre ⲙⲙⲟⲥ («ellos/ellas» como objeto) probablemente se refiere a «los pobres», pero el antecedente no es explícito en este fragmento.
    reason: alignment_note
  - marker: c
    text: 'ϩⲛ ⲟⲩϣⲱⲥ ⲁⲛⲟⲕ también podría entenderse como «con una voz: “Yo soy”» o unirse a la línea siguiente en algunas ediciones.'
    reason: textual_variant
  - marker: d
    text: 'Otra traducción posible es: «Preséntense conmigo, y con los pobres. / Lo que está dentro, en el corazón: yo soy ella. / Mi apariencia[a]: ustedes alaban[b] el rostro, / y los desprecian[c], / con una voz: “Yo soy”.[c]»'
    reason: previous_rendering
  - marker: e
    text: El copto ⲧⲁⲉⲓⲏⲟⲩ aquí es incierto; «mi apariencia» es tentativo. Las alternativas incluyen «mi imagen», «mi pensamiento» o incluso «mi casa». El contexto con «rostro» (ⲣⲟⲥ) favorece una glosa visual.
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲛⲓϩⲓⲟⲙⲉ
  english_pob_choice: the women
  chosen_spanish: las mujeres
  alternatives_spanish:
  - las esposas
  - las mujeres que están conmigo
  lexicon: Crum, s.v. ϩⲓⲟⲙⲉ
  rationale: El Coptic apunta a un sustantivo plural común para ‘mujeres’; el contexto inmediato no obliga a especificar más. Mantener ‘las mujeres’ preserva la lectura más directa sin sobreinterpretar.
- source_word: ⲉⲧϣⲟⲟⲡ ⲛ̄ϩⲏⲧ
  english_pob_choice: What is within, in the heart
  chosen_spanish: Lo que está dentro, en el corazón
  alternatives_spanish:
  - Lo que existe dentro, en el corazón
  - Lo interior, en el corazón
  lexicon: Crum, s.v. ϩⲏⲧ
  rationale: Se conserva el valor locativo e interior de la expresión. ‘En el corazón’ mantiene el matiz concreto del original y su resonancia antropológica sin convertirlo en abstracción.
- source_word: ⲁⲛⲟⲕ ⲧⲉ
  english_pob_choice: I am she
  chosen_spanish: yo soy ella
  alternatives_spanish:
  - soy ella
  - yo soy la mujer
  lexicon: Standard Coptic copular pronoun (feminine)
  rationale: La forma femenina debe quedar explícita en español. ‘Yo soy ella’ mantiene la fuerza del enunciado identitario y el eco repetitivo del texto.
- source_word: ⲧⲉⲧⲟⲩϣⲱⲣⲡ / ⲧⲉⲧⲟⲩⲙⲟⲩ
  english_pob_choice: the honored one
  chosen_spanish: la honrada
  alternatives_spanish:
  - la venerada
  - la exaltada
  lexicon: Contextual reading from the revised alignment
  rationale: La revisión inglesa restaurada entiende un predicado de honor; ‘la honrada’ es una solución sobria y fiel, menos interpretativa que ‘venerada’ y más natural en español que un calco técnico.
- source_word: ⲥⲙⲟⲩ / ⲥⲙⲟⲟⲩ
  english_pob_choice: praise
  chosen_spanish: alaban
  alternatives_spanish:
  - bendicen
  - la elogian
  lexicon: Crum, s.v. ⲥⲙⲟⲟⲩ
  rationale: ‘Alaban’ reproduce el valor positivo de la raíz y funciona bien como contraste con ‘desprecian’. ‘Bendicen’ es posible, pero ‘alaban’ encaja mejor en la antítesis del pasaje.
- source_word: 'ⲕⲁⲧⲁⲫⲣⲟ(…)

    '
  english_pob_choice: despise
  chosen_spanish: desprecian en escarnio
  alternatives_spanish:
  - desprecian
  - se burlan de
  lexicon: Loan from Gk. καταφρονέω
  rationale: La traducción debe conservar el tono de desprecio fuerte. ‘En escarnio’ explicita la cualidad adverbial/locativa del matiz despectivo y refleja mejor el contraste con ‘alaban’.
- source_word: ⲁⲛⲟⲕ
  english_pob_choice: I am
  chosen_spanish: Yo soy
  alternatives_spanish:
  - Soy
  - Yo soy (la)
  lexicon: Standard first-person pronoun
  rationale: Se mantiene la fórmula del ‘Yo soy’ como remate identitario del fragmento, respetando el ritmo sentencioso del original.
- source_word: ⲛ̄ⲙⲙⲁⲉⲓ
  english_pob_choice: with me
  chosen_spanish: conmigo
  alternatives_spanish:
  - junto a mí
  - en mi compañía
  lexicon: Standard Sahidic pronominal prepositional form
  rationale: ‘Conmigo’ es la equivalencia natural y no añade matices ajenos. Conserva la relación de cercanía directa.
theological_decisions:
- issue: Identidad femenina del hablante
  english_pob_reading: I am she
  chosen_spanish_reading: yo soy ella
  alternative_spanish_readings:
  - soy ella
  - yo soy la mujer
  rationale: El texto coptico marca género femenino; en español conviene mantenerlo explícito para no neutralizar la autodefinición del hablante. La decisión conserva la tensión literaria de una voz divina/femenina sin armonizarla a formas masculinas o neutras.
  doctrine_reference: Lectura literaria y retórica del texto; no se formula doctrina cristiana normativa a partir de este fragmento gnóstico.
- issue: ‘Honrada’ frente a ‘la que ellos alaban’
  english_pob_reading: the honored one / the one whom they praise
  chosen_spanish_reading: la honrada / la que ellos alaban
  alternative_spanish_readings:
  - la exaltada / la que ellos elogian
  - la venerada / la que ellos bendicen
  rationale: La revisión inglesa restaura un paralelismo de honor y alabanza. En español, ‘honrada’ conserva el predicado pasivo/adjetival y ‘alaban’ mantiene la acción verbal sin introducir lenguaje litúrgico que no está exigido por el Coptic.
  doctrine_reference: No aplica; se trata de una imagen paradoxal del discurso del texto.
- issue: ‘Desprecian en escarnio’ como expresión del rechazo
  english_pob_reading: the one whom they despise in scorn
  chosen_spanish_reading: la que ellos desprecian en escarnio
  alternative_spanish_readings:
  - la que ellos desprecian
  - la que ellos menosprecian con burla
  rationale: El elemento de desprecio no debe suavizarse. ‘En escarnio’ reproduce la intensidad peyorativa del cierre y evita perder el contraste con la alabanza anterior.
  doctrine_reference: No aplica; decisión de registro y semántica textual.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la corrección mayor del audit trail: la traducción inglesa anterior contenía un grave malentendido del Coptic y fue revisada para restituir ‘las mujeres’, ‘la honrada’, ‘la que ellos alaban’ y ‘la que ellos desprecian’. La versión española sigue la lectura revisada y evita reproducir la antigua interpretación errónea de ‘los pobres’ o de ‘con una voz’.'
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ solo cuando el texto fuente lo requiera; aquí no aparece.
  - Se usa ‘ellas/ellos’ de forma contextual sin forzar concordancias no sustentadas por el Coptic.
  - Se evita ‘Cristo’/‘Mesías’ porque el pasaje no contiene cristología.
  - Se preserva la voz femenina con ‘ella’ para respetar la gramática del original.
  - Se traduce el desprecio con un término fuerte para mantener la antítesis con ‘alaban’.
