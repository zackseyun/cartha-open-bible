    text: ‘He is the one who begot me’ reflects a paternal begetting nuance; some English versions read ‘gave birth to me,’ but the Coptic idiom distinguishes begetting (father) from bearing (mother).
    reason: lexical_alternative
  - marker: b
    text: If the underlying word is ⲡϩⲙϩⲁⲗ, the line reads ‘I am the bride and the bridegroom,’ a well-known paradox in this poem.
    reason: alternative_reading
