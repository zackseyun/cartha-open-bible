translation:
  language: es
  text: Mi padre, y la hermana de mi marido—y él es mi descendencia[a]. Yo soy la esclava de mi marido[b], y yo soy la Señora[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '«Él es mi descendencia» sigue la revisión textual adoptada para ⲡⲁϫⲡⲟ: el copto expresa «offspring / progeny», no «el que me engendró».'
    reason: source_note
  - marker: b
    text: La palabra copta ⲧϩⲙϩⲁⲗ significa «esclava» o «servidora»; aquí se mantiene la opción más fuerte por su valor léxico y por el contraste con «la Señora».
    reason: lexical_alternative
  - marker: c
    text: «Señora» traduce la contraparte femenina de «lord»; «Dama» o «dueña» son posibles, pero cambian el tono o la relación de dominio.
    reason: cultural_note
lexical_decisions:
- source_word: ⲡⲁⲉⲓⲱⲧ
  english_pob_choice: my father
  chosen_spanish: mi padre
  alternatives_spanish:
  - mi progenitor
  - mi padre paterno
  lexicon: Crum Coptic Dictionary
  rationale: El posesivo de primera persona con ⲉⲓⲱⲧ expresa una relación paterna directa; en español, «mi padre» comunica con claridad la lectura básica y conserva la nota de filiación.
- source_word: ⲧⲥⲱⲛⲉ
  english_pob_choice: the sister
  chosen_spanish: la hermana
  alternatives_spanish:
  - mi hermana
  - la consanguínea femenina
  lexicon: Crum Coptic Dictionary
  rationale: ⲥⲱⲛⲉ significa «hermana»; mantener el artículo definido reproduce la forma nominal del original sin forzar posesivo donde no lo exige.
- source_word: ⲡⲁϩⲁⲓ
  english_pob_choice: my husband
  chosen_spanish: mi marido
  alternatives_spanish:
  - mi esposo
  - mi hombre
  lexicon: Crum Coptic Dictionary
  rationale: Aunque «esposo» es posible, «marido» preserva mejor el paralelismo literal con el campo semántico de relación conyugal y permite el juego paradójico del pasaje.
- source_word: ⲛⲧⲟϥ ⲡⲉ
  english_pob_choice: he is
  chosen_spanish: él es
  alternatives_spanish:
  - es él
  - él es precisamente
  lexicon: Crum Coptic Dictionary
  rationale: La construcción copulativa simple se vierte de manera directa para mantener el ritmo aforístico del texto.
- source_word: ⲡⲁϫⲡⲟ
  english_pob_choice: my offspring
  chosen_spanish: mi descendencia
  alternatives_spanish:
  - mi prole
  - mi linaje
  lexicon: Crum Coptic Dictionary
  rationale: 'La revisión auditada corrige la lectura anterior: ⲡⲁϫⲡⲟ significa «mi descendencia / mi prole», no «el que me engendró». «Descendencia» en español conserva la relación de procedencia sin invertirla.'
- source_word: ⲁⲛⲟⲕ ⲧⲉ
  english_pob_choice: I am
  chosen_spanish: yo soy
  alternatives_spanish:
  - soy yo
  - yo soy, en verdad
  lexicon: Crum Coptic Dictionary
  rationale: La fórmula solemne «yo soy» conserva la cadencia repetitiva del discurso de autoidentificación.
- source_word: ⲧϩⲙϩⲁⲗ
  english_pob_choice: the servant
  chosen_spanish: la esclava
  alternatives_spanish:
  - la sierva
  - la servidora
  lexicon: Crum Coptic Dictionary
  rationale: La revisión textual confirma que ⲧϩⲙϩⲁⲗ significa «servidora/esclava» y no «novia». Dado el fuerte valor léxico del término y la estrategia POB, «esclava» preserva la fuerza semántica más directa.
- source_word: ⲛⲧⲉ ⲡⲁϩⲁⲓ
  english_pob_choice: of my husband
  chosen_spanish: de mi marido
  alternatives_spanish:
  - perteneciente a mi marido
  - de mi esposo
  lexicon: Crum Coptic Dictionary
  rationale: La relación genitiva se expresa con la preposición simple «de», que en español conserva la brevedad de la construcción copta.
- source_word: ⲧϫⲟⲉⲓⲥ
  english_pob_choice: the Lady
  chosen_spanish: la Señora
  alternatives_spanish:
  - la Dama
  - la dueña
  lexicon: Crum Coptic Dictionary
  rationale: La contraparte femenina de «lord» se vierte como «Señora» para mantener dignidad, capitalización titular y evitar la ambigüedad moderna de «dueña» o el matiz social de «dama».
theological_decisions:
- issue: Paradoja identitaria de parentesco y conyugalidad
  english_pob_reading: My father, and the sister of my husband—and he is my offspring.
  chosen_spanish_reading: Mi padre, y la hermana de mi marido—y él es mi descendencia.
  alternative_spanish_readings:
  - Mi padre, y la hermana de mi marido—y él es mi prole.
  - Mi padre, y la hermana de mi marido—y él es mi linaje.
  rationale: La línea construye una paradoja deliberada de relaciones familiares. La traducción debe mantener la tensión sin resolverla ni convertirla en una explicación; «mi descendencia» conserva la inversión semántica que el texto exige.
  doctrine_reference: Poética gnóstica de autoidentificación paradoxal; fidelidad a la tensión textual sin armonización interpretativa.
- issue: Valor de ⲧϩⲙϩⲁⲗ en el contraste con ⲧϫⲟⲉⲓⲥ
  english_pob_reading: I am the servant of my husband, and I am the Lady.
  chosen_spanish_reading: Yo soy la esclava de mi marido, y yo soy la Señora.
  alternative_spanish_readings:
  - Yo soy la servidora de mi marido, y yo soy la Señora.
  - Yo soy la esclava de mi marido, y yo soy la Dama.
  rationale: El contraste semántico entre condición servil y título de autoridad es central. «Esclava» conserva mejor la aspereza lexical del coptico que «sierva», mientras «Señora» comunica la contraparte femenina de señor/lord sin rebajar el registro.
  doctrine_reference: Lexical consistency and paradox preservation in Thunder, Perfect Mind.
translation_notes:
  revision_awareness: 'La auditoría inglesa muestra revisiones importantes frente a una lectura previa: ⲡⲁϫⲡⲟ no significa «el que me engendró» sino «mi descendencia / mi prole», y ⲧϩⲙϩⲁⲗ no significa «novia» sino «esclava / servidora». El borrador español incorpora esas correcciones y evita la lectura nupcial incorrecta.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el original lo exija; este pasaje no lo contiene.
  - Se usa «Señora» como contraparte femenina titulada, coherente con el registro POB.
  - Se prefiere «esclava» por fuerza lexical, aunque «sierva» queda indicada como alternativa contextual.
  - La puntuación con rayas conserva el carácter aforístico y la sucesión de autoafirmaciones.
