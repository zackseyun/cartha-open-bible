translation:
  language: es
  text: 'Yo soy la mente[a],

    y mi reposo.

    Yo soy el conocimiento de mi búsqueda de mí misma,

    y la búsqueda de quienes me buscan,

    y el mandato de quienes me piden,

    y la voz de las voces del lugar de Dios.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «intelecto». El término copt. ⲡⲛⲟⲩⲥ admite un matiz más estrictamente cognitivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲡⲛⲟⲩⲥ
  english_pob_choice: mind
  chosen_spanish: mente
  alternatives_spanish:
  - intelecto
  - entendimiento
  lexicon: Crum; préstamo griego nous
  rationale: «Mente» comunica bien el valor de nous sin endurecerlo en un tecnicismo. En este contexto preserva tanto la identidad en primera persona como la dimensión cognitiva.
- source_word: ⲁⲛⲁⲡⲁⲩⲥⲓⲥ
  english_pob_choice: rest
  chosen_spanish: reposo
  alternatives_spanish:
  - descanso
  - pausa
  lexicon: Crum; préstamo griego anapausis
  rationale: «Reposo» conserva el matiz de quietud/cesación espiritual con un tono más elevado que «descanso», sin perder naturalidad en español.
- source_word: ⲙⲡⲁϣⲓⲛⲉ
  english_pob_choice: my seeking for myself
  chosen_spanish: mi búsqueda de mí misma
  alternatives_spanish:
  - mi buscarme
  - mi búsqueda de mí
  lexicon: Crum; construcción con 1ª persona singular
  rationale: La fuente indica búsqueda activa y reflexiva; en español, «búsqueda de mí misma» transmite mejor esa relación que una paráfrasis más abstracta.
- source_word: ⲛⲥⲱⲓ
  english_pob_choice: after me / of those who seek me
  chosen_spanish: de quienes me buscan
  alternatives_spanish:
  - de los que me buscan
  - de quienes buscan tras de mí
  lexicon: Crum; preposición con sufijo pronominal
  rationale: Se mantiene la fuerza relacional de la construcción copta y se evita el error previo de leer «small». «Me buscan» refleja el sentido dinámico del verbo.
- source_word: ⲟⲩⲁϩⲥⲁϩⲛⲉ
  english_pob_choice: command
  chosen_spanish: mandato
  alternatives_spanish:
  - orden
  - precepto
  lexicon: Crum
  rationale: El audit trail señala que el término significa «command». «Mandato» conserva autoridad y solemnidad, y evita una formulación demasiado coloquial.
- source_word: ⲁⲓⲧⲉⲓ
  english_pob_choice: ask
  chosen_spanish: piden
  alternatives_spanish:
  - solicitan
  - preguntan
  lexicon: Crum
  rationale: En esta construcción, «pedir» es el equivalente más natural y bíblico en español para «ask of me», sin introducir una idea distinta de la petición.
- source_word: ⲧⲥⲙⲏ
  english_pob_choice: voice
  chosen_spanish: voz
  alternatives_spanish:
  - sonido
  - acento
  lexicon: Crum
  rationale: 'El contexto exige «voz», no «nombre». Se conserva la imagen de multiplicidad sonora: «la voz de las voces».'
- source_word: ⲙⲡⲙⲁ ⲛⲑⲉⲱ
  english_pob_choice: the place of God
  chosen_spanish: el lugar de Dios
  alternatives_spanish:
  - el sitio de Dios
  - el lugar divino
  - el santuario
  lexicon: Crum; préstamo griego theos
  rationale: «Lugar de Dios» reproduce con sobriedad el valor literal de la frase y deja abierta su resonancia cultual sin añadir una interpretación no exigida por el texto.
theological_decisions:
- issue: Identidad en primera persona y género gramatical
  english_pob_reading: I am the mind... and my rest... I am the knowledge...
  chosen_spanish_reading: Yo soy... mi reposo... Yo soy...
  alternative_spanish_readings:
  - Soy...
  - Yo soy el intelecto...
  rationale: Se mantiene la autoidentificación enfática del original y de la revisión inglesa corregida. «Yo soy» conserva la cadencia declarativa y evita diluir el sujeto.
  doctrine_reference: source-faithfulness / discourse identity
- issue: Restitución de la relación reflexiva en «my seeking for myself»
  english_pob_reading: the knowledge of my seeking for myself
  chosen_spanish_reading: el conocimiento de mi búsqueda de mí misma
  alternative_spanish_readings:
  - el conocimiento de mi búsqueda
  - el conocimiento de buscarme
  rationale: La forma reflexiva está apoyada por la nota de revisión inglesa que corrige una mala lectura del OCR. En español se expresa sin forzar la sintaxis y sin perder la auto-referencia.
  doctrine_reference: source-faithfulness / lexical precision
- issue: ‘Command’ versus lecturas devocionales o comunitarias
  english_pob_reading: the command of those who ask of me
  chosen_spanish_reading: el mandato de quienes me piden
  alternative_spanish_readings:
  - el mandato de los que me piden
  - la orden de quienes me piden
  rationale: La revisión inglesa descarta lecturas como «single fellowship». Se conserva el sentido de autoridad mandante en español, evitando suavizarlo hacia ‘comunidad’ o ‘fellowship’.
  doctrine_reference: source-faithfulness / lexical precision
- issue: ‘voice of the voices’ y ‘place of God’
  english_pob_reading: the voice of the voices of the place of the gods / God
  chosen_spanish_reading: la voz de las voces del lugar de Dios
  alternative_spanish_readings:
  - la voz de las voces del lugar de los dioses
  - la voz de las voces en el lugar de Dios
  rationale: La evidencia textual del paquete es inestable en este punto, pero la lectura auditada más cercana al texto fuente y al POB revisado conserva singularidad de ‘Dios’. Se evita normalizar a una frase más interpretativa.
  doctrine_reference: textual uncertainty / source-critical caution
translation_notes:
  revision_awareness: 'Se siguió la revisión auditada que corrige las lecturas erróneas del OCR: no se entendió ‘and your rest / You are’ sino ‘and my rest / I am’; tampoco se tomó ⲅⲓⲛⲉ como ‘kind’ ni ⲟⲩⲁϩⲥⲁϩⲛⲉ como ‘single fellowship’. La traducción española refleja la lectura corregida del texto coptico y conserva la tensión textual donde el expediente sigue señalando incertidumbre en ‘place of God’.'
  spanish_consistency_notes:
  - Se usa ‘Dios’ en el sintagma final para mantener la lectura auditada de singularidad, aunque el expediente inglés menciona una posible pluralidad en la fuente truncada; se evita imponer ‘dioses’ sin apoyo decisivo.
  - Se prefirió ‘reposo’ para anapausis y ‘mandato’ para el término de autoridad, con un registro elevado y publicable.
  - Se evita ‘Cristo’, ‘Señor’ o ‘SEÑOR’ porque el texto fuente no los exige.
