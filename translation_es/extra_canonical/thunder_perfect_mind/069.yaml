  text: 'I am the mind[1],

    and my rest.

    I am the knowledge of my seeking for myself,

    and the seeking of those who seek me,

    and the command of those who ask of me[c][b][a][5][4][3][2],

    and the voice of the voices of the place of the gods.'
  footnotes:
  - marker: '1'
    text: ⲡⲛⲟⲩⲥ could also be rendered "intellect," emphasizing cognitive faculty rather than personal identity.
    reason: lexical_alternative
  - marker: '2'
    text: Reading ⲙⲡ + ⲛⲟⲕ across the line break as the possessive "your" ("your rest"). If instead ⲛⲟⲕ starts a new clause, the scope of "and your rest" might differ.
    reason: alignment_note
  - marker: '3'
    text: 'ⲅⲓⲛⲉ likely reflects Greek γένος (genos): kind, race, lineage; alternatives were considered.'
    reason: lexical_alternative
  - marker: '4'
    text: 'ⲟⲩⲁϩⲥⲁϩⲛⲉ is taken as "single fellowship" (union + companionship). Other possibilities: "one union," "sole companionship."'
    reason: lexical_alternative
  - marker: '5'
    text: ⲙⲡⲙⲁ ⲛⲑⲉⲱ literally "the place of (the) god"; could be rendered "the divine place" or "sanctuary."
    reason: lexical_alternative
  - marker: a
    text: Or 'and your rest.\nYou are the knowledge'.
    reason: previous_rendering
  - marker: b
    text: Or 'of my kind—\nthe kind of the small;'.
    reason: previous_rendering
  - marker: c
    text: Or 'the single fellowship of those who ask me,\nand the name of names in the place of God.'.
    reason: previous_rendering
