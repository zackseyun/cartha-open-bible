translation:
  language: es
  text: 'Soy la preparación[a] de cada persona, mi mente dentro.


    Soy la distinción[b] de mi nombre.


    Soy el grito que sale,


    y soy la que oye.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ⲧⲥⲟⲃⲧⲉ puede abarcar ‘preparación’ o ‘equipamiento’; se elige ‘preparación’ para evitar una traducción demasiado técnica.
    reason: lexical_alternative
  - marker: b
    text: ⲧⲡⲱϣⲥ puede también entenderse como ‘articulación’ o ‘separación’; ‘distinción’ intenta abarcar ese campo semántico sin fijar en exceso el sentido.
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲧⲥⲟⲃⲧⲉ
  english_pob_choice: the preparation
  chosen_spanish: la preparación
  alternatives_spanish:
  - el equipamiento
  - la disposición
  - la preparación interior
  lexicon: Crum; general Sahidic usage
  rationale: El audit trail revisado identifica ⲥⲟⲃⲧⲉ como “preparation/equipment”, no como “understanding”. En español, “preparación” conserva el campo de equipamiento/disposición sin forzar una glosa doctrinal.
- source_word: ⲙⲡⲣⲱⲙⲉ ⲛⲓⲙ
  english_pob_choice: every person
  chosen_spanish: cada persona
  alternatives_spanish:
  - toda persona
  - todas las personas
  - cada ser humano
  lexicon: Standard Sahidic grammar
  rationale: ⲣⲱⲙⲉ designa a un ser humano/persona y ⲛⲓⲙ significa ‘todo/cada’. ‘Cada persona’ mantiene la universalidad y suena natural en español contemporáneo.
- source_word: ⲡⲁⲛⲟⲩⲥ
  english_pob_choice: my mind
  chosen_spanish: mi mente
  alternatives_spanish:
  - mi mente interior
  - mi entendimiento
  lexicon: Greek loan (νοῦς) in Coptic
  rationale: El prefijo posesivo ⲡⲁ- obliga a ‘mi’. Para español, ‘mente’ es el equivalente más directo de νοῦς en este registro y evita suavizar el poseído.
- source_word: ⲧⲡⲱϣⲥ
  english_pob_choice: the pronunciation
  chosen_spanish: la distinción
  alternatives_spanish:
  - la articulación
  - la separación
  - la pronunciación
  lexicon: Uncertain; lexical range in Coptic sources
  rationale: El expediente corregido rechaza ‘knowledge’ y orienta ⲡⲱϣⲥ hacia el valor de división/separación/distinción, con posible extensión a articulación. ‘Distinción’ es suficientemente amplio y no introduce una lectura excesivamente técnica.
- source_word: ⲧⲁϣⲕⲁⲕ ⲉⲃⲟⲗ
  english_pob_choice: the cry that goes out
  chosen_spanish: el grito que sale
  alternatives_spanish:
  - el llamado que sale
  - la proclamación que sale
  - el clamor que sale
  lexicon: Uncertain; ϣⲕⲁⲕ as ‘to cry out/shout’ + ⲉⲃⲟⲗ ‘out(ward)’
  rationale: ‘Grito’ conserva la fuerza vocal y el movimiento hacia afuera del original. Se evita ‘llamado’ porque el auditor revisado vinculó la palabra con ‘cry’ más que con ‘call’.
- source_word: ⲉⲧⲥⲱⲧⲙ̄
  english_pob_choice: the one who hears
  chosen_spanish: la que oye
  alternatives_spanish:
  - la que escucha
  - el que oye
  - la oyente
  lexicon: Common Sahidic verb ⲥⲱⲧⲙ ‘hear’ with relative ⲉⲧ-
  rationale: ‘Oye’ es la equivalencia directa y mantiene el paralelismo con ‘sale’. Se usa femenino porque el hablante del poema se presenta en primera persona femenina en esta sección.
theological_decisions:
- issue: Autoidentificación poética en primera persona femenina
  english_pob_reading: I am ... I am ...
  chosen_spanish_reading: Soy ... Soy ...
  alternative_spanish_readings:
  - Yo soy ...
  - Soy la ...
  rationale: No hay una decisión doctrinal específica aquí, sino una elección de registro. El español admite bien la omisión del pronombre; mantener ‘Soy’ conserva la cadencia y la autoafirmación del poema.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'El texto español corrige el fallo previo de la cadena de revisión: evita ‘entendimiento/knowledge’ para ⲥⲟⲃⲧⲉ y evita ‘pronunciación/knowledge’ para ⲡⲱϣⲥ. También mantiene el posesivo de primera persona en ‘mi mente’, y ancla todas las notas con marcadores presentes en el texto.'
  spanish_consistency_notes:
  - Se mantuvo ‘mi mente’ para reflejar el posesivo del Coptic ⲡⲁ-.
  - Se eligió ‘la que oye’ para conservar el paralelismo verbal con ‘el grito que sale’.
  - No se usó ‘Cristo’, ‘Señor’ ni otra terminología ajena al pasaje; el poema es de autoidentificación.
  - Las notas a y b están ancladas exactamente en el texto y no hay notas sueltas.
