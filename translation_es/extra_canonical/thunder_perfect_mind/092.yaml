  text: 'I am the understanding of every person, my mind within.

    I am the knowledge of my name.

    I am the cry that goes out,

    and I am the one who hears.'
  footnotes:
  - marker: a
    text: ⲧⲥⲟⲃⲧⲉ could be ‘instruction/teaching/insight’; “understanding” is chosen to fit the cognitive frame with ⲡⲁⲛⲟⲩⲥ (‘mind’) and to preserve inwardness.
    reason: lexical_alternative
  - marker: b
    text: ⲧⲡⲱϣⲥ might also mean ‘power/strength,’ yielding “the power of my name.” Many witnesses/translations of Thunder read “knowledge of my name,” which the surrounding cognitive terms support.
    reason: lexical_alternative
  - marker: c
    text: ⲧⲁϣⲕⲁⲕ ⲉⲃⲟⲗ is taken as “the cry that goes out.” If the verb is instead read as ‘call’ (from Greek καλέω), an alternative is “I am the one who calls.”
    reason: lexical_alternative
  - marker: d
    text: Or 'I am the understanding of every person, within the mind.'.
    reason: previous_rendering
  - marker: e
    text: Or 'I am the knowledge of my name.'.
    reason: previous_rendering
