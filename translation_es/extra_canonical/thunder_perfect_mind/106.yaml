translation:
  language: es
  text: 'Y aprende de mis almas.


    Los que me conocen — yo soy


    la escucha accesible a todos[a];


    yo soy el habla que nadie puede captar[b].[c]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse, según el matiz de ϣⲏⲡ, como ‘la escucha común a todos’ o ‘la escucha disponible para todos’.
    reason: lexical_alternative
  - marker: b
    text: ‘Captar’ intenta conservar que el verbo puede significar tanto ‘asir’ físicamente como ‘comprender’ mentalmente.
    reason: lexical_alternative
  - marker: c
    text: El copto termina este bloque con un ‘yo soy’ desnudo (ⲁⲛⲟⲕ ⲡⲉ), probablemente como inicio de la siguiente autoidentificación; aquí no se completa.
    reason: alignment_note
lexical_decisions:
- source_word: ⲉⲛⲁⲯⲩⲭⲏ
  english_pob_choice: my souls
  chosen_spanish: mis almas
  alternatives_spanish:
  - mis vidas
  - mis seres interiores
  - mis almas
  lexicon: Crum; POB audit trail
  rationale: La revisión auditada corrige la lectura a un posesivo explícito de primera persona plural en Coptic (‘my souls’). En español, ‘almas’ conserva el paralelismo poético y la referencia al interior/persona sin suavizarla a ‘vidas’.
- source_word: ϫⲓⲥⲃⲱ
  english_pob_choice: learn
  chosen_spanish: aprende
  alternatives_spanish:
  - recibe instrucción
  - aprende de
  - sé instruido en
  lexicon: Crum; OCR correction noted in revision_awareness
  rationale: La evidencia revisada indica que el verbo correcto es ‘learn’, no ‘judge’. ‘Aprende’ es el equivalente natural y mantiene el imperativo dirigido al oyente.
- source_word: ⲥⲟⲟⲩⲛ
  english_pob_choice: know
  chosen_spanish: conocen
  alternatives_spanish:
  - saben
  - reconocen
  - comprenden
  lexicon: Crum; Layton
  rationale: En la fórmula ‘those who know me’, ‘conocen’ es el equivalente más directo y fluido en español, conservando la identificación relacional del sujeto con la hablante.
- source_word: ⲡⲥⲱⲧⲙ
  english_pob_choice: the hearing
  chosen_spanish: el oído
  alternatives_spanish:
  - el escuchar
  - la audición
  - la escucha
  lexicon: Crum
  rationale: Aunque el inglés auditado usa ‘the hearing’, en español ‘el oído’ comunica de modo más natural la facultad/órgano de oír y preserva el paralelismo con ‘habla’ sin sonar forzado.
- source_word: ϣⲏⲡ
  english_pob_choice: accessible
  chosen_spanish: accesible
  alternatives_spanish:
  - común
  - disponible
  - apropiado
  lexicon: Crum
  rationale: ‘Accesible’ reproduce bien la nota de disponibilidad o alcance que el audit trail privilegia, y evita reducir la palabra a ‘común’, que en español puede sonar socialmente valorativo.
- source_word: ⲛϩⲱⲃ ⲛⲓⲙ
  english_pob_choice: to all
  chosen_spanish: a todos
  alternatives_spanish:
  - para todos
  - en todo
  - a cada uno
  lexicon: Crum
  rationale: La expresión distributiva se vuelve más idiomática en español como ‘a todos’, manteniendo la universalidad del alcance.
- source_word: ⲡϣⲁϫⲉ
  english_pob_choice: the speech
  chosen_spanish: el habla
  alternatives_spanish:
  - la palabra
  - el discurso
  - la expresión
  lexicon: Crum; Layton
  rationale: ‘Habla’ conserva la fuerza activa y el paralelo con ‘oído’; evita el posible sesgo cristiano-litúrgico de ‘la Palabra’ y el tono más discursivo de ‘discurso’.
- source_word: ⲉⲧⲉⲙⲁⲩ ⲙⲙⲟϥ
  english_pob_choice: that no one can grasp
  chosen_spanish: que nadie puede abarcar
  alternatives_spanish:
  - que nadie puede asir
  - que nadie puede comprender
  - que nadie puede captar
  lexicon: Crum; Layton
  rationale: ‘Abarcar’ conserva la amplitud semántica de ‘grasp’ y sugiere tanto el intento mental como el acto de contener/asir, sin decidir en exceso entre lo físico y lo cognitivo.
translation_notes:
  revision_awareness: 'La base auditada corrige una lectura previa errónea: no es ‘Judge your soul’, sino ‘Learn from my souls’. También se corrigió la interpretación del posesivo en ⲉⲛⲁⲯⲩⲭⲏ como ‘mis almas’. Se siguió el ajuste textual revisado, manteniendo la tensión poética entre oído/habla y la apertura semántica de ‘grasp’.'
  spanish_consistency_notes:
  - Se conserva ‘almas’ para ⲯⲩⲭⲏ, en línea con el uso introspectivo del pasaje.
  - Se evita ‘Cristo’, ‘Señor’ u otra terminología ajena al bloque, pues no aparece en el texto base.
  - ‘Habla’ y ‘oído’ se eligieron como pareja estilística para reflejar el paralelismo del original sin forzar una fórmula eclesiástica.
  - Se mantiene el marcador de continuidad en la última línea porque el bloque termina en un ‘yo soy’ incompleto.
