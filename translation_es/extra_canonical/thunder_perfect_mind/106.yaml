    rationale: Aunque puede funcionar, ‘abarcar’ enfatiza amplitud o inclusión más que asir/comprender. ‘Captar’ conserva mejor la ambivalencia entre comprensión mental y aprehensión.
  - severity: low
    issue: Nota con ‘Coptic’ en vez de ‘copto’
    rationale: Es un detalle de naturalidad y corrección en español, no de sentido.
