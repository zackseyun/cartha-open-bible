translation:
  language: es
  text: 'La vergüenza y la franqueza[a].


    Soy desvergonzada; soy avergonzada.


    Soy dura, y tiemblo.


    Soy la guerra y la paz; dentro de mí están.


    Soy ella[b]; escúchenme[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ⲡⲁⲣⲣⲏⲥⲓⲁ puede entenderse como ‘franqueza’, ‘osadía’ o ‘libertad de palabra’; aquí se eligió ‘franqueza’ por su equilibrio entre sentido y cadencia.
    reason: lexical_alternative
  - marker: b
    text: La autoidentificación ‘Soy ella’ conserva una lectura mínima y provisional en un tramo textual incierto. La transmisión consultada y el historial de revisión indican problemas de OCR y posibles lecturas alternativas, pero no permiten aquí una reconstrucción española más firme sin sobrepasar la evidencia disponible.
    reason: source_note
  - marker: c
    text: El sentido imperativo de ⲧⲣⲁⲉⲓⲏⲟⲩ sigue siendo provisional; también podría entenderse como ‘atiéndanme’.
    reason: alternative_reading
lexical_decisions:
- source_word: ⲡϣⲓⲡⲉ
  english_pob_choice: shame
  chosen_spanish: vergüenza
  alternatives_spanish:
  - pena
  - deshonra
  lexicon: Coptic (Sahidic) lexica; usual sense of ϣⲓⲡⲉ
  rationale: El término coptico remite a ‘shame’; en español, ‘vergüenza’ conserva mejor el campo semántico moral y afectivo que ‘silencio’ o ‘quietud’. Evita perder el contraste con la franqueza/parresía.
- source_word: ⲁⲧϣⲓⲡⲉ
  english_pob_choice: shameless
  chosen_spanish: sin vergüenza
  alternatives_spanish:
  - desvergonzada
  - no avergonzada
  lexicon: Privativo ⲁⲧ- + ϣⲓⲡⲉ
  rationale: La forma privativa expresa ausencia de vergüenza. ‘Sin vergüenza’ es natural en español y mantiene la fuerza adjetival del original.
- source_word: ϫⲓⲡⲏⲧ
  english_pob_choice: ashamed
  chosen_spanish: avergonzada
  alternatives_spanish:
  - avergüenzo
  - con vergüenza
  lexicon: Lectura OCR incierta; el contexto apunta al par de vergüenza/avergonzada
  rationale: Dado que el audit trail revisado indica una lectura problemática, se adopta una solución española que preserve el paralelismo con ‘sin vergüenza’. ‘Avergonzada’ refleja el estado/resultante del verbo o adjetivo esperado.
- source_word: ⲛⲁϣⲧⲉ
  english_pob_choice: hard
  chosen_spanish: dura
  alternatives_spanish:
  - firme
  - áspera
  - fuerte
  lexicon: Coptic dictionaries; sentido básico de ϣⲧⲉ/ⲛⲁϣⲧⲉ
  rationale: ‘Dura’ reproduce el valor físico/metafórico de ‘hard’ y encaja con la cadencia poética del verso.
- source_word: ⲥⲧⲱⲧⲉ / OCR ⲣⲙⲧⲉ
  english_pob_choice: trembling
  chosen_spanish: tiemblo
  alternatives_spanish:
  - estremezco
  - tremulo
  lexicon: Lectura corregida por el audit trail; verbo de temblor en Coptic/greek loan context
  rationale: La revisión textual señala que el OCR probablemente oculta una forma relacionada con ‘trembling’. En español, ‘tiemblo’ mantiene el paralelismo directo entre firmeza/dureza y temblor.
- source_word: ⲡⲟⲗⲉⲙⲟⲥ
  english_pob_choice: war
  chosen_spanish: guerra
  alternatives_spanish:
  - combate
  - batalla
  - conflicto
  lexicon: Greek loanword πόλεμος
  rationale: ‘Guerra’ es el equivalente más directo y natural en español para πόλεμος, conservando la oposición con ‘paz’.
- source_word: ϯⲣⲏⲛⲏ
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - tranquilidad
  - shalom
  lexicon: Greek loanword εἰρήνη
  rationale: ‘Paz’ es la traducción estable y transparente de εἰρήνη, adecuada al contraste con ‘guerra’.
- source_word: ⲧⲓϩⲧⲏⲧ
  english_pob_choice: within me
  chosen_spanish: dentro de mí
  alternatives_spanish:
  - en mi interior
  - en mí
  lexicon: Coptic idiom for interiority
  rationale: ‘Dentro de mí’ reproduce el sentido idiomático de interioridad sin endurecer la sintaxis española.
- source_word: ⲧⲣⲁⲉⲓⲏⲟⲩ
  english_pob_choice: heed me
  chosen_spanish: óiganme
  alternatives_spanish:
  - préstenme atención
  - escúchenme
  - atiéndanme
  lexicon: Tentative imperative; recurring summons in Thunder
  rationale: Se conserva el tono de exhortación imperativa. ‘Óiganme’ suena natural en español y puede abarcar ‘heed/attend to’ sin añadir interpretación excesiva.
- source_word: ⲡⲁⲣⲣⲏⲥⲓⲁ
  english_pob_choice: boldness
  chosen_spanish: franqueza
  alternatives_spanish:
  - audacia
  - osadía
  - parresía
  lexicon: Greek loanword παρρησία in Coptic; lexical range includes frankness/open speech
  rationale: En español, ‘franqueza’ transmite mejor el valor de habla abierta que ‘audacia’, y evita un matiz de mero atrevimiento. Mantiene el contraste con ‘vergüenza’.
theological_decisions:
- issue: Paradoja identitaria de vergüenza y ausencia de vergüenza
  english_pob_reading: The shame and the boldness; I am shameless; I am ashamed.
  chosen_spanish_reading: La vergüenza y la franqueza. Yo soy sin vergüenza; yo soy avergonzada.
  alternative_spanish_readings:
  - La vergüenza y la audacia.
  - Yo soy desvergonzada; yo soy avergonzada.
  rationale: La línea preserva la tensión paradójica del original sin suavizarla. Se evita resolverla con paráfrasis explicativa, porque el poema trabaja precisamente con autoatribuciones opuestas.
  doctrine_reference: Poética apofática / paradoja identitaria en literatura gnóstica tardía
translation_notes:
  revision_awareness: 'El audit trail en inglés muestra una revisión importante: se corrigió el error que leía ⲡϣⲓⲡⲉ como ‘silence’ y ⲁⲧϣⲓⲡⲉ como ‘shameless’ con base correcta en ‘shame’. También indica que la secuencia OCR final es incierta y que existe una lectura revisada para el par final (‘hard/trembling’) frente a la lectura previa errónea (‘stranger/human’). Esta traducción española sigue la revisión source-grounded del flujo de auditoría y evita repetir las lecturas descartadas.'
  spanish_consistency_notes:
  - Se mantiene ‘vergüenza’ para ⲡϣⲓⲡⲉ y ‘franqueza’ para παρρησία, evitando ‘silencio’ porque el audit trail lo corrigió como error de base.
  - Se conserva el paralelismo breve y acumulativo del poema con formas copulativas directas.
  - ‘Dura’ y ‘tiemblo’ reproducen la tensión antitética señalada por la revisión textual.
  - Se usa español neutral y reverente, sin introducir terminología eclesiástica que no esté en el texto fuente.
