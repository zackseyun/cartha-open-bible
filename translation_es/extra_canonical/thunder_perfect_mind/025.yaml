  rationale: 'Se hicieron reparaciones menores pero necesarias para mejorar la fidelidad editorial y la naturalidad del español: ‘soy desvergonzada’ reemplaza la construcción poco idiomática ‘yo soy sin vergüenza’; se redujo la repetición cuando no era necesaria; ‘escúchenme’ expresa mejor el tono exhortativo; y, sobre todo, se simplificó el aparato de notas de la última línea para que refleje la incertidumbre real sin arrastrar notas obsoletas e internamente inconsistentes. La solución mantiene la prudencia textual del audit trail sin publicar un texto español innecesariamente confuso.'
