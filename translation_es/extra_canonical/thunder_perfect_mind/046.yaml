translation:
  language: es
  text: 'y la que no tiene imagen entre los bárbaros.

    Yo soy la que han odiado en muchos lugares,

    y yo soy la que han amado en muchos lugares[a][b].

    Yo soy la que llaman «Muerte»,

    y yo soy la que llaman «la Ley».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La frase copta no expresa aquí un futuro; el verbo se entiende como presente habitual: «llaman».'
    reason: textual_variant
  - marker: b
    text: «En muchos lugares» traduce de forma literal el valor distributivo de ϩⲛ ⲙⲁⲛⲓⲙ; también puede entenderse como «entre muchos pueblos».
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲁⲩⲱ ⲧⲉⲧⲉ ⲙⲛⲧⲉⲥ ⲉⲓⲛⲉ ⲙⲙⲁⲩ ⲛⲃⲁⲣⲃⲁⲣⲟⲥ
  english_pob_choice: and she who has no image among the barbarians
  chosen_spanish: y la que no tiene imagen entre los bárbaros
  alternatives_spanish:
  - y la que no tiene imagen entre los extranjeros
  - y la que no tiene imagen entre los forasteros
  lexicon: Coptic ⲉⲓⲛⲉ = image/likeness; ⲛⲃⲁⲣⲃⲁⲣⲟⲥ = Greek loan barbaros
  rationale: 'La frase no expresa odio ni vocativo, sino una autoidentificación: ‘la que no tiene imagen’. Mantengo ‘bárbaros’ para conservar la tensión cultural del préstamo griego en el copto y la carga histórica del término.'
- source_word: ⲛⲧⲁⲩⲙⲉⲥⲧⲱⲥ
  english_pob_choice: they have hated
  chosen_spanish: han odiado
  alternatives_spanish:
  - han aborrecido
  - han despreciado
  lexicon: Coptic verb of hatred/despising in a poetic antithesis
  rationale: ‘Han odiado’ reproduce de modo directo la fuerza de la oposición con ‘han amado’ y evita suavizar la polaridad del pasaje.
- source_word: ⲛⲧⲁⲩⲙⲉⲣⲓⲧⲥ
  english_pob_choice: they have loved
  chosen_spanish: han amado
  alternatives_spanish:
  - han querido
  - han apreciado
  lexicon: Coptic mer- root, love/affection
  rationale: ‘Han amado’ conserva el paralelismo antitético amor/odio que estructura la línea y es idiomático en español.
- source_word: ϩⲛ ⲙⲁⲛⲓⲙ
  english_pob_choice: in many places
  chosen_spanish: en muchos lugares
  alternatives_spanish:
  - entre muchos pueblos
  - en lugares diversos
  lexicon: Coptic locative plural expression
  rationale: ‘En muchos lugares’ es la traducción más natural del alcance distributivo y sigue la lectura del POB inglés sin forzar universalidad absoluta.
- source_word: ⲙⲟⲩⲧⲉ
  english_pob_choice: call
  chosen_spanish: llaman
  alternatives_spanish:
  - nombran
  - dan el nombre de
  lexicon: Coptic moute = call/name
  rationale: 'En español, ‘llaman’ transmite de forma clara la fórmula nominativa del poema: asignar un nombre o título.'
- source_word: ⲡⲙⲟⲩ
  english_pob_choice: Death
  chosen_spanish: Muerte
  alternatives_spanish:
  - la muerte
  lexicon: Standard Coptic noun with titular force
  rationale: Capitalizo ‘Muerte’ para reflejar el valor titulativo o personificado que el poema le da al nombre.
- source_word: ⲡⲛⲟⲙⲟⲥ
  english_pob_choice: the Law
  chosen_spanish: la Ley
  alternatives_spanish:
  - la norma
  - la ley
  lexicon: Greek nomos loanword; legal/institutional sense
  rationale: ‘La Ley’ mantiene el matiz institucional/legal del término y su carácter de título nominal en la enumeración final.
theological_decisions:
- issue: No reconstruir un vocativo griego inexistente en este segmento
  english_pob_reading: The English POB included a note that 'You Greeks' was supplied to match the known sequence, while the OCR for this segment did not clearly show it.
  chosen_spanish_reading: No se introduce un vocativo como «griegos» en este versículo/segmento.
  alternative_spanish_readings:
  - «Entonces, ¿por qué me habéis odiado, griegos?»
  - «¿Por qué me has odiado, griegos?»
  rationale: La revisión indica que esas palabras pertenecen a otro tramo o fueron una reconstrucción errónea. Para evitar una interpolación sin base visible en el segmento dado, la versión española sigue solo el texto efectivamente atestiguado aquí.
  doctrine_reference: Principio de integridad textual y fidelidad a la evidencia disponible
- issue: Leer ϣⲁ- como presente/habitual, no futuro
  english_pob_reading: The English audit trail originally glossed the form as prospective ('they will call'), but the revision corrected it to 'they call'.
  chosen_spanish_reading: «llaman» en presente habitual.
  alternative_spanish_readings:
  - «llamarán»
  - «suelen llamar»
  rationale: 'La corrección del control textual apunta al valor habitual del prefijo ϣⲁ-, por lo que en español conviene un presente gnómico o habitual: «llaman».'
  doctrine_reference: Respeto a la morfología coptizante y a la revisión textual
translation_notes:
  revision_awareness: 'La versión se ha ajustado a la revisión adjudicada: se elimina la interpolación de «griegos» y la traducción prospectiva de «they will call»; además, se corrige la línea inicial para reflejar que el copto dice «la que no tiene imagen entre los bárbaros».'
  spanish_consistency_notes:
  - 'Se mantiene un estilo poético con paralelismo de primera persona: «Yo soy la que…».'
  - Se conserva «bárbaros» y «la Ley» por su valor cultural e intertextual en el préstamo griego del copto.
  - Se evita introducir artículos o sujetos no visibles en el segmento fuente, salvo donde el español los requiere por gramática.
