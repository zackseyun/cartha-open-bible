    reason: lexical_alternative
  - marker: b
    text: The OCR lines show material about “the name of the names … the place of God … the angels have called,” suggesting this block may be misaligned; the present question is supplied from the poem’s recurring antithetical pattern for this segment.
    reason: alignment_note
  - marker: c
    text: The negative verb ϣⲓⲛⲉ can be taken as “curse,” “revile,” or “hate.” “Revile” is chosen to keep the verbal, public-facing edge of the paradox.
    reason: lexical_alternative
  - marker: d
    text: Or 'Why do you revile me and revere me?'.
    reason: previous_rendering
