translation:
  language: es
  text: el hallazgo de los que me buscan[a], y la orden de quienes me piden, y la voz de las voces del lugar de Dios, de los ángeles[b][c], que ellos pronuncian
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hallazgo» intenta conservar el sustantivo resultativo del copto; otras posibilidades serían «encuentro» o «encontrar», pero aquí se prefiere la forma que mejor mantiene el paralelismo con «me buscan».
    reason: lexical_alternative
  - marker: b
    text: El orden final sigue la fuente copta («del lugar de Dios, de los ángeles») y conserva su encadenamiento poético, sin relectura explicativa.
    reason: source_note
  - marker: c
    text: La frase final traduce el cierre atestiguado («que ellos pronuncian»), no la consult_text interrogativa que acompaña al expediente.
    reason: textual_variant
lexical_decisions:
- source_word: ⲡⲅⲓⲛⲉ ⲛⲛⲉⲧϣⲓⲛⲉ ⲛⲥⲱⲉⲓ
  english_pob_choice: the finding of those who seek me
  chosen_spanish: el hallazgo de los que me buscan
  alternatives_spanish:
  - el encontrar de los que me buscan
  - el hallazgo de quienes me buscan
  lexicon: Coptic ϣⲓⲛⲉ; English POB audit trail for segment 070; Crum semantic range via the audit context
  rationale: «Hallazgo» expresa de manera natural el sustantivo de resultado de «buscar» sin introducir una interpretación ajena. Mantiene la relación directa con «los que me buscan» y evita trasladar el pasaje a la cuestión no sustentada de «revile/revere».
- source_word: ⲡⲟⲩⲁϩⲥⲁϩⲛⲉ ⲛⲛⲉⲧⲁⲓⲧⲉⲓ ⲙⲙⲟⲉⲓ
  english_pob_choice: the command of those who ask me
  chosen_spanish: el mandato de los que me piden
  alternatives_spanish:
  - la orden de los que me piden
  - el mandato de quienes me piden
  - la petición de los que me piden
  lexicon: Coptic ⲁⲓⲧⲉⲓ (Greek αἰτέω) in the audit context; English POB note that the positive pole can reflect asking/seek semantics
  rationale: «Mandato» conserva la fuerza nominal del Coptic ⲡⲟⲩⲁϩⲥⲁϩⲛⲉ tal como lo ofrece el audit trail, mientras que «me piden» traduce de forma idiomática el verbo de petición. Se evita «reverenciar» porque no está justificado por el source packet.
- source_word: ⲧⲥⲙⲏ ⲛ̄ⲛⲓⲥⲙⲏ
  english_pob_choice: the voice of the voices
  chosen_spanish: la voz de las voces
  alternatives_spanish:
  - la voz de las voces
  - la voz entre las voces
  lexicon: Coptic ⲥⲙⲏ; English POB wording
  rationale: Se conserva la repetición enfática «voz de las voces» porque el paralelismo es parte del tejido poético y no conviene suavizarlo a una formulación más explicativa.
- source_word: ⲙⲡⲙⲁ ⲛⲑⲉⲱ
  english_pob_choice: of the place of God
  chosen_spanish: del lugar de Dios
  alternatives_spanish:
  - del lugar de Dios
  - del sitio de Dios
  lexicon: Coptic ⲙⲁ; English POB wording
  rationale: «Lugar» es la traducción directa y neutral del término espacial, manteniendo el registro poético sin convertirlo en una expresión doctrinal más específica de lo que el texto da.
- source_word: ⲛ̄ⲛⲁⲅⲅⲉⲗⲟⲥ
  english_pob_choice: of the angels
  chosen_spanish: de los ángeles
  alternatives_spanish:
  - de los ángeles
  lexicon: Greek loanword ἄγγελος in Coptic; English POB wording
  rationale: Se traduce de manera directa y convencional como «ángeles», dado que no hay base en el pasaje para una alternativa contextual distinta.
- source_word: ⲛ̄ⲧⲁⲩⲧⲁⲟⲩⲟ
  english_pob_choice: which they utter
  chosen_spanish: que ellos pronuncian
  alternatives_spanish:
  - que ellos dicen
  - que ellos enuncian
  lexicon: Coptic verbal form in the source packet; English POB wording
  rationale: «Pronuncian» conserva el acto de emisión vocal explícito en el cierre de la línea y suena más poético que un simple «dicen» sin perder fidelidad.
theological_decisions:
- issue: El pasaje del paquete fuente no corresponde al interrogativo antitético de la consult_text, sino a una enumeración poética de hallazgo, mandato y voz.
  english_pob_reading: The English audit trail notes that the consult text 'Why do you curse me and honor me?' does not match the provided Coptic line, so the rendering follows the Coptic source rather than the consult phrase.
  chosen_spanish_reading: 'la traducción sigue la secuencia sustantiva del copto: hallazgo, mandato y voz, sin introducir un «¿por qué...?» que no está en el source packet.'
  alternative_spanish_readings:
  - ¿Por qué me maldices y me honras?
  - ¿Por qué me insultas y me reverencias?
  rationale: La revisión documentada identifica una desalineación grave; por tanto, la versión española debe reflejar el texto copto realmente atestiguado. Introducir la forma interrogativa sería una falsificación textual.
  doctrine_reference: Fidelidad textual y crítica de fuente; prioridad del testimonio original sobre una consulta desalineada.
translation_notes:
  revision_awareness: 'El expediente muestra una revisión crítica que corrigió una traducción previa por ignorar el copto y seguir la consult_text. Esta versión española se alinea con el texto fuente transcrito en el packet: «el hallazgo de los que me buscan, y el mandato de los que me piden, y la voz de las voces del lugar de Dios, de los ángeles, que ellos pronuncian».'
  spanish_consistency_notes:
  - Se evita «Señor» porque no aparece יהוה/YHWH ni una convención de máscara divina en este pasaje.
  - Se mantiene el paralelismo sintáctico con repetición de «de los que...», «de las voces», «de los ángeles».
  - No se introduce puntuación interpretativa que reordene la cadena nominal fuente.
  - El registro es poético y sobrio, apto para edición de lectura pública.
