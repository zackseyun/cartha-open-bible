    reason: lexical_alternative
  - marker: b
    text: El orden final sigue la fuente copta («del lugar de Dios, de los ángeles») y conserva su encadenamiento poético, sin relectura explicativa.
    reason: source_note
  - marker: c
    text: La frase final traduce el cierre atestiguado («que ellos pronuncian»), no la consult_text interrogativa que acompaña al expediente.
    reason: textual_variant
  revision_rationale: 'Se propone una reparación mínima para hacer el español más natural y claro: «la orden de quienes me piden» comunica mejor la relación nominal sin perder la aspereza del original auditado. El resto del texto se mantiene sustancialmente igual por su buena fidelidad al copto y a la revisión inglesa documentada.'
