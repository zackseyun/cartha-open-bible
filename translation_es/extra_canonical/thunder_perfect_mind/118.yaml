  text: 'And there are ignorances,

    and passions that are about to come,

    and pleasures toward you[a],

    and a power that you will take[b],

    a clear‑mindedness[c]—

    they will run up into their emptiness[d].'
  footnotes:
  - marker: a
    text: ⲡⲣⲟⲥ ⲡⲉ lacks an explicit object; “toward you” is inferred from the surrounding exhortatory context.
    reason: alignment_note
  - marker: b
    text: ⲉⲧⲛⲁϩⲧⲉ ⲙⲙⲟ is parsed as “that you (pl.) will take it”; the verb’s nuance could be “receive” or “seize,” and the subject might alternatively be “they.”
    reason: alternative_reading
  - marker: c
    text: The form ϣⲁⲛⲧⲟⲩⲛⲏⲫⲉ is verbal (“that they may be clear‑minded/sober”); rendered as a noun to keep the catalog parallel. It may instead be an infinitival/relative clause.
    reason: alignment_note
  - marker: d
    text: ⲡⲟⲩⲕⲏⲛⲏ is taken as “their emptiness” (cf. Gk κενή/κένωμα); “their poverty” is also possible.
    reason: lexical_alternative
