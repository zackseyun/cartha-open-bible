translation:
  language: es
  text: 'Y hay ignorancias,

    y pasiones que están por venir,

    y placeres hacia ustedes[a],

    y un poder que ustedes tomarán[b],

    una claridad mental[c]—

    ellos correrán hacia arriba, en su vacío[d].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ⲡⲣⲟⲥ carece de objeto explícito; «hacia ustedes» lo hace visible en español por el contexto exhortativo.
    reason: alternative_reading
  - marker: b
    text: La forma puede entenderse también como «que ustedes recibirán» o incluso «que ustedes se apoderarán de»; el verbo copto es incierto.
    reason: alternative_reading
  - marker: c
    text: ϣⲁⲛⲧⲟⲩⲛⲏⲫⲉ parece verbal; se ha sustantivado como «claridad mental» para conservar el paralelismo del listado.
    reason: lexical_alternative
  - marker: d
    text: ⲡⲟⲩⲕⲏⲛⲏ puede significar «su vacío» o «su pobreza»; se eligió la primera opción.
    reason: lexical_alternative
lexical_decisions:
- source_word: ϩⲉⲛⲙⲛⲧⲁⲧⲁⲙⲁϩⲧⲉ
  english_pob_choice: ignorances
  chosen_spanish: ignorancias
  alternatives_spanish:
  - estados de no saber
  - ignorancia
  lexicon: Crum, Coptic Dictionary s.v. ⲙⲛⲧⲁⲧⲁⲙⲁϩⲧⲉ
  rationale: El plural coptizante ϩⲉⲛ pide un plural en español; «ignorancias» conserva el valor de catálogo moral/espiritual y mantiene la fuerza colectiva del término, en línea con la decisión inglesa.
- source_word: ϩⲉⲛⲡⲁⲑⲟⲥ
  english_pob_choice: passions
  chosen_spanish: pasiones
  alternatives_spanish:
  - sufrimientos
  lexicon: Préstamo del griego πάθος; Crum s.v. ⲡⲁⲑⲟⲥ
  rationale: En catálogos éticos gnósticos, el sentido dominante es afectivo/moral, no físico. «Pasiones» reproduce ese campo semántico en español.
- source_word: ⲉⲧϣⲁⲉⲓⲏⲧ
  english_pob_choice: that are about to come
  chosen_spanish: que están por venir
  alternatives_spanish:
  - que vendrán
  - que van a venir
  lexicon: 'Layton, Coptic Grammar: relativo ⲉⲧ‑ + futuro ϣⲁ‑ + ⲉⲓⲏⲧ “venir”'
  rationale: «Están por venir» expresa bien la inminencia del futuro relativo sin volverlo demasiado libre.
- source_word: ϩⲉⲛⲏⲇⲟⲛⲏ
  english_pob_choice: pleasures
  chosen_spanish: placeres
  alternatives_spanish:
  - delicias
  - deseos
  lexicon: Préstamo del griego ἡδονή; Crum s.v. ⲏⲇⲟⲛⲏ
  rationale: «Placeres» es el equivalente más natural y mantiene el tono ético del listado.
- source_word: ⲡⲣⲟⲥ
  english_pob_choice: toward you
  chosen_spanish: hacia ustedes
  alternatives_spanish:
  - contra ustedes
  - con respecto a ustedes
  lexicon: Préstamo del griego πρός
  rationale: Sigo la orientación direccional del POB; el objeto implícito queda explicitado en español por claridad, sin añadir contenido nuevo.
- source_word: ⲟⲩⲉⲓϣ
  english_pob_choice: a power
  chosen_spanish: un poder
  alternatives_spanish:
  - una fuerza
  - una capacidad
  lexicon: Crum s.v. ⲉⲓϣ “strength, might”
  rationale: «Poder» conserva la abstracción y el peso retórico del original; es la opción más natural en español contemporáneo.
- source_word: ⲉⲧⲛⲁϩⲧⲉ ⲙⲙⲟ
  english_pob_choice: that you will take
  chosen_spanish: que ustedes tomarán
  alternatives_spanish:
  - que ustedes recibirán
  - que ustedes se apoderarán de
  lexicon: Crum s.v. (verb uncertain; cf. ϩⲧⲉ/ϩⲧⲏ semantic field “take/hold”); Layton on ⲉⲧ‑ + futuro 2pl
  rationale: «Tomarán» conserva la ambigüedad entre tomar/recibir/seize sin cerrar indebidamente la sintaxis incierta del coptico.
- source_word: ϣⲁⲛⲧⲟⲩⲛⲏⲫⲉ
  english_pob_choice: clear-mindedness
  chosen_spanish: claridad mental
  alternatives_spanish:
  - sobriedad
  - ser claros de mente
  lexicon: Préstamo del griego νήφω “ser sobrio / estar despejado”; ver glosario doctrinal νήφω → clear-minded
  rationale: La forma parece verbal, pero el español nominal «claridad mental» mantiene el paralelismo del catálogo y comunica la noción de lucidez/sobriedad sin sonar extraño.
- source_word: ⲛⲥⲉ ⲡⲱⲧ
  english_pob_choice: they will run
  chosen_spanish: ellos correrán
  alternatives_spanish:
  - ellos huirán
  - ellos se precipitarán
  lexicon: Crum s.v. ⲡⲱⲧ “run, flee”
  rationale: «Correrán» es idiomático y suficientemente amplio para incluir tanto correr como huir, según el matiz del contexto.
- source_word: ⲉϩⲣⲁⲓ
  english_pob_choice: up
  chosen_spanish: hacia arriba
  alternatives_spanish:
  - arriba
  - en ascenso
  lexicon: Crum s.v. ⲉϩⲣⲁⲓ
  rationale: Se conserva la dirección espacial explícita del adverbio copto con una formulación natural en español.
- source_word: ⲡⲟⲩⲕⲏⲛⲏ
  english_pob_choice: their emptiness
  chosen_spanish: su vacío
  alternatives_spanish:
  - su vaciedad
  - su pobreza
  lexicon: Préstamo del griego κενή/κένωμα “emptiness” (ortografía ⲕⲏⲛⲏ ~ ⲕⲉⲛⲏ); cf. Crum s.v. ⲕⲉⲛⲏ
  rationale: «Vacío» es más natural que «vaciedad» y preserva la imagen metafórica. El posesivo singular «su» mantiene la referencia colectiva del original sin forzar el plural en español.
theological_decisions:
- issue: Valor de la lista de vicios/estados y su tono gnóstico-ético
  english_pob_reading: The list is rendered as a sequence of abstract moral/spiritual conditions without smoothing the tension between ignorance, passion, pleasure, power, and emptiness.
  chosen_spanish_reading: 'La secuencia se conserva como catálogo de estados/impulsos: ignorancias, pasiones, placeres, poder, claridad mental y vacío.'
  alternative_spanish_readings:
  - interpretación moralizante más explícita
  - paráfrasis filosófica general
  rationale: El español mantiene la tensión del original entre términos negativos y una virtud ambigua («claridad mental») sin convertirlo en una exhortación cristiana convencional.
  doctrine_reference: Glosario POB sobre vicios/pasiones; sensibilidad textual NH
- issue: Dirección de la frase final y su imagen espacial
  english_pob_reading: '''they will run up into their emptiness'' preserves the odd metaphor and the uncertainty of the final object.'
  chosen_spanish_reading: «ellos correrán hacia arriba, en su vacío» conserva la rareza de la imagen y no la normaliza a una explicación más explícita.
  alternative_spanish_readings:
  - correrán hacia su vacío
  - subirán a su vacío
  rationale: La formulación española intenta retener la extrañeza del copto y del POB, evitando resolver una imagen que el testimonio no aclara de forma segura.
  doctrine_reference: Principio POB de no borrar tensiones textuales
translation_notes:
  revision_awareness: No se realizaron revisiones posteriores al último pase; se mantiene la lectura base del audit trail inglés y se adapta al español con la mínima interpretación necesaria para una lectura publicable.
  spanish_consistency_notes:
  - Se conservó el plural colectivo donde el coptico lo sugiere («ignorancias», «pasiones», «placeres») y se usó posesivo singular de sentido colectivo en «su vacío».
  - Se evitó introducir terminología eclesiástica no atestiguada en el segmento.
  - La cadencia de lista se preservó con paralelismo sintáctico y sin expandir el texto más allá del soporte del original.
