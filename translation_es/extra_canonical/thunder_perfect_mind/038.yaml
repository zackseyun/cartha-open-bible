translation:
  language: es
  text: No odien mi obediencia[a][c] ni pongan su amor en mi autocontrol[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “sumisión”. El copto ϭⲟⲟⲃ puede denotar obediencia o estar sujeto.
    reason: lexical_alternative
  - marker: b
    text: O “castidad”. ⲥⲧⲱⲧ a menudo lleva el sentido de enkrateia (contención), a veces específicamente de continencia sexual.
    reason: lexical_alternative
  - marker: c
    text: El OCR de este bloque también muestra ⲫⲟⲃⲟⲥ (“temor”) y ⲧⲟⲡⲟⲥ (“lugar”), que quizá pertenezcan a líneas adyacentes y no a esta pareja de mandatos; por eso la versión sigue el patrón recurrente de la sección.
    reason: alignment_note
lexical_decisions:
- source_word: ϭⲟⲟⲃ
  english_pob_choice: obedience
  chosen_spanish: obediencia
  alternatives_spanish:
  - sumisión
  lexicon: Crum (sahídico copto)
  rationale: El término copto puede significar obediencia o estar sujeto. En esta construcción posesiva, “mi obediencia” comunica con naturalidad la relación de sujeción/obediencia que refleja el POB en inglés. “Sumisión” es una alternativa válida, pero en español puede sonar más pasiva o abstracta en este contexto.
- source_word: ⲥⲧⲱⲧ
  english_pob_choice: self-control
  chosen_spanish: autocontrol
  alternatives_spanish:
  - castidad
  - continencia
  - estabilidad
  lexicon: Crum (sahídico copto)
  rationale: En contextos éticos, el vocablo suele expresar contención o enkrateia. “Autocontrol” preserva ese campo semántico amplio en español. “Castidad” es posible, pero restringe demasiado el sentido; “continencia” es más técnica; “estabilidad” es menos probable aquí.
translation_notes:
  revision_awareness: Se siguió el texto copto y el aparato auditado en inglés. Dado que el OCR sugiere material adyacente sobre “temor” y “lugar”, pero la traducción inglesa POB ya identifica la línea central como una prohibición paralela sobre obediencia/autocontrol, la versión española mantiene esa estructura y conserva las alternativas léxicas relevantes en notas.
  spanish_consistency_notes:
  - Se conserva “Yahvé” solo cuando el original lo exige; aquí no aplica.
  - Se evita “siervo” porque el término fuente no corresponde a δοῦλος.
  - Se mantiene un registro sobrio y publicable, sin ampliar el contenido más allá de la evidencia.
  - Las notas preservan las tensiones léxicas documentadas entre obediencia/sumisión y autocontrol/castidad.
