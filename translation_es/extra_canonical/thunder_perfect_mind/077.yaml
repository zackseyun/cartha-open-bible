review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue en general la revisión auditada del copto: conserva bien ‘silencio’/‘voz’, el valor causal de ‘por causa de mí’, la antítesis ‘extranjera/ciudadana’, y sobre todo la corrección clave ‘la que no tiene sustancia’ junto con ‘fuera de mi asociación’ y ‘me ignoran’. Sin embargo, arrastra en el texto una cadena de notas [g][f][e][d][c][b] aplicada a ‘la que no tiene sustancia’ aunque varias notas tratan de otras expresiones, lo que distorsiona la relación entre texto y aparato.'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero puede pulirse para mayor naturalidad poética: ‘Yo soy paz’ suena mejor que ‘Yo soy la paz’ aquí, en línea con el registro del English POB. También conviene ordenar las notas para que cada marcador ancle exactamente donde corresponde; el aparato actual es confuso y sobrecargado. ‘Llegó a ser la guerra’ es aceptable, aunque ‘llegó a ser guerra’ sería menos natural; se puede mantener la formulación causal sin problema.'
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. ‘Sustancia’ para οὐσία es defendible por el audit trail; ‘asociación’ para συνουσία también. El uso de ‘extranjera/ciudadana’ aprovecha bien la primera persona femenina del pasaje y no contradice el original.
  issues:
  - severity: medium
    issue: Marcadores de nota mal anclados y acumulados en una sola frase
    rationale: Las notas b–g no corresponden todas a ‘la que no tiene sustancia’; varias explican ‘extranjera’, ‘sustancia’, ‘por causa de mí’ o la historia de una lectura descartada. El proyecto exige que cada marcador aparezca exactamente en la palabra o frase relevante.
  - severity: low
    issue: ‘Yo soy la paz’ suena menos natural que ‘Yo soy paz’ en este contexto
    rationale: El audit trail inglés eliminó el artículo por registro oracular y naturalidad con sustantivos abstractos. En español ambas opciones son posibles, pero sin artículo fluye mejor y preserva la concisión poética.
  - severity: low
    issue: Exceso de notas textuales heredadas
    rationale: Mantener varias notas sobre lecturas previas descartadas recarga innecesariamente el español. Basta conservar las alternativas o aclaraciones realmente útiles para el lector y bien ancladas.
