  text: 'I am the silence within a voice[a].

    I am peace, and because of me war came to be.

    And I am a foreigner and a citizen.

    I am the substance, and the one who has no substance[g][f][e][d][c][b]; those who exist outside my association are ignorant of me.'
  footnotes:
  - marker: a
    text: 'Silence within a voice: the noun is read as ⲥⲙⲙⲟⲥ (silence); OCR shows ⲙⲙⲟⲥ. Thunder elsewhere juxtaposes silence and voice.'
    reason: alignment_note
  - marker: b
    text: 'Foreigner: the lemma of ⲟⲩϣⲙⲙⲱ is uncertain; "stranger" is an equally possible rendering.'
    reason: lexical_alternative
  - marker: c
    text: 'Essence translates Greek οὐσία (ousia). Alternatives: substance, being.'
    reason: lexical_alternative
  - marker: d
    text: Consort renders Greek συνουσία (synousia), which can denote companionship, association, or sexual union; "companionship" or "association" are possible.
    reason: lexical_alternative
  - marker: e
    text: '"Because of me the war came to be" follows ϣⲱⲡⲉ ⲉⲧⲃⲏⲏⲧ; the causative sense could also be expressed as "on account of me war occurred."'
    reason: alignment_note
  - marker: f
    text: Or 'I am the essence, and the one with the consort; those who are within my consort make me known.'.
    reason: previous_rendering
  - marker: g
    text: Or 'I am the peace, and because of me the war came to be.'.
    reason: previous_rendering
