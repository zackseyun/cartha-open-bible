translation:
  language: es
  text: 'Yo soy el silencio dentro de una voz[a].


    Yo soy la paz, y por causa de mí llegó a ser la guerra.


    Y yo soy una extranjera y una ciudadana.


    Yo soy la sustancia, y la que no tiene sustancia[g][f][e][d][c][b]; los que existen fuera de mi asociación me ignoran.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El original coptic usa una lectura incierta en el sustantivo de "silencio"; la traducción sigue la interpretación adoptada en el audit trail para conservar el contraste con "voz".
    reason: source_note
  - marker: b
    text: '"Extranjera" también podría traducir el término como "forastera" o "extraña"; se elige la primera por su equilibrio entre claridad y contraste con "ciudadana".'
    reason: lexical_alternative
  - marker: c
    text: '"Sustancia" traduce el valor filosófico de ousia; también son posibles "esencia" o "ser".'
    reason: lexical_alternative
  - marker: d
    text: La construcción coptica no significa "consorte" aquí, sino ausencia de sustancia; la mención a asociación/compañía no pertenece a esta revisión del texto.
    reason: textual_variant
  - marker: e
    text: La fuerza causal puede expresarse también como "a causa de mí" o "por mí"; se prefirió una forma más explícita y solemne.
    reason: alternative_reading
  - marker: f
    text: Otra posibilidad, ya descartada por la revisión, sería leer una relación con "consorte"; el audit trail la corrige como error de traducción.
    reason: textual_variant
  - marker: g
    text: '"La que no tiene sustancia" sigue la lectura revisada de la línea; no es "la esencia" ni "la que tiene consorte".'
    reason: textual_variant
lexical_decisions:
- source_word: ⲁⲛⲟⲕ
  english_pob_choice: I am
  chosen_spanish: Yo soy
  alternatives_spanish:
  - Soy
  - Yo soy
  lexicon: Layton; Crum
  rationale: Mantiene la autodeclaración enfática y el ritmo anafórico del texto oracular, sin volverlo forzado en español.
- source_word: (ⲥ)ⲙⲙⲟⲥ / ϣⲱⲥ
  english_pob_choice: silence within a voice
  chosen_spanish: el silencio dentro de una voz
  alternatives_spanish:
