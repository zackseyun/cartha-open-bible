translation:
  language: es
  text: 'Yo soy el silencio dentro de una voz[a].


    Yo soy paz, y por causa de mí llegó a ser la guerra[b].


    Y yo soy una extranjera[c] y una ciudadana.


    Yo soy la sustancia[d], y la que no tiene sustancia[e]; los que existen fuera de mi asociación me ignoran.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El sustantivo coptico se lee de manera incierta; aquí se sigue la interpretación ‘silencio’ para conservar el contraste con ‘voz’.
    reason: source_note
  - marker: b
    text: La expresión también puede entenderse como ‘a causa de mí ocurrió la guerra’; la construcción conserva un sentido causal fuerte.
    reason: alignment_note
  - marker: c
    text: ‘Extranjera’ también podría traducirse como ‘forastera’ o ‘extraña’; se elige esta opción por su contraste claro con ‘ciudadana’.
    reason: lexical_alternative
  - marker: d
    text: ‘Sustancia’ traduce el matiz filosófico de ousia; también son posibles ‘esencia’ o ‘ser’.
    reason: lexical_alternative
  - marker: e
    text: 'La línea sigue la lectura revisada: significa ‘la que no tiene sustancia’, no una referencia a ‘consorte’.'
    reason: textual_variant
lexical_decisions:
- source_word: ⲁⲛⲟⲕ
  english_pob_choice: I am
  chosen_spanish: Yo soy
  alternatives_spanish:
  - Soy
  - Yo soy
  lexicon: Layton; Crum
  rationale: Mantiene la autodeclaración enfática y el ritmo anafórico del texto oracular, sin volverlo forzado en español.
- source_word: (ⲥ)ⲙⲙⲟⲥ / ϣⲱⲥ
  english_pob_choice: silence within a voice
  chosen_spanish: el silencio dentro de una voz
  alternatives_spanish:
  - el silencio en una voz
  - el silencio dentro de la voz
  lexicon: Crum
  rationale: Conserva el contraste paradojal entre silencio y voz; "dentro de" reproduce bien la relación interna sugerida por la construcción.
- source_word: ϯⲣⲏⲛⲏ
  english_pob_choice: peace
  chosen_spanish: la paz
  alternatives_spanish:
  - paz
  - tranquilidad
  lexicon: Greek loanword (eirēnē) via Coptic
  rationale: '"Paz" es la equivalencia natural en español y preserva la antítesis con guerra.'
- source_word: ⲡⲡⲟⲗⲉⲙⲟⲥ
  english_pob_choice: the war
  chosen_spanish: la guerra
  alternatives_spanish:
  - guerra
  - el conflicto
  lexicon: Greek loanword (polemos) via Coptic
  rationale: La forma con artículo queda bien en español poético y mantiene la fuerza del paralelismo con "la paz".
- source_word: ϣⲱⲡⲉ
  english_pob_choice: came to be
  chosen_spanish: llegó a ser
  alternatives_spanish:
  - ocurrió
  - vino a ser
  - surgió
  lexicon: Crum
  rationale: Expresa bien el ingreso a la existencia o al acontecer, con un tono elevado acorde al poema.
- source_word: ⲉⲧⲃⲏⲏⲧ
  english_pob_choice: because of me
  chosen_spanish: por causa de mí
  alternatives_spanish:
  - a causa de mí
  - por mí
  - en razón de mí
  lexicon: Crum
  rationale: Evita una literalidad demasiado áspera y conserva el valor causal explícito.
- source_word: ⲟⲩϣⲙⲙⲱ
  english_pob_choice: foreigner
  chosen_spanish: una extranjera
  alternatives_spanish:
  - una forastera
  - una extraña
  - una extranjera
  lexicon: Crum (uncertain reading)
  rationale: La lectura del léxico es incierta; "extranjera" conserva la oposición social frente a "ciudadana" y mantiene el paralelismo de género del autodeclarativo.
- source_word: ⲣⲙⲛⲡⲟⲗⲓⲥ
  english_pob_choice: citizen
  chosen_spanish: una ciudadana
  alternatives_spanish:
  - una habitante de la ciudad
  - una mujer de la ciudad
  - una ciudadana
  lexicon: Crum; Greek loan (polis)
  rationale: '"Ciudadana" es idiomático y reproduce la antítesis con "extranjera" sin perder el matiz de pertenencia cívica.'
- source_word: ⲟⲩⲥⲓⲁ
  english_pob_choice: substance
  chosen_spanish: la sustancia
  alternatives_spanish:
  - la esencia
  - el ser
  lexicon: Greek loan (ousia) via Coptic
  rationale: '"Sustancia" corresponde al valor filosófico del préstamo y funciona bien en español, aunque "esencia" siga siendo alternativa válida.'
- source_word: ⲧⲉⲧⲉ ⲙⲛⲧⲉⲥ ⲟⲩⲥⲓⲁ
  english_pob_choice: the one who has no substance
  chosen_spanish: la que no tiene sustancia
  alternatives_spanish:
  - la que no posee sustancia
  - la que carece de sustancia
  - la sin sustancia
  lexicon: Coptic privative formation; Greek loan (ousia) via Coptic
  rationale: 'Sigue la revisión auditada: no se trata de una consorte, sino de una privación real de sustancia. "No tiene sustancia" es claro y fiel.'
- source_word: ⲉⲃⲟⲗ ϩⲛ
  english_pob_choice: outside of
  chosen_spanish: fuera de
  alternatives_spanish:
  - por fuera de
  - al margen de
  - fuera de
  lexicon: Crum
  rationale: Preserva la exclusión espacial/metafórica marcada por la construcción; en español "fuera de" suena natural y preciso.
- source_word: ⲥⲉ-ⲣ-ⲁⲧⲥⲟⲟⲩⲛ
  english_pob_choice: they are ignorant of me
  chosen_spanish: me ignoran
  alternatives_spanish:
  - no me conocen
  - son ignorantes de mí
  - me desconocen
  lexicon: Crum
  rationale: 'Se refleja la lectura privativa correcta: no es "hacer conocer", sino ignorar/desconocer. "Me ignoran" es conciso y fiel.'
translation_notes:
  revision_awareness: 'Se incorporó la revisión auditada que corrige errores graves del borrador inglés previo: la frase final se entiende como "la que no tiene sustancia" y "los que existen fuera de mi asociación me ignoran", no como una relación de consorte ni como conocimiento causado. También se respetó la lectura del silencio dentro de una voz y la antítesis paz/guerra.'
  spanish_consistency_notes:
  - Se mantuvo el pronombre enfático "Yo soy" para conservar el paralelismo oracular.
  - Se evitó el calco literal demasiado áspero en favor de un español digno y publicable.
  - Se preservó la tensión filosófica de ousia con "sustancia", dejando "esencia" como alternativa en nota.
  - Se evitó introducir lenguaje eclesiástico tradicional que no está respaldado por el texto fuente.
