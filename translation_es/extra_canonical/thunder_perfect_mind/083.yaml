translation:
  language: es
  text: 'Yo soy la división y el despojamiento[a].

    Yo soy la morada[c].

    Y yo soy el robo; yo soy

    la que ve lo que viene

    a mí.

    Yo soy el vuelo del desalojo[d][b][a][d][c][b].

    Yo soy yo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la división y el despojamiento». El griego/cóptico revisado del pasaje ha sido entendido aquí según el auditaje corregido, no según la lectura espacial anterior.'
    reason: textual_variant
  - marker: b
    text: 'O: «el robo» o «el despojo». El campo léxico de ⲕⲱⲗ/ⲕⲱⲗ ⲉⲃⲟⲗ admite más de una formulación española cercana.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «la estancia» o «el abode». ⲧⲙⲟⲛⲏ es un préstamo griego con sentido de morada/estancia.'
    reason: lexical_alternative
  - marker: d
    text: La secuencia admite una lectura alternativa más cercana a «el vuelo de la liberación»; sin embargo, se conserva aquí el matiz de ‘desalojo’ por el auditaje léxico disponible.
    reason: alternative_reading
lexical_decisions:
- source_word: ⲁⲛⲟⲕ ⲡⲉ
  english_pob_choice: I am
  chosen_spanish: Yo soy
  alternatives_spanish:
  - Soy
  - Yo mismo soy
  lexicon: Construcción copulativa sahídica
  rationale: Conserva la cadencia repetida de autodeclaración y su valor enfático sin forzar un orden ajeno al español.
- source_word: ⲡⲡⲱⲧⲣ
  english_pob_choice: division
  chosen_spanish: división
  alternatives_spanish:
  - partición
  - ruptura
  lexicon: Crum s.v. pōtr
  rationale: El auditaje corrigió una lectura espacial errónea; el sentido léxico favorece ‘división’ y mantiene la tensión del paralelismo.
- source_word: ⲕⲱⲗ ⲉⲃⲟⲗ / ⲕⲱⲗⲉⲃⲟⲗ
  english_pob_choice: stripping / robbery
  chosen_spanish: despojamiento
  alternatives_spanish:
  - robo
  - despojo
  - expolio
  lexicon: Crum s.v. kōl / kōl ebol
  rationale: Para español, ‘despojamiento’ conserva el acto de quitar/expoliar sin reducirlo solo a ‘robo’; además refleja la fuerza concreta del verbo/nombre auditado.
- source_word: ⲧⲙⲟⲛⲏ
  english_pob_choice: dwelling
  chosen_spanish: morada
  alternatives_spanish:
  - morada
  - morada/estancia
  - morada, estancia
  lexicon: Préstamo griego μονή
  rationale: ‘Morada’ es más natural en español que ‘dwelling’ y conserva el valor locativo concreto del término.
- source_word: ⲡⲕⲱⲗ
  english_pob_choice: outside / far-away (previously erroneous in draft; revised as release/despojo family in audit context)
  chosen_spanish: robo
  alternatives_spanish:
  - despojo
  - expolio
  lexicon: Crum s.v. kōl
  rationale: Siguiendo la revisión, el término pertenece al campo de ‘robar/quitar’; ‘robo’ mantiene la dureza semántica y el ritmo poético.
- source_word: ⲡⲉⲧⲛⲁⲩ
  english_pob_choice: the one who sees
  chosen_spanish: la que ve
  alternatives_spanish:
  - el que ve
  - quien ve
  lexicon: Participio relativo sahídico
  rationale: Se mantiene la función verbal y la referencia femenina del hablante poético, natural en español.
- source_word: ⲉⲧⲛⲏⲟⲩ
  english_pob_choice: what comes
  chosen_spanish: lo que viene
  alternatives_spanish:
  - lo que llega
  - lo que ha de venir
  lexicon: Forma cualitativa de ⲉⲓ
  rationale: La revisión descartó ‘visible’; ‘lo que viene’ refleja el valor de venir/llegar sin introducir futurización no garantizada.
- source_word: ⲉϩⲣⲁⲓ ⲉⲧⲟⲟⲧ
  english_pob_choice: down to me
  chosen_spanish: a mí
  alternatives_spanish:
  - hacia mí
  - hasta mí
  lexicon: Locución preposicional coptica
  rationale: En español, ‘a mí’ comunica la dirección/referencia personal del movimiento con la mayor sobriedad.
- source_word: ⲫⲱⲧ
  english_pob_choice: flight
  chosen_spanish: vuelo
  alternatives_spanish:
  - huida
  - fuga
  lexicon: Crum s.v. phōt
  rationale: ‘Vuelo’ conserva la imagen de movimiento y elevación; es más poético y menos policial que ‘fuga’.
- source_word: ⲙⲡⲕⲱ ⲉⲃⲟⲗ
  english_pob_choice: the release
  chosen_spanish: el desalojo
  alternatives_spanish:
  - la liberación
  - el despojo
  lexicon: Campo semántico de ⲕⲱ ⲉⲃⲟⲗ
  rationale: ‘Desalojo’ captura el acto de dejar/retirar/soltar con un matiz concreto; evita suavizar indebidamente la fuerza del término y mantiene apertura a la ambigüedad del auditaje.
theological_decisions:
- issue: Repetición identitaria final “I am I”
  english_pob_reading: I am I.
  chosen_spanish_reading: Yo soy yo.
  alternative_spanish_readings:
  - Yo soy el que soy
  - Yo soy yo misma
  rationale: El texto presenta una autoafirmación tautológica; ‘Yo soy yo’ conserva la literalidad sin introducir una fórmula veterotestamentaria ajena ni una explicitación no atestiguada.
  doctrine_reference: Autorreferencialidad poética; no requiere armonización doctrinal.
translation_notes:
  revision_awareness: El auditaje posterior corrigió una versión previa que leía erróneamente este segmento como ‘inside/outside’, ‘robbery’ y ‘what is visible’. La revisión estableció que ⲡⲡⲱⲧⲣ pertenece al campo de ‘dividir/partir’, ⲕⲱⲗ / ⲕⲱⲗ ⲉⲃⲟⲗ al de ‘robar/despojar/quitar’, ⲉⲧⲛⲏⲟⲩ significa ‘lo que viene’, y ⲫⲱⲧ/ⲙⲡⲕⲱ ⲉⲃⲟⲗ forman la clausula final sobre ‘vuelo’ y ‘desalojo/liberación’. La presente versión sigue ese estado revisado.
  spanish_consistency_notes:
  - Se mantuvo ‘Yo soy’ para conservar el estribillo del original.
  - Se evitó ‘SEÑOR’ y cualquier acomodación litúrgica no presente en el texto fuente.
  - La puntuación y el quiebre de versos buscan reflejar la prosa poética fragmentaria del original.
  - Las notas a pie preservan alternativas reales donde el auditaje las reconoce, sin sobreexplicar el poema.
