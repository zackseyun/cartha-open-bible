  text: You hear me in your calling of me[a], in a [...] that you utter. You did not hear[e][d][c][b]. I am the defense.
  footnotes:
  - marker: a
    text: The Coptic shows “ⲧⲉⲧⲛⲥⲱⲧⲙ ⲉⲣⲟⲓ ϩⲛ ⲛⲉⲧⲛ—”, but the object after “in your …” is truncated; the translation omits a specific object rather than guess.
    reason: alignment_note
  - marker: b
    text: “ⲙⲟⲩⲧⲉ ⲉⲣⲟⲓ” can mean “call me,” “call to me,” or “invoke me.” The following “ϩⲛ ⲟⲩⲡ—” is incomplete and may have specified manner (e.g., “with a [voice/boldness]”).
    reason: lexical_alternative
  - marker: c
    text: The conditional is reconstructed from “ⲉⲧⲉⲧⲛ—” and the negative relative “ⲙⲡⲉⲧⲛⲥⲱⲧⲙ.” Hence “if you have not listened.”
    reason: alignment_note
  - marker: d
    text: ⲧⲁⲡⲟⲗⲟⲅⲓⲁ is a Greek loanword (ἀπολογία), meaning “defense/answer.” Alternatives include “reply” or “plea.”
    reason: lexical_alternative
  - marker: e
    text: Or 'You—listen to me; call to me. If you have not listened, I am the defense.'.
    reason: previous_rendering
