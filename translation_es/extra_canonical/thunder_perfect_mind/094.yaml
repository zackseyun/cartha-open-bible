translation:
  language: es
  text: Me oyes en tu llamarme[a], en una [...] que pronuncias[b]. No has oído[c]. Yo soy la defensa[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La forma copta reconstruida aquí funciona como «tu llamarme», es decir, un sustantivo verbal; no se toma como mandato.
    reason: lexical_alternative
  - marker: b
    text: El pasaje está truncado tras la preposición; el término omitido no puede recuperarse con seguridad, así que se deja la laguna.
    reason: source_note
  - marker: c
    text: La revisión del texto entiende este segmento como una negación perfecta («no has oído»), no como una condición («si no has oído»).
    reason: textual_variant
  - marker: d
    text: «Defensa» traduce el préstamo griego ἀπολογία con su valor forense/apologético; «apología» sería más literal pero menos natural en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲥⲱⲧⲙ
  english_pob_choice: listen / hear
  chosen_spanish: oyes
  alternatives_spanish:
  - escuchas
  - oyes
  lexicon: Crum, Coptic Dictionary s.v. ⲥⲱⲧⲙ
  rationale: El contexto exige una percepción auditiva directa más que una exhortación; por eso uso «oyes» para reflejar el valor presente de la forma copta, manteniendo el matiz de oír/escuchar sin convertirlo en imperativo.
- source_word: ⲙⲟⲩⲧⲉ ⲉⲣⲟⲓ
  english_pob_choice: call to me
  chosen_spanish: llamarme
  alternatives_spanish:
  - llamar a mí
  - invocarme
  - nombrarme
  lexicon: Crum s.v. ⲙⲟⲩⲧⲉ; Layton, Coptic Grammar §33
  rationale: 'La construcción nominalizada se entiende mejor en español como un sustantivo verbal: «tu llamarme». Así se conserva la relación direccional sin forzar un imperativo ni reducir el alcance posible de «llamar/invocar».'
- source_word: ⲉⲧⲉⲧⲛⲧⲁⲩⲟ
  english_pob_choice: that you utter
  chosen_spanish: que pronuncias
  alternatives_spanish:
  - que dices
  - que expresas
  lexicon: Coptic verbal usage in the audited reconstruction; Crum s.v. ⲧⲁⲩⲟ
  rationale: «Pronuncias» mantiene el acto de decir/emitir verbalmente y suena natural en español, sin añadir contenido interpretativo que el fragmento no garantiza.
- source_word: ⲙⲡⲉⲧⲛⲥⲱⲧⲙ
  english_pob_choice: You did not hear
  chosen_spanish: No has oído
  alternatives_spanish:
  - No oíste
  - No escuchaste
  lexicon: Layton, Coptic Grammar §121; Crum s.v. ⲥⲱⲧⲙ
  rationale: La revisión del texto favorece un perfecto negativo, no una condicional. «No has oído» preserva esa negación con valor resultativo/presente y evita fijar demasiado el tiempo.
- source_word: ⲧⲁⲡⲟⲗⲟⲅⲓⲁ
  english_pob_choice: the defense
  chosen_spanish: la defensa
  alternatives_spanish:
  - la apología
  - la respuesta
  - la defensa
  lexicon: Greek loanword ἀπολογία, LSJ s.v.
  rationale: «Defensa» reproduce el valor forense del préstamo griego sin introducir la carga moderna, técnica o confesional que puede tener «apología» en español.
theological_decisions:
- issue: Valor en primera persona de la fórmula final
  english_pob_reading: I am the defense.
  chosen_spanish_reading: Yo soy la defensa.
  alternative_spanish_readings:
  - Soy la defensa.
  - Yo soy la respuesta.
  rationale: Se conserva la autoidentificación solemne del original. «Yo soy» mantiene el ritmo de la sección y «defensa» preserva el sentido apologético/forense atestiguado por el préstamo griego.
  doctrine_reference: Uso retórico-identitario del dicho; no se asigna un referente doctrinal externo
- issue: Estructura de las dos primeras cláusulas como afirmaciones, no mandatos
  english_pob_reading: You hear me in your calling of me, in a [...] that you utter. You did not hear.
  chosen_spanish_reading: Me oyes en tu llamarme, en una [...] que pronuncias. No has oído.
  alternative_spanish_readings:
  - Me escuchas en tu llamarme, en una [...] que pronuncias. No has oído.
  - Me oyes cuando me llamas, en una [...] que pronuncias. No has oído.
  rationale: La revisión textual corrige la lectura imperativa anterior. En español conviene reflejar la afirmación presente de percepción y la cláusula nominalizada («tu llamarme») para no perder la sintaxis copta reconstruida.
  doctrine_reference: Principio de fidelidad a la gramática reconstruida del copto; no aplica una lectura exhortativa sin base
- issue: Tratamiento del fragmento truncado
  english_pob_reading: in a [...]
  chosen_spanish_reading: en una [...]
  alternative_spanish_readings:
  - en un [...]
  - en una cosa [...]
  rationale: El fragmento está materialmente incompleto; se conserva la laguna con la misma apertura sintáctica del original sin intentar suplir el término perdido.
  doctrine_reference: Respeto al testimonio fragmentario del manuscrito
translation_notes:
  revision_awareness: 'La versión inglesa previa fue revisada porque interpretaba erróneamente la sintaxis copta como una serie de imperativos y una condición. La auditoría más reciente corrige esto: la primera cláusula es presente («you hear me»), la segunda contiene una nominalización («your calling of me») con un tramo truncado, la tercera conserva una negación perfecta («you did not hear»), y la última es una autoidentificación («I am the defense»). La presente propuesta sigue esa lectura revisada y evita introducir mandatos o condicionales no sustentados por el texto.'
  spanish_consistency_notes:
  - Se usa «Yo soy» para mantener la fórmula de autoidentificación característica del texto.
  - Se prefiere «defensa» sobre «apología» por naturalidad en español, sin perder el sentido del préstamo griego.
  - Se conserva la laguna con corchetes para respetar la fragmentación del manuscrito.
  - Se evita «SEÑOR» u otra terminología teológica ajena, ya que este segmento no la requiere.
