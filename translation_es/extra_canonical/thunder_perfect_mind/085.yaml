  yaml_path: translation/extra_canonical/thunder_perfect_mind/085.yaml
  text: 'Vision and self-control

    of the heart[a], existing within me—

    I am the hearing that is attainable to everyone[d][c][b],

    and the speech that cannot be grasped.'
  footnotes:
  - marker: a
    text: Some render the opening as “a lamp of the heart,” but the OCR here reads Greek loans ϩⲟⲣⲁⲥⲓⲥ (vision) and ⲧⲉⲅⲕⲣⲁⲧⲓⲁ (self-control).
    reason: lexical_alternative
  - marker: b
    text: The phrase translated “that is attainable” (ⲉⲧϣⲏⲡ) may mean “that is available/comes to,” expressing ease of access rather than human achievement.
    reason: lexical_alternative
  - marker: c
    text: “Cannot be grasped” could also be “cannot be comprehended,” since the verb can carry both physical and cognitive senses.
    reason: lexical_alternative
  - marker: d
    text: Or 'of the heart that is within me—'.
    reason: previous_rendering
