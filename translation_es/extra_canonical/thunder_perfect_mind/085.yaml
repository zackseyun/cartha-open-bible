translation:
  language: es
  text: 'Visión y autodominio[a]

    del corazón, que existen dentro de mí—

    soy el oído[b] que es accesible a todos,

    y el habla[c] que no puede ser aprehendida.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos traducen el inicio como «una lámpara del corazón», pero el copto aquí lee los préstamos griegos para «visión» y «autodominio».
    reason: textual_variant
  - marker: b
    text: «Accesible» también puede entenderse como «que llega» o «que está disponible», según el matiz del verbo copto.
    reason: lexical_alternative
  - marker: c
    text: «Aprehendida» conserva tanto el sentido de ser tomada físicamente como el de ser comprendida mentalmente.
    reason: lexical_alternative
lexical_decisions:
- source_word: ϩⲟⲣⲁⲥⲓⲥ
  english_pob_choice: vision
  chosen_spanish: Visión
  alternatives_spanish:
  - vista
  - ver
  lexicon: Préstamo griego en copto (horasis)
  rationale: «Visión» conserva el valor abstracto e interior del término y encaja con el paralelo conceptual del pasaje; «vista» sonarí​a más físico.
- source_word: ⲧⲉⲅⲕⲣⲁⲧⲓⲁ
  english_pob_choice: self-control
  chosen_spanish: autodominio
  alternatives_spanish:
  - autocontrol
  - templanza
  lexicon: Préstamo griego en copto (enkrateia)
  rationale: «Autodominio» comunica la idea de dominio de sí con tono digno y actual; evita el matiz moralizante o eclesiástico de «templanza».
- source_word: ⲙⲫⲏⲧ
  english_pob_choice: of the heart
  chosen_spanish: del corazón
  alternatives_spanish:
  - del alma
  - del interior
  lexicon: Copt. ⲫⲏⲧ = corazón; m- = genitivo/locativo
  rationale: Se mantiene la relación genitiva explícita con «del corazón», que es la forma más natural en español y conserva la imagen central.
- source_word: ⲉⲥϣⲟⲟⲡ
  english_pob_choice: existing
  chosen_spanish: que existen
  alternatives_spanish:
  - que está presente
  - que existe
  lexicon: Copt. ϣⲟⲟⲡ = ser, existir, estar presente
  rationale: El relativo femenino plural en el copto apunta a «visión» y «autodominio»; por eso el verbo va en plural en español.
- source_word: ⲛϩⲏⲧ ⲁⲛⲟⲕ
  english_pob_choice: within me
  chosen_spanish: dentro de mí
  alternatives_spanish:
  - en mí
  - dentro mío
  lexicon: Copt. ⲛϩⲏⲧ = dentro de / en; ⲁⲛⲟⲕ = yo
  rationale: «Dentro de mí» reproduce bien la relación espacial interior sin forzar una construcción extraña en español.
- source_word: ⲡⲥⲱⲧⲙ
  english_pob_choice: hearing
  chosen_spanish: el oído
  alternatives_spanish:
  - la audición
  - el escuchar
  lexicon: Copt. ⲥⲱⲧⲙ = oír; nominal ⲡⲥⲱⲧⲙ = hearing
  rationale: Aunque el inglés POB eligió «hearing», en español «el oído» es una nominalización natural y preserva la sensación de facultad/percepción receptiva del texto.
- source_word: ⲉⲧϣⲏⲡ
  english_pob_choice: attainable
  chosen_spanish: que es accesible
  alternatives_spanish:
  - que es alcanzable
  - que está al alcance
  lexicon: Contextual; tradición de Thunder; ϣⲏⲡ con matiz de facilidad/posibilidad/acceso
  rationale: «Accesible» expresa mejor la idea de disponibilidad sin sugerir esfuerzo humano, en línea con la nota inglesa de que la forma puede significar «comes to» o «is available».
- source_word: ⲛⲟⲩⲟⲛ ⲛⲓⲙ
  english_pob_choice: to everyone
  chosen_spanish: a todos
  alternatives_spanish:
  - para todos
  - a cada uno
  lexicon: Expresión copta de universalidad
  rationale: «A todos» conserva el alcance universal de la frase de manera breve y natural.
- source_word: ⲡϣⲁϫⲉ
  english_pob_choice: speech
  chosen_spanish: el habla
  alternatives_spanish:
  - la palabra
  - el discurso
  lexicon: Copt. ⲥⲁϫⲉ = hablar; ⲡϣⲁϫⲉ = speech/word
  rationale: «El habla» mantiene el paralelismo con «el oído» y evita reducir el término a una sola «palabra» aislada.
- source_word: ⲉⲧⲉ ⲙⲁⲧϣⲉ
  english_pob_choice: cannot be grasped
  chosen_spanish: no puede ser aprehendida
  alternatives_spanish:
  - no puede ser comprendida
  - no puede ser asida
  lexicon: Negación relativa; ϣⲉ con posible doble sentido físico/cognitivo
  rationale: «Aprehendida» conserva mejor la ambigüedad entre tomar con la mano y comprender con la mente, evitando una restricción semántica excesiva.
theological_decisions:
- issue: La cláusula relativa copta modifica los sustantivos femeninos anteriores, no «corazón»
  english_pob_reading: existing within me—
  chosen_spanish_reading: que existen dentro de mí—
  alternative_spanish_readings:
  - que está dentro de mí—
  - existiendo dentro de mí—
  rationale: El copto usa prefijo femenino plural, por lo que la relativa califica «visión» y «autodominio». El español se ajusta a esa sintaxis para no desplazar indebidamente el modificador al corazón.
  doctrine_reference: Gramática del copto sahídico; concordancia de género y número en relativas
- issue: Posible ambigüedad de ⲉⲧϣⲏⲡ entre accesibilidad y logro
  english_pob_reading: that is attainable
  chosen_spanish_reading: que es accesible
  alternative_spanish_readings:
  - que es alcanzable
  - que está al alcance
  rationale: La lectura elegida subraya disponibilidad y apertura universal, evitando sugerir que el oyente debe conquistar el acceso por sus propias fuerzas.
  doctrine_reference: Nota lexical sobre ϣⲏⲡ en la tradición de Thunder
- issue: ⲉⲧⲉ ⲙⲁⲧϣⲉ admite sentido físico y cognitivo
  english_pob_reading: cannot be grasped
  chosen_spanish_reading: no puede ser aprehendida
  alternative_spanish_readings:
  - no puede ser comprendida
  - no puede ser asida
  rationale: «Aprehendida» conserva la tensión entre agarrar y entender, que es importante en el tono paradoxal del texto.
  doctrine_reference: Ambigüedad semántica del verbo copto en contexto poético
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión que corrigió la dependencia sintáctica de la cláusula relativa: en el copto, el verbo relativo femenino plural no modifica «corazón», sino los sustantivos femeninos previos. Por eso el español evita ligar la relativa al corazón y la coloca con «Visión y autodominio».'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma de proyecto solo cuando correspondiera; este pasaje no la usa.
  - Se evitó «Cristo»/«Mesías» porque no aparecen en el segmento.
  - Se eligió un registro poético y publicable, pero sin suavizar la paradoja del texto.
  - No se usó «SEÑOR» ni terminología litúrgica ajena al copto del fragmento.
