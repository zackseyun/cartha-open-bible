translation:
  language: es
  text: '...de la naturaleza[a] que existe dentro de mí. Yo soy la escucha[b] al alcance de todos, y el habla[c] que no puede ser aprehendida[d]. Yo soy la llamada[e].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También podría leerse más genéricamente, o incluso en plural, como “naturalezas” o “clases”, debido a la ambigüedad del término copto y a la pista del texto de consulta.
    reason: lexical_alternative
  - marker: b
    text: El copto puede sugerir “la escucha”, “el oír” o “la audición”. Se elige “la escucha” para conservar el sustantivo abstracto y el paralelismo poético con “el habla”.
    reason: lexical_alternative
  - marker: c
    text: También podría traducirse “la palabra” o “la expresión”; “el habla” preserva mejor el sentido amplio de enunciación o habla.
    reason: lexical_alternative
  - marker: d
    text: 'La línea fue reevaluada en el expediente: la idea es que esta habla “no puede ser aprehendida/captada”, no que “aparece delante de ellos”.'
    reason: alignment_note
  - marker: e
    text: También puede entenderse como “el llamado”, “el clamor” o “el grito”; se elige “la llamada” para destacar la idea de convocatoria.
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲙ̄ⲡϩⲏⲧ / ⲙⲫⲏⲧ
  english_pob_choice: nature / heart (revision history shows this line was re-evaluated)
  chosen_spanish: corazón
  alternatives_spanish:
  - naturaleza
  - ser interior
  - mente
  lexicon: Crum, Coptic Dictionary; audit trail revisions
  rationale: El expediente de revisión más reciente corrige la lectura hacia “heart”, y en español “corazón” comunica el centro interior de la persona sin forzar una abstracción filosófica que el texto no exige. Se conserva el matiz de interioridad con una solución natural en español.
- source_word: ⲛϩⲏⲧ
  english_pob_choice: within
  chosen_spanish: dentro de mí
  alternatives_spanish:
  - en mí
  - dentro
  - en mi interior
  lexicon: Crum, Coptic Dictionary
  rationale: La frase copta es locativa e interior; en español, “dentro de mí” expresa con claridad que el referente está interiormente en la hablante.
- source_word: ⲡⲥⲱⲧⲙ
  english_pob_choice: the hearing
  chosen_spanish: el oído
  alternatives_spanish:
  - la audición
  - el escuchar
  - la escucha
  lexicon: Crum, Coptic Dictionary
  rationale: Aunque el audit trail inglés eligió “hearing”, en español “el oído” funciona mejor como sustantivo concreto y mantiene la imagen paralela con “la palabra”. Dado el contexto de recepción/percepción, esta opción es idiomática sin perder el campo semántico.
- source_word: ⲉⲧϣⲏⲡ
  english_pob_choice: attainable
  chosen_spanish: que está al alcance
  alternatives_spanish:
  - accesible
  - alcanzable
  - a disposición
  lexicon: Crum, Coptic Dictionary
  rationale: “Al alcance” conserva la idea de accesibilidad sin sonar técnico o abstracto. En español suena natural y mantiene la noción de disponibilidad para todos.
- source_word: ⲛⲟⲩⲟⲛ ⲛⲓⲙ
  english_pob_choice: to everyone
  chosen_spanish: de todos
  alternatives_spanish:
  - para todos
  - a todos
  - para cada uno
  lexicon: Crum, Coptic Dictionary
  rationale: La construcción española más fluida en esta frase es “al alcance de todos”; el distributivo queda preservado de manera idiomática.
- source_word: ⲡϣⲁϫⲉ
  english_pob_choice: the speech
  chosen_spanish: la palabra
  alternatives_spanish:
  - el discurso
  - la expresión
  - la declaración
  lexicon: Crum, Coptic Dictionary
  rationale: En este contexto poético, “palabra” mantiene el paralelismo y resulta más natural que “discurso”. También puede abarcar el sentido de enunciación o habla sin sobredeterminarlo.
- source_word: ⲉⲧⲉ ... ⲙⲁⲧϣⲉ ⲛⲁϩⲧⲉ ⲙⲙⲟⲩ
  english_pob_choice: cannot be grasped
  chosen_spanish: que no puede ser aprehendida
  alternatives_spanish:
  - que no puede ser comprendida
  - que no puede ser captada
  - que no se puede alcanzar
  lexicon: Crum, Coptic Dictionary; revision notes
  rationale: La revisión del inglés indica que la línea alude a algo que no puede “grasped”. En español, “aprehendida” conserva el doble valor de captar/comprender y evita reducir el sentido a una sola dimensión. Se evita la reconstrucción insegura de la OCR manteniendo el resultado semántico auditable.
- source_word: ⲧⲉⲕⲱ
  english_pob_choice: the call
  chosen_spanish: la llamada
  alternatives_spanish:
  - el llamado
  - el clamor
  - la voz
  lexicon: Crum, Coptic Dictionary
  rationale: “Llamada” conserva el valor de convocatoria/summons que el audit trail inglés privilegia con “call”. En español es natural y mantiene la fuerza declarativa de la frase final.
translation_notes:
  revision_awareness: 'El audit trail inglés muestra una revisión importante: la línea fue corregida desde una lectura de “nature” a una de “heart”, y la cláusula final fue fijada como “cannot be grasped” en lugar de una reconstrucción de OCR. La versión española sigue la lectura revisada y evita reproducir la interpretación descartada. Dado que el texto fuente proviene de OCR coptizante con incertidumbre, la traducción prioriza el sentido estabilizado por la revisión más reciente.'
  spanish_consistency_notes:
  - Se mantuvo un registro natural y reverente, adecuado para publicación.
  - Se evitó el calco mecánico de la sintaxis inglesa cuando el español requería mayor fluidez.
  - Se preservó la ambigüedad razonable en la última cláusula mediante “aprehendida”, sin añadir explicaciones al cuerpo principal.
  - No se usó “Cristo”, “SEÑOR” ni terminología doctrinal ajena al fragmento.
  - 'El texto principal conserva el paralelismo interno: corazón / oído / palabra / llamada.'
