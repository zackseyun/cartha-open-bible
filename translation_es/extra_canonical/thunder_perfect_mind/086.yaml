  text: '...of the nature that exists within me[a]. I am the hearing that is attainable to everyone, and the speech that cannot be grasped[f][e][d][c][b]. I am the call.'
  footnotes:
  - marker: a
    text: “nature” could also be read more generically or even as plural (“of natures/kinds”), given the consult hint and possible number ambiguity in ⲙⲫⲏⲧ.
    reason: lexical_alternative
  - marker: b
    text: ⲉⲧϣⲏⲡ can mean “within reach/accessible/fitting”; “attainable” is chosen for its active sense and cadence.
    reason: lexical_alternative
  - marker: c
    text: The verb ⲙⲁⲧϣⲉ here is uncertain; “appears” is a context-based choice coordinated with “before them.” Alternatives include “stands” or “is presented.”
    reason: alignment_note
  - marker: d
    text: ⲧⲉⲕⲱ may be “call” or “cry/shout.” “Call” foregrounds summons over mere loudness.
    reason: lexical_alternative
  - marker: e
    text: Or 'I am of the nature that exists within.'.
    reason: previous_rendering
  - marker: f
    text: Or 'and the speech that appears before them.'.
    reason: previous_rendering
