translation:
  language: es
  text: Yo soy aquella de quien ustedes se ocultaron[b][a], y se muestran ante mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El pronombre de objeto visible parece ser ⲉⲣⲱⲧⲛ (‘a ustedes’), lo que apoyaría la lectura alternativa ‘yo me aparezco a ustedes’. Esta traducción sigue el emparejamiento tradicional del bloque (‘ocultarse / mostrarse ante mí’), pero la dirección es incierta.
    reason: alternative_reading
  - marker: b
    text: El texto cercano lee ⲛⲛⲁⲙⲉⲗⲟⲥ ϩⲛ ⲧⲏⲩⲧⲛ (‘los miembros dentro de ustedes’), lo que sugiere que material adyacente puede haberse entrometido en este segmento; el elemento ‘ocultarse’ podría pertenecer a la línea anterior o siguiente.
    reason: alignment_note
lexical_decisions:
- source_word: ⲟⲩⲟⲉⲓⲉ
  english_pob_choice: show yourselves
  chosen_spanish: se muestran
  alternatives_spanish:
  - aparecen
  - se dejan ver
  lexicon: Crum; uso sahídico común para ‘aparecer / ser visto’
  rationale: En español, ‘se muestran’ conserva la direccionalidad visible del movimiento hacia el hablante y evita una paráfrasis excesiva. ‘Aparecen’ también sería posible, pero ‘se muestran’ mantiene mejor el paralelismo con ‘se ocultaron’.
- source_word: ϩⲟⲩⲛ
  english_pob_choice: to me / to you (direction marker)
  chosen_spanish: ante mí
  alternatives_spanish:
  - a mí
  - delante de mí
  - en mi presencia
  lexicon: Crum; uso direccional con verbos de ver/aparecer
  rationale: ‘Ante mí’ expresa con naturalidad la orientación visual/relacional del verbo sin convertirlo en una simple preposición de dativo. Preserva la tensión de ‘ocultarse / mostrarse’.
- source_word: ⲉⲣⲟⲓ / ⲉⲣⲱⲧⲛ (object pronoun)
  english_pob_choice: to me / to you (direction marker)
  chosen_spanish: a ustedes
  alternatives_spanish:
  - ante ustedes
  - para ustedes
  lexicon: Serie estándar de pronombres de objeto en sahídico
  rationale: El testimonio inglés señala una posible inversión entre ‘to me’ y ‘to you’; por eso el español refleja el sujeto plural explícito ‘ustedes’ en la primera cláusula y la relación direccional en la segunda sin forzar una reconstrucción textual más allá del apoyo disponible.
- source_word: '[concealment motif; no clear lexeme in snippet]'
  english_pob_choice: hid yourselves
  chosen_spanish: se ocultaron
  alternatives_spanish:
  - se escondieron
  - se mantuvieron ocultos
  lexicon: —
  rationale: Como el verbo específico no es legible en este tramo, se traduce el motivo lexicalmente seguro de ocultamiento con un reflexivo natural en español. ‘Se ocultaron’ mantiene la reciprocidad y el tono paradojal del pasaje.
