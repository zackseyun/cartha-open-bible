  revision_awareness: Se siguió el testimonio inglés auditado, que conserva la tensión paradojal ‘ocultarse / mostrarse’ y marca una posible inversión del destinatario. No se suavizó la ambigüedad textual porque el OCR coptico y la alineación del bloque son solo de confianza media.
