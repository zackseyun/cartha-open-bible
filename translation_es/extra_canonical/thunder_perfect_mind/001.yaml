    rationale: El inglés POB dice "I was found" y el copto documentado aquí no exige marcar femenino en español. Usar femenino añade una interpretación no justificada por la evidencia inmediata.
  - severity: medium
    issue: 'La nota y alternativas de la segunda cláusula usan también femenino: "fui escuchada".'
    rationale: Mismo problema de sobreinterpretación de género; la variante textual debe expresarse de forma no marcada o sin imponer femenino.
