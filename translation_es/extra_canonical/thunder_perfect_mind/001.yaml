translation:
  language: es
  text: 'Trueno, Mente Perfecta.


    Fui enviado[a] desde el Poder,

    y he venido[b] a los que meditan en mí,

    y fui hallada[c] entre los que me buscan.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La forma copta y el testimonio editorial permiten entender aquí un envío “desde” el Poder; el matiz de salida/forth se conserva implícitamente en el verbo.
    reason: source_note
  - marker: b
    text: El OCR del códice sugiere una lectura alternativa relacionada con “oír” en lugar de “venir”; el texto impreso seguido por el POB entiende la línea como “he venido”.
    reason: textual_variant
  - marker: c
    text: 'La frase copta admite varias voces: “fui hallada”, “me hallé” o “me encontraron”. Se elige la pasiva para mantener el paralelismo con las líneas anteriores.'
    reason: alternative_reading
lexical_decisions:
- source_word: ⲧⲃⲣⲟⲛⲧⲏ
  english_pob_choice: Thunder
  chosen_spanish: Trueno
  alternatives_spanish:
  - El Trueno
  lexicon: Crum, Coptic Dictionary; préstamo griego de βροντή
  rationale: En un título, “Trueno” conserva el valor nominal y la extrañeza poética del original sin sobrecargar el español con artículo innecesario.
- source_word: ⲛⲟⲩⲥ
  english_pob_choice: Mind
  chosen_spanish: Mente
  alternatives_spanish:
  - Intelecto
  - Mente
  lexicon: Greek νοῦς
  rationale: “Mente” es natural en español y mantiene la fuerza epitética del título; “intelecto” sería más técnico y menos directo.
- source_word: ⲛⲧⲉⲗⲉⲓⲟⲥ
  english_pob_choice: Perfect
  chosen_spanish: Perfecta
  alternatives_spanish:
  - Completa
  - Entera
  lexicon: Greek τέλειος
  rationale: Se conserva el sentido adjetival y se ajusta al femenino por concordancia con “Mente” en el título.
- source_word: ⲧⲁⲛⲧⲁⲟⲩⲟⲉⲓ ... ⲉⲃⲟⲗ
  english_pob_choice: I was sent forth
  chosen_spanish: Fui enviado[a]
  alternatives_spanish:
  - Fui enviado fuera
  - Salí enviado
  lexicon: Layton, Coptic Grammar; Crum s.v. ⲟⲩⲟⲉⲓ/ⲧⲁⲟⲩⲟⲉⲓ; ⲉⲃⲟⲗ = fuera, hacia afuera
  rationale: El español expresa mejor la direccionalidad con “fui enviado”; la nota marca que el original tiene un matiz de salida/fuera, reflejado en la tradición inglesa como “sent forth”.
- source_word: (implied) ⲛⲧⲉ ⲧⲉ ⲇⲩⲛⲁⲙⲓⲥ
  english_pob_choice: from the Power
  chosen_spanish: desde el Poder
  alternatives_spanish:
  - de el Poder
  - desde la Potencia
  lexicon: Greek δύναμις (loanword in Coptic)
  rationale: “Poder” conserva la capitalización titular y la resonancia abstracta/divina del sustantivo; “desde” reproduce mejor el punto de procedencia que un simple “de”.
- source_word: ⲙⲉⲉⲩⲉ ⲉⲣⲟⲓ
  english_pob_choice: meditate on me
  chosen_spanish: meditan en mí
  alternatives_spanish:
  - meditan sobre mí
  - piensan en mí
  - reflexionan sobre mí
  lexicon: Crum s.v. ⲙⲉⲉⲩⲉ
  rationale: “Meditar en” es idiomático y conserva el tono contemplativo; en español bíblico/espiritual suena natural sin perder el contenido reflexivo.
- source_word: ⲛⲧⲁⲓⲥⲱⲧⲙ (OCR) / ⲛⲧⲁⲓⲉⲓ (expected)
  english_pob_choice: I have come
  chosen_spanish: he venido
  alternatives_spanish:
  - fui escuchada
  - he llegado
  lexicon: Crum s.v. ⲉⲓ (come), ⲥⲱⲧⲙ (hear)
  rationale: Se mantiene la lectura preferida por la tradición editorial (“he venido”), mientras el marcador permite reconocer que el OCR sugiere una alternativa distinta en el testimonio facsimilar.
- source_word: ⲁⲓϭⲓⲛⲉ ⲙⲙⲟⲓ ϩⲛ ⲛⲉⲧϣⲓⲛⲉ ⲛⲥⲱⲓ
  english_pob_choice: I was found among those who seek me
  chosen_spanish: fui hallada
  alternatives_spanish:
  - me hallé
  - fui encontrada
  - me encontraron
  lexicon: Crum s.v. ϭⲓⲛⲉ (find), ϣⲓⲛⲉ (seek)
  rationale: “Fui hallada” preserva la lectura pasiva/sufrida que el inglés POB privilegia y encaja con la simetría de las cláusulas; “hallada” también mantiene una cadencia literaria en español.
theological_decisions:
- issue: Capitalización de “Poder” como designación titular
  english_pob_reading: “Power” likely renders a titular δύναμις; article not visible in OCR slice.
  chosen_spanish_reading: “el Poder”/“Poder” con mayúscula inicial como designación personal/titular, no como mera potencia abstracta.
  alternative_spanish_readings:
  - poder
  - la fuerza
  - la Potencia
  rationale: Dado el audit trail, la mayúscula ayuda a conservar el carácter casi personificado/titular del término sin imponer una interpretación doctrinal ajena al texto.
  doctrine_reference: Coptic/Greek title usage; no doctrinal claim beyond the source wording.
- issue: Ambigüedad textual en la segunda cláusula (venir o ser oído)
  english_pob_reading: Most editions read “I came”; OCR shows ⲥⲱⲧⲙ (“I was heard”).
  chosen_spanish_reading: “he venido”, con nota de variante para la lectura “fui oída”/“fui escuchada” si se confirma ⲥⲱⲧⲙ.
  alternative_spanish_readings:
  - fui escuchada
  - y fui oída por los que meditan en mí
  rationale: La tradición editorial favorece la lectura de venir; sin embargo, la variante se conserva explícitamente para no borrar la tensión textual documentada.
  doctrine_reference: Crítica textual del testimonio copto; no doctrina.
- issue: Voz de la tercera cláusula (hallada/fue hallada/se halló)
  english_pob_reading: “I was found” chosen for cadence and symmetry; alternatives acknowledged.
  chosen_spanish_reading: “fui hallada”
  alternative_spanish_readings:
  - me hallé
  - fue hallada por mí
  - me encontraron
  rationale: La pasiva refleja o directa en español podría oscurecer la simetría con las dos cláusulas anteriores; “fui hallada” conserva mejor la recepción pasiva implícita.
  doctrine_reference: Sintaxis y aspectualidad del copto; no doctrina.
translation_notes:
  revision_awareness: Se siguió el testimonio fuente copto con apoyo del audit trail inglés. No se introdujeron cambios mayores respecto de la lectura editorial preferida; se preservaron las variantes relevantes del OCR y la ambigüedad de voz/lectura en notas.
  spanish_consistency_notes:
  - Se prefirió “Mente” para νοῦς y “Poder” para δύναμις, manteniendo mayúscula cuando el contexto sugiere título.
  - Se mantuvo un estilo sobrio y litúrgicamente legible, evitando calcos innecesarios.
  - Se conservó la pasiva en la tercera línea para no perder la simetría retórica del fragmento.
  - El título se dejó sin artículo para seguir la concisión del original y del POB inglés.
