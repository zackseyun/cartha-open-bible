  yaml_path: translation/extra_canonical/thunder_perfect_mind/001.yaml
  text: 'Thunder, Perfect Mind.


    I was sent forth from the Power[a],

    and I have come[b] to those who meditate on me,

    and I was found[c] among those who seek me.'
  footnotes:
  - marker: a
    text: “Power” likely renders Greek δύναμις (loanword in Coptic). The article is not visible in this OCR slice; “from the Power” is inferred from standard witnesses.
    reason: alignment_note
  - marker: b
    text: OCR shows ⲛⲧⲁⲓⲥⲱⲧⲙ (“I was heard”). Many editions read ⲛⲧⲁⲓⲉⲓ (“I came”). If ⲥⲱⲧⲙ is confirmed, this line could read “and I was heard by those who meditate on me.”
    reason: alternative_reading
  - marker: c
    text: The Coptic ⲁⲓϭⲓⲛⲉ ⲙⲙⲟⲓ can be construed as “I found myself,” “I was found,” or “they found me.” We choose “was found” for cadence and symmetry.
    reason: alternative_reading
