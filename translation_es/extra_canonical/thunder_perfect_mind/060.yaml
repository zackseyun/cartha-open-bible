  yaml_path: translation/extra_canonical/thunder_perfect_mind/060.yaml
  text: 'But out of shame, receive me to yourselves in shamelessness;

    and out of shamelessness and shame, reprove my members among yourselves;

    and approach yourselves.'
  footnotes:
