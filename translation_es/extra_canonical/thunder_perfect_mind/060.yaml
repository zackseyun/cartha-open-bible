    reason: alignment_note
  - marker: b
    text: The sequence ⲛⲛⲁⲙⲉⲗⲟⲥ ϩⲛⲧⲏⲩⲧⲛ may be read “(among) your members/limbs,” yielding a possible expansion like “I am among your members.” The placement within this line-block is uncertain.
