translation:
  language: es
  text: 'Pero por vergüenza, recíbeme para vosotros en desvergüenza;

    y por desvergüenza y vergüenza, reprended[a] mis miembros entre vosotros;

    y acercaos a vosotros mismos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «reprended también mis miembros»; el sentido exacto de la cláusula es incierto en el testimonio alineado.'
    reason: textual_variant
lexical_decisions:
- source_word: ϣⲟⲡⲧ
  english_pob_choice: receive me
  chosen_spanish: recíbeme
  alternatives_spanish:
  - acogedme
  - recibidme
  lexicon: Crum; Layton
  rationale: El contexto revisado muestra que se trata de un imperativo, no de un verbo de ‘despreciar’. En español, «recíbeme» expresa bien la acción directa de admitir o acoger al hablante.
- source_word: ϩⲛⲟⲩϣⲓⲡⲉ
  english_pob_choice: out of shame
  chosen_spanish: por vergüenza
  alternatives_spanish:
  - desde la vergüenza
  - a causa de la vergüenza
  lexicon: Crum; Layton
  rationale: La preposición y el sustantivo indican una fuente o motivo. «Por vergüenza» es natural en español y conserva el valor causal sin añadir interpretación extra.
- source_word: ϩⲛⲟⲩⲙⲛⲧⲁⲧϣⲓⲡⲉ
  english_pob_choice: in shamelessness
  chosen_spanish: en desvergüenza
  alternatives_spanish:
  - con desvergüenza
  - en falta de vergüenza
  lexicon: Crum; Layton
  rationale: El nominal privativo se rinde de forma transparente como «desvergüenza», que conserva el contraste con «vergüenza» en el mismo verso.
- source_word: ϫⲡⲓⲟ
  english_pob_choice: reprove
  chosen_spanish: reprended
  alternatives_spanish:
  - reprendedles
  - amonedestad
  lexicon: Crum; Layton
  rationale: El imperativo pide una acción correctiva. «Reprended» transmite la fuerza de censurar/corregir sin suavizar el verbo.
- source_word: ⲙⲉⲗⲟⲥ / ⲛⲛⲁⲙⲉⲗⲟⲥ
  english_pob_choice: members/limbs
  chosen_spanish: miembros
  alternatives_spanish:
  - miembros del cuerpo
  - extremidades
  lexicon: Crum; Layton
  rationale: «Miembros» es el equivalente más directo y mantiene la posible ambigüedad entre partes corporales y miembros como conjunto humano, sin forzar una explicación.
- source_word: ϩⲛⲧⲏⲩⲧⲛ
  english_pob_choice: among yourselves
  chosen_spanish: entre vosotros
  alternatives_spanish:
  - en medio de vosotros
  - unos a otros
  lexicon: Crum
  rationale: La frase locativa se expresa de modo natural en español con «entre vosotros», que conserva el sentido recíproco/comunitario.
- source_word: ⲛⲧⲉⲧⲛⲧⲡⲉ ⲧⲛⲟⲩⲟⲉⲓⲉ ϩⲟⲩⲛ ⲉⲣⲱⲧⲛ
  english_pob_choice: approach yourselves
  chosen_spanish: acercaos a vosotros mismos
  alternatives_spanish:
  - acercaos dentro de vosotros mismos
  - volvéos hacia vosotros mismos
  lexicon: Crum; Layton
  rationale: La revisión del audit trail indica un idiomatismo de acercarse/volverse hacia sí. «Acercaos a vosotros mismos» conserva la estructura reflexiva sin sobreinterpretar el Coptic.
- source_word: ϭⲉ
  english_pob_choice: indeed (untranslated)
  chosen_spanish: Pero
  alternatives_spanish:
  - Pues
  - Entonces
  lexicon: Layton
  rationale: La partícula discursiva se expresa de forma natural con una transición adversativa suave. «Pero» enlaza con el tono exhortativo del bloque anterior.
theological_decisions:
- issue: Tono de exhortación y posible paradoja shame/honor
  english_pob_reading: The line is an imperative sequence using shame/deshame language; the earlier alignment note about honor/contempt remains possible but is not made explicit in the main line.
  chosen_spanish_reading: Mantener el par vergüenza/desvergüenza sin explicitar ‘honor/contempt’ en el texto principal.
  alternative_spanish_readings:
  - Por honor, recíbeme…
  - por deshonra, recíbeme…
  rationale: El material revisado no exige introducir ‘honor’ en la línea principal. En español, «vergüenza/desvergüenza» conserva la antítesis ya segura, mientras que «honor» quedaría como conjetura de alineación.
  doctrine_reference: 'Principio de cautela textual: no elevar una nota de alineación incierta a lectura principal.'
translation_notes:
  revision_awareness: 'La versión inglesa anterior estaba gravemente mal alineada: introducía un ‘I am’ inexistente y convertía imperativos en enunciado. El audit trail revisado corrige la sintaxis como una secuencia de imperativos y una cláusula conjuntiva, por lo que el español sigue esa lectura y evita reproducir la mala alineación.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» fuera de esta unidad porque no aparece en el fragmento.
  - «Desvergüenza» se usa como privativo natural de «vergüenza», coherente con el patrón POB de preservar antítesis léxicas.
  - Se evita ‘Cristo’, ‘SEÑOR’ o vocabulario litúrgico no presente en el texto.
  - El registro es solemne pero no arcaizante, adecuado para lectura pública.
