review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue en lo esencial la secuencia imperativa del copto ya corregida en el audit trail inglés: recibir, reprender y acercarse. Conserva además la antítesis «vergüenza / desvergüenza». Sin embargo, hay dos problemas de fidelidad/forma: «para vosotros» no refleja bien «to yourselves / among yourselves» y suena poco natural; «por desvergüenza y vergüenza» también suena forzado, mejor con artículo para expresar los sustantivos abstractos en español. La nota actual sobre «reprended también mis miembros» no corresponde al aparato inglés, que habla más bien de incertidumbre sobre «mis miembros / entre vosotros».'
  spanish_quality_summary: 'El texto es legible, pero tiene giros poco idiomáticos para español eclesial neutral: «para vosotros» debería ser «entre vosotros» o «a vosotros mismos» según la cláusula; «en desvergüenza» es posible pero áspero, aunque aceptable por paralelismo. «Acercaos a vosotros mismos» es comprensible y conserva el carácter extraño del original. Conviene además alinear la nota con la incertidumbre real documentada.'
  glossary_alignment: 'No hay conflictos con la terminología doctrinal principal del proyecto. Las decisiones léxicas clave son razonables: ϣⲟⲡⲧ → «recíbeme», ϫⲡⲓⲟ → «reprended», ⲙⲉⲗⲟⲥ → «miembros». La pareja ϣⲓⲡⲉ / ⲙⲛⲧⲁⲧϣⲓⲡⲉ se preserva bien como «vergüenza / desvergüenza», aunque en español requiere leve ajuste sintáctico para sonar natural.'
  issues:
  - severity: medium
    issue: «recíbeme para vosotros» es poco natural y no representa bien el valor reflexivo/comunitario
    rationale: El inglés auditado tiene «receive me to yourselves». En español «para vosotros» introduce finalidad/beneficio, no incorporación al propio grupo. «entre vosotros» o «a vosotros mismos» refleja mejor el sentido sin falsearlo.
  - severity: low
    issue: La secuencia «por desvergüenza y vergüenza» suena antinatural
    rationale: 'En español los abstractos paralelos se expresan mejor con artículo: «por la desvergüenza y la vergüenza». Esto mejora la legibilidad sin alterar el sentido.'
  - severity: medium
    issue: La nota al pie no coincide con la incertidumbre documentada en el audit trail
    rationale: La nota inglesa b trata la posible lectura/ubicación de «miembros entre vosotros», no una variante «también». La nota española actual introduce una alternativa no apoyada por la evidencia suministrada.
  revised_spanish_text: 'Pero por vergüenza, recíbeme entre vosotros en desvergüenza;


    y por la desvergüenza y la vergüenza, reprended mis miembros entre vosotros[a];


    y acercaos a vosotros mismos.'
  revised_footnotes:
  - marker: a
    text: O posiblemente «mis miembros/miembros entre vosotros»; la ubicación exacta de esta expresión en la cláusula es incierta en el testimonio alineado.
    reason: alignment_note
  revision_rationale: 'Se hacen reparaciones menores para mejorar fidelidad e idiomaticidad: «entre vosotros» sustituye a «para vosotros» para reflejar mejor el valor comunitario/reflexivo; se suaviza la coordinación de abstractos con artículos; y la nota se corrige para corresponder a la incertidumbre real documentada sobre «mis miembros … entre vosotros». No hace falta nueva adjudicación mayor.'
