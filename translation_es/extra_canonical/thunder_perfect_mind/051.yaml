translation:
  language: es
  text: 'Y yo soy la que tiene muchas fiestas[a]. Yo, yo soy una sin Dios,

    y yo soy la que tiene a su Dios grande.

    Yo soy la que ustedes han ponderado,

    y ustedes me han despreciado.

    Yo soy una no instruida[b],

    y ellos aprenden.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase coptizante es oscura en el testimonio y el audit trail inglés la entiende como una construcción relativa del tipo “la que tiene muchas fiestas”; el sentido exacto del OCR es incierto, pero el paralelismo exige una lectura posesiva.
    reason: source_note
  - marker: b
    text: También podría leerse “no enseñada” o “sin instrucción”; el coptico usado aquí contrasta con “ellos aprenden”.
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲧⲉⲛϣⲉⲛⲉⲥⲱⲥ / ⲧⲉ ⲛⲁϣⲉ
  english_pob_choice: she whose festivals are many / she whose God is great
  chosen_spanish: la que tiene muchas fiestas / la que tiene a su Dios grande
  alternatives_spanish:
  - la de muchas fiestas
  - la que es de muchas fiestas
  - la que tiene gran fiesta
  - la que tiene a su Dios grande
  lexicon: Crum, Coptic Dictionary
  rationale: 'El Coptic OCR aquí parece corrupto, pero el audit trail inglés corrige el sentido como una construcción relativa con valor posesivo: ''she whose festivals are many'' y luego ''she whose God is great''. En español, ''la que tiene muchas fiestas'' conserva la relación posesiva sin forzar un sustantivo inexistente; ''tiene a su Dios grande'' mantiene la paralela tensión entre ''sin Dios'' y ''su Dios grande''.'
- source_word: ⲟⲩⲁⲧⲛⲟⲩⲧⲉ
  english_pob_choice: a godless one
  chosen_spanish: una sin Dios
  alternatives_spanish:
  - una sin dios
  - una impía
  - una sin divinidad
  lexicon: Crum, Coptic Dictionary
  rationale: El inglés POB eligió 'godless' para preservar el contraste paradojal con la línea siguiente. En español, 'sin Dios' es natural y conserva esa tensión sin cargarla con matices modernos de 'atea'.
- source_word: ⲡⲉⲥⲛⲟⲩⲧⲉ
  english_pob_choice: her God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su dios
  - Dios de ella
  lexicon: Crum, Coptic Dictionary
  rationale: El posesivo coptizante se rinde de forma natural como 'su Dios'; la mayúscula refleja la referencia divina del contexto, manteniendo el juego retórico con 'sin Dios'.
- source_word: ⲙⲉⲉⲩⲉ ⲉⲣⲟⲓ
  english_pob_choice: pondered
  chosen_spanish: han ponderado
  alternatives_spanish:
  - han pensado en mí
  - han considerado
  - han meditado sobre mí
  lexicon: Crum, Coptic Dictionary
  rationale: '''Ponderar'' mantiene el tono reflexivo y deliberativo del discurso, y corresponde al inglés auditado sin añadir una perífrasis innecesaria.'
- source_word: ϣⲟⲥⲧ
  english_pob_choice: scorned / despised / rejected
  chosen_spanish: han despreciado
  alternatives_spanish:
  - han escarnecido
  - han desdeñado
  - me han rechazado
  lexicon: Crum, Coptic Dictionary
  rationale: La revisión inglesa corrige la lectura errónea de 'ashamed' y establece el valor léxico 'to scorn, despise, reject'. En español, 'despreciar' comunica bien ese campo semántico y evita introducir una idea de vergüenza no presente.
- source_word: ⲁⲧⲥⲃⲱ
  english_pob_choice: unlearned
  chosen_spanish: una no instruida
  alternatives_spanish:
  - una sin instrucción
  - una ignorante
  - una no enseñada
  lexicon: Crum, Coptic Dictionary
  rationale: '''Unlearned'' se puede volver ''no instruida'' en español para conservar el paralelismo con ''aprenden'' y evitar el tono más duro o evaluativo de ''ignorante''.'
- source_word: ϫⲓⲥⲃⲱ ⲉⲃⲟⲗ
  english_pob_choice: learn
  chosen_spanish: aprenden
  alternatives_spanish:
  - reciben instrucción
  - aprenden plenamente
  - aprenden de verdad
  lexicon: Crum, Coptic Dictionary
  rationale: La expresión idiomática coptizante significa 'aprender'; 'aprenden' es la forma más clara y fiel, sin sobretraducir el posible matiz aspectual de ⲉⲃⲟⲗ.
theological_decisions:
- issue: Paradoja retórica entre 'sin Dios' y 'su Dios grande'
  english_pob_reading: a godless one / whose God is great
  chosen_spanish_reading: una sin Dios / la que tiene a su Dios grande
  alternative_spanish_readings:
  - una atea / cuya Dios es grande
  - una impía / la que tiene a su Dios grande
  - una sin Dios / cuya Dios es grande
  rationale: 'El texto depende de una tensión deliberadamente paradójica. En español conviene mantenerla sin domesticarla: ''sin Dios'' conserva la negación privativa, y la línea siguiente responde con la afirmación posesiva. Se evita ''atea'' por su carga moderna y ''impía'' por una coloración moral más explícita que el coptizante ''godless''.'
  doctrine_reference: Poética de inversión paradójica en literatura tardoantigua; no es una confesión doctrinal sistemática.
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés ya corregido por revisión: se incorporó la primera línea omitida en el borrador previo, se mantuvo el contraste ''sin Dios / su Dios grande'', se corrigió la línea de ''despreciar'' frente a la falsa lectura de ''avergonzarse'', y se preservó el valor idiomático de ''aprender''.'
  spanish_consistency_notes:
  - Se mantiene 'Dios' con mayúscula en la posesión divina y 'sin Dios' como fórmula retórica.
  - Se evita 'Cristo' u otra terminología no pertinente al pasaje.
  - El orden breve y repetitivo de los versos se conserva para reflejar la cadencia original.
  - La nota a pie sobre el primer hemistiquio es necesaria porque el OCR/correspondencia es incierto y el paralelismo guía la traducción.
