base_translation:
  language: en
  yaml_path: translation/extra_canonical/thunder_perfect_mind/051.yaml
  text: 'And I am she whose festivals are many[a]. I, I am a godless one,

    and I am she whose God is great.

    I am the one you have pondered,

    and you have scorned me.

    I am an unlearned one[f][e][d][c][b],

    and they learn.'
  footnotes:
  - marker: a
    text: The Coptic phrase “I am the maiden—her God” is syntactically elliptical and is often taken as a relative construction, ‘I am the one whose God …,’ with some witnesses supplying ‘is great.’ The present text does not securely show an adjective.
    reason: alignment_note
  - marker: b
    text: ϫⲓⲥⲃⲱ ⲉⲃⲟⲗ literally ‘take-teaching out,’ an idiom for ‘learn’; the particle ⲉⲃⲟⲗ can intensify or mark completion and is not directly carried over into English here.
    reason: lexical_alternative
  - marker: c
    text: Or 'And I—I am a godless one,'.
    reason: previous_rendering
  - marker: d
    text: Or 'and I am the maiden—her God.'.
    reason: previous_rendering
  - marker: e
    text: Or 'and you were not ashamed.'.
    reason: previous_rendering
  - marker: f
    text: Or 'the one you have pondered about me,'.
    reason: previous_rendering
