translation:
  language: es
  text: 'Soy el oír que es aceptable para todos[a],

    y soy la palabra que [ha de decirse][b].

    Créanles: soy su [llamado][c] para hablar, y grande es

    el silencio de la palabra—escúchenme en ira[d], y de [...]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la escucha» o «el escuchar»; el coptico nombra aquí la facultad/acto de oír.'
    reason: lexical_alternative
  - marker: b
    text: El segmento coptico es incierto; el inglés POB lo vertió cautelosamente como «[to be spoken]».
    reason: source_note
  - marker: c
    text: La lectura de este miembro es opaca en el OCR. El inglés POB tomó «call» como una solución temática cautelosa; podrían imaginarse otras lecturas como «voz» o «clamor».
    reason: source_note
  - marker: d
    text: El término coptico corresponde a «ira» o «enojo», no a «voz alta».
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲡⲥⲱⲧⲙ
  english_pob_choice: the hearing
  chosen_spanish: el oír
  alternatives_spanish:
  - la escucha
  - el escuchar
  lexicon: Crum; general Sahidic usage
  rationale: El sustantivo verbal apunta a la acción/facultad de oír más que a una noción doctrinal; en español, 'el oír' conserva la forma nominal y el paralelismo con 'la palabra' sin endurecer el sentido.
- source_word: ⲉⲧϣⲏⲡ
  english_pob_choice: acceptable to everyone
  chosen_spanish: aceptable para todos
  alternatives_spanish:
  - recibido por todos
  - aprobado por todos
  lexicon: Crum; revision pass
  rationale: La revisión del POB inglés corrigió la lectura errónea de 'first' y estableció el valor de 'acceptable/received'. En español, 'aceptable para todos' refleja esa decisión y mantiene la amplitud del giro idiomático de ⲛⲟⲩⲟⲛ ⲛⲓⲙ.
- source_word: ⲛⲟⲩⲟⲛ ⲛⲓⲙ
  english_pob_choice: everyone
  chosen_spanish: todos
  alternatives_spanish:
  - todo el mundo
  - cada uno
  lexicon: Coptic idiom
  rationale: La expresión idiomática coptica corresponde naturalmente a 'todos'; evita una traducción más pesada y conserva el alcance universal.
- source_word: ⲡϣⲁϫⲉ
  english_pob_choice: the speech / the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el discurso
  - la habla
  lexicon: Crum
  rationale: '''Palabra'' es la solución más natural en español para el paralelo con ''oír'' y para la densidad proverbial del fragmento, sin perder el valor discursivo del término.'
- source_word: ⲉⲧⲉ ⲙⲁⲧϣⲉ
  english_pob_choice: '[to be spoken]'
  chosen_spanish: '[ha de decirse]'
  alternatives_spanish:
  - '[debe decirse]'
  - '[ha de pedirse]'
  lexicon: Context + paleographic uncertainty
  rationale: La secuencia es incierta; en español, 'ha de decirse' conserva el matiz prospectivo/pasivo con una forma idiomática y cautelosa. Se preserva la incertidumbre mediante corchetes.
- source_word: ⲛⲁϩⲧⲉ
  english_pob_choice: believe
  chosen_spanish: créanles
  alternatives_spanish:
  - confíen en ellos
  - créannos
  lexicon: Crum; review correction
  rationale: La revisión del POB corrigió la lectura desde una preposición errónea a un verbo de creer/confiar. En español, el imperativo plural encaja con el tono exhortativo de la línea y con el referente plural implícito por el contexto auditivo.
- source_word: ⲧⲉⲕⲱ
  english_pob_choice: your [call]
  chosen_spanish: su [llamado]
  alternatives_spanish:
  - tu [llamado]
  - su [voz]
  - su [clamor]
  lexicon: Alignment + OCR-ambiguity note
  rationale: El segmento es opaco en el OCR. 'Llamado' mantiene la línea temática del capítulo y funciona como solución cautelosa; se conserva el corchete para señalar la incertidumbre. Se usa 'su' por la apelación plural del contexto inmediato.
- source_word: ⲉⲙⲁϣⲁϫⲉ
  english_pob_choice: for speaking
  chosen_spanish: para hablar
  alternatives_spanish:
  - para decir
  - con el fin de hablar
  lexicon: Crum (purpose construction)
  rationale: La construcción de propósito se vierte de modo natural en español como 'para hablar', preservando el sentido final sin excesiva literalidad.
- source_word: ⲧⲙⲛⲧϩⲁⲗⲏ ⲛϣⲁϫⲉ
  english_pob_choice: the silence of speech
  chosen_spanish: el silencio de la palabra
  alternatives_spanish:
  - el silencio del habla
  - el silencio de la palabra hablada
  lexicon: Crum
  rationale: Se conserva la paradoja del genitivo con una formulación fluida. 'Palabra' enlaza con la línea anterior y mantiene el contraste retórico con 'oír'.
- source_word: ⲉⲣⲟⲉⲓ ϩⲛ ⲟⲩϭⲱⲛ
  english_pob_choice: listen to me in anger
  chosen_spanish: escúchenme en ira
  alternatives_spanish:
  - escúchenme con ira
  - óiganme en ira
  lexicon: Crum; review correction
  rationale: La revisión indicó que ϭⲱⲛ corresponde a 'ira/ira-enojo'. En español, 'en ira' conserva la preposición breve y extraña del original, manteniendo la tensión poética sin suavizarla.
translation_notes:
  revision_awareness: 'La versión inglesa auditada pasó por una corrección importante: ⲉⲧϣⲏⲡ no significa «first» sino «acceptable/received», ⲛⲁϩⲧⲉ es «believe/trust», ⲛⲁϣⲉ no son «ears», y ϭⲱⲛ significa «anger/wrath». La redacción española se ajusta a esas revisiones y conserva la cautela del texto donde el OCR sigue incierto.'
  spanish_consistency_notes:
  - Se mantuvo el paralelismo oír/palabra como eje estilístico.
  - Se evitó 'Señor'/'Cristo' porque no aparecen en este segmento.
  - Se preservaron corchetes en los pasajes inciertos para señalar lectura provisional.
  - '''Ira'' se mantuvo para ϭⲱⲛ por fidelidad al estado revisado del audit trail.'
