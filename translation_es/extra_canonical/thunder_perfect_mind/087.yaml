  text: 'I am the hearing that is acceptable to everyone[a],

    and I am the speech that is [to be spoken][b].

    Believe them: I am your [call][c] for speaking, and great is

    the silence of speech—listen to me in anger[a][d][c][b], and of [...] [d]'
