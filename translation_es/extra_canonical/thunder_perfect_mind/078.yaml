translation:
  language: es
  text: 'Los que existen fuera de mi asociación no me conocen[a],

    y los que existen en mi sustancia son los que me conocen.

    Los que están cerca de mí no me han conocido,

    y los que están lejos de mí son los que me han conocido.

    En el día en que estoy cerca de ti, tú estás lejos de mí,

    y en el día en que tú estás cerca de mí, yo estoy lejos de ti.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ⲥⲩⲛⲟⲩⲥⲓⲁ puede significar ‘estar con, asociación, compañía’; según el contexto también se traduce como ‘consejo’ o ‘conocimiento’.
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲥⲩⲛⲟⲩⲥⲓⲁ
  english_pob_choice: association / in my presence
  chosen_spanish: asociación
  alternatives_spanish:
  - presencia
  - compañía
  - fellowship
  lexicon: LSJ; Crum
  rationale: El Coptic ⲥⲩⲛⲟⲩⲥⲓⲁ admite la idea de estar con alguien, asociación o compañía. En español, “asociación” reproduce mejor la relación de pertenencia y conexión que estructura la antítesis exterior/interior del pasaje, sin obligarlo a un matiz devocional más fuerte de lo que el texto exige.
- source_word: ⲉⲃⲟⲗ
  english_pob_choice: outside / come forth
  chosen_spanish: fuera
  alternatives_spanish:
  - afuera
  - en el exterior
  - salidos de
  lexicon: Crum
  rationale: La preposición/adverbio ⲉⲃⲟⲗ apunta a exterioridad o salida. “Fuera” es la forma más natural y directa en español para conservar el contraste con “en mi sustancia”.
- source_word: ⲙⲙⲟⲉⲓ
  english_pob_choice: me / me know
  chosen_spanish: me conocen
  alternatives_spanish:
  - me saben
  - me conocen a mí
  lexicon: Crum
  rationale: El verbo de conocimiento debe conservarse literalmente. “Me conocen” mantiene el paralelismo con “no me conocen” y con el juego central saber/ignorar del pasaje.
- source_word: ⲥⲟⲟⲩⲛ
  english_pob_choice: know / were ignorant
  chosen_spanish: conocen / me han conocido
  alternatives_spanish:
  - saben
  - han sabido de mí
  lexicon: Crum
  rationale: Aunque el texto contrapone conocimiento e ignorancia, en español “conocer” es la opción más idiomática para una relación personal o cognitiva sostenida. “Han conocido” reproduce el aspecto perfectivo del participio/forma verbal donde el inglés POB también distinguió el valor de estado logrado.
- source_word: ⲛⲉⲧϣⲟⲟⲡ
  english_pob_choice: those who exist
  chosen_spanish: los que existen
  alternatives_spanish:
  - los que son
  - los que están
  lexicon: Crum (ϣⲟⲟⲡ)
  rationale: El Coptic expresa existencia/ser-estar, y el inglés POB conservó “those who exist”. En español, “los que existen” preserva esa fuerza ontológica sin volver la frase artificial.
- source_word: ⲙⲏⲛ
  english_pob_choice: abide
  chosen_spanish: están
  alternatives_spanish:
  - abiden
  - permanecen
  - habitan
  lexicon: Crum
  rationale: Aunque “abide” puede traducirse por “permanecer” o “abide”, en español “están cerca/lejos” fluye con naturalidad y mantiene el contraste espacial del segmento. Aquí el verbo no requiere un registro elevado adicional para ser fiel.
- source_word: ⲕⲁⲧⲉⲣⲟⲥ / cerca-lejos pattern
  english_pob_choice: close / far away
  chosen_spanish: cerca / lejos
  alternatives_spanish:
  - próximo / distante
  - cercano / lejano
  lexicon: Coptic relational vocabulary; contextual rendering
  rationale: La pareja espacial es nuclear para el pasaje y debe sonar natural en español. “Cerca/lejos” preserva el paralelismo y la repetición enfática de las líneas.
- source_word: ⲥⲧⲟⲓⲭⲉⲓ / substance wording in English POB
  english_pob_choice: substance
  chosen_spanish: sustancia
  alternatives_spanish:
  - esencia
  - ser
  - naturaleza
  lexicon: Philosophical register; contextual equivalent
  rationale: El inglés POB eligió “substance” para el ámbito interior/ontológico del texto. “Sustancia” conserva ese registro filosófico en español sin desplazarlo hacia una paráfrasis psicológica.
theological_decisions:
- issue: Exterioridad e interioridad del conocimiento del yo hablante
  english_pob_reading: Those who exist outside my association are ignorant of me, and those who exist in my substance are the ones who know me.
  chosen_spanish_reading: Los que existen fuera de mi asociación no me conocen, y los que existen en mi sustancia son los que me conocen.
  alternative_spanish_readings:
  - Los que están fuera de mi compañía no me conocen, y los que están en mi sustancia son los que me conocen.
  - Los que existen fuera de mí no me conocen, y los que existen en mí son los que me conocen.
  rationale: 'El texto contrapone dos modos de relación con la hablante: exterioridad e interioridad. “Asociación” y “sustancia” conservan esa tensión sin suavizarla ni resolverla en una equivalencia doctrinal ajena al pasaje.'
  doctrine_reference: Mística/gnosis del conocimiento por participación; no se formula como doctrina cristológica normativa.
- issue: Conocimiento versus desconocimiento en el tiempo verbal
  english_pob_reading: have known / have been ignorant
  chosen_spanish_reading: me han conocido / no me han conocido
  alternative_spanish_readings:
  - me conocen / no me conocen
  - han llegado a conocerme / no me han llegado a conocer
  rationale: El inglés POB usa perfectos para marcar un estado adquirido o no adquirido. El español mantiene esa polaridad con perfectos compuestos, que suenan naturales y preservan el contraste aspectual.
  doctrine_reference: Aspecto verbal y polaridad semántica; sin implicación doctrinal específica.
- issue: Paralelismo de cercanía y lejanía entre yo y tú
  english_pob_reading: On the day when I am close to you, you are far away from me, and on the day when you are close to me, I am far away from you.
  chosen_spanish_reading: En el día en que estoy cerca de ti, tú estás lejos de mí, y en el día en que tú estás cerca de mí, yo estoy lejos de ti.
  alternative_spanish_readings:
  - Cuando estoy cerca de ti, tú estás lejos de mí, y cuando tú estás cerca de mí, yo estoy lejos de ti.
  - El día en que me acerco a ti...
  rationale: Se conserva la estructura temporal con 'En el día en que' para reflejar el patrón repetitivo del original y del inglés auditado. No se simplifica a 'cuando' para no perder el tono formular y el ritmo paralelístico.
  doctrine_reference: Retórica paralelística del texto; no doctrina.
translation_notes:
  revision_awareness: 'El inglés POB fue revisado a partir de una alineación errónea que había importado un catálogo de ángeles, dioses, espíritus y mujeres. La revisión más reciente restablece el bloque correcto: una serie de oposiciones entre fuera/dentro, cerca/lejos y conocer/ignorar. Esta versión española sigue ese texto revisado y evita incorporar el contenido descartado por el control de revisión.'
  spanish_consistency_notes:
  - Se mantiene el contraste 'fuera / en mi sustancia' para reflejar exterioridad-interioridad.
  - Se usa 'conocer' de manera consistente para el campo de ⲥⲟⲟⲩⲛ.
  - Se conserva 'sustancia' por coherencia con el inglés auditado y el registro ontológico del pasaje.
  - La nota al pie solo marca la ambigüedad real de ⲥⲩⲛⲟⲩⲥⲓⲁ y no introduce otras lecturas no atestiguadas en este segmento.
