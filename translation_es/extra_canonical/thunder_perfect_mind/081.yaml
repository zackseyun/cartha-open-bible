translation:
  language: es
  text: Yo soy la sustancia[a] y la que está sin sustancia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Sustancia» puede abarcar tanto ‘bienes/posesiones’ como ‘consistencia/esencia’.
    reason: lexical_alternative
  - marker: b
    text: La forma privativa puede entenderse también como ‘sin propiedad’ o ‘insustancial’; el texto transmitido parece afectado por OCR y por material vecino.
    reason: source_note
lexical_decisions:
- source_word: ⲁⲙⲡⲉ (as in ⲛ̄ⲁⲙⲡⲉ)
  english_pob_choice: substance
  chosen_spanish: sustancia
  alternatives_spanish:
  - propiedad
  - medios
  - bienes
  - posesiones
  lexicon: Crum, s.v. ⲁⲙⲡⲉ; Layton, Coptic Grammar (privative patterns)
  rationale: «Sustancia» conserva en español el contraste entre una realidad positiva y su negación, y funciona tanto para el sentido material de bienes/posesiones como para el sentido más abstracto de esencia o consistencia. Mantiene el paralelismo paradojal del original sin reducirlo a un solo matiz.
- source_word: ⲁⲧⲁⲙⲡⲉ (probable, privative ⲁⲧ- + ⲁⲙⲡⲉ)
  english_pob_choice: without substance
  chosen_spanish: sin sustancia
  alternatives_spanish:
  - insustancial
  - sin propiedad
  - sin bienes
  - sin posesiones
  lexicon: Crum, s.v. ⲁⲙⲡⲉ; privative ⲁⲧ-
  rationale: La construcción «sin sustancia» reproduce de forma transparente la oposición con «sustancia» y conserva la ambigüedad entre falta de bienes y falta de consistencia/realidad. Se evita una paráfrasis más interpretativa como «insustancial».
- source_word: ⲉⲧⲁⲙⲁⲧⲉ (OCR issue in aligned segment)
  english_pob_choice: without substance
  chosen_spanish: sin sustancia
  alternatives_spanish:
  - sin bienes
  - sin posesiones
  lexicon: OCR alignment note; relationship to ⲁⲧⲁⲙⲡⲉ
  rationale: La lectura del inglés POB señala una probable interferencia de OCR y conserva como sentido base la privación de sustancia. En español se mantiene la misma decisión auditada, sin intentar resolver el problema textual más allá de lo que permite el testimonio.
theological_decisions:
- issue: Paradoja ontológica de identidad y carencia
  english_pob_reading: I am the substance and the one without substance.
  chosen_spanish_reading: Yo soy la sustancia y la que está sin sustancia.
  alternative_spanish_readings:
  - Yo soy la sustancia y la que no tiene sustancia
  - Yo soy la sustancia y la insustancial
  rationale: El texto no presenta una afirmación doctrinal sistemática sino una paradoja literaria. «La que está sin sustancia» conserva mejor el contraste y el tono del original que una solución más explicativa o abstracta.
  doctrine_reference: Thunder, Perfect Mind (gnostic paradox literature); no canonical doctrinal prooftext
translation_notes:
  revision_awareness: 'El inglés POB no requirió cambios en la última revisión: el punto se mantiene estable. La versión española conserva esa misma estabilidad y sigue el mismo juicio de alineación de segmento con nota de OCR.'
  spanish_consistency_notes:
  - Se mantuvo el registro sobrio y publicable, sin armonizar la paradoja a una sola acepción.
  - «Sustancia» y «sin sustancia» se usan en espejo para preservar la oposición del original.
  - Se evitó introducir vocabulario eclesiástico ajeno al texto.
