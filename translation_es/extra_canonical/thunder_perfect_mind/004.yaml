lexical_decisions:
- source_word: ⲙⲡⲣⲧⲣⲉ
  english_pob_choice: do not be unknowing of me
  chosen_spanish: No seas ignorante de mí
  alternatives_spanish:
  - No me desconozcas
  - No estés sin conocerme
  lexicon: Layton, Coptic Grammar §36; Crum, Coptic Dictionary
  rationale: La construcción prohibitiva se expresa en español con un imperativo negativo natural. ‘Ignorante de mí’ conserva la fuerza relacional del original, que no solo pide oír, sino no permanecer sin conocimiento de la voz del hablante.
- source_word: ⲥⲱⲧⲙ
  english_pob_choice: hear
  chosen_spanish: seas ignorante de
  alternatives_spanish:
  - oigas
  - escuches
  lexicon: Crum, Coptic Dictionary
  rationale: Aunque el verbo básico es ‘oír/escuchar’, el contexto de admonición apunta a falta de reconocimiento o atención efectiva; por eso se mantiene una formulación que evita reducir el sentido a mera percepción auditiva.
- source_word: ⲙⲁ
  english_pob_choice: place
  chosen_spanish: lugar
  alternatives_spanish:
  - sitio
  - espacio
  lexicon: Crum, Coptic Dictionary
  rationale: ‘Lugar’ es el equivalente más natural y conserva la referencia espacial explícita del texto copto.
- source_word: ⲟⲩⲙⲉⲩⲉ
  english_pob_choice: time
  chosen_spanish: momento
  alternatives_spanish:
  - tiempo
  - hora
  lexicon: Crum, Coptic Dictionary
  rationale: En español, ‘momento’ comunica bien la distribución adverbial de la frase y evita la posible rigidez de ‘tiempo’. La POB inglesa optó por ‘time’; aquí se elige una equivalencia idiomática cercana.
- source_word: ⲛⲕⲉ-
  english_pob_choice: any/other
  chosen_spanish: ningún/ningún
  alternatives_spanish:
  - cualquier
  - algún otro
  lexicon: Crum, Coptic Dictionary
  rationale: El valor distributivo e indefinido de ⲛⲕⲉ- queda mejor en español con la repetición enfática ‘ningún... ni en ningún...’, que refleja el alcance universal del mandato negativo.
- source_word: ⲁⲩⲱ
  english_pob_choice: and
  chosen_spanish: —
  alternatives_spanish:
  - y
  - también
  lexicon: Crum, Coptic Dictionary
  rationale: Aunque el audit trail inglés conservó una posible coordinación inicial, la revisión posterior indicó que el copto de este segmento no exige ‘y’ al comienzo de la cláusula. Por eso no se añade una conjunción en español.
theological_decisions:
- issue: 'Alcance de la prohibición: conocimiento, audición o reconocimiento'
  english_pob_reading: Do not be unknowing of me anywhere or at any time.
  chosen_spanish_reading: No seas ignorante de mí en ningún lugar ni en ningún momento.
  alternative_spanish_readings:
  - No me desconozcas en ningún lugar ni en ningún momento
  - No estés sin conocerme en ningún lugar ni en ningún momento
  rationale: El inglés POB preserva la idea de ‘unknowing’ como estado de falta de conocimiento de la hablante. En español, ‘ignorante de mí’ mantiene esa tensión sin convertirla simplemente en ‘escuchar’. Se evita cerrar demasiado el matiz porque la tradición de este texto puede oscilar entre oír, reconocer y conocer.
  doctrine_reference: No aplica una doctrina confesional específica; se mantiene la ambigüedad semántica del enunciado gnóstico/poético.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que eliminó la conjunción inicial inglesa (‘And’), así como la nota de que la frase equivalente a ‘in another thought’ pertenece a una línea distinta. Por eso el español evita iniciar con ‘Y’ y no incorpora referencias a ‘pensamiento’ en este segmento.
  spanish_consistency_notes:
  - Se mantiene ‘mí’ en primera persona singular para reflejar el objeto directo/relacional del hablante.
  - Se evita ‘SEÑOR’ u otras convenciones litúrgicas porque no corresponden al texto.
  - La formulación busca ser publicable y fluida sin perder la rigidez admonitiva del copto.
  - ‘Ningún lugar ni en ningún momento’ conserva la doble esfera espacial y temporal del original.
