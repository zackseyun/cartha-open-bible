    issue: «No seas ignorante de mí» es poco idiomático en español
    rationale: En español natural, «ser ignorante de» aplicado a una persona suena extraño y puede leerse como insulto o rasgo de carácter. «No me desconozcas» expresa mejor el mandato de no permanecer sin conocimiento/reconocimiento de la hablante.
  - severity: low
    issue: La nota c ya no coincidiría con la mejor redacción española
    rationale: Si se mejora el texto principal, la alternativa previa también debe actualizarse para mantener consistencia documental con el cambio de formulación.
