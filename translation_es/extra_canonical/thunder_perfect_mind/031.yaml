translation:
  language: es
  text: …déjenme al salir[a]. Y me buscarán en riquezas[c][b]. Y no me miren al salir entre los que son honrados…
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La secuencia copta se entiende aquí como “déjenme al salir”; la forma verbal se toma como primera persona singular circunstancial (“al salir / cuando salgo”), no como un imperativo plural “salgan”.
    reason: source_note
  - marker: b
    text: “Riquezas” sigue la lectura revisada del pasaje y no la segmentación anterior que llevaba a “grandeza” en esta línea.
    reason: textual_variant
  - marker: c
    text: También puede entenderse con un matiz cercano a “en medio de riquezas” o “en lo rico”; “en riquezas” conserva la formulación breve y la extrañeza poética del original.
    reason: lexical_note
lexical_decisions:
- source_word: ⲉⲧⲛⲕⲁⲁⲧ
  english_pob_choice: leave me as I come forth
  chosen_spanish: déjenme mientras yo salgo
  alternatives_spanish:
  - déjenme cuando yo salga
  - déjenme al salir yo
  lexicon: Crum Coptic Dictionary
  rationale: 'El Copt. expresa una acción dirigida a la segunda persona plural con objeto de primera singular: “déjenme”. En español, “mientras yo salgo” conserva el valor circunstancial de la forma verbal sin introducir un matiz más fuerte que el del texto.'
- source_word: ⲉⲉⲓⲛⲏⲩ ⲉⲃⲟⲗ
  english_pob_choice: as I come forth
  chosen_spanish: mientras yo salgo
  alternatives_spanish:
  - al salir
  - cuando yo salga
  - mientras yo vengo fuera
  lexicon: Crum Coptic Dictionary
  rationale: La frase es una cláusula circunstancial en primera singular; se evita traducirla como imperativo plural. “Salgo” es la opción más natural en español para mantener la imagen de salir/venir hacia afuera.
- source_word: ϭⲓⲛⲉ
  english_pob_choice: seek
  chosen_spanish: buscarán
  alternatives_spanish:
  - buscar me
  - procurarán
  lexicon: Crum Coptic Dictionary
  rationale: En la línea, el verbo tiene sentido de hallar/buscar a la figura hablante; en español, “buscarán” conserva la dinámica de búsqueda sin confundirla con “encontrarán”, que no se documenta como opción principal del audit trail.
- source_word: ⲙⲙⲁⲟ / ⲙⲙⲛⲧⲣⲙⲁⲟ
  english_pob_choice: riches
  chosen_spanish: riquezas
  alternatives_spanish:
  - riqueza
  - abundancia
  - grandeza
  lexicon: Crum Coptic Dictionary
  rationale: Aunque el inglés POB distinguió “greatness” en una versión previa y luego fue corregida, la forma establecida del pasaje aquí es “riches”. “Riquezas” conserva el plural abstracto y evita interpretar demasiado el término.
- source_word: ⲛⲉⲧⲧⲁⲉⲓⲏⲩ
  english_pob_choice: those who are honored
  chosen_spanish: los que son honrados
  alternatives_spanish:
  - los honrados
  - aquellos que son honrados
  - los honorables
  lexicon: Crum Coptic Dictionary
  rationale: La evidencia de revisión muestra que el segmento line-broken continúa con “honored”, no con un término de humillación. “Los que son honrados” conserva la pasiva y la categoría de personas.
- source_word: ⲙⲡⲣⲛⲁⲩ ⲉⲣⲟⲉⲓ
  english_pob_choice: do not look at me
  chosen_spanish: no me miren
  alternatives_spanish:
  - no me vean
  - no fijen la vista en mí
  lexicon: Crum Coptic Dictionary
  rationale: El imperativo negativo expresa restricción visual dirigida a la segunda persona plural; “miren” es más natural y directo en español que “vean” para reproducir la amonestación de no contemplar.
translation_notes:
  revision_awareness: 'La traducción sigue la revisión adjudicada más reciente, que corrige la lectura errónea inicial de “give heed / seek / lowly” y establece: “leave me as I come forth… seek me in riches… do not look at me as I come forth among those who are honored.” La versión española refleja esa corrección y evita las interpretaciones descartadas por el control de revisión.'
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y publicable, con verbos directos y sin expansión interpretativa.
  - Se conserva la estructura paralelística de tres miembros con elipsis inicial.
  - No se introduce terminología doctrinal cristiana ajena al texto gnóstico/cóptico.
  - Las notas distinguen entre decisión textual y ajuste estilístico para evitar mezclar variantes con mera fluidez española.
