review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue en general la lectura adjudicada del copto real de este segmento, no la pareja esperada ‘odiada/amada’. Conserva correctamente ‘…exteriormente… interiormente’, la autoidentificación repetida, el valor privativo de ⲟⲩⲁⲧⲛⲟⲩⲧⲉ como ‘sin Dios’, y la paradoja final ‘la virgen, su Dios’. Sin embargo, una frase central no refleja bien el inglés auditado ‘I am she before whom you were ashamed, and you were shameless’: ‘la que fue avergonzada por causa de ella’ introduce elementos ajenos (‘por causa de ella’) y cambia la relación sintáctica.'
  spanish_quality_summary: El español es mayormente legible y digno, pero presenta una construcción poco natural y semánticamente errada en ‘fue avergonzada por causa de ella’. También conviene suavizar ‘y tú fuiste desvergonzado’ a una forma más idiomática y paralela. El resto del texto funciona bien en registro y claridad.
  glossary_alignment: No hay conflictos con el glosario principal del proyecto. ‘Yo soy’ para ⲁⲛⲟⲕ es adecuado; ‘sin Dios’ respeta la decisión léxica auditada mejor que ‘impía’; ‘la virgen’ y ‘su Dios’ preservan la tensión paradójica sin domesticación teológica.
  issues:
  - severity: high
    issue: Mistraducción de la cláusula de vergüenza
    rationale: El inglés POB auditado dice ‘I am she before whom you were ashamed, and you were shameless’. El borrador ‘Yo soy la que fue avergonzada por causa de ella’ cambia el sujeto/paciente y añade ‘por causa de ella’, que no procede de la evidencia ni del rastro auditado.
  - severity: medium
    issue: ‘desvergonzado’ como predicado suena duro y poco idiomático
    rationale: Aunque semánticamente cercano a ‘shameless’, en esta línea resulta más natural y claro ‘sin vergüenza’, manteniendo la antítesis con ‘te avergonzaste’.
  revised_spanish_text: …exteriormente, y tú me conociste interiormente. Yo soy aquella ante quien te avergonzaste, y tú fuiste sin vergüenza. Yo, yo soy sin Dios[a], y yo soy la virgen, su Dios.
  revised_footnotes:
  - marker: a
    text: 'También: ‘impía’. El copto usa una forma privativa, literalmente ‘sin Dios’.'
    reason: lexical_alternative
  revision_rationale: 'Se corrige la cláusula central para reflejar fielmente la relación del texto auditado: no que ella ‘fue avergonzada’, sino que el interlocutor ‘se avergonzó ante ella’. También se mejora la naturalidad de ‘shameless’ con ‘sin vergüenza’, sin perder el contraste. No se requieren cambios en la paradoja ‘sin Dios … la virgen, su Dios’ ni en la nota léxica.'
