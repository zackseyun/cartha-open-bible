revisions:
- from: …exteriormente, y tú me conociste interiormente. Yo soy la que fue avergonzada por causa de ella, y tú fuiste desvergonzado. Yo, yo soy sin Dios[a], y yo soy la virgen, su Dios.
  to: …exteriormente, y tú me conociste interiormente. Yo soy aquella ante quien te avergonzaste, y tú fuiste sin vergüenza. Yo, yo soy sin Dios[a], y yo soy la virgen, su Dios.
  rationale: 'Se corrige la cláusula central para reflejar fielmente la relación del texto auditado: no que ella ‘fue avergonzada’, sino que el interlocutor ‘se avergonzó ante ella’. También se mejora la naturalidad de ‘shameless’ con ‘sin vergüenza’, sin perder el contraste. No se requieren cambios en la paradoja ‘sin Dios … la virgen, su Dios’ ni en la nota léxica.'
