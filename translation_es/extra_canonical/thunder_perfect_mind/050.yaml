translation:
  language: es
  text: …exteriormente, y tú me conociste interiormente. Yo soy la que fue avergonzada por causa de ella, y tú fuiste desvergonzado. Yo, yo soy sin Dios[a], y yo soy la virgen, su Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: ‘impía’. El copto usa una forma privativa, literalmente ‘sin Dios’.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲁⲛⲟⲕ
  english_pob_choice: I am
  chosen_spanish: Yo soy
  alternatives_spanish:
  - Soy
  - Yo
  lexicon: —
  rationale: Mantiene la fórmula de autoidentificación repetida y enfática del poema, preservando la estructura retórica sin volverla más natural de lo que el original permite.
- source_word: ⲙⲙⲟⲓ (implícito en la secuencia del texto estándar tras ‘you knew’)
  english_pob_choice: you knew me
  chosen_spanish: me conociste
  alternatives_spanish:
  - me supiste
  - conociste de mí
  lexicon: —
  rationale: ‘Conocer’ comunica bien el sentido relacional de saber/reconocer presente en el copto y funciona con el adverbio paralelo ‘interiormente/exteriormente’.
- source_word: ⲉⲃⲟⲗ
  english_pob_choice: outwardly
  chosen_spanish: exteriormente
  alternatives_spanish:
  - por fuera
  - externamente
  lexicon: —
  rationale: Refleja el valor locativo de ‘outside/outwardly’ y conserva el paralelismo con ‘interiormente’ sin sonar demasiado coloquial.
- source_word: ϩⲧⲉϩⲟⲩⲛ
  english_pob_choice: inwardly
  chosen_spanish: interiormente
  alternatives_spanish:
  - por dentro
  - internamente
  lexicon: —
  rationale: Marca con claridad la oposición interior/exterior, que es central en el pasaje.
- source_word: ⲟⲩⲁⲧⲛⲟⲩⲧⲉ
  english_pob_choice: godless
  chosen_spanish: sin Dios
  alternatives_spanish:
  - impía
  - sin deidad
  lexicon: —
  rationale: El copto es privativo (‘sin Dios’). ‘Sin Dios’ preserva mejor la construcción que ‘impía’, que añade un matiz moral no explícito en la forma léxica.
- source_word: ⲧⲡⲁⲣⲑⲉⲛⲟⲥ
  english_pob_choice: the virgin
  chosen_spanish: la virgen
  alternatives_spanish:
  - la doncella
  - la doncella virgen
  lexicon: —
  rationale: ‘Virgen’ es la correspondencia directa y la opción más sobria para el título o autodescripción nominal del texto.
- source_word: ⲛⲉϥⲛⲟⲩⲧⲉ / ‘her God’
  english_pob_choice: her God
  chosen_spanish: su Dios
  alternatives_spanish:
  - el Dios de ella
  - su Dios
  lexicon: —
  rationale: Conserva la relación posesiva sin especificar más de lo que el copto permite. En español, ‘su Dios’ es la forma más breve y natural.
theological_decisions:
- issue: Conservar la tensión autorreferencial entre ‘sin Dios’ y ‘la virgen, su Dios’
  english_pob_reading: I, I am godless, and I am the virgin, her God.
  chosen_spanish_reading: Yo, yo soy sin Dios, y yo soy la virgen, su Dios.
  alternative_spanish_readings:
  - Yo, yo soy impía, y yo soy la virgen, su Dios.
  - Yo, yo soy sin Dios, y yo soy la virgen, el Dios de ella.
  rationale: El texto copto presenta una tensión deliberada entre la autodescripción privativa y la identificación paradójica con ‘la virgen, su Dios’. La traducción conserva esa fricción sin suavizarla con paráfrasis devocionales.
  doctrine_reference: Teología del habla paradójica en textos gnósticos; no se normaliza la tensión interna del enunciado.
translation_notes:
  revision_awareness: 'El audit trail inglés muestra una desalineación mayor entre un borrador previo y el Coptic real: el segmento correcto no trata de ‘odiada/amada en todas partes’, sino de la secuencia ‘exteriormente/interiormente’, ‘me conociste’, ‘sin Dios’ y ‘la virgen, su Dios’. La versión española sigue el texto coptófico y la corrección adjudicada, manteniendo la antítesis interior/exterior y la tensión final sin introducir lecturas ajenas al segmento.'
  spanish_consistency_notes:
  - Se mantuvo ‘virgen’ como traducción directa y no se sustituyó por ‘doncella’ para evitar diluir la autodesignación nominal.
  - ‘Sin Dios’ se conservó como privativo literal, en línea con la decisión inglesa ‘godless’, evitando convertirlo en una acusación moral interpretativa.
  - Se usó ‘interiormente/exteriormente’ para sostener el paralelismo de locución adverbial con registro digno y claro.
