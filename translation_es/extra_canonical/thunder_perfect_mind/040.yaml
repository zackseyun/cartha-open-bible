translation:
  language: es
  text: ¿Por qué odian mi temor y maldicen mi orgullo?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ⲙⲁ
  english_pob_choice: why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿con qué motivo?
  - ¿por qué razón?
  lexicon: Crum; Layton (interrogative particle)
  rationale: La partícula interrogativa se refleja naturalmente con una pregunta directa en español; '¿Por qué' conserva el tono retórico del original.
- source_word: ⲧⲁϩⲟⲧⲉ
  english_pob_choice: my fear
  chosen_spanish: mi temor
  alternatives_spanish:
  - mi miedo
  - mi reverencia
  - mi temor reverente
  lexicon: Crum (ϩⲟⲧⲉ / fear)
  rationale: El término se traduce de modo literal como una emoción de temor. 'Temor' mantiene una gama semántica más amplia y digna que 'miedo'.
- source_word: ⲧⲁϣⲟⲩϣⲟⲩ
  english_pob_choice: my pride
  chosen_spanish: mi orgullo
  alternatives_spanish:
  - mi soberbia
  - mi vanagloria
  - mi altivez
  lexicon: Crum (ϣⲟⲩϣⲟⲩ / pride, boasting)
  rationale: '''Orgullo'' reproduce el sentido básico del sustantivo. Se evita imponer ''soberbia'' porque ese matiz moralizante no está explícito en la forma coptа.'
- source_word: ⲧⲉⲧⲛ-
  english_pob_choice: you ...
  chosen_spanish: odias / maldices
  alternatives_spanish:
  - aborreces / maldices
  - desprecias / maldices
  lexicon: Coptic verbal prefix (2nd person plural)
  rationale: La segunda persona plural se mantiene en español con un presente plural natural; la doble acusación conserva la fuerza paralelística del pasaje.
theological_decisions:
- issue: Sentido de la autoafirmación frente a las actitudes humanas nombradas en el verso
  english_pob_reading: Why do you hate my fear, and curse my pride?
  chosen_spanish_reading: ¿Por qué odias mi temor y maldices mi orgullo?
  alternative_spanish_readings:
  - ¿Por qué aborreces mi temor y maldices mi orgullo?
  - ¿Por qué desprecias mi temor y maldices mi orgullo?
  rationale: El griego/cóptico transmitido aquí no requiere suavizar ni intensificar más allá de la oposición retórica entre el sujeto que habla y los interlocutores plurales. 'Odiar' y 'maldcir' preservan el choque emocional y acusatorio del verso.
  doctrine_reference: N/A — poema gnóstico extra-canónico; decisión de registro y semántica, no de doctrina cristiana normativa.
translation_notes:
  revision_awareness: 'La auditoría inglesa mostró una corrección importante: el tramo debe leerse como ''Why do you hate my fear, and curse my pride?'' y no como una reconstrucción de otro pasaje. Por ello el español sigue esa versión depurada, sin arrastrar notas de variantes ya descartadas por la revisión más reciente.'
  spanish_consistency_notes:
  - Se mantuvo un español claro y litúrgicamente legible, evitando arcaísmos innecesarios.
  - '''Temor'' se prefirió a ''miedo'' para conservar amplitud semántica y tono solemne.'
  - No se introdujeron notas al pie porque la versión revisada inglesa ya eliminó los marcadores y el texto final es estable en la auditoría disponible.
