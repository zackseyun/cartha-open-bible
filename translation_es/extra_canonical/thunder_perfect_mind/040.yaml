review_pass:
  verdict: revise
  source_alignment_summary: 'El sentido fuente ya fue corregido en la auditoría inglesa a «Why do you hate my fear, and curse my pride?». El borrador español transmite bien esos dos núcleos semánticos («fear» / «pride») y el tono acusatorio, pero introduce un desajuste gramatical importante: el copto corregido lleva segunda persona plural, mientras que el español usa singular («odias», «maldices»).'
  spanish_quality_summary: La redacción es clara, natural y digna. «Temor» y «orgullo» son opciones legibles y adecuadas. La única reparación necesaria es concordar la segunda persona plural para preservar la referencia del original y el paralelismo retórico.
  glossary_alignment: No hay términos del glosario mayor en juego. «Temor» para ⲧⲁϩⲟⲧⲉ y «orgullo» para ⲧⲁϣⲟⲩϣⲟⲩ concuerdan con la justificación léxica documentada. No se requieren notas.
  issues:
  - severity: medium
    issue: Cambio indebido de segunda persona plural a singular
    rationale: La decisión léxica del propio borrador reconoce el prefijo copto ⲧⲉⲧⲛ- como segunda persona plural, pero el texto español dice «¿Por qué odias... y maldices...?». Debe ser plural para reflejar fielmente a los interlocutores del original.
  revised_spanish_text: ¿Por qué odian mi temor y maldicen mi orgullo?
  revision_rationale: Se ajusta la concordancia verbal al plural del original corregido (ⲧⲉⲧⲛ-), sin cambiar el sentido ni el registro. «Temor» y «orgullo» se conservan por fidelidad léxica y buena legibilidad en español.
