  text: 'Greeks and barbarians[a],

    I am the one whose image is great in Egypt,

    and the one who has no image among the barbarians.

    I am she whom they hated in every place[d][c][b],

    and she whom they loved.'
  footnotes:
  - marker: a
    text: 'Literal ‘the non-silence’ (ⲧⲉⲙⲛⲧⲉⲥⲉⲓⲛⲉ), the morphological negation of ‘silence’ (ⲥⲉⲓⲛⲉ). Alternatives: ‘speech,’ ‘utterance.’'
    reason: lexical_alternative
  - marker: b
    text: Reading ⲙⲉⲥⲧⲱⲥ as ‘hated/despised’ (cf. Gk μισητός). If from μεστός, it could be ‘full/complete,’ but the hate/love antithesis favors ‘hated.’
    reason: alternative_reading
  - marker: c
    text: OCR likely agglutinates ϩⲛ ⲙⲁ ⲛⲓⲙ (‘in every place’). It could also be taken as ‘among all [people].’
    reason: alignment_note
  - marker: d
    text: Or 'I am she who shall be the silence in Egypt,\nand there, the non-silence[a].\nAmong the barbarians I am she whom they hated[b],\nand in every place[c] I am she whom they loved.'.
    reason: previous_rendering
