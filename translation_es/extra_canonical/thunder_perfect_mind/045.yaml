translation:
  language: es
  text: 'Griegos y bárbaros,


    yo soy la que tiene una imagen grande en Egipto,


    y la que no tiene imagen entre los bárbaros.


    Yo soy la que odiaron en todo lugar[a][b],


    y la que amaron.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La frase copta fue revisada: aquí ‘en todo lugar’ modifica ‘odiaron’, no ‘amaron’.'
    reason: textual_variant
  - marker: b
    text: El original también permite la lectura ‘entre todos [los pueblos]’; se traduce aquí ‘en todo lugar’ siguiendo la revisión textual adoptada.
    reason: alternative_reading
lexical_decisions:
- source_word: ⲉⲗⲗⲏⲛ
  english_pob_choice: Greeks
  chosen_spanish: griegos
  alternatives_spanish:
  - helenos
  - los griegos
  lexicon: Crum; préstamo griego en copto
  rationale: Se conserva el par étnico con ⲃⲁⲣⲃⲁⲣⲟⲥ y se usa el plural natural en español para mantener el contraste.
- source_word: ⲃⲁⲣⲃⲁⲣⲟⲥ
  english_pob_choice: barbarians
  chosen_spanish: bárbaros
  alternatives_spanish:
  - no griegos
  - el bárbaro
  lexicon: Crum; préstamo griego en copto
  rationale: La antítesis establecida con ‘griegos’ pide el plural ‘bárbaros’; ‘no griegos’ explicita el sentido pero debilita el eco del original.
- source_word: ϩⲛ ⲕⲏⲙⲉ
  english_pob_choice: in Egypt
  chosen_spanish: en Egipto
  alternatives_spanish:
  - en Kheme (Egipto)
  lexicon: 'Crum: ⲕⲏⲙⲉ = Egypt'
  rationale: Se traduce el topónimo por su equivalente claro en español, ya que aquí funciona como referencia geográfica directa.
- source_word: ⲉⲓⲛⲉ
  english_pob_choice: image
  chosen_spanish: imagen
  alternatives_spanish:
  - figura
  - semejanza
  lexicon: Crum; lectura confirmada por la revisión adjudicada
  rationale: La revisión mostró que el texto habla de ‘imagen’, no de ‘silencio’. ‘Imagen’ conserva el sustantivo concreto y la tensión del pasaje.
- source_word: ⲧⲛⲁϣⲉ ⲡⲉⲥⲉⲓⲛⲉ
  english_pob_choice: whose image is great
  chosen_spanish: tiene gran imagen
  alternatives_spanish:
  - cuya imagen es grande
  - cuya imagen es mucha
  lexicon: Relectura aceptada en la revisión; ⲛⲁϣⲉ = grande/mucho
  rationale: Se evita el calco rígido y se da una solución española idiomática que conserva el sentido de abundancia/grandeza de la imagen.
- source_word: ⲙⲛⲧⲥ ⲉⲓⲛⲉ
  english_pob_choice: has no image
  chosen_spanish: no tiene imagen
  alternatives_spanish:
  - carece de imagen
  - no posee imagen
  lexicon: Revisión del análisis coptológico; negación posesiva
  rationale: ‘No tiene imagen’ es claro y fiel; mantiene la negación posesiva sin sobrerrepresentarla con una perífrasis más pesada.
- source_word: ⲛⲧⲁⲩ ⲙⲉⲥⲧⲱⲥ
  english_pob_choice: they hated (me)
  chosen_spanish: ellos odiaron
  alternatives_spanish:
  - ellos me odiaron
  - ellos despreciaron
  lexicon: Crum; lectura apoyada por la antítesis con ‘amaron’
  rationale: El español puede omitir el objeto directo por economía y fluidez poética, sin perder la referencia implícita a la voz hablante.
- source_word: ⲛⲧⲁⲩ ⲙⲉⲣⲓⲧⲥ
  english_pob_choice: they loved (me)
  chosen_spanish: ellos amaron
  alternatives_spanish:
  - ellos me amaron
  - ellos la amaron
  lexicon: Crum; raíz común de amar/beloved
  rationale: Se mantiene el paralelismo con ‘odiaron’ y se conserva el sentido verbal simple del original.
- source_word: ϩⲛ ⲙⲁ ⲛⲓⲙ
  english_pob_choice: in every place
  chosen_spanish: en todo lugar
  alternatives_spanish:
  - en todas partes
  - entre todos
  lexicon: Idiom of location; OCR agglutination noted in the audit trail
  rationale: ‘En todo lugar’ preserva la cadencia locativa y refleja bien la extensión universal del adverbio.
translation_notes:
  revision_awareness: 'La versión inglesa auditada había confundido ⲉⲓⲛⲉ (‘imagen’) con ⲥⲉⲓⲛⲉ (‘silencio’). Se siguió la revisión adjudicada que corrige el pasaje: ‘gran imagen en Egipto / no tiene imagen entre los bárbaros / odiaron en todo lugar / amaron’. La presente redacción española se ajusta a esa lectura revisada y evita reproducir la mistraducción anterior.'
  spanish_consistency_notes:
  - Se mantuvo ‘griegos / bárbaros’ como par étnico estable, sin reemplazarlo por ‘helenos / no griegos’.
  - Se eligió ‘imagen’ para ⲉⲓⲛⲉ conforme a la revisión coptológica; no se introduce ‘silencio’ en el texto principal.
  - Se prefirió ‘en todo lugar’ para conservar el valor locativo universal y la simetría poética.
  - Se omitió el objeto directo explícito en ‘odiaron / amaron’ para un español más fluido, sin alterar la referencia al yo lírico.
