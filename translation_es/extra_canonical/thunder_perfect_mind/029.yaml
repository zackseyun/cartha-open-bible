lexical_decisions:
- source_word: ⲓⲥⲭⲩⲥ (Gk. loan into Coptic)
  english_pob_choice: might
  chosen_spanish: poder
  alternatives_spanish:
  - fuerza
  - fortaleza
  - poderío
  lexicon: Crum (Coptic); LSJ (ἰσχύς)
  rationale: “Poder” comunica fuerza efectiva y capacidad activa con un registro breve y solemne. En español mantiene bien el paralelismo con la segunda cola y evita una duplicación demasiado cercana de la glosa consultada “fuerza”.
- source_word: ⲫⲟⲃⲟⲥ (Gk. loan into Coptic)
  english_pob_choice: dread
  chosen_spanish: temor
  alternatives_spanish:
  - miedo
  - pavor
  - terror
  lexicon: Crum (Coptic); LSJ (φόβος)
  rationale: “Temor” conserva la amplitud semántica de φόβος y su tono elevado. En español permite una lectura reverente o aterrada según el contexto poético, sin estrechar demasiado el sentido como haría “miedo”.
translation_notes:
  revision_awareness: La versión inglesa POB adopta “might” y “dread” como equivalentes poéticos de la pareja léxica esperable en este pasaje, con una nota que reconoce la posible desalineación del OCR. La presente versión conserva esa economía y ese paralelismo, pero ajusta ambos miembros a español natural sin perder la tensión semántica del original.
  spanish_consistency_notes:
  - Se evitó “SEÑOR” y terminología doctrinal ajena porque este segmento no contiene lenguaje divino explícito ni requería armonización litúrgica.
  - Se mantuvo la simetría breve de dos miembros para reflejar el carácter sentencioso del original.
  - “Temor” se prefirió sobre “miedo” para sostener un registro más digno y potencialmente reverente en español.
