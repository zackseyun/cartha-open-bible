translation:
  language: es
  text: 'Yo soy la que ustedes han pensado[a],

    y ustedes se han burlado de mí.

    Yo soy la que no fue instruida[b],

    y de mí aprenden[c].

    Yo soy la que ustedes han despreciado[d],

    y ustedes piensan en mí.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Pensado» también puede entenderse como «considerado» o «pensado en secreto»; el coptico admite un matiz de ocultamiento en lecturas alternativas, pero aquí el contexto y la revisión priorizan la lectura de burla inmediata.
    reason: lexical_alternative
  - marker: b
    text: «No fue instruida» evita el tono más duro de «ignorante» o «inculta», aunque esas opciones siguen siendo posibles según el matiz que se quiera destacar.
    reason: lexical_alternative
  - marker: c
    text: La expresión literal equivale a «de mí» o «desde mí»; también puede traducirse «son enseñados por mí» si se prefiere una formulación más explícita.
    reason: lexical_alternative
  - marker: d
    text: «Despreciado» también puede traducirse «escarnecido» o «desdeñado».
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲁⲛⲟⲕ
  english_pob_choice: I am
  chosen_spanish: Yo soy
  alternatives_spanish:
  - Yo estoy
  - Yo soy yo
  lexicon: Layton; Lambdin (uso copulativo del coptico)
  rationale: Mantengo la fórmula copulativa explícita para conservar la cadencia repetitiva y la fuerza declarativa del discurso. En español, «Yo soy» reproduce mejor la solemnidad y la estructura performativa que un simple «Yo».
- source_word: ⲙⲉⲉⲩⲉ ⲉⲣⲟⲓ
  english_pob_choice: think about
  chosen_spanish: han pensado
  alternatives_spanish:
  - han pensado en
  - han considerado
  - han reflexionado sobre
  lexicon: Crum; Layton
  rationale: El Coptic indica el objeto de pensamiento con la preposición correspondiente; el POB lo rinde como «think about». En español, «han pensado en mí» sería más natural, pero aquí se conserva la cercanía del verbo con el objeto en la línea final mediante «piensan en mí», y se deja la primera ocurrencia como «han pensado» para evitar redundancia pesada en el poema.
- source_word: ϣⲱⲥ / ϣⲟⲥⲧ
  english_pob_choice: mocked
  chosen_spanish: se han burlado de mí
  alternatives_spanish:
  - me han escarnecido
  - me han despreciado
  - me han ridiculizado
  lexicon: Crum; Greek loan καταφρονέω en el trasfondo de la tradición textual
  rationale: 'La revisión adjudicada corrige el valor verbal: no es «ocultar», sino «burlarse / despreciar». «Se han burlado de mí» expresa bien el componente de mofa sin perder la agresividad del término. En la cláusula final se usa «despreciado» para conservar la alternancia semántica y el tono de menosprecio.'
- source_word: ⲁⲧⲥⲃⲱ
  english_pob_choice: unlearned
  chosen_spanish: no fue instruida
  alternatives_spanish:
  - sin instrucción
  - inculta
  - no aprendida
  lexicon: Crum
  rationale: El texto coptico marca una negación de la condición de aprendizaje/instrucción. En español, «no fue instruida» evita el pejorativo fuerte de «ignorante» y conserva mejor el contraste paradójico con «de mí aprenden».
- source_word: ϫⲓⲥⲃⲱ ⲉⲃⲟⲗ ⲛ̄ⲧⲟⲟⲧ
  english_pob_choice: they learn from me
  chosen_spanish: de mí aprenden
  alternatives_spanish:
  - aprenden de mí
  - son instruidos por mí
  - reciben enseñanza de mí
  lexicon: Crum; Layton
  rationale: La expresión coptica literalmente equivale a «de mí / fuera de mí aprenden». En español, «de mí aprenden» conserva la inversión poética y el paralelismo breve del original, sin convertirla innecesariamente en una pasiva analítica.
- source_word: ⲕⲁⲧⲁⲫⲣⲟⲛⲓ
  english_pob_choice: scorned
  chosen_spanish: despreciado
  alternatives_spanish:
  - desdeñado
  - escarnecido
  - menospreciado
  lexicon: Greek loan (καταφρονέω) vía Coptic
  rationale: La adjudicación previa indicó que la línea debe leerse como una cláusula principal con «have despised / scorned». En español, «despreciado» recoge bien el peso del desprecio y mantiene una correspondencia más directa con el tono del verbo.
- source_word: ⲧⲉ ⲧⲉⲛⲧⲁⲧⲉⲧⲛ̄...
  english_pob_choice: I am she whom you have scorned
  chosen_spanish: Yo soy la que ustedes han despreciado
  alternatives_spanish:
  - Yo soy aquella a quien ustedes han despreciado
  - Yo soy la que ustedes han escarnecido
  lexicon: Coptic feminine relative construction
  rationale: La guía adjudicada señala una construcción femenina relativa que debe preservarse. En español, «la que» comunica con claridad la referencia femenina sin forzar una frase que suene arcaica; el femenino queda explícito en el pronombre relativo.
- source_word: ⲧⲛ̄ⲙⲉⲉⲩⲉ ⲉⲣⲟⲉⲓ
  english_pob_choice: you think about me
  chosen_spanish: ustedes piensan en mí
  alternatives_spanish:
  - ustedes me piensan
  - piensan en mí
  - me tienen presente
  lexicon: Crum; Layton
  rationale: La revisión señala que es una cláusula principal, no una relativa. «Ustedes piensan en mí» conserva el plural y el sentido reflexivo/atencional del verbo sin introducir una sintaxis ajena al coptico.
theological_decisions:
- issue: Mantenimiento de la voz femenina del hablante
  english_pob_reading: I am she whom you have scorned
  chosen_spanish_reading: Yo soy la que ustedes han despreciado
  alternative_spanish_readings:
  - Yo soy aquella a quien ustedes han despreciado
  - Yo soy la que ustedes han escarnecido
  rationale: La adjudicación insiste en que el coptico usa una relativa femenina. En español, se preserva esa referencia con «la que» para no neutralizar el género del hablante ni diluir la autoidentificación femenina característica del poema.
  doctrine_reference: 'Guía editorial del corpus: preservar el género gramatical y la voz poética del hablante cuando el original lo marca explícitamente.'
- issue: Valor semántico de la acción contra el hablante
  english_pob_reading: you have mocked me / scorned
  chosen_spanish_reading: se han burlado de mí / han despreciado
  alternative_spanish_readings:
  - me han escarnecido
  - me han ridiculizado
  - me han menospreciado
  rationale: El coptico presenta dos matices de menosprecio en los distintos miembros del pasaje. El español mantiene la tensión entre burla y desprecio para no aplanar la repetición poética ni borrar la diferencia semántica entre ambos verbos.
  doctrine_reference: Principio POB de no borrar tensiones léxicas documentadas en el texto fuente.
- issue: Relación entre aprendizaje y autoridad
  english_pob_reading: from me they learn
  chosen_spanish_reading: de mí aprenden
  alternative_spanish_readings:
  - aprenden de mí
  - son instruidos por mí
  - reciben enseñanza de mí
  rationale: 'La inversión poética del original conserva una paradoja: quien es negada como instruida es, a la vez, fuente de instrucción. «De mí aprenden» retiene esa relación sin convertirla en comentario explicativo.'
  doctrine_reference: Lectura poética y retórica del texto fuente; no doctrinal en sentido confesional, pero sí hermenéutico-editorial.
translation_notes:
  revision_awareness: 'Se incorporó la corrección adjudicada que rechaza la lectura «hidden» y entiende el verbo como «mocked / despised». También se preservó la observación de que la segunda mitad del pasaje no es una relativa continua, sino una cláusula principal: «y ustedes piensan en mí». Se atendió además la nota de que la voz es femenina y debe mantenerse explícita en español.'
  spanish_consistency_notes:
  - Se usa «Yo soy» para conservar la cadencia anafórica del discurso.
  - Se mantiene el femenino explícito con «la que» para reflejar la construcción coptica.
  - Se evita «instruida/ignorante» como calco excesivo en favor de una formulación natural en español.
  - 'Se evita «Cristo/Señor» u otra terminología ajena: el pasaje no lo requiere.'
  - Se distinguen «burlarse» y «despreciar» para no borrar la progresión semántica del original.
