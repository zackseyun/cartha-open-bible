  text: 'I am the one you have thought about[a],

    and you have mocked me.

    I am unlearned, and from me they learn.

    I am she whom you have scorned[g][f][e][d][c][b],

    and you think about me.'
  footnotes:
  - marker: a
    text: “Hidden” could also be rendered “concealed.”
    reason: lexical_alternative
  - marker: b
    text: “Unlearned” could be “ignorant” or “uneducated,” but those carry stronger pejorative tone.
    reason: lexical_alternative
  - marker: c
    text: “They learn from me” reflects the idiom “out from me”; some prefer “they are taught by me.”
    reason: lexical_alternative
  - marker: d
    text: “Scorned” can be translated “despised.”
    reason: lexical_alternative
  - marker: e
    text: The consult block reads “law / lawless,” which does not match this Coptic segment; this likely belongs to a different mapped line. The last ⲁⲛⲟⲕ ⲡⲉⲛ is truncated here.
    reason: alignment_note
  - marker: f
    text: Or 'and the one you have hidden.'.
    reason: previous_rendering
  - marker: g
    text: Or 'I am the one you have scorned,\nand the one you think about.'.
    reason: previous_rendering
