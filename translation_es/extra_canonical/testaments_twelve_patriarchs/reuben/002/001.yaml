translation:
  language: es
  text: Y ahora[a], mis hijos, escúchenme acerca de los siete espíritus del engaño que vi en mi arrepentimiento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y ahora mismo».'
    reason: alternative_reading
lexical_decisions:
- source_word: Καὶ νῦν
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Y ahora mismo
  - Pues ahora
  lexicon: καί; νῦν
  rationale: Mantiene la secuencia introductoria natural en español sin añadir intensidad que el griego no requiere.
- source_word: ἀκούσατέ μου
  english_pob_choice: hear me
  chosen_spanish: escúchenme
  alternatives_spanish:
  - óiganme
  - escúchenme, por favor
  lexicon: ἀκούω
  rationale: El imperativo plural pide una forma directa y pública; 'escúchenme' comunica bien la apelación oral del pasaje.
- source_word: τέκνα μου
  english_pob_choice: my children
  chosen_spanish: hijos míos
  alternatives_spanish:
  - mis hijos
  - hijitos míos
  lexicon: τέκνα
  rationale: '''Hijos míos'' es natural y conserva el tono afectivo-paternal sin infantilizarlo excesivamente.'
- source_word: τῶν ἑπτὰ πνευμάτων τῆς πλάνης
  english_pob_choice: the seven spirits of deceit
  chosen_spanish: los siete espíritus del engaño
  alternatives_spanish:
  - los siete espíritus de la mentira
  - los siete espíritus del error
  lexicon: πνεῦμα; πλάνη
  rationale: Se conserva 'espíritus' por la fuerza lexical de πνεύματα, y 'engaño' como equivalente amplio y idiomático de πλάνη, evitando estrecharlo solo a 'error' o solo a 'mentira'.
- source_word: ἐν τῇ μετανοίᾳ μου
  english_pob_choice: in my repentance
  chosen_spanish: en mi arrepentimiento
  alternatives_spanish:
  - en mi penitencia
  - cuando me arrepentí
  lexicon: μετάνοια
  rationale: En este contexto la noción predominante es de arrepentimiento/conversión, no un simple 'cambio de mente'; 'arrepentimiento' es claro y fiel.
theological_decisions:
- issue: Sentido de 'espíritus del engaño'
  english_pob_reading: spirits of deceit
  chosen_spanish_reading: espíritus del engaño
  alternative_spanish_readings:
  - espíritus de la mentira
  - espíritus del error
  rationale: Se mantiene la formulación personal/agentiva del texto, sin reducirla a abstracciones morales. 'Engaño' preserva el rango de πλάνη y el tono de influencias seductoras o desviadoras.
  doctrine_reference: Twelve Patriarchs, Reuben 2:1; semantic range of πλάνη
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacía falta cambiar el inglés POB; por eso el español sigue de cerca el sentido auditado, sin introducir expansiones interpretativas nuevas.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como norma general en el proyecto, pero este versículo no contiene el nombre divino.
  - Se mantiene 'espíritus' en plural por fidelidad al griego πνεύματα.
  - '''Arrepentimiento'' se emplea con valor moral y espiritual, acorde al contexto de confesión/exhortación.'
  - La puntuación y el vocativo siguen la sintaxis natural del español moderno sin desplazar el contenido del original.
