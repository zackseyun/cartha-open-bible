revisions:
- from: Y ahora[a], hijos míos, escúchenme acerca de lo que vi sobre los siete espíritus del engaño en mi arrepentimiento.
  to: Y ahora[a], mis hijos, escúchenme acerca de los siete espíritus del engaño que vi en mi arrepentimiento.
  rationale: Se ajusta la sintaxis para evitar la secuencia poco natural «acerca de lo que vi sobre» y expresar con más claridad ἃ εἶδον περὶ τῶν ἑπτὰ πνευμάτων. También se adopta «mis hijos» por fluidez natural en español contemporáneo, sin cambiar el sentido.
