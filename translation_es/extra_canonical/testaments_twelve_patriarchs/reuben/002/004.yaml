translation:
  language: es
  text: El primero es el espíritu de vida, con el cual se forma la constitución. El segundo es el espíritu de la vista, con el cual surge el deseo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Πρῶτον πνεῦμα ζωῆς
  english_pob_choice: The first is the spirit of life
  chosen_spanish: La primera es el espíritu de vida
  alternatives_spanish:
  - El primer espíritu es el de la vida
  - La primera es un espíritu de vida
  lexicon: πνεῦμα = espíritu; ζωῆς = de vida
  rationale: Sigo la estructura enumerativa del griego y del inglés POB. En español, «la primera» evita un sustantivo implícito extraño y mantiene el paralelismo con «la segunda». «Espíritu de vida» conserva la construcción genitiva sin añadir interpretaciones ajenas.
- source_word: σύστασις
  english_pob_choice: the constitution
  chosen_spanish: la constitución
  alternatives_spanish:
  - la composición
  - la constitución natural
  - la estructura
  lexicon: σύστασις = constitución, composición, formación
  rationale: «Constitución» es el equivalente español más cercano al uso del inglés POB y puede abarcar la idea de formación/estructura resultante. Evita reducir el término a una sola dimensión anatómica o filosófica sin necesidad textual.
- source_word: μεθ’ ἧς ... κτίζεται
  english_pob_choice: with which the constitution is formed
  chosen_spanish: con el cual se forma
  alternatives_spanish:
  - por medio del cual se forma
  - mediante el cual se constituye
  lexicon: κτίζω = formar, crear, constituir
  rationale: La preposición «con» reproduce el valor instrumental-relacional del griego y del inglés POB. «Se forma» es más natural en español que una construcción rígida con «constituir», aunque «constitución» se conserva como sustantivo del primer miembro.
- source_word: Δεύτερον πνεῦμα ὁράσεως
  english_pob_choice: The second is the spirit of sight
  chosen_spanish: La segunda es el espíritu de la vista
  alternatives_spanish:
  - La segunda es el espíritu de visión
  - La segunda es el espíritu de ver
  lexicon: ὅρασις/ὁράσεως = vista, visión
  rationale: «Vista» resulta más idiomático en español y conserva el campo semántico de percepción visual. «Visión» sería posible, pero puede sonar más abstracto; «la vista» mantiene mejor el paralelismo con «espíritu de vida».
- source_word: μεθ’ ἧς γίνεται ἐπιθυμία
  english_pob_choice: with which desire arises
  chosen_spanish: con el cual surge el deseo
  alternatives_spanish:
  - con la cual nace el deseo
  - por medio del cual aparece el deseo
  lexicon: γίνομαι = llegar a ser, surgir, acontecer; ἐπιθυμία = deseo
  rationale: «Surge» refleja bien la idea de aparición o surgimiento, sin exagerar hacia una causalidad más fuerte de la que el griego exige. «Deseo» es la equivalencia directa y mantiene el sentido moral/antropológico del pasaje.
theological_decisions:
- issue: Naturaleza de la relación instrumental entre los espíritus y sus efectos
  english_pob_reading: with which the constitution is formed; with which desire arises
  chosen_spanish_reading: con el cual se forma... con el cual surge...
  alternative_spanish_readings:
  - por el cual se forma... por el cual surge...
  - mediante el cual se forma... mediante el cual surge...
  rationale: El griego usa un relativo con valor instrumental. En español, «con el cual» conserva la relación sin forzar una interpretación causal más fuerte que la del texto. Esto respeta la tensión del pasaje entre cualidad interna y efecto producido.
  doctrine_reference: Antropología moral del Testamento de Rubén; relación entre disposiciones interiores y formación del carácter.
translation_notes:
  revision_awareness: 'La versión inglesa revisada eliminó una nota en el cuerpo del texto y afinó la relación instrumental hacia «with which». La redacción española sigue esa revisión: no introduce marca de nota en el texto principal y mantiene una solución instrumental sobria y cercana al griego.'
  spanish_consistency_notes:
  - Se mantiene «espíritu» en minúscula porque el contexto describe disposiciones o facultades humanas, no al Espíritu Santo.
  - Se usa «la primera / la segunda» para preservar el paralelismo ordinal del original.
  - «Constitución» y «deseo» se conservan como términos abstractos estables, evitando expansión interpretativa.
