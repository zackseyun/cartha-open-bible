base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/reuben/002/007.yaml
  text: The sixth is the spirit of taste, by which eating of foods and drinks comes to be, and strength is built up in it, because in foods is the basis of strength.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:42:00Z'
    unchanged: false
    changes_summary: 'Tightened wording for natural English and lexical accuracy: changed "the eating of foods and drinks" to "eating of foods and drinks," rendered κτίζεται more naturally as "is built up," and translated ὑπόστασις as "basis" to better reflect the source.'
translation:
  language: es
  text: El sexto es el espíritu del gusto, por el cual llega a haber el comer y beber, y en él se forma la fuerza, porque en los alimentos está la base de la fuerza.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πνεῦμα
  english_pob_choice: the spirit
  chosen_spanish: el espíritu
  alternatives_spanish:
  - el aliento
  - el viento
  lexicon: πνεῦμα
  rationale: Aquí el contexto enumera ‘espíritus’ funcionales; por eso se conserva ‘espíritu’ y no un sentido físico como ‘aliento’ o ‘viento’.
- source_word: γεύσεως
  english_pob_choice: of taste
  chosen_spanish: del gusto
  alternatives_spanish:
  - del sabor
  - de la degustación
  lexicon: γεῦσις
  rationale: ‘Gusto’ mantiene el campo semántico de taste en un registro natural en español y evita una frase más técnica o menos idiomática como ‘degustación’.
- source_word: γίνεται βρῶσις βρωμάτων τε καὶ πομάτων
  english_pob_choice: eating of foods and drinks comes to be
  chosen_spanish: llega a haber ingestión de alimentos y bebidas
  alternatives_spanish:
  - se produce la ingestión de alimentos y bebidas
  - llega a ser la comida de alimentos y bebidas
  lexicon: γίνομαι + βρῶσις
  rationale: La secuencia griega describe el surgimiento/realización del acto de comer y beber; ‘ingestión’ expresa bien el resultado sin forzar una construcción artificial en español.
- source_word: κτίζεται
  english_pob_choice: is built up
  chosen_spanish: se edifica
  alternatives_spanish:
  - se construye
  - es fortalecida
  lexicon: κτίζω
  rationale: El audit trail inglés optó por una imagen de edificación. En español, ‘se edifica’ conserva esa metáfora y suena más natural que un calco como ‘es construida’.
- source_word: ὑπόστασις
  english_pob_choice: basis
  chosen_spanish: base
  alternatives_spanish:
  - fundamento
  - sustento
  lexicon: ὑπόστασις
  rationale: ‘Base’ refleja la decisión inglesa ‘basis’ y transmite la idea de soporte o fundamento subyacente sin introducir una carga metafísica ajena al contexto.
theological_decisions:
- issue: Naturaleza de los ‘espíritus’ enumerados
  english_pob_reading: The sixth is the spirit of taste
  chosen_spanish_reading: El sexto es el espíritu del gusto
  alternative_spanish_readings:
  - El sexto es el espíritu del sabor
  - El sexto es el espíritu de la degustación
  rationale: No se introduce una reinterpretación teológica; se mantiene la personificación/lista funcional que presenta el texto, sin convertirla en una abstracción moral o alegórica.
  doctrine_reference: Anthropology in the Testaments of the Twelve Patriarchs
- issue: Relación causal entre gusto, comida y fuerza
  english_pob_reading: by which eating of foods and drinks comes to be, and strength is built up in it, because in foods is the basis of strength
  chosen_spanish_reading: por el cual llega a haber ingestión de alimentos y bebidas, y en él se edifica la fuerza, porque en los alimentos está la base de la fuerza
  alternative_spanish_readings:
  - por el cual se produce la ingestión de alimentos y bebidas, y en él se fortalece la fuerza
  - por el cual surge el comer y beber, y en él se construye la fuerza
  rationale: Se conserva la relación causal y la afirmación de que los alimentos son el soporte de la fuerza, sin suavizar la fuerza explicativa del original ni convertirla en una simple observación nutricional moderna.
  doctrine_reference: Lexical theology of body, appetite, and strength in the Testaments
translation_notes:
  revision_awareness: 'La redacción incorpora el ajuste del inglés POB revisado: ‘is built up’ y ‘basis’. Se evitó traducir mecánicamente ‘the eating of foods and drinks’ para producir una frase española más natural sin perder el contenido causal del griego.'
  spanish_consistency_notes:
  - Se usa ‘espíritu’ de manera consistente para πνεῦμα en este registro.
  - Se evita ‘SEÑOR’ o terminología litúrgica no presente en el pasaje.
  - ‘Base’ se mantiene como equivalente de ‘basis’ para reflejar la revisión inglesa y la relación causal del griego.
  - La metáfora de edificación se preserva con ‘se edifica’ para κτίζεται.
