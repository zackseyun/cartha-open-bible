  text: Ἕκτον πνεῦμα γεύσεως μεθ’ ἧς *γίνεται βρῶσις²³ *βρωμάτων τε καὶ πομάτων²⁴, καὶ ἰσχὺς ἐν αὐτῷ²⁵ κτίζεται *ὅτι ἐν βρώμασίν ἐστιν ἡ ὑπό- στασις τῆς ἰσχύος²⁶.
