revisions:
- from: El sexto es el espíritu del gusto, por el cual llega a haber ingestión de alimentos y bebidas, y en él se edifica la fuerza, porque en los alimentos está la base de la fuerza.
  to: El sexto es el espíritu del gusto, por el cual llega a haber el comer y beber, y en él se forma la fuerza, porque en los alimentos está la base de la fuerza.
  rationale: Se reemplaza ‘ingestión de alimentos y bebidas’ por ‘el comer y beber’ para reflejar βρῶσις de manera más natural y menos técnica en español. Se ajusta ‘se edifica la fuerza’ a ‘se forma la fuerza’ para conservar el sentido de κτίζεται con mejor fluidez. El resto del versículo permanece fiel al griego y al audit trail inglés.
