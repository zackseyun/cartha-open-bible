source:
  edition: Charles 1908 Greek Versions (pages 66-79, Reuben pilot)
  text: Διὰ τοῦτο *ἔσχατόν ἐστι τῆς κτίσεως³¹ καὶ πρῶτον τῆς νεότητος, ὅτι *ἀγνοίας πεπλήρωται³², καὶ αὕτη τὸν νεώτερον³³ ὁδηγεῖ ὥσπερ³⁴ τυφλὸν ἐπὶ βόθρον καὶ ὡς κτῆνος ἐπὶ κρημνόν³⁵.
