revisions:
- from: Por eso este espíritu es el último en la creación y el primero en la juventud, porque está lleno de ignorancia, y conduce al más joven como un ciego a un pozo y como un animal sobre un precipicio.
  to: Por eso este espíritu es el último en la creación y el primero en la juventud, porque está lleno de ignorancia, y conduce al más joven como un ciego a una fosa y como un animal por un precipicio.
  rationale: 'Se hicieron dos ajustes menores: ''pozo'' se cambió a ''fosa'' para reflejar mejor βόθρος en una imagen de caída, y ''sobre un precipicio'' se cambió a ''por un precipicio'' para un español más natural y una representación más clara del movimiento destructivo del original. El resto del texto se mantiene por ser fiel al griego y al POB inglés.'
