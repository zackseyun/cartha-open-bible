- from: Entonces se dieron siete espíritus contra el hombre, y estos son las cabezas de las obras de la juventud.
  to: Entonces fueron dados siete espíritus contra el hombre, y estas son las cabezas de las obras de la juvenilidad.[a]
  rationale: Se corrige el tramo final para reflejar mejor νεωτερισμοῦ conforme al inglés auditado «youthfulness». Se mantiene la metáfora «las cabezas» y la oposición «contra el hombre». También se ajusta la pasiva a «fueron dados» por mayor transparencia y dignidad estilística. Se añade una nota porque «juvenilidad» es fiel pero menos común en español, y la alternativa explicativa ayuda a la legibilidad sin sacrificar precisión.
