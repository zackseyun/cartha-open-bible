base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/reuben/002/002.yaml
  text: Then seven spirits were given against man, and these are the heads of the works of youthfulness.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:42:00Z'
    unchanged: false
    changes_summary: Simplified the opening to more natural English while preserving the source meaning; kept all source elements, including 'against man' and 'the heads of the works of youthfulness.'
translation:
  language: es
  text: Entonces se dieron siete espíritus contra el hombre, y estos son las cabezas de las obras de la juventud.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πνεύματα
  english_pob_choice: spirits
  chosen_spanish: espíritus
  alternatives_spanish:
  - alientos
  - vientos
  - espíritus malignos
  lexicon: πνεῦμα
  rationale: El griego usa πνεύματα en plural sin especificar “Santo”; en este contexto se mantiene el valor general de “espíritus”, conservando la ambigüedad y la fuerza personal del término, sin forzarlo a “alientos” ni a una identificación explícita que el texto no da.
- source_word: ἐδόθη
  english_pob_choice: were given
  chosen_spanish: se dieron
  alternatives_spanish:
  - fueron dados
  - les fueron dados
  lexicon: δίδωμι
  rationale: La pasiva impersonal española “se dieron” reproduce con naturalidad la pasiva del griego y conserva el hecho de concesión/otorgamiento sin añadir sujetos no expresados.
- source_word: κατὰ τοῦ ἀνθρώπου
  english_pob_choice: against man
  chosen_spanish: contra el hombre
  alternatives_spanish:
  - contra el ser humano
  - en contra del hombre
  lexicon: κατά + genitivo; ἄνθρωπος
  rationale: “Contra el hombre” sigue de cerca la oposición del original y preserva el alcance genérico de ἄνθρωπος; “ser humano” suaviza algo la formulación, pero aquí “hombre” mantiene mejor la correspondencia con el texto fuente.
- source_word: αἱ κεφαλαὶ
  english_pob_choice: the heads
  chosen_spanish: las cabezas
  alternatives_spanish:
  - los jefes
  - los principales
  lexicon: κεφαλή
  rationale: Se conserva la imagen literal “cabezas”, porque el texto identifica esos espíritus como “las cabezas” de las obras, y traducir por “jefes” interpretaría más de lo que el griego dice.
- source_word: τῶν ἔργων τοῦ νεωτερισμοῦ
  english_pob_choice: of the works of youthfulness
  chosen_spanish: de las obras de la juventud
  alternatives_spanish:
  - de las obras de la juventud impetuosa
  - de las obras de la inmadurez
  lexicon: νεωτερισμός
  rationale: El sustantivo νεωτερισμός alude a novedad/juventud/impulso de lo nuevo; en este contexto, “juventud” ofrece un español claro y sobrio. Se evita “inmadurez” porque introduce una interpretación moral no explícita, y “juventud impetuosa” añade más de lo que el término exige.
theological_decisions:
- issue: Naturaleza de los “siete espíritus”
  english_pob_reading: Then seven spirits were given against man
  chosen_spanish_reading: Entonces se dieron siete espíritus contra el hombre
  alternative_spanish_readings:
  - Entonces se dieron siete espíritus malignos contra el hombre
  - Entonces se dieron siete espíritus para oponerse al hombre
  rationale: La fuente no identifica explícitamente estos espíritus como “malignos”; por ello la traducción conserva la formulación abierta del griego y del inglés auditado. Añadir “malignos” cerraría una decisión interpretativa no garantizada por el texto inmediato.
  doctrine_reference: Lectura prudente del texto; evitar sobreespecificación demonológica no explicitada en el original.
- issue: Valor de νεωτερισμοῦ
  english_pob_reading: the works of youthfulness
  chosen_spanish_reading: las obras de la juventud
  alternative_spanish_readings:
  - las obras de la novedad
  - las obras de la juventud impetuosa
  rationale: El contexto refleja una personificación de impulsos o tendencias asociadas a la juventud/novedad; “juventud” es la opción menos interpretativa que sigue siendo inteligible en español. “Novedad” sería posible etimológicamente, pero en español suena demasiado abstracto aquí.
  doctrine_reference: No aplica una doctrina específica; decisión semántica contextual.
translation_notes:
  revision_awareness: 'La revisión inglesa simplificó la apertura a “Then seven spirits were given against man” desde una formulación más pesada, pero mantuvo intactos los dos ejes semánticos principales: la concesión pasiva de siete espíritus y su orientación “against man”. La versión española sigue esa lectura revisada y conserva también “the heads of the works of youthfulness” sin introducir especificaciones ajenas al texto.'
  spanish_consistency_notes:
  - Mantengo “espíritus” en minúscula porque no hay indicio textual suficiente para capitalización reverencial.
  - Conservo “el hombre” como genérico y no como varón individual, acorde con ἀνθρώπου.
  - “Las cabezas” se deja literal para reflejar la imagen del griego; no se sustituye por una interpretación funcional.
  - “Juventud” se entiende en sentido semántico amplio y no como alusión biográfica concreta.
