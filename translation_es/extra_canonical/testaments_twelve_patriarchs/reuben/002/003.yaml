translation:
  language: es
  text: Y se le dieron siete espíritus más en la creación, para que en ellos estuviera toda obra humana.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πνεύματα
  english_pob_choice: spirits
  chosen_spanish: espíritus
  alternatives_spanish:
  - espíritus
  - alientos
  - vientos
  lexicon: πνεῦμα
  rationale: El texto griego usa πνεύματα en plural; en español, ‘espíritus’ conserva el valor personal/animado que el POB inglés refleja con ‘spirits’. ‘Alientos’ o ‘vientos’ no se ajustan bien al contexto inmediato.
- source_word: ἐδόθη
  english_pob_choice: were given
  chosen_spanish: se le dieron
  alternatives_spanish:
  - le fueron dados
  - fueron dados a él
  lexicon: δίδωμι
  rationale: 'La pasiva impersonal en español naturaliza el orden sin perder el sentido de recepción: algo le fue concedido a él.'
- source_word: ἐπὶ τῆς κτίσεως
  english_pob_choice: at creation
  chosen_spanish: en la creación
  alternatives_spanish:
  - al momento de la creación
  - desde la creación
  lexicon: κτίσις
  rationale: La preposición con κτίσις aquí marca marco temporal/originario. ‘En la creación’ es la forma más sobria y fiel para indicar ese momento de otorgamiento.
- source_word: πᾶν ἔργον ἀνθρώπου
  english_pob_choice: every work of man
  chosen_spanish: toda obra humana
  alternatives_spanish:
  - toda obra del hombre
  - cada obra del ser humano
  lexicon: ἔργον / ἄνθρωπος
  rationale: ‘Toda obra humana’ conserva la fuerza distributiva de πᾶν ἔργον y evita un masculino genérico innecesario. También suena más idiomático en español que ‘cada obra del hombre’.
theological_decisions:
- issue: Naturaleza de los ‘siete espíritus’
  english_pob_reading: seven other spirits
  chosen_spanish_reading: siete espíritus más
  alternative_spanish_readings:
  - siete espíritus adicionales
  - otros siete espíritus
  rationale: La versión inglesa mantiene la literalidad de ‘spirits’ y no identifica aquí una referencia doctrinal más específica. El español conserva esa misma apertura interpretativa sin armonizar prematuramente el pasaje.
  doctrine_reference: No se impone identificación pneumatológica específica; se preserva la ambigüedad del texto base.
translation_notes:
  revision_awareness: El control cruzado más reciente indica alta concordancia con el texto fuente y no registró cambios necesarios; por eso la redacción española sigue de cerca el griego y el POB inglés sin introducir expansiones interpretativas.
  spanish_consistency_notes:
  - Se usa ‘espíritus’ en plural para πνεύματα, manteniendo la correspondencia directa con el griego y con la decisión inglesa.
  - Se evita ‘SEÑOR’ y otras sustituciones no presentes en este versículo.
  - ‘En la creación’ refleja el marco temporal de ἐπὶ τῆς κτίσεως sin añadir elementos ajenos al texto.
