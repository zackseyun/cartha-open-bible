  text: Τρίτον πνεῦμα ἀκοῆς μεθ’ ἧς γίνεται¹⁷ διδασκαλία. Τέταρτον πνεῦμα¹⁸ ὀσφρήσεως, μεθ’ ἧς *γίνονται γεύσεις δεδομέναι¹⁹ *εἰς ὁλκὴν²⁰ ἀέρος καὶ ἀναπνοῆς²¹.
