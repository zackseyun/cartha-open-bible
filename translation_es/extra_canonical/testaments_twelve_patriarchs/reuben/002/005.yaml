base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/reuben/002/005.yaml
  text: The third is the spirit of hearing, by which instruction comes to be. The fourth is the spirit of smell, by which tastes are given for the drawing in of air and breath.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:42:00Z'
    unchanged: false
    changes_summary: Changed “produced” to “given” to better reflect δεδομέναι and retain the source’s more direct wording.
translation:
  language: es
  text: El tercero es el espíritu del oír, por medio del cual viene la instrucción. El cuarto es el espíritu del olfato, por medio del cual se dan los sabores para la atracción del aire y del aliento.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πνεῦμα ἀκοῆς
  english_pob_choice: the spirit of hearing
  chosen_spanish: el espíritu del oír
  alternatives_spanish:
  - el espíritu de la audición
  - el espíritu de escuchar
  lexicon: πνεῦμα; ἀκοή
  rationale: Conservo la estructura posesiva y la fuerza abstracta de ἀκοή. «Del oír» mantiene la conexión con el acto/sentido de oír sin introducir una nominalización más técnica que el griego no exige.
- source_word: διδασκαλία
  english_pob_choice: instruction
  chosen_spanish: la instrucción
  alternatives_spanish:
  - la enseñanza
  - la doctrina
  lexicon: διδασκαλία
  rationale: «Instrucción» refleja bien el sentido de formación/enseñanza en este contexto y evita cargar el término con el matiz confesional de «doctrina», que sería más estrecho en español.
- source_word: πνεῦμα ὀσφρήσεως
  english_pob_choice: the spirit of smell
  chosen_spanish: el espíritu del olfato
  alternatives_spanish:
  - el espíritu del olor
  - el espíritu de oler
  lexicon: πνεῦμα; ὀσφρήσεως
  rationale: «Olfato» es el sustantivo natural en español para el sentido de smell. «Del olor» sería menos preciso, y «de oler» suena demasiado verbal para el paralelismo con el griego.
- source_word: γεύσεις δεδομέναι
  english_pob_choice: tastes are given
  chosen_spanish: se dan los sabores
  alternatives_spanish:
  - se otorgan los sabores
  - los sabores son dados
  lexicon: γεύσεις; δεδομέναι
  rationale: La revisión inglesa optó por «given» para respetar δεδομέναι; en español, la pasiva refleja «se dan» conserva esa direccionalidad sin forzar una pasiva perifrástica menos natural.
- source_word: εἰς ὁλκὴν ἀέρος καὶ ἀναπνοῆς
  english_pob_choice: for the drawing in of air and breath
  chosen_spanish: para la atracción del aire y del aliento
  alternatives_spanish:
  - para el atraer del aire y del aliento
  - para la inhalación de aire y aliento
  lexicon: ὁλκή; ἀήρ; ἀναπνοή
  rationale: «Atracción» conserva la imagen de un ‘tirar hacia dentro’ asociada a ὁλκή. Mantengo «aire y aliento» para no colapsar ἀήρ y ἀναπνοή, aunque el español no reproduce exactamente la diferencia semántica del griego.
theological_decisions:
- issue: Relación entre «espíritu» y los sentidos/funciones humanos
  english_pob_reading: The third is the spirit of hearing... The fourth is the spirit of smell...
  chosen_spanish_reading: El tercero es el espíritu del oír... El cuarto es el espíritu del olfato...
  alternative_spanish_readings:
  - El tercer espíritu es el del oído...
  - El tercero es el espíritu de la audición...
  rationale: Sigo el paralelismo del texto griego y la formulación inglesa POB, sin reinterpretar «espíritu» como simple facultad psicológica. En español, «espíritu del oír/olfato» conserva mejor la personificación o clasificación del pasaje.
  doctrine_reference: Antropología del libro de los Testamentos de los Doce Patriarcas; preservación del paralelismo de facultades/espíritus sin armonización doctrinal externa.
translation_notes:
  revision_awareness: Tomé en cuenta la revisión inglesa más reciente, que cambió «produced» por «given» para ajustar mejor δεδομέναι. En español, esto se refleja en «se dan los sabores», evitando una formulación causal más interpretativa.
  spanish_consistency_notes:
  - Conservo «espíritu» en minúscula porque aquí no designa de manera inequívoca al Espíritu Santo.
  - Uso «Yahvé» no aplica en este versículo.
  - Mantengo un registro sobrio y literal, evitando sustituciones litúrgicas no atestiguadas por el griego.
  - No añadí notas al pie porque no hay una variante textual o ambigüedad española que requiera anclaje explícito en este pasaje.
