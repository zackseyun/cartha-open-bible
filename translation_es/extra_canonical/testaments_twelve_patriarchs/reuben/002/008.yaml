id: T12P.REU.2.8
reference: Testament of Reuben 2:8
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 66-79, Reuben pilot)
  text: Ἕβδομον πνεῦμα σπορᾶς καὶ συνουσίας²⁷, μεθ’ ἧς συνέρχονται²⁸ διὰ τῆς φιληδονίας²⁹ ἁμαρτίαι³⁰.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/reuben/002/008.yaml
  text: The seventh is the spirit of procreation and union, through which sins come together through love of pleasure.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:42:00Z'
    unchanged: false
    changes_summary: Changed 'intercourse' to 'union' for a more neutral formal rendering of συνουσίας, and 'by which' to 'through which' to better reflect μεθ’ ἧς. Adjusted 'the love of pleasure' to 'love of pleasure' for smoother English while preserving φιληδονίας.
translation:
  language: es
  text: El séptimo es el espíritu de la procreación y de la unión, por medio de la cual se reúnen los pecados por amor al placer.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πνεῦμα
  english_pob_choice: spirit
  chosen_spanish: espíritu
  alternatives_spanish:
  - Espíritu
  - aliento
  lexicon: πνεῦμα
  rationale: Se conserva «espíritu» porque el contexto enumera fuerzas o impulsos morales, no el Espíritu Santo. «Aliento» sería demasiado físico y no reflejaría el patrón de la lista.
- source_word: σπορᾶς
  english_pob_choice: procreation
  chosen_spanish: procreación
  alternatives_spanish:
  - engendramiento
  - generación
  lexicon: σπορά
  rationale: «Procreación» transmite el sentido reproductivo con dignidad y claridad en español contemporáneo, sin volverlo biológico en exceso.
- source_word: συνουσίας
  english_pob_choice: union
  chosen_spanish: unión
  alternatives_spanish:
  - coito
  - relación sexual
  - intercurso
  lexicon: συνουσία
  rationale: Se sigue la decisión revisada de evitar un término demasiado explícito o clínico; «unión» conserva la neutralidad formal del audit trail inglés y permite el matiz relacional del griego.
- source_word: διὰ τῆς φιληδονίας
  english_pob_choice: through love of pleasure
  chosen_spanish: por amor al placer
  alternatives_spanish:
  - por el amor al placer
  - a causa del amor al placer
  - por la afición al placer
  lexicon: φιληδονία
  rationale: «Amor al placer» reproduce la fuerza nominal compuesta de φιληδονία sin domesticarla a «hedonismo», que sería más interpretativo. La preposición «por» mantiene el valor causal/instrumental de διὰ con artículo.
- source_word: συνέρχονται ... ἁμαρτίαι
  english_pob_choice: sins come together
  chosen_spanish: se reúnen los pecados
  alternatives_spanish:
  - se juntan los pecados
  - convergen los pecados
  - los pecados se congregan
  lexicon: συνέρχομαι
  rationale: «Se reúnen» conserva la imagen de convergencia del verbo griego y respeta el plural explícito «pecados» sin añadir una explicación moral que no está en el texto.
theological_decisions:
- issue: Naturaleza del 'séptimo espíritu' en una lista de impulsos/propensiones
  english_pob_reading: The seventh is the spirit of procreation and union...
  chosen_spanish_reading: El séptimo es el espíritu de la procreación y de la unión...
  alternative_spanish_readings:
  - El séptimo es el espíritu de la procreación y del acto sexual...
  - El séptimo es el impulso de procreación y unión...
  rationale: Se mantiene «espíritu» porque el texto clasifica una disposición interior o poder moral, no una persona. «Impulso» era posible, pero debilita la correspondencia con πνεῦμα y con la tradición de enumerar «espíritus» en este pasaje.
  doctrine_reference: Antropología moral del Testamento de Rubén; uso descriptivo de πνεῦμα en listas de inclinaciones.
- issue: Relación entre unión/procreación y la llegada de pecados
  english_pob_reading: through which sins come together through love of pleasure
  chosen_spanish_reading: por medio de la cual se reúnen los pecados por amor al placer
  alternative_spanish_readings:
  - por la cual se juntan los pecados por amor al placer
  - por medio de la cual los pecados se congregan a causa del amor al placer
  rationale: La cláusula se conserva causal e instrumentalmente sin suavizar la afirmación moral del texto. No se introduce una explicación ética externa; simplemente se refleja que este 'espíritu' es el medio por el cual los pecados convergen.
  doctrine_reference: Advertencia moral del Testamento de Rubén sobre pasiones desordenadas.
translation_notes:
  revision_awareness: 'Se tomó en cuenta la revisión inglesa más reciente: se evitó un equivalente explícito de ''intercourse'' y se siguió la opción más neutra ''union''. También se mantuvo el giro ''through which'' con una construcción española instrumental-natural (''por medio de la cual'').'
  spanish_consistency_notes:
  - Se conservó el registro sobrio y audit-able del POB, evitando glosas explicativas no ancladas en el griego.
  - Se prefirió «procreación» sobre alternativas más técnicas o eufemísticas para mantener claridad y dignidad.
  - No se usó «Cristo», «SEÑOR» ni otros términos no presentes en el versículo.
  - La puntuación refleja una lectura continua, con la cláusula final causal separada para facilitar la comprensión sin alterar la sintaxis del griego.
