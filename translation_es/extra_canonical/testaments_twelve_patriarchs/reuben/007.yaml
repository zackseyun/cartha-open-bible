translation:
  language: es
  text: Y Rubén murió[a], después de haber mandado estas cosas a sus hijos. Y lo pusieron en un ataúd hasta que fuera sacado de Egipto y sepultado en Hebrón[b], en la cueva donde estaban sus padres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El testimonio griego suministrado para este capítulo es muy breve y se interrumpe después de 'hasta'; la continuación se vierte con el mínimo complemento necesario a partir del contexto narrativo del testamento.
    reason: textual_variant
  - marker: b
    text: Hebrón y la cueva de los padres evocan la tradición de sepultura ancestral en Génesis.
    reason: cross_reference
lexical_decisions:
- source_word: ἀπέθανε
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - falleció
  - durmió
  lexicon: LSJ
  rationale: El verbo griego es el verbo ordinario de morir; en español, 'murió' mantiene la franqueza del enunciado sin añadir matiz eufemístico.
- source_word: ἐντειλάμενος
  english_pob_choice: after commanding
  chosen_spanish: después de haber mandado
  alternatives_spanish:
  - después de haber encargado
  - después de haber instruido
  lexicon: LSJ
  rationale: El participio expresa una acción anterior a la muerte. 'Mandado' conserva el peso testamentario y la autoridad de la acción mejor que una formulación más débil como 'instruido'.
- source_word: υἱοῖς
  english_pob_choice: sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  - sus descendientes
  lexicon: LSJ
  rationale: Aunque el griego dice literalmente 'hijos', en español 'sus hijos' es natural y suficientemente preciso en este contexto patriarcal. 'Hijos varones' sería más explícito, pero más pesado; 'descendientes' perdería la referencia familiar directa.
- source_word: ἔθεντο
  english_pob_choice: they placed
  chosen_spanish: lo pusieron
  alternatives_spanish:
  - lo colocaron
  - lo depositaron
  lexicon: LSJ
  rationale: El verbo simple de acción funeraria se rinde con una forma directa y natural en español. 'Lo pusieron' conserva la llaneza del griego y funciona bien con el complemento funerario.
- source_word: σορῷ
  english_pob_choice: coffin
  chosen_spanish: ataúd
  alternatives_spanish:
  - féretro
  - cofre funerario
  lexicon: LSJ
  rationale: '''Ataúd'' es el equivalente más claro y publicable en español. ''Féretro'' también sería posible, pero ''ataúd'' resulta más inmediato; ''cofre funerario'' suena demasiado técnico y menos natural.'
- source_word: ἕως
  english_pob_choice: until
  chosen_spanish: hasta que
  alternatives_spanish:
  - hasta el momento en que
  - hasta
  lexicon: LSJ
  rationale: La preposición temporal truncada pide una construcción que conserve la expectativa de un evento posterior. 'Hasta que' transmite mejor el sentido abierto del texto fragmentario que un simple 'hasta'.
- source_word: Ἐξ Αἰγύπτου
  english_pob_choice: from Egypt
  chosen_spanish: de Egipto
  alternatives_spanish:
  - desde Egipto
  lexicon: LSJ
  rationale: La procedencia se expresa de forma natural con 'de Egipto'. 'Desde Egipto' enfatiza el punto de partida, pero aquí la frase funciona mejor como origen de traslado.
- source_word: Ἐν Χεβρών
  english_pob_choice: in Hebron
  chosen_spanish: en Hebrón
  alternatives_spanish:
  - en Hebrón
  lexicon: LSJ
  rationale: Se conserva el topónimo tradicional en español con la grafía habitual 'Hebrón'.
theological_decisions:
- issue: Cómo reflejar el texto griego truncado después de ἕως sin sobretraducir
  english_pob_reading: Translate the extant burial notice straightforwardly and complete the sense only to the minimum extent required by the known narrative context of patriarchal reburial in Hebron.
  chosen_spanish_reading: Traducir de forma directa el aviso funerario conservado y completar el sentido solo en la medida mínima que exige el contexto narrativo conocido de la reinhumación patriarcal en Hebrón.
  alternative_spanish_readings:
  - Dejar la frase fragmentaria y traducir solo las palabras conservadas
  - Reconstituir un final más amplio a partir de otros testigos
  rationale: El testimonio griego provisto es muy breve y se corta en ἕως. La redacción española debe ser útil y legible, pero sin fingir una reconstrucción mayor que la permitida por el testimonio. Por eso se conserva la cautela textual y solo se completa lo indispensable para que la oración sea publicable.
  doctrine_reference: 'PHILOSOPHY.md: primacía de la fuente original; transparencia ante la complejidad textual'
- issue: Cómo expresar la mención funeraria de 'coffin' sin imponer un registro eclesiástico arcaizante
  english_pob_reading: coffin
  chosen_spanish_reading: ataúd
  alternative_spanish_readings:
  - féretro
  - caja funeraria
  rationale: En español, 'ataúd' comunica claramente el objeto funerario sin desplazar el tono sobrio del pasaje. Se evita 'féretro' por ser más solemne y menos común, y se evita una perífrasis innecesaria.
  doctrine_reference: Terminología funeraria común en español bíblico y moderno
- issue: Cómo entender 'Hebron and the cave of the fathers' como eco tradicional de Génesis
  english_pob_reading: Hebron in the cave where his fathers were
  chosen_spanish_reading: Hebrón, en la cueva donde estaban sus padres
  alternative_spanish_readings:
  - Hebrón, en la cueva de sus padres
  - Hebrón, en la cueva ancestral
  rationale: La frase conserva la alusión a la sepultura patriarcal sin añadir más explícitamente de lo que el texto de referencia permite. 'Donde estaban sus padres' mantiene la relación familiar y la resonancia tradicional con Génesis sin sobrerreformularla.
  doctrine_reference: Referencia cultural-bíblica a la sepultura de los patriarcas
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el borrador quedó sin modificaciones adicionales después del pase del modelo indicado.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino ni un equivalente griego que lo requiera.
  - '''Mesías/Cristo'' no aparece en el pasaje.'
  - Se conserva el nombre propio 'Rubén' y el topónimo 'Egipto/Hebrón' con formas españolas estándar.
  - La cadencia de las dos oraciones sigue de cerca el orden del griego sin forzar calcos innecesarios.
