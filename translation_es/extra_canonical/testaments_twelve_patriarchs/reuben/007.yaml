  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/reuben/007.yaml
  text: And Reuben died[a], after commanding these things to his sons. And they placed him in a coffin until he was brought up from Egypt and buried in Hebron[b], in the cave where his fathers were.
  footnotes:
