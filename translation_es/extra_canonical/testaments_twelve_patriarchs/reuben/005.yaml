translation:
  language: es
  text: 1[a]. Porque malas son las mujeres, hijos míos; y como no tienen autoridad ni poder sobre un hombre, maquinan[b] por medio de su apariencia cómo atraerlo hacia sí. 2. Y al que no logran encantar por la apariencia, a ese lo vencen por medio del engaño. 3[c]. Pues también un ángel de Dios me habló acerca de ellas y me enseñó que las mujeres son vencidas por el espíritu de la inmoralidad sexual más que un hombre, y en su corazón maquinan contra los hombres; y por el adorno extravían sus mentes, y por una mirada siembran el veneno, y primero en el pensamiento y luego por el acto los cautivan. 4. Porque una mujer no puede forzar a un hombre abiertamente, sino que con un modo de ramera actúa con astucia contra él. 5. Por tanto, huyan de la inmoralidad sexual, hijos míos, y manden a sus esposas y a sus hijas que no adornen sus cabezas y sus rostros para el engaño de la mente; porque toda mujer que usa engaño en estas cosas está reservada para castigo eterno. 6. Porque de este modo también
    encantaron a los Vigilantes[d] antes del diluvio; pues, al mirarlas continuamente, también llegaron a desearlas, y concibieron la obra en su mente; porque se iban cambiando en forma de hombres y se aparecían a ellas mientras estaban con sus maridos. 7. Y ellas también, deseando en su mente la apariencia de ellos, dieron a luz gigantes. Porque los Vigilantes aparecieron a ellas como si alcanzaran hasta el cielo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'por su forma exterior' en los versículos 1–2; el término griego puede denotar apariencia, figura o presentación.
    reason: lexical_alternative
  - marker: b
    text: Aquí 'maquinan' refleja el matiz de intriga y planificación maliciosa del griego.
    reason: lexical_alternative
  - marker: c
    text: '''Vigilantes'' designa seres celestiales conocidos en tradiciones judías sobre el tiempo anterior al diluvio; compárese Génesis 6 en la tradición interpretativa posterior, especialmente 1 Enoc.'
    reason: cross_reference
  - marker: d
    text: 'La cláusula final puede entenderse hiperbólicamente: los Vigilantes aparecían a las mujeres como si se alzaran hasta el cielo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Πονηραὶ
  english_pob_choice: evil
  chosen_spanish: malas
  alternatives_spanish:
  - malvadas
  - malignas
  lexicon: LSJ
  rationale: En el exordio exhortativo del testamento, 'malas' mantiene el juicio moral directo sin sonar más técnico o más cargado de lo que exige el griego; no atenúa la advertencia, y en español resulta más natural que 'evil' traducido mecánicamente como 'malvadas' en este contexto retórico.
- source_word: δολιεύονται
  english_pob_choice: scheme
  chosen_spanish: maquinan
  alternatives_spanish:
  - urden
  - traman
  lexicon: LSJ
  rationale: El verbo griego expresa astucia deliberada y continua; 'maquinar' comunica bien la intención calculada sin perder el matiz de plan malicioso.
- source_word: σχήμασιν / τοῦ σχήματος
  english_pob_choice: appearance
  chosen_spanish: apariencia
  alternatives_spanish:
  - forma
  - presentación exterior
  lexicon: LSJ
  rationale: '''Apariencia'' reproduce el campo semántico de la expresión exterior usada para seducir, y funciona de modo natural en español.'
- source_word: ἐπισπάσωνται
  english_pob_choice: draw ... to themselves
  chosen_spanish: atraerlo hacia sí
  alternatives_spanish:
  - jalarlo hacia sí
  - arrastrarlo hacia sí
  lexicon: LSJ
  rationale: La imagen de atracción o arrastre queda preservada; 'hacia sí' refleja el movimiento reflexivo del griego.
- source_word: καταγοητεῦσασθαι
  english_pob_choice: enchant
  chosen_spanish: encantar
  alternatives_spanish:
  - hechizar
  - embaucar
  lexicon: LSJ
  rationale: '''Encantar'' conserva la fuerza de seducción engañosa del verbo sin introducir una connotación demasiado folclórica.'
- source_word: ἀπάτης
  english_pob_choice: deceit
  chosen_spanish: engaño
  alternatives_spanish:
  - fraude
  - ardid
  lexicon: LSJ
  rationale: '''Engaño'' es el equivalente más transparente y moralmente cargado en español para este sustantivo.'
- source_word: ἡττῶνται τῷ πνεύματι τῆς πορνείας
  english_pob_choice: are overcome by the spirit of sexual immorality
  chosen_spanish: son vencidas por el espíritu de la inmoralidad sexual
  alternatives_spanish:
  - son dominadas por el espíritu de fornicación
  - son derrotadas por el espíritu de impureza sexual
  lexicon: LSJ
  rationale: Se conserva el pasivo de ser superadas y la fuerza espiritual/personificada de πνεῦμα; 'inmoralidad sexual' sigue la pauta POB para πορνεία sin borrar el carácter de vicio.
- source_word: πορνείας
  english_pob_choice: sexual immorality
  chosen_spanish: inmoralidad sexual
  alternatives_spanish:
  - fornicación
  - pecado sexual
  lexicon: LSJ
  rationale: '''Inmoralidad sexual'' es idiomático en español actual y retiene la amplitud del término griego mejor que una traducción demasiado estrecha.'
- source_word: μηχανῶνται
  english_pob_choice: devise schemes
  chosen_spanish: maquinan
  alternatives_spanish:
  - traman
  - planean
  lexicon: LSJ
  rationale: El verbo sugiere intriga interior y planificación; 'maquinar' une bien la idea de pensamiento activo y torcido.
- source_word: διὰ τῆς κοσμήσεως
  english_pob_choice: by adornment
  chosen_spanish: por medio del adorno
  alternatives_spanish:
  - mediante el adorno
  - con adornos
  lexicon: LSJ
  rationale: '''Adorno'' traduce el medio concreto indicado por el griego sin exagerar hacia ''lujo'' o ''arreglo''.'
- source_word: πλανῶσι ... τὰς διανοίας
  english_pob_choice: lead their minds astray
  chosen_spanish: extravían sus mentes
  alternatives_spanish:
  - desvían sus pensamientos
  - engañan sus mentes
  lexicon: LSJ
  rationale: '''Extraviar'' comunica bien el desvío moral/intencional del intelecto o la mente; se mantiene el plural posesivo directo del griego.'
- source_word: διὰ τοῦ βλέμματος τὸν ἰὸν ἐνσπείρουσι
  english_pob_choice: through a glance they sow the poison
  chosen_spanish: por una mirada siembran el veneno
  alternatives_spanish:
  - con la mirada siembran el veneno
  - por su mirada inoculan el veneno
  lexicon: LSJ
  rationale: El español reproduce la metáfora de sembrar algo dañino mediante la mirada; 'veneno' conserva la imagen vívida de corrupción.
- source_word: τῷ ἔργῳ αἰχμαλωτίζουσιν
  english_pob_choice: by the act they take captive
  chosen_spanish: luego por el acto los cautivan
  alternatives_spanish:
  - y por la acción los cautivan
  - y por la obra los hacen cautivos
  lexicon: LSJ
  rationale: Se mantiene la progresión pensamiento-acto y la metáfora de cautiverio; 'cautivan' resulta claro en español sin borrar la violencia conceptual.
- source_word: εἰς πρόσωπον
  english_pob_choice: openly
  chosen_spanish: abiertamente
  alternatives_spanish:
  - de frente
  - cara a cara
  lexicon: LSJ
  rationale: La expresión idiomática en español transmite mejor la oposición a la fuerza abierta que un calco más literal.
- source_word: ἐν σχήματι πορνικοῖς
  english_pob_choice: by a harlot's manner
  chosen_spanish: con un modo de ramera
  alternatives_spanish:
  - con semblante de prostituta
  - en forma seductora
  lexicon: LSJ
  rationale: Se conserva el matiz sexualmente degradado del griego sin convertirlo en una paráfrasis demasiado suave; 'ramera' refleja mejor el tono duro del texto.
- source_word: πανουργεύεται
  english_pob_choice: acts craftily against him
  chosen_spanish: actúa con astucia contra él
  alternatives_spanish:
  - obra con engaño contra él
  - lo maneja con malicia
  lexicon: LSJ
  rationale: La construcción recoge tanto la astucia como la dirección adversativa hacia el hombre.
- source_word: Λοιπὸν φεύγετε
  english_pob_choice: Therefore flee
  chosen_spanish: Por tanto, huyan
  alternatives_spanish:
  - Así que huyan
  - Entonces huyan
  lexicon: LSJ
  rationale: '''Huyan'' preserva la urgencia imperativa y el movimiento de escape del verbo griego.'
- source_word: προστάσσετε
  english_pob_choice: command
  chosen_spanish: manden
  alternatives_spanish:
  - ordenen
  - exijan
  lexicon: LSJ
  rationale: '''Mandar'' expresa bien la fuerza exhortativa del testamento y su tono paterno-directivo.'
- source_word: πρὸς ἀπάτην διανοίας
  english_pob_choice: for the deception of the mind
  chosen_spanish: para el engaño de la mente
  alternatives_spanish:
  - para engañar la mente
  - para el fraude mental
  lexicon: LSJ
  rationale: Mantiene la relación final de propósito y la referencia a la mente como lugar de engaño.
- source_word: κόλασιν αἰώνιον
  english_pob_choice: eternal punishment
  chosen_spanish: castigo eterno
  alternatives_spanish:
  - pena eterna
  - tormento eterno
  lexicon: LSJ
  rationale: '''Castigo'' es claro, sobrio y fiel al sentido judicial de κόλασις.'
- source_word: τετήρηται
  english_pob_choice: is reserved
  chosen_spanish: está reservada
  alternatives_spanish:
  - ha sido guardada
  - está guardada
  lexicon: LSJ
  rationale: El perfecto pasivo se refleja bien con 'está reservada', que suena natural y conserva la idea de estar apartada para juicio.
- source_word: Ἐγρηγόρους
  english_pob_choice: Watchers
  chosen_spanish: Vigilantes
  alternatives_spanish:
  - Observadores
  - Guardianes
  lexicon: LSJ
  rationale: Se usa el término tradicional de tradición judía tardía en español, conservando el intertexto sin domesticarlo.
- source_word: συνεχῶς
  english_pob_choice: continually
  chosen_spanish: continuamente
  alternatives_spanish:
  - sin cesar
  - constantemente
  lexicon: LSJ
  rationale: '''Continuamente'' reproduce la duración repetida sin añadir énfasis excesivo.'
- source_word: συνέλαβον τῇ διανοίᾳ τὴν πρᾶξιν
  english_pob_choice: they conceived the deed in their mind
  chosen_spanish: concibieron la obra en su mente
  alternatives_spanish:
  - concibieron el acto en su mente
  - formaron la acción en su mente
  lexicon: LSJ
  rationale: '''Concibieron'' y ''en su mente'' conservan el proceso interno previo a la acción; ''obra'' deja abierta la referencia al hecho consumado en un registro más cercano al español bíblico.'
- source_word: μετεσχηματίζοντο
  english_pob_choice: they were changing themselves into the form of
  chosen_spanish: se iban cambiando en forma de
  alternatives_spanish:
  - se transformaban en
  - se disfrazaban de
  lexicon: LSJ
  rationale: La forma media/reflexiva se expresa con 'se iban cambiando', evitando una traducción demasiado técnica y manteniendo el proceso continuo.
- source_word: συνουσίᾳ τῶν ἀνδρῶν αὐτῶν
  english_pob_choice: while they were with their husbands
  chosen_spanish: mientras estaban con sus maridos
  alternatives_spanish:
  - mientras estaban con sus esposos
  - en la compañía de sus maridos
  lexicon: LSJ
  rationale: '''Maridos'' es el equivalente natural en este relato y preserva el contraste contextual sin suavizarlo.'
- source_word: ἐπιθυμοῦσαι τῇ διανοίᾳ τῆς φαντασίας
  english_pob_choice: desiring in their minds their appearance
  chosen_spanish: deseando en su mente la apariencia de ellos
  alternatives_spanish:
  - deseando en su imaginación su apariencia
  - anhelando en su mente su forma
  lexicon: LSJ
  rationale: '''Apariencia'' reproduce el foco visual e imaginativo; ''mente'' evita psicologizar en exceso la expresión griega.'
- source_word: γίγαντας
  english_pob_choice: giants
  chosen_spanish: gigantes
  alternatives_spanish:
  - seres gigantes
  - gigantes nacidos
  lexicon: LSJ
  rationale: '''Gigantes'' es la equivalencia directa y conserva la tradición intertextual de Génesis 6 y 1 Enoc.'
- source_word: ἕως ... τοῦ οὐρανοῦ φθάνοντες
  english_pob_choice: as reaching up to heaven
  chosen_spanish: como si alcanzaran hasta el cielo
  alternatives_spanish:
  - llegando hasta el cielo
  - como alcanzando el cielo
  lexicon: LSJ
  rationale: La comparación 'como si' expresa adecuadamente el posible valor hiperbólico señalado por la tradición de lectura, sin cerrar la ambigüedad del griego.
theological_decisions:
- issue: Lenguaje fuertemente generalizador sobre las mujeres en una admonición testamentaria
  english_pob_reading: Translate the Greek directly as Reuben's warning speech without softening or editorial correction.
  chosen_spanish_reading: Traducir el discurso de advertencia de Rubén de forma directa, sin suavizarlo ni reescribirlo.
  alternative_spanish_readings:
  - Mitigar las frases para referirlas solo a mujeres inmorales
  - Parafrasear para reducir la generalización
  rationale: La fidelidad al testimonio griego exige transparentar el tono retórico y moral del texto. La traducción no debe corregir silenciosamente la voz del testamento, sino dejar visible su dureza para el lector.
  doctrine_reference: 'PHILOSOPHY.md: primacía del texto original y transparencia ante material difícil'
- issue: πνεῦμα τῆς πορνείας
  english_pob_reading: Render as 'the spirit of sexual immorality'
  chosen_spanish_reading: '''el espíritu de la inmoralidad sexual'''
  alternative_spanish_readings:
  - '''un espíritu de fornicación'''
  - '''el impulso de la lujuria'''
  rationale: La expresión puede entenderse como fuerza espiritual/personificada; conservar 'espíritu' mantiene la textura teológica del griego en vez de reducirla a psicología o deseo meramente humano.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica en vez de resolverla'
- issue: Tradición de los Vigilantes y los gigantes
  english_pob_reading: Retain 'Watchers' and 'giants' in the main text
  chosen_spanish_reading: Retener 'Vigilantes' y 'gigantes' en el texto principal
  alternative_spanish_readings:
  - Explicarlo como hombres poderosos
  - Parafrasearlo fuera de la tradición enociana
  rationale: Estos términos pertenecen a la tradición judía del Segundo Templo reflejada por el griego; mantenerlos visibles respeta la intertextualidad y evita domesticar el pasaje.
  doctrine_reference: 'PHILOSOPHY.md: traducir honesta y transparentemente la tradición recibida'
- issue: Posible valor hiperbólico de la cláusula final
  english_pob_reading: 'The final clause may be understood hyperbolically: the Watchers appeared to the women as towering up to heaven.'
  chosen_spanish_reading: Como si alcanzaran hasta el cielo
  alternative_spanish_readings:
  - Extendidos hasta el cielo
  - Tan altos como para tocar el cielo
  rationale: La formulación permite leer la comparación como hiperbólica sin fijarla dogmáticamente; así se conserva la ambigüedad interpretativa señalada por el audit trail.
  doctrine_reference: 'DOCTRINE.md: preservar la ambigüedad controlada del original'
translation_notes:
  revision_awareness: Se tomó en cuenta la última revisión inglesa, que ajustó matices como 'devise schemes', corrigió referencias pronominales en los vv. 6–7 y aclaró la escena de la convivencia con los maridos. La versión española refleja esas precisiones sin depender de una traducción mecánica del inglés, apoyándose en el griego y manteniendo el tono y la secuencia argumental del pasaje.
  spanish_consistency_notes:
  - Se mantiene 'mujeres' como sujeto general del discurso, conforme al griego y al audit trail inglés, sin introducir mitigaciones no sustentadas por el texto.
  - '''Inmoralidad sexual'' se usa de forma consistente para πορνεία, siguiendo la convención del proyecto en lenguaje claro.'
  - '''Vigilantes'' y ''gigantes'' quedan sin domesticar para conservar la conexión con la tradición enociana.'
  - Se distingue 'mente' / 'mente' y 'corazón' donde el griego hace esa separación antropológica.
  - La puntuación y las mayúsculas siguen el español estándar, con marcadores de nota colocados en el texto en los puntos léxicamente decisivos.
