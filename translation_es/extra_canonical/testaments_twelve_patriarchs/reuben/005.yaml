base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/reuben/005.yaml
  text: 1[a]. For women are evil, my children; and because they do not have authority or power over a man, they scheme by their appearance how they may draw him to themselves. 2. And the one whom they are not able to enchant by appearance, him they overcome through deceit. 3[b]. For an angel of God also told me concerning them and taught me that women are overcome by the spirit of sexual immorality more than a man, and in their heart they devise schemes against men; and by adornment they lead their minds astray, and through a glance they sow the poison, and first in thought and then by the act they take captive. 4. For a woman is not able to force a man openly, but by a harlot's manner she acts craftily against him. 5. Therefore flee sexual immorality, my children, and command your wives and your daughters not to adorn their heads and their faces for the deception of the mind; for every woman who uses deceit in these things is reserved for eternal punishment. 6. For in this way they also
    charmed the Watchers before the flood; for as they kept looking at them continually, they also came to be in desire for them, and they conceived the deed in their mind; for they were changing themselves into the form of men and appearing to them while they were with their husbands. 7. And they also, desiring in their minds their appearance, gave birth to giants[d][c]. For the Watchers appeared to them as reaching up to heaven.
  footnotes:
  - marker: a
    text: Or 'by their outward form' in verses 1-2; the Greek term can denote appearance, figure, or presentation.
    reason: lexical_alternative
  - marker: b
    text: '''Watchers'' refers to heavenly beings known from Jewish traditions about the time before the flood; compare Genesis 6 in later interpretive tradition, especially 1 Enoch.'
    reason: cross_reference
  - marker: c
    text: The wording in verses 6-7 reflects a developed interpretive tradition about the Watchers, their desire, and the birth of giants.
    reason: cultural_note
  - marker: d
    text: 'The final clause may be understood hyperbolically: the Watchers appeared to the women as towering up to heaven.'
    reason: lexical_alternative
