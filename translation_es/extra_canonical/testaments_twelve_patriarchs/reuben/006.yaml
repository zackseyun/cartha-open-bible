base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/reuben/006.yaml
  text: '1[a]. Guard yourselves, therefore, from sexual immorality, and keep your mind pure. Guard also your senses from every woman. 2. And command the women likewise not to associate closely with men, so that they too may keep their minds pure. 3. For constant encounters[b], even if the ungodly act is not carried out, are nevertheless for them an incurable disease, and for us a ruinous disgrace from Beliar and an everlasting reproach. 4. For sexual immorality has within itself neither understanding nor reverence for God, and every jealousy dwells in its desire. 5. Therefore I say to you: you will be jealous of the sons of Levi, and you will seek to exalt yourselves above them, but because of this you will not prevail. 6. For God will execute vengeance for them, but you will die an evil death. 7. For to Levi God gave the priesthood, and to Judah with him the kingdom. 8. And do not be lifted up against these two, from whom the Lord will bring to completion what is to be spoken. 9. I adjure
    you by the God of heaven, that each of you practice truth toward his neighbor and that each have love toward his brother. 10. And draw near to Levi in humility of heart, so that you may receive a blessing from his mouth. 11. For he will bless Israel and Judah, because in him the Lord chose to reign before all the people. 12. And bow down to his seed, because for your sake it will die in visible and invisible wars[d][c], and among you there will be an everlasting king.'
  footnotes:
  - marker: a
    text: Verses 7–8 are textually difficult in the present Greek witness. The translation reflects the probable sense that Levi is given priesthood and Judah kingship, with a warning not to oppose either line.
    reason: textual_variant
  - marker: b
    text: '''Beliar'' follows the Greek form of the name here; some readers may know the form ''Belial.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'do truth' toward his neighbor — an idiom for acting with truthfulness and faithfulness, not merely speaking true words.
    reason: lexical_alternative
  - marker: d
    text: '''Bow down to his seed'' can denote homage to a descendant line rather than divine worship.'
    reason: lexical_alternative
