translation:
  language: es
  text: '1[a]. Guárdense, pues, de la inmoralidad sexual, y mantengan puro su pensamiento. Guarden también sus sentidos de toda mujer. 2. Y manden igualmente a las mujeres que no se asocien estrechamente con los hombres, para que también ellas mantengan puro su pensamiento. 3. Porque los encuentros constantes[b], aunque no se lleve a cabo el acto impío, son para ellas, sin embargo, una enfermedad incurable, y para nosotros una vergonzosa ruina de Beliar y un oprobio eterno. 4. Porque la inmoralidad sexual no tiene en sí ni entendimiento ni reverencia por Dios, y todo celo habita en su deseo. 5. Por eso les digo: envidiarán a los hijos de Leví, y buscarán enaltecerse sobre ellos, pero por esto no prevalecerán. 6. Porque Dios ejecutará venganza por ellos, pero ustedes morirán de una muerte mala. 7. Porque a Leví Dios le dio el sacerdocio, y a Judá con él el reino. 8. Y no se engrandezcan contra estos dos, de quienes el Señor llevará a cumplimiento lo que ha de ser dicho. 9. Les conjuro por
    el Dios del cielo, que cada uno practique la verdad con su prójimo y que cada uno tenga amor para con su hermano. 10. Y acérquense a Leví con humildad de corazón, para que reciban una bendición de su boca. 11. Porque él bendecirá a Israel y a Judá, porque en él el Señor escogió reinar delante de todo el pueblo. 12. Y postrarse ante su descendencia[c], porque por ustedes morirá en guerras visibles e invisibles, y entre ustedes habrá un rey eterno.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Los vv. 7–8 son textualmente difíciles en el testimonio griego disponible. La traducción sigue el sentido probable de que Leví recibe el sacerdocio y Judá la realeza, con una advertencia contra oponerse a ambos linajes.
    reason: textual_variant
  - marker: b
    text: «Beliar» sigue la forma griega del nombre en este pasaje; algunos lectores conocen la forma «Belial».
    reason: lexical_alternative
  - marker: c
    text: «Descendencia» puede denotar homenaje a una línea descendiente más que adoración divina.
    reason: lexical_alternative
lexical_decisions:
- source_word: φυλάξατε
  english_pob_choice: Guard yourselves
  chosen_spanish: Guárdense
  alternatives_spanish:
  - Guárdense, pues
  - Cuídense
  - Protéjanse
  lexicon: LSJ
  rationale: Mantiene el imperativo exhortativo y la responsabilidad personal del llamado de Reuben; en español, el reflexivo transmite bien la idea de vigilancia moral sobre uno mismo.
- source_word: πορνεία
  english_pob_choice: sexual immorality
  chosen_spanish: inmoralidad sexual
  alternatives_spanish:
  - fornicación
  - impureza sexual
  lexicon: BDAG
  rationale: La expresión amplia evita restringir el término a un solo tipo de falta sexual y resulta natural y clara en español contemporáneo de registro eclesial.
- source_word: καθαρεύοντες τῇ διανοίᾳ
  english_pob_choice: keep your mind pure
  chosen_spanish: mantengan puro su pensamiento
  alternatives_spanish:
  - mantengan pura su mente
  - sean puros en su mente
  lexicon: LSJ
  rationale: διάνοια apunta al ámbito interior del pensamiento; 'pensamiento' suena natural en español y conserva la dimensión moral interna sin volverlo técnico.
- source_word: αἰσθήσεις
  english_pob_choice: senses
  chosen_spanish: sentidos
  alternatives_spanish:
  - percepciones
  - facultades
  lexicon: LSJ
  rationale: El sustantivo español 'sentidos' comunica bien los ámbitos de percepción que pueden ser puestos al servicio del deseo.
- source_word: συνδιάζειν
  english_pob_choice: associate closely with
  chosen_spanish: se asocien estrechamente con
  alternatives_spanish:
  - mantengan compañía cercana con
  - convivan íntimamente con
  lexicon: LSJ
  rationale: La frase conserva la cautela social del texto sin convertirla en una prohibición sexual explícita que el verbo no exige por sí solo.
- source_word: συνεχεῖς συντυχίαι
  english_pob_choice: constant encounters
  chosen_spanish: encuentros constantes
  alternatives_spanish:
  - reuniones frecuentes
  - contactos continuos
  lexicon: LSJ
  rationale: La idea es de contacto repetido y acumulativo; 'encuentros constantes' es natural y preserva el matiz de repetición peligrosa.
- source_word: ἀσέβημα
  english_pob_choice: the ungodly act
  chosen_spanish: el acto impío
  alternatives_spanish:
  - el acto irreverente
  - la acción profana
  lexicon: LSJ
  rationale: '''Impío'' preserva la carga religiosa del término, no solo la impropiedad social.'
- source_word: Βελίαρ
  english_pob_choice: Beliar
  chosen_spanish: Beliar
  alternatives_spanish:
  - Belial
  lexicon: LSJ
  rationale: Se conserva la forma griega del testimonio fuente, en línea con la decisión auditada en inglés de no armonizar el nombre.
- source_word: σύνεσιν
  english_pob_choice: understanding
  chosen_spanish: entendimiento
  alternatives_spanish:
  - discernimiento
  - sensatez
  lexicon: BDAG
  rationale: '''Entendimiento'' reproduce bien el contraste con el desorden moral del pasaje y es transparente para el lector español.'
- source_word: εὐσέβειαν
  english_pob_choice: reverence for God
  chosen_spanish: reverencia por Dios
  alternatives_spanish:
  - piedad
  - devoción a Dios
  lexicon: BDAG
  rationale: Explicita la orientación hacia Dios que está en el término, evitando que 'piedad' suene demasiado general o devocional.
- source_word: ζῆλος / ζηλώσετε
  english_pob_choice: jealous / be jealous
  chosen_spanish: celos / tendrán celos
  alternatives_spanish:
  - envidia / envidiarán
  - celo / serán celosos
  lexicon: BDAG
  rationale: Aquí el sentido es rivalidad negativa; 'celos' transmite mejor la tensión relacional que 'celo', que en español puede sonar virtuoso.
- source_word: ἐκδίκησιν
  english_pob_choice: vengeance
  chosen_spanish: venganza
  alternatives_spanish:
  - vindicación
  - justicia retributiva
  lexicon: BDAG
  rationale: El contexto inmediato es punitivo y judicial; 'venganza' conserva la fuerza fuerte del término como en la traducción inglesa auditada.
- source_word: Ὁρκῶ ὑμᾶς
  english_pob_choice: I adjure you
  chosen_spanish: Les conjuro
  alternatives_spanish:
  - Les ordeno bajo juramento
  - Les exhorto solemnemente
  lexicon: LSJ
  rationale: '''Conjurar'' conserva el tono solemne y vinculante del juramento patriarcal mejor que una simple exhortación.'
- source_word: ποιεῖν ἀλήθειαν
  english_pob_choice: practice truth
  chosen_spanish: practique la verdad
  alternatives_spanish:
  - haga la verdad
  - actúe con verdad
  lexicon: LSJ
  rationale: La expresión mantiene el carácter idiomático de 'hacer/practicar la verdad' como conducta fiel, no solo exactitud verbal.
- source_word: ἀγάπην ἔχειν
  english_pob_choice: have love
  chosen_spanish: tenga amor
  alternatives_spanish:
  - muestre amor
  - mantenga amor
  lexicon: BDAG
  rationale: La formulación es simple y directa, y conserva la estructura paralela del mandato con 'practicar la verdad'.
- source_word: ἐγγίσατε
  english_pob_choice: draw near
  chosen_spanish: acérquense
  alternatives_spanish:
  - dense a Levi
  - vayan cerca de
  lexicon: BDAG
  rationale: '''Acérquense'' expresa bien la invitación relacional y reverente sin agregar connotaciones rituales no explícitas.'
- source_word: ταπεινώσει καρδίας
  english_pob_choice: in humility of heart
  chosen_spanish: con humildad de corazón
  alternatives_spanish:
  - en humildad de corazón
  - con corazón humilde
  lexicon: LSJ
  rationale: La construcción española sigue de cerca el giro semítico y mantiene la interioridad del acto de acercarse a Leví.
- source_word: δέξησθε εὐλογίαν
  english_pob_choice: receive a blessing
  chosen_spanish: reciban una bendición
  alternatives_spanish:
  - obtengan una bendición
  - acepten una bendición
  lexicon: BDAG
  rationale: La combinación es natural en español y conserva la idea de una bendición mediada por la boca de Leví.
- source_word: προσκυνήσατε
  english_pob_choice: bow down to
  chosen_spanish: postrarse ante
  alternatives_spanish:
  - inclinarse ante
  - rendir homenaje a
  lexicon: BDAG
  rationale: '''Postrarse ante'' expresa la acción corporal de sometimiento sin forzar de antemano la lectura a adoración divina.'
- source_word: σπέρμα
  english_pob_choice: seed
  chosen_spanish: descendencia
  alternatives_spanish:
  - linaje
  - simiente
  lexicon: BDAG
  rationale: Aunque el inglés conserva 'seed', en español 'descendencia' es más natural y sigue el valor genealógico/covenantal del término.
- source_word: βασιλεὺς αἰώνιος
  english_pob_choice: an everlasting king
  chosen_spanish: un rey eterno
  alternatives_spanish:
  - un rey perpetuo
  - un rey para siempre
  lexicon: BDAG
  rationale: '''Eterno'' conserva la amplitud duradera del título real sin resolver la expectativa histórica o mesiánica del pasaje.'
theological_decisions:
- issue: 'vv. 7–8: sección textualmente difícil sobre Leví y Judá'
  english_pob_reading: 'A dual investiture: Levi receives the priesthood and Judah with him the kingdom, followed by a warning not to exalt oneself against these two.'
  chosen_spanish_reading: Leví recibe el sacerdocio y Judá con él el reino, seguido de una advertencia de no engrandecerse contra estos dos.
  alternative_spanish_readings:
  - Mantener la frase más fragmentaria y no explicitar sacerdocio/reino
  - Leerlo como una predicción vaga sin distinguir oficios
  rationale: La evidencia griega restante y el contexto de los vv. 10–12 favorecen la lectura tradicional de dos prerrogativas complementarias. Se traduce con claridad sin ocultar la dificultad textual del tramo.
  doctrine_reference: Preservar la tensión textual sin sobreexplicar ni armonizar artificialmente.
- issue: 'vv. 11–12: fuerza real y posible tensión mesiánica/linaje'
  english_pob_reading: Render the Greek witness straightforwardly, including 'bow down to his seed' and 'among you there will be an everlasting king,' without harmonizing to later Christian formulas.
  chosen_spanish_reading: Se conserva 'postrarse ante su descendencia' y 'entre ustedes habrá un rey eterno' sin resolver la referencia en una figura cristológica explícita.
  alternative_spanish_readings:
  - Identificar de inmediato al rey eterno con el Mesías
  - Limitar la expresión solo a la línea sacerdotal
  rationale: El testimonio griego deja abierta la relación entre linaje, realeza y expectativa futura. La traducción española mantiene esa ambigüedad, como hace el POB inglés, sin borrar la tensión interpretativa.
  doctrine_reference: Preservar la tensión teológica y la apertura del texto.
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente suavizó varias expresiones para acercarse mejor al griego: pasó de ''be keeping your mind pure'' a ''keep your mind pure'', aclaró la procedencia de la ''ruinous disgrace'' como proveniente de Beliar, reubicó ''because of this'' para mejorar la sintaxis en v. 5 y ajustó v. 6 a ''execute vengeance for them''. La redacción española refleja esos ajustes con imperativos directos, ''vergonzosa ruina de Beliar'', ''por esto'' y ''venganza por ellos''.'
  spanish_consistency_notes:
  - Se mantiene 'Leví' y 'Judá' como formas bíblicas habituales en español.
  - Se usa 'Beliar' por consistencia con el testimonio griego y la decisión auditada en inglés.
  - Se evita 'SEÑOR' como máscara de Yahvé porque este pasaje griego usa Κύριος en contexto de referencia divina; aquí la tradición textual y el flujo del testamento no exigen esa sustitución en el español de trabajo.
  - '''Pensamiento'' se usa para διάνοια por claridad natural, mientras que ''sentidos'' conserva el matiz de percepción corporal de αἰσθήσεις.'
  - La línea de 'practique la verdad' conserva el valor idiomático de ἀλήθειαν como conducta fiel, no solo exactitud verbal.
