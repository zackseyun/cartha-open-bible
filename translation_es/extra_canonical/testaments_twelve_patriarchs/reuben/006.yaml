  revised_spanish_text: '1[a]. Guárdense, pues, de la inmoralidad sexual, y mantengan puro su pensamiento. Guarden también sus sentidos de toda mujer. 2. Y manden igualmente a las mujeres que no se asocien estrechamente con los hombres, para que también ellas mantengan puro su pensamiento. 3. Porque los encuentros constantes[b], aunque no se lleve a cabo el acto impío, son para ellas, sin embargo, una enfermedad incurable, y para nosotros una vergonzosa ruina de Beliar y un oprobio eterno. 4. Porque la inmoralidad sexual no tiene en sí ni entendimiento ni reverencia por Dios, y todo celo habita en su deseo. 5. Por eso les digo: envidiarán a los hijos de Leví, y buscarán enaltecerse sobre ellos, pero por esto no prevalecerán. 6. Porque Dios ejecutará venganza por ellos, pero ustedes morirán de una muerte mala. 7. Porque a Leví Dios le dio el sacerdocio, y a Judá con él el reino. 8. Y no se engrandezcan contra estos dos, de quienes el Señor llevará a cumplimiento lo que ha de ser dicho. 9.
    Les conjuro por el Dios del cielo, que cada uno practique la verdad con su prójimo y que cada uno tenga amor para con su hermano. 10. Y acérquense a Leví con humildad de corazón, para que reciban una bendición de su boca. 11. Porque él bendecirá a Israel y a Judá, porque en él el Señor escogió reinar delante de todo el pueblo. 12. Y postrarse ante su descendencia[c], porque por ustedes morirá en guerras visibles e invisibles, y entre ustedes habrá un rey eterno.'
