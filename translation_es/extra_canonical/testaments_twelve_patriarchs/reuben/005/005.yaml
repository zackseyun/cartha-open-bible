id: T12P.REU.5.5
reference: Testament of Reuben 5:5
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 66-79, Reuben pilot)
  text: '*Λοιπὸν φεύγετε ἄνθρω- τέκνα μου τὴν πορνείαν⁴², *καὶ προστάσσετε⁴³ ταῖς γυναιξὶν που βιά- ὑμῶν⁴⁴ καὶ ταῖς θυγατράσιν Γὑμῶν˥⁴⁵, ἵνα μὴ κοσμῶσι⁴⁶ σασθαι. τὰς⁴⁷ κεφαλὰς αὐτῶν⁴⁸ καὶ τὰς ὄψεις⁴⁹ *πρὸς ἀπάτην διανοίας⁵⁰, ὅτι πᾶσα γυνὴ⁵¹ δολιευομένη ἐν τούτοις εἰς κόλασιν⁵² αἰώνιον⁵³ τετήρηται⁵⁴.'
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/reuben/005/005.yaml
  text: Therefore flee sexual immorality, my children, and command your wives and your daughters not to adorn their heads and faces for the deception of the mind; for every woman who deceives by these things is reserved for eternal punishment.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:34Z'
    unchanged: false
    changes_summary: Removed unnecessary repeated article before 'faces' for smoother English, and revised 'who uses deceit in these things' to 'who deceives by these things' to reflect the participle more directly and naturally.
translation:
  language: es
  text: Por tanto, huyan de la inmoralidad sexual[a], hijos míos, y ordenen a sus esposas y a sus hijas que no adornen sus cabezas ni sus rostros[b] para el engaño de la mente[c]; porque toda mujer que engaña mediante estas cosas está reservada para el castigo eterno[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Gr. πορνείαν: término amplio que abarca todo tipo de inmoralidad sexual, no únicamente la fornicación en sentido estricto.'
    reason: lexical_alternative
  - marker: b
    text: 'Gr. ὄψεις (pl.): lit. ''apariencias visibles, semblantes''; aquí en sentido concreto de rostros.'
    reason: lexical_alternative
  - marker: c
    text: 'Gr. πρὸς ἀπάτην διανοίας: la construcción es ambigua; puede referirse al engaño que sufre la mente de otros o al que opera desde la propia mente. Ambas lecturas son posibles en el griego.'
    reason: textual_variant
  - marker: d
    text: 'Gr. κόλασιν αἰώνιον τετήρηται: lit. ''ha sido reservada para castigo eterno''. El perfecto pasivo τετήρηται evoca un decreto divino ya establecido. Αἰώνιος puede significar ''eterno'' o ''propio de la era venidera'' (escatológico).'
    reason: theological_note
lexical_decisions:
- source_word: Λοιπὸν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - En consecuencia
  - Pues bien
  lexicon: 'BDAG λοιπόν 3: transitional marker, ''therefore, then, so'''
  rationale: Λοιπόν functions here as a transitional inferential particle drawing the exhortation from what precedes in the testament. 'Por tanto' carries the same logical-consequential force in formal Spanish and fits the solemn hortatory register of the passage. 'Así que' would be too colloquial; 'en consecuencia' too bureaucratic.
- source_word: πορνείαν
  english_pob_choice: sexual immorality
  chosen_spanish: inmoralidad sexual
  alternatives_spanish:
  - fornicación
  - lujuria
  - libertinaje sexual
  lexicon: 'BDAG πορνεία 1: ''unlawful sexual intercourse, prostitution, unchastity, fornication'''
  rationale: Πορνεία covers a broad spectrum of sexual sin beyond merely premarital intercourse. 'Fornicación' (the Reina-Valera default) is too narrow and archaic for a modern, broadly church-readable text. 'Inmoralidad sexual' matches the English POB's optimal-equivalence rendering and preserves the full semantic range without anachronistic precision. 'Lujuria' shifts toward the sin of lust rather than its acts.
- source_word: τέκνα μου
  english_pob_choice: my children
  chosen_spanish: hijos míos
  alternatives_spanish:
  - hijos e hijas míos
  - mis hijos
  lexicon: 'LSJ τέκνον: ''child, offspring (gender-inclusive)'''
  rationale: Τέκνα is grammatically gender-inclusive ('children'). In Latin American formal address, 'hijos míos' is the idiomatic equivalent for a patriarch addressing descendants of unspecified gender. 'Hijos e hijas míos' would be pedantic and disrupts the flow; 'mis hijos' inverts the possessive position naturally preferred in direct address. This follows standard Spanish usage for the testament genre.
- source_word: προστάσσετε
  english_pob_choice: command
  chosen_spanish: ordenen
  alternatives_spanish:
  - manden
  - impongan
  - encarguen
  lexicon: 'BDAG προστάσσω: ''to instruct with authority, command, order'''
  rationale: Προστάσσω carries clear authoritative command, stronger than 'instruct' or 'ask.' 'Ordenen' (ustedes imperative) is the natural neutral Latin American form equivalent to the Greek second-person plural imperative. Vosotros 'ordenad' is avoided per the project's Latin American Spanish target. 'Manden' is a valid near-synonym but slightly less formal.
- source_word: κοσμῶσι (κοσμέω)
  english_pob_choice: adorn
  chosen_spanish: adornen
  alternatives_spanish:
  - embellezcan
  - arreglen
  - ataviéen
  lexicon: 'BDAG κοσμέω 1: ''to make beautiful, adorn, decorate'''
  rationale: '''Adornen'' is a direct and modern Spanish equivalent of κοσμέω in this context (cosmetic adornment of the head and face). ''Embellezcan'' would work but is slightly redundant with the object. ''Adornen'' preserves the lexical link to κόσμος/cosmetics that may be intentional in the author''s rhetoric.'
- source_word: ὄψεις (ὄψις)
  english_pob_choice: faces
  chosen_spanish: rostros
  alternatives_spanish:
  - caras
  - semblantes
  - apariencias
  lexicon: 'LSJ ὄψις 1: ''sight, appearance; face, countenance'''
  rationale: Ὄψεις (pl. of ὄψις) denotes the visible face or appearance. 'Rostros' (plural, matching the Greek plural) is dignified, appropriate for this genre, and unambiguously means 'faces.' 'Caras' is more colloquial; 'semblantes' slightly poetic but acceptable. 'Apariencias' would shift the meaning toward 'appearances/looks' in a general sense, losing the specific bodily reference.
- source_word: ἀπάτην διανοίας
  english_pob_choice: deception of the mind
  chosen_spanish: el engaño de la mente
  alternatives_spanish:
  - el engaño del entendimiento
  - para engañar la mente
  - la seducción de la razón
  lexicon: 'BDAG ἀπάτη: ''deception, deceitfulness''; BDAG διάνοια: ''the faculty of thinking, mind, understanding, intelligence'''
  rationale: 'The Greek prepositional phrase πρὸς ἀπάτην διανοίας is semantically ambiguous: it may be (a) deception that the mind of others suffers (the decorated woman deceives onlookers'' minds) or (b) deception that issues from the mind. The Spanish ''para el engaño de la mente'' preserves this productive ambiguity through a parallel genitive construction, consistent with the English POB''s ''deception of the mind.'' ''Entendimiento'' would emphasize rational faculty more specifically than διάνοια requires here.'
- source_word: δολιευομένη (δολιεύομαι)
  english_pob_choice: deceives (who deceives by these things)
  chosen_spanish: que engaña mediante estas cosas
  alternatives_spanish:
  - que usa el engaño en estas cosas
  - que obra con astucia en estas cosas
  - que practica el engaño con estas cosas
  lexicon: 'LSJ δολιεύομαι: ''to act deceitfully, to beguile, to use guile'''
  rationale: 'The Greek participle δολιευομένη (present middle, ''the one acting deceitfully'') was revised by the English POB from ''who uses deceit in these things'' to ''who deceives by these things'' to render the participle more directly. Spanish ''que engaña mediante estas cosas'' reflects the same logic: ''mediante'' (by means of) captures ἐν τούτοις as instrumental, and ''engaña'' renders the participial action naturally as a relative clause.'
- source_word: κόλασιν αἰώνιον
  english_pob_choice: eternal punishment
  chosen_spanish: castigo eterno
  alternatives_spanish:
  - pena eterna
  - tormento eterno
  - castigo del siglo venidero
  lexicon: 'BDAG κόλασις: ''punishment, chastisement'' (distinct from τιμωρία, which emphasizes the punisher''s satisfaction); BDAG αἰώνιος: ''pertaining to an age, eternal, everlasting'''
  rationale: Κόλασις denotes corrective or retributive punishment. 'Castigo eterno' is the natural Spanish equivalent used in both modern and traditional church contexts. 'Pena eterna' is also valid and preserves a legal register. 'Castigo del siglo venidero' would attempt to render the 'age' dimension of αἰώνιος but would be opaque to modern readers and is not supported by the English POB's rendering.
- source_word: τετήρηται (τηρέω, perfect passive)
  english_pob_choice: is reserved
  chosen_spanish: está reservada
  alternatives_spanish:
  - ha sido reservada
  - se halla reservada
  - queda reservada
  lexicon: 'BDAG τηρέω 3: ''to keep in a state of preservation, reserve, hold in store'''
  rationale: The Greek perfect passive τετήρηται ('has been kept/reserved') expresses a completed state with present relevance—a divine decree already enacted. Spanish 'está reservada' captures the resultant stative force of the perfect more naturally than the compound 'ha sido reservada' (which foregrounds the past action rather than the present state). This matches the English POB's 'is reserved.'
theological_decisions:
- issue: 'Moral attribution: adornment and female culpability for ''deception'''
  english_pob_reading: every woman who deceives by these things is reserved for eternal punishment
  chosen_spanish_reading: toda mujer que engaña mediante estas cosas está reservada para el castigo eterno
  alternative_spanish_readings:
  - toda mujer que es engañosa en estas cosas está reservada para el castigo eterno
  - toda mujer que seduce mediante estas cosas está reservada para el castigo eterno
  rationale: The text places moral responsibility for sexual temptation explicitly on women's adornment practices, a characteristic feature of Second Temple Jewish paraenesis reflected in the Testaments of the Twelve Patriarchs. The Spanish rendering follows the source without softening (δολιευομένη → 'que engaña') or importing apologetic glosses. The translation faithfully represents the pseudepigraphical author's patriarchal moral framework. Documentary footnotes note the genre; the text itself is not editorially ameliorated.
  doctrine_reference: T12P.REU.5 paraenetic context; cf. 1 Tim 2:9; 1 Pet 3:3 for parallel NT discourse on women's adornment
- issue: αἰώνιον κόλασιν — eternal vs. age-long punishment
  english_pob_reading: eternal punishment
  chosen_spanish_reading: castigo eterno
  alternative_spanish_readings:
  - castigo de la era venidera
  - castigo del siglo eterno
  rationale: αἰώνιος in Second Temple Jewish literature can mean either 'eternal/everlasting' (open-ended duration) or 'belonging to the coming age' (eschatological quality). The English POB renders it 'eternal' without a note. Spanish 'eterno' follows this rendering. In a pseudepigraphical testament context, the eschatological sense ('punishment of the age to come') is also plausible, but 'castigo eterno' is the most broadly intelligible Spanish rendering and does not foreclose the eschatological reading.
  doctrine_reference: BDAG αἰώνιος 2; cf. Matt 25:46 κόλασιν αἰώνιον
- issue: 'Textual reconstruction: βιά[ζεσθαι?] in the Charles apparatus'
  english_pob_reading: command [no force/compel element rendered]
  chosen_spanish_reading: ordenen [no se incluye elemento de 'forzar']
  alternative_spanish_readings:
  - obliguen por la fuerza a sus esposas
  rationale: The Charles 1908 Greek text contains the fragment 'βιά-' (apparently 'βιάζεσθαι' = 'to force') within the apparatus, possibly indicating a textual variant or line-break artifact. The English POB translation does not reflect any 'force/compel' nuance beyond 'command,' suggesting the editors treated this as an apparatus artifact rather than a constitutive textual reading. The Spanish accordingly renders only 'ordenen,' consistent with the English POB's evidenced decision. A formal critical edition would require resolution of the apparatus before reflecting βιάζεσθαι in translation.
  doctrine_reference: Charles 1908, p. 66-79 apparatus; T12P.REU.5.5 source_payload footnote marks ⁴³–⁴⁴
translation_notes:
  revision_awareness: 'La revisión del POB en inglés (2026-04-23, gpt-5.4) eliminó la repetición del artículo ante ''faces'' y ajustó ''who uses deceit in these things'' a ''who deceives by these things'' para reflejar el participio δολιευομένη de forma más directa. El español adopta la misma decisión: ''que engaña mediante estas cosas'' traduce el participio directamente sin la perífrasis ''que usa el engaño,'' siguiendo el criterio de la revisión inglesa. No hay cambios entre las versiones del POB en inglés que afecten decisiones doctrinales o léxicas que el español deba ponderar de modo diferente.'
  spanish_consistency_notes:
  - Yahvé no aparece en este versículo; no se requiere decisión sobre el tetragrama.
  - No aparece Χριστός ni θεός; los términos de proyecto para 'Mesías' y 'Dios' no son relevantes aquí.
  - πνεῦμα/רוּחַ no aparece en el texto; no hay decisión sobre 'espíritu/Espíritu'.
  - El sustantivo πορνεία se vierte como 'inmoralidad sexual' en consonancia con la terminología del POB en inglés; se evita 'fornicación' por su alcance más restringido en el uso moderno.
  - 'Se usan formas de ''ustedes'' (imperativas: huyan, ordenen) en lugar de formas de ''vosotros,'' siguiendo el objetivo del español neutro latinoamericano del proyecto.'
  - El género de τέκνα (neutro inclusivo griego) se vierte como 'hijos míos,' forma de tratamiento patriarcal convencional en español formal; no se añade lenguaje de género inclusivo que no esté en el original.
