id: T12P.REU.5.2
reference: Testament of Reuben 5:2
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 66-79, Reuben pilot)
  text: Καὶ¹² ὃν¹³ διὰ *τοῦ σχήματος¹⁴ οὐκ ἰσχύουσιν¹⁵ καταγοητεῦσασθαι¹⁶, τοῦτον¹⁷ δι᾿¹⁸ ἀπάτης κατα- γωνίζονται¹⁹.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/reuben/005/002.yaml
  text: And the one whom they are not able to enchant by appearance, him they overcome through deceit.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:31Z'
    unchanged: false
    changes_summary: Changed 'are not strong enough' to 'are not able' for a more accurate and natural rendering of οὐκ ἰσχύουσιν, while retaining the rest of the verse.
translation:
  language: es
  text: Y al que no pueden encantar por la apariencia, a ese lo vencen mediante el engaño.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὃν
  english_pob_choice: the one whom
  chosen_spanish: al que
  alternatives_spanish:
  - al cual
  - a quien
  lexicon: ὅς
  rationale: El relativo acusativo introduce un antecedente humano implícito; en español, «al que» suena natural y conserva el valor de objeto directo del verbo siguiente sin sobrecargar el estilo.
- source_word: διὰ τοῦ σχήματος
  english_pob_choice: by appearance
  chosen_spanish: por la apariencia
  alternatives_spanish:
  - a través de la apariencia
  - mediante la apariencia
  lexicon: σχήμα
  rationale: «σχήμα» aquí alude a forma, apariencia externa o porte visible. «Por la apariencia» reproduce la relación instrumental/circunstancial del griego con fluidez en español.
- source_word: οὐκ ἰσχύουσιν καταγοητεῦσασθαι
  english_pob_choice: are not able to enchant
  chosen_spanish: no pueden encantar
  alternatives_spanish:
  - no son capaces de encantar
  - no logran fascinar
  lexicon: ἰσχύω + καταγοητεύω
  rationale: La revisión inglesa corrigió «are not strong enough» a «are not able», así que el núcleo debe expresar incapacidad, no mera falta de fuerza. «Encantar» mantiene el matiz de fascinación/seducción del verbo compuesto sin introducir un giro interpretativo más fuerte que el texto.
- source_word: δι᾿ ἀπάτης
  english_pob_choice: through deceit
  chosen_spanish: mediante el engaño
  alternatives_spanish:
  - por medio del engaño
  - a través del engaño
  lexicon: ἀπάτη
  rationale: «ἀπάτη» es engaño, fraude o decepción. «Mediante» refleja bien la preposición instrumental y «engaño» conserva el sustantivo más directo y claro en español actual.
- source_word: καταγωνίζονται
  english_pob_choice: overcome
  chosen_spanish: lo vencen
  alternatives_spanish:
  - lo derrotan
  - prevalecen sobre él
  lexicon: καταγωνίζομαι
  rationale: El verbo expresa vencer, dominar o prevalecer contra alguien. «Lo vencen» es breve, natural y suficientemente fuerte para el contexto, sin añadir violencia explícita no señalada por el griego.
theological_decisions:
- issue: Relación entre apariencia externa y engaño moral
  english_pob_reading: by appearance ... through deceit
  chosen_spanish_reading: por la apariencia ... mediante el engaño
  alternative_spanish_readings:
  - por el aspecto ... por medio del engaño
  - por la apariencia externa ... mediante el fraude
  rationale: La línea mantiene la tensión entre lo visible y la manipulación oculta. «Apariencia» no se suaviza a una mera estética neutral porque el contraste retórico depende de que lo externo puede ser usado para seducir o despistar.
  doctrine_reference: Antropología moral / discernimiento
- issue: Fuerza semántica de la incapacidad frente a la seducción
  english_pob_reading: are not able to enchant
  chosen_spanish_reading: no pueden encantar
  alternative_spanish_readings:
  - no son capaces de encantar
  - no logran encantar
  rationale: La revisión inglesa prioriza incapacidad. El español debe conservar esa tensión sin convertirla en mera dificultad. «No pueden» es la forma más directa y auditable para esa lectura.
  doctrine_reference: Semántica verbal / fidelidad textual
translation_notes:
  revision_awareness: The English POB was revised from 'are not strong enough to enchant by appearance' to 'are not able to enchant by appearance' to better reflect οὐκ ἰσχύουσιν. The Spanish draft follows the revised English audit and the Greek source by rendering incapacity with «no pueden» rather than a strength-based paraphrase.
  spanish_consistency_notes:
  - Se evitó «Señor»/«Cristo» porque el versículo no contiene vocabulario divino ni cristológico.
  - Se eligió un registro sobrio y público, apto para lectura eclesial, sin introducir notas porque el texto griego y la auditoría inglesa no preservan variantes semánticas que requieran anclaje textual.
