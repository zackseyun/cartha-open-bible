translation:
  language: es
  text: Porque una mujer no puede forzar abiertamente a un hombre, sino que, con maneras de prostituta, actúa con astucia contra él.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: γυνὴ
  english_pob_choice: woman
  chosen_spanish: mujer
  alternatives_spanish:
  - mujer
  - esposa
  lexicon: γυνή
  rationale: El griego usa γυνή en sentido general de mujer, y la versión inglesa POB también eligió “woman”. En español, “mujer” conserva ese valor amplio sin introducir la relación conyugal de “esposa”, que el texto no exige.
- source_word: ἄνδρα
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - hombre
  - varón
  lexicon: ἀνήρ
  rationale: La forma ἄνδρα señala a un hombre en contraste con γυναίκα. “Hombre” comunica bien el contraste de manera natural en español; “varón” sería posible, pero suena más marcado y menos fluido aquí.
- source_word: βιάσαι εἰς πρόσωπον
  english_pob_choice: force ... openly
  chosen_spanish: forzar abiertamente
  alternatives_spanish:
  - forzar abiertamente
  - violentarlo de frente
  - obligarlo públicamente
  lexicon: βιάζω + εἰς πρόσωπον
  rationale: La combinación expresa imposición/violencia “de frente”, es decir, sin disimulo. “Forzar abiertamente” conserva la fuerza verbal de βιάζω y la idea de 공개/visibilidad de εἰς πρόσωπον sin añadir detalles ajenos.
- source_word: πορνικοῖς ... πανουργεύεται
  english_pob_choice: by a harlot's manner she acts craftily against him
  chosen_spanish: con maneras de prostituta, actúa con astucia contra él
  alternatives_spanish:
  - con maneras de prostituta, actúa con astucia contra él
  - mediante conducta impúdica, lo engaña con astucia
  - con artimañas de prostituta, procede astutamente contra él
  lexicon: πορνικός + πανουργεύομαι
  rationale: POB mantiene el matiz despectivo de πορνικός mediante una comparación explícita con la conducta de una prostituta. “Con maneras de prostituta” reproduce esa imagen sin suavizarla, y “actúa con astucia” refleja πανουργεύεται con un verbo natural en español que conserva la idea de engaño calculado.
theological_decisions:
- issue: Naturaleza de la afirmación moral y antropológica
  english_pob_reading: A descriptive warning about sexual manipulation, not a doctrinal claim requiring theological expansion.
  chosen_spanish_reading: Una advertencia descriptiva sobre manipulación sexual, sin ampliar el texto hacia una afirmación doctrinal más allá de lo que dice.
  alternative_spanish_readings:
  - Una tesis moral general sobre la mujer
  - Una afirmación doctrinal sobre la debilidad masculina
  rationale: El griego ofrece una observación retórica en el contexto del discurso de advertencia, no una definición teológica de la mujer ni del hombre. La traducción española evita intensificar el alcance del enunciado.
  doctrine_reference: Anthropology / sexual ethics in admonitory literature
translation_notes:
  revision_awareness: 'Coincido con la revisión más reciente y con el control cruzado de alta concordancia: no se requieren cambios respecto del sentido base auditado, y la redacción española sigue de cerca el griego con una equivalencia óptima. No hay notas textuales o variantes que deban incorporarse en este pasaje breve.'
  spanish_consistency_notes:
  - Se mantiene “mujer” y “hombre” como designaciones genéricas y no conyugales.
  - Se conserva el tono proverbial/admonitorio sin añadir explicaciones interpretativas.
  - No se introduce terminología eclesial tradicional donde el griego no la exige.
