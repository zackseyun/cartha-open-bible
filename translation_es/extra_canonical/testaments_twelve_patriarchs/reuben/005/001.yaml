base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/reuben/005/001.yaml
  text: For women are evil, my children; and because they have no authority or power over the man, they scheme by their appearance how they may draw him to themselves.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:35:07Z'
    unchanged: false
    changes_summary: Changed 'a man' to 'the man' to reflect the Greek article more closely and improve lexical accuracy; otherwise retained the draft.
translation:
  language: es
  text: Porque las mujeres son malas, hijos míos; y como no tienen autoridad ni poder sobre el hombre, urden con sus apariencias cómo atraerlo hacia sí mismas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Πονηραὶ
  english_pob_choice: evil
  chosen_spanish: malas
  alternatives_spanish:
  - malvadas
  - malignas
  lexicon: πονηρός
  rationale: El griego tiene una valoración moral negativa fuerte. En español, "malas" comunica ese juicio de manera natural y directa sin endurecerlo más de lo que el contexto exige. "Malvadas" sería más explícito, pero algo más interpretativo.
- source_word: γάρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: γάρ
  rationale: Introduce la explicación causal del dicho anterior; "porque" suena claro y fluido en español moderno.
- source_word: γυναῖκες
  english_pob_choice: women
  chosen_spanish: las mujeres
  alternatives_spanish:
  - las esposas
  lexicon: γυνή
  rationale: El término griego es general para mujeres; "esposas" restringiría indebidamente el alcance.
- source_word: τέκνα μου
  english_pob_choice: my children
  chosen_spanish: hijos míos
  alternatives_spanish:
  - mis hijos
  - hijos míos, mis hijos
  lexicon: τέκνον
  rationale: La apelación paternal del hablante se expresa con naturalidad en español como "hijos míos". Mantiene el tono exhortativo y afectivo del original.
- source_word: ἐξουσίαν ἢ δύναμιν ἐπὶ τὸν ἄνδρα
  english_pob_choice: authority or power over the man
  chosen_spanish: autoridad ni poder sobre el hombre
  alternatives_spanish:
  - autoridad o poder sobre el hombre
  - dominio o poder sobre el hombre
  lexicon: ἐξουσία / δύναμις / ἀνήρ
  rationale: La construcción griega niega ambos términos dentro de la misma idea de falta de control. En español, "ni" reproduce bien la negación conjunta. Se mantiene "el hombre" porque el texto con artículo apunta al varón en sentido general y el audit trail corrigió la lectura indefinida.
- source_word: δολιεύονται
  english_pob_choice: they scheme
  chosen_spanish: urden
  alternatives_spanish:
  - traman
  - maquinan
  lexicon: δολιεύομαι
  rationale: El verbo expresa actuar con astucia o engaño. "Urden" conserva la idea de plan malicioso sin sonar demasiado coloquial.
- source_word: ἐν σχήμασιν
  english_pob_choice: by their appearance
  chosen_spanish: con sus apariencias
  alternatives_spanish:
  - por su apariencia
  - mediante su porte
  lexicon: σχῆμα
  rationale: El plural griego permite un matiz de formas, modales o apariencias externas. "Con sus apariencias" conserva el plural y el medio instrumental de modo comprensible en español, aunque suena algo más marcado que una singularización.
- source_word: ἐπισπάσωνται πρὸς ἑαυτὰς
  english_pob_choice: draw him to themselves
  chosen_spanish: atraerlo hacia sí mismas
  alternatives_spanish:
  - arrastrarlo hacia sí mismas
  - llevarlo hacia sí mismas
  lexicon: ἐπισπάω
  rationale: La frase indica atraer hacia uno mismo. "Atraerlo hacia sí mismas" refleja el movimiento direccional sin añadir violencia que el verbo no exige necesariamente.
theological_decisions:
- issue: Caracterización moral de las mujeres en el dicho
  english_pob_reading: For women are evil, my children
  chosen_spanish_reading: Porque las mujeres son malas, hijos míos
  alternative_spanish_readings:
  - Porque las mujeres son malvadas, hijos míos
  rationale: Se conserva el juicio moral duro del texto base sin suavizarlo. No se introduce una reinterpretación moderna que diluya la tensión del pasaje; la traducción deja visible la afirmación tal como aparece en la tradición textual usada por POB.
  doctrine_reference: Hermenéutica histórica y fidelidad textual; preservación de la dureza del testimonio apócrifo sin normalización doctrinal.
- issue: Referencia al varón con artículo definido
  english_pob_reading: the man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - un hombre
  rationale: 'Se sigue la corrección del audit trail: el griego usa artículo definido, por lo que en español corresponde mantener una referencia definida/general al varón, no un indefinido.'
  doctrine_reference: Precisión gramatical del artículo griego en traducción bíblica.
translation_notes:
  revision_awareness: La redacción sigue la versión inglesa revisada del audit trail, especialmente la corrección de 'a man' a 'the man'. No se incorporan notas textuales adicionales porque el testimonio griego proporcionado y la versión inglesa convergen de forma alta, sin variantes relevantes para el español final.
  spanish_consistency_notes:
  - Se mantiene "hombres/mujeres" en registro neutral y bíblico, evitando "varón" donde el artículo definido griego apunta al masculino genérico referencial.
  - Se usa "Malas" para conservar el juicio moral fuerte sin introducir una glosa explicativa.
  - Se conserva el paralelismo causal y la relación entre falta de autoridad y conducta engañosa, siguiendo el flujo del original.
