  text: Πονηραὶ ¹γάρ¹¹ εἰσιν αἱ γυναῖκες, τέκνα² μου, *καὶ ἐν τῷ μὴ ἔχειν αὐτὰς³ ἐξουσίαν *ἢ δύναμιν⁴ ἐπὶ *τὸν ἄνδρα⁵, δολιεύονται⁶ ἐν σχήμασιν⁷ ὅπως⁸ αὐτὸν⁹ *πρὸς ἑαυτὰς¹⁰ ἐπισπάσωνται¹¹.
