source:
  edition: Charles 1908 Greek Versions (pages 66-79, Reuben pilot)
  text: Οὕτως γὰρ⁵⁵ ἔθελξαν τοὺς Ἐγρηγόρους⁵⁶ Γτοὺς˥⁵⁷ πρὸ τοῦ κατακλυσμοῦ· *ἐκεῖνοι γὰρ⁵⁸ β, Α, S¹ συνεχῶς⁵⁹ ὁρῶντες Γαὐτὰς˥⁶⁰ ἐγένοντο⁶¹ Γκαὶ˥⁶² ἐν⁶³ ἐπιθυμίᾳ κἀκεῖνοι. α, β-g, S¹ αὐτῶν⁶⁴, καὶ συνέλαβον⁶⁵ τῇ διανοίᾳ * τὴν πρᾶξιν⁶⁶. * μετεσχηματίζοντο γὰρ⁶⁷ εἰς ἄνδρα⁶⁸ καὶ ἐν τῇ συνουσίᾳ τῶν ἀνδρῶν * αὐτῶν συνεφαίνοντο αὐταῖς⁶⁹.
