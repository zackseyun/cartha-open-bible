base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/reuben/005/006.yaml
  text: For in this way they also enticed the Watchers before the flood; for as they kept looking at them continually, they also came to be in desire for them, and they conceived the deed in their mind; for they were transforming themselves into the form of men and appearing to them while their husbands were with them.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:34Z'
    unchanged: false
    changes_summary: Changed 'charmed' to 'enticed' for better lexical fit with ἔθελξαν; clarified the repeated κἀκεῖνοι with 'they also came to be'; changed 'changing themselves' to 'transforming themselves' for μετεσχηματίζοντο; otherwise retained the structure and content.
translation:
  language: es
  text: Porque de esta manera también sedujeron a los Vigilantes antes del diluvio; pues, mientras los miraban continuamente, también llegaron a desearlas, y concibieron el acto en su mente; porque se transformaban en forma de hombres y se les aparecían mientras sus maridos estaban con ellas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἔθελξαν
  english_pob_choice: enticed
  chosen_spanish: sedujeron
  alternatives_spanish:
  - engañaron
  - atrajeron
  - encantaron
  lexicon: θελγω
  rationale: El POB revisado eligió 'enticed' frente a 'charmed' para reflejar mejor el valor de ἔθελξαν; en español, 'sedujeron' conserva la idea de atracción activa con matiz de engaño o desvío, sin perder la fuerza del verbo griego.
- source_word: Ἐγρηγόρους
  english_pob_choice: Watchers
  chosen_spanish: Vigilantes
  alternatives_spanish:
  - Vigías
  - Centinelas
  lexicon: nombre propio/tradicional del grupo
  rationale: '''Watchers'' se traduce aquí como ''Vigilantes'' para mantener el valor nominal del grupo y la claridad en español, sin imponer una versión eclesiástica tradicional que atenúe el término.'
- source_word: συνεχῶς ὁρῶντες
  english_pob_choice: as they kept looking at them continually
  chosen_spanish: mientras los miraban continuamente
  alternatives_spanish:
  - al seguir mirándolos sin cesar
  - al mirarlas continuamente
  lexicon: ὁράω
  rationale: La construcción expresa continuidad repetida; 'mientras los miraban continuamente' preserva la iteración y el aspecto durativo sin sobrecargar la frase.
- source_word: ἐν ἐπιθυμίᾳ
  english_pob_choice: came to be in desire for them
  chosen_spanish: llegaron a desearlas
  alternatives_spanish:
  - fueron tomados por el deseo de ellas
  - cayeron en deseo por ellas
  lexicon: ἐπιθυμία
  rationale: El griego indica entrada en un estado de deseo. 'Llegaron a desearlas' reproduce ese ingreso progresivo al deseo de manera natural en español.
- source_word: τὴν πρᾶξιν
  english_pob_choice: the deed
  chosen_spanish: el acto
  alternatives_spanish:
  - la acción
  - la obra
  lexicon: πρᾶξις
  rationale: '''El acto'' mantiene la referencia deliberada a la consumación prevista sin especificar más de lo que el texto ofrece.'
- source_word: μετεσχηματίζοντο
  english_pob_choice: they were transforming themselves
  chosen_spanish: se transformaban
  alternatives_spanish:
  - se transfiguraban
  - cambiaban de forma
  lexicon: μετασχηματίζω
  rationale: El pasivo/medio imperfectivo señala proceso continuo; 'se transformaban' refleja bien la acción en curso y el revisado inglés 'were transforming themselves'.
- source_word: εἰς ἄνδρα
  english_pob_choice: into the form of men
  chosen_spanish: en forma de hombres
  alternatives_spanish:
  - a la forma de hombres
  - como hombres
  lexicon: ἄνδρα
  rationale: '''En forma de hombres'' conserva la transformación formal sin añadir interpretaciones; es fiel al valor de cambio de apariencia.'
- source_word: συνουσία
  english_pob_choice: appearing to them while their husbands were with them
  chosen_spanish: se les aparecían mientras sus maridos estaban con ellas
  alternatives_spanish:
  - se mostraban a ellas cuando sus maridos estaban con ellas
  - aparecían ante ellas mientras sus maridos estaban con ellas
  lexicon: συνουσία
  rationale: La frase griega indica coexistencia de presencia masculina y aparición engañosa; el español mantiene ese simultáneo 'mientras' sin aclarar más de lo que el texto permite.
theological_decisions:
- issue: Identidad y tratamiento del grupo pre-diluviano
  english_pob_reading: Watchers before the flood
  chosen_spanish_reading: Vigilantes antes del diluvio
  alternative_spanish_readings:
  - Vigilantes antes del diluvio
  - los ángeles vigilantes antes del diluvio
  rationale: Se conserva el nombre del grupo como término técnico sin expandirlo a 'ángeles' porque el texto griego y el POB inglés usan la designación 'Watchers' como apelativo propio del grupo.
  doctrine_reference: Lectura de tradición enóquica / título grupal
- issue: Relación entre deseo y deliberación moral
  english_pob_reading: they also came to be in desire for them, and they conceived the deed in their mind
  chosen_spanish_reading: también llegaron a desearlas, y concibieron el acto en su mente
  alternative_spanish_readings:
  - también fueron tomadas por deseo de ellas, y planearon el acto en su mente
  - también quedaron en deseo por ellas, y concibieron la acción en su mente
  rationale: La secuencia distingue deseo y concepción mental del acto, preservando tanto la dimensión afectiva como la deliberada; no se reduce a una simple tentación emocional.
  doctrine_reference: Antropología moral; intención y consentimiento
translation_notes:
  revision_awareness: La redacción sigue el texto griego y el ajuste revisado del POB que favorece 'enticed' para ἔθελξαν, 'came to be in desire' para ἐν ἐπιθυμίᾳ y 'transforming themselves' para μετεσχηματίζοντο; también conserva la relación simultánea entre la apariencia y la presencia de los maridos sin añadir especificaciones ajenas al testimonio fuente.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando el pasaje lo exija explícitamente; aquí no aparece.
  - '''Vigilantes'' se usa como término técnico consistente con ''Watchers''.'
  - Se evita 'Cristo' porque no hay lenguaje mesiánico en este versículo.
  - No se introducen notas de pie porque el texto español no requiere alternativas textuales adicionales para este pasaje.
