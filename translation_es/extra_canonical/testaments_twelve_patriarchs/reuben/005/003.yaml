base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/reuben/005/003.yaml
  text: For an angel of God also told me and taught me concerning them that women are overcome by the spirit of sexual immorality more than men, and in their hearts they devise things against men; and by adornment they lead their minds astray, and through a glance they sow the poison, and first in thought and then by the act they take captive.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:32Z'
    unchanged: false
    changes_summary: Reordered the opening for natural English while preserving the sense; changed 'a man' to 'men' for generic comparison; changed 'their heart' to 'their hearts' for agreement.
translation:
  language: es
  text: Porque también un ángel de Dios me dijo y me enseñó acerca de ellas que las mujeres son vencidas por el espíritu de la inmoralidad sexual más que los hombres, y en sus corazones maquinan cosas contra los hombres; y por medio del adorno extravían sus mentes, y mediante una mirada siembran el veneno, y primero en el pensamiento y luego por la acción las toman cautivas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ὅτι καίγε περὶ αὐτῶν εἰπεῖν μοι δ᾽ ἄγγελος τοῦ Θεοῦ, καὶ ἐδίδαξέ με
  english_pob_choice: For an angel of God also told me and taught me concerning them
  chosen_spanish: Porque también un ángel de Dios me dijo y me enseñó acerca de ellas
  alternatives_spanish:
  - Pues también un ángel de Dios me habló y me instruyó acerca de ellas
  - Porque un ángel de Dios también me dijo y me enseñó sobre ellas
  lexicon: porque/Ὅτι; ángel/ἄγγελος; Dios/τοῦ Θεοῦ
  rationale: Mantengo la apertura causal/explicativa de Ὅτι con «Porque». «Me dijo y me enseñó» sigue de cerca el doble verbal del griego y el audit trail inglés, sin forzar un giro más interpretativo. «Acerca de ellas» conserva el referente femenino plural implícito en el contexto.
- source_word: αἱ γυναῖκες ἡττῶνται τῷ πνεύματι τῆς πορνείας ὑπὲρ τὸν ἄνδρα
  english_pob_choice: women are overcome by the spirit of sexual immorality more than men
  chosen_spanish: las mujeres son vencidas por el espíritu de la inmoralidad sexual más que los hombres
  alternatives_spanish:
  - las mujeres son vencidas por el espíritu de la inmoralidad sexual más que el hombre
  - las mujeres son dominadas por el espíritu de la inmoralidad sexual más que los hombres
  lexicon: mujeres/γυναῖκες; son vencidas/ἡττῶνται; espíritu/πνεύματι; inmoralidad sexual/πορνείας
  rationale: «Son vencidas» reproduce la pasividad del verbo griego y la elección inglesa «are overcome». «Espíritu de la inmoralidad sexual» conserva la fuerza personificada/causativa de πνεύματι τῆς πορνείας sin suavizarla a un mero comportamiento.
- source_word: ἐν καρδίᾳ μηχανῶνται κατὰ τῶν ἀνθρώπων
  english_pob_choice: in their hearts they devise things against men
  chosen_spanish: y en sus corazones maquinan cosas contra los hombres
  alternatives_spanish:
  - y en sus corazones planean cosas contra los hombres
  - y en su corazón maquinan cosas contra los hombres
  lexicon: corazones/καρδίᾳ; maquinan/μηχανῶνται; hombres/ἀνθρώπων
  rationale: «Maquinan» preserva la idea de tramar/idear con intención hostil, más fuerte que «planean». Se pluraliza «corazones» para concordar con el sujeto plural, como hizo la revisión inglesa.
- source_word: διὰ τῆς κοσμήσεως πλανῶσι τὰς διανοίας
  english_pob_choice: by adornment they lead their minds astray
  chosen_spanish: y por medio del adorno extravían sus mentes
  alternatives_spanish:
  - y por medio del adorno desvían sus mentes
  - y mediante el adorno engañan sus mentes
  lexicon: por medio de/διὰ; adorno/κοσμήσεως; extravían/πλανῶσι; mentes/διανοίας
  rationale: «Adorno» mantiene el sustantivo concreto del griego. «Extravían sus mentes» sigue el valor de πλανῶσι y refleja la lectura inglesa «lead their minds astray» sin añadir un objeto ajeno al texto.
- source_word: διὰ τοῦ βλέμματος τὸν ἰὸν ἐνσπείρουσι
  english_pob_choice: through a glance they sow the poison
  chosen_spanish: y mediante una mirada siembran el veneno
  alternatives_spanish:
  - y a través de una mirada siembran el veneno
  - y por una mirada siembran el veneno
  lexicon: mediante/διὰ; mirada/βλέμματος; siembran/ἐνσπείρουσι; veneno/ἰόν
  rationale: «Mediante una mirada» traduce con naturalidad la vía instrumental del griego y evita reducir βλέμμα a una mirada trivial. «Veneno» conserva el sentido literal de ἰὸν según el inglés POB.
- source_word: πρῶτον καὶ τότε τῷ ἔργῳ αἰχμαλωτίζουσιν
  english_pob_choice: first in thought and then by the act they take captive
  chosen_spanish: y primero en el pensamiento y luego por la acción las toman cautivas
  alternatives_spanish:
  - y primero en el pensamiento y luego por la obra las toman cautivas
  - y primero en pensamiento y luego en la acción las cautivan
  lexicon: primero... luego/πρῶτον καὶ τότε; pensamiento/τῷ ἔργῳ (según el audit trail inglés); toman cautivas/αἰχμαλωτίζουσιν
  rationale: Sigo el audit trail inglés que interpreta τῷ ἔργῳ como «by the act», pero en español lo expreso con «por la acción» para evitar una frase demasiado literal. «Las toman cautivas» conserva la imagen de captura activa del verbo.
theological_decisions:
- issue: πνεύματι τῆς πορνείας como fuerza espiritual o meramente moral
  english_pob_reading: spirit of sexual immorality
  chosen_spanish_reading: espíritu de la inmoralidad sexual
  alternative_spanish_readings:
  - espíritu de fornicación
  - espíritu de impureza sexual
  rationale: La frase se mantiene como entidad espiritual causal, no sólo como descripción ética. «Inmoralidad sexual» es amplio y comprensible en español contemporáneo, y conserva la densidad del griego sin rebajarla a un eufemismo.
  doctrine_reference: Anthropology / spiritual warfare in apocryphal ethical exhortation
- issue: τὸν ἰόν como imagen de daño penetrante
  english_pob_reading: the poison
  chosen_spanish_reading: el veneno
  alternative_spanish_readings:
  - el veneno mortal
  - el ponzoñoso daño
  rationale: El texto inglés fija «poison», así que «veneno» mantiene la imagen de corrupción/infección. No se introduce una paráfrasis moralizante adicional.
  doctrine_reference: Moral corruption imagery
- issue: τῷ ἔργῳ en la clausula final
  english_pob_reading: by the act
  chosen_spanish_reading: por la acción
  alternative_spanish_readings:
  - por la obra
  - por el acto
  rationale: La revisión inglesa decidió no dejar «thought and then by the act» como un simple paralelismo abstracto, sino marcar una progresión de pensamiento a acto. «Por la acción» comunica esa progresión de forma natural en español.
  doctrine_reference: Voluntariness of sin progression
translation_notes:
  revision_awareness: 'La versión inglesa revisada reordenó la apertura para hacerla más natural, cambió el singular genérico «a man» por el plural «men» y ajustó «their heart» a «their hearts». La traducción española sigue esa lectura revisada: conserva el orden natural con «Porque también un ángel de Dios me dijo y me enseñó acerca de ellas», usa plural masculino genérico «los hombres» y pluraliza «sus corazones».'
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεοῦ y «espíritu» para πνεύματι en este contexto.
  - Se usa «inmoralidad sexual» para πορνείας conforme al vocabulario POB y a la claridad contemporánea.
  - Se evita «SEÑOR» o sustituciones tradicionales porque el texto no contiene κύριος en este pasaje.
  - No se añaden notas al pie porque no hay una variante que requiera anclaje textual en esta sección.
