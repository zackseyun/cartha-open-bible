id: T12P.REU.5.7
reference: Testament of Reuben 5:7
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 66-79, Reuben pilot)
  text: '* Κἀκεῖναι γὰρ⁷⁰ ἐπιθυμοῦσαι * τῇ διανοίᾳ τῆς φαντασίας⁷¹ αὐτῶν ἔτεκον⁷² γίγαντας. Ἐφαίνοντο γὰρ αὐταῖς⁷³ * οἱ Ἐγρήγοροι⁷⁴ * ἕως εἰ θέλετε τοῦ οὐρανοῦ φθάνοντες⁷⁵.'
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/reuben/005/007.yaml
  text: And those women also, desiring in their minds their appearance, gave birth to giants. For the Watchers appeared to them as reaching to heaven.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:34Z'
    unchanged: false
    changes_summary: Clarified the subject with 'those women also,' rendered αὐτῶν more naturally as 'their appearance' rather than 'the appearance of them,' and smoothed the final clause to 'reaching to heaven' for more natural formal English while preserving the sense.
translation:
  language: es
  text: Y aquellas mujeres también, deseando en su mente la apariencia de ellos, dieron a luz a gigantes. Porque los Vigilantes se les aparecieron como si alcanzaran hasta el cielo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπιθυμοῦσαι
  english_pob_choice: desiring
  chosen_spanish: deseando
  alternatives_spanish:
  - codiciando
  - anhelando
  lexicon: ἐπιθυμέω
  rationale: El griego expresa un deseo intenso; en español, "deseando" conserva la fuerza sin imponer de entrada una carga moral más específica que el contexto no exige aquí.
- source_word: τῇ διανοίᾳ τῆς φαντασίας αὐτῶν
  english_pob_choice: in their minds their appearance
  chosen_spanish: en su mente su apariencia
  alternatives_spanish:
  - con su imaginación la apariencia de ellos
  - en la mente de su fantasía su apariencia
  lexicon: διάνοια / φαντασία
  rationale: La secuencia griega une la interioridad mental con la imagen formada. "En su mente su apariencia" mantiene esa relación de manera natural en español y evita sobreexplicar o forzar un doblete técnico.
- source_word: ἔτεκον γίγαντας
  english_pob_choice: gave birth to giants
  chosen_spanish: dieron a luz a gigantes
  alternatives_spanish:
  - parieron gigantes
  - engendraron gigantes
  lexicon: τίκτω / γίγας
  rationale: '"Dieron a luz" es la equivalencia más transparente y sobria para ἔτεκον; "gigantes" corresponde directamente a γίγαντας y preserva el término tradicional sin reinterpretarlo.'
- source_word: οἱ Ἐγρήγοροι
  english_pob_choice: the Watchers
  chosen_spanish: los Vigilantes
  alternatives_spanish:
  - los Watchers
  - los Observadores
  lexicon: Ἐγρήγοροι
  rationale: '"Vigilantes" es el equivalente español natural y reconocible para el término angelológico del texto. Mantiene el nombre de grupo sin recurrir al inglés ni a una paráfrasis explicativa.'
- source_word: ἕως εἰ θέλετε τοῦ οὐρανοῦ φθάνοντες
  english_pob_choice: appeared to them as reaching to heaven
  chosen_spanish: se les aparecían como si alcanzaran hasta el cielo
  alternatives_spanish:
  - se les aparecían como llegando al cielo
  - parecían alcanzar el cielo
  lexicon: φαίνομαι / φθάνω / οὐρανός
  rationale: La construcción describe apariencia y altura. "Se les aparecían" preserva el valor de φαίνοντο; "como si alcanzaran hasta el cielo" reproduce el sentido de alcance vertical de φθάνοντες y evita un calco duro. "Cielo" es el término idiomático en español para οὐρανός en este contexto.
theological_decisions:
- issue: Naturaleza de los seres llamados Ἐγρήγοροι
  english_pob_reading: the Watchers
  chosen_spanish_reading: los Vigilantes
  alternative_spanish_readings:
  - los ángeles vigilantes
  - los vigilantes celestiales
  rationale: El texto presenta a este grupo como seres que se manifiestan a las mujeres; el español "Vigilantes" conserva el título sin añadir una identificación doctrinal que el verso no explicita.
  doctrine_reference: Angelología del libro de los Doce Patriarcas / tradiciones sobre los Vigilantes
- issue: Sentido de αὐτῶν en la frase sobre la apariencia
  english_pob_reading: their appearance
  chosen_spanish_reading: su apariencia
  alternative_spanish_readings:
  - la apariencia de ellos
  - su aspecto
  rationale: La revisión inglesa aclara que αὐτῶν funciona más naturalmente como posesivo referido a la apariencia. En español, "su apariencia" es la forma más clara y fiel, sin introducir ambigüedad innecesaria.
  doctrine_reference: Crítica textual y sintaxis griega
- issue: Expresión comparativa final
  english_pob_reading: as reaching to heaven
  chosen_spanish_reading: como si alcanzaran hasta el cielo
  alternative_spanish_readings:
  - como alcanzando al cielo
  - como llegando hasta el cielo
  rationale: La comparación mantiene la apariencia de altura extrema sin convertirla en afirmación literal. "Como si" conserva el valor fenomenológico del pasaje.
  doctrine_reference: Lectura descriptiva del fenómeno narrado
translation_notes:
  revision_awareness: 'La versión inglesa revisada aclaró el sujeto con "those women also", naturalizó αὐτῶν como "their appearance" y suavizó la clausula final a "reaching to heaven". La traducción española sigue esas decisiones: explicita el sujeto con "aquellas mujeres también", usa un posesivo natural en "su apariencia" y conserva una comparación fluida con "como si alcanzaran hasta el cielo".'
  spanish_consistency_notes:
  - Se usa "Vigilantes" para Ἐγρήγοροι, conforme al uso estable de la tradición textual, sin introducir una glosa adicional en el cuerpo del verso.
  - '"Cielo" se prefiere aquí sobre "cielo(s)" o "firmamento" porque el contexto es de elevación y no de astronomía.'
  - '"Dieron a luz" mantiene el verbo de nacimiento sin amplificar la imagen más allá del griego.'
