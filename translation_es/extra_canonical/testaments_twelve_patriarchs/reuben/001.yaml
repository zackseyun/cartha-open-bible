translation:
  language: es
  text: 'Una copia del testamento de Rubén, lo que mandó a sus hijos antes de morir, en el año ciento veinticinco de su vida.


    2 Dos años después de la muerte de José, su hermano, cuando Rubén había caído enfermo, se reunieron los hijos de José y los hijos de sus hijos para visitarlo. 3 Y les dijo: «Hijos míos, miren, estoy muriendo, y voy por el camino de mis padres». 4 Entonces, al ver allí a Judá, Gad y Aser, sus hermanos, les dijo: «Levántennme, para que pueda decir a mis hermanos y a mis hijos las cosas escondidas en mi corazón; porque miren, aun ahora estoy desfalleciendo». 5 Y, levantándose, los besó y les dijo: «Escuchen, hermanos míos e hijos míos; atiendan a Rubén, su padre, en las cosas que les mando.


    6 “Y miren, hoy pongo por testigo contra ustedes al Dios del cielo, para que no anden en la ignorancia de la juventud y en la inmoralidad sexual, en la cual yo fui arrastrado[a] y profané el lecho de mi padre Jacob. 7 Y les digo que él me hirió con un golpe severo en mis lomos por siete meses; y si mi padre Jacob no hubiera orado por mí al Señor, el Señor habría querido destruirme. 8 Porque yo tenía treinta años cuando hice la maldad delante del Señor, y por siete meses fui debilitado hasta la muerte. 9 Y después de esto, con la resolución de mi alma, me arrepentí delante del Señor por siete años. 10 Y no bebí vino ni licor fuerte, y carne no entró en mi boca, y no comí pan de deseo; sino que estaba de luto por mi pecado, porque era grande: tal cosa no había sucedido en Israel».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «me dejé llevar»; el griego ἐξεχύθην es vívido y aquí sugiere ser vencido o arrastrado por el deseo, no una acción simple.
    reason: lexical_alternative
lexical_decisions:
- source_word: διαθήκη
  english_pob_choice: testament
  chosen_spanish: testamento
  alternatives_spanish:
  - pacto
  - última exhortación
  lexicon: LSJ
  rationale: En este escrito el término funciona como discurso de despedida con valor testamentario, no como pacto bilateral. «Testamento» conserva el género literario y la función de las palabras finales de Rubén.
- source_word: ἐνετείλατο
  english_pob_choice: commanded
  chosen_spanish: mandó
  alternatives_spanish:
  - encargó
  - instruyó
  lexicon: BDAG
  rationale: El verbo expresa una autoridad paterna y solemne. «Mandó» comunica mejor esa fuerza que una formulación más suave como «instruyó».
- source_word: πορεύομαι ὁδὸν τῶν πατέρων μου
  english_pob_choice: I am going the way of my fathers
  chosen_spanish: voy por el camino de mis padres
  alternatives_spanish:
  - me voy a mis padres
  - voy el camino de mis padres
  lexicon: LSJ
  rationale: Es una fórmula de muerte tradicional. «Voy por el camino de mis padres» mantiene el giro idiomático con un español natural y elevado.
- source_word: κρυπτά
  english_pob_choice: hidden
  chosen_spanish: escondidas
  alternatives_spanish:
  - ocultas
  - secretas
  lexicon: BDAG
  rationale: Rubén anuncia que va a decir lo que ha guardado en su interior. «Escondidas» conserva la idea de contenido no revelado, con una cadencia más fluida en español.
- source_word: ἐπιμαρτύρομαι
  english_pob_choice: I call ... to witness against you
  chosen_spanish: pongo por testigo contra ustedes
  alternatives_spanish:
  - les doy testimonio
  - los conjuro delante de
  lexicon: BDAG
  rationale: La expresión es forense y solemne. «Pongo por testigo contra ustedes» preserva el valor de advertencia y la relación judicial implícita.
- source_word: ἀγνοίᾳ νεότητος
  english_pob_choice: ignorance of youth
  chosen_spanish: ignorancia de la juventud
  alternatives_spanish:
  - ignorancia juvenil
  - insensatez de la juventud
  lexicon: LSJ
  rationale: La frase apunta a una ceguera moral asociada con la juventud. «Ignorancia de la juventud» es fiel y comprensible.
- source_word: πορνείᾳ
  english_pob_choice: sexual immorality
  chosen_spanish: inmoralidad sexual
  alternatives_spanish:
  - fornicación
  - pecado sexual
  lexicon: BDAG
  rationale: Se busca una forma clara y amplia para conducta sexual ilícita. «Inmoralidad sexual» conserva el alcance sin sonar arcaica.
- source_word: ἐξεχύθην
  english_pob_choice: I was carried away
  chosen_spanish: fui arrastrado
  alternatives_spanish:
  - me dejé llevar
  - fui derramado
  lexicon: LSJ
  rationale: La revisión inglesa entendió el verbo en sentido contextual de ser vencido o arrastrado por la pasión. «Fui arrastrado» transmite esa pérdida de control sin borrar la viveza del griego.
- source_word: ἐμίανα κοίτην
  english_pob_choice: defiled the bed
  chosen_spanish: profané el lecho
  alternatives_spanish:
  - contaminé el lecho
  - deshonré el lecho
  lexicon: BDAG
  rationale: «Profané el lecho» mantiene el tono fuerte y el posible eco del lecho de Jacob, con una formulación idiomática en español.
- source_word: πληγῇ μεγάλῃ
  english_pob_choice: a severe blow
  chosen_spanish: un golpe severo
  alternatives_spanish:
  - un gran azote
  - un fuerte castigo
  lexicon: LSJ
  rationale: El contexto presenta un castigo corporal/divino. «Golpe severo» conserva la idea de herida o impacto punitivo sin convertirla en una calamidad general.
- source_word: ἐπὶ τῆς λαγόνος μου
  english_pob_choice: in my loins
  chosen_spanish: en mis lomos
  alternatives_spanish:
  - en mi ingle
  - en mi costado
  lexicon: LSJ
  rationale: «Lomos» preserva el registro elevado y la asociación corporal directa con el castigo descrito.
- source_word: ἐμαλακίσθην
  english_pob_choice: I was weakened
  chosen_spanish: fui debilitado
  alternatives_spanish:
  - me debilitó
  - quedé sin fuerzas
  lexicon: BDAG
  rationale: La pasiva indica un debilitamiento físico real. «Fui debilitado» es claro, grave y cercano al griego.
- source_word: ἐν προαιρέσει ψυχῆς μου
  english_pob_choice: with the resolve of my soul
  chosen_spanish: con la resolución de mi alma
  alternatives_spanish:
  - con el propósito de mi alma
  - con la determinación de mi corazón
  lexicon: LSJ
  rationale: La expresión subraya una decisión interior y voluntaria. «Resolución de mi alma» conserva el tono solemne del pasaje.
- source_word: μετενόησα
  english_pob_choice: I repented
  chosen_spanish: me arrepentí
  alternatives_spanish:
  - cambié de mente
  - volví atrás
  lexicon: BDAG
  rationale: En un contexto de confesión de pecado concreto, el valor normal es «arrepentirse». Esa opción mantiene la fuerza moral y penitencial.
- source_word: σίκερα
  english_pob_choice: strong drink
  chosen_spanish: licor fuerte
  alternatives_spanish:
  - bebida fuerte
  - bebida fermentada
  lexicon: BDAG
  rationale: Es la categoría amplia distinta del vino. «Licor fuerte» es transparente para el lector moderno y refleja la abstinencia ascética del texto.
- source_word: ἄρτον ἐπιθυμίας
  english_pob_choice: bread of desire
  chosen_spanish: pan de deseo
  alternatives_spanish:
  - pan apetecible
  - pan delicado
  - pan selecto
  lexicon: LSJ
  rationale: La frase es deliberadamente literal y ascética. «Pan de deseo» preserva esa textura extraña y permite inferir la renuncia a comida agradable o selecta.
- source_word: πενθῶν
  english_pob_choice: mourning
  chosen_spanish: estaba de luto
  alternatives_spanish:
  - estaba llorando
  - lamentaba
  lexicon: BDAG
  rationale: El verbo expresa duelo penitencial sostenido. «Estaba de luto» comunica mejor ese estado continuo que una tristeza meramente interior.
theological_decisions:
- issue: La fórmula juramentaria de advertencia ante Dios en el v. 6
  english_pob_reading: Today I call the God of heaven to witness against you
  chosen_spanish_reading: hoy pongo por testigo contra ustedes al Dios del cielo
  alternative_spanish_readings:
  - hoy doy testimonio ante el Dios del cielo
  - hoy los conjuro delante del Dios del cielo
  rationale: El griego tiene un matiz forense y solemne. La elección preserva la advertencia pública y la función de amonestación, sin volverla excesivamente arcaica.
  doctrine_reference: DOCTRINE.md §Translation philosophy; preservar el peso teológico sin oscurecer el sentido
- issue: El valor de μετενόησα en el v. 9
  english_pob_reading: I repented
  chosen_spanish_reading: me arrepentí
  alternative_spanish_readings:
  - cambié de mente
  - me volví atrás
  rationale: Aquí Rubén confiesa un pecado concreto y describe una disciplina penitencial prolongada. «Me arrepentí» conserva el valor moral y religioso que el texto exige.
  doctrine_reference: 'DOCTRINE.md, tabla de términos controvertidos: μετανοέω'
- issue: Lenguaje de juicio divino en los vv. 7-8
  english_pob_reading: the Lord would have been willing to destroy me / I was weakened to the point of death
  chosen_spanish_reading: el Señor habría querido destruirme / fui debilitado hasta la muerte
  alternative_spanish_readings:
  - el Señor habría estado dispuesto a destruirme
  - quedé debilitado hasta casi morir
  rationale: El texto atribuye la aflicción a un castigo serio y a la posibilidad real de destrucción. La traducción conserva esa tensión teológica en vez de suavizarla.
  doctrine_reference: DOCTRINE.md §Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés que cambió en v. 6 de «I was poured out» a «I was carried away»; por eso el español evita una traducción demasiado literal de derramamiento y opta por un verbo de ser arrastrado, que refleja mejor el sentido contextual reconocido en la auditoría más reciente.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» reservado para el nombre divino explícito; aquí el griego dice Κύριος y el pasaje en español conserva «Señor» por la cita indirecta estándar del audit trail.
  - «Mesías/Cristo» no aparece en este tramo; no se requiere decisión adicional.
  - Se preservó el paralelismo penitencial de los vv. 9-10 con un español claro y solemne.
  - La nota [a] está anclada explícitamente en «fui arrastrado[a]» para evitar una nota no vinculada.
