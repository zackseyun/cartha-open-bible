translation:
  language: es
  text: Copia del testamento de Rubén, lo que mandó a sus hijos antes de morir, en el año ciento veinticinco[a] de su vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Año» traduce literalmente el griego ἔτει. Otra posibilidad en español sería «a los ciento veinticinco años», pero eso reexpresa la idea temporal de modo menos literal.
    reason: lexical_alternative
lexical_decisions:
- source_word: ᾿Αντίγραφον
  english_pob_choice: A copy
  chosen_spanish: Copia
  alternatives_spanish:
  - Transcripción
  - Ejemplar
  lexicon: ἀντίγραφον
  rationale: «Copia» reproduce con naturalidad la idea de un documento reproducido sin añadir matices no presentes en el griego. «Transcripción» sería más técnico y «ejemplar» menos preciso aquí.
- source_word: διαθήκης
  english_pob_choice: testament
  chosen_spanish: testamento
  alternatives_spanish:
  - pacto
  - alianza
  lexicon: διαθήκη
  rationale: El POB inglés eligió «testament», y en este contexto de escrito final y disposiciones de Rubén, «testamento» comunica bien el género literario sin forzar el sentido de «alianza».
- source_word: ὅσα ἐνετείλατο τοῖς υἱοῖς αὐτοῦ
  english_pob_choice: what he commanded his sons
  chosen_spanish: lo que mandó a sus hijos
  alternatives_spanish:
  - lo que ordenó a sus hijos
  - las cosas que les mandó a sus hijos
  lexicon: ἐντέλλομαι
  rationale: «Mandó» preserva el verbo de mandato de forma clara y idiomática en español. «Ordenó» es posible, pero «mandó» suena más natural en una fórmula narrativa breve.
- source_word: πρὶν ἢ ἀποθανεῖν αὐτόν
  english_pob_choice: before he died
  chosen_spanish: antes de morir
  alternatives_spanish:
  - antes de que muriera
  - antes de su muerte
  lexicon: πρίν + infinitivo
  rationale: La construcción temporal se expresa de manera directa y fiel con «antes de morir». Mantiene la sencillez del original y del POB inglés.
- source_word: ἐν ἑκατοστῷ εἰκοστῷ πέμπτῳ ἔτει
  english_pob_choice: in the one hundred and twenty-fifth year
  chosen_spanish: en el año ciento veinticinco
  alternatives_spanish:
  - en el centésimo vigésimo quinto año
  - a los ciento veinticinco años
  lexicon: ἔτος
  rationale: «En el año ciento veinticinco» conserva el sentido literal del griego y la formulación del POB inglés. «A los ciento veinticinco años» podría sonar más natural en español, pero desplaza el sustantivo explícito «año».
- source_word: τῆς ζωῆς αὐτοῦ
  english_pob_choice: of his life
  chosen_spanish: de su vida
  alternatives_spanish:
  - de su existencia
  - de su vida terrenal
  lexicon: ζωή
  rationale: «De su vida» corresponde directamente al genitivo griego y mantiene el registro sobrio del texto.
theological_decisions:
- issue: Whether διαθήκη should be rendered as covenantal language or as a literary testament in this opening title formula.
  english_pob_reading: testament
  chosen_spanish_reading: testamento
  alternative_spanish_readings:
  - alianza
  - pacto
  rationale: Aquí el contexto inmediato es el encabezado de un documento atribuido a Rubén con sus últimas instrucciones. El inglés POB toma «testament», y el español «testamento» conserva el género literario sin imponer de entrada una lectura teológica más específica.
  doctrine_reference: Terminología de διαθήκη en contextos literarios frente a pactuales.
translation_notes:
  revision_awareness: La revisión más reciente no requirió cambios; la concordancia alta con la fuente confirma que no se necesitan ajustes textuales ni notas de corrección.
  spanish_consistency_notes:
  - Se mantiene «Rubén» como forma española estándar del nombre propio.
  - Se conserva un registro sobrio y documental, acorde con un encabezado textual breve.
  - No se introduce «SEÑOR» ni terminología cristológica, porque el verso no contiene esas referencias.
