base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/reuben/001/003.yaml
  text: And he said to them, “My children, behold, I am dying and going the way of my fathers.”
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:21Z'
    unchanged: false
    changes_summary: Removed the second explicit 'I am' for more natural English while preserving the Greek sense; otherwise retained the wording.
translation:
  language: es
  text: 'Y les dijo: «Hijos míos, miren, estoy muriendo y voy por el camino de mis padres».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Τέκνα μου
  english_pob_choice: My children
  chosen_spanish: Hijos míos
  alternatives_spanish:
  - Mis hijos
  - Hijos
  lexicon: τέκνα
  rationale: En este contexto de despedida paternal, «Hijos míos» conserva la relación afectiva y la naturalidad del español. «Mis hijos» también sería posible, pero «Hijos míos» refleja mejor el tono directo del vocativo griego.
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: miren
  alternatives_spanish:
  - he aquí
  - miren, pues
  lexicon: ἰδοὺ
  rationale: «Miren» expresa en español contemporáneo la función discursiva de llamar la atención del oyente sin sonar arcaico. Mantiene el impulso retórico de ἰδοὺ sin añadir contenido nuevo.
- source_word: ἐγὼ ἀποθνῄσκω
  english_pob_choice: I am dying
  chosen_spanish: estoy muriendo
  alternatives_spanish:
  - muero
  - estoy por morir
  lexicon: ἀποθνῄσκω
  rationale: La forma progresiva en español conserva el valor actual e inminente del verbo griego y coincide con la solución inglesa auditada. «Muero» sería más breve, pero puede sonar más sentencioso que procesual en este contexto.
- source_word: πορεύομαι ὁδὸν τῶν πατέρων μου
  english_pob_choice: going the way of my fathers
  chosen_spanish: voy por el camino de mis padres
  alternatives_spanish:
  - sigo el camino de mis padres
  - voy al camino de mis padres
  lexicon: πορεύομαι; ὁδός; πατέρες
  rationale: La imagen griega de desplazamiento por un camino se conserva con «voy por el camino». «De mis padres» traduce el genitivo posesivo de manera natural y mantiene la metáfora de la muerte como tránsito hacia la condición de los antepasados.
theological_decisions:
- issue: Metáfora de la muerte como camino hacia los antepasados
  english_pob_reading: going the way of my fathers
  chosen_spanish_reading: voy por el camino de mis padres
  alternative_spanish_readings:
  - sigo el camino de mis padres
  - voy al encuentro de mis padres
  rationale: No se explicita una doctrina adicional; se conserva la expresión tradicional de tránsito mortal hacia los antepasados, sin suavizarla ni convertirla en una paráfrasis interpretativa.
  doctrine_reference: Antropología bíblica / lenguaje funerario patriarcal
translation_notes:
  revision_awareness: 'Se siguió la revisión inglesa más reciente, que suprimió el segundo «I am» por naturalidad. El español reproduce esa economía con una sola forma verbal principal: «estoy muriendo y voy...», sin duplicar el verbo.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» u otra convención de sustitución porque el pasaje no contiene el nombre divino.
  - Se mantiene un registro solemne pero natural, coherente con una despedida patriarcal.
  - No se introduce puntuación o glosa que exceda la brevedad del original griego y del inglés auditado.
