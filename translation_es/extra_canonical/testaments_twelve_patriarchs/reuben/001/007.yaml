  text: 7. *Λέγω δὲ ὑμῖν⁴⁷ ὅτι *ἔπληξέ με⁴⁸ *πληγῇ μεγάλῃ⁴⁹ *ἐπὶ τῆς λαγόνος⁵⁰ μου ἕως⁵¹ μῆνας⁵² ἑπτά· καὶ εἰ μὴ *ὁ πατήρ μου Ἰακὼβ⁵³ προσηύξατο⁵⁴ *περὶ ἐμοῦ πρὸς Κύριον⁵⁵ ἤθελε⁵⁶ Κύριος⁵⁷ ἀνελεῖν με.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/reuben/001/007.yaml
  text: And I tell you that he struck me with a severe blow on my loins for seven months; and if my father Jacob had not prayed to the Lord for me, the Lord would have destroyed me.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:24Z'
    unchanged: false
    changes_summary: Changed 'in my loins' to 'on my loins' for more natural rendering of ἐπὶ; reordered 'prayed for me to the Lord' to 'prayed to the Lord for me' for natural English; simplified 'would have been willing to destroy me' to 'would have destroyed me' to better reflect ἤθελε ... ἀνελεῖν idiomatically.
translation:
  language: es
  text: Y les digo que me hirió con un golpe terrible en mis lomos durante siete meses; y si mi padre Jacob no hubiera orado al Señor por mí, el Señor me habría destruido.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἔπληξέ με πληγῇ μεγάλῃ
  english_pob_choice: he struck me with a severe blow
  chosen_spanish: me hirió con un golpe terrible
  alternatives_spanish:
  - me golpeó con un golpe severo
  - me asestó una dura herida
  lexicon: πλήσσω / πληγή
  rationale: Conserva la idea de un golpe físico fuerte sin volverlo excesivamente técnico. "Hirió" comunica bien la violencia del impacto y "golpe terrible" mantiene la fuerza de πληγῇ μεγάλῃ en un español natural.
- source_word: ἐπὶ τῆς λαγόνος μου
  english_pob_choice: on my loins
  chosen_spanish: en mis lomos
  alternatives_spanish:
  - sobre mis lomos
  - en mi cadera
  lexicon: λαγών
  rationale: '"Lomos" es el término español más tradicional y comprensible para esta zona corporal en contexto bíblico. Conserva la referencia corporal concreta sin diluirla en una paráfrasis anatómica moderna.'
- source_word: πρὸς Κύριον
  english_pob_choice: to the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - hacia el Señor
  - ante el Señor
  lexicon: Κύριος
  rationale: '"Al Señor" reproduce la dirección de la oración con naturalidad. Dado que el contexto griego usa Κύριος como referencia divina, se mantiene la fórmula reverente habitual en español.'
- source_word: ἀνελεῖν με
  english_pob_choice: would have destroyed me
  chosen_spanish: me habría destruido
  alternatives_spanish:
  - me habría quitado la vida
  - me habría eliminado
  lexicon: ἀναιρέω
  rationale: El verbo español "destruir" preserva la gravedad del resultado sin introducir especificaciones no presentes en el griego. Es la correspondencia más natural para el sentido de aniquilación o muerte implícito en el contexto.
theological_decisions:
- issue: Referencia a YHWH mediante Κύριος
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  - el Señor Yahvé
  rationale: En este pasaje el griego dice Κύριος, no el tetragrámaton. La fuente inglesa también mantiene "the Lord"; por eso se conserva "el Señor" en la oración, sin forzar aquí la inserción de "Yahvé".
  doctrine_reference: Uso reverente del título divino en oración; distinción entre el nombre divino y el título en el testimonio textual.
- issue: Sentido de ἤθελε ... ἀνελεῖν me
  english_pob_reading: the Lord would have destroyed me
  chosen_spanish_reading: el Señor me habría destruido
  alternative_spanish_readings:
  - el Señor habría querido destruirme
  - el Señor habría estado dispuesto a destruirme
  rationale: La revisión inglesa favorece un condicional simple y directo. En español, "me habría destruido" transmite la misma posibilidad frustrada sin añadir matiz volitivo explícito que el griego no exige resaltar aquí.
  doctrine_reference: Providencia y preservación divina en respuesta a la oración de Jacob.
translation_notes:
  revision_awareness: 'Se siguió la revisión inglesa más reciente: ''on my loins'' / ''prayed to the Lord for me'' / ''would have destroyed me''. La versión española refleja esas decisiones con orden natural en español y mantiene la intensidad física y narrativa del original griego.'
  spanish_consistency_notes:
  - Se conservó 'Señor' para Κύριος en la oración, en coherencia con el audit trail inglés y con el contexto oracional del pasaje.
  - '''Lomos'' se eligió para mantener el cuerpo concreto del texto; no se suavizó a ''cadera'' ni se espiritualizó la imagen.'
  - La voz narrativa en primera persona y el encadenamiento condicional se mantuvieron sin amplificación interpretativa.
