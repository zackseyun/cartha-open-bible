  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 66-79, Reuben pilot)
  text: 8. Ἤμην γὰρ⁵⁸ ἐτῶν τριάκοντα ὅτε ἔπραξα τὸ πονηρὸν ἐνώπιον Κυρίου⁵⁹. καὶ ἐμαλακίσθην *μῆνας ἑπτὰ⁶⁰ ἕως θανάτου.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/reuben/001/008.yaml
  text: For I was thirty years old when I did evil before the Lord, and for seven months I was weakened to the point of death.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:23Z'
    unchanged: false
    changes_summary: 'Removed ''the ... thing'' to reflect the Greek more naturally and accurately: τὸ πονηρόν is better rendered simply as ''evil'' here. Kept the rest substantially unchanged.'
translation:
  language: es
  text: Porque yo tenía treinta años cuando hice el mal delante de Yahvé, y por siete meses fui debilitado hasta la muerte.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἤμην ... ἐτῶν τριάκοντα
  english_pob_choice: I was thirty years old
  chosen_spanish: yo tenía treinta años
  alternatives_spanish:
  - yo era de treinta años
  - tenía treinta años de edad
  lexicon: ἐτῶν τριάκοντα
  rationale: En español natural, la edad se expresa mejor con «tener»; mantiene el sentido temporal exacto sin calco rígido.
- source_word: ἔπραξα τὸ πονηρόν
  english_pob_choice: I did evil
  chosen_spanish: hice el mal
  alternatives_spanish:
  - practiqué el mal
  - hice lo malo
  lexicon: τὸ πονηρόν
  rationale: El griego usa el sustantivo neutro con fuerza sustantiva; «hice el mal» conserva la concreción moral sin añadir un objeto innecesario. Se evita «la cosa mala», rechazado en la revisión inglesa por ser menos natural.
- source_word: ἐνώπιον Κυρίου
  english_pob_choice: before the Lord
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante el Señor
  - en presencia de Yahvé
  lexicon: Κυρίου
  rationale: Siguiendo el criterio POB para el nombre divino, se traduce Κυρίου aquí como «Yahvé»; «delante de» reproduce el matiz relacional y forense de ἐνώπιον.
- source_word: ἐμαλακίσθην
  english_pob_choice: I was weakened
  chosen_spanish: fui debilitado
  alternatives_spanish:
  - me debilitó la enfermedad
  - quedé debilitado
  lexicon: ἐμαλακίσθην
  rationale: El pasivo expresa una condición padecida; «fui debilitado» conserva la pasividad y el proceso de decaimiento físico.
- source_word: μῆνας ἑπτὰ ἕως θανάτου
  english_pob_choice: for seven months ... to the point of death
  chosen_spanish: por siete meses ... hasta la muerte
  alternatives_spanish:
  - durante siete meses ... hasta morir
  - por siete meses ... al borde de la muerte
  lexicon: μῆνας ἑπτὰ ἕως θανάτου
  rationale: «Hasta la muerte» mantiene la intensidad literal del griego y la estructura de duración; en español implica la gravedad extrema sin ampliar innecesariamente el texto.
theological_decisions:
- issue: Tratamiento del nombre divino en Κυρίου
  english_pob_reading: Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - el Señor
  rationale: El proyecto POB establece «Yahvé» para יהוה; aquí Κυρίου funciona como referencia al nombre divino en el contexto de confesión moral, por lo que se evita la máscara «Señor».
  doctrine_reference: Tetragrámaton / nombre divino
translation_notes:
  revision_awareness: The English audit trail revised 'did the evil thing' to 'did evil' for naturalness and closer alignment with τὸ πονηρόν. The Spanish draft follows that revision by using 'hice el mal' rather than a more expanded nominal phrase.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto para el nombre divino.
  - «hice el mal» conserva la concisión de τὸ πονηρόν y la revisión inglesa.
  - La pasiva «fui debilitado» respeta el sentido padecido del verbo griego.
  - «hasta la muerte» refleja la fórmula de intensidad extrema sin suavizarla.
