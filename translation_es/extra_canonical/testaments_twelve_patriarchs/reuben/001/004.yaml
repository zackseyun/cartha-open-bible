    text: 'O: «estoy pasando de esta vida». El griego ἐκλείπω aquí expresa muerte inminente; «estoy por partir» lo comunica con naturalidad en español.'
    reason: lexical_alternative
  revision_rationale: Se reemplaza 'estoy pasando' por 'estoy por partir' para expresar de manera natural y fiel la agonía o muerte inminente que ἐκλείπω comunica en este contexto testamentario. Se conserva el resto del versículo porque refleja bien el griego y el rastro de auditoría inglés. La nota se reformula para ofrecer una alternativa explicativa real en vez de defender un calco poco idiomático.
