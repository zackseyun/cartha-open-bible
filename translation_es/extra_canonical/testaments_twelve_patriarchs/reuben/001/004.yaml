  verdict: revise
  source_alignment_summary: 'La mayor parte del sentido fuente está bien preservada: Reubén ve a Judá, Gad y Aser, les pide que lo levanten para hablar a sus hermanos e hijos sobre lo que tiene oculto en su corazón, y anuncia su muerte inminente. Sin embargo, la cláusula final ἐκλείπω ἀπὸ τοῦ νῦν ἐγώ, auditada en inglés como ''I am passing away'', no queda fielmente expresada en español por ''estoy pasando'', que en español neutral resulta incompleta y opaca.'
  spanish_quality_summary: El borrador es generalmente claro y digno, pero 'estoy pasando' no es una expresión idiomática para agonía o fallecimiento inminente en español e introduce extrañeza innecesaria. 'Porque, miren' también suena algo conversacional; 'porque miren' o 'porque he aquí' serían opciones, pero no exigen corrección. El ajuste principal es hacer natural y fiel la expresión de muerte inminente.
  glossary_alignment: 'No hay términos del glosario mayor en disputa aquí. Los nombres Judá, Gad y Aser están bien; ἀδελφοί → ''hermanos'', καρδία → ''corazón'', κρυπτά → ''ocultas/escondidas'' son adecuados. La decisión problemática es ἐκλείπω: debe expresarse como ''estoy por partir'' o similar, no como ''estoy pasando''.'
  issues:
  - severity: high
    issue: La expresión 'estoy pasando[a]' no comunica adecuadamente ἐκλείπω en español.
    rationale: Aunque intenta seguir de cerca el inglés 'passing away', en español neutral 'estar pasando' no significa 'morirse' ni 'partir de esta vida' sin complemento. Produce ambigüedad y suena antinatural.
  - severity: medium
    issue: La nota al pie justifica una forma española no idiomática en vez de resolverla en el texto principal.
    rationale: La política pide español legible y fiel, no un calco opaco sostenido por nota. Si se mantiene nota, debe aclarar una alternativa o matiz real, no defender una frase defectuosa.
