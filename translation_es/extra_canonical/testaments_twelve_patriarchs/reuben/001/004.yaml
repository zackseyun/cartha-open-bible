base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/reuben/001/004.yaml
  text: Then, seeing Judah and Gad and Asher there, his brothers, he said to them, “Raise me up, so that I may tell my brothers and my children the things hidden in my heart; for behold, even now I am passing away.”
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:22Z'
    unchanged: false
    changes_summary: Adjusted word order for more natural English ('seeing Judah and Gad and Asher there') and revised 'I am failing' to 'I am passing away' to better reflect ἐκλείπω in this deathbed context.
translation:
  language: es
  text: 'Entonces, al ver allí a Judá, Gad y Aser, sus hermanos, les dijo: «Levántenme, para que pueda decir a mis hermanos y a mis hijos las cosas escondidas en mi corazón; porque, miren, ahora mismo estoy pasando[a]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Lit. «estoy pasando»; la expresión sigue de cerca el griego ἐκλείπω y refleja el matiz adoptado en la revisión inglesa: «I am passing away».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰδὼν ... Ἰούδαν καὶ Γὰδ καὶ ᾿Ασήρ
  english_pob_choice: seeing Judah and Gad and Asher there
  chosen_spanish: al ver allí a Judá, Gad y Aser
  alternatives_spanish:
  - viendo allí a Judá, Gad y Aser
  - al ver a Judá, Gad y Aser allí
  lexicon: ἰδών → ver; names transliterated in standard Spanish forms
  rationale: Mantiene el orden natural del español y conserva el matiz de ubicación ('allí') sin añadir contenido no presente en el griego.
- source_word: ἀδελφοὺς αὐτοῦ
  english_pob_choice: his brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - sus hermanos de sangre
  - sus hermanos
  lexicon: ἀδελφοί → hermanos
  rationale: La relación fraterna es explícita y coincide con la traducción inglesa; no se requiere ampliación.
- source_word: Ἀναστήσατέ με
  english_pob_choice: Raise me up
  chosen_spanish: Levántenme
  alternatives_spanish:
  - Alcenme
  - Pónganme de pie
  lexicon: ἀνίστημι (imperative) → levantar / poner de pie
  rationale: En este contexto de lecho de muerte, 'Levántenme' comunica de modo claro y natural la petición física del griego sin perder la fuerza del mandato.
- source_word: ὅσα ἔχω ... κρυπτά
  english_pob_choice: the things hidden in my heart
  chosen_spanish: las cosas escondidas en mi corazón
  alternatives_spanish:
  - las cosas ocultas en mi corazón
  - las cosas secretas en mi corazón
  lexicon: κρυπτός → escondido/oculto; καρδία → corazón
  rationale: Conserva la imagen interior del texto fuente y la elección auditada en inglés; 'escondidas' es transparente y bíblicamente legible en español.
- source_word: ἐν τῇ καρδίᾳ μου
  english_pob_choice: in my heart
  chosen_spanish: en mi corazón
  alternatives_spanish:
  - en mi interior
  - en mi corazón
  lexicon: καρδία → corazón
  rationale: '''Corazón'' es la equivalencia directa y mantiene el lenguaje antropológico bíblico sin sobreinterpretarlo.'
- source_word: ἐκλείπω
  english_pob_choice: I am passing away
  chosen_spanish: estoy pasando
  alternatives_spanish:
  - estoy expirando
  - estoy por morir
  - me estoy apagando
  lexicon: ἐκλείπω → pasar, extinguirse, expirar
  rationale: Se sigue la revisión inglesa que decidió 'passing away' por reflejar mejor el contexto terminal. En español, 'estoy pasando' reproduce el proceso de desaparición/muerte de forma sobria; el verbo no se fuerza a una paráfrasis más doctrinal.
theological_decisions:
- issue: Lenguaje de muerte inminente
  english_pob_reading: for behold, even now I am passing away
  chosen_spanish_reading: porque, miren, ahora mismo estoy pasando
  alternative_spanish_readings:
  - porque, miren, ahora mismo estoy por morir
  - porque, miren, ahora mismo me estoy apagando
  rationale: La frase mantiene la inmediatez del griego y la decisión inglesa de evitar 'failing' en favor de una expresión de tránsito cercano a la muerte. No se añade una formulación más explícita que el texto no exige.
  doctrine_reference: cf. ἐκλείπω en contexto de agonía; preservación de la imagen sin reinterpretación doctrinal
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del inglés, que ajustó la última cláusula de 'I am failing' a 'I am passing away' para reflejar mejor ἐκλείπω en contexto de lecho de muerte. La ordenación 'seeing Judah and Gad and Asher there' también se reflejó con un orden natural en español.
  spanish_consistency_notes:
  - 'Se conservaron los nombres propios en formas usuales en español: Judá, Gad y Aser.'
  - Se evitó 'Señor' u otras sustituciones no pertinentes; el pasaje no contiene referencias directas al Nombre divino.
  - La puntuación reproduce el tono de discurso directo y la progresión retórica del original.
