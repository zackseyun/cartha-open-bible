base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/reuben/001/005.yaml
  text: And rising up, he kissed them and said to them, “Hear, my brothers and my sons; listen to Reuben your father in what I command you.”
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:53Z'
    unchanged: false
    changes_summary: Changed 'pay attention to' to 'listen to' for a more direct and natural rendering of the imperative, and smoothed 'in the things that I command you' to 'in what I command you' for more natural formal English while preserving the sense.
translation:
  language: es
  text: 'Y levantándose, los besó y les dijo: «Escuchen, mis hermanos y mis hijos; escuchen a Rubén, su padre, en cuanto a lo que les mando».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀναστὰς
  english_pob_choice: And rising up
  chosen_spanish: Y levantándose
  alternatives_spanish:
  - Y al levantarse
  - Y poniéndose en pie
  lexicon: ἀνίστημι
  rationale: El participio aoristo expresa la acción de ponerse de pie antes de hablar; «levantándose» conserva la secuencia narrativa con español natural y sin añadir énfasis no presente en el griego.
- source_word: κατεφίλησεν
  english_pob_choice: he kissed them
  chosen_spanish: los besó
  alternatives_spanish:
  - los abrazó y besó
  - los besó con afecto
  lexicon: καταφιλέω
  rationale: El verbo indica un beso intensivo o afectuoso; en español, «los besó» es suficiente y sobrio, dejando el matiz afectivo implícito sin sobretraducción.
- source_word: ἀδελφοί μου καὶ υἱοί μου
  english_pob_choice: my brothers and my sons
  chosen_spanish: hermanos míos y hijos míos
  alternatives_spanish:
  - mis hermanos y mis hijos
  - hermanos míos e hijos míos
  lexicon: ἀδελφός / υἱός
  rationale: Se mantiene la doble apelación vocativa del original. La forma posesiva pospuesta conserva el tono solemne y familiar del discurso.
- source_word: Ῥουβὴμ τοῦ πατρὸς ὑμῶν
  english_pob_choice: Reuben your father
  chosen_spanish: a Rubén, su padre
  alternatives_spanish:
  - a Rubén, vuestro padre
  - a Rubén, su padre
  lexicon: Ῥουβήμ / πατήρ
  rationale: 'La referencia a Rubén como padre se conserva, pero en español queda más natural como complemento de destinatario: «oigan a Rubén, su padre». Mantiene la relación paterna sin forzar una construcción extraña.'
- source_word: ἐντέλλομαι
  english_pob_choice: what I command you
  chosen_spanish: lo que les mando
  alternatives_spanish:
  - lo que les ordeno
  - lo que les encargo
  lexicon: ἐντέλλομαι
  rationale: «Mandar» comunica bien la fuerza de mandato de ἐντέλλομαι en español bíblico contemporáneo y coincide con la revisión inglesa más natural («what I command you»).
theological_decisions:
- issue: 'Relación de Rubén con los destinatarios: «su padre»'
  english_pob_reading: Reuben your father
  chosen_spanish_reading: Rubén, su padre
  alternative_spanish_readings:
  - Rubén, vuestro padre
  - Rubén, padre de ustedes
  rationale: El griego conserva la designación paternal de Rubén respecto de los oyentes. En español se preserva la tensión relacional sin explicarla más de lo que el texto permite.
  doctrine_reference: No doctrinal shift; kinship language only.
translation_notes:
  revision_awareness: La redacción inglesa revisada pasó de «pay attention to» a «listen to» y de «in the things that I command you» a «in what I command you» para mayor naturalidad. La versión española sigue esa misma dirección de naturalidad formal, evitando calcos como «presten atención a» o «en las cosas que les mando».
  spanish_consistency_notes:
  - Se usa «hijos» para υἱοί en paralelo con «hermanos», manteniendo el doble vocativo.
  - Se conserva «Rubén» como nombre propio tradicional en español.
  - Se emplea «mando» y no «ordeno» para un registro bíblico sobrio y directo.
