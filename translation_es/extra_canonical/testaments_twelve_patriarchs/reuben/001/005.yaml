review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia griega: participio inicial («levantándose»), beso, habla directa, doble vocativo («hermanos… e hijos…») y la exhortación a escuchar a Rubén como padre. Sin embargo, «oigan a Rubén, su padre, en lo que les mando» suena algo forzado en español y no refleja con suficiente naturalidad la relación entre «escuchen» y «a Rubén vuestro/su padre» + «en lo que les mando».'
  spanish_quality_summary: El texto es claro y mayormente fiel, pero «hermanos míos y hijos míos» resulta menos natural que «mis hermanos y mis hijos» en español actual, y «oigan… en lo que les mando» tiene una sintaxis pesada. Conviene pulirlo para una lectura más digna y natural sin apartarse del sentido.
  glossary_alignment: No hay términos del glosario mayor implicados. «Rubén» está bien. «Mando» preserva adecuadamente ἐντέλλομαι. No hay conflicto terminológico teológico.
  issues:
  - severity: medium
    issue: 'Vocativo español algo rígido: «hermanos míos y hijos míos»'
    rationale: Aunque posible, en español moderno y eclesial amplio suena más natural «mis hermanos y mis hijos», sin pérdida de solemnidad ni del doble apelativo del griego.
  - severity: medium
    issue: 'Construcción poco natural: «oigan a Rubén, su padre, en lo que les mando»'
    rationale: La preposición «en» con «oigan» produce una frase trabada. El sentido se expresa mejor en español con una formulación como «escuchen a Rubén, su padre, cuando les mando estas cosas» o «en cuanto a lo que les mando», manteniendo la conexión con ἐντέλλομαι.
  revised_spanish_text: 'Y levantándose, los besó y les dijo: «Escuchen, mis hermanos y mis hijos; escuchen a Rubén, su padre, en cuanto a lo que les mando».'
  revision_rationale: 'Se conserva fielmente la estructura y el sentido del griego, pero se mejora la naturalidad del español: «mis hermanos y mis hijos» suena más idiomático que la posesión pospuesta, y «en cuanto a lo que les mando» expresa mejor la relación final sin la aspereza de «oigan… en lo que les mando». No hacen falta notas.'
