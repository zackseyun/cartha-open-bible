review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia del griego: abstinencia de vino y σίκερα, ausencia de carne, rechazo de ἄρτον ἐπιθυμίας, y duelo por el pecado. Sin embargo, dos puntos requieren ajuste para fidelidad y español natural: «ninguna carne entró en mi boca» suena poco idiomático en español bíblico actual, y la cláusula final «tal como no había acontecido en Israel» no expresa con suficiente naturalidad el valor de οἷα οὐ γέγονεν… οὕτως, mejor como «como no había sucedido en Israel».'
  spanish_quality_summary: 'El texto es generalmente claro y digno, pero contiene literalismos algo duros: «ninguna carne entró en mi boca» y «pan de deseo». El segundo puede conservarse por fidelidad, aunque es una expresión marcada; el primero conviene suavizarlo a «no entró carne en mi boca», que mantiene la imagen original y mejora la lectura. La frase final también se beneficia de una formulación más natural.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «vino», «bebida fuerte», «carne» y «pecado» están bien alineados. «Pan de deseo» es aceptable como conservación formal del original y del audit trail inglés, aunque su rareza semántica justifica una nota aclaratoria en español para evitar ambigüedad innecesaria.
  issues:
  - severity: medium
    issue: «ninguna carne entró en mi boca» es poco idiomático
    rationale: Aunque formalmente posible, en español suena más torpe que el griego y que la solución inglesa revisada. «No entró carne en mi boca» conserva la metáfora sin extrañeza innecesaria.
  - severity: medium
    issue: «tal como no había acontecido en Israel» es forzado
    rationale: La cláusula comparativa-superlativa del griego se expresa más naturalmente en español con «como no había sucedido en Israel», sin pérdida de sentido.
  - severity: low
    issue: «pan de deseo» puede resultar ambiguo para el lector español
    rationale: La literalidad preserva bien ἄρτον ἐπιθυμίας, pero en español conviene una nota para indicar que se refiere a pan deseable/de deleite, no a un tecnicismo establecido.
  revised_spanish_text: Y no bebí vino ni bebida fuerte, y no entró carne en mi boca, y no comí pan de deseo[a]; pero estaba de duelo por mi pecado, porque era grande, como no había sucedido en Israel.
  revised_footnotes:
  - marker: a
    text: O «pan deseable» o «pan de deleite»; la expresión indica alimento apetecible o placentero, del cual se abstuvo en señal de duelo y penitencia.
    reason: Aclara una expresión literal potencialmente oscura en español mientras preserva la formulación principal cercana al griego y al inglés POB.
  revision_rationale: 'Se hicieron ajustes menores para mejorar la naturalidad del español sin apartarse del griego ni del audit trail inglés: «no entró carne en mi boca» en lugar de «ninguna carne entró en mi boca», y «como no había sucedido en Israel» en lugar de «tal como no había acontecido en Israel». Se conservó «pan de deseo» por fidelidad formal, añadiendo una nota aclaratoria para la legibilidad.'
