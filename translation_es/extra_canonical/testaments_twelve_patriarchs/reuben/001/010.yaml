revisions:
- from: Y no bebí vino ni bebida fuerte, y ninguna carne entró en mi boca, y no comí pan de deseo; pero estaba de duelo por mi pecado, porque era grande, tal como no había acontecido en Israel.
  to: Y no bebí vino ni bebida fuerte, y no entró carne en mi boca, y no comí pan de deseo[a]; pero estaba de duelo por mi pecado, porque era grande, como no había sucedido en Israel.
  rationale: 'Se hicieron ajustes menores para mejorar la naturalidad del español sin apartarse del griego ni del audit trail inglés: «no entró carne en mi boca» en lugar de «ninguna carne entró en mi boca», y «como no había sucedido en Israel» en lugar de «tal como no había acontecido en Israel». Se conservó «pan de deseo» por fidelidad formal, añadiendo una nota aclaratoria para la legibilidad.'
