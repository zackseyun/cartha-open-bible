id: T12P.REU.1.10
reference: Testament of Reuben 1:10
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 66-79, Reuben pilot)
  text: 10. Καὶ⁶⁴ οἶνον καὶ σίκερα οὐκ ἔπιον, καὶ κρέας⁶⁵ οὐκ εἰσῆλθεν *ἐν τῷ στόματί⁶⁶ μου· καὶ πᾶν⁶⁷ ἄρτον ἐπι- θυμίας⁶⁸ οὐκ ἔφαγον⁶⁹ *ἀλλ᾽ ἤμην⁷⁰ πενθῶν ἐπὶ τῇ ἁμαρτίᾳ μου⁷¹, μεγάλη γὰρ ἦν, *οἷα οὐ γέγονεν ἐν Ἰσραὴλ οὕτως⁷².
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/reuben/001/010.yaml
  text: And I drank no wine or strong drink, and no meat entered my mouth, and I ate no bread of desire; but I was mourning over my sin, for it was great, such as had not happened in Israel.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:24Z'
    unchanged: false
    changes_summary: Improved English naturalness by changing 'meat did not enter my mouth' to 'no meat entered my mouth' and smoothed the final clause from 'such a thing had not happened in Israel' to 'such as had not happened in Israel' for a more formal, natural rendering while preserving the source sense.
translation:
  language: es
  text: Y no bebí vino ni bebida fuerte, y ninguna carne entró en mi boca, y no comí pan de deseo; pero estaba de duelo por mi pecado, porque era grande, tal como no había acontecido en Israel.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: οἶνον
  english_pob_choice: wine
  chosen_spanish: vino
  alternatives_spanish:
  - vino fermentado
  lexicon: οἶνος
  rationale: «Vino» comunica de manera natural el término griego y mantiene el paralelo con «bebida fuerte» sin añadir especificación no presente en el texto.
- source_word: σίκερα
  english_pob_choice: strong drink
  chosen_spanish: bebida fuerte
  alternatives_spanish:
  - licor fuerte
  - bebida embriagante
  lexicon: σίκερα
  rationale: La expresión española «bebida fuerte» sigue de cerca la tradición semántica del inglés POB y conserva la distinción con «vino» sin sobreinterpretar el tipo exacto de bebida.
- source_word: κρέας
  english_pob_choice: meat
  chosen_spanish: carne
  alternatives_spanish:
  - comida cárnica
  - vianda
  lexicon: κρέας
  rationale: «Carne» es el equivalente directo y el más natural en español; además respeta la fuerza lexical del griego y la decisión inglesa de no suavizar el término.
- source_word: ἄρτον ἐπιθυμίας
  english_pob_choice: bread of desire
  chosen_spanish: pan de deseo
  alternatives_spanish:
  - pan apetecible
  - pan de anhelo
  lexicon: ἄρτος; ἐπιθυμία
  rationale: Se preserva la construcción nominal del original. «Pan de deseo» es algo literal pero inteligible, y mantiene la ambigüedad entre alimento deseado y comida de deleite.
- source_word: πενθῶν
  english_pob_choice: mourning
  chosen_spanish: de duelo
  alternatives_spanish:
  - lamentándome
  - llorando
  lexicon: πενθέω
  rationale: «Estaba de duelo» expresa el estado durativo de luto con dignidad y evita un calco más áspero, conservando el sentido de dolor ritual o penitencial.
- source_word: ἁμαρτίᾳ
  english_pob_choice: sin
  chosen_spanish: pecado
  alternatives_spanish:
  - falta
  - culpa
  lexicon: ἁμαρτία
  rationale: «Pecado» es el equivalente más estable en español para ἁμαρτία y conserva la referencia moral/religiosa explícita del pasaje.
- source_word: οἷα οὐ γέγονεν ἐν Ἰσραὴλ οὕτως
  english_pob_choice: such as had not happened in Israel
  chosen_spanish: tal como no había acontecido en Israel
  alternatives_spanish:
  - como no había sucedido en Israel
  - de tal modo que no había ocurrido en Israel
  lexicon: οἷος; γίνομαι
  rationale: La cláusula se traduce con una comparación relativa sobria para preservar la intensidad superlativa del griego y la naturalidad del español, sin introducir una explicación que el texto no da.
theological_decisions:
- issue: La forma de expresar la abstinencia ritual y penitencial
  english_pob_reading: And I drank no wine or strong drink, and no meat entered my mouth, and I ate no bread of desire; but I was mourning over my sin
  chosen_spanish_reading: Y no bebí vino ni bebida fuerte, y ninguna carne entró en mi boca, y no comí pan de deseo; pero estaba de duelo por mi pecado
  alternative_spanish_readings:
  - Y no bebí vino ni bebida fuerte, y no entró carne en mi boca, y no comí pan de deseo; pero estaba lamentándome por mi pecado
  rationale: Se mantiene la secuencia de abstenciones como expresión concreta de penitencia, sin convertirla en paráfrasis moralizante. La formulación «de duelo» conserva el tono de lamento público o espiritual que el griego sugiere.
  doctrine_reference: Ascetic/penitential language; lexical fidelity to ἁμαρτία and πενθέω
translation_notes:
  revision_awareness: The English audit trail shows only minor smoothing changes in the latest revision, with no lexical or theological re-interpretation. The Spanish draft therefore follows the revised English sense closely while translating directly from the Greek source, preserving the final comparative clause as a natural Spanish relative construction.
  spanish_consistency_notes:
  - 'Se conservó el paralelismo de negaciones: vino / bebida fuerte / carne / pan de deseo.'
  - Se evitó «SEÑOR» u այլ masking conventions, ya que no aparece el nombre divino en este versículo.
  - «Carne» se mantuvo para κρέας conforme al valor léxico concreto del pasaje.
  - No se añadieron notas al pie porque no había una variante textual o ambigüedad que requiriera anclaje explícito en el texto español.
