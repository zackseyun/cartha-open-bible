  text: 2. *Μετὰ ἔτη δύο τῆς τελευτῆς⁹ Ἰωσὴφ Γτοῦ ἀδελφοῦ αὐτοῦ¹⁰, ἀρρωστή- β-d,A,S¹ σαντος¹¹ Ῥουβήμ¹², συνήχθησαν¹³ *ἐπισκέψασθαι αὐτὸν¹⁴ Ἰωσήφ. υἱοὶ¹⁵ αὐτοῦ καὶ υἱοὶ¹⁶ τῶν υἱῶν αὐτοῦ¹⁷.
