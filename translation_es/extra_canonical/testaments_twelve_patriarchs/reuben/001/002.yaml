base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/reuben/001/002.yaml
  text: Two years after the death of Joseph his brother, when Reuben had fallen sick, his sons and the sons of his sons gathered to visit him.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:52Z'
    unchanged: false
    changes_summary: Corrected the subject from 'the sons of Joseph' to 'his sons' (Reuben's sons), and rendered the verb more naturally as 'gathered' rather than 'were gathered.'
translation:
  language: es
  text: Dos años después de la muerte de José, su hermano, cuando Rubén cayó enfermo, se reunieron sus hijos y los hijos de sus hijos para visitarlo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Μετὰ ἔτη δύο τῆς τελευτῆς Ἰωσὴφ τοῦ ἀδελφοῦ αὐτοῦ
  english_pob_choice: Two years after the death of Joseph his brother
  chosen_spanish: Dos años después de la muerte de José, su hermano
  alternatives_spanish:
  - Dos años después de la muerte de José, su hermano
  - Dos años tras la muerte de José, su hermano
  lexicon: μετά + έτη δύο; τελευτή
  rationale: Conserva el sentido temporal directo del griego sin añadir matices interpretativos. Se mantiene la aposición 'su hermano' para reflejar el vínculo explícito del texto fuente.
- source_word: ἀρρωστήσαντος Ῥουβήμ
  english_pob_choice: when Reuben had fallen sick
  chosen_spanish: cuando Rubén cayó enfermo
  alternatives_spanish:
  - cuando Rubén enfermó
  - cuando Rubén había caído enfermo
  lexicon: ἀρρωστέω
  rationale: '''Cayó enfermo'' comunica de forma natural el cambio de estado implícito en el participio aoristo y conserva un tono sobrio y bíblico sin forzar un calco.'
- source_word: υἱοὶ αὐτοῦ καὶ υἱοὶ τῶν υἱῶν αὐτοῦ
  english_pob_choice: his sons and the sons of his sons
  chosen_spanish: sus hijos y los hijos de sus hijos
  alternatives_spanish:
  - sus hijos y los hijos de sus hijos
  - sus hijos y sus nietos
  lexicon: υἱός
  rationale: Se traduce literalmente la genealogía del griego. 'Los hijos de sus hijos' preserva la forma del original y evita resolverla de antemano como 'nietos', aunque esa sea una implicación natural.
- source_word: ἐπισκέψασθαι αὐτόν
  english_pob_choice: to visit him
  chosen_spanish: para visitarlo
  alternatives_spanish:
  - para verlo
  - para hacerle una visita
  lexicon: ἐπισκέπτομαι
  rationale: '''Visitarlo'' es la equivalencia más directa y idiomática en español, manteniendo el sentido de acercarse a él en su enfermedad.'
theological_decisions:
- issue: Identidad del sujeto de la reunión
  english_pob_reading: his sons and the sons of his sons gathered to visit him
  chosen_spanish_reading: se reunieron sus hijos y los hijos de sus hijos para visitarlo
  alternative_spanish_readings:
  - se reunieron los hijos de José y los hijos de sus hijos para visitarlo
  - se reunieron sus hijos y nietos para visitarlo
  rationale: El contexto griego y la revisión inglesa corrigen el sujeto a los descendientes de Rubén, no a los de José. La traducción española sigue esa adjudicación y evita reintroducir el error corregido.
  doctrine_reference: Consistencia textual / control del sujeto por contexto gramatical
- issue: Relación temporal entre la muerte de José y la enfermedad de Rubén
  english_pob_reading: Two years after the death of Joseph his brother, when Reuben had fallen sick
  chosen_spanish_reading: Dos años después de la muerte de José, su hermano, cuando Rubén cayó enfermo
  alternative_spanish_readings:
  - A los dos años de la muerte de José, su hermano, cuando Rubén cayó enfermo
  - Dos años tras morir José, su hermano, cuando Rubén cayó enfermo
  rationale: No se añade ninguna interpretación histórica o cronológica; se conserva la secuencia tal como aparece en la fuente.
  doctrine_reference: Fidelidad narrativa / cronología textual
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente corrige un error de sujeto: no son ''los hijos de José'', sino ''sus hijos'' (los hijos de Rubén). La versión española refleja esa corrección y traduce el verbo final de manera más natural con ''se reunieron'' en lugar de una pasiva.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando aparezca el tetragrámaton; este verso no lo contiene.
  - Se usa 'José' y 'Rubén' con grafía española estándar y tono bíblico moderno.
  - '''Hijos de sus hijos'' conserva la estructura genealógica del griego y evita una glosa interpretativa.'
