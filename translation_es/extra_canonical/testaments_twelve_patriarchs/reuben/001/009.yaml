  text: 9. Καὶ *μετὰ τοῦτο⁶¹ ἐν προαιρέσει ψυχῆς μου *ἑπτὰ ἔτη⁶² μετενόησα *ἐνώπιον Κυρίου⁶³.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/reuben/001/009.yaml
  text: And after this, with the resolve of my soul, I repented before the Lord for seven years.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:23Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Y después de esto, con el propósito de mi alma, me arrepentí delante de Yahvé durante siete años.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: μετὰ τοῦτο
  english_pob_choice: after this
  chosen_spanish: después de esto
  alternatives_spanish:
  - luego de esto
  - tras esto
  lexicon: μετά
  rationale: Expresa la secuencia temporal de manera natural en español y conserva el valor narrativo simple del griego, como en la versión inglesa auditada.
- source_word: ἐν προαιρέσει ψυχῆς μου
  english_pob_choice: with the resolve of my soul
  chosen_spanish: con el propósito de mi alma
  alternatives_spanish:
  - con la resolución de mi alma
  - con el libre albedrío de mi alma
  - con la decisión de mi alma
  lexicon: προαίρεσις; ψυχή
  rationale: La expresión griega presenta una voluntad/intención interior vinculada al alma. 'Propósito' comunica bien esa intención deliberada en español sin volverla demasiado filosófica; 'alma' preserva ψυχή como sede interior de la decisión.
- source_word: ἑπτὰ ἔτη
  english_pob_choice: for seven years
  chosen_spanish: durante siete años
  alternatives_spanish:
  - por siete años
  - siete años
  lexicon: ἑπτά; ἔτος
  rationale: '''Durante'' refleja mejor la duración continuada del arrepentimiento a lo largo del tiempo, manteniendo el sentido temporal del griego y del inglés POB.'
- source_word: μετενόησα
  english_pob_choice: I repented
  chosen_spanish: me arrepentí
  alternatives_spanish:
  - me arrepentí de corazón
  - cambié de mente
  - me convertí
  lexicon: μετανοέω
  rationale: En este contexto el verbo describe arrepentimiento moral y volitivo, no solo cambio cognitivo. 'Me arrepentí' conserva la fuerza usual del término sin añadir matices no explícitos.
- source_word: ἐνώπιον Κυρίου
  english_pob_choice: before the Lord
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante el Señor
  - en presencia de Yahvé
  lexicon: κύριος; יהוה
  rationale: Aunque el griego dice 'Señor', el contexto de la obra y la política terminológica del proyecto favorecen 'Yahvé' para el nombre divino. 'Delante de' conserva la imagen espacial/judicial de estar en la presencia de Dios.
theological_decisions:
- issue: Rendición del nombre divino implícito en κύριος
  english_pob_reading: before the Lord
  chosen_spanish_reading: delante de Yahvé
  alternative_spanish_readings:
  - delante del Señor
  - ante Yahvé
  rationale: El griego usa κύριος, pero aquí remite al nombre divino en el marco del texto fuente y la convención del proyecto. Se explicita 'Yahvé' para evitar el ocultamiento del nombre y mantener transparencia textual.
  doctrine_reference: Éxodo 3:15; política editorial POB sobre יהוה / YHWH
translation_notes:
  revision_awareness: La versión inglesa auditada ya fue aceptada sin cambios en la revisión más reciente (high_agreement, 0.97). La propuesta española sigue de cerca el sentido del griego y del inglés POB sin introducir expansiones interpretativas.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' conforme al estándar del proyecto para el nombre divino.
  - Se usa 'me arrepentí' para μετανοέω, coherente con un contexto de arrepentimiento prolongado.
  - '''Alma'' traduce ψυχή en sentido de interioridad/voluntad, no como término técnico filosófico.'
