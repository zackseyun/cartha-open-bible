base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/reuben/001/006.yaml
  text: And behold, today I call the God of heaven to witness against you, that you not walk in the ignorance of youth and in sexual immorality, in which I was swept away and defiled the bed of my father Jacob.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:23Z'
    unchanged: false
    changes_summary: Revised “was poured out” to “was swept away” to more naturally convey ἐξεχύθην in context, while preserving the sense of being carried into sexual immorality. Kept the rest substantially unchanged.
translation:
  language: es
  text: Y he aquí, hoy pongo por testigo contra ustedes al Dios del cielo, para que no anden en la ignorancia de la juventud y en la inmoralidad sexual, en la cual yo fui arrastrado y contaminé el lecho de mi padre Jacob.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἰδοὺ
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Y mira
  - He aquí
  lexicon: interjection/deictic particle
  rationale: «He aquí» conserva el tono solemne y de llamada de atención del original; añadir «Y» sigue el encadenamiento narrativo del griego y del inglés POB.
- source_word: ἐπιμαρτύρομαι ὑμῖν
  english_pob_choice: I call ... to witness against you
  chosen_spanish: pongo por testigo contra ustedes
  alternatives_spanish:
  - llamo como testigo contra ustedes
  - doy testimonio contra ustedes
  lexicon: verb phrase of solemn witness invocation
  rationale: La expresión española mantiene la fuerza jurídica/solemne de invocar testimonio contra los oyentes sin volverla innecesariamente técnica.
- source_word: τὸν Θεὸν τοῦ οὐρανοῦ
  english_pob_choice: the God of heaven
  chosen_spanish: al Dios del cielo
  alternatives_spanish:
  - al Dios de los cielos
  - al Dios celestial
  lexicon: ὁ θεός + genitive of heaven
  rationale: «Dios del cielo» es natural en español y conserva la relación genitiva sin introducir una formulación más interpretativa.
- source_word: σήμερον
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - en este día
  - hoy mismo
  lexicon: temporal adverb
  rationale: «Hoy» es el equivalente directo y idiomático en español; mantiene la inmediatez del testimonio.
- source_word: μὴ πορευθῆτε
  english_pob_choice: that you not walk
  chosen_spanish: para que no anden
  alternatives_spanish:
  - para que no caminen
  - para que no procedan
  lexicon: verb of conduct/walk
  rationale: «Anden» reproduce bien la metáfora ética de conducta continua sin sonar forzado.
- source_word: ἐν ἀγνοίᾳ νεότητος
  english_pob_choice: in the ignorance of youth
  chosen_spanish: en la ignorancia de la juventud
  alternatives_spanish:
  - en la ignorancia propia de la juventud
  - en la falta de entendimiento de la juventud
  lexicon: noun phrase
  rationale: Se conserva la relación literal entre ignorancia y juventud, sin suavizarla a una idea meramente emocional o psicológica.
- source_word: πορνείᾳ
  english_pob_choice: sexual immorality
  chosen_spanish: inmoralidad sexual
  alternatives_spanish:
  - fornicación
  - impureza sexual
  lexicon: sexual immorality
  rationale: «Inmoralidad sexual» expresa la amplitud del término griego sin reducirlo a una sola práctica específica; mantiene el registro de la traducción inglesa POB.
- source_word: ἐξεχύθην
  english_pob_choice: I was swept away
  chosen_spanish: fui arrastrado
  alternatives_spanish:
  - fui llevado
  - fui arrebatado
  lexicon: passive aorist of being carried off/spilled
  rationale: «Fui arrastrado» comunica la idea revisada en la audit trail de haber sido llevado por la corriente de la pasión, evitando la imagen más literal pero menos natural de «vertido».
- source_word: ἐμίανα κοίτην
  english_pob_choice: defiled the bed
  chosen_spanish: contaminé el lecho
  alternatives_spanish:
  - manché el lecho
  - profané el lecho
  lexicon: defilement of bed
  rationale: «Contaminé el lecho» conserva el sentido de profanación sexual del lecho matrimonial con lenguaje sobrio y comprensible.
- source_word: τοῦ πατρός μου Ἰακώβ
  english_pob_choice: of my father Jacob
  chosen_spanish: de mi padre Jacob
  alternatives_spanish:
  - de mi padre, Jacob
  - de mi padre, el Jacob
  lexicon: genitive possessive
  rationale: Se mantiene la referencia directa y sobria al padre nombrado, sin insertar explicaciones ajenas al texto.
theological_decisions:
- issue: Invocation of divine witness as covenantal warning
  english_pob_reading: I call the God of heaven to witness against you
  chosen_spanish_reading: pongo por testigo contra ustedes al Dios del cielo
  alternative_spanish_readings:
  - llamo al Dios del cielo como testigo contra ustedes
  - apelo al Dios del cielo como testigo contra ustedes
  rationale: La formulación refleja una advertencia solemne con dimensión de juicio moral, sin convertirla en una fórmula litúrgica ni diluir su carácter acusatorio.
  doctrine_reference: Deuteronomy 30:19; Hebrews 10:28-29
- issue: Meaning of ἐξεχύθην in context
  english_pob_reading: I was swept away
  chosen_spanish_reading: fui arrastrado
  alternative_spanish_readings:
  - fui llevado
  - me dejé llevar
  rationale: La revisión del POB inglés favorece la idea de ser llevado/arrastrado por una fuerza ajena; el español elegido preserva esa pasividad y la pérdida de control.
  doctrine_reference: James 1:14-15; Proverbs 7:21-23
- issue: Scope of πορνεία
  english_pob_reading: sexual immorality
  chosen_spanish_reading: inmoralidad sexual
  alternative_spanish_readings:
  - fornicación
  - impureza sexual
  rationale: Se evita restringir indebidamente el término a una sola conducta; «inmoralidad sexual» preserva el alcance moral amplio del original.
  doctrine_reference: 1 Corinthians 6:18; Ephesians 5:3
translation_notes:
  revision_awareness: This draft follows the latest revision pass in the English audit trail, adopting ‘was swept away’ for ἐξεχύθην rather than the earlier ‘was poured out.’ No further textual changes are introduced beyond source-grounded Spanish idiom and required lexical clarity.
  spanish_consistency_notes:
  - Use «Dios del cielo» consistently for τὸν Θεὸν τοῦ οὐρανοῦ in this record.
  - Preserve «inmoralidad sexual» as the default rendering for πορνεία here; do not narrow it to a single act.
  - Retain the solemn first-person warning voice in Spanish; avoid softening the accusatory force.
  - Keep the metaphor of conduct with «anden» rather than a purely static alternative.
