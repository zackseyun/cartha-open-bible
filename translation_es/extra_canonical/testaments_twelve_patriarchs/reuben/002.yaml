translation:
  language: es
  text: 'Y ahora[a], hijos míos, escúchenme en cuanto a lo que vi acerca de los siete espíritus de engaño en mi arrepentimiento. Fueron dados, pues, siete espíritus contra el hombre, y estos son las cabezas de las obras de la juventud.


    Y otros siete espíritus le fueron dados en la creación, para que toda obra del hombre estuviera en ellos. El primero es el espíritu de vida[b], por el cual se forma la constitución de una persona. El segundo es el espíritu de la vista, por el cual surge el deseo. El tercero es el espíritu del oído, por el cual viene la instrucción. El cuarto es el espíritu del olfato, por el cual se producen gustos para la atracción del aire y del aliento[c]. El quinto es el espíritu del habla, por el cual viene el conocimiento. El sexto es el espíritu del gusto, por el cual se produce el comer de alimentos y bebidas, y por él se forma la fuerza, porque en los alimentos está la sustancia de la fuerza. El séptimo es el espíritu de la procreación y del acto sexual, por el cual los pecados se juntan por amor al placer. Por eso este espíritu es el último en la creación y el primero en la juventud, porque está lleno de ignorancia, y conduce al joven como un ciego a un pozo, y como un animal a un precipicio.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como «espíritus de error» o «espíritus de delusión».
    reason: lexical_alternative
  - marker: b
    text: La frase «las cabezas de las obras de la juventud» es literal en su estructura; probablemente significa los principios o fuentes principales de los pecados juveniles.
    reason: lexical_alternative
  - marker: c
    text: La formulación griega sobre el olfato, los gustos y la atracción del aire/aliento es difícil y puede reflejar una redacción comprimida o inestable.
    reason: textual_variant
lexical_decisions:
- source_word: πνευμάτων τῆς πλάνης
  english_pob_choice: spirits of deceit
  chosen_spanish: espíritus de engaño
  alternatives_spanish:
  - espíritus de error
  - espíritus de delusión
  lexicon: LSJ
  rationale: πλάνη puede abarcar error, extravío o engaño. «Engaño» conserva la fuerza moral y activa del término en este contexto de seducción y ruina juvenil, y suena natural en español bíblico actual.
- source_word: ἐν τῇ μετανοίᾳ μου
  english_pob_choice: in my repentance
  chosen_spanish: en mi arrepentimiento
  alternatives_spanish:
  - en mi cambio de mente
  - cuando me arrepentí
  lexicon: BDAG
  rationale: El contexto es confesional y penitencial, no meramente cognitivo. «Arrepentimiento» preserva la dimensión moral y testimonial del pasaje.
- source_word: κατὰ τοῦ ἀνθρώπου
  english_pob_choice: set against man
  chosen_spanish: contra el hombre
  alternatives_spanish:
  - en contra del hombre
  - contra la humanidad
  lexicon: LSJ
  rationale: La preposición expresa oposición directa. «Contra el hombre» conserva el valor genérico singular del griego y la concisión proverbial del texto.
- source_word: αἱ κεφαλαὶ τῶν ἔργων τοῦ νεωτερισμοῦ
  english_pob_choice: the heads of the works of youthfulness
  chosen_spanish: las cabezas de las obras de la juventud
  alternatives_spanish:
  - los jefes de las obras de la juventud
  - las fuentes de las obras de la juventud
  - las cabezas de las obras de la ligereza juvenil
  lexicon: LSJ
  rationale: «Cabezas» mantiene la metáfora de fuentes o principios gobernantes. «Juventud» expresa de forma natural el campo moral del término, sin suavizar la referencia a los desórdenes propios de esa etapa.
- source_word: ἐπὶ τῆς κτίσεως
  english_pob_choice: at creation
  chosen_spanish: en la creación
  alternatives_spanish:
  - al momento de la creación
  - en el acto de la creación
  lexicon: LSJ
  rationale: La frase señala el marco en que fueron dados estos espíritus. «En la creación» es fiel e idiomático en español, y conserva el marco cosmológico.
- source_word: σύστασις
  english_pob_choice: constitution
  chosen_spanish: constitución
  alternatives_spanish:
  - estructura
  - composición
  - naturaleza
  lexicon: LSJ
  rationale: El término se refiere a la formación o constitución interna de la persona. «Constitución» conserva esa idea de configuración, sin limitarla solo al aspecto físico.
- source_word: ὁράσεως
  english_pob_choice: sight
  chosen_spanish: vista
  alternatives_spanish:
  - visión
  - ver
  lexicon: LSJ
  rationale: En la serie de facultades humanas, «vista» es el equivalente más directo y natural.
- source_word: ἐπιθυμία
  english_pob_choice: desire
  chosen_spanish: deseo
  alternatives_spanish:
  - codicia
  - ansia
  - lujuria
  lexicon: BDAG
  rationale: Aquí el término es más amplio que una sola clase de deseo. «Deseo» preserva esa amplitud sin forzar una connotación sexual o estrictamente negativa prematura.
- source_word: διδασκαλία
  english_pob_choice: instruction
  chosen_spanish: instrucción
  alternatives_spanish:
  - enseñanza
  - aprendizaje
  lexicon: BDAG
  rationale: El giro del texto sugiere recepción de contenido formativo por el oído. «Instrucción» hace visible ese sentido pasivo mejor que «enseñanza».
- source_word: ὀσφρήσεως
  english_pob_choice: smell
  chosen_spanish: olfato
  alternatives_spanish:
  - olfato
  - sentido del olfato
  - olor
  lexicon: LSJ
  rationale: En español, «olfato» funciona bien como nombre de la facultad sensorial y mantiene el paralelismo con «vista» y «oído».
- source_word: γίνονται γεύσεις δεδομέναι εἰς ὁλκὴν ἀέρος καὶ ἀναπνοῆς
  english_pob_choice: tastes are produced for the drawing in of air and breath
  chosen_spanish: se producen gustos para la atracción del aire y del aliento
  alternatives_spanish:
  - se producen percepciones para la entrada de aire y aliento
  - se generan sensaciones para el ingreso de aire y respiración
  lexicon: LSJ
  rationale: El griego es difícil y algo comprimido. Se conserva la rareza del giro con una traducción cercana y transparente, evitando borrar la referencia al aire/aliento que parece estar detrás del texto.
- source_word: λαλιᾶς
  english_pob_choice: speech
  chosen_spanish: habla
  alternatives_spanish:
  - habla
  - palabra
  - discurso
  lexicon: LSJ
  rationale: «Habla» expresa la facultad de hablar de forma natural y clara en español actual.
- source_word: γνῶσις
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - conocimiento
  - saber
  lexicon: BDAG
  rationale: «Conocimiento» preserva el sustantivo amplio del griego y encaja con la serie de facultades humanas.
- source_word: γεύσεως
  english_pob_choice: taste
  chosen_spanish: gusto
  alternatives_spanish:
  - sentido del gusto
  - sabor
  lexicon: LSJ
  rationale: «Gusto» nombra la facultad sensorial de manera breve y paralela a «vista», «oído» y «olfato».
- source_word: βρῶσις βρωμάτων τε καὶ πομάτων
  english_pob_choice: the eating of foods and drinks
  chosen_spanish: el comer de alimentos y bebidas
  alternatives_spanish:
  - la ingesta de alimentos y bebidas
  - el consumo de alimentos y bebidas
  lexicon: LSJ
  rationale: La construcción nominal del griego se mantiene con una forma española igualmente nominal. «El comer de» suena algo más literal y conserva el énfasis en el acto de ingerir.
- source_word: ἡ ὑπόστασις τῆς ἰσχύος
  english_pob_choice: the substance of strength
  chosen_spanish: la sustancia de la fuerza
  alternatives_spanish:
  - la base de la fuerza
  - el fundamento de la fuerza
  lexicon: LSJ
  rationale: Aquí ὑπόστασις se toma como aquello que sostiene o constituye algo. «Sustancia» sigue de cerca la tradición semántica del término y reproduce el matiz material/constitutivo del pasaje.
- source_word: σπορᾶς καὶ συνουσίας
  english_pob_choice: procreation and intercourse
  chosen_spanish: la procreación y del acto sexual
  alternatives_spanish:
  - la procreación y la relación sexual
  - la generación y el acto sexual
  lexicon: LSJ
  rationale: El par apunta a la dimensión reproductiva y a la unión sexual. «Acto sexual» expresa el segundo término sin eufemismo excesivo, y mantiene el tono moral del texto.
- source_word: φιληδονίας
  english_pob_choice: the love of pleasure
  chosen_spanish: amor al placer
  alternatives_spanish:
  - amor al deleite
  - amor de los placeres
  - sensualidad
  lexicon: LSJ
  rationale: 'La expresión conserva el valor moralizante del sustantivo compuesto: no solo placer, sino afección o apego a él.'
- source_word: ἔσχατόν ἐστι τῆς κτίσεως καὶ πρῶτον τῆς νεότητος
  english_pob_choice: last in creation and first in youth
  chosen_spanish: el último en la creación y el primero en la juventud
  alternatives_spanish:
  - el postrero en la creación y el primero en la juventud
  - el último de la creación y el primero de la juventud
  lexicon: LSJ
  rationale: Se conserva el contraste aforístico y la inversión retórica del original. «Juventud» comunica la idea moral sin agregar interpretaciones.
- source_word: ἀγνοίας πεπλήρωται
  english_pob_choice: it is filled with ignorance
  chosen_spanish: está lleno de ignorancia
  alternatives_spanish:
  - ha sido llenado de ignorancia
  - está colmado de ignorancia
  lexicon: BDAG
  rationale: El perfecto pasivo describe un estado resultante. «Está lleno de ignorancia» es natural en español y conserva el diagnóstico moral.
- source_word: τὸν νεώτερον
  english_pob_choice: the young man
  chosen_spanish: al joven
  alternatives_spanish:
  - al muchacho
  - al joven hombre
  - al más joven
  lexicon: LSJ
  rationale: El singular genérico se mantiene de forma natural. «Al joven» funciona bien en el tono proverbial y exhortativo del pasaje.
- source_word: κτῆνος
  english_pob_choice: animal
  chosen_spanish: animal
  alternatives_spanish:
  - bestia
  - bruto
  lexicon: LSJ
  rationale: «Animal» es claro y evita arcaísmo, manteniendo la imagen de una criatura no racional llevada al peligro.
theological_decisions:
- issue: Cómo traducir πνεύματα τῆς πλάνης en un contexto moral y paraenético
  english_pob_reading: spirits of deceit
  chosen_spanish_reading: espíritus de engaño
  alternative_spanish_readings:
  - espíritus de error
  - espíritus de delusión
  rationale: El pasaje presenta estos espíritus como fuerzas que seducen y extravían al ser humano. «Engaño» recoge tanto el extravío como la actividad seductora que el contexto sugiere.
  doctrine_reference: 'DOCTRINE.md: contexto moral de πλάνη'
- issue: Cómo entender μετανοίᾳ μου en la voz confesional de Reuben
  english_pob_reading: in my repentance
  chosen_spanish_reading: en mi arrepentimiento
  alternative_spanish_readings:
  - en mi cambio de mente
  - cuando me arrepentí
  rationale: La sección tiene tono penitencial, por lo que conviene expresar la conversión moral y no solo el cambio cognitivo. Así se preserva el carácter confesional del testamento.
  doctrine_reference: 'DOCTRINE.md: μετανοέω context rule'
- issue: Si el material sobre los siete espíritus debe integrarse en el texto principal
  english_pob_reading: Included in the main text with no excision
  chosen_spanish_reading: Incluido en el texto principal sin omisión
  alternative_spanish_readings:
  - Relegarlo a nota como posible expansión secundaria
  - Omitirlo como interpolación
  rationale: El testimonio griego proporcionado incluye la sección como parte del pasaje. La traducción debe ser honesta con ese testimonio y no suprimirlo sin base textual explícita.
  doctrine_reference: POB source-transparency principle
translation_notes:
  revision_awareness: Seguí el texto griego directamente y tomé en cuenta el audit trail inglés. En especial, mantuve la inclusión del material sobre los siete espíritus, preservé el tono confesional de μετανοίᾳ μου como «arrepentimiento», y conservé la dureza conceptual del pasaje sin suavizar la relación entre facultades humanas, placer y pecado. También atendí la revisión inglesa más reciente al traducir de modo cercano la frase problemática del olfato/aire/aliento y al reflejar «substance of strength» con «sustancia de la fuerza».
  spanish_consistency_notes:
  - Usé «espíritu» de manera consistente para πνεῦμα en toda la sección, sin introducir mayúsculas que sugieran de antemano el Espíritu Santo, porque aquí se trata de una serie de fuerzas o impulsos humanos/morales.
  - Mantuve «Yahvé» fuera de este pasaje porque no aparece el nombre divino ni κύριος como cita directa.
  - Elegí «hombre» en singular genérico para conservar el valor proverbial del griego, pero «al joven» cuando el texto pasa a una advertencia específica.
  - Conservé una sintaxis bastante cercana al original para no borrar las tensiones textuales del listado de facultades y del pasaje difícil sobre el olfato.
