base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/reuben/002.yaml
  text: 'And now[a], my children, hear me concerning what I saw about the seven spirits of deceit in my repentance. There were given, then, seven spirits set against man, and these are the heads of the works of youthfulness.


    And seven other spirits were given to him at creation, so that every work of man might be in them. The first is the spirit of life[b], by which a person’s constitution is formed. The second is the spirit of sight, by which desire comes to be. The third is the spirit of hearing, by which instruction comes to be. The fourth is the spirit of smell, by which tastes are produced for the drawing in of air and breath. The fifth is the spirit of speech, by which knowledge comes to be. The sixth is the spirit of taste, by which the eating of foods and drinks comes to be, and strength is formed by it, because in foods is the substance of strength. The seventh is the spirit of procreation and intercourse, by which sins come together through the love of pleasure. Therefore this spirit is last in creation and first in youth, because it is filled with ignorance, and it leads the young man like a blind man into a pit[c], and like an animal over a cliff.'
  footnotes:
  - marker: a
    text: Or 'spirits of error' or 'spirits of delusion.'
    reason: lexical_alternative
  - marker: b
    text: The phrase 'the heads of the works of youthfulness' is literal in structure; it likely means the chief sources or governing beginnings of youthful sins.
    reason: lexical_alternative
  - marker: c
    text: The wording about smell, tastes, and the drawing in of air is difficult in Greek and may reflect a compressed or unstable textual formulation.
    reason: textual_variant
