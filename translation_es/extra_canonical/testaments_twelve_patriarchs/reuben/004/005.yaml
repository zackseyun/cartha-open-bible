id: T12P.REU.4.5
reference: Testament of Reuben 4:5
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 66-79, Reuben pilot)
  text: Διὰ τοῦτο⁴⁵ *τέκνα μου⁴⁶, *Γλέγω ὑμῖν⁴⁷, φυλάξατε⁴⁸ Γπάντα⁴⁹ ὅσα ἐντέλλομαι⁵⁰ ὑμῖν, καὶ οὐ μὴ ἁμάρτητε⁵¹.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/reuben/004/005.yaml
  text: Therefore, my children, I tell you, keep all that I command you, and you will certainly not sin.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:26Z'
    unchanged: false
    changes_summary: Adjusted punctuation for smoother formal English and changed 'everything' to 'all that' to more directly reflect πάντα ὅσα.
translation:
  language: es
  text: 'Por eso, hijos míos, les digo: guarden todo lo que les mando, y ciertamente no pecarán.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Διὰ τοῦτο
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Así que
  lexicon: διά + τοῦτο
  rationale: Expresa una inferencia natural en español sin endurecer el tono; conserva la conexión causal del griego con un giro idiomático y sobrio.
- source_word: τέκνα μου
  english_pob_choice: my children
  chosen_spanish: hijos míos
  alternatives_spanish:
  - mis hijos
  - pequeños míos
  lexicon: τέκνον
  rationale: «Hijos míos» suena natural en exhortación paterna y mantiene la cercanía afectiva del vocativo sin infantilizar innecesariamente.
- source_word: Γλέγω ὑμῖν
  english_pob_choice: I tell you
  chosen_spanish: les digo
  alternatives_spanish:
  - les declaro
  - les digo esto
  lexicon: λέγω
  rationale: Verbo directo y transparente; mantiene la función de introducción exhortativa sin añadir solemnidad ajena al griego.
- source_word: φυλάξατε
  english_pob_choice: keep
  chosen_spanish: guarden
  alternatives_spanish:
  - observen
  - guarden fielmente
  lexicon: φυλάσσω
  rationale: En este contexto el mandato es de guardar/observar obedientemente lo mandado; «guarden» conserva la fuerza imperativa y la idea de custodia fiel.
- source_word: πάντα ὅσα
  english_pob_choice: all that
  chosen_spanish: todo lo que
  alternatives_spanish:
  - todas las cosas que
  - todo cuanto
  lexicon: πᾶς + ὅσος
  rationale: La revisión inglesa afinó «everything» a «all that» para reflejar mejor πάντα ὅσα; en español «todo lo que» reproduce esa relación relativa con naturalidad.
- source_word: ἐντέλλομαι
  english_pob_choice: command
  chosen_spanish: mando
  alternatives_spanish:
  - ordeno
  - les encomiendo
  lexicon: ἐντέλλομαι
  rationale: «Mando» preserva el carácter de mandato; es más cercano y menos administrativo que «ordeno», y encaja con la voz exhortativa del pasaje.
- source_word: ἁμάρτητε
  english_pob_choice: sin
  chosen_spanish: pecarán
  alternatives_spanish:
  - cometerán pecado
  - fallarán
  lexicon: ἁμαρτάνω
  rationale: En esta fórmula negativa el sentido es moral y general; «pecarán» es la equivalencia más clara y tradicional sin perder precisión.
theological_decisions:
- issue: Relación entre obediencia y ausencia de pecado
  english_pob_reading: you will certainly not sin
  chosen_spanish_reading: y ciertamente no pecarán
  alternative_spanish_readings:
  - y de ningún modo pecarán
  - y no pecarán en absoluto
  rationale: La construcción de doble negación intensifica la certeza futura del griego (οὐ μὴ + subjuntivo) sin convertirla en una promesa teológica distinta del texto; «ciertamente» conserva esa fuerza.
  doctrine_reference: βεβαίως / οὐ μή as emphatic negation; moral exhortation in wisdom/paranetic literature
translation_notes:
  revision_awareness: El inglés POB fue revisado de «everything» a «all that» para reflejar con más precisión πάντα ὅσα; la versión española sigue esa precisión con «todo lo que». No se añadieron notas porque el texto griego y el audit trail no preservan una alternativa semántica decisiva que requiera anotación.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparezca el nombre divino; aquí no corresponde.
  - Se evita «Cristo» porque no hay Χριστός en el pasaje.
  - Se usa «pecarán» para ἁμάρτητε, en línea con el valor moral del verbo en el contexto exhortativo.
  - Se conserva un registro formal y claro, apto para lectura eclesial amplia.
