lexical_decisions:
- source_word: καὶ οὐχ οὕτως ἐγένετο
  english_pob_choice: And such a thing was not done
  chosen_spanish: Y tal cosa no se hizo
  alternatives_spanish:
  - Y no se hizo algo semejante
  - Y una cosa así no ocurrió
  lexicon: καὶ; οὐχ οὕτως; γίνομαι
  rationale: El griego expresa negación de un hecho/acto ocurrido; «no se hizo» mantiene el valor de acción realizada o no realizada, y «tal cosa» reproduce bien οὐχ οὕτως sin sobrerresumir ni añadir interpretación.
- source_word: ἐν τῷ Ἰσραήλ
  english_pob_choice: in Israel
  chosen_spanish: en Israel
  alternatives_spanish:
  - entre Israel
  - dentro de Israel
  lexicon: ἐν; Ἰσραήλ
  rationale: La preposición local simple se vierte de forma directa. «En Israel» conserva la formulación idiomática y la referencia colectiva/geográfica del original sin forzar una paráfrasis.
theological_decisions:
- issue: Universal/covenantal contrast implied by the statement
  english_pob_reading: And such a thing was not done in Israel.
  chosen_spanish_reading: Y tal cosa no se hizo en Israel.
  alternative_spanish_readings:
  - Y tal cosa no se hizo entre Israel.
  - Y tal cosa no se hizo en el pueblo de Israel.
  rationale: No se explicita el alcance exacto del juicio; se conserva la sobriedad del enunciado griego. La frase funciona como contraste moral o histórico dentro de Israel, sin añadir calificación doctrinal no presente en el texto.
  doctrine_reference: Narrative ethical assertion; no explicit doctrinal term
translation_notes:
  revision_awareness: El texto griego breve coincide estrechamente con la traducción inglesa auditada («And such a thing was not done in Israel.»). No hay revisiones aplicadas ni variantes textuales relevantes en el expediente; por eso se mantiene una versión directa y sobria, sin notas de aparato.
  spanish_consistency_notes:
  - Se mantiene «Israel» como designación del pueblo/nación según el original.
  - Se evita introducir «hecho» o «ocurrido» para no mover el énfasis del acto al acontecimiento.
  - La sintaxis española conserva la negación y la evaluación implícita del original con naturalidad moderna.
