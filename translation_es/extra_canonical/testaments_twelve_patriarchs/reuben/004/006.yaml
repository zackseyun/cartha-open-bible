id: T12P.REU.4.6
reference: Testament of Reuben 4:6
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 66-79, Reuben pilot)
  text: '*Βόθρος γάρ ἐστι ψυχῆς ἡ ἁμαρτία τῆς πορνείας⁵², χωρίζουσα ἀπὸ⁵³ θεοῦ καὶ προσεγγίζουσα *τοῖς εἰδώλοις⁵⁴, ὅτι αὕτη *ἐστὶν ἡ⁵⁵ πλανῶσα τὸν νοῦν *καὶ τὴν διάνοιαν⁵⁶, καὶ κατάγει⁵⁷ νεανί- σκους εἰς ᾅδην, οὐκ ἐν καιρῷ αὐτῶν.'
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/reuben/004/006.yaml
  text: For the sin of sexual immorality is a pit for the soul, separating it from God and drawing it near to idols; for it is this that leads the mind and understanding astray, and brings young men down to Hades before their time.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:28Z'
    unchanged: false
    changes_summary: Changed 'bringing it near to idols' to 'drawing it near to idols' for a more natural rendering of the participle while preserving the sense. All other wording retained.
translation:
  language: es
  text: Porque el pecado de la inmoralidad sexual es un pozo para el alma, separándola de Dios y acercándola a los ídolos; pues esto es lo que desvía la mente y el entendimiento, y hace bajar a los jóvenes al Hades antes de su tiempo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Βόθρος
  english_pob_choice: a pit
  chosen_spanish: un pozo
  alternatives_spanish:
  - una fosa
  - un abismo
  - un hoyo
  lexicon: βόθρος
  rationale: ‘Pozo’ mantiene la imagen de una cavidad peligrosa y es natural en español; ‘fosa’ o ‘abismo’ intensifican o cambian ligeramente la imagen.
- source_word: ἁμαρτία τῆς πορνείας
  english_pob_choice: the sin of sexual immorality
  chosen_spanish: el pecado de la inmoralidad sexual
  alternatives_spanish:
  - el pecado de fornicación
  - el pecado de impureza sexual
  lexicon: ἁμαρτία; πορνεία
  rationale: ‘Inmoralidad sexual’ comunica el campo semántico amplio de πορνεία sin reducirlo solo a un acto específico; ‘fornicación’ puede sonar más estrecho o tradicionalista.
- source_word: χωρίζουσα ἀπὸ θεοῦ
  english_pob_choice: separating it from God
  chosen_spanish: separándola de Dios
  alternatives_spanish:
  - separándola de Dios
  - apartándola de Dios
  lexicon: χωρίζω
  rationale: ‘Separándola de Dios’ sigue de cerca el participio y preserva la relación causal con el alma implícita por el contexto español.
- source_word: προσεγγίζουσα τοῖς εἰδώλοις
  english_pob_choice: drawing it near to idols
  chosen_spanish: acercándola a los ídolos
  alternatives_spanish:
  - aproximándola a los ídolos
  - trayéndola cerca de los ídolos
  lexicon: προσεγγίζω; εἴδωλον
  rationale: ‘Acercándola’ reproduce el movimiento hacia ídolos con naturalidad; ‘aproximándola’ suena más técnico.
- source_word: πλανῶσα τὸν νοῦν καὶ τὴν διάνοιαν
  english_pob_choice: leads the mind and understanding astray
  chosen_spanish: desvía la mente y el entendimiento
  alternatives_spanish:
  - extravía la mente y el entendimiento
  - engaña la mente y el entendimiento
  lexicon: πλανάω; νοῦς; διάνοια
  rationale: ‘Desvía’ conserva la idea de apartar de la verdad/del camino y funciona bien con ambos sustantivos; ‘extravía’ o ‘engaña’ enfatizan matices algo distintos.
- source_word: κατάγει νεανίσκους εἰς ᾅδην
  english_pob_choice: brings young men down to Hades
  chosen_spanish: hace bajar a los jóvenes al Hades
  alternatives_spanish:
  - conduce a los jóvenes al Hades
  - los arrastra al Hades
  lexicon: κατάγω; νεανίσκος; ᾅδης
  rationale: ‘Hace bajar’ mantiene el valor direccional de κατάγω sin forzar un calco; se conserva ‘Hades’ como nombre del destino subterráneo, conforme al texto fuente.
theological_decisions:
- issue: Relación entre el pecado sexual y la idolatría
  english_pob_reading: separating it from God and drawing it near to idols
  chosen_spanish_reading: separándola de Dios y acercándola a los ídolos
  alternative_spanish_readings:
  - apartándola de Dios y acercándola a los ídolos
  - separándola de Dios y trayéndola cerca de los ídolos
  rationale: 'La frase conserva la tensión del original: el pecado no solo rompe con Dios, sino que también orienta hacia la idolatría. ‘Acercándola’ preserva la simultaneidad de alejamiento y atracción.'
  doctrine_reference: 1 Corintios 10:14; Santiago 4:4
- issue: El alcance de νοῦς y διάνοια
  english_pob_reading: the mind and understanding
  chosen_spanish_reading: la mente y el entendimiento
  alternative_spanish_readings:
  - la mente y la inteligencia
  - el pensamiento y la comprensión
  rationale: Se conserva la distinción sin imponer una psicología ajena al texto; ‘mente’ y ‘entendimiento’ son suficientemente amplios para reflejar la doble designación.
  doctrine_reference: Romanos 12:2; Efesios 4:17-18
- issue: Hades como destino de muerte prematura
  english_pob_reading: brings young men down to Hades before their time
  chosen_spanish_reading: hace bajar a los jóvenes al Hades antes de su tiempo
  alternative_spanish_readings:
  - los conduce al Hades antes de su tiempo
  - los baja al Hades antes de su tiempo
  rationale: Se mantiene ‘Hades’ como transliteración del destino de los muertos porque el griego lo nombra así; no se sustituye por ‘infierno’, que podría cargar una lectura distinta.
  doctrine_reference: Lucas 16:23; Apocalipsis 20:13-14
translation_notes:
  revision_awareness: This draft follows the latest English revision pass, preserving the revised natural rendering ‘drawing it near to idols’ as ‘acercándola a los ídolos’ rather than a more mechanical or intensifying alternative. No English footnotes were present, so no compensatory Spanish footnotes were required.
  spanish_consistency_notes:
  - Se mantuvo ‘Hades’ sin traducir para respetar el término del original y evitar confundirlo con ‘infierno’.
  - Se usó ‘inmoralidad sexual’ para cubrir el sentido amplio de πορνεία sin estrecharlo a un solo acto.
  - No se empleó ‘SEÑOR’ porque el pasaje no contiene el nombre divino יהוה ni una cita directa de κύριος con ese trasfondo.
