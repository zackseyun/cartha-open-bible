id: T12P.REU.4.10
reference: Testament of Reuben 4:10
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 66-79, Reuben pilot)
  text: Διὰ τοῦτο⁷³ ὁ θεὸς τῶν πατέρων ὑμῶν⁷⁴ ἐρρύσατο αὐτὸν ἀπὸ παντὸς πονηροῦ⁷⁵ κεκρυμμένου θανάτου.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/reuben/004/010.yaml
  text: Therefore the God of your fathers delivered him from every hidden evil death.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:31Z'
    unchanged: false
    changes_summary: 'Revised to reflect the Greek more closely: κεκρυμμένου modifies θανάτου, not πονηροῦ, so the phrase is best rendered as ''every evil hidden death'' or more naturally ''every hidden evil death,'' rather than ''every hidden evil and from death.'' Also removed the added second ''from,'' which split one Greek phrase into two objects.'
translation:
  language: es
  text: Por eso el Dios de sus padres lo libró de toda muerte oculta y mala.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁ θεὸς τῶν πατέρων ὑμῶν
  english_pob_choice: the God of your fathers
  chosen_spanish: el Dios de sus padres
  alternatives_spanish:
  - el Dios de vuestros padres
  - el Dios de tus padres
  lexicon: θεός; πατέρες
  rationale: Conservo la relación de pacto y herencia implícita en la fórmula bíblica. En español, «de sus padres» es natural y mantiene el sentido colectivo del poseedor plural del griego; «vuestros» sería más literal pero menos neutro para lectura pública.
- source_word: ἐρρύσατο
  english_pob_choice: delivered
  chosen_spanish: libró
  alternatives_spanish:
  - rescató
  - lo salvó
  lexicon: ῥύομαι
  rationale: «Libró» comunica con claridad la acción de rescate/liberación sin añadir matices no requeridos. «Rescató» o «salvó» serían posibles, pero «libró» sigue bien el verbo de librar/deliver del griego y suena natural en español bíblico contemporáneo.
- source_word: ἀπὸ παντὸς πονηροῦ κεκρυμμένου θανάτου
  english_pob_choice: from every hidden evil death
  chosen_spanish: de toda muerte oculta y mala
  alternatives_spanish:
  - de toda muerte oculta y malvada
  - de toda muerte mala oculta
  lexicon: πονηρός; κεκρυμμένου; θάνατος
  rationale: La revisión auditada muestra que κεκρυμμένου modifica a θανάτου, no a πονηροῦ. Por eso no separo «evil» y «death» en dos objetos; los uno como una sola expresión nominal. En español, «muerte oculta y mala» conserva la tensión del griego sin forzar una lectura explicativa excesiva. «Muerte oculta y mala» mantiene el carácter oscuro/dañino de la muerte aludida, aunque el orden español no reproduzca de forma rígida el adjetivo participial.
theological_decisions:
- issue: Relación entre «Dios de los padres» y la fórmula de alianza
  english_pob_reading: the God of your fathers
  chosen_spanish_reading: el Dios de sus padres
  alternative_spanish_readings:
  - el Dios de vuestros padres
  rationale: Mantengo la fórmula tradicional de origen bíblico porque expresa continuidad del Dios del pacto con los antepasados del destinatario. No la convierto en una designación genérica de Dios, porque el texto conserva esa referencia identitaria.
  doctrine_reference: Éxodo 3:6; 2 Corintios 1:3
- issue: Cómo reflejar la cualidad de la muerte descrita por el participio griego
  english_pob_reading: every hidden evil death
  chosen_spanish_reading: toda muerte oculta y mala
  alternative_spanish_readings:
  - toda muerte oculta malvada
  - toda muerte mal oculta
  rationale: 'El texto griego describe una sola realidad: una muerte caracterizada como oculta y mala. Evito dividir la frase en dos complementos distintos porque eso alteraría la sintaxis y la teología implícita del pasaje. La traducción elegida preserva la ambigüedad sobria del original sin suavizarla.'
  doctrine_reference: Testamento de Rubén 4:10
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente, que corrigió la estructura del griego para que κεκρυμμένου califique a θανάτου y no a πονηροῦ. Por eso la versión española evita separar «evil» y «death» en dos objetos y prefiere una sola frase nominal compacta.
  spanish_consistency_notes:
  - Uso «Dios» y no una sustitución devocional; la fórmula poseedora se mantiene como marcador de alianza.
  - «Libró» conserva el valor de rescate/liberación de ἐρρύσατο sin sobreinterpretar el acto.
  - No introduzco notas de pie porque el español resultante no requiere una alternativa textual separada en esta línea.
