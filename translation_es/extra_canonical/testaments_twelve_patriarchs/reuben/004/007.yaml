  glossary_alignment: No hay conflictos con la terminología del proyecto. «Inmoralidad sexual» para πορνεία, «reproche» para ὀνειδισμός, «tropiezo» para πρόσκομμα y «Beliar» para Βελίαρ concuerdan con la evidencia y las decisiones documentadas.
