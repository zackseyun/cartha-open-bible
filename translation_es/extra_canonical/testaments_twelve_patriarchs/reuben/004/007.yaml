source:
  edition: Charles 1908 Greek Versions (pages 66-79, Reuben pilot)
  text: Καὶ γὰρ πολλοὺς ἀπώλεσεν ἡ πορνεία· ὅτι κἂν *γέρων ᾖ τις⁵⁸, κἂν⁵⁹ εὐγενής, Γκἂν πλούσιος, κἂν πένης⁶⁰, *ὀνειδισμὸν ἑαυτῷ φέρει παρὰ τοὺς υἱοὺς τῶν ἀνθρώπων καὶ †πρόσκομμα τῷ Βελίαρ⁶¹.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/reuben/004/007.yaml
  text: For sexual immorality has destroyed many; for whether a man is old, or noble, or rich, or poor, he brings reproach on himself before the sons of men and a stumbling block to Beliar.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:29Z'
    unchanged: false
    changes_summary: Replaced the period with a semicolon after 'many' to better reflect the Greek connection introduced by γὰρ ('for'). No other changes needed.
translation:
  language: es
  text: Pues la inmoralidad sexual ha destruido a muchos; porque, sea que uno sea anciano, noble, rico o pobre, atrae sobre sí mismo reproche delante de los hijos de los hombres y un tropiezo para Beliar.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πορνεία
  english_pob_choice: sexual immorality
  chosen_spanish: inmoralidad sexual
  alternatives_spanish:
  - fornicación
  - impureza sexual
  lexicon: πορνεία
  rationale: ‘Inmoralidad sexual’ comunica en español amplio el campo semántico de conductas sexuales ilícitas sin reducirlo a una sola práctica específica; evita un término demasiado restringido o arcaizante.
- source_word: ὀνειδισμός
  english_pob_choice: reproach
  chosen_spanish: reproche
  alternatives_spanish:
  - vergüenza
  - oprobio
  lexicon: ὀνειδισμός
  rationale: ‘Reproche’ conserva la idea de deshonra pública y censura moral presente en el contexto; ‘vergüenza’ desplaza el foco hacia el sentimiento interno, y ‘oprobio’ suena más marcado y menos natural en este registro.
- source_word: πρόσκομμα
  english_pob_choice: a stumbling block
  chosen_spanish: un tropiezo
  alternatives_spanish:
  - un obstáculo
  - una piedra de tropiezo
  lexicon: πρόσκομμα
  rationale: ‘Tropiezo’ mantiene la metáfora básica de algo que hace caer o desviarse. En español, ‘piedra de tropiezo’ sería más explícito pero añade una imagen que el texto griego no formula aquí.
- source_word: Βελίαρ
  english_pob_choice: Beliar
  chosen_spanish: Beliar
  alternatives_spanish:
  - Belial
  lexicon: Βελίαρ
  rationale: Se conserva el nombre propio según la forma dada por el griego y por la tradición textual del pasaje; ‘Belial’ es una variante conocida, pero aquí la forma base del texto favorece ‘Beliar’.
theological_decisions:
- issue: La conectiva γάρ repetida en el griego
  english_pob_reading: for ... for ...
  chosen_spanish_reading: Porque ...; pues ...
  alternative_spanish_readings:
  - Porque ... porque ...
  - Pues ...; pues ...
  rationale: El griego introduce una explicación causal y la revisión inglesa recupera ese enlace con punto y coma. En español, ‘Porque’ al inicio y ‘pues’ en la segunda cláusula preservan la relación causal sin sonar repetitivo o rígido.
  doctrine_reference: Relación discursiva del texto; no implica una doctrina específica.
- issue: Enumeración social y alcance universal
  english_pob_reading: whether a man is old, or noble, or rich, or poor
  chosen_spanish_reading: sea que uno sea anciano, noble, rico o pobre
  alternative_spanish_readings:
  - si uno es anciano, noble, rico o pobre
  - ya sea anciano, noble, rico o pobre
  rationale: ‘Sea que uno sea...’ refleja bien la construcción concesiva del griego y mantiene el carácter universal de la afirmación. ‘Anciano’ rinde γέρων sin perder dignidad; ‘noble’ y ‘rico/pobre’ siguen la serie social del original.
  doctrine_reference: Universalidad de la advertencia moral; no hay diferencia de estatus ante la consecuencia ética.
translation_notes:
  revision_awareness: La revisión inglesa más reciente corrigió la puntuación para reflejar γάρ con un punto y coma tras ‘many’. La versión española sigue esa relación causal con ‘Porque ...; pues ...’, manteniendo la conexión argumentativa del griego sin añadir contenido. La forma ‘to Beliar’ se conservó sin reinterpretación doctrinal porque el audit trail no documenta una alternativa equivalente en inglés.
  spanish_consistency_notes:
  - Se mantiene ‘Beliar’ como nombre propio, en continuidad con la forma griega del pasaje.
  - No se introduce ‘Cristo’, ‘SEÑOR’ ni otras equivalencias no presentes en el texto base.
  - ‘Inmoralidad sexual’ se usa como término general y no como eufemismo moralizante.
  - La estructura de la oración conserva dos miembros causales unidos por pausa fuerte, en línea con la revisión inglesa.
