translation:
  language: es
  text: Porque hasta la muerte de mi padre no tuve la valentía de mirarlo de frente.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: παρρησίαν
  english_pob_choice: boldness
  chosen_spanish: la valentía
  alternatives_spanish:
  - la osadía
  - el atrevimiento
  - la franqueza
  lexicon: παρρησία
  rationale: El contexto no pide principalmente ‘franqueza’ en el habla, sino la libertad/ánimo para sostener la mirada ante el padre. ‘La valentía’ comunica bien la falta de audacia sin volver la frase extraña en español, y mantiene el matiz de osadía pública que puede tener παρρησία.
- source_word: ἀτενίσαι εἰς
  english_pob_choice: to look my father in the face
  chosen_spanish: mirarlo de frente
  alternatives_spanish:
  - mirar a mi padre a la cara
  - fijar la vista en mi padre
  lexicon: ἀτενίζω
  rationale: La expresión griega señala una mirada sostenida y directa. ‘Mirarlo de frente’ conserva el sentido idiomático en español y evita una traducción demasiado literal o rígida.
- source_word: τοῦ πατρός μου
  english_pob_choice: my father
  chosen_spanish: mi padre
  alternatives_spanish:
  - a mi padre
  lexicon: πατήρ
  rationale: Se mantiene la referencia posesiva natural en español. El objeto directo se integra con el verbo ‘mirarlo’ sin perder la relación filial marcada por el griego.
- source_word: ἄχρι τελευτῆς
  english_pob_choice: until my father's death
  chosen_spanish: hasta la muerte de mi padre
  alternatives_spanish:
  - hasta el fin de mi padre
  - hasta la muerte de mi padre
  lexicon: ἄχρι + τελευτή
  rationale: La combinación expresa un límite temporal claro. ‘Hasta la muerte de mi padre’ es la formulación más natural y fiel en español.
theological_decisions:
- issue: El alcance de παρρησίαν en un contexto de respeto filial
  english_pob_reading: did not have the boldness
  chosen_spanish_reading: no tuve la valentía
  alternative_spanish_readings:
  - no tuve la osadía
  - no tuve el atrevimiento
  rationale: 'No se suaviza la tensión moral del pasaje: el hablante reconoce una falta de audacia frente a su padre. ‘Valentía’ permite conservar la confesión sin imponer una categoría teológica ajena al texto.'
  doctrine_reference: Honra filial y confesión moral en el discurso penitencial
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios y el cotejo automático marcó ‘needs review’ con ‘major-issues’. Por eso la redacción sigue de cerca el griego, especialmente en παρρησίαν y ἀτενίσαι εἰς, evitando depender mecánicamente de la versión inglesa.
  spanish_consistency_notes:
  - Se usa ‘mi padre’ sin artículo posesivo redundante, conforme al español natural.
  - Se mantiene el tiempo pasado simple (‘no tuve’) para reflejar una confesión puntual y completa.
  - No se introduce ‘Mesías’, ‘Yahvé’ ni otro término doctrinal no presente en el verso.
