id: T12P.REU.4.9
reference: Testament of Reuben 4:9
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 66-79, Reuben pilot)
  text: '*Καὶ γὰρ⁶⁷ πολλὰ ἐποίησεν αὐτῷ ἡ Αἰγυπτία, καὶ μάγους προσεκάλεσεν⁶⁸ καὶ *φάρμακα αὐτῷ προσήνεγκε⁶⁹, ἐπειδὴ γὰρ ἐφύλαξεν ἑαυτὸν Ἰωσὴφ ἀπὸ πάσης. β, Α, S¹ κυρίου. καὶ⁷⁰ οὐκ ἐδέξατο⁷¹ τὸ διαβούλιον τῆς ψυχῆς αὐτοῦ⁷² ἐπιθυμίαν πονηράν.'
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/reuben/004/009.yaml
  text: For the Egyptian woman did many things to him, and called in magicians and brought him potions; for Joseph guarded himself from every evil desire and did not accept the counsel of his soul for wicked desire.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:31Z'
    unchanged: false
    changes_summary: Changed 'against him' to 'to him' for closer lexical accuracy; removed 'but' and kept 'for' to reflect the Greek connective; simplified 'toward wicked lust' to 'for wicked desire' for more natural and consistent rendering of ἐπιθυμία.
translation:
  language: es
  text: Porque la mujer egipcia hizo muchas cosas contra él, y llamó a magos y le trajo pócimas; pues José se guardó de todo deseo malo y no aceptó el consejo de su alma para deseo perverso.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἡ Αἰγυπτία
  english_pob_choice: the Egyptian woman
  chosen_spanish: la mujer egipcia
  alternatives_spanish:
  - la egipcia
  - la mujer de Egipto
  lexicon: Αἰγύπτιος
  rationale: La expresión se refiere a la mujer egipcia de la narración; en español, 'mujer egipcia' conserva la referencia étnico-geográfica sin introducir ambigüedad artificial.
- source_word: πολλὰ ἐποίησεν αὐτῷ
  english_pob_choice: did many things to him
  chosen_spanish: hizo muchas cosas contra él
  alternatives_spanish:
  - le hizo muchas cosas
  - hizo muchas cosas para él
  lexicon: ποιέω
  rationale: La relación del griego con αὐτῷ permite 'a/para él' o un matiz adversativo según el contexto; aquí se entiende una conducta hostil o insistente. 'Contra él' preserva esa carga sin forzar una paráfrasis extensa.
- source_word: μάγους προσεκάλεσεν
  english_pob_choice: called in magicians
  chosen_spanish: llamó a magos
  alternatives_spanish:
  - llamó a hechiceros
  - convocó a magos
  lexicon: μάγος
  rationale: '''Magos'' reproduce el término básico y evita decidir demasiado pronto entre astrólogos, hechiceros o magos en sentido técnico. ''Llamó a'' mantiene la sencillez del griego.'
- source_word: φάρμακα προσήνεγκε
  english_pob_choice: brought him potions
  chosen_spanish: le trajo pócimas
  alternatives_spanish:
  - le trajo brebajes
  - le ofreció filtros
  lexicon: φάρμακον
  rationale: '''Pócimas'' conserva el valor de preparados o brebajes con posible connotación mágica, como sugiere el contexto de magos; es más natural en español que un calco como ''medicinas''.'
- source_word: ἐφύλαξεν ἑαυτὸν
  english_pob_choice: guarded himself
  chosen_spanish: se guardó
  alternatives_spanish:
  - se preservó
  - se cuidó
  lexicon: φυλάσσω
  rationale: La forma reflexiva expresa autocustodia moral. 'Se guardó' es una fórmula sobria y idiomática que conserva la idea de vigilancia de sí mismo.
- source_word: ἀπὸ πάσης ... ἐπιθυμίαν πονηράν
  english_pob_choice: from every evil desire
  chosen_spanish: de todo deseo malo
  alternatives_spanish:
  - de todo deseo perverso
  - de toda mala pasión
  lexicon: ἐπιθυμία
  rationale: '''Deseo malo'' refleja el valor moral básico de ἐπιθυμία πονηράν sin intensificarlo innecesariamente; mantiene la repetición con ''deseo perverso'' al final del versículo.'
- source_word: τὸ διαβούλιον τῆς ψυχῆς αὐτοῦ
  english_pob_choice: the counsel of his soul
  chosen_spanish: el consejo de su alma
  alternatives_spanish:
  - el propósito de su alma
  - la deliberación de su alma
  lexicon: ψυχή
  rationale: '''Consejo de su alma'' sigue de cerca la imagen griega y conserva la tensión entre interioridad y deliberación moral. ''Alma'' es la opción más transparente en este contexto sapiencial.'
theological_decisions:
- issue: Autocustodia moral de José
  english_pob_reading: Joseph guarded himself from every evil desire
  chosen_spanish_reading: José se guardó de todo deseo malo
  alternative_spanish_readings:
  - José se preservó de todo deseo malo
  - José se cuidó de todo deseo malo
  rationale: La frase subraya disciplina moral activa, no solo pasiva abstención. 'Se guardó' comunica vigilancia y contención interior sin agregar contenido doctrinal ajeno al texto.
  doctrine_reference: ética bíblica de la pureza y la templanza
- issue: Interioridad como sede del discernimiento o del deseo
  english_pob_reading: did not accept the counsel of his soul for wicked desire
  chosen_spanish_reading: no aceptó el consejo de su alma para deseo perverso
  alternative_spanish_readings:
  - no aceptó el consejo de su alma para deseo malo
  - no dio lugar al consejo de su alma para deseo perverso
  rationale: El griego conserva una formulación algo extraña sobre el 'consejo' del alma; la traducción debe mantener esa tensión sin resolverla en una psicología moderna. 'Consejo de su alma' respeta la imagen y permite leer la oposición moral interna.
  doctrine_reference: antropología bíblica del alma y el deseo
translation_notes:
  revision_awareness: 'La revisión inglesa reciente corrigió la relación de αὐτῷ a ''to him'', eliminó ''but'' para reflejar mejor la partícula griega, y simplificó ἐπιθυμία hacia ''desire''. La versión española sigue esa línea: usa una relación directa con ''a/contra él'' en vez de una oposición introducida artificialmente, evita un adversativo fuerte, y conserva ''deseo'' como equivalente central de ἐπιθυμία.'
  spanish_consistency_notes:
  - Se mantiene 'José' para Ἰωσὴφ.
  - Se usa 'Dios' solo cuando el texto lo exija; aquí no aparece.
  - Se conserva el registro moral del pasaje con vocabulario sobrio y no eclesiástico.
  - No se añade puntuación interpretativa que divida artificialmente las dos cláusulas principales.
