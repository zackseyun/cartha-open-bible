id: T12P.REU.4.1
reference: Testament of Reuben 4:1
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 66-79, Reuben pilot)
  text: Μὴ οὖν προσέχετε, Γτέκνα μου1, κάλλος2 γυναικῶν3, μηδὲ ἐννοεῖσθε4 τὰς πράξεις αὐτῶν· ἀλλὰ πορεύεσθε ἐν5 ἁπλότητι καρδίας, ἐν φόβῳ κυρίου6, καὶ μοχθοῦντες7 ἐν ἔργοις *καλοῖς, καὶ8 *ἐν γράμμασι, καὶ ἐν τοῖς ποιμνίοις9 ὑμῶν, ἕως οὗ10 *ὁ κύριος δώῃ ὑμῖν11 *σύζυγον, ἣν αὐτὸς θέλει12, ἵνα μὴ πάθητε13, ὡς κἀγώ14.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/reuben/004/001.yaml
  text: Therefore, my children, do not pay attention to the beauty of women, nor dwell on their deeds; but walk in simplicity of heart, in the fear of the Lord, laboring in good works, and in learning, and in your flocks, until the Lord gives you a wife whom he himself chooses, so that you may not suffer as I did.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:58:28Z'
    unchanged: false
    changes_summary: Changed 'doings' to 'deeds' for a more natural and formal rendering of πράξεις. No other changes needed.
translation:
  language: es
  text: Así que, hijos míos, no presten atención a la belleza de las mujeres, ni se detengan a pensar en sus obras; antes bien, anden en sencillez de corazón, en temor del Señor, trabajando en buenas obras, y en el aprendizaje, y en sus rebaños, hasta que el Señor les dé una esposa[a], a quien él mismo quiera, para que no padezcan como yo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse simplemente como “una mujer”; aquí se adopta “esposa” por el contexto matrimonial inmediato.
    reason: lexical_alternative
lexical_decisions:
- source_word: κάλλος γυναικῶν
  english_pob_choice: the beauty of women
  chosen_spanish: la belleza de las mujeres
  alternatives_spanish:
  - el encanto de las mujeres
  - la hermosura de las mujeres
  lexicon: κάλλος
  rationale: Mantengo el sustantivo concreto 'belleza' porque el griego nombra la cualidad estética de manera directa; 'hermosura' sería posible, pero 'belleza' es más natural y transparente en español contemporáneo.
- source_word: πράξεις
  english_pob_choice: deeds
  chosen_spanish: obras
  alternatives_spanish:
  - hechos
  - acciones
  lexicon: πρᾶξις
  rationale: La revisión inglesa prefirió 'deeds' frente a 'doings'; en español, 'obras' preserva un registro formal y moral, y encaja bien con el contraste exhortativo del pasaje.
- source_word: ἁπλότης καρδίας
  english_pob_choice: simplicity of heart
  chosen_spanish: sencillez de corazón
  alternatives_spanish:
  - simplicidad de corazón
  - pureza de corazón
  lexicon: ἁπλότης
  rationale: '''Sencillez'' comunica mejor la idea de integridad/no duplicidad en español bíblico actual que una mera ''simplicidad'', que podría sonar a ingenuidad.'
- source_word: φόβῳ κυρίου
  english_pob_choice: in the fear of the Lord
  chosen_spanish: en temor del Señor
  alternatives_spanish:
  - en el temor del Señor
  - con temor del Señor
  lexicon: φόβος
  rationale: Conservo 'temor' para reflejar el peso reverente del término. 'Señor' aquí sigue al audit trail inglés; en este contexto, el griego κύριος funciona como título reverencial sin necesidad de explicitar Yahvé en el texto principal.
- source_word: μοχθοῦντες
  english_pob_choice: laboring
  chosen_spanish: trabajando
  alternatives_spanish:
  - esforzándose
  - fatigándose
  lexicon: μοχθέω
  rationale: '''Trabajando'' comunica el esfuerzo sostenido sin sobrecargar el verso; ''fatigándose'' sería más literal pero menos natural en esta secuencia exhortativa.'
- source_word: ἐν ἔργοις καλοῖς
  english_pob_choice: in good works
  chosen_spanish: en buenas obras
  alternatives_spanish:
  - en obras buenas
  - en obras rectas
  lexicon: ἀγαθός / καλός
  rationale: Sigo la equivalencia estable 'buenas obras', que conserva la fuerza moral positiva del griego y es idiomática en español.
- source_word: ἐν γράμμασι
  english_pob_choice: in learning
  chosen_spanish: en el aprendizaje
  alternatives_spanish:
  - en las letras
  - en los estudios
  lexicon: γράμματα
  rationale: El griego puede apuntar al aprendizaje/letras. Dado el audit trail inglés, 'aprendizaje' conserva la idea sin limitarla a educación formal moderna ni a mera alfabetización.
- source_word: τοῖς ποιμνίοις ὑμῶν
  english_pob_choice: your flocks
  chosen_spanish: sus rebaños
  alternatives_spanish:
  - sus ganados
  - sus hatos
  lexicon: ποίμνιον
  rationale: '''Rebaños'' es el equivalente natural y pastoral en español para el cuidado de animales de pastoreo; mantiene la imagen económica y doméstica del original.'
- source_word: σύζυγον
  english_pob_choice: a wife
  chosen_spanish: una esposa
  alternatives_spanish:
  - una mujer
  - una compañera
  lexicon: σύζυγος
  rationale: El contexto exige una esposa y el inglés auditado ya fijó esa lectura. 'Esposa' evita ambigüedad y respeta la intención matrimonial del pasaje.
theological_decisions:
- issue: κύριος / Lord as reverential title in exhortation
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  - el Dueño
  rationale: Aunque el proyecto prefiere 'Yahvé' para יהוה, aquí el griego κύριος en una exhortación sapiencial refleja el título reverencial que el audit trail inglés también conserva como 'Lord'. 'El Señor' mantiene la fluidez y evita introducir una identificación más fuerte sin un marcador textual explícito en este testimonio.
  doctrine_reference: reverence/title usage; divine name rendering policy
- issue: ἵνα μὴ πάθητε ὡς κἀγώ
  english_pob_reading: so that you may not suffer as I did
  chosen_spanish_reading: para que no padezcan como yo
  alternative_spanish_readings:
  - para que no sufran como yo
  - para que no experimenten lo que yo
  rationale: '''Padezcan'' conserva el tono de sufrimiento real y personal del testimonio de Reuben; ''sufran'' sería posible, pero ''padecer'' mantiene un registro más elevado y literario.'
  doctrine_reference: testimonial suffering and exhortation
- issue: ἐν γράμμασι as intellectual training rather than sacred Scripture
  english_pob_reading: in learning
  chosen_spanish_reading: en el aprendizaje
  alternative_spanish_readings:
  - en las letras
  - en los estudios
  rationale: El contexto enumera ocupaciones formativas junto con trabajos y rebaños, por lo que la referencia apunta a formación/aprendizaje general, no a 'Escrituras'. Mantener esa ambigüedad evita una sobrerinterpretación.
  doctrine_reference: lexical/contextual ambiguity
translation_notes:
  revision_awareness: 'El inglés audit trail recibió una revisión menor: se sustituyó ''doings'' por ''deeds'' para reflejar mejor πράξεις. La traducción española sigue esa decisión con ''obras'', sin introducir cambios doctrinales adicionales ni suavizar las exhortaciones del pasaje.'
  spanish_consistency_notes:
  - Se mantiene 'Señor' para κύριος en coherencia con el audit trail inglés y con el tono reverencial del pasaje.
  - Se conserva 'buenas obras' como fórmula estable y transparente para ἔργοις καλοῖς.
  - '''Aprendizaje'' se usa de forma amplia para γράμμασι, evitando restringir el sentido a escolarización moderna.'
  - El texto principal evita paráfrasis expansivas y conserva la progresión exhortativa del griego.
