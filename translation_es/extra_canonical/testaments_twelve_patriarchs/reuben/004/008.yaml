source:
  edition: Charles 1908 Greek Versions (pages 66-79, Reuben pilot)
  text: '*Ἠκούσατε γὰρ περὶ Ἰωσὴφ πῶς ἐφύλαξεν ἑαυ- τὸν ἀπὸ⁶² γυναικός, καὶ τὰς ἐννοίας ἐκαθάρισεν⁶³ ἀπὸ πάσης⁶⁴ πορνείας, Γκαὶ⁶⁵ εὗρεν χάριν ἐνώπιον θεοῦ⁶⁶ καὶ ἀνθρώ- πων.'
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/reuben/004/008.yaml
  text: For you have heard about Joseph, how he guarded himself from a woman and cleansed his thoughts from all sexual immorality, and found favor before God and men.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:29Z'
    unchanged: false
    changes_summary: Changed 'every kind of sexual immorality' to 'all sexual immorality' for a more direct rendering of πάσης πορνείας while preserving natural formal English.
translation:
  language: es
  text: Porque han oído acerca de José, cómo se guardó de la mujer[a] y purificó sus pensamientos de toda inmoralidad sexual, y halló favor delante de Dios y de los hombres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''De la mujer'' reproduce el singular del griego; no especifica ''esposa'', aunque el contexto pueda sugerir una mujer concreta.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἠκούσατε ... περὶ Ἰωσὴφ
  english_pob_choice: For you have heard about Joseph
  chosen_spanish: Porque han oído acerca de José
  alternatives_spanish:
  - Pues han oído de José
  - Porque ustedes han oído acerca de José
  lexicon: oír; acerca de; José
  rationale: Mantiene el sentido de apelación a una tradición ya conocida, como en el inglés POB, con una formulación natural en español. 'Acerca de' conserva el valor de 'about' sin forzar un giro más interpretativo.
- source_word: ἐφύλαξεν ἑαυτόν ἀπὸ γυναικός
  english_pob_choice: how he guarded himself from a woman
  chosen_spanish: cómo se guardó de la mujer
  alternatives_spanish:
  - cómo se protegió de una mujer
  - cómo se guardó de la esposa
  lexicon: φυλάσσω; ἑαυτόν; γυνή
  rationale: '''Se guardó de la mujer'' preserva la literalidad relativa del griego y el paralelo del inglés POB. Aunque el singular ''mujer'' puede sonar general, refleja el texto fuente sin introducir ''esposa'', que sería una precisión no garantizada por el griego.'
- source_word: τὰς ἐννοίας ἐκαθάρισεν
  english_pob_choice: cleansed his thoughts
  chosen_spanish: purificó sus pensamientos
  alternatives_spanish:
  - limpió sus pensamientos
  - purificó su mente
  lexicon: ἐννοία; καθαρίζω
  rationale: '''Purificó sus pensamientos'' conserva el campo semántico de limpieza moral/mental y evita reducir el sentido a una mera higiene interior moderna. ''Pensamientos'' corresponde mejor que ''mente'' al plural concreto del griego.'
- source_word: ἀπὸ πάσης πορνείας
  english_pob_choice: from all sexual immorality
  chosen_spanish: de toda inmoralidad sexual
  alternatives_spanish:
  - de toda fornicación
  - de toda prostitución
  lexicon: πορνεία
  rationale: '''Inmoralidad sexual'' es la opción española más amplia y reconocible para πορνεία, alineada con la decisión inglesa revisada a ''all sexual immorality''. ''Toda'' refleja πάσης de manera directa.'
- source_word: εὗρεν χάριν
  english_pob_choice: found favor
  chosen_spanish: halló favor
  alternatives_spanish:
  - encontró gracia
  - obtuvo favor
  lexicon: χάρις
  rationale: '''Halló favor'' reproduce el modismo bíblico tradicional sin perder la base de ''grace/favor'' del griego. ''Gracia'' sería posible, pero aquí ''favor'' encaja mejor con el paralelo ''delante de Dios y de los hombres''.'
- source_word: ἐνώπιον θεοῦ καὶ ἀνθρώπων
  english_pob_choice: before God and men
  chosen_spanish: delante de Dios y de los hombres
  alternatives_spanish:
  - ante Dios y los hombres
  - en presencia de Dios y de los hombres
  lexicon: ἐνώπιον; θεός; ἄνθρωποι
  rationale: '''Delante de'' conserva la imagen relacional y judicial de ἐνώπιον, con un español natural y solemne. ''Los hombres'' mantiene la referencia general humana del plural griego.'
theological_decisions:
- issue: Sentido moral de πορνεία
  english_pob_reading: all sexual immorality
  chosen_spanish_reading: toda inmoralidad sexual
  alternative_spanish_readings:
  - toda fornicación
  - todo pecado sexual
  rationale: La expresión española amplia evita restringir indebidamente πορνεία a un solo acto o categoría tradicional. Esto sigue la revisión inglesa que optó por un equivalente más directo y general.
  doctrine_reference: pureza sexual / ética bíblica
translation_notes:
  revision_awareness: La revisión inglesa reciente sustituyó 'every kind of sexual immorality' por 'all sexual immorality' para reflejar más directamente πάσης πορνείας. La versión española sigue esa decisión con 'toda inmoralidad sexual'.
  spanish_consistency_notes:
  - Se mantiene 'José' como nombre propio estándar en español.
  - '''Favor'' se usa de manera consistente con χάρις en una fórmula relacional, no como sustituto de ''gracia'' en contextos doctrinales.'
  - La expresión 'delante de Dios y de los hombres' conserva el paralelismo bíblico sin modernizarlo en exceso.
