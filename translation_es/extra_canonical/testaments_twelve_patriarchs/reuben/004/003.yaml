lexical_decisions:
- source_word: ἡ συνείδησίς μου
  english_pob_choice: my conscience
  chosen_spanish: mi conciencia
  alternatives_spanish:
  - mi consciencia
  lexicon: συνείδησις
  rationale: ‘Conciencia’ es el equivalente natural y transparente en español para συνείδησις; conserva la referencia interna de culpa/remordimiento sin añadir matices ajenos.
- source_word: τύπτει
  english_pob_choice: strikes me
  chosen_spanish: me golpea
  alternatives_spanish:
  - me hiere
  - me azota
  - me atormenta
  lexicon: τύπτω
  rationale: El verbo griego es físico y fuerte; ‘me golpea’ reproduce mejor la imagen del POB en inglés (‘strikes me’) y evita debilitarla a una mera emoción abstracta como ‘atormenta’.
- source_word: περὶ τῆς ἁμαρτίας μου
  english_pob_choice: concerning my sin
  chosen_spanish: por causa de mi pecado
  alternatives_spanish:
  - acerca de mi pecado
  - respecto de mi pecado
  lexicon: περί + ἁμαρτία
  rationale: ‘Por causa de’ expresa en español la relación causal y moral implicada por el golpe de la conciencia; mantiene la conexión con el pecado sin volverlo una mera referencia temática.
theological_decisions:
- issue: La relación entre conciencia, culpa y pecado
  english_pob_reading: my conscience strikes me concerning my sin
  chosen_spanish_reading: mi conciencia me golpea por causa de mi pecado
  alternative_spanish_readings:
  - mi conciencia me acusa de mi pecado
  - mi conciencia me atormenta por mi pecado
  rationale: La lectura conservada por el audit trail subraya una acción fuerte e inmediata de la conciencia. ‘Me golpea’ preserva esa dureza sin intensificarla a ‘atormenta’, que el POB revisó hacia una imagen más cercana al verbo griego.
  doctrine_reference: Antropología moral; conciencia bajo reproche por el pecado
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión auditada del inglés POB: la redacción pasó de ‘torments me’ a ‘strikes me’ para reflejar mejor τύπτει. El español sigue esa decisión y evita un verbo excesivamente interpretativo.'
  spanish_consistency_notes:
  - Se mantiene el tratamiento en primera persona singular, en paralelo con el griego y el inglés POB.
  - ‘Pecado’ traduce ἁμαρτία sin atenuar su fuerza moral.
  - Se eligió ‘conciencia’ por ser la forma estándar y más clara en español, manteniendo el sentido ético y reflexivo del pasaje.
