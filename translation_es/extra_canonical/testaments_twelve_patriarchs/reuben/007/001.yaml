translation:
  language: es
  text: Y murió Rubén, habiendo mandado estas cosas a sus hijos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Καὶ ἀπέθανε Ῥουβίμ
  english_pob_choice: And Reuben died
  chosen_spanish: Y murió Rubén
  alternatives_spanish:
  - Y falleció Rubén
  - Y Rubén murió
  lexicon: ἀποθνῄσκω
  rationale: El griego expresa la muerte de manera directa y simple; «murió» reproduce con naturalidad y fidelidad la forma narrativa breve del original. Se mantiene el nombre propio en la forma española estándar «Rubén».
- source_word: ἐντειλάμενος
  english_pob_choice: having commanded
  chosen_spanish: habiendo mandado
  alternatives_spanish:
  - después de haber mandado
  - habiendo ordenado
  lexicon: ἐντέλλομαι
  rationale: El participio aoristo expresa acción anterior a la muerte. «Habiendo mandado» conserva la relación temporal y la fuerza de instrucción/encargo del verbo sin añadir matices más fuertes que el griego. «Mandado» aquí funciona en sentido de dar instrucciones, no de mandar con autoridad coercitiva.
- source_word: τοῖς υἱοῖς αὐτοῦ
  english_pob_choice: to his sons
  chosen_spanish: a sus hijos
  alternatives_spanish:
  - a sus hijos varones
  - a sus hijos
  lexicon: υἱός
  rationale: «Hijos» es la correspondencia natural y suficiente en español. No se introduce «varones» porque el contexto ya refiere a sus hijos y el español no necesita explicitarlo sin apoyo adicional.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  - estas instrucciones
  lexicon: οὗτος / ταῦτα
  rationale: «Estas cosas» sigue de cerca el demostrativo plural del griego y conserva la vaguedad deliberada del texto. «Instrucciones» sería interpretativo y más específico de lo que el verso por sí solo garantiza.
theological_decisions:
- issue: Naturaleza del encargo final de Rubén
  english_pob_reading: having commanded these things to his sons
  chosen_spanish_reading: habiendo mandado estas cosas a sus hijos
  alternative_spanish_readings:
  - después de haber mandado estas cosas a sus hijos
  - habiendo dejado estas instrucciones a sus hijos
  rationale: El texto simplemente afirma que Rubén dio instrucciones finales a sus hijos antes de morir. No se especifica contenido doctrinal ni se debe ampliar el verbo a una formulación más interpretativa.
  doctrine_reference: Narrative minimalism; no doctrinal expansion beyond the source
translation_notes:
  revision_awareness: 'La versión española sigue la revisión inglesa más reciente que eliminó la nota del texto principal y afinó la relación participial para reflejar mejor el griego. Por eso se evita cualquier marcador de nota en el cuerpo del español y se conserva la secuencia breve: muerte seguida del participio de encargo anterior.'
  spanish_consistency_notes:
  - Se mantiene un tono sobrio y bíblico, pero con español moderno y claro.
  - No se introduce puntuación o glosas que alteren la sencillez del original.
  - La estructura «Y murió Rubén, habiendo mandado...» refleja la prioridad temporal del participio sin forzar una subordinación más explicativa.
