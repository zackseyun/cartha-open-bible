review_pass:
  verdict: revise
  source_alignment_summary: 'El griego dice literalmente: «Y lo pusieron/colocaron en una σορός, hasta». El inglés auditado lo refleja como «And they placed him in a coffin until». El borrador español conserva bien ἔθεντο como «pusieron», pero «sepulcro» no corresponde bien a σορός, que aquí se refiere a un receptáculo funerario tipo féretro/ataúd, no a una tumba o sepultura.'
  spanish_quality_summary: La frase española es gramatical y legible, pero «sepulcro» induce una imagen distinta de la fuente. «Ataúd» es más natural, preciso y fiel en español moderno. No hace falta nota al pie si se usa esa opción directa.
  glossary_alignment: 'No hay términos teológicos sensibles en este fragmento. La decisión clave es léxica: σορός debe alinearse con «ataúd»/«féretro», no con «sepulcro».'
  issues:
  - severity: medium
    issue: «Sepulcro» traduce inadecuadamente σορός.
    rationale: «Sepulcro» suele referirse al lugar de entierro o tumba, mientras que σορός en este contexto corresponde al objeto funerario en que se coloca el cuerpo, como indica también la traducción inglesa auditada «coffin».
  - severity: low
    issue: La nota al pie defiende una imprecisión innecesaria.
    rationale: El propio expediente inglés ya resolvió el sentido como «coffin». En español, «ataúd» no sobreinterpreta el fragmento; más bien evita desplazar el sentido a una tumba.
  revised_spanish_text: Y lo pusieron en un ataúd, hasta
  revision_rationale: Se reemplaza «sepulcro» por «ataúd» para reflejar con precisión σορός y alinearse con la decisión inglesa auditada «coffin». Se elimina la nota porque ya no hace falta justificar una alternativa menos fiel.
