translation:
  language: es
  text: Y lo pusieron en un sepulcro[a], hasta
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: “Sepulcro” conserva el sentido funerario general de σορός sin precisar más de lo que el fragmento griego indica; “ataúd” sería una alternativa más concreta, pero también más interpretativa.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔθεντο ... ἐν σορῷ
  english_pob_choice: they placed him in a coffin
  chosen_spanish: lo pusieron en un sepulcro
  alternatives_spanish:
  - lo colocaron en un ataúd
  - lo pusieron en una urna funeraria
  lexicon: τίθημι; σορός
  rationale: El griego ἔθεντο expresa simplemente ‘pusieron/colocaron’, y ἐν σορῷ designa un receptáculo funerario. En español, ‘ataúd’ suena más natural para el lector moderno, pero ‘sepulcro’ evita introducir con demasiada precisión una forma de entierro no explicitada por el fragmento y mantiene el carácter funerario del sustantivo griego.
translation_notes:
  revision_awareness: 'La revisión reciente eliminó material no presente en la fuente y dejó solo el fragmento que corresponde al griego: ‘Y lo pusieron en un sepulcro, hasta’. Esta versión sigue ese alcance restringido y no añade información sobre Egipto, Hebrón ni la cueva de los padres.'
  spanish_consistency_notes:
  - Se mantiene el sujeto implícito en plural con ‘pusieron’, coherente con el griego ἔθεντο.
  - Se conserva el pronombre ‘lo’ para el referente masculino singular implícito en αὐτόν.
  - Se deja ‘hasta’ sin completar, porque el texto fuente se corta ahí y la auditoría inglesa también terminó en ‘until’.
