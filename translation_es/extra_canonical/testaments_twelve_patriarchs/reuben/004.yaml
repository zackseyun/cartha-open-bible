translation:
  language: es
  text: "1. Por tanto, hijos míos, no prestéis atención a la belleza de las mujeres, ni os ocupéis en sus hechos; antes bien, andad en sencillez de corazón, en el temor del Señor, trabajando en buenas obras, en el aprendizaje y en vuestros rebaños, hasta que el Señor os dé una esposa que él mismo escoja, para que no padezcáis como yo.\n\n\n    2. Porque hasta la muerte de mi padre no tuve la valentía de mirar de frente a mi padre.\n\n\n    3. Y por el reproche de mi pecado, mi mente se consumía continuamente dentro de mí.\n\n\n    4. Porque durante siete meses estuve enfermo hasta la muerte, y después de haberme arrepentido con propósito de alma ante el Señor, el espíritu de celos se apartó de mí. Hasta ahora me he guardado en vigilancia, y no he pecado.\n\n\n    5. Por tanto, hijos míos, les digo: guarden todo lo que les mando, y ciertamente no pecarán.\n\n\n    6. Porque el pecado de la inmoralidad sexual es un pozo para el alma, separándola de Dios y acercándola a los ídolos; porque es\
    \ esto lo que desvía la mente y el entendimiento, y lleva a los jóvenes al Hades antes de su tiempo.\n\n\n    7. Porque la inmoralidad sexual ha destruido a muchos. Ya sea que un hombre sea viejo, noble, rico o pobre, se atrae sobre sí reproche delante de los hijos de los hombres y [a] tropiezo para Beliar.\n\n\n    8. Pues han oído acerca de José, cómo se guardó de la mujer y purificó sus pensamientos de toda clase de inmoralidad sexual, y halló gracia delante de Dios y de los hombres.\n\n\n    9. Porque la mujer egipcia hizo muchas cosas a él, e hizo llamar a magos y le trajo [b]pócimas; pero José se guardó de todo deseo malo y no aceptó el consejo de su alma para un deseo perverso.\n\n\n    10. Por tanto, el Dios de sus padres lo libró de todo mal oculto y de la muerte."
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Tropiezo para Beliar» conserva de cerca la expresión griega difícil; el sentido exacto es oscuro y no se suaviza aquí.
    reason: lexical_alternative
  - marker: b
    text: φάρμακα puede significar «pócimas», «brebajes» o preparaciones mágicas; aquí se eligió «pócimas» por el contexto de seducción y magia.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσέχετε
  english_pob_choice: pay attention to
  chosen_spanish: prestar atención a
  alternatives_spanish:
  - dar atención a
  - fijar la atención en
  lexicon: BDAG
  rationale: Expresa la advertencia con naturalidad en español y conserva el valor exhortativo del imperativo.
- source_word: κάλλος
  english_pob_choice: beauty
  chosen_spanish: belleza
  alternatives_spanish:
  - hermosura
  - atractivo
  lexicon: LSJ
  rationale: Es el sentido directo y claro del sustantivo, sin suavizar el matiz de atracción física.
- source_word: ἐννοεῖσθε
  english_pob_choice: dwell on
  chosen_spanish: os ocupéis en
  alternatives_spanish:
  - penséis en
  - meditéis en
  lexicon: LSJ
  rationale: La idea es de ocupación mental persistente; en español, 'os ocupéis en' comunica mejor esa fijación que un simple 'pensar'.
- source_word: ἁπλότης καρδίας
  english_pob_choice: simplicity of heart
  chosen_spanish: sencillez de corazón
  alternatives_spanish:
  - simplicidad de corazón
  - sinceridad de corazón
  lexicon: BDAG
  rationale: '''Sencillez de corazón'' suena natural y conserva la virtud interior de integridad y no duplicidad.'
- source_word: φόβῳ κυρίου
  english_pob_choice: fear of the Lord
  chosen_spanish: temor del Señor
  alternatives_spanish:
  - reverencia del Señor
  lexicon: BDAG
  rationale: Mantiene la formulación bíblica reconocible sin suavizar el término tradicionalmente cargado.
- source_word: μοχθοῦντες
  english_pob_choice: laboring
  chosen_spanish: trabajando
  alternatives_spanish:
  - esforzándoos
  - fatigándoos
  lexicon: LSJ
  rationale: '''Trabajando'' transmite la diligencia sostenida del participio en un español fluido; ''laborando'' se reserva para evitar una repetición rígida en la secuencia.'
- source_word: γράμμασι
  english_pob_choice: learning
  chosen_spanish: el aprendizaje
  alternatives_spanish:
  - las letras
  - el estudio
  - las escrituras
  lexicon: LSJ
  rationale: El griego literalmente alude a 'letras', pero aquí el sentido es formativo; 'el aprendizaje' evita una literalidad opaca y conserva el campo de instrucción.
- source_word: σύζυγον
  english_pob_choice: wife
  chosen_spanish: esposa
  alternatives_spanish:
  - cónyuge
  - compañera
  lexicon: LSJ
  rationale: En este contexto paternal dirigido a hijos varones, 'esposa' es la equivalencia más precisa y natural.
- source_word: παρρησίαν
  english_pob_choice: boldness
  chosen_spanish: valentía
  alternatives_spanish:
  - confianza
  - audacia
  lexicon: BDAG
  rationale: Aquí la falta de παρρησία es no atreverse a mirar al padre; 'valentía' comunica bien esa ausencia de osadía.
- source_word: φυλάξατε
  english_pob_choice: keep
  chosen_spanish: guarden
  alternatives_spanish:
  - observen
  - conserven
  lexicon: BDAG
  rationale: En imperativo plural, 'guarden' preserva la idea de observar fielmente las instrucciones y funciona de modo natural en español.
- source_word: πορνεία
  english_pob_choice: sexual immorality
  chosen_spanish: inmoralidad sexual
  alternatives_spanish:
  - fornicación
  - impureza sexual
  lexicon: BDAG
  rationale: La expresión es amplia y contemporánea, sin restringir indebidamente el vicio a una sola práctica.
- source_word: βόθρος
  english_pob_choice: pit
  chosen_spanish: pozo
  alternatives_spanish:
  - fosa
  - hoyo
  - abismo
  lexicon: LSJ
  rationale: '''Pozo'' mantiene la imagen concreta de caída y peligro, aunque ''fosa'' también sería posible; se elige una forma más natural en español.'
- source_word: χωρίζουσα ἀπὸ θεοῦ
  english_pob_choice: separating it from God
  chosen_spanish: separándola de Dios
  alternatives_spanish:
  - separando al alma de Dios
  - apartándola de Dios
  lexicon: BDAG
  rationale: El participio expresa el efecto alienante del pecado sobre el alma; el pronombre femenino remite a 'el alma' con claridad.
- source_word: προσεγγίζουσα τοῖς εἰδώλοις
  english_pob_choice: bringing it near to idols
  chosen_spanish: acercándola a los ídolos
  alternatives_spanish:
  - llevándola hacia los ídolos
  - poniéndola cerca de los ídolos
  lexicon: BDAG
  rationale: La expresión preserva la proximidad moral entre inmoralidad sexual e idolatría sin convertirla en una identificación doctrinal más fuerte de la que el griego dice.
- source_word: νοῦν καὶ τὴν διάνοιαν
  english_pob_choice: the mind and understanding
  chosen_spanish: la mente y el entendimiento
  alternatives_spanish:
  - la mente y la inteligencia
  - el pensamiento y la comprensión
  lexicon: BDAG
  rationale: Conserva el par antropológico de facultades internas, comprensible y solemne en español.
- source_word: κατάγει ... εἰς ᾅδην
  english_pob_choice: brings ... down to Hades
  chosen_spanish: lleva ... al Hades
  alternatives_spanish:
  - desciende ... al Hades
  - arrastra ... al Hades
  lexicon: BDAG
  rationale: Se mantiene 'Hades' por fidelidad al término griego y al trasfondo judío-helénico del texto, sin sustituirlo por una palabra doctrinalmente más cargada.
- source_word: οὐκ ἐν καιρῷ αὐτῶν
  english_pob_choice: before their time
  chosen_spanish: antes de su tiempo
  alternatives_spanish:
  - prematuramente
  - fuera de tiempo
  lexicon: LSJ
  rationale: Es una equivalencia idiomática clara para la idea de ruina o muerte prematura.
- source_word: ὀνειδισμός
  english_pob_choice: reproach
  chosen_spanish: reproche
  alternatives_spanish:
  - deshonra
  - vergüenza
  lexicon: BDAG
  rationale: Conserva el peso social y moral de la palabra, sin diluirla en una emoción interna solamente.
- source_word: πρόσκομμα τῷ Βελίαρ
  english_pob_choice: a stumbling block to Beliar
  chosen_spanish: tropiezo para Beliar
  alternatives_spanish:
  - piedra de tropiezo para Beliar
  - escándalo para Beliar
  lexicon: LSJ
  rationale: El griego es difícil y se mantiene cerca de la imagen literal; 'tropiezo' conserva el problema sin resolverlo interpretativamente.
- source_word: ἐφύλαξεν ἑαυτόν
  english_pob_choice: guarded himself
  chosen_spanish: se guardó
  alternatives_spanish:
  - se protegió
  - se mantuvo alerta
  lexicon: BDAG
  rationale: La construcción reflexiva es natural en español y conserva la idea de vigilancia moral personal.
- source_word: ἐκαθάρισεν
  english_pob_choice: cleansed
  chosen_spanish: purificó
  alternatives_spanish:
  - limpió
  - limpió de toda
  lexicon: BDAG
  rationale: '''Purificó'' expresa mejor la limpieza moral interior que ''limpió'' y conserva el tono ético-religioso.'
- source_word: μάγους
  english_pob_choice: magicians
  chosen_spanish: magos
  alternatives_spanish:
  - hechiceros
  - magos ocultistas
  lexicon: LSJ
  rationale: '''Magos'' es comprensible y mantiene la referencia a practicantes de artes ocultas; se evita una sobreactualización del término.'
- source_word: φάρμακα
  english_pob_choice: potions
  chosen_spanish: pócimas
  alternatives_spanish:
  - brebajes
  - pociones
  - drogas
  lexicon: LSJ
  rationale: '''Pócimas'' comunica mejor en español el sentido de preparados mágicos o seductores que el término más técnico ''drogas''.'
- source_word: διαβούλιον τῆς ψυχῆς αὐτοῦ
  english_pob_choice: the counsel of his soul
  chosen_spanish: el consejo de su alma
  alternatives_spanish:
  - el dictamen de su alma
  - la deliberación de su alma
  lexicon: LSJ
  rationale: Se preserva la estructura extraña pero significativa del griego, que presenta una interioridad capaz de aconsejar o inclinarse.
- source_word: ἐπιθυμίαν πονηράν
  english_pob_choice: wicked lust
  chosen_spanish: una lujuria perversa
  alternatives_spanish:
  - un deseo perverso
  - una mala concupiscencia
  lexicon: BDAG
  rationale: En este contexto sexual, 'lujuria perversa' transmite bien el tono moral fuerte sin perder claridad.
- source_word: ἐρρύσατο
  english_pob_choice: delivered
  chosen_spanish: lo libró
  alternatives_spanish:
  - lo rescató
  - lo salvó
  lexicon: BDAG
  rationale: '''Libró'' suena natural en español bíblico y conserva la acción divina de rescate.'
theological_decisions:
- issue: Rendering of ᾅδης
  english_pob_reading: Hades
  chosen_spanish_reading: Hades
  alternative_spanish_readings:
  - el sepulcro
  - el infierno
  - el abismo
  rationale: Se conserva el nombre propio griego para respetar el trasfondo del texto y evitar cargarlo con asociaciones doctrinales posteriores que el pasaje no explicita.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy: original-language primacy over translation tradition'
- issue: Sexual immorality and idolatry connection
  english_pob_reading: bringing it near to idols
  chosen_spanish_reading: acercándola a los ídolos
  alternative_spanish_readings:
  - llevándola hacia la idolatría
  - uniéndola a los ídolos
  rationale: El griego indica proximidad o asociación, no una equivalencia total. La traducción mantiene esa tensión sin sobreinterpretar la relación.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy: preserve theological tension rather than resolve it'
- issue: Beliar phrase
  english_pob_reading: a stumbling block to Beliar
  chosen_spanish_reading: tropiezo para Beliar
  alternative_spanish_readings:
  - piedra de tropiezo para Beliar
  - obstáculo para Beliar
  rationale: La expresión es oscura y probablemente intencionalmente dura. Se deja casi literal para no borrar la rareza del original.
  doctrine_reference: PHILOSOPHY.md §transparent reasoning and auditable decisions
translation_notes:
  revision_awareness: Se incorporó la revisión más reciente del audit trail en la parte de la exhortación inicial, donde el inglés cambió 'doings' a 'deeds'; en español se reflejó con 'hechos'. No hubo otras revisiones sustanciales que alteraran el sentido base del pasaje.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' en la terminología del proyecto cuando el texto griego cita o alude explícitamente al nombre divino, pero en este pasaje la forma fuente es κύριος y el audit trail inglés usa 'the Lord'; por coherencia con el testimonio griego y el uso del propio texto tradicional del pasaje, se tradujo como 'el Señor' en las fórmulas establecidas del versículo.
  - '''Hades'' se conserva de manera consistente como transliteración del término griego ᾅδης, conforme a la política del proyecto para este entorno judeo-helénico.'
  - '''Esposa'' se eligió para σύζυγον porque el contexto es paternal y matrimonial; ''cónyuge'' sería más genérico y menos preciso aquí.'
  - '''Pócimas'' se usó en la línea de José y la mujer egipcia para mantener el matiz de preparados mágicos o seductores, coherente con la mención de magos en el mismo verso.'
