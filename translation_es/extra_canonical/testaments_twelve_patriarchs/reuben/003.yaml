  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/reuben/003.yaml
  text: 'And besides all these[3:5], there is an eighth spirit, the spirit of sleep, with which were created the trance of nature and the image of death.


    With these spirits are mixed the spirits of error. First, the spirit of sexual immorality is lodged in the nature and in the senses. Second, a spirit of insatiableness of the belly. Third, a spirit of fighting in the liver and in the gall. Fourth, a spirit of self-display and sorcery, so that through excessive meddling one may appear attractive. Fifth, a spirit of pride, so that one boasts and thinks grand thoughts. Sixth, a spirit of falsehood in destruction and jealousy, for shaping words and hiding one''s words from one''s own kin and household. Seventh, a spirit of injustice, with which come thefts and acts of greed[3:6], so that it may satisfy the pleasures of his heart. For injustice works together with the other spirits through taking and giving.


    And over all these the spirit of sleep is joined, which is the eighth spirit of error and fantasy. And so every young man is destroyed, darkening his mind from the truth and not understanding the law of God, nor listening to the instruction of his fathers, just as I also suffered in my youth.


    And now, my children, love the truth, and it will keep you safe. Hear the words of Reuben your father, as I teach you. Do not pay attention to a woman''s appearance, nor keep company with a married woman[3:7], nor pry into the affairs of women.'
  footnotes:
  - marker: '3:5'
    text: The Greek text in this line is difficult and likely corrupt in places; the sense appears to be a spirit of falsehood associated with jealousy, deceptive speech, and concealment from one’s own family.
    reason: textual_variant
  - marker: '3:6'
    text: The rare term rendered 'acts of greed' is uncertain in this witness; alternatives such as 'graspings' or 'extortions' are possible.
    reason: lexical_alternative
  - marker: '3:7'
    text: This verse appears to restate and expand the mention of the 'eighth spirit' in verse 1. Some readers may judge it a secondary duplication, but it is translated here as present in the Greek witness.
    reason: textual_variant
