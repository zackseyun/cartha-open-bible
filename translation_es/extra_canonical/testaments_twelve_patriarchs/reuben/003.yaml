    Con estos espíritus se mezclan los espíritus del error. Primero, el espíritu de inmoralidad sexual está asentado en la naturaleza y en los sentidos. Segundo, un espíritu de insaciabilidad del vientre. Tercero, un espíritu de pelea en el hígado y en la bilis. Cuarto, un espíritu de complacencia y de magia, para que, por medio de una excesiva intromisión, uno parezca atractivo. Quinto, un espíritu de orgullo, para que uno se jacte y piense pensamientos elevados. Sexto, un espíritu de falsedad en la ruina y en los celos, para formar palabras y ocultar palabras a sus parientes y a los de su casa[a]. Séptimo, un espíritu de injusticia, con el cual vienen robos y actos de codicia[b], para que sacie los placeres de su corazón. Porque la injusticia coopera con los otros espíritus mediante el tomar y el dar.


    Y sobre todos estos se une el espíritu del sueño, que es el octavo espíritu de error y fantasía[c]. Y así todo joven es destruido, oscureciendo su mente lejos de la verdad y sin entender la ley de Dios, ni escuchando la instrucción de sus padres, como también yo padecí en mi juventud.


    Y ahora, hijos míos, amen la verdad, y ella los guardará. Oigan las palabras de Rubén, su padre, mientras yo les enseño. No presten atención a la apariencia de una mujer, ni anden con una mujer casada[d], ni husmeen en los asuntos de las mujeres.'
  to: "Y además de todo esto, hay un octavo espíritu, el espíritu del sueño, con el cual fueron creados el trance y la imagen de la muerte.\n\n\n Con estos espíritus se mezclan los espíritus del error. Primero, el espíritu de inmoralidad sexual está asentado en la naturaleza y en los sentidos. Segundo, un espíritu de avidez del vientre. Tercero, un espíritu de pelea en el hígado y en la bilis. Cuarto, un espíritu de complacencia y de magia, para que, por medio de una excesiva intromisión, uno parezca atractivo. Quinto, un espíritu de orgullo, para que uno se jacte y piense pensamientos elevados. Sexto, un espíritu de falsedad en la ruina y en los celos, para formar palabras y ocultar palabras a sus parientes y a los de su casa[a]. Séptimo, un espíritu de injusticia, con el cual vienen robos y actos de codicia[b], para que sacie los placeres de su corazón. Porque la injusticia coopera con los otros espíritus mediante la compra y la venta.\n\n\n Y sobre todos estos se une el espíritu del sueño,\
    \ que es el octavo espíritu de error y fantasía[c]. Y así todo joven es destruido, oscureciendo su mente lejos de la verdad y sin entender la ley de Dios, ni escuchando la instrucción de sus padres, como también yo padecí en mi juventud.\n\n\n Y ahora, hijos míos, amen la verdad, y ella los guardará. Oigan las palabras de Rubén, su padre, mientras yo les enseño. No presten atención a la apariencia de una mujer, ni anden con una mujer casada[d], ni husmeen en los asuntos de las mujeres."
  rationale: 'Three changes: (1) Corrected footnote [d] text — the old [d] body (about the eighth spirit duplication) was misplaced; [d] is anchored at ''mujer casada'' so its text now explains that θηλεία ὑπάνδρος means a married woman. (2) Updated ''insaciabilidad del vientre'' to ''avidez del vientre'' following revised EN ''greediness of the belly''. (3) Updated ''el tomar y el dar'' to ''la compra y la venta'' following revised EN ''buying and selling''. Also fixed ''éxtasis de la naturaleza'' to ''trance'' in v.1 to match the per-verse level decision.'
