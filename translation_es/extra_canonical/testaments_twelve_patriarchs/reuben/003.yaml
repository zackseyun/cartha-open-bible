translation:
  language: es
  text: "Y además de todo esto, hay un octavo espíritu, el espíritu del sueño, con el cual fueron creados el trance y la imagen de la muerte.\n\n\n Con estos espíritus se mezclan los espíritus del error. Primero, el espíritu de inmoralidad sexual está asentado en la naturaleza y en los sentidos. Segundo, un espíritu de avidez del vientre. Tercero, un espíritu de pelea en el hígado y en la bilis. Cuarto, un espíritu de complacencia y de magia, para que, por medio de una excesiva intromisión, uno parezca atractivo. Quinto, un espíritu de orgullo, para que uno se jacte y piense pensamientos elevados. Sexto, un espíritu de falsedad en la ruina y en los celos, para formar palabras y ocultar palabras a sus parientes y a los de su casa[a]. Séptimo, un espíritu de injusticia, con el cual vienen robos y actos de codicia[b], para que sacie los placeres de su corazón. Porque la injusticia coopera con los otros espíritus mediante la compra y la venta.\n\n\n Y sobre todos estos se une el espíritu del\
    \ sueño, que es el octavo espíritu de error y fantasía[c]. Y así todo joven es destruido, oscureciendo su mente lejos de la verdad y sin entender la ley de Dios, ni escuchando la instrucción de sus padres, como también yo padecí en mi juventud.\n\n\n Y ahora, hijos míos, amen la verdad, y ella los guardará. Oigan las palabras de Rubén, su padre, mientras yo les enseño. No presten atención a la apariencia de una mujer, ni anden con una mujer casada[d], ni husmeen en los asuntos de las mujeres."
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La línea griega es difícil y probablemente corrupta en esta sección; el sentido apunta a una falsedad asociada con celos, discurso engañoso y ocultamiento respecto de la propia familia.
    reason: textual_variant
  - marker: b
    text: El término raro traducido aquí como 'actos de codicia' es incierto en este testigo; también son posibles 'actos de aferramiento' o 'extorsiones'.
    reason: lexical_alternative
  - marker: c
    text: La repetición del 'espíritu del sueño' en este punto parece una expansión paralela del verso anterior. Se traduce como está presente en el testigo griego, sin armonizarlo.
    reason: textual_variant
  - marker: d
    text: El griego θηλεία ὑπάνδρος designa literalmente una mujer bajo marido, es decir, una mujer casada. Se conserva esta referencia por transparencia textual.
    reason: source_note
lexical_decisions:
- source_word: πνεῦμα τοῦ ὕπνου
  english_pob_choice: spirit of sleep
  chosen_spanish: espíritu del sueño
  alternatives_spanish:
  - espíritu de dormir
  - espíritu del reposo
  lexicon: LSJ / BDAG
  rationale: Conservo el sustantivo 'espíritu' y el genitivo objetivo sencillo del griego. 'Sueño' es la correspondencia más natural en español para el campo semántico de ὕπνος sin forzar una paráfrasis.
- source_word: ἔκστασις φύσεως
  english_pob_choice: the trance of nature
  chosen_spanish: el éxtasis de la naturaleza
  alternatives_spanish:
  - el trance de la naturaleza
  - el arrobamiento de la naturaleza
  lexicon: LSJ
  rationale: '''ἔκστασις'' puede ser ''éxtasis'' o ''trance''. Opté por ''éxtasis'' porque preserva la fuerza del término y su rareza, mientras que la nota sobre la imagen de muerte mantiene el paralelismo antropológico.'
- source_word: φύσις
  english_pob_choice: nature
  chosen_spanish: naturaleza
  alternatives_spanish:
  - constitución
  - ser
  lexicon: BDAG
  rationale: '''Naturaleza'' comunica bien el aspecto innato o constitutivo del pasaje, sin introducir una explicación ajena al texto.'
- source_word: πνεύματα τῆς πλάνης
  english_pob_choice: spirits of error
  chosen_spanish: espíritus del error
  alternatives_spanish:
  - espíritus de engaño
  - espíritus de extravío
  lexicon: BDAG
  rationale: '''Error'' sigue la elección auditada del inglés y mantiene el valor moral-intelectual de πλάνη, sin reducirlo solamente a engaño activo.'
- source_word: πορνεία
  english_pob_choice: sexual immorality
  chosen_spanish: inmoralidad sexual
  alternatives_spanish:
  - fornicación
  - vicio sexual
  lexicon: BDAG
  rationale: En español, 'inmoralidad sexual' es claro y amplio, y evita restringir el término a una sola práctica sexual.
- source_word: ἀπληστεία γαστρός
  english_pob_choice: insatiableness of the belly
  chosen_spanish: insaciabilidad del vientre
  alternatives_spanish:
  - glotonería
  - codicia del vientre
  lexicon: LSJ
  rationale: Mantiene la imagen corporal del griego y evita desdibujar el contraste antropológico del catálogo de vicios.
- source_word: γαστήρ
  english_pob_choice: belly
  chosen_spanish: vientre
  alternatives_spanish:
  - estómago
  - panza
  lexicon: LSJ
  rationale: '''Vientre'' es la opción digna y literal en español para el símbolo corporal del deseo desordenado.'
- source_word: μάχη
  english_pob_choice: fighting
  chosen_spanish: pelea
  alternatives_spanish:
  - contienda
  - lucha
  lexicon: LSJ
  rationale: '''Pelea'' conserva el carácter activo y directo del término en la lista de pasiones.'
- source_word: ἀρέσκεια
  english_pob_choice: self-display
  chosen_spanish: complacencia
  alternatives_spanish:
  - afán de agradar
  - vanidad
  lexicon: LSJ
  rationale: El griego en este contexto apunta a autoexhibición o autocomplacencia. 'Complacencia' es menos técnico que 'vanidad' y deja espacio al vínculo con la apariencia posterior.
- source_word: μαγγανεία
  english_pob_choice: sorcery
  chosen_spanish: magia
  alternatives_spanish:
  - hechicería
  - sorcellería
  lexicon: LSJ
  rationale: '''Magia'' es comprensible y conserva la referencia a artes ocultas; aquí acompaña a la autoexhibición y a la manipulación social.'
- source_word: περιεργεία
  english_pob_choice: excessive meddling
  chosen_spanish: excesiva intromisión
  alternatives_spanish:
  - curiosidad excesiva
  - entremetimiento
  lexicon: BDAG
  rationale: '''Intromisión'' transmite la intrusión desordenada mejor que una curiosidad neutra.'
- source_word: ὑπερηφανία
  english_pob_choice: pride
  chosen_spanish: orgullo
  alternatives_spanish:
  - arrogancia
  - soberbia
  lexicon: BDAG
  rationale: '''Orgullo'' es el equivalente más directo y natural en español, manteniendo el valor moral del catálogo.'
- source_word: μεγαλοφρονῇ
  english_pob_choice: thinks grand thoughts
  chosen_spanish: piense pensamientos elevados
  alternatives_spanish:
  - tenga pensamientos grandes
  - se estime mucho
  lexicon: LSJ
  rationale: Busco reproducir el movimiento mental del verbo sin convertirlo simplemente en otro sinónimo de orgullo. 'Pensamientos elevados' conserva el giro de elevación interior.
- source_word: ψεύδους
  english_pob_choice: falsehood
  chosen_spanish: falsedad
  alternatives_spanish:
  - mentira
  - engaño
  lexicon: BDAG
  rationale: Como sustantivo abstracto, 'falsedad' encaja con la estructura del catálogo y con la asociación a discurso torcido.
- source_word: πλάττειν λόγους
  english_pob_choice: shaping words
  chosen_spanish: formar palabras
  alternatives_spanish:
  - moldear palabras
  - fabricar palabras
  lexicon: LSJ
  rationale: '''Formar palabras'' conserva la imagen de modelar el habla; en español suena más natural que una literalidad más áspera.'
- source_word: κρύπτειν λόγους
  english_pob_choice: hiding one’s words
  chosen_spanish: ocultar palabras
  alternatives_spanish:
  - esconder las palabras
  - encubrir el habla
  lexicon: LSJ
  rationale: La duplicación con 'formar' y 'ocultar' reproduce la tensión entre discurso fabricado y discurso escondido.
- source_word: ἀδικία
  english_pob_choice: injustice
  chosen_spanish: injusticia
  alternatives_spanish:
  - iniquidad
  - maldad
  lexicon: BDAG
  rationale: '''Injusticia'' respeta el alcance ético-jurídico del término y sostiene el contraste con el tomar y dar desordenados.'
- source_word: κλοπαί
  english_pob_choice: thefts
  chosen_spanish: robos
  alternatives_spanish:
  - hurtos
  - ladronerías
  lexicon: LSJ
  rationale: '''Robos'' es claro y general en español; mantiene la lista de actos concretos.'
- source_word: γρηπίσματα
  english_pob_choice: acts of greed
  chosen_spanish: actos de codicia
  alternatives_spanish:
  - actos de avidez
  - rapiñas
  lexicon: LSJ
  rationale: Dado lo incierto del término, 'codicia' conserva la orientación adquisitiva sin exagerar la precisión léxica.
- source_word: φιληδονία
  english_pob_choice: the pleasures
  chosen_spanish: los placeres
  alternatives_spanish:
  - el placer
  - las delicias
  lexicon: BDAG
  rationale: Mantiene el sentido concreto del deseo de placer en plural, como resultado o meta del corazón.
- source_word: δοσοληψία
  english_pob_choice: taking and giving
  chosen_spanish: el tomar y el dar
  alternatives_spanish:
  - las transacciones
  - los intercambios
  lexicon: LSJ
  rationale: La fórmula conserva la reciprocidad moralmente cargada del griego y evita una abstracción comercial excesiva.
- source_word: πλάνη
  english_pob_choice: error
  chosen_spanish: error
  alternatives_spanish:
  - engaño
  - desvío
  lexicon: BDAG
  rationale: '''Error'' empareja bien con ''fantasía'' y mantiene la dimensión intelectual y moral del pasaje.'
- source_word: φαντασία
  english_pob_choice: fantasy
  chosen_spanish: fantasía
  alternatives_spanish:
  - delirio
  - apariencia
  lexicon: LSJ
  rationale: '''Fantasía'' conserva el matiz de imagen engañosa o imaginación ilusoria que el texto contrapone a la verdad.'
- source_word: νεώτερος
  english_pob_choice: young man
  chosen_spanish: joven
  alternatives_spanish:
  - muchacho
  - persona joven
  lexicon: LSJ
  rationale: '''Joven'' suena natural en español y mantiene la advertencia dirigida a la juventud masculina en el contexto inmediato.'
- source_word: νόμος τοῦ θεοῦ
  english_pob_choice: law of God
  chosen_spanish: ley de Dios
  alternatives_spanish:
  - ley de Yahvé
  - ley divina
  lexicon: BDAG
  rationale: Aunque el proyecto usa 'Yahvé' para el nombre divino, aquí la expresión griega corresponde a 'Dios' en un giro ya establecido; la fórmula auditada en inglés también usa 'law of God'.
- source_word: νουθεσία
  english_pob_choice: instruction
  chosen_spanish: instrucción
  alternatives_spanish:
  - amonestación
  - enseñanza
  lexicon: BDAG
  rationale: En un contexto testamentario paterno, 'instrucción' es natural y suficientemente fuerte, sin perder el valor exhortativo.
- source_word: ὄψις γυναικεία
  english_pob_choice: a woman’s appearance
  chosen_spanish: la apariencia de una mujer
  alternatives_spanish:
  - el aspecto de una mujer
  - la belleza de una mujer
  lexicon: LSJ
  rationale: '''Apariencia'' conserva el foco visual del término sin introducir un juicio estético más específico de lo que el griego exige.'
- source_word: θηλεία ὑπάνδρος
  english_pob_choice: a married woman
  chosen_spanish: una mujer casada
  alternatives_spanish:
  - la mujer de otro
  - una mujer bajo marido
  lexicon: LSJ
  rationale: Es la manera más idiomática y fiel de expresar el estado civil señalado por el griego.
- source_word: περιεργάζεσθε πρᾶξιν γυναικῶν
  english_pob_choice: pry into the affairs of women
  chosen_spanish: husmeen en los asuntos de las mujeres
  alternatives_spanish:
  - se entrometan en los asuntos de las mujeres
  - investiguen los asuntos de las mujeres
  lexicon: BDAG
  rationale: '''Husmear'' reproduce la intrusión impropia y su tono moral. ''Asuntos'' traduce de manera amplia πρᾶξις sin precisar más de lo debido.'
theological_decisions:
- issue: Duplicación del octavo espíritu del sueño en vv. 1 y 7
  english_pob_reading: Translate both references, treating v. 7 as a parallel or expanded restatement rather than silently omitting it.
  chosen_spanish_reading: Traduzco ambas referencias y mantengo la segunda como un retorno explícito al mismo motivo, sin armonizarlas ni suprimir una de ellas.
  alternative_spanish_readings:
  - Omitir el v. 7 como duplicación secundaria
  - Fusionar ambos pasajes en una sola afirmación
  rationale: El griego transmitido contiene ambas expresiones y la edición inglesa auditada decidió transparentar esa complejidad. La versión española debe conservar esa honestidad textual y no resolverla por cuenta propia.
  doctrine_reference: 'PHILOSOPHY.md: traducir honestamente lo presente en el testigo griego y usar notas cuando haya complejidad textual.'
- issue: Catálogo antropológico de 'espíritus' ligados a facultades corporales
  english_pob_reading: Render the catalogue straightforwardly as spirits associated with bodily faculties and passions.
  chosen_spanish_reading: Conservo 'espíritu' de manera consistente y dejo visibles las asociaciones con órganos, sentidos y pasiones.
  alternative_spanish_readings:
  - Interpretar estos elementos como simples hábitos o impulsos
  - Explicarlos explícitamente como demonios
  rationale: El texto presenta una taxonomía moral-psicológica propia del testamento, no una explicación moderna. Traducirla sin demitologizar ni sobrerinterpretar respeta su marco conceptual.
  doctrine_reference: 'PHILOSOPHY.md: transparencia al mundo conceptual del testigo, sin imponer una reinterpretación doctrinal ajena.'
- issue: Referencia a 'ley de Dios' frente al nombre divino Yahvé
  english_pob_reading: law of God
  chosen_spanish_reading: ley de Dios
  alternative_spanish_readings:
  - ley de Yahvé
  - ley del Señor
  rationale: Aquí no hay una cita directa del tetragrámaton, sino la fórmula griega θεοῦ. Por eso la traducción natural y auditable es 'Dios', no una sustitución por el nombre divino.
  doctrine_reference: 'Terminología POB: יהוה -> Yahvé, pero θεός / θεοῦ -> Dios.'
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del inglés en el detalle temporal de ἐκτίσθη, por lo que usé 'fueron creados' y no una forma presente. También mantuve la transparencia textual de la duplicación del octavo espíritu, conforme a la decisión auditada del POB en inglés.
  spanish_consistency_notes:
  - Uso 'espíritu' de manera uniforme para πνεῦμα, incluidas las listas de pasiones.
  - Conservo 'error' y 'fantasía' para πλάνη y φαντασία, siguiendo el par conceptual del testigo.
  - Mantengo 'Yahvé' como forma por defecto del nombre divino, pero aquí el griego usa θεοῦ y por eso traduje 'Dios'.
  - Evité 'siervo' para δοῦλος porque este pasaje no lo contiene; no introduje terminología eclesial ajena al griego.
  - Las notas se limitan a lugares donde el texto griego o la traducción auditada muestran tensión textual o léxica real.
