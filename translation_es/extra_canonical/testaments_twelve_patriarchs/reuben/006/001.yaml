  text: Φυλάξατε¹ οὖν² ἀπὸ τῆς³ πορνείας, καὶ * ἔστε καθαρεύοντες⁴ τῇ διανοίᾳ. * φυλάξατε καὶ⁵ * τὰς αἰσθήσεις ὑμῶν⁶ ἀπὸ πάσης γυναικῶν⁷.
