base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/reuben/006/001.yaml
  text: Guard yourselves, therefore, from sexual immorality, and keep your mind pure. Guard also your senses from every woman.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:34Z'
    unchanged: false
    changes_summary: Changed 'be keeping your mind pure' to 'keep your mind pure' for more natural formal English while preserving the sense of the Greek.
translation:
  language: es
  text: Guárdense, pues, de la fornicación, y mantengan puro su pensamiento. Guarden también sus sentidos de toda mujer.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Φυλάξατε
  english_pob_choice: Guard yourselves
  chosen_spanish: Guárdense
  alternatives_spanish:
  - Guardense
  - Protéjanse
  - Cuídense
  lexicon: φυλάσσω
  rationale: El imperativo medio refleja una acción reflexiva y vigilante; «Guárdense» conserva la fuerza de auto-resguardo que tiene el griego y encaja con el tono exhortativo del pasaje.
- source_word: πορνείας
  english_pob_choice: sexual immorality
  chosen_spanish: fornicación
  alternatives_spanish:
  - inmoralidad sexual
  - conducta sexual inmoral
  lexicon: πορνεία
  rationale: En este contexto, el término tiene peso moral y sexual amplio. «Fornicación» mantiene una equivalencia más estable con el campo semántico tradicional de πορνεία sin diluir su fuerza, aunque en español moderno puede sonar más técnico o eclesial.
- source_word: καθαρευόντες τῇ διανοίᾳ
  english_pob_choice: keep your mind pure
  chosen_spanish: mantengan puro su pensamiento
  alternatives_spanish:
  - mantengan pura su mente
  - sigan purificando su pensamiento
  lexicon: καθαρεύω / διάνοια
  rationale: El griego expresa pureza de la disposición interior, especialmente del entendimiento o pensamiento. «Pensamiento» comunica con claridad la interioridad moral en español y evita reducir el matiz solo a la mente como órgano intelectual.
- source_word: τὰς αἰσθήσεις ὑμῶν
  english_pob_choice: your senses
  chosen_spanish: sus sentidos
  alternatives_spanish:
  - sus percepciones
  - sus facultades sensoriales
  lexicon: αἴσθησις
  rationale: «Sentidos» es la correspondencia más directa y preserva la dimensión perceptiva del término griego.
- source_word: ἀπὸ πάσης γυναικῶν
  english_pob_choice: from every woman
  chosen_spanish: de toda mujer
  alternatives_spanish:
  - respecto de toda mujer
  - ante toda mujer
  lexicon: γυνή
  rationale: La construcción griega es amplia y difícil; el POB en inglés interpreta el sentido como una exhortación a la cautela sexual y visual frente a las mujeres. «De toda mujer» mantiene esa literalidad sin añadir especificaciones que el griego no explicita.
theological_decisions:
- issue: Alcance moral de πορνεία
  english_pob_reading: sexual immorality
  chosen_spanish_reading: fornicación
  alternative_spanish_readings:
  - inmoralidad sexual
  - impureza sexual
  rationale: La elección conserva el valor ético-sexual amplio del término en una forma breve y reconocible. No se suaviza el mandato ni se lo reduce a un solo acto aislado.
  doctrine_reference: Santidad sexual / ética de pureza
- issue: Interioridad de la pureza
  english_pob_reading: keep your mind pure
  chosen_spanish_reading: mantengan puro su pensamiento
  alternative_spanish_readings:
  - mantengan pura su mente
  - conserven pura su disposición interior
  rationale: El griego vincula la pureza con la διανοία, la esfera interior del pensamiento/disposición. «Pensamiento» conserva la tensión entre mente y actitud interior sin volverlo excesivamente abstracto.
  doctrine_reference: Pureza del corazón y del entendimiento
translation_notes:
  revision_awareness: La versión inglesa revisada cambió de 'be keeping your mind pure' a 'keep your mind pure' para expresar el presente con mayor naturalidad. La línea española adopta una exhortación en imperativo con aspecto resultativo natural ('mantengan puro') que preserva esa misma decisión de estilo sin introducir progresivo artificial.
  spanish_consistency_notes:
  - Se conserva un registro bíblico sobrio y moderno, evitando calcos innecesarios.
  - «Guárdense» funciona como imperativo plural reflexivo y mantiene la lógica del texto griego.
  - No se usa «SEÑOR» ni terminología cristológica ajena al pasaje; el texto no requiere esos ajustes.
  - «Sus sentidos» y «de toda mujer» siguen de cerca la sintaxis y el alcance del griego sin sobreinterpretación.
