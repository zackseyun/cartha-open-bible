base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/reuben/006/008.yaml
  text: until the completion of the times [of the high priest Messiah, of whom the Lord spoke].
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:42:00Z'
    unchanged: false
    changes_summary: 'Adjusted for closer lexical accuracy: rendered ἕως τελειώσεως χρόνων as ''until the completion of the times'' and retained the bracketed clause while translating χριστοῦ as ''Messiah''.'
translation:
  language: es
  text: hasta la culminación de los tiempos [del Mesías sumo sacerdote, de quien habló el Señor].
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἕως τελειώσεως χρόνων
  english_pob_choice: until the completion of the times
  chosen_spanish: hasta la culminación de los tiempos
  alternatives_spanish:
  - hasta la completación de los tiempos
  - hasta el cumplimiento de los tiempos
  lexicon: ἕως; τελείωσις; χρόνος
  rationale: Mantiene la idea de límite temporal con un sustantivo natural en español. «Culminación» comunica cierre/completamiento sin forzar una traducción demasiado técnica, y conserva bien la progresión hasta un punto final de los tiempos.
- source_word: ἀρχιερέως
  english_pob_choice: high priest
  chosen_spanish: sumo sacerdote
  alternatives_spanish:
  - pontífice
  - gran sacerdote
  lexicon: ἀρχιερεύς
  rationale: «Sumo sacerdote» es el equivalente eclesial y bíblico más claro en español para el cargo de ἀρχιερεύς, y preserva la dignidad del título sin introducir connotaciones extrañas.
- source_word: χριστοῦ
  english_pob_choice: Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  - Ungido
  lexicon: χριστός
  rationale: Se conserva la decisión del POB inglés de leer aquí un título mesiánico y no un nombre propio litúrgico. «Mesías» es la forma española más transparente para el título, con la fuerza de «Ungido» implícita.
- source_word: ὃν εἶπε Κύριος
  english_pob_choice: of whom the Lord spoke
  chosen_spanish: de quien habló el Señor
  alternatives_spanish:
  - de quien dijo el Señor
  - acerca de quien habló el Señor
  lexicon: ὃς; λέγω; Κύριος
  rationale: La frase española sigue de cerca el sentido del griego y del POB inglés. «Habló» refleja bien εἶπε en este contexto de anuncio divino; se mantiene «el Señor» como en el audit trail inglés, sin introducir una máscara adicional.
theological_decisions:
- issue: 'Identidad y estatus del personaje esperado: «ἀρχιερέως χριστοῦ»'
  english_pob_reading: of the high priest Messiah
  chosen_spanish_reading: del Mesías sumo sacerdote
  alternative_spanish_readings:
  - del Cristo sumo sacerdote
  - del ungido sumo sacerdote
  rationale: El texto presenta una combinación titulativa singular que el POB inglés conserva como «high priest Messiah». En español, «Mesías sumo sacerdote» mantiene la tensión entre el título mesiánico y la función sacerdotal sin diluir ninguno de los dos elementos.
  doctrine_reference: Mesianismo y sacerdocio esperado; tipología sacerdotal
- issue: Alcance temporal de la cláusula inicial
  english_pob_reading: until the completion of the times
  chosen_spanish_reading: hasta la culminación de los tiempos
  alternative_spanish_readings:
  - hasta el cumplimiento de los tiempos
  - hasta la consumación de los tiempos
  rationale: La elección busca conservar el carácter escatológico de τελειώσεως χρόνων. «Culminación» es suficientemente fuerte para implicar consumación sin fijar una terminología doctrinal más cargada que el texto no exige.
  doctrine_reference: Escatología y consumación del tiempo
- issue: Referencia a la palabra del Señor
  english_pob_reading: of whom the Lord spoke
  chosen_spanish_reading: de quien habló el Señor
  alternative_spanish_readings:
  - de quien dijo el Señor
  - de quien el Señor habló
  rationale: Se preserva la referencia divina sin reinterpretarla. La mayúscula en «Señor» sigue la convención española para la reverencia, mientras que el texto fuente griego usa Κύριος y el POB inglés mantiene la referencia explícita.
  doctrine_reference: Autoridad profética y palabra revelada
translation_notes:
  revision_awareness: 'El POB inglés fue revisado desde una formulación más literal («the times of the anointed high priest») a otra más precisa («the completion of the times [of the high priest Messiah, of whom the Lord spoke]»). La versión española sigue esa revisión: convierte ἕως τελειώσεως χρόνων en una expresión de culminación temporal y conserva el corchete para la cláusula explicativa sobre el Mesías sumo sacerdote.'
  spanish_consistency_notes:
  - Se usa «Mesías» de manera consistente para χριστός en este registro, siguiendo la decisión del POB inglés.
  - Se mantiene la referencia a «el Señor» como traducción reverente de Κύριος en la cláusula final.
  - No se añade puntuación interpretativa adicional más allá de los corchetes heredados del audit trail inglés.
