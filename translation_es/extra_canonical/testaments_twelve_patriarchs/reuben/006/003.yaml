translation:
  language: es
  text: Porque las continuas [a] reuniones, aun si no se lleva a cabo el acto impío, son sin embargo para ellas una enfermedad incurable, y para nosotros una deshonra destructiva de Beliar y un oprobio eterno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Reuniones» traduce el sentido de encuentros frecuentes; otras posibilidades son «encuentros» o «citas».
    reason: lexical_alternative
lexical_decisions:
- source_word: Αἱ ... συνεχεῖς συντυχίαι
  english_pob_choice: constant encounters
  chosen_spanish: las continuas reuniones
  alternatives_spanish:
  - los encuentros constantes
  - las citas frecuentes
  - las continuas citas
  lexicon: συντυχίαι
  rationale: El griego apunta a encuentros/ocasiones de verse con frecuencia; «reuniones» suena natural en español y conserva la idea de contacto repetido sin exagerar a una connotación formal que el contexto no exige. «Continuas» refleja συνεχεῖς y evita perder la insistencia del adjetivo.
- source_word: κἂν μὴ πραχθῇ τὸ ἀσέβημα
  english_pob_choice: even if the ungodly act is not carried out
  chosen_spanish: aun si no se lleva a cabo el acto impío
  alternatives_spanish:
  - aunque no se cometa el acto impío
  - aunque no se realice la impiedad
  - aunque el acto impío no llegue a hacerse
  lexicon: πραχθῇ / ἀσέβημα
  rationale: «Llevarse a cabo» expresa bien la acción no consumada; «acto impío» mantiene el sustantivo concreto del griego sin diluirlo en una abstracción. Se conserva la tensión moral del texto sin suavizar el juicio.
- source_word: νόσος ἀνίατος
  english_pob_choice: incurable disease
  chosen_spanish: enfermedad incurable
  alternatives_spanish:
  - mal incurable
  - dolencia incurable
  - enfermedad sin remedio
  lexicon: νόσος / ἀνίατος
  rationale: «Enfermedad incurable» es la equivalencia más directa y transparente; «sin remedio» sería posible, pero la forma nominal del griego favorece «incurable» como adjetivo.
- source_word: εἰς ὄλεθρον
  english_pob_choice: destructive
  chosen_spanish: destructiva
  alternatives_spanish:
  - ruinosa
  - para destrucción
  - funesta
  lexicon: ὄλεθρον
  rationale: La revisión inglesa desplazó «ruinous» a «destructive» para acercarse a εἰς ὄλεθρον. En español, «destructiva» conserva esa dirección causal con naturalidad y evita intensificar indebidamente a «ruinosa».
- source_word: ὄνειδος Βελίαρ
  english_pob_choice: disgrace of Beliar
  chosen_spanish: deshonra de Beliar
  alternatives_spanish:
  - vergüenza de Beliar
  - oprobio de Beliar
  - afrenta de Beliar
  lexicon: ὄνειδος / Βελίαρ
  rationale: «Deshonra» comunica bien la carga de vergüenza pública y reproche. Se conserva «Beliar» siguiendo la tradición del texto fuente y la auditable lexicalidad del POB inglés.
- source_word: ὄνειδος αἰώνιον
  english_pob_choice: everlasting reproach
  chosen_spanish: un oprobio eterno
  alternatives_spanish:
  - un reproche eterno
  - una vergüenza perpetua
  - una afrenta eterna
  lexicon: ὄνειδος / αἰώνιον
  rationale: «Oprobio» mantiene el campo semántico de reproche/vergüenza pública y, junto con «eterno», refleja bien el carácter duradero e inescapable del término griego. Se evita atenuar el paralelo final.
theological_decisions:
- issue: La carga moral de encuentros continuos aun sin consumación del acto impío
  english_pob_reading: constant encounters are already harmful even if the ungodly act is not carried out
  chosen_spanish_reading: las continuas reuniones ya son dañinas aunque el acto impío no se lleve a cabo
  alternative_spanish_readings:
  - solo la consumación del acto sería dañina
  - los encuentros son neutrales mientras no haya pecado consumado
  rationale: El texto presenta el daño moral en la frecuencia misma de los encuentros, no solo en el acto consumado. La traducción conserva esa advertencia ética sin rebajarla a una mera prevención jurídica.
  doctrine_reference: ética sexual y advertencia sapiencial del Testamento de Rubén
- issue: La expresión 'Beliar' como agente de deshonra
  english_pob_reading: disgrace of Beliar
  chosen_spanish_reading: deshonra de Beliar
  alternative_spanish_readings:
  - deshonra del diablo
  - deshonra de Belial
  rationale: Se mantiene el nombre tradicional «Beliar» porque el texto fuente lo nombra así y la POB inglesa no lo sustituyó por un equivalente interpretativo. Esto preserva el color textual y la continuidad intertestamentaria.
  doctrine_reference: demonología literaria del Testamento de los Doce Patriarcas
translation_notes:
  revision_awareness: La revisión inglesa reciente cambió ‘ruinous’ a ‘destructive’ para reflejar con más precisión εἰς ὄλεθρον. La versión española adopta «destructiva» por la misma razón y mantiene el resto del enunciado alineado con el texto griego y el audit trail inglés.
  spanish_consistency_notes:
  - Se usa «Beliar» de forma consistente con el texto fuente y con la tradición del POB inglés.
  - Se conserva «acto impío» para πραχθῇ τὸ ἀσέβημα, evitando normalizarlo a una formulación más general.
  - «Oprobio» y «deshonra» se distribuyen para preservar el paralelismo del griego entre el efecto sobre ellos y sobre nosotros.
