    changes_summary: Revised 'their vengeance' to 'vengeance on them' to reflect the Greek more accurately and naturally; retained the rest unchanged.
translation:
  language: es
  text: Porque Dios ejecutará venganza sobre ellos, pero ustedes morirán de una muerte mala.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ὁ γὰρ Θεὸς
  english_pob_choice: For God
  chosen_spanish: Porque Dios
  alternatives_spanish:
  - Pues Dios
  - Porque el Dios
  lexicon: θεός
  rationale: Se conserva el sujeto divino de manera directa y natural en español. Dado que el texto griego no usa el nombre divino aquí, ‘Dios’ refleja fielmente el sustantivo sin introducir una designación específica como Yahvé.
- source_word: ποιήσει τὴν ἐκδίκησιν
  english_pob_choice: will execute vengeance
  chosen_spanish: ejecutará venganza
  alternatives_spanish:
  - hará venganza
  - llevará a cabo la venganza
  lexicon: ἐκδίκησις
  rationale: ‘Ejecutar venganza’ mantiene la fuerza judicial/activa del griego y del inglés POB sin suavizarla. ‘Venganza’ conserva el sustantivo abstracto, y ‘ejecutará’ comunica la acción futura de forma idiomática en español.
- source_word: ἐπ' αὐτῶν
  english_pob_choice: on them
  chosen_spanish: sobre ellos
  alternatives_spanish:
  - contra ellos
  - en ellos
  lexicon: πρόθεση + pronombre
  rationale: ‘Sobre ellos’ reproduce la dirección de la retribución de modo claro y amplio. ‘Contra ellos’ también es posible, pero ‘sobre’ conserva mejor la imagen de un acto que recae sobre las personas.
- source_word: θανάτῳ πονηρῷ
  english_pob_choice: an evil death
  chosen_spanish: de una muerte mala
  alternatives_spanish:
  - de una muerte malvada
  - de una muerte perversa
  lexicon: θάνατος + πονηρός
  rationale: Se traduce de modo sencillo y cercano al inglés POB. ‘Mala’ transmite la cualidad negativa sin cargar innecesariamente con ‘malvada’, que en español puede sonar más personal o moralizante que el griego en este contexto.
theological_decisions:
- issue: Retribución divina explícita
  english_pob_reading: For God will execute vengeance on them
  chosen_spanish_reading: Porque Dios ejecutará venganza sobre ellos
  alternative_spanish_readings:
  - Pues Dios hará justicia sobre ellos
  - Porque Dios los castigará
  rationale: Se mantiene la idea fuerte de retribución divina que el texto presenta. ‘Venganza’ refleja con más precisión la dureza del original y el POB en inglés; ‘hacer justicia’ suavizaría el matiz punitivo y ‘castigará’ perdería la especificidad léxica.
  doctrine_reference: Retribución divina en el discurso exhortativo del Testamento de Rubén; coherencia con el valor de ἐκδίκησις.
translation_notes:
  revision_awareness: La redacción sigue de cerca la versión inglesa revisada del POB, especialmente el ajuste de ‘their vengeance’ a ‘vengeance on them’, que confirma el valor de ἐπ' αὐτῶν como destino del acto retributivo y no como posesivo. No se introducen notas textuales porque el hebreo/greco-latino de este versículo en el paquete no presenta una variante que altere sustancialmente la traducción española.
  spanish_consistency_notes:
  - Se mantiene ‘Dios’ sin sustituirlo por ‘Yahvé’, porque aquí el griego dice Θεός y no hay un indicio textual de un tetragrama oculto.
  - ‘Venganza’ se conserva por consistencia con el peso semántico de ἐκδίκησις y con el inglés POB; no se reemplaza por ‘justicia’ para no diluir la fuerza del texto.
  - ‘Muerte mala’ se prefiere a alternativas más interpretativas para conservar la apertura semántica del griego y la cadencia breve del original.
