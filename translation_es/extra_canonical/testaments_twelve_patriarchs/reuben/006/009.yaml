  text: Ὁρκῶ ὑμᾶς τὸν Θεὸν τοῦ οὐρανοῦ⁶⁰ τοῦ⁶¹ ποιεῖν⁶² ἀλήθειαν * ἕκαστος πρὸς τὸν πλησίον αὐτοῦ⁶³ * καὶ ἀγάπην ἔχειν ἕκαστος πρὸς τὸν ἀδελφὸν αὐτοῦ⁶⁴.
