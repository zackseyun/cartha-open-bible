base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/reuben/006/009.yaml
  text: I adjure you by the God of heaven, that each of you do truth toward his neighbor and that each have love toward his brother.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:39Z'
    unchanged: false
    changes_summary: Changed 'practice truth' to 'do truth' to more closely reflect the Greek ποιεῖν ἀλήθειαν while keeping formal register; retained the rest.
translation:
  language: es
  text: Les conjuro por el Dios del cielo, que cada uno obre con verdad con su prójimo y que cada uno tenga amor hacia su hermano.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ὁρκῶ ὑμᾶς
  english_pob_choice: I adjure you
  chosen_spanish: Les conjuro
  alternatives_spanish:
  - Les ruego solemnemente
  - Les exhorto bajo juramento
  lexicon: ὁρκίζω
  rationale: «Conjurar» conserva el valor fuerte de imponer una exhortación solemne o bajo juramento, más cercano al tono intensivo del griego que una simple exhortación.
- source_word: τὸν Θεὸν τοῦ οὐρανοῦ
  english_pob_choice: the God of heaven
  chosen_spanish: el Dios del cielo
  alternatives_spanish:
  - el Dios celestial
  - el Dios de los cielos
  lexicon: θεός
  rationale: Se mantiene la fórmula directa y reverente del original y del inglés, sin sustituirla por una expresión más interpretativa.
- source_word: ποιεῖν ἀλήθειαν
  english_pob_choice: do truth
  chosen_spanish: haga la verdad
  alternatives_spanish:
  - practique la verdad
  - obre con verdad
  lexicon: ποιέω + ἀλήθεια
  rationale: La revisión inglesa favorece «do truth» para reflejar de modo más literal ποιεῖν ἀλήθειαν. En español, «hacer la verdad» preserva esa dureza literal sin perder inteligibilidad; se evita «practicar» para no suavizar la construcción.
- source_word: ἕκαστος πρὸς τὸν πλησίον αὐτοῦ
  english_pob_choice: each of you ... toward his neighbor
  chosen_spanish: cada uno ... con su prójimo
  alternatives_spanish:
  - cada uno ... hacia su prójimo
  - cada uno ... respecto a su prójimo
  lexicon: πλησίον
  rationale: «Prójimo» es la equivalencia natural y tradicional de πλησίον; «con» expresa bien la relación ética recíproca implicada por πρὸς en un español fluido.
- source_word: ἀγάπην ἔχειν ... πρὸς τὸν ἀδελφὸν αὐτοῦ
  english_pob_choice: have love toward his brother
  chosen_spanish: tenga amor por su hermano
  alternatives_spanish:
  - ame a su hermano
  - tenga amor hacia su hermano
  lexicon: ἀγάπη
  rationale: Se conserva la estructura sustantiva «tener amor», como en el inglés POB, para no convertirla en un imperativo verbal distinto del griego. «Por su hermano» comunica la dirección relacional de πρὸς con naturalidad en español.
theological_decisions:
- issue: Sentido de «hacer la verdad» frente a una lectura meramente moral o proverbial
  english_pob_reading: do truth toward his neighbor
  chosen_spanish_reading: haga la verdad con su prójimo
  alternative_spanish_readings:
  - practique la verdad con su prójimo
  - obre con verdad con su prójimo
  rationale: Se preserva la tensión semítica/helénica de una expresión concreta que no se reduce a «decir la verdad». La fórmula puede sonar extraña, pero esa extrañeza refleja mejor el griego y evita domesticar el enunciado.
  doctrine_reference: Ética bíblica de verdad y rectitud en la conducta interpersonal
translation_notes:
  revision_awareness: El inglés POB fue revisado de «practice truth» a «do truth» para acercarse a ποιεῖν ἀλήθειαν. La versión española sigue esa decisión y opta por una construcción igualmente literal («hacer la verdad») sin introducir una explicación interpretativa en el texto principal.
  spanish_consistency_notes:
  - Se usa «Dios» para Θεός, siguiendo el estándar del proyecto.
  - Se evita «SEÑOR» porque el pasaje no contiene el tetragrámaton ni una cita explícita que lo requiera.
  - Se mantiene un registro solemne y bíblico, pero con sintaxis española natural.
  - «Hermano» se conserva como término relacional inmediato del original; no se amplía a un sentido eclesial técnico.
