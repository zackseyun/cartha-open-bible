revisions:
- from: Les conjuro por el Dios del cielo, que cada uno haga la verdad con su prójimo y que cada uno tenga amor por su hermano.
  to: Les conjuro por el Dios del cielo, que cada uno obre con verdad con su prójimo y que cada uno tenga amor hacia su hermano.
  rationale: Se reemplaza «haga la verdad» por «obre con verdad» para conservar el sentido ético de ποιεῖν ἀλήθειαν en un español natural y fiel. También se ajusta «por su hermano» a «hacia su hermano» para reflejar mejor πρὸς en la segunda cláusula y mantener paralelismo formal.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-08T03:00:52Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el griego y el rastro auditado en inglés: «Les conjuro» refleja bien Ὁρκῶ ὑμᾶς; «el Dios del cielo» preserva τὸν Θεὸν τοῦ οὐρανοῦ; y la doble estructura «que cada uno… y que cada uno…» mantiene ἕκαστος… καὶ ἕκαστος. El punto principal a corregir es ποιεῖν ἀλήθειαν. Aunque el inglés auditado retiene la literalidad «do truth», en español «hacer la verdad» suena impropio y menos inteligible de lo deseable. Una formulación como «obre con verdad» conserva el sentido ético interpersonal del original sin desfigurar la construcción.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «haga la verdad» resulta demasiado calcado y poco natural para lectura eclesial amplia. «Con su prójimo» y «amor por su hermano» son aceptables, aunque «hacia su hermano» empata mejor con la repetición de πρὸς y evita un matiz afectivo algo coloquial de «por». La revisión propuesta mejora naturalidad sin perder formalidad ni cercanía al griego.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. «Dios» está bien. No aparecen términos sensibles como Yahvé, Mesías, Espíritu, esclavo, etc. La decisión clave es estilística/lexical: evitar un calco español torpe para ποιεῖν ἀλήθειαν, pero preservar su fuerza ética.'
  issues:
  - severity: medium
    issue: «haga la verdad» es un calco poco idiomático de ποιεῖν ἀλήθειαν
    rationale: Aunque refleja la revisión inglesa «do truth», en español moderno suena forzado y puede entorpecer la comprensión. «Obre con verdad» conserva el sentido conductual hacia el prójimo sin reducirlo meramente a «decir la verdad».
  - severity: low
    issue: «amor por su hermano» puede sonar menos preciso que «amor hacia su hermano»
    rationale: Ambas opciones son posibles, pero «hacia» reproduce mejor la dirección relacional de πρὸς y mantiene un registro más formal y simétrico con la primera cláusula.
  revised_spanish_text: Les conjuro por el Dios del cielo, que cada uno obre con verdad con su prójimo y que cada uno tenga amor hacia su hermano.
  revision_rationale: Se reemplaza «haga la verdad» por «obre con verdad» para conservar el sentido ético de ποιεῖν ἀλήθειαν en un español natural y fiel. También se ajusta «por su hermano» a «hacia su hermano» para reflejar mejor πρὸς en la segunda cláusula y mantener paralelismo formal.
