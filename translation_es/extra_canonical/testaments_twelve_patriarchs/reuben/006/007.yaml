translation:
  language: es
  text: Pues a Leví Dios le dio el sacerdocio, y a Judá con él el reino.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Τῷ ... Λευί
  english_pob_choice: to Levi
  chosen_spanish: a Leví
  alternatives_spanish:
  - para Leví
  - a Levi
  lexicon: Leví
  rationale: El dativo griego con destinatario se rinde de forma natural con «a» en español. Conservo el nombre bíblico en su forma castellana usual «Leví».
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Pues
  alternatives_spanish:
  - Porque
  - Ya que
  lexicon: γάρ
  rationale: El valor explicativo de γάρ se expresa bien con «pues», que suena natural en español bíblico moderno y mantiene la conexión lógica con el contexto.
- source_word: σεσθε
  english_pob_choice: gave
  chosen_spanish: dio
  alternatives_spanish:
  - entregó
  - concedió
  lexicon: δίδωμι
  rationale: El sentido de concesión divina en el contexto se vierte con «dio», que es directo y fiel al acto de otorgar un don/oficio.
- source_word: Λευ ... λαλεῖν
  english_pob_choice: the priesthood
  chosen_spanish: el sacerdocio
  alternatives_spanish:
  - el oficio sacerdotal
  - el ministerio sacerdotal
  lexicon: ἱερωσύνη / sacerdocio
  rationale: La frase corresponde al cargo/condición sacerdotal; «sacerdocio» preserva la formulación tradicional y la fuerza institucional del término.
- source_word: τῷ Ἰούδα μετ’ αὐτοῦ
  english_pob_choice: and to Judah with him
  chosen_spanish: y a Judá con él
  alternatives_spanish:
  - y a Judá junto con él
  - y con él a Judá
  lexicon: Ἰούδας
  rationale: Mantengo la construcción inclusiva «con él» para reflejar la asociación de Judá con Leví tal como la traduce la POB en inglés.
- source_word: βασιλεία
  english_pob_choice: the kingdom
  chosen_spanish: el reino
  alternatives_spanish:
  - la realeza
  - el gobierno real
  lexicon: βασιλεία
  rationale: «Reino» es la correspondencia más natural y directa para βασιλεία en este contexto de investidura real.
theological_decisions:
- issue: Distribución divina de oficios entre Leví y Judá
  english_pob_reading: For to Levi God gave the priesthood, and to Judah with him the kingdom.
  chosen_spanish_reading: Pues a Leví Dios le dio el sacerdocio, y a Judá con él el reino.
  alternative_spanish_readings:
  - Pues Dios dio el sacerdocio a Leví, y el reino a Judá con él.
  - Porque a Leví Dios concedió el sacerdocio, y a Judá con él el reino.
  rationale: La redacción conserva la asignación diferenciada de dos dones/oficios, sin fusionarlos ni reinterpretarlos. «Con él» conserva la relación explícita entre Judá y Leví en la cláusula final.
  doctrine_reference: Distribución de funciones pactales/tribales en la tradición bíblica; cf. Génesis 49; Éxodo 28–29; Hebreos 7
translation_notes:
  revision_awareness: El pasaje griego del paquete fuente aparece fragmentario y con señales de corrupción/abreviación (p. ej., secuencia incompleta alrededor de Τῷ γὰρ39 σεσθε. Λευ c λαλεῖν). La traducción española sigue el sentido estabilizado por el audit trail en inglés de POB, que traduce la unidad semántica completa como la concesión del sacerdocio a Leví y del reino a Judá con él.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exige explícitamente; aquí el sujeto es «Dios», así que se mantiene «Dios».
  - Se mantiene «Leví» y «Judá» como nombres propios bíblicos estándar en español.
  - Se evita introducir una nota textual en el cuerpo porque el registro inglés no ofrece aparato de variantes para esta línea, aunque el griego fuente esté fragmentario.
