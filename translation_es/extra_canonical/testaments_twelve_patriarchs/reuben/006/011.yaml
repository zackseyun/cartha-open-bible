translation:
  language: es
  text: Pues él bendecirá a Israel y a Judá, porque en él el Señor eligió reinar delante de todo el pueblo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Αὐτὸς γὰρ ... εὐλογήσει
  english_pob_choice: For he will bless
  chosen_spanish: Porque él bendecirá
  alternatives_spanish:
  - Pues él bendecirá
  - Porque él los bendecirá
  lexicon: εὐλογέω
  rationale: Conservé el valor prospectivo futuro simple y la relación causal de γάρ con «porque». «Bendecirá» reproduce bien la acción de conferir bendición sin añadir matices no presentes en el griego.
- source_word: τὸν Ἰσραὴλ καὶ τὸν Ἰούδαν
  english_pob_choice: Israel and Judah
  chosen_spanish: a Israel y a Judá
  alternatives_spanish:
  - a Israel y Judá
  - a Israel y a Judá
  lexicon: Ἰσραήλ / Ἰούδας
  rationale: Mantuve los nombres propios sin explicación adicional, con la preposición «a» por naturalidad española al introducir el objeto directo personalizado o personificado.
- source_word: Κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  - el Señor
  lexicon: κύριος
  rationale: Aunque el proyecto favorece «Yahvé» para el nombre divino, aquí la fuente griega usa κύριος en un contexto narrativo-teológico donde la tradición de la obra y la cita inglesa auditable sostienen «el Señor». En español suena natural y preserva la formulación del audit trail.
- source_word: ἐξελέξατο ... βασιλεύειν
  english_pob_choice: chose to reign
  chosen_spanish: eligió reinar
  alternatives_spanish:
  - escogió reinar
  - eligió gobernar
  lexicon: ἐκλέγομαι + βασιλεύω
  rationale: La construcción causal/teleológica se refleja mejor con «eligió reinar», manteniendo el verbo de reinar como en el griego y evitando una paráfrasis como «gobernar» que diluye la realeza explícita.
- source_word: ἐνώπιον παντὸς τοῦ λαοῦ
  english_pob_choice: before all the people
  chosen_spanish: delante de todo el pueblo
  alternatives_spanish:
  - ante todo el pueblo
  - en presencia de todo el pueblo
  lexicon: ἐνώπιον
  rationale: «Delante de» conserva bien el valor espacial/relacional de ἐνώπιον y resulta idiomático en español bíblico contemporáneo. «Todo el pueblo» reproduce παντὸς τοῦ λαοῦ sin intensificarlo más allá del griego.
theological_decisions:
- issue: Tensión entre el nombre divino del proyecto («Yahvé») y el κύριος del texto griego
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  rationale: Aquí no traduje mecánicamente el principio general «Yahvé» porque el tramo fuente es griego y el POB inglés ya fijó «the Lord». Dado que el texto no ofrece un señalamiento explícito al Tetragrámaton en hebreo sino κύριος, mantengo «el Señor» como forma auditada y transparente.
  doctrine_reference: Uso reverencial del nombre divino; criterio textual de equivalencia en traducciones de κύριος
- issue: «Reinar» como acción conferida al elegido
  english_pob_reading: chose to reign
  chosen_spanish_reading: eligió reinar
  alternative_spanish_readings:
  - eligió gobernar
  - escogió reinar
  rationale: Conservar «reinar» evita despolitizar la escena y mantiene la dimensión monárquica del texto. «Gobernar» sería más amplio, pero menos fiel a βασιλεύειν.
  doctrine_reference: Cristología / realeza mesiánica en literatura testamentaria
- issue: Relación causal expresada por γάρ
  english_pob_reading: For he will bless ... because ...
  chosen_spanish_reading: Porque él bendecirá ... porque ...
  alternative_spanish_readings:
  - Pues él bendecirá ... porque ...
  rationale: La doble causalidad del versículo se mantiene con dos «porque», reflejando tanto el enlace explicativo inicial como la cláusula causal interna. Aunque puede sonar repetitivo, el griego también estructura así la explicación.
  doctrine_reference: Retórica causal del texto fuente
translation_notes:
  revision_awareness: El control de revisión más reciente indicó que no se requerían cambios y que el texto permanecía sin alteraciones. Aun así, el cruce de verificación marcó necesidad de revisión con acuerdo moderado; por eso he conservado las decisiones del POB inglés pero explicitando el tratamiento de κύριος y la estructura causal griega.
  spanish_consistency_notes:
  - Mantengo un registro bíblico sobrio y contemporáneo, sin arcaísmos innecesarios.
  - Conservo la realeza explícita con «reinar»/«rey»-family semantics, evitando sustituciones por «gobernar» salvo necesidad.
  - No introduje notas al pie porque el verso no presenta una variante textual o ambigüedad española que requiera anclaje visible en esta línea.
