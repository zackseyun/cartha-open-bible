base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/reuben/006/005.yaml
  text: 'Therefore I say to you: you will envy the sons of Levi and seek to be exalted above them, but because of this you will not prevail.'
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:37Z'
    unchanged: false
    changes_summary: Changed 'be jealous of' to 'envy' for more natural and precise rendering of ζηλώσετε; changed 'seek to exalt yourselves' to 'seek to be exalted' to reflect the passive ὑψωθῆναι; reordered the final clause to match the Greek more closely.
translation:
  language: es
  text: 'Por tanto, les digo: envidiarán a los hijos de Leví y buscarán ser exaltados por encima de ellos, pero por esto no prevalecerán.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Διὰ τοῦτο Γοὖν λέγω ὑμῖν
  english_pob_choice: Therefore I say to you
  chosen_spanish: Por tanto, les digo
  alternatives_spanish:
  - Así que les digo
  - Por eso les digo
  lexicon: διά; λέγω; ὑμῖν
  rationale: Mantiene el valor inferencial de Διὰ τοῦτο Γοὖν con una fórmula natural en español, sin añadir solemnidad innecesaria. El dativo plural ὑμῖν se expresa con 'les'.
- source_word: ζηλώσετε
  english_pob_choice: you will envy
  chosen_spanish: envidiarán
  alternatives_spanish:
  - sentirán envidia de
  - tendrán envidia de
  lexicon: ζηλόω
  rationale: La revisión inglesa prefirió 'envy' frente a 'be jealous of' por precisión. 'Envidiarán' conserva ese matiz relacional y es idiomático en español.
- source_word: τοὺς υἱοὺς ... τοῦ Λευὶ
  english_pob_choice: the sons of Levi
  chosen_spanish: los hijos de Leví
  alternatives_spanish:
  - los descendientes de Leví
  lexicon: υἱοί; Λευί
  rationale: Se conserva la filiación literal del griego. 'Hijos de Leví' es claro y tradicional en español bíblico, sin perder el vínculo tribal.
- source_word: ζητήσετε ὑψωθῆναι ὑπὲρ αὐτούς
  english_pob_choice: seek to be exalted above them
  chosen_spanish: buscarán ser exaltados por encima de ellos
  alternatives_spanish:
  - buscarán ser elevados por encima de ellos
  - tratarán de ser exaltados sobre ellos
  lexicon: ζητέω; ὑψόω
  rationale: La pasiva infinitiva ὑψωθῆναι se refleja con 'ser exaltados', no con una forma activa reflexiva. 'Por encima de ellos' comunica el sentido de superioridad sin endurecer el español con un calco.
- source_word: οὐ ἰσχύσετε
  english_pob_choice: you will not prevail
  chosen_spanish: no prevalecerán
  alternatives_spanish:
  - no lograrán vencer
  - no serán capaces
  lexicon: ἰσχύω
  rationale: '''Prevalecer'' corresponde bien al valor de vencer, imponerse o tener fuerza suficiente. Mantiene la fuerza del futuro negativo sin sobreexplicar.'
theological_decisions:
- issue: La relación entre envidia y búsqueda de superioridad respecto de Leví
  english_pob_reading: you will envy ... and seek to be exalted above them, but because of this you will not prevail
  chosen_spanish_reading: envidiarán ... y buscarán ser exaltados por encima de ellos, pero por esto no prevalecerán
  alternative_spanish_readings:
  - envidiarán ... y tratarán de elevarse por encima de ellos, pero por esto no tendrán éxito
  rationale: 'Se conserva la secuencia moral del aviso: la envidia conduce a la aspiración de superioridad y a la derrota final. No se suaviza la advertencia ni se convierte en una simple comparación social.'
  doctrine_reference: Advertencia moral y reprobación de la envidia; cf. Sabiduría sapiencial bíblica sobre celos y rivalidad.
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente, que ajustó 'be jealous of' a 'envy', convirtió 'seek to exalt yourselves' en una pasiva ('seek to be exalted') y reordenó la cláusula final para acercarla más al griego. La versión española refleja esos tres cambios.
  spanish_consistency_notes:
  - Se mantiene 'Leví' como forma española estándar del nombre bíblico.
  - Se evita 'celosos' porque la revisión inglesa distinguió ζηλόω como 'envy' y no como celo positivo.
  - '''Prevalecer'' se usa con sentido de vencer o imponerse, coherente con el final negativo del griego.'
