reference: Testament of Reuben 6:12
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 66-79, Reuben pilot)
  text: Καὶ προσκυνήσατε⁷⁶ * τὸ σπέρμα⁷⁷ αὐτοῦ, ὅτι⁷⁸ ὑπὲρ ὑμῶν⁷⁹ ἀποθανεῖται⁸⁰ ἐν πολέμοις ὁρατοῖς καὶ⁸¹ ἀοράτοις. καὶ * ἐν ὑμῖν ἔσται⁸² * βασιλεὺς αἰώνιος⁸³.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/reuben/006/012.yaml
  text: And bow down to his offspring, because for your sake it will die in visible and invisible wars, and among you there will be an eternal king.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:39Z'
    unchanged: false
    changes_summary: Replaced 'seed' with 'offspring' for more natural English while preserving the collective sense of σπέρμα; replaced 'everlasting' with 'eternal' for a more direct rendering of αἰώνιος. Kept the rest substantially unchanged.
translation:
  language: es
  text: Y adoren a su descendencia[a], porque por causa de ustedes morirá en guerras visibles e invisibles; y entre ustedes habrá un rey eterno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Descendencia» traduce aquí el sentido colectivo de σπέρμα; también podría leerse «linaje» o «simiente».
    reason: lexical_alternative
lexical_decisions:
- source_word: σπέρμα
  english_pob_choice: offspring
  chosen_spanish: descendencia
  alternatives_spanish:
  - linaje
  - prole
  - simiente
  lexicon: σπέρμα
  rationale: El griego puede referirse tanto a descendencia colectiva como a simiente. En español, «descendencia» comunica de forma natural ese valor colectivo y evita el matiz demasiado técnico o arcaico de «simiente», sin perder la referencia al linaje prometido.
- source_word: προσκυνήσατε
  english_pob_choice: bow down
  chosen_spanish: adoren
  alternatives_spanish:
  - inclínense
  - postrense
  - adórenle
  lexicon: προσκυνέω
  rationale: El verbo griego puede expresar postración reverente ante una figura exaltada. En este contexto, «adoren» transmite mejor la reverencia exigida por el pasaje y suena más natural en español bíblico contemporáneo que una repetición literal de la acción física.
- source_word: ἀποθανεῖται
  english_pob_choice: it will die
  chosen_spanish: morirá
  alternatives_spanish:
  - morirá ella
  - será muerto
  lexicon: ἀποθνῄσκω
  rationale: Con el antecedente colectivo «descendencia», el verbo singular en español mantiene la concordancia posible por el valor corporativo del sustantivo, sin forzar una lectura individualista que el griego no exige.
- source_word: βασιλεὺς αἰώνιος
  english_pob_choice: eternal king
  chosen_spanish: rey eterno
  alternatives_spanish:
  - rey perpetuo
  - rey para siempre
  lexicon: βασιλεύς / αἰώνιος
  rationale: «Eterno» refleja con precisión αἰώνιος y coincide con la revisión inglesa reciente. «Rey eterno» conserva la dignidad del título y evita depender de fórmulas eclesiásticas más cargadas que el griego.
theological_decisions:
- issue: Obediencia reverente a la descendencia prometida
  english_pob_reading: And bow down to his offspring
  chosen_spanish_reading: Y adoren a su descendencia
  alternative_spanish_readings:
  - Y se inclinen ante su descendencia
  - Y se postren ante su descendencia
  rationale: El pasaje presenta una figura de honra dirigida a la descendencia prometida. «Adoren» comunica reverencia intensa sin introducir una explicación doctrinal ajena; mantiene la tensión entre homenaje y exaltación del personaje colectivo anunciado.
  doctrine_reference: Promesa patriarcal y expectativa mesiánica en literatura testamentaria
- issue: Muerte vicaria o representativa en el conflicto
  english_pob_reading: because for your sake it will die in visible and invisible wars
  chosen_spanish_reading: porque por causa de ustedes morirá en guerras visibles e invisibles
  alternative_spanish_readings:
  - porque por ustedes morirá en guerras visibles e invisibles
  - porque en favor de ustedes morirá...
  rationale: «Por causa de ustedes» conserva el sentido de beneficio o implicación para otros sin añadir una formulación sacrificial explícita que el texto no desarrolla aquí. Se preserva la ambigüedad entre causa, favor y representación.
  doctrine_reference: Lectura tipológica sin sobredeterminación cristológica
- issue: Reinado escatológico entre el pueblo
  english_pob_reading: and among you there will be an eternal king
  chosen_spanish_reading: y entre ustedes habrá un rey eterno
  alternative_spanish_readings:
  - y en medio de ustedes habrá un rey eterno
  - y entre ustedes habrá un rey para siempre
  rationale: «Entre ustedes» reproduce la localización del griego ἐν ὑμῖν con neutralidad, sin decidir de antemano entre presencia interna, comunitaria o territorial. «Rey eterno» mantiene la expectativa de duración indefinida en lenguaje claro.
  doctrine_reference: Reinado mesiánico y presencia del rey en el pueblo
translation_notes:
  revision_awareness: La versión inglesa más reciente cambió «seed» por «offspring» y «everlasting» por «eternal». La redacción española sigue ese ajuste al preferir «descendencia» y «eterno», manteniendo el valor colectivo de σπέρμα y la temporalidad directa de αἰώνιος. También se tuvo en cuenta que el texto griego habla de guerras «visibles e invisibles», sin expandir el conflicto a un lenguaje más interpretativo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparezca el nombre divino; aquí no ocurre.
  - 'Se conserva la secuencia del original: mandato de reverencia, motivo causal, y promesa de un rey en medio del pueblo.'
  - La concordancia singular de «morirá» con «descendencia» sigue el sentido colectivo del sustantivo griego.
  - No se introduce «Cristo» ni «Mesías» porque el verso no los usa explícitamente; la carga mesiánica queda implícita en el contexto del pasaje.
