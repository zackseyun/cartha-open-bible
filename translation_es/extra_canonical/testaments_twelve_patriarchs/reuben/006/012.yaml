review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura básica del griego: imperativo inicial, referencia a la descendencia/σπέρμα, muerte en guerras visibles e invisibles, y la promesa de un rey eterno entre ellos. Sin embargo, «adoren a su descendencia» se aleja de προσκυνήσατε, que aquí se preserva mejor como gesto de postración o inclinación reverente, no necesariamente adoración en sentido fuerte. Además, el griego coordina con καὶ entre las dos cláusulas; el punto y coma español no es incorrecto, pero una coma fluye mejor con el original.'
  spanish_quality_summary: El español es claro y digno. «Descendencia» funciona bien para el valor colectivo de σπέρμα y la nota es útil. La principal dificultad de legibilidad/fidelidad está en «adoren», que en español eclesial actual tiende a leerse como adoración cultual y sobredetermina el verbo. «Póstrense ante» o «inclínense ante» suena natural y más preciso.
  glossary_alignment: No hay choques con los términos troncales del proyecto. La decisión sobre σπέρμα como «descendencia» está bien alineada con la revisión inglesa a «offspring». No hay terminología Yahvé/Mesías/Cristo implicada aquí. La revisión recomendada afecta sobre todo a προσκυνήσατε por precisión semántica.
  issues:
  - severity: medium
    issue: «adoren» sobredetermina προσκυνήσατε
    rationale: προσκυνέω puede incluir adoración, pero en este contexto la traducción auditada inglesa «bow down» preserva mejor el gesto reverente sin imponer lectura cultual plena. En español, «adoren a su descendencia» suena más teológicamente fuerte que el original y que el rastro de auditoría inglés.
  - severity: low
    issue: Puntuación más fuerte de lo necesario antes de «y entre ustedes»
    rationale: El griego une las cláusulas con καὶ. Una coma mantiene mejor la continuidad del original, aunque el punto y coma no cambia sustancialmente el sentido.
  revised_spanish_text: Y póstrense ante su descendencia[a], porque por causa de ustedes morirá en guerras visibles e invisibles, y entre ustedes habrá un rey eterno.
  revised_footnotes:
  - marker: a
    text: «Descendencia» traduce aquí el sentido colectivo de σπέρμα; también podría leerse «linaje» o «simiente».
    reason: lexical_alternative
  revision_rationale: Se cambió «adoren a» por «póstrense ante» para reflejar mejor προσκυνήσατε y mantener la fuerza reverente sin imponer una lectura de adoración cultual más fuerte que la del griego y la del English POB («bow down»). Se ajustó la puntuación para seguir más de cerca la coordinación del original. Se mantuvo «descendencia» y su nota por su buen ajuste al valor colectivo de σπέρμα.
