revisions:
- from: Y adoren a su descendencia[a], porque por causa de ustedes morirá en guerras visibles e invisibles; y entre ustedes habrá un rey eterno.
  to: Y póstrense ante su descendencia[a], porque por causa de ustedes morirá en guerras visibles e invisibles, y entre ustedes habrá un rey eterno.
  rationale: Se cambió «adoren a» por «póstrense ante» para reflejar mejor προσκυνήσατε y mantener la fuerza reverente sin imponer una lectura de adoración cultual más fuerte que la del griego y la del English POB («bow down»). Se ajustó la puntuación para seguir más de cerca la coordinación del original. Se mantuvo «descendencia» y su nota por su buen ajuste al valor colectivo de σπέρμα.
