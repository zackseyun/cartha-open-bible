base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/reuben/006/002.yaml
  text: And command those women likewise not to associate with men, so that they too may be pure in mind.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:36Z'
    unchanged: false
    changes_summary: Adjusted 'the women' to 'those women' to reflect κἀκείνας, removed 'closely' since it is not explicit in συνδιάζειν, and rendered καθαρεύωσι τῇ διανοίᾳ more formally as 'be pure in mind.'
translation:
  language: es
  text: Y ordena que esas mujeres tampoco se relacionen con hombres, para que también ellas permanezcan puras en su mente.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Κἀκείνας
  english_pob_choice: those women
  chosen_spanish: esas mujeres
  alternatives_spanish:
  - aquellas mujeres
  - esas mujeres aquellas
  lexicon: κἀκείνας = καί + ἐκείνας
  rationale: El demostrativo apunta a un grupo ya identificado; ‘esas’ conserva la deixis sin volverlo más distante de lo que el griego exige. ‘Aquellas’ también sería posible, pero ‘esas’ suena más natural en este mandato directo.
- source_word: ἐντέλλεσθε
  english_pob_choice: command
  chosen_spanish: manda
  alternatives_spanish:
  - ordena
  - encarga
  lexicon: ἐντέλλομαι
  rationale: El verbo exige una instrucción imperativa fuerte. ‘Mandar’ comunica bien la fuerza directiva sin introducir un matiz más técnico o burocrático.
- source_word: μὴ συνδιάζειν
  english_pob_choice: not to associate with
  chosen_spanish: que no se asocien con
  alternatives_spanish:
  - que no convivan con
  - que no tengan trato con
  lexicon: συνδιάζω
  rationale: La forma griega no especifica intimidad excesiva ni una cercanía especial; por eso se evita ‘asociarse estrechamente’. ‘Asociarse con’ mantiene la relación general expresada por el verbo.
- source_word: τοῖς ἀνδράσιν
  english_pob_choice: with men
  chosen_spanish: con los hombres
  alternatives_spanish:
  - con varones
  - con los varones
  lexicon: ἀνήρ
  rationale: ‘Hombres’ es la equivalencia más natural en español general y mantiene el referente humano masculino del sustantivo griego. ‘Varones’ sería más literal pero menos idiomático aquí.
- source_word: καθαρεύωσι τῇ διανοίᾳ
  english_pob_choice: be pure in mind
  chosen_spanish: sean puras en su mente
  alternatives_spanish:
  - se mantengan puras en la mente
  - sean puras de mente
  lexicon: καθαρεύω + διάνοια
  rationale: La combinación expresa pureza respecto de la disposición interior/pensamiento. ‘Puras en su mente’ conserva la idea sin forzar una construcción poco natural; ‘de mente’ suena más rígido en español.
theological_decisions:
- issue: Alcance moral de la pureza mental
  english_pob_reading: so that they too may be pure in mind
  chosen_spanish_reading: para que también ellas sean puras en su mente
  alternative_spanish_readings:
  - para que también ellas mantengan la mente pura
  - para que también ellas sean puras de mente
  rationale: Se mantiene el valor moral e interior de καθαρεύωσι τῇ διανοίᾳ sin especificar más de lo que el griego dice. ‘En su mente’ refleja el ámbito de la pureza como disposición interior, no solo pensamiento momentáneo.
  doctrine_reference: ética de pureza interior; cf. uso bíblico de διάνοια como mente/disposición
- issue: Intensidad del mandato
  english_pob_reading: And command
  chosen_spanish_reading: Y manda
  alternative_spanish_readings:
  - Y ordena
  - Y encarga
  rationale: El texto es exhortativo y directivo. ‘Manda’ preserva la fuerza imperativa sin añadir connotaciones pastorales más suaves que el griego no exige.
  doctrine_reference: autoridad exhortativa en instrucción moral
translation_notes:
  revision_awareness: 'La revisión reciente corrigió dos puntos clave: κἀκείνας no debe borrarse a un simple ‘the women’, y συνδιάζειν no debe intensificarse con ‘closely’. Esta versión refleja ambos ajustes con ‘esas mujeres’ y ‘asociarse con’ sin añadir cercanía implícita.'
  spanish_consistency_notes:
  - Se conserva un español digno y contemporáneo, evitando el calco excesivo.
  - No se introduce ‘Cristo’, ‘Señor’ u այլ terminología ajena al versículo.
  - ‘Mente’ se usa para διανοία por su buena inteligibilidad y porque el foco es interior y moral.
  - No se añaden notas al pie porque no hay una alternativa textual necesaria que requiera anclaje en el versículo.
