  text: Κἀκείνας⁸ δὲ⁹ ἐντέλλεσθε¹⁰ μὴ συνδιάζειν¹¹ τοῖς ἀνδράσιν¹², ἵνα καὶ αὐταὶ καθαρεύωσι¹³ τῇ διανοίᾳ¹⁴.
