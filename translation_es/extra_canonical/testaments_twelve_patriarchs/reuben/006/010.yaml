source:
  edition: Charles 1908 Greek Versions (pages 66-79, Reuben pilot)
  text: Καὶ πρὸς τὸν⁶⁵ Λευὶ ἐγγίσατε⁶⁶ ἐν ταπεινώσει καρδίας Γὑμῶν⌉⁶⁷, ἵνα * δέξησθε εὐλογίαν⁶⁸ ἐκ τοῦ⁶⁹ στόματος αὐτοῦ.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/reuben/006/010.yaml
  text: And draw near to Levi in humility of your heart, so that you may receive a blessing from his mouth.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:38Z'
    unchanged: false
    changes_summary: Added 'your' to reflect the explicit Greek pronoun modifying 'heart' ("in humility of your heart").
translation:
  language: es
  text: Y acercaos a Leví con humildad de vuestro corazón, para que recibáis una bendición de su boca.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Καὶ πρὸς τὸν Λευὶ ἐγγίσατε
  english_pob_choice: And draw near to Levi
  chosen_spanish: Y acercaos a Leví
  alternatives_spanish:
  - Y acercaos a Leví
  - Y acercaos a Leví
  lexicon: ἐγγίζω
  rationale: «Acercaos» transmite el mandato de acercarse con naturalidad en español y conserva el sentido relacional del verbo griego; «Leví» mantiene el nombre propio estándar.
- source_word: ἐν ταπεινώσει καρδίας Γὑμῶν
  english_pob_choice: in humility of your heart
  chosen_spanish: con humildad de vuestro corazón
  alternatives_spanish:
  - en humildad de vuestro corazón
  - con la humildad de vuestro corazón
  lexicon: ταπείνωσις
  rationale: «Con humildad» expresa bien el modo/instrumento en español sin forzar una estructura demasiado literal; «de vuestro corazón» refleja el pronombre explícito del griego y la interioridad del término καρδία.
- source_word: ἵνα δέξησθε
  english_pob_choice: so that you may receive
  chosen_spanish: para que recibáis
  alternatives_spanish:
  - para que podáis recibir
  - a fin de que recibáis
  lexicon: δέχομαι
  rationale: «Recibáis» reproduce el valor de recibir/aceptar una bendición; «para que» mantiene la relación de propósito indicada por ἵνα.
- source_word: εὐλογίαν
  english_pob_choice: a blessing
  chosen_spanish: una bendición
  alternatives_spanish:
  - una bendición
  - bendición
  lexicon: εὐλογία
  rationale: «Una bendición» es la equivalencia directa y clara en español, conservando el sustantivo singular indefinido.
- source_word: ἐκ τοῦ στόματος αὐτοῦ
  english_pob_choice: from his mouth
  chosen_spanish: de su boca
  alternatives_spanish:
  - de su boca
  - de la boca de él
  lexicon: στόμα
  rationale: «De su boca» es la formulación idiomática natural en español para expresar el origen de la bendición y mantiene la imagen concreta del original.
theological_decisions:
- issue: Mediación de la bendición mediante Leví
  english_pob_reading: receive a blessing from his mouth
  chosen_spanish_reading: recibáis una bendición de su boca
  alternative_spanish_readings:
  - recibáis una bendición por medio de su boca
  - recibáis la bendición que sale de su boca
  rationale: La redacción conserva la imagen de que la bendición procede verbalmente de Leví, sin explicar ni suavizar la mediación que el texto presenta.
  doctrine_reference: No doctrinal expansion; follows the plain sense of the source text.
translation_notes:
  revision_awareness: La revisión inglesa añadió «your» en «your heart»; por eso se traduce explícitamente con «vuestro corazón», reflejando el pronombre posesivo del griego.
  spanish_consistency_notes:
  - Se usa «Leví» como nombre propio estándar en español.
  - Se conserva «bendición» para εὐλογία y no se sustituye por términos más interpretativos.
  - La estructura exhortativa se mantiene en segunda persona plural, coherente con el plural griego.
