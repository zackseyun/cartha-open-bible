revisions:
- from: Porque la fornicación no tiene en sí ni entendimiento ni piedad, y todo celo habita en su deseo.
  to: Porque la fornicación no tiene en sí ni entendimiento ni piedad, y todos los celos habitan en su deseo.
  rationale: Se mantiene casi todo el borrador por su fidelidad al griego y buena legibilidad, pero se sustituye «todo celo» por «todos los celos» para reflejar de manera inequívoca el sentido negativo de ζῆλος («jealousy») y evitar una lectura positiva o ambigua de «celo» en español.
  reviewer_model: gpt-5.4
