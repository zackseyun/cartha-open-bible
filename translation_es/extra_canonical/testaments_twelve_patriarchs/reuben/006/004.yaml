base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/reuben/006/004.yaml
  text: For sexual immorality has within itself neither understanding nor godliness, and every jealousy dwells in its desire.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:36Z'
    unchanged: false
    changes_summary: Replaced 'reverence for God' with 'godliness' for a more direct rendering of εὐσέβειαν and removed the unnecessary footnoted expansion. Kept the rest substantially the same.
translation:
  language: es
  text: Porque la fornicación no tiene en sí ni entendimiento ni piedad, y todo celo habita en su deseo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πορνεία
  english_pob_choice: sexual immorality
  chosen_spanish: fornicación
  alternatives_spanish:
  - inmoralidad sexual
  - inmundicia sexual
  - pecado sexual
  lexicon: πορνεία
  rationale: El griego nombra de forma directa la conducta sexual ilícita; en español, «fornicación» conserva fuerza lexical y un registro bíblico inteligible, sin diluir el alcance moral del término. Opté por un término breve y estable, más cercano al valor fuerte del original que una paráfrasis amplia.
- source_word: σύνεσιν
  english_pob_choice: understanding
  chosen_spanish: entendimiento
  alternatives_spanish:
  - sensatez
  - discernimiento
  - inteligencia
  lexicon: σύνεσις
  rationale: «Entendimiento» reproduce bien la capacidad de comprender y juzgar rectamente que el texto niega a la fornicación. Mantiene la simetría con el sustantivo abstracto del griego y suena natural en español bíblico.
- source_word: εὐσέβειαν
  english_pob_choice: godliness
  chosen_spanish: piedad
  alternatives_spanish:
  - devoción
  - temor de Dios
  - religiosidad
  lexicon: εὐσέβεια
  rationale: El griego admite la idea de devoción/piadosa reverencia; en español, «piedad» es una equivalencia breve y tradicional que conserva la cualidad moral-religiosa sin añadir la expansión interpretativa «reverencia a Dios». Dado el ajuste revisado del inglés a «godliness», esta opción mantiene la abstracción del término.
- source_word: ζῆλος
  english_pob_choice: jealousy
  chosen_spanish: celo
  alternatives_spanish:
  - celos
  - envidia
  - pasión celosa
  lexicon: ζῆλος
  rationale: «Celo» puede abarcar la fuerza de ζῆλος como impulso ardiente y celoso, evitando restringirlo solo a «celos» en sentido interpersonal. El contexto de deseo desordenado permite esta elección breve y literal sin perder la tensión del original.
- source_word: ἐπιθυμίᾳ αὐτῆς
  english_pob_choice: its desire
  chosen_spanish: su deseo
  alternatives_spanish:
  - su codicia
  - su concupiscencia
  - su apetito
  lexicon: ἐπιθυμία
  rationale: «Su deseo» conserva la referencia genérica del texto al impulso interno de la fornicación, sin introducir una especificación moral adicional que el griego no expresa aquí. Mantiene la personificación retórica del original.
theological_decisions:
- issue: Relación entre «godliness» y la noción bíblica de piedad
  english_pob_reading: The revised English chose "godliness" as a direct rendering of εὐσέβειαν, avoiding an explanatory expansion.
  chosen_spanish_reading: «Piedad»
  alternative_spanish_readings:
  - devoción
  - temor de Dios
  - religiosidad
  rationale: La lectura española debe conservar la cualidad ética-religiosa general de εὐσέβεια sin convertirla en una glosa. «Piedad» ofrece esa neutralidad y evita sobreespecificar el referente como «temor de Dios», que sería una ampliación no obligada por el griego.
  doctrine_reference: Ética bíblica / virtud de piedad en lenguaje sapiencial y moral
- issue: Sentido moral de ζῆλος en el contexto de la pasión ilícita
  english_pob_reading: '"every jealousy dwells in its desire" preserves the abstract moral force of ζῆλος.'
  chosen_spanish_reading: «todo celo habita en su deseo»
  alternative_spanish_readings:
  - «todos los celos habitan en su deseo»
  - «toda celotipia habita en su deseo»
  rationale: La forma singular colectiva «todo celo» refleja el carácter generalizante del original, que presenta el impulso celoso como rasgo inherente de esa pasión. Se evita pluralizarlo o psicologizarlo más de lo que el texto hace.
  doctrine_reference: Antropología moral / pasiones desordenadas
translation_notes:
  revision_awareness: 'La revisión inglesa reciente sustituyó «reverence for God» por «godliness» para una equivalencia más directa de εὐσέβειαν y eliminó la expansión explicativa. La versión española sigue esa misma línea: evita glosa interpretativa y opta por un término breve y abstracto («piedad») que mantiene la economía del griego.'
  spanish_consistency_notes:
  - Se mantiene un registro bíblico sobrio y no arcaizante.
  - No se añadió artículo en «fornicación» para seguir la forma proverbial/general del griego.
  - «Celo» se usa en sentido moral amplio, no como técnica doctrinal distinta.
  - No se introdujeron notas al pie porque el pasaje no presenta una variante textual o ambigüedad que requiera marcación en español.
