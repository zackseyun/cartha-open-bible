review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del griego: πορνεία como sujeto personificado, la negación doble de «entendimiento» y «piedad», y la cláusula final sobre ζῆλος habitando en su deseo. Sin embargo, «todo celo» no preserva bien el matiz de English POB «every jealousy» ni el uso español más natural en este contexto moral; en español bíblico y general aquí se entiende mejor como «todo celo celoso»? No: la mejor reparación es «todo celo de celos»? Tampoco. La forma idiomática y fiel es «todo celo» menos clara que «todo celo celoso»; por eso conviene ajustar a «todo celo»? Revisando el contexto, el valor de ζῆλος aquí se aproxima a «celos», y el singular colectivo inglés puede trasladarse de manera más natural como «todo celo de celos» no idiomático. La opción más fiel y legible es «toda clase de celos habita en su deseo», aunque añade «clase de». Para no ampliar, «todo celo» queda demasiado opaco. Se recomienda «todos los celos habitan en su deseo» como reparación
    menor de claridad.'
  spanish_quality_summary: El español es claro y digno en general. «Fornicación», «entendimiento» y «piedad» son lecturas defendibles y legibles. El principal problema de calidad está en «todo celo habita en su deseo», que suena poco natural y puede leerse positivamente («celo» como fervor) en vez de negativamente («celos»).
  glossary_alignment: 'No hay conflicto con los glosarios troncales del proyecto. «Piedad» para εὐσέβεια concuerda con la decisión inglesa revisada («godliness»). «Fornicación» es aceptable para πορνεία en este contexto, aunque «inmoralidad sexual» sería más amplio; no exige cambio. El único desajuste terminológico está en ζῆλος: la auditoría inglesa fijó «jealousy», y «celo» en español no reproduce de forma suficientemente inequívoca ese valor.'
  issues:
  - severity: medium
    issue: «todo celo» no comunica con claridad el sentido negativo de ζῆλος
    rationale: En español, «celo» puede significar fervor positivo o celo diligente. Aquí el contexto y la auditoría inglesa exigen «jealousy», por lo que «celos» transmite mejor la pasión desordenada.
  - severity: low
    issue: Leve tensión entre singular colectivo griego y plural español
    rationale: El griego usa πᾶς ζῆλος, pero en español la forma más natural para este significado es plural («todos los celos»). Es una adaptación idiomática menor que preserva mejor el sentido.
  revised_spanish_text: Porque la fornicación no tiene en sí ni entendimiento ni piedad, y todos los celos habitan en su deseo.
  revision_rationale: Se mantiene casi todo el borrador por su fidelidad al griego y buena legibilidad, pero se sustituye «todo celo» por «todos los celos» para reflejar de manera inequívoca el sentido negativo de ζῆλος («jealousy») y evitar una lectura positiva o ambigua de «celo» en español.
