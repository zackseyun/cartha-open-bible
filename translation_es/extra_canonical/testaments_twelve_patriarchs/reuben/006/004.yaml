reference: Testament of Reuben 6:4
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 66-79, Reuben pilot)
  text: Ὅτι ἣ²¹ πορνεία * οὔτε σύνεσιν οὔτε22 †εὐσέβειαν23 ἔχει ἐν ἑαυτῇ· καὶ24 πᾶς25 ζῆλος κατοικεῖ26 ἐν τῇ ἐπιθυμίᾳ αὐτῆς27.
