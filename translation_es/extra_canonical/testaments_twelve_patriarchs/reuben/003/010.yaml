    changes_summary: Changed 'pay attention to' to 'look at' to reflect the Greek more directly; changed 'keep company with' to 'associate with' for a more formal, neutral rendering; retained the rest as accurate.
translation:
  language: es
  text: No mires la apariencia de una mujer, ni te asocies con una mujer casada[a], ni te inmiscuyas en los asuntos de las mujeres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como “tener trato con” una mujer casada; se prefirió “asociarte con” por ser más neutral y formal en español.
    reason: alternative_reading
lexical_decisions:
- source_word: Μὴ προσέχετε ὄψει γυναικείᾳ ὄψιν
  english_pob_choice: Do not look at a woman's appearance
  chosen_spanish: No mires la apariencia de una mujer
  alternatives_spanish:
  - No prestes atención a la apariencia de una mujer
  - No fijes la mirada en la apariencia de una mujer
  lexicon: προσέχω; ὄψις
  rationale: El griego apunta a dirigir la mirada o atención hacia la apariencia; 'mires' conserva la fuerza visual directa que reflejó la revisión inglesa, sin añadir una noción más abstracta que el texto no exige.
- source_word: μήτε συνδιάζετε μετὰ θηλείας ὑπάνδρου
  english_pob_choice: nor associate with a married woman[3:7]
  chosen_spanish: ni te asocies con una mujer casada
  alternatives_spanish:
  - ni tengas trato con una mujer casada
  - ni convivas con una mujer casada
  lexicon: συνδιάζω; θηλεία ὑπάνδρος
  rationale: '''Asociarte'' reproduce el matiz neutral y formal de la revisión inglesa (''associate with'') sin caer en un calco demasiado duro; ''mujer casada'' expresa ὑπάνδρος de forma clara para el lector en español.'
- source_word: περιεργάζεσθε πρᾶξιν γυναικῶν
  english_pob_choice: nor pry into the affairs of women
  chosen_spanish: ni te inmiscuyas en los asuntos de las mujeres
  alternatives_spanish:
  - ni investigues los asuntos de las mujeres
  - ni curiosees en los asuntos de las mujeres
  lexicon: περιεργάζομαι; πρᾶξις
  rationale: '''Inmiscuyas'' comunica la intrusión indebida implícita en περιεργάζεσθε y permite una formulación natural en español; ''asuntos'' conserva el campo semántico de πρᾶξις sin exagerar hacia ''afanes'' o ''obras''.'
theological_decisions:
- issue: Ahorro moral sobre la conducta hacia las mujeres
  english_pob_reading: Do not look... nor associate... nor pry into...
  chosen_spanish_reading: No mires... ni te asocies... ni te inmiscuyas...
  alternative_spanish_readings:
  - No codicies la belleza de una mujer...
  - No tengas trato con mujeres...
  rationale: El pasaje presenta prohibiciones de conducta y de actitud, no una tesis doctrinal; la traducción mantiene el tono exhortativo y el alcance práctico del original, sin intensificarlo ni suavizarlo.
  doctrine_reference: ética de pureza y prudencia relacional
translation_notes:
  revision_awareness: La revisión inglesa reciente corrigió la primera cláusula para reflejar más directamente el griego ('look at') y ajustó la segunda a un registro más formal ('associate with'). La versión española sigue esa pauta, conservando el paralelismo negativo y evitando ampliar 'appearance' a 'belleza' o 'aspecto' sin necesidad.
  spanish_consistency_notes:
  - Se mantiene el imperativo negativo en segunda persona singular para reflejar el tono exhortativo directo del griego.
  - '''mujer casada'' se usa como equivalente claro de θηλείας ὑπάνδρου; no se introduce terminología eclesiástica o jurídica ajena al contexto.'
  - '''asuntos de las mujeres'' preserva el plural del griego sin convertirlo en una abstracción impersonal.'
