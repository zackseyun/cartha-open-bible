  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/reuben/003/010.yaml
  text: Do not look at a woman's appearance, nor associate with a married woman[3:7], nor pry into the affairs of women.
  revision_pass:
    model: gpt-5.4-mini
