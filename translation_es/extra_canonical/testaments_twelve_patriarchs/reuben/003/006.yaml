reference: Testament of Reuben 3:6
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 66-79, Reuben pilot)
  text: 6. Ἔβδομον πνεῦμα *ἀδικίας, μεθ’ ἧς⁴⁰ β-g, Α, κλοπαὶ⁴¹ καὶ γρηπίσματα⁴², ἵνα ἐμπλήσει⁴³ φιληδονίαν καρδίας S ποιήσῃ. αὐτοῦ. Ἡ γὰρ ἀδικία συνεργεῖ⁴⁴ *τοῖς λοιποῖς⁴⁵ πνεύμασιν β, S¹ ὑπ- διὰ τῆς δοσοληψίας⁴⁶.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/reuben/003/006.yaml
  text: Seventh, a spirit of injustice, with thefts and acts of greed, so that it may fill the pleasures of the heart. For injustice works together with the other spirits through buying and selling.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:42:00Z'
    unchanged: false
    changes_summary: Removed the footnote marker, adjusted the clause to better match the source's wording, and rendered δοσοληψία more directly as 'buying and selling' rather than 'taking and giving.'
translation:
  language: es
  text: Séptimo, un espíritu de injusticia, con robos y actos de codicia, para que llene las delicias del corazón. Porque la injusticia coopera con los otros espíritus mediante la compra y la venta.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πνεῦμα ἀδικίας
  english_pob_choice: a spirit of injustice
  chosen_spanish: un espíritu de injusticia
  alternatives_spanish:
  - un espíritu injusto
  - un espíritu de maldad
  lexicon: πνεῦμα; ἀδικία
  rationale: Conserva la personificación espiritual del griego y la elección inglesa de "spirit of injustice" sin convertirla en un simple rasgo moral.
- source_word: κλοπαὶ
  english_pob_choice: thefts
  chosen_spanish: robos
  alternatives_spanish:
  - hurtos
  - ladrones
  lexicon: κλοπή
  rationale: '"Robos" es natural en español y mantiene la fuerza general del plural de acciones ilícitas; "hurtos" sería más técnico y menos amplio.'
- source_word: γρηπίσματα
  english_pob_choice: acts of greed
  chosen_spanish: actos de codicia
  alternatives_spanish:
  - ganancias deshonestas
  - rapiñas
  lexicon: γρηπίσματα
  rationale: El término griego es raro y el contexto apunta a prácticas codiciosas; "actos de codicia" preserva la amplitud sin añadir una interpretación más estrecha de lo que el texto exige.
- source_word: ἵνα ἐμπλήσει φιληδονίαν καρδίας
  english_pob_choice: so that it may fill the pleasures of the heart
  chosen_spanish: para que llene las delicias del corazón
  alternatives_spanish:
  - para que satisfaga los placeres del corazón
  - para que colme los deleites del corazón
  lexicon: φιληδονίαν καρδίας; ἐμπλήσει
  rationale: Se mantiene la estructura causal y la imagen de "llenar"; "delicias" preserva el matiz de placer deseado sin modernizarlo demasiado ni suavizar el tono.
- source_word: δοσοληψίας
  english_pob_choice: buying and selling
  chosen_spanish: mediante la compra y la venta
  alternatives_spanish:
  - por medio de comprar y vender
  - a través del comercio
  lexicon: δοσοληψία
  rationale: La revisión inglesa aclaró que el sentido directo es transaccional. "Compra y venta" reproduce esa reciprocidad comercial con claridad y sin expandir innecesariamente a "comercio".
theological_decisions:
- issue: Personificación moral/espiritual de la injusticia
  english_pob_reading: a spirit of injustice
  chosen_spanish_reading: un espíritu de injusticia
  alternative_spanish_readings:
  - la injusticia
  - un espíritu injusto
  rationale: El pasaje trata la injusticia como una fuerza espiritual activa; se conserva esa lectura en español para no borrar la tensión conceptual del texto fuente.
  doctrine_reference: Antropología moral y lenguaje de poderes/espíritus en literatura del Segundo Templo
- issue: Relación entre injusticia y prácticas económicas
  english_pob_reading: through buying and selling
  chosen_spanish_reading: mediante la compra y la venta
  alternative_spanish_readings:
  - por medio del comercio
  - a través de intercambios comerciales
  rationale: La revisión del inglés evita una traducción demasiado idiomática y mantiene el vínculo entre injusticia y transacciones económicas concretas.
  doctrine_reference: Ética económica y denuncia de prácticas deshonestas
translation_notes:
  revision_awareness: La versión inglesa revisada eliminó un marcador de nota anterior y ajustó la última cláusula desde una formulación genérica ('taking and giving') a la más precisa 'buying and selling'. La traducción española sigue esa revisión, evitando introducir una nota inexistente y conservando el paralelismo sintáctico del griego.
  spanish_consistency_notes:
  - Se mantiene "espíritu" en minúscula para el sentido de entidad/poder, no como título divino.
  - Se usa "injusticia" para ἀδικία, en línea con el POB inglés, sin sustituirlo por "iniquidad".
  - No se introduce "Cristo" ni terminología ajena al pasaje.
  - '"Compra y venta" refleja una actividad económica concreta, no un eufemismo moralizador.'
