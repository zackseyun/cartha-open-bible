id: T12P.REU.3.7
reference: Testament of Reuben 3:7
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 66-79, Reuben pilot)
  text: '[7. Ἐπὶ⁴⁷ πᾶσι δὲ⁴⁸ τούτοις *τὸ νου, τὸ πνεῦμα⁴⁹ τοῦ ὕπνου⁵⁰ συνάπτεται⁵¹ *ὃ ἐστι⁵² *πλάνης καὶ ὄγδοον φαντασίας⁵³.]'
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/reuben/003/007.yaml
  text: And over all these, the spirit of sleep is joined, which is error and the eighth of fantasy.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:42:01Z'
    unchanged: false
    changes_summary: 'Adjusted the clause to better reflect the Greek word order and content: retained ''spirit of sleep is joined,'' rendered ὃ ἐστι as ''which is,'' and preserved both πλάνης and ὄγδοον φαντασίας as ''error'' and ''the eighth of fantasy'' rather than compressing them into ''the eighth spirit of error and fantasy.'''
translation:
  language: es
  text: Y sobre todo esto, el espíritu del sueño se une, el cual es error y el octavo de fantasía.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τὸ πνεῦμα τοῦ ὕπνου
  english_pob_choice: the spirit of sleep
  chosen_spanish: el espíritu del sueño
  alternatives_spanish:
  - el espíritu del dormir
  - el espíritu del sueño nocturno
  lexicon: πνεῦμα; ὕπνος
  rationale: Conservo la imagen sustantiva y la relación genitiva simple del griego. ‘Sueño’ es el equivalente natural en español para ὕπνος en este contexto, y ‘espíritu del sueño’ preserva la personificación sin añadir explicación interpretativa.
- source_word: συνάπτεται
  english_pob_choice: is joined
  chosen_spanish: se une
  alternatives_spanish:
  - se junta
  - está unido
  lexicon: συνάπτω
  rationale: ‘Se une’ transmite la voz media/pasiva de manera fluida en español y mantiene la idea de conexión o adherencia sin sobrecargarla.
- source_word: πλάνης
  english_pob_choice: error
  chosen_spanish: error
  alternatives_spanish:
  - engaño
  - desvío
  lexicon: πλάνη
  rationale: ‘Error’ es la opción más directa y sobria para πλάνη, y coincide con la elección auditada en inglés. ‘Engaño’ sería posible, pero desplaza más hacia la acción de engañar que hacia el estado de extravío.
- source_word: ὄγδοον φαντασίας
  english_pob_choice: the eighth of fantasy
  chosen_spanish: el octavo de fantasía
  alternatives_spanish:
  - el octavo de imaginación
  - la octava de fantasía
  lexicon: ὄγδοος; φαντασία
  rationale: Mantengo la construcción breve y extraña del original, sin normalizarla a ‘octavo espíritu’. ‘Fantasía’ conserva la noción de aparición/imagen mental asociada a φαντασία, como reflejó la revisión inglesa.
theological_decisions:
- issue: Cómo representar la personificación de ‘el espíritu del sueño’ sin ampliar a una doctrina sobre entidades espirituales específicas
  english_pob_reading: And over all these, the spirit of sleep is joined, which is error and the eighth of fantasy.
  chosen_spanish_reading: Y sobre todo esto, el espíritu del sueño se une, el cual es error y el octavo de fantasía.
  alternative_spanish_readings:
  - Y sobre todo esto, el espíritu del sueño está unido, el cual es error y el octavo de fantasía.
  - Y sobre todo esto, se añade el espíritu del sueño, que es error y el octavo de fantasía.
  rationale: El texto fuente enumera y personifica, pero no desarrolla una doctrina sistemática en esta línea. Por eso conservo el enunciado descriptivo y la ambigüedad del original sin convertirlo en una explicación teológica más precisa de lo que permite el griego.
  doctrine_reference: prudencia exegética; personificación sapiencial/apocalíptica
translation_notes:
  revision_awareness: La versión inglesa revisada corrigió una lectura previa que comprimía πλάνης y ὄγδοον φαντασίας en ‘the eighth spirit of error and fantasy’. Esta draft española sigue la revisión y separa igualmente ‘error’ de ‘el octavo de fantasía’, manteniendo la estructura del griego y evitando introducir ‘espíritu’ donde la revisión inglesa lo descartó.
  spanish_consistency_notes:
  - Se mantiene ‘espíritu’ para πνεῦμα y ‘sueño’ para ὕπνος, sin introducir ‘dormir’ como sustantivo.
  - ‘Error’ se conserva para πλάνη en coherencia con la auditoría inglesa revisada.
  - No se usa ‘Cristo’, ‘SEÑOR’ ni otros términos no presentes en el pasaje.
  - La puntuación reproduce una cadencia pública y legible en español, con coma tras el marco inicial.
