translation:
  language: es
  text: Y así todo joven[a] es destruido, oscureciendo su mente lejos de la verdad y no entendiendo la ley de Dios, ni escuchando la instrucción de sus padres, como también yo padecí en mi juventud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Joven» traduce de forma idiomática el valor contextual de νεώτερος/νεωτερισμός en este verso; el griego presenta una formulación irregular, pero la línea siguiente aclara que se trata de la juventud del hablante.
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶς νεώτερος
  english_pob_choice: every young man
  chosen_spanish: todo joven
  alternatives_spanish:
  - cada joven
  - todo muchacho joven
  lexicon: νεώτερος
  rationale: La expresión griega apunta al joven en general, no a un grupo restringido. «Todo joven» conserva la universalidad de πᾶς y la referencia etaria de νεώτερος sin añadir una precisión de género más fuerte que el contexto exige.
- source_word: πνεῦμα
  english_pob_choice: darkening
  chosen_spanish: oscureciendo
  alternatives_spanish:
  - ensombreciendo
  - nublando
  lexicon: πνεῦμα
  rationale: Aunque el texto griego presenta una secuencia difícil, la lectura inglesa ya entiende el daño como un oscurecimiento interior; en español «oscureciendo su mente» reproduce esa imagen sin borrar la relación con el entendimiento.
- source_word: τὸν νοῦν
  english_pob_choice: his mind
  chosen_spanish: su mente
  alternatives_spanish:
  - su entendimiento
  - su intelecto
  lexicon: νοῦς
  rationale: «Mente» es la equivalencia más natural y auditable en español contemporáneo para νοῦς aquí, manteniendo el sentido cognitivo del pasaje.
- source_word: ἀπὸ τῆς ἀληθείας
  english_pob_choice: from the truth
  chosen_spanish: lejos de la verdad
  alternatives_spanish:
  - de la verdad
  - apartándolo de la verdad
  lexicon: ἀλήθεια
  rationale: «Lejos de» comunica bien la separación producida por el oscurecimiento, sin forzar una causalidad que el griego y el inglés no desarrollan explícitamente.
- source_word: τῷ νόμῳ τοῦ θεοῦ
  english_pob_choice: the law of God
  chosen_spanish: la ley de Dios
  alternatives_spanish:
  - la ley de Dios Padre
  - la ley divina
  lexicon: νόμος
  rationale: Se conserva la formulación directa del inglés POB. «Ley de Dios» es natural en español y no introduce matices legales o rituales no presentes en la línea.
- source_word: νουθεσίας
  english_pob_choice: instruction
  chosen_spanish: instrucción
  alternatives_spanish:
  - amonestación
  - exhortación
  lexicon: νουθεσία
  rationale: En este contexto familiar, «instrucción» transmite mejor el sentido formativo de νουθεσία que «amonestación», que sonaría más correctivo y menos acorde con «de sus padres».
- source_word: πατέρων αὐτοῦ
  english_pob_choice: his fathers
  chosen_spanish: sus padres
  alternatives_spanish:
  - sus padres mayores
  - sus antepasados
  lexicon: πατήρ
  rationale: La POB inglesa eligió «his fathers», que en español se rinde de manera idiomática como «sus padres» para evitar una traducción literal extraña; el contexto doméstico/familiar favorece esta lectura.
- source_word: ἐν τῷ νεωτερισμῷ μου
  english_pob_choice: in my youth
  chosen_spanish: en mi juventud
  alternatives_spanish:
  - en mi juventud temprana
  - cuando era joven
  lexicon: νεωτερισμός
  rationale: Aunque el sustantivo griego es inusual, el sentido contextual confirmado por la POB inglesa es temporal/juvenil; «en mi juventud» conserva el alcance sin inflar el término.
theological_decisions:
- issue: Daño moral e intelectual del joven
  english_pob_reading: every young man is destroyed, darkening his mind from the truth
  chosen_spanish_reading: todo joven es destruido, oscureciendo su mente lejos de la verdad
  alternative_spanish_readings:
  - todo joven es arruinado, nublando su mente de la verdad
  - todo joven perece, cegando su entendimiento a la verdad
  rationale: La traducción mantiene la tensión entre ruina moral y oscurecimiento cognitivo, sin resolverla hacia una sola imagen. «Es destruido» y «oscureciendo su mente» preservan ambas dimensiones del texto.
  doctrine_reference: Anthropology; moral formation; wisdom and folly
- issue: Autoridad formativa de la instrucción paterna
  english_pob_reading: nor listening to the instruction of his fathers
  chosen_spanish_reading: ni escuchando la instrucción de sus padres
  alternative_spanish_readings:
  - ni oyendo la amonestación de sus padres
  - ni prestando atención a la instrucción de sus padres
  rationale: Se conserva la autoridad moral de la tradición paterna sin convertirla en una mera norma externa. «Instrucción» mantiene el carácter pedagógico del término y su peso sapiencial.
  doctrine_reference: Family instruction; moral exhortation; wisdom tradition
translation_notes:
  revision_awareness: Revisé el texto griego transmitido junto con la POB inglesa. La versión inglesa ya adopta una lectura interpretativa del pasaje oscuro y no añade notas; esta propuesta sigue esa lectura, pero hace explícita la ambigüedad del griego en el apartado léxico sin sobretraducirla. No se introducen revisiones textuales nuevas.
  spanish_consistency_notes:
  - Se usa «Dios» para θεός y «ley de Dios» para νόμος τοῦ θεοῦ, en coherencia con el proyecto.
  - Se mantiene «jóven/joven» como término humano general, evitando «muchacho» o «adolescente» por falta de apoyo suficiente en el texto.
  - 'Se conserva el paralelismo de las dos cláusulas negativas: ignorar la ley divina y no escuchar la instrucción paterna.'
