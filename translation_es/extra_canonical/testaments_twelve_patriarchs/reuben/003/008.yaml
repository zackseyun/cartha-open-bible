base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/reuben/003/008.yaml
  text: And so every young man is destroyed, darkening his mind from the truth and not understanding the law of God, nor listening to the instruction of his fathers, just as I also suffered in my youth.
