  text: 8. Καὶ οὕτως ἀπόλλυται πᾶς νεώτερος⁵⁴, πνεῦμα. σκοτίζων⁵⁵ τὸν νοῦν ⌜αὐτοῦ⌝⁵⁶ ἀπὸ τῆς ἀληθείας, καὶ μὴ α, αe, *συνιὼν ἐν⁵⁷ τῷ νόμῳ τοῦ θεοῦ⁵⁸, μήτε⁵⁹ ἀκούων⁶⁰ νουθεσίας⁶¹ πλάνη καὶ φαν- πατέρων αὐτοῦ⁶² ὡς⁶³ κἀγὼ ἔπαθον⁶⁴ ἐν τῷ νεωτερισμῷ τασία. μου.
