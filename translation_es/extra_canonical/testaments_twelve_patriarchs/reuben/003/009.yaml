base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/reuben/003/009.yaml
  text: And now, my children, love the truth, and it will guard you. Hear the words of Reuben, your father, as I teach you.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:42:00Z'
    unchanged: false
    changes_summary: Adjusted 'keep you safe' to 'guard you' for closer lexical alignment with φυλάξει, and added punctuation for smoother, more formal English.
translation:
  language: es
  text: Y ahora, hijos míos, amen la verdad, y ella los guardará. Escuchen las palabras de Rubén, su padre, mientras yo les enseño.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τέκνα μου
  english_pob_choice: my children
  chosen_spanish: hijos míos
  alternatives_spanish:
  - mis hijos
  - hijitos míos
  lexicon: τέκνα
  rationale: Hijos míos conserva el vínculo paterno y el tono afectuoso sin introducir un diminutivo más cargado que el griego.
- source_word: τὴν ἀλήθειαν ἀγαπᾶτε
  english_pob_choice: love the truth
  chosen_spanish: amen la verdad
  alternatives_spanish:
  - amen la verdad y la fidelidad
  - amen la verdad plenamente
  lexicon: ἀλήθεια
  rationale: Verdad es la correspondencia más directa para ἀλήθεια aquí; 'amen' mantiene el imperativo fuerte del verbo ἀγαπᾶτε en un registro natural en español.
- source_word: αὕτη *φυλάξει ὑμᾶς
  english_pob_choice: it will guard you
  chosen_spanish: ella los guardará
  alternatives_spanish:
  - ella los protegerá
  - ella los conservará
  lexicon: φυλάσσω
  rationale: Guardará refleja con mayor cercanía φυλάξει y preserva la imagen de vigilancia/protección del verbo, evitando suavizarlo a una mera seguridad general.
- source_word: Ἀκούσατε ⌜λόγους⌝
  english_pob_choice: Hear the words
  chosen_spanish: Escuchen las palabras
  alternatives_spanish:
  - Oigan las palabras
  - Atiendan a las palabras
  lexicon: λόγος
  rationale: Palabras traduce λόγους de forma directa y natural; 'escuchen' conserva el imperativo plural y el tono exhortativo.
- source_word: Ῥουβὴμ διδάσκω τοῦ πατρὸς ὑμῶν
  english_pob_choice: of Reuben, your father, as I teach you
  chosen_spanish: de Rubén, su padre, mientras yo les enseño
  alternatives_spanish:
  - de Rubén, su padre, al enseñarles
  - de Rubén, su padre, mientras les instruyo
  lexicon: διδάσκω
  rationale: Mientras yo les enseño refleja de manera transparente la cláusula participial/verbalfinal del griego y mantiene el sujeto explícito del hablante. 'Su padre' conserva el referente directo del original sin reordenamientos innecesarios.
theological_decisions:
- issue: El alcance de 'guardar' en φυλάξει
  english_pob_reading: it will guard you
  chosen_spanish_reading: ella los guardará
  alternative_spanish_readings:
  - ella los protegerá
  - ella los mantendrá a salvo
  rationale: '''Guardar'' conserva el matiz de vigilancia, custodia y preservación inherente a φυλάσσω, sin desplazarlo hacia una paraphrasis más interpretativa.'
  doctrine_reference: Sabiduría moral y perseverancia ética en la literatura testamentaria; fidelidad a la fuerza verbal del texto.
translation_notes:
  revision_awareness: 'La revisión inglesa sustituyó ''keep you safe'' por ''guard you'' para alinearse mejor con φυλάξει; la versión española sigue esa corrección con ''guardará'', evitando una paráfrasis más amplia. También conserva la estructura exhortativa del griego: llamado inicial, mandato, efecto personificado de la verdad y luego invitación a escuchar.'
  spanish_consistency_notes:
  - Se mantiene 'verdad' para ἀλήθεια y 'guardar' para φυλάσσω, evitando alternar con 'seguridad' o 'proteger' salvo necesidad contextual.
  - Se conserva 'Rubén' con acento español usual y 'hijos míos' como vocativo natural.
  - El orden de las cláusulas sigue de cerca el griego y la inglesa auditada, pero con sintaxis española fluida.
