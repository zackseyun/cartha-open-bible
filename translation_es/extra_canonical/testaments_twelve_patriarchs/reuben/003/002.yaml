translation:
  language: es
  text: Con estos espíritus se mezclan los espíritus del error.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Τούτοις τοῖς πνεύμασι
  english_pob_choice: With these spirits
  chosen_spanish: Con estos espíritus
  alternatives_spanish:
  - Con esos espíritus
  - Con tales espíritus
  lexicon: πνεῦμα
  rationale: El dativo plural con preposición expresa compañía o mezcla; en español, «con» reproduce bien la relación sin añadir elementos. «Espíritus» mantiene el valor personal/espiritual del término.
- source_word: συμμίγνυται
  english_pob_choice: are mixed
  chosen_spanish: se mezclan
  alternatives_spanish:
  - están mezclados
  - se entremezclan
  lexicon: συμμίγνυμι
  rationale: La forma verbal comunica una mezcla real y continua. «Se mezclan» es natural en español y conserva la pasividad/reciprocidad implícita del griego sin forzar una construcción demasiado literal.
- source_word: τὰ πνεύματα τῆς πλάνης
  english_pob_choice: the spirits of error
  chosen_spanish: los espíritus del error
  alternatives_spanish:
  - los espíritus del engaño
  - los espíritus de la extravío
  lexicon: πλάνη
  rationale: «Error» sigue la elección auditada del inglés POB y refleja bien el sentido de desviación/engaño doctrinal o moral. Se evita «engaño» como opción interpretativa más específica.
theological_decisions:
- issue: Naturaleza de «los espíritus del error»
  english_pob_reading: spirits of error
  chosen_spanish_reading: espíritus del error
  alternative_spanish_readings:
  - espíritus del engaño
  - espíritus de error
  rationale: Se conserva la formulación sustantiva de pertenencia o cualidad, sin convertirla en una mera abstracción. El texto presenta espíritus asociados con el desvío, y la traducción no atenúa esa tensión.
  doctrine_reference: Discernimiento espiritual; lenguaje bíblico sobre espíritus de engaño o error (cf. 1 Juan 4:6; 1 Timoteo 4:1)
translation_notes:
  revision_awareness: El texto griego presentado es breve y coincide estrechamente con la traducción inglesa auditada. No se documentan variantes textuales ni revisiones aplicadas en el paquete; por eso no se añaden notas textuales.
  spanish_consistency_notes:
  - Se mantiene «espíritus» para πνεύματα según el valor espiritual del contexto.
  - Se usa «error» en lugar de «herejía» o «engaño» para conservar la amplitud semántica del término griego y la decisión inglesa auditada.
  - La sintaxis española conserva el sentido de mezcla recíproca/compuesta del original sin añadir sujeto explícito.
