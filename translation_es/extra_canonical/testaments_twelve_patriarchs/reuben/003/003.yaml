source:
  edition: Charles 1908 Greek Versions (pages 66-79, Reuben pilot)
  text: 3. Πρῶτον¹² *τὸ τῆς πορνείας πνεῦμα¹³ ἐν τῇ φύσει¹⁴ καὶ¹⁵ *ταῖς αἰσθήσεσιν¹⁶ ἔγκειται¹⁷. *Δεύτερον πνεῦμα¹⁸ ἀπλη- στείας¹⁹ γαστρός²⁰.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/reuben/003/003.yaml
  text: First, the spirit of sexual immorality is lodged in the nature and in the senses. Second, a spirit of greediness of the belly.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:42:00Z'
    unchanged: false
    changes_summary: Changed 'insatiableness' to 'greediness' to better reflect ἀπληστίας; retained the rest as accurate and natural.
translation:
  language: es
  text: Primero, el espíritu de la inmoralidad sexual está alojado en la naturaleza[a] y en los sentidos. Segundo, un espíritu de avidez del vientre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Naturaleza traduce φύσις de manera directa; podría entenderse también como 'índole', pero se prefirió el término más transparente para el lector.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸ τῆς πορνείας πνεῦμα
  english_pob_choice: the spirit of sexual immorality
  chosen_spanish: el espíritu de la inmoralidad sexual
  alternatives_spanish:
  - el espíritu de fornicación
  - el espíritu de prostitución
  lexicon: πνεῦμα; πορνεία
  rationale: Mantiene el valor moral general de πορνεία sin estrecharlo solo a un acto o a la idea más antigua de 'fornicación'; 'inmoralidad sexual' comunica bien el campo semántico en español contemporáneo.
- source_word: ἐν τῇ φύσει
  english_pob_choice: in the nature
  chosen_spanish: en la naturaleza
  alternatives_spanish:
  - en la carne
  - en la índole
  lexicon: φύσις
  rationale: '''Naturaleza'' es la correspondencia más directa y transparente; evita reinterpretar el término como ''carne'' cuando el griego usa explícitamente φύσις.'
- source_word: ταῖς αἰσθήσεσιν
  english_pob_choice: in the senses
  chosen_spanish: en los sentidos
  alternatives_spanish:
  - en las percepciones
  - en las sensaciones
  lexicon: αἴσθησις
  rationale: '''Sentidos'' preserva la referencia perceptiva y corporal del plural griego con naturalidad en español.'
- source_word: ἀπληστίας γαστρός
  english_pob_choice: greediness of the belly
  chosen_spanish: avidez del vientre
  alternatives_spanish:
  - codicia del vientre
  - insaciabilidad del vientre
  lexicon: ἀπληστία; γαστήρ
  rationale: '''Avidez'' refleja mejor la fuerza de ἀπληστία que ''insaciabilidad'' y mantiene el tono concreto de la imagen del vientre sin suavizarla.'
theological_decisions:
- issue: Cómo rendir πορνεία sin perder la carga moral ni imponer un tecnicismo eclesiástico rígido
  english_pob_reading: sexual immorality
  chosen_spanish_reading: inmoralidad sexual
  alternative_spanish_readings:
  - fornicación
  - impureza sexual
  rationale: El texto describe una fuerza viciosa general; 'inmoralidad sexual' conserva amplitud y claridad sin reducir el alcance del término griego.
  doctrine_reference: Ética sexual bíblica; uso amplio de πορνεία en el NT
- issue: Si traducir ἔγκειται como algo más literal o más idiomático
  english_pob_reading: is lodged in
  chosen_spanish_reading: está alojado en
  alternative_spanish_readings:
  - está arraigado en
  - está presente en
  rationale: '''Está alojado en'' reproduce la idea de una presencia interna y asentada sin forzar un equivalente demasiado interpretativo.'
  doctrine_reference: Antropología moral del pasaje; presencia interna del vicio
translation_notes:
  revision_awareness: La revisión inglesa reciente cambió 'insatiableness' por 'greediness' para ἀπληστίας; por eso se eligió 'avidez' y no una forma centrada en la insaciabilidad. El resto de la línea sigue de cerca el sentido ya aprobado en la auditoría inglesa.
  spanish_consistency_notes:
  - Se mantuvo 'espíritu' en minúscula para referirse a una disposición o impulso moral, no al Espíritu Santo.
  - '''Vientre'' conserva la imagen corporal concreta de γαστήρ; no se la sustituyó por ''estómago'' ni por una abstracción.'
  - La construcción 'Primero... Segundo...' conserva la estructura enumerativa del griego y del POB inglés.
