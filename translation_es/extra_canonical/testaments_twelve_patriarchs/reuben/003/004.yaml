translation:
  language: es
  text: Terceramente, un espíritu de pelea en el hígado y en la hiel. Cuarto, un espíritu de exhibición y de hechicería, para que, por medio de una intromisión excesiva, aparezca atractivo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πνεῦμα
  english_pob_choice: a spirit
  chosen_spanish: un espíritu
  alternatives_spanish:
  - un aliento
  - un soplo
  lexicon: πνεῦμα
  rationale: Se conserva el valor personal/impulsor de πνεῦμα como en el inglés POB, sin reducirlo a viento o aliento, porque aquí introduce inclinaciones o impulsos morales.
- source_word: μάχης
  english_pob_choice: fighting
  chosen_spanish: de pelea
  alternatives_spanish:
  - de lucha
  - de combate
  lexicon: μάχη
  rationale: '''Pelea'' comunica con naturalidad en español la idea de contienda o disposición conflictiva, manteniendo el tono concreto del inglés POB y evitando una abstracción excesiva.'
- source_word: ἥπατι
  english_pob_choice: the liver
  chosen_spanish: el hígado
  alternatives_spanish:
  - las entrañas
  lexicon: ἧπαρ
  rationale: Se traduce literalmente porque el texto griego localiza simbólicamente la inclinación en el órgano físico; no se reemplaza por una interpretación más libre.
- source_word: χόλῃ
  english_pob_choice: the gall
  chosen_spanish: la hiel
  alternatives_spanish:
  - la bilis
  lexicon: χολή
  rationale: '''Hiel'' conserva el valor tradicional y la imagen corporal del original; ''bilis'' sería posible, pero ''hiel'' mantiene mejor el paralelismo con el griego y con el registro bíblico.'
- source_word: ἀρεσκείας
  english_pob_choice: self-display
  chosen_spanish: de exhibición
  alternatives_spanish:
  - de complacencia
  - de autoafirmación
  lexicon: ἀρέσκεια
  rationale: Se opta por 'exhibición' para expresar el sentido de mostrarse buscando aprobación o atención. 'Self-display' no debe suavizarse a mera 'vanidad' si el rasgo central es el mostrarse.
- source_word: μαγγανείας
  english_pob_choice: sorcery
  chosen_spanish: de hechicería
  alternatives_spanish:
  - de magia
  - de encantamiento
  lexicon: μαγγανεία
  rationale: '''Hechicería'' es el equivalente español más claro para el campo semántico de prácticas mágicas o manipuladoras, manteniendo la gravedad del término.'
- source_word: περιεργείας
  english_pob_choice: excessive meddling
  chosen_spanish: por medio de una intromisión excesiva
  alternatives_spanish:
  - por curiosidad excesiva
  - por indiscreción
  lexicon: περιεργία
  rationale: '''Intromisión excesiva'' preserva la idea de curiosidad o intervención impropia sin reducirla a simple curiosidad intelectual. Es una formulación natural en español para el efecto moral del original.'
- source_word: ὡραῖος ὀφθῇ
  english_pob_choice: may appear attractive
  chosen_spanish: aparezca atractivo
  alternatives_spanish:
  - sea visto como atractivo
  - parezca hermoso
  lexicon: ὡραῖος
  rationale: '''Aparezca atractivo'' conserva el matiz de ser percibido como agradable o deseable, sin forzar una connotación exclusivamente estética o romántica.'
theological_decisions:
- issue: Localización corporal de las pasiones en el hígado y la hiel
  english_pob_reading: in the liver and in the gall
  chosen_spanish_reading: en el hígado y en la hiel
  alternative_spanish_readings:
  - en las entrañas y en la bilis
  rationale: Se mantiene la imaginería corporal concreta del original griego, que asocia el impulso conflictivo con órganos internos. No se espiritualiza ni se sustituye por una lectura psicológica moderna.
  doctrine_reference: Antropología moral en literatura testamentaria judaica; preservación de imaginería somática
- issue: Relación entre exhibición, hechicería e intromisión excesiva
  english_pob_reading: a spirit of self-display and sorcery, so that through excessive meddling one may appear attractive
  chosen_spanish_reading: un espíritu de exhibición y de hechicería, para que, por medio de una intromisión excesiva, aparezca atractivo
  alternative_spanish_readings:
  - un espíritu de vanidad y de magia, de modo que por curiosidad excesiva uno parezca atractivo
  rationale: 'Se conserva la cadena causal del texto: el impulso de mostrarse y la práctica de hechicería desembocan en una conducta intrusiva orientada a parecer atractivo. No se elimina la tensión moral entre apariencia y manipulación.'
  doctrine_reference: Ética de la apariencia y del engaño en la literatura de los Testamentos de los Doce Patriarcas
translation_notes:
  revision_awareness: No applied revisions are present in the audit context; the latest revision pass marked the English reading unchanged with moderate-agreement cross-check and minor issues only. The Spanish draft therefore follows the Greek source closely while preserving the English POB’s interpretive decisions where they are textually motivated.
  spanish_consistency_notes:
  - Se mantiene el paralelismo numérico con 'Terceramente' / 'Cuarto' para reflejar la enumeración del pasaje.
  - Se usa un registro sobrio y bíblico, pero sin arcaísmos innecesarios.
  - '''Hiel'' se conserva consistentemente como equivalente de χόλη en este verso para mantener la imaginería corporal.'
  - No se añadió nota al pie porque el texto base no preserva una alternativa obligatoria ni presenta una variante textual explícita en el audit trail.
