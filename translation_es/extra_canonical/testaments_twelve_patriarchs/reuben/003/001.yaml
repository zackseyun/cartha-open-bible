base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/reuben/003/001.yaml
  text: And besides all these, there is an eighth spirit, the spirit of sleep, with which trance and the image of death were created.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:42:00Z'
    unchanged: false
    changes_summary: Removed the extraneous footnote marker, and adjusted the final clause for smoother English while preserving the source meaning and all content.
translation:
  language: es
  text: Y además de todos estos, hay un octavo espíritu, el espíritu del sueño, con el cual fueron creados el trance y la imagen de la muerte.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὄγδοον πνεῦμα
  english_pob_choice: an eighth spirit, the spirit of sleep
  chosen_spanish: un octavo espíritu, el espíritu del sueño
  alternatives_spanish:
  - un espíritu octavo, el espíritu del sueño
  - un octavo espíritu, espíritu del sueño
  lexicon: ὄγδοος; πνεῦμα
  rationale: Mantiene la numeración y la apposición del griego y del inglés POB. 'Espíritu' conserva el valor técnico del tratado, sin suavizarlo a una mera personificación.
- source_word: ἐπὶ πᾶσιν δὲ τούτοις
  english_pob_choice: And besides all these
  chosen_spanish: Y además de todos estos
  alternatives_spanish:
  - Y sobre todo esto
  - Y además de todo esto
  lexicon: ἐπί + dativo; πᾶς
  rationale: '''Además de todos estos'' expresa con naturalidad la adición enumerativa del griego, conservando el alcance inclusivo de ''πάντων τούτων'' sin introducir interpretación extra.'
- source_word: μεθ’ οὗ ἐκτίσθη ἔκστασις φύσεως καὶ εἰκὼν τοῦ θανάτου
  english_pob_choice: with which trance and the image of death were created
  chosen_spanish: con el cual fueron creados el trance y la imagen de la muerte
  alternatives_spanish:
  - con el cual fue creado el trance y la imagen de la muerte
  - con el cual fueron creados el éxtasis y la imagen de la muerte
  lexicon: ἐκτίσθη; ἔκστασις; εἰκών; θάνατος
  rationale: '''Fueron creados'' sigue el plural del español para coordinar dos objetos: ''trance'' y ''la imagen de la muerte''. ''Trance'' conserva la ambigüedad útil de ἔκστασις, que puede abarcar éxtasis/estupor; no se resuelve artificialmente hacia una sola opción.'
- source_word: ἔκστασις φύσεως
  english_pob_choice: trance
  chosen_spanish: trance
  alternatives_spanish:
  - éxtasis
  - estupor
  - trance de la naturaleza
  lexicon: ἔκστασις; φύσις
  rationale: El inglés POB simplifica a 'trance' y el griego admite un estado de arrobamiento o estupor. En español, 'trance' es comprensible y permite conservar la tensión semántica sin explicitar 'naturaleza' dentro del cuerpo del texto. Se evita agregar 'de la naturaleza' porque el pasaje transmitido por el audit trail ya fue estabilizado por la revisión inglesa hacia una lectura más fluida.
- source_word: εἰκὼν τοῦ θανάτου
  english_pob_choice: the image of death
  chosen_spanish: la imagen de la muerte
  alternatives_spanish:
  - la imagen de la muerte
  - el semblante de la muerte
  lexicon: εἰκών; θάνατος
  rationale: '''Imagen'' reproduce directamente εἰκών y coincide con el POB inglés. ''De la muerte'' mantiene el genitivo simple sin forzar una paráfrasis teológica.'
theological_decisions:
- issue: Si ἔκστασις φύσεως debe explicarse como 'trance de la naturaleza' o dejarse genérico
  english_pob_reading: trance
  chosen_spanish_reading: trance
  alternative_spanish_readings:
  - trance de la naturaleza
  - éxtasis de la naturaleza
  rationale: El texto griego puede entenderse como 'éxtasis/estupor' asociado a la naturaleza, pero la tradición auditada del POB inglés resolvió no explicitar 'of nature' en la línea principal. En español se preserva esa decisión para no imponer una glosa interpretativa que el texto estabilizado ya evitó.
  doctrine_reference: No doctrinal claim beyond the anthropology of sleep and death imagery
translation_notes:
  revision_awareness: La versión inglesa revisada eliminó un marcador de nota extraviado y suavizó el final a 'trance and the image of death were created' sin alterar el contenido. La presente redacción española sigue esa lectura revisada y no reintroduce la glosa 'de la naturaleza' en el texto principal.
  spanish_consistency_notes:
  - Se mantiene 'espíritu' para πνεῦμα en continuidad con el registro técnico del pasaje.
  - '''Sueño'' se conserva como sustantivo simple para el genitivo ὕπνου.'
  - No se usa 'Cristo', 'Señor' ni otra terminología ajena al pasaje.
  - La sintaxis española coordina correctamente el plural del predicado ('fueron creados') con los dos complementos objeto.
