source:
  edition: Charles 1908 Greek Versions (pages 66-79, Reuben pilot)
  text: '*Ἐπὶ πᾶσιν δὲ¹ τούτοις ὄγδοον² πνεῦμα³ τοῦ ὕπνου ἐστί⁴, μεθ’ οὗ⁵ ἐκτίσθη⁶ ἔκστασις⁷ φύσεως καὶ εἰκὼν τοῦ θανάτου.'
