reference: Testament of Reuben 3:5
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 66-79, Reuben pilot)
  text: 5. Πέμ- πτον πνεῦμα ὑπερηφανείας³⁰ ἵνα καυχᾶται³¹ καὶ μεγαλοφρονῇ³². *Ἕκτον πνεῦμα³³ ψεύδους³⁴ †ἐν ἀπωλείᾳ καὶ ζήλῳ†³⁵ τοῦ *πλάττειν λόγους καὶ κρύπτειν λόγους³⁶ Γαὐτοῦ†³⁷ *ἀπὸ γένους³⁸ καὶ οἰκείων³⁹.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/reuben/003/005.yaml
  text: Fifth, a spirit of pride, so that one boasts and thinks grand thoughts. Sixth, a spirit of falsehood, in destruction and jealousy, to forge words and hide words from his own family and household.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:42:01Z'
    unchanged: false
    changes_summary: Removed the extra paraphrase 'for shaping words'; rendered 'πλάττειν λόγους' more directly as 'to forge words'; changed 'one's own kin' to 'his own family' to better reflect the paired terms 'γένους' and 'οἰκείων'; preserved the clause structure more closely.
translation:
  language: es
  text: Quinto, un espíritu de orgullo, para que se jacte y tenga pensamientos elevados. Sexto, un espíritu de falsedad, en destrucción y celos, para forjar palabras y ocultar palabras a su propia familia y casa.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πνεῦμα ὑπερηφανείας
  english_pob_choice: a spirit of pride
  chosen_spanish: un espíritu de orgullo
  alternatives_spanish:
  - un espíritu de soberbia
  - un espíritu de altivez
  lexicon: πνεῦμα; ὑπερηφανείας
  rationale: Mantiene la imagen de una fuerza o disposición espiritual asociada con la soberbia, sin suavizarla a un mero rasgo psicológico. 'Orgullo' es claro en español y corresponde bien al matiz del inglés POB.
- source_word: καυχᾶται
  english_pob_choice: boasts
  chosen_spanish: se jacte
  alternatives_spanish:
  - se gloríe
  - se vanaglorie
  lexicon: καυχάομαι
  rationale: '''Jactarse'' conserva el sentido de autoexaltación pública o verbal, cercano al inglés ''boasts'' y al tono del pasaje.'
- source_word: μεγαλοφρονῇ
  english_pob_choice: thinks grand thoughts
  chosen_spanish: tenga pensamientos elevados
  alternatives_spanish:
  - piense cosas altas
  - tenga pensamientos grandes
  lexicon: μεγαλοφρονέω
  rationale: En español, 'pensamientos elevados' comunica la idea de aspiraciones o ambiciones grandiosas sin sonar antinatural. Evita reducirlo a un sentido puramente moral que no exige el griego.
- source_word: πνεῦμα ψεύδους
  english_pob_choice: a spirit of falsehood
  chosen_spanish: un espíritu de falsedad
  alternatives_spanish:
  - un espíritu de mentira
  - un espíritu engañoso
  lexicon: πνεῦμα; ψεῦδος
  rationale: '''Falsedad'' mantiene la abstracción del sustantivo griego y el paralelo con ''espíritu de orgullo''. ''Mentira'' sería posible, pero ''falsedad'' refleja mejor el sustantivo genérico.'
- source_word: ἐν ἀπωλείᾳ καὶ ζήλῳ
  english_pob_choice: in destruction and jealousy
  chosen_spanish: en destrucción y celos
  alternatives_spanish:
  - en perdición y envidia
  - para destrucción y celos
  lexicon: ἀπώλεια; ζῆλος
  rationale: Se conserva la preposición local/ambiental 'en' como en el inglés POB. 'Celos' sigue la elección inglesa, aunque 'envidia' también sería plausible según contexto; aquí se preserva la equivalencia auditada.
- source_word: πλάττειν λόγους
  english_pob_choice: to forge words
  chosen_spanish: forjar palabras
  alternatives_spanish:
  - fabricar palabras
  - forjar discursos
  lexicon: πλάττω; λόγος
  rationale: '''Forjar palabras'' reproduce la imagen de elaborar falsamente lo dicho, como en el inglés revisado POB. Evita una paráfrasis excesiva.'
- source_word: κρύπτειν λόγους
  english_pob_choice: to hide words
  chosen_spanish: ocultar palabras
  alternatives_spanish:
  - esconder palabras
  - guardar palabras en secreto
  lexicon: κρύπτω; λόγος
  rationale: La frase mantiene la repetición retórica del griego y del inglés POB revisado. 'Ocultar' es claro y suficientemente directo.
- source_word: ἀπὸ γένους καὶ οἰκείων
  english_pob_choice: from his own family and household
  chosen_spanish: a su propia familia y casa
  alternatives_spanish:
  - de su propia familia y casa
  - de su propio linaje y casa
  lexicon: γένος; οἰκεῖος
  rationale: '''Familia y casa'' refleja la pareja de términos sin introducir ''linaje'' como opción principal. ''A'' expresa adecuadamente el destinatario de la ocultación en español.'
theological_decisions:
- issue: Naturaleza de los 'espíritus' enumerados
  english_pob_reading: a spirit of pride / a spirit of falsehood
  chosen_spanish_reading: un espíritu de orgullo / un espíritu de falsedad
  alternative_spanish_readings:
  - un impulso de orgullo / un impulso de falsedad
  - una disposición orgullosa / una disposición falsa
  rationale: Se conserva la formulación personal o cuasi-personal de 'espíritu', porque el texto enumera influencias morales caracterizadas como espíritus, no solo actitudes internas. Esto respeta el género y la lógica del pasaje.
  doctrine_reference: Antropología moral del Testamento de Rubén; lenguaje de influencias espirituales en literatura testamental
- issue: Sentido de ζῆλος
  english_pob_reading: jealousy
  chosen_spanish_reading: celos
  alternative_spanish_readings:
  - envidia
  - celo
  rationale: Aunque 'envidia' podría encajar en algunos contextos, el inglés POB fijó 'jealousy' y el paralelismo con destrucción sugiere una pasión relacional negativa. 'Celos' preserva esa amplitud sin forzar una reinterpretación.
  doctrine_reference: Vicios pasionales en la tradición ética judía del Segundo Templo
- issue: Alcance de 'familia y casa'
  english_pob_reading: his own family and household
  chosen_spanish_reading: su propia familia y casa
  alternative_spanish_readings:
  - su propio linaje y casa
  - sus propios parientes y casa
  rationale: La pareja griega sugiere un círculo íntimo doméstico y de parentesco. 'Familia y casa' comunica ambos campos sin sobreespecificar ni tecnificar el parentesco.
  doctrine_reference: Unidad doméstica y lealtad familiar en literatura sapiencial y testamental
translation_notes:
  revision_awareness: 'La versión española sigue la revisión más reciente del inglés POB: conserva la cláusula final más directa (''forjar palabras'' / ''ocultar palabras'') y evita la paráfrasis adicional anterior sobre ''shaping words''. También mantiene la estructura enumerativa y la localización ''en destrucción y celos''.'
  spanish_consistency_notes:
  - Se usó 'espíritu' de manera consistente para πνεῦμα en ambos miembros.
  - Se evitó 'Cristo' o terminología litúrgica ajena; el pasaje no la requiere.
  - Se mantuvo la repetición 'palabras' para reflejar λόγους en ambos verbos, como hace el inglés revisado.
  - '''Casa'' se añadió junto a ''familia'' para reflejar la pareja γένους / οἰκείων sin cargarla de un tecnicismo de parentesco.'
