base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/dan/006.yaml
  text: And now[v9], my children, fear the Lord, and watch yourselves against Satan and his spirits. Draw near to God and to the angel who intercedes for you, for he is a mediator between God and men, and for the peace of Israel he will stand against the kingdom of the enemy. Because of this the enemy is eager to trip up all who call on the Lord. For he knows that on the day when Israel turns back, the kingdom of the enemy will be brought to an end[v6]. For the very angel of peace will strengthen Israel, so that he may not fall into the uttermost evil. But in the time of the lawlessness of Israel, the Lord will not depart from them, but will pass over to a nation that seeks his will, for none of the angels will be equal to him. And his name will be in every place in Israel and among the nations. Keep yourselves, then, my children, from every evil work, and cast away from yourselves anger and falsehood, and love truth and patience. And what you have heard from your father, pass on also to
    your children. [So that the Savior of the nations may receive you; for he is true and patient, gentle and humble, and by his works he teaches the law of the Lord.] Therefore depart from all unrighteousness and cling to the righteousness of God[v2], and your offspring will be for salvation forever.
  footnotes:
  - marker: v9
    text: The bracketed sentence is often regarded as a later expansion or interpolation; it is translated here because it stands in the Greek witness provided.
    reason: textual_variant
  - marker: v6
    text: 'The Greek line is difficult: the text as given says the Lord ''will not depart from them'' and yet ''will pass over to a nation seeking his will.'' The translation preserves this tension rather than smoothing it away.'
    reason: alternative_reading
  - marker: v2
    text: '''Mediator between God and men'' is translated directly from the Greek. The passage still speaks of an ''angel,'' so the wording is left unresolved rather than identified with a later doctrinal figure.'
    reason: lexical_alternative
