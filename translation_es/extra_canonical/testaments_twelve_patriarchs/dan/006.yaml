translation:
  language: es
  text: Y ahora[a], hijos míos, teman al Señor, y cuídense de Satanás y de sus espíritus. Acérquense a Dios y al ángel que intercede por ustedes, porque él es mediador entre Dios y los hombres, y por la paz de Israel se levantará contra el reino del enemigo. Por esto el enemigo se afana en hacer caer a todos los que invocan al Señor. Pues sabe que en el día en que Israel se vuelva, el reino del enemigo será llevado a su fin[b]. Porque el mismísimo ángel de paz fortalecerá a Israel, para que no caiga en el extremo del mal. Pero en el tiempo de la iniquidad de Israel, el Señor no se apartará de ellos, sino que pasará a una nación que busca su voluntad, porque ninguno de los ángeles será igual a él. Y su nombre estará en todo lugar de Israel y entre las naciones. Guárdense, pues, hijos míos, de toda obra mala, y aparten de ustedes la ira y la mentira, y amen la verdad y la paciencia. Y lo que han oído de su padre, transmítanlo también ustedes a sus hijos. [Para que el Salvador de las naciones
    los reciba; pues él es verdadero y paciente, manso y humilde, y por sus obras enseña la ley del Señor.] Por tanto, apártense de toda injusticia y aférrense a la justicia de Dios[c], y su descendencia será para salvación para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La oración entre corchetes a menudo se considera una expansión o interpolación posterior; se traduce aquí porque está en el testimonio griego provisto.
    reason: textual_variant
  - marker: b
    text: 'La línea griega es difícil: el texto tal como se da dice que el Señor ''no se apartará de ellos'' y a la vez ''pasará a una nación que busca su voluntad.'' La traducción preserva esta tensión en lugar de suavizarla.'
    reason: alternative_reading
  - marker: c
    text: '''Mediador entre Dios y los hombres'' se traduce directamente del griego. El pasaje todavía habla de un ''ángel,'' por lo que la formulación se deja sin resolver en lugar de identificarla con una figura doctrinal posterior.'
    reason: lexical_alternative
lexical_decisions:
- source_word: φοβήθητε τὸν Κύριον
  english_pob_choice: fear the Lord
  chosen_spanish: teman al Señor
  alternatives_spanish:
  - reverencien al Señor
  lexicon: BDAG
  rationale: '''Temer'' conserva la fuerza moral-covenantal del imperativo griego en discurso testamentario; ''reverenciar'' sería más débil que la advertencia del griego.'
- source_word: προσέχετε ἑαυτοῖς
  english_pob_choice: watch yourselves
  chosen_spanish: cuídense
  alternatives_spanish:
  - estén alertas
  - guárdense
  lexicon: BDAG
  rationale: Español moderno legible que preserva la vigilancia reflexiva sin aplanar el imperativo.
- source_word: τῶν πνευμάτων αὐτοῦ
  english_pob_choice: his spirits
  chosen_spanish: sus espíritus
  alternatives_spanish:
  - los espíritus que lo acompañan
  lexicon: BDAG
  rationale: Tras la revisión POB que quitó 'attendant', se preserva el rendido literal.
- source_word: Ἐγγίσατε
  english_pob_choice: Draw near
  chosen_spanish: Acérquense
  alternatives_spanish:
  - Aproxímense
  lexicon: BDAG
  rationale: Modismo bíblico estándar para acercarse a Dios en español neutro.
- source_word: μεσίτης θεοῦ καὶ ἀνθρώπων
  english_pob_choice: a mediator between God and men
  chosen_spanish: mediador entre Dios y los hombres
  alternatives_spanish:
  - intermediario entre Dios y los hombres
  lexicon: BDAG
  rationale: '''Mediador'' es el término teológico natural y encaja con la cláusula explicativa.'
- source_word: ὑποσκελίζειν
  english_pob_choice: to trip up
  chosen_spanish: hacer caer
  alternatives_spanish:
  - derribar
  - tropezar
  lexicon: BDAG
  rationale: Preserva la metáfora vívida de causar una caída, ajustada al castellano natural.
- source_word: ἐπιστρέψει
  english_pob_choice: turns back
  chosen_spanish: se vuelva
  alternatives_spanish:
  - regrese
  - se convierta
  lexicon: BDAG
  rationale: En contexto moral-religioso implica retorno/arrepentimiento; 'se vuelva' lo conserva sin importar terminología técnica posterior.
- source_word: συντελεσθήσεται
  english_pob_choice: will be brought to an end
  chosen_spanish: será llevado a su fin
  alternatives_spanish:
  - se acabará
  - será consumado
  lexicon: BDAG
  rationale: En contexto del reino del enemigo, el sentido es terminación más que cumplimiento.
- source_word: ἀνομίας
  english_pob_choice: lawlessness
  chosen_spanish: iniquidad
  alternatives_spanish:
  - transgresión
  - anomia
  lexicon: BDAG
  rationale: '''Iniquidad'' es el término moral-apocalíptico estándar en español bíblico para ἀνομία.'
- source_word: ζητοῦντι τὸ θέλημα αὐτοῦ
  english_pob_choice: that seeks his will
  chosen_spanish: que busca su voluntad
  alternatives_spanish:
  - que persigue su voluntad
  lexicon: BDAG
  rationale: Sigue la corrección del revision_pass que prefirió 'seeks' sobre 'does'.
- source_word: τὸν θυμὸν καὶ τὸ ψεῦδος
  english_pob_choice: anger and falsehood
  chosen_spanish: la ira y la mentira
  alternatives_spanish:
  - el enojo y el engaño
  lexicon: BDAG
  rationale: Vocabulario de vicios estable; 'mentira' empareja bien con 'verdad' en la cláusula siguiente.
- source_word: μακροθυμίαν
  english_pob_choice: patience
  chosen_spanish: paciencia
  alternatives_spanish:
  - longanimidad
  - perseverancia
  lexicon: BDAG
  rationale: '''Paciencia'' es accesible en español moderno y mantiene el equilibrio del catálogo de virtudes.'
- source_word: ὁ Σωτὴρ τῶν ἐθνῶν
  english_pob_choice: the Savior of the nations
  chosen_spanish: el Salvador de las naciones
  alternatives_spanish:
  - el Salvador de los gentiles
  lexicon: BDAG
  rationale: ἔθνη puede traducirse 'naciones' o 'gentiles'; 'naciones' preserva el alcance amplio.
- source_word: πρᾷος καὶ ταπεινός
  english_pob_choice: gentle and humble
  chosen_spanish: manso y humilde
  alternatives_spanish:
  - apacible y humilde
  lexicon: BDAG
  rationale: '''Manso y humilde'' tiene resonancia bíblica en español sin arcaísmo.'
- source_word: ἀδικίας
  english_pob_choice: unrighteousness
  chosen_spanish: injusticia
  alternatives_spanish:
  - maldad
  lexicon: BDAG
  rationale: Conserva el contraste con δικαιοσύνη/justicia en la cláusula siguiente.
- source_word: κολλήθητε τῇ δικαιοσύνῃ τοῦ Θεοῦ
  english_pob_choice: cling to the righteousness of God
  chosen_spanish: aférrense a la justicia de Dios
  alternatives_spanish:
  - únanse a la justicia de Dios
  lexicon: BDAG
  rationale: '''Aferrarse'' preserva la metáfora adhesiva y la fuerza exhortativa.'
- source_word: ἕως τοῦ αἰῶνος
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - hasta el siglo
  lexicon: BDAG
  rationale: Modismo natural en español para duración perdurable.
theological_decisions:
- issue: Identidad del 'ángel que intercede' / 'mediador entre Dios y los hombres'
  chosen_reading: Traducido como intercesor angélico dentro del idioma del propio capítulo, sin identificarlo más allá del griego.
  alternative_readings:
  - Un ángel patrón celestial de Israel
  - Una figura mesiánica
  - Una referencia cristianizada posterior que evoca 1 Timoteo 2:5
  rationale: El griego dice explícitamente 'ángel' y luego 'mediador entre Dios y los hombres.' Para mantener la transparencia, la traducción preserva ambas afirmaciones sin armonizarlas en categorías doctrinales posteriores.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
- issue: Cláusula entre corchetes en el v.9 sobre 'el Salvador de las naciones'
  chosen_reading: Incluida entre corchetes en el cuerpo principal como material posiblemente secundario o interpolado.
  alternative_readings:
  - Omitir como no original
  - Imprimir sin corchetes como plenamente integral
  rationale: La cláusula tiene un perfil teológico marcadamente expandido y aparece marcada en la presentación del texto fuente. Los corchetes preservan la transparencia.
  doctrine_reference: Ser transparente ante la posible interpolación cristiana o expansión textual.
translation_notes:
  revision_awareness: El POB tuvo un revision_pass que cambió 'attendant spirits' a 'spirits' y 'does his will' a 'seeks his will'. El draft español refleja la versión revisada.
  spanish_consistency_notes:
  - Κύριος como 'Señor' (no Dios) cuando funciona como título.
  - ἄγγελος como 'ángel' sin desmitologizar.
  - δικαιοσύνη como 'justicia' por consistencia con el glosario.
  - ἀνομία como 'iniquidad'.
