  text: VI. Καὶ νῦν *φοβήθητε τὸν Κύριον¹, τέκνα μου, καὶ προσέχετε ἑαυτοῖς² ἀπὸ τοῦ Σατανᾶ καὶ *τῶν πνευμάτων³ αὐτοῦ. 2. Ἐγγίσατε⁴ τῷ θεῷ καὶ τῷ ἀγγέλῳ *τῷ παραιτουμένῳ ὑμᾶς⁵· ὅτι οὗτός ἐστι μεσίτης θεοῦ καὶ ἀνθρώπων καὶ⁶ ἐπὶ τῆς εἰρήνης τοῦ⁷ Ἰσραὴλ κατέναντι⁸ *τῆς βασιλείας τοῦ †θεοῦ στήσεται⁹. 3. Διὰ¹⁰ τοῦτο σπουδάζει ὁ ἐχθρὸς ὑποσκελίζειν¹¹ πάντας τοὺς ἐπικαλουμένους *τὸν Κύριον¹². 4. Οἶδε γὰρ ὅτι *ἐν ᾗ ἡμέρᾳ¹³ ἐπιστρέψει¹⁴ Ἰσραήλ, συντελεσθήσεται ἡ βασιλεία τοῦ ἐχθροῦ. 5. Αὐτὸς γὰρ¹⁵ ὁ ἄγγελος *τῆς εἰρήνης¹⁶ *ἐνισχύσει τὸν Ἰσραὴλ¹⁷ μὴ ἐμπεσεῖν¹⁸ αὐτὸν εἰς τέλος¹⁹ κακῶν²⁰. 6. Ἔσται δὲ ἐν καιρῷ τῆς²¹ ἀνομίας²² *τοῦ Ἰσραὴλ²³ (οὐκ ἔσται)²⁴ ἀφιστάμενος²⁵ *ἀπ᾽ αὐτῶν²⁶ *ὁ Κύριος²⁷, καὶ²⁸ *μετελεύσεται ἐπ᾽ ἔθνει ζητοῦντι τὸ θέλημα αὐτοῦ²⁹, ὅτι *οὐδεὶς τῶν ἀγγέλων ἔσται ἴσος αὐτῷ³⁰. 7. Τὸ δὲ ὄνομα αὐτοῦ³¹ ἐν *παντὶ τόπῳ Ἰσραὴλ³² ⌜καὶ ἐν τοῖς³³ ἔθνεσιν⌝³⁴. 8. Διατηρήσατε οὖν³³ ἑαυτούς³⁵, τέκνα μου, ἀπὸ παντὸς *ἔργου πονηροῦ³⁶, καὶ ἀπορρίψατε *ἀφ᾽ ὑμῶν τὸν θυμὸν καὶ τὸ ψεῦδος³⁷, ⌜καὶ ἀγαπήσατε
    τὴν ἀλήθειαν καὶ τὴν μακροθυμίαν⌝. 9. Καὶ ἃ ἠκούσατε³⁸ παρὰ τοῦ πατρὸς ὑμῶν, μεταδοτε³⁹ ⌈καὶ⁴⁰ ὑμεῖς⁴¹⌉ τοῖς τέκνοις ὑμῶν⁴², [ἵνα δέξηται⁴³ ὑμᾶς ὁ Σωτὴρ⁴⁴ τῶν ἐθνῶν· *ἐστὶ γὰρ ἀληθὴς καὶ μακρόθυμος, πρᾷος καὶ ταπεινός⁴⁵, καὶ⁴⁶ ἐκδιδάσκων⁴⁷ διὰ τῶν ἔργων *τὸν νόμον Κυρίου⁴⁸]. 10. Ἀπόστητε οὖν ἀπὸ πάσης ἀδικίας καὶ κολλήθητε⁴⁹ τῇ δικαιοσύνῃ τοῦ⁵⁰ Θεοῦ⁵¹, καὶ ἔσται τὸ γένος ὑμῶν⁵² εἰς σωτηρίαν *ἕως τοῦ αἰῶνος⁵³. 11. *Καὶ θάψατέ με⁵⁴ ἐγγὺς τῶν πατέρων μου.
