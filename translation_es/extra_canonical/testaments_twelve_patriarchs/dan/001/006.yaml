base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/dan/001/006.yaml
  text: For the spirit of jealousy and arrogance kept saying to me, ‘You yourself also are his son.’
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:26Z'
    unchanged: false
    changes_summary: Removed the repeated 'of' before 'arrogance' for more natural English while preserving the Greek sense; otherwise retained the draft.
translation:
  language: es
  text: 'Pues el espíritu de los celos y de la arrogancia me decía: ''Tú también eres su hijo.'''
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πνεῦμα τοῦ ζήλου
  english_pob_choice: spirit of jealousy
  chosen_spanish: el espíritu de los celos
  alternatives_spanish:
  - el espíritu de la envidia
  - el espíritu del celo
  lexicon: BDAG
  rationale: En contexto Dan resiente a José por el favoritismo paterno. 'Celos' (en plural en castellano) capta mejor el matiz relacional y posesivo aquí que 'envidia'.
- source_word: ἀλαζονεία
  english_pob_choice: arrogance
  chosen_spanish: la arrogancia
  alternatives_spanish:
  - la jactancia
  - la soberbia
  lexicon: BDAG
  rationale: El término denota presunción auto-exaltada. 'Arrogancia' captura el vicio claramente en español contemporáneo.
- source_word: ἔλεγέ μοι
  english_pob_choice: kept saying to me
  chosen_spanish: me decía
  alternatives_spanish:
  - me hablaba
  - me iba diciendo
  lexicon: BDAG
  rationale: Imperfecto durativo; 'decía' preserva la presión interior continuada del espíritu sin necesidad de añadir 'continuamente' que cargaría la frase.
- source_word: Καίγε σὺ αὐτὸς υἱὸς αὐτοῦ εἶ
  english_pob_choice: You yourself also are his son
  chosen_spanish: Tú también eres su hijo
  alternatives_spanish:
  - También tú mismo eres su hijo
  - Tú mismo eres también su hijo
  lexicon: BDAG
  rationale: καίγε intensifica la afirmación; 'tú también' captura la fuerza del reclamo del espíritu sin sonar redundante en castellano.
translation_notes:
  revision_awareness: El POB inglés removió en revisión un 'of' repetido antes de 'arrogance'; en castellano se mantiene 'de los celos y de la arrogancia' siguiendo la sintaxis natural española donde el artículo se repite.
  spanish_consistency_notes:
  - ζῆλος → celos (plural castellano para matiz posesivo)
  - ἀλαζονεία → arrogancia (vicio principal del catálogo)
  - πνεῦμα → espíritu (categoría demonológica preservada)
