  text: Τὸ γὰρ³⁹ πνεῦμα τοῦ ζήλου⁴⁰ καὶ τῆς ἀλαζονείας⁴¹ ἔλεγέ μοι· Καίγε σὺ *αὐτὸς υἱὸς αὐτοῦ εἶ⁴².
