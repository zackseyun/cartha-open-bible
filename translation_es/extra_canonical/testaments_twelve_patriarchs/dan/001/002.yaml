  text: '*Καλέσας γὰρ¹¹ *τὴν πατρίαν αὐτοῦ¹² εἶπεν¹³· ᾿Ακούσατε υἱοὶ *Δὰν λόγων μου¹⁴, καὶ¹⁵ προσέχετε¹⁶ ῥήμασι ⸀τοῦ πατρὸς ὑμῶν⸁¹⁷.'
