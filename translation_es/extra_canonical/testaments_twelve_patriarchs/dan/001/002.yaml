base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/dan/001/002.yaml
  text: Hear my words, sons of Dan, and pay attention to the words of your father.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:26Z'
    unchanged: false
    changes_summary: Changed “sayings” to “words” for closer lexical consistency with λόγων / ῥήμασι while keeping natural formal English.
translation:
  language: es
  text: Oíd, hijos de Dan, mis palabras, y prestad atención a las palabras de vuestro padre.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἀκούσατε
  english_pob_choice: Hear
  chosen_spanish: Oíd
  alternatives_spanish:
  - Escuchad
  - Atended
  lexicon: BDAG
  rationale: Imperativo aoristo plural; 'oíd' tiene la solemnidad apropiada para el discurso testamentario y mantiene el registro digno.
- source_word: λόγων μου
  english_pob_choice: my words
  chosen_spanish: mis palabras
  alternatives_spanish:
  - mis dichos
  - mis discursos
  lexicon: BDAG
  rationale: λόγος en este contexto exhortativo se rinde naturalmente como 'palabras'; mantiene paralelismo con ῥήμασι.
- source_word: προσέχετε
  english_pob_choice: pay attention
  chosen_spanish: prestad atención
  alternatives_spanish:
  - atended
  - tened cuidado
  lexicon: BDAG
  rationale: Exhortación imperativa en testamento padre-a-hijos; 'prestad atención' es fuerte y legible sin sonar arcaico.
- source_word: ῥήμασι
  english_pob_choice: words
  chosen_spanish: palabras
  alternatives_spanish:
  - dichos
  - expresiones
  lexicon: BDAG
  rationale: Sigue la revisión del POB que ajustó 'sayings' a 'words' para consistencia léxica con λόγων/ῥήμασι; en español 'palabras' funciona para ambos términos.
translation_notes:
  revision_awareness: El POB inglés cambió en revisión 'sayings' a 'words' para mayor consistencia léxica con λόγων/ῥήμασι. La traducción española usa 'palabras' para ambos términos griegos siguiendo la rendición revisada.
  spanish_consistency_notes:
  - λόγος/ῥῆμα → palabra (consistencia con revisión POB)
  - προσέχω → prestar atención (registro firme imperativo)
