  text: 'En el año ciento veinticinco de su vida, Dan reunió a su familia y dijo:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐν τῷ ἑκατοστῷ εἰκοστῷ πέμπτῳ ἔτει τῆς ζωῆς αὐτοῦ
  english_pob_choice: In the fifth year of his life
  chosen_spanish: En el año ciento veinticinco de su vida
  alternatives_spanish:
  - En el año 125 de su vida
  - A los ciento veinticinco años de su vida
  lexicon: LSJ
  rationale: El griego literalmente dice 'en el año centésimo vigésimo quinto de su vida'. Aunque el POB inglés tradujo brevemente 'fifth year' (interpretando como abreviatura), el español refleja el griego completo para mayor fidelidad al texto fuente.
- source_word: Καλέσας τὴν πατρίαν αὐτοῦ
  english_pob_choice: called together his family
  chosen_spanish: reunió a su familia
  alternatives_spanish:
  - convocó a su familia
  - llamó a su parentela
  lexicon: BDAG
  rationale: πατριά designa el linaje familiar amplio; 'familia' funciona en castellano para el contexto patriarcal sin perder el sentido de convocatoria.
- source_word: εἶπεν
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló diciendo
  lexicon: BDAG
  rationale: Aoristo simple; 'dijo' es la forma directa y estándar en español narrativo.
translation_notes:
  revision_awareness: El POB inglés tradujo el numeral griego ἑκατοστῷ εἰκοστῷ πέμπτῳ ('centésimo vigésimo quinto') brevemente como 'fifth year', con nota textual indicando que el texto griego es terso. La traducción española opta por el numeral completo del griego (125 años) ya que es el testimonio textual y se alinea con la edad de Benjamín al final de su testamento (otro patriarca).
  spanish_consistency_notes:
  - πατριά → familia (linaje patriarcal amplio)
  - decisión de seguir el numeral griego completo ('ciento veinticinco') en lugar de la abreviatura del POB ('fifth')
