base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/dan/001/004.yaml
  text: So I confess to you today, my children, that in my heart I resolved concerning Joseph my brother, that good and true man, to his death.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:27Z'
    unchanged: false
    changes_summary: Reordered the final clause to account for the infinitive διδάσκει and preserve all source elements, including the reference to death. Kept the formal tone and the appositional description 'that good and true man.'
translation:
  language: es
  text: Por tanto os confieso hoy, hijos míos, que en mi corazón resolví, respecto a José mi hermano, aquel hombre bueno y verdadero, su muerte.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ὁμολογῶ
  english_pob_choice: I confess
  chosen_spanish: os confieso
  alternatives_spanish:
  - os admito
  - os declaro abiertamente
  lexicon: BDAG
  rationale: ὁμολογέω en contexto testamentario tiene fuerza de admisión solemne; 'confieso' preserva la dimensión moral-judicial del reconocimiento del patriarca.
- source_word: ἐν καρδίᾳ μου ἐθέμην
  english_pob_choice: in my heart I resolved
  chosen_spanish: en mi corazón resolví
  alternatives_spanish:
  - determiné en mi corazón
  - decidí en mi interior
  lexicon: BDAG
  rationale: El modismo τίθημι ἐν καρδίᾳ es semitismo bíblico que indica decisión deliberada; 'resolví en mi corazón' preserva el modismo y el peso volitivo.
- source_word: περὶ τοῦ θανάτου Ἰωσήφ
  english_pob_choice: concerning... Joseph... to his death
  chosen_spanish: respecto a José... su muerte
  alternatives_spanish:
  - acerca de la muerte de José
  - para la muerte de José
  lexicon: BDAG
  rationale: Sigue la revisión del POB que reordenó la cláusula final para preservar todos los elementos fuente incluyendo la referencia a la muerte; el español mantiene el orden con la apostilla intermedia.
- source_word: τοῦ ἀγαθοῦ ἀνδρὸς καὶ ἀληθινοῦ
  english_pob_choice: that good and true man
  chosen_spanish: aquel hombre bueno y verdadero
  alternatives_spanish:
  - aquel varón bueno y veraz
  - ese hombre bueno y honrado
  lexicon: BDAG
  rationale: ἀληθινός aplicado a personas indica veracidad/integridad; 'verdadero' preserva el binomio ético clásico y mantiene el aposicional reverente del POB.
translation_notes:
  revision_awareness: El POB inglés reordenó en revisión la cláusula final para incluir 'to his death' al final, preservando todos los elementos griegos. El español sigue ese reordenamiento con 'su muerte' al final.
  spanish_consistency_notes:
  - ὁμολογέω → confesar (admisión solemne testamentaria)
  - ἐν καρδίᾳ τίθημι → resolver en el corazón (semitismo preservado)
  - ἀληθινός → verdadero (sentido moral de integridad)
