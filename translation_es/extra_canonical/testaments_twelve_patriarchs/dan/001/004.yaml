  text: '*Ὁμολογῶ οὖν ὑμῖν σήμερον²⁹, τέκνα μου³⁰, ὅτι ἐν καρδίᾳ μου ἐθέμην³¹ περὶ τοῦ θανάτου³² Ἰωσήφ, ⸀τοῦ ἀδελφοῦ μου⸁³³, *τοῦ ἀγαθοῦ ἀνδρὸς καὶ ἀληθινοῦ³⁴.'
