id: T12P.DAN.1.7
reference: Testament of Dan 1:7
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 201-213, Dan source-fix v2)
  text: Καὶ *ἐκ τῶν πνευμάτων⁴³ τοῦ Βελίαρ †συνήργει⁴⁴ μοι, ὅτι⁴⁵· *Λαβὲ τὸ ξίφος καὶ ⌜ἐν τούτῳ⌝⁴⁶ ἄνελε τὸν Ἰωσήφ⁴⁷, καὶ ἀγαπήσει σε ὁ πατήρ⁴⁸, ἀποθανόντος αὐτοῦ.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/dan/001/007.yaml
  text: And one of the spirits of Beliar was working with me, saying, ‘Take this sword and kill Joseph, and your father will love you after he dies.’
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:58Z'
    unchanged: false
    changes_summary: Changed ‘when he is dead’ to ‘after he dies’ to reflect the genitive absolute more naturally in English while preserving the sense. Kept ‘one of the spirits of Beliar’ and ‘was working with me’ as accurate renderings.
translation:
  language: es
  text: 'Y uno de los espíritus de Beliar cooperaba conmigo, diciendo: ''Toma esta espada y con ella mata a José, y tu padre te amará después que él muera.'''
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐκ τῶν πνευμάτων τοῦ Βελίαρ
  english_pob_choice: one of the spirits of Beliar
  chosen_spanish: uno de los espíritus de Beliar
  alternatives_spanish:
  - uno de los espíritus de Belial
  - uno de los espíritus malignos
  lexicon: LSJ
  rationale: El testimonio griego tiene el nombre propio en esta forma. Mantener 'Beliar' refleja el texto fuente en lugar de normalizar al más familiar 'Belial'.
- source_word: συνήργει μοι
  english_pob_choice: was working with me
  chosen_spanish: cooperaba conmigo
  alternatives_spanish:
  - trabajaba conmigo
  - obraba juntamente conmigo
  lexicon: BDAG
  rationale: συνεργέω indica colaboración activa; 'cooperaba' preserva el sentido durativo del imperfecto y la connotación moral negativa en este contexto demoníaco.
- source_word: Λαβὲ τὸ ξίφος
  english_pob_choice: Take this sword
  chosen_spanish: Toma esta espada
  alternatives_spanish:
  - Coge esta espada
  - Empuña la espada
  lexicon: BDAG
  rationale: Imperativo aoristo directo; 'toma' es la forma estándar y neutra en castellano latinoamericano para este imperativo bélico.
- source_word: ἄνελε τὸν Ἰωσήφ
  english_pob_choice: kill Joseph
  chosen_spanish: mata a José
  alternatives_spanish:
  - da muerte a José
  - elimina a José
  lexicon: BDAG
  rationale: El mandato es directo y homicida. 'Mata' preserva la franqueza sin arcaísmos.
- source_word: ἀποθανόντος αὐτοῦ
  english_pob_choice: after he dies
  chosen_spanish: después que él muera
  alternatives_spanish:
  - cuando esté muerto
  - una vez muerto él
  lexicon: BDAG
  rationale: Sigue la revisión del POB que ajustó 'when he is dead' a 'after he dies' para reflejar el genitivo absoluto. 'Después que muera' captura la temporalidad de la cláusula condicional.
theological_decisions:
- issue: Referencia a Beliar como poder maligno personal
  chosen_reading: Traducir como 'uno de los espíritus de Beliar' y conservar el nombre propio.
  alternative_readings:
  - uno de los espíritus malignos
  - uno de los espíritus de Belial
  rationale: El griego nombra explícitamente a Beliar/Belial. La traducción preserva el marco demonológico del testamento en lugar de reducirlo a un impulso maligno impersonal.
  doctrine_reference: Preservar la tensión teológica del texto fuente y su especificidad en lugar de suavizarla.
translation_notes:
  revision_awareness: El POB inglés cambió en revisión 'when he is dead' a 'after he dies' para reflejar mejor el genitivo absoluto griego. La traducción española sigue la rendición revisada con 'después que él muera'.
  spanish_consistency_notes:
  - Βελίαρ → Beliar (forma griega preservada, no normalizada a 'Belial')
  - συνεργέω → cooperar (colaboración activa)
  - ἀναιρέω → matar (directez del mandato homicida)
