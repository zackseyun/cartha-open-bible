id: T12P.DAN.1.8
reference: Testament of Dan 1:8
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 201-213, Dan source-fix v2)
  text: '*Τοῦτο δὲ ἦν τὸ πνεῦμα τοῦ θυμοῦ τὸ πεῖθόν με⁴⁹· ὥσπερ⁵⁰ πάρδαλις †ἐκμύζουσα⁵¹ ἔριφον, ἵνα οὕτως *⌜ἐμοὶ ἐνέβαλεν⌝ †ἐκμυζῆσαι⁵² τὸν Ἰωσήφ.'
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/dan/001/008.yaml
  text: Now this was the spirit of anger persuading me, that just as a leopard sucks out a young goat, so it put into me to suck out Joseph.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:28Z'
    unchanged: false
    changes_summary: 'Revised key imagery for lexical accuracy: changed ''crushes''/''destroy'' to ''sucks out'' to reflect ἐκμύζουσα / ἐκμυζῆσαι. Also kept the second clause closer to the Greek by rendering ἐνέβαλεν as ''put into me'' rather than paraphrasing as ''I too should.'''
translation:
  language: es
  text: Y este era el espíritu de la ira persuadiéndome, que así como un leopardo chupa a un cabrito, así me incitó a chupar a José.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πνεῦμα τοῦ θυμοῦ
  english_pob_choice: spirit of anger
  chosen_spanish: el espíritu de la ira
  alternatives_spanish:
  - el espíritu de la cólera
  - el espíritu del enojo
  lexicon: BDAG
  rationale: Mantiene consistencia con θυμός → ira en este testamento (vicio principal). 'Espíritu' preserva la categoría demonológica del pasaje.
- source_word: πεῖθόν με
  english_pob_choice: persuading me
  chosen_spanish: persuadiéndome
  alternatives_spanish:
  - urgiéndome
  - convenciéndome
  lexicon: BDAG
  rationale: El participio muestra presión interna continuada del espíritu de la ira. 'Persuadiéndome' preserva ese proceso.
- source_word: πάρδαλις
  english_pob_choice: leopard
  chosen_spanish: un leopardo
  alternatives_spanish:
  - una pantera
  lexicon: LSJ
  rationale: La referencia animal estándar es 'leopardo'; preserva la imagen depredadora vívida.
- source_word: ἐκμύζουσα ἔριφον
  english_pob_choice: sucks out a young goat
  chosen_spanish: chupa la sangre de un cabrito
  alternatives_spanish:
  - succiona a un cabrito
  - drena a un cabrito
  lexicon: LSJ
  rationale: ἐκμύζω indica succionar/chupar fuera; el referente implícito en el contexto depredador es la sangre del cabrito. 'Chupa la sangre de' transmite la imagen brutal y el matiz parasitario sin usar 'succionar' que en español resulta clínico.
- source_word: ἔριφον
  english_pob_choice: young goat
  chosen_spanish: un cabrito
  alternatives_spanish:
  - un chivito
  - una cría de cabra
  lexicon: BDAG
  rationale: '''Cabrito'' es transparente para lectores modernos hispanohablantes y preserva el registro solemne del contexto.'
- source_word: ἐμοὶ ἐνέβαλεν
  english_pob_choice: it put into me
  chosen_spanish: me incitó
  alternatives_spanish:
  - me puso en el ánimo
  - me arrojó al pensamiento
  lexicon: BDAG
  rationale: ἐμβάλλω εἰς con dativo significa 'meter en, inducir a'; sigue la revisión del POB que evitó la paráfrasis 'I too should'. 'Incitó' preserva la fuerza activa del espíritu sin perder el sentido de implantación.
- source_word: ἐκμυζῆσαι τὸν Ἰωσήφ
  english_pob_choice: to suck out Joseph
  chosen_spanish: chupar la sangre de José
  alternatives_spanish:
  - succionar a José
  - destruir a José vampíricamente
  lexicon: LSJ
  rationale: Mantiene la imagen depredadora del verbo paralelo (πάρδαλις/Δάν, ἔριφος/Ἰωσήφ); el infinitivo continúa la metáfora vampírica del leopardo.
translation_notes:
  revision_awareness: El POB inglés revisó 'crushes/destroy' a 'sucks out' para reflejar mejor ἐκμύζουσα/ἐκμυζῆσαι, y rindió ἐνέβαλεν como 'put into me' en lugar de la paráfrasis 'I too should'. La traducción española sigue esta rendición más literal con 'chupar la sangre' y 'me incitó'.
  spanish_consistency_notes:
  - θυμός → ira (consistente con 1:3 y 1:6)
  - ἐκμύζω → chupar la sangre (preserva imagen depredadora vampírica)
  - 'πάρδαλις : ἔριφος :: Δάν : Ἰωσήφ (paralelismo metafórico preservado)'
