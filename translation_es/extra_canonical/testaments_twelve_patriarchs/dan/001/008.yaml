    issue: Addition of 'la sangre de' (the blood of) twice is an interpretive expansion not present in the Greek ἐκμύζω, which means to drain/suck out but does not specify the object as blood
    rationale: The EN POB deliberately rendered ἐκμυζῆσαι as 'to suck out Joseph' without specifying blood. The Spanish should follow the source's non-specification. An alternative could be 'chupa a un cabrito... chupar a José' or 'drena a un cabrito... drenar a José'.
  revised_spanish_text: Y este era el espíritu de la ira persuadiéndome, que así como un leopardo chupa a un cabrito, así me incitó a chupar a José.
  revision_rationale: Removed the two additions of 'la sangre de' which are not present in the Greek source (ἐκμύζω targets the animal/person directly, not the blood). The EN POB kept 'sucks out a young goat... suck out Joseph' without specifying blood. Revised to 'chupa a un cabrito... chupar a José' which preserves the parallel structure and the jarring predatory image without over-interpreting the verb.
