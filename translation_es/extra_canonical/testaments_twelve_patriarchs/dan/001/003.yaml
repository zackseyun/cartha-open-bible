id: T12P.DAN.1.3
reference: Testament of Dan 1:3
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 201-213, Dan source-fix v2)
  text: '*Ἐγὼ¹⁸ ἐπείρασα ἐν καρδίᾳ μου¹⁹ καὶ²⁰ ἐν πάσῃ²¹ ζωῇ μου²², ὅτι καλὸν²³ *καὶ θεῷ εὐάρεστον ἡ ἀλήθεια²⁴ μετὰ δικαιοπραγίας²⁵ *καὶ ⸀ὅτι⸁ πονηρὸν τὸ ψεῦδος²⁶ καὶ ὁ θυμὸς²⁷ πᾶσαν κακίαν *ἐκδιδάσκοντα τὸν ἄνθρωπον²⁸.'
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/dan/001/003.yaml
  text: I have tested in my heart and in all my life that truth with righteous conduct is good and pleasing to God, and that falsehood and anger are evil, teaching a person every wickedness.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:57Z'
    unchanged: false
    changes_summary: Removed the unnecessary comma after 'heart' for smoother English. The draft otherwise accurately and completely reflects the Greek.
translation:
  language: es
  text: He probado en mi corazón y en toda mi vida que la verdad con la conducta recta es buena y agradable a Dios, y que la falsedad y la ira son malas, enseñando al hombre toda maldad.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπείρασα
  english_pob_choice: have tested
  chosen_spanish: he probado
  alternatives_spanish:
  - he experimentado
  - he comprobado
  lexicon: BDAG
  rationale: πειράζω en este sentido moral significa 'comprobar/poner a prueba'; 'he probado' captura la experiencia testamentaria sin perder el matiz cognitivo.
- source_word: ἀλήθεια
  english_pob_choice: truth
  chosen_spanish: la verdad
  alternatives_spanish:
  - la veracidad
  lexicon: BDAG
  rationale: El capítulo contrasta la verdad moral con la falsedad como disposiciones éticas, y 'verdad' preserva el sentido moral amplio.
- source_word: δικαιοπραγία
  english_pob_choice: righteous conduct
  chosen_spanish: la conducta recta
  alternatives_spanish:
  - el obrar justo
  - la práctica de la justicia
  lexicon: LSJ
  rationale: El compuesto apunta a la práctica de la justicia, no meramente una cualidad abstracta. 'Conducta recta' mantiene la fuerza ética y el paralelismo con 'verdad'.
- source_word: εὐάρεστον
  english_pob_choice: pleasing
  chosen_spanish: agradable
  alternatives_spanish:
  - bien aceptable
  - complaciente
  lexicon: BDAG
  rationale: Término común en la literatura ética judeo-helenística; 'agradable' funciona naturalmente en castellano y conserva la dimensión cultual-ética.
- source_word: ψεῦδος
  english_pob_choice: falsehood
  chosen_spanish: la falsedad
  alternatives_spanish:
  - la mentira
  lexicon: BDAG
  rationale: El sustantivo abstracto pareja bien con 'verdad' y se ajusta al estilo de catálogo de vicios mejor que el 'mentira' singular más estrecho.
- source_word: θυμός
  english_pob_choice: anger
  chosen_spanish: la ira
  alternatives_spanish:
  - el enojo
  - la cólera
  lexicon: BDAG
  rationale: Término clave del vicio en este testamento. 'Ira' es la rendición castellana más natural y estable, conservando la intensidad moral del pasaje.
- source_word: πᾶσαν κακίαν ἐκδιδάσκοντα
  english_pob_choice: teaching every wickedness
  chosen_spanish: enseñando... toda maldad
  alternatives_spanish:
  - adoctrinando en toda maldad
  lexicon: LSJ
  rationale: ἐκδιδάσκω intensifica διδάσκω ('enseñar a fondo, instruir totalmente'); 'enseñando' funciona como participio causal sin aplanar el matiz.
translation_notes:
  revision_awareness: El POB inglés removió en revisión una coma innecesaria después de 'corazón' para fluidez; el español sigue el ritmo natural sin coma forzada.
  spanish_consistency_notes:
  - ἀλήθεια ↔ ψεῦδος → verdad ↔ falsedad (paralelismo de virtud/vicio)
  - θυμός → ira (término clave de vicio en T. Dan)
  - δικαιοπραγία → conducta recta (énfasis en práctica)
