translation:
  language: es
  text: Y me alegraba por su venta, porque su padre lo amaba más que a nosotros.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἔχαιρον
  english_pob_choice: I rejoiced
  chosen_spanish: me alegraba
  alternatives_spanish:
  - me regocijaba
  - me gozaba
  lexicon: BDAG
  rationale: Imperfecto que indica acción continuada; 'me alegraba' preserva la duración del estado interior y es natural en castellano.
- source_word: ἐπὶ τῇ πράσει αὐτοῦ
  english_pob_choice: over his being sold
  chosen_spanish: por su venta
  alternatives_spanish:
  - por haber sido vendido
  - por su venta como esclavo
  lexicon: LSJ
  rationale: πρᾶσις es sustantivo verbal directo ('venta'); 'por su venta' es la rendición más concisa y natural en castellano sin perder la referencia al evento de Génesis 37.
- source_word: ὁ πατὴρ αὐτὸν ἠγάπα
  english_pob_choice: his father loved him
  chosen_spanish: su padre lo amaba
  alternatives_spanish:
  - su padre le amaba
  lexicon: BDAG
  rationale: Imperfecto de ἀγαπάω; 'amaba' preserva el sentido durativo del afecto paternal especial hacia José.
- source_word: ὑπὲρ ἡμᾶς
  english_pob_choice: more than us
  chosen_spanish: más que a nosotros
  alternatives_spanish:
  - sobre nosotros
  - por encima de nosotros
  lexicon: BDAG
  rationale: ὑπέρ con acusativo en sentido comparativo significa 'más que'; 'más que a nosotros' es la forma estándar en castellano.
translation_notes:
  revision_awareness: El POB inglés no requirió cambios en revisión; el español sigue la rendición clara y directa del original.
  spanish_consistency_notes:
  - πρᾶσις → venta (referencia clara a Gn 37)
  - ἀγαπάω → amar (afecto patriarcal estable)
