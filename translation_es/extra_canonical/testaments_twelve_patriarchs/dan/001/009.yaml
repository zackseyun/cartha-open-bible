translation:
  language: es
  text: Pero el Dios de mis padres no permitió que cayera en mis manos, para que yo, hallándolo solo, lo matara y cometiera este acto inicuo, no fuera que se destruyeran dos tribus de Israel."
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁ Θεὸς τῶν πατέρων μου
  english_pob_choice: the God of my fathers
  chosen_spanish: el Dios de mis padres
  alternatives_spanish:
  - el Dios de mis ancestros
  lexicon: BDAG
  rationale: Fórmula patriarcal estándar; 'Dios de mis padres' preserva la conexión con la tradición de Génesis-Éxodo y mantiene el lenguaje de parentesco testamentario.
- source_word: οὐκ εἴασεν αὐτὸν ἐμπεσεῖν εἰς τὰς χεῖράς μου
  english_pob_choice: did not give him into my hands
  chosen_spanish: no permitió que cayera en mis manos
  alternatives_spanish:
  - no lo dejó caer en mis manos
  - no lo entregó en mis manos
  lexicon: BDAG
  rationale: ἐάω + infinitivo = 'permitir, dejar'. La frase griega es literalmente 'no permitió que cayera en mis manos'; preserva tanto la soberanía divina como la culpabilidad de Dan.
- source_word: κατὰ μόνας εὑρὼν αὐτὸν
  english_pob_choice: find him alone
  chosen_spanish: hallándolo solo
  alternatives_spanish:
  - encontrándolo a solas
  - topándomelo solo
  lexicon: LSJ
  rationale: κατὰ μόνας es modismo griego para 'a solas, en privado'; 'hallándolo solo' captura la circunstancia premeditada del intento homicida.
- source_word: ἀνελῶ
  english_pob_choice: kill him
  chosen_spanish: lo matara
  alternatives_spanish:
  - lo matase
  - diera muerte
  lexicon: BDAG
  rationale: Subjuntivo de propósito; 'matara' preserva la directez homicida y la subordinación gramatical.
- source_word: ποιήσω λυθῆναι σκῆπτρον δεύτερον τῷ Ἰσραήλ
  english_pob_choice: commit this lawless deed, lest two tribes be destroyed from Israel
  chosen_spanish: cometiera este acto inicuo, para que no se destruyeran dos tribus de Israel
  alternatives_spanish:
  - hiciera que se disolvieran dos cetros para Israel
  - causara la pérdida de dos tribus en Israel
  lexicon: BDAG
  rationale: El griego es difícil ('hacer que se afloje un segundo cetro a Israel'); el POB inglés interpreta como dos tribus destruidas. La traducción española sigue la rendición POB con 'dos tribus' preservando la apódosis negativa de 'lest'.
- source_word: ἀνόμημα (implícito)
  english_pob_choice: lawless deed
  chosen_spanish: acto inicuo
  alternatives_spanish:
  - crimen
  - obra sin ley
  - acto malvado
  lexicon: BDAG
  rationale: El término marca el asesinato contemplado como transgresión, no meramente como mal hacer. 'Acto inicuo' preserva el peso moral-legal.
theological_decisions:
- issue: Restricción divina en la intención fallida de Dan contra José
  chosen_reading: Renderizar la acción de Dios como no permitir que José cayera en las manos de Dan.
  alternative_readings:
  - no le permitió caer en mis manos
  - no lo arrojó a mis manos
  rationale: Esto mantiene a la vista tanto la soberanía divina como la culpabilidad de Dan, conformándose a la lógica moral del griego.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: El POB inglés cambió en revisión 'so that' por 'that' para una rendición más natural del propósito tras 'did not give'. La traducción española usa 'para que' que cumple naturalmente la función final.
  spanish_consistency_notes:
  - ὁ Θεὸς τῶν πατέρων → el Dios de los padres (fórmula patriarcal)
  - ἐάω → permitir (preserva soberanía divina + culpabilidad humana)
  - ἀνόμημα → acto inicuo (peso moral-legal)
