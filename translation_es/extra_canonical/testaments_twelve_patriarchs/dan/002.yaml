    los motivos de provocación; y luego, encolerizándose, piensa que está airado con justicia. Si caen en alguna pérdida o ruina, hijos míos, no se aflijan; porque ese mismo espíritu hace al hombre desear lo perecedero, para que se enoje por la aflicción. Y si la pérdida viene voluntaria o involuntariamente, no se molesten; porque del enojo nace la falsa ira. Además, doble daño es la ira con la falsedad; y se ayudan mutuamente para destruir el corazón. Y cuando el alma es continuamente perturbada, el Señor se aparta de ella[c], y Beliar reina sobre ella.'
