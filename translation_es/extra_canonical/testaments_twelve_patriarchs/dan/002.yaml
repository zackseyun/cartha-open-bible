translation:
  language: es
  text: 'Y ahora[a], hijos míos, he aquí, estoy muriendo, y les digo en verdad: a menos que se guarden del espíritu de falsedad y de la ira, y amen la verdad y la longanimidad, perecerán. Porque la ira es ceguera, y no permite ver con verdad el rostro de ningún hombre. Aun si es padre o madre, se comporta con ellos como con enemigos; aun si es hermano, no lo reconoce; aun si es profeta del Señor, lo desobedece; aun si es justo, no lo tiene en cuenta; aun si es amigo, no lo reconoce. Porque el espíritu de la ira lo rodea con las redes del engaño, y le ciega los ojos, y mediante la falsedad le oscurece la mente, y le da su propia visión peculiar. ¿Y con qué le rodea los ojos? Con odio del corazón, de modo que envidie a su hermano. La ira es cosa mala, hijos míos[b], porque perturba aun el alma misma. Y el cuerpo del iracundo lo hace suyo, y se enseñorea sobre su alma, y le da poder al cuerpo, para que ejecute toda obra inicua. Y cuando el cuerpo hace todas estas cosas, el alma justifica lo
    hecho, porque no ve rectamente. Por tanto, el iracundo, si es hombre poderoso, tiene un poder triple en su ira: uno por la ayuda de sus servidores, y un segundo por su riqueza, con la cual persuade y vence injustamente, y un tercero, porque tiene su propio poder natural, y por él obra el mal. Y si el iracundo es además pobre, tiene un poder doble de ira; pues siempre lo ayuda hacia el mal obrar. Este espíritu va siempre con la falsedad a la diestra de Satanás, para que con crueldad y falsedad se cumplan sus obras. Comprendan, pues, el poder de la ira, que es vacío. Porque primero da provocación con palabra; luego con obras fortalece al que está airado, y con pérdidas agudas perturba su mente, y así excita su alma con gran ira. Por tanto, cuando alguien hable contra ustedes, no se dejen llevar a la ira; y si alguien los alaba como hombres santos, no se ensoberbezcan, ni para deleite ni para repugnancia. Porque primero es agradable al oído, y así la mente se mueve a percibir los motivos
    de provocación; y luego, encolerizándose, piensa que está airado con justicia. Si caen en alguna pérdida o ruina, hijos míos, no se aflijan; porque ese mismo espíritu hace al hombre desear lo perecedero, para que se enoje por la aflicción. Y si la pérdida viene voluntaria o involuntariamente, no se molesten; porque del enojo nace la falsa ira. Además, doble daño es la ira con la falsedad; y se ayudan mutuamente para destruir el corazón. Y cuando el alma es continuamente perturbada, el Señor se aparta de ella[c], y Beliar reina sobre ella.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el espíritu de engaño'. El término griego puede denotar falsedad en el habla o una cualidad engañosa más amplia.
    reason: lexical_alternative
  - marker: b
    text: '''Longanimidad'' también podría traducirse como ''paciencia'' o ''tolerancia'', pero el término más pleno preserva mejor el peso ético de la exhortación.'
    reason: lexical_alternative
  - marker: c
    text: Beliar es una forma tradicional de Belial en la literatura judía y cristiana primitiva.
    reason: cultural_note
lexical_decisions:
- source_word: πνεῦμα
  english_pob_choice: spirit
  chosen_spanish: espíritu
  alternatives_spanish:
  - disposición
  - influencia
  lexicon: LSJ
  rationale: En este contexto parenético testamental, πνεῦμα designa una fuerza moral activa, no mero estado de ánimo. 'Espíritu' preserva la textura moral-personal del texto y su asociación posterior con Satanás/Beliar.
- source_word: ψεύδους
  english_pob_choice: falsehood
  chosen_spanish: falsedad
  alternatives_spanish:
  - mentira
  - engaño
  lexicon: LSJ
  rationale: '''Falsedad'' encaja con el vicio abstracto emparejado con la ira y permite consistencia cuando el capítulo habla luego de la distorsión engañosa de la percepción.'
- source_word: θυμός
  english_pob_choice: anger
  chosen_spanish: ira
  alternatives_spanish:
  - enojo
  - furor
  lexicon: LSJ
  rationale: El vicio dominante del capítulo es θυμός. 'Ira' es el rendido más amplio y digno en español; conserva el registro testamental.
- source_word: ἀλήθεια
  english_pob_choice: truth
  chosen_spanish: verdad
  alternatives_spanish:
  - veracidad
  lexicon: LSJ
  rationale: El contraste es entre falsedad y verdad como cualidad moral e integridad relacional. 'Verdad' preserva el alcance más amplio.
- source_word: μακροθυμία
  english_pob_choice: long-suffering
  chosen_spanish: longanimidad
  alternatives_spanish:
  - paciencia
  - tolerancia
  - magnanimidad
  lexicon: LSJ
  rationale: El estilo testamental favorece un término más cargado éticamente que el más plano 'paciencia'. 'Longanimidad' preserva la resistencia moral bajo provocación.
- source_word: δίκτυα
  english_pob_choice: nets
  chosen_spanish: redes
  alternatives_spanish:
  - lazos
  - trampas
  lexicon: LSJ
  rationale: La imagen es de enredo por engaño. 'Redes' es traducción concreta y vívida del sustantivo griego.
- source_word: ἴδιον ὅρασιν
  english_pob_choice: its own peculiar vision
  chosen_spanish: su propia visión peculiar
  alternatives_spanish:
  - su propio modo de ver
  lexicon: LSJ
  rationale: La frase sugiere que la ira impone una percepción distorsionada. 'Visión peculiar' mantiene la metáfora de la vista junto con la subjetividad y distorsión.
- source_word: φθονεῖν
  english_pob_choice: to be envious
  chosen_spanish: envidiar
  alternatives_spanish:
  - tener envidia
  lexicon: LSJ
  rationale: El infinitivo describe la disposición resultante hacia el hermano. 'Envidiar' es natural en español y conserva el término del vicio.
- source_word: ἀνομία
  english_pob_choice: lawless deed
  chosen_spanish: obra inicua
  alternatives_spanish:
  - maldad
  - transgresión
  - iniquidad
  lexicon: LSJ
  rationale: '''Obra inicua'' preserva el matiz moral-legal de actos contra el orden divino, mejor que el genérico ''maldad''.'
- source_word: κρατεῖ
  english_pob_choice: gains mastery
  chosen_spanish: se enseñorea
  alternatives_spanish:
  - domina
  - tiene poder
  lexicon: LSJ
  rationale: El verbo expresa control dominante sobre el alma. 'Enseñorearse' captura la fuerza invasiva y creciente de la ira en registro testamental.
- source_word: κενόν
  english_pob_choice: empty
  chosen_spanish: vacío
  alternatives_spanish:
  - vano
  - hueco
  lexicon: LSJ
  rationale: Dan advierte que el poder aparente de la ira es finalmente fútil y engañoso. 'Vacío' es directo y legible mientras retiene el juicio moral.
- source_word: παροξυσμός / παροξύνειν
  english_pob_choice: provocation
  chosen_spanish: provocación
  alternatives_spanish:
  - irritación
  - incitación
  lexicon: LSJ
  rationale: El capítulo describe la escalada de la ira desde estímulo verbal hasta acción. 'Provocación' captura tanto el detonante como el efecto agitador.
- source_word: Βελιάρ
  english_pob_choice: Beliar
  chosen_spanish: Beliar
  alternatives_spanish:
  - Belial
  lexicon: LSJ
  rationale: El testimonio griego usa la forma Beliar. Transliteramos la forma del testamento griego en lugar de normalizarla a Belial.
theological_decisions:
- issue: Agencia moral-espiritual de la ira y la falsedad
  chosen_reading: Traducir el lenguaje de los vicios como terminología activa de 'espíritu' en lugar de reducirlo a mera psicología.
  alternative_readings:
  - Tratar 'espíritu' como simplemente 'actitud' o 'temperamento'
  rationale: El capítulo personifica la ira y la falsedad, las vincula con Satanás y Beliar, y las describe como fuerzas que reinan. La traducción preserva esta cosmología moral del Segundo Templo sin sobre-sistematizarla.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla; primacía del idioma original.
- issue: Referencia a 'el Señor' apartándose del alma
  chosen_reading: Conservar 'el Señor se aparta de ella' tal como está.
  alternative_readings:
  - Parafrasear como pérdida de paz o claridad moral
  rationale: El griego presenta el alejamiento divino en términos morales claros. Suavizarlo a lenguaje psicológico aplanaría la advertencia teológica.
- issue: Satanás y Beliar en el mismo capítulo
  chosen_reading: Traducir ambos nombres distintamente como aparecen.
  alternative_readings:
  - Armonizar Beliar con Satanás o traducir uno como título del otro
  rationale: La redacción transmitida del texto usa ambas figuras dentro de su marco moral-apocalíptico. La transparencia requiere preservar la distinción del testimonio en lugar de armonizar.
translation_notes:
  revision_awareness: El draft inglés a nivel de capítulo fue revisado y aprobado sin cambios en el revision_pass. Mantiene la estructura completa y el vocabulario consolidado.
  spanish_consistency_notes:
  - θυμός→ira de manera consistente
  - πνεῦμα→espíritu (con minúscula al referirse a fuerza moral viciosa)
  - ψεῦδος→falsedad
  - μακροθυμία→longanimidad con nota léxica
  - Beliar transliterado, no normalizado a Belial
