base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/dan/002.yaml
  text: 'And now[a], my children, behold, I am dying, and I tell you in truth: unless you guard yourselves from the spirit of falsehood and of anger, and love truth and long-suffering, you will perish. For anger is blindness, and it does not allow one to see the face of any man with truth. Even if it is a father or a mother, he behaves toward them as toward enemies; even if it is a brother, he does not recognize him; even if it is a prophet of the Lord, he disobeys him; even if it is a righteous man, he does not regard him; even if it is a friend, he does not acknowledge him. For the spirit of anger surrounds him with the nets of deceit, and blinds his eyes, and through falsehood darkens his mind, and gives him its own peculiar vision. And with what does it surround his eyes? With hatred of heart, so as to be envious of his brother. Anger is an evil thing, my children[b], because it troubles even the soul itself. And the body of the angry man it makes its own, and over his soul it gains
    mastery, and it bestows power on the body, so that it works every lawless deed. And when the body does all these things, the soul justifies what is done, because it does not see rightly. Therefore he who is wrathful, if he is a mighty man, has a threefold power in his anger: one from the help of his servants, and a second from his wealth, by which he persuades and overcomes unjustly, and a third, because he has his own natural power, and by it he works evil. And if the wrathful man is also poor, he has a twofold power of anger; for it always helps him toward wrongdoing. This spirit goes always with falsehood at the right hand of Satan, so that with cruelty and falsehood his works may be accomplished. Understand, therefore, the power of anger, that it is empty. For first it gives provocation by word; then by deeds it strengthens the one who is angry, and with sharp losses it disturbs his mind, and so it stirs up his soul with great wrath. Therefore, when anyone speaks against you, do
    not be moved to anger; and if anyone praises you as holy men, do not be exalted, either to delight or to disgust. For first it is pleasing to the hearing, and so the mind is stirred to perceive the grounds for provocation; and then, becoming angry, he thinks that he is justly angry. If you fall into any loss or ruin, my children, do not be distressed; for this very spirit makes a man desire what is perishable, in order that he may be angered through the distress. And if the loss comes willingly or unwillingly, do not be vexed; for from vexation false anger is born. Moreover, a twofold mischief is anger with falsehood; and they help one another to destroy the heart. And when the soul is continually disturbed, the Lord departs from it[c], and Beliar rules over it.'
  footnotes:
  - marker: a
    text: Or 'the spirit of deceit.' The Greek term can denote falsehood in speech or a broader deceitful quality.
    reason: lexical_alternative
  - marker: b
    text: '''Long-suffering'' could also be rendered ''forbearance'' or ''patience,'' but the fuller term better preserves the ethical weight of the exhortation.'
    reason: lexical_alternative
  - marker: c
    text: Beliar is a traditional form of Belial in Jewish and early Christian literature.
    reason: cultural_note
