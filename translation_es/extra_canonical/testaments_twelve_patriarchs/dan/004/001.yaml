  chosen_spanish: rostro
  alternatives_spanish:
  - cara
  lexicon: LSJ
  rationale: '''Rostro'' tiene mayor dignidad para el registro elevado del testamento.'
translation_notes:
  revision_awareness: El inglés POB fue revisado de 'with truth' a 'truly'; el español 'con verdad' conserva la imagen literal del giro 'en verdad' del griego paralelo en 3.2 y resulta natural en español neutro.
  spanish_consistency_notes:
  - θυμός → ira (consistente con capítulo 3).
  - πρόσωπον → rostro.
