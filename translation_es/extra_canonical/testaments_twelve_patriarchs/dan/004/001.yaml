base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/dan/004/001.yaml
  text: For anger is blindness. It does not allow one to see the face of any man truly.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:31Z'
    unchanged: false
    changes_summary: Revised 'with truth' to 'truly' for more natural English while preserving the sense of the Greek.
translation:
  language: es
  text: Pues la ira es ceguera. No permite ver el rostro de ningún hombre con verdad.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: θυμός
  english_pob_choice: anger
  chosen_spanish: ira
  alternatives_spanish:
