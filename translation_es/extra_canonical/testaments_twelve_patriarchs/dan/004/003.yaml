id: T12P.DAN.4.3
reference: Testament of Dan 4:3
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 201-213, Dan source-fix v2)
  text: Ὅτε¹² οὖν λαλεῖ τις *καθ᾽ ὑμῶν¹³, ⌈ὑμεῖς⌉¹ μὴ¹⁴ *κινεῖσθε εἰς ὀργήν¹⁵, καὶ ἐὰν τις¹⁶ ἐπαινέσῃ¹⁷ ὑμᾶς ὡς¹⁸ ἁγίους¹⁹, μὴ ἐπαίρεσθε²⁰· μήτε²¹ μεταβάλλεσθε²² ⌈μήτε⌉¹ εἰς τέρψιν μήτε εἰς ἀηδίαν²³.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/dan/004/003.yaml
  text: Therefore, when anyone speaks against you, my children, do not be stirred to anger; and if anyone praises you as holy, do not be puffed up. Be changed neither to delight nor to disgust.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:33Z'
    unchanged: false
    changes_summary: Replaced 'be moved to anger' with 'be stirred to anger' for more natural rendering of κινεῖσθε εἰς ὀργήν, and 'be exalted' with 'be puffed up' for more accurate sense of ἐπαίρεσθε. Retained the final clause essentially as drafted.
translation:
  language: es
  text: Por tanto, cuando alguien hable contra ustedes, hijos míos, no se enardezcan a la cólera; y si alguien los alaba como santos, no se ensoberbezcan. No cambien ni hacia el deleite ni hacia el desagrado.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: κινεῖσθε εἰς ὀργήν
  english_pob_choice: be stirred to anger
  chosen_spanish: se enardezcan a la cólera
  alternatives_spanish:
  - se muevan a la ira
  - se conmuevan a la cólera
  lexicon: LSJ
  rationale: Aquí el griego usa ὀργή; siguiendo la convención del cap. 3 (ὀργή=cólera, θυμός=ira), elijo 'cólera'. 'Enardezcan' refleja la metáfora cinética de κινεῖσθαι.
- source_word: ἐπαίρεσθε
  english_pob_choice: be puffed up
  chosen_spanish: se ensoberbezcan
  alternatives_spanish:
  - se enaltezcan
  - se hinchen
  lexicon: LSJ
  rationale: Captura la advertencia contra la autoexaltación frente al elogio; 'ensoberbecerse' tiene la fuerza moral del giro.
- source_word: μεταβάλλεσθε
  english_pob_choice: be changed
  chosen_spanish: no cambien
  alternatives_spanish:
  - no se alteren
  - no se vuelquen
  lexicon: LSJ
  rationale: Permite el contraste 'ni... ni...' de manera natural.
- source_word: τέρψιν
  english_pob_choice: delight
  chosen_spanish: deleite
  alternatives_spanish:
  - placer
  - regocijo
  lexicon: LSJ
  rationale: Término elevado y conciso que casa con el par retórico opuesto a 'desagrado'.
- source_word: ἀηδίαν
  english_pob_choice: disgust
  chosen_spanish: desagrado
  alternatives_spanish:
  - aversión
  - asco
  lexicon: LSJ
  rationale: Captura la oscilación emocional negativa frente a 'deleite'; 'desagrado' es más mesurado que 'asco'.
translation_notes:
  revision_awareness: El inglés POB pasó de 'be moved to anger' a 'be stirred to anger', y de 'be exalted' a 'be puffed up'. El español usa 'enardezcan a la cólera' y 'se ensoberbezcan' para reflejar la fuerza léxica revisada.
  spanish_consistency_notes:
  - ὀργή → cólera (distinto de θυμός = ira).
  - ἐπαίρεσθαι → ensoberbecerse.
