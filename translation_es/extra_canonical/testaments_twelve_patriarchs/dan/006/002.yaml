id: T12P.DAN.6.2
reference: Testament of Dan 6:2
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 201-213, Dan source-fix v2)
  text: Ἐγγίσατε⁴ τῷ θεῷ καὶ τῷ ἀγγέλῳ *τῷ παραιτουμένῳ ὑμᾶς⁵· ὅτι οὗτός ἐστι μεσίτης θεοῦ καὶ ἀνθρώπων καὶ⁶ ἐπὶ τῆς εἰρήνης τοῦ⁷ Ἰσραὴλ κατέναντι⁸ *τῆς βασιλείας τοῦ †θεοῦ στήσεται⁹.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/dan/006/002.yaml
  text: Draw near to God and to the angel who is remaining with you, interceding for you; for he is a mediator between God and men, and for the peace of Israel he will stand opposite the kingdom and of God.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:56Z'
    unchanged: false
    changes_summary: 'Restored missing source nuances: the angel is ''remaining with you'' and ''interceding for you''; rendered κατέναντι more literally as ''stand opposite''; kept ''mediator between God and men''; retained the final reference to ''of God'' rather than ''of the enemy'', which is not in the provided Greek text.'
translation:
  language: es
  text: Acercaos a Dios y al ángel que permanece con vosotros[a], intercediendo por vosotros; pues él es mediador entre Dios y los hombres, y por la paz de Israel se mantendrá enfrente del reino y de Dios[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El participio griego παραιτουμένῳ tiene una doble fuerza: el ángel ''permanece con'' los fieles y a la vez ''intercede por'' ellos.'
    reason: lexical_alternative
  - marker: b
    text: El texto griego está dañado en este punto (marcado con †). El POB conserva 'de Dios' siguiendo la edición; otros testigos leen 'del reino del enemigo'.
    reason: textual_variant
lexical_decisions:
- source_word: Ἐγγίσατε τῷ θεῷ
  english_pob_choice: Draw near to God
  chosen_spanish: Acercaos a Dios
  alternatives_spanish:
  - Aproximaos a Dios
  - Acercaos a Dios
  lexicon: BDAG
  rationale: Imperativo plural natural en español litúrgico-bíblico.
- source_word: παραιτουμένῳ ὑμᾶς
  english_pob_choice: remaining with you, interceding for you
  chosen_spanish: permanece con vosotros, intercediendo por vosotros
  alternatives_spanish:
  - el que ruega por vosotros
  - el que aboga por vosotros
  lexicon: BDAG
  rationale: POB renderiza la doble fuerza (presencia + intercesión); el español preserva ambas dimensiones del participio.
- source_word: μεσίτης θεοῦ καὶ ἀνθρώπων
  english_pob_choice: mediator between God and men
  chosen_spanish: mediador entre Dios y los hombres
  alternatives_spanish:
  - intermediario entre Dios y los seres humanos
  - mediador de Dios y de los hombres
  lexicon: BDAG
  rationale: Frase técnica del NT (cf. 1 Tim 2:5); 'mediador entre Dios y los hombres' es el calco bíblico estándar.
- source_word: κατέναντι ... στήσεται
  english_pob_choice: stand opposite
  chosen_spanish: se mantendrá enfrente
  alternatives_spanish:
  - se pondrá frente a
  - estará en pie contra
  lexicon: LSJ
  rationale: POB revisó a una traducción más literal de κατέναντι; 'enfrente' captura la posición espacial-relacional sin convertirla en 'contra' interpretativo.
theological_decisions:
- issue: 'El texto griego presenta una crux: ''...del reino †de Dios†'', con marcador de corrupción'
  chosen_reading: Conservar 'del reino y de Dios' como lectura del testigo griego revisado del POB.
  alternative_readings:
  - '''del reino del enemigo'' (lectura armonizadora más fluida)'
  - Dejar la frase entre corchetes como problemática
  rationale: POB explícitamente conservó 'of God' siguiendo el griego provisto y rechazó 'of the enemy' como no atestiguado.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: 'POB revisó este verso con cuidado: restauró ''permanece con vosotros'' + ''intercediendo'', cambió ''against'' por ''opposite'' (κατέναντι) y conservó ''of God'' frente a ''of the enemy''. Espejo todas estas decisiones en español.'
  spanish_consistency_notes:
  - μεσίτης → mediador
  - ἄγγελος → ángel
  - θεός → Dios
