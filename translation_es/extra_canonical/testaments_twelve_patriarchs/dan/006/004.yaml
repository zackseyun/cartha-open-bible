translation:
  language: es
  text: Pues sabe que el día en que Israel se vuelva, será consumado el reino del enemigo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Eco escatológico: el retorno de Israel al Señor coincide con la disolución del reino adversario.'
    reason: cross_reference
lexical_decisions:
- source_word: ἐν ᾗ ἡμέρᾳ
  english_pob_choice: on the day when
  chosen_spanish: el día en que
  alternatives_spanish:
  - en el día en que
  - cuando llegue el día en que
  lexicon: BDAG
  rationale: Construcción relativa estándar en español; 'el día en que' es natural y conserva la fuerza determinante.
- source_word: ἐπιστρέψει
  english_pob_choice: turns back
  chosen_spanish: se vuelva
  alternatives_spanish:
  - regrese
  - se convierta
  lexicon: BDAG
  rationale: '''Volverse'' al Señor es el modismo de retorno espiritual consistente con Dan 5:9.'
- source_word: συντελεσθήσεται
  english_pob_choice: will be brought to an end
  chosen_spanish: será consumado
  alternatives_spanish:
  - será consumido
  - llegará a su fin
  - será destruido
  lexicon: BDAG
  rationale: συντελέω indica completar, llevar a término; 'consumado' transmite el sentido escatológico de fin pleno.
translation_notes:
  revision_awareness: 'POB no cambió este verso (revision_pass: unchanged=true). En el inglés POB el footnote [v6] aparecía en el texto unitario pero aquí se reescribe sin marcador de cruz porque [a] cubre la nota cruzada.'
  spanish_consistency_notes:
  - ἐπιστρέφω → volverse
  - βασιλεία τοῦ ἐχθροῦ → reino del enemigo
  - συντελέω → consumar
