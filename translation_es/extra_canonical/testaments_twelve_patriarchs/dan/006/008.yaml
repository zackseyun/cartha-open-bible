translation:
  language: es
  text: Guardaos, pues, hijos míos, de toda obra mala, y desechad de vosotros la ira y la falsedad, y amad la verdad y la paciencia[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El binomio 'verdad y paciencia' (ἀλήθειαν καὶ μακροθυμίαν) recapitula virtudes opuestas a 'ira y falsedad', cerrando la cadena de exhortaciones del cap. 5–6.
    reason: cross_reference
lexical_decisions:
- source_word: Διατηρήσατε ἑαυτούς
  english_pob_choice: Keep yourselves
  chosen_spanish: Guardaos
  alternatives_spanish:
  - Cuidaos
  - Manteneos
  lexicon: BDAG
  rationale: Δια- intensifica el imperativo; 'guardaos' en español ya implica vigilancia continuada y reflexividad.
- source_word: ἔργου πονηροῦ
  english_pob_choice: evil work
  chosen_spanish: obra mala
  alternatives_spanish:
  - mala obra
  - obra perversa
  lexicon: BDAG
  rationale: Frase ético-bíblica simple; 'obra mala' suena natural en exhortación parenética.
- source_word: ἀπορρίψατε
  english_pob_choice: cast away
  chosen_spanish: desechad
  alternatives_spanish:
  - arrojad
  - echad fuera
  lexicon: BDAG
  rationale: '''Desechar'' transmite el rechazo decisivo de un mal hábito.'
- source_word: θυμός
  english_pob_choice: anger
  chosen_spanish: ira
  alternatives_spanish:
  - enojo
  - cólera
  lexicon: BDAG
  rationale: Consistente con la elección de Dan 5:1.
- source_word: ψεῦδος
  english_pob_choice: falsehood
  chosen_spanish: falsedad
  alternatives_spanish:
  - mentira
  - engaño
  lexicon: BDAG
  rationale: Consistente con Dan 5:1.
- source_word: μακροθυμία
  english_pob_choice: patience
  chosen_spanish: paciencia
  alternatives_spanish:
  - longanimidad
  - magnanimidad
  lexicon: BDAG
  rationale: '''Paciencia'' es comprensible y natural; ''longanimidad'' sería arcaizante en este registro.'
