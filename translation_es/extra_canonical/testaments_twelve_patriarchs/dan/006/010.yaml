source:
  edition: Charles 1908 Greek Versions (pages 201-213, Dan source-fix v2)
  text: Ἀπόστητε οὖν ἀπὸ πάσης ἀδικίας καὶ κολλήθητε⁴⁹ τῇ δικαιοσύνῃ τοῦ⁵⁰ Θεοῦ⁵¹, καὶ ἔσται τὸ γένος ὑμῶν⁵² εἰς σωτηρίαν *ἕως τοῦ αἰῶνος⁵³. 11. *Καὶ θάψατέ με⁵⁴ ἐγγὺς τῶν πατέρων μου.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/dan/006/010.yaml
  text: Therefore depart from all unrighteousness and cling to the righteousness of God[v2], and your offspring will be for salvation forever.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:54Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Por tanto, apártense de toda injusticia y aférrense a la justicia de Dios[a], y su descendencia será para salvación para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Mediador entre Dios y los hombres'' se traduce directamente del griego en el contexto del capítulo. El pasaje habla todavía de un ''ángel,'' por lo que la formulación se deja sin resolver en lugar de identificarla con una figura doctrinal posterior.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀδικίας
  english_pob_choice: unrighteousness
  chosen_spanish: injusticia
  alternatives_spanish:
  - maldad
  - iniquidad
  lexicon: BDAG
  rationale: Se elige 'injusticia' para conservar el contraste claro con 'justicia' (δικαιοσύνη) en la cláusula siguiente, igual que el POB inglés conserva el par unrighteousness/righteousness.
- source_word: κολλήθητε τῇ δικαιοσύνῃ τοῦ Θεοῦ
  english_pob_choice: cling to the righteousness of God
  chosen_spanish: aférrense a la justicia de Dios
  alternatives_spanish:
  - únanse a la justicia de Dios
  - manténganse firmes en la justicia de Dios
  lexicon: BDAG
  rationale: '''Aferrarse'' preserva la metáfora adhesiva de κολλάω y la fuerza exhortativa, equivalente al ''cling to'' del POB.'
- source_word: ἕως τοῦ αἰῶνος
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por la eternidad
  - hasta el siglo
  lexicon: BDAG
  rationale: Modismo natural en español para duración perdurable en contexto de bendición, igual al 'forever' idiomático del POB.
- source_word: τὸ γένος ὑμῶν
  english_pob_choice: your offspring
  chosen_spanish: su descendencia
  alternatives_spanish:
  - su linaje
  - su progenie
  lexicon: BDAG
  rationale: '''Descendencia'' captura el sentido genealógico amplio en español neutro latinoamericano.'
translation_notes:
  revision_awareness: El POB pasó por una revisión que mantuvo este versículo sin cambios; el draft español sigue la versión revisada como ancla.
  spanish_consistency_notes:
  - δικαιοσύνη rendido como 'justicia' por consistencia con el glosario.
  - θεός rendido como 'Dios' por defecto.
