source:
  edition: Charles 1908 Greek Versions (pages 201-213, Dan source-fix v2)
  text: Καὶ ἃ ἠκούσατε³⁸ παρὰ τοῦ πατρὸς ὑμῶν, μεταδοτε³⁹ ⌈καὶ⁴⁰ ὑμεῖς⁴¹⌉ τοῖς τέκνοις ὑμῶν⁴², [ἵνα δέξηται⁴³ ὑμᾶς ὁ Σωτὴρ⁴⁴ τῶν ἐθνῶν· *ἐστὶ γὰρ ἀληθὴς καὶ μακρόθυμος, πρᾷος καὶ ταπεινός⁴⁵, καὶ⁴⁶ ἐκδιδάσκων⁴⁷ διὰ τῶν ἔργων *τὸν νόμον Κυρίου⁴⁸].
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/dan/006/009.yaml
  text: And what you have heard from your father, pass on also to your children, [so that the Savior of the nations may receive you; for he is true and patient, gentle and humble, and by his works he teaches the law of the Lord].
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:55Z'
    unchanged: false
    changes_summary: Adjusted punctuation to better reflect the source clause structure by keeping the bracketed material attached as a purpose clause; otherwise no lexical changes were needed.
translation:
  language: es
  text: Y lo que habéis oído de vuestro padre, transmitidlo también vosotros a vuestros hijos, [para que el Salvador de las naciones[a] os reciba; pues él es veraz y paciente, manso y humilde, y por sus obras enseña la ley del Señor].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''El Salvador de las naciones'' (ὁ Σωτὴρ τῶν ἐθνῶν) refleja un título de carácter mesiánico-universal frecuentemente identificado como añadido cristiano dentro de los Testamentos.'
    reason: theological_note
lexical_decisions:
- source_word: ἃ ἠκούσατε παρὰ τοῦ πατρὸς ὑμῶν
  english_pob_choice: what you have heard from your father
  chosen_spanish: lo que habéis oído de vuestro padre
  alternatives_spanish:
  - aquello que oísteis de vuestro padre
  lexicon: BDAG
  rationale: Fórmula testamental directa; el perfecto 'habéis oído' refleja el aoristo griego con valor resultativo.
- source_word: μεταδοτε
  english_pob_choice: pass on
  chosen_spanish: transmitidlo
  alternatives_spanish:
  - compartidlo
  - comunicadlo
  lexicon: BDAG
  rationale: μεταδίδωμι aquí es 'comunicar/transmitir' una herencia sapiencial; 'transmitir' es lo más natural.
- source_word: ὁ Σωτὴρ τῶν ἐθνῶν
  english_pob_choice: the Savior of the nations
  chosen_spanish: el Salvador de las naciones
  alternatives_spanish:
  - el Salvador de los gentiles
  lexicon: BDAG
  rationale: Consistente con 'naciones' para ἔθνη; mayúscula porque es título mesiánico (cf. v. 5:10 'salvación del Señor').
- source_word: ἀληθὴς καὶ μακρόθυμος, πρᾷος καὶ ταπεινός
  english_pob_choice: true and patient, gentle and humble
  chosen_spanish: veraz y paciente, manso y humilde
  alternatives_spanish:
  - verdadero y paciente, manso y humilde
  lexicon: BDAG
  rationale: '''Veraz'' captura mejor que ''verdadero'' la cualidad personal (cf. Jn 7:18); el resto sigue el modelo Mateo 11:29.'
- source_word: ἐκδιδάσκων διὰ τῶν ἔργων τὸν νόμον Κυρίου
  english_pob_choice: by his works he teaches the law of the Lord
  chosen_spanish: por sus obras enseña la ley del Señor
  alternatives_spanish:
  - mediante sus obras enseña la ley del Señor
  lexicon: BDAG
  rationale: ἐκ- intensifica 'enseñar a fondo'; 'enseña' simple es suficiente, dejando que 'por sus obras' indique el medio.
theological_decisions:
- issue: Material entre corchetes con tono cristológico explícito
  chosen_reading: Conservar el material entre corchetes y traducirlo plenamente, marcando los corchetes como en el griego.
  alternative_readings:
  - Excluir como interpolación cristiana posterior
  - Trasladar a nota a pie sin texto principal
  rationale: Aunque la sección suele identificarse como interpolación cristiana, POB la traduce dentro de corchetes; preserva la integridad del testigo y permite al lector evaluar.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: POB ajustó la puntuación uniendo el material entre corchetes como cláusula final de propósito (con coma en lugar de punto). Espejo esa puntuación en español.
  spanish_consistency_notes:
  - ἔθνη → naciones
  - Σωτήρ → Salvador (mayúscula como título mesiánico)
  - νόμος Κυρίου → ley del Señor
  - πρᾷος → manso (Mt 11:29)
