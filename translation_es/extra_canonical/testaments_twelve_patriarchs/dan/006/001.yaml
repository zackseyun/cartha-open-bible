lexical_decisions:
- source_word: φοβήθητε τὸν Κύριον
  english_pob_choice: fear the Lord
  chosen_spanish: temed al Señor
  alternatives_spanish:
  - reverenciad al Señor
  - tened temor del Señor
  lexicon: BDAG
  rationale: Modismo bíblico estándar; 'temed al Señor' conserva el matiz reverencial sin sustituirlo por 'reverenciad'.
- source_word: προσέχετε ἑαυτοῖς
  english_pob_choice: watch yourselves
  chosen_spanish: guardaos
  alternatives_spanish:
  - estad atentos
  - tened cuidado de vosotros mismos
  lexicon: BDAG
  rationale: '''Guardaos'' es la forma reflexiva natural en español parenético, conservando el sentido de vigilancia personal.'
- source_word: τῶν πνευμάτων αὐτοῦ
  english_pob_choice: his spirits
  chosen_spanish: sus espíritus
  alternatives_spanish:
  - los espíritus suyos
  lexicon: BDAG
  rationale: πνεῦμα aquí en contexto demonológico claro; minúscula apropiada para espíritus malignos.
