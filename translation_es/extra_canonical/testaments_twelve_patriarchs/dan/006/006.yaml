source:
  edition: Charles 1908 Greek Versions (pages 201-213, Dan source-fix v2)
  text: Ἔσται δὲ ἐν καιρῷ τῆς²¹ ἀνομίας²² *τοῦ Ἰσραὴλ²³ (οὐκ ἔσται)²⁴ ἀφιστάμενος²⁵ *ἀπ᾽ αὐτῶν²⁶ *ὁ Κύριος²⁷, καὶ²⁸ *μετελεύσεται ἐπ᾽ ἔθνει ζητοῦντι τὸ θέλημα αὐτοῦ²⁹, ὅτι *οὐδεὶς τῶν ἀγγέλων ἔσται ἴσος αὐτῷ³⁰.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/dan/006/006.yaml
  text: But in the time of Israel’s lawlessness, the Lord will not depart from them, but will pass over to a nation that seeks his will, for none of the angels will be equal to him.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:55Z'
    unchanged: false
    changes_summary: Tightened 'the lawlessness of Israel' to 'Israel’s lawlessness' for natural English while preserving meaning; otherwise retained the draft as accurate and complete.
translation:
  language: es
  text: Pero en el tiempo de la iniquidad de Israel, el Señor no se apartará de ellos[a], sino que pasará a una nación que busca su voluntad, porque ninguno de los ángeles le será igual.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El paréntesis griego ''(οὐκ ἔσται)'' introduce la negación: el Señor no se apartará. Algunos editores ven aquí signos de tradición textual cristiana sobreimpresa.'
    reason: textual_variant
lexical_decisions:
- source_word: ἀνομία
  english_pob_choice: lawlessness
  chosen_spanish: iniquidad
  alternatives_spanish:
  - transgresión
  - desobediencia a la ley
  lexicon: BDAG
  rationale: '''Iniquidad'' captura mejor que ''falta de ley'' el peso moral-pactual de ἀνομία en contexto profético.'
- source_word: ἀφιστάμενος
  english_pob_choice: will not depart
  chosen_spanish: no se apartará
  alternatives_spanish:
  - no se alejará
  - no se retirará
  lexicon: BDAG
  rationale: Consistente con la elección 'apartarse' para ἀφίστημι en Dan 5; el griego con (οὐκ ἔσται) ἀφιστάμενος produce la negación.
- source_word: μετελεύσεται ἐπ᾽ ἔθνει
  english_pob_choice: will pass over to a nation
  chosen_spanish: pasará a una nación
  alternatives_spanish:
  - se trasladará a una nación
  - transitará a una nación
  lexicon: BDAG
  rationale: μετέρχομαι aquí denota cambio de ámbito de presencia; 'pasar a' es natural y mantiene la fuerza del prefijo μετα-.
- source_word: ζητοῦντι τὸ θέλημα αὐτοῦ
  english_pob_choice: that seeks his will
  chosen_spanish: que busca su voluntad
  alternatives_spanish:
  - que procura su voluntad
  lexicon: BDAG
  rationale: Calco bíblico transparente.
- source_word: οὐδεὶς τῶν ἀγγέλων ἔσται ἴσος αὐτῷ
  english_pob_choice: none of the angels will be equal to him
  chosen_spanish: ninguno de los ángeles le será igual
  alternatives_spanish:
  - ningún ángel le será igual
  - no habrá ángel igual a él
  lexicon: BDAG
  rationale: Estructura partitiva fiel al griego.
translation_notes:
  revision_awareness: POB tensó 'the lawlessness of Israel' a 'Israel's lawlessness'; en español 'la iniquidad de Israel' es ya idiomática, no requiere posesivo proclítico.
  spanish_consistency_notes:
  - ἀνομία → iniquidad
  - ἀφίστημι → apartarse
  - ἔθνος → nación
  - ἄγγελος → ángel
