base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/dan/006/005.yaml
  text: For he himself, the angel of peace, will strengthen Israel so that it will not fall into uttermost evils.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:55Z'
    unchanged: false
    changes_summary: Adjusted the opening to reflect the emphatic subject 'he himself' and removed the unnecessary 'very'; changed 'may not fall' to 'will not fall' to match the infinitive construction; rendered 'evil' as plural 'evils' to better reflect the source.
translation:
  language: es
  text: Pues él mismo, el ángel de la paz[a], fortalecerá a Israel para que no caiga en males extremos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''El ángel de la paz'' (ὁ ἄγγελος τῆς εἰρήνης) es figura recurrente en los Testamentos; identificable con el mediador del v.2.'
    reason: cross_reference
lexical_decisions:
- source_word: Αὐτὸς γὰρ
  english_pob_choice: For he himself
  chosen_spanish: Pues él mismo
  alternatives_spanish:
  - Porque él mismo
  - Pues el propio
  lexicon: BDAG
  rationale: POB enfatizó 'he himself' por αὐτὸς; el español 'él mismo' espeja el énfasis sin sonar redundante.
- source_word: ὁ ἄγγελος τῆς εἰρήνης
  english_pob_choice: the angel of peace
  chosen_spanish: el ángel de la paz
  alternatives_spanish:
  - el ángel pacificador
  lexicon: BDAG
  rationale: Calco bíblico estándar; preserva la figura angelológica titular.
- source_word: ἐνισχύσει
  english_pob_choice: will strengthen
  chosen_spanish: fortalecerá
  alternatives_spanish:
  - dará fuerzas a
  - robustecerá
  lexicon: BDAG
  rationale: Verbo simple en futuro que conserva la función protectora del ángel.
- source_word: εἰς τέλος κακῶν
  english_pob_choice: into uttermost evils
  chosen_spanish: en males extremos
  alternatives_spanish:
  - en el colmo de los males
  - en males últimos
  lexicon: BDAG
  rationale: POB pluralizó 'evils' siguiendo κακῶν (genitivo plural); el español preserva el plural y el matiz superlativo.
translation_notes:
  revision_awareness: 'POB hizo tres cambios: enfático ''he himself'', ''will not fall'' por el infinitivo, y ''evils'' en plural. Espejo los tres en español.'
  spanish_consistency_notes:
  - ἄγγελος → ángel
  - εἰρήνη → paz
  - Ἰσραήλ → Israel
  - κακά → males (plural)
