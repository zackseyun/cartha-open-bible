translation:
  language: es
  text: "En el año ciento veinticinco de su vida[1:1], Dan reunió a su familia y dijo:\n\n\n\n    2. \"Escuchen, hijos de Dan, mis palabras, y presten atención a las palabras de su padre.\n\n\n    3. He probado en mi corazón y en toda mi vida que la verdad con la conducta recta es buena y agradable a Dios, y que la falsedad y la ira son malas, enseñando al hombre toda maldad.\n\n\n    4. Por tanto les confieso hoy, hijos míos, que en mi corazón resolví, respecto a José mi hermano, aquel hombre bueno y verdadero, su muerte.\n\n\n    5. Y me alegraba por su venta, porque su padre lo amaba más que a nosotros.\n\n\n    6. Pues el espíritu de los celos y de la arrogancia me decía: 'Tú también eres su hijo.'\n\n\n    7. Y uno de los espíritus de Beliar cooperaba conmigo, diciendo: 'Toma esta espada y con ella mata a José, y tu padre te amará después que él muera.'\n\n\n    8. Y este era el espíritu de la ira persuadiéndome, que así como un leopardo chupa a un cabrito[1:8], así me incitó a chupar\
    \ a José.\n\n\n    9. Pero el Dios de mis padres[1:9] no permitió que cayera en mis manos, para que yo, hallándolo solo, lo matara y cometiera este acto inicuo, no fuera que se destruyeran dos tribus de Israel.\""
  philosophy: optimal-equivalence
  footnotes:
  - marker: '1:1'
    text: El aviso cronológico de apertura es terso en el testimonio griego y probablemente significa 'en el año ciento veinticinco de su vida' (centésimo vigésimo quinto) en el marco testamentario.
    reason: textual_variant
  - marker: '1:8'
    text: La imagen griega es textualmente difícil. Algunos testimonios preservan una metáfora depredadora más gráfica; el texto principal renderiza el sentido sin sobreestimar un detalle corrupto.
    reason: textual_variant
  - marker: '1:9'
    text: Algunas formas testimoniales leen 'el Dios de mi padre Jacob' en lugar de 'el Dios de mis padres'.
    reason: alternative_reading
lexical_decisions:
- source_word: προσέχετε
  english_pob_choice: pay attention
  chosen_spanish: prestad atención
  alternatives_spanish:
  - atended
  - tened cuidado
  lexicon: BDAG
  rationale: Exhortación imperativa en testamento padre-a-hijos. 'Prestad atención' es fuerte y legible sin sonar arcaico.
- source_word: ἀλήθεια
  english_pob_choice: truth
  chosen_spanish: la verdad
  alternatives_spanish:
  - la veracidad
  lexicon: BDAG
  rationale: El capítulo contrasta la verdad moral con la falsedad como disposiciones éticas, y 'verdad' preserva el sentido moral amplio.
- source_word: δικαιοπραγία
  english_pob_choice: righteous conduct
  chosen_spanish: la conducta recta
  alternatives_spanish:
  - el obrar justo
  - la práctica de la justicia
  lexicon: LSJ
  rationale: El compuesto apunta a la práctica de la justicia, no meramente a una cualidad abstracta. 'Conducta recta' mantiene la fuerza ética y el paralelismo con 'verdad'.
- source_word: ψεῦδος
  english_pob_choice: falsehood
  chosen_spanish: la falsedad
  alternatives_spanish:
  - la mentira
  lexicon: BDAG
  rationale: El sustantivo abstracto pareja bien con 'verdad' y se ajusta al estilo de catálogo de vicios mejor que el 'mentira' singular.
- source_word: θυμός
  english_pob_choice: anger
  chosen_spanish: la ira
  alternatives_spanish:
  - la cólera
  - el enojo
  lexicon: BDAG
  rationale: Término clave de vicio en este testamento. 'Ira' es la rendición castellana más natural y estable, conservando la intensidad moral del pasaje.
- source_word: ζῆλος
  english_pob_choice: jealousy
  chosen_spanish: los celos
  alternatives_spanish:
  - la envidia
  - el celo
  lexicon: BDAG
  rationale: En contexto Dan resiente a José por el favoritismo paterno. 'Celos' (en plural en castellano) capta mejor el matiz relacional y posesivo aquí.
- source_word: ἀλαζονεία
  english_pob_choice: arrogance
  chosen_spanish: la arrogancia
  alternatives_spanish:
  - la jactancia
  - la soberbia
  lexicon: BDAG
  rationale: El término denota presunción auto-exaltada. 'Arrogancia' captura el vicio claramente.
- source_word: πνεύματα τοῦ Βελίαρ
  english_pob_choice: spirits of Beliar
  chosen_spanish: los espíritus de Beliar
  alternatives_spanish:
  - los espíritus de Belial
  lexicon: LSJ
  rationale: El testimonio griego tiene el nombre propio en esta forma. Mantener 'Beliar' refleja el texto fuente en lugar de normalizar a 'Belial'.
- source_word: ἄνελε
  english_pob_choice: kill
  chosen_spanish: mata
  alternatives_spanish:
  - da muerte
  - elimina
  lexicon: BDAG
  rationale: El mandato es directo y homicida. 'Mata' preserva la directez sin arcaísmos.
- source_word: πεῖθόν με
  english_pob_choice: persuading me
  chosen_spanish: persuadiéndome
  alternatives_spanish:
  - urgiéndome
  - convenciéndome
  lexicon: BDAG
  rationale: El participio muestra presión interna continuada del espíritu de la ira.
- source_word: πάρδαλις
  english_pob_choice: leopard
  chosen_spanish: leopardo
  alternatives_spanish:
  - pantera
  lexicon: LSJ
  rationale: La referencia animal estándar es 'leopardo'; preserva la imagen depredadora vívida.
- source_word: ἔριφος
  english_pob_choice: young goat
  chosen_spanish: cabrito
  alternatives_spanish:
  - chivito
  lexicon: BDAG
  rationale: '''Cabrito'' es transparente para lectores modernos hispanohablantes.'
- source_word: ἐκμυζῆσαι
  english_pob_choice: destroy/suck out
  chosen_spanish: chupar la sangre
  alternatives_spanish:
  - succionar
  - drenar
  lexicon: LSJ
  rationale: La forma textual es difícil y metafórica en contexto. 'Chupar la sangre' transmite la imagen depredadora-vampírica del leopardo aplicada al fratricidio.
- source_word: ἀνόμημα
  english_pob_choice: lawless deed
  chosen_spanish: acto inicuo
  alternatives_spanish:
  - crimen
  - acto malvado
  lexicon: BDAG
  rationale: El término marca el asesinato contemplado como transgresión, no meramente como mal hacer. 'Acto inicuo' preserva el peso moral-legal.
- source_word: λυθῶσι δύο φυλαί
  english_pob_choice: two tribes be destroyed
  chosen_spanish: se destruyeran dos tribus
  alternatives_spanish:
  - se disolvieran dos tribus
  - fueran deshechas dos tribus
  lexicon: BDAG
  rationale: La cláusula es difícil, pero el sentido es que este acto traería ruina afectando la integridad tribal de Israel. 'Se destruyeran' comunica la gravedad claramente.
theological_decisions:
- issue: Referencia a Beliar como poder maligno personal
  chosen_reading: Traducir como 'uno de los espíritus de Beliar' y conservar el nombre propio.
  alternative_readings:
  - uno de los espíritus malignos
  - uno de los espíritus de Belial
  rationale: El griego nombra explícitamente a Beliar/Belial. La traducción preserva el marco demonológico del testamento en lugar de reducirlo a un impulso maligno impersonal.
  doctrine_reference: Preservar la tensión teológica del texto fuente y su especificidad en lugar de suavizarla.
- issue: Restricción divina en la intención fallida de Dan contra José
  chosen_reading: Renderizar la acción de Dios como no permitir que José cayera en las manos de Dan.
  alternative_readings:
  - no le permitió caer en mis manos
  - no lo arrojó a mis manos
  rationale: Esto mantiene a la vista tanto la soberanía divina como la culpabilidad de Dan, conformándose a la lógica moral del griego.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: El POB inglés pasó por una revisión que ajustó 'sayings' a 'words' (ῥήμασι) en v. 2, 'crushes' a 'devours' (luego revisado a 'sucks out') en v. 8, y 'so that' a 'that' en v. 9. La traducción española sigue las rendiciones revisadas más recientes y mantiene la coherencia léxica con los archivos por verso.
  spanish_consistency_notes:
  - ἀλήθεια ↔ ψεῦδος → verdad ↔ falsedad (paralelismo virtud/vicio)
  - θυμός → ira (consistente en todo el capítulo)
  - ζῆλος → celos (matiz relacional posesivo)
  - Βελίαρ → Beliar (preservar forma griega)
  - λόγος/ῥῆμα → palabra (consistencia post-revisión)
  - πνεῦμα → espíritu (categoría demonológica)
  - doble notificación de muerte de José y resistencia divina preservada
