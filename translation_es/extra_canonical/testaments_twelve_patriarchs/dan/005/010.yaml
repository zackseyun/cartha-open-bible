id: T12P.DAN.5.10
reference: Testament of Dan 5:10
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 201-213, Dan source-fix v2)
  text: Καὶ ἀνατελεῖ ὑμῖν *ἐκ τῆς φυλῆς [Ἰούδα καὶ] τοῦ Λευὶ τὸ σωτήριον Κυρίου⁸³, *αὐτὸς γὰρ⁸⁴ ποιήσει πρὸς τὸν Βελίαρ πόλεμον⁸⁵, καὶ τὴν ἐκδίκησιν τοῦ νίκους δώσει τοῖς⁸⁶ †πατράσιν⁸⁷ ὑμῶν⁸⁸.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/dan/005/010.yaml
  text: And for you the salvation of the Lord will arise from the tribe of Judah and Levi. For he himself will make war against Beliar, and he will grant the vengeance of victory to your fathers.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:37Z'
    unchanged: false
    changes_summary: Removed the second 'of' before 'Levi' for a more natural rendering of the coordinated phrase 'from the tribe of Judah and Levi'; otherwise retained the draft as accurate and complete.
translation:
  language: es
  text: Y se levantará para vosotros, de la tribu de Judá y Leví[a], la salvación del Señor[b]; pues él mismo hará guerra contra Beliar, y dará la venganza de la victoria a vuestros padres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos leen 'de la tribu de Judá y de Leví'; el 'Judá y' entre corchetes refleja variación textual, pero la doble referencia tribal está bien atestiguada en la tradición.
    reason: textual_variant
  - marker: b
    text: La frase griega τὸ σωτήριον Κυρίου puede entenderse como 'la salvación del Señor' (acto salvífico) o como 'el agente salvador del Señor' (figura mesiánica); se conserva la ambigüedad.
    reason: theological_note
lexical_decisions:
- source_word: ἀνατελεῖ
  english_pob_choice: will arise
  chosen_spanish: se levantará
  alternatives_spanish:
  - surgirá
  - amanecerá
  lexicon: BDAG
  rationale: ἀνατέλλω se usa para el surgir astral o mesiánico; 'se levantará' conserva ese matiz.
- source_word: τὸ σωτήριον Κυρίου
  english_pob_choice: the salvation of the Lord
  chosen_spanish: la salvación del Señor
  alternatives_spanish:
  - el Salvador del Señor
  - lo salvador del Señor
  lexicon: BDAG
  rationale: Como en el inglés POB, se preserva la ambigüedad entre acto salvífico y figura salvadora; 'la salvación del Señor' es la opción más abierta.
- source_word: Βελίαρ
  english_pob_choice: Beliar
  chosen_spanish: Beliar
  alternatives_spanish:
  - Belial
  lexicon: Greek witness tradition
  rationale: Se conserva la forma griega del testigo, no se normaliza al hebreo 'Belial'.
- source_word: ἐκδίκησιν τοῦ νίκους
  english_pob_choice: the vengeance of victory
  chosen_spanish: la venganza de la victoria
  alternatives_spanish:
  - la reivindicación de la victoria
  - la venganza victoriosa
  lexicon: LSJ
  rationale: Frase difícil; conservo su carácter comprimido como hace el POB.
theological_decisions:
- issue: Figura mesiánica/soteriológica que surge de Judá y Leví
  chosen_reading: Renderizar τὸ σωτήριον Κυρίου como 'la salvación del Señor', preservando la dualidad tribal en el texto principal.
  alternative_readings:
  - '''el Salvador del Señor'''
  - Lectura cristológica armonizada
  rationale: El griego es de textura abierta; se conserva la ambigüedad sin forzar una lectura cristológica más estrecha.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: POB quitó la segunda preposición 'de' antes de 'Levi' por naturalidad; en español 'de Judá y Leví' funciona naturalmente sin repetir 'de'.
  spanish_consistency_notes:
  - Βελίαρ → Beliar (sin normalizar)
  - Κύριος → Señor
  - ἐκδίκησις → venganza/reivindicación
