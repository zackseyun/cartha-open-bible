translation:
  language: es
  text: Y tomará el cautiverio de Beliar, las almas de los santos[a], y volverá los corazones desobedientes al Señor; y dará paz eterna a los que lo invocan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
