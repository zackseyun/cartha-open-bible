base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/dan/005/009.yaml
  text: And so, having returned to the Lord, you will receive mercy, and he will bring you into his sanctuary and give you peace.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:36Z'
    unchanged: false
    changes_summary: Revised 'when you return' to 'having returned' to reflect the participial construction more closely; removed the repeated 'he will' before 'give you peace' for smoother English while preserving the Greek sense.
translation:
  language: es
  text: Y así, habiéndoos vuelto al Señor[a], recibiréis misericordia, y él os llevará a su santuario y os dará paz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego usa un participio aoristo (ἐπιστρέψαντες), 'habiéndoos vuelto', no una cláusula temporal con 'cuando'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιστρέψαντες
  english_pob_choice: having returned
  chosen_spanish: habiéndoos vuelto
  alternatives_spanish:
  - cuando os volváis
  - tras volveros
  lexicon: BDAG
  rationale: Construcción participial que refleja el aoristo participio griego, evitando la lectura temporal floja del 'cuando' inglés que la revisión POB corrigió.
- source_word: Κύριον
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Soberano
  lexicon: BDAG
  rationale: Renderizado estándar de Κύριος en contexto del NT/pseudoepígrafos.
- source_word: ἐλεηθήσεσθε
  english_pob_choice: you will receive mercy
  chosen_spanish: recibiréis misericordia
  alternatives_spanish:
  - se os tendrá misericordia
  - seréis compadecidos
  lexicon: BDAG
  rationale: Mantiene el sujeto divino implícito y el sentido pasivo natural en español.
- source_word: ἁγίασμα
  english_pob_choice: sanctuary
  chosen_spanish: santuario
  alternatives_spanish:
  - lugar santo
  - santidad
  lexicon: BDAG
  rationale: ἁγίασμα como lugar consagrado; 'santuario' es el equivalente cultual habitual.
translation_notes:
  revision_awareness: POB revisó 'when you return' → 'having returned' para reflejar el participio aoristo; espejo esa decisión en español con 'habiéndoos vuelto'.
  spanish_consistency_notes:
  - Κύριος → Señor
  - ἐπιστρέφω → volverse (a) cuando es retorno espiritual
  - ἁγίασμα → santuario
