source:
  edition: Charles 1908 Greek Versions (pages 201-213, Dan source-fix v2)
  text: Καὶ *ἀναπαύσονται ἐν Ἐδὲμ ἅγιοι⁹⁵, καὶ ἐπὶ *τῆς νέας⁹⁶ Ἱερουσαλὴμ εὐφρανθήσονται δίκαιοι, *ἥτις ἐστι δόξα θεοῦ αἰώνιος⁹⁷.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/dan/005/012.yaml
  text: And the holy ones will rest in Eden, and the righteous will rejoice over the new Jerusalem, which is the eternal glory of God.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:37Z'
    unchanged: false
    changes_summary: Changed “in the new Jerusalem” to “over the new Jerusalem” to reflect ἐπὶ more closely, and replaced “for it is” with “which is” to match ἥτις more directly.
translation:
  language: es
  text: Y los santos descansarán en Edén, y los justos se regocijarán sobre la nueva Jerusalén[a], la cual es la gloria eterna de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''La nueva Jerusalén'' es una imagen escatológica de Sión restaurada y glorificada, no la ciudad histórica en su condición presente.'
    reason: cultural_note
lexical_decisions:
- source_word: ἀναπαύσονται
  english_pob_choice: will rest
  chosen_spanish: descansarán
  alternatives_spanish:
  - hallarán reposo
  - reposarán
  lexicon: BDAG
  rationale: Futuro simple que conserva la promesa escatológica.
- source_word: ἐπὶ τῆς νέας Ἱερουσαλήμ
  english_pob_choice: over the new Jerusalem
  chosen_spanish: sobre la nueva Jerusalén
  alternatives_spanish:
  - en la nueva Jerusalén
  - respecto de la nueva Jerusalén
  lexicon: BDAG
  rationale: POB revisó 'in' a 'over' para reflejar ἐπί + genitivo; en español 'sobre' captura el mismo matiz.
- source_word: ἥτις
  english_pob_choice: which is
  chosen_spanish: la cual es
  alternatives_spanish:
  - pues ella es
  - la que es
  lexicon: BDAG
  rationale: POB cambió 'for it is' a 'which is' para ajustarse a ἥτις (relativo); 'la cual' es el equivalente español.
- source_word: δόξα θεοῦ αἰώνιος
  english_pob_choice: the eternal glory of God
  chosen_spanish: la gloria eterna de Dios
  alternatives_spanish:
  - la gloria perdurable de Dios
  lexicon: BDAG
  rationale: Calco bíblico estándar.
translation_notes:
  revision_awareness: 'POB hizo dos cambios clave: ''in'' → ''over'' (refleja ἐπί) y ''for it is'' → ''which is'' (refleja ἥτις). Ambos se reproducen en el español: ''sobre'' y ''la cual es''.'
  spanish_consistency_notes:
  - Ἱερουσαλήμ → Jerusalén
  - Ἐδέμ → Edén
  - δόξα → gloria
