source:
  edition: Charles 1908 Greek Versions (pages 201-213, Dan source-fix v2)
  text: Καὶ οὐκέτι ὑπομενεῖ⁹⁸ Ἱερουσαλὴμ ἐρήμωσιν *οὐδὲ αἰχμαλωτισθήσεται Ἰσραήλ⁹⁹, ὅτι¹⁰⁰ Κύριος ἔσται¹⁰¹ *ἐν μέσῳ¹⁰² αὐτῆς¹⁰³ [τοῖς ἀνθρώποις συναναστρεφόμενος]¹⁰⁴ καὶ §¹⁰⁵ Ἅγιος Ἰσραὴλ βασιλεύων¹⁰⁶ ἐπ᾽ αὐτῆς¹⁰⁷ [ἐν *ταπεινώσει καὶ πτωχείᾳ¹⁰⁸, καὶ ὁ πιστεύων *ἐπ᾽ αὐτῷ¹⁰⁹ *βασιλεύσει ἐν τοῖς ἀνθρώποις ἐν ἀληθείᾳ¹¹⁰].
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/dan/005/013.yaml
  text: And Jerusalem will no longer endure desolation, nor will Israel be taken captive, because the Lord will be in her midst, and the Holy One of Israel reigning over her.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:38Z'
    unchanged: false
    changes_summary: Adjusted the final clause to reflect the participial Greek more closely by rendering it as 'the Holy One of Israel reigning over her' rather than supplying 'will reign.'
translation:
  language: es
  text: Y Jerusalén ya no padecerá desolación, ni Israel será llevado cautivo, porque el Señor estará en medio de ella[a], y el Santo de Israel reinando sobre ella[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos testigos añaden 'conviviendo con los hombres' tras 'en medio de ella'; suele considerarse expansión secundaria.
    reason: textual_variant
  - marker: b
    text: Algunos testigos prosiguen con frases adicionales sobre el Señor habitando entre los hombres y reinando 'en humildad y pobreza', y sobre el que cree en él reinando entre los hombres en verdad; suelen considerarse expansiones tardías y no se incluyen en el texto principal.
    reason: textual_variant
lexical_decisions:
- source_word: οὐκέτι ὑπομενεῖ ... ἐρήμωσιν
  english_pob_choice: will no longer endure desolation
  chosen_spanish: ya no padecerá desolación
  alternatives_spanish:
  - ya no soportará desolación
  - no sufrirá más desolación
  lexicon: BDAG
  rationale: '''Padecer'' transmite la dimensión pasiva de soportar un sufrimiento que el verbo griego implica aquí.'
- source_word: αἰχμαλωτισθήσεται
  english_pob_choice: will be taken captive
  chosen_spanish: será llevado cautivo
  alternatives_spanish:
  - será cautivado
  - será llevado al cautiverio
  lexicon: BDAG
  rationale: Pasiva natural que se enlaza con αἰχμαλωσία → cautiverio.
- source_word: ἐν μέσῳ αὐτῆς
  english_pob_choice: in her midst
  chosen_spanish: en medio de ella
  alternatives_spanish:
  - en su medio
  - dentro de ella
  lexicon: BDAG
  rationale: Mantiene la imagen de la ciudad personificada y el registro elevado.
- source_word: Ἅγιος Ἰσραήλ ... βασιλεύων
  english_pob_choice: the Holy One of Israel reigning
  chosen_spanish: el Santo de Israel reinando
  alternatives_spanish:
  - el Santo de Israel, que reina
  lexicon: BDAG
  rationale: POB ajustó la cláusula para reflejar el participio griego (no 'will reign'); 'reinando' espeja esa decisión sintácticamente.
theological_decisions:
- issue: Material eclesiológico/escatológico ampliado entre corchetes
  chosen_reading: Traducir el texto griego principal sin incorporar las expansiones entre corchetes en el cuerpo principal.
  alternative_readings:
  - Incluir todo el material entre corchetes en el cuerpo principal
  - Excluir toda la sección como secundaria
  rationale: El testigo presenta complejidad textual; la tarea del traductor es renderizar el texto honestamente y marcar la inestabilidad en notas más que armonizar o suprimir silenciosamente.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: 'POB cambió ''will reign over her'' por ''reigning over her'' para reflejar el participio griego βασιλεύων. Conservo el participio en español: ''reinando sobre ella''.'
  spanish_consistency_notes:
  - Ἱερουσαλήμ → Jerusalén
  - Ἰσραήλ → Israel
  - Ἅγιος Ἰσραήλ → el Santo de Israel
