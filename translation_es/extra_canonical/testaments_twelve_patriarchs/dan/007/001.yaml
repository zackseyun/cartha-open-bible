  text: VII. Καὶ ταῦτα εἰπὼν *καταφιλήσας αὐτοὺς¹ *ὕπνωσεν †ὕπνῳ καλῷ².
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/dan/007/001.yaml
  text: And having said these things, he kissed them affectionately and fell asleep a good sleep.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:09Z'
    unchanged: false
    changes_summary: Replaced 'when he had said' with 'having said' for closer alignment to the participle, and simplified 'fell asleep in a good sleep' to 'fell asleep a good sleep' for more natural yet still literal English.
translation:
  language: es
  text: Y habiendo dicho estas cosas, los besó afectuosamente y se durmió un buen sueño[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente 'se durmió un buen sueño,' un eufemismo reverente para la muerte en la literatura testamentaria.
    reason: lexical_alternative
lexical_decisions:
- source_word: καταφιλήσας
  english_pob_choice: kissed ... affectionately
  chosen_spanish: los besó afectuosamente
  alternatives_spanish:
  - los besó repetidamente
  - los abrazó con besos
  lexicon: LSJ
  rationale: El verbo compuesto intensifica la base φιλέω; 'afectuosamente' preserva la calidez sin sobrespecificar repetición.
- source_word: ὕπνωσεν ὕπνῳ καλῷ
  english_pob_choice: fell asleep a good sleep
  chosen_spanish: se durmió un buen sueño
  alternatives_spanish:
  - durmió un buen sueño
  - se durmió apaciblemente
  lexicon: LSJ
  rationale: La expresión doblada de sueño es idiomática y eufemística para la muerte en literatura testamentaria; mantenerla preserva la textura retórica y la fuerza eufemística mejor que un plano 'murió.'
- source_word: εἰπὼν
  english_pob_choice: having said
  chosen_spanish: habiendo dicho
  alternatives_spanish:
  - cuando hubo dicho
  lexicon: BDAG
  rationale: Sigue el revision_pass POB que prefirió el participio 'having said' sobre la cláusula temporal.
translation_notes:
  revision_awareness: El POB pasó de 'when he had said these things... fell asleep in a good sleep' a 'having said these things... fell asleep a good sleep' por mayor cercanía al participio griego.
  spanish_consistency_notes:
  - Eufemismo de muerte preservado, no aplanado a 'murió'.
