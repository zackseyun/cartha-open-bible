translation:
  language: es
  text: Y sus hijos lo enterraron. Y después de esto llevaron sus huesos[a] al lugar donde estaban Abraham, Isaac y Jacob.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Llevaron sus huesos'' probablemente se refiere a una posterior reinhumación junto con los patriarcas.'
    reason: cultural_note
lexical_decisions:
- source_word: ἔθαψαν αὐτὸν οἱ υἱοὶ αὐτοῦ
  english_pob_choice: his sons buried him
  chosen_spanish: sus hijos lo enterraron
  alternatives_spanish:
  - sus hijos lo sepultaron
  lexicon: LSJ
  rationale: '''Enterrar'' es el verbo más natural en español neutro latinoamericano; ''sepultar'' funcionaría pero es más solemne.'
- source_word: ἀπήνεγκαν τὰ ὀστᾶ αὐτοῦ
  english_pob_choice: carried his bones
  chosen_spanish: llevaron sus huesos
  alternatives_spanish:
  - transportaron sus huesos
  - subieron sus huesos
  lexicon: LSJ
  rationale: Sigue el revision_pass POB que quitó 'up' por no exigirlo claramente el griego; el sentido apunta a la traslación de restos para reinhumación con los patriarcas.
- source_word: ἔνθα ἦν
  english_pob_choice: to the place where ... were
  chosen_spanish: al lugar donde estaban
  alternatives_spanish:
  - donde estaban
  - allí donde estaban
  lexicon: LSJ
  rationale: Rendido natural en español que aún refleja la fuerza locativa que introduce el lugar de sepultura patriarcal.
translation_notes:
  revision_awareness: Versículo no requirió cambios en revisión POB; se sigue la lectura aprobada.
  spanish_consistency_notes:
  - Nombres patriarcales sin traducir.
  - '''Y'' al inicio para preservar el polisíndeton testamentario.'
