    changes_summary: 'Adjusted several renderings for closer lexical accuracy and completeness: changed ''observe his law'' to ''keep his law''; ''Stand away from anger'' to ''Depart from anger''; ''dwell among you'' to ''dwell in you''; preserved the emphatic negation in v.2 (''war will certainly not prevail''); removed interpretive ''to anger'' in v.4; revised v.5 to reflect the Greek more closely without adding ''through''; changed v.12 to ''rejoice over the new Jerusalem, which is the eternal glory of God'' to account for ἐπί and ἥτις.'
translation:
  language: es
  text: '1 Por tanto[a], hijos míos, guardad el mandamiento del Señor y observad su ley. Apartaos de la ira y aborreced la falsedad, para que el Señor habite en vosotros y Beliar huya de vosotros.



    2 Hablad verdad, cada uno con su prójimo, y de ningún modo caeréis en cólera y tumultos; antes bien, estaréis en paz, teniendo al Dios de paz[b], y de ninguna manera prevalecerá guerra contra vosotros.



    3 Amad al Señor durante toda vuestra vida, y unos a otros con corazón sincero.



    4 Yo sé que en los últimos días os apartaréis del Señor, y provocaréis a Leví, y os alinearéis contra Judá; pero no podréis con ellos. Porque un ángel del Señor guía a ambos, pues por ellos se mantendrá Israel.



    5 Y cuando os apartéis del Señor, caminando en toda maldad, haréis las abominaciones de las naciones, prostituyéndoos con mujeres impías, y los espíritus de la maldad obrando entre vosotros en todo mal.



    6 Pues he leído en el libro de Enoc el justo, y supe que vuestro príncipe es Satanás, y que los espíritus de la maldad y de la soberbia asistirán a los hijos de Leví, para hacerlos pecar delante del Señor.



    7 Y mis hijos se acercarán a Leví y pecarán juntamente con ellos en todo. Pero los hijos de Judá serán codiciosos, arrebatando lo ajeno como leones.



    8 Por eso seréis llevados con ellos al cautiverio, y allí recibiréis todas las plagas de Egipto y todas las maldades de las naciones.



    9 Y así, habiéndoos vuelto al Señor, recibiréis misericordia, y él os llevará a su santuario y os dará paz.



    10 Y se levantará para vosotros, de la tribu de Judá y de Leví[c], la salvación del Señor; pues él mismo hará guerra contra Beliar, y dará la venganza de la victoria a vuestros padres.



    11 Y tomará el cautiverio de Beliar, las almas de los santos[d], y volverá los corazones desobedientes al Señor; y dará paz eterna a los que lo invocan.



    12 Y los santos descansarán en Edén, y los justos se regocijarán sobre la nueva Jerusalén[e], la cual es la gloria eterna de Dios.



    13 Y Jerusalén ya no padecerá desolación, ni Israel será llevado cautivo[f], porque el Señor estará en medio de ella, y el Santo de Israel reinando sobre ella.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La referencia al 'libro de Enoc' (v.6) es explícita en el testigo griego y probablemente alude a tradiciones enóquicas conocidas en el judaísmo del Segundo Templo.
    reason: cross_reference
  - marker: b
    text: Algunos testigos añaden 'con ellos' tras 'seréis llevados' (v.8), haciendo aún más explícita la asociación con Leví y Judá.
    reason: textual_variant
  - marker: c
    text: Algunos manuscritos leen 'de la tribu de Judá y de Leví'; el 'Judá y' entre corchetes refleja variación textual, pero la doble referencia tribal está bien atestiguada en la tradición.
    reason: textual_variant
  - marker: d
    text: La frase 'las almas de los santos' es textualmente incierta en algunas ediciones, pero aclara que la liberación de Beliar concierne a personas mantenidas en cautiverio.
    reason: textual_variant
  - marker: e
    text: '''La nueva Jerusalén'' es una imagen escatológica de Sión restaurada y glorificada, no la ciudad histórica en su condición presente.'
    reason: cultural_note
  - marker: f
    text: Algunos testigos prosiguen con frases adicionales sobre el Señor habitando entre los hombres y reinando en humildad y pobreza, y sobre el que cree en él reinando entre los hombres en verdad; suelen considerarse expansiones tardías y no se incluyen en el texto principal.
    reason: textual_variant
lexical_decisions:
- source_word: φυλάξατε / τηρήσατε
  english_pob_choice: keep / observe
  chosen_spanish: guardad / observad
  alternatives_spanish:
  - custodiad / guardad
  - guardad / guardad
  lexicon: BDAG
  rationale: Par de verbos para conservar el paralelismo retórico entre guardar el mandamiento y observar la ley sin sonar mecánicamente repetitivo.
- source_word: θυμός
  english_pob_choice: anger
  chosen_spanish: ira
  alternatives_spanish:
  - enojo
  - cólera
  lexicon: BDAG
  rationale: '''Ira'' es el término más natural y con peso moral en español parenético.'
- source_word: ψεῦδος
  english_pob_choice: falsehood
  chosen_spanish: falsedad
  alternatives_spanish:
  - mentira
  - engaño
  lexicon: BDAG
  rationale: Categoría de vicio más amplia que una sola enunciación; 'falsedad' contrasta éticamente con la verdad.
- source_word: Βελίαρ
  english_pob_choice: Beliar
  chosen_spanish: Beliar
  alternatives_spanish:
  - Belial
  lexicon: Greek witness tradition
  rationale: Se preserva la forma griega del testigo, no se normaliza al hebreo 'Belial'.
- source_word: ἀλήθειαν φθέγγεσθε
  english_pob_choice: Speak truth
  chosen_spanish: Hablad verdad
  alternatives_spanish:
  - Decid la verdad
  - Pronunciad verdad
  lexicon: BDAG
  rationale: Imperativo compacto que conserva el tono exhortativo directo.
- source_word: μῆνις
  english_pob_choice: wrath
  chosen_spanish: cólera
  alternatives_spanish:
  - furor
  - rabia
  lexicon: LSJ
  rationale: Término más fuerte que el de v.1 para reflejar la dicción elevada y el peligro de la hostilidad destructiva.
- source_word: ταραχαί
  english_pob_choice: tumults
  chosen_spanish: tumultos
  alternatives_spanish:
  - disturbios
  - alborotos
  lexicon: BDAG
  rationale: El plural sugiere convulsiones sociales, no mera ansiedad interior; 'tumultos' conserva ese sentido público y conflictivo.
- source_word: κατισχύσει
  english_pob_choice: prevail against
  chosen_spanish: prevalecerá contra
  alternatives_spanish:
  - vencerá a
  - podrá más que
  lexicon: BDAG
  rationale: Renderizado idiomático estándar en contextos de conflicto.
- source_word: ἀποστήσεσθε
  english_pob_choice: depart
  chosen_spanish: apartaros
  alternatives_spanish:
  - alejaros
  - desviaros
  lexicon: BDAG
  rationale: '''Apartarse'' conserva la advertencia testamental sin importar lenguaje técnico de apostasía posterior.'
- source_word: προσοχθιεῖτε
  english_pob_choice: provoke
  chosen_spanish: provocaréis
  alternatives_spanish:
  - ofenderéis
  - irritaréis
  lexicon: LSJ
  rationale: El verbo implica causar vejación o irritación; este renderizado hace explícita la hostilidad relacional.
- source_word: παρατάξεσθε
  english_pob_choice: array yourselves against
  chosen_spanish: os alinearéis contra
  alternatives_spanish:
  - os pondréis en orden de batalla contra
  - haréis frente a
  lexicon: LSJ
  rationale: La imagen militar es explícita en el griego y no debe diluirse en una oposición genérica.
- source_word: ἐν πάσῃ κακίᾳ πορευόμενοι
  english_pob_choice: walking in every wickedness
  chosen_spanish: caminando en toda maldad
  alternatives_spanish:
  - andando en todo mal
  - viviendo en toda maldad
  lexicon: BDAG
  rationale: Conserva el modismo del 'caminar' moral común al discurso ético judío.
- source_word: ἐκπορνεύοντες
  english_pob_choice: prostituting yourselves
  chosen_spanish: prostituyéndoos
  alternatives_spanish:
  - fornicando
  - entregándoos a la inmoralidad
  lexicon: BDAG
  rationale: El verbo es más fuerte y vívido que un término genérico de pecado sexual; preserva la fuerza degradante del griego.
- source_word: γυναιξὶν ἀνόμων
  english_pob_choice: lawless women
  chosen_spanish: mujeres impías
  alternatives_spanish:
  - mujeres sin ley
  - mujeres inicuas
  lexicon: BDAG
  rationale: '''Impías'' captura la caracterización moral-legal sin sonar arcaico; ''sin ley'' resulta literal pero menos natural en cadena de vicios.'
- source_word: πλεονεξία
  english_pob_choice: greedy
  chosen_spanish: codiciosos
  alternatives_spanish:
  - avariciosos
  - ávidos
  lexicon: BDAG
  rationale: Forma adjetival natural en español que retiene el vicio de la avidez.
- source_word: αἰχμαλωσία
  english_pob_choice: captivity
  chosen_spanish: cautiverio
  alternatives_spanish:
  - cautividad
  - exilio
  lexicon: BDAG
  rationale: El sustantivo denota naturalmente ser llevado cautivo; 'cautiverio' preserva la fuerza punitiva.
- source_word: ἐλεηθήσεσθε
  english_pob_choice: you will receive mercy
  chosen_spanish: recibiréis misericordia
  alternatives_spanish:
  - se os tendrá misericordia
  - seréis compadecidos
  lexicon: BDAG
  rationale: Sentido pasivo natural en español manteniendo la misericordia divina como centro.
- source_word: τὸ σωτήριον Κυρίου
  english_pob_choice: the salvation of the Lord
  chosen_spanish: la salvación del Señor
  alternatives_spanish:
  - lo salvador del Señor
  - el Salvador del Señor
  lexicon: BDAG
  rationale: Conserva la ambigüedad entre acto salvífico y figura salvadora; la frase queda amplia en el texto principal.
- source_word: ἐκδίκησιν τοῦ νίκους
  english_pob_choice: the vengeance of victory
  chosen_spanish: la venganza de la victoria
  alternatives_spanish:
  - la reivindicación de la victoria
  - la venganza victoriosa
  lexicon: LSJ
  rationale: Frase difícil; conserva su carácter forzado y comprimido sin sobreexplicarla.
- source_word: ἀπειθεῖς καρδίας
  english_pob_choice: disobedient hearts
  chosen_spanish: corazones desobedientes
  alternatives_spanish:
  - corazones rebeldes
  - corazones tercos
  lexicon: BDAG
  rationale: Mejor capta el sentido moral y de pacto del rechazo.
- source_word: ἐπικαλουμένοις αὐτόν
  english_pob_choice: those who call on him
  chosen_spanish: los que lo invocan
  alternatives_spanish:
  - quienes lo invocan
  - los que claman a él
  lexicon: BDAG
  rationale: Modismo bíblico estándar, claro y teológicamente resonante.
- source_word: ἡ νέα Ἱερουσαλήμ
  english_pob_choice: the new Jerusalem
  chosen_spanish: la nueva Jerusalén
  alternatives_spanish:
  - Nueva Jerusalén
  lexicon: BDAG
  rationale: Adjetivo en minúscula dentro de oración corrida, español natural que preserva la designación escatológica.
- source_word: ἐν μέσῳ αὐτῆς
  english_pob_choice: in her midst
  chosen_spanish: en medio de ella
  alternatives_spanish:
  - en su medio
  - dentro de ella
  lexicon: BDAG
  rationale: Mantiene la imagen de ciudad personificada y el registro elevado.
theological_decisions:
- issue: Referencia a Satanás y a los espíritus de la maldad en vv. 5–7
  chosen_reading: Traducir el lenguaje demonológico de manera directa como parte del testigo griego.
  alternative_readings:
  - Desmitologizar como impulsos personificados del mal
  - Tratar como secundario y excluir del texto principal
  rationale: Las advertencias éticas del capítulo están entrelazadas con agencia sobrenatural explícita. La transparencia exige traducir el testigo tal como se presenta, no reducirlo a metáfora.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
- issue: Figura mesiánica/soteriológica en v. 10 que surge de Judá y Leví
  chosen_reading: Renderizar τὸ σωτήριον Κυρίου como 'la salvación del Señor' y preservar la dualidad tribal en el texto principal.
  alternative_readings:
  - '''el Salvador del Señor'''
  - Una lectura mesiánica armonizada con formulaciones cristianas posteriores
  rationale: La frase griega es de textura abierta; la dualidad Judá–Leví es esencial a la lógica del testamento. Se preserva la ambigüedad sin forzar una lectura cristológica.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
- issue: Material escatológico probablemente interpolado o expandido en vv. 10–13
  chosen_reading: Traducir el texto griego principal de manera llana, anotando las expansiones entre corchetes como variantes textuales en lugar de incorporarlas al texto principal.
  alternative_readings:
  - Incluir todo el material entre corchetes en el texto principal
  - Excluir toda la sección como secundaria
  rationale: El testigo presenta complejidad textual; la tarea del traductor es renderizar el texto honestamente y marcar la inestabilidad en notas más que armonizar o eliminar silenciosamente.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: 'Espejo las decisiones de la revisión POB: ''keep his law'' (v.1), ''depart from anger'' (v.1), ''dwell in you'' (v.1), negación enfática ''de ninguna manera prevalecerá'' (v.2), retiro de ''a ira'' (v.4), v.5 sin ''a través de'', y v.12 con ''sobre la nueva Jerusalén, la cual es''.'
  spanish_consistency_notes:
  - Κύριος → Señor
  - Βελίαρ → Beliar
  - θεός → Dios
  - πνεῦμα → espíritu/Espíritu por contexto (aquí espíritus de la maldad)
  - ψυχή → alma
  - ἔθνη → naciones
  - θυμός → ira (v.1) / cólera (v.2 μῆνις)
  - ἀποστήσεσθε → apartarse (no apostatar)
  - Ἱερουσαλήμ → Jerusalén
