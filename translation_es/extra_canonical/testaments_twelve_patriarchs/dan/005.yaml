source:
  edition: Charles 1908 Greek Versions (pages 201-213, Dan source-fix v2)
  text: V. Φυλάξατε¹ οὖν, *τέκνα μου², *τὴν ἐντολὴν³ τοῦ⁴ Κυρίου καὶ τὸν νόμον αὐτοῦ τηρήσατε⁵· ἀπόστητε⁶ ἀπὸ τοῦ⁷ θυμοῦ⁸, καὶ μισήσατε⁹ τὸ ψεῦδος, ἵνα¹⁰ *Κύριος κατοικήσει ἐν ὑμῖν¹¹ καὶ φεύξεται¹² *ἀφ᾽ ὑμῶν¹³ ὁ Βελίαρ. 2. Ἀλήθειαν φθέγγεσθε¹⁴ ἕκαστος πρὸς τὸν πλησίον αὐτοῦ καὶ οὐ μὴ ἐμπέσητε εἰς μῆνιν¹⁵ *καὶ ταραχάς¹⁶, ἀλλ᾽ ἔσεσθε¹⁷ ἐν εἰρήνῃ ἔχοντες τὸν θεὸν *τῆς εἰρήνης¹⁸ καὶ *οὐ μὴ κατισχύσει¹⁹ ὑμῶν²⁰ πόλεμος. 3. ᾿Αγαπήσατε²¹ τὸν Κύριον²² ἐν πάσῃ *τῇ ζωῇ²³ ὑμῶν²⁴ *καὶ ἀλλήλους²⁵ ἐν ἀληθινῇ²⁶ καρδίᾳ. 4. *Ἐγὼ οἶδα²⁷ ὅτι ἐν ταῖς²⁸ ἐσχάταις ἡμέραις ἀποστήσεσθε²⁹ τοῦ Κυρίου, καὶ προσοχθιεῖτε³⁰ τῷ³¹ Λευί, καὶ πρὸς τῷ³² Ἰουδὰ³³ παρατάξεσθε³⁴, ἀλλ᾽ οὐ δυνήσεσθε³⁵ πρὸς αὐτούς³⁶. *ἄγγελος γὰρ Κυρίου ὁδηγεῖ ἑκατέρους³⁷, ὅτι ἐν αὐτοῖς³⁸ στήσεται ὁ³⁹ Ἰσραήλ. 5. Καὶ *ὡς ἂν ἀποστήσεσθε⁴⁰ ἀπὸ⁴¹ Κυρίου⁴², *ἐν πάσῃ κακίᾳ⁴³ *πορευόμενοι ποιήσετε τὰ βδελύγματα τῶν ἐθνῶν ἐκπορνεύοντες ἐν⁴⁴ γυναιξὶν ἀνόμων⁴⁵ καὶ ἐν πάσῃ πονηρίᾳ⁴⁶ ἐνεργούντων⁴⁷ ⌈ἐν ὑμῖν⌉¹ *τῶν πνευμάτων⁴⁸ τῆς πονηρίας⁴⁹. 6. [᾿Ανέγνων γὰρ⁵⁰
    ἐν βίβλῳ Ἐνὼχ⁵¹ τοῦ δικαίου ⌈καὶ ἔγνων⌉¹⁵² ὅτι ὁ⁵³ ἄρχων ὑμῶν⁵⁴ ὁ Σατανᾶς ἐστιν⁵⁵ *καὶ ὅτι⁵⁶ τὰ πνεύματα τῆς πονηρίας⁵⁷ καὶ τῆς ὑπερηφανίας †ὑπακούσονται⁵⁸ *τοῦ παρεδρεύειν⁵⁹ τοῖς υἱοῖς Λευί, τοῦ ποιεῖν⁶⁰ αὐτοὺς ἐξαμαρτάνειν ἐνώπιον Κυρίου. 7. Καὶ *οἱ ἐμοὶ υἱοὶ⁶¹ συνεγγίζοντές⁶² εἰσι τοῦ⁶³ Λευὶ καὶ συναμαρτάνοντες⁶⁴ αὐτοῖς⁶⁵ ἐν πᾶσιν. *οἱ δὲ υἱοὶ τοῦ⁶⁶ Ἰούδα ἔσονται ἐν πλεονεξίᾳ ἁρπάζοντες⁶⁷ ἀλλότρια ὡς⁶⁸ λέοντες.] 8. ⌈Καὶ⌉⁶⁹ διὰ τοῦτο ἀπαχθήσεσθε⁷⁰ [σὺν αὐτοῖς]⁷¹ *εἰς αἰχμαλωσίαν⁷², κἀκεῖ ἀπολήψεσθε⁷³ *πάσας τὰς πληγὰς Αἰγύπτου⁷⁴ καὶ πάσας τὰς⁷⁵ πονηρίας⁷⁶ τῶν ἐθνῶν. 9. Καὶ οὕτως⁷⁷ ἐπιστρέψαντες⁷⁸ πρὸς Κύριον ἐλεηθήσεσθε⁷⁹ καὶ ἄξει ὑμᾶς⁸⁰ εἰς τὸ ἁγίασμα αὐτοῦ *καὶ δώσει⁸¹ ὑμῖν εἰρήνην⁸². 10. Καὶ ἀνατελεῖ ὑμῖν *ἐκ τῆς φυλῆς [Ἰούδα καὶ] τοῦ Λευὶ τὸ σωτήριον Κυρίου⁸³, *αὐτὸς γὰρ⁸⁴ ποιήσει πρὸς τὸν Βελίαρ πόλεμον⁸⁵, καὶ τὴν ἐκδίκησιν τοῦ νίκους δώσει τοῖς⁸⁶ †πατράσιν⁸⁷ ὑμῶν⁸⁸. 11. Καὶ τὴν αἰχμαλωσίαν λήψεται⁸⁹ ἀπὸ τοῦ Βελίαρ, [τὰς ψυχὰς τῶν ἁγίων]⁹⁰, *καὶ ἐπιστρέψει⁹¹ καρδίας⁹² ἀπειθεῖς⁹³
    πρὸς Κύριον. καὶ δώσει *τοῖς ἐπικαλουμένοις αὐτὸν⁹⁴ εἰρήνην αἰώνιον. 12. Καὶ *ἀναπαύσονται ἐν Ἐδὲμ ἅγιοι⁹⁵, καὶ ἐπὶ *τῆς νέας⁹⁶ Ἱερουσαλὴμ εὐφρανθήσονται δίκαιοι, *ἥτις ἐστι δόξα θεοῦ αἰώνιος⁹⁷. 13. Καὶ οὐκέτι ὑπομενεῖ⁹⁸ Ἱερουσαλὴμ ἐρήμωσιν *οὐδὲ αἰχμαλωτισθήσεται Ἰσραήλ⁹⁹, ὅτι¹⁰⁰ Κύριος ἔσται¹⁰¹ *ἐν μέσῳ¹⁰² αὐτῆς¹⁰³ [τοῖς ἀνθρώποις συναναστρεφόμενος]¹⁰⁴ καὶ §¹⁰⁵ Ἅγιος Ἰσραὴλ βασιλεύων¹⁰⁶ ἐπ᾽ αὐτῆς¹⁰⁷ [ἐν *ταπεινώσει καὶ πτωχείᾳ¹⁰⁸, καὶ ὁ πιστεύων *ἐπ᾽ αὐτῷ¹⁰⁹ *βασιλεύσει ἐν τοῖς ἀνθρώποις ἐν ἀληθείᾳ¹¹⁰].
