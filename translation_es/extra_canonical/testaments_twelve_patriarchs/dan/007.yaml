base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/dan/007.yaml
  text: 'And when he had said these things[7:1], he kissed them and fell asleep in a good sleep.

    2 And his sons buried him. And after this they carried his bones to the place where Abraham and Isaac and Jacob were.

    3 Nevertheless[7:3][7:2], Dan prophesied to them that they would forget their God and would be estranged from the land of their inheritance and from the race of Israel and from the family of their offspring.'
  footnotes:
  - marker: '7:1'
    text: The Greek says literally, 'fell asleep in a good sleep,' a reverent euphemism for death.
    reason: lexical_alternative
  - marker: '7:2'
    text: '''Carried up his bones'' likely refers to later reinterment with the patriarchs.'
    reason: cultural_note
  - marker: '7:3'
    text: The Greek witness is truncated in this line; the translation follows the recoverable sense that Dan foretold Israel's forgetting God and becoming estranged from inheritance and kin.
    reason: textual_variant
