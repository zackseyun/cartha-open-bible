    changes_summary: Removed 'affectionately' because the Greek verb already means 'kissed' without requiring an adverbial expansion, and changed 'carried up his bones' to 'carried his bones' since the Greek does not clearly require 'up' here. Retained the rest.
translation:
  language: es
  text: 'Y cuando hubo dicho estas cosas, los besó y se durmió un buen sueño[a].


    2 Y sus hijos lo enterraron. Y después de esto llevaron sus huesos[b] al lugar donde estaban Abraham, Isaac y Jacob.


    3 Sin embargo[c], Dan les profetizó que olvidarían a su Dios y serían extrañados de la tierra de su herencia, del linaje de Israel y de la familia de su descendencia.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente 'se durmió un buen sueño,' un eufemismo reverente para la muerte en la literatura testamentaria.
    reason: lexical_alternative
  - marker: b
    text: '''Llevaron sus huesos'' probablemente se refiere a una reinhumación posterior con los patriarcas.'
    reason: cultural_note
  - marker: c
    text: El testimonio griego está truncado en esta línea; la traducción sigue el sentido recuperable de que Dan vaticinó el olvido de Israel hacia Dios y su extrañamiento de herencia y parentela.
    reason: textual_variant
lexical_decisions:
- source_word: καταφιλήσας
  english_pob_choice: kissed
  chosen_spanish: los besó
  alternatives_spanish:
  - los besó afectuosamente
  lexicon: LSJ
  rationale: Sigue el revision_pass POB que removió 'affectionately' porque el verbo griego ya significa 'besar' sin requerir expansión adverbial.
- source_word: ὕπνωσεν ὕπνῳ καλῷ
  english_pob_choice: fell asleep in a good sleep
  chosen_spanish: se durmió un buen sueño
  alternatives_spanish:
  - durmió un buen sueño
  - se durmió apaciblemente
  lexicon: LSJ
  rationale: La expresión doblada de sueño es eufemismo idiomático para la muerte en literatura testamentaria.
- source_word: ἀπήνεγκαν τὰ ὀστᾶ αὐτοῦ
  english_pob_choice: carried his bones
  chosen_spanish: llevaron sus huesos
  alternatives_spanish:
  - transportaron sus huesos
  lexicon: LSJ
  rationale: Sigue revision_pass POB que removió 'up' por no exigirlo el griego claramente.
- source_word: ἔνθα ἦν
  english_pob_choice: to the place where ... were
  chosen_spanish: al lugar donde estaban
  alternatives_spanish:
  - donde estaban
  lexicon: LSJ
  rationale: Rendido natural que conserva la fuerza locativa.
- source_word: προεφήτευσεν
  english_pob_choice: prophesied
  chosen_spanish: profetizó
  alternatives_spanish:
  - predijo
  - vaticinó
  lexicon: LSJ
  rationale: Discurso predictivo testamentario; 'profetizar' preserva el registro elevado.
- source_word: ἐπιλά- (ἐπιλανθάνομαι)
  english_pob_choice: would forget
  chosen_spanish: olvidarían
  alternatives_spanish:
  - se olvidarían de
  - perderían memoria de
  lexicon: LSJ
  rationale: El OCR roto refleja casi seguramente una forma de ἐπιλανθάνομαι; 'olvidar' es el rendido más directo en contexto de advertencia covenantal.
- source_word: ἀλλοτριωθήσονται
  english_pob_choice: would be estranged
  chosen_spanish: serían extrañados
  alternatives_spanish:
  - serían enajenados
  - se volverían extranjeros
  lexicon: LSJ
  rationale: Conserva separación y alienación relacional/covenantal sin forzar un sentido puramente étnico.
- source_word: γῆς κληρονομίας
  english_pob_choice: land of their inheritance
  chosen_spanish: tierra de su herencia
  alternatives_spanish:
  - tierra de su heredad
  lexicon: LSJ
  rationale: La frase tiene carga covenantal; 'tierra de su herencia' conserva la resonancia bíblica.
- source_word: γένους Ἰσραήλ
  english_pob_choice: race of Israel
  chosen_spanish: linaje de Israel
  alternatives_spanish:
  - raza de Israel
  - pueblo de Israel
  lexicon: LSJ
  rationale: '''Linaje'' preserva el lenguaje genealógico mejor que ''raza'' (que tiene connotaciones modernas problemáticas en español) y mejor que el más amplio ''pueblo''.'
- source_word: πατριᾶς τοῦ σπέρματος αὐτῶν
  english_pob_choice: family of their offspring
  chosen_spanish: familia de su descendencia
  alternatives_spanish:
  - clan de su simiente
  - linaje de sus descendientes
  lexicon: LSJ
  rationale: πατριά denota familia/clan y σπέρμα aquí es genealógico; 'familia de su descendencia' es legible reteniendo el lenguaje de descendencia.
theological_decisions:
- issue: Fórmula eufemística de muerte
  chosen_reading: Traducir ὕπνωσεν ὕπνῳ καλῷ como 'se durmió un buen sueño' en lugar de 'murió apaciblemente.'
  alternative_readings:
  - murió apaciblemente
  - fue a su descanso
  rationale: El griego usa deliberadamente el lenguaje del sueño, común en escenas de muerte testamentarias y bíblicas. Preservarlo mantiene la textura literaria y evita aplanamiento interpretativo.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
- issue: Línea final fragmentaria de profecía
  chosen_reading: Incluir el sentido comúnmente reconstruido de que Dan predijo el olvido de Israel hacia Dios y el extrañamiento de herencia y parentela.
  alternative_readings:
  - Terminar el capítulo en el v.2 porque la línea griega/OCR está truncada
  - Traducir solo 'Sin embargo Dan les profetizó que olvidarían...' y dejar el resto incompleto
  rationale: La línea sobreviviente está visiblemente truncada después de ἐπιλά-, pero queda lo suficiente para sostener el sentido estándar. Una nota al pie marca la incompletitud textual en lugar de omitir el versículo.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 4
translation_notes:
  revision_awareness: El revision_pass POB removió 'affectionately' y 'up' del v.1-2 por mayor literalidad; el draft español sigue la lectura revisada.
  spanish_consistency_notes:
  - Eufemismo de muerte preservado en lugar de aplanado a 'murió'.
  - Nombres patriarcales sin traducción.
  - '''Linaje'' elegido sobre ''raza'' por consideraciones de español moderno.'
