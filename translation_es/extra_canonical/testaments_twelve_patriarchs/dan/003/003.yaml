  text: ⌜Ὅτι⁷, κἂν πατήρ, *ἢ μήτηρ¹⁰ ἐστίν¹¹, ⌜ὡς πολεμίοις¹² προσέχει¹³ αὐτοῖς¹⁴⌝. *ἢ⁷ ἀδελφός ἐστιν¹⁵ οὐκ οἶδεν¹⁶. ἢ¹⁷ *προφήτης Κυρίου, παρακούει¹⁸· ἢ¹⁷ δίκαιος¹⁹, οὐ βλέπει· ⌜*ἢ φίλος²⁰, οὐ γνωρίζει⁷⌝.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/dan/003/003.yaml
  text: Even if it is a father or a mother, it regards them as enemies. If it is a brother, it does not know him. If it is a prophet of the Lord, it disobeys him; if a righteous man, it does not see him; if a friend, it does not recognize him.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:30Z'
    unchanged: false
    changes_summary: Changed 'does not notice him' to 'does not see him' for closer lexical correspondence to βλέπει, while preserving natural formal English.
translation:
  language: es
  text: Aun si es padre o madre, los considera como enemigos. Si es un hermano, no lo conoce. Si es un profeta del Señor, lo desobedece; si es un justo, no lo ve; si es un amigo, no lo reconoce.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πολεμίοις
  english_pob_choice: enemies
  chosen_spanish: enemigos
  alternatives_spanish:
  - adversarios
  lexicon: LSJ
  rationale: Rendido directo del término griego para oponentes hostiles.
- source_word: προσέχει αὐτοῖς
  english_pob_choice: regards them
  chosen_spanish: los considera
  alternatives_spanish:
  - los trata
  - se comporta con ellos
  lexicon: LSJ
  rationale: '''Considerar'' captura el sentido cognitivo de προσέχω: prestar atención/orientarse mentalmente hacia algo.'
- source_word: οὐκ οἶδεν
  english_pob_choice: does not know him
  chosen_spanish: no lo conoce
  alternatives_spanish:
  - no lo reconoce
  lexicon: LSJ
  rationale: '''Conocer'' es el rendido natural de οἶδα; mantiene el contraste con ''reconocer'' (γνωρίζει) al final del versículo.'
- source_word: παρακούει
  english_pob_choice: disobeys him
  chosen_spanish: lo desobedece
  alternatives_spanish:
  - no le hace caso
  - no lo escucha
  lexicon: LSJ
  rationale: El verbo griego significa específicamente desoír/desobedecer.
- source_word: οὐ βλέπει
  english_pob_choice: does not see him
  chosen_spanish: no lo ve
  alternatives_spanish:
  - no lo nota
  lexicon: LSJ
  rationale: El revision pass cambió 'does not notice' a 'does not see' para mayor cercanía léxica con βλέπει; 'no lo ve' refleja esa decisión en español.
- source_word: γνωρίζει
  english_pob_choice: recognize
  chosen_spanish: reconoce
  alternatives_spanish:
  - identifica
  lexicon: LSJ
  rationale: Mantiene la distinción con οἶδα ('conocer') del inicio.
translation_notes:
  revision_awareness: Revision pass cambió 'notice' a 'see' para mayor literalidad con βλέπει; el español 've' refleja esa elección.
  spanish_consistency_notes:
  - Distinción mantenida entre 'conocer' (οἶδα), 'ver' (βλέπει), y 'reconocer' (γνωρίζει)
