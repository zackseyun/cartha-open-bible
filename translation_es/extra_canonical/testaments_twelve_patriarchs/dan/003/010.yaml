id: T12P.DAN.3.10
reference: Testament of Dan 3:10
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 201-213, Dan source-fix v2)
  text: Ἐὰν δὲ ἀσθενὴς ᾖ ὁ²⁴ θυμούμενος²⁵, *διπλοῦν τὸ τῆς ὀργῆς πάθος ἐν αὐτῷ ἀναφύει²⁶· βοηθεῖ *γὰρ αὐτῷ ὁ θυμὸς²⁷ πάντοτε ἐν παρανομίᾳ²⁸. 6. Τοῦτο τὸ πνεῦμα ἀεὶ μετὰ τοῦ ψεύδους *ἐκ δεξιῶν τοῦ Σατανᾶ πορεύεται, ἵνα ἐν ὠμότητι καὶ ψεύδει³⁰ γίνωνται³¹ αἱ πράξεις αὐτοῦ³².
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/dan/003/010.yaml
  text: But if the one who is angry is weak, the passion of wrath grows in him twofold, for anger always helps him in wrongdoing.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:03Z'
    unchanged: false
    changes_summary: Replaced 'he has' with 'grows in him' to reflect ἀναφύει ('grows/springs up'), and revised 'toward wrongdoing' to 'in wrongdoing' for a closer rendering of ἐν παρανομίᾳ while keeping natural English.
translation:
  language: es
  text: Pero si el iracundo es débil, la pasión de la cólera crece en él al doble, pues la ira siempre lo ayuda en el mal obrar.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀσθενής
  english_pob_choice: weak
  chosen_spanish: débil
  alternatives_spanish:
  - enfermizo
  - frágil
  lexicon: LSJ
  rationale: Rendido directo; aquí en contraste con 'fuerte de cuerpo' del v.9 indica debilidad física.
- source_word: θυμούμενος
  english_pob_choice: the one who is angry
  chosen_spanish: el iracundo
  alternatives_spanish:
  - el airado
  lexicon: LSJ
  rationale: Consistencia con v.9.
- source_word: διπλοῦν τὸ τῆς ὀργῆς πάθος
  english_pob_choice: the passion of wrath twofold
  chosen_spanish: la pasión de la cólera... al doble
  alternatives_spanish:
  - doble pasión de la ira
  lexicon: LSJ
  rationale: ὀργή se distingue aquí de θυμός (ira); 'cólera' permite preservar la distinción léxica con 'ira' (θυμός). 'Pasión' es calco directo de πάθος.
- source_word: ὀργή
  english_pob_choice: wrath
  chosen_spanish: cólera
  alternatives_spanish:
  - furor
  - ira
  lexicon: LSJ
  rationale: Para mantener distinción visible entre θυμός (ira) y ὀργή (cólera/wrath) en español, usamos 'cólera' aquí donde el inglés usa 'wrath'.
- source_word: ἀναφύει
  english_pob_choice: grows
  chosen_spanish: crece
  alternatives_spanish:
  - brota
  - germina
  lexicon: LSJ
  rationale: Revision pass cambió 'he has' a 'grows in him' para reflejar el sentido orgánico de ἀναφύω (brotar/crecer); 'crece' captura ese matiz.
- source_word: βοηθεῖ
  english_pob_choice: helps
  chosen_spanish: ayuda
  alternatives_spanish:
  - asiste
  lexicon: LSJ
  rationale: Rendido directo y natural.
- source_word: ἐν παρανομίᾳ
  english_pob_choice: in wrongdoing
  chosen_spanish: en el mal obrar
  alternatives_spanish:
  - en la transgresión
  - en la iniquidad
  lexicon: LSJ
  rationale: Revision pass cambió 'toward wrongdoing' a 'in wrongdoing' por mayor literalidad; 'en el mal obrar' captura el sentido locativo/instrumental.
translation_notes:
  revision_awareness: 'Revision pass: ''he has'' → ''grows in him'' (refleja ἀναφύει), ''toward wrongdoing'' → ''in wrongdoing'' (refleja ἐν παρανομίᾳ); ambos cambios reflejados en el español.'
  spanish_consistency_notes:
  - 'Distinción léxica: θυμός→ira, ὀργή→cólera para preservar matices del griego'
  - ἀναφύει→crece (sentido orgánico)
