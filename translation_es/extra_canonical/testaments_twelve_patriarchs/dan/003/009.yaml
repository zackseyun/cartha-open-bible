id: T12P.DAN.3.9
reference: Testament of Dan 3:9
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 201-213, Dan source-fix v2)
  text: '*Διὰ τοῦτο¹¹ ὁ θυμούμενος¹², *ἐὰν μὲν ᾖ¹³ *δυνατὸς ⌈τῷ σώματι⌉¹⁴, *τριπλῆν ἐν τῷ θυμῷ τὴν δύναμιν κέκτηται¹⁵· μίαν¹⁶ μὲν ἀπὸ¹⁷ τῆς βοηθείας *τῶν ὑπουργούντων¹⁸. *δεύτερον δὲ¹⁹ διὰ τοῦ πλούτου *πείθων καὶ νικῶν [αὐτὸν] ἀδίκως²⁰. *τρίτον τὴν²¹ φυσικὴν ἔχων *δύναμιν δι'' αὐτῆς δρᾷ²² τὸ κακόν²³.'
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/dan/003/009.yaml
  text: 'Therefore the one who is angry, if he is strong in body, has the power of anger in his soul threefold: one from the help of attendants, by which he justifies the deed; a second through wealth, persuading and prevailing unjustly; and a third, having natural strength, by it he does evil.'
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:33Z'
    unchanged: false
    changes_summary: 'Adjusted wording for closer lexical accuracy and more natural formal English: ''physically strong'' to ''strong in body,'' ''his soul’s power for anger'' to ''the power of anger in his soul,'' ''overpowering'' to ''prevailing,'' and simplified the final clause to reflect the Greek more directly.'
translation:
  language: es
  text: 'Por tanto, el iracundo, si es fuerte de cuerpo, tiene en su alma un poder triple para la ira: uno por la ayuda de los servidores, por la cual justifica el hecho; un segundo por la riqueza, persuadiendo y prevaleciendo injustamente; y un tercero, teniendo fuerza natural, por la cual hace el mal.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: θυμούμενος
  english_pob_choice: the one who is angry
  chosen_spanish: el iracundo
  alternatives_spanish:
  - el airado
  - el que se enoja
  lexicon: LSJ
  rationale: '''Iracundo'' es el sustantivo elegante en español para el participio griego, mantiene el registro testamental.'
- source_word: δυνατὸς τῷ σώματι
  english_pob_choice: strong in body
  chosen_spanish: fuerte de cuerpo
  alternatives_spanish:
  - fuerte físicamente
  - robusto
  lexicon: LSJ
  rationale: El revision pass cambió 'physically strong' a 'strong in body' para mayor literalidad; 'fuerte de cuerpo' es el equivalente español calcado.
- source_word: τριπλῆν τὴν δύναμιν
  english_pob_choice: the power threefold
  chosen_spanish: un poder triple
  alternatives_spanish:
  - triple poder
  lexicon: LSJ
  rationale: Rendido natural en español; 'un poder triple' suena más fluido que 'triple poder'.
- source_word: ὑπουργοί
  english_pob_choice: attendants
  chosen_spanish: servidores
  alternatives_spanish:
  - sirvientes
  - asistentes
  lexicon: LSJ
  rationale: '''Servidores'' captura el sentido de quienes ayudan/sirven al iracundo; más amplio que ''sirvientes'' que sugiere domesticidad.'
- source_word: πείθων καὶ νικῶν
  english_pob_choice: persuading and prevailing
  chosen_spanish: persuadiendo y prevaleciendo
  alternatives_spanish:
  - persuadiendo y venciendo
  lexicon: LSJ
  rationale: Revision pass cambió 'overpowering' a 'prevailing' para reflejar mejor νικάω; 'prevalecer' captura el sentido de imponerse/vencer en contienda.
- source_word: ἀδίκως
  english_pob_choice: unjustly
  chosen_spanish: injustamente
  alternatives_spanish:
  - sin justicia
  lexicon: LSJ
  rationale: Rendido directo.
- source_word: φυσικὴν δύναμιν
  english_pob_choice: natural strength
  chosen_spanish: fuerza natural
  alternatives_spanish:
  - poder natural
  lexicon: LSJ
  rationale: Aquí δύναμις como capacidad física innata se traduce mejor 'fuerza' que 'poder' (que se reservó para δύναμις como facultad de la ira).
- source_word: δρᾷ τὸ κακόν
  english_pob_choice: does evil
  chosen_spanish: hace el mal
  alternatives_spanish:
  - obra el mal
  lexicon: LSJ
  rationale: Revision pass simplificó a 'does evil'; 'hacer el mal' es el equivalente directo.
translation_notes:
  revision_awareness: 'Revision pass: ''physically strong''→''strong in body'', ''his soul''s power for anger''→''the power of anger in his soul'', ''overpowering''→''prevailing'', cláusula final simplificada. Reflejado en español.'
  spanish_consistency_notes:
  - δύναμις→poder (facultad de la ira) vs. fuerza (capacidad física innata) según contexto
  - θυμός→ira; ψυχή→alma
