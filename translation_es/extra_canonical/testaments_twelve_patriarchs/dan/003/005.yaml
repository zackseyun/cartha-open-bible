base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/dan/003/005.yaml
  text: And with what does it cover his eyes? With hatred of heart against his brother, unto envy.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:30Z'
    unchanged: false
    changes_summary: Changed 'veil' to 'cover' for a more direct rendering of περιβάλλει, and replaced 'leading to envy' with 'unto envy' to more closely reflect εἰς φθόνον without interpretive expansion.
translation:
  language: es
  text: ¿Y con qué le cubre los ojos? Con odio del corazón contra su hermano, hasta la envidia.
  philosophy: optimal-equivalence
