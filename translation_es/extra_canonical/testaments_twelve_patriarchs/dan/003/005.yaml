  text: '*Ἐν τίνι δὲ²⁵ περιβάλλει τοὺς ὀφθαλμοὺς αὐτοῦ²⁶; *ἐν μίσει καρδίας²⁷ κατὰ τοῦ ἀδελφοῦ αὐτοῦ²⁸ *εἰς φθόνον²⁹.'
