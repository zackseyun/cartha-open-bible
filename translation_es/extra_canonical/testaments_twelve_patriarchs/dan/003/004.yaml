translation:
  language: es
  text: Porque el espíritu de la ira lo envuelve en la red del engaño y le ciega los ojos, y mediante la falsedad le oscurece la mente, y le da su propia visión.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πνεῦμα τοῦ θυμοῦ
  english_pob_choice: spirit of anger
  chosen_spanish: espíritu de la ira
  alternatives_spanish:
  - espíritu del enojo
  lexicon: LSJ
  rationale: Mantiene consistencia con el cap. 2 y refuerza la personificación moral activa de la ira.
- source_word: περιβάλλεται
  english_pob_choice: wraps him
  chosen_spanish: lo envuelve
  alternatives_spanish:
  - lo rodea
  - lo cubre
  lexicon: LSJ
  rationale: '''Envolver'' captura el sentido literal de περιβάλλω (poner alrededor) con la imagen de la red que atrapa.'
- source_word: δίκτυον τῆς πλάνης
  english_pob_choice: net of deceit
  chosen_spanish: red del engaño
  alternatives_spanish:
  - red del extravío
  - red del error
  lexicon: LSJ
  rationale: πλάνη puede ser 'engaño' o 'extravío'; 'engaño' coincide con el draft inglés y mantiene el campo semántico de la falsedad.
- source_word: τυφλοῖ
  english_pob_choice: blinds
  chosen_spanish: ciega
  alternatives_spanish:
  - enceguece
  lexicon: LSJ
  rationale: Rendido directo, neutro latinoamericano.
- source_word: σκοτοῖ τὴν διάνοιαν
  english_pob_choice: darkens his mind
  chosen_spanish: le oscurece la mente
  alternatives_spanish:
  - le entenebrece la mente
  - le oscurece el entendimiento
  lexicon: LSJ
  rationale: '''Oscurecer la mente'' es el rendido directo y natural del verbo σκοτόω + διάνοια.'
- source_word: ἰδίαν ὅρασιν
  english_pob_choice: his own vision
  chosen_spanish: su propia visión
  alternatives_spanish:
  - su propia manera de ver
  lexicon: LSJ
  rationale: El draft del verso a nivel de capítulo añade 'peculiar', pero este verso individual lo omite; mantenemos el rendido más simple aquí.
translation_notes:
  revision_awareness: Revision pass aprobado sin cambios; la versión final mantiene una visión más simple ('his own vision') que la del cap. 2 ('its own peculiar vision').
  spanish_consistency_notes:
  - πνεῦμα→espíritu
  - θυμός→ira
  - πλάνη→engaño en este contexto
