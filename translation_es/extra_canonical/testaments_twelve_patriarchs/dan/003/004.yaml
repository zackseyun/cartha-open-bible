  text: '*Περιβάλλεται γὰρ ⌈αὐτὸν⌉⁷ τὸ πνεῦμα τοῦ θυμοῦ τὸ δίκτυον τῆς πλάνης²¹ καὶ τυφλοῖ τοὺς²² ὀφθαλμοὺς αὐτοῦ, καὶ¹ διὰ τοῦ ψεύδους σκοτοῖ²³ τὴν διάνοιαν ⌈αὐτοῦ⌉⁷²⁴, καὶ τὴν ἰδίαν ὅρασιν παρέχει αὐτῷ.'
