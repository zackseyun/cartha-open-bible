base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/dan/003/004.yaml
  text: For the spirit of anger wraps him in the net of deceit and blinds his eyes, and through falsehood it darkens his mind and gives him his own vision.
