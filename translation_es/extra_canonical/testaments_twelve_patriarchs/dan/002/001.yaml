id: T12P.DAN.2.1
reference: Testament of Dan 2:1
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 201-213, Dan source-fix v2)
  text: II. Καὶ νῦν, τέκνα μου, ἰδοὺ¹ ἐγὼ ἀποθνῄσκω, καὶ ἐν ἀληθείᾳ λέγω ὑμῖν, ὅτι² ἐὰν³ μὴ φυλάξητε⁴ ἑαυτοὺς ἀπὸ *τοῦ πνεύματος⁵ *τοῦ ψεύδους καὶ τοῦ θυμοῦ⁶, καὶ ἀγαπήσητε⁷ τὴν ἀλήθειαν καὶ τὴν μακροθυμίαν, ἀπολεῖσθε⁸.
  language: Greek
  note: Chapter-level Greek fragment; verse-level Greek not yet aligned.
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/dan/002/001.yaml
  text: 'And now[a], my children, behold, I am dying, and I tell you in truth: unless you guard yourselves from the spirit of falsehood and of anger, and love truth and long-suffering, you will perish. For anger is blindness, and it does not allow one to see the face of any man with truth. Even if it is a father or a mother, he behaves toward them as toward enemies; even if it is a brother, he does not recognize him; even if it is a prophet of the Lord, he disobeys him; even if it is a righteous man, he does not regard him; even if it is a friend, he does not acknowledge him. For the spirit of anger surrounds him with the nets of deceit, and blinds his eyes, and through falsehood darkens his mind, and gives him its own peculiar vision. And with what does it surround his eyes? With hatred of heart, so as to be envious of his brother.'
  revision_pass:
    model: gpt-5
    timestamp: '2026-05-03T07:45:27Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: 'Y ahora[a], hijos míos, miren, yo estoy muriendo, y les digo en verdad: a menos que se guarden del espíritu de falsedad y de la ira, y amen la verdad y la longanimidad[b], perecerán. Porque la ira es ceguera, y no permite ver con verdad el rostro de ningún hombre. Aun si es padre o madre, se comporta con ellos como con enemigos; aun si es hermano, no lo reconoce; aun si es profeta del Señor, lo desobedece; aun si es justo, no lo tiene en cuenta; aun si es amigo, no lo reconoce. Porque el espíritu de la ira lo rodea con las redes del engaño, y le ciega los ojos, y mediante la falsedad le oscurece la mente, y le da su propia visión peculiar. ¿Y con qué le rodea los ojos? Con odio del corazón, de modo que envidie a su hermano.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el espíritu de engaño'. El término griego puede denotar falsedad en el habla o una cualidad engañosa más amplia.
    reason: lexical_alternative
  - marker: b
    text: '''Longanimidad'' también podría traducirse como ''paciencia'' o ''tolerancia'', pero el término más pleno preserva mejor el peso ético de la exhortación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πνεῦμα
  english_pob_choice: spirit
  chosen_spanish: espíritu
  alternatives_spanish:
  - disposición
  - influencia
  lexicon: LSJ
  rationale: En este contexto parenético testamental, πνεῦμα designa una fuerza moral activa, no un mero estado de ánimo. 'Espíritu' preserva la textura moral-personal y su asociación posterior con Satanás/Beliar.
- source_word: ψεύδους
  english_pob_choice: falsehood
  chosen_spanish: falsedad
  alternatives_spanish:
  - mentira
  - engaño
  lexicon: LSJ
  rationale: '''Falsedad'' encaja con el vicio abstracto emparejado con la ira y mantiene coherencia con el motivo posterior de distorsión engañosa de la percepción. ''Mentira'' sería demasiado puntual.'
- source_word: θυμός
  english_pob_choice: anger
  chosen_spanish: ira
  alternatives_spanish:
  - enojo
  - furor
  lexicon: LSJ
  rationale: '''Ira'' es el rendido más amplio y digno en español para el vicio dominante del capítulo, mantiene un registro elevado adecuado al género testamental.'
- source_word: μακροθυμία
  english_pob_choice: long-suffering
  chosen_spanish: longanimidad
  alternatives_spanish:
  - paciencia
  - magnanimidad
  lexicon: LSJ
  rationale: '''Longanimidad'' preserva el peso ético de soportar provocación largamente, mejor que el más plano ''paciencia''. Se incluye nota sobre la alternativa.'
- source_word: δίκτυα
  english_pob_choice: nets
  chosen_spanish: redes
  alternatives_spanish:
  - lazos
  - trampas
  lexicon: LSJ
  rationale: La imagen es de enredo por engaño. 'Redes' es concreto y vívido, traducción directa de δίκτυα.
- source_word: ἴδιον ὅρασιν
  english_pob_choice: its own peculiar vision
  chosen_spanish: su propia visión peculiar
  alternatives_spanish:
  - su propio modo de ver
  - su propia apariencia
  lexicon: LSJ
  rationale: La frase sugiere que la ira impone una percepción distorsionada. 'Visión peculiar' conserva la metáfora de la vista junto con la subjetividad y distorsión.
- source_word: φθονεῖν
  english_pob_choice: to be envious
  chosen_spanish: envidiar
  alternatives_spanish:
  - tener envidia
  lexicon: LSJ
  rationale: El infinitivo describe la disposición resultante hacia el hermano. 'Envidiar' se lee con naturalidad y mantiene el término del vicio.
translation_notes:
  revision_awareness: POB inglés revisado sin cambios; conserva 'spirit', 'falsehood', 'long-suffering', 'peculiar vision'.
  spanish_consistency_notes:
  - θυμός→ira de manera consistente en todo el capítulo
  - πνεῦμα→espíritu cuando refiere a fuerza moral activa
  - μακροθυμία→longanimidad con nota sobre 'paciencia'
