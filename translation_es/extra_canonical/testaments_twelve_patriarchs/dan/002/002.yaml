- source_word: τέκνα μου
  english_pob_choice: my children
  chosen_spanish: hijos míos
  alternatives_spanish:
  - mis hijos
  lexicon: LSJ
  rationale: '''Hijos míos'' es la fórmula testamental natural en español, conserva el tono solemne del discurso paterno.'
- source_word: ἰδοὺ
  english_pob_choice: look
  chosen_spanish: miren
