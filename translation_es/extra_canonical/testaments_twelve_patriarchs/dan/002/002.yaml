- source_word: πνεῦμα τοῦ ψεύδους
  english_pob_choice: spirit of falsehood
  chosen_spanish: espíritu de falsedad
  alternatives_spanish:
  - espíritu de la mentira
  lexicon: LSJ
  rationale: Mantiene la consistencia con T.Dan 2:1 y conserva el carácter de fuerza moral activa.
- source_word: θυμός
  english_pob_choice: anger
  chosen_spanish: ira
  alternatives_spanish:
  - enojo
  lexicon: LSJ
  rationale: Coherencia léxica con todo el capítulo.
- source_word: φυλάξητε ἑαυτοὺς
  english_pob_choice: keep yourselves
  chosen_spanish: se guardan a sí mismos
  alternatives_spanish:
  - se cuidan
  - se protegen
  lexicon: LSJ
  rationale: '''Guardarse'' captura el sentido de vigilancia moral del verbo φυλάσσω y mantiene el registro testamental.'
