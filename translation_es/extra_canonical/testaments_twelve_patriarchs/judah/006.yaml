translation:
  language: es
  text: Y cuando estaba en las aguas de Chozebá[a], los de Jobel vinieron contra nosotros para batalla. Y, entablando combate, los pusimos en fuga; y matamos a los de Silom, sus aliados[b], y no les dimos salida para entrar contra nosotros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Los nombres de lugar «Chozebá», «Jobel» y «Silom» son transliteraciones de las formas griegas de este testimonio; su identificación histórica es incierta.
    reason: cultural_note
  - marker: b
    text: El texto griego de este capítulo, tal como se proporciona aquí, es fragmentario; esta traducción vierte únicamente el texto conservado.
    reason: textual_variant
lexical_decisions:
- source_word: ὕδασι
  english_pob_choice: waters
  chosen_spanish: aguas
  alternatives_spanish:
  - agua
  - manantiales
  - corrientes
  lexicon: LSJ
  rationale: «Aguas» conserva el plural del dativo griego y el valor de lugar asociado al topónimo, sin forzar una precisión geográfica que el texto no da.
- source_word: Χωζηβά
  english_pob_choice: Chozeba
  chosen_spanish: Chozebá
  alternatives_spanish:
  - Chezibá
  - Khozebá
  lexicon: LSJ
  rationale: Se translitera el nombre propio y se ajusta a ortografía española con acento para facilitar la lectura sin alterar la identificación incierta del lugar.
- source_word: ἐφ᾽ ἡμᾶς εἰς πόλεμον
  english_pob_choice: came against us for battle
  chosen_spanish: vinieron contra nosotros para batalla
  alternatives_spanish:
  - vinieron contra nosotros para guerra
  - vinieron sobre nosotros en batalla
  - vinieron contra nosotros a pelear
  lexicon: LSJ
  rationale: «Vinieron contra nosotros» reproduce el movimiento hostil de ἐφ᾽ ἡμᾶς; «para batalla» conserva el propósito bélico de εἰς πόλεμον sin ampliar el sentido a una guerra total cuando el inglés POB ya optó por «battle».
- source_word: συνάψαντες
  english_pob_choice: joining battle
  chosen_spanish: entablando combate
  alternatives_spanish:
  - uniéndonos al combate
  - cerrando combate
  - entablando batalla
  lexicon: LSJ
  rationale: La forma participial expresa que el enfrentamiento se inició en combate; «entablando combate» es natural en español y mantiene el tono narrativo militar.
- source_word: ἐτρέψαμεν
  english_pob_choice: put them to flight
  chosen_spanish: los pusimos en fuga
  alternatives_spanish:
  - los derrotamos
  - los hicimos huir
  - los rechazamos
  lexicon: LSJ
  rationale: La expresión española reproduce el valor militar de «rout/turn to flight» con claridad y sin introducir una equivalencia interpretativa más fuerte de la necesaria.
- source_word: συμμάχους
  english_pob_choice: their allies
  chosen_spanish: sus aliados
  alternatives_spanish:
  - sus confederados
  - sus auxiliares
  - sus ayudadores
  lexicon: LSJ
  rationale: «Aliados» es el equivalente más directo y contemporáneo para el término político-militar griego.
- source_word: ἀπεκτείναμεν
  english_pob_choice: we killed
  chosen_spanish: matamos
  alternatives_spanish:
  - dimos muerte a
  - degollamos
  - dimos muerte
  lexicon: LSJ
  rationale: Se mantiene el verbo directo, porque el griego no exige una formulación más solemne que podría sonar artificiosa en español.
- source_word: διέξοδον
  english_pob_choice: way of escape
  chosen_spanish: salida
  alternatives_spanish:
  - vía de escape
  - modo de escapar
  - escape
  lexicon: LSJ
  rationale: En contexto de combate, «salida» comunica la idea concreta de un paso para escapar. El complemento «para entrar contra nosotros» evita perder el matiz de impedir su acceso.
theological_decisions:
- issue: Alcance del fragmento griego conservado
  english_pob_reading: Translate only the extant Greek supplied as the chapter text, without reconstructing missing material from other editions or modern translations.
  chosen_spanish_reading: Traducir solo el griego conservado en el testimonio dado, sin reconstruir material ausente de otras ediciones ni de traducciones modernas.
  alternative_spanish_readings:
  - Reconstruir un capítulo más amplio a partir de otros testigos
  - Armonizar con traducciones secundarias
  rationale: La transparencia textual exige reflejar solo lo que está atestiguado en el pasaje proporcionado, sin suplir lagunas con conjeturas o con otros testimonios.
  doctrine_reference: 'PHILOSOPHY.md: primacía del idioma original y transparencia auditable'
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del inglés POB al preferir «para batalla» en lugar de una formulación más amplia como «para guerra», manteniendo así un equivalente formal y natural del propósito bélico del griego. También se respetó la decisión auditada de traducir solo el texto griego efectivamente conservado en el testimonio dado.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparezca el nombre divino; en este pasaje no hay ocurrencias.
  - «Mesías/Cristo», «esclavo/siervo» y otros pares terminológicos del proyecto no intervienen en este fragmento.
  - Se conserva la transliteración de topónimos en forma estable y legible para español.
  - La puntuación y el ritmo buscan una prosa bíblica moderna, sin arcaísmos innecesarios.
