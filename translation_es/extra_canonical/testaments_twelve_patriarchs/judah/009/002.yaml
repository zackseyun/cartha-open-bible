source:
  edition: Charles 1908 Greek Versions (Judah source-fix v2 — T12P Pass A; α-column primary, apparatus stripped)
  text: Καὶ πληρωθέντων τῶν¹¹ δεκαοκτὼ¹² ἐτῶν ἐπανῆλθεν¹³ ἡμῖν¹⁴ Ἡσαῦ ὁ ἀδελφὸς τοῦ πατρός μου¹⁶ ἐν λαῷ βαρεῖ¹⁷ καὶ ἰσχυρῷ.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/009/002.yaml
  text: And when the eighteen years were fulfilled, Esau, my father's brother, returned to us with a large and strong people.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:56:29Z'
    unchanged: false
    changes_summary: Changed 'came against us' to 'returned to us' for lexical accuracy of ἐπανῆλθεν, and revised 'heavy and powerful people' to 'large and strong people' for more natural English while preserving the sense of λαῷ βαρεῖ καὶ ἰσχυρῷ.
translation:
  language: es
  text: Y cuando se cumplieron los dieciocho años, Esaú, el hermano de mi padre, regresó a nosotros con un pueblo numeroso y fuerte.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπανῆλθεν
  english_pob_choice: returned to us
  chosen_spanish: regresó a nosotros
  alternatives_spanish:
  - volvió a nosotros
  - retornó a nosotros
  lexicon: ἐπανέρχομαι
  rationale: El verbo griego expresa un regreso, no un avance hostil; por eso «regresó» refleja mejor el valor léxico que una lectura de aproximación o ataque. «A nosotros» conserva el dativo de relación/destino del texto griego y sigue el ajuste ya adoptado en la auditoría inglesa.
- source_word: λαῷ
  english_pob_choice: people
  chosen_spanish: pueblo
  alternatives_spanish:
  - gente
  - nación
  lexicon: λαός
  rationale: «Pueblo» es el equivalente más natural y fiel para λαός en este contexto narrativo, manteniendo el sentido colectivo sin añadir connotaciones políticas no explícitas.
- source_word: βαρεῖ
  english_pob_choice: large
  chosen_spanish: numeroso
  alternatives_spanish:
  - grande
  - mucho
  lexicon: βαρύς
  rationale: Aunque literalmente βαρεῖ puede sugerir ‘pesado’, en este entorno con λαός la idea comunicativa es de tamaño o cantidad; «numeroso» expresa mejor la carga semántica en español sin introducir una metáfora extraña.
- source_word: ἰσχυρῷ
  english_pob_choice: strong
  chosen_spanish: fuerte
  alternatives_spanish:
  - poderoso
  - robusto
  lexicon: ἰσχυρός
  rationale: «Fuerte» conserva la fuerza física o militar del adjetivo sin elevarlo innecesariamente a «poderoso», que en español puede sonar más interpretativo.
- source_word: δεκαοκτὼ ἐτῶν
  english_pob_choice: the eighteen years
  chosen_spanish: los dieciocho años
  alternatives_spanish:
  - dieciocho años
  - al cumplirse dieciocho años
  lexicon: δεκαοκτώ
  rationale: 'Se mantiene la referencia temporal de modo directo y fluido en español. El artículo definido reproduce la estructura del texto de partida: un período completo ya cumplido.'
- source_word: Ἡσαῦ ὁ ἀδελφὸς τοῦ πατρός μου
  english_pob_choice: Esau, my father's brother
  chosen_spanish: Esaú, el hermano de mi padre
  alternatives_spanish:
  - Esaú, hermano de mi padre
  - Esaú, el tío de mí
  lexicon: Ἡσαῦ / ἀδελφός / πατήρ
  rationale: Se conserva la apposición explicativa del griego. «El hermano de mi padre» es más transparente que «mi tío» y mantiene la relación genealógica exacta del texto.
translation_notes:
  revision_awareness: La versión inglesa revisada corrigió ἐπανῆλθεν de «came against us» a «returned to us» y ajustó λαῷ βαρεῖ καὶ ἰσχυρῷ de «heavy and powerful people» a «large and strong people». La traducción española sigue esa revisión, prefiriendo un regreso neutral y una descripción colectiva de tamaño/fuerza sin cargar el pasaje con hostilidad no presente en el griego.
  spanish_consistency_notes:
  - Se usa «Esaú» como forma habitual en español bíblico.
  - Se conserva el registro narrativo sobrio del texto fuente sin añadir inferencias contextuales.
  - No se introducen notas textuales porque el pasaje no presenta variantes relevantes en el paquete suministrado.
