  text: '*Καὶ ἔπαισεν¹⁸ ἐν τόξῳ Ἰακὼβ τὸν Ἡσαῦ, καὶ¹⁹ ἤρθη ὁ νεκρὸς²⁰ ἐν ὄρει Σεείρ.'
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/009/003.yaml
  text: And Jacob struck Esau with a bow, and he fell by Jacob's bow, dead on Mount Seir.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:56:29Z'
    unchanged: false
    changes_summary: Removed the interpretive addition 'slain' to stay closer to the Greek, while preserving the repeated reference to Jacob's bow and the final statement that he was dead on Mount Seir.
translation:
  language: es
  text: Y Jacob hirió a Esaú con un arco, y cayó por el arco de Jacob, muerto en el monte Seír.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Καὶ ἔπαισεν ... τὸν Ἡσαῦ
  english_pob_choice: And Jacob struck Esau
  chosen_spanish: Y Jacob hirió a Esaú
  alternatives_spanish:
  - Y Jacob golpeó a Esaú
  - Y Jacob alcanzó a Esaú
  lexicon: ἔπαισεν
  rationale: El griego expresa una acción de golpear/herir; en español, «hirió» conserva la fuerza de impacto con un matiz más acorde al resultado narrado que «golpeó».
- source_word: ἐν τόξῳ
  english_pob_choice: with a bow
  chosen_spanish: con un arco
  alternatives_spanish:
  - con su arco
  - por medio de un arco
  lexicon: τόξον
  rationale: «Arco» es el equivalente directo y natural en español. Se evita añadir «su» porque el griego no lo explicita.
- source_word: ἤρθη ὁ νεκρός
  english_pob_choice: he fell ... dead
  chosen_spanish: cayó ... muerto
  alternatives_spanish:
  - fue levantado ... muerto
  - quedó tendido ... muerto
  lexicon: ἤρθη
  rationale: La frase griega es difícil y el testimonio inglés opta por un resultado narrativo de caída con muerte. «Cayó» mantiene la lectura de evento culminante sin introducir «slain», que la revisión inglesa retiró por ser interpretativo.
- source_word: ἐν ὄρει Σεείρ
  english_pob_choice: on Mount Seir
  chosen_spanish: en el monte Seír
  alternatives_spanish:
  - sobre el monte Seír
  - en el monte Seir
  lexicon: ὄρος Σεείρ
  rationale: Se conserva el topónimo bíblico con transliteración hispana estándar «Seír»; «monte» sigue el uso bíblico normal en español.
theological_decisions:
- issue: Relación entre la acción de Jacob y la muerte de Esaú
  english_pob_reading: Jacob struck Esau with a bow ... dead on Mount Seir
  chosen_spanish_reading: Jacob hirió a Esaú con un arco ... muerto en el monte Seír
  alternative_spanish_readings:
  - Jacob mató a Esaú con un arco ...
  - Jacob derribó a Esaú con un arco ...
  rationale: El texto fuente y la revisión inglesa sostienen la relación causal directa, pero sin añadir una explicación más fuerte que la del griego. «Hirió» deja intacta esa causalidad sin introducir un verbo de matanza más interpretativo.
  doctrine_reference: Fidelidad narrativa al testimonio textual; sin implicación doctrinal adicional.
translation_notes:
  revision_awareness: La revisión inglesa reciente eliminó la adición interpretativa «slain» para acercarse más al griego, manteniendo la referencia repetida al arco de Jacob y la afirmación final de que Esaú estaba muerto en el monte Seír. La versión española sigue esa línea y evita añadir matizaciones no presentes en el texto base.
  spanish_consistency_notes:
  - Se usa «Jacob» y «Esaú» de manera consistente con la tradición bíblica hispana y con la forma de los nombres en el contexto fuente.
  - Se mantiene «monte Seír» como topónimo fijo, sin adaptar a una forma más libre.
  - No se introduce «Cristo», «SEÑOR» ni otra terminología no pertinente al versículo.
