base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/009/004.yaml
  text: And we pursued the sons of Esau, and they also had a fortified city, and we were not able to enter it. But sitting around it, we besieged it.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:59Z'
    unchanged: false
    changes_summary: Changed 'sitting down around it' to 'sitting around it' for more natural English while preserving the participial sense; otherwise retained the draft.
translation:
  language: es
  text: Y nosotros perseguimos a los hijos de Esaú, y también ellos tenían una ciudad fortificada, y no pudimos entrar en ella. Pero, rodeándola, la sitiamos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: κατεδιώξαμεν
  english_pob_choice: we pursued
  chosen_spanish: perseguimos
  alternatives_spanish:
  - dimos persecución a
  - persuimos
  lexicon: καταδιώκω
  rationale: El verbo griego expresa persecución o persecución militar; «perseguimos» comunica la acción de manera natural y fiel sin añadir matices no presentes.
- source_word: τοὺς υἱοὺς Ἡσαῦ
  english_pob_choice: the sons of Esau
  chosen_spanish: los hijos de Esaú
  alternatives_spanish:
  - los descendientes de Esaú
  - los hijos de Esaú
  lexicon: υἱοί
  rationale: Se mantiene la filiación literal del griego y del POB en inglés; «descendientes» sería posible, pero atenúa la forma concreta del texto.
- source_word: πόλις ὀχυρά
  english_pob_choice: a fortified city
  chosen_spanish: una ciudad fortificada
  alternatives_spanish:
  - una ciudad amurallada
  - una plaza fuerte
  lexicon: πόλις + ὀχυρός
  rationale: «Ciudad fortificada» conserva el sentido militar del adjetivo y es claro en español bíblico contemporáneo.
- source_word: οὐκ ἠδυνήθημεν εἰσελθεῖν ἐν αὐτῇ
  english_pob_choice: we were not able to enter it
  chosen_spanish: no pudimos entrar en ella
  alternatives_spanish:
  - no fuimos capaces de entrar en ella
  - no pudimos entrar allí
  lexicon: οὐκ ἠδυνήθημεν + εἰσελθεῖν
  rationale: La negación de capacidad/posibilidad se vierte naturalmente como «no pudimos», sin perder el valor de imposibilidad práctica del contexto.
- source_word: περικαθίσαντες
  english_pob_choice: sitting around it
  chosen_spanish: rodeándola
  alternatives_spanish:
  - sentados alrededor de ella
  - acampando alrededor de ella
  lexicon: περικαθίζω
  rationale: El participio tiene sentido de estar alrededor/sentarse en torno; en español, «rodeándola» preserva la idea espacial y se lee con más fluidez que un calco más pesado, sin borrar el trasfondo de cerco.
- source_word: ἐπολιορκοῦμεν
  english_pob_choice: we besieged it
  chosen_spanish: la sitiamos
  alternatives_spanish:
  - la asediamos
  - la cercamos en sitio
  lexicon: πολιορκέω
  rationale: «Sitiamos» es el equivalente militar directo y más idiomático en español para el contexto de asedio.
theological_decisions:
- issue: Tratamiento del nombre de Esaú
  english_pob_reading: the sons of Esau
  chosen_spanish_reading: los hijos de Esaú
  alternative_spanish_readings:
  - los descendientes de Esaú
  rationale: No hay aquí tensión teológica especial; se conserva el nombre propio como en el texto fuente y en el POB inglés, sin expandirlo.
  doctrine_reference: Onomástica bíblica / fidelidad textual
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa que cambió «sitting down around it» por «sitting around it» para mantener una sensación participial más natural; en español se resolvió con «rodeándola», que expresa la postura/posición circundante sin introducir una acción de sentarse que el griego no requiere explícitamente para la traducción principal.
  spanish_consistency_notes:
  - Se mantiene «Esaú» con ortografía española habitual.
  - Se usa el pretérito perfecto simple para narración consecutiva, acorde al relato.
  - No se introducen términos eclesiásticos ajenos al pasaje; el lenguaje es militar y narrativo, como el griego.
