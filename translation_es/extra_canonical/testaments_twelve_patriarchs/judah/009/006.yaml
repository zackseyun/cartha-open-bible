translation:
  language: es
  text: Y Rubén y Gad mataron a otros seis. Luego entraron sucesivamente.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀνεῖλον
  english_pob_choice: killed
  chosen_spanish: mataron
  alternatives_spanish:
  - dieron muerte a
  - asesinaron
  lexicon: ἀναιρέω
  rationale: El griego expresa la acción de quitar la vida; en español, «mataron» reproduce con sencillez y precisión el valor básico sin sobredeterminar intención jurídica o moral.
- source_word: ἑτέρους ἕξ
  english_pob_choice: another six
  chosen_spanish: a otros seis
  alternatives_spanish:
  - otros seis más
  - seis más
  lexicon: ἕτερος + ἕξ
  rationale: «ἑτέρους ἕξ» señala seis personas adicionales. «A otros seis» conserva el sentido acumulativo de manera natural en español.
- source_word: Καὶ Ῥουβὶμ καὶ ὁ Γὰδ
  english_pob_choice: And Reuben and Gad
  chosen_spanish: Y Rubén y Gad
  alternatives_spanish:
  - Y Rubén, y Gad
  - Entonces Rubén y Gad
  lexicon: καί + nombres propios
  rationale: Se mantiene la coordinación simple del original. «Rubén» es la forma usual en español para el nombre propio.
- source_word: ἑτέρους ἕξ / ἀνεῖλον
  english_pob_choice: another six / killed
  chosen_spanish: a otros seis
  alternatives_spanish:
  - otros seis
  - seis adicionales
  lexicon: contextual count phrase
  rationale: La cifra funciona como complemento directo de la acción; el español necesita la preposición «a» para naturalidad con personas determinadas.
theological_decisions:
- issue: La secuencia de acciones narrativas sin explicitar motivo moral
  english_pob_reading: And Reuben and Gad killed another six. Then they entered in succession.
  chosen_spanish_reading: Y Rubén y Gad mataron a otros seis. Luego entraron sucesivamente.
  alternative_spanish_readings:
  - Y Rubén y Gad dieron muerte a otros seis. Después entraron uno tras otro.
  rationale: El verso es descriptivo y no añade valoración ética en el texto base. La traducción evita intensificar el juicio o suavizarlo con eufemismos, preservando la crudeza narrativa.
  doctrine_reference: Narrative fidelity; lexical transparency
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios; por tanto, esta versión española sigue el texto griego transmitido y el sentido ya estabilizado en la auditoría inglesa sin introducir ajustes interpretativos adicionales.
  spanish_consistency_notes:
  - Se conserva «Gad» sin adaptar a una grafía menos habitual, para mantener correspondencia directa con el nombre del texto fuente y la tradición POB de transparencia textual.
  - «Sucesivamente» traduce el valor adverbial de la frase inglesa «in succession» de forma formal y clara en español, sin expandir el contenido narrativo.
