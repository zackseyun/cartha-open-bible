translation:
  language: es
  text: Durante dieciocho años, mi padre hizo paz con su hermano Esaú, y sus hijos estuvieron con nosotros después de que llegamos de Mesopotamia, de Labán.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐποίησεν ... εἰρήνην
  english_pob_choice: made peace
  chosen_spanish: hizo paz
  alternatives_spanish:
  - hizo la paz
  - estableció paz
  - concertó paz
  lexicon: ποιέω + εἰρήνη
  rationale: 'La construcción griega es literal: ‘hacer paz’. En español, ‘hizo paz’ conserva bien la fuerza verbal y evita introducir una formulación más interpretativa. ‘Hizo la paz’ es posible, pero ‘hizo paz’ refleja mejor la concisión del original y mantiene el tono sobrio del pasaje.'
- source_word: Ἡσαῦ
  english_pob_choice: Esau
  chosen_spanish: Esaú
  alternatives_spanish:
  - Esaú
  lexicon: Ἠσαῦ
  rationale: Nombre propio bíblico estándar en español; se mantiene la forma usual y reconocible.
- source_word: Μεσοποταμίας
  english_pob_choice: Mesopotamia
  chosen_spanish: Mesopotamia
  alternatives_spanish:
  - Mesopotamia
  lexicon: Μεσοποταμία
  rationale: Topónimo directo y estable en español; no requiere adaptación.
- source_word: ἀπὸ Λαβάν
  english_pob_choice: from Laban
  chosen_spanish: de Labán
  alternatives_spanish:
  - desde Labán
  lexicon: Λάβαν
  rationale: El griego repite ἀπό (‘de / desde’). En español, ‘de Labán’ reproduce naturalmente el complemento de procedencia. ‘Desde Labán’ sería más explícito, pero menos fluido aquí.
theological_decisions:
- issue: La expresión ‘hizo paz’ puede implicar una acción interpersonal o un estado de reconciliación.
  english_pob_reading: made peace with his brother Esau
  chosen_spanish_reading: hizo paz con su hermano Esaú
  alternative_spanish_readings:
  - hizo la paz con su hermano Esaú
  - reconciliarse con su hermano Esaú
  rationale: El testimonio del texto es histórico-narrativo, no doctrinal. Se conserva el sentido de reconciliación sin ampliarlo más allá del griego. No se introduce lenguaje confesional adicional.
  doctrine_reference: No aplica; decisión de traducción narrativa
translation_notes:
  revision_awareness: El pasaje no presenta revisiones en el historial; la traducción sigue directamente el texto griego base y concuerda con la lectura inglesa auditada, sin cambios necesarios reportados en latest_revision_pass.
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y bíblico, con nombres propios normalizados en español.
  - Se evita ‘SEÑOR’ o equivalentes no presentes en el original; el pasaje no contiene el nombre divino.
  - ‘Hizo paz’ conserva la sintaxis semítica/helénica sin volverla artificial en español.
