base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/009/007.yaml
  text: Then they asked us for terms of peace, and after counsel had been taken with our father, we accepted them.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:56:00Z'
    unchanged: false
    changes_summary: Changed 'asked from us' to the more natural and accurate 'asked us for' while preserving the formal sense; otherwise retained the draft.
translation:
  language: es
  text: Entonces nos pidieron condiciones de paz, y, habiéndose tomado consejo con nuestro padre, los aceptamos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: αἰτοῦσιν αὐτὸ τὰ πρὸς εἰρήνην
  english_pob_choice: they asked us for terms of peace
  chosen_spanish: nos pidieron condiciones de paz
  alternatives_spanish:
  - nos solicitaron condiciones de paz
  - pidieron de nosotros condiciones de paz
  lexicon: αἰτέω
  rationale: El griego expresa una petición dirigida a las personas («a nosotros») respecto de «las cosas para paz»; en español, «pedir condiciones de paz» conserva la relación natural del verbo y el matiz formal del acuerdo.
- source_word: τὰ πρὸς εἰρήνην
  english_pob_choice: terms of peace
  chosen_spanish: condiciones de paz
  alternatives_spanish:
  - propuestas de paz
  - cosas para paz
  lexicon: εἰρήνη
  rationale: La expresión griega es idiomática y apunta a las cláusulas o condiciones de reconciliación; «condiciones de paz» comunica ese valor contractual sin volverlo demasiado libre.
- source_word: γενομένης βουλῆς μετὰ τοῦ πατρὸς ἡμῶν
  english_pob_choice: after counsel had been taken with our father
  chosen_spanish: habiéndose tomado consejo con nuestro padre
  alternatives_spanish:
  - después de tomar consejo con nuestro padre
  - tras haberse deliberado con nuestro padre
  lexicon: βουλή
  rationale: La construcción genitiva absoluta indica una deliberación previa; «tomarse consejo» mantiene la idea de consulta y deliberación, y evita una paráfrasis más interpretativa.
- source_word: ὑποδεξάμενοι αὐτοὺς
  english_pob_choice: we accepted them
  chosen_spanish: los aceptamos
  alternatives_spanish:
  - los recibimos
  - los acogimos
  lexicon: ὑποδέχομαι
  rationale: El verbo puede significar recibir, acoger o aceptar según contexto. Aquí el inglés POB entendió el resultado como aceptación de sus términos; en español, «los aceptamos» sigue de cerca esa lectura y queda cohesionado con «condiciones de paz».
theological_decisions:
- issue: Naturaleza de la negociación de paz
  english_pob_reading: terms of peace ... we accepted them
  chosen_spanish_reading: condiciones de paz ... los aceptamos
  alternative_spanish_readings:
  - propuestas de paz ... las recibimos
  - acuerdos de paz ... los aceptamos
  rationale: El texto describe una negociación humana y no introduce contenido doctrinal adicional. Mantener un lenguaje de negociación evita proyectar una reconciliación más teológica de la que el griego explícitamente ofrece.
  doctrine_reference: No aplica; relato narrativo no doctrinal.
translation_notes:
  revision_awareness: La base inglesa revisada corrigió ‘asked from us’ a ‘asked us for’; la versión española adopta de forma natural esa relación sintáctica, con el sujeto implícito de la petición y el objeto de las condiciones de paz, sin añadir elementos ausentes del griego.
  spanish_consistency_notes:
  - Se mantiene un registro narrativo sobrio y formal, coherente con una traducción pública de POB.
  - No se introducen mayúsculas devocionales innecesarias, ya que el pasaje no contiene nombres divinos ni títulos técnicos.
  - 'Se conserva la estructura temporal: ‘Entonces... y, habiéndose...’ para reflejar la secuencia del griego sin sobrecargarla.'
