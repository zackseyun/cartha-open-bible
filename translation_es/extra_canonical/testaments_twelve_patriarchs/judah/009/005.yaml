base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/009/005.yaml
  text: And because they did not open to us after twenty days, while they were watching, I brought a ladder; and placing my shield over my head and receiving the stones, I went up and killed four of their mighty men.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:56:00Z'
    unchanged: false
    changes_summary: Changed 'brought up a ladder' to 'brought a ladder' for more natural English and closer fit to προσάγω; removed one unnecessary 'and' for smoother syntax while preserving all source elements.
translation:
  language: es
  text: Y porque no nos abrieron después de veinte días, mientras ellos vigilaban, yo traje una escalera; y, poniendo mi escudo sobre mi cabeza y recibiendo las piedras, subí y maté a cuatro de sus valientes.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: προσάγω
  english_pob_choice: I brought a ladder
  chosen_spanish: yo traje una escalera
  alternatives_spanish:
  - yo llevé una escalera
  - yo acerqué una escalera
  lexicon: προσάγω
  rationale: El griego expresa llevar o traer algo hacia el lugar de acción; el ajuste inglés eliminó el innecesario 'up' para acercarse mejor al sentido. En español, 'traje una escalera' conserva ese movimiento de aproximación sin añadir una dirección no explicitada.
- source_word: κλίμακα
  english_pob_choice: a ladder
  chosen_spanish: una escalera
  alternatives_spanish:
  - una escala
  - un andamio
  lexicon: κλίμακα
  rationale: El sustantivo designa una escalera o escalera de mano; 'escalera' es la opción natural y fiel en español. 'Escala' suena arcaica o ambigua aquí.
- source_word: ἀσπίδα
  english_pob_choice: my shield
  chosen_spanish: mi escudo
  alternatives_spanish:
  - mi rodela
  - mi adarga
  lexicon: ἀσπίς
  rationale: '''Escudo'' es el equivalente directo y transparente en español moderno. Las otras opciones introducen colorido histórico no requerido por el texto.'
- source_word: δυνάστας
  english_pob_choice: mighty men
  chosen_spanish: valientes
  alternatives_spanish:
  - hombres poderosos
  - príncipes
  - magnates
  lexicon: δυνάστης
  rationale: El término puede referirse a poderosos o notables; el contexto narrativo de combate favorece una referencia a guerreros destacados. 'Valientes' comunica la función narrativa sin imponer un rango político específico que el pasaje no desarrolla.
theological_decisions:
- issue: Retrato de violencia narrativa sin mitigación
  english_pob_reading: I went up and killed four of their mighty men.
  chosen_spanish_reading: subí y maté a cuatro de sus valientes.
  alternative_spanish_readings:
  - subí y maté a cuatro de sus poderosos
  - subí y abatí a cuatro de sus valientes
  rationale: El texto describe una acción bélica directa; no se suaviza el verbo. 'Maté' conserva la fuerza del griego ἀνεῖλον, y 'valientes' mantiene el valor contextual de δυνάστας sin sobrerreformularlo.
  doctrine_reference: Narrativa histórica/heroica; no hay afirmación doctrinal explícita en este versículo.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa que cambió 'brought up a ladder' por 'brought a ladder' para reflejar mejor προσάγω; por ello el español usa 'traje una escalera' en lugar de una construcción con 'subí' o 'levanté' que añadiría una dirección no presente. También se preservó la secuencia sintáctica compacta del ajuste revisado.
  spanish_consistency_notes:
  - Se mantiene 'escudo' para ἀσπίς en coherencia con una traducción directa y ampliamente inteligible.
  - Se evita introducir 'Cristo', 'Señor' u otra terminología no presente en el texto fuente.
  - La puntuación usa el español moderno con dos puntos y punto y coma solo donde ayuda a reproducir la coordinación del original sin recargar el estilo.
