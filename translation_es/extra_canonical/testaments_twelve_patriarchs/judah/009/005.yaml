  text: '*Καὶ ὡς οὐκ ἠνοίγον ἡμέρας εἴκοσι, δρώντων αὐτῶν²⁹ προσάγω³⁰ κλίμακα³¹ καὶ παραβησθεὶς³² *τὴν ἀσπίδα ἐπὶ τῆς κεφαλῆς μου³³ καὶ³⁴ ἀνῆλθον³⁵, *ἀποδεχόμενος ἀπὸ τοίχου λίθους³⁶ καὶ³⁷ ἀνεῖλον³⁸ τέσσαρας πόλει αὐτῶν δυνάστας³⁹.'
