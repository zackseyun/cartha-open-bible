id: T12P.JUD.9.8
reference: Testament of Judah 9:8
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (Judah source-fix v2 — T12P Pass A; α-column primary, apparatus stripped)
  text: Καὶ ἦσαν διδόντες⁴⁷ ἡμῖν πυροῦ⁴⁸ κόρους⁴⁹ πεντακοσίους⁵⁰, καὶ ἐλαίου †ὕφης⁵² πεντακοσίους⁵³, καὶ⁵⁴ οἴνου *μέτρα πεντακόσια ἕως τοῦ λιμοῦ⁵⁴ ὅτε⁵⁵ κατήλθομεν⁵⁶ εἰς Αἴγυπτον.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/009/008.yaml
  text: And they were giving us five hundred cors of wheat, and five hundred baths of oil, and five hundred measures of wine, until the famine, when we went down into Egypt.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:56:02Z'
    unchanged: false
    changes_summary: Replaced 'measures of oil' with 'baths of oil' to reflect the specific unit behind the Greek more accurately, while retaining 'measures' for wine where the text is less certain. No other changes needed.
translation:
  language: es
  text: Y nos estaban dando quinientos coros de trigo, y quinientos batos[a] de aceite, y quinientas medidas de vino, hasta el hambre, cuando descendimos a Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Unidad de capacidad transliterada del griego βάτος; se conserva para reflejar la precisión del texto sin sustituirla por una equivalencia aproximada.
    reason: lexical_alternative
lexical_decisions:
- source_word: πυροῦ
  english_pob_choice: wheat
  chosen_spanish: trigo
  alternatives_spanish:
  - grano
  - trigo en grano
  lexicon: πυρός
  rationale: El griego especifica el cereal de forma directa; en español ‘trigo’ comunica bien el alimento básico sin añadir explicaciones innecesarias.
- source_word: κόρους
  english_pob_choice: cors
  chosen_spanish: coros
  alternatives_spanish:
  - coros de medida
  - córos
  lexicon: κορός
  rationale: Se conserva el término de unidad de medida con adaptación gráfica normal al español, porque la POB en inglés mantiene la unidad específica y no la sustituye por una equivalencia aproximada.
- source_word: ὕφης
  english_pob_choice: baths
  chosen_spanish: batos[a]
  alternatives_spanish:
  - batos
  - baños
  lexicon: βάτος
  rationale: La revisión inglesa fijó ‘baths’ para el aceite; en español se conserva la unidad transliterada ‘batos’ para evitar la falsa asociación con ‘baños’ y mantener la precisión metrológica.
- source_word: μέτρα
  english_pob_choice: measures
  chosen_spanish: medidas
  alternatives_spanish:
  - medidas de capacidad
  - medidas
  lexicon: μέτρον
  rationale: El texto griego usa un término general de medida para el vino; ‘medidas’ refleja esa indeterminación sin forzar una unidad específica que el auditorio español no pueda verificar en el texto.
- source_word: λιμοῦ
  english_pob_choice: famine
  chosen_spanish: el hambre
  alternatives_spanish:
  - la hambruna
  - el hambre/falta de alimento
  lexicon: λιμός
  rationale: ‘Hambre’ reproduce el sentido amplio del desastre alimentario y mantiene la formulación narrativa breve del original; ‘hambruna’ sería también posible, pero menos directa frente al griego.
- source_word: κατήλθομεν εἰς Αἴγυπτον
  english_pob_choice: when we went down into Egypt
  chosen_spanish: cuando descendimos a Egipto
  alternatives_spanish:
  - cuando bajamos a Egipto
  - cuando fuimos a Egipto
  lexicon: κατέρχομαι
  rationale: ‘Descendimos’ conserva el movimiento direccional del griego y la fórmula tradicional semítica de ir ‘a Egipto’ como descenso geográfico.
theological_decisions:
- issue: Unidad monetaria/metrológica para el aceite
  english_pob_reading: five hundred baths of oil
  chosen_spanish_reading: quinientos batos de aceite
  alternative_spanish_readings:
  - quinientas medidas de aceite
  - quinientos baños de aceite
  rationale: La revisión inglesa indica que el griego apunta a una unidad específica detrás del aceite. En español se evita ‘medidas’, que diluye esa precisión, y también ‘baños’, que suena semánticamente engañoso; ‘batos’ preserva la tensión de una unidad antigua no domesticada.
  doctrine_reference: No doctrinal issue; textual-metrological precision
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente corrigió ‘measures of oil’ a ‘baths of oil’, pero mantuvo ‘measures’ para el vino. La versión española sigue esa distinción: conserva la especificidad metrológica del aceite con ‘batos’ y deja ‘medidas’ para el vino, sin sobreinterpretar la unidad menos segura.'
  spanish_consistency_notes:
  - Se usa ‘trigo’ para πυροῦ y no ‘harina’ ni ‘cereal’, porque el contexto exige un producto agrícola básico, no un procesado.
  - Se mantiene el orden acumulativo de la lista como en el griego y en el inglés POB, con repetición de ‘quinientos/quinientas’ para preservar el ritmo del pasaje.
  - ‘Egipto’ se conserva sin artículo, conforme al uso bíblico habitual y al griego con εἰς Αἴγυπτον.
