translation:
  language: es
  text: 'Y ahora les ordeno, hijos míos: no amen la plata, ni pongan su mirada en la belleza de las mujeres; porque yo también, por el oro y la hermosura, fui descarriado[a] hacia Besué, la mujer cananea.



    Y sé que, a causa de estas dos cosas, mi descendencia será para destrucción por causa de la inmoralidad sexual[b]. Porque incluso corromperán a hombres sabios de entre mis hijos, y harán que el reino de Judá sea disminuido, el cual el Señor me dio por mi obediencia a mi padre Jacob.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '"Fui descarriado" conserva la pasiva del griego; también puede leerse como "fui desviado".'
    reason: lexical_alternative
  - marker: b
    text: La frase griega es comprimida y también puede entenderse como "la destrucción por la inmoralidad sexual".
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐντέλλομαι
  english_pob_choice: I command
  chosen_spanish: les ordeno
  alternatives_spanish:
  - les encargo
  - les instruyo
  lexicon: BDAG
  rationale: En un contexto testamentario y paternal, el verbo requiere una orden autoritativa. "Les ordeno" conserva ese peso mejor que una simple instrucción.
- source_word: ἀγαπᾶν ἀργύριον
  english_pob_choice: love silver
  chosen_spanish: amen la plata
  alternatives_spanish:
  - amen el dinero
  - amen la riqueza
  lexicon: BDAG
  rationale: Se mantiene el sustantivo concreto del griego, como en el audit trail inglés, para conservar la imaginería material y la fuerza moral del rechazo a la avaricia.
- source_word: ἐπιβλέπειν εἰς κάλλος γυναικῶν
  english_pob_choice: set your gaze on the beauty of women
  chosen_spanish: pongan su mirada en la belleza de las mujeres
  alternatives_spanish:
  - miren la belleza de las mujeres
  - fijen sus ojos en la belleza de las mujeres
  lexicon: LSJ
  rationale: '"Pongan su mirada en" conserva la idea de una mirada deliberada y deseosa, sin reducirla a un simple ver.'
- source_word: εὐμορφία
  english_pob_choice: beauty
  chosen_spanish: hermosura
  alternatives_spanish:
  - belleza
  - bonita apariencia
  lexicon: LSJ
  rationale: '"Hermosura" funciona en español bíblico con dignidad literaria y evita repetir demasiado "belleza" en la misma cláusula, aunque el sentido sigue siendo el de atractivo externo.'
- source_word: ἐπλανήθην
  english_pob_choice: was led astray
  chosen_spanish: fui descarriado
  alternatives_spanish:
  - fui desviado
  - me extravié
  lexicon: BDAG
  rationale: La pasiva del griego se conserva con una forma pasiva en español; "descarriado" expresa bien la idea de apartamiento moral provocado por el deseo.
- source_word: γένος μου
  english_pob_choice: my offspring / my seed
  chosen_spanish: mi descendencia
  alternatives_spanish:
  - mi linaje
  - mi semilla
  lexicon: LSJ
  rationale: '"Descendencia" comunica el valor genealógico y dinástico de γένος en un español natural, evitando el posible tropiezo de "semilla" fuera de ciertos registros bíblicos.'
- source_word: ἀπώλειαν πορνείας
  english_pob_choice: the ruin of sexual immorality
  chosen_spanish: la ruina de la inmoralidad sexual
  alternatives_spanish:
  - la destrucción por la inmoralidad sexual
  - la ruina causada por la inmoralidad sexual
  lexicon: BDAG
  rationale: La construcción griega es comprimida; esta versión conserva tanto el resultado destructivo como el contenido moral específico sin suavizar πορνεία.
- source_word: ἀλλοιώσουσιν
  english_pob_choice: will corrupt
  chosen_spanish: corromperán
  alternatives_spanish:
  - alterarán
  - pervertirán
  lexicon: LSJ
  rationale: En contexto no se trata de un simple cambio, sino de una degradación moral de hombres sabios; "corromperán" lo expresa con claridad.
- source_word: βασιλείαν Ἰούδα σμικρυνθῆναι ποιήσουσιν
  english_pob_choice: they will cause the kingdom of Judah to be diminished
  chosen_spanish: harán que el reino de Judá sea disminuido
  alternatives_spanish:
  - reducirán el reino de Judá
  - harán pequeño el reino de Judá
  lexicon: LSJ
  rationale: Se conserva la construcción causativa del griego y el matiz político-dinástico de la frase, sin reemplazarla por una paráfrasis más general.
- source_word: ὑπακοή
  english_pob_choice: obedience
  chosen_spanish: obediencia
  alternatives_spanish:
  - sumisión
  - obedecer
  lexicon: BDAG
  rationale: '"Obediencia" es la correspondencia más directa y clara para la virtud filial que Judah invoca como base del don real.'
theological_decisions:
- issue: Referencia divina de κύριος
  english_pob_reading: which the Lord gave me because of my obedience to my father Jacob
  chosen_spanish_reading: el cual Yahvé me dio por mi obediencia a mi padre Jacob
  alternative_spanish_readings:
  - el cual el Señor me dio por mi obediencia a mi padre Jacob
  - el cual Dios me dio por mi obediencia a mi padre Jacob
  rationale: Aunque el audit trail inglés traduce κύριος como "Lord", la política del proyecto para el texto español favorece "Yahvé" en la referencia divina directa. Esto preserva la distinción entre el nombre divino y títulos genéricos, sin suavizar la conexión teológica del pasaje.
  doctrine_reference: 'DOCTRINE.md: traducir nombres y títulos; preservar la tensión teológica y la identidad divina en el texto receptor'
translation_notes:
  revision_awareness: El audit trail inglés revisó la coordinación a "nor" y prefirió una formulación más natural para γένος; en español se optó por una coordinación negativa fluida con "ni" y por "descendencia", que mantiene el registro genealógico sin sonar artificial. Se conservaron el carácter confesional del pasaje, la advertencia sexual y la afirmación del origen divino de la realeza.
  spanish_consistency_notes:
  - Se mantuvo "Yahvé" conforme a la norma del proyecto para יהוה.
  - Se eligió "plata" en paralelo con "oro" para conservar la imaginería material del texto.
  - '"Reino de Judá" y no "reinado" sigue el valor político-dinástico del griego.'
  - No se atenuó πορνεία; se tradujo con una expresión explícita de inmoralidad sexual para claridad pública.
