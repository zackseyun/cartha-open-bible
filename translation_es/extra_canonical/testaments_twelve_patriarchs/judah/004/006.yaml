    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Y cayó terror sobre ellos, y dejaron de hacernos guerra.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπέπεσεν ... τρόμος
  english_pob_choice: terror fell upon them
  chosen_spanish: cayó terror sobre ellos
  alternatives_spanish:
  - cayó el terror sobre ellos
  - sobrevino terror sobre ellos
  lexicon: πίπτω / τρόμος
  rationale: Mantiene la imagen dinámica del “caer” para ἐπέπεσεν y conserva τρόμος como ‘terror’, en línea con la fuerza intensa del griego y con la solución inglesa auditada.
- source_word: ἐπαύσαντο
  english_pob_choice: they stopped
  chosen_spanish: dejaron de
  alternatives_spanish:
  - cesaron de
  - pararon de
  lexicon: παύω
  rationale: ‘Dejaron de’ expresa de forma natural el cese de la acción sin añadir matiz técnico indebido; corresponde bien al aoristo medio plural del verbo.
- source_word: πολε-ἀμέριμνος μοῦντες ἡμᾶς
  english_pob_choice: making war against us
  chosen_spanish: hacernos guerra
  alternatives_spanish:
  - combatirnos
  - guerrearnos
  lexicon: πολεμέω
  rationale: ‘Hacernos guerra’ conserva el sentido bélico directo de πολεμέω y el complemento acusativo ‘a nosotros’ sin sobretraducir a un giro más abstracto.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; por tanto, esta versión española sigue de cerca la lectura inglesa aprobada y el griego subyacente sin introducir expansión interpretativa.
  spanish_consistency_notes:
  - Se conserva un registro sobrio y bíblico, pero con sintaxis española natural.
  - No se introduce vocabulario eclesiástico no exigido por el griego; ‘guerra’ mantiene el tono concreto del pasaje.
  - El pronombre de objeto directo plural ‘ellos’ se mantiene explícito para reflejar el sujeto del ataque y evitar ambigüedad en español.
