base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/004/008.yaml
  text: For he saw in a vision concerning me that an angel of power accompanied me in all things, so that I might not be touched.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:54Z'
    unchanged: false
    changes_summary: Replaced 'went along with me' with the more formal 'accompanied me'; rendered the purpose clause more literally as 'so that I might not be touched' rather than adding 'no one,' which is not explicit in the Greek.
translation:
  language: es
  text: Porque vio en visión acerca de mí que un ángel de poder me acompañaba en todas las cosas, para que yo no fuera tocado.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐν ὁράματι
  english_pob_choice: in a vision
  chosen_spanish: en visión
  alternatives_spanish:
  - en una visión
  - por medio de una visión
  lexicon: ὅραμα
  rationale: ‘En visión’ conserva la preposición del griego y mantiene la formulación breve del testimonio visionario; ‘en una visión’ sería igualmente natural, pero un poco más explícito que el griego.
- source_word: ἄγγελος δυνάμεως
  english_pob_choice: an angel of power
  chosen_spanish: un ángel de poder
  alternatives_spanish:
  - un ángel poderoso
  - un ángel de fuerza
  lexicon: ἄγγελος; δύναμις
  rationale: Se mantiene el genitivo de relación ‘de poder’ para no suavizar la expresión ni convertirla en un mero adjetivo. ‘Poder’ respeta la fuerza conceptual de δύναμις en el contexto protector.
- source_word: συνέπεταί μοι
  english_pob_choice: accompanied me
  chosen_spanish: me acompañaba
  alternatives_spanish:
  - iba conmigo
  - me seguía
  lexicon: συνεπομαι
  rationale: ‘Me acompañaba’ reproduce la revisión inglesa y es el equivalente español más sobrio y formal para una presencia continua al lado del hablante.
- source_word: ἐν πᾶσι
  english_pob_choice: in all things
  chosen_spanish: en todas las cosas
  alternatives_spanish:
  - en todo
  - en todas las circunstancias
  lexicon: πᾶς
  rationale: ‘En todas las cosas’ sigue de cerca la amplitud del griego. Se evita ‘en todo’ porque podría sonar menos concreto en español bíblico.
- source_word: τοῦ μὴ ἅψασθαί μοι
  english_pob_choice: so that I might not be touched
  chosen_spanish: para que yo no fuera tocado
  alternatives_spanish:
  - para que no me tocaran
  - a fin de que no me tocara nadie
  lexicon: ἅπτω
  rationale: La pasiva española conserva la literalidad de la revisión inglesa y no introduce un sujeto implícito (‘nadie’), que el griego no expresa. ‘Tocado’ mantiene la idea de contacto físico.
theological_decisions:
- issue: Protección angelical y pasiva final
  english_pob_reading: so that I might not be touched
  chosen_spanish_reading: para que yo no fuera tocado
  alternative_spanish_readings:
  - para que no me tocaran
  - para que nadie me tocara
  rationale: 'Se preserva la ambigüedad del griego y del inglés revisado: el énfasis está en el efecto protector, no en identificar explícitamente al agente de la acción. La pasiva evita añadir un ‘nadie’ no presente en el texto.'
  doctrine_reference: Providencia y protección divina mediada por un ángel; cf. lenguaje bíblico de custodia angelical.
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa, especialmente ‘accompanied me’ y la cláusula de propósito en forma pasiva (‘so that I might not be touched’), evitando añadir un sujeto implícito que no aparece en el griego.
  spanish_consistency_notes:
  - Se usa ‘ángel de poder’ de forma consistente con la estructura del genitivo griego y la elección inglesa auditada.
  - Se evita ‘SEÑOR’ o ‘Cristo’ porque este versículo no contiene esos términos ni alude a ellos de manera directa.
  - La pasiva ‘no fuera tocado’ mantiene el registro bíblico y la cautela semántica del texto fuente.
