  text: 10. *Εἶδε γὰρ⁶⁸ *ἐν ὁράματι⁶⁹ Γπερὶ ἐμοῦ⁷⁰ ὅτι ἄγγελος ὅτι. δυνάμεως⁷¹ *συνέπεταί μοι⁷² ἐν πᾶσι, τοῦ μὴ *ἅψασθαί μοι⁷³.
