translation:
  language: es
  text: Pero los demás huyeron.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: οἱ δὲ λοιποί
  english_pob_choice: But the rest
  chosen_spanish: Pero los demás
  alternatives_spanish:
  - Pero el resto
  - Pero los otros
  lexicon: λοιποί
  rationale: El griego contrasta a un grupo restante con los que fueron capturados o cayeron. En español, «los demás» expresa de forma natural ese conjunto remanente sin introducir una idea de totalidad excesiva que puede tener «el resto» en algunos contextos.
- source_word: ἔφυγον
  english_pob_choice: fled
  chosen_spanish: huyeron
  alternatives_spanish:
  - escaparon
  - fugaron
  lexicon: φεύγω
  rationale: «Huyeron» mantiene el sentido básico de escape apresurado o retirada, y suena natural en español bíblico contemporáneo. «Escaparon» es posible, pero puede suavizar el matiz de huida.
theological_decisions:
- issue: Contraste narrativo entre los que fueron muertos/capturados y el remanente que huyó
  english_pob_reading: But the rest fled.
  chosen_spanish_reading: Pero los demás huyeron.
  alternative_spanish_readings:
  - Pero el resto huyó.
  - Y los demás huyeron.
  rationale: No hay desarrollo doctrinal explícito en la cláusula; la decisión principal es preservar el contraste narrativo y no añadir inferencias sobre cobardía, providencia o juicio que el texto no formula.
  doctrine_reference: None
translation_notes:
  revision_awareness: El audit trail inglés no añade notas ni revisiones; la versión más reciente quedó sin cambios. Por ello, la redacción española sigue directamente el breve dato griego y el equivalente inglés, sin ampliar el contenido.
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y conciso, acorde con la brevedad del original griego.
  - No se introducen mayúsculas teológicas ni terminología eclesiástica no presente en el texto.
  - «Huyeron» conserva el valor verbal de ἔφυγον sin sobretraducción.
