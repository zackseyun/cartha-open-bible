source:
  edition: Charles 1908 Greek Versions (pages 134-175, Judah pilot full)
  text: '*Καὶ μετὰ τοῦτο γέγονεν ἡμῖν κατὰ νότον¹ πόλεμος² με. μείζων³ *τοῦ ἐν Σικίμοις⁴· καὶ παραταξάμενος *σὺν τοῖς β-dg, A, S¹ ἀδελφοῖς⁵ μου ἐδιώξαμεν⁶ χιλίους⁷ καὶ ἀπεκτείναμεν⁸ ἓξ καὶ κατὰ νότον γέγονεν ἡμῖν. β, A-b*, S¹ ἐδίωξα. β, A-b*, S¹ ἀπέκτεινα . . . διακοσίους ἄνδρας καὶ τέσσαρας βασιλεῖς. β, S¹       αὐτῶν διακοσίους⁹. †ἄλλους'
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/004/001.yaml
  text: And after this there came to us a war toward the south, greater than the one at Shechem; and having drawn up in battle with my brothers, we pursued a thousand men and killed two hundred of them, and four kings.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:52Z'
    unchanged: false
    changes_summary: Adjusted word order to reflect the Greek more closely ('a war toward the south, greater than...'), and revised 'when I had drawn up in battle' to the more natural and formally equivalent 'having drawn up in battle.'
translation:
  language: es
  text: Y después de esto nos sobrevino una guerra hacia el sur, mayor que la de Siquem; y habiéndome ordenado en batalla con mis hermanos, perseguimos a mil hombres y matamos a doscientos de ellos, y a cuatro reyes.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: κατὰ νότον
  english_pob_choice: toward the south
  chosen_spanish: hacia el sur
  alternatives_spanish:
  - al sur
  - rumbo al sur
  lexicon: νότος
  rationale: La preposición indica dirección, no necesariamente una localización fija; en español, «hacia el sur» conserva bien ese valor direccional.
- source_word: πόλεμος μείζων τοῦ ἐν Σικίμοις
  english_pob_choice: a war toward the south, greater than the one at Shechem
  chosen_spanish: una guerra hacia el sur, mayor que la de Siquem
  alternatives_spanish:
  - una guerra al sur, más grande que la de Siquem
  - una guerra hacia el sur, mayor que la guerra en Siquem
  lexicon: πόλεμος / μείζων / Σικίμοις
  rationale: Mantiene el orden y la comparación del griego y del texto inglés revisado. «Siquem» sigue la forma tradicional del topónimo en español bíblico.
- source_word: παραταξάμενος
  english_pob_choice: having drawn up in battle
  chosen_spanish: habiéndome ordenado en batalla
  alternatives_spanish:
  - habiéndonos dispuesto para la batalla
  - al formar batalla
  lexicon: παρατάσσω
  rationale: La idea es alinearse o disponerse en orden de combate. En español, «ordenado en batalla» comunica la formación militar sin perder la forma participial del original; se mantiene el sujeto en primera persona singular porque habla Judá.
- source_word: σὺν τοῖς ἀδελφοῖς μου
  english_pob_choice: with my brothers
  chosen_spanish: con mis hermanos
  alternatives_spanish:
  - junto con mis hermanos
  - al lado de mis hermanos
  lexicon: σύν + ἀδελφοί
  rationale: Es la equivalencia directa y natural en español para la compañía en combate.
- source_word: ἐδιώξαμεν χιλίους
  english_pob_choice: we pursued a thousand men
  chosen_spanish: perseguimos a mil hombres
  alternatives_spanish:
  - dimos persecución a mil hombres
  - persiguimos a mil
  lexicon: διώκω
  rationale: «Perseguir» conserva el valor de hostigar/seguir al enemigo. «A mil hombres» hace explícito el objeto humano que el griego expresa de modo elíptico.
- source_word: ἀπεκτείναμεν ἓξ ... διακοσίους ἄνδρας καὶ τέσσαρας βασιλεῖς
  english_pob_choice: and killed two hundred of them, and four kings
  chosen_spanish: y matamos a doscientos de ellos, y a cuatro reyes
  alternatives_spanish:
  - y matamos a doscientos hombres y a cuatro reyes
  - y matamos doscientos de ellos y a cuatro reyes
  lexicon: ἀποκτείνω / ἄνδρας / βασιλεῖς
  rationale: Sigo la lectura principal del contexto inglés auditado, que cifra el resultado en doscientos y cuatro reyes. En español, «a doscientos de ellos» preserva el referente elíptico sin añadir información no segura.
theological_decisions:
- issue: Violencia bélica y número de muertos
  english_pob_reading: presents a martial report without theological expansion
  chosen_spanish_reading: presenta un informe bélico sin añadir interpretación teológica
  alternative_spanish_readings:
  - hacer una explicación moralizante
  - suavizar el lenguaje de muerte
  rationale: El pasaje es narrativo y testimonial; la traducción debe conservar su crudeza histórica sin atenuarla ni moralizarla fuera del texto.
  doctrine_reference: Principio de correspondencia textual y no-expansión interpretativa
translation_notes:
  revision_awareness: 'La versión inglesa fue revisada para acercar el orden al griego: primero ''a war toward the south, greater than...'' y luego ''having drawn up in battle''. La versión española refleja esa misma secuencia: primero la guerra, luego la comparación, y después la acción participial de disposición para la batalla.'
  spanish_consistency_notes:
  - Se usa «Siquem» para el topónimo, conforme al uso bíblico en español.
  - Se mantiene la primera persona plural en los verbos militares, coherente con el sujeto colectivo del relato.
  - No se emplea «Mesías» ni terminología cristológica porque el pasaje no lo contiene.
  - No se introducen notas al pie porque no hay ambigüedad textual que requiera anclaje explícito en este verso.
