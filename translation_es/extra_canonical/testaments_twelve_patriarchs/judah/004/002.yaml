translation:
  language: es
  text: Y subí al doble muro y maté a su rey.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀνῆλθον ἐπὶ
  english_pob_choice: I went up upon
  chosen_spanish: subí a / sobre
  alternatives_spanish:
  - subí sobre
  - ascendí a
  lexicon: ἀναβαίνω
  rationale: El griego expresa ascenso o subida hacia una posición elevada; «subí al doble muro» conserva el movimiento y suena natural en español sin añadir matices no presentes.
- source_word: τοῦ δύο ... τείχους
  english_pob_choice: the double wall
  chosen_spanish: el doble muro
  alternatives_spanish:
  - la doble muralla
  - el muro doble
  lexicon: τεῖχος
  rationale: La revisión inglesa fijó «double wall» para reflejar el detalle de dos muros/una fortificación doble. «Doble muro» mantiene ese rasgo estructural con un registro claro y bíblico en español.
- source_word: ἀνεῖλον
  english_pob_choice: killed
  chosen_spanish: maté
  alternatives_spanish:
  - desterreé
  - derribé
  - deseché
  lexicon: ἀναιρέω
  rationale: Aquí el verbo indica dar muerte; «maté» es directo, preciso y corresponde al forcejeo narrativo del contexto.
- source_word: τὸν βασιλέα αὐτῶν
  english_pob_choice: their king
  chosen_spanish: a su rey
  alternatives_spanish:
  - a su rey
  - a su monarca
  lexicon: βασιλεύς
  rationale: «Rey» es la equivalencia normal y más transparente para βασιλεύς; «su rey» preserva la referencia posesiva del griego.
theological_decisions:
- issue: Violencia narrativa y legitimidad del acto
  english_pob_reading: And I went up upon the double wall and killed their king.
  chosen_spanish_reading: Y subí al doble muro y maté a su rey.
  alternative_spanish_readings:
  - Y subí al doble muro y derribé a su rey.
  - Y subí al doble muro y lo maté, a su rey.
  rationale: El texto presenta una acción bélica de primera persona sin comentario moral explícito; la traducción debe mantener esa literalidad narrativa sin suavizar ni añadir evaluación teológica.
  doctrine_reference: Narrativa histórica/poética; no formula doctrina directa.
translation_notes:
  revision_awareness: La versión inglesa revisada cambió «the wall» por «the double wall» para reflejar τοῦ δύο ... τείχους; la draft española incorpora ese detalle con «el doble muro» y conserva el resto de la oración de forma natural.
  spanish_consistency_notes:
  - Se mantiene el pretérito perfecto simple («subí», «maté») para reflejar la secuencia narrativa del griego.
  - No se introduce terminología eclesial o interpretativa ajena al pasaje.
  - «Muro» se prefirió a «muralla» por brevedad y para conservar el paralelo con la revisión inglesa de «double wall», aunque ambas opciones son posibles en español.
