base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/004/007.yaml
  text: Therefore my father was free from चिंता in the wars while I was with my brothers.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:52Z'
    unchanged: false
    changes_summary: Replaced 'without anxiety' with the more natural formal expression 'free from anxiety.'
translation:
  language: es
  text: Por tanto, mi padre estaba libre de preocupación en las guerras mientras yo estaba con mis hermanos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀμέριμνος
  english_pob_choice: free from anxiety
  chosen_spanish: libre de preocupación
  alternatives_spanish:
  - sin ansiedad
  - sin preocupación
  - libre de ansiedad
  lexicon: ἀμέριμνος
  rationale: El griego describe la ausencia de afán o inquietud. En español, «libre de preocupación» conserva el valor natural y formal del giro inglés auditado, sin volverlo más clínico de lo que exige el contexto.
- source_word: ἐν τοῖς πολέμοις
  english_pob_choice: in the wars
  chosen_spanish: en las guerras
  alternatives_spanish:
  - en la guerra
  - en los combates
  lexicon: πόλεμος
  rationale: El plural griego se mantiene de manera directa como «las guerras», porque el texto habla de un marco bélico general y no de una sola campaña.
- source_word: σὺν τοῖς ἀδελφοῖς μου
  english_pob_choice: while I was with my brothers
  chosen_spanish: mientras yo estaba con mis hermanos
  alternatives_spanish:
  - cuando yo estaba con mis hermanos
  - estando yo con mis hermanos
  lexicon: σύν
  rationale: La frase expresa compañía simultánea. «Mientras yo estaba con mis hermanos» conserva la relación temporal y de acompañamiento que presenta el griego y que refleja el inglés auditado.
- source_word: Διὰ τοῦτο
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: διὰ τοῦτο
  rationale: La locución causal-consecutiva se traduce con una fórmula sobria y bíblica en español, manteniendo la conexión lógica del enunciado.
theological_decisions:
- issue: Sentido de la ausencia de preocupación de Jacob/Israel en contexto de guerra
  english_pob_reading: free from anxiety in the wars
  chosen_spanish_reading: libre de preocupación en las guerras
  alternative_spanish_readings:
  - sin ansiedad en las guerras
  - sin preocupación en las guerras
  rationale: 'No hay tensión doctrinal especial, pero sí un matiz pastoral: el texto no afirma valentía heroica, sino ausencia de inquietud. «Libre de preocupación» preserva ese matiz sin sobrecargarlo.'
  doctrine_reference: none
translation_notes:
  revision_awareness: La revisión inglesa reciente sustituyó «without anxiety» por la expresión más natural «free from anxiety». La versión española sigue esa misma decisión semántica con «libre de preocupación», evitando una calca rígida como «sin ansiedad» salvo que el contexto exigiera el término más técnico.
  spanish_consistency_notes:
  - Se mantiene un español moderno y digno, sin arcaísmos innecesarios.
  - No se usa «SEÑOR» ni otros reemplazos de nombre divino porque este versículo no contiene el tetragrámaton ni κύριος como cita divina.
  - La puntuación y el orden siguen una sintaxis natural para el español, conservando la relación causal y temporal del original.
