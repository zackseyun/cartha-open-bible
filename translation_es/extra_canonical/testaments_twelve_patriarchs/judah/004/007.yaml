  text: 9. *Διὰ τοῦτο ὁ πατήρ μου ἀμέριμνος ἦν ἦν ὁ π. ἐν τοῖς πολέμοις⁶⁵, ὅτε⁶⁶ ἐγὼ *σὺν τοῖς ἀδελφοῖς μου ἤμην⁶⁷. μου. h, Aabefg
