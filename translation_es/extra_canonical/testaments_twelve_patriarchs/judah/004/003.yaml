translation:
  language: es
  text: Y así liberamos a Hebrón y tomamos a todos los cautivos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἠλευθερώσαμεν
  english_pob_choice: set Hebron free
  chosen_spanish: liberamos a Hebrón
  alternatives_spanish:
  - pusimos en libertad a Hebrón
  - dejamos libre a Hebrón
  lexicon: ἐλευθερόω
  rationale: El griego expresa liberar/poner en libertad. En español, «liberamos» conserva la acción de liberar sin añadir una formulación más explicativa de la necesaria. Se mantiene Hebrón como objeto liberado, conforme al sentido del texto y al inglés POB.
- source_word: Χεβρών
  english_pob_choice: Hebron
  chosen_spanish: Hebrón
  alternatives_spanish:
  - Hebrón
  lexicon: Χεβρών
  rationale: Se conserva el topónimo en su forma española estándar con tilde, sin alterar el referente geográfico.
- source_word: πᾶσαν τὴν αἰχμαλωσίαν
  english_pob_choice: all the captives
  chosen_spanish: a todos los cautivos
  alternatives_spanish:
  - toda la cautividad
  - todos los prisioneros
  lexicon: αἰχμαλωσία
  rationale: Aunque el sustantivo puede denotar «cautividad» como estado, el inglés POB lo concretó como personas cautivas. En español, «cautivos» reproduce mejor esa concreción y evita una abstracción innecesaria.
theological_decisions:
- issue: Tratamiento de la acción de «liberar» sin sobrecargarla con matices soteriológicos
  english_pob_reading: And so we set Hebron free
  chosen_spanish_reading: Y así liberamos a Hebrón
  alternative_spanish_readings:
  - Y así pusimos en libertad a Hebrón
  - Y así dejamos libre a Hebrón
  rationale: El contexto es militar/narrativo, no doctrinal. Se traduce la liberación de la ciudad con un verbo directo y no se introduce lenguaje teológico ajeno al pasaje.
  doctrine_reference: Narrativa histórica; no aplica una formulación doctrinal específica.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios y que el inglés auditado quedó estable; por tanto, el español sigue de cerca la lectura ya aprobada, sin introducir variantes textuales nuevas.
  spanish_consistency_notes:
  - Se mantiene un español sobrio y publicable, con sintaxis simple equivalente al inglés POB.
  - No se añade nota al pie porque el texto fuente y el inglés auditado no preservan ninguna tensión lexical explícita que requiera anotación en esta sección.
  - Se evita traducir mecánicamente «captives» como «cautividad» para no perder la referencia a personas capturadas en el contexto narrativo.
