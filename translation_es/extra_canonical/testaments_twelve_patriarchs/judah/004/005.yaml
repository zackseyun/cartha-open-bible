source:
  edition: Charles 1908 Greek Versions (pages 134-175, Judah pilot full)
  text: 7. *Ὁ δὲ πατὴρ καὶ Ἰακὼβ ὁ μου Ἰακώβ⁵⁴ ἀνεῖλε τὸν †Βελισάθ⁵⁵, βασιλέα⁵⁶ πάντων⁵⁷ πατὴρ τῶν⁵⁸ βασιλέων, Γἄνδρα¹⁵⁹ γίγαντα τῇ ἰσχύι πηχῶν δώδεκα⁶⁰. β, Aab, S¹ ἡμῶν.
