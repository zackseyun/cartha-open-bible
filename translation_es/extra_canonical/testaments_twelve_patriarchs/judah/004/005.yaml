base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/004/005.yaml
  text: Then my father Jacob killed Belisath, king of all, father of kings, a giant man in strength, twelve cubits tall.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:53Z'
    unchanged: false
    changes_summary: Revised 'king of all the kings' to 'king of all, father of kings' to reflect the Greek more completely and naturally; changed 'a man giant in strength' to 'a giant man in strength' for readable formal English; rendered the final measure as 'twelve cubits tall' for natural completeness.
translation:
  language: es
  text: Entonces mi padre Jacob mató a Belisat, rey de todos, padre de reyes, un hombre gigante en fuerza, de doce codos de altura.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ὁ δὲ πατὴρ καὶ Ἰακὼβ ... ἀνεῖλε
  english_pob_choice: Then my father Jacob killed ...
  chosen_spanish: Entonces mi padre Jacob mató ...
  alternatives_spanish:
  - Luego mi padre Jacob dio muerte a ...
  - Entonces mi padre Jacob mató ...
  lexicon: ἀνεῖλε
  rationale: El verbo griego expresa matar/dar muerte; 'mató' conserva la fuerza directa y sigue de cerca la lectura del POB inglés, sin introducir una perífrasis más interpretativa.
- source_word: Βελισάθ
  english_pob_choice: Belisath
  chosen_spanish: Belisat
  alternatives_spanish:
  - Belisat
  - Belisath
  lexicon: nombre propio
  rationale: Se mantiene el nombre propio transliterado al español con ajuste ortográfico mínimo para fluidez y coherencia gráfica en español, sin pretender una forma crítica no atestiguada.
- source_word: βασιλέα πάντων
  english_pob_choice: king of all
  chosen_spanish: rey de todos
  alternatives_spanish:
  - rey de todo
  - rey de todos los pueblos
  lexicon: βασιλεύς / πάντων
  rationale: La frase griega es literal y breve; 'rey de todos' reproduce el alcance universal sin expandirlo innecesariamente a 'de todos los reyes', que es la variante revisada descartada en el POB inglés.
- source_word: πατὴρ τῶν βασιλέων
  english_pob_choice: father of kings
  chosen_spanish: padre de reyes
  alternatives_spanish:
  - padre de los reyes
  - progenitor de reyes
  lexicon: πατήρ / βασιλέων
  rationale: Se conserva la relación metafórica exacta del griego y del POB inglés. 'Padre de reyes' evita una explicación añadida y mantiene la ambigüedad honorífica/genealógica del giro.
- source_word: Γἄνδρα γίγαντα τῇ ἰσχύι
  english_pob_choice: a giant man in strength
  chosen_spanish: un hombre gigante en fuerza
  alternatives_spanish:
  - un hombre gigante por su fuerza
  - un gigante hombre en fuerza
  lexicon: γίγας / ἰσχύς
  rationale: La construcción griega es difícil y el POB inglés opta por preservar la literalidad. En español, 'hombre gigante en fuerza' mantiene el vínculo entre 'gigante' y 'en fuerza' sin suavizarlo a 'muy fuerte', que diluiría el rasgo extraordinario.
- source_word: πηχῶν δώδεκα
  english_pob_choice: twelve cubits tall
  chosen_spanish: de doce codos de altura
  alternatives_spanish:
  - de doce codos de alto
  - doce codos de altura
  lexicon: πηχῶν
  rationale: '''Codos'' es el equivalente estándar de la unidad antigua; ''de doce codos de altura'' es natural en español y conserva la medida exacta del texto griego y del POB inglés.'
theological_decisions:
- issue: Descripción hiperbólica/legendaria del personaje como 'gigante' y su estatura
  english_pob_reading: a giant man in strength, twelve cubits tall
  chosen_spanish_reading: un hombre gigante en fuerza, de doce codos de altura
  alternative_spanish_readings:
  - un hombre gigantesco en fuerza, de doce codos de altura
  - un hombre de gran fuerza, de doce codos de altura
  rationale: El texto transmite una caracterización extraordinaria que debe conservarse sin racionalizarla. 'Gigante' mantiene la tensión narrativa y antropológica del pasaje, en lugar de normalizarlo con una paráfrasis más vaga.
  doctrine_reference: Lectura literaria del Testamento de los Doce Patriarcas; no se resuelve la historicidad aquí.
translation_notes:
  revision_awareness: Se ha seguido la revisión inglesa más reciente que restituye 'king of all, father of kings' y 'a giant man in strength' como base de equivalencia formal/óptima. La versión española refleja esa misma elección sin volver a la variante anterior 'king of all the kings'.
  spanish_consistency_notes:
  - Se conserva 'Jacob' sin adaptar a formas litúrgicas tradicionales distintas.
  - '''Yahvé'' no aparece en este versículo.'
  - Se mantiene el paralelismo enumerativo del griego con comas para respetar el ritmo acumulativo.
  - '''codos'' traduce la medida antigua con claridad para lectores actuales.'
