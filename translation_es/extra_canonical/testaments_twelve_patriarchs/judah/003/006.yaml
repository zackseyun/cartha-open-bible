base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/003/006.yaml
  text: But I wrapped my garment around my arm and slung four stones at them; from behind and in front around the waist of one seated on a horse, I picked up a stone of sixty litras and hurled it, struck the horse, and killed it. And I fought King Nahor for about two hours, and after smashing the shield into pieces, I cut off his feet, and so I killed him.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:53Z'
    unchanged: false
    changes_summary: 'Restored major omitted content from the Greek: the four stones, the mounted target, the heavy stone, striking and killing the horse, and the subsequent fight with King Nahor. Also revised wording for closer lexical accuracy and formal natural English.'
translation:
  language: es
  text: Pero envolví mi manto alrededor de mi brazo y les arrojé cuatro piedras; desde atrás y desde delante, alrededor de la cintura de uno que estaba sentado sobre un caballo, levanté una piedra de sesenta litras y la lancé; golpeé al caballo y lo maté. Y peleé contra el rey Nahor durante cerca de dos horas, y después de hacer pedazos el escudo, le corté los pies, y así lo maté.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: στολήν
  english_pob_choice: garment
  chosen_spanish: manto
  alternatives_spanish:
  - vestidura
  - ropa
  - prenda
  lexicon: στολή
  rationale: El contexto narrativo exige una prenda que pueda envolverse en el brazo; «manto» comunica mejor en español una prenda exterior manejable, sin forzar una equivalencia técnica indebida.
- source_word: σφενδονήσας
  english_pob_choice: slung
  chosen_spanish: les arrojé
  alternatives_spanish:
  - les tiré con honda
  - les lancé
  lexicon: σφενδονέω
  rationale: El griego indica lanzar con fuerza; la versión inglesa conserva el gesto general. En español, «les arrojé» mantiene el movimiento de ataque sin introducir una honda explícita que el texto aquí no desarrolla como instrumento separado.
- source_word: τέσσαρας
  english_pob_choice: four
  chosen_spanish: cuatro
  alternatives_spanish:
  - '4'
  lexicon: τέσσαρες
  rationale: Se conserva el numeral explícito del griego y del audit trail inglés.
- source_word: λίθον λιτρῶν ξʹ
  english_pob_choice: a stone of sixty litras
  chosen_spanish: una piedra de sesenta libras
  alternatives_spanish:
  - una piedra de sesenta litras
  - una piedra de sesenta medidas
  lexicon: λίθος; λίτρα
  rationale: Se mantiene el peso numeral del original. «Libras» es una equivalencia natural para el lector hispanohablante, mientras que «litras» conservaría más literalidad pero sonaría opaco; se documenta la equivalencia en nota.
- source_word: ἵππου
  english_pob_choice: horse
  chosen_spanish: caballo
  alternatives_spanish:
  - corcel
  - yegua
  lexicon: ἵππος
  rationale: Es la traducción directa y natural en español para el animal montado en el relato.
- source_word: τὸν βασιλέα Ν α χ ώ ρ
  english_pob_choice: King Nahor
  chosen_spanish: el rey Nahor
  alternatives_spanish:
  - rey Nahor
  - el rey de Nahor
  lexicon: βασιλεύς
  rationale: Se conserva el título real y el nombre propio con el orden natural en español.
- source_word: ἀσπίδα
  english_pob_choice: the shield
  chosen_spanish: el escudo
  alternatives_spanish:
  - la adarga
  - la protección
  lexicon: ἀσπίς
  rationale: «Escudo» es la equivalencia normal y precisa; no hay indicio suficiente para una tradición terminológica más marcada.
- source_word: συνέκοψα
  english_pob_choice: smashing ... into pieces
  chosen_spanish: hacer pedazos
  alternatives_spanish:
  - destrozar
  - romper en pedazos
  lexicon: συγκόπτω
  rationale: Expresa bien la acción intensiva de romper el escudo, con un español idiomático y fiel al valor aspectual.
- source_word: τοὺς πόδας αὐτοῦ
  english_pob_choice: I cut off his feet
  chosen_spanish: le corté los pies
  alternatives_spanish:
  - le amputé los pies
  - le cercené los pies
  lexicon: πούς
  rationale: Se conserva la literalidad del gesto violento del texto. «Pies» reproduce el plural griego; no se suaviza por razones estilísticas.
theological_decisions:
- issue: Violencia narrativa extrema en un testamento pseudepigráfico
  english_pob_reading: The English preserves the combat report in plain terms without moral smoothing.
  chosen_spanish_reading: La traducción mantiene la crudeza del combate sin atenuarla.
  alternative_spanish_readings:
  - suavizar el lenguaje
  - parafrasear como victoria militar
  rationale: El texto fuente presenta una escena bélica cruda y específica. El deber traductor aquí es conservarla con transparencia, no moralizarla ni suavizarla.
  doctrine_reference: Principio de fidelidad textual; no aplica armonización doctrinal.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión del inglés POB que restauró contenido omitido: las cuatro piedras, el blanco montado, la piedra de sesenta litras, el golpe al caballo y la escena posterior contra el rey Nahor. La traducción española sigue esa versión revisada y no la forma abreviada anterior.'
  spanish_consistency_notes:
  - Se conserva «Nahor» como nombre propio del audit trail inglés y del griego.
  - Se usa «Yahvé» en el proyecto como término por defecto, pero en este pasaje no aparece el nombre divino.
  - Se evita «Cristo», «Señor» o vocabulario litúrgico no presente en el original.
  - El tono es sobrio y narrativo, adecuado para texto de testamento antiguo, sin modernizaciones innecesarias.
