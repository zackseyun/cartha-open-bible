  text: Καὶ *πολεμήσας τὸν †Ἀχὼρ³¹ ἐπὶ *ὥρας δύο³² *ἀπέ- κτεινα αὐτόν³³, καὶ εἰς³⁴ δύο μέρη³⁵ ποιήσας τὴν ἀσπίδα αὐτοῦ συνέκοψα τοὺς πόδας αὐτοῦ.
