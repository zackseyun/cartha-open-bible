base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/003/004.yaml
  text: And after fighting with Achor for two hours, I killed him; and splitting his shield into two pieces, I chopped off his feet.
  revision_pass:
    model: gemini-3.1-pro-preview
    timestamp: '2026-04-23T21:04:29Z'
    unchanged: false
    changes_summary: Changed 'when I had cut' to 'splitting' for a more natural rendering of the participle, and 'hacked through' to 'chopped off' for better accuracy with 'συνέκοψα'.
translation:
  language: es
  text: Y después de luchar con Achor durante dos horas, lo maté; y, partiendo su escudo en dos, le corté los pies.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πολεμήσας
  english_pob_choice: after fighting
  chosen_spanish: después de luchar
  alternatives_spanish:
  - después de pelear
  - tras combatir
  lexicon: πολεμέω
  rationale: 'El participio aoristo se rinde de manera natural como una acción previa: ''después de luchar''. ''Luchar'' conserva el sentido de combate físico sin sonar excesivamente técnico.'
- source_word: Ἀχὼρ
  english_pob_choice: Achor
  chosen_spanish: Achor
  alternatives_spanish:
  - Ajor
  lexicon: nombre propio
  rationale: Se conserva la forma inglesa/auditada 'Achor' como nombre propio transliterado, sin modernizarla a una forma no atestiguada en el paquete fuente.
- source_word: ἀπέκτεινα
  english_pob_choice: I killed him
  chosen_spanish: lo maté
  alternatives_spanish:
  - lo maté a él
  - le di muerte
  lexicon: ἀποκτείνω
  rationale: '''Lo maté'' reproduce con claridad y sobriedad el verbo de matar, manteniendo el objeto directo expreso.'
- source_word: εἰς δύο μέρη ποιήσας
  english_pob_choice: splitting his shield into two pieces
  chosen_spanish: partiendo su escudo en dos
  alternatives_spanish:
  - habiendo dividido su escudo en dos partes
  - y dividiendo su escudo en dos
  lexicon: ποιέω + εἰς δύο μέρη
  rationale: La construcción participial se vierte con un gerundio español natural ('partiendo') para reflejar la acción concomitante. 'En dos' conserva la idea de división en dos partes sin añadir literalidad pesada.
- source_word: ἀσπίδα
  english_pob_choice: shield
  chosen_spanish: escudo
  alternatives_spanish:
  - adarga
  - broquel
  lexicon: ἀσπίς
  rationale: '''Escudo'' es el equivalente español directo y legible; los otros términos serían demasiado arcaicos o estilizados para este contexto.'
- source_word: συνέκοψα
  english_pob_choice: chopped off
  chosen_spanish: le corté
  alternatives_spanish:
  - le cercené
  - le separé
  lexicon: συγκόπτω
  rationale: '''Corté'' mantiene la fuerza del verbo compuesto sin exagerarlo; el objeto ''los pies'' ya da suficiente brutalidad al acto. ''Chopped off'' se expresa mejor en español como ''le corté'' en un registro claro y no ornamentado.'
- source_word: τοὺς πόδας αὐτοῦ
  english_pob_choice: his feet
  chosen_spanish: los pies
  alternatives_spanish:
  - sus pies
  - las patas
  lexicon: πούς
  rationale: '''Los pies'' conserva el referente corporal exacto y funciona con el objeto indirecto ''le'' para un español fluido.'
theological_decisions:
- issue: Ningún contenido doctrinal explícito; relato bélico personal.
  english_pob_reading: Narrative of combat and violent action without theological framing.
  chosen_spanish_reading: Relato de combate y acción violenta sin marco doctrinal añadido.
  alternative_spanish_readings:
  - lectura moralizante del episodio
  - paráfrasis interpretativa
  rationale: No hay en el texto una afirmación doctrinal que requiera resolución teológica. Se evita introducir moralización o explicación que el griego no exige.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la última revisión inglesa, que ajustó el participio a ''splitting'' y ''hacked through'' a ''chopped off''. La traducción española refleja ese mismo enfoque: participa de manera simultánea con ''partiendo'' y usa ''le corté'' para no intensificar innecesariamente el verbo final.'
  spanish_consistency_notes:
  - Se mantiene una sintaxis coordinada y clara, con dos acciones consecutivas unidas por punto y coma, como en el inglés auditado.
  - No se introducen títulos, nombres alternativos ni explicaciones ausentes del griego.
  - El registro es sobrio y directo, adecuado para un relato narrativo breve.
