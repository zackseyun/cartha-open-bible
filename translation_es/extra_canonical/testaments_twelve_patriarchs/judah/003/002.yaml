translation:
  language: es
  text: Y al otro rey, Tafú, mientras estaba sentado sobre el caballo, lo maté; y así dispersé a todo su pueblo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Τὸν δὲ ἕτερον βασιλέα
  english_pob_choice: And the other king
  chosen_spanish: Y al otro rey
  alternatives_spanish:
  - Y al otro monarca
  - Y al otro soberano
  lexicon: βασιλεύς
  rationale: «Rey» comunica con precisión el rango político del término griego y mantiene la brevedad del original. «Monarca» o «soberano» son posibles, pero menos directos y menos naturales en este contexto narrativo.
- source_word: τὸν Ταφοὺ
  english_pob_choice: Taphou
  chosen_spanish: Tafú
  alternatives_spanish:
  - Tafou
  - Taphoú
  lexicon: nombre propio transliterado
  rationale: Se conserva el nombre propio como transliteración española naturalizada, ajustando la acentuación para lectura en español sin alterar la identificación del personaje.
- source_word: καθήμενον ἐπὶ τοῦ ἵππου
  english_pob_choice: while he was sitting on the horse
  chosen_spanish: mientras estaba sentado sobre el caballo
  alternatives_spanish:
  - mientras iba sentado sobre el caballo
  - sentado sobre el caballo
  lexicon: κάθημαι + ἐπί + ἵππος
  rationale: «Estaba sentado sobre el caballo» refleja el participio circunstancial griego y evita añadir posesión. Se prefirió «caballo» antes que una forma más literal pero menos fluida.
- source_word: ἀνεῖλον
  english_pob_choice: I killed
  chosen_spanish: lo maté
  alternatives_spanish:
  - lo asesiné
  - lo eliminé
  lexicon: ἀναιρέω
  rationale: «Lo maté» reproduce el acto de quitar la vida de forma clara y directa. «Asesiné» introduce una valoración más específica; «eliminé» sería demasiado eufemístico.
- source_word: διεσκόρπισα πάντα τὸν λαὸν αὐτοῦ
  english_pob_choice: I scattered all his people
  chosen_spanish: dispersé a todo su pueblo
  alternatives_spanish:
  - esparcí a todo su pueblo
  - disgregué a todo su pueblo
  lexicon: διασκορπίζω
  rationale: «Dispersé» conserva el sentido de dispersión de grupos humanos sin sobrecargar el español. Se mantiene «todo su pueblo» para reflejar el alcance colectivo del griego.
theological_decisions:
- issue: Violencia narrativa y tono testimonial
  english_pob_reading: I killed; and so I scattered all his people.
  chosen_spanish_reading: lo maté; y así dispersé a todo su pueblo
  alternative_spanish_readings:
  - lo asesiné; y así esparcí a todo su pueblo
  - lo maté; y de ese modo dispersé a toda su gente
  rationale: El versículo presenta una afirmación narrativa de acción militar/política, no una exhortación. La traducción mantiene el tono testimonial sin intensificar ni suavizar indebidamente la violencia verbal.
  doctrine_reference: Narrativa histórica/testimonial; fidelidad semántica al acto descrito
translation_notes:
  revision_awareness: La revisión inglesa reciente sustituyó «his horse» por «the horse» para reflejar con más exactitud el artículo griego y evitar posesión no explícita. Por eso el español usa «sobre el caballo» y no añade posesivo. No hay notas textuales adicionales en el dossier griego provisto, así que se preserva la lectura principal sin aparato crítico suplementario.
  spanish_consistency_notes:
  - Se mantiene el registro narrativo sobrio y directo propio de una crónica.
  - «Tafú» se uniforma como nombre propio españolizable sin perder la forma de base griega.
  - No se introduce «Cristo», «Señor» ni vocabulario teológico ajeno al versículo.
  - «Caballo» se usa con artículo definido para respetar el valor del griego y la revisión inglesa.
  - El objeto directo pronominal «lo» evita ambigüedad y suena natural en español.
