id: T12P.JUD.3.1
reference: Testament of Judah 3:1
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 134-175, Judah pilot full)
  text: '*Ὅτε δὲ¹ *ἦλθον οἱ δύο βασιλεῖς τῶν Χαναναίων τεθωρακισμένοι² ἐπὶ τὰ *ποίμνια ἡμῶν καὶ λαὸς πολὺς³ *μετʼ αὐτῶν⁴ *κἀγὼ μόνος⁵ δραμὼν ἐπὶ τὸν βασιλέα *τὸν ἕνα⁶ *καὶ β, S¹ καὶ πολὺς λαός. κρούσας αὐτὸν ἐπὶ τὰς κνημίδας⁷ *κατέσπασα, καὶ οὕτως⁸ ἀνεῖλον αὐτόν.'
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/003/001.yaml
  text: And when the two kings of the Canaanites came in armor against our flocks, with many people with them, I alone ran at one of the kings; and striking him on the shins, I brought him down and so killed him.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:49Z'
    unchanged: false
    changes_summary: Replaced 'dragged him down' with 'brought him down' for a more natural and accurate rendering of κατέσπασα in context, while preserving the formal tone and sense.
translation:
  language: es
  text: Y cuando los dos reyes de los cananeos vinieron armados[a] contra nuestros rebaños, con mucha gente junto a ellos, yo solo corrí hacia uno de los reyes; y golpeándolo en las espinillas,[b] lo derribé[c] y así lo maté.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Gr. τεθωρακισμένοι, «revestidos de coraza/armadura». El término precisa armadura de torso (θώραξ), aunque en el relato de batalla puede extenderse a pertrechos militares completos.
    reason: lexical_alternative
  - marker: b
    text: Gr. κνημίδας. El término puede referirse tanto a las «espinillas» (parte anatómica) como a las «grebas» (protección de armadura para la pierna). Dado que los reyes son descritos como armados, golpear las grebas sugeriría un punto estratégico de la armadura. El English POB optó por «shins» (anatómico); se mantiene aquí como «espinillas» siguiendo esa decisión.
    reason: lexical_alternative
  - marker: c
    text: 'Gr. κατέσπασα, de κατασπάω: «arrastrar hacia abajo / derribar». Una revisión del borrador inglés sustituyó «dragged him down» por «brought him down» para privilegiar el resultado del derribo sobre la imagen de arrastre; «lo derribé» refleja esa decisión.'
    reason: textual_variant
lexical_decisions:
- source_word: τεθωρακισμένοι
  english_pob_choice: in armor
  chosen_spanish: armados
  alternatives_spanish:
  - con armadura
  - acorazados
  - pertrechados
  lexicon: 'θωρακίζω (LSJ): to furnish with a breastplate/corselet; perfect passive participle = clad in armor'
  rationale: «Armados» es el equivalente español natural y económico para el participio perfecto pasivo τεθωρακισμένοι. «Acorazados» tiene connotación moderna (blindaje naval/militar contemporáneo) que resultaría anacrónica; «con armadura» sería más preciso pero más voluminoso. «Armados» retiene suficiente fuerza militar en el contexto narrativo.
- source_word: ποίμνια
  english_pob_choice: flocks
  chosen_spanish: rebaños
  alternatives_spanish:
  - ganado
  - manadas
  lexicon: 'ποίμνιον/ποίμνη (LSJ): flock, herd of sheep or cattle'
  rationale: «Rebaños» es el calco directo y preciso de ποίμνια en español. El contexto del Testamento de Judá es pastoril; «rebaños» mantiene esa resonancia sin ambigüedad.
- source_word: κἀγὼ μόνος
  english_pob_choice: I alone
  chosen_spanish: yo solo
  alternatives_spanish:
  - solamente yo
  - únicamente yo
  lexicon: κἀγώ = καὶ + ἐγώ; μόνος = alone, only (LSJ)
  rationale: «Yo solo» reproduce fielmente la crasis κἀγὼ μόνος con la misma economia de palabras y la misma carga heroica que el original busca. «Solamente yo» es igualmente válido pero más difuso en énfasis.
- source_word: δραμὼν ἐπὶ τὸν βασιλέα τὸν ἕνα
  english_pob_choice: ran at one of the kings
  chosen_spanish: corrí hacia uno de los reyes
  alternatives_spanish:
  - me lancé contra uno de los reyes
  - arremetí contra uno de los reyes
  lexicon: 'δραμών: aorist participle of τρέχω = to run (LSJ); τὸν βασιλέα τὸν ἕνα = the one king, one of the kings'
  rationale: El participio aoristo δραμών tiene fuerza de acción simultánea/anterior al verbo principal. «Corrí hacia» traslada fielmente el sentido de movimiento físico directo. «Arremetí» captaría mejor el sentido combativo pero añade una carga semántica que el griego no impone explícitamente; se reserva como alternativa.
- source_word: κρούσας αὐτὸν ἐπὶ τὰς κνημίδας
  english_pob_choice: striking him on the shins
  chosen_spanish: golpeándolo en las espinillas
  alternatives_spanish:
  - hiriéndolo en las canillas
  - golpeándolo en las grebas
  lexicon: 'κνημίς (LSJ): (1) the shin, lower leg; (2) a greave, leg-armor. κρούω: to strike, beat (LSJ).'
  rationale: 'κνημίδας es ambiguo: puede referirse a las espinillas (parte anatómica) o a las grebas (protección de armadura para la pierna). El English POB eligió «shins» (anatómico). Se mantiene «espinillas» en el texto español siguiendo esa decisión auditada, pero se documenta la alternativa «grebas» en nota, ya que los reyes son descritos como armados (τεθωρακισμένοι) y el detalle de golpear las grebas podría subrayar una vulnerabilidad táctica en la armadura.'
- source_word: κατέσπασα
  english_pob_choice: brought him down (revised from 'dragged him down')
  chosen_spanish: lo derribé
  alternatives_spanish:
  - lo arrastré al suelo
  - lo tumbé
  - lo hice caer
  lexicon: 'κατασπάω (LSJ): to pull/drag/draw down; to bring down by force'
  rationale: 'κατασπάω cubre tanto ''arrastrar hacia abajo'' como ''derribar/abatir''. La revisión del English POB (de ''dragged'' a ''brought down'') privilegia el resultado dinámico del golpe sobre la imagen de arrastre literal. «Lo derribé» en español captura ese sentido revisado: la consecuencia inmediata del golpe en las espinillas/grebas es la caída del adversario. «Lo arrastré al suelo» sería más fiel a la imagen física de κατασπάω pero se aleja del sentido revisado; se consigna como alternativa en nota.'
- source_word: ἀνεῖλον αὐτόν
  english_pob_choice: killed him
  chosen_spanish: lo maté
  alternatives_spanish:
  - lo eliminé
  - lo di muerte
  lexicon: 'ἀναιρέω (LSJ): to take up; to make away with, kill, slay'
  rationale: «Lo maté» es directo, sin eufemismos, lo que corresponde al uso narrativo de ἀνεῖλον en un contexto de batalla. «Le di muerte» es más formal pero igualmente válido. Se prefiere «maté» por su economía y fidelidad al tono del relato.
translation_notes:
  revision_awareness: El English POB fue revisado (2026-04-23, gpt-5.4) cambiando «dragged him down» por «brought him down» para κατέσπασα. La traducción española «lo derribé» adopta esa decisión revisada y documenta la alternativa «lo arrastró» en la nota léxica y en la nota c del texto.
  spanish_consistency_notes:
  - No aparecen los nombres divinos יהוה, κύριος, θεός ni terminología mesiánica en este versículo; las normas de proyecto sobre Yahvé/Mesías/Dios no se aplican aquí.
  - El texto pertenece al Testamento de Judá (literatura pseudoepigráfica), no al canon hebreo ni al Nuevo Testamento; se mantiene el registro narrativo-histórico sin añadir resonancias teológicas ausentes en el original.
  - Se usa «cananeos» (no «Cananitas» ni otras variantes) como gentilicio estándar en español bíblico moderno para Χαναναίων.
