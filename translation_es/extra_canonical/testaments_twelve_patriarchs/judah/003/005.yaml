translation:
  language: es
  text: Y mientras le quitaba su coraza, he aquí, ocho hombres, sus compañeros, comenzaron a pelear conmigo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐκδύειν
  english_pob_choice: stripping off
  chosen_spanish: le quitaba
  alternatives_spanish:
  - despojaba
  - le estaba quitando
  lexicon: ἐκδύω
  rationale: El griego expresa la acción de quitar una prenda o armadura. En español, "le quitaba" comunica con naturalidad la acción en curso sin añadir matices no presentes en el texto.
- source_word: θώρακα
  english_pob_choice: breastplate
  chosen_spanish: coraza
  alternatives_spanish:
  - peto
  - armadura de pecho
  lexicon: θώραξ
  rationale: '"Coraza" es un equivalente español claro y digno para la pieza de armadura del pecho; evita la redundancia de "armadura de pecho" y es más natural que "peto" en este contexto narrativo.'
- source_word: ἄνδρες
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - varones
  lexicon: ἀνήρ
  rationale: El sustantivo griego designa hombres en sentido humano general. "Hombres" conserva el valor básico y la claridad narrativa del pasaje.
- source_word: ἑταῖροι
  english_pob_choice: companions
  chosen_spanish: compañeros
  alternatives_spanish:
  - camaradas
  - aliados
  lexicon: ἑταῖρος
  rationale: '"Compañeros" reproduce bien la relación de asociación o acompañamiento indicada por el griego, sin forzar un matiz militar o político más específico de lo que el texto exige.'
- source_word: ἤρξαντο πολεμεῖν
  english_pob_choice: began to fight
  chosen_spanish: comenzaron a pelear
  alternatives_spanish:
  - se pusieron a pelear
  - comenzaron a combatir
  lexicon: ἄρχομαι + πολεμέω
  rationale: La combinación griega marca inicio de una acción hostil. "Comenzaron a pelear" preserva el inicio de la acción con un español natural y suficientemente literal.
theological_decisions:
- issue: Identidad de los ocho hombres y su relación con el narrador
  english_pob_reading: eight men, his companions, began to fight me
  chosen_spanish_reading: ocho hombres, sus compañeros, comenzaron a pelear conmigo
  alternative_spanish_readings:
  - ocho hombres, compañeros suyos, empezaron a pelear conmigo
  - ocho hombres, sus asociados, comenzaron a pelear conmigo
  rationale: El texto solo indica que eran ocho hombres vinculados a él como compañeros. Mantener "sus compañeros" evita introducir precisiones sobre identidad o estatus no respaldadas por el griego.
  doctrine_reference: No doctrinal issue; narrative precision only.
translation_notes:
  revision_awareness: 'El texto griego y la traducción inglesa auditada coinciden en sentido general: acción continua de quitar la coraza, aparición repentina de ocho hombres asociados a él, y comienzo de la pelea. No hay revisiones aplicadas en el expediente más reciente.'
  spanish_consistency_notes:
  - Se mantiene "coraza" para θώραξ en coherencia con un registro bíblico/narrativo claro.
  - Se usa "pelear conmigo" en lugar de un término más técnico como "combatir" para conservar el tono directo del relato.
  - No se introduce puntuación explicativa adicional ni notas al pie porque el pasaje no presenta variantes textuales ni ambigüedades decisivas en el expediente.
