base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/003/003.yaml
  text: And I found Achor, a giant man, shooting arrows. Leaping up, I took a stone of sixty litras and hurled it; I struck the horse and killed him.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:50Z'
    unchanged: false
    changes_summary: Changed 'a giant of a man' to 'a giant man' for closer lexical correspondence and a more formal register. Retained the rest as accurate and natural, including the implied object 'him' after striking the horse.
translation:
  language: es
  text: Y hallé a Achor, un hombre gigante, disparando flechas. Alzándome de un salto, tomé una piedra de sesenta litras y la lancé; alcancé al caballo y lo maté.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: γίγαντα
  english_pob_choice: giant man
  chosen_spanish: hombre gigante
  alternatives_spanish:
  - gigante
  - gigante de estatura humana
  lexicon: γίγας / γίγαντα
  rationale: La expresión griega describe a un hombre de talla extraordinaria. «Hombre gigante» conserva la fuerza descriptiva del inglés POB y su registro formal, sin convertirlo en una perífrasis más explicativa que el griego.
- source_word: βάλλοντα τόξα
  english_pob_choice: shooting arrows
  chosen_spanish: disparando flechas
  alternatives_spanish:
  - lanzando flechas
  - tirando flechas
  lexicon: βάλλω + τόξα
  rationale: El verbo griego implica el acto de arrojar o lanzar proyectiles. En español, «disparando flechas» comunica con naturalidad la acción continua de usar el arco, sin añadir precisión técnica ajena al contexto.
- source_word: ἀνηλάμενος
  english_pob_choice: Leaping up
  chosen_spanish: Alzándome de un salto
  alternatives_spanish:
  - saltando
  - levantándome de un salto
  lexicon: ἀναπηδάω / ἀναλάζω (según tradición textual)
  rationale: La imagen es la de incorporarse con un salto para atacar. «Alzándome de un salto» conserva el dinamismo y el valor aspectual del participio mejor que una formulación más plana.
- source_word: λίθον ἑξήκοντα λιτρῶν
  english_pob_choice: a stone of sixty litras
  chosen_spanish: una piedra de sesenta litras
  alternatives_spanish:
  - una piedra de sesenta libras
  - una piedra de sesenta litras (medida antigua)
  lexicon: λίτρα
  rationale: Se mantiene «litras» para respetar la medida del texto fuente y no sustituirla por una equivalencia moderna no explicitada por el POB inglés. El sustantivo queda transparente y auditable.
theological_decisions:
- issue: Tratamiento del nombre divino y títulos divinos
  english_pob_reading: No aparece una referencia explícita a YHWH, Dios, Mesías, o Cristo en este versículo.
  chosen_spanish_reading: No se introduce ninguna normalización teológica adicional.
  alternative_spanish_readings:
  - Añadir un marco devocional implícito
  - Explicitar intervención divina
  rationale: El versículo es narrativo y no contiene léxico teológico directo. La traducción se mantiene estrictamente en el nivel del relato sin añadir interpretación doctrinal.
  doctrine_reference: Principio de sobriedad textual y no-expansión interpretativa
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del POB inglés, que corrigió «giant of a man» a «giant man» por mayor correspondencia léxica y registro más formal. La versión española refleja esa misma decisión con una formulación compacta y directa.
  spanish_consistency_notes:
  - Se conserva «Achor» como nombre propio transliterado, sin adaptación fonética adicional.
  - «Litras» se mantiene como medida antigua, coherente con el audit trail inglés y con la voluntad de evitar conversiones no presentes en el texto fuente.
  - 'La sintaxis española reproduce la secuencia narrativa del original: hallazgo, salto, lanzamiento, impacto y muerte.'
