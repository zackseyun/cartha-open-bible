base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/002/001.yaml
  text: And the Lord gave me favor in all my works, in the field and in the house.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:57Z'
    unchanged: false
    changes_summary: Removed the stray footnote marker from the draft and kept the wording otherwise unchanged.
translation:
  language: es
  text: Y Yahvé me concedió gracia en todas mis obras, en el campo y en la casa.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Κύριος
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Señor
  - el Señor
  lexicon: κύριος
  rationale: En este contexto, el griego usa Κύριος como referencia divina; según la norma del proyecto, se representa el nombre divino como «Yahvé» en el texto principal. Se evita la máscara litúrgica «Señor» para mantener la transparencia del nombre.
- source_word: χάριν
  english_pob_choice: favor
  chosen_spanish: gracia
  alternatives_spanish:
  - favor
  - benevolencia
  lexicon: χάρις
  rationale: Aunque la versión inglesa opta por «favor», el término griego es χάρις, y el valor teológico-lingüístico más estable en español es «gracia». Aquí no hay un requerimiento contextual fuerte para reducirlo a «favor»; «gracia» conserva mejor el matiz de don inmerecido.
- source_word: ἐν πᾶσι τοῖς ἔργοις μου
  english_pob_choice: in all my works
  chosen_spanish: en todas mis obras
  alternatives_spanish:
  - en todas mis labores
  - en todas mis obras y trabajos
  lexicon: ἔργον
  rationale: ἔργα se traduce de forma directa como «obras»; en español suena natural y mantiene el alcance total de la expresión sin ampliar indebidamente a «trabajos».
- source_word: πιάσας ἔν τε ἀγρῷ καὶ ἐν τῷ οἴκῳ
  english_pob_choice: in the field and in the house
  chosen_spanish: en el campo y en la casa
  alternatives_spanish:
  - en el campo y en la casa, habiendo prosperado
  - en el campo y en su casa
  lexicon: πιάσας
  rationale: El participio πιάσας, tal como aparece en el testimonio griego, parece contribuir a la idea de éxito o aprehensión/provecho en dos ámbitos. La frase española principal sigue el sentido espacial explícito del inglés y del griego («en el campo y en la casa»), sin forzar una ampliación interpretativa que el texto breve no demanda.
theological_decisions:
- issue: Nombre divino frente a título genérico
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - el Señor
  rationale: El paquete fuente muestra Κύριος con referencia divina. De acuerdo con la política del proyecto, se restaura el nombre divino en español como «Yahvé» en vez de usar un título de sustitución.
  doctrine_reference: transparencia del Tetragrámaton / política editorial POB
translation_notes:
  revision_awareness: La versión inglesa revisada eliminó una marca de nota errónea y conservó el contenido. En español no se requiere nota textual adicional, porque no hay variante sustantiva en el audit trail que obligue a señalar una alternativa en el cuerpo.
  spanish_consistency_notes:
  - Se mantiene el tono sobrio y bíblico sin arcaísmos innecesarios.
  - «Gracia» se conserva como término teológicamente cargado, coherente con el griego χάρις y con la terminología del proyecto.
  - La coordinación inicial con «Y» refleja el enlace narrativo del versículo anterior sin afectar el sentido.
