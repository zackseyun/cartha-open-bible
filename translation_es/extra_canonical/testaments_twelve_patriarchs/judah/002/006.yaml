translation:
  language: es
  text: Un leopardo en Hebrón saltó sobre el perro, y yo lo agarré por la cola y lo arrojé contra la roca, y se partió en dos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Πάρδαλις
  english_pob_choice: leopard
  chosen_spanish: leopardo
  alternatives_spanish:
  - pantera
  - leopardo
  lexicon: BDAG πάρδαλις; LSJ πάρδαλις
  rationale: «Leopardo» conserva el referente zoológico directo y sigue de cerca la elección del POB en inglés.
- source_word: Χεβρὼν
  english_pob_choice: Hebron
  chosen_spanish: Hebrón
  alternatives_spanish:
  - Hebron
  lexicon: BDAG Χεβρών; onomastic standard
  rationale: Se usa la forma española asentada del topónimo bíblico, «Hebrón».
- source_word: προσεπήδησεν ἐπὶ τὸν κύνα
  english_pob_choice: sprang upon the dog
  chosen_spanish: saltó sobre el perro
  alternatives_spanish:
  - se abalanzó sobre el perro
  - brincó sobre el perro
  lexicon: BDAG προσπηδάω; BDAG κύων
  rationale: «Saltó sobre» reproduce el movimiento súbito con español natural y sin añadir matiz interpretativo.
- source_word: πιάσας αὐτὸν ἀπὸ τῆς κέρκου
  english_pob_choice: I caught it by the tail
  chosen_spanish: lo agarré por la cola
  alternatives_spanish:
  - lo cogí por la cola
  - lo sujeté por la cola
  lexicon: BDAG πιάζω; BDAG κέρκος
  rationale: «Agarré» expresa contacto firme y directo; «por la cola» traduce literalmente ἀπὸ τῆς κέρκου.
- source_word: ἀπηκόντισα αὐτὸν ἐπὶ τὴν πέτραν
  english_pob_choice: hurled it against the rock
  chosen_spanish: lo arrojé contra la roca
  alternatives_spanish:
  - lo lancé contra la roca
  - lo arremetí contra la roca
  lexicon: LSJ ἀκοντίζω / ἀπηκοντίζω; BDAG πέτρα
  rationale: «Arrojé» mantiene la fuerza violenta del verbo y es idiomático en español; «contra la roca» refleja ἐπὶ τὴν πέτραν como dirección/impacto.
- source_word: ἐρράγη εἰς δύο
  english_pob_choice: it was split in two
  chosen_spanish: se partió en dos
  alternatives_spanish:
  - fue partido en dos
  - se rompió en dos
  lexicon: BDAG ῥήγνυμι
  rationale: «Se partió en dos» es natural en español y conserva el resultado pasivo de la frase griega.
theological_decisions:
- issue: 'Naturaleza del pasaje: relato de acción violenta sin carga doctrinal explícita'
  english_pob_reading: The English POB renders the scene straightforwardly and without theological expansion.
  chosen_spanish_reading: La traducción española mantiene el carácter narrativo literal sin añadir interpretación doctrinal.
  alternative_spanish_readings:
  - No aplica; podría moralizarse o suavizarse el relato, pero el texto no lo requiere.
  rationale: El pasaje describe una hazaña concreta; por fidelidad al fuente, no se introduce simbolismo ni comentario teológico.
  doctrine_reference: Principio de sobriedad textual y no-expansión interpretativa
translation_notes:
  revision_awareness: La versión inglesa revisada sustituyó «flung» por «hurled» para acercarse más a ἀπηκόντισα; la española refleja esa elección con «arrojé», que conserva la violencia y dirección del gesto sin perder naturalidad.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico claro y moderno.
  - Se conservan los nombres propios en su forma española usual.
  - No se añaden notas de pie porque el verso no presenta variantes textuales o ambigüedades que requieran anclaje explícito.
