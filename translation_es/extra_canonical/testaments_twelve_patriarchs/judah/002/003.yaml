source:
  edition: Charles 1908 Greek Versions (pages 134-175, Judah pilot full)
  text: '*Τὴν δὲ δορκάδα⁶ *διὰ τοῦ δρόμου ἐκράτουν, καὶ πᾶν ὃ ἦν ἐν τοῖς⁸ πεδίοις⁹ κατελάμβανον. *Τὸν λέοντα¹¹ ἀπέκτεινα¹² καὶ ἀφειλόμην¹³ ἔριφον ἐκ τοῦ στόματος αὐτοῦ¹⁴. τὴν¹⁵ ἄρκον λαβὼν ἀπὸ τοῦ ποδὸς ἀπέ- λυσα¹⁶ εἰς *τὸν κρημνόν¹⁷, *καὶ συνετρίβη¹⁸.'
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/002/003.yaml
  text: And I would seize the gazelle along the road, and I overtook everything that was in the fields. I killed the lion and snatched a kid from its mouth. I took hold of the bear by its foot and threw it down the cliff, and it was crushed.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:58Z'
    unchanged: false
    changes_summary: Changed 'in its course' to 'along the road' to reflect διὰ τοῦ δρόμου more directly, and 'cast it down the cliff' to 'threw it down the cliff' for a more natural rendering of ἀπέλυσα.
translation:
  language: es
  text: Y yo solía atrapar la gacela[a] junto al camino, y alcanzaba todo lo que estaba en los campos. Maté al león y arrebaté un cabrito de su boca. Tomé al oso por la pata y lo arrojé al precipicio, y quedó aplastado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «antílope»; se prefiere «gacela» por ser el equivalente más transparente y natural en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τὴν δὲ δορκάδα / gazelle
  english_pob_choice: gazelle
  chosen_spanish: gacela
  alternatives_spanish:
  - cierva
  - antílope
  lexicon: Greek δορκάς
  rationale: «Gacela» es el equivalente natural en español para δορκάς y conserva el sentido de un animal ágil de caza. «Cierva» sería posible pero desplaza el referente hacia una hembra de venado; «antílope» es más técnico y menos transparente.
- source_word: διὰ τοῦ δρόμου
  english_pob_choice: along the road
  chosen_spanish: junto al camino
  alternatives_spanish:
  - a lo largo del camino
  - por el camino
  lexicon: Greek δρόμος
  rationale: El griego sugiere desplazamiento por el camino; «junto al camino» mantiene la imagen de persecución/captura sin sonar forzado en español. «A lo largo del camino» es más literal pero menos idiomático en este contexto.
- source_word: κατελάμβανον
  english_pob_choice: I overtook
  chosen_spanish: alcanzaba
  alternatives_spanish:
  - daba alcance a
  - overtenía
  lexicon: Greek καταλαμβάνω
  rationale: Aquí el verbo expresa alcanzar, dar caza o sobrepasar; «alcanzaba» comunica bien la acción de llegar a lo perseguido. «Daba alcance a» sería más explícito pero más pesado; «overtenía» no es natural en español.
- source_word: ἔριφον
  english_pob_choice: kid
  chosen_spanish: cabrito
  alternatives_spanish:
  - cría de cabra
  - chivo
  lexicon: Greek ἔριφος
  rationale: «Cabrito» es el equivalente más claro y tradicional para una cría de cabra, preservando la naturalidad del español bíblico sin perder precisión.
- source_word: ἀφειλόμην ... ἐκ τοῦ στόματος αὐτοῦ
  english_pob_choice: snatched ... from its mouth
  chosen_spanish: arrebaté ... de su boca
  alternatives_spanish:
  - arranqué ... de su boca
  - lo quité ... de su boca
  lexicon: Greek ἀφαιρέω
  rationale: «Arrebatar» transmite la acción brusca y rápida del griego mejor que «quitar», y conserva el tono narrativo vigoroso del original.
- source_word: τὴν ἄρκον ... ἀπὸ τοῦ ποδὸς
  english_pob_choice: I took hold of the bear by its foot
  chosen_spanish: Tomé al oso por la pata
  alternatives_spanish:
  - agarré al oso por la pata
  - lo sujeté por la pata
  lexicon: Greek ἄρκτος / πούς
  rationale: «Tomé al oso por la pata» conserva la simplicidad del griego y evita una expansión innecesaria. «Pata» es la opción idiomática para un animal; «pie» sonaría menos natural en español moderno.
- source_word: ἀπέλυσα εἰς τὸν κρημνόν
  english_pob_choice: threw it down the cliff
  chosen_spanish: lo arrojé al precipicio
  alternatives_spanish:
  - lo lancé al despeñadero
  - lo tiré por el barranco
  lexicon: Greek κρημνός
  rationale: «Precipicio» refleja bien κρημνός y mantiene la elevación peligrosa del escenario. El verbo «arrojé» corresponde al impulso violento descrito por el contexto; «lo tiré» es más coloquial.
- source_word: συνετρίβη
  english_pob_choice: it was crushed
  chosen_spanish: quedó aplastado
  alternatives_spanish:
  - fue aplastado
  - quedó hecho pedazos
  lexicon: Greek συντρίβω
  rationale: «Quedó aplastado» expresa el resultado consumado con naturalidad. «Fue aplastado» es posible, pero «quedó» refleja mejor el efecto resultante en la escena narrativa.
theological_decisions:
- issue: No explicit theological term beyond heroic violence imagery
  english_pob_reading: The verse is rendered straightforwardly as a narrative of extraordinary feats, without added doctrinal shading.
  chosen_spanish_reading: La frase se traduce como relato de hazañas extraordinarias, sin añadir matiz doctrinal.
  alternative_spanish_readings:
  - Interpretarlo como lenguaje proverbial o hiperbólico
  - Suavizar la violencia con eufemismos
  rationale: El texto no introduce aquí vocabulario teológico directo; la prioridad es conservar la fuerza narrativa y la violencia concreta del episodio, sin moralizar ni atenuar el relato más allá de lo que el griego permite.
  doctrine_reference: None
- issue: Aspecto verbal in English POB 'I would seize'
  english_pob_reading: The English POB preserves a habitual/iterative past with 'I would seize.'
  chosen_spanish_reading: «Solía atrapar» mantiene el valor habitual/iterativo del imperfecto.
  alternative_spanish_readings:
  - «Atrapaba»
  - «solía arrebatar»
  rationale: El imperfecto español expresa bien una acción repetida en el pasado. Añadir «solía» refuerza esa habitualidad sin cambiar el sentido del original o del POB inglés.
  doctrine_reference: None
translation_notes:
  revision_awareness: La versión inglesa revisada cambió «in its course» por «along the road» para reflejar más de cerca διὰ τοῦ δρόμου, y «cast it down the cliff» por «threw it down the cliff» para una rendición más natural de ἀπέλυσα. La redacción española sigue esa revisión con «junto al camino» y «lo arrojé al precipicio», manteniendo el carácter iterativo de «solía».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se evita «Cristo/Mesías» porque no hay lenguaje cristológico en el pasaje.
  - «Cabrito» y «oso» conservan el registro narrativo concreto del original.
  - El imperfecto con «solía» traduce el valor habitual de la acción, coherente con el inglés POB revisado.
