translation:
  language: es
  text: Encontré un buey salvaje pastando en la tierra, y, sujetando sus cuernos, lo sacudí de un lado a otro y lo dejé ciego.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Βοῦν ἄγριον
  english_pob_choice: wild ox
  chosen_spanish: buey salvaje
  alternatives_spanish:
  - toro salvaje
  - novillo salvaje
  lexicon: βοῦς
  rationale: «Buey» conserva bien la imagen de un bovino grande y sirve como equivalente natural de «ox» en español bíblico. «Salvaje» reproduce ἄγριον sin suavizarlo.
- source_word: νεμόμενον
  english_pob_choice: grazing
  chosen_spanish: pastando
  alternatives_spanish:
  - paciendo
  - que pacía
  lexicon: νέμω
  rationale: «Pastando» es un equivalente claro y natural en español para la acción de alimentarse del animal en el campo.
- source_word: τὴν χώραν
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - la región
  - el país
  lexicon: χώρα
  rationale: «Tierra» mantiene la amplitud espacial del griego sin restringir innecesariamente a un territorio político.
- source_word: κρατήσας τῶν κεράτων
  english_pob_choice: taking hold of its horns
  chosen_spanish: sujetando sus cuernos
  alternatives_spanish:
  - agarrando sus cuernos
  - tomando sus cuernos
  lexicon: κρατέω / κέρας
  rationale: «Sujetando» expresa la acción firme de asir los cuernos con naturalidad en español y conserva la relación directa con el objeto.
- source_word: κύκλῳ συσείσας
  english_pob_choice: I shook it all around
  chosen_spanish: lo sacudí de un lado a otro
  alternatives_spanish:
  - lo agité por todas partes
  - lo sacudí alrededor
  lexicon: συσσείω
  rationale: La construcción española busca reflejar el movimiento circular/intensivo de κύκλῳ sin sonar artificial; «de un lado a otro» comunica el sacudimiento repetido y completo.
- source_word: σκοτίσας
  english_pob_choice: blinded it
  chosen_spanish: lo dejé ciego
  alternatives_spanish:
  - lo cegué
  - lo dejé sin vista
  lexicon: σκοτίζω
  rationale: El griego usa un participio causal/resultado que puede leerse como causar ceguera. «Lo dejé ciego» conserva la idea de resultado sin forzar una expresión demasiado técnica.
theological_decisions:
- issue: No theological tension beyond the vivid narrative action; preserve the concrete violence of the image.
  english_pob_reading: I found a wild ox... and blinded it.
  chosen_spanish_reading: Encontré un buey salvaje... y lo dejé ciego.
  alternative_spanish_readings:
  - '... y lo cegué.'
  - '... y lo dejé sin vista.'
  rationale: La versión española mantiene la crudeza narrativa del acto y no espiritualiza ni atenúa la imagen.
  doctrine_reference: None
translation_notes:
  revision_awareness: The English POB revision removed earlier footnote markers and tightened the rendering to match the Greek more directly, especially by choosing 'blinded it' for σκοτίσας. The Spanish draft follows that tighter, more literal-optimal direction while preserving idiomatic clarity.
  spanish_consistency_notes:
  - Mantengo un registro narrativo concreto y directo, sin añadir explicaciones interpretativas.
  - «Buey salvaje» y «lo dejé ciego» siguen de cerca el sentido del griego y la revisión inglesa reciente.
  - No se introducen notas al pie porque el texto griego y la POB inglesa no sostienen una ambigüedad textual o doctrinal que requiera marcación aquí.
