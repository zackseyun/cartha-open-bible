  text: I caught a wild mare and, after seizing it, I subdued it.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:57Z'
    unchanged: false
    changes_summary: Adjusted the final verb to preserve the first-person singular parallelism of the source; otherwise kept the draft’s wording.
translation:
  language: es
  text: Tomé una yegua salvaje, y, después de sujetarla, la sometí.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: φοράδα ἀγρίαν
  english_pob_choice: a wild mare
  chosen_spanish: una yegua salvaje
  alternatives_spanish:
  - una yegua brava
  - una yegua montaraz
  lexicon: φοράς/φοράδα
  rationale: φοράδα es específicamente una yegua; «yegua» conserva el sexo del animal y evita neutralizar el sustantivo. ἀγρίαν expresa que era salvaje o indómita; «salvaje» es natural en español y mantiene el contraste con el acto de sujetarla.
- source_word: κατέλαβον
  english_pob_choice: I caught
  chosen_spanish: Tomé
  alternatives_spanish:
  - cogí
  - capturé
  - agarré
  lexicon: καταλαμβάνω
  rationale: En este contexto narrativo, el verbo griego puede abarcar el hecho de apoderarse de algo o alcanzarlo. La forma española inicial «Tomé» permite la continuidad con el segundo participio verbal y evita duplicar un matiz demasiado físico antes de «sujetarla».
- source_word: πιάσας
  english_pob_choice: after seizing it
  chosen_spanish: después de sujetarla
  alternatives_spanish:
  - tras agarrarla
  - después de tomarla
  - al sujetarla
  lexicon: πιάνω
  rationale: πιάσας indica la acción de asir o sujetar. «Sujetar» preserva la idea de control físico sin sonar excesivamente coloquial, y funciona bien con la secuencia narrativa del texto.
- source_word: κατελάβον ... πιάσας
  english_pob_choice: I caught ... and, after seizing it, I subdued it
  chosen_spanish: Tomé ... y, después de sujetarla, la sometí
  alternatives_spanish:
  - la capturé ... y, después de sujetarla, la dominé
  - la tomé ... y, al sujetarla, la sometí
  lexicon: καταλαμβάνω + πιάζω
  rationale: El texto griego transmite una progresión de aprehensión a dominio. «Someter» refleja bien el resultado de dominar o poner bajo control sin introducir un matiz más fuerte que el que exige el griego.
theological_decisions:
- issue: No hay término teológico explícito en este hemistiquio; el reto es conservar el tono testimonial y la progresión de acción.
  english_pob_reading: I caught ... and ... I subdued it.
  chosen_spanish_reading: Tomé ... y, después de sujetarla, la sometí.
  alternative_spanish_readings:
  - La capturé ... y, después de sujetarla, la sometí.
  - Agarré ... y, después de sujetarla, la dominé.
  rationale: Se conserva la primera persona singular en ambos verbos finales para respetar el paralelismo del griego y la revisión inglesa más reciente. No se introduce lenguaje interpretativo adicional.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La revisión inglesa más reciente corrigió el verbo final para mantener la primera persona singular. La versión española sigue ese paralelismo y evita convertir la frase en una construcción impersonal o pasiva.
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y narrativo, compatible con una traducción pública de los Testamentos de los Doce Patriarcas.
  - Se evita «Cristo», «Señor» o terminología teológica no presente en el segmento griego.
  - El sujeto tácito de primera persona se mantiene de forma explícita en el último verbo («sometí») para reflejar la secuencia del original.
