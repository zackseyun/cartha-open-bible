  revision_awareness: El texto griego y la traducción inglesa POB concuerdan sustancialmente; la revisión más reciente indicó que no se necesitaban cambios. El punto más delicado es la combinación 'corrí con una cierva', donde el español debe conservar la literalidad sin volver opaca la frase.
  spanish_consistency_notes:
  - Se mantiene «Dios»/«Yahvé» fuera del versículo porque no aparecen en el texto.
  - Se conserva un registro narrativo sobrio y no devocional, acorde con el género del pasaje.
  - No se introducen notas al pie porque no hay variantes textuales ni alternativas exegéticas documentadas en el audit trail.
