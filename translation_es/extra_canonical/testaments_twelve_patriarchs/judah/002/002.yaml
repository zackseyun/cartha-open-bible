lexical_decisions:
- source_word: Οἶδα
  english_pob_choice: I know
  chosen_spanish: Sé
  alternatives_spanish:
  - Yo sé
  - Conozco
  lexicon: οἶδα
  rationale: Expresa conocimiento seguro y directo; en español, «sé» es la forma natural y breve para conservar el valor declarativo del original.
- source_word: συνέδραμον αὐτὴν ἐλάφῳ
  english_pob_choice: I ran with a hind
  chosen_spanish: corrí con una cierva
  alternatives_spanish:
  - corrí con una corza
  - corrí junto a una cierva
  lexicon: συντρέχω / ἐλάφος
  rationale: El griego indica correr juntamente con un animal femenino cervino; «cierva» mantiene el valor léxico y el tono narrativo sin sobrecargar el español.
- source_word: ἐπίασα αὐτὴν
  english_pob_choice: caught it
  chosen_spanish: la capturé
  alternatives_spanish:
  - la atrapé
  - la apresé
  lexicon: πιάνω
  rationale: «Capturé» comunica la acción de apoderarse del animal con suficiente naturalidad y fuerza; evita una ambigüedad menor de «atrapé» en registro narrativo.
- source_word: ἐποίησα αὐτὴν βρῶμα
  english_pob_choice: I made it food
  chosen_spanish: la hice alimento
  alternatives_spanish:
  - la hice comida
  - la convertí en alimento
  lexicon: ποιέω + βρῶμα
  rationale: «Alimento» conserva un registro más digno y cercano al sustantivo del griego βρῶμα; «comida» sería más coloquial.
- source_word: τῷ πατρί μου
  english_pob_choice: for my father
  chosen_spanish: para mi padre
  alternatives_spanish:
  - a mi padre
  - en favor de mi padre
  lexicon: πατήρ
  rationale: La preposición «para» expresa adecuadamente la finalidad/beneficio implícitos en el contexto.
- source_word: ἔφαγεν
  english_pob_choice: he ate
  chosen_spanish: él comió
  alternatives_spanish:
  - comió
  - lo comió
  lexicon: ἐσθίω
  rationale: Se mantiene el sujeto explícito para reflejar el griego y asegurar claridad referencial en español.
theological_decisions:
- issue: Ninguna afirmación doctrinal explícita; se trata de un relato autobiográfico de caza y comida
  english_pob_reading: I know that I ran with a hind and caught it, and I made it food for my father, and he ate.
  chosen_spanish_reading: Sé que corrí con una cierva y la capturé, y la hice alimento para mi padre, y él comió.
  alternative_spanish_readings:
  - Sé que corrí con una cierva y la atrapé...
  - Sé que corrí con una cierva y la hice comida...
  rationale: No hay tensión doctrinal que resolver; la decisión principal es estilística y léxica, procurando fidelidad semántica al griego sin introducir explicaciones no presentes en el texto.
  doctrine_reference: N/A
