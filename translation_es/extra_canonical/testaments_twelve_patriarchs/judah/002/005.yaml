  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/002/005.yaml
  text: I ran down the wild boar, and I overtook it while I was running and tore it apart.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:57Z'
    unchanged: false
    changes_summary: Made the timing phrase more complete and natural by rendering 'ἐν τῷ τρέχειν με' as 'while I was running' instead of 'as I ran.'
translation:
  language: es
  text: Corrí tras el jabalí salvaje, y lo alcancé mientras corría, y lo despedacé.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Τῷ ἀγρίῳ χοίρῳ
  english_pob_choice: the wild boar
  chosen_spanish: el jabalí salvaje
  alternatives_spanish:
  - el cerdo salvaje
  - el puerco salvaje
  lexicon: χοιρος
  rationale: «Jabalí» es el equivalente natural en español para el animal silvestre denotado por χοίρῳ; «cerdo/puerco salvaje» sería más literal, pero menos idiomático y menos preciso en español moderno.
- source_word: κατέδραμον
  english_pob_choice: I ran down
  chosen_spanish: Corrí tras
  alternatives_spanish:
  - arremetí contra
  - lo perseguí corriendo
  lexicon: κατατρέχω
  rationale: La imagen es de persecución con rapidez; «corrí tras» conserva el movimiento y la relación con el animal sin sobrerreformular la violencia implícita del verbo griego.
- source_word: προέλαβον
  english_pob_choice: I overtook it
  chosen_spanish: lo alcancé
  alternatives_spanish:
  - lo sobrepasé
  - lo adelanté
  lexicon: προλαμβάνω
  rationale: «Alcancé» comunica en español la idea de ponerse al alcance o llegar hasta él antes de que escapara. «Sobrepasé» o «adelanté» sonarían menos naturales en este contexto narrativo.
- source_word: ἐν τῷ τρέχειν με
  english_pob_choice: while I was running
  chosen_spanish: mientras corría
  alternatives_spanish:
  - mientras iba corriendo
  - al correr
  lexicon: ἐν τῷ + infinitivo articular
  rationale: La construcción temporal pide un valor durativo; «mientras corría» refleja bien el proceso continuo y evita un calco rígido.
- source_word: κατεσπάραξα
  english_pob_choice: tore it apart
  chosen_spanish: lo despedacé
  alternatives_spanish:
  - lo hice pedazos
  - lo hice trizas
  lexicon: σπαράσσω
  rationale: «Despedacé» conserva la violencia y la fragmentación del verbo griego en un español claro y de registro bíblico sin exagerar más allá del texto.
theological_decisions:
- issue: Violencia heroica del relato
  english_pob_reading: I ran down the wild boar, and I overtook it while I was running and tore it apart.
  chosen_spanish_reading: Corrí tras el jabalí salvaje, y lo alcancé mientras corría, y lo despedacé.
  alternative_spanish_readings:
  - Corrí tras el jabalí salvaje y lo alcancé corriendo, y lo despedacé.
  - Perseguí al jabalí salvaje, lo alcancé mientras corría y lo despedacé.
  rationale: El texto no introduce interpretación moral adicional; la traducción conserva la acción heroica/violenta tal como la presenta el original, sin suavizarla ni amplificarla.
  doctrine_reference: Literal-narrative fidelity; no doctrinal expansion
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «as I ran» a «while I was running» para hacer más completa la temporalidad de ἐν τῷ τρέχειν με. La redacción española sigue esa decisión con «mientras corría», que expresa duración continua de forma natural.
  spanish_consistency_notes:
  - Se mantiene «jabalí» para χοίρῳ por claridad zoológica y consistencia con el valor más natural del término en español.
  - Se conserva una secuencia narrativa simple y coordinada, acorde con el carácter testimonial del pasaje.
  - No se añaden notas porque el griego y el inglés auditado no preservan variantes relevantes que requieran ambigüedad textual en español.
