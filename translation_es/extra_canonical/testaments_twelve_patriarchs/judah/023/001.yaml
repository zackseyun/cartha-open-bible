base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/023/001.yaml
  text: Until the coming of the God of righteousness, to give Jacob rest in peace, and all the nations. And he will preserve the might of my kingdom forever; for the Lord swore to me by an oath not to blot out the kingdom. Much grief is mine, my children, because of the sexual immoralities and sorceries that you will do in the kingdom, following ventriloquists, omens, and deceiving demons.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:59Z'
    unchanged: false
    changes_summary: Removed the footnote marker, adjusted ‘with an oath’ to ‘by an oath’ for closer lexical accuracy, and tightened the final clause to better reflect the source’s sequence while preserving ‘God of righteousness,’ ‘Lord,’ and the named practices.
translation:
  language: es
  text: Hasta la venida del Dios de la justicia[a], para dar descanso a Jacob en paz, y a todas las naciones. Y él preservará para siempre la fuerza de mi reino; porque el Señor me juró con juramento no borrar el reino. Mucho es mi dolor, hijos míos, por las inmoralidades sexuales y las hechicerías que cometerán en el reino, siguiendo a ventrílocuos, agüeros y demonios engañadores.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede leerse «Dios de rectitud»; se eligió «Dios de la justicia» por ser más natural en español y mantener la relación titular del original.
    reason: alternative_reading
lexical_decisions:
- source_word: Γἕως τῆς παρουσίας Θεοῦ τῆς δικαιοσύνης
  english_pob_choice: Until the coming of the God of righteousness
  chosen_spanish: Hasta la venida del Dios de la justicia
  alternatives_spanish:
  - Hasta la venida del Dios de rectitud
  - Hasta que venga el Dios de la justicia
  lexicon: παρουσία; θεός; δικαιοσύνη
  rationale: «Venida» conserva el sentido de παρουσία como llegada/presencia manifesta. «Dios de la justicia» mantiene la construcción genitiva sin suavizarla; «rectitud» es posible, pero «justicia» es más transparente y natural en español aquí.
- source_word: τοῦ ἡσυχάσαι τὸν Ἰακὼβ ἐν εἰρήνῃ
  english_pob_choice: to give Jacob rest in peace
  chosen_spanish: para dar descanso a Jacob en paz
  alternatives_spanish:
  - para apaciguar a Jacob en paz
  - para hacer reposar a Jacob en paz
  lexicon: ἡσυχάζω; εἰρήνη
  rationale: «Dar descanso» expresa bien el valor de reposo/quietud sin forzar un tecnicismo. «En paz» conserva εἰρήνῃ de manera idiomática y clara.
- source_word: καὶ πάντα τὰ ἔθνη
  english_pob_choice: and all the nations
  chosen_spanish: y a todas las naciones
  alternatives_spanish:
  - y todas las naciones
  - y a todos los pueblos
  lexicon: ἔθνη
  rationale: Se mantiene «naciones» como equivalente directo del término, y el objeto con «a» ayuda a la fluidez en español.
- source_word: φυλάξει κράτος βασιλείας μου
  english_pob_choice: he will preserve the might of my kingdom
  chosen_spanish: él preservará para siempre la fuerza de mi reino
  alternatives_spanish:
  - él guardará el poder de mi reino
  - él preservará el poderío de mi reino
  lexicon: φυλάσσω; κράτος; βασιλεία
  rationale: «Preservará» sigue el valor de custodia/protección de φυλάξει. «Fuerza» traduce κράτος de modo natural y evita sobrecargar con «poder» repetido.
- source_word: ὅρκῳ γὰρ ὤμοσέ μοι Κύριος
  english_pob_choice: for the Lord swore to me by an oath
  chosen_spanish: porque el Señor me juró con juramento
  alternatives_spanish:
  - porque el Señor me juró por juramento
  - porque el Señor me lo juró con juramento
  lexicon: ὅρκος; ὄμνυμι; κύριος
  rationale: Se conserva la redundancia enfática del griego con «juró con juramento». «Señor» refleja la decisión del texto base inglés; en español se mantiene por fidelidad al audit trail y al contexto de cita reverencial.
- source_word: μὴ ἐξαλεῖψαι τὸ βασίλειον
  english_pob_choice: not to blot out the kingdom
  chosen_spanish: no borrar el reino
  alternatives_spanish:
  - no borrar el reino de la memoria
  - no extirpar el reino
  lexicon: ἐξαλείφω; βασίλειον
  rationale: «Borrar» conserva la metáfora de eliminación/abolición con mayor naturalidad que un calco demasiado literal. «Reino» es el equivalente más estable para βασίλειον en este contexto.
- source_word: Πολὴ δὲ λύπη μοί ἐστι, τέκνα μου
  english_pob_choice: Much grief is mine, my children
  chosen_spanish: Mucho es mi dolor, hijos míos
  alternatives_spanish:
  - Mucha es mi tristeza, hijos míos
  - Grande es mi dolor, hijos míos
  lexicon: λύπη; τέκνα
  rationale: «Dolor» comunica la carga afectiva del pasaje con dignidad; «mucho es mi dolor» reproduce la inversión enfática del griego y del inglés POB.
- source_word: ἀσελγείας καὶ γοητείας
  english_pob_choice: sexual immoralities and sorceries
  chosen_spanish: las inmoralidades sexuales y las hechicerías
  alternatives_spanish:
  - las impurezas sexuales y las hechicerías
  - los desenfrenos sexuales y las hechicerías
  lexicon: ἀσέλγεια; γοητεία
  rationale: «Inmoralidades sexuales» mantiene la especificidad moral/sexual del término sin suavizarlo. «Hechicerías» conserva el campo semántico mágico/oculto de γοητεία.
- source_word: ἐγγαστριμύθοις ἐξακολουθοῦντες κληδόσι καὶ δαίμοσι πλάνης
  english_pob_choice: following ventriloquists, omens, and deceiving demons
  chosen_spanish: siguiendo a ventrílocuos, agüeros y demonios engañadores
  alternatives_spanish:
  - siguiendo a adivinos, agüeros y demonios engañadores
  - siguiendo a médiums, presagios y demonios engañadores
  lexicon: ἐγγαστρίμυθος; κληδών; δαίμων
  rationale: «Ventrílocuos» refleja el término técnico heredado en el inglés POB para ἐγγαστρίμυθοις, que alude a prácticas de voz interna/mediúmnicas; «agüeros» captura κληδόσι como presagios/omens de forma comprensible; «demonios engañadores» sigue πλάνης con fuerza moral.
theological_decisions:
- issue: 'Divine title: «God of righteousness»'
  english_pob_reading: God of righteousness
  chosen_spanish_reading: Dios de la justicia
  alternative_spanish_readings:
  - Dios de rectitud
  - Dios justo
  rationale: Se conserva la construcción titular del original. «Dios de la justicia» mantiene la relación genitiva y evita convertirla en mera cualidad adjetival, lo que preserva mejor la fuerza teológica del título.
  doctrine_reference: T12P.JUD.23.1
translation_notes:
  revision_awareness: 'La revisión inglesa eliminó un marcador de nota en el título divino y ajustó «with an oath» a «by an oath», además de afinar la secuencia final. La presente versión sigue esa revisión: no añade nota en el cuerpo, mantiene el título sin marca, y reproduce la idea enfática de juramento con una fórmula española equivalente («con juramento») sin introducir un matiz distinto. También conserva la secuencia de prácticas nombradas al final con un orden claro y audit-able.'
  spanish_consistency_notes:
  - Se ha mantenido «Señor» en la cláusula del juramento porque el audit trail inglés lo conservó y no hay aquí una instrucción de reemplazarlo por «Yahvé» en el texto base.
  - Se evitó «Cristo» y cualquier terminología litúrgica ajena al griego; «Mesías» no aparece porque el término fuente es θεός, no χριστός.
  - «Hechicerías» y «demonios engañadores» preservan el ámbito ocultista/moral sin diluirlo en un lenguaje moderno excesivamente genérico.
  - La puntuación sigue la sintaxis del segmento griego/inglés, separando las cláusulas mayores con punto y coma donde ayuda a la lectura pública.
