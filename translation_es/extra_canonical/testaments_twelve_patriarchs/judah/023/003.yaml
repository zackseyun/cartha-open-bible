base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/023/003.yaml
  text: Because of these things the Lord will bring upon you famine and pestilence, death and the avenging sword, siege, and the reproaches of enemies and friends. By foreigners my kingdom will be brought to an end.
