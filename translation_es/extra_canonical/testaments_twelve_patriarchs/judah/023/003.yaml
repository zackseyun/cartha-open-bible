translation:
  language: es
  text: Por causa de estas cosas, Yahvé hará venir sobre ustedes hambre y peste, muerte y la espada vengadora, asedio, y los oprobios de enemigos y de amigos. Por extranjeros, mi reino llegará a su fin.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Κύριος
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - el Señor Yahvé
  lexicon: No aplica (nombre divino)
  rationale: La política del proyecto pide Yahvé para יהוה. Aunque el griego dice Κύριος, aquí el contexto del Testamento de Judá refleja el nombre divino en un anuncio judicial; por eso se evita la convención de ocultarlo como ‘el Señor’.
- source_word: λιμὸν
  english_pob_choice: famine
  chosen_spanish: hambre
  alternatives_spanish:
  - hambre severa
  - famine
  lexicon: No aplica
  rationale: En español, ‘hambre’ comunica de forma natural la calamidad colectiva del griego y evita un calco poco idiomático; mantiene la fuerza de escasez devastadora.
- source_word: λοιμόν
  english_pob_choice: pestilence
  chosen_spanish: peste
  alternatives_spanish:
  - pestilencia
  - plaga
  lexicon: No aplica
  rationale: ‘Peste’ es una forma breve y comprensible para el juicio de enfermedad devastadora; conserva el paralelo con ‘hambre’ sin volverlo clínico en exceso.
- source_word: ῥομφαίαν [ἐκδικοῦσαν]
  english_pob_choice: the avenging sword
  chosen_spanish: la espada vengadora
  alternatives_spanish:
  - la espada que venga
  - la espada de venganza
  lexicon: No aplica
  rationale: Se conserva el matiz activo de ἐκδικοῦσαν con ‘vengadora’, que refleja la espada como instrumento de retribución. ‘Vengadora’ es más conciso y bíblicamente legible que una perífrasis.
- source_word: πολιορκίαν
  english_pob_choice: siege
  chosen_spanish: asedio
  alternatives_spanish:
  - sitio
  - cerco
  lexicon: No aplica
  rationale: ‘Asedio’ es el equivalente estándar y directo; mantiene el marco militar del sustantivo griego.
- source_word: καὶ φίλων ὀνειδισμούς
  english_pob_choice: the reproaches of enemies and friends
  chosen_spanish: los oprobios de enemigos y de amigos
  alternatives_spanish:
  - los reproches de enemigos y de amigos
  - los insultos de enemigos y de amigos
  lexicon: No aplica
  rationale: ‘Oprobios’ preserva la aspereza pública y vergonzante de ὀνειδισμούς mejor que ‘reproches’, y encaja con el registro solemne del pasaje.
- source_word: ἀλλοφύλοις
  english_pob_choice: By foreigners
  chosen_spanish: Por extranjeros
  alternatives_spanish:
  - Por forasteros
  - Por pueblos extranjeros
  lexicon: No aplica
  rationale: ‘Extranjeros’ reproduce la idea de gentes de fuera sin añadir especificaciones no presentes. Se mantiene la conclusión pasiva/agentiva del original con una construcción breve en español.
- source_word: συντελεσθήσεται ἡ βασιλεία μου
  english_pob_choice: my kingdom will be brought to an end
  chosen_spanish: mi reino llegará a su fin
  alternatives_spanish:
  - mi reino será llevado a su fin
  - mi reino será consumado
  lexicon: No aplica
  rationale: ‘Llegará a su fin’ comunica el cierre del reino de modo natural y fiel al futuro pasivo/resultado del griego, evitando una formulación mecánica.
theological_decisions:
- issue: Divine name in a Greek witness that reads Κύριος
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  rationale: El proyecto pide Yahvé como forma principal para el nombre divino. Aunque el testigo griego tiene Κύριος, el contexto de juicio y la política editorial favorecen recuperar el nombre divino en español en lugar de la convención litúrgica de ‘Señor’.
  doctrine_reference: Nombre divino / Tetragrámaton
- issue: Final clause with passive destruction of the kingdom
  english_pob_reading: my kingdom will be brought to an end
  chosen_spanish_reading: mi reino llegará a su fin
  alternative_spanish_readings:
  - mi reino será llevado a su fin
  - mi reino será destruido
  rationale: Se conserva la idea de término/consumación sin añadir una destrucción más fuerte de la que exige el griego. La expresión española mantiene ambigüedad útil entre terminación histórica y ruina política.
  doctrine_reference: Providencia e ისტორical judgment (no doctrinal expansion)
translation_notes:
  revision_awareness: 'La revisión inglesa reciente eliminó marcas de nota insertadas por un borrador previo y suavizó la cláusula final a una formulación más natural. En español se sigue esa misma línea: se evita la segmentación artificial y se traduce la conclusión de manera fluida, sin añadir notas porque el texto fuente aquí no conserva un aparato de variantes explícito en la versión inglesa final.'
  spanish_consistency_notes:
  - Se mantiene Yahvé como forma principal del nombre divino.
  - 'Se prefirió vocabulario de juicio comprensible y solemne: hambre, peste, espada vengadora, asedio, oprobios.'
  - La clausula final conserva el sentido de término histórico sin intensificarla innecesariamente.
