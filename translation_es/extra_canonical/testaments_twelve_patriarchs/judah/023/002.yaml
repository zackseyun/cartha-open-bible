base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/023/002.yaml
  text: You will make your daughters musicians and public women, and you will mingle with the abominations of the nations.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:58Z'
    unchanged: false
    changes_summary: Changed "mingle in" to "mingle with" to better reflect the source wording and improve English naturalness; retained the rest as an accurate rendering of the source.
translation:
  language: es
  text: Harán de sus hijas músicas y mujeres públicas[a], y se mezclarán con las abominaciones de las naciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Mujeres públicas» traduce de forma literal la expresión del griego y conserva su aspereza; en español también puede sugerir prostitución o exposición pública vergonzosa, pero se deja la formulación directa para no atenuar el texto.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τὰς θυγατέρας ὑμῶν
  english_pob_choice: your daughters
  chosen_spanish: sus hijas
  alternatives_spanish:
  - vuestras hijas
  - las hijas de ustedes
  lexicon: θυγάτηρ
  rationale: Se conserva el sentido posesivo directo del plural y se usa un español neutral y natural para una apelación general.
- source_word: μουσικὰς
  english_pob_choice: musicians
  chosen_spanish: músicas
  alternatives_spanish:
  - músicos
  - tocadoras de música
  - mujeres dedicadas a la música
  lexicon: μουσικός
  rationale: Se mantiene el sustantivo femenino que refleja el carácter femenino explícito del griego y la elección del POB inglés de 'musicians'.
- source_word: δημοσίας
  english_pob_choice: public women
  chosen_spanish: mujeres públicas
  alternatives_spanish:
  - mujeres de la calle
  - prostitutas
  - mujeres expuestas públicamente
  lexicon: δημόσιος
  rationale: Se conserva la expresión literal 'mujeres públicas', que reproduce la dureza del griego y del inglés POB sin sustituirla por un término más interpretativo.
- source_word: ἐπιμιγήσεσθε
  english_pob_choice: you will mingle with
  chosen_spanish: se mezclarán con
  alternatives_spanish:
  - se unirán a
  - se contaminarán con
  - se asociarán con
  lexicon: ἐπιμίγνυμι
  rationale: '''Mezclarse con'' expresa adecuadamente la idea relacional del verbo, manteniendo el matiz de asociación indebida que el contexto exige.'
- source_word: ἐν βδελύγμασιν ἐθνῶν
  english_pob_choice: the abominations of the nations
  chosen_spanish: las abominaciones de las naciones
  alternatives_spanish:
  - las abominaciones de los pueblos
  - las prácticas detestables de las naciones
  lexicon: βδέλυγμα / ἔθνη
  rationale: Se conserva la fórmula bíblica 'abominaciones de las naciones', que respeta la carga moral fuerte del sustantivo y el genitivo colectivo.
theological_decisions:
- issue: Lenguaje moral fuerte sobre corrupción de conducta
  english_pob_reading: and you will mingle with the abominations of the nations
  chosen_spanish_reading: y se mezclarán con las abominaciones de las naciones
  alternative_spanish_readings:
  - y se asociarán con las abominaciones de las naciones
  - y tendrán trato con las abominaciones de las naciones
  rationale: La traducción conserva la denuncia ética sin suavizarla; el texto presenta una asociación culpable con prácticas abominables de los pueblos, y el español mantiene ese juicio moral.
  doctrine_reference: Pureza moral / advertencia profética
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que cambió 'in' por 'with' en 'mingle with', por lo que el español usa 'con' y no 'en' para reflejar con mayor precisión la relación verbal del original.
  spanish_consistency_notes:
  - Se mantuvo el plural directo en segunda persona del futuro ('Harán', 'se mezclarán') como reflejo del destinatario colectivo.
  - Se conservó la distinción semántica entre 'músicas' y 'mujeres públicas' sin fusionarlas en una sola paráfrasis.
  - No se introdujeron equivalentes eclesiásticos tradicionales que no estén justificados por el griego ni por el POB inglés.
