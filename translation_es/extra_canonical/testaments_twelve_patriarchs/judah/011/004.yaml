translation:
  language: es
  text: Y cuando supe lo que ella había hecho, la maldije en la angustia de mi alma.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἐπιγνοὺς
  english_pob_choice: And when I learned
  chosen_spanish: Y cuando supe
  alternatives_spanish:
  - Y cuando reconocí
  - Y al enterarme
  lexicon: ἐπιγινώσκω
  rationale: El participio aoristo expresa el momento en que llega el conocimiento; «supe» comunica bien el hecho de enterarse, sin añadir matices de reconocimiento más fuertes que el contexto no exige.
- source_word: ὃ ἐποίησε
  english_pob_choice: what she had done
  chosen_spanish: lo que ella había hecho
  alternatives_spanish:
  - lo que hizo
  - lo que había cometido
  lexicon: ποιέω
  rationale: La construcción relativa es neutra; «había hecho» sigue de cerca el valor de acción pasada previa al maldecir, y conserva la ambigüedad del original sin especificar el tipo de acto.
- source_word: κατηρασάμην αὐτὴν
  english_pob_choice: I cursed her
  chosen_spanish: la maldije
  alternatives_spanish:
  - la maldije con maldición
  - pronuncié maldición contra ella
  lexicon: καταράομαι
  rationale: «Maldije» reproduce directamente el verbo de maldecir. En español, la forma simple es clara y suficientemente fuerte; evitar perífrasis mantiene la concisión del griego.
- source_word: ἐν ὀδύνῃ ψυχῆς μου
  english_pob_choice: in the anguish of my soul
  chosen_spanish: en la angustia de mi alma
  alternatives_spanish:
  - con la angustia de mi alma
  - en el dolor de mi alma
  lexicon: ὀδύνη / ψυχή
  rationale: «Angustia de mi alma» conserva la imagen interior y la intensidad afectiva. «Alma» refleja ψυχή en sentido personal/interior, y «angustia» mantiene el peso emocional de ὀδύνῃ.
theological_decisions:
- issue: Intensidad emocional del acto de maldecir
  english_pob_reading: I cursed her in the anguish of my soul.
  chosen_spanish_reading: la maldije en la angustia de mi alma
  alternative_spanish_readings:
  - la maldije con profunda angustia interior
  - la maldije desde el dolor de mi alma
  rationale: El texto vincula la maldición con una aflicción interior real; la traducción preserva esa relación sin suavizarla ni convertirla en mera figura retórica.
  doctrine_reference: Ps 6:3; 31:9 (lenguaje de dolor interior)
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se necesitaban cambios. Esta versión sigue el mismo sentido que el texto inglés auditado, pero vuelve al griego para sostener la decisión léxica de ἐπιγνοὺς como «supe» y de ἐν ὀδύνῃ ψυχῆς μου como «en la angustia de mi alma».
  spanish_consistency_notes:
  - Se mantiene el sujeto implícito en primera persona singular para reflejar el griego.
  - No se añade puntuación interpretativa que divida indebidamente la secuencia temporal.
  - Se conserva «alma» para ψυχή, en línea con el registro bíblico español y la lectura interior del pasaje.
