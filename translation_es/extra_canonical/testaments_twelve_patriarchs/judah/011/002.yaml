  text: Καὶ ἰδὼν⁸ αὐτὴν οἰνοχοοῦσαν⁹ ἠπατήθην, καὶ *†ἔλαβον αὐτὴν μὴ βουλευσαμένου τοῦ πατρός μου¹⁰.
