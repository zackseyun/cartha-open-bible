base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/011/002.yaml
  text: And when I saw her pouring wine, I was deceived, and I took her, my father not having taken counsel.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:56:04Z'
    unchanged: false
    changes_summary: Revised the final clause to reflect the Greek more directly and naturally, avoiding the added phrase “about it,” which is not explicit in the source. Kept the rest unchanged.
translation:
  language: es
  text: Y al verla sirviendo vino, fui engañado, y la tomé, sin que mi padre hubiera tomado consejo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: οἰνοχοοῦσαν
  english_pob_choice: pouring wine
  chosen_spanish: sirviendo vino
  alternatives_spanish:
  - echando vino
  - vertiendo vino
  lexicon: οἰνοχοέω
  rationale: El griego describe a una mujer realizando la acción de servir o verter vino. «Sirviendo vino» suena natural en español y conserva la escena sin volverla más técnica de lo necesario. «Vertiendo vino» es posible, pero en español puede sonar más literal y menos idiomático en este contexto narrativo.
- source_word: ἠπατήθην
  english_pob_choice: I was deceived
  chosen_spanish: fui engañado
  alternatives_spanish:
  - fui seducido
  - me dejé engañar
  lexicon: ἀπατάω
  rationale: El verbo griego expresa engaño, y la versión inglesa lo traduce directamente. «Fui engañado» mantiene esa fuerza sin añadir una implicación interpretativa más específica como «seducido».
- source_word: ἔλαβον αὐτὴν
  english_pob_choice: I took her
  chosen_spanish: la tomé
  alternatives_spanish:
  - la recibí
  - la tomé para mí
  lexicon: λαμβάνω
  rationale: La frase griega es breve y puede expresar toma en el sentido de tomarla como mujer. En español, «la tomé» conserva la concisión y la ambigüedad cargada del original, sin explicitar más de lo que el texto dice.
- source_word: μὴ βουλευσαμένου τοῦ πατρός μου
  english_pob_choice: my father not having taken counsel
  chosen_spanish: sin que mi padre hubiera tomado consejo
  alternatives_spanish:
  - sin que mi padre hubiera consultado
  - cuando mi padre no había tomado consejo
  lexicon: βουλεύομαι
  rationale: La construcción genitiva absoluta comunica una acción no realizada por el padre. «Sin que mi padre hubiera tomado consejo» reproduce la relación sintáctica y mantiene el matiz de deliberación o consulta, evitando añadir un objeto inexistente como «sobre ello».
theological_decisions:
- issue: Relación entre la conducta del narrador y la ausencia de consejo paterno
  english_pob_reading: my father not having taken counsel
  chosen_spanish_reading: sin que mi padre hubiera tomado consejo
  alternative_spanish_readings:
  - mi padre no había tomado consejo
  - sin haber consultado mi padre
  rationale: La cláusula final debe reflejar la dependencia y la falta de deliberación señalada por el griego, sin convertirla en una explicación más larga o interpretada. La formulación elegida conserva la tensión moral/narrativa del pasaje y sigue de cerca el valor del genitivo absoluto.
  doctrine_reference: Testament of Judah 11:2; sintaxis del griego koiné
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que volvió la cláusula final más cercana al griego al evitar la adición explicativa «about it». La propuesta española sigue esa misma línea, sin introducir información suplementaria en el cierre.
  spanish_consistency_notes:
  - Se mantuvo un registro solemne y narrativo, adecuado para literatura testamentaria antigua.
  - Se evitó «SEÑOR» y otras sustituciones no pertinentes, porque no aparece vocabulario divino en este versículo.
  - Se conservó una estructura cercana al griego en la cláusula final para respetar el valor del genitivo absoluto.
  - «Fui engañado» mantiene la voz pasiva del original y evita una paráfrasis psicológica excesiva.
