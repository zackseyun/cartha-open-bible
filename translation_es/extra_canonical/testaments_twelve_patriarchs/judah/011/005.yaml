translation:
  language: es
  text: Y de hecho murió en su maldad, con sus hijos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Καίγε
  english_pob_choice: And indeed
  chosen_spanish: Y de hecho
  alternatives_spanish:
  - Y ciertamente
  - Y en verdad
  - Y precisamente
  lexicon: καίγε
  rationale: La partícula intensiva combina el valor coordinante de καί con refuerzo enfático; «de hecho» transmite bien ese matiz en español sin sobrerreligiosizar el texto.
- source_word: ἀπέθανεν
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - falleció
  - pereció
  lexicon: ἀποθνῄσκω
  rationale: El verbo básico de muerte se rinde naturalmente como «murió»; «pereció» añadiría un matiz de ruina que no exige el contexto inmediato.
- source_word: ἐν τῇ πονηρίᾳ αὐτῆς
  english_pob_choice: in her wickedness
  chosen_spanish: en su maldad
  alternatives_spanish:
  - en su perversidad
  - en su impiedad
  lexicon: πονηρία
  rationale: «Maldad» conserva el sentido moral amplio de πονηρία y resulta claro en español. «Perversidad» puede sonar más fuerte, pero estrecha el registro; «impiedad» desplaza el énfasis hacia irreligión, que no está explicitada por el griego.
- source_word: μετὰ τῶν τέκνων αὐτῆς
  english_pob_choice: with her children
  chosen_spanish: con sus hijos
  alternatives_spanish:
  - junto con sus hijos
  - con los hijos de ella
  lexicon: μετά + genitivo
  rationale: 'La construcción indica acompañamiento/asociación: «con sus hijos» es la forma más directa y fiel en español. No se añade inferencia causal ni se expande el vínculo más allá del texto.'
theological_decisions:
- issue: El sentido de «con sus hijos» dentro de una frase de juicio/muerte.
  english_pob_reading: And indeed she died in her wickedness, with her children.
  chosen_spanish_reading: Y de hecho murió en su maldad, con sus hijos.
  alternative_spanish_readings:
  - Y de hecho murió en su maldad junto con sus hijos.
  - Y de hecho murió en su maldad, acompañada de sus hijos.
  rationale: La fuente griega sólo afirma que murió «con sus hijos»; no obliga a aclarar si fue simultaneidad de muerte, compañía en la muerte, o una mera asociación narrativa. Mantener la frase simple preserva la ambigüedad documental.
  doctrine_reference: Preservación de la ambigüedad del texto fuente; no inferir detalles históricos o narrativos no explicitados.
translation_notes:
  revision_awareness: Se cotejó el texto griego fuente con la traducción inglesa auditada; la versión inglesa ya fue revisada y quedó sin cambios, por lo que la redacción española sigue de cerca el valor griego sin depender mecánicamente del inglés.
  spanish_consistency_notes:
  - Se usa «maldad» para πονηρία en coherencia con un registro moral general.
  - Se mantiene el orden simple de cláusulas para conservar el énfasis intensivo inicial de Καίγε.
  - No se introduce terminología doctrinal ajena al pasaje ni se capitalizan términos que el griego no distingue como nombres propios.
