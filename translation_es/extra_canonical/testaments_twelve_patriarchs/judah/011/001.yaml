translation:
  language: es
  text: Y yo sabía que la raza de los cananeos era mala, pero el impulso de la juventud cegó mi entendimiento.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πονηρὸν γένος
  english_pob_choice: the race of the Canaanites was evil
  chosen_spanish: la raza de los cananeos era mala
  alternatives_spanish:
  - la raza de los cananeos era perversa
  - el linaje de los cananeos era malo
  lexicon: πονηρός; γένος
  rationale: El inglés POB conserva la idea de una colectividad étnica/linaje con juicio moral. En español, «raza» reproduce ese alcance colectivo; «mala» es más natural que «malvada» para una calificación general, sin debilitar el juicio ético.
- source_word: τὸ διαβούλιον τῆς νεότητος
  english_pob_choice: the impulse of youth
  chosen_spanish: el impulso de la juventud
  alternatives_spanish:
  - el consejo de la juventud
  - el impulso juvenil
  lexicon: διαβούλιον; νεότης
  rationale: El griego apunta a un movimiento interior o inclinación de la juventud; el POB inglés eligió «impulse», que en español se expresa bien como «impulso». «De la juventud» mantiene la relación genitiva sin forzar un genitivo abstracto poco natural.
- source_word: ἐτύφλωσε τὴν διάνοιάν μου
  english_pob_choice: blinded my understanding
  chosen_spanish: cegó mi entendimiento
  alternatives_spanish:
  - cegó mi mente
  - oscureció mi entendimiento
  lexicon: τυφλόω; διάνοια
  rationale: «Entendimiento» es el equivalente español más preciso para διάνοια en este contexto cognitivo. «Cegó» conserva la metáfora verbal del griego y del inglés POB, evitando una paráfrasis más interpretativa.
theological_decisions:
- issue: Juicio moral sobre el linaje cananeo
  english_pob_reading: the race of the Canaanites was evil
  chosen_spanish_reading: la raza de los cananeos era mala
  alternative_spanish_readings:
  - el linaje de los cananeos era perverso
  - la descendencia de los cananeos era mala
  rationale: El texto expresa un juicio moral sobre un grupo étnico-histórico. La traducción conserva esa tensión sin suavizarla ni convertirla en una categoría meramente conductual.
  doctrine_reference: Ética bíblica y lenguaje de juicio en literatura testamentaria antigua
translation_notes:
  revision_awareness: La versión inglesa auditada no requirió notas ni revisiones; el griego confirma la metáfora de cegamiento y el contraste entre el juicio moral y la autoexculpación parcial del hablante.
  spanish_consistency_notes:
  - Se mantiene «Y» al inicio para reflejar Κἀγὼ/And I con coordinación narrativa.
  - No se introduce «Mesías», «Yahvé» ni otros términos no presentes en el versículo.
  - Se conserva el registro sobrio y directo del original, sin expandir el sentido de διαβούλιον más allá de «impulso».
