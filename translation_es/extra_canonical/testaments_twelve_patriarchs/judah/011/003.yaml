translation:
  language: es
  text: Pero mientras yo estaba ausente, ella fue y tomó para Selom una mujer de Canaán.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀπόντος ἐμοῦ
  english_pob_choice: while I was away
  chosen_spanish: mientras yo estaba ausente
  alternatives_spanish:
  - mientras yo no estaba
  - cuando yo estaba ausente
  lexicon: ἀπών (gen. abs. with ἐμοῦ)
  rationale: La construcción de genitivo absoluto indica ausencia de la primera persona; «mientras yo estaba ausente» conserva la relación temporal y la idea de falta de presencia sin forzar una formulación más idiomática pero menos precisa.
- source_word: ἐπορεύθη
  english_pob_choice: she went
  chosen_spanish: fue
  alternatives_spanish:
  - se fue
  - anduvo
  lexicon: πορεύομαι
  rationale: «Fue» reproduce el movimiento narrativo de forma natural en español y mantiene la sencillez del verbo griego en este contexto.
- source_word: ἔλαβε ... γυναῖκα
  english_pob_choice: took for Shelah a wife
  chosen_spanish: tomó para Selá una mujer
  alternatives_spanish:
  - le tomó una mujer a Selá
  - le consiguió a Selá una esposa
  lexicon: λαμβάνω ... γυναῖκα
  rationale: «Tomó ... una mujer» sigue de cerca el valor de λαμβάνω con complemento de objeto en una construcción matrimonial, sin suavizar la acción ni introducir una equivalencia interpretativa como «casó» o «consiguió».
- source_word: Σηλὼμ
  english_pob_choice: Shelah
  chosen_spanish: Selá
  alternatives_spanish:
  - Shelah
  lexicon: nombre propio
  rationale: Se adapta el nombre al patrón español común del personaje bíblico, conservando la referencia al mismo nombre propio del original.
- source_word: ἐκ τῆς Χανάαν
  english_pob_choice: from Canaan
  chosen_spanish: de Canaán
  alternatives_spanish:
  - desde Canaán
  lexicon: ἐκ + genitive
  rationale: La preposición expresa procedencia; «de Canaán» es la forma más natural y fiel en español para señalar origen.
theological_decisions:
- issue: No hay divergencia teológica sustantiva; el versículo describe una acción familiar y geográfica.
  english_pob_reading: But while I was away, she went and took for Shelah a wife from Canaan.
  chosen_spanish_reading: Pero mientras yo estaba ausente, ella fue y tomó para Selá una mujer de Canaán.
  alternative_spanish_readings:
  - Pero cuando yo estaba ausente...
  - Pero estando yo fuera...
  rationale: Se mantiene el tono narrativo sin añadir interpretación moral o explicativa que el texto no formula aquí.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: The latest audit pass indicates the English POB text was unchanged after review; no revision-driven adjustments were required for the Spanish draft.
  spanish_consistency_notes:
  - Se preserva la tercera persona femenina implícita de «she» sin explicitar el sujeto más allá de «ella».
  - Se mantiene «Canaán» como topónimo bíblico estándar en español.
  - No se introduce «esposa» para γυναῖκα, porque el contexto matrimonial ya está explícito y «mujer» conserva la literalidad del griego sin pérdida de claridad en español.
