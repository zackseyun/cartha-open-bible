  text: V. Καὶ¹ τῇ ἑξῆς ἀπήλθομεν εἰς Ἀρετὰν², πόλιν κραταιάν³, *ἀπειλοῦσαν ἡμῖν θάνατον⁴. *Ἐγὼ δὲ⁵ καὶ ὁ Γὰδ⁶ προσέφθημεν *ἀπὸ ἀνατολῶν τῆς πόλεως⁷, *Ῥουβὴμ δὲ⁸ καὶ⁹ Λευὶ¹⁰ ἀπὸ δυσμῶν¹¹. 2. Καὶ²¹ οἱ ἐπὶ τοῦ τείχους¹², ὅτι ἡμεῖς μόνοι ἐσμὲν¹³, ἐφειλκύσθησαν¹⁴ πρὸς¹⁵ ἡμᾶς. 3. *Καὶ ἀνεπήδησεν τὸ τεῖχος¹⁶. 4. *Καὶ οὕτως λάθρα οἱ ἀδελφοί μου ἐξ ἑκατέρων τῶν μερῶν τοῦ τείχους εἰσῆλθον εἰς τὴν πόλιν¹⁷. 5. *Καὶ κατελάβομεν αὐτὴν¹⁸ ἐν στόματι μαχαίρας¹⁹, καὶ τοὺς ἐν τῷ πύργῳ²⁰ καταφυγόντας ἐν πυρὶ ἐνεπρήσαμεν, καὶ οὕτως πάντας ἐλάβομεν, καὶ πάντα τὰ αὐτῶν²¹. 6. Ἐν δὲ τῷ ἀπιέναι ἡμᾶς²², ἄνδρες †Βαβουὲ ἐπελάβοντο²³ τὴν αἰχμαλωσίαν ἡμῶν, καὶ ἰδόντες ἡμεῖς συνῆψαν πόλεμον μετ᾽ αὐτῶν²⁴. 7. *Ἀπεκτείναμεν πάντας²⁵ καὶ πάλιν ἐλάβομεν τὴν αἰχμαλωσίαν ἡμῶν.
