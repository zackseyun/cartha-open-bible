translation:
  language: es
  text: 1[a]. Y al día siguiente fuimos a Aretá, una ciudad aún poderosa y fuerte, que nos amenazaba con muerte. 2. Pero yo y Gad atacamos desde el oriente de la ciudad, y Rubén y Leví desde el occidente. 3. Y los que estaban sobre el muro, pensando que estábamos solos, fueron atraídos hacia nosotros. 4. Así, mis hermanos, secretamente, desde ambos lados del muro, lo escalaron con estacas y entraron en la ciudad sin que ellos lo supieran. 5. Y la tomamos a filo de espada, y a los que habían huido buscando refugio en las torres los quemamos con fuego; y así los capturamos a todos. 6. Y cuando nos íbamos, hombres de Tapphué[c] cayeron sobre nuestros cautivos; y, después de entregarlos a nuestros hijos, trabamos combate con ellos hasta Tapphué[c]. 7. Y también los matamos, y quemamos la ciudad[c], y todo lo que había en ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El versículo 4 presenta variación textual. Algunos testigos ofrecen una forma más breve, diciendo simplemente que los hermanos de Judá entraron en la ciudad desde ambos lados del muro; otros mencionan más explícitamente estacas o clavijas usadas para escalarlo.
    reason: textual_variant
  - marker: c
    text: Aquí el nombre principal del lugar es Tapphué; otro testigo da Bathoue como variante.
    reason: textual_variant
lexical_decisions:
- source_word: κραταιάν / ἰσχυράν
  english_pob_choice: mighty and strong
  chosen_spanish: poderosa y fuerte
  alternatives_spanish:
  - fuerte y poderosa
  - formidable
  lexicon: LSJ
  rationale: Conserva el doblete enfático sin reducirlo a una sola idea. En español, 'poderosa y fuerte' suena natural y mantiene la intensificación del griego.
- source_word: ἀπειλοῦσαν ἡμῖν θάνατον
  english_pob_choice: threatening us with death
  chosen_spanish: que nos amenazaba con muerte
  alternatives_spanish:
  - amenazándonos con muerte
  - que nos amenazaba de muerte
  lexicon: LSJ
  rationale: Mantiene el tono hostil de la frase participial. 'Con muerte' reproduce con bastante cercanía la construcción sin volverla más interpretativa de lo necesario.
- source_word: προσέφθημεν / προσήξαμεν
  english_pob_choice: attacked
  chosen_spanish: atacamos
  alternatives_spanish:
  - avanzamos contra
  - nos lanzamos contra
  lexicon: LSJ
  rationale: En contexto militar expresa asalto, no simple aproximación.
- source_word: νομίσαντες
  english_pob_choice: thinking
  chosen_spanish: pensando
  alternatives_spanish:
  - suponiendo
  - creyendo
  lexicon: LSJ
  rationale: Preserva el valor causal de la participio de forma directa y clara.
- source_word: ἐφελκύσθησαν
  english_pob_choice: were drawn out
  chosen_spanish: fueron atraídos hacia nosotros
  alternatives_spanish:
  - fueron sacados hacia nosotros
  - fueron sacados al exterior
  lexicon: LSJ
  rationale: En español, 'atraídos hacia nosotros' comunica el movimiento táctico desde el muro sin perder el matiz de ser inducidos a salir.
- source_word: λάθρα
  english_pob_choice: secretly
  chosen_spanish: secretamente
  alternatives_spanish:
  - a escondidas
  - en secreto
  lexicon: LSJ
  rationale: Expresa con naturalidad la acción furtiva del relato.
- source_word: πασσάλοις ... τῷ τείχει
  english_pob_choice: climbed it with stakes
  chosen_spanish: lo escalaron con estacas
  alternatives_spanish:
  - subieron el muro con estacas
  - lo treparon con estacas
  lexicon: LSJ
  rationale: Mantiene el detalle táctico inusual del texto. 'Escalaron' funciona bien en español para un muro y conserva la imagen de ascenso con ayuda de estacas.
- source_word: ἐν στόματι μαχαίρας
  english_pob_choice: by the edge of the sword
  chosen_spanish: a filo de espada
  alternatives_spanish:
  - por el filo de la espada
  - con la espada
  lexicon: LSJ
  rationale: Es la equivalencia idiomática más estable en español y conserva el carácter bélico de la expresión.
- source_word: καταφυγόντας
  english_pob_choice: had fled for refuge
  chosen_spanish: habían huido buscando refugio
  alternatives_spanish:
  - habían buscado refugio
  - se habían refugiado
  lexicon: LSJ
  rationale: Recoge tanto el escape como la idea de refugio, que está integrada en el verbo compuesto.
- source_word: ἐνεπρήσαμεν
  english_pob_choice: we burned with fire
  chosen_spanish: los quemamos con fuego
  alternatives_spanish:
  - los incendiamos
  - los quemamos
  lexicon: LSJ
  rationale: Retiene la referencia explícita al fuego y el carácter enérgico de la acción.
- source_word: αἰχμαλωσία
  english_pob_choice: captives
  chosen_spanish: cautivos
  alternatives_spanish:
  - prisioneros
  - captivos de guerra
  lexicon: LSJ
  rationale: Aquí el referente son personas tomadas en guerra; 'cautivos' es claro y natural en español bíblico y evita el sentido abstracto de 'cautiverio'.
- source_word: συνήψαμεν
  english_pob_choice: we joined battle
  chosen_spanish: trabramos combate
  alternatives_spanish:
  - entablamos combate
  - peleamos
  lexicon: LSJ
  rationale: Expresa el idiomatismo militar con suficiente elevación y precisión narrativa.
- source_word: ἕως Θαφφουέ
  english_pob_choice: as far as Thapphoue
  chosen_spanish: hasta Tapphué
  alternatives_spanish:
  - hasta Thapphoue
  - hasta Tafué
  lexicon: LSJ
  rationale: La preposición indica el alcance de la persecución o del combate. Se conserva el topónimo con una forma hispanizada prudente.
theological_decisions:
- issue: Textual form of verse 4 regarding entry into the city
  english_pob_reading: Translated the reading in which Judah's brothers secretly climbed the wall with stakes and entered the city without the defenders' knowledge.
  chosen_spanish_reading: Se traduce la lectura más completa, en la que los hermanos de Judá escalan el muro con estacas y entran en la ciudad sin que los defensores lo sepan.
  alternative_spanish_readings:
  - 'Una lectura más breve: ''mis hermanos entraron en la ciudad desde ambos lados del muro'''
  - Una variante que enfatiza clavar estacas en el muro antes de entrar
  rationale: Los testigos difieren en el detalle, pero coinciden en una entrada sigilosa desde ambos lados. La redacción elegida preserva el detalle táctico sin borrar la variación textual.
  doctrine_reference: Preservar la complejidad textual con notas en vez de armonizar.
- issue: Verse 6 place-name and action against the captives
  english_pob_reading: Rendered the main Greek line with 'men of Thapphoue fell upon our captives.'
  chosen_spanish_reading: Se traduce la línea principal con 'hombres de Tapphué cayeron sobre nuestros cautivos'.
  alternative_spanish_readings:
  - Una variante nombra Bathoue
  - Una variante dice que tomaron o asaltaron la 'cautividad' en vez de los cautivos
  rationale: Se conserva el topónimo de la línea principal y la acción concreta contra los cautivos, mientras se anotan las variantes del testimonio textual.
  doctrine_reference: Primacía del original con manejo transparente de variantes.
translation_notes:
  revision_awareness: Se tomó como base la lectura griega depurada del pasaje y se mantuvo la equivalencia óptima del POB inglés, incluyendo la nota de variación textual para el versículo 4 y la variante del topónimo en el versículo 6. Se evitó trasladar mecánicamente el inglés cuando el español requería una formulación más natural, pero sin ampliar el sentido del original.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' como término fijo del proyecto, aunque no aparece en este pasaje.
  - Se mantiene un registro narrativo sobrio y bélico, sin modernizar en exceso el tono.
  - '''Cautivos'' se usa para personas apresadas en guerra, en consonancia con el uso técnico del pasaje.'
  - Los topónimos se transliteran de forma uniforme dentro de la perícopa.
