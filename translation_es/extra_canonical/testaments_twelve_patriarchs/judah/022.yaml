    unchanged: false
    changes_summary: Changed 'upon them' to 'among them' for more natural rendering of the reciprocal sense, and 'to its end' to 'to an end' for more idiomatic English while preserving the meaning.
translation:
  language: es
  text: El Señor traerá divisiones entre ellos, unos contra otros[a], y habrá guerras continuas en Israel. Y mi reino será llevado a su fin entre extranjeros, hasta que venga la salvación de Israel[b][c],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «guerras constantes».
    reason: lexical_alternative
  - marker: b
    text: O «la liberación de Israel».
    reason: alternative_reading
  - marker: c
    text: O «el salvador de Israel»; la frase puede tener resonancia mesiánica sin nombrar explícitamente a una persona.
    reason: theological_note
lexical_decisions:
- source_word: Ἐπάξει
  english_pob_choice: will bring
  chosen_spanish: traerá
  alternatives_spanish:
  - hará venir
  - traerá sobre
  lexicon: LSJ
  rationale: El futuro de ἐπάγω expresa causar o hacer venir algo. «Traerá» suena natural en español y conserva la agencia divina sin endurecer la sintaxis.
- source_word: διαιρέσεις
  english_pob_choice: divisions
  chosen_spanish: divisiones
  alternatives_spanish:
  - disensiones
  - rupturas
  lexicon: LSJ
  rationale: El sustantivo apunta a fracturas internas o facciones. «Divisiones» conserva el sentido político-social y el tono de advertencia profética.
- source_word: κατ᾽ ἀλλήλων
  english_pob_choice: against one another
  chosen_spanish: unos contra otros
  alternatives_spanish:
  - entre sí
  - unos a otros
  lexicon: LSJ
  rationale: La frase indica hostilidad recíproca. «Unos contra otros» transmite mejor la oposición mutua que una mera ubicación interna.
- source_word: πόλεμοι συνεχεῖς
  english_pob_choice: continual wars
  chosen_spanish: guerras continuas
  alternatives_spanish:
  - guerras incesantes
  - guerras constantes
  lexicon: LSJ
  rationale: συνεχεῖς intensifica la persistencia de los conflictos. «Guerras continuas» conserva esa duración con registro sobrio y claro.
- source_word: ἀλλοφύλοις
  english_pob_choice: foreigners
  chosen_spanish: extranjeros
  alternatives_spanish:
  - pueblos extranjeros
  - naciones extranjeras
  lexicon: LSJ
  rationale: Aquí el término funciona de manera amplia para quienes no pertenecen a Israel. «Extranjeros» es la opción más directa y natural; evita especificar más de lo que el griego exige.
- source_word: συντελεσθήσεται
  english_pob_choice: will be brought to an end
  chosen_spanish: será llevado a su fin
  alternatives_spanish:
  - será completado
  - llegará a su término
  lexicon: LSJ
  rationale: El pasivo futuro puede significar ser completado o ser llevado a término. En este contexto profético, el sentido de terminación encaja mejor, y la forma española mantiene la ambigüedad semántica básica sin resolverla por completo.
- source_word: ἡ βασιλεία μου
  english_pob_choice: my kingdom
  chosen_spanish: mi reino
  alternatives_spanish:
  - mi realeza
  - mi gobierno real
  lexicon: LSJ
  rationale: βασιλεία puede significar reino o reinado. «Mi reino» es la equivalencia más transparente en español y conserva la voz dinástica de Judá.
- source_word: ἕως τοῦ ἐλθεῖν
  english_pob_choice: until ... comes
  chosen_spanish: hasta que venga
  alternatives_spanish:
  - hasta la venida de
  - hasta que llegue
  lexicon: LSJ
  rationale: El infinitivo articular marca un límite temporal. «Hasta que venga» reproduce bien esa relación temporal en español.
- source_word: τὸ σωτήριον τοῦ Ἰσραήλ
  english_pob_choice: the salvation of Israel
  chosen_spanish: la salvación de Israel
  alternatives_spanish:
  - la liberación de Israel
  - el salvador de Israel
  lexicon: LSJ
  rationale: σωτήριον es neutro y normalmente nombra salvación o liberación, no necesariamente una persona. «La salvación de Israel» preserva la forma abstracta y deja abierta la posible resonancia mesiánica.
theological_decisions:
- issue: Sentido de τὸ σωτήριον τοῦ Ἰσραήλ
  english_pob_reading: the salvation of Israel
  chosen_spanish_reading: la salvación de Israel
  alternative_spanish_readings:
  - la liberación de Israel
  - el salvador de Israel
  rationale: El griego se entiende de manera más natural como un sustantivo abstracto. La traducción mantiene esa lectura y no la convierte en una referencia personal, aunque el contexto profético pueda sugerir resonancia mesiánica.
  doctrine_reference: DOCTRINE.md § Preserve theological tension rather than resolve it
- issue: Alcance de συντελεσθήσεται ἡ βασιλεία μου ἐν ἀλλοφύλοις
  english_pob_reading: my kingdom will be brought to an end among foreigners
  chosen_spanish_reading: mi reino será llevado a su fin entre extranjeros
  alternative_spanish_readings:
  - mi reino será completado entre extranjeros
  - mi reinado llegará a su término entre las naciones
  rationale: El contexto inmediato de divisiones y guerras favorece el sentido de finalización, no de consumación triunfal. La redacción española conserva ese peso profético y el posible trasfondo semántico de cumplimiento/terminación.
  doctrine_reference: DOCTRINE.md § Original-language primacy over translation tradition
translation_notes:
  revision_awareness: 'La redacción sigue la última revisión inglesa: «among them» se refleja naturalmente como «entre ellos», y «brought to an end» se traduce con una formulación idiomática en español («será llevado a su fin») que conserva el valor de terminación sin perder la ambigüedad del verbo griego.'
  spanish_consistency_notes:
  - Se usa «Señor» para Κύριος en esta cláusula como equivalente directo del texto griego citado en el pasaje, sin introducir una convención de máscara distinta.
  - Se mantiene «salvación» en el cuerpo principal para respetar el sustantivo neutro σωτήριον y no resolver la tensión mesiánica en el texto base.
  - «Extranjeros» traduce ἀλλοφύλοις de forma amplia y natural; no se especifica «filisteos» porque el contexto aquí es más general.
