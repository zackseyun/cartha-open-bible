source:
  edition: Charles 1908 Greek Versions (Judah source-fix v2 — T12P Pass A; α-column primary, apparatus stripped)
  text: XXII. *Ἐπάξει¹ δὲ αὐτοῖς Κύριος διαιρέσεις *κατ᾽ ἀλλήλων¹³, καὶ ἔσονται *συνεχεῖς ἔσονται³ ἐν Ἰσραήλ⁴. 2. Καὶ ἐν ἀλλοφύλοις⁵ συντελεσθήσεται ἡ βασιλεία μου⁶, ἕως⁷ τοῦ ἐλθεῖν⁸ τὸ⁹ σωτήριον τοῦ¹⁰ Ἰσραήλ¹⁰, *ἕως τῆς¹¹ παρουσίας Θεοῦ¹² τῆς δικαιοσύνης¹³, *τοῦ ἡσυχάσαι τὸν¹⁴ Ἰακὼβ¹⁵ ἐν εἰρήνῃ καὶ πάντα τὰ ἔθνη¹⁴. 3. Καὶ αὐτὸς φυλάξει κράτος¹⁵ τῆς βασιλείας μου¹⁶ ἕως¹⁷ αἰῶνος¹⁸· ὅρκῳ γὰρ ὤμοσέ¹⁹ μοι Κύριος μὴ ἐξαλείψειν²⁰ τὸ βασίλειον ἐκ τοῦ σπέρματός μου ἕως αἰῶνος²¹.
  language: Greek
  source_pages:
  - 168
  - 169
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/022.yaml
  text: The Lord will bring divisions among them against one another[a], and there will be continual wars in Israel. And my kingdom will be brought to an end among foreigners, until the salvation of Israel comes[c][b],
  footnotes:
  - marker: a
    text: Or 'constant wars.'
    reason: lexical_alternative
  - marker: b
    text: Or 'my kingdom will be completed among foreigners'; the Greek verb can denote completion as well as coming to an end.
    reason: lexical_alternative
  - marker: c
    text: Or 'the deliverance of Israel.' The phrase may also carry messianic resonance without explicitly naming a person.
    reason: alternative_reading
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4-2026-03-05
    prompt_id: testaments_draft_v1
    prompt_sha256: 80ab603a8cc697f3aa73368aca8bdade70a8d137a6063b07aa8d13ea4057fb98
