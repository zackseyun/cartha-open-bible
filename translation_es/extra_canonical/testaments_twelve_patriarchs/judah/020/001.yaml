  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 134-175, Judah pilot full)
  text: ὁδηγεῖ³, ὅτι⁴ ἐν πλάνῃ⁵ ἀργυρίου τοὺς μὴ ὄντας θεοὺς⁶ ὀνομάζουσιν, καὶ ποιεῖ *τὸν ἔχοντα⁷ αὐτὴν⁸ εἰς ἔκστασιν⁹ ἐμπεσεῖν.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/020/001.yaml
  text: For it leads astray, because in the delusion of silver they call those who are not gods gods, and it causes the one who has it to fall into ecstasy.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:58Z'
    unchanged: false
    changes_summary: Changed 'it makes' to 'it causes' for smoother formal English, and rendered ἔκστασιν more closely as 'ecstasy' rather than 'frenzy'.
translation:
  language: es
  text: Porque lo desvía, pues en la ilusión de la plata llaman dioses a los que no son dioses, y hace que el que la posee caiga en éxtasis.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁδηγεῖ
  english_pob_choice: it leads astray
  chosen_spanish: lo desvía
  alternatives_spanish:
  - lo extravía
  - lo induce al error
  lexicon: ὁδηγέω
  rationale: El griego expresa dirigir, conducir o guiar; aquí, por el contexto negativo, el sentido es desviar. «Lo desvía» conserva la fuerza causal sin volver el texto más interpretativo de lo que permite el original.
- source_word: ἐν πλάνῃ ἀργυρίου
  english_pob_choice: in the delusion of silver
  chosen_spanish: en la ilusión de la plata
  alternatives_spanish:
  - en el engaño de la plata
  - en el extravío de la plata
  lexicon: πλάνη
  rationale: Se mantiene el campo semántico de error/engaño/desviación. «Ilusión» es idiomático en español, pero se conserva la relación con plata para reflejar el valor idolátrico del dinero sin agregar una explicación ajena al texto.
- source_word: τοὺς μὴ ὄντας θεοὺς ὀνομάζουσιν
  english_pob_choice: they call those who are not gods gods
  chosen_spanish: llaman dioses a los que no son dioses
  alternatives_spanish:
  - llaman dioses a quienes no son dioses
  - nombran dioses a los que no son dioses
  lexicon: ὀνομάζω / θεός
  rationale: Se conserva la repetición enfática de «dioses» y el contraste con «no son dioses», que reproduce la ironía del griego y del inglés POB.
- source_word: εἰς ἔκστασιν
  english_pob_choice: into ecstasy
  chosen_spanish: en éxtasis
  alternatives_spanish:
  - en trance
  - en arrobamiento
  lexicon: ἔκστασις
  rationale: El audit trail optó por «ecstasy» frente a «frenzy» para acercarse más al griego. En español, «éxtasis» es el equivalente más directo y auditables, aunque puede sugerir intensidad mística; se conserva por fidelidad léxica.
theological_decisions:
- issue: Idolatría asociada a la plata/dinero
  english_pob_reading: in the delusion of silver
  chosen_spanish_reading: en la ilusión de la plata
  alternative_spanish_readings:
  - en el engaño de la plata
  - en la seducción de la plata
  rationale: 'No se suaviza la denuncia moral: la plata aparece como esfera de engaño que conduce a llamar dioses a lo que no lo es. Se conserva la conexión entre riqueza e idolatría sin explicitaciones doctrinales añadidas.'
  doctrine_reference: idolatría / falso culto
- issue: ἔκστασις como estado de arrebato
  english_pob_reading: fall into ecstasy
  chosen_spanish_reading: caiga en éxtasis
  alternative_spanish_readings:
  - caiga en trance
  - caiga en arrobamiento
  rationale: Se evita traducirlo como simple «locura» o «frenesí», porque el texto y la revisión inglesa prefieren un término más cercano al valor de ἔκστασις. «Éxtasis» mantiene la ambigüedad entre arrebato, trance y alteración de conciencia.
  doctrine_reference: estado extático / alteración de la conciencia
translation_notes:
  revision_awareness: La versión inglesa revisada cambió 'frenzy' por 'ecstasy' para acercarse más a ἔκστασις. La traducción española sigue esa revisión con «éxtasis», y mantiene el paralelismo causal de 'it causes' con «hace que».
  spanish_consistency_notes:
  - 'Se conserva la cadencia causal del original: «Porque... pues... y...».'
  - No se introdujo «Señor» ni otras equivalencias no presentes en el pasaje.
  - Se mantuvo «dioses» en plural para reflejar el juego irónico del griego.
