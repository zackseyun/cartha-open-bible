base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/020/005.yaml
  text: And the Spirit of truth accuses all, and the sinner is consumed from his own heart, and to lift up
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:58Z'
    unchanged: false
    changes_summary: 'Adjusted wording for closer lexical match: "testifies against" → "accuses" for κατηγορεῖ, "burned up" → "consumed" for ἐμπεπύρισται, and removed the added phrase about the judge, which is not present in the supplied source. Kept the clause ending open to reflect the source fragment''s incomplete final verb phrase.'
translation:
  language: es
  text: Y el Espíritu de la verdad acusa a todos, y el pecador es consumido desde su propio corazón, y para levantar
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τὸ πνεῦμα τῆς ἀληθείας
  english_pob_choice: the Spirit of truth
  chosen_spanish: el Espíritu de la verdad
  alternatives_spanish:
  - el espíritu de la verdad
  - el Espíritu verdadero
  lexicon: πνεῦμα; ἀλήθεια
  rationale: Conservo mayúscula en «Espíritu» porque la construcción funciona como designación personal o personificada en el contexto; «de la verdad» reproduce el genitivo sin desplazar el énfasis hacia una cualidad abstracta.
- source_word: κατηγορεῖ
  english_pob_choice: accuses
  chosen_spanish: acusa
  alternatives_spanish:
  - testifica contra
  - declara contra
  lexicon: κατηγορέω
  rationale: «Acusa» coincide con el valor forense de κατηγορεῖ y mantiene la revisión inglesa que corrigió «testifies against» a una forma más precisa.
- source_word: ἐμπεπύρισται
  english_pob_choice: is consumed
  chosen_spanish: es consumido
  alternatives_spanish:
  - es quemado
  - queda consumido
  lexicon: ἐμπυρίζω
  rationale: «Es consumido» preserva la pasiva y evita introducir un agente no presente; mantiene la fuerza de destrucción/caloreamiento sin añadir «quemado» como única imagen.
- source_word: ἐκ τῆς ἰδίας καρδίας
  english_pob_choice: from his own heart
  chosen_spanish: desde su propio corazón
  alternatives_spanish:
  - por su propio corazón
  - a causa de su propio corazón
  lexicon: καρδία
  rationale: «Desde su propio corazón» sigue de cerca la preposición ἐκ y conserva la idea de origen interior. «Su propio corazón» refleja el posesivo implícito en el artículo y la construcción.
- source_word: ἆραι
  english_pob_choice: to lift up
  chosen_spanish: para levantar
  alternatives_spanish:
  - para alzar
  - para levantar su rostro
  lexicon: αἴρω
  rationale: El fragmento griego se interrumpe y solo permite una traducción abierta del infinitivo. «Para levantar» mantiene la incompletitud sin añadir el complemento ausente en el testimonio suministrado.
theological_decisions:
- issue: El fragmento griego termina de forma incompleta en ἆραι
  english_pob_reading: and to lift up
  chosen_spanish_reading: y para levantar
  alternative_spanish_readings:
  - y levantar
  - y para alzar
  rationale: Mantengo la clausura abierta tal como hace la revisión inglesa, sin completar el objeto de «levantar». Esto evita introducir una lectura del sentido que no está en el texto fuente proporcionado.
  doctrine_reference: Criterio de sobriedad textual; respeto a la fragmentariedad del testimonio
- issue: La identidad del sujeto «Espíritu de la verdad»
  english_pob_reading: the Spirit of truth
  chosen_spanish_reading: el Espíritu de la verdad
  alternative_spanish_readings:
  - el espíritu de la verdad
  rationale: No lo despersonifico con minúscula porque la construcción en español, igual que en inglés, puede leerse como designación del Espíritu. La mayúscula sigue la práctica POB y evita una reducción indebida.
  doctrine_reference: Pneumatología / uso reverente de títulos divinos
- issue: «Acusa» frente a una formulación menos forense
  english_pob_reading: accuses
  chosen_spanish_reading: acusa
  alternative_spanish_readings:
  - testifica contra
  - da testimonio contra
  rationale: La revisión inglesa corrigió el matiz a un verbo más estrictamente acusatorio; «acusa» conserva ese valor judicial y no diluye la oposición implícita en κατηγορεῖ.
  doctrine_reference: Lenguaje jurídico bíblico
translation_notes:
  revision_awareness: La revisión inglesa más reciente ajustó «testifies against» a «accuses», cambió «burned up» a «consumed», y eliminó la cláusula añadida sobre el juez. La versión española sigue esos ajustes y conserva el final abierto, porque el testimonio griego suministrado se corta en «ἆραι».
  spanish_consistency_notes:
  - Uso «Espíritu» con mayúscula en concordancia con la práctica POB para el Espíritu divino/personificado.
  - Mantengo «acusa» como término jurídico fuerte y «consumido» como pasiva de resultado, sin agregar agentes implícitos.
  - Conservo el final incompleto de la sección con «y para levantar» para reflejar fielmente el fragmento fuente.
