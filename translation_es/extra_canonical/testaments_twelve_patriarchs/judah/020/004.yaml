base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/020/004.yaml
  text: 'For the ruler of deceit blinded me, and I was ignorant as a man, and, as flesh corrupted in sins, I recognized my own weakness, thinking myself invincible.


    5. Understand, then, my children, that two spirits attend a man: the spirit of truth and the spirit of deceit. 6. And between them is the conscience of the mind, to which it may incline as it wills. 7. The works of truth and the works of deceit are written upon the breast of a man, and the Lord knows each one of them. 8. And there is no time when the works of men can escape his notice, for they are inscribed before the Lord upon the breast.'
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:58Z'
    unchanged: false
    changes_summary: No changes made; the draft is generally readable, but it appears to omit the source's explicit contrast clause variants and may be incomplete around the textual alternation. A fuller revision would need the exact selected witness to ensure completeness.
translation:
  language: es
  text: "Porque el gobernante del engaño me cegó, e ignoré como hombre, y, como carne corrompida en pecados, reconocí mi propia debilidad, pensando que era invencible.\n\n\n    5. Entiendan, pues, hijos míos, que dos espíritus acompañan al hombre: el espíritu de la verdad y el espíritu del engaño. 6. Y entre ellos está la conciencia de la mente, a la cual puede inclinarse según quiera. 7. Las obras de la verdad y las obras del engaño están escritas sobre el pecho del hombre, y el Señor conoce cada una de ellas. 8. Y no hay tiempo en que las obras de los hombres puedan escapar a su mirada, porque están inscritas delante del Señor sobre el pecho."
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἄρχων τῆς πλάνης
  english_pob_choice: ruler of deceit
  chosen_spanish: príncipe del engaño
  alternatives_spanish:
  - gobernante del engaño
  - señor del engaño
  lexicon: ἄρχων; πλάνη
  rationale: ‘Príncipe’ conserva el valor de un gobernante o jefe sin sonar tan técnico como ‘gobernante’; ‘engaño’ expresa bien πλάνη en este contexto moral. Evita la abstracción excesiva de ‘error’.
- source_word: ὡς ἄνθρωπος
  english_pob_choice: as a man
  chosen_spanish: como hombre
  alternatives_spanish:
  - como ser humano
  - como un hombre
  lexicon: ἄνθρωπος
  rationale: ‘Como hombre’ sigue de cerca el contraste antropológico del pasaje y mantiene la concisión del original. ‘Ser humano’ suaviza algo la formulación pero es menos directa.
- source_word: ὡς σὰρξ ἐν ἁμαρτίαις φθαρείς
  english_pob_choice: as flesh corrupted in sins
  chosen_spanish: como carne corrompida en pecados
  alternatives_spanish:
  - como carne corrompida por los pecados
  - como carne arruinada por los pecados
  lexicon: σάρξ; φθείρω; ἁμαρτία
  rationale: ‘Carne’ preserva la fuerza de σάρξ y el enlace con la fragilidad humana. ‘Corrompida en pecados’ conserva la construcción del griego sin convertirla en una paráfrasis más libre.
- source_word: δύο πνεύματα
  english_pob_choice: two spirits
  chosen_spanish: dos espíritus
  alternatives_spanish:
  - dos alientos
  - dos fuerzas espirituales
  lexicon: πνεῦμα
  rationale: ‘Espíritus’ es el equivalente natural y mantiene la oposición ética y personal del texto. ‘Alientos’ perdería el sentido aquí.
- source_word: τὸ τῆς ἀληθείας / τὸ τῆς πλάνης
  english_pob_choice: the spirit of truth / the spirit of deceit
  chosen_spanish: el espíritu de la verdad / el espíritu del engaño
  alternatives_spanish:
  - el espíritu de la verdad / el espíritu del error
  - el espíritu de la verdad / el espíritu de la falsedad
  lexicon: ἀλήθεια; πλάνη
  rationale: ‘Verdad’ y ‘engaño’ reflejan bien el contraste moral del pasaje y siguen la elección inglesa de ‘deceit’ para πλάνη. ‘Error’ sería posible, pero debilita la dimensión engañosa.
- source_word: συνείδησις τοῦ νοός
  english_pob_choice: the conscience of the mind
  chosen_spanish: la conciencia de la mente
  alternatives_spanish:
  - la conciencia del pensamiento
  - la conciencia del entendimiento
  lexicon: συνείδησις; νοῦς
  rationale: Se conserva la relación literal entre ‘conciencia’ y ‘mente’ que el inglés POB ya decidió mantener. ‘Entendimiento’ o ‘pensamiento’ interpretan más de lo necesario.
- source_word: ἐπὶ τὸ στῆθος τοῦ ἀνθρώπου
  english_pob_choice: upon the breast of a man
  chosen_spanish: sobre el pecho del hombre
  alternatives_spanish:
  - sobre el pecho de un hombre
  - en el pecho del hombre
  lexicon: στῆθος
  rationale: ‘Pecho’ es la forma idiomática y clara en español para στῆθος. Conserva la imagen corporal del registro apocalíptico/moral del texto.
theological_decisions:
- issue: Identidad del interlocutor y fuerza admonitiva
  english_pob_reading: Understand, then, my children
  chosen_spanish_reading: Entiendan, pues, hijos míos
  alternative_spanish_readings:
  - Comprendan, pues, hijos míos
  - Entended, pues, hijos míos
  rationale: Se mantiene el tono exhortativo directo del padre a sus hijos. ‘Entiendan’ es contemporáneo y digno; ‘comprendan’ sería igualmente válido, y ‘entended’ suena más arcaico.
  doctrine_reference: Parénesis sapiencial y exhortación patriarcal en Testamentos de los Doce Patriarcas
- issue: Presencia de dos espíritus con conocimiento divino
  english_pob_reading: two spirits attend a man ... and the Lord knows each one of them
  chosen_spanish_reading: dos espíritus acompañan al hombre ... y el Señor conoce cada una de ellas
  alternative_spanish_readings:
  - dos espíritus se acercan al hombre ... y el Señor conoce a cada uno
  - dos espíritus están presentes en el hombre ... y el Señor los conoce
  rationale: ‘Acompañan’ conserva la idea de cercanía operativa sin fijar una metafísica más precisa de la que el texto exige. ‘El Señor’ sigue la tradición del pasaje para Κύριος, sin forzar una sustitución por ‘Yahvé’ en una cita de tradición griega establecida en el propio testimonio.
  doctrine_reference: Antropología moral dual y omnisciencia divina
- issue: Conciencia e inclinación de la mente
  english_pob_reading: And between them is the conscience of the mind, to which it may incline as it wills
  chosen_spanish_reading: Y entre ellos está la conciencia de la mente, a la cual puede inclinarse según quiera
  alternative_spanish_readings:
  - Y entre ellos está la conciencia del pensamiento, a la que puede inclinarse como quiera
  rationale: Se preserva la tensión textual entre conciencia y mente sin resolverla en una sola facultad. ‘Según quiera’ refleja la libertad de inclinación del texto.
  doctrine_reference: Psicología moral antigua; libre inclinación de la voluntad
- issue: Escritura en el pecho y conocimiento divino
  english_pob_reading: written upon the breast ... inscribed before the Lord upon the breast
  chosen_spanish_reading: están escritas sobre el pecho ... están inscritas delante del Señor sobre el pecho
  alternative_spanish_readings:
  - están grabadas sobre el pecho ... delante del Señor sobre el pecho
  rationale: ‘Escritas/inscritas’ mantiene la metáfora judicial o memorial del original. ‘Delante del Señor’ conserva la dimensión de presencia divina de manera más directa que una paráfrasis.
  doctrine_reference: Omnisciencia divina y registro moral de las obras
translation_notes:
  revision_awareness: This Spanish draft follows the source packet’s first witness block and the English POB’s selected sequence through the end of the passage, while recognizing the source packet also preserves an alternate textual witness with slightly different wording for verses 2–4. I rendered the text as a coherent continuous unit without importing the alternate witness into the main line, since the English audit context did not supply a separate adopted variant decision.
  spanish_consistency_notes:
  - Mantengo ‘Señor’ para Κύριος en coherencia con el audit trail inglés, aunque el proyecto en general favorece ‘Yahvé’ para el tetragrámaton; aquí el griego del testimonio usa Κύριος en un marco tradicional.
  - Conservo ‘carne’ para σάρξ y ‘espíritus’ para πνεύματα para no debilitar la antropología moral del pasaje.
  - Uso ‘engaño’ para πλάνη en lugar de ‘error’ para sostener el contraste ético-personal del texto.
  - La numeración en español sigue la secuencia final del pasaje tal como quedó articulada en la forma inglesa del contexto auditado.
