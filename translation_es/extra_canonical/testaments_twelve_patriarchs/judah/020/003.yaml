translation:
  language: es
  text: Pero el Dios de mis padres tuvo misericordia de mí, porque hice esto en ignorancia.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁ Θεὸς τῶν πατέρων μου
  english_pob_choice: the God of my fathers
  chosen_spanish: el Dios de mis padres
  alternatives_spanish:
  - el Dios de mis antepasados
  - Dios, el de mis padres
  lexicon: θεός
  rationale: Conserva la relación de pacto y de linaje expresada por el genitivo posesivo, en un español natural y reverente. 'Mis padres' reproduce la fórmula bíblica establecida sin añadir interpretaciones.
- source_word: ἠλέησέ με
  english_pob_choice: had mercy on me
  chosen_spanish: tuvo misericordia de mí
  alternatives_spanish:
  - se compadeció de mí
  - me mostró misericordia
  lexicon: ἐλεέω
  rationale: '''Tuvo misericordia de mí'' refleja con fidelidad la acción divina de compasión/restauración. Mantiene el tono bíblico sin endurecerlo ni volverlo explicativo.'
- source_word: ἐν ἀγνωσίᾳ
  english_pob_choice: in ignorance
  chosen_spanish: en ignorancia
  alternatives_spanish:
  - por ignorancia
  - sin saberlo
  lexicon: ἀγνωσία
  rationale: Se preserva la noción de falta de conocimiento como la razón atenuante del acto. 'En ignorancia' es literal pero comprensible; 'por ignorancia' sería una opción igualmente natural, pero aquí la preposición del texto puede mantenerse sin oscurecer el sentido.
theological_decisions:
- issue: Motivo de misericordia divina en relación con un acto cometido sin conocimiento
  english_pob_reading: because I did this in ignorance
  chosen_spanish_reading: porque hice esto en ignorancia
  alternative_spanish_readings:
  - porque lo hice sin saberlo
  - porque obré por ignorancia
  rationale: 'El español conserva la relación causal del original: la misericordia se vincula con el hecho de haber actuado sin conocimiento. No se introduce una categoría doctrinal ajena; se deja visible la atenuación moral implícita en el texto.'
  doctrine_reference: Ignorancia como circunstancia mitigante en narrativa bíblica; sin desarrollo doctrinal adicional.
translation_notes:
  revision_awareness: La revisión inglesa eliminó un marcador de nota para dejar el texto principal limpio; el español sigue esa decisión y no añade notas porque el verso no presenta una variante textual o una ambigüedad que requiera señalización adicional.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para θεός y 'misericordia' para ἐλεέω, en línea con la terminología POB.
  - No se usa 'Señor' ni 'Cristo' porque el verso no contiene esos términos.
  - El tono es formal y público, con sintaxis sencilla para lectura eclesial.
