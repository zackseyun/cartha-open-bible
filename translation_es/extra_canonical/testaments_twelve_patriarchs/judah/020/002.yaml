translation:
  language: es
  text: A causa de la plata, perdí a mis hijos; y si mi arrepentimiento y mi humillación, y las oraciones de mi padre, no hubieran acudido en mi ayuda, habría muerto sin hijos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀργύριον
  english_pob_choice: silver
  chosen_spanish: plata
  alternatives_spanish:
  - dinero
  - moneda
  - argent
  lexicon: ἀργύριον
  rationale: El griego alude literalmente a plata como motivo del daño; en español, «plata» conserva la referencia material y la relación causal sin introducir una abstracción ajena al texto.
- source_word: ἀπόλωλα
  english_pob_choice: I lost
  chosen_spanish: perdí
  alternatives_spanish:
  - estoy perdido
  - he sido arruinado
  lexicon: ἀπόλλυμι
  rationale: El contexto pide una pérdida concreta de los hijos; «perdí» reproduce con naturalidad el resultado expresado por el perfecto griego sin sobrecargarlo con matices no explicitados aquí.
- source_word: μετάνοια
  english_pob_choice: repentance
  chosen_spanish: arrepentimiento
  alternatives_spanish:
  - cambio de mente
  - conversión
  lexicon: μετάνοια
  rationale: En este contexto narrativo y moral, el sentido principal es la acción de volverse atrás en culpa y dolor; «arrepentimiento» es la opción más clara en español sin borrar la dimensión ética.
- source_word: ταπείνωσις
  english_pob_choice: humiliation
  chosen_spanish: humillación
  alternatives_spanish:
  - humildad
  - abatimiento
  lexicon: ταπείνωσις
  rationale: El término griego aquí expresa rebajamiento o humillación sufrida; «humillación» mantiene la tensión textual mejor que «humildad», que en español podría sonar virtuosista o voluntaria.
- source_word: εὐχαὶ
  english_pob_choice: prayers
  chosen_spanish: oraciones
  alternatives_spanish:
  - ruegos
  - plegarias
  lexicon: εὐχή
  rationale: «Oraciones» es la forma más idiomática y sobria en español para las súplicas del padre; conserva el valor religioso sin añadir solemnidad arcaizante.
- source_word: ἄτεκνος
  english_pob_choice: childless
  chosen_spanish: sin hijos
  alternatives_spanish:
  - estéril
  - sin descendencia
  lexicon: ἄτεκνος
  rationale: «Sin hijos» comunica de manera directa el estado de no tener descendencia inmediata; es más natural que «estéril», que en español puede insinuar incapacidad biológica no presente en el contexto.
theological_decisions:
- issue: Relación causal entre pecado/pérdida y misericordia intercesora
  english_pob_reading: Because of silver I lost my children; and if my repentance and my humiliation, and the prayers of my father, had not come to my aid, I would have died childless.
  chosen_spanish_reading: A causa de la plata, perdí a mis hijos; y si mi arrepentimiento y mi humillación, y las oraciones de mi padre, no hubieran acudido en mi ayuda, habría muerto sin hijos.
  alternative_spanish_readings:
  - A causa de la plata, perdí a mis hijos; y si mi arrepentimiento y mi humillación, y las oraciones de mi padre, no me hubieran socorrido, habría muerto sin hijos.
  - Por causa de la plata, perdí a mis hijos; y si mi arrepentimiento y mi humillación, y las oraciones de mi padre, no hubieran venido en mi auxilio, habría muerto sin hijos.
  rationale: 'El griego presenta una causalidad moral y providencial: la pérdida se atribuye a la plata, pero la preservación final se debe a la combinación de arrepentimiento, humillación e intercesión paterna. La redacción española mantiene esa cadena sin suavizar la responsabilidad ni convertirla en mera lección moral.'
  doctrine_reference: Arrepentimiento e intercesión; providencia y preservación
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés coinciden sin revisiones aplicadas; no hay variantes editoriales que exijan nota textual adicional. La versión española sigue la lectura estable del pasaje y conserva la estructura causal y condicional del original.
  spanish_consistency_notes:
  - Se mantiene «plata» para ἀργύριον conforme al valor material del motivo.
  - Se usa «arrepentimiento» para μετάνοια y «humillación» para ταπείνωσις, distinguiendo ambos términos.
  - Se conserva el orden sintáctico de la cláusula condicional para reflejar el énfasis del griego.
  - «Sin hijos» traduce ἄτεκνος con naturalidad moderna y sin introducir una nota biológica ajena al contexto.
