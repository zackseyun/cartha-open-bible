translation:
  language: es
  text: 'Y ahora, hijos míos, les mando: amen a Leví, para que permanezcan, y no se exalten sobre él, para que no sean completamente destruidos. Porque Dios me dio el reino, y a él el sacerdocio, y sometió el reino al sacerdocio. A mí me dio las cosas sobre la tierra; a él, las cosas en los cielos. Pues así el sacerdocio de Dios supera al reino terrenal, a menos que, por el pecado, se aparte del Señor y sea dominado por el reino terrenal.


    Porque el ángel del Señor me dijo: Él fue elegido antes que ustedes por el Señor, para acercarse a él, y para comer en su mesa, y para ofrecerle las primicias de los deleites de los hijos de Israel. Pero tú serás rey de Jacob. Y estarás entre ellos como el mar. Porque así como en él los justos son sacudidos por la tormenta, unos siendo llevados cautivos y otros enriqueciéndose, así también en ti toda raza de hombres: unos correrán peligro, siendo llevados cautivos, y otros se enriquecerán al apoderarse de lo que pertenece a otros.


    Porque los reyes serán como monstruos marinos, tragando hombres como peces; esclavizarán a hijos e hijas de personas libres, y se apoderarán de casas, campos, rebaños y riquezas. Y, injustamente, llenarán de carne a cuervos e ibis, exaltándose para mal por su avaricia; y avanzarán hacia males y soberbia de tal clase, hasta que sean elevados. Y serán como tormentas los falsos profetas[a], y perseguirán a todos los justos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego de este capítulo, tal como se conserva aquí, se interrumpe después de «Y serán como tormentas los falsos profetas»; por tanto, esta versión traduce solo el testimonio extante.
    reason: textual_variant
lexical_decisions:
- source_word: παραγγέλλω
  english_pob_choice: I command
  chosen_spanish: les mando
  alternatives_spanish:
  - les ordeno
  - les encargo
  lexicon: LSJ
  rationale: Conserva el tono imperativo y testamentario fuerte del verbo; 'mando' es natural en español y no debilita la autoridad paterna del hablante.
- source_word: ἀγαπᾶτε
  english_pob_choice: love
  chosen_spanish: amen
  alternatives_spanish:
  - quieran a
  - muestren amor a
  lexicon: LSJ
  rationale: Mantiene el mandato directo de amor fraternal y la fuerza verbal del griego.
- source_word: ἐπαίρεσθε ἐπ᾿ αὐτόν
  english_pob_choice: exalt yourselves over him
  chosen_spanish: no se exalten sobre él
  alternatives_spanish:
  - no se engrandezcan sobre él
  - no sean arrogantes con él
  lexicon: LSJ
  rationale: Preserva la imagen vertical de autoexaltación por encima de Leví, sin reducirla a simple descortesía.
- source_word: ἐξολοθρευθῆτε
  english_pob_choice: be utterly destroyed
  chosen_spanish: sean completamente destruidos
  alternatives_spanish:
  - sean totalmente destruidos
  - sean exterminados
  lexicon: LSJ
  rationale: Expresa la severidad del aviso; 'completamente destruidos' transmite la totalidad del juicio sin sonar excesivamente idiomático.
- source_word: βασιλείαν
  english_pob_choice: kingship
  chosen_spanish: el reino
  alternatives_spanish:
  - la realeza
  - el reinado
  lexicon: LSJ
  rationale: En este contexto, 'reino' conserva la idea del poder regio dado por Dios y encaja con la contraparte sacerdotal del pasaje.
- source_word: ἱερατείαν
  english_pob_choice: priesthood
  chosen_spanish: el sacerdocio
  alternatives_spanish:
  - la dignidad sacerdotal
  - el oficio sacerdotal
  lexicon: LSJ
  rationale: Es la forma más clara y estable para el cargo dado a Leví.
- source_word: ὑπέταξε
  english_pob_choice: subjected
  chosen_spanish: sometió
  alternatives_spanish:
  - subordinó
  - puso bajo
  lexicon: LSJ
  rationale: Conserva la subordinación real entre reino y sacerdocio sin tecnicismo excesivo.
- source_word: τὰ ἐπὶ γῆς / τὰ ἐν οὐρανοῖς
  english_pob_choice: the things on earth / the things in the heavens
  chosen_spanish: las cosas sobre la tierra / las cosas en los cielos
  alternatives_spanish:
  - las cosas terrenales / las cosas celestiales
  - lo de la tierra / lo de los cielos
  lexicon: LSJ
  rationale: Respeta el paralelismo espacial amplio del griego y evita reemplazarlo por un lenguaje más interpretativo.
- source_word: ὑπερέχει
  english_pob_choice: surpasses
  chosen_spanish: supera
  alternatives_spanish:
  - está por encima de
  - tiene precedencia sobre
  lexicon: LSJ
  rationale: '''Supera'' es natural en español y mantiene la comparación de superioridad.'
- source_word: ἐκπέσῃ ἀπὸ Κυρίου
  english_pob_choice: falls away from the Lord
  chosen_spanish: se aparte del Señor
  alternatives_spanish:
  - caiga lejos del Señor
  - se desvíe del Señor
  lexicon: LSJ
  rationale: En español, 'aparte del Señor' comunica la idea de apartamiento/apostasía que el contexto exige.
- source_word: κυριευθῇ ἀπὸ τῆς ἐπιγείου βασιλείας
  english_pob_choice: is ruled by the earthly kingdom
  chosen_spanish: sea dominado por el reino terrenal
  alternatives_spanish:
  - quede bajo el dominio del reino terrenal
  - sea regido por el reino terrenal
  lexicon: LSJ
  rationale: 'Hace visible la inversión del orden: el sacerdocio, si peca, queda sometido al poder terrenal.'
- source_word: προσεγγίζειν
  english_pob_choice: to draw near
  chosen_spanish: acercarse a él
  alternatives_spanish:
  - presentarse ante él
  - aproximarse a él
  lexicon: LSJ
  rationale: Preserva el matiz cultual de acceso a Dios con lenguaje claro y reverente.
- source_word: ἐσθίειν τὴν τράπεζαν αὐτοῦ
  english_pob_choice: to eat at his table
  chosen_spanish: comer en su mesa
  alternatives_spanish:
  - participar de su mesa
  - comer de su mesa
  lexicon: LSJ
  rationale: Mantiene la imagen de comunión y privilegio sacerdotal con una formulación idiomática natural.
- source_word: ἀπαρχὰς
  english_pob_choice: the firstfruits
  chosen_spanish: las primicias
  alternatives_spanish:
  - los primeros frutos
  - las primeras ofrendas
  lexicon: LSJ
  rationale: '''Primicias'' es el término cultual tradicional y fiel al griego.'
- source_word: ἐντρυφημάτων
  english_pob_choice: the delights
  chosen_spanish: los deleites
  alternatives_spanish:
  - las exquisiteces
  - los manjares selectos
  lexicon: LSJ
  rationale: Conserva la amplitud del término para productos escogidos o porciones ricas, sin reducirlo a comida en sentido estrecho.
- source_word: ἔσῃ ... ὡς ἡ θάλασσα
  english_pob_choice: you shall be ... like the sea
  chosen_spanish: estarás entre ellos como el mar
  alternatives_spanish:
  - serás entre ellos como el mar
  - serás como el mar
  lexicon: LSJ
  rationale: Sostiene la imagen marina central y la relación del sujeto con el grupo al que se dirige.
- source_word: χειμάζονται
  english_pob_choice: are storm-tossed
  chosen_spanish: son sacudidos por la tormenta
  alternatives_spanish:
  - son azotados por la tormenta
  - son zarandeados por la tempestad
  lexicon: LSJ
  rationale: Respeta la metáfora náutica del griego y sugiere vulnerabilidad bajo fuerzas violentas.
- source_word: αἰχμαλωτιζόμενοι
  english_pob_choice: being taken captive
  chosen_spanish: siendo llevados cautivos
  alternatives_spanish:
  - siendo capturados
  - siendo hechos cautivos
  lexicon: LSJ
  rationale: Mantiene el lenguaje de cautiverio y el giro participial del original.
- source_word: πλουτοῦντες
  english_pob_choice: growing rich
  chosen_spanish: enriqueciéndose
  alternatives_spanish:
  - haciendo fortuna
  - volviéndose ricos
  lexicon: LSJ
  rationale: Preserva el contraste participial entre cautiverio y enriquecimiento.
- source_word: ἁρπάζοντες τὰ ἀλλότρια
  english_pob_choice: seizing what belongs to others
  chosen_spanish: al apoderarse de lo que pertenece a otros
  alternatives_spanish:
  - al arrebatar lo ajeno
  - al saquear bienes ajenos
  lexicon: LSJ
  rationale: Hace explícita la injusticia de enriquecerse mediante despojo ajeno.
- source_word: κήτη
  english_pob_choice: sea-monsters
  chosen_spanish: monstruos marinos
  alternatives_spanish:
  - grandes criaturas marinas
  - bestias marinas
  lexicon: LSJ
  rationale: Es la correspondencia natural en español para el imaginario depredador del término.
- source_word: καταδουλώσουσιν
  english_pob_choice: they will enslave
  chosen_spanish: esclavizarán
  alternatives_spanish:
  - reducirán a esclavitud
  - someterán como esclavos
  lexicon: LSJ
  rationale: Conserva la fuerza social y violenta del verbo.
- source_word: χρήματα
  english_pob_choice: wealth
  chosen_spanish: riquezas
  alternatives_spanish:
  - bienes
  - dinero
  lexicon: LSJ
  rationale: Amplo y natural; incluye propiedad móvil sin limitarse a moneda.
- source_word: κόρακας καὶ ἴβεις
  english_pob_choice: ravens and ibises
  chosen_spanish: cuervos e ibis
  alternatives_spanish:
  - cuervos e íbices
  - cuervos y aves carroñeras
  lexicon: LSJ
  rationale: Sigue de cerca el griego, manteniendo la imagen específica de aves carroñeras.
- source_word: προκόψουσιν ἐπὶ κακῷ
  english_pob_choice: they will advance in evil
  chosen_spanish: avanzarán hacia males
  alternatives_spanish:
  - progresarán en el mal
  - seguirán adelante en maldad
  lexicon: LSJ
  rationale: Intenta conservar el verbo de avance/progreso, aunque en español necesita una formulación ligeramente más libre.
- source_word: πλεονεξίᾳ
  english_pob_choice: greed
  chosen_spanish: avaricia
  alternatives_spanish:
  - codicia
  - ambición desmedida
  lexicon: LSJ
  rationale: '''Avaricia'' comunica bien el impulso de afán posesivo del término.'
- source_word: ψευδοπροφῆται
  english_pob_choice: false prophets
  chosen_spanish: los falsos profetas
  alternatives_spanish:
  - profetas falsos
  - falsos vaticinadores
  lexicon: LSJ
  rationale: Es la traducción estándar y clara para el término.
theological_decisions:
- issue: Relación entre el reino de Judá y el sacerdocio de Leví
  english_pob_reading: God gave Judah the kingship and Levi the priesthood, and subjected the kingship to the priesthood.
  chosen_spanish_reading: Dios dio a Judá el reino y a Leví el sacerdocio, y sometió el reino al sacerdocio.
  alternative_spanish_readings:
  - Dios dio a uno el reinado y al otro el sacerdocio, sin subordinación clara
  - Dios puso ambos oficios en coordinación
  rationale: El griego afirma una subordinación real con ὑπέταξε; la versión española la conserva sin suavizar la tensión jerárquica.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3, 4
- issue: Condición sobre la superioridad del sacerdocio
  english_pob_reading: The priesthood surpasses earthly kingship unless through sin it falls away from the Lord and is ruled by the earthly kingdom.
  chosen_spanish_reading: El sacerdocio de Dios supera al reino terrenal, a menos que, por el pecado, se aparte del Señor y sea dominado por el reino terrenal.
  alternative_spanish_readings:
  - El reino terrenal supera al sacerdocio si este peca
  - La frase es demasiado corrupta para traducirla con precisión
  rationale: 'La traducción mantiene el sujeto más cercano y la advertencia moral del texto: la superioridad sacerdotal no es absoluta si hay pecado.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Privilegio cultual de Leví
  english_pob_reading: Levi is chosen to draw near to the Lord, eat at his table, and offer firstfruits.
  chosen_spanish_reading: Leví fue elegido para acercarse al Señor, comer en su mesa y ofrecerle las primicias.
  alternative_spanish_readings:
  - Leví fue elegido para una cercanía meramente simbólica
  - Leví fue elegido solo para servicio no sacrificial
  rationale: El contexto es claramente sacerdotal y cultual; por eso se conservan la cercanía, la mesa y las primicias como privilegios de acceso y ofrenda.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
- issue: Alcance de la imagen del mar
  english_pob_reading: Judah's royal line becomes a sphere in which some suffer captivity and others enrich themselves by plunder.
  chosen_spanish_reading: estarás entre ellos como el mar... así también en ti toda raza de hombres
  alternative_spanish_readings:
  - la imagen se refiere solo a los pueblos en general
  - la imagen describe únicamente al mar como símbolo abstracto
  rationale: '''En ti'' indica a Judá como esfera social-política real; el pasaje usa la metáfora del mar para describir inestabilidad, captura y saqueo dentro de su dominio.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: Se revisó el pasaje contra el texto griego base α-column primary y el audit trail inglés POB. No se detectaron revisiones aplicadas en esta pasada; la redacción española sigue la misma resolución de tensiones léxicas y teológicas del registro inglés, incluido el final fragmentario del capítulo.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' no requerido aquí porque el texto griego usa Κυρίου/Θεός en este pasaje, y se respetó 'Señor' en el marco de cita tradicional del POB inglés para Κυρίου dentro de la voz de la tradición textual.
  - Se preservó la distinción entre 'reino' y 'sacerdocio' en lugar de nivelarlos con términos más eclesiásticos.
  - '''Primicias'' y ''deleites'' siguen el valor cultual del griego sin volverlo una paráfrasis general.'
  - Se mantuvo la imagen de aves carroñeras y la ruptura textual final del capítulo con nota crítica.
