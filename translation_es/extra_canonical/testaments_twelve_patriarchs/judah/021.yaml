base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/021.yaml
  text: 'And now[a], my children, I command you: love Levi, so that you may remain, and do not exalt yourselves over him, lest you be utterly destroyed. For God gave me the kingship, and to him the priesthood, and he subjected the kingship to the priesthood. To me he gave the things on earth; to him, the things in the heavens. For thus the priesthood of God surpasses the earthly kingdom[b], unless through sin it falls away from the Lord and is ruled by the earthly kingdom.


    For the angel of the Lord told me that the Lord chose him above you, to draw near to him, and to eat at his table, and to offer him the firstfruits of the delights of the sons of Israel. But you shall be king of Jacob. And you shall be among them like the sea. For just as in it the righteous are storm-tossed, some being taken captive and others growing rich, so also in you every race of men: some are endangered, being taken captive, and others grow rich by seizing what belongs to others.


    For the kings will be like sea-monsters, swallowing men like fish; they will enslave sons and daughters of free people, and they will seize houses, fields, flocks, and wealth. And they will unjustly fill ravens and ibises with the flesh of many, and they will advance in evil, being lifted up in greed. And there will be false prophets like storms[c],'
  footnotes:
  - marker: a
    text: The Greek text of this chapter, as provided here, breaks off after 'And there will be false prophets like storms,' so the present draft translates the extant witness only.
    reason: textual_variant
  - marker: b
    text: '''Ibises'' follows the Greek directly. The image is of carrion birds feeding on the slain; some readers may expect a more general term such as ''birds,'' but the Greek is more specific.'
    reason: lexical_alternative
  - marker: c
    text: '''The firstfruits of the delights of the sons of Israel'' likely refers to choice produce or rich first offerings brought from Israel.'
    reason: cultural_note
