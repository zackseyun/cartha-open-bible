  text: XXI. Καὶ νῦν, τέκνα μου¹, παραγγέλλω ὑμῖν, ἀγαπᾶτε² τὸν Λευὶ³, ἵνα διαμείνητε⁴, καὶ⁵ μὴ ἐπαίρεσθε⁷ ἐπ᾽ αὐτὸν⁸, ἵνα μὴ ἐξολοθρευθῆτε⁹. 2. Ἐμοὶ γὰρ¹⁰ ἔδωκεν¹¹ ὁ Θεὸς¹² τὴν βασιλείαν, κἀκείνῳ¹² τὴν ἱερατείαν¹³, καὶ¹⁴ ὑπέταξε¹⁴ τὴν βασιλείαν τῇ ἱερωσύνῃ¹⁵. 3. Ἐμοὶ ἔδωκε τὰ¹⁶ ἐπὶ γῆς, ἐκείνῳ τὰ ἐν οὐρανοῖς¹⁸. 4. Οὕτως²⁰ γὰρ¹⁹ *ὑπερέχει ἡ ἱερατεία τοῦ Θεοῦ τῆς ἐπιγείου βασιλείας²¹, ἐὰν μὴ διὰ ἁμαρτιῶν ἐκπέσῃ²² ἀπὸ Κυρίου²³ καὶ διὰ τοῦ²⁴ τῆς ἐπιγείου βασιλείας *κυριευθῇ²⁶. 5. Ὁ γὰρ⁵ ἄγγελος Κυρίου εἶπέ μοι· Αὐτὸν ὑπὲρ σὲ ἐξελέξατο Κύριος προσεγγίζειν αὐτῷ²⁸, καὶ ἐσθίειν τὴν τράπεζαν αὐτοῦ, καὶ ἀπαρχὰς αὐτῷ προσφέρειν³¹ ἐντρυφημάτων³² υἱῶν Ἰσραήλ. *Σὺ δὲ ἔσῃ βασιλεὺς Ἰακὼβ³⁵. 6. Καὶ ἔσῃ³⁶ ἐν αὐτοῖς³⁷ ὡς³⁸ ἡ³⁹ θάλασσα. Καθάπερ⁴⁰ γὰρ⁴¹ ἐν αὐτῇ δίκαιοι καὶ ἄδικοι*, οἱ μὲν αἰχμαλωτίζονται οἱ δὲ πλουτοῦσιν*⁴⁴, οὕτως καὶ ἐν σοὶ πᾶν γένος ἀνθρώπων· οἱ μὲν †κωδυνεύσουσιν αἰχμαλωτιζόμενοι, οἱ δὲ πλουτοῦντες ἁρπάζοντες τὰ ἀλλότρια. 7. Ὅτι οἱ βασιλεύσουσιν⁵⁰ ὡς κήτη ἔσονται, *καταπίνοντες ἀνθρώπους⁵¹
    ὡς ἰχθύας· υἱοὺς καὶ θυγατέρας ἐλευθέρους⁵² καταδουλώσουσιν⁵³, *οἴκους, ἀγρούς⁵⁴, ποίμνια, χρήματα ἁρπάσουσιν⁵⁴. 8. Καὶ πολλῶν σάρκας ἀδίκως⁵⁵ κόρακας⁵⁵ ἐπὶ κακῷ⁶⁰ τῇ πλεονεξίᾳ ὑψούμενοι· καὶ προκόψουσιν ἐπὶ κακὰ καὶ ὑπερηφανίᾳ τοιούτου ἕως ὑψοῦνται. 9. Καὶ ἔσονται ὡς καταιγίδες⁶¹ ψευδοπροφῆται⁶³, καὶ πάντας τοὺς δικαίους διώξουσιν⁶⁴.
