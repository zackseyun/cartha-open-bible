  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/024.yaml
  text: '1[3]. He will pour out the spirit of the holy Father’s blessing upon him, and he himself will pour out a spirit of grace upon you.

    2. And you will be to him sons in truth, and you will walk in his commandments, first and last.

    3[5]. [This is the shoot of the Most High God, a spring for the life of all flesh.]

    4. Then the scepter of my kingdom will shine forth, and from your root a stem will arise.

    5. And from it will spring up a rod of righteousness for the nations, to judge and to save all who call upon the Lord.'
  footnotes:
  - marker: '3'
    text: The line about the 'shoot of the Most High God' and the 'spring for the life of all flesh' is textually uncertain in the witness tradition and may reflect expansion; it is retained here because it stands in the Greek evidence provided.
    reason: textual_variant
  - marker: '5'
    text: Or 'a scepter of righteousness.' The Greek uses ῥάβδος here, distinct from the earlier σκῆπτρον ('scepter').
    reason: lexical_alternative
