translation:
  language: es
  text: "1. Derramará sobre él el espíritu de la bendición del Padre santo[a], y él mismo derramará sobre ustedes un espíritu de gracia[b].\n\n\n    2. Y serán para él hijos en verdad, y andarán en sus mandamientos, los primeros y los últimos.\n\n\n    3. [Este es el retoño del Dios Altísimo[c], un manantial que da vida a toda carne.]\n\n\n    4. Entonces resplandecerá el cetro de mi reino, y de su raíz surgirá un tronco.\n\n\n    5. Y de él brotará una vara de justicia para las naciones, para juzgar y salvar a todos los que invocan al Señor."
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego εὐλογίαν πατρὸς ἁγίου («bendición del Padre santo») es un genitivo que designa al Padre santo como fuente de la bendición. El espíritu es el vehículo; la bendición, el contenido.
    reason: lexical_alternative
  - marker: b
    text: 'Frase anártra en griego (πνεῦμα χάριτος), por lo que se rinde indefinidamente: «un espíritu de gracia». La capitalización plena (Espíritu) sería una interpretación excesiva en este contexto testamentario-profético.'
    reason: theological_note
  - marker: c
    text: Esta línea sobre el «retoño del Dios Altísimo» y el «manantial que da vida a toda carne» es textualmente incierta en la tradición manuscrita y puede reflejar una expansión secundaria; se conserva aquí porque está presente en la evidencia griega utilizada.
    reason: textual_variant
lexical_decisions:
- source_word: ἐκχέαι / ἐκχεεῖ
  english_pob_choice: pour out
  chosen_spanish: derramará / derramará
  alternatives_spanish:
  - efundirá
  - otorgará abundantemente
  lexicon: LSJ
  rationale: «Derramar» preserva la imagen profética de efusión divina y mantiene la resonancia intertextual con el lenguaje del Espíritu. Corresponde exactamente al uso bíblico-profético del verbo (cf. Joel 3,1 LXX).
- source_word: πνεῦμα εὐλογίαν πατρὸς ἁγίου
  english_pob_choice: the spirit of the holy Father's blessing
  chosen_spanish: el espíritu de la bendición del Padre santo
  alternatives_spanish:
  - el espíritu de bendición del Padre santísimo
  - el aliento de la bendición del Padre santo
  lexicon: BDAG
  rationale: 'El orden genitivo del griego (πνεῦμα + εὐλογίαν + πατρὸς ἁγίου) se reproduce fielmente: el espíritu es el portador de la bendición, cuya fuente es el Padre santo. Se usa «espíritu» en minúscula siguiendo la decisión POB, pues el texto no lo identifica directamente con el Espíritu Santo como persona trinitaria.'
- source_word: πνεῦμα χάριτος
  english_pob_choice: a spirit of grace
  chosen_spanish: un espíritu de gracia
  alternatives_spanish:
  - el espíritu de gracia
  - un espíritu favorable
  lexicon: BDAG
  rationale: La frase en griego carece de artículo (anártra), por lo que se rinde de manera indefinida en español. «Gracia» (χάρις) sigue el valor teológico establecido en el proyecto POB.
- source_word: υἱούς ἐν ἀληθείᾳ
  english_pob_choice: sons in truth
  chosen_spanish: hijos en verdad
  alternatives_spanish:
  - verdaderos hijos
  - hijos verdaderamente
  lexicon: BDAG
  rationale: «Hijos en verdad» mantiene el tono filial y covenantal, preservando la fuerza adverbial de ἐν ἀληθείᾳ como calificación del vínculo, no solo del modo de actuar. Se prefiere «hijos» sobre «sons» neutro, pues el griego υἱούς es masculino inclusivo en el contexto patriarcal del Testamento.
- source_word: προστάγμασιν πρώτοις καὶ ἐσχάτοις
  english_pob_choice: commandments, first and last
  chosen_spanish: mandamientos, primeros y últimos
  alternatives_spanish:
  - preceptos, desde el primero hasta el último
  - ordenanzas, de principio a fin
  lexicon: LSJ
  rationale: «Mandamientos» reproduce el peso autoritativo de προστάγμασιν en registro formal bíblico. «Primeros y últimos» preserva el paralelismo compacto del griego, que denota exhaustividad.
- source_word: βλαστός
  english_pob_choice: shoot
  chosen_spanish: retoño
  alternatives_spanish:
  - vástago
  - brote
  lexicon: LSJ
  rationale: «Retoño» transmite la imagen vegetal-mesiánica del griego βλαστός con claridad en español latinoamericano moderno. «Vástago» es igualmente válido (cf. Is 11,1) pero puede sonar más técnico; «retoño» es más vívido.
- source_word: πηγή
  english_pob_choice: spring
  chosen_spanish: manantial
  alternatives_spanish:
  - fuente
  - venero
  lexicon: LSJ
  rationale: '«Manantial» es el equivalente más natural en español latinoamericano para πηγή en contexto de vida que brota: evoca agua viva que fluye, apropiada para la metáfora de vida para «toda carne».'
- source_word: σκῆπτρον
  english_pob_choice: scepter
  chosen_spanish: cetro
  alternatives_spanish:
  - vara real
  - bastón de mando
  lexicon: BDAG
  rationale: «Cetro» es el término estándar para σκῆπτρον en textos regios y proféticos del español bíblico. Preserva la imagen dinástica y la concreción del símbolo real.
- source_word: πυθμήν
  english_pob_choice: stem
  chosen_spanish: tronco
  alternatives_spanish:
  - cepa
  - tallo
  lexicon: LSJ
  rationale: πυθμήν denota la base o cepa de una planta. «Tronco» es la traducción más legible en español y prepara la imagen siguiente de la vara que brota de él. «Cepa» sería más preciso botánicamente pero menos fluido en la cadena metafórica.
- source_word: ῥάβδος δικαιοσύνης
  english_pob_choice: a rod of righteousness
  chosen_spanish: una vara de justicia
  alternatives_spanish:
  - un cetro de justicia
  - un bastón de rectitud
  lexicon: BDAG
  rationale: Como σκῆπτρον ya aparece traducido como «cetro» en el versículo anterior, ῥάβδος se distingue con «vara», preservando la diferencia léxica del griego. «Justicia» sigue el valor por defecto de δικαιοσύνη en el proyecto POB.
- source_word: ἔθνεσιν
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los gentiles
  - los pueblos
  lexicon: BDAG
  rationale: «Las naciones» es la traducción más transparente en el lenguaje profético judío y evita estrechar el sentido a «gentiles» (que implica contraste con Israel) o a la amplitud culturalmente vaga de «pueblos».
- source_word: κρῖναι καὶ σῶσαι
  english_pob_choice: to judge and to save
  chosen_spanish: para juzgar y salvar
  alternatives_spanish:
  - para gobernar y rescatar
  - para vindicar y librar
  lexicon: BDAG
  rationale: Los infinitivos se mantienen llanos y de pleno peso. «Juzgar» y «salvar» preservan el doble rol judicial y salvífico sin expansión interpretativa.
- source_word: τοὺς ἐπικαλουμένους τὸν Κύριον
  english_pob_choice: those who call upon the Lord
  chosen_spanish: los que invocan al Señor
  alternatives_spanish:
  - quienes claman al Señor
  - los que apelan al Señor
  lexicon: BDAG
  rationale: «Invocar al Señor» es la expresión bíblica estándar en español para ἐπικαλέομαι en contexto covenantal-religioso (cf. Jl 3,5; Hch 2,21). Preserva el sentido pleno de invocación/apelación.
theological_decisions:
- issue: Imágenes mesiánicas/reales en metáforas vegetales y símbolos reales
  chosen_reading: Traducir las imágenes directamente («retoño», «cetro», «tronco», «vara de justicia») sin introducir «Mesías» en el texto principal.
  alternative_readings:
  - Identificar explícitamente al personaje como el Mesías en el texto principal
  - Desmitologizar el lenguaje como mera sucesión dinástica
  rationale: El texto griego emplea imágenes reales y vegetales evocadoras que sugieren fuertemente a un gobernante escatológico, pero la traducción debe preservar las imágenes de la fuente en vez de resolver la identificación más allá de lo que dice el texto.
  doctrine_reference: 'DOCTRINE.md: Preservar la tensión teológica en vez de resolverla.'
- issue: Verso entre corchetes (v. 3) como material textualmente incierto
  chosen_reading: Incluir la línea entre corchetes en la traducción principal y documentar su incertidumbre textual en nota al pie.
  alternative_readings:
  - Omitir la línea por completo
  - Imprimirla sin ninguna señal de incertidumbre
  rationale: La presentación del texto fuente marca este material como textualmente complejo. La transparencia exige traducir lo que está presente señalando la incertidumbre, en vez de armonizar o suprimir en silencio.
  doctrine_reference: 'PHILOSOPHY.md: traducir honestamente del texto testigo y exponer las decisiones para auditoría.'
translation_notes:
  revision_awareness: 'El paso de revisión POB cambió «commands» por «commandments» para reflejar el peso formal de προστάγμασιν, y «for him» por «to him» para una representación más literal de αὐτῷ. Ambas correcciones se incorporan en la traducción española: «mandamientos» y «para él / seréis para él». No hay revisiones adicionales que afecten el contenido.'
  spanish_consistency_notes:
  - «Derramar» (ἐκχέω) se usa de manera consistente para la efusión del espíritu, en línea con el uso profético del mismo verbo en LXX (Joel 3,1; Zac 12,10).
  - «Naciones» (ἔθνη) se prefiere sobre «gentiles» o «pueblos» para mantener uniformidad con el vocabulario profético del proyecto.
  - «Cetro» (σκῆπτρον) y «vara» (ῥάβδος) se distinguen léxicamente para preservar la diferencia deliberada del texto griego.
  - «Manantial» (πηγή) se elige sobre «fuente» para mayor naturalidad en español latinoamericano moderno.
