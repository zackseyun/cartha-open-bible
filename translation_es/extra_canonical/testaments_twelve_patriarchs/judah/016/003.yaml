base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/016/003.yaml
  text: But if you want to live with self-control, do not touch wine at all, lest you drink and sin in words of insolence and in fights and in slanders and in transgressions of the commandments of God, and perish before your time.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:56:14Z'
    unchanged: false
    changes_summary: Added 'drink' to reflect ἵνα μὴ πίνητε, which was omitted in the draft. Kept the rest substantially unchanged for accuracy and formal register.
translation:
  language: es
  text: Pero si quieren vivir con dominio propio, no toquen el vino en absoluto, para que no beban y pequen en palabras de insolencia, en peleas, en calumnias y en transgresiones de los mandamientos de Dios, y perezcan antes de su tiempo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: σωφρόνως ζῆσαι
  english_pob_choice: live with self-control
  chosen_spanish: vivir con dominio propio
  alternatives_spanish:
  - vivir con autocontrol
  - vivir sobriamente
  lexicon: σωφρόνως
  rationale: La idea central es vivir de manera sobria y disciplinada; 'dominio propio' conserva el sentido ético de autocontrol sin sonar arcaico o mecánico en español.
- source_word: μηδ' ὅλως τοῦ οἴνου ἐφάπτεσθε
  english_pob_choice: do not touch wine at all
  chosen_spanish: no toquen el vino en absoluto
  alternatives_spanish:
  - no se acerquen al vino en absoluto
  - no prueben vino de ninguna manera
  lexicon: ἐφάπτομαι
  rationale: '''No tocar'' refleja bien la prohibición enfática de acercarse al vino; ''en absoluto'' preserva μηδ'' ὅλως como negación total.'
- source_word: ἵνα μὴ πίνητε
  english_pob_choice: lest you drink
  chosen_spanish: para que no beban
  alternatives_spanish:
  - a fin de que no beban
  - no sea que beban
  lexicon: πίνω
  rationale: Se conserva explícitamente el verbo 'beber', que fue añadido en la revisión inglesa por fidelidad al griego.
- source_word: ἁμαρτάνητε
  english_pob_choice: sin
  chosen_spanish: pequen
  alternatives_spanish:
  - cometan pecado
  - fallen en pecado
  lexicon: ἁμαρτάνω
  rationale: El verbo español 'pecar' es la forma más natural y directa para el imperativo/prohibitivo de cometer pecado.
- source_word: λόγοις ὕβρεως
  english_pob_choice: words of insolence
  chosen_spanish: palabras de insolencia
  alternatives_spanish:
  - palabras arrogantes
  - habladas insolentes
  lexicon: ὕβρις
  rationale: '''Insolencia'' mantiene el matiz de arrogancia abusiva y ofensa verbal, sin suavizar el término.'
- source_word: μάχαις
  english_pob_choice: fights
  chosen_spanish: pleitos
  alternatives_spanish:
  - peleas
  - contiendas
  lexicon: μάχη
  rationale: '''Pleitos'' es una opción natural en español bíblico contemporáneo para disputas o riñas; conserva el sentido relacional y verbal del contexto.'
- source_word: συκοφαντίαις
  english_pob_choice: slanders
  chosen_spanish: calumnias
  alternatives_spanish:
  - difamaciones
  - acusaciones falsas
  lexicon: συκοφαντία
  rationale: '''Calumnias'' expresa adecuadamente la falsedad difamatoria y es inteligible en registro eclesial.'
- source_word: παραβάσεσι ἐντολῶν Θεοῦ
  english_pob_choice: transgressions of the commandments of God
  chosen_spanish: transgresiones de los mandamientos de Dios
  alternatives_spanish:
  - infracciones de los mandamientos de Dios
  - violaciones de los mandamientos de Dios
  lexicon: παράβασις
  rationale: Se mantiene una equivalencia formal clara con el plural 'mandamientos de Dios', sin sustituirlo por formulación más interpretativa.
- source_word: Θεοῦ
  english_pob_choice: God
  chosen_spanish: Dios
  lexicon: θεός
  rationale: Se conserva la referencia directa a Dios sin alteración terminológica.
- source_word: ἀπολεῖσθε
  english_pob_choice: perish
  chosen_spanish: perezcan
  alternatives_spanish:
  - se pierdan
  - se destruyan
  lexicon: ἀπόλλυμι
  rationale: '''Perezcan'' reproduce el matiz de ruina/pérdida total y encaja con el tono admonitorio.'
theological_decisions:
- issue: Advertencia moral vinculada al vino
  english_pob_reading: do not touch wine at all, lest you drink and sin ... and perish before your time
  chosen_spanish_reading: no toquen el vino en absoluto, para que no beban y pequen ... y perezcan antes de su tiempo
  alternative_spanish_readings:
  - no se acerquen al vino en absoluto, no sea que beban y pequen ... y mueran antes de tiempo
  - no toquen el vino para no caer en pecado ...
  rationale: 'La advertencia se presenta como causal y preventiva: la abstención del vino evita la cadena de conducta pecaminosa y ruina final. ''Antes de su tiempo'' conserva el valor temporal del griego y del inglés revisado.'
  doctrine_reference: ética de la templanza y responsabilidad moral
- issue: Referencia a los mandamientos de Dios
  english_pob_reading: transgressions of the commandments of God
  chosen_spanish_reading: transgresiones de los mandamientos de Dios
  alternative_spanish_readings:
  - transgresiones contra los mandamientos de Dios
  - quebrantamientos de los mandamientos de Dios
  rationale: Se mantiene el vínculo directo entre pecado conductual y violación de la ley divina, sin intensificar ni suavizar la imputación.
  doctrine_reference: obediencia a la ley de Dios
translation_notes:
  revision_awareness: La revisión inglesa añadió explícitamente 'drink' en ἵνα μὴ πίνητε; la traducción española lo refleja con 'para que no beban'. No se usaron notas al pie porque no hubo una alternativa textual que requiriera anclaje específico en este verso.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para Θεοῦ, conforme al estándar del proyecto.
  - Se evita 'Cristo/Mesías' porque no aparece en el pasaje.
  - Se conserva un registro sobrio y admonitorio, acorde con la tradición de POB.
  - '''Transgresiones'' y ''mandamientos'' se mantienen en plural para reflejar la estructura griega.'
