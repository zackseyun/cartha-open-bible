  text: '* Εἰ δὲ θέλετε σωφρόνως ζῆσαι, μηδ'' ὅλως τοῦ οἴνου ἐφάπτεσθε15 ἵνα μὴ πίνητε. ἁμαρτάνητε¹⁶ ἐν λόγοις ὕβρεως¹⁷ καὶ¹⁸ μάχαις¹⁹ καὶ²⁰ συκοφαν- τίαις²¹ καὶ παραβάσεσι²² ἐντολῶν²³ Θεοῦ²⁴, καὶ ἀπολεῖσθε²⁵ Γοὐκ’²⁶ ἐν καιρῷ ὑμῶν.'
