base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/016/002.yaml
  text: If you drink wine in gladness, be modest with the fear of God. For if, in gladness, the fear of God departs, then drunkenness follows, and shamelessness slips in.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:56:13Z'
    unchanged: false
    changes_summary: Removed one unnecessary possessive ('your') for closer alignment with the Greek; otherwise retained the draft as accurate and natural.
translation:
  language: es
  text: Si bebéis vino en alegría, sed modestos con el temor de Dios. Porque, si en alegría se aparta el temor de Dios, entonces sobreviene la embriaguez, y entra la desvergüenza.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἐὰν ... πίνητε οἶνον
  english_pob_choice: If you drink wine
  chosen_spanish: Si bebéis vino
  alternatives_spanish:
  - Si bebéis vino
  - Si toman vino
  lexicon: πίνω → beber; οἶνος → vino
  rationale: El griego usa una condición general en segunda persona plural; «bebéis» conserva el valor exhortativo general sin volverlo singular. «Vino» es la equivalencia directa de οἶνος.
- source_word: ἐν εὐφροσύνῃ
  english_pob_choice: in gladness
  chosen_spanish: en alegría
  alternatives_spanish:
  - en alegría
  - con gozo
  lexicon: εὐφροσύνη → alegría, gozo, regocijo
  rationale: «Alegría» comunica bien el estado favorable indicado por εὐφροσύνῃ y evita sobrecargar el verso con una formulación más devocional que el griego no exige.
- source_word: ἐστὲ αἰδούμενοι
  english_pob_choice: be modest
  chosen_spanish: sed modestos
  alternatives_spanish:
  - sed modestos
  - mostraos reverentes
  - sed recatados
  lexicon: αἰδέομαι / αἰδούμενοι → sentir reverencia, vergüenza respetuosa, ser modesto/recatado
  rationale: El participio expresa una actitud de pudor reverente; «sed modestos» mantiene la fuerza ética y suena natural en español, sin rebajar el matiz de respeto.
- source_word: μετὰ φόβου θεοῦ
  english_pob_choice: with the fear of God
  chosen_spanish: con el temor de Dios
  alternatives_spanish:
  - con el temor de Dios
  - con reverencia a Dios
  lexicon: φόβος θεοῦ → temor de Dios, reverencia a Dios
  rationale: Se conserva la fórmula tradicional y transparente «temor de Dios», que corresponde al sintagma del griego y mantiene su peso teológico.
- source_word: ὁ τοῦ Θεοῦ φόβος
  english_pob_choice: the fear of God
  chosen_spanish: el temor de Dios
  alternatives_spanish:
  - el temor de Dios
  - la reverencia a Dios
  lexicon: φόβος Θεοῦ → temor de Dios
  rationale: Se mantiene la misma expresión para preservar la repetición retórica del original entre la primera y la segunda cláusula.
- source_word: μέθη
  english_pob_choice: drunkenness
  chosen_spanish: la embriaguez
  alternatives_spanish:
  - la embriaguez
  - la borrachera
  lexicon: μέθη → embriaguez, borrachera
  rationale: «Embriaguez» es un sustantivo más sobrio y de registro bíblico; conserva el estado resultante sin coloquializarlo.
- source_word: ἀναισχυντία
  english_pob_choice: shamelessness
  chosen_spanish: la desvergüenza
  alternatives_spanish:
  - la desvergüenza
  - la falta de pudor
  lexicon: ἀναισχυντία → desvergüenza, falta de pudor
  rationale: «Desvergüenza» transmite el sentido moral de ausencia de pudor o vergüenza, y funciona bien como paralelo al avance de la embriaguez.
theological_decisions:
- issue: Relación entre alegría y autocontrol religioso
  english_pob_reading: If you drink wine in gladness, be modest with the fear of God.
  chosen_spanish_reading: Si bebéis vino en alegría, sed modestos con el temor de Dios.
  alternative_spanish_readings:
  - Si bebéis vino con alegría, sed modestos con el temor de Dios
  - Si bebéis vino en regocijo, sed modestos con el temor de Dios
  rationale: La cláusula no condena el vino en sí, sino que lo sitúa bajo una actitud de reverencia y moderación. La traducción conserva esa tensión moral sin introducir una prohibición inexistente en el texto.
  doctrine_reference: Ética bíblica sobre moderación y sobriedad
- issue: Cadena causal de la pérdida del temor de Dios
  english_pob_reading: For if, in gladness, the fear of God departs, then drunkenness follows, and shamelessness slips in.
  chosen_spanish_reading: Porque, si en alegría se aparta el temor de Dios, entonces sobreviene la embriaguez, y entra la desvergüenza.
  alternative_spanish_readings:
  - Porque, si en alegría se aparta el temor de Dios, entonces llega la embriaguez, y entra la desvergüenza
  - Pues, si en alegría se aparta el temor de Dios, luego viene la embriaguez y se introduce la desvergüenza
  rationale: 'Se conserva la secuencia moral del original: ausencia del temor de Dios → embriaguez → desvergüenza. «Se aparta» refleja el aoristo verbal y sugiere retirada real del temor reverente.'
  doctrine_reference: Sabiduría moral y disciplina espiritual
translation_notes:
  revision_awareness: La revisión inglesa eliminó el posesivo 'your' por no estar en el griego; la versión española sigue esa misma línea y no añade posesivos innecesarios. También se mantuvo la repetición de «temor de Dios» para reflejar la reiteración retórica del original.
  spanish_consistency_notes:
  - Se mantiene «temor de Dios» de forma consistente para φόβος θεοῦ / ὁ τοῦ Θεοῦ φόβος.
  - Se usa «embriaguez» y «desvergüenza» para conservar el progreso moral del pasaje sin rebajar el registro.
  - «Sed modestos» traduce la exhortación ética de modo natural en español y conserva el matiz de recato reverente.
