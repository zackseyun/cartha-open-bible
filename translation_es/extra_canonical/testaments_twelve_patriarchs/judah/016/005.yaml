translation:
  language: es
  text: Y el vino se convierte en causa de guerra y de tumulto.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Καὶ ... αἴτιος γίνεται
  english_pob_choice: becomes the cause of
  chosen_spanish: se convierte en causa de
  alternatives_spanish:
  - llega a ser causa de
  - se hace causa de
  lexicon: αἴτιος γίνεται
  rationale: La construcción griega expresa volverse/convertirse en causa; en español, «se convierte en causa de» comunica con naturalidad la relación causal sin añadir matices que el texto no requiere.
- source_word: πολέμου
  english_pob_choice: war
  chosen_spanish: guerra
  alternatives_spanish:
  - conflicto
  - combate
  lexicon: πόλεμος
  rationale: «Guerra» es el equivalente directo y preserva la fuerza del sustantivo griego.
- source_word: ταραχῆς
  english_pob_choice: turmoil
  chosen_spanish: tumulto
  alternatives_spanish:
  - confusión
  - alboroto
  - turbación
  lexicon: ταραχή
  rationale: «Tumulto» refleja bien la idea de agitación perturbadora y mantiene un registro formal comprensible en español; «confusión» o «turbación» serían posibles, pero menos vívidas en este contexto.
- source_word: ὁ
  english_pob_choice: the wine (implied by context in the full line)
  chosen_spanish: el vino
  alternatives_spanish:
  - vino
  lexicon: ὁ οἶνος
  rationale: Aunque el fragmento griego conservado está incompleto, el contexto del testimonio y la traducción inglesa auditada muestran que el sujeto es «vino»; en español debe explicitarse de modo natural y fiel.
theological_decisions:
- issue: Completar el sujeto implícito del fragmento griego conservado
  english_pob_reading: And wine becomes the cause of war and turmoil.
  chosen_spanish_reading: Y el vino se convierte en causa de guerra y de tumulto.
  alternative_spanish_readings:
  - Y el vino llega a ser causa de guerra y de tumulto.
  rationale: El fragmento fuente preservado termina antes de cerrar la frase, pero la auditoría inglesa señala con claridad el sujeto y la predicación completos. La adición de «el vino» en español no es una expansión interpretativa, sino la restauración del sentido evidenciado por el audit trail.
  doctrine_reference: Fidelidad textual y coherencia de traducción basada en contexto inmediato
translation_notes:
  revision_awareness: La revisión más reciente indica que no se requieren cambios; se mantiene la lectura inglesa auditada y se vierte al español con equivalencia óptima sin introducir variantes no sustentadas.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico sobrio y contemporáneo.
  - No se introduce terminología eclesiástica no presente en el texto.
  - «Tumulto» se eligió para evitar suavizar la fuerza de ταραχή.
