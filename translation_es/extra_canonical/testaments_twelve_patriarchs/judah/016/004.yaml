base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/016/004.yaml
  text: Wine also reveals the mysteries of God and of men, just as I too revealed to the Canaanite woman the commandments of God and the mysteries of Jacob my father—things that God told me not to reveal.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:56:15Z'
    unchanged: false
    changes_summary: Adjusted word order to more closely reflect the Greek by placing 'to the Canaanite woman' with 'revealed,' while preserving the meaning and formal register.
translation:
  language: es
  text: Y el vino también revela los misterios de Dios y de los hombres, así como yo también revelé a la mujer cananea los mandamientos de Dios y los misterios de Jacob, mi padre—cosas que Dios me dijo que no revelara.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: μυστήρια
  english_pob_choice: mysteries
  chosen_spanish: misterios
  alternatives_spanish:
  - secretos
  - misterios sagrados
  lexicon: μυστήριον
  rationale: «Misterios» conserva la carga de realidades ocultas o no reveladas que el contexto mantiene; «secretos» sería más llano pero menos técnico y podría aplanar la resonancia del término.
- source_word: ἀποκαλύπτει
  english_pob_choice: reveals
  chosen_spanish: revela
  alternatives_spanish:
  - descubre
  - da a conocer
  lexicon: ἀποκαλύπτω
  rationale: «Revela» corresponde bien al acto de sacar a la luz lo oculto y mantiene la relación con «misterios» sin añadir matices explicativos ajenos al griego.
- source_word: ἄνθρωπων
  english_pob_choice: of men
  chosen_spanish: de los hombres
  alternatives_spanish:
  - de los seres humanos
  - de la gente
  lexicon: ἄνθρωπος
  rationale: El plural genérico masculino en español reproduce de forma sobria el alcance antropológico del griego; «seres humanos» explicitaría género inclusivo pero alejaría la formulación del paralelo con «de Dios».
- source_word: τὰς ἐντολὰς τοῦ Θεοῦ
  english_pob_choice: the commandments of God
  chosen_spanish: los mandamientos de Dios
  alternatives_spanish:
  - los preceptos de Dios
  - las órdenes de Dios
  lexicon: ἐντολή
  rationale: «Mandamientos» es la equivalencia más directa y bíblicamente natural para ἐντολή, preservando el lenguaje de instrucción autoritativa sin volverlo demasiado jurídico.
- source_word: τῇ Χανανίτιδι
  english_pob_choice: to the Canaanite woman
  chosen_spanish: a la mujer cananea
  alternatives_spanish:
  - a la cananea
  - a la mujer de Canaán
  lexicon: Χανανῖτις
  rationale: «Mujer cananea» es la forma más clara y fiel en español; conserva la referencia étnica/geográfica y evita una etiqueta poco idiomática.
- source_word: μὴ ἀποκαλύψαι
  english_pob_choice: not to reveal
  chosen_spanish: que no revelara
  alternatives_spanish:
  - que no diera a conocer
  - que no descubriera
  lexicon: ἀποκαλύπτω
  rationale: 'La subordinada de mandato indirecto en español requiere subjuntivo: «que no revelara». Mantiene la prohibición sin sobreexplicar el infinitivo griego.'
theological_decisions:
- issue: Alcance de «misterios de Dios y de los hombres»
  english_pob_reading: Wine also reveals the mysteries of God and of men
  chosen_spanish_reading: Y el vino también revela los misterios de Dios y de los hombres
  alternative_spanish_readings:
  - los misterios de Dios y de los seres humanos
  - los secretos de Dios y de los hombres
  rationale: Se mantiene la estructura paralela del original y la ambigüedad productiva de «misterios» como contenidos ocultos tanto divinos como humanos, sin interpretarlos como meras confidencias o enigmas psicológicos.
  doctrine_reference: Sabiduría/ocultamiento de los misterios; no se añade doctrina extra al enunciado.
- issue: Relación entre «mandamientos de Dios» y «misterios de Jacob»
  english_pob_reading: I too revealed to the Canaanite woman the commandments of God and the mysteries of Jacob my father
  chosen_spanish_reading: así como yo también revelé a la mujer cananea los mandamientos de Dios y los misterios de Jacob, mi padre
  alternative_spanish_readings:
  - revelé a la mujer cananea...
  - también le revelé a la mujer cananea...
  rationale: 'Se preserva el paralelismo autobiográfico del texto: el hablante afirma haber comunicado dos tipos de contenidos, uno divino y otro patriarcal/familiar. No se suaviza «misterios de Jacob» para no borrar la tensión entre lo revelable y lo reservado.'
  doctrine_reference: Autoridad profética y confidencialidad de lo revelado; no se doctrinaliza más allá del texto.
- issue: Prohibición divina de revelar lo recibido
  english_pob_reading: things that God told me not to reveal
  chosen_spanish_reading: cosas que Dios me dijo que no revelara
  alternative_spanish_readings:
  - cosas que Dios me mandó no revelar
  - cosas que Dios me dijo que no diera a conocer
  rationale: La forma elegida conserva una orden indirecta de Dios y evita convertirla en una norma impersonal. «Dijo que no revelara» respeta el carácter de mandato divino sin añadir énfasis interpretativo.
  doctrine_reference: Revelación restringida por mandato divino; fidelidad a la reserva establecida por Dios.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que reubicó «to the Canaanite woman» para que modifique directamente «revealed»; en español se reflejó esta relación sintáctica con «revelé a la mujer cananea» para conservar el paralelismo y la proximidad del complemento dativo al verbo.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para Θεός, sin mayúsculas litúrgicas adicionales ni sustitución por «Señor».
  - Se usó «mujer cananea» conforme al audit trail en inglés y a la referencia étnica del griego.
  - No se introdujeron notas al pie porque el verso no exigía variantes textuales ni alternativas doctrinalmente necesarias en español.
  - La puntuación con raya final conserva el inciso explicativo del original y de la versión inglesa revisada.
