base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/016/001.yaml
  text: 'Guard yourselves, therefore, my children, from the boundary of wine; for in it there are four evil spirits: desire, burning passion, debauchery, and shameful gain.'
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:56:13Z'
    unchanged: false
    changes_summary: Revised 'against the limit of wine' to 'from the boundary of wine' for a more natural rendering of τὸν ὅρον τοῦ οἴνου; changed 'heated passion' to 'burning passion' for πυρώσεως, 'wastefulness' to 'debauchery' for ἀσωτίας, and 'shameful greed' to 'shameful gain' for αἰσχροκερδίας to better reflect the Greek.
translation:
  language: es
  text: 'Cuídense, pues, hijos míos, del límite del vino; porque en él hay cuatro espíritus malignos: deseo, ardor, desenfreno y ganancia vergonzosa.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τὸν ὅρον τοῦ οἴνου
  english_pob_choice: from the boundary of wine
  chosen_spanish: del límite del vino
  alternatives_spanish:
  - de la frontera del vino
  - del cerco del vino
  lexicon: ὅρος
  rationale: Tomo ὅρος en su valor de límite o demarcación. ‘Límite’ conserva la idea de un borde que no debe cruzarse, en un español natural y auditable. ‘Del’ reproduce mejor la relación con ‘of wine’ que un giro más explicativo.
- source_word: τέσσαρα πνεύματα πονηρά
  english_pob_choice: four evil spirits
  chosen_spanish: cuatro espíritus malignos
  alternatives_spanish:
  - cuatro malos espíritus
  - cuatro espíritus perversos
  lexicon: πνεῦμα
  rationale: Mantengo ‘espíritus’ por el término griego πνεύματα y ‘malignos’ por πονηρά. ‘Malignos’ es más formal y comunica maldad activa sin perder el valor personal/agentivo que la POB inglesa conserva.
- source_word: ἐπιθυμίας
  english_pob_choice: desire
  chosen_spanish: deseo
  alternatives_spanish:
  - codicia
  - concupiscencia
  lexicon: ἐπιθυμία
  rationale: ‘Deseo’ es el equivalente más neutral y amplio, fiel a la ambigüedad del término griego. ‘Concupiscencia’ cargaría una tradición teológica no obligada por el texto; ‘codicia’ estrecha demasiado el sentido.
- source_word: πυρώσεως
  english_pob_choice: burning passion
  chosen_spanish: ardor
  alternatives_spanish:
  - pasión ardiente
  - ardor ardiente
  lexicon: πύρωσις
  rationale: El griego apunta a un encendimiento o calentamiento pasional. ‘Ardor’ transmite bien la idea de intensidad quemante en un español sobrio. Consideré ‘pasión ardiente’, pero suena más interpretativa y redundante.
- source_word: ἀσωτίας
  english_pob_choice: debauchery
  chosen_spanish: desenfreno
  alternatives_spanish:
  - debauchería
  - disolución
  lexicon: ἀσωτία
  rationale: ‘Desenfreno’ comunica conducta sin control moral y resulta natural en español. ‘Debauchery’ como calco no es idiomático; ‘disolución’ es más tradicional pero menos claro para lectores modernos.
- source_word: αἰσχροκερδίας
  english_pob_choice: shameful gain
  chosen_spanish: ganancia vergonzosa
  alternatives_spanish:
  - lucro vergonzoso
  - ganancia deshonrosa
  lexicon: αἰσχροκέρδεια
  rationale: Sigo de cerca la relación semántica entre ganancia y vergüenza sin convertirlo en una simple idea de avaricia. ‘Ganancia vergonzosa’ mantiene la construcción del POB y evita desplazar el foco a la codicia en abstracto.
theological_decisions:
- issue: Naturaleza de los 'espíritus malignos' asociados al vino
  english_pob_reading: for in it there are four evil spirits
  chosen_spanish_reading: porque en él hay cuatro espíritus malignos
  alternative_spanish_readings:
  - porque en él hay cuatro malos hábitos
  - porque en él hay cuatro inclinaciones malas
  rationale: Conservo la lectura personal/espiritual del texto, ya que el griego habla explícitamente de πνεύματα y la POB inglesa también mantiene ‘spirits’. No los suavizo a meras disposiciones psicológicas, porque eso borraría una tensión documental del pasaje.
  doctrine_reference: Antropología y lenguaje espiritual en literatura pseudepigráfica; fidelidad al referente léxico de πνεῦμα
- issue: Relación entre vino y transgresión
  english_pob_reading: from the boundary of wine
  chosen_spanish_reading: del límite del vino
  alternative_spanish_readings:
  - del exceso de vino
  - de la frontera del vino
  rationale: La expresión no significa solo ‘mucho vino’, sino un borde o límite en torno al cual debe guardarse el lector. ‘Límite’ preserva la advertencia normativa sin explicitar ‘exceso’ más allá de lo que el griego permite.
  doctrine_reference: Ética de la templanza en literatura de los Testamentos de los Doce Patriarcas
translation_notes:
  revision_awareness: La versión inglesa revisada reemplazó ‘against the limit of wine’ por ‘from the boundary of wine’, ‘heated passion’ por ‘burning passion’, ‘wastefulness’ por ‘debauchery’ y ‘shameful greed’ por ‘shameful gain’. La redacción española sigue esas decisiones revisadas y busca mantener la misma precisión semántica en un registro natural.
  spanish_consistency_notes:
  - He usado ‘espíritus malignos’ para conservar la fuerza de πνεύματα πονηρά, en vez de rebajarlo a ‘vicios’ o ‘pasiones’.
  - ‘Ganancia vergonzosa’ mantiene la estructura semántica del original y evita sustituir αἰσχροκερδία por ‘codicia’, que sería más interpretativo.
  - No añadí notas al pie porque el español permite una traducción directa sin introducir una ambigüedad nueva que requiera variantes visibles.
