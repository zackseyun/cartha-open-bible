translation:
  language: es
  text: Porque Dios me dio el reinado, y a él el sacerdocio, y sometió el reinado al sacerdocio.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἔδωκεν / gave
  english_pob_choice: gave
  chosen_spanish: dio
  alternatives_spanish:
  - entregó
  - concedió
  lexicon: δίδωμι
  rationale: «Dio» conserva de forma directa la acción de otorgar sin añadir matices de transferencia jurídica o ceremonial que el contexto no exige explícitamente.
- source_word: βασιλείαν / kingship
  english_pob_choice: kingship
  chosen_spanish: reinado
  alternatives_spanish:
  - realeza
  - monarquía
  lexicon: βασιλεία
  rationale: «Reinado» mantiene la idea de realeza/oficio real en un español natural y menos técnico que «monarquía», sin perder la fuerza dinástica del término.
- source_word: ἱερατείαν / priesthood
  english_pob_choice: priesthood
  chosen_spanish: sacerdocio
  alternatives_spanish:
  - ministerio sacerdotal
  - oficio sacerdotal
  lexicon: ἱερατεία
  rationale: «Sacerdocio» es el equivalente estable y transparente en español para el oficio sacerdotal, y corresponde bien al paralelismo con «reinado».
- source_word: ὑπέταξε / subjected
  english_pob_choice: he subjected
  chosen_spanish: sometió
  alternatives_spanish:
  - subordinó
  - puso bajo
  lexicon: ὑποτάσσω
  rationale: «Sometió» expresa la relación de subordinación de modo claro y directo, conservando la fuerza del verbo griego sin sobreexplicar el orden político-sacerdotal.
theological_decisions:
- issue: Relación entre reinado y sacerdocio
  english_pob_reading: he subjected the kingship to the priesthood
  chosen_spanish_reading: sometió el reinado al sacerdocio
  alternative_spanish_readings:
  - subordinó el reinado al sacerdocio
  - puso el reinado bajo el sacerdocio
  rationale: 'La frase española reproduce la asimetría del griego: el reinado queda en relación subordinada al sacerdocio. No se suaviza ni se invierte la tensión conceptual del texto.'
  doctrine_reference: Tipología real-sacerdotal en Testamento de Judá 21:2; cf. la afirmación interna del pasaje sobre ambos oficios.
translation_notes:
  revision_awareness: La versión inglesa auditada no necesitó revisiones y no contiene notas; la propuesta española sigue ese mismo sentido sin introducir variantes textuales.
  spanish_consistency_notes:
  - Se preserva el paralelismo entre «reinado» y «sacerdocio» para reflejar la estructura del griego.
  - No se introduce «Cristo», «Mesías» ni un nombre divino ocultado; el texto griego dice explícitamente «Dios».
  - El tono es sobrio y publicable, con sintaxis natural en español y sin expansión interpretativa.
