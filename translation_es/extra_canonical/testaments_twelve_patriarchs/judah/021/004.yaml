translation:
  language: es
  text: Porque así el sacerdocio de Dios sobrepasa al reino terrenal[b], a menos que por los pecados se aparte de Yahvé y sea dominado por el reino terrenal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: b
    text: «Reino terrenal» traduce el griego τῆς ἐπιγείου βασιλείας; también podría entenderse como «reino de la tierra», pero «terrenal» conserva mejor la cualidad adjetival del original.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἱερατεία
  english_pob_choice: priesthood
  chosen_spanish: sacerdocio
  alternatives_spanish:
  - ministerio sacerdotal
  - orden sacerdotal
  lexicon: ἱερατεία
  rationale: «Sacerdocio» es la equivalencia natural y transparente en español para el oficio o institución sacerdotal; conserva la función nominal del griego sin añadir matices eclesiásticos ajenos al contexto.
- source_word: τοῦ Θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - de Yahvé
  - divino
  lexicon: θεός
  rationale: El griego nombra a Dios de forma directa; en español debe mantenerse «Dios», sin sustituirlo por una paráfrasis. La relación posesiva es clara y no requiere ampliación.
- source_word: τῆς ἐπιγείου βασιλείας
  english_pob_choice: the earthly kingdom
  chosen_spanish: el reino terrenal
  alternatives_spanish:
  - el reino de la tierra
  - el reino mundano
  lexicon: βασιλεία / ἐπίγειος
  rationale: «Terrenal» traduce con sobriedad ἐπίγειος y evita el tono más valorativo de «mundano». «Reino terrenal» conserva la oposición espacial/ordenada del original y fluye bien en español.
- source_word: ἐκπέσῃ ἀπὸ Κυρίου
  english_pob_choice: falls away from the Lord
  chosen_spanish: se aparte de Yahvé
  alternatives_spanish:
  - caiga de delante de Yahvé
  - se desvíe del Señor
  lexicon: ἐκπίπτω + ἀπό + Κύριος
  rationale: «Apartarse de» recoge bien la idea de caída/abandono implícita en ἐκπέσῃ con ἀπό, sin volverlo demasiado técnico. Se traduce Κύριος por «Yahvé» conforme al criterio del proyecto cuando el contexto remite al nombre divino.
- source_word: κυριευθῇ
  english_pob_choice: is ruled by
  chosen_spanish: sea dominado por
  alternatives_spanish:
  - sea gobernado por
  - quede sometido a
  lexicon: κυριεύω
  rationale: «Sea dominado por» expresa la pasividad y la fuerza de control de κυριευθῇ mejor que «gobernado», que en español puede sonar más neutral. Mantiene la tensión del texto entre soberanía y sometimiento.
theological_decisions:
- issue: Cómo verter Κυρίου en un contexto donde el griego puede aludir al nombre divino.
  english_pob_reading: falls away from the Lord
  chosen_spanish_reading: se aparte de Yahvé
  alternative_spanish_readings:
  - se aparte del Señor
  - se aleje del Señor
  rationale: El texto habla de un apartarse de Κυρίου dentro de una formulación donde el proyecto trata el nombre divino como Yahvé. Traducir aquí «Yahvé» hace explícita la referencia auditable al nombre divino, sin alterar la relación causal del verso.
  doctrine_reference: Nombre divino / Tetragrámaton
- issue: 'Relación entre el sacerdocio de Dios y el reino terrenal: preservar la comparación sin suavizar la superioridad.'
  english_pob_reading: the priesthood of God surpasses the earthly kingdom
  chosen_spanish_reading: el sacerdocio de Dios sobrepasa al reino terrenal
  alternative_spanish_readings:
  - el sacerdocio de Dios supera al reino terrenal
  - el sacerdocio de Dios es superior al reino terrenal
  rationale: «Sobrepasa» mantiene el valor comparativo fuerte del verbo griego y del inglés POB, sin introducir una formulación más interpretativa como «es superior».
  doctrine_reference: Superioridad comparativa / jerarquía sagrada
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios; por eso este borrador sigue de cerca el texto inglés auditado y el griego fuente sin introducir variantes textuales nuevas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para Κυρίου conforme al criterio del proyecto cuando el contexto apunta al nombre divino.
  - Se usa «sacerdocio» y «reino terrenal» como términos transparentes y consistentes con el tono bíblico moderno del proyecto.
  - No se introducen mayúsculas devocionales innecesarias; el ritmo y la puntuación siguen el sentido sintáctico del griego.
