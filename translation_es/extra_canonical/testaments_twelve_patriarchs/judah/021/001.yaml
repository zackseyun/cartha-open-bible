source:
  edition: Charles 1908 Greek Versions (Judah source-fix v2 — T12P Pass A; α-column primary, apparatus stripped)
  text: XXI. Καὶ νῦν, τέκνα μου¹, παραγγέλλω ὑμῖν, ἀγαπᾶτε² τὸν Λευὶ³, ἵνα διαμείνητε⁴, καὶ⁵ μὴ ἐπαίρεσθε⁷ ἐπ᾽ αὐτὸν⁸, ἵνα μὴ ἐξολοθρευθῆτε⁹.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/021/001.yaml
  text: 'And now, my children, I command you: love Levi, so that you may remain, and do not exalt yourselves against him, lest you be utterly destroyed.'
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:58Z'
    unchanged: false
    changes_summary: Changed 'over him' to 'against him' to better reflect ἐπ᾿ αὐτόν and keep the warning parallel to the source; removed the extraneous footnote marker from 'now'.
translation:
  language: es
  text: 'Y ahora, hijos míos, les ordeno: amen a Leví, para que permanezcan, y no se engrandezcan contra él, no sea que sean totalmente destruidos.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τέκνα μου
  english_pob_choice: my children
  chosen_spanish: hijos míos
  alternatives_spanish:
  - mis hijos
  - hijitos míos
  lexicon: τέκνα
  rationale: Hijos míos comunica la relación paterna y afectiva de forma natural en español; evita el tono excesivamente infantil de 'hijitos' y mantiene la cercanía del vocativo.
- source_word: παραγγέλλω ὑμῖν
  english_pob_choice: I command you
  chosen_spanish: les ordeno
  alternatives_spanish:
  - les mando
  - les doy este mandato
  lexicon: παραγγέλλω
  rationale: '''Ordeno'' preserva el peso directivo del verbo sin sonar tan rígido como una calca; ''les'' mantiene el dativo plural explícito del original.'
- source_word: ἀγαπᾶτε τὸν Λευί
  english_pob_choice: love Levi
  chosen_spanish: amen a Leví
  alternatives_spanish:
  - amen a Levi
  - tengan amor por Leví
  lexicon: ἀγαπάω
  rationale: Se conserva el imperativo plural de afecto/lealtad con 'amen'. 'Leví' sigue la forma española habitual del nombre bíblico y evita ambigüedad gráfica.
- source_word: ἵνα διαμείνητε
  english_pob_choice: so that you may remain
  chosen_spanish: para que permanezcan
  alternatives_spanish:
  - a fin de que permanezcan
  - para que sigan firmes
  lexicon: διαμένω
  rationale: '''Permanecer'' refleja la idea de continuidad/estabilidad. ''Para que'' expresa bien la cláusula de propósito en español.'
- source_word: μὴ ἐπαίρεσθε ἐπ᾽ αὐτόν
  english_pob_choice: do not exalt yourselves against him
  chosen_spanish: no se engrandezcan contra él
  alternatives_spanish:
  - no se exalten contra él
  - no se ensoberbezcan contra él
  lexicon: ἐπαίρω + ἐπί
  rationale: '''Engrandecerse contra'' comunica tanto la exaltación arrogante como la hostilidad implícita en ἐπ᾽ αὐτόν. Se evita ''sobre él'' porque debilita la oposición marcada por el griego y la revisión inglesa.'
- source_word: ἐξολοθρευθῆτε
  english_pob_choice: you be utterly destroyed
  chosen_spanish: sean totalmente destruidos
  alternatives_spanish:
  - sean completamente destruidos
  - sean arrasados por completo
  lexicon: ἐξολοθρεύω
  rationale: '''Totalmente destruidos'' conserva la fuerza de destrucción completa sin introducir una imagen más específica que la del verbo griego.'
theological_decisions:
- issue: Relación de Leví con los hijos de Judá en el exhorto
  english_pob_reading: love Levi ... do not exalt yourselves against him
  chosen_spanish_reading: amen a Leví ... no se engrandezcan contra él
  alternative_spanish_readings:
  - amen a Leví ... no se exalten contra él
  - amen a Leví ... no se ensoberbezcan contra él
  rationale: El texto presenta a Leví como figura a la que deben mostrar lealtad y sumisión fraterna; el español mantiene esa tensión sin suavizarla. 'Contra él' preserva el matiz conflictivo del griego y la corrección auditada del inglés.
  doctrine_reference: Twelve Patriarchs, Judah 21:1; source-text hierarchy over later ecclesial vocabulary
translation_notes:
  revision_awareness: La revisión inglesa reciente corrigió 'over him' a 'against him' para reflejar mejor ἐπ᾿ αὐτόν. La redacción española adopta directamente 'contra él' para conservar esa relación adversativa y no requiere nota adicional, ya que no hay variante textual en el paquete fuente.
  spanish_consistency_notes:
  - Se mantiene 'Leví' como forma española del nombre.
  - Se usa 'Y ahora' sin marcador de nota, siguiendo la versión inglesa revisada que eliminó la nota extránea.
  - Se conserva un registro solemne pero natural en español, evitando tanto arcaísmos innecesarios como paráfrasis expansivas.
