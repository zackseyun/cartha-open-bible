translation:
  language: es
  text: Y serán como tormentas los falsos profetas[a], y perseguirán a todos los justos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Tormentas» refleja la imagen del griego καταιγίδες; también puede entenderse como «tempestades».
    reason: alternative_reading
lexical_decisions:
- source_word: καταιγίδες
  english_pob_choice: storms
  chosen_spanish: tormentas
  alternatives_spanish:
  - tempestades
  - tormentas violentas
  lexicon: καταιγίς
  rationale: El griego compara a los falsos profetas con fenómenos de violencia repentina. «Tormentas» mantiene la imagen y suena natural en español; «tempestades» también es posible, pero «tormentas» resulta más directo y comunicativo.
- source_word: ψευδοπροφῆται
  english_pob_choice: false prophets
  chosen_spanish: los falsos profetas
  alternatives_spanish:
  - profetas falsos
  - falsos anunciadores
  lexicon: ψευδοπροφήτης
  rationale: Se conserva el valor lexical de «profetas» con el calificativo moral «falsos», sin suavizarlo ni sustituirlo por una paráfrasis interpretativa.
- source_word: διώξουσιν
  english_pob_choice: persecute
  chosen_spanish: perseguirán
  alternatives_spanish:
  - hostigarán
  - acosarán
  lexicon: διώκω
  rationale: El verbo griego expresa persecución activa; «perseguirán» reproduce bien la fuerza del futuro y conserva el paralelismo con el grupo objeto de esa acción.
- source_word: πάντας τοὺς δικαίους
  english_pob_choice: the righteous
  chosen_spanish: a todos los justos
  alternatives_spanish:
  - a todos los rectos
  - a todos los justos y rectos
  lexicon: δίκαιος
  rationale: '«Justos» es la equivalencia más natural para δίκαιος en este contexto y mantiene el alcance total de πάντας con «a todos». '
theological_decisions:
- issue: Descripción de los falsos profetas como agentes de violencia/caos
  english_pob_reading: false prophets like storms
  chosen_spanish_reading: como tormentas los falsos profetas
  alternative_spanish_readings:
  - los falsos profetas serán como tormentas
  - serán como tormentas, falsos profetas
  rationale: La comparación presenta a los falsos profetas como una fuerza destructiva. El español conserva la imagen sin añadir explicaciones doctrinales que no están en el texto.
  doctrine_reference: Advertencia profética; falsedad religiosa y persecución de los justos
translation_notes:
  revision_awareness: El expediente inglés quedó sin cambios en la revisión más reciente; por eso esta versión española sigue de cerca el texto griego y el sentido ya estabilizado en el POB inglés.
  spanish_consistency_notes:
  - Se mantiene «falsos profetas» como giro fijo y transparente.
  - Se usa «justos» para δικαίους, sin reemplazarlo por una formulación doctrinal más interpretativa.
  - El orden de la comparación se ajusta al español natural, pero sin perder la imagen del original.
