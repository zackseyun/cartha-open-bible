  text: Ἐμοὶ ἔδωκε τὰ¹⁶ ἐπὶ γῆς, ἐκείνῳ τὰ ἐν οὐρανοῖς¹⁸.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/021/003.yaml
  text: To me he gave the things on earth; to him, the things in heaven.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:58Z'
    unchanged: false
    changes_summary: Changed “the heavens” to the more natural singular “heaven” and kept the source meaning intact.
translation:
  language: es
  text: A mí me dio las cosas de la tierra; a él, las del cielo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἐμοὶ
  english_pob_choice: To me
  chosen_spanish: A mí
  alternatives_spanish:
  - Para mí
  - A mí me
  lexicon: Greek dative of personal reference
  rationale: El dativo de beneficio o destinatario se expresa de manera natural con «a mí»; se conserva el contraste enfático con «a él» sin sobretraducir.
- source_word: ἔδωκε
  english_pob_choice: he gave
  chosen_spanish: dio
  alternatives_spanish:
  - entregó
  - otorgó
  lexicon: Greek δίδωμι
  rationale: «Dar» es la equivalencia directa y más sobria para δίδωμι en este contexto; «dio» mantiene la sencillez del griego y evita matices no presentes en el texto.
- source_word: τὰ ἐπὶ γῆς
  english_pob_choice: the things on earth
  chosen_spanish: las cosas de la tierra
  alternatives_spanish:
  - las cosas en la tierra
  - lo terrenal
  lexicon: Greek noun phrase with prepositional modifier
  rationale: «De la tierra» comunica naturalmente la relación de pertenencia o ámbito sin forzar una construcción demasiado literal. Se evita «lo terrenal» porque abstractiza más de lo que sugiere el griego concreto.
- source_word: ἐκείνῳ
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - para él
  - a ese
  lexicon: Greek dative of personal reference / demonstrative pronoun
  rationale: 'Se conserva el contraste personal del dativo con una forma española directa y clara: «a él».'
- source_word: τὰ ἐν οὐρανοῖς
  english_pob_choice: the things in heaven
  chosen_spanish: las del cielo
  alternatives_spanish:
  - las cosas del cielo
  - las cosas en el cielo
  lexicon: Greek article + prepositional phrase
  rationale: Se eligió una elipsis natural en español («las del cielo») para evitar repetición pesada de «cosas» y mantener el paralelismo del verso. «Cielo» en singular sigue la revisión inglesa que prefirió «heaven» como lectura más natural que «the heavens».
theological_decisions:
- issue: Singular/plural of heaven
  english_pob_reading: the things in heaven
  chosen_spanish_reading: las del cielo
  alternative_spanish_readings:
  - las cosas de los cielos
  - las cosas en los cielos
  rationale: El griego usa οὐρανοῖς en plural, pero la revisión inglesa ya juzgó más natural el singular conceptual «heaven». En español, «cielo» expresa bien ese referente único y evita una pluralidad que podría sonar innecesaria o menos idiomática.
  doctrine_reference: No aplica; decisión de estilo y naturalidad conforme al texto base.
translation_notes:
  revision_awareness: La revisión inglesa reciente cambió «the heavens» por «heaven» por naturalidad. La redacción española sigue esa misma decisión semántica con «cielo», sin introducir una diferencia doctrinal.
  spanish_consistency_notes:
  - Se mantiene el contraste paralelo «a mí / a él» para reflejar el juego de dativos del griego.
  - Se evita «SEÑOR» u այլ terminología no presente en el texto; el verso no contiene nombres divinos explícitos.
  - «Las del cielo» preserva el paralelismo breve del original y suena más natural en español que repetir «las cosas» en la segunda cola.
