base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/021/006.yaml
  text: 'And you shall be among them like the sea. For just as in it the righteous are storm-tossed, some being taken captive and others growing rich, so also in you every race of men: some are endangered, being taken captive, and others grow rich by seizing what belongs to others.'
  revision_pass:
