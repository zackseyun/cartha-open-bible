    timestamp: '2026-05-03T07:41:58Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: 'Y estarás entre ellos como el mar. Porque así como en él los justos son sacudidos por la tempestad, unos siendo llevados cautivos y otros enriqueciéndose, así también en ti toda raza de hombres: unos están en peligro, siendo llevados cautivos, y otros se enriquecen arrebatando lo ajeno.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Καὶ ἔσῃ ἐν αὐτοῖς ὡς ἡ θάλασσα
  english_pob_choice: And you shall be among them like the sea.
  chosen_spanish: Y estarás entre ellos como el mar.
  alternatives_spanish:
  - Y serás entre ellos como el mar.
  - Y estarás en medio de ellos como el mar.
  lexicon: θάλασσα → mar; ἔσῃ → estarás/serás
  rationale: Conservo la imagen directa del mar y el futuro segundo singular. 'Entre ellos' reproduce el sentido relacional del griego y del inglés POB sin añadir explicación.
- source_word: δίκαιοι
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - los justos y rectos
  lexicon: δίκαιος → justo
  rationale: '''Justos'' es la equivalencia principal y mantiene el contraste moral/judicial del pasaje.'
- source_word: αἰχμαλωτίζονται
  english_pob_choice: being taken captive
  chosen_spanish: siendo llevados cautivos
  alternatives_spanish:
  - siendo cautivados
  - siendo hechos cautivos
  lexicon: αἰχμαλωτίζω → llevar cautivo
  rationale: '''Llevados cautivos'' expresa la pasividad y el resultado de captura de forma natural en español y conserva la fuerza del participio.'
- source_word: πλουτοῦσιν / πλουτοῦντες
  english_pob_choice: growing rich / grow rich
  chosen_spanish: enriqueciéndose / se enriquecen
  alternatives_spanish:
  - haciendo riqueza
  - ganando riqueza
  lexicon: πλουτέω → enriquecerse
  rationale: '''Enriquecerse'' sigue de cerca el verbo griego y refleja el crecimiento material indicado por el POB.'
- source_word: ἁρπάζοντες τὰ ἀλλότρια
  english_pob_choice: by seizing what belongs to others
  chosen_spanish: arrebatando lo ajeno
  alternatives_spanish:
  - apoderándose de lo ajeno
  - robando lo que es de otros
  lexicon: ἁρπάζω + ἀλλότρια → arrebatar lo ajeno
  rationale: '''Arrebatar'' conserva la violencia o rapacidad de ἁρπάζοντες, y ''lo ajeno'' condensa τὰ ἀλλότρια con un registro natural y bíblico.'
- source_word: πᾶν γένος ἀνθρώπων
  english_pob_choice: every race of men
  chosen_spanish: toda raza de hombres
  alternatives_spanish:
  - toda clase de hombres
  - toda raza humana
  lexicon: γένος ἀνθρώπων → raza de hombres
  rationale: Mantengo la formulación del POB porque preserva el universalismo del pasaje y el matiz colectivo de γένος.
theological_decisions:
- issue: Imagen del mar como figura de inestabilidad y diferenciación moral/social
  english_pob_reading: And you shall be among them like the sea... the righteous are storm-tossed... others grow rich by seizing what belongs to others.
  chosen_spanish_reading: Y estarás entre ellos como el mar... los justos son sacudidos por la tempestad... otros se enriquecen arrebatando lo ajeno.
  alternative_spanish_readings:
  - como el mar agitado
  - como una mar tempestuosa
  rationale: Conservo la comparación sin suavizarla. La tempestad expresa el estado de riesgo de los justos y mantiene la tensión entre sufrimiento y prosperidad injusta que el texto articula.
  doctrine_reference: Sabiduría proverbial y juicio moral implícito; no se normaliza la desigualdad descrita por el texto.
translation_notes:
  revision_awareness: El texto inglés POB y el aparato de revisión permanecen sin cambios en esta unidad; la versión española sigue el mismo contenido semántico sin introducir lecturas variantes no atestiguadas.
  spanish_consistency_notes:
  - Mantengo 'justos' y no 'rectos' para coherencia con el uso bíblico estándar del contraste moral.
  - '''Arrebatando lo ajeno'' evita una paraphrasis larga y conserva la fuerza de la expoliación.'
  - No se introducen notas al pie porque no hay variantes textuales ni ambigüedades necesarias que el texto español requiera anclar.
