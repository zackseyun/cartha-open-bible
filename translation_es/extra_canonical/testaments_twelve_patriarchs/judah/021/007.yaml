id: T12P.JUD.21.7
reference: Testament of Judah 21:7
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (Judah source-fix v2 — T12P Pass A; α-column primary, apparatus stripped)
  text: Ὅτι οἱ βασιλεύσουσιν⁵⁰ ὡς κήτη ἔσονται, *καταπίνοντες ἀνθρώπους⁵¹ ὡς ἰχθύας· υἱοὺς καὶ θυγατέρας ἐλευθέρους⁵² καταδουλώσουσιν⁵³, *οἴκους, ἀγρούς⁵⁴, ποίμνια, χρήματα ἁρπάσουσιν⁵⁴.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/021/007.yaml
  text: For the kings will be like sea monsters, swallowing people like fish; they will make sons and daughters of free people slaves, and they will seize houses, fields, flocks, and wealth.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:58Z'
    unchanged: false
    changes_summary: Changed 'men' to 'people' to match ἀνθρώπους, and 'enslave' to 'make ... slaves' to preserve the explicit object 'sons and daughters' while keeping the source meaning. Also smoothed 'sea-monsters' to 'sea monsters' for natural English.
translation:
  language: es
  text: Porque los reyes serán como monstruos marinos, tragando a las personas como peces; harán esclavos[a] a los hijos y a las hijas de los libres, y arrebatarán casas, campos, rebaños y riqueza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Harán esclavos a» refleja el verbo intensivo griego καταδουλώσουσιν; la frase conserva el objeto explícito «hijos y hijas».
    reason: lexical_alternative
lexical_decisions:
- source_word: βασιλεύσουσιν
  english_pob_choice: the kings will be
  chosen_spanish: los reyes serán
  alternatives_spanish:
  - los reyes reinarán
  - los reyes gobernarán
  lexicon: βασιλεύω
  rationale: El contexto no describe aquí el acto de reinar en abstracto, sino el carácter/imagen de esos reyes; por eso 'serán' reproduce bien la comparación con monstruos marinos sin forzar una perífrasis de ejercicio de poder.
- source_word: κήτη
  english_pob_choice: sea monsters
  chosen_spanish: monstruos marinos
  alternatives_spanish:
  - monstruos del mar
  - cetus marinos
  lexicon: κῆτος
  rationale: '''Monstruos marinos'' conserva la imagen fuerte y amplia del término griego y evita un tecnicismo innecesario; ''monstruos del mar'' sería posible, pero menos natural en español bíblico contemporáneo.'
- source_word: ἀνθρώπους
  english_pob_choice: people
  chosen_spanish: las personas
  alternatives_spanish:
  - los hombres
  - la gente
  lexicon: ἄνθρωπος
  rationale: Se evita 'los hombres' por su posible sesgo genérico masculino y se mantiene la amplitud humana del griego, en línea con la revisión inglesa que corrigió 'men' a 'people'.
- source_word: καταπίνοντες
  english_pob_choice: swallowing
  chosen_spanish: tragando
  alternatives_spanish:
  - devorando
  - engullendo
  lexicon: καταπίνω
  rationale: '''Tragando'' conserva la metáfora corporal directa del original; ''devorando'' intensifica la imagen, pero introduce un matiz más interpretativo.'
- source_word: ἐλευθέρους
  english_pob_choice: free people
  chosen_spanish: de los libres
  alternatives_spanish:
  - de personas libres
  - de los que son libres
  lexicon: ἐλεύθερος
  rationale: La frase se deja en forma adjetival para reflejar la estructura del griego y mantener la relación inmediata con 'hijos y hijas'. 'De personas libres' sería más explícito, pero menos compacto.
- source_word: καταδουλώσουσιν
  english_pob_choice: they will make ... slaves
  chosen_spanish: harán esclavos a
  alternatives_spanish:
  - esclavizarán a
  - reducirán a esclavitud a
  lexicon: καταδουλόω
  rationale: '''Harán esclavos a'' sigue de cerca la decisión inglesa de preservar el objeto explícito (''hijos y hijas'') y la fuerza lexical de δοῦλος/δουλόω. ''Esclavizarán a'' es viable, pero puede sonar más abstracto.'
- source_word: οἴκους
  english_pob_choice: houses
  chosen_spanish: casas
  alternatives_spanish:
  - hogares
  - viviendas
  lexicon: οἶκος
  rationale: '''Casas'' es el equivalente más directo y mantiene el paralelismo con los demás bienes saqueados; ''hogares'' introduce una carga afectiva no explicitada por el texto.'
- source_word: ἀγρούς
  english_pob_choice: fields
  chosen_spanish: campos
  alternatives_spanish:
  - terrenos
  - tierras
  lexicon: ἀγρός
  rationale: '''Campos'' reproduce el valor agrario básico del término y encaja naturalmente en la enumeración patrimonial.'
- source_word: ποίμνια
  english_pob_choice: flocks
  chosen_spanish: rebaños
  alternatives_spanish:
  - manadas
  - ganados
  lexicon: ποίμνιον
  rationale: '''Rebaños'' es el término pastoral estándar y conserva el alcance de ganado menor implícito en el griego.'
- source_word: χρήματα
  english_pob_choice: wealth
  chosen_spanish: riqueza
  alternatives_spanish:
  - bienes
  - dinero
  lexicon: χρήματα
  rationale: '''Riqueza'' mantiene la amplitud semántica de χρήματα, que puede abarcar bienes materiales más allá del dinero en efectivo.'
theological_decisions:
- issue: Imagen de los reyes como depredadores marinos
  english_pob_reading: For the kings will be like sea monsters, swallowing people like fish
  chosen_spanish_reading: Porque los reyes serán como monstruos marinos, tragando a las personas como peces
  alternative_spanish_readings:
  - Pues los reyes serán como monstruos del mar, devorando a la gente como peces
  - Porque los reyes serán como bestias marinas, engullendo personas como peces
  rationale: Se conserva la metáfora extrema sin suavizarla, porque el texto presenta una denuncia profética del poder depredador. 'Monstruos marinos' mantiene la fuerza simbólica sin trasladar la imagen a una categoría zoológica más precisa de lo que el griego exige.
  doctrine_reference: Profecía/denuncia del poder injusto; imaginería apocalíptica y sapiencial
translation_notes:
  revision_awareness: 'La versión inglesa revisada cambió ''men'' por ''people'' para ἀνθρώπους y ''enslave'' por ''make ... slaves'' para conservar el objeto explícito ''sons and daughters''. La presente traducción sigue esa corrección: usa ''las personas'' en lugar de ''los hombres'' y ''harán esclavos a'' en lugar de una paráfrasis impersonal. También conserva la imagen de ''sea monsters'' como ''monstruos marinos'' y el catálogo final de bienes sin expansión interpretativa.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando el texto fuente lo requiera explícitamente; aquí no aparece.
  - '''Esclavos'' se usa en sentido lexical fuerte para καταδουλόω, coherente con la política POB de no diluir la esclavitud del término.'
  - La enumeración final se conserva con coordinación simple para respetar el ritmo de lista del griego.
