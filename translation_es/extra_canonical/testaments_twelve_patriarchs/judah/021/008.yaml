translation:
  language: es
  text: Y llenarán injustamente de la carne de muchos a cuervos e ibis[a], y avanzarán en el mal, alzándose en la codicia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Injustamente» modifica la acción de llenar de carne a las aves carroñeras; preserva el adverbio ἀδίκως del griego.
    reason: lexical_alternative
lexical_decisions:
- source_word: σάρκας
  english_pob_choice: the flesh of many
  chosen_spanish: las carnes de muchos
  alternatives_spanish:
  - la carne de muchos
  - los cuerpos de muchos
  lexicon: σάρξ
  rationale: Mantengo el plural «carnes» para reflejar el plural griego σάρκας y la concreción corporal del texto, sin suavizarlo a una abstracción como «cuerpos».
- source_word: ἀδίκως
  english_pob_choice: unjustly
  chosen_spanish: injustamente
  alternatives_spanish:
  - sin justicia
  - de manera injusta
  lexicon: ἀδίκως
  rationale: «Injustamente» conserva el valor adverbial directo y es natural en español contemporáneo culto.
- source_word: κόρακας
  english_pob_choice: ravens
  chosen_spanish: cuervos
  alternatives_spanish:
  - corvos
  - cuervos negros
  lexicon: κόραξ
  rationale: «Cuervos» es el equivalente normal y transparente en español para κόρακας.
- source_word: πλεονεξίᾳ
  english_pob_choice: greed
  chosen_spanish: codicia
  alternatives_spanish:
  - avaricia
  - ambición desordenada
  lexicon: πλεονεξία
  rationale: «Codicia» reproduce bien la fuerza moral de πλεονεξία en un registro bíblico claro y vigente.
- source_word: ὑψούμενοι
  english_pob_choice: being lifted up
  chosen_spanish: alzándose
  alternatives_spanish:
  - siendo enaltecidos
  - elevándose
  lexicon: ὑψόω
  rationale: Opto por una forma reflexiva activa que en español expresa bien el participio de estado/proceso y conserva la idea de autoexaltación implícita en el contexto.
- source_word: προκόψουσιν ἐπὶ κακὰ
  english_pob_choice: they will advance in evil
  chosen_spanish: avanzarán en el mal
  alternatives_spanish:
  - progresarán en el mal
  - seguirán adelante en el mal
  lexicon: προκόπτω
  rationale: «Avanzarán» mantiene el movimiento progresivo del verbo y «en el mal» reproduce la dirección ética del complemento.
- source_word: ὑπερηφανίᾳ
  english_pob_choice: being lifted up in greed
  chosen_spanish: alzándose en la codicia
  alternatives_spanish:
  - en soberbia
  - en orgullo
  lexicon: ὑπερηφανία
  rationale: Aunque el segmento griego recibido aquí vincula el alzamiento con la codicia, conservo la imagen de autoexaltación en español mediante «alzándose»; la codicia queda explícita como el ámbito moral del ascenso.
theological_decisions:
- issue: Relación entre violencia y corrupción moral
  english_pob_reading: The verse describes unjust predation, then moral escalation into evil through greed.
  chosen_spanish_reading: La frase conserva la imagen de depredación injusta y el deterioro progresivo hacia el mal por codicia.
  alternative_spanish_readings:
  - Una lectura más suave podría ser «comerán injustamente la carne de muchos»
  - 'otra más interpretativa: «se enriquecerán injustamente a costa de muchos»'
  rationale: Mantengo la imagen corporal y depredadora del griego y del POB inglés, sin reemplazarla por una paráfrasis socioeconómica que debilitaría el impacto del texto.
  doctrine_reference: Sabiduría moral / juicio contra la violencia injusta
- issue: Autoexaltación y codicia
  english_pob_reading: being lifted up in greed
  chosen_spanish_reading: alzándose en la codicia
  alternative_spanish_readings:
  - siendo elevados por la codicia
  - enalteciéndose por la codicia
  rationale: La frase española conserva la tensión entre exaltación y vicio interior. Evita normalizar el pasivo como si fuera solo una condición externa, y mantiene el matiz de orgullo implicado por ὑψούμενοι.
  doctrine_reference: Soberbia y avaricia como vicios condenados
translation_notes:
  revision_awareness: Se revisó el pasaje frente al griego fuente y el POB inglés. No hubo cambios de revisión aplicados en el paquete; por tanto, la propuesta sigue la lectura estable del texto fuente, preservando la imagen de depredación y la progresión moral hacia el mal.
  spanish_consistency_notes:
  - Se mantuvo «codicia» para πλεονεξία, evitando alternarlo con «avaricia» salvo en notas de alternativa.
  - Se usó «cuervos» para κόρακας por ser el referente zoológico directo y comprensible en español.
  - Se conservó el plural «carnes» para respetar la forma griega y el tono corporal del pasaje.
