review_pass:
  verdict: revise
  source_alignment_summary: The EN text reads 'they will unjustly fill ravens and ibises with the flesh of many, and they will advance in evil, being lifted up in greed.' The Spanish 'harán que las carnes de muchos sean devoradas por cuervos y ibis injustamente' restructures the EN active construction into a causative passive, which moves away from both the EN and Greek. The Greek κόρακας can be read as an accusative (filling ravens), so the EN stays closer to source. The second clause 'avanzarán en el mal, alzándose en la codicia' is faithful. However ὑπερηφανίᾳ is 'arrogance/pride' not 'codicia/greed'—the EN chose to combine it with the prior πλεονεξίᾳ phrase, so the ES following EN is acceptable. The footnote marker [a] appears in text but the footnote is present—marker match is fine.
  spanish_quality_summary: The causative restructuring 'harán que las carnes... sean devoradas' is awkward and less idiomatic than a direct rendering. A more natural and source-faithful reading would be 'llenarán injustamente de la carne de muchos a cuervos e ibis'. The second half is good.
  glossary_alignment: πλεονεξίᾳ→codicia is correct per glossary. No YHWH/θεός/Χριστός/δοῦλος/πνεῦμα terms present.
  issues:
  - severity: medium
    issue: Causative passive restructuring of the main clause
    rationale: The ES 'harán que las carnes de muchos sean devoradas por cuervos e ibis injustamente' is a periphrastic causative that distances from both EN 'they will unjustly fill ravens and ibises with the flesh of many' and the Greek χορτάσουσιν κόρακας. A direct rendering is more faithful.
  revised_spanish_text: Y llenarán injustamente de la carne de muchos a cuervos e ibis[a], y avanzarán en el mal, alzándose en la codicia.
  revised_footnotes:
