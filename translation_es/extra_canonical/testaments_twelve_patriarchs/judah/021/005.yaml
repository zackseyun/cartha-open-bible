base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/021/005.yaml
  text: For the angel of the Lord told me that the Lord chose him above you, to draw near to him, and to eat at his table, and to offer the firstfruits of the delights of the sons of Israel to him. But you shall be king of Jacob.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:58Z'
    unchanged: false
    changes_summary: Moved 'to him' to match the source placement of αὐτῷ and preserve the sense of offering the firstfruits to him; otherwise kept the draft wording.
translation:
  language: es
  text: 'Porque el ángel de Yahvé me dijo: «A él lo escogió el Señor por encima de ti, para acercarse a él, y para comer en su mesa, y para presentarle las primicias de los deleites de los hijos de Israel. Pero tú serás rey de Jacob».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Κυρίου / Κύριος
  english_pob_choice: the Lord
  chosen_spanish: Yahvé / el Señor
  alternatives_spanish:
  - Señor
  - Yahvé
  lexicon: κύριος
  rationale: El texto griego distingue entre el ángel «de Yahvé» y «el Señor» que elige; en español mantengo «Yahvé» para el genitivo del ángel del Señor, según el estándar del proyecto, y «el Señor» cuando el discurso reproduce la fórmula del POB inglés y conserva el matiz reverencial del título divino en la cita indirecta.
- source_word: ἐξελέξατο
  english_pob_choice: chose
  chosen_spanish: escogió
  alternatives_spanish:
  - eligió
  - seleccionó
  lexicon: ἐκλέγομαι
  rationale: «Escogió» comunica bien la elección personal y soberana del sujeto divino sin volverlo demasiado técnico ni rebajar la fuerza del verbo.
- source_word: προσεγγίζειν αὐτῷ
  english_pob_choice: to draw near to him
  chosen_spanish: para acercarse a él
  alternatives_spanish:
  - para aproximarse a él
  - para presentarse ante él
  lexicon: προσεγγίζω
  rationale: Conservo la cercanía relacional y cultual del infinitivo, sin cargarlo con una paráfrasis excesiva.
- source_word: ἐσθίειν τὴν τράπεζαν αὐτοῦ
  english_pob_choice: to eat at his table
  chosen_spanish: para comer en su mesa
  alternatives_spanish:
  - para comer de su mesa
  - para sentarse a su mesa a comer
  lexicon: τράπεζα
  rationale: «Comer en su mesa» refleja la imagen de comunión y honra del original y del POB inglés, sin alterar el sentido literal.
- source_word: ἀπαρχὰς ... προσφέρειν
  english_pob_choice: to offer the firstfruits
  chosen_spanish: para presentarle las primicias
  alternatives_spanish:
  - para ofrecerle las primicias
  - para traerle las primicias
  lexicon: ἀπαρχή
  rationale: «Presentarle las primicias» conserva el valor cultual de la ofrenda y hace explícito el destinatario marcado por αὐτῷ en el griego y por la revisión inglesa.
- source_word: ἐντρυφημάτων
  english_pob_choice: delights
  chosen_spanish: de los deleites
  alternatives_spanish:
  - de los manjares
  - de los alimentos delicados
  lexicon: ἐντρύφημα
  rationale: «Deleites» preserva el término abstracto y la posible connotación de cosas exquisitas o lujosas, en línea con la cautela del POB inglés.
- source_word: υἱῶν Ἰσραήλ
  english_pob_choice: sons of Israel
  chosen_spanish: de los hijos de Israel
  alternatives_spanish:
  - de los hijos de Jacob
  - de Israel
  lexicon: υἱός
  rationale: Mantengo la expresión heredada del texto, que tiene valor étnico y pactal, y coincide con el inglés auditado.
- source_word: βασιλεὺς Ἰακώβ
  english_pob_choice: king of Jacob
  chosen_spanish: rey de Jacob
  alternatives_spanish:
  - rey sobre Jacob
  - rey en Jacob
  lexicon: βασιλεύς
  rationale: «Rey de Jacob» sigue la forma del original y del POB, conservando la posible ambigüedad entre pertenencia, dominio y relación de pacto sin añadir una interpretación más estrecha.
theological_decisions:
- issue: Identidad del ángel y del Señor en la primera cláusula
  english_pob_reading: the angel of the Lord told me that the Lord chose him
  chosen_spanish_reading: 'el ángel de Yahvé me dijo: «A él lo escogió el Señor»'
  alternative_spanish_readings:
  - 'el ángel del Señor me dijo: «el Señor lo escogió»'
  - 'el ángel de Yahvé me dijo: «Yahvé lo escogió»'
  rationale: Conservo la distinción entre el mensajero y el sujeto que elige, como en el griego y en el POB inglés. En la referencia al ángel, uso «Yahvé» por convención del proyecto; en la cláusula de elección, dejo «el Señor» para no forzar una armonización que el propio audit trail inglés no hizo explícita.
  doctrine_reference: Teofanía / mensajero divino; preservación de la distinción narratológica entre mediador y agente divino.
- issue: Objeto de las primicias
  english_pob_reading: to offer the firstfruits ... to him
  chosen_spanish_reading: para presentarle las primicias
  alternative_spanish_readings:
  - para ofrecerle las primicias
  - para presentarle las primicias a él
  rationale: La revisión inglesa trasladó explícitamente el destinatario «to him» para preservar que las primicias van dirigidas a él. El español mantiene esa direccionalidad con dativo enclítico, evitando perder el referente.
  doctrine_reference: Lectura textual y sintáctica del dativo indirecto; ofrecimiento cultual dirigido al elegido.
translation_notes:
  revision_awareness: La versión española sigue la lectura inglesa revisada, especialmente la colocación de «to him» junto con «offer the firstfruits», para no diluir el destinatario de la ofrenda. También toma el griego como base directa para conservar la secuencia de infinitivos y la clausula final «tú serás rey de Jacob» sin expandirla.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino en la expresión fija «ángel de Yahvé», conforme al estándar del proyecto.
  - Se mantiene «el Señor» en la cláusula de elección para respetar la formulación auditada del POB y la distinción discursiva del texto.
  - No se introduce «Cristo», «SEÑOR» en mayúsculas ni terminología eclesiástica ajena al pasaje.
  - La sintaxis intenta reflejar la acumulación de infinitivos del griego sin sonar rígida en español.
