translation:
  language: es
  text: Y el ángel de Dios me mostró que las mujeres dominan para siempre sobre rey y mendigo por igual, y quitan la gloria de un rey, la fuerza de un hombre fuerte y el sustento del pobre.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Καὶ ἔδειξέ μοι ὁ ἄγγελος τοῦ θεοῦ
  english_pob_choice: And the angel of God showed me
  chosen_spanish: Y el ángel de Dios me mostró
  alternatives_spanish:
  - Y el ángel de Dios me enseñó
  - Y el ángel de Dios me hizo ver
  lexicon: ἄγγελος
  rationale: ‘Me mostró’ reproduce bien el valor de ‘showed me’ y mantiene la presentación reveladora del ángel sin añadir explicaciones. ‘Me enseñó’ podría sugerir instrucción más que visión; ‘me hizo ver’ es posible, pero menos directo.
- source_word: τὴν δόξαν
  english_pob_choice: a king's glory
  chosen_spanish: la gloria de un rey
  alternatives_spanish:
  - la gloria del rey
  - el esplendor de un rey
  lexicon: δόξα
  rationale: La frase griega y la versión inglesa apuntan a ‘glory’ como honor/majestad, no solo brillo. ‘La gloria de un rey’ conserva esa amplitud y evita restringir demasiado el sentido con ‘esplendor’.
- source_word: ἰσχύν
  english_pob_choice: a strong man's might
  chosen_spanish: la fuerza de un hombre fuerte
  alternatives_spanish:
  - el poder de un hombre fuerte
  - la fortaleza de un hombre fuerte
  lexicon: ἰσχύς
  rationale: ‘Might’ aquí corresponde a fuerza/capacidad vigorosa. ‘Fuerza’ es natural en español y mantiene el paralelismo con ‘gloria’ y ‘sustento’. ‘Poder’ sería más abstracto; ‘fortaleza’ puede sonar más a resistencia moral.
- source_word: στήριγμα
  english_pob_choice: the poor man's support
  chosen_spanish: el sustento del pobre
  alternatives_spanish:
  - el apoyo del pobre
  - el sostén del pobre
  lexicon: στήριγμα
  rationale: El contexto pide algo que sostiene o mantiene al pobre. ‘Sustento’ funciona bien en español y refleja la idea de apoyo material o soporte vital; ‘apoyo’ y ‘sostén’ son válidos, pero ‘sustento’ enlaza mejor con la pérdida de recursos.
- source_word: αἱ γυναῖκες
  english_pob_choice: women
  chosen_spanish: las mujeres
  alternatives_spanish:
  - las mujeres
  - las esposas
  lexicon: γυνή
  rationale: Se mantiene el término general ‘mujeres’ porque el texto y la traducción inglesa lo usan de forma amplia. ‘Esposas’ sería demasiado restrictivo y no está exigido por el griego.
theological_decisions:
- issue: Universal/ proverbial scope of women ruling over social classes
  english_pob_reading: women rule forever over king and beggar alike
  chosen_spanish_reading: las mujeres dominan para siempre sobre rey y mendigo por igual
  alternative_spanish_readings:
  - las mujeres gobiernan para siempre sobre rey y mendigo por igual
  - las mujeres rigen para siempre sobre rey y mendigo por igual
  rationale: ‘Dominan’ conserva la fuerza general del inglés POB ‘rule’ en un contexto proverbial y evita introducir una formulación demasiado política o institucional. ‘Para siempre’ refleja el adverbio de duración y ‘por igual’ preserva la distribución entre ambos extremos sociales.
  doctrine_reference: Sociología proverbial del pasaje; no hay afirmación doctrinal normativa, sino observación sentenciosa.
translation_notes:
  revision_awareness: La revisión inglesa eliminó ‘very’ antes de ‘support’ por no estar en el fuente; en español se evita cualquier intensificación equivalente y se traduce simplemente como ‘sustento’.
  spanish_consistency_notes:
  - Se mantiene ‘Dios’ para θεοῦ, conforme al estándar del proyecto.
  - Se conserva un registro bíblico moderno y claro, sin arcaísmos innecesarios.
  - No se añade nota al pie porque el griego recibido y la auditoría inglesa no muestran variante textual o doble lectura que deba señalarse en este versículo.
