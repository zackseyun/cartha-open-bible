translation:
  language: es
  text: Di mi vara—es decir, el sostén de mi tribu—y mi cinturón—es decir, mi fuerza—y mi diadema—es decir, la gloria de mi reino.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ῥάβδον
  english_pob_choice: staff
  chosen_spanish: vara
  alternatives_spanish:
  - bastón
  - cayado
  - estaca
  lexicon: ῥάβδος
  rationale: La imagen de ῥάβδος como símbolo de autoridad o apoyo puede expresarse en español con «vara» de forma breve y natural. «Bastón» sugiere más un apoyo personal; «cayado» es posible, pero más pastoril que la metáfora regia/tribal del contexto.
- source_word: στήριγμα
  english_pob_choice: support
  chosen_spanish: sostén
  alternatives_spanish:
  - apoyo
  - fundamento
  - soporte
  lexicon: στήριγμα
  rationale: El inglés POB resalta la función explicativa del término; «sostén» comunica bien la idea de algo que mantiene firme a la tribu sin sonar excesivamente técnico.
- source_word: ζώνη
  english_pob_choice: belt
  chosen_spanish: cinturón
  alternatives_spanish:
  - faja
  - ceñidor
  lexicon: ζώνη
  rationale: «Cinturón» es el equivalente moderno más claro y readable en español; «faja» o «ceñidor» son posibles, pero menos transparentes para el lector general.
- source_word: δύναμις
  english_pob_choice: strength
  chosen_spanish: fuerza
  alternatives_spanish:
  - poder
  - fortaleza
  - potencia
  lexicon: δύναμις
  rationale: «Fuerza» mantiene la correspondencia directa con el valor de capacidad/potencia del término en este contexto simbólico. «Poder» podría sonar más abstracto o político.
- source_word: διάδημα
  english_pob_choice: diadem
  chosen_spanish: diadema
  alternatives_spanish:
  - corona
  - regalia
  - tiara
  lexicon: διάδημα
  rationale: Se conserva «diadema» por ser el cognado exacto y por mantener la distinción frente a «corona», que en español puede borrar el matiz específico del término.
- source_word: δόξα
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - honor
  - esplendor
  - renombre
  lexicon: δόξα
  rationale: «Gloria» es la equivalencia estándar y más fiel en este registro; aquí la frase explica la dignidad regia del reino, no solo fama humana.
theological_decisions:
- issue: La lectura appositiva explicativa «es decir» para el segundo miembro de cada paralelismo.
  english_pob_reading: The English POB treats the phrases as glosses explaining the symbolic referents of staff, belt, and diadem.
  chosen_spanish_reading: Se mantiene la estructura explicativa con «es decir» para conservar que las segundas expresiones no son nuevos objetos, sino interpretación del símbolo.
  alternative_spanish_readings:
  - «o sea»
  - «esto es»
  - uso de raya sin explicitación
  rationale: El verso funciona como una cadena de símbolos aclarados por glosas. «Es decir» preserva esa relación interpretativa de modo claro y sobrio en español.
  doctrine_reference: N/A (textual-symbolic explanation)
- issue: Método para «tribe» y el marco de autoridad tribal/regia.
  english_pob_reading: support of my tribe
  chosen_spanish_reading: sostén de mi tribu
  alternative_spanish_readings:
  - apoyo de mi tribu
  - fundamento de mi tribu
  rationale: «Tribu» conserva el referente sociopolítico del texto. «Sostén» subraya la función de estabilidad del símbolo, evitando reducirlo a apoyo emocional o meramente militar.
  doctrine_reference: N/A (symbolic/poetic imagery)
translation_notes:
  revision_awareness: This draft follows the latest unchanged revision pass (gpt-5.4, 2026-04-23T14:57:11Z), with no applied revisions and no English footnotes to carry over. The Spanish mirrors the English POB’s optimal-equivalence choices while staying anchored to the Greek sequence of symbolic objects plus their explanatory glosses.
  spanish_consistency_notes:
  - Se mantiene el paralelismo de tres miembros con glosa explicativa en cada caso.
  - Se conserva la distinción léxica entre «vara», «cinturón» y «diadema» para no nivelar imágenes distintas.
  - No se introduce terminología eclesiástica ajena al pasaje; el tono sigue siendo literario y sobrio.
