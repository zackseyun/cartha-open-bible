translation:
  language: es
  text: Porque, aun si un hombre es rey y comete inmoralidad sexual, es despojado de su realeza, al haber sido esclavizado por la inmoralidad sexual, como yo también padecí.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: βασιλεύς
  english_pob_choice: king
  chosen_spanish: rey
  alternatives_spanish:
  - monarca
  lexicon: βασιλεύς
  rationale: «Rey» es el equivalente directo y natural en español para el título soberano del texto; mantiene la referencia real sin añadir matices institucionales innecesarios.
- source_word: πορνεύει / πορνεία
  english_pob_choice: sexual immorality
  chosen_spanish: inmoralidad sexual
  alternatives_spanish:
  - fornicación
  - prostitución
  - inmoralidad
  lexicon: πορνεύω / πορνεία
  rationale: El campo semántico es amplio y no se limita a una sola práctica específica; «inmoralidad sexual» conserva esa amplitud de manera clara para el lector español, igual que la opción inglesa de la POB.
- source_word: γυμνοῦται τῆς βασιλείας
  english_pob_choice: is stripped of his kingship
  chosen_spanish: es despojado de su realeza
  alternatives_spanish:
  - es despojado de su reino
  - pierde su reinado
  lexicon: γυμνόω + βασιλεία
  rationale: «Despojado de su realeza» reproduce la imagen de quedar privado del estatus y dignidad real; evita confundir la pérdida del cargo con la posesión territorial de un reino.
- source_word: δουλωθεὶς
  english_pob_choice: having been enslaved
  chosen_spanish: al haber sido esclavizado
  alternatives_spanish:
  - habiendo sido esclavizado
  - siendo esclavizado
  lexicon: δουλόω
  rationale: Se mantiene el fuerte valor de esclavización que la POB inglesa conservó; «al haber sido esclavizado» expresa bien la relación causal/consecutiva del participio sin volverlo una paráfrasis suave.
- source_word: τῇ πορνείᾳ
  english_pob_choice: to sexual immorality
  chosen_spanish: por la inmoralidad sexual
  alternatives_spanish:
  - a la inmoralidad sexual
  - por el pecado sexual
  lexicon: πορνεία
  rationale: La preposición española «por» comunica adecuadamente la esfera/agente de esclavización; conserva el paralelismo con la frase anterior y evita perder el matiz causal.
- source_word: ἐξ-κἀγὼ ἔπαθον
  english_pob_choice: as I also suffered
  chosen_spanish: como yo también padecí
  alternatives_spanish:
  - como yo también sufrí
  - como también me ocurrió a mí
  lexicon: πάσχω
  rationale: «Padecí» conserva el valor de sufrir/experimentar algo doloroso con un tono más sobrio y literario que «sufrí», coherente con el registro del pasaje.
theological_decisions:
- issue: Relación entre poder real y pecado sexual
  english_pob_reading: even a king can be stripped of kingship through sexual immorality
  chosen_spanish_reading: aun un rey puede ser despojado de su realeza por la inmoralidad sexual
  alternative_spanish_readings:
  - un rey pierde su reino por la inmoralidad sexual
  - un rey queda privado de su dignidad real por la inmoralidad sexual
  rationale: La formulación preserva la fuerza moral del enunciado sin convertir «realeza» en una mera referencia política; mantiene la advertencia de que la conducta sexual desordenada destruye el estatus real.
  doctrine_reference: Ética bíblica sobre santidad sexual y responsabilidad moral del gobernante
- issue: Esclavitud metafórica al pecado sexual
  english_pob_reading: having been enslaved to sexual immorality
  chosen_spanish_reading: al haber sido esclavizado por la inmoralidad sexual
  alternative_spanish_readings:
  - habiendo quedado esclavizado a la inmoralidad sexual
  - al ser sometido por la inmoralidad sexual
  rationale: Se conserva la metáfora fuerte de esclavitud, que en la POB inglesa no se suaviza. En español, «esclavizado» comunica dependencia y dominio moral sin perder el impacto retórico.
  doctrine_reference: Lenguaje bíblico de esclavitud al pecado
- issue: Cierre testimonial personal
  english_pob_reading: as I also suffered
  chosen_spanish_reading: como yo también padecí
  alternative_spanish_readings:
  - como yo también sufrí
  - como también me sucedió a mí
  rationale: El texto concluye con un testimonio personal; «padecí» mantiene el peso experiencial y testimonial sin agregar detalles no presentes en la fuente.
  doctrine_reference: Uso retórico del testimonio personal en la literatura bíblica
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; esta versión sigue de cerca el inglés POB auditado y el griego subyacente, sin introducir variaciones textuales no apoyadas por la fuente.
  spanish_consistency_notes:
  - Se mantiene «inmoralidad sexual» de forma consistente para πορνεία/πορνεύω en este versículo.
  - Se usa «esclavizado» para reflejar el lenguaje fuerte de δουλωθείς, en continuidad con la preferencia POB por el valor léxico intenso.
  - Se conserva un registro sobrio y directo, adecuado para una edición pública y auditable.
