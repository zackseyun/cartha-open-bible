base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/015/001.yaml
  text: The one who commits sexual immorality, while being ruined, does not perceive it; and while being dishonored, he is not ashamed.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:11Z'
    unchanged: false
    changes_summary: Replaced 'The man who' with 'The one who' for a more direct and inclusive rendering of the participle, while preserving the meaning. Kept the rest essentially unchanged as accurate and natural.
translation:
  language: es
  text: El que comete inmoralidad sexual, mientras se arruina, no lo percibe; y mientras es deshonrado, no se avergüenza.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ὁ πορνεύων
  english_pob_choice: The one who commits sexual immorality
  chosen_spanish: El que comete inmoralidad sexual
  alternatives_spanish:
  - El que practica fornicación
  - El que se entrega a la inmoralidad sexual
  lexicon: πορνεύω
  rationale: Se conserva el valor verbal durativo de la forma participial con una construcción natural en español. 'Inmoralidad sexual' expresa el alcance amplio del término sin restringirlo indebidamente a un solo acto.
- source_word: ζημιούμενος
  english_pob_choice: while being ruined
  chosen_spanish: mientras se arruina
  alternatives_spanish:
  - mientras es arruinado
  - aunque está siendo perjudicado
  lexicon: ζημιόω
  rationale: El participio pasivo/medio transmite proceso de pérdida o ruina; 'se arruina' mantiene la imagen de deterioro en curso con fluidez idiomática en español.
- source_word: οὐκ αἰσθάνεται
  english_pob_choice: does not perceive it
  chosen_spanish: no lo percibe
  alternatives_spanish:
  - no lo advierte
  - no se da cuenta
  lexicon: αἰσθάνομαι
  rationale: '''Percibir'' conserva la idea de captar o notar algo, evitando añadir una explicación más interpretativa que el griego no exige.'
- source_word: ἀδοξῶν
  english_pob_choice: being dishonored
  chosen_spanish: es deshonrado
  alternatives_spanish:
  - queda deshonrado
  - está en deshonra
  lexicon: ἀδοξέω
  rationale: La forma pasiva pide una expresión directa que preserve la pérdida de honor o gloria; 'deshonrado' es natural y fiel.
- source_word: οὐκ αἰσχύνεται
  english_pob_choice: he is not ashamed
  chosen_spanish: no se avergüenza
  alternatives_spanish:
  - no siente vergüenza
  - no tiene vergüenza
  lexicon: αἰσχύνομαι
  rationale: '''Avergonzarse'' reproduce bien la reacción moral/emocional del verbo y mantiene el paralelo con la falta de percepción del daño.'
theological_decisions:
- issue: Referencia moral del vicio sexual
  english_pob_reading: sexual immorality
  chosen_spanish_reading: inmoralidad sexual
  alternative_spanish_readings:
  - fornicación
  - impureza sexual
  rationale: Se eligió una formulación amplia para no estrechar el alcance del griego a una sola categoría tradicional. La redacción mantiene el juicio moral del texto sin introducir terminología eclesiástica más específica de lo que el término pide.
  doctrine_reference: Ética sexual bíblica; lenguaje moral del NT/apócrifos.
- issue: Paralelismo de ruina y deshonra
  english_pob_reading: while being ruined ... while being dishonored
  chosen_spanish_reading: mientras se arruina ... mientras es deshonrado
  alternative_spanish_readings:
  - aunque se destruye ... aunque es avergonzado
  - al mismo tiempo que se pierde ... al mismo tiempo que es deshonrado
  rationale: 'Se preserva el paralelismo aspectual del griego: el sujeto no repara en su ruina presente ni en su deshonra presente. Esto sostiene la advertencia moral del dicho sin suavizarla.'
  doctrine_reference: Sabiduría moral; advertencia contra el autoengaño.
translation_notes:
  revision_awareness: Seguimos la revisión inglesa más reciente que cambió 'The man who' por 'The one who' para reflejar el participio griego de modo más directo e inclusivo. En español se replicó con 'El que' para mantener esa neutralidad formal sin perder naturalidad.
  spanish_consistency_notes:
  - Se evita 'Cristo'/'Mesías' porque no aparecen en el versículo.
  - Se mantiene 'inmoralidad sexual' para conservar el alcance semántico amplio de πορνεία/πορνεύω en este contexto.
  - La estructura repetida 'mientras ... mientras ...' busca reflejar la simetría del original griego.
