base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/015/004.yaml
  text: And indeed, having repented concerning these things, I ate neither wine nor meat until my old age, and I saw no joy at all.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:12Z'
    unchanged: false
    changes_summary: Replaced 'although I changed my mind' with 'indeed, having repented' to reflect μετανοήσας more accurately and Καίγε more naturally; retained the rest with minor smoothing.
translation:
  language: es
  text: Y de hecho, habiéndome arrepentido de estas cosas, no bebí vino ni comí carne hasta mi vejez, y no vi alegría alguna.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: μετανοήσας
  english_pob_choice: having repented
  chosen_spanish: habiéndome arrepentido
  alternatives_spanish:
  - habiendo cambiado de mente
  - habiéndome vuelto atrás
  lexicon: μετανοέω
  rationale: El participio aoristo expresa un arrepentimiento real y anterior a las acciones descritas; en español, «habiéndome arrepentido» conserva el valor de giro interior/moral que la revisión inglesa recuperó frente a una mera reconsideración mental.
- source_word: Καίγε
  english_pob_choice: And indeed
  chosen_spanish: Y de hecho
  alternatives_spanish:
  - Y ciertamente
  - E incluso
  lexicon: καίγε
  rationale: La partícula intensificadora se rinde de forma natural como confirmación enfática; «Y de hecho» mantiene el matiz de insistencia sin exagerar ni suavizar el tono.
- source_word: οἶνον ... καὶ θεὶς κρέα οὐκ ἔφαγον
  english_pob_choice: I ate neither wine nor meat
  chosen_spanish: no bebí vino ni comí carne
  alternatives_spanish:
  - no tomé vino ni comí carne
  - no bebí vino ni carne
  lexicon: οἶνος / κρέας / ἔφαγον
  rationale: En español, el vino se bebe, no se come; por eso se explicita el verbo adecuado mientras se mantiene la negación paralela del original. «Carne» conserva el término básico para κρέας.
- source_word: ἕως γήρους μου
  english_pob_choice: until my old age
  chosen_spanish: hasta mi vejez
  alternatives_spanish:
  - hasta mi ancianidad
  - hasta mi edad avanzada
  lexicon: γῆρας
  rationale: «Vejez» es la equivalencia natural y digna en español para γῆρας y conserva el sentido temporal del tramo final de la vida.
- source_word: πᾶσαν ... εὐφροσύνην οὐκ εἶδον
  english_pob_choice: I saw no joy at all
  chosen_spanish: no vi alegría alguna
  alternatives_spanish:
  - no vi ninguna alegría
  - no experimenté alegría alguna
  lexicon: εὐφροσύνη
  rationale: El griego niega toda alegría con una fórmula enfática; «alguna» reproduce bien la negación absoluta y «alegría» es la opción más directa y transparente en español.
theological_decisions:
- issue: How to render μετανοέω in a penitential context
  english_pob_reading: having repented
  chosen_spanish_reading: habiéndome arrepentido
  alternative_spanish_readings:
  - habiendo cambiado de mente
  - habiéndome reconvenido
  rationale: Aquí el contexto es moral/penitencial, no meramente cognitivo. Por eso se conserva el valor de arrepentimiento en vez de una traducción que reduzca el verbo a un cambio intelectual.
  doctrine_reference: arrepentimiento / metanoia
- issue: Rendering of self-denial involving wine and meat
  english_pob_reading: I ate neither wine nor meat
  chosen_spanish_reading: no bebí vino ni comí carne
  alternative_spanish_readings:
  - no tomé vino ni carne
  - no bebí vino ni comí carne
  rationale: La frase expresa abstinencia ascética. En español, la aclaración verbal «bebí» para vino evita una lectura literal incorrecta sin alterar la disciplina descrita.
  doctrine_reference: ascetismo / abstinencia
- issue: Intensity of the closing negation
  english_pob_reading: I saw no joy at all
  chosen_spanish_reading: no vi alegría alguna
  alternative_spanish_readings:
  - no vi ninguna alegría
  - no vi alegría en absoluto
  rationale: La negación total se preserva con una construcción idiomática clara y solemne, adecuada a un testimonio autobiográfico.
  doctrine_reference: énfasis retórico
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente, que corrigió una lectura de simple cambio de opinión a una de arrepentimiento explícito para μετανοήσας. No se añadió aparato de notas porque la solución española puede reflejar el texto con claridad sin introducir ambigüedades innecesarias.
  spanish_consistency_notes:
  - Se usa un registro bíblico sobrio y moderno, sin arcaísmos innecesarios.
  - Se conserva la primera persona singular coherente con el relato autobiográfico.
  - No se introduce 'Cristo', 'Señor' u otra terminología no presente en el versículo.
  - La negación se mantiene absoluta en español para reflejar πᾶσαν ... οὐκ εἶδον.
