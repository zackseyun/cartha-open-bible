source:
  edition: Charles 1908 Greek Versions (pages 134-175, Judah pilot full)
  text: Καίγε *μετανοήσας ἐπὶ τούτοις¹⁴, οἶνον¹⁵ καὶ θεὶς κρέα¹⁶ οὐκ¹⁷ ἔφαγον¹⁸ ἕως γήρους¹⁹ μου²⁰, καὶ *πᾶσαν (ἐγυμνώ- εὐφροσύνην²¹ οὐκ εἶδον.
