  text: '1[a]. And on the next day it was reported to us that the king of the city of Gaas was coming against us with a great multitude.


    2. So Dan and I, pretending to be Amorites, as though allies, entered their city.


    3. And in the deep night, when our brothers came, we opened the gates to them, and we destroyed all of them and all that was theirs; and after plundering everything that belonged to them[b], we tore down their three walls.


    4. And we drew near to Thamna, where all their baggage was.


    5. Then, being insulted by them, I became angry, and I rushed against them up to the summit. And they kept hurling stones and shooting arrows at me.


    6. And if Dan my brother had not fought alongside me,'
  footnotes:
  - marker: a
    text: The Greek witness supplied for this chapter begins here in mid-narrative and breaks off in the middle of verse 6. The translation therefore preserves the chapter as extant in the provided text rather than reconstructing missing material.
    reason: textual_variant
  - marker: b
    text: 'Some witness details in the source apparatus vary between ''Gad and I'' and ''Dan and I'' in the infiltration scene. This draft follows the reading reflected in the main Greek line used here: ''Dan and I.'''
    reason: alternative_reading
