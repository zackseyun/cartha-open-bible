translation:
  language: es
  text: '1[a]. Y al día siguiente nos fue informado que el rey de la ciudad de Gaas venía contra nosotros con una gran multitud.


    2. Así que Dan y yo, fingiendo ser amorreos, como aliados, entramos en su ciudad.


    3. Y en la profunda noche, cuando llegaron nuestros hermanos, les abrimos las puertas, y destruimos a todos ellos y todo lo que era de ellos; y después de saquear todo lo que les pertenecía[b], derribamos sus tres murallas.


    4. Y nos acercamos a Tamna, donde estaba todo su bagaje.


    5. Entonces, siendo insultado por ellos, me enojé, y arremetí contra ellos hasta la cumbre. Y seguían lanzándome piedras y disparándome flechas.


    6. Y si Dan, mi hermano, no hubiera peleado junto conmigo,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El testimonio griego usado para este capítulo comienza aquí en medio de la narración y se interrumpe en el versículo 6. La traducción conserva, por tanto, el capítulo tal como está atestiguado en el texto provisto, sin reconstruir el material faltante.
    reason: textual_variant
  - marker: b
    text: 'Algunos detalles del aparato de la fuente varían entre «Gad y yo» y «Dan y yo» en la escena de infiltración. Este borrador sigue la lectura reflejada en la línea griega principal usada aquí: «Dan y yo».'
    reason: alternative_reading
lexical_decisions:
- source_word: Καὶ τῇ ἑξῆς ἐρρέθη πρὸς ἡμᾶς
  english_pob_choice: And on the next day it was reported to us
  chosen_spanish: Y al día siguiente nos fue informado
  alternatives_spanish:
  - Y al día siguiente se nos dijo
  - Y al día siguiente nos fue comunicado
  lexicon: LSJ
  rationale: La pasiva impersonal conserva el carácter de noticia recibida. 'Nos fue informado' mantiene el tono narrativo formal sin volverlo redundante en español.
- source_word: Γαὰς πόλεως
  english_pob_choice: the city of Gaas
  chosen_spanish: la ciudad de Gaas
  alternatives_spanish:
  - la ciudad llamada Gaas
  - Gaas, ciudad
  lexicon: LSJ
  rationale: Se conserva el topónimo sin adaptación innecesaria y se explicita 'ciudad' como en el griego.
- source_word: ἐν λαῷ πολλῷ
  english_pob_choice: with a great multitude
  chosen_spanish: con una gran multitud
  alternatives_spanish:
  - con mucha gente
  - con un gran ejército
  lexicon: LSJ
  rationale: '''Multitud'' reproduce el alcance cuantitativo y el matiz de masa numerosa del original.'
- source_word: προσποιησάμενοι
  english_pob_choice: pretending to be
  chosen_spanish: fingiendo ser
  alternatives_spanish:
  - pretendiendo ser
  - simulando ser
  lexicon: LSJ
  rationale: '''Fingiendo ser'' expresa de modo natural la acción deliberada de adoptar una identidad falsa para la estratagema militar.'
- source_word: σύμμαχοι
  english_pob_choice: allies
  chosen_spanish: aliados
  alternatives_spanish:
  - confederados
  - aliados en guerra
  lexicon: LSJ
  rationale: Se mantiene la relación estratégica de alianza militar/política sin cargar la frase con tecnicismos innecesarios.
- source_word: Νυκτὸς δὲ βαθείας
  english_pob_choice: in the deep night
  chosen_spanish: en la profunda noche
  alternatives_spanish:
  - en la noche profunda
  - en lo hondo de la noche
  lexicon: LSJ
  rationale: '''Profunda'' conserva la cualidad enfática y literaria de la expresión griega, con sintaxis natural en español.'
- source_word: ἐξωλοθρεύσαμεν
  english_pob_choice: we destroyed
  chosen_spanish: destruimos
  alternatives_spanish:
  - aniquilamos
  - exterminamos
  lexicon: LSJ
  rationale: '''Destruimos'' transmite la acción totalizante del verbo sin introducir un registro más fuerte de lo que exige el contexto textual.'
- source_word: ἐπρονομεύσαμεν
  english_pob_choice: after plundering
  chosen_spanish: después de saquear
  alternatives_spanish:
  - tras despojar
  - después de tomar botín
  lexicon: LSJ
  rationale: '''Saquear'' expresa claramente la toma de botín en un contexto militar y concuerda con el paralelismo narrativo del pasaje.'
- source_word: ἀποσκευή
  english_pob_choice: baggage
  chosen_spanish: bagaje
  alternatives_spanish:
  - equipaje
  - pertrechos
  lexicon: LSJ
  rationale: '''Bagaje'' es el equivalente militar más natural en español para la carga y enseres de un ejército.'
- source_word: ὑβριζόμενος
  english_pob_choice: being insulted
  chosen_spanish: siendo insultado
  alternatives_spanish:
  - siendo ultrajado
  - siendo maltratado
  lexicon: LSJ
  rationale: '''Siendo insultado'' conserva la provocación verbal o injuriosa que desencadena la ira, sin ampliar el matiz hacia abuso físico no explícito aquí.'
- source_word: ὠργίσθην
  english_pob_choice: I became angry
  chosen_spanish: me enojé
  alternatives_spanish:
  - me airé
  - me enfurecí
  lexicon: LSJ
  rationale: '''Me enojé'' refleja de forma directa la confesión de ira; es menos coloquial que otras opciones y suficientemente transparente.'
- source_word: ὥρμησα
  english_pob_choice: I rushed against them up to the summit
  chosen_spanish: arremetí contra ellos hasta la cumbre
  alternatives_spanish:
  - cargué contra ellos hasta la cumbre
  - me lancé contra ellos hasta la cumbre
  lexicon: LSJ
  rationale: '''Arremetí'' preserva el impulso agresivo del verbo y sugiere ataque repentino; ''hasta la cumbre'' sigue de cerca la referencia topográfica.'
- source_word: τοξεύοντες
  english_pob_choice: shooting arrows
  chosen_spanish: disparándome flechas
  alternatives_spanish:
  - lanzándome flechas
  - tirando flechas
  lexicon: LSJ
  rationale: El participio en contexto expresa una acción reiterada dirigida contra el narrador; en español 'disparar flechas' es idiomático y claro.
- source_word: συνεμάχησεν
  english_pob_choice: fought alongside
  chosen_spanish: peleado junto conmigo
  alternatives_spanish:
  - combatido a mi lado
  - luchado junto a mí
  lexicon: LSJ
  rationale: '''Junto conmigo'' refleja la cooperación bélica del verbo compuesto y conserva la relación fraterna subrayada en el texto.'
theological_decisions:
- issue: Capítulo fragmentario que se corta en medio del versículo 6
  english_pob_reading: Translate only the extant Greek provided through the broken clause of verse 6, ending with a comma-like suspension.
  chosen_spanish_reading: Traducir solo el griego conservado hasta la cláusula rota del versículo 6, terminando en suspensión.
  alternative_spanish_readings:
  - Reconstruir el final con otras ediciones
  - Suavizar la frase para cerrarla como pensamiento completo
  rationale: Se preserva la discontinuidad textual del testimonio griego suministrado y no se añade contenido no atestiguado. La traducción termina en suspensión para hacer visible que el texto se interrumpe.
  doctrine_reference: Primacía de la fuente original y manejo transparente de variantes textuales
- issue: Identidad engañosa en la infiltración militar
  english_pob_reading: pretending to be Amorites, as though allies
  chosen_spanish_reading: fingiendo ser amorreos, como aliados
  alternative_spanish_readings:
  - simulando ser amorreos, como aliados
  - pretendiendo ser amorreos, como aliados
  rationale: '''Fingiendo'' conserva el carácter deliberado del engaño sin suavizarlo. ''Como aliados'' mantiene la comparación explicativa del griego y del inglés auditado.'
  doctrine_reference: Lectura semántica y sintáctica del participio y del comparativo
- issue: Última cláusula incompleta del versículo 6
  english_pob_reading: And if Dan my brother had not fought alongside me,
  chosen_spanish_reading: Y si Dan, mi hermano, no hubiera peleado junto conmigo,
  alternative_spanish_readings:
  - Y si Dan, mi hermano, no hubiera combatido a mi lado,
  - Y si Dan, mi hermano, no me hubiera ayudado en la batalla,
  rationale: La cláusula queda sin resolver en el testimonio disponible; por eso la versión española conserva la apertura condicional y la coma final, sin completar el pensamiento.
  doctrine_reference: Fidelidad al estado fragmentario del manuscrito
translation_notes:
  revision_awareness: 'Se incorporó la revisión más reciente del inglés auditado: la fórmula del versículo 2 se entendió con una pausa explicativa equivalente a «como aliados», y en el versículo 5 se prefirió una estructura de movimiento más natural. La traducción española sigue esas decisiones sin depender mecánicamente del inglés, manteniendo el griego como base auditable.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera; este pasaje no contiene el nombre divino.
  - Se mantiene 'Dan' como forma propia del nombre, conforme al testimonio textual.
  - 'Se eligieron vocablos de registro bíblico moderno y neutral: ''fingiendo'', ''saquear'', ''bagaje'', ''arremetí''.'
  - La suspensión final en el versículo 6 es intencional para reflejar la interrupción del texto fuente.
  - No se introduce puntuación o contenido que cierre artificialmente la cláusula final.
