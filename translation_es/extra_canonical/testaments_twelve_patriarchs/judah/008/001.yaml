base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/008/001.yaml
  text: And while I was there, Barshaba, the king of Adullam, entertained us and made a drinking feast for us; and when he urged me, he gave me his daughter, whose name was Shua, as a wife.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:56:29Z'
    unchanged: false
    changes_summary: Adjusted word order to reflect the Greek apposition ('Barshaba, the king of Adullam'), replaced 'dealt hospitably with us' with the more natural 'entertained us,' and added 'for us' to represent ἡμῖν explicitly.
translation:
  language: es
  text: Y mientras yo estaba allí, Barshaba, rey de Adulam, nos hospedó y nos hizo un banquete para beber; y cuando me pidió, me dio a su hija, cuyo nombre era Súa, por esposa.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐποίησεν ἡμῖν πότον
  english_pob_choice: made a drinking feast for us
  chosen_spanish: nos hizo un banquete para beber
  alternatives_spanish:
  - nos preparó un banquete de bebida
  - nos dio un banquete con vino
  lexicon: πότος
  rationale: El griego indica un banquete o festín ligado a la bebida; 'banquete para beber' conserva ese sentido sin volverlo más solemne de lo que exige el texto. Mantiene el valor concreto de un convite, no solo de hospitalidad general.
- source_word: παρακαλέσας
  english_pob_choice: when he urged me
  chosen_spanish: cuando me pidió
  alternatives_spanish:
  - cuando me instó
  - cuando me rogó
  lexicon: παρακαλέω
  rationale: Aquí el verbo tiene fuerza de solicitud o insistencia suave, no necesariamente de exhortación moral. 'Me pidió' es natural en español y refleja la petición que culmina en el otorgamiento de la hija.
- source_word: θυγατέρα αὐτοῦ
  english_pob_choice: his daughter
  chosen_spanish: a su hija
  alternatives_spanish:
  - a su hija
  - a su hija propia
  lexicon: θυγάτηρ
  rationale: Se mantiene el sentido directo de parentesco sin añadir énfasis innecesario.
- source_word: ὀνόματι Σαβά
  english_pob_choice: whose name was Shua
  chosen_spanish: cuyo nombre era Súa
  alternatives_spanish:
  - llamada Súa
  - de nombre Súa
  lexicon: ὄνομα
  rationale: El nombre propio se adapta a la forma castellana más natural según el precedente del texto inglés 'Shua', manteniendo la identificación nominal sin expandirla.
- source_word: βασιλέα Ὀδολάμ
  english_pob_choice: the king of Adullam
  chosen_spanish: rey de Adulam
  alternatives_spanish:
  - el rey de Adulam
  - rey de Adulam
  lexicon: βασιλεύς
  rationale: 'Se conserva la apposición griega: Barshaba, rey de Adulam. ''Rey de Adulam'' es fiel y claro en español.'
- source_word: εἶχόν με ἀνελεῖν
  english_pob_choice: entertained us
  chosen_spanish: nos hospedó
  alternatives_spanish:
  - nos entretuvo
  - nos acogió
  lexicon: ἀνέχομαι / hospitality context from audit trail
  rationale: El contexto del audit trail inglés opta por una hospitalidad concreta; 'nos hospedó' expresa de modo digno y natural la recepción hospitalaria en español, sin perder la acción hacia 'nosotros'.
theological_decisions:
- issue: Hospitalidad y banquete como acto social, no doctrina explícita
  english_pob_reading: entertained us and made a drinking feast for us
  chosen_spanish_reading: nos hospedó y nos hizo un banquete para beber
  alternative_spanish_readings:
  - nos acogió y nos preparó un banquete
  - nos recibió hospitalariamente y nos dio un festín
  rationale: No hay carga doctrinal directa; la frase debe sonar narrativamente precisa y no homilética. Se conserva el matiz social del encuentro sin intensificarlo en un sentido eclesial o moral ajeno al texto.
  doctrine_reference: No aplica; pasaje narrativo extra-canónico.
- issue: Ruego/petición vs. exhortación
  english_pob_reading: when he urged me
  chosen_spanish_reading: cuando me pidió
  alternative_spanish_readings:
  - cuando me instó
  - cuando me suplicó
  rationale: El griego admite varias intensidades. El contexto culmina en la entrega de la hija; por eso se prefiere una solicitud que deja abierto el matiz de insistencia sin exagerarlo.
  doctrine_reference: No aplica; decisión pragmática y narrativa.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail inglés, que reordenó la apposición ('Barshaba, the king of Adullam') y sustituyó una fórmula de hospitalidad más abstracta por 'entertained us', además de explicitar 'for us'. La versión española refleja esa estructura y la referencia explícita al grupo receptor sin depender mecánicamente del inglés base.
  spanish_consistency_notes:
  - Se mantiene 'Adulam' como topónimo consistente con el inglés audit trail.
  - Se usa 'Súa' para el nombre propio siguiendo la forma española más natural derivada de 'Shua'.
  - Se preserva la apposición 'Barshaba, rey de Adulam' para respetar el orden y la relación nominal del griego.
  - No se introducen términos teológicos ajenos al pasaje; el estilo es narrativo y sobrio.
