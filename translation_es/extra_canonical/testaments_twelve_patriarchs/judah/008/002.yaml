translation:
  language: es
  text: Ella me dio a luz a Er, a Onán y a Sela. Y el Señor mató a los dos primeros, porque Er era malvado; y Onán, cuando se había casado con Tamar, derramó la semilla en tierra, conforme al mandamiento de su madre, y él también murió por su maldad.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἔτεκέν μοι
  english_pob_choice: She bore me
  chosen_spanish: Ella me dio a luz
  alternatives_spanish:
  - Ella me parió
  - Me dio a luz
  lexicon: τίκτω
  rationale: La forma española natural y digna para el parto/maternidad es «dio a luz»; mantiene el sentido directo sin endurecer el registro. Se evita una paráfrasis más amplia que diluya la relación materna explícita del griego.
- source_word: τὸν Ἦρ / τὸν ᾿Αυνὰν / τὸν Σηλώμ
  english_pob_choice: Er and Onan and Shelah
  chosen_spanish: Er, Onán y Sela
  alternatives_spanish:
  - Eír, Onán y Selom
  - Er, Onán y Selom
  lexicon: nombres propios
  rationale: Se conserva la forma española establecida de los nombres bíblicos cuando existe uso reconocido. «Sela» refleja mejor la transliteración habitual en español que una forma más cercana al griego o al hebreo técnico.
- source_word: Καὶ τοὺς μὲν δύο ἀνεῖλεν Κύριος
  english_pob_choice: And the Lord killed the first two
  chosen_spanish: Y el Señor mató a los dos primeros
  alternatives_spanish:
  - Y Yahvé mató a los dos primeros
  - Y el Señor eliminó a los dos primeros
  lexicon: ἀναιρέω / Κύριος
  rationale: El griego usa Κύριος, y la POB inglesa lo traduce «the Lord». En español, por fidelidad al contexto griego inmediato y a la legibilidad, se mantiene «el Señor» en esta cláusula. «Mató» conserva el acto causal fuerte de ἀνεῖλεν mejor que un eufemismo.
- source_word: ὁ γὰρ ἦν πονηρός
  english_pob_choice: for Er was wicked
  chosen_spanish: porque Er era malvado
  alternatives_spanish:
  - porque Er era perverso
  - pues Er era impío
  lexicon: πονηρός
  rationale: «Malvado» comunica adecuadamente la valoración moral de πονηρός con naturalidad en español. «Impío» podría sonar más religioso y menos directo; «perverso» es posible, pero más marcado.
- source_word: ἐρρύεν / ἐξέχεεν τὸ σπέρμα ἐπὶ τὴν γῆν
  english_pob_choice: spilled the seed upon the ground
  chosen_spanish: derramó la semilla en tierra
  alternatives_spanish:
  - derramó su simiente en tierra
  - vertió la semilla sobre la tierra
  lexicon: σπέρμα
  rationale: Se preserva el lenguaje corporal y reproductivo de la tradición textual con «semilla», equivalente al inglés POB «seed». «En tierra» reproduce la preposición y el destino del acto sin recargar el estilo.
- source_word: κατὰ τὸ πρόσταγμα τῆς μητρός αὐτοῦ
  english_pob_choice: according to the commandment of his mother
  chosen_spanish: conforme al mandamiento de su madre
  alternatives_spanish:
  - según el mandato de su madre
  - de acuerdo con la orden de su madre
  lexicon: πρόσταγμα
  rationale: «Mandamiento» mantiene la fuerza normativa que la POB inglesa eligió para πρόσταγμα, evitando rebajarlo a mera sugerencia. En español suena algo más formal, pero conserva el valor imperativo del texto.
- source_word: καὶ αὐτὸς ἀπέθανεν ἐν πονηρίᾳ
  english_pob_choice: and he also died through wickedness
  chosen_spanish: y él también murió por su maldad
  alternatives_spanish:
  - y él también murió a causa de su maldad
  - y él también murió en su maldad
  lexicon: ἐν πονηρίᾳ
  rationale: «Por su maldad» expresa de modo natural la causalidad moral de ἐν πονηρίᾳ. Se evita una formulación demasiado abstracta o teológica que no esté exigida por el texto.
theological_decisions:
- issue: Referencia al Señor en una narración que puede aludir al nombre divino frente a Κύριος
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  - el Señor Yahvé
  rationale: Como el testimonio griego citado usa Κύριος y el contexto inmediato no fuerza una aclaración explícita del nombre divino, se mantiene «el Señor» en la narrativa. Esto preserva la lectura auditada de la POB inglesa sin imponer una reconstrucción que el pasaje griego aquí no desarrolla directamente.
  doctrine_reference: Nombre divino / uso de Κύριος
- issue: Muerte como juicio moral en dos hermanos
  english_pob_reading: killed the first two ... because Er was wicked ... he also died through wickedness
  chosen_spanish_reading: mató a los dos primeros ... porque Er era malvado ... él también murió por su maldad
  alternative_spanish_readings:
  - quitó la vida a los dos primeros ...
  - murió a causa de su maldad
  rationale: La secuencia griega y la lectura inglesa atribuyen la muerte a una acción judicial divina y a una causalidad moral. «Mató» y «por su maldad» mantienen esa tensión sin suavizarla ni convertirla en mera consecuencia natural.
  doctrine_reference: Juicio divino / retribución moral
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; esta propuesta mantiene el contenido del audit trail inglés, ajustándolo al español con equivalencia óptima y sin introducir notas textuales adicionales.
  spanish_consistency_notes:
  - Se mantiene «el Señor» para Κύριος en esta sección, coherente con el audit trail inglés y sin desplazar la terminología a «Yahvé» donde el testigo griego citado no lo explicita.
  - Se conserva «semilla» para σπέρμα por continuidad semántica con la tradición POB y para no desdibujar el lenguaje reproductivo del pasaje.
  - Los nombres propios siguen formas españolas corrientes y bíblicamente reconocibles para facilitar lectura pública.
