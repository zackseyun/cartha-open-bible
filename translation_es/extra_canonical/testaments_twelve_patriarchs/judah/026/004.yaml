lexical_decisions:
- source_word: Φυλάξατε
  english_pob_choice: keep
  chosen_spanish: guardad
  alternatives_spanish:
  - mantened
  - observad
  - cumplid
  lexicon: φυλάσσω
  rationale: El imperativo pide conservar fielmente o observar; en español, «guardad» transmite bien la idea de vigilar y mantener obediencia, sin endurecerlo como un tecnicismo legalista.
- source_word: νόμον
  english_pob_choice: law
  chosen_spanish: ley
  alternatives_spanish:
  - ley
  - mandamiento
  - instrucción
  lexicon: νόμος
  rationale: La revisión inglesa fijó «law» frente a «commandments»; «ley» mantiene la correspondencia más directa y conserva el sentido amplio de norma u ordenanza.
- source_word: Κυρίου
  english_pob_choice: the Lord
  chosen_spanish: del Señor
  alternatives_spanish:
  - de Yahvé
  - del Señor
  lexicon: κύριος
  rationale: Aunque el proyecto prefiere «Yahvé» para el nombre divino, aquí el griego dice κύριος. Dado el contexto de cita y la formulación heredada en la tradición del texto, «Señor» preserva el eco directo del original griego sin introducir una decisión no atestiguada en el fragmento.
- source_word: ἐλπὶς
  english_pob_choice: hope
  chosen_spanish: esperanza
  alternatives_spanish:
  - esperanza
  - confianza
  lexicon: ἐλπίς
  rationale: «Esperanza» es la equivalencia natural y fiel para ἐλπίς; mantiene el matiz de expectativa confiada sin desplazarlo a una interpretación más doctrinal o subjetiva.
theological_decisions:
- issue: Alcance de la exhortación moral
  english_pob_reading: keep all the law of the Lord
  chosen_spanish_reading: guardad toda la ley del Señor
  alternative_spanish_readings:
  - cumplid todos los mandamientos del Señor
  - observad toda la ley del Señor
  rationale: La revisión inglesa corrigió el contenido hacia una exhortación general a la ley, no a mandamientos específicos. «Guardad toda la ley» conserva la amplitud del texto y evita fragmentar el mandato.
  doctrine_reference: Obediencia pactual / instrucción divina
- issue: Función de la esperanza
  english_pob_reading: because it is hope for all who are...
  chosen_spanish_reading: porque es esperanza para todos los que...
  alternative_spanish_readings:
  - porque es esperanza para todos los que
  - porque da esperanza a todos los que...
  rationale: El fragmento griego está truncado; en español conviene mantener la cláusula incompleta con puntos suspensivos para no inventar el final. «Es esperanza para» refleja la construcción nominal del inglés revisado y del griego conservado.
  doctrine_reference: Esperanza como resultado de la ley divina
translation_notes:
  revision_awareness: 'La versión inglesa revisada reemplazó una lectura condicional y material añadido no atestiguado por el fragmento griego disponible. La presente traducción sigue esa revisión: usa imperativo («guardad»), «ley» en lugar de «mandamientos», y conserva la frase final incompleta con puntos suspensivos para respetar el estado fragmentario del texto fuente.'
  spanish_consistency_notes:
  - Se mantuvo «Señor» para κύριος, ya que el fragmento griego cita la fórmula divina sin ofrecer aquí un alineamiento explícito con el uso de Yahvé en el texto español principal.
  - Se usó «ley» de forma uniforme para νόμος en consonancia con la revisión inglesa y para evitar la oscilación con «mandamientos».
  - Se preservó la incompletitud del fragmento con puntos suspensivos, sin completar ni suavizar el final.
