translation:
  language: es
  text: Por tanto, guardad, hijos míos, toda la ley de Yahvé, porque es esperanza para todos los que guardan sus caminos en justicia.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Φυλάξατε
  english_pob_choice: keep
  chosen_spanish: guardad
  alternatives_spanish:
  - conservad
  - obedeced
  lexicon: φυλάσσω
  rationale: El verbo griego expresa guardar, observar o custodiar; en este mandato exhortativo, "guardad" comunica bien la idea de observar fielmente la ley sin sonar rígidamente literal como "conservad" ni desplazar el matiz normativo con "obedeced".
- source_word: τέκνα μου
  english_pob_choice: my children
  chosen_spanish: hijos míos
  alternatives_spanish:
  - mis hijos
  - hijos
  lexicon: τέκνα
  rationale: '"Hijos míos" conserva la relación afectiva y exhortativa del original y suena natural en español bíblico contemporáneo.'
- source_word: πάντα τὸν νόμον
  english_pob_choice: the whole law
  chosen_spanish: toda la ley
  alternatives_spanish:
  - la ley entera
  - todo el mandamiento
  lexicon: πᾶς + νόμος
  rationale: El griego enfatiza totalidad; "toda la ley" reproduce esa fuerza con la fórmula más natural en español.
- source_word: Κυρίου
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  lexicon: κύριος
  rationale: Aunque el texto griego dice κύριος, aquí remite al nombre divino del pacto. Conforme al criterio del proyecto, se rinde como "Yahvé" en el texto principal para no ocultar el nombre divino.
- source_word: ἐστὶν πᾶσιν ἐλπίς
  english_pob_choice: it is hope for all
  chosen_spanish: es esperanza para todos
  alternatives_spanish:
  - da esperanza a todos
  - es la esperanza de todos
  lexicon: ἐλπίς
  rationale: La construcción griega presenta la ley como fuente o ámbito de esperanza; "es esperanza para todos" mantiene la afirmación directa sin agregar explicaciones no explicitadas por el texto.
- source_word: τοῖς ... ἐν δικαιοσύνῃ
  english_pob_choice: who keep his ways in righteousness
  chosen_spanish: los que guardan sus caminos en justicia
  alternatives_spanish:
  - los que guardan sus caminos con justicia
  - los que andan en justicia por sus caminos
  lexicon: δικαιοσύνη
  rationale: '"En justicia" conserva el sustantivo abstracto del griego y su fuerza ética/legal. Se evita reducirlo a una mera cualidad moral suavizada como "con justicia" salvo por estilo.'
theological_decisions:
- issue: Divine-name rendering of κύριος in a citation/allusion context
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  rationale: Dado que el contexto trata de la ley divina y la referencia κύριος funciona como designación del Dios de Israel, se usa el nombre propio "Yahvé" conforme a la terminología base del proyecto, en lugar del sustituto litúrgico "el Señor".
  doctrine_reference: Nombre divino / Tetragrámaton
- issue: Relationship between law and hope
  english_pob_reading: it is hope for all who keep his ways in righteousness
  chosen_spanish_reading: porque es esperanza para todos los que guardan sus caminos en justicia
  alternative_spanish_readings:
  - porque es la esperanza de todos los que guardan sus caminos en justicia
  - porque da esperanza a todos los que guardan sus caminos en justicia
  rationale: La fuente griega presenta la ley como "esperanza"; la redacción elegida conserva esa afirmación sin convertirla en una mera descripción psicológica. Se mantiene el carácter positivo de la ley dentro de una exhortación de obediencia.
  doctrine_reference: Ley, esperanza y obediencia en la tradición sapiencial/judía
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente: se eliminó el marcador de nota indebido tras "keep" y se mantuvo la redacción esencial del audit trail en forma fiel al fragmento griego disponible. Dado que el español no necesitó notas textuales adicionales, no se añadieron notas al pie.'
  spanish_consistency_notes:
  - Se mantuvo "Yahvé" como equivalente principal de κύριος según el criterio del proyecto.
  - Se prefirió "guardad" para φυλάξατε, manteniendo un tono exhortativo directo y bíblico.
  - '"Justicia" se conservó como sustantivo para reflejar δικαιοσύνη sin diluirlo en una paráfrasis.'
  - No se introdujeron notas al pie porque el fragmento y el audit trail no requerían variantes textuales adicionales en español.
