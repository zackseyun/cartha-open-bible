  source_alignment_summary: 'Greek (full chapter available): Φυλάξατε οὖν τέκνα μου πάντα τὸν νόμον Κυρίου, ὅτι ἐστὶν ἐλπὶς τοῖς κατευθύνουσι τὰς ὁδοὺς αὐτοῦ. EN POB: ''Therefore keep, my children, the whole law of the Lord, for it is hope for all who keep his ways in righteousness.'' Spanish: ''Por tanto, guardad, hijos míos, toda la ley de Yahvé, porque es esperanza para todos los que guardan sus caminos en justicia.'' Note: ''guardad'' is vosotros form. However 026/001 is a direct address from a patriarch (''my children'') — the vosotros imperative ''guardad'' could be seen as a non-standard Latin-American form. Neutral LATAM Spanish would prefer ''guarden''. But the chapter-level YAML uses ''guarden'' correctly. However on reflection, for a testamentary/biblical address, the imperative plural ''guarden'' (ustedes) is more appropriate for LATAM Spanish. Still, this is a minor point and the overall translation is excellent.'
