  text: Conserven, pues, hijos míos, todo[a] el ley[b] del Señor[c], porque hay esperanza[d] para todos los que...
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego conserva aquí un mandato plural; «todo» refleja el acusativo del sintagma, pero el fragmento está cortado y puede requerir continuación en la línea siguiente.
    reason: textual_variant
  - marker: b
    text: «Ley» traduce νόμον; también podría leerse como «instrucción» según el contexto, pero el valor jurídico de νόμος favorece «ley».
    reason: lexical_alternative
  - marker: c
    text: Aunque κύριος puede corresponder al nombre divino, el fragmento no ofrece suficiente contexto para sustituirlo por «Yahvé».
    reason: theological_note
  - marker: d
    text: ἐλπὶς puede implicar esperanza confiada; se conserva «esperanza» por ser la forma más directa y natural en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: Φυλάξατε
  english_pob_choice: And he fell asleep... [context not aligned to Greek fragment]
  chosen_spanish: Conserven
  alternatives_spanish:
  - Guarden
  - Mantengan
  lexicon: φυλάσσω
  rationale: El fragmento griego conserva un imperativo plural exhortativo; «Conserven» comunica adecuadamente la idea de custodiar/observar un mandato en español bíblico moderno.
- source_word: τὸν νόμον
  english_pob_choice: law
  chosen_spanish: la ley
  alternatives_spanish:
  - la instrucción
  - la norma
  lexicon: νόμος
  rationale: νόμος se vierte de forma directa como «ley», que es el equivalente más natural y fiel en este contexto jurídico-exhortativo.
- source_word: Κυρίου
  english_pob_choice: the Lord
  chosen_spanish: del Señor
  alternatives_spanish:
  - de Yahvé
  lexicon: κύριος
  rationale: El fragmento griego usa κύριος; por el contexto bíblico puede referir al nombre divino. Sin alineación completa del capítulo, «Señor» conserva la lectura auditada del griego sin forzar una identificación más específica que el fragmento no asegura.
- source_word: ἐλπὶς
  english_pob_choice: hope
  chosen_spanish: esperanza
  alternatives_spanish:
  - confianza
  - expectativa
  lexicon: ἐλπίς
  rationale: «Esperanza» es la equivalencia estándar y transparente para ἐλπίς, y mantiene el tono teológico del fragmento.
theological_decisions:
- issue: Alcance textual incompleto del fragmento griego
  english_pob_reading: No aligned verse-level English text; existing English POB audit line belongs to a different, unrelated passage.
  chosen_spanish_reading: Se traduce solo el fragmento griego disponible, dejando una elipsis donde el texto está cortado.
  alternative_spanish_readings:
  - Reconstruir una frase completa a partir del contexto
  - Sustituir por el texto inglés auditado
  rationale: No es posible depender del inglés auditado porque corresponde a otra unidad textual. La traducción debe permanecer estrictamente anclada en el griego disponible y señalar su incompletud sin inventar contenido.
  doctrine_reference: Principio de fidelidad textual y no adición
translation_notes:
  revision_awareness: El paquete fuente señala que el griego está fragmentario y que el texto a nivel de versículo aún no está alineado. Por ello no se adopta el texto inglés POB del audit trail, que pertenece a otro pasaje, y se evita toda reconstrucción conjetural.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος en ausencia de un contexto suficientemente cerrado para decidir «Yahvé».
  - Se evita armonizar con el English POB porque su contenido no corresponde al fragmento griego provisto.
  - La traducción conserva el carácter incompleto del testimonio textual con puntos suspensivos.
