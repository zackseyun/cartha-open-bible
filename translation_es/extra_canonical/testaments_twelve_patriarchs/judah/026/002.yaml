lexical_decisions:
- source_word: Φυλάξατε
  english_pob_choice: Keep
  chosen_spanish: Conserven
  alternatives_spanish:
  - Guarden
  - Mantengan
  lexicon: φυλάσσω
  rationale: El imperativo pide observar o custodiar fielmente; «conserven» comunica bien la idea de mantener bajo obediencia y preservación, sin sonar tan jurídico como «guarden» ni tan abstracto como «mantengan».
- source_word: τέκνα μου
  english_pob_choice: my children
  chosen_spanish: mis hijos
  alternatives_spanish:
  - mis niños
  - mis descendientes
  lexicon: τέκνα
  rationale: En este contexto exhortativo y familiar, «hijos» reproduce de forma natural el vínculo paternal del hablante; «descendientes» sería más técnico y menos afectivo.
- source_word: τὸν νόμον Κυρίου
  english_pob_choice: the law of the Lord
  chosen_spanish: la ley de Yahvé
  alternatives_spanish:
  - la ley del Señor
  - la ley de Dios
  lexicon: νόμος / κύριος
  rationale: Se mantiene el término técnico «ley» y se vierte el nombre divino con el equivalente editorial exigido, «Yahvé», en lugar de la sustitución reverencial «Señor».
- source_word: πᾶσιν ἐλπὶς
  english_pob_choice: hope for all
  chosen_spanish: esperanza para todos
  alternatives_spanish:
  - esperanza de todos
  - esperanza para todos ellos
  lexicon: ἐλπίς
  rationale: «Esperanza para» conserva la relación de beneficio o provisión que expresa el griego y sigue de cerca la estructura de la traducción inglesa auditada.
theological_decisions:
- issue: Tratamiento del nombre divino en κύριος
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - Dios
  rationale: Aunque el fragmento griego usa κύριος, el proyecto pide reflejar el nombre divino con «Yahvé» cuando el contexto remite al Tetragrámaton o a la designación divina establecida por la tradición de la obra. Aquí «ley del Señor» en inglés auditado se traslada a «ley de Yahvé» por coherencia editorial y para evitar la máscara reverencial.
  doctrine_reference: Nombre divino y traducción del Tetragrámaton
- issue: Conservación del corte textual
  english_pob_reading: because it is hope for all those who...
  chosen_spanish_reading: porque es esperanza para todos los que...
  alternative_spanish_readings:
  - porque es la esperanza de todos los que...
  - porque da esperanza a todos los que...
  rationale: El griego suministrado está truncado y el audit trail inglés también conserva la incompletitud. Se mantiene el final abierto sin completarlo ni suavizarlo, para respetar la evidencia textual.
  doctrine_reference: Fidelidad textual y límites del fragmento fuente
translation_notes:
  revision_awareness: Se siguió la revisión más reciente que sustituyó un borrador ajeno por el fragmento correcto de Testamento de Judá 26:2. Como el texto griego llega cortado tras πᾶσιν ἐλπὶς τοῖς κα, la versión española conserva también la interrupción con puntos suspensivos y no intenta reconstruir el segmento faltante.
  spanish_consistency_notes:
  - Se usó «Yahvé» de acuerdo con la norma editorial del proyecto para יהוה / κύριος en contexto divino.
  - «Esperanza para» mantiene la sintaxis simple y la relación semántica del original.
  - No se añadieron notas al pie porque el fragmento no presenta una alternativa textual o léxica necesaria que deba marcarse en el texto publicado.
