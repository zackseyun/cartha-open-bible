base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/013.yaml
  text: 'And now I command you[a], my children: hear Judah your father, and keep my words, with thoughts set on doing all the righteous requirements of the Lord and obeying the commands of God.


    Because I boasted that in wars the face of a beautiful woman had not deceived me, and I reproached Reuben my brother concerning Bilhah, my father’s wife, the spirit of jealousy and of sexual immorality arrayed themselves against me, until I sinned with Anan the Canaanite woman and with Tamar my daughter-in-law.


    For I said to my father-in-law, “I will consult my father, and then I will take your daughter.” But he was unwilling; instead, in the name of his daughter, he showed me an immeasurable abundance of gold, for he was a king. And he adorned her with gold and pearls[d][c][b], and made her pour wine for us at the banquet.'
  footnotes:
  - marker: a
    text: The Greek opening is textually awkward; the sense is an exhortation to listen to Judah as father and to keep his words.
    reason: textual_variant
  - marker: b
    text: Bilhah is the woman associated with Reuben’s offense in Genesis 35:22.
    reason: cross_reference
  - marker: c
    text: The name 'Anan' reflects the Greek witness here; some interpreters connect the episode with Judah’s Canaanite marriage traditions in Genesis 38.
    reason: alternative_reading
  - marker: d
    text: '''Under the name of his daughter'' is a literal rendering of a difficult Greek phrase, likely meaning that the wealth was displayed in connection with the proposed marriage.'
    reason: lexical_alternative
