translation:
  language: es
  text: 'Y ahora les mando yo, mis hijos: oigan a Judá, su padre, y guarden mis palabras, poniendo la mira en hacer todos los justos mandamientos del Señor[a] y en obedecer los mandatos de Dios.


    Porque me jacté de que, en las guerras, el rostro de una mujer hermosa no me había engañado, y reprendí a Rubén, mi hermano, por Bilhá, la esposa de mi padre. Pero el espíritu de los celos y de la inmoralidad sexual se puso en orden de batalla contra mí, hasta que pequé con Anán, la mujer cananea, y con Tamar, mi nuera[b].


    Pues yo le dije a mi suegro: «Consultaré a mi padre, y entonces tomaré a tu hija». Pero él no quiso; más bien, en nombre de su hija[c], me mostró una abundancia inmensa de oro, porque era rey. Y la adornó con oro y perlas, e hizo que nos sirviera vino en el banquete.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego inicial es sintácticamente áspero; el sentido es una exhortación a escuchar a Judá como padre y a guardar sus palabras.
    reason: textual_variant
  - marker: b
    text: Bilhá es la mujer asociada con el agravio de Rubén en Génesis 35:22.
    reason: cross_reference
  - marker: c
    text: La expresión griega es literal y difícil; probablemente indica que la riqueza se mostró en relación con el arreglo matrimonial propuesto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐντέλλομαι
  english_pob_choice: I command
  chosen_spanish: les mando
  alternatives_spanish:
  - les ordeno
  - les encargo
  - les instruyo
  lexicon: BDAG
  rationale: Conserva la fuerza exhortativa y paterna del griego testamentario; en español, «mandar» comunica mejor el tono directo que un calco más técnico.
- source_word: φυλάξασθε
  english_pob_choice: keep
  chosen_spanish: guarden
  alternatives_spanish:
  - conserven
  - observen
  - custodien
  lexicon: BDAG
  rationale: «Guardar mis palabras» es natural en español bíblico y mantiene la idea de atenderlas y cumplirlas.
- source_word: δικαιώματα
  english_pob_choice: righteous requirements
  chosen_spanish: justos mandamientos
  alternatives_spanish:
  - estatutos justos
  - decretos justos
  - exigencias justas
  lexicon: BDAG
  rationale: En este contexto, el énfasis es en normas concretas de obediencia. «Justos mandamientos» preserva la carga normativa y evita una abstracción poco idiomática.
- source_word: ἐντολάς
  english_pob_choice: commands
  chosen_spanish: mandatos
  alternatives_spanish:
  - mandamientos
  - órdenes
  - preceptos
  lexicon: BDAG
  rationale: Se mantiene la distinción con δικαιώματα mediante un término claro y natural, sin perder la autoridad divina del término.
- source_word: ἐγκαυχησάμενος
  english_pob_choice: I used to boast
  chosen_spanish: me jacté
  alternatives_spanish:
  - me glorié
  - me vanaglorié
  - me alabé
  lexicon: LSJ
  rationale: El aoristo participial ligado a la causa se expresa con una acción pretérita puntual en español. «Jactarse» refleja bien la autosuficiencia orgullosa de Judá.
- source_word: ἠπάτησέ με
  english_pob_choice: had deceived me
  chosen_spanish: me había engañado
  alternatives_spanish:
  - me había seducido
  - me había extraviado
  - me había llevado al error
  lexicon: BDAG
  rationale: «Engañar» conserva el sentido de ser desviado por la apariencia de belleza, sin cargar el verbo con matices ajenos al contexto.
- source_word: εὐμόρφου
  english_pob_choice: beautiful
  chosen_spanish: hermosa
  alternatives_spanish:
  - bella
  - bien parecida
  - atractiva
  lexicon: LSJ
  rationale: «Hermosa» es natural y digna en español para la belleza física señalada por el texto.
- source_word: ὠνείδιζον
  english_pob_choice: I reproached
  chosen_spanish: reprendí
  alternatives_spanish:
  - reproché
  - vituperé
  - censuré
  lexicon: BDAG
  rationale: El verbo griego expresa censura hacia Rubén; «reprendí» suena más natural en español y mantiene la fuerza moral sin exagerar a insulto.
- source_word: πνεῦμα τοῦ ζήλου καὶ τῆς πορνείας
  english_pob_choice: the spirit of jealousy and of sexual immorality
  chosen_spanish: el espíritu de los celos y de la inmoralidad sexual
  alternatives_spanish:
  - el espíritu de celos y fornicación
  - el espíritu de envidia y desenfreno sexual
  - el espíritu de celos y prostitución
  lexicon: BDAG
  rationale: Se preserva el lenguaje personificado de fuerzas morales activas. «Inmoralidad sexual» comunica el alcance ético sin reducirlo a una sola práctica.
- source_word: παρετάξατο
  english_pob_choice: arrayed themselves against me
  chosen_spanish: se puso en orden de batalla contra mí
  alternatives_spanish:
  - se alineó contra mí
  - se dispuso en mi contra
  - se me enfrentó
  lexicon: LSJ
  rationale: La imagen militar del verbo se vuelve explícita en español para conservar la personificación agresiva de los vicios.
- source_word: συνετέλεσα
  english_pob_choice: I sinned with
  chosen_spanish: pequé con
  alternatives_spanish:
  - tuve relaciones con
  - consumé con
  - caí con
  lexicon: BDAG
  rationale: La cláusula es confesional y moral; «pequé con» mantiene esa fuerza sin ocultar el sentido del acto.
- source_word: εἰς ὄνομα τῆς θυγατρὸς αὐτοῦ
  english_pob_choice: in the name of his daughter
  chosen_spanish: en nombre de su hija
  alternatives_spanish:
  - bajo el nombre de su hija
  - con el nombre de su hija
  - a nombre de su hija
  lexicon: LSJ
  rationale: El giro griego es difícil; «en nombre de su hija» conserva la literalidad reconocida en el audit trail y sugiere la conexión del regalo con el arreglo matrimonial.
- source_word: χρυσοῦ πλῆθος ἄπειρον
  english_pob_choice: an immeasurable abundance of gold
  chosen_spanish: una abundancia inmensa de oro
  alternatives_spanish:
  - una cantidad innumerable de oro
  - un caudal inmenso de oro
  - una riqueza sin medida de oro
  lexicon: BDAG
  rationale: La hipérbole del griego se conserva con una expresión elevada pero idiomática en español.
- source_word: οἰνοχοεῖν
  english_pob_choice: pour wine
  chosen_spanish: sirviera vino
  alternatives_spanish:
  - escanciara vino
  - llenara las copas
  - hiciera de copera
  lexicon: LSJ
  rationale: En el contexto del banquete, «servir vino» es claro y natural, manteniendo la acción concreta que forma parte de la tentación.
- source_word: δείπνῳ
  english_pob_choice: banquet
  chosen_spanish: banquete
  alternatives_spanish:
  - comida
  - festín
  - cena
  lexicon: BDAG
  rationale: «Banquete» conserva el ambiente real y lujoso del pasaje mejor que un término más ordinario.
theological_decisions:
- issue: Lenguaje personificado de vicios como fuerza activa
  english_pob_reading: Translate πνεῦμα τοῦ ζήλου καὶ τῆς πορνείας as an active hostile force.
  chosen_spanish_reading: 'Traducirlo como una fuerza activa: «el espíritu de los celos y de la inmoralidad sexual se puso en orden de batalla contra mí».'
  alternative_spanish_readings:
  - «los celos y la inmoralidad sexual me dominaron»
  - «un espíritu de celos y lujuria cayó sobre mí»
  rationale: El texto de los Testamentos suele presentar las pasiones como poderes en conflicto. Mantener ese rasgo preserva la retórica moral y la teología del pasaje.
  doctrine_reference: 'PHILOSOPHY.md: preservar la textura del texto fuente y no aplanar el lenguaje exhortativo.'
- issue: Explicitar el carácter confesional de συνετέλεσα
  english_pob_reading: Render the euphemistic clause as 'I sinned with Anan... and with Tamar...'.
  chosen_spanish_reading: Usar «pequé con» para dejar claro el marco de confesión y culpa.
  alternative_spanish_readings:
  - «tuve relaciones con»
  - «consumé el acto con»
  - «me uní con»
  rationale: La intención del pasaje no es describir neutralmente una relación, sino confesar pecado. La traducción debe mantener esa lectura ética.
  doctrine_reference: 'DOCTRINE.md: claridad moral sin ocultar la fuerza del original.'
- issue: Diferenciar δικαιώματα y ἐντολάς
  english_pob_reading: Differentiate 'righteous requirements' and 'commands'.
  chosen_spanish_reading: Traducirlos como «justos mandamientos» y «mandatos».
  alternative_spanish_readings:
  - «estatutos» y «mandamientos»
  - «ordenanzas» y «mandamientos»
  rationale: Se preserva la distinción léxica sin caer en tecnicismos rígidos. El resultado es comprensible y respeta la diferencia semántica.
  doctrine_reference: 'DOCTRINE.md: consistencia de términos clave, con excepciones documentadas.'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del inglés POB: se conectó el participio ἐγκαυχησάμενος con la cláusula principal mediante una relación causal (''Porque...''), y se prefirió ''in the name of his daughter'' para εἰς ὄνομα. La versión española refleja esa misma conexión causal con «Porque me jacté...» y conserva la literalidad de «en nombre de su hija».'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el referente del nombre divino en el texto principal, siguiendo el estándar del proyecto para יהוה.
  - Se mantiene la distinción entre «espíritu» como fuerza personificada y «Espíritu» solo cuando el contexto lo requiera expresamente; aquí va en minúscula por tratarse de un poder moral adverso.
  - Se traduce δοῦλος no porque no aparezca en este pasaje, pero se conserva la preferencia general del proyecto por evitar suavizaciones tradicionales cuando el griego exige fuerza lexical.
  - 'La puntuación respeta el flujo de discurso confesional en tres movimientos: exhortación, confesión de caída y relato del episodio matrimonial.'
