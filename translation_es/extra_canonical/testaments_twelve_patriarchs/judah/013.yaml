  text: XIII. *Καὶ νῦν ἐντέλλομαι ὑμῖν, τέκνα μου, ἀκούσατε *Ἰούδα¹ τοῦ πατρὸς ὑμῶν⁷² καὶ φυλάξασθε⁹ τοὺς λόγους μου¹⁰ τοῦ ποιεῖν⁷ πάντα¹¹ τὰ δικαιώματα Κυρίου¹³ καὶ ὑπακούειν¹⁴ ἐντολαῖς⁵ Θεοῦ¹⁵. 2. Καὶ μὴ πορεύεσθε¹⁶ ὀπίσω τῶν ἐπιθυμιῶν ὑμῶν⁹ μηδὲ¹⁷ ἐν ὑπερηφανείᾳ καρδίας¹¹, καὶ μὴ καυχάσθε ¹³ ἐν ἔργοις *καὶ ἰσχύι¹⁴ τῆς νεότητος ὑμῶν, ὅτι¹⁵ καίγε τοῦτο¹⁶ πονηρὸν ἐνώπιον¹⁷ Κυρίου ἐστί¹⁸. 3. Ἐπεὶ γὰρ καὶ ἐγώ¹⁸ ἐγκαυχησάμενος¹⁹ ὅτι ἐν πολέμοις²⁰ †ἠπάτησέ με²¹ πρόσωπον γυναικὸς εὐμόρφου²², καὶ ὠνείδιζον²³ Ῥουβὶμ τὸν ἀδελφόν μου²⁴ περὶ Βάλλας γυναικὸς τοῦ πατρός μου²⁵, καὶ τὸ πνεῦμα τοῦ ζήλου καὶ τῆς πορνείας²⁶ παρετάξατο²⁷ ἐπ᾽ ἐμέ²⁸, ἕως οὗ συνετέλεσα εἰς †τὴν Χανανανίτην³² καὶ εἰς Θαμὰρ ³³τὴν νύμφην³⁴ μου. 4. *Ἔλεγον γὰρ τῷ πενθερῷ μου ὅτι συμβουλεύσομαι τῷ πατρί μου καὶ οὕτως λήψομαι³⁴ τὴν θυγατέρα σου⁵· ὁ δὲ οὐκ ἠθέλησεν, ἀλλ᾽ ἔδειξέ³⁵ μοι *εἰς δόσιν αὐτῆς³⁶ χρυσίου πλῆθος³⁷ ἄπειρον³⁸. *Βασιλεὺς γὰρ ἦν³⁹. 5. *Καὶ ἐκόσμησεν αὐτὴν⁴⁰ ἐν χρυσίῳ καὶ μαργαρίταις, καὶ ἐποίησεν αὐτὴν οἰνοχοεῖν ἡμῖν⁴¹
    ἐν τῷ δείπνῳ ἐν *κάλλει γυναικῶν⁴³. 6. Καὶ⁴⁵ ὁ οἶνος διέστρεψέν μου *τοὺς ὀφθαλμοὺς⁴⁶, καὶ ἡμαύρωσέ μοι τὴν καρδίαν⁴⁷ *ἡ ἡδονή⁴⁸. 7. Καὶ ἐρασθεὶς αὐτῆς συνέπεσα εἰς αὐτήν⁴⁹, καὶ παρέβην ἐντολὴν⁵⁰ Κυρίου καὶ τὴν⁵¹ ἐντολὴν⁵² τοῦ πατρός μου, καὶ ἔλαβον αὐτὴν εἰς γυναῖκα. 8. Καὶ ὁ Κύριος ἀνταπέδωκέ μοι κατὰ τὸ διαβούλιον τῆς ψυχῆς μου, ὅτι οὐκ εὐφράνθην ἐν τοῖς τέκνοις αὐτῆς.
