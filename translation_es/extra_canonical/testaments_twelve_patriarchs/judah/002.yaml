base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/002.yaml
  text: And the Lord gave me favor in all my works[a], in the field and in the house. I know that I ran with a hind and caught it, and I made it food for my father, and he ate. And I would seize the gazelle in its course, and I overtook everything that was in the fields. I killed the lion and snatched a kid from its mouth. I took hold of the bear by its foot and cast it down the cliff, and it was crushed. I ran down the wild boar, and I overtook it as I ran and tore it apart. I caught a wild mare and, after seizing it, subdued it. A leopard in Hebron sprang upon the dog, and I caught it by the tail and flung it against the rock, and it was split in two. I found a wild ox grazing in the land, and taking hold of its horns[c][b], I shook it round about and struck it blind.
  footnotes:
  - marker: a
    text: The Greek text of this chapter is textually rough in places, especially in the sequence of hunting exploits. The translation follows the sense of the extant Greek witness without smoothing away its abrupt style.
    reason: textual_variant
  - marker: b
    text: Or 'grace' for 'favor' in the opening line; the context here favors success granted by divine goodwill in Judah's deeds.
    reason: lexical_alternative
  - marker: c
    text: Some readers may prefer 'wild bull' instead of 'wild ox.' The Greek can support either, and the image is of a powerful untamed bovine.
    reason: lexical_alternative
