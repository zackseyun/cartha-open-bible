translation:
  language: es
  text: Y Yahvé me concedió favor en todas mis obras[a], en el campo y en la casa. Sé que corrí con una cierva y la capturé, y la hice comida para mi padre, y él comió. Y solía apresar a la gacela en su carrera, y alcanzaba todo lo que estaba en los campos. Maté al león y arranqué un cabrito de su boca. Tomé al oso por la pata y lo arrojé por el precipicio, y quedó aplastado. Corrí tras el jabalí, y lo alcancé mientras corría y lo hice pedazos. Atrapé una yegua salvaje y, después de sujetarla, la dominé. Un leopardo en Hebrón se abalanzó sobre el perro, y lo agarré por la cola y lo lancé contra la roca, y se partió en dos. Encontré un buey salvaje pastando en la tierra, y, tomando sus cuernos[c][b], lo sacudí de un lado a otro y lo dejé ciego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El texto griego de este capítulo es áspero en varios lugares, especialmente en la secuencia de hazañas de caza. La traducción sigue el sentido del testimonio griego conservado sin pulir su estilo abrupto.
    reason: textual_variant
  - marker: b
    text: O «gracia» en lugar de «favor» en la primera línea; el contexto aquí favorece el éxito otorgado por la benevolencia divina en las obras de Judá.
    reason: lexical_alternative
  - marker: c
    text: Algunos lectores pueden preferir «toro salvaje» en lugar de «buey salvaje». El griego puede sostener ambas ideas, y la imagen es la de un bovino poderoso e indómito.
    reason: lexical_alternative
lexical_decisions:
- source_word: Κύριος
  english_pob_choice: Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Señor
  - el Señor
  lexicon: LSJ
  rationale: El audit trail inglés mantiene κύριος como título divino; en la norma del proyecto, el nombre divino se vierte como «Yahvé» en el texto principal. Se evita «Señor» como máscara, conservando la referencia al nombre divino en este contexto de atribución de éxito a Dios.
- source_word: χάριν
  english_pob_choice: favor
  chosen_spanish: favor
  alternatives_spanish:
  - gracia
  - benevolencia
  lexicon: LSJ
  rationale: En este relato de hazañas, la fuerza semántica es el favor o respaldo concedido por Dios, no «gracia» en un sentido más teológico. «Favor» reproduce mejor la lectura del POB inglés y la función contextual de χάρις.
- source_word: ἐν πᾶσι τοῖς ἔργοις μου
  english_pob_choice: in all my works
  chosen_spanish: en todas mis obras
  alternatives_spanish:
  - en todo lo que hice
  - en todas mis acciones
  lexicon: LSJ
  rationale: «Obras» conserva el alcance general de ἔργα sin reducirlo sólo a hazañas de caza; mantiene el tono elevado del pasaje y sigue de cerca la frase griega.
- source_word: ἐν τε ἀγρῷ καὶ ἐν τῷ οἴκῳ
  english_pob_choice: in the field and in the house
  chosen_spanish: en el campo y en la casa
  alternatives_spanish:
  - en el campo y en el hogar
  - en el campo y en la vivienda
  lexicon: LSJ
  rationale: La pareja locativa se vierte de manera directa y natural en español. «Campo» conserva el contraste con «casa» y evita introducir una interpretación más específica que el griego no exige.
- source_word: ἐπίασα / πιάσας
  english_pob_choice: caught
  chosen_spanish: capturé / atrapé / lo agarré
  alternatives_spanish:
  - cerní
  - aprehendí
  - presos
  lexicon: LSJ
  rationale: 'En las escenas de caza, el español necesita variar según el objeto: «capturé» para la cierva, «atrapé» para la gacela y la yegua, «lo agarré» para el leopardo. Estas opciones preservan el acto físico de tomar con fuerza sin volver el texto rígido.'
- source_word: ἔλαφος
  english_pob_choice: hind
  chosen_spanish: cierva
  alternatives_spanish:
  - venada
  - gamo
  lexicon: LSJ
  rationale: Aunque el inglés opta por «hind» para marcar el género femenino, en español «cierva» es el equivalente natural y preciso para una hembra de venado. Evita una forma menos idiomática como «cierva/venada» en la lectura pública.
- source_word: βρῶμα
  english_pob_choice: food
  chosen_spanish: comida
  alternatives_spanish:
  - alimento
  - vitualla
  lexicon: LSJ
  rationale: «Comida» refleja el alimento preparado para ser comido sin sobrecargar el registro. En esta frase concreta, el sustantivo funciona bien en español y conserva el sentido general de βρῶμα.
- source_word: δορκάς
  english_pob_choice: gazelle
  chosen_spanish: gacela
  alternatives_spanish:
  - antílope
  - corza
  lexicon: LSJ
  rationale: «Gacela» es la equivalencia moderna más clara para δορκάς y comunica bien el animal veloz que Judah alcanza en su carrera.
- source_word: διὰ τοῦ δρόμου
  english_pob_choice: in its course
  chosen_spanish: en su carrera
  alternatives_spanish:
  - mientras corría
  - en su recorrido
  lexicon: LSJ
  rationale: El griego subraya el movimiento continuo del animal. «En su carrera» preserva ese dinamismo en español y evita una paráfrasis más larga.
- source_word: πεδίοις
  english_pob_choice: fields
  chosen_spanish: campos
  alternatives_spanish:
  - llanuras
  - campos abiertos
  lexicon: LSJ
  rationale: El POB inglés revisado prefirió «fields» frente a «open fields». «Campos» es la forma natural en español y conserva la escena de terreno abierto sin introducir un adjetivo innecesario.
- source_word: ἀφειλόμην
  english_pob_choice: snatched
  chosen_spanish: arranqué
  alternatives_spanish:
  - arrebataré
  - sustraje
  lexicon: LSJ
  rationale: El verbo expresa una toma violenta y rápida; «arranqué» mantiene la fuerza física de quitar algo de la boca del león.
- source_word: ἔριφος
  english_pob_choice: kid
  chosen_spanish: cabrito
  alternatives_spanish:
  - chivo joven
  - cría de cabra
  lexicon: LSJ
  rationale: «Cabrito» es el equivalente español más natural para un macho joven de cabra. Conserva la concreción zoológica del griego y suena idiomático en una lectura pública.
- source_word: κρημνός
  english_pob_choice: cliff
  chosen_spanish: precipicio
  alternatives_spanish:
  - despeñadero
  - acantilado
  lexicon: LSJ
  rationale: Para español, «precipicio» comunica la caída abrupta que exige el relato y mantiene la imagen de una pendiente peligrosa mejor que un término más técnico.
- source_word: συνετρίβη
  english_pob_choice: was crushed
  chosen_spanish: quedó aplastado
  alternatives_spanish:
  - fue aplastado
  - quedó hecho pedazos
  lexicon: LSJ
  rationale: El resultado de la caída es una destrucción violenta. «Quedó aplastado» conserva el sentido pasivo y el efecto físico sin sonar torpe en español.
- source_word: ἀγρίῳ χοίρῳ
  english_pob_choice: wild boar
  chosen_spanish: jabalí
  alternatives_spanish:
  - cerdo salvaje
  - puerco salvaje
  lexicon: LSJ
  rationale: «Jabalí» es el equivalente establecido y natural en español para ἀγρίος χοίρος. Mantiene el valor de animal salvaje sin explicitar «boar» literalmente.
- source_word: προέλαβον / κατέδραμον
  english_pob_choice: overtook / rushed upon
  chosen_spanish: corrí tras / lo alcancé
  alternatives_spanish:
  - perseguí / lo alcanzé
  - arremetí contra / lo alcancé
  lexicon: LSJ
  rationale: La secuencia griega enfatiza persecución y ventaja de velocidad. «Corrí tras» y «lo alcancé» reproducen ese movimiento de manera clara y literaria.
- source_word: κατεσπάραξα
  english_pob_choice: tore it apart
  chosen_spanish: lo hice pedazos
  alternatives_spanish:
  - lo despedacé
  - lo rompí en pedazos
  lexicon: LSJ
  rationale: «Lo hice pedazos» transmite la violencia del verbo con buena fluidez en español. Preserva el aspecto brutal del combate sin añadir detalles ajenos.
- source_word: φοράδα ἀγρίαν
  english_pob_choice: wild mare
  chosen_spanish: yegua salvaje
  alternatives_spanish:
  - yegua cimarrona
  - caballo salvaje
  lexicon: LSJ
  rationale: Se conserva la especificidad femenina del griego. «Yegua salvaje» es clara y fiel, y evita perder el dato de género que el inglés también quiso mantener.
- source_word: πάρδαλις
  english_pob_choice: leopard
  chosen_spanish: leopardo
  alternatives_spanish:
  - pantera
  lexicon: LSJ
  rationale: «Leopardo» es el equivalente estándar y más transparente para lectores hispanos. Mantiene la imagen natural del episodio con el perro en Hebrón.
- source_word: κέρκος
  english_pob_choice: tail
  chosen_spanish: cola
  alternatives_spanish:
  - rabo
  lexicon: LSJ
  rationale: «Cola» es el término neutro y literario más apropiado aquí. Conserva el detalle concreto de por dónde Judah sujeta al animal.
- source_word: ἀπηκόντισα
  english_pob_choice: flung
  chosen_spanish: lancé
  alternatives_spanish:
  - arrojé
  - hice volar
  lexicon: LSJ
  rationale: El verbo tiene fuerza de lanzamiento violento. «Lancé» es directo, natural y suficientemente fuerte para el contexto.
- source_word: ἐρράγη εἰς δύο
  english_pob_choice: was split in two
  chosen_spanish: se partió en dos
  alternatives_spanish:
  - fue partido en dos
  - quedó dividido en dos
  lexicon: LSJ
  rationale: La forma pronominal en español expresa bien el resultado súbito de la colisión. «Se partió en dos» conserva la vividez del griego.
- source_word: βοῦν ἄγριον
  english_pob_choice: wild ox
  chosen_spanish: buey salvaje
  alternatives_spanish:
  - toro salvaje
  - buey montaraz
  lexicon: LSJ
  rationale: El griego admite un bovino salvaje potente; en español «buey salvaje» sigue de cerca la imagen y evita introducir una especificación zoológica no necesaria.
- source_word: νεμόμενον
  english_pob_choice: grazing
  chosen_spanish: pastando
  alternatives_spanish:
  - paciendo
  - comiendo hierba
  lexicon: LSJ
  rationale: «Pastando» es natural y descriptivo en español, y comunica el animal alimentándose en la tierra.
- source_word: συσσείσας
  english_pob_choice: shook it round about
  chosen_spanish: lo sacudí de un lado a otro
  alternatives_spanish:
  - lo hice girar
  - lo agité violentamente
  lexicon: LSJ
  rationale: El compuesto intensifica el movimiento circular/violento. «Lo sacudí de un lado a otro» capta ese efecto sin sonar artificial.
- source_word: σκοτίσας
  english_pob_choice: struck it blind
  chosen_spanish: lo dejé ciego
  alternatives_spanish:
  - lo cegé
  - lo obscurecí
  lexicon: LSJ
  rationale: En español, el resultado final «lo dejé ciego» suena más natural que una traducción demasiado literal. Conserva la idea de causar ceguera por fuerza física.
theological_decisions:
- issue: Atribución de éxito a la acción divina
  english_pob_reading: The Lord is presented as the giver of favor enabling Judah's success.
  chosen_spanish_reading: Yahvé es presentado como el que concede favor y hace posible el éxito de Judá.
  alternative_spanish_readings:
  - Yahvé le concede gracia
  - Yahvé le da benevolencia
  rationale: La línea inicial atribuye explícitamente a Yahvé la capacidad y el favor que sostienen las obras de Judá. Se conserva esa teología causal sin suavizarla ni convertirla en una fórmula general de bendición.
  doctrine_reference: 'DOCTRINE.md: original-language primacy; κύριος → Yahvé'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del POB inglés, que afinó varias frases para mayor precisión léxica: «in the field and in the house», «made it food», «in the fields», la secuencia del jabalí, «the dog», y «in the land»/«round about». La versión española sigue esas decisiones, pero las adapta a la sintaxis natural del español y a la norma del proyecto para el nombre divino.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para Κύριος conforme al estándar del proyecto.
  - 'Se prefirió vocabulario zoológico específico y natural: «cierva», «gacela», «cabrito», «jabalí», «leopardo», «buey salvaje».'
  - Se conservaron los marcadores [a], [b] y [c] sólo donde corresponden en el texto.
  - La secuencia de acciones violentas sigue el orden y la aspereza del griego, sin suavización devocional.
  - «Favor» se preserva frente a «gracia» para no perder la decisión léxica documentada del POB inglés.
