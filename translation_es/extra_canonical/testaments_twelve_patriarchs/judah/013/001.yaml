source:
  edition: Charles 1908 Greek Versions (pages 134-175, Judah pilot full)
  text: '*Καὶ νῦν ἐντέλλομαι ὑμῖν, τέκνα μου, ἀκούσατε μηδὲ ἐν ⌜Ἰούδα¹ τοῦ πατρὸς ὑμῶν⌝² καὶ φυλάξασθε³ τοὺς λόγους μου⁴ θυμήσεσι τοῦ ποιεῖν⁵ πάντα⁶ τὰ δικαιώματα Κυρίου⁷ καὶ ὑπακούειν διαβου- ἐντολὰς⁸ Θεοῦ.'
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/013/001.yaml
  text: 'And now I command you, my children: listen to Judah, your father, and keep my words in your hearts, to do all the righteous commands of the Lord and to obey the commands of God.'
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:58Z'
    unchanged: false
    changes_summary: 'Adjusted wording for clarity and completeness: rendered ἀκούσατε as ''listen to,'' preserved the direct address to Judah your father, and translated θυμήσεσι as ''in your hearts'' while keeping the rest close to the source.'
translation:
  language: es
  text: 'Y ahora les mando, hijos míos: escuchen a Judá, su padre, y guarden mis palabras en sus corazones, para hacer todos los mandamientos justos del Señor[a] y obedecer los mandamientos de Dios.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Señor» traduce aquí Κυρίου del griego transmitido; el testimonio disponible no indica de forma explícita una restauración del Tetragrámaton en este lugar.
    reason: source_note
lexical_decisions:
- source_word: ἐντέλλομαι
  english_pob_choice: I command you
  chosen_spanish: les mando
  alternatives_spanish:
  - les ordeno
  - les doy este mandato
  lexicon: —
  rationale: El griego expresa un mandato formal. En español, «mando» conserva la fuerza directiva sin volverse excesivamente rígido; «les mando» mantiene el tono paterno y exhortativo del pasaje.
- source_word: ἀκούσατε
  english_pob_choice: listen to
  chosen_spanish: escuchen a
  alternatives_spanish:
  - oyan a
  - escuchen
  lexicon: —
  rationale: La revisión inglesa fijó «listen to» para captar el valor de oír con atención y obediencia. «Escuchen a» conserva ese matiz mejor que un simple «oigan».
- source_word: Ἰούδα τοῦ πατρὸς ὑμῶν
  english_pob_choice: Judah, your father
  chosen_spanish: a Judá, su padre
  alternatives_spanish:
  - a Judá, su padre
  - a Judá, el padre de ustedes
  lexicon: —
  rationale: Se mantiene la referencia directa al patriarca Judá y la relación filial. «Su padre» reproduce el apositor y evita introducir una paráfrasis más explicativa.
- source_word: φυλάξασθε
  english_pob_choice: keep
  chosen_spanish: guarden
  alternatives_spanish:
  - conserven
  - observen
  lexicon: —
  rationale: En este contexto el verbo implica retener fielmente y cuidar las palabras recibidas. «Guarden» funciona bien en español bíblico y comunica conservación activa.
- source_word: τοὺς λόγους μου
  english_pob_choice: my words
  chosen_spanish: mis palabras
  alternatives_spanish:
  - mis dichos
  - mis palabras dichas
  lexicon: —
  rationale: La expresión es directa y no requiere ampliación. «Palabras» conserva la sencillez del griego y del inglés auditado.
- source_word: θυμήσεσι
  english_pob_choice: in your hearts
  chosen_spanish: en sus corazones
  alternatives_spanish:
  - en su interior
  - con la mente puesta en
  lexicon: —
  rationale: La revisión inglesa entendió un sentido interior/afectivo. «En sus corazones» conserva el valor bíblico de interioridad y memoria fiel sin perder naturalidad en español.
- source_word: τὰ δικαιώματα Κυρίου
  english_pob_choice: the righteous commands of the Lord
  chosen_spanish: los mandamientos justos del Señor
  alternatives_spanish:
  - las justas ordenanzas del Señor
  - los preceptos justos del Señor
  lexicon: —
  rationale: δικαιώματα puede abarcar estatutos, ordenanzas o mandamientos; la traducción inglesa escogió «commands» por la coordinación con «commands of God». En español, «mandamientos justos» conserva el carácter normativo y la cualidad de rectitud, sin borrar la tensión léxica entre estatutos y mandatos.
- source_word: Κυρίου
  english_pob_choice: the Lord
  chosen_spanish: del Señor
  alternatives_spanish:
  - de Yahvé
  lexicon: —
  rationale: Aunque la norma del proyecto favorece «Yahvé» para יהוה, aquí el testimonio griego usa Κυρίου en una formulación sapiencial/himnódica heredada. Dado que el texto inglés auditado fija «the Lord» y no hay señal clara de una cita directa del Tetragrámaton en el fragmento, se conserva «Señor» para no forzar una identificación que el testimonio disponible no explicita.
- source_word: ἐντολὰς Θεοῦ
  english_pob_choice: the commands of God
  chosen_spanish: los mandamientos de Dios
  alternatives_spanish:
  - los mandatos de Dios
  - las órdenes de Dios
  lexicon: —
  rationale: Se conserva la correspondencia con el inglés auditado y con el registro bíblico estándar. «Mandamientos» es la opción más natural y fiel para ἐντολαί en español.
theological_decisions:
- issue: Relación entre Κυρίου y el nombre divino
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  rationale: El contexto griego presenta Κυρίου, y el audit trail inglés no señala una recuperación explícita del Tetragrámaton en este versículo. Para evitar afirmar más de lo que el testimonio disponible permite, se mantiene «Señor».
  doctrine_reference: Uso reverente del nombre divino y prudencia textual en fuentes de tradición griega
- issue: θυμήσεσι como interioridad moral
  english_pob_reading: in your hearts
  chosen_spanish_reading: en sus corazones
  alternative_spanish_readings:
  - con la mente puesta en ello
  - con el corazón atento
  rationale: La decisión preserva la lectura interiorizada adoptada por la revisión inglesa. En español, «corazones» comunica memoria, disposición y lealtad, sin reducir el término a mera emoción.
  doctrine_reference: Antropología bíblica del corazón como centro interior
- issue: δικαιώματα / ἐντολαί y la fuerza normativa
  english_pob_reading: righteous commands / commands
  chosen_spanish_reading: mandamientos justos / mandamientos
  alternative_spanish_readings:
  - ordenanzas justas / preceptos
  - estatutos justos / mandatos
  rationale: El griego distingue dos sustantivos normativos emparentados. En español se mantiene la diferencia con adjetivación («justos») y el mismo campo semántico de obligación, respetando la paralela coordinación del texto.
  doctrine_reference: Ley y obediencia en la tradición exhortativa de los Testamentos de los Doce Patriarcas
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que ajustó ἀκούσατε a «listen to» y θυμήσεσι a «in your hearts», además de mantener la coordinación entre los mandamientos del Señor y de Dios. La redacción española sigue esa misma línea de claridad y cercanía al griego, sin introducir lecturas no sustentadas por el aparato disponible.
  spanish_consistency_notes:
  - Se mantuvo «Señor» por coherencia con el testimonio griego de Κυρίου en este pasaje, pese a la preferencia general del proyecto por «Yahvé» para el Tetragrámaton.
  - Se preservó la doble serie normativa con «mandamientos justos» y «mandamientos de Dios» para reflejar la coordinación del original.
  - Se empleó el plural reverencial «les / sus» conforme al destinatario colectivo del versículo.
