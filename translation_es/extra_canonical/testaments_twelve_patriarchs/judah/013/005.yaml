translation:
  language: es
  text: Y la adornó con oro y perlas, y la hizo servir el vino para nosotros en el banquete.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐκόσμησεν αὐτὴν
  english_pob_choice: adorned her
  chosen_spanish: la adornó
  alternatives_spanish:
  - la engalanó
  - la embelleció
  lexicon: κοσμέω
  rationale: Conserva la idea básica de adornar/ornamentar sin añadir un matiz excesivo. 'La adornó' es natural en español y refleja bien el objeto directo femenino del griego.
- source_word: ἐν χρυσίῳ καὶ μαργαρίταις
  english_pob_choice: with gold and pearls
  chosen_spanish: con oro y perlas
  alternatives_spanish:
  - con oro y margaritas
  - con oro y gemas
  lexicon: χρυσίον; μαργαρίτης
  rationale: '''Oro y perlas'' corresponde de forma directa al griego y al inglés POB. ''Perlas'' evita un calco incorrecto de ''margaritas'' y mantiene el valor material ornamental.'
- source_word: οἰνοχοεῖν
  english_pob_choice: pour wine
  chosen_spanish: servir el vino
  alternatives_spanish:
  - verter el vino
  - escanciar el vino
  lexicon: οἰνοχοέω
  rationale: El verbo griego puede significar servir/escanciar vino. En español, 'servir el vino' transmite la función de manera clara y digna sin sonar arcaico o demasiado literal.
- source_word: ἡμῖν ἐν τῷ δείπνῳ
  english_pob_choice: for us at the banquet
  chosen_spanish: para nosotros en el banquete
  alternatives_spanish:
  - para nosotros en la cena
  - ante nosotros en el banquete
  lexicon: δείπνον
  rationale: '''Banquete'' mantiene el sentido de comida principal/convivial festiva y sigue de cerca el inglés POB. ''Para nosotros'' refleja el dativo de beneficio/participación.'
theological_decisions:
- issue: Representación del acto de servir vino en el contexto narrativo
  english_pob_reading: made her pour wine for us at the banquet
  chosen_spanish_reading: la hizo servir el vino para nosotros en el banquete
  alternative_spanish_readings:
  - la hizo escanciar vino para nosotros en el banquete
  - la hizo verter el vino para nosotros en el banquete
  rationale: No hay un problema doctrinal propio del versículo, pero sí una elección de registro. 'Hizo servir el vino' comunica la acción sin endurecer el español ni añadir una connotación extra. Se conserva la subordinación causativa del griego.
  doctrine_reference: Narrative/lexical, no doctrinal
translation_notes:
  revision_awareness: La versión inglesa auditada fue limpiada de marcadores de nota en la revisión más reciente; por tanto, no se introducen notas en español. La redacción española sigue el texto griego y coincide sustancialmente con la versión inglesa final.
  spanish_consistency_notes:
  - Se mantiene un español neutro y publicable, evitando calcos como 'hacerla escanciar' si no son necesarios.
  - '''Banquete'' se conserva para δείπνον por coherencia estilística con el tono festivo del pasaje.'
  - No se introduce 'Cristo', 'Señor' ni otras terminologías no presentes en este versículo.
