base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/013/004.yaml
  text: For I said to my father-in-law, “I will consult my father, and then I will take your daughter.” But he was unwilling; instead, he showed me an immense amount of gold in the name of his daughter, for he was a king.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:58Z'
    unchanged: false
    changes_summary: Adjusted the final clause to preserve the source phrase ‘in the name of his daughter’ while improving English flow by moving it after the direct object. Kept the rest unchanged.
translation:
  language: es
  text: 'Porque yo le dije a mi suegro: «Consultaré a mi padre, y así tomaré a tu hija». Pero él no quiso; al contrario, me mostró, en nombre de su hija[a], una inmensa cantidad de oro, pues era rey.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice literalmente «para/en nombre de su hija»; se conserva la expresión para respetar la forma del original, aunque en español resulte poco idiomática.
    reason: source_note
lexical_decisions:
- source_word: πενθερῷ μου
  english_pob_choice: my father-in-law
  chosen_spanish: mi suegro
  alternatives_spanish:
  - mi padre político
  - mi consuegro
  lexicon: πενθερός
  rationale: El griego nombra al suegro; «mi suegro» es la forma natural y transparente en español, fiel al parentesco indicado por el texto y al inglés auditado.
- source_word: συμβουλεύσομαι τῷ πατρί μου
  english_pob_choice: I will consult my father
  chosen_spanish: Consultaré a mi padre
  alternatives_spanish:
  - pediré consejo a mi padre
  - me aconsejaré con mi padre
  lexicon: συμβουλεύομαι
  rationale: La forma futura reflexiva/medio-pasiva expresa la idea de consultar o pedir consejo. «Consultaré a mi padre» conserva el sentido sin sobrecargar la frase.
- source_word: λήψομαι τὴν θυγατέρα σου
  english_pob_choice: I will take your daughter
  chosen_spanish: tomaré a tu hija
  alternatives_spanish:
  - recibiré a tu hija
  - tomaré tu hija por esposa
  lexicon: λαμβάνω + θυγάτηρ
  rationale: El contexto matrimonial justifica «tomaré a tu hija» como expresión idiomática breve y fiel; evita explicitar «por esposa» sin necesidad del texto fuente.
- source_word: οὐκ ἤθελεν
  english_pob_choice: was unwilling
  chosen_spanish: no quiso
  alternatives_spanish:
  - no estaba dispuesto
  - se negó
  lexicon: ἐθέλω
  rationale: «No quiso» reproduce de modo natural la negativa volitiva del griego y coincide con el valor narrativo del pasaje.
- source_word: ἔδειξέ μοι εἰς ὄνομα τῆς θυγατρὸς αὐτοῦ
  english_pob_choice: he showed me an immense amount of gold in the name of his daughter
  chosen_spanish: me mostró, en nombre de su hija[a], una inmensa cantidad de oro
  alternatives_spanish:
  - me mostró una inmensa cantidad de oro en nombre de su hija[a]
  - me mostró una inmensa cantidad de oro como dote por su hija[a]
  lexicon: εἰς ὄνομα
  rationale: La frase griega literalmente dice «para/en nombre de». Se mantiene con «en nombre de» para no borrar la expresión documentada, aunque en español suena algo idiomática; por eso el marcador remite a la construcción del original.
- source_word: χρυσοῦ πλῆθος ἄπειρον
  english_pob_choice: an immense amount of gold
  chosen_spanish: una inmensa cantidad de oro
  alternatives_spanish:
  - una cantidad innumerable de oro
  - una abundancia inmensa de oro
  lexicon: πλῆθος ἄπειρον
  rationale: La combinación expresa gran abundancia sin necesidad de un calco duro. «Inmensa cantidad de oro» conserva la amplitud semántica y la fluidez en español.
- source_word: βασιλεὺς γὰρ ἦν
  english_pob_choice: for he was a king
  chosen_spanish: pues era rey
  alternatives_spanish:
  - porque era rey
  - ya que era rey
  - pues era un rey
  lexicon: βασιλεύς
  rationale: Se preserva la causalidad con «pues» y el predicado nominal simple «era rey», que refleja el carácter regnal sin añadir artículo innecesario.
theological_decisions:
- issue: El sentido de la expresión matrimonial «tomar» a la hija
  english_pob_reading: I will take your daughter
  chosen_spanish_reading: tomaré a tu hija
  alternative_spanish_readings:
  - tomaré tu hija por esposa
  - recibiré a tu hija
  rationale: No se introduce una glosa interpretativa que el texto no exige; la fórmula mantiene la referencia al matrimonio por contexto narrativo, no por expansión doctrinal o cultural.
  doctrine_reference: Narrative clarity / marital idiom
- issue: Conservación de la expresión «en nombre de su hija»
  english_pob_reading: in the name of his daughter
  chosen_spanish_reading: en nombre de su hija
  alternative_spanish_readings:
  - a causa de su hija
  - como dote por su hija
  rationale: El audit trail inglés corrigió la ubicación pero retuvo la frase. La versión española preserva esa tensión textual sin convertirla en otra relación semántica más explicativa de lo que el griego permite.
  doctrine_reference: Textual/source fidelity
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del inglés auditado, que mantuvo la frase ‘in the name of his daughter’ y reubicó la cláusula para mejor fluidez. La traducción española conserva esa misma decisión estructural y no la sustituye por una paráfrasis interpretativa.
  spanish_consistency_notes:
  - Se usa «Dios»/«Yahvé» según corresponda; aquí no aplica.
  - «suegro» es preferible a un calco más literal porque corresponde al parentesco real del griego.
  - 'La nota al pie marca la única tensión lexical notable del versículo: εἰς ὄνομα.'
  - Se evita añadir «por esposa» para no expandir el sentido más allá del griego y del inglés auditado.
