  text: '*Ἔλεγον γὰρ τῷ πενθερῷ μου ὅτι συμβουλεύσομαι τῷ πατρί μου καὶ οὕτως λήψομαι³⁴ τὴν θυγατέρα σου· *ὁ δὲ οὐκ ἤθελεν, ἀλλʼ³⁵ ἔδειξέ³⁶ μοι *εἰς ὄνομα³⁷ τῆς θυγατρὸς αὐτοῦ *χρυσοῦ πλῆθος ἄπειρον³⁸. *βασιλεὺς γὰρ ἦν³⁹.'
