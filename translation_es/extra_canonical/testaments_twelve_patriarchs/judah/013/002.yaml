translation:
  language: es
  text: Porque me jacté de que, en las guerras, el rostro de una mujer hermosa no me había engañado,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐγκαυχησάμενος
  english_pob_choice: Because I boasted
  chosen_spanish: Porque me jacté
  alternatives_spanish:
  - Porque me glorié
  - Porque me alabé
  lexicon: ἐγκαυχάομαι
  rationale: El griego expresa un jactarse/gloriarse de algo. «Me jacté» conserva el matiz de autoexaltación implícito sin sonar excesivamente arcaico en español.
- source_word: ἐν πολέμοις
  english_pob_choice: in wars
  chosen_spanish: en las guerras
  alternatives_spanish:
  - en la guerra
  - en combates
  lexicon: πόλεμος
  rationale: El plural griego puede referir a una serie de campañas o conflictos; «en las guerras» mantiene esa amplitud mejor que un singular demasiado general.
- source_word: ἠπάτησέ με
  english_pob_choice: had not deceived me
  chosen_spanish: no me había engañado
  alternatives_spanish:
  - no me había seducido
  - no me había atrapado
  lexicon: ἀπατάω
  rationale: «Engañar» reproduce con precisión el verbo griego y el sentido básico de no haber sido vencido por el atractivo de la mujer.
- source_word: πρόσωπον γυναικὸς εὐμόρφου
  english_pob_choice: the face of a beautiful woman
  chosen_spanish: el rostro de una mujer hermosa
  alternatives_spanish:
  - el semblante de una mujer hermosa
  - el rostro de una mujer de hermosa apariencia
  lexicon: πρόσωπον; εὐμόρφος
  rationale: «Rostro» traduce πρόσωπον de manera natural aquí, y «mujer hermosa» mantiene la descripción directa de εὐμόρφος sin sobredeterminarla.
theological_decisions:
- issue: La frase expresa autosuficiencia/jactancia moral en un contexto de prueba, sin añadir valoración doctrinal no presente en el griego.
  english_pob_reading: Because I boasted
  chosen_spanish_reading: Porque me jacté
  alternative_spanish_readings:
  - Porque me glorié
  rationale: 'La elección conserva la tensión ética del verbo: no se suaviza a una mera «mención» ni se intensifica artificialmente.'
  doctrine_reference: Sabiduría moral / humildad frente a la tentación
- issue: La referencia a la mujer hermosa es un episodio de tentación visual, no una categoría doctrinal sexualizada adicional.
  english_pob_reading: the face of a beautiful woman had not deceived me
  chosen_spanish_reading: el rostro de una mujer hermosa no me había engañado
  alternative_spanish_readings:
  - el rostro de una mujer hermosa no me había seducido
  rationale: «Engañado» mantiene la relación con el griego ἀπατάω y evita imponer un sentido más específico que el texto no exige.
  doctrine_reference: Tentación / vigilancia moral
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: sin cambios necesarios respecto al pasaje base del audit trail inglés.'
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y bíblico, evitando traducir «jactarse» como «presumir» por su menor correspondencia con el verbo griego.
  - No se introduce mayúscula teológica en «rostro» ni se altera el orden retórico del texto.
  - La puntuación refleja una cláusula causal subordinada al enunciado implícito del versículo anterior, como en el inglés POB.
