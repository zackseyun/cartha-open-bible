base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/013/003.yaml
  text: and I reproached Reuben my brother concerning Bilhah, my father’s wife, and the spirit of jealousy and sexual immorality arrayed themselves against me, until I completed it with Anan the Canaanite woman and with Tamar my daughter-in-law.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:58Z'
    unchanged: false
    changes_summary: Changed ‘the spirit of jealousy and of sexual immorality’ to ‘the spirit of jealousy and sexual immorality’ for smoother English while preserving the source; changed ‘I sinned’ to ‘I completed it’ to better reflect συνετέλεσα without adding a stronger claim than the Greek explicitly states.
translation:
  language: es
  text: y reprendí a Rubén, mi hermano, por causa de Bilha, la mujer de mi padre; y el espíritu de los celos y de la inmoralidad sexual se puso contra mí, hasta que lo consumé con Anán, la mujer cananea, y con Tamar, mi nuera.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: καὶ ὠνείδιζον Ῥουβὶμ τὸν ἀδελφόν μου
  english_pob_choice: and I reproached Reuben my brother
  chosen_spanish: y reprensé a Rubén, mi hermano
  alternatives_spanish:
  - y reproché a Rubén, mi hermano
  - y censuré a Rubén, mi hermano
  lexicon: ὠνειδίζω
  rationale: «Reprendí»/«reprensé» comunica mejor en español la acción verbal de censurar o echar en cara con tono correctivo. «Reproché» es viable, pero «reprendí» conserva mejor la dimensión exhortativa que suele acompañar ὠνειδίζω.
- source_word: περὶ Βάλλας γυναικὸς τοῦ πατρός μου
  english_pob_choice: concerning Bilhah, my father’s wife
  chosen_spanish: por causa de Bilha, la mujer de mi padre
  alternatives_spanish:
  - acerca de Bilha, la mujer de mi padre
  - respecto de Bilha, la mujer de mi padre
  lexicon: περὶ + acusativo
  rationale: La preposición περὶ aquí introduce el motivo o asunto de la reprensión; por eso «por causa de» suena más natural y refleja mejor la relación semántica que un simple «acerca de».
- source_word: τὸ πνεῦμα τοῦ ζήλου καὶ τῆς πορνείας
  english_pob_choice: the spirit of jealousy and sexual immorality
  chosen_spanish: el espíritu de los celos y de la inmoralidad sexual
  alternatives_spanish:
  - el espíritu de celo y de inmoralidad sexual
  - el espíritu de los celos y de la fornicación
  lexicon: πνεῦμα / ζῆλος / πορνεία
  rationale: Se conserva «espíritu» como agente personal o impulsor. «Celos» refleja ζῆλος en su sentido afectivo negativo aquí; «inmoralidad sexual» sigue la decisión POB para πορνεία, más amplia y clara que «fornicación» en español actual.
- source_word: παρετάξαντο ἐπʼ ἐμέ
  english_pob_choice: arrayed themselves against me
  chosen_spanish: se pusieron contra mí
  alternatives_spanish:
  - se alinearon contra mí
  - se desplegaron contra mí
  lexicon: παρατάσσομαι
  rationale: La imagen militar de «arrayed themselves against me» puede decirse en español con naturalidad como «se pusieron contra mí», sin perder el sentido de oposición hostil.
- source_word: ἕως συνετέλεσα
  english_pob_choice: until I completed it
  chosen_spanish: hasta que lo consumé
  alternatives_spanish:
  - hasta que lo terminé
  - hasta que lo completé
  lexicon: συντελέω
  rationale: La revisión inglesa corrigió «I sinned» a «I completed it» para no añadir una acusación explícita ausente del griego. «Consumé» mantiene la idea de llevar algo a término; en este contexto admite la referencia a la consumación del acto sin traducirlo demasiado libremente.
- source_word: εἰς Ἀνᾶν τὴν Χαναανίτιν
  english_pob_choice: with Anan the Canaanite woman
  chosen_spanish: con Anán, la mujer cananea
  alternatives_spanish:
  - con Anán, la cananea
  - con Anán, la mujer de Canaán
  lexicon: Ἀνάν / Χαναανίτις
  rationale: «Mujer cananea» sigue de cerca la forma del griego y resulta clara en español; «la cananea» es más breve, pero puede sonar menos explícita en un pasaje narrativo de estilo testimonial.
- source_word: καὶ εἰς Θαμὰρ τὴν νύμφην μου
  english_pob_choice: and with Tamar my daughter-in-law
  chosen_spanish: y con Tamar, mi nuera
  alternatives_spanish:
  - y con Tamar, mi hija política
  - y con Tamar, mi yerno
  lexicon: νύμφη
  rationale: «Nuera» es el equivalente español natural y preciso para νύμφη en este parentesco.
theological_decisions:
- issue: Alcance del juicio moral implícito en συνετέλεσα
  english_pob_reading: until I completed it
  chosen_spanish_reading: hasta que lo consumé
  alternative_spanish_readings:
  - hasta que lo completé
  - hasta que lo terminé
  rationale: La revisión inglesa evita convertir συνετέλεσα en una confesión más fuerte de lo que el griego exige. En español, «consumé» preserva la idea de consumación del acto sin añadir explícitamente «pequé», que no está en el verbo.
  doctrine_reference: Precisión textual; evitar sobreinterpretación moral más allá del sintagma verbal griego.
- issue: Naturaleza de «el espíritu de los celos y de la inmoralidad sexual»
  english_pob_reading: the spirit of jealousy and sexual immorality
  chosen_spanish_reading: el espíritu de los celos y de la inmoralidad sexual
  alternative_spanish_readings:
  - el espíritu de celo y de inmoralidad sexual
  - el espíritu de los celos y de la fornicación
  rationale: Se conserva la estructura genitiva doble y la agentividad del «espíritu» sin rebajarla a mera disposición psicológica. «Inmoralidad sexual» mantiene el rango semántico amplio de πορνεία mejor que una traducción estrecha como «fornicación».
  doctrine_reference: Antropología moral y lenguaje espiritual en textos parabíblicos; mantener la personificación del impulso maligno.
translation_notes:
  revision_awareness: Se siguió la corrección reciente del audit trail inglés que reemplazó «I sinned» por «I completed it», evitando introducir una confesión moral más fuerte que el griego συνετέλεσα. También se preservó la secuencia «the spirit of jealousy and sexual immorality» sin dividirla artificialmente, y se reflejó la relación causal/asuntiva de περὶ con una frase natural en español.
  spanish_consistency_notes:
  - Se usó «Yahvé» como terminología estándar del proyecto solo cuando aparece el Tetragrámaton; en este versículo no aplica.
  - Se prefirió «inmoralidad sexual» para πορνεία por consistencia con el criterio POB y por mayor amplitud semántica.
  - «Nuera» se mantiene para νύμφη cuando el parentesco es claro y no requiere nota adicional.
  - La voz narrativa en primera persona se conservó en todo el versículo sin convertirla en estilo indirecto.
