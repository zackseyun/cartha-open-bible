translation:
  language: es
  text: Hijos míos, el amor al dinero conduce a la idolatría.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Τέκνα μου
  english_pob_choice: My children
  chosen_spanish: Hijos míos
  alternatives_spanish:
  - Mis hijos
  - Hijitos míos
  lexicon: τέκνον
  rationale: ‘Hijos míos’ mantiene el tono filial y exhortativo del vocativo griego sin añadir diminutivo afectivo innecesario. ‘Mis hijos’ suena natural, pero ‘Hijos míos’ preserva mejor el orden enfático del original.
- source_word: ἡ φιλαργυρία
  english_pob_choice: the love of money
  chosen_spanish: el amor al dinero
  alternatives_spanish:
  - la avaricia
  - el amor al dinero y a las riquezas
  lexicon: φιλαργυρία
  rationale: La expresión griega nombra literalmente el amor al dinero; ‘amor al dinero’ conserva la forma y la fuerza lexical, mientras que ‘avaricia’ interpreta el efecto moral pero pierde el paralelismo semántico directo.
- source_word: πρὸς εἰδωλολατρείαν
  english_pob_choice: leads to idolatry
  chosen_spanish: conduce a la idolatría
  alternatives_spanish:
  - lleva a la idolatría
  - tiende a la idolatría
  lexicon: πρός + acusativo
  rationale: La construcción con πρός marca dirección o resultado; ‘conduce a’ comunica bien la idea de orientación hacia el desenlace sin exagerar más allá del griego. ‘Idolatría’ traduce con precisión εἰδωλολατρεία.
theological_decisions:
- issue: Relación causal entre el amor al dinero y la idolatría
  english_pob_reading: The love of money leads to idolatry.
  chosen_spanish_reading: El amor al dinero conduce a la idolatría.
  alternative_spanish_readings:
  - El amor al dinero lleva a la idolatría
  - El amor al dinero termina en idolatría
  rationale: La línea presenta una relación moral y espiritual directa; se conserva como causalidad general sin suavizarla. ‘Conduce a’ deja intacta la advertencia ética del texto.
  doctrine_reference: Éxodo 20:3-5; Colosenses 3:5
translation_notes:
  revision_awareness: 'Se siguió el texto griego directo: Τέκνα μου, ἡ φιλαργυρία πρὸς εἰδωλολατρείαν. La versión inglesa POB ‘the love of money leads to idolatry’ refleja correctamente la dirección semántica de πρός; no se requirieron revisiones respecto al audit trail disponible.'
  spanish_consistency_notes:
  - Se mantuvo ‘idolatría’ como equivalente estable de εἰδωλολατρεία.
  - No se introdujo ‘Señor’ ni otras convenciones no presentes en el verso.
  - El registro es sobrio y apto para lectura eclesial, sin paraphrasear el valor proverbial de la frase.
