base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/014/006.yaml
  text: After drinking the wine, I was not ashamed of the command of God, and I took a Canaanite woman.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:58Z'
    unchanged: false
    changes_summary: 'Adjusted wording for closer lexical accuracy: added ''the'' before ''wine'' to reflect the article, and changed ''commandment'' to ''command'' to match ἐντολή while keeping the rest of the draft intact.'
translation:
  language: es
  text: Después de beber el vino, no me avergoncé del mandato de Dios, y tomé una mujer cananea.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Πιὼν ... τὸν οἶνον
  english_pob_choice: After drinking the wine
  chosen_spanish: Después de beber el vino
  alternatives_spanish:
  - Tras beber vino
  - Luego de beber el vino
  lexicon: οἶνος
  rationale: El griego lleva artículo definido con οἶνον, por eso se conserva «el vino». «Después de» reproduce con naturalidad el participio aoristo en español sin forzar una subordinación extraña.
- source_word: οὐκ αἰσχύνθην
  english_pob_choice: I was not ashamed
  chosen_spanish: no me avergoncé
  alternatives_spanish:
  - no sentí vergüenza
  - no me dio vergüenza
  lexicon: αἰσχύνομαι
  rationale: «Avergonzarse» conserva bien el valor reflexivo del verbo y sugiere la reacción moral o social del hablante sin añadir matices ajenos.
- source_word: τὴν ἐντολὴν τοῦ Θεοῦ
  english_pob_choice: the command of God
  chosen_spanish: el mandato de Dios
  alternatives_spanish:
  - el mandamiento de Dios
  - la orden de Dios
  lexicon: ἐντολή
  rationale: Se eligió «mandato» porque en español moderno comunica el sentido de una orden dada con autoridad, manteniendo el valor de ἐντολή sin cargarlo necesariamente con el uso catequético de «mandamiento».
- source_word: γυναῖκα Χαναναίαν
  english_pob_choice: a Canaanite woman
  chosen_spanish: una mujer cananea
  alternatives_spanish:
  - una cananea
  - una mujer de Canaán
  lexicon: Χαναναία
  rationale: «Cananea» sigue de cerca el adjetivo griego y es claro en español bíblico. Se mantiene «mujer» porque el texto no la reduce a una mera identificación étnica.
theological_decisions:
- issue: Relación entre la acción de beber vino y la afirmación moral del hablante
  english_pob_reading: After drinking the wine, I was not ashamed ...
  chosen_spanish_reading: Después de beber el vino, no me avergoncé ...
  alternative_spanish_readings:
  - Aunque había bebido el vino, no me avergoncé ...
  - Después de beber vino, no me avergoncé ...
  rationale: Se conserva la secuencia temporal simple del griego y de la POB inglesa. No se introduce contraste ni causalidad que el texto no afirma.
  doctrine_reference: Principio de lectura literal-controlada; no añadir inferencias narrativas.
- issue: Término para ἐντολή aplicado a Dios
  english_pob_reading: command of God
  chosen_spanish_reading: mandato de Dios
  alternative_spanish_readings:
  - mandamiento de Dios
  - orden de Dios
  rationale: La frase se entiende como una instrucción divina específica. «Mandato» preserva la autoridad del acto sin convertirlo en un tecnicismo doctrinal más estrecho de lo que exige el pasaje.
  doctrine_reference: Ética bíblica y obediencia a la voluntad divina.
translation_notes:
  revision_awareness: La versión española sigue la revisión inglesa más reciente, que añadió el artículo en «the wine» y prefirió «command» sobre «commandment» para ἐντολή. Por eso se refleja «el vino» y «mandato de Dios» en vez de una traducción más tradicionalizante.
  spanish_consistency_notes:
  - Se mantiene un español sobrio y bíblico sin depender de fórmulas litúrgicas fijas.
  - «Cananea» se usa como adjetivo étnico coherente con el griego Χαναναίαν.
  - No se introducen notas al pie porque el pasaje no presenta una variante textual o ambigüedad relevante en el audit trail proporcionado.
