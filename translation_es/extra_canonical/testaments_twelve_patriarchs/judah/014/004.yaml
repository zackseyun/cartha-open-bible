base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/014/004.yaml
  text: Such is the wine-drinker, my children, because the drunkard respects no one.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:58Z'
    unchanged: false
    changes_summary: 'Tightened the second clause to match the Greek more directly: ὁ μεθύων as ''the drunkard'' and οὐκ αἰδεῖται οὐδένα as ''respects no one.'''
translation:
  language: es
  text: Tal es el bebedor de vino, hijos míos, porque el borracho no respeta a nadie.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Τοιοῦτός ἐστιν ὁ πάροινος
  english_pob_choice: Such is the wine-drinker
  chosen_spanish: Tal es el bebedor de vino
  alternatives_spanish:
  - Así es el bebedor de vino
  - Tal es el bebedor de vino embriagante
  lexicon: πάροινος
  rationale: πάροινος describe a quien se entrega al vino; “bebedor de vino” conserva la referencia léxica sin introducir una connotación más fuerte que la del griego. Mantiene el paralelo proverbial del enunciado.
- source_word: τέκνα μου
  english_pob_choice: my children
  chosen_spanish: hijos míos
  alternatives_spanish:
  - mis hijos
  - hijos
  lexicon: τέκνα
  rationale: “Hijos míos” es una forma natural y reverente en español para una apelación paternal o exhortativa; conserva la relación afectiva y discursiva del original.
- source_word: ὁ μεθύων
  english_pob_choice: the drunkard
  chosen_spanish: el borracho
  alternatives_spanish:
  - el ebrio
  - el que se embriaga
  lexicon: μεθύω
  rationale: La revisión inglesa fijó “the drunkard”; “el borracho” es la equivalencia más directa y natural en español para el sujeto habitual expresado por el participio.
- source_word: οὐκ αἰδεῖται οὐδένα
  english_pob_choice: respects no one
  chosen_spanish: no respeta a nadie
  alternatives_spanish:
  - no siente respeto por nadie
  - no tiene consideración por nadie
  lexicon: αἰδέομαι
  rationale: Aunque αἰδέομαι puede implicar vergüenza, reverencia o deferencia, aquí la lectura adoptada por la tradición auditada es “respects no one”. “No respeta a nadie” reproduce bien esa falta de deferencia o consideración.
theological_decisions:
- issue: Valor moral del bebedor/borracho en el proverbio
  english_pob_reading: Such is the wine-drinker... the drunkard respects no one.
  chosen_spanish_reading: Tal es el bebedor de vino... el borracho no respeta a nadie.
  alternative_spanish_readings:
  - Tal es el bebedor de vino... el que se embriaga no respeta a nadie
  - Tal es el bebedor de vino... el ebrio no tiene respeto por nadie
  rationale: El pasaje presenta una admonición moral sapiencial sobre el desorden causado por la embriaguez. La formulación española mantiene ese juicio sin intensificarlo ni suavizarlo indebidamente.
  doctrine_reference: Sabiduría exhortativa; no introduce una tesis doctrinal adicional.
translation_notes:
  revision_awareness: La última revisión inglesa afinó ὁ μεθύων como “the drunkard” y οὐκ αἰδεῖται οὐδένα como “respects no one”. La redacción española sigue esa decisión, evitando una paráfrasis más libre como “el que se emborracha” o “no tiene vergüenza”, que podría desplazar el matiz auditado.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico claro y contemporáneo, sin arcaísmos innecesarios.
  - No se introduce “Cristo”, “SEÑOR” ni otros términos no presentes en el texto fuente.
  - “Borracho” traduce el valor lexical dominante del participio en este contexto; no se usa “siervo” u otro equivalente no pertinente.
