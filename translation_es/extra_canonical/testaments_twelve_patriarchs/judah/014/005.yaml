id: T12P.JUD.14.5
reference: Testament of Judah 14:5
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 134-175, Judah pilot full)
  text: καὶ *Ἰδοὺ γὰρ κἀμὲ ἐπλάνησεν μὴ αἰσχυνθῆναι τὸ πλῆθος²⁸ *τῆς πόλεως²⁹· ὅτι³⁰ ἐν ὀφθαλμοῖς πάντων ἐξέκλινα πρὸς τὴν Θαμάρ, καὶ ἐποίησα *ἁμαρτίαν μεγάλην³¹, καὶ *ἀνεκάλυψα κάλυμμα ἀκαθαρσίας υἱῶν μου³².
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/014/005.yaml
  text: For behold, it also led me astray, so that I was not ashamed before the multitude of the city. For in the sight of all I turned aside to Tamar, and I committed a great sin, and I uncovered the covering of uncleanness of my sons.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:58Z'
    unchanged: false
    changes_summary: Changed the opening to preserve the source’s emphasis with 'For behold.' Kept the rest largely unchanged, but tightened punctuation and maintained the full sequence of clauses from the Greek.
translation:
  language: es
  text: Porque he aquí, eso también me llevó por mal camino, de modo que no me avergoncé delante de la multitud de la ciudad. Porque, a la vista de todos, me aparté hacia Tamar, e hice un gran pecado, y descubrí la cobertura de la impureza de mis hijos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἰδοὺ γὰρ
  english_pob_choice: For behold
  chosen_spanish: Porque he aquí
  alternatives_spanish:
  - Pues he aquí
  - Y he aquí
  lexicon: ἰδού
  rationale: Mantiene la fuerza de atención/enfoque del original y sigue la revisión inglesa que recuperó 'For behold'. 'Porque he aquí' conserva la conexión causal y la exclamación focal.
- source_word: ἐπλάνησεν
  english_pob_choice: led me astray
  chosen_spanish: me llevó por mal camino
  alternatives_spanish:
  - me desvió
  - me engañó
  lexicon: πλανάω
  rationale: Refleja el valor de extravío moral de πλανάω sin volverlo meramente intelectual. 'Llevó por mal camino' es natural en español y conserva la idea de desviación culpable.
- source_word: μὴ αἰσχυνθῆναι
  english_pob_choice: so that I was not ashamed
  chosen_spanish: de modo que no me avergoncé
  alternatives_spanish:
  - sin avergonzarme
  - para no avergonzarme
  lexicon: αἰσχύνομαι
  rationale: La negación con infinitivo expresa finalidad/resultado. 'No me avergoncé' comunica la falta de pudor ante el acto, como en el inglés auditado.
- source_word: τὸ πλῆθος τῆς πόλεως
  english_pob_choice: the multitude of the city
  chosen_spanish: la multitud de la ciudad
  alternatives_spanish:
  - la gente de la ciudad
  - la muchedumbre de la ciudad
  lexicon: πλῆθος
  rationale: Conserva la referencia social amplia y la estructura del original. 'Multitud' es transparente y fiel al campo léxico de πλῆθος.
- source_word: ἐν ὀφθαλμοῖς πάντων
  english_pob_choice: in the sight of all
  chosen_spanish: a la vista de todos
  alternatives_spanish:
  - ante los ojos de todos
  - en presencia de todos
  lexicon: ἐν ὀφθαλμοῖς πάντων
  rationale: Es la equivalencia idiomática más natural en español para la idea de visibilidad pública total.
- source_word: ἐξέκλινα πρὸς τὴν Θαμάρ
  english_pob_choice: I turned aside to Tamar
  chosen_spanish: me aparté hacia Tamar
  alternatives_spanish:
  - me desvié hacia Tamar
  - me encaminé hacia Tamar
  lexicon: ἐκκλίνω
  rationale: '''Aparté'' conserva el movimiento de desviación hacia Tamar sin sobreexplicar el acto. Mantiene la sintaxis sencilla del texto fuente.'
- source_word: ἁμαρτίαν μεγάλην
  english_pob_choice: a great sin
  chosen_spanish: un gran pecado
  alternatives_spanish:
  - un pecado grande
  - un grave pecado
  lexicon: ἁμαρτία
  rationale: Reproduce literalmente la valoración intensiva del original. 'Gran pecado' sigue el tono del inglés auditado y evita suavizar la gravedad.
- source_word: ἀνεκάλυψα κάλυμμα ἀκαθαρσίας
  english_pob_choice: I uncovered the covering of uncleanness
  chosen_spanish: descubrí la cobertura de la impureza
  alternatives_spanish:
  - quité el velo de la inmundicia
  - descubrí el velo de la impureza
  lexicon: καλύμμα / ἀκαθαρσία
  rationale: Conserva la imagen concreta de 'cobertura' y 'impureza' sin sustituirla por un eufemismo interpretativo. 'Cobertura' mantiene el efecto deliberadamente extrañado del griego.
- source_word: υἱῶν μου
  english_pob_choice: of my sons
  chosen_spanish: de mis hijos
  alternatives_spanish:
  - de mis hijos varones
  - de mis hijos míos
  lexicon: υἱός
  rationale: '''Hijos'' es el equivalente natural en español para υἱοί en este contexto posesivo; mantiene claridad sin perder la referencia familiar masculina implícita.'
theological_decisions:
- issue: Confesión pública de culpa y vergüenza
  english_pob_reading: I was not ashamed before the multitude of the city
  chosen_spanish_reading: no me avergoncé delante de la multitud de la ciudad
  alternative_spanish_readings:
  - no sentí vergüenza ante la multitud de la ciudad
  - no me avergoncé en presencia de la multitud de la ciudad
  rationale: La formulación conserva la autoacusación pública del hablante sin atenuarla. No se añade lenguaje penitencial ausente; sólo se preserva la confesión de deshonra moral.
  doctrine_reference: Confesión moral personal
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del inglés, que restableció la apertura con 'For behold' y mantuvo la secuencia completa de cláusulas. El español refleja esa apertura enfática y conserva las imágenes corporales y morales sin armonizarlas o explicarlas más allá del original.
  spanish_consistency_notes:
  - Se mantiene 'Tamar' como nombre propio sin adaptación.
  - '''Pecado'' se conserva para ἁμαρτία, en línea con el tono confesional del pasaje.'
  - Se evita 'Señor' o cualquier sustitución teológica ajena al texto, pues aquí no aparece el tetragrámaton ni κύριος.
  - La metáfora final de 'cobertura de la impureza' se deja casi literal para preservar la tensión textual del griego.
