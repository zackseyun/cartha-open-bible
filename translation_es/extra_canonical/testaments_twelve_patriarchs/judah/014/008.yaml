source:
  edition: Charles 1908 Greek Versions (pages 134-175, Judah pilot full)
  text: Ἐὰν δὲ ἵνα ἕως παρέλθῃ⁴⁶ τὸν ὅρον⁴⁷, ἐμβάλλει⁴⁸ εἰς⁴⁹ τὸν νοῦν αὐτοῦ⁵⁰ τὸ ... πίῃ. πνεῦμα τῆς πλάνης, καὶ ποιεῖ *τὸν μέθυσον αἰσχρορημονεῖν β-b, A καὶ⁵¹ παρανομεῖν καὶ μὴ⁵² αἰσχύνεσθαι *ἀλλὰ καυχᾶσθαι⁵³ βασιλεύ- τῇ ἀτιμίᾳ⁵⁴ *καὶ νομίζειν εἶναι καλόν⁵⁵. σῃ πορ- νεύων
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/014/008.yaml
  text: But if he goes on until he passes the limit, a spirit of deception enters into his mind and makes the drunkard speak shamefully and act lawlessly and not feel shame, but rather boast in his dishonor and think it good.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:58Z'
    unchanged: false
    changes_summary: Removed the bracketed footnote markers, replaced "and feel no shame" with the more direct "and not feel shame," and changed "but even" to "but rather" for smoother, more formal English while preserving the source sense.
translation:
  language: es
  text: Pero si sigue hasta que pase el límite, un espíritu de engaño entra en su mente y hace que el borracho hable vergonzosamente y obre sin ley, y no se avergüence, sino que más bien se gloríe en su deshonra y piense que es bueno.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πνεῦμα τῆς πλάνης
  english_pob_choice: a spirit of deception
  chosen_spanish: un espíritu de engaño
  alternatives_spanish:
  - un espíritu de error
  - un espíritu de extravío
  lexicon: πνεῦμα; πλάνη
  rationale: Mantiene el sentido personal/agentivo de πνεῦμα y el valor de πλάνη como engaño o desviación. 'Engaño' es claro en español y conserva la fuerza moral del texto.
- source_word: τὸν νοῦν αὐτοῦ
  english_pob_choice: into his mind
  chosen_spanish: en su mente
  alternatives_spanish:
  - en su entendimiento
  - en su pensamiento
  lexicon: νοῦς
  rationale: '''Mente'' comunica bien el ámbito interior de la acción del espíritu y evita una lectura demasiado técnica. ''Entendimiento'' sería posible, pero menos natural aquí.'
- source_word: τὸν μέθυσον
  english_pob_choice: the drunkard
  chosen_spanish: el borracho
  alternatives_spanish:
  - el ebrio
  - el beodo
  lexicon: μέθυσος
  rationale: '''Borracho'' es directo, idiomático y corresponde al retrato moral del contexto. ''Ebrio'' es más formal, pero menos vivo en esta construcción.'
- source_word: βλασφημεῖν / αἰσχρορημονεῖν
  english_pob_choice: speak shamefully
  chosen_spanish: hable vergonzosamente
  alternatives_spanish:
  - hable obscenamente
  - hable indecorosamente
  lexicon: αἰσχρορημονεῖν
  rationale: La forma griega apunta a hablar de manera vergonzosa/vergonzante; 'vergonzosamente' preserva el juicio moral sin ir más allá del texto con una especificación sexual o grosera no explicitada por la forma principal.
- source_word: παρανομεῖν
  english_pob_choice: act lawlessly
  chosen_spanish: obre sin ley
  alternatives_spanish:
  - obedezca sin ley
  - actúe ilegalmente
  lexicon: παρανομέω
  rationale: '''Obre sin ley'' conserva la fuerza literal de ''actuar contra la ley'' y evita reducirlo a mera ilegalidad civil. ''Ilegalmente'' sería más estrecho en español.'
- source_word: μὴ αἰσχύνεσθαι
  english_pob_choice: not feel shame
  chosen_spanish: no se avergüence
  alternatives_spanish:
  - no sienta vergüenza
  - no tenga vergüenza
  lexicon: αἰσχύνομαι
  rationale: '''No se avergüence'' reproduce bien la negación del pudor moral. La revisión inglesa prefirió esta formulación directa, que en español también resulta natural.'
- source_word: ἀλλὰ καυχᾶσθαι
  english_pob_choice: but rather boast
  chosen_spanish: sino que más bien se gloríe
  alternatives_spanish:
  - sino que más bien se jacte
  - sino que antes presuma
  lexicon: καυχάομαι
  rationale: '''Gloriarse'' conserva una opción semántica fuerte y puede funcionar para el alarde orgulloso del contexto. ''Jactarse'' sería muy claro, pero menos acorde con el peso retórico del pasaje.'
- source_word: ἐν τῇ ἀτιμίᾳ
  english_pob_choice: in his dishonor
  chosen_spanish: en su deshonra
  alternatives_spanish:
  - en su vergüenza
  - en su deshonor
  lexicon: ἀτιμία
  rationale: '''Deshonra'' expresa bien la pérdida de honor y mantiene el contraste moral con el orgullo del bebedor.'
- source_word: νομίζειν εἶναι καλόν
  english_pob_choice: think it good
  chosen_spanish: piense que es bueno
  alternatives_spanish:
  - considere que es bueno
  - lo tenga por bueno
  lexicon: νομίζω; καλός
  rationale: La traducción conserva la evaluación interior final sin añadir juicio externo. 'Piense que es bueno' sigue de cerca la sintaxis y resulta clara en español.
theological_decisions:
- issue: Naturaleza y agencia del 'espíritu de engaño'
  english_pob_reading: a spirit of deception enters into his mind
  chosen_spanish_reading: un espíritu de engaño entra en su mente
  alternative_spanish_readings:
  - un espíritu engañoso entra en su mente
  - un espíritu de error entra en su mente
  rationale: Se conserva la agencia espiritual real del texto sin convertirla en mera metáfora psicológica. 'Engaño' preserva la carga moral y evita suavizar el aspecto demonológico implícito.
  doctrine_reference: Antropología y demonología del texto; cf. 1 Timoteo 4:1 para influencias espirituales engañosas
- issue: Vergüenza y gloria invertidas
  english_pob_reading: not feel shame, but rather boast in his dishonor
  chosen_spanish_reading: no se avergüence, sino que más bien se gloríe en su deshonra
  alternative_spanish_readings:
  - no sienta vergüenza, sino que más bien se jacte de su deshonra
  - no tenga vergüenza, antes bien se gloríe en su deshonra
  rationale: 'La secuencia mantiene el contraste moral del original: la pérdida de pudor conduce al alarde. ''Gloriarse'' conserva la ironía del texto, donde se invierte indebidamente el honor.'
  doctrine_reference: Ética de honor/vergüenza y perversión moral en la embriaguez
translation_notes:
  revision_awareness: La versión inglesa revisada eliminó notas intermedias y ajustó 'not feel shame' y 'but rather' para mayor claridad. La redacción española sigue esa revisión, evitando marcadores innecesarios y manteniendo la progresión sintáctica directa del original griego y del POB inglés final.
  spanish_consistency_notes:
  - Se usó 'espíritu' para πνεῦμα, manteniendo la personificación espiritual del pasaje.
  - Se eligió 'borracho' para μέθυσος por claridad y fuerza descriptiva, coherente con el tono moral del texto.
  - '''Obre sin ley'' conserva la amplitud de παρανομεῖν sin estrecharlo a una infracción civil moderna.'
  - No se introdujo terminología eclesiástica ajena al pasaje; el registro permanece moral y sapiencial.
