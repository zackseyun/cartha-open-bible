translation:
  language: es
  text: Estas dos cosas desvían la mente del hombre.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τὰ δύο ταῦτα
  english_pob_choice: These two things
  chosen_spanish: Estas dos cosas
  alternatives_spanish:
  - Estos dos hechos
  - Estas dos cosas
  lexicon: τὰ δύο ταῦτα
  rationale: El demostrativo plural neutro se rinde de forma natural como «estas dos cosas», manteniendo la referencia general sin añadir precisión inexistente en el griego.
- source_word: ἀφιστῶσι
  english_pob_choice: turn ... away
  chosen_spanish: desvían
  alternatives_spanish:
  - alejan
  - apartan
  - desvían
  lexicon: ἀφίστημι
  rationale: El verbo expresa apartar o hacer que algo se desvíe; «desvían» comunica con naturalidad el alejamiento mental en español sin perder la fuerza del movimiento de separación.
- source_word: τὴν διάνοιαν τοῦ ἀνθρώπου
  english_pob_choice: a man's mind
  chosen_spanish: la mente del hombre
  alternatives_spanish:
  - el pensamiento del hombre
  - la mente del hombre
  - la disposición mental del hombre
  lexicon: διάνοια
  rationale: «διάνοια» abarca mente/pensamiento/disposición mental; aquí «mente» conserva la lectura amplia del inglés POB y suena idiomática en español. Se mantiene «del hombre» para reflejar el genitivo antropológico sin sobreinterpretarlo.
theological_decisions:
- issue: Alcance antropológico de «τοῦ ἀνθρώπου»
  english_pob_reading: a man's mind
  chosen_spanish_reading: la mente del hombre
  alternative_spanish_readings:
  - la mente humana
  - la mente de un hombre
  rationale: La frase griega es genérica y no exige singular enfático ni universal abstracto; «del hombre» preserva el valor antropológico general del texto sin introducir una formulación doctrinal nueva.
  doctrine_reference: Antropología bíblica general
translation_notes:
  revision_awareness: El texto inglés POB más reciente ya fijó la frase como «These two things turn a man's mind away», suprimiendo la marca de nota anterior y manteniendo «mind» y «man». La versión española sigue ese estado revisado sin reintroducir notas ni desplazamientos de sentido.
  spanish_consistency_notes:
  - Se conserva «mente» para διάνοια, coherente con el inglés POB «mind».
  - No se introduce «SEÑOR» ni terminología teológica no presente en este versículo.
  - 'El orden español se ajusta a una lectura natural: sujeto + verbo + complemento, sin calco rígido del inglés.'
