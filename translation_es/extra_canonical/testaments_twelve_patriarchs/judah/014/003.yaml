translation:
  language: es
  text: Porque, si bebes vino hasta la embriaguez, turba tu mente con pensamientos inmundos, y enciende tu cuerpo hacia la inmoralidad sexual por el placer, y comete pecado y no se avergüenza.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πίῃς ... οἶνον εἰς μέθην
  english_pob_choice: drink wine to drunkenness
  chosen_spanish: bebes vino hasta la embriaguez
  alternatives_spanish:
  - bebes vino para emborracharte
  - bebes vino en exceso hasta la borrachera
  lexicon: οἶνος; μέθη
  rationale: Conservo la relación directa entre vino y embriaguez sin suavizarla. 'Hasta la embriaguez' mantiene el valor resultativo de εἰς μέθην y suena natural en español bíblico contemporáneo.
- source_word: ἐν διαλογισμοῖς ῥυπαροῖς
  english_pob_choice: with filthy thoughts
  chosen_spanish: con pensamientos impuros
  alternatives_spanish:
  - con pensamientos sucios
  - con razonamientos impuros
  lexicon: διαλογισμός; ῥυπαρός
  rationale: '''Pensamientos impuros'' comunica bien el contenido moral de la frase y evita un calco demasiado áspero. ''Impuros'' preserva la carga ética de ῥυπαροῖς mejor que una simple referencia a suciedad física.'
- source_word: τὸν νοῦν σου
  english_pob_choice: your mind
  chosen_spanish: tu mente
  alternatives_spanish:
  - tu entendimiento
  - tu intelecto
  lexicon: νοῦς
  rationale: '''Mente'' es la equivalencia más natural y amplia en español para νοῦς en este contexto, manteniendo la referencia a la facultad interior que queda perturbada.'
- source_word: εἰς πορνείαν
  english_pob_choice: for sexual immorality
  chosen_spanish: para la fornicación
  alternatives_spanish:
  - para inmoralidad sexual
  - hacia la inmoralidad sexual
  lexicon: πορνεία
  rationale: Conservo el término tradicional 'fornicación' porque refleja el peso lexical concreto de πορνεία y mantiene una distinción útil en registros bíblicos. En español moderno puede sonar más estrecho, pero aquí la frase apunta a conducta sexual ilícita de forma fuerte y directa.
- source_word: ἐκθερμαίνει
  english_pob_choice: heats ... toward pleasure
  chosen_spanish: enciende ... hacia el placer
  alternatives_spanish:
  - calienta ... hacia el placer
  - inflama ... hacia el placer
  lexicon: ἐκθερμαίνω
  rationale: '''Enciende'' comunica la imagen de excitación/incitación del verbo mejor que un simple ''calienta''. Mantengo ''hacia el placer'' como complemento de dirección, siguiendo el sentido causal y orientado del griego y del audit trail inglés.'
- source_word: ἡδονήν
  english_pob_choice: pleasure
  chosen_spanish: el placer
  alternatives_spanish:
  - el deleite
  - el goce
  lexicon: ἡδονή
  rationale: '''Placer'' es la traducción más directa y transparente para ἡδονή aquí. No introduzco una moralización adicional que el texto no exige; el contexto ya establece el matiz negativo.'
- source_word: πράσσει τὴν ἁμαρτίαν
  english_pob_choice: it commits sin
  chosen_spanish: comete pecado
  alternatives_spanish:
  - practica el pecado
  - hace pecado
  lexicon: πράσσω; ἁμαρτία
  rationale: '''Comete pecado'' reproduce bien el valor verbal de πράσσει en un registro bíblico claro y natural. ''Pecado'' conserva la sustantivación general sin forzar una explicación adicional.'
- source_word: οὐκ αἰσχύνεται
  english_pob_choice: is not ashamed
  chosen_spanish: no se avergüenza
  alternatives_spanish:
  - no siente vergüenza
  - no se sonroja
  lexicon: αἰσχύνομαι
  rationale: La forma reflexiva es la más idiomática en español y preserva el juicio moral del final de la frase. Mantiene el paralelismo con la falta de vergüenza del sujeto personificado.
theological_decisions:
- issue: 'φράση sexualmente moralizante: πορνεία / sexual immorality'
  english_pob_reading: for sexual immorality
  chosen_spanish_reading: para la fornicación
  alternative_spanish_readings:
  - para inmoralidad sexual
  - para conducta sexual ilícita
  rationale: La POB inglesa optó por una formulación semántica amplia. En español, 'fornicación' conserva una tradición bíblica precisa y el peso moral de πορνεία; no lo reduzco a un acto particular ni lo diluyo en una paráfrasis.
  doctrine_reference: Lexical morality language; purity/sexual ethics in biblical admonition
translation_notes:
  revision_awareness: The latest revision pass reported the English POB text as unchanged and no applied revisions. This draft therefore follows the audited English rendering closely while checking it against the Greek source for lexical force and Spanish naturalness.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva el tono admonitorio y la personificación del efecto del vino sobre la mente y el cuerpo.
  - No se añaden notas textuales porque el paquete fuente no reporta variantes relevantes para este versículo.
