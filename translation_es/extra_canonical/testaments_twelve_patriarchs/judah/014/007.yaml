translation:
  language: es
  text: 'Porque el que bebe vino, hijos míos, necesita mucho entendimiento, y este es el entendimiento para beber vino: mientras todavía tenga vergüenza, que beba.[a]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Vergüenza» traduce aquí αἰδώς; puede entenderse también como «pudor» o «recato». Se conserva «vergüenza» porque refleja la elección inglesa y mantiene el matiz moral fuerte del griego.
    reason: lexical_alternative
lexical_decisions:
- source_word: Συνέσεως ... χρήζει
  english_pob_choice: has need of much understanding
  chosen_spanish: necesita mucho entendimiento
  alternatives_spanish:
  - requiere mucho entendimiento
  - tiene necesidad de mucho entendimiento
  lexicon: σύνεσις; χρήζω
  rationale: Conservo la idea de necesidad y la cualidad intelectual/práctica de σύνεσις con el sustantivo natural «entendimiento», que comunica bien en español el juicio prudente que el contexto exige.
- source_word: ὁ πίνων τὸν οἶνον
  english_pob_choice: the one who drinks wine
  chosen_spanish: el que bebe vino
  alternatives_spanish:
  - el que toma vino
  - el bebedor de vino
  lexicon: πίνω; οἶνος
  rationale: «Bebe vino» es la forma más idiomática y directa en español, sin perder el valor descriptivo del participio griego.
- source_word: τέκνα μου
  english_pob_choice: my children
  chosen_spanish: hijos míos
  alternatives_spanish:
  - mis hijos
  - hijitos míos
  lexicon: τέκνα
  rationale: «Hijos míos» conserva la apelación afectuosa y vocativa del griego con un registro natural y reverente.
- source_word: ἡ σύνεσις τῆς ... οἰνοποσίας
  english_pob_choice: the understanding for drinking wine
  chosen_spanish: el entendimiento para beber vino
  alternatives_spanish:
  - la prudencia para beber vino
  - la manera sabia de beber vino
  lexicon: σύνεσις; οἰνοποσία
  rationale: Mantengo «entendimiento» para reflejar la elección inglesa y el sustantivo conceptual del original; «para beber vino» expresa el genitivo de finalidad/relación sin sobreinterpretarlo.
- source_word: ἕως ὅτε ἔχει αἰδῶ
  english_pob_choice: as long as he still has shame
  chosen_spanish: mientras todavía tenga vergüenza
  alternatives_spanish:
  - mientras aún conserve pudor
  - mientras todavía tenga recato
  lexicon: αἰδώς
  rationale: «Vergüenza» reproduce la decisión inglesa y puede abarcar el sentido de pudor/recato del griego; se conserva la tensión moral del término sin suavizarlo en exceso.
- source_word: πίνει
  english_pob_choice: let him drink
  chosen_spanish: que beba
  alternatives_spanish:
  - beba
  - puede beber
  lexicon: πίνω
  rationale: La forma exhortativa «que beba» refleja el imperativo final del griego y mantiene el tono normativo del pasaje.
theological_decisions:
- issue: Sentido moral de la instrucción sobre el vino
  english_pob_reading: a prudent rule for drinking wine, linked to shame/pudor as restraint
  chosen_spanish_reading: una regla prudente para beber vino, vinculada a la vergüenza/pudor como freno moral
  alternative_spanish_readings:
  - una norma de templanza para beber vino
  - una instrucción sobre el beber con pudor
  rationale: El pasaje no condena el vino en sí; ofrece una regla de moderación. Mantengo la ambigüedad productiva de αἰδώς entre vergüenza y pudor, porque el español debe conservar el componente moral y social del término.
  doctrine_reference: Sabiduría práctica y templanza en la conducta; no introduce una doctrina sacramental ni ascética ajena al texto.
translation_notes:
  revision_awareness: La revisión más reciente dejó el versículo sin cambios; por tanto, esta versión española sigue de cerca la lectura inglesa auditada y el texto griego transmitido, sin introducir variantes textuales adicionales.
  spanish_consistency_notes:
  - Se usa «vino» de forma literal para οἶνος y no se sustituye por un término genérico.
  - Se mantiene «entendimiento» como término conceptual principal, coherente con la elección inglesa POB.
  - Se conserva el vocativo «hijos míos» para el tono paternal del pasaje.
  - La nota al pie marca la ambigüedad de αἰδώς sin alterar el cuerpo del texto.
