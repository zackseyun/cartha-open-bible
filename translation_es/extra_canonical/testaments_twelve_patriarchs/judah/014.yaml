  text: XIV. Καὶ νῦν λέγω¹ ὑμῖν, τέκνα μου, μὴ μεθύσκεσθε² οἴνῳ, ὅτι³ ὁ οἶνος διαστρέφει⁴ τὸν νοῦν ἀπὸ τῆς ἀληθείας καὶ ἐμβάλλει ὀργὴν ἐπιθυμίας, καὶ ὁδηγεῖ εἰς πλάνην⁷ τοὺς ὀφθαλμούς⁸. 2. Τὸ γὰρ πνεῦμα⁹ τῆς πορνείας τὸν οἶνον ὡς¹¹ διάκονον ἔχει πρὸς τὴν ἡδονὴν¹² τοῦ νοός. ὅτι καίγε τὰ δύο ταῦτα ἀφιστῶσι τὴν διάνοιαν¹⁵ τοῦ ἀνθρώπου. 3. Ἐὰν γὰρ πίῃ τις οἶνον εἰς μέθην, ἐν διαλογισμοῖς ῥυπαροῖς συνταράσσει¹⁷ τὸν νοῦν σου¹⁸, καὶ εἰς πορνείαν ἐκθερμαίνει²⁰ τὸ σῶμα πρὸς ἡδονήν, καὶ²¹ πράσσει τὴν ἁμαρτίαν²² καὶ οὐκ αἰσχύνεται. 4. Τοιοῦτός²³ ἐστιν ὁ πάροινος²⁴, τέκνα μου, ὅτι ὁ μεθύων²⁵ οὐκ αἰδεῖται οὐδένα²⁷. 5. *Ἰδοὺ γὰρ κἀμὲ ἐπλάνησεν²⁹ μὴ αἰσχυνθῆναι τὸ πλῆθος³⁰ πόλεως⁴⁹ ὅτι ἐν⁵¹ ὀφθαλμῶν πάντων ἐξέκλινα πρὸς τὴν Θαμὰρ, καὶ ἐποίησα ἁμαρτίαν³² μεγάλην³³, καὶ ἀνεκάλυψα τὸ κάλυμμα ἀκαθαρσίας υἱῶν μου³⁴. 6. Πιὼν³⁵ τὸν οἶνον³⁶ οὐκ ᾐσχύνθην³⁷ τὴν³⁸ ἐντολὴν τοῦ Θεοῦ, καὶ ἔλαβον γυναῖκα Χαναναίαν³⁹. 7. Πολλὴ⁴⁰ γὰρ⁴¹ τῷ πίνοντι οἶνον⁴², τέκνα μου⁴³, καὶ αὕτη ἐστὶν ἡ σύνεσις⁴⁴ τῆς οἰνοποσίας, *ἕως ὅτε
    ἔχει αἰδῶ⁴⁵, πίνει. 8. Ἐὰν δὲ παρέλθῃ⁴⁶ τὸν ὅρον, ἐμβάλλει⁴⁸ εἰς⁴⁹ τὸν νοῦν αὐτοῦ⁵⁰ τὸ πνεῦμα τῆς πλάνης, καὶ ποιεῖ τὸν μέθυσον αἰσχρορρημονεῖν⁵¹ καὶ παρανομεῖν καὶ μὴ αἰσχύνεσθαι ἀλλὰ καυχᾶσθαι⁵³ τῇ ἀτιμίᾳ⁵⁴ καὶ νομίζειν εἶναι καλόν⁵⁵.
