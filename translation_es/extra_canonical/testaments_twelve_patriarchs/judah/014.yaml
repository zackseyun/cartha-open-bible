translation:
  language: es
  text: 'Y ahora os digo, hijos míos, no os embriaguéis con vino, porque el vino desvía la mente de la verdad y arroja ira de deseo, y lleva los ojos al extravío.



    Porque el espíritu de fornicación tiene al vino como servidor[a] para el placer de la mente. Porque aun estas dos cosas apartan la comprensión del hombre.



    Porque si alguno bebe vino hasta la embriaguez, en pensamientos inmundos trastorna tu mente y enciende el cuerpo hacia la inmoralidad sexual por el placer, y comete pecado y no se avergüenza.



    Tal es el bebedor de vino, hijos míos, porque el borracho no respeta a nadie. Porque he aquí, eso también me desvió, de modo que no me avergoncé ante la multitud de la ciudad. A la vista de todos me aparté hacia Tamar, e hice un gran pecado, y descubrí el velo de impureza de mis hijos.



    Después de beber el vino, no me avergoncé del mandamiento de Dios, y tomé una mujer cananea.



    Porque quien bebe vino, hijos míos, necesita mucho entendimiento, y esta es la comprensión del beber vino: mientras todavía conserve vergüenza, beba. Pero si sigue hasta pasar el límite, un espíritu de engaño entra en su mente y hace al borracho hablar vergonzosamente y obrar sin ley y no avergonzarse, sino aun gloriarse en su deshonra y pensar que es bueno.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «siervo». Se evita aquí porque el griego διάκονον subraya función de servicio/instrumentalidad más que oficio eclesiástico.'
    reason: lexical_alternative
lexical_decisions:
- source_word: νοῦς / νοῦν
  english_pob_choice: mind
  chosen_spanish: mente
  alternatives_spanish:
  - entendimiento
  - pensamiento
  lexicon: LSJ / BDAG
  rationale: En el pasaje la facultad afectada por el vino es la sede del juicio moral y la percepción; 'mente' es natural en español y permite mantener el contraste con 'verdad', 'engaño' y 'pensamientos inmundos'.
- source_word: ἀλήθεια
  english_pob_choice: truth
  chosen_spanish: verdad
  alternatives_spanish:
  - realidad
  - veracidad
  lexicon: BDAG
  rationale: '''Verdad'' es el equivalente directo y conserva el contraste moral con el extravío producido por el vino.'
- source_word: ἐμβάλλει ὀργὴν ἐπιθυμίας
  english_pob_choice: throws ... into turmoil / ira de deseo
  chosen_spanish: arroja ira de deseo
  alternatives_spanish:
  - despierta ira de deseo
  - lanza furor de deseo
  lexicon: LSJ
  rationale: La secuencia griega es dura y poco idiomática; 'arroja ira de deseo' conserva la fuerza y la extrañeza del original sin suavizarla en exceso.
- source_word: πλάνη
  english_pob_choice: error / deception
  chosen_spanish: extravío
  alternatives_spanish:
  - engaño
  - error
  lexicon: BDAG
  rationale: En 'lleva los ojos al extravío' el problema es el desvío moral y perceptivo; 'extravío' mantiene la idea de apartarse del camino.
- source_word: πνεῦμα τῆς πορνείας
  english_pob_choice: the spirit of fornication
  chosen_spanish: el espíritu de fornicación
  alternatives_spanish:
  - el espíritu de inmoralidad sexual
  - el espíritu de impureza sexual
  lexicon: BDAG
  rationale: Se conserva la personificación explícita del griego y el vocabulario tradicional del texto, que luego se explica con 'inmoralidad sexual' para claridad contextual.
- source_word: διάκονον
  english_pob_choice: servant
  chosen_spanish: servidor
  alternatives_spanish:
  - siervo
  - ministro
  lexicon: LSJ
  rationale: '''Servidor'' comunica la idea instrumental de alguien/algo que sirve a otro, sin introducir jerarquías eclesiásticas ajenas al contexto.'
- source_word: ἡδονή
  english_pob_choice: pleasure
  chosen_spanish: placer
  alternatives_spanish:
  - deleite
  - gozo
  lexicon: BDAG
  rationale: '''Placer'' conserva el sentido sensorial y moral del pasaje, en contraste con la comprensión y la vergüenza.'
- source_word: διάνοια
  english_pob_choice: understanding
  chosen_spanish: comprensión
  alternatives_spanish:
  - mente
  - discernimiento
  lexicon: LSJ
  rationale: '''Comprensión'' reproduce el matiz cognitivo-moral que la POB inglesa destacó como ''understanding'', y suena natural en español contemporáneo.'
- source_word: συνταράσσει
  english_pob_choice: throws ... into turmoil
  chosen_spanish: trastorna
  alternatives_spanish:
  - sacude
  - perturba
  lexicon: LSJ
  rationale: '''Trastorna'' condensa la fuerza del verbo compuesto y expresa alteración mental intensa en español idiomático.'
- source_word: ῥυπαροῖς διαλογισμοῖς
  english_pob_choice: filthy thoughts
  chosen_spanish: pensamientos inmundos
  alternatives_spanish:
  - pensamientos sucios
  - pensamientos impuros
  lexicon: BDAG
  rationale: La fórmula mantiene la veta moral de 'filthy' y el tono bíblico del adjetivo, sin volverla demasiado coloquial.
- source_word: πρὸς ἡδονήν
  english_pob_choice: toward pleasure
  chosen_spanish: hacia el placer
  alternatives_spanish:
  - para el placer
  - al placer
  lexicon: LSJ
  rationale: La preposición indica orientación; 'hacia' conserva esa direccionalidad del impulso corporal.
- source_word: πάροινος / ὁ μεθύων
  english_pob_choice: wine-drinker / one who gets drunk
  chosen_spanish: bebedor de vino / se embriaga
  alternatives_spanish:
  - borracho
  - ebrio
  lexicon: LSJ
  rationale: Se distingue entre la caracterización habitual ('bebedor de vino') y el acto de embriagarse ('se embriaga'), tal como hace el griego.
- source_word: οὐκ αἰδεῖται οὐδένα
  english_pob_choice: respects no one
  chosen_spanish: no tiene respeto por nadie
  alternatives_spanish:
  - no se avergüenza de nadie
  - no respeta a nadie
  lexicon: LSJ
  rationale: La frase española preserva tanto la pérdida de deferencia social como la dimensión moral de la vergüenza sin reducirla a un solo matiz.
- source_word: πλῆθος πόλεως
  english_pob_choice: multitude of the city
  chosen_spanish: multitud de la ciudad
  alternatives_spanish:
  - muchedumbre de la ciudad
  - gente de la ciudad
  lexicon: LSJ
  rationale: Se conserva la expresión pública y colectiva del escenario de la confesión de Judá.
- source_word: ἐξέκλινα πρὸς τὴν Θαμάρ
  english_pob_choice: I turned aside to Tamar
  chosen_spanish: me aparté hacia Tamar
  alternatives_spanish:
  - me desvié hacia Tamar
  - me incliné hacia Tamar
  lexicon: LSJ
  rationale: '''Me aparté'' mantiene la idea moral de desviación sin forzar una imagen demasiado literal en español.'
- source_word: ἀνεκάλυψα τὸ κάλυμμα ἀκαθαρσίας υἱῶν μου
  english_pob_choice: I uncovered the covering of uncleanness of my sons
  chosen_spanish: descubrí el velo de impureza de mis hijos
  alternatives_spanish:
  - descubrí el velo de inmundicia de mis hijos
  - descorrí la cubierta de impureza de mis hijos
  lexicon: LSJ
  rationale: La frase griega es oscura y metafórica; se conserva el 'velo/cobertura' para no resolver interpretativamente la imagen, mientras 'impureza' hace el español más claro que una calca rígida.
- source_word: ἐντολή τοῦ Θεοῦ
  english_pob_choice: commandment of God
  chosen_spanish: mandamiento de Dios
  alternatives_spanish:
  - mandato de Dios
  - precepto de Dios
  lexicon: BDAG
  rationale: '''Mandamiento'' reproduce bien el registro moral elevado del pasaje y la terminología bíblica tradicional sin desfigurarla.'
- source_word: συνέσις
  english_pob_choice: understanding
  chosen_spanish: entendimiento
  alternatives_spanish:
  - discernimiento
  - inteligencia
  lexicon: LSJ
  rationale: Aquí el sustantivo apunta a prudencia y juicio práctico; 'entendimiento' mantiene la continuidad con el campo semántico de la primera mitad del pasaje.
- source_word: αἰδώς
  english_pob_choice: shame
  chosen_spanish: vergüenza
  alternatives_spanish:
  - pudor
  - recato
  lexicon: LSJ
  rationale: '''Vergüenza'' conserva la repetición temática del texto sobre la pérdida de contención bajo la embriaguez.'
- source_word: ὅρος
  english_pob_choice: limit
  chosen_spanish: límite
  alternatives_spanish:
  - medida
  - frontera
  lexicon: LSJ
  rationale: El contexto trata del punto hasta donde se puede beber; 'límite' es claro y exacto.
- source_word: πνεῦμα τῆς πλάνης
  english_pob_choice: a spirit of deception
  chosen_spanish: un espíritu de engaño
  alternatives_spanish:
  - un espíritu de error
  - un espíritu de extravío
  lexicon: BDAG
  rationale: Se conserva la personificación del griego y se elige 'engaño' porque expresa tanto error intelectual como desvío moral en español.
- source_word: αἰσχρορημονεῖν
  english_pob_choice: speak shamefully
  chosen_spanish: hablar vergonzosamente
  alternatives_spanish:
  - hablar obscenamente
  - hablar deshonrosamente
  lexicon: LSJ
  rationale: El verbo raro describe lenguaje deshonroso; 'hablar vergonzosamente' refleja bien el campo de la vergüenza central en el capítulo.
- source_word: παρανομεῖν
  english_pob_choice: act lawlessly
  chosen_spanish: obrar sin ley
  alternatives_spanish:
  - actuar ilegalmente
  - transgredir
  lexicon: BDAG
  rationale: '''Obrar sin ley'' sigue de cerca el griego y conserva el contraste con el mandamiento de Dios.'
- source_word: καυχᾶσθαι ἐν τῇ ἀτιμίᾳ
  english_pob_choice: boast in his dishonor
  chosen_spanish: gloriarse en su deshonra
  alternatives_spanish:
  - jactarse de su deshonra
  - vanagloriarse en su deshonra
  lexicon: BDAG
  rationale: '''Gloriarse'' reproduce el verbo de autoexaltación y ''deshonra'' conserva la inversión moral del texto.'
theological_decisions:
- issue: Personificación del espíritu que obra en la borrachera
  english_pob_reading: a spirit of deception enters into his mind
  chosen_spanish_reading: un espíritu de engaño entra en su mente
  alternative_spanish_readings:
  - un espíritu de error entra en su mente
  - el engaño entra en su mente
  rationale: Se mantiene la presencia explícita de 'espíritu' porque el griego la presenta así; no se deshace en una mera abstracción. 'Engaño' preserva el efecto moral sin fijar más demonología de la que el texto ofrece.
  doctrine_reference: DOCTRINE.md §Preserve theological tension rather than resolve it
- issue: La frase oscura sobre 'el velo de impureza de mis hijos'
  english_pob_reading: I uncovered the covering of uncleanness of my sons
  chosen_spanish_reading: descubrí el velo de impureza de mis hijos
  alternative_spanish_readings:
  - descubrí la cobertura de impureza de mis hijos
  - exhibí la vergüenza de mis hijos
  rationale: La formulación española conserva la dificultad y la imagen del original, evitando una interpretación demasiado precisa de una frase que sigue siendo ambigua en griego.
  doctrine_reference: PHILOSOPHY.md §transparent lexical decisions
translation_notes:
  revision_awareness: He tenido en cuenta el pasaje griego primario (columna α) y el ajuste de la revisión inglesa más reciente, especialmente donde la POB afinó matices como 'respects no one' y 'speak shamefully'. La versión española intenta reflejar esos refinamientos sin perder la tensión léxica documentada en el audit trail, y conserva la ambigüedad del sintagma final sobre el 'velo/cobertura' para mantener la transparencia textual.
  spanish_consistency_notes:
  - Uso 'Yahvé' no aplica aquí porque el texto griego cita 'Dios' (Θεός), no el tetragrama.
  - Distingo 'entendimiento' y 'comprensión' para conservar el campo semántico de διάνοια / σύνεσις sin borrar la repetición temática.
  - Mantengo 'fornicación' y 'inmoralidad sexual' en pasajes cercanos para preservar el registro del testamento y a la vez dar claridad al lector moderno.
  - '''Bebedor de vino'' se reserva para el carácter habitual; ''se embriaga'' para el acto puntual, siguiendo la distinción del griego.'
