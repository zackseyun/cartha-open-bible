  revised_spanish_text: 'Y ahora os digo, hijos míos, no os embriaguéis con vino, porque el vino desvía la mente de la verdad y arroja ira de deseo, y lleva los ojos al extravío.



    Porque el espíritu de fornicación tiene al vino como servidor[a] para el placer de la mente. Porque aun estas dos cosas apartan la comprensión del hombre.



    Porque si alguno bebe vino hasta la embriaguez, en pensamientos inmundos trastorna tu mente y enciende el cuerpo hacia la inmoralidad sexual por el placer, y comete pecado y no se avergüenza.



    Tal es el bebedor de vino, hijos míos, porque el borracho no respeta a nadie. Porque he aquí, eso también me desvió, de modo que no me avergoncé ante la multitud de la ciudad. A la vista de todos me aparté hacia Tamar, e hice un gran pecado, y descubrí el velo de impureza de mis hijos.



    Después de beber el vino, no me avergoncé del mandamiento de Dios, y tomé una mujer cananea.



    Porque quien bebe vino, hijos míos, necesita mucho entendimiento, y esta es la comprensión del beber vino: mientras todavía conserve vergüenza, beba. Pero si sigue hasta pasar el límite, un espíritu de engaño entra en su mente y hace al borracho hablar vergonzosamente y obrar sin ley y no avergonzarse, sino aun gloriarse en su deshonra y pensar que es bueno.'
