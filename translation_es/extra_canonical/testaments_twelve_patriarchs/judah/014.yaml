base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/014.yaml
  text: 'These two things turn away a man''s mind[a]. For if you drink wine to drunkenness, it throws your mind into turmoil with filthy thoughts, and heats your body toward pleasure for sexual immorality, and it commits sin and is not ashamed.


    Such is the wine-drinker, my children, because the one who gets drunk respects no one. For see, it also led me astray, so that I was not ashamed before the multitude of the city. In the sight of all I turned aside to Tamar, and I committed a great sin, and I uncovered the covering of uncleanness of my sons.


    After drinking wine, I was not ashamed of the commandment of God, and I took a Canaanite woman. For the one who drinks wine, my children, has need of much understanding, and this is the understanding for drinking wine: as long as he still has shame, let him drink. But if he goes on until he passes the limit, a spirit of deception enters into his mind and makes the drunkard speak shamefully and act lawlessly and feel no shame[c][b], but even boast in his dishonor and think it good.'
  footnotes:
  - marker: a
    text: Or 'I exposed the shameful covering of my sons.' The Greek phrase is difficult and may refer to bringing family uncleanness into the open through Judah's sin with Tamar.
    reason: lexical_alternative
  - marker: b
    text: The wording 'as long as he still has shame, let him drink' presents moderation in terms of retained self-restraint; the point is that once shame is lost, drunkenness has overtaken him.
    reason: cultural_note
  - marker: c
    text: Or 'a spirit of error enters his mind.'
    reason: lexical_alternative
