translation:
  language: es
  text: Y si Dan, mi hermano, no hubiera peleado junto a mí,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Καὶ εἰ μὴ
  english_pob_choice: And if ... had not
  chosen_spanish: Y si ... no hubiera
  alternatives_spanish:
  - Y si ... no hubiera sido
  - Y si ... no hubiese
  lexicon: καί; εἰ μή
  rationale: Conserva la estructura condicional negativa del griego y del inglés POB sin sobrerregularizarla. En español, 'Y si ... no hubiera' expresa bien la contrafactualidad pasada.
- source_word: Δὰν ὁ ἀδελφός μου
  english_pob_choice: Dan my brother
  chosen_spanish: Dan, mi hermano
  alternatives_spanish:
  - Dan mi hermano
  - mi hermano Dan
  lexicon: Δάν; ἀδελφός
  rationale: Mantiene el vocativo/aposición natural en español con coma. 'Mi hermano' preserva la relación fraterna explícita del original.
- source_word: συνεμάχησεν
  english_pob_choice: had ... fought alongside me
  chosen_spanish: hubiera peleado junto a mí
  alternatives_spanish:
  - hubiera combatido junto a mí
  - hubiera luchado a mi lado
  lexicon: συμμαχέω
  rationale: El verbo indica combatir en alianza o al lado de alguien; 'pelear junto a mí' comunica esa idea con naturalidad. 'Combatido' o 'luchado' son alternativas válidas, pero 'pelear' mantiene un registro claro y bíblico sin volverse arcaico.
theological_decisions:
- issue: Relación de alianza/fidelidad fraterna en el combate
  english_pob_reading: fought alongside me
  chosen_spanish_reading: peleado junto a mí
  alternative_spanish_readings:
  - combatido junto a mí
  - luchado a mi lado
  rationale: No se introduce un matiz adicional como 'apoyarme' o 'defenderme'; la frase permanece en el plano concreto del combate junto a otro, que es lo que el griego y el POB inglés presentan.
  doctrine_reference: Narrative/historical wording; no doctrinal expansion
translation_notes:
  revision_awareness: 'La versión inglesa POB más reciente permanece sin cambios (''unchanged: true''), por lo que no hay revisiones editoriales que absorber. El español sigue de cerca el valor condicional negativo del griego y la relación fraterna explícita, sin añadir elementos ausentes en la fuente.'
  spanish_consistency_notes:
  - Se evita 'SEÑOR' u otras sustituciones no pertinentes porque el texto no contiene un nombre divino.
  - Se prefiere 'peleado junto a mí' sobre una forma más literal pero menos natural como 'combatido conmigo' para mantener lectura pública fluida sin perder el sentido del verbo griego.
