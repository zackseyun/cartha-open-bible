translation:
  language: es
  text: Y nos acercamos a Thamna, donde estaba todo su equipaje.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Καὶ ἐπροσεγγίσαμεν
  english_pob_choice: And we drew near
  chosen_spanish: Y nos acercamos
  alternatives_spanish:
  - Y nos aproximamos
  - Y llegamos cerca
  lexicon: προσεγγίζω
  rationale: El griego expresa un movimiento de acercamiento, no necesariamente la llegada plena; «nos acercamos» conserva ese matiz natural en español.
- source_word: τῇ Θάμνῃ
  english_pob_choice: to Thamna
  chosen_spanish: a Thamna
  alternatives_spanish:
  - a Tamna
  - a Thamna
  lexicon: topónimo propio
  rationale: Se mantiene el nombre propio transliterado de la forma establecida en el contexto inglés; no hay base suficiente en este pasaje para sustituirlo por una forma castellanizada distinta.
- source_word: ἐν ᾗ
  english_pob_choice: where
  chosen_spanish: donde
  alternatives_spanish:
  - en la cual
  - en la que
  lexicon: adverbio relativo locativo
  rationale: «Donde» reproduce de modo claro y fluido la relación locativa del relativo griego.
- source_word: πᾶσα ἡ ἀποσκευὴ
  english_pob_choice: all their baggage
  chosen_spanish: todo su equipaje
  alternatives_spanish:
  - todas sus pertenencias
  - todo su bagaje
  lexicon: ἀποσκευή
  rationale: Ἀποσκευή denota el equipaje o bagaje llevado consigo; «equipaje» es el equivalente más natural y preciso en español contemporáneo.
- source_word: τῶν πολεμίων βασιλέων
  english_pob_choice: their baggage
  chosen_spanish: su equipaje
  alternatives_spanish:
  - el equipaje de los reyes enemigos
  - el bagaje de los reyes enemigos
  lexicon: βασιλεῖς / πολέμιος
  rationale: El posesivo plural del inglés refleja a los reyes enemigos mencionados por el griego; en español se explicita en la nota léxica sin recargar el cuerpo principal, que mantiene la concisión del relato.
theological_decisions:
- issue: Titulación de los reyes como enemigos
  english_pob_reading: their baggage
  chosen_spanish_reading: su equipaje
  alternative_spanish_readings:
  - el equipaje de sus enemigos
  - el equipaje de los reyes enemigos
  rationale: El texto griego identifica a los reyes como πολεμίων βασιλέων, pero la oración principal focaliza el hallazgo del equipaje. En el cuerpo se conserva la referencia simple y la precisión del grupo poseedor puede explicitarse en una nota si se requiere.
  doctrine_reference: No aplica; decisión de precisión referencial y estilo narrativo.
translation_notes:
  revision_awareness: 'La versión inglesa auditada permanece sin cambios (“unchanged: true”), y no hay notas previas ni revisiones aplicadas; por eso la propuesta española sigue de cerca el sentido directo del griego y del inglés POB sin introducir elementos adicionales.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo exige; aquí no aparece el tetragrámaton ni una cita del nombre divino.
  - Se mantiene «Thamna» como topónimo propio siguiendo la forma auditada del inglés POB.
  - «Equipaje» conserva el valor concreto de ἀποσκευή sin elevarlo a un sentido más abstracto.
