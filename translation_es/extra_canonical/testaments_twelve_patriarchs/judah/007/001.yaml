translation:
  language: es
  text: Y al día siguiente se nos dijo que el rey de la ciudad de Gaas venía contra nosotros con una gran multitud.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Καὶ τῇ ἑξῆς
  english_pob_choice: And on the next day
  chosen_spanish: Y al día siguiente
  alternatives_spanish:
  - Y al día siguiente
  - Y al día siguiente,
  lexicon: καί; ἑξῆς
  rationale: La secuencia temporal se expresa de forma natural en español con «al día siguiente», que conserva el valor de continuidad del griego sin sobrecargar la frase.
- source_word: ἐρρέθη πρὸς ἡμᾶς
  english_pob_choice: it was reported to us
  chosen_spanish: se nos dijo
  alternatives_spanish:
  - nos fue dicho
  - se nos informó
  lexicon: λέγω (passive); πρός + accusative
  rationale: El pasivo impersonal transmite bien el sentido de recepción del mensaje. «Se nos dijo» es más directo y bíblico en español que una perífrasis más pesada, y mantiene la voz pasiva del original.
- source_word: Γαὰς πόλεως
  english_pob_choice: the city of Gaas
  chosen_spanish: la ciudad de Gaas
  alternatives_spanish:
  - la ciudad de Gaas
  - de la ciudad de Gaas
  lexicon: πόλις
  rationale: Se conserva el topónimo transliterado y la relación posesiva simple «la ciudad de Gaas», que refleja con claridad el genitivo griego.
- source_word: βασιλεὺς
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el rey
  - el gobernante
  lexicon: βασιλεύς
  rationale: «Rey» es la equivalencia directa y más transparente para βασιλεύς en este contexto narrativo.
- source_word: ἐν λαῷ πολλῷ
  english_pob_choice: with a great multitude
  chosen_spanish: con una gran multitud
  alternatives_spanish:
  - con mucha gente
  - con una gran muchedumbre
  lexicon: λαός; πολύς
  rationale: «Multitud» mantiene la densidad colectiva del griego y coincide bien con el uso narrativo de un gran grupo armado o acompañante.
- source_word: ἔρχεται πρὸς ἡμᾶς
  english_pob_choice: was coming against us
  chosen_spanish: venía contra nosotros
  alternatives_spanish:
  - venía hacia nosotros
  - se acercaba contra nosotros
  lexicon: ἔρχομαι + πρός
  rationale: La preposición πρός con sentido hostil queda mejor captada por «contra nosotros», como en la lectura inglesa auditada. «Venía» expresa el imperfecto de acción en curso.
theological_decisions:
- issue: Hostilidad implícita en πρὸς ἡμᾶς
  english_pob_reading: was coming against us
  chosen_spanish_reading: venía contra nosotros
  alternative_spanish_readings:
  - venía hacia nosotros
  - se acercaba a nosotros
  rationale: Aunque el griego literalmente dice «hacia nosotros», el contexto de conflicto y el audit trail inglés muestran que el movimiento es amenazante. «Contra nosotros» preserva ese matiz sin añadir contenido ajeno.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La versión inglesa auditada permanece sin cambios en la última revisión; no se documentan variantes textuales o decisiones léxicas adicionales que requieran nota. La traducción española sigue directamente el griego principal y el matiz contextual reflejado en la versión inglesa.
  spanish_consistency_notes:
  - Se mantiene el tratamiento narrativo sobrio y lineal propio del pasaje.
  - Se conserva el topónimo «Gaas» sin adaptación adicional.
  - No se introducen términos doctrinales ajenos al texto breve.
