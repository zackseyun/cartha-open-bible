id: T12P.JUD.7.2
reference: Testament of Judah 7:2
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (Judah source-fix v2 — T12P Pass A; α-column primary, apparatus stripped)
  text: Ἐγὼ δὲ καὶ ὁ Δὰν⁴ πορευθέντες πρὸς Ἀμορραίους καὶ προσποιησάμενοι αὐτοῖς συμμάχους⁵ εἰσήλθομεν εἰς τὴν πόλιν αὐτῶν⁶.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/007/002.yaml
  text: So Dan and I, pretending to be allies to the Amorites, entered their city.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:56Z'
    unchanged: false
    changes_summary: 'Revised the middle phrase for better lexical accuracy and natural English: the Greek indicates pretending to be allies to/with the Amorites, not pretending to be Amorites.'
translation:
  language: es
  text: Así que Dan y yo, haciéndonos pasar por aliados de los amorreos, entramos en su ciudad.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἐγὼ δὲ καὶ ὁ Δὰν
  english_pob_choice: So Dan and I
  chosen_spanish: Así que Dan y yo
  alternatives_spanish:
  - Dan y yo
  - Yo y Dan
  lexicon: ἐγώ / σύν
  rationale: El griego pone primero al hablante y luego a Dan; en español natural se preserva el orden fluido «Dan y yo», manteniendo el valor conjunto sin forzar la sintaxis.
- source_word: πορευθέντες
  english_pob_choice: entered
  chosen_spanish: entramos
  alternatives_spanish:
  - fuimos
  - nos dirigimos
  lexicon: πορεύομαι
  rationale: Aunque el participio puede sugerir 'ir' o 'caminar', el contexto narrativo culmina en la acción de entrar en la ciudad; por eso se expresa con el verbo principal en pasado simple, como en la versión inglesa auditada.
- source_word: προσποιησάμενοι αὐτοῖς συμμάχους
  english_pob_choice: pretending to be allies to the Amorites
  chosen_spanish: haciéndonos pasar por aliados de los amorreos
  alternatives_spanish:
  - fingiendo ser aliados de los amorreos
  - simulando ser aliados de los amorreos
  lexicon: προσποιέομαι / σύμμαχος
  rationale: «Hacernos pasar por» comunica bien la idea de fingimiento intencional sin perder la relación de alianza indicada por σύμμαχοι. Se conserva «amorreos» para reflejar el término étnico del fuente.
- source_word: εἰσήλθομεν εἰς τὴν πόλιν αὐτῶν
  english_pob_choice: entered their city
  chosen_spanish: entramos en su ciudad
  alternatives_spanish:
  - ingresamos en su ciudad
  - entramos a su ciudad
  lexicon: εἰσέρχομαι / πόλις
  rationale: La construcción griega expresa entrada en una ciudad determinada; «entramos en su ciudad» es la forma más natural y fiel en español bíblico contemporáneo.
theological_decisions:
- issue: Narración de engaño estratégico sin aprobación moral explícita
  english_pob_reading: pretending to be allies to the Amorites
  chosen_spanish_reading: haciéndonos pasar por aliados de los amorreos
  alternative_spanish_readings:
  - fingiendo ser aliados de los amorreos
  - simulando ser aliados de los amorreos
  rationale: El texto describe una estratagema; no añade juicio moral. La traducción conserva el hecho narrativo sin suavizar ni intensificar la conducta.
  doctrine_reference: Ética narrativa / fidelidad textual
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que corrigió la relación sintáctica de 'allies to the Amorites' en lugar de una lectura errónea equivalente a 'as if Amorites'. La versión española sigue esa lectura corregida.
  spanish_consistency_notes:
  - Se mantiene 'amorreos' como etnónimo estándar en español bíblico.
  - Se evita 'Cristo/SEÑOR' o terminología teológica ajena porque el versículo es narrativo y no contiene vocabulario explícitamente teológico.
  - El tono es bíblico contemporáneo, claro y sobrio, sin arcaísmos innecesarios.
