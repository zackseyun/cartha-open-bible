base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/007/003.yaml
  text: And in the deep night, when our brothers came, we opened the gates to them, and we destroyed all of them and all that was theirs; and after plundering all that was theirs, we tore down their three walls.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:57Z'
    unchanged: false
    changes_summary: Replaced 'everything that belonged to them' with the more formal and direct 'all that was theirs' for consistency with the earlier phrase and closer alignment to the Greek.
translation:
  language: es
  text: Y en la profunda noche, cuando vinieron nuestros hermanos, les abrimos las puertas, y los destruimos a todos ellos y todo lo que era de ellos; y, después de saquear todo lo que era de ellos, derribamos sus tres muros.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Νυκτὸς δὲ βαθείας
  english_pob_choice: And in the deep night
  chosen_spanish: Y en la profunda noche
  alternatives_spanish:
  - Y en la noche profunda
  - Y en plena noche
  lexicon: νύξ
  rationale: «Profunda noche» conserva la imagen intensiva del griego y la cadencia del inglés POB, evitando una paráfrasis más libre como «en plena noche».
- source_word: ἀδελφοί μου
  english_pob_choice: our brothers
  chosen_spanish: nuestros hermanos
  alternatives_spanish:
  - nuestros hermanos de sangre
  - nuestros hermanos
  lexicon: ἀδελφοί
  rationale: «Hermanos» reproduce el parentesco explícito del texto; en español «nuestros hermanos» es natural y suficiente, sin introducir un matiz más amplio que el griego no exige aquí.
- source_word: ἀνοίξαντες τὰς πύλας αὐτοῖς
  english_pob_choice: we opened the gates to them
  chosen_spanish: les abrimos las puertas
  alternatives_spanish:
  - les abrimos las puertas a ellos
  - abrimos las puertas para ellos
  lexicon: πύλη
  rationale: «Puertas» es la equivalencia directa y idiomática en español; el dativo de destino se expresa naturalmente con «les».
- source_word: ἐξωλοθρεύσαμεν
  english_pob_choice: we destroyed all of them and all that was theirs
  chosen_spanish: los destruimos a todos ellos y todo lo que era de ellos
  alternatives_spanish:
  - los exterminamos a todos ellos y todo lo que era de ellos
  - los destruimos por completo a ellos y todo lo que era de ellos
  lexicon: ἐξολοθρεύω
  rationale: «Destruimos» mantiene la fuerza total del verbo sin añadir un matiz técnico o más cruel que el griego necesariamente no exige; se conserva además la duplicación enfática «a todos ellos».
- source_word: ἐπρονομεύσαμεν
  english_pob_choice: after plundering all that was theirs
  chosen_spanish: después de saquear todo lo que era de ellos
  alternatives_spanish:
  - después de despojarlos de todo lo que era de ellos
  - después de expoliar todo lo que era de ellos
  lexicon: προνομεύω
  rationale: «Saquear» es el equivalente transparente y fuerte en español para el acto de despojo violento indicado por el verbo griego.
- source_word: τὰς τρεῖς αὐτῶν...
  english_pob_choice: their three walls
  chosen_spanish: sus tres muros
  alternatives_spanish:
  - sus tres murallas
  - los tres muros de ellos
  lexicon: τεῖχος
  rationale: «Muros» conserva el término general del inglés POB y evita precisar «murallas» si el referente arquitectónico exacto no se explicita en el texto fuente.
theological_decisions:
- issue: Violencia narrativa y lenguaje de exterminio
  english_pob_reading: we destroyed all of them and all that was theirs; ... we tore down their three walls
  chosen_spanish_reading: los destruimos a todos ellos y todo lo que era de ellos; y, después de saquear todo lo que era de ellos, derribamos sus tres muros
  alternative_spanish_readings:
  - los aniquilamos a todos ellos
  - los borramos por completo
  rationale: Se conserva sin suavizar la violencia del relato, porque el griego expresa destrucción total y saqueo; no se introduce eufemismo que atenúe el sentido histórico-literario del pasaje.
  doctrine_reference: Narrativa histórica y lenguaje descriptivo; no hay formulación doctrinal directa en este versículo.
translation_notes:
  revision_awareness: 'The English audit trail shows one revision: ''everything that belonged to them'' was tightened to ''all that was theirs'' for formal directness and closer alignment to the Greek. The Spanish draft follows that directness with ''todo lo que era de ellos'' throughout, matching the repeated possessive structure and preserving the parallelism of the source.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» fuera de este versículo porque no aparece el nombre divino.
  - 'Se conserva una equivalencia consistente para las dos frases posesivas del griego: «todo lo que era de ellos».'
  - No se introduce «Cristo», «Mesías» ni vocabulario teológico ajeno al pasaje.
