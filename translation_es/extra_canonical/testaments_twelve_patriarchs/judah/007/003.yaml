source:
  edition: Charles 1908 Greek Versions (Judah source-fix v2 — T12P Pass A; α-column primary, apparatus stripped)
  text: Νυκτὸς δὲ βαθείας⁷ ἤλθον⁸ πρὸς ἡμᾶς οἱ ἀδελφοί μου, καὶ ἀνοίξαντες τὰς πύλας αὐτοῖς, πάντας αὐτοὺς ἐξωλοθρεύσαμεν⁹ καὶ ἐπρονομεύσαμεν¹⁰.
