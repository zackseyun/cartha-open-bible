source:
  edition: Charles 1908 Greek Versions (Judah source-fix v2 — T12P Pass A; α-column primary, apparatus stripped)
  text: Τότε οὖν ὑβριζόμενος παρ᾽ αὐτῶν ὠργίσθην²⁴, *καὶ ὥρμησα²⁵ *ἐπ᾽ αὐτοὺς ἐπὶ τὴν κορυφήν²⁶· κἀκεῖνοι ἐσφενδόνιζον με ἐν λίθοις²⁷ καὶ τοξεύοντες²⁸.
