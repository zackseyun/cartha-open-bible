base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/007/005.yaml
  text: Then, being insulted by them, I became angry, and I rushed against them up to the summit. And they kept pelting me with stones and shooting arrows at me.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:57Z'
    unchanged: false
    changes_summary: Adjusted word order to reflect 'against them up to the summit' more naturally and completely; changed 'hurling stones' to 'pelting me with stones' to better match the Greek construction with ἐν λίθοις while retaining the ongoing sense.
translation:
  language: es
  text: Entonces, siendo insultado por ellos, me llené de ira, y arremetí contra ellos hacia la cumbre. Y ellos seguían apedreándome con piedras y lanzando flechas contra mí.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὑβριζόμενος παρ᾽ αὐτῶν
  english_pob_choice: being insulted by them
  chosen_spanish: siendo insultado por ellos
  alternatives_spanish:
  - al ser ultrajado por ellos
  - mientras ellos me insultaban
  lexicon: ὑβρίζω
  rationale: «Insultado» comunica bien el agravio verbal y personal del griego en español actual; «ultrajado» sería posible, pero suena más solemne y puede sugerir un alcance más fuerte del que exige el contexto. La pasiva con gerundio conserva el valor circunstancial del participio.
- source_word: ὠργίσθην
  english_pob_choice: I became angry
  chosen_spanish: me llené de ira
  alternatives_spanish:
  - me enojé
  - me airé
  lexicon: ὀργίζομαι
  rationale: «Me llené de ira» conserva el tono intenso del verbo griego mejor que un simple «me enojé». Mantiene una intensidad emocional acorde con la narración sin añadir contenido ajeno.
- source_word: ὥρμησα ἐπ᾽ αὐτοὺς
  english_pob_choice: I rushed against them
  chosen_spanish: arremetí contra ellos
  alternatives_spanish:
  - corrí contra ellos
  - me lancé contra ellos
  lexicon: ὁρμάω
  rationale: «Arremetí contra ellos» expresa con naturalidad el movimiento agresivo y la dirección «contra ellos» del griego. «Me lancé contra ellos» también es viable, pero «arremetí» conserva mejor el matiz de embestida.
- source_word: ἐπὶ τὴν κορυφήν
  english_pob_choice: up to the summit
  chosen_spanish: hacia la cumbre
  alternatives_spanish:
  - hasta la cumbre
  - a la cima
  lexicon: κορυφή
  rationale: «Cumbre» y «cima» son equivalentes contextuales; «cumbre» suena algo más literario, mientras que «hacia la cumbre» refleja el movimiento ascendente sin imponer que ya se haya alcanzado el punto más alto.
- source_word: ἐσφενδόνιζον με ἐν λίθοις
  english_pob_choice: they kept pelting me with stones
  chosen_spanish: seguían apedreándome con piedras
  alternatives_spanish:
  - me seguían arrojando piedras
  - seguían lanzándome piedras
  lexicon: σφενδονίζω
  rationale: «Apedreándome con piedras» reproduce el sentido intensivo y repetido del imperfecto, aunque implica redundancia etimológica en español; se mantiene porque la imagen de agresión es clara y fiel. La alternativa más idiomática sería «arrojándome piedras», pero pierde la fuerza del patrón elegido por la POB inglesa.
- source_word: καὶ τοξεύοντες
  english_pob_choice: and shooting arrows at me
  chosen_spanish: y lanzando flechas contra mí
  alternatives_spanish:
  - y disparando flechas contra mí
  - y tirándome flechas
  lexicon: τοξεύω
  rationale: «Lanzando flechas contra mí» preserva la imagen de ataque continuo y evita una modernización excesiva. «Disparando» sería natural en español, pero puede sonar demasiado técnico o anacrónico en un contexto antiguo; «lanzando» mantiene mejor la simplicidad del griego.
theological_decisions:
- issue: Intensidad del enojo y la respuesta agresiva del narrador
  english_pob_reading: I became angry, and I rushed against them
  chosen_spanish_reading: me llené de ira, y arremetí contra ellos
  alternative_spanish_readings:
  - me enojé y corrí contra ellos
  - me airé y me lancé contra ellos
  rationale: No se atenúa la reacción emocional del narrador ni se moraliza el pasaje. La traducción conserva la secuencia de provocación, ira y embestida tal como aparece en el texto fuente.
  doctrine_reference: Antigua literatura testamentaria; narración descriptiva sin formulación doctrinal normativa
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa más reciente: se respetó el orden natural de «contra ellos hacia la cumbre» y el matiz continuo de «seguían pelting me with stones» mediante un imperfecto durativo en español.'
  spanish_consistency_notes:
  - Se conserva un registro narrativo elevado pero claro, apto para lectura eclesial.
  - Se prefirió «Y ellos» / «seguían» para reflejar continuidad verbal y coordinación simple del griego.
  - No se introduce terminología eclesiástica ajena al pasaje; se mantiene el valor narrativo directo del texto.
