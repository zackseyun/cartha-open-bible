translation:
  language: es
  text: '1[4:5]. Y después de esto nos vino una guerra mayor hacia el sur que la de Siquem; y cuando me alineé en batalla con mis hermanos, perseguimos a mil hombres y matamos a doscientos de ellos, y a cuatro reyes.


    2. Y subí sobre el muro y maté a su rey.


    3[4:5]. Y así pusimos en libertad a Hebrón y tomamos todos los cautivos.


    4. Pero los demás huyeron.


    5[4:5]. Entonces mi padre Jacob mató a Belisat, rey de reyes, un gigante en fuerza, de doce codos de altura.


    6. Y cayó terror sobre ellos, y dejaron de hacernos guerra.


    7. Por eso mi padre estaba sin ansiedad en las guerras mientras yo estaba con mis hermanos.


    8. Porque vio en una visión acerca de mí que un ángel de poder iba conmigo en todas las cosas[4:8], para que nadie me tocara.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: '4:5'
    text: «Belisat» reproduce el nombre propio difícil del testimonio griego; la forma subyacente es incierta.
    reason: textual_variant
  - marker: '4:8'
    text: 'O: «me acompañaba en todo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: παραταξάμενος
  english_pob_choice: having drawn up in battle
  chosen_spanish: me alineé en batalla
  alternatives_spanish:
  - me dispuse para la batalla
  - me ordené para combatir
  lexicon: LSJ
  rationale: Expresa la idea militar de ponerse en formación para combatir sin sonar demasiado calcado; mantiene el tono narrativo y bélico.
- source_word: ἐδιώξαμεν
  english_pob_choice: we pursued
  chosen_spanish: perseguimos
  alternatives_spanish:
  - corrimos tras
  - dimos persecución a
  lexicon: LSJ
  rationale: Perseguir conserva el sentido de acción militar de ir tras el enemigo y es natural en español.
- source_word: ἀπεκτείναμεν
  english_pob_choice: we killed
  chosen_spanish: matamos
  alternatives_spanish:
  - dimos muerte a
  - matamos a muerte
  lexicon: LSJ
  rationale: «Matamos» es claro y directo; evita arcaísmos y mantiene el registro narrativo de combate.
- source_word: αἰχμαλωσίαν
  english_pob_choice: captives
  chosen_spanish: cautivos
  alternatives_spanish:
  - prisioneros
  - los cautivos
  lexicon: LSJ
  rationale: En contexto militar, el término se refiere a personas capturadas; «cautivos» preserva esa referencia concreta.
- source_word: ἀνεῖλον
  english_pob_choice: killed
  chosen_spanish: maté
  alternatives_spanish:
  - derribé
  - dedi muerte a
  lexicon: LSJ
  rationale: Se mantiene el paralelismo con la línea anterior y la fuerza simple del verbo en narración de guerra.
- source_word: בֵּלִיסָת / Belisath
  english_pob_choice: Belisath
  chosen_spanish: Belisat
  alternatives_spanish:
  - Belisat
  - Belisat(h)
  lexicon: transliteration
  rationale: Se translitera el nombre propio de manera fluida al español, conservando la identificación textual sin imponer una forma no atestiguada en la tradición española.
- source_word: γίγαντα τῇ ἰσχύι
  english_pob_choice: a giant man in strength
  chosen_spanish: un gigante en fuerza
  alternatives_spanish:
  - un hombre gigante en fuerza
  - un gigante poderoso
  lexicon: LSJ
  rationale: La construcción destaca la estatura/condición extraordinaria y la fuerza; «gigante en fuerza» transmite la intensidad sin sobreexplicar.
- source_word: πηχῶν δώδεκα
  english_pob_choice: twelve cubits high
  chosen_spanish: de doce codos de altura
  alternatives_spanish:
  - doce codos de alto
  - de doce codos
  lexicon: LSJ
  rationale: Conserva la medida literal y la hace idiomática en español mediante «de altura».
- source_word: πᾶσαν τὴν αἰχμαλωσίαν
  english_pob_choice: all the captives
  chosen_spanish: todos los cautivos
  alternatives_spanish:
  - toda la cautividad
  - todos los prisioneros
  lexicon: LSJ
  rationale: Mantiene el sentido de personas capturadas, no de una abstracción como «cautividad».
- source_word: ἐν ὁράματι
  english_pob_choice: in a vision
  chosen_spanish: en una visión
  alternatives_spanish:
  - en un sueño profético
  - en una visión revelada
  lexicon: LSJ
  rationale: La formulación es estándar, sobria y fiel al carácter revelatorio del texto.
- source_word: ἄγγελος δυνάμεως
  english_pob_choice: an angel of power
  chosen_spanish: un ángel de poder
  alternatives_spanish:
  - un ángel poderoso
  - un ángel de fuerza
  lexicon: LSJ
  rationale: Preserva la construcción genitiva transparente del griego sin resolverla interpretativamente.
- source_word: συνέπεταί μοι
  english_pob_choice: went along with me
  chosen_spanish: iba conmigo
  alternatives_spanish:
  - me acompañaba
  - andaba conmigo
  lexicon: LSJ
  rationale: «Iba conmigo» reproduce la idea de acompañamiento continuo con fluidez natural en español.
- source_word: τοῦ μὴ ἅψασθαί μοι
  english_pob_choice: so that no one might touch me
  chosen_spanish: para que nadie me tocara
  alternatives_spanish:
  - para que nadie me pusiera la mano encima
  - para que nadie me hiciera daño
  lexicon: LSJ
  rationale: Se conserva la literalidad del contacto físico como protección; el contexto bélico ya sugiere la intención hostil.
theological_decisions:
- issue: Protección angélica de Judá en la visión
  english_pob_reading: Translate the vision straightforwardly as divine angelic protection accompanying Judah in battle.
  chosen_spanish_reading: Traducir la visión de manera directa como acompañamiento protector de un ángel de poder.
  alternative_spanish_readings:
  - Entenderlo como metáfora de valentía o fortuna militar
  - Parafrasearlo como «un ángel poderoso me protegía»
  rationale: El griego presenta una afirmación visionaria sobrenatural; la traducción conserva esa tensión sin reducirla ni amplificarla.
  doctrine_reference: Primacía del texto fuente; conservar la afirmación visionaria sin armonizarla con lecturas posteriores.
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del inglés POB, que ajustó el v. 5 a una forma más cercana al griego: «king of kings» y «a giant man in strength». El español refleja ese mismo equilibrio: «rey de reyes» y «un gigante en fuerza», con la transliteración del nombre propio mantenida de forma legible.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este pasaje no contiene el tetragrámaton.
  - Se traduce el lenguaje bélico con verbos directos («perseguimos», «matamos», «tomamos») para conservar el registro narrativo.
  - «Cautivos» se usa en sentido de personas capturadas, no como estado abstracto.
  - La nota de 4:8 se ancla exactamente en la frase «en todas las cosas» para reflejar la alternativa del inglés POB.
