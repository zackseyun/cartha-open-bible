translation:
  language: es
  text: '1[a]. El Señor me concedió favor porque obedecí a mi padre. 2. Por eso nunca entristecí a Jacob, mi padre, porque hice todo lo que él me mandó. 3. Y Abraham, mi antepasado, me bendijo para reinar en Israel, y Jacob me bendijo igualmente. 4[b]. Y sé qué males haréis en los últimos días.


    5. Guardaos, pues, hijos míos, de la inmoralidad sexual y del amor al dinero, y escuchad a Judá, vuestro padre. 6. Porque estas cosas apartan de la ley de Dios, ciegan el propósito del alma y enseñan arrogancia, y no permiten que un hombre muestre misericordia a su prójimo. 7. Privan a su alma de toda bondad y lo mantienen sujeto en dolores y trabajos; le quitan el sueño y consumen su carne. 8. Impiden los sacrificios de Dios, y no recuerda la bendición de Dios. No escucha cuando habla un profeta, y se ofende por palabras de piedad. 9. Pues está esclavizado a dos pasiones contrarias y no puede obedecer a Dios[d][c], porque han cegado su alma.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego inicial está comprimido en este testimonio; la traducción suplanta el sentido implícito de que el Señor favoreció a Judá por su obediencia a su padre.
    reason: textual_variant
  - marker: b
    text: '''Los últimos días'' es lenguaje testamentario y apocalíptico habitual para un período futuro de decadencia moral y juicio.'
    reason: cultural_note
  - marker: c
    text: También puede entenderse como 'el consejo del alma'; el término griego alude a deliberación, resolución o propósito interior.
    reason: lexical_alternative
  - marker: d
    text: Las 'dos pasiones contrarias' probablemente remiten a la inmoralidad sexual y al amor al dinero mencionados en la exhortación.
    reason: cross_reference
lexical_decisions:
- source_word: ἐν ὑπακοῇ
  english_pob_choice: because I obeyed
  chosen_spanish: porque obedecí
  alternatives_spanish:
  - en obediencia
  - por obediencia
  lexicon: LSJ
  rationale: El griego expresa una relación causal/instrumental en el contexto; en español, 'porque obedecí' comunica de forma natural que el favor divino vino a causa de la obediencia filial.
- source_word: παρελύπησα
  english_pob_choice: grieved
  chosen_spanish: entristecí
  alternatives_spanish:
  - afligí
  - causé dolor a
  lexicon: LSJ
  rationale: El verbo implica causar pesar o dolor. 'Entristecí' conserva el sentido afectivo y la relación padre-hijo sin sonar demasiado literal.
- source_word: βασιλεύειν
  english_pob_choice: to reign
  chosen_spanish: reinar
  alternatives_spanish:
  - ser rey
  - gobernar como rey
  lexicon: LSJ
  rationale: '''Reinar'' conserva el registro elevado y la idea de autoridad real mejor que una formulación más prosaica.'
- source_word: ἐσχάταις ἡμέραις
  english_pob_choice: the last days
  chosen_spanish: los últimos días
  alternatives_spanish:
  - los postreros días
  - los días finales
  lexicon: LSJ
  rationale: Es la equivalencia idiomática normal en español para el lenguaje apocalíptico y testamentario.
- source_word: πορνείας
  english_pob_choice: sexual immorality
  chosen_spanish: inmoralidad sexual
  alternatives_spanish:
  - fornicación
  - impureza sexual
  lexicon: BDAG
  rationale: La expresión abarca conducta sexual ilícita en general; 'inmoralidad sexual' evita restringirla indebidamente y suena clara en español actual.
- source_word: φιλαργυρίας
  english_pob_choice: the love of money
  chosen_spanish: el amor al dinero
  alternatives_spanish:
  - la avaricia
  - la codicia
  lexicon: BDAG
  rationale: La traducción transparente preserva la composición literal del término y su carga moral.
- source_word: ἀφιστᾷ τῷ νόμῳ τοῦ θεοῦ
  english_pob_choice: turn one away from the law of God
  chosen_spanish: apartan de la ley de Dios
  alternatives_spanish:
  - hacen apartarse de la ley de Dios
  - alejan de la ley de Dios
  lexicon: LSJ
  rationale: '''Apartan de'' reproduce la fuerza de alejamiento o desvío moral sin añadir más de lo que exige el texto.'
- source_word: τὸ διαβούλιον τῆς ψυχῆς
  english_pob_choice: the purpose of the soul
  chosen_spanish: el propósito del alma
  alternatives_spanish:
  - el consejo del alma
  - la resolución del alma
  lexicon: LSJ
  rationale: POB opta por una formulación comprensible que conserva el sentido interno de deliberación/propósito. En español, 'propósito del alma' mantiene esa orientación moral interior.
- source_word: ὑπερηφάνειαν ἐκδιδάσκει
  english_pob_choice: teach arrogance
  chosen_spanish: enseñan arrogancia
  alternatives_spanish:
  - infunden soberbia
  - enseñan altivez
  lexicon: LSJ
  rationale: La personificación del vicio como maestro se mantiene; el plural concuerda con los vicios mencionados en el contexto inmediato.
- source_word: οὐκ ἀφίει ἄνδρα ἐλεῆσαι τὸν πλησίον αὐτοῦ
  english_pob_choice: do not allow a man to show mercy to his neighbor
  chosen_spanish: no permiten que un hombre muestre misericordia a su prójimo
  alternatives_spanish:
  - no dejan que un hombre tenga piedad de su prójimo
  - no permiten que una persona muestre misericordia a su prójimo
  lexicon: LSJ
  rationale: '''Permiten que'' refleja bien el matiz permisivo de ἀφίημι en este contexto, y ''muestre misericordia'' corresponde al campo semántico de ἐλεέω.'
- source_word: Στερίσκει
  english_pob_choice: deprive
  chosen_spanish: Privan
  alternatives_spanish:
  - despojan
  - quitan
  lexicon: LSJ
  rationale: El verbo expresa privación o despojo. 'Privan' mantiene la fuerza privativa y el tono moral.
- source_word: συνέχει αὐτὸν
  english_pob_choice: hold him fast
  chosen_spanish: lo mantienen sujeto
  alternatives_spanish:
  - lo sujetan con firmeza
  - lo retienen
  lexicon: LSJ
  rationale: La imagen de sujeción comunica cautiverio o presión continua con naturalidad en español.
- source_word: πόνοις καὶ μόχθοις
  english_pob_choice: pains and labors
  chosen_spanish: en dolores y trabajos
  alternatives_spanish:
  - en penas y fatigas
  - en sufrimientos y trabajos
  lexicon: LSJ
  rationale: La pareja conserva el paralelismo y la intensidad del griego, con un español digno y claro.
- source_word: καταδαπανᾷ τὰς σάρκας αὐτοῦ
  english_pob_choice: consume his flesh
  chosen_spanish: consumen su carne
  alternatives_spanish:
  - devoran su carne
  - consumen su cuerpo
  lexicon: LSJ
  rationale: '''Carne'' mantiene σάρξ sin suavizar la imagen corporal; el plural verbal sigue la referencia plural a los vicios en contexto, como en la revisión inglesa.'
- source_word: Θυσίας Θεοῦ ἐμποδίζει
  english_pob_choice: hinder the sacrifices of God
  chosen_spanish: Impiden los sacrificios de Dios
  alternatives_spanish:
  - obstaculizan los sacrificios de Dios
  - estorban los sacrificios de Dios
  lexicon: LSJ
  rationale: '''Impedir'' reproduce con precisión el sentido de obstrucción cultual.'
- source_word: εὐλογίαν Θεοῦ οὐ μνημονεύει
  english_pob_choice: does not remember the blessing of God
  chosen_spanish: no recuerda la bendición de Dios
  alternatives_spanish:
  - no trae a la memoria la bendición de Dios
  - olvida la bendición de Dios
  lexicon: LSJ
  rationale: '''Recordar'' es la equivalencia directa de μνημονεύω y conserva el orden de la secuencia de omisiones pías.'
- source_word: λόγους εὐσεβείας προσοχθίζει
  english_pob_choice: is offended by words of godliness
  chosen_spanish: se ofende por palabras de piedad
  alternatives_spanish:
  - se incomoda con palabras de piedad
  - le disgustan las palabras piadosas
  lexicon: LSJ
  rationale: La revisión inglesa favorece 'is offended by'; en español, 'se ofende por' expresa adecuadamente la reacción hostil ante la exhortación piadosa.
- source_word: Δυσὶ ... πάθεσιν ἐναντίοις δουλεύει
  english_pob_choice: he is enslaved to two contrary passions
  chosen_spanish: está esclavizado a dos pasiones contrarias
  alternatives_spanish:
  - sirve a dos pasiones contrarias
  - está en esclavitud bajo dos impulsos opuestos
  lexicon: LSJ
  rationale: '''Esclavizado'' conserva la dureza de δουλεύει y mantiene la oposición entre las dos pasiones del contexto inmediato.'
theological_decisions:
- issue: La referencia de 'los últimos días' como lenguaje testamentario/apocalíptico
  english_pob_reading: the last days as a future period of moral decline and judgment
  chosen_spanish_reading: '''los últimos días'' como expresión profética de un tiempo futuro de decadencia moral y juicio'
  alternative_spanish_readings:
  - los días finales
  - los postreros tiempos
  rationale: La expresión es un marcador convencional del género testamentario y apocalíptico; conviene conservarla sin normalizarla a un mero cierre cronológico.
  doctrine_reference: Escatología bíblica; lenguaje profético testamentario
- issue: La identificación de las 'dos pasiones contrarias'
  english_pob_reading: sexual immorality and the love of money are the two passions in view
  chosen_spanish_reading: las dos pasiones en vista son la inmoralidad sexual y el amor al dinero
  alternative_spanish_readings:
  - puede tratarse de dos vicios más generales
  - la frase podría resumir más ampliamente otros impulsos opuestos
  rationale: El contexto inmediato nombra esos dos vicios y luego los resume; la lectura más natural es que la frase final retome precisamente esos dos.
  doctrine_reference: Ética moral; coherencia contextual
translation_notes:
  revision_awareness: 'He seguido la revisión más reciente del inglés auditado: ''likewise'' se refleja en ''igualmente'', y ''is offended by words of godliness'' en ''se ofende por palabras de piedad''. También mantengo la lectura resumidora de las ''dos pasiones contrarias'' y la secuencia cultual del pasaje.'
  spanish_consistency_notes:
  - Uso 'Yahvé' por norma POB solo cuando el texto fuente lo exige; aquí el pasaje griego usa Κύριος y, siguiendo el audit trail inglés, se mantiene 'el Señor' en la cita veterotestamentaria/testamentaria de este record.
  - '''Mesías/Cristo'' no aparece en este versículo; no aplica.'
  - '''carne'' conserva σάρξ sin reemplazarlo por una paráfrasis antropológica.'
  - '''misericordia'' traduce ἐλεῆσαι de forma más natural para español bíblico contemporáneo que ''piedad'' en ese giro verbal, aunque ambos quedan cercanos semánticamente.'
  - La puntuación y el orden de las cláusulas buscan reflejar la cadencia del griego y del inglés auditado sin añadir interpretaciones ajenas.
