translation:
  language: es
  text: Después de estas cosas[a], Er, mi hijo, tomó a Tamar para sí como esposa, de Mesopotamia, hija de Aram. Pero Er era malvado, y un ángel de Yahvé lo mató. Y yo la di a Onán, mi segundo hijo, y he aquí, Yahvé también lo derribó. Porque no la conoció, por la intriga de su madre, pues no quería tener hijos de ella. En los días del tálamo nupcial[b] yo la di a Onán en matrimonio levirato[c]; sin embargo, también este, en su maldad, no la conoció, aunque estuvo con ella un año. Y cuando lo amenacé, él fue a ella, pero desperdició la semilla sobre la tierra, según el mandato de su madre. Así también este murió en su maldad. Y yo quería dar también a Selom a ella, pero su madre no lo permitió; pues actuó malvadamente[d], porque Tamar no era de las hijas de Canaán, como ella misma lo era.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos testigos griegos varían en detalles menores de secuencia y tiempo, incluyendo si Er murió al segundo día o en la tercera noche, y si Onán fue unido a Tamar de inmediato o durante el período nupcial.
    reason: textual_variant
  - marker: b
    text: '''No la conoció'' es un eufemismo bíblico para relaciones sexuales.'
    reason: lexical_alternative
  - marker: c
    text: '''Matrimonio levirato'' alude al deber del hermano de un difunto de levantar descendencia para él por medio de la viuda; compárese Génesis 38.'
    reason: cultural_note
  - marker: d
    text: La repetición de 'maldad' en el capítulo une las muertes de Er y Onán con la obstrucción de la madre en un mismo patrón moral.
    reason: cross_reference
lexical_decisions:
- source_word: Μετὰ δὲ ταῦτα
  english_pob_choice: After these things
  chosen_spanish: Después de estas cosas
  alternatives_spanish:
  - Tras esto
  - Después de esto
  lexicon: LSJ / uso bíblico
  rationale: Mantiene la fórmula narrativa solemne y la secuencia temporal sin añadir interpretación.
- source_word: ἄγγελος Κυρίου
  english_pob_choice: an angel of the Lord
  chosen_spanish: un ángel del Señor
  alternatives_spanish:
  - un ángel de Yahvé
  - el ángel del Señor
  lexicon: BDAG
  rationale: Conserva la lectura indefinida del griego y sigue el sentido auditado del POB inglés; en esta cláusula el contexto inmediato no exige identificar al mensajero con la fórmula técnica fija.
- source_word: πονηρός / ἐν πονηρίᾳ
  english_pob_choice: wicked / in wickedness
  chosen_spanish: malo / en su maldad
  alternatives_spanish:
  - malvado / en maldad
  - malo / en maldad
  lexicon: BDAG
  rationale: En español, 'malo' y 'en su maldad' comunican la acusación moral con naturalidad; se evita suavizar el juicio, aunque 'malvado' queda como alternativa válida.
- source_word: οὐκ ἔγνω αὐτήν
  english_pob_choice: did not know her
  chosen_spanish: no la conoció
  alternatives_spanish:
  - no tuvo relaciones con ella
  - no se unió a ella sexualmente
  lexicon: BDAG
  rationale: Preserva el eufemismo bíblico y su registro elevado, como en el POB inglés; en español 'conocer' mantiene la ambigüedad intencional sin oscurecer el sentido.
- source_word: πανουργία
  english_pob_choice: scheming
  chosen_spanish: intriga
  alternatives_spanish:
  - maquinación
  - astucia
  lexicon: BDAG
  rationale: '''Intriga'' expresa la intención manipuladora de la madre en un español natural y menos técnico que ''maquinación'', sin perder la carga negativa.'
- source_word: ἔχειν τέκνα ἐξ αὐτῆς
  english_pob_choice: to have children by her
  chosen_spanish: tener hijos de ella
  alternatives_spanish:
  - tener descendencia de ella
  - engendrar hijos de ella
  lexicon: BDAG
  rationale: Refleja la preocupación genealógica del texto con una construcción clara y no forzada en español.
- source_word: ἐπεγυμβρευσα ... εἰς γυναῖκα / ἐπιγαμβρεῦσαι
  english_pob_choice: gave ... in levirate marriage
  chosen_spanish: la di ... en matrimonio levirato
  alternatives_spanish:
  - la di ... como esposa según el levirato
  - la entregué ... para el deber del levirato
  lexicon: LSJ
  rationale: Se explicita el sentido cultural/jurídico del deber levirato, siguiendo la decisión del POB inglés de no dejarlo implícito.
- source_word: ἐν ταῖς ἡμέραις τοῦ θαλάμου
  english_pob_choice: during the days of the bridal chamber
  chosen_spanish: En los días del tálamo nupcial
  alternatives_spanish:
  - Durante los días de la cámara nupcial
  - Durante los días de la boda
  lexicon: LSJ
  rationale: '''Tálamo nupcial'' conserva la imagen concreta y solemne del período matrimonial; es más literario que ''cámara nupcial'' pero igualmente fiel.'
- source_word: συνῆλθε μὲν αὐτῇ
  english_pob_choice: he went in to her
  chosen_spanish: él fue a ella
  alternatives_spanish:
  - entró a ella
  - se unió a ella
  lexicon: BDAG
  rationale: Mantiene el eufemismo bíblico con una formulación idiomática en español; evita la explicación explícita que rompería el tono del relato.
- source_word: διέφθειρε τὸ σπέρμα ἐπὶ τὴν γῆν
  english_pob_choice: he wasted the seed on the ground
  chosen_spanish: desperdició la semilla sobre la tierra
  alternatives_spanish:
  - derramó la semilla sobre la tierra
  - destruyó la semilla sobre la tierra
  lexicon: BDAG
  rationale: Conserva la imagen concreta del griego y la formulación auditada del POB, usando 'semilla' para reflejar σπέρμα.
- source_word: οὐκ ἀφῆκεν
  english_pob_choice: did not allow it
  chosen_spanish: no lo permitió
  alternatives_spanish:
  - no se lo permitió
  - no lo dejó
  lexicon: BDAG
  rationale: Traduce de forma natural la obstaculización de la madre respecto a la intención de Judá.
- source_word: ἐπονηρεύσατο
  english_pob_choice: she acted wickedly
  chosen_spanish: actuó malvadamente
  alternatives_spanish:
  - obró mal
  - se portó mal
  lexicon: BDAG
  rationale: Mantiene el juicio moral del verbo medio/deponente y su vínculo con el léxico de maldad del pasaje.
- source_word: τῶν θυγατέρων τῶν Χαναναίων
  english_pob_choice: the daughters of Canaan
  chosen_spanish: las hijas de Canaán
  alternatives_spanish:
  - las mujeres cananeas
  - las hijas de los cananeos
  lexicon: LSJ
  rationale: Conserva la expresión genealógico-étnica del griego y su eco bíblico tradicional.
theological_decisions:
- issue: Agencia en las muertes de Er y Onán
  english_pob_reading: Er is killed by an angel of the Lord; Onan is struck down by the Lord.
  chosen_spanish_reading: Er es matado por un ángel del Señor; Onán es derribado por el Señor.
  alternative_spanish_readings:
  - Ambos son matados directamente por el Señor
  - Ambos son matados por un ángel
  rationale: Se conserva la distinción de agencia presente en el testimonio griego y en el POB inglés, sin armonizarla ni suavizarla.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Lenguaje del levirato
  english_pob_reading: Make the levirate sense explicit in English.
  chosen_spanish_reading: Hacer explícito el sentido levirato en español.
  alternative_spanish_readings:
  - Dejarlo implícito como 'me casé con ella'
  - Explicarlo con una nota sin reflejo textual
  rationale: El pasaje depende de una institución matrimonial específica; 'matrimonio levirato' comunica esa obligación sin salir del sentido del texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del POB inglés, que ajusta levemente la forma para mayor precisión y naturalidad (''as a wife'', ''was with her'') sin cambiar el contenido. La traducción española refleja esa misma cautela: conserva el eufemismo de ''conocer'', el período nupcial y la distinción entre agencia divina y angélica sin sobreexplicar.'
  spanish_consistency_notes:
  - Se usa 'Señor' aquí por seguir el testimonio auditado del POB inglés en la frase ἄγγελος Κυρίου; no se introduce 'Yahvé' porque el griego no emplea el nombre explícito en esta cláusula.
  - '''Maldad'' se repite de forma consistente para ἐν πονηρίᾳ y ἐπονηρεύσατο, manteniendo el patrón moral del pasaje.'
  - '''Semilla'' conserva el paralelismo con el lenguaje bíblico del griego; no se sustituye por un equivalente más moderno que diluya la imagen.'
  - '''Tamar'' se mantiene como transliteración estable; ''Selom'' sigue la forma más cercana al nombre hebreo subyacente transmitido en la tradición del pasaje.'
