  text: After these things[a], Er my son took Tamar for himself as a wife, from Mesopotamia, a daughter of Aram. But Er was wicked, and an angel of the Lord killed him. And I gave her to Onan, my second son, and behold, the Lord struck him down also. For he did not know her, through the scheming of his mother, because he did not want to have children by her. During the days of the bridal chamber I gave Onan to her in levirate marriage; yet he too, in wickedness, did not know her, though he was with her for a year. And when I threatened him, he went in to her[b], but he wasted the seed on the ground, according to the command of his mother. So he too died in wickedness. And I wanted to give Shelah also to her, but his mother did not allow it; for she acted wickedly, because Tamar was not from the daughters of Canaan[d][c], as she herself was.
  footnotes:
  - marker: a
    text: Some Greek witnesses vary in small details of sequence and timing, including whether Er died on the second day or the third night, and whether Onan was joined to Tamar immediately or during the wedding period.
    reason: textual_variant
  - marker: b
    text: '"Know her" is a biblical euphemism for sexual relations.'
    reason: lexical_alternative
  - marker: c
    text: '"Gave Onan to her in levirate marriage" refers to the duty of a deceased man''s brother to raise offspring for him through the widow; compare Genesis 38.'
    reason: cultural_note
  - marker: d
    text: The chapter's repeated language of "wickedness" ties the deaths of Er and Onan and the mother's obstruction into one moral pattern.
    reason: cross_reference
