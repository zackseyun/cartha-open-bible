base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/005/004.yaml
  text: But all my brothers, having driven stakes into the wall from both sides, entered the city while they were unaware.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:55Z'
    unchanged: false
    changes_summary: Replaced 'So' with 'But' for ἀλλά; removed 'secretly' as it is not explicit; rendered ἐμπήξαντες as 'having driven stakes into' rather than 'climbed it with stakes'; preserved 'from both sides' and translated ἀγνοούντων αὐτῶν as 'while they were unaware.'
translation:
  language: es
  text: Pero todos mis hermanos, habiendo clavado estacas en la muralla desde ambos lados, entraron en la ciudad mientras ellos no lo sabían.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἀλλὰ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sino
  - Mas
  lexicon: ἀλλά
  rationale: La conjunción adversativa pide un inicio contrastivo; «Pero» es natural en español actual y preserva el giro de oposición del griego sin forzar un tono arcaico.
- source_word: πάντες οἱ ἀδελφοί μου
  english_pob_choice: all my brothers
  chosen_spanish: todos mis hermanos
  alternatives_spanish:
  - mis hermanos todos
  - mis hermanos
  lexicon: πάντες + ἀδελφοί
  rationale: «Todos mis hermanos» reproduce el alcance total de πάντες y mantiene la relación de posesión del hablante con una sintaxis fluida en español.
- source_word: ἐμπήξαντες
  english_pob_choice: having driven stakes into
  chosen_spanish: habiendo clavado estacas
  alternatives_spanish:
  - habiendo hincado estacas
  - clavando estacas
  lexicon: ἐμπήγνυμι
  rationale: El verbo expresa introducir o fijar firmemente objetos puntiagudos; «clavado estacas» comunica bien la acción y evita añadir la imagen no explicitada de «escalar».
- source_word: τῶν μερῶν τοῦ τείχους
  english_pob_choice: from both sides of the wall
  chosen_spanish: en la muralla desde ambos lados
  alternatives_spanish:
  - desde ambos lados de la muralla
  - por ambos lados de la muralla
  lexicon: ἐξ ἑκατέρων τῶν μερῶν
  rationale: La preposición y el adjetivo distributivo indican procedencia bilateral; «desde ambos lados» conserva la idea con español idiomático. «Muralla» da un referente natural para τείχος.
- source_word: εἰσῆλθον εἰς τὴν πόλιν
  english_pob_choice: entered the city
  chosen_spanish: entraron en la ciudad
  alternatives_spanish:
  - ingresaron en la ciudad
  - entraron a la ciudad
  lexicon: εἰσέρχομαι
  rationale: «Entraron en la ciudad» es la formulación más natural y fiel; mantiene el movimiento de ingreso sin sobreexplicar.
- source_word: ἀγνοούντων αὐτῶν
  english_pob_choice: while they were unaware
  chosen_spanish: mientras ellos no lo sabían
  alternatives_spanish:
  - mientras estaban inconscientes de ello
  - sin que ellos lo supieran
  lexicon: ἀγνοέω
  rationale: El participio genitivo absoluto expresa desconocimiento de los otros; «mientras ellos no lo sabían» conserva la simultaneidad sin introducir un matiz excesivo. Se evita «secretamente», pues no está explícito en el griego revisado.
theological_decisions:
- issue: La cláusula ἀλλά al inicio y el carácter del episodio
  english_pob_reading: But all my brothers...
  chosen_spanish_reading: Pero todos mis hermanos...
  alternative_spanish_readings:
  - Y así todos mis hermanos...
  - Entonces todos mis hermanos...
  rationale: La revisión inglesa corrigió una lectura más interpretativa («So») a una adversativa explícita. En español se conserva ese contraste con «Pero», sin añadir inferencias narrativas no presentes en el texto.
  doctrine_reference: Fidelidad discursiva al texto base; no doctrinal.
- issue: Genitivo absoluto ἀγνοούντων αὐτῶν y la ausencia de una indicación explícita de clandestinidad
  english_pob_reading: while they were unaware
  chosen_spanish_reading: mientras ellos no lo sabían
  alternative_spanish_readings:
  - sin que ellos lo supieran
  - mientras estaban ajenos a ello
  rationale: El griego afirma desconocimiento, no necesariamente una estrategia de sigilo expresada con un adverbio independiente. La redacción española conserva la tensión textual evitando intensificarla a «secretamente».
  doctrine_reference: Principio de no añadir contenido no atestiguado por la fuente.
translation_notes:
  revision_awareness: La versión inglesa revisada sustituyó 'So' por 'But' para ἀλλά, eliminó 'secretly' por no estar explícito, corrigió la imagen de 'climbed it with stakes' a 'having driven stakes into the wall', mantuvo 'from both sides' y tradujo ἀγνοούντων αὐτῶν como 'while they were unaware'. La propuesta española sigue esas decisiones revisadas y evita introducir una acción de escalada no sustentada por el griego.
  spanish_consistency_notes:
  - Se usa «muralla» para τείχος en un contexto urbano defensivo.
  - Se mantiene «hermanos» sin especificar parentesco adicional; el hablante y el grupo están dados por el contexto narrativo.
  - No se introduce mayúscula en «espíritu» u otra terminología teológica porque este versículo no la contiene.
  - La puntuación conserva una sola oración con participio inicial subordinado, acorde al flujo del griego y de la revisión inglesa.
