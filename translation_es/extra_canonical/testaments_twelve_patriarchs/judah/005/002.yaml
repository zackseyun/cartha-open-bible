translation:
  language: es
  text: Pero yo y Gad atacamos desde el oriente de la ciudad, y Rubén y Leví desde el occidente.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἐγὼ δὲ
  english_pob_choice: But I
  chosen_spanish: Pero yo
  alternatives_spanish:
  - Pero yo mismo
  - Y yo
  lexicon: ἐγώ
  rationale: El griego enfatiza al hablante con ἐγώ; «pero yo» conserva la oposición con la cláusula anterior y la fuerza enfática sin añadir exceso.
- source_word: ὁ Γὰδ
  english_pob_choice: Gad
  chosen_spanish: Gad
  alternatives_spanish:
  - Gád
  lexicon: Γάδ
  rationale: Se mantiene el nombre propio bíblico en forma usual en español; no requiere adaptación adicional.
- source_word: προσήξαμεν
  english_pob_choice: attacked
  chosen_spanish: atacamos
  alternatives_spanish:
  - avanzamos contra
  - asaltamos
  lexicon: 'προσάγω / προσάγωμεν (forma textual aquí: προσήξαμεν)'
  rationale: El contexto militar exige una acción ofensiva. «Atacamos» comunica de modo natural la fuerza del verbo sin sobretraducirlo.
- source_word: ἀπὸ ἀνατολῶν τῆς πόλεως
  english_pob_choice: from the east of the city
  chosen_spanish: desde el oriente de la ciudad
  alternatives_spanish:
  - desde el este de la ciudad
  - por el oriente de la ciudad
  lexicon: ἀνατολή
  rationale: «Oriente» es claro, digno y bíblicamente idiomático en español; conserva el matiz direccional de ἀπό + genitivo.
- source_word: Ῥουβὴμ
  english_pob_choice: Reuben
  chosen_spanish: Rubén
  alternatives_spanish:
  - Rubén
  lexicon: Ῥουβήμ
  rationale: Se usa la forma española estándar del nombre propio.
- source_word: Λευὶ
  english_pob_choice: Levi
  chosen_spanish: Leví
  alternatives_spanish:
  - Levi
  lexicon: Λευί
  rationale: «Leví» es la forma hispana común y mantiene la pronunciación bíblica tradicional en español.
- source_word: ἀπὸ δυσμῶν
  english_pob_choice: from the west
  chosen_spanish: desde el occidente
  alternatives_spanish:
  - desde el oeste
  - por el occidente
  lexicon: δύσις
  rationale: «Occidente» es un equivalente natural y elevado para la dirección cardinal, coherente con «oriente» en la misma línea.
theological_decisions:
- issue: Coordinación de dos frentes de ataque en relato tribal/militar
  english_pob_reading: But I and Gad attacked from the east of the city, and Reuben and Levi from the west.
  chosen_spanish_reading: Pero yo y Gad atacamos desde el oriente de la ciudad, y Rubén y Leví desde el occidente.
  alternative_spanish_readings:
  - Pero yo y Gad atacamos por el lado oriental de la ciudad, y Rubén y Leví por el occidental.
  - Y yo y Gad atacamos desde el este de la ciudad, y Rubén y Leví desde el oeste.
  rationale: El versículo describe una acción militar coordinada en dos direcciones opuestas. La traducción conserva la simetría del griego y evita añadir interpretaciones que no están en el texto.
  doctrine_reference: Narrativa histórica/tribal; no introduce contenido doctrinal adicional.
translation_notes:
  revision_awareness: El texto griego dado es breve y coincide sustancialmente con la traducción inglesa auditada; no se registran revisiones aplicadas ni cambios pendientes en el paquete fuente. La versión española sigue de cerca la estructura del original sin necesidad de notas textuales adicionales.
  spanish_consistency_notes:
  - Se mantiene la correspondencia direccional oriente/occidente para preservar la simetría del pasaje.
  - Se conserva el tono narrativo sobrio del original, sin ampliar el contenido con detalles inexistentes.
  - Los nombres propios se adaptan a las formas bíblicas usuales en español (Rubén, Leví).
