translation:
  language: es
  text: Y mientras nos íbamos, hombres de Tafué cayeron sobre nuestros cautivos; y, después de entregarlos a nuestros hijos, entablamos combate con ellos hasta Tafué.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἐν δὲ τῷ ἀπιέναι ἡμᾶς
  english_pob_choice: And as we were departing
  chosen_spanish: Y mientras nos íbamos
  alternatives_spanish:
  - Y cuando nos íbamos
  - Y al partir nosotros
  lexicon: ἀπέρχομαι / ἄπειμι
  rationale: La construcción temporal se vierte de manera natural con «mientras nos íbamos», que conserva la simultaneidad de la acción de partir sin volverla demasiado rígida.
- source_word: ἄνδρες Θαφφουέ
  english_pob_choice: men of Thapphoue
  chosen_spanish: hombres de Tafué
  alternatives_spanish:
  - varones de Tafué
  - hombres de Thapphoue
  lexicon: ἄνδρες + topónimo
  rationale: Se conserva el sentido literal «hombres de» y se adapta el topónimo a una forma española sobria y readable; «Tafué» evita una transliteración excesivamente áspera sin alterar la identificación del lugar.
- source_word: ἐπέβαλον τῇ αἰχμαλωσίᾳ ἡμῶν
  english_pob_choice: fell upon our captives
  chosen_spanish: cayeron sobre nuestros cautivos
  alternatives_spanish:
  - se abalanzaron sobre nuestros cautivos
  - atacaron a nuestros cautivos
  lexicon: ἐπιβάλλω + αἰχμαλωσία
  rationale: La imagen de agresión repentina se mantiene con «cayeron sobre», que refleja bien el griego y el inglés POB sin suavizar el golpe verbal.
- source_word: παραδόντες αὐτὴν τοῖς υἱοῖς ἡμῶν
  english_pob_choice: after handing them over to our sons
  chosen_spanish: después de entregarlos a nuestros hijos
  alternatives_spanish:
  - al entregarlos a nuestros hijos
  - tras entregarlos a nuestros hijos
  lexicon: παραδίδωμι
  rationale: «Entregarlos» reproduce adecuadamente el acto de pasar algo/alguien a otros; aquí se mantiene la referencia del inglés POB a los cautivos, aunque el griego usa un pronombre femenino singular referido al botín/cautiverio.
- source_word: συνήψαμεν πόλεμον μετʼ αὐτῶν
  english_pob_choice: we joined battle with them
  chosen_spanish: entablamos combate con ellos
  alternatives_spanish:
  - entablamos batalla con ellos
  - libramos batalla con ellos
  lexicon: συνάπτω πόλεμον
  rationale: «Entablamos combate» transmite con naturalidad la idea de unirse al enfrentamiento, conservando el registro narrativo sin introducir un giro demasiado interpretativo.
- source_word: ἕως Θαφφουέ
  english_pob_choice: as far as Thapphoue
  chosen_spanish: hasta Tafué
  alternatives_spanish:
  - hasta Thapphoue
  - hasta Taffoué
  lexicon: ἕως + topónimo
  rationale: Se conserva la extensión espacial con «hasta», y el topónimo se normaliza de forma consistente con la elección anterior.
theological_decisions:
- issue: None of the source language here carries a distinct doctrinal tension requiring interpretive smoothing; the main issue is narrative phrasing and place-name handling.
  english_pob_reading: And as we were departing... we joined battle with them as far as Thapphoue.
  chosen_spanish_reading: Y mientras nos íbamos... entablamos combate con ellos hasta Tafué.
  alternative_spanish_readings:
  - Y cuando nos íbamos...
  - Y al partir nosotros...
  rationale: Se preserva el carácter testimonial y narrativo del pasaje sin añadir contenido doctrinal ni armonizaciones externas.
  doctrine_reference: No aplicable; relato histórico-testimonial no doctrinal.
translation_notes:
  revision_awareness: La versión inglesa POB ya está marcada como optimal-equivalence y sin notas; el griego presenta una variante textual con dos formas principales, pero ambas convergen en una escena narrativa de ataque, contraataque y desplazamiento espacial. No se introdujeron revisiones adicionales.
  spanish_consistency_notes:
  - Se mantuvo un registro narrativo sobrio y bíblico, evitando calcos innecesarios.
  - Se prefirió «Tafué» como forma española estable del topónimo para legibilidad, sin agregar notas porque el texto base no exigía una variante textual explotada en la edición inglesa.
  - Se evitó el término «batalla» en favor de «combate» para no sobrecargar el pasaje con un matiz épico no requerido por el griego.
