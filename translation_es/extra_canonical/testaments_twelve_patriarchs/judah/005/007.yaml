translation:
  language: es
  text: Y también a ellos los matamos, y quemamos la ciudad, y todo lo que había en ella.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀπεκτείναμεν
  english_pob_choice: And we killed them also
  chosen_spanish: Y también a ellos los matamos
  alternatives_spanish:
  - Y también los matamos
  - Y a ellos también los matamos
  lexicon: ἀποκτείνω
  rationale: El griego expresa acción directa de matar; «los matamos» conserva el sentido simple y fuerte. Se añade «también» para reflejar la partícula καί unida al pronombre, y «a ellos» para mantener claridad discursiva en español.
- source_word: τὴν πόλιν
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - la urbe
  lexicon: πόλις
  rationale: «Ciudad» es la correspondencia natural y fiel para πόλις en este contexto narrativo.
- source_word: ἐνεπρήσαμεν
  english_pob_choice: burned
  chosen_spanish: quemamos
  alternatives_spanish:
  - incendiamos
  - la prendimos fuego
  lexicon: ἐμπρήθω
  rationale: El verbo griego significa prender fuego o quemar; «quemamos» es claro, directo y suficientemente literal en español moderno.
- source_word: πάντα τὰ ἐν αὐτῇ
  english_pob_choice: everything in it
  chosen_spanish: todo lo que había en ella
  alternatives_spanish:
  - todo lo que estaba en ella
  - todo cuanto había en ella
  lexicon: πᾶς + ἐν + αὐτός
  rationale: La frase griega incluye la totalidad de lo contenido en la ciudad; «todo lo que había en ella» preserva ese alcance total sin sonar artificial.
theological_decisions:
- issue: Violencia narrativa sin atenuación
  english_pob_reading: And we killed them also, and burned the city, and everything in it.
  chosen_spanish_reading: Y también a ellos los matamos, y quemamos la ciudad, y todo lo que había en ella.
  alternative_spanish_readings:
  - Y también los matamos, y quemamos la ciudad, y todo lo que había en ella
  rationale: No hay indicio en el griego de metáfora o eufemismo; la traducción mantiene el carácter histórico-narrativo y la dureza del acto sin suavizarlo.
  doctrine_reference: Principio de fidelidad semántica al testimonio textual; no hay afirmación doctrinal adicional en el versículo.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requieren cambios; se conserva la lectura previa sin ajustes.
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y narrativo, adecuado para una versión pública.
  - Se evita «ciudad» con mayúscula porque el contexto no lo requiere.
  - No se introduce terminología eclesiástica ajena al griego; se respeta el tono histórico del pasaje.
