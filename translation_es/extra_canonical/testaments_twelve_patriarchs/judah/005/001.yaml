base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/005/001.yaml
  text: And on the next day we went to Areta, a city still mighty and strong, threatening us with death.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:53Z'
    unchanged: false
    changes_summary: Changed 'went away to' to 'went to' for more natural English while preserving the sense of ἀπήλθομεν. Kept the rest unchanged as accurate and complete.
translation:
  language: es
  text: Y al día siguiente fuimos a Aretá, ciudad todavía poderosa y fuerte, que nos amenazaba con la muerte.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τῇ ἑξῆς
  english_pob_choice: on the next day
  chosen_spanish: al día siguiente
  alternatives_spanish:
  - en el día siguiente
  - el siguiente día
  lexicon: ἑξῆς
  rationale: Expresa de manera natural la secuencia temporal sin calcar la sintaxis griega. Mantiene la relación inmediata con el evento anterior.
- source_word: ἀπήλθομεν
  english_pob_choice: we went
  chosen_spanish: fuimos
  alternatives_spanish:
  - partimos
  - nos fuimos
  lexicon: ἀπέρχομαι
  rationale: La revisión inglesa descartó 'went away to' por una forma más natural; en español, 'fuimos' comunica el desplazamiento de forma directa y sobria sin añadir matiz no atestiguado.
- source_word: εἰς ᾿Αρετάν
  english_pob_choice: to Areta
  chosen_spanish: a Aretá
  alternatives_spanish:
  - a Areta
  - hasta Aretá
  lexicon: topónimo
  rationale: Se conserva el nombre propio en forma hispanizada mínima y se usa la preposición simple 'a', que corresponde al movimiento hacia un lugar.
- source_word: πόλιν κραταιὰν ἔτι καὶ ἰσχυράν
  english_pob_choice: a city still mighty and strong
  chosen_spanish: ciudad todavía poderosa y fuerte
  alternatives_spanish:
  - ciudad aún poderosa y fuerte
  - ciudad aún poderosa y robusta
  lexicon: κραταιός / ἰσχυρός
  rationale: '''Poderosa y fuerte'' refleja los dos adjetivos griegos sin fusionarlos. ''Todavía'' traduce ἔτι con claridad temporal y estilística natural.'
- source_word: ἀπειλοῦσαν ἡμῖν θάνατον
  english_pob_choice: threatening us with death
  chosen_spanish: que nos amenazaba con la muerte
  alternatives_spanish:
  - amenazándonos con la muerte
  - que nos amenazaba de muerte
  lexicon: ἀπειλέω
  rationale: La construcción relativa reproduce el participio con valor descriptivo. 'Con la muerte' conserva el complemento literal de amenaza sin forzar una expresión idiomática más interpretativa.
theological_decisions:
- issue: Descripción de la ciudad como poderosa y fuerte sin intensificación doctrinal
  english_pob_reading: a city still mighty and strong, threatening us with death
  chosen_spanish_reading: ciudad todavía poderosa y fuerte, que nos amenazaba con la muerte
  alternative_spanish_readings:
  - ciudad aún muy poderosa y fuerte, que nos amenazaba con la muerte
  rationale: No se introduce énfasis adicional ni simbolismo. El texto presenta una amenaza concreta de la ciudad; la traducción mantiene el sentido narrativo literal sin suavizarlo ni amplificarlo.
  doctrine_reference: Ninguna; pasaje narrativo descriptivo.
translation_notes:
  revision_awareness: Se siguió la lectura inglesa revisada ('went to' en lugar de 'went away to') y se verificó contra el griego ἀπήλθομεν, que permite un verbo simple de movimiento en español. No se añadieron notas porque el texto es directo y no presenta variantes relevantes en esta muestra.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto solo cuando aparezca el tetragrámaton o una cita explícita; este versículo no lo contiene.
  - '''Aretá'' se mantiene como topónimo transliterado de forma sencilla para lectura eclesial en español.'
  - No se usó 'SEÑOR', 'Mesías' ni terminología doctrinal ajena al versículo.
