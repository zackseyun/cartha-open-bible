base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/005/003.yaml
  text: And those on the wall, thinking that we were alone, were drawn toward us.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:54Z'
    unchanged: false
    changes_summary: Changed 'against us' to 'toward us' to reflect πρὸς ἡμᾶς more accurately; retained 'were drawn' for ἐφελκύσθησαν and kept the rest unchanged.
translation:
  language: es
  text: Y los que estaban en el muro, pensando que nosotros solos estábamos allí, fueron atraídos hacia nosotros.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: οἱ ἀπὸ τοῦ τείχους
  english_pob_choice: those on the wall
  chosen_spanish: los que estaban en el muro
  alternatives_spanish:
  - los del muro
  - los que estaban sobre el muro
  lexicon: οἱ ἀπό + gen.; τείχος
  rationale: La expresión describe a personas ubicadas en el muro; en español, “los que estaban en el muro” conserva la referencia espacial sin forzar una construcción demasiado literal.
- source_word: μόνοι
  english_pob_choice: alone
  chosen_spanish: solos
  alternatives_spanish:
  - solamente nosotros
  - únicamente nosotros
  lexicon: μόνος
  rationale: “Solos” reproduce con naturalidad la idea de exclusividad de presencia. Evita añadir matices no presentes en el griego.
- source_word: ἐφελκύσθησαν
  english_pob_choice: were drawn
  chosen_spanish: fueron atraídos
  alternatives_spanish:
  - fueron arrastrados
  - fueron jalados
  lexicon: ἐφελκύω
  rationale: El verbo pasivo sugiere ser movidos o atraídos hacia un punto; “atraídos” sigue el sentido del inglés POB y mantiene una opción española digna y clara.
- source_word: πρὸς ἡμᾶς
  english_pob_choice: toward us
  chosen_spanish: hacia nosotros
  alternatives_spanish:
  - contra nosotros
  - en dirección a nosotros
  lexicon: πρός + acusativo
  rationale: La revisión inglesa corrigió “against us” por “toward us”; “hacia nosotros” conserva con fidelidad la dirección sin introducir hostilidad que el griego no exige.
translation_notes:
  revision_awareness: La revisión inglesa reciente cambió “against us” por “toward us” para reflejar con más precisión πρὸς ἡμᾶς. La versión española sigue esa corrección con “hacia nosotros” y mantiene el resto de la cláusula sin ampliaciones interpretativas.
  spanish_consistency_notes:
  - Se mantiene un registro narrativo sobrio y publicable, sin arcaísmos innecesarios.
  - No se introduce puntuación o vocabulario que sugiera oposición (“contra nosotros”), ya que el texto fuente indica dirección, no necesariamente agresión.
