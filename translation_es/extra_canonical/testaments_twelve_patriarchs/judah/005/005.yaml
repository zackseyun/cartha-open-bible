translation:
  language: es
  text: Y lo tomamos a filo de espada, y a los que habían huido para refugiarse en la torre los quemamos con fuego; y así los capturamos a todos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐλάβομεν αὐτούς / κατελάβομεν αὐτήν
  english_pob_choice: we took it / we captured them
  chosen_spanish: lo tomamos / los capturamos
  alternatives_spanish:
  - lo conquistamos / los conquistamos
  - lo tomamos por asalto / los apresamos
  lexicon: λαμβάνω; καταλαμβάνω
  rationale: El griego transmite toma/captura militar. En español, 'tomar' conserva la acción de apoderarse del lugar, y 'capturamos' expresa el resultado sobre las personas sin añadir matices no presentes en el texto.
- source_word: ἐν στόματι μαχαίρας
  english_pob_choice: by the edge of the sword
  chosen_spanish: a filo de espada
  alternatives_spanish:
  - con el filo de la espada
  - por el filo de la espada
  lexicon: στόμα + μάχαιρα
  rationale: La expresión idiomática griega equivale naturalmente a 'a filo de espada' en español; mantiene el valor figurado de instrumento de combate sin calco excesivo.
- source_word: τῷ πύργῳ
  english_pob_choice: the tower
  chosen_spanish: la torre
  alternatives_spanish:
  - la fortaleza
  - el torreón
  lexicon: πύργος
  rationale: El texto revisado confirma el singular. 'Torre' es la equivalencia directa y más transparente; 'fortaleza' o 'torreón' introducirían precisión arquitectónica no obligatoria.
- source_word: ἐν πυρὶ ἐνεπρήσαμεν
  english_pob_choice: we burned with fire
  chosen_spanish: los quemamos con fuego
  alternatives_spanish:
  - los incendiamos
  - los quemamos en el fuego
  lexicon: ἐμπρήθω
  rationale: El verbo indica quemar/incendiar. 'Los quemamos con fuego' reproduce la causalidad del griego de forma clara y sobria, sin cambiar el sentido a una imagen meramente idiomática.
theological_decisions:
- issue: Violencia narrativa militar en un texto antiguo
  english_pob_reading: And we took it by the edge of the sword... and so we captured them all.
  chosen_spanish_reading: Y lo tomamos a filo de espada... y así los capturamos a todos.
  alternative_spanish_readings:
  - y lo conquistamos a filo de espada
  - y los pasamos a espada
  rationale: Se conserva el carácter narrativo bélico del original sin suavizarlo ni intensificarlo artificialmente. 'A filo de espada' y 'capturamos a todos' siguen de cerca la semántica del pasaje.
  doctrine_reference: Descripción histórica/narrativa; no implica enseñanza doctrinal específica.
translation_notes:
  revision_awareness: La revisión inglesa reciente corrigió 'towers' a 'tower' para concordar con τῷ πύργῳ. La versión española sigue ese singular y mantiene el resto del sentido auditado sin ampliar indebidamente el plural.
  spanish_consistency_notes:
  - Se mantuvo 'torre' en singular para reflejar el texto griego revisado.
  - Se prefirió 'a filo de espada' como equivalente idiomático natural y fiel.
  - Se conservó la repetición de 'fuego' para reflejar la construcción causal del original.
