translation:
  language: es
  text: Él derramará el espíritu de la bendición del Padre santo sobre él, y él mismo derramará un espíritu de gracia sobre ustedes.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐκχέαι / ἐκχυθήσονται / ἐκχεεῖ
  english_pob_choice: pour out
  chosen_spanish: derramará
  alternatives_spanish:
  - verterá
  - desbordará
  lexicon: ἐκχέω
  rationale: «Derramar» reproduce bien la imagen de un acto abundante de efusión en español natural, sin atenuar la fuerza verbal del griego ni forzar un calco técnico.
- source_word: πνεῦμα
  english_pob_choice: spirit
  chosen_spanish: espíritu
  alternatives_spanish:
  - viento
  - aliento
  lexicon: πνεῦμα
  rationale: El contexto es claramente personal y benéfico, no meteorológico ni meramente fisiológico; por eso «espíritu» mantiene la referencia adecuada.
- source_word: εὐλογίαν / εὐλογίαι
  english_pob_choice: blessing
  chosen_spanish: bendición
  alternatives_spanish:
  - bendiciones
  - bienaventuranza
  lexicon: εὐλογία
  rationale: La imagen es la de una bendición transmitida o derramada; «bendición» conserva el valor nominal y evita introducir una pluralidad innecesaria en la primera mitad del verso.
- source_word: πατρὸς ἁγίου
  english_pob_choice: holy Father
  chosen_spanish: Padre santo
  alternatives_spanish:
  - padre santo
  - Padre santo
  lexicon: ἅγιος / πατήρ
  rationale: Se mantiene la relación titular con mayúscula inicial en «Padre» por tratarse de una designación reverente, y «santo» conserva el calificativo del original sin paráfrasis.
- source_word: χάριτος
  english_pob_choice: grace
  chosen_spanish: gracia
  alternatives_spanish:
  - favor
  - benevolencia
  lexicon: χάρις
  rationale: «Gracia» es la equivalencia más estable y fiel en este registro teológico; el contexto de derramamiento favorece ese sentido sobre «favor».
theological_decisions:
- issue: ¿La primera cláusula describe una bendición procedente del Padre santo o una bendición que consiste en el Espíritu mismo?
  english_pob_reading: He will pour out the spirit of the holy Father’s blessing upon him
  chosen_spanish_reading: Él derramará el espíritu de la bendición del Padre santo sobre él
  alternative_spanish_readings:
  - Él derramará el espíritu de la bendición del santo Padre sobre él
  - Él derramará la bendición del Padre santo en forma de espíritu sobre él
  rationale: La sintaxis del griego une πνεῦμα con εὐλογίας y luego lo relaciona con el Padre santo; la traducción conserva esa unión sin resolver artificialmente la tensión entre «espíritu» y «bendición».
  doctrine_reference: Gen 49:10-12; lenguaje de bendición patriarcal y efusión.
- issue: ¿Se mantiene el paralelismo con la segunda cláusula, donde el sujeto mismo derrama un espíritu?
  english_pob_reading: and he himself will pour out a spirit of grace upon you
  chosen_spanish_reading: y él mismo derramará un espíritu de gracia sobre ustedes
  alternative_spanish_readings:
  - y él mismo derramará un espíritu de gracia sobre vosotros
  - y él mismo derramará gracia sobre ustedes
  rationale: El griego repite el esquema de efusión con πνεῦμα χάριτος; por eso se conserva «un espíritu de gracia» y no se simplifica a «gracia», preservando la estructura literaria y la posible tensión conceptual.
  doctrine_reference: Joel 2:28-29; Isa 44:3; efusión del espíritu en clave profética.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requieren cambios y que el texto permanece sin variaciones; por ello el borrador español sigue de cerca el sentido del texto griego y la lectura ya establecida en inglés.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el original lo exige explícitamente; aquí no aparece el tetragrámaton.
  - Se mantiene «espíritu» en minúscula porque el griego no articula claramente una referencia al Espíritu Santo como nombre propio, sino a una efusión cualificada por gracia.
  - Se conserva un registro reverente y bíblico sin recurrir a formulaciones eclesiásticas que el griego no exige.
