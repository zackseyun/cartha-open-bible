translation:
  language: es
  text: Y de él brotará una vara de justicia para las naciones, para juzgar y salvar a todos los que invocan al Señor.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ῥάβδος
  english_pob_choice: rod
  chosen_spanish: vara
  alternatives_spanish:
  - cetro
  - bastón
  - vara de mando
  lexicon: ῥάβδος
  rationale: La imagen principal en español se comunica bien con «vara»; mantiene el valor simbólico de autoridad sin volver demasiado técnico o ceremonial el término.
- source_word: δικαιοσύνης
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia de Dios
  lexicon: δικαιοσύνη
  rationale: «Justicia» es la correspondencia más natural y bíblicamente reconocible en español para la cualidad o realidad expresada aquí; conserva la fuerza legal y moral del término.
- source_word: τοῖς ἔθνεσιν
  english_pob_choice: for the nations
  chosen_spanish: para las naciones
  alternatives_spanish:
  - entre las naciones
  - a las naciones
  lexicon: ἔθνος
  rationale: La preposición y el plural se reflejan de manera directa con «para las naciones», que suena natural en español y preserva el alcance universal del pasaje.
- source_word: κρῖναι
  english_pob_choice: to judge
  chosen_spanish: juzgar
  alternatives_spanish:
  - sentenciar
  - hacer juicio
  lexicon: κρίνω
  rationale: «Juzgar» reproduce con claridad el sentido judicial del verbo sin introducir una paráfrasis explicativa.
- source_word: σῶσαι
  english_pob_choice: to save
  chosen_spanish: salvar
  alternatives_spanish:
  - rescatar
  - librar
  lexicon: σῴζω
  rationale: «Salvar» es la equivalencia directa y más idiomática en español para el verbo de salvación, manteniendo la amplitud del campo semántico.
- source_word: ἐπικαλουμένους τὸν Κύριον
  english_pob_choice: all who call upon the Lord
  chosen_spanish: a todos los que invocan al Señor
  alternatives_spanish:
  - a todos los que llaman al Señor
  - a todos los que claman al Señor
  lexicon: ἐπικαλέω
  rationale: «Invocan» conserva el matiz reverente y litúrgico de llamar a Dios en oración; «Señor» sigue aquí la formulación del texto fuente griego, que cita el título κύριος sin explicitar el nombre divino.
theological_decisions:
- issue: Título divino κύριος en una frase de invocación
  english_pob_reading: all who call upon the Lord
  chosen_spanish_reading: a todos los que invocan al Señor
  alternative_spanish_readings:
  - a todos los que invocan a Yahvé
  - a todos los que llaman al Señor
  rationale: Aunque el proyecto normalmente traduce el nombre divino con «Yahvé», aquí el griego ofrece κύριος dentro de una fórmula de invocación sin un equivalente explícito del Tetragrámaton en el texto citado; por eso se mantiene «Señor» para reflejar fielmente la forma griega heredada en esta sección.
  doctrine_reference: Uso reverente del título divino y distinción entre nombre divino y título griego de referencia
- issue: Función mesiánica de la vara de justicia
  english_pob_reading: a rod of righteousness
  chosen_spanish_reading: una vara de justicia
  alternative_spanish_readings:
  - un cetro de justicia
  - una vara recta
  rationale: La imagen apunta a autoridad justa y gobernante; «vara de justicia» conserva la metáfora bíblica sin forzar una identificación interpretativa adicional.
  doctrine_reference: Esperanza mesiánica y juicio recto
- issue: Alcance universal del pasaje
  english_pob_reading: for the nations
  chosen_spanish_reading: para las naciones
  alternative_spanish_readings:
  - entre las naciones
  - a las naciones
  rationale: El plural amplio debe permanecer visible en español para no restringir indebidamente el alcance profético del texto.
  doctrine_reference: Universalidad de la salvación/jucio en la profecía
translation_notes:
  revision_awareness: El pasaje coincide con la última pasada de revisión indicada como sin cambios; por ello no se aplican modificaciones textuales respecto del contexto inglés auditado.
  spanish_consistency_notes:
  - Se mantiene «vara de justicia» para conservar la metáfora de autoridad justa.
  - Se conserva «Señor» en la invocación final porque el texto griego citado usa κύριος y no exige aquí la sustitución editorial por «Yahvé».
  - El registro es bíblico y público, con sintaxis española natural sin añadir explicación interpretativa al cuerpo del texto.
