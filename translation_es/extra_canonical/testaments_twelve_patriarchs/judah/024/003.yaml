base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/024/003.yaml
  text: '[This is the shoot of the Most High God, a spring providing life to all flesh.]'
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:56:26Z'
    unchanged: false
    changes_summary: Revised the final phrase from 'a spring for the life of all flesh' to 'a spring providing life to all flesh' to more directly reflect παρέχουσα ζωήν and improve natural English while preserving the formal sense.
translation:
  language: es
  text: '[Este es el brote del Dios Altísimo, una fuente que proporciona vida a toda carne.]'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Οὗτος ὁ βλαστὸς
  english_pob_choice: This is the shoot
  chosen_spanish: Este es el brote
  alternatives_spanish:
  - Este es el renuevo
  - Este es el retoño
  lexicon: βλαστός
  rationale: «Brote» comunica bien la imagen vegetal de algo que surge y crece, sin imponer una connotación más ornamental que la del griego. «Renuevo» y «retoño» son posibles, pero «brote» es más directo y natural en español para esta imagen profética.
- source_word: Θεοῦ ὑψίστου
  english_pob_choice: the Most High God
  chosen_spanish: el Dios Altísimo
  alternatives_spanish:
  - el Dios Supremo
  - el Altísimo Dios
  lexicon: ὕψιστος
  rationale: Se mantiene la formulación reverente y transparente «Dios Altísimo», que es natural en español y conserva el sentido superlativo del original. «Altísimo» funciona como atributo divino sin necesidad de perífrasis.
- source_word: πηγὴ ... παρέχουσα ζωήν
  english_pob_choice: a spring providing life
  chosen_spanish: una fuente que proporciona vida
  alternatives_spanish:
  - una fuente dando vida
  - una fuente que da vida
  lexicon: πηγή / παρέχω
  rationale: «Fuente» traduce la imagen de πηγή y «que proporciona vida» refleja παρέχουσα ζωήν con claridad y formalidad. Se evita una paráfrasis más libre y se conserva la relación causal/funcional del participio.
- source_word: πάσης σαρκός
  english_pob_choice: all flesh
  chosen_spanish: toda carne
  alternatives_spanish:
  - toda la humanidad
  - a toda carne
  lexicon: σάρξ
  rationale: Se conserva «carne» porque el texto griego usa σάρξ y la POB inglesa retiene «all flesh». En español, «toda carne» mantiene la tensión bíblica entre la creaturalidad corporal y el alcance universal sin reducirlo a una simple abstracción como «humanidad».
theological_decisions:
- issue: Alcance universal de la vida dada por la fuente
  english_pob_reading: a spring providing life to all flesh
  chosen_spanish_reading: una fuente que proporciona vida a toda carne
  alternative_spanish_readings:
  - una fuente que da vida a toda carne
  - una fuente para toda carne
  rationale: La formulación elegida deja claro que la fuente es agente de vida para toda carne, no solo un recurso destinado a ella. Esto sigue de cerca el participio παρέχουσα y conserva el impulso universal del pasaje.
  doctrine_reference: Cristología mesiánica y vida otorgada por el enviado divino en el marco de la expectativa apocalíptica del Testamento de Judá
translation_notes:
  revision_awareness: La redacción inglesa más reciente cambió de «for the life of all flesh» a «providing life to all flesh» para reflejar mejor παρέχουσα ζωήν. La versión española sigue esa revisión con «que proporciona vida», evitando una construcción finalística menos precisa.
  spanish_consistency_notes:
  - Se mantiene «Dios Altísimo» para preservar la referencia divina sin introducir «SEÑOR» u otra convención de sustitución.
  - Se usa «carne» de manera consistente con el valor bíblico de σάρξ y con la política POB de mantener fuerza léxica cuando el original la carga.
  - La puntuación entre corchetes reproduce el carácter de cita/segmento textual heredado del expediente de origen.
