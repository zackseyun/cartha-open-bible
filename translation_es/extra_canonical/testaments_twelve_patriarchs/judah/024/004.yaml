translation:
  language: es
  text: Entonces resplandecerá el cetro de mi reino, y de tu raíz brotará un retoño.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀναλάμψει
  english_pob_choice: will shine forth
  chosen_spanish: resplandecerá
  alternatives_spanish:
  - brillará
  - irradiará
  lexicon: ἀναλάμπω
  rationale: «Resplandecerá» reproduce la idea de aparecer con brillo o fulgor en un registro natural en español, manteniendo la fuerza escatológica del verbo sin volverlo demasiado técnico o poético de más.
- source_word: σκῆπτρον βασιλείας μου
  english_pob_choice: the scepter of my kingdom
  chosen_spanish: el cetro de mi reino
  alternatives_spanish:
  - la vara de mi reino
  - el bastón de mi reino
  lexicon: σκῆπτρον
  rationale: «Cetro» es el equivalente más directo y reconocido para σκῆπτρον; conserva el valor real y simbólico del objeto de gobierno.
- source_word: ἀπὸ τῆς ῥίζης ὑμῶν
  english_pob_choice: from your root
  chosen_spanish: de tu raíz
  alternatives_spanish:
  - de vuestra raíz
  - de tu linaje
  lexicon: ῥίζα
  rationale: Se mantiene «raíz» por fidelidad a la imagen vegetal del texto y porque prepara bien la metáfora del brote o retoño que surge de ella.
- source_word: γενήσεται πυθμήν / ἀναστήσεται πυθμήν
  english_pob_choice: a shoot will arise
  chosen_spanish: brotará un retoño
  alternatives_spanish:
  - surgirá un brote
  - saldrá un vástago
  lexicon: πυθμήν
  rationale: El aparato inglés revisó la traducción de «stem» a «shoot» por adecuación léxica; en español «retoño» comunica mejor esa imagen de nueva vida que nace de la raíz. «Brotará» refuerza el movimiento de surgimiento sin forzar el sustantivo.
theological_decisions:
- issue: Imagen real-mesiánica del cetro y del brote
  english_pob_reading: Then the scepter of my kingdom will shine forth, and from your root a shoot will arise.
  chosen_spanish_reading: Entonces resplandecerá el cetro de mi reino, y de tu raíz brotará un retoño.
  alternative_spanish_readings:
  - Entonces brillará el cetro de mi reino, y de tu raíz saldrá un vástago.
  - Entonces resplandecerá la vara de mi reino, y de tu raíz surgirá un brote.
  rationale: La formulación conserva la doble imagen de realeza y surgimiento de descendencia/renuevo, sin suavizar la tensión entre símbolo político y metáfora orgánica. «Cetro» mantiene el lenguaje de reino, y «retoño» deja abierta la lectura de descendiente prometido.
  doctrine_reference: motivo mesiánico-reinal en literatura testamentaria judía
- issue: Valor metafórico de «raíz» como origen de descendencia
  english_pob_reading: from your root
  chosen_spanish_reading: de tu raíz
  alternative_spanish_readings:
  - de vuestro origen
  - de tu linaje
  rationale: Se preserva la metáfora de origen vegetal del griego, que es teológicamente significativa porque vincula el futuro rey con una raíz previa, no solo con una ascendencia abstracta.
  doctrine_reference: metáfora bíblica de raíz y renuevo
translation_notes:
  revision_awareness: La revisión inglesa reciente cambió «stem» por «shoot» para reflejar mejor πυθμήν en este contexto; por eso el español evita «tallo» o «tronco» y usa «retoño», que expresa con mayor precisión la imagen de un brote naciente desde la raíz.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico sobrio y legible para lectores de iglesia en español.
  - Se conserva el paralelismo de la frase y el orden lógico del texto fuente.
  - No se introduce terminología eclesiástica posterior ajena al pasaje.
  - «Raíz» y «retoño» forman un par metafórico coherente en español y reflejan la imaginería del original.
