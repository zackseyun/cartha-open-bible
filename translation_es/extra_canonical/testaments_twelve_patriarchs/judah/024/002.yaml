base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/024/002.yaml
  text: And you will be to him sons in truth, and you will walk in his commandments, the first and the last.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:56:25Z'
    unchanged: false
    changes_summary: Adjusted 'for him' to the more literal 'to him'; changed 'commands' to the more formal 'commandments'; and clarified the final phrase as 'the first and the last' to reflect the Greek more naturally and completely.
translation:
  language: es
  text: Y ustedes serán para él hijos en verdad, y andarán en sus mandamientos, los primeros y los últimos.
  philosophy: formal
lexical_decisions:
- source_word: υἱοὺς ... ἐν ἀληθείᾳ
  english_pob_choice: sons in truth
  chosen_spanish: hijos en verdad
  alternatives_spanish:
  - hijos de verdad
  - hijos verdaderos
  lexicon: υἱοὺς; ἀληθείᾳ
  rationale: Conservo el sustantivo filial 'hijos' y la esfera de autenticidad 'en verdad' de manera directa. 'De verdad' suena más idiomático, pero 'en verdad' mantiene mejor la construcción y la fuerza adverbial del griego.
- source_word: πορεύσεσθε
  english_pob_choice: will walk
  chosen_spanish: andarán
  alternatives_spanish:
  - caminarán
  - andarán conforme a
  lexicon: πορεύομαι
  rationale: '''Andarán'' reproduce el valor figurado de conducta/curso de vida y sigue la elección inglesa ''will walk''. ''Caminarán'' es posible, pero menos natural en este contexto moral.'
- source_word: προστάγμασιν αὐτοῦ
  english_pob_choice: his commandments
  chosen_spanish: sus mandamientos
  alternatives_spanish:
  - sus mandatos
  - sus preceptos
  lexicon: πρόσταγμα
  rationale: La revisión inglesa favorece 'commandments'; en español 'mandamientos' es la correspondencia más estable y digna, con suficiente fuerza normativa.
- source_word: πρώτοις καὶ δευτέροις / ἐσχάτοις
  english_pob_choice: the first and the last
  chosen_spanish: los primeros y los últimos
  alternatives_spanish:
  - las primeras y las últimas
  - los primeros y los postreros
  lexicon: πρῶτος; ἔσχατος
  rationale: La forma española más fiel al par adjetival es 'los primeros y los últimos'. Mantiene el paralelismo del griego sin añadir una interpretación adicional.
theological_decisions:
- issue: Relación filial y fidelidad del pueblo a Yahvé/él
  english_pob_reading: And you will be to him sons in truth
  chosen_spanish_reading: Y ustedes serán para él hijos en verdad
  alternative_spanish_readings:
  - Y serán para él hijos verdaderos
  - Y ustedes le serán hijos en verdad
  rationale: '''Para él'' conserva la dirección relacional del dativo griego y la idea de pertenencia/fidelidad. No se introduce una formulación más teológica que la del texto.'
  doctrine_reference: fidelidad del pacto; adopción/relación filial
- issue: Secuencia normativa totalizante
  english_pob_reading: and you will walk in his commandments, the first and the last
  chosen_spanish_reading: y andarán en sus mandamientos, los primeros y los últimos
  alternative_spanish_readings:
  - y andarán en sus mandamientos, primero y último
  - y andarán en sus mandamientos, desde los primeros hasta los últimos
  rationale: El texto griego sugiere una totalidad abarcadora mediante el par 'primero/último'. La traducción conserva esa tensión sin suavizarla a una mera idea de continuidad.
  doctrine_reference: obediencia integral; totalidad de la instrucción divina
translation_notes:
  revision_awareness: 'La versión inglesa revisada corrigió ''for him'' a ''to him'', ''commands'' a ''commandments'' y aclaró el cierre como ''the first and the last''. La propuesta española sigue esa revisión: usa ''para él'' / ''a él'' implícito en ''serán para él'', ''mandamientos'', y mantiene el paralelismo completo ''los primeros y los últimos''.'
  spanish_consistency_notes:
  - Se evita 'SEÑOR' porque el pasaje no contiene un reemplazo explícito del nombre divino en el texto griego dado.
  - Se conserva un registro bíblico sobrio y moderno, sin arcaísmos innecesarios.
  - No se añaden notas al pie porque no hay una alternativa textual decisiva que requiera marcador en el versículo.
