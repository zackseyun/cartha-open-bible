translation:
  language: es
  text: 'Por dieciocho años mi padre hizo paz con su hermano Esaú[a], y sus hijos estuvieron con nosotros después que llegamos de Mesopotamia, de Labán.


    2 Y cuando se cumplieron los dieciocho años, Esaú, hermano de mi padre, vino contra nosotros con un pueblo grande y poderoso.


    3 Y Jacob hirió a Esaú con un arco, y cayó, muerto por el arco de Jacob, muerto en el monte Seír.


    4 Y nosotros perseguimos a los hijos de Esaú, y ellos también tenían una ciudad fortificada, y no pudimos entrar en ella. Pero, sentándonos alrededor de ella, la sitiamos.


    5 Y como no nos abrían después de veinte días, mientras ellos vigilaban, hice subir una escalera; y poniendo mi escudo sobre mi cabeza, y recibiendo las piedras, subí y maté a cuatro de sus hombres poderosos[b].


    6 Y Rubén y Gad mataron a otros seis. Entonces entraron en sucesión.


    7 Entonces nos pidieron términos de paz, y después de haberse tomado consejo con nuestro padre, los aceptamos.


    8 Y nos daban quinientos coros de trigo, y quinientas medidas de aceite, y quinientas medidas de vino, hasta el hambre[c], cuando descendimos a Egipto.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego aquí dice que Jacob hirió a Esaú con un arco y que Esaú cayó muerto en el monte Seír; se traduce así sin armonizarlo con la narración de Génesis.
    reason: cross_reference
  - marker: b
    text: 'Alternativamente: «recibiendo las piedras», o «soportando las piedras». El participio griego sugiere que Judá subía mientras las piedras le eran arrojadas.'
    reason: lexical_alternative
  - marker: c
    text: Un cor es una medida antigua de volumen para grano; el griego conserva unidades antiguas en vez de equivalentes modernos. El renglón del aceite es textual­mente incierto en el testimonio griego conservado, pero el sentido general es una lista paralela de trigo, aceite y vino en cantidades grandes.
    reason: textual_variant
lexical_decisions:
- source_word: ἐποίησεν ... εἰρήνην
  english_pob_choice: made peace
  chosen_spanish: hizo paz
  alternatives_spanish:
  - mantuvo la paz
  - hizo la paz
  lexicon: LSJ
  rationale: El giro es activo y relacional, no meramente descriptivo. 'Hizo paz' conserva la fuerza concreta de una acción de reconciliación, cercana al audit trail inglés y natural en español bíblico sobrio.
- source_word: λαῷ βαρεῖ καὶ ἰσχυρῷ
  english_pob_choice: with a large and powerful people
  chosen_spanish: con un pueblo grande y poderoso
  alternatives_spanish:
  - con un pueblo pesado y poderoso
  - con una hueste grande y fuerte
  lexicon: LSJ
  rationale: El inglés revisado suaviza 'heavy' a 'large' por naturalidad, pero el griego βαρεῖ puede sugerir peso, carga o gran envergadura. 'Grande y poderoso' comunica el sentido militar sin perder la magnitud del grupo.
- source_word: ἔπαισεν ἐν τόξῳ
  english_pob_choice: struck ... with a bow
  chosen_spanish: hirió ... con un arco
  alternatives_spanish:
  - golpeó ... con un arco
  - hirió ... con arco
  lexicon: LSJ
  rationale: '''Hirió'' transmite una acción bélica directa y evita un calco torpe. Mantiene el golpe narrativo del texto griego y el registro épico del testamento.'
- source_word: δυναστῶν
  english_pob_choice: mighty men
  chosen_spanish: hombres poderosos
  alternatives_spanish:
  - mighty men
  - príncipes poderosos
  - guerreros poderosos
  lexicon: LSJ
  rationale: En este contexto de asedio, el término apunta a varones de fuerza o preeminencia militar. 'Hombres poderosos' conserva amplitud semántica sin introducir una interpretación más estrecha que la del texto.
- source_word: τὰ πρὸς εἰρήνην
  english_pob_choice: terms of peace
  chosen_spanish: términos de paz
  alternatives_spanish:
  - condiciones de paz
  - propuestas de paz
  lexicon: LSJ
  rationale: Es una expresión idiomática de negociación. 'Términos de paz' resulta transparente, formal y fiel al valor diplomático del griego.
- source_word: κόρους
  english_pob_choice: cors
  chosen_spanish: coros
  alternatives_spanish:
  - coros (medida antigua)
  - medidas antiguas
  lexicon: LSJ
  rationale: Se conserva la unidad antigua transliterada para mantener la precisión histórica y la transparencia textual, como hace el inglés POB.
- source_word: μέτρα
  english_pob_choice: measures
  chosen_spanish: medidas
  alternatives_spanish:
  - unidades
  - medidas antiguas
  lexicon: LSJ
  rationale: El término griego es genérico; 'medidas' mantiene esa indeterminación sin inventar equivalentes modernos.
theological_decisions:
- issue: La afirmación de que Jacob hirió a Esaú con un arco y Esaú murió en Seír
  english_pob_reading: Translated the Greek witness directly without harmonizing to Genesis.
  chosen_spanish_reading: Traducido directamente del testimonio griego, sin armonizar con Génesis.
  alternative_spanish_readings:
  - Suavizar el enunciado como derrota militar sin muerte
  - Ajustarlo para concordar con la narración de Génesis
  rationale: La primacía de la fuente exige preservar la afirmación explícita del testamento. El texto griego dice que Esaú cayó muerto por el arco de Jacob en el monte Seír, y la traducción no debe borrar esa tensión con la tradición de Génesis.
  doctrine_reference: 'PHILOSOPHY.md: primacía de la lengua original; transparencia'
- issue: La línea textual sobre la provisión de aceite y la posible corrupción del pasaje
  english_pob_reading: Rendered the stable sense as parallel quantities of wheat, oil, and wine, with a note on the uncertain oil wording.
  chosen_spanish_reading: Se refleja el sentido estable de cantidades paralelas de trigo, aceite y vino, con nota sobre la incertidumbre del renglón del aceite.
  alternative_spanish_readings:
  - Traducir literalmente una frase más oscura
  - Omitir el segmento corrupto
  rationale: El tramo griego/OCR presenta inestabilidad, pero el sentido recuperable es una lista paralela de provisiones. La traducción principal conserva ese sentido y las notas preservan la incertidumbre textual en lugar de ocultarla.
  doctrine_reference: 'DOCTRINE.md: conservar la tensión textual con notas, no disimularla'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del inglés POB: ''large and powerful people'' se reflejó como ''pueblo grande y poderoso'', y ''asked us for terms of peace'' como ''nos pidieron términos de paz''. También se preservó la corrección al perfil de cantidad/provisión y la decisión de no armonizar con Génesis.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma por defecto cuando aparezca el nombre divino; en este pasaje no aparece.
  - Se conserva 'Esaú', 'Jacob', 'Rubén' y 'Gad' como formas bíblicas estándar en español.
  - Se mantiene 'trigo', 'aceite' y 'vino' como sustantivos concretos, sin modernizar las medidas.
  - Se evita 'siervo' o vocabulario eclesiástico no presente en la fuente.
  - La puntuación y el orden de frases siguen el estilo narrativo del texto griego y del audit trail inglés.
