  text: IX. *Δέκα καὶ ὀκτὼ¹ ἔτη ἐποίησεν δὲ² εἰρήνην³ ὁ⁴ πατὴρ μου⁵ μετὰ τοῦ ἀδελφοῦ αὐτοῦ Ἡσαῦ⁶ καὶ οἱ⁷ υἱοὶ αὐτοῦ μεθ᾽ ἡμῶν μετὰ⁸ τὸ ἐλθεῖν ἡμᾶς ἀπὸ⁹ Μεσοποταμίας ἀπὸ Λαβάν¹⁰. 2. Καὶ πληρωθέντων τῶν¹¹ δεκαοκτὼ¹² ἐτῶν ἐπανῆλθεν¹³ ἡμῖν¹⁴ Ἡσαῦ ὁ ἀδελφὸς τοῦ πατρός μου¹⁶ ἐν λαῷ βαρεῖ¹⁷ καὶ ἰσχυρῷ. 3. *Καὶ ἔπαισεν¹⁸ ἐν τόξῳ Ἰακὼβ τὸν Ἡσαῦ, καὶ¹⁹ ἤρθη ὁ νεκρὸς²⁰ ἐν ὄρει Σεείρ. 4. Καὶ ἡμεῖς κατεδιώξαμεν²² τοὺς υἱοὺς Ἡσαῦ²³, ἦν δὲ²⁴ καὶ τούτοις πόλις ὀχυρά²⁵, καὶ οὐκ ἠδυνήθημεν εἰσελθεῖν ἐν αὐτῇ²⁶, *περικαθίσαντες δὲ²⁷ ἐπολιορκοῦμεν αὐτῇ²⁸. 5. *Καὶ ὡς οὐκ ἠνοίγον ἡμέρας εἴκοσι, δρώντων αὐτῶν²⁹ προσάγω³⁰ κλίμακα³¹ καὶ παραβησθεὶς³² *τὴν ἀσπίδα ἐπὶ τῆς κεφαλῆς μου³³ καὶ³⁴ ἀνῆλθον³⁵, *ἀποδεχόμενος ἀπὸ τοίχου λίθους³⁶ καὶ³⁷ ἀνεῖλον³⁸ τέσσαρας πόλει αὐτῶν δυνάστας³⁹. 6. Καὶ⁴⁰ Ῥουβὶμ καὶ⁴¹ ὁ Γὰδ ἀνεῖλον ἑτέρους ἕξ⁴¹. 7. Τότε αἰτοῦσιν⁴² αὐτὸ⁴³ ἡμᾶς⁴⁴ τὰ πρὸς εἰρήνην καὶ *γενομένης βουλῆς μετὰ⁴⁵ τοῦ πατρὸς ἡμῶν, ὑποδεξάμενοι αὐτοὺς ὑποφόρους⁴⁶. 8. Καὶ ἦσαν διδόντες⁴⁷ ἡμῖν πυροῦ⁴⁸ κόρους⁴⁹ πεντακοσίους⁵⁰,
