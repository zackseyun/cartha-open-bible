translation:
  language: es
  text: "1[a]. Porque extravía, pues en el engaño de la plata llaman dioses a los que no son dioses, y hace caer en frenesí al que la posee. 2. Por la plata perdí a mis hijos; y si mi arrepentimiento y mi humillación, y las oraciones de mi padre, no hubieran venido en mi auxilio, habría muerto sin hijos. 3. Pero el Dios de mis padres tuvo misericordia de mí, porque hice esto en ignorancia[b]. 4. Pues el soberano del engaño me cegó, y yo era ignorante como un hombre, y, como carne corrompida en pecados, reconocí mi propia debilidad, creyéndome invencible.\n\n\n    5. Entiendan, pues, mis hijos, que dos espíritus atienden al hombre: el espíritu de la verdad y el espíritu del engaño. 6. Y entre ellos está la conciencia de la mente, a la cual puede inclinarse como quiera. 7. Las obras de la verdad y las obras del engaño están escritas sobre el pecho del hombre, y Yahvé conoce a cada una de ellas. 8. Y no hay tiempo en que las obras de los hombres puedan escapar a su mirada, porque están inscritas\
    \ delante de Yahvé sobre el pecho. 9. Y el espíritu de la verdad da testimonio contra todo, y el pecador es consumido por su propio corazón[c], y no puede levantar su rostro ante el juez."
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El testimonio griego es textualmente complejo en los vv. 5–8, especialmente en torno a 'conciencia', 'entendimiento de la mente' y la formulación sobre lo que está escrito en el pecho. La traducción sigue el sentido compartido de los testigos sin comprometerse en exceso con una forma más desarrollada.
    reason: textual_variant
  - marker: b
    text: O 'en el engaño del dinero'. El griego dice literalmente 'plata', un modismo tradicional para la riqueza.
    reason: lexical_alternative
  - marker: c
    text: 'La frase final conserva la imagen judicial e interior del griego transmitido: el pecador queda consumido por su propio corazón y no puede presentarse con libertad ante el juez.'
    reason: alternative_reading
lexical_decisions:
- source_word: δύο πνεύματα
  english_pob_choice: two spirits
  chosen_spanish: dos espíritus
  alternatives_spanish:
  - dos impulsos
  - dos disposiciones
  lexicon: LSJ
  rationale: Se mantiene el lenguaje espiritual explícito del griego; en español ‘espíritus’ conserva mejor el marco moral y paraenético que una reducción psicológica.
- source_word: σχολάζουσι τῷ ἀνθρώπῳ
  english_pob_choice: attend a man
  chosen_spanish: atienden al hombre
  alternatives_spanish:
  - están activos en el hombre
  - están ocupados con el hombre
  lexicon: LSJ
  rationale: ‘Atienden’ conserva la idea de presencia/operación alrededor de la persona sin forzar una paráfrasis más interpretativa.
- source_word: συνείδησις
  english_pob_choice: conscience of the mind
  chosen_spanish: conciencia de la mente
  alternatives_spanish:
  - conciencia mental
  - entendimiento de la mente
  - conciencia
  lexicon: BDAG
  rationale: La forma griega en la tradición textual apunta a una facultad interior intermedia; ‘conciencia de la mente’ mantiene el matiz moral y cognitivo sin resolver la variante a una sola noción moderna.
- source_word: στῆθος
  english_pob_choice: breast
  chosen_spanish: pecho
  alternatives_spanish:
  - breast
  - corazón
  lexicon: LSJ
  rationale: En español ‘pecho’ es el equivalente natural y conserva la imagen corporal de inscripción; ‘corazón’ interpretaría más de lo que el griego dice.
- source_word: κατηγορεῖ
  english_pob_choice: testifies against
  chosen_spanish: da testimonio contra
  alternatives_spanish:
  - acusa contra
  - testifica contra
  lexicon: BDAG
  rationale: ‘Da testimonio contra’ preserva el matiz forense y suena natural en español, manteniendo la escena judicial sin endurecerla innecesariamente.
- source_word: ἐμπεπύρισται
  english_pob_choice: is burned up
  chosen_spanish: es consumido
  alternatives_spanish:
  - arde
  - es quemado
  lexicon: LSJ
  rationale: ‘Es consumido’ comunica el efecto de quemadura interior y juicio moral con un español más idiomático; evita la ambigüedad de ‘ardido’ en registro moderno.
- source_word: πλάνη
  english_pob_choice: deceit
  chosen_spanish: engaño
  alternatives_spanish:
  - error
  - delirio
  - extravio
  lexicon: LSJ
  rationale: Para este testamento, el término expresa desvío moral y espiritual; ‘engaño’ reproduce esa fuerza ética de manera clara en español.
- source_word: ἀληθείας
  english_pob_choice: truth
  chosen_spanish: verdad
  alternatives_spanish:
  - veracidad
  - lo verdadero
  lexicon: BDAG
  rationale: ‘Verdad’ es la opción directa y solemne en español; encaja con la antítesis establecida con ‘engaño’.
- source_word: Κύριος
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  lexicon: LXX/POB default
  rationale: Siguiendo el criterio del proyecto, se traduce el nombre divino con ‘Yahvé’ en el texto principal; donde el griego refleja el uso del nombre divino, se evita la máscara devocional ‘Señor’.
- source_word: συγκεκριμένη forensic imagery of judge
  english_pob_choice: the judge
  chosen_spanish: el juez
  alternatives_spanish:
  - el tribunal
  - el magistrado
  lexicon: BDAG/LSJ
  rationale: ‘El juez’ conserva la imaginería forense del pasaje y coincide con el cierre judicial del verso.
theological_decisions:
- issue: Dos espíritus como agencias morales
  english_pob_reading: The chapter is translated as presenting two real moral-spiritual agencies—truth and deceit—with an inner conscience between them.
  chosen_spanish_reading: El texto se presenta como dos espíritus reales en el plano moral-espiritual —verdad y engaño— con una conciencia interior entre ambos.
  alternative_spanish_readings:
  - dos tendencias psicológicas
  - seres angelicales y demoníacos en sentido ontológico estricto
  rationale: El griego usa πνεύματα y el contexto exhortativo favorece conservar el lenguaje espiritual sin reducirlo a psicología ni cerrarlo a una ontología más precisa de la que el texto exige.
  doctrine_reference: Preservar la tensión teológica sin resolverla
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del auditor inglés, que simplificó redundancias y mantuvo la economía del griego; en español se evita añadir glosas como ‘mis hijos varones’ o equivalentes no presentes en el testimonio base. También se respetó la elección de ‘silver’ como ‘silver/wealth’ en el trasfondo, pero esta sección no requiere esa nota textual porque el fragmento entregado comienza en vv. 5–9.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como forma principal para el nombre divino, conforme al estándar del proyecto.
  - Se conserva el contraste ‘verdad/engaño’ para πνεῦμα τῆς ἀληθείας / πνεῦμα τῆς πλάνης.
  - Se evita ‘Señor’ en el texto principal salvo donde el auditable griego no exige el nombre divino explícito.
  - Se prefiere ‘pecho’ para la imaginería de inscripción corporal.
  - La nota c está anclada en ‘corazón’ para reflejar la lectura alternativa de la tradición textual y el sentido forense final.
