source:
  edition: Charles 1908 Greek Versions (pages 134-175, Judah pilot full)
  text: Καὶ *συνάψαντες ἐτρέ- ψαμεν⁴ αὐτοὺς⁵ Γκαὶ τοὺς ἀπὸ Σιλὼμ συμμάχους αὐτῶν ἀπεκτείναμεν¹⁶ καὶ οὐκ ἐδώκαμεν Γαὐτοῖς¹⁷ διέξοδον⁸ *τοῦ
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/006/002.yaml
  text: And when we joined battle, we routed them; and we killed those from Shiloh, their allies, and gave them no way of escape.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:57Z'
    unchanged: false
    changes_summary: Adjusted the first clause to better reflect the participle and verb ('when we joined battle' / 'we routed them') and corrected 'Shilom' to the more standard transliteration 'Shiloh'. Removed the footnote marker from 'allies'.
translation:
  language: es
  text: Y cuando entramos en batalla, los derrotamos; y matamos a los de Shiloh, sus aliados, y no les dimos escape.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: συνάψαντες
  english_pob_choice: when we joined battle
  chosen_spanish: cuando entramos en batalla
  alternatives_spanish:
  - cuando trabamos combate
  - al unirnos en batalla
  lexicon: συνάπτω
  rationale: El participio aoristo expresa acción circunstancial previa o concurrente; en español, 'cuando entramos en batalla' comunica con naturalidad la situación de combate sin forzar una calca.
- source_word: ἐτρέψαμεν
  english_pob_choice: we routed them
  chosen_spanish: los derrotamos
  alternatives_spanish:
  - los pusimos en fuga
  - los hicimos huir
  lexicon: τρέπω
  rationale: El verbo griego puede implicar hacer volver o poner en fuga; 'los derrotamos' mantiene el sentido de victoria militar y permite el matiz de desbandada sin sonar artificioso.
- source_word: ἀπεκτείναμεν
  english_pob_choice: we killed
  chosen_spanish: matamos
  alternatives_spanish:
  - dimos muerte a
  - los matamos
  lexicon: ἀποκτείνω
  rationale: La forma simple y directa 'matamos' corresponde bien al valor del verbo y conserva el tono narrativo sobrio del pasaje.
- source_word: τοὺς ἀπὸ Σιλὼμ
  english_pob_choice: those from Shiloh
  chosen_spanish: a los de Shiloh
  alternatives_spanish:
  - a los hombres de Shiloh
  - a los procedentes de Shiloh
  lexicon: Σιλώμ / Σηλώ
  rationale: Se mantiene la transliteración estable 'Shiloh', como en el texto inglés revisado, para conservar la referencia geográfica/histórica sin introducir una equivalencia interpretativa adicional.
- source_word: συμμάχους αὐτῶν
  english_pob_choice: their allies
  chosen_spanish: sus aliados
  alternatives_spanish:
  - sus confederados
  - los aliados de ellos
  lexicon: σύμμαχος
  rationale: '''Sus aliados'' reproduce de manera natural la relación de apoyo militar indicada por el sustantivo griego.'
- source_word: οὐκ ἐδώκαμεν διέξοδον
  english_pob_choice: gave them no way of escape
  chosen_spanish: no les dimos escape
  alternatives_spanish:
  - no les dimos salida
  - no les dejamos vía de escape
  lexicon: διέξοδος
  rationale: La expresión española 'no les dimos escape' es idiomática y fiel al sentido de impedir la huida; evita una perífrasis excesiva mientras conserva el valor de bloqueo total.
theological_decisions:
- issue: Violencia narrativa militar
  english_pob_reading: And when we joined battle, we routed them; and we killed those from Shiloh, their allies, and gave them no way of escape.
  chosen_spanish_reading: Y cuando entramos en batalla, los derrotamos; y matamos a los de Shiloh, sus aliados, y no les dimos escape.
  alternative_spanish_readings:
  - Y cuando trabamos combate, los pusimos en fuga; y matamos a los de Shiloh, sus aliados, y no les dejamos salida.
  rationale: El texto describe una acción bélica directa sin suavizarla. La versión española conserva el nivel de explicitud del original y del POB inglés, sin añadir evaluación moral ni atenuación interpretativa.
  doctrine_reference: Narrativa histórica / lenguaje bélico descriptivo
- issue: Topónimo Shiloh
  english_pob_reading: Shiloh
  chosen_spanish_reading: Shiloh
  alternative_spanish_readings:
  - Silo
  rationale: Se retiene la forma 'Shiloh' porque coincide con la revisión inglesa más reciente y evita ambigüedad con otras grafías; 'Silo' podría sonar más tradicional, pero aquí no es necesario ni más preciso.
  doctrine_reference: Transliteración de topónimos bíblicos
translation_notes:
  revision_awareness: La revisión inglesa más reciente ajustó el primer miembro a 'when we joined battle' y cambió 'Shilom' por 'Shiloh', además de eliminar una nota sobre 'allies'. La redacción española sigue esa lectura revisada y no introduce marcas de nota donde el inglés ya no las conserva.
  spanish_consistency_notes:
  - Se mantiene el registro narrativo sobrio y bélico del original.
  - '''Shiloh'' se conserva como transliteración estable en todo el pasaje.'
  - No se introducen términos eclesiásticos ajenos al contexto militar del texto.
