base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/006/001.yaml
  text: And as I was by the waters of Chozeba, those from Jobel came against us for battle.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:57Z'
    unchanged: false
    changes_summary: Removed the paraphrastic 'when' to better match the source's temporal clause with 'and as'; otherwise preserved the draft's wording and completeness.
translation:
  language: es
  text: Y como yo estaba junto a las aguas de Chozebá, los de Jobel vinieron contra nosotros para la batalla.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Καὶ ὡς ἤμην
  english_pob_choice: And as I was
  chosen_spanish: Y como yo estaba
  alternatives_spanish:
  - Y como estaba yo
  - Y cuando yo estaba
  lexicon: καί; ὡς; εἰμί
  rationale: El griego usa una cláusula temporal con ὡς, que la revisión inglesa ajustó de 'when' a 'as' para reflejar mejor el valor temporal. En español, 'Y como yo estaba' conserva esa relación sin volverla explicativa ni causal. Se añade 'yo' por claridad narrativa, aunque el verbo ya la implica.
- source_word: ἐν τοῖς ὕδασι
  english_pob_choice: by the waters
  chosen_spanish: junto a las aguas
  alternatives_spanish:
  - por las aguas
  - a las aguas
  lexicon: ἐν + dativo
  rationale: Aunque ἐν puede ser locativo, el inglés POB eligió 'by' para no forzar una ubicación estrictamente interna. En español, 'junto a' comunica con naturalidad proximidad geográfica y sigue el matiz del audit trail.
- source_word: Χωζηβά
  english_pob_choice: Chozeba
  chosen_spanish: Chozebá
  alternatives_spanish:
  - Chozeba
  lexicon: topónimo transliterado
  rationale: Se conserva el nombre propio con transliteración española. La tilde ayuda a la pronunciación natural en español sin alterar el referente.
- source_word: οἱ ἀπὸ †Ἰωβὴλ
  english_pob_choice: those from Jobel
  chosen_spanish: los de Jobel
  alternatives_spanish:
  - los procedentes de Jobel
  - los de parte de Jobel
  lexicon: οἱ ἀπό + genitivo; topónimo
  rationale: La construcción griega indica procedencia. 'Los de Jobel' es una forma breve y natural en español que mantiene la relación de origen sin añadir precisión no garantizada por el texto.
- source_word: ἦλθον ἐφʼ ἡμᾶς
  english_pob_choice: came against us
  chosen_spanish: vinieron contra nosotros
  alternatives_spanish:
  - vinieron sobre nosotros
  - vinieron contra nosotros en ataque
  lexicon: ἔρχομαι + ἐπί
  rationale: El inglés POB interpreta ἐπί con valor hostil. 'Vinieron contra nosotros' conserva esa fuerza bélica de manera idiomática en español.
- source_word: εἰς πόλεμον
  english_pob_choice: for battle
  chosen_spanish: para la batalla
  alternatives_spanish:
  - a la batalla
  - para combatir
  lexicon: πόλεμος
  rationale: '''Para la batalla'' reproduce la finalidad/resultado expresado por εἰς con un sustantivo bélico directo, concordando con el tono narrativo del verso.'
theological_decisions:
- issue: Hostile motion toward the speaker
  english_pob_reading: came against us for battle
  chosen_spanish_reading: vinieron contra nosotros para la batalla
  alternative_spanish_readings:
  - vinieron sobre nosotros para la batalla
  - nos atacaron
  rationale: No hay una afirmación doctrinal específica, pero sí una lectura de conflicto que debe mantenerse. Se conserva el movimiento hostil sin intensificarlo más allá del texto.
  doctrine_reference: Narrative fidelity; no special doctrinal locus
translation_notes:
  revision_awareness: La revisión inglesa reciente corrigió 'when' a 'as' para seguir mejor la cláusula temporal griega; la presente redacción española refleja ese mismo ajuste con 'Y como yo estaba'. No se heredaron notas de pie de página porque el registro inglés final no conservó ninguna.
  spanish_consistency_notes:
  - Se mantiene 'Chozebá' como transliteración española coherente de Χωζηβά.
  - Se usa 'los de Jobel' para una procedencia colectiva breve y natural.
  - No se introduce 'SEÑOR' ni vocabulario teológico no presente en el versículo.
