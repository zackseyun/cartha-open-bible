translation:
  language: es
  text: Hijos míos[a][b], el amor al dinero lleva a la idolatría.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego es elíptico: literalmente, «Hijos míos, el amor al dinero hacia idolatría». La traducción desarrolla la relación implícita con «lleva a».'
    reason: textual_variant
  - marker: b
    text: Alternativamente, puede entenderse como «tiende hacia la idolatría».
    reason: lexical_alternative
lexical_decisions:
- source_word: Τέκνα μου
  english_pob_choice: My children
  chosen_spanish: Hijos míos
  alternatives_spanish:
  - Mis hijos
  - Hijos míos, hijos
  lexicon: LSJ
  rationale: Conserva el tono afectuoso y exhortativo del padre-testador. En español, "hijos míos" suena natural y no restringe indebidamente el alcance más allá de la relación paternal del hablante.
- source_word: φιλαργυρία
  english_pob_choice: the love of money
  chosen_spanish: el amor al dinero
  alternatives_spanish:
  - la avaricia
  - la codicia
  lexicon: BDAG
  rationale: Sigue de cerca el valor compuesto del término griego y preserva su fuerza moral sin sustituirlo por un vocablo más general o más interpretativo.
- source_word: πρὸς
  english_pob_choice: leads to
  chosen_spanish: lleva a
  alternatives_spanish:
  - tiende hacia
  - va hacia
  - conduce a
  lexicon: LSJ
  rationale: El griego es elíptico y sugiere dirección. "Lleva a" expresa de forma idiomática en español la relación moral/direccional sin resolverla como una identidad absoluta.
- source_word: εἰδωλολατρίαν
  english_pob_choice: idolatry
  chosen_spanish: la idolatría
  alternatives_spanish:
  - el culto a los ídolos
  - idolatría
  lexicon: BDAG
  rationale: '"Idolatría" es el equivalente directo, breve y teológicamente cargado, y mantiene la acusación moral del texto.'
theological_decisions:
- issue: Relación entre el amor al dinero e idolatría en la cláusula elíptica
  english_pob_reading: 'Render the clause as a moral assertion: ''the love of money leads to idolatry.'''
  chosen_spanish_reading: El amor al dinero lleva a la idolatría.
  alternative_spanish_readings:
  - El amor al dinero tiende hacia la idolatría.
  - El amor al dinero es idólatra.
  rationale: El griego dado no formula una ecuación explícita; πρός conserva idea de dirección. "Lleva a" mantiene la fuerza parenética sin borrar la tensión textual ni convertir la frase en una identificación más fuerte de lo que el testimonio sostiene.
  doctrine_reference: Primacía del texto original y preservación de la tensión exegética.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: ambos marcadores de nota, [a] y [b], aparecen ahora exactamente en el texto español. No se añadió material ajeno al testimonio griego; se mantuvo la relación elíptica entre φιλαργυρία y εἰδωλολατρίαν con una formulación idiomática.'
  spanish_consistency_notes:
  - Se usó "Hijos míos" para mantener el tono patriarcal exhortativo del testamento.
  - Se prefirió "amor al dinero" sobre "avaricia" o "codicia" para respetar la decisión léxica documentada en el audit trail.
  - '"Lleva a" conserva la dirección implícita de πρός sin sobretraducirla.'
  - '"Idolatría" mantiene el vocabulario teológico estándar y la gravedad del vicio nombrado.'
