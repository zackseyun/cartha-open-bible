base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/017/003.yaml
  text: For they will even corrupt wise men from among my sons, and they will cause the kingdom of Judah to be diminished, which he gave me because of my obedience to my father Jacob.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:58Z'
    unchanged: false
    changes_summary: Removed the footnote marker and changed "the Lord gave me" to "he gave me" to match the Greek source, which does not include "the Lord."
translation:
  language: es
  text: Porque incluso corromperán a hombres sabios de entre mis hijos, y harán que el reino de Judá sea disminuido, el cual me dio por mi obediencia a mi padre Jacob.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: σοφοὺς ἄνδρας
  english_pob_choice: wise men
  chosen_spanish: hombres sabios
  alternatives_spanish:
  - varones sabios
  - sabios
  lexicon: σοφός; ἀνήρ
  rationale: La combinación conserva el sentido de personas varones con sabiduría, como en el inglés POB. «Hombres sabios» es natural y mantiene la referencia a miembros masculinos de los hijos de Judá.
- source_word: ἀλλοιώσουσιν
  english_pob_choice: corrupt
  chosen_spanish: corromperán
  alternatives_spanish:
  - alterarán
  - pervertirán
  lexicon: ἀλλοιόω
  rationale: «Corromperán» reproduce bien el sentido de deteriorar moral o espiritualmente, que es el valor que el POB inglés toma aquí.
- source_word: βασιλείαν Ἰούδα
  english_pob_choice: the kingdom of Judah
  chosen_spanish: el reino de Judá
  alternatives_spanish:
  - la realeza de Judá
  - el reino judaita
  lexicon: βασιλεία; Ἰούδα
  rationale: Se conserva la referencia política y dinástica con la forma habitual «reino de Judá», clara en español bíblico moderno.
- source_word: σμικρυνθῆναι ποιήσουσιν
  english_pob_choice: cause ... to be diminished
  chosen_spanish: harán que ... sea disminuido
  alternatives_spanish:
  - harán ... pequeño
  - lo reducirán
  lexicon: σμικρύνω
  rationale: La construcción causativa se vierte de modo natural en español. «Sea disminuido» mantiene la pasividad del efecto sobre el reino sin sobreinterpretar la imagen.
- source_word: ἣν ἔδωκέ
  english_pob_choice: which he gave me
  chosen_spanish: el cual me dio
  alternatives_spanish:
  - que me dio
  - la cual me dio
  lexicon: δίδωμι
  rationale: El texto griego y la revisión inglesa eliminan «el Señor». En español se conserva el sujeto implícito en «me dio», sin añadir un referente que el griego no expresa en este tramo.
theological_decisions:
- issue: Sujeto implícito de «me dio»
  english_pob_reading: which he gave me because of my obedience to my father Jacob
  chosen_spanish_reading: el cual me dio por mi obediencia a mi padre Jacob
  alternative_spanish_readings:
  - el cual me dio el Señor
  - el cual me dio Dios
  rationale: Se sigue la revisión auditada que quitó «the Lord» por no estar en el griego. En español se evita introducir un sujeto teológico no atestiguado en el segmento conservado.
  doctrine_reference: Fidelidad textual / crítica textual
translation_notes:
  revision_awareness: La revisión inglesa más reciente eliminó la adición «the Lord» y dejó simplemente «he gave me» para ajustarse al griego. La versión española sigue esa corrección y no introduce un referente divino ausente en el texto base conservado.
  spanish_consistency_notes:
  - Se mantiene «Judá» como nombre del reino/dinastía, coherente con el uso bíblico español.
  - «Corromperán» conserva el valor moral fuerte del inglés POB sin suavizarlo.
  - No se añade nota textual porque la lectura revisada ya quedó integrada en la traducción española.
