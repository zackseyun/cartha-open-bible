  text: ὅτι καὶ¹⁶ σοφοὺς ἄνδρας τῶν υἱῶν μου ἀλλοιώσουσιν καὶ βασιλείαν¹⁷ Ἰούδα *σμικρυνθῆναι ποιήσουσιν¹⁸, ἣν ἔδωκέ
