translation:
  language: es
  text: 'Y ahora yo les mando, hijos míos: no amen la plata, ni fijen su mirada en la belleza de las mujeres; porque yo también, por el oro y la hermosura, fui desviado[a] hacia Besúe, la mujer cananea.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Fui desviado» refleja el pasivo del griego ἐπλανήθην; también puede entenderse como «fui extraviado».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐντέλλομαι
  english_pob_choice: I command
  chosen_spanish: yo les mando
  alternatives_spanish:
  - yo les ordeno
  - yo les mando a ustedes
  lexicon: ἐντέλλομαι
  rationale: El griego expresa un mandato personal y directo. «Mandar» conserva la fuerza imperativa sin sonar excesivamente técnico; el dativo implícito se vuelve «les» para claridad natural en español.
- source_word: ἀργύριον
  english_pob_choice: silver
  chosen_spanish: la plata
  alternatives_spanish:
  - el dinero
  - la plata (moneda)
  lexicon: ἀργύριον
  rationale: La POB inglesa mantiene «silver» por el valor material/metonímico del metal. En español, «la plata» transmite esa misma referencia y su uso como riqueza sin reducirlo a dinero en general.
- source_word: ἐπιβλέψαι εἰς κάλλος γυναικῶν
  english_pob_choice: set your gaze on the beauty of women
  chosen_spanish: fijen su mirada en la belleza de las mujeres
  alternatives_spanish:
  - miren con deseo la belleza de las mujeres
  - codicien la belleza de las mujeres
  lexicon: ἐπιβλέψαι εἰς + κάλλος
  rationale: La construcción sugiere dirigir la vista/atención hacia algo bello. «Fijen su mirada» conserva el gesto visual del texto sin agregar explícitamente una carga de codicia que no está formulada de manera idéntica en el griego.
- source_word: χρυσίον
  english_pob_choice: gold
  chosen_spanish: el oro
  alternatives_spanish:
  - oro
  - el dinero y el lujo
  lexicon: χρυσίον
  rationale: Se traduce con el equivalente natural en español, manteniendo el paralelismo con «la plata» y la asociación con riqueza material.
- source_word: εὐμορφίαν
  english_pob_choice: beauty
  chosen_spanish: la hermosura
  alternatives_spanish:
  - la belleza
  - la hermosura física
  lexicon: εὐμορφία
  rationale: «Hermosura» preserva el matiz de belleza externa/atractiva y ayuda a distinguirlo de la «belleza de las mujeres» ya mencionada, evitando una repetición plana.
- source_word: ἐπλανήθην
  english_pob_choice: was led astray
  chosen_spanish: fui desviado
  alternatives_spanish:
  - fui extraviado
  - me desvié
  lexicon: πλανάω
  rationale: La forma pasiva indica que sufrió desviación por causa de esos bienes. «Fui desviado» mantiene la pasividad y la idea de apartarse del camino correcto.
- source_word: Βησουὲ τὴν Χαναναίαν
  english_pob_choice: Besue the Canaanite woman
  chosen_spanish: Besúe, la mujer cananea
  alternatives_spanish:
  - Besúe, la cananea
  - Besue la cananea
  lexicon: Βησουὲ
  rationale: Se conserva el nombre transliterado con acento adaptado al español para pronunciación. «La mujer cananea» traduce el epíteto descriptivo de manera clara y fiel.
theological_decisions:
- issue: Advertencia moral contra la riqueza y la lujuria visual
  english_pob_reading: do not love silver, nor set your gaze on the beauty of women
  chosen_spanish_reading: no amen la plata, ni fijen su mirada en la belleza de las mujeres
  alternative_spanish_readings:
  - no amen la plata, ni codicien la belleza de las mujeres
  - no amen la riqueza, ni miren con deseo a las mujeres
  rationale: El pasaje combina una advertencia contra la riqueza con una contra la mirada dirigida a la belleza femenina. Se mantiene esa doble tensión sin convertirla en una formulación más amplia de deseo sexual que el texto no explicita de la misma forma.
  doctrine_reference: Ética de la sobriedad y dominio de los deseos; advertencia sapiencial contra idolatría de la riqueza y la concupiscencia visual.
- issue: Motivo de caída personal del hablante
  english_pob_reading: for I too, because of gold and beauty, was led astray to Besue the Canaanite woman
  chosen_spanish_reading: porque yo también, por el oro y la hermosura, fui desviado hacia Besúe, la mujer cananea
  alternative_spanish_readings:
  - porque yo también, por el oro y la belleza, fui extraviado hacia Besúe, la cananea
  - pues yo también, por causa del oro y la hermosura, me desvié hacia Besúe, la mujer cananea
  rationale: La frase declara un ejemplo autobiográfico de extravío. La traducción conserva la confesión de haber sido apartados por el atractivo de la riqueza y la belleza, sin suavizar la culpa ni añadir detalles no presentes.
  doctrine_reference: Tema de advertencia por experiencia personal; la caída como consecuencia de deseos desordenados.
translation_notes:
  revision_awareness: El contexto inglés revisado eliminó un marcador de nota que había quedado pegado por error a «you» y mantuvo sin cambios la redacción. Para esta versión española no se traslada ese marcador; se añade solo una nota en el punto donde la pasiva griega puede requerir alternativa lexical.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino; en este versículo no aplica.
  - Se mantiene «la plata» y «el oro» para conservar el paralelismo material del original.
  - «Besúe» se translitera de forma consistente como nombre propio; el epíteto se traduce como «la mujer cananea» para claridad.
  - No se introduce «Cristo/Mesías» ni terminología doctrinal ajena al contenido de este verso.
