id: T12P.JUD.17.2
reference: Testament of Judah 17:2
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 134-175, Judah pilot full)
  text: '*Καὶ οἶδα¹² ὅτι διὰ τὰ δύο ταῦτα ἔσται¹³ τὸ γένος μου¹⁴ *εἰς ἀπώλειαν πορνείας¹⁵.'
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/017/002.yaml
  text: And I know that because of these two things my offspring will be for destruction because of sexual immorality.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:58Z'
    unchanged: false
    changes_summary: 'Adjusted the final clause to reflect the source more closely: εἰς ἀπώλειαν is rendered as ''for destruction'' rather than ''come to the destruction of,'' and πορνείας is retained as ''sexual immorality.'''
translation:
  language: es
  text: Y sé que, a causa de estas dos cosas, mi descendencia será para destrucción por causa de la inmoralidad sexual.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: οἶδα
  english_pob_choice: And I know
  chosen_spanish: Y sé
  alternatives_spanish:
  - Y conozco
  - Y he llegado a saber
  lexicon: οἶδα
  rationale: El verbo griego expresa conocimiento cierto; en español, «sé» comunica con naturalidad esa certeza sin añadir matiz innecesario.
- source_word: διὰ τὰ δύο ταῦτα
  english_pob_choice: because of these two things
  chosen_spanish: a causa de estas dos cosas
  alternatives_spanish:
  - por estas dos cosas
  - debido a estas dos cosas
  lexicon: διά + acusativo
  rationale: La preposición con acusativo indica causa o motivo; «a causa de» reproduce bien la relación causal en un español claro y fiel.
- source_word: τὸ γένος μου
  english_pob_choice: my offspring
  chosen_spanish: mi descendencia
  alternatives_spanish:
  - mi linaje
  - mis hijos
  lexicon: γένος
  rationale: «Descendencia» conserva el sentido genealógico amplio de γένος mejor que una referencia más estrecha como «hijos».
- source_word: εἰς ἀπώλειαν
  english_pob_choice: for destruction
  chosen_spanish: para destrucción
  alternatives_spanish:
  - hacia destrucción
  - para ruina
  lexicon: εἰς + acusativo; ἀπώλεια
  rationale: La revisión inglesa ya ajustó la clausula para reflejar el valor final/de destino de εἰς ἀπώλειαν; «para destrucción» preserva esa dirección sin sobreinterpretar.
- source_word: πορνείας
  english_pob_choice: sexual immorality
  chosen_spanish: inmoralidad sexual
  alternatives_spanish:
  - fornicación
  - impureza sexual
  lexicon: πορνεία
  rationale: «Inmoralidad sexual» mantiene el alcance amplio de πορνεία sin restringirlo a una sola práctica específica; además coincide con la decisión auditada en inglés.
theological_decisions:
- issue: Destino/resulto de la descendencia como juicio
  english_pob_reading: my offspring will be for destruction because of sexual immorality
  chosen_spanish_reading: mi descendencia será para destrucción por causa de la inmoralidad sexual
  alternative_spanish_readings:
  - mi descendencia irá a la destrucción por causa de la inmoralidad sexual
  - mi descendencia acabará en destrucción por causa de la inmoralidad sexual
  rationale: Se conserva el carácter de juicio o destino expresado por εἰς ἀπώλειαν sin suavizarlo a una mera consecuencia circunstancial; la formulación española sigue la fuerza del texto fuente.
  doctrine_reference: Juicio moral y consecuencias del pecado en la tradición sapiencial y exhortativa bíblica
translation_notes:
  revision_awareness: La versión española sigue la última revisión inglesa, que ajustó la cláusula final para reflejar más de cerca εἰς ἀπώλειαν como «for destruction» y mantuvo πορνείας como «sexual immorality».
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y bíblico, evitando términos eclesiásticos más marcados donde el griego no los exige.
  - No se introdujeron notas al pie porque el verso no presenta una alternativa textual o lexical necesaria que deba quedar señalada para el lector español.
