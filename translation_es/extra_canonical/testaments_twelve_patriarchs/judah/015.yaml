  text: XV. Ὁ πορνεύσας¹ γυμνούμενος οὐκ αἰσθάνεται καὶ ἀδοξῶν οὐκ αἰσχύνεται. 2. Κἂν γάρ τις *βασιλεὺς ἐστι² καὶ πορνεύῃ, γυμνοῦται τῆς βασιλείας*, δουλεύσας τῇ πορνείᾳ⁶ ὡς κἀγὼ ἔπαθον⁷. 3. Δέδωκα⁸ γὰρ τὴν ῥάβδον μου, τουτέστι⁹ τὸ στήριγμα τῆς ἐμῆς φυλῆς¹⁰, καὶ τὴν ζώνην μου, τουτέστιν¹¹ τὴν δύναμιν, καὶ τὸ διάδημα¹², τουτέστιν¹³ τὴν δόξαν τῆς βασιλείας μου¹⁴. 4. Καίγε *μετανοήσας ἐπὶ τούτοις¹⁴, οἶνον καὶ κρέα¹⁶ οὐκ¹⁷ ἔφαγον ἕως γήρους¹⁹ μου²⁰, καὶ *πᾶσαν εὐφροσύνην²¹ οὐκ εἶδον. 5. Καὶ ἔδειξέ μοι ὁ ἄγγελος τοῦ Θεοῦ ὅτι αἱ γυναῖκες κρατοῦσι τοῦ βασιλέως καὶ τοῦ πτωχοῦ²⁴ κατακυριεύουσιν αἱ γυναῖκες, *τοῦ μὲν²⁹ βασιλέως αἴρουσιν³⁰ τὴν δόξαν τοῦ ἀνδρὸς⁵¹ τὴν δύναμιν, *τοῦ δὲ πτωχοῦ³⁴ *τὴν⁵² πτωχείας⁵³ ἐλάχιστον στήριγμα.
