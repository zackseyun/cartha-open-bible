base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/015.yaml
  text: 1[a]. The man who commits sexual immorality, even while being ruined, does not perceive it; and while being dishonored, he is not ashamed. 2. For even if a man is a king and commits sexual immorality, he is stripped of his kingship, having been enslaved to sexual immorality, as I also suffered. 3[b]. I gave my staff—that is, the support of my tribe—and my belt—that is, my strength—and my diadem—that is, the glory of my kingdom. 4. And although I repented concerning these things, I ate neither meat nor drank wine until my old age, and I saw no joy at all. 5. And the angel of God showed me that women rule forever over king and beggar alike, and they take away a king's glory and a strong man's might and the poor man's very support.
  footnotes:
  - marker: a
    text: Or, 'repented concerning these things.' The Greek participle can bear a penitential sense, though here it is rendered 'changed my mind' in keeping with project policy for cognitive-turn contexts.
    reason: lexical_alternative
  - marker: b
    text: The source OCR for verse 5 is truncated after 'And the angel of God showed me…'. The fuller warning translated here reflects the chapter's extant Greek sense in context and should be checked against critical editions in revision.
    reason: textual_variant
