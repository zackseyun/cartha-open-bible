translation:
  language: es
  text: 1[a]. El que comete inmoralidad sexual, aun cuando está arruinado, no lo percibe; y, estando deshonrado, no se avergüenza. 2. Porque, aunque un hombre sea rey y cometa inmoralidad sexual, se le despoja de su reinado, habiendo sido esclavizado a la inmoralidad sexual, como también yo padecí. 3[b]. Porque di mi bastón —es decir, el sostén de mi tribu—, y mi cinturón —es decir, mi fuerza—, y mi diadema —es decir, la gloria de mi reino. 4. Y aunque me arrepentí[c] por estas cosas, no bebí vino ni comí carne hasta mi vejez, y no vi ningún gozo. 5. Y el ángel de Dios me mostró que las mujeres dominan para siempre sobre rey y mendigo por igual, y quitan la gloria de un rey, la fuerza de un hombre fuerte y el más pequeño sostén del pobre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El sentido de los participios permite una lectura de ruina/deshonra continua; se conserva esa progresión moral en la traducción.
    reason: source_note
  - marker: b
    text: El testimonio griego disponible para el v. 5 presenta una tradición textual truncada en el contexto del expediente inglés; se traduce el sentido pleno transmitido por esa tradición y documentado en la auditoría.
    reason: textual_variant
  - marker: c
    text: También puede entenderse como «cambié de parecer»; el español principal adopta aquí la lectura penitencial que mejor encaja con el contexto y con la revisión más reciente del expediente.
    reason: lexical_alternative
lexical_decisions:
- source_word: πορνεύσας / πορνεύῃ
  english_pob_choice: commits sexual immorality
  chosen_spanish: comete inmoralidad sexual
  alternatives_spanish:
  - fornica
  - es sexualmente inmoral
  lexicon: LSJ
  rationale: La expresión debe conservar la fuerza moral del término sin usar un arcaísmo innecesario. En español, 'inmoralidad sexual' reproduce bien el valor de vicio/impureza sexual del contexto.
- source_word: γυμνούμενος / γυμνοῦται
  english_pob_choice: being ruined / is stripped of his kingship
  chosen_spanish: está arruinado / se le despoja de su reinado
  alternatives_spanish:
  - sufre pérdida
  - se le desnuda de su realeza
  lexicon: LSJ
  rationale: '''Arruinado'' conserva el deterioro personal del pasivo medio, y ''se le despoja de su reinado'' mantiene la imagen de desposesión sin reducirla a ''reino'' como territorio.'
- source_word: ἀδοξῶν / ἀδοξούμενος
  english_pob_choice: being dishonored
  chosen_spanish: estando deshonrado
  alternatives_spanish:
  - siendo deshonrado
  - estando avergonzado
  lexicon: LSJ
  rationale: La forma participial se vuelve natural en español con 'estando deshonrado', conservando el enlace con la pérdida de gloria que aparece después en el pasaje.
- source_word: δουλεύσας τῇ πορνείᾳ
  english_pob_choice: having been enslaved to sexual immorality
  chosen_spanish: habiendo sido esclavizado a la inmoralidad sexual
  alternatives_spanish:
  - hecho esclavo de la inmoralidad sexual
  - sometido a la inmoralidad sexual
  lexicon: LSJ
  rationale: Se mantiene el lenguaje de esclavitud porque el texto griego usa la idea de servidumbre ligada al vicio; 'esclavizado' preserva esa carga con claridad en español.
- source_word: ῥάβδον
  english_pob_choice: staff
  chosen_spanish: bastón
  alternatives_spanish:
  - vara
  - cayado
  - cetro
  lexicon: LSJ
  rationale: Aunque 'staff' puede ser 'bastón' o 'vara', en español 'bastón' comunica mejor el objeto concreto y sigue permitiendo la lectura simbólica del sostén.
- source_word: στήριγμα
  english_pob_choice: support
  chosen_spanish: sostén
  alternatives_spanish:
  - apoyo
  - sustento
  lexicon: LSJ
  rationale: '''Sostén'' refleja bien la apposición explicativa del texto y conserva el valor metafórico de algo que sostiene o sostiene a una tribu.'
- source_word: ζώνην
  english_pob_choice: belt
  chosen_spanish: cinturón
  alternatives_spanish:
  - faja
  - ceñidor
  lexicon: LSJ
  rationale: '''Cinturón'' es natural en español contemporáneo y permite que la glosa ''mi fuerza'' conserve el sentido simbólico sin sonar forzada.'
- source_word: διάδημα
  english_pob_choice: diadem
  chosen_spanish: diadema
  alternatives_spanish:
  - corona
  lexicon: LSJ
  rationale: Se conserva 'diadema' porque el griego nombra un adorno real específico; así se mantiene la serie simbólica de tres objetos sin neutralizarla en 'corona'.
- source_word: μετανοήσας
  english_pob_choice: repented / changed my mind
  chosen_spanish: me arrepentí
  alternatives_spanish:
  - cambié de parecer
  - me volví
  lexicon: LSJ
  rationale: Aunque el inglés auditado preserva la tensión entre 'repented' y 'changed my mind', en este contexto penitencial el español natural y más fiel al conjunto del pasaje es 'me arrepentí'.
- source_word: οἶνον καὶ κρέα οὐκ ἔφαγον
  english_pob_choice: I ate neither meat nor drank wine
  chosen_spanish: no comí ni carne ni bebí vino
  alternatives_spanish:
  - no comí carne ni tomé vino
  - no probé ni carne ni vino
  lexicon: LSJ
  rationale: Se conserva el paralelo de alimentos y bebida con una formulación española fluida y completa, sin invertir el orden ni perder ninguno de los dos elementos.
- source_word: εὐφροσύνην
  english_pob_choice: joy
  chosen_spanish: gozo
  alternatives_spanish:
  - alegría
  - regocijo
  lexicon: LSJ
  rationale: '''Gozo'' funciona bien en registro bíblico y comunica una alegría celebrativa más amplia que un simple estado emocional.'
- source_word: ἄγγελος τοῦ Θεοῦ
  english_pob_choice: angel of God
  chosen_spanish: ángel de Dios
  alternatives_spanish:
  - mensajero de Dios
  lexicon: LSJ
  rationale: Se mantiene la traducción directa y tradicional de la expresión, adecuada al marco revelatorio del pasaje.
theological_decisions:
- issue: Traducir μετανοήσας en un contexto de confesión personal y abstinencia
  english_pob_reading: The English POB first noted 'changed my mind' as a cognitive nuance, but the latest revision pass changed to 'repented concerning these things.'
  chosen_spanish_reading: me arrepentí
  alternative_spanish_readings:
  - cambié de parecer
  - me volví
  rationale: El contexto inmediato no solo describe un giro mental, sino una respuesta penitencial a su pecado y a la pérdida resultante. En español, 'me arrepentí' expresa mejor la dimensión moral y confesional del pasaje sin ocultar el cambio interior.
  doctrine_reference: 'DOCTRINE.md: μετανοέω → arrepentirse / cambio de mente según el contexto'
- issue: Leer la advertencia sobre la pérdida del reinado como desposesión real, no territorial
  english_pob_reading: is stripped of his kingship
  chosen_spanish_reading: se le despoja de su reinado
  alternative_spanish_readings:
  - se le quita su reino
  - se le despoja de su realeza
  rationale: El griego habla de la pérdida de la condición o dignidad real, no necesariamente del territorio. 'Reinado' preserva el aspecto personal e institucional del título.
  doctrine_reference: 'PHILOSOPHY.md: traducir con precisión semántica y documentar tensiones'
- issue: Conservar la secuencia simbólica bastón-cinturón-diadema con glosas explicativas
  english_pob_reading: staff... belt... diadem... the support of my tribe... my strength... the glory of my kingdom
  chosen_spanish_reading: bastón... cinturón... diadema... el sostén de mi tribu... mi fuerza... la gloria de mi reino
  alternative_spanish_readings:
  - vara... faja... corona
  - cetro... cinturón... corona
  rationale: La secuencia de objetos y sus glosas son parte del valor retórico del pasaje. Mantener tres sustantivos distintos ayuda a conservar la imagen y su interpretación simbólica.
  doctrine_reference: 'PHILOSOPHY.md: no borrar imágenes ni glosas del original'
translation_notes:
  revision_awareness: La revisión más reciente del expediente corrigió el orden de «vino» y «carne» en v. 4 y cambió la preferencia de μετανοήσας desde una lectura cognitiva a una penitencial. El borrador español sigue esa revisión, pero documenta la alternativa semántica en nota para no borrar la tensión del término.
  spanish_consistency_notes:
  - Se mantiene «Dios» y «ángel de Dios» de forma directa, sin sustituir por perífrasis.
  - Se usa «inmoralidad sexual» de modo consistente para πορνεία/πορνεύω, siguiendo la fuerza léxica del contexto.
  - Se conserva la distinción entre «reinado» (condición real) y «reino» (territorio o dominio) en la cláusula principal y en la glosa final.
  - Las glosas explicativas con rayas se usan para reproducir la apposición didáctica del griego.
  - Se evita el calco «gloria del varón» porque el contexto español fluye mejor con «la gloria de un hombre fuerte» en el cierre del v. 5.
