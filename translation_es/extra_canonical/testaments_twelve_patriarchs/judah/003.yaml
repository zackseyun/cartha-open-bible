  text: III. *Ὅτε δὲ¹ *ἦλθον² οἱ δύο βασιλεῖς τῶν Χαναναίων τεθωρακισμένοι³ ἐπὶ τὰ *ποίμνια ἡμῶν⁴ καὶ λαὸς πολὺς⁵ *μετ᾽ αὐτῶν⁶, *κἀγὼ μόνος⁷ δραμὼν ἐπὶ τὸν βασιλέα⁸ †τὸν ἕνα⁹ καὶ κατεσπάραξα τὰ ὀστᾶ αὐτοῦ. 2. *Τὸν δὲ¹⁰ ἕτερον βασιλέα *τὸν Ταφούα¹¹ καθήμενον ἐπὶ *τοῦ ἵππου¹² *ἀνεῖλον¹³, καὶ οὕτως πάντα τὸν λαὸν αὐτοῦ¹⁴ διεσκόρπισα. 3. Καὶ¹⁵ τὸν †Ἀχὼρ βασιλέα¹⁶ γίγαντα εὗρον¹⁷ βάλλοντα τόξα ἔμπροσθεν καὶ ὄπισθεν ἐφ᾽ ἵππου, καὶ ἀνελάμενος¹⁸ λίθον¹⁹ ἑξήκοντα λιτρῶν²⁰ καὶ *δέδωκα²¹ τῷ ἵππῳ καὶ ἀπέκτεινα αὐτόν²². 4. Καὶ πολεμήσας τὸν †Ἀχὼρ²³ ἐπὶ ὥρας δύο²⁴ ἀπέκτεινα αὐτόν²⁵, καὶ εἰς²⁶ δύο μέρη²⁷ ποιήσας τὴν ἀσπίδα αὐτοῦ συνέκοψα τοὺς πόδας αὐτοῦ. 5. *Ἐν δὲ²⁸ τῷ ἐκδύειν²⁹ με³⁰ τὸν θώρακα αὐτοῦ³¹, ἰδού, ἄνδρες ὀκτὼ³², ἑταῖροι³³ αὐτοῦ³⁴, *ἤρξαντο πολεμεῖν με³⁵. 6. *Ἐνελύθην³⁶ δὲ ἐγὼ³⁷ τὴν στολήν μου *ἐπὶ τὴν χεῖρά μου³⁸ καὶ³⁹ σφενδονήσας αὐτοὺς λίθοις⁴⁰ τέσσαρας ἐξ αὐτῶν *ἀνεῖλον⁴¹, *οἱ δὲ λοιποὶ⁴² ἔφυγον. 7. *Ὁ πατήρ μου *Ἰακὼβ⁴³ ἀνεῖλε τὸν †Βελισάθ⁴⁴, βασιλέα⁴⁵ *πάντων τῶν⁴⁶ βασιλέων, ἄνδρα γίγαντα
    τῇ ἰσχύι πηχῶν δώδεκα⁴⁷. 8. *Καὶ ἐπέπεσεν⁴⁸ ἐπ᾽ αὐτοὺς τρόμος⁴⁹, καὶ ἐπαύσαντο πολεμοῦντες⁵⁰ ἡμᾶς⁵¹. 9. *Διὰ τοῦτο ὁ πατήρ μου ἀμέριμνος⁵² ἦν ἐν τοῖς πολέμοις⁵³, ὅτε⁵⁴ ἐγὼ σὺν τοῖς ἀδελφοῖς μου ἤμην⁵⁵. 10. *Εἶδε⁵⁶ γὰρ⁵⁷ *ἐν ὁράματι⁵⁸ †περὶ ἐμοῦ⁵⁹ ὅτι ἄγγελος δυνάμεως⁶⁰ συνέπεταί μοι⁶¹ ἐν πᾶσι, τοῦ μὴ⁶² ἡττᾶσθαί⁶³ μοι.
