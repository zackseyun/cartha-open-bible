translation:
  language: es
  text: '1[a]. Y cuando los dos reyes de los cananeos vinieron en armas contra nuestros rebaños, con mucha gente con ellos, yo solo corrí contra uno de los reyes; y, golpeándolo en las canillas, lo derribé y así lo maté.


    2. Y al otro rey, Tafu, mientras estaba sentado sobre su caballo, lo maté; y así dispersé a toda su gente[b].


    3. Y hallé a Ajor, un gigante de hombre, lanzando flechas. Saltando, tomé una piedra de sesenta litras y la arrojé; golpeé al caballo y lo maté.


    4. Y después de pelear con Ajor durante dos horas, lo maté; y, cuando había partido su escudo en dos pedazos, le machaqué los pies.


    5. Y mientras le quitaba la coraza, he aquí, ocho hombres, sus compañeros, comenzaron a pelear conmigo.


    6. Pero envolví mi ropa alrededor de mi brazo y les tiré piedras; a cuatro de ellos los maté[c], y los demás huyeron.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La tradición griega de este capítulo es textualmente enmarañada. Algunos testigos varían en los nombres de los adversarios, con formas como Chora o Nachor, y algunos duplican o reordenan partes del relato de combate.
    reason: textual_variant
  - marker: b
    text: La litra era una antigua unidad de peso. El texto subraya el tamaño extraordinario de la piedra más que dar una medida moderna.
    reason: cultural_note
  - marker: c
    text: 'Algunos manuscritos conservan un final más completo para este versículo: Judá mata a cuatro de los atacantes, y los demás huyen.'
    reason: textual_variant
lexical_decisions:
- source_word: τεθωρακισμένοι
  english_pob_choice: in armor
  chosen_spanish: en armas
  alternatives_spanish:
  - acorazados
  - con armadura
  lexicon: LSJ
  rationale: El griego indica que venían equipados para la guerra; «en armas» expresa la condición combativa de modo natural en español sin reducirlo solo a una pieza de equipo.
- source_word: ποίμνια
  english_pob_choice: flocks
  chosen_spanish: rebaños
  alternatives_spanish:
  - manadas
  - ganados
  lexicon: LSJ
  rationale: En contexto patriarcal y pastoril, «rebaños» comunica el sentido de ganado bajo cuidado y evita especificar más de lo que el texto dice.
- source_word: κνημίδες
  english_pob_choice: shins
  chosen_spanish: canillas
  alternatives_spanish:
  - piernas
  - espinillas
  lexicon: LSJ
  rationale: La escena describe el golpe en la parte baja de la pierna para derribarlo. «Canillas» conserva la referencia corporal concreta y funciona bien en español narrativo.
- source_word: κατεσπάραξα
  english_pob_choice: I dragged him down
  chosen_spanish: lo derribé
  alternatives_spanish:
  - lo arrastré abajo
  - lo tiré al suelo
  lexicon: LSJ
  rationale: El verbo implica bajar por la fuerza hasta vencerlo. En español, «lo derribé» transmite el resultado físico con naturalidad; el matiz de arrastre queda implícito en el contexto.
- source_word: ἀνεῖλον
  english_pob_choice: I killed
  chosen_spanish: lo maté
  alternatives_spanish:
  - lo maté
  - lo derribé
  lexicon: LSJ
  rationale: La acción narrativa es matar de forma directa; «lo maté» es el equivalente claro y fiel en español contemporáneo.
- source_word: διεσκόρπισα
  english_pob_choice: I scattered
  chosen_spanish: dispersé
  alternatives_spanish:
  - esparcí
  - desbandé
  lexicon: LSJ
  rationale: El griego usa la imagen de dispersar. «Dispersé» mantiene el sentido literal y el efecto militar sin introducir una interpretación más fuerte como «desbandé».
- source_word: γίγαντα
  english_pob_choice: a giant
  chosen_spanish: un gigante
  alternatives_spanish:
  - un hombre enorme
  - un coloso
  lexicon: LSJ
  rationale: El texto presenta al adversario como de talla extraordinaria. «Un gigante» conserva el registro heroico del relato y el paralelo del inglés POB.
- source_word: ἀνηλάμενος
  english_pob_choice: leaping up, I took
  chosen_spanish: Saltando, tomé
  alternatives_spanish:
  - Dando un salto, tomé
  - Salté y tomé
  lexicon: LSJ
  rationale: La forma participial marca una acción súbita previa al ataque. «Saltando, tomé» reproduce la secuencia rápida sin sobreexplicar.
- source_word: λίθον ἑξήκοντα λιτρῶν
  english_pob_choice: a stone of sixty litras
  chosen_spanish: una piedra de sesenta litras
  alternatives_spanish:
  - una piedra de sesenta libras
  - una piedra de sesenta litras de peso
  lexicon: LSJ
  rationale: Se conserva la unidad antigua «litras» para no modernizar ni falsear la medida; así se preserva la textura cultural del texto.
- source_word: ἀκοντίσας
  english_pob_choice: hurled it
  chosen_spanish: la arrojé
  alternatives_spanish:
  - la lancé
  - la tiré con fuerza
  lexicon: LSJ
  rationale: El verbo implica un lanzamiento violento. «La arrojé» comunica fuerza y fluidez en español; el contexto de combate ya aporta la intensidad.
- source_word: ἐπὶ ὥρας δύο
  english_pob_choice: for two hours
  chosen_spanish: durante dos horas
  alternatives_spanish:
  - por dos horas
  - por unas dos horas
  lexicon: LSJ
  rationale: Es una expresión temporal directa. «Durante dos horas» es la formulación natural y precisa en español.
- source_word: εἰς δύο μέρη ποιήσας
  english_pob_choice: cut ... into two pieces
  chosen_spanish: partido su escudo en dos pedazos
  alternatives_spanish:
  - cortado su escudo en dos partes
  - dividido su escudo en dos
  lexicon: LSJ
  rationale: La frase describe dividir el escudo en dos. «Partido ... en dos pedazos» conserva la concreción violenta del relato y la relación causal con el ataque posterior.
- source_word: συνέκοψα τοὺς πόδας αὐτοῦ
  english_pob_choice: I hacked through his feet
  chosen_spanish: le machaqué los pies
  alternatives_spanish:
  - le corté los pies
  - le destrocé los pies
  lexicon: LSJ
  rationale: El compuesto es muy enérgico; en español, «machaqué» comunica brutalidad y daño severo sin afirmar más precisión anatómica que la del griego.
- source_word: θώρακα
  english_pob_choice: breastplate
  chosen_spanish: coraza
  alternatives_spanish:
  - coraza de pecho
  - peto
  lexicon: LSJ
  rationale: «Coraza» es un equivalente claro y digno para θώραξ en este contexto militar; en español cubre bien la armadura del torso.
- source_word: ἑταῖροι
  english_pob_choice: companions
  chosen_spanish: compañeros
  alternatives_spanish:
  - camaradas
  - seguidores
  lexicon: LSJ
  rationale: El término denota acompañantes o aliados de combate. «Compañeros» es amplio y fiel al registro narrativo.
- source_word: τὴν στολήν μου ἐπὶ τὴν χεῖρά μου
  english_pob_choice: I wrapped my garment around my arm
  chosen_spanish: envolví mi ropa alrededor de mi brazo
  alternatives_spanish:
  - envolví mi manto alrededor de mi brazo
  - me até la ropa al brazo
  lexicon: LSJ
  rationale: La imagen es de usar la prenda sobre el brazo como defensa. «Ropa» mantiene la generalidad de στολή en este pasaje; «brazo» es más natural que «mano» para el gesto defensivo.
- source_word: σφενδονήσας
  english_pob_choice: slung
  chosen_spanish: les tiré piedras
  alternatives_spanish:
  - les lancé piedras con la honda
  - hondée piedras
  lexicon: LSJ
  rationale: El verbo está ligado al uso de honda, pero el punto narrativo es el lanzamiento de piedras. «Les tiré piedras» conserva la acción sin añadir un instrumento no mencionado explícitamente en esta línea.
theological_decisions:
- issue: 'Inestabilidad textual en los vv. 2–4: nombres de adversarios y secuencia del relato'
  english_pob_reading: Translate the main narrative flow of the normalized Greek witness with Taphou and Achor, while noting variant names and duplicated combat material in footnotes.
  chosen_spanish_reading: Seguir el flujo principal del testigo griego normalizado con Tafu y Ajor, señalando en nota la inestabilidad textual y la posibilidad de nombres variantes o material duplicado.
  alternative_spanish_readings:
  - armonizar los episodios para que la escena sea más fluida
  - reemplazar Ajor por un nombre más familiar o tradicional
  rationale: El pasaje es narrativo y heroico, no doctrinal, pero la transparencia textual importa. Se evita suavizar el texto o armonizar variantes que el testimonio griego y la tradición inglesa documentan.
  doctrine_reference: 'PHILOSOPHY.md: traducir honestamente la fuente y usar notas en lugar de armonizar silenciosamente.'
translation_notes:
  revision_awareness: No se registraron revisiones en el último paso; el pasaje se mantiene conforme al pasaje fuente y a la capa inglesa auditada, sin cambios adicionales necesarios.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término predeterminado para el nombre divino, aunque este pasaje no lo contiene.
  - Se conserva el registro heroico del relato con vocabulario directo y militar, evitando tanto arcaísmos excesivos como paráfrasis expansivas.
  - Se usa «litras» sin convertir a unidades modernas para respetar la textura cultural del original y la nota de la tradición inglesa.
