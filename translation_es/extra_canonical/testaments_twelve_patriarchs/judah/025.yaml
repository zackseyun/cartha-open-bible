translation:
  language: es
  text: '1. Y después de estas cosas, Abraham, Isaac y Jacob resucitarán para vida, y yo y mis hermanos seremos jefes de los cetros[a] en Israel: Leví primero, yo segundo, José tercero, Benjamín cuarto, Simeón quinto, Isacar sexto, y así todos los demás en orden.


    2. Y Yahvé bendijo a Leví; pero el ángel de la presencia, a mí; las potestades de gloria, a Simeón; el cielo, a Rubén; la tierra, a Isacar; el mar, a Zabulón; los montes, a José; la tienda, a Benjamín; las luminarias, a Dan; el deleite, a Neftalí; el sol, a Gad; la luna, a Aser.


    3. Y ustedes serán el pueblo de Yahvé, con una sola lengua, y allí no habrá espíritu de engaño[b] de Belial, porque será arrojado al fuego para siempre.


    4. Y los que murieron en tristeza resucitarán en gozo, y los pobres por causa de Yahvé serán enriquecidos, y los que mueren por causa de Yahvé despertarán a vida.


    5. Y los ciervos de José correrán con júbilo, y las águilas de Israel volarán con alegría[c][d][e]; y todos los pueblos glorificarán a Yahvé por los siglos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice literalmente «jefes de los cetros»; aquí se conserva «cetros» para reflejar el texto revisado del POB inglés y su metáfora de autoridad tribal.
    reason: lexical_alternative
  - marker: b
    text: 'Algunos testigos leen: «no habrá entre ustedes espíritu de engaño, porque los espíritus impuros serán arrojados al juicio eterno».'
    reason: textual_variant
  - marker: c
    text: «Águilas de Israel» conserva la imagen literal y el paralelismo poético; algunos testigos leen una variante con «ciervos de Jacob» y «terneras de Israel».
    reason: textual_variant
  - marker: d
    text: La frase «ángel de la presencia» es un eco bíblico de un mediador celestial de alto rango y se traduce literalmente.
    reason: cross_reference
  - marker: e
    text: 'Algunos testigos añaden: «pero los impíos se lamentarán y los pecadores llorarán», antes de la línea final de alabanza universal.'
    reason: textual_variant
lexical_decisions:
- source_word: ἀναστήσεται ... εἰς ζωήν
  english_pob_choice: will rise to life
  chosen_spanish: resucitarán para vida
  alternatives_spanish:
  - resucitarán a vida
  - volverán a la vida
  lexicon: BDAG
  rationale: Conservo el lenguaje de resurrección de modo directo. «Para vida» sigue la fuerza de εἰς ζωήν sin sonar forzado en español y mantiene el destino/resultado de vida.
- source_word: ἔξαρχοι
  english_pob_choice: chiefs
  chosen_spanish: jefes
  alternatives_spanish:
  - caudillos
  - líderes
  - príncipes
  lexicon: LSJ
  rationale: «Jefes» comunica preeminencia y gobierno sin introducir una coloración monárquica que no está en el contexto patriarcal.
- source_word: σκήπτρων
  english_pob_choice: scepters
  chosen_spanish: cetros
  alternatives_spanish:
  - báculos reales
  - símbolos de autoridad
  lexicon: LSJ
  rationale: Sigo de cerca el término literal que el POB inglés decidió recuperar tras la revisión. En español, «cetros» conserva la imagen de autoridad tribal y permite que la frase permanezca auditable.
- source_word: ἄγγελος τοῦ προσώπου
  english_pob_choice: angel of the presence
  chosen_spanish: ángel de la presencia
  alternatives_spanish:
  - ángel de su presencia
  - ángel-presencia
  lexicon: LSJ
  rationale: Mantengo la fórmula literal y su resonancia celestial, evitando una paráfrasis que diluya el eco intertextual.
- source_word: δυνάμεις τῆς δόξης
  english_pob_choice: powers of glory
  chosen_spanish: potestades de gloria
  alternatives_spanish:
  - poderes de gloria
  - potencias de gloria
  lexicon: LSJ
  rationale: «Potestades» suena más natural y solemne en español eclesial que un calco rígido, y conserva el carácter de seres/poderes celestiales.
- source_word: σκηνή
  english_pob_choice: tent
  chosen_spanish: tienda
  alternatives_spanish:
  - tabernáculo
  - tienda de campaña
  lexicon: LSJ
  rationale: «Tienda» preserva la concreción del griego y evita sobreinterpretar un sentido cultual más técnico que el texto no exige en esta línea.
- source_word: φωστῆρες
  english_pob_choice: lights
  chosen_spanish: luminarias
  alternatives_spanish:
  - luces
  - astros
  lexicon: LSJ
  rationale: «Luminarias» comunica el sentido cósmico y mantiene mejor el tono elevado de la bendición que «luces».
- source_word: τρυφή
  english_pob_choice: delight
  chosen_spanish: deleite
  alternatives_spanish:
  - placer
  - abundancia
  - delicia
  lexicon: LSJ
  rationale: «Deleite» conserva el valor positivo y concreto del término sin forzarlo hacia una lectura moralizante o meramente material.
- source_word: γλῶσσα μία
  english_pob_choice: one language
  chosen_spanish: una sola lengua
  alternatives_spanish:
  - un solo lenguaje
  - una misma lengua
  lexicon: BDAG
  rationale: «Una sola lengua» es idiomático y mantiene la idea de unidad verbal, con posible eco de Babel revertida.
- source_word: πνεῦμα πλάνης τοῦ Βελίαρ
  english_pob_choice: a spirit of Belial’s deceit
  chosen_spanish: espíritu de engaño de Belial
  alternatives_spanish:
  - espíritu de error de Belial
  - espíritu engañador de Belial
  lexicon: BDAG
  rationale: Conservo a Belial como figura personal y traduzco πλάνη por «engaño», que comunica bien el sentido moral de error/desvío sin perder la tensión del original.
- source_word: ἐμβληθήσεται ἐν πυρὶ εἰς τὸν αἰῶνα
  english_pob_choice: will be thrown into the fire forever
  chosen_spanish: será arrojado al fuego para siempre
  alternatives_spanish:
  - será echado al fuego para siempre
  - será lanzado al fuego por los siglos
  lexicon: BDAG
  rationale: Mantengo el lenguaje escatológico directo del texto y la decisión del POB de no suavizar la imagen del juicio final.
- source_word: ἐν λύπῃ τελευτήσαντες
  english_pob_choice: those who died in sorrow
  chosen_spanish: los que murieron en tristeza
  alternatives_spanish:
  - los que murieron en dolor
  - los que acabaron su vida en aflicción
  lexicon: BDAG
  rationale: «Tristeza» conserva el tono afectivo del sustantivo griego y funciona bien en paralelo con «gozo» en la línea siguiente.
- source_word: διὰ Κύριον
  english_pob_choice: for the Lord’s sake
  chosen_spanish: por causa de Yahvé
  alternatives_spanish:
  - por amor a Yahvé
  - por causa del Señor
  lexicon: BDAG
  rationale: Sigo la convención del proyecto para el nombre divino como «Yahvé» en el texto principal, y conservo el matiz causal/devocional de διὰ.
- source_word: ἐξυπνισθήσονται εἰς ζωήν
  english_pob_choice: will awake to life
  chosen_spanish: despertarán a vida
  alternatives_spanish:
  - despertarán para vida
  - despertarán a la vida
  lexicon: LSJ
  rationale: «Despertarán a vida» preserva la metáfora de sueño/despertar propia de la resurrección sin agregar más de lo que el griego dice.
- source_word: ἔλαφοι Ἰωσήφ
  english_pob_choice: the deer of Joseph
  chosen_spanish: los ciervos de José
  alternatives_spanish:
  - los venados de José
  - los deer de José
  lexicon: LSJ
  rationale: «Ciervos» es el equivalente natural en español para ἔλαφοι y mantiene la imagen animal de la profecía.
- source_word: ἐν ἀγαλλιάσει
  english_pob_choice: in exultation
  chosen_spanish: con júbilo
  alternatives_spanish:
  - en exultación
  - con regocijo
  lexicon: BDAG
  rationale: «Con júbilo» es idiomático, elevado y apropiado al paralelismo con «con alegría» en la segunda cola.
- source_word: ἀετοὶ Ἰσραήλ
  english_pob_choice: the eagles of Israel
  chosen_spanish: las águilas de Israel
  alternatives_spanish:
  - los águilas de Israel
  - las aves rapaces de Israel
  lexicon: LSJ
  rationale: Conservo la imagen literal y su paralelismo poético con los ciervos de José.
- source_word: δοξάσουσι τὸν Κύριον εἰς αἰῶνας
  english_pob_choice: will glorify the Lord forever
  chosen_spanish: glorificarán a Yahvé por los siglos
  alternatives_spanish:
  - glorificarán a Yahvé para siempre
  - darán gloria a Yahvé por los siglos
  lexicon: BDAG
  rationale: «Por los siglos» reproduce con dignidad el valor durativo de εἰς αἰῶνας y evita empobrecer el cierre solemne.
theological_decisions:
- issue: Resurrección de los patriarcas y de los justos
  english_pob_reading: The translation states Abraham, Isaac, Jacob, and others will rise to life or awake to life.
  chosen_spanish_reading: La traducción mantiene la resurrección como afirmación futura y corporal, sin reducirla a restauración simbólica.
  alternative_spanish_readings:
  - volverán a la vida como metáfora de restauración nacional
  - serán levantados espiritualmente
  rationale: El griego habla de levantarse/despertar a vida en forma directa. La versión española conserva esa afirmación sin resolver la tensión escatológica o textual en el cuerpo del texto.
  doctrine_reference: Preservar la tensión teológica en vez de explicarla fuera del texto.
- issue: Belial y el juicio final
  english_pob_reading: A spirit of Belial’s deceit will be thrown into the fire forever.
  chosen_spanish_reading: Se mantiene a Belial como figura personal del mal y la expulsión al fuego eterno.
  alternative_spanish_readings:
  - un principio impersonal de maldad
  - espíritu de error puramente abstracto
  rationale: La construcción griega conserva lenguaje personal y moral. Por eso el español también lo conserva, dejando la discusión textual en nota.
  doctrine_reference: Primacía del dato original con notas para variantes y ambigüedades.
- issue: Yahvé frente a ‘Señor’
  english_pob_reading: The English POB uses Lord in the translation while the project default in Spanish prefers Yahvé for the divine name.
  chosen_spanish_reading: Se emplea Yahvé en el texto principal para el nombre divino.
  alternative_spanish_readings:
  - Señor
  - el Señor
  rationale: Siguiendo la norma del proyecto, el nombre divino no se enmascara en la línea principal cuando el referente es el nombre propio de Dios.
  doctrine_reference: Terminología POB del nombre divino
translation_notes:
  revision_awareness: 'He integrado la revisión más reciente del POB inglés: en v. 1 sigo la lectura revisada «scepters» con «cetros» en español, y en v. 2 no suplí un verbo repetido tras «el ángel de la presencia», manteniendo la elipsis del griego. También respeté el cambio de lectura sobre la secuencia final de v. 5 y preservé las variantes textuales en notas.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en todo el texto principal por la norma del proyecto para el nombre divino.
  - Se conserva el paralelismo poético con «ciervos/aguilas» y las dos frases de gozo en vv. 4–5.
  - Se evitó introducir terminología eclesiástica más tardía donde el griego y el audit trail piden imágenes concretas (cetros, tienda, luminarias).
