  text: XXV. Καὶ¹ μετὰ ταῦτα *ἀναστήσεται Ἀβραὰμ καὶ Ἰσαὰκ καὶ Ἰακὼβ εἰς ζωήν², *καὶ ἐγὼ καὶ οἱ ἀδελφοί μου ἔξαρχοι³ *ἐν Ἰσραὴλ ἐσόμεθα⁵, πρῶτος Λευί⁶, δεύτερος ἐγώ⁷, τρίτος Ἰωσήφ⁸, τέταρτος Βενιαμίν⁹, *πέμπτος Συμεών, ἕκτος Ἰσαχάρ¹⁰, καὶ¹² *πάντες καθεξῆς¹¹. 2. *Καὶ¹² Κύριος εὐλόγησε¹⁴ τὸν Λευί¹⁵, *ὁ ἄγγελος τοῦ προσώπου ἐμέ¹⁶, *αἱ δυνάμεις¹⁷ τῆς δόξης τὸν Συμεών¹⁹, ὁ οὐρανὸς²⁰ τὸν Ῥουβίμ²¹, ἡ γῆ²², τὴν θάλασσαν²⁴ τὸν Ἰωσήφ, αἱ φωστῆρες²⁵ τὸν Δάν²⁶, ἡ τρυφὴ²⁷ τὸν Νεφθαλείμ²⁸, ὁ ἥλιος²⁹ τὸν Γάδ³⁰, ἡ σελήνη³⁰ τὸν Ἀσήρ. 3. Καὶ ἔσεσθε εἰς λαὸν³¹ Κυρίου, καὶ³² γλῶσσα μία³³, καὶ οὐκ ἔσται ἐκεῖ³⁴ πνεῦμα πλάνης³⁵ τοῦ Βελιάρ, ὅτι ἐμβληθήσεται³⁶ *εἰς τὸν αἰῶνα³⁷. 4. *Καὶ³⁹ ἐν λύπῃ τελευτήσαντες ἀναστήσονται ⁴⁰καὶ οἱ πτωχοὶ⁴¹ διὰ Κύριον⁴³ πλουτισθήσονται⁴⁴ καὶ⁴⁴ οἱ ἀποθνήσκοντες διὰ Κύριον⁴⁵ ἐξυπνισθήσονται⁴⁶ εἰς ζωήν⁴⁷. 5. *Καὶ οἱ ἔλαφοι⁴⁸ Ἰακὼβ⁴⁹ δραμοῦνται ἐν ἀγαλλιάσει⁴⁹, καὶ ἀετοὶ Ἰσραὴλ⁴⁹ πετασθήσονται ἐν χαρᾷ· [οἱ δὲ ἀσεβεῖς πενθήσουσι καὶ οἱ ἁμαρτωλοὶ κλαύσονται]⁵¹, καὶ πάντες οἱ λαοὶ δοξάσουσι
    Κύριον εἰς αἰῶνας⁵².
