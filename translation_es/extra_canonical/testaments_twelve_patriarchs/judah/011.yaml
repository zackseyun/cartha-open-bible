translation:
  language: es
  text: 1 Y yo sabía que la estirpe de los cananeos era mala[a], pero el impulso de la juventud cegó mi entendimiento. 2 Y cuando la vi sirviendo vino, fui engañado, y la tomé, aunque mi padre no había dado consejo[b]. 3 Pero mientras yo estaba ausente, ella fue y tomó para Selom una esposa de Canaán. 4 Y cuando supe lo que había hecho, la maldije en la angustia de mi alma. 5 Y, en verdad, murió en su maldad, junto con sus hijos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la estirpe de los cananeos era perversa». γένος denota linaje, estirpe o grupo de parentesco.
    reason: lexical_alternative
  - marker: b
    text: 'También puede entenderse: «aunque mi padre no había consultado sobre ello» o «sin el consejo de mi padre».'
    reason: alternative_reading
lexical_decisions:
- source_word: πονηρὸν γένος
  english_pob_choice: the race of the Canaanites was evil
  chosen_spanish: la estirpe de los cananeos era mala
  alternatives_spanish:
  - la raza de los cananeos era mala
  - la estirpe de los cananeos era perversa
  - el linaje de los cananeos era malo
  lexicon: LSJ
  rationale: γένος nombra linaje, estirpe o grupo de parentesco. «Estirpe» conserva esa fuerza genealógica sin cargar el texto con usos modernos de «raza». «Mala» mantiene el juicio moral directo de πονηρός.
- source_word: διαβούλιον τῆς νεότητος
  english_pob_choice: the impulse of youth
  chosen_spanish: el impulso de la juventud
  alternatives_spanish:
  - el consejo de la juventud
  - el plan de la juventud
  - la deliberación juvenil
  lexicon: LSJ
  rationale: En este contexto, Judah confiesa una fuerza juvenil que lo arrastró más que una deliberación serena. «Impulso» comunica bien esa presión interior sin volver el texto demasiado libre.
- source_word: ἐτύφλωσε τὴν διάνοιάν μου
  english_pob_choice: blinded my understanding
  chosen_spanish: cegó mi entendimiento
  alternatives_spanish:
  - cegó mi mente
  - cegó mi comprensión
  - cegó mi inteligencia
  lexicon: BDAG
  rationale: διάνοια es la facultad de entender o pensar. «Entendimiento» es natural en español y conserva la imagen de ceguera intelectual y moral.
- source_word: οἰνοχοοῦσαν
  english_pob_choice: pouring wine
  chosen_spanish: sirviendo vino
  alternatives_spanish:
  - derramando vino
  - escanciando vino
  - haciendo de copera
  lexicon: LSJ
  rationale: El participio describe la acción de servir vino. «Sirviendo vino» es claro y idiomático en español, sin perder el detalle concreto de la escena.
- source_word: ἠπατήθην
  english_pob_choice: I was deceived
  chosen_spanish: fui engañado
  alternatives_spanish:
  - fui seducido
  - fui extraviado
  - fui engañado y llevado
  lexicon: BDAG
  rationale: La pasiva conserva la confesión de haber sido inducido al error. «Fui engañado» es directo y mantiene la responsabilidad de Judah sin suavizarla.
- source_word: ἔλαβον αὐτὴν
  english_pob_choice: I took her
  chosen_spanish: la tomé
  alternatives_spanish:
  - la tomé por esposa
  - me casé con ella
  - la recibí
  lexicon: LSJ
  rationale: El griego es breve y abrupto. «La tomé» preserva esa tersura confesional; el sentido matrimonial queda claro por el contexto narrativo.
- source_word: μὴ βουλευσαμένου τοῦ πατρός μου
  english_pob_choice: though my father had not given counsel
  chosen_spanish: aunque mi padre no había dado consejo
  alternatives_spanish:
  - sin que mi padre lo hubiese aprobado
  - aunque mi padre no había consultado sobre ello
  - sin el consejo de mi padre
  lexicon: LSJ
  rationale: La construcción en genitivo absoluto refiere al padre como el que no había deliberado o aconsejado. «No había dado consejo» sigue de cerca la revisión inglesa y preserva la referencia paternal sin reducirla solo a permiso legal.
- source_word: ἀπόντος ἐμοῦ
  english_pob_choice: while I was away
  chosen_spanish: mientras yo estaba ausente
  alternatives_spanish:
  - mientras yo no estaba
  - en mi ausencia
  - cuando yo estaba fuera
  lexicon: LSJ
  rationale: La frase funciona naturalmente como una indicación temporal. «Mientras yo estaba ausente» conserva el flujo narrativo con registro formal.
- source_word: ἔλαβε τῷ Σηλὼμ γυναῖκα
  english_pob_choice: took for Shelah a wife
  chosen_spanish: tomó para Selom una esposa
  alternatives_spanish:
  - consiguió para Selom una esposa
  - buscó para Selom una esposa
  - le procuró a Selom una esposa
  lexicon: LSJ
  rationale: El giro expresa que se obtuvo/dispuso una esposa para él. «Tomó para Selom una esposa» sigue de cerca la sintaxis del original y conserva su tono patriarcal y resumido.
- source_word: ἐκ τῆς Χαναάν
  english_pob_choice: from Canaan
  chosen_spanish: de Canaán
  alternatives_spanish:
  - de la tierra de Canaán
  - entre los cananeos
  - procedente de Canaán
  lexicon: LSJ
  rationale: La frase puede ser geográfica o étnica. «De Canaán» mantiene esa ambigüedad sin imponer una aclaración que el griego no da explícitamente.
- source_word: κατηρασάμην αὐτὴν
  english_pob_choice: I cursed her
  chosen_spanish: la maldije
  alternatives_spanish:
  - pronuncié una maldición contra ella
  - la maldije con una maldición
  - la maldije severamente
  lexicon: BDAG
  rationale: El verbo es fuerte y directo. «La maldije» conserva la fuerza confesional del acto sin añadir explicaciones.
- source_word: ἐν ὀδύνῃ ψυχῆς μου
  english_pob_choice: in the anguish of my soul
  chosen_spanish: en la angustia de mi alma
  alternatives_spanish:
  - en el dolor de mi alma
  - con agonía de mi alma
  - en la aflicción de mi alma
  lexicon: LSJ
  rationale: La expresión mantiene el peso emocional y testamentario de ὀδύνη junto con ψυχή. «Angustia de mi alma» es sobria, reconocible y fiel.
- source_word: ἐν τῇ πονηρίᾳ αὐτῆς
  english_pob_choice: in her wickedness
  chosen_spanish: en su maldad
  alternatives_spanish:
  - en su perversidad
  - en su malicia
  - en su iniquidad
  lexicon: BDAG
  rationale: «Maldad» conserva el valor moral de πονηρία con un español claro y de uso amplio. La alternativa «perversidad» puede sonar más marcada, pero menos natural en esta confesión.
theological_decisions:
- issue: Afirmación moral colectiva sobre los cananeos
  english_pob_reading: 'Translate the Greek statement directly: ''the race of the Canaanites was evil,'' without softening it into a merely individual judgment.'
  chosen_spanish_reading: 'Traducir de manera directa: «la estirpe de los cananeos era mala», sin convertirlo en una simple valoración individual.'
  alternative_spanish_readings:
  - la estirpe cananea era corrupta
  - el linaje de los cananeos era perverso
  - el pueblo cananeo era malo
  rationale: El griego hace una afirmación amplia, de carácter genealógico/colectivo. La traducción debe transparentar esa fuerza sin importarle al texto una teoría racial moderna; «estirpe» ayuda a conservar el sentido antiguo de grupo de descendencia.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 4
- issue: Fuerza abrupta de ἔλαβον αὐτήν
  english_pob_reading: Keep the blunt 'I took her' in the main text rather than explicitly 'I married her.'
  chosen_spanish_reading: Mantener «la tomé» en el texto principal, en vez de explicitar «me casé con ella».
  alternative_spanish_readings:
  - me casé con ella
  - la tomé por esposa
  - la recibí como esposa
  rationale: El griego es escueto y confesional. Aunque el contexto matrimonial es claro, el texto principal debe conservar esa brusquedad; la relación matrimonial queda implicada sin sobreexplicarla.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 4
translation_notes:
  revision_awareness: 'La versión española sigue la revisión más reciente del inglés auditado: en el v. 2 se refleja «though my father had not given counsel» mediante «aunque mi padre no había dado consejo», manteniendo la referencia al padre y un registro formal. Se conserva también la redacción breve de «I took her» y la clausula final «in her wickedness, with her children» en su sentido directo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera explícitamente; aquí no aparece.
  - Se mantiene «Mesías/Cristo» fuera de este pasaje porque no interviene.
  - «Canaán» se conserva como topónimo/ámbito de origen sin expandirlo innecesariamente.
  - La puntuación y el ritmo siguen el estilo de sección narrativa confesional, con versificación clara para lectura pública.
