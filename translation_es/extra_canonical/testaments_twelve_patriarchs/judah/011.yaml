base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/011.yaml
  text: 1 And I knew that the race of the Canaanites was evil[a], but the impulse of youth blinded my understanding. 2 And when I saw her pouring wine, I was deceived, and I took her, though my father had not given counsel. 3 But while I was away, she went and took for Shelah a wife from Canaan. 4 And when I learned what she had done, I cursed her in the anguish of my soul. 5 And indeed she died in her wickedness[c][b], with her children.
  footnotes:
  - marker: a
    text: Or 'the stock of the Canaanites was wicked.' The Greek γένος refers to lineage or people-group.
    reason: lexical_alternative
  - marker: b
    text: '''I took her'' likely carries the sense ''I took her as wife,'' but the Greek wording is more abrupt.'
    reason: lexical_alternative
  - marker: c
    text: The phrase 'my father had not taken counsel about it' may also be understood as acting without Jacob's advice or approval.
    reason: alternative_reading
