translation:
  language: es
  text: "1[8:5]. Y mientras yo estaba allí, el rey de Adulam, Barshabá, nos trató con hospitalidad y nos hizo un banquete de bebida; y cuando me instó, me dio por esposa a su hija, cuyo nombre era Sua.\n\n\n    2. Ella me dio a Er, a Onán y a Selá. Y el Señor mató a los dos primeros, porque Er era malvado; y Onán, cuando se había casado con Tamar, derramó la semilla en tierra, conforme al mandamiento de su madre, y también él murió por su maldad.\n\n\n    3. Y Selá vivió, y yo no le di a Tamar por esposa. Porque dije: «No sea que él también muera como sus hermanos». Pues yo no sabía que el Señor me estaba juzgando por lo que había hecho en Tamna a mi padre Jacob y a José.\n\n\n    4. Y después de estas cosas, mientras Tamar era viuda, y después de haber pasado dos años, se me informó que iba a esquilar las ovejas en Tamna. Y yo también fui a esquilar mis ovejas.\n\n\n    5. Y ella, habiendo sabido que yo iba subiendo, se adornó con atavío de novia y se sentó en la ciudad de Enaim, junto\
    \ a la puerta. Porque era una ley de los amorreos que la que iba a casarse se sentara siete días junto a la puerta en prostitución[a].\n\n\n    6. Por eso, embriagado con vino, no la reconocí; y su hermosura desvió mi mente por medio de la forma de su atavío.\n\n\n    7. Y me aparté hacia ella y le dije: «Déjame entrar a ti». Y ella dijo: «¿Qué me darás, para que entres a mí?»\n\n\n    8[8:9]. Y yo dije: «Te enviaré un cabrito del rebaño». Y ella dijo: «¿Me darás una prenda hasta que lo envíes?»\n\n\n    9. Y yo dije: «¿Qué prenda te daré?» Y ella dijo: «Tu vara, tu cinturón y el diadema de tu reino».\n\n\n    10. Entonces se los di y entré a ella, y concibió de mí. Y por causa del vino no percibí lo que había hecho; ni la reconocí cuando me fui.\n\n\n    11. Y después de esto envié el cabrito, pero no la encontré. Y pregunté a la gente del lugar, diciendo: «¿Dónde está la mujer que se sentó en Enaim junto al camino?»\n\n\n    12. Y ellos dijeron: «No ha habido aquí ninguna prostituta\
    \ ni ningún forastero sentado junto a la puerta». Y entendí que había pecado, y no di a conocer el asunto públicamente, porque me avergonzaba.\n\n\n    13. Y después de tres meses se me informó: «Tamar, tu nuera, ha actuado como prostituta, y mira, está encinta». Y yo, sin entendimiento en la arrogancia de mi ira, dije: «Sacadla, y que sea quemada».\n\n\n    14. Pero mientras la sacaban, ella me envió secretamente la vara, el cinturón y el diadema, diciendo: «Del hombre a quien pertenecen estas cosas estoy encinta».\n\n\n    15. Y los reconocí y me avergoncé, y dije: «Tamar es más justa que yo, porque no le di a Selá mi hijo». Y no la conocí de nuevo.\n\n\n    16. Y ahora, hijos míos, os digo: no os embriaguéis con vino. Porque el vino aparta la mente de la verdad e inspira la pasión del deseo, y lleva los ojos al error.\n\n\n    17. Porque el espíritu de inmoralidad sexual tiene al vino como servidor para dar placer a la mente; pues estos dos también le quitan a la persona el entendimiento.\n\
    \n\n    18. Porque si uno bebe vino hasta embriagarse, perturba la mente con pensamientos inmundos y conduce el cuerpo a la unión sexual; y si está presente la ocasión del deseo, comete el pecado y no se avergüenza.\n\n\n    19. Tal es el borracho, hijos míos. Porque el que está borracho no reverencia a nadie. Pues mirad, a mí también me hizo transgredir el mandamiento de Dios, y entré a Tamar, sin avergonzarme de la multitud de la ciudad, y ante los ojos de todos descubrí la vergüenza de mis hijos, ya que entré a Tamar.\n\n\n    20. Después de haber bebido vino, no respeté el mandamiento de Dios, y tomé por esposa a una mujer cananea. Pues se necesita mucha discreción por parte del hombre que bebe vino, hijos míos.\n\n\n    21. Y esta es la discreción al beber vino: si un hombre bebe vino y mantiene la modestia, y si no se desvía hacia la desvergüenza, puede beber vino.\n\n\n    22. Pero si se pasa del límite, el espíritu de engaño ataca su mente y hace que el borracho hable obscenidades\
    \ y transgreda, y que no se avergüence, sino que incluso se gloríe en su vergüenza y la cuente como gloria.\n\n\n    23. El que comete inmoralidad sexual no sabe cuándo sufre pérdida, y no se avergüenza cuando es deshonrado. Porque aun si un hombre es rey y comete inmoralidad sexual, es despojado de su realeza al hacerse esclavo de la inmoralidad sexual, como yo mismo también sufrí.\n\n\n    24. Porque entregué mi vara, es decir, el sostén de mi tribu; y mi cinturón, es decir, mi poder; y mi diadema, es decir, la gloria de mi reino.\n\n\n    25. Y en verdad me arrepentí de estas cosas; y no consumí vino ni carne hasta la vejez, y no vi alegría alguna.\n\n\n    26. Y el ángel de Dios me mostró que las mujeres gobiernan para siempre sobre rey y mendigo por igual. Al rey le quitan su gloria, y al hombre fuerte su fuerza, y al mendigo hasta el pequeño apoyo de su pobreza.\n\n\n    27. Por tanto, guardaos, hijos míos, de la inmoralidad sexual y del amor al dinero, y escuchad a Judá vuestro\
    \ padre.\n\n\n    28. Porque estas cosas apartan a una persona de la ley de Dios y ciegan la inclinación del alma, y enseñan arrogancia, y no le permiten tener compasión de su prójimo.\n\n\n    29. Le privan de toda bondad a su alma y lo oprimen con trabajos y aflicciones, y le quitan el sueño y devoran su carne.\n\n\n    30. Y se le impide ofrecer sacrificios a Dios; y no recuerda bendecir a Dios; y cuando oye a un profeta hablando, se ofende y se enoja.\n\n\n    31. Porque está esclavizado a dos pasiones contrarias y no puede obedecer a Dios, porque han cegado su alma y anda de día como en la noche.\n\n\n    32. Hijos míos, os he mostrado que el vino lleva a la inmoralidad sexual, y el amor al dinero a la idolatría; y estas cosas apartan la mente de la ley de Dios.\n\n\n    33. Por tanto, si no camináis con sobriedad en la verdad y en el temor de Dios, pereceréis por toda obra mala y toda plaga, si tomáis esposas de las hijas de Canaán y os unís a sus riquezas, siendo descarriados\
    \ por los regalos.\n\n\n    34. Porque sé que después de mi muerte actuaréis sin ley y contenderéis contra Leví, y no podréis prevalecer contra él, porque el ángel del Señor lo guía, y a mí el espíritu de engaño me ha descarriado.\n\n\n    35. Y ahora os mando amar a Leví, para que viváis, y no os exaltéis contra él, no sea que seáis totalmente destruidos.\n\n\n    36. Porque a mí me dio el Señor la realeza, y a él el sacerdocio; y puso el reino bajo el sacerdocio.\n\n\n    37. A mí me dio las cosas de la tierra; a él, las cosas del cielo.\n\n\n    38. Como el cielo es más alto que la tierra, así es el sacerdocio de Dios más alto que el reino terrenal[b], a menos que caiga por el pecado lejos del Señor y sea dominado por el reino terrenal.\n\n\n    39. Porque el ángel del Señor me dijo: «El Señor escogió a Leví antes que a ti, para estar cerca de él, y para que tú seas rey con él, como un león».\n\n\n    40. Por tanto, no os enaltezcáis sobre Leví, ni contra mí, sino honrad plenamente\
    \ al Señor en ambos, y entre los hombres acercaos a Leví.\n\n\n    41. Porque por causa de él el Señor escogerá de entre vosotros la realeza, y de Leví el sacerdocio, para que el Señor sea para todas las naciones y la raza de Israel.\n\n\n    42. Y ahora os he mandado estas cosas, porque he leído en los libros de Enoc el justo que vuestros hijos se apartarán del Señor[c], y cometerán toda maldad y toda aflicción delante del Señor."
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión «en prostitución» refleja el informe de esta tradición sobre la costumbre amorrea; no presenta una ley de Israel.
    reason: cultural_note
  - marker: b
    text: «Reino terrenal» traduce el contraste del griego con el sacerdocio; la frase siguiente conserva la cláusula que limita la afirmación si el sacerdocio cae por el pecado.
    reason: theological_note
  - marker: c
    text: La referencia a «los libros de Enoc» se traduce tal como aparece en el testimonio griego y puede reflejar un entorno literario más amplio del Segundo Templo.
    reason: cultural_note
lexical_decisions:
- source_word: ἦσαν ... κτήνη πολλά
  english_pob_choice: I had ... cattle many
  chosen_spanish: tenía ... muchos ganados
  alternatives_spanish:
  - tenía ... mucho ganado
  - poseía ... muchos animales
  lexicon: LSJ
  rationale: Mantiene el sentido posesivo y el carácter abundante del rebaño sin forzar un singular colectivo donde el español puede sonar menos natural.
- source_word: ἀρχιποίμενα
  english_pob_choice: chief shepherd
  chosen_spanish: jefe de los pastores
  alternatives_spanish:
  - pastor principal
  - mayoral
  lexicon: LSJ
  rationale: Se preserva la idea jerárquica del cargo pastoral con un español claro; 'jefe de los pastores' evita convertirlo en un oficio eclesiástico posterior.
- source_word: Ἱρὰμ τὸν Ὀδολομίτην
  english_pob_choice: Hiram the Odollamite
  chosen_spanish: Hiram el odolamita
  alternatives_spanish:
  - Hiram de Adulam
  - Hiram el de Odolam
  lexicon: Onomasticon / transliteration
  rationale: Se conserva el etnónimo tal como lo presenta el testimonio griego, con transliteración regularizada al español.
- source_word: πρὸς ὃν ἐλθὼν ἤμην
  english_pob_choice: while I was there
  chosen_spanish: mientras yo estaba allí
  alternatives_spanish:
  - habiendo ido a él, estaba allí
  - fui hacia él y estaba allí
  lexicon: LSJ
  rationale: La versión inglesa suaviza la construcción griega; en español se mantiene el sentido narrativo de permanencia sin un giro artificial.
- source_word: παρακαλέσας
  english_pob_choice: when he urged me
  chosen_spanish: cuando me instó
  alternatives_spanish:
  - cuando me rogó
  - cuando me persuadió
  lexicon: LSJ
  rationale: '''Instó'' recoge la presión persuasiva del participio y su valor narrativo en la negociación matrimonial.'
- source_word: θυγατέρα αὐτοῦ ... εἰς γυναῖκα
  english_pob_choice: his daughter ... as a wife
  chosen_spanish: a su hija ... por esposa
  alternatives_spanish:
  - a su hija ... como esposa
  - a su hija ... para mujer
  lexicon: LSJ
  rationale: '''Por esposa'' expresa el valor resultativo/relacional del griego y evita una perífrasis más pesada.'
- source_word: δέδωκέ μοι τὴν θυγατέρα αὐτοῦ
  english_pob_choice: he gave me his daughter
  chosen_spanish: me dio a su hija
  alternatives_spanish:
  - me entregó a su hija
  - me concedió a su hija
  lexicon: LSJ
  rationale: '''Dar'' es suficiente y directo en el contexto de matrimonio arreglado; no se carga innecesariamente de connotación legal.'
- source_word: ὄνοματι Σαβά
  english_pob_choice: whose name was Shua
  chosen_spanish: cuyo nombre era Sua
  alternatives_spanish:
  - llamada Sua
  - de nombre Sua
  lexicon: Onomasticon / transliteration
  rationale: Se regulariza la forma al español y se mantiene la información nominal sin añadir interpretación.
- source_word: ἔτεκέν μοι
  english_pob_choice: She bore me
  chosen_spanish: me dio a luz
  alternatives_spanish:
  - me parió
  - engendró para mí
  lexicon: BDAG
  rationale: '''Dar a luz'' es natural y digno en español para el nacimiento de los hijos, sin perder la referencia materna directa.'
- source_word: ἀνεῖλεν Κύριος
  english_pob_choice: the Lord killed
  chosen_spanish: el Señor mató
  alternatives_spanish:
  - el Señor dio muerte
  - el Señor quitó la vida
  lexicon: BDAG
  rationale: El verbo expresa una acción divina de quitar la vida; 'mató' es claro y mantiene la fuerza del juicio narrado.
- source_word: παρὰ τὴν ἐντολὴν τῆς μητρὸς αὐτοῦ
  english_pob_choice: according to the commandment of his mother
  chosen_spanish: conforme al mandamiento de su madre
  alternatives_spanish:
  - según la orden de su madre
  - de acuerdo con la instrucción de su madre
  lexicon: LSJ
  rationale: La formulación conserva la noción de obediencia a una orden/instrucción materna como la presenta la tradición griega.
- source_word: ὀνόματι Σαβά εἰς γυναῖκα
  english_pob_choice: whose name was Shua, as a wife
  chosen_spanish: cuyo nombre era Sua, por esposa
  alternatives_spanish:
  - llamada Sua, como esposa
  - de nombre Sua, para mujer
  lexicon: Onomasticon / transliteration
  rationale: Se mantiene la relación matrimonial sin convertirla en una explicación interpretativa.
- source_word: Καὶ τοὺς μὲν δύο ἀνεῖλεν Κύριος
  english_pob_choice: And the Lord killed the first two
  chosen_spanish: Y el Señor mató a los dos primeros
  alternatives_spanish:
  - Y el Señor dio muerte a los dos primeros
  - Y el Señor quitó la vida a los dos primeros
  lexicon: BDAG
  rationale: '''Los dos primeros'' reproduce la referencia colectiva del griego y enlaza con el orden narrativo anterior.'
- source_word: ὁ γὰρ Σηλὼμ ἔζησεν
  english_pob_choice: and Shelah lived
  chosen_spanish: y Selá vivió
  alternatives_spanish:
  - y Selá siguió viviendo
  - y Selá quedó con vida
  lexicon: LSJ
  rationale: La frase es breve y factual; 'vivió' conserva su sobriedad sin explicitar más de lo necesario.
- source_word: ἦν report-style omitted clauses
  english_pob_choice: For I said, ... For I did not know
  chosen_spanish: Porque dije ... Pues yo no sabía
  alternatives_spanish:
  - Porque me dije ... Porque no sabía
  lexicon: Discourse analysis
  rationale: Se preserva el encadenamiento causal del relato y la autocensura de Judá sin alargar la sintaxis.
- source_word: ἤμην ἐν Σαυίρ? / while Tamar was a widow
  english_pob_choice: while Tamar was a widow
  chosen_spanish: mientras Tamar era viuda
  alternatives_spanish:
  - cuando Tamar estaba viuda
  - siendo Tamar viuda
  lexicon: LSJ
  rationale: La cláusula temporal se traduce de manera natural y directa en español.
- source_word: ἀναβαίνουσαν ... εἰς τόδε
  english_pob_choice: going up to shear sheep
  chosen_spanish: iba a esquilar las ovejas
  alternatives_spanish:
  - subía a esquilar ovejas
  - iba a trasquilar el ganado
  lexicon: LSJ
  rationale: '''Esquilar las ovejas'' es la formulación clara y estándar para el acto pastoral mencionado.'
- source_word: ἀμαρτία / ἥμαρτον
  english_pob_choice: I had sinned
  chosen_spanish: había pecado
  alternatives_spanish:
  - había cometido pecado
  - había faltado
  lexicon: BDAG
