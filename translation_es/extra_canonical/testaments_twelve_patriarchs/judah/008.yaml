theological_decisions:
- issue: Tratamiento del vino en la sección exhortativa
  english_pob_reading: The chapter warns against drunkenness, while allowing wine within limits.
  chosen_spanish_reading: La sección advierte contra la embriaguez, pero no prohíbe todo vino sin excepción.
  alternative_spanish_readings:
  - Prohibición total del vino
  - Consejo meramente prudencial sin peso moral
  rationale: La redacción española conserva la distinción del pasaje entre uso moderado y abuso, evitando absolutizar la advertencia.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 5
- issue: Relación entre realeza de Judá y sacerdocio de Leví
  english_pob_reading: The text elevates priesthood above earthly kingship while retaining the clause about priesthood falling away through sin.
  chosen_spanish_reading: El texto eleva el sacerdocio por encima de la realeza terrenal, conservando la cláusula condicional sobre caer por el pecado.
  alternative_spanish_readings:
  - Supremacía absoluta del sacerdocio en todo sentido
  - Igualdad posterior y armonizada de ambos oficios
  rationale: La traducción no suaviza la tensión ni elimina la condición; mantiene el contraste tal como lo testimonia el griego.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Referencia a los libros de Enoc y su marco literario
  english_pob_reading: Translate the Greek witness straightforwardly and note the broader Second Temple texture without excision.
  chosen_spanish_reading: Se traduce el testimonio griego de modo directo, sin omitir la referencia a Enoc ni armonizarla con formulaciones canónicas posteriores.
  alternative_spanish_readings:
  - Omitir como interpolación
  - Reformular para ajustarlo a la tradición bíblica posterior
  rationale: La transparencia textual requiere dejar visible el estrato literario del testimonio, con su posible expansión y su contexto judío del Segundo Templo.
  doctrine_reference: PHILOSOPHY.md §What we are translating; §transparent
translation_notes:
  revision_awareness: Se revisó el testimonio griego α-column primary junto con el audit trail inglés; no se detectaron cambios aplicados en esta pasada, y se conservaron las tensiones textuales y teológicas documentadas sin armonizarlas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en los casos donde el proyecto lo exige, pero en este pasaje el testimonio inglés audita κύριος y aquí se sigue la formulación del testimonio como «el Señor» para respetar la decisión contextual del registro.
  - Se usa «Mesías» solo cuando no aplica en este pasaje; los términos de realeza y sacerdocio se mantienen como «realeza» y «sacerdocio» para preservar el contraste institucional.
  - «Espíritu» se reserva para usos no presentes aquí; «espíritu de engaño» traduce el genitivo moral sin convertirlo en entidad doctrinal posterior.
  - Se conserva «esclavo» para δοῦλος en la línea 23, siguiendo la fuerza léxica del inglés auditado y del pasaje.
  - 'Los nombres propios se regularizan al español de forma consistente: Sua, Selá, Tamna, Enaim, Leví, Yahvé no aparece en el texto base de este pasaje.'
