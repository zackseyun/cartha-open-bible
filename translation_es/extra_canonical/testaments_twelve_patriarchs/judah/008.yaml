revisions:
- from: '1[8:5]. Y mientras yo estaba allí, el rey de Adulam, Barshabá, nos trató con hospitalidad y nos hizo un banquete de bebida; y cuando me instó, me dio por esposa a su hija, cuyo nombre era Sua.


    2. Ella me dio a Er, a Onán y a Selá. Y el Señor mató a los dos primeros, porque Er era malvado; y Onán, cuando se había casado con Tamar, derramó la semilla en tierra, conforme al mandamiento de su madre, y también él murió por su maldad.


    3. Y Selá vivió, y yo no le di a Tamar por esposa. Porque dije: «No sea que él también muera como sus hermanos». Pues yo no sabía que el Señor me estaba juzgando por lo que había hecho en Tamna a mi padre Jacob y a José.


    4. Y después de estas cosas, mientras Tamar era viuda, y después de haber pasado dos años, se me informó que iba a esquilar las ovejas en Tamna. Y yo también fui a esquilar mis ovejas.


    5. Y ella, habiendo sabido que yo iba subiendo, se adornó con atavío de novia y se sentó en la ciudad de Enaim, junto a la puerta. Porque era una ley de los amorreos que la que iba a casarse se sentara siete días junto a la puerta en prostitución[a].


    6. Por eso, embriagado con vino, no la reconocí; y su hermosura desvió mi mente por medio de la forma de su atavío.


    7. Y me aparté hacia ella y le dije: «Déjame entrar a ti». Y ella dijo: «¿Qué me darás, para que entres a mí?»


    8[8:9]. Y yo dije: «Te enviaré un cabrito del rebaño». Y ella dijo: «¿Me darás una prenda hasta que lo envíes?»


    9. Y yo dije: «¿Qué prenda te daré?» Y ella dijo: «Tu vara, tu cinturón y el diadema de tu reino».


    10. Entonces se los di y entré a ella, y concibió de mí. Y por causa del vino no percibí lo que había hecho; ni la reconocí cuando me fui.


    11. Y después de esto envié el cabrito, pero no la encontré. Y pregunté a la gente del lugar, diciendo: «¿Dónde está la mujer que se sentó en Enaim junto al camino?»


    12. Y ellos dijeron: «No ha habido aquí ninguna prostituta ni ningún forastero sentado junto a la puerta». Y entendí que había pecado, y no di a conocer el asunto públicamente, porque me avergonzaba.


    13. Y después de tres meses se me informó: «Tamar, tu nuera, ha actuado como prostituta, y mira, está encinta». Y yo, sin entendimiento en la arrogancia de mi ira, dije: «Sacadla, y que sea quemada».


    14. Pero mientras la sacaban, ella me envió secretamente la vara, el cinturón y el diadema, diciendo: «Del hombre a quien pertenecen estas cosas estoy encinta».


    15. Y los reconocí y me avergoncé, y dije: «Tamar es más justa que yo, porque no le di a Selá mi hijo». Y no la conocí de nuevo.


    16. Y ahora, hijos míos, os digo: no os embriaguéis con vino. Porque el vino aparta la mente de la verdad e inspira la pasión del deseo, y lleva los ojos al error.


    17. Porque el espíritu de inmoralidad sexual tiene al vino como servidor para dar placer a la mente; pues estos dos también le quitan a la persona el entendimiento.


    18. Porque si uno bebe vino hasta embriagarse, perturba la mente con pensamientos inmundos y conduce el cuerpo a la unión sexual; y si está presente la ocasión del deseo, comete el pecado y no se avergüenza.


    19. Tal es el borracho, hijos míos. Porque el que está borracho no reverencia a nadie. Pues mirad, a mí también me hizo transgredir el mandamiento de Dios, y entré a Tamar, sin avergonzarme de la multitud de la ciudad, y ante los ojos de todos descubrí la vergüenza de mis hijos, ya que entré a Tamar.


    20. Después de haber bebido vino, no respeté el mandamiento de Dios, y tomé por esposa a una mujer cananea. Pues se necesita mucha discreción por parte del hombre que bebe vino, hijos míos.


    21. Y esta es la discreción al beber vino: si un hombre bebe vino y mantiene la modestia, y si no se desvía hacia la desvergüenza, puede beber vino.


    22. Pero si se pasa del límite, el espíritu de engaño ataca su mente y hace que el borracho hable obscenidades y transgreda, y que no se avergüence, sino que incluso se gloríe en su vergüenza y la cuente como gloria.


    23. El que comete inmoralidad sexual no sabe cuándo sufre pérdida, y no se avergüenza cuando es deshonrado. Porque aun si un hombre es rey y comete inmoralidad sexual, es despojado de su realeza al hacerse esclavo de la inmoralidad sexual, como yo mismo también sufrí.


    24. Porque entregué mi vara, es decir, el sostén de mi tribu; y mi cinturón, es decir, mi poder; y mi diadema, es decir, la gloria de mi reino.


    25. Y en verdad me arrepentí de estas cosas; y no consumí vino ni carne hasta la vejez, y no vi alegría alguna.


    26. Y el ángel de Dios me mostró que las mujeres gobiernan para siempre sobre rey y mendigo por igual. Al rey le quitan su gloria, y al hombre fuerte su fuerza, y al mendigo hasta el pequeño apoyo de su pobreza.


    27. Por tanto, guardaos, hijos míos, de la inmoralidad sexual y del amor al dinero, y escuchad a Judá vuestro padre.


    28. Porque estas cosas apartan a una persona de la ley de Dios y ciegan la inclinación del alma, y enseñan arrogancia, y no le permiten tener compasión de su prójimo.


    29. Le privan de toda bondad a su alma y lo oprimen con trabajos y aflicciones, y le quitan el sueño y devoran su carne.


    30. Y se le impide ofrecer sacrificios a Dios; y no recuerda bendecir a Dios; y cuando oye a un profeta hablando, se ofende y se enoja.


    31. Porque está esclavizado a dos pasiones contrarias y no puede obedecer a Dios, porque han cegado su alma y anda de día como en la noche.


    32. Hijos míos, os he mostrado que el vino lleva a la inmoralidad sexual, y el amor al dinero a la idolatría; y estas cosas apartan la mente de la ley de Dios.


    33. Por tanto, si no camináis con sobriedad en la verdad y en el temor de Dios, pereceréis por toda obra mala y toda plaga, si tomáis esposas de las hijas de Canaán y os unís a sus riquezas, siendo descarriados por los regalos.


    34. Porque sé que después de mi muerte actuaréis sin ley y contenderéis contra Leví, y no podréis prevalecer contra él, porque el ángel del Señor lo guía, y a mí el espíritu de engaño me ha descarriado.


    35. Y ahora os mando amar a Leví, para que viváis, y no os exal­téis contra él, no sea que seáis totalmente destruidos.


    36. Porque a mí me dio el Señor la realeza, y a él el sacerdocio; y puso el reino bajo el sacerdocio.


    37. A mí me dio las cosas de la tierra; a él, las cosas del cielo.


    38. Como el cielo es más alto que la tierra, así es el sacerdocio de Dios más alto que el reino terrenal[a], a menos que caiga por el pecado lejos del Señor y sea dominado por el reino terrenal.


    39. Porque el ángel del Señor me dijo: «El Señor escogió a Leví antes que a ti, para estar cerca de él, y para que tú seas rey con él, como un león».


    40. Por tanto, no os enaltezcáis sobre Leví, ni contra mí, sino honrad plenamente al Señor en ambos, y entre los hombres acercaos a Leví.


    41. Porque por causa de él el Señor escogerá de entre vosotros la realeza, y de Leví el sacerdocio, para que el Señor sea para todas las naciones y la raza de Israel.


    42. Y ahora os he mandado estas cosas, porque he leído en los libros de Enoc el justo que vuestros hijos se apartarán del Señor[a][b][c], y cometerán toda maldad y toda aflicción delante del Señor.'
