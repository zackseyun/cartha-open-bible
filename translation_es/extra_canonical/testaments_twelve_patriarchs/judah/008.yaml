  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/008.yaml
  text: '1[8:5]. And while I was there, the king of Adullam, Barshaba, dealt hospitably with us and made us a drinking feast; and when he urged me, he gave me his daughter, whose name was Shua, as a wife.


    2. She bore me Er and Onan and Shelah. And the Lord killed the first two, for Er was wicked; and Onan, when he had married Tamar, spilled the seed upon the ground, according to the commandment of his mother, and he also died through wickedness.


    3. And Shelah lived, and I did not give Tamar to him as wife. For I said, “Lest he also die like his brothers.” For I did not know that the Lord was judging me because of the things I had done at Timnah to my father Jacob and to Joseph.


    4. And after these things, while Tamar was a widow, and after two years had passed, there was reported to me that she was going up to shear sheep at Timnah. And I also went to shear my sheep.


    5. And she, having learned that I was going up, adorned herself in bridal array and sat in the city Enaim by the gate. For it was a law of the Amorites that she who was about to marry should sit for seven days by the gate in fornication.


    6. Therefore, being drunk with wine, I did not recognize her; and her beauty led my mind astray through the fashion of her adornment.


    7. And I turned aside to her and said, “Let me go in to you.” And she said, “What will you give me, that you may come in to me?”


    8[8:9]. And I said, “I will send you a kid from the flock.” And she said, “Will you give me a pledge until you send it?”


    9. And I said, “What pledge shall I give you?” And she said, “Your staff, and your girdle, and the diadem of your kingdom.”


    10. So I gave them to her and went in to her, and she conceived by me. And because of the wine I did not perceive what I had done; neither did I recognize her when I went away.


    11. And after this I sent the kid, but I did not find her. And I asked the people of the place, saying, “Where is the woman who sat at Enaim by the road?”


    12. And they said, “There has been no prostitute here, nor any stranger sitting by the gate.” And I understood that I had sinned, and I did not make the matter known publicly, because I was ashamed.


    13. And after three months it was reported to me, “Tamar your daughter-in-law has played the prostitute, and behold, she is with child.” And I, being without understanding in the arrogance of my anger, said, “Bring her out, and let her be burned.”


    14. But as she was being brought out, she sent secretly to me the staff and the girdle and the diadem, saying, “By the man to whom these belong I am with child.”


    15. And I recognized them and was ashamed, and I said, “Tamar is more righteous than I, because I did not give her to Shelah my son.” And I did not know her again.


    16. And now, my children, I say to you: do not be drunk with wine. For wine turns the mind away from the truth and inspires the passion of desire, and it leads the eyes into error.


    17. For the spirit of sexual immorality has wine as a servant to give pleasure to the mind; for these two also take away a person’s understanding.


    18. For if one drinks wine to drunkenness, it disturbs the mind with filthy thoughts and leads the body on to sexual union; and if the occasion of desire is present, he commits the sin and is not ashamed.


    19. Such is the drunkard, my children. For the one who is drunk does not reverence anyone. For behold, it made me also transgress the commandment of God, and I went in to Tamar, not being ashamed of the multitude in the city, and before the eyes of all I uncovered the shame of my sons, since I went in to Tamar.


    20. After I had drunk wine, I did not respect the commandment of God, and I took a woman of Canaan as wife. For much discretion is needed by the man who drinks wine, my children.


    21. And this is the discretion in drinking wine: if a man drinks wine and keeps modesty, and if he does not go astray into shamelessness, he may drink wine.


    22. But if he goes beyond the limit, the spirit of deceit attacks his mind and makes the drunkard speak obscenities and transgress, and not be ashamed, but even boast in his disgrace and count it glory.


    23. One who commits sexual immorality does not know when he suffers loss, and he is not ashamed when dishonored. For even if a man is a king and commits sexual immorality, he is stripped of his kingship by becoming a slave to sexual immorality, as I myself also suffered.


    24. For I gave my staff, that is, the stay of my tribe; and my girdle, that is, my power; and my diadem, that is, the glory of my kingdom.


    25. And indeed I repented of these things; and wine and meat I did not consume until old age, and I saw no joy.


    26. And the angel of God showed me that women rule forever over king and beggar alike. From a king they take away his glory, and from a strong man his strength, and from a beggar even the little support of his poverty.


    27. Therefore keep yourselves, my children, from sexual immorality and from the love of money, and listen to Judah your father.


    28. For these things draw a person away from the law of God and blind the inclination of the soul, and teach arrogance, and do not allow one to have compassion on his neighbor.


    29. They deprive his soul of every goodness and oppress him with toils and troubles, and drive sleep away from him and devour his flesh.


    30. And he is hindered from offering sacrifices to God; and he does not remember blessing God; and when he hears a prophet speaking, he is offended and angered.


    31. For he is enslaved to two contrary passions and cannot obey God, because they have blinded his soul and he walks in the day as in the night.


    32. My children, I have shown you that wine leads to sexual immorality, and the love of money to idolatry; and these things turn the mind away from the law of God.


    33. Therefore, if you do not walk in sobriety in truth and in the fear of God, you will perish through every evil deed and every plague, if you take wives from the daughters of Canaan and are joined to their wealth, being led astray by gifts.


    34. For I know that after my death you will act lawlessly and contend against Levi, and you will not be able to prevail against him, because the angel of the Lord guides him and me the spirit of deceit has misled.


    35. And now I command you to love Levi, that you may live, and do not exalt yourselves against him, lest you be utterly destroyed.


    36. For to me the Lord gave the kingship, and to him the priesthood; and he set the kingdom under the priesthood.


    37. To me he gave the things on earth; to him the things in heaven.


    38. As heaven is higher than earth, so is the priesthood of God higher than the earthly kingdom—unless it falls away through sin from the Lord and is dominated by the earthly kingdom.


    39. For the angel of the Lord said to me, “The Lord chose Levi before you, to be near him, and for you to be king with him, as a lion.”


    40. Therefore be not lifted up over Levi, nor against me, but honor in full the Lord in both, and among men draw near to Levi.


    41. For because of him the Lord will choose from you the kingship, and from Levi the priesthood, that the Lord may be for all the nations and the race of Israel.


    42. And now I have commanded you these things, because I have read in the books of Enoch the righteous that your sons will turn away from the Lord[8:42][8:38][8:20], and will commit every wickedness and every affliction before the Lord.'
  footnotes:
  - marker: '8:5'
    text: The description of a bride sitting by the gate 'in fornication' reflects the narrator's report about Amorite custom in this witness, not a biblical law of Israel.
    reason: cultural_note
  - marker: '8:9'
    text: The Greek has 'diadem,' a royal emblem; some render more generally as 'crown.'
    reason: lexical_alternative
  - marker: '8:20'
    text: This line alludes to Judah's marriage to a Canaanite woman in the Genesis tradition.
    reason: cross_reference
  - marker: '8:38'
    text: 'The final clause qualifies the superiority claim: priesthood is higher than earthly kingship unless it falls away through sin.'
    reason: alternative_reading
  - marker: '8:42'
    text: The reference to 'the books of Enoch' is translated as it stands in the Greek witness and may reflect a broader Second Temple literary setting.
    reason: cultural_note
