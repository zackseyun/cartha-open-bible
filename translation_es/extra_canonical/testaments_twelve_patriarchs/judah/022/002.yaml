  text: Καὶ ἐν ἀλλοφύλοις5 συντελεσθήσεται ἡ βασιλεία μου6, ἕως *τοῦ ἐλθεῖν7 *τὸ σωτήριον8 τοῦ9 Ἰσραήλ10,
