base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/022/002.yaml
  text: And my kingdom will be brought to an end among foreigners, until the salvation of Israel comes,
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:58Z'
    unchanged: false
    changes_summary: Removed the bracketed footnote markers from the running text; otherwise retained the draft, which accurately reflects the source clause structure.
translation:
  language: es
  text: Y mi reino será puesto fin entre extranjeros, hasta que venga la salvación de Israel,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐν ἀλλοφύλοις
  english_pob_choice: among foreigners
  chosen_spanish: entre extranjeros
  alternatives_spanish:
  - en medio de extranjeros
  - entre pueblos extranjeros
  lexicon: ἀλλόφυλος
  rationale: La idea principal es ubicación/inserción «entre» personas de otro pueblo, no necesariamente un matiz hostil. «Extranjeros» comunica bien el contraste étnico-político del término en español bíblico moderno.
- source_word: συντελεσθήσεται
  english_pob_choice: will be brought to an end
  chosen_spanish: será puesto fin
  alternatives_spanish:
  - será consumado
  - terminará
  lexicon: συντελέω
  rationale: El verbo griego expresa llegar a su término/completarse. En español, «será puesto fin» mantiene la pasiva y el sentido de conclusión del reino sin añadir más que el original.
- source_word: ἡ βασιλεία μου
  english_pob_choice: my kingdom
  chosen_spanish: mi reino
  alternatives_spanish:
  - mi reino real
  - mi realeza
  lexicon: βασιλεία
  rationale: «Reino» es la equivalencia más natural y fiel para βασιλεία en este contexto; «realeza» sería más abstracto y menos directo para una frase narrativa/escatológica.
- source_word: τὸ σωτήριον
  english_pob_choice: the salvation
  chosen_spanish: la salvación
  alternatives_spanish:
  - la liberación
  - el rescate
  lexicon: σωτήριον
  rationale: El sustantivo neutro aquí designa el acto o realidad salvífica que llega para Israel. «Salvación» preserva el término bíblico amplio y evita estrecharlo solo a liberación política.
- source_word: τοῦ Ἰσραήλ
  english_pob_choice: of Israel
  chosen_spanish: de Israel
  alternatives_spanish:
  - para Israel
  lexicon: Ἰσραήλ
  rationale: Se mantiene la relación genitiva simple del griego. «De Israel» es la forma más directa y sobria, coherente con el auditorio y el registro del texto.
theological_decisions:
- issue: Alcance de «la salvación de Israel»
  english_pob_reading: until the salvation of Israel comes
  chosen_spanish_reading: hasta que venga la salvación de Israel
  alternative_spanish_readings:
  - hasta que llegue la liberación de Israel
  - hasta que venga el rescate de Israel
  rationale: Se conserva la apertura semántica del inglés POB y del griego, sin concretar la salvación como únicamente política, nacional o espiritual. «Venga» mantiene el movimiento escatológico del original.
  doctrine_reference: Esperanza escatológica / restauración de Israel
translation_notes:
  revision_awareness: La revisión reciente retiró marcadores de nota del texto inglés, pero no alteró la cláusula base. La presente versión sigue la estructura del original griego y el equivalente inglés auditado, sin introducir notas nuevas.
  spanish_consistency_notes:
  - Se mantiene el estilo sobrio y bíblico del proyecto.
  - No se usó «SEÑOR» ni sustituciones teológicas no presentes en el texto fuente.
  - «Reino» y «salvación» conservan el paralelismo conceptual del original sin expandirlo.
