translation:
  language: es
  text: Yahvé suscitará divisiones entre ellos, unos contra otros, y habrá guerras continuas en Israel.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Κύριος
  english_pob_choice: The Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - el Dios
  lexicon: divine name / κύριος
  rationale: El contexto del libro usa ‘Κύριος’ como referencia al nombre divino, y la política del proyecto pide ‘Yahvé’ en el texto principal cuando el trasfondo es el nombre propio de Dios, en lugar de ocultarlo con ‘Señor’.
- source_word: διαιρέσεις
  english_pob_choice: divisions
  chosen_spanish: divisiones
  alternatives_spanish:
  - discordias
  - separaciones
  lexicon: division, dissension
  rationale: ‘Divisiones’ reproduce con fidelidad la idea de rupturas o facciones entre personas; ‘discordias’ añade matiz interpretativo, y ‘separaciones’ debilita el conflicto interpersonal.
- source_word: ἀλλήλων
  english_pob_choice: among them against one another
  chosen_spanish: unos contra otros
  alternatives_spanish:
  - entre sí
  - entre ellos
  lexicon: reciprocal pronoun
  rationale: La expresión española ‘unos contra otros’ comunica bien la reciprocidad conflictiva del griego y conserva el sentido de enfrentamiento mutuo sin sobrecargar la frase.
- source_word: πόλεμοι
  english_pob_choice: wars
  chosen_spanish: guerras
  alternatives_spanish:
  - conflictos armados
  - batallas
  lexicon: war
  rationale: ‘Guerras’ es la correspondencia directa y natural en español para πόλεμοι, manteniendo el alcance amplio del plural.
- source_word: συνεχεῖς
  english_pob_choice: continual
  chosen_spanish: continuas
  alternatives_spanish:
  - perpetuas
  - incesantes
  lexicon: continuous, repeated, ongoing
  rationale: ‘Continuas’ conserva la idea de persistencia o repetición constante sin intensificarla más de lo que exige el griego.
- source_word: ἐν Ἰσραήλ
  english_pob_choice: in Israel
  chosen_spanish: en Israel
  alternatives_spanish:
  - dentro de Israel
  - entre Israel
  lexicon: preposition + proper noun
  rationale: ‘En Israel’ es la forma más directa y fiel; mantiene la ubicación/situación del conflicto según el texto fuente.
theological_decisions:
- issue: Reference to the divine name in Greek κύριος
  english_pob_reading: The Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  rationale: Aunque el griego usa κύριος, el pasaje refleja el nombre divino según la convención del proyecto; por eso se mantiene ‘Yahvé’ en el texto principal para no enmascarar la referencia.
  doctrine_reference: Nombre divino / representación del tetragrámaton
- issue: Scope of the conflict
  english_pob_reading: divisions among them against one another, and continual wars will be in Israel
  chosen_spanish_reading: divisiones entre ellos, unos contra otros, y habrá guerras continuas en Israel
  alternative_spanish_readings:
  - divisiones entre ellos mismos y guerras continuas en Israel
  - divisiones mutuas y guerras continuas en Israel
  rationale: 'Se conserva la doble afirmación del griego: primero división interna recíproca, luego una condición bélica persistente situada en Israel. La redacción evita suavizar el conflicto.'
  doctrine_reference: Juicio / conflicto interno en Israel
translation_notes:
  revision_awareness: 'La versión inglesa revisada eliminó una nota al pie y ajustó la segunda cláusula para reflejar más de cerca el griego: ‘wars will be in Israel’. La propuesta española sigue ese ajuste, usando ‘habrá guerras continuas en Israel’ sin añadir notas innecesarias.'
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ conforme al estándar del proyecto para κύριος con trasfondo del nombre divino.
  - Se usa ‘continuas’ para συνεχεῖς, manteniendo un tono sobrio y fiel sin intensificar el adjetivo.
  - 'La sintaxis española conserva la parataxis del original: una primera cláusula de división interna y una segunda de guerras situadas en Israel.'
