translation:
  language: es
  text: 'Hasta la venida del Dios de la justicia[a], para dar descanso a Jacob en paz, y a todas las naciones. Y preservará para siempre la fuerza de mi reino; porque el Señor me juró con juramento no borrar el reino.


    Grande es en verdad mi tristeza, hijos míos, a causa de los actos de inmoralidad sexual y de las hechicerías que practicarán en el reino, siguiendo a ventrílocuos[b] y agüeros, y a demonios de engaño. Harán de sus hijas músicas y mujeres públicas[c], y se mezclarán con las abominaciones de las naciones. Por estas cosas el Señor traerá sobre ustedes hambre y pestilencia, muerte y la espada vengadora[d], asedio, y los reproches de enemigos y amigos. Por manos de extranjeros será llevado a su fin mi reino.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «presencia»; el contexto, sin embargo, favorece una venida esperada.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «los que hablan desde el vientre»; en contexto antiguo, alude a médiums o practicantes de adivinación.
    reason: cultural_note
  - marker: c
    text: La expresión puede referirse a hijas convertidas en mujeres dedicadas al entretenimiento público y a la explotación sexual.
    reason: lexical_alternative
  - marker: d
    text: El griego transmite «la espada vengadora»; algunos testigos amplían o varían los detalles de juicio en este versículo.
    reason: textual_variant
lexical_decisions:
- source_word: παρουσία / παρουσία του Θεοῦ
  english_pob_choice: coming
  chosen_spanish: venida
  alternatives_spanish:
  - presencia
  - llegada
  lexicon: BDAG
  rationale: En este contexto profético, παρουσία apunta a un advenimiento esperado; «venida» conserva el valor de futuro y evita diluir la expectativa en una mera presencia abstracta.
- source_word: Θεοῦ τῆς δικαιοσύνης
  english_pob_choice: God of righteousness
  chosen_spanish: Dios de la justicia
  alternatives_spanish:
  - Dios de la rectitud
  - Dios justo
  lexicon: BDAG
  rationale: La construcción genitiva se mantiene de forma transparente. «Justicia» preserva la fuerza bíblico-teológica del término sin forzar una paráfrasis.
- source_word: ἡσυχάσαι
  english_pob_choice: give ... rest in peace
  chosen_spanish: dar descanso ... en paz
  alternatives_spanish:
  - apaciguar
  - hacer reposar
  lexicon: LSJ
  rationale: El infinitivo expresa la acción de traer reposo o quietud; «dar descanso en paz» suena natural en español y conserva el matiz de calma y estabilidad.
- source_word: κράτος
  english_pob_choice: the might
  chosen_spanish: la fuerza
  alternatives_spanish:
  - el poder
  - la potencia
  lexicon: BDAG
  rationale: En el marco real/monárquico, κράτος alude a vigor o fuerza sostenida. «Fuerza» comunica bien la preservación del reino sin exagerar hacia un sentido político técnico.
- source_word: ἀσελγείας
  english_pob_choice: acts of sexual immorality
  chosen_spanish: actos de inmoralidad sexual
  alternatives_spanish:
  - debaucherías
  - actos licenciosos
  lexicon: BDAG
  rationale: El término implica desenfreno sensual y sexual; esta opción es clara y de registro bíblico sin suavizar el contenido.
- source_word: γοητείας
  english_pob_choice: sorceries
  chosen_spanish: hechicerías
  alternatives_spanish:
  - magias
  - artes mágicas
  lexicon: LSJ
  rationale: La palabra remite a prácticas mágicas ilícitas; «hechicerías» es un equivalente transparente y suficientemente fuerte para el contexto de lista viciosa.
- source_word: ἐγγαστριμύθοις
  english_pob_choice: ventriloquists
  chosen_spanish: ventrílocuos
  alternatives_spanish:
  - mediums
  - barriga-hablantes
  lexicon: LSJ
  rationale: Se conserva la imagen concreta del griego. En contexto antiguo, alude a mediadores espirituales o practicantes de adivinación; el término puede ser explicado en nota sin reemplazar el color del original.
- source_word: κληδόσι
  english_pob_choice: omens
  chosen_spanish: agüeros
  alternatives_spanish:
  - presagios
  - augurios
  lexicon: LSJ
  rationale: Se refiere a signos interpretados como pronósticos. «Agüeros» mantiene la idea de señales ominosas o adivinatorias en español bíblico comprensible.
- source_word: δαίμοσι πλάνης
  english_pob_choice: demons of deception
  chosen_spanish: demonios de engaño
  alternatives_spanish:
  - espíritus de error
  - demonios engañadores
  lexicon: BDAG
  rationale: La construcción expresa demonios caracterizados por el engaño o que inducen al error; «demonios de engaño» conserva la aspereza del original.
- source_word: μουσικὰς καὶ δημοσίας
  english_pob_choice: musicians and public women
  chosen_spanish: músicas y mujeres públicas
  alternatives_spanish:
  - mujeres dedicadas al entretenimiento
  - prostitutas
  lexicon: LSJ
  rationale: La pareja griega sugiere hijas convertidas en mujeres dedicadas a entretenimiento público y explotación sexual. «Mujeres públicas» mantiene el sentido literal y la ambigüedad histórica sin introducir una equivalencia más fuerte de lo que el texto exige.
- source_word: ἐπιμιγήσεσθε
  english_pob_choice: you will mingle
  chosen_spanish: se mezclarán
  alternatives_spanish:
  - se unirán
  - se mezclarán ustedes mismos
  lexicon: BDAG
  rationale: El verbo expresa mezcla o interpenetración con realidades impuras; «se mezclarán» conserva la imagen sin restringirla innecesariamente a un solo matiz relacional.
- source_word: βδελύγμασιν ἐθνῶν
  english_pob_choice: the abominations of the nations
  chosen_spanish: las abominaciones de las naciones
  alternatives_spanish:
  - las prácticas detestables de las naciones
  - las abominaciones de los gentiles
  lexicon: BDAG
  rationale: La fórmula bíblica se mantiene casi literalmente para conservar su resonancia cultual y ética.
- source_word: ῥομφαίαν ἐκδικοῦσαν
  english_pob_choice: the avenging sword
  chosen_spanish: la espada vengadora
  alternatives_spanish:
  - la espada de venganza
  - la espada que ejecuta venganza
  lexicon: LSJ
  rationale: La combinación intensifica la espada como instrumento retributivo. «Espada vengadora» es compacta, solemne y fiel al valor del participio.
- source_word: ὀνειδισμούς
  english_pob_choice: reproaches
  chosen_spanish: los reproches
  alternatives_spanish:
  - las afrentas
  - los insultos
  lexicon: BDAG
  rationale: El término expresa deshonra pública y verbal; «reproches» conserva ese tono de vergüenza y censura sin rebajar la fuerza de la acusación.
- source_word: ἀλλοφύλοις / ἐν ἔθνεσι
  english_pob_choice: By foreigners ... will be brought to its end
  chosen_spanish: Por manos de extranjeros ... será llevado a su fin
  alternatives_spanish:
  - Por extranjeros ... llegará a su fin
  - Entre extranjeros ... acabará
  lexicon: LSJ
  rationale: El cierre comunica que el reino termina a causa de agentes foráneos. «Por manos de extranjeros» hace visible la mediación humana implícita en el pasivo y suena natural en español.
theological_decisions:
- issue: La apertura profética sobre la venida del Dios de la justicia
  english_pob_reading: A future advent of God that brings rest to Jacob and has an open scope toward the nations.
  chosen_spanish_reading: Se traduce como una venida futura de Dios que da descanso a Jacob en paz y se extiende a todas las naciones.
  alternative_spanish_readings:
  - hasta la presencia del Dios de la justicia
  - hasta la llegada del Dios justo
  rationale: El griego permite más de una lectura, pero la construcción con παρουσία favorece lenguaje de advenimiento. Se deja la amplitud del pasaje sin armonizarlo artificialmente con fórmulas posteriores.
  doctrine_reference: Preservar la tensión textual; no resolverla por anticipado.
- issue: Terminología de prácticas ocultistas
  english_pob_reading: Rendered concretely as 'ventriloquists and omens and demons of deception.'
  chosen_spanish_reading: 'Se mantienen términos concretos: «ventrílocuos», «agüeros» y «demonios de engaño».'
  alternative_spanish_readings:
  - mediums y presagios y espíritus de error
  - necrómantes y augurios y demonios engañadores
  rationale: El texto denuncia prácticas concretas prohibidas. Conservar los términos crudos preserva el perfil ético y religioso del original, aun cuando el español moderno requiera nota explicativa.
  doctrine_reference: Primacía del original sobre la domesticación traductora.
- issue: La espada y los juicios enumerados
  english_pob_reading: The POB recognizes textual uncertainty around some judgment details but keeps the avenging sword and siege language.
  chosen_spanish_reading: Se conserva «la espada vengadora» y «asedio» como parte del catálogo de juicio.
  alternative_spanish_readings:
  - espada de venganza
  - sitio
  rationale: Aunque el pasaje presenta oscilaciones textuales en algunos testigos, el castellano debe retener el cuadro de juicio tal como está atestiguado en el audit trail.
  doctrine_reference: Respetar la transmisión textual sin suavizarla.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del audit trail: se ajustó la construcción de παρουσία para reflejar mejor el infinitivo («para dar descanso»), se prefirió una equivalencia más literal para δημοσίας («mujeres públicas») y se mantuvo ῥομφαίαν ἐκδικοῦσαν como «la espada vengadora», junto con ὀνειδισμούς como «los reproches».'
  spanish_consistency_notes:
  - Se usa «Yahvé» en otros contextos del proyecto cuando corresponde; aquí el griego trae κύριος, por lo que se traduce «el Señor» según el propio flujo del testimonio griego y el audit trail en inglés.
  - Se mantiene «Dios de la justicia» como equivalente transparente de Θεοῦ τῆς δικαιοσύνης, evitando sustituirlo por una fórmula tradicional menos directa.
  - «Ventrílocuos» se conserva por fidelidad al término griego concreto; la nota aclara el valor cultural antiguo.
  - «Mujeres públicas» se deja deliberadamente abierto, porque el audit trail inglés reconoce una posible referencia a prostitutas pero también una lectura más literal de mujeres expuestas públicamente.
  - «La espada vengadora» y «los reproches» siguen la revisión final del inglés auditado, para mantener precisión léxica y el tono de juicio del pasaje.
