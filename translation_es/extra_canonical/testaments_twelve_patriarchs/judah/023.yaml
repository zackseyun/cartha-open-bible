base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/023.yaml
  text: 'Until the coming of the God of righteousness[a], to give Jacob rest in peace, and all the nations. And he will preserve the might of my kingdom forever; for the Lord swore to me with an oath not to blot out the kingdom.


    Great indeed is my grief, my children, because of the acts of sexual immorality and sorceries that you will practice in the kingdom, following ventriloquists and omens and demons of deception. You will make your daughters musicians and public women, and you will mingle in the abominations of the nations. Because of these things the Lord will bring upon you famine and pestilence, death and the avenging sword, siege, and the reproaches of enemies and friends[d][c][b]. By foreigners my kingdom will be brought to its end.'
  footnotes:
  - marker: a
    text: Or 'presence' instead of 'coming' for παρουσία; the context, however, favors an awaited advent.
    reason: lexical_alternative
  - marker: b
    text: '''Ventriloquists'' translates the literal Greek term for ''belly-speakers,'' used for spirit-mediums or necromantic practitioners.'
    reason: cultural_note
  - marker: c
    text: The Greek phrase 'musicians and public women' likely refers to daughters made into entertainers and prostitutes.
    reason: lexical_alternative
  - marker: d
    text: Several judgment details in this verse are textually uncertain or expanded in some witnesses, including phrases about an avenging sword and siege.
    reason: textual_variant
