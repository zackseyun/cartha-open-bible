  text: XXIII. Πολλὴν¹ δὲ λύπη μοί ἐστι, τέκνα μου², διὰ τὰς ἀσελγείας⁴ καὶ γοητείας ἃς ποιήσετε⁵ εἰς τὸ βασίλειον⁶, ἐγγαστρομύθους⁷ ἐξακολουθοῦντες⁸ καὶ κληδόσι⁹ καὶ δαίμοσιν¹⁰ πλάνης¹¹. 2. Τὰς θυγατέρας ὑμῶν μουσικὰς καὶ δημοσίας¹² ποιήσετε¹³, *καὶ ἐπιμιγήσεσθε¹⁴ ἐν βδελύγμασι ἐθνῶν. 3. Ἀνθ᾽ ὧν ἐπάξει²⁵ Κύριος ἐφ᾽ ὑμᾶς²⁶ λιμὸν καὶ λοιμόν¹⁹, θάνατον καὶ ῥομφαίαν, ἐκδικοῦσαν²⁰, πολιορκίαν, καὶ κύνας εἰς διασπασμόν²⁰, καὶ ἐχθρῶν ὀνειδισμοὺς²², καὶ ἀπώλειαν²² ἐχθρῶν, καὶ²⁴ σφακελισμὸν *ὀφθαλμῶν²⁴, καὶ νηπίων ἀναιρέσεις²⁵, *ὑπαρχόντων ἁρπαγὴν²⁶, ναῶν θεοῦ ἐμπρησμόν²⁹, γῆς ἐρήμωσιν²⁹, ὑμῶν δὲ αὐτῶν³⁰ δουλείαν ἐν ἔθνεσι. 4. Καὶ ἐκτεμοῦσι³¹ τοὺς υἱοὺς³² ὑμῶν εἰς³³ εὐνούχους ταῖς γυναιξὶν³⁴ αὐτῶν. 5. Ἕως ἂν³⁵ ἐπισκέψηται κύριος ὑμῶν, *ἐν τελείᾳ καρδίᾳ³⁷ μεταμελήθητε καὶ πορευόμενοι³⁸ ἐν πάσαις ταῖς ἐντολαῖς αὐτοῦ³⁹, καὶ⁴⁰ ἀναγάγῃ⁴⁰ ὑμᾶς ἐκ⁴¹ τῆς αἰχμαλωσίας *τῶν ἐθνῶν⁴².
