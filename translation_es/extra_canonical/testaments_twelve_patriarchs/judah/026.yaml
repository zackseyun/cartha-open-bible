translation:
  language: es
  text: 'Por tanto, guarden, hijos míos, toda la ley de Yahvé, porque es esperanza para todos los que enderezan sus caminos en justicia. Y entiérrenme cerca de mis padres.


    Y se durmió en buena vejez. Y sus hijos hicieron conforme a todo lo que les había mandado, y lo llevaron a Hebrón y lo sepultaron allí con sus padres.


    Y si andan en santidad conforme a todos los mandamientos de Yahvé, volverán a habitar con seguridad conmigo[a], y todo Israel será reunido a Yahvé para siempre.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Se durmió'' es un eufemismo convencional antiguo para la muerte, conservado aquí para mantener el registro testamentario.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Φυλάξατε
  english_pob_choice: keep
  chosen_spanish: guarden
  alternatives_spanish:
  - conserven
  - observen
  lexicon: LSJ
  rationale: En un mandato exhortativo sobre la ley, 'guardar' expresa bien la idea de observar fielmente y mantener en práctica; evita el calco duro y conserva el tono testamentario.
- source_word: τέκνα μου
  english_pob_choice: my children
  chosen_spanish: hijos míos
  alternatives_spanish:
  - mis hijos
  - hijos míos y descendientes
  lexicon: LSJ
  rationale: '''Hijos míos'' suena natural en español bíblico y mantiene el tono de dirección paterna del texto, sin limitar innecesariamente a hijos biológicos.'
- source_word: πάντα τὸν νόμον Κυρίου
  english_pob_choice: the whole law of the Lord
  chosen_spanish: toda la ley de Yahvé
  alternatives_spanish:
  - toda la ley del Señor
  - toda la ley del Dios
  lexicon: LSJ
  rationale: El griego lleva el nombre divino implícito en κύριος; el proyecto POB pide 'Yahvé' cuando el trasfondo es el nombre divino. 'Toda la ley' mantiene la totalidad exhortativa del sintagma.
- source_word: ἐλπίς
  english_pob_choice: hope
  chosen_spanish: esperanza
  alternatives_spanish:
  - confianza
  - expectativa
  lexicon: LSJ
  rationale: '''Esperanza'' reproduce de forma directa la fuerza teológica y parenética del sustantivo.'
- source_word: τὰς ὁδοὺς αὐτοῦ
  english_pob_choice: his ways
  chosen_spanish: sus caminos
  alternatives_spanish:
  - sus sendas
  - sus vías
  lexicon: LSJ
  rationale: '''Caminos'' es la equivalencia bíblica natural en español para ὁδοί, y mantiene la imagen de conducta y dirección moral.'
- source_word: κατευθύνουσι
  english_pob_choice: who keep/make straight ways in righteousness
  chosen_spanish: enderezan
  alternatives_spanish:
  - dirigen rectamente
  - encaminan rectamente
  lexicon: LSJ
  rationale: El verbo griego sugiere enderezar/dirigir rectamente; 'enderezan sus caminos' conserva la metáfora sin apartarse del sentido.
- source_word: ἐκοιμήθη
  english_pob_choice: fell asleep
  chosen_spanish: se durmió
  alternatives_spanish:
  - murió
  - falleció
  lexicon: LSJ
  rationale: Se conserva el eufemismo testamentario de la muerte. En español, 'se durmió' reproduce con naturalidad la fórmula tradicional y la transparencia literaria.
- source_word: γήρᾳ καλῇ
  english_pob_choice: in a good old age
  chosen_spanish: en buena vejez
  alternatives_spanish:
  - en honrada vejez
  - a una buena edad
  lexicon: LSJ
  rationale: '''Buena vejez'' sigue de cerca la expresión del original y mantiene el registro elevado. ''En buena vejez'' es comprensible en español bíblico y no fuerza un giro más libre.'
- source_word: ἐν Χεβρὼν
  english_pob_choice: to Hebron / there
  chosen_spanish: en Hebrón
  alternatives_spanish:
  - a Hebrón
  - en la ciudad de Hebrón
  lexicon: LSJ
  rationale: Se conserva el topónimo sin expansión interpretativa. El contexto ya indica el traslado y entierro allí.
- source_word: ἐνετείλατο
  english_pob_choice: he had commanded them
  chosen_spanish: les había mandado
  alternatives_spanish:
  - les había ordenado
  - les había dado mandato
  lexicon: LSJ
  rationale: '''Mandado'' es natural en español y conserva la autoridad imperativa del verbo sin sobrecargar el estilo.'
- source_word: ἐτάφησαν / ἔθαψαν
  english_pob_choice: buried
  chosen_spanish: sepultaron
  alternatives_spanish:
  - enterraron
  - dieron sepultura
  lexicon: LSJ
  rationale: '''Sepultar'' mantiene un registro solemne y bíblico adecuado al relato patriarcal, con claridad en español.'
- source_word: ἁγιωσύνη
  english_pob_choice: holiness
  chosen_spanish: santidad
  alternatives_spanish:
  - holiness
  - santidad y consagración
  lexicon: LSJ
  rationale: '''Santidad'' es la forma usual y digna para el ámbito moral y religioso del pasaje.'
- source_word: ἐντολαί
  english_pob_choice: commandments
  chosen_spanish: mandamientos
  alternatives_spanish:
  - preceptos
  - órdenes
  lexicon: LSJ
  rationale: '''Mandamientos'' es la correspondencia bíblica más directa y conserva el tono covenantal de la exhortación.'
- source_word: συναχθήσεται
  english_pob_choice: will be gathered
  chosen_spanish: será reunido
  alternatives_spanish:
  - será congregado
  - será juntado
  lexicon: LSJ
  rationale: '''Ser reunido'' reproduce la pasiva del griego y mantiene el matiz de reunión escatológica sin añadir interpretación.'
theological_decisions:
- issue: Nombre divino en κύριος
  english_pob_reading: Rendered as 'the Lord' in English, with the covenantal frame intact.
  chosen_spanish_reading: Se traduce como 'Yahvé' en el cuerpo del texto.
  alternative_spanish_readings:
  - el Señor
  - el Señor Dios
  rationale: En este proyecto, el trasfondo del nombre divino no se mascara como un título genérico. Aunque el inglés POB usa 'the Lord' por su convención editorial, el español debe reflejar el nombre divino según la pauta del proyecto y el valor del contexto.
  doctrine_reference: DOCTRINE.md §§ Translation philosophy 1, 4
- issue: Tensión escatológica del cierre
  english_pob_reading: 'The closing line has an eschatological tone: obedience to the Lord''s commandments is linked with secure dwelling and Israel''s final gathering to the Lord forever.'
  chosen_spanish_reading: Se mantiene el vínculo entre obediencia, habitar con seguridad y reunión final de Israel a Yahvé para siempre.
  alternative_spanish_readings:
  - una lectura meramente moral sin cierre escatológico
  - una paráfrasis más explícita sobre el fin de los tiempos
  rationale: El texto final no es solo exhortación ética; sugiere una perspectiva de permanencia y reunión final. La traducción preserva ese alcance sin amplificarlo indebidamente.
  doctrine_reference: PHILOSOPHY.md transparency and source-anchoring principles
- issue: Eufemismo de muerte
  english_pob_reading: '''Fell asleep'' is a conventional ancient euphemism for death, preserved here to retain the testamentary register.'
  chosen_spanish_reading: '''Se durmió'' conserva el eufemismo de la muerte.'
  alternative_spanish_readings:
  - murió
  - falleció
  rationale: La fórmula mantiene el registro testamentario y la textura literaria del pasaje. Reemplazarla por 'murió' borraría una tensión lexical significativa del original.
  doctrine_reference: PHILOSOPHY.md transparency and source-anchoring principles
translation_notes:
  revision_awareness: El texto inglés auditado indica que no hubo cambios en la última revisión; por tanto, esta propuesta española sigue de cerca la lectura estable del pasaje sin introducir reajustes textuales ni reinterpretaciones nuevas.
  spanish_consistency_notes:
  - He usado 'Yahvé' de manera consistente para κύριος en el marco del nombre divino.
  - '''Se durmió'' mantiene la fórmula eufemística en paralelo con el inglés POB ''fell asleep''.'
  - '''Mandamientos'' y ''ley'' conservan el campo covenantal sin sustituirlo por vocabulario más genérico.'
  - '''Sepultaron'' y ''entonces se durmió'' sostienen un registro solemne y bíblico apto para un texto testamentario.'
