  text: 'Therefore keep[a], my children, the whole law of the Lord, for it is hope for all who keep his ways in righteousness. And bury me near my fathers.


    And he fell asleep in a good old age. And his sons did as he had commanded them, and they carried him up to Hebron and buried him there with his fathers.


    And if you walk in holiness according to all the commandments of the Lord, you will again dwell securely with me[b], and all Israel will be gathered to the Lord forever.'
  footnotes:
  - marker: a
    text: '''Fell asleep'' is a conventional ancient euphemism for death, preserved here to retain the testamentary register.'
    reason: lexical_alternative
  - marker: b
    text: 'The closing line has an eschatological tone: obedience to the Lord''s commandments is linked with secure dwelling and Israel''s final gathering to the Lord.'
    reason: cross_reference
