base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/001/006.yaml
  text: And when I had grown up, my father prayed for me, saying, ‘You shall be a king, prospering in all things.’
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:48Z'
    unchanged: false
    changes_summary: Changed ‘blessed me’ to ‘prayed for me’ to reflect ηὔξατό μοι / ἐπηύξατο more accurately. Removed the extra closing quotation mark for proper punctuation.
translation:
  language: es
  text: 'Y aconteció que, cuando llegué a ser adulto, mi padre oró por mí, diciendo: «Serás rey, prosperando en todo».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἡδρύνθην
  english_pob_choice: I had grown up
  chosen_spanish: llegué a ser adulto
  alternatives_spanish:
  - crecí
  - había crecido
  - alcancé la madurez
  lexicon: ἡδρύνθην
  rationale: El griego expresa haber alcanzado la edad adulta o madurez; en español, «llegué a ser adulto» transmite esa idea con naturalidad y sin forzar una imagen física o temporal innecesaria. Mantiene el sentido de transición de la niñez a la adultez que el inglés POB captó con «had grown up».
- source_word: ηὔξατό μοι
  english_pob_choice: my father prayed for me
  chosen_spanish: mi padre oró por mí
  alternatives_spanish:
  - mi padre rogó por mí
  - mi padre hizo oración por mí
  lexicon: ηὔξατο / εὔχομαι
  rationale: La revisión inglesa corrigió «blessed me» a «prayed for me» para reflejar el verbo de oración en el griego. En español, «oró por mí» preserva con precisión el acto de intercesión y evita convertirlo en una mera bendición general.
- source_word: Βασιλεὺς ἔσῃ
  english_pob_choice: You shall be a king
  chosen_spanish: Serás rey
  alternatives_spanish:
  - serás un rey
  - llegarás a ser rey
  lexicon: βασιλεύς
  rationale: «Serás rey» reproduce de forma directa el predicado nominal del griego y el tono profético del inglés POB. No se añade artículo porque en español la forma sin artículo suena natural y conserva la fuerza enunciativa.
- source_word: κατευοδούμενος ἐν πᾶσιν
  english_pob_choice: prospering in all things
  chosen_spanish: prosperando en todo
  alternatives_spanish:
  - teniendo éxito en todo
  - siendo prosperado en todo
  - y te irá bien en todo
  lexicon: κατευοδόω
  rationale: El verbo griego denota tener buen camino, prosperar o ir bien. «Prosperando en todo» sigue el valor semántico del inglés POB y mantiene el participio presente con un español fluido y bíblicamente reconocible, sin reducirlo a simple éxito material.
theological_decisions:
- issue: 'Naturaleza de la acción del padre: oración vs. bendición'
  english_pob_reading: The revised English text reads ‘my father prayed for me,’ rejecting the earlier ‘blessed me.’
  chosen_spanish_reading: mi padre oró por mí
  alternative_spanish_readings:
  - mi padre me bendijo
  - mi padre invocó una bendición sobre mí
  rationale: El testimonio textual del griego favorece el sentido de oración/intercesión, no una bendición genérica. La redacción española sigue la revisión inglesa y evita borrar esa tensión lexicográfica.
  doctrine_reference: Lexical precision in prayer/blessing language; no doctrinal claim beyond the verb choice
- issue: Promesa real y prosperidad
  english_pob_reading: ‘You shall be a king, prospering in all things.’
  chosen_spanish_reading: Serás rey, prosperando en todo
  alternative_spanish_readings:
  - serás rey y prosperarás en todo
  - serás rey, y te irá bien en todo
  rationale: El texto presenta una promesa personal y dinástica sin desarrollarla teológicamente. «Prosperando en todo» conserva la relación entre realeza y éxito favorable, sin introducir connotaciones modernas de prosperidad material ajenas al contexto.
  doctrine_reference: Royal promise / providential success in ancient testamentary literature
translation_notes:
  revision_awareness: La revisión inglesa reciente cambió ‘blessed me’ por ‘prayed for me’ para ajustarse mejor a ηὔξατό μοι / ἐπηύξατο; la versión española adopta ese mismo ajuste y conserva el resto del sentido con una estructura natural en español.
  spanish_consistency_notes:
  - Se usa «oró por mí» para reflejar la intercesión explícita del griego y de la revisión inglesa.
  - «Serás rey» mantiene el registro profético breve del original.
  - «Prosperando en todo» conserva el participio con un tono bíblico natural en español.
  - No se emplean términos eclesiásticos tradicionales innecesarios que desplacen el matiz del texto fuente.
