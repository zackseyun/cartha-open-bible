translation:
  language: es
  text: '«Escuchad, hijos míos, a Judá, vuestro padre. Yo fui el cuarto hijo que nació a mi padre Jacob, y Lea, mi madre, me llamó Judá, diciendo: “Doy gracias[a] al Señor, porque me ha dado también un cuarto hijo”.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Doy gracias» traduce aquí un verbo griego que puede incluir también la idea de alabar; la redacción conserva el matiz agradecido y el de reconocimiento.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀκούσατε
  english_pob_choice: Hear
  chosen_spanish: Escuchad
  alternatives_spanish:
  - Oíd
  - Escuchen
  lexicon: ἀκούω
  rationale: El imperativo plural pide una forma directa y solemne. «Escuchad» conserva el tono exhortativo y la apelación oral del original mejor que un simple «oíd» en español moderno.
- source_word: τέκνα μου
  english_pob_choice: my children
  chosen_spanish: hijos míos
  alternatives_spanish:
  - mis hijos
  - mis niños
  lexicon: τέκνον
  rationale: «Hijos míos» es natural en español bíblico y mantiene la relación paternal sin infantilizar con «niños».
- source_word: Ἰούδα τοῦ πατρὸς ὑμῶν
  english_pob_choice: Judah your father
  chosen_spanish: a Judá, vuestro padre
  alternatives_spanish:
  - a Judá, su padre
  - Judá, su padre
  lexicon: Ἰούδας
  rationale: La estructura española más clara para el llamado vocativo es «a Judá, vuestro padre». Conserva el sentido de apelación directa y evita una aposición ambigua.
- source_word: ἐγὼ τέταρτος υἱὸς ἐγενόμην
  english_pob_choice: I was born the fourth son
  chosen_spanish: Yo fui el cuarto hijo que nació
  alternatives_spanish:
  - Yo llegué a ser el cuarto hijo
  - Yo nací como el cuarto hijo
  lexicon: γίνομαι / υἱός
  rationale: La POB inglesa resuelve el giro como nacimiento en cuarto lugar. En español, «fui el cuarto hijo que nació» comunica esa relación de prioridad de nacimiento sin forzar una pasiva extraña.
- source_word: τῷ πατρί μου Ἰακώβ
  english_pob_choice: to my father Jacob
  chosen_spanish: a mi padre Jacob
  alternatives_spanish:
  - de mi padre Jacob
  - para mi padre Jacob
  lexicon: πατήρ
  rationale: La dativa con sentido relacional se vierte naturalmente con «a mi padre Jacob», manteniendo la filiación explícita.
- source_word: Λεία ἡ μήτηρ μου
  english_pob_choice: Leah my mother
  chosen_spanish: Lea, mi madre
  alternatives_spanish:
  - Lea, la que me dio a luz
  - Lea, mi madre
  lexicon: Λεία / μήτηρ
  rationale: Se conserva la identificación apposicional sin añadir interpretación. El orden español «Lea, mi madre» suena natural y fiel.
- source_word: ἐπωνόμασέν με Ἰούδαν
  english_pob_choice: named me Judah
  chosen_spanish: me llamó Judá
  alternatives_spanish:
  - me puso por nombre Judá
  - me nombró Judá
  lexicon: ἐπωνομάζω
  rationale: «Me llamó Judá» reproduce el uso bíblico habitual de dar nombre y preserva la tersura del relato.
- source_word: Ἀνθομολογοῦμαι τῷ Κυρίῳ
  english_pob_choice: I give praise to the Lord
  chosen_spanish: Doy gracias al Señor
  alternatives_spanish:
  - Alabo al Señor
  - Confieso al Señor
  lexicon: ἀνθομολογέομαι
  rationale: El verbo griego admite un matiz de agradecimiento/praise. La POB inglesa eligió «give praise», y en español «Doy gracias» conserva bien el acto de reconocimiento agradecido sin perder la dimensión de alabanza.
- source_word: τῷ Κυρίῳ
  english_pob_choice: the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - a Yahvé
  - al Señor
  lexicon: κύριος
  rationale: Aunque el proyecto suele usar «Yahvé» para el nombre divino, aquí la fuente griega cita la fórmula de la madre de Judá con κύριος y la POB inglesa ya fijó «the Lord» como formulación litúrgica de esta cita. Se conserva «Señor» por esa razón contextual y por tratarse de una expresión formulaica integrada en la frase de agradecimiento.
- source_word: ἔδωκέν μοι καὶ τέταρτον υἱόν
  english_pob_choice: he has given me also a fourth son
  chosen_spanish: me ha dado también un cuarto hijo
  alternatives_spanish:
  - me ha concedido también un cuarto hijo
  - también me ha dado un cuarto hijo
  lexicon: δίδωμι / υἱός
  rationale: «Me ha dado también un cuarto hijo» reproduce la referencia numérica y el orden del original. «Hijo» se mantiene para congruencia con el contexto de filiación.
theological_decisions:
- issue: Tratamiento del nombre divino en la cita de alabanza
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  rationale: En esta cláusula, la fuente es una cita de alabanza formulada con κύριος y la tradición auditada en inglés la mantiene como «the Lord». Para no alterar la forma cita-litúrgica del texto, se conserva «Señor» en lugar de normalizarlo a «Yahvé».
  doctrine_reference: Uso reverente del nombre divino en citas bíblicas; distinción entre nombre propio y título en contexto narrativo.
- issue: Valor de ἀνθομολογοῦμαι en la boca de Lea
  english_pob_reading: I give praise
  chosen_spanish_reading: Doy gracias
  alternative_spanish_readings:
  - Alabo
  - Confieso
  rationale: El verbo puede abarcar alabanza y acción de gracias. La opción española mantiene ese agradecimiento gozoso sin convertir la frase en una confesión doctrinal ajena al contexto natalicio.
  doctrine_reference: Acción de gracias y alabanza como respuesta a la providencia de Dios.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requieren cambios en el texto fuente en inglés; por eso la versión española sigue de cerca la lectura auditada y solo resuelve la cita divina y el matiz de ἀνθομολογοῦμαι en español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término por defecto del proyecto, pero aquí se conserva «Señor» por fidelidad a la fórmula de cita heredada por la POB en inglés.
  - Se usa «Judá» para el nombre propio y no se introduce «Judas», que sería confuso y no corresponde al griego Ἰούδας en este contexto.
  - «Hijo»/«hijos» se preservan para reflejar el vocabulario filial del pasaje y evitar una expansión interpretativa.
  - La puntuación con comillas inglesas dobles internas se adapta a la convención española con comillas angulares y comillas dobles secundarias solo en la transcripción de la cita directa.
