lexical_decisions:
- source_word: Συναχθέντες
  english_pob_choice: So they gathered
  chosen_spanish: Entonces se reunieron
  alternatives_spanish:
  - Así que se juntaron
  - Por tanto, se congregaron
  lexicon: συνάγω
  rationale: El participio aoristo pasivo indica una acción de reunirse; en español, «se reunieron» comunica bien el sentido sin forzar una forma más literal que suene dura. «Congregaron» sería posible, pero en este contexto narrativo «reunieron» es más natural y sigue la fuerza del griego.
- source_word: ἦλθον πρὸς αὐτόν
  english_pob_choice: and came to him
  chosen_spanish: y vinieron a él
  alternatives_spanish:
  - y fueron a él
  - y se acercaron a él
  lexicon: ἔρχομαι + πρός
  rationale: «Vinieron a él» refleja directamente el movimiento hacia la persona mencionada. «Fueron a él» también sería válido, pero «vinieron» mantiene mejor la proximidad semántica del griego y la cadencia de la frase inglesa auditada.
- source_word: εἶπεν αὐτοῖς
  english_pob_choice: and he said to them
  chosen_spanish: 'y él les dijo:'
  alternatives_spanish:
  - 'y les dijo:'
  - 'y él habló con ellos:'
  lexicon: λέγω
  rationale: La fórmula narrativa simple del griego se conserva con «les dijo». Se mantiene «él» para reflejar la referencia explícita del sujeto en la cadena narrativa y para seguir de cerca el orden del original sin cargar el español.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios; el texto español sigue de cerca la lectura aprobada del griego y la equivalencia óptima del inglés POB, sin introducir expansiones ni matices no sustentados por la fuente.
  spanish_consistency_notes:
  - Se conserva un español sobrio y narrativo, adecuado para una edición bíblica pública.
  - No se añadieron notas porque el griego y el audit trail inglés no presentan variantes textuales ni tensiones léxicas que requieran aclaración en este versículo.
