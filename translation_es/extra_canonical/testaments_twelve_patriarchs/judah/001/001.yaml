translation:
  language: es
  text: 'El Testamento de Judá, el cuarto hijo de Jacob y Lea.


    Una copia de las palabras de Judá, que habló a sus hijos antes de morir.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Διαθήκη
  english_pob_choice: Testament
  chosen_spanish: Testamento
  alternatives_spanish:
  - Pacto
  - Alianza
  lexicon: διαθήκη
  rationale: El inglés POB conserva «Testament» como título tradicional del escrito. En español, «Testamento» reproduce ese valor de género literario y título de obra mejor que «Pacto» o «Alianza», que sonarían interpretativos y desplazarían el encabezado del documento.
- source_word: Ἰούδα
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - Judas
  lexicon: Ἰούδας
  rationale: El referente es el patriarca bíblico hijo de Jacob, por lo que en español corresponde «Judá» y no «Judas», que identificaría a otra figura.
- source_word: τοῦ τετάρτου υἱοῦ
  english_pob_choice: the fourth son
  chosen_spanish: el cuarto hijo
  alternatives_spanish:
  - el hijo cuarto
  lexicon: τέταρτος
  rationale: «El cuarto hijo» es la forma natural y fiel en español para el orden de nacimiento.
- source_word: Ἀντίγραφον
  english_pob_choice: A copy
  chosen_spanish: Una copia
  alternatives_spanish:
  - Un duplicado
  - Una transcripción
  lexicon: ἀντίγραφον
  rationale: El término griego indica una reproducción o copia del texto. «Una copia» es la equivalencia más directa y sobria en español, sin añadir matices técnicos innecesarios.
- source_word: λόγων
  english_pob_choice: words
  chosen_spanish: palabras
  alternatives_spanish:
  - dichos
  - discursos
  lexicon: λόγος
  rationale: En este encabezado, el plural denota las palabras pronunciadas por Judá. «Palabras» conserva la sencillez del inglés POB y el alcance amplio del griego.
- source_word: ἐλάλησε
  english_pob_choice: he spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  - pronunció
  lexicon: λαλέω
  rationale: «Habló» refleja bien el acto de discurso continuo o general del verbo griego y mantiene la naturalidad en español.
- source_word: τοῖς υἱοῖς αὐτοῦ
  english_pob_choice: to his sons
  chosen_spanish: a sus hijos
  alternatives_spanish:
  - a sus hijos varones
  lexicon: υἱός
  rationale: Aunque literalmente «hijos» puede ser inclusivo, aquí el griego especifica varones por el contexto patriarcal. El español puede mantener «hijos», que es claro y idiomático, sin sobrecargar la frase.
- source_word: πρὸ τοῦ ἀποθανεῖν αὐτόν
  english_pob_choice: before he died
  chosen_spanish: antes de morir
  alternatives_spanish:
  - antes de que muriera
  - antes de su muerte
  lexicon: ἀποθνῄσκω
  rationale: «Antes de morir» conserva el sentido temporal con máxima naturalidad. No se explicita sujeto en español porque el contexto ya lo establece.
theological_decisions:
- issue: 'Identidad del título: «Testamento» como encabezado de una obra pseudepigráfica, no como sacramento ni como mera última voluntad legal.'
  english_pob_reading: The Testament of Judah
  chosen_spanish_reading: El Testamento de Judá
  alternative_spanish_readings:
  - La Alianza de Judá
  - El Pacto de Judá
  rationale: El texto designa una obra literaria antigua cuyo título tradicional es «Testament». Traducirlo como «Alianza» o «Pacto» introduciría una lectura teológica ajena al género del encabezado.
  doctrine_reference: Género literario y titulación histórica del documento; no implica una doctrina específica.
translation_notes:
  revision_awareness: La versión inglesa POB permanece sin cambios en el pasaje base, y el control cruzado reporta alta concordancia (0.97). Por ello, la traducción española sigue de cerca el sentido del texto fuente griego y la solución titulativa del POB inglés, sin introducir notas textuales adicionales.
  spanish_consistency_notes:
  - Se mantiene «Judá» para el patriarca y «Testamento» como título de la obra.
  - Se usa un español sobrio y legible, evitando arcaísmos innecesarios.
  - No se añaden notas porque el pasaje no presenta variantes relevantes en el audit trail proporcionado.
