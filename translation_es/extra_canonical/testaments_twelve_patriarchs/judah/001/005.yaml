translation:
  language: es
  text: Y honraba a mi madre y a la hermana de mi madre.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐτίμων
  english_pob_choice: honored
  chosen_spanish: honraba
  alternatives_spanish:
  - honré
  - honraba
  lexicon: τιμάω
  rationale: El imperfecto griego expresa acción habitual o continua en pasado; por eso uso «honraba» y no un perfecto puntual. Mantiene el valor de respeto/estima que el inglés POB da con «honored».
- source_word: τὴν μητέρα μου
  english_pob_choice: my mother
  chosen_spanish: mi madre
  alternatives_spanish:
  - a mi madre
  - mi madre
  lexicon: μήτηρ
  rationale: «Mi madre» reproduce con naturalidad el objeto directo en español, y el posesivo conserva la relación personal del original.
- source_word: τὴν ἀδελφὴν τῆς μητρός μου
  english_pob_choice: my mother’s sister
  chosen_spanish: la hermana de mi madre
  alternatives_spanish:
  - mi tía materna
  - la hermana de mi madre
  lexicon: ἀδελφή
  rationale: El griego dice literalmente «la hermana de mi madre». Aunque «tía materna» sería idiomático, la forma más transparente y auditable conserva la relación de parentesco del texto fuente.
theological_decisions:
- issue: Ninguna tensión doctrinal o terminológica especial; solo una relación de parentesco y un acto de honra familiar.
  english_pob_reading: And I honored my mother and my mother’s sister.
  chosen_spanish_reading: Y honraba a mi madre y a la hermana de mi madre.
  alternative_spanish_readings:
  - Y honré a mi madre y a la hermana de mi madre.
  - Y honraba a mi madre y a mi tía materna.
  rationale: No hay un tema doctrinal que requiera interpretación adicional. La decisión principal es mantener el aspecto imperfectivo del griego y la relación familiar explícita del segundo miembro.
  doctrine_reference: No aplica
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; el texto español sigue de cerca el griego con equivalencia óptima y no introduce notas ni divergencias no documentadas.
  spanish_consistency_notes:
  - Se conserva un estilo sobrio y publicable, con vocabulario transparente y sin sustituciones eclesiásticas innecesarias.
  - Se mantiene la distinción entre traducción literal del parentesco («la hermana de mi madre») y una posible equivalencia idiomática («tía materna»), optando por la forma auditables del fuente.
