translation:
  language: es
  text: Yo era agudo en mi juventud, y obedecía a mi padre en todo asunto.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὀξὺς
  english_pob_choice: keen
  chosen_spanish: agudo
  alternatives_spanish:
  - vivo
  - perspicaz
  - agudo de ingenio
  lexicon: ὀξύς
  rationale: El griego describe agudeza o viveza de mente/temperamento; «agudo» conserva esa fuerza sin forzar una especificación que el contexto inmediato no exige. «Keen» en inglés también apunta a esa viveza, no solo a entusiasmo.
- source_word: νεότητί
  english_pob_choice: my youth
  chosen_spanish: mi juventud
  alternatives_spanish:
  - mis años jóvenes
  - mi mocedad
  lexicon: νεότης
  rationale: «Juventud» es la equivalencia natural y digna en español para el período de la vida señalado por el griego.
- source_word: ὑπήκουον
  english_pob_choice: I obeyed
  chosen_spanish: obedecía
  alternatives_spanish:
  - obedecí
  - escuchaba
  lexicon: ὑπακούω
  rationale: El imperfecto griego sugiere una disposición o hábito continuado; por eso «obedecía» comunica mejor la acción habitual que un simple pasado puntual.
- source_word: τῷ πατρί μου
  english_pob_choice: my father
  chosen_spanish: a mi padre
  alternatives_spanish:
  - a mi padre mío
  lexicon: πατήρ
  rationale: El dativo con ὑπακούω se expresa naturalmente en español con «a». Se conserva la relación filial explícita del texto.
- source_word: κατὰ πάντα λόγον
  english_pob_choice: in every matter
  chosen_spanish: en todo asunto
  alternatives_spanish:
  - en toda palabra
  - en todo mandato
  - en cada asunto
  lexicon: λόγος
  rationale: La frase puede abarcar «palabra», «asunto» o «mandato»; «en todo asunto» mantiene amplitud semántica y evita restringir indebidamente λόγος a una sola esfera. La elección sigue la intención inclusiva de la versión inglesa.
theological_decisions:
- issue: Autodescripción moral de obediencia filial
  english_pob_reading: I obeyed my father in every matter.
  chosen_spanish_reading: obedecía a mi padre en todo asunto
  alternative_spanish_readings:
  - obedecí a mi padre en todo asunto
  - era obediente a mi padre en todo asunto
  rationale: No se introduce una afirmación doctrinal añadida; se preserva el tono testimonial del texto. El imperfecto mantiene la cualidad habitual de la obediencia sin exagerarla como evento único.
  doctrine_reference: ética filial / testimonio narrativo
translation_notes:
  revision_awareness: 'La versión inglesa POB vigente dice: “I was keen in my youth, and I obeyed my father in every matter.” No hay notas ni revisiones aplicadas; la presente propuesta sigue de cerca el sentido del griego y conserva el matiz habitual del imperfecto en ὑπήκουον.'
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y bíblico en español.
  - Se evita «SEÑOR» porque el verso no contiene el tetragrámaton ni κύριος con función divina.
  - Se traduce λόγος de forma amplia como «asunto» para no estrechar el alcance del griego.
