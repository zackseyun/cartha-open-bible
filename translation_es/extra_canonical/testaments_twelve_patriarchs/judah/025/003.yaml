translation:
  language: es
  text: Y serán el pueblo de Yahvé, y habrá una sola lengua, y allí no habrá espíritu de engaño de Belial[a], porque será arrojado al fuego para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Espíritu» conserva aquí el valor de entidad espiritual; el griego πνεῦμα no se limita a una mera actitud interior.
    reason: lexical_alternative
lexical_decisions:
- source_word: λαὸν Κυρίου
  english_pob_choice: the Lord’s people
  chosen_spanish: el pueblo de Yahvé
  alternatives_spanish:
  - el pueblo del Señor
  - el pueblo del Señor Dios
  lexicon: λαός; κύριος
  rationale: Traduzco λαὸν como «pueblo», y κύριος aquí como el nombre divino en el marco de este escrito judío, por lo que en español corresponde «Yahvé» según la pauta del proyecto. «El pueblo de Yahvé» conserva la relación de pertenencia sin introducir un título más genérico que oscurezca la referencia.
- source_word: γλῶσσα μία
  english_pob_choice: one language
  chosen_spanish: una sola lengua
  alternatives_spanish:
  - una lengua
  - un solo idioma
  lexicon: γλῶσσα
  rationale: γλῶσσα puede ser «lengua» o «idioma». Aquí el contraste apocalíptico/escatológico apunta a unidad lingüística; «una sola lengua» es natural en español y mantiene la imagen verbal del griego.
- source_word: πνεῦμα πλάνης
  english_pob_choice: a spirit of Belial’s deceit
  chosen_spanish: espíritu de engaño
  alternatives_spanish:
  - espíritu de error
  - espíritu de extravío
  - espíritu de engaño y error
  lexicon: πνεῦμα; πλάνης
  rationale: πνεῦμα conserva aquí el sentido de entidad espiritual, no de simple actitud. πλάνης puede ser «engaño», «error» o «extravio»; el texto griego vincula el espíritu con Belial, y la combinación «espíritu de engaño» reproduce con claridad la fuerza moral del sustantivo sin añadir un duplicado innecesario.
- source_word: τοῦ Βελιάρ
  english_pob_choice: Belial’s
  chosen_spanish: de Belial
  alternatives_spanish:
  - de Belial mismo
  - de Belial, el adversario
  lexicon: Βελιάρ
  rationale: Conservo el nombre propio «Belial» como en la tradición textual, sin sustituirlo por un equivalente interpretativo. El genitivo se expresa naturalmente en español con «de Belial».
- source_word: ἐμβληθήσεται εἰς τὸν αἰῶνα
  english_pob_choice: it will be thrown into the fire forever
  chosen_spanish: será arrojado al fuego para siempre
  alternatives_spanish:
  - será arrojado para siempre al fuego
  - será echado al fuego eternamente
  lexicon: ἐμβληθήσεται; αἰών
  rationale: El griego dice literalmente «será arrojado». La frase inglesa explicita «into the fire» a partir del contexto de juicio; en español mantengo esa explicitación para conservar el sentido escatológico. εἰς τὸν αἰῶνα se traduce «para siempre», una equivalencia idiomática natural y fiel.
theological_decisions:
- issue: Referencia de κύριος a Dios en un texto judío apocalíptico
  english_pob_reading: the Lord’s people
  chosen_spanish_reading: el pueblo de Yahvé
  alternative_spanish_readings:
  - el pueblo del Señor
  - el pueblo del Señor Dios
  rationale: Aunque el inglés usa «the Lord’s people», el contexto del testamento y la práctica editorial del proyecto favorecen nombrar directamente el nombre divino cuando κύριος funciona como equivalente reverencial del nombre de Dios. Esto evita el ocultamiento por máscara y mantiene la audibilidad del nombre en español.
  doctrine_reference: Nombre divino / tetragrámaton en traducción bíblica
- issue: Destino final del espíritu de engaño de Belial
  english_pob_reading: because it will be thrown into the fire forever
  chosen_spanish_reading: porque será arrojado al fuego para siempre
  alternative_spanish_readings:
  - porque será arrojado para siempre al fuego
  - porque será destruido para siempre
  rationale: No suavizo el enunciado escatológico ni lo convierto en una abstracción moral. El texto presenta una eliminación/juzgamiento final del espíritu de Belial; por ello mantengo la imagen de ser arrojado al fuego y la duración indefinida de «para siempre».
  doctrine_reference: Juicio escatológico y derrota de Belial
translation_notes:
  revision_awareness: La versión inglesa auditada se mantiene sin cambios sustanciales respecto del último pase; no se documentan revisiones adicionales que alteren el sentido base. La presente propuesta sigue el texto griego dado y la lectura inglesa aprobada, explicitando en español el nombre divino y la imagen final de juicio.
  spanish_consistency_notes:
  - Uso «Yahvé» para κύριος cuando el contexto remite al nombre divino, conforme al criterio del proyecto.
  - Conservo «Belial» como nombre propio y «espíritu» para πνεῦμα, sin reducirlo a una simple disposición moral.
  - Mantengo un estilo moderno y digno, con sintaxis natural en español y sin depender de fórmulas eclesiásticas tradicionales no justificadas por el texto.
