translation:
  language: es
  text: Y Yahvé bendijo a Leví, pero el ángel de la presencia me [a] bendijo; las potestades de gloria, a Simeón; el cielo, a Rubén; la tierra, a Isacar; el mar, a Zabulón; los montes, a José; la tienda, a Benjamín; las luminarias, a Dan; el deleite, a Neftalí; el sol, a Gad; la luna, a Aser.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse ''me bendijo'' como parte de la clausura de la primera cláusula: ''el ángel de la presencia me bendijo''.'
    reason: alternative_reading
lexical_decisions:
- source_word: Κύριος
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - el Señor Dios
  lexicon: YHWH
  rationale: El contexto de la serie de bendiciones tribales y la convención del proyecto favorecen el nombre divino explícito. En español, 'Yahvé' preserva la identidad del nombre donde el inglés POB usó 'Lord' como equivalente reverente.
- source_word: ἄγγελος τοῦ προσώπου
  english_pob_choice: the angel of the presence
  chosen_spanish: el ángel de la presencia
  alternatives_spanish:
  - el ángel del rostro
  - el ángel de su presencia
  lexicon: מַלְאַךְ פָּנִים / angel of the presence
  rationale: Se conserva la expresión técnica y su fuerza teológica sin suavizarla a una fórmula más explicativa. 'Presencia' comunica mejor que una paráfrasis en español iglesia-común.
- source_word: δυνάμεις τῆς δόξης
  english_pob_choice: the powers of glory
  chosen_spanish: las potestades de gloria
  alternatives_spanish:
  - las fuerzas de gloria
  - los poderes de gloria
  lexicon: δυνάμεις / powers
  rationale: '''Potestades'' mantiene un registro elevado y puede reflejar agentes o poderes celestiales con más precisión que ''fuerzas''. Se conserva el genitivo ''de gloria'' sin explicitar más allá del texto.'
- source_word: οὐρανός
  english_pob_choice: heaven
  chosen_spanish: el cielo
  alternatives_spanish:
  - el cielo/los cielos
  - el firmamento
  lexicon: οὐρανός
  rationale: En esta enumeración paralela con tierra, mar y astros, 'cielo' es el equivalente natural y claro en español, sin alterar la imaginería cósmica.
- source_word: θάλασσα
  english_pob_choice: the sea
  chosen_spanish: el mar
  alternatives_spanish:
  - la mar
  lexicon: θάλασσα
  rationale: '''Mar'' es la forma neutra y estándar en español bíblico contemporáneo.'
- source_word: φωστῆρες
  english_pob_choice: the lights
  chosen_spanish: las luminarias
  alternatives_spanish:
  - las luces
  - los astros
  lexicon: φωστήρ
  rationale: '''Luminarias'' conserva el tono bíblico y astronómico del término, evitando la ambigüedad de ''luces'' en español moderno.'
- source_word: τρυφή
  english_pob_choice: delight
  chosen_spanish: el deleite
  alternatives_spanish:
  - la delicia
  - el placer
  lexicon: τρυφή
  rationale: '''Deleite'' reproduce con naturalidad la idea de deleitación, manteniendo un registro digno y no meramente hedonista.'
- source_word: ἥλιος
  english_pob_choice: the sun
  chosen_spanish: el sol
  alternatives_spanish:
  - el astro rey
  lexicon: ἥλιος
  rationale: Equivalencia directa y transparente; no requiere tecnicismo adicional.
- source_word: σελήνη
  english_pob_choice: the moon
  chosen_spanish: la luna
  alternatives_spanish:
  - la luna llena
  lexicon: σελήνη
  rationale: Equivalencia directa y transparente.
theological_decisions:
- issue: Identidad del sujeto divino en Κύριος
  english_pob_reading: the Lord blessed Levi
  chosen_spanish_reading: Yahvé bendijo a Leví
  alternative_spanish_readings:
  - el Señor bendijo a Leví
  rationale: La pauta del proyecto pide 'Yahvé' para el nombre divino. Mantiene la referencia al Dios de Israel sin el enmascaramiento confesional de 'SEÑOR' y sin introducir una distinción no atestiguada aquí.
  doctrine_reference: Nombre divino tetragramatón / convención editorial POB
- issue: Serie de bendiciones cósmicas y su función
  english_pob_reading: the angel of the presence blessed me; the powers of glory, Simeon; heaven, Reuben; ...
  chosen_spanish_reading: el ángel de la presencia me bendijo; las potestades de gloria, a Simeón; el cielo, a Rubén; ...
  alternative_spanish_readings:
  - el ángel de la presencia me bendijo; las fuerzas de gloria, a Simeón; el cielo, a Rubén; ...
  rationale: Se mantiene la estructura elíptica del original y de la POB inglesa, donde cada elemento cósmico aparece como agente/atributo de bendición asociado a un patriarca. No se añade verbo repetido que no esté explícito en la cadena.
  doctrine_reference: Poética de bendición en literatura testamentaria / paralelismo enumerativo
translation_notes:
  revision_awareness: La revisión más reciente dejó el texto sin cambios; no se registran correcciones posteriores en el audit trail inglés, así que la traducción sigue de cerca la disposición y el valor enumerativo del griego y de la POB inglesa.
  spanish_consistency_notes:
  - Se mantiene 'Leví', 'Simeón', 'Rubén', 'Isacar', 'Zabulón', 'José', 'Benjamín', 'Dan', 'Neftalí', 'Gad' y 'Aser' con grafía española bíblica habitual.
  - Se conserva la secuencia nominal con coma y punto y coma para reflejar la enumeración del original.
  - Se usa 'Yahvé' de manera consistente con la política del proyecto para Κύριος cuando refiere al nombre divino.
