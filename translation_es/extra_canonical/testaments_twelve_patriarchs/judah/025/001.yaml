source:
  edition: Charles 1908 Greek Versions (Judah source-fix v2 — T12P Pass A; α-column primary, apparatus stripped)
  text: XXV. Καὶ¹ μετὰ ταῦτα *ἀναστήσεται Ἀβραὰμ καὶ Ἰσαὰκ καὶ Ἰακὼβ εἰς ζωήν², *καὶ ἐγὼ καὶ οἱ ἀδελφοί μου ἔξαρχοι³ *ἐν Ἰσραὴλ ἐσόμεθα⁵, πρῶτος Λευί⁶, δεύτερος ἐγώ⁷, τρίτος Ἰωσήφ⁸, τέταρτος Βενιαμίν⁹, *πέμπτος Συμεών, ἕκτος Ἰσαχάρ¹⁰, καὶ¹² *πάντες καθεξῆς¹¹.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/025/001.yaml
  text: 'And after these things Abraham and Isaac and Jacob will rise to life, and I and my brothers will be rulers of scepters in Israel: Levi first, I second, Joseph third, Benjamin fourth, Simeon fifth, Issachar sixth, and thus all the rest in order.'
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:56:29Z'
    unchanged: false
    changes_summary: Changed 'chiefs of the tribes' to 'rulers of scepters' to more closely reflect ἔξαρχοι σκήπτρων and avoid supplying 'tribes,' which is not in the Greek. Also adjusted 'so' to 'thus' for a slightly more formal register.
translation:
  language: es
  text: 'Y después de estas cosas Abraham, Isaac y Jacob resucitarán para vida, y yo y mis hermanos seremos gobernantes de cetros en Israel: Leví primero, yo segundo, José tercero, Benjamín cuarto, Simeón quinto, Isacar sexto, y así todos los demás en orden.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀναστήσεται ... εἰς ζωήν
  english_pob_choice: will rise to life
  chosen_spanish: resucitarán para vida
  alternatives_spanish:
  - volverán a la vida
  - se levantarán para vida
  lexicon: ἀνίστημι / ζωή
  rationale: «Resucitarán» expresa bien el verbo de levantarse a vida en contexto escatológico; «para vida» conserva el complemento de resultado sin imponer una explicación adicional.
- source_word: ἔξαρχοι σκήπτρων
  english_pob_choice: rulers of scepters
  chosen_spanish: gobernantes de cetros
  alternatives_spanish:
  - ruleres de cetros
  - cabezas con cetro
  - príncipes con cetros
  lexicon: ἔξαρχος / σκῆπτρον
  rationale: Mantiene la imagen concreta de «cetros» y evita suplir «tribus», como en la revisión inglesa. «Gobernantes» comunica la función sin borrar la metáfora regia.
- source_word: ἐν Ἰσραὴλ
  english_pob_choice: in Israel
  chosen_spanish: en Israel
  alternatives_spanish:
  - entre Israel
  - sobre Israel
  lexicon: Ἰσραήλ
  rationale: La preposición simple «en» reproduce la localización/ámbito del griego y coincide con el inglés auditado.
- source_word: πάντες καθεξῆς
  english_pob_choice: all the rest in order
  chosen_spanish: todos los demás en orden
  alternatives_spanish:
  - todos los que siguen en orden
  - y todos los restantes, sucesivamente
  lexicon: καθεξῆς
  rationale: «En orden» conserva la secuencia enumerativa y el adverbio de sucesión sin sobreexplicar.
theological_decisions:
- issue: Resurrección patriarcal al final de la era
  english_pob_reading: Abraham and Isaac and Jacob will rise to life
  chosen_spanish_reading: Abraham, Isaac y Jacob resucitarán para vida
  alternative_spanish_readings:
  - volverán a la vida
  - despertarán a la vida
  rationale: El texto presenta una resurrección de los patriarcas; «resucitarán» es la forma española más directa para esa afirmación sin atenuarla.
  doctrine_reference: Resurrección de los muertos / esperanza escatológica
- issue: 'Título funcional de autoridad: ἔξαρχοι σκήπτρων'
  english_pob_reading: rulers of scepters
  chosen_spanish_reading: gobernantes de cetros
  alternative_spanish_readings:
  - príncipes con cetros
  - jefes con cetro
  rationale: Se preserva la tensión de la imagen regia en vez de convertirla en un título eclesiástico o tribal no presente en el griego.
  doctrine_reference: Autoridad mesiánica y regalía simbólica
translation_notes:
  revision_awareness: Seguí la revisión inglesa más reciente al evitar suplir «tribus» para ἔξαρχοι σκήπτρων y al conservar la formulación más literal de la secuencia enumerativa. También mantuve el registro formal de «y así» mediante «y así».
  spanish_consistency_notes:
  - Usé «Yahvé» solo cuando aparece el nombre divino, lo cual no ocurre en este versículo.
  - Preferí «resucitarán» por la fuerza escatológica del contexto y «gobernantes de cetros» para reflejar la imagen real sin añadir contenido ausente.
  - 'Conservé la secuencia ordinal en español de modo claro y natural: primero, segundo, tercero, cuarto, quinto, sexto.'
