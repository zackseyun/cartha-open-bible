source:
  edition: Charles 1908 Greek Versions (Judah source-fix v2 — T12P Pass A; α-column primary, apparatus stripped)
  text: '*Καὶ οἱ ἔλαφοι⁴⁸ Ἰακὼβ⁴⁹ δραμοῦνται ἐν ἀγαλλιάσει⁴⁹, καὶ ἀετοὶ Ἰσραὴλ⁴⁹ πετασθήσονται ἐν χαρᾷ· [οἱ δὲ ἀσεβεῖς πενθήσουσι καὶ οἱ ἁμαρτωλοὶ κλαύσονται]⁵¹, καὶ πάντες οἱ λαοὶ δοξάσουσι Κύριον εἰς αἰῶνας⁵².'
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/025/005.yaml
  text: And the deer of Joseph will run in exultation, and the eagles of Israel will fly in joy, and all the peoples will glorify the Lord forever.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:56:28Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Y los ciervos[a] de Jacob correrán en exultación, y las águilas de Israel volarán con alegría; y todos los pueblos glorificarán al Señor para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Ciervos» traduce el animal del griego; algunos lectores podrían preferir «venados».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλαφοι
  english_pob_choice: deer
  chosen_spanish: ciervos
  alternatives_spanish:
  - venados
  - gacelas
  lexicon: ἔλαφος
  rationale: Para el animal de monte/caza aludido por el griego, «ciervos» es natural en español bíblico y mantiene la imagen de ligereza y rapidez. «Venados» también sería posible regionalmente, pero «ciervos» es más amplio y más reconocible en registro bíblico.
- source_word: δραμοῦνται ἐν ἀγαλλιάσει
  english_pob_choice: will run in exultation
  chosen_spanish: correrán en exultación
  alternatives_spanish:
  - correrán con júbilo
  - correrán llenos de gozo
  lexicon: δραμέω / ἀγαλλίασις
  rationale: «Correrán» conserva el movimiento físico del verbo griego, y «en exultación» mantiene el sustantivo intensivo que el POB inglés expresó con «exultation». Evita suavizar la imagen a un mero estado interior.
- source_word: ἀετοὶ
  english_pob_choice: eagles
  chosen_spanish: águilas
  alternatives_spanish:
  - halcones
  - aves de presa
  lexicon: ἀετός
  rationale: «Águilas» es la correspondencia directa y transparente en español, y preserva la imagen elevada y veloz del original.
- source_word: πετασθήσονται ἐν χαρᾷ
  english_pob_choice: will fly in joy
  chosen_spanish: volarán con alegría
  alternatives_spanish:
  - se remontarán con gozo
  - alzarán el vuelo con alegría
  lexicon: πετάννυμι / χαρά
  rationale: «Volarán» comunica el futuro pasivo/medio de manera idiomática en español. «Con alegría» expresa el dativo de esfera/acompañamiento sin exagerar la personificación.
- source_word: πάντες οἱ λαοὶ
  english_pob_choice: all the peoples
  chosen_spanish: todos los pueblos
  alternatives_spanish:
  - todas las naciones
  - todos los pueblos y naciones
  lexicon: λαός
  rationale: «Pueblos» conserva el plural colectivo del griego y evita imponer de entrada una lectura exclusivamente política de «naciones». En español bíblico, «todos los pueblos» suena natural y amplio.
- source_word: Κύριον
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  - el Señor Yahvé
  lexicon: κύριος
  rationale: Aunque el proyecto normalmente vierte el nombre divino como «Yahvé», aquí el texto griego cita o alude a κύριος en forma litúrgica/general y el POB inglés documenta «the Lord». Para mantener la continuidad del registro y la forma auditada del pasaje, se conserva «el Señor» en la línea principal.
theological_decisions:
- issue: Título divino en una doxología final
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  - el Señor Yahvé
  rationale: En esta clausula doxológica, el griego ofrece κύριον sin un marcador explícito adicional de nombre propio. Dado el uso fijo del POB inglés y la función litúrgica del cierre, se retiene «el Señor» como forma más estable en español, sin borrar la referencia al Dios de Israel.
  doctrine_reference: Divine name rendering; doxological diction
translation_notes:
  revision_awareness: El pass de revisión más reciente indicó que no había cambios necesarios. Esta versión sigue la lectura primaria griega y la línea inglesa auditada, con un ajuste de registro español para hacer explícita la imagen animal y mantener la clausula final doxológica.
  spanish_consistency_notes:
  - 'Se conserva la secuencia imaginativa del texto: ciervos, águilas, pueblos.'
  - Se mantiene el paralelismo verbal con futuro simple en español.
  - «El Señor» se usa aquí por continuidad con el audit trail inglés en la doxología final.
