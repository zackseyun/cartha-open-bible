id: T12P.JUD.25.4
reference: Testament of Judah 25:4
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (Judah source-fix v2 — T12P Pass A; α-column primary, apparatus stripped)
  text: '*Καὶ³⁹ ἐν λύπῃ τελευτήσαντες ἀναστήσονται ⁴⁰καὶ οἱ πτωχοὶ⁴¹ διὰ Κύριον⁴³ πλουτισθήσονται⁴⁴ καὶ⁴⁴ οἱ ἀποθνήσκοντες διὰ Κύριον⁴⁵ ἐξυπνισθήσονται⁴⁶ εἰς ζωήν⁴⁷.'
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/025/004.yaml
  text: And those who died in sorrow will rise in joy, and the poor because of the Lord will be made rich, and those dying because of the Lord will awake to life.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:56:28Z'
    unchanged: false
    changes_summary: Revised 'for the Lord’s sake' to 'because of the Lord' to more directly reflect διὰ Κύριον and keep the repeated phrase consistent in both clauses. Kept the rest unchanged.
translation:
  language: es
  text: Y los que murieron en tristeza resucitarán en gozo, y los pobres, a causa del Señor, serán enriquecidos, y los que mueren a causa del Señor despertarán a la vida.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐν λύπῃ
  english_pob_choice: in sorrow
  chosen_spanish: en tristeza
  alternatives_spanish:
  - en dolor
  - con aflicción
  lexicon: λύπη
  rationale: La imagen del contraste con 'gozo' pide un sustantivo natural en español que conserve el paralelo. 'Tristeza' expresa bien el estado interior sin forzar un matiz más físico que el griego no exige aquí.
- source_word: τελευτήσαντες
  english_pob_choice: those who died
  chosen_spanish: los que murieron
  alternatives_spanish:
  - los que fallecieron
  - los difuntos
  lexicon: τελευτάω
  rationale: Se mantiene el sentido de muerte real sin introducir un registro demasiado eufemístico. 'Los que murieron' conserva la forma participial y el paralelismo de la cláusula.
- source_word: ἀναστήσονται
  english_pob_choice: will rise
  chosen_spanish: resucitarán
  alternatives_spanish:
  - se levantarán
  - volverán a levantarse
  lexicon: ἀνίστημι
  rationale: En este contexto escatológico, 'resucitarán' comunica mejor el alcance de levantarse a vida que una simple acción corporal de ponerse en pie.
- source_word: πτωχοὶ
  english_pob_choice: the poor
  chosen_spanish: los pobres
  alternatives_spanish:
  - los necesitados
  - los humildes
  lexicon: πτωχός
  rationale: Se conserva el valor socioeconómico básico de 'pobres', que encaja con la promesa de ser enriquecidos.
- source_word: διὰ Κύριον
  english_pob_choice: because of the Lord
  chosen_spanish: a causa del Señor
  alternatives_spanish:
  - por causa del Señor
  - debido al Señor
  lexicon: διά + acusativo
  rationale: La revisión inglesa pasó de 'for the Lord’s sake' a 'because of the Lord' para reflejar más directamente διὰ Κύριον. En español, 'a causa del Señor' mantiene esa relación causal sin suavizarla hacia una mera finalidad.
- source_word: πλουτισθήσονται
  english_pob_choice: will be made rich
  chosen_spanish: serán enriquecidos
  alternatives_spanish:
  - serán hechos ricos
  - recibirán riqueza
  lexicon: πλουτίζω
  rationale: '''Serán enriquecidos'' conserva el pasivo y evita una expresión menos natural como ''serán hechos ricos'', que suena más dura en español.'
- source_word: οἱ ἀποθνήσκοντες
  english_pob_choice: those dying
  chosen_spanish: los que mueren
  alternatives_spanish:
  - los que están muriendo
  - los moribundos
  lexicon: ἀποθνῄσκω
  rationale: Aunque el participio es presente, el español natural aquí es una relativa de presente. 'Los que mueren' preserva el aspecto durativo sin sobrecargar la frase.
- source_word: ἐξυπνισθήσονται
  english_pob_choice: will awake
  chosen_spanish: despertarán
  alternatives_spanish:
  - serán despertados
  - despertarán del sueño
  lexicon: ἐξυπνίζω
  rationale: El verbo comunica el despertar a una nueva condición, y 'despertarán' conserva la imagen sin volverla demasiado interpretativa.
- source_word: εἰς ζωήν
  english_pob_choice: to life
  chosen_spanish: a la vida
  alternatives_spanish:
  - para la vida
  - hacia la vida
  lexicon: ζωή
  rationale: '''A la vida'' reproduce bien el movimiento final del griego y funciona con naturalidad tras ''despertarán''.'
theological_decisions:
- issue: La resurrección final de los muertos en tristeza
  english_pob_reading: those who died in sorrow will rise in joy
  chosen_spanish_reading: los que murieron en tristeza resucitarán en gozo
  alternative_spanish_readings:
  - los que murieron en dolor resucitarán con gozo
  - los que fallecieron en tristeza se levantarán con gozo
  rationale: Se conserva la afirmación de resurrección y el contraste tristeza/gozo sin diluirlo en una simple mejora emocional. 'Resucitarán' explicita el sentido escatológico que el contexto exige.
  doctrine_reference: Resurrección de los muertos; esperanza escatológica
- issue: El motivo de pobreza y muerte 'a causa del Señor'
  english_pob_reading: because of the Lord
  chosen_spanish_reading: a causa del Señor
  alternative_spanish_readings:
  - por causa del Señor
  - por el Señor
  rationale: La revisión inglesa corrigió la frase para reflejar la causalidad del griego. 'A causa del Señor' conserva esa relación y evita trasladarla a una finalidad devocional inespecífica.
  doctrine_reference: Sufrimiento por fidelidad al Señor; recompensa escatológica
translation_notes:
  revision_awareness: La base inglesa fue revisada desde 'for the Lord’s sake' a 'because of the Lord' para reflejar con más precisión διὰ Κύριον en las dos cláusulas medias y finales. La versión española adopta conscientemente esa causalidad con 'a causa del Señor' en ambas ocurrencias, manteniendo el paralelismo del griego. No se añadieron notas de pie porque no quedó una ambigüedad textual o lexical que requiriera variante alternativa en esta línea.
  spanish_consistency_notes:
  - Se usa 'Señor' para Κύριος en concordancia con el texto auditado en inglés; aquí no aparece el tetragrámaton hebreo, sino una forma griega de título divino.
  - 'Se mantiene el paralelo de tres miembros: resucitarán / serán enriquecidos / despertarán.'
  - '''Gozo'' se reserva para el contraste con ''tristeza'' y no se sustituye por ''alegría'' para conservar el tono bíblico y el paralelismo verbal.'
