base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/016.yaml
  text: '1[a]. Guard yourselves, therefore, my children, against the boundary of wine; for in it there are four evil spirits: desire, burning passion, dissipation, and shameful gain[b].


    2. If you drink wine in gladness, be modest with the fear of God. For if, in gladness, the fear of God departs, then drunkenness follows, and shamelessness enters.


    3. But if you want to live soberly, do not touch wine at all, lest you sin in words of insolence and in fights and in slanders and in transgressions of the commandments of God, and perish before your time.


    4. Wine also reveals the mysteries of God and of men, just as I too revealed the commandments of God and the mysteries of Jacob my father to the Canaanite woman—things that God told me not to reveal.


    5[c]. And wine becomes the cause of war and turmoil.'
  footnotes:
  - marker: a
    text: Or 'the measure of wine' or 'the boundary of wine'—the phrase likely warns against crossing wine's proper limit.
    reason: lexical_alternative
  - marker: b
    text: '''Evil spirits'' may function as personified vices or as more-than-metaphorical spiritual forces; the Greek leaves the texture intact.'
    reason: lexical_alternative
  - marker: c
    text: The confession recalls Judah's disclosure to the Canaanite woman of matters he says God had forbidden him to reveal.
    reason: cross_reference
