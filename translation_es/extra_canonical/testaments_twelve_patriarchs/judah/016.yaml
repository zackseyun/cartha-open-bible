translation:
  language: es
  text: '1[a]. Cuídense, pues, hijos míos, del límite del vino; porque en él hay cuatro espíritus malos[b]: deseo, ardor, disolución y ganancia vergonzosa.


    2. Si beben vino con alegría, sean modestos con el temor de Dios. Porque, si en la alegría se aparta el temor de Dios, entonces sigue la embriaguez y entra la desvergüenza.


    3. Pero si quieren vivir con sobriedad, no toquen en absoluto el vino, para que no pequen en palabras de insolencia, ni en pleitos, ni en calumnias, ni en transgresiones de los mandamientos de Dios, y perezcan antes de su tiempo.


    4. El vino también revela los misterios de Dios y de los hombres, así como yo también revelé a la mujer cananea los mandamientos de Dios y los misterios de Jacob mi padre—cosas que Dios me dijo que no revelara[c].


    5. Y el vino llega a ser causa de guerra y de tumulto.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «medida del vino»; la frase probablemente advierte contra pasar el límite propio del vino.
    reason: lexical_alternative
  - marker: b
    text: «Espíritus malos» puede funcionar como personificación de vicios o como fuerzas espirituales más que metafóricas; el griego deja intacta esa textura.
    reason: theological_note
  - marker: c
    text: La confesión recuerda la divulgación hecha por Judá a la mujer cananea de asuntos que, según dice, Dios le había prohibido revelar.
    reason: cross_reference
lexical_decisions:
- source_word: ὅρος
  english_pob_choice: boundary
  chosen_spanish: límite
  alternatives_spanish:
  - frontera
  - medida
  - borde
  lexicon: LSJ
  rationale: El griego admite la idea de límite o medida; en español, «límite del vino» conserva la imagen concreta de no cruzar su medida propia sin sonar forzado.
- source_word: πνεύματα πονηρά
  english_pob_choice: evil spirits
  chosen_spanish: espíritus malos
  alternatives_spanish:
  - espíritus malignos
  - impulsos malos
  - tendencias malas
  lexicon: LSJ
  rationale: Se mantiene el lenguaje espiritual explícito del original. «Malos» es directo y natural en español, sin reducirlo a mera psicología.
- source_word: ἐπιθυμία
  english_pob_choice: desire
  chosen_spanish: deseo
  alternatives_spanish:
  - lujuria
  - ansia
  - codicia
  lexicon: LSJ
  rationale: Es un término amplio en una lista de vicios. «Deseo» preserva su amplitud y evita estrecharlo indebidamente a lo sexual.
- source_word: πύρωσις
  english_pob_choice: burning passion
  chosen_spanish: ardor
  alternatives_spanish:
  - pasión ardiente
  - inflamación
  - fuego
  lexicon: LSJ
  rationale: El término sugiere calor o inflamación. «Ardor» comunica bien esa imagen en español con concisión.
- source_word: ἀσωτία
  english_pob_choice: dissipation
  chosen_spanish: disolución
  alternatives_spanish:
  - debauchería
  - desenfreno
  - derroche
  lexicon: LSJ
  rationale: «Disolución» conserva el campo moral de vida desordenada y licenciosa que el inglés POB resolvió como dissipation.
- source_word: αἰσχροκερδία
  english_pob_choice: shameful gain
  chosen_spanish: ganancia vergonzosa
  alternatives_spanish:
  - ganancia deshonesta
  - lucro vergonzoso
  - ganancia infame
  lexicon: LSJ
  rationale: El compuesto une vergüenza y ganancia. «Ganancia vergonzosa» mantiene la forma moralmente cargada sin introducir una interpretación más estrecha.
- source_word: αἰδούμενοι
  english_pob_choice: be modest
  chosen_spanish: sean modestos
  alternatives_spanish:
  - sean reverentes
  - manténganse reservados
  - sean recatados
  lexicon: LSJ
  rationale: En contexto de beber con alegría, la idea es conducta contenida y decorosa. «Sean modestos» reproduce bien esa exhortación.
- source_word: σωφρόνως
  english_pob_choice: soberly
  chosen_spanish: con sobriedad
  alternatives_spanish:
  - con autocontrol
  - de manera sensata
  - templanza
  lexicon: LSJ
  rationale: El adverbio apunta a una vida disciplinada y sobria. «Con sobriedad» es natural y conserva la raíz semántica del término.
- source_word: ἐφάπτεσθε
  english_pob_choice: touch
  chosen_spanish: toquen
  alternatives_spanish:
  - proben
  - se acerquen a
  - se sujeten a
  lexicon: LSJ
  rationale: El griego es enérgico. «No toquen en absoluto el vino» preserva la fuerza de abstención total del pasaje.
- source_word: λόγοις ὕβρεως
  english_pob_choice: words of insolence
  chosen_spanish: palabras de insolencia
  alternatives_spanish:
  - palabras insultantes
  - habla arrogante
  - expresiones de ultraje
  lexicon: LSJ
  rationale: «Ὕβρις» implica habla soberbia y desmedida. «Palabras de insolencia» conserva el registro moral y la gravedad del original.
- source_word: συκοφαντίαις
  english_pob_choice: slanders
  chosen_spanish: calumnias
  alternatives_spanish:
  - falsas acusaciones
  - acusaciones maliciosas
  - denuncias falsas
  lexicon: LSJ
  rationale: En una lista de vicios, «calumnias» expresa bien la difamación o acusación dañina que sugiere el término.
- source_word: μυστήρια
  english_pob_choice: mysteries
  chosen_spanish: misterios
  alternatives_spanish:
  - secretos
  - cosas ocultas
  - arcanos
  lexicon: LSJ
  rationale: El registro del texto es elevado y testamentario. «Misterios» preserva ese tono y la posible carga sagrada del término.
- source_word: ἀποκαλύπτει
  english_pob_choice: reveals
  chosen_spanish: revela
  alternatives_spanish:
  - descubre
  - manifiesta
  - da a conocer
  lexicon: LSJ
  rationale: Es el equivalente directo y mantiene la repetición conceptual del pasaje sobre lo que se hace visible por el vino.
theological_decisions:
- issue: Cómo traducir πνεύματα πονηρά sin desmitologizar el texto
  english_pob_reading: Translated literally as 'evil spirits' while allowing the vice list to explain their moral expression.
  chosen_spanish_reading: Se tradujo literalmente como «espíritus malos» y se dejó que la lista de vicios explicara su expresión moral.
  alternative_spanish_readings:
  - impulsos malos
  - tendencias viciosas
  - fuerzas malignas
  rationale: El griego usa lenguaje de espíritus de manera explícita. Mantenerlo evita reducir el texto a psicología moderna y conserva su textura teológica.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Fuerza de la prohibición en v. 3
  english_pob_reading: 'Rendered as total abstention: ''do not touch wine at all.'''
  chosen_spanish_reading: 'Se expresó como abstención total: «no toquen en absoluto el vino».'
  alternative_spanish_readings:
  - no abusen del vino
  - no se entreguen al vino
  - no beban demasiado vino
  rationale: La construcción griega es más fuerte que una simple moderación. La traducción conserva la urgencia exhortativa del pasaje.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1
- issue: Matiz de αἰδούμενοι junto a φόβος Θεοῦ
  english_pob_reading: '''be modest with the fear of God'''
  chosen_spanish_reading: «sean modestos con el temor de Dios»
  alternative_spanish_readings:
  - sean reverentes con el temor de Dios
  - sean recatados con el temor de Dios
  rationale: La combinación apunta a conducta contenida y reverente. «Modestos» comunica bien ese equilibrio en español contemporáneo sin perder solemnidad.
  doctrine_reference: DOCTRINE.md §Translation philosophy 2
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de 'limit of wine' a 'boundary of wine' y fijó 'dissipation', 'shameful gain' y 'soberly' en la revisión más reciente. La presente versión española sigue esa estabilización léxica sin perder la fuerza prohibitiva del v. 3 ni la literalidad de 'espíritus malos'.
  spanish_consistency_notes:
  - Se mantuvo el registro testamentario y exhortativo sin recurrir a fórmulas eclesiásticas más tardías.
  - Se evitó 'Cristo' o terminología cristológica ajena al pasaje, dado que no aparece en el texto fuente.
  - «Misterios» se conservó como término técnico del pasaje, no como simple sinónimo de secretos.
  - La secuencia viciosa se tradujo de forma paralela para conservar el ritmo enumerativo del griego.
