translation:
  language: es
  text: 'El Testamento de Judá, el cuarto hijo de Jacob y Lea.


    Una copia de las palabras de Judá, que habló a sus hijos antes de morir.


    2 Entonces se reunieron y vinieron a él, y les dijo:


    3 «Oigan, hijos míos, Judá, su padre. Yo llegué a ser el cuarto hijo de mi padre Jacob, y Lea, mi madre, me nombró Judá, diciendo: “Doy alabanza a Yahvé, porque me ha dado también un cuarto hijo”. 4 Yo era agudo[a] en mi juventud, y obedecía a mi padre en cada palabra. 5 Y honraba a mi madre y a la hermana de mi madre. 6 Y cuando ya había crecido, mi padre me bendijo[b], diciendo: “Serás rey, prosperando en todo”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '«Agudo» conserva la amplitud del adjetivo griego: puede sugerir viveza, rapidez o filo, sin decidir una sola de esas matices.'
    reason: lexical_alternative
  - marker: b
    text: El verbo griego puede sugerir oración pronunciada sobre Judá; aquí se traduce como bendición por la función que cumple en el contexto.
    reason: theological_note
lexical_decisions:
- source_word: Διαθήκη
  english_pob_choice: Testament
  chosen_spanish: Testamento
  alternatives_spanish:
  - Pacto
  - Últimas palabras
  lexicon: LSJ
  rationale: En este género literario, el término funciona como título convencional de despedida patriarcal; «Testamento» conserva esa función documental sin convertirlo en un pacto teológico.
- source_word: Ἀντίγραφον
  english_pob_choice: A copy
  chosen_spanish: Una copia
  alternatives_spanish:
  - Copia
  - Registro
  lexicon: LSJ
  rationale: Introduce el carácter transcrito del discurso de Judá de manera natural y fiel.
- source_word: λόγων
  english_pob_choice: words
  chosen_spanish: palabras
  alternatives_spanish:
  - dichos
  - discurso
  lexicon: LSJ
  rationale: Mantiene la referencia directa al contenido hablado y la formulación simple del encabezado.
- source_word: Συναχθέντες
  english_pob_choice: they gathered
  chosen_spanish: se reunieron
  alternatives_spanish:
  - habiéndose reunido
  - cuando se reunieron
  lexicon: LSJ
  rationale: Expresa la acción narrativa del reunir-se antes del discurso con una construcción natural en español.
- source_word: Ἀκούσατε
  english_pob_choice: Hear
  chosen_spanish: Oigan
  alternatives_spanish:
  - Escuchen
  - Atiendan
  lexicon: LSJ
  rationale: Conserva el imperativo solemne y directo; «Oigan» suena natural para una exhortación paterna en estilo elevado.
- source_word: τέκνα μου
  english_pob_choice: my children
  chosen_spanish: hijos míos
  alternatives_spanish:
  - mis hijos
  - mis niños
  lexicon: LSJ
  rationale: Aunque el griego permite «hijos» en contexto, el vocativo español más idiomático y preciso aquí es «hijos míos».
- source_word: ἐγὼ τέταρτος υἱὸς ἐγενόμην
  english_pob_choice: I became the fourth son
  chosen_spanish: yo llegué a ser el cuarto hijo
  alternatives_spanish:
  - yo fui el cuarto hijo
  - yo me hice el cuarto hijo
  lexicon: LSJ
  rationale: «Llegué a ser» refleja con más fidelidad el matiz de devenir del griego que una simple identificación estática; «hijo» evita la aspereza de repetir «hijo» en el resto del encabezado y mantiene el sentido de primogenitura/orden de nacimiento.
- source_word: ἐπωνόμασέν με Ἰούδαν
  english_pob_choice: named me Judah
  chosen_spanish: me nombró Judá
  alternatives_spanish:
  - me puso por nombre Judá
  - me llamó Judá
  lexicon: LSJ
  rationale: «Nombró» preserva la fórmula de imposición del nombre con economía y claridad.
- source_word: Ἀνθομολογοῦμαι
  english_pob_choice: I give praise
  chosen_spanish: Doy alabanza
  alternatives_spanish:
  - confieso alabanza
  - agradezco
  lexicon: LSJ
  rationale: La expresión de Lea es doxológica; «Doy alabanza» transmite ese gesto de reconocimiento y alabanza a Dios sin introducir una formulación demasiado técnica.
- source_word: Κυρίῳ
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - el Señor Dios
  lexicon: LSJ
  rationale: Siguiendo la política del proyecto, el nombre divino subyacente se expresa como «Yahvé» en el texto principal; aquí la fórmula de alabanza de Lea remite al Dios de Israel, no a un mero título genérico.
- source_word: ὀξὺς
  english_pob_choice: keen
  chosen_spanish: agudo
  alternatives_spanish:
  - vivo
  - rápido
  - intenso
  lexicon: LSJ
  rationale: El adjetivo es amplio y puede abarcar vivacidad, filo o rapidez; «agudo» conserva esa tensión semántica sin resolverla prematuramente.
- source_word: ὑπήκουον
  english_pob_choice: I obeyed
  chosen_spanish: obedecía
  alternatives_spanish:
  - obedecí
  - escuchaba
  lexicon: LSJ
  rationale: El imperfecto español refleja la acción habitual y continuada de obedecer en la juventud.
- source_word: κατὰ πάντα λόγον
  english_pob_choice: in every word
  chosen_spanish: en cada palabra
  alternatives_spanish:
  - en todo mandato
  - en todo lo que decía
  lexicon: LSJ
  rationale: Aunque el inglés revisado volvió a «word», en español «en cada palabra» conserva la concreción verbal de λόγος sin volverla rígidamente idiomática; deja abierta la fuerza de palabra/instrucción que el griego puede sugerir.
- source_word: ἐτίμων
  english_pob_choice: I honored
  chosen_spanish: honraba
  alternatives_spanish:
  - respetaba
  - daba honra a
  lexicon: LSJ
  rationale: «Honraba» mantiene el peso moral y familiar del verbo en tiempo imperfecto, acorde con la serie descriptiva del pasaje.
- source_word: τὴν ἀδελφὴν τῆς μητρός μου
  english_pob_choice: my mother's sister
  chosen_spanish: la hermana de mi madre
  alternatives_spanish:
  - mi tía
  - la hermana de mi madre
  lexicon: LSJ
  rationale: Se conserva la relación de parentesco explícita del griego, como en el audit trail inglés, en vez de reducirla a «tía».
- source_word: ἡδρύνθην
  english_pob_choice: I had grown up
  chosen_spanish: ya había crecido
  alternatives_spanish:
  - había madurado
  - me había hecho mayor
  lexicon: LSJ
  rationale: Expresa el paso a la madurez/crecimiento antes de la bendición paterna con una forma clara y natural.
- source_word: ηὔξατό μοι
  english_pob_choice: prayed for me
  chosen_spanish: me bendijo
  alternatives_spanish:
  - oró por mí
  - me pidió en oración
  lexicon: LSJ
  rationale: 'Aunque el verbo puede sugerir oración, en este contexto la palabra final de Jacob funciona como bendición pronunciada sobre Judá; «me bendijo» refleja la fuerza performativa del acto en español de modo más inteligible. '
- source_word: Βασιλεὺς ἔσῃ
  english_pob_choice: You shall be a king
  chosen_spanish: Serás rey
  alternatives_spanish:
  - Serás un rey
  - Llegarás a ser rey
  lexicon: LSJ
  rationale: El predicado nominal se mantiene de forma natural y solemne en español, sin sobrecargar el verso con artículo innecesario.
- source_word: κατευοδούμενος
  english_pob_choice: prospering
  chosen_spanish: prosperando
  alternatives_spanish:
  - siendo guiado con éxito
  - teniendo éxito
  lexicon: LSJ
  rationale: «Prosperando» conserva la imagen de éxito/florecimiento del participio, aunque el griego también puede sugerir ser conducido favorablemente; la ambigüedad se deja intacta en el texto.
theological_decisions:
- issue: Render de κύριος en la fórmula de alabanza de Lea
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - Señor
  rationale: En esta obra, la fórmula remite al Dios de Israel. Según la política del proyecto, el nombre divino subyacente se muestra como «Yahvé» en el texto principal para no enmascararlo con un título genérico.
  doctrine_reference: 'DOCTRINE.md: κύριος / YHWH → Yahvé en el texto principal'
- issue: La expresión ὀξὺς aplicada a la juventud de Judá
  english_pob_reading: keen
  chosen_spanish_reading: agudo
  alternative_spanish_readings:
  - vivo
  - rápido
  - enérgico
  rationale: El término es semánticamente amplio y puede aludir a vigor, viveza o filo. «Agudo» preserva esa amplitud sin resolverla artificialmente, manteniendo la tensión descriptiva del original.
  doctrine_reference: 'DOCTRINE.md: Preservar tensiones léxicas cuando el original es amplio'
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente del audit trail inglés en los puntos donde ajustó el sentido: ἐγένομην se refleja como «llegué a ser», κατὰ πάντα λόγον como «en cada palabra», y ηὔξατό μοι se trata con una lectura contextual que en español se vierte naturalmente como bendición pronunciada. También se preserva la fórmula documental del encabezado y la relación de parentesco explícita con «la hermana de mi madre».'
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto para el nombre divino.
  - Se mantiene un registro solemne y no arcaizante, apto para lectura eclesial contemporánea.
  - Se conserva la relación de parentesco explícita del griego en vez de sustituirla por «tía».
  - Los verbos en imperfecto («era», «obedecía», «honraba») siguen el tono descriptivo del pasaje.
  - La puntuación y los vocativos se ajustan al español bíblico moderno, evitando calcos innecesarios.
