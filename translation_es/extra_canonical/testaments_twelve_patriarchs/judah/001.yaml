base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/001.yaml
  text: 'The Testament of Judah[1:5], the fourth son of Jacob and Leah.


    A copy of the words of Judah, which he spoke to his sons before he died.


    2 So they gathered and came to him, and he said to them:


    3 “Hear, my children, Judah your father. I became the fourth son to my father Jacob, and Leah my mother named me Judah, saying, ‘I give praise to the Lord, because he has given me also a fourth son.’ 4 I was keen in my youth, and I obeyed my father in every word. 5 And I honored my mother and my mother''s sister. 6 And when I had grown up, my father prayed for me, saying, ‘You shall be a king[1:6], prospering in all things.’”'
  footnotes:
  - marker: '1:5'
    text: The Greek says 'my mother's sister,' preserving the explicit kinship relation rather than using the simpler English 'my aunt.'
    reason: lexical_alternative
  - marker: '1:6'
    text: The participle translated 'prospering' can also suggest being guided successfully or having one's way made prosperous.
    reason: lexical_alternative
