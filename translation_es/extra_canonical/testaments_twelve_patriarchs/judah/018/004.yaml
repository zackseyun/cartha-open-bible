translation:
  language: es
  text: Y yo sé qué males harán en los últimos días.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Καὶ ἔγνωκα / οἶδα
  english_pob_choice: And I know
  chosen_spanish: Y yo sé
  alternatives_spanish:
  - Y conozco
  - Y he llegado a saber
  lexicon: οἶδα / γινώσκω
  rationale: El griego combina una afirmación de conocimiento seguro con posible matiz de reconocimiento; en español, «yo sé» comunica de manera natural y fiel la certeza del hablante sin forzar un verbo más técnico. Se conserva el énfasis personal con «yo» porque el sujeto está explícito en la fuente.
- source_word: ὅσα κακὰ
  english_pob_choice: what evils
  chosen_spanish: qué males
  alternatives_spanish:
  - cuántos males
  - qué cosas malas
  lexicon: ὅσος + κακός
  rationale: La combinación expresa la amplitud o magnitud de las acciones malas previstas. «Qué males» es idiomático y mantiene la fuerza moral del plural neutro sin volverlo demasiado abstracto. «Qué cosas malas» sería más explicativo, pero menos solemne.
- source_word: ποιήσετε
  english_pob_choice: you will do
  chosen_spanish: haréis
  alternatives_spanish:
  - van a hacer
  - realizaréis
  lexicon: ποιέω
  rationale: ποιέω aquí significa hacer/obrar. «Haréis» es la equivalencia más directa y natural en español, manteniendo el futuro profético de la advertencia.
- source_word: ἐν ταῖς ἐσχάταις ἡμέραις
  english_pob_choice: in the last days
  chosen_spanish: en los últimos días
  alternatives_spanish:
  - en los días postreros
  - en los días finales
  lexicon: ἔσχατος + ἡμέρα
  rationale: «Los últimos días» es una correspondencia clara y ampliamente comprensible en español, conservando el valor escatológico sin introducir un matiz más técnico de «postreros».
theological_decisions:
- issue: Referencia escatológica a «los últimos días»
  english_pob_reading: in the last days
  chosen_spanish_reading: en los últimos días
  alternative_spanish_readings:
  - en los días postreros
  - al final de los tiempos
  rationale: Se conserva la formulación escatológica estándar del texto, sin expandirla a una paráfrasis temporal más amplia. La frase permanece abierta a la tensión profética del contexto.
  doctrine_reference: Escatología bíblica / lenguaje profético
translation_notes:
  revision_awareness: La traducción inglesa POB ya se consideró estable y sin revisiones aplicadas. La versión española sigue el mismo sentido directo del griego, sin añadir notas textuales porque el testimonio provisto no exige una variante significativa para la lectura base.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exige; aquí no aparece el nombre divino.
  - Se mantiene un registro bíblico sobrio y contemporáneo, evitando arcaísmos innecesarios.
  - No se introducen notas al pie porque el pasaje es breve y la base griega no requiere variante textual en esta unidad.
