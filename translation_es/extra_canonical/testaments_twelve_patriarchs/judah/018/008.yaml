base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/018/008.yaml
  text: They hinder the sacrifices of God, and do not remember the blessing of God. They do not listen when a prophet speaks, and resent words of godliness.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:56:19Z'
    unchanged: false
    changes_summary: Made pronouns consistent by changing singular 'he does/He does' to plural 'do/They do' to match the opening plural subject; removed unnecessary repeated subject before 'resent' for smoother formal English.
translation:
  language: es
  text: Impiden los sacrificios de Dios, y no recuerdan la bendición de Dios. No escuchan cuando habla un profeta, y resienten las palabras de piedad.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Θυσίας Θεοῦ ἐμποδίζει
  english_pob_choice: They hinder the sacrifices of God
  chosen_spanish: Impiden los sacrificios de Dios
  alternatives_spanish:
  - Obstaculizan los sacrificios de Dios
  - Estorban los sacrificios de Dios
  lexicon: ἐμποδίζει
  rationale: Impiden conserva el valor de bloquear o poner estorbo sin añadir intensificación. «Sacrificios de Dios» sigue de cerca el genitivo del griego y mantiene la referencia cultual sin sustituirla por una formulación interpretativa.
- source_word: εὐλογίαν Θεοῦ οὐ μνημονεύει
  english_pob_choice: do not remember the blessing of God
  chosen_spanish: no recuerdan la bendición de Dios
  alternatives_spanish:
  - no se acuerdan de la bendición de Dios
  - no mencionan la bendición de Dios
  lexicon: μνημονεύει
  rationale: «Recordar» reproduce el campo de memoria/referencia mental que el inglés POB ya fijó. Mantiene la pluralidad corregida por la revisión inglesa y evita convertir el verbo en mera mención verbal.
- source_word: Προφήτου λαλοῦντος οὐκ ἀκούει
  english_pob_choice: They do not listen when a prophet speaks
  chosen_spanish: No escuchan cuando habla un profeta
  alternatives_spanish:
  - No oyen cuando habla un profeta
  - No prestan atención cuando habla un profeta
  lexicon: ἀκούει
  rationale: «Escuchar» expresa atención obediente, no solo percepción auditiva, y corresponde bien al contraste profético del contexto. «Cuando habla un profeta» conserva la estructura temporal sin forzar una subordinación más pesada.
- source_word: λόγους εὐσεβείας προσοχθίζει
  english_pob_choice: resent words of godliness
  chosen_spanish: aborrecen las palabras de piedad
  alternatives_spanish:
  - resienten las palabras de piedad
  - detestan las palabras de piedad
  lexicon: προσοχθίζει
  rationale: «Aborrecen» comunica rechazo fuerte y sobrado para el verbo griego de sentir disgusto/repugnancia. «Palabras de piedad» mantiene la idea de εὐσέβεια como piedad/devoción en un registro bíblico natural para el español.
theological_decisions:
- issue: Cómo verter Θεοῦ en una fórmula cultual y relacional
  english_pob_reading: the sacrifices of God / the blessing of God
  chosen_spanish_reading: los sacrificios de Dios / la bendición de Dios
  alternative_spanish_readings:
  - los sacrificios para Dios
  - la bendición proveniente de Dios
  rationale: Se conserva la relación directa del genitivo sin explicitar dirección o procedencia más allá del griego. Esto deja abierta la tensión entre sacrificios ofrecidos a Dios y bendición perteneciente a Dios, sin resolverla artificialmente.
  doctrine_reference: Genitivo relacional en expresiones cultuales; prudencia exegética ante construcciones breves y ambigüas.
- issue: Efecto de la revisión inglesa sobre el sujeto plural
  english_pob_reading: They do not remember... They do not listen... and resent...
  chosen_spanish_reading: no recuerdan... No escuchan... y aborrecen...
  alternative_spanish_readings:
  - no recuerda... No escucha... y aborrece...
  rationale: La revisión inglesa corrigió la oscilación a plural para concordar con el sujeto inicial. El español sigue esa coherencia plural en toda la secuencia verbal.
  doctrine_reference: Coherencia sintáctica del sujeto plural en el testimonio textual recibido.
translation_notes:
  revision_awareness: Se siguió la lectura griega y la revisión inglesa más reciente, especialmente la corrección a sujeto plural en los verbos posteriores. No se añadieron notas porque no fue necesaria ninguna alternativa textual o ambigüedad adicional que requiriera marcación.
  spanish_consistency_notes:
  - Se mantuvo un español sobrio y publicable, sin calcos innecesarios.
  - Se preservó el paralelismo de tres miembros del verso con verbos en plural.
  - «Piedad» se eligió para εὐσεβείας por su naturalidad bíblica y porque evita reducir el término a mera religiosidad externa.
