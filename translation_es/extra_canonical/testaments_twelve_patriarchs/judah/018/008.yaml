    issue: '''aborrecen las palabras de piedad'' renders προσοχθίζει with stronger aversion than the Greek/EN warrant; ''resent'' or ''is offended by'' in EN maps better to ''resienten'' or ''se ofenden por''.'
    rationale: προσοχθίζω denotes irritation/vexation/offense, not full hatred (aborrecimiento). 'Aborrecen' is too strong and shifts the meaning.
  revised_spanish_text: Impiden los sacrificios de Dios, y no recuerdan la bendición de Dios. No escuchan cuando habla un profeta, y resienten las palabras de piedad.
