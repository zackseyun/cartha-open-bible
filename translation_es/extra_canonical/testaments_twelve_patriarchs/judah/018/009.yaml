translation:
  language: es
  text: Porque está esclavizado por dos pasiones contrarias, y no puede obedecer a Dios, porque han cegado su alma.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: δουλεύει
  english_pob_choice: is enslaved
  chosen_spanish: está esclavizado
  alternatives_spanish:
  - es esclavo
  - está sometido
  lexicon: δουλεύω
  rationale: El griego expresa servidumbre efectiva bajo un poder; «está esclavizado» conserva la fuerza pasiva y relacional de la imagen mejor que un simple «sirve» o «está sometido».
- source_word: πάθεσιν ἐναντίοις
  english_pob_choice: two contrary passions
  chosen_spanish: dos pasiones contrarias
  alternatives_spanish:
  - dos afectos contrarios
  - dos pasiones opuestas
  lexicon: πάθος
  rationale: «Pasiones» mantiene el campo semántico afectivo/impulsivo del griego, y «contrarias» reproduce ἐναντίοις con naturalidad en español.
- source_word: ὑπακοῦσαι
  english_pob_choice: obey
  chosen_spanish: obedecer
  alternatives_spanish:
  - escuchar y obedecer
  - ser obediente
  lexicon: ὑπακούω
  rationale: «Obedecer» es el equivalente directo y claro en español; no hace falta expandir a una perífrasis porque el contexto ya marca la relación con Dios.
- source_word: ἐτύφλωσεν τὴν ψυχὴν αὐτοῦ
  english_pob_choice: they have blinded his soul
  chosen_spanish: han cegado su alma
  alternatives_spanish:
  - han oscurecido su alma
  - han enceguecido su alma
  lexicon: τυφλόω
  rationale: «Cegar» conserva la metáfora de incapacidad espiritual/intelectual del original. «Alma» traduce ψυχή con el mismo alcance interior que en el texto griego.
theological_decisions:
- issue: Relación entre esclavitud interior y responsabilidad ante Dios
  english_pob_reading: he is enslaved... and is not able to obey God
  chosen_spanish_reading: está esclavizado... y no puede obedecer a Dios
  alternative_spanish_readings:
  - es dominado... y no puede obedecer a Dios
  - está sujeto... y no puede obedecer a Dios
  rationale: 'Se conserva la tensión del pasaje: una condición interna de esclavitud real que afecta la capacidad de obediencia. «Esclavizado» mantiene esa fuerza sin suavizarla.'
  doctrine_reference: Antropología moral; esclavitud del pecado / incapacidad moral en contexto de vicio y pasión.
- issue: Ceguera del alma como causa de incapacidad
  english_pob_reading: because they have blinded his soul
  chosen_spanish_reading: porque han cegado su alma
  alternative_spanish_readings:
  - porque han oscurecido su alma
  - porque han cegado su interior
  rationale: La causalidad del griego se preserva con «porque». «Alma» permite mantener la antropología del texto sin reducirla a mera psicología moderna.
  doctrine_reference: Antropología bíblica; corrupción interior que afecta entendimiento y voluntad.
translation_notes:
  revision_awareness: La versión inglesa POB es ya estable y no presenta notas ni revisiones aplicadas; el español sigue de cerca el griego y conserva la misma estructura causal y antitética sin introducir expansión interpretativa.
  spanish_consistency_notes:
  - Se mantiene «Dios» para Θεῷ conforme al estándar del proyecto.
  - Se conserva el plural «pasiones» para πάθεσιν, evitando singularizar indebidamente una pluralidad explícita.
  - No se añade puntuación interpretativa adicional más allá de la división natural de la oración.
