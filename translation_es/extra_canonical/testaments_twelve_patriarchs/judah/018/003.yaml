base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/018/003.yaml
  text: And Abraham my forefather blessed me to reign in Israel, and Jacob blessed me likewise.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:56:16Z'
    unchanged: false
    changes_summary: Replaced 'in the same way' with 'likewise' for a more natural and formal rendering of οὕτως while preserving the sense.
translation:
  language: es
  text: Y Abraham, mi antepasado, me bendijo para reinar en Israel, y Jacob me bendijo igualmente.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: καὶ ᾿Αβραὰμ ὁ πρόπαππός μου
  english_pob_choice: And Abraham my forefather
  chosen_spanish: Y Abraham, mi antepasado
  alternatives_spanish:
  - Y Abraham, mi bisabuelo
  - Y Abraham, mi padre antiguo
  lexicon: πρόπαππος
  rationale: En español, «antepasado» comunica la relación genealógica sin introducir una precisión de grado que el contexto no exige. «Bisabuelo» sería demasiado específico y no está sustentado por el griego; «padre antiguo» sería poco natural.
- source_word: εὐλόγησέ με βασιλεύειν ἐν Ἰσραήλ
  english_pob_choice: blessed me to reign in Israel
  chosen_spanish: me bendijo para reinar en Israel
  alternatives_spanish:
  - me bendijo para que reinara en Israel
  - me bendijo para gobernar en Israel
  lexicon: εὐλογέω + infinitivo de finalidad
  rationale: Se conserva la estructura de propósito del griego con «para reinar». «Gobernar» es posible, pero «reinar» reproduce mejor la idea de investidura real implícita en el texto.
- source_word: καὶ Ἰακὼβ εὐλόγησέ με οὕτως
  english_pob_choice: and Jacob blessed me likewise
  chosen_spanish: y Jacob me bendijo igualmente
  alternatives_spanish:
  - y Jacob me bendijo de igual modo
  - y Jacob me bendijo de la misma manera
  lexicon: οὕτως
  rationale: «Igualmente» ofrece un equivalente formal, breve y natural para οὕτως, en línea con la revisión inglesa que prefirió «likewise». Evita la pesadez de una perífrasis más explicativa.
theological_decisions:
- issue: La bendición patriarcal como autorización para reinar en Israel
  english_pob_reading: And Abraham my forefather blessed me to reign in Israel
  chosen_spanish_reading: Y Abraham, mi antepasado, me bendijo para reinar en Israel
  alternative_spanish_readings:
  - Y Abraham, mi antepasado, me bendijo para gobernar en Israel
  - Y Abraham, mi antepasado, me bendijo para ser rey en Israel
  rationale: El texto presenta una bendición orientada a la realeza en Israel. Se conserva esa fuerza sin añadir explicaciones doctrinales o históricas que el versículo no desarrolla.
  doctrine_reference: Bendición patriarcal / realeza en Israel
translation_notes:
  revision_awareness: La revisión inglesa reciente sustituyó «in the same way» por «likewise» para reflejar mejor οὕτως con mayor naturalidad y formalidad. La versión española sigue esa decisión con «igualmente», manteniendo la brevedad y el paralelismo del hebreo/griego implícito.
  spanish_consistency_notes:
  - Se mantiene «bendijo» para εὐλόγησέ με, de forma consistente con el sentido de bendición patriarcal.
  - Se usa «Israel» sin artículo, conforme al uso bíblico normal en español.
  - No se introduce «Cristo», «SEÑOR» ni otras expansiones no presentes en el texto fuente.
