translation:
  language: es
  text: Le priva de toda bondad en el alma, y lo sujeta en dolores y trabajos; le ahuyenta el sueño, y consume su carne.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Στερίσκει
  english_pob_choice: It deprives
  chosen_spanish: Le priva de
  alternatives_spanish:
  - lo despoja de
  - lo desprovee de
  lexicon: στερέω
  rationale: El verbo griego expresa privación o despojo de algo debido o deseable; en español, «privar de» comunica bien esa pérdida sin volverla más fuerte de lo que el contexto exige.
- source_word: τὴν ψυχὴν αὐτοῦ
  english_pob_choice: his soul
  chosen_spanish: el alma
  alternatives_spanish:
  - su alma
  - su vida
  lexicon: ψυχή
  rationale: Aquí ψυχή designa la vida interior o el alma de la persona; «el alma» mantiene la equivalencia con el inglés POB y conserva el registro espiritual del pasaje.
- source_word: ἀπὸ πάσης ἀγαθότητος
  english_pob_choice: of every goodness
  chosen_spanish: de toda bondad
  alternatives_spanish:
  - de toda clase de bondad
  - de todo bien
  lexicon: ἀγαθότης
  rationale: La expresión sugiere privación total de lo bueno o beneficioso; «toda bondad» es natural en español y mantiene la amplitud semántica del griego y del inglés.
- source_word: συνέχει αὐτὸν ἐν πόνοις καὶ μόχθοις
  english_pob_choice: holds him fast in pains and labors
  chosen_spanish: lo sujeta en dolores y trabajos
  alternatives_spanish:
  - lo mantiene preso en dolores y fatigas
  - lo aprieta con dolores y afanes
  lexicon: συνέχω; πόνος; μόχθος
  rationale: συνέχω aquí tiene la idea de retener o sujetar fuertemente; «lo sujeta» conserva esa fuerza. «Dolores y trabajos» reproduce el paralelismo de sufrimiento y esfuerzo/tarea ardua sin exagerar el matiz.
- source_word: τὸν ὕπνον ἐκδιώκει ἀπ᾽ αὐτοῦ
  english_pob_choice: it drives sleep away from him
  chosen_spanish: le ahuyenta el sueño
  alternatives_spanish:
  - lo aleja del sueño
  - le quita el sueño
  lexicon: ἐκδιώκω; ὕπνος
  rationale: «Ahuyentar» comunica bien la expulsión o alejamiento activo del sueño y resulta idiomático en español; mantiene la imagen dinámica del original.
- source_word: καταδαπανᾷ τὰς σάρκας αὐτοῦ
  english_pob_choice: consumes his flesh
  chosen_spanish: consume su carne
  alternatives_spanish:
  - devora su carne
  - consume sus carnes
  lexicon: καταδαπανάω; σάρξ
  rationale: σάρξ se traduce aquí literalmente como «carne», como en el inglés POB. «Consume» conserva la idea de desgaste progresivo y no introduce un matiz más violento que el griego requiere.
theological_decisions:
- issue: El alcance de ψυχή en un contexto de aflicción moral y existencial
  english_pob_reading: his soul
  chosen_spanish_reading: el alma
  alternative_spanish_readings:
  - su vida
  - su ser interior
  rationale: La opción «alma» preserva la lectura tradicional y el contraste antropológico implícito en el pasaje. No se suaviza a «vida» porque el contexto apunta a la dimensión interior y personal de la privación.
  doctrine_reference: Antropología bíblica; uso de ψυχή en literatura judía helenística
- issue: 'La fuerza de la cadena verbal de aflicción: privar, sujetar, ahuyentar, consumir'
  english_pob_reading: deprives... holds... drives... consumes
  chosen_spanish_reading: priva... sujeta... ahuyenta... consume
  alternative_spanish_readings:
  - despoja... mantiene preso... quita... devora
  rationale: Se conservó la progresión de acciones con verbos activos y concretos, siguiendo de cerca el audit trail inglés revisado por singularidad y el patrón del griego. No se introdujo una paráfrasis explicativa que debilitara la secuencia.
  doctrine_reference: Poética sapiencial y descripción del deterioro humano
translation_notes:
  revision_awareness: 'The English audit trail shows a revision from plural to singular verbs/pronouns to match the Greek subject and verb forms. The Spanish draft follows that singular reading consistently: le priva, lo sujeta, le ahuyenta, consume.'
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y bíblico, sin arcaísmos innecesarios.
  - Se evita «SEÑOR» u otras sustituciones no presentes en el texto, ya que no aparece el nombre divino aquí.
  - «Carne» se usa en sentido corporal literal, coherente con σάρξ y con el inglés POB.
  - La sintaxis mantiene el sujeto implícito singular sin ambigüedad, en línea con la revisión inglesa.
