base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/018/007.yaml
  text: It deprives his soul of every goodness, and holds him fast in pains and labors; it drives sleep away from him, and consumes his flesh.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:56:19Z'
