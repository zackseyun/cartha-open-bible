translation:
  language: es
  text: Por tanto, nunca entristecí a Jacob, mi padre, porque hacía todo lo que me decía.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: παρελύπησα
  english_pob_choice: grieved
  chosen_spanish: entristecí
  alternatives_spanish:
  - afligí
  - causé tristeza a
  lexicon: λύπη / λυπέω
  rationale: El griego expresa causar pena o tristeza; «entristecí» conserva el valor afectivo sin volverlo más fuerte de lo que exige el texto. «Afligí» podría sonar más intenso o físico en español.
- source_word: Ἰακὼβ τὸν πατέρα μου
  english_pob_choice: Jacob my father
  chosen_spanish: Jacob, mi padre
  alternatives_spanish:
  - a Jacob, mi padre
  - a mi padre Jacob
  lexicon: Ἰακώβ; πατήρ
  rationale: Se mantiene el orden natural del español y la relación posesiva explícita. La forma elegida conserva la aposición del original sin introducir una formulación más rígida.
- source_word: ὅτι
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: ὅτι
  rationale: Aquí introduce la causa de no haber entristecido a Jacob, por lo que «porque» comunica bien la relación causal en español moderno y claro.
- source_word: πάντα ὅσα μοι ἔλεγεν ἐποίουν
  english_pob_choice: I did everything he told me
  chosen_spanish: hacía todo lo que me decía
  alternatives_spanish:
  - cumplía todo lo que me decía
  - hacía todo cuanto me decía
  lexicon: πᾶς; ποιέω; λέγω
  rationale: La estructura griega enfatiza repetición/hábito con una cláusula relativa; «hacía todo lo que me decía» conserva ese sentido de obediencia continua y resulta natural en español.
theological_decisions:
- issue: Énfasis en obediencia filial como motivo de no causar dolor al padre
  english_pob_reading: for I did everything he told me
  chosen_spanish_reading: porque hacía todo lo que me decía
  alternative_spanish_readings:
  - porque obedecía todo lo que me mandaba
  - porque cumplía todo lo que me ordenaba
  rationale: El texto presenta obediencia completa como la razón de no haber causado tristeza. «Me decía» sigue de cerca el griego ἔλεγεν sin añadir una carga imperativa que el pasaje no explicita.
  doctrine_reference: Obediencia filial y rectitud moral en el relato patriarcal
translation_notes:
  revision_awareness: El texto griego y la traducción inglesa auditada coinciden de manera estable; no se registran revisiones aplicadas ni variantes textuales que afecten esta línea. Se mantiene la equivalencia óptima del POB sin introducir notas innecesarias.
  spanish_consistency_notes:
  - Se usa «Jacob» de forma consistente como nombre propio.
  - Se evita «SEÑOR» o terminología cultual ajena al pasaje, porque aquí no aparece el nombre divino.
  - Se conserva un registro sobrio y narrativo, acorde con una confesión retrospectiva en primera persona.
