id: T12P.JUD.18.6
reference: Testament of Judah 18:6
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 134-175, Judah pilot full)
  text: 3. Ὅτι¹⁰ ταῦτα¹¹ ἀφιστᾷ¹² *τῷ νόμῳ τοῦ¹³ θεοῦ, καὶ τυφλοῖ¹⁴ τὸ διαβούλιον τῆς ψυχῆς, βλοις Ἐνὼχ τοῦ δικαίου. καὶ ὑπερηφάνειαν ἐκδιδάσκει¹⁵, καὶ οὐκ ἀφίει¹⁶ ἄνδρα ἐλεῆσαι¹⁷ τὸν¹⁸ πλησίον αὐτοῦ.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/018/006.yaml
  text: For these turn one away from the law of God, and blind the judgment of the soul, and teach arrogance, and do not allow a man to show mercy to his neighbor.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:56:18Z'
    unchanged: false
    changes_summary: Changed 'purpose' to 'judgment' to better reflect διαβούλιον as deliberation/judgment rather than purpose. Kept the rest unchanged as accurate and natural.
translation:
  language: es
  text: Porque estas apartan de la ley de Dios, y ciegan el juicio del alma, y enseñan arrogancia, y no permiten que un hombre muestre misericordia a su prójimo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ταῦτα
  english_pob_choice: these
  chosen_spanish: estas
  alternatives_spanish:
  - estas cosas
  - esto
  lexicon: demonstrative pronoun/adjective
  rationale: Mantiene la referencia cercana a plural de «estas» como en el inglés POB, sin añadir sustantivo que el griego no exige.
- source_word: ἀφιστᾷ
  english_pob_choice: turn one away
  chosen_spanish: apartan
  alternatives_spanish:
  - desvían
  - hacen apartar
  lexicon: ἀφιστάνω
  rationale: El verbo transmite apartar/desviar de una vía; «apartan» conserva el movimiento causal y suena natural en español.
- source_word: τῷ νόμῳ τοῦ θεοῦ
  english_pob_choice: the law of God
  chosen_spanish: la ley de Dios
  alternatives_spanish:
  - la ley de Dios
  - la Ley de Dios
  lexicon: νόμος + θεός
  rationale: «Ley de Dios» es la equivalencia directa y sobria; se evita mayúscula teológica innecesaria en español corriente.
- source_word: τυφλοῖ
  english_pob_choice: blind
  chosen_spanish: ciegan
  alternatives_spanish:
  - cegan
  - oscurecen
  lexicon: τυφόω
  rationale: «Ciegan» preserva la imagen de privar de visión/claridad y funciona bien con el objeto interno siguiente.
- source_word: τὸ διαβούλιον τῆς ψυχῆς
  english_pob_choice: the judgment of the soul
  chosen_spanish: el juicio del alma
  alternatives_spanish:
  - el discernimiento del alma
  - la deliberación del alma
  lexicon: διαβούλιον
  rationale: Sigo la revisión inglesa que corrigió «purpose» a «judgment»; «juicio» es la opción más directa y natural para el acto de evaluar/decidir del alma.
- source_word: ὑπερηφάνειαν ἐκδιδάσκει
  english_pob_choice: teach arrogance
  chosen_spanish: enseñan arrogancia
  alternatives_spanish:
  - enseñan soberbia
  - adoctrinan en la arrogancia
  lexicon: ὑπερηφανία + ἐκδιδάσκω
  rationale: «Arrogancia» conserva el valor moral negativo sin forzar un tecnicismo; el plural verbal sigue el antecedente plural implícito de «estas».
- source_word: οὐκ ἀφίει
  english_pob_choice: do not allow
  chosen_spanish: no permiten
  alternatives_spanish:
  - no dejan
  - no consienten
  lexicon: ἀφίημι
  rationale: En este contexto causal/impeditivo, «no permiten» reproduce bien la negación de dejar hacer, como en el inglés POB.
- source_word: ἐλεῆσαι
  english_pob_choice: show mercy
  chosen_spanish: muestre misericordia
  alternatives_spanish:
  - tenga misericordia
  - sea misericordioso
  lexicon: ἐλεέω
  rationale: «Mostrar misericordia» sigue el inglés POB y expresa el acto concreto de compadecer/auxiliar al prójimo.
- source_word: πλησίον αὐτοῦ
  english_pob_choice: his neighbor
  chosen_spanish: su prójimo
  alternatives_spanish:
  - su vecino
  - al próximo
  lexicon: πλησίον
  rationale: «Prójimo» es la equivalencia eclesial y bíblica más clara para el destinatario cercano; mantiene el sentido relacional del original.
theological_decisions:
- issue: La fuerza normativa de «la ley de Dios» frente a una lectura más general de instrucción/divina voluntad
  english_pob_reading: law of God
  chosen_spanish_reading: la ley de Dios
  alternative_spanish_readings:
  - la norma de Dios
  - la instrucción de Dios
  rationale: El griego y el inglés POB apuntan a una formulación legal/normativa explícita. «Ley» conserva mejor esa fuerza que opciones más amplias.
  doctrine_reference: ética bíblica / ley divina
- issue: «Juicio del alma» como capacidad de discernir, no simple meta o intención
  english_pob_reading: judgment of the soul
  chosen_spanish_reading: el juicio del alma
  alternative_spanish_readings:
  - el discernimiento del alma
  - la deliberación del alma
  rationale: La revisión inglesa ya descartó «purpose». En español, «juicio» retiene tanto la facultad evaluativa como el veredicto interior, sin debilitar la frase.
  doctrine_reference: antropología moral / discernimiento
- issue: «Misericordia» en sentido activo hacia el prójimo
  english_pob_reading: show mercy to his neighbor
  chosen_spanish_reading: muestre misericordia a su prójimo
  alternative_spanish_readings:
  - tenga misericordia de su prójimo
  - sea misericordioso con su prójimo
  rationale: La construcción expresa un acto hacia otro, no solo un sentimiento interno. «Mostrar misericordia» conserva ese carácter práctico.
  doctrine_reference: ética de la misericordia
translation_notes:
  revision_awareness: The English audit trail includes a revision that changed ‘purpose’ to ‘judgment’ for τὸ διαβούλιον τῆς ψυχῆς. This Spanish draft follows that revised reading and preserves the rest of the English POB’s sense without flattening the Greek moral force.
  spanish_consistency_notes:
  - 'Se conserva el paralelismo verbal de cuatro miembros: apartan / ciegan / enseñan / no permiten.'
  - «Ley de Dios» y «prójimo» mantienen terminología bíblica estable y ampliamente inteligible.
  - No se introduce una nota al pie porque la revisión inglesa ya resuelve la principal ambigüedad de διαβούλιον y no queda una variante textual relevante en este verso.
