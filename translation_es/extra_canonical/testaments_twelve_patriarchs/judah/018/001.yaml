base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/018/001.yaml
  text: The Lord gave me favor in obedience to my father,
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:56:17Z'
    unchanged: false
    changes_summary: 'Revised to reflect the Greek more closely: rendered ἐν ὑπακοῇ as ''in obedience to'' rather than the more interpretive ''because I obeyed,'' and retained the verse''s fragmentary form with the trailing comma.'
translation:
  language: es
  text: el Señor me dio favor en obediencia a mi padre,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Κύριος
  english_pob_choice: The Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  lexicon: κύριος
  rationale: Aquí el griego usa Κύριος sin el Tetragrámaton explícito en el texto citado; por eso la forma natural en español es «el Señor». Aunque el proyecto prefiere «Yahvé» para יהוה, esta línea refleja la cita griega y conserva la cadencia del audit trail inglés.
- source_word: ἐν ὑπακοῇ
  english_pob_choice: in obedience to
  chosen_spanish: en obediencia a
  alternatives_spanish:
  - en la obediencia a
  - obedeciendo a
  lexicon: ὑπακοή
  rationale: 'La revisión inglesa dejó claro que ἐν ὑπακοῇ debe leerse con valor de esfera o ámbito: «in obedience to». En español, «en obediencia a» reproduce esa relación sin volverla causal ni paraprástica.'
- source_word: πατρός μου
  english_pob_choice: my father
  chosen_spanish: mi padre
  alternatives_spanish:
  - a mi padre
  - de mi padre
  lexicon: πατήρ
  rationale: El genitivo posesivo queda de forma natural en español como «mi padre». No se añade preposición porque el griego aquí no exige un complemento más explícito en la superficie del fragmento.
theological_decisions:
- issue: Relación entre favor divino y obediencia
  english_pob_reading: The Lord gave me favor in obedience to my father,
  chosen_spanish_reading: el Señor me dio favor en obediencia a mi padre,
  alternative_spanish_readings:
  - el Señor me favoreció porque obedecí a mi padre
  - el Señor me dio favor cuando obedecí a mi padre
  rationale: Se conserva la relación no causalizada que fijó la revisión inglesa. El texto no dice explícitamente «porque», sino que vincula el favor con la esfera de la obediencia. En español, «en obediencia a mi padre» mantiene esa tensión sin resolverla interpretativamente.
  doctrine_reference: obediencia y favor divino; no se hace una inferencia causal no atestiguada
translation_notes:
  revision_awareness: La versión inglesa revisada cambió de una lectura causal («because I obeyed my father») a una lectura más cercana al griego («in obedience to my father») y mantuvo la forma fragmentaria con coma final. La traducción española sigue esa revisión y también conserva el carácter fragmentario del enunciado.
  spanish_consistency_notes:
  - Se evita «SEÑOR» en mayúsculas porque el griego aquí presenta Κύριος en una cita breve sin marcador explícito del Tetragrámaton.
  - Se conserva «favor» y no se sustituye por «gracia» para respetar el paralelo semántico del inglés POB y la concisión del fragmento.
  - Se mantiene la coma final para reflejar la naturaleza incompleta del segmento en la fuente.
