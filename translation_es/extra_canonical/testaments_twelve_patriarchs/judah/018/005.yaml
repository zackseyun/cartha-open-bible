  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/018/005.yaml
  text: Guard yourselves, therefore, my children, from sexual immorality and the love of money, and listen to Judah your father.
  revision_pass:
    model: gpt-5.4
