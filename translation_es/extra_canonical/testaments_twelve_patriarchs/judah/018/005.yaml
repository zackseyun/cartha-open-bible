translation:
  language: es
  text: Guárdense, pues, hijos míos, de la inmoralidad sexual y del amor al dinero, y escuchen a Judá, su padre.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Φυλάξασθε
  english_pob_choice: Guard yourselves
  chosen_spanish: Guárdense
  alternatives_spanish:
  - Guardense
  - Cuídense
  - Manténganse guardados
  lexicon: φυλάσσω
  rationale: El imperativo medio/pasivo exhorta a una vigilancia activa sobre la propia conducta; «Guárdense» conserva la fuerza reflexiva y suena natural en español bíblico actual.
- source_word: πορνείας
  english_pob_choice: sexual immorality
  chosen_spanish: inmoralidad sexual
  alternatives_spanish:
  - fornicación
  - impureza sexual
  - inmoralidad en lo sexual
  lexicon: πορνεία
  rationale: La POB inglesa usa una expresión amplia y no técnica. En español, «inmoralidad sexual» comunica esa amplitud sin restringir indebidamente el término a un solo acto o estado.
- source_word: φιλαργυρίας
  english_pob_choice: the love of money
  chosen_spanish: el amor al dinero
  alternatives_spanish:
  - la avaricia
  - la codicia
  - el afán de dinero
  lexicon: φιλαργυρία
  rationale: 'Se preserva la estructura concreta del sustantivo compuesto: no solo la conducta, sino el apego desordenado al dinero. «El amor al dinero» es fiel y transparente, aunque menos idiomático que «avaricia».'
- source_word: ἀκούσατε
  english_pob_choice: listen to
  chosen_spanish: escuchen a
  alternatives_spanish:
  - oigan a
  - presten oído a
  - atiendan a
  lexicon: ἀκούω
  rationale: El verbo aquí implica obedecer atentamente la exhortación paterna. «Escuchen a» mantiene la literalidad funcional y el registro exhortativo.
- source_word: Ἰούδα τοῦ πατρὸς ὑμῶν
  english_pob_choice: Judah your father
  chosen_spanish: Judá, su padre
  alternatives_spanish:
  - Judá, su padre
  - Judá, su padre de ustedes
  - Judá, vuestro padre
  lexicon: Ἰούδας
  rationale: Se conserva el nombre propio «Judá». El posesivo se adapta a español moderno con «su padre», evitando una segunda persona plural marcada y manteniendo el sentido relacional del texto.
theological_decisions:
- issue: Forma de la exhortación moral
  english_pob_reading: Guard yourselves ... from sexual immorality and the love of money
  chosen_spanish_reading: Guárdense ... de la inmoralidad sexual y del amor al dinero
  alternative_spanish_readings:
  - Protéjanse ...
  - Cuídense ...
  rationale: El texto presenta una advertencia ética directa. «Guárdense» conserva el carácter de vigilancia moral sin añadir matices no presentes en el griego.
  doctrine_reference: Ethical exhortation in wisdom/testamental literature
- issue: Alcance de πορνεία
  english_pob_reading: sexual immorality
  chosen_spanish_reading: inmoralidad sexual
  alternative_spanish_readings:
  - fornicación
  - impureza sexual
  rationale: No se reduce el término a una categoría eclesiástica tradicional. La traducción mantiene el alcance amplio de la fuente y evita cargar el pasaje con una especificación doctrinal ajena.
  doctrine_reference: Lexical range of πορνεία
- issue: Construcción con un solo gobernante preposicional implícito en la traducción inglesa revisada
  english_pob_reading: from sexual immorality and the love of money
  chosen_spanish_reading: de la inmoralidad sexual y del amor al dinero
  alternative_spanish_readings:
  - de la inmoralidad sexual y el amor al dinero
  - de la inmoralidad sexual y del amor al dinero
  rationale: Aunque el inglés revisado eliminó la repetición de 'from', el español requiere normalizar la coordinación con una preposición que gobierne ambos complementos de manera natural. Se conserva el paralelo semántico sin forzar una construcción extraña.
  doctrine_reference: Syntactic fidelity to Greek coordination
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa que eliminó la segunda ocurrencia de 'from' para reflejar mejor la única preposición griega que rige ambos sustantivos. En español, la coordinación se resolvió naturalmente con 'de ... y del ...' sin necesidad de nota textual.
  spanish_consistency_notes:
  - Se mantuvo «Judá» como nombre propio y no se usó «Judas», para corresponder al testamento de Judá.
  - Se prefirió un registro claro y digno, sin calcos innecesarios ni terminología eclesiástica más técnica de la requerida por el pasaje.
  - No se introdujeron notas al pie porque el griego y el audit trail no exigieron una alternativa textual o semántica adicional para esta línea.
