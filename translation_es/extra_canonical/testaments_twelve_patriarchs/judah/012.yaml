translation:
  language: es
  text: '1[a]. Después de esto, cuando Tamar había sido viuda por dos años y oyó que yo subía para esquilar las ovejas, se adornó con adorno nupcial y se sentó en Enaim, en la puerta de la ciudad de la posada. 2. Porque era ley de los amorreos que una viuda se sentara allí para prostitución. 3. Entonces, cuando yo estaba ebrio de vino, no la reconocí, y me engañó por su belleza, por el aspecto de su adorno. 4[b]. Y, apartándome hacia ella, le dije: «Entraré a ti». Y ella dijo: «¿Qué me darás?». Y le di mi vara y mi anillo y el diadema de mi reino como prenda. Y cuando había entrado a ella, concibió. 5. Pero yo, no sabiendo lo que había hecho, quería matarla. Sin embargo, ella envió secretamente las prendas y me avergonzó. 6. Y cuando la llamé, oí también las palabras secretas que, mientras dormía con ella en mi embriaguez, había hablado. Y no pude matarla, porque era de Yahvé. 7. Pues yo decía: «Tal vez hizo esto con engaño, habiendo recibido la prenda de otra». 8. Pero no me acerqué a ella
    otra vez por el resto de mi vida, porque había hecho esta abominación en todo Israel. 9. Sin embargo, los de la ciudad decían que no había prostituta en la puerta, porque había venido de otro lugar y se había sentado por un poco de tiempo en la puerta. 10. Y supuse que nadie sabía que yo había entrado a ella. 11. Y después de esto vinimos a Egipto a José a causa del hambre. 12. Yo tenía entonces cuarenta y seis años, y pasé setenta y tres años en Egipto.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego lee literalmente «la posada» (πανδοχεῖον), un detalle inusual frente al relato de Génesis; la traducción conserva el testimonio en vez de armonizarlo.
    reason: textual_variant
  - marker: b
    text: Hay rasgos textuales en este capítulo que difieren del relato de Génesis, especialmente los objetos entregados como prenda. El griego aquí lee «mi vara y mi anillo y el diadema de mi reino».
    reason: textual_variant
lexical_decisions:
- source_word: Μετὰ δὲ ταῦτα
  english_pob_choice: After this
  chosen_spanish: Después de esto
  alternatives_spanish:
  - Luego de esto
  - Tras esto
  lexicon: LSJ
  rationale: Expresa el valor temporal sin añadir interpretación; es una fórmula natural en español bíblico moderno.
- source_word: χηρευούσης / χηρεύουσαν
  english_pob_choice: had been a widow / a widow
  chosen_spanish: había sido viuda / viuda
  alternatives_spanish:
  - estaba viuda
  - viuda
  lexicon: LSJ
  rationale: Conserva el estado social de Tamar y el matiz de viudez ya establecida durante un periodo.
- source_word: κοσμηθεῖσα κόσμῳ νυμφικῷ
  english_pob_choice: adorned herself with bridal adornment
  chosen_spanish: se adornó con adorno nupcial
  alternatives_spanish:
  - se vistió con adorno de novia
  - se engalanó con adorno nupcial
  lexicon: LSJ
  rationale: Mantiene el énfasis del doble lenguaje griego sobre el arreglo deliberado, sin suavizar la repetición semántica.
- source_word: ἐν Ἐνὰν τῇ πόλει πρὸς τὴν πύλην
  english_pob_choice: in Enaim, at the city gate of the inn
  chosen_spanish: en Enaim, en la puerta de la ciudad de la posada
  alternatives_spanish:
  - en Enaim, junto a la puerta de la posada
  - en Enaim, en la puerta del poblado y de la posada
  lexicon: LSJ
  rationale: Preserva el detalle transmitido de πόλις + πύλη + πανδοχεῖον/posada, sin armonizar con Génesis ni borrar la rareza textual.
- source_word: Νόμος γὰρ ἦν τῶν Ἀμορραίων τὴν χηρεύουσαν προκαθεσθαι
  english_pob_choice: it was a law of the Amorites that a widow should sit there for prostitution
  chosen_spanish: era ley de los amorreos que una viuda se sentara allí para prostitución
  alternatives_spanish:
  - era costumbre de los amorreos que una viuda se sentara allí para prostituirse
  - era ley de los amorreos que una viuda se sentara allí para ejercer prostitución
  lexicon: LSJ
  rationale: '''Para prostitución'' conserva la crudeza del enunciado y su función social; evita reemplazarla por un eufemismo.'
- source_word: οὐκ ἐπέγνων αὐτήν
  english_pob_choice: I did not recognize her
  chosen_spanish: no la reconocí
  alternatives_spanish:
  - no supe quién era
  - no la identifiqué
  lexicon: LSJ
  rationale: La acción es reconocimiento visual/identificatorio en un contexto de disfraz y embriaguez.
- source_word: ἠπάτησέ με τὸ κάλλος αὐτῆς διὰ τοῦ σχήματος τῆς κοσμήσεως
  english_pob_choice: she deceived me by her beauty through the appearance of her adornment
  chosen_spanish: me engañó por su belleza, por el aspecto de su adorno
  alternatives_spanish:
  - me engañó mediante su belleza, por la apariencia de su adorno
  - me sedujo con su belleza, por la forma de su adorno
  lexicon: LSJ
  rationale: Conserva la causalidad visual del griego y evita intensificar a 'sedujo', que iría más allá del texto.
- source_word: ἐκκλίνας πρὸς αὐτήν
  english_pob_choice: turning aside to her
  chosen_spanish: apartándome hacia ella
  alternatives_spanish:
  - desviándome hacia ella
  - volviéndome hacia ella
  lexicon: LSJ
  rationale: Reproduce el movimiento deliberado sin importar un giro más idiomático que oculte el matiz de desviación.
- source_word: Εἰσέρχομαι πρὸς σε
  english_pob_choice: I will come in to you
  chosen_spanish: Entraré a ti
  alternatives_spanish:
  - Iré a ti
  - Entraré contigo
  lexicon: LSJ
  rationale: Conserva el idiomatismo sexual del griego con una forma natural en español, sin explicitar más de lo que dice el texto.
- source_word: ῥάβδον
  english_pob_choice: staff
  chosen_spanish: vara
  alternatives_spanish:
  - bastón
  - cetro
  lexicon: LSJ
  rationale: '''Vara'' es clara y sobria en español; mantiene la referencia material sin introducir una lectura demasiado moderna.'
- source_word: διάδημα τῆς βασιλείας μου
  english_pob_choice: the diadem of my kingdom
  chosen_spanish: el diadema de mi reino
  alternatives_spanish:
  - la diadema de mi reino
  - la corona de mi reino
  lexicon: LSJ
  rationale: Se conserva el término regio 'diadema' y se respeta el lenguaje de realeza del testimonio, aunque resulte marcado en español.
- source_word: εἰς ἀρραβῶνα / τοὺς ἀρραβῶνας
  english_pob_choice: as a pledge / the pledges
  chosen_spanish: como prenda / las prendas
  alternatives_spanish:
  - como garantía / las garantías
  - como señal / las señales
  lexicon: LSJ
  rationale: '''Prenda'' expresa con precisión la función de garantía y permite el plural posterior sin forzar el significado.'
- source_word: συνήλθον αὐτῇ / συνελήφθη
  english_pob_choice: when I had gone in to her, she conceived
  chosen_spanish: cuando había entrado a ella, concibió
  alternatives_spanish:
  - cuando me uní a ella, concibió
  - cuando yacido con ella, concibió
  lexicon: LSJ
  rationale: Mantiene la secuencia narrativa y el eufemismo bíblico de unión sexual con el mínimo de expansión necesaria.
- source_word: ἤθελον αὐτὴν ἀνελεῖν
  english_pob_choice: wanted to kill her
  chosen_spanish: quise matarla
  alternatives_spanish:
  - quise darle muerte
  - quise destruirla
  lexicon: LSJ
  rationale: '''Matarla'' es directo y evita atenuar el verbo de muerte real que usa el griego.'
- source_word: κατῄσχυνέ με
  english_pob_choice: put me to shame
  chosen_spanish: me avergonzó
  alternatives_spanish:
  - me llenó de vergüenza
  - me cubrió de vergüenza
  lexicon: LSJ
  rationale: '''Avergonzó'' comunica la deshonra pública implicada en el verbo, aunque en español requiere un verbo más simple.'
- source_word: τοὺς ἐν μυστηρίῳ λόγους
  english_pob_choice: the secret words
  chosen_spanish: las palabras secretas
  alternatives_spanish:
  - las palabras dichas en secreto
  - las palabras ocultas
  lexicon: LSJ
  rationale: Preserva la extrañeza del plural con μυστηρίῳ y el sentido de habla privada no pública.
- source_word: παρὰ Κυρίου ἦν
  english_pob_choice: it was from the Lord
  chosen_spanish: era de Yahvé
  alternatives_spanish:
  - venía de Yahvé
  - procedía de Yahvé
  lexicon: LSJ
  rationale: Se usa el nombre divino de forma directa según la pauta del proyecto para יהוה; la fórmula mantiene la tensión providencial sin resolverla.
- source_word: ἐν δολιότητι
  english_pob_choice: deceitfully
  chosen_spanish: con engaño
  alternatives_spanish:
  - con dolo
  - con astucia
  lexicon: LSJ
  rationale: Reproduce el juicio inicial de Judah sin introducir una valoración más fuerte que el adverbio griego.
- source_word: παρὰ ἑτέρας
  english_pob_choice: from another
  chosen_spanish: de otra
  alternatives_spanish:
  - de otra mujer
  - de otro lado
  lexicon: LSJ
  rationale: Respeta la ambigüedad del griego y evita añadir 'mujer', que no aparece en el texto base.
- source_word: βδέλυγμα
  english_pob_choice: abomination
  chosen_spanish: abominación
  alternatives_spanish:
  - cosa abominable
  - detestación
  lexicon: LSJ
  rationale: Conserva la gravedad moral y el registro confesional del término.
- source_word: τελεσικόμενον / τελισκομένην
  english_pob_choice: no prostitute / harlot
  chosen_spanish: prostituta
  alternatives_spanish:
  - ramera
  - meretriz
  lexicon: LSJ
  rationale: '''Prostituta'' es claro, neutral y consistente con el campo semántico del pasaje.'
- source_word: ἐξ ἄλλου χωρίου
  english_pob_choice: from another place
  chosen_spanish: de otro lugar
  alternatives_spanish:
  - de otro sitio
  - de otra comarca
  lexicon: LSJ
  rationale: No precisa más de lo que el griego da; evita especificar distrito o aldea sin base.
- source_word: εἰσῆλθον πρὸς αὐτήν
  english_pob_choice: I had gone in to her
  chosen_spanish: había entrado a ella
  alternatives_spanish:
  - había ido a ella
  - había ido a su casa
  lexicon: LSJ
  rationale: Mantiene el mismo eufemismo sexual que en el v. 4 para coherencia interna.
- source_word: διὰ τὸν λιμόν
  english_pob_choice: because of the famine
  chosen_spanish: a causa del hambre
  alternatives_spanish:
  - por el hambre
  - debido al hambre
  lexicon: LSJ
  rationale: Causa directa y natural en español; 'hambre' transmite bien el desastre de escasez.
- source_word: ἐποίησα εἰς Αἴγυπτον
  english_pob_choice: I spent ... in Egypt
  chosen_spanish: pasé ... en Egipto
  alternatives_spanish:
  - viví ... en Egipto
  - estuve ... en Egipto
  lexicon: LSJ
  rationale: '''Pasé'' conserva el valor de transcurso temporal de los años sin volverse demasiado coloquial.'
theological_decisions:
- issue: παρὰ Κυρίου ἦν en v. 6
  english_pob_reading: because it was from the Lord
  chosen_spanish_reading: porque era de Yahvé
  alternative_spanish_readings:
  - porque venía de Yahvé
  - porque procedía de Yahvé
  rationale: La frase mantiene la atribución de la situación a la agencia/providencia divina sin decidir si implica aprobación moral. Se conserva la tensión del original y del audit trail inglés.
  doctrine_reference: DOCTRINE.md §Preserve theological tension rather than resolve it
- issue: Nombre divino en una fórmula de procedencia
  english_pob_reading: from the Lord
  chosen_spanish_reading: de Yahvé
  alternative_spanish_readings:
  - del Señor
  - de Dios
  rationale: El proyecto pide Yahvé para יהוה. Aquí la fórmula apunta a fuente divina, no a un título eclesiástico, por lo que se evita la máscara 'SEÑOR'.
  doctrine_reference: 'Project terminology defaults: יהוה / YHWH -> ''Yahvé'''
- issue: Lenguaje de realeza en v. 4 ('the diadem of my kingdom')
  english_pob_reading: retain the regal wording as transmitted
  chosen_spanish_reading: el diadema de mi reino
  alternative_spanish_readings:
  - la diadema de mi reino
  - la corona de mi reino
  rationale: Se retiene el lenguaje realizado del testimonio griego, aunque resulte inusual en español. No se armoniza con Génesis ni se reduce a un ornamento genérico.
  doctrine_reference: PHILOSOPHY.md §We are not paraphrasing or smoothing an existing English translation
translation_notes:
  revision_awareness: Se siguió el pasaje revisado del audit trail inglés, pero se corrigieron las opciones que allí se habían suavizado o nivelado en exceso. En particular, se mantuvo la rareza textual de la 'posada', se preservó la crudeza de 'para prostitución', se conservó la ambigüedad de 'de otra', y se tradujo la cláusula final como procedencia divina sin resolver su sentido moral.
  spanish_consistency_notes:
  - Se mantuvo la coherencia de los eufemismos sexuales con 'entrar a ella' y 'había entrado a ella'.
  - Se reservó 'prostituta' para la persona en v. 9 y 'prostitución' para la práctica en v. 2, según el contexto.
  - Se usó 'prenda/prendas' de forma consistente para ἀρραβών en singular y plural.
  - Se mantuvo 'Yahvé' para el nombre divino, de acuerdo con las pautas del proyecto.
  - Se evitó 'Cristo', 'Señor' y otras sustituciones tradicionales no motivadas por el texto base.
