base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/012.yaml
  text: 1[a]. After this, when Tamar had been a widow for two years and heard that I was going up to shear the sheep, she adorned herself with bridal adornment and sat in Enaim, at the city gate of the inn. 2. For it was a law of the Amorites that a widow should sit there for prostitution. 3. So when I was drunk with wine, I did not recognize her, and she deceived me by her beauty through the appearance of her adornment. 4[b]. And turning aside to her I said, “I will come in to you.” And she said, “What will you give me?” And I gave her my staff and my ring and the diadem of my kingdom as a pledge. And when I had gone in to her, she conceived. 5. But I, not knowing what I had done, wanted to kill her. Yet she sent the pledges secretly and put me to shame. 6. And when I called her, I heard also the secret words that, while sleeping with her in my drunkenness, I had spoken. And I was not able to kill her, because it was from the Lord. 7. For I said, “Perhaps she did this deceitfully, having
    received the pledge from another.” 8. But I did not approach her again for the rest of my life, because I had done this abomination in all Israel. 9. Yet those in the city said that there had been no prostitute sitting at the gate, because she had come from another place and sat for a short time at the gate. 10. And I supposed that no one knew that I had gone in to her. 11. And after this we came into Egypt to Joseph because of the famine. 12. Now I was forty-six years old[d][c], and I spent seventy-three years in Egypt.
  footnotes:
  - marker: a
    text: The Greek reads 'the inn' (πανδοχεῖον), an unusual detail compared with the Genesis narrative; the translation preserves the witness rather than harmonizing it away.
    reason: textual_variant
  - marker: b
    text: Some textual features in this chapter differ from the Genesis account, especially the items given as pledge. The Greek here reads 'my staff and my ring and the diadem of my kingdom.'
    reason: textual_variant
  - marker: c
    text: Or 'the words spoken privately.' The Greek wording is textually awkward but points to words Judah uttered in secret while drunk.
    reason: lexical_alternative
  - marker: d
    text: '''Because it was from the Lord'' may express Judah''s sense of divine providence overruling the event, not necessarily approval of the act.'
    reason: alternative_reading
