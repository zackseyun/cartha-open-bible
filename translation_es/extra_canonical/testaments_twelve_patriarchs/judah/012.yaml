  text: XII. *Μετὰ δὲ ταῦτα¹ *χηρευούσης τῆς Θαμὰρ² *μετὰ ἔτη δύο³ ἀκούσασα ὅτι ἀνέρχομαι⁵ τοῦ κεῖραι⁶ τὰ πρόβατα⁷, *κοσμηθεῖσα κόσμῳ νυμφικῷ ἐκάθισεν⁸ *ἐν Ἐνὰν¹⁰ *τῇ πόλει¹¹ *πρὸς τὴν πύλην¹². 2. Νόμος γὰρ ἦν τῶν¹⁴ Ἀμορραίων¹⁵ τὴν *χηρεύουσαν¹⁶ προκαθεσθαι ¹⁷ ἐπὶ ²⁰ ἑπτὰ ἡμέρας παρὰ τὴν πύλην. 3. Μεθυσθεὶς οὖν²⁰ οἴνῳ²¹ οὐκ ἐπέγνων²² αὐτὴν²³, καὶ ἠπάτησέ²⁴ με τὸ κάλλος αὐτῆς διὰ τοῦ σχήματος²⁵ τῆς κοσμήσεως. 4. *Καὶ ἐκκλίνας²⁶ πρὸς αὐτὴν εἶπον²⁶· *Εἰσέρχομαι²⁷ πρὸς σε. *Καὶ²⁸ εἶπεν¹³¹· Τί μοι δώσεις³²; καὶ δέδωκα³³ αὐτῇ τὴν ῥάβδον μου καὶ τὸ διάδημά μου³⁷ *εἰς ἀρραβῶνα³⁸. *Καὶ ὡς συνήλθον³⁹ αὐτῇ συνελήφθη⁴⁰. 5. Ἀγνοῶν δὲ ἐγὼ⁴¹ ὃ ἐποίησα⁴², *ἤθελον αὐτὴν ἀνελεῖν⁴³· *πέμψασα δὲ κρυπτῶς τοὺς ἀρραβῶνας⁴⁴ κατῄσχυνέ με⁴⁴. 6. Καλέσας δὲ αὐτὴν⁴⁵, ἤκουσα καὶ τοὺς ἐν μυστηρίῳ λόγους⁴⁶, *οὓς καθεύδων σὺν αὐτῇ ἐν τῇ μέθῃ μου⁴⁷ ἐλάλησα. *Καὶ οὐκ ἠδυνήθην ἀνελεῖν αὐτήν, ὅτι παρὰ Κυρίου ἦν⁴⁸. 7. *Ἔλεγον γάρ· Μήποτε ἐν δολιότητι ἐποίησε παρὰ ἑτέρας λαβοῦσα τοὺς ἀρραβῶνας⁴⁹, *καὶ τοῖς πρώτοις λόγοις ἐχρήσατο
    πρὸς ἐμέ⁵⁰. 8. *Ἀλλ᾽ οὐδὲ⁵² ἤγγισα⁵³ αὐτῇ ἔτι⁵⁴ ἕως⁵⁵ τῆς ζωῆς μου⁵⁶. 9. Καίγε οἱ⁵⁷ ἐν τῇ πόλει⁵⁸ ἔλεγον, μὴ *εἶναι ἐν τῇ πύλῃ τελεσικόμενον⁶⁰, ὅτι ἐξ ἄλλου χωρίου⁶¹ ἐλθοῦσα πρὸς βραχὺ ἐκαθέσθη ἐν τῇ⁶² πύλῃ. 10. Καὶ ἐνόμιζον⁶³, ὅτι οὐδεὶς ἔγνω ὅτι εἰσῆλθον πρὸς αὐτήν⁶⁴. 11. Καὶ μετὰ ταῦτα ἤλθομεν⁶⁵ εἰς Αἴγυπτον⁶⁶ *πρὸς Ἰωσήφ⁶⁷ διὰ τὸν λιμόν⁶⁸. 12. *Ἤμην δὲ ἐγὼ ἐτῶν τεσσαράκοντα καὶ ἓξ⁶⁹, καὶ ἑβδομήκοντα καὶ⁷⁰ τρία ἔτη ἐποίησα⁷¹ εἰς Αἴγυπτον⁷².
