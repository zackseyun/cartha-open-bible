- from: '1[a]. Después de esto, cuando Tamar había sido viuda por dos años y oyó que yo subía para esquilar las ovejas, se adornó con adorno nupcial y se sentó en Enaim, en la puerta de la ciudad de la posada. 2. Porque era ley de los amorreos que una viuda se sentara allí para prostitución. 3. Entonces, cuando yo estaba ebrio de vino, no la reconocí, y me engañó por su belleza, por el aspecto de su adorno. 4[b]. Y, apartándome hacia ella, le dije: «Entraré a ti». Y ella dijo: «¿Qué me darás?». Y le di mi vara y mi anillo y el diadema de mi reino como prenda. Y cuando había entrado a ella, concibió. 5. Pero yo, sin saber lo que había hecho, quise matarla. Sin embargo, ella envió secretamente las prendas y me avergonzó. 6. Y cuando la llamé, oí también las palabras secretas que, mientras dormía con ella en mi borrachera, había hablado. Y no pude matarla, porque era de Yahvé. 7. Pues yo decía: «Tal vez hizo esto con engaño, habiendo recibido la prenda de otra». 8. Pero no me acerqué a ella
    otra vez por el resto de mi vida, porque había hecho esta abominación en todo Israel. 9. Sin embargo, los de la ciudad decían que no había prostituta sentada en la puerta, porque había venido de otro lugar y se había sentado por un poco de tiempo en la puerta. 10. Y supuse que nadie sabía que yo había entrado a ella. 11. Y después de esto vinimos a Egipto a José a causa del hambre. 12. Yo tenía entonces cuarenta y seis años, y pasé setenta y tres años en Egipto.'
