base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/012/006.yaml
  text: And when I called her, I also heard the secret words that, while sleeping with her in my drunkenness, I had spoken. And I was not able to kill her, because it was from the Lord.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:56:08Z'
    unchanged: false
    changes_summary: Adjusted word order for more natural English ('I also heard' instead of 'I heard also') and changed 'which' to 'that' for smoother formal style. Kept the rest unchanged as accurate and complete.
translation:
  language: es
  text: Y al llamarla, también oí las palabras secretas que, mientras dormía con ella en mi embriaguez, había dicho. Y no pude matarla, porque era de parte del Señor.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Καλέσας δὲ αὐτήν
  english_pob_choice: And when I called her
  chosen_spanish: Y al llamarla
  alternatives_spanish:
  - Y cuando la llamé
  - Y habiéndola llamado
  lexicon: καλέω
  rationale: La forma participial aorista se vierte de manera natural en español con una construcción temporal breve. «Al llamarla» conserva la relación temporal sin sobreactuar el valor aspectual.
- source_word: τοὺς ἐν μυστηρίῳ λόγους
  english_pob_choice: the secret words
  chosen_spanish: las palabras secretas
  alternatives_spanish:
  - las palabras en misterio
  - las palabras ocultas
  lexicon: λόγος
  rationale: El inglés POB ya entendió λόγοι como «words» y ἐν μυστηρίῳ como una cualidad de secreto/oculto. «Secretas» es natural en español y mantiene el sentido sin introducir una explicación adicional.
- source_word: καθεύδων σὺν αὐτῇ ἐν τῇ μέθῃ μου
  english_pob_choice: while sleeping with her in my drunkenness
  chosen_spanish: mientras dormía con ella en mi embriaguez
  alternatives_spanish:
  - mientras yacía con ella en mi embriaguez
  - cuando dormía con ella en mi borrachera
  lexicon: καθεύδω / μέθη
  rationale: Se conserva la relación sexual implícita del contexto con «dormía con ella», siguiendo la línea del POB en inglés. «Embriaguez» mantiene el sustantivo de registro más digno que «borrachera».
- source_word: ἐλάλησα
  english_pob_choice: I had spoken
  chosen_spanish: había dicho
  alternatives_spanish:
  - había hablado
  - lo había pronunciado
  lexicon: λαλέω
  rationale: En español, «decir» comunica mejor que «hablar» el contenido específico de las palabras pronunciadas. El pluscuamperfecto refleja correctamente la anterioridad respecto de «oí».
- source_word: Καὶ οὐκ ἠδυνήθην ἀνελεῖν αὐτήν
  english_pob_choice: And I was not able to kill her
  chosen_spanish: Y no pude matarla
  alternatives_spanish:
  - Y no fui capaz de matarla
  - Y no pude darle muerte
  lexicon: ἀναιρέω
  rationale: «Matarla» es la equivalencia directa y más transparente en español para el acto violento indicado por ἀνελεῖν. Mantiene la fuerza narrativa del texto.
- source_word: παρὰ Κυρίου ἦν
  english_pob_choice: it was from the Lord
  chosen_spanish: era de parte del Señor
  alternatives_spanish:
  - venía del Señor
  - procedía del Señor
  lexicon: παρά + genitivo / κύριος
  rationale: Se preserva la relación de procedencia con una fórmula natural en español. «Señor» sigue el POB inglés aquí; en este contexto la referencia es a la deidad, no a un título humano.
theological_decisions:
- issue: Referencia divina de Κυρίου
  english_pob_reading: it was from the Lord
  chosen_spanish_reading: era de parte del Señor
  alternative_spanish_readings:
  - era del Señor
  - procedía del Señor
  rationale: El texto griego usa Κυρίου con artículo implícito, y el contexto no introduce una alternativa clara a la referencia divina. Se conserva una expresión de procedencia que no endurece el giro idiomático más de lo necesario.
  doctrine_reference: Providencia divina; soberanía de Dios sobre los hechos narrados.
translation_notes:
  revision_awareness: El inglés POB fue ajustado mínimamente para fluidez ('I also heard' / 'that'), sin alterar el contenido. La versión española sigue ese mismo contenido y no añade explicaciones ausentes en el audit trail.
  spanish_consistency_notes:
  - Se evita 'Cristo' o terminología eclesial no presente en el pasaje.
  - '''Señor'' se mantiene solo en la clausula final por fidelidad al inglés auditado y al contexto divino del griego.'
  - El registro general es narrativo y sobrio, acorde con una traducción pública y auditable.
