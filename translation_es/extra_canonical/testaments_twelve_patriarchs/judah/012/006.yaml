  text: Καλέσας δὲ αὐτὴν⁴⁵, ἤκουσα καὶ τοὺς ἐν μυστηρίῳ λόγους⁴⁶, *οὓς καθεύδων σὺν αὐτῇ ἐν τῇ μέθῃ μου⁴⁷ ἐλάλησα. *Καὶ οὐκ ἠδυνήθην ἀνελεῖν αὐτήν, ὅτι παρὰ Κυρίου ἦν⁴⁸.
