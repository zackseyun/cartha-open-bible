translation:
  language: es
  text: Y yo supuse que nadie sabía que había entrado donde ella.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐνόμιζον
  english_pob_choice: I supposed
  chosen_spanish: yo supuse
  alternatives_spanish:
  - yo pensaba
  - yo creía
  - yo me imaginé
  lexicon: νομίζω
  rationale: El griego expresa una suposición o conclusión subjetiva; «supuse» conserva el valor de inferencia sin volverlo demasiado interpretativo.
- source_word: οὐδεὶς ἔγνω
  english_pob_choice: no one knew
  chosen_spanish: nadie sabía
  alternatives_spanish:
  - nadie conoció
  - nadie llegó a saber
  lexicon: οὐδείς + γινώσκω
  rationale: «Sabía» reproduce bien el conocimiento no percibido por otros y suena natural en español. «Conoció» sería menos idiomático aquí.
- source_word: εἰσῆλθον πρὸς αὐτήν
  english_pob_choice: I had gone in to her
  chosen_spanish: había entrado donde ella
  alternatives_spanish:
  - había entrado a verla
  - había ido a ella
  - había entrado junto a ella
  lexicon: εἰσέρχομαι πρὸς + acusativo
  rationale: La construcción griega con πρὸς αὐτήν indica acercamiento o acceso a la mujer; «donde ella» evita una formulación demasiado explícita o demasiado moderna, y conserva el sentido relacional del texto.
theological_decisions:
- issue: Expresión sexual implícita sin sobreexplicar el griego
  english_pob_reading: I had gone in to her
  chosen_spanish_reading: había entrado donde ella
  alternative_spanish_readings:
  - había tenido relaciones con ella
  - había entrado a ella
  - había ido a ella
  rationale: El texto griego usa una expresión velada; el español debe dejar la implicación sin convertirla en una paráfrasis explícita que exceda el nivel de claridad del original. «Había entrado donde ella» preserva esa reserva.
  doctrine_reference: Cuidado de fidelidad semántica al eufemismo bíblico
translation_notes:
  revision_awareness: La versión inglesa POB no añadió notas ni alternativas; el griego disponible tampoco muestra variante significativa aquí. Por eso la redacción española sigue de cerca el valor semántico del texto sin introducir aparato adicional.
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y bíblico, sin arcaísmos innecesarios.
  - Se evita «SEÑOR» o terminología doctrinal ajena porque el verso no contiene vocabulario teológico relevante.
  - El español conserva la primera persona singular implícita del narrador, como en el inglés POB.
