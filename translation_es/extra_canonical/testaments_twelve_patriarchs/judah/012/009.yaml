  text: Καίγε οἱ⁵⁷ ἐν τῇ πόλει⁵⁸ ἔλεγον, μὴ *εἶναι ἐν τῇ πύλῃ τελεσικόμενον⁶⁰, ὅτι ἐξ ἄλλου χωρίου⁶¹ ἐλθοῦσα πρὸς βραχὺ ἐκαθέσθη ἐν τῇ⁶² πύλῃ.
