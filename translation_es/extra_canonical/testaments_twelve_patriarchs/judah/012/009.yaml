base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/012/009.yaml
  text: Yet those in the city said that there had been no prostitute at the gate, because she had come from another place and sat at the gate for a short time.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:56:09Z'
    unchanged: false
    changes_summary: Replaced 'harlot sitting' with the more natural and direct 'prostitute at the gate'; reordered the final phrase to 'sat at the gate for a short time' for smoother English while preserving the Greek sense.
translation:
  language: es
  text: Y aun los que estaban en la ciudad decían que no había habido prostituta en la puerta, porque había venido de otro lugar y se había sentado en la puerta por poco tiempo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τελεσικόμενον
  english_pob_choice: prostitute
  chosen_spanish: prostituta
  alternatives_spanish:
  - ramera
  - mujer prostituta
  lexicon: No se inventa número de léxico; se toma el valor contextual del POB inglés y del contraste con la escena de la puerta.
  rationale: El griego transmitido por el testimonio apunta a una mujer sexualmente disponible en contexto narrativo; en español, 'prostituta' es directo, claro y conserva mejor el registro sobrio que 'ramera'. Evita una formulación más interpretativa que la evidencia no exige.
- source_word: ἐν τῇ πύλῃ
  english_pob_choice: at the gate
  chosen_spanish: en la puerta
  alternatives_spanish:
  - junto a la puerta
  - a la puerta
  lexicon: πύλη en contexto urbano puede ser 'puerta' o 'portón'; el POB inglés usa 'gate'.
  rationale: '''Puerta'' es el equivalente natural y amplio en español, sin perder la referencia a un acceso urbano. ''En la puerta'' reproduce la ubicación sin forzar un tecnicismo arquitectónico.'
- source_word: πρὸς βραχὺ
  english_pob_choice: for a short time
  chosen_spanish: por poco tiempo
  alternatives_spanish:
  - por un breve tiempo
  - por un rato
  lexicon: Expresión adverbial temporal.
  rationale: '''Por poco tiempo'' mantiene el matiz de brevedad de forma natural en español contemporáneo. Conserva el valor temporal sin añadir énfasis innecesario.'
theological_decisions:
- issue: La negación de la presencia de la mujer en la puerta y la posible carga moral del término
  english_pob_reading: there had been no prostitute at the gate
  chosen_spanish_reading: no había habido prostituta en la puerta
  alternative_spanish_readings:
  - no había una prostituta en la puerta
  - no se encontraba prostituta en la puerta
  rationale: La formulación mantiene la negación de existencia/presencia reportada por los que estaban en la ciudad, sin intensificar ni suavizar la valoración moral. 'Había habido' refleja la continuidad temporal del relato mejor que una simple existencia presente.
  doctrine_reference: N/A (texto narrativo extra-canónico)
translation_notes:
  revision_awareness: 'La revisión inglesa cambió ''harlot sitting'' por ''prostitute at the gate'' y reordenó la frase final. La versión española sigue esa revisión: evita una calca como ''prostituta sentada'' y usa una colocación más natural en español (''en la puerta... se había sentado en la puerta por poco tiempo'').'
  spanish_consistency_notes:
  - Se mantiene 'puerta' para πύλη de forma consistente con el inglés POB 'gate'.
  - Se conserva la secuencia narrativa con dos cláusulas causales/unidas por 'porque'.
  - Se prefiere un registro sobrio y publicable, sin arcaísmos innecesarios.
