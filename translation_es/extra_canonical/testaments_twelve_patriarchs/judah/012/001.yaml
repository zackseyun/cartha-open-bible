  edition: Charles 1908 Greek Versions (Judah source-fix v2 — T12P Pass A; α-column primary, apparatus stripped)
  text: XII. *Μετὰ δὲ ταῦτα¹ *χηρευούσης τῆς Θαμὰρ² *μετὰ ἔτη δύο³ ἀκούσασα ὅτι ἀνέρχομαι⁵ τοῦ κεῖραι⁶ τὰ πρόβατα⁷, *κοσμηθεῖσα κόσμῳ νυμφικῷ ἐκάθισεν⁸ *ἐν Ἐνὰν¹⁰ *τῇ πόλει¹¹ *πρὸς τὴν πύλην¹².
