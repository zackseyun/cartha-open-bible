base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/012/001.yaml
  text: After this, when Tamar had been a widow for two years and heard that I was going up to shear the sheep, she adorned herself with bridal attire and sat in Enaim, at the city gate of the inn.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:08Z'
    unchanged: false
    changes_summary: Removed the unnecessary comma before 'and heard' for smoother syntax, and changed 'bridal ornament' to the more natural and accurate 'bridal attire' for κόσμῳ νυμφικῷ.
translation:
  language: es
  text: Después de esto, cuando Tamar había estado viuda por dos años y oyó que yo subía para esquilar las ovejas, se adornó con atavío nupcial y se sentó en Enaim, a la puerta de la ciudad del mesón.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Μετὰ δὲ ταῦτα
  english_pob_choice: After this
  chosen_spanish: Después de esto
  alternatives_spanish:
  - Luego de esto
  - Más tarde
  lexicon: μετά + acusativo temporal; ταῦτα
  rationale: Expresa la secuencia temporal con naturalidad en español sin añadir matices no presentes en el griego.
- source_word: χηρευούσης τῆς Θαμὰρ
  english_pob_choice: when Tamar had been a widow for two years
  chosen_spanish: cuando Tamar había estado viuda por dos años
  alternatives_spanish:
  - mientras Tamar llevaba dos años viuda
  - cuando Tamar era viuda desde hacía dos años
  lexicon: χηρεύω
  rationale: Mantiene el estado de viudez y la duración temporal del participio, sin convertirlo en una afirmación más interpretativa que el texto.
- source_word: ἀκούσασα ὅτι ἀνέρχομαι
  english_pob_choice: heard that I was going up
  chosen_spanish: oyó que yo subía
  alternatives_spanish:
  - escuchó que yo iba subiendo
  - oyó que iba a subir
  lexicon: ἀκούω; ἀνέρχομαι
  rationale: Conserva el contenido auditivo y el movimiento ascendente en un español directo. El imperfecto ‘subía’ refleja bien la acción en curso del original.
- source_word: τοῦ κεῖραι τὰ πρόβατα
  english_pob_choice: to shear the sheep
  chosen_spanish: para esquilar las ovejas
  alternatives_spanish:
  - para trasquilar las ovejas
  - para cortar la lana de las ovejas
  lexicon: κείρω
  rationale: ‘Esquilar’ comunica la acción técnica del esquileo mejor que una perífrasis más explicativa; ‘ovejas’ sigue el referente literal del texto.
- source_word: κοσμηθεῖσα κόσμῳ νυμφικῷ
  english_pob_choice: she adorned herself with bridal attire
  chosen_spanish: se adornó con atavío nupcial
  alternatives_spanish:
  - se vistió con atuendo nupcial
  - se engalanó con vestidura nupcial
  lexicon: κοσμέω; κόσμος; νυμφικός
  rationale: ‘Atavío nupcial’ preserva la relación entre el verbo de adornarse y el sustantivo de adorno/ornato, sin perder la referencia a vestimenta que el ajuste inglés destacó como más natural.
- source_word: ἐκάθισεν
  english_pob_choice: sat
  chosen_spanish: se sentó
  alternatives_spanish:
  - se puso a sentarse
  - quedó sentada
  lexicon: καθίζω
  rationale: Reproduce el acto simple y concreto de sentarse sin añadir duratividad o estado no expresados explícitamente.
- source_word: ἐν Ἐνὰν
  english_pob_choice: in Enaim
  chosen_spanish: en Enaim
  alternatives_spanish:
  - en Enaín
  - en Enaim
  lexicon: topónimo Ἐνάιν
  rationale: Se conserva el topónimo según la forma ya estabilizada en el contexto inglés y la tradición textual disponible, sin castellanizarlo innecesariamente.
- source_word: τῇ πόλει
  english_pob_choice: at the city gate of the inn
  chosen_spanish: a la puerta de la ciudad del mesón
  alternatives_spanish:
  - a la puerta de la ciudad del hospedaje
  - junto a la puerta de la ciudad del mesón
  lexicon: πόλις
  rationale: El griego dice literalmente ‘a la puerta de la ciudad’; el complemento ‘del mesón’ sigue la identificación del POB inglés con el lugar. ‘Mesón’ conserva el referente de hospedaje sin imponer una terminología eclesiástica ajena.
theological_decisions:
- issue: Tratamiento del topónimo y del lugar asociado
  english_pob_reading: Enaim, at the city gate of the inn
  chosen_spanish_reading: Enaim, a la puerta de la ciudad del mesón
  alternative_spanish_readings:
  - Enaim, junto a la puerta de la ciudad del mesón
  - Enaim, a la puerta de la ciudad del hospedaje
  rationale: No hay una cuestión doctrinal directa; la decisión evita suavizar el carácter narrativo concreto del lugar. Se preserva la identificación geográfica y el término de hospedaje tal como lo reflejó el audit trail inglés.
  doctrine_reference: none
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa al preferir ‘bridal attire’ como base semántica para κόσμῳ νυμφικῷ, traducido aquí como ‘atavío nupcial’, y conserva la fluidez sin la coma innecesaria antes de ‘oyó’ que se eliminó en la revisión. También mantiene la secuencia narrativa y el matiz temporal del estado de viudez.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ para el nombre divino cuando aparezca, conforme a la convención del proyecto; este versículo no lo contiene.
  - Se evita ‘Cristo’ porque no hay terminología mesiánica en el pasaje.
  - ‘Esquilar’ se mantiene para la acción pastoral específica de κείρω.
  - ‘Mesón’ se usa como equivalente de inn/hostel en el marco narrativo, sin cargarlo de sentidos posteriores.
