translation:
  language: es
  text: Yo tenía cuarenta y seis años, y pasé setenta y tres años en Egipto.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἤμην ... ἐτῶν τεσσαράκοντα καὶ ἓξ
  english_pob_choice: Now I was forty-six years old
  chosen_spanish: Yo tenía cuarenta y seis años
  alternatives_spanish:
  - Ahora tenía cuarenta y seis años
  - Tenía cuarenta y seis años
  lexicon: ἤμην + ἐτῶν
  rationale: El griego expresa edad con una formulación idiomática de ‘ser/estar de años’. En español, ‘tenía cuarenta y seis años’ comunica de manera natural la edad sin añadir énfasis temporal innecesario. Se conserva el valor autobiográfico del enunciado.
- source_word: ἑβδομήκοντα καὶ τρία ἔτη ἐποίησα εἰς Αἴγυπτον
  english_pob_choice: I spent seventy-three years in Egypt
  chosen_spanish: pasé setenta y tres años en Egipto
  alternatives_spanish:
  - viví setenta y tres años en Egipto
  - estuve setenta y tres años en Egipto
  lexicon: ἐποίησα ... ἔτη + εἰς Αἴγυπτον
  rationale: La construcción griega literalmente dice ‘hice/realicé setenta y tres años en Egipto’, un giro idiomático para duración de estancia o transcurso de vida. ‘Pasé ... en Egipto’ refleja bien la duración y evita una calca extraña en español. ‘Viví’ sería posible, pero ‘pasé’ mantiene mejor la idea de transcurrir el tiempo sin interpretar de más.
theological_decisions:
- issue: Cómo rendir la cronología autobiográfica sin introducir matices no presentes
  english_pob_reading: Now I was forty-six years old, and I spent seventy-three years in Egypt.
  chosen_spanish_reading: Yo tenía cuarenta y seis años, y pasé setenta y tres años en Egipto.
  alternative_spanish_readings:
  - Ahora tenía cuarenta y seis años, y viví setenta y tres años en Egipto.
  - Tenía cuarenta y seis años, y estuve setenta y tres años en Egipto.
  rationale: No hay una carga doctrinal especial en el versículo; la decisión principal es de precisión histórica y naturalidad. Se evita añadir explicaciones sobre residencia, esclavitud o permanencia que el texto no explicita.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La traducción inglesa POB no tiene notas ni revisiones aplicadas para este versículo; el texto español sigue directamente el griego disponible y mantiene la equivalencia óptima de la lectura inglesa auditada.
  spanish_consistency_notes:
  - Se usa ‘Egipto’ como topónimo normalizado en español.
  - Se evita ‘fui’ o ‘era’ para la edad, porque ‘tenía’ es la formulación más natural y fiel en español.
  - ‘Pasé ... años’ conserva el valor durativo de ἐποίησα sin forzar una traducción literal poco idiomática.
