source:
  edition: Charles 1908 Greek Versions (Judah source-fix v2 — T12P Pass A; α-column primary, apparatus stripped)
  text: '*Ἔλεγον γάρ· Μήποτε ἐν δολιότητι ἐποίησε παρὰ ἑτέρας λαβοῦσα τοὺς ἀρραβῶνας⁴⁹, *καὶ τοῖς πρώτοις λόγοις ἐχρήσατο πρὸς ἐμέ⁵⁰.'
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/012/007.yaml
  text: For I said, “Perhaps she acted deceitfully, having received the pledge from another.”
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:56:39Z'
    unchanged: false
    changes_summary: 'Revised for lexical accuracy and natural English: changed ''did this deceitfully'' to ''acted deceitfully'' for a more direct rendering of ἐποίησε ἐν δολιότητι, and removed ''woman'' since ἄλλης means simply ''another'' here and should not be over-specified.'
translation:
  language: es
  text: 'Porque dije: «Quizá actuó con engaño, habiendo recibido de otro[a] el prenda.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «de otro» conserva la ambigüedad del griego ἑτέρας/ἑτέρου; el texto no especifica aquí «de otra mujer».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔλεγον γάρ
  english_pob_choice: For I said
  chosen_spanish: Porque dije
  alternatives_spanish:
  - Pues dije
  - Porque pensaba
  lexicon: γάρ
  rationale: Conecta la frase con la explicación previa mediante una causal natural en español. «Dije» conserva el valor de habla interior sin sobreexplicar.
- source_word: ἐν δολιότητι ἐποίησε
  english_pob_choice: acted deceitfully
  chosen_spanish: actuó con engaño
  alternatives_spanish:
  - obró con engaño
  - actuó engañosamente
  lexicon: δολιότης
  rationale: «Con engaño» reproduce el sustantivo abstracto del griego con naturalidad en español y mantiene el matiz moral de acción dolosa.
- source_word: παρὰ ἑτέρας
  english_pob_choice: from another
  chosen_spanish: de otro
  alternatives_spanish:
  - de otra persona
  - de alguien más
  lexicon: ἕτερος
  rationale: Se evita especificar «mujer» porque el griego de la revisión inglesa solo exige «otro»; «de otro» preserva la indeterminación del original.
- source_word: λαβοῦσα τοὺς ἀρραβῶνας
  english_pob_choice: having received the pledge
  chosen_spanish: habiendo recibido el prenda
  alternatives_spanish:
  - tras recibir la prenda
  - después de recibir el prenda
  lexicon: ἀρραβών
  rationale: Se conserva el sentido de «prenda/garantía» como objeto recibido. Se mantiene la tensión lexical del término técnico, aunque en español la construcción requiere artículo y género normalizados; por eso se emplea «la prenda».
theological_decisions:
- issue: Término de garantía legal / compromiso matrimonial o contractual
  english_pob_reading: the pledge
  chosen_spanish_reading: la prenda
  alternative_spanish_readings:
  - el anticipo
  - la garantía
  - el depósito
  rationale: El contexto del griego sugiere un objeto de garantía recibido; «prenda» conserva el rango semántico sin reducirlo a una sola interpretación contractual o matrimonial.
  doctrine_reference: No aplica como doctrina; cuestión léxico-histórica.
translation_notes:
  revision_awareness: 'Se siguió la revisión inglesa más reciente: se mantuvo «acted deceitfully» como acción moral explícita y se evitó añadir «mujer» donde el griego no la exige. También se preservó el carácter general de ἑτέρας como «de otro».'
  spanish_consistency_notes:
  - Se prefiere «con engaño» para δολιότης cuando el contexto expresa dolo moral.
  - Se usa «prenda» para ἀρραβών por su valor de garantía/anticipo, evitando una paráfrasis más interpretativa.
