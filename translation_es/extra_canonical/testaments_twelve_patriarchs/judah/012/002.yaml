base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/012/002.yaml
  text: For it was a law of the Amorites that a widow should sit openly in prostitution.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:56:39Z'
    unchanged: false
    changes_summary: Removed 'there' as unsupported by the Greek, and revised 'sit there openly for prostitution' to the more natural and accurate 'sit openly in prostitution,' reflecting προκαθέζεσθαι ἐν πορνείᾳ without adding location.
translation:
  language: es
  text: Porque era ley de los amorreos que una viuda se sentara[a] abiertamente en prostitución.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «se sentara públicamente»; el griego expresa una postura o posición visible, y la traducción evita añadir un lugar no explicitado por el texto base.
    reason: alternative_reading
lexical_decisions:
- source_word: Νόμος
  english_pob_choice: law
  chosen_spanish: ley
  alternatives_spanish:
  - norma
  - mandato
  lexicon: νόμος
  rationale: «Ley» reproduce de manera natural el valor jurídico o costumbrista del término en este contexto, y conserva la fuerza de una práctica establecida.
- source_word: Ἀμορραίων
  english_pob_choice: Amorites
  chosen_spanish: amorreos
  alternatives_spanish:
  - amorreos
  - amoritas
  lexicon: Ἀμορραῖοι
  rationale: «Amorreos» es la forma española usual y reconocible para el etnónimo bíblico.
- source_word: χηρεύουσαν
  english_pob_choice: widow
  chosen_spanish: viuda
  alternatives_spanish:
  - mujer viuda
  lexicon: χήρα
  rationale: El participio apunta a una mujer viuda; «viuda» es la traducción directa y suficiente en español.
- source_word: προκαθεσθαι
  english_pob_choice: should sit openly in prostitution
  chosen_spanish: se sentara abiertamente en prostitución
  alternatives_spanish:
  - se sentara públicamente en prostitución
  - se colocara abiertamente en prostitución
  lexicon: προκαθέζομαι
  rationale: «Sentara» conserva la imagen de estar sentada y el matiz de postura pública; «abiertamente» refleja el carácter manifiesto sin añadir localización no atestiguada.
- source_word: ἐπὶ ... παρὰ τὴν πύλην
  english_pob_choice: openly
  chosen_spanish: abiertamente
  alternatives_spanish:
  - públicamente
  - a la vista de todos
  lexicon: ἐπί / παρὰ τὴν πύλην
  rationale: La revisión inglesa eliminó la idea de «there» por no estar sustentada; en español se evita también agregar «allí». No se explicita «junto a la puerta» porque el flujo de la frase en este testimonio griego es textual y el sentido ya queda cubierto por el adverbio establecido en la tradición inglesa auditada.
theological_decisions:
- issue: La frase describe una práctica moralmente degradada atribuida a los amorreos.
  english_pob_reading: For it was a law of the Amorites that a widow should sit openly in prostitution.
  chosen_spanish_reading: Porque era ley de los amorreos que una viuda se sentara abiertamente en prostitución.
  alternative_spanish_readings:
  - Porque era ley de los amorreos que una viuda se sentara abiertamente como prostituta.
  rationale: Se mantiene la crudeza y el carácter institucional de la práctica sin suavizarla con eufemismos. «En prostitución» preserva el valor de estado/actividad reflejado por la formulación inglesa auditable.
  doctrine_reference: None
translation_notes:
  revision_awareness: 'La versión inglesa revisada eliminó «there» por no estar sustentado y ajustó la frase a «openly in prostitution». La redacción española sigue esa revisión: no añade un deíctico, conserva la idea de visibilidad pública y evita expandir el griego más allá de lo atestiguado.'
  spanish_consistency_notes:
  - Se usa «amorreos» para el etnónimo bíblico en forma plural habitual del español.
  - Se mantiene «prostitución» como sustantivo abstracto para corresponder al giro del inglés auditado y no introducir un oficio nominalizado no requerido.
  - No se usa «SEÑOR» ni otros términos reverenciales porque el verso no contiene el nombre divino.
