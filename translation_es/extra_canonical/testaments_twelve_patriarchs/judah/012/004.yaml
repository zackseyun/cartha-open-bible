base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/012/004.yaml
  text: And turning aside to her, I said, “I will come in to you.” And she said, “What will you give me?” And I gave her my staff and my ring and the diadem of my kingdom as a pledge. And when I had gone in to her, she conceived.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:56:08Z'
    unchanged: false
    changes_summary: Added a comma after the introductory participial phrase for natural English punctuation. No lexical changes were needed; the draft accurately and completely reflects the Greek.
translation:
  language: es
  text: 'Y apartándome hacia ella, le dije: «Entraré a ti». Y ella dijo: «¿Qué me darás?». Y le di mi vara, mi anillo y el diadema de mi reino como prenda[a]. Y, cuando había entrado a ella, concibió[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Prenda» también puede entenderse como «anticipo» o «garantía»; aquí traduce ἀρραβών.
    reason: lexical_alternative
  - marker: b
    text: Lit. «fue concebida»; el español directo «concibió» mantiene el sentido resultante del pasivo griego.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκκλίνας πρὸς αὐτήν
  english_pob_choice: turning aside to her
  chosen_spanish: apartándome hacia ella
  alternatives_spanish:
  - volviéndome hacia ella
  - apartándome para acercarme a ella
  lexicon: ἐκκλίνω
  rationale: The Greek participle describes a turning aside or diverting one’s movement toward her. Spanish «apartándome» preserves the bodily shift without over-translating, and «hacia ella» keeps the directional force.
- source_word: εἰσέρχομαι πρὸς σε
  english_pob_choice: I will come in to you
  chosen_spanish: Entraré a ti
  alternatives_spanish:
  - Iré a ti
  - Entraré contigo
  lexicon: εἰσέρχομαι
  rationale: The verb is literal entry, and the POB keeps the sexual euphemism direct. Spanish «entraré a ti» is the closest publication-readable rendering that preserves the source's bluntness without adding explanatory paraphrase.
- source_word: τὴν ῥάβδον μου
  english_pob_choice: my staff
  chosen_spanish: mi vara
  alternatives_spanish:
  - mi bastón
  - mi cayado
  lexicon: ῥάβδος
  rationale: «Vara» is a natural, neutral rendering for ῥάβδος in Spanish and avoids introducing pastoral overtones that «cayado» may suggest.
- source_word: τὸ διάδημά μου
  english_pob_choice: my ring and the diadem of my kingdom
  chosen_spanish: mi anillo y el diadema de mi reino
  alternatives_spanish:
  - mi anillo y la diadema de mi reino
  - mi sello y la diadema de mi reino
  lexicon: διάδημα
  rationale: The source text has both ῥάβδος and διάδημα; the English audit trail includes a ring plus diadem, and the likely intended sense is a royal insignia. Spanish keeps both items distinct, using «diadema» for the crown-like royal emblem. The article is retained as in the source sense, while the phrasing remains readable.
- source_word: εἰς ἀρραβῶνα
  english_pob_choice: as a pledge
  chosen_spanish: como prenda[a]
  alternatives_spanish:
  - como garantía
  - como señal
  lexicon: ἀρραβών
  rationale: ἀρραβών is a pledge or earnest payment. «Prenda» is the most idiomatic Spanish equivalent and preserves the contractual/demonstrative force. The footnote marks that this could also be understood more specifically as an earnest or guarantee.
- source_word: συνελήφθη
  english_pob_choice: she conceived
  chosen_spanish: concibió[b]
  alternatives_spanish:
  - quedó encinta
  - concebió y quedó embarazada
  lexicon: συλλαμβάνω
  rationale: The passive means she conceived. Spanish can state this directly as «concibió»; the footnote notes the biological sense to keep the correspondence clear.
theological_decisions:
- issue: Sexual euphemism in the speech action
  english_pob_reading: I will come in to you / when I had gone in to her
  chosen_spanish_reading: Entraré a ti / cuando había entrado a ella
  alternative_spanish_readings:
  - Iré a ti / cuando había ido a ella
  - Entraré contigo / cuando me había unido a ella
  rationale: The passage is narrating sexual intercourse in euphemistic but direct language. Spanish should preserve the source's register without softening the event into a generalized meeting or union.
  doctrine_reference: Narrative euphemism in biblical and pseudepigraphal literature; lexical fidelity to εἰσέρχομαι + εἰσέρχομαι πρὸς σε.
- issue: Royal insignia as pledge
  english_pob_reading: my staff and my ring and the diadem of my kingdom as a pledge
  chosen_spanish_reading: mi vara, mi anillo y el diadema de mi reino como prenda
  alternative_spanish_readings:
  - mi vara, mi anillo y la diadema de mi reino como prenda
  - mi vara, mi sello y la diadema de mi reino como prenda
  rationale: The source gives a set of objects offered in exchange for a pledge. Spanish should keep the listed items and the royal status language intact; the exact morphology of «diadema» versus a possible ring/seal ambiguity is preserved in the lexical decision, but the main reading mirrors the source packet and English audit trail.
  doctrine_reference: Lexical transparency; no doctrinal interpretation beyond the narrative detail.
translation_notes:
  revision_awareness: La revisión inglesa reciente solo añadió una coma tras la frase introductoria («And turning aside to her,»). No hubo cambios léxicos; el español refleja esa misma estructura con una coma natural tras la frase inicial.
  spanish_consistency_notes:
  - Se mantuvo el tono narrativo directo y la sucesión de acciones del griego.
  - Se preservó el paralelismo entre la entrada sexual y la concepción sin explicitar más de lo que el texto exige.
  - «Yahvé» no aparece porque el pasaje no contiene el nombre divino.
  - Se evitó «Señor» o lenguaje eclesiástico ajeno al testimonio narrativo.
  - La forma «diadema» conserva el matiz real de διάδημα y no se sustituyó por vocabulario litúrgico.
