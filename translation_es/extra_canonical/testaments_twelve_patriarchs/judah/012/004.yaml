  text: '*Καὶ ἐκκλίνας²⁶ πρὸς αὐτὴν εἶπον²⁶· *Εἰσέρχομαι²⁷ πρὸς σε. *Καὶ²⁸ εἶπεν¹³¹· Τί μοι δώσεις³²; καὶ δέδωκα³³ αὐτῇ τὴν ῥάβδον μου καὶ τὸ διάδημά μου³⁷ *εἰς ἀρραβῶνα³⁸. *Καὶ ὡς συνήλθον³⁹ αὐτῇ συνελήφθη⁴⁰.'
