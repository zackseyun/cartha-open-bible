base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/012/003.yaml
  text: So when I was drunk with wine, I did not recognize her, and she deceived me by her beauty through the appearance of her adornment.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:56:07Z'
    unchanged: false
    changes_summary: Added 'by' before 'her beauty' to reflect the instrumental sense more clearly and make the final clause natural in formal English without omitting any source elements.
translation:
  language: es
  text: Entonces, embriagado con vino, no la reconocí, y me engañó por su belleza, por la apariencia de su adorno.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Μεθυσθεὶς ... οἴνῳ
  english_pob_choice: So when I was drunk with wine
  chosen_spanish: Entonces, embriagado con vino
  alternatives_spanish:
  - Entonces, borracho con vino
  - Y cuando estuve ebrio con vino
  lexicon: μεθύω
  rationale: Conserva el sentido de embriaguez explícita del participio aoristo pasivo y evita suavizarlo; 'embriagado con vino' suena natural y formal en español.
- source_word: οὐκ ἐπέγνων αὐτήν
  english_pob_choice: I did not recognize her
  chosen_spanish: no la reconocí
  alternatives_spanish:
  - no la identifiqué
  - no la conocí de nuevo
  lexicon: ἐπιγινώσκω
  rationale: La idea es de falta de reconocimiento; 'reconocí' reproduce bien el valor contextual sin sobretraducción.
- source_word: ἠπάτησέ με
  english_pob_choice: she deceived me
  chosen_spanish: me engañó
  alternatives_spanish:
  - me sedujo
  - me engañó a mí
  lexicon: ἀπατάω
  rationale: '''Engañó'' expresa el acto de engaño sin introducir matices no presentes en el griego.'
- source_word: τὸ κάλλος αὐτῆς
  english_pob_choice: by her beauty
  chosen_spanish: por su belleza
  alternatives_spanish:
  - a causa de su belleza
  - mediante su belleza
  lexicon: κάλλος
  rationale: La preposición 'por' conserva el valor instrumental/medio que el inglés revisado destacó con 'by'; 'belleza' es la correspondencia directa de κάλλος.
- source_word: διὰ τοῦ σχήματος τῆς κοσμήσεως
  english_pob_choice: through the appearance of her adornment
  chosen_spanish: por la apariencia de su adorno
  alternatives_spanish:
  - a través de la apariencia de su adorno
  - por el porte de su adorno
  lexicon: σχῆμα / κόσμησις
  rationale: '''Apariencia'' refleja σχήμα en este contexto externo-visible, y ''adorno'' traduce κόσμησις de manera directa; el conjunto mantiene la relación causal/mediadora del original.'
theological_decisions:
- issue: El texto describe engaño por belleza y apariencia, sin convertirlo en una afirmación doctrinal.
  english_pob_reading: she deceived me by her beauty through the appearance of her adornment
  chosen_spanish_reading: me engañó por su belleza, por la apariencia de su adorno
  alternative_spanish_readings:
  - me sedujo por su belleza, por la apariencia de su adorno
  - me engañó con su belleza y la apariencia de su adorno
  rationale: Se conserva el lenguaje moral del pasaje sin añadir una lectura sexual o psicológica no explicitada por el texto.
  doctrine_reference: Narrative moral instruction; no doctrinal assertion beyond human susceptibility to deception.
translation_notes:
  revision_awareness: The Spanish draft follows the latest English revision by preserving the instrumental force of 'by her beauty' while keeping the final clause natural in Spanish; no further textual changes were introduced.
  spanish_consistency_notes:
  - Se mantiene 'adorno' para κόσμησις y 'apariencia' para σχήμα, evitando 'vestido' o 'ornamento' que estrecharían o desplazarían el sentido.
  - '''Embriagado con vino'' conserva la relación explícita con el vino sin omitir el participio de estado.'
  - No se introducen notas al pie porque el texto español puede reflejar el sentido base sin ambigüedad textual adicional.
