id: T12P.JUD.12.5
reference: Testament of Judah 12:5
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (Judah source-fix v2 — T12P Pass A; α-column primary, apparatus stripped)
  text: Ἀγνοῶν δὲ ἐγὼ⁴¹ ὃ ἐποίησα⁴², *ἤθελον αὐτὴν ἀνελεῖν⁴³· *πέμψασα δὲ κρυπτῶς τοὺς ἀρραβῶνας⁴⁴ κατῄσχυνέ με⁴⁴.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/012/005.yaml
  text: But I, not knowing what I had done, wanted to kill her. But she sent the pledges secretly and put me to shame.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:09Z'
    unchanged: false
    changes_summary: Replaced 'Yet' with 'But' for a more direct correspondence to δέ and smoother formal register; otherwise retained the draft.
translation:
  language: es
  text: 5. Pero yo, no sabiendo lo que había hecho, quería matarla. Pero ella envió secretamente las prendas [a] y me avergonzó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Prendas'' traduce ἀρραβῶνας en sentido de garantía o señal entregada; también podría entenderse como ''arras'' en español, pero aquí se evita por su asociación más estrecha con usos matrimoniales o eclesiales.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀγνοῶν ... ὃ ἐποίησα
  english_pob_choice: not knowing what I had done
  chosen_spanish: no sabiendo lo que había hecho
  alternatives_spanish:
  - sin saber lo que había hecho
  - ignorando lo que había hecho
  lexicon: ἀγνοέω / ποιέω
  rationale: Mantiene la ignorancia del sujeto respecto de su acción pasada sin añadir matices no presentes; 'no sabiendo' refleja bien el participio causal en español bíblico-llano contemporáneo.
- source_word: ἤθελον ... ἀνελεῖν
  english_pob_choice: wanted to kill her
  chosen_spanish: quería matarla
  alternatives_spanish:
  - quise matarla
  - deseaba matarla
  lexicon: θέλω / ἀναιρέω
  rationale: '''Quería'' expresa el deseo/intención del imperfecto; ''matarla'' comunica el valor de ἀνελεῖν con naturalidad y sin suavizar la fuerza verbal.'
- source_word: τοὺς ἀρραβῶνας
  english_pob_choice: the pledges
  chosen_spanish: las prendas
  alternatives_spanish:
  - los prenda(s)
  - los objetos empeñados
  - las arras
  lexicon: ἀρραβών
  rationale: '''Prendas'' conserva la idea de garantía/demostración comprometida por el término griego y evita ''arras'' si pudiera sugerir exclusivamente lenguaje matrimonial o litúrgico en español moderno.'
- source_word: κρυπτῶς
  english_pob_choice: secretly
  chosen_spanish: secretamente
  alternatives_spanish:
  - a escondidas
  - ocultamente
  lexicon: κρυπτῶς
  rationale: Adverbio directo y transparente; conserva el contraste narrativo con el acto público de avergonzar.
- source_word: κατῄσχυνέ με
  english_pob_choice: put me to shame
  chosen_spanish: me avergonzó
  alternatives_spanish:
  - me deshonró
  - me cubrió de vergüenza
  lexicon: καταισχύνω
  rationale: '''Avergonzó'' refleja la vergüenza/deshonra causada por la exposición de las prendas; es más idiomático en español que una calca pesada, sin perder la carga social y moral.'
theological_decisions:
- issue: Valor narrativo y moral de la vergüenza pública
  english_pob_reading: she sent the pledges secretly and put me to shame
  chosen_spanish_reading: ella envió secretamente las prendas y me avergonzó
  alternative_spanish_readings:
  - me deshonró
  - me cubrió de vergüenza
  rationale: No se introduce una tesis doctrinal adicional; se conserva el efecto moral/social del pasaje. 'Avergonzó' mantiene el impacto del acto secreto y su consecuencia pública implícita.
  doctrine_reference: No doctrinal claim beyond narrative shame/deshonor
translation_notes:
  revision_awareness: La revisión inglesa sustituyó 'Yet' por 'But' para reflejar más directamente δέ; por eso el español mantiene dos miembros introducidos por 'Pero' sin añadir una concesión adversativa distinta. También se preservó el sentido de 'pledges' con una nota léxica, anclada en el texto.
  spanish_consistency_notes:
  - Se mantiene registro bíblico claro y moderno, sin arcaísmos innecesarios.
  - '''Pero'' reproduce el valor coordinante de δέ de forma consistente con la revisión inglesa.'
  - No se capitaliza innecesariamente 'prendas' ni se introduce puntuación ajena al español actual.
