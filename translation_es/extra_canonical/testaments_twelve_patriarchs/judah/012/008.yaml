translation:
  language: es
  text: Pero no me acerqué más a ella hasta el fin de mi vida.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἤγγισα αὐτῇ ἔτι
  english_pob_choice: I did not approach her again
  chosen_spanish: no me acerqué más a ella
  alternatives_spanish:
  - no volví a acercarme a ella
  - no me aproximé de nuevo a ella
  lexicon: ἔγγίζω
  rationale: El griego expresa la idea de volver a acercarse a una mujer. En español, «acercarse a ella» comunica la acción sin volverla innecesariamente técnica; «más» traduce bien ἔτι en este contexto de repetición o continuación negativa.
- source_word: τῆς ζωῆς μου
  english_pob_choice: for the rest of my life
  chosen_spanish: hasta el fin de mi vida
  alternatives_spanish:
  - por el resto de mi vida
  - durante toda mi vida
  lexicon: ζωή
  rationale: La construcción temporal griega indica duración hasta el término de la vida. «Hasta el fin de mi vida» conserva el sentido idiomático del inglés POB y del griego sin introducir matices ajenos.
theological_decisions:
- issue: Alcance temporal del arrepentimiento implícito en la abstinencia
  english_pob_reading: I did not approach her again for the rest of my life
  chosen_spanish_reading: No me acerqué más a ella hasta el fin de mi vida
  alternative_spanish_readings:
  - No volví a acercarme a ella durante el resto de mi vida
  - No me acerqué nuevamente a ella mientras viví
  rationale: El versículo solo afirma una renuncia permanente al acercamiento, no desarrolla explícitamente la motivación moral. La redacción española conserva esa sobriedad y no añade explicaciones no presentes en el griego.
  doctrine_reference: none
translation_notes:
  revision_awareness: Este versículo difiere del inglés POB suministrado, que añade una cláusula explicativa final («because I had done this abomination in all Israel») no presente en el griego del paquete fuente. La versión española se ciñe al texto griego provisto y omite esa expansión explicativa.
  spanish_consistency_notes:
  - Se usa «me acerqué» en forma pronominal para reflejar el movimiento personal del verbo griego en primera persona.
  - Se evita «SEÑOR» u otro término teológico porque el verso no contiene un nombre divino ni una referencia explícita a Yahvé.
  - No se introduce «abominación» porque no está en el texto griego fuente de este paquete, aunque sí aparezca en la traducción inglesa auditada.
