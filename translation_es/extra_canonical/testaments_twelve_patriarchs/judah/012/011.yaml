translation:
  language: es
  text: Y después de esto fuimos a Egipto, a José, a causa del hambre.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Καὶ μετὰ ταῦτα
  english_pob_choice: And after this
  chosen_spanish: Y después de esto
  alternatives_spanish:
  - Y después de estas cosas
  - Y luego de esto
  lexicon: καί; μετά + acusativo con demostrativo
  rationale: Conserva la secuencia narrativa simple del griego y la equivalencia directa del inglés POB sin volverlo más idiomático de lo necesario.
- source_word: ἤλθομεν
  english_pob_choice: we came
  chosen_spanish: fuimos
  alternatives_spanish:
  - vinimos
  - llegamos
  lexicon: ἔρχομαι (aoristo, 1ª plural)
  rationale: En español, 'fuimos' comunica naturalmente el desplazamiento grupal del verbo griego en este contexto; 'llegamos' añade foco en la meta, y 'vinimos' puede sonar menos natural aquí.
- source_word: εἰς Αἴγυπτον
  english_pob_choice: into Egypt
  chosen_spanish: a Egipto
  alternatives_spanish:
  - entramos en Egipto
  - hacia Egipto
  lexicon: εἰς + acusativo
  rationale: '''A Egipto'' es una forma natural y fiel para el movimiento hacia un lugar; mantiene la referencia sin sobretraducir la preposición de movimiento.'
- source_word: πρὸς Ἰωσήφ
  english_pob_choice: to Joseph
  chosen_spanish: a José
  alternatives_spanish:
  - ante José
  - junto a José
  lexicon: πρός + acusativo
  rationale: El griego expresa dirección/encuentro con una persona. 'A José' preserva esa relación de llegada o acercamiento de manera sobria y fiel.
- source_word: διὰ τὸν λιμόν
  english_pob_choice: because of the famine
  chosen_spanish: a causa del hambre
  alternatives_spanish:
  - por causa del hambre
  - debido al hambre
  lexicon: διά + acusativo
  rationale: '''A causa de'' refleja bien la causalidad del griego. ''Hambre'' reproduce el sustantivo del texto sin necesidad de expandirlo a ''hambruna''.'
theological_decisions:
- issue: Referente de José y la formulación causal
  english_pob_reading: came into Egypt to Joseph because of the famine
  chosen_spanish_reading: fuimos a Egipto, a José, a causa del hambre
  alternative_spanish_readings:
  - fuimos a Egipto hacia José a causa del hambre
  - llegamos a Egipto a José por el hambre
  rationale: 'No hay tensión doctrinal especial en el verso; la decisión principal es conservar la relación narrativa: desplazamiento hacia Egipto con destino relacional a José, motivado por la escasez. La formulación evita añadir interpretaciones no presentes en el griego.'
  doctrine_reference: No aplica; verso narrativo sin afirmación doctrinal explícita.
translation_notes:
  revision_awareness: El pasaje coincide con la revisión más reciente marcada como sin cambios necesarios; por tanto, esta versión española se alinea con el texto griego fijado en el paquete de fuente y con la lectura inglesa POB sin introducir variantes.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto cuando aparezca el nombre divino, pero aquí no ocurre.
  - '''José'' se conserva como nombre propio estándar en español.'
  - No se introducen notas al pie porque el texto griego y la lectura inglesa no presentan variantes relevantes en este versículo.
