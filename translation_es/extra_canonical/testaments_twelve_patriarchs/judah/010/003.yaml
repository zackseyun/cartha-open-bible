  text: 3. Καὶ¹⁴ αὐτὸς οὐκ ἔγνω αὐτήν, κατὰ πανουργίαν τῆς μη- τρὸς αὐτοῦ¹⁵, οὐ γὰρ ἤθελεν *ἔχειν τέκ- να¹⁶ ἀπ᾿¹⁷ αὐτῆς.
