base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/010/003.yaml
  text: And he did not know her, by the scheming of his mother, for he did not want to have children by her.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:57Z'
    unchanged: false
    changes_summary: 'Removed material not present in the source about giving her to Onan and the Lord striking him down, and revised the remaining clause to match the Greek more closely: ''did not know her'' / ''by the scheming of his mother'' / ''did not want to have children by her.'''
translation:
  language: es
  text: Y él no la conoció, por la astucia de su madre, pues no quería tener hijos de ella.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: οὐκ ἔγνω αὐτήν
  english_pob_choice: he did not know her
  chosen_spanish: él no la conoció
  alternatives_spanish:
  - él no tuvo relaciones con ella
  - él no la reconoció
  lexicon: γινώσκω
  rationale: Conserva la expresión semítica literal de 'conocer' en sentido sexual, que el contexto hace claro. 'Tuvo relaciones con ella' explicita el sentido, pero va más allá de la formulación griega.
- source_word: κατὰ πανουργίαν τῆς μητρὸς αὐτοῦ
  english_pob_choice: by the scheming of his mother
  chosen_spanish: por la astucia de su madre
  alternatives_spanish:
  - por la maquinación de su madre
  - por la intriga de su madre
  lexicon: πανουργία
  rationale: πανουργία tiene el campo de astucia, artimaña o malicia. 'Astucia' preserva la idea de un plan hábil y engañoso sin intensificar innecesariamente a 'maquinación' o 'intriga'.
- source_word: οὐ γὰρ ἤθελεν ἔχειν τέκνα ἀπ᾿ αὐτῆς
  english_pob_choice: for he did not want to have children by her
  chosen_spanish: pues no quería tener hijos de ella
  alternatives_spanish:
  - pues no quería tener descendencia de ella
  - porque no deseaba engendrar hijos con ella
  lexicon: ἔχειν τέκνα
  rationale: La frase griega expresa literalmente 'tener hijos'. 'Hijos' mantiene la sencillez del original y evita introducir un matiz más técnico como 'descendencia' que no es necesario aquí.
theological_decisions:
- issue: Referencia a la conducta sexual y a la intención de evitar descendencia
  english_pob_reading: he did not know her ... for he did not want to have children by her
  chosen_spanish_reading: él no la conoció ... pues no quería tener hijos de ella
  alternative_spanish_readings:
  - él no tuvo relaciones con ella ... pues no quería tener hijos de ella
  - él no la conoció ... porque no deseaba engendrar hijos con ella
  rationale: Se mantiene el valor narrativo y moral del texto sin añadir explicaciones doctrinales ajenas. La causa final de evitar hijos queda clara en español como en el griego.
  doctrine_reference: Testament of Judah 10:3; contraste narrativo sobre intención de evitar descendencia
translation_notes:
  revision_awareness: 'This draft follows the latest revision pass by removing material not present in the source and aligning each clause closely with the Greek: ''did not know her'' / ''by the scheming of his mother'' / ''did not want to have children by her.'''
  spanish_consistency_notes:
  - Se conserva el pronombre explícito 'él' para claridad narrativa, aunque el verbo ya lo implica.
  - Se usa 'conocer' en sentido bíblico/relacional-sexual, un uso comprensible en español e históricamente atestiguado.
  - Se evita 'SEÑOR' u otros elementos no presentes en este versículo.
