  - Se mantuvo 'Tamar' y 'Aram' como nombres propios en forma común española; no se introdujeron equivalentes explicativos ni glosas.
  - La sintaxis intenta reflejar la secuencia narrativa del original sin alterar el contenido relacional (hijo, esposa, procedencia y linaje).
