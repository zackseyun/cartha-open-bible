translation:
  language: es
  text: Después de estas cosas, Er mi hijo tomó para sí como esposa a Tamar, de Mesopotamia, hija de Aram.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Μετὰ δὲ ταῦτα
  english_pob_choice: After these things
  chosen_spanish: Después de estas cosas
  alternatives_spanish:
  - Luego de estas cosas
  - Más adelante
  lexicon: μετά + ταῦτα
  rationale: Mantiene la fórmula narrativa temporal sin sobreexplicarla; en español suena natural y conserva el valor de transición secuencial del griego.
- source_word: Ἦρ / ὁ υἱός μου
  english_pob_choice: Er my son
  chosen_spanish: Er mi hijo
  alternatives_spanish:
  - Er, mi hijo
  - mi hijo Er
  lexicon: Ἦρ; ὁ υἱός μου
  rationale: Conserva el nombre propio seguido de la relación filial, como en el griego y en el audit trail inglés, sin añadir comentario interpretativo.
- source_word: ἄγεται ... εἰς γυναῖκα
  english_pob_choice: took ... for himself as a wife
  chosen_spanish: tomó para sí como esposa
  alternatives_spanish:
  - la tomó por esposa
  - tomó a Tamar como esposa para sí
  lexicon: ἄγω (en voz media/pasiva contextual) + εἰς γυναῖκα
  rationale: La construcción griega expresa adquisición matrimonial; 'tomó para sí como esposa' preserva el sentido sin forzar una equivalencia demasiado idiomática que pierda el matiz formal del texto.
- source_word: Θαμὰρ
  english_pob_choice: Tamar
  chosen_spanish: Tamar
  alternatives_spanish:
  - Thamar
  lexicon: Θαμάρ
  rationale: Nombre propio estándar en español bíblico, coherente con la forma usual y con la inteligibilidad eclesial moderna.
- source_word: ἐκ Μεσοποταμίας
  english_pob_choice: from Mesopotamia
  chosen_spanish: de Mesopotamia
  alternatives_spanish:
  - desde Mesopotamia
  - procedente de Mesopotamia
  lexicon: ἐκ + genitivo
  rationale: La preposición indica procedencia/origen; 'de Mesopotamia' es la forma más directa y natural en español.
- source_word: θυγατέρα ᾿Αράμ
  english_pob_choice: a daughter of Aram
  chosen_spanish: hija de Aram
  alternatives_spanish:
  - una hija de Aram
  - descendiente de Aram
  lexicon: θυγατέρα + genitivo
  rationale: Reproduce de manera sobria la relación de parentesco/linaje. 'Hija de Aram' mantiene la fuerza genealógica del griego sin añadir precisión no garantizada.
translation_notes:
  revision_awareness: The English audit trail removed an earlier footnote marker and standardized punctuation while retaining the same source content. The Spanish draft follows that stabilized reading and does not introduce new textual claims.
  spanish_consistency_notes:
