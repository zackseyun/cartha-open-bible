base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/010/005.yaml
  text: And when I threatened him, he went in to her, but he wasted the seed on the ground, according to the command of his mother. So he too died in wickedness. And I wanted to give Shelah also to her, but his mother did not allow it; for she acted wickedly, because she was not from the daughters of Canaan, as she herself was.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:58Z'
    unchanged: false
    changes_summary: Removed the footnote markers from the draft and corrected the final clause to match the source more closely, rendering the subject as 'she' rather than 'Tamar' for consistency with the Greek.
translation:
  language: es
  text: Y cuando lo amenacé, entró a ella, pero derramó la semilla en tierra, conforme al mandato de su madre. Así también él murió en maldad. Y quise dar también a Selom a ella, pero su madre no lo permitió; porque ella actuó malvadamente, pues no era de las hijas de Canaán, como ella misma era.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἠπείλησα αὐτῷ
  english_pob_choice: I threatened him
  chosen_spanish: lo amenacé
  alternatives_spanish:
  - lo advertí
  - lo intimidé
  lexicon: ἀπειλέω
  rationale: El griego indica una amenaza o intimidación; en español 'amenacé' es directo, natural y conserva la fuerza coercitiva del contexto sin agregar intensidad no atestiguada.
- source_word: συνῆλθε μὲν αὐτῇ
  english_pob_choice: he went in to her
  chosen_spanish: entró a ella
  alternatives_spanish:
  - se llegó a ella
  - tuvo relaciones con ella
  lexicon: συνέρχομαι
  rationale: La POB inglesa mantiene un eufemismo literal de relación sexual. En español, 'entró a ella' preserva esa forma sin convertirla en una paráfrasis explicativa más allá del texto.
- source_word: διέφθειρε δὲ τὸ σπέρμα ἐπὶ τὴν γῆν
  english_pob_choice: he wasted the seed on the ground
  chosen_spanish: derramó la semilla en tierra
  alternatives_spanish:
  - desperdició la semilla sobre la tierra
  - esparció la semilla en el suelo
  lexicon: διαφθείρω + σπέρμα
  rationale: '''Derramó'' conserva la imagen concreta y el valor corporal del griego mejor que una expresión más abstracta. ''Semilla'' sigue la decisión auditada de la POB inglesa y evita suavizar la referencia sexual/fisiológica.'
- source_word: κατὰ τὴν ἐντολὴν τῆς μητρὸς αὐτοῦ
  english_pob_choice: according to the command of his mother
  chosen_spanish: conforme al mandato de su madre
  alternatives_spanish:
  - según la orden de su madre
  - de acuerdo con el mandato de su madre
  lexicon: ἐντολή
  rationale: '''Mandato'' mantiene la fuerza de una orden con autoridad. ''Conforme a'' reproduce bien la relación normativa del griego.'
- source_word: ἐν πονηρίᾳ
  english_pob_choice: in wickedness
  chosen_spanish: en maldad
  alternatives_spanish:
  - en maldad y perversidad
  - en perversidad
  lexicon: πονηρία
  rationale: La POB inglesa usa 'wickedness'; 'maldad' es la equivalencia más natural y fiel en español. Se evita 'perversidad' por sonar más interpretativo y menos directo en este contexto.
- source_word: Ἤθελον δὲ καὶ τὸν Σηλὼμ δοῦναι αὐτῇ
  english_pob_choice: And I wanted to give Shelah also to her
  chosen_spanish: Y quise dar también a Selom a ella
  alternatives_spanish:
  - Y también quise darle a Selom
  - Y quise entregar también a Selom a ella
  lexicon: δοῦναι
  rationale: '''Dar'' conserva la estructura simple del griego y del inglés POB. Se mantiene el nombre propio ''Selom'' como forma española de Shelah, en armonía con transliteraciones bíblicas comunes y la tradición del texto.'
- source_word: ἡ μήτηρ αὐτοῦ
  english_pob_choice: his mother
  chosen_spanish: su madre
  alternatives_spanish:
  - la madre de él
  - su propia madre
  lexicon: μήτηρ
  rationale: La referencia pronominal es clara en español. No se explicita 'de él' porque el antecedente es inequívoco y el griego no lo enfatiza.
- source_word: οὐκ ἀφῆκεν
  english_pob_choice: did not allow it
  chosen_spanish: no lo permitió
  alternatives_spanish:
  - no lo dejó
  - no se lo permitió
  lexicon: ἀφίημι
  rationale: '''Permitir'' expresa bien la negación de consentimiento o autorización del griego. ''No lo permitió'' conserva la concisión del POB inglés.'
- source_word: ἐπονηρεύσατο
  english_pob_choice: she acted wickedly
  chosen_spanish: ella actuó malvadamente
  alternatives_spanish:
  - ella obró mal
  - ella hizo lo malo
  lexicon: πονηρεύομαι
  rationale: '''Actuó malvadamente'' reproduce la valoración moral explícita sin suavizarla. Se evita ''obró mal'' porque puede sonar demasiado genérico y perder el eco adverbial del griego.'
- source_word: οὐκ ἦν ἐκ τῶν θυγατέρων τῶν Χαναναίων
  english_pob_choice: because she was not from the daughters of Canaan
  chosen_spanish: pues no era de las hijas de Canaán
  alternatives_spanish:
  - porque no pertenecía a las hijas de Canaán
  - ya que no era de las hijas de Canaán
  lexicon: ἐκ + θυγατέρες
  rationale: '''No era de las hijas de Canaán'' sigue de cerca la construcción de pertenencia/origen del griego y del inglés POB, sin añadir una interpretación étnica más específica de la necesaria.'
- source_word: ὡς καὶ αὐτή
  english_pob_choice: as she herself was
  chosen_spanish: como ella misma era
  alternatives_spanish:
  - tal como ella misma era
  - igual que ella misma era
  lexicon: ὡς καὶ αὐτή
  rationale: La cláusula final es comparativa de identidad/origen y no nombra a Tamar en el griego. 'Como ella misma era' mantiene el sujeto pronominal y evita introducir un nombre ausente.
theological_decisions:
- issue: Expresión de la conducta sexual y la valoración moral
  english_pob_reading: he went in to her, but he wasted the seed on the ground... So he too died in wickedness.
  chosen_spanish_reading: entró a ella... derramó la semilla en tierra... Así también él murió en maldad.
  alternative_spanish_readings:
  - tuvo relaciones con ella...
  - desperdició la semilla...
  rationale: La tradición textual aquí combina eufemismo sexual con una evaluación moral explícita. La traducción conserva ambos niveles sin dessexualizar el pasaje ni intensificarlo más allá del griego y de la POB inglesa.
  doctrine_reference: Fidelidad lexical al tenor moral del texto; no se introduce comentario doctrinal ajeno.
- issue: Identidad del sujeto en la cláusula final
  english_pob_reading: because she was not from the daughters of Canaan, as she herself was.
  chosen_spanish_reading: pues no era de las hijas de Canaán, como ella misma era.
  alternative_spanish_readings:
  - pues Tamar no era de las hijas de Canaán, como ella misma era.
  rationale: El griego usa un pronombre en la cláusula final, no el nombre 'Tamar'. Mantener 'ella' evita una explicitación no sustentada y respeta la forma de referencia del original.
  doctrine_reference: Principio de no añadir información no presente en el texto base.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente que eliminó marcas de nota y corrigió la cláusula final para reflejar el sujeto pronominal 'she' del griego, evitando el nombre 'Tamar' en esa posición.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, aunque este versículo no contiene el tetragrámaton ni un equivalente directo.
  - '''Selom'' se conserva como transliteración española consistente del nombre propio Shelah en este contexto narrativo.'
  - Se preserva la diferencia entre acción física ('entró a ella') y juicio moral ('en maldad', 'actuó malvadamente') sin armonizarlas en una sola paráfrasis.
