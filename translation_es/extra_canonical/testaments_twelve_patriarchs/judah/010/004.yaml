base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/judah/010/004.yaml
  text: During the days of the bridal chamber I gave her to Onan in levirate marriage; yet he too, in wickedness, did not know her, though he was with her for a year.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:57Z'
    unchanged: false
    changes_summary: 'Adjusted word order for clearer English and more exact correspondence to the source: ''gave Onan to her'' -> ''gave her to Onan''.'
translation:
  language: es
  text: En los días del tálamo la di a Onán en matrimonio levirático; pero también este, en maldad, no la conoció, aunque estuvo con ella por un año.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐν ταῖς ἡμέραις τοῦ θαλάμου
  english_pob_choice: During the days of the bridal chamber
  chosen_spanish: En los días del tálamo
  alternatives_spanish:
  - Durante los días de la cámara nupcial
  - En los días del lecho nupcial
  lexicon: θαλάμος
  rationale: Mantengo la imagen nupcial de la fuente con un sustantivo español breve y solemne. «Tálamo» comunica la esfera matrimonial sin convertirla en paráfrasis explicativa.
- source_word: ἐπεγάμβρευσα αὐτῇ τὸν Αὐνάν
  english_pob_choice: I gave her to Onan in levirate marriage
  chosen_spanish: le di a ella a Onán en matrimonio levirático
  alternatives_spanish:
  - la entregué a Onán en matrimonio levirático
  - la di a Onán en matrimonio de levirato
  lexicon: ἐπιγαμβρεύω
  rationale: La frase inglesa ya interpreta el verbo como un acto de dar la mujer en matrimonio levirático. En español, «le di a ella a Onán» conserva la dirección del acto y «matrimonio levirático» explicita la relación legal sin perder el valor técnico.
- source_word: ἐν πονηρίᾳ
  english_pob_choice: in wickedness
  chosen_spanish: en maldad
  alternatives_spanish:
  - en perversidad
  - con malicia
  lexicon: πονηρία
  rationale: «Maldad» es directo, bíblico y suficientemente fuerte en español. Evita suavizar la condena moral de la fuente.
- source_word: οὐκ ἔγνω αὐτήν
  english_pob_choice: did not know her
  chosen_spanish: no la conoció
  alternatives_spanish:
  - no la trató íntimamente
  - no tuvo relaciones con ella
  lexicon: γινώσκω
  rationale: Conservo la fórmula bíblica tradicional «conocer» para la relación sexual implícita, porque reproduce la reserva semítica/grecolatina del original sin añadir explicitación innecesaria.
- source_word: ποιήσας σὺν αὐτῇ ἐνιαυτόν
  english_pob_choice: though he was with her for a year
  chosen_spanish: aunque estuvo con ella por un año
  alternatives_spanish:
  - habiendo estado con ella por un año
  - aunque convivió con ella durante un año
  lexicon: ποιέω + σὺν + ἐνιαυτός
  rationale: La construcción indica permanencia temporal en su compañía. «Estuvo con ella por un año» comunica el período sin forzar una lectura más concreta que la evidencia textual.
theological_decisions:
- issue: Matrimonio levirático como institución familiar y legal
  english_pob_reading: in levirate marriage
  chosen_spanish_reading: en matrimonio levirático
  alternative_spanish_readings:
  - en matrimonio de levirato
  - según el levirato
  rationale: La fuente trata una unión con finalidad levirática; la traducción conserva el término técnico para no diluir la práctica legal-familiar que el relato presupone.
  doctrine_reference: Dt 25:5-10; Gn 38:8
- issue: Eufemismo sexual de «no la conoció»
  english_pob_reading: did not know her
  chosen_spanish_reading: no la conoció
  alternative_spanish_readings:
  - no se unió a ella
  - no tuvo relaciones con ella
  rationale: El POB inglés conserva el eufemismo. En español también conviene preservarlo para no sustituir la voz del texto por una explicación moderna que borre la tensión narrativa.
  doctrine_reference: Gn 4:1; Gn 38:8-10
translation_notes:
  revision_awareness: 'La redacción española sigue el ajuste más reciente del POB inglés, que corrigió el orden para reflejar con mayor precisión la fuente: la mujer fue dada a Onán, no Onán a ella. Por ello la versión española mantiene la estructura «le di a ella a Onán» y no invierte el complemento indirecto. No se añadieron notas de pie porque el pasaje ya queda suficientemente claro en español sin introducir variantes textuales no atestiguadas por el paquete fuente.'
  spanish_consistency_notes:
  - Se preservó «Onán» como nombre propio sin adaptación adicional.
  - Se usó «Yahvé» solo cuando la fuente lo requiera; este versículo no contiene el tetragrama en la línea inglesa principal.
  - Se evitó «siervo» o «esclavo» porque no aparecen en este pasaje.
  - Se mantuvo el registro bíblico sobrio y no se amplificó con explicaciones narrativas ajenas al texto.
