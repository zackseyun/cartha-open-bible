translation:
  language: es
  text: Pero Er era malvado, y un ángel de Yahvé lo mató.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἦν δὲ ὁ Εἰρ πονηρός / Ἦν δὲ Ἦρ πονηρός
  english_pob_choice: But Er was wicked
  chosen_spanish: Pero Er era malvado
  alternatives_spanish:
  - Pero Er era perverso
  - Pero Er era impío
  lexicon: πονηρός
  rationale: «Malvado» reproduce bien el juicio moral fuerte del griego y corresponde al valor simple y directo de la POB inglesa. Se evita suavizarlo con «malo» y también se evita un término más interpretativo como «impío».
- source_word: ἄγγελος Κυρίου
  english_pob_choice: an angel of the Lord
  chosen_spanish: un ángel de Yahvé
  alternatives_spanish:
  - un ángel del Señor
  - un mensajero de Yahvé
  lexicon: ἄγγελος + Κυρίου
  rationale: Se conserva «ángel» como la opción más natural para ἄγγελος en este contexto narrativo. Para Κυρίου, el proyecto exige «Yahvé» como forma principal del nombre divino; por eso se traduce «de Yahvé» en lugar de la convención eclesiástica «del Señor».
theological_decisions:
- issue: Nombre divino en Κυρίου dentro de la expresión «ángel del Señor»
  english_pob_reading: an angel of the Lord
  chosen_spanish_reading: un ángel de Yahvé
  alternative_spanish_readings:
  - un ángel del Señor
  rationale: Aunque la POB inglesa usa «Lord», el marco editorial español de este proyecto pide restituir el nombre divino como «Yahvé». No hay aquí una razón textual para ocultarlo con mayúsculas o con una sustitución tradicional.
  doctrine_reference: Convención editorial del nombre divino (YHWH -> Yahvé)
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios; por tanto, se sigue la lectura estable del texto inglés POB: «But Er was wicked, and an angel of the Lord killed him.» La forma breve del pasaje griego aparece con variantes manuscritas, pero la idea central coincide con la tradición seguida por la POB inglesa.'
  spanish_consistency_notes:
  - 'Se mantiene la terminología editorial del proyecto: Yahvé para el nombre divino, sin recurrir a «SEÑOR».'
  - No se añade puntuación explicativa ni notas textuales porque la línea inglesa no llevaba notas y el verso español puede mantenerse directo y legible.
  - «Malvado» preserva la fuerza moral del juicio sin convertirlo en una paráfrasis doctrinal.
