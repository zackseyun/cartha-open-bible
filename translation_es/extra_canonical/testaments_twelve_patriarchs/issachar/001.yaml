  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/issachar/001.yaml
  text: '1[a]. Listen, children of Issachar your father; give ear to the words of one beloved by the Lord.


    2. I was born as Jacob’s fifth son, as the wages of the mandrakes.


    3. For Reuben my brother brought mandrakes from the field, and Rachel met him and took them.


    4. But Leah my mother came out at his cry and was weeping.


    5. Now these were sweet-smelling fruits, which grow in the land of Haran below a water-course.


    6. And Rachel said, “I will not give them to you, but I will keep them in exchange for children; for the Lord has overlooked me, and I have borne no children to Jacob.”


    7. So there were two fruits. And Leah said to Rachel, “Is it not enough for you that you have taken my husband? Will you also take these from me?”


    8. And Rachel said to her, “Then let Jacob be with you tonight in exchange for your son’s mandrakes.”


    9. But Leah said to her, “Jacob is mine, for I am the wife of his youth.”


    10. And Rachel said, “Do not boast, and do not glorify yourself, for he was joined to me before you, and because of me he served our father fourteen years.”


    11. But by craftiness Laban deceived me, and in the night he removed me, and did not allow Jacob to see me; for if I had been there, this would not have happened to him.


    12[b]. Yet even so, in exchange for the mandrakes I hired out to you one night with Jacob.


    13. And Jacob knew Leah that night, and she conceived and bore me; and because of this I was called Issachar, that is, wages.


    14. Therefore, my children, I learned that simplicity is good.


    15. And I became a farmer for my father and my brothers, and I brought in fruits from the field according to their season.


    16. And my father blessed me, because he saw that I walked in simplicity.


    17. For I was not meddlesome in my dealings, nor envious against my neighbor.


    18. I did not slander anyone, nor did I attack the life of any man.


    19. I walked with singleness of eye, doing all things in sincerity of heart.


    20. Keep, therefore, the law of God, my children, and acquire simplicity, and walk in guilelessness, not busying yourselves with meddling in the affairs of your neighbor,


    21. but love the Lord and your neighbor; have compassion on the poor and the weak.


    22. Bend your back to farming, and labor in works upon the earth in every kind of husbandry, offering thankfulness to the Lord.


    23. For from the firstfruits of the earth the Lord will bless you, just as he blessed all the saints from Abel until now.


    24. For no other portion is given to you than the fatness of the earth, whose fruits are raised by toil.


    25. For our father Jacob blessed me with blessings of the earth and of firstfruits.


    26. Levi and Judah were glorified by the Lord among the sons of Jacob;


    27. to them it was given to inherit from the Lord, namely the priesthood and the kingdom.


    28. Therefore do not exalt yourselves over them, but obey Levi and Judah.


    29. For from them the Lord will raise up salvation for Israel.


    30. And now I command you: do not divide yourselves into two heads, for every beast with two heads is an abomination to the Lord.


    31. But walk in singleness, holding fast to the law of the Lord and obeying your father’s words.


    32. Know that in the last times your sons will forsake simplicity and will cling to greed;


    33. and leaving guilelessness, they will draw near to malice; and forsaking the commandments of the Lord, they will cling to Beliar.


    34. And leaving husbandry, they will follow after their own evil desires, and they will be scattered among the nations and will serve their enemies.


    35. Therefore tell these things to your children, so that if they sin, they may quickly return to the Lord;


    36. for he is merciful, and he will deliver them and bring them back into their land.


    37. See, as you see, I am one hundred and twenty-six years old and am not conscious of committing any sin unto death.


    38. Except for my wife, I have not known any woman.


    39. I have not drunk wine, so as to be led astray by it.


    40. No desire for beautiful things deceived me.


    41. Guile did not arise in my heart.


    42. A lie did not pass through my lips.


    43. If any poor man or afflicted person was in distress, my inward parts groaned with him.


    44. I shared my bread with the poor.


    45. I did not eat alone.


    46. I clothed the naked.


    47. If I saw a man in need, I wept over him.


    48. And my father rejoiced greatly in my guilelessness.


    49. And now hear me, my children, and walk in simplicity of heart,


    50. because I know that all who are single-hearted in the Lord will be pleasing to him.


    51. The simple man does not desire gold, he does not wrong his neighbor, he does not crave many kinds of food,


    52. he does not long for varied clothing, he does not desire to live a long life,


    53. but only waits for the will of God.


    54. And the spirits of deceit have no power against him, for he does not look on the beauty of women, lest he should pollute his mind with corruption.


    55. There is no envy in his thoughts, no malicious person darkens his soul, and no greed troubles his life.


    56. He walks in uprightness of life and sees all things in sincerity, turning his eyes away from the error of the world,


    57. lest he should see any of the commandments of the Lord being transgressed.


    58. Keep these things, therefore, my children, and every spirit of Beliar will flee from you, and no deed of wicked men will rule over you.


    59. And every wild beast you will subdue, having with you the God of heaven, who grants good things to all in simplicity.


    60. And when Issachar had finished commanding his sons, he drew up his feet onto the bed and died in a good old age.


    61[e][d][c]. And his sons laid him on a bier and afterward carried him up to Hebron and buried him there with his fathers.'
  footnotes:
  - marker: a
    text: Verse 13 preserves the wordplay between 'wages/hire' and the name Issachar, echoing the Genesis mandrake narrative.
    reason: cross_reference
  - marker: b
    text: The Greek tradition of this chapter is textually complex in its opening narrative, with overlap from the Genesis account and some manuscript instability. The translation follows the supplied Greek witness as a coherent chapter.
    reason: textual_variant
  - marker: c
    text: '''Beliar'' reflects the Greek form of the name; some readers may know the form ''Belial.'''
    reason: lexical_alternative
  - marker: d
    text: '''Sweet-smelling fruits'' could also be rendered ''fragrant apples,'' but the Greek term is broad enough to avoid a narrower identification.'
    reason: lexical_alternative
  - marker: e
    text: '''Salvation'' in verse 29 could also be rendered ''deliverance''; the broader term was chosen to preserve the theological range of the Greek.'
    reason: lexical_alternative
