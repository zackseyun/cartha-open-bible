  text: Διαθήκη Ἰσαχὰρ τοῦ πέμπτου υἱοῦ Ἰακὼβ καὶ Λείας¹. I. ¹᾿Αντίγραφον λόγων Ἰσαχάρ. *Καλέσας γὰρ τοὺς υἱοὺς αὐτοῦ εἶπεν αὐτοῖς²· ἀκούσατε³ τέκνα⁴ Ἰσαχὰρ τοῦ πατρὸς ὑμῶν⁵, ἐνωτίσασθε ῥήματα ἠγαπημένου⁶ ὑπὸ Κυρίου. 2. *Ἐγὼ ἐτέχθην ⁷πέμπτος υἱὸς τῷ Ἰακώβ⁷ ἐν μισθῷ τῶν μανδραγόρων⁸. 3. Ῥουβὶμ⁹ *γὰρ ¹⁰ὁ ἀδελφός μου¹⁰ ἤνεγκεν μανδραγόρους¹¹ *ἐκ τοῦ ἀγροῦ¹², καὶ¹³ προσαπαντήσασα¹⁴ *ἡ Ῥαχιὴλ¹⁵ ⌜αὐτὸν⌝¹⁶ ἔλαβεν¹⁷ αὐτούς¹⁸. 4. Ἔκλαιε¹⁹ δὲ ²⁰Ῥουβὶμ²⁰, καὶ ἐπὶ τῇ φωνῇ αὐτοῦ ἐξῆλθεν²² Λεία ἡ μήτηρ μου²³. 5. *⁹Ἦσαν δὲ ταῦτα μῆλα²⁴ εὔοσμα²⁵, *ἅπερ γίνονται²⁶ *ἐν τῇ γῇ Χαράν²⁷ ὑποκάτω φάραγγος ὑδάτων. 6. Εἶπε δὲ Ῥαχήλ· οὐ δώσω *σοι ταῦτα²⁸, *ἀλλ᾽ ἵνα σχῶ ταῦτα²⁹ ἀντὶ τέκνων· *παρεῖδε γάρ με ὁ Κύριος, καὶ τέκνα οὐκ ἐγέννησα τῷ Ἰακώβ. 7. Δύο οὖν ἦσαν τὰ μῆλα³⁰. Καὶ εἶπεν ἡ³¹ Λία ⌜πρὸς Ῥαχήλ⌝³². *Ἱκανούσθω σοι³³ ὅτι ἔλαβες τὸν ἄνδρα³⁴ μου· μὴ καὶ ταῦτα³⁵ λήψῃ³⁶ ⌈ἀπ᾿ ἐμοῦ⌉³⁷; 8. *Εἶπε δὲ αὐτῇ Ῥαχήλ³⁸. Ἔστω³⁹ σοι ὁ⁴⁰ Ἰακὼβ *τῇ νυκτὶ ταύτῃ⁴¹ ἀντὶ τῶν μανδραγόρων ⌈*τοῦ υἱοῦ⁴² σου⌉. 9. *Εἶπε δὲ πρὸς αὐτὴν ἡ
    Λεία⁴³. *ἐμός ἐστιν ὁ Ἰακώβ⁴⁴, *ὅτι ἐγώ εἰμι⁴⁵ γυνὴ⁴⁶ νεότητος αὐτοῦ. 10. *Καὶ εἶπε Ῥαχήλ⁴⁷. *Μὴ καυχῶ μηδὲ δόξαζε σεαυτήν⁴⁸, *ὅτι ἐμὲ πρότερόν σου ἡρμόσατο⁴⁹, καὶ *δι᾽ ἐμὲ⁵⁰ ἐδούλευσε *τῷ πατρὶ ἡμῶν⁵¹ *ἔτη δεκατέσσαρα⁵². 11. *Καὶ εἰ μὴ ὁ δόλος ἐπλήθυνεν ἐπὶ τῆς γῆς καὶ ἡ πονηρία τῶν ἀνθρώπων ἐχώρησεν, οὐκ ἂν εἶ σὺ ὁρῶσα τὸ πρόσωπον τοῦ Ἰακώβ⁵³. 12. ⁵⁴Λαβὰν δὲ⁵⁴ ⁵⁵ἐν ⌜δόλῳ⌝⁵⁵ ⁵⁶ἠπάτησέ⁵⁶ με *⁵⁷καὶ μετέστησέ με τὴν νύκτα ἐκείνην⁷, καὶ⁵⁸ οὐκ εἴασε *Γτῷ Ἰακὼβ ἰδεῖν με, ἐπεί⁷, ἐὰν ἤμην ἐκεῖ⁵⁹, *τοῦτο αὐτῷ οὐκ ἐγένετο⁶⁰. 13. *Ἀλλ᾽ οὖν ἀντὶ τῶν μανδραγόρων ἐκμισθῶ σοι μίαν νύκτα τῷ Ἰακώβ⁶¹. 14. ⌈Καὶ προσέθηκε Ῥαχὴλ λαλεῖν καὶ εἶπεν. Ἕνα τῶν μανδραγόρων λήψομαι, καὶ ἀντὶ τοῦ ἑνὸς ἐκμισθώσω σοι ἐν τῇ νυκτί⌉. 15. *⁶²Ἔγνω δὲ Ἰακὼβ τῇ Λείᾳ⁶², καὶ Γσυλλαβοῦσα¹ *ἔτεκεν ἐμέ⁶³, καὶ διὰ Γτούτου⁶⁴ τὸν μισθὸν ἐκλήθην⁶⁵ Ἰσαχάρ.
