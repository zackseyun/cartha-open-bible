translation:
  language: es
  text: '1[a]. Escuchen, hijos de Isacar, su padre; presten oído a las palabras de aquel que es amado por el Señor.



    2. Yo nací como el quinto hijo de Jacob, como salario de las mandrágoras.



    3. Pues Rubén, mi hermano, trajo mandrágoras del campo, y Raquel salió a su encuentro y se las quitó.



    4. Pero Lía, mi madre, salió al oír su llanto.



    5. Eran estos frutos fragantes, que crecen en la tierra de Harán, debajo de un cauce de aguas.



    6. Y Raquel dijo: «No te las daré, sino que las guardaré a cambio de hijos; pues el Señor me ha pasado por alto, y no he dado hijos a Jacob».



    7. Eran, pues, dos los frutos. Y Lía dijo a Raquel: «¿No te basta con haberme tomado el marido? ¿También me las quitarás?».



    8. Y Raquel le dijo: «Pues entonces que esté Jacob contigo esta noche, a cambio de las mandrágoras de tu hijo».



    9. Pero Lía le dijo: «Jacob es mío, pues yo soy la mujer de su juventud».



    10. Y Raquel dijo: «No te jactes ni te glorifiques, pues a mí me desposó antes que a ti, y por mí sirvió a nuestro padre catorce años».



    11. Pero por engaño Labán me defraudó y, en la noche, me apartó, y no permitió que Jacob me viera; pues si yo hubiera estado allí, esto no le habría sucedido a él.



    12[b]. Aun así, a cambio de las mandrágoras te alquilo una noche con Jacob.



    13. Y Jacob conoció a Lía aquella noche, y ella concibió y me dio a luz; y por causa de esto fui llamado Isacar, es decir, salario.



    14. Por tanto, hijos míos, aprendí que la sencillez es buena.



    15. Y me hice agricultor para mi padre y mis hermanos, y traía frutos de los campos según su tiempo.



    16. Y mi padre me bendijo, porque vio que yo caminaba en sencillez.



    17. Pues no era entrometido en mis tratos, ni envidioso contra mi prójimo.



    18. No calumnié a nadie, ni ataqué la vida de hombre alguno.



    19. Caminé con ojo sencillo, haciendo todas las cosas con sinceridad de corazón.



    20. Guarden, pues, la ley de Dios, hijos míos, y adquieran la sencillez, y caminen sin malicia, sin entrometerse en los asuntos del prójimo,



    21. sino amen al Señor y al prójimo; tengan compasión del pobre y del débil.



    22. Inclinen sus espaldas a la labranza y trabajen en obras sobre la tierra en toda clase de cultivo, ofreciendo acción de gracias al Señor.



    23. Pues de las primicias de la tierra los bendecirá el Señor, así como bendijo a todos los santos desde Abel hasta ahora.



    24. Pues no se les da otra porción que la riqueza de la tierra, cuyos frutos se obtienen con esfuerzo.



    25. Pues nuestro padre Jacob me bendijo con bendiciones de la tierra y de las primicias.



    26. Leví y Judá fueron glorificados por el Señor entre los hijos de Jacob;



    27. a ellos les fue dado heredar de parte del Señor, a saber, el sacerdocio y el reino.



    28. Por tanto, no se exalten sobre ellos, sino obedezcan a Leví y a Judá.



    29. Pues de ellos el Señor levantará salvación[e] para Israel.



    30. Y ahora les ordeno: no se dividan en dos cabezas, pues toda bestia con dos cabezas es abominación al Señor.



    31. Antes bien, caminen en sencillez, asiéndose de la ley del Señor y obedeciendo las palabras de su padre.



    32. Sepan que en los últimos tiempos sus hijos abandonarán la sencillez y se aferrarán a la avaricia;



    33. y, dejando la inocencia, se acercarán a la malicia; y, dejando los mandamientos del Señor, se aferrarán a Beliar[c].



    34. Y, dejando la labranza, irán tras sus propios deseos malvados, y serán dispersados entre las naciones y servirán a sus enemigos.



    35. Por tanto, cuenten estas cosas a sus hijos, para que, si pecan, vuelvan pronto al Señor;



    36. pues él es misericordioso, y los librará y los hará volver a su tierra.



    37. Vean, como ven, tengo ciento veintiséis años y no soy consciente de haber cometido pecado alguno de muerte.



    38. Salvo a mi mujer, no he conocido a otra mujer.



    39. No he bebido vino al punto de ser extraviado por él.



    40. Ningún deseo de cosas hermosas me engañó.



    41. No surgió engaño en mi corazón.



    42. Mentira no pasó por mis labios.



    43. Si algún pobre o afligido estaba en angustia, mis entrañas gemían con él.



    44. Compartí mi pan con el pobre.



    45. No comí solo.



    46. Vestí al desnudo.



    47. Si veía a un hombre necesitado, lloraba por él.



    48. Y mi padre se alegraba grandemente en mi inocencia.



    49. Y ahora, óiganme, hijos míos, y caminen en sencillez de corazón,



    50. porque sé que todos los que tienen un solo corazón en el Señor le serán agradables.



    51. El sencillo no codicia oro, no agravia a su prójimo, no apetece muchos manjares,



    52. no anhela ropa variada, no desea vivir muchos años,



    53. sino que solo espera la voluntad de Dios.



    54. Y los espíritus del engaño no tienen poder contra él, pues no mira la belleza de las mujeres, no sea que contamine su mente con corrupción.



    55. No hay envidia en sus pensamientos, ningún malvado oscurece su alma, y ninguna avaricia perturba su vida.



    56. Camina en rectitud de vida y ve todas las cosas con sinceridad, apartando sus ojos del error del mundo,



    57. no sea que vea quebrantado alguno de los mandamientos del Señor.



    58. Guarden, pues, estas cosas, hijos míos, y todo espíritu de Beliar huirá de ustedes, y ningún hecho de los inicuos los dominará.



    59. Y dominarán a toda fiera salvaje, teniendo con ustedes al Dios del cielo, que concede bienes a todos los que andan en sencillez.



    60. Y cuando Isacar terminó de ordenar a sus hijos, recogió sus pies sobre la cama y murió en buena vejez.



    61[d]. Y sus hijos lo pusieron en unas andas y después lo llevaron a Hebrón y allí lo enterraron con sus padres.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El verso 13 conserva el juego de palabras entre 'paga/salario' y el nombre Isacar, haciendo eco al relato de las mandrágoras de Génesis 30.
    reason: cross_reference
  - marker: b
    text: La tradición griega de este capítulo es textualmente compleja en su narrativa inicial, con superposición del relato de Génesis y cierta inestabilidad manuscrita. La traducción sigue el testigo griego suministrado como un capítulo coherente.
    reason: textual_variant
  - marker: c
    text: '''Beliar'' refleja la forma griega del nombre; algunos lectores pueden conocer la forma ''Belial''.'
    reason: lexical_alternative
  - marker: d
    text: '''Frutos fragantes'' podría también verterse ''manzanas fragantes'' (μῆλα εὔοσμα), pero el término griego es lo bastante amplio para evitar una identificación más estrecha.'
    reason: lexical_alternative
  - marker: e
    text: '''Salvación'' en el versículo 29 (σωτηρία) podría también traducirse como ''liberación''; se eligió el término más amplio para preservar la gama teológica del griego.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠγαπημένου
  english_pob_choice: beloved
  chosen_spanish: amado
  alternatives_spanish:
  - querido
  - predilecto
  lexicon: LSJ
  rationale: '''Amado'' conserva la dignidad testamentaria del epíteto pasivo (''amado por el Señor'') sin sentimentalismo.'
- source_word: μισθός / ἐν μισθῷ
  english_pob_choice: wages
  chosen_spanish: salario
  alternatives_spanish:
  - paga
  - recompensa
  lexicon: LSJ
  rationale: '''Salario'' conserva el sentido transaccional y el juego de palabras con el nombre de Isacar (יִשָּׂשכָר ≈ ''hay paga'').'
- source_word: μανδραγόραι
  english_pob_choice: mandrakes
  chosen_spanish: mandrágoras
  lexicon: LSJ
  rationale: Identificación botánica estándar de la tradición de Génesis 30 en español.
- source_word: μῆλα εὔοσμα
  english_pob_choice: sweet-smelling fruits
  chosen_spanish: frutos fragantes
  alternatives_spanish:
  - manzanas fragantes
  - frutos de dulce aroma
  lexicon: LSJ
  rationale: El griego dice literalmente 'manzanas/frutos fragantes'; 'frutos' evita comprometerse con manzanas y conserva la descripción sensorial.
- source_word: ἁπλότης
  english_pob_choice: simplicity
  chosen_spanish: sencillez
  alternatives_spanish:
  - simplicidad
  - sinceridad
  - rectitud
  lexicon: LSJ
  rationale: Virtud central del capítulo. 'Sencillez' preserva el ideal moral de una vida no calculadora ni doble; 'simplicidad' suena más conceptual/abstracto en español moderno.
- source_word: ἀκακία
  english_pob_choice: guilelessness
  chosen_spanish: inocencia
  alternatives_spanish:
  - sin malicia
  - candor
  lexicon: LSJ
  rationale: '''Inocencia'' captura la libertad de maquinación y malicia, contrastando con la avaricia y el engaño.'
- source_word: πολυπραγμονεῖν / περίεργος
  english_pob_choice: meddling / busying yourselves with meddling
  chosen_spanish: entrometerse / entrometido
  alternatives_spanish:
  - ser indiscreto
  - inmiscuirse
  lexicon: LSJ
  rationale: Captura la idea del vicio del involucramiento intrusivo en asuntos ajenos, recurrente en los Testamentos.
- source_word: σπλάγχνα
  english_pob_choice: inward parts groaned
  chosen_spanish: entrañas gemían
  alternatives_spanish:
  - se conmovía mi corazón
  - se removían mis entrañas
  lexicon: LSJ
  rationale: Conserva la idiomática semítica/griega de la compasión encarnada en lugar de aplanarla a una emoción abstracta.
- source_word: Βελιάρ
  english_pob_choice: Beliar
  chosen_spanish: Beliar
  alternatives_spanish:
  - Belial
  lexicon: LSJ
  rationale: El testigo griego usa Βελιάρ; se conserva la forma del original como nombre propio en lugar de normalizar al hebreo Belial.
- source_word: ἔγνω ... γυναῖκα idiom
  english_pob_choice: knew
  chosen_spanish: conoció
  alternatives_spanish:
  - se acostó con
  - tuvo relaciones con
  lexicon: LSJ
  rationale: Eufemismo bíblico tradicional (יָדַע/γινώσκω) habitual en RV/NVI.
- source_word: πρωτογενήματα / ἀπαρχαί
  english_pob_choice: firstfruits
  chosen_spanish: primicias
  alternatives_spanish:
  - primeros frutos
  lexicon: LSJ
  rationale: Término agrícola-cultual establecido en el español bíblico, encaja con la teología de bendición del pasaje.
- source_word: σωτηρία
  english_pob_choice: salvation
  chosen_spanish: salvación
  alternatives_spanish:
  - liberación
  lexicon: LSJ
  rationale: Mantiene el peso teológico de la promesa que surge de Leví y Judá, suficientemente amplio en este contexto judío testamentario.
- source_word: πλεονεξία
  english_pob_choice: greed
  chosen_spanish: avaricia
  alternatives_spanish:
  - codicia
  lexicon: BDAG
  rationale: '''Avaricia'' es el equivalente moral estándar en listados de vicios; ''codicia'' sería válida pero más amplia.'
theological_decisions:
- issue: Promesa que surge de Leví y Judá
  chosen_reading: Traducir 'el Señor levantará salvación para Israel' sin importar terminología explícitamente mesiánica posterior no presente en la capa griega.
  alternative_readings:
  - Una paráfrasis explícitamente mesiánica
  - Una 'liberación' más estrecha y política
  rationale: El griego respalda una expectativa de salvación/liberación vinculada a Leví y Judá. 'Salvación' conserva la amplitud teológica y permite que los lectores posteriores evalúen la significación intertextual sin sobretraducir.
  doctrine_reference: DOCTRINE.md §Preservar la tensión teológica en lugar de resolverla
- issue: Terminología 'Beliar'
  chosen_reading: Conservar el nombre propio 'Beliar' en el texto principal.
  alternative_readings:
  - Belial
  - el maligno
  rationale: El testigo griego usa Βελιάρ. Traducir como título reduciría la auditabilidad y oscurecería la forma textual.
  doctrine_reference: DOCTRINE.md §Primacía del idioma original sobre la tradición de traducción
- issue: Auto-testimonio moral de Isacar
  chosen_reading: Traducir las afirmaciones directamente como auto-testimonio testamentario, no como declaración doctrinal de perfección sin pecado.
  alternative_readings:
