translation:
  language: es
  text: '1[a]. Miren entonces, como ven: tengo ciento veintiséis años, y no he conocido en mí ningún pecado que lleve a la muerte. 2. Excepto a mi esposa, no he conocido a otra. No cometí inmoralidad sexual con ojos errantes. 3. No bebí vino para engaño[b], y no deseé nada que perteneciera a mi prójimo. 4. No hubo engaño en mi corazón, ni mentira subió por mis labios. 5. Gemí junto con toda persona que sufría, y compartí mi pan con el pobre. Practiqué la piedad todos mis días; guardé la verdad. 6. Amé al Señor con todas mis fuerzas, y de igual modo amé a toda persona con todo mi corazón, más que a mis propios hijos. 7. Hagan también ustedes estas cosas, hijos míos, y todo espíritu de Beliar[c] huirá de ustedes, y ninguna obra de personas malvadas tendrá dominio sobre ustedes; y subyugarán a toda fiera salvaje, teniendo con ustedes al Dios del cielo y de la tierra, que camina[d] con las personas en sencillez de corazón. 8. Y después de decir estas cosas, mandó a sus hijos que lo llevaran
    a Hebrón y lo enterraran allí con sus padres en la cueva. 9. Y extendiendo sus pies, se durmió en buena vejez, con todos sus miembros sanos y con vigor, y durmió el sueño eterno.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'no he conocido en mí mismo ningún pecado de muerte'. El griego usa γινώσκω en sentido moral autorreflexivo, no meramente cognitivo.
    reason: lexical_alternative
  - marker: b
    text: ἀποπλάνησις también puede entenderse como 'extravío' o 'disolución'; 'engaño' conserva la fuerza moral.
    reason: lexical_alternative
  - marker: c
    text: '''Beliar'' refleja la forma griega aquí; algunas tradiciones normalizan el nombre como ''Belial''.'
    reason: alternative_reading
  - marker: d
    text: La frase 'que camina con las personas en sencillez de corazón' también puede entenderse como descripción de la compañía divina con quienes viven con corazón íntegro.
    reason: alternative_reading
lexical_decisions:
- source_word: οὐκ ἔγνων ἐν ἐμοὶ ἁμαρτίαν εἰς θάνατον
  english_pob_choice: I have not known any sin in me leading to death
  chosen_spanish: no he conocido en mí ningún pecado que lleve a la muerte
  alternatives_spanish:
  - no he sido consciente de pecado mortal en mí
  - no he reconocido pecado de muerte en mí mismo
  lexicon: BDAG
  rationale: Se preserva la fuerza autorreflexiva del aoristo ἔγνων con sentido moral, y se traduce εἰς θάνατον funcionalmente como 'que lleve a la muerte', evitando la categoría doctrinal posterior 'pecado mortal'.
- source_word: ἐπόρνευσα
  english_pob_choice: I did not commit sexual immorality
  chosen_spanish: no cometí inmoralidad sexual
  alternatives_spanish:
  - no fornicé
  - no fui sexualmente inmoral
  lexicon: BDAG
  rationale: El verbo denota conducta sexual ilícita en sentido amplio. 'Cometer inmoralidad sexual' es accesible y evita el matiz arcaico de 'fornicar'.
- source_word: ἐν μετεωρισμῷ ὀφθαλμῶν μου
  english_pob_choice: with wandering eyes
  chosen_spanish: con ojos errantes
  alternatives_spanish:
  - con ojos divagantes
  - con mirada inquieta
  lexicon: LSJ
  rationale: La frase apunta a una mirada inquieta y deseosa. 'Ojos errantes' captura idiomáticamente el matiz moral en español.
- source_word: οἶνον εἰς ἀποπλάνησιν
  english_pob_choice: wine for deception
  chosen_spanish: vino para engaño
  alternatives_spanish:
  - vino para extraviarse
  - vino para disolución
  lexicon: BDAG
  rationale: ἀποπλάνησις conlleva el sentido de extravío o engaño. 'Para engaño' conserva la fuerza moral del sustantivo y la concisión paralela del verso.
- source_word: Δόλος
  english_pob_choice: deceit
  chosen_spanish: engaño
  alternatives_spanish:
  - dolo
  - fraude
  lexicon: BDAG
  rationale: '''Engaño'' es el equivalente contemporáneo más claro y se ajusta al paralelismo con ''mentira'' en labios y corazón.'
- source_word: συνεστέναξα
  english_pob_choice: I groaned together with
  chosen_spanish: gemí junto con
  alternatives_spanish:
  - me lamenté con
  - compartí el dolor de
  lexicon: BDAG
  rationale: El compuesto συν- expresa sufrimiento compartido y corporalidad; 'gemí junto con' preserva el patetismo testamentario.
- source_word: Εὐσέβειαν ἐποίησα
  english_pob_choice: I practiced godliness
  chosen_spanish: practiqué la piedad
  alternatives_spanish:
  - actué con piedad
  - ejercí la devoción
  lexicon: BDAG
  rationale: εὐσέβεια designa la conducta reverente habitual; 'piedad' es el equivalente español tradicional y legible.
- source_word: Ἀλήθειαν ἐφύλαξα
  english_pob_choice: I kept truth
  chosen_spanish: guardé la verdad
  alternatives_spanish:
  - custodié la verdad
  - preservé la verdad
  lexicon: BDAG
  rationale: Se mantiene la fórmula breve y elevada del griego con 'guardar', conservando el registro testamentario.
- source_word: πάντα ἄνθρωπον
  english_pob_choice: every person
  chosen_spanish: toda persona
  alternatives_spanish:
  - todo hombre
  - todas las personas
  lexicon: BDAG
  rationale: Se conserva el patrón distributivo singular usando lenguaje inclusivo neutro contemporáneo.
- source_word: ὑπὲρ τὰ τέκνα μου
  english_pob_choice: more than my children
  chosen_spanish: más que a mis propios hijos
  alternatives_spanish:
  - más que a mis hijos
  - por encima de mis hijos
  lexicon: BDAG
  rationale: ὑπέρ aquí expresa comparación; 'propios' refuerza la afirmación ética sin atenuarla.
- source_word: πνεῦμα τοῦ Βελίαρ
  english_pob_choice: spirit of Beliar
  chosen_spanish: espíritu de Beliar
  alternatives_spanish:
  - espíritu de Belial
  lexicon: LSJ
  rationale: Se conserva la transliteración 'Beliar' del testigo griego, conforme al POB inglés.
- source_word: καταδουλώσετε
  english_pob_choice: you will subdue
  chosen_spanish: subyugarán
  alternatives_spanish:
  - esclavizarán
  - someterán
  lexicon: BDAG
  rationale: Aplicado a fieras, el sentido idiomático es 'subyugar/someter'; se evita la imagen literal incómoda de 'esclavizar' animales.
- source_word: συμπορευόμενον τοῖς ἀνθρώποις ἐν ἁπλότητι καρδίας
  english_pob_choice: who walks with people in simplicity of heart
  chosen_spanish: que camina con las personas en sencillez de corazón
  alternatives_spanish:
  - que va con los hombres con corazón sencillo
  - que acompaña a las personas en singularidad de corazón
  lexicon: BDAG
  rationale: El participio modifica naturalmente 'al Dios del cielo y de la tierra'. 'Sencillez de corazón' preserva la virtud testamentaria de la integridad moral.
- source_word: ἀναγάγωσιν αὐτὸν ἐν Χεβρών
  english_pob_choice: carry him up to Hebron
  chosen_spanish: lo llevaran a Hebrón
  alternatives_spanish:
  - lo subieran a Hebrón
  - lo trasladaran a Hebrón
  lexicon: BDAG
  rationale: ἀνάγω significa 'llevar/subir'; 'llevar a Hebrón' es la forma natural en español para el traslado fúnebre.
- source_word: ἐκοιμήθη ... ὕπνον αἰώνιον
  english_pob_choice: he fell asleep ... and slept the eternal sleep
  chosen_spanish: se durmió ... y durmió el sueño eterno
  alternatives_spanish:
  - murió ... el sueño perpetuo
  - expiró ... el sueño sempiterno
  lexicon: BDAG
  rationale: La metáfora del sueño se conserva en lugar de aplanarla a 'murió'; 'sueño eterno' mantiene la cadencia testamentaria solemne.
theological_decisions:
- issue: Cuán fuerte rendir la afirmación de impecabilidad de Isacar
  chosen_reading: Traducir como afirmación testimonial de no haber conocido 'ningún pecado que lleve a la muerte', no como impecabilidad absoluta.
  alternative_readings:
  - No tengo pecado en mí
  - No he cometido pecado mortal
  rationale: El griego es testimonial y está calificado por εἰς θάνατον. La traducción preserva la fuerza moral del ejemplo de Isacar sin hacer una afirmación doctrinal mayor que el texto.
  doctrine_reference: DOCTRINE.md §Preserve theological tension rather than resolve it
- issue: Antecedente de 'que camina con las personas en sencillez de corazón'
  chosen_reading: La cláusula se refiere al 'Dios del cielo y de la tierra' acompañando a los justos.
  alternative_readings:
  - la cláusula describe a los hijos caminando con Dios en sencillez
  - la frase es una máxima general
  rationale: El antecedente gramatical más cercano es 'el Dios del cielo y de la tierra'; la construcción participial describe naturalmente la presencia acompañante de Dios.
  doctrine_reference: DOCTRINE.md §Original-language primacy over translation tradition
translation_notes:
  revision_awareness: La revisión inglesa ajustó v.1 ('as you see' y 'I have not known any sin in me ... unto death') y v.7 ('every deed ... will not rule over you', 'goes with people'). El español refleja estas lecturas literales y autorreflexivas, manteniendo el registro testamentario.
  spanish_consistency_notes:
  - '''Beliar'' transliterado en todo el corpus T12P en español.'
  - Plural 'ustedes' (Latinoamérica neutra) en imperativos y pronombres.
  - '''Piedad'' como equivalente estable de εὐσέβεια.'
  - '''Sueño eterno'' / ''se durmió'' como eufemismos canónicos de muerte en T12P.'
  - '''Toda persona'' como traducción inclusiva neutra de πᾶς ἄνθρωπος.'
