base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/issachar/007.yaml
  text: '1[a]. See then, as you see: I am one hundred and twenty-six years old, and I am not conscious of any sin in me unto death. 2. Except for my wife, I have not known another woman. I did not commit sexual immorality with wandering eyes. 3. I did not drink wine for deception[b], and I did not desire anything of my neighbor. 4. No deceit came to be in my heart, and no lie went up through my lips. 5. I groaned together with every person in pain, and I shared my bread with the poor. I practiced godliness in all my days; I kept truth. 6. I loved the Lord with all my strength, and likewise I loved every person with all my heart, more than my children. 7. You also, my children, do these things, and every spirit of Beliar will flee from you, and no deed of wicked people will rule over you; and you will subdue every wild beast, having with you the God of heaven and earth, who walks with people in simplicity of heart. 8. And after saying these things he commanded his sons to carry him up to
    Hebron and bury him there with his fathers in the cave. 9. And stretching out his feet, he fell asleep in a good old age, sound in every limb and strong[d][c], and slept the eternal sleep.'
  footnotes:
  - marker: a
    text: Or 'I have not known in myself any sin unto death.' The Greek uses 'know' in a self-aware moral sense.
    reason: lexical_alternative
  - marker: b
    text: '''Beliar'' reflects the Greek form here; some traditions normalize the name as ''Belial.'''
    reason: alternative_reading
  - marker: c
    text: The phrase 'who walks with people in simplicity of heart' may also be understood as describing God's companionship with those who live in singleness of heart.
    reason: alternative_reading
  - marker: d
    text: Some textual forms of the closing verse vary between 'he died in a good old age' and 'he slept the eternal sleep,' with expansions about being sound in every limb and strong.
    reason: textual_variant
