review_pass:
  verdict: revise
  source_alignment_summary: Greek δουλεύσουσιν τοῖς ἐχθροῖς αὐτῶν means 'they will slave/serve FOR their enemies' — they are the ones enslaved, not the enslavers. The EN POB text correctly reads 'will slave for their enemies'. The Spanish 'esclavizarán para sus enemigos' uses the transitive verb esclavizar which means 'they will enslave their enemies' — the opposite meaning.
  spanish_quality_summary: 'Most of the verse is well-rendered: ''Y dejando la agricultura, seguirán sus malos designios, y serán esparcidos entre las naciones'' is accurate. Only the final clause inverts the subject-object relationship through the transitive verb esclavizar.'
  glossary_alignment: No YHWH/Mesías/Dios/πνεῦμα glossary terms. 'Esclavo/esclavizar' is the POB policy verb for δοῦλος family; but here it must be intransitive (they suffer enslavement), not transitive.
  issues:
  - severity: high
    issue: '''esclavizarán para sus enemigos'' inverts the meaning — δουλεύσουσιν τοῖς ἐχθροῖς is intransitive: they will slave/serve-as-slaves FOR their enemies, not that they will enslave their enemies.'
    rationale: 'δουλεύω is consistently intransitive: ''to be a slave, to serve as a slave''. The EN renders ''will slave for their enemies''. Spanish ''esclavizarán'' (transitive causative) means ''they will enslave [others]'', reversing the subject-object relationship.'
  revised_spanish_text: Y dejando la agricultura, seguirán sus malos designios, y serán esparcidos entre las naciones y esclavizados por sus enemigos.
  revision_rationale: 'Changed the final clause from ''esclavizarán para sus enemigos'' (they will enslave their enemies) to ''serán esclavizados por sus enemigos'' (they will be enslaved by their enemies), restoring the correct passive relationship of δουλεύσουσιν τοῖς ἐχθροῖς: the descendants are subjected to servitude under their enemies, not the other way around.'
