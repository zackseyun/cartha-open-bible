translation:
  language: es
  text: Y dejando la agricultura, seguirán sus malos designios, y serán esparcidos entre las naciones y esclavizados por sus enemigos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: γεωργεῖν
  english_pob_choice: farming
  chosen_spanish: la agricultura
  alternatives_spanish:
  - el cultivo
  - labrar la tierra
  - la labranza
  lexicon: γεωργέω
  rationale: ‘Agricultura’ comunica de forma natural la actividad rural general que el inglés POB expresó con ‘farming’, sin volver el texto demasiado técnico ni restringirlo más de lo que el griego exige.
- source_word: διαβουλίοις
  english_pob_choice: evil schemes
  chosen_spanish: malos designios
  alternatives_spanish:
  - malas maquinaciones
  - malos planes
  - consejos perversos
  lexicon: διαβούλιον
  rationale: ‘Designios’ conserva la idea de planes deliberados; ‘malos’ refleja la valoración moral del adjetivo griego y evita una expresión demasiado pesada en español.
- source_word: διασπαρήσονται
  english_pob_choice: they will be scattered
  chosen_spanish: serán esparcidos
  alternatives_spanish:
  - serán dispersados
  - serán repartidos
  lexicon: διασπείρω
  rationale: ‘Esparcidos’ reproduce bien la imagen de dispersión entre pueblos y es idiomático en español bíblico contemporáneo.
- source_word: δουλεύσουσιν
  english_pob_choice: will slave
  chosen_spanish: esclavizarán
  alternatives_spanish:
  - serán esclavos de
  - servirán como esclavos a
  - vivirán esclavizados por
  lexicon: δουλεύω
  rationale: Se mantiene el valor fuerte de ‘slave’ del audit trail inglés. En español, un verbo transitivo como ‘esclavizarán’ conserva la dureza del vínculo de servidumbre, aunque la construcción griega admite la idea de quedar bajo esclavitud. Se prefiere no suavizarlo a ‘servirán’.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que cambió ‘serve’ por ‘slave’ para reflejar con más precisión δουλεύσουσιν; por eso el español evita ‘servirán’ y conserva un verbo de esclavización más fuerte.
  spanish_consistency_notes:
  - He traducido el participio inicial con ‘Y dejando’ para mantener la coordinación narrativa del griego.
  - ‘Entre las naciones’ conserva la dispersión étnico-geográfica del original.
  - No se introdujo ‘SEÑOR’ ni otra terminología no presente en el pasaje.
