source:
  edition: Charles 1908 Greek Versions (pages 176-187, Issachar pilot)
  text: VI. *Γινώσκετε οὖν¹, τέκνα² μου, ὅτι ἐν ἐσχάτοις καιροῖς καταλείψουσιν³ οἱ υἱοὶ ὑμῶν τὴν ἁπλότητα Γκαὶ κολληθήσονται τῇ ἀπληστίᾳ˥, Γκαὶ⁷ ἀφέντες⁴ Γτὴν ἀκακίαν⁵ προσπελάσουσι⁶ τῇ πανουργίᾳ⁷, *καὶ καταλιμπάνοντες⁸ τὰς ἐντολὰς Κυρίου *κολληθήσονται τῷ Βελίαρ⁹.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/issachar/006/001.yaml
  text: Know therefore[a], my children, that in the last times your sons will abandon simplicity and attach themselves to greed; and leaving innocence, they will draw near to cunning, and abandoning the commandments of the Lord, they will attach themselves to Beliar.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:55Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Sepan, pues,[a] hijos míos, que en los últimos tiempos sus hijos abandonarán la sencillez y se apegarán a la avidez; y, dejando la inocencia, se acercarán a la astucia, y, abandonando los mandamientos del Señor, se apegarán a Belial.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Pues» traduce la inferencia de οὖν; también puede leerse «por tanto».
    reason: alternative_reading
lexical_decisions:
- source_word: Γινώσκετε οὖν
  english_pob_choice: Know therefore
  chosen_spanish: Sepan, pues
  alternatives_spanish:
  - Conozcan, pues
  - Sepan, entonces
  lexicon: γινώσκω
  rationale: El imperativo plural exhortativo se vierte naturalmente con «Sepan» en español bíblico claro; «pues» conserva οὖν como inferencia lógica.
- source_word: τέκνα μου
  english_pob_choice: my children
  chosen_spanish: hijos míos
  alternatives_spanish:
  - hijitos míos
  - mis hijos
  lexicon: τέκνον
  rationale: «hijos míos» mantiene la relación paterna/directiva sin infantilizar excesivamente el tono.
- source_word: ἐν ἐσχάτοις καιροῖς
  english_pob_choice: in the last times
  chosen_spanish: en los últimos tiempos
  alternatives_spanish:
  - en los postreros tiempos
  - en los tiempos finales
  lexicon: ἔσχατος
  rationale: La expresión idiomática más natural y fiel en español es «los últimos tiempos».
- source_word: καταλείψουσιν τὴν ἁπλότητα
  english_pob_choice: will abandon simplicity
  chosen_spanish: abandonarán la sencillez
  alternatives_spanish:
  - dejarán la sencillez
  - abandonarán la simplicidad
  lexicon: ἁπλότης
  rationale: «Sencillez» conserva la idea de sencillez de carácter/conducta mejor que una abstracción meramente intelectual.
- source_word: κολληθήσονται τῇ ἀπληστίᾳ
  english_pob_choice: attach themselves to greed
  chosen_spanish: se apegarán a la avidez
  alternatives_spanish:
  - se unirán a la codicia
  - se aferrarán a la codicia
  lexicon: ἀπληστία
  rationale: El verbo refleja adherencia fuerte; «avidez» conserva la fuerza del vicio sin reducirlo solo a dinero, aunque «codicia» es una alternativa válida.
- source_word: ἀφέντες τὴν ἀκακίαν
  english_pob_choice: leaving innocence
  chosen_spanish: dejando la inocencia
  alternatives_spanish:
  - abandonando la inocencia
  - dejando la candidez
  lexicon: ἀκακία
  rationale: «Inocencia» expresa bien la ausencia de malicia que contrasta con la siguiente cláusula.
- source_word: προσπελάσουσι τῇ πανουργίᾳ
  english_pob_choice: they will draw near to cunning
  chosen_spanish: se acercarán a la astucia
  alternatives_spanish:
  - se aproximarán a la astucia
  - se volverán hacia la astucia
  lexicon: πανουργία
  rationale: «Astucia» comunica la habilidad engañosa o tramposa; «cunning» no debe suavizarse a simple inteligencia.
- source_word: καταλιμπάνοντες τὰς ἐντολὰς Κυρίου
  english_pob_choice: abandoning the commandments of the Lord
  chosen_spanish: abandonando los mandamientos del Señor
  alternatives_spanish:
  - dejando los mandamientos del Señor
  - abandonando los mandamientos de Yahvé
  lexicon: ἐντολή / Κύριος
  rationale: Se mantiene la formulación del POB inglés para la cláusula y, por el griego Κυρίου en cita reverencial, «Señor» preserva la referencia textual inmediata; no se impone aquí la forma nominal «Yahvé» porque el texto griego no la escribe explícitamente.
- source_word: κολληθήσονται τῷ Βελίαρ
  english_pob_choice: they will attach themselves to Beliar
  chosen_spanish: se apegarán a Belial
  alternatives_spanish:
  - se unirán a Belial
  - se adherirán a Belial
  lexicon: Βελίαρ
  rationale: «Belial» es la forma estable en español; se conserva el nombre propio demonológico en lugar de traducirlo.
theological_decisions:
- issue: Referencia a Κυρίου en un texto con trasfondo del nombre divino
  english_pob_reading: commandments of the Lord
  chosen_spanish_reading: mandamientos del Señor
  alternative_spanish_readings:
  - mandamientos de Yahvé
  rationale: Aunque el proyecto suele usar «Yahvé» para יהוה, aquí el testimonio inmediato es griego Κυρίου y la fórmula fija «del Señor» corresponde al audit trail inglés; sin evidencia directa del tetragrámaton en esta cláusula, se conserva la forma reverencial del texto fuente.
  doctrine_reference: Nombre divino / fidelidad al testimonio textual
translation_notes:
  revision_awareness: Se siguió el pasaje inglés POB sin cambios, pero la redacción española ajusta el orden y la naturalidad sintáctica para un registro bíblico contemporáneo. No se añadió ninguna revisión textual porque el paquete indica que no hubo cambios en la última pasada.
  spanish_consistency_notes:
  - Se mantiene «Señor» solo en la cláusula que traduce Κυρίου, conforme al testimonio griego inmediato; no se sustituye mecánicamente por «Yahvé».
  - Se conserva la distinción conceptual entre «sencillez», «inocencia» y «astucia» para no aplanar las oposiciones morales del texto.
  - «Belial» se mantiene como nombre propio demonológico consistente con el uso histórico en español bíblico.
