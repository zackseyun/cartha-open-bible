reference: Testament of Issachar 6:3
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 176-187, Issachar pilot)
  text: 3. Καὶ ὑμεῖς οὖν εἴπατε ταῦτα¹⁵ τοῖς τέκνοις ὑμῶν, ὅπως, ἐὰν ἁμάρτωσι¹⁶, τάχιον¹⁷ ἐπιστρέψωσι¹⁸ πρὸς τὸν¹⁹ Κύριον,
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/issachar/006/003.yaml
  text: Therefore you also tell these things to your children, so that, if they sin, they may turn back more quickly to the Lord,
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:55Z'
    unchanged: false
    changes_summary: Changed “return” to “turn back” to better reflect ἐπιστρέφω and preserve the source’s repentance nuance; kept the rest unchanged.
translation:
  language: es
  text: Por tanto, ustedes también digan estas cosas a sus hijos, para que, si pecan, se vuelvan más pronto al Señor,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Καὶ ὑμεῖς οὖν
  english_pob_choice: Therefore you also
  chosen_spanish: Por tanto, ustedes también
  alternatives_spanish:
  - Así que ustedes también
  - De modo que ustedes también
  lexicon: οὖν; καὶ
  rationale: Mantiene la inferencia lógica de οὖν con una transición natural en español y conserva el énfasis inclusivo de καὶ ὑμεῖς mediante «ustedes también».
- source_word: εἴπατε ταῦτα
  english_pob_choice: tell these things
  chosen_spanish: digan estas cosas
  alternatives_spanish:
  - cuenten estas cosas
  - digan esto
  lexicon: εἴπατε; ταῦτα
  rationale: «Decir» conserva el mandato directo del imperativo aoristo; «estas cosas» refleja ταῦτα sin añadir especificación ajena al texto.
- source_word: τοῖς τέκνοις ὑμῶν
  english_pob_choice: to your children
  chosen_spanish: a sus hijos
  alternatives_spanish:
  - a sus niños
  - a sus descendientes
  lexicon: τέκνα
  rationale: En este contexto relacional y exhortativo, «hijos» es la forma natural y fiel para τέκνα; «sus» conserva el plural de segunda persona.
- source_word: ἐὰν ἁμάρτωσι
  english_pob_choice: if they sin
  chosen_spanish: si pecan
  alternatives_spanish:
  - si cometen pecado
  - si llegan a pecar
  lexicon: ἁμαρτάνω
  rationale: «Pecan» expresa con claridad el acto moral de ἁμαρτάνω sin explicitar más de lo que el griego dice.
- source_word: τάχιον
  english_pob_choice: more quickly
  chosen_spanish: más pronto
  alternatives_spanish:
  - más rápidamente
  - cuanto antes
  lexicon: τάχιον
  rationale: «Más pronto» conserva el comparativo temporal directo del adverbio y evita una intensificación interpretativa excesiva.
- source_word: ἐπιστρέψωσι πρὸς τὸν Κύριον
  english_pob_choice: turn back to the Lord
  chosen_spanish: se vuelvan al Señor
  alternatives_spanish:
  - se vuelvan hacia el Señor
  - regresen al Señor
  - se conviertan al Señor
  lexicon: ἐπιστρέφω; Κύριος
  rationale: «Volverse» refleja bien ἐπιστρέφω como giro de retorno con matiz de arrepentimiento. Se conserva «Señor» aquí porque el texto griego usa Κύριον sin marca explícita del nombre divino, y la frase funciona como título reverencial en la recepción castellana; no se fuerza «Yahvé» donde el propio versículo no lo explicita.
theological_decisions:
- issue: Matiz de arrepentimiento en ἐπιστρέψωσι
  english_pob_reading: turn back to the Lord
  chosen_spanish_reading: se vuelvan al Señor
  alternative_spanish_readings:
  - se conviertan al Señor
  - regresen al Señor
  rationale: La forma elegida preserva el movimiento de retorno y el matiz moral-religioso que la revisión inglesa quiso destacar frente a «return». «Volverse» permite oír tanto el giro interior como el cambio de dirección.
  doctrine_reference: Arrepentimiento/retorno a Dios en lenguaje exhortativo
- issue: Uso de «Señor» para Κύριον
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  - el Amo
  rationale: Aunque el proyecto normalmente usa «Yahvé» para el nombre divino, en este pasaje aislado el griego presenta Κύριον sin cita explícita del tetragrámaton. Mantener «Señor» preserva la lectura reverente y evita una afirmación más específica que el texto fuente inmediato no obliga a hacer.
  doctrine_reference: Nomenclatura divina y prudencia exegética
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada de «return to the Lord» a «turn back to the Lord» para reflejar mejor ἐπιστρέφω y su matiz de arrepentimiento. La redacción española sigue esa revisión con «se vuelvan al Señor», conservando el giro de retorno sin introducir interpretación adicional.
  spanish_consistency_notes:
  - Se mantiene el mandato plural de segunda persona con «ustedes» y verbos en plural.
  - No se introduce puntuación doctrinal adicional ni se expande «estas cosas» más allá del griego.
  - «Señor» se usa aquí como equivalente del griego Κύριον en este versículo concreto, en coherencia con la cautela textual solicitada.
