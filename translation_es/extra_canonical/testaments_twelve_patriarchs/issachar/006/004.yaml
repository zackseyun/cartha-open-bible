source:
  edition: Charles 1908 Greek Versions (pages 176-187, Issachar pilot)
  text: 4. Ὅτι ἐλεήμων ἐστὶ καὶ ἐξελεῖται²⁰ αὐτοὺς *τοῦ ἐπιστρέψαι αὐτοὺς²¹ εἰς τὴν γῆν αὐτῶν.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/issachar/006/004.yaml
  text: because he is merciful and will deliver them, to turn them back to their land.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:55Z'
    unchanged: false
    changes_summary: Removed the stray footnote markers and tightened the final clause to better reflect ἐπιστρέψαι as 'to turn back' while keeping the source meaning intact.
translation:
  language: es
  text: porque él es misericordioso y los librará, para devolverlos a su tierra.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐλεήμων
  english_pob_choice: merciful
  chosen_spanish: misericordioso
  alternatives_spanish:
  - misericordioso
  - compasivo
  lexicon: ἐλεήμων
  rationale: El griego describe a alguien caracterizado por misericordia; en español, “misericordioso” conserva bien ese rasgo de carácter sin sonar forzado. “Compasivo” es posible, pero desplaza el énfasis hacia la compasión sentida más que hacia la disposición misericordiosa.
- source_word: ἐξελεῖται
  english_pob_choice: will deliver
  chosen_spanish: los librará
  alternatives_spanish:
  - los librará
  - los rescatará
  - los salvará
  lexicon: ἐξαιρέω
  rationale: La forma futura medio/deponente indica acción efectiva de liberación. “Librará” mantiene el sentido de sacar o liberar de una situación adversa y corresponde bien al inglés POB “will deliver”. “Rescatará” y “salvará” son posibles, pero pueden sonar más interpretativos en este contexto.
- source_word: ἐπιστρέψαι
  english_pob_choice: to turn back
  chosen_spanish: devolverlos
  alternatives_spanish:
  - devolverlos
  - hacerlos volver
  - volverlos
  lexicon: ἐπιστρέφω
  rationale: El infinitivo expresa el retorno dirigido hacia la tierra propia. “Devolverlos” comunica bien la idea de hacerlos regresar, pero se mantiene en coordinación con la cláusula final. “Hacerlos volver” sería muy claro, aunque algo más explicativo.
- source_word: εἰς τὴν γῆν αὐτῶν
  english_pob_choice: to their land
  chosen_spanish: a su tierra
  alternatives_spanish:
  - a su tierra
  - a la tierra de ellos
  lexicon: γῆ
  rationale: “Su tierra” reproduce de manera natural el posesivo del griego y la lectura del POB en inglés. “La tierra de ellos” es más explícita pero menos idiomática en español.
theological_decisions:
- issue: El sujeto implícito de la liberación es Dios, aunque el versículo usa un pronombre masculino singular referido al contexto previo.
  english_pob_reading: because he is merciful and will deliver them
  chosen_spanish_reading: porque él es misericordioso y los librará
  alternative_spanish_readings:
  - porque es misericordioso y los librará
  - porque Yahvé es misericordioso y los librará
  rationale: Se preserva el pronombre “él” para mantener la referencia implícita del texto. No se explicita “Yahvé” en este verso porque el griego citado aquí no lo nombra directamente y el POB inglés tampoco lo hizo.
  doctrine_reference: Referencia implícita al carácter misericordioso de Dios y a su acción de liberación/restauración.
translation_notes:
  revision_awareness: La revisión más reciente eliminó marcadores espurios y ajustó la última cláusula de 'bring them back into their land' a 'turn them back to their land'. La versión española sigue esa decisión con 'devolverlos a su tierra', evitando una expansión innecesaria y manteniendo la dirección de retorno del infinitivo griego.
  spanish_consistency_notes:
  - Se mantiene un español moderno y digno, sin arcaísmos innecesarios.
  - Se evita 'SEÑOR' porque el texto fuente griego no trae aquí el nombre divino explícito.
  - No se introduce 'Mesías' ni otros términos no presentes en este versículo.
  - 'La sintaxis conserva las dos acciones: misericordia/liberación y retorno a la tierra.'
