  text: '1[a]. Then an angel of the Lord appeared to Jacob and said, “Rachel will bear two children, because she despised intercourse with a husband and chose self-control.” 2. And Leah took mandrakes, and for them hired me for one night. 3. Because of the mandrakes, therefore, Jacob went in to Rachel rather than to me. 4. But the Lord gave heed to my prayer, and I conceived. 5. For I envied Rachel because she was bearing children, while I was childless. 6. And the Lord heard me, and he gave me this fruit. 7. Because I had offered the mandrakes to the Lord through the priest of the Most High, therefore he gave me Issachar as wages. 8. So then, my children, hear Issachar your father. 9. I was born as wages because of the mandrakes, and I became to my father a reward of hire. 10. Therefore I was called Issachar, which means “hire.” 11. And now, children, hear me: walk in simplicity of heart, because I have seen that all who are guileless in heart prevail over every evil. 12. For if a man does
    not desire gold[b], he does not wrong his neighbor; he does not crave many delicacies; he does not delight in varied clothing. 13. He does not long to live many days; only he waits for the will of God. 14. And the spirits of deceit have no power against him, for he does not look on the beauty of women, lest he pollute his mind with corruption. 15. There is no envy in his thoughts, no malicious person darkens his soul, and no greed distresses his life. 16. He walks in uprightness of life, and he sees all things in sincerity, shunning excess in the desire for worldly gain, so that he may not see the corruption of the commandments of the Lord. 17. Therefore, my children, keep the law of God, and gain singleness of heart, and walk without guile, not busying yourselves with meddling in the affairs of your neighbor, 18. but love the Lord and your neighbor; have compassion on the poor and the weak. 19. Bow your back to farming, and labor in all kinds of fieldwork, offering thanksgiving to the
    Lord. 20. For from the firstfruits of the earth the Lord will bless you, just as he blessed all the saints from Abel until now. 21. For no other portion is given to you than the fatness of the earth, whose fruits are raised by toil. 22. For our father Jacob blessed me with blessings of the earth and of firstfruits. 23. Levi and Judah were glorified by the Lord among the sons of Jacob; to them he gave an inheritance, and to me he gave the things of the earth, with firstfruits of fruits. 24. Therefore be not eager for adornment, nor for luxury in food, 25. but cultivate the land in singleness of heart, and take from it the firstfruits for the Lord. 26. For if you do these things, every spirit of Beliar will flee from you, and no deed of wickedness will rule over you. 27. And you will eat every good thing of the earth, and your sons after you. 28. But know that in the last times your sons will abandon singleness of heart, and will cling to insatiable desire; 29. they will forsake innocence
    and draw near to malice; they will leave the commandments of the Lord and cling to Beliar; 30. they will abandon farming and follow after their own evil schemes; and they will be scattered among the nations and serve their enemies. 31. Therefore tell these things to your children, so that if they sin, they may quickly return to the Lord. 32. For he is merciful[c], and he will deliver them and bring them back into their land.'
  footnotes:
  - marker: a
    text: Or 'spurned marital relations.' The Greek wording is unusually stark and may reflect a developed interpretive tradition about Rachel's restraint.
    reason: lexical_alternative
  - marker: b
    text: The mandrake episode alludes to Gen 30:14–18, where Leah receives Jacob for a night in exchange for mandrakes.
    reason: cross_reference
  - marker: c
    text: '''Beliar'' reflects the Greek form of the name often rendered ''Belial.'''
    reason: lexical_alternative
