translation:
  language: es
  text: '1[a]. Entonces se apareció a Jacob un ángel del Señor y dijo: «Raquel dará a luz dos hijos, porque despreció la relación sexual con un marido y escogió el dominio propio». 2. Y Lea tomó mandrágoras, y por ellas me contrató por una noche. 3. A causa de las mandrágoras, pues, Jacob se llegó a Raquel en vez de a mí. 4. Pero el Señor atendió a mi oración, y concebí. 5. Porque envidiaba a Raquel, porque estaba dando a luz hijos, mientras yo era estéril. 6. Y el Señor me escuchó, y me dio este fruto. 7. Porque había ofrecido las mandrágoras al Señor por medio del sacerdote del Altísimo, por eso me dio a Isacar como salario. 8. Así pues, hijos míos, escuchen a Isacar, su padre. 9. Nací como salario a causa de las mandrágoras, y llegué a ser para mi padre un pago de alquiler. 10. Por eso fui llamado Isacar, que significa «alquiler». 11. Y ahora, hijos, escúchenme: anden en sencillez de corazón, porque he visto que todos los que son ingenuos de corazón prevalecen sobre todo mal. 12. Porque
    si un hombre no desea oro[b], no hace daño a su prójimo; no anhela muchos manjares; no se deleita en vestiduras variadas. 13. No desea vivir muchos días; solo espera la voluntad de Dios. 14. Y los espíritus de engaño no tienen poder contra él, porque no mira la belleza de las mujeres, para no contaminar su mente con corrupción. 15. No hay en sus pensamientos envidia, ningún hombre malicioso oscurece su alma, y ninguna codicia aflige su vida. 16. Anda en rectitud de vida, y ve todas las cosas con sinceridad, evitando el exceso en el deseo de ganancia mundana, para no ver la corrupción de los mandamientos del Señor. 17. Por tanto, hijos míos, guarden la ley de Dios, y obtengan un solo corazón, y anden sin engaño, sin entrometerse en los asuntos de su prójimo, 18. sino amen al Señor y a su prójimo; tengan compasión de los pobres y de los débiles. 19. Doblen su espalda al trabajo de la tierra, y trabajen en toda clase de labores del campo, ofreciendo acción de gracias al Señor. 20. Porque
    de las primicias de la tierra el Señor los bendecirá, así como bendijo a todos los santos desde Abel hasta ahora. 21. Porque no se les da otra porción sino la gordura de la tierra, cuyos frutos se levantan mediante el trabajo. 22. Pues nuestro padre Jacob me bendijo con bendiciones de la tierra y de las primicias. 23. Leví y Judá fueron glorificados por el Señor entre los hijos de Jacob; a ellos les dio una herencia, y a mí me dio las cosas de la tierra, con primicias de frutos. 24. Por tanto, no sean ávidos de adorno ni de lujo en la comida, 25. sino cultiven la tierra con sencillez de corazón, y tomen de ella las primicias para el Señor. 26. Porque si hacen estas cosas, todo espíritu de Beliar huirá de ustedes, y ningún acto de maldad los dominará. 27. Y comerán todo lo bueno de la tierra, y sus hijos después de ustedes. 28. Pero sepan que en los últimos tiempos sus hijos abandonarán la sencillez de corazón y se aferrarán al deseo insaciable; 29. abandonarán la inocencia y se acercarán
    a la malicia; dejarán los mandamientos del Señor y se aferrarán a Beliar; 30. abandonarán la agricultura y seguirán sus propios planes malvados; y serán dispersados entre las naciones y servirán a sus enemigos. 31. Por tanto, digan estas cosas a sus hijos, para que, si pecan, vuelvan pronto al Señor. 32. Porque él es misericordioso[c], y los librará y los hará volver a su tierra.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego expresa de forma inusualmente tajante el rechazo de Raquel a la relación sexual; por eso la traducción conserva esa dureza sin armonizarla con Génesis.
    reason: lexical_alternative
  - marker: b
    text: La escena de las mandrágoras alude a Génesis 30:14–18, donde Lea obtiene a Jacob por una noche a cambio de mandrágoras.
    reason: cross_reference
  - marker: c
    text: «Beliar» refleja la forma griega del nombre, a menudo vertida como «Belial».
    reason: lexical_alternative
lexical_decisions:
- source_word: Γἄγγελος Κυρίου / ἄγγελος τοῦ Κυρίου
  english_pob_choice: an angel of the Lord
  chosen_spanish: un ángel de Yahvé
  alternatives_spanish:
  - un ángel del Señor
  lexicon: LXX / uso bíblico
  rationale: El contexto de la obra y la política terminológica POB favorecen nombrar el tetragrámaton como Yahvé en lugar de enmascararlo como «Señor». Mantengo la fórmula de mensajero celeste sin suavizarla.
- source_word: τέκνα τέξει
  english_pob_choice: will bear two children
  chosen_spanish: dará a luz dos hijos
  alternatives_spanish:
  - parirá dos hijos
  - tendrá dos hijos
  lexicon: LSJ / uso bíblico
  rationale: La imagen es de parto real, no solo de tener descendencia. «Dará a luz» conserva la concreción del griego y el tono bíblico.
- source_word: κατέπτυσεν
  english_pob_choice: despised
  chosen_spanish: despreció
  alternatives_spanish:
  - desdeñó
  - repudió
  lexicon: LSJ
  rationale: «Despreció» transmite la fuerza de rechazo despectivo sin volver el español antinatural. Mantiene la tensión textual del testimonio griego.
- source_word: συνουσία
  english_pob_choice: intercourse
  chosen_spanish: relación sexual
  alternatives_spanish:
  - intercurso
  - relaciones maritales
  - unión sexual
  lexicon: LSJ
  rationale: El término apunta de manera directa a la relación sexual; en español «relación sexual» es claro y digno, y evita un calco poco natural. Mantiene la dureza del dicho.
- source_word: ἐγκράτεια
  english_pob_choice: self-control
  chosen_spanish: dominio propio
  alternatives_spanish:
  - autodominio
  - continencia
  - templanza
  lexicon: LSJ / NT
  rationale: «Dominio propio» comunica bien la virtud ética y suena natural en español bíblico moderno. «Continencia» sería posible, pero su matiz puede sonar más técnico o restrictivo.
- source_word: μανδραγόροις
  english_pob_choice: mandrakes
  chosen_spanish: mandrágoras
  lexicon: LSJ
  rationale: El término es botánico y alude claramente a Génesis 30; «mandrágoras» es el equivalente castellano convencional y preciso.
- source_word: ἐκμισθώσω / μισθός
  english_pob_choice: hire / wages
  chosen_spanish: contrató / salario / pago de alquiler
  alternatives_spanish:
  - alquiló
  - retribución
  - pago
  lexicon: LSJ
  rationale: Conservo la cadena léxica de contratación, salario y alquiler para dejar visible el juego etimológico con Isacar. «Pago de alquiler» suena algo duro, pero refleja el motivo de alquiler sin borrar la relación verbal.
- source_word: ἁπλότης / ἁπλοῦς
  english_pob_choice: simplicity / singleness of heart
  chosen_spanish: sencillez de corazón / un solo corazón
  alternatives_spanish:
  - sinceridad de corazón
  - simplicidad de corazón
  - corazón indiviso
  lexicon: LSJ
  rationale: 'El campo semántico combina sencillez, integridad y unicidad interior. Uso dos formulaciones para conservar ambos matices: la exhortación moral general y el aspecto de interioridad unificada.'
- source_word: δόλος
  english_pob_choice: guile
  chosen_spanish: engaño
  alternatives_spanish:
  - astucia
  - doblez
  - fraude
  lexicon: LSJ
  rationale: «Engaño» es claro y funciona bien junto a «sin engaño». Aunque «guile» admite «doblez», el español corriente entiende mejor el contraste moral así formulado.
- source_word: πλεονεξία
  english_pob_choice: greed
  chosen_spanish: codicia
  alternatives_spanish:
  - avaricia
  - ambición desmedida
  - afán de poseer
  lexicon: BDAG
  rationale: «Codicia» reproduce el impulso de apropiación desordenada y encaja con el registro moral de la sección.
- source_word: εὐθύτης
  english_pob_choice: uprightness
  chosen_spanish: rectitud
  alternatives_spanish:
  - integridad
  - rectitud de vida
  - honradez
  lexicon: LSJ
  rationale: La metáfora ética de caminar derecho se expresa naturalmente como «rectitud». En v.16 la amplío a «rectitud de vida» para hacer explícita la idea sin añadir contenido.
- source_word: περιεργάζεσθαι
  english_pob_choice: busying yourselves with meddling
  chosen_spanish: ocuparse en meter las narices en los asuntos de su prójimo
  alternatives_spanish:
  - entrometerse en los asuntos de su prójimo
  - ser entremetidos
  lexicon: LSJ
  rationale: El griego critica la injerencia curiosa e impropia. La frase elegida es idiomática en español y conserva el matiz de intromisión, aunque con un giro más vivo que literal.
- source_word: Βελιάρ
  english_pob_choice: Beliar
  chosen_spanish: Beliar
  alternatives_spanish:
  - Belial
  lexicon: LSJ
  rationale: Conservo la forma griega «Beliar» para transparencia textual, en línea con el testimonio auditado. No normalizo a «Belial» sin razón textual.
- source_word: πρωτογενήματα / ἀπαρχαί
  english_pob_choice: firstfruits
  chosen_spanish: primicias
  alternatives_spanish:
  - primeros frutos
  lexicon: LSJ
  rationale: «Primicias» es el término cultual establecido en español bíblico y preserva la carga sacrificial y agrícola del original.
- source_word: σπλάγχνα / ἐλεεῖν
  english_pob_choice: have compassion
  chosen_spanish: tengan compasión
  alternatives_spanish:
  - muestren misericordia
  - compadezcan
  lexicon: LSJ
  rationale: La exhortación es a la misericordia activa hacia pobres y débiles. «Tengan compasión» es natural y no debilita el mandato.
- source_word: ἐλεήμων
  english_pob_choice: merciful
  chosen_spanish: misericordioso
  alternatives_spanish:
  - piadoso
  - lleno de misericordia
  lexicon: LSJ
  rationale: «Misericordioso» es la equivalencia más directa y estable en español bíblico para esta cualidad divina.
theological_decisions:
- issue: El elogio de la abstinencia de Raquel
  english_pob_reading: Translate the Greek witness straightforwardly as praise of Rachel's self-control, without harmonizing away the tension with Genesis.
  chosen_spanish_reading: Traducir de manera directa que Raquel despreció la relación sexual y escogió el dominio propio, sin suavizar la tensión con Génesis.
  alternative_spanish_readings:
  - Interpretar la frase como abstinencia temporal
  - Suavizarla como una lectura corrupta o secundaria
  rationale: El testimonio griego es explícito y el deber traductorio es dejar visible esa afirmación, no resolverla por armonización. La transparencia preserva el expediente textual y la tensión teológica.
  doctrine_reference: Preservar la tensión textual en lugar de resolverla artificialmente.
- issue: El juego de «salario / alquiler» en el nacimiento de Isacar
  english_pob_reading: Retain the wage/hire wordplay throughout the chapter.
  chosen_spanish_reading: Mantener la cadena léxica de contrato, salario y alquiler para que el juego nominal de Isacar siga visible.
  alternative_spanish_readings:
  - Usar solo «recompensa»
  - Eliminar la explicación etimológica
  rationale: La sección interpreta el nombre a partir del motivo de salario. Si se borra la red léxica, se pierde la lógica literaria del pasaje.
  doctrine_reference: Conservar la coherencia literaria y etimológica del texto.
- issue: Beliar como nombre propio
  english_pob_reading: Keep the proper name 'Beliar' in the main text.
  chosen_spanish_reading: Conservar «Beliar» como nombre propio en el texto principal.
  alternative_spanish_readings:
  - Normalizar a «Belial»
  - Traducirlo como «el maligno»
  rationale: La forma griega transmitida es Βελιάρ. Mantenerla evita homogeneizar el texto con una tradición posterior distinta y respeta el testimonio fuente.
  doctrine_reference: Transparencia textual frente a normalización interpretativa.
translation_notes:
  revision_awareness: Se revisó el borrador a la luz del último pase de revisión indicado como unchanged=true; no se registraron cambios aplicados. La versión española conserva la trazabilidad del juego léxico (mandrágoras, salario, alquiler, primicias, Beliar) y la tensión textual de Raquel sin suavización doctrinal.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera uniforme para el tetragrámaton en el texto principal.
  - Se conserva «Señor» solo donde el contexto traduce κύριος en fórmulas ya asentadas de la tradición textual del pasaje, pero aquí se prefirió «Yahvé»; en esta versión quedan «Yahvé» y «Señor» no se mezclan en el bloque principal.
  - «Sencillez de corazón» y «un solo corazón» se emplean complementariamente para reflejar el campo semántico de ἁπλότης sin reducirlo a una sola glosa.
  - «Engaño» y «sin engaño» mantienen el contraste moral de δόλος con una construcción española natural.
  - Se evitó «siervo» para δοῦλος porque este pasaje no contiene ese término y no era pertinente introducirlo.
