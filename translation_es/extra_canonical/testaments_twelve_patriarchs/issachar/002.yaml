    si un hombre no desea oro[b], no hace daño a su prójimo; no anhela muchos manjares; no se deleita en vestiduras variadas. 13. No desea vivir muchos días; solo espera la voluntad de Dios. 14. Y los espíritus de engaño no tienen poder contra él, porque no mira la belleza de las mujeres, para no contaminar su mente con corrupción. 15. No hay en sus pensamientos envidia, ningún hombre malicioso oscurece su alma, y ninguna codicia aflige su vida. 16. Anda en rectitud de vida, y ve todas las cosas con sinceridad, evitando el exceso en el deseo de ganancia mundana, para no ver la corrupción de los mandamientos del Señor. 17. Por tanto, hijos míos, guarden la ley de Dios, y obtengan un solo corazón, y anden sin engaño, sin entrometerse en los asuntos de su prójimo, 18. sino amen al Señor y a su prójimo; tengan compasión de los pobres y de los débiles. 19. Doblen su espalda al trabajo de la tierra, y trabajen en toda clase de labores del campo, ofreciendo acción de gracias al Señor. 20. Porque
    de las primicias de la tierra el Señor los bendecirá, así como bendijo a todos los santos desde Abel hasta ahora. 21. Porque no se les da otra porción sino la gordura de la tierra, cuyos frutos se levantan mediante el trabajo. 22. Pues nuestro padre Jacob me bendijo con bendiciones de la tierra y de las primicias. 23. Leví y Judá fueron glorificados por el Señor entre los hijos de Jacob; a ellos les dio una herencia, y a mí me dio las cosas de la tierra, con primicias de frutos. 24. Por tanto, no sean ávidos de adorno ni de lujo en la comida, 25. sino cultiven la tierra con sencillez de corazón, y tomen de ella las primicias para el Señor. 26. Porque si hacen estas cosas, todo espíritu de Beliar huirá de ustedes, y ningún acto de maldad los dominará. 27. Y comerán todo lo bueno de la tierra, y sus hijos después de ustedes. 28. Pero sepan que en los últimos tiempos sus hijos abandonarán la sencillez de corazón y se aferrarán al deseo insaciable; 29. abandonarán la inocencia y se acercarán
    a la malicia; dejarán los mandamientos del Señor y se aferrarán a Beliar; 30. abandonarán la agricultura y seguirán sus propios planes malvados; y serán dispersados entre las naciones y servirán a sus enemigos. 31. Por tanto, digan estas cosas a sus hijos, para que, si pecan, vuelvan pronto al Señor. 32. Porque él es misericordioso[c], y los librará y los hará volver a su tierra.'
