base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/issachar/004.yaml
  text: He does not envy in his deliberations[a], nor does malicious envy consume his soul, nor is there distraction in greed in his mind. But he walks in simplicity of soul; he sees everything with uprightness of heart, not accepting evil eyes from the world’s error[b], so that he may not see the commandments of the Lord as distorted.
  footnotes:
  - marker: a
    text: The phrase translated 'evil eyes' may also evoke the idiom of the 'evil eye,' that is, a hostile or envious way of looking.
    reason: lexical_alternative
  - marker: b
    text: 'The opening bracketed clause reflects a textual expansion in the printed Greek layer: ''nor does malicious envy consume his soul.'' It is translated here as part of the witness text.'
    reason: textual_variant
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4-2026-03-05
