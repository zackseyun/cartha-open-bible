translation:
  language: es
  text: Él no tiene envidia en sus deliberaciones, ni la envidia maliciosa[a] consume su alma, ni hay distracción de codicia en su mente. Pero camina en sencillez de alma; ve todas las cosas con rectitud de corazón, no admitiendo ojos malignos[b] del extravío del mundo, para no ver torcidos los mandamientos del Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La cláusula entre paréntesis refleja una expansión textual en la capa griega impresa: ''ni la envidia maliciosa consume su alma''. Aquí se traduce como parte del texto testimonio.'
    reason: textual_variant
  - marker: b
    text: La frase traducida 'ojos malignos' puede también evocar el modismo del 'mal de ojo', es decir, una mirada hostil o envidiosa.
    reason: lexical_alternative
lexical_decisions:
- source_word: ζηλοῖ
  english_pob_choice: envy
  chosen_spanish: tiene envidia
  alternatives_spanish:
  - envidia
  - tiene celos
  lexicon: LSJ
  rationale: In this vice catalogue, the verb means jealous/envying disposition, not positive zeal. 'Tiene envidia' keeps the moral warning sharp.
- source_word: διαβουλίοις
  english_pob_choice: deliberations
  chosen_spanish: deliberaciones
  alternatives_spanish:
  - planes
  - consejos
  lexicon: LSJ
  rationale: '''Deliberaciones'' preserves the inward, reflective sense better than the more external ''planes''.'
- source_word: βάσκανος
  english_pob_choice: malicious envy
  chosen_spanish: envidia maliciosa
  alternatives_spanish:
  - mal de ojo
  - envidioso
  lexicon: LSJ
  rationale: The bracketed phrase intensifies the vice. 'Envidia maliciosa' avoids awkward repetition with 'ojos malignos' below while preserving the hostile, envious sense.
- source_word: ἐκτήκει τὴν ψυχὴν
  english_pob_choice: consume his soul
  chosen_spanish: consume su alma
  alternatives_spanish:
  - consume su vida
  - desgasta su alma
  lexicon: LSJ
  rationale: Vivid and idiomatic Spanish that retains the inner moral corrosion of the Greek verb of wasting away.
- source_word: περισπασμός
  english_pob_choice: distraction
  chosen_spanish: distracción
  alternatives_spanish:
  - preocupación dividida
  - agitación
  lexicon: LSJ
  rationale: '''Distracción'' is concise and readable; the following phrase specifies that greed is the source of this inner division.'
- source_word: ἀπληστείᾳ
  english_pob_choice: greed
  chosen_spanish: codicia
  alternatives_spanish:
  - avaricia
  - insaciabilidad
  lexicon: LSJ
  rationale: '''Codicia'' is the clearest modern Spanish equivalent for grasping excess; ''avaricia'' is also possible.'
- source_word: ἁπλότητι ψυχῆς
  english_pob_choice: simplicity of soul
  chosen_spanish: sencillez de alma
  alternatives_spanish:
  - simplicidad de alma
  - sinceridad de alma
  lexicon: LSJ
  rationale: Preserves Issachar's thematic vocabulary of moral simplicity without reducing it to honesty.
- source_word: εὐθύτητι καρδίας
  english_pob_choice: uprightness of heart
  chosen_spanish: rectitud de corazón
  alternatives_spanish:
  - derechura de corazón
  - integridad de corazón
  lexicon: LSJ
  rationale: '''Rectitud de corazón'' is dignified Latin-American Spanish preserving the inward ethical rectitude.'
- source_word: ὀφθαλμοὺς πονηρούς
  english_pob_choice: evil eyes
  chosen_spanish: ojos malignos
  alternatives_spanish:
  - ojos malvados
  - miradas envidiosas
  lexicon: LSJ
  rationale: Plural retained, evoking the 'mal de ojo' idiom while keeping the imagery transparent.
- source_word: πλάνης τοῦ κόσμου
  english_pob_choice: the world's error
  chosen_spanish: del extravío del mundo
  alternatives_spanish:
  - del engaño del mundo
  - del error del mundo
  lexicon: LSJ
  rationale: '''Extravío'' preserves the moral-intellectual sense without overinterpreting toward deception.'
- source_word: διεστραμμένας
  english_pob_choice: distorted
  chosen_spanish: torcidos
  alternatives_spanish:
  - distorsionados
  - pervertidos
  lexicon: LSJ
  rationale: '''Torcidos'' is natural Spanish and preserves the metaphor of moral crookedness.'
- source_word: ἐντολὰς τοῦ Κυρίου
  english_pob_choice: the commandments of the Lord
  chosen_spanish: los mandamientos del Señor
  alternatives_spanish:
  - los preceptos del Señor
  lexicon: LSJ
  rationale: Elevated phrase preserving scriptural resonance.
theological_decisions:
- issue: Implicit subject across the chapter's ethical maxims
  chosen_reading: Rendered as a generic singular 'él' describing the simple/righteous person
  alternative_readings:
  - Rendered impersonally
  - Rendered as direct second-person exhortation
  rationale: The Greek presents gnomic third-person description. Keeping 'él' preserves the proverbial, testamentary style and the portrait of the virtuous man that Issachar commends.
translation_notes:
  revision_awareness: 'Reflects revision-pass changes: ''within his mind'' to ''in his mind'' (''en su mente'') and ''not admitting'' to ''not accepting'' (kept as ''no admitiendo'' in Spanish, since Spanish ''admitir'' covers the receptive sense without colloquial overtones).'
  spanish_consistency_notes:
  - ἁπλότης rendered consistently as 'sencillez'.
  - Κύριος as 'Señor'.
  - πονηρός as 'maligno' or 'malvado' depending on collocation.
