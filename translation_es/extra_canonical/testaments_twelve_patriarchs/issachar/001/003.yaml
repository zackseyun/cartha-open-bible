  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/issachar/001/003.yaml
  text: Let no one bury me in costly clothing, but carry me up to Hebron, where my fathers also are.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:02Z'
    unchanged: false
    changes_summary: 'Replaced the unrelated draft with a translation matching the Greek: rendered Μηδείς...ἐνταφιάσει as ''Let no one bury me,'' πολυτελεῖ ἐσθῆτι as ''in costly clothing,'' ἀναγάγετέ με as ''carry me up,'' and included the final clause ''where my fathers also are.'''
translation:
  language: es
  text: Que ninguno me sepulte con vestiduras costosas, sino llevadme a Hebrón, donde están también mis padres.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Μηδείς ... ἐνταφιάσει
  english_pob_choice: Let no one bury me
  chosen_spanish: Que ninguno me sepulte
  alternatives_spanish:
  - Que nadie me entierre
  - No permita ninguno enterrarme
  lexicon: BDAG
  rationale: Construcción prohibitiva-yusiva con μηδείς; 'que ninguno' es la forma natural en español.
- source_word: πολυτελεῖ ἐσθῆτι
  english_pob_choice: in costly clothing
  chosen_spanish: con vestiduras costosas
  alternatives_spanish:
  - con ropas costosas
  - con prendas suntuosas
  lexicon: LSJ
  rationale: '''Vestiduras'' eleva el registro sepulcral; ''costosas'' refleja πολυτελεῖ.'
- source_word: ἀναγάγετέ με
  english_pob_choice: carry me up
  chosen_spanish: llevadme
  alternatives_spanish:
  - subidme
  - trasladadme
  lexicon: LSJ
  rationale: El verbo significa literalmente 'subid'; 'llevadme' es más idiomático en español sin perder el sentido del traslado.
translation_notes:
  revision_awareness: El POB tuvo una revisión que reemplazó un borrador no relacionado (sobre Rubén y mandrágoras) con la instrucción funeraria correcta a Hebrón. La traducción española refleja el texto revisado.
  spanish_consistency_notes:
  - Se mantiene 'vosotros' implícito en imperativo plural ('llevadme').
  - '''Hebrón'' transliterado conforme a convención bíblica española.'
