  source_alignment_summary: 'Greek: Ἔκλαιε δὲ Ῥουβίμ, καὶ ἐπὶ τῇ φωνῇ αὐτοῦ ἐξῆλθεν Λεία ἡ μήτηρ μου. EN POB: ''But Reuben was weeping, and at his cry Leah my mother came out.'' ES draft: ''Pero Lía mi madre salió al oír su llanto y lloraba.'' The ES reverses the order of the two actions — the Greek and EN put weeping first (Reuben weeps), then Leah comes out; the ES puts Leah coming out first (''salió'') then describes weeping as an ongoing state, losing the causal chain. Also ''lloraba'' is applied to the same subject (Lía) in the ES, but in the Greek/EN it is Reuben who is weeping. The subject of lloraba in the ES is ambiguous and misleads.'
