lexical_decisions:
- source_word: Ἔκλαιε
  english_pob_choice: was weeping
  chosen_spanish: lloraba
  alternatives_spanish:
  - estaba llorando
  - se lamentaba
  lexicon: BDAG
  rationale: Imperfecto griego; 'lloraba' (imperfecto español) refleja la acción durativa.
- source_word: ἐπὶ τῇ φωνῇ αὐτοῦ
  english_pob_choice: at his cry
  chosen_spanish: al oír su llanto
  alternatives_spanish:
  - a su voz
  - ante su grito
  lexicon: LSJ
  rationale: φωνή aquí es la voz/grito de Rubén llorando; 'al oír su llanto' captura la causa que hace salir a Lía.
- source_word: ἐξῆλθεν
  english_pob_choice: came out
  chosen_spanish: salió
  alternatives_spanish:
  - salió fuera
  lexicon: BDAG
  rationale: Aoristo simple; 'salió' refleja el evento puntual.
translation_notes:
