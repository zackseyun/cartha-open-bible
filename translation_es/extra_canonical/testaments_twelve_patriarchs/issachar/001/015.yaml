base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/issachar/001/015.yaml
  text: And Jacob knew Leah, and she conceived this and bore me, and because of this I was called Issachar.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:33Z'
    unchanged: false
    changes_summary: 'Replaced the unrelated draft with a translation that reflects the Greek text: Jacob knew Leah; she conceived and bore me; therefore I was called Issachar.'
translation:
  language: es
  text: Y Jacob conoció a Lía, y ella concibió y me dio a luz, y por esto fui llamado Isacar.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἔγνω ... τῇ Λείᾳ
  english_pob_choice: Jacob knew Leah
  chosen_spanish: Jacob conoció a Lía
  alternatives_spanish:
  - Jacob se unió a Lía
  - Jacob tuvo relaciones con Lía
  lexicon: LSJ
  rationale: Se conserva el eufemismo bíblico tradicional 'conocer' (γινώσκω idiomático), igual a la POB inglesa 'knew'; refleja Génesis y la dignidad testamentaria.
- source_word: συλλαβοῦσα ἔτεκεν
  english_pob_choice: she conceived ... and bore me
  chosen_spanish: ella concibió y me dio a luz
  alternatives_spanish:
  - concibió y me parió
  lexicon: LSJ
  rationale: '''Dar a luz'' es el equivalente neutro y digno en español de τίκτω; ''parir'' suena demasiado coloquial para el registro testamentario.'
- source_word: διὰ τοῦτο τὸν μισθὸν ἐκλήθην Ἰσαχάρ
  english_pob_choice: because of this I was called Issachar
  chosen_spanish: por esto fui llamado Isacar
  alternatives_spanish:
  - a causa de esto recibí el nombre de Isacar
  lexicon: LSJ
  rationale: Conserva el juego etimológico entre μισθός (paga/salario) e Ἰσαχάρ; 'Isacar' es la forma castellana habitual del nombre.
translation_notes:
  revision_awareness: 'La revisión gpt-5.4 reemplazó un borrador no relacionado por una traducción literal del griego; sigo esa lectura definitiva: Jacob conoce a Lía, ella concibe y da a luz, y por eso el nombre Isacar.'
  spanish_consistency_notes:
  - γινώσκω (idiomático sexual) → 'conocer' como en Gn 4:1 RV/NVI.
  - Ἰσαχάρ → 'Isacar' (forma castellana estándar).
