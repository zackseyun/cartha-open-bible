  chosen_spanish: la esposa de su juventud
  alternatives_spanish:
  - la mujer de su juventud
  - su primera esposa
  lexicon: BDAG
  rationale: γυνή como 'esposa' aquí (no 'mujer' genérico), por contexto matrimonial; 'esposa de su juventud' es modismo bíblico (cf. Mal 2:14, Prov 5:18).
