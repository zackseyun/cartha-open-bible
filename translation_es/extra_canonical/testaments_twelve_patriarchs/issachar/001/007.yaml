    changes_summary: Revised the first clause of Leah’s speech from a rhetorical question to an imperative/jussive form ('Let it be enough for you') to reflect Ἱκανούσθω more accurately; retained the rest with minor punctuation smoothing.
translation:
  language: es
  text: 'Eran, pues, dos las frutas. Y Lía dijo a Raquel: «Bástete que me has tomado al esposo; ¿también estas tomarás de mí?»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἱκανούσθω σοι
  english_pob_choice: Let it be enough for you
  chosen_spanish: Bástete
  alternatives_spanish:
  - Sea suficiente para ti
  - Que te baste
  lexicon: LSJ
  rationale: Imperativo pasivo de ἱκανόω; 'bástete' (pronombre enclítico) refleja idiomáticamente la fuerza yusiva del POB tras revisión.
- source_word: ἔλαβες τὸν ἄνδρα μου
  english_pob_choice: you have taken my husband
  chosen_spanish: me has tomado al esposo
  alternatives_spanish:
  - has tomado a mi marido
  - me has quitado al esposo
  lexicon: BDAG
  rationale: λαμβάνω + objeto directo de persona; 'me has tomado' con dativo de daño preserva el reproche.
- source_word: ταῦτα λήψῃ
  english_pob_choice: will you also take these
  chosen_spanish: ¿también estas tomarás
  alternatives_spanish:
  - ¿estas también las tomarás
  - ¿también estas me arrebatarás
  lexicon: BDAG
  rationale: Futuro medio de λαμβάνω; pregunta retórica que el POB conserva.
translation_notes:
  revision_awareness: El POB tuvo una revisión que cambió la primera cláusula de pregunta retórica ('Is it not enough') a yusiva ('Let it be enough'), reflejando Ἱκανούσθω más exactamente. La traducción española usa 'bástete' que captura ese matiz.
  spanish_consistency_notes:
  - Apertura de exclamación/pregunta '¿' al inicio según convención española.
  - '''Esposo'' en lugar de ''marido'' para registro testamentario más solemne, siguiendo POB ''husband'' (no ''man'').'
  - Continuidad de discurso entre Lía y Raquel del v.6 con el mismo registro.
