translation:
  language: es
  text: 'Y Raquel le dijo: «Que Jacob esté contigo esta noche, a cambio de las mandrágoras de tu hijo».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἔστω σοι ὁ Ἰακώβ
  english_pob_choice: Let Jacob be with you
  chosen_spanish: Que Jacob esté contigo
  alternatives_spanish:
  - Sea Jacob contigo
  - Esté Jacob para ti
  lexicon: BDAG
  rationale: Imperativo de tercera persona de εἰμί con dativo; 'que Jacob esté contigo' refleja el matiz yusivo y el contexto conyugal.
- source_word: τῇ νυκτὶ ταύτῃ
  english_pob_choice: tonight
  chosen_spanish: esta noche
  alternatives_spanish:
  - en esta noche
  - durante esta noche
  lexicon: BDAG
  rationale: Dativo temporal estándar.
- source_word: ἀντὶ τῶν μανδραγόρων
  english_pob_choice: in exchange for ... mandrakes
  chosen_spanish: a cambio de las mandrágoras
  alternatives_spanish:
  - por las mandrágoras
  - en lugar de las mandrágoras
  lexicon: BDAG
  rationale: ἀντί + genitivo expresa intercambio comercial.
translation_notes:
  revision_awareness: El POB tuvo una revisión menor que removió 'Then' por no estar en el griego. La traducción española refleja esa decisión sin partícula adicional.
