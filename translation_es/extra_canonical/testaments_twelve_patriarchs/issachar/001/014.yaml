translation:
  language: es
  text: 'Y Raquel continuó hablando y dijo: «Tomaré una de las mandrágoras, y a cambio de ella te lo alquilaré por la noche».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀντὶ τοῦ ἑνὸς ἐκμισθώσω σοι ἐν τῇ νυκτί (ampl. tradición)
  english_pob_choice: Rachel ate the mandrakes ... she did not conceive
  chosen_spanish: Raquel comió las mandrágoras, y no concibió
  alternatives_spanish:
  - Raquel tomó las mandrágoras y no quedó encinta
  lexicon: LSJ
  rationale: Sigo la lectura interpretativa de la POB inglesa, que toma el versículo en su forma narrativa expandida; 'comió' y 'concibió' conservan el contraste con la motivación de Lía.
- source_word: διὰ τέκνα / διὰ φιληδονίαν (sentido contextual)
  english_pob_choice: for the sake of children ... not for the sake of pleasure
  chosen_spanish: por causa de los hijos ... no por causa del placer
  alternatives_spanish:
  - por amor a los hijos / no por amor al placer
  lexicon: LSJ
  rationale: '''Por causa de'' es la fórmula natural en español bíblico para διά con acusativo causal; conserva el paralelismo ético que la revisión POB destacó al adelantar ''for the sake of children''.'
- source_word: Κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  lexicon: LSJ
  rationale: En el T12P griego Κύριος funciona como título/circunlocución, no como representación directa del Tetragrámaton; se mantiene 'el Señor' como en otros versículos del capítulo.
translation_notes:
  revision_awareness: 'La revisión gpt-5.4-mini movió ''for the sake of children'' antes de ''desired to lie with Jacob'' para reflejar el orden griego; replico esa estructura: ''por causa de los hijos, ella deseaba acostarse con Jacob''.'
  spanish_consistency_notes:
  - Κύριος → 'el Señor' (no 'Yahvé') en el T12P, donde el griego no traduce el Tetragrámaton hebreo.
  - 'συνουσία / acostarse con: eufemismo bíblico estándar.'
