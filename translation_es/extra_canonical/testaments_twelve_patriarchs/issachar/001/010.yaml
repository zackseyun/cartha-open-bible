    rationale: Not a translation error, just a note quality issue.
  revised_spanish_text: 'Y Raquel dijo: «No te jactes ni te gloríes[a], porque él se unió a mí antes que a ti, y por causa de mí sirvió a nuestro padre catorce años».'
