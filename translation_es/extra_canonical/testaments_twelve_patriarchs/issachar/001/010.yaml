base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/issachar/001/010.yaml
  text: And Rachel said, “Do not boast, nor glorify yourself, for he was joined to me before you, and because of me he served our father fourteen years.”
  revision_pass:
    model: gpt-5.4
