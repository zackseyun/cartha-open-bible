    changes_summary: Adjusted 'and do not' to 'nor' for more natural formal English while preserving the Greek prohibitions; retained the rest as accurate and complete for the extant draft text.
translation:
  language: es
  text: 'Y Raquel dijo: «No te jactes ni te gloríes[a], porque él se unió a mí antes que a ti, y por causa de mí sirvió a nuestro padre catorce años».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede leerse «ni te enaltezcas»; se prefirió «te gloríes» para mantener la correspondencia con el verbo del texto fuente y el tono solemne del pasaje.
    reason: alternative_reading
lexical_decisions:
- source_word: Καὶ εἶπε Ῥαχήλ
  english_pob_choice: And Rachel said
  chosen_spanish: Y Raquel dijo
  alternatives_spanish:
  - Entonces Raquel dijo
  - Y dijo Raquel
  lexicon: Raquel / decir
  rationale: Se conserva la narrativa simple del griego y del inglés POB; 'Y Raquel dijo' es natural y formal en español sin añadir matices no presentes.
- source_word: Μὴ καυχῶ μηδὲ δόξαζε σεαυτήν
  english_pob_choice: Do not boast, nor glorify yourself
  chosen_spanish: No te jactes ni te gloríes
  alternatives_spanish:
  - No te jactes ni te enaltezcas
  - No presumas ni te gloríes
  lexicon: καυχάομαι / δοξάζω
  rationale: '''Jactarse'' refleja bien καυχάομαι; ''glorificarse'' en español suena menos natural como imperativo reflexivo, por eso ''te gloríes'' conserva el contraste verbal sin perder dignidad ni fuerza.'
- source_word: ὅτι ἐμὲ πρότερόν σου ἡρμόσατο
  english_pob_choice: for he was joined to me before you
  chosen_spanish: porque él se unió a mí antes que a ti
  alternatives_spanish:
  - pues fue unido a mí antes que a ti
  - porque me fue unido antes que a ti
  lexicon: ἁρμόζω
  rationale: '''Se unió a mí'' expresa la idea de unión/matrimonio del verbo griego con claridad en español, evitando una construcción pasiva forzada.'
- source_word: καὶ δι᾽ ἐμὲ ἐδούλευσε τῷ πατρὶ ἡμῶν ἔτη δεκατέσσαρα
  english_pob_choice: and because of me he served our father fourteen years
  chosen_spanish: y por causa de mí sirvió a nuestro padre catorce años
  alternatives_spanish:
  - y por mí sirvió a nuestro padre catorce años
  - y por mi causa sirvió a nuestro padre catorce años
  lexicon: δουλεύω / τῷ πατρὶ ἡμῶν / ἔτη δεκατέσσαρα
  rationale: '''Sirvió'' reproduce el sentido de δουλεύω en este contexto narrativo sin introducir ''esclavo'' donde el verbo describe servicio laborioso. ''Por causa de mí'' mantiene la causalidad del δι᾽ ἐμὲ.'
theological_decisions:
- issue: 'Negative prohibition pair: μή ... μηδὲ'
  english_pob_reading: Do not boast, nor glorify yourself
  chosen_spanish_reading: No te jactes ni te gloríes
  alternative_spanish_readings:
  - No te jactes, y no te gloríes
  - No te jactes ni te enaltezcas
  rationale: El griego presenta dos prohibiciones coordinadas; 'ni' en español conserva mejor la correlación prohibitiva que repetir 'y no'.
  doctrine_reference: Syntax / discourse coordination
translation_notes:
  revision_awareness: Se revisó el borrador previo para corregir la ausencia del anclaje de nota al pie. La nota [a] ahora está insertada en el verbo correspondiente dentro del texto español, y el contenido de la nota queda limitado a una alternativa real de traducción.
  spanish_consistency_notes:
  - Se mantiene el nombre propio «Raquel» y el tratamiento directo en segunda persona singular, conforme al diálogo del pasaje.
  - Se conserva «nuestro padre» para reflejar τῷ πατρὶ ἡμῶν sin explicitar innecesariamente el referente.
  - «Catorce años» sigue exactamente la cifra y orden del griego y del inglés auditado.
