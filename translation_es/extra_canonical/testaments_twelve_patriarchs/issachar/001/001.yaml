translation:
  language: es
  text: Escuchad, hijos de Isacar, vuestro padre; prestad oído a las palabras de uno amado por el Señor.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀκούσατε
  english_pob_choice: Listen
  chosen_spanish: Escuchad
  alternatives_spanish:
  - Oíd
  - Atended
  lexicon: BDAG
  rationale: Imperativo aoristo 2pl; 'escuchad' mantiene el registro testamentario sin arcaísmo excesivo.
- source_word: ἐνωτίσασθε
  english_pob_choice: give ear
  chosen_spanish: prestad oído
  alternatives_spanish:
  - dad oído
  - escuchad atentamente
  lexicon: LSJ
  rationale: El verbo griego significa literalmente 'meter en el oído'; 'prestad oído' captura la imagen idiomática semítica que el griego refleja.
- source_word: ῥήματα
  english_pob_choice: words
  chosen_spanish: palabras
  alternatives_spanish:
  - dichos
  lexicon: BDAG
  rationale: Estándar para ῥήματα como 'palabras' en discurso solemne.
- source_word: ἠγαπημένου ὑπὸ Κυρίου
  english_pob_choice: one beloved by the Lord
  chosen_spanish: uno amado por el Señor
  alternatives_spanish:
  - el amado del Señor
  - aquel a quien el Señor ama
  lexicon: BDAG
  rationale: Participio perfecto pasivo; 'uno amado' preserva la indeterminación que el POB mantuvo.
translation_notes:
  revision_awareness: El POB tuvo un truncamiento erróneo en revisión que fue restaurado. La traducción española refleja el texto pleno restaurado, que es el dictamen del traductor original.
  spanish_consistency_notes:
  - Se mantiene 'vosotros/vuestros' como en el discurso testamentario.
  - '''Señor'' para Κύριος, conforme a la convención del POB en literatura no canónica.'
