  text: 5. *⁹Ἦσαν δὲ ταῦτα μῆλα²⁴ εὔοσμα²⁵, *ἅπερ γίνονται²⁶ *ἐν τῇ γῇ Χαράν²⁷ ὑποκάτω φάραγγος ὑδάτων.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/issachar/001/005.yaml
  text: Now these were fragrant fruits, which grow in the land of Haran below a watercourse.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:01Z'
    unchanged: false
    changes_summary: Changed 'sweet-smelling' to 'fragrant' for more natural formal English, and standardized 'water-course' to 'watercourse.'
translation:
  language: es
  text: Eran estas frutas fragantes, que crecen en la tierra de Harán bajo un curso de agua.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: μῆλα
  english_pob_choice: fruits
  chosen_spanish: frutas
  alternatives_spanish:
  - manzanas
  - frutos
  lexicon: LSJ
  rationale: μῆλα en griego clásico abarca varias frutas redondas; el POB elige 'fruits' por la indeterminación; 'frutas' lo refleja en español.
- source_word: εὔοσμα
  english_pob_choice: fragrant
  chosen_spanish: fragantes
  alternatives_spanish:
  - aromáticas
  - perfumadas
  lexicon: LSJ
  rationale: Mantiene el matiz olfativo agradable preferido por el POB tras revisión.
- source_word: φάραγγος ὑδάτων
  english_pob_choice: watercourse
  chosen_spanish: curso de agua
  alternatives_spanish:
  - torrente
  - barranco con agua
  lexicon: LSJ
  rationale: φάραγξ es 'barranco' o 'torrente'; con ὕδατος, 'curso de agua' captura el sentido sin sobrecargar.
translation_notes:
  revision_awareness: 'El POB sufrió ajustes menores: ''sweet-smelling'' → ''fragrant'' y ''water-course'' → ''watercourse''. La traducción española usa ''fragantes'' coherente con la decisión revisada.'
  spanish_consistency_notes:
  - '''Harán'' transliterado conforme a la convención bíblica española.'
  - Frase nominal preservada; sin verbo copulativo explícito en el griego pero añadido 'eran' para naturalidad española.
