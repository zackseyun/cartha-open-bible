base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/issachar/001/012.yaml
  text: And Rachel said, "Do not boast, and do not be arrogant; for he was betrothed to me before you, and through me he worked for our father fourteen years."
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:55Z'
    unchanged: false
    changes_summary: Changed "for my sake he served" to "through me he worked" to reflect ἠργάσατο more literally and avoid importing "served"; kept the rest unchanged.
translation:
  language: es
  text: 'Y Raquel dijo: «No te jactes ni te engrías; porque él se había desposado conmigo antes que contigo, y por medio de mí trabajó para nuestro padre catorce años»[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego transmitido en este pasaje presenta una forma y un contenido distintos del texto inglés POB auditado; se conserva aquí la lectura recibida por la POB para mantener continuidad con su tradición de traducción y revisión.
    reason: textual_variant
lexical_decisions:
- source_word: ἠπάτησέ με
  english_pob_choice: Do not boast, and do not be arrogant
  chosen_spanish: No te jactes ni te engrías
  alternatives_spanish:
  - No te vanagloríes ni seas arrogante
  - No te jactes ni seas orgulloso
  lexicon: ἠπατάω
  rationale: El griego del contexto antiguo sugiere engaño y, por extensión, la reprensión de una jactancia ilegítima en el discurso traducido por la tradición POB inglesa. En español, «jactarte» y «engreírte» reproducen bien el tono exhortativo y la duplicidad moral sin endurecer el texto más allá del apoyo del inglés auditado.
- source_word: ἐπεί / ἐὰν ἤμην ἐκεῖ
  english_pob_choice: for he was betrothed to me before you
  chosen_spanish: porque él se había desposado conmigo antes que contigo
  alternatives_spanish:
  - pues estaba comprometido conmigo antes que contigo
  - porque me había sido prometido antes que a ti
  lexicon: ἀρραβωνίζω / betrothal language
  rationale: La forma española «desposado conmigo» conserva la relación de matrimonio pactado que el inglés POB expresa con «betrothed», sin reducirla a un simple compromiso moderno. «Antes que contigo» sigue la comparación implícita del texto inglés.
- source_word: ἠργάσατο
  english_pob_choice: through me he worked
  chosen_spanish: por medio de mí trabajó
  alternatives_spanish:
  - por mí trabajó
  - a través de mí trabajó
  lexicon: ἐργάζομαι
  rationale: La revisión inglesa cambió deliberadamente «served» por «worked» para reflejar más literalmente ἠργάσατο. En español, «trabajó» mantiene esa decisión y evita importar la noción de «servir»; «por medio de mí» sigue de cerca el valor instrumental que el inglés expresó con «through me».
- source_word: τῷ πατρὶ ἡμῶν
  english_pob_choice: our father
  chosen_spanish: nuestro padre
  alternatives_spanish:
  - a nuestro padre
  - para nuestro padre
  lexicon: πατήρ
  rationale: Se conserva el parentesco posesivo del original y del inglés auditado con una formulación natural en español bíblico. «Nuestro padre» funciona como referente narrativo sin añadir una relación teológica nueva.
theological_decisions:
- issue: Relación entre el engaño de Labán y la censura en el discurso traducido
  english_pob_reading: Do not boast, and do not be arrogant
  chosen_spanish_reading: No te jactes ni te engrías
  alternative_spanish_readings:
  - No te gloríes ni te enaltezcas
  - No presumas ni seas soberbio
  rationale: El testimonio griego contiene la memoria del engaño, pero la forma transmitida en la tradición inglesa POB presenta una reprensión directa a la jactancia. El español mantiene esa lectura recibida sin borrar la tensión entre el trasfondo narrativo y la línea textual traducida.
  doctrine_reference: T12P textual transmission / prudential translation of received wording
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del POB inglés, que sustituyó «for my sake he served» por «through me he worked» para reflejar con mayor literalidad ἠργάσατο y evitar introducir «served». La redacción española sigue esa revisión con «por medio de mí trabajó».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma POB para el tetragrámaton, aunque este versículo no lo contiene.
  - Se evitó «siervo»/«servir» y se prefirió «trabajó» para respetar la decisión auditada del inglés.
  - Se usó puntuación de cita en estilo español y se conservó el orden lógico del argumento.
