  source_alignment_summary: 'Greek for v.13: Ἀλλ᾽ οὖν ἀντὶ τῶν μανδραγόρων ἐκμισθῶ σοι μίαν νύκτα τῷ Ἰακώβ. EN POB for v.13: ''But still, in exchange for the mandrakes I hire out to you one night with Jacob.'' But the ES base_translation field shows: ''And Rachel said, For your son''s mandrakes, he shall lie with you this night'' — which seems to be a different EN reading. Checking the EN YAML for 001/013: ''But still, in exchange for the mandrakes I hire out to you one night with Jacob.'' The ES draft says: ''Y Raquel dijo: A cambio de las mandrágoras de tu hijo, él se acostará contigo esta noche.'' The speaker in the Greek (and EN POB revised) is Leah, not Rachel — Leah speaks in v.13 offering to hire out Jacob. The EN for the base_translation in the ES YAML shows a different version with ''Rachel said'', but the actual EN YAML 001/013 current text is Leah''s speech. This is a speaker attribution error in the ES.'
  spanish_quality_summary: The ES draft attributes the speech to Rachel but the Greek Ἀλλ᾽ οὖν... ἐκμισθῶ σοι (I hire out to you) is Leah speaking to Rachel — Leah is the one offering to hire out Jacob in exchange for the mandrakes she gave Rachel. EN POB correctly gives the speech without a named speaker, leaving it as Leah's continuation from v.12.
  glossary_alignment: ἐκμισθόω → alquilar is consistent with the chapter's hire/wages vocabulary.
