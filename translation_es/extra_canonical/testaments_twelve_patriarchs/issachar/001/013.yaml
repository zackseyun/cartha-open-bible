    issue: 'Wrong speaker attribution: the ES assigns speech to Rachel (''Y Raquel dijo''), but in the Greek it is Leah speaking (ἐκμισθῶ σοι = I hire out to you, i.e. Leah offers Jacob to Rachel).'
    rationale: The Greek has Leah as the implicit speaker continuing from v.12 context. EN POB renders it without speaker tag 'But still, in exchange for the mandrakes I hire out to you one night with Jacob' — the 'I' is Leah. The ES 'Y Raquel dijo' is incorrect.
  revised_spanish_text: «Pero aun así, a cambio de las mandrágoras te alquilo una noche con Jacob».
