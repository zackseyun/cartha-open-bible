  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 176-187, Issachar pilot)
  text: 11. *Καὶ εἰ μὴ ὁ δόλος ἐπλήθυνεν ἐπὶ τῆς γῆς καὶ ἡ πονηρία τῶν ἀνθρώπων ἐχώρησεν, οὐκ ἂν εἶ σὺ ὁρῶσα τὸ πρόσωπον τοῦ Ἰακώβ⁵³.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/issachar/001/011.yaml
  text: And Leah said to her, 'Is it not enough that you have taken away my husband? Would you also take my son’s mandrakes?'
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:56Z'
    unchanged: false
    changes_summary: Adjusted the first clause to reflect ἀφελέσθαι more directly as 'taken away'; simplified the second clause to keep the source’s direct address and possession concise, rendering τοὺς μανδραγόρας τοῦ υἱοῦ μου as 'my son’s mandrakes.'
translation:
  language: es
  text: Y si no se hubiera multiplicado el engaño sobre la tierra y no hubiera avanzado la maldad de los hombres, no habría[b] yo visto el rostro de Jacob[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «rostro de Jacob» traduce literalmente τὸ πρόσωπον τοῦ Ἰακώβ; se conserva la expresión aun cuando su sentido contextual sea oscuro.
    reason: source_note
  - marker: b
    text: «no habría» refleja la apódosis potencial del griego con οὐκ ἂν εἶ; en español se conserva como forma condicional natural.
    reason: source_note
lexical_decisions:
- source_word: ἡ πονηρία
  english_pob_choice: wickedness / evil
  chosen_spanish: maldad
  alternatives_spanish:
  - maldad
  - malicia
  - impiedad
  lexicon: πονηρία
  rationale: ‘Maldad’ comunica la fuerza moral negativa del sustantivo griego sin volverlo más técnico de lo que exige el contexto.
- source_word: τῶν ἀνθρώπων
  english_pob_choice: of men
  chosen_spanish: de los hombres
  alternatives_spanish:
  - de los hombres
  - de la gente
  - de los seres humanos
  lexicon: ἄνθρωποι
  rationale: Se mantiene el sustantivo colectivo del original; ‘hombres’ conserva el tono general antropológico del texto base.
- source_word: ἐχώρησεν
  english_pob_choice: had advanced / prevailed
  chosen_spanish: hubiera avanzado
  alternatives_spanish:
  - hubiera avanzado
  - hubiera progresado
  - hubiera prevalecido
  lexicon: χωρέω
  rationale: ‘Avanzado’ reproduce la idea de extensión o progreso de la maldad en español natural, sin cargar de interpretación adicional.
- source_word: ὁρῶσα
  english_pob_choice: seeing
  chosen_spanish: visto
  alternatives_spanish:
  - visto
  - contemplado
  - mirado
  lexicon: ὁράω
  rationale: En la cláusula condicional negativa, ‘visto’ es la forma más directa y clara para el verbo de percepción.
theological_decisions:
- issue: Referencia a Jacob como figura visible del juicio implícito en la sentencia condicional
  english_pob_reading: And if wickedness had not increased... you would not have seen the face of Jacob.
  chosen_spanish_reading: Y si no se hubiera multiplicado el engaño sobre la tierra... no habría yo visto el rostro de Jacob.
  alternative_spanish_readings:
  - '...no habrías visto el rostro de Jacob.'
  - '...no habría aparecido el rostro de Jacob.'
  rationale: Se conserva la estructura condicional y la referencia a ‘el rostro de Jacob’ como en el griego, sin suavizar el carácter enigmático o profético del pasaje.
  doctrine_reference: Cuidado con mantener la tensión textual sin armonizarla con otro relato o tradición; no se introduce explicación teológica ajena al verso.
translation_notes:
  revision_awareness: El texto griego recibido describe el aumento del engaño y la maldad, y una apódosis condicional con ‘ver el rostro de Jacob’; esto no corresponde al inglés auditado sobre Lea, las mandrágoras y el marido. Por fidelidad al paquete fuente, la versión española sigue el griego y no el English POB, que parece pertenecer a otro versículo o a una alineación errónea en el contexto proporcionado.
  spanish_consistency_notes:
  - Se usa ‘engaño’ para δόλος, coherente con el matiz de fraude o duplicidad.
  - Se mantiene ‘maldad’ para πονηρία y no se sustituye por ‘pecado’ para no desplazar el campo semántico.
  - Se conserva ‘Jacob’ sin articular ni explicar, porque el texto fuente lo presenta como objeto directo del ‘ver’.
