translation:
  language: es
  text: 'Porque si mi madre Lea no hubiera cedido la unión conyugal a cambio de las dos manzanas[a], todavía habría estado destinada a dar a luz ocho hijos. Por eso dio a luz seis, y Raquel dio a luz los dos, porque por medio de las mandrágoras el Señor la visitó. Pues vio que Lea deseaba estar con Jacob por causa de hijos, y no por causa de placer. Porque al día siguiente también volvió a entregarlo. Por eso, por medio de las mandrágoras el Señor escuchó a Raquel. Porque aunque las anhelaba, no las comió, sino que las dedicó[b] en la casa del Señor, después de llevarlas al sacerdote[c].



    Cuando, pues, crecí hasta llegar a la madurez, hijos míos, anduve en rectitud de corazón, y me hice agricultor para mi padre y para mis hermanos. Y mi padre me bendecía, al verme andar delante de él con sencillez. Y no fui entrometido en mis acciones, ni envidioso de un hombre, ni malicioso para con mi prójimo. Nunca hablé mal de nadie, ni critiqué la manera de vivir de ningún hombre. A los treinta y cinco años de edad tomé para mí una esposa, porque mi trabajo consumía mi fuerza, y no pensaba en el placer de una mujer; más bien, por causa de mi labor, el sueño me sobrevenía. Y mi padre siempre se alegraba de mi sencillez, porque ofrecía todo primogénito[d] por medio del sacerdote al Señor, y luego también a mi padre. Y el Señor multiplicó mis bienes diez mil veces, y mi padre asimismo aumentó para mí los bienes dos veces.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Manzanas'' traduce literalmente el griego; la tradición circundante identifica aquí las plantas como mandrágoras.'
    reason: lexical_alternative
  - marker: b
    text: '''Dedicó'' mantiene el matiz cultual de ἀνέθηκεν; también podría traducirse ''ofreció'' o ''consagró''.'
    reason: lexical_alternative
  - marker: c
    text: La frase griega incluye 'en la casa del Señor' y 'después de llevarlas al sacerdote', lenguaje que puede reflejar una expansión cultual posterior más que el relato de Génesis.
    reason: textual_variant
  - marker: d
    text: '''Todo primogénito'' puede abarcar de manera amplia la primera cría o el primer producto, no solo el nacimiento animal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: συνουσία
  english_pob_choice: marital union
  chosen_spanish: unión conyugal
  alternatives_spanish:
  - relación conyugal
  - trato marital
  lexicon: LSJ
  rationale: El griego se refiere al acceso conyugal de Lea a Jacob en el episodio de las mandrágoras. 'Unión conyugal' comunica con dignidad y claridad la idea de relación matrimonial, sin volverlo demasiado clínico.
- source_word: μῆλα
  english_pob_choice: apples
  chosen_spanish: manzanas
  alternatives_spanish:
  - frutos
  lexicon: LSJ
  rationale: El texto griego dice literalmente 'manzanas'. Mantenerlo preserva la superficie del testimonio, aunque la tradición circundante identifique luego las plantas como mandrágoras.
- source_word: μανδραγόροις
  english_pob_choice: mandrakes
  chosen_spanish: mandrágoras
  lexicon: LSJ
  rationale: Es el nombre preciso y natural en español para la planta mencionada en la tradición de Lea y Raquel.
- source_word: ἐπεσκέψατο
  english_pob_choice: visited
  chosen_spanish: visitó
  alternatives_spanish:
  - miró con favor
  - tuvo cuidado de
  lexicon: BDAG
  rationale: '''Visitó'' conserva el giro bíblico de intervención divina sin explicar de más el modo de esa acción.'
- source_word: φιληδονίαν
  english_pob_choice: pleasure
  chosen_spanish: placer
  alternatives_spanish:
  - amor al placer
  - deleite sensual
  lexicon: LSJ
  rationale: El contraste es entre deseo de hijos y deseo de gratificación. 'Placer' es breve y suficientemente claro en español.
- source_word: ἀνέθηκεν
  english_pob_choice: dedicated
  chosen_spanish: dedicó
  alternatives_spanish:
  - ofreció
  - consagró
  lexicon: LSJ
  rationale: El verbo expresa apartar algo como ofrenda o para uso sagrado; 'dedicó' mantiene ese matiz cultual sin sobrecargar la frase.
- source_word: εὐθύτητι καρδίας
  english_pob_choice: uprightness of heart
  chosen_spanish: rectitud de corazón
  alternatives_spanish:
  - rectitud del corazón
  - integridad de corazón
  lexicon: LSJ
  rationale: La frase conserva el énfasis moral e interior del original y suena natural en español bíblico actual.
- source_word: ἁπλότης / ἁπλότητι
  english_pob_choice: simplicity
  chosen_spanish: sencillez
  alternatives_spanish:
  - simplicidad
  - sinceridad
  lexicon: BDAG
  rationale: En español, 'sencillez' comunica mejor la virtud de una vida sin complicación ni doblez, manteniendo la línea temática del capítulo.
- source_word: περίεργος
  english_pob_choice: meddlesome
  chosen_spanish: entrometido
  alternatives_spanish:
  - curioso
  - metiche
  lexicon: BDAG
  rationale: No describe curiosidad inocente, sino intromisión en asuntos ajenos. 'Entrometido' es el equivalente natural y moralmente claro.
- source_word: φθονερὸς
  english_pob_choice: envious
  chosen_spanish: envidioso
  alternatives_spanish:
  - celoso
  lexicon: BDAG
  rationale: La viciosidad moral del término se expresa de manera directa con 'envidioso'.
- source_word: βάσκανος
  english_pob_choice: malicious
  chosen_spanish: malicioso
  alternatives_spanish:
  - de mal de ojo
  - rencoroso
  lexicon: LSJ
  rationale: '''Malicioso'' reproduce bien el sentido de hostilidad dañina. La alternativa relacionada con el ''mal de ojo'' queda implícita, pero no se impone en el texto principal.'
- source_word: κατελάλησα
  english_pob_choice: slandered
  chosen_spanish: calumnié
  alternatives_spanish:
  - hablé mal de
  - hablé contra
  lexicon: BDAG
  rationale: El verbo implica hablar contra alguien de forma difamatoria; 'calumnié' es fuerte y apropiado.
- source_word: ἔψεξα βίον ἀνθρώπου
  english_pob_choice: criticize a man's way of life
  chosen_spanish: critiqué la manera de vivir de ningún hombre
  alternatives_spanish:
  - hallé दोष en la vida de ningún hombre
  - reproché la conducta de ningún hombre
  lexicon: LSJ
  rationale: Se mantiene el objeto 'vida/manera de vivir' y la idea de reprender la conducta, sin reducirlo a una acusación genérica.
- source_word: κάματος
  english_pob_choice: labor
  chosen_spanish: trabajo
  alternatives_spanish:
  - labor
  - fatiga
  lexicon: BDAG
  rationale: En este contexto agrícola, 'trabajo' transmite la idea de esfuerzo sostenido y es muy natural en español.
- source_word: ἡδονὴν γυναικός
  english_pob_choice: a woman's pleasure
  chosen_spanish: el placer de una mujer
  alternatives_spanish:
  - el deleite sexual de una mujer
  - placer sensual con una mujer
  lexicon: LSJ
  rationale: La frase apunta al goce sexual; 'el placer de una mujer' es sobrio y respeta el tono disciplinado del pasaje.
- source_word: πᾶν πρῶτον γέννημα
  english_pob_choice: every firstborn
  chosen_spanish: todo primogénito
  alternatives_spanish:
  - todo primer fruto
  - toda primera cría
  lexicon: LSJ
  rationale: En español, 'primogénito' es la forma más clara y bíblica para el ámbito sacrificial; aun así, el término puede abarcar más ampliamente la primera producción.
- source_word: ἐμυριοπλασίασε
  english_pob_choice: multiplied ... ten thousandfold
  chosen_spanish: multiplicó ... diez mil veces
  alternatives_spanish:
  - multiplicó ... innumerablemente
  - hizo abundar ... diez mil veces
  lexicon: LSJ
  rationale: La forma compuesta expresa una hipérbole fuerte; 'diez mil veces' conserva esa intensidad mejor que una formulación vaga.
theological_decisions:
- issue: Referencia cultual de Raquel al dedicar las mandrágoras 'en la casa del Señor' y llevarlas 'al sacerdote' en un contexto patriarcal
  english_pob_reading: Translate the Greek witness directly and preserve the anachronistic cultic language in the main text
  chosen_spanish_reading: Traducir directamente el testimonio griego y conservar en el cuerpo principal la formulación cultual anacrónica
  alternative_spanish_readings:
  - Suavizar u omitir la referencia al sacerdote y a la casa del Señor para armonizar con Génesis
  - Tratar la línea como secundaria y relegarla al aparato
  rationale: El testimonio griego contiene explícitamente esa formulación. Para una edición transparente, la traducción debe reflejar lo que el texto dice, aunque parezca una expansión posterior respecto de Génesis.
  doctrine_reference: 'PHILOSOPHY.md: traducir honestamente el texto fuente; usar notas en vez de armonizar'
- issue: Virtud clave ἁπλότης en Issacar
  english_pob_reading: Render consistently as 'simplicity'
  chosen_spanish_reading: Renderizar consistentemente como 'sencillez'
  alternative_spanish_readings:
  - simplicidad
  - sinceridad
  - integridad
  rationale: El capítulo insiste en esta virtud como rasgo central del personaje. 'Sencillez' permite conservar el hilo temático y suena natural en español actual.
  doctrine_reference: 'DOCTRINE.md: consistencia de términos clave, o excepción documentada'
translation_notes:
  revision_awareness: No se detectaron revisiones posteriores que alteren la lectura base; se mantuvo el testimonio griego y la línea de auditable equivalencia óptima.
  spanish_consistency_notes:
  - Se conservó 'sencillez' para ἁπλότης en todo el pasaje.
  - '''Señor'' se emplea para Κύριος conforme al contexto de cita/testimonio, manteniendo el registro bíblico sin sustituirlo por ''Yahvé'' en esta sección transmisional.'
  - '''Mandrágoras'' se reservó para μανδραγόροις, mientras que ''manzanas'' se mantuvo para μῆλα en la línea previa del testimonio.'
