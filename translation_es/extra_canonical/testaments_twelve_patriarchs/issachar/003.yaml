base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/issachar/003.yaml
  text: 'For if Leah my mother had not given up marital union in exchange for the two apples[a], she would still have been destined to bear eight sons. Therefore she bore six, and Rachel bore the two, because through the mandrakes the Lord visited her. For he saw that Leah desired to be with Jacob for the sake of children, and not for the sake of pleasure. For on the next day also she again gave Jacob over. Therefore through the mandrakes the Lord listened to Rachel. For although she longed for these, she did not eat them, but dedicated them in the house of the Lord, after bringing them to the priest.


    When therefore I grew to manhood, my children, I walked in uprightness of heart, and I became a farmer for my father and for my brothers. And my father blessed me, seeing that I walked before him in simplicity. And I was not meddlesome in my actions, nor envious and malicious toward my neighbor. I never slandered anyone, nor did I criticize a man''s way of life. At thirty-five years of age I took a wife for myself, for my labor consumed my strength, and I did not think about a woman''s pleasure; rather, because of my toil, sleep came over me. And my father always rejoiced in my simplicity, because I offered every firstborn through the priest to the Lord, and then also to my father. And the Lord multiplied my good things ten thousandfold[d][c][b], and my father likewise increased the good things for me twofold.'
  footnotes:
  - marker: a
    text: Greek 'apples'; the surrounding tradition and the next lines identify the plants as mandrakes.
    reason: lexical_alternative
  - marker: b
    text: Or 'evil-eyed' or 'begrudging' toward my neighbor.
    reason: lexical_alternative
  - marker: c
    text: The Greek includes 'in the house of the Lord' and 'after bringing them to the priest,' language that may reflect a later cultic framing of the patriarchal story rather than the Genesis narrative itself.
    reason: textual_variant
  - marker: d
    text: '''Every firstborn'' may broadly denote first issue or first produce, not only animal offspring.'
    reason: lexical_alternative
