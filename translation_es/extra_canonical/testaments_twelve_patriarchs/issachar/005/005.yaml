id: T12P.ISS.5.5
reference: Testament of Issachar 5:5
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 176-187, Issachar pilot)
  text: 5. Οὐ γὰρ δέδοται ὑμῖν²⁴ ἄλλη μερὶς Γ*εἰ μὴ²⁵ *τῆς πιότητος²⁶ τῆς γῆς *ἐν πόνοις καρπῶν²⁷¹.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/issachar/005/005.yaml
  text: For no other portion has been given to you except the richness of the earth by the labor of fruits.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:06Z'
    unchanged: false
    changes_summary: Changed 'through the toil of its fruits' to 'by the labor of fruits' for closer alignment with ἐν πόνοις καρπῶν and to avoid the interpretive addition 'its.'
translation:
  language: es
  text: Porque ninguna otra porción[a] les ha sido dada sino la riqueza[b] de la tierra por el trabajo de los frutos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: ''parte'' o ''heredad'' (μερίς), término de herencia tribal.'
    reason: lexical_alternative
  - marker: b
    text: Lit. 'la grosura de la tierra' (πιότης), idioma agrícola hebreo-griego de abundancia.
    reason: lexical_alternative
lexical_decisions:
- source_word: μερὶς
  english_pob_choice: portion
  chosen_spanish: porción
  alternatives_spanish:
  - parte
  - heredad
  lexicon: LSJ
  rationale: Término estándar de herencia tribal; 'porción' encaja en el contexto de reparto sin sobreespecificar.
- source_word: δέδοται ὑμῖν
  english_pob_choice: has been given to you
  chosen_spanish: les ha sido dada
  alternatives_spanish:
  - se les ha dado
  - han recibido
  lexicon: LSJ
  rationale: Pasiva perfecta que conserva la fuerza griega del 'don establecido' en forma 'ustedes' para neutralidad.
- source_word: εἰ μὴ
  english_pob_choice: except
  chosen_spanish: sino
  alternatives_spanish:
  - excepto
  - salvo
  lexicon: LSJ
  rationale: '''Sino'' es la conjunción adversativa idiomática tras la negación; resulta más natural que ''excepto'' en español.'
- source_word: πιότητος τῆς γῆς
  english_pob_choice: the richness of the earth
  chosen_spanish: la riqueza de la tierra
  alternatives_spanish:
  - la fertilidad de la tierra
  - la grosura de la tierra
  lexicon: LSJ
  rationale: '''Riqueza'' transmite la abundancia con claridad; ''grosura'' es más literal pero menos natural en español moderno.'
- source_word: ἐν πόνοις καρπῶν
  english_pob_choice: by the labor of fruits
  chosen_spanish: por el trabajo de los frutos
  alternatives_spanish:
  - con el esfuerzo de los frutos
  - mediante la labor de los frutos
  lexicon: LSJ
  rationale: Refleja la revisión inglesa que evita la adición interpretativa 'sus'; conserva la conexión entre fruto agrícola y trabajo.
translation_notes:
  revision_awareness: Refleja la revisión inglesa de 'through the toil of its fruits' a 'by the labor of fruits' eliminando la adición interpretativa 'its'; en español rendimos 'por el trabajo de los frutos' sin posesivo añadido.
  spanish_consistency_notes:
  - καρπός como 'fruto'.
  - γῆ como 'tierra'.
  - Forma 'ustedes' para destinatarios plurales.
  - μερίς como 'porción'.
