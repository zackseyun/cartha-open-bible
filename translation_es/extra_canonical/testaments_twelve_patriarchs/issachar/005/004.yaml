base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/issachar/005/004.yaml
  text: For in the firstfruits of the produce of the land the Lord will bless you, just as he blessed all the holy ones from Abel until now.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:04Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Porque en las primicias[a] de los frutos de la tierra el Señor los bendecirá, así como bendijo a todos los santos[b] desde Abel hasta ahora.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. 'primeros frutos'; término técnico de la ofrenda agrícola.
    reason: lexical_alternative
  - marker: b
    text: ἁγίους lit. 'los apartados, los consagrados'; aquí evoca la línea de adoradores aceptados desde Abel.
    reason: cross_reference
lexical_decisions:
- source_word: πρωτογεννήμασιν
  english_pob_choice: firstfruits
  chosen_spanish: primicias
  alternatives_spanish:
  - primeros frutos
  lexicon: LSJ
  rationale: '''Primicias'' es el término técnico-cúltico estable en español bíblico y conserva la resonancia escritural.'
- source_word: καρπῶν τῆς γῆς
  english_pob_choice: the produce of the land
  chosen_spanish: los frutos de la tierra
  alternatives_spanish:
  - la cosecha de la tierra
  - los productos de la tierra
  lexicon: LSJ
  rationale: Mantiene la concreción agrícola y el vocabulario consistente del libro.
- source_word: εὐλογήσει ὑμᾶς Κύριος
  english_pob_choice: the Lord will bless you
  chosen_spanish: el Señor los bendecirá
  alternatives_spanish:
  - el Señor los bendecirá a ustedes
  lexicon: LSJ
  rationale: Forma 'ustedes' para neutralidad latinoamericana; 'los bendecirá' resulta natural y conserva el orden enfático del griego.
- source_word: καθὼς εὐλόγησε πάντας τοὺς ἁγίους
  english_pob_choice: just as he blessed all the holy ones
  chosen_spanish: así como bendijo a todos los santos
  alternatives_spanish:
  - tal como bendijo a todos los santos
  lexicon: LSJ
  rationale: '''Así como'' marca la comparación con claridad; ''santos'' traduce ἁγίους conservando el sentido de ''apartados''.'
- source_word: ἁγίους
  english_pob_choice: the holy ones
  chosen_spanish: los santos
  alternatives_spanish:
  - los consagrados
  - los justos
  lexicon: LSJ
  rationale: Aunque la POB inglesa evita 'saints' por sobretonos eclesiásticos, en español 'santos' funciona en registro bíblico amplio sin imponer la lectura del santoral; la nota aclara el matiz.
- source_word: ἀπὸ Ἀβὲλ ἕως τοῦ νῦν
  english_pob_choice: from Abel until now
  chosen_spanish: desde Abel hasta ahora
  alternatives_spanish:
  - desde Abel hasta el día de hoy
  lexicon: LSJ
  rationale: Traducción literal y natural que evoca la línea de adoradores aceptados desde Abel.
translation_notes:
  revision_awareness: La revisión inglesa quedó sin cambios. Mantengo el tono escritural y la fórmula 'desde Abel hasta ahora'.
  spanish_consistency_notes:
  - Κύριος como 'Señor'.
  - πρωτογεννήματα como 'primicias'.
  - ἅγιος como 'santo'.
  - καρπός como 'fruto'.
