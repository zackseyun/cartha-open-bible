  text: 4. Ὅτι¹⁵ ἐν πρωτογεννήμασιν¹⁶ καρπῶν¹⁷ Γτῆς γῆς¹⁸¹ *εὐλογήσει ὑμᾶς¹⁹ Κύριος²⁰ Γκαθὼς εὐλόγησε²¹ πάντας τοὺς²² ἁγίους²³ ἀπὸ ᾿Αβὲλ ἕως τοῦ νῦν¹.
