id: T12P.ISS.5.8
reference: Testament of Issachar 5:8
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 176-187, Issachar pilot)
  text: 8. *Καὶ ὑμεῖς Γοὖν¹ αὐτοῖς ὑπακούετε⁴⁴ καὶ⁴⁵ τῇ ἁπλότητι⁴⁶ τοῦ πατρὸς ὑμῶν περιπατεῖτε⁴⁷· [*τῷ δὲ⁴⁸ Γὰδ ἐδόθη ἀπολέσαι τὰ *ἐπερχόμενα πειρατήρια⁴⁹ τῷ Ἰσραήλ].
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/issachar/005/008.yaml
  text: Therefore obey them, and walk in the simplicity of your father. [But to Gad it was given to destroy the marauding bands coming upon Israel.]
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:09Z'
    unchanged: false
    changes_summary: Revised 'marauding raids' to 'marauding bands' for more natural English and a better fit for πειρατήρια; otherwise retained the draft.
translation:
  language: es
  text: Por tanto, ustedes obedézcanles, y caminen en la sencillez de su padre. [Pero a Gad le fue dado destruir las bandas de saqueadores[a] que vinieran sobre Israel.][b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: πειρατήρια, lit. 'piraterías' o 'incursiones'; aquí denota bandas predadoras hostiles.
    reason: lexical_alternative
  - marker: b
    text: La cláusula final entre corchetes encaja con dificultad en este contexto y puede reflejar una glosa posterior o línea desplazada; se traduce porque aparece en el testimonio griego.
    reason: textual_variant
lexical_decisions:
- source_word: ὑπακούετε
  english_pob_choice: obey
  chosen_spanish: obedézcanles
  alternatives_spanish:
  - escúchenles
  - sométanse a ellos
  lexicon: LSJ
  rationale: El imperativo es fuerte y directo en el encargo testamentario del padre; 'obedézcanles' (forma 'ustedes') es claro y natural.
- source_word: τῇ ἁπλότητι τοῦ πατρὸς ὑμῶν περιπατεῖτε
  english_pob_choice: walk in the simplicity of your father
  chosen_spanish: caminen en la sencillez de su padre
  alternatives_spanish:
  - anden en la sencillez de su padre
  lexicon: LSJ
  rationale: Conserva el verbo de andar moral (περιπατέω) y la virtud temática 'sencillez'; mantiene la consistencia con 'sencillez' a lo largo de Isacar.
- source_word: πειρατήρια
  english_pob_choice: marauding bands
  chosen_spanish: bandas de saqueadores
  alternatives_spanish:
  - incursores
  - bandas de bandidos
  - bandas de piratas
  lexicon: LSJ
  rationale: Refleja la revisión inglesa que pasó de 'marauding raids' a 'marauding bands'; 'bandas de saqueadores' es natural en español y captura las incursiones depredadoras.
- source_word: ἐπερχόμενα
  english_pob_choice: coming upon
  chosen_spanish: que vinieran sobre
  alternatives_spanish:
  - que cayeran sobre
  - que avanzaran contra
  lexicon: LSJ
  rationale: El participio describe la incursión hostil; el subjuntivo imperfecto en español ('que vinieran') corresponde al sentido eventual de la cláusula.
theological_decisions:
- issue: Estatus de la cláusula entre corchetes sobre Gad
  chosen_reading: Traducida entre corchetes como parte del testimonio griego pero marcada como material aparentemente secundario.
  alternative_readings:
  - Omitir como glosa posterior
  - Traducir sin corchetes como texto plenamente integral
  rationale: La cláusula encaja torpemente tras la exhortación a obedecer a Leví y Judá y parece una intrusión textual. Siguiendo el principio de transparencia, se traduce honestamente del testimonio pero se marca visualmente como probable material secundario o, al menos, dislocado.
translation_notes:
  revision_awareness: Refleja la revisión inglesa que cambió 'marauding raids' a 'marauding bands' para πειρατήρια; en español rendimos 'bandas de saqueadores' como equivalente natural y dignificado.
  spanish_consistency_notes:
  - ἁπλότης como 'sencillez' a lo largo de Isacar.
  - περιπατέω como 'caminar' en sentido moral.
  - Imperativos plurales en 'ustedes'.
  - Marca visual con corchetes para material textualmente sospechoso.
