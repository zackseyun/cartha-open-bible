id: T12P.ISS.5.1
reference: Testament of Issachar 5:1
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 176-187, Issachar pilot)
  text: V. Φυλάξατε οὖν *τέκνα μου νόμον Θεοῦ¹, καὶ *τὴν ἁπλότητα κτήσασθε², ⌜καὶ ἐν ἀκακίᾳ πορεύεσθε, μὴ περιαργαζόμενοι τοῦ³ πλησίον⁴ τὰς πράξεις.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/issachar/005/001.yaml
  text: Therefore, my children, keep the law of God, and acquire simplicity, and walk in innocence, not concerning yourselves with the deeds of your neighbor.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:56:06Z'
    unchanged: false
    changes_summary: Replaced 'busying yourselves with' with 'concerning yourselves with' to more naturally and formally reflect μὴ περιαργαζόμενοι without the colloquial sense of mere busyness.
translation:
  language: es
  text: Por tanto, hijos míos, guarden la ley de Dios, y adquieran sencillez[a], y caminen en inocencia, sin ocuparse[b] de los hechos del prójimo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: ''simplicidad'' o ''integridad''.'
    reason: lexical_alternative
  - marker: b
    text: 'También: ''sin entrometerse'' (περιαργαζόμενοι), expresando la fastidiosa interferencia en los asuntos ajenos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: νόμον Θεοῦ
  english_pob_choice: the law of God
  chosen_spanish: la ley de Dios
  alternatives_spanish:
  - la ley divina
  lexicon: LSJ
  rationale: Standard objective genitive rendering preserving the elevated testamentary tone.
- source_word: ἁπλότητα
  english_pob_choice: simplicity
  chosen_spanish: sencillez
  alternatives_spanish:
  - simplicidad
  - integridad
  lexicon: LSJ
  rationale: Issachar consistently praises plain, undivided, guileless living. 'Sencillez' preserves the thematic thread without over-interpreting.
- source_word: ἀκακίᾳ
  english_pob_choice: innocence
  chosen_spanish: inocencia
  alternatives_spanish:
  - candor
  - sencillez sin malicia
  lexicon: LSJ
  rationale: Pairs naturally with 'sencillez' while preserving the moral sense of being without malice.
- source_word: μὴ περιαργαζόμενοι
  english_pob_choice: not concerning yourselves
  chosen_spanish: sin ocuparse
  alternatives_spanish:
  - sin entrometerse
  - sin meterse
  lexicon: LSJ
  rationale: '''Sin ocuparse'' matches the revision-pass move from ''busying yourselves'' to ''concerning yourselves'' without colloquial overtones, while remaining natural Latin-American Spanish.'
- source_word: τοῦ πλησίον τὰς πράξεις
  english_pob_choice: the deeds of your neighbor
  chosen_spanish: los hechos del prójimo
  alternatives_spanish:
  - las acciones del prójimo
  - los asuntos del prójimo
  lexicon: LSJ
  rationale: '''Hechos del prójimo'' keeps the concrete moral focus on what others do rather than abstract affairs.'
translation_notes:
  revision_awareness: Reflects revision-pass shift from 'busying yourselves' to 'concerning yourselves' for μὴ περιαργαζόμενοι; chose 'sin ocuparse' as the dignified Spanish equivalent.
  spanish_consistency_notes:
  - ἁπλότης as 'sencillez' throughout Issachar.
  - πλησίον as 'prójimo'.
  - Imperative plural in 'ustedes' form for Latin-American neutrality.
