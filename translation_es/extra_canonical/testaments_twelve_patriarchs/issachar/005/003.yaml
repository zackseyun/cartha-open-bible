translation:
  language: es
  text: Inclinen[a] la espalda al cultivo de la tierra, y trabajen en cada labor de cultivo[b], ofreciendo dones[c] al Señor con acción de gracias.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. 'pongan' o 'doblen la espalda', imagen corporal de someterse al trabajo.
    reason: lexical_alternative
  - marker: b
    text: 'También: ''en toda obra agrícola'' o ''en cada labor de la tierra''.'
    reason: lexical_alternative
  - marker: c
    text: 'También: ''presentando ofrendas'' (δῶρα προσφέροντες), con resonancia cúltica.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὑποτίθετε τὸν νῶτον ὑμῶν
  english_pob_choice: Bend your back
  chosen_spanish: Inclinen la espalda
  alternatives_spanish:
  - Pongan la espalda
  - Doblen la espalda
  lexicon: LSJ
  rationale: Conserva la imagen corporal de someterse al trabajo agrícola. 'Inclinar la espalda' es idiomático en español y mantiene el realismo físico.
- source_word: γεωργεῖν / γεωργίαν
  english_pob_choice: farming / cultivation
  chosen_spanish: cultivo de la tierra / cultivo
  alternatives_spanish:
  - labranza
  - agricultura
  lexicon: LSJ
  rationale: Mantiene viva la temática agraria de Isacar y resulta legible en español moderno.
- source_word: ἐργάζεσθε ἐν ἔργοις καθ᾽ ἑκάστην γεωργίαν
  english_pob_choice: labor in every work of cultivation
  chosen_spanish: trabajen en cada labor de cultivo
  alternatives_spanish:
  - esfuércense en toda obra agrícola
  lexicon: LSJ
  rationale: Conserva la repetición ἐργάζεσθε/ἔργοις con 'trabajen/labor' y la distributividad de 'cada'.
- source_word: δῶρα ... Κυρίῳ προσφέροντες
  english_pob_choice: offering gifts to the Lord
  chosen_spanish: ofreciendo dones al Señor
  alternatives_spanish:
  - presentando ofrendas al Señor
  - trayendo dones al Señor
  lexicon: LSJ
  rationale: El participio denota presentación cúltica; 'dones' refleja δῶρα y resulta natural en el contexto.
- source_word: μετ᾽ εὐχαριστείας
  english_pob_choice: with thanksgiving
  chosen_spanish: con acción de gracias
  alternatives_spanish:
  - con gratitud
  - con agradecimiento
  lexicon: LSJ
  rationale: '''Acción de gracias'' conserva el matiz litúrgico y devocional, frente al más cotidiano ''gratitud''.'
translation_notes:
  revision_awareness: La revisión inglesa quedó sin cambios. Mantengo la cadena de participios y el tono devocional del texto griego.
  spanish_consistency_notes:
  - Κύριος como 'Señor'.
  - γεωργεῖν como 'cultivo de la tierra' / 'cultivo' en Isacar.
  - δῶρα προσφέρειν como 'ofrecer dones'.
  - Imperativos plurales en 'ustedes'.
