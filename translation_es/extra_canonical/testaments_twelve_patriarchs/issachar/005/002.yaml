id: T12P.ISS.5.2
reference: Testament of Issachar 5:2
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 176-187, Issachar pilot)
  text: 2. Ἀλλὰ ἀγαπήσατε⁵ τὸν⁶ Κύριον καὶ τὸν πλησίον⁷· πένητα καὶ ἀσθενῆ⁸ ἐλεήσατε⁹.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/issachar/005/002.yaml
  text: But love the Lord and your neighbor. Show mercy to the poor and the weak.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:56:05Z'
    unchanged: false
    changes_summary: Replaced the semicolon with a period to reflect the sentence break in the Greek; otherwise retained the draft wording as accurate and natural.
translation:
  language: es
  text: Pero amen al Señor y al prójimo. Tengan misericordia[a] del pobre y del débil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: ''sean compasivos con'' o ''compadézcanse de'' (ἐλεέω).'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀγαπήσατε
  english_pob_choice: love
  chosen_spanish: amen
  alternatives_spanish:
  - amad
  lexicon: LSJ
  rationale: Imperativo plural en forma 'ustedes' para neutralidad latinoamericana, conservando la fuerza imperativa del aoristo.
- source_word: τὸν Κύριον
  english_pob_choice: the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - al Señor Dios
  lexicon: LSJ
  rationale: Κύριος como 'Señor' es la convención estable en POB.
- source_word: πλησίον
  english_pob_choice: neighbor
  chosen_spanish: prójimo
  alternatives_spanish:
  - vecino
  lexicon: LSJ
  rationale: '''Prójimo'' conserva el sentido bíblico-ético del término, frente al más espacial ''vecino''.'
- source_word: ἐλεήσατε
  english_pob_choice: show mercy
  chosen_spanish: tengan misericordia
  alternatives_spanish:
  - sean compasivos con
  - compadézcanse de
  lexicon: LSJ
  rationale: Imperativo fuerte con peso ético-pactual; 'tengan misericordia' es idiomático y conserva la fuerza activa.
- source_word: πένητα καὶ ἀσθενῆ
  english_pob_choice: the poor and the weak
  chosen_spanish: del pobre y del débil
  alternatives_spanish:
  - del necesitado y del enfermo
  lexicon: LSJ
  rationale: Singular genérico que conserva el paralelismo griego; 'pobre' y 'débil' son las categorías éticas claras.
translation_notes:
  revision_awareness: Refleja la división de la oración en la revisión inglesa (semicolon → period); en español usamos punto seguido para mantener las dos exhortaciones como unidades distintas.
  spanish_consistency_notes:
  - Κύριος como 'Señor'.
  - πλησίον como 'prójimo'.
  - ἐλεέω como 'tener misericordia' en sentido pactual.
  - Imperativos plurales en 'ustedes' para neutralidad latinoamericana.
