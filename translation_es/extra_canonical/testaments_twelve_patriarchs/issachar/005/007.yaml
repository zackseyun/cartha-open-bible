base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/issachar/005/007.yaml
  text: 'And Levi and Judah were glorified by the Lord among the sons of Jacob. And the Lord allotted to them their inheritance: to Levi, the priesthood; and to Judah, the kingdom.'
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:07Z'
    unchanged: false
    changes_summary: Revised 'gave them as an inheritance' to 'allotted to them their inheritance' to more accurately reflect ἐκληροδότησεν and produce more natural formal English.
translation:
  language: es
  text: 'Y Leví y Judá fueron glorificados por el Señor entre los hijos de Jacob. Y el Señor les asignó[a] su heredad: a Leví, el sacerdocio; y a Judá, el reino[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ἐκληροδότησεν, lit. 'distribuyó por suerte/herencia'; verbo técnico de reparto territorial.
    reason: lexical_alternative
  - marker: b
    text: 'También: ''la realeza'' o ''el dominio real'' (βασιλεία).'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐδοξάσθησαν παρὰ Κυρίου
  english_pob_choice: were glorified by the Lord
  chosen_spanish: fueron glorificados por el Señor
  alternatives_spanish:
  - fueron honrados por el Señor
  lexicon: LSJ
  rationale: Pasiva aoristo con agente; 'glorificados' conserva el peso doxológico del verbo griego.
- source_word: ἐν υἱοῖς Ἰακώβ
  english_pob_choice: among the sons of Jacob
  chosen_spanish: entre los hijos de Jacob
  alternatives_spanish:
  - entre los descendientes de Jacob
  lexicon: LSJ
  rationale: Traducción literal estándar; preserva la fórmula tribal.
- source_word: ἐκληροδότησεν αὐτούς
  english_pob_choice: allotted to them their inheritance
  chosen_spanish: les asignó su heredad
  alternatives_spanish:
  - les repartió su heredad
  - les distribuyó su porción
  lexicon: LSJ
  rationale: Refleja la revisión inglesa de 'gave them as an inheritance' a 'allotted to them their inheritance' para precisar ἐκληροδότησεν; en español 'asignar la heredad' resulta natural y preciso.
- source_word: ἱερατείαν
  english_pob_choice: the priesthood
  chosen_spanish: el sacerdocio
  alternatives_spanish:
  - el oficio sacerdotal
  lexicon: LSJ
  rationale: Rendición estándar y precisa para el papel asignado a Leví.
- source_word: βασιλείαν
  english_pob_choice: the kingdom
  chosen_spanish: el reino
  alternatives_spanish:
  - la realeza
  - el dominio real
  lexicon: LSJ
  rationale: Conserva la fuerza dinástico-política del rol de Judá.
translation_notes:
  revision_awareness: Refleja la revisión inglesa que cambió 'gave them as an inheritance' a 'allotted to them their inheritance' para reflejar ἐκληροδότησεν con mayor precisión; el español 'les asignó su heredad' captura la misma sutileza.
  spanish_consistency_notes:
  - Κύριος como 'Señor'.
  - Ἰακώβ como 'Jacob'.
  - Λευί como 'Leví', Ἰούδας como 'Judá'.
  - ἱερατεία como 'sacerdocio', βασιλεία como 'reino'.
