  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 176-187, Issachar pilot)
  text: 6. *Ὅτι καὶ²⁸ ὁ πατήρ μου²⁹ Ἰακώβ³⁰ ἐν³¹ εὐλογίαις Γτῆς³² γῆς καὶ ἀπαρχῶν³³ καρπῶν³⁴ εὐλόγησέ με.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/issachar/005/006.yaml
  text: For my father Jacob also blessed me with blessings of the earth and firstfruits of fruits.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:07Z'
    unchanged: false
    changes_summary: Removed the second 'of' before 'firstfruits' to better reflect the Greek construction, and changed 'produce' to 'fruits' for closer lexical correspondence to καρπῶν.
translation:
  language: es
  text: Porque también mi padre Jacob me bendijo con bendiciones de la tierra y primicias[a] de los frutos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ἀπαρχή lit. 'primeros frutos'; término técnico de la ofrenda inicial al Señor.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὅτι καὶ
  english_pob_choice: For ... also
  chosen_spanish: Porque también
  alternatives_spanish:
  - Pues también
  lexicon: LSJ
  rationale: Conserva la fuerza causal-aditiva de Ὅτι καὶ con un giro natural en español.
- source_word: ὁ πατήρ μου Ἰακώβ
  english_pob_choice: my father Jacob
  chosen_spanish: mi padre Jacob
  alternatives_spanish:
  - mi padre Israel
  lexicon: LSJ
  rationale: Transliteración estándar de Ἰακώβ; mantiene el nombre patriarcal en su forma habitual.
- source_word: εὐλογίαις τῆς γῆς
  english_pob_choice: blessings of the earth
  chosen_spanish: bendiciones de la tierra
  alternatives_spanish:
  - bendiciones del suelo
  - bendiciones del campo
  lexicon: LSJ
  rationale: Conserva el genitivo objetivo simple; 'tierra' mantiene la temática agraria.
- source_word: ἀπαρχῶν καρπῶν
  english_pob_choice: firstfruits of fruits
  chosen_spanish: primicias de los frutos
  alternatives_spanish:
  - primicias de los productos
  - primeros frutos del campo
  lexicon: LSJ
  rationale: Refleja la revisión inglesa que pasó de 'produce' a 'fruits' por correspondencia léxica con καρπῶν; mantiene 'primicias' (ἀπαρχή) como término técnico cúltico.
translation_notes:
  revision_awareness: Refleja la revisión inglesa que ajustó 'produce' a 'fruits' (καρπῶν) y eliminó el segundo 'of' redundante; en español rendimos sin la duplicación preposicional.
  spanish_consistency_notes:
  - καρπός como 'fruto'.
  - ἀπαρχή como 'primicias'.
  - Ἰακώβ como 'Jacob'.
  - γῆ como 'tierra'.
