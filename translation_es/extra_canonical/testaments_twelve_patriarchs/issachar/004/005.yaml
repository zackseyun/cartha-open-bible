translation:
  language: es
  text: No envidia en las deliberaciones, ni la envidia maliciosa consume su alma, ni hay distracción en la avidez en su mente.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Οὐ ζηλοῖ ἐν διαβουλίοις
  english_pob_choice: He does not envy in deliberations
  chosen_spanish: No envidia en las deliberaciones
  alternatives_spanish:
  - No siente celos en las deliberaciones
  - No envidia al deliberar
  lexicon: ζηλόω; διαβούλια
  rationale: En este contexto, ζηλόω expresa envidia/celos como actitud interior, no simple emulación. Deliberaciones traduce διαβουλίοις de forma natural y conserva el ámbito de discusión o consejo.
- source_word: οὐ βάσκανος ἐκτήκει τὴν ψυχὴν αὐτοῦ
  english_pob_choice: nor does malicious envy consume his soul
  chosen_spanish: ni la envidia maliciosa consume su alma
  alternatives_spanish:
  - ni la malevolencia envidiosa consume su alma
  - ni la envidia dañina devora su alma
  lexicon: βάσκανος; ἐκτήκει; ψυχή
  rationale: βάσκανος apunta a envidia maliciosa o mirada dañina; 'envidia maliciosa' conserva la carga moral. ἐκτήκει se vierte con 'consume' para expresar el desgaste/destrucción paulatina de la persona. ψυχή se traduce como 'alma' siguiendo el valor antropológico del texto.
- source_word: οὐδὲ περισπασμὸς ἐν ἀπληστείᾳ ἐν νοΐ
  english_pob_choice: nor is there distraction in greed in his mind
  chosen_spanish: ni hay distracción en la avidez en su mente
  alternatives_spanish:
  - ni hay dispersión en la codicia en su mente
  - ni su mente se distrae por la avaricia
  lexicon: περισπασμός; ἀπληστία; νοῦς
  rationale: περισπασμός se entiende como distracción o dispersión mental; 'distracción' es claro en español y sigue la lectura del POB. ἀπληστία expresa codicia/avaricia/insaciabilidad; 'avidez' mantiene el impulso de querer más sin cargar demasiado el juicio moral. νοῦς se vierte como 'mente' para conservar el ámbito cognitivo.
theological_decisions:
- issue: Relación entre envidia y juicio moral interno
  english_pob_reading: 'The line describes inward dispositions: envy, malicious envy, and distraction in greed.'
  chosen_spanish_reading: 'La línea describe disposiciones interiores: envidia, envidia maliciosa y distracción por la avidez.'
  alternative_spanish_readings:
  - Describe actos externos de competencia
  - Describe solo rasgos temperamentales
  rationale: El griego enumera estados internos y la versión española debe conservar ese foco antropológico y moral. 'Disposiciones interiores' evita reducirlo a conducta externa y mantiene la tensión ética del texto.
  doctrine_reference: Antropología moral del alma/mente en la literatura testamentaria judía helenística
translation_notes:
  revision_awareness: La revisión inglesa eliminó un marcador de nota en el texto principal y dejó intacta la redacción; por tanto, la versión española sigue la lectura continua sin notas textuales añadidas.
  spanish_consistency_notes:
  - Se mantiene 'alma' para ψυχή y 'mente' para νοῦς, distinguiendo niveles antropológicos.
  - '''Envidia maliciosa'' preserva el matiz intensificado de βάσκανος sin sustituirlo por una palabra más vaga.'
  - No se introduce 'Mesías', 'Yahvé' ni otros términos que no aparecen en este versículo.
