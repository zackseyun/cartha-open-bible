id: T12P.ISS.4.6
reference: Testament of Issachar 4:6
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 176-187, Issachar pilot)
  text: 6. Πορεύεται²⁹ δὲ³⁰ ἐν *ἁπλότητι ⌜ψυχῆς⌝³¹ πάντα³² ὁρᾷ³³ ἐν *εὐθύτητι ⌜καρδίας⌝³⁴ *μὴ ἐπιδεχόμενος³⁵ *ὀφθαλμοὺς πονηροὺς³⁶ ἀπὸ τῆς πλάνης τοῦ κόσμου *ἵνα μὴ ἴδῃ διεστραμμένας τὰς ἐντολὰς τοῦ Κυρίου³⁷.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/issachar/004/006.yaml
  text: But he walks in simplicity of soul; he sees all things with uprightness of heart, not accepting evil eyes from the world’s error, so that he may not see the commandments of the Lord as distorted.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:55Z'
    unchanged: false
    changes_summary: Changed “everything” to “all things” for closer lexical consistency with πάντα, and removed the stray footnote marker. Retained the rest as a faithful, formal rendering.
translation:
  language: es
  text: Pero camina en sencillez de alma; ve todas las cosas con rectitud de corazón[a], no admitiendo ojos malignos[b] del extravío del mundo, para no ver torcidos los mandamientos del Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: ''integridad de corazón'' o ''derechura de corazón''.'
    reason: lexical_alternative
  - marker: b
    text: La frase 'ojos malignos' puede evocar también la idea idiomática del 'mal de ojo', es decir, una mirada hostil o envidiosa.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἁπλότητι ψυχῆς
  english_pob_choice: simplicity of soul
  chosen_spanish: sencillez de alma
  alternatives_spanish:
  - simplicidad de alma
  - sinceridad de alma
  lexicon: LSJ
  rationale: '''Sencillez'' preserves the Issachar virtue vocabulary of plain, undivided moral living without reducing it to mere honesty.'
- source_word: εὐθύτητι καρδίας
  english_pob_choice: uprightness of heart
  chosen_spanish: rectitud de corazón
  alternatives_spanish:
  - integridad de corazón
  - derechura de corazón
  lexicon: LSJ
  rationale: '''Rectitud de corazón'' is dignified Latin-American Spanish that preserves the inward moral sense without sounding archaic.'
- source_word: μὴ ἐπιδεχόμενος
  english_pob_choice: not accepting
  chosen_spanish: no admitiendo
  alternatives_spanish:
  - no aceptando
  - no recibiendo
  lexicon: LSJ
  rationale: '''No admitiendo'' captures the active guarding of the inner life against intrusion, matching the participle''s force.'
- source_word: ὀφθαλμοὺς πονηρούς
  english_pob_choice: evil eyes
  chosen_spanish: ojos malignos
  alternatives_spanish:
  - ojos malvados
  - miradas envidiosas
  lexicon: LSJ
  rationale: Plural retained. 'Ojos malignos' echoes the Spanish idiom of mal de ojo while remaining transparent to the Greek imagery.
- source_word: πλάνης τοῦ κόσμου
  english_pob_choice: the world's error
  chosen_spanish: del extravío del mundo
  alternatives_spanish:
  - del engaño del mundo
  - del error del mundo
  lexicon: LSJ
  rationale: '''Extravío'' preserves the moral-intellectual sense of πλάνη (wandering/error) without overinterpreting toward ''deception''.'
- source_word: διεστραμμένας
  english_pob_choice: distorted
  chosen_spanish: torcidos
  alternatives_spanish:
  - distorsionados
  - pervertidos
  lexicon: LSJ
  rationale: '''Torcidos'' is natural Spanish and preserves the metaphor of moral crookedness that the Greek conveys.'
- source_word: ἐντολὰς τοῦ Κυρίου
  english_pob_choice: the commandments of the Lord
  chosen_spanish: los mandamientos del Señor
  alternatives_spanish:
  - los preceptos del Señor
  lexicon: LSJ
  rationale: Standard, scripturally resonant phrase in Spanish; preserves the elevated testamentary register.
translation_notes:
  revision_awareness: Reflects the revision-pass change of 'everything' to 'all things' (πάντα) rendered as 'todas las cosas', and the removal of the stray footnote marker on 'world's error'.
  spanish_consistency_notes:
  - ἁπλότης rendered consistently as 'sencillez' throughout Issachar.
  - Κύριος rendered as 'Señor'.
