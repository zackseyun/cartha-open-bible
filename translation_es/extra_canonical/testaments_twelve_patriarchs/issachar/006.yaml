base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/issachar/006.yaml
  text: Know therefore[a], my children, that in the last times your sons will abandon simplicity and attach themselves to greed; and leaving innocence, they will draw near to cunning, and abandoning the commandments of the Lord, they will attach themselves to Beliar. And leaving farming, they will follow their evil schemes, and they will be scattered among the nations and will serve their enemies. Therefore you also tell these things to your children, so that, if they sin, they may return more quickly to the Lord, because he is merciful and will deliver them[d][c][b], to bring them back into their land.
  footnotes:
  - marker: a
    text: Or 'guilelessness' for 'innocence' (ἀκακία), highlighting freedom from deceit rather than merely blamelessness.
    reason: lexical_alternative
  - marker: b
    text: Beliar is the Greek form found here; many readers will know the name as 'Belial.'
    reason: lexical_alternative
  - marker: c
    text: '''Return to the Lord'' carries the sense of repentance as well as restoration.'
    reason: cross_reference
  - marker: d
    text: The final clause may also be understood as 'and restore them to their land.'
    reason: alternative_reading
