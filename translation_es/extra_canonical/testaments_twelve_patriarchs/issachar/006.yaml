translation:
  language: es
  text: Conozcan, pues, hijos míos, que en los últimos tiempos sus hijos abandonarán la simplicidad y se apegarán a la avaricia; y dejando la inocencia, se acercarán a la astucia, y abandonando los mandamientos del Señor, se apegarán a Beliar. Y dejando el cultivo de la tierra, seguirán sus malos designios, y serán esparcidos entre las naciones y servirán a sus enemigos. Por tanto, ustedes también digan estas cosas a sus hijos, para que, si pecan, vuelvan más pronto al Señor, porque él es misericordioso y los librará[a][b][c], para traerlos de nuevo a su tierra[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «guilelessness»; la palabra griega ἀκακία subraya más exactamente la ausencia de engaño o malicia.'
    reason: lexical_alternative
  - marker: b
    text: Beliar es la forma griega presente aquí; muchos lectores conocen el nombre como «Belial».
    reason: lexical_alternative
  - marker: c
    text: «Volver al Señor» lleva el sentido de arrepentimiento además de restauración.
    reason: cross_reference
  - marker: d
    text: 'La última cláusula también puede entenderse como: «y restaurarlos a su tierra».'
    reason: alternative_reading
lexical_decisions:
- source_word: Γινώσκετε οὖν
  english_pob_choice: Know therefore
  chosen_spanish: Conozcan, pues
  alternatives_spanish:
  - Sepan, pues
  - Conozcan entonces
  lexicon: LSJ
  rationale: El imperativo exhortativo pide una forma natural en español. 'Conozcan' conserva el llamado directo; 'pues' reproduce la inferencia de οὖν sin endurecer el tono.
- source_word: ἁπλότης
  english_pob_choice: simplicity
  chosen_spanish: simplicidad
  alternatives_spanish:
  - sencillez
  - integridad
  lexicon: LSJ
  rationale: '''Simplicidad'' mantiene la virtud característica del pasaje y sigue la decisión auditada de la POB inglesa, evitando reducirla a mera falta de sofisticación.'
- source_word: ἀπληστία
  english_pob_choice: greed
  chosen_spanish: avaricia
  alternatives_spanish:
  - codicia
  - insaciabilidad
  lexicon: LSJ
  rationale: '''Avaricia'' comunica bien el deseo desordenado de acumular y es idiomático en español eclesial. Preserva la fuerza moral de la oposición con la simplicidad.'
- source_word: ἀκακία
  english_pob_choice: innocence
  chosen_spanish: inocencia
  alternatives_spanish:
  - guilelessness
  - ausencia de malicia
  lexicon: LSJ
  rationale: La palabra tiene el campo de falta de engaño o malicia. 'Inocencia' es la equivalencia española más natural en la serie virtud/vicio; la nota preserva la alternativa más precisa.
- source_word: πανουργία
  english_pob_choice: cunning
  chosen_spanish: astucia
  alternatives_spanish:
  - cunning
  - artificio
  lexicon: LSJ
  rationale: '''Astucia'' transmite la habilidad engañosa o calculadora y funciona mejor en español que una transliteración semánticamente plana.'
- source_word: κολληθήσονται
  english_pob_choice: attach themselves to
  chosen_spanish: se apegarán a / se apegarán a Beliar
  alternatives_spanish:
  - se adherirán a
  - se unirán a
  lexicon: LSJ
  rationale: El verbo expresa adhesión deliberada. 'Apegarse a' conserva el movimiento de lealtad y la repetición retórica del texto sin sonar forzado.
- source_word: Βελίαρ
  english_pob_choice: Beliar
  chosen_spanish: Beliar
  alternatives_spanish:
  - Belial
  lexicon: LSJ
  rationale: Se conserva la forma griega atestiguada en el texto fuente, siguiendo la decisión auditada de la POB inglesa y evitando normalizarla sin base textual.
- source_word: γεωργεῖν
  english_pob_choice: farming
  chosen_spanish: el cultivo de la tierra
  alternatives_spanish:
  - la agricultura
  - labrar la tierra
  lexicon: LSJ
  rationale: La expresión española debe abarcar el trabajo agrícola en general. 'Cultivo de la tierra' conserva el referente concreto y su valor idealizado en Issacar.
- source_word: πονηροῖς διαβουλίοις
  english_pob_choice: evil schemes
  chosen_spanish: malos designios
  alternatives_spanish:
  - malos planes
  - perversos consejos
  lexicon: LSJ
  rationale: '''Designios'' recoge el matiz de deliberación y propósito. ''Malos designios'' mantiene la carga moral sin estrechar el sentido a mera estrategia.'
- source_word: διασπαρήσονται
  english_pob_choice: they will be scattered
  chosen_spanish: serán esparcidos
  alternatives_spanish:
  - serán dispersados
  - serán sembrados por doquier
  lexicon: LSJ
  rationale: '''Esparcidos'' reproduce la imagen de dispersión entre las naciones con un español claro y bíblico, manteniendo el valor pasivo futuro.'
- source_word: δουλεύσουσιν
  english_pob_choice: will serve
  chosen_spanish: servirán
  alternatives_spanish:
  - serán esclavos de
  - quedarán sometidos a
  lexicon: LSJ
  rationale: Aunque el verbo puede sugerir esclavitud, aquí la sintaxis permite 'servirán' como subyugación bajo enemigos. La traducción no elimina la tensión, pero evita sobrerresolverla.
- source_word: τάχιον
  english_pob_choice: more quickly
  chosen_spanish: más pronto
  alternatives_spanish:
  - más rápidamente
  - con mayor prontitud
  lexicon: LSJ
  rationale: '''Más pronto'' conserva el comparativo temporal del griego y su valor exhortativo urgente en contexto de arrepentimiento.'
- source_word: ἐπιστρέψωσι πρὸς τὸν Κύριον
  english_pob_choice: return to the Lord
  chosen_spanish: vuelvan ... al Señor
  alternatives_spanish:
  - se vuelvan al Señor
  - regresen al Señor
  lexicon: LSJ
  rationale: '''Volver al Señor'' expresa conversión y retorno relacional. En español, ''al Señor'' mantiene la formulación tradicional del destinatario personal sin borrar el valor de arrepentimiento/restauración.'
- source_word: ἐξελεῖται
  english_pob_choice: will deliver
  chosen_spanish: los librará
  alternatives_spanish:
  - los rescatará
  - los entregará
  lexicon: LSJ
  rationale: '''Librará'' comunica liberación efectiva y misericordiosa. Es una opción natural en español bíblico que evita reducir el verbo a solo ''rescatar'' o ''sacar''.'
- source_word: τοῦ ἐπιστρέψαι αὐτοὺς εἰς τὴν γῆν αὐτῶν
  english_pob_choice: to bring them back into their land
  chosen_spanish: para traerlos de nuevo a su tierra
  alternatives_spanish:
  - y devolverlos a su tierra
  - para restaurarlos a su tierra
  lexicon: LSJ
  rationale: La cláusula griega es comprimida y puede leerse como finalidad o resultado. 'Para traerlos de nuevo a su tierra' conserva la ambigüedad y el tema restaurador sin sobreexplicar.
theological_decisions:
- issue: Force of ἐν ἐσχάτοις καιροῖς
  english_pob_reading: in the last times
  chosen_spanish_reading: en los últimos tiempos
  alternative_spanish_readings:
  - en los tiempos finales
  - en los postreros tiempos
  rationale: La fórmula española reproduce el tono profético sin imponer un esquema escatológico más técnico del que exige el griego del pasaje.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Meaning of ἐπιστρέψωσι πρὸς τὸν Κύριον
  english_pob_reading: return to the Lord
  chosen_spanish_reading: vuelvan ... al Señor
  alternative_spanish_readings:
  - se conviertan al Señor
  - regresen al Señor
  rationale: '''Volver al Señor'' mantiene la doble resonancia de arrepentimiento y restauración relacional; no se reduce a un acto meramente interior ni a un retorno físico.'
  doctrine_reference: Repentance and restoration language in moral exhortation.
- issue: Sense of τοῦ ἐπιστρέψαι αὐτοὺς εἰς τὴν γῆν αὐτῶν
  english_pob_reading: to bring them back into their land
  chosen_spanish_reading: para traerlos de nuevo a su tierra
  alternative_spanish_readings:
  - y restaurarlos a su tierra
  - para devolverlos a su tierra
  rationale: La construcción infinitiva es concisa y algo ambigua. La versión elegida conserva el flujo sintáctico y la idea de restauración territorial sin convertirla en una paráfrasis explicativa.
  doctrine_reference: Original-language primacy over translation tradition; preserve ambiguity where the source is compressed.
translation_notes:
  revision_awareness: No se registraron revisiones posteriores en el expediente; la lectura auditada más reciente quedó sin cambios.
  spanish_consistency_notes:
  - Se conservó Yahvé solo cuando el texto fuente lo exige explícitamente; aquí el griego dice Κύριος y, siguiendo el audit trail, se vertió como «el Señor».
  - Se mantuvo la forma «Beliar» por fidelidad al testimonio griego, aunque la variante «Belial» es más conocida en español.
  - 'Se evitó convertir el pasaje en una paráfrasis: las series de contraste virtud/vicio, dispersión/exilio y retorno/restauración quedaron visibles en el español.'
  - Se usó un registro bíblico contemporáneo, sin arcaísmos innecesarios, pero con vocabulario digno y eclesial.
