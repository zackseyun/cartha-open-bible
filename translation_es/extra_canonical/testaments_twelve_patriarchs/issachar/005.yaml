base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/issachar/005.yaml
  text: '1 Therefore[a], my children, keep the law of God, and acquire simplicity, and walk in innocence, not meddling in the deeds of your neighbor. 2 But love the Lord and your neighbor; show mercy to the poor and the weak. 3 Set your back to farming, and labor in every work of cultivation, offering gifts to the Lord with thanksgiving. 4 For in the firstfruits of the produce of the land the Lord will bless you, just as he blessed all the holy ones from Abel until now[b]. 5 For no other portion has been given to you except the richness of the earth in the toils of its fruits. 6 For my father Jacob also blessed me with blessings of the earth and of firstfruits of produce. 7 And Levi and Judah were glorified by the Lord among the sons of Jacob. And the Lord gave them their inheritance: to Levi, the priesthood; and to Judah, the kingdom. 8 Therefore obey them, and walk in the simplicity of your father[c]. [But to Gad it was given to destroy the pirate bands coming upon Israel.]'
  footnotes:
  - marker: a
    text: The final clause about Gad is textually awkward in this context and may reflect a later gloss or displaced line; it is translated here because it appears in the Greek witness.
    reason: textual_variant
  - marker: b
    text: Or 'the fatness of the earth' for 'the richness of the earth,' preserving the more literal agricultural idiom.
    reason: lexical_alternative
  - marker: c
    text: '''The holy ones from Abel until now'' likely refers to the line of accepted worshipers beginning with Abel; compare the firstfruits motif in Genesis and later biblical tradition.'
    reason: cross_reference
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4-2026-03-05
