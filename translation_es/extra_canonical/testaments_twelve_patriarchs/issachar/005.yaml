    changes_summary: 'Adjusted several phrases for closer lexical accuracy: ''busying yourselves with'' to ''meddling in'' for περιαργαζόμενοι; ''Bend your back'' to ''Set your back'' for ὑποτίθετε τὸν νῶτον; ''through the toil'' to ''in the toils'' to reflect ἐν πόνοις; ''gave them as an inheritance'' to ''gave them their inheritance'' for ἐκληροδότησεν αὐτούς; and rendered πειρατήρια more literally as ''pirate bands'' rather than ''marauding raids.'''
translation:
  language: es
  text: '1 Por tanto[a], hijos míos, guarden la ley de Dios, y adquieran sencillez, y caminen en inocencia, sin entrometerse[b] en los hechos del prójimo. 2 Pero amen al Señor y al prójimo; tengan misericordia del pobre y del débil. 3 Pongan la espalda al cultivo de la tierra, y trabajen en cada labor de cultivo, ofreciendo dones al Señor con acción de gracias. 4 Porque en las primicias de los frutos de la tierra el Señor los bendecirá, así como bendijo a todos los santos[c] desde Abel hasta ahora. 5 Porque ninguna otra porción les ha sido dada sino la riqueza de la tierra en los trabajos de sus frutos. 6 Porque también mi padre Jacob me bendijo con bendiciones de la tierra y de primicias de los frutos. 7 Y Leví y Judá fueron glorificados por el Señor entre los hijos de Jacob. Y el Señor les dio su heredad: a Leví, el sacerdocio; y a Judá, el reino. 8 Por tanto, obedézcanles, y caminen en la sencillez de su padre. [Pero a Gad le fue dado destruir las bandas de piratas que vinieran sobre
    Israel.]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La cláusula final sobre Gad es textualmente extraña en este contexto y puede reflejar una glosa posterior o línea desplazada; se traduce aquí porque aparece en el testimonio griego.
    reason: textual_variant
  - marker: b
    text: 'También: ''la grosura de la tierra'' por ''la riqueza de la tierra'', preservando el idioma agrícola más literal.'
    reason: lexical_alternative
  - marker: c
    text: '''Los santos desde Abel hasta ahora'' alude probablemente a la línea de adoradores aceptados que comienza con Abel; cf. el motivo de las primicias en Génesis y la tradición bíblica posterior.'
    reason: cross_reference
lexical_decisions:
- source_word: νόμον Θεοῦ
  english_pob_choice: the law of God
  chosen_spanish: la ley de Dios
  alternatives_spanish:
  - la ley divina
  lexicon: LSJ
  rationale: Genitivo objetivo estándar; conserva el tono testamentario formal.
- source_word: ἁπλότητα / ἁπλότητι
  english_pob_choice: simplicity
  chosen_spanish: sencillez
  alternatives_spanish:
  - simplicidad
  - integridad
  lexicon: LSJ
  rationale: 'Virtud temática del Testamento: vida sencilla, no dividida, sin doblez. ''Sencillez'' es la opción consistente a lo largo de Isacar.'
- source_word: ἀκακίᾳ
  english_pob_choice: innocence
  chosen_spanish: inocencia
  alternatives_spanish:
  - candor
  - rectitud sin malicia
  lexicon: LSJ
  rationale: Combina naturalmente con 'sencillez' y conserva el sentido moral de carecer de malicia.
- source_word: μὴ περιαργαζόμενοι
  english_pob_choice: not meddling in
  chosen_spanish: sin entrometerse
  alternatives_spanish:
  - sin ocuparse de
  - sin curiosear en
  lexicon: LSJ
  rationale: Refleja la revisión inglesa de 'busying yourselves with' a 'meddling in'; 'entrometerse' captura la interferencia indebida en asuntos ajenos en español natural.
- source_word: τοῦ πλησίον τὰς πράξεις
  english_pob_choice: the deeds of your neighbor
  chosen_spanish: los hechos del prójimo
  alternatives_spanish:
  - las acciones del prójimo
  - los asuntos del prójimo
  lexicon: LSJ
  rationale: Mantiene el foco moral concreto sobre lo que hacen otros, no sobre asuntos abstractos.
- source_word: ἐλεήσατε
  english_pob_choice: show mercy
  chosen_spanish: tengan misericordia
  alternatives_spanish:
  - compadézcanse de
  lexicon: LSJ
  rationale: Imperativo con peso ético-pactual; 'tengan misericordia' es idiomático y conserva la fuerza activa.
- source_word: Ὑποτίθετε τὸν νῶτον ὑμῶν
  english_pob_choice: Set your back
  chosen_spanish: Pongan la espalda
  alternatives_spanish:
  - Inclinen la espalda
  - Apliquen los hombros
  lexicon: LSJ
  rationale: Refleja la revisión inglesa de 'Bend' a 'Set' para ὑποτίθετε; 'pongan la espalda' es la imagen idiomática de aplicarse al trabajo.
- source_word: γεωργεῖν / γεωργίαν
  english_pob_choice: farming / cultivation
  chosen_spanish: cultivo de la tierra / cultivo
  alternatives_spanish:
  - labranza
  - agricultura
  lexicon: LSJ
  rationale: Mantiene viva la temática agraria de Isacar y resulta legible en español moderno.
- source_word: δῶρα ... Κυρίῳ προσφέροντες
  english_pob_choice: offering gifts to the Lord
  chosen_spanish: ofreciendo dones al Señor
  alternatives_spanish:
  - presentando ofrendas al Señor
  lexicon: LSJ
  rationale: El participio denota presentación cúltica; 'dones' refleja δῶρα con naturalidad.
- source_word: μετ᾽ εὐχαριστείας
  english_pob_choice: with thanksgiving
  chosen_spanish: con acción de gracias
  alternatives_spanish:
  - con gratitud
  lexicon: LSJ
  rationale: Conserva el matiz litúrgico y devocional, frente al más cotidiano 'gratitud'.
- source_word: πρωτογεννήμασιν καρπῶν τῆς γῆς
  english_pob_choice: the firstfruits of the produce of the land
  chosen_spanish: las primicias de los frutos de la tierra
  alternatives_spanish:
  - las primicias del producto del campo
  lexicon: LSJ
  rationale: Mantiene el lenguaje de primicias explícito y cercano al griego.
- source_word: ἁγίους
  english_pob_choice: the holy ones
  chosen_spanish: los santos
  alternatives_spanish:
  - los consagrados
  - los justos
  lexicon: LSJ
  rationale: En español 'santos' funciona en registro bíblico amplio sin imponer la lectura del santoral; la nota aclara el matiz.
- source_word: μερὶς
  english_pob_choice: portion
  chosen_spanish: porción
  alternatives_spanish:
  - parte
  - heredad
  lexicon: LSJ
  rationale: Término estándar de herencia tribal.
- source_word: πιότητος τῆς γῆς
  english_pob_choice: the richness of the earth
  chosen_spanish: la riqueza de la tierra
  alternatives_spanish:
  - la fertilidad de la tierra
  - la grosura de la tierra
  lexicon: LSJ
  rationale: '''Riqueza'' transmite la abundancia con claridad; ''grosura'' es más literal pero menos natural.'
- source_word: ἐν πόνοις καρπῶν
  english_pob_choice: in the toils of its fruits
  chosen_spanish: en los trabajos de sus frutos
  alternatives_spanish:
  - por la labor de sus frutos
  lexicon: LSJ
  rationale: Conserva el plural del griego ('toils'/'trabajos') y la conexión entre fruto y esfuerzo.
- source_word: ἐκληροδότησεν αὐτούς
  english_pob_choice: gave them their inheritance
  chosen_spanish: les dio su heredad
  alternatives_spanish:
  - les asignó su heredad
  - les repartió su heredad
  lexicon: LSJ
  rationale: Refleja la revisión inglesa de 'as an inheritance' a 'their inheritance'; en español 'les dio su heredad' es claro y natural.
- source_word: ἱερατείαν
  english_pob_choice: the priesthood
  chosen_spanish: el sacerdocio
  alternatives_spanish:
  - el oficio sacerdotal
  lexicon: LSJ
  rationale: Rendición estándar para el papel asignado a Leví.
- source_word: βασιλείαν
  english_pob_choice: the kingdom
  chosen_spanish: el reino
  alternatives_spanish:
  - la realeza
  lexicon: LSJ
  rationale: Conserva la fuerza dinástico-política del rol de Judá.
- source_word: ὑπακούετε
  english_pob_choice: obey
  chosen_spanish: obedézcanles
  alternatives_spanish:
  - escúchenles
  - sométanse a ellos
  lexicon: LSJ
  rationale: Imperativo fuerte y directo en el encargo testamentario.
- source_word: πειρατήρια
  english_pob_choice: pirate bands
  chosen_spanish: bandas de piratas
  alternatives_spanish:
  - bandas de saqueadores
  - incursores
  lexicon: LSJ
  rationale: Refleja la revisión inglesa más literal 'pirate bands' para πειρατήρια; el español 'bandas de piratas' captura la misma literalidad.
theological_decisions:
- issue: Estatus de la cláusula entre corchetes sobre Gad en el v. 8
  chosen_reading: Traducida entre corchetes como parte del testimonio griego pero marcada como material aparentemente secundario.
  alternative_readings:
  - Omitir como glosa posterior
  - Traducir sin corchetes como texto plenamente integral
  rationale: La cláusula encaja torpemente tras la exhortación a obedecer a Leví y Judá y parece una intrusión textual. Siguiendo el principio de transparencia, se traduce honestamente del testimonio griego pero se marca visualmente como probable material secundario o, al menos, dislocado.
- issue: Referencia de 'los santos desde Abel hasta ahora'
  chosen_reading: Rendido genéricamente como 'todos los santos desde Abel hasta ahora'.
  alternative_readings:
  - '''todos los justos desde Abel hasta ahora'''
  - '''todos los santos desde Abel hasta el día de hoy'''
  rationale: El griego dice ἁγίους, no un término directo para 'justos'. La frase probablemente evoca la línea de adoradores aceptados, pero la traducción conserva la opción léxica real.
translation_notes:
  revision_awareness: 'Refleja la cadena completa de revisiones: ''busying yourselves'' → ''meddling in'' (περιαργαζόμενοι), ''Bend'' → ''Set'' (ὑποτίθετε), ''through the toil'' → ''in the toils'' (ἐν πόνοις), ''as an inheritance'' → ''their inheritance'' (ἐκληροδότησεν αὐτούς), y ''marauding raids'' → ''pirate bands'' (πειρατήρια).'
  spanish_consistency_notes:
  - ἁπλότης como 'sencillez' a lo largo de Isacar.
  - πλησίον como 'prójimo'.
  - Κύριος como 'Señor'.
  - καρπός como 'fruto'.
  - ἀπαρχή / πρωτογεννήματα como 'primicias'.
  - ἅγιος como 'santo'.
  - Imperativos plurales en 'ustedes' para neutralidad latinoamericana.
  - Marca visual con corchetes para la cláusula sobre Gad.
