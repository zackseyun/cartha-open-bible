id: T12P.ISS.2.1
reference: Testament of Issachar 2:1
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 176-187, Issachar pilot)
  text: II. Τότε Γοὖν¹ ὤφθη τῷ² Ἰακώβ³ Γἄγγελος Κυρίου καὶ εἶπε λέγων⁴, *ὅτι τέκνα τέξει Ῥαχήλ⁵, *ἐπειδὴ κατέπτυσεν⁶ συνουσίαν⁷ ἀνδρὸς καὶ ἐξελέξατο τὴν⁸ ἐγκράτειαν.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/issachar/002/001.yaml
  text: Then an angel of the Lord appeared to Jacob, saying, “Rachel will bear children, because she despised intercourse with a husband and chose self-control.”
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:34Z'
    unchanged: false
    changes_summary: Changed 'said' to 'saying' for closer alignment with λέγων, and removed 'two' because ἕνα appears in a corrupt/apparently variant context and is not securely part of the main clause here. Kept the rest substantially unchanged.
translation:
  language: es
  text: 'Entonces se apareció a Jacob un ángel del Señor, diciendo: «Raquel dará a luz hijos[a], porque despreció[b] el trato carnal con un marido y eligió el dominio propio».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El revision pass de gpt-5.4 quitó el numeral 'two' (ἕνα aparece en un contexto manuscrito variante/corrupto y no se considera parte segura de la cláusula principal). La traducción al español sigue esta lectura de 'hijos' sin numeral.
    reason: textual_variant
  - marker: b
    text: O 'rechazó con desdén' / 'desdeñó las relaciones conyugales'. El verbo griego κατέπτυσεν tiene una fuerza inusualmente cruda y puede reflejar una tradición interpretativa desarrollada sobre la moderación de Raquel.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὤφθη ... ἄγγελος Κυρίου
  english_pob_choice: an angel of the Lord appeared
  chosen_spanish: se apareció ... un ángel del Señor
  alternatives_spanish:
  - se le mostró un mensajero del Señor
  lexicon: LSJ
  rationale: '''Apareció'' es la traducción estándar del aoristo pasivo ὤφθη en contextos de teofanía/angelofanía bíblica.'
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - y habló diciendo
  lexicon: LSJ
  rationale: Mantiene el participio griego λέγων de modo paralelo al ajuste hecho en el revision pass (que cambió 'said' → 'saying' para reflejar λέγων).
- source_word: κατέπτυσεν / διέπτυσε
  english_pob_choice: despised
  chosen_spanish: despreció
  alternatives_spanish:
  - rechazó con desdén
  - desdeñó
  - menospreció
  lexicon: LSJ
  rationale: El verbo griego conlleva rechazo desdeñoso (literalmente 'escupió hacia abajo'); 'despreció' transmite la fuerza moral sin parafrasear.
- source_word: συνουσία
  english_pob_choice: intercourse
  chosen_spanish: trato carnal
  alternatives_spanish:
  - unión conyugal
  - relaciones íntimas
  lexicon: LSJ
  rationale: El término se refiere a las relaciones sexuales. 'Trato carnal' es claro y dignificado para el registro testamentario, evitando lo clínico ('intercurso') o lo crudo.
- source_word: ἐγκράτεια
  english_pob_choice: self-control
  chosen_spanish: dominio propio
  alternatives_spanish:
  - continencia
  - autocontrol
  - templanza
  lexicon: LSJ
  rationale: '''Dominio propio'' es el término clásico en español bíblico (cf. Gá 5:23 RV/NVI) para ἐγκράτεια y conserva la virtud helenístico-judía sin perder peso ético.'
theological_decisions:
- issue: Elogio a Raquel por rechazar las relaciones conyugales
  chosen_reading: Traducir el testigo griego de manera directa como elogio del dominio propio de Raquel, sin armonizar con Génesis para suavizar la tensión.
  alternative_readings:
  - Interpretar como abstinencia temporal solamente
  - Tratar como expansión corrupta o secundaria y suavizar la redacción
  rationale: El griego dice explícitamente que Raquel 'despreció el trato carnal con un marido y eligió el dominio propio'. La traducción conserva el testigo tal como se transmite; cualquier incomodidad se maneja mejor con transparencia que con suavización.
  doctrine_reference: DOCTRINE.md §Preservar la tensión teológica en lugar de resolverla
translation_notes:
  revision_awareness: El revision pass de gpt-5.4 cambió 'said' → 'saying' (más cerca de λέγων) y eliminó 'two' (porque ἕνα aparece en un contexto manuscrito variante y no es parte segura de la cláusula principal). La traducción al español sigue ambos ajustes.
  spanish_consistency_notes:
  - 'ἁπλότης → ''sencillez'' / ἐγκράτεια → ''dominio propio'': virtudes éticas estables en el capítulo y en T12P en general.'
  - Κύριος → 'Señor' (T12P en griego no transmite Tetragrámaton).
  - 'συνουσία → ''trato carnal'' (cap. 2) frente a ''unión conyugal'' (cap. 3): diferencia controlada por contexto.'
