translation:
  language: es
  text: Y Lía tomó las mandrágoras y, a cambio de ellas, me alquiló por una noche[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El POB inglés sintetiza el v. 2 griego (la lógica más larga sobre Lía dando dos mandrágoras a cambio del trato carnal y el cómputo de hijos) como un solo intercambio: Lía toma las mandrágoras y, a cambio, alquila a Jacob por una noche. El cómputo griego de seis hijos de Lía y dos de Raquel se desarrolla más abajo en el capítulo según la lectura del POB.'
    reason: source_note
lexical_decisions:
- source_word: Λεία ... ἀντὶ συνουσίας ἀπέδοτο τὰ δύο μῆλα
  english_pob_choice: took mandrakes, and for them hired me
  chosen_spanish: tomó las mandrágoras y, a cambio de ellas, me alquiló
  alternatives_spanish:
  - entregó las mandrágoras y por ellas me contrató
  - cedió las mandrágoras y a cambio me obtuvo en alquiler
  lexicon: LSJ
  rationale: El POB inglés condensa la dinámica del v. 2 griego (ἀπέδοτο τὰ δύο μῆλα ἀντὶ συνουσίας) como 'took mandrakes, and for them hired me'. La traducción al español sigue esa síntesis del POB conservando el verbo transaccional 'alquilar' (← μισθόω/ἀποδίδωμι) y 'a cambio de' para ἀντί.
- source_word: μανδραγόραι / μῆλα
  english_pob_choice: mandrakes
  chosen_spanish: mandrágoras
  alternatives_spanish:
  - frutos
  - manzanas
  lexicon: LSJ
  rationale: El POB inglés iguala μῆλα a 'mandrakes' aquí; se mantiene la consistencia con el resto del capítulo (μανδραγόραι → 'mandrágoras').
- source_word: μίαν νύκτα / ἐν τῇ νυκτί
  english_pob_choice: for one night
  chosen_spanish: por una noche
  alternatives_spanish:
  - por una sola noche
  lexicon: LSJ
  rationale: 'Construcción acusativa de duración / locativa temporal: ''por una noche'' es la opción natural en español, paralela al inglés ''for one night''.'
translation_notes:
  revision_awareness: 'El revision pass de gpt-5.4 marcó este verso como ''unchanged: true'' (''No changes needed''). La traducción al español sigue por tanto el texto inglés POB tal como quedó tras la revisión, conservando la síntesis transaccional del intercambio.'
  spanish_consistency_notes:
  - μανδραγόραι → 'mandrágoras' en todo el capítulo.
  - ἀντί transaccional → 'a cambio de'.
  - μισθόω/ἀποδίδωμι en el motivo del 'salario/alquiler' → 'alquilar', preservando el juego con el nombre de Isacar.
