translation:
  language: es
  text: A los treinta y cinco años tomé para mí una esposa, porque mi trabajo consumía mi fuerza, y no pensaba en el placer de una mujer; más bien, por mi fatiga, el sueño me sobrevino.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Τριάκοντα Γκαὶ πέντε ἐτῶν
  english_pob_choice: At thirty-five years of age
  chosen_spanish: A los treinta y cinco años
  alternatives_spanish:
  - A la edad de treinta y cinco años
  - Cuando tenía treinta y cinco años
  lexicon: Greek numeral phrase with age construction
  rationale: La construcción expresa edad, no duración. En español, «a los treinta y cinco años» es natural, fiel y conserva el valor temporal del original sin añadir explicación.
- source_word: ἔλαβον ἐμαυτῷ γυναῖκα
  english_pob_choice: I took a wife for myself
  chosen_spanish: tomé para mí una esposa
  alternatives_spanish:
  - tomé esposa para mí
  - me casé
  lexicon: λαμβάνω + reflexive pronoun + γυνή
  rationale: «Tomé para mí una esposa» sigue de cerca el acto de adquisición/recepción del griego y mantiene el matiz explícito del pronombre reflexivo. Se evita «me casé» porque suaviza la formulación y pierde parte de la literalidad auditada.
- source_word: ὁ κάματος κατήσθιε τὴν ἰσχύν μου
  english_pob_choice: my labor consumed my strength
  chosen_spanish: mi trabajo consumía mi fuerza
  alternatives_spanish:
  - mi labor consumía mi fuerza
  - mi fatiga consumía mi fuerza
  lexicon: κάματος / ἰσχύς
  rationale: «Trabajo» comunica el esfuerzo sostenido; «labor» sería posible, pero «trabajo» suena más natural en español. «Consumía mi fuerza» conserva la imagen de desgaste del griego y coincide con la lectura inglesa.
- source_word: οὐκ ἐνενόουν ἡδονὴν γυναικός
  english_pob_choice: I did not think about a woman's pleasure
  chosen_spanish: no pensaba en el placer de una mujer
  alternatives_spanish:
  - no pensaba en el deleite de una mujer
  - no consideraba el placer de una mujer
  lexicon: νοέω + ἡδονή + genitivo
  rationale: 'La secuencia griega es semánticamente ambigua: puede referirse a «placer» o «deleite», y la construcción genitiva admite lectura objetiva. Se mantiene la formulación del POB inglés, en español claro y sobrio, sin forzar una interpretación sexual más específica de la que el texto garantiza.'
- source_word: διὰ τοῦ κόπου ὁ ὕπνος μοι περιεγένετο
  english_pob_choice: because of my toil, sleep came over me
  chosen_spanish: por mi fatiga, el sueño me sobrevino
  alternatives_spanish:
  - a causa de mi fatiga, el sueño me sobrevino
  - por mi esfuerzo, el sueño me venció
  lexicon: κόπος / ὕπνος / περιγίνομαι
  rationale: «Fatiga» reproduce el efecto del κόπος como cansancio penoso y funciona bien con la clausula causal. «Me sobrevino» conserva la idea de que el sueño llega sobre la persona, cercana al inglés auditado.
theological_decisions:
- issue: Rendición de la frase sobre el “placer de una mujer”
  english_pob_reading: I did not think about a woman's pleasure
  chosen_spanish_reading: no pensaba en el placer de una mujer
  alternative_spanish_readings:
  - no pensaba en el deleite de una mujer
  - no consideraba el placer de una mujer
  rationale: No se amplía el texto hacia una insinuación moral o sexual más concreta que la expresada por el griego. La frase conserva una ambigüedad referencial legítima y evita convertirla en una afirmación doctrinal o ética no explícita en el pasaje.
  doctrine_reference: Principio de suficiencia textual; evitar sobreinterpretación moralizante
translation_notes:
  revision_awareness: El texto fuente y el POB inglés auditado coinciden sustancialmente; la revisión más reciente indica que no hubo cambios necesarios, por lo que la versión española sigue de cerca esa lectura estable sin introducir variantes textuales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino, pero este versículo no lo contiene.
  - Se usa «esposa» como equivalente natural de γυναῖκα en este contexto narrativo, evitando arcaísmos.
  - Se conserva un registro sobrio y testimonial, acorde con una declaración autobiográfica breve.
  - No se añaden notas al pie porque el pasaje no exige una variante textual o lectura alternativa anclada en el español.
