translation:
  language: es
  text: Y mi padre se regocijaba siempre por mi sencillez, porque ofrecía todo primogénito por medio del sacerdote a Yahvé, y luego también a mi padre.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἁπλότητί μου
  english_pob_choice: my simplicity
  chosen_spanish: mi sencillez
  alternatives_spanish:
  - mi simplicidad
  - mi sencillez de corazón
  lexicon: ἁπλότης
  rationale: En este contexto la palabra describe una disposición simple, recta y no doble; ‘sencillez’ comunica mejor esa cualidad moral que ‘simplicidad’, que en español puede sonar a falta de inteligencia. Se evita añadir ‘de corazón’ porque el griego no lo expresa explícitamente.
- source_word: πᾶν πρῶτον γέννημα
  english_pob_choice: every firstborn
  chosen_spanish: todo primogénito
  alternatives_spanish:
  - todo primer fruto
  - todo primer nacido
  lexicon: πρῶτος + γέννημα
  rationale: La expresión apunta al primer nacimiento/primer producto consagrado. En español, ‘primogénito’ reproduce de forma natural el valor consagrado del primer nacido sin volverlo meramente agrícola. ‘Primer fruto’ sería posible en otro contexto, pero aquí el paralelo con la ofrenda al Señor favorece ‘primogénito’.
- source_word: διὰ τοῦ ἱερέως
  english_pob_choice: through the priest
  chosen_spanish: por medio del sacerdote
  alternatives_spanish:
  - por el sacerdote
  - a través del sacerdote
  lexicon: διά + genitivo
  rationale: ‘Por medio de’ conserva el carácter mediador del sacerdote en la ofrenda. ‘Por el sacerdote’ podría sonar más instrumental o ambiguo; ‘a través de’ es posible, pero menos sobrio en español bíblico.
- source_word: τῷ Κυρίῳ
  english_pob_choice: to the Lord
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - al Señor
  - a Dios
  lexicon: κύριος
  rationale: Siguiendo el criterio de la obra, se traduce el nombre divino como ‘Yahvé’ y no se enmascara con ‘Señor’. Aquí el griego κύριος aparece en un contexto cultual que remite al nombre divino, por lo que la elección mantiene la distinción teológica y la transparencia textual.
- source_word: καὶ ... τῷ πατρί μου
  english_pob_choice: and then also to my father
  chosen_spanish: y luego también a mi padre
  alternatives_spanish:
  - y después también a mi padre
  - y luego asimismo a mi padre
  lexicon: καί ... καί
  rationale: Se conserva la secuencia temporal y de adición con una fórmula natural en español. ‘Luego también’ refleja bien el ‘después’ implícito del griego y el contraste entre la ofrenda a Dios y la honra al padre.
theological_decisions:
- issue: Relación entre la ofrenda a Dios y la honra al padre
  english_pob_reading: I offered every firstborn through the priest to the Lord, and then also to my father.
  chosen_spanish_reading: ofrecía todo primogénito por medio del sacerdote a Yahvé, y luego también a mi padre
  alternative_spanish_readings:
  - ofrecía todo primogénito al Señor por medio del sacerdote, y luego también a mi padre
  - ofrecía todo primogénito por medio del sacerdote a Dios, y luego también a mi padre
  rationale: La frase preserva la prioridad de la dedicación cultual a Yahvé antes de cualquier honra humana. El texto no dice que el primogénito se ofrezca literalmente al padre en el mismo sentido sacrificial, sino que después se le daba/entregaba también al padre; por eso se mantiene la coordinación sin explicitar más de lo que el griego permite.
  doctrine_reference: Ex 13:2, 12; honor parental en la ética bíblica
- issue: Interpretación de la ‘sencillez’ como virtud moral
  english_pob_reading: my simplicity
  chosen_spanish_reading: mi sencillez
  alternative_spanish_readings:
  - mi simplicidad
  - mi pureza de intención
  rationale: La lectura de la POB entiende la cualidad como una virtud de integridad no duplicada, no como ingenuidad. ‘Sencillez’ transmite mejor esa virtud en español actual y evita un desliz semántico hacia ‘simplicidad’ intelectual.
  doctrine_reference: Mt 6:22; 2 Co 1:12
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios; se mantiene el sentido auditado de la edición griega de Charles 1908 y la traducción inglesa POB: rejoice in simplicity; firstborn offered through the priest to the Lord; then also to the father. No hay indicios de variantes textuales relevantes en el paquete suministrado.'
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ conforme al estándar del proyecto para κύριος en contexto divino.
  - Se usa ‘sencillez’ como término moral, no como ‘simplicidad’ intelectual.
  - ‘Sacerdote’ conserva la mediación cultual sin importar terminología eclesiástica posterior.
