  text: 'For if Leah my mother had not given up marital union in exchange for the two apples[a], she would still have been destined to bear eight sons. Therefore she bore six, and Rachel bore the two, because through the mandrakes the Lord visited her. For he saw that Leah desired to be with Jacob for the sake of children, and not for the sake of pleasure. For on the next day also she again gave Jacob over. Therefore through the mandrakes the Lord listened to Rachel. For although she longed for these, she did not eat them, but dedicated them in the house of the Lord, after bringing them to the priest.


    When therefore I grew to manhood, my children, I walked in uprightness of heart, and I became a farmer for my father and for my brothers.'
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:55Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Cuando, pues, yo llegué a la madurez, hijos míos, anduve en rectitud de corazón, y llegué a ser labrador para mi padre y para mis hermanos, y traía frutos de los campos a su tiempo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἡδρύνθην
  english_pob_choice: When therefore I grew to manhood
  chosen_spanish: llegué a la madurez
  alternatives_spanish:
  - crecí hasta ser hombre
  - alcancé la edad adulta
  lexicon: ἡδρύνθην
  rationale: El griego expresa llegar a la madurez o a la plenitud de edad; «llegué a la madurez» conserva el matiz sin sonar forzado en español y encaja con el encabezamiento temporal de la frase.
- source_word: ἐπορεύθην ἐν εὐθύτητι καρδίας
  english_pob_choice: I walked in uprightness of heart
  chosen_spanish: anduve en rectitud de corazón
  alternatives_spanish:
  - anduve en integridad de corazón
  - caminé con rectitud de corazón
  lexicon: ἐπορεύθην; εὐθύτητι καρδίας
  rationale: «Anduve» mantiene la imagen de conducta habitual; «rectitud de corazón» reproduce la cualidad moral interna del sintagma griego sin diluirla en un término demasiado abstracto.
- source_word: γεωργὸς
  english_pob_choice: a farmer
  chosen_spanish: labrador
  alternatives_spanish:
  - campesino
  - agricultor
  lexicon: γεωργός
  rationale: «Labrador» es un equivalente digno y natural en español bíblico para γεωργός; conserva el sentido de quien trabaja la tierra sin obligar a una connotación moderna técnica.
- source_word: τῷ πατρί μου καὶ τοῖς ἀδελφοῖς μου
  english_pob_choice: for my father and for my brothers
  chosen_spanish: para mi padre y para mis hermanos
  alternatives_spanish:
  - al servicio de mi padre y de mis hermanos
  - para mi padre y mis hermanos
  lexicon: τῷ πατρί μου καὶ τοῖς ἀδελφοῖς μου
  rationale: La preposición española «para» refleja la relación de servicio/actividad en favor de la familia sin introducir una idea no explícita en el griego.
theological_decisions:
- issue: Énfasis ético de la madurez personal
  english_pob_reading: When therefore I grew to manhood... I walked in uprightness of heart
  chosen_spanish_reading: Cuando, pues, yo llegué a la madurez... anduve en rectitud de corazón
  alternative_spanish_readings:
  - Cuando, pues, ya era adulto... viví con rectitud interior
  - Cuando, pues, crecí... anduve en integridad de corazón
  rationale: La formulación conserva el testimonio moral del hablante sin añadir lenguaje de justificación o santidad que el versículo no formula explícitamente.
  doctrine_reference: Ética bíblica y formación del carácter
- issue: Trabajo agrícola como vocación familiar
  english_pob_reading: I became a farmer for my father and for my brothers
  chosen_spanish_reading: llegué a ser labrador para mi padre y para mis hermanos
  alternative_spanish_readings:
  - me hice agricultor para mi padre y para mis hermanos
  - trabajé la tierra para mi padre y para mis hermanos
  rationale: La frase se mantiene descriptiva de una ocupación concreta y de servicio familiar, sin convertirla en alegoría espiritual ni en una categoría ministerial.
  doctrine_reference: Vocación y trabajo ordinario
translation_notes:
  revision_awareness: La versión inglesa auditada no aporta notas textuales para este versículo; el griego coincide con la idea general de la traducción inglesa y no se registran revisiones aplicadas. Por eso no se añaden notas al pie en español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino en el texto base del proyecto, pero este versículo no lo contiene.
  - Se usa «rectitud de corazón» como equivalente estable de εὐθύτητι καρδίας, coherente con otros pasajes donde el proyecto preserva la metáfora moral del corazón.
  - «Labrador» se conserva como término bíblico natural y no se sustituye por una expresión más moderna que debilitaría el registro literario.
