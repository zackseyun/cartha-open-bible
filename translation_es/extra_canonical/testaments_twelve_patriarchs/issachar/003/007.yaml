reference: Testament of Issachar 3:7
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 176-187, Issachar pilot)
  text: 7. Καὶ ὁ⁴⁵ Κύριος ἐμυριοπλασίασε⁴⁶ τὰ ἀγαθὰ ⌜ἐν ταῖς χερσί⁴⁷ μου· ᾔδει δὲ καὶ Ἰακὼβ *ὁ πατήρ μου⁴⁸, ὅτι ὁ Θεὸς συνεργεῖ⁴⁸ τῇ ἁπλότητί μου⌝. *Πάντα γὰρ πένησι καὶ θλιβομένοις⁴⁹ παρεῖχον *ἐκ τῶν ἀγαθῶν τῆς γῆς⁵⁰ ἐν ἁπλότητι καρδίας μου⁵¹˥.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/issachar/003/007.yaml
  text: And the Lord multiplied the good things ten thousandfold in my hands; and Jacob my father also knew that God was working together with my simplicity. For I provided to all the poor and afflicted from the good things of the earth, in the simplicity of my heart.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:55Z'
    unchanged: false
    changes_summary: Adjusted the wording to better reflect the source’s sequence and clauses, including the causal statement about making every fruit harvest and the separate clause about the father doubling the goods. Removed bracketed markers and smoothed the English while preserving the original meaning.
translation:
  language: es
  text: Y Yahvé multiplicó los bienes diez mil veces en mis manos; y también Jacob, mi padre, sabía que Dios cooperaba con mi sencillez. Pues a todos los pobres y afligidos les proveía de los bienes de la tierra, con la sencillez de mi corazón.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Κύριος / ὁ Κύριος
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - el Dueño
  lexicon: יהוה / κύριος
  rationale: En este contexto el título corresponde al nombre divino; el proyecto exige usar «Yahvé» en el texto principal cuando el referente es YHWH, para no ocultar el nombre tras una máscara confesional.
- source_word: ἐμυριοπλασίασε τὰ ἀγαθὰ
  english_pob_choice: multiplied the good things ten thousandfold
  chosen_spanish: multiplicó los bienes diez mil veces
  alternatives_spanish:
  - multiplicó los bienes en diez mil
  - multiplicó grandemente los bienes
  lexicon: ἀγαθά
  rationale: «Bienes» conserva el sentido material de posesiones/bienes producidos, y «diez mil veces» refleja el valor intensivo de ἐμυριοπλασίασε sin suavizarlo.
- source_word: ἐν ταῖς χερσί μου
  english_pob_choice: in my hands
  chosen_spanish: en mis manos
  alternatives_spanish:
  - en mi poder
  - entre mis manos
  lexicon: χείρ
  rationale: La imagen espacial es clara y debe mantenerse literalmente; «en mis manos» es natural en español y conserva el auditivo bíblico.
- source_word: ὁ Θεὸς συνεργεῖ τῇ ἁπλότητί μου
  english_pob_choice: God was working together with my simplicity
  chosen_spanish: Dios cooperaba con mi sencillez
  alternatives_spanish:
  - Dios obraba junto con mi sencillez
  - Dios colaboraba con mi sencillez
  lexicon: συνεργέω; ἁπλότης
  rationale: «Cooperaba» conserva la idea de trabajar junto con, sin convertirla en una formulación más doctrinal de «obrar»; «sencillez» traduce ἁπλότης manteniendo la cualidad de integridad/sencillez sin añadir matices no garantizados por el texto.
- source_word: πένησι καὶ θλιβομένοις
  english_pob_choice: the poor and afflicted
  chosen_spanish: los pobres y afligidos
  alternatives_spanish:
  - los pobres y los atribulados
  - los necesitados y afligidos
  lexicon: πένης; θλίβω
  rationale: La pareja lexical se refleja con una traducción directa y clara; «afligidos» mantiene el pasivo de θλιβομένοις y evita intensificar más de lo que el griego exige.
- source_word: παρεῖχον
  english_pob_choice: I provided
  chosen_spanish: les proveía
  alternatives_spanish:
  - les daba
  - les suministraba
  lexicon: παρέχω
  rationale: «Proveía» expresa el suministro continuo o habitual que sugiere el imperfecto, y funciona bien con el complemento indirecto explícito.
- source_word: ἐκ τῶν ἀγαθῶν τῆς γῆς
  english_pob_choice: from the good things of the earth
  chosen_spanish: de los bienes de la tierra
  alternatives_spanish:
  - de los frutos de la tierra
  - de los productos de la tierra
  lexicon: ἀγαθά; γῆ
  rationale: «Bienes de la tierra» mantiene la correspondencia con ἀγαθά y la frase bíblica clásica sin introducir específicamente «frutos» si el griego es más amplio.
- source_word: ἐν ἁπλότητι καρδίας μου
  english_pob_choice: in the simplicity of my heart
  chosen_spanish: con la sencillez de mi corazón
  alternatives_spanish:
  - en la sencillez de mi corazón
  - con integridad de corazón
  lexicon: ἁπλότης; καρδία
  rationale: La preposición puede rendirse naturalmente con «con» en español para expresar modo; «sencillez de mi corazón» conserva el vínculo con la disposición interior sin diluir el sustantivo καρδία.
theological_decisions:
- issue: 'Identidad del sujeto divino: κύριος y Θεός'
  english_pob_reading: the Lord ... God
  chosen_spanish_reading: Yahvé ... Dios
  alternative_spanish_readings:
  - el Señor ... Dios
  - Yahvé ... el Dios
  rationale: El pasaje distingue entre el nombre divino implícito en «el Señor» y la referencia explícita a Dios en la cláusula siguiente. En español se preserva la distinción con «Yahvé» y «Dios» sin armonizarlos artificialmente.
  doctrine_reference: Transparencia del nombre divino; distinción textual entre designaciones divinas
- issue: Sentido de συνεργεῖ con ἁπλότης
  english_pob_reading: God was working together with my simplicity
  chosen_spanish_reading: Dios cooperaba con mi sencillez
  alternative_spanish_readings:
  - Dios obraba junto con mi sencillez
  - Dios estaba obrando con mi sencillez
  rationale: Se mantiene la fuerza relacional de συνεργέω, evitando convertir el enunciado en una afirmación doctrinal más fuerte de causalidad absoluta. «Cooperaba» preserva la idea de acción conjunta que el inglés POB también destacó.
  doctrine_reference: Providencia y cooperación divina sin sobreinterpretación
- issue: ἁπλότης como cualidad moral/interior
  english_pob_reading: simplicity
  chosen_spanish_reading: sencillez
  alternative_spanish_readings:
  - simplicidad
  - integridad
  rationale: «Sencillez» es la opción más natural y menos ambigua en español para un corazón recto, sin forzar una lectura exclusivamente intelectual ni moralizante. Se conserva la tensión entre inocencia, llaneza e integridad que puede llevar ἁπλότης.
  doctrine_reference: Virtud interior; integridad del corazón
translation_notes:
  revision_awareness: 'El texto inglés auditado muestra una revisión reciente que ajustó la secuencia y relaciones causales del pasaje, especialmente la cláusula sobre la cooperación divina y la provisión a pobres y afligidos. La versión española sigue esa estructura de dos movimientos: primero la multiplicación de los bienes y la cooperación divina; luego la provisión habitual a los necesitados desde los bienes de la tierra con sencillez de corazón.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el referente divino principal conforme al criterio del proyecto.
  - Se mantiene «Dios» para Θεός en la cláusula siguiente, respetando la distinción del griego.
  - «Bienes» se repite para conservar la correspondencia léxica con ἀγαθά en ambas apariciones.
  - El imperfecto español («cooperaba», «proveía») refleja la acción continua del griego.
  - No se introducen notas al pie porque no hay una variante textual o ambigüedad que el texto español necesite marcar explícitamente.
