  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/issachar/003/003.yaml
  text: And I was not meddlesome in my actions, nor envious of a man, nor malicious toward my neighbor.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:55Z'
    unchanged: false
    changes_summary: Restored the source's threefold negation and accounted for φθονερὸς θρώπου as 'envious of a man' rather than collapsing it with 'malicious.'
translation:
  language: es
  text: Y no fui entrometido en mis acciones, ni envidioso de un hombre, ni malicioso hacia mi prójimo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: περίεργος
  english_pob_choice: meddlesome
  chosen_spanish: entrometido
  alternatives_spanish:
  - metido
  - intruso
  - curioso en exceso
  lexicon: períεργος
  rationale: El sentido aquí es de alguien que se inmiscuye indebidamente en lo ajeno; «entrometido» comunica bien esa idea en español natural sin volverla más fuerte de lo que exige el griego.
- source_word: ἐν ταῖς πράξεσίν μου
  english_pob_choice: in my actions
  chosen_spanish: en mis acciones
  alternatives_spanish:
  - en mis obras
  - en mi conducta
  lexicon: πρᾶξις
  rationale: «Acciones» sigue de cerca πρᾶξις y conserva el campo de conducta práctica. «Obras» sería posible, pero puede sugerir un matiz más moral o religioso que el texto no obliga a adoptar aquí.
- source_word: φθονερὸς
  english_pob_choice: envious
  chosen_spanish: envidioso
  alternatives_spanish:
  - celoso
  - rencoroso
  lexicon: φθονερός
  rationale: «Envidioso» es la equivalencia más directa para φθονερός y preserva el paralelismo de la negación triple que el audit trail inglés restauró.
- source_word: τῷ πλησίον μου
  english_pob_choice: toward my neighbor
  chosen_spanish: hacia mi prójimo
  alternatives_spanish:
  - con mi prójimo
  - para con mi prójimo
  lexicon: πλησίον
  rationale: «Prójimo» refleja πλησίον con un registro bíblico claro en español. Se mantiene la relación interpersonal indicada por el dativo, aquí bien expresada con «hacia».
- source_word: βάσκανος
  english_pob_choice: malicious
  chosen_spanish: malicioso
  alternatives_spanish:
  - malsano
  - envidioso
  - de mala intención
  lexicon: βάσκανος
  rationale: Aunque βάσκανος puede abarcar la idea de envidia nociva o mala disposición, el inglés POB optó por «malicious»; «malicioso» conserva esa dureza sin confundirlo con el primer «envidioso».
theological_decisions:
- issue: Tripartite negation and semantic distinction between envy and malice
  english_pob_reading: And I was not meddlesome in my actions, nor envious of a man, nor malicious toward my neighbor.
  chosen_spanish_reading: Y no fui entrometido en mis acciones, ni envidioso de un hombre, ni malicioso hacia mi prójimo.
  alternative_spanish_readings:
  - Y no fui entrometido en mis acciones, ni envidioso ni malicioso hacia mi prójimo.
  - Y no me entrometí en mis acciones, ni tuve envidia de un hombre, ni fui malicioso hacia mi prójimo.
  rationale: La revisión inglesa restauró tres negaciones coordinadas; la traducción española conserva esa distinción para no fusionar envidia y malicia. También mantiene la diferencia entre la autoevaluación de conducta y la relación con el prójimo.
  doctrine_reference: Ethics / vice catalogues; preservation of distinct moral terms
translation_notes:
  revision_awareness: The English audit trail restored the source's threefold negation and separated φθονερὸς θρώπου from βάσκανος, so the Spanish draft likewise keeps three distinct negated predicates and does not collapse envy into malice.
  spanish_consistency_notes:
  - Se preserva la estructura negativa triple del griego y del texto inglés revisado.
  - «Prójimo» se usa para πλησίον de forma consistente con registro bíblico en español.
  - No se introduce «Cristo», «Yahvé» ni otros términos no presentes en este versículo.
  - La sintaxis española evita calco excesivo, pero mantiene la secuencia semántica del original.
