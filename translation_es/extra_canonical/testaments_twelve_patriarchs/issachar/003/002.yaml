  text: 2. Γ*Καὶ ηὐλόγει με ὁ πατήρ μου βλέπων με¹² *ὅτι ἐν ἁπλότητι πορεύομαι¹³ *ἔμπροσθεν αὐτοῦ¹⁴⁷.
