base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/issachar/003/004.yaml
  text: I never spoke ill of anyone, nor did I criticize a person's life.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:55Z'
    unchanged: false
    changes_summary: Adjusted 'slandered' to the more general 'spoke ill of' for κατελάλησα, and 'a man's way of life' to 'a person's life' to better reflect βίον ἀνθρώπου without unnecessary gendering.
translation:
  language: es
  text: Nunca hablé mal de nadie, ni critiqué la vida de una persona.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Οὐ κατελάλησά
  english_pob_choice: I never spoke ill of anyone
  chosen_spanish: Nunca hablé mal de nadie
  alternatives_spanish:
  - Nunca calumnié a nadie
  - Nunca dije mal de nadie
  lexicon: καταλαλέω
  rationale: El griego expresa hablar contra alguien, con matiz de hablar mal o difamar. «Hablé mal de» conserva el alcance general adoptado por la POB inglesa y evita estrechar indebidamente el sentido a una acusación formal de calumnia.
- source_word: ἔψεξα
  english_pob_choice: I ... did not criticize
  chosen_spanish: critiqué
  alternatives_spanish:
  - reproché
  - censuré
  lexicon: ψεξω
  rationale: El verbo señala censurar, reprochar o criticar. «Critiqué» es natural en español y refleja bien la decisión inglesa de mantener un juicio negativo general sin intensificarlo a una reprensión más dura.
- source_word: βίον ἀνθρώπου
  english_pob_choice: a person's life
  chosen_spanish: la vida de una persona
  alternatives_spanish:
  - la manera de vivir de una persona
  - la conducta de una persona
  lexicon: βίος
  rationale: βίον aquí se refiere al modo de vida o la vida práctica de alguien. «La vida de una persona» sigue la revisión inglesa que evitó el masculino innecesario y conserva una formulación amplia y públicamente legible.
theological_decisions:
- issue: Generalidad ética del dicho sin especificación de varón
  english_pob_reading: a person's life
  chosen_spanish_reading: la vida de una persona
  alternative_spanish_readings:
  - la vida de un hombre
  - la vida de alguien
  rationale: El texto griego usa ἀνθρώπου en sentido genérico. La redacción española mantiene esa amplitud sin introducir sesgo masculino ni perder el carácter universal de la afirmación moral.
  doctrine_reference: Ética de la lengua y trato con el prójimo; no hay afirmación doctrinal técnica, sino confesión moral.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que pasó de una formulación más fuerte ('slandered') y más masculina ('a man's way of life') a una expresión más general ('spoke ill of' / 'a person's life'). La versión española conserva esos ajustes y evita sobreinterpretar καταλαλέω como calumnia jurídica.
  spanish_consistency_notes:
  - He mantenido un registro moderno y digno, acorde con una traducción pública.
  - No se usa 'siervo', 'censuré' ni 'calumnié' como lectura principal porque endurecen o estrechan el sentido frente al texto griego y la revisión inglesa.
  - 'Se conserva la estructura paralela negativa del original: ''Nunca ... ni ...''.'
