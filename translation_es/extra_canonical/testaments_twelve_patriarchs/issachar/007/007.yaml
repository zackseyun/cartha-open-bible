reference: Testament of Issachar 7:7
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 176-187, Issachar pilot)
  text: 7. *Ταῦτα καὶ ὑμεῖς, τέκνα μου, ποιεῖτε²², καὶ²³ πᾶν πνεῦμα τοῦ Βελίαρ φεύξεται ἀφ᾽ ὑμῶν καὶ πᾶσα πρᾶξις πονηρῶν ἀνθρώπων οὐ κυριεύσει ὑμῶν²⁴ καὶ¹¹ πᾶν ἄγριον θηρίον²⁵ καταδουλώσετε²⁶ ἔχοντες μεθ᾽ ὑμῶν²⁷ τὸν θεὸν τοῦ οὐρανοῦ *καὶ τῆς γῆς²⁸ *συμπορευόμενον τοῖς ἀνθρώποις ἐν ἁπλότητι καρδίας²⁹⁷.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/issachar/007/007.yaml
  text: You also, my children, do these things, and every spirit of Beliar will flee from you, and every deed of wicked people will not rule over you; and you will subdue every wild beast, having with you the God of heaven and earth, who goes with people in simplicity of heart.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:13Z'
    unchanged: false
    changes_summary: Replaced 'no deed' with 'every deed ... will not rule over you' to reflect πᾶσα more completely; changed 'walks with people' to 'goes with people' for closer alignment with συμπορευόμενον while keeping natural formal English.
translation:
  language: es
  text: Hagan también ustedes estas cosas, hijos míos, y todo espíritu de Beliar[a] huirá de ustedes, y ninguna obra de personas malvadas tendrá dominio sobre ustedes; y subyugarán[b] a toda fiera salvaje, teniendo con ustedes al Dios del cielo y de la tierra, que camina[c] con las personas en sencillez de corazón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Beliar'' refleja la forma griega aquí; algunas tradiciones normalizan el nombre como ''Belial''.'
    reason: alternative_reading
  - marker: b
    text: καταδουλόω puede traducirse 'esclavizar', pero aplicado a fieras el sentido contextual es 'subyugar' o 'someter'.
    reason: lexical_alternative
  - marker: c
    text: La frase 'que camina con las personas en sencillez de corazón' también puede entenderse como descripción de la compañía divina con quienes viven con corazón íntegro.
    reason: alternative_reading
lexical_decisions:
- source_word: πνεῦμα τοῦ Βελίαρ
  english_pob_choice: spirit of Beliar
  chosen_spanish: espíritu de Beliar
  alternatives_spanish:
  - espíritu de Belial
  lexicon: LSJ
  rationale: El testigo griego lee Βελίαρ. Se conserva la forma transliterada propia del texto, sin normalizar a 'Belial', según la decisión del POB inglés.
- source_word: οὐ κυριεύσει ὑμῶν
  english_pob_choice: will rule over you
  chosen_spanish: tendrá dominio sobre ustedes
  alternatives_spanish:
  - los dominará
  - tendrá señorío sobre ustedes
  lexicon: BDAG
  rationale: κυριεύω indica señorío/dominio. 'Tendrá dominio sobre' es directo y conserva el registro de advertencia moral; se prefiere el plural 'ustedes' (Latinoamérica neutra).
- source_word: καταδουλώσετε
  english_pob_choice: you will subdue
  chosen_spanish: subyugarán
  alternatives_spanish:
  - esclavizarán
  - someterán
  - dominarán
  lexicon: BDAG
  rationale: Aunque καταδουλόω puede significar 'esclavizar', en el contexto de las fieras el sentido idiomático es 'subyugar/someter'. 'Subyugarán' evita la imagen incómoda y literal de 'esclavizarán' aplicada a animales.
- source_word: συμπορευόμενον τοῖς ἀνθρώποις ἐν ἁπλότητι καρδίας
  english_pob_choice: who walks with people in simplicity of heart
  chosen_spanish: que camina con las personas en sencillez de corazón
  alternatives_spanish:
  - que va junto con los hombres con corazón sencillo
  - que acompaña a las personas en singularidad de corazón
  lexicon: BDAG
  rationale: El participio modifica naturalmente 'al Dios del cielo y de la tierra'. 'Sencillez de corazón' preserva el vocabulario virtuoso del testamento (singularidad moral, no ingenuidad).
theological_decisions:
- issue: Antecedente de 'que camina con las personas en sencillez de corazón'
  chosen_reading: La cláusula se refiere al 'Dios del cielo y de la tierra' que acompaña a los justos.
  alternative_readings:
  - la cláusula describe a los hijos caminando con Dios en sencillez
  - la frase es una máxima general
  rationale: El antecedente gramatical más cercano es 'el Dios del cielo y de la tierra', y la construcción participial describe naturalmente la presencia acompañante de Dios. Esto encaja con la estructura exhortativa-promisoria del versículo.
  doctrine_reference: DOCTRINE.md §Original-language primacy over translation tradition
translation_notes:
  revision_awareness: La revisión inglesa cambió 'no deed' a 'every deed ... will not rule over you' para reflejar πᾶσα; el español usa 'ninguna obra ... tendrá dominio' para conservar la negación universal de manera idiomática. Se cambió 'walks' por 'goes with people'; el español 'camina' es la forma idiomática equivalente y no resulta forzada.
  spanish_consistency_notes:
  - '''Beliar'' transliterado se mantiene en todo el corpus T12P en español.'
  - Plural 'ustedes' (Latinoamérica neutra) en imperativos y pronombres de segunda persona.
  - '''Sencillez de corazón'' como equivalente estable de ἁπλότης καρδίας; evita ''simplicidad'' que en español moderno puede sonar a falta de inteligencia.'
