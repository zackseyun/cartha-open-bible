translation:
  language: es
  text: No hubo engaño[a] en mi corazón, y no subió mentira por mis labios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'dolo'; el griego δόλος denota maquinación astuta o falsedad.
    reason: lexical_alternative
lexical_decisions:
- source_word: Δόλος
  english_pob_choice: deceit
  chosen_spanish: engaño
  alternatives_spanish:
  - dolo
  - fraude
  - astucia maliciosa
  lexicon: BDAG
  rationale: '''Engaño'' es el equivalente contemporáneo más claro y se ajusta al paralelo corazón/labios con ''mentira''.'
- source_word: οὐκ ἐγένετο ἐν τῇ καρδίᾳ μου
  english_pob_choice: came to be in my heart
  chosen_spanish: hubo en mi corazón
  alternatives_spanish:
  - llegó a estar en mi corazón
  - se produjo en mi corazón
  lexicon: BDAG
  rationale: ἐγένετο (aoristo de γίνομαι) en negación se rinde naturalmente en español como 'no hubo'. El sentido es la ausencia testimonial del engaño en el ámbito interno.
- source_word: ψεῦδος οὐκ ἀνῆλθε διὰ τῶν χειλέων μου
  english_pob_choice: no lie went up through my lips
  chosen_spanish: no subió mentira por mis labios
  alternatives_spanish:
  - no salió mentira por mis labios
  - ninguna falsedad pasó por mis labios
  lexicon: BDAG
  rationale: Se preserva la imagen vívida de ἀνῆλθε ('subir') con 'subió', conservando el modo poético-testamentario en lugar de aplanarlo a 'salir'.
translation_notes:
  revision_awareness: La revisión gpt-5.4 no cambió este versículo. La versión española conserva el paralelismo corazón/labios.
  spanish_consistency_notes:
