translation:
  language: es
  text: Amé al Señor con todas mis fuerzas, y de igual modo amé a toda persona con todo mi corazón, más que a mis propios hijos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego ὑπὲρ τὰ τέκνα μου expresa una comparación intencionalmente fuerte: el amor al prójimo iguala o supera al amor familiar inmediato, manteniendo la fuerza ética del texto.'
    reason: theological_note
lexical_decisions:
- source_word: Τὸν Κύριον ἠγάπησα
  english_pob_choice: I loved the Lord
  chosen_spanish: amé al Señor
  alternatives_spanish:
  - he amado al Señor
  lexicon: BDAG
  rationale: κύριος se traduce 'Señor' por política del proyecto. El aoristo se rinde con el pretérito perfecto simple, conforme al testimonio narrativo en español.
- source_word: πάντα ἄνθρωπον
  english_pob_choice: every person
  chosen_spanish: toda persona
  alternatives_spanish:
  - a todo hombre
  - a todas las personas
  lexicon: BDAG
  rationale: El sintagma es distributivo e inclusivo; 'toda persona' conserva el patrón retórico singular y emplea español contemporáneo no marcado por género.
- source_word: ὑπὲρ τὰ τέκνα μου
  english_pob_choice: more than my children
  chosen_spanish: más que a mis propios hijos
  alternatives_spanish:
  - más que a mis hijos
  - por encima de mis hijos
  lexicon: BDAG
  rationale: ὑπέρ aquí expresa comparación. Se añade 'propios' para reforzar el contraste ético sorprendente sin suavizarlo.
translation_notes:
  revision_awareness: La revisión inglesa no cambió el verso; el español preserva la afirmación ética sin atenuarla.
  spanish_consistency_notes:
  - '''Señor'' para κύριος conforme a la política del proyecto.'
  - '''Toda persona'' como traducción inclusiva neutra para πᾶς ἄνθρωπος, evitando ''todo hombre'' cuando el sentido es genérico.'
