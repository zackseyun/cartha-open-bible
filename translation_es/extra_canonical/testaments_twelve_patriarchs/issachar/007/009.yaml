id: T12P.ISS.7.9
reference: Testament of Issachar 7:9
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 176-187, Issachar pilot)
  text: 9. Καὶ ἐκτείνας τοὺς πόδας αὐτοῦ³⁷ ἐκοιμήθη ἐν γήρει καλῷ ὕπνον αἰώνιον.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/issachar/007/009.yaml
  text: And stretching out his feet, he fell asleep in a good old age, with every limb sound and in strength, and slept the eternal sleep.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:12Z'
    unchanged: false
    changes_summary: Adjusted 'sound in every limb and strong' to 'with every limb sound and in strength' for closer alignment with the Greek phrasing and more formal consistency.
translation:
  language: es
  text: Y extendiendo sus pies, se durmió en buena vejez, con todos sus miembros sanos y con vigor[a], y durmió el sueño eterno[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. 'teniendo cada miembro sano, y siendo fuerte'. Algunas formas textuales amplifican esta cláusula sobre la integridad física del patriarca.
    reason: textual_variant
  - marker: b
    text: La metáfora del 'sueño eterno' es eufemismo común para la muerte; se conserva por su fuerza testamentaria y bíblica.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκτείνας τοὺς πόδας αὐτοῦ
  english_pob_choice: stretching out his feet
  chosen_spanish: extendiendo sus pies
  alternatives_spanish:
  - estirando sus pies
  - tendiendo sus pies
  lexicon: BDAG
  rationale: ἐκτείνω se traduce naturalmente como 'extender' en español; conserva el matiz solemne del fallecimiento en cama.
- source_word: ἐκοιμήθη ἐν γήρει καλῷ
  english_pob_choice: he fell asleep in a good old age
  chosen_spanish: se durmió en buena vejez
  alternatives_spanish:
  - se durmió en hermosa vejez
  - expiró en buena ancianidad
  lexicon: BDAG
  rationale: Se preserva el eufemismo griego 'dormirse' como metáfora de la muerte; 'buena vejez' refleja γῆρας καλόν fielmente.
- source_word: πᾶν μέλος ἔχων ὑγιές, καὶ ἰσχύων
  english_pob_choice: with every limb sound and in strength
  chosen_spanish: con todos sus miembros sanos y con vigor
  alternatives_spanish:
  - con cada miembro sano y vigoroso
  - íntegro en todos sus miembros y fuerte
  lexicon: BDAG
  rationale: Se conserva la estructura de doble cualificación física del griego (sano + fuerte). 'Vigor' captura ἰσχύς con elegancia testamentaria.
- source_word: ὕπνον αἰώνιον
  english_pob_choice: the eternal sleep
  chosen_spanish: el sueño eterno
  alternatives_spanish:
  - el sueño perpetuo
  - el sueño sempiterno
  lexicon: BDAG
  rationale: Se mantiene la metáfora del sueño, prominente en el griego, sin reducirla a 'murió'. 'Sueño eterno' conserva la cadencia testamentaria solemne.
translation_notes:
  revision_awareness: La revisión inglesa cambió 'sound in every limb and strong' a 'with every limb sound and in strength' para mayor precisión sintáctica; el español refleja esa estructura paralela.
  spanish_consistency_notes:
  - '''Se durmió'' como eufemismo de muerte estable en todo el corpus T12P en español.'
  - '''Sueño eterno'' como traducción canónica de ὕπνος αἰώνιος en este corpus.'
