  text: 3. Οἶνον⁶ εἰς ἀποπλάνησιν οὐκ ἔπιον· ⌈πᾶν ἐπιθύμημα τοῦ πλησίου οὐκ ἐπεθύμησα⁷.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/issachar/007/003.yaml
  text: I did not drink wine for deception, and I did not desire anything that belonged to my neighbor.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:10Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: No bebí vino para extravío[a], y no codicié nada de lo que pertenecía a mi prójimo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'para descarrío'; ἀποπλάνησις indica ser llevado al error o engaño.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἶνον εἰς ἀποπλάνησιν
  english_pob_choice: wine for deception
  chosen_spanish: vino para extravío
  alternatives_spanish:
  - vino para engaño
  - vino para descarrío
  - vino para desenfreno
  lexicon: BDAG
  rationale: ἀποπλάνησις tiene el sentido de ser desviado o engañado. 'Extravío' conserva la fuerza moral del sustantivo y el paralelismo conciso del versículo.
- source_word: πᾶν ἐπιθύμημα τοῦ πλησίου οὐκ ἐπεθύμησα
  english_pob_choice: I did not desire anything that belonged to my neighbor
  chosen_spanish: no codicié nada de lo que pertenecía a mi prójimo
  alternatives_spanish:
  - no deseé nada del prójimo
  - no codicié las cosas deseables de mi prójimo
  lexicon: BDAG
  rationale: La frase ecoa el lenguaje del Decálogo sobre la codicia. 'Codiciar' resuena con el lenguaje veterotestamentario español de Éxodo 20:17 y es la palabra natural de la tradición.
- source_word: πλησίου
  english_pob_choice: neighbor
  chosen_spanish: prójimo
  alternatives_spanish:
  - vecino
  lexicon: BDAG
  rationale: '''Prójimo'' es el equivalente bíblico tradicional y moralmente cargado en español, frente a ''vecino'' que sólo connota proximidad geográfica.'
translation_notes:
  revision_awareness: La revisión gpt-5.4 no cambió este versículo. La versión española mantiene el lenguaje de codicia decalogal.
  spanish_consistency_notes:
  - '''codiciar'' usado consistentemente para ἐπιθυμέω en contextos de mandamiento'
  - '''prójimo'' por πλησίον'
