  text: 5. ⌈Παντὶ ἀνθρώπῳ ὀδυνομένῳ συνεστέναξα καὶ πτωχῷ μετέδωκα ἄρτον¹² μου⁷. Εὐσέβειαν ἐποίησα¹⁴ ἐν πάσαις ταῖς¹⁵ ἡμέραις μου, *᾿Αλήθειαν ἐφύλαξα¹⁶.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/issachar/007/005.yaml
  text: I groaned together with every person in pain, and I shared my bread with the poor. I practiced godliness in all my days; I kept truth.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:12Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Gemí junto con toda persona que sufría, y compartí mi pan[a] con el pobre. Practiqué la piedad[b] todos mis días; guardé la verdad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. 'compartí mi pan'; el sentido se extiende a 'compartí mi alimento' con el necesitado.
    reason: lexical_alternative
  - marker: b
    text: εὐσέβεια designa la reverencia y conducta justa hacia Dios; aquí 'piedad' en sentido amplio de devoción práctica.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνεστέναξα
  english_pob_choice: I groaned together with
  chosen_spanish: gemí junto con
  alternatives_spanish:
  - me lamenté con
  - suspiré con
  lexicon: BDAG
  rationale: El verbo compuesto συν- expresa sufrimiento compartido y corporalidad, más fuerte que mera simpatía; 'gemí junto con' conserva el patetismo encarnado del testamento.
- source_word: μετέδωκα ἄρτον μου
  english_pob_choice: I shared my bread
  chosen_spanish: compartí mi pan
  alternatives_spanish:
  - di de mi pan
  - repartí mi alimento
  lexicon: BDAG
  rationale: Se preserva la imagen concreta del pan compartido y el ethos caritativo sin paráfrasis innecesaria.
- source_word: Εὐσέβειαν ἐποίησα
  english_pob_choice: I practiced godliness
  chosen_spanish: practiqué la piedad
  alternatives_spanish:
  - actué con piedad
  - obré con devoción
  lexicon: BDAG
  rationale: εὐσέβεια en este contexto designa la conducta reverente habitual hacia Dios; 'piedad' es el equivalente español tradicional y legible, mejor que 'devoción' (más subjetivo) o 'religiosidad' (peyorativo en castellano moderno).
- source_word: Ἀλήθειαν ἐφύλαξα
  english_pob_choice: I kept truth
  chosen_spanish: guardé la verdad
  alternatives_spanish:
  - custodié la verdad
  - conservé la verdad
  lexicon: BDAG
  rationale: Se mantiene la fórmula breve y elevada del griego. 'Guardar' refleja φυλάσσω mejor que 'custodiar' (más jurídico) en este registro testamentario.
translation_notes:
  revision_awareness: La revisión inglesa no introdujo cambios; el español sigue la lectura formal y dignificada del POB.
  spanish_consistency_notes:
  - '''Piedad'' como equivalente estable de εὐσέβεια en estos Testamentos, en línea con el uso de ''godliness'' del POB.'
  - '''Guardar la verdad'' en lugar de ''mantener'' o ''preservar'' para conservar el tono testamentario.'
