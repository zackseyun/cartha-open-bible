  text: 2. ⁶²Πλὴν τῆς συμβίου μου² οὐκ ἔγνων ἄλλην⁷. Οὐκ ἐπόρνευσα³ ἐν μετεωρισμῷ Γὀφθαλμῶν⁴ μου⁵.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/issachar/007/002.yaml
  text: Except for my wife, I have not known another. I did not commit sexual immorality with wandering eyes.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:10Z'
    unchanged: false
    changes_summary: Removed 'woman' to reflect the Greek, which simply says 'another,' and retained the rest as accurate and natural.
translation:
  language: es
  text: Aparte de mi esposa, no he conocido[a] a ninguna otra. No cometí inmoralidad sexual con ojos errantes[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego usa 'conocer' (γινώσκω) en su sentido idiomático de relación sexual.
    reason: lexical_alternative
  - marker: b
    text: O 'con la distracción de mis ojos'; la frase griega describe una mirada inquieta y movida por el deseo.
    reason: lexical_alternative
lexical_decisions:
- source_word: συμβίου μου
  english_pob_choice: my wife
  chosen_spanish: mi esposa
  alternatives_spanish:
  - mi cónyuge
  - mi compañera
  lexicon: BDAG
  rationale: συμβίου μου designa a la cónyuge; 'esposa' es claro y natural en español moderno frente al más rígido 'cónyuge'.
- source_word: οὐκ ἔγνων ἄλλην
  english_pob_choice: I have not known another
  chosen_spanish: no he conocido a ninguna otra
  alternatives_spanish:
  - no he tenido relación con otra
  - no conocí a otra
  lexicon: BDAG
  rationale: Se preserva el sentido idiomático sexual de γινώσκω con 'conocer'. El griego dice solamente 'otra' (no 'otra mujer'), siguiendo la revisión inglesa que eliminó 'woman'.
- source_word: ἐπόρνευσα
  english_pob_choice: commit sexual immorality
  chosen_spanish: cometí inmoralidad sexual
  alternatives_spanish:
  - fornifiqué
  - me prostituí
  - me corrompí sexualmente
  lexicon: BDAG
  rationale: πορνεύω abarca la conducta sexual ilícita en general. 'Inmoralidad sexual' es accesible en español contemporáneo y evita lo arcaico de 'fornicar'.
- source_word: ἐν μετεωρισμῷ ὀφθαλμῶν μου
  english_pob_choice: with wandering eyes
  chosen_spanish: con ojos errantes
  alternatives_spanish:
  - con la mirada vagabunda
  - con ojos desviados
  - con ojos inquietos
  lexicon: LSJ
  rationale: La frase apunta a la mirada inquieta movida por el deseo. 'Ojos errantes' captura idiomáticamente el matiz moral en español.
translation_notes:
  revision_awareness: La revisión inglesa eliminó 'woman' de 'another woman' para reflejar que el griego dice solamente ἄλλην. La versión española sigue esta lectura con 'a ninguna otra' sin añadir 'mujer'.
  spanish_consistency_notes:
  - '''inmoralidad sexual'' coherente con el uso POB para πορνεύω/πορνεία'
  - '''ojos errantes'' como rendición idiomática de μετεωρισμῷ ὀφθαλμῶν'
