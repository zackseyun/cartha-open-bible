base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/issachar/007/008.yaml
  text: And after saying these things, he commanded his sons to carry him up to Hebron and bury him there with his fathers in the cave.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:12Z'
    unchanged: false
    changes_summary: Added a comma after the introductory participial phrase for natural English punctuation; wording otherwise accurately reflects the Greek.
translation:
  language: es
  text: Y después de decir estas cosas, mandó a sus hijos que lo llevaran a Hebrón[a] y lo enterraran allí con sus padres en la cueva.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrón es la ciudad patriarcal de Judá donde fueron sepultados Abraham, Isaac y Jacob (cf. Gn 23, 49:29-32).
    reason: cross_reference
lexical_decisions:
- source_word: ταῦτα εἰπὼν
  english_pob_choice: after saying these things
  chosen_spanish: después de decir estas cosas
  alternatives_spanish:
  - habiendo dicho esto
  - tras decir estas palabras
  lexicon: BDAG
  rationale: El participio aoristo se rinde idiomáticamente con 'después de + infinitivo' en español, conservando la sucesión narrativa sin recurrir al gerundio compuesto, más rígido.
- source_word: ἀναγάγωσιν αὐτὸν ἐν Χεβρών
  english_pob_choice: carry him up to Hebron
  chosen_spanish: lo llevaran a Hebrón
  alternatives_spanish:
  - lo subieran a Hebrón
  - lo trasladaran a Hebrón
  lexicon: BDAG
  rationale: ἀνάγω suele significar 'llevar/subir'. En español, 'llevar a Hebrón' es la forma natural para el traslado fúnebre; 'subir' resultaría ambiguo sin contexto geográfico explícito.
- source_word: θάψωσιν αὐτὸν μετὰ τῶν πατέρων αὐτοῦ
  english_pob_choice: bury him there with his fathers
  chosen_spanish: lo enterraran allí con sus padres
  alternatives_spanish:
  - lo sepultaran junto a sus padres
  lexicon: BDAG
  rationale: '''Enterrar'' es el equivalente neutro y contemporáneo en español latinoamericano; ''sepultar'' es válido pero más literario.'
translation_notes:
  revision_awareness: La revisión inglesa solo añadió una coma tras la frase participial; el español ya construye naturalmente la pausa con 'Y después de decir estas cosas,'.
  spanish_consistency_notes:
  - '''Hebrón'' con tilde, conforme a la ortografía española estándar.'
  - '''Padres'' como equivalente del griego πατέρες en sentido de antepasados varones, manteniendo el registro testamentario.'
