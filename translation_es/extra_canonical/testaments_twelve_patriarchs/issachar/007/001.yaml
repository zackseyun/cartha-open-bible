id: T12P.ISS.7.1
reference: Testament of Issachar 7:1
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 176-187, Issachar pilot)
  text: VII. *Ἰδοὺ οὖν ὡς ὁρᾶτε, ἑκατὸν εἴκοσι καὶ ἓξ ἐτῶν ὑπάρχω¹, καὶ οὐκ *ἔγνων †ἐν ἐμοὶ ἁμαρτίαν Γεἰς θάνατον⁷.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/issachar/007/001.yaml
  text: 'See then, as you see: I am one hundred and twenty-six years old, and I have not known any sin in me leading to death.'
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:10Z'
    unchanged: false
    changes_summary: 'Revised for closer lexical accuracy and completeness: changed ''as you perceive'' to ''as you see'' for ὡς ὁρᾶτε; rendered οὐκ ἔγνων ... ἐν ἐμοὶ ἁμαρτίαν more directly as ''I have not known any sin in me'' rather than ''I am not conscious of committing''; and translated εἰς θάνατον as ''leading to death.'''
translation:
  language: es
  text: 'Vean entonces, como ven: tengo ciento veintiséis años, y no he conocido en mí pecado alguno[a] que conduzca a la muerte.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'no he conocido en mí mismo pecado alguno que conduzca a la muerte'. El griego usa 'conocer' en sentido moral autorreflexivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς ὁρᾶτε
  english_pob_choice: as you see
  chosen_spanish: como ven
  alternatives_spanish:
  - como veis
  - como pueden ver
  lexicon: BDAG
  rationale: Se prefiere la forma de plural latinoamericano neutro 'ven' sobre el peninsular 'veis', manteniendo el llamado directo a los hijos.
- source_word: οὐκ ἔγνων ἐν ἐμοὶ ἁμαρτίαν
  english_pob_choice: I have not known any sin in me
  chosen_spanish: no he conocido en mí pecado alguno
  alternatives_spanish:
  - no me he sabido culpable de pecado
  - no he reconocido pecado en mí
  lexicon: BDAG
  rationale: γινώσκω en sentido moral autorreflexivo. 'He conocido en mí' preserva la fuerza testimonial del autoexamen sin afirmar impecabilidad absoluta.
- source_word: εἰς θάνατον
  english_pob_choice: leading to death
  chosen_spanish: que conduzca a la muerte
  alternatives_spanish:
  - de muerte
  - para muerte
  lexicon: BDAG
  rationale: Se preserva la frase griega εἰς θάνατον con sentido de orientación o consecuencia, evitando importar la terminología posterior de 'pecado mortal'.
theological_decisions:
- issue: Cuán fuertemente traducir la afirmación de Isacar sobre estar libre de pecado
  chosen_reading: Traducir como un testimonio de no haber conocido en sí mismo 'pecado alguno que conduzca a la muerte', no como impecabilidad absoluta
  alternative_readings:
  - No tengo pecado en mí
  - No he cometido ningún pecado mortal
  rationale: El texto griego es autotestimonial y queda calificado por εἰς θάνατον. La traducción preserva la fuerza moral del ejemplo de Isacar sin formular una afirmación doctrinal más amplia que la del texto.
  doctrine_reference: DOCTRINE.md §Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: La revisión gpt-5.4 cambió 'as you perceive' a 'as you see' y formuló οὐκ ἔγνων más directamente como 'I have not known any sin in me'; la versión española refleja la formulación revisada.
  spanish_consistency_notes:
  - '''ciento veintiséis'' escrito con palabras conforme a estilo formal'
  - '''Vean'' (ustedes) para mantener registro latinoamericano neutro'
