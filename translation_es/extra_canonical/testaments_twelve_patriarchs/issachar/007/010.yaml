translation:
  language: es
  text: Y sus hijos lo colocaron sobre unas andas[a] y después lo llevaron a Hebrón y lo enterraron allí con sus padres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Andas'': camilla o parihuela funeraria sobre la que se transportaba al difunto, no un ataúd cerrado.'
    reason: cultural_note
lexical_decisions:
- source_word: bier (féretro/andas funerarias)
  english_pob_choice: laid him on a bier
  chosen_spanish: lo colocaron sobre unas andas
  alternatives_spanish:
  - lo pusieron en un féretro
  - lo tendieron sobre el lecho funerario
  lexicon: BDAG
  rationale: El sustantivo griego subyacente designa el lecho o parihuelas funerarias para el traslado. 'Andas' es el término español tradicional para esta camilla funeraria; 'féretro' sugeriría más bien ataúd cerrado, anacrónico aquí.
- source_word: ἀνήγαγον αὐτὸν ἐν Χεβρών
  english_pob_choice: carried him up to Hebron
  chosen_spanish: lo llevaron a Hebrón
  alternatives_spanish:
  - lo subieron a Hebrón
  - lo trasladaron a Hebrón
  lexicon: BDAG
  rationale: 'Se mantiene la consistencia con el versículo 8: ''llevaron a Hebrón'' como traducción estable de ἀνάγω en este contexto fúnebre.'
- source_word: ἔθαψαν αὐτὸν μετὰ τῶν πατέρων αὐτοῦ
  english_pob_choice: buried him there with his fathers
  chosen_spanish: lo enterraron allí con sus padres
  alternatives_spanish:
  - lo sepultaron junto a sus padres
  lexicon: BDAG
  rationale: Se conserva la consistencia léxica con el v. 8 ('enterraron') para mantener la coherencia narrativa del epílogo.
translation_notes:
  revision_awareness: Este versículo sufrió un truncamiento en la pasada de revisión inglesa que fue posteriormente restaurado. El español refleja el texto restaurado, paralelo al v. 8.
  spanish_consistency_notes:
  - '''Andas'' para el lecho funerario antiguo, evitando ''féretro'' (ataúd moderno) o ''parihuelas'' (registro técnico).'
  - 'Consistencia léxica con v. 8: ''llevar a Hebrón'' y ''enterrar con sus padres''.'
