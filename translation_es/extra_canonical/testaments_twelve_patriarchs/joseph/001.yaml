translation:
  language: es
  text: '3[a]. En mi vida vi la envidia y la muerte, y no me extravié, sino que permanecí en la verdad del Señor.


    4. Mis hermanos me odiaron, pero el Señor me amó. Quisieron matarme[b], pero el Dios de mis padres me guardó. Me bajaron a un pozo, y el Altísimo me sacó.


    5. Fui vendido como esclavo, y el Amo de todo me liberó. Fui llevado al cautiverio, y su mano poderosa me ayudó. Estuve afligido por el hambre, y el Señor mismo me alimentó.


    6. Estaba solo, y Dios me consoló. Estaba débil, y el Señor me visitó. Estaba en prisión, y el Salvador me mostró favor. [Estaba en cadenas, y él me soltó.]


    7. En medio de calumnias él habló también en mi defensa[d][c]. Por las amargas palabras de los sueños me rescató.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'cisterna' por 'pozo', con eco más específico al relato de Génesis.
    reason: lexical_alternative
  - marker: b
    text: El título 'Salvador' traduce el testigo griego tal como se conserva. Algunos lectores podrían preferir 'libertador'; la formulación puede reflejar una expansión teológica secundaria o acentuada en la transmisión.
    reason: textual_variant
  - marker: c
    text: La línea entre corchetes 'Estaba en cadenas, y él me soltó' es textualmente incierta en esta tradición testimonial.
    reason: textual_variant
  - marker: d
    text: La frase 'las amargas palabras de los sueños' es de griego difícil; probablemente se refiere a las palabras hostiles y acusaciones ligadas a los sueños de José.
    reason: alternative_reading
lexical_decisions:
- source_word: φθόνον
  english_pob_choice: envy
  chosen_spanish: envidia
  alternatives_spanish:
  - celos
  lexicon: LSJ
  rationale: El Testamento de José gira en torno al vicio destructivo de la envidia entre hermanos; 'envidia' preserva la categoría moral sin suavizarla a una mera rivalidad.
- source_word: ἐπλανήθην
  english_pob_choice: was led astray
  chosen_spanish: me extravié
  alternatives_spanish:
  - fui descarriado
  - fui engañado
  lexicon: BDAG
  rationale: Aunque el griego es pasivo, el español 'me extravié' captura el sentido moral de no ser desviado del camino recto, en línea con el POB.
- source_word: ἀληθείᾳ
  english_pob_choice: truth
  chosen_spanish: verdad
  alternatives_spanish:
  - fidelidad
  - realidad
  lexicon: BDAG
  rationale: '''Verdad del Señor'' conserva el sentido ético-pactual de alineamiento firme con el camino de Dios.'
- source_word: ἀνελεῖν
  english_pob_choice: kill
  chosen_spanish: matarme
  alternatives_spanish:
  - destruirme
  - deshacerse de mí
  lexicon: LSJ
  rationale: El español directo coincide con la intención homicida de los hermanos y conserva el paralelismo contrastivo del testamento.
- source_word: λάκκον
  english_pob_choice: pit
  chosen_spanish: pozo
  alternatives_spanish:
  - cisterna
  lexicon: LSJ
  rationale: '''Pozo'' es la traducción natural en español y conserva la resonancia con el relato de Génesis; ''cisterna'' es posible pero más técnico.'
- source_word: δουλείαν
  english_pob_choice: slavery
  chosen_spanish: esclavo
  alternatives_spanish:
  - esclavitud
  - servidumbre
  lexicon: BDAG
  rationale: Conforme a la doctrina del proyecto (δοῦλος → 'esclavo'), 'fui vendido como esclavo' refleja la condición de servidumbre sin eufemismo. La construcción española prefiere predicado nominal a 'a la esclavitud'.
- source_word: δεσπότης
  english_pob_choice: Master
  chosen_spanish: Amo
  alternatives_spanish:
  - Señor
  - Soberano
  lexicon: BDAG
  rationale: Aplicado a Dios como 'Amo de todo'; 'Amo' preserva la fuerza léxica distinta de κύριος en las líneas circundantes.
- source_word: αἰχμαλωσίαν
  english_pob_choice: captivity
  chosen_spanish: cautiverio
  alternatives_spanish:
  - cautividad
  - exilio
  lexicon: LSJ
  rationale: '''Cautiverio'' encaja con el sentido literal de ser apresado y con la secuencia retórica de aflicción y liberación.'
- source_word: διέθρεψέ
  english_pob_choice: nourished
  chosen_spanish: alimentó
  alternatives_spanish:
  - nutrió
  - sustentó
  lexicon: BDAG
  rationale: El verbo sugiere sustento por provisión; 'alimentó' transmite tanto la fuerza literal como providencial en el contexto del hambre.
- source_word: παρεκάλεσέ
  english_pob_choice: comforted
  chosen_spanish: consoló
  alternatives_spanish:
  - alentó
  - confortó
  lexicon: BDAG
  rationale: En el aislamiento de José, la consolación divina queda en primer plano; 'consoló' encaja con el tono personal y pastoral.
- source_word: ἐπεσκέψατό
  english_pob_choice: visited
  chosen_spanish: visitó
  alternatives_spanish:
  - se ocupó de mí
  - vino a socorrer
  lexicon: BDAG
  rationale: '''Visitó'' preserva el modismo bíblico de la atención divina graciosa, en paralelo al inglés.'
- source_word: σωτήρ
  english_pob_choice: Savior
  chosen_spanish: Salvador
  alternatives_spanish:
  - libertador
  lexicon: BDAG
  rationale: El testigo griego trae σωτήρ; la traducción lo reproduce de forma directa y la nota teológica explica la sensibilidad textual.
- source_word: ἐχαρίτωσέ
  english_pob_choice: showed me favor
  chosen_spanish: me mostró favor
  alternatives_spanish:
  - me concedió gracia
  - me trató con gracia
  lexicon: BDAG
  rationale: Esta expresión idiomática comunica el favor concedido en español moderno sin perder el sustrato de χάρις.
- source_word: διαβολαῖς
  english_pob_choice: slanders
  chosen_spanish: calumnias
  alternatives_spanish:
  - acusaciones falsas
  - difamaciones
  lexicon: LSJ
  rationale: El plural 'calumnias' encaja con las acusaciones hostiles que José soportó y mantiene concreto el lenguaje del vicio.
- source_word: συνηγόρησέ μοι
  english_pob_choice: spoke in my defense
  chosen_spanish: habló en mi defensa
  alternatives_spanish:
  - abogó por mí
  - intercedió por mí
  lexicon: LSJ
  rationale: Se conserva el matiz forense; 'habló en mi defensa' es claro y preserva el sentido de vindicación divina.
- source_word: λόγοις ἐνυπνίων πικροῖς
  english_pob_choice: the bitter words of dreams
  chosen_spanish: las amargas palabras de los sueños
  alternatives_spanish:
  - palabras amargas sobre sueños
  - duros relatos de sueños
  lexicon: LSJ
  rationale: La frase es textual y sintácticamente difícil; esta versión se mantiene cerca del griego y conserva la conexión con los sueños de José y la hostilidad que provocaron.
theological_decisions:
- issue: Traducción de σωτήρ en un texto testamental judío con posible coloración cristiana posterior
  chosen_reading: Salvador
  alternative_readings:
  - libertador
  rationale: El testigo griego pone explícitamente σωτήρ. El texto principal traduce la lectura conservada en lugar de silenciarla; una nota al pie señala la sensibilidad textual y teológica.
  doctrine_reference: Preservar la tensión teológica antes que resolverla; traducir con honestidad lo que está en el testigo griego.
translation_notes:
  revision_awareness: La revisión de gpt-5.4 cambió 'kept me safe' a 'kept me' (más literal), 'gripped by famine' a 'constrained by famine' ('afligido por el hambre' refleja la nueva línea), y 'bitter talk of dreams' a 'bitter words of dreams' ('palabras de los sueños').
  spanish_consistency_notes:
  - YHWH/Κύριος → Señor; Θεός → Dios; σωτήρ → Salvador; δεσπότης → Amo; δουλείαν/δοῦλος → esclavo/esclavitud según contexto.
  - El orden de los marcadores en 7 sigue el inglés [d][c] tal como aparece en POB.
  - Se mantiene la línea entre corchetes en 6 como variante textual del testigo.
