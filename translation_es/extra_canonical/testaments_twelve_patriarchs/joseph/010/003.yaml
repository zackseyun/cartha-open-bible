reference: Testament of Joseph 10:3
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 256-287, Joseph pilot)
  text: '*Ὅπου δὲ κατοικεῖ ὁ ὕψιστος¹⁰, κἂν *φθόνος τις περιπέσῃ, κἂν δουλία, κἂν συκοφαντία¹¹, *ὁ Κύριος κατοικῶν ἐπ᾽ αὐτὸν¹² διὰ τὴν σωφροσύνην οὐ μόνον⁷ ἐκ τῶν κακῶν ῥύεται¹³ αὐτόν¹⁴, ⸀ἀλλὰ καὶ ὑψοῖ¹⁵ καὶ δοξάζει αὐτὸν ὡς κἀμέ.'
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/010/003.yaml
  text: But where the Most High dwells, even if envy should fall upon someone, or slavery, or slander, the Lord who dwells with him, because of his self-control, not only rescues him from evils, but also exalts and glorifies him, as he did me.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:27Z'
    unchanged: false
    changes_summary: Changed the opening conjunction from 'And' to 'But' to better reflect δέ. No other changes needed.
translation:
  language: es
  text: Pero donde habita el Altísimo, aun si la envidia cae sobre alguno, o la esclavitud, o la calumnia[a], el Señor que habita con él, a causa de su dominio propio, no solo lo rescata de los males, sino que también lo enaltece y lo glorifica, como hizo conmigo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'falsa acusación'; el término griego συκοφαντία puede denotar acusaciones maliciosas o fabricadas, lo cual encaja con la experiencia de José en Egipto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ὕψιστος
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Excelso
  lexicon: BDAG
  rationale: Equivalente estándar del título divino en la literatura judía y cristiana en español; preserva el registro reverente.
- source_word: φθόνος
  english_pob_choice: envy
  chosen_spanish: envidia
  alternatives_spanish:
  - celos
  lexicon: BDAG
  rationale: La historia de José se mueve por la hostilidad envidiosa de sus hermanos; 'envidia' es el equivalente exacto y mantiene el motivo del vicio.
- source_word: δουλία
  english_pob_choice: slavery
  chosen_spanish: esclavitud
  alternatives_spanish:
  - servidumbre
  lexicon: BDAG
  rationale: 'Sigue la doctrina del proyecto: el sustantivo denota esclavitud real en la narrativa de José y no debe suavizarse a ''servidumbre'' donde la realidad bonded es saliente.'
- source_word: συκοφαντία
  english_pob_choice: slander
  chosen_spanish: calumnia
  alternatives_spanish:
  - acusación falsa
  - difamación
  lexicon: BDAG
  rationale: El contexto alude probablemente a las falsas acusaciones contra José. 'Calumnia' es compacto; el matiz de 'acusación falsa' se preserva en nota.
- source_word: ῥύεται
  english_pob_choice: rescues
  chosen_spanish: rescata
  alternatives_spanish:
  - libra
  - salva
  lexicon: BDAG
  rationale: El verbo denota liberación del peligro. 'Rescata' es vívido y accesible, apropiado para la exhortación narrativa.
- source_word: ὑψοῖ καὶ δοξάζει
  english_pob_choice: exalts and glorifies
  chosen_spanish: lo enaltece y lo glorifica
  alternatives_spanish:
  - lo levanta y lo honra
  - lo exalta y lo glorifica
  lexicon: BDAG
  rationale: La pareja es retóricamente importante y debe permanecer distinta. 'Enaltece y glorifica' preserva el registro elevado y el propio ascenso de José.
- source_word: περιπέσῃ
  english_pob_choice: should fall upon someone
  chosen_spanish: cae sobre alguno
  alternatives_spanish:
  - sobreviene a alguno
  lexicon: BDAG
  rationale: El verbo describe sufrir un infortunio. 'Cae sobre alguno' es la expresión natural en español que conserva la imagen de algo que sobreviene.
translation_notes:
  revision_awareness: El pase de revisión inglés cambió la conjunción inicial de 'And' a 'But' para reflejar mejor δέ. La versión española usa 'Pero' en consonancia con esa decisión adversativa.
  spanish_consistency_notes:
  - σωφροσύνη sigue rindiéndose 'dominio propio' (cf. 10:2) para mantener la consistencia léxica del capítulo.
  - δουλία/δοῦλος se mantiene en el campo de 'esclavitud/esclavo' siguiendo la decisión del POB inglés y la doctrina del proyecto.
