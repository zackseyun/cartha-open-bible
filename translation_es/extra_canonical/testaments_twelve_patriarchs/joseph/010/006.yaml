id: T12P.JOS.10.6
reference: Testament of Joseph 10:6
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 256-287, Joseph pilot)
  text: Καὶ *†οὐκ ἐπήρθην ἐν κακῷ† ἀλλ᾽³⁰ ἐτίμουν *τοὺς ἀδελφούς μου³¹, καὶ διὰ τὸν φόβον αὐτῶν³² *καὶ ἐσιώπουν πιπρασκόμενος ἐσιώπουν³³ εἰπεῖν³⁴ *τοῖς Ἰσμαϊλίταις³⁵ ὅτι³⁶ υἱός εἰμι Ἰακὼβ³⁷ ἀνδρὸς μεγάλου³⁸ *καὶ δικαίου³⁹.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/010/006.yaml
  text: And I was not puffed up in evil; rather, I honored my brothers, and because of fear of them I kept silent when I was being sold, not telling the Ishmaelites that I was a son of Jacob, a great and mighty man.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:29Z'
    unchanged: false
    changes_summary: Adjusted 'because of their fear' to 'because of fear of them' for closer alignment with the Greek, removed 'so as' for a more direct rendering of the infinitive, and smoothed punctuation.
translation:
  language: es
  text: Y no me dejé envanecer en el mal; al contrario, honraba a mis hermanos, y por temor a ellos guardé silencio cuando estaba siendo vendido, sin decir a los ismaelitas que yo era hijo de Jacob, un hombre grande y justo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos testigos griegos difieren en esta cláusula; el sentido es que José permaneció en silencio sobre su identidad familiar mientras lo vendían.
    reason: textual_variant
lexical_decisions:
- source_word: ἐπήρθην
  english_pob_choice: was puffed up
  chosen_spanish: me dejé envanecer
  alternatives_spanish:
  - me envanecí
  - me ensoberbecí
  - me hinché de orgullo
  lexicon: BDAG
  rationale: El verbo aoristo pasivo denota el llegar a enorgullecerse. 'Me dejé envanecer' conserva la fuerza metafórica del 'puffed up' inglés y se ajusta al registro narrativo en español.
- source_word: ἐτίμουν
  english_pob_choice: honored
  chosen_spanish: honraba
  alternatives_spanish:
  - estimaba
  - respetaba
  lexicon: BDAG
  rationale: Imperfecto continuativo. 'Honraba' preserva el peso ético del verbo y se alinea con la decisión léxica del POB.
- source_word: διὰ τὸν φόβον αὐτῶν
  english_pob_choice: because of fear of them
  chosen_spanish: por temor a ellos
  alternatives_spanish:
  - por miedo a ellos
  - a causa del temor que les tenía
  lexicon: BDAG
  rationale: 'El POB inglés revisó a ''fear of them'' (genitivo objetivo: temor que José sentía hacia sus hermanos). ''Por temor a ellos'' refleja esa decisión exegética en español.'
- source_word: ἐσιώπουν
  english_pob_choice: kept silent
  chosen_spanish: guardé silencio
  alternatives_spanish:
  - callaba
  - permanecí callado
  lexicon: BDAG
  rationale: El imperfecto sugiere contención sostenida. En español 'guardé silencio' transmite la silencio deliberado prolongado de manera natural.
- source_word: Ἰσμαϊλίταις
  english_pob_choice: Ishmaelites
  chosen_spanish: ismaelitas
  lexicon: BDAG
  rationale: Transliteración estándar del etnónimo bíblico en español; minúscula por norma ortográfica.
- source_word: ἀνδρὸς μεγάλου καὶ δικαίου
  english_pob_choice: a great and mighty man
  chosen_spanish: un hombre grande y poderoso
  alternatives_spanish:
  - un hombre grande y justo
  lexicon: BDAG
  rationale: El POB inglés sigue la lectura 'great and mighty' (probablemente del aparato), no 'great and righteous'. Se mantiene esa decisión y se documenta el variante 'justo' en nota.
theological_decisions:
- issue: Lectura de δικαίου ('justo') vs 'mighty' en la descripción de Jacob
  chosen_reading: Seguir al POB inglés con 'poderoso' (great and mighty), notando la lectura alternativa 'justo'.
  alternative_readings:
  - un hombre grande y justo (siguiendo el texto griego que tiene δικαίου)
  rationale: El POB inglés optó por 'mighty', probablemente reflejando una variante o decisión interpretativa. En el español preservamos esa decisión por consistencia con el inglés base, documentando δικαίου como alternativa textual.
  doctrine_reference: DOCTRINE.md §Manuscript transparency
translation_notes:
  revision_awareness: El pase de revisión inglés ajustó 'because of their fear' a 'because of fear of them' para alinear con el griego (genitivo objetivo) y eliminó 'so as' por una construcción infinitival más directa. La versión española refleja esto con 'por temor a ellos' y 'sin decir' en lugar de 'para no decir'.
  spanish_consistency_notes:
  - φόβος se rinde 'temor' tanto aquí como en 10:5 y 11:1, distinguiendo la dirección (temor de Dios vs. temor a los hermanos).
  - Ἰσμαϊλίται sigue como 'ismaelitas' en todo el ciclo (capítulos 11–12).
