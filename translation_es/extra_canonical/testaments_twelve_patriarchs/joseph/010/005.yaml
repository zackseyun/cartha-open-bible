source:
  edition: Charles 1908 Greek Versions (pages 256-287, Joseph pilot)
  text: Γινώσκουσιν¹⁹ οἱ ἀδελφοί μου²⁰ πῶς ἠγάπησέ με ὁ πατήρ μου²¹, καὶ οὐχὶ²² ὑψούμην²³ ⸀ἐν τῇ διανοίᾳ²⁴ μου⸃, καίπερ νήπιος ὑπάρχων²⁵, ⸀εἶχον τὸν *φόβον τοῦ θεοῦ²⁶ ἐν τῇ καρδίᾳ²⁷ μου⸃· ᾔδειν²⁸ γὰρ ὅτι πάντα²⁹ παρελεύσεται.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/010/005.yaml
  text: My brothers knew how my father loved me, yet I was not exalted in my mind; though I was a child, I had the fear of God in my heart, for I knew that surely all things will pass away.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:28Z'
    unchanged: false
    changes_summary: Removed the unnecessary conjunction 'but' for smoother English and adjusted 'all things will surely pass away' to 'surely all things will pass away' to reflect the Greek word order more naturally while preserving meaning.
translation:
  language: es
  text: Mis hermanos sabían cuánto me amaba mi padre, y yo no me ensoberbecía en mi mente; aunque era un niño, tenía el temor de Dios en mi corazón, porque sabía que ciertamente todas las cosas pasarán.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὑψούμην
  english_pob_choice: was exalted
  chosen_spanish: me ensoberbecía
  alternatives_spanish:
  - me enaltecía
  - me exaltaba
  lexicon: BDAG
  rationale: El imperfecto pasivo/medio aquí tiene sentido reflexivo de envanecerse interiormente. 'Ensoberbecerse' captura el matiz negativo de orgullo personal que el contexto demanda; en 10:3 se reservó 'enaltecer' para la acción positiva del Señor.
- source_word: διανοίᾳ
  english_pob_choice: mind
  chosen_spanish: mente
  alternatives_spanish:
  - pensamiento
  - entendimiento
  lexicon: BDAG
  rationale: Aquí el término concierne la disposición interior. 'Mente' es el equivalente más natural y mantiene el contraste con 'obra' y 'palabra' del v. 4.
- source_word: νήπιος
  english_pob_choice: child
  chosen_spanish: un niño
  alternatives_spanish:
  - pequeño
  - infante
  lexicon: BDAG
  rationale: νήπιος denota corta edad e inmadurez relativa. 'Un niño' es la lectura natural y conserva la modestia que José resalta.
- source_word: φόβον τοῦ θεοῦ
  english_pob_choice: the fear of God
  chosen_spanish: el temor de Dios
  alternatives_spanish:
  - la reverencia hacia Dios
  lexicon: BDAG
  rationale: Frase ética estable de la Biblia. La traducción literal preserva el peso moral tradicional y la resonancia intertextual.
- source_word: πάντα παρελεύσεται
  english_pob_choice: all things will pass away
  chosen_spanish: todas las cosas pasarán
  alternatives_spanish:
  - todo pasará
  - todas las cosas se acabarán
  lexicon: BDAG
  rationale: El POB inglés revisado adelanta el adverbio 'surely'. En español, 'ciertamente todas las cosas pasarán' refleja ese énfasis y conserva la fuerza escatológica.
- source_word: θεοῦ
  english_pob_choice: God
  chosen_spanish: Dios
  lexicon: BDAG
  rationale: θεός se traduce como 'Dios' por defecto del proyecto.
translation_notes:
  revision_awareness: El pase de revisión inglés eliminó el 'but' redundante y movió 'surely' antes de 'all things' para reflejar mejor el orden griego. La versión española traduce este énfasis como 'ciertamente todas las cosas pasarán' al final de la cláusula causal.
  spanish_consistency_notes:
  - φόβος τοῦ θεοῦ se rinde 'el temor de Dios' aquí y se mantendrá en 11:1 ('temor de Dios') para consistencia.
  - διανοία se traduce 'mente' aquí siguiendo el matiz de disposición interior.
