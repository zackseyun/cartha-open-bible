id: T12P.JOS.10.2
reference: Testament of Joseph 10:2
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 256-287, Joseph pilot)
  text: '*Οὕτως καὶ ὑμεῖς⁴, ⌜ἐὰν τὴν σωφροσύνην καὶ τὴν ἁγνείαν μεταδιώκητε⁵ ἐν ὑπομονῇ καὶ *προσευχῇ μετὰ νηστείας ἐν ταπεινώσει⁶ καρδίας, ὁ⁷ Κύριος κατοικήσει⁸ ἐν ὑμῖν, ὅτι ἀγαπᾷ⁹ τὴν σωφροσύνην.'
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/010/002.yaml
  text: So you also, if you pursue self-control and purity with endurance and prayer with fasting, in humility of heart, the Lord will dwell in you, because he loves self-control.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:27Z'
    unchanged: false
    changes_summary: Changed 'among you' to 'in you' for closer alignment with ἐν ὑμῖν. Removed the comma before 'and prayer' for smoother English while preserving the structure. Kept the rest substantially unchanged as accurate and natural.
translation:
  language: es
  text: Así también ustedes, si persiguen el dominio propio y la pureza con perseverancia y oración con ayuno, en humildad de corazón, el Señor habitará en ustedes, porque ama el dominio propio.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: σωφροσύνη
  english_pob_choice: self-control
  chosen_spanish: dominio propio
  alternatives_spanish:
  - templanza
  - castidad
  - sobriedad
  lexicon: BDAG
  rationale: El testamento de José gira en torno al autodominio moral con dimensión sexual. 'Dominio propio' captura mejor la virtud amplia y se mantiene legible; lo sexual se refuerza al emparejarlo con 'pureza'.
- source_word: ἁγνεία
  english_pob_choice: purity
  chosen_spanish: pureza
  alternatives_spanish:
  - castidad
  - santidad
  lexicon: BDAG
  rationale: En este contexto el término apunta especialmente a la pureza sexual y moral. 'Pureza' es lo bastante amplio para preservar el alcance ético sin reducirse de inmediato a 'castidad'.
- source_word: μεταδιώκητε
  english_pob_choice: pursue
  chosen_spanish: persiguen
  alternatives_spanish:
  - procuran
  - buscan con empeño
  lexicon: BDAG
  rationale: El verbo intensifica la persecución activa de la virtud. 'Persiguen' conserva la fuerza imitativa-deportiva del compuesto sin perder naturalidad.
- source_word: ταπείνωσις καρδίας
  english_pob_choice: humility of heart
  chosen_spanish: humildad de corazón
  alternatives_spanish:
  - bajeza de corazón
  - corazón humilde
  lexicon: BDAG
  rationale: Frase ética de resonancia semítica; 'humildad de corazón' preserva el registro testamentario y el enfoque moral interior.
- source_word: κατοικήσει ἐν ὑμῖν
  english_pob_choice: will dwell in you
  chosen_spanish: habitará en ustedes
  alternatives_spanish:
  - morará en ustedes
  - habitará entre ustedes
  lexicon: BDAG
  rationale: El POB inglés se ajustó de 'among you' a 'in you' para alinearse con ἐν ὑμῖν. 'Habitará en ustedes' refleja esa decisión y mantiene la diáfana dignidad bíblica.
- source_word: Κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  lexicon: BDAG
  rationale: En este texto griego pseudoepigráfico Κύριος funciona como título del Dios de Israel sin sustituir al tetragrámaton hebreo; 'el Señor' preserva el registro del testamento sin imponer 'Yahvé' donde el griego no lo refleja.
theological_decisions:
- issue: Lenguaje de inhabitación divina en un texto testamentario judío
  chosen_reading: Traducir κατοικήσει directamente como 'el Señor habitará en ustedes', siguiendo la decisión inglesa.
  alternative_readings:
  - habitará entre ustedes (favor metafórico)
  - morará en vosotros (lectura cristianizada posterior)
  rationale: El testimonio griego presenta la presencia divina como recompensa de la pureza y la perseverancia; la traducción debe preservar la tensión teológica en su propio entorno judío sin importar precisión doctrinal posterior.
  doctrine_reference: DOCTRINE.md §Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: El pase de revisión inglés cambió 'among you' a 'in you' para alinear con ἐν ὑμῖν. La versión española refleja esta opción con 'en ustedes' y conserva el orden 'humildad de corazón' como cláusula adverbial intercalada.
  spanish_consistency_notes:
  - σωφροσύνη se rinde 'dominio propio' en todo el capítulo 10 (10:2 dos veces, 10:3) para mantener consistencia.
  - Κύριος se rinde 'el Señor' en todo el capítulo, distinguiéndose del hebreo YHWH que se reservaría para 'Yahvé'.
