  - oración y ayuno
  lexicon: BDAG
  rationale: μετά indica acompañamiento; 'la oración con ayuno' preserva la práctica conjunta sin expansión.
- source_word: κατεργάζεται
  english_pob_choice: accomplish
  chosen_spanish: logran
  alternatives_spanish:
