base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/010/004.yaml
  text: For every person comes together either in deed or in word or in imaginative thought.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:28Z'
    unchanged: false
    changes_summary: Replaced the inaccurate 'in every way a person is lifted up' with 'every person comes together,' reflecting πάντας γὰρ ἀνθρώπους ... συνέρχεται more closely; accounted for φαντίᾳ/διανοίᾳ with 'imaginative thought'; streamlined the coordinate structure for natural formal English.
translation:
  language: es
  text: Porque toda persona se manifiesta sea en obra, sea en palabra, sea en pensamiento imaginativo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El texto griego es difícil. El sentido es que la persona se hace patente o aparece en cada esfera: obra, palabra y pensamiento. Algunos testigos leen φαντία (''imaginación'') donde otros tienen διάνοια.'
    reason: textual_variant
lexical_decisions:
- source_word: πάντας ... ἀνθρώπους
  english_pob_choice: every person
  chosen_spanish: toda persona
  alternatives_spanish:
  - todos los seres humanos
  - todo hombre
  lexicon: BDAG
  rationale: El POB inglés revisó a 'every person' por inclusividad y para reflejar πάντας ἀνθρώπους. 'Toda persona' mantiene la lectura genérica e inclusiva en español neutro.
- source_word: συνέρχεται
  english_pob_choice: comes together
  chosen_spanish: se manifiesta
  alternatives_spanish:
  - se reúne
  - se compone
  - se conjuga
  lexicon: BDAG
  rationale: 'El griego es difícil; el POB inglés optó por ''comes together''. En español, ''se manifiesta'' transmite mejor el sentido contextual (de revelarse o concentrarse en estos tres planos: obra, palabra, pensamiento) sin perder el matiz de convergencia. Se documenta la dificultad textual en nota.'
- source_word: διανοίᾳ
  english_pob_choice: imaginative thought
  chosen_spanish: pensamiento imaginativo
  alternatives_spanish:
  - mente
  - entendimiento
  lexicon: BDAG
  rationale: El POB inglés revisó a 'imaginative thought' para reflejar la lectura φαντίᾳ/διανοίᾳ del aparato. 'Pensamiento imaginativo' replica esa decisión léxica.
- source_word: ἔργῳ ... λόγῳ
  english_pob_choice: deed ... word
  chosen_spanish: obra ... palabra
  alternatives_spanish:
  - acción ... discurso
  lexicon: BDAG
  rationale: Pareja triádica clásica (obra/palabra/pensamiento). 'Obra' y 'palabra' son los términos consagrados en la tradición moral cristiana en español.
translation_notes:
  revision_awareness: El pase de revisión inglés sustituyó la lectura interpretativa 'in every way a person is lifted up' por 'every person comes together', alineándose más con πάντας γὰρ ἀνθρώπους ... συνέρχεται. La versión española sigue ese movimiento hacia un griego más literal, pero usa 'se manifiesta' como verbo natural que mantiene la idea de convergencia/aparición sin sonar forzado.
  spanish_consistency_notes:
  - διανοία sigue traduciéndose como 'pensamiento' o 'mente' según contexto; en 10:5 se usará 'mente' para la disposición interior.
  - Mantenemos la triáda 'obra–palabra–pensamiento' como serie léxica del capítulo.
