  text: How many times the Egyptian woman threatened me with death! How many times, after handing me over to punishments, she called me back, and threatened me; and when I was unwilling to come together with her, she said to me, “You shall have authority over me also, and over all who are in my house, if you give yourself to me, and you shall be as our master.”
  revision_pass:
