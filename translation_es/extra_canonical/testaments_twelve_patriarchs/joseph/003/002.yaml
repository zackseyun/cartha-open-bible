    timestamp: '2026-04-23T14:55:45Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: '¡Cuántas veces me amenazó la egipcia con la muerte! ¡Cuántas veces, después de entregarme a castigos, me llamó de nuevo y me amenazó; y, cuando yo no quería ir con ella, me dijo: «Tendrás autoridad también sobre mí y sobre todos los de mi casa, si te entregas a mí, y serás como nuestro señor»!'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἡ Αἰγυπτία
  english_pob_choice: the Egyptian woman
  chosen_spanish: la egipcia
  alternatives_spanish:
  - la mujer egipcia
  - la egipcia mujer
  lexicon: Αἰγυπτία
  rationale: El griego usa un sustantivo/adjetivo sustantivado para identificar a la mujer por su procedencia; en español, «la egipcia» conserva la concisión y la identificación narrativa sin añadir matices no presentes en el original.
- source_word: ἠπείλησέ μοι θάνατον
  english_pob_choice: threatened me with death
  chosen_spanish: me amenazó con la muerte
  alternatives_spanish:
  - me amenazó de muerte
  - me amenazó con morir
  lexicon: ἀπειλέω
  rationale: «Amenazó con la muerte» reproduce de forma natural la idea de amenaza dirigida a la muerte como objeto, manteniendo el sentido de amenaza explícita del griego.
- source_word: τιμωρίαις
  english_pob_choice: punishments
  chosen_spanish: castigos
  alternatives_spanish:
  - penas
  - suplicios
  lexicon: τιμωρία
  rationale: «Castigos» comunica bien la noción de penalidad/aflicción en un español claro y sobrio; «suplicios» sería más fuerte pero menos neutral.
- source_word: ἀνεκαλέσατο
  english_pob_choice: called me back
  chosen_spanish: me llamó de nuevo
  alternatives_spanish:
  - me hizo volver
  - me reclamó de nuevo
  lexicon: ἀνακαλέω
  rationale: La forma elegida refleja el retorno solicitado/ordenado sin sobreinterpretar el mecanismo; el contexto ya muestra que la llamada venía tras los castigos.
- source_word: μὴ θέλοντός μου συνελθεῖν αὐτῇ
  english_pob_choice: when I was unwilling to come together with her
  chosen_spanish: cuando yo no quería ir con ella
  alternatives_spanish:
  - cuando yo no quería unirme a ella
  - cuando yo no deseaba acostarme con ella
  lexicon: συνέρχομαι
  rationale: El griego y el contexto de la narración permiten entender una propuesta sexual, pero el giro español «ir con ella» conserva la ambigüedad controlada del POB inglés sin volverlo más explícito de lo que el texto exige.
- source_word: Κυριεύσεις κἀμοὶ καὶ πάντων τῶν ἐν τῷ οἴκῳ μου
  english_pob_choice: You shall have authority over me also, and over all who are in my house
  chosen_spanish: Tendrás autoridad también sobre mí y sobre todos los de mi casa
  alternatives_spanish:
  - Dominarás también sobre mí y sobre todos los de mi casa
  - Tendrás poder también sobre mí y sobre todos los de mi casa
  lexicon: κυριεύω
  rationale: «Tendrás autoridad» mantiene el valor de dominio/gobierno que el verbo sugiere, sin cargarlo innecesariamente con un sentido opresivo que no está explicitado por el contexto inmediato.
- source_word: ἐὰν ἐπιδῷς ἑαυτὸν εἰς ἐμέ
  english_pob_choice: if you give yourself to me
  chosen_spanish: si te entregas a mí
  alternatives_spanish:
  - si te das a mí
  - si te rindes a mí
  lexicon: ἐπιδίδωμι
  rationale: «Te entregas a mí» es idiomático y mantiene el matiz de autoentrega del griego, que en contexto tiene connotación sexual/relacional sin necesidad de explicitarla más.
- source_word: ἔσῃ ὡς δεσπότης ἡμῶν
  english_pob_choice: you shall be as our master
  chosen_spanish: serás como nuestro señor
  alternatives_spanish:
  - serás como nuestro amo
  - serás como nuestro dueño
  lexicon: δεσπότης
  rationale: «Señor» es una opción más natural y reverente en español que «amo» o «dueño»; aquí traduce el rango de autoridad esperado en la frase, sin introducir una fórmula eclesiástica ajena al relato.
theological_decisions:
- issue: Nivel de explicitud sexual en la frase «venir con ella / unirse a ella»
  english_pob_reading: when I was unwilling to come together with her
  chosen_spanish_reading: cuando yo no quería ir con ella
  alternative_spanish_readings:
  - cuando yo no quería unirme a ella
  - cuando yo no deseaba acostarme con ella
  rationale: Se preserva una formulación suficientemente abierta para el lector moderno, pero fiel a la reserva del POB inglés y al griego, que deja la escena implícita sin describirla en forma explícita.
  doctrine_reference: Criterio de sobriedad textual y decoro en narraciones con contenido sexual implícito, sin ocultar el sentido.
translation_notes:
  revision_awareness: Se corrigió el problema de validación eliminando notas al pie no ancladas en el texto. La redacción conserva el contenido del griego y la elección del POB inglés sin añadir marcas footnote sin soporte visible.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del texto porque este versículo no contiene el nombre divino.
  - Se usó «señor» para δεσπότης siguiendo el sentido de autoridad del contexto, no como traducción de κύριος en sentido teológico.
  - La puntuación usa comillas españolas y exclamaciones iniciales según norma tipográfica del español.
