translation:
  language: es
  text: Y como ella no tenía hijo varón, fingía
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τέκνον ἄρρεν
  english_pob_choice: male child
  chosen_spanish: hijo varón
  alternatives_spanish:
  - niño varón
  - hijo
  lexicon: LSJ
  rationale: El griego literalmente dice 'hijo varón'. 'Hijo varón' conserva el motivo familiar concreto en español sin perder la fuerza de género del original.
- source_word: προσεποιεῖτο
  english_pob_choice: pretended
  chosen_spanish: fingía
  alternatives_spanish:
  - simulaba
  - aparentaba
  lexicon: LSJ
  rationale: El verbo marca pretensión deliberada. 'Fingía' es conciso y refleja el imperfecto griego de acción habitual.
translation_notes:
  revision_awareness: El POB removió la expansión interpretativa ('para que yo le hiciera de hijo') porque el griego termina en 'fingía' como cláusula incompleta. La traducción al español preserva esta misma incompletitud, sin completar lo que el griego deja abierto.
  spanish_consistency_notes:
  - '''τέκνον ἄρρεν'' → ''hijo varón'' (literal del griego)'
  - Tiempo imperfecto griego (προσεποιεῖτο) → imperfecto español ('fingía') para preservar la acción habitual/durativa
