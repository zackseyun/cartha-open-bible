    changes_summary: Removed the repeated auxiliary 'I would' before 'give' for smoother formal English while preserving the Greek sense; otherwise retained the draft's accurate wording.
translation:
  language: es
  text: Y si mi señor estaba ausente, no bebía vino; y durante tres días tomaba mi alimento y lo daba a los pobres y a los enfermos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁ κύριός μου
  english_pob_choice: my master
  chosen_spanish: mi señor
  alternatives_spanish:
  - mi amo
  - mi dueño
  - mi maestro
  lexicon: κύριος
  rationale: En este contexto relacional, el inglés POB usa "master"; en español, "señor" comunica la autoridad personal sin volver excesivamente duro el tono. "Amo" sería más literal pero más áspero; "dueño" suena posesivo en exceso. No se usa "maestro" porque no corresponde al sentido aquí.
- source_word: οἶνον οὐκ ἔπινον
  english_pob_choice: I drank no wine
  chosen_spanish: no bebía vino
  alternatives_spanish:
  - no bebía vino alguno
  - no tomaba vino
  lexicon: οἶνος
  rationale: 'Se conserva el sentido simple y continuo del imperfecto: una abstención habitual en ese período. "No bebía vino" es natural y fiel; "no tomaba vino" es posible, pero "bebía vino" mantiene mejor el paralelo con la acción concreta del texto.'
- source_word: τριημερίζων
  english_pob_choice: for three days
  chosen_spanish: durante tres días
  alternatives_spanish:
  - por tres días
  - en tres días
  lexicon: τριημερίζω
  rationale: La forma griega expresa un lapso de tres días; "durante tres días" es la opción más clara en español y evita la posible lectura de plazo de culminación que tendría "en tres días".
- source_word: τροφήν
  english_pob_choice: my food
  chosen_spanish: mi alimento
  alternatives_spanish:
  - mi comida
  - mi sustento
  lexicon: τροφή
  rationale: '"Alimento" conserva un registro sobrio y amplio, más cercano al término griego que "comida". Se mantiene el posesivo porque el griego lo hace explícito.'
- source_word: τοῖς πένησιν καὶ τοῖς ἀσθενοῦσιν
  english_pob_choice: to the poor and the sick
  chosen_spanish: a los pobres y a los enfermos
  alternatives_spanish:
  - a los necesitados y a los enfermos
  - a los pobres y a los débiles
  lexicon: πένης; ἀσθενής
  rationale: '"Pobres" traduce bien πένησιν y mantiene el contraste social; "enfermos" refleja ἀσθενοῦσιν de manera directa. "Débiles" sería posible para ἀσθενοῦσιν en sentido más amplio, pero aquí el contexto favorece la condición física de enfermedad.'
theological_decisions:
- issue: Autodisciplina y caridad como rasgo moral del personaje
  english_pob_reading: And if my master was away, I drank no wine; and for three days I would take my food and give it to the poor and the sick.
  chosen_spanish_reading: Y si mi señor estaba ausente, no bebía vino; y durante tres días tomaba mi alimento y lo daba a los pobres y a los enfermos.
  alternative_spanish_readings:
  - Y si mi amo estaba ausente...
  - '...y se lo daba a los pobres y a los enfermos.'
  rationale: El pasaje describe una práctica ascética y de generosidad, no una doctrina técnica. La traducción conserva ese perfil moral sin añadir interpretaciones devocionales. Se evita intensificar el gesto con lenguaje que sugiera mérito teológico explícito no presente en el texto.
  doctrine_reference: Ética narrativa; caridad y autodominio en literatura testamentaria judía
- issue: Relación de subordinación expresada por κύριος
  english_pob_reading: my master
  chosen_spanish_reading: mi señor
  alternative_spanish_readings:
  - mi amo
  - mi dueño
  rationale: La decisión busca preservar la relación de autoridad sin cargar el texto con una dureza esclavista innecesaria en español. No hay evidencia suficiente en este versículo para imponer un matiz doctrinal adicional; por eso se mantiene una equivalencia funcional sobria.
  doctrine_reference: Semántica de κύριος en contexto doméstico/relacional
translation_notes:
  revision_awareness: La versión inglesa revisada eliminó una repetición innecesaria de 'I would' antes de 'give' para mayor fluidez; el español sigue esa misma economía sintáctica al usar una sola coordinación verbal natural ('tomaba... y lo daba').
  spanish_consistency_notes:
  - Se mantiene 'señor' para κύριος en este contexto relacional, consistente con un uso no litúrgico del término.
  - Se evita 'Cristo/Mesías' porque no aparece en el versículo.
  - Se usa 'alimento' en singular colectivo para corresponder a τὴν τροφήν sin sobreespecificar el tipo de comida.
  - La coordinación 'tomaba... y lo daba' conserva el aspecto iterativo del imperfecto griego sin añadir auxiliares innecesarios.
