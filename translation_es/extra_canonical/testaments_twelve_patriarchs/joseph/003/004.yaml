id: T12P.JOS.3.4
reference: Testament of Joseph 3:4
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 256-287, Joseph pilot)
  text: Καὶ ἐνήστευον ἐν τοῖς ἑπτὰ ἔτεσιν²¹ ἐκείνοις, καὶ ἐφαινόμην *τῷ Αἰγυπτίῳ²² ὡς ἐν τρυφῇ διάγων· ὅτι²³ οἱ νηστεύοντες *διὰ τὸν θεὸν²⁴ τοῦ προσώπου τὴν χάριν²⁵ λαμβάνουσιν²⁶.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/003/004.yaml
  text: And I fasted during those seven years, and I appeared to the Egyptian as one living in luxury; because those who fast for God receive favor in their appearance.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:16Z'
    unchanged: false
    changes_summary: Revised 'for God's sake' to the more literal 'for God' and replaced 'receive graciousness of face' with the more natural and accurate 'receive favor in their appearance,' reflecting τοῦ προσώπου τὴν χάριν.
translation:
  language: es
  text: 4. Ayuné durante aquellos siete años, y me parecía al egipcio como uno que vivía en lujo; porque los que ayunan por Dios reciben favor en su apariencia.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐνήστευον
  english_pob_choice: I fasted
  chosen_spanish: Ayuné
  alternatives_spanish:
  - Estuve ayunando
  - practiqué el ayuno
  lexicon: νηστεύω
  rationale: El imperfecto griego puede expresar acción continua o habitual; en español, el pretérito simple 'ayuné' comunica de manera natural la práctica durante ese período sin añadir perífrasis innecesaria.
- source_word: ἐφαινόμην τῷ Αἰγυπτίῳ
  english_pob_choice: I appeared to the Egyptian
  chosen_spanish: me parecía al egipcio
  alternatives_spanish:
  - aparecía al egipcio
  - me presentaba al egipcio
  lexicon: φαίνομαι
  rationale: '''Parecer'' capta la idea de cómo José era percibido por el egipcio. Se evita una formulación demasiado literal que sonaría forzada en español.'
- source_word: ἐν τρυφῇ διάγων
  english_pob_choice: one living in luxury
  chosen_spanish: como uno que vivía en lujo
  alternatives_spanish:
  - como quien vivía en deleites
  - como uno que vivía con lujo
  lexicon: τρυφή / διάγω
  rationale: '''Vivir en lujo'' reproduce bien la idea de una vida de comodidad y opulencia sin cargar el texto con un matiz moral que el griego aquí no exige de forma explícita.'
- source_word: διὰ τὸν θεόν
  english_pob_choice: for God
  chosen_spanish: por Dios
  alternatives_spanish:
  - a causa de Dios
  - por causa de Dios
  lexicon: θεός
  rationale: La preposición διά con acusativo expresa motivo o causa. 'Por Dios' es breve y fiel; mantiene el valor causal que la revisión inglesa dejó más literal.
- source_word: τοῦ προσώπου τὴν χάριν
  english_pob_choice: favor in their appearance
  chosen_spanish: favor en su apariencia
  alternatives_spanish:
  - gracia en su rostro
  - favor en su semblante
  lexicon: πρόσωπον / χάρις
  rationale: Se conserva la tensión entre 'rostro/apariencia' y 'favor/gracia'. 'Apariencia' refleja πρόσωπον en el sentido de apariencia visible, mientras 'favor' sigue la revisión inglesa y evita una expresión menos natural como 'graciosidad del rostro'.
theological_decisions:
- issue: Sentido de la recompensa divina asociada al ayuno
  english_pob_reading: those who fast for God receive favor in their appearance
  chosen_spanish_reading: los que ayunan por Dios reciben favor en su apariencia
  alternative_spanish_readings:
  - los que ayunan por Dios reciben gracia en su semblante
  - los que ayunan por Dios reciben favor visible
  rationale: El texto presenta una afirmación sobre el efecto visible del ayuno delante de otros, no una formulación doctrinal técnica. 'Favor en su apariencia' conserva la referencia al aspecto visible sin sobrerinterpretar la 'gracia' como un concepto distinto del contexto inmediato.
  doctrine_reference: Antiguo Testamento / ascetismo y señal visible de aprobación divina
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del audit trail inglés: se prefirió ''for God'' frente a una paráfrasis devocional y se mantuvo ''favor'' como equivalente de χάριν, junto con una expresión natural para τοῦ προσώπου.'
  spanish_consistency_notes:
  - Se usó 'Dios' conforme al estándar del proyecto para θεός.
  - Se evitó 'Cristo' y terminología eclesiástica no presente en el pasaje.
  - No se introdujeron notas al pie para no crear marcas sin anclaje en el texto.
