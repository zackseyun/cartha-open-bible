translation:
  language: es
  text: Pero yo recordaba las palabras de mi padre, y al entrar en mi aposento, llorando, oraba al Señor.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐμνημόνευον
  english_pob_choice: I remembered
  chosen_spanish: recordaba
  alternatives_spanish:
  - recordé
  - me acordaba
  lexicon: μνημονεύω
  rationale: El imperfecto griego expresa una acción habitual o en curso en el pasado; por eso 'recordaba' conserva mejor el aspecto que un pretérito puntual como 'recordé'.
- source_word: λόγους πατρός μου
  english_pob_choice: the words of my father
  chosen_spanish: las palabras de mi padre
  alternatives_spanish:
  - las palabras de mi padre
  - las palabras de mi padre
  lexicon: λόγος
  rationale: '''λόγους'' se traduce de forma directa como ''palabras'' aquí, sin necesidad de ampliar a ''enseñanzas'' porque el texto no lo exige.'
- source_word: εἰσερχόμενος εἰς τὸ ταμεῖον
  english_pob_choice: going into my chamber
  chosen_spanish: al entrar en mi aposento
  alternatives_spanish:
  - al entrar en mi cuarto
  - cuando entraba en mi aposento
  lexicon: ταμεῖον
  rationale: '''ταμεῖον'' denota un espacio privado o interior; ''aposento'' mantiene dignidad y precisión, y ''al entrar'' reproduce el participio circunstancial griego de manera natural en español.'
- source_word: κλαίων
  english_pob_choice: weeping
  chosen_spanish: llorando
  alternatives_spanish:
  - llorando
  - entre lágrimas
  lexicon: κλαίω
  rationale: El participio presente se vierte de forma adverbial con 'llorando', que es natural y conserva la simultaneidad con la acción principal.
- source_word: προσηυχόμην Κυρίῳ
  english_pob_choice: I prayed to the Lord
  chosen_spanish: oraba al Señor
  alternatives_spanish:
  - oraba al Señor
  - oré al Señor
  lexicon: προσεύχομαι
  rationale: El imperfecto sugiere una acción continua o reiterada; 'oraba' mantiene ese valor mejor que un perfecto simple. 'Señor' traduce Κυρίῳ como título reverencial en este contexto griego.
theological_decisions:
- issue: Título divino Κυρίῳ en un texto griego de tradición bíblica
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  - el Señor
  rationale: Aunque el proyecto prefiere 'Yahvé' para יהוה, aquí el texto fuente es griego y usa Κυρίῳ sin cita explícita del nombre hebreo; por fidelidad al testimonio griego y al audit trail inglés, se conserva 'Señor'.
  doctrine_reference: Uso reverencial del título divino en tradiciones bíblicas griegas; distinción entre nombre propio y título.
translation_notes:
  revision_awareness: La versión inglesa auditada ya fue aprobada sin cambios y presenta alta concordancia con el griego; esta propuesta sigue de cerca el sentido y el aspecto verbal del original, sin introducir expansión interpretativa.
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y bíblico, con léxico coherente en acciones pasadas imperfectivas ('recordaba', 'oraba').
  - '''Aposento'' preserva el matiz de espacio interior/privado sin caer en un calco rígido.'
  - No se introduce una nota sobre 'Yahvé' porque el griego aquí usa Κυρίῳ y la versión inglesa auditada ya optó por 'the Lord'.
