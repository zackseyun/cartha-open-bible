base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/003/001.yaml
  text: In a short time she would withdraw, to test the resolve of my soul. In ten temptations she proved me approved, and in them all I was patient; for patience is a great remedy.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:45Z'
    unchanged: false
    changes_summary: Changed 'purpose' to 'resolve' for a more natural and accurate rendering of τὸ διαβούλιον in context; otherwise retained the draft.
translation:
  language: es
  text: En diez tentaciones me probó como aprobado, y en todas ellas fui paciente; porque la paciencia es un gran remedio[a], y muchos bienes da la perseverancia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''la paciencia es una gran medicina''.'
    reason: lexical_alternative
  - marker: b
    text: 'O: ''y la perseverancia produce muchos bienes''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐν δέκα πειρασμοῖς
  english_pob_choice: In ten temptations
  chosen_spanish: En diez tentaciones
  alternatives_spanish:
  - En diez pruebas
  - En diez pruebas tentadoras
  lexicon: πειρασμός
  rationale: ‘Tentaciones’ conserva la idea de pruebas que ponen a prueba la fidelidad moral, y sigue de cerca el valor del griego y del inglés POB.
- source_word: δόκιμον ἀπέδειξέ με
  english_pob_choice: she proved me approved
  chosen_spanish: me probó como aprobado
  alternatives_spanish:
  - me demostró aprobado
  - me hizo ver como aprobado
  lexicon: δόκιμος / ἀποδείκνυμι
  rationale: La frase comunica ser puesto a prueba y resultar aprobado; ‘como aprobado’ mantiene la relación evaluativa sin sonar artificial en español.
- source_word: ἐμακροθύμησα
  english_pob_choice: I was patient
  chosen_spanish: fui paciente
  alternatives_spanish:
  - tuve paciencia
  - perseveré con paciencia
  lexicon: μακροθυμέω
  rationale: ‘Fui paciente’ es natural y refleja la paciencia perseverante del verbo griego, siguiendo la opción del inglés POB.
- source_word: ἡ μακροθυμία
  english_pob_choice: patience
  chosen_spanish: la paciencia
  alternatives_spanish:
  - la longanimidad
  - la perseverancia paciente
  lexicon: μακροθυμία
  rationale: ‘Paciencia’ es la equivalencia más clara y readable en español para μακροθυμία en este contexto, sin perder la idea de constancia.
- source_word: μέγα φάρμακόν ἐστιν
  english_pob_choice: is a great remedy
  chosen_spanish: es un gran remedio
  alternatives_spanish:
  - es una gran medicina
  - es un gran recurso
  lexicon: φάρμακον
  rationale: ‘Remedio’ transmite la metáfora de algo curativo o sanador, y reproduce bien el sentido del inglés POB.
- source_word: πολλὰ ἀγαθὰ δίδωσιν ἡ ὑπομονή
  english_pob_choice: patience ... gives many good things
  chosen_spanish: y mucha bondad da la perseverancia
  alternatives_spanish:
  - y muchas cosas buenas da la perseverancia
  - y la perseverancia produce muchos bienes
  lexicon: ὑπομονή
  rationale: ὑπομονή expresa perseverancia/constancia bajo presión; ‘perseverancia’ evita confundirlo con mera paciencia pasiva y permite conservar la afirmación final del griego.
theological_decisions:
- issue: Relación entre ‘paciencia’ y ‘perseverancia’ para μακροθυμία / ὑπομονή
  english_pob_reading: The English keeps ‘patience’ for the first term and implies enduring patience throughout.
  chosen_spanish_reading: La primera cláusula usa ‘paciencia’ y la última ‘perseverancia’ para distinguir matices de dos términos griegos emparentados pero no idénticos.
  alternative_spanish_readings:
  - usar ‘paciencia’ en ambos casos
  - usar ‘longanimidad’ y ‘perseverancia’
  rationale: El griego distingue μακροθυμία y ὑπομονή; en español conviene reflejar esa diferencia sin volver opaco el verso. ‘Paciencia’ y ‘perseverancia’ preservan la tensión semántica.
  doctrine_reference: Virtud cristiana de la paciencia perseverante; cf. uso bíblico de μακροθυμία y ὑπομονή.
- issue: ‘Tentaciones’ como pruebas reales y no solo seducciones internas
  english_pob_reading: In ten temptations
  chosen_spanish_reading: ‘Tentaciones’ se mantiene para no debilitar el alcance moral del término, aunque en el contexto puede incluir pruebas.
  alternative_spanish_readings:
  - pruebas
  - aflicciones
  rationale: El contexto biográfico y moral del texto exige no reducir πειρασμοῖς a mera ‘pruebas’ técnicas. ‘Tentaciones’ conserva la ambigüedad bíblica útil entre prueba y seducción.
  doctrine_reference: Perseverancia del justo bajo prueba; lenguaje bíblico de tentación/prueba.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que corrigió ‘purpose’ por ‘resolve’ para τὸ διαβούλιον; aunque ese elemento no aparece explícitamente en el griego de este versículo, la línea en español evita introducir ‘propósito’ y mantiene el foco en la prueba y la paciencia, acorde con el texto griego recibido y el audit trail inglés.
  spanish_consistency_notes:
  - Se mantuvo la distinción entre ‘paciencia’ (μακροθυμία) y ‘perseverancia’ (ὑπομονή) para respetar la diferencia léxica del griego.
  - Se evitó ‘SEÑOR’ u այլ terminología de sustitución porque este versículo no contiene el nombre divino.
  - La puntuación separa las dos afirmaciones finales para reflejar las dos cláusulas griegas coordinadas.
