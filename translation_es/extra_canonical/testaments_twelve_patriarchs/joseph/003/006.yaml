  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/003/006.yaml
  text: And I would rise early to the Lord and weep concerning Memphis the Egyptian woman, because she troubled me greatly without ceasing; for even at night she would come in to me under a pretext of visiting.
