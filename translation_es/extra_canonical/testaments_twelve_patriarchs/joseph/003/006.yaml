translation:
  language: es
  text: Y yo madrugaba a Yahvé y lloraba por Menfis, la egipcia, porque me molestaba muchísimo, sin cesar; pues aun de noche venía a mí con pretexto de visita.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πρὸς Κύριον
  english_pob_choice: to the Lord
  chosen_spanish: al Yahvé
  alternatives_spanish:
  - al Señor
  lexicon: YHWH
  rationale: La expresión griega con Κύριον apunta al nombre divino en este contexto devocional; la política POB para el tetragrámaton es rendirlo como «Yahvé» en el texto principal. «Al Señor» se evita como máscara porque aquí no hay razón fuente-based para ocultar el nombre.
- source_word: Ὤρθριζον
  english_pob_choice: I would rise early
  chosen_spanish: madrugaba
  alternatives_spanish:
  - me levantaba temprano
  - me alzaba de madrugada
  lexicon: ἀνίστημι / ὀρθρίζω
  rationale: El imperfecto expresa hábito; «madrugaba» conserva la acción temprana y la iteración sin sonar excesivamente literal. Otras opciones son posibles, pero esta es natural en español y fiel al valor habitual.
- source_word: Μεμφίας τῆς Αἰγυπτίας
  english_pob_choice: Memphis the Egyptian woman
  chosen_spanish: Menfis, la egipcia
  alternatives_spanish:
  - Memfis, la egipcia
  - Memfis, la mujer egipcia
  lexicon: topónimo + gentilicio
  rationale: Se conserva el nombre propio como topónimo y el gentilicio femenino en aposición. «La egipcia» reproduce la breve identificación del griego y del inglés POB sin añadir explicación interpretativa.
- source_word: σφόδρα ἀδιαλείπτως ἠνόχλει
  english_pob_choice: she troubled me greatly without ceasing
  chosen_spanish: me molestaba muchísimo, sin cesar
  alternatives_spanish:
  - me afligía mucho, sin cesar
  - me acosaba gravemente, sin cesar
  lexicon: ἐνοχλέω / σφόδρα / ἀδιαλείπτως
  rationale: «Molestaba» refleja el verbo de importunar, hostigar o perturbar; «muchísimo» y «sin cesar» mantienen el doble énfasis intensivo y continuo del griego. Se evita una paráfrasis más fuerte que exceda el tenor del pasaje.
- source_word: ἐν νυκτὶ εἰσήιει πρός με
  english_pob_choice: even at night she would come in to me
  chosen_spanish: aun de noche venía a mí
  alternatives_spanish:
  - incluso de noche entraba donde mí
  - aun de noche se me acercaba
  lexicon: εἰσίειμι + πρός με
  rationale: «Venía a mí» preserva el movimiento hacia la persona sin forzar una formulación más explícita que el contexto no exige. El imperfecto español mantiene la habitualidad; se omite una expansión innecesaria de «entraba» porque el griego se centra en el acercamiento con πρός με.
- source_word: λόγῳ ἐπισκέψεως
  english_pob_choice: under a pretext of visiting
  chosen_spanish: con pretexto de visita
  alternatives_spanish:
  - con la excusa de una visita
  - bajo pretexto de visitar
  lexicon: λόγος + ἐπίσκεψις
  rationale: «Con pretexto de visita» reproduce la idea de excusa o apariencia sin añadir un sujeto o una frase verbal ajenos al griego. «Visita» traduce de manera sobria ἐπισκέψεως en este contexto narrativo.
theological_decisions:
- issue: Referencia al nombre divino en contexto devocional con Κύριον
  english_pob_reading: to the Lord
  chosen_spanish_reading: al Yahvé
  alternative_spanish_readings:
  - al Señor
  rationale: Aunque el griego usa Κύριον, el contexto y la política del proyecto favorecen recuperar el nombre divino cuando la referencia es al Dios de Israel. En español, «Yahvé» hace visible esa decisión teológica y textual sin perder inteligibilidad.
  doctrine_reference: Tetragrámaton / nombre divino
- issue: Intensidad del acoso de la mujer egipcia
  english_pob_reading: she troubled me greatly without ceasing
  chosen_spanish_reading: me molestaba muchísimo, sin cesar
  alternative_spanish_readings:
  - me acosaba gravemente, sin cesar
  - me perturbaba mucho, sin cesar
  rationale: El texto relata hostigamiento persistente; «molestaba muchísimo» transmite la fuerza del griego sin sobrerrepresentar una violencia no explícita en esta línea. Se conserva la persistencia con «sin cesar».
  doctrine_reference: Ninguna doctrina específica; fidelidad narrativa
translation_notes:
  revision_awareness: 'La revisión más reciente indica que no hubo cambios: el texto base inglés se mantuvo sin modificación. Por ello, la versión española sigue de cerca el griego y el auditor inglés, sin introducir alternativas textuales adicionales.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» según la terminología POB para el nombre divino.
  - Se conserva el imperfecto narrativo en español para reflejar hábito/reiteración.
  - Se evita «Cristo/Mesías» porque no aparece en este versículo.
  - «Menfis» se usa como forma española estándar del topónimo, con gentilicio femenino explícito.
