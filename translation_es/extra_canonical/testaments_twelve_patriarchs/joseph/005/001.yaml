  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 256-287, Joseph pilot)
  text: '*Καὶ πάλιν¹ ἐν² *ἑτέρῳ χρόνῳ³ λέγει μοι· Εἰ μοιχεῦσαι οὐ θέλεις, ἐγὼ ἀνελῶ⁴ τὸν *ἄνδρα μου φαρμάκῳ καὶ⁵ λήψομαί σε εἰς⁶ ἄνδρα.'
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/005/001.yaml
  text: And again, at another time, she said to me, “If you do not want to commit adultery, I will kill my husband with poison and take you as a husband.”
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:18Z'
    unchanged: false
    changes_summary: Changed 'take you as my husband' to 'take you as a husband' to reflect the Greek more literally without adding the possessive not present in the source.
translation:
  language: es
  text: 'Y otra vez, en otro tiempo, me dijo: «Si no quieres cometer adulterio, mataré a mi marido con veneno y te tomaré por esposo».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἑτέρῳ χρόνῳ
  english_pob_choice: at another time
  chosen_spanish: en otro tiempo
  alternatives_spanish:
  - en otra ocasión
  - en otro momento
  lexicon: ἕτερος, χρόνος
  rationale: La secuencia griega indica un tiempo distinto o posterior; “en otro tiempo” conserva la referencia temporal amplia sin forzar una puntualidad que el griego no exige.
- source_word: μοιχεῦσαι
  english_pob_choice: commit adultery
  chosen_spanish: cometer adulterio
  alternatives_spanish:
  - adulterar
  - ser infiel
  lexicon: μοιχεύω
  rationale: El verbo griego tiene el sentido moral-jurídico de adulterio; “cometer adulterio” es la forma más clara y fiel en español.
- source_word: ἀνελῶ ... φαρμάκῳ
  english_pob_choice: I will kill my husband with poison
  chosen_spanish: mataré a mi marido con veneno
  alternatives_spanish:
  - daré muerte a mi marido con veneno
  - mataré a mi esposo con veneno
  lexicon: ἀναιρέω, φάρμακον
  rationale: El griego expresa matar “con veneno”; “con veneno” mantiene el medio explícito. “Marido” traduce el vínculo conyugal del contexto y evita suavizar el acto.
- source_word: λήψομαί σε εἰς ἄνδρα
  english_pob_choice: take you as a husband
  chosen_spanish: te tomaré por esposo
  alternatives_spanish:
  - te tomaré como esposo
  - te tomaré por marido
  lexicon: λαμβάνω εἰς ἄνδρα
  rationale: La construcción no añade posesivo en griego; “te tomaré por esposo” sigue de cerca la relación resultante sin introducir “mi” ni una paráfrasis más libre.
theological_decisions:
- issue: Representación de la inmoralidad sexual
  english_pob_reading: commit adultery
  chosen_spanish_reading: cometer adulterio
  alternative_spanish_readings:
  - ser infiel
  - adulterar
  rationale: El texto mantiene la acusación en términos de adulterio, no de un sentido más general de infidelidad; eso preserva la fuerza moral del pasaje.
  doctrine_reference: Decálogo / lenguaje bíblico sobre adulterio
- issue: Expresión de la amenaza homicida
  english_pob_reading: I will kill my husband with poison
  chosen_spanish_reading: mataré a mi marido con veneno
  alternative_spanish_readings:
  - lo envenenaré
  - daré muerte a mi marido con veneno
  rationale: La fuente especifica el medio (“con veneno”); el español conserva tanto el acto como el instrumento, sin suavizar la intención violenta.
  doctrine_reference: Ética bíblica sobre homicidio
translation_notes:
  revision_awareness: La versión inglesa revisada corrigió “take you as my husband” a “take you as a husband” para no añadir posesivo inexistente en el griego. La traducción española refleja esa misma decisión con “te tomaré por esposo”, sin posesivo añadido.
  spanish_consistency_notes:
  - Se mantiene un español claro y digno, con sintaxis directa acorde al relato.
  - No se introduce “Cristo”, “Señor” ni terminología doctrinal ajena al versículo.
  - “Marido” se usa por coherencia con el contexto conyugal inmediato y la mención explícita de su esposo en el griego.
