reference: Testament of Joseph 5:2
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 256-287, Joseph pilot)
  text: Ἐγὼ οὖν, ὡς ἤκουσα τοῦτο, διέρρηξα *τὰ ἱμάτιά⁷ μου, καὶ εἶπον ⌜αὐτῇ⌝⁸· Γύναι, αἰδέσθητι τὸν Θεόν⁹, καὶ¹⁰ μὴ ποιήσῃς τὴν *πρᾶξιν ταύτην τὴν πονηράν¹¹, ἵνα μὴ¹² ἐξολοθρευθῇς· *ἐπεὶ καίγε γίνωσκε ὅτι ἐγὼ¹³ ἐξαγγελῶ¹⁴ *πᾶσιν τὴν ἐπίνοιάν σου ταύτην¹⁵.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/005/002.yaml
  text: 'So when I heard this, I tore my garments and said to her, “Woman, have reverence for God, and do not do this evil deed, lest you be destroyed. For know this also: I will tell everyone of this scheme of yours.”'
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:19Z'
    unchanged: false
    changes_summary: Changed 'be ashamed before God' to 'fear God' for αἰδέσθητι τὸν Θεόν; added 'this' before 'scheme of yours' to reflect ταύτην and rendered σου explicitly as 'of yours.'
translation:
  language: es
  text: 'Así que, cuando oí esto, rasgué mis vestidos y le dije: «Mujer, teme a Dios, y no hagas esta mala obra, para que no seas destruida. Porque además, sabe esto: declararé a todos este plan tuyo».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: διέρρηξα τὰ ἱμάτιά μου
  english_pob_choice: I tore my garments
  chosen_spanish: rasgué mis vestidos
  alternatives_spanish:
  - rasgué mi ropa
  - rompí mis vestidos
  lexicon: διέρρηξα; ἱμάτια
  rationale: «Rasgué mis vestidos» conserva la imagen idiomática de duelo/indignación y suena natural en español bíblico sin perder el sentido literal de la acción.
- source_word: αἰδέσθητι τὸν Θεόν
  english_pob_choice: have reverence for God / fear God
  chosen_spanish: teme a Dios
  alternatives_spanish:
  - tén reverencia por Dios
  - venera a Dios
  lexicon: αἰδέσθητι; θεός
  rationale: La revisión inglesa corrigió la frase hacia «fear God». En español, «teme a Dios» reproduce esa fuerza exhortativa y la reverencia implícita sin añadir una paráfrasis ajena al griego.
- source_word: μὴ ποιήσῃς τὴν πρᾶξιν ταύτην τὴν πονηράν
  english_pob_choice: do not do this evil deed
  chosen_spanish: no hagas esta mala obra
  alternatives_spanish:
  - no cometas esta mala acción
  - no hagas este acto malo
  lexicon: ποιήσῃς; πρᾶξιν; πονηράν
  rationale: «Mala obra» mantiene el valor de acto/obra y evita una abstracción excesiva; «esta» refleja ταύτην y conserva la deixis del original.
- source_word: ἵνα μὴ ἐξολοθρευθῇς
  english_pob_choice: lest you be destroyed
  chosen_spanish: para que no seas destruida
  alternatives_spanish:
  - no sea que perezcas
  - para que no perezcas
  lexicon: ἐξολοθρευθῇς
  rationale: Se conserva la idea de destrucción/ruina que el verbo griego expresa, con un giro natural en español. El femenino concuerda con la interlocutora implícita del pasaje.
- source_word: ἐξαγγελῶ πᾶσιν τὴν ἐπίνοιάν σου ταύτην
  english_pob_choice: I will tell everyone of this scheme of yours
  chosen_spanish: declararé a todos este plan tuyo
  alternatives_spanish:
  - diré a todos este proyecto tuyo
  - anunciaré a todos esta trama tuya
  lexicon: ἐξαγγελῶ; ἐπίνοια; ταύτην; σου
  rationale: «Declararé» conserva el valor de hacer público/manifestar; «plan» traduce ἐπίνοια en un registro comprensible, y «este... tuyo» refleja la deixis y el posesivo explícitos del griego.
theological_decisions:
- issue: 'αἰδέσθητι τὸν Θεόν: vergüenza/reverencia/temor de Dios'
  english_pob_reading: fear God
  chosen_spanish_reading: teme a Dios
  alternative_spanish_readings:
  - ten reverencia por Dios
  - sé reverente ante Dios
  rationale: La revisión inglesa descartó «be ashamed before God» y fijó la exhortación como temor reverente. «Teme a Dios» preserva esa lectura sin suavizar la advertencia moral.
  doctrine_reference: Proverbios 1:7; Eclesiastés 12:13
- issue: 'ἐξολοθρευθῇς: destrucción como consecuencia moral'
  english_pob_reading: lest you be destroyed
  chosen_spanish_reading: para que no seas destruida
  alternative_spanish_readings:
  - no sea que perezcas
  - para que no perezcas
  rationale: El griego expresa una amenaza de ruina o destrucción, no una simple incomodidad. La traducción conserva esa seriedad sin introducir una doctrina adicional.
  doctrine_reference: Deuteronomio 8:19; Romanos 6:23
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del audit trail: αἰδέσθητι τὸν Θεόν se entendió como «fear God» y se explicitó ταύτην/sou en «este plan tuyo». No se conservaron notas al pie porque el texto español puede reflejar directamente esas decisiones sin requerir variantes textuales.'
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico claro y moderno, evitando calcos innecesarios.
  - Se usó «Dios» en lugar de «SEÑOR» porque el griego aquí tiene θεόν y no un sustituto del nombre divino.
  - Se preservó la deixis del griego con «esta» y «este... tuyo».
  - El femenino de los verbos y adjetivos concuerda con la interlocutora a quien se dirige José.
