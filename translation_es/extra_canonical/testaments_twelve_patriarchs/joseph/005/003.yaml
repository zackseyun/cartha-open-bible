translation:
  language: es
  text: Entonces ella, temiendo, me rogó que no diera a conocer este plan.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Φοβηθεῖσα
  english_pob_choice: being afraid
  chosen_spanish: temiendo
  alternatives_spanish:
  - teniendo miedo
  - aterrorizada
  lexicon: φοβέομαι
  rationale: El participio aoristo femenino singular expresa un estado/resultante de temor antes de la petición. «Temiendo» mantiene la relación temporal y causal sin volverlo más fuerte de lo que exige el griego.
- source_word: ἠξίου με
  english_pob_choice: begged me
  chosen_spanish: me rogó
  alternatives_spanish:
  - me pidió con insistencia
  - me suplicó
  lexicon: ἀξιόω
  rationale: En este contexto el verbo no significa «considerar digno» sino «pedir/exigir con insistencia». «Me rogó» conserva el tono de súplica de la traducción inglesa y fluye naturalmente en español.
- source_word: μὴ ἐξαγγελῶ
  english_pob_choice: not to report
  chosen_spanish: que no diera a conocer
  alternatives_spanish:
  - que no informara
  - que no divulgara
  lexicon: ἐξαγγέλλω
  rationale: El verbo griego apunta a sacar fuera, declarar o divulgar. «Dar a conocer» recoge la idea de comunicar públicamente sin cargar el texto con un matiz técnico innecesario.
- source_word: ἐπίνοιαν ταύτην
  english_pob_choice: this scheme
  chosen_spanish: este plan
  alternatives_spanish:
  - este designio
  - esta idea
  lexicon: ἐπίνοια
  rationale: La palabra puede abarcar pensamiento, intención o plan. «Plan» es la opción más natural en español y preserva el sentido de una intención concreta que no debía ser revelada.
theological_decisions:
- issue: 'Naturaleza de la acción solicitada: ocultar una intención'
  english_pob_reading: not to report this scheme
  chosen_spanish_reading: que no diera a conocer este plan
  alternative_spanish_readings:
  - que no divulgara este plan
  - que no revelara este plan
  rationale: No hay carga doctrinal explícita; el punto narrativo es la petición de no exponer una intención. «Dar a conocer» mantiene la neutralidad semántica del griego sin introducir una connotación moral más fuerte.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; por ello se conserva el sentido del texto griego y la equivalencia óptima de la versión inglesa sin introducir ajustes textuales adicionales.
  spanish_consistency_notes:
  - Se mantiene un español moderno y sobrio, adecuado para publicación.
  - No se añaden notas al pie porque el griego y la línea inglesa no exigen una variante significativa en esta cláusula.
  - La estructura causal-temporal del participio inicial se refleja con «Entonces ella, temiendo» para evitar una construcción demasiado literal en español.
