translation:
  language: es
  text: Y ella se fue, seduciéndome[a] con regalos y toda clase de placeres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'mimándome' / 'halagándome con regalos y todo tipo de deleites'.
