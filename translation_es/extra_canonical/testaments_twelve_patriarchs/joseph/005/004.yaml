lexical_decisions:
- source_word: ἀνεχώρησεν
  english_pob_choice: she went away
  chosen_spanish: ella se fue
  alternatives_spanish:
  - se retiró
  - se apartó
  lexicon: BDAG
  rationale: Verbo simple de partida; 'se fue' mantiene la naturalidad narrativa en español neutro.
- source_word: ἐπιθάλπουσά με
  english_pob_choice: enticing me
  chosen_spanish: seduciéndome
  alternatives_spanish:
  - halagándome
  - tratando de ganarme
  lexicon: LSJ
  rationale: El participio sugiere un acariciar/calentar manipulador; 'seduciéndome' captura la intención persuasiva y manipuladora en español idiomático.
- source_word: δώροις καὶ ἀπολαύσεσι πάσαις
  english_pob_choice: gifts and every kind of pleasure
  chosen_spanish: regalos y toda clase de placeres
  alternatives_spanish:
  - dones y toda clase de deleites
  - regalos y todo tipo de goces
  lexicon: LSJ
  rationale: Mantiene la pareja de medios (regalos + placeres) que la POB inglesa preserva.
translation_notes:
  revision_awareness: La revisión de POB cambió 'trying to win me over' a 'enticing me' para reflejar más directamente el sentido griego sin paráfrasis. El español usa 'seduciéndome' que captura esa intención manipuladora directa.
  spanish_consistency_notes:
  - Mantengo 'placeres' por ἀπολαύσεσι para preservar la connotación sensorial y de disfrute.
  - Uso 'toda clase de' para πάσαις, evitando el más rígido 'todos los'.
