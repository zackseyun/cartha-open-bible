base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/017.yaml
  text: 1[a]. See then, my children, how much I endured so that I might not put my brothers to shame. 2. You also, therefore, love one another, and with patience conceal one another’s shortcomings. 3. For God delights in the harmony of brothers and in the purpose of a good heart that intends what is good. 4[b]. And when my brothers came to Egypt, they themselves know that I returned their money to them, and did not reproach them, but encouraged them. 5. And after the death of Jacob my father, I loved them even more, and whatever they wanted I did for them beyond measure. 6. And I did not allow them to be distressed even in the smallest matter; rather, everything that was in my hand I gave to them. 7. And their sons were my sons, and my sons were as slaves to them, and their soul was my soul, and every pain of theirs was my pain, and every weakness of theirs was my sickness, and their purpose was my purpose. 8. And I did not exalt myself among them in arrogance because of my worldly glory[c],
    but I was among them as one of the least.
  footnotes:
  - marker: a
    text: Or 'cover one another’s failings.' The Greek verb suggests not exposing a brother’s faults harshly.
    reason: lexical_alternative
  - marker: b
    text: The clause about the 'purpose of a good heart' is textually difficult in the Greek witness; the translation follows the apparent ethical sense of a heart disposed toward the good.
    reason: textual_variant
  - marker: c
    text: '''Slaves'' translates Greek douloi. The wording is intentionally strong, expressing Joseph’s humility and the subordination of his own household to his brothers.'
    reason: lexical_alternative
