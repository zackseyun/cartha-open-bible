translation:
  language: es
  text: 1[a]. Vean, pues, mis hijos, cuánto soporté para no avergonzar a mis hermanos. 2. Y ustedes también, por tanto, ámense unos a otros, y con paciencia encubran las faltas de los demás. 3. Porque Dios se deleita en la armonía de los hermanos y en la intención de un corazón bueno[b], que busca lo bueno[c]. 4. Y cuando mis hermanos llegaron a Egipto, ellos mismos saben que les devolví su dinero, y no los reproché, sino que los animé. 5. Y después de la muerte de Jacob, mi padre, los amé todavía más, y todo lo que querían lo hice por ellos más allá de toda medida. 6. Y no permití que se afligieran ni siquiera por la menor cosa; en efecto, todo lo que estaba en mi mano se lo di. 7. Y sus hijos eran mis hijos, y mis hijos eran como esclavos para ellos, y su alma era mi alma, y todo dolor de ellos era mi dolor, y toda debilidad de ellos era mi debilidad, y su propósito era mi propósito. 8. Y no me engrandecí entre ellos con arrogancia, por causa de mi gloria mundana[d], sino que estaba entre
    ellos como uno de los más pequeños.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «encubran las faltas de los demás». El verbo griego sugiere no exponer duramente las faltas de un hermano.
    reason: lexical_alternative
  - marker: b
    text: La cláusula correspondiente a «la intención de un corazón bueno» es textualmente difícil en el testimonio griego; la traducción sigue el sentido ético aparente de un corazón dispuesto hacia lo bueno.
    reason: textual_variant
  - marker: c
    text: O «busca lo bueno». El griego es algo áspero aquí, y la traducción procura conservar el sentido ético sin sobreinterpretarlo.
    reason: lexical_alternative
  - marker: d
    text: «Mundana» traduce el matiz de κοσμική. Se mantiene el contraste entre el esplendor de José en Egipto y su decisión de no exaltarse sobre sus hermanos.
    reason: lexical_alternative
lexical_decisions:
- source_word: αἰσχύνω
  english_pob_choice: put ... to shame
  chosen_spanish: avergonzar
  alternatives_spanish:
  - deshonrar
  - poner en vergüenza
  lexicon: BDAG
  rationale: En este contexto relacional, «avergonzar» comunica la acción de causar vergüenza pública o moral, y reproduce bien el valor del verbo sin sonar demasiado técnico.
- source_word: μακροθυμία
  english_pob_choice: patience
  chosen_spanish: paciencia
  alternatives_spanish:
  - longanimidad
  - longanimidad paciente
  lexicon: BDAG
  rationale: La exhortación es ética y pastoral; «paciencia» es la forma natural en español y conserva la idea de perseverar con otros sin irritación.
- source_word: συγκρύπτετε
  english_pob_choice: conceal
  chosen_spanish: encubran
  alternatives_spanish:
  - cubran
  - oculten
  lexicon: LSJ
  rationale: «Encubran» refleja la idea de cubrir para no exponer las faltas ajenas, y en español mantiene mejor el matiz de trato fraternal que «oculten».
- source_word: ἐλαττώματα
  english_pob_choice: shortcomings
  chosen_spanish: faltas
  alternatives_spanish:
  - defectos
  - fallas
  lexicon: LSJ
  rationale: «Faltas» es natural en contexto moral y evita tanto la dureza de «defectos» como la ambigüedad de «fallas».
- source_word: ὁμονοία
  english_pob_choice: harmony
  chosen_spanish: armonía
  alternatives_spanish:
  - unidad
  - concordia
  lexicon: BDAG
  rationale: «Armonía» conserva la imagen relacional y fraterna del texto, y suena más fluido que una formulación más abstracta como «unidad».
- source_word: προαίρεσις καρδίας
  english_pob_choice: purpose of a good heart
  chosen_spanish: intención de un corazón bueno
  alternatives_spanish:
  - resolución de un corazón bueno
  - decisión de un corazón bueno
  lexicon: BDAG
  rationale: La frase apunta a la orientación interna de la voluntad; «intención» mantiene esa fuerza moral y evita sobrerreconstruir el sintagma griego.
- source_word: εὐδοκοῦσιν εἰς ἀγαθόν
  english_pob_choice: intends what is good
  chosen_spanish: busca lo bueno
  alternatives_spanish:
  - se inclina hacia lo bueno
  - tiene buena disposición hacia lo bueno
  lexicon: LSJ
  rationale: El griego es algo áspero; «busca lo bueno» transmite la orientación ética sin forzar una reconstrucción más específica que la evidencia no exige.
- source_word: ὠνείδισα
  english_pob_choice: reproach
  chosen_spanish: reproché
  alternatives_spanish:
  - insulté
  - lochesé
  lexicon: BDAG
  rationale: «Reproché» conserva el registro elevado del testamento y expresa que José no los humilló verbalmente.
- source_word: παρεκάλεσα
  english_pob_choice: encouraged
  chosen_spanish: animé
  alternatives_spanish:
  - consolé
  - exhorté
  lexicon: BDAG
  rationale: En una escena de reconciliación, «animé» comunica bien el apoyo verbal y el alivio ofrecido a los hermanos.
- source_word: ὑπερεκπερισσοῦ
  english_pob_choice: beyond measure
  chosen_spanish: más allá de toda medida
  alternatives_spanish:
  - sobremanera
  - en extremo
  lexicon: BDAG
  rationale: La expresión intensiva pide una fórmula idiomática que preserve la sobreabundancia; «más allá de toda medida» es clara y solemne.
- source_word: θλιβῆναι
  english_pob_choice: be distressed
  chosen_spanish: se afligieran
  alternatives_spanish:
  - se angustiaban
  - fueran atribulados
  lexicon: BDAG
  rationale: «Afligieran» funciona bien para una carga o dificultad concreta y mantiene el tono amplio del verbo pasivo.
- source_word: ἕως μικροῦ πράγματος
  english_pob_choice: even in the smallest matter
  chosen_spanish: ni siquiera por la menor cosa
  alternatives_spanish:
  - aun en la cosa más pequeña
  - hasta el menor asunto
  lexicon: LSJ
  rationale: La forma elegida conserva el énfasis totalizador y suena natural en español, sin perder la referencia a asuntos mínimos.
- source_word: δοῦλοι
  english_pob_choice: slaves
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  - criados
  lexicon: BDAG
  rationale: Se mantiene «esclavos» porque el texto quiere marcar subordinación real y fuerte; «siervos» suavizaría indebidamente el contraste.
- source_word: ἄλγημα
  english_pob_choice: pain
  chosen_spanish: dolor
  alternatives_spanish:
  - pena
  - sufrimiento
  lexicon: LSJ
  rationale: «Dolor» reproduce el paralelismo y la identificación emocional del hablante con el sufrimiento ajeno.
- source_word: μαλακία
  english_pob_choice: weakness
  chosen_spanish: debilidad
  alternatives_spanish:
  - fragilidad
  - enfermedad
  lexicon: BDAG
  rationale: Aquí se trata de flaqueza o debilidad, y «debilidad» encaja bien con el paralelismo del versículo.
- source_word: ἀσθένεια
  english_pob_choice: sickness
  chosen_spanish: debilidad / enfermedad
  alternatives_spanish:
  - enfermedad
  - flaqueza
  lexicon: BDAG
  rationale: En el texto español, el campo semántico puede expresarse como «debilidad» o «enfermedad»; se prefirió una sola cadena de identificación más natural, dejando la distinción léxica en nota si fuera necesario.
- source_word: βουλή
  english_pob_choice: purpose
  chosen_spanish: propósito
  alternatives_spanish:
  - plan
  - consejo
  - resolución
  lexicon: BDAG
  rationale: «Propósito» capta bien la repetición enfática del verso y resulta más idiomático que «consejo» en este contexto de identificación personal.
- source_word: ἀλαζονεία
  english_pob_choice: arrogance
  chosen_spanish: arrogancia
  alternatives_spanish:
  - jactancia
  - altivez
  lexicon: BDAG
  rationale: «Arrogancia» expresa claramente la autoexaltación orgullosa que el texto niega a José.
- source_word: κοσμική δόξα
  english_pob_choice: worldly glory
  chosen_spanish: gloria mundana
  alternatives_spanish:
  - gloria terrenal
  - honor mundano
  lexicon: LSJ
  rationale: «Gloria mundana» mantiene tanto el brillo social de José en Egipto como el contraste de su carácter pasajero y no espiritual.
- source_word: ἐλαχίστων
  english_pob_choice: the least
  chosen_spanish: uno de los más pequeños
  alternatives_spanish:
  - uno de los menos
  - uno de los más humildes
  lexicon: BDAG
  rationale: La frase resalta la humillación voluntaria de José; «uno de los más pequeños» comunica bien su autoubicación entre los hermanos.
theological_decisions:
- issue: Exhortación ética sobre encubrir faltas fraternas
  english_pob_reading: Translate συγκρύπτετε ἀλλήλων τὰ ἐλαττώματα as 'conceal one another’s shortcomings'
  chosen_spanish_reading: «encubran las faltas de los demás»
  alternative_spanish_readings:
  - «cubran las faltas de los demás»
  - «oculten las faltas de los demás»
  rationale: La línea enseña misericordia fraterna y no la negación del pecado. «Encubran» preserva la idea de no exponer duramente las faltas, sin añadir lenguaje doctrinal ajeno al pasaje.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 4, 5
- issue: Término δοῦλοι en el v. 7
  english_pob_reading: Use 'slaves' rather than 'servants'
  chosen_spanish_reading: «esclavos»
  alternative_spanish_readings:
  - «siervos»
  - «criados»
  rationale: El texto presenta una subordinación real y marcada; por fidelidad léxica y teológica se conserva la fuerza de «esclavos».
  doctrine_reference: 'DOCTRINE.md §Contested terms: δοῦλος'
- issue: Cláusula textualmente áspera en el v. 3
  english_pob_reading: Render the sense as 'in the purpose of a good heart that intends what is good'
  chosen_spanish_reading: «en la intención de un corazón bueno, que busca lo bueno»
  alternative_spanish_readings:
  - «en la resolución de un corazón bueno, que busca lo bueno»
  - «en la decisión de un corazón bueno, que busca lo bueno»
  rationale: El testimonio griego es difícil en esta línea; la traducción conserva la idea ética de un corazón bien dispuesto hacia el bien sin fingir una reconstrucción más precisa de la que la evidencia permite.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: Se revisó el pasaje con referencia al último pase de revisión, que marcó el texto como sin cambios necesarios. La presente versión mantiene la estructura y decisiones auditadas del inglés POB, pero las expresa en español con equivalencia óptima y ajustes idiomáticos mínimos.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como forma principal solo cuando el texto fuente lo requiera; aquí no aparece.
  - Se mantiene la fuerza de δοῦλοι como «esclavos» por consistencia con la política del proyecto.
  - Se evita traducir mecánicamente desde el inglés cuando el español pide una formulación más natural, especialmente en los versos 2, 3 y 8.
  - Se conservan las tensiones textuales del v. 3 mediante formulación prudente y nota.
  - La numeración y el cierre de cada unidad siguen la estructura del texto fuente, incluyendo los corchetes de nota en el verso 1.
