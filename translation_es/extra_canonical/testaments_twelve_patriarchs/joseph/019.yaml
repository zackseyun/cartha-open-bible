  text: 'And he gave me beauty beyond the handsome men of Israel[a], and preserved me until old age in strength and in beauty; for I was like Jacob in all things.


    Now listen, my children, also concerning the dream that I saw.


    2. Twelve deer were feeding in one place, and the nine were scattered over all the earth; and likewise the three also. So hear the dream that I saw. 3. And I saw that the three deer became three lambs, and they cried out to the Lord, and the Lord led them out into a flourishing and well-watered place, and brought them from darkness into light. 4. And there they cried out to the Lord until the nine deer were gathered to them, and they themselves became like twelve sheep; and after a little time they increased and became many flocks. 5. And after these things I saw, and behold, twelve bulls suckling one heifer, and from her there came a sea of milk, and the twelve flocks and innumerable flocks drank from it. 6. And from the fourth bull the horns went up as far as heaven and became like a wall for the flocks, and between the two horns another horn sprang up. 7. And I saw a calf that encircled them twelve times, and it became for the bulls wholly a help.


    8. And I saw that a virgin was born, and from her was born a lamb, and on his left there rushed forth something like a lion; and all the beasts rushed against him, but the lamb overcame them and destroyed them and trampled them down. 9. And the angels and men and all the earth rejoiced over him. 10. And these things will happen in their season in the last days.


    11. Therefore you, my children, keep the commandments of the Lord, and honor Levi and Judah; for from their seed there will arise for you the salvation of Israel. 12. For his kingdom will be an everlasting kingdom, which will not pass away. But my kingdom among you will come to an end, like a watchman''s hut after the summer[d][c][b], vanishing away.'
  footnotes:
  - marker: a
    text: Some Greek witnesses read more explicitly, 'from Judah was born a virgin,' while another form reads, 'I saw among the horns a certain virgin.'
    reason: textual_variant
  - marker: b
    text: Some witnesses expand the lamb as 'spotless,' and one later-sounding reading adds language resembling 'the lamb of God, who takes away the sin of the world.'
    reason: textual_variant
  - marker: c
    text: The phrase 'on his left there rushed forth something like a lion' is textually difficult; another witness phrases the scene differently but still depicts hostile beastly assault on the lamb.
    reason: alternative_reading
  - marker: d
    text: The image of the 'watchman's hut after the summer' refers to a temporary field shelter left desolate once harvest is over.
    reason: cultural_note
