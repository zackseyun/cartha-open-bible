translation:
  language: es
  text: 'Y me dio hermosura[a] más allá de los hombres hermosos de Israel, y me preservó[b] hasta la vejez en fuerza y en hermosura; porque yo era semejante a Jacob en todo.


    Ahora escuchen, hijos míos, también acerca del sueño que vi.


    2. Doce ciervos pastaban en un solo lugar, y los nueve fueron dispersados por toda la tierra; y de igual modo también los tres. 3. Y vi que los tres ciervos se hicieron tres corderos, y clamaron al Señor, y el Señor los llevó a un lugar floreciente y bien regado, y los sacó de las tinieblas a la luz. 4. Y allí clamaron al Señor hasta que los nueve ciervos fueron reunidos con ellos, y ellos mismos se hicieron como doce ovejas; y después de poco tiempo crecieron y se hicieron muchos rebaños. 5. Y después de estas cosas vi, y he aquí, doce toros amamantaban[c] a una novilla, y de ella se hacía un mar de leche, y los doce rebaños y rebaños innumerables bebían de él. 6. Y del cuarto toro los cuernos subieron hasta el cielo y se hicieron como un muro para los rebaños, y entre los dos cuernos brotó otro cuerno. 7. Y vi un ternero que los rodeaba doce veces, y llegó a ser para los toros una ayuda completa.


    8. Y vi que nació una virgen, y de ella nació un cordero; y a su izquierda se lanzó algo como un león; y todas las bestias se lanzaron contra él, pero el cordero las venció y las destruyó y las pisoteó. 9. Y se alegraron por él los ángeles y los hombres y toda la tierra. 10. Y estas cosas sucederán en su tiempo, en los últimos días.


    11. Por tanto, ustedes, hijos míos, guarden los mandamientos del Señor, y honren a Leví y a Judá; porque de su descendencia surgirá para ustedes la salvación de Israel. 12. Porque su reino será un reino eterno, que no pasará. Pero mi reino entre ustedes llegará a su fin, como una cabaña de vigilante después del verano[d], que desaparece.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Algunos testigos griegos leen con más explicitud: «de Judá nació una virgen», mientras otra forma dice: «vi entre los cuernos a cierta virgen».'
    reason: textual_variant
  - marker: b
    text: El verbo puede entenderse también como «guardó» o «conservó»; aquí se eligió «preservó» por su valor de conservación providencial a lo largo del tiempo.
    reason: lexical_alternative
  - marker: c
    text: El participio griego describe a los toros mamando de una novilla; se traduce de forma natural como «amamantaban» para conservar la imagen.
    reason: lexical_alternative
  - marker: d
    text: La «cabaña de vigilante después del verano» alude a un refugio temporal del campo que queda desolado al terminar la cosecha.
    reason: cultural_note
lexical_decisions:
- source_word: ὡραιότητα
  english_pob_choice: beauty
  chosen_spanish: hermosura
  alternatives_spanish:
  - belleza
  - hermosura física
  lexicon: LSJ
  rationale: «Hermosura» conserva la cualidad estética y corporal del pasaje autobiográfico sin sonar excesivamente coloquial; evita reducirlo a un simple rasgo moral. En este contexto, «belleza» también sería posible, pero «hermosura» mantiene mejor el tono elevado.
- source_word: ἐφύλαξέ
  english_pob_choice: preserved
  chosen_spanish: me preservó
  alternatives_spanish:
  - me guardó
  - me conservó
  lexicon: BDAG
  rationale: La idea no es solo protección puntual sino conservación a lo largo del tiempo hasta la vejez. «Preservó» reproduce bien esa continuidad providencial.
- source_word: ἐνυπνίων / ἐνύπνιον
  english_pob_choice: dream
  chosen_spanish: sueño
  alternatives_spanish:
  - sueño profético
  - ensueño
  lexicon: LSJ
  rationale: «Sueño» es la forma natural y suficiente en español. «Sueño profético» añadiría una precisión no explícita en la palabra misma.
- source_word: ἔλαφοι
  english_pob_choice: deer
  chosen_spanish: ciervos
  alternatives_spanish:
  - venados
  - gamos
  lexicon: LSJ
  rationale: «Ciervos» es un equivalente neutral y claro en español bíblico; evita la marcación regional de «venados» y preserva el valor cervino del símbolo.
- source_word: ἀμνοί
  english_pob_choice: lambs
  chosen_spanish: corderos
  alternatives_spanish:
  - corderitos
  - borregos jóvenes
  lexicon: BDAG
  rationale: «Corderos» mantiene el simbolismo pastoral y sacrificial. En español suena más natural que «ovejas jóvenes» y no pierde la fuerza del contraste con los ciervos.
- source_word: τόπον εὐθαλῆ καὶ ἔνυδρον
  english_pob_choice: a flourishing and well-watered place
  chosen_spanish: un lugar floreciente y bien regado
  alternatives_spanish:
  - un lugar fértil y bien regado
  - un lugar floreciente y con abundante agua
  lexicon: LSJ
  rationale: La pareja adjetival del griego apunta a fertilidad y abundancia de agua. «Floreciente y bien regado» conserva ambos elementos de forma legible y no sobreexplicada.
- source_word: ἐκ σκότους εἰς φῶς
  english_pob_choice: from darkness into light
  chosen_spanish: de las tinieblas a la luz
  alternatives_spanish:
  - de la oscuridad a la luz
  lexicon: BDAG
  rationale: «Tinieblas» preserva mejor el registro bíblico y simbólico que «oscuridad», aunque ambas son correctas.
- source_word: πρόβατα / ποίμνια
  english_pob_choice: sheep / flocks
  chosen_spanish: ovejas / rebaños
  alternatives_spanish:
  - ovejas / manadas
  - ovejas / greyes
  lexicon: LSJ
  rationale: La distinción entre individuos y grupos se conserva con «ovejas» y «rebaños». «Rebaños» funciona mejor en español para el crecimiento multiplicado que el más técnico «greyes».
- source_word: βόες
  english_pob_choice: bulls
  chosen_spanish: toros
  alternatives_spanish:
  - bueyes
  - ganado
  lexicon: LSJ
  rationale: «Toros» conserva la imaginería masculina y el énfasis simbólico de poder ligado a los cuernos. «Bueyes» sugeriría trabajo agrícola de modo no buscado aquí.
- source_word: θηλάζοντες
  english_pob_choice: suckling
  chosen_spanish: amamantaban
  alternatives_spanish:
  - mamaban
  - estaban mamando
  lexicon: BDAG
  rationale: En español, «amamantaban» expresa con claridad la escena de nutrirse de leche materna sin sonar torpe. «Suckling» se traduce mejor por esta forma natural que por un calco.
- source_word: δάμαλιν
  english_pob_choice: heifer
  chosen_spanish: novilla
  alternatives_spanish:
  - vaquilla
  - ternera
  lexicon: LSJ
  rationale: «Novilla» es el término bíblico y ganadero más adecuado para una hembra joven vacuna. Evita la ambigüedad de «ternera», que puede sonar alimentaria.
- source_word: κέρατα
  english_pob_choice: horns
  chosen_spanish: cuernos
  lexicon: BDAG
  rationale: Se mantiene el valor literal del símbolo de poder. No hace falta interpretarlo en el cuerpo principal.
- source_word: ἐξεβλάστησε
  english_pob_choice: sprang up
  chosen_spanish: brotó
  alternatives_spanish:
  - surgió
  - creció
  lexicon: LSJ
  rationale: El verbo conserva una imagen vegetal de emergencia repentina; «brotó» la expresa con naturalidad en español.
- source_word: παρθένος
  english_pob_choice: virgin
  chosen_spanish: virgen
  alternatives_spanish:
  - doncella
  lexicon: BDAG
  rationale: «Virgen» es la correspondencia directa y más precisa, especialmente por la carga textual y teológica del pasaje.
- source_word: ἀμνός
  english_pob_choice: lamb
  chosen_spanish: cordero
  alternatives_spanish:
  - lamb
  - corderito
  lexicon: BDAG
  rationale: Aquí se conserva la imagen sacrificial/pastoral con «cordero». En español, «cordero» suele funcionar mejor que «lamb» y es plenamente comprensible.
- source_word: θηρία
  english_pob_choice: beasts
  chosen_spanish: bestias
  alternatives_spanish:
  - animales feroces
  - fieras
  lexicon: LSJ
  rationale: «Bestias» mantiene el registro apocalíptico elevado del texto y su oposición simbólica al cordero.
- source_word: ἐνίκησεν
  english_pob_choice: overcame
  chosen_spanish: venció
  alternatives_spanish:
  - triunfó sobre
  - derrotó
  lexicon: BDAG
  rationale: «Venció» es breve y fuerte, y conserva la secuencia narrativa de lucha y triunfo sin sobrerretórica.
- source_word: ἀπώλεσεν ... εἰς καταπάτημα
  english_pob_choice: destroyed them and trampled them down
  chosen_spanish: las destruyó y las pisoteó
  alternatives_spanish:
  - las arruinó y las pisoteó
  - las destruyó para pisotearlas
  lexicon: LSJ
  rationale: La frase griega es difícil; «las destruyó y las pisoteó» conserva los dos movimientos del texto sin suavizar la violencia simbólica.
- source_word: ἐν καιρῷ αὐτῶν
  english_pob_choice: in their season
  chosen_spanish: en su tiempo
  alternatives_spanish:
  - en su estación
  - en el tiempo señalado
  lexicon: BDAG
  rationale: «En su tiempo» es la forma más natural en español y conserva la idea de momento ordenado. «En su estación» sonaría demasiado literal o meteorológica.
- source_word: φυλάξατε τὰς ἐντολὰς
  english_pob_choice: keep the commandments
  chosen_spanish: guarden los mandamientos
  alternatives_spanish:
  - observen los mandamientos
  - mantengan los mandamientos
  lexicon: BDAG
  rationale: «Guardar» es el verbo bíblico normal en español y comunica obediencia continua con claridad.
- source_word: τιμᾶτε
  english_pob_choice: honor
  chosen_spanish: honren
  alternatives_spanish:
  - den honor a
  - respeten
  lexicon: BDAG
  rationale: «Honren» reproduce bien el imperativo y mantiene la fuerza de reconocimiento debido a Leví y Judá.
- source_word: ἀνατελεῖ
  english_pob_choice: there will arise
  chosen_spanish: surgirá
  alternatives_spanish:
  - brotará
  - aparecerá
  lexicon: LSJ
  rationale: La imagen de surgimiento de la descendencia se expresa bien con «surgirá», sin forzar la metáfora hacia un matiz solar o mesiánico explícito.
- source_word: σωτηρία
  english_pob_choice: salvation
  chosen_spanish: salvación
  alternatives_spanish:
  - liberación
  - rescate
  lexicon: BDAG
  rationale: «Salvación» conserva el peso teológico del término, más que «liberación», que puede sonar más político o circunstancial.
- source_word: βασιλεία
  english_pob_choice: kingdom
  chosen_spanish: reino
  alternatives_spanish:
  - reinado
  lexicon: BDAG
  rationale: «Reino» encaja con el paralelismo entre el reino permanente futuro y el reino transitorio de José. «Reinado» destacaría el acto de reinar, pero no el ámbito/orden de gobierno.
- source_word: ὀπωροφυλάκιον
  english_pob_choice: watchman's hut
  chosen_spanish: cabaña de vigilante
  alternatives_spanish:
  - choza de vigilante
  - caseta de vigilante
  lexicon: LSJ
  rationale: El griego describe un refugio temporal de campo. «Cabaña de vigilante» transmite la idea de una estructura provisoria sin depender de una expresión demasiado regional.
theological_decisions:
- issue: Lecturas textuales ampliadas de los vv. 8 y 11
  english_pob_reading: The main English text preserves the symbolic virgin-and-lamb imagery while footnotes note later or expanded readings such as 'from Judah was born a virgin' and 'the lamb of God, who takes away the sin of the world.'
  chosen_spanish_reading: El texto principal conserva la imagen simbólica de la virgen y el cordero, con notas para las expansiones textuales más explícitas.
  alternative_spanish_readings:
  - «de Judá nació una virgen ... de ella nació un cordero sin mancha»
  - «el cordero de Dios, que quita el pecado del mundo»
  rationale: El aparato griego indica variantes notables y probablemente expansiones cristológicas posteriores. La traducción española mantiene lo que el testimonio base sostiene de manera más segura y no resuelve la tensión textual en el cuerpo principal.
  doctrine_reference: Preferir transparencia textual sobre armonización doctrinal; conservar la ambigüedad histórica del testimonio.
- issue: Identidad del gobernante duradero y del salvador de Israel
  english_pob_reading: Rendered as 'the salvation of Israel' and 'his kingdom' without specifying beyond the text's wording.
  chosen_spanish_reading: Se traduce como «la salvación de Israel» y «su reino», sin identificar de modo más preciso al personaje.
  alternative_spanish_readings:
  - un Mesías individual explícito
  - una salvación corporativa vinculada al sacerdocio y la realeza
  rationale: El texto apunta a una esperanza futura surgida de Leví y Judá, pero el modo exacto de identificación varía entre testigos y recepciones. La versión española conserva esa ambigüedad profética.
  doctrine_reference: Mantener la tensión profética sin imponer una formulación confesional posterior.
translation_notes:
  revision_awareness: Se siguió el pasaje griego disponible y el aparato auditado en inglés. No se incorporaron expansiones cristológicas explícitas al texto principal; esas lecturas quedan señaladas en notas y decisiones teológicas. La redacción española busca conservar tanto la imaginería onírica como la tensión textual del capítulo.
  spanish_consistency_notes:
  - Se mantiene «Señor» para Κύριος en este testimonio, ya que el pasaje funciona como cita/devoción directa sin necesidad de marcar aquí el nombre divino como «Yahvé».
  - Se eligió «ciervos»/«corderos»/«ovejas»/«rebaños» para preservar la progresión simbólica del sueño.
  - Se conservó la distinción entre singular y plural en las imágenes animales y el contraste entre el reino eterno y el reino pasajero de José.
  - No se sustituyó «cordero» por terminología eclesial más interpretativa; se deja la carga simbólica en el propio texto.
