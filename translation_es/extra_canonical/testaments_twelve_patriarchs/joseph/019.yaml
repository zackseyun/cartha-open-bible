  text: (XVIII:4 continued.) *Καίγε καὶ²² ὡραιότητα ἔδωκέ²³ μοι ὑπὲρ ὡραίους Ἰσραήλ, ⌜καὶ⌉ ἐφύλαξέ²⁴ με ⌜ἕως γήρους²⁵ ἐν δυνάμει καὶ⌉ ἐν κάλλει· *Καὶ γὰρ ὅμοιος ἤμην²⁶ ἐν πᾶσι τῷ²⁷ Ἰακώβ. XIX. Ἀκούσατε δέ¹, τέκνα μου, καὶ *περὶ ὧν †οἶδα ἐνυπνίων². 2. Δώδεκα³ ἔλαφοι ἐνέμοντο⁴ *ἐν τόπῳ⁵ καὶ οἱ ἐννέα⁶ διεσπάρησαν *εἰς πᾶσαν τὴν γῆν⁷· ὁμοίως δὲ⁸ καὶ οἱ τρεῖς. 3. Καὶ ἑώρων ὅτι τρεῖς¹⁴ ἔλαφοι τρεῖς ἀμνοὶ ἐγίνοντο καὶ ἐβόησαν πρὸς Κύριον καὶ ἐξήγαγε αὐτοὺς Κύριος¹⁵ εἰς τόπον εὐθαλῆ καὶ ἔνυδρον, καὶ ἤγαγε¹⁶ αὐτοὺς ἐκ σκότους εἰς φῶς. 4. Καὶ ἐκεῖ ἐβόησαν πρὸς Κύριον μέχρι οὐ συνήχθησαν *πρὸς αὐτοὺς¹⁷ οἱ ἐννέα ἔλαφοι καὶ ἐγίνοντο αὐτοὶ ὡς δώδεκα πρόβατα, καὶ μετ’ ὀλίγον χρόνον ηὐξάνοντο καὶ ἐγίνοντο ποίμνια πολλά. 5. Καὶ¹⁸ μετὰ ταῦτα ἑώρων *καὶ ἰδοὺ¹⁵ δώδεκα βόες θηλάζοντες¹⁹ μίαν δάμαλιν, ἢ ἐκ²⁰ . . . γάλακτος θάλασσαν ἐποίει καὶ ἔπινον ἐξ αὐτοῦ²¹ αἱ δώδεκα ποίμναι καὶ ἀνηρίθμητα ποίμνια. 6. Καὶ τοῦ τετάρτου βοὸς ἀνέβησαν τὰ κέρατα μέχρι τοῦ οὐρανοῦ καὶ ἐγένοντο ὡς τεῖχος τῶν ποιμνῶν, καὶ ἐν μέσῳ
    τῶν δύο²² κεράτων ἐξεβλάστησε²³ ἄλλο κέρας. 7. Καὶ ἑώρων *μόσχον ὃς δωδεκάκις περιέβαλλε αὐτούς²⁴, καὶ ἐγένετο²⁵ τοῖς βουσὶ ὁλοκλήρως (?) εἰς βοήθειαν. 8. *Καὶ εἶδον²⁶ *ὅτι [ἐκ τοῦ Ἰούδα ἐγεννήθη] †παρθένος, [ἔχουσα στολὴν βυσσίνην, καὶ ἐξ αὐτῆς] ἐγεννήθη ἀμνὸς [ἄμωμος]²⁷ *καὶ ἦν²⁸ ἐξ ἀριστερῶν αὐτοῦ ὡς λέων· καὶ πάντα τὰ θηρία ὥρμων³⁰ *κατ᾽ αὐτοῦ³¹ καὶ ἐνίκησεν αὐτὰ ὁ ἀμνός, καὶ ἀπώλεσεν *αὐτὰ εἰς καταπάτημα³². 9. Καὶ ἔχαιρον ἐπ᾽ αὐτῷ³³ οἱ *ἄγγελοι καὶ οἱ ἄνθρωποι³⁴ καὶ πᾶσα³⁵ ἡ γῆ. 10. Ταῦτα δὲ³⁶ γενήσεται ἐν καιρῷ αὐτῶν³⁷ ἐν ἐσχάταις ἡμέραις. 11. Ὑμεῖς οὖν, τέκνα μου, φυλάξατε τὰς ἐντολὰς Κυρίου, καὶ τιμᾶτε³⁸ τὸν *Λευὶ καὶ τὸν Ἰούδαν³⁹. ὅτι *ἐκ τοῦ σπέρματος⁴⁰ αὐτῶν ἀνατελεῖ ὑμῖν⁴¹ [ὁ ἀμνὸς τοῦ Θεοῦ, ὁ αἴρων τὴν ἁμαρτίαν τοῦ κόσμου]⁴², σώζων [πάντα τὰ ἔθνη καὶ]⁴⁸ τὸν Ἰσραήλ. 12. Ἡ γὰρ βασιλεία αὐτοῦ βασιλεία *ἔσται αἰώνιος⁴⁹ ἥτις οὐ παρελεύσεται⁵⁰. ἡ δὲ ἐμὴ βασιλεία⁵¹ ἐν ὑμῖν ἐπιτελεῖται, ὡς ὀπωροφυλάκιον⁵² ⌜γος⌉⁵³ μετὰ τὸ θέρος ἐξαφανίζεται⁵⁴.
