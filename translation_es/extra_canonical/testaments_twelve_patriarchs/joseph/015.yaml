translation:
  language: es
  text: '4. Pues ella deseaba verme con deseo pecaminoso[a], pero yo era ajeno a todas estas cosas.



    5. Y le dije: "No es esta la costumbre entre los egipcios, tomar lo que pertenece a otros antes de que se presenten pruebas."



    6. Esto, entonces, dijo acerca del traficante[b]. Y el muchacho debe ser mantenido encerrado.



    1. Y después de veinticuatro días llegaron los ismaelitas, pues habían oído que Jacob mi padre se lamentaba mucho por mí. Y al llegar me dijeron,



    2. "¿Por qué dijiste que eras esclavo[c]? Pues he aquí, hemos sabido que eres hijo de un gran hombre en la tierra de Canaán, y que tu padre todavía se lamenta por ti en cilicio y ceniza."



    3. Cuando oí estas cosas, mis entrañas se desgarraron, y mi corazón se derritió, y deseaba mucho llorar. Pero me contuve, para no avergonzar a mis hermanos. Y les dije: "No sé; soy esclavo."



    4. Entonces, en efecto, decidieron venderme, para que yo no fuera hallado en sus manos.



    5. Pues temían a mi padre, no fuera que viniera entre ellos y tomara venganza por el peligro[d]; porque habían oído que él era grande delante de Dios y de los hombres.



    6. Entonces el traficante les dijo: "Líbrenme del juicio de Potifar."



    7. Y ellos se acercaron y me pidieron, diciendo: "Di que fuiste comprado por nosotros con plata, y él nos liberará."'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego ἐν πόθῳ ἁμαρτίας es de tono testamentario amplio; abarca el deseo sexual ilícito sin reducirse a un idiomatismo moderno como 'me deseaba'.
    reason: lexical_alternative
  - marker: b
    text: El texto griego es difícil aquí; 'acerca del traficante' y 'el muchacho debe ser mantenido encerrado' reflejan un griego comprimido con lecturas variantes.
    reason: textual_variant
  - marker: c
    text: δοῦλος (esclavo) preserva la dimensión jurídico-social del estatus de propiedad servil, en línea con la política del POB.
    reason: lexical_alternative
  - marker: d
    text: Algunos testigos pueden implicar 'ejecutar venganza por el peligro' o expresión similar; el griego es difícil y la traducción preserva el sentido de represalia temida sin sobre-armonizar.
    reason: textual_variant
