base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/015.yaml
  text: '4[15:5]. For she wanted to see me in the desire of sin, but I was ignorant in all these things.


    5. And I said to her, “This is not the custom among the Egyptians, to take what belongs to another before proof is given.”


    6. So I said this concerning the exchange. But the boy ought to be kept confined.


    1[15:6]. And after twenty-four days the Ishmaelites came, for they had heard that Jacob my father was mourning greatly for me. And when they came they said to me,


    2. “Why did you say that you were a slave? For behold, we have learned that you are the son of a great man in the land of Canaan, and that your father is still mourning for you in sackcloth and ashes.”


    3. When I heard these things, my inward parts were torn apart, and my heart melted, and I wanted very much to weep. But I restrained myself, so that I might not put my brothers to shame. And I said to them, “I do not know; I am a slave.”


    4. Then they took counsel to sell me, so that I might not be found in their hands.


    5. For they feared my father, lest he come and take vengeance on them; for they had heard that he was great before God and men.


    6. Then the trader said to them, “Release me from the judgment of Potiphar.”


    7. And they came near and asked me, saying, “Say that you were bought by us for silver[15:7][15:5], and he has us released.”'
  footnotes:
  - marker: '15:5'
    text: The Greek likely refers broadly to taking what belongs to another; in context this functions as Joseph's moral refusal regarding another man's wife, not merely theft of property.
    reason: lexical_alternative
  - marker: '15:6'
    text: The wording here is textually difficult. 'Concerning the exchange' and 'the boy ought to be kept shut up' reflect a compressed Greek text with variant readings.
    reason: textual_variant
  - marker: '15:5'
    text: Some witnesses may imply 'execute vengeance for the danger' or a similar phrase; the Greek is awkward, and the translation preserves the sense of feared retaliation without over-harmonizing.
    reason: textual_variant
  - marker: '15:7'
    text: That is, the trader asks Joseph to confirm a purchase story so that Potiphar will release those involved.
    reason: cultural_note
