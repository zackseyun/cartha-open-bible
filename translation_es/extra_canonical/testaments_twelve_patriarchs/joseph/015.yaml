theological_decisions:
- issue: Negación de identidad por parte de José ante los ismaelitas pese a oír del duelo de Jacob
  chosen_reading: José suprime su identidad por preocupación de no avergonzar a sus hermanos
  alternative_readings:
  - José simplemente está resignado a la esclavitud
  - José teme más peligro si lo identifican
  rationale: La cláusula explícita 'para no avergonzar a mis hermanos' rige la escena y debe permanecer central en lugar de suavizarse en una resignación pasiva.
  doctrine_reference: Preservar la tensión teológica y moral en lugar de resolverla.
translation_notes:
  revision_awareness: 'El POB inglés revisó múltiples frases para mayor naturalidad y precisión: ''in the desire of sin'' → ''in sinful desire'', ''I was ignorant'' → ''I was unaware'', ''kept shut up'' → ''kept confined'', ''took counsel'' → ''decided'', ''Release'' → ''Free'', ''for silver'' → ''with silver'', ''he has us released'' → ''he will release us''. El español incorpora todas estas mejoras.'
  spanish_consistency_notes:
  - μετάβολος → 'traficante' consistente.
  - δοῦλος → 'esclavo' (política POB).
  - παῖς → 'muchacho' (literal).
  - σάκκος καὶ σποδός → 'cilicio y ceniza' (tradición bíblica española).
  - Πεντεφρί → 'Potifar' (forma tradicional castellana).
  - Imperativos en forma 'ustedes' (neutro latinoamericano).
