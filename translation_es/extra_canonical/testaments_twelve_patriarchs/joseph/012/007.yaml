base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/012/007.yaml
  text: And God blessed him in my hand, and increased him on my account in gold and silver and goods.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:31Z'
    unchanged: false
    changes_summary: Changed 'in my hands' to 'in my hand' for closer agreement with the singular Greek, and 'work' to 'goods' to better reflect ἔργῳ in this context of material increase.
translation:
  language: es
  text: Y Dios lo bendijo por mi mano, y lo multiplicó por mi causa en oro y plata y bienes[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'y obra/producción.' El término final ἔργῳ es difícil en el testigo OCR usado aquí; el POB revisado lo entiende como 'bienes' en este contexto de aumento material.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ Θεὸς
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: BDAG
  rationale: 'Glosario POB: θεός → Dios; sin artículo en español por ser nombre propio referencial.'
- source_word: ἐν χειρί μου
  english_pob_choice: in my hand
  chosen_spanish: por mi mano
  alternatives_spanish:
  - en mi mano
  - a través de mí
  lexicon: LSJ
  rationale: Idioma bíblico de agencia; 'por mi mano' conserva el sentido instrumental siguiendo la revisión POB que pasó del plural 'hands' al singular 'hand'.
- source_word: ἐπλήθυνεν
  english_pob_choice: increased
  chosen_spanish: lo multiplicó
  alternatives_spanish:
  - lo aumentó
  - lo acrecentó
  lexicon: LSJ
  rationale: πληθύνω denota aumento numérico/material; 'multiplicó' es idiomático en contextos bíblicos de incremento de bienes.
- source_word: ἔργῳ
  english_pob_choice: goods
  chosen_spanish: bienes
  alternatives_spanish:
  - hacienda
  - obra
  - producción
  lexicon: LSJ
  rationale: Tras la revisión POB de 'work' a 'goods' para reflejar el aumento material en la lista, 'bienes' es el equivalente español natural; nota la dificultad del texto.
translation_notes:
  revision_awareness: Sigo la revisión POB de 'in my hands' a 'in my hand' (singular griego) y de 'work' a 'goods' (sentido material en este contexto de incremento).
  spanish_consistency_notes:
  - '''por mi mano'' para ἐν χειρί μου a lo largo del Testamento'
  - '''multiplicó'' para ἐπλήθυνεν'
  - '''bienes'' para ἔργῳ en este contexto material'
