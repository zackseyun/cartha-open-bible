base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/012/005.yaml
  text: So it seemed good to all of them for me to remain in Egypt with the merchant of their trade until they should return bringing merchandise.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:30Z'
    unchanged: false
    changes_summary: Changed 'leave me' to 'for me to remain' to reflect the infinitive construction more naturally and accurately; otherwise retained the draft's sense and formal register.
translation:
  language: es
  text: Y a todos les pareció bien que yo permaneciera en Egipto con el negociante de su comercio, hasta que volvieran trayendo mercancía.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Διὰ πᾶσιν ἔδοξεν
  english_pob_choice: it seemed good to all of them
  chosen_spanish: les pareció bien a todos
  alternatives_spanish:
  - a todos les pareció bueno
  - todos estuvieron de acuerdo
  lexicon: ἔδοξεν
  rationale: Conserva el valor de parecer bien / resultar aprobado sin volverlo una paráfrasis interpretativa. En español, 'les pareció bien' comunica con naturalidad la aprobación general del grupo.
- source_word: τοῦ εἶναι με εἰς Αἴγυπτον
  english_pob_choice: for me to remain in Egypt
  chosen_spanish: que yo permaneciera en Egipto
  alternatives_spanish:
  - que yo estuviera en Egipto
  - que yo siguiera en Egipto
  lexicon: εἶναι
  rationale: El infinitivo con εἰς Αἴγυπτον expresa aquí permanencia/estado en Egipto; 'permaneciera' refleja mejor esa función que una traducción más mecánica como 'estar'.
- source_word: πρὸς τὸν μετάβολον τῆς ἐμπορίας αὐτῶν
  english_pob_choice: with the merchant of their trade
  chosen_spanish: con el negociante de su comercio
  alternatives_spanish:
  - con el comerciante de su comercio
  - con el vendedor de su mercancía
  lexicon: μετάβολος
  rationale: El sintagma griego es oscuro y el POB inglés lo entendió como una persona vinculada al comercio. 'Negociante' mantiene la referencia humana y el matiz mercantil sin forzar una identificación más precisa de la que el texto permite.
- source_word: ἕως ὅτου ἐπιστρέψουσιν φέροντες ἐμπορίαν
  english_pob_choice: until they should return bringing merchandise
  chosen_spanish: hasta que volvieran trayendo mercancía
  alternatives_spanish:
  - hasta que regresaran trayendo mercancía
  - hasta que volvieran con mercancía
  lexicon: ἐπιστρέψουσιν / φέροντες ἐμπορίαν
  rationale: '''Volvieran trayendo mercancía'' preserva el movimiento de retorno y el participio de acompañamiento sin agregar información no presente en el griego.'
theological_decisions:
- issue: No explicit theological tension; preserving the interpersonal and commercial sense of the verse
  english_pob_reading: So it seemed good to all of them... until they should return bringing merchandise.
  chosen_spanish_reading: Y a todos les pareció bien que yo permaneciera en Egipto... hasta que volvieran trayendo mercancía.
  alternative_spanish_readings:
  - Y todos estuvieron de acuerdo en que yo permaneciera en Egipto...
  - Y a todos les agradó que yo siguiera en Egipto...
  rationale: El versículo es narrativo y no doctrinal; la prioridad es conservar la decisión colectiva y el marco comercial sin introducir una lectura espiritualizante o moralizante.
  doctrine_reference: none
translation_notes:
  revision_awareness: La versión inglesa revisada sustituyó 'leave me' por 'for me to remain' para reflejar con mayor precisión la construcción infinitiva; la redacción española sigue esa lectura y evita una idea de abandono no presente en el griego.
  spanish_consistency_notes:
  - Se mantiene 'Egipto' y 'mercancía' de forma consistente con el registro narrativo y comercial del pasaje.
  - '''Negociante'' se usa aquí por fidelidad al sintagma griego oscuro y al audit trail inglés, sin imponer una terminología más técnica que el texto no garantiza.'
