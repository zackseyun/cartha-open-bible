  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 256-287, Joseph pilot)
  text: Νῦν οὖν ποίησον μετ᾿ αὐτοῦ¹⁷ κρίσιν, καὶ ἀφελοῦ¹⁸ τὸν νεανίαν¹⁹ εἰς *τὸν οἶκον ἡμῶν²⁰, καὶ *εὐλογῆσαί σε ἔχει²¹ *ὁ Θεὸς τῶν Ἑβραίων²², ὅτι χάρις *ἐκ τοῦ²³ οὐρανοῦ ἐστι *πρὸς αὐτόν²⁴.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/012/011.yaml
  text: Now therefore render judgment concerning him, and take the young man into our house, and the God of the Hebrews will bless you, because grace from heaven is upon him.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:32Z'
    unchanged: false
    changes_summary: Changed 'execute judgment with him' to 'render judgment concerning him' for more natural and accurate English for κρίσιν ... μετ᾿ αὐτοῦ, while preserving the formal sense. The rest is retained.
translation:
  language: es
  text: Ahora pues, dicta sentencia respecto a él[a], y toma al joven en nuestra casa, y el Dios de los hebreos te bendecirá, porque hay gracia del cielo sobre él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego κρίσιν...μετ᾿ αὐτοῦ podría también entenderse como 'haz juicio con/sobre él'; el POB revisado entiende el sentido como adjudicación formal del caso de José.
    reason: lexical_alternative
lexical_decisions:
- source_word: ποίησον... κρίσιν
  english_pob_choice: render judgment concerning him
  chosen_spanish: dicta sentencia respecto a él
  alternatives_spanish:
  - pronuncia juicio sobre él
  - lleva a cabo el juicio acerca de él
  - abre proceso sobre él
  lexicon: LSJ
  rationale: Sigo la revisión POB de 'execute judgment with him' a 'render judgment concerning him' por mayor naturalidad y precisión para κρίσιν...μετ᾿ αὐτοῦ; 'dictar sentencia' captura la fuerza judicial formal en español.
- source_word: ἀφελοῦ τὸν νεανίαν
  english_pob_choice: take the young man
  chosen_spanish: toma al joven
  alternatives_spanish:
  - lleva al muchacho
  - trae al joven
  - quédate con el joven
  lexicon: LSJ
  rationale: ἀφαιρέω medio aquí significa 'tomar para sí, apropiarse'; en este contexto doméstico equivale a 'tomar a su cargo'. 'Toma al joven' es claro y conserva la fuerza.
- source_word: ὁ Θεὸς τῶν Ἑβραίων
  english_pob_choice: the God of the Hebrews
  chosen_spanish: el Dios de los hebreos
  alternatives_spanish:
  - Dios de los hebreos
  lexicon: BDAG
  rationale: 'Glosario POB: θεός → Dios. El artículo se conserva en español por la construcción específica con genitivo determinante.'
- source_word: χάρις... πρὸς αὐτόν
  english_pob_choice: grace... is upon him
  chosen_spanish: gracia... sobre él
  alternatives_spanish:
  - favor sobre él
  - gracia con él
  lexicon: BDAG
  rationale: χάρις aquí denota favor divino; 'gracia' (glosario POB). La preposición πρός con sentido direccional/locativo se rinde con 'sobre' en español, conservando la idea del favor que reposa sobre Joseph.
translation_notes:
  revision_awareness: Sigo la revisión POB de 'execute judgment with him' a 'render judgment concerning him' (κρίσιν...μετ᾿ αὐτοῦ); el español 'dicta sentencia respecto a él' refleja esa adjudicación formal.
  spanish_consistency_notes:
  - '''dicta sentencia'' para ποίησον κρίσιν en contexto judicial'
  - '''gracia'' para χάρις (glosario POB)'
  - '''el Dios de los hebreos'' para ὁ Θεὸς τῶν Ἑβραίων'
