  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/012/003.yaml
  text: And the chief of them said to me, “You are not a slave, for your appearance also makes it plain.” But I told them plainly that I was their slave.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:30Z'
    unchanged: false
    changes_summary: Adjusted word order from 'I plainly told them' to 'I told them plainly' for more natural formal English while preserving the emphatic sense of δηλοῖ/δηλοῖ λέγω. No lexical content changed.
translation:
  language: es
  text: 'Y me dijo el mayor de ellos: «No eres esclavo, porque también tu aspecto lo deja claro». Pero yo les dije claramente que era su esclavo.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: δοῦλος
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  lexicon: δοῦλος
  rationale: POB eligió 'slave' por su fuerza léxica; 'esclavo' conserva esa relación de propiedad/sometimiento mejor que 'siervo', que suaviza indebidamente el término.
- source_word: ὁ μείζων αὐτῶν
  english_pob_choice: the chief of them
  chosen_spanish: el mayor de ellos
  alternatives_spanish:
  - el jefe de ellos
  - el principal de ellos
  lexicon: μείζων
  rationale: '''Mayor'' reproduce el comparativo de rango o preeminencia sin introducir una jerarquía más específica de la que el griego exige.'
- source_word: δηλοῖ
  english_pob_choice: makes it plain
  chosen_spanish: lo deja claro
  alternatives_spanish:
  - lo muestra
  - lo hace evidente
  lexicon: δηλόω
  rationale: '''Lo deja claro'' comunica la idea de evidencia manifiesta con naturalidad en español y conserva la fuerza declarativa del verbo griego.'
- source_word: ὄψις
  english_pob_choice: appearance
  chosen_spanish: aspecto
  alternatives_spanish:
  - apariencia
  - semblante
  lexicon: ὄψις
  rationale: '''Aspecto'' es un equivalente amplio y digno que puede abarcar presencia visible sin sonar demasiado coloquial; mantiene el sentido externo señalado por el griego.'
theological_decisions:
- issue: Autoidentificación de Joseph como esclavo en un relato de humillación y estatus social
  english_pob_reading: I told them plainly that I was their slave.
  chosen_spanish_reading: yo les dije claramente que era su esclavo
  alternative_spanish_readings:
  - yo les declaré claramente que era su esclavo
  - yo les dije claramente que yo era su esclavo
  rationale: No se atenúa la afirmación con 'siervo' ni se la espiritualiza; la frase conserva la tensión social explícita del texto y la reiteración enfática del pronombre implícito en el griego.
  doctrine_reference: Narrative humility / social status in the Testament of Joseph
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail en inglés, que solo ajustó el orden de 'plainly' sin cambiar el contenido léxico; por ello la versión española refleja una dicción natural ('les dije claramente') sin introducir cambios de sentido.
  spanish_consistency_notes:
  - Se mantiene 'esclavo' como equivalente consistente del griego δοῦλος.
  - Se evita 'SEÑOR' o 'Cristo' porque no aparecen en este versículo.
  - La puntuación con comillas angulares sigue la norma editorial en español.
  - '''Mayor de ellos'' conserva el matiz comparativo de rango del original sin añadir cargo específico.'
