  text: Λέγει δέ μοι ὁ μείζων αὐτῶν¹⁶· *Οὐκ εἶ δοῦλος¹⁷, ὅτι καὶ¹⁸ ἡ ὄψις σου δηλοῖ¹⁹. Ἐγὼ δὲ *λέγω αὐτοῖς²⁰ ὅτι¹⁸ δοῦλος ⌜αὐτῶν⌝ ὑπάρχω²¹.
