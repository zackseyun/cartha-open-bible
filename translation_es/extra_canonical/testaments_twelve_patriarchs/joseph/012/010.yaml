id: T12P.JOS.12.10
reference: Testament of Joseph 12:10
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 256-287, Joseph pilot)
  text: '*Καὶ λέγει τῷ ἀνδρὶ αὐτῆς⁸, *ὅτι ἐπλούτησεν ὁ μετάβολος⁹ ἐν χερσίν¹⁰ *τινος νέου¹¹ Ἑβραίου, λέγουσι¹² δὲ ὅτι ⌜καὶ¹³ κλοπῇ ἔκλεψαν¹⁴ αὐτὸν¹⁵ ἐκ γῆς¹⁶ Χαναάν.'
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/012/010.yaml
  text: And she said to her husband, “The merchant has grown rich through the hands of a certain young Hebrew; and they say that he also was stolen by theft from the land of Canaan.”
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:32Z'
    unchanged: false
    changes_summary: Changed 'by the hands' to 'through the hands' for more natural English while preserving the idiom, and added 'also' to reflect καὶ in the final clause. Kept 'stolen by theft' as a formally faithful rendering of the emphatic Greek.
translation:
  language: es
  text: 'Y le dijo a su marido: «El mercader se ha enriquecido por las manos de cierto joven hebreo, y dicen que también fue robado por hurto[a] de la tierra de Canaán».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Construcción griega enfática (κλοπῇ ἔκλεψαν, 'robaron con robo'); el sentido es 'fue secuestrado/robado de manera flagrante' de Canaán.
    reason: lexical_alternative
lexical_decisions:
- source_word: μετάβολος
  english_pob_choice: merchant
  chosen_spanish: mercader
  alternatives_spanish:
  - comerciante
  - tratante
  lexicon: LSJ
  rationale: En este pasaje del cap. 12 el POB usa 'merchant' (mercader); en cap. 13 cambiará a 'broker' (intermediario). Mantengo 'mercader' aquí por consistencia con el inglés y el contexto comercial.
- source_word: ἐπλούτησεν
  english_pob_choice: has grown rich
  chosen_spanish: se ha enriquecido
  alternatives_spanish:
  - se ha hecho rico
  - se enriqueció
  lexicon: LSJ
  rationale: πλουτέω aoristo/perfecto; 'se ha enriquecido' es la forma idiomática neutra para denotar el resultado actual del enriquecimiento.
- source_word: ἐν χερσίν
  english_pob_choice: through the hands
  chosen_spanish: por las manos
  alternatives_spanish:
  - por mano
  - a través de
  lexicon: LSJ
  rationale: Idioma bíblico de agencia; sigo la revisión POB que cambió 'by the hands' a 'through the hands' para inglés más natural; en español 'por las manos' conserva la idea instrumental.
- source_word: καὶ κλοπῇ ἔκλεψαν αὐτὸν
  english_pob_choice: he also was stolen by theft
  chosen_spanish: también fue robado por hurto
  alternatives_spanish:
  - lo robaron por hurto
  - fue secuestrado
  lexicon: LSJ
  rationale: Construcción enfática 'cognado interno' (κλοπῇ ἔκλεψαν); el POB conserva 'stolen by theft' como rendición formalmente fiel; mantengo el énfasis con 'robado por hurto'. El 'también' refleja el καὶ añadido en la revisión.
translation_notes:
  revision_awareness: Sigo la revisión POB que (1) cambió 'by the hands' a 'through the hands' y (2) añadió 'also' para reflejar καὶ en la cláusula final. Conservo 'stolen by theft' como rendición formalmente fiel del griego enfático.
  spanish_consistency_notes:
  - '''mercader'' para μετάβολος en cap. 12 (cap. 13 usará ''corredor/intermediario'' siguiendo POB)'
  - '''por las manos'' para ἐν χερσίν idioma de agencia'
  - '''robado por hurto'' para preservar el énfasis del cognado interno griego'
