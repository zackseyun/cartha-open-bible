translation:
  language: es
  text: 'Y me dice el mayor de ellos: «Tú no eres esclavo, porque también tu apariencia lo delata». Pero yo les decía que era esclavo de ellos.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: δοῦλος
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  lexicon: δοῦλος
  rationale: El contexto contrapone explícitamente la condición de esclavo; “esclavo” preserva la fuerza léxica que el inglés POB ya documenta. “Siervo” suavizaría indebidamente la afirmación y perdería la tensión del pasaje.
- source_word: ὄψις
  english_pob_choice: appearance
  chosen_spanish: apariencia
  alternatives_spanish:
  - aspecto
  - semblante
  lexicon: ὄψις
  rationale: “Apariencia” comunica bien en español la idea visible que permite inferir la condición de José. Mantiene la referencia a lo observable sin añadir matices no presentes en el griego.
- source_word: δηλοῖ
  english_pob_choice: makes it plain
  chosen_spanish: lo delata
  alternatives_spanish:
  - lo hace evidente
  - lo pone en claro
  lexicon: δηλόω
  rationale: “Lo delata” conserva la idea de que la apariencia revela la condición de modo visible e inequívoco. Es ligeramente más idiomático que una calca y sigue el sentido del griego/inglés sin exagerar.
- source_word: λέγω αὐτοῖς
  english_pob_choice: I told them plainly
  chosen_spanish: yo les decía
  alternatives_spanish:
  - yo les dije claramente
  - yo les respondía
  lexicon: λέγω
  rationale: El griego presente histórico puede expresar relato; “les decía” mantiene esa fluidez narrativa. Aunque el inglés añade “plainly”, el núcleo es la afirmación continua de José; en español se deja la claridad apoyada por el contenido mismo del enunciado.
- source_word: ὑπάρχω
  english_pob_choice: I was
  chosen_spanish: era
  alternatives_spanish:
  - me hallaba
  - resultaba ser
  lexicon: ὑπάρχω
  rationale: “Era” transmite la afirmación de estado/condición sin sobrecargar el verbo. El predicado de pertenencia (“de ellos”) preserva la relación posesiva implícita en el griego.
theological_decisions:
- issue: Autoidentificación de José como esclavo frente a la negación de sus interlocutores
  english_pob_reading: You are not a slave... But I told them plainly that I was their slave.
  chosen_spanish_reading: Tú no eres esclavo... yo les decía que era esclavo de ellos.
  alternative_spanish_readings:
  - Tú no eres esclavo... yo les dije claramente que era su esclavo
  - '...que era esclavo suyo'
  rationale: 'Se conserva la tensión del testimonio: los otros niegan su condición, pero José la afirma. No se suaviza a “siervo”, porque el pasaje depende de la contraposición social fuerte que el original y el inglés POB mantienen.'
  doctrine_reference: Texto histórico/narrativo; no formula doctrina, pero sí preserva la realidad social expresada por el autor.
translation_notes:
  revision_awareness: The latest revision pass reported the verse unchanged and no changes needed; this draft follows the current source and English audit trail without introducing revisions not present there.
  spanish_consistency_notes:
  - Se usa “esclavo” de forma consistente con el valor léxico documentado de δοῦλος en este registro.
  - Se mantiene “apariencia” para ὄψις y una estructura narrativa natural en español sin perder el contraste del enunciado.
  - No se introducen términos eclesiásticos tradicionales que no están sustentados por el pasaje.
