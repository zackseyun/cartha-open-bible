base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/012/004.yaml
  text: And when we had come into Egypt, they disputed concerning me, as to who, after betraying me, would receive the gold.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:30Z'
    unchanged: false
    changes_summary: Replaced 'deceive the merchant and receive money for me' with 'after betraying me, would receive gold' to reflect προδοὺς ('betraying'), χρυσίον ('gold'), and the Greek construction more accurately. Removed 'the merchant,' which is not in the source text.
translation:
  language: es
  text: Y cuando habíamos llegado a Egipto, discutían acerca de mí, sobre quién, después de haberme traicionado, recibiría el oro.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: εἰς Αἴγυπτον ἐφθάσαμεν
  english_pob_choice: had come into Egypt
  chosen_spanish: habíamos llegado a Egipto
  alternatives_spanish:
  - habíamos entrado en Egipto
  - habíamos venido a Egipto
  lexicon: εἰς, Αἴγυπτος, φθάνω
  rationale: «Llegado a Egipto» expresa bien el arribo del grupo sin forzar un matiz espacial más rígido que el griego. «Entrado» es posible, pero «llegado» suena más natural en español y mantiene el sentido del POB inglés.
- source_word: ἐμάχοντο περὶ ἐμοῦ
  english_pob_choice: they disputed concerning me
  chosen_spanish: discutían acerca de mí
  alternatives_spanish:
  - contendían acerca de mí
  - reñían por mí
  lexicon: μάχομαι, περί
  rationale: El verbo griego sugiere disputa o contienda. «Discutían acerca de mí» comunica la idea sin introducir una pelea física explícita que el contexto no exige. «Contendían» sería más cercano al tono verbal, pero algo más pesado en español.
- source_word: τίς προδοὺς χρυσίον λάβῃ με
  english_pob_choice: who, after betraying me, would receive the gold
  chosen_spanish: quién, después de haberme traicionado, recibiría el oro
  alternatives_spanish:
  - quién, tras traicionarme, recibiría el oro
  - quién, habiéndome traicionado, recibiría el oro
  lexicon: τίς, προδούς, χρυσίον, λαμβάνω
  rationale: «Después de haberme traicionado» refleja con claridad el participio aoristo de προδοὺς y conserva la relación temporal del griego. Se mantiene «oro» porque χρυσίον es literalmente oro, y el pasaje revisado del POB inglés corrigió el anterior «money» hacia ese sentido material específico.
theological_decisions:
- issue: Naturaleza de la disputa sobre José
  english_pob_reading: they disputed concerning me
  chosen_spanish_reading: discutían acerca de mí
  alternative_spanish_readings:
  - contendían acerca de mí
  - se peleaban por mí
  rationale: No hay indicación explícita de una disputa doctrinal o judicial; el griego solo muestra contienda en torno a José. La traducción conserva esa neutralidad sin intensificar innecesariamente la escena.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del POB inglés, que corrigió la paráfrasis anterior para reflejar con más precisión προδοὺς («traicionando/betraying») y χρυσίον («oro»), y eliminó cualquier referencia a un «mercader» que no está en el griego.
  spanish_consistency_notes:
  - Se mantiene «oro» en lugar de «dinero» para corresponder a χρυσίον y al pasaje revisado del POB inglés.
  - Se usa un registro moderno y digno, evitando arcaísmos innecesarios.
  - No se introduce vocabulario eclesiástico ajeno al texto; la frase conserva su sencillez narrativa.
