source:
  edition: Charles 1908 Greek Versions (pages 256-287, Joseph pilot)
  text: Κατ᾽ ἐκεῖνον δὲ¹ τὸν καιρὸν κατῆει² Μεμφίς³ †ἐν λαμπήνῃ†⁴ *ἡ γυνὴ⁵ τοῦ Πεντεφρὶ⁶ ⌜μετὰ δόξης πολλῆς, ὅτι ἤκουσε περὶ ἐμοῦ παρὰ τῶν εὐνούχων αὐτῆς⁷.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/012/009.yaml
  text: Now at that time the wife of Pentephri came down to Memphis with great splendor, because she had heard about me from her eunuchs.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:32Z'
    unchanged: false
    changes_summary: Replaced 'with great display' with 'with great splendor' for a more natural and formally appropriate rendering of μετὰ δόξης πολλῆς, while preserving the meaning. All source elements are otherwise retained.
translation:
  language: es
  text: En aquel tiempo, la mujer de Pentefri[a] descendió a Menfis en litera[c], con gran esplendor, porque había oído acerca de mí por sus eunucos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Pentefri es la forma griega del nombre egipcio asociado con Potifar.
    reason: cross_reference
  - marker: b
    text: El término griego literalmente denota eunucos, aunque puede extenderse a oficiales de la corte; aquí el contexto cortesano sostiene el sentido literal.
    reason: lexical_alternative
  - marker: c
    text: Gr. ἐν λαμπήνῃ, 'en litera' o 'en palanquín'; el término está marcado con obeli en el texto griego, indicando dificultad textual.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατῆει
  english_pob_choice: came down
  chosen_spanish: descendió
  alternatives_spanish:
  - bajó
  - vino
  lexicon: LSJ
  rationale: κατέρχομαι/κάτειμι denota movimiento descendente; 'descendió' conserva el matiz topográfico/protocolar griego.
- source_word: μετὰ δόξης πολλῆς
  english_pob_choice: with great splendor
  chosen_spanish: con gran esplendor
  alternatives_spanish:
  - con gran pompa
  - con mucha gloria
  lexicon: LSJ
  rationale: δόξα aquí denota magnificencia exterior, no gloria abstracta; sigo la revisión POB que cambió 'great display' a 'great splendor' por una rendición más formal y natural.
- source_word: εὐνούχων
  english_pob_choice: eunuchs
  chosen_spanish: eunucos
  alternatives_spanish:
  - chambelanes
  - oficiales de la corte
  lexicon: LSJ
  rationale: Manteniendo la decisión POB de conservar el término literal del griego en este contexto cortesano egipcio.
translation_notes:
  revision_awareness: Sigo la revisión POB de 'great display' a 'great splendor' para una rendición más natural y formalmente apropiada de μετὰ δόξης πολλῆς.
  spanish_consistency_notes:
  - '''esplendor'' para δόξα en sentido de magnificencia exterior'
  - '''eunucos'' para εὐνοῦχοι'
  - '''descendió'' para κατῆει'
  - '''Pentefri'' transliteración estándar del nombre Πεντεφρὶ'
