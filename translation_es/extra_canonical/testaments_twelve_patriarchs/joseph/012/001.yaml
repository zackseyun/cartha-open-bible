base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/012/001.yaml
  text: And when I was coming with the Ishmaelites, they kept asking me, saying, “Are you a slave?” And I said that I was a household slave, so that I might not put my brothers to shame.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:56Z'
    unchanged: false
    changes_summary: Retained 'slave' for δοῦλος and added the missing purpose clause 'so that I might not disgrace my brothers,' while preserving the source’s wording naturally in English.
translation:
  language: es
  text: 'Y cuando yo venía con los ismaelitas, me preguntaban, diciendo: «¿Eres esclavo?». Y yo dije que era esclavo de casa, para no avergonzar a mis hermanos.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Δοῦλος / δοῦλός
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - sirviente
  lexicon: δοῦλος
  rationale: La elección inglesa retiene la fuerza social y jurídica de δοῦλος; en español, «esclavo» comunica esa misma fuerza mejor que «siervo», que suaviza indebidamente el término. «Esclavo de casa» refleja el matiz contextual de pertenencia doméstica/household slave.
- source_word: ἐξ οἴκου
  english_pob_choice: household slave
  chosen_spanish: esclavo de casa
  alternatives_spanish:
  - esclavo de la casa
  - esclavo doméstico
  lexicon: οἶκος
  rationale: El griego añade un matiz de casa/hogar. «Esclavo de casa» conserva la relación con el οἶκος sin introducir una perífrasis más pesada; «esclavo doméstico» sería más explicativo pero menos directo.
- source_word: ἵνα μὴ αἰσχύνω
  english_pob_choice: so that I might not put my brothers to shame
  chosen_spanish: para no avergonzar a mis hermanos
  alternatives_spanish:
  - para no deshonrar a mis hermanos
  - para no poner en vergüenza a mis hermanos
  lexicon: αἰσχύνω
  rationale: El verbo expresa causar vergüenza o deshonra. «Avergonzar» mantiene la relación causal con la vergüenza, y es natural en español; «deshonrar» sería posible, pero desplaza el énfasis hacia honor social en un registro algo más fuerte.
- source_word: ἐπηρώτων με λέγοντες
  english_pob_choice: they kept asking me, saying
  chosen_spanish: me preguntaban, diciendo
  alternatives_spanish:
  - me seguían preguntando, diciendo
  - me interrogaban, diciendo
  lexicon: ἐπερωτάω
  rationale: La forma imperfecta comunica repetición o insistencia. «Me preguntaban» reproduce esa continuidad; «me seguían preguntando» es más explícito, pero añade una intensificación no necesaria.
theological_decisions:
- issue: Cómo traducir δοῦλος sin suavizar la autoidentificación del hablante
  english_pob_reading: I was a household slave
  chosen_spanish_reading: era esclavo de casa
  alternative_spanish_readings:
  - era siervo de casa
  - era sirviente de casa
  rationale: La tradición POB conservó 'slave' por la fuerza lexical. En español, «esclavo» preserva el mismo peso semántico y evita domesticar el término. La adición «de casa» sigue el contexto del οἶκος y explica el matiz sin cambiar la identidad servil declarada.
  doctrine_reference: No doctrinal issue; lexical fidelity to social status terminology.
- issue: 'Final purpose clause: avoiding shame/disgrace toward the brothers'
  english_pob_reading: so that I might not put my brothers to shame
  chosen_spanish_reading: para no avergonzar a mis hermanos
  alternative_spanish_readings:
  - para no deshonrar a mis hermanos
  - para que no quedaran avergonzados mis hermanos
  rationale: El texto expresa propósito, no una nueva acción. La construcción infinitiva en español conserva la finalidad de forma natural. «Avergonzar» mantiene el vínculo con αἰσχύνω; «deshonrar» es posible, pero más interpretativa.
  doctrine_reference: Ethical self-presentation and honor/shame dynamics in the narrative context.
translation_notes:
  revision_awareness: The English audit trail shows a revision that restored the missing purpose clause 'so that I might not disgrace my brothers' and kept 'slave' for δοῦλος. The Spanish draft likewise preserves both the social-status term and the purpose clause, while rendering the latter idiomatically as a purpose infinitive.
  spanish_consistency_notes:
  - Mantengo «esclavo» para δοῦλος conforme a la política POB y para conservar la fuerza lexical.
  - Uso «ismaelitas» en minúscula por ser gentilicio común en español.
  - Conservo la estructura narrativa con comillas españolas y puntuación natural para publicación.
  - «Esclavo de casa» funciona como equivalente directo del household slave sin perder naturalidad en español.
