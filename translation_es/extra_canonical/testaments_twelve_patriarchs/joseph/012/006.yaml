base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/012/006.yaml
  text: But the Lord gave me favor in the eyes of the merchant, and he entrusted his house to me.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:30Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Pero el Señor me dio gracia ante los ojos del mercader, y él me confió su casa.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  - Dios
  lexicon: Κύριος
  rationale: En este dicho de Joseph, el contexto inmediato no exige explicitar el nombre divino; el inglés POB conserva la forma relacional 'the Lord'. En español, 'el Señor' reproduce bien esa lectura sin forzar una decisión interpretativa adicional.
- source_word: χάριν
  english_pob_choice: favor
  chosen_spanish: gracia
  alternatives_spanish:
  - favor
  - benevolencia
  lexicon: χάρις
  rationale: Aunque el inglés POB eligió 'favor', el griego usa χάριν, cuyo campo semántico incluye 'gracia' y 'favor'. En español, 'gracia' mantiene la amplitud del término y suena más natural como don concedido por Dios o por la providencia en este contexto.
- source_word: τοῦ μεταβόλου
  english_pob_choice: the merchant
  chosen_spanish: el mercader
  alternatives_spanish:
  - el comerciante
  - el vendedor
  lexicon: μεταβόλου
  rationale: El término griego designa a un comerciante o negociante; 'mercader' conserva bien el matiz antiguo-comercial y coincide con la idea del inglés POB. 'Comerciante' sería posible, pero 'mercader' resulta más transparente para este tipo de relato.
- source_word: τὸν οἶκον αὐτοῦ
  english_pob_choice: his house
  chosen_spanish: su casa
  alternatives_spanish:
  - su hogar
  - su casa y su administración
  lexicon: οἶκος
  rationale: Se traduce de forma directa como 'su casa', respetando la ambigüedad normal de οἶκος entre vivienda y casa/administración doméstica. El contexto de confianza/encargo permite mantener la expresión breve sin añadir elementos no presentes.
theological_decisions:
- issue: Rendered divine-name title in a text that uses Κύριος without an explicit Hebrew source form.
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  - Dios
  rationale: La forma griega aquí es Κύριος y el audit trail inglés también mantiene 'the Lord'. Sin un indicador textual adicional de cita directa del Tetragrámaton en este versículo, se conserva la equivalencia titular 'el Señor' en vez de introducir 'Yahvé'.
  doctrine_reference: Divine-name rendering policy; source-text caution for Greek Κύριος
translation_notes:
  revision_awareness: Se siguió la revisión más reciente, que indicó que no eran necesarios cambios. Por eso se mantiene la línea de sentido del texto griego y del inglés POB, con una sola decisión de ajuste léxico relevante en χάριν.
  spanish_consistency_notes:
  - Se mantiene un tono bíblico sobrio y moderno, sin calcos excesivos.
  - '''Señor'' se conserva como título relacional coherente con el griego Κύριος en este contexto.'
  - '''Mercader'' reproduce el perfil del referente comercial de τοῦ μεταβόλου sin ampliar innecesariamente el texto.'
  - No se añaden notas textuales porque el expediente no documenta variantes que lo requieran.
