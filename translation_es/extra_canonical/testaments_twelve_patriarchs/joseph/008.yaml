  revised_spanish_text: "6. Y ella me dijo: «Mira, pues, tú me amas. Que esto me baste: solo toma en cuenta mi vida y la de mis hijos, y tengo esperanza de que también obtendré mi deseo»[a].\n\n    7. Pero ella no sabía que yo hablaba así por causa de mi Señor, y no por causa de ella.\n\n    8. Porque si alguien cae bajo la pasión del deseo y queda esclavizado a ella, como también ella lo estaba, aun si oye algo bueno, lo toma en relación con esa pasión, hacia su mal deseo.\n\n\n    1. Así que les digo, hijos míos, que era como a la hora sexta cuando ella se apartó de mí. Y, doblando la rodilla ante el Señor durante todo aquel día y toda aquella noche, al amanecer me levanté, llorando y pidiendo liberación de ella.\n\n    2. Al fin, con mala intención, se aferró a mis vestidos por la fuerza, arrastrándome violentamente hacia el acto sexual[b].\n\n    3. Entonces, cuando vi que, en su frenesí, tenía sujeto mi túnico, lo dejé y hui desnudo.\n\n    4. Pero ella, sujetándolo, me calumnió; y\
    \ cuando su marido vino, me arrojó a la cárcel de su casa, y al día siguiente, después de azotarme, me envió a la mazmorra de Faraón.\n\n    5. Y mientras yo estaba en cadenas[c], la mujer egipcia estaba acongojada por la tristeza."
