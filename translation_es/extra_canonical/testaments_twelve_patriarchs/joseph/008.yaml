translation:
  language: es
  text: "6. Y ella me dijo: «Mira, pues, tú me amas. Que esto me baste: solo toma en cuenta mi vida y la de mis hijos, y tengo esperanza de que también obtendré mi deseo»[a].\n\n    7. Pero ella no sabía que yo hablaba así por causa de mi Señor, y no por causa de ella.\n\n    8. Porque si alguien cae bajo la pasión del deseo y queda esclavizado a ella, como también ella lo estaba, aun si oye algo bueno, lo toma en relación con esa pasión, hacia su mal deseo.\n\n\n    1. Así que les digo, hijos míos, que era como a la hora sexta cuando ella se apartó de mí. Y, doblando la rodilla ante el Señor durante todo aquel día y toda aquella noche, al amanecer me levanté, llorando y pidiendo liberación de ella.\n\n    2. Al fin, con mala intención, se aferró a mis vestidos por la fuerza, arrastrándome violentamente hacia el acto sexual[b].\n\n    3. Entonces, cuando vi que, en su frenesí, tenía sujeto mi túnico, lo dejé y hui desnudo.\n\n    4. Pero ella, sujetándolo, me calumnió; y cuando su marido\
    \ vino, me arrojó a la cárcel de su casa, y al día siguiente, después de azotarme, me envió a la mazmorra de Faraón.\n\n    5. Y mientras yo estaba en cadenas[c], la mujer egipcia estaba acongojada por la tristeza."
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El texto griego en este versículo está textualmente enredado en el testimonio representado por la capa de OCR. El sentido general es claro: ella retuvo el vestido de José, lo acusó falsamente, y él fue encarcelado y más tarde enviado a la prisión de Faraón.'
    reason: textual_variant
  - marker: b
    text: 'O: «hacia la unión sexual». El griego συνουσία es un término explícito para relaciones sexuales.'
    reason: lexical_alternative
  - marker: c
    text: La escena evoca Génesis 39:12, donde José deja su vestido y huye de la mujer de Potifar.
    reason: cross_reference
lexical_decisions:
- source_word: ἀντιποιῆσαι τῆς ζωῆς μου
  english_pob_choice: take thought for my life
  chosen_spanish: toma en cuenta mi vida
  alternatives_spanish:
  - ocúpate de mi vida
  - presta atención a mi vida
  - toma a tu cargo mi vida
  lexicon: LSJ
  rationale: El giro expresa que ella pide que él haga suya la preocupación por su vida, sin pasar a una formulación demasiado interpretativa. «Toma en cuenta» mantiene la fuerza pragmática y evita añadir responsabilidad explícita que no está en el griego.
- source_word: προσδοκίαν ἀπολαῦσαι τῆς ἐπιθυμίας μου
  english_pob_choice: hope that I shall also obtain my desire
  chosen_spanish: tengo esperanza de que también obtendré mi deseo
  alternatives_spanish:
  - espero también obtener mi deseo
  - tengo la esperanza de alcanzar mi deseo
  - confío en gozar también de mi deseo
  lexicon: LSJ
  rationale: ἀπολαύω aquí apunta a obtener o alcanzar la realización del deseo. «Obtendré mi deseo» conserva la referencia concreta al cumplimiento del anhelo, sin suavizar el trasfondo sexual del pasaje.
- source_word: διὰ τὸν Κύριόν μου
  english_pob_choice: because of my Lord
  chosen_spanish: por causa de mi Señor
  alternatives_spanish:
  - a causa de mi Señor
  - por mi Señor
  - por respeto a mi Señor
  lexicon: LSJ
  rationale: Se conserva «Señor» para κύριος según la decisión del POB cuando el referente es Dios. «Por causa de» refleja el motivo causal y mantiene el matiz de fundamento religioso.
- source_word: ὑποπέσῃ πάθει ἐπιθυμίας
  english_pob_choice: falls under the passion of desire
  chosen_spanish: cae bajo la pasión del deseo
  alternatives_spanish:
  - cae en una pasión de deseo
  - cae bajo un deseo apasionado
  - se ve arrastrado por la pasión del deseo
  lexicon: LSJ
  rationale: La imagen de quedar sometido o dominado por la pasión se preserva con «cae bajo». «Pasión del deseo» mantiene el vínculo sintáctico entre πάθος y ἐπιθυμία sin diluir la fuerza moral del texto.
- source_word: δουλωθῇ αὐτῷ
  english_pob_choice: is enslaved to it
  chosen_spanish: queda esclavizado a ella
  alternatives_spanish:
  - es hecho esclavo de ella
  - queda en esclavitud bajo ella
  - se vuelve esclavo de ella
  lexicon: LSJ
  rationale: Se mantiene el lenguaje de esclavitud, que es parte del argumento moral y psicológico del pasaje. «Queda esclavizado» suena natural en español y conserva la pasividad del verbo.
- source_word: ἐκλαμβάνει αὐτὸ πρὸς τὴν πονηρὰν ἐπιθυμίαν
  english_pob_choice: takes it in relation to that passion, toward his evil desire
  chosen_spanish: lo toma en relación con esa pasión, hacia su mal deseo
  alternatives_spanish:
  - lo interpreta según esa pasión, hacia su mal deseo
  - lo entiende a la luz de esa pasión, hacia su mal deseo
  - lo aplica a esa pasión, hacia su mal deseo
  lexicon: LSJ
  rationale: «Toma en relación con» conserva el carácter cognitivo del verbo sin hacer más explícita de lo que permite el griego la idea de interpretación. Se mantiene la tensión entre percepción y deseo desordenado.
- source_word: κλίνας γόνυ
  english_pob_choice: bending my knee
  chosen_spanish: doblando la rodilla
  alternatives_spanish:
  - inclinando la rodilla
  - arrodillándome
  - doblaba mi rodilla
  lexicon: LSJ
  rationale: La expresión conserva el gesto de oración con un registro sobrio y bíblico, sin introducir una forma demasiado libre. En español, «doblando la rodilla» comunica bien el acto reverente.
- source_word: λύτρωσιν ἐξ αὐτῆς
  english_pob_choice: deliverance from her
  chosen_spanish: liberación de ella
  alternatives_spanish:
  - rescate de ella
  - redención de ella
  - salvación de ella
  lexicon: LSJ
  rationale: En este contexto, λύτρωσις expresa libramiento práctico de la mujer, no redención salvífica. «Liberación» conserva la idea de quedar fuera de su dominio.
- source_word: συνουσίαν
  english_pob_choice: intercourse
  chosen_spanish: el acto sexual
  alternatives_spanish:
  - la relación sexual
  - la unión sexual
  - el coito
  lexicon: LSJ
  rationale: El término griego es explícito y no debe atenuarse. «El acto sexual» comunica la referencia de manera clara y digna en español, evitando tanto eufemismo como crudeza innecesaria.
- source_word: μαινομένη
  english_pob_choice: in her frenzy
  chosen_spanish: en su frenesí
  alternatives_spanish:
  - enloquecida
  - furiosa
  - fuera de sí
  lexicon: LSJ
  rationale: Se conserva la imagen de desorden mental y emocional que presenta el texto. «Frenesí» es preciso y adecuado al tono narrativo.
- source_word: χιτών
  english_pob_choice: tunic
  chosen_spanish: túnico
  alternatives_spanish:
  - túnica
  - vestidura interior
  - ropa
  lexicon: LSJ
  rationale: «Túnico» preserva la precisión del objeto y la conexión con el eco narrativo de Génesis. Es más específico que «vestido» o «ropa».
- source_word: ἐσυκοφάντησέ με
  english_pob_choice: slandered me
  chosen_spanish: me calumnió
  alternatives_spanish:
  - me difamó
  - me acusó falsamente
  - me injurió
  lexicon: LSJ
  rationale: La acusación es falsa y maliciosa; «calumnió» reproduce esa carga de forma natural en español. Se conserva la referencia a una denuncia infundada sin expandirla demasiado.
- source_word: εἰρκτήν
  english_pob_choice: dungeon
  chosen_spanish: mazmorra
  alternatives_spanish:
  - prisión
  - calabozo
  - cárcel
  lexicon: LSJ
  rationale: «Mazmorra» transmite mejor la severidad del encierro asociado a Faraón y conserva el color narrativo del pasaje. Evita una nivelación excesiva con «prisión».
- source_word: συνείχετο ἀπὸ τῆς λύπης
  english_pob_choice: was constrained by grief
  chosen_spanish: estaba acongojada por la tristeza
  alternatives_spanish:
  - estaba abrumada por la tristeza
  - estaba afligida por la tristeza
  - la tristeza la oprimía
  lexicon: LSJ
  rationale: El verbo sugiere presión o aflicción intensa; «congojada» recoge ese peso interior de manera idiomática. «Tristeza» expresa λύπη con naturalidad, sin perder el matiz de dolor emocional.
theological_decisions:
- issue: Referente de Κύριός μου / mi Señor
  english_pob_reading: Joseph refers to God as his Lord, indicating that his words were spoken out of reverence and moral restraint before God.
  chosen_spanish_reading: José se refiere a Dios como su Señor, de modo que su negativa nace del temor reverente y la obediencia ante Dios.
  alternative_spanish_readings:
  - José se refiere a su amo humano como Señor
  - el pasaje deja deliberadamente ambiguo el referente de Señor
  rationale: El flujo del pasaje, junto con la oración explícita al Señor, favorece la referencia divina. Mantener «mi Señor» preserva la lectura teológica del testimonio sin borrar la posible tensión narrativa.
  doctrine_reference: 'DOCTRINE.md: κύριος → Señor; conservar la lectura más apoyada por el contexto y no neutralizar el referencial teológico cuando es claro.'
- issue: Sentido moral y psicológico de la pasión del deseo
  english_pob_reading: The text teaches that lust enslaves perception itself, so that even good speech is reinterpreted as serving evil desire.
  chosen_spanish_reading: El texto enseña que la pasión desordenada esclaviza la percepción, de modo que incluso una palabra buena se toma en relación con ese deseo malo.
  alternative_spanish_readings:
  - solo describe el malentendido de la mujer egipcia
  - es únicamente un proverbio moral sin relación con la escena
  rationale: La sentencia generaliza a partir del caso de ella y, a la vez, vuelve a la exhortación a los hijos. La traducción conserva la dimensión psicológica y moral sin convertir el pasaje en una simple observación sociológica.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión moral del texto y su aplicación exhortativa sin diluir el peso del lenguaje de esclavitud y deseo.'
translation_notes:
  revision_awareness: El borrador sigue la última revisión inglesa, que afinó ἀντιποιῆσαι como «take thought for», ajustó el hablante a «spoke thus» y prefirió «takes it in relation to» para ἐκλαμβάνει. También respeta la eliminación de «to you» en el inglés revisado y mantiene el marco textual difícil de la sección con una redacción estable y publicable.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος cuando el contexto apunta a Dios, conforme al criterio del proyecto.
  - Se conserva el lenguaje de esclavitud para δουλόω/δουλόωμαι con «esclavizado», por ser parte del argumento moral.
  - Se usa «túnico» para χιτών y «mazmorra» para εἰρκτή para sostener el color narrativo y la precisión lexical.
  - Se evita suavizar συνουσία con un eufemismo ambiguo; la nota aclara la alternativa de lectura.
  - Se traduce λύπη con «tristeza» y el efecto resultante con «congojada» para reflejar la presión emocional del verbo griego.
