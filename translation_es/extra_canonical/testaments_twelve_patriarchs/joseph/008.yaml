base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/008.yaml
  text: '6[8:4]. And she said to me, “See then, you love me. Let this be enough for me: only take thought for my life and for my children, and I have hope that I shall also obtain my desire.” 7. But she did not know that I spoke thus because of my Lord, and not because of her. 8. For if anyone falls under the passion of desire and is enslaved to it, as she also was, even if he hears something good, he takes it in relation to that passion, toward his evil desire[8:2].


    1. So I say, my children, that it was about the sixth hour when she left me. And bending my knee to the Lord all that day and all that night, toward dawn I rose, weeping and asking for deliverance from her. 2. At last, with evil intent, she seized my garments by force, dragging me violently toward intercourse. 3. Therefore, when I saw that in her frenzy she had hold of my tunic, I left it behind and fled naked. 4. But she, taking hold of it, slandered me; and when her husband came, he cast me into prison in his house, and on the next day, after scourging me, he sent me into Pharaoh’s dungeon. 5. And while I was in chains[8:3], the Egyptian woman was constrained by grief.'
  footnotes:
  - marker: '8:4'
    text: 'The Greek text in this verse is textually tangled in the witness represented by the OCR layer. The sense is clear overall: she kept Joseph''s garment, falsely accused him, and he was imprisoned and later sent to Pharaoh''s prison.'
    reason: textual_variant
  - marker: '8:2'
    text: Or 'into sexual union.' The Greek συνουσία is an explicit term for sexual relations.
    reason: lexical_alternative
  - marker: '8:3'
    text: This scene echoes Gen 39:12, where Joseph leaves his garment and flees from Potiphar's wife.
    reason: cross_reference
