source:
  edition: Charles 1908 Greek Versions (pages 256-287, Joseph pilot)
  text: Ἐν διαβολαῖς καὶ συνηγόρησέ μοι. Ἐν λόγοις³⁰ ἐνυπνίων³¹ πικροῖς³² καὶ³³ ἐρρύσατό με³⁴. Δοῦλος³⁵ καὶ ὕψωσέ³⁶ με.
