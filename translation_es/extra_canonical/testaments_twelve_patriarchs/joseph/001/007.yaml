base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/001/007.yaml
  text: Amid slanders he also spoke in my defense. By the bitter words of dreams he rescued me.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:14Z'
    unchanged: false
    changes_summary: Added 'also' to reflect καὶ with συνηγόρησέ, and revised 'talk' to the more literal 'words' for λόγοις while keeping the phrasing natural.
translation:
  language: es
  text: En medio de calumnias, también habló en mi defensa. Por las palabras amargas[a] de los sueños me rescató.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase 'las palabras amargas de los sueños' es de griego difícil; probablemente se refiere a las palabras hostiles y acusaciones relacionadas con los sueños de José.
    reason: alternative_reading
lexical_decisions:
- source_word: διαβολαῖς
  english_pob_choice: slanders
  chosen_spanish: calumnias
  alternatives_spanish:
  - falsas acusaciones
  - difamaciones
  lexicon: LSJ
  rationale: El plural 'calumnias' encaja con las acusaciones hostiles que José sufrió y conserva el lenguaje concreto del vicio.
- source_word: συνηγόρησέ μοι
  english_pob_choice: spoke in my defense
  chosen_spanish: habló en mi defensa
  alternatives_spanish:
  - abogó por mí
  - intercedió por mí
  lexicon: LSJ
  rationale: El matiz forense/legal es importante; este modismo en español preserva el sentido de vindicación divina con claridad.
- source_word: καὶ (con συνηγόρησέ)
  english_pob_choice: also (added in revision)
  chosen_spanish: también
  alternatives_spanish:
  - además
  lexicon: LSJ
  rationale: Refleja la fuerza de καὶ junto a συνηγόρησέ tal como la revisión inglesa la hizo explícita.
- source_word: λόγοις ... πικροῖς
  english_pob_choice: bitter words
  chosen_spanish: palabras amargas
  alternatives_spanish:
  - palabras hirientes
  - discursos amargos
  lexicon: LSJ
  rationale: Reproduce literalmente λόγοις ('palabras') más πικροῖς ('amargas'), siguiendo la revisión inglesa que prefirió 'words' sobre 'talk'.
- source_word: ἐρρύσατό
  english_pob_choice: rescued
  chosen_spanish: rescató
  alternatives_spanish:
  - libró
  - liberó
  lexicon: BDAG
  rationale: '''Rescató'' transmite la acción de salvación activa frente al peligro, paralelo al inglés POB.'
translation_notes:
  revision_awareness: El revisor inglés añadió 'also' para reflejar καὶ y cambió 'talk' por 'words' (más literal). La traducción española refleja ambos cambios. La revisión cruzada de Claude registró alta concordancia (0.93, agree).
  spanish_consistency_notes:
  - καὶ + verbo principal → 'también' cuando reforzativo, según la revisión inglesa.
  - λόγοις → 'palabras' (no 'discurso' o 'conversación') por mayor literalidad.
