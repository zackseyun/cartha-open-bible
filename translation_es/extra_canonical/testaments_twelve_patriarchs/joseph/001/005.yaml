  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 256-287, Joseph pilot)
  text: Ἐπράθην *εἰς δουλείαν¹⁹, *Καὶ ὁ πάντων δεσπότης²⁰ ἠλευθέρωσέν με· Εἰς αἰχμαλωσίαν ἐλήφθην²¹, Καὶ ἡ κραταιὰ αὐτοῦ χεὶρ ἐβοήθησέ μοι· Ἐν λιμῷ συνεσχέθην, Καὶ αὐτὸς ὁ Κύριος διέθρεψέ με²².
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/001/005.yaml
  text: I was sold into slavery, and the Master of all set me free. I was taken into captivity, and his mighty hand helped me. I was confined by famine, and the Lord himself nourished me.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:13Z'
    unchanged: false
    changes_summary: Changed 'was gripped by famine' to 'was confined by famine' to more closely reflect συνεσχέθην while keeping natural formal English. No other changes needed.
translation:
  language: es
  text: Fui vendido[a] como esclavo, y el Dueño de todos me libertó. Fui llevado a cautiverio, y su mano poderosa me ayudó. Fui estrechado[b] por el hambre, y el Señor mismo me sustentó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: ‘fui vendido a esclavitud’.'
    reason: source_note
  - marker: b
    text: El griego puede sugerir ‘fui constreñido / apretado’ por el hambre; ‘estrechado’ intenta conservar esa imagen.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰς δουλείαν
  english_pob_choice: into slavery
  chosen_spanish: como esclavo
  alternatives_spanish:
  - a esclavitud
  - en esclavitud
  lexicon: δουλεία
  rationale: El inglés POB conserva la fuerza del estado de esclavitud. En español, ‘como esclavo’ comunica el resultado personal y evita un giro más abstracto. Añadí la nota para transparentar que el griego expresa literalmente ‘a/para esclavitud’.
- source_word: δεσπότης
  english_pob_choice: Master of all
  chosen_spanish: Dueño de todos
  alternatives_spanish:
  - Señor de todos
  - Soberano de todos
  lexicon: δεσπότης
  rationale: ‘Dueño’ preserva la idea de autoridad y posesión del original sin introducir la carga litúrgica de ‘Señor’ donde el griego usa δεσπότης. ‘De todos’ refleja πάντων con el mismo alcance universal del inglés POB.
- source_word: ἠλευθέρωσέν με
  english_pob_choice: set me free
  chosen_spanish: me libertó
  alternatives_spanish:
  - me liberó
  - me puso en libertad
  lexicon: ἐλευθερόω
  rationale: ‘Libertó’ es un equivalente natural y elevado en español, manteniendo el acto decisivo de rescate/liberación que el inglés expresa con ‘set me free’.
- source_word: αἰχμαλωσίαν
  english_pob_choice: captivity
  chosen_spanish: cautiverio
  alternatives_spanish:
  - captividad
  - prisión
  lexicon: αἰχμαλωσία
  rationale: ‘Cautiverio’ es el término español más claro y digno para la condición de ser llevado preso. Evita la ambigüedad moderna de ‘captividad’ y respeta el paralelo con ‘sold into slavery’.
- source_word: ἡ κραταιὰ αὐτοῦ χεὶρ
  english_pob_choice: his mighty hand
  chosen_spanish: su mano poderosa
  alternatives_spanish:
  - su mano fuerte
  - su mano potente
  lexicon: χείρ
  rationale: ‘Mano poderosa’ conserva la imagen bíblica y el valor de κραταιά como fuerza eficaz. Es un calco naturalizado y plenamente comprensible en español.
- source_word: συνεσχέθην
  english_pob_choice: I was confined
  chosen_spanish: fui estrechado
  alternatives_spanish:
  - fui confinado
  - quedé oprimido
  lexicon: συνέχω
  rationale: El verbo griego transmite ser apretado/constreñido. ‘Fui estrechado’ preserva mejor esa compresión literal que ‘confinado’, aunque ‘confinado’ sigue siendo una posible lectura explicativa; la nota marca esta tensión semántica.
- source_word: διέθρεψέ με
  english_pob_choice: nourished me
  chosen_spanish: me sustentó
  alternatives_spanish:
  - me alimentó
  - me nutrió
  lexicon: διατρέφω
  rationale: ‘Sustentó’ mantiene el alcance de provisión y mantenimiento, no solo de alimento físico, concordando con el tono solemne del texto y con el inglés POB ‘nourished me’.
theological_decisions:
- issue: Uso de ‘Señor’ para Κύριος al final de la línea
  english_pob_reading: the Lord himself nourished me
  chosen_spanish_reading: el Señor mismo me sustentó
  alternative_spanish_readings:
  - Yahvé mismo me sustentó
  - el Dueño mismo me sustentó
  rationale: Aunque el proyecto prefiere ‘Yahvé’ para יהוה, aquí el griego usa Κύριος en una formulación doxológica/general sin equivalente hebreo explícito en el texto fuente. Se mantiene ‘Señor’ para respetar la fuente griega y la tradición del pasaje, mientras ‘mismo’ refuerza el énfasis de αὐτός.
  doctrine_reference: Cristología y nomenclatura divina en textos griegos; distinción entre κύριος y el tetragrámaton en el material fuente
- issue: Paralelismo de liberación y provisión divina
  english_pob_reading: The Master of all set me free... his mighty hand helped me... the Lord himself nourished me.
  chosen_spanish_reading: El Dueño de todos me libertó... su mano poderosa me ayudó... el Señor mismo me sustentó.
  alternative_spanish_readings:
  - Dios me liberó...
  - el Señor me sostuvo...
  rationale: 'Se conserva el triple testimonio de rescate, ayuda y sustento, sin aplanar los distintos matices: liberación, asistencia eficaz y provisión continua. Esto mantiene la estructura retórica y la teología de providencia del pasaje.'
  doctrine_reference: Providencia divina y liberación en literatura testamentaria judía
translation_notes:
  revision_awareness: La versión inglesa auditada cambió ‘was gripped by famine’ por ‘was confined by famine’ para ajustarse más a συνεσχέθην. Esta draft española sigue esa revisión al elegir ‘fui estrechado’, una solución que conserva el valor de compresión/constreñimiento sin perder naturalidad en español.
  spanish_consistency_notes:
  - Se mantiene la distinción entre ‘Dueño de todos’ (δεσπότης) y ‘Señor’ (Κύριος).
  - Se conserva el paralelismo de tres cláusulas con verbos en primera persona singular pasiva/mediopasiva, como en el griego.
  - ‘Sustentó’ se usa con sentido de provisión continua, no solo nutrición literal.
