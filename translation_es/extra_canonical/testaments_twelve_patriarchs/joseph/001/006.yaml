source:
  edition: Charles 1908 Greek Versions (pages 256-287, Joseph pilot)
  text: Μόνος ἤμην²³, καὶ ὁ Θεὸς²⁴ παρεκάλεσέ με· Ἐν ἀσθενείᾳ ἤμην, καὶ ὁ Κύριος²⁵ ἐπεσκέψατό με²⁶· Ἐν φυλακῇ ἤμην, καὶ ὁ †σωτὴρ²⁷ ἐχαρίτωσέ με²⁸· [Ἐν δεσμοῖς καὶ ἔλυσέ με.]²⁹
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/001/006.yaml
  text: I was alone, and God comforted me. I was weak, and the Lord visited me. I was in prison, and the Savior showed me favor. [I was in chains, and he loosed me.]
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:12Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Estaba solo, y Dios me consoló. Estaba enfermo, y el Señor me visitó. Estaba en la cárcel, y el Salvador[a] me mostró su favor. [Estaba en cadenas, y él me soltó.][b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El título 'Salvador' traduce el testigo griego tal como aparece. Algunos lectores pueden preferir 'Libertador'; la palabra puede reflejar una expansión teológica secundaria o realzada en la transmisión.
    reason: textual_variant
  - marker: b
    text: La línea entre corchetes 'Estaba en cadenas, y él me soltó' es textualmente incierta en esta tradición testimonial.
    reason: textual_variant
lexical_decisions:
- source_word: παρεκάλεσέ
  english_pob_choice: comforted
  chosen_spanish: consoló
  alternatives_spanish:
  - confortó
  - alentó
  lexicon: BDAG
  rationale: En el aislamiento de José, el verbo griego apunta al consuelo personal y pastoral; 'consoló' transmite la cercanía afectiva del verbo griego en español natural moderno.
- source_word: ἐπεσκέψατό
  english_pob_choice: visited
  chosen_spanish: visitó
  alternatives_spanish:
  - se ocupó de mí
  - vino en mi auxilio
  lexicon: BDAG
  rationale: Conserva el modismo bíblico de la visitación divina graciosa, paralelo al uso del POB en inglés.
- source_word: σωτήρ
  english_pob_choice: Savior
  chosen_spanish: Salvador
  alternatives_spanish:
  - Libertador
  lexicon: BDAG
  rationale: El testigo griego dice σωτήρ; se traduce directamente, manteniendo la nota a pie de página sobre la posible expansión teológica secundaria de la tradición textual.
- source_word: ἐχαρίτωσέ
  english_pob_choice: showed me favor
  chosen_spanish: me mostró su favor
  alternatives_spanish:
  - me concedió gracia
  - me trató con gracia
  lexicon: BDAG
  rationale: Modismo idiomático que comunica el favor concedido sin perder el lenguaje de gracia detrás del verbo.
- source_word: φυλακῇ
  english_pob_choice: prison
  chosen_spanish: cárcel
  alternatives_spanish:
  - prisión
  lexicon: LSJ
  rationale: '''Cárcel'' es el equivalente más natural en español latinoamericano moderno, evocando la situación concreta de José.'
translation_notes:
  revision_awareness: El revisor inglés (gpt-5.4) marcó este verso como sin cambios necesarios; la revisión cruzada de Claude indicó alta concordancia (0.93, agree). El draft español sigue las decisiones léxicas inglesas y mantiene los corchetes textuales y las notas a pie de página correspondientes.
  spanish_consistency_notes:
  - σωτήρ → 'Salvador' con nota a pie sobre incertidumbre textual.
  - Κύριος → 'Señor'; ὁ Θεὸς → 'Dios'.
  - Mantiene los corchetes editoriales [ ] del aparato griego para señalar la incertidumbre textual.
