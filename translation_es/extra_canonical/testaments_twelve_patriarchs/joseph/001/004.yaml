base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/001/004.yaml
  text: My brothers hated me, but the Lord loved me. They wanted to kill me, but the God of my fathers preserved me. They lowered me into a pit, and the Most High brought me up.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:12Z'
    unchanged: false
    changes_summary: Changed 'kept me safe' to 'preserved me' for a more formal register and closer correspondence to ἐφύλαξέν με; otherwise retained the draft.
translation:
  language: es
  text: Mis hermanos me odiaron, pero el Señor me amó. Ellos querían matarme, pero el Dios de mis padres me preservó. Me arrojaron a un pozo, y el Altísimo me sacó de allí.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  lexicon: κύριος
  rationale: Aquí el griego usa Κύριος en una formulación que, en el contexto de este testamento, funciona como título reverente de Dios. En el cuerpo del verso, ‘el Señor’ reproduce con naturalidad la forma establecida por la POB inglesa y evita introducir una cita explícita del nombre divino donde el texto griego no lo desarrolla directamente.
- source_word: Θεὸς τῶν πατέρων μου
  english_pob_choice: the God of my fathers
  chosen_spanish: el Dios de mis padres
  alternatives_spanish:
  - Dios de mis padres
  - el Dios de mis antepasados
  lexicon: θεός
  rationale: ‘Dios’ es la equivalencia directa de Θεὸς; se mantiene la relación posesiva ‘de mis padres’ porque el griego la expresa de modo explícito y la fórmula tiene peso patriarcal/covenantal en español sin requerir ampliación.
- source_word: ἐφύλαξέν με
  english_pob_choice: preserved me
  chosen_spanish: me preservó
  alternatives_spanish:
  - me guardó
  - me protegió
  - me mantuvo a salvo
  lexicon: φυλάσσω
  rationale: La revisión inglesa cambió ‘kept me safe’ a ‘preserved me’ para acercarse a ἐφύλαξέν με. En español, ‘preservó’ conserva el registro formal y la idea de protección/mantenimiento providencial sin reducirse solo a seguridad física.
- source_word: ὁ ὕψιστος
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Más Alto
  lexicon: ὕψιστος
  rationale: ‘Altísimo’ es la forma española idiomática y reverente para ὁ ὕψιστος; ‘el Más Alto’ sonaría forzado y menos bíblico en español.
theological_decisions:
- issue: Identidad del ‘Señor’ frente al nombre divino
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  rationale: Aunque el proyecto español normalmente usa ‘Yahvé’ para יהוה, aquí el testimonio griego presenta Κύριος en una declaración narrativa sin un anclaje textual directo al tetragrámaton. Por eso se conserva ‘el Señor’ como título divino, coherente con el audit trail inglés y con el grado de explicitud del griego.
  doctrine_reference: Uso reverente del título divino; distinción entre nombre propio y título.
translation_notes:
  revision_awareness: La versión inglesa revisada reemplazó ‘kept me safe’ por ‘preserved me’ para reflejar mejor ἐφύλαξέν με; la línea española adopta ‘me preservó’ para mantener esa mayor formalidad y cercanía semántica. No se introdujeron notas textuales adicionales porque el packet no trae variantes que alteren el sentido del verso.
  spanish_consistency_notes:
  - Se mantiene el paralelo adversativo ‘pero’ para reproducir la estructura del original y del inglés auditado.
  - ‘Pozo’ traduce λάκκον en un registro claro y natural; ‘fosa’ también sería posible, pero ‘pozo’ comunica mejor el encierro narrativo en español contemporáneo.
  - ‘Me sacó de allí’ desarrolla el sentido de ἀνήγαγέν με sin sobretraducirlo; evita una formulación demasiado literal que sonaría extraña en español.
