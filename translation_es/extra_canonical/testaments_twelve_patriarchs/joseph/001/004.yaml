  text: Οἱ¹² ἀδελφοί μου οὗτος ἐμίσησάν με, *Ὁ δὲ Κύριος¹³ ἠγάπησέ με· Αὐτοὶ¹⁴ ἠθελόν με¹⁵ ἀνελεῖν, *Ὁ δὲ Θεὸς¹⁶ τῶν πατέρων μου¹⁷ ἐφύλαξέν με· Εἰς λάκκον με¹⁸ ἐχάλασάν, Καὶ ὁ ὕψιστος ἀνήγαγέν με¹⁸·
