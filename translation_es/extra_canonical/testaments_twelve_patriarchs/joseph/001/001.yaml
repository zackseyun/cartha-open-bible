  text: Διαθήκη Ἰωσὴφ τοῦ ἑνδεκάτου υἱοῦ Ἰακὼβ καὶ Ῥαχήλ¹. Ἀντίγραφον διαθήκης Ἰωσήφ². Ἐν τῷ μέλλειν αὐτὸν ἀποθνήσκειν³, καλέσας⁴ τοὺς υἱοὺς αὐτοῦ καὶ τοὺς ἀδελφοὺς αὐτοῦ⁷ εἶπεν αὐτοῖς.
