    timestamp: '2026-05-03T07:41:55Z'
    unchanged: false
    changes_summary: Added the final comma before 'and said to them' to match the source clause structure more closely.
translation:
  language: es
  text: 'El testamento de José, el undécimo hijo de Jacob y de Raquel. Copia del testamento de José. Cuando estaba a punto de morir, llamó a sus hijos y a sus hermanos, y les dijo:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: περὶ σωφροσύνης (encabezado)
  english_pob_choice: concerning self-control
  chosen_spanish: sobre el dominio propio
  alternatives_spanish:
  - acerca de la templanza
  - sobre la sensatez
  - acerca del autocontrol
  lexicon: BDAG
  rationale: σωφροσύνη es la virtud cardinal griega de moderación, prudencia y autocontrol. 'Dominio propio' es el equivalente estándar en español bíblico para esta virtud, especialmente en contextos morales-sexuales como los que dominarán el Testamento de José; 'templanza' es válido pero más filosófico clásico.
- source_word: Ἀντίγραφον διαθήκης Ἰωσήφ
  english_pob_choice: A copy of the testament of Joseph
  chosen_spanish: Copia del testamento de José
  alternatives_spanish:
  - Reproducción del testamento de José
  - Transcripción del testamento de José
  lexicon: BDAG
  rationale: ἀντίγραφον es 'copia/reproducción'. 'Copia' es el término más natural en español; se mantiene el formato editorial del POB inglés.
- source_word: Ἐν τῷ μέλλειν αὐτὸν ἀποθνήσκειν
  english_pob_choice: When he was about to die
  chosen_spanish: Cuando estaba a punto de morir
  alternatives_spanish:
  - Cuando iba a morir
  - Estando próximo a morir
  lexicon: BDAG
  rationale: La construcción ἐν τῷ + infinitivo se rinde idiomáticamente con 'cuando' + verbo conjugado en español; 'a punto de morir' refleja μέλλειν + infinitivo con naturalidad.
translation_notes:
  revision_awareness: La revisión inglesa solo añadió una coma antes de 'and said to them'; el español ya construye naturalmente la pausa con 'y les dijo:'.
  spanish_consistency_notes:
  - '''Dominio propio'' como traducción canónica de σωφροσύνη en este corpus T12P en español, conforme al uso bíblico estable.'
  - '''José'' (sin tilde) como forma estándar del nombre Ἰωσήφ en español.'
