  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/001/001.yaml
  text: 'Joseph, concerning self-control. A copy of the testament of Joseph. When he was about to die, he called his sons and his brothers, and said to them:'
  revision_pass:
