translation:
  language: es
  text: En mi vida vi la envidia[a] y la muerte, y no fui extraviado[b], sino que permanecí en la verdad del Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'φθόνος, distinto de ζῆλος (''celo''): mira con malevolencia el bien del otro. Es un tema central del Testamento de José, que narra la envidia de los hermanos.'
    reason: lexical_alternative
  - marker: b
    text: Lit. 'no fui descarriado/llevado al error'. El verbo griego en pasiva subraya que José no se dejó arrastrar por la envidia y la maldad ajenas.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸν φθόνον
  english_pob_choice: envy
  chosen_spanish: la envidia
  alternatives_spanish:
  - los celos
  - la malicia
  lexicon: BDAG
  rationale: φθόνος es específicamente 'envidia' (codicia ante el bien ajeno con malevolencia), distinta de ζῆλος ('celo'). 'Envidia' es el equivalente exacto en español.
- source_word: οὐκ ἐπλανήθην
  english_pob_choice: I was not led astray
  chosen_spanish: no fui extraviado
  alternatives_spanish:
  - no me dejé desviar
  - no fui descarriado
  lexicon: BDAG
  rationale: πλανάω en pasiva conlleva el sentido de ser desviado del camino recto; 'fui extraviado' conserva el matiz pasivo y moral, en paralelo con 'permanecí'.
- source_word: ἔμενα ἐν τῇ ἀληθείᾳ Κυρίου
  english_pob_choice: remained in the truth of the Lord
  chosen_spanish: permanecí en la verdad del Señor
  alternatives_spanish:
  - me mantuve en la verdad del Señor
  - perseveré en la verdad del Señor
  lexicon: BDAG
  rationale: μένω se traduce naturalmente como 'permanecer'; 'verdad del Señor' refleja ἀλήθεια Κυρίου con la convención del proyecto ('Señor' para Κύριος).
translation_notes:
  revision_awareness: La revisión inglesa no introdujo cambios; el español preserva la cadencia testimonial.
  spanish_consistency_notes:
  - '''Señor'' para Κύριος conforme a la política del proyecto.'
  - '''Permanecer'' para μένω en contextos de fidelidad religiosa, como traducción estable en este corpus.'
