translation:
  language: es
  text: Hermanos míos e hijos míos, escuchen[a] a José, el amado de Israel. Presten oído, hijos míos, a su padre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Plural 'ustedes' (Latinoamérica neutra) en imperativos.
    reason: spanish_style_note
  - marker: b
    text: Lit. 'presten oído a las palabras de mi boca'. El POB inglés condensa la fórmula como 'a su padre'; se mantiene esa elección editorial.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀδελφοί μου καὶ τέκνα μου
  english_pob_choice: My brothers and children
  chosen_spanish: Hermanos míos e hijos míos
  alternatives_spanish:
  - Mis hermanos y mis hijos
  - Hermanos y descendientes
  lexicon: BDAG
  rationale: Se conserva la repetición posesiva del griego con la fórmula vocativa española 'X míos e Y míos', que mantiene el ritmo solemne testamentario.
- source_word: Ἀκούσατε ... τοῦ ἠγαπημένου ὑπὸ Ἰσραήλ
  english_pob_choice: listen to Joseph, the beloved of Israel
  chosen_spanish: escuchen a José, el amado de Israel
  alternatives_spanish:
  - oigan a José, el amado por Israel
  - atiendan a José, querido de Israel
  lexicon: BDAG
  rationale: El participio perfecto pasivo ἠγαπημένος + ὑπό con genitivo se rinde 'el amado de/por Israel'; 'amado' refleja la afectividad paterna sin desviar al sentido erótico.
- source_word: Ἐνωτίσασθε ῥήματα τοῦ στόματός μου
  english_pob_choice: Pay attention, my children, to your father
  chosen_spanish: Presten oído, hijos míos, a su padre
  alternatives_spanish:
  - Escuchen atentamente, hijos míos, a su padre
  - Inclinen el oído, hijos míos, a su padre
  lexicon: BDAG
  rationale: ἐνωτίζομαι es literalmente 'inclinar el oído'; 'prestar oído' es el modismo español equivalente. El POB inglés condensa 'palabras de mi boca' en 'your father' por estilo; el español sigue esa elección editorial.
translation_notes:
  revision_awareness: La revisión inglesa no introdujo cambios; el español sigue la lectura formal y solemne del POB.
  spanish_consistency_notes:
  - 'Imperativos en plural ''ustedes'' (Latinoamérica neutra): ''escuchen'', ''presten''.'
  - '''Amado'' para ἠγαπημένος, evitando ''querido'' (afectivo coloquial) en este registro patriarcal.'
