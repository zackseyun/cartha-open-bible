  text: Καὶ ἔλεγον *πρὸς αὐτὴν⁶¹ ῥήματα ὑψίστου, εἰ ἄρα ἐπιστρέψει⁶² ἀπὸ τῆς ἐπιθυμίας⁶³ τῆς πονηρᾶς⁶⁴.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/004/002.yaml
  text: And they were saying to her words of the Most High, whether perhaps she might turn back from the evil desire.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:56Z'
    unchanged: false
    changes_summary: Changed the speaker from singular to plural to match the Greek, and tightened the clause to better reflect the source without adding 'to see whether'.
translation:
  language: es
  text: Y le decían palabras del Altísimo, por si acaso ella se volvía atrás del deseo malvado.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἔλεγον
  english_pob_choice: they were saying
  chosen_spanish: le decían
  alternatives_spanish:
  - le hablaban
  - le profetizaban
  lexicon: BDAG
  rationale: El revision_pass POB cambió de singular a plural para coincidir con el griego (3ª persona plural). El español usa 'decían' (3ª pl.) acorde.
- source_word: ῥήματα ὑψίστου
  english_pob_choice: words of the Most High
  chosen_spanish: palabras del Altísimo
  alternatives_spanish:
  - dichos del Altísimo
  - palabras sobre el Altísimo
  lexicon: BDAG
  rationale: El genitivo indica con mayor naturalidad palabras pertenecientes al Altísimo o procedentes de él, no meras palabras acerca de él.
- source_word: ἐπιστρέψει
  english_pob_choice: she might turn back
  chosen_spanish: se volvía atrás
  alternatives_spanish:
  - se convertía
  - se apartaba
  lexicon: BDAG
  rationale: '''Volverse atrás'' captura el matiz de retornar/desviarse del rumbo previo, sin importar resonancia teológica de ''conversión'' que el contexto no exige.'
- source_word: ἐπιθυμία
  english_pob_choice: desire
  chosen_spanish: deseo
  alternatives_spanish:
  - concupiscencia
  - anhelo
  lexicon: BDAG
  rationale: El contexto es sexual y moralmente negativo, pero 'deseo' permite que el adjetivo 'malvado' lleve la fuerza ética sin importar más de lo que el griego dice.
translation_notes:
  revision_awareness: El revision_pass POB cambió el sujeto de singular a plural para coincidir con el griego, y eliminó 'to see whether' para apretar la cláusula. La traducción española refleja ambas decisiones.
  spanish_consistency_notes:
  - 3ª persona plural ('decían') usada para coincidir con ἔλεγον.
  - ἐπιθυμία → 'deseo' (no 'concupiscencia'), consistente con la elección POB de 'desire'.
