  text: '*᾿Εδόξαζε ⌜γάρ⌝¹¹ με ὡς σώφρονα *φανερῶς, καὶ ἐν κρυφῇ¹² ἔλεγέ μοι· Μὴ φοβηθῇς τὸν ἄνδρα μου· καὶ γὰρ πέπεισται¹⁴ περὶ τῆς σωφροσύνης σου¹⁵· ὅτι κἂν *τις αὐτῷ εἴπῃ¹⁶ περὶ ἡμῶν, *οὐ πιστεύσει¹⁷.'
