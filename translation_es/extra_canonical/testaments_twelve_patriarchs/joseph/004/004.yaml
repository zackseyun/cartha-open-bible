base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/004/004.yaml
  text: 12. For she openly extolled me as chaste in bed, but in secret she said to me, “Do not be afraid of my husband; for he is persuaded about your purity, and even if someone should tell him about us, he will not believe it.”
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:56Z'
    unchanged: false
    changes_summary: Changed “concerning” to “about” to better reflect περὶ τῆς σωφροσύνης; otherwise retained the draft.
translation:
  language: es
  text: '12. Pues abiertamente me ensalzaba como casto en el lecho[a], pero en secreto me decía: «No tengas miedo de mi marido; pues está convencido acerca de tu pureza, y aunque alguien le diga algo sobre nosotros, no lo creerá».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Casto en el lecho'' traduce un sintagma que se refiere explícitamente a la pureza sexual.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐδόξαζε
  english_pob_choice: she openly extolled
  chosen_spanish: me ensalzaba
  alternatives_spanish:
  - me alababa
  - me elogiaba
  lexicon: BDAG
  rationale: '''Ensalzar'' captura la fuerza encomiástica del verbo griego, alabar públicamente con énfasis.'
- source_word: σώφρονα
  english_pob_choice: chaste
  chosen_spanish: casto
  alternatives_spanish:
  - puro
  - continente
  lexicon: LSJ
  rationale: El adjetivo de la familia σωφροσύνη; aquí especificado por el contexto del lecho. 'Casto' transmite la pureza sexual concreta.
- source_word: φανερῶς
  english_pob_choice: openly
  chosen_spanish: abiertamente
  alternatives_spanish:
  - públicamente
  - manifiestamente
  lexicon: BDAG
  rationale: Contrasta con 'en secreto' (ἐν κρυφῇ), por lo que 'abiertamente' mantiene la antítesis.
- source_word: πέπεισται
  english_pob_choice: he is persuaded
  chosen_spanish: está convencido
  alternatives_spanish:
  - está persuadido
  - se ha persuadido
  lexicon: BDAG
  rationale: 'Perfecto pasivo: acción consumada con efectos presentes. ''Está convencido'' es natural en español moderno.'
- source_word: περὶ τῆς σωφροσύνης σου
  english_pob_choice: about your purity
  chosen_spanish: acerca de tu pureza
  alternatives_spanish:
  - sobre tu castidad
  - respecto a tu dominio propio
  lexicon: BDAG
  rationale: El revision_pass POB cambió 'concerning' por 'about' para reflejar mejor περὶ. 'Acerca de' es la traducción natural en español. 'Pureza' aquí varía consistentemente con σωφροσύνη por el matiz sexual del contexto.
translation_notes:
  revision_awareness: El revision_pass POB ajustó 'concerning' por 'about' (περὶ τῆς σωφροσύνης) para mayor precisión. La traducción española usa 'acerca de' consistente con esa decisión.
  spanish_consistency_notes:
  - σωφροσύνη rendido como 'dominio propio' (4:3) y 'pureza' (4:4) según matiz contextual; nota POB acepta la variación.
  - Estructura de antítesis 'abiertamente' / 'en secreto' preservada.
  - Marcador [a] insertado en la frase 'casto en el lecho' para señalar el sentido sexual.
