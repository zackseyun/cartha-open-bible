translation:
  language: es
  text: 14. Como nada logró en esto, otra vez comenzó a venir a mí con palabras de instrucción, queriendo aprender la palabra de Dios.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: οὐδὲν ἴσχυσεν
  english_pob_choice: she accomplished nothing
  chosen_spanish: nada logró
  alternatives_spanish:
  - nada consiguió
  - nada pudo
  lexicon: BDAG
  rationale: ἰσχύω aquí transmite éxito en empresa. 'Nada logró' es directo en español.
- source_word: ἐν τούτῳ
  english_pob_choice: in this
  chosen_spanish: en esto
  alternatives_spanish:
  - por este medio
  - en este asunto
  lexicon: BDAG
  rationale: El revision_pass POB eliminó 'way' para acercarse al griego literal. La traducción española usa 'en esto' sin agregar 'modo'.
- source_word: λόγῳ κατηχήσεως
  english_pob_choice: with words of instruction
  chosen_spanish: con palabras de instrucción
  alternatives_spanish:
  - con palabra de enseñanza
  - con discurso instructivo
  lexicon: BDAG
  rationale: Evita resonancias eclesiásticas anacrónicas de 'catequesis' mientras conserva el sentido de discurso instruido.
- source_word: μαθεῖν λόγον Θεοῦ
  english_pob_choice: to learn the word of God
  chosen_spanish: aprender la palabra de Dios
  alternatives_spanish:
  - aprender el dicho de Dios
  - conocer la palabra de Dios
  lexicon: BDAG
  rationale: Mantiene la formulación literal y reconocible de la frase 'palabra de Dios' que aparece a lo largo del corpus.
translation_notes:
  revision_awareness: El revision_pass POB removió la palabra 'way' para acercarse al griego literal de ἐν τούτῳ. La traducción española usa 'en esto' sin agregar 'manera'.
  spanish_consistency_notes:
  - κατήχησις → 'instrucción' (no 'catequesis') para evitar anacronismo eclesiástico.
  - λόγος Θεοῦ → 'palabra de Dios' (formulación bíblica reconocible).
