  text: Καὶ νοήσας ἐγὼ⁵⁵ ἐλυπήθην ἕως θανάτου⁵⁶· *ἐξελθούσης δὲ⁵⁷ αὐτῆς ἦλθον εἰς ἐμαυτόν, καὶ ἐπένθησα⁵⁸ περὶ αὐτῆς⁵⁹ ἡμέρας πολλάς, *ὅτι ἔγνων τὸν δόλον αὐτῆς καὶ τὴν πλάνην⁶⁰.
