base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/004/001.yaml
  text: And when I understood, I was grieved unto death. But after she had gone out, I came to myself and mourned over her for many days, because I knew her deceit and her delusion.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:56Z'
    unchanged: false
    changes_summary: Changed ‘recognized’ to ‘knew’ to better reflect ἔγνων. Otherwise retained the draft as accurate and complete.
translation:
  language: es
  text: Y al darme cuenta, me afligí hasta la muerte. Pero después que ella salió, volví en mí, y la lloré por muchos días, porque conocí su engaño y su extravío.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐλυπήθην ἕως θανάτου
  english_pob_choice: I was grieved unto death
  chosen_spanish: me afligí hasta la muerte
  alternatives_spanish:
  - estuve profundamente apenado hasta el punto de la muerte
  - tuve tristeza hasta la muerte
  lexicon: BDAG
  rationale: Conserva el registro testamentario elevado y la intensidad idiomática del griego sin sobreampliarlo.
- source_word: ἦλθον εἰς ἐμαυτόν
  english_pob_choice: I came to myself
  chosen_spanish: volví en mí
  alternatives_spanish:
  - me recobré
  - recobré el sentido
  lexicon: BDAG
  rationale: '''Volví en mí'' es la forma idiomática estándar en español del giro griego, manteniendo el tono literario.'
- source_word: ἔγνων
  english_pob_choice: I knew
  chosen_spanish: conocí
  alternatives_spanish:
  - supe
  - reconocí
  lexicon: BDAG
  rationale: El revision_pass POB cambió 'recognized' por 'knew' para reflejar mejor ἔγνων. 'Conocí' transmite el sentido de tomar conciencia / saber con certeza.
- source_word: δόλος / πλάνη
  english_pob_choice: deceit / delusion
  chosen_spanish: engaño / extravío
  alternatives_spanish:
  - traición / error
  - astucia / decepción
  lexicon: BDAG
  rationale: 'Mantiene distinto el vocabulario moral pareado: δόλος apunta a astucia, mientras πλάνη sugiere error errante o intención engañosa.'
translation_notes:
  revision_awareness: El revision_pass POB cambió 'recognized' por 'knew' para reflejar ἔγνων con mayor precisión. La traducción española usa 'conocí' acorde con esa decisión.
  spanish_consistency_notes:
  - '''volver en sí'' como forma idiomática para ἦλθον εἰς ἐμαυτόν.'
  - δόλος → 'engaño' y πλάνη → 'extravío' mantenidos como par moral distintivo.
