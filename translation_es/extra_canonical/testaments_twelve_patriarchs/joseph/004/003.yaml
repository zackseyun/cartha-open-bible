base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/004/003.yaml
  text: 11. So then, many times[b], as to a holy man, she flattered me with words; and with deceit she praised my self-control before her husband, wishing to trip me up when we were alone.
