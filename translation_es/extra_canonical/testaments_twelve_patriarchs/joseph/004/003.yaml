translation:
  language: es
  text: 11. Así pues, muchas veces[a], como a un varón santo, me adulaba con palabras; y con engaño, mediante sus dichos alababa mi dominio propio delante de su marido, queriendo derribarme cuando estábamos a solas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'volvía en sí'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκολάκευέ
  english_pob_choice: she flattered
  chosen_spanish: me adulaba
  alternatives_spanish:
  - me halagaba
  - me lisonjeaba
  lexicon: LSJ
  rationale: '''Adular'' es el equivalente directo en español y conserva el matiz negativo de halago interesado.'
- source_word: μετὰ δόλου
  english_pob_choice: with deceit
  chosen_spanish: con engaño
  alternatives_spanish:
  - con astucia
  - con artimaña
  lexicon: BDAG
  rationale: Mantiene la consistencia con la traducción de δόλος en 4:1. 'Engaño' captura la intención fraudulenta.
- source_word: σωφροσύνη
  english_pob_choice: self-control
  chosen_spanish: dominio propio
  alternatives_spanish:
  - templanza
  - castidad
  - pureza
  lexicon: BDAG
  rationale: Término clave de virtud en este testamento. 'Dominio propio' es lo bastante amplio para incluir restricción sexual mientras conserva el rango ético del vocabulario virtuoso.
- source_word: ὑποσκελίσαι
  english_pob_choice: to trip me up
  chosen_spanish: derribarme
  alternatives_spanish:
  - hacerme caer
  - hacerme tropezar
  lexicon: BDAG
  rationale: Conserva la metáfora de provocar una caída, apropiada al contexto de prueba moral. 'Derribar' suena natural en español.
- source_word: κατὰ μόνας
  english_pob_choice: when we were alone
  chosen_spanish: cuando estábamos a solas
  alternatives_spanish:
  - en privado
  - en lugar apartado
  lexicon: LSJ
  rationale: '''A solas'' transmite con naturalidad la situación de privacidad propicia para el ataque moral.'
translation_notes:
  revision_awareness: El revision_pass POB no requirió cambios en este verso. La traducción al español respeta la estructura conservada en POB.
