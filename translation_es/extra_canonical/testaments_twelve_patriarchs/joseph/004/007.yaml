translation:
  language: es
  text: '15. Y me dice: «Si quieres que deje los ídolos, persuadiré a mi marido a que se aparte de los ídolos, e iremos delante de tu Señor».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: καταλείψω τὰ εἴδωλα
  english_pob_choice: leave the idols
  chosen_spanish: deje los ídolos
  alternatives_spanish:
  - abandone los ídolos
  - deseche los ídolos
  lexicon: BDAG
  rationale: El revision_pass POB ajustó 'leave behind' a 'leave' para reflejar τὰ εἴδωλα directamente. 'Dejar' en español funciona igual.
- source_word: πείθω
  english_pob_choice: I will persuade
  chosen_spanish: persuadiré
  alternatives_spanish:
  - convenceré
  - induciré
  lexicon: BDAG
  rationale: '''Persuadir'' es la traducción directa y corresponde al matiz del verbo griego.'
- source_word: ἀποστῆναι ἀπὸ τῶν εἰδώλων
  english_pob_choice: to withdraw from the idols
  chosen_spanish: se aparte de los ídolos
  alternatives_spanish:
  - se aleje de los ídolos
  - se separe de los ídolos
  lexicon: BDAG
  rationale: El revision_pass POB renderizó 'the idols' en ambos lugares. 'Apartarse' es término natural en español para denotar el alejamiento del ídolo.
- source_word: ἐνώπιον Κυρίου σου
  english_pob_choice: before your Lord
  chosen_spanish: delante de tu Señor
  alternatives_spanish:
  - en presencia de tu Señor
  - ante el Señor tu Dios
  lexicon: BDAG
  rationale: Traduce el griego tal cual sin armonizar a fórmulas bíblicas más familiares. Conserva el posesivo 'tu'.
theological_decisions:
- issue: Traducción de Κυρίου σου en v. 15
  chosen_reading: tu Señor
  alternative_readings:
  - el Señor
  - tu Dios
  rationale: El testigo griego lee un posesivo en segunda persona. La traducción conserva esa formulación en lugar de asimilarla a fraseología bíblica estándar.
  doctrine_reference: Primacía del idioma original sobre la tradición de traducción.
translation_notes:
  revision_awareness: El revision_pass POB ajustó τὰ εἴδωλα como 'the idols' en ambos lugares (versus 'them' en la primera versión). La traducción española refleja 'los ídolos' en ambos lugares.
  spanish_consistency_notes:
  - εἴδωλα → 'ídolos' explícitamente en ambos lugares (no pronombre).
  - Κυρίου σου → 'tu Señor' (preserva posesivo).
