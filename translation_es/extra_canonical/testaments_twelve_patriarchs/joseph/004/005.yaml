translation:
  language: es
  text: 13. En todas estas cosas yo, postrándome en tierra[a], suplicaba al Dios de mis padres que me librara de su engaño.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego en este verso es textualmente difícil en este testigo normalizado por OCR; 'Dios de mis padres' refleja el sentido patriarcal probable, aunque una lectura más corta 'Dios' es posible.
    reason: textual_variant
lexical_decisions:
- source_word: χαμοκοιτῶν
  english_pob_choice: lying low
  chosen_spanish: postrándome en tierra
  alternatives_spanish:
  - acostándome en el suelo
  - tendido boca abajo
  lexicon: LSJ
  rationale: La forma rara sugiere postura corporal humilde en oración. 'Postrándome en tierra' conserva la humildad física sin precisar postura exacta.
- source_word: ἐδεόμην
  english_pob_choice: kept begging
  chosen_spanish: suplicaba
  alternatives_spanish:
  - rogaba
  - imploraba
  lexicon: BDAG
  rationale: El imperfecto griego transmite acción durativa. 'Suplicaba' es directo en español y conserva el matiz de oración insistente.
- source_word: τοῦ Θεοῦ
  english_pob_choice: the God of my fathers
  chosen_spanish: Dios de mis padres
  alternatives_spanish:
  - Dios
  - el Dios
  lexicon: BDAG
  rationale: El OCR normalizado parece inestable; el contexto testamentario apoya fuertemente la expresión patriarcal completa, y la traducción refleja el sentido probable manteniendo explícito el contexto de oración.
- source_word: ῥύσεταί
  english_pob_choice: he would rescue
  chosen_spanish: me librara
  alternatives_spanish:
  - me rescatara
  - me liberara
  lexicon: BDAG
  rationale: '''Librar'' es la traducción tradicional y natural en oraciones bíblicas en español, conservando la nota de salvación de peligro.'
- source_word: δολιότητος
  english_pob_choice: deceit
  chosen_spanish: engaño
  alternatives_spanish:
  - astucia
  - fraude
  lexicon: BDAG
  rationale: Mantiene consistencia con la traducción de δόλος en 4:1 y 4:3. δολιότης es sustantivo abstracto del mismo campo semántico.
theological_decisions:
- issue: Referencia en la oración de José en v. 13
  chosen_reading: Dios de mis padres
  alternative_readings:
  - Dios
  - el Dios
  rationale: La línea normalizada por OCR es textualmente inestable, pero el escenario del testamento patriarcal y el modismo común favorecen una referencia explícita al Dios ancestral. Se anota como restauración probable.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla; documentar decisiones de restauración contextual.
translation_notes:
  revision_awareness: El revision_pass POB no requirió cambios en este verso (mantuvo 'lying low' después de quitar 'on the ground' en otra revisión). La traducción española conserva el sentido humilde con 'postrándome en tierra'.
  spanish_consistency_notes:
  - δόλος / δολιότης → 'engaño' consistente.
  - ῥύομαι → 'librar' (forma tradicional bíblica en español).
  - Marcador [a] preservado en el cuerpo del texto.
