lexical_decisions:
- source_word: ἀντεφιλονείκει
  english_pob_choice: kept contending
  chosen_spanish: seguía contendiendo
  alternatives_spanish:
  - seguía discutiendo
  - persistía en disputar
  lexicon: LSJ
  rationale: Transmite su oposición y presión persistente sin reducirlo a un solo intercambio. El imperfecto griego se rinde con 'seguía' + gerundio en español.
- source_word: πληρῶσαι θέλουσα
  english_pob_choice: wanting to fulfill
  chosen_spanish: queriendo cumplir
  alternatives_spanish:
  - deseando llenar
  - buscando satisfacer
  lexicon: BDAG
  rationale: πληρόω + ἐπιθυμία es modismo para satisfacer un deseo. 'Cumplir' es la traducción directa y mantiene el matiz neutral.
- source_word: ἐπιθυμίαν αὐτῆς
  english_pob_choice: her desire
  chosen_spanish: su deseo
  alternatives_spanish:
  - su anhelo
  - su concupiscencia
  lexicon: BDAG
  rationale: Mantiene consistencia con la traducción de ἐπιθυμία en 4:2 ('deseo'). El contexto sexual ya está implícito sin necesidad de 'concupiscencia'.
