  text: '*Ἐγὼ δὲ⁴⁵ προσετιθέμην *νηστείαν καὶ⁴⁶ προσευχήν, ὅπως ῥύσεταί⁴⁷ με ὁ⁴⁸ Κύριος ἀπ᾽ αὐτῆς⁴⁹.'
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/004/010.yaml
  text: And I added fasting and prayer, so that the Lord might rescue me from her.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:56Z'
    unchanged: false
    changes_summary: Removed the footnote markers from the running text; otherwise the draft is accurate and complete.
translation:
  language: es
  text: Y yo añadí ayuno y oración, para que el Señor me rescatara de ella.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: προσετιθέμην
  english_pob_choice: added
  chosen_spanish: añadí
  alternatives_spanish:
  - agregué
  - sumé
  lexicon: προστίθημι
  rationale: El griego expresa la idea de añadir o incorporar algo adicional; en español, «añadí» comunica de forma natural y fiel la acción de sumar ayuno y oración a su práctica.
- source_word: νηστείαν
  english_pob_choice: fasting
  chosen_spanish: ayuno
  alternatives_spanish:
  - ayuno religioso
  - abstinencia
  lexicon: νηστεία
  rationale: «Ayuno» es la equivalencia directa y transparente en español para la práctica ascética/religiosa indicada por el contexto.
- source_word: προσευχήν
  english_pob_choice: prayer
  chosen_spanish: oración
  alternatives_spanish:
  - plegaria
  - ruego
  lexicon: προσευχή
  rationale: «Oración» es el término más claro y ampliamente inteligible en español para προσευχή en un contexto devocional.
- source_word: ὁ Κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  - el Señor
  lexicon: κύριος
  rationale: El contexto griego usa κύριος con referencia a la figura divina; en español, «el Señor» conserva la forma reverente y la ambigüedad reverencial propia del título, sin forzar una identificación explícita que el texto griego no desarrolla aquí.
- source_word: ῥύσεταί με ἀπ᾽ αὐτῆς
  english_pob_choice: might rescue me from her
  chosen_spanish: me rescatara de ella
  alternatives_spanish:
  - me librara de ella
  - me salvara de ella
  lexicon: ῥύομαι
  rationale: «Rescatar» reproduce bien la idea de librar/sacar de un peligro o dominio. Se usa el pretérito imperfecto de subjuntivo en español («rescatara») para reflejar el valor de propósito/resultante introducido por ὅπως.
theological_decisions:
- issue: Referencia al título divino κύριος
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  - el Señor
  rationale: Aunque el proyecto normalmente usa «Yahvé» para el nombre divino, aquí la fuente inmediata es κύριος en un texto griego no canónico, y el audit trail inglés preserva «the Lord» sin explicitar el nombre. Por eso se mantiene «el Señor» como traducción reverente y prudente.
  doctrine_reference: Uso del título divino en traducción bíblica; distinción entre nombre propio y título reverencial.
translation_notes:
  revision_awareness: La revisión reciente eliminó marcas de nota del texto corrido y confirmó que la redacción inglesa era adecuada; por eso este borrador español se presenta limpio, sin notas añadidas, manteniendo el mismo contenido semántico.
  spanish_consistency_notes:
  - Se conserva un registro solemne pero claro, acorde con un texto devocional antiguo.
  - No se introduce «Mesías» ni otras equivalencias no presentes en el pasaje.
  - La sintaxis española sigue el orden natural del idioma sin perder la relación causal/final del griego introducida por ὅπως.
