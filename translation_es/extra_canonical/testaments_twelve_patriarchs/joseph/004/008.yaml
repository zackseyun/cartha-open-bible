translation:
  language: es
  text: '16. Pero yo le dije: «El Señor no quiere que los que le reverencian estén en inmundicia, ni se complace en los adúlteros, sino en los que se acercan a él con corazón puro y labios sin mancha».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀκαθαρσίᾳ
  english_pob_choice: uncleanness
  chosen_spanish: inmundicia
  alternatives_spanish:
  - impureza
  - contaminación
  lexicon: BDAG
  rationale: Mantiene la resonancia moral-cúltica del griego adecuada a la literatura testamentaria ética judía. 'Inmundicia' es término reconocible bíblicamente.
- source_word: τοὺς σεβομένους αὐτόν
  english_pob_choice: those who revere him
  chosen_spanish: los que le reverencian
  alternatives_spanish:
  - los que le adoran
  - los que le temen
  lexicon: BDAG
  rationale: σέβομαι denota culto reverente. 'Reverenciar' captura el matiz de adoración respetuosa sin reducirlo a 'temer'.
- source_word: τοῖς μοιχεύουσιν εὐδοκεῖ
  english_pob_choice: does he delight in adulterers
  chosen_spanish: se complace en los adúlteros
  alternatives_spanish:
  - se agrada con los que cometen adulterio
  - tiene placer en los adúlteros
  lexicon: BDAG
  rationale: Una traducción directa y enérgica que conserva el filo parenético.
- source_word: ἐν καθαρᾷ καρδίᾳ καὶ στόμασιν ἀμίαντοις
  english_pob_choice: with a pure heart and undefiled lips
  chosen_spanish: con corazón puro y labios sin mancha
  alternatives_spanish:
  - con corazón limpio y boca sin mancha
  - en pureza de corazón y palabra sin tacha
  lexicon: BDAG
  rationale: Conserva el paralelismo moral interior/exterior de corazón y palabra.
- source_word: θέλει Κύριος
  english_pob_choice: the Lord does will
  chosen_spanish: el Señor quiere
  alternatives_spanish:
  - el Señor desea
  - es la voluntad del Señor
  lexicon: BDAG
  rationale: θέλω en este uso indica voluntad divina. 'Quiere' en español captura tanto deseo como voluntad.
translation_notes:
  revision_awareness: El revision_pass POB no requirió cambios en este verso. La traducción española conserva el sentido moral-cúltico del original.
  spanish_consistency_notes:
  - κύριος → 'Señor' (referencia divina).
  - ἀκαθαρσία → 'inmundicia' (término moral-cúltico bíblico).
  - Paralelismo 'corazón puro' / 'labios sin mancha' preservado.
