translation:
  language: es
  text: '1. Porque sé que después de mi muerte los egipcios los oprimirán, pero Dios ejecutará su venganza y los llevará a las promesas de sus padres.


    2. Pero ustedes llevarán mis huesos con ustedes[a], porque cuando mis huesos sean llevados allá, el Señor estará con ustedes en luz, y Beliar estará con los egipcios en tinieblas.


    3. Y traigan a Asenet, su madre[b], y entiérrenla cerca de Raquel, mi madre.


    3a. Pero otra lectura dice: “Y traigan a Zelfa, su madre, y pónganla cerca de Bilha[c], junto a Raquel.”


    12. Porque mi reino entre ustedes será llevado a su cumplimiento como una choza de vigía en un huerto, que no aparece después del verano.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase subrayada en el testimonio griego es textualmente incierta en esta tradición.
    reason: textual_variant
  - marker: b
    text: 'El testimonio griego trae aquí una forma alternativa: algunos manuscritos leen Zelfa y Bilha en vez de Asenet y Raquel.'
    reason: alternative_reading
  - marker: c
    text: 'Otra lectura testimonia: “Y traigan a Zelfa, su madre, y pónganla cerca de Bilha, junto a Raquel.”'
    reason: alternative_reading
lexical_decisions:
- source_word: θλίψουσιν
  english_pob_choice: will oppress
  chosen_spanish: oprimirán
  alternatives_spanish:
  - afligirán
  - molestarán
  lexicon: LSJ
  rationale: En este contexto de dureza egipcia y opresión posterior al relato, 'oprimirán' conserva la fuerza sostenida del verbo mejor que opciones más débiles.
- source_word: ἐκδίκησιν
  english_pob_choice: vengeance
  chosen_spanish: venganza
  alternatives_spanish:
  - vindicación
  - justicia
  lexicon: LSJ
  rationale: La POB inglesa preserva el matiz activo de retribución divina; 'venganza' lo refleja sin suavizarlo, aunque incluye la idea de vindicación.
- source_word: ἐπάξει
  english_pob_choice: bring
  chosen_spanish: los llevará
  alternatives_spanish:
  - los conducirá
  - los traerá
  lexicon: LSJ
  rationale: El griego expresa movimiento hacia la meta prometida; en español, 'los llevará' comunica bien ese traslado sin añadir 'de vuelta' que no está explícito.
- source_word: ἐπαγγελίας
  english_pob_choice: promises
  chosen_spanish: promesas
  alternatives_spanish:
  - promesas pactadas
  - bendiciones prometidas
  lexicon: LSJ
  rationale: '''Promesas'' mantiene el lenguaje de pacto y es la correspondencia más directa y clara para lectores de iglesia.'
- source_word: συνανοίσετε
  english_pob_choice: shall carry up
  chosen_spanish: llevarán ... con ustedes
  alternatives_spanish:
  - subirán ... con ustedes
  - traerán ... con ustedes
  lexicon: LSJ
  rationale: La idea central es transportar los huesos desde Egipto hacia la sepultura; 'llevarán ... con ustedes' suena natural y conserva la dirección implícita.
- source_word: ἀναγομένων
  english_pob_choice: are taken up
  chosen_spanish: sean llevados
  alternatives_spanish:
  - sean subidos
  - sean transportados
  lexicon: LSJ
  rationale: La pasiva del griego queda bien reflejada con 'sean llevados', que mantiene el paralelismo con el mandato anterior.
- source_word: ἐν φωτί
  english_pob_choice: in light
  chosen_spanish: en luz
  alternatives_spanish:
  - en la luz
  - con luz
  lexicon: LSJ
  rationale: Se conserva la oposición simbólica breve y paralela con 'en tinieblas'; 'en luz' es idiomático en un registro bíblico sobrio.
- source_word: Βελίαρ
  english_pob_choice: Beliar
  chosen_spanish: Beliar
  alternatives_spanish:
  - Belial
  lexicon: LSJ
  rationale: Se conserva la forma del testimonio griego en vez de normalizarla a la variante más conocida.
- source_word: ἐν σκότει
  english_pob_choice: in darkness
  chosen_spanish: en tinieblas
  alternatives_spanish:
  - en oscuridad
  - en la oscuridad
  lexicon: LSJ
  rationale: '''Tinieblas'' preserva mejor el registro bíblico y la oposición moral/apocalíptica con ''luz''.'
- source_word: ἀγάγετε
  english_pob_choice: bring
  chosen_spanish: traigan
  alternatives_spanish:
  - lleven
  - conduzcan
  lexicon: LSJ
  rationale: El imperativo plural 'traigan' es natural para un traslado funerario y evita la posible ambigüedad de 'conduzcan'.
- source_word: θάψατε
  english_pob_choice: bury
  chosen_spanish: entiérrenla
  alternatives_spanish:
  - sepultenla
  - inhúmenla
  lexicon: LSJ
  rationale: '''Entiérrenla'' es claro y directo; conserva el tono de mandato sin tecnicismo innecesario.'
- source_word: βασιλεία
  english_pob_choice: kingdom
  chosen_spanish: reino
  alternatives_spanish:
  - reinado
  - dominio
  lexicon: LSJ
  rationale: '''Reino'' reproduce de manera natural el sustantivo griego y permite la ambigüedad entre dominio y dinastía que el pasaje conserva.'
- source_word: ἐπιτελεῖται
  english_pob_choice: will be brought to completion
  chosen_spanish: será llevado a su cumplimiento
  alternatives_spanish:
  - será consumado
  - será cumplido
  lexicon: LSJ
  rationale: La forma española retiene tanto la idea de culminación como la de término sin resolver por completo la dirección del dicho oscuro.
- source_word: ὀπωροφυλάκιον
  english_pob_choice: watchman’s hut in an orchard
  chosen_spanish: una choza de vigía en un huerto
  alternatives_spanish:
  - una cabaña de guardia en un huerto
  - una choza del vigilante en un huerto
  lexicon: LSJ
  rationale: '''Choza de vigía'' conserva el carácter temporal y la función de vigilancia de la imagen; ''huerto'' mantiene el entorno agrícola del original.'
theological_decisions:
- issue: Divine vengeance against Egyptian oppression
  english_pob_reading: God will execute your vengeance and bring you into the promises of your fathers.
  chosen_spanish_reading: Dios ejecutará su venganza y los llevará a las promesas de sus padres.
  alternative_spanish_readings:
  - Dios hará justicia por ustedes
  - Dios vindicará su causa
  rationale: La POB inglesa preserva la fuerza retributiva del pasaje; en español, 'venganza' evita suavizar una tensión teológica real que el texto no resuelve.
  doctrine_reference: DOCTRINE.md §Preserve theological tension rather than resolve it
- issue: Beliar as an apocalyptic personal adversary
  english_pob_reading: the Lord will be with you in light, and Beliar will be with the Egyptians in darkness.
  chosen_spanish_reading: el Señor estará con ustedes en luz, y Beliar estará con los egipcios en tinieblas.
  alternative_spanish_readings:
  - el Señor estará con ustedes en la luz, y Beliar estará con los egipcios en la oscuridad
  - el Señor estará con ustedes con luz, y Beliar estará con los egipcios en tinieblas
  rationale: Se mantiene la personificación dualista del testimonio griego en vez de reinterpretarla como simple maldad abstracta.
  doctrine_reference: DOCTRINE.md §Preserve theological tension rather than resolve it
- issue: Textual instability in the burial instruction
  english_pob_reading: Main text follows Aseneth; an alternate reading names Zelpha and Bilhah.
  chosen_spanish_reading: El texto principal sigue a Asenet; la lectura alternativa se conserva como variante explícita.
  alternative_spanish_readings:
  - armonizar ambas versiones en el texto principal
  - mencionar solo una de las dos mujeres
  rationale: La transparencia textual exige no fusionar lecturas testimoniadas distintas; la variante se presenta abiertamente en el versículo alterno.
  doctrine_reference: POB textual transparency principle
translation_notes:
  revision_awareness: 'Se atendió la validación anterior corrigiendo el problema de anclaje: ahora cada nota al pie tiene un marcador visible exactamente en el texto español. También se conservaron la fuerza de ἐκδίκησις como ''venganza'', la dirección de ἐπάξει sin añadir ''de vuelta'', y la variante textual de la instrucción funeraria sin armonizarla.'
  spanish_consistency_notes:
  - Se usa 'Beliar' por fidelidad al testimonio griego, no 'Belial'.
  - Se prefirió 'tinieblas' para mantener el paralelismo bíblico con 'luz'.
  - '''Reino'' se conserva por correspondencia directa con βασιλεία y por su ambigüedad útil en este dicho.'
  - Se evitó 'SEÑOR' como máscara de Yahvé; aquí el fuente griega dice Κύριος y se traduce como 'el Señor' en la cita directa, conforme al contexto dado.
  - Se mantuvo un español claro y sobrio, con sintaxis natural pero sin expandir el sentido más allá del testimonio fuente.
