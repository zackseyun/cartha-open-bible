base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/020.yaml
  text: '1[[to the Hippodrome]]. For I know that after my death the Egyptians will oppress you, but God will execute your vengeance and bring you into the promises of your fathers.


    2. But you shall carry up my bones with you[3a], for when my bones are taken up there, the Lord will be with you in light, and Beliar will be with the Egyptians in darkness.


    3. And bring Aseneth your mother [to the Hippodrome], and bury her near Rachel my mother.


    3a. But another reading says: “And bring up Zelpha your mother, and place her near Bilhah [by the Hippodrome], close to Rachel.”


    12. For my kingdom among you will be brought to completion like a watchman’s hut in an orchard[12b][12], which does not appear after the summer.”'
  footnotes:
  - marker: '[to the Hippodrome]'
    text: The bracketed phrase is textually uncertain in the supplied Greek witness.
    reason: textual_variant
  - marker: 3a
    text: Some witnesses read 'Zelpha your mother ... near Bilhah ... close to Rachel' instead of 'Aseneth your mother ... near Rachel my mother.'
    reason: alternative_reading
  - marker: '12'
    text: The verse numbering in the supplied witness jumps to 12 after verse 3; the chapter appears textually compressed or excerpted in this source layer.
    reason: textual_variant
  - marker: 12b
    text: The image of a watchman’s hut in an orchard evokes a temporary shelter left behind after harvest; compare similar seasonal imagery in Isaiah 1:8.
    reason: cross_reference
