translation:
  language: es
  text: Sí, me dio belleza más allá de los hombres apuestos de Israel, y me preservó hasta la vejez en fuerza y en hermosura; porque fui semejante a Jacob en todo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὡραιότητα
  english_pob_choice: beauty
  chosen_spanish: belleza
  alternatives_spanish:
  - hermosura
  - lozanía
  lexicon: ὡραιότης
  rationale: El griego expresa belleza/lozanía física. 'Belleza' reproduce el valor general del término con claridad natural en español; 'hermosura' queda como alternativa válida, pero suena más literaria y puede duplicar el matiz que luego ya se expresa con 'hermosura' en la misma línea griega.
- source_word: ὑπὲρ ὡραίους Ἰσραήλ
  english_pob_choice: beyond the handsome men of Israel
  chosen_spanish: más allá de los hombres apuestos de Israel
  alternatives_spanish:
  - más que los hombres hermosos de Israel
  - por encima de los bellos de Israel
  lexicon: ὡραῖος
  rationale: ὡραῖος describe belleza/apariencia agradable. 'Apuestos' conserva el sentido físico sin sonar excesivamente arcaico; 'hermosos' sería posible, pero en español puede acercarse más a una cualidad general que al atractivo corporal inmediato.
- source_word: ἐφύλαξέ με
  english_pob_choice: preserved me
  chosen_spanish: me preservó
  alternatives_spanish:
  - me guardó
  - me conservó
  lexicon: φυλάσσω
  rationale: La idea es de custodia/protección continua. 'Preservó' sigue de cerca la elección inglesa y mantiene el matiz de protección sostenida hasta la vejez; 'guardó' también sería fiel, pero 'preservó' comunica mejor continuidad.
- source_word: ἕως γήρους
  english_pob_choice: until old age
  chosen_spanish: hasta la vejez
  alternatives_spanish:
  - hasta la ancianidad
  - hasta ser viejo
  lexicon: γῆρας
  rationale: '''Vejez'' es el equivalente natural y sobrio en español para γῆρας. ''Ancianidad'' es correcto pero más abstracto; ''hasta ser viejo'' suena menos digno.'
- source_word: ἐν δυνάμει καὶ ἐν κάλλει
  english_pob_choice: in strength and in beauty
  chosen_spanish: en fuerza y en hermosura
  alternatives_spanish:
  - con fortaleza y con belleza
  - en poder y en belleza
  lexicon: δύναμις; κάλλος
  rationale: '''Fuerza'' comunica δύναμις en sentido físico/vital y encaja con el paralelo de ''vejez''. ''Hermosura'' conserva el segundo término con un registro digno; ''belleza'' también sería posible, pero aquí la alternancia con ''belleza'' al inicio evitaría repetición excesiva.'
- source_word: ὅμοιος ἤμην ... τῷ Ἰακώβ
  english_pob_choice: I was like Jacob in all things
  chosen_spanish: fui semejante a Jacob en todo
  alternatives_spanish:
  - era como Jacob en todo
  - me parecí a Jacob en todo
  lexicon: ὅμοιος
  rationale: '''Semejante a'' reproduce el comparativo con tono sobrio y directo. ''En todo'' sigue el alcance total del griego y del inglés auditado.'
theological_decisions:
- issue: La expresión de belleza y preservación física dada por Dios a José
  english_pob_reading: Indeed he gave me beauty beyond the handsome men of Israel, and preserved me until old age in strength and in beauty
  chosen_spanish_reading: Sí, me dio belleza más allá de los hombres apuestos de Israel, y me preservó hasta la vejez en fuerza y en hermosura
  alternative_spanish_readings:
  - Sí, me dio hermosura...
  - Verdaderamente me dio belleza...
  rationale: No hay una tensión doctrinal añadida; la línea atribuye a Dios un favor providencial concreto sobre José. Mantengo la atribución directa y el tono testimonial sin espiritualizar la belleza ni convertirla en mera metáfora.
  doctrine_reference: Providencia divina; testimonio narrativo
- issue: La comparación final con Jacob 'en todo'
  english_pob_reading: for I was like Jacob in all things
  chosen_spanish_reading: porque fui semejante a Jacob en todo
  alternative_spanish_readings:
  - porque era como Jacob en todo
  - pues fui como Jacob en todas las cosas
  rationale: Conservo la comparación total sin exagerarla ni suavizarla. 'En todo' preserva la amplitud del griego y evita limitar el paralelo a solo rasgos morales o externos.
  doctrine_reference: Tipología patriarcal / testimonio de semejanza
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; por tanto, el español se alinea directamente con la lectura estable del texto griego y con la traducción inglesa auditada, sin introducir variantes textuales ni notas de corrección.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando el texto base lo requiera; aquí el pasaje no contiene el nombre divino explícito en español porque el sujeto está implícito en el contexto inmediato del testimonio.
  - Se evita 'Cristo/Mesías' porque no aparece en este versículo.
  - Se conserva un registro sobrio y testimonial, adecuado para literatura testamentaria antigua.
