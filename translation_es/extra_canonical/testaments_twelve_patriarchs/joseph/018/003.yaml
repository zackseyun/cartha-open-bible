source:
  edition: Charles 1908 Greek Versions (pages 256-287, Joseph pilot)
  text: Ἰδοὺ¹⁰ ⌜γὰρ⌉¹¹ ὁρᾶτε ὅτι ⌜διὰ τὴν *ταπείνωσιν καὶ τὴν μακροθυμίαν μου¹²⌉ θυγατέρα *ἱερέως ἡλιουπόλεως¹³ ἔλαβον ἐμαυτῷ¹⁴ εἰς γυναῖκα¹⁵, καὶ ἑκατὸν τάλαντα *χρυσίου δέδονταί μοι¹⁶ *σὺν αὐτῇ¹⁷, *καὶ ὁ¹⁸ Κύριός μου¹⁹ αὐτοὺς²⁰ κατεδούλωσεν²¹.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/018/003.yaml
  text: For see, you know that through my humility and my long-suffering I took for myself as wife the daughter of the priest of Heliopolis, and a hundred talents of gold were given to me with her, and my Lord made them subject to me.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:45Z'
    unchanged: false
    changes_summary: Removed 'yourselves' since it is not in the Greek; added 'for myself' to reflect ἐμαυτῷ; adjusted word order slightly for more natural formal English while preserving the source.
translation:
  language: es
  text: Porque, mira, ustedes saben que, por mi humildad y mi paciencia, tomé para mí por esposa a la hija del sacerdote de Heliópolis, y conmigo se me dieron cien talentos de oro, y mi Señor los sujetó a mí.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: διὰ τὴν ταπείνωσιν
  english_pob_choice: through my humility
  chosen_spanish: por mi humildad
  alternatives_spanish:
  - a causa de mi humildad
  - por la humildad que había en mí
  lexicon: ταπείνωσις
  rationale: Se conserva la relación causal expresada por διὰ + acusativo y el sustantivo de cualidad «humildad», sin añadir una paráfrasis moralizante.
- source_word: τὴν μακροθυμίαν μου
  english_pob_choice: my long-suffering
  chosen_spanish: mi paciencia
  alternatives_spanish:
  - mi longanimidad
  - mi perseverancia paciente
  lexicon: μακροθυμία
  rationale: En español bíblico contemporáneo, «paciencia» comunica de modo claro la idea de resistencia paciente y longanimidad; «long-suffering» en inglés no tiene equivalente idiomático directo suficientemente natural.
- source_word: ἐμαυτῷ
  english_pob_choice: for myself
  chosen_spanish: para mí
  alternatives_spanish:
  - para mí mismo
  - en beneficio propio
  lexicon: ἐμαυτῷ
  rationale: Se refleja el dativo reflexivo con una construcción natural en español; «para mí» conserva la fuerza del beneficio directo sin sobrecargar el estilo.
- source_word: θυγατέρα ἱερέως ἡλιουπόλεως
  english_pob_choice: the daughter of the priest of Heliopolis
  chosen_spanish: a la hija del sacerdote de Heliópolis
  alternatives_spanish:
  - a la hija del sacerdote de Heliópolis
  - a la hija del sacerdote de la ciudad de Heliópolis
  lexicon: θυγάτηρ; ἱερεύς; Ἡλιούπολις
  rationale: Se mantiene la relación posesiva y el nombre propio geográfico en forma reconocible y eclesialmente legible.
- source_word: ἑκατὸν τάλαντα χρυσίου
  english_pob_choice: a hundred talents of gold
  chosen_spanish: cien talentos de oro
  alternatives_spanish:
  - cien talentos de oro fino
  - cien talentos de oro puro
  lexicon: τάλαντον; χρυσίον
  rationale: La unidad monetaria y el material se traducen de forma directa y estándar, sin amplificar la especificación del oro.
- source_word: κατεδούλωσεν
  english_pob_choice: made them subject to me
  chosen_spanish: los sujetó a mí
  alternatives_spanish:
  - los sometió a mí
  - los puso bajo mi autoridad
  lexicon: καταδουλόω
  rationale: «Sujetar» preserva la idea de sometimiento/puesta bajo autoridad con una dignidad más cercana al registro del pasaje; evita atenuar la fuerza del verbo.
theological_decisions:
- issue: Relación entre el privilegio recibido y la virtud atribuida a José
  english_pob_reading: through my humility and my long-suffering I took for myself as wife ... and ... were given to me ... and my Lord made them subject to me
  chosen_spanish_reading: por mi humildad y mi paciencia ... tomé para mí por esposa ... y conmigo se me dieron ... y mi Señor los sujetó a mí
  alternative_spanish_readings:
  - por mi humildad y mi longanimidad
  - debido a mi humildad y mi perseverancia paciente
  rationale: 'La formulación conserva la causalidad moral del texto: la virtud antecede al favor recibido. No se introduce mérito soteriológico ni se suaviza el vínculo explícito entre conducta y recompensa narrativa.'
  doctrine_reference: Providencia y retribución narrativa en literatura testamentaria judía
- issue: Identidad de «mi Señor»
  english_pob_reading: my Lord made them subject to me
  chosen_spanish_reading: mi Señor los sujetó a mí
  alternative_spanish_readings:
  - el Señor los sujetó a mí
  - mi Señor los sometió a mí
  rationale: Se mantiene la forma reverencial «mi Señor», que en el contexto narrativo señala al señor humano superior de José, sin forzar una cristologización ni sustituirla por un título genérico.
  doctrine_reference: Señorío humano en contexto patriarcal / jerárquico
- issue: Fuerza del verbo de sometimiento
  english_pob_reading: made them subject to me
  chosen_spanish_reading: los sujetó a mí
  alternative_spanish_readings:
  - los sometió a mí
  - los puso bajo mi autoridad
  rationale: La idea de dominio delegado queda explícita; «someter» es posible, pero «sujetar» evita una connotación excesivamente agresiva mientras sigue siendo fiel al verbo griego.
  doctrine_reference: Autoridad delegada y administración doméstica
translation_notes:
  revision_awareness: La revisión inglesa eliminó un «yourselves» no atestiguado en el griego y añadió «for myself» para reflejar ἐμαυτῷ. La versión española sigue esa corrección, conserva el valor reflexivo con «para mí» y evita introducir un equivalente plural no presente en el texto base.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el tetragrama esté presente; aquí no aparece.
  - Se conserva «mi Señor» como en la base inglesa para reflejar el contexto relacional del sujeto griego.
  - No se emplea «Cristo» ni vocabulario litúrgico ajeno al pasaje.
  - Se optó por «paciencia» como equivalente idiomático de μακροθυμία en español bíblico moderno, manteniendo el tono solemne.
