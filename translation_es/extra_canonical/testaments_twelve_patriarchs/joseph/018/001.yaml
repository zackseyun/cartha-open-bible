base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/018/001.yaml
  text: If, then, you also walk in the commandments of the Lord, God will exalt you with good things forever.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:43Z'
    unchanged: false
    changes_summary: Changed 'in good things' to 'with good things' for more natural English while preserving the sense of ἐν ἀγαθοῖς; retained the rest as accurate and complete.
translation:
  language: es
  text: Así pues, si ustedes también andan en los mandamientos del Señor, Dios los exaltará con bienes para siempre.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πορευθῆτε ἐν ταῖς ἐντολαῖς
  english_pob_choice: walk in the commandments
  chosen_spanish: andan en los mandamientos
  alternatives_spanish:
  - caminen en los mandamientos
  - vivan en los mandamientos
  lexicon: πορεύομαι; ἐντολή
  rationale: El griego usa una imagen de conducta continua; «andar en» conserva bien esa fuerza en español bíblico sin sonar arcaico. Se prefirió «andan» por fluidez contemporánea y concordancia con la condición general del enunciado.
- source_word: Κυρίου
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  - el Maestro
  lexicon: κύριος
  rationale: Aunque el proyecto suele usar «Yahvé» para el nombre divino, aquí el contexto inmediato y la forma tradicional de la expresión en la literatura bíblica permiten conservar «el Señor» como título reverencial ligado al mandato. Dado que el texto griego cita una fórmula estable, se mantiene la equivalencia auditada del inglés POB sin introducir una decisión no sustentada por el fragmento.
- source_word: ὁ θεὸς
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - Yahvé
  lexicon: θεός
  rationale: El sustantivo articular funciona como sujeto claro de la promesa; «Dios» es la forma natural y exacta en español para mantener la sencillez del enunciado.
- source_word: ἐν ἀγαθοῖς
  english_pob_choice: with good things
  chosen_spanish: con bienes
  alternatives_spanish:
  - con cosas buenas
  - en bienes
  lexicon: ἀγαθός
  rationale: La revisión inglesa ya decidió que ἐν aquí suena mejor como acompañamiento/medio («with») que como localización («in»). En español, «con bienes» comunica la abundancia benéfica prometida sin forzar un calco; «bienes» recoge bien el sentido de beneficios concretos.
- source_word: εἰς αἰῶνας
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por los siglos
  - eternamente
  lexicon: αἰών
  rationale: La frase adverbial expresa duración indefinida y continua. «Para siempre» es natural, solemne y fiel al valor temporal del original.
theological_decisions:
- issue: Relación entre «mandamientos del Señor» y la promesa de exaltación divina
  english_pob_reading: 'Conditional blessing: if they walk in the commandments, God will exalt them with good things forever.'
  chosen_spanish_reading: 'Promesa condicional de bendición: si obedecen los mandamientos del Señor, Dios los exaltará con bienes para siempre.'
  alternative_spanish_readings:
  - Promesa de prosperidad material directa
  - Exaltación espiritual sin referencia a bienes concretos
  rationale: El griego presenta una condición seguida de una promesa. «Con bienes» mantiene la concreción de la bendición sin reducirla sólo a prosperidad material ni espiritualizarla indebidamente. La exaltación viene de Dios y conserva su carácter de favor otorgado, no ganado automáticamente.
  doctrine_reference: Providencia y bendición condicional en lenguaje sapiencial/testamentario; cf. principios bíblicos de obediencia y bendición.
translation_notes:
  revision_awareness: La revisión inglesa cambió «in good things» por «with good things» para reflejar mejor ἐν ἀγαθοῖς. La versión española sigue esa misma decisión al traducirla naturalmente como «con bienes», manteniendo el sentido de acompañamiento/beneficio sin calcar la preposición griega.
  spanish_consistency_notes:
  - Se conservó la condición inicial con «Así pues, si...» para reflejar οὖν y Ἐὰν sin recargar el sintagma.
  - Se mantuvo «el Señor» por fidelidad a la formulación auditada del inglés POB y al estilo reverente de la expresión.
  - Se evitó «Cristo» porque el source no contiene Χριστός ni una referencia mesiánica explícita.
  - «Dios» se dejó como sujeto explícito de la cláusula principal para claridad sintáctica en español.
