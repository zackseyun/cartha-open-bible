  text: ⌜Καὶ *ἐάν τις θέλει⁷ κακοποιῆσαι ὑμᾶς, ὑμεῖς τῇ ἀγαθοεργείᾳ⁸ εὔχεσθε ὑπὲρ αὐτοῦ, καὶ ἀπὸ παντὸς κακοῦ λυτρωθήσεσθε ὑπὸ⁹ Κυρίου¹.
