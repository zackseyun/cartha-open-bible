translation:
  language: es
  text: Y si alguno quiere hacerles mal, ustedes, haciendo el bien, oren por él, y serán librados de todo mal por el Señor.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: κακοποιῆσαι
  english_pob_choice: to do evil
  chosen_spanish: hacer mal
  alternatives_spanish:
  - hacer el mal
  - obrar mal
  lexicon: κακοποιέω
  rationale: El griego expresa la intención de causar daño o actuar mal contra alguien. «Hacer mal» conserva esa fuerza de manera natural en español y evita una formulación demasiado abstracta.
- source_word: ἀγαθοεργείᾳ
  english_pob_choice: by doing good
  chosen_spanish: haciendo el bien
  alternatives_spanish:
  - por medio de buenas obras
  - practicando el bien
  lexicon: ἀγαθοεργία
  rationale: La forma dativa instrumental pide una expresión de medio. «Haciendo el bien» reproduce el valor verbal y mantiene el paralelismo con «haceros mal».
- source_word: εὔχεσθε
  english_pob_choice: pray
  chosen_spanish: orad
  alternatives_spanish:
  - orad a Dios
  - orad por él
  lexicon: εὔχομαι
  rationale: En este contexto, el verbo implica dirigir una petición u oración. «Orad» es sobrio y adecuado al registro bíblico, y «por él» explicita el objeto implícito del griego y del inglés POB.
- source_word: Κυρίου
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  lexicon: κύριος
  rationale: Aunque el griego dice κύριος, el contexto de la obra y la norma del proyecto indican usar «Yahvé» cuando el título remite al nombre divino. Aquí la liberación final es atribuida a Dios mismo, no a un señor humano, por lo que se evita la máscara tradicional.
theological_decisions:
- issue: Identificación de Κυρίου con el nombre divino
  english_pob_reading: by the Lord
  chosen_spanish_reading: por Yahvé
  alternative_spanish_readings:
  - por el Señor
  rationale: La lectura inglesa conserva «Lord» como equivalente funcional; sin embargo, las normas del proyecto exigen restituir el nombre divino en español cuando κύριος se usa en referencia a Dios. No hay indicio de un señor humano, y el sentido providencial de la liberación favorece esta elección.
  doctrine_reference: Uso del nombre divino / restitución de YHWH
- issue: Ética de la respuesta al mal
  english_pob_reading: if anyone wants to do evil to you... pray for him
  chosen_spanish_reading: si alguno quiere haceros mal... orad por él
  alternative_spanish_readings:
  - si alguno pretende dañaros... rogad por él
  - si alguien quiere haceros daño... orad por él
  rationale: 'La formulación mantiene la exhortación moral directa del texto: responder al mal con bien y oración. No se intensifica ni se suaviza la oposición ética presente en el original.'
  doctrine_reference: Ética de retribución no vengativa / amor al enemigo
translation_notes:
  revision_awareness: La versión inglesa POB vigente fue marcada como sin cambios necesarios; por eso la traducción española sigue de cerca su estructura semántica, ajustando únicamente la elección léxica de κύριος según la terminología del proyecto y la sintaxis natural del español.
  spanish_consistency_notes:
  - Se mantiene el paralelismo entre «haceros mal» y «haciendo el bien».
  - «Orad» conserva el tono litúrgico sin caer en arcaísmo excesivo.
  - «Yahvé» se usa de manera consistente con la terminología editorial del proyecto para κύριος referido a Dios.
