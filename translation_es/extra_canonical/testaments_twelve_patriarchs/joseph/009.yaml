translation:
  language: es
  text: "1[9:1]. Pero cuando ella venía, escuchaba a escondidas cómo yo daba gracias al Señor y cantaba himnos en la casa de las tinieblas, y con voz alegre, regocijándome, glorificaba a mi Dios, porque por un pretexto había sido librado de la mujer egipcia. Muchas veces me enviaba a decir: «Consiente en cumplir mi deseo, y te soltaré de tus cadenas, y te libraré de las tinieblas».\n\n\n    2[9:2]. Pero no me aparté ni siquiera en pensamiento hacia ella; porque Dios ama más al que es fiel en el dominio propio, en un pozo de tinieblas, que al que, como rey en despensas, vive en lujos con desenfreno.\n\n\n    3. Pero si uno vive en dominio propio, y el Altísimo sabe que también le conviene la gloria, se la concede también a él, como también a mí.\n\n\n    4. ¡Cuántas veces, aunque estaba enferma, descendía a mí a una hora inoportuna, y oía mi voz mientras oraba; y yo, comprendiendo sus suspiros, guardaba silencio!\n\n\n    5. Porque, cuando yo estaba en su casa, descubría sus brazos y sus\
    \ piernas[a], para que yo cayera en ella. Porque era muy hermosa, especialmente adornada para mi engaño[b]. Pero el Señor me guardó de sus maquinaciones."
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Piernas» traduce aquí κνῆμαι, término que puede referirse de modo más preciso a las piernas bajas o a las espinillas.
    reason: lexical_alternative
  - marker: b
    text: La expresión subraya el carácter de engaño y atracción deliberada; «adornada para mi engaño» sigue de cerca el griego sin convertirlo en una glosa interpretativa.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπηκροᾶτό
  english_pob_choice: would listen in on
  chosen_spanish: escuchaba a escondidas
  alternatives_spanish:
  - escuchaba
  - espiaba al escuchar
  lexicon: LSJ
  rationale: El verbo sugiere oír con atención o de manera furtiva; «a escondidas» preserva la idea de escucha encubierta sin volver la frase demasiado coloquial.
- source_word: ἐν οἴκῳ τοῦ σκότους / ἐκ τοῦ σκότους
  english_pob_choice: house of darkness / from the darkness
  chosen_spanish: casa de las tinieblas / de las tinieblas
  alternatives_spanish:
  - casa de la oscuridad / de la oscuridad
  - prisión / de la prisión
  lexicon: LSJ
  rationale: El griego conserva la imagen de «tinieblas» y no nombra una prisión de manera explícita; por eso se mantiene la metáfora en español.
- source_word: ἱλαρᾷ φωνῇ
  english_pob_choice: with a cheerful voice
  chosen_spanish: con voz alegre
  alternatives_spanish:
  - con voz gozosa
  - con voz contenta
  lexicon: LSJ
  rationale: «Alegre» transmite bien el matiz de ἱλαρός y suena natural en español culto.
- source_word: διὰ προφάσεως ἀπηλλάγην
  english_pob_choice: by a pretext I had been delivered
  chosen_spanish: por un pretexto había sido librado
  alternatives_spanish:
  - bajo un pretexto había escapado
  - por una excusa había sido liberado
  lexicon: LSJ
  rationale: «Pretexto» conserva la ambivalencia de πρόφασις, y «librado» mantiene el color providencial de la liberación.
- source_word: Εὐδόκησον πληρῶσαι τὴν ἐπιθυμίαν μου
  english_pob_choice: Consent to fulfill my desire
  chosen_spanish: Consiente en cumplir mi deseo
  alternatives_spanish:
  - Ten a bien satisfacer mi deseo
  - Accede a cumplir mi deseo
  lexicon: LSJ
  rationale: «Consiente» refleja el tono persuasivo del imperativo y evita endurecer indebidamente la voz de la seducción.
- source_word: οὐδὲ ἕως ἐννοίας ἐξέκλινα
  english_pob_choice: I did not turn even in thought
  chosen_spanish: no me aparté ni siquiera en pensamiento
  alternatives_spanish:
  - no me desvié ni en pensamiento
  - no incliné ni mi mente
  lexicon: LSJ
  rationale: La frase enfatiza la pureza interior; «ni siquiera en pensamiento» reproduce bien ese alcance idiomático.
- source_word: πιστὸν ἐν σωφροσύνῃ
  english_pob_choice: faithful in self-control
  chosen_spanish: fiel en el dominio propio
  alternatives_spanish:
  - fiel en la templanza
  - fiel en la castidad
  lexicon: LSJ
  rationale: «Dominio propio» mantiene el alcance amplio de σωφροσύνη, mientras que el contexto deja claro que aquí incluye continencia sexual.
- source_word: ἐν λάκκῳ σκότους
  english_pob_choice: in a pit of darkness
  chosen_spanish: en un pozo de tinieblas
  alternatives_spanish:
  - en una fosa de tinieblas
  - en un pozo oscuro
  lexicon: LSJ
  rationale: «Pozo» conserva el carácter imagético de λάκκος sin borrar la oposición retórica entre oscuridad y privilegio.
- source_word: ἐν ταμείοις βασιλέα τρυφῶντα μετ’ ἀκολασίας
  english_pob_choice: as a king in storerooms, lives in luxury with lawlessness
  chosen_spanish: como rey en despensas, vive en lujos con desenfreno
  alternatives_spanish:
  - como rey en almacenes, vive en lujo con libertinaje
  - como rey en cámaras de provisión, vive en deleites con desenfreno
  lexicon: LSJ
  rationale: El pasaje es difícil; se conserva la imagen de «despensas» y el contraste moral con una expresión española comprensible que no suaviza ἀκολασία.
- source_word: διάγων ἐν σωφροσύνῃ
  english_pob_choice: lives in self-control
  chosen_spanish: vive en dominio propio
  alternatives_spanish:
  - vive en templanza
  - vive en castidad
  lexicon: LSJ
  rationale: Se mantiene la misma traducción base de σωφροσύνη para coherencia interna en el capítulo.
- source_word: συμφέρει
  english_pob_choice: is fitting
  chosen_spanish: le conviene
  alternatives_spanish:
  - es conveniente
  - es fitting
  lexicon: LSJ
  rationale: En este contexto la idea no es solo utilidad práctica sino conveniencia moral/providencial; «le conviene» lo expresa de forma natural.
- source_word: ἐν ἀωρίᾳ
  english_pob_choice: at an untimely hour
  chosen_spanish: a una hora inoportuna
  alternatives_spanish:
  - a destiempo
  - a una hora impropia
  lexicon: LSJ
  rationale: La expresión conserva la idea de un momento fuera de lugar o impropio para su visita.
- source_word: στεναγμούς
  english_pob_choice: sighs / groanings
  chosen_spanish: suspiros
  alternatives_spanish:
  - gemidos
  - lamentos
  lexicon: LSJ
  rationale: El término admite varias matizaciones; aquí «suspiros» suena natural en español y conserva la ambigüedad emocional/erótica del pasaje.
- source_word: ἐγύμνου τοὺς βραχίονας ... καὶ τὰς κνήμας
  english_pob_choice: would uncover her arms and her legs
  chosen_spanish: descubría sus brazos y sus piernas
  alternatives_spanish:
  - desnudaba sus brazos y sus piernas
  - dejaba al descubierto sus brazos y sus piernas
  lexicon: LSJ
  rationale: «Descubría» reproduce el acto de desvelar sin sobredeterminarlo; «piernas» es una equivalencia española natural para κνῆμαι en este contexto.
- source_word: ἵνα συμπέσω εἰς αὐτήν
  english_pob_choice: so that I might fall into her
  chosen_spanish: para que yo cayera en ella
  alternatives_spanish:
  - para que yo cayera con ella
  - para que yo me uniera a ella
  lexicon: LSJ
  rationale: Se conserva el giro eufemístico y la fuerza sexual implícita del griego sin explicitar más de lo que el texto dice.
- source_word: κοσμουμένη πρὸς ἀπάτην μου
  english_pob_choice: especially adorned for my deception
  chosen_spanish: especialmente adornada para mi engaño
  alternatives_spanish:
  - especialmente arreglada para engañarme
  - adornada para mi seducción
  lexicon: LSJ
  rationale: «Engaño» sigue de cerca ἀπάτη y preserva la tensión moral del texto; no se sustituye por un término más interpretativo.
- source_word: ἐγχειρημάτων
  english_pob_choice: schemes
  chosen_spanish: maquinaciones
  alternatives_spanish:
  - intentos
  - dispositivos
  - artimañas
  lexicon: LSJ
  rationale: «Maquinaciones» comunica bien el carácter deliberado y manipulador de sus intentos.
theological_decisions:
- issue: Referencia explícita a la acción divina en la liberación de José
  english_pob_reading: 'Retain explicit divine action: ''God loves more...'' and ''the Lord guarded me'''
  chosen_spanish_reading: 'Mantener la acción divina explícita: «Dios ama más...» y «el Señor me guardó»'
  alternative_spanish_readings:
  - Reducirlo a mera virtud moral de José
  - Expresarlo solo como providencia impersonal
  rationale: El texto fundamenta la castidad de José no solo en autocontrol, sino en el favor y la protección de Dios; esa dimensión debe permanecer visible.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Cómo traducir σωφροσύνη en este contexto de seducción
  english_pob_reading: Translate as 'self-control' while allowing sexual purity to remain implied by context
  chosen_spanish_reading: Traducirlo como «dominio propio», dejando que el contexto sexual precise la virtud
  alternative_spanish_readings:
  - castidad
  - templanza
  rationale: «Dominio propio» conserva el alcance léxico amplio de σωφροσύνη, pero en el capítulo queda claramente orientado a la resistencia sexual.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: 'Tomé en cuenta la revisión más reciente del POB inglés, que afinó la continuidad en 9:3, cambió a «sighs» en 9:4 y volvió más literal la frase de 9:5. En español, mantuve esa línea: «si uno vive...» para 9:3, «suspiros» para 9:4 y una formulación eufemística pero más directa en 9:5.'
  spanish_consistency_notes:
  - Conservo «Yahvé» para el Tetragrámaton en la línea de terminología del proyecto.
  - Uso «tinieblas» de forma consistente para σκότος, preservando la metáfora del confinamiento.
  - Mantengo «dominio propio» para σωφροσύνη en todo el pasaje por coherencia interna.
  - Evito «Cristo» y «SEÑOR» como máscaras automáticas; empleo «Mesías» solo cuando el texto lo requiera, y aquí no aparece.
  - La voz narrativa conserva el tono solemne y testimonial del griego, sin modernizarla en exceso.
