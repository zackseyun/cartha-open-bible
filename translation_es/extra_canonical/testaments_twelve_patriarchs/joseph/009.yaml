base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/009.yaml
  text: '1[9:1]. But when she came, she would listen in on me, how I gave thanks to the Lord and sang hymns in the house of darkness, and with a cheerful voice, rejoicing, I glorified my God because by a pretext I had been delivered from the Egyptian woman. Many times she sent to me, saying, “Consent to fulfill my desire, and I will release you from your chains, and I will free you from the darkness.”


    2[9:2]. But I did not turn even in thought toward her; for God loves more the one who is faithful in self-control in a pit of darkness than the one who, as a king in storerooms, lives in luxury with lawlessness.


    3. But if one lives in self-control, and the Most High knows that glory also is fitting for him, he grants that too to him, as also to me.


    4. How often, though she was sick, she came down to me at an untimely hour, and heard my voice as I prayed; and I, understanding her sighs, kept silent.


    5. For when I was in her house, she would uncover her arms and her legs, so that I might fall into her. For she was very beautiful, especially adorned for my deception[9:5]. But the Lord guarded me from her schemes.'
  footnotes:
  - marker: '9:1'
    text: The phrase 'house of darkness' likely refers to Joseph's place of confinement; the Greek preserves the imagery of darkness rather than naming a prison directly.
    reason: cultural_note
  - marker: '9:2'
    text: 'The Greek contrast is difficult: literally something like ''the faithful one in a pit of darkness in self-control'' versus ''the king in storerooms living luxuriously with lawlessness.'''
    reason: textual_variant
  - marker: '9:5'
    text: '''Legs'' translates a term more specifically meaning the lower legs or shins.'
    reason: lexical_alternative
