translation:
  language: es
  text: '1[a]. En poco tiempo ella se retiraba, para probar la resolución de mi alma. En diez tentaciones me halló aprobado, y en todas ellas tuve paciencia; pues la paciencia es un gran remedio.


    2. ¡Cuántas veces la egipcia me amenazó de muerte! ¡Cuántas veces, después de entregarme a tormentos[b], me llamaba de vuelta, y como yo no quería unirme a ella, me decía: «Tendrás autoridad sobre mí también, y sobre todos los que están en mi casa, si te entregas a mí, y serás como nuestro señor».


    3. Pero yo recordaba las palabras de mi padre, y entrando llorando en mi cámara, oraba al Señor.


    4. Y ayuné durante aquellos siete años, y aparecía al egipcio como quien vive en lujo; pues los que ayunan por causa de Dios reciben gracia en el rostro.


    5. Y si mi amo estaba ausente, no bebía vino; y cada tercer día tomaba mi alimento, y lo daba a los pobres y a los enfermos.


    6. Y madrugaba ante el Señor y lloraba a causa de Menfis la egipcia, porque me importunaba muchísimo sin cesar; pues incluso de noche entraba a mí con pretexto de visitarme.


    7. Y como ella no tenía hijo varón[d][c], fingía'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Algunos testigos incluyen una repetición adicional de la amenaza: ''y me amenazó''.'
    reason: textual_variant
  - marker: b
    text: '''Al egipcio'' puede referirse específicamente al amo egipcio de José, aunque el griego deja la expresión escueta.'
    reason: alternative_reading
  - marker: c
    text: La frase 'por tres días tomaba mi alimento' también puede entenderse como comer cada tercer día o tras un intervalo de tres días.
    reason: lexical_alternative
  - marker: d
    text: Menfis es el nombre que se da aquí a la egipcia en este testigo griego.
    reason: cultural_note
lexical_decisions:
- source_word: δοκιμάσαι / δόκιμον
  english_pob_choice: test / approved
  chosen_spanish: probar / aprobado
  alternatives_spanish:
  - examinar / probado
  - tentar / genuino
  lexicon: LSJ
  rationale: El par 'probar / aprobado' conserva la fuerza ética de haber resistido la prueba sin sobreampliar la frase, central en la resistencia moral de José.
- source_word: διαβούλιον
  english_pob_choice: resolve
  chosen_spanish: resolución
  alternatives_spanish:
  - propósito
  - intención
  - consejo
  lexicon: LSJ
  rationale: Se refiere a la intención interior o plan asentado del alma. 'Resolución' es idiomático y conserva el matiz volitivo-moral.
- source_word: μακροθυμία / ἐμακροθύμησα
  english_pob_choice: patience / I was patient
  chosen_spanish: paciencia / tuve paciencia
  alternatives_spanish:
  - longanimidad / aguanté
  - indulgencia
  lexicon: BDAG
  rationale: Virtud temática del capítulo. 'Paciencia' es legible en español moderno y conserva el sentido de soportar con dominio bajo provocación.
- source_word: φάρμακον
  english_pob_choice: remedy
  chosen_spanish: remedio
  alternatives_spanish:
  - medicina
  - cura
  lexicon: LSJ
  rationale: José presenta la paciencia como respuesta sanadora a la tentación y al hostigamiento. 'Remedio' encaja con la metáfora en español.
- source_word: συνελθεῖν
  english_pob_choice: come together with
  chosen_spanish: unirme a ella
  alternatives_spanish:
  - acostarme con ella
  - tener relaciones con ella
  lexicon: LSJ
  rationale: El sintagma es eufemismo sexual. 'Unirme a ella' preserva el registro testamentario elevado sin volverse vago.
- source_word: κυριεύσεις
  english_pob_choice: have authority
  chosen_spanish: tendrás autoridad
  alternatives_spanish:
  - dominarás
  - serás señor de
  lexicon: BDAG
  rationale: La oferta es de dominio y estatus. 'Tendrás autoridad' comunica el poder con claridad sin importar lenguaje teológico de 'señor' aquí.
- source_word: ἐπιδῷς ἑαυτόν
  english_pob_choice: give yourself
  chosen_spanish: te entregas
  alternatives_spanish:
  - te rindes
  - te sometes
  lexicon: LSJ
  rationale: La expresión transmite entrega sexual. 'Entregarse' es directo e idiomático y conserva el discurso manipulador de la mujer.
- source_word: ταμεῖον
  english_pob_choice: chamber
  chosen_spanish: cámara
  alternatives_spanish:
  - aposento
  - cuarto interior
  lexicon: LSJ
  rationale: Aquí José se retira en privado para orar. 'Cámara' conserva el sentido de habitación privada y el tono elevado.
- source_word: τῷ Αἰγυπτίῳ
  english_pob_choice: to the Egyptian
  chosen_spanish: al egipcio
  alternatives_spanish:
  - al varón egipcio
  - a mi amo egipcio
  lexicon: LSJ
  rationale: El griego es masculino singular y probablemente alude al amo egipcio o a la percepción de la casa. La traducción literal mantiene la ambigüedad del original.
- source_word: ἐν τρυφῇ διάγων
  english_pob_choice: living in luxury
  chosen_spanish: vive en lujo
  alternatives_spanish:
  - vive con delicadeza
  - vive en comodidad
  lexicon: LSJ
  rationale: La ironía es que el ayuno lo hacía parecer favorecido en vez de privado. 'Vive en lujo' captura la apariencia externa.
- source_word: τοῦ προσώπου τὴν χάριν
  english_pob_choice: grace of face
  chosen_spanish: gracia en el rostro
  alternatives_spanish:
  - favor en la apariencia
  - hermosura del semblante
  lexicon: LSJ
  rationale: La frase alude a la atracción visible o favor en el aspecto. 'Gracia en el rostro' mantiene la imagen concreta y queda comprensible.
- source_word: τριημερίζων
  english_pob_choice: every third day
  chosen_spanish: cada tercer día
  alternatives_spanish:
  - por tres días
  - después de un intervalo de tres días
  lexicon: LSJ
  rationale: El contexto de ayuno sugiere un patrón triádico de comer con demora. 'Cada tercer día' refleja el ritmo ascético, conforme con la revisión POB.
- source_word: Ὤρθριζον
  english_pob_choice: I would rise early
  chosen_spanish: madrugaba
  alternatives_spanish:
  - me levantaba al alba
  - guardaba la vigilia matutina
  lexicon: LSJ
  rationale: El verbo expresa el levantarse temprano para orar. 'Madrugaba' es natural en español y conserva el aspecto habitual.
- source_word: λόγῳ ἐπισκέψεως
  english_pob_choice: under a pretext of visiting
  chosen_spanish: con pretexto de visitarme
  alternatives_spanish:
  - con palabra de inquirir
  - con la excusa de su preocupación
  lexicon: LSJ
  rationale: Indica una excusa social plausible que enmascara intención ilícita. 'Con pretexto de visitarme' explicita el engaño desde el contexto.
- source_word: τέκνον ἄρρεν
  english_pob_choice: male child
  chosen_spanish: hijo varón
  alternatives_spanish:
  - hijo
  - vástago varón
  lexicon: LSJ
  rationale: El griego es literalmente 'hijo varón.' Conservar esa formulación preserva el motivo familiar concreto en la narrativa.
- source_word: προσεποιεῖτο
  english_pob_choice: pretended
  chosen_spanish: fingía
  alternatives_spanish:
  - pretendía
  - simulaba
  lexicon: LSJ
  rationale: El verbo marca un fingimiento deliberado. 'Fingía' es conciso y claro.
theological_decisions:
- issue: Traducción de κύριος en las referencias a la oración de José
  chosen_reading: Señor
  alternative_readings:
  - Amo
  rationale: En contexto de oración el referente es Dios, y la doctrina del proyecto traduce κύριος como 'Señor' por defecto.
  doctrine_reference: 'DOCTRINE.md: términos disputados — κύριος → Señor'
- issue: Afirmación ascética sobre el ayuno y la apariencia
  chosen_reading: los que ayunan por causa de Dios reciben gracia en el rostro
  alternative_readings:
  - reciben favor de semblante
  - obtienen hermosura de apariencia
  rationale: 'El griego presenta una afirmación moral-espiritual sin requerir adornos. La traducción conserva la lógica teológica del texto: la devoción a Dios se manifiesta exteriormente.'
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica en lugar de resolverla'
translation_notes:
  revision_awareness: 'El revision_pass POB ajustó ''purpose''→''resolve'' (διαβούλιον), ''graciousness of face''→''grace of face'' (τὴν χάριν), ''for three days''→''every third day'' (τριημερίζων), y eliminó la expansión injustificada ''que yo actuara como un hijo para ella'' en v.7. La versión española refleja esos ajustes: ''resolución'', ''gracia en el rostro'', ''cada tercer día'', y la cláusula incompleta en v.7.'
  spanish_consistency_notes:
  - κύριος en oración → 'Señor'.
  - μακροθυμία → 'paciencia' consistente en todo el capítulo.
  - Marcadores [a]-[d] preservados en orden y dentro del cuerpo del texto.
