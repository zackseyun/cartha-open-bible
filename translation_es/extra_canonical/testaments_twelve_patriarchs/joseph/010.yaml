base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/010.yaml
  text: '1[10:3]. See, then, my children, how much endurance accomplishes, and prayer with fasting.


    2. So you also, if you pursue self-control and purity with endurance, and prayer with fasting, in humility of heart, the Lord will dwell in you, because he loves self-control.


    3[10:4]. And where the Most High dwells, even if envy should befall someone, or slavery, or slander, the Lord dwelling in him, because of his self-control, not only rescues him from evils, but also exalts and glorifies him, as he did me.


    4. For every person, whether in deed or in word or in thought, comes together.


    5. My brothers knew how my father loved me, yet I was not exalted in my mind; but though I was a child, I had the fear of God in my heart, for I knew that all things will surely pass away.


    6. And I was not puffed up in evil; rather, I honored my brothers, and because of fear of them I kept silent, when I was being sold, so as not to tell the Ishmaelites that I was a son of Jacob[10:6], a great and mighty man.'
  footnotes:
  - marker: '10:3'
    text: Or 'false accusation'; the Greek term can denote malicious or trumped-up charges, fitting Joseph's experience in Egypt.
    reason: lexical_alternative
  - marker: '10:4'
    text: 'The Greek text here is difficult. The sense is that a person comes to prominence or is manifested in every sphere: deed, word, and thought.'
    reason: textual_variant
  - marker: '10:6'
    text: Some witnesses differ in this clause, but the sense is that Joseph remained silent about his family identity while being sold.
    reason: textual_variant
