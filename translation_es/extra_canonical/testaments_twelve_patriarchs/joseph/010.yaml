translation:
  language: es
  text: '1[a]. Vean, pues, hijos míos, cuánto logran la perseverancia y la oración con ayuno.



    2. Así también ustedes, si persiguen el dominio propio y la pureza con perseverancia y oración con ayuno, en humildad de corazón, el Señor habitará en ustedes, porque ama el dominio propio.



    3[b]. Pero donde habita el Altísimo, aun si la envidia cae sobre alguno, o la esclavitud, o la calumnia, el Señor que habita con él, a causa de su dominio propio, no solo lo rescata de los males, sino que también lo enaltece y lo glorifica, como hizo conmigo.



    4. Porque toda persona se manifiesta sea en obra, sea en palabra, sea en pensamiento imaginativo.



    5. Mis hermanos sabían cuánto me amaba mi padre, y yo no me ensoberbecía en mi mente; aunque era un niño, tenía el temor de Dios en mi corazón, porque sabía que ciertamente todas las cosas pasarán.



    6[c]. Y no me dejé envanecer en el mal; al contrario, honraba a mis hermanos, y por temor a ellos guardé silencio cuando estaba siendo vendido, sin decir a los ismaelitas que yo era hijo de Jacob, un hombre grande y poderoso.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: συκοφαντία (en v. 3) puede denotar 'falsa acusación' o acusación maliciosa, lo que encaja con la experiencia de José en Egipto.
    reason: lexical_alternative
  - marker: b
    text: 'El texto griego del v. 4 es difícil. El sentido es que la persona se hace patente o se manifiesta en cada esfera: obra, palabra y pensamiento. Algunos testigos leen φαντία (''imaginación'') donde otros tienen διάνοια.'
    reason: textual_variant
  - marker: c
    text: Algunos testigos del v. 6 difieren en esta cláusula y leen δικαίου ('justo'); el sentido es que José permaneció callado sobre su identidad familiar mientras lo vendían.
    reason: textual_variant
lexical_decisions:
- source_word: ὑπομονή
  english_pob_choice: endurance
  chosen_spanish: perseverancia
  alternatives_spanish:
  - paciencia
  - constancia
  lexicon: BDAG
  rationale: En contexto parenético denota constancia perseverante bajo prueba. 'Perseverancia' conserva la virtud moral central de José y resulta natural y digna en español.
- source_word: προσευχὴ μετὰ νηστείας
  english_pob_choice: prayer with fasting
  chosen_spanish: oración con ayuno
  alternatives_spanish:
  - oración acompañada de ayuno
  - oración y ayuno
  lexicon: BDAG
  rationale: La preposición μετά indica acompañamiento; 'con ayuno' preserva la práctica ascética emparejada sin sobreexpansión.
- source_word: σωφροσύνη
  english_pob_choice: self-control
  chosen_spanish: dominio propio
  alternatives_spanish:
  - templanza
  - castidad
  - sobriedad
  lexicon: BDAG
  rationale: El testamento gira en torno al autodominio moral con dimensión sexual. 'Dominio propio' captura la virtud amplia y se mantiene legible; lo sexual se refuerza al emparejarlo con 'pureza'.
- source_word: ἁγνεία
  english_pob_choice: purity
  chosen_spanish: pureza
  alternatives_spanish:
  - castidad
  - santidad
  lexicon: BDAG
  rationale: El término apunta especialmente a la pureza sexual y moral. 'Pureza' es lo bastante amplio para preservar el alcance ético sin reducirse a 'castidad'.
- source_word: ταπείνωσις καρδίας
  english_pob_choice: humility of heart
  chosen_spanish: humildad de corazón
  alternatives_spanish:
  - bajeza de corazón
  - corazón humilde
  lexicon: BDAG
  rationale: Frase ética de resonancia semítica; 'humildad de corazón' preserva el registro testamentario y el enfoque moral interior.
- source_word: κατοικέω
  english_pob_choice: dwell
  chosen_spanish: habitar
  alternatives_spanish:
  - morar
  - residir
  lexicon: BDAG
  rationale: Empleado para la presencia del Señor entre los justos. 'Habitar' preserva la dicción bíblica elevada sin sonar arcaico.
- source_word: ὁ ὕψιστος
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Excelso
  lexicon: BDAG
  rationale: Equivalente estándar del título divino en la literatura judía y cristiana en español; preserva el registro reverente.
- source_word: φθόνος
  english_pob_choice: envy
  chosen_spanish: envidia
  alternatives_spanish:
  - celos
  lexicon: BDAG
  rationale: La historia de José se mueve por la hostilidad envidiosa de sus hermanos; 'envidia' es el equivalente exacto y mantiene el motivo del vicio.
- source_word: δουλία
  english_pob_choice: slavery
  chosen_spanish: esclavitud
  alternatives_spanish:
  - servidumbre
  lexicon: BDAG
  rationale: 'Sigue la doctrina del proyecto: el sustantivo denota esclavitud real en la narrativa de José y no debe suavizarse a ''servidumbre'' donde la realidad bonded es saliente.'
- source_word: συκοφαντία
  english_pob_choice: slander
  chosen_spanish: calumnia
  alternatives_spanish:
  - acusación falsa
  - difamación
  lexicon: BDAG
  rationale: El contexto alude probablemente a las falsas acusaciones contra José. 'Calumnia' es compacto; el matiz de 'acusación falsa' se preserva en nota.
- source_word: ῥύεται
  english_pob_choice: rescues
  chosen_spanish: rescata
  alternatives_spanish:
  - libra
  - salva
  lexicon: BDAG
  rationale: El verbo denota liberación del peligro. 'Rescata' es vívido y accesible, apropiado para la exhortación narrativa.
- source_word: ὑψοῖ καὶ δοξάζει
  english_pob_choice: exalts and glorifies
  chosen_spanish: enaltece y glorifica
  alternatives_spanish:
  - levanta y honra
  - exalta y glorifica
  lexicon: BDAG
  rationale: La pareja es retóricamente importante y debe permanecer distinta. 'Enaltece y glorifica' preserva el registro elevado y el propio ascenso de José.
- source_word: διανοία
  english_pob_choice: mind / imaginative thought
  chosen_spanish: mente / pensamiento imaginativo
  alternatives_spanish:
  - pensamiento
  - entendimiento
  lexicon: BDAG
  rationale: En vv. 4–5 el término concierne tanto la disposición interior como, según testigos, la 'imaginación' (φαντία/διάνοια). 'Mente' en v. 5; 'pensamiento imaginativo' en v. 4 refleja la decisión revisada del POB.
- source_word: φόβος τοῦ θεοῦ
  english_pob_choice: the fear of God
  chosen_spanish: el temor de Dios
  alternatives_spanish:
  - la reverencia hacia Dios
  lexicon: BDAG
  rationale: Frase ética estable de la Biblia; la traducción literal preserva el peso moral tradicional y la resonancia intertextual.
- source_word: ἐπήρθην
  english_pob_choice: was puffed up
  chosen_spanish: me dejé envanecer
  alternatives_spanish:
  - me envanecí
  - me ensoberbecí
  lexicon: BDAG
  rationale: El verbo denota llegar a enorgullecerse. 'Me dejé envanecer' conserva la fuerza metafórica del 'puffed up' inglés.
- source_word: ἐσιώπουν
  english_pob_choice: kept silent
  chosen_spanish: guardé silencio
  alternatives_spanish:
  - callaba
  - permanecí callado
  lexicon: BDAG
  rationale: El imperfecto sugiere contención sostenida; 'guardé silencio' transmite el silencio deliberado prolongado de manera natural.
theological_decisions:
- issue: Lenguaje de inhabitación divina en un texto testamentario judío
  chosen_reading: Traducir κατοικήσει / κατοικεῖ directamente como el Señor o el Altísimo habitando en/con los justos.
  alternative_readings:
  - Solo favor metafórico
  - Lenguaje de inhabitación cristianizado posterior
  rationale: El testimonio griego presenta la presencia divina como recompensa de la pureza y la perseverancia. El lenguaje puede sostenerse en su entorno ético judío sin importar precisión doctrinal posterior; la traducción debe preservar la tensión teológica.
  doctrine_reference: DOCTRINE.md §Preserve theological tension rather than resolve it
- issue: Alcance moral de σωφροσύνη
  chosen_reading: Traducir como 'dominio propio' en el texto principal, no estrechamente 'castidad'.
  alternative_readings:
  - castidad
  - templanza
  rationale: La preocupación inmediata de José es la pureza sexual, pero la virtud en el discurso moral-religioso griego es el dominio disciplinado más amplio del yo. Emparejarla con 'pureza' permite al capítulo conservar amplitud y relevancia sexual.
  doctrine_reference: DOCTRINE.md §Consistency of key terms, or documented exception
translation_notes:
  revision_awareness: 'El pase de revisión inglés realizó múltiples ajustes: ''among you'' → ''in you'' (v. 2); ''And'' → ''But'' al inicio del v. 3; reescritura del v. 4 para alinear con πάντας ἀνθρώπους ... συνέρχεται; eliminación de conjunción superflua y reordenamiento de ''surely'' en v. 5; ''because of their fear'' → ''because of fear of them'' en v. 6. La versión española refleja todas estas decisiones.'
  spanish_consistency_notes:
  - σωφροσύνη se rinde uniformemente como 'dominio propio' en todo el capítulo (vv. 2 y 3).
  - Κύριος = 'el Señor' en todo el capítulo; ὁ ὕψιστος = 'el Altísimo' en v. 3.
  - δουλία/δοῦλος se mantiene en el campo semántico de 'esclavitud/esclavo' siguiendo la decisión del POB y la doctrina del proyecto.
  - φόβος se rinde 'temor' tanto en 'temor de Dios' (v. 5) como en 'temor a ellos' (v. 6), distinguiendo la dirección por contexto.
