base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/007.yaml
  text: '7[7:7]. So that you may learn that the wickedness of the ungodly will not prevail over those who fear God with self-control, look: taking some of it before him, I ate it in your presence. And after saying this, I tasted it and said, “The God of my fathers and the angel of Abraham will be with me.” And I ate.


    8. But when she saw this, she fell on her face at my feet, weeping; and raising her up, I admonished her.


    9. And she agreed with me no longer to commit this impiety. Yet her heart was still set on evil[7:9], and she kept looking around for a way to ensnare me; and groaning, she would collapse suddenly, though she was not sick.


    10. And when her husband saw her, he said to her, “What has happened to your face?” She said to him, “I am in pain with anguish of heart, and the groanings of my spirit hold me fast.” And he tried to heal her with words.


    11. Then, when she found an opportunity, she rushed in to me while her husband was still outside, and said to me, “I am choking; or I will throw myself down a cliff, if you do not have relations with me.”


    12. But I, understanding that the spirit of Beliar was troubling her, prayed to the Lord and said to her,


    13. “Why, miserable woman, are you disturbed and thrown into turmoil, blinding yourself in sins? Remember that if you kill yourself, Astho, your husband''s concubine, your rival[7:12], will beat your children and wipe out your memory from the earth.”'
  footnotes:
  - marker: '7:7'
    text: Or possibly, 'the angel who was with Abraham.' The Greek reads literally, 'the angel of Abraham.'
    reason: lexical_alternative
  - marker: '7:9'
    text: The description suggests feigned collapse or dramatic fits rather than actual illness.
    reason: cultural_note
  - marker: '7:12'
    text: Beliar is a traditional Jewish name for the power of evil, often rendered 'Belial.'
    reason: cross_reference
