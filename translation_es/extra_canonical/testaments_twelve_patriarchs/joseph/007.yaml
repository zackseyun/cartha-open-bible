translation:
  language: es
  text: '7. Para que aprendas que la maldad de los impíos no prevalecerá sobre los que temen a Dios con dominio propio, mira: tomando algo de ello delante de él, lo comí en tu presencia. Y después de decir esto, lo probé y dije: «El Dios de mis padres y el ángel de Abraham[a] estarán conmigo». Y comí.



    8. Pero cuando ella vio esto, cayó sobre su rostro a mis pies, llorando; y levantándola, la amonesté.



    9. Y ella convino conmigo en no cometer más esta impiedad. Sin embargo, su corazón aún estaba puesto en el mal, y seguía buscando alrededor cómo enredarme; y gimiendo, se desplomaba de repente, aunque no estaba enferma[b].



    10. Y cuando su marido la vio, le dijo: «¿Qué le ha pasado a tu rostro?». Ella le dijo: «Sufro de angustia de corazón, y los gemidos de mi espíritu me oprimen». Y él intentó sanarla con palabras.



    11. Entonces, cuando halló oportunidad, se precipitó sobre mí mientras su marido aún estaba fuera, y me dijo: «Me ahogo; o me arrojaré por un precipicio, si no tienes relaciones conmigo».



    12. Pero yo, comprendiendo que el espíritu de Beliar[c] la perturbaba, oré al Señor y le dije:



    13. «¿Por qué, mujer miserable, te agitas y te arrojas a la confusión, cegándote en pecados? Recuerda que si te quitas la vida, Asto, la concubina de tu marido, tu rival, golpeará a tus hijos y borrará tu memoria de la tierra».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente, 'el ángel que estaba con Abraham'. El griego dice literalmente 'el ángel de Abraham'.
    reason: lexical_alternative
  - marker: b
    text: La descripción sugiere desmayos fingidos o ataques teatrales más que enfermedad real.
    reason: cultural_note
  - marker: c
    text: Beliar es un nombre judío tradicional para el poder del mal, a menudo traducido 'Belial'.
    reason: cross_reference
lexical_decisions:
- source_word: σωφροσύνη
  english_pob_choice: self-control
  chosen_spanish: dominio propio
  alternatives_spanish:
  - templanza
  - castidad
  - sensatez
  lexicon: LSJ
  rationale: En el Testamento de José la virtud incluye la abstención sexual pero abarca disciplina piadosa más amplia. 'Dominio propio' preserva el sentido ético amplio en español neutro.
- source_word: θεοσεβούντων
  english_pob_choice: those who fear God
  chosen_spanish: los que temen a Dios
  alternatives_spanish:
  - los temerosos de Dios
  - los que adoran a Dios
  lexicon: LSJ
  rationale: Modismo bíblico estándar en español que conserva la fuerza moral-religiosa del participio.
- source_word: κατισχύσει
  english_pob_choice: will not prevail over
  chosen_spanish: no prevalecerá sobre
  alternatives_spanish:
  - no podrá más que
  - no triunfará sobre
  lexicon: LSJ
  rationale: '''Prevalecerá'' transmite el dominio o triunfo del verbo griego en registro elevado.'
- source_word: κακία
  english_pob_choice: wickedness
  chosen_spanish: maldad
  alternatives_spanish:
  - malicia
  - perversidad
  lexicon: LSJ
  rationale: Designa la fuerza moral activa de los impíos; 'maldad' encaja con el sentido ético amplio.
- source_word: ἀσεβούντων
  english_pob_choice: the ungodly
  chosen_spanish: los impíos
  alternatives_spanish:
  - los que actúan sin reverencia
  - los irreverentes
  lexicon: LSJ
  rationale: Mantiene el contraste con los temerosos de Dios y la polaridad moral testamentaria.
- source_word: ἄγγελος Ἀβραάμ
  english_pob_choice: the angel of Abraham
  chosen_spanish: el ángel de Abraham
  alternatives_spanish:
  - el ángel de Abrahán
  lexicon: LSJ
  rationale: Construcción inusual; se preserva la traducción literal con nota explicativa.
- source_word: ἐνουθέτησα
  english_pob_choice: I admonished her
  chosen_spanish: la amonesté
  alternatives_spanish:
  - la advertí
  - la instruí
  lexicon: LSJ
  rationale: Conserva el registro paterno-ético de corrección moral.
- source_word: ἀσέβεια
  english_pob_choice: impiety
  chosen_spanish: impiedad
  alternatives_spanish:
  - sacrilegio
  - acto impío
  lexicon: LSJ
  rationale: 'Mantiene la dimensión teológica: ofensa contra Dios, no mera inmoralidad.'
- source_word: ἔκειτο εἰς τὸ κακόν
  english_pob_choice: was still set on evil
  chosen_spanish: estaba aún puesto en el mal
  alternatives_spanish:
  - se inclinaba al mal
  - estaba empeñado en el mal
  lexicon: LSJ
  rationale: Modismo que expresa intención interior arraigada; conserva el aspecto durativo.
- source_word: παγιδεύσῃ
  english_pob_choice: ensnare me
  chosen_spanish: enredarme
  alternatives_spanish:
  - atraparme
  - tenderme una trampa
  lexicon: LSJ
  rationale: Conserva la metáfora vívida de entrampamiento moral.
- source_word: πόνον καρδίας
  english_pob_choice: anguish of heart
  chosen_spanish: angustia de corazón
  alternatives_spanish:
  - dolor de corazón
  - pesar del corazón
  lexicon: LSJ
  rationale: Transmite la intensidad emocional en español elevado.
- source_word: συνέχουσί με
  english_pob_choice: hold me fast
  chosen_spanish: me oprimen
  alternatives_spanish:
  - me sujetan
  - me dominan
  lexicon: LSJ
  rationale: Sugiere ser presionado o asido por la angustia interna; vívido y legible.
- source_word: ἐθεράπευσεν αὐτὴν ἐν λόγοις
  english_pob_choice: he tried to heal her with words
  chosen_spanish: intentó sanarla con palabras
  alternatives_spanish:
  - la consoló con palabras
  - la atendió con palabras
  lexicon: LSJ
  rationale: Preserva la metáfora de 'sanar' sin sonar clínico.
- source_word: εἰσεπήδησε
  english_pob_choice: she rushed in to me
  chosen_spanish: se precipitó sobre mí
  alternatives_spanish:
  - irrumpió hacia mí
  - se lanzó a mí
  lexicon: LSJ
  rationale: Conserva la urgencia y la fuerza repentina del verbo griego.
- source_word: Ἄγχομαι
  english_pob_choice: I am choking
  chosen_spanish: Me ahogo
  alternatives_spanish:
  - Estoy angustiada
  - Me asfixio
  lexicon: LSJ
  rationale: Conserva la inmediatez dramática del habla.
- source_word: συγγενῇ μετ᾿ ἐμοῦ
  english_pob_choice: have relations with me
  chosen_spanish: tienes relaciones conmigo
  alternatives_spanish:
  - te unes conmigo
  - te juntas conmigo íntimamente
  lexicon: LSJ
  rationale: 'Sigue la decisión revisada del POB EN: ''have relations'' como expresión idiomática y precisa.'
- source_word: πνεῦμα τοῦ Βελίαρ
  english_pob_choice: the spirit of Beliar
  chosen_spanish: el espíritu de Beliar
  alternatives_spanish:
  - el espíritu de Belial
  lexicon: LSJ
  rationale: Se transcribe la forma griega presente en el texto, estándar en esta literatura.
- source_word: ἐνοχλεῖ
  english_pob_choice: was troubling
  chosen_spanish: perturbaba
  alternatives_spanish:
  - acosaba
  - afligía
  lexicon: LSJ
  rationale: Indica perturbación persistente sin exagerar más allá del griego.
- source_word: ἄθλια
  english_pob_choice: miserable woman
  chosen_spanish: mujer miserable
  alternatives_spanish:
  - mujer desdichada
  - pobre mujer
  lexicon: LSJ
  rationale: José la reprende con firmeza pero sin crudeza; 'miserable' conserva el reproche.
- source_word: τάρασσον καὶ θορυβῇ
  english_pob_choice: are you disturbed and thrown into turmoil
  chosen_spanish: te agitas y te arrojas a la confusión
  alternatives_spanish:
  - te perturbas y te alborotas
  - te alborotas y armas tumulto
  lexicon: LSJ
  rationale: Preserva el doblete retórico que intensifica la agitación interior.
- source_word: τυφλώττουσα
  english_pob_choice: blinding yourself
  chosen_spanish: cegándote
  alternatives_spanish:
  - haciéndote ciega
  - siendo cegada
  lexicon: LSJ
  rationale: El matiz medio apunta a ceguera moral autoinfligida; 'cegándote' lo hace explícito.
- source_word: ἀνέλῃς σεαυτήν
  english_pob_choice: kill yourself
  chosen_spanish: te quitas la vida
  alternatives_spanish:
  - te matas
  - te suicidas
  lexicon: LSJ
  rationale: Expresión clara y directa apropiada a la gravedad de la advertencia en español neutro.
- source_word: παλλακή
  english_pob_choice: concubine
  chosen_spanish: concubina
  alternatives_spanish:
  - esposa secundaria
  lexicon: LSJ
  rationale: Traducción estándar y transparente del rol social indicado.
- source_word: ἀντίζηλος
  english_pob_choice: rival
  chosen_spanish: rival
  alternatives_spanish:
  - competidora celosa
  - co-esposa rival
  lexicon: LSJ
  rationale: Marca la hostilidad competitiva en el hogar; conciso y suficiente.
- source_word: κονδυλίσει
  english_pob_choice: will beat
  chosen_spanish: golpeará
  alternatives_spanish:
  - golpeará con puños
  - abusará de
  lexicon: LSJ
  rationale: Sugiere golpes violentos con el puño; 'golpeará' es fuerte y natural.
- source_word: μνημόσυνον
  english_pob_choice: your memory
  chosen_spanish: tu memoria
  alternatives_spanish:
  - tu memorial
  - tu recuerdo
  lexicon: LSJ
  rationale: La advertencia concierne al recuerdo póstumo y al legado.
theological_decisions:
- issue: Referencia a 'el ángel de Abraham'
  chosen_reading: Traducido literalmente como 'el ángel de Abraham'.
  alternative_readings:
  - el ángel que ayudó a Abraham
  - el ángel del Dios de Abraham
  rationale: La construcción griega es inusual, pero la traducción debe preservar el texto del testimonio en lugar de suavizarlo en una frase bíblica más familiar. Una nota al pie señala las posibilidades interpretativas.
  doctrine_reference: 'PHILOSOPHY.md: preservar el texto fuente con transparencia en lugar de armonizar.'
- issue: '''el espíritu de Beliar'' como poder personal del mal o impulso maligno generalizado'
  chosen_reading: Conservado como 'el espíritu de Beliar'.
  alternative_readings:
  - un espíritu maligno
  - el espíritu de inutilidad
  rationale: En los Testamentos, Beliar/Belial funciona a menudo como un poder espiritual hostil con nombre propio. La transliteración preserva el mundo literario-teológico del texto sin reducción.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: Spanish drafted from the revised English POB v2 with 'with self-control', 'no longer to commit', and 'have relations with me'. Footnote markers a/b/c map to POB markers 7:7/7:9/7:12 but renumbered as a/b/c per shard convention.
  spanish_consistency_notes:
  - σωφροσύνη consistently rendered 'dominio propio' across the chapter.
  - Beliar transliterated rather than translated as 'Belial'.
  - ἀσέβεια rendered 'impiedad' to preserve the theological dimension.
