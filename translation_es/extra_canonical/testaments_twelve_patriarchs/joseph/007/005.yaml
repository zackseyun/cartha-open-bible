id: T12P.JOS.7.5
reference: Testament of Joseph 7:5
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 256-287, Joseph pilot)
  text: '*Τότε οὖν εὐκαιρίαν λαβοῦσα¹² εἰσεπήδησε πρός με, *ἔτι ἔξω ὄντος¹³ τοῦ ἀνδρὸς αὐτῆς, καὶ λέγει¹⁴ μοι· *Ἄγχομαι, ἢ εἰς κρημνὸν ῥίπτω ἐμαυτήν¹⁵, ἐὰν μὴ *συγγενῇ μετ᾿ ἐμοῦ¹⁶.'
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/007/005.yaml
  text: Then, when she found an opportunity, she rushed in to me while her husband was still outside, and said to me, “I am choking, or I will throw myself down a cliff, if you do not lie with me.”
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:56Z'
    unchanged: false
    changes_summary: Changed ‘have relations with me’ to the more direct and faithful ‘lie with me,’ matching συγγενῇ more closely and avoiding euphemistic expansion. Also adjusted punctuation slightly for natural English.
translation:
  language: es
  text: 'Entonces, al encontrar una oportunidad, entró de repente a mí mientras su marido aún estaba fuera, y me dijo: «Me ahogo, o me arrojaré desde un precipicio, si no te acuestas conmigo».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: εὐκαιρίαν λαβοῦσα
  english_pob_choice: when she found an opportunity
  chosen_spanish: al encontrar una oportunidad
  alternatives_spanish:
  - cuando encontró una ocasión
  - aprovechando la oportunidad
  lexicon: εὐκαιρία
  rationale: Conserva la idea de ocasión favorable sin añadir matices de astucia que el griego no exige; «al encontrar» mantiene la anterioridad inmediata de la acción.
- source_word: εἰσεπήδησε πρός με
  english_pob_choice: she rushed in to me
  chosen_spanish: entró de repente a mí
  alternatives_spanish:
  - se lanzó hacia mí
  - irrumpió hacia mí
  lexicon: εἰσεπηδάω
  rationale: El verbo griego sugiere un movimiento súbito y violento; en español, «entró de repente» conserva el énfasis narrativo sin sonar forzado.
- source_word: ἔτι ἔξω ὄντος τοῦ ἀνδρὸς αὐτῆς
  english_pob_choice: while her husband was still outside
  chosen_spanish: mientras su marido aún estaba fuera
  alternatives_spanish:
  - cuando su marido todavía estaba afuera
  - estando aún fuera su marido
  lexicon: ἔξω
  rationale: «Aún estaba fuera» reproduce la simultaneidad y el estado de ausencia; «marido» es el equivalente natural de ἀνήρ en este contexto.
- source_word: Ἄγχομαι
  english_pob_choice: I am choking
  chosen_spanish: Me ahogo
  alternatives_spanish:
  - Me estoy asfixiando
  - Me estoy ahogando
  lexicon: ἄγχομαι
  rationale: El griego expresa una sensación de sofocación; «me ahogo» es breve, idiomático y suficientemente fiel sin especificar más de lo que el texto dice.
- source_word: εἰς κρημνὸν ῥίπτω ἐμαυτήν
  english_pob_choice: I will throw myself down a cliff
  chosen_spanish: me arrojaré desde un precipicio
  alternatives_spanish:
  - me arrojaré por un despeñadero
  - me lanzar é desde un barranco
  lexicon: κρημνός
  rationale: «Precipicio» comunica bien la caída mortal implicada por κρημνός; se evita ampliar con «cliff» calco anglosajón y se mantiene la autoagresión explícita.
- source_word: συγγενῇ μετ᾿ ἐμοῦ
  english_pob_choice: you do not lie with me
  chosen_spanish: te acuestas conmigo
  alternatives_spanish:
  - te acuestas con migo
  - duermes conmigo
  lexicon: συγγίνομαι
  rationale: La revisión inglesa favoreció «lie with me» frente a una paráfrasis. En español, «te acuestas conmigo» conserva la referencia sexual directa sin introducir un eufemismo más débil ni un tecnicismo ajeno al registro.
theological_decisions:
- issue: Expresión sexual directa sin suavización
  english_pob_reading: lie with me
  chosen_spanish_reading: te acuestas conmigo
  alternative_spanish_readings:
  - duermes conmigo
  - tienes relaciones conmigo
  rationale: La fuente y la revisión inglesa apuntan a una fórmula directa; en español, «te acuestas conmigo» preserva esa franqueza sin convertirla en una perífrasis más interpretativa.
  doctrine_reference: No doctrinal; decisión lexical y de registro textual.
translation_notes:
  revision_awareness: La versión inglesa revisada sustituyó una expansión eufemística por «lie with me», acercándose más al griego συγγενῇ. La traducción española sigue esa decisión con una formulación directa, evitando ampliar el sentido o atenuarlo.
  spanish_consistency_notes:
  - Se mantuvo el tono narrativo sobrio y directo propio del pasaje.
  - No se introdujeron términos doctrinales ni equivalentes eclesiásticos no presentes en el griego.
  - «Marido» se usó por naturalidad contextual frente a ἀνήρ, sin alterar el sentido de posesión familiar del relato.
  - 'La secuencia verbal conserva la progresión del original: oportunidad → irrupción → declaración → amenaza condicional.'
