base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/007/007.yaml
  text: “Why, miserable woman, are you disturbed and thrown into turmoil, blinding yourself in sins? Remember that if you kill yourself, Astho, your husband’s concubine, your rival, will beat your children and wipe out your memory from the earth.”
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:56Z'
    unchanged: false
    changes_summary: Removed the bracketed footnote marker from 'your rival[7:12]' and tightened the wording slightly to keep the verse text clean while preserving the source meaning.
translation:
  language: es
  text: «¿Por qué, mujer miserable, estás perturbada y en tumulto, cegándote[a] en pecados? Recuerda que si te quitas la vida, Astho, la concubina de tu marido, tu rival, golpeará[b] a tus hijos, y tú perderás[c] tu recuerdo de la tierra.»
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'τυφλώττουσα (participio presente activo-reflexivo): la forma participial griega implica un proceso continuo de «cegarse a sí misma», no un estado estático. «Cegándote» preserva la dinámica progresivo-reflexiva; la alternativa adjetival «ciega» la aplanaría.'
    reason: lexical_alternative
  - marker: b
    text: 'κονδυλίσει (κονδυλίζω): término específico para golpear con los nudillos del puño cerrado (κόνδυλος = nudillo), no un verbo genérico de violencia. «Golpeará» es la forma más legible en español, pero pierde el matiz preciso del golpe con el puño.'
    reason: lexical_alternative
  - marker: c
    text: 'ἀπολέσεις es 2.ª persona del singular del futuro activo («tú destruirás/perderás»), no 3.ª persona. El sujeto vuelve a la mujer interpelada, no a Astho: ella misma, al quitarse la vida, destruirá su propio recuerdo. El inglés POB «wipe out your memory» admite ambigüedad de agente, pero la gramática griega asigna la acción a la mujer. El español «tú perderás» lo hace explícito.'
    reason: textual_variant
lexical_decisions:
- source_word: ἄθλια
  english_pob_choice: miserable
  chosen_spanish: miserable
  alternatives_spanish:
  - desdichada
  - infeliz
  - desgraciada
  lexicon: 'LSJ s.v. ἄθλιος: wretched, miserable; used of persons in pitiful or lamentable condition'
  rationale: ἄθλια is the vocative feminine of ἄθλιος, denoting one who is wretched and pitiable. The direct Spanish cognate 'miserable' conveys both reproach and pity appropriate to the context and matches the English POB. 'Desdichada' is more literary and purely sympathetic; 'infeliz' softens the rebuke. 'Miserable' best retains the edge of ἄθλιος in the vocative.
- source_word: τάρασσον / θορυβῇ
  english_pob_choice: disturbed and thrown into turmoil
  chosen_spanish: perturbada y en tumulto
  alternatives_spanish:
  - agitada y alborotada
  - turbada y conmocionada
  - revuelta y en alboroto
  lexicon: 'LSJ s.v. ταράσσω: to stir up, disturb, trouble (inner agitation); s.v. θορυβέω: to throw into disorder, create an uproar (outer or emotional commotion)'
  rationale: 'The Greek pairs two distinct disturbance verbs: ταράσσω for inward psychological agitation and θορυβέω for outward disorder or clamor. ''Perturbada'' captures the inner disturbance of ταράσσω; ''en tumulto'' renders the public/outward turmoil of θορυβέω. The English POB''s pairing guides this two-part rendering, which Spanish sustains naturally.'
- source_word: τυφλώττουσα
  english_pob_choice: blinding yourself
  chosen_spanish: cegándote
  alternatives_spanish:
  - ciega
  - quedando ciega
  - volviéndote ciega
  lexicon: 'LSJ s.v. τυφλόω: to blind, make blind; the present participial form implies an ongoing, active process'
  rationale: The present active participle τυφλώττουσα implies an ongoing, self-directed process of becoming blind rather than a static condition. 'Cegándote' (reflexive present participle) preserves this dynamic, active-reflexive force. The static adjective 'ciega' would flatten the ongoing self-blinding dimension explicit in the Greek. Footnote [a] preserves this distinction.
- source_word: παλλακὴ
  english_pob_choice: concubine
  chosen_spanish: concubina
  alternatives_spanish:
  - manceba
  - amante
  - segunda esposa
  lexicon: 'LSJ s.v. παλλακή: concubine, secondary wife with recognized household status, distinct from the primary wife (γυνή)'
  rationale: παλλακή denotes a woman with a secondary but legally recognized domestic position, not merely a mistress. 'Concubina' is the standard Spanish legal-domestic equivalent and follows the English POB. 'Manceba' is an archaic Spanish term; 'amante' understates the formal household role implied by the Greek.
- source_word: ἀντίζηλος
  english_pob_choice: rival
  chosen_spanish: rival
  alternatives_spanish:
  - contrincante
  - enemiga celosa
  - competidora
  lexicon: 'LSJ s.v. ἀντίζηλος: rival in love, one who competes jealously; compound of ἀντί (against) + ζῆλος (jealousy/zeal)'
  rationale: ἀντίζηλος specifically denotes a love rival in a context of jealousy and competition for a man's affection or household standing. 'Rival' is a precise functional equivalent in Spanish and matches the English POB. The jealous-competitive connotation inherent in the Greek compound is carried naturally by 'rival' in Spanish usage.
- source_word: κονδυλίσει
  english_pob_choice: will beat
  chosen_spanish: golpeará
  alternatives_spanish:
  - apuñeteará
  - apaleará
  - maltratará
  lexicon: 'LSJ s.v. κονδυλίζω: to strike with the knuckle or fist; from κόνδυλος (knuckle, joint of the fist)'
  rationale: κονδυλίζω is a specific term for striking with the knuckle or closed fist—a cruder, more brutal violence than a general 'beat.' 'Golpeará' is serviceable and natural in Spanish, following the English POB's 'will beat.' The more precise fist-violence nuance is preserved in footnote [b]. 'Apuñetear' (to punch) is lexically closer but less natural in dignified prose.
- source_word: ἀπολέσεις
  english_pob_choice: wipe out (your memory) — implicitly attributed to Astho in English POB
  chosen_spanish: perderás (tú)
  alternatives_spanish:
  - destruirás
  - borrarás
  - eliminarás
  lexicon: 'LSJ s.v. ἀπόλλυμι: to destroy utterly, lose; ἀπολέσεις = 2nd person singular future active indicative'
  rationale: 'ἀπολέσεις is unambiguously 2nd person singular future active: ''you [the woman] will destroy/lose.'' The subject shifts from Astho—who beats the children—back to the woman herself, who will destroy her own legacy by dying by suicide. The English POB rendering ''wipe out your memory'' is grammatically ambiguous as to agent; the Greek is not. Spanish ''tú perderás'' makes the subject explicit and preserves the rhetorical force: the suicide would be an act of self-erasure. Footnote [c] flags this departure from the English POB.'
- source_word: μνημόσυνον
  english_pob_choice: memory
  chosen_spanish: recuerdo
  alternatives_spanish:
  - memoria
  - memorial
  - nombre recordado
  lexicon: 'LSJ s.v. μνημόσυνον: memorial, remembrance, that by which one is remembered; a lasting legacy'
  rationale: μνημόσυνον denotes the lasting memorial or remembrance that others hold of a person—a posthumous legacy. 'Recuerdo' (remembrance/memory of a person) is natural and idiomatic in Spanish for this sense. 'Memoria' is slightly ambiguous, as it can mean the mental faculty of memory rather than a memorial legacy left behind. 'Recuerdo de la tierra' renders the full phrase naturally.
translation_notes:
  revision_awareness: La revisión aplicada (2026-05-03, gpt-5.4-mini) eliminó el marcador de referencia cruzada «[7:12]» que seguía a «tu rival» en una versión anterior del texto inglés, con el fin de mantener limpia la prosa del versículo. El borrador español sigue el texto inglés revisado y no introduce marcadores de referencia cruzada en el cuerpo del versículo.
  spanish_consistency_notes:
  - El nombre divino (Yahvé/YHWH) no aparece en este pasaje; la convención de transliteración del proyecto no se activa aquí.
  - «Concubina» sigue la terminología estándar del proyecto para παλλακή, concordando con el inglés POB.
  - El nombre propio «Astho» (Ἀστηθώ) se transliterada siguiendo el POB inglés, sin adaptación gráfica al español.
  - «Pecados» para ἁμαρτίαις es la traducción natural en contextos morales y es consistente con el uso del proyecto para ἁμαρτία.
  - «Tú perderás» explicita el sujeto de segunda persona donde el inglés POB lo deja implícito o gramaticalmente ambiguo, siguiendo más fielmente el griego fuente y preservando la fuerza retórica del pasaje.
