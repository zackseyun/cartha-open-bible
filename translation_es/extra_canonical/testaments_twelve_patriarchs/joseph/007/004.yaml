source:
  edition: Charles 1908 Greek Versions (pages 256-287, Joseph pilot)
  text: Ἰδὼν δὲ αὐτὴν ὁ *ἀνὴρ αὐτῆς⁴ λέγει⁶ πρὸς αὐτήν⁷· Τί συνέπεσε τὸ πρόσωπόν σου; ⌜πρὸς αὐτὸν⌝⁷ εἶπεν, ⌜ὅτι⌝⁷ *πόνον καρδίας ἐγὼ ἀλγῶ, καὶ οἱ τοῦ πνεύματος στεναγμοὶ συνέχουσί με⁸. *Ὁ δὲ⁹ ἐθεράπευσεν¹⁰ αὐτὴν *ἐν λόγοις¹¹.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/007/004.yaml
  text: And when her husband saw her, he said to her, “What has happened to your face?” She said to him, “I am in pain with anguish of heart, and the groanings of my spirit hold me fast.” And he healed her with words.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:56Z'
    unchanged: false
    changes_summary: 'Removed the added ‘tried to’ so the final clause matches the source more directly: ‘he healed her with words.’'
translation:
  language: es
  text: 'Pero al verla su esposo, le dijo: «¿Qué le ha sucedido a tu rostro?». Ella le respondió: «Sufro con dolor de corazón, y los gemidos de mi espíritu me tienen presa». Y él la sanó con palabras.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀνὴρ αὐτῆς
  english_pob_choice: her husband
  chosen_spanish: su esposo
  alternatives_spanish:
  - su marido
  - su hombre
  lexicon: ἀνήρ
  rationale: El griego aquí señala al esposo en el contexto narrativo; en español, «esposo» comunica con claridad la relación matrimonial sin perder el sentido del original.
- source_word: τί συνέπεσε τὸ πρόσωπόν σου;
  english_pob_choice: What has happened to your face?
  chosen_spanish: ¿Qué le ha sucedido a tu rostro?
  alternatives_spanish:
  - ¿Qué le pasó a tu rostro?
  - ¿Qué le sucedió a tu rostro?
  lexicon: πρόσωπον
  rationale: «Rostro» es la correspondencia directa de πρόσωπον en este contexto; «le ha sucedido» conserva una formulación natural y solemne en español.
- source_word: πόνον καρδίας
  english_pob_choice: anguish of heart
  chosen_spanish: dolor de corazón
  alternatives_spanish:
  - angustia de corazón
  - dolor del corazón
  lexicon: πόνος / καρδία
  rationale: La combinación griega expresa sufrimiento interior; «dolor de corazón» mantiene la imagen y permite que «angustia» quede implícita en el contexto sin añadir más que el texto exige.
- source_word: οἱ τοῦ πνεύματος στεναγμοί
  english_pob_choice: the groanings of my spirit
  chosen_spanish: los gemidos de mi espíritu
  alternatives_spanish:
  - los suspiros de mi espíritu
  - los gemidos del espíritu
  lexicon: πνεῦμα / στεναγμός
  rationale: «Gemidos» reproduce bien στεναγμοί y «espíritu» conserva la referencia interior; no se reduce a «ánimo» porque el griego mantiene πνεῦμα.
- source_word: συνέχουσί με
  english_pob_choice: hold me fast
  chosen_spanish: me tienen presa
  alternatives_spanish:
  - me sujetan
  - me aprisionan
  lexicon: συνέχω
  rationale: La imagen de ser retenida o aprisionada está presente; «me tienen presa» comunica esa fuerza sin sonar artificial en español.
- source_word: ἐθεράπευσεν αὐτὴν ἐν λόγοις
  english_pob_choice: he healed her with words
  chosen_spanish: la sanó con palabras
  alternatives_spanish:
  - la curó con palabras
  - la sanó mediante palabras
  lexicon: θεραπεύω / λόγος
  rationale: El texto final afirma una sanidad lograda mediante palabras; «sanó con palabras» sigue de cerca el griego y el audit trail inglés, que fue corregido para no suavizar la afirmación.
theological_decisions:
- issue: Relación entre interioridad y lenguaje del espíritu
  english_pob_reading: the groanings of my spirit
  chosen_spanish_reading: los gemidos de mi espíritu
  alternative_spanish_readings:
  - los gemidos de mi alma
  - los gemidos de mi ser
  rationale: Se conserva πνεῦμα como «espíritu» para no diluir la antropología del texto ni convertirla en una paráfrasis psicológica.
  doctrine_reference: Antropología bíblica / lenguaje del espíritu humano
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada en la cláusula final para eliminar «tried to» y dejar simplemente «healed her with words»; la redacción española refleja directamente esa forma final sin suavizarla.
  spanish_consistency_notes:
  - Se mantuvo un registro narrativo sobrio y bíblico, evitando modernizaciones excesivas.
  - No se introdujo vocabulario eclesiástico tradicional donde el griego no lo exigía.
  - Se preservó la distinción entre «corazón» y «espíritu» en las dos cláusulas interiores.
