id: T12P.JOS.7.1
reference: Testament of Joseph 7:1
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 256-287, Joseph pilot)
  text: '*Ἵνα δὲ⁴⁵ μάθῃς⁴⁶, ὅτι⁴⁷ τῶν⁴⁸ ἐν σωφροσύνῃ θεοσεβούντων⁴⁹ οὐ κατισχύσει⁵⁰ κακία⁵¹ *τῶν ἀσεβούντων⁵². ⌈Ἰδοὺ⌉⁵³ λαβὼν⁵⁴ *ἐξ αὐτοῦ ἐνώπιόν σου ἐσθίων. Καὶ τοῦτο εἰπὼν εἶπον οὕτως⁵⁵. Ὁ Θεὸς τῶν πατέρων μου καὶ ὁ ἄγγελος Ἀβραὰμ⁵⁶ *ἔσται μετ᾽ ἐμοῦ⁵⁷. ⌈Ἔφαγον⌉⁵⁸.'
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/007/001.yaml
  text: '7[7:7]. So that you may learn that the wickedness of the ungodly will not prevail over those who fear God with self-control, look: taking some of it before you, I was eating it in your presence. And after saying this, I tasted it and said, “The God of my fathers and the angel of Abraham will be with me.” And I ate.'
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:56Z'
    unchanged: false
    changes_summary: Adjusted 'before him' to 'before you' to match the second-person address, and 'I ate it' to 'I was eating it' to better reflect the ongoing action in the source. Also preserved the final eating statement as a separate clause.
translation:
  language: es
  text: '7. «Y para que aprendas que la maldad de los impíos no prevalecerá sobre los que temen a Dios con dominio propio[a], mira: tomando algo de ella delante de ti, la estaba comiendo en tu presencia». Y dicho esto, hablé así: «El Dios de mis padres y el ángel de Abraham estará conmigo». Y comí.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los piadosos que viven con templanza'; σωφροσύνη también puede significar moderación o castidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν σωφροσύνῃ θεοσεβούντων
  english_pob_choice: those who fear God with self-control
  chosen_spanish: los que temen a Dios con dominio propio
  alternatives_spanish:
  - los que veneran a Dios con templanza
  - los piadosos que viven con autocontrol
  lexicon: LSJ
  rationale: θεοσεβέω = temer/venerar a Dios; σωφροσύνη = dominio propio/templanza. 'Dominio propio' es el rendimiento estándar en español bíblico moderno.
- source_word: οὐ κατισχύσει κακία τῶν ἀσεβούντων
  english_pob_choice: the wickedness of the ungodly will not prevail
  chosen_spanish: la maldad de los impíos no prevalecerá
  alternatives_spanish:
  - el mal de los impíos no triunfará
  - no podrá la maldad de los impíos
  lexicon: LSJ
  rationale: κατισχύω = prevalecer/dominar; ἀσεβέω = ser impío. La fórmula 'maldad de los impíos no prevalecerá' es idiomática y solemne.
- source_word: λαβὼν ἐξ αὐτοῦ ἐνώπιόν σου ἐσθίων
  english_pob_choice: taking some of it before you, I was eating it in your presence
  chosen_spanish: tomando algo de ella delante de ti, la estaba comiendo en tu presencia
  alternatives_spanish:
  - tomando una porción ante ti, la comía en tu presencia
  lexicon: LSJ
  rationale: Sigue la revisión POB que cambió 'before him' → 'before you' (apóstrofe directa) y 'I ate' → 'I was eating' (acción durativa). El imperfecto español refleja la duración.
- source_word: Ὁ Θεὸς τῶν πατέρων μου
  english_pob_choice: The God of my fathers
  chosen_spanish: El Dios de mis padres
  alternatives_spanish:
  - El Dios de mis antepasados
  lexicon: BDAG
  rationale: Fórmula bíblica estándar; 'padres' = antepasados patriarcales.
- source_word: ὁ ἄγγελος Ἀβραὰμ ἔσται μετ’ ἐμοῦ
  english_pob_choice: the angel of Abraham will be with me
  chosen_spanish: el ángel de Abraham estará conmigo
  alternatives_spanish:
  - el mensajero de Abraham estará conmigo
  lexicon: LSJ
  rationale: Fórmula tradicional; 'ángel' preserva el contexto revelatorio. El verbo singular ἔσται aplica al sujeto compuesto, fórmula común.
theological_decisions:
- issue: Apelación al 'ángel de Abraham' como protector divino
  chosen_reading: Mantener la fórmula litúrgica/patriarcal sin domesticarla a 'ángel del Señor'
  alternative_readings:
  - el mensajero de Abraham
  - el ángel del Dios de Abraham
  rationale: El texto griego liga directamente el ángel a Abraham, posiblemente reflejando tradición de un ángel-guardián patriarcal. La traducción preserva esta peculiaridad.
  doctrine_reference: PHILOSOPHY.md §preserve theological texture rather than smooth
translation_notes:
  revision_awareness: POB-mini revisó 'before him' → 'before you' y 'I ate' → 'I was eating' para reflejar mejor el griego (apóstrofe directa y acción durativa). El final 'And I ate' se preserva como cláusula separada. Cross-check 0.78 minor-issues.
  spanish_consistency_notes:
  - Θεός → Dios
  - ἄγγελος → ángel
  - θεοσεβέω → temer/venerar a Dios
  - σωφροσύνη → dominio propio
  - ἀσεβής → impío
