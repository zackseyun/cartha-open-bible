base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/007/006.yaml
  text: But I, understanding that the spirit of Beliar was troubling her, prayed to the Lord and said to her,
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:56Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Pero yo, al entender que el espíritu de Beliar la estaba perturbando, oré al Señor y le dije:[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Señor» refleja aquí el griego Κύριος del pasaje; el texto no desarrolla más la identificación del referente divino en esta cláusula.
    reason: source_note
lexical_decisions:
- source_word: νοήσας
  english_pob_choice: understanding
  chosen_spanish: al entender
  alternatives_spanish:
  - comprendiendo
  - dándose cuenta de
  lexicon: νοέω
  rationale: Expresa el acto de percibir mentalmente la situación sin añadir un matiz más fuerte de juicio o interpretación que el griego no exige.
- source_word: τὸ πνεῦμα τοῦ Βελίαρ
  english_pob_choice: the spirit of Beliar
  chosen_spanish: el espíritu de Beliar
  alternatives_spanish:
  - el Espíritu de Beliar
  - el demonio de Beliar
  lexicon: πνεῦμα
  rationale: Se mantiene 'espíritu' en minúscula por el sentido hostil/impuro del contexto, sin convertirlo en una identificación doctrinal más específica que el texto no formula aquí.
- source_word: ἐνοχλεῖ
  english_pob_choice: was troubling
  chosen_spanish: estaba perturbando
  alternatives_spanish:
  - estaba molestando
  - la afligía
  - la inquietaba
  lexicon: ἐνοχλέω
  rationale: '''Perturbando'' comunica bien la acción continua y opresiva del verbo, conservando un tono sobrio y natural en español.'
- source_word: προσευξάμενος τῷ Κυρίῳ
  english_pob_choice: prayed to the Lord
  chosen_spanish: oré al Señor
  alternatives_spanish:
  - oré a Yahvé
  - habiendo orado al Señor
  lexicon: Κύριος
  rationale: Aunque el nombre divino se vierte normalmente como 'Yahvé' en este proyecto, aquí el contexto griego usa Κύριος sin una cita explícita del Tetragrámaton en este versículo. Se conserva 'Señor' para reflejar con fidelidad la forma griega transmitida por la fuente y el audit trail inglés.
- source_word: εἶπον πρὸς αὐτήν
  english_pob_choice: said to her
  chosen_spanish: le dije
  alternatives_spanish:
  - le hablé
  - le dije a ella
  lexicon: λέγω + πρός
  rationale: La forma directa en español reproduce el enunciado sencillo del griego y evita una construcción más pesada.
theological_decisions:
- issue: Identificación del agente espiritual hostil
  english_pob_reading: the spirit of Beliar
  chosen_spanish_reading: el espíritu de Beliar
  alternative_spanish_readings:
  - el Espíritu de Beliar
  - el demonio de Beliar
  rationale: Se conserva la designación tal como aparece en la fuente y en la versión inglesa, sin explicitarla como 'demonio' porque el texto griego dice 'espíritu' y el POB no documenta aquí una ampliación interpretativa.
  doctrine_reference: Angelología / demonología en literatura testamentaria
translation_notes:
  revision_awareness: La versión inglesa auditada permanece sin cambios; no se registran revisiones aplicadas. La redacción española se ajusta directamente al griego fuente y al sentido ya estabilizado en el inglés POB.
  spanish_consistency_notes:
  - Se conserva la distinción entre 'espíritu' y 'Espíritu' según el contexto; aquí corresponde minúscula.
  - Se evita introducir 'Yahvé' porque el verso fuente transmite Κύριος y el audit trail inglés traduce 'the Lord'.
  - La sintaxis española mantiene la secuencia narrativa y la subordinación causal del original sin añadir elementos explicativos.
