id: T12P.JOS.7.3
reference: Testament of Joseph 7:3
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 256-287, Joseph pilot)
  text: '*ἡ δὲ⁶⁴ συνεθέτό μου⁶⁵ τοῦ⁶⁶ *μηκέτι ποιῆσαι⁶⁷ τὴν ἀσέβειαν ταύτην⁶⁸. **Ἔτι δὲ¹ ἡ καρδία αὐτῆς *ἔκειτο εἰς τὸ κακὸν καὶ περιεβλέπετο ποίῳ τρόπῳ με παγιδεύσῃ· στενάζουσα δὲ †συντόμως συνεπίπτε μὴ ἀσθενοῦσα².'
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/007/003.yaml
  text: And she agreed with me no longer to commit this impiety. Yet her heart was still set on evil, and she kept looking around for a way to ensnare me; and groaning, she would suddenly collapse, though she was not actually sick.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:56Z'
    unchanged: false
    changes_summary: Removed the bracketed verse tag, tightened the first clause to better reflect the Greek, and changed 'not sick' to 'not weak' to match μὴ ἀσθενοῦσα.
translation:
  language: es
  text: Y ella estuvo de acuerdo conmigo en no cometer ya más esta impiedad. Sin embargo, su corazón seguía inclinado al mal, y seguía mirando a un lado y a otro, buscando de qué manera tenderme una trampa; y, gimiendo, se desplomaba repentinamente, aunque no estaba débil.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: συνεθέτό μου ... μηκέτι ποιῆσαι τὴν ἀσέβειαν ταύτην
  english_pob_choice: she agreed with me no longer to commit this impiety
  chosen_spanish: estuvo de acuerdo conmigo en no cometer ya más esta impiedad
  alternatives_spanish:
  - accedió conmigo a no hacer más esta impiedad
  - consintió conmigo en no cometer ya esta impiedad
  lexicon: συνετίθημι / ἀσέβεια
  rationale: El griego expresa consentimiento para dejar de hacer la acción; en español, ‘estar de acuerdo conmigo’ comunica bien el matiz relacional sin sobreinterpretar. ‘Impiedad’ mantiene el valor moral fuerte de ἀσέβεια, como en la POB inglesa.
- source_word: ἡ καρδία αὐτῆς ἔκειτο εἰς τὸ κακὸν
  english_pob_choice: her heart was still set on evil
  chosen_spanish: su corazón seguía inclinado al mal
  alternatives_spanish:
  - su corazón estaba aún puesto en el mal
  - su corazón seguía dispuesto al mal
  lexicon: καρδία / κεῖμαι εἰς
  rationale: ‘Estaba puesta en el mal’ suena duro en español; ‘seguía inclinada al mal’ conserva la idea de orientación persistente sin perder la fuerza moral del giro idiomático.
- source_word: περιεβλέπετο ποίῳ τρόπῳ με παγιδεύσῃ
  english_pob_choice: she kept looking around for a way to ensnare me
  chosen_spanish: seguía mirando a un lado y a otro, buscando de qué manera tenderme una trampa
  alternatives_spanish:
  - andaba mirando alrededor para ver cómo atraparme
  - buscaba cómo hacerme caer en una trampa
  lexicon: περιβλέπομαι / παγιδεύω
  rationale: ‘Mirando a un lado y a otro’ reproduce de forma natural la observación insistente de περιεβλέπετο. ‘Tenderme una trampa’ mantiene la metáfora de atrapar/engañar con más claridad para el lector español.
- source_word: στενάζουσα δὲ ... συνεπίπτε
  english_pob_choice: and groaning, she would suddenly collapse
  chosen_spanish: y, gimiendo, se desplomaba repentinamente
  alternatives_spanish:
  - y, suspirando, caía de pronto
  - y, gimiendo, caía súbitamente
  lexicon: στενάζω / συνεπιπίπτω
  rationale: ‘Gimiendo’ conserva la imagen sonora de στενάζουσα. ‘Se desplomaba repentinamente’ da en español la idea de caída súbita que sugiere συνεπίπτε, sin añadir enfermedad que el texto no afirma.
- source_word: μὴ ἀσθενοῦσα
  english_pob_choice: though she was not weak
  chosen_spanish: aunque no estaba débil
  alternatives_spanish:
  - aunque no estaba enferma
  - aunque no padecía debilidad
  lexicon: ἀσθενέω
  rationale: La revisión inglesa corrigió ‘not sick’ a ‘not weak’ para seguir μὴ ἀσθενοῦσα. En español, ‘débil’ refleja mejor esa falta de fuerza que ‘enferma’, y preserva la observación física del relato.
theological_decisions:
- issue: ἀσέβεια como impiedad y no simple incorrección moral
  english_pob_reading: this impiety
  chosen_spanish_reading: esta impiedad
  alternative_spanish_readings:
  - este pecado
  - esta irreverencia
  rationale: El término griego apunta a falta de reverencia/impiedad ante Dios, no solo a conducta mala en general. ‘Impiedad’ mantiene el peso teológico y el tono de la POB inglesa.
  doctrine_reference: piedad/impiedad en oposición a la fidelidad a Dios (cf. uso bíblico de ἀσέβεια)
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail: se refleja el valor de μηκέτι ποιῆσαι con una formulación más directa en español, se evita agregar una etiqueta versal inexistente en el texto base, y se traduce μὴ ἀσθενοῦσα como ‘no estaba débil’ en lugar de ‘no estaba enferma’.'
  spanish_consistency_notes:
  - Se mantiene ‘impiedad’ para ἀσέβεια, en continuidad con la POB inglesa y con el registro bíblico técnico.
  - Se usa ‘corazón’ para καρδία y una expresión idiomática natural (‘seguía inclinada al mal’) sin diluir la orientación moral del pasaje.
  - No se introduce ‘enferma’ porque la evidencia griega y la revisión inglesa favorecen la idea de ausencia de debilidad, no de enfermedad.
