translation:
  language: es
  text: '1. Pero Pentefris, persuadido por sus palabras, ordenó que trajeran al corredor, y le dijo: «¿Qué es esto que oigo acerca de ti: que robas almas[a] de la tierra de Canaán y las vendes como esclavos?


    2. Entonces el corredor cayó a sus pies y le suplicó, diciendo: «Te ruego, señor, no sé lo que dices.


    3. Y Pentefris cayó sobre él y le dijo: «¿De dónde, pues, es este esclavo hebreo[b] que está delante de mí?». Y él dijo: «Los ismaelitas me lo confiaron hasta que regresaran».


    4. Pero no le creyó; más bien, ordenó que lo golpearan desnudo. Y como él persistía en estas palabras, Pentefris dijo: «Entonces que traigan al joven».


    5. Y cuando fui traído, me incliné ante Pentefris, porque él era, según dijo, tercero en rango entre los gobernantes de Faraón[c].


    6. Y, después de separarme de él, me dijo: «¿Eres esclavo o libre?». Y yo dije: «Esclavo».


    7. Y él dijo: «¿De quién?». Y yo dije: «De los ismaelitas».


    8. Pero él dijo: «¿Cómo llegaste a ser su esclavo?». Y yo dije: «Me compraron de la tierra de Canaán».


    9. Pero me dijo: «Verdaderamente estás mintiendo». Y de inmediato ordenó que también a mí me desnudaran para golpearme...'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, ‘almas’; en este contexto, personas o vidas arrebatadas mediante trata.
    reason: lexical_alternative
  - marker: b
    text: 'La expresión griega es difícil al comienzo del verso; el sentido es: ‘este esclavo hebreo que está delante de mí’.'
    reason: textual_variant
  - marker: c
    text: 'O: ‘tercero en cargo entre los gobernantes de Faraón’.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μετάβολος
  english_pob_choice: broker
  chosen_spanish: corredor
  alternatives_spanish:
  - intermediario
  - tratante
  - agente
  lexicon: LSJ
  rationale: En español, ‘corredor’ puede designar un intermediario en negocios y conserva la idea de mediación comercial sin introducir un oficio moderno demasiado específico. Evita ‘mercader’, que sería más general que el griego, y ‘broker’, que no pertenece al registro objetivo del texto.
- source_word: κλέπτεις ψυχὰς
  english_pob_choice: steal souls
  chosen_spanish: robas almas
  alternatives_spanish:
  - robas personas
  - raptas personas
  - robas vidas
  lexicon: LSJ
  rationale: Sigo el valor literal de ψυχαί en la redacción griega y en el audit trail inglés, manteniendo ‘almas’ para conservar la fuerza moral del reproche. El contexto aclara que se trata de personas traficadas, sin borrar la tensión léxica.
- source_word: παῖδας μεταπωλεῖς
  english_pob_choice: sell them as slaves
  chosen_spanish: las vendes como esclavos
  alternatives_spanish:
  - las vuelves a vender como esclavos
  - las vendes en esclavitud
  - las vendes como siervos
  lexicon: LSJ
  rationale: El griego expresa reventa, pero el pasaje no exige explicitar ‘de nuevo’. ‘Como esclavos’ conserva la fuerza del predicado y coincide con la decisión revisada del inglés auditado.
- source_word: κύριε
  english_pob_choice: lord
  chosen_spanish: señor
  alternatives_spanish:
  - amo
  - señor mío
  - soberano
  lexicon: LSJ
  rationale: En la súplica ante una autoridad, ‘señor’ reproduce el registro respetuoso sin convertirlo en una relación de propiedad, que ‘amo’ sugeriría demasiado.
- source_word: γυμνὸν τύπτεσθαι
  english_pob_choice: to be beaten naked
  chosen_spanish: que lo golpearan desnudo
  alternatives_spanish:
  - que lo azotaran desnudo
  - que lo golpearan después de despojarlo de sus ropas
  - que lo desnudaran y golpearan
  lexicon: LSJ
  rationale: La combinación de desnudez y castigo humillante se conserva de manera natural en español con ‘golpearan desnudo’, que refleja el paralelo griego sin sobreexplicar el mecanismo.
- source_word: νεανίσκος
  english_pob_choice: young man
  chosen_spanish: joven
  alternatives_spanish:
  - muchacho
  - joven hombre
  - mozo
  lexicon: LSJ
  rationale: ‘Joven’ es la forma más natural y digna en la narración en primera persona, y basta para el matiz de edad/estatus del término griego.
- source_word: προσεκύνησα
  english_pob_choice: I bowed down
  chosen_spanish: me incliné
  alternatives_spanish:
  - me postré
  - hice reverencia
  - me prosterné
  lexicon: LSJ
  rationale: ‘Me incliné’ conserva el gesto de reverencia con un español más fluido. ‘Me postré’ sería más fuerte y puede sonar excesivo si el contexto solo requiere deferencia corporal.
- source_word: ἀξίωμα
  english_pob_choice: rank
  chosen_spanish: rango
  alternatives_spanish:
  - cargo
  - dignidad
  - posición
  lexicon: LSJ
  rationale: ‘Rango’ expresa bien la jerarquía oficial mencionada y mantiene el sentido comparativo con los gobernantes de Faraón.
- source_word: δοῦλος
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - sirviente
  - criado
  lexicon: BDAG
  rationale: La escena trata de compraventa y propiedad humana; por eso ‘esclavo’ es el equivalente necesario y no un término suavizado.
- source_word: ἐλεύθερος
  english_pob_choice: free
  chosen_spanish: libre
  alternatives_spanish:
  - hombre libre
  - liberto
  - no esclavo
  lexicon: BDAG
  rationale: ‘Libre’ mantiene el contraste directo con ‘esclavo’ de modo conciso e idiomático.
- source_word: πῶς αὐτῶν ἐγένου δοῦλος
  english_pob_choice: How did you become their slave?
  chosen_spanish: ¿Cómo llegaste a ser su esclavo?
  alternatives_spanish:
  - ¿Cómo fuiste hecho su esclavo?
  - ¿Cómo te hiciste su esclavo?
  - ¿Cómo pasaste a ser su esclavo?
  lexicon: LSJ
  rationale: ‘Llegaste a ser’ reproduce con naturalidad la pregunta sobre el proceso de adquisición/condición sin forzar una pasiva menos española.
- source_word: ὄντως ψεύδῃ
  english_pob_choice: You are truly lying
  chosen_spanish: Verdaderamente estás mintiendo
  alternatives_spanish:
  - De veras estás mintiendo
  - Realmente estás mintiendo
  - Ciertamente mientes
  lexicon: LSJ
  rationale: ‘Verdaderamente’ preserva el adverbio intensificador y mantiene un registro digno. ‘Estás mintiendo’ refleja el presente durativo del griego mejor que un simple ‘mientes’.
theological_decisions:
- issue: ψυχὰς en una acusación de trata/venta de personas
  english_pob_reading: Rendered literally as 'souls' in the main text while allowing the sense 'persons' to remain evident from context.
  chosen_spanish_reading: Se mantiene ‘almas’ en el texto principal, dejando que el contexto señale que se habla de personas traficadas.
  alternative_spanish_readings:
  - personas
  - vidas
  - gente
  rationale: La literalidad conserva la dureza retórica del griego y evita borrar la imagen original. En castellano, el contexto de esclavitud impide leerlo como dualismo filosófico; por eso la traducción puede mantener la tensión sin aclararla en exceso.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 4
- issue: Tratamiento de δοῦλος en un contexto de compraventa humana
  english_pob_reading: slave
  chosen_spanish_reading: esclavo
  alternative_spanish_readings:
  - siervo
  - sirviente
  - criado
  rationale: El texto no describe un servicio voluntario, sino una condición de propiedad y venta. Traducirlo como ‘esclavo’ preserva la fuerza ética y social del pasaje.
  doctrine_reference: DOCTRINE.md §Terminology on bondage language
- issue: Honroso discurso directo a una autoridad egipcia
  english_pob_reading: lord
  chosen_spanish_reading: señor
  alternative_spanish_readings:
  - amo
  - señor mío
  rationale: ‘Señor’ conserva deferencia y evita una carga posesiva que no está en la apelación griega. También armoniza con el registro narrativo en español.
  doctrine_reference: DOCTRINE.md §Register and honorifics
translation_notes:
  revision_awareness: Tomé en cuenta la revisión más reciente del audit trail inglés, que eliminó la expansión innecesaria ‘again’ de la cláusula sobre vender esclavos. Por eso el español no introduce ‘otra vez’ ni ‘de nuevo’. También seguí el cierre textual del testimonio griego disponible, que termina abruptamente con el mandato de desvestirlo para golpearlo.
  spanish_consistency_notes:
  - Mantengo ‘Pentefris’ como forma del nombre según el paquete fuente y el audit trail.
  - Uso ‘esclavo’ de manera consistente para δοῦλος, sin suavizarlo a ‘siervo’.
  - Conservo ‘almas’ en el texto principal y explicito la alternativa contextual en nota.
  - Respeto el orden narrativo y la repetición del diálogo para reflejar el tono testimonial del original.
