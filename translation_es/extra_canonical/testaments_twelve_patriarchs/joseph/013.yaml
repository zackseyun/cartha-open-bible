base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/013.yaml
  text: '1[13:1]. But Pentephris, persuaded by her words, ordered the broker to be brought, and said to him, “What is this that I hear concerning you—that you steal souls from the land of Canaan and sell them as slaves?”


    2. But the broker fell at his feet and begged him, saying, “I beg you, lord[13:3], I do not know what you are saying.”


    3. And Pentephris fell upon him and said to him, “From where, then, is this Hebrew slave before me?” And he said, “The Ishmaelites entrusted him to me until they return.”


    4. But he did not believe him; rather, he ordered him to be beaten naked. And when he persisted in these words, Pentephris said, “Then let the young man be brought.”


    5. And when I was brought in, I bowed down to Pentephris, for he was, he said, third in rank among Pharaoh’s rulers.


    6. And after separating me from him, he said to me, “Are you a slave or free?” And I said, “A slave.”


    7. And he said, “Whose?” And I said, “The Ishmaelites’.”


    8. But he said, “How did you become their slave?” And I said, “They bought me from the land of Canaan.”


    9. But he said to me[13:9][13:5], “You are truly lying.” And immediately he ordered me also to be stripped naked...'
  footnotes:
  - marker: '13:1'
    text: Greek 'steal souls' likely means 'kidnap people' or 'steal persons' in context.
    reason: lexical_alternative
  - marker: '13:3'
    text: The Greek text is difficult at the start of the verse; the sense is that Pentephris presses the broker about the origin of 'this Hebrew slave' standing before him.
    reason: textual_variant
  - marker: '13:5'
    text: Or 'third in office among Pharaoh’s rulers.'
    reason: lexical_alternative
  - marker: '13:9'
    text: The chapter breaks off in the extant OCR witness here, after 'he ordered me also to be stripped naked.'
    reason: textual_variant
