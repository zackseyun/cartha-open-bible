id: T12P.JOS.14.1
reference: Testament of Joseph 14:1
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 256-287, Joseph pilot)
  text: Ἡ δὲ Μεμφὶς¹ ἑώρα² διὰ *τῶν θυρίδων³ ⌜*τυπτόμενόν με⁴, *πλησίον γὰρ ἦν ὁ οἶκος αὐτῆς⁵, καὶ *ἀπέστειλε πρὸς αὐτόν⁶, λέγουσα⁷· *Ἄδικος⁸ ἡ κρίσις σου⁹, ὅτι τὸν *κλαπέντα ⌜ἐλεύθερον⌉ *τιμωρεῖς, ὡς ἀδικήσαντα¹⁰.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/014/001.yaml
  text: And Memphis saw me being beaten through the windows—for her house was nearby—and she sent word to him, saying, “Your judgment is unjust, because you punish as a wrongdoer a free man who has been kidnapped.”
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:56:05Z'
    unchanged: false
    changes_summary: Replaced “who has been stolen” with “who has been kidnapped” for more natural and accurate English while preserving the passive sense of τὸν κλαπέντα. No other changes needed.
translation:
  language: es
  text: 'Y Menfis me veía siendo golpeado a través de las ventanas[a], pues su casa estaba cerca, y mandó a decirle: "Tu juicio es injusto, porque castigas como malhechor a un hombre libre que ha sido secuestrado[b]."'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'a través de las celosías'; el griego puede referirse a vanos abiertos más que a ventanas con vidrio en el sentido moderno.
    reason: cultural_note
  - marker: b
    text: Literalmente, 'un hombre libre que ha sido robado', es decir, una persona ilegalmente apresada y tratada como si fuera esclava o criminal.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μεμφίς
  english_pob_choice: Memphis
  chosen_spanish: Menfis
  alternatives_spanish:
  - Memphis
  lexicon: LSJ
  rationale: Forma castellana tradicional de la ciudad y del nombre propio egipcio.
- source_word: θυρίδων
  english_pob_choice: windows
  chosen_spanish: ventanas
  alternatives_spanish:
  - celosías
  - tragaluces
  lexicon: LSJ
  rationale: Término arquitectónico claro; se conserva la posibilidad de un vano más antiguo en nota.
- source_word: κλαπέντα
  english_pob_choice: kidnapped
  chosen_spanish: secuestrado
  alternatives_spanish:
  - robado
  - raptado
  lexicon: LSJ
  rationale: El POB pasó de 'stolen' a 'kidnapped' en revisión; 'secuestrado' transmite el sentido legal-moral aplicado a una persona libre.
- source_word: ἐλεύθερον
  english_pob_choice: a free man
  chosen_spanish: un hombre libre
  alternatives_spanish:
  - alguien libre
  lexicon: LSJ
  rationale: El contraste jurídico (libre vs. esclavo) es central a la escena.
- source_word: τιμωρεῖς
  english_pob_choice: you punish
  chosen_spanish: castigas
  alternatives_spanish:
  - sancionas
  - penalizas
  lexicon: LSJ
  rationale: En este contexto judicial 'castigar' es la traducción natural del verbo de imposición de pena.
- source_word: ὡς ἀδικήσαντα
  english_pob_choice: as a wrongdoer
  chosen_spanish: como malhechor
  alternatives_spanish:
  - como si hubiera obrado mal
  - como a un culpable
  lexicon: LSJ
  rationale: Comprime la fuerza comparativa del griego en un sustantivo idiomático en español.
translation_notes:
  revision_awareness: El POB inglés pasó de 'stolen' a 'kidnapped' en su revisión para reflejar de forma más natural el participio pasivo aplicado a una persona; el español sigue esa decisión con 'secuestrado'.
  spanish_consistency_notes:
  - 'YHWH/Dios: no aparece directamente; la voz judicial es de Menfis.'
  - δοῦλος se reservará para 'esclavo' en versículos posteriores donde aparece literalmente.
