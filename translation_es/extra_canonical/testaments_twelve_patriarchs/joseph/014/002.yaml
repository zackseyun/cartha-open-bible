translation:
  language: es
  text: Pero como yo no alteré mi declaración[a] aun mientras me golpeaban, ordenó que yo fuera mantenido bajo custodia hasta que vinieran los amos del muchacho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: λόγος se refiere aquí al testimonio o relato de José en el interrogatorio; 'declaración' encaja en el ámbito jurídico.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐκ ἤλλαξα τὸν λόγον μου
  english_pob_choice: I did not alter my statement
  chosen_spanish: no alteré mi declaración
  alternatives_spanish:
  - no cambié mi palabra
  - no modifiqué mi versión
  lexicon: LSJ
  rationale: λόγος se refiere al testimonio de José en el interrogatorio; 'declaración' encaja en el contexto judicial.
- source_word: φυλαχθῆναί με
  english_pob_choice: that I be kept under guard
  chosen_spanish: que yo fuera mantenido bajo custodia
  alternatives_spanish:
  - que fuera encarcelado
  - que fuera retenido
  lexicon: LSJ
  rationale: Conserva el sentido de retención vigilada sin especificar prisión formal más allá de lo que el griego permite.
- source_word: οἱ κύριοι τοῦ παιδός
  english_pob_choice: the masters of the boy
  chosen_spanish: los amos del muchacho
  alternatives_spanish:
  - los señores del siervo
  - los dueños del esclavo
  lexicon: LSJ
  rationale: κύριοι denota autoridad/propiedad sobre el παῖς. 'Amos' refleja el contexto de servidumbre y 'muchacho' conserva la literalidad del término griego.
translation_notes:
  revision_awareness: El POB inglés no realizó cambios en este versículo durante la revisión.
  spanish_consistency_notes:
  - κύριοι se traduce por 'amos' por el contexto esclavista, no por 'señores'.
  - παιδός como 'muchacho' (literal del griego), no como 'esclavo' aunque sea funcionalmente equivalente.
