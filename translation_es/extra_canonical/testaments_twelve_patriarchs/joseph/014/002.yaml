base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/014/002.yaml
  text: But since I did not alter my statement even while I was being beaten, he ordered that I be kept under guard until the masters of the boy should come.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:56:05Z'
    unchanged: true
