base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/011/001.yaml
  text: And so[a], my children, in every deed of yours keep the fear of God before your eyes, and honor your brothers; for everyone who does the law of the Lord will be loved by him.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:56Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Y ustedes, pues[a], hijos míos, mantengan en toda obra suya delante de sus ojos el temor de Dios, y honren a sus hermanos; porque todo el que cumple la ley del Señor será amado por él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit., 'Y ustedes pues' (καὶ ὑμεῖς οὖν) — fórmula transicional que aplica el ejemplo de José a la audiencia.
    reason: spanish_style_note
lexical_decisions:
- source_word: τέκνα μου
  english_pob_choice: my children
  chosen_spanish: hijos míos
  alternatives_spanish:
  - mis hijos
  - mis niños
  lexicon: BDAG
  rationale: Vocativo testamentario. 'Hijos míos' es la fórmula natural y digna en español que mantiene el tono paternal del testamento.
- source_word: ἐν πάσῃ πράξει ὑμῶν
  english_pob_choice: in every deed of yours
  chosen_spanish: en toda obra suya
  alternatives_spanish:
  - en toda acción de ustedes
  - en cada uno de sus actos
  lexicon: BDAG
  rationale: πρᾶξις abarca cada acto o conducta. 'Toda obra suya' refleja la posesivo griego con fluidez y mantiene el registro ético.
- source_word: πρὸ ὀφθαλμῶν ὑμῶν
  english_pob_choice: before your eyes
  chosen_spanish: delante de sus ojos
  alternatives_spanish:
  - ante sus ojos
  - a la vista
  lexicon: LSJ
  rationale: Idiomática vívida y exhortativa. 'Delante de sus ojos' preserva la imagen concreta y la vigilancia moral del griego.
- source_word: τὸν τοῦ θεοῦ φόβον
  english_pob_choice: the fear of God
  chosen_spanish: el temor de Dios
  alternatives_spanish:
  - la reverencia a Dios
  - el respeto a Dios
  lexicon: BDAG
  rationale: En la exhortación ética φόβος θεοῦ tiene peso pacto-moral. 'Temor de Dios' preserva mejor la fuerza tradicional y judía-parenética que el más suave 'reverencia'.
- source_word: τιμᾶτε
  english_pob_choice: honor
  chosen_spanish: honren
  alternatives_spanish:
  - estimen
  - respeten
  lexicon: BDAG
  rationale: Imperativo plural. 'Honren' coincide mejor con la fuerza ética del griego y es natural en el español neutro latinoamericano.
- source_word: ἀδελφοὺς
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - consanguíneos
  lexicon: BDAG
  rationale: En contexto José habla como patriarca sobre relaciones literalmente fraternales y el idioma testamentario favorece 'hermanos'.
- source_word: ποιῶν νόμον Κυρίου
  english_pob_choice: does the law of the Lord
  chosen_spanish: cumple la ley del Señor
  alternatives_spanish:
  - practica la ley del Señor
  - hace la ley del Señor
  lexicon: BDAG
  rationale: El griego literalmente es 'el que hace la ley'. 'Cumple la ley' es el equivalente idiomático y semítico-ético en español sin perder la fuerza literal del verbo ποιέω.
- source_word: ἀγαπηθήσεται
  english_pob_choice: will be loved
  chosen_spanish: será amado
  alternatives_spanish:
  - será querido
  - será amado entrañablemente
  lexicon: BDAG
  rationale: Pasivo futuro directo; 'será amado por él' mantiene la respuesta divina personal y directa.
translation_notes:
  revision_awareness: El pase de revisión mini no introdujo cambios; la versión inglesa estaba ya estable. La versión española traduce de manera fiel preservando la transición exhortativa y la cláusula de promesa al final.
  spanish_consistency_notes:
  - φόβος τοῦ θεοῦ se mantiene como 'el temor de Dios' (cf. 10:5).
  - Κύριος se traduce 'el Señor' en consonancia con todo el ciclo de Joseph en español.
  - ἀδελφούς se rinde 'hermanos' (no 'hermanos y hermanas') siguiendo la decisión del POB y el contexto literal de los doce hijos de Jacob.
