translation:
  language: es
  text: 'Y cuando venía con los ismaelitas, me seguían preguntando: «¿Eres esclavo?». Y yo dije que era esclavo de casa, para no avergonzar a mis hermanos.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἐρχόμενος δὲ μετὰ τῶν Ἰσμαϊλιτῶν
  english_pob_choice: And when I was coming with the Ishmaelites
  chosen_spanish: Y cuando venía con los ismaelitas
  alternatives_spanish:
  - Y cuando iba con los ismaelitas
  - Y al venir con los ismaelitas
  lexicon: ἔρχομαι; Ἰσμαηλίτης
  rationale: El participio de movimiento se rinde de forma natural con “venía” en español, manteniendo la idea de traslado junto a los ismaelitas sin añadir matices no presentes. “Ismaelitas” sigue el nombre étnico directo.
- source_word: Δοῦλος εἶ
  english_pob_choice: Are you a slave?
  chosen_spanish: ¿Eres esclavo?
  alternatives_spanish:
  - ¿Eres siervo?
  - ¿Eres un esclavo?
  lexicon: δοῦλος
  rationale: Se conserva la fuerza léxica de δοῦλος con “esclavo”, como hace la POB en inglés. “Siervo” suavizaría indebidamente el término.
- source_word: δοῦλός εἰμι ἐξ οἴκου
  english_pob_choice: I was a household slave
  chosen_spanish: era esclavo de casa
  alternatives_spanish:
  - era esclavo de la casa
  - era esclavo doméstico
  lexicon: δοῦλος; οἶκος
  rationale: “Esclavo de casa” comunica la pertenencia al ámbito doméstico sin forzar una glosa más larga. “De la casa” o “doméstico” también son posibles, pero “de casa” resulta más idiomático y conserva el contraste de estatus.
- source_word: ἵνα μὴ αἰσχύνω τοὺς ἀδελφούς μου
  english_pob_choice: so that I might not put my brothers to shame
  chosen_spanish: para no avergonzar a mis hermanos
  alternatives_spanish:
  - para no deshonrar a mis hermanos
  - a fin de no avergonzar a mis hermanos
  lexicon: αἰσχύνω; ἀδελφοί
  rationale: “Avergonzar” reproduce bien el verbo de causar vergüenza/deshonra y mantiene la intención explicativa del pasaje. “Deshonrar” es posible, pero “avergonzar” es más directo y cercano al griego en este contexto.
theological_decisions:
- issue: Auto-presentación humillante de José para proteger a sus hermanos
  english_pob_reading: so that I might not put my brothers to shame
  chosen_spanish_reading: para no avergonzar a mis hermanos
  alternative_spanish_readings:
  - para no deshonrar a mis hermanos
  - para no avergonzar a mis hermanos ante otros
  rationale: La frase expresa la intención ética de José de proteger el honor de sus hermanos. En español, “avergonzar” conserva tanto la vergüenza social como el daño relacional sin cargar el texto con una interpretación más amplia que la del griego.
  doctrine_reference: Ethics of brotherly protection / honor-shame dynamics
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios; por eso este borrador sigue de cerca el texto griego y la lectura inglesa auditada, sin introducir ampliaciones ni correcciones textuales.
  spanish_consistency_notes:
  - Se mantiene “Yahvé” como norma del proyecto solo cuando el texto lo requiera; este versículo no la contiene.
  - Se conserva “esclavo” para δοῦλος por coherencia con la fuerza léxica documentada del término.
  - No se añade nota textual porque el contexto de revisión indica estabilidad del texto y la POB inglesa no registró variantes aquí.
