  text: Καὶ ἑώρων *μόσχον ὃς δωδεκάκις περιέβαλλε αὐτούς²⁴, καὶ ἐγένετο²⁵ τοῖς βουσὶ ὁλοκλήρως (?) εἰς βοήθειαν.
