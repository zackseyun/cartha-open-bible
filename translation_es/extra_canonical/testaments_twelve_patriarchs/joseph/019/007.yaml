base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/019/007.yaml
  text: And I saw a calf that encircled them twelve times, and it became wholly a help to the bulls.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:56Z'
    unchanged: false
    changes_summary: Smoothed the English slightly by removing the awkward phrase 'for the bulls' while preserving the source meaning; kept the rest unchanged.
translation:
  language: es
  text: Y vi un becerro[a] que los rodeó doce veces, y vino a ser enteramente una ayuda para los toros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El becerro circunscribiendo doce veces a los toros sugiere figura protectora o mediadora; la lectura simbólica permanece abierta.
    reason: cultural_note
lexical_decisions:
- source_word: μόσχον
  english_pob_choice: calf
  chosen_spanish: becerro
  alternatives_spanish:
  - ternero
  - novillo
  lexicon: LSJ
  rationale: '''Becerro'' es la equivalencia tradicional en español bíblico para μόσχος, manteniendo el registro testamentario.'
- source_word: δωδεκάκις περιέβαλλε αὐτούς
  english_pob_choice: encircled them twelve times
  chosen_spanish: los rodeó doce veces
  alternatives_spanish:
  - los circundó doce veces
  - los envolvió doce veces
  lexicon: LSJ
  rationale: '''Rodeó'' es natural y conserva la imagen de circunvalación protectora.'
- source_word: ὁλοκλήρως
  english_pob_choice: wholly
  chosen_spanish: enteramente
  alternatives_spanish:
  - completamente
  - totalmente
  - íntegramente
  lexicon: LSJ
  rationale: Conserva el sentido de totalidad/integridad del adverbio griego, con un registro elevado.
- source_word: εἰς βοήθειαν
  english_pob_choice: a help
  chosen_spanish: una ayuda
  alternatives_spanish:
  - un auxilio
  - un socorro
  lexicon: BDAG
  rationale: '''Ayuda'' es directo y comprensible, mantiene la sencillez del giro griego.'
- source_word: τοῖς βουσὶ
  english_pob_choice: to the bulls
  chosen_spanish: para los toros
  alternatives_spanish:
  - a los toros
  lexicon: LSJ
  rationale: Refleja el dativo de beneficio griego; el pase de revisión movió esta frase al final para suavizar el inglés.
translation_notes:
  revision_awareness: El pase de revisión movió 'for the bulls' al final para suavizar el inglés. El español adopta el orden natural 'una ayuda para los toros'.
  spanish_consistency_notes:
  - μόσχος → becerro (registro bíblico)
  - βόες → toros (consistencia capitular)
