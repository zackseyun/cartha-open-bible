source:
  edition: Charles 1908 Greek Versions (pages 256-287, Joseph pilot)
  text: Καὶ τοῦ τετάρτου βοὸς ἀνέβησαν τὰ κέρατα μέχρι τοῦ οὐρανοῦ καὶ ἐγένοντο ὡς τεῖχος τῶν ποιμνῶν, καὶ ἐν μέσῳ τῶν δύο²² κεράτων ἐξεβλάστησε²³ ἄλλο κέρας.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/019/006.yaml
  text: And from the fourth bull its horns went up as far as heaven and became like a wall of the flocks, and in the midst of the two horns another horn sprouted.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:57Z'
    unchanged: false
    changes_summary: Added the missing possessive reference to the bull, tightened 'for the flocks' to 'of the flocks' to match the source more closely, and rendered ἐξεβλάστησε as 'sprouted' for a more literal botanical image.
translation:
  language: es
  text: Y del cuarto toro sus cuernos[a] subieron hasta el cielo y llegaron a ser como un muro de los rebaños, y en medio de los dos cuernos brotó otro cuerno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El cuerpo y los cuernos del cuarto toro evocan la imaginería profética de poder sobrenatural (cf. Daniel 7-8).
    reason: cross_reference
lexical_decisions:
- source_word: τοῦ τετάρτου βοὸς
  english_pob_choice: from the fourth bull
  chosen_spanish: del cuarto toro
  alternatives_spanish:
  - del cuarto buey
  lexicon: LSJ
  rationale: Mantiene la consistencia con βόες traducido como 'toros' en el versículo anterior.
- source_word: ἀνέβησαν τὰ κέρατα
  english_pob_choice: its horns went up
  chosen_spanish: sus cuernos subieron
  alternatives_spanish:
  - se elevaron sus cuernos
  - ascendieron sus cuernos
  lexicon: BDAG
  rationale: El pase de revisión añadió el posesivo ('its'); el español 'sus cuernos' sigue esa lectura.
- source_word: μέχρι τοῦ οὐρανοῦ
  english_pob_choice: as far as heaven
  chosen_spanish: hasta el cielo
  alternatives_spanish:
  - hasta los cielos
  - hasta el firmamento
  lexicon: LSJ
  rationale: Equivalencia directa y bíblica.
- source_word: ὡς τεῖχος τῶν ποιμνῶν
  english_pob_choice: like a wall of the flocks
  chosen_spanish: como un muro de los rebaños
  alternatives_spanish:
  - como una muralla de los rebaños
  - como un muro para los rebaños
  lexicon: LSJ
  rationale: El pase de revisión cambió 'for the flocks' a 'of the flocks' para reflejar mejor el genitivo griego τῶν ποιμνῶν.
- source_word: ἐξεβλάστησε
  english_pob_choice: sprouted
  chosen_spanish: brotó
  alternatives_spanish:
  - surgió
  - germinó
  - creció
  lexicon: LSJ
  rationale: El verbo tiene imaginería vegetativa; 'brotó' comunica emergencia súbita en español manteniendo el carácter botánico, conforme al pase de revisión que prefiere 'sprouted'.
translation_notes:
  revision_awareness: El pase de revisión añadió el posesivo del toro, ajustó 'for the flocks' a 'of the flocks', y prefirió 'sprouted' por su imagen botánica. El español adopta todas estas decisiones.
  spanish_consistency_notes:
  - κέρατα → cuernos
  - ποίμνια → rebaños
  - Mantener la imagen vegetativa en 'brotó'
