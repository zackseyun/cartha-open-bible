source:
  edition: Charles 1908 Greek Versions (pages 256-287, Joseph pilot)
  text: '*Καίγε καὶ²² ὡραιότητα ἔδωκέ²³ μοι ὑπὲρ ὡραίους Ἰσραήλ, ⌜καὶ⌉ ἐφύλαξέ²⁴ με ⌜ἕως γήρους²⁵ ἐν δυνάμει καὶ⌉ ἐν κάλλει· *Καὶ γὰρ ὅμοιος ἤμην²⁶ ἐν πᾶσι τῷ²⁷ Ἰακώβ. Ἀκούσατε δέ¹, τέκνα μου, καὶ *περὶ ὧν †οἶδα ἐνυπνίων².'
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/019/001.yaml
  text: And he gave me beauty beyond the handsome men of Israel[a], and preserved me until old age in strength and in beauty; for I was like Jacob in all things. Now listen, my children, also concerning the dreams that I know about.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:57Z'
    unchanged: false
    changes_summary: Adjusted the final clause to reflect the plural ‘dreams’ (ἐνυπνίων) and the source’s ‘what I know about’ rather than ‘the dream that I saw.’
translation:
  language: es
  text: Y me dio belleza superior a la de los hombres apuestos[a] de Israel, y me preservó hasta la vejez en fuerza y en hermosura; pues fui semejante a Jacob en todas las cosas. Escuchen ahora, hijos míos, también acerca de los sueños[b] que conozco.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente 'los bellos' o 'los hermosos' de Israel; se preserva el contraste con la belleza de José.
    reason: lexical_alternative
  - marker: b
    text: El plural 'sueños' (ἐνυπνίων) sigue una variante textual que el pase de revisión adoptó frente a 'el sueño que vi'.
    reason: textual_variant
lexical_decisions:
- source_word: ὡραιότητα
  english_pob_choice: beauty
  chosen_spanish: belleza
  alternatives_spanish:
  - hermosura
  - lozanía
  lexicon: LSJ
  rationale: El término denota belleza física o atractivo. 'Belleza' es natural en español moderno y preserva el énfasis autobiográfico.
- source_word: ὡραίους
  english_pob_choice: handsome men
  chosen_spanish: hombres apuestos
  alternatives_spanish:
  - los hermosos
  - los bellos
  lexicon: LSJ
  rationale: Mantiene la comparación entre la belleza de José y la de los demás varones de Israel.
- source_word: ἐφύλαξέ
  english_pob_choice: preserved
  chosen_spanish: preservó
  alternatives_spanish:
  - guardó
  - protegió
  lexicon: BDAG
  rationale: En el contexto, Dios preserva a José hasta la vejez. 'Preservó' capta mejor la protección sostenida que el más genérico 'guardó'.
- source_word: ἕως γήρους
  english_pob_choice: until old age
  chosen_spanish: hasta la vejez
  alternatives_spanish:
  - hasta la ancianidad
  lexicon: LSJ
  rationale: Equivalencia natural y directa en español.
- source_word: κάλλει
  english_pob_choice: beauty
  chosen_spanish: hermosura
  alternatives_spanish:
  - belleza
  lexicon: LSJ
  rationale: Se traduce como 'hermosura' para distinguirlo de 'ὡραιότητα' (belleza) usado anteriormente y evitar repetición léxica.
- source_word: ἐνυπνίων
  english_pob_choice: the dreams that I know about
  chosen_spanish: los sueños que conozco
  alternatives_spanish:
  - los sueños-visiones que conozco
  lexicon: LSJ
  rationale: Plural conforme al griego ἐνυπνίων; 'que conozco' refleja οἶδα frente al anterior 'el sueño que vi'.
translation_notes:
  revision_awareness: El pase de revisión ajustó la cláusula final para reflejar el plural 'sueños' (ἐνυπνίων) y 'lo que conozco' en lugar de 'el sueño que vi'. El borrador en español adopta esta lectura.
  spanish_consistency_notes:
  - Διferenciación léxica entre ὡραιότης (belleza) y κάλλος (hermosura)
  - Mantener el plural 'sueños' conforme al texto griego revisado
  - Voz formal pero moderna apropiada para el discurso testamentario
