translation:
  language: es
  text: Doce ciervos[a] estaban paciendo en un lugar, y los nueve fueron dispersados por toda la tierra; y de igual modo también los tres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Los doce ciervos representan a las doce tribus; 'los nueve' y 'los tres' aluden al destino dividido del pueblo.
    reason: cultural_note
lexical_decisions:
- source_word: ἔλαφοι
  english_pob_choice: deer
  chosen_spanish: ciervos
  alternatives_spanish:
  - venados
  lexicon: LSJ
  rationale: El animal es cérvido; 'ciervos' es la equivalencia tradicional y de registro adecuado en español. 'Venados' sería aceptable pero más coloquial en algunas regiones.
- source_word: ἐνέμοντο
  english_pob_choice: were feeding
  chosen_spanish: estaban paciendo
  alternatives_spanish:
  - pastaban
  - se apacentaban
  lexicon: LSJ
  rationale: El verbo medio describe alimentación pastoreal; 'paciendo' preserva la imagen pastoril natural en español.
- source_word: διεσπάρησαν
  english_pob_choice: were scattered
  chosen_spanish: fueron dispersados
  alternatives_spanish:
  - se dispersaron
  - fueron esparcidos
  lexicon: LSJ
  rationale: Pasiva conforme al griego, mantiene la idea de dispersión por la tierra.
- source_word: εἰς πᾶσαν τὴν γῆν
  english_pob_choice: over all the earth
  chosen_spanish: por toda la tierra
  alternatives_spanish:
  - sobre toda la tierra
  lexicon: LSJ
  rationale: Equivalencia idiomática natural en español.
- source_word: ὁμοίως δὲ καὶ
  english_pob_choice: and likewise also
  chosen_spanish: y de igual modo también
  alternatives_spanish:
  - y asimismo también
  lexicon: LSJ
  rationale: Conserva el adverbio comparativo y la conjunción copulativa.
translation_notes:
  revision_awareness: El pase de revisión no requirió cambios. El español sigue el inglés revisado.
  spanish_consistency_notes:
