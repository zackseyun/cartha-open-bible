  text: Καὶ ἐκεῖ ἐβόησαν πρὸς Κύριον μέχρι οὐ συνήχθησαν *πρὸς αὐτοὺς¹⁷ οἱ ἐννέα ἔλαφοι καὶ ἐγίνοντο αὐτοὶ ὡς δώδεκα πρόβατα, καὶ μετ’ ὀλίγον χρόνον ηὐξάνοντο καὶ ἐγίνοντο ποίμνια πολλά.
