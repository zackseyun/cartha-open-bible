translation:
  language: es
  text: Y allí clamaron al Señor hasta que los nueve ciervos se reunieron con ellos, y ellos mismos llegaron a ser como doce ovejas[a]; y al cabo de poco tiempo aumentaron y llegaron a ser muchos rebaños.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Las doce ovejas representan la reunión completa de las doce tribus.
    reason: cultural_note
lexical_decisions:
- source_word: ἐβόησαν πρὸς Κύριον
  english_pob_choice: they cried out to the Lord
  chosen_spanish: clamaron al Señor
  alternatives_spanish:
  - gritaron al Señor
  lexicon: BDAG
  rationale: Consistencia con el versículo anterior; conserva el tono de súplica.
- source_word: συνήχθησαν πρὸς αὐτοὺς
  english_pob_choice: were gathered to them
  chosen_spanish: se reunieron con ellos
  alternatives_spanish:
  - fueron congregados a ellos
  - se juntaron con ellos
  lexicon: LSJ
  rationale: Voz pasiva/media griega traducida con pronominal en español, más natural en la lengua moderna.
- source_word: πρόβατα
  english_pob_choice: sheep
  chosen_spanish: ovejas
  alternatives_spanish:
  - corderos
  lexicon: LSJ
  rationale: El texto distingue ovejas individuales (πρόβατα) de rebaños multiplicados (ποίμνια).
- source_word: ἐγίνοντο ποίμνια πολλά
  english_pob_choice: became many flocks
  chosen_spanish: llegaron a ser muchos rebaños
  alternatives_spanish:
  - se hicieron muchas manadas
  - se convirtieron en numerosos rebaños
  lexicon: LSJ
  rationale: '''Rebaños'' en plural mantiene la idea de multiplicación pastoral en el sueño simbólico.'
- source_word: μετ’ ὀλίγον χρόνον
  english_pob_choice: after a little time
  chosen_spanish: al cabo de poco tiempo
  alternatives_spanish:
  - después de poco tiempo
  - tras un breve tiempo
  lexicon: LSJ
  rationale: Frase idiomática natural en español que conserva la temporalidad griega.
translation_notes:
  revision_awareness: El pase de revisión no requirió cambios. El español sigue el texto inglés.
  spanish_consistency_notes:
