  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/019/004.yaml
  text: And there they cried out to the Lord until the nine deer were gathered to them, and they themselves became like twelve sheep; and after a little time they increased and became many flocks.
