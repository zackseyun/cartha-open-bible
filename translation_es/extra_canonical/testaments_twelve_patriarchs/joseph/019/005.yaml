id: T12P.JOS.19.5
reference: Testament of Joseph 19:5
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 256-287, Joseph pilot)
  text: Καὶ¹⁸ μετὰ ταῦτα ἑώρων *καὶ ἰδοὺ¹⁵ δώδεκα βόες θηλάζοντες¹⁹ μίαν δάμαλιν, ἢ ἐκ²⁰ . . . γάλακτος θάλασσαν ἐποίει καὶ ἔπινον ἐξ αὐτοῦ²¹ αἱ δώδεκα ποίμναι καὶ ἀνηρίθμητα ποίμνια.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/019/005.yaml
  text: And after these things I saw, and behold, twelve bulls suckling one heifer, and it made a sea of milk, and the twelve flocks and innumerable flocks drank from it.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:57Z'
    unchanged: false
    changes_summary: Adjusted the clause about the sea of milk to better reflect the source's impersonal/causative wording ('it made a sea of milk') while keeping the rest unchanged.
translation:
  language: es
  text: Y después de estas cosas vi, y he aquí, doce toros[a] mamando[b] de una becerra, y ella hacía un mar de leche, y bebían de él los doce rebaños y rebaños innumerables.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Los doce toros simbolizan a las doce tribus en su rol patriarcal.
    reason: cultural_note
  - marker: b
    text: La imagen de toros mamando de una becerra es deliberadamente paradójica en el sueño simbólico.
    reason: cultural_note
lexical_decisions:
- source_word: βόες
  english_pob_choice: bulls
  chosen_spanish: toros
  alternatives_spanish:
  - bueyes
  - ganado
  lexicon: LSJ
  rationale: Dado el simbolismo masculino y los cuernos posteriores, 'toros' es más vívido y coherente que 'bueyes' o el más amplio 'ganado'.
- source_word: θηλάζοντες
  english_pob_choice: suckling
  chosen_spanish: mamando
  alternatives_spanish:
  - amamantándose
  - lactando
  lexicon: BDAG
  rationale: El participio describe el acto de recibir leche; 'mamando' es directo y conserva la imagen inusual.
- source_word: δάμαλιν
  english_pob_choice: heifer
  chosen_spanish: becerra
  alternatives_spanish:
  - vaquilla
  - novilla
  lexicon: LSJ
  rationale: '''Becerra'' es el equivalente estándar y encaja con la imaginería simbólica del ganado joven.'
- source_word: γάλακτος θάλασσαν ἐποίει
  english_pob_choice: it made a sea of milk
  chosen_spanish: hacía un mar de leche
  alternatives_spanish:
  - producía un mar de leche
  - formaba un mar de leche
  lexicon: LSJ
  rationale: El pase de revisión adoptó la lectura impersonal/causativa 'it made a sea of milk'. El español 'hacía' refleja el imperfecto griego.
- source_word: ἀνηρίθμητα ποίμνια
  english_pob_choice: innumerable flocks
  chosen_spanish: rebaños innumerables
  alternatives_spanish:
  - incontables rebaños
  - manadas sin número
  lexicon: LSJ
  rationale: Mantiene la imagen de multiplicación abundante.
translation_notes:
  revision_awareness: El pase de revisión ajustó la cláusula 'it made a sea of milk' para reflejar el griego impersonal/causativo. El español adopta 'hacía un mar de leche'.
  spanish_consistency_notes:
  - βόες → toros (vs. bueyes/ganado, mantener consistencia simbólica)
  - ποίμνια → rebaños
