source:
  edition: Charles 1908 Greek Versions (pages 256-287, Joseph pilot)
  text: Ἡ γὰρ βασιλεία αὐτοῦ βασιλεία *ἔσται αἰώνιος⁴⁹ ἥτις οὐ παρελεύσεται⁵⁰. ἡ δὲ ἐμὴ βασιλεία⁵¹ ἐν ὑμῖν ἐπιτελεῖται, ὡς ὀπωροφυλάκιον⁵² ⌜γος⌉⁵³ μετὰ τὸ θέρος ἐξαφανίζεται⁵⁴.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/019/012.yaml
  text: For his kingdom will be an everlasting kingdom, which will not pass away. But my kingdom among you will be brought to completion, like a watchman's hut after the summer, vanishing away.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:57Z'
    unchanged: false
    changes_summary: Changed 'come to an end' to 'be brought to completion' to better reflect ἐπιτελεῖται, and removed the stray footnote markers. Kept the rest of the draft as accurate and natural.
translation:
  language: es
  text: Porque su reino será un reino eterno, que no pasará. Pero mi reino entre ustedes se llevará a su plenitud, como una cabaña de guardia después del verano, que desaparece.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: βασιλεία
  english_pob_choice: kingdom
  chosen_spanish: reino
  alternatives_spanish:
  - reinado
  - realeza
  lexicon: βασιλεία
  rationale: En este contexto apocalíptico y dinástico, ‘reino’ comunica mejor el ámbito y la realidad soberana que el abstracto ‘reinado’; además conserva la cadencia de la formulación inglesa sin perder naturalidad en español.
- source_word: αἰώνιος
  english_pob_choice: everlasting
  chosen_spanish: eterno
  alternatives_spanish:
  - perdurable
  - para siempre
  lexicon: αἰώνιος
  rationale: ‘Eterno’ expresa con claridad la duración sin fin que la POB inglés quiso mantener con ‘everlasting’, y funciona bien con ‘reino eterno’ en español bíblico contemporáneo.
- source_word: οὐ παρελεύσεται
  english_pob_choice: will not pass away
  chosen_spanish: no pasará
  alternatives_spanish:
  - no desaparecerá
  - no se extinguirá
  lexicon: παρέρχομαι
  rationale: La negación del paso o desaparición se puede expresar naturalmente con ‘no pasará’; es breve, idiomático y conserva la imagen de permanencia del texto griego y de la POB inglesa.
- source_word: ἐπιτελεῖται
  english_pob_choice: will be brought to completion
  chosen_spanish: se llevará a su plenitud
  alternatives_spanish:
  - será llevado a su cumplimiento
  - se completará
  lexicon: ἐπιτελέω
  rationale: La revisión inglesa corrigió ‘come to an end’ a una idea de culminación. ‘Se llevará a su plenitud’ preserva esa tensión de consumación sin sugerir mero cese, y suena natural en español.
- source_word: ὀπωροφυλάκιον
  english_pob_choice: watchman's hut
  chosen_spanish: cabaña de guardia
  alternatives_spanish:
  - choza del vigilante
  - puesto de guardia
  lexicon: ὀπωροφυλάκιον
  rationale: El término designa una caseta/choza temporal de vigilancia. ‘Cabaña de guardia’ conserva el carácter rústico y provisional del símil mejor que una expresión más técnica.
- source_word: μετὰ τὸ θέρος
  english_pob_choice: after the summer
  chosen_spanish: después del verano
  alternatives_spanish:
  - tras el verano
  - al terminar el verano
  lexicon: θέρος
  rationale: ‘Después del verano’ sigue de cerca el referente temporal del griego y reproduce la imagen de algo estacional y pasajero, en línea con la POB inglesa.
theological_decisions:
- issue: Contraste entre el reino eterno del padre y el reino transitorio de José entre los destinatarios
  english_pob_reading: His kingdom is everlasting, but my kingdom among you is brought to completion and fades away like a seasonal hut.
  chosen_spanish_reading: Su reino es eterno; en contraste, el reino de José entre ustedes alcanza su plenitud dentro de un marco temporal y provisional.
  alternative_spanish_readings:
  - Su reino es eterno, pero el mío entre ustedes termina
  - Su reino es eterno, pero el mío entre ustedes se extingue
  rationale: La revisión inglesa evita ‘come to an end’ porque el verbo griego subraya culminación. La traducción española debe mantener ese contraste sin convertir la frase en una negación de cumplimiento; por eso ‘se lleva a su plenitud’ conserva la temporalidad y la caducidad del símil.
  doctrine_reference: Escatología y realeza mesiánica/typológica en la literatura testamentaria
translation_notes:
  revision_awareness: He seguido la revisión más reciente del inglés, que cambió ‘come to an end’ por ‘be brought to completion’ para reflejar mejor ἐπιτελεῖται, y he evitado cualquier huella de los marcadores errantes eliminados en esa revisión. También he preservado la imagen comparativa de la cabaña estacional que desaparece.
  spanish_consistency_notes:
  - He mantenido ‘reino’ para βασιλεία por consistencia con el valor soberano-político del texto.
  - He evitado ‘Cristo’ o vocabulario cristológico, porque este pasaje habla del reino de Jacob/José en el marco de la obra testamentaria y no del título Χριστός.
  - ‘Entre ustedes’ conserva la referencia directa a los destinatarios sin sobrerinterpretar el pronombre inclusivo del griego.
