id: T12P.JOS.19.3
reference: Testament of Joseph 19:3
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 256-287, Joseph pilot)
  text: Καὶ ἑώρων ὅτι τρεῖς¹⁴ ἔλαφοι τρεῖς ἀμνοὶ ἐγίνοντο καὶ ἐβόησαν πρὸς Κύριον καὶ ἐξήγαγε αὐτοὺς Κύριος¹⁵ εἰς τόπον εὐθαλῆ καὶ ἔνυδρον, καὶ ἤγαγε¹⁶ αὐτοὺς ἐκ σκότους εἰς φῶς.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/019/003.yaml
  text: And I saw that the three deer became three lambs, and they cried out to the Lord, and the Lord brought them out to a flourishing and well-watered place, and brought them from darkness into light.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:56Z'
    unchanged: false
    changes_summary: Changed 'led them out' to 'brought them out' to better reflect ἐξήγαγε while keeping the rest of the draft intact.
translation:
  language: es
  text: Y vi que los tres ciervos se convirtieron en tres corderos[a], y clamaron al Señor, y el Señor los sacó a un lugar floreciente y bien regado, y los condujo de las tinieblas a la luz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El cambio de ciervos (ἔλαφοι) a corderos (ἀμνοί) marca el desplazamiento simbólico hacia imaginería sacrificial.
    reason: cultural_note
lexical_decisions:
- source_word: ἀμνοί
  english_pob_choice: lambs
  chosen_spanish: corderos
  alternatives_spanish:
  - ovejas pequeñas
  lexicon: BDAG
  rationale: La imagen pasa de ciervos a simbolismo sacrificial-pastoral. 'Corderos' preserva esa fuerza simbólica.
- source_word: ἐβόησαν πρὸς Κύριον
  english_pob_choice: they cried out to the Lord
  chosen_spanish: clamaron al Señor
  alternatives_spanish:
  - gritaron al Señor
  - invocaron al Señor
  lexicon: BDAG
  rationale: '''Clamar'' conserva el registro religioso del clamor en súplica frente al Señor.'
- source_word: ἐξήγαγε
  english_pob_choice: brought them out
  chosen_spanish: los sacó
  alternatives_spanish:
  - los hizo salir
  - los condujo fuera
  lexicon: LSJ
  rationale: Refleja el sentido del verbo compuesto griego (ἐκ + ἄγω); el pase de revisión cambió 'led them out' a 'brought them out' precisamente para mejor reflejar ἐξήγαγε.
- source_word: τόπον εὐθαλῆ καὶ ἔνυδρον
  english_pob_choice: a flourishing and well-watered place
  chosen_spanish: un lugar floreciente y bien regado
  alternatives_spanish:
  - un lugar fértil y con abundante agua
  - un lugar verdeante con agua
  lexicon: LSJ
  rationale: Mantiene la imagen pareada de fertilidad y abundancia de agua, que evoca lenguaje de restauración.
- source_word: ἐκ σκότους εἰς φῶς
  english_pob_choice: from darkness into light
  chosen_spanish: de las tinieblas a la luz
  alternatives_spanish:
  - de la oscuridad a la luz
  lexicon: BDAG
  rationale: Metáfora estándar y transparente de liberación; 'tinieblas' tiene mejor resonancia bíblica que 'oscuridad'.
translation_notes:
  revision_awareness: El pase de revisión cambió 'led them out' a 'brought them out' para reflejar mejor ἐξήγαγε. El español adopta 'los sacó'.
  spanish_consistency_notes:
  - Κύριος → Señor
  - ἐκ σκότους εἰς φῶς → 'de las tinieblas a la luz' (registro bíblico)
  - Mantener el lenguaje pastoral simbólico
