translation:
  language: es
  text: Y estas cosas han de suceder[a] en su tiempo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El pase de revisión inglés omitió 'en los últimos días' por estar presente en un testigo y ausente en otro. La traducción española sigue esa decisión textual.
