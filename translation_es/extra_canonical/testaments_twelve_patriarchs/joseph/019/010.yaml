lexical_decisions:
- source_word: γενήσεται
  english_pob_choice: must happen
  chosen_spanish: han de suceder
  alternatives_spanish:
  - sucederán
  - ocurrirán
  - deben suceder
  lexicon: BDAG
  rationale: El pase de revisión renderizó δεῖ γίνεσθαι como 'must happen' (necesidad). 'Han de suceder' en español preserva el matiz de necesidad/cumplimiento sin sonar excesivamente legalista como 'deben'.
- source_word: ἐν καιρῷ αὐτῶν
  english_pob_choice: in their time
  chosen_spanish: en su tiempo
  alternatives_spanish:
  - en su momento
  - en su sazón
  - en su tiempo señalado
  lexicon: BDAG
  rationale: Preserva el idiomatismo del tiempo divinamente ordenado en español elevado pero legible.
translation_notes:
  revision_awareness: El pase de revisión renderizó δεῖ γίνεσθαι como 'must happen' y omitió 'in the last days' por su presencia variable en los testigos. El español refleja ambas decisiones.
  spanish_consistency_notes:
  - καιρός → tiempo (en sentido escatológico)
  - Mantener brevedad sentenciosa del versículo
