base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/019/008.yaml
  text: And I saw that a virgin was born, and from her was born a lamb, and on his left there rushed forth something like a lion; and all the beasts rushed against him, and the lamb overcame them and destroyed them and trampled them down.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:57Z'
    unchanged: false
    changes_summary: Changed 'but' to 'and' to match the source's coordination; otherwise retained the draft.
translation:
  language: es
  text: Y vi que [de Judá nació] una virgen[a], [vestida con una túnica de lino fino, y de ella] nació un cordero [sin mancha]; y a su izquierda había como un león[b]; y todas las bestias se lanzaron contra él, y el cordero las venció y las destruyó para pisotearlas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Algunos testigos griegos leen más explícitamente: ''de Judá nació una virgen''; otra forma dice: ''vi entre los cuernos a cierta virgen''.'
    reason: textual_variant
  - marker: b
    text: La frase 'a su izquierda había como un león' es textualmente difícil; otro testigo expresa la escena de modo distinto pero sigue presentando un asalto bestial hostil al cordero. Algunos testigos amplían al cordero como 'sin mancha', y una lectura de tono tardío añade lenguaje similar al de 'el cordero de Dios, que quita el pecado del mundo'.
    reason: alternative_reading
lexical_decisions:
- source_word: παρθένος
  english_pob_choice: virgin
  chosen_spanish: virgen
  alternatives_spanish:
  - doncella
  - joven mujer
  lexicon: BDAG
  rationale: El término griego significa propiamente 'virgen'. Por la carga textual y teológica, la traducción más específica permanece en el texto principal y las cuestiones de interpolación se manejan en notas.
- source_word: ἀμνός
  english_pob_choice: lamb
  chosen_spanish: cordero
  alternatives_spanish:
  - oveja joven
  lexicon: BDAG
  rationale: Esta forma singular conlleva fuerte peso simbólico y debe permanecer literal.
- source_word: ὡς λέων
  english_pob_choice: something like a lion
  chosen_spanish: algo como un león
  alternatives_spanish:
  - como un león
  - una figura semejante a un león
  lexicon: LSJ
  rationale: Conserva la indeterminación del griego ('como') y la dificultad textual del pasaje.
- source_word: ὥρμων κατ᾽ αὐτοῦ
  english_pob_choice: rushed against him
  chosen_spanish: se lanzaron contra él
  alternatives_spanish:
  - arremetieron contra él
  - se precipitaron contra él
  lexicon: LSJ
  rationale: '''Se lanzaron'' captura la fuerza del verbo griego sin sonar arcaico.'
- source_word: θηρία
  english_pob_choice: beasts
  chosen_spanish: bestias
  alternatives_spanish:
  - fieras
  - animales salvajes
  lexicon: LSJ
  rationale: '''Bestias'' preserva el registro apocalíptico elevado mejor que ''animales salvajes''.'
- source_word: ἐνίκησεν
  english_pob_choice: overcame
  chosen_spanish: venció
  alternatives_spanish:
  - conquistó
  - fue victorioso sobre
  lexicon: BDAG
  rationale: '''Venció'' es contundente sin ser excesivamente expansivo; encaja con la secuencia narrativa antes de ''destruyó''.'
- source_word: ἀπώλεσεν αὐτὰ εἰς καταπάτημα
  english_pob_choice: destroyed them and trampled them down
  chosen_spanish: las destruyó y las pisoteó
  alternatives_spanish:
  - las arruinó pisoteándolas
  - las consumió hasta dejarlas pisoteadas
  lexicon: LSJ
  rationale: La frase griega es textualmente difícil; esta versión preserva tanto la destrucción como la imagen del pisoteo sin sobre-suavizarla.
theological_decisions:
- issue: Material mesiánico textualmente expandido
  chosen_reading: Texto principal sigue la redacción más breve, menos explícitamente cristiana, donde los testigos griegos divergen, mientras preserva la imaginería simbólica de la virgen y el cordero
  alternative_readings:
  - '''de Judá nació una virgen ... de ella nació un cordero sin mancha'''
  - '''el cordero de Dios, que quita el pecado del mundo'''
  rationale: El aparato griego suministrado muestra variación sustancial y probable expansión cristiana posterior. Para mantenerse transparente y anclada en el testigo, la traducción conserva lo ampliamente atestiguado y relega expansiones cristológicas más explícitas a notas.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla; traducir lo que está en el testigo griego con honestidad.
translation_notes:
  revision_awareness: El pase de revisión cambió 'but' a 'and' para coincidir con la coordinación del griego. El español usa 'y' siguiendo esta decisión.
  spanish_consistency_notes:
  - παρθένος → virgen (texto principal); las cuestiones de interpolación van en notas
  - ἀμνός → cordero
  - θηρία → bestias (registro apocalíptico)
  - Coordinación con 'y' en lugar de adversativa
