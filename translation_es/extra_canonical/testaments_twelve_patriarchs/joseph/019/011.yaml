translation:
  language: es
  text: Por tanto, ustedes, hijos míos, guarden los mandamientos del Señor, y honren a Leví y a Judá; porque de su descendencia se levantará para ustedes el Cordero de Dios, que quita el pecado del mundo, salvando a todas las naciones y a Israel.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τὰς ἐντολὰς Κυρίου
  english_pob_choice: the commandments of the Lord
  chosen_spanish: los mandamientos del Señor
  alternatives_spanish:
  - los mandamientos de Yahvé
  - los mandamientos del Señor Dios
  lexicon: ἐντολή; κύριος
  rationale: En esta cláusula la fuente griega usa κύριος sin forma explícita del nombre divino. El POB inglés conserva 'Lord'; en español 'Señor' mantiene esa equivalencia auditada sin introducir una reconstrucción más fuerte que el testimonio inmediato.
- source_word: τιμᾶτε τὸν Λευὶ καὶ τὸν Ἰούδαν
  english_pob_choice: honor Levi and Judah
  chosen_spanish: honren a Leví y a Judá
  alternatives_spanish:
  - honren a Levi y a Judá
  - den honor a Leví y a Judá
  lexicon: τιμάω; Λευί; Ἰούδας
  rationale: τιμάω pide un verbo de honra/respecto. 'Honren' suena natural y dignificado en español bíblico contemporáneo. Se conserva la forma de nombres propios como entidades tribales/personales.
- source_word: ἐκ τοῦ σπέρματος αὐτῶν
  english_pob_choice: from their seed
  chosen_spanish: de su descendencia
  alternatives_spanish:
  - de su simiente
  - de su linaje
  lexicon: σπέρμα
  rationale: '''Descendencia'' comunica bien la continuidad genealógica y evita la dureza o ambigüedad moderna de ''simiente''. Mantiene el valor colectivo heredado del término griego.'
- source_word: ἀνατελεῖ ὑμῖν
  english_pob_choice: there will arise for you
  chosen_spanish: se levantará para ustedes
  alternatives_spanish:
  - surgirá para ustedes
  - aparecerá para ustedes
  lexicon: ἀνατέλλω
  rationale: La imagen de emerger/levantarse está bien captada por 'se levantará', que es natural y conserva el matiz de aparición/promesa futura sin sobreexplicar.
- source_word: ὁ ἀμνὸς τοῦ Θεοῦ, ὁ αἴρων τὴν ἁμαρτίαν τοῦ κόσμου
  english_pob_choice: the lamb of God, who takes away the sin of the world
  chosen_spanish: el Cordero de Dios, que quita el pecado del mundo
  alternatives_spanish:
  - el Cordero de Dios, que lleva el pecado del mundo
  - el Cordero de Dios, que quita el pecado del mundo
  lexicon: ἀμνός; αἴρω; ἁμαρτία; κόσμος
  rationale: Se mantiene la fórmula cristológica tradicional que el POB inglés ya fijó. 'Quita' conserva la acción eficaz de remover/cargar fuera el pecado, con un equilibrio natural en español.
- source_word: σώζων
  english_pob_choice: saving
  chosen_spanish: salvando
  alternatives_spanish:
  - rescatando
  - trayendo salvación a
  lexicon: σῴζω
  rationale: 'El participio presente se vierte de manera directa como acción concomitante: ''salvando''. Evita una paráfrasis excesiva y conserva el impulso soteriológico del texto.'
- source_word: πάντα τὰ ἔθνη καὶ τὸν Ἰσραήλ
  english_pob_choice: all the nations and Israel
  chosen_spanish: a todas las naciones y a Israel
  alternatives_spanish:
  - a todas las naciones y a Israel
  - a todos los pueblos y a Israel
  lexicon: ἔθνη; Ἰσραήλ
  rationale: '''Naciones'' respeta el alcance étnico-universal del griego y el paralelo con Israel. Se mantiene ''Israel'' sin generalizarlo a ''pueblos'' para no borrar la distinción textual.'
theological_decisions:
- issue: 'Alcance soteriológico: ''all the nations and Israel'''
  english_pob_reading: saving [all the nations and] Israel
  chosen_spanish_reading: salvando a todas las naciones y a Israel
  alternative_spanish_readings:
  - salvando a Israel
  - salvando a todas las naciones e Israel
  rationale: El testimonio griego incluye la expansión a las naciones junto con Israel. La lectura española conserva esa amplitud universal sin atenuarla, porque el POB inglés también la retuvo en su forma principal.
  doctrine_reference: soteriology; universal scope with Israel’s inclusion
translation_notes:
  revision_awareness: El pasaje fue revisado en la última pasada y quedó sin cambios. Por eso la presente propuesta sigue de cerca el texto griego auditable y la decisión óptima del POB inglés, sin introducir variantes no sustentadas.
  spanish_consistency_notes:
  - Se usa 'Señor' para κύριος en coherencia con el POB inglés y con el contexto de cita reverente, sin sustituirlo por una máscara tipográfica.
  - Se conserva 'Cordero de Dios' como fórmula cristológica estable por estar explícita en el griego y reflejada por el POB inglés.
  - '''Descendencia'' se emplea para σπέρμα para evitar un literalismo extraño en español y mantener la referencia genealógica colectiva.'
