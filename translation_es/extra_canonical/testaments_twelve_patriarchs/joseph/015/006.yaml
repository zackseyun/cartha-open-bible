base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/015/006.yaml
  text: Then the trader said to them, “Free me from the judgment of Potiphar.”
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:56Z'
    unchanged: false
    changes_summary: Changed “Release” to “Free” to better match λύσατέ με, and kept the rest unchanged.
translation:
  language: es
  text: 'Entonces el traficante[a] les dijo: "Líbrenme del juicio[b] de Potifar."'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El μετάβολος es el intermediario en la venta de José; 'traficante' refleja el contexto comercial y de venta de personas.
    reason: lexical_alternative
  - marker: b
    text: κρίσις aquí designa el procedimiento o autoridad judicial de Potifar; se traduce 'juicio' por su apertura semántica.
    reason: lexical_alternative
lexical_decisions:
- source_word: μετάβολος
  english_pob_choice: trader
  chosen_spanish: traficante
  alternatives_spanish:
  - mercader
  - intermediario
  - tratante
  lexicon: LSJ
  rationale: Encaja con el papel del intermediario en la venta de José y la posterior exposición legal.
- source_word: Λύσατέ με
  english_pob_choice: Free me
  chosen_spanish: Líbrenme
  alternatives_spanish:
  - Suéltenme
  - Libérenme
  lexicon: LSJ
  rationale: El POB revisó 'Release' a 'Free' para acercar mejor al sentido del verbo λύω; 'librar' en imperativo plural latinoamericano transmite ambos matices.
- source_word: κρίσεως
  english_pob_choice: judgment
  chosen_spanish: juicio
  alternatives_spanish:
  - proceso
  - sentencia
  lexicon: LSJ
  rationale: Mantiene cierta apertura semántica adecuada al contexto textualmente difícil.
- source_word: Πεντεφρί
  english_pob_choice: Potiphar
  chosen_spanish: Potifar
  alternatives_spanish:
  - Pentefrí
  lexicon: LSJ
  rationale: Forma castellana tradicional del nombre del oficial egipcio, conocido por Génesis 39.
translation_notes:
  revision_awareness: El POB inglés revisó 'Release' a 'Free' para reflejar mejor λύσατέ με; el español usa 'Líbrenme' (imperativo neutro latinoamericano) que cubre ambos sentidos.
  spanish_consistency_notes:
  - Πεντεφρί → 'Potifar' (forma tradicional castellana, cf. Génesis 39).
  - μετάβολος → 'traficante' consistente con 14:6 y 15:1.
  - 'Imperativo plural en forma ''ustedes'' (latinoamericano neutro): ''Líbrenme''.'
