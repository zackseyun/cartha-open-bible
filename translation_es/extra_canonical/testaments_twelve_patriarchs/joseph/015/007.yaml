  text: '*Ἐκεῖνοι δὲ προσελθόντες³⁴ ᾔτουν³⁵ με³⁶ λέγοντες· ⌜Εἰπὲ⌉³⁷ ὅτι ἐν ἀργυρίῳ ἠγοράσθης³⁸ ἡμῖν, *κἀκεῖνος ἀπολῦσαι ἡμᾶς ἔχει³⁹.'
