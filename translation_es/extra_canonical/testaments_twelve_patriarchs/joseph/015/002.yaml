translation:
  language: es
  text: '"¿Por qué dijiste que eras esclavo[a]? Pues he aquí, hemos sabido que eres hijo de un gran hombre en la tierra de Canaán, y que tu padre todavía se lamenta por ti en cilicio y ceniza[b]."'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego δοῦλος denota explícitamente estatus de propiedad servil; 'esclavo' preserva la fuerza social y legal de la palabra, en línea con la política del POB.
    reason: lexical_alternative
  - marker: b
    text: Expresión tradicional del duelo en la Biblia hebrea (cf. Génesis 37:34, Job 2:8); el cilicio era una tela áspera y la ceniza un signo de aflicción profunda.
    reason: cultural_note
lexical_decisions:
- source_word: δοῦλον εἶναι
  english_pob_choice: a slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  lexicon: BDAG
  rationale: El POB optó por 'slave' por la centralidad del estatus de propiedad de José en esta escena; 'esclavo' refleja esa decisión en español según política del proyecto.
- source_word: υἱὸς ... ἀνδρὸς μεγάλου
  english_pob_choice: the son of a great man
  chosen_spanish: hijo de un gran hombre
  alternatives_spanish:
  - hijo de un hombre importante
  - hijo de un noble
  lexicon: LSJ
  rationale: Conserva la literalidad del griego y la dignidad social a la que apelan los ismaelitas.
- source_word: πενθεῖ περί σου
  english_pob_choice: is mourning for you
  chosen_spanish: se lamenta por ti
  alternatives_spanish:
  - está de duelo por ti
  - te llora
  lexicon: LSJ
  rationale: Verbo de lamento ritual; 'se lamenta' encaja con el cilicio y la ceniza.
- source_word: ἐν σάκκῳ καὶ σποδῷ
  english_pob_choice: in sackcloth and ashes
  chosen_spanish: en cilicio y ceniza
  alternatives_spanish:
  - con saco y ceniza
  - vestido de saco y cubierto de cenizas
  lexicon: BDAG
  rationale: '''Cilicio y ceniza'' es la expresión tradicional del duelo bíblico en español; mantiene la carga ritual judía.'
translation_notes:
  revision_awareness: El POB inglés no cambió este versículo en revisión.
  spanish_consistency_notes:
  - δοῦλος → 'esclavo' (consistente con la nota lexical_decision del capítulo).
  - σάκκος → 'cilicio' (terminología bíblica tradicional en español).
