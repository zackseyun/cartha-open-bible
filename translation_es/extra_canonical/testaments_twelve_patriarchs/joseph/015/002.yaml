base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/015/002.yaml
  text: “Why did you say that you were a slave? For behold, we have learned that you are the son of a great man in the land of Canaan, and that your father is still mourning for you in sackcloth and ashes.”
  revision_pass:
