translation:
  language: es
  text: Entonces, en efecto, decidieron[a] venderme, para que yo no fuera hallado en sus manos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El verbo griego ἐβουλεύσαντο puede traducirse también como 'tomaron consejo' o 'deliberaron'; conserva el matiz de decisión deliberada y conspirativa.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐβουλεύσαντο
  english_pob_choice: decided
  chosen_spanish: decidieron
  alternatives_spanish:
  - resolvieron
  - deliberaron
  - tomaron consejo
  lexicon: LSJ
  rationale: El POB revisó 'took counsel' a 'decided' para una traducción más directa; el español adopta la misma decisión.
- source_word: ἐν ταῖς χερσὶν αὐτῶν
  english_pob_choice: in their hands
  chosen_spanish: en sus manos
  alternatives_spanish:
  - en su poder
  lexicon: LSJ
  rationale: Conserva la literalidad y la fuerza idiomática hebrea/griega de 'estar en manos de alguien'.
translation_notes:
