base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/015/004.yaml
  text: Then, indeed, they decided to sell me, so that I might not be found in their hands.
  revision_pass:
    model: gpt-5.4-mini
