base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/015/005.yaml
  text: For they feared my father, lest he come among them and take vengeance for the danger; for they had heard that he was great before God and men.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:56Z'
    unchanged: false
    changes_summary: Adjusted the final clause to preserve 'before God and men' more directly and added 'for the danger' to reflect ἐκδίκησιν κινδύνου; kept the sentence otherwise close to the draft.
translation:
  language: es
  text: Pues temían a mi padre, no fuera que viniera entre ellos y tomara venganza por el peligro[a]; porque habían oído que él era grande delante de Dios y de los hombres[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase ἐκδίκησιν κινδύνου es difícil; algunos testigos pueden implicar 'ejecutar venganza por el peligro' o expresión similar. La traducción preserva el sentido de represalia temida sin sobre-armonizar.
    reason: textual_variant
  - marker: b
    text: Idiomatismo griego para denotar reputación o estatus público; expresión tradicional en castellano bíblico (cf. Lucas 2:52).
    reason: cultural_note
lexical_decisions:
- source_word: ἐλθὼν ἐν αὐτοῖς ποιήσῃ
  english_pob_choice: come among them and take vengeance
  chosen_spanish: viniera entre ellos y tomara venganza
  alternatives_spanish:
  - viniera contra ellos y se vengara
  - se presentara entre ellos y los castigara
  lexicon: LSJ
  rationale: El POB revisó hacia 'come among them' por mayor cercanía al ἐν αὐτοῖς; el español mantiene la traducción literal del giro.
- source_word: ἐκδίκησιν κινδύνου
  english_pob_choice: vengeance for the danger
  chosen_spanish: venganza por el peligro
  alternatives_spanish:
  - venganza peligrosa
  - represalia por el peligro
  lexicon: LSJ
  rationale: El POB revisó para conservar 'for the danger' como traducción del genitivo κινδύνου; el español lo refleja como complemento causal.
- source_word: παρὰ Θεῷ καὶ ἀνθρώποις
  english_pob_choice: before God and men
  chosen_spanish: delante de Dios y de los hombres
  alternatives_spanish:
  - ante Dios y los hombres
  - con Dios y los hombres
  lexicon: LSJ
  rationale: Idiomatismo griego para reputación pública; 'delante de Dios y de los hombres' es la formulación tradicional bíblica en español (cf. Lucas 2:52).
translation_notes:
  revision_awareness: El POB inglés revisó para incluir 'among them' y 'for the danger' a fin de reflejar mejor el griego; el español sigue ambas decisiones.
  spanish_consistency_notes:
  - παρὰ Θεῷ → 'delante de Dios' (registro tradicional bíblico).
  - θεός → 'Dios' (mayúscula, según política del proyecto).
