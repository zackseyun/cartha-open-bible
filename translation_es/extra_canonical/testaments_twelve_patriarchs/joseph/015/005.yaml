  text: Ἐφόβουντο γὰρ τὸν *πατέρα μου²⁵, ἵνα μὴ *ἐλθὼν ἐν αὐτοῖς ποιήσῃ²⁶ ἐκδίκησιν κινδύνου²⁷. ἤκουον²⁸ γὰρ ὅτι μέγας ἐστὶ παρὰ Θεῷ²⁹ καὶ³⁰ ἀνθρώποις.
