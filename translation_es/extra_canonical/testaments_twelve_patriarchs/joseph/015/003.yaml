translation:
  language: es
  text: 'Cuando oí estas cosas, mis entrañas se desgarraron[a], y mi corazón se derritió, y deseaba mucho llorar. Pero me contuve, para no avergonzar a mis hermanos. Y les dije: "No sé; soy esclavo[b]."'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Expresión visceral semítica para describir un colapso emocional profundo; literalmente 'mis entrañas se disolvieron'.
    reason: lexical_alternative
  - marker: b
    text: δοῦλος (esclavo) preserva la dimensión jurídico-social del estatus de propiedad, no meramente el de servidor.
    reason: lexical_alternative
lexical_decisions:
- source_word: διελύθη τὰ σπλάγχνα μου
  english_pob_choice: my inward parts were torn apart
  chosen_spanish: mis entrañas se desgarraron
  alternatives_spanish:
  - mis entrañas se deshicieron
  - se me partieron las entrañas
  lexicon: LSJ
  rationale: Conserva la expresión emocional visceral de tipo semítico sin reducirla a tristeza genérica.
- source_word: ἐτάκη
  english_pob_choice: melted
  chosen_spanish: se derritió
  alternatives_spanish:
  - se desfalleció
  - desfalleció
  lexicon: LSJ
  rationale: Mantiene la intensidad metafórica del colapso emocional en paralelo con la cláusula anterior.
- source_word: ἐπέσχον ἐμαυτόν
  english_pob_choice: I restrained myself
  chosen_spanish: me contuve
  alternatives_spanish:
  - me dominé
  - me retuve
  lexicon: LSJ
  rationale: Capta el dominio propio deliberado de José, tema central de virtud en este testamento.
- source_word: αἰσχύνω
  english_pob_choice: put ... to shame
  chosen_spanish: avergonzar
  alternatives_spanish:
  - deshonrar
  - humillar
  lexicon: LSJ
  rationale: Conserva la dimensión honor-vergüenza explícita y legible.
- source_word: δοῦλος
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  lexicon: BDAG
  rationale: Sigue la política del POB; el estatus de propiedad de José es central a la escena.
theological_decisions:
- issue: Negación de identidad por parte de José ante los ismaelitas pese a oír del duelo de Jacob
  chosen_reading: José suprime su identidad por preocupación de no avergonzar a sus hermanos
  alternative_readings:
  - José simplemente está resignado a la esclavitud
  - José teme más peligro si lo identifican
  rationale: La cláusula explícita 'para no avergonzar a mis hermanos' rige la escena y debe permanecer central en lugar de suavizarse en una resignación pasiva.
  doctrine_reference: Preservar la tensión teológica y moral en lugar de resolverla.
