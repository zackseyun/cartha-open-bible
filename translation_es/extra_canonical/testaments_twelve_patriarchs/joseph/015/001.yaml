source:
  edition: Charles 1908 Greek Versions (pages 256-287, Joseph pilot)
  text: '*Ἤθελε γὰρ ὁρᾶν με²⁴ ἐν πόθῳ ⌈ἁμαρτίας⌉²⁵. *ἐγὼ δὲ²⁶ ἠγνόουν ἐν²⁷ πᾶσι τούτοις²⁸. *Εἶπε δὲ πρὸς αὐτήν²⁹· Οὐκ ἐστὶ *τοῦτο τοῖς³⁰ Αἰγυπτίοις πρὸ ἀποδείξεως ἀφαιρεῖσθαι τὰ ἀλλότρια. Ταῦτα ⌜οὖν⌉³¹ εἶπε *περὶ τοῦ μεταβόλου³². *Ὁ δὲ παῖς³³ *ὀφείλει ἐγκατάκλειστος εἶναι³⁴.'
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/015/001.yaml
  text: '4[15:5]. For she wanted to see me in sinful desire, but I was unaware of all these things.


    5. And I said to her, “This is not the custom among the Egyptians, to take what belongs to others before proof is given.”


    6. So I said this concerning the exchange. But the boy ought to be kept confined.


    1[15:6]. And after twenty-four days the Ishmaelites came, for they had heard that Jacob my father was mourning greatly for me. And when they came they said to me,'
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:57Z'
    unchanged: false
    changes_summary: Adjusted 'the desire of sin' to 'sinful desire' for more natural English, changed 'what belongs to another' to 'what belongs to others' to better reflect the plural sense in the source, and retained the rest while preserving source meaning.
translation:
  language: es
  text: '4[15:5]. Pues ella deseaba verme con deseo pecaminoso[a], pero yo era ajeno a todas estas cosas.



    5. Y le dije: "No es esta la costumbre entre los egipcios, tomar lo que pertenece a otros antes de que se presenten pruebas."



    6. Esto, entonces, dijo acerca del traficante[b]. Y el muchacho debe ser mantenido encerrado.



    1[15:6]. Y después de veinticuatro días llegaron los ismaelitas, pues habían oído que Jacob mi padre se lamentaba mucho por mí. Y al llegar me dijeron,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego ἐν πόθῳ ἁμαρτίας conserva un tono testamentario amplio; abarca el deseo sexual ilícito sin reducirse a un idiomatismo moderno como 'me deseaba'.
    reason: lexical_alternative
  - marker: b
    text: La redacción aquí es textualmente difícil; 'acerca del traficante' y 'el muchacho debe ser mantenido encerrado' reflejan un griego comprimido con lecturas variantes.
    reason: textual_variant
lexical_decisions:
- source_word: ἐν πόθῳ ἁμαρτίας
  english_pob_choice: in sinful desire
  chosen_spanish: con deseo pecaminoso
  alternatives_spanish:
  - en el deseo del pecado
  - con concupiscencia pecaminosa
  lexicon: LSJ
  rationale: El POB revisó 'in the desire of sin' a 'in sinful desire' para mayor naturalidad; 'con deseo pecaminoso' refleja esa decisión en español moderno.
- source_word: ἠγνόουν
  english_pob_choice: I was unaware
  chosen_spanish: yo era ajeno a
  alternatives_spanish:
  - yo ignoraba
  - yo no me daba cuenta de
  lexicon: LSJ
  rationale: El POB revisó 'ignorant' a 'unaware'; 'ser ajeno a' transmite la inocencia/desconocimiento sin connotaciones peyorativas.
- source_word: τὰ ἀλλότρια
  english_pob_choice: what belongs to others
  chosen_spanish: lo que pertenece a otros
  alternatives_spanish:
  - lo ajeno
  - los bienes ajenos
  lexicon: LSJ
  rationale: Mantiene la fuerza ética amplia que abarca tanto bienes como la mujer de otro.
- source_word: μετάβολος
  english_pob_choice: exchange/trader
  chosen_spanish: traficante
  alternatives_spanish:
  - mercader
  - intermediario
  - tratante
  lexicon: LSJ
  rationale: Encaja con la figura del intermediario en la venta de José; 'traficante' refleja el contexto de comercio de personas.
- source_word: ἐγκατάκλειστος
  english_pob_choice: kept confined
  chosen_spanish: mantenido encerrado
  alternatives_spanish:
  - recluido
  - confinado
  lexicon: LSJ
  rationale: Conserva el sentido custodial sin especificar prisión formal.
- source_word: πενθεῖ
  english_pob_choice: was mourning greatly
  chosen_spanish: se lamentaba mucho
  alternatives_spanish:
  - lloraba intensamente
  - estaba de duelo
  lexicon: LSJ
  rationale: Verbo de lamento ritual o duelo profundo.
translation_notes:
  revision_awareness: El POB inglés revisó 'in the desire of sin' a 'in sinful desire' y 'I was ignorant' a 'I was unaware' por naturalidad; el español adopta esas mejoras con 'con deseo pecaminoso' y 'era ajeno a'.
  spanish_consistency_notes:
  - μετάβολος → 'traficante', consistente entre 14:6 y 15:6/16.
  - παῖς → 'muchacho' donde el griego enfatiza la juventud, no el estatus.
