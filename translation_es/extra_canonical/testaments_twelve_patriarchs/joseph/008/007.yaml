translation:
  language: es
  text: 7. Pero ella no sabía que yo hablé así por causa de mi Señor, y no por causa de ella.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Οὐκ ἔγνω
  english_pob_choice: But she did not know
  chosen_spanish: Pero ella no sabía
  alternatives_spanish:
  - Mas ella no conocía
  - Sin embargo ella no entendía
  lexicon: LSJ
  rationale: '''No sabía'' (imperfecto) preserva el aspecto durativo de la ignorancia.'
- source_word: διὰ τὸν Κύριόν μου
  english_pob_choice: because of my Lord
  chosen_spanish: por causa de mi Señor
  alternatives_spanish:
  - por amor a mi Señor
  - a causa de mi Señor
  lexicon: LSJ
  rationale: κύριος como 'Señor' por defecto del proyecto. La frase indica el motivo de José hacia Dios, no atracción por la mujer.
- source_word: εἶπον οὕτως
  english_pob_choice: I spoke thus
  chosen_spanish: yo hablé así
  alternatives_spanish:
  - dije esto
  - hablé de este modo
  lexicon: LSJ
  rationale: Conserva el modo formal y el orden enfático de ἐγώ.
- source_word: οὐχὶ δι᾽ αὐτήν
  english_pob_choice: and not because of her
  chosen_spanish: y no por causa de ella
  alternatives_spanish:
  - y no por ella
  - no a causa de ella
  lexicon: LSJ
  rationale: Mantiene el paralelismo con 'por causa de mi Señor'.
theological_decisions:
- issue: Referente de 'mi Señor' en la explicación de José
  chosen_reading: José se refiere a Dios como su Señor, indicando que sus palabras fueron pronunciadas por reverencia y restricción moral ante Dios.
  alternative_readings:
  - José se refiere a Potifar como su amo
  - La frase se deja deliberadamente ambigua
  rationale: En el flujo parenético, José explica su motivo interior para resistir la lujuria. La oración subsiguiente al Señor refuerza un referente hacia Dios más naturalmente que hacia Potifar.
  doctrine_reference: 'DOCTRINE.md: κύριος → Señor; preservar la tensión teológica donde sea genuina, pero elegir la lectura más respaldada por el contexto.'
translation_notes:
  revision_awareness: POB EN unchanged in revision pass.
  spanish_consistency_notes:
