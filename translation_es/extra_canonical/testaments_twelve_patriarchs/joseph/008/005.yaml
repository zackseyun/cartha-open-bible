base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/008/005.yaml
  text: And while I was in chains, the Egyptian woman was held together by grief.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:56Z'
    unchanged: false
    changes_summary: Changed ‘constrained by grief’ to ‘held together by grief’ to reflect συνείχετο more closely; removed the bracketed cross-reference as it is not part of the verse text.
translation:
  language: es
  text: Y mientras yo estaba en cadenas, la egipcia estaba consumida por la pena.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐν τοῖς δεσμοῖς
  english_pob_choice: in chains
  chosen_spanish: en cadenas
  alternatives_spanish:
  - en grilletes
  - encadenado
  - en prisión
  lexicon: LSJ
  rationale: δεσμοί se refiere a ataduras físicas; 'cadenas' es lo más natural en español bíblico.
- source_word: ἡ Αἰγυπτία
  english_pob_choice: the Egyptian woman
  chosen_spanish: la egipcia
  alternatives_spanish:
  - la mujer egipcia
  lexicon: LSJ
  rationale: '''La egipcia'' es idiomático en español y conserva el referente femenino sin redundancia.'
- source_word: συνείχετο ἀπὸ τῆς λύπης
  english_pob_choice: was held together by grief
  chosen_spanish: estaba consumida por la pena
  alternatives_spanish:
  - estaba apretada por la pena
  - estaba oprimida por el dolor
  - estaba sujeta por la pena
  lexicon: LSJ
  rationale: συνέχω puede significar ser oprimido, asido o consumido. El POB EN actualizado eligió 'held together by grief' que en español resulta extraño literalmente; 'consumida por la pena' preserva la imagen de presión interior con naturalidad.
translation_notes:
  revision_awareness: 'Aligned with revised POB EN: ''held together by grief'' (changed from ''constrained by grief''). Removed bracketed cross-reference.'
  spanish_consistency_notes:
  - λύπη rendered 'pena' for emotional grief.
  - δεσμοί as 'cadenas' for narrative concreteness.
