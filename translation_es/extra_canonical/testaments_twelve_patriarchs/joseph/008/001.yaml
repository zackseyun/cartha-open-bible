id: T12P.JOS.8.1
reference: Testament of Joseph 8:1
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 256-287, Joseph pilot)
  text: Λέγω οὖν¹, τέκνα μου², ὅτι ὥρα *ἦν ὡσεὶ³ ἕκτη ὅτε³ ἐξῆλθεν ἀπ᾽ ἐμοῦ⁴. *Καὶ κλίνας γόνυ⁵ πρὸς Κύριον ὅλην τὴν ἡμέραν καὶ ὅλην τὴν νύκτα⁶, πρὸς⁷ ὄρθρον ἀνέστην, δακρύων⁸ καὶ αἰτῶν⁹ λύτρωσιν *ἐξ αὐτῆς¹⁰.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/008/001.yaml
  text: So I say to you, my children, that it was about the sixth hour when she left me. And after bending my knee to the Lord all day and all night, toward dawn I rose, weeping and asking for deliverance from her.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:56Z'
    unchanged: false
    changes_summary: Added 'to you' to reflect the implied address in 'λέγω οὖν'; changed 'bending my knee' to 'after bending my knee' for smoother English; kept the rest faithful to the source.
translation:
  language: es
  text: Así que les digo, hijos míos, que era como la hora sexta cuando ella se apartó de mí. Y después de doblar mi rodilla ante el Señor todo el día y toda la noche, hacia el alba me levanté, llorando y pidiendo liberación de ella.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Λέγω οὖν
  english_pob_choice: So I say to you
  chosen_spanish: Así que les digo
  alternatives_spanish:
  - Por tanto les digo
  - Os digo, pues
  lexicon: LSJ
  rationale: Se preserva el dirigirse implícito a los hijos, igual que la revisión POB EN; uso de 'les' por español neutro latinoamericano.
- source_word: ὥρα ἕκτη
  english_pob_choice: the sixth hour
  chosen_spanish: la hora sexta
  alternatives_spanish:
  - las seis de la tarde
  - la hora seis
  lexicon: LSJ
  rationale: Conserva el cómputo bíblico tradicional de horas, idiomático en español bíblico.
- source_word: κλίνας γόνυ
  english_pob_choice: after bending my knee
  chosen_spanish: después de doblar mi rodilla
  alternatives_spanish:
  - habiendo doblado mi rodilla
  - arrodillándome
  lexicon: LSJ
  rationale: Registro formal y orante; mantiene la imagen testamentaria.
- source_word: πρὸς ὄρθρον
  english_pob_choice: toward dawn
  chosen_spanish: hacia el alba
  alternatives_spanish:
  - al amanecer
  - al rayar el alba
  lexicon: LSJ
  rationale: '''Hacia el alba'' preserva el sentido del movimiento temporal.'
- source_word: λύτρωσιν ἐξ αὐτῆς
  english_pob_choice: deliverance from her
  chosen_spanish: liberación de ella
  alternatives_spanish:
  - redención de ella
  - rescate de ella
  lexicon: LSJ
  rationale: λύτρωσις aquí es rescate práctico, no lenguaje de expiación; 'liberación' es natural y digno.
translation_notes:
  revision_awareness: Drafted from POB EN revision-pass version with 'after bending my knee' and 'all day and all night'.
  spanish_consistency_notes:
  - σωφροσύνη convention deferred to chapter context (not in this verse).
  - Use of 'les' (ustedes) for neutral Latin-American Spanish address.
