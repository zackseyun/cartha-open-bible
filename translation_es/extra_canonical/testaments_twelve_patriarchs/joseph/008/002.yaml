  - Al fin, con violencia se apoderó de
  - Finalmente, con maldad asió
  lexicon: LSJ
  rationale: 'Preserva la cadencia narrativa del POB EN: ''at last'' como remate de la escalada, y la violencia/intencionalidad como rasgo principal.'
- source_word: ἱματίων
  english_pob_choice: garments
  chosen_spanish: vestiduras
  alternatives_spanish:
  - ropas
  - vestidos
  lexicon: LSJ
  rationale: '''Vestiduras'' tiene registro bíblico apropiado; ἱμάτιον se usa para la prenda exterior.'
- source_word: μετὰ βίας ἐφελκομένη
  english_pob_choice: dragging me violently
  chosen_spanish: arrastrándome violentamente
  alternatives_spanish:
  - tirando de mí con violencia
  - halándome a la fuerza
  lexicon: LSJ
  rationale: Conserva la imagen vívida del verbo griego; 'violentamente' preserva la fuerza de βία.
- source_word: συνουσία
  english_pob_choice: intercourse
  chosen_spanish: coito
  alternatives_spanish:
  - unión sexual
  - relaciones sexuales
  lexicon: LSJ
  rationale: συνουσία es término explícito para relaciones sexuales; 'coito' es directo y técnico, alineado con la decisión POB EN de no eufemizar.
