translation:
  language: es
  text: 8. Porque si alguien cae bajo la pasión del deseo y queda esclavizado a ella, como también ella, aun si oye algo bueno, lo toma en relación con esa pasión, hacia su deseo malvado[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'hacia la unión sexual'. El griego συνουσία es término explícito para relaciones sexuales (referencia al contexto del capítulo).
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑποπέσῃ πάθει ἐπιθυμίας
  english_pob_choice: falls under the passion of desire
  chosen_spanish: cae bajo la pasión del deseo
  alternatives_spanish:
  - sucumbe a una pasión lujuriosa
  - viene bajo el sufrimiento del deseo
  lexicon: LSJ
  rationale: πάθος con ἐπιθυμία denota pasión o lujuria avasalladora. 'Cae bajo' refleja ὑποπίπτω y conserva la imagen de sometimiento.
- source_word: δουλωθῇ αὐτῷ
  english_pob_choice: is enslaved to it
  chosen_spanish: queda esclavizado a ella
  alternatives_spanish:
  - se hace esclavo de ella
  - es reducido a servidumbre por ella
  lexicon: LSJ
  rationale: La fuerza del cautiverio de δουλόω es central en esta advertencia moral; 'esclavizado' encaja con la preferencia del proyecto por lenguaje explícito de servidumbre. Concuerda en femenino con 'pasión'.
- source_word: κἂν ἀγαθόν τι ἀκούσῃ
  english_pob_choice: even if he hears something good
  chosen_spanish: aun si oye algo bueno
  alternatives_spanish:
  - aunque oiga algo bueno
  - incluso si escucha algo bueno
  lexicon: LSJ
  rationale: Concesivo idiomático en español que preserva el matiz hipotético griego.
- source_word: ἐκλαμβάνει αὐτὸ πρὸς τὴν πονηρὰν ἐπιθυμίαν
  english_pob_choice: he takes it in relation to that passion, toward his evil desire
  chosen_spanish: lo toma en relación con esa pasión, hacia su deseo malvado
  alternatives_spanish:
  - lo interpreta en función de esa pasión
  - lo entiende para su deseo perverso
  lexicon: LSJ
  rationale: El sentido es que aun las palabras buenas se reinterpretan a través del lente de la lujuria. Conserva la distorsión cognitiva descrita.
- source_word: πονηρὰν ἐπιθυμίαν
  english_pob_choice: evil desire
  chosen_spanish: deseo malvado
  alternatives_spanish:
  - concupiscencia maligna
  - deseo perverso
  lexicon: LSJ
  rationale: πονηρός como 'malvado' es estándar; 'deseo' mantiene consistencia con el resto del capítulo.
theological_decisions:
- issue: Psicología moral del deseo en el versículo 8
  chosen_reading: El texto enseña que la lujuria esclaviza la percepción misma, de modo que aun el habla buena se reinterpreta como sirviendo al deseo malvado.
  alternative_readings:
  - La declaración se refiere solo al malentendido de la egipcia respecto a las palabras de José
  - La línea es un proverbio general desligado de la narrativa inmediata
  rationale: El griego pasa de su caso ('como también ella') a una máxima general, y luego de vuelta a la exhortación de José a sus hijos. La traducción preserva tanto la fuerza específica como la general.
  doctrine_reference: 'DOCTRINE.md: preservar tanto lo específico como lo general donde el texto fuente lo permita.'
