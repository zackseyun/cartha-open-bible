  text: Ὡς ⌜οὖν⌉¹⁴ εἶδον¹⁵ ὅτι μαινομένη¹⁶ κρατεῖ μου τὸν χιτῶνα, καταλείψας αὐτὸν [καὶ ἐκτιναξάμενος] ἔφυγον γυμνός¹⁷.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/008/003.yaml
  text: Therefore, when I saw that she, in her frenzy, was seizing my tunic, I left it and fled naked.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:56Z'
    unchanged: false
    changes_summary: 'Adjusted for closer source correspondence and smoother English: retained the causal opening, rendered the participial phrase more directly as "she, in her frenzy, was seizing," and simplified "I left it behind" to "I left it."'
translation:
  language: es
  text: Por tanto, cuando vi que ella, en su frenesí, me agarraba la túnica, la dejé [y me sacudí de ella] y huí desnudo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ὡς οὖν εἶδον
  english_pob_choice: Therefore, when I saw
  chosen_spanish: Por tanto, cuando vi
  alternatives_spanish:
  - Así que cuando vi
  - Por consiguiente, al ver
  lexicon: LSJ
  rationale: Conserva la apertura causal del griego, alineada con la revisión POB EN.
- source_word: μαινομένη
  english_pob_choice: in her frenzy
  chosen_spanish: en su frenesí
  alternatives_spanish:
  - enloquecida
  - fuera de sí
  - delirante
  lexicon: LSJ
  rationale: '''Frenesí'' captura tanto el exceso emocional como la pérdida de control.'
- source_word: κρατεῖ μου τὸν χιτῶνα
  english_pob_choice: was seizing my tunic
  chosen_spanish: me agarraba la túnica
  alternatives_spanish:
  - se apoderaba de mi túnica
  - asía mi túnica
  lexicon: LSJ
  rationale: Conserva el aspecto durativo (imperfecto griego) de la acción continua.
- source_word: χιτῶνα
  english_pob_choice: tunic
  chosen_spanish: túnica
  alternatives_spanish:
  - vestidura interior
  - manto
  lexicon: LSJ
  rationale: χιτών es específicamente la prenda interior; preserva la alusión a Génesis 39:12.
- source_word: καταλείψας αὐτὸν ... ἔφυγον γυμνός
  english_pob_choice: I left it and fled naked
  chosen_spanish: la dejé y huí desnudo
  alternatives_spanish:
  - dejándola, escapé desnudo
  - lo abandoné y hui desnudo
  lexicon: LSJ
  rationale: Mantiene la simplicidad y rapidez de la acción narrada.
translation_notes:
  revision_awareness: 'Aligned with revised POB EN: ''she, in her frenzy, was seizing my tunic'' and ''I left it'' (without ''behind'').'
  spanish_consistency_notes:
  - χιτών rendered consistently as 'túnica' (vs ἱμάτιον = 'vestiduras' in v.2).
  - μαινομένη as 'frenesí' to preserve the maddened-state imagery.
