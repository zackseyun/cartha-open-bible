reference: Testament of Joseph 8:4
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 256-287, Joseph pilot)
  text: '*Ἐκείνη δὲ¹⁸ ⌜κρατήσασα τοῦτον¹⁹ ἐσυκοφάντησέ με· καὶ ἐλθὼν ὁ ἀνὴρ αὐτῆς ἔβαλέ με εἰς φυλακὴν ἐν τῷ αὐτοῦ οἴκῳ²⁰, καὶ τῇ ἑξῆς *μαστιγώσας ἐξέπεμψέ²¹ με εἰς *τὴν τοῦ Φαραὼ εἰρκτήν²².'
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/008/004.yaml
  text: But she, having seized this while I was naked, slandered me; and when her husband came, he threw me into prison in his house, and on the next day, after flogging me, he sent me into Pharaoh’s dungeon.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:56Z'
    unchanged: false
    changes_summary: Restored the object of 'taking hold of' as 'this' to reflect the Greek 'κρατήσασα τοῦτον'; rendered the participial phrase more closely as 'having seized this while I was naked'; and changed 'scourging' to the more natural 'flogging' while preserving the source meaning.
translation:
  language: es
  text: Pero ella, habiéndola tomado mientras yo estaba desnudo, me calumnió; y cuando llegó su marido, me arrojó a la prisión en su casa, y al día siguiente, después de azotarme, me envió al calabozo del faraón.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: κρατήσασα τοῦτον
  english_pob_choice: having seized this while I was naked
  chosen_spanish: habiéndola tomado mientras yo estaba desnudo
  alternatives_spanish:
  - tomándola consigo
  - habiéndose apoderado de la túnica
  lexicon: LSJ
  rationale: Sigue la revisión POB EN que restaura el objeto explícito ('this'/la túnica) y añade la circunstancia 'mientras yo estaba desnudo'.
- source_word: ἐσυκοφάντησέ με
  english_pob_choice: slandered me
  chosen_spanish: me calumnió
  alternatives_spanish:
  - me acusó falsamente
  - me difamó
  lexicon: LSJ
  rationale: '''Calumniar'' implica acusación falsa con intención maliciosa, conciso en español.'
- source_word: ἔβαλέ με εἰς φυλακήν
  english_pob_choice: he threw me into prison
  chosen_spanish: me arrojó a la prisión
  alternatives_spanish:
  - me echó en prisión
  - me lanzó a la cárcel
  lexicon: LSJ
  rationale: Conserva la fuerza física de ἔβαλε en español natural.
- source_word: μαστιγώσας
  english_pob_choice: after flogging me
  chosen_spanish: después de azotarme
  alternatives_spanish:
  - habiéndome azotado
  - tras flagelarme
  lexicon: LSJ
  rationale: '''Azotar'' es estándar bíblico en español para μαστιγόω.'
- source_word: τὴν τοῦ Φαραὼ εἰρκτήν
  english_pob_choice: Pharaoh's dungeon
  chosen_spanish: el calabozo del faraón
  alternatives_spanish:
  - la prisión del faraón
  - la mazmorra del faraón
  lexicon: LSJ
  rationale: εἰρκτή denota lugar de confinamiento severo; 'calabozo' encaja con la severidad y el contexto del faraón.
translation_notes:
  revision_awareness: 'Aligned with revised POB EN: ''having seized this while I was naked'' and ''flogging'' (vs earlier ''scourging'').'
  spanish_consistency_notes:
  - εἰρκτή as 'calabozo' to mark the severity and Pharaoh setting.
