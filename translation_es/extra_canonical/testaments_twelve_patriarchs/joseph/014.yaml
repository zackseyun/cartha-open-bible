base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/014.yaml
  text: 1[a]. And Memphis saw me being beaten through the windows—for her house was nearby—and she sent word to him, saying, “Your judgment is unjust[b], because you punish as a wrongdoer a free man who has been kidnapped.” 2. But since I did not alter my statement even while I was being beaten, he ordered that I be kept under guard until the masters of the boy should come. 3. And the woman kept saying to her husband[c],
  footnotes:
  - marker: a
    text: Or 'through the lattices'; the Greek can refer to window-openings rather than glazed windows in the modern sense.
    reason: cultural_note
  - marker: b
    text: Literally, 'a free man who has been stolen'—that is, a person unlawfully seized and treated as though he were a slave or criminal.
    reason: lexical_alternative
  - marker: c
    text: The sentence breaks off here in the supplied Greek witness and continues in the next chapter.
    reason: textual_variant
