translation:
  language: es
  text: '1[a]. Y Menfis me veía siendo golpeado a través de las ventanas, pues su casa estaba cerca, y mandó a decirle: "Tu juicio es injusto[b], porque castigas como malhechor a un hombre libre que ha sido secuestrado." 2. Pero como yo no alteré mi declaración aun mientras me golpeaban, ordenó que yo fuera mantenido bajo custodia hasta que vinieran los amos del muchacho. 3. Y la mujer le decía continuamente a su marido[c],'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'a través de las celosías'; el griego puede referirse a vanos abiertos más que a ventanas con vidrio en el sentido moderno.
    reason: cultural_note
  - marker: b
    text: Literalmente, 'un hombre libre que ha sido robado', es decir, una persona ilegalmente apresada y tratada como si fuera esclava o criminal.
    reason: lexical_alternative
  - marker: c
    text: La oración se interrumpe aquí en el testigo griego conservado y continúa en el capítulo siguiente.
    reason: textual_variant
lexical_decisions:
- source_word: Μεμφίς
  english_pob_choice: Memphis
  chosen_spanish: Menfis
  alternatives_spanish:
  - Memphis
  lexicon: LSJ
  rationale: Forma castellana tradicional del nombre propio.
- source_word: τυπτόμενόν
  english_pob_choice: being beaten
  chosen_spanish: siendo golpeado
  alternatives_spanish:
  - siendo apaleado
  - siendo azotado
  lexicon: LSJ
  rationale: El participio denota golpear físicamente; 'siendo golpeado' es natural y conserva la fuerza pasiva continua sin especificar instrumento.
- source_word: θυρίδων
  english_pob_choice: windows
  chosen_spanish: ventanas
  alternatives_spanish:
  - celosías
  - tragaluces
  lexicon: LSJ
  rationale: Término arquitectónico claro; nota cultural conserva la posibilidad de un vano antiguo.
- source_word: Ἄδικος ἡ κρίσις σου
  english_pob_choice: Your judgment is unjust
  chosen_spanish: Tu juicio es injusto
  alternatives_spanish:
  - Tu veredicto es injusto
  - Tu decisión es injusta
  lexicon: LSJ
  rationale: κρίσις aquí es valoración judicial; 'juicio' conserva el tono legal y moral de la acusación.
- source_word: κλαπέντα
  english_pob_choice: kidnapped
  chosen_spanish: secuestrado
  alternatives_spanish:
  - robado
  - raptado
  lexicon: LSJ
  rationale: El POB revisó 'stolen' a 'kidnapped' para sonar natural aplicado a una persona; 'secuestrado' replica esa decisión en español.
- source_word: ἐλεύθερον
  english_pob_choice: a free man
  chosen_spanish: un hombre libre
  alternatives_spanish:
  - un hombre libre por nacimiento
  lexicon: LSJ
  rationale: El contraste jurídico entre libre y esclavo es central en la escena.
- source_word: τιμωρεῖς
  english_pob_choice: you punish
  chosen_spanish: castigas
  alternatives_spanish:
  - sancionas
  lexicon: LSJ
  rationale: En contexto judicial, 'castigar' es la traducción natural.
- source_word: ὡς ἀδικήσαντα
  english_pob_choice: as a wrongdoer
  chosen_spanish: como malhechor
  alternatives_spanish:
  - como si hubiera obrado mal
  lexicon: LSJ
  rationale: Sustantivo idiomático que comprime la fuerza comparativa del griego.
- source_word: οὐκ ἤλλαξα τὸν λόγον μου
  english_pob_choice: I did not alter my statement
  chosen_spanish: no alteré mi declaración
  alternatives_spanish:
  - no cambié mi palabra
  lexicon: LSJ
  rationale: 'λόγος como testimonio judicial: ''declaración'' es lo más adecuado.'
- source_word: φυλαχθῆναί με
  english_pob_choice: that I be kept under guard
  chosen_spanish: que yo fuera mantenido bajo custodia
  alternatives_spanish:
  - que fuera encarcelado
  lexicon: LSJ
  rationale: Conserva el sentido custodial sin sobreespecificar prisión formal.
- source_word: οἱ κύριοι τοῦ παιδός
  english_pob_choice: the masters of the boy
  chosen_spanish: los amos del muchacho
  alternatives_spanish:
  - los señores del siervo
  lexicon: LSJ
  rationale: κύριοι como dueños/amos en contexto esclavista; 'muchacho' conserva la literalidad de παῖς.
- source_word: ἔλεγε
  english_pob_choice: kept saying
  chosen_spanish: le decía continuamente
  alternatives_spanish:
  - seguía diciéndole
  lexicon: LSJ
  rationale: El imperfecto sugiere repetición; el adverbio conserva el matiz durativo.
theological_decisions:
- issue: Lenguaje de estatus social en la defensa legal de José
  chosen_reading: Traducir ἐλεύθερον como 'un hombre libre' y κύριοι como 'amos'
  alternative_readings:
  - '''un hombre inocente'' para ἐλεύθερον'
  - '''dueños'' para κύριοι'
  rationale: La fuerza moral del capítulo depende del contraste entre una persona libre tratada injustamente y las estructuras de propiedad esclava a su alrededor. Conservar la terminología jurídico-social mantiene la agudeza ética de la narrativa.
  doctrine_reference: 'DOCTRINE.md: primacía de la lengua original; principio δοῦλος/esclavo aplicado por analogía al lenguaje de estatus servil'
translation_notes:
  revision_awareness: El POB inglés cambió 'stolen' a 'kidnapped' en revisión para reflejar mejor el participio pasivo aplicado a una persona; 'secuestrado' incorpora esa decisión.
  spanish_consistency_notes:
  - κύριοι → 'amos' por contexto esclavista.
  - παῖς → 'muchacho' (literal), aun cuando funcionalmente sirve como esclavo.
  - δοῦλος se reservará para 'esclavo' donde aparece literalmente en capítulos posteriores.
