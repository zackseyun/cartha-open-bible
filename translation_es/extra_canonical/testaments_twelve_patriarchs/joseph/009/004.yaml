translation:
  language: es
  text: ¡Cuántas veces, aunque estaba enferma, bajó a mí a una hora inoportuna, y oyó mi voz mientras oraba; y yo, comprendiendo sus gemidos, guardé silencio.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ποσάκις
  english_pob_choice: How often
  chosen_spanish: ¡Cuántas veces!
  alternatives_spanish:
  - Muchas veces
  - Cuán a menudo
  lexicon: ποσάκις
  rationale: La exclamación expresa frecuencia reiterada; «¡Cuántas veces!» comunica con naturalidad la repetición enfatizada sin volverlo demasiado explicativo.
- source_word: ἀσθενοῦσα
  english_pob_choice: she was sick
  chosen_spanish: estaba enferma
  alternatives_spanish:
  - estaba débil
  - estaba enferma
  lexicon: ἀσθενέω
  rationale: El contexto admite enfermedad o debilidad; en español, «estaba enferma» es claro y mantiene la referencia corporal sin añadir especificación médica.
- source_word: κατῄει πρὸς με
  english_pob_choice: she came down to me
  chosen_spanish: bajó a mí
  alternatives_spanish:
  - descendió a mí
  - vino a mí
  lexicon: κατέρχομαι + πρός
  rationale: Se conserva la imagen espacial de descenso del griego. «Bajó a mí» es algo más literal que «vino a mí» y mantiene la dirección señalada por el texto.
- source_word: ἐν ἀωρίᾳ
  english_pob_choice: at an untimely hour
  chosen_spanish: a una hora inoportuna
  alternatives_spanish:
  - a deshora
  - en hora inoportuna
  lexicon: ἀώρια
  rationale: «Hora inoportuna» reproduce el valor de tiempo fuera de lugar o fuera de conveniencia. Se evita sobreinterpretar el matiz como exclusivamente nocturno.
- source_word: τῆς φωνῆς μου προσευχομένου
  english_pob_choice: my voice as I prayed
  chosen_spanish: mi voz mientras oraba
  alternatives_spanish:
  - mi voz cuando oraba
  - mi voz al orar
  lexicon: φωνή + προσεύχομαι
  rationale: La frase griega describe la voz en el acto de oración; «mientras oraba» conserva la simultaneidad y fluidez en español.
- source_word: συνίων τοὺς στεναγμούς
  english_pob_choice: understanding her groanings
  chosen_spanish: comprendiendo sus gemidos
  alternatives_spanish:
  - entendiendo sus gemidos
  - captando sus gemidos
  lexicon: συνίημι + στεναγμός
  rationale: «Comprendiendo» refleja el sentido de percibir con entendimiento; «gemidos» traduce adecuadamente στεναγμοί sin volverlo necesariamente una queja verbal.
- source_word: ἐσιώπων
  english_pob_choice: kept silent
  chosen_spanish: guardé silencio
  alternatives_spanish:
  - me callé
  - permanecí en silencio
  lexicon: σιωπάω
  rationale: «Guardé silencio» es una equivalencia idiomática sólida en español y mantiene el carácter voluntario de no hablar.
theological_decisions:
- issue: La relación entre el hablante y la mujer que sube/baja a él mientras él ora
  english_pob_reading: Narrative description with no doctrinal expansion; the focus is on secrecy, temptation, and restraint in context.
  chosen_spanish_reading: Relato descriptivo sin expansión doctrinal; la atención queda en la escena y en la reserva del hablante.
  alternative_spanish_readings:
  - lectura moralizante explícita
  - lectura sentimental del episodio
  rationale: El versículo no introduce doctrina nueva; por eso la traducción evita cargar el pasaje con inferencias y conserva el tono narrativo y sobrio del original.
  doctrine_reference: Principio de sobriedad textual y no-expansión interpretativa
