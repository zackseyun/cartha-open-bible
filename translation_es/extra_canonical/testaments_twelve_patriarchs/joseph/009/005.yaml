source:
  edition: Charles 1908 Greek Versions (pages 256-287, Joseph pilot)
  text: Καὶ ⌜γὰρ⌝ *ὄντος μου²⁹ ἐν τῷ οἴκῳ αὐτῆς ἐγύμνου³⁰ τοὺς βραχίονας αὐτῆς καὶ³¹ τὰς κνήμας, ⌜*ἵνα †συμπέσω εἰς αὐτήν³². *ἦν γὰρ⌝ καὶ ὡραία πάνυ³³ ⌜μάλιστα κοσμουμένη³⁴⌝ πρὸς ἀπάτην³⁵ μου. Καὶ ὁ Κύριος ἐφύλαξέ με ἀπὸ τῶν ἐγχειρημάτων αὐτῆς.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/009/005.yaml
  text: For when I was in her house, she would uncover her arms and her legs, so that I might fall into her. For she was very beautiful, especially adorned to deceive me. But the Lord guarded me from her schemes.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:25Z'
    unchanged: false
    changes_summary: Changed 'fall in with her' to 'fall into her' for closer alignment with συμπέσω εἰς αὐτήν, and revised 'especially adorned for my deception' to 'especially adorned to deceive me' for more natural English while preserving the sense of πρὸς ἀπάτην μου.
translation:
  language: es
  text: Porque cuando yo estaba en su casa, ella descubría sus brazos y sus piernas, para que yo cayera en ella. Porque era muy hermosa, especialmente adornada para engañarme. Pero el Señor me guardó de sus maquinaciones.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐγύμνου τοὺς βραχίονας αὐτῆς καὶ τὰς κνήμας
  english_pob_choice: she would uncover her arms and her legs
  chosen_spanish: ella descubría sus brazos y sus piernas
  alternatives_spanish:
  - ella desnudaba sus brazos y sus piernas
  - ella dejaba al descubierto sus brazos y sus piernas
  lexicon: γυμνόω
  rationale: ‘Descubría’ comunica la acción reiterada y el resultado visible sin sonar demasiado crudo en español. ‘Desnudaba’ es más literal pero más fuerte de lo que el contexto requiere; ‘dejaba al descubierto’ es posible, aunque más explicativo.
- source_word: συμπέσω εἰς αὐτήν
  english_pob_choice: that I might fall into her
  chosen_spanish: para que yo cayera en ella
  alternatives_spanish:
  - para que yo cayera con ella
  - para que yo sucumbiera a ella
  lexicon: συμπίπτω + εἰς
  rationale: ‘Caer en ella’ conserva la imagen de movimiento/caída del griego y sigue la revisión inglesa que corrigió la relación preposicional. ‘Sucumbiera a ella’ aclara la idea, pero atenúa la metáfora espacial.
- source_word: ὡραία πάνυ
  english_pob_choice: she was very beautiful
  chosen_spanish: era muy hermosa
  alternatives_spanish:
  - era sumamente bella
  - era bellísima
  lexicon: ὡραῖος
  rationale: ‘Hermosa’ es natural y digna en español; ‘muy’ reproduce πάνυ sin elevar el registro de manera excesiva. ‘Bella’ sería igualmente válida, pero ‘hermosa’ fluye mejor en contexto narrativo.
- source_word: μάλιστα κοσμουμένη πρὸς ἀπάτην μου
  english_pob_choice: especially adorned to deceive me
  chosen_spanish: especialmente adornada para engañarme
  alternatives_spanish:
  - sobre todo adornada para engañarme
  - especialmente ataviada para engañarme
  lexicon: κοσμέω; ἀπάτη
  rationale: ‘Adornada’ mantiene la idea de arreglo/ornato, y ‘para engañarme’ sigue de cerca πρὸς ἀπάτην μου, como reflejó la revisión inglesa. ‘Ataviada’ sería más literario, pero menos directo.
- source_word: ὁ Κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  - el Señor Yahvé
  lexicon: κύριος
  rationale: En esta versión griega aparece ὁ Κύριος, y el audit trail inglés conserva ‘the Lord’. En español se mantiene ‘el Señor’ como equivalente litúrgico inmediato; no se sustituye por ‘Yahvé’ porque el texto fuente aquí es griego y no cita explícitamente el nombre hebreo.
- source_word: ἐφύλαξέ με ἀπὸ τῶν ἐγχειρημάτων αὐτῆς
  english_pob_choice: guarded me from her schemes
  chosen_spanish: me guardó de sus maquinaciones
  alternatives_spanish:
  - me protegió de sus planes
  - me preservó de sus intentos
  lexicon: φυλάσσω; ἐγχείρημα
  rationale: ‘Guardó’ reproduce el verbo de custodia/protección y ‘maquinaciones’ expresa bien la intención tramada por la mujer. ‘Esquemas’ sería posible, pero menos natural en español bíblico contemporáneo.
theological_decisions:
- issue: Interpretación de ὁ Κύριος en un texto griego no marcadamente tetragramático
  english_pob_reading: the Lord guarded me from her schemes
  chosen_spanish_reading: el Señor me guardó de sus maquinaciones
  alternative_spanish_readings:
  - Yahvé me guardó de sus maquinaciones
  - el Señor Yahvé me guardó de sus maquinaciones
  rationale: Se preserva la referencia reverente y habitual a Dios con ‘el Señor’, siguiendo la lectura inglesa auditada. Aunque el proyecto español prefiere ‘Yahvé’ para יהוה, aquí el immediate source es κύριος en griego y no se aporta un motivo textual suficiente para forzar ‘Yahvé’ en el cuerpo principal.
  doctrine_reference: Divine title equivalence; source-language specificity
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente al usar una equivalencia espacial directa para συμπέσω εἰς αὐτήν (‘caer en ella’) y al expresar πρὸς ἀπάτην μου como ‘para engañarme’, sin introducir un matiz adicional que no esté en el griego o en el audit trail revisado.
  spanish_consistency_notes:
  - 'Se mantiene la terminología narrativa sobria y concreta: ‘descubría’, ‘caer en ella’, ‘adornada’, ‘maquinaciones’.'
  - Se evita ‘SEÑOR’ en versales para conservar la legibilidad moderna; se usa ‘el Señor’ como traducción regular de κύριος en este pasaje.
  - No se añadió nota al pie porque no hay variante textual o ambigüedad que requiera desambiguación en el español resultante.
