  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 256-287, Joseph pilot)
  text: '*Εἰ δὲ¹⁷ ἐν σωφροσύνῃ διάγων *θέλει καὶ¹⁸ δόξαν, καὶ¹⁹ οἶδεν ὁ ὕψιστος ὅτι συμφέρει, παρέχει²⁰ καὶ αὐτῷ καὶ ταῦτα²¹ ὡς κἀμοί.'
