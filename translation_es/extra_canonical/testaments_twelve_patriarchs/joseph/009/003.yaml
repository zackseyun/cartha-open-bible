base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/009/003.yaml
  text: But if one lives in self-control, and the Most High knows that glory also is fitting for him, he grants this also to him, as also to me.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:25Z'
    unchanged: false
    changes_summary: Changed 'And' to 'But' for δέ, and 'that too' to 'this also' to more directly reflect καὶ ταῦτα while keeping formal, natural English.
translation:
  language: es
  text: Pero si uno vive en autocontrol, y el Altísimo sabe que la gloria también le conviene, se la concede también a él, como también a mí.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: δέ
  rationale: El contraste suave de δέ se refleja mejor en español con «Pero» al inicio de la cláusula. Mantiene la relación adversativa sin volverla más fuerte de lo que el griego sugiere.
- source_word: ἐν σωφροσύνῃ διάγων
  english_pob_choice: one lives in self-control
  chosen_spanish: vive en autocontrol
  alternatives_spanish:
  - vive con dominio propio
  - vive sobriamente
  lexicon: σωφροσύνη
  rationale: «Autocontrol» conserva la idea ética de moderación y dominio de sí, con un registro claro y digno. «Dominio propio» es posible, pero «autocontrol» resulta más natural en español contemporáneo sin perder el sentido.
- source_word: ὁ ὕψιστος
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Dios Altísimo
  - el Altísimo Dios
  lexicon: ὕψιστος
  rationale: «El Altísimo» es la forma española estable y transparente para el título divino. Conserva la majestad del original sin añadir elementos que el texto no requiere.
- source_word: δόξαν
  english_pob_choice: glory
  chosen_spanish: la gloria
  alternatives_spanish:
  - honor
  - honra
  lexicon: δόξα
  rationale: «Gloria» sigue de cerca el valor léxico y teológico del término en este contexto. «Honor» sería una posibilidad interpretativa, pero «gloria» mantiene mejor la formulación del texto base.
- source_word: συμφέρει
  english_pob_choice: is fitting
  chosen_spanish: le conviene
  alternatives_spanish:
  - es apropiada para él
  - le resulta conveniente
  lexicon: συμφέρω
  rationale: La idea no es solo conveniencia práctica, sino adecuación moral o digna. «Le conviene» comunica esa aptitud de manera natural en español; el sujeto implícito se recupera por contexto.
- source_word: παρέχει
  english_pob_choice: grants
  chosen_spanish: concede
  alternatives_spanish:
  - otorga
  - da
  lexicon: παρέχω
  rationale: «Concede» refleja el acto de dar en respuesta a una idoneidad reconocida. Mantiene el tono deferente del sujeto divino mejor que un simple «da».
- source_word: ταῦτα
  english_pob_choice: this also
  chosen_spanish: se la
  alternatives_spanish:
  - esto también
  - estas cosas también
  lexicon: ταῦτα
  rationale: El neutro plural «estas cosas» se integra en español como objeto resumido por «se la», retomando «la gloria» de manera natural. Así se evita una repetición torpe y se conserva la referencia anafórica.
theological_decisions:
- issue: Relación entre la condición humana y la concesión divina
  english_pob_reading: If one lives in self-control ... the Most High knows that glory also is fitting for him, he grants this also to him.
  chosen_spanish_reading: Si uno vive en autocontrol ... el Altísimo sabe que la gloria también le conviene, se la concede también a él.
  alternative_spanish_readings:
  - si uno vive en autocontrol ... el Altísimo sabe que también es apto para la gloria, se la concede
  - si uno vive en autocontrol ... el Altísimo sabe que la gloria también es apropiada para él, se la concede
  rationale: La redacción conserva la tensión entre una disposición humana real y el reconocimiento divino de esa aptitud. No se suaviza hacia un mérito automático; el verbo «concede» deja claro que la gloria sigue siendo un don.
  doctrine_reference: Providencia divina y recompensa acorde con la virtud
translation_notes:
  revision_awareness: La revisión inglesa cambió ‘And’ por ‘But’ para δέ y ‘that too’ por ‘this also’ para καὶ ταῦτα. La versión española refleja ambos ajustes con «Pero» y «se la concede también a él», evitando un demostrativo explícito que sonaría pesado en español.
  spanish_consistency_notes:
  - Se mantiene «Altísimo» para ὁ ὕψιστος, coherente con el uso bíblico y no con «Señor» como máscara.
  - «Autocontrol» se usa como equivalente estable de σωφροσύνη en este pasaje; no se introduce lenguaje ascético ajeno al griego.
  - «Gloria» se conserva por correspondencia léxica con δόξα y por continuidad con el tono del texto.
