  text: '*Πολλάκις δὲ¹ ἔπεμψε πρός με λέγουσα². Εὐδόκησον³ ⸀πληρῶσαι τὴν ἐπιθυμίαν⸀ μου, καὶ λύω⁴ σε ἐκ⁵ τῶν δεσμῶν, ⸀καὶ ἀπαλλάξω σε ἐκ⁶ τοῦ σκότους⸀. *Ἐγὼ δὲ οὐδὲ⁷ ἕως⁸ ἐννοίας⁹ ἐξέκλινα¹⁰ πρὸς αὐτήν· *ὁ γὰρ θεὸς ἀγαπᾷ¹¹ μᾶλλον τὸν¹² ἐν¹³ λάκκῳ σκότους †πιστὸν¹⁴ ἐν σωφροσύνῃ¹⁵, ἢ τὸν ἐν ταμείοις †βασιλέα¹⁶ τρυφῶντα μετ’ ἀκολασίας.'
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/009/002.yaml
  text: Many times she sent to me, saying, “Consent to fulfill my desire, and I will release you from your chains, and I will free you from the darkness.” But I did not turn even in thought toward her; for God loves more the one who is faithful in self-control in a pit of darkness than the one who, as a king in storerooms, lives in luxury with lawlessness.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:24Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: 'Muchas veces ella me envió, diciendo: “Consiente en cumplir mi deseo, y te soltaré de tus cadenas, y te libraré de la oscuridad”. Pero yo no me desvié hacia ella ni siquiera en pensamiento; porque Dios ama más al que es fiel en el dominio propio en un pozo de oscuridad que al que, como rey en despensas, vive en lujo con desenfreno.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Εὐδόκησον
  english_pob_choice: Consent
  chosen_spanish: Consiente
  alternatives_spanish:
  - Asiente
  - Accede
  - Da tu consentimiento
  lexicon: No se inventa número de lexicón; verbo imperativo de consentimiento.
  rationale: El griego pide una respuesta voluntaria favorable, no mera tolerancia pasiva. 'Consiente' conserva la fuerza de aceptación deliberada y suena natural en español bíblico moderno.
- source_word: πληρῶσαι τὴν ἐπιθυμίαν μου
  english_pob_choice: fulfill my desire
  chosen_spanish: cumplir mi deseo
  alternatives_spanish:
  - satisfacer mi deseo
  - realizar mi deseo
  lexicon: No se inventa número de lexicón; πληρόω + ἐπιθυμία.
  rationale: '''Cumplir mi deseo'' refleja bien la idea de llevar a cabo lo pedido sin intensificarlo más allá del texto.'
- source_word: λύω σε ἐκ τῶν δεσμῶν
  english_pob_choice: I will release you from your chains
  chosen_spanish: te soltaré de tus cadenas
  alternatives_spanish:
  - te liberaré de tus cadenas
  - te desataré de tus ataduras
  lexicon: No se inventa número de lexicón; λύω + δεσμοί.
  rationale: '''Soltar'' mantiene el valor concreto de desatar/liberar de ataduras físicas, en paralelo al griego y al inglés POB.'
- source_word: ἀπαλλάξω σε ἐκ τοῦ σκότους
  english_pob_choice: I will free you from the darkness
  chosen_spanish: te libraré de la oscuridad
  alternatives_spanish:
  - te liberaré de la oscuridad
  - te sacaré de la oscuridad
  lexicon: No se inventa número de lexicón; ἀπαλλάσσω + σκότος.
  rationale: '''Libraré'' comunica liberación efectiva y evita una lectura demasiado mecánica. ''Oscuridad'' conserva la imagen tanto literal como simbólica.'
- source_word: οὐδὲ ἕως ἐννοίας ἐξέκλινα πρὸς αὐτήν
  english_pob_choice: I did not turn even in thought toward her
  chosen_spanish: no me desvié hacia ella ni siquiera en pensamiento
  alternatives_spanish:
  - no me incliné hacia ella ni siquiera en pensamiento
  - ni siquiera en pensamiento me aparté hacia ella
  lexicon: No se inventa número de lexicón; ἐκκλίνω + ἔννοια.
  rationale: '''Desvié'' reproduce la imagen de apartarse/cambiar de dirección, y ''ni siquiera en pensamiento'' expresa ἕως ἐννοίας sin volverlo demasiado abstracto.'
- source_word: ὁ γὰρ θεὸς ἀγαπᾷ μᾶλλον
  english_pob_choice: for God loves more
  chosen_spanish: porque Dios ama más
  alternatives_spanish:
  - pues Dios ama más
  - porque Dios prefiere
  lexicon: No se inventa número de lexicón; θεός + ἀγαπάω + μᾶλλον.
  rationale: '''Ama más'' sigue de cerca el comparativo del texto y evita suavizarlo en mera preferencia.'
- source_word: τὸν ἐν λάκκῳ σκότους πιστὸν ἐν σωφροσύνῃ
  english_pob_choice: the one who is faithful in self-control in a pit of darkness
  chosen_spanish: al que es fiel en el dominio propio en un pozo de oscuridad
  alternatives_spanish:
  - al que es fiel en la templanza en un pozo de oscuridad
  - al que es fiel en la moderación propia en un pozo de oscuridad
  lexicon: No se inventa número de lexicón; πιστός + σωφροσύνη + λάκκος σκότους.
  rationale: '''Fiel'' conserva πιστός. ''Dominio propio'' es una equivalencia clara para σωφροσύνη en español bíblico actual y mantiene el matiz de autocontrol moral.'
- source_word: τὸν ἐν ταμείοις βασιλέα τρυφῶντα μετ’ ἀκολασίας
  english_pob_choice: the one who, as a king in storerooms, lives in luxury with lawlessness
  chosen_spanish: al que, como rey en despensas, vive en lujo con desenfreno
  alternatives_spanish:
  - al que, como rey en almacenes, vive en lujo con desenfreno
  - al que, como rey en cámaras de provisiones, vive en lujo con desenfreno
  lexicon: No se inventa número de lexicón; ταμεῖα + τρυφάω + ἀκολασία.
  rationale: '''Despensas'' es la opción española más natural para ταμεῖα en este contexto de provisiones/almacenes. ''Desenfreno'' preserva la fuerza moral negativa de ἀκολασία.'
theological_decisions:
- issue: La tensión entre liberación sexual prometida y fidelidad de José
  english_pob_reading: God loves more the one who is faithful in self-control in a pit of darkness than the one who, as a king in storerooms, lives in luxury with lawlessness.
  chosen_spanish_reading: Dios ama más al que es fiel en el dominio propio en un pozo de oscuridad que al que, como rey en despensas, vive en lujo con desenfreno.
  alternative_spanish_readings:
  - Dios prefiere al que practica la templanza en la oscuridad
  - Dios ama más al que se mantiene fiel en la oscuridad
  rationale: La frase subraya el valor moral de la fidelidad bajo presión. 'Dominio propio' y 'desenfreno' dejan visible el contraste ético sin domesticarlo.
  doctrine_reference: Ética de la santificación y perseverancia en la tentación; fidelidad en prueba.
translation_notes:
  revision_awareness: Se ajustó la redacción para evitar introducir notas sin anclaje en el texto y para mantener la imagen concreta del griego (consentimiento, cadenas, oscuridad, pozo, despensas) con español natural.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para θεός y no se introduce 'Yahvé' porque el pasaje usa θεός, no el nombre divino.
  - '''Dominio propio'' se usa de forma consistente para σωφροσύνη en este registro, sin convertirlo en una paráfrasis psicológica.'
  - '''Desenfreno'' preserva el juicio moral fuerte de ἀκολασία sin recurrir a un término eclesiástico más arcaico.'
  - No se añadieron notas al pie porque no había una variante textual o ambigüedad que exigiera anclaje explícito en este versículo.
