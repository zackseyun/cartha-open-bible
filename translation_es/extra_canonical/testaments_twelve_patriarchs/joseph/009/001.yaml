base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/009/001.yaml
  text: And while I was in chains, the Egyptian woman was held together by grief; and when she came, she would listen in on me, how I gave thanks to the Lord and sang hymns in the house of darkness, and rejoiced with a cheerful voice, glorifying my God, because by a pretext I had been delivered from the Egyptian woman.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:25Z'
    unchanged: false
    changes_summary: Changed 'listen in on me' to 'listen to me' for a more natural and formal rendering of ἐπηκροᾶτό μου. Kept the rest substantially unchanged as accurate and complete.
translation:
  language: es
  text: Y mientras yo estaba en cadenas, la egipcia estaba dominada por la tristeza[a]; y cuando venía, se ponía a escucharme[b] cómo daba gracias al Señor y cantaba himnos en la casa de las tinieblas, y me regocijaba con voz alegre glorificando a mi Dios, porque mediante un pretexto había sido librado de la egipcia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Gr. συνείχετο ἀπὸ τῆς λύπης: lit. ''era retenida/oprimida por la tristeza''. El verbo συνέχω connota ser dominada, comprimida o sobrepasada por una fuerza. Alternativa: ''era oprimida por la tristeza''.'
    reason: lexical_alternative
  - marker: b
    text: 'Gr. ἐπηκροᾶτό (de ἐπακροάομαι): el verbo implica escucha encubierta o clandestina (''escuchar a escondidas'', ''espiar''). La revisión del texto inglés POB suavizó ''listen in on me'' a ''listen to me'', pero el griego apoya la lectura de escucha furtiva. El español ''se ponía a escucharme'' es neutral; el matiz de escucha encubierta queda atestiguado por el léxico griego.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δεσμοῖς
  english_pob_choice: chains
  chosen_spanish: cadenas
  alternatives_spanish:
  - prisiones
  - grilletes
  - ataduras
  lexicon: 'LSJ: δεσμός, chains, bonds, fetters'
  rationale: Equivalente directo y natural. El inglés POB eligió 'chains'; el español 'cadenas' preserva la concreción física del término griego y es el equivalente más preciso y de registro bíblico apropiado.
- source_word: συνείχετο ἀπὸ τῆς λύπης
  english_pob_choice: was held together by grief
  chosen_spanish: estaba dominada por la tristeza
  alternatives_spanish:
  - era oprimida por la tristeza
  - estaba presa de la tristeza
  - era consumida por la tristeza
  lexicon: 'LSJ: συνέχω, to hold together, compress, constrain, overcome; ἀπό causal'
  rationale: El verbo συνέχω denota ser aferrado, oprimido o dominado por una fuerza. El inglés POB 'was held together by grief' es algo literal; en español, 'estaba dominada por la tristeza' transmite con naturalidad el sentido de ser completamente sobrepasada por la pena sin calco torpe. 'Oprimida' sería una alternativa igualmente fiel.
- source_word: ἐπηκροᾶτό μου
  english_pob_choice: 'would listen in on me (revised to: would listen to me)'
  chosen_spanish: se ponía a escucharme
  alternatives_spanish:
  - me escuchaba a escondidas
  - me espiaba
  - se acercaba a escucharme
  lexicon: 'LSJ: ἐπακροάομαι, to listen secretly, to eavesdrop, to give ear to covertly'
  rationale: El verbo ἐπακροάομαι tiene sentido de escucha encubierta o clandestina; la versión original del inglés POB ('listen in on me') capturaba mejor este matiz. La revisión lo suavizó a 'listen to me'. El español 'se ponía a escucharme' es neutral y natural; la nota al pie preserva el matiz de escucha furtiva que el griego sostiene.
- source_word: ηὐχαρίστουν τῷ Κυρίῳ
  english_pob_choice: gave thanks to the Lord
  chosen_spanish: daba gracias a Yahvé
  alternatives_spanish:
  - daba gracias al Señor
  lexicon: 'LSJ: εὐχαριστέω, to give thanks; κύριος = Señor / nombre divino'
  rationale: Εὐχαριστέω es 'dar gracias'; κύριος en este contexto pseudoepigráfico judío representa el nombre divino YHWH. Véase decisión teológica sobre κύριος → 'Yahvé'.
- source_word: ὕμνουν
  english_pob_choice: sang hymns
  chosen_spanish: cantaba himnos
  alternatives_spanish:
  - entonaba himnos
  - salmodiaba
  lexicon: 'LSJ: ὑμνέω, to sing hymns, to celebrate in song'
  rationale: Equivalente directo. 'Cantaba himnos' es natural y de registro apropiado para el contexto litúrgico-narrativo.
- source_word: οἴκῳ τοῦ σκότους
  english_pob_choice: house of darkness
  chosen_spanish: casa de las tinieblas
  alternatives_spanish:
  - casa de la oscuridad
  - morada de las sombras
  lexicon: 'LSJ: σκότος, darkness; οἶκος, house, dwelling'
  rationale: Imagen poética para la prisión. 'Tinieblas' es preferido sobre 'oscuridad' por su registro bíblico y su dignidad literaria en español; 'casa de las tinieblas' traduce literalmente el genitivo τοῦ σκότους y conserva la fuerza metafórica.
- source_word: ἱλαρᾷ φωνῇ
  english_pob_choice: with a cheerful voice
  chosen_spanish: con voz alegre
  alternatives_spanish:
  - con voz gozosa
  - con voz jubilosa
  lexicon: 'LSJ: ἱλαρός, cheerful, glad, merry; φωνή, voice'
  rationale: ἱλαρός denota alegría, buen ánimo; 'alegre' es el equivalente más natural y preciso en español. 'Gozosa' o 'jubilosa' serían alternativas ligeramente más intensas que el griego no requiere.
- source_word: διὰ προφάσεως
  english_pob_choice: by a pretext
  chosen_spanish: mediante un pretexto
  alternatives_spanish:
  - por medio de un pretexto
  - con un pretexto
  lexicon: 'LSJ: πρόφασις, pretext, ostensible reason, excuse'
  rationale: πρόφασις indica una razón presentada públicamente que no es la verdadera razón; 'pretexto' es el equivalente exacto en español. 'Mediante' es más formal que 'con' y corresponde mejor al causal διά + genitivo.
- source_word: ἀπηλλάγην τῆς Αἰγυπτίας
  english_pob_choice: had been delivered from the Egyptian woman
  chosen_spanish: había sido librado de la egipcia
  alternatives_spanish:
  - me había visto libre de la egipcia
  - había escapado de la egipcia
  lexicon: 'LSJ: ἀπαλλάσσω, to release, deliver, free; aoristo pasivo'
  rationale: 'El aoristo pasivo ἀπηλλάγην sugiere que la liberación fue recibida, no lograda por el propio José; ''había sido librado'' preserva la voz pasiva y su posible connotación de agencia divina. ''La egipcia'' (con artículo definido) es el referente establecido a lo largo del texto: la esposa de Putifar.'
theological_decisions:
- issue: κύριος como representación del nombre divino YHWH en texto pseudoepigráfico judío
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  rationale: El Testamento de los Doce Patriarcas es un pseudoepígrafo judío en el que José habla del Dios de Israel. El griego κύριος en este contexto claramente representa el nombre divino YHWH (no un título cristológico). Conforme a la convención terminológica del POB, κύριος que funciona como sustituto del nombre divino se rinde como 'Yahvé' en lugar de enmascararlo con 'el Señor'. La nota al pie explica la decisión para el lector.
  doctrine_reference: 'POB project convention: YHWH/κύριος (as divine name substitute) → ''Yahvé''; distinguished from Christological κύριος'
translation_notes:
  revision_awareness: 'La revisión del inglés POB (2026-04-23, gpt-5.4) cambió ''listen in on me'' por ''listen to me'' alegando mayor naturalidad y formalidad. Sin embargo, el lexema griego ἐπακροάομαι (LSJ: to listen secretly, to eavesdrop) apoya la lectura original de escucha encubierta. La traducción española ''se ponía a escucharme'' adopta una posición neutral que no fuerza ninguno de los dos matices, y la nota al pie preserva la tensión léxica documentando que el griego suporta la escucha furtiva. La revisión no afectó ningún otro aspecto del versículo presente.'
  spanish_consistency_notes:
  - κύριος como sustituto del nombre divino → 'Yahvé' (no 'el Señor'), conforme a la convención POB del proyecto.
  - σκότος → 'tinieblas' (no 'oscuridad') para mantener registro bíblico y literario digno en español.
  - La egipcia (ἡ Αἰγυπτία / τῆς Αἰγυπτίας) se rinde consistentemente como 'la egipcia', referente establecido para la esposa de Putifar a lo largo del texto.
  - Voz pasiva de ἀπηλλάγην preservada en español ('había sido librado') para mantener la posible connotación de agencia divina implícita en el relato.
  - El imperfecto iterativo (ἐπηκροᾶτό, ηὐχαρίστουν, ὕμνουν, ἔχαιρον) se rinde con pretérito imperfecto en español ('se ponía a escucharme', 'daba gracias', 'cantaba', 'me regocijaba'), capturando la acción habitual/repetida.
