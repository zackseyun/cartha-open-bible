source:
  edition: Charles 1908 Greek Versions (pages 256-287, Joseph pilot)
  text: '*Καὶ ὡς²³ ἤμην ἐν τοῖς δεσμοῖς²⁴, ἡ Αἰγυπτία συνείχετο²⁵ ἀπὸ τῆς λύπης· ἐλθοῦσα δὲ ἐπηκροᾶτό μου πῶς ηὐχαρίστουν τῷ Κυρίῳ καὶ ὕμνουν ἐν οἴκῳ *τοῦ σκότους²⁶, καὶ ἔχαιρον ἐν *ἱλαρᾷ φωνῇ²⁷ δοξάζων τὸν Θεόν μου, ὅτι διὰ προφάσεως ἀπηλλάγην²⁸ τῆς Αἰγυπτίας.'
