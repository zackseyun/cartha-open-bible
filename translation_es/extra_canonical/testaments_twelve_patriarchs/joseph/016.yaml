translation:
  language: es
  text: 'Pero Memphis le dijo a su marido[a]: "Oigo que están vendiendo al joven."



    2 Así que enseguida envió a un eunuco entre los ismaelitas, pidiendo que me vendieran a ella.



    3 Pero el eunuco, no queriendo comprarme, se retiró después de tantearlos, e informó a su señora que pedían un precio alto por el muchacho.



    4 Entonces ella envió a otro eunuco, diciendo: "Aunque pidan dos minas[b], págalo. No escatimes el oro. Solo compra al muchacho y tráemelo."



    5 Así que el eunuco vino y, dándoles ochenta piezas de oro[c], me tomó; pero a la egipcia le dijo que había dado cien.



    6 Pero yo, sabiéndolo, guardé silencio, para que[d]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Una mina era una unidad antigua de peso y dinero; el griego conserva el término específico en lugar de convertirlo a una cantidad moderna.
    reason: cultural_note
  - marker: b
    text: El griego usa 'minas' (μνᾶς), una unidad monetaria antigua que se conserva por transliteración para preservar la transparencia con el texto original.
    reason: cultural_note
  - marker: c
    text: El griego dice 'ochenta de oro' y luego 'cien'; la denominación exacta no se especifica en el testimonio normalizado, por lo que la traducción mantiene la formulación general.
    reason: lexical_alternative
  - marker: d
    text: La oración continúa más allá de la porción extante del texto del capítulo aquí proporcionada; la traducción termina donde termina el extracto griego.
    reason: textual_variant
lexical_decisions:
- source_word: Μεμφὶς
  english_pob_choice: Memphis
  chosen_spanish: Memfis
  alternatives_spanish:
  - Memfítida
  lexicon: LSJ
  rationale: Se trata como nombre propio por transliteración. 'Memfis' es la forma castellana habitual; el testimonio griego lo presenta como nombre de la mujer, no de la ciudad.
- source_word: νεανίας
  english_pob_choice: young man
  chosen_spanish: joven
  alternatives_spanish:
  - muchacho
  - mancebo
  lexicon: LSJ
  rationale: '''Joven'' equilibra sentido literal y legibilidad moderna; preserva la juventud de José sin sonar arcaico.'
- source_word: εὐνοῦχος
  english_pob_choice: eunuch
  chosen_spanish: eunuco
  alternatives_spanish:
  - funcionario de la corte
  lexicon: LSJ
  rationale: El griego designa propiamente a un eunuco; no se aplana a 'funcionario'.
- source_word: αἰτοῦσά με εἰς διάπρασιν
  english_pob_choice: asking that I be sold to her
  chosen_spanish: pidiendo que me vendieran a ella
  alternatives_spanish:
  - solicitándome para la compra
  - pidiendo que me pusieran en venta
  lexicon: LSJ
  rationale: Se trata de gestionar la venta de José; esta versión hace explícito el sentido comercial sin alejarse del griego.
- source_word: πειράσας
  english_pob_choice: after testing them
  chosen_spanish: después de tantearlos
  alternatives_spanish:
  - después de sondearlos
  - después de probarlos
  lexicon: LSJ
  rationale: Indica indagación exploratoria sobre las condiciones de los vendedores, no tentación moral. 'Tantear' es el español natural.
- source_word: δεσποίνη
  english_pob_choice: mistress
  chosen_spanish: señora
  alternatives_spanish:
  - dueña
  - ama
  lexicon: LSJ
  rationale: '''Señora'' refleja la autoridad doméstica y la relación de propiedad en este contexto; en español ''ama'' resultaría arcaico.'
- source_word: πολλὴν τιμήν
  english_pob_choice: a high price
  chosen_spanish: un precio alto
  alternatives_spanish:
  - mucho valor
  - una gran suma
  lexicon: LSJ
  rationale: Rendición idiomática de τιμή en contexto de compra.
- source_word: μνᾶς
  english_pob_choice: minas
  chosen_spanish: minas
  alternatives_spanish:
  - libras
  lexicon: LSJ
  rationale: Unidad monetaria antigua; se conserva por transliteración para transparencia.
- source_word: μὴ φείσασθε χρυσίου
  english_pob_choice: Do not spare the gold
  chosen_spanish: No escatimes el oro
  alternatives_spanish:
  - No retengas oro
  - No seas tacaño con el oro
  lexicon: LSJ
  rationale: Conserva la fuerza imperativa y el lenguaje económico concreto. Se usa segunda persona singular pues va dirigido al eunuco.
- source_word: χρυσοῦς
  english_pob_choice: pieces of gold
  chosen_spanish: piezas de oro
  alternatives_spanish:
  - monedas de oro
  - áureos
  lexicon: LSJ
  rationale: La denominación exacta no se especifica; 'piezas de oro' preserva el sentido monetario sin precisión falsa.
- source_word: ἀνελάβετό με
  english_pob_choice: took me
  chosen_spanish: me tomó
  alternatives_spanish:
  - me recibió
  - me llevó consigo
  lexicon: LSJ
  rationale: En este contexto de venta de esclavo, 'me tomó' es el equivalente español más natural.
- source_word: ἐσιώπησα
  english_pob_choice: kept silent
  chosen_spanish: guardé silencio
  alternatives_spanish:
  - callé
  - permanecí callado
  lexicon: LSJ
  rationale: Frase ligeramente elevada que se ajusta al tono testamentario y preserva la reserva deliberada de José.
theological_decisions:
- issue: Lenguaje de estatus en la venta de José
  chosen_reading: Se conserva directamente el lenguaje comercial/de venta de esclavos
  alternative_readings:
  - Suavizar al lenguaje de servicio doméstico
  rationale: El capítulo griego es explícito sobre comprar, vender, precio y posesión. Conforme a la filosofía del proyecto, la traducción no atenúa la condición de servidumbre forzada implicada.
  doctrine_reference: DOCTRINE.md § Translation philosophy, original-language primacy over translation tradition
translation_notes:
  revision_awareness: El POB inglés no recibió cambios en el pase de revisión. La traducción española mantiene fielmente el lenguaje directo de venta y compra documentado en theological_decisions, sin importar tradiciones de traducción que suavicen el sentido.
  spanish_consistency_notes:
  - '''eunuco'' para εὐνοῦχος en todo el capítulo'
  - '''señora'' para δεσποίνη'
  - '''piezas de oro'' para χρυσοῦς'
  - '''minas'' por transliteración para μνᾶς'
  - '''guardé silencio'' para ἐσιώπησα'
