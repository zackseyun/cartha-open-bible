translation:
  language: es
  text: '1 Y después de esto, ella me envió comida mezclada con hechicería[a]. 2 Pero cuando vino el eunuco que la traía, alcé la vista y vi a un hombre aterrador[b] que me entregaba, junto con el plato, una espada; y comprendí que era una artimaña[c] para extraviarme. 3 Así que, después de que él hubo salido, no comí ni aquella comida ni ninguno de sus otros alimentos, sino que lloré sin probarlos. 4 Luego, después de un día, ella vino a mí, y al notar la comida, me dijo: «¿Por qué es esto, que no comiste de la comida?». 5 Y le dije: «Porque la llenaste de hechicería mortal. ¿Y cómo dijiste: ‹No me acerco a los ídolos, sino solo al Señor›? 6 Sabe ahora, pues, que el Dios de mi padre, por medio de su ángel, me reveló tu maldad; y por esta razón la guardé como prueba contra ti, para exponerte[d], con la esperanza de que quizá, cuando la vieras, te arrepintieras[e]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'comida embrujada' / 'amasada con artes mágicas'.
    reason: lexical_alternative
  - marker: b
    text: El 'hombre aterrador' no se identifica en el texto griego; la figura puede ser visionaria, simbólica, o relacionada con la hechicería intentada.
    reason: alternative_reading
  - marker: c
    text: O 'un truco' / 'una contrivancia mágica' para extraviarme.
    reason: lexical_alternative
  - marker: d
    text: O 'para tu reprobación' / 'para tu convicción' por 'como prueba contra ti, para exponerte'.
    reason: lexical_alternative
  - marker: e
    text: O 'cambiaras de mente'; en este contexto de pecado concreto, 'arrepentirse' refleja mejor la fuerza moral.
    reason: lexical_alternative
lexical_decisions:
- source_word: βρῶμα
  english_pob_choice: food
  chosen_spanish: comida
  alternatives_spanish:
  - alimento
  - vianda
  lexicon: LSJ
  rationale: Término amplio para comida en lugar de un plato preparado específico; 'comida' mantiene la narrativa sencilla y consistente.
- source_word: γοητεία / ἐν γοητείᾳ πεφυρμένον
  english_pob_choice: mixed with sorcery
  chosen_spanish: mezclada con hechicería
  alternatives_spanish:
  - mezclada con magia
  - drogada con encantamiento
  lexicon: LSJ
  rationale: γοητεία denota artes mágicas; 'hechicería' refleja el sentido oculto y el participio πεφυρμένον.
- source_word: φοβερὸν ἄνδρα
  english_pob_choice: a terrifying man
  chosen_spanish: un hombre aterrador
  alternatives_spanish:
  - un hombre temible
  - un hombre imponente
  lexicon: LSJ
  rationale: En contexto José ve una figura amenazante asociada con peligro y engaño; 'aterrador' transmite mejor la fuerza ominosa.
- source_word: τρύβλιον
  english_pob_choice: dish
  chosen_spanish: plato
  alternatives_spanish:
  - fuente
  - bandeja
  lexicon: LSJ
  rationale: Recipiente para comida; 'plato' es natural en español.
- source_word: μάχαιρα
  english_pob_choice: sword
  chosen_spanish: espada
  alternatives_spanish:
  - cuchillo
  - daga
  lexicon: LSJ
  rationale: '''Espada'' preserva la amenaza visionaria y es de uso común en escenas simbólicas.'
- source_word: περιέργεια
  english_pob_choice: a scheme
  chosen_spanish: una artimaña
  alternatives_spanish:
  - un truco
  - una práctica curiosa
  - un acto mágico
  lexicon: LSJ
  rationale: El sentido aquí es contrivancia manipuladora; 'artimaña' comunica engaño intencional.
- source_word: εἰς ἀποπλάνησίν μου
  english_pob_choice: to lead me astray
  chosen_spanish: para extraviarme
  alternatives_spanish:
  - para mi engaño
  - para apartarme
  lexicon: LSJ
  rationale: El verbo lleva matiz moral/espiritual; 'extraviar' preserva esa fuerza ética.
- source_word: μὴ γευσάμενος
  english_pob_choice: without tasting
  chosen_spanish: sin probarlos
  alternatives_spanish:
  - sin haberlos comido
  - sin participar
  lexicon: LSJ
  rationale: El participio es específicamente 'gustar/probar'; mantenerlo preserva el rechazo deliberado.
- source_word: ἐπιγνοῦσα τὸ βρῶμα
  english_pob_choice: when she recognized the food
  chosen_spanish: al notar la comida
  alternatives_spanish:
  - al reconocer la comida
  - al examinar la comida
  lexicon: LSJ
  rationale: ἐπιγινώσκω aquí se entiende mejor como percatarse de la comida intacta; sigue el sentido del POB.
- source_word: γοητείας θανάτου
  english_pob_choice: deadly sorcery
  chosen_spanish: hechicería mortal
  alternatives_spanish:
  - hechicería de muerte
  - magia letal
  lexicon: LSJ
  rationale: El genitivo expresa cualidad o efecto; 'hechicería mortal' es idiomática y preserva la acusación letal.
- source_word: οὐ προσεγγίζω τοῖς εἰδώλοις
  english_pob_choice: I do not draw near to idols
  chosen_spanish: No me acerco a los ídolos
  alternatives_spanish:
  - No me aproximo a los ídolos
  lexicon: LSJ
  rationale: προσεγγίζω es 'acercarse'; preserva el contraste con la devoción al Señor.
- source_word: Κυρίῳ μόνῳ
  english_pob_choice: the Lord alone
  chosen_spanish: solo al Señor
  alternatives_spanish:
  - únicamente al Señor
  lexicon: LSJ
  rationale: Español natural que preserva la exclusividad.
- source_word: δι’ ἀγγέλου αὐτοῦ
  english_pob_choice: through his angel
  chosen_spanish: por medio de su ángel
  alternatives_spanish:
  - mediante su ángel
  lexicon: LSJ
  rationale: Frase instrumental directa para διά + genitivo en contexto revelatorio.
- source_word: ἀπεκάλυψέ μοι τὴν κακίαν σου
  english_pob_choice: revealed your wickedness to me
  chosen_spanish: me reveló tu maldad
  alternatives_spanish:
  - me descubrió tu malicia
  lexicon: LSJ
  rationale: κακία es maldad moral/intención malvada; 'revelar' coincide con ἀποκαλύπτω.
- source_word: εἰς ἔλεγχόν σου
  english_pob_choice: as evidence against you, to expose you
  chosen_spanish: como prueba contra ti, para exponerte
  alternatives_spanish:
  - para tu reprobación
  - para tu convicción
  lexicon: LSJ
  rationale: ἔλεγχος puede significar exposición, prueba o reprensión. La traducción ampliada captura ambos sentidos.
- source_word: μετανοήσεις
  english_pob_choice: repent
  chosen_spanish: te arrepintieras
  alternatives_spanish:
  - cambiaras de mente
  - cambiaras de pensamiento
  lexicon: LSJ
  rationale: Conforme a la guía del proyecto, contextos de pecado específico favorecen 'arrepentirse'. Aquí José confronta un acto concreto de maldad.
theological_decisions:
- issue: Naturaleza de la percepción de José del 'hombre aterrador' con la espada
  chosen_reading: Traducir como percepción visionaria o revelatoria sin sobre-explicar si la figura es angélica, demoníaca o simbólica.
  alternative_readings:
  - Una aparición demoníaca ligada a la hechicería
  - Una percepción interna simbólica del peligro
  - Una figura angélica de advertencia
  rationale: El griego simplemente reporta lo que José vio y su comprensión del peligro. El texto no identifica la figura, así que la traducción preserva la ambigüedad.
  doctrine_reference: Preservar tensión teológica en lugar de resolverla.
- issue: Rendición de μετανοήσεις en la reprensión de José
  chosen_reading: arrepentirse
  alternative_readings:
  - cambiar de mente
  - cambiar de pensamiento
  rationale: El contexto es confrontación directa por intento de corrupción y posible asesinato/seducción; este es un contexto de pecado específico, así que 'arrepentirse' encaja mejor con la política del proyecto.
  doctrine_reference: 'DOCTRINE.md: μετανοέω → arrepentir en contextos de pecado específico'
translation_notes:
  revision_awareness: El revisor POB no requirió cambios al capítulo. Per-verso 6:5 fue revisado a 'sorcery of death', 6:6 reformulado a 'preserved him for your conviction' y 6:4 a 'noticed'. El español del capítulo retiene las decisiones léxicas POB pero usa 'hechicería mortal' para fluidez.
  spanish_consistency_notes:
  - βρῶμα → comida (consistente)
  - γοητεία → hechicería (consistente)
  - Κύριος → Señor
  - Θεός → Dios
  - μετανοέω en contexto de pecado específico → arrepentirse
  - φοβερός → aterrador en contexto visionario
