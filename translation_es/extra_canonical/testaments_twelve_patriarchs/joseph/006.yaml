base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/006.yaml
  text: 1 And after this she sent me food mixed with sorcery[6:2]. 2 But when the eunuch who was bringing it came, I looked up and saw a terrifying man handing me, together with the dish, a sword; and I understood that it was a scheme to lead me astray. 3 So after he had gone out, I ate neither that food nor any of her other foods, but wept without tasting them. 4 Then after one day she came to me, and when she recognized the food, she said to me, “Why is it that you did not eat the food?” 5 And I said to her, “Because you filled it with deadly sorcery. And how did you say, ‘I do not draw near to idols, but to the Lord alone’? 6 Know now, then, that the God of my father, through his angel, revealed your wickedness to me; and for this reason I kept it as evidence against you, to expose you, in hope that perhaps, when you saw it[6:6][6:2], you might repent.”
  footnotes:
  - marker: '6:2'
    text: The 'terrifying man' is not identified in the Greek text; the figure may be visionary, symbolic, or connected with the attempted sorcery.
    reason: alternative_reading
  - marker: '6:2'
    text: Or 'a trick' / 'a magical contrivance' for leading me astray' for the phrase rendered 'a scheme to lead me astray.'
    reason: lexical_alternative
  - marker: '6:6'
    text: Or 'for your reproof' / 'for your conviction' for 'as evidence against you, to expose you.'
    reason: lexical_alternative
