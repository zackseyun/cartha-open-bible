translation:
  language: es
  text: Porque su reino será un reino eterno, que no pasará. Pero mi reino entre ustedes se está llevando a cumplimiento, como una choza de guardia en un huerto, que desaparece después del verano.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: βασιλεία
  english_pob_choice: kingdom
  chosen_spanish: reino
  alternatives_spanish:
  - reinado
  - reino/autoridad real
  lexicon: βασιλεία
  rationale: El contexto contrasta dos reinos; en español «reino» conserva la idea territorial/dinástica y funciona naturalmente con la oposición entre el reino de él y «mi reino».
- source_word: ἔσται αἰώνιος
  english_pob_choice: will be eternal
  chosen_spanish: será un reino eterno
  alternatives_spanish:
  - será eterno
  - durará para siempre
  lexicon: αἰώνιος
  rationale: «Eterno» reproduce con claridad la duración sin fin del adjetivo y mantiene el paralelismo solemne del griego.
- source_word: οὐ παρελεύσεται
  english_pob_choice: does not appear / pass away
  chosen_spanish: no pasará
  alternatives_spanish:
  - no desaparecerá
  - no se extinguirá
  lexicon: παρέρχομαι
  rationale: La negativa expresa la permanencia del reino; «no pasará» es la forma más concisa y fiel en español bíblico contemporáneo.
- source_word: ἐν ὑμῖν ἐπιτελεῖται
  english_pob_choice: is brought to completion among you
  chosen_spanish: entre ustedes se está llevando a cumplimiento
  alternatives_spanish:
  - en ustedes se cumple
  - entre ustedes se completa
  lexicon: ἐπιτελέω
  rationale: «Se está llevando a cumplimiento» conserva el valor de proceso/culminación del verbo mejor que un simple «se cumple», y «entre ustedes» evita forzar una lectura interiorista que el contexto no exige.
- source_word: ὡς ὀπωροφυλάκιον
  english_pob_choice: like a watchman’s hut in an orchard
  chosen_spanish: como una choza de guardia en un huerto
  alternatives_spanish:
  - como una cabaña del guardián en un huerto
  - como la caseta del vigilante en un huerto
  lexicon: ὀπωροφυλάκιον
  rationale: El término alude a la pequeña estructura temporal del guardián de un huerto; «choza de guardia» mantiene el carácter humilde y provisional sin introducir una imagen demasiado moderna.
- source_word: μετὰ τὸ θέρος ἐξαφανίζεται
  english_pob_choice: which does not appear after the summer
  chosen_spanish: que desaparece después del verano
  alternatives_spanish:
  - que se desvanece después del verano
  - que ya no aparece tras el verano
  lexicon: ἐξαφανίζω
  rationale: El griego expresa desaparición/desaparición de la estructura estacional; «desaparece» es natural y preserva la imagen de algo temporal que deja de verse tras el verano.
theological_decisions:
- issue: Duración eterna del reino divino frente a la provisionalidad del reino de José
  english_pob_reading: The eternal kingdom contrasts with the temporary orchard hut image for Joseph's kingdom among the addressees.
  chosen_spanish_reading: El reino de él es eterno e inpasable; el de José entre ellos es temporal y culmina dentro de su misión, comparado con una estructura de temporada.
  alternative_spanish_readings:
  - El reino de él es eterno; el de José entre ustedes se cumple
  - El reino de José entre ustedes queda completado
  rationale: La comparación preserva la tensión entre permanencia divina y provisionalidad humana sin añadir interpretaciones no presentes en el texto. La frase «se está llevando a cumplimiento» mantiene el matiz de proceso que evita una lectura estática o puramente institucional.
  doctrine_reference: Eschatology / providence
translation_notes:
  revision_awareness: The latest revision pass left the English text unchanged. This Spanish draft therefore tracks the source packet and the established English POB wording without introducing revision-dependent shifts.
  spanish_consistency_notes:
  - Se mantiene el uso de «reino» para βασιλεία en ambas ocurrencias por consistencia contextual.
  - Se evita «SEÑOR» porque el pasaje no contiene el tetragrámaton ni una cita directa de κύριος.
  - «Entre ustedes» traduce ἐν ὑμῖν con plural de segunda persona natural en español latinoamericano.
  - No se añaden notas al pie porque no hay una alternativa textual o lexical que requiera anclaje explícito en este versículo.
