  text: Ἡ γὰρ βασιλεία αὐτοῦ βασιλεία *ἔσται αἰώνιος⁴⁹ ἥτις οὐ παρελεύσεται⁵⁰. ἡ δὲ ἐμὴ βασιλεία⁵¹ ἐν ὑμῖν ἐπιτελεῖται, ὡς ὀπωροφυλάκιον⁵² ⌜γος⌉⁵³ μετὰ τὸ θέρος ἐξαφανίζεται⁵⁴.
