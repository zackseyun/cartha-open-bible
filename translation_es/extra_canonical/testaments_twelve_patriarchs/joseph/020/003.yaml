translation:
  language: es
  text: Y traigan a Asenet, la madre de ustedes, [al Hipódromo], y sepúltenla junto a Raquel, mi madre.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ᾿Ασυνὲθ / Aseneth
  english_pob_choice: Aseneth
  chosen_spanish: Asenet
  alternatives_spanish:
  - Aseneth
  - Asenat
  lexicon: nombre propio
  rationale: Se conserva el nombre propio en forma española transparente. 'Asenet' evita una transliteración excesivamente inglesa y es natural en español, manteniendo la referencia inequívoca a la madre.
- source_word: τὴν μητέρα ὑμῶν
  english_pob_choice: your mother
  chosen_spanish: vuestra madre
  alternatives_spanish:
  - su madre
  lexicon: pronombre posesivo
  rationale: El plural de segunda persona del griego se refleja mejor con 'vuestra'. En este contexto retiene la dirección colectiva del mandato.
- source_word: παρὰ τὸν Ἱππόδρομον
  english_pob_choice: '[to the Hippodrome]'
  chosen_spanish: '[al Hipódromo]'
  alternatives_spanish:
  - junto al Hipódromo
  - cerca del Hipódromo
  lexicon: topónimo / indicación espacial
  rationale: Se mantiene la indicación entre corchetes porque el texto fuente la presenta como adición localizada. 'Al Hipódromo' reproduce la referencia espacial de manera natural en español.
- source_word: πλησίον
  english_pob_choice: near
  chosen_spanish: junto a
  alternatives_spanish:
  - cerca de
  - al lado de
  lexicon: preposición espacial
  rationale: '''Junto a'' expresa proximidad inmediata sin exagerar. Es más preciso y sobrio que una simple ''cerca de'' en un contexto de sepultura.'
- source_word: Ῥαχιὴλ τῆς μητέρος μου
  english_pob_choice: Rachel my mother
  chosen_spanish: Raquel, mi madre
  alternatives_spanish:
  - Raquel, vuestra madre
  - Raquel, la madre mía
  lexicon: nombre propio + parentesco
  rationale: Se conserva el genitivo posesivo con la puntuación natural del español. 'Mi madre' refleja fielmente la autodesignación del hablante.
- source_word: θάψατε αὐτήν
  english_pob_choice: bury her
  chosen_spanish: sepultadla
  alternatives_spanish:
  - enterradla
  - dadle sepultura
  lexicon: verbo de inhumación
  rationale: '''Sepultadla'' es solemne, claro y bíblicamente apropiado. Mantiene la fuerza del imperativo sin caer en una paráfrasis.'
theological_decisions:
- issue: Mandato de sepultura junto a un familiar venerado
  english_pob_reading: bury her near Rachel my mother
  chosen_spanish_reading: sepultadla junto a Raquel, mi madre
  alternative_spanish_readings:
  - sepultadla cerca de Raquel, mi madre
  rationale: No se introduce explicación doctrinal adicional; se conserva la relación familiar y memorial tal como la presenta el texto. La proximidad funeraria queda expresada sin suavizarla.
  doctrine_reference: memoria funeraria y piedad familiar en literatura testamentaria judía
translation_notes:
  revision_awareness: 'Se revisó el contexto inglés y la fuente griega: el texto inglés no añadió notas, pero el griego sí contiene una localización entre corchetes. La versión española conserva esa señalización y evita añadir material no sustentado por la fuente.'
  spanish_consistency_notes:
  - Se mantiene 'Asenet' como forma española estable y reconocible del nombre propio.
  - Se conserva el tratamiento plural 'vuestra' porque el griego dirige la orden a varios destinatarios.
  - '''Sepultadla'' se prefirió por su registro solemne y su correspondencia directa con θάψατε.'
  - La nota [a] está anclada explícitamente en el texto para cumplir la referencia al pasaje entre corchetes.
