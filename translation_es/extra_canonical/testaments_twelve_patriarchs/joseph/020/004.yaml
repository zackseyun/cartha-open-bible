translation:
  language: es
  text: Y después de haber dicho estas cosas, extendió los pies y se durmió en una buena vejez.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: καὶ ... ταῦτα εἰπών
  english_pob_choice: And after saying these things
  chosen_spanish: Y después de haber dicho estas cosas
  alternatives_spanish:
  - Y tras decir estas cosas
  - Y después de decir estas cosas
  lexicon: καί; ταῦτα; εἰπών
  rationale: El participio aoristo con καὶ se expresa naturalmente en español como una construcción temporal de anterioridad. 'Haber dicho' mantiene la relación de secuencia sin añadir contenido interpretativo.
- source_word: ἐκτείνας τοὺς πόδας αὐτοῦ
  english_pob_choice: he stretched out his feet
  chosen_spanish: extendió los pies
  alternatives_spanish:
  - estiró los pies
  - alargó los pies
  lexicon: ἐκτείνω; πούς
  rationale: '''Extendió'' conserva el gesto corporal de ἐκτείνας con un registro digno y natural. Se mantiene el plural ''los pies'' porque el griego lo usa explícitamente.'
- source_word: ὕπνῳ καλῷ
  english_pob_choice: at a good old age
  chosen_spanish: en una buena vejez
  alternatives_spanish:
  - en un buen ancianato
  - con buena vejez
  - en una vejez dichosa
  lexicon: ὕπνος; καλός
  rationale: Aquí el griego dice literalmente 'con un buen sueño' o 'en un sueño bueno', pero el contexto narrativo y la audit trail inglesa interpretan la expresión como muerte en plenitud de vida, equivalente a morir tras larga vida. En español, 'en una buena vejez' comunica esa lectura sin introducir la idea de 'sueño' como eufemismo técnico en el texto principal.
theological_decisions:
- issue: La expresión final puede leerse literalmente como 'se durmió en un sueño bueno' o idiomáticamente como muerte en vejez avanzada
  english_pob_reading: at a good old age
  chosen_spanish_reading: en una buena vejez
  alternative_spanish_readings:
  - se durmió en un buen sueño
  - murió en una buena vejez
  rationale: El POB inglés ya resolvió la frase como muerte a edad avanzada. La versión española sigue esa decisión, porque el contexto de la obra y la sintaxis griega favorecen un eufemismo de muerte, no un sueño literal. 'Se durmió' ya aparece implícito en el verbo griego ἐκοιμήθη, pero repetirlo en español sería redundante y podría sonar menos claro en una sección narrativa breve.
  doctrine_reference: Eufemismo bíblico de la muerte; coherencia narrativa del contexto inmediato
translation_notes:
  revision_awareness: La revisión más reciente marcó el pasaje como sin cambios necesarios. La redacción propuesta respeta esa estabilidad y mantiene la misma resolución interpretativa básica del POB inglés, ajustándola solo para una formulación española natural y fiel al griego.
  spanish_consistency_notes:
  - Se usa 'extendió los pies' para conservar la imaginería corporal del griego sin añadir paráfrasis.
  - Se evita 'Señor' u otra terminología no presente en el texto.
  - La frase final se presenta como eufemismo de muerte en vejez, coherente con la lectura inglesa auditada.
