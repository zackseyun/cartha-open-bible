translation:
  language: es
  text: Y todo Israel y todo Egipto lo lloraron con gran lamento.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπένθησεν
  english_pob_choice: mourned
  chosen_spanish: lo lloraron con gran lamento
  alternatives_spanish:
  - lo lamentaron con gran duelo
  - lo guardaron duelo
  lexicon: ἐπενθέω
  rationale: El verbo griego expresa duelo por una persona muerta; en español, «lloraron» comunica el acto de duelo de forma natural, y «con gran lamento» conserva la intensificación de πένθος μέγα sin volverlo demasiado interpretativo.
- source_word: πᾶς Ἰσραήλ / πᾶσα Αἴγυπτος
  english_pob_choice: all Israel and all Egypt
  chosen_spanish: todo Israel y todo Egipto
  alternatives_spanish:
  - todo el Israel y toda Egipto
  - la totalidad de Israel y de Egipto
  lexicon: πᾶς
  rationale: Se mantiene la fuerza inclusiva de πᾶς con «todo», respetando el paralelismo del original y la formulación ya reflejada en el inglés POB.
- source_word: πένθος μέγα
  english_pob_choice: great mourning
  chosen_spanish: gran lamento
  alternatives_spanish:
  - gran duelo
  - profundo duelo
  - gran lamentación
  lexicon: πένθος
  rationale: «Duelo» sería muy exacto, pero «lamento» suena más fluido en español contemporáneo y conserva el tono fúnebre. Se evita suavizar la intensidad del adjetivo μέγα.
theological_decisions:
- issue: Alcance universal del duelo
  english_pob_reading: And all Israel and all Egypt mourned him
  chosen_spanish_reading: Y todo Israel y todo Egipto lo lloraron
  alternative_spanish_readings:
  - Y todo Israel y todo Egipto guardaron duelo por él
  - Y toda Israel y toda Egipto lo lamentaron
  rationale: El texto presenta una reacción colectiva amplia, no una afirmación doctrinal. La traducción preserva ese alcance sin introducir matices adicionales.
  doctrine_reference: Narrativa histórica / lamento funerario colectivo
translation_notes:
  revision_awareness: La revisión más reciente indica que no se requieren cambios y que el texto quedó sin modificaciones; por tanto, la propuesta española sigue de cerca el sentido del griego y la lectura inglesa auditada.
  spanish_consistency_notes:
  - Se mantiene «todo Israel» y «todo Egipto» para conservar el paralelismo con el original.
  - Se usa un español sobrio y publicable, sin añadir elementos ausentes del griego.
  - No se introduce nota textual porque el material auditado no reporta variantes relevantes para este versículo.
