  text: Οἶδα ⌜γὰρ⌉¹ ὅτι μετὰ *τὴν τελευτήν μου² οἱ Αἰγύπτιοι θλίψουσιν³ ὑμᾶς⁴, ἀλλ᾽ ὁ Θεὸς⁵ ποιήσει τὴν ἐκδίκησιν ὑμῶν⁶ καὶ ἐπάξει⁷ ὑμᾶς εἰς *τὰς ἐπαγγελίας⁸ τῶν πατέρων ὑμῶν⁹.
