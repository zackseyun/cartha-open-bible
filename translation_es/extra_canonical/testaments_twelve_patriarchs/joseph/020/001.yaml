base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/020/001.yaml
  text: For I know that after my death the Egyptians will oppress you, but God will execute your vengeance and bring you into the promises of your fathers.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:46Z'
    unchanged: false
    changes_summary: Changed 'carry out' to the more formal 'execute' for ἐκδίκησιν, and removed 'back' since it is not expressed in the Greek. Retained 'promises' for ἐπαγγελίας.
translation:
  language: es
  text: Porque sé que después de mi muerte los egipcios los oprimirán, pero Dios ejecutará su venganza y los introducirá en las promesas de sus padres.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: μετὰ τὴν τελευτήν μου
  english_pob_choice: after my death
  chosen_spanish: después de mi muerte
  alternatives_spanish:
  - tras mi muerte
  - después de que muera
  lexicon: μετά + τελευτή
  rationale: La construcción indica posterioridad temporal respecto a la muerte de José; «después de mi muerte» es natural, fiel y suficientemente literal sin sonar arcaica.
- source_word: θλίψουσιν
  english_pob_choice: will oppress
  chosen_spanish: oprimirán
  alternatives_spanish:
  - afligirán
  - harán sufrir
  lexicon: θλίβω
  rationale: El verbo expresa presión/aflicción con fuerza de opresión. «Oprimirán» conserva bien la carga de abuso y coincide con la elección inglesa.
- source_word: ποιήσει τὴν ἐκδίκησιν ὑμῶν
  english_pob_choice: will execute your vengeance
  chosen_spanish: ejecutará su venganza
  alternatives_spanish:
  - hará justicia por ustedes
  - llevará a cabo su venganza
  lexicon: ἐκδίκησις
  rationale: La revisión inglesa pasó de una formulación más general a «execute», y en español «ejecutará» mantiene el matiz formal/jurídico. Se prefirió «su venganza» porque el pronombre posesivo refleja el genitivo plural del original y preserva la formulación directa del texto.
- source_word: ἐπάξει
  english_pob_choice: will bring
  chosen_spanish: los introducirá
  alternatives_spanish:
  - los traerá
  - los conducirá
  lexicon: ἐπάγω
  rationale: En contexto el verbo no es solo mover físicamente sino introducir o hacer entrar a un destino prometido. «Introducirá» comunica bien la llegada a un ámbito de promesa sin añadir «de vuelta», que la revisión inglesa eliminó por no estar en el griego.
- source_word: τὰς ἐπαγγελίας
  english_pob_choice: the promises
  chosen_spanish: las promesas
  alternatives_spanish:
  - las promesas hechas
  - las promesas pactadas
  lexicon: ἐπαγγελία
  rationale: Se mantiene «promesas» como en la audit trail inglesa y porque el plural griego apunta a un conjunto de promesas divinas vinculadas a los padres.
- source_word: τῶν πατέρων ὑμῶν
  english_pob_choice: of your fathers
  chosen_spanish: de sus padres
  alternatives_spanish:
  - de vuestros padres
  - de sus antepasados
  lexicon: πατήρ
  rationale: «Sus» evita el voseo explícito y mantiene un español amplio y eclesialmente legible. «Padres» conserva el lenguaje bíblico tradicional sin reemplazarlo por una paráfrasis más general.
theological_decisions:
- issue: Forma de la retribución divina
  english_pob_reading: God will execute your vengeance
  chosen_spanish_reading: Dios ejecutará su venganza
  alternative_spanish_readings:
  - Dios hará justicia por ustedes
  - Dios llevará a cabo su venganza
  rationale: El griego habla de ἐκδίκησις, retribución/vindicación, no solo de castigo. «Ejecutará su venganza» conserva la tensión entre vindicación y retribución que la edición inglesa decidió no suavizar.
  doctrine_reference: Retribución divina y vindicación del pueblo en lenguaje bíblico de justicia
- issue: Destino prometido para los patriarcas
  english_pob_reading: bring you into the promises of your fathers
  chosen_spanish_reading: los introducirá en las promesas de sus padres
  alternative_spanish_readings:
  - los llevará a las promesas de sus padres
  - los hará entrar en las promesas de sus padres
  rationale: El plural «promesas» se mantiene porque el original pluraliza ἐπαγγελίας. «Introducirá» evita una lectura demasiado espacial o repetitiva y conserva la idea de incorporación a un ámbito de promesa heredada.
  doctrine_reference: Promesa del pacto y herencia patriarcal
translation_notes:
  revision_awareness: 'La revisión inglesa reciente corrigió «carry out» a «execute» para ἐκδίκησις y eliminó «back» porque no está en el griego. La traducción española sigue esa revisión: usa «ejecutará» y no añade ninguna idea de retorno; también conserva «promesas» para ἐπαγγελίας.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para ὁ Θεός, conforme al estándar del proyecto.
  - Se conserva el plural «promesas» para ἐπαγγελίας, evitando singularizarlo.
  - No se añade ninguna nota de pie porque no hay variante textual o ambigüedad española que requiera anclaje explícito en este versículo.
