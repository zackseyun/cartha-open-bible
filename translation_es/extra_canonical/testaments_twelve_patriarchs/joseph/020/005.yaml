translation:
  language: es
  text: Y vosotros llevaréis mis huesos con vosotros. Porque cuando mis huesos sean llevados allá, Yahvé estará con vosotros en luz, y Belial estará con los egipcios en tinieblas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: συνανοίσετε
  english_pob_choice: carry up ... with you
  chosen_spanish: llevaréis ... con vosotros
  alternatives_spanish:
  - subiréis ... con vosotros
  - transportaréis ... con vosotros
  lexicon: συναναφέρω / συνανοίγω (contexto de llevar consigo hacia arriba)
  rationale: El griego expresa la acción de llevar los huesos consigo en el ascenso/salida. 'Llevaréis' comunica la obligación y el movimiento sin sonar mecánico; 'con vosotros' preserva el valor acompañante de μεθ᾽ ὑμῶν.
- source_word: τὰ ὀστᾶ μου
  english_pob_choice: my bones
  chosen_spanish: mis huesos
  alternatives_spanish:
  - mis osamentos
  - mis restos
  lexicon: ὀστέα
  rationale: '''Huesos'' es la correspondencia natural y directa en español para ὀστᾶ, y mantiene el lenguaje concreto del juramento funerario.'
- source_word: Κύριος
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  lexicon: κύριος (referencia al nombre divino en contexto de alianza)
  rationale: Siguiendo el criterio del proyecto, se expone el nombre divino como 'Yahvé' en vez de mascarlo con 'el Señor', porque el contexto contrasta la presencia divina con Belial y apunta al nombre sagrado.
- source_word: ἐν φωτὶ
  english_pob_choice: in light
  chosen_spanish: en luz
  alternatives_spanish:
  - en la luz
  - con luz
  lexicon: φῶς
  rationale: '''En luz'' reproduce de manera sobria la construcción preposicional y conserva la fuerza simbólica de la contraposición con ''tinieblas''.'
- source_word: Βελίαρ
  english_pob_choice: Beliar
  chosen_spanish: Belial
  alternatives_spanish:
  - Beliar
  lexicon: Βελιάρ / Βελίαρ
  rationale: '''Belial'' es la forma más reconocible en español y mantiene la referencia al adversario escatológico sin alterar el nombre propio tradicional del texto.'
- source_word: ἐν σκότει
  english_pob_choice: in darkness
  chosen_spanish: en tinieblas
  alternatives_spanish:
  - en oscuridad
  - en la oscuridad
  lexicon: σκότος
  rationale: '''Tinieblas'' conserva el registro bíblico y la antítesis luminosa del pasaje mejor que ''oscuridad''.'
theological_decisions:
- issue: Presencia divina frente a poder adversario
  english_pob_reading: the Lord will be with you in light, and Beliar will be with the Egyptians in darkness
  chosen_spanish_reading: Yahvé estará con vosotros en luz, y Belial estará con los egipcios en tinieblas
  alternative_spanish_readings:
  - el Señor estará con vosotros en la luz, y Beliar estará con los egipcios en la oscuridad
  - Yahvé estará con vosotros con luz, y Belial con los egipcios en tinieblas
  rationale: La frase conserva la oposición teológica explícita entre la presencia de Yahvé y la esfera de Belial. Se evita diluir la antítesis con perífrasis interpretativas y se mantiene el paralelo espacial/simbólico del griego.
  doctrine_reference: dualismo moral/apocalíptico del Testamento de José
translation_notes:
  revision_awareness: 'Se siguió el contexto auditado del inglés POB: se mantuvo la idea de llevar los huesos ''with you'' y se tradujo el contraste final de manera directa y formal, sin añadir elementos no presentes en el griego.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' conforme al estándar del proyecto para Κύριος en contexto de nombre divino.
  - Se mantiene 'Belial' como nombre propio coherente con la tradición textual y la oposición con Yahvé.
  - La sintaxis española preserva la secuencia condicional y explicativa del griego sin sobreexplicarla.
