base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/020/005.yaml
  text: And you shall carry up my bones with you. For when my bones are taken up there, the Lord will be with you in light, and Beliar will be with the Egyptians in darkness.
