  rationale: Converted vosotros forms to ustedes forms for Latin-American Spanish consistency. Changed 'Yahvé' to 'el Señor' for consistency with 20:2 (same verse) and with the EN 'the Lord'. Changed 'Belial' to 'Beliar' to match source form Βελίαρ and 20:2.
