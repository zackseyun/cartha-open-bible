translation:
  language: es
  text: Y en la salida de los hijos de Israel de Egipto recogieron los huesos de José, y lo sepultaron en Hebrón con sus padres; y los años de su vida fueron ciento diez años.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐξόδου / ἐν τῇ ἐξόδῳ
  english_pob_choice: in the exodus
  chosen_spanish: en la salida
  alternatives_spanish:
  - en el éxodo
  - en la partida
  lexicon: ἔξοδος
  rationale: El griego describe la salida de Israel de Egipto. En español, «salida» comunica el movimiento histórico sin introducir de antemano el matiz técnico-litúrgico de «Éxodo»; como no hay nota inglesa que fuerce el término tradicional, esta opción mantiene la referencia clara y directa.
- source_word: συνήγαγον
  english_pob_choice: they gathered up
  chosen_spanish: recogieron
  alternatives_spanish:
  - juntaron
  - reunieron
  lexicon: συνάγω
  rationale: «Recogieron» expresa bien la acción de tomar y reunir los huesos para transportarlos o sepultarlos, sin sonar demasiado abstracto en español.
- source_word: τὰ ὀστᾶ Ἰωσήφ
  english_pob_choice: the bones of Joseph
  chosen_spanish: los huesos de José
  alternatives_spanish:
  - los restos de José
  - los huesos de José
  lexicon: ὀστέα
  rationale: Se conserva la referencia concreta a los huesos, que coincide con el griego y con la formulación inglesa. «Restos» sería más general y suavizaría la imagen corporal.
- source_word: ἔθαψαν
  english_pob_choice: buried
  chosen_spanish: sepultaron
  alternatives_spanish:
  - enterraron
  - lo enterraron
  lexicon: θάπτω
  rationale: «Sepultaron» mantiene un registro solemne y adecuado al contexto funerario. En español, es plenamente natural y conserva la dignidad del acto.
- source_word: Χεβρών
  english_pob_choice: Hebron
  chosen_spanish: Hebrón
  alternatives_spanish:
  - Hebrón
  lexicon: Χεβρών
  rationale: Se usa la forma española habitual del topónimo bíblico.
- source_word: πατέρων αὐτοῦ
  english_pob_choice: with his fathers
  chosen_spanish: con sus padres
  alternatives_spanish:
  - con sus padres
  - con sus antepasados
  lexicon: πατήρ
  rationale: El griego permite la idea de antepasados, pero la traducción inglesa eligió «fathers». En español, «con sus padres» reproduce la formulación heredada y es inteligible, aunque puede sugerir padres inmediatos; «antepasados» aclararía el sentido, pero se aleja un poco más de la forma recibida.
- source_word: ἐγένοντο δὲ τὰ ἔτη τῆς ζωῆς αὐτοῦ ἔτη ἑκατὸν δέκα
  english_pob_choice: and the years of his life were one hundred and ten years
  chosen_spanish: y los años de su vida fueron ciento diez años
  alternatives_spanish:
  - y los años de su vida fueron ciento diez
  - y vivió ciento diez años
  lexicon: γίνομαι + ἔτη
  rationale: Se conserva la estructura declarativa del griego y de la versión inglesa. Aunque en español «fueron ciento diez años» puede parecer redundante con «años de su vida», la repetición refleja el original; no se simplifica para no perder la cadencia source-grounded.
theological_decisions:
- issue: Referencia a la salida de Israel de Egipto
  english_pob_reading: And in the exodus of the sons of Israel from Egypt
  chosen_spanish_reading: Y en la salida de los hijos de Israel de Egipto
  alternative_spanish_readings:
  - Y en el éxodo de los hijos de Israel de Egipto
  - Y cuando los hijos de Israel salieron de Egipto
  rationale: No hay tensión doctrinal especial, pero sí una decisión terminológica. «Éxodo» puede sonar más técnico y bíblico; «salida» sigue con precisión el hecho histórico sin imponer una etiqueta tradicional donde el griego simplemente dice «salida».
  doctrine_reference: Ninguna; decisión terminológica y de registro.
translation_notes:
  revision_awareness: La revisión más reciente indica que no se requirieron cambios. Por eso el español sigue de cerca el texto griego y la solución inglesa POB, sin introducir ajustes interpretativos adicionales.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico sobrio y claro, sin arcaísmos innecesarios.
  - Se preserva la repetición final de «años» para reflejar la estructura del original.
  - 'Los nombres propios siguen las formas castellanas habituales: José, Hebrón.'
