translation:
  language: es
  text: Y ustedes llevarán mis huesos con ustedes. Porque cuando mis huesos sean llevados allí, el Señor estará con ustedes en luz, y Beliar estará con los egipcios en tinieblas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: συνανοίσετε
  english_pob_choice: shall carry up
  chosen_spanish: llevarán
  alternatives_spanish:
  - subirán con
  - transportarán
  lexicon: σύναναφέρω
  rationale: El verbo compuesto implica llevar consigo hacia arriba; en español, «llevarán» comunica de forma natural la acción de trasladar los huesos con ellos sin forzar una construcción pesada. El contexto ya expresa el movimiento ascendente con «serán llevados allí» en la cláusula siguiente.
- source_word: τὰ ὀστᾶ μου
  english_pob_choice: my bones
  chosen_spanish: mis huesos
  alternatives_spanish:
  - mis restos
  - mis osamentas
  lexicon: ὀστέον
  rationale: «Huesos» es la correspondencia directa y transparente; mantiene la concreción corporal del texto y evita una paráfrasis más vaga como «restos».
- source_word: Κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  - el Dueño
  lexicon: κύριος
  rationale: Aunque el proyecto suele usar «Yahvé» para el nombre divino, aquí el griego ofrece κύριος en una fórmula que la POB inglesa conserva como «the Lord». En español, «el Señor» respeta mejor esa forma auditada y la resonancia titulativa del pasaje sin afirmar de manera no explícita una sustitución adicional.
- source_word: ἐν φωτὶ
  english_pob_choice: in light
  chosen_spanish: en luz
  alternatives_spanish:
  - en la luz
  - con luz
  lexicon: φῶς
  rationale: Se conserva la preposición y el sustantivo de modo directo, porque la oposición con «en tinieblas» es estructural en el versículo. «En luz» mantiene la simetría y el valor simbólico del contraste.
- source_word: Βελίαρ
  english_pob_choice: Beliar
  chosen_spanish: Beliar
  alternatives_spanish:
  - Belial
  lexicon: Βελιάρ
  rationale: Se mantiene la forma propia documentada en la fuente griega y en la POB inglesa. Cambiar a «Belial» introduciría una normalización no presente en el texto base.
- source_word: ἐν σκότει
  english_pob_choice: in darkness
  chosen_spanish: en tinieblas
  alternatives_spanish:
  - en oscuridad
  - en la oscuridad
  lexicon: σκότος
  rationale: «Tinieblas» preserva el registro bíblico y la oposición intensa con «luz». Además, en español suena más natural en este paralelismo que «en oscuridad».
theological_decisions:
- issue: Destino de los huesos de José como señal de la presencia divina futura
  english_pob_reading: And you shall carry up my bones with you. For when my bones are taken up there, the Lord will be with you in light, and Beliar will be with the Egyptians in darkness.
  chosen_spanish_reading: Y ustedes llevarán mis huesos con ustedes. Porque cuando mis huesos sean llevados allí, el Señor estará con ustedes en luz, y Beliar estará con los egipcios en tinieblas.
  alternative_spanish_readings:
  - '...cuando mis huesos suban allí...'
  - '...cuando mis huesos sean levantados allí...'
  rationale: 'La redacción mantiene el vínculo causal entre el traslado de los huesos y la futura presencia/ausencia contrastiva: Yahvé con Israel en luz, Beliar con Egipto en tinieblas. No se suaviza la oposición espiritual ni se reemplaza por una explicación meramente histórica.'
  doctrine_reference: Providencia y contraste luz/tinieblas; tipología del éxodo y oposición entre Yahvé y Beliar.
translation_notes:
  revision_awareness: Se corrigió la validación anterior eliminando todo marcador de nota al pie para evitar pies de nota sin anclaje en el texto. El texto español sigue de cerca la lectura griega y coincide sustancialmente con la formulación auditada en inglés.
  spanish_consistency_notes:
  - Se mantuvo «el Señor» para κύριος conforme al flujo auditado del inglés POB.
  - Se preservó «Beliar» como nombre propio y «tinieblas» como contraparte de «luz» para conservar el paralelismo semántico.
  - El texto evita arcaísmos innecesarios y conserva una sintaxis clara y publicable en español.
