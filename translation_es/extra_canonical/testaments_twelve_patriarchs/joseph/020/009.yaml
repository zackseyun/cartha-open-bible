base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/020/009.yaml
  text: And after saying these things, he stretched out his feet and fell asleep in a beautiful sleep.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:57Z'
    unchanged: false
    changes_summary: Adjusted the opening participle to a more natural English temporal clause while preserving the source meaning; retained the rest as accurate and complete.
translation:
  language: es
  text: Y cuando hubo dicho estas cosas, extendió sus pies y se durmió en un sueño hermoso.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ταῦτα εἰπών
  english_pob_choice: having said these things / when he had said these things
  chosen_spanish: cuando hubo dicho estas cosas
  alternatives_spanish:
  - después de decir estas cosas
  - y al decir estas cosas
  lexicon: ταῦτα; λέγω
  rationale: La construcción griega temporal se rinde mejor en español con una cláusula temporal natural. «Cuando hubo dicho» conserva la anterioridad del dicho respecto del dormir sin sonar mecánico.
- source_word: ἐκτείνας τοὺς πόδας αὐτοῦ
  english_pob_choice: he stretched out his feet
  chosen_spanish: extendió sus pies
  alternatives_spanish:
  - estiró sus pies
  - alargó sus pies
  lexicon: ἐκτείνω; πούς
  rationale: Se mantiene la imagen concreta del gesto. «Extendió» es más natural y digno en español que un calco más físico como «estiró».
- source_word: ἐκοιμήθη
  english_pob_choice: fell asleep
  chosen_spanish: se durmió
  alternatives_spanish:
  - se quedó dormido
  - cayó dormido
  lexicon: κοιμάομαι
  rationale: El verbo griego puede expresar simplemente dormirse. En español, «se durmió» comunica el hecho sin añadir matices no presentes en el texto.
- source_word: ὕπνῳ καλῷ
  english_pob_choice: in a beautiful sleep
  chosen_spanish: en un sueño hermoso
  alternatives_spanish:
  - en un buen sueño
  - en un sueño bueno
  lexicon: ὕπνος; καλός
  rationale: Se conserva la rareza poética de la expresión griega. «Hermoso» refleja bien καλός sin convertirlo en una explicación interpretativa.
theological_decisions:
- issue: Sentido de la fórmula final del sueño
  english_pob_reading: beautiful sleep
  chosen_spanish_reading: sueño hermoso
  alternative_spanish_readings:
  - sueño bueno
  - sueño apacible
  rationale: El texto fuente no explicita una doctrina sobre muerte, sino una formulación literaria sobre el dormir. Mantener «hermoso» deja abierta la fuerza poética del griego.
  doctrine_reference: None explicit in this verse; literary/poetic diction
translation_notes:
  revision_awareness: The English audit trail revised the opening from a participial wording to a more natural temporal clause while preserving the source sense. The Spanish follows that same temporal resolution with «cuando hubo dicho estas cosas».
  spanish_consistency_notes:
  - Se mantiene un español sobrio y publicable, evitando arcaísmos innecesarios.
  - No se introducen notas de pie porque el pasaje no presenta variantes textuales o ambigüedades doctrinales que requieran anclaje explícito en el texto español.
