lexical_decisions:
- source_word: βασιλεία
  english_pob_choice: kingdom
  chosen_spanish: reino
  alternatives_spanish:
  - reinado
  - realeza
  lexicon: βασιλεία
  rationale: En este contexto escatológico y dinástico, «reino» comunica de forma natural la esfera y duración del gobierno; mantiene la correspondencia con el inglés POB y evita una abstracción excesiva.
- source_word: αἰώνιος
  english_pob_choice: eternal
  chosen_spanish: eterno
  alternatives_spanish:
  - perpetuo
  - para siempre
  lexicon: αἰώνιος
  rationale: «Eterno» es el equivalente directo y sobrio en español para una duración sin fin; conserva la fuerza del adjetivo griego sin expandirlo innecesariamente.
- source_word: οὐ παρελεύσεται
  english_pob_choice: will not pass away
  chosen_spanish: no pasará
  alternatives_spanish:
  - no desaparecerá
  - no se acabará
  lexicon: παρέρχομαι
  rationale: La negativa futura breve «no pasará» reproduce con naturalidad la idea de no cesar o no desaparecer, manteniendo la concisión del griego y del inglés POB.
theological_decisions:
- issue: Duración indefinida del reino
  english_pob_reading: an eternal kingdom, which will not pass away
  chosen_spanish_reading: un reino eterno, que no pasará
  alternative_spanish_readings:
  - un reino para siempre, que no desaparecerá
  - un reino perpetuo, que no se acabará
  rationale: El texto afirma la permanencia absoluta del reino de Dios/rey referido en el contexto. «Eterno» y «no pasará» preservan esa afirmación sin suavizarla ni interpretarla más allá del griego.
  doctrine_reference: Escatología del reino; permanencia del reinado divino
translation_notes:
