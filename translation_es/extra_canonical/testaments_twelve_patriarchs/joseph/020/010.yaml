  text: Y todo Israel y todo Egipto lo lloraron con gran lamento.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Καὶ ἐπένθησεν αὐτὸν πᾶς Ἰσραὴλ καὶ πᾶσα Αἴγυπτος πένθος μέγα
  english_pob_choice: And all Israel and all Egypt mourned him with great mourning.
  chosen_spanish: Y todo Israel y todo Egipto lo lloraron con gran lamento.
  alternatives_spanish:
  - Y todo Israel y todo Egipto lo lamentaron con gran duelo.
  - Y todo Israel y todo Egipto hizo duelo por él con gran duelo.
  lexicon: ἐπενθέω; πένθος
  rationale: Conservo el doble paralelismo del griego y del inglés POB, pero en español prefiero «lloraron» para expresar el duelo intenso de forma natural y pública, y «gran lamento» para mantener la repetición enfática de πένθος μέγα sin sonar artificial. El objeto pronominal «lo» refleja que el llanto es por José, como en el contexto inmediato.
- source_word: πᾶς / πᾶσα
  english_pob_choice: all
  chosen_spanish: todo
  alternatives_spanish:
  - todo el
  - cada
  lexicon: πᾶς
  rationale: «Todo» reproduce el valor inclusivo de πᾶς/πᾶσα con un español fluido y mantiene el paralelismo entre Israel y Egipto.
- source_word: Ἰσραήλ / Αἴγυπτος
  english_pob_choice: Israel / Egypt
  chosen_spanish: Israel / Egipto
  alternatives_spanish:
  - el pueblo de Israel / Egipto
  lexicon: nombres propios
  rationale: Se conservan los nombres propios tal como corresponden en español bíblico estándar, sin añadir explicaciones que el texto no exige.
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  - le
  lexicon: pronombre de objeto directo
  rationale: «Lo» es la forma más directa y natural en español para el objeto directo masculino singular y preserva la referencia a José.
- source_word: πένθος μέγα
  english_pob_choice: with great mourning
  chosen_spanish: con gran lamento
  alternatives_spanish:
  - con gran duelo
  - con gran pesar
  lexicon: πένθος
  rationale: «Lamento» mantiene el campo semántico del duelo sin forzar una expresión demasiado repetitiva. «Gran» conserva μέγα con sencillez y solemnidad.
theological_decisions:
- issue: Expresión del duelo comunitario universal
  english_pob_reading: And all Israel and all Egypt mourned him with great mourning.
  chosen_spanish_reading: Y todo Israel y todo Egipto lo lloraron con gran lamento.
  alternative_spanish_readings:
  - Y todo Israel y todo Egipto lo lamentaron con gran duelo.
  - Y todo Israel y todo Egipto hicieron duelo por él con gran duelo.
  rationale: El versículo presenta una respuesta de duelo amplia y conjunta de Israel y Egipto. No se introduce una interpretación adicional; se conserva el alcance colectivo y la intensidad del luto.
  doctrine_reference: Ninguna; observación literaria y contextual.
translation_notes:
  revision_awareness: The latest revision pass reported no changes needed; this Spanish draft follows the stable Greek source and the established English POB rendering without introducing new textual claims.
  spanish_consistency_notes:
  - Se mantiene «Israel» y «Egipto» como nombres propios consistentes con el registro bíblico español.
  - Se evita «SEÑOR» u այլ terminología no pertinente porque el versículo no contiene el nombre divino.
  - «Lloraron» se usa como equivalente idiomático de duelo intenso, no como sustituto de un rito funerario específico.
