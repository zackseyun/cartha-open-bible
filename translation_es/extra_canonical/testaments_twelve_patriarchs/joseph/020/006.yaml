translation:
  language: es
  text: Y después de decir estas cosas, extendió los pies y se durmió en un sueño hermoso.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Καὶ ταῦτα εἰπών
  english_pob_choice: And after saying these things
  chosen_spanish: Y después de decir estas cosas
  alternatives_spanish:
  - Y habiendo dicho estas cosas
  - Y tras decir estas cosas
  lexicon: καὶ / ταῦτα / εἰπών
  rationale: Conserva la relación temporal de la frase griega sin forzar un calco pesado. "Después de decir" refleja bien el participio aoristo y mantiene un español natural y publicable.
- source_word: ἐκτείνας τοὺς πόδας αὐτοῦ
  english_pob_choice: he stretched out his feet
  chosen_spanish: extendió los pies
  alternatives_spanish:
  - estiró los pies
  - alargó los pies
  lexicon: ἐκτείνω / πούς
  rationale: '"Extendió" corresponde al gesto físico de extender o alargar las piernas/pies y evita una expresión demasiado coloquial. Se conserva el plural "pies" como en el griego.'
- source_word: ἐκοιμήθη
  english_pob_choice: fell asleep
  chosen_spanish: se durmió
  alternatives_spanish:
  - quedó dormido
  - se quedó dormido
  lexicon: κοιμάομαι
  rationale: El verbo griego de dormir permite un español directo. "Se durmió" comunica el ingreso al sueño sin añadir una idea de caída que no está explícita en el griego.
- source_word: ὕπνῳ καλῷ
  english_pob_choice: in a beautiful sleep
  chosen_spanish: en un sueño hermoso
  alternatives_spanish:
  - en un sueño apacible
  - en un sueño agradable
  lexicon: ὕπνος / καλός
  rationale: Se conserva la valoración estética/positiva del adjetivo καλός con "hermoso" porque la fuente no sugiere necesariamente "pacífico" o "tranquilo". La expresión es literal y a la vez inteligible en español.
theological_decisions:
- issue: Valor de καλός en la expresión del sueño
  english_pob_reading: beautiful sleep
  chosen_spanish_reading: sueño hermoso
  alternative_spanish_readings:
  - sueño apacible
  - sueño agradable
  rationale: El texto no introduce una doctrina ni una imagen técnica; solo describe el sueño con un adjetivo valorativo. Mantener "hermoso" preserva la fuerza semántica de καλός sin suavizarla hacia una interpretación más interpretativa.
  doctrine_reference: No doctrinal issue; lexical/poetic evaluation only.
translation_notes:
  revision_awareness: Se siguió el texto griego aportado y la traducción inglesa POB actual, que no presenta notas ni revisiones para este versículo. No se detectaron cambios pendientes en el historial más reciente.
  spanish_consistency_notes:
  - Se evita usar "SEÑOR" o "Cristo" porque no aparecen en este versículo.
  - Se mantiene un registro sobrio y narrativo, acorde con una sección narrativa breve.
  - No se añadió puntuación interpretativa ni glosas externas al contenido del verso.
