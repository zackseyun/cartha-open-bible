base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/005.yaml
  text: 'And again[a], at another time, she said to me, “If you do not want to commit adultery, I will kill my husband with poison and take you as my husband.”


    2 So when I heard this, I tore my garments and said to her, “Woman, fear God, and do not do this lawless and evil deed, lest you be destroyed. For know this also: I will report your scheme to everyone.”


    3 Then she[b], being afraid, begged me not to report this scheme.


    4 And she went away, trying to win me over with gifts and every kind of pleasure.'
  footnotes:
  - marker: a
    text: Greek text is somewhat rough in the clause describing the act as evil; the sense is that Joseph forbids a morally illicit and wicked deed.
    reason: textual_variant
  - marker: b
    text: Or 'she withdrew, coaxing me with gifts and all kinds of enjoyments.'
    reason: lexical_alternative
