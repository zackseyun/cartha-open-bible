translation:
  language: es
  text: 'Y de nuevo[a], en otra ocasión, ella me dijo: «Si no quieres cometer adulterio, mataré a mi marido con veneno y te tomaré a ti como esposo».


    2 Así que, cuando oí esto, rasgué mis vestiduras y le dije: «Mujer, teme a Dios, y no hagas este acto inicuo y malvado, no sea que seas destruida. Y sabe esto también: divulgaré tu plan a todos».


    3 Entonces ella[b], llena de miedo, me suplicó que no divulgara este plan.


    4 Y se fue, seduciéndome con regalos y toda clase de placeres.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El texto griego es algo áspero en la cláusula que describe el acto como malvado; el sentido es que José prohíbe un acto moralmente ilícito y perverso.
    reason: textual_variant
  - marker: b
    text: O 'se retiró, mimándome con regalos y todos los deleites'.
    reason: lexical_alternative
lexical_decisions:
- source_word: μοιχεῦσαι
  english_pob_choice: commit adultery
  chosen_spanish: cometer adulterio
  alternatives_spanish:
  - fornicar
  - acostarme contigo
  lexicon: BDAG
  rationale: El verbo denota específicamente adulterio, encajando con el contexto de mujer casada y preservando la fuerza moral y legal del relato.
- source_word: ἀνελῶ ... φαρμάκῳ
  english_pob_choice: I will kill ... with poison
  chosen_spanish: mataré ... con veneno
  alternatives_spanish:
  - eliminaré ... con drogas
  - asesinaré ... por envenenamiento
  lexicon: LSJ
  rationale: φάρμακον aquí denota veneno, no medicina ni hechicería; 'matar con veneno' es la traducción idiomática más clara.
- source_word: διέρρηξα τὰ ἱμάτιά μου
  english_pob_choice: I tore my garments
  chosen_spanish: rasgué mis vestiduras
  alternatives_spanish:
  - rasgué mi ropa
  - desgarré mis vestidos
  lexicon: LSJ
  rationale: Gesto convencional de horror o dolor. 'Vestiduras' preserva el registro elevado y la textura bíblica.
- source_word: αἰδέσθητι τὸν Θεόν
  english_pob_choice: fear God
  chosen_spanish: teme a Dios
  alternatives_spanish:
  - avergüénzate ante Dios
  - respeta a Dios
  - ten temor de Dios
  lexicon: LSJ
  rationale: Sigue la decisión final del POB tras la revisión ('fear God'); 'temer a Dios' es la fórmula bíblica estándar en español y captura el sentido reverencial.
- source_word: πρᾶξιν ταύτην τὴν πονηράν
  english_pob_choice: this lawless and evil deed
  chosen_spanish: este acto inicuo y malvado
  alternatives_spanish:
  - esta acción perversa
  - esta obra inicua
  lexicon: LSJ
  rationale: El texto griego es algo áspero, pero el sentido es de un acto moralmente ilícito. 'Inicuo y malvado' preserva tanto el matiz ético como legal.
- source_word: ἐξολοθρευθῇς
  english_pob_choice: you be destroyed
  chosen_spanish: seas destruida
  alternatives_spanish:
  - perezcas
  - seas exterminada
  lexicon: BDAG
  rationale: Advertencia fuerte de ruina/juicio. 'Ser destruida' es directa y solemne en español.
- source_word: ἐξαγγελῶ
  english_pob_choice: I will report
  chosen_spanish: divulgaré
  alternatives_spanish:
  - denunciaré
  - haré saber
  - anunciaré
  lexicon: BDAG
  rationale: José amenaza con divulgación pública. 'Divulgaré' captura el sentido social y judicial mejor que 'proclamar'.
- source_word: ἐπίνοια
  english_pob_choice: scheme
  chosen_spanish: plan
  alternatives_spanish:
  - maquinación
  - ardid
  - trama
  lexicon: LSJ
  rationale: La palabra denota una intención calculada, aquí un plan malvado. 'Plan' es legible y mantiene el matiz siniestro en contexto.
- source_word: ἐπιθάλπουσά με δώροις καὶ ἀπολαύσεσι πάσαις
  english_pob_choice: trying to win me over with gifts and every kind of pleasure
  chosen_spanish: seduciéndome con regalos y toda clase de placeres
  alternatives_spanish:
  - mimándome con regalos y todos los deleites
  - halagándome con regalos y todo placer
  lexicon: LSJ
  rationale: El participio sugiere ablandar/cautivar; 'seduciéndome' refleja la intención manipuladora en español natural mientras retiene los pares de medios.
theological_decisions:
- issue: Caracterización moral del acto propuesto por la mujer de Potifar
  chosen_reading: José lo condena explícitamente como un acto que merece juicio divino
  alternative_readings:
  - José meramente lo rechaza como socialmente peligroso
  - La advertencia es solo sobre exposición pública, no sobre rendición de cuentas ante Dios
  rationale: La invocación de Dios y la advertencia 'no sea que seas destruida' enmarcan el acto como moralmente responsable ante Dios.
  doctrine_reference: DOCTRINE.md §Translation philosophy, preserve theological weight without flattening
- issue: Fuerza de αἰδέσθητι τὸν Θεόν
  chosen_reading: Traducido como 'teme a Dios', siguiendo la revisión final del POB
  alternative_readings:
  - avergüénzate ante Dios
  - respeta a Dios
  rationale: El POB revisó 'be ashamed before God' a 'fear God' por mejor precisión léxica de αἰδέσθητι. 'Temer a Dios' es la fórmula bíblica estándar.
  doctrine_reference: DOCTRINE.md §Consistency of key terms, or documented exception
translation_notes:
  revision_awareness: El POB pasó por revisión de 'be ashamed before God' a 'fear God' para mayor precisión léxica de αἰδέσθητι τὸν Θεόν. El verso 4 también fue revisado de 'trying to win me over' a 'enticing me' (per-verso 5:4). El español refleja la decisión final.
  spanish_consistency_notes:
  - μοιχεύω → cometer adulterio (no eufemismos)
  - αἰδέομαι τὸν Θεόν → temer a Dios (en este contexto, siguiendo la revisión POB)
  - ἐπίνοια → plan/maquinación según matiz
  - Θεός → Dios
