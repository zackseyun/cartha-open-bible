source:
  edition: Charles 1908 Greek Versions (pages 256-287, Joseph pilot)
  text: '*Ἡ δὲ Μεμφὶς εἶπε τῷ ἀνδρὶ αὐτῆς¹· *Ἀγόρασον τὸν νεανίαν², ἀκούω γάρ, φησίν³, ὅτι πωλοῦσιν αὐτόν.'
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/016/001.yaml
  text: But Memphis said to her husband, “Buy the young man, for I hear,” she says, “that they are selling him.”
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:56:07Z'
    unchanged: false
    changes_summary: Adjusted the wording to account for φησίν ('she says') and rendered αὐτόν as 'him' rather than repeating 'the young man,' which is more natural while preserving the referent.
translation:
  language: es
  text: 'Pero Memphis dijo a su marido: «Compra al joven, porque oigo», dice ella, «que lo están vendiendo».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἡ δὲ Μεμφὶς
  english_pob_choice: But Memphis
  chosen_spanish: Pero Memphis
  alternatives_spanish:
  - Y Memphis
  - Mas Memphis
  lexicon: Μεμφίς
  rationale: Conservo el nombre propio tal como aparece en el griego y la conexión adversativa con δέ mediante «pero», que funciona de modo natural en español para introducir la continuidad narrativa con contraste leve.
- source_word: εἶπε τῷ ἀνδρὶ αὐτῆς
  english_pob_choice: said to her husband
  chosen_spanish: dijo a su marido
  alternatives_spanish:
  - le dijo a su marido
  - habló con su marido
  lexicon: λέγω
  rationale: «Dijo a su marido» reproduce la relación básica del dativo con un español claro y sobrio; «marido» es más idiomático que «esposo» en este registro, sin alterar el sentido.
- source_word: Ἀγόρασον τὸν νεανίαν
  english_pob_choice: Buy the young man
  chosen_spanish: Compra al joven
  alternatives_spanish:
  - Compra al muchacho
  - Adquiere al joven
  lexicon: ἀγοράζω
  rationale: El imperativo «Compra» refleja el valor comercial de ἀγόρασον. «Al joven» conserva el objeto personal del griego con español natural; «muchacho» sería posible, pero «joven» mantiene el tono del texto fuente.
- source_word: ἀκούω γάρ
  english_pob_choice: for I hear
  chosen_spanish: porque oigo
  alternatives_spanish:
  - pues oigo
  - porque he oído
  lexicon: ἀκούω
  rationale: «Porque oigo» sigue de cerca el presente del griego y mantiene la inmediatez de la razón dada. Aunque «he oído» sería más idiomático en algunos contextos, aquí el presente enfatiza la información recibida de manera actual.
- source_word: φησίν
  english_pob_choice: she says
  chosen_spanish: dice ella
  alternatives_spanish:
  - dice
  - añade ella
  lexicon: φημί
  rationale: Conservo la marca explícita de discurso directo reportado en el griego. «Dice ella» reproduce la función de φησίν sin ocultar la voz intradiscursiva; la inversión evita ambigüedad en español.
- source_word: ὅτι πωλοῦσιν αὐτόν
  english_pob_choice: that they are selling him
  chosen_spanish: que lo están vendiendo
  alternatives_spanish:
  - que lo venden
  - que están vendiéndolo
  lexicon: πωλέω
  rationale: «Lo están vendiendo» transmite el presente progresivo de πωλοῦσιν de manera natural en español y mantiene el referente masculino singular de αὐτόν con «lo», como ajustó la revisión inglesa al evitar repetir «el joven».
theological_decisions:
- issue: Presencia de la voz parentética φησίν dentro del discurso directo
  english_pob_reading: “I hear,” she says, “that they are selling him.”
  chosen_spanish_reading: «porque oigo», dice ella, «que lo están vendiendo»
  alternative_spanish_readings:
  - «porque oigo», dice, «que lo están vendiendo»
  - «porque, dice ella, oigo que lo están vendiendo»
  rationale: 'Aunque el pasaje no presenta una tensión doctrinal fuerte, sí conserva una estructura narrativa relevante: el griego inserta φησίν para señalar explícitamente el cambio de voz. Mantengo esa marca en español para no borrar un rasgo auditable del texto fuente.'
  doctrine_reference: No aplica; decisión de discurso y forma narrativa.
translation_notes:
  revision_awareness: La revisión inglesa más reciente ajustó el texto para reflejar φησίν ('she says') y para usar 'him' en lugar de repetir 'the young man'. La versión española sigue esa misma decisión, conservando la inserción de «dice ella» y el pronombre directo «lo» para αὐτόν, sin volver a repetir «el joven» en la segunda cláusula.
  spanish_consistency_notes:
  - Uso «Memphis» como nombre propio transliterado, sin adaptar ni traducir.
  - Mantengo un registro narrativo sobrio y cercano al griego, evitando ampliar el sentido de ἀκούω o πωλοῦσιν más allá de lo necesario.
  - La colocación de comillas y comas sigue el español estándar para discurso directo intercalado.
  - No introduzco terminología cristiana técnica porque el versículo no la requiere.
