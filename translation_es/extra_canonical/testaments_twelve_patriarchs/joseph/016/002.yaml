source:
  edition: Charles 1908 Greek Versions (pages 256-287, Joseph pilot)
  text: Εὐθέως δὲ ἀπέστειλεν εὐνοῦχον ἐν τοῖς Ἰσμαϊλίταις, αἰτοῦσά με εἰς διάπρασιν.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/016/002.yaml
  text: So she immediately sent a eunuch among the Ishmaelites, asking for me to be sold.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:36Z'
    unchanged: false
    changes_summary: Revised 'to the Ishmaelites' to 'among the Ishmaelites' to reflect ἐν τοῖς Ἰσμαϊλίταις more naturally, and changed 'asking that I be sold to her' to 'asking for me to be sold' because the Greek does not explicitly include 'to her.'
translation:
  language: es
  text: Y enseguida envió un eunuco entre los ismaelitas, pidiendo que yo fuera vendido.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Εὐθέως
  english_pob_choice: immediately
  chosen_spanish: enseguida
  alternatives_spanish:
  - inmediatamente
  - de inmediato
  lexicon: εὐθέως
  rationale: Conserva la inmediatez del adverbio griego con un español natural y fluido; 'enseguida' comunica prontitud sin sonar rígido.
- source_word: ἀπέστειλεν
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: ἀποστέλλω
  rationale: '''Envió'' refleja el acto de enviar sin añadir matices de autoridad o urgencia que ''mandó'' podría sugerir.'
- source_word: εὐνοῦχον
  english_pob_choice: eunuch
  chosen_spanish: eunuco
  alternatives_spanish:
  - oficial de la corte
  - sirviente
  lexicon: εὐνοῦχος
  rationale: Se conserva el término técnico y social 'eunuco', que es el equivalente directo y mantiene la especificidad del texto fuente.
- source_word: ἐν τοῖς Ἰσμαϊλίταις
  english_pob_choice: among the Ishmaelites
  chosen_spanish: entre los ismaelitas
  alternatives_spanish:
  - en medio de los ismaelitas
  - among the Ishmaelites
  lexicon: ἐν + dativo
  rationale: '''Entre'' reproduce naturalmente la localización relacional de ἐν con el dativo plural, tal como la revisión inglesa corrigió ''to the Ishmaelites'' a ''among the Ishmaelites''.'
- source_word: αἰτοῦσά με
  english_pob_choice: asking for me
  chosen_spanish: pidiendo que yo
  alternatives_spanish:
  - solicitando que yo
  - pidiendo por mí
  lexicon: αἰτέω
  rationale: El participio expresa una petición; en español, 'pidiendo que yo' permite completar el complemento verbal de forma clara y fiel al sentido.
- source_word: εἰς διάπρασιν
  english_pob_choice: for me to be sold
  chosen_spanish: fuera vendido
  alternatives_spanish:
  - ser vendido
  - pusieran a la venta
  lexicon: διάπρασις
  rationale: '''Fuera vendido'' conserva la pasiva pedida por el contexto y evita introducir un destinatario inexistente; mantiene el valor de venta/compraventa del sustantivo verbal.'
theological_decisions:
- issue: Destino implícito de la solicitud de venta
  english_pob_reading: asking for me to be sold
  chosen_spanish_reading: pidiendo que yo fuera vendido
  alternative_spanish_readings:
  - pidiendo que me vendieran
  - pidiendo mi venta
  rationale: La griega no explicita 'a ella'; la redacción española evita añadir un objeto indirecto no atestiguado y conserva la ambigüedad controlada del texto.
  doctrine_reference: fidelidad al texto base y economía exegética
translation_notes:
  revision_awareness: La versión inglesa más reciente corrigió 'to the Ishmaelites' a 'among the Ishmaelites' y eliminó 'to her' por no estar explícito en el griego; la redacción española sigue ambas revisiones y evita añadir destinatarios no atestiguados.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico sobrio y moderno.
  - '''Eunuco'' se conserva como término técnico sin suavizarlo.'
  - No se introduce 'Cristo', 'Señor' ni equivalentes porque no aparecen en el pasaje.
