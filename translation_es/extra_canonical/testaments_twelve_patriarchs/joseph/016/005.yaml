base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/016/005.yaml
  text: So the eunuch came and gave them eighty pieces of gold and took me; but to the Egyptian woman he said, “I have given a hundred.”
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:38Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Así que el eunuco vino y, dándoles ochenta piezas de oro[a], me tomó; pero a la egipcia le dijo que había dado cien.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice 'ochenta de oro' y luego 'cien'; la denominación exacta no se especifica en el testimonio normalizado, por lo que la traducción mantiene la formulación general.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐνοῦχος
  english_pob_choice: eunuch
  chosen_spanish: eunuco
  alternatives_spanish:
  - funcionario de la corte
  lexicon: LSJ
  rationale: El término griego designa propiamente a un eunuco; mantener 'eunuco' preserva la denotación literal y no la suaviza a 'funcionario'.
- source_word: χρυσοῦς
  english_pob_choice: pieces of gold
  chosen_spanish: piezas de oro
  alternatives_spanish:
  - monedas de oro
  - áureos
  lexicon: LSJ
  rationale: La denominación exacta no se especifica en el testimonio normalizado; 'piezas de oro' conserva el sentido monetario sin precisión falsa.
- source_word: ἀνελάβετό με
  english_pob_choice: took me
  chosen_spanish: me tomó
  alternatives_spanish:
  - me recibió
  - me llevó consigo
  lexicon: LSJ
  rationale: En este contexto de venta de esclavo, 'me tomó' es el equivalente español más natural.
- source_word: Αἰγυπτίᾳ
  english_pob_choice: the Egyptian woman
  chosen_spanish: la egipcia
  alternatives_spanish:
  - la mujer egipcia
  lexicon: LSJ
  rationale: '''La egipcia'' es la forma natural en español para referirse a la dueña egipcia ya conocida en el relato.'
translation_notes:
  revision_awareness: El pase de revisión inglés no introdujo cambios en este versículo. Se mantiene el lenguaje comercial directo del griego, conforme a la decisión teológica documentada en el capítulo de no suavizar el lenguaje de venta y esclavitud.
  spanish_consistency_notes:
  - '''eunuco'' para εὐνοῦχος en todo el capítulo'
  - '''piezas de oro'' para χρυσοῦς (paralelo al ''pieces of gold'' del POB)'
