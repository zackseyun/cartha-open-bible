source:
  edition: Charles 1908 Greek Versions (pages 256-287, Joseph pilot)
  text: Ἐλθὼν οὖν ὁ εὐνοῦχος⁷ καὶ²³ δοὺς²⁴ αὐτοῖς²⁵ ὀγδοήκοντα²⁶ χρυσοῦς²⁷ *ἀνελάβετό με· τῇ δὲ Αἰγυπτίᾳ εἶπεν ὅτι δέδωκα ἑκατόν.
