lexical_decisions:
- source_word: εἰδὼς
  english_pob_choice: knowing it
  chosen_spanish: sabiéndolo
  alternatives_spanish:
  - aun sabiéndolo
  - conociendo el hecho
  lexicon: LSJ
  rationale: Participio circunstancial de οἶδα; 'sabiéndolo' es la forma castellana más natural y concisa.
- source_word: ἐσιώπησα
  english_pob_choice: kept silent
  chosen_spanish: guardé silencio
  alternatives_spanish:
  - callé
  - permanecí callado
  lexicon: LSJ
  rationale: '''Guardé silencio'' encaja con el tono testamentario elevado y conserva el silencio deliberado de José, paralelo al ''kept silent'' del POB.'
- source_word: αἰσχυνθῇ
  english_pob_choice: '(implied: be put to shame)'
  chosen_spanish: '(implícito: fuera avergonzado)'
  lexicon: LSJ
  rationale: El verbo aparece en el griego pero el POB inglés deja la oración incompleta porque el extracto griego se corta; el español refleja el mismo corte.
translation_notes:
  revision_awareness: El pase de revisión inglés no introdujo cambios. Conservo la frase incompleta deliberadamente, replicando la decisión textual del POB de no completar especulativamente el versículo donde el testimonio griego se interrumpe.
  spanish_consistency_notes:
  - '''guardé silencio'' para ἐσιώπησα'
  - Frase deliberadamente incompleta como en el inglés POB
