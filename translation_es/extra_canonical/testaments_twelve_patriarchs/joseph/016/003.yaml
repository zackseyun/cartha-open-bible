base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/016/003.yaml
  text: But the eunuch, not wishing to buy me, withdrew after testing them, and reported to his mistress that they were asking a high price for the boy.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:36Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Pero el eunuco, no queriendo comprarme, se retiró tras ponerlos a prueba, y le informó a su señora que estaban pidiendo un precio muy alto por el muchacho.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ὁ δὲ εὐνοῦχος
  english_pob_choice: But the eunuch
  chosen_spanish: Pero el eunuco
  alternatives_spanish:
  - Y el eunuco
  - Mas el eunuco
  lexicon: εὐνοῦχος
  rationale: Conservo el sujeto explícito y el contraste con δὲ mediante «Pero», natural en español y fiel al valor adversativo del griego.
- source_word: μὴ θελήσας ἀγοράσαι με
  english_pob_choice: not wishing to buy me
  chosen_spanish: no queriendo comprarme
  alternatives_spanish:
  - sin querer comprarme
  - no deseando comprarme
  lexicon: θέλω + ἀγοράζω
  rationale: La combinación expresa voluntad frustrada o negativa de compra; «no queriendo comprarme» mantiene la fuerza verbal y la referencia directa a la primera persona del relato.
- source_word: ἀνεχώρησεν πειράσας αὐτούς
  english_pob_choice: withdrew after testing them
  chosen_spanish: se retiró tras ponerlos a prueba
  alternatives_spanish:
  - se apartó después de probarlos
  - se retiró luego de examinarles
  lexicon: ἀναχωρέω + πειράζω
  rationale: «Se retiró» conserva el movimiento de salida o apartamiento; «tras ponerlos a prueba» traduce πειράσας de modo idiomático y mantiene la idea de verificación o prueba.
- source_word: δηλοῖ τῇ δεσποίνῃ αὐτοῦ
  english_pob_choice: reported to his mistress
  chosen_spanish: le informó a su señora
  alternatives_spanish:
  - lo comunicó a su señora
  - se lo informó a su ama
  lexicon: δηλόω + δεσπόινα
  rationale: El griego dice literalmente que «da a conocer» a su dueña; en español «le informó a su señora» es claro y digno. «Señora» evita el arcaísmo de «ama» y respeta el referente femenino de δεσποῖνα.
- source_word: ὅτι πολλὴν τιμὴν αἰτοῦσιν
  english_pob_choice: that they were asking a high price
  chosen_spanish: que estaban pidiendo un precio muy alto
  alternatives_spanish:
  - que pedían mucho precio
  - que exigían un precio elevado
  lexicon: τιμή + αἰτέω
  rationale: «Precio muy alto» reproduce bien el sentido económico de τιμή aquí, sin perder la idea de una exigencia considerable. El imperfecto inglés se refleja con «estaban pidiendo» para mantener el proceso en curso.
- source_word: τοῦ παιδός
  english_pob_choice: for the boy
  chosen_spanish: por el muchacho
  alternatives_spanish:
  - por el niño
  - por el joven
  lexicon: παῖς
  rationale: «Muchacho» conserva la ambigüedad etaria de παῖς mejor que «niño» y suena natural en español actual; evita cargar la escena con una edad más precisa de la que el texto ofrece.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios; por eso esta versión sigue de cerca el texto griego y la lectura inglesa auditada, sin introducir expansiones interpretativas.
  spanish_consistency_notes:
  - Mantengo «eunuco» como término técnico del relato.
  - Conservo la primera persona implícita de la fuente («comprarme»), ya que el griego incluye με.
  - Uso «señora» para δεσποῖνα en vez de «ama» por naturalidad y reverencia en español contemporáneo.
