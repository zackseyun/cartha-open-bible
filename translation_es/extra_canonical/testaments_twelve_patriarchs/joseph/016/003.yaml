  text: Ὁ δὲ εὐνοῦχος *μὴ θελήσας ἀγοράσαι με⁴ ἀνεχώρησεν πειράσας αὐτούς, καὶ δηλοῖ τῇ δεσποίνῃ αὐτοῦ, ὅτι πολλὴν τιμὴν αἰτοῦσιν τοῦ παιδός.
