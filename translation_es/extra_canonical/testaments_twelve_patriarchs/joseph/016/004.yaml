base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/016/004.yaml
  text: Then she sent another eunuch, saying, “Even if they ask two minas, pay them. Do not spare the gold. Only buy the boy and bring him to me.”
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:38Z'
    unchanged: false
    changes_summary: Changed 'pay it' to 'pay them' to better reflect the plural verb 'they ask' and the implied amount requested, while keeping the rest of the translation accurate and natural.
translation:
  language: es
  text: 'Entonces ella envió a otro eunuco, diciendo: «Aunque pidan dos minas, páguenlas. No escatimen el oro. Solo compre al muchacho y tráigamelo».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀπέστειλεν
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: ἀποστέλλω
  rationale: «Envió» reproduce con naturalidad el valor básico de mandar/enviar a una persona como agente, sin añadir matices de autoridad o urgencia no explícitos en el griego.
- source_word: εὐνοῦχον
  english_pob_choice: eunuch
  chosen_spanish: eunuco
  alternatives_spanish:
  - funcionario de palacio
  - sirviente de la corte
  lexicon: εὐνοῦχος
  rationale: Se conserva «eunuco» porque es la forma directa y auditables del término griego; el contexto no exige neutralizarlo con una perífrasis.
- source_word: μνᾶς
  english_pob_choice: minas
  chosen_spanish: minas
  alternatives_spanish:
  - mnas
  - monedas de plata
  lexicon: μνᾶ
  rationale: «Minas» mantiene la unidad monetaria antigua reconocible y corresponde al valor lexical del original; no se sustituye por una equivalencia interpretativa.
- source_word: παρέχετε
  english_pob_choice: pay them
  chosen_spanish: páguenlas
  alternatives_spanish:
  - páguenlo
  - denles eso
  lexicon: παρέχω
  rationale: El verbo griego aquí funciona en el sentido de «entregar/pagar» lo solicitado. En español, «páguenlas» conserva el plural del monto implícito y sigue la revisión inglesa que corrigió «pay it» a «pay them».
- source_word: μὴ φείσασθε χρυσίου
  english_pob_choice: Do not spare the gold
  chosen_spanish: No escatimen el oro
  alternatives_spanish:
  - No ahorren oro
  - No se reserven el oro
  lexicon: φείδομαι
  rationale: «Escatimar» expresa bien la idea de no retener ni ahorrar de manera restrictiva, con un registro natural y digno en español; «el oro» conserva el objeto directo sin forzar una especificación adicional.
- source_word: πριασάμενος
  english_pob_choice: buy
  chosen_spanish: compre
  alternatives_spanish:
  - adquiera
  - cómprelo
  lexicon: πρίαμαι
  rationale: «Compre» transmite la acción de adquisición comercial que el griego expresa. Se mantiene el valor imperativo implícito sin sobrecargarlo con una perífrasis.
- source_word: τὸν παῖδα
  english_pob_choice: the boy
  chosen_spanish: el muchacho
  alternatives_spanish:
  - el niño
  - el esclavo
  lexicon: παῖς
  rationale: «Muchacho» refleja bien el rango semántico de παῖς en este contexto narrativo y evita imponer «niño» o «esclavo» sin una necesidad clara del pasaje.
- source_word: ἄγαγε πρός με
  english_pob_choice: bring ... to me
  chosen_spanish: tráigamelo
  alternatives_spanish:
  - tráigalo a mí
  - llévemelo
  lexicon: ἄγω
  rationale: «Tráigamelo» condensa de manera natural «bring [him] to me» y conserva la orientación hacia la hablante; es idiomático en español y fiel al mandato.
theological_decisions:
- issue: Tratamiento del dinero y la compra del muchacho
  english_pob_reading: Only buy the boy and bring him to me.
  chosen_spanish_reading: Solo compre al muchacho y tráigamelo.
  alternative_spanish_readings:
  - Solo cómprelo y tráigamelo
  - Solo adquiera al muchacho y tráigamelo
  rationale: No se suaviza el contenido comercial ni el objeto de la compra; el español conserva la dureza narrativa del original y del inglés auditado.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: The English audit trail includes a revision from 'pay it' to 'pay them' to better reflect the plural request and implied amount. The Spanish draft mirrors that correction with 'páguenlas', preserving the plurality of the requested amount and the natural Spanish object agreement.
  spanish_consistency_notes:
  - Se mantiene un registro narrativo sobrio y literal donde el griego lo permite.
  - Se conserva «eunuco» como término técnico sin sustitución interpretativa.
  - Se usa imperativo de cortesía/vosotros-neutral con subjuntivo de mandato ('compre', 'tráigamelo') para reflejar una orden directa en español estándar.
  - No se añaden notas al pie porque el griego y el inglés auditado no exigen una variante textual o semántica adicional en este versículo.
