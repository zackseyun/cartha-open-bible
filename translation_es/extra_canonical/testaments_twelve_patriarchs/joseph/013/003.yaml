  text: '*Καὶ λέγει αὐτῷ ὁ Πεντεφρής¹⁸· Πόθεν ⌜οὖν⌉ *ἐστιν ὁ παῖς¹⁹ ὁ Ἑβραῖος²⁰; καὶ²¹ εἶπεν²²· Οἱ²³ Ἰσμαηλῖται παρέθεντό²⁴ μοι αὐτόν, ἕως ὅτου²⁵ ἐπιστρέψωσιν²⁶.'
