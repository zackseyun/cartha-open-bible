base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/013/003.yaml
  text: And Pentephris fell before him and said to him, “From where, then, is this Hebrew slave before me?” And he said, “The Ishmaelites entrusted him to me until they return.”
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:33Z'
    unchanged: false
    changes_summary: Changed 'fell upon him' to 'fell before him' to better reflect the Greek and more natural English. Kept the rest substantially unchanged as accurate and complete.
translation:
  language: es
  text: 'Y Pentefris se postró ante él[a] y le dijo: «¿De dónde, entonces, es este esclavo hebreo que está delante de mí?». Y él dijo: «Los ismaelitas me lo confiaron hasta que regresen».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El texto griego es difícil al inicio del versículo; el sentido es que Pentefris presiona al corredor sobre el origen de 'este esclavo hebreo' que está delante de él. El POB revisó 'fell upon him' a 'fell before him'.
    reason: textual_variant
lexical_decisions:
- source_word: λέγει αὐτῷ
  english_pob_choice: fell before him and said to him
  chosen_spanish: se postró ante él y le dijo
  alternatives_spanish:
  - se inclinó ante él y le dijo
  - se le acercó y le dijo
  lexicon: LSJ
  rationale: Sigo la rendición POB revisada que entiende un movimiento de proximidad/postración antes del discurso. El texto griego es difícil aquí; el POB cambió de 'fell upon him' a 'fell before him' por sentido más natural.
- source_word: ὁ παῖς ὁ Ἑβραῖος
  english_pob_choice: this Hebrew slave
  chosen_spanish: este esclavo hebreo
  alternatives_spanish:
  - este muchacho hebreo
  - este siervo hebreo
  lexicon: LSJ
  rationale: 'παῖς aquí en contexto servil/de propiedad; siguiendo la decisión POB de explicitar el estatus de esclavo en este interrogatorio sobre venta. Política POB: cuando la naturaleza de servidumbre es saliente, ''esclavo''.'
- source_word: παρέθεντό μοι αὐτόν
  english_pob_choice: entrusted him to me
  chosen_spanish: me lo confiaron
  alternatives_spanish:
  - me lo encomendaron
  - lo dejaron a mi cargo
  - me lo depositaron
  lexicon: LSJ
  rationale: 'παρατίθημι medio: depositar en confianza, encomendar. ''Me lo confiaron'' refleja la transacción comercial de custodia.'
- source_word: ἕως ὅτου ἐπιστρέψωσιν
  english_pob_choice: until they return
  chosen_spanish: hasta que regresen
  alternatives_spanish:
  - hasta que vuelvan
  - hasta su regreso
  lexicon: LSJ
  rationale: Cláusula temporal con subjuntivo; 'hasta que regresen' es la construcción natural en español.
translation_notes:
  revision_awareness: Sigo la revisión POB de 'fell upon him' a 'fell before him' por mejor reflejo del griego y mayor naturalidad; el español 'se postró ante él' captura el sentido de proximidad reverencial.
  spanish_consistency_notes:
  - '''corredor'' para μετάβολος (implícito por ''él'')'
  - '''esclavo hebreo'' para ὁ παῖς ὁ Ἑβραῖος'
  - '''me lo confiaron'' para παρέθεντό μοι αὐτόν'
  - '''ismaelitas'' para Ἰσμαηλῖται'
