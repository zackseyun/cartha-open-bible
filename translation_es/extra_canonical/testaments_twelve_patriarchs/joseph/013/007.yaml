translation:
  language: es
  text: 'Y dijo: «¿De quién?». Y yo dije: «De los ismaelitas».[a]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «De los ismaelitas» refleja el genitivo griego de pertenencia; también puede leerse idiomáticamente como «era de los ismaelitas».
    reason: alternative_reading
lexical_decisions:
- source_word: Καὶ λέγει· Τίνος;
  english_pob_choice: And he said, “Whose?”
  chosen_spanish: 'Y dijo: «¿De quién?»'
  alternatives_spanish:
  - 'Y dijo: «¿De quién era?»'
  - 'Y dijo: «¿De quién son?»'
  lexicon: τίνος
  rationale: El griego usa el interrogativo posesivo τίνος, que en español natural se expresa con «¿de quién?». Mantiene la brevedad y la ambigüedad exacta del original, sin añadir un sustantivo implícito que el texto no da.
- source_word: Τῶν Ἰσμαηλιτῶν
  english_pob_choice: The Ishmaelites’
  chosen_spanish: De los ismaelitas
  alternatives_spanish:
  - De los ismaelitas era
  - Era de los ismaelitas
  lexicon: Ἰσμαηλῖται
  rationale: El genitivo plural griego indica pertenencia o procedencia. En español, «de los ismaelitas» reproduce esa relación de modo idiomático y conserva la referencia étnica sin forzar una estructura posesiva artificial.
theological_decisions:
- issue: Referencia de pertenencia en una respuesta breve
  english_pob_reading: And I said, “The Ishmaelites’.”
  chosen_spanish_reading: 'Y yo dije: «De los ismaelitas»'
  alternative_spanish_readings:
  - 'Y yo dije: «Pertenecía a los ismaelitas»'
  - 'Y yo dije: «Era de los ismaelitas»'
  rationale: No hay carga doctrinal específica en el versículo; la decisión es mantener la respuesta lacónica del testimonio narrativo. Se evita ampliar el sentido a una frase explicativa que el griego no exige.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El pasaje es muy breve y el texto griego fuente coincide en sentido con la versión inglesa auditada («Whose?» / «The Ishmaelites’»). No hay revisiones aplicadas en el historial reciente; se conserva la lectura directa y mínima del original.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «ismaelitas» en minúscula porque funciona como etnónimo común en español y así aparece en tradiciones bíblicas modernas cuando no está en posición titular.
  - Se conserva el tono de diálogo directo con comillas españolas y puntuación normativa.
