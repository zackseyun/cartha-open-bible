source:
  edition: Charles 1908 Greek Versions (pages 256-287, Joseph pilot)
  text: '*Ὁ δὲ μετάβολος πεσὼν εἰς τοὺς πόδας αὐτοῦ¹³ *ἐδέετο λέγων¹⁴· Δέομαί σου¹⁵, κύριε, *οὐκ οἶδα¹⁶ ὃ¹⁷ λέγεις.'
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/013/002.yaml
  text: But the broker fell at his feet and begged, saying, “I beg you, lord, I do not know what you are saying.”
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:32Z'
    unchanged: false
    changes_summary: Removed the added object 'him' after 'begged' since it is not explicit in the Greek; otherwise retained the draft's wording as accurate and natural.
translation:
  language: es
  text: 'Pero el corredor cayó a sus pies y le suplicaba, diciendo: «Te ruego, señor, no sé lo que dices».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: μετάβολος
  english_pob_choice: broker
  chosen_spanish: corredor
  alternatives_spanish:
  - intermediario
  - tratante
  lexicon: LSJ
  rationale: Consistencia con cap. 13 POB ('broker'); 'corredor' para el intermediario del tráfico.
- source_word: πεσὼν εἰς τοὺς πόδας αὐτοῦ
  english_pob_choice: fell at his feet
  chosen_spanish: cayó a sus pies
  alternatives_spanish:
  - se postró a sus pies
  - se arrojó a sus pies
  lexicon: LSJ
  rationale: Idioma de súplica/postración; 'cayó a sus pies' es el equivalente español natural y conserva la imagen.
- source_word: ἐδέετο λέγων
  english_pob_choice: begged, saying
  chosen_spanish: le suplicaba, diciendo
  alternatives_spanish:
  - rogaba, diciendo
  - le imploraba
  lexicon: LSJ
  rationale: 'δέομαι imperfecto: acción continua de súplica. ''Suplicaba'' refleja el aspecto durativo. El ''le'' clítico es natural en español sin añadir objeto innecesario; la revisión POB removió ''him'' explícito.'
- source_word: Δέομαί σου, κύριε
  english_pob_choice: I beg you, lord
  chosen_spanish: Te ruego, señor
  alternatives_spanish:
  - Te suplico, mi señor
  - Te imploro, señor
  lexicon: LSJ
  rationale: κύριε en dirección directa a un superior oficial; 'señor' conserva el registro elevado sin sobreespecificar como 'amo'.
- source_word: οὐκ οἶδα ὃ λέγεις
  english_pob_choice: I do not know what you are saying
  chosen_spanish: no sé lo que dices
  alternatives_spanish:
  - no sé de qué hablas
  - no sé qué dices
  lexicon: LSJ
  rationale: Construcción simple; 'no sé lo que dices' es la rendición transparente y natural del relativo griego ὃ λέγεις.
translation_notes:
  revision_awareness: Sigo la revisión POB que removió 'him' explícito tras 'begged' (no aparece en el griego); el español 'le suplicaba' lo capta naturalmente con el clítico.
  spanish_consistency_notes:
  - '''corredor'' para μετάβολος en cap. 13'
  - '''señor'' para κύριε en dirección directa a superior'
  - '''cayó a sus pies'' fórmula de súplica'
