id: T12P.JOS.13.1
reference: Testament of Joseph 13:1
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 256-287, Joseph pilot)
  text: Ὁ δὲ ⌜Πεντεφρὶς¹⁾ πεισθεὶς² τοῖς λόγοις ⌜αὐτῆς¹³ ἐκέλευσεν⁴ †ἐλθεῖν⁵ τὸν μετάβολον, *καὶ λέγει αὐτῷ⁶· *Τί τοῦτο ὃ ἀκούω ⌜περί σου¹⁷, ὅτι κλέπτεις⁸ ψυχὰς⁹ ἐκ γῆς¹⁰ Χαναάν¹¹, *καὶ εἰς παῖδας μεταπωλεῖς¹²;
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/013/001.yaml
  text: But Pentephris, persuaded by her words, ordered the broker to come, and said to him, “What is this that I hear concerning you, that you steal souls from the land of Canaan and sell them as slaves?”
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:33Z'
    unchanged: false
    changes_summary: Changed 'to be brought' to 'to come' for closer alignment with ἐλθεῖν; removed 'again' since μεταπωλεῖς does not require that adverb here. Kept 'souls' as a formal rendering of ψυχὰς and retained 'broker' for μετάβολον.
translation:
  language: es
  text: 'Pero Pentefris[a], persuadido por sus palabras, ordenó que viniera el corredor[b], y le dijo: «¿Qué es esto que oigo acerca de ti, que robas almas[c] de la tierra de Canaán y las vendes como esclavos?».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Pentefris (variante de Pentefri) es la forma griega del nombre egipcio asociado con Potifar.
    reason: cross_reference
  - marker: b
    text: El POB usa 'broker' (corredor/intermediario) en este capítulo, en contraste con 'merchant' (mercader) en cap. 12, porque aquí el énfasis recae sobre el papel de intermediario en el tráfico.
    reason: lexical_alternative
  - marker: c
    text: El griego 'robar almas' probablemente significa 'secuestrar personas' o 'robar a seres humanos' en este contexto de tráfico.
    reason: lexical_alternative
lexical_decisions:
- source_word: πεισθεὶς
  english_pob_choice: persuaded
  chosen_spanish: persuadido
  alternatives_spanish:
  - convencido
  lexicon: LSJ
  rationale: Participio aoristo pasivo de πείθω; 'persuadido' es la rendición estándar y formal.
- source_word: μετάβολον
  english_pob_choice: broker
  chosen_spanish: corredor
  alternatives_spanish:
  - intermediario
  - tratante
  - mercader
  lexicon: LSJ
  rationale: El POB cambió a 'broker' en cap. 13 (vs. 'merchant' en cap. 12) porque aquí el término denota intermediario en el comercio, no comerciante genérico. 'Corredor' captura mejor el papel en la escena de acusación e interrogatorio.
- source_word: ἐλθεῖν
  english_pob_choice: to come
  chosen_spanish: que viniera
  alternatives_spanish:
  - venir
  - que se presentara
  lexicon: LSJ
  rationale: Sigo la revisión POB de 'to be brought' a 'to come' por mayor cercanía con ἐλθεῖν (verbo activo); 'que viniera' es la rendición natural del infinitivo griego en el complemento subjuntivo español.
- source_word: κλέπτεις ψυχὰς
  english_pob_choice: you steal souls
  chosen_spanish: robas almas
  alternatives_spanish:
  - robas personas
  - secuestras gente
  lexicon: LSJ
  rationale: Literalmente 'robar almas'. En el idioma testamentario judío ψυχαί puede significar personas/vidas, especialmente en contexto de tráfico de esclavos. Conservo la expresión literal vívida porque transmite la fuerza moral del tráfico de vidas humanas. Decisión teológica POB.
- source_word: εἰς παῖδας μεταπωλεῖς
  english_pob_choice: sell them as slaves
  chosen_spanish: las vendes como esclavos
  alternatives_spanish:
  - las revendes como siervos
  - las vendes a la esclavitud
  lexicon: LSJ
  rationale: μεταπωλεῖς implica reventa; παῖδας aquí denota personas esclavizadas/estatus servil en contexto, no meramente niños. 'Como esclavos' explicita la naturaleza de servidumbre. POB removió 'again' en revisión, así que sigo sin 'de nuevo'.
theological_decisions:
- issue: Fuerza antropológica de ψυχὰς en una acusación de tráfico de esclavos
  chosen_reading: Rendido literalmente como 'almas' en el texto principal mientras el sentido 'personas' permanece evidente por contexto.
  alternative_readings:
  - personas
  - gente
  rationale: El idioma griego probablemente significa seres humanos/vidas, pero la retórica moral del testamento se afila al conservar 'almas'. Esto preserva la gravedad del tráfico sin importar dualismo posterior.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 4
translation_notes:
  revision_awareness: 'Sigo dos revisiones POB: (1) ''to be brought'' → ''to come'' para alinearse con ἐλθεῖν; (2) eliminó ''again'' después de ''sell them'' porque μεταπωλεῖς no requiere ese adverbio aquí. Conservo ''almas'' como rendición formal de ψυχὰς y ''corredor'' para μετάβολον.'
  spanish_consistency_notes:
  - '''corredor'' para μετάβολος en cap. 13 (vs ''mercader'' en cap. 12 según POB)'
  - '''almas'' para ψυχὰς (decisión teológica POB)'
  - '''esclavos'' para παῖδας en contexto servil'
  - '''Pentefris'' variante española de Πεντεφρίς'
