translation:
  language: es
  text: 'Pero él no le creyó, sino que mandó que fuera azotado desnudo. Y como aquel persistía en estas palabras, Pentefris dijo: «Que se traiga, pues, al joven».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: οὐκ ἐπίστευσεν αὐτῷ
  english_pob_choice: did not believe him
  chosen_spanish: no le creyó
  alternatives_spanish:
  - no le dio crédito
  - desconfió de él
  lexicon: LSJ
  rationale: 'πιστεύω + dativo: dar crédito a alguien; ''no le creyó'' es la rendición transparente.'
- source_word: γυμνὸν τύπτεσθαι
  english_pob_choice: to be beaten naked
  chosen_spanish: que fuera azotado desnudo
  alternatives_spanish:
  - ser golpeado desnudo
  - ser apaleado desnudo
  lexicon: LSJ
  rationale: El griego combina desnudez y golpiza en contexto de humillación judicial; 'azotado desnudo' es conciso y conserva el elemento de vergüenza, registro formal.
- source_word: ἐπιμένοντος... τούτοις τοῖς λόγοις
  english_pob_choice: persisted in these words
  chosen_spanish: persistía en estas palabras
  alternatives_spanish:
  - insistía en estas palabras
  - se mantenía en estas palabras
  lexicon: LSJ
  rationale: 'ἐπιμένω + dativo: persistir/insistir en algo; ''persistía'' captura el aspecto durativo del genitivo absoluto griego.'
- source_word: Ἐναχθήτω... ὁ νεανίσκος
  english_pob_choice: let the young man be brought
  chosen_spanish: que se traiga... al joven
  alternatives_spanish:
  - sea traído el joven
  - tráiganlo al joven
  lexicon: LSJ
  rationale: Imperativo aoristo pasivo de εἰσάγω; el subjuntivo impersonal con 'se' es la forma natural y elevada en español.
- source_word: νεανίσκος
  english_pob_choice: young man
  chosen_spanish: joven
  alternatives_spanish:
  - muchacho
  - mancebo
  lexicon: LSJ
  rationale: '''Joven'' es natural y legible en español, ajustándose a la auto-presentación de José ante el oficial egipcio.'
translation_notes:
  revision_awareness: El POB marcó este versículo como 'unchanged' en el pase de revisión; sigo el inglés POB al pie de la letra.
