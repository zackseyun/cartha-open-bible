  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/013/004.yaml
  text: But he did not believe him; rather, he ordered him to be beaten naked. And when he persisted in these words, Pentephris said, “Then let the young man be brought.”
