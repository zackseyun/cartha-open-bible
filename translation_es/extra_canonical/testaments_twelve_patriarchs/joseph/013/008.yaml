  text: 'Pero él dijo: «¿Cómo llegaste a ser esclavo de ellos?» Y yo dije: «Me compraron de la tierra de Canaán».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: δοῦλος
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - criado
  lexicon: δοῦλος
  rationale: El inglés POB conserva la fuerza lexical de 'slave'; en español, 'esclavo' reproduce con claridad esa relación de sujeción y evita suavizarla indebidamente con 'siervo'.
- source_word: ἐπριάσαντό με
  english_pob_choice: They bought me
  chosen_spanish: me compraron
  alternatives_spanish:
  - me adquirieron
  - me compraron a mí
  lexicon: πριάομαι
  rationale: La forma verbal expresa compra efectiva; 'me compraron' es la equivalencia natural y directa en español, manteniendo el sujeto tácito plural del contexto.
- source_word: ἐκ γῆς Χαναὰν
  english_pob_choice: from the land of Canaan
  chosen_spanish: en la tierra de Canaán
  alternatives_spanish:
  - de la tierra de Canaán
  - desde la tierra de Canaán
  lexicon: γῆ / Χαναάν
  rationale: Aunque el griego lleva ἐκ ('de/desde'), en español la idea de procedencia se expresa de modo fluido con 'en la tierra de Canaán' dentro del complemento de compra; conserva el referente geográfico sin forzar una construcción pesada.
theological_decisions:
- issue: Representación de la esclavitud en el relato
  english_pob_reading: How did you become their slave?
  chosen_spanish_reading: ¿Cómo llegaste a ser esclavo de ellos?
  alternative_spanish_readings:
  - ¿Cómo viniste a ser su esclavo?
  - ¿Cómo te convertiste en esclavo de ellos?
  rationale: Se mantiene la realidad social dura del término sin atenuarla. La formulación preserva el énfasis narrativo en la condición servil de José.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios; este borrador sigue el texto inglés POB sin introducir variantes no atestiguadas y respeta el griego fuente.
  spanish_consistency_notes:
  - Se mantiene 'esclavo' según la preferencia lexical documentada para δοῦλος en la POB.
  - No se introduce 'Cristo', 'SEÑOR' ni otros equivalentes no presentes en el texto fuente.
