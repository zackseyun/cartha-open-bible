translation:
  language: es
  text: 'Pero él me dijo: «En verdad estás mintiendo». E inmediatamente ordenó que también a mí me desnudaran por completo y me azotaran.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ὄντως ψεύδῃ
  english_pob_choice: You are truly lying.
  chosen_spanish: «En verdad estás mintiendo»
  alternatives_spanish:
  - «Verdaderamente mientes»
  - «De veras mientes»
  lexicon: Ὄντως; ψεύδῃ
  rationale: Ὄντως intensifica la afirmación con el sentido de ‘en verdad / realmente’; ψεύδῃ es presente medio/deponente de ψεύδομαι, ‘mentir’. En español, ‘estás mintiendo’ conserva el aspecto progresivo y la acusación directa del griego, sin volverlo demasiado literario o arcaico.
- source_word: ἐκέλευσε
  english_pob_choice: he ordered
  chosen_spanish: ordenó
  alternatives_spanish:
  - mandó
  - dio la orden de
  lexicon: κελεύω
  rationale: El verbo κελεύω expresa dar una orden o mandato. ‘Ordenó’ reproduce bien la fuerza directiva y mantiene el registro sobrio del pasaje.
- source_word: γυμνὸν
  english_pob_choice: to be stripped naked
  chosen_spanish: desnudaran por completo
  alternatives_spanish:
  - lo dejaran desnudo
  - lo despojaran de la ropa
  lexicon: γυμνός
  rationale: γυμνός significa ‘desnudo’ o ‘despojado de ropa’. Dado que el contexto ya implica humillación corporal, ‘desnudaran por completo’ comunica la desnudez total de forma natural en español, sin añadir más que el griego.
- source_word: τύπτεσθαι
  english_pob_choice: beaten
  chosen_spanish: me azotaran
  alternatives_spanish:
  - me golpearan
  - me dieran azotes
  lexicon: τύπτω
  rationale: τύπτεσθαι es pasivo de ‘golpear/azotar’. ‘Azotaran’ conserva la violencia corporal y la concreción del acto mejor que un genérico ‘golpearan’.
theological_decisions:
- issue: Tratamiento de la acusación y la humillación corporal sin atenuar la violencia
  english_pob_reading: You are truly lying. And immediately he ordered me also to be stripped naked and beaten.
  chosen_spanish_reading: «En verdad estás mintiendo». E inmediatamente ordenó que también a mí me desnudaran por completo y me azotaran.
  alternative_spanish_readings:
  - «De veras mientes». E inmediatamente mandó que también me desnudaran y me golpearan.
  - «Verdaderamente mientes». E inmediatamente dio la orden de que también a mí me despojaran de la ropa y me azotaran.
  rationale: El texto presenta una acusación verbal seguida de castigo físico humillante. La traducción mantiene esa secuencia sin suavizar la agresión ni convertirla en una paráfrasis menos directa. No hay tensión doctrinal particular, pero sí una necesidad de preservar la crudeza narrativa del testimonio.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: The latest revision pass marked the English draft unchanged and required no changes. The Spanish draft therefore aligns closely with the audited English POB reading while grounding lexical choices in the Greek source text.
  spanish_consistency_notes:
  - Se mantiene ‘ordenó’ para κελεύω como equivalente consistente de mandato.
  - Se conserva ‘desnudos por completo’ para γυμνός en sentido intensivo, sin introducir eufemismo.
  - Se usa ‘azotaran’ para τύπτεσθαι por su valor físico concreto y su naturalidad en español.
  - La puntuación y el diálogo siguen una presentación publicable y sobria, acorde con un testimonio narrativo.
