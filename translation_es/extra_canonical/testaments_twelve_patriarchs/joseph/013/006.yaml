translation:
  language: es
  text: 'Y, después de separarme de él, me dijo: «¿Eres esclavo[a] o libre?». Y yo le dije: «Esclavo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Esclavo'' conserva la fuerza del griego δοῦλος; ''siervo'' suavizaría el contraste con ''libre''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Δοῦλος
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  lexicon: δοῦλος
  rationale: La POB inglesa eligió 'slave' por su fuerza léxica; en español, 'esclavo' conserva esa fuerza y evita suavizar el contraste con 'libre'. 'Siervo' sería más interpretativo y menos preciso aquí.
- source_word: ἐλεύθερος
  english_pob_choice: free
  chosen_spanish: libre
  alternatives_spanish:
  - liberado
  - independiente
  lexicon: ἐλεύθερος
  rationale: '''Libre'' reproduce el contraste directo con ''esclavo'' y es la opción natural y fiel al griego.'
- source_word: διαχωρίσας με ἀπ᾿ αὐτοῦ
  english_pob_choice: after separating me from him
  chosen_spanish: después de separarme de él
  alternatives_spanish:
  - al separarme de él
  - separándome de él
  lexicon: διαχωρίζω
  rationale: El participio aoristo expresa una acción previa; en español, 'después de separarme de él' comunica bien la secuencia sin recargar la frase.
theological_decisions:
- issue: Identidad social del hablante frente al contraste esclavo/libre
  english_pob_reading: Are you a slave or free? ... A slave.
  chosen_spanish_reading: ¿Eres esclavo o libre? ... Esclavo.
  alternative_spanish_readings:
  - ¿Eres siervo o libre?
  - ¿Eres esclavo o eres libre?
  rationale: No hay aquí una afirmación doctrinal, pero sí una tensión social y retórica que conviene conservar sin atenuarla. 'Esclavo' mantiene la crudeza del intercambio tal como lo hace la traducción inglesa auditada.
  doctrine_reference: No doctrinal issue; lexical-social contrast preserved.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios; esta versión sigue el texto fuente griego y el sentido auditado de la POB inglesa sin introducir ajustes adicionales.
  spanish_consistency_notes:
  - Se mantiene 'esclavo' de forma consistente en ambas apariciones para reflejar la misma palabra griega δοῦλος.
  - Se usa 'libre' como antónimo directo, sin expandirlo a 'independiente' u otra glosa.
  - La puntuación y el orden reflejan de cerca la estructura del griego y la oración inglesa auditada, con naturalidad en español.
