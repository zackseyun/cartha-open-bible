source:
  edition: Charles 1908 Greek Versions (pages 256-287, Joseph pilot)
  text: Καὶ εἰσαχθεὶς προσεκύνησα τῷ Πεντεφρῇ³⁵, τρίτος³⁶ γὰρ ἦν *ἐν ἀξιώματι παρὰ τῶν³⁷ Φαραὼ ⌜ἀρχόντων⌉.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/013/005.yaml
  text: And when I was brought in, I bowed down to Pentephris, for he was, he said, third in rank among Pharaoh’s rulers.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:56:04Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Y cuando fui llevado adentro, me postré ante Pentefris, pues, dijo, era el tercero en rango[a] entre los gobernantes del faraón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'tercero en oficio entre los gobernantes del faraón'.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰσαχθεὶς
  english_pob_choice: when I was brought in
  chosen_spanish: cuando fui llevado adentro
  alternatives_spanish:
  - al ser introducido
  - tras haber sido conducido adentro
  lexicon: LSJ
  rationale: 'Participio aoristo pasivo de εἰσάγω: ser introducido/llevado adentro; la cláusula temporal ''cuando fui llevado adentro'' es natural y conserva la pasiva.'
- source_word: προσεκύνησα
  english_pob_choice: I bowed down
  chosen_spanish: me postré
  alternatives_spanish:
  - hice reverencia
  - me incliné
  - me prosterné
  lexicon: LSJ
  rationale: El verbo indica sumisión corporal reverencial. 'Me postré' es legible y preserva la acción deferente; encaja con el contexto cortesano egipcio.
- source_word: ἀξίωμα
  english_pob_choice: rank
  chosen_spanish: rango
  alternatives_spanish:
  - dignidad
  - cargo
  - posición
  lexicon: LSJ
  rationale: En la frase sobre ser tercero entre los gobernantes del faraón, 'rango' transmite mejor la posición oficial.
- source_word: ἀρχόντων
  english_pob_choice: rulers
  chosen_spanish: gobernantes
  alternatives_spanish:
  - jefes
  - magistrados
  - príncipes
  lexicon: LSJ
  rationale: ἄρχοντες denota oficiales/gobernantes superiores; 'gobernantes' es claro y elevado.
translation_notes:
  revision_awareness: El POB marcó este versículo como 'unchanged' en el pase de revisión; sigo el inglés POB al pie de la letra, conservando la inserción 'he said' / 'dijo' que el inglés añade.
  spanish_consistency_notes:
  - '''me postré'' para προσεκύνησα'
  - '''rango'' para ἀξίωμα'
  - '''gobernantes'' para ἀρχόντων'
  - '''faraón'' transliteración estándar de Φαραώ'
