source:
  edition: Charles 1908 Greek Versions (pages 256-287, Joseph pilot)
  text: Ἐν²⁰ πᾶσι δὲ τούτοις²¹ προΐσταται²² Καὶ ἐν διαφόροις τρόποις²³ παρακαλεῖ²⁴. Ἐν βραχεῖ²⁵ ἀφίσταται²⁶ *εἰς τὸ²⁷ δοκιμάσαι τῆς ψυχῆς τὸ διαβούλιον.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/002/006.yaml
  text: But in all these things he takes the lead, and in various ways he encourages.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:56Z'
    unchanged: false
    changes_summary: Revised ‘gives comfort’ to ‘encourages’ for παρακαλεῖ, while keeping ‘takes the lead’ for προΐσταται and removing the footnote marker from the main text.
translation:
  language: es
  text: Pero en todas estas cosas él toma la delantera, y de diversos modos alienta.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: προΐσταται
  english_pob_choice: takes the lead
  chosen_spanish: toma la delantera
  alternatives_spanish:
  - preside
  - se pone al frente
  - ampara
  lexicon: BDAG
  rationale: El verbo puede significar ponerse delante, dirigir o cuidar. La revisión del POB eligió 'takes the lead' sin añadir 'us'; 'toma la delantera' refleja esa decisión sin agregar un objeto que el griego no tiene.
- source_word: παρακαλεῖ
  english_pob_choice: encourages
  chosen_spanish: alienta
  alternatives_spanish:
  - consuela
  - exhorta
  lexicon: BDAG
  rationale: La revisión POB cambió 'gives comfort' a 'encourages' para captar mejor παρακαλεῖ; 'alienta' refleja ese matiz de animar y estimular en medio del sufrimiento.
- source_word: ἐν διαφόροις τρόποις
  english_pob_choice: in various ways
  chosen_spanish: de diversos modos
  alternatives_spanish:
  - de distintas maneras
  - de varias formas
  lexicon: LSJ
  rationale: '''De diversos modos'' es la formulación natural española y conserva la pluralidad de medios divinos del griego.'
theological_decisions:
- issue: Alcance de la ayuda divina en 'él toma la delantera'
  chosen_reading: '''Toma la delantera'' siguiendo la revisión POB (''takes the lead'')'
  alternative_readings:
  - se pone al frente de nosotros
  - está junto a nosotros
  - preside
  rationale: La revisión del POB optó por una formulación sin objeto ('us') para reflejar el griego sin añadir lo que no está; el español mantiene esa parquedad.
  doctrine_reference: Preservar la tensión teológica antes que resolverla
translation_notes:
  revision_awareness: La revisión de gpt-5.4-mini cambió 'gives comfort' a 'encourages' para παρακαλεῖ y conservó 'takes the lead' para προΐσταται, además de retirar el marcador [c] del texto principal. La traducción española sigue esa elección final.
  spanish_consistency_notes:
  - No se incluye marcador de nota al pie en este verso porque la revisión POB lo retiró.
  - El verso griego incluye una segunda oración ('Ἐν βραχεῖ ἀφίσταται...') que el POB no traduce en este verso; se conserva esa elección y la oración aparece traducida en 3:1 según la división del POB.
