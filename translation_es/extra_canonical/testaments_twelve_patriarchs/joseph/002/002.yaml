source:
  edition: Charles 1908 Greek Versions (pages 256-287, Joseph pilot)
  text: Καὶ ἠγωνισάμην πρὸς γυναῖκα ἀναιδῆ ἐπείγουσάν² με παρανομεῖν μετʼ αὐτῆς, ἀλλʼ ὁ Θεὸς *τοῦ πατρός μου³ ἐρρύσατό⁴ με ἐκ⁵ φλογὸς καιομένης.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/002/002.yaml
  text: And I struggled against a shameless woman who kept pressing me to transgress with her, but God of my father rescued me from a burning flame.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:55Z'
    unchanged: false
    changes_summary: Removed the article before 'God of my father' to better match the source wording and improve natural English.
translation:
  language: es
  text: Y luché contra una mujer descarada que me presionaba sin cesar para transgredir con ella, pero el Dios de mi padre me rescató de una llama ardiente.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἠγωνισάμην
  english_pob_choice: I struggled
  chosen_spanish: luché
  alternatives_spanish:
  - contendí
  - combatí
  lexicon: LSJ
  rationale: El verbo expresa contienda moral activa, propio de la resistencia de José a la seducción; 'luché' conserva la fuerza ética y personal sin sonar excesivamente marcial.
- source_word: γυναῖκα ἀναιδῆ
  english_pob_choice: a shameless woman
  chosen_spanish: una mujer descarada
  alternatives_spanish:
  - una mujer impudente
  - una mujer desvergonzada
  lexicon: LSJ
  rationale: ἀναιδής indica falta de pudor o de decoro. 'Descarada' es directa, idiomática en español y conserva la valoración moral del registro testamentario.
- source_word: ἐπείγουσάν με παρανομεῖν μετʼ αὐτῆς
  english_pob_choice: who kept pressing me to transgress with her
  chosen_spanish: que me presionaba sin cesar para transgredir con ella
  alternatives_spanish:
  - que me urgía a actuar contra la ley con ella
  - que me apremiaba a pecar con ella
  lexicon: LSJ
  rationale: El participio + infinitivo expresa presión repetida; παρανομεῖν es más literalmente 'transgredir/actuar fuera de la ley' que simplemente 'cometer adulterio', así que 'transgredir con ella' conserva el sentido moral-legal más amplio.
- source_word: ἐρρύσατό με ἐκ φλογὸς καιομένης
  english_pob_choice: rescued me from a burning flame
  chosen_spanish: me rescató de una llama ardiente
  alternatives_spanish:
  - me libró de un fuego ardiente
  - me salvó de una llama abrasadora
  lexicon: LSJ
  rationale: La frase es metafórica en contexto, describiendo el peligro de la lujuria y la tentación. 'Llama ardiente' preserva la imagen viva sin sobreexplicar.
- source_word: ὁ Θεὸς τοῦ πατρός μου
  english_pob_choice: God of my father
  chosen_spanish: el Dios de mi padre
  alternatives_spanish:
  - el Dios de mis padres
  lexicon: BDAG
  rationale: Aunque la revisión inglesa quitó el artículo en inglés ('God of my father'), la sintaxis española natural requiere el artículo definido 'el Dios de mi padre'; el genitivo singular se conserva conforme al testigo griego.
theological_decisions:
- issue: Referencia a 'el Dios de mi padre'
  chosen_reading: Singular 'mi padre' conservado
  alternative_readings:
  - el Dios de mis padres
  rationale: El testigo griego es singular y encaja con la apelación filial personal de José a Jacob en esta sección autobiográfica. Conservar el singular preserva la intimidad del testimonio.
  doctrine_reference: Primacía de la lengua original sobre la tradición de traducción
- issue: Fuerza metafórica de 'llama ardiente'
  chosen_reading: Mantenida como metáfora y no explicitada como deseo sexual
  alternative_readings:
  - del fuego de la lujuria
  - de la pasión adúltera
  rationale: La imagen griega es vívida y el contexto deja clara su referencia moral. Preservar la metáfora respeta la fuente y evita la sobreparáfrasis interpretativa.
  doctrine_reference: Preservar la tensión teológica antes que resolverla
translation_notes:
  revision_awareness: La revisión de gpt-5.4-mini quitó el artículo definido en inglés para acercarse al griego anártico. En español la gramática exige 'el Dios de mi padre'; este artículo en español no es teológicamente direccional sino sintácticamente obligatorio.
  spanish_consistency_notes:
  - Θεός → Dios; conservado en mayúscula.
  - παρανομεῖν → 'transgredir' para conservar el sentido moral-legal antes que reducirlo a 'adulterar'.
