translation:
  language: es
  text: Y este hombre[a], el jefe de cocineros del Faraón, me confió su casa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos testigos o intérpretes entienden ἀρχιμάγειρος como un título oficial de la corte y no estrictamente culinario; compárese con el relato de José en Egipto en Génesis.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀρχιμάγειρος
  english_pob_choice: chief cook
  chosen_spanish: jefe de cocineros
  alternatives_spanish:
  - jefe de la guardia
  - mayordomo principal
  lexicon: LSJ
  rationale: El compuesto griego se relaciona literalmente con cocinar más que con mando militar; aunque la tradición de Génesis sugiera un título oficial, el testigo griego de este capítulo nombra el cargo en términos culinarios, así que 'jefe de cocineros' preserva la transparencia de la fuente.
- source_word: ἐπίστευσέ μοι τὸν οἶκον αὐτοῦ
  english_pob_choice: entrusted his house to me
  chosen_spanish: me confió su casa
  alternatives_spanish:
  - puso su casa bajo mi cuidado
  - encomendó su casa a mí
  lexicon: LSJ
  rationale: '''Confió'' preserva el sentido del verbo griego πιστεύω + dativo en el matiz de entrega de responsabilidad.'
translation_notes:
  revision_awareness: La revisión de gpt-5.4-mini no introdujo cambios ('No changes needed'). La revisión cruzada de Claude marcó 'needs-revision' (0.65); se conserva la estructura del POB pero se asegura claridad en español moderno.
  spanish_consistency_notes:
  - Faraón con tilde y mayúscula como nombre.
  - ἀρχιμάγειρος → 'jefe de cocineros' siguiendo POB; nota al pie deja abierta la lectura tradicional 'capitán de la guardia'.
