base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/002/005.yaml
  text: For God is not ashamed like a man, nor does he grow fearful like a son of man, nor, like one born of earth, does he become weak or terrified.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:55Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Porque Dios no se avergüenza como un hombre, ni teme como hijo de hombre, ni, como uno nacido de la tierra, se debilita o se aterra.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπαισχύνεται
  english_pob_choice: is ashamed
  chosen_spanish: se avergüenza
  alternatives_spanish:
  - se siente avergonzado
  lexicon: BDAG
  rationale: Verbo de voz pasiva/reflexiva clásica para 'avergonzarse'; mantiene el contraste retórico con la confianza divina.
- source_word: δειλιᾷ
  english_pob_choice: grow fearful
  chosen_spanish: teme
  alternatives_spanish:
  - pierde el ánimo
  - se acobarda
  lexicon: LSJ
  rationale: El verbo denota encogerse de miedo; 'teme' fluye natural en español con 'como hijo de hombre' y mantiene paralelismo conciso con las cláusulas circundantes.
- source_word: γηγενής
  english_pob_choice: one born of earth
  chosen_spanish: uno nacido de la tierra
  alternatives_spanish:
  - hombre terreno
  - mortal
  lexicon: LSJ
  rationale: La expresión enfatiza la condición criatural y limitación terrena. 'Uno nacido de la tierra' preserva la imagen y el contraste retórico con Dios.
- source_word: ἀσθενεῖ
  english_pob_choice: become weak
  chosen_spanish: se debilita
  alternatives_spanish:
  - enferma
  - desfallece
  lexicon: LSJ
  rationale: '''Se debilita'' captura el sentido literal del verbo griego en su contrapunto a la fortaleza divina.'
- source_word: πτοεῖται
  english_pob_choice: become ... terrified
  chosen_spanish: se aterra
  alternatives_spanish:
  - se alarma
  - se conmociona
  lexicon: LSJ
  rationale: El verbo transmite agitación o espanto; 'se aterra' da la fuerza climática a la negación sobre Dios.
- source_word: ὁ Θεός
  english_pob_choice: God
  chosen_spanish: Dios
  lexicon: BDAG
  rationale: Θεός → Dios.
translation_notes:
  revision_awareness: La revisión de gpt-5.4-mini no introdujo cambios; la revisión cruzada de Claude marcó alta concordancia (0.96).
  spanish_consistency_notes:
  - Negaciones en cadena con 'ni' replicando 'Οὔτε... Οὔτε...'.
  - '''Hijo de hombre'' sin artículo definido para conservar la indeterminación del original anártico ὡς υἱὸς ἀνθρώπου.'
