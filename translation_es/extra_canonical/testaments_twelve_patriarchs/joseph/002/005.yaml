  text: Οὐ γὰρ ὡς ἄνθρωπος ἐπαισχύνεται ὁ Θεός, Οὔτε¹⁶ ὡς υἱὸς ἀνθρώπου δειλιᾷ, Οὔτε¹⁷ ὡς γηγενὴς [ἀσθενεῖ ἢ]¹⁸ πτοεῖται¹⁹,
