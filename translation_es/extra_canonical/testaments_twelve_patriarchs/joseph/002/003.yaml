id: T12P.JOS.2.3
reference: Testament of Joseph 2:3
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 256-287, Joseph pilot)
  text: Ἐφυλακίσθην⁶, ἐτύφθην⁷, ⸢ἐξεμυκτηρίσθην⸣⁸, καὶ ἔδωκέ με⁹ ὁ¹⁰ Κύριος¹¹ εἰς οἰκτιρμοὺς ἐνώπιον τοῦ δεσμοφύλακος.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/002/003.yaml
  text: I was imprisoned, I was beaten, I was mocked, and the Lord gave me compassion in the sight of the jailer.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:56Z'
    unchanged: false
    changes_summary: Changed the semicolon to a coordinating conjunction for smoother English, and rendered εἰς οἰκτιρμοὺς more directly as 'compassion' rather than 'favor'.
translation:
  language: es
  text: Fui encarcelado, fui golpeado, fui burlado, y el Señor me concedió compasión a la vista del carcelero.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐφυλακίσθην
  english_pob_choice: I was imprisoned
  chosen_spanish: fui encarcelado
  alternatives_spanish:
  - fui puesto en prisión
  - fui apresado
  lexicon: LSJ
  rationale: Pasivo directo; 'encarcelado' es elevado pero legible y se ajusta al estilo testamentario.
- source_word: ἐτύφθην
  english_pob_choice: I was beaten
  chosen_spanish: fui golpeado
  alternatives_spanish:
  - fui herido
  - fui azotado
  lexicon: LSJ
  rationale: El verbo indica ser herido físicamente; 'golpeado' es claro y firme sin especificar una forma de castigo que el griego no nombra.
- source_word: ἐξεμυκτηρίσθην
  english_pob_choice: I was mocked
  chosen_spanish: fui burlado
  alternatives_spanish:
  - fui ridiculizado
  - fui tratado con desprecio
  lexicon: LSJ
  rationale: El verbo lleva el sentido de derisión o desprecio sarcástico. 'Burlado' es conciso y encaja en la secuencia retórica.
- source_word: ἔδωκέ με ... εἰς οἰκτιρμούς
  english_pob_choice: gave me compassion
  chosen_spanish: me concedió compasión
  alternatives_spanish:
  - me otorgó misericordia
  - me dio favor
  lexicon: LSJ
  rationale: El modismo significa hacer que alguien reciba un trato compasivo. 'Concedió compasión' preserva la construcción griega concreta mejor que suavizar a 'favor'; sigue la decisión revisada del POB.
- source_word: δεσμοφύλακος
  english_pob_choice: jailer
  chosen_spanish: carcelero
  alternatives_spanish:
  - guarda de la prisión
  - guardián de la cárcel
  lexicon: LSJ
  rationale: Equivalente natural en español para el custodio de la prisión; conciso y claro en el contexto.
- source_word: ὁ Κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  lexicon: BDAG
  rationale: Κύριος → Señor según convención del proyecto.
translation_notes:
  revision_awareness: 'La revisión de gpt-5.4-mini cambió ''favor'' a ''compassion'' y reemplazó el punto y coma por una conjunción coordinante. El español refleja ambas decisiones: ''concedió compasión'' y la coma + ''y''.'
  spanish_consistency_notes:
  - Uso de pasivas en serie ('fui encarcelado, fui golpeado, fui burlado') siguiendo el ritmo del original griego con triple aoristo pasivo.
  - Κύριος → Señor; ningún uso de 'Yahvé' aquí porque el griego del NT/Test pseudoepígrafo no lleva el tetragrama.
