  text: Οὐ γὰρ¹² ἐγκαταλείπει¹³ Κύριος¹⁴ τοὺς φοβουμένους αὐτόν, *Οὐκ ἐν σκότει, ἢ δεσμοῖς¹⁵, ἢ θλίψεσιν, ἢ ἀνάγκαις.
