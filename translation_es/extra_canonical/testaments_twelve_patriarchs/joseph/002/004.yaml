base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/002/004.yaml
  text: For the Lord does not abandon those who fear him, not in darkness, or chains, or afflictions, or distress[b].
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:55Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Porque el Señor no abandona a los que le temen, ni en la oscuridad, ni en cadenas, ni en aflicciones, ni en angustias[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: b
    text: La frase 'de una llama ardiente' (en 2:2) probablemente es metafórica del peligro consumidor de la tentación sexual, aunque el griego deja la imagen sin desarrollar.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγκαταλείπει
  english_pob_choice: abandon
  chosen_spanish: abandona
  alternatives_spanish:
  - desampara
  - deja
  lexicon: BDAG
  rationale: '''Abandona'' transmite el sentido teológico de no desamparo divino, tradicional en el lenguaje bíblico.'
- source_word: τοὺς φοβουμένους αὐτόν
  english_pob_choice: those who fear him
  chosen_spanish: los que le temen
  alternatives_spanish:
  - los que le reverencian
  - los que le tienen temor
  lexicon: BDAG
  rationale: La tradición testamentaria usa con regularidad el lenguaje del temor de Dios en sentido pactual y ético; 'le temen' preserva el registro teológico tradicional y la formulación de la fuente.
- source_word: δεσμοῖς
  english_pob_choice: chains
  chosen_spanish: cadenas
  alternatives_spanish:
  - lazos
  - prisiones
  lexicon: LSJ
  rationale: El sustantivo concreto en plural intensifica la secuencia de penalidades; 'cadenas' es vívido y preserva la imagen mejor que el más abstracto 'prisiones'.
- source_word: θλίψεσιν
  english_pob_choice: afflictions
  chosen_spanish: aflicciones
  alternatives_spanish:
  - tribulaciones
  - angustias
  lexicon: BDAG
  rationale: El término denota presiones y sufrimientos; 'aflicciones' mantiene el tono parenético elevado y resulta entendible.
- source_word: ἀνάγκαις
  english_pob_choice: distress
  chosen_spanish: angustias
  alternatives_spanish:
  - necesidades
  - apremios
  - estrecheces
  lexicon: BDAG
  rationale: En esta lista de penalidades, el sentido experiencial de presión angustiosa encaja mejor que el más literal 'necesidades', evitando confusiones.
translation_notes:
  revision_awareness: La revisión de gpt-5.4-mini no introdujo cambios; la revisión cruzada de Claude marcó alta concordancia (0.95). El marcador [b] del POB permanece sobre 'angustias'.
  spanish_consistency_notes:
  - Forma negativa en cascada con 'ni' siguiendo la estructura griega 'οὐκ... ἢ... ἢ... ἢ...'.
  - θλίψεσιν → 'aflicciones' como en POB; ἀνάγκαις → 'angustias' para preservar el sentido experiencial del POB ('distress').
