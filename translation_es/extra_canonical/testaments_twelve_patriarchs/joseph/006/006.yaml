source:
  edition: Charles 1908 Greek Versions (pages 256-287, Joseph pilot)
  text: Νῦν οὖν γνῶθι³⁴, ὅτι ὁ³⁵ Θεὸς *τοῦ πατρός³⁶ μου *δι’ ἀγγέλου αὐτοῦ³⁷ ἀπεκάλυψέ³⁸ μοι τὴν κακίαν σου³⁹, καὶ *ἐν τούτῳ ἐφύλαξα⁴⁰ αὐτὸ⁴¹ εἰς ἔλεγχόν σου, *εἴπως ἄρα⁴² ἰδοῦσα⁴³ μετανοήσεις⁴⁴.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/006/006.yaml
  text: Know now, then, that the God of my father, through his angel, revealed your wickedness to me; and by this I preserved him for your conviction, in hope that perhaps, seeing it, you might repent.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:21Z'
    unchanged: false
    changes_summary: Revised 'for this reason I kept it as evidence against you, to expose you' to more closely reflect ἐν τούτῳ ἐφύλαξα αὐτὸ εἰς ἔλεγχόν σου as 'by this I preserved him for your conviction.' Also simplified the final clause to match ἰδοῦσα μετανοήσεις more directly as 'seeing it, you might repent.'
translation:
  language: es
  text: Sabe ahora, pues, que el Dios de mi padre, por medio de su ángel, me reveló tu maldad; y por esto la conservé[a] para tu reprobación, con la esperanza de que quizá, al verla, te arrepintieras[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la guardé como prueba contra ti, para exponerte'; ἔλεγχος combina sentido evidencial y de reprensión.
    reason: lexical_alternative
  - marker: b
    text: O 'cambiaras de mente'; en este contexto de pecado concreto, 'arrepentirse' refleja mejor la fuerza moral.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ Θεὸς τοῦ πατρός μου
  english_pob_choice: the God of my father
  chosen_spanish: el Dios de mi padre
  alternatives_spanish:
  - el Dios de mis padres
  lexicon: LSJ
  rationale: Singular griego mantenido en español; 'el Dios de mi padre' refleja la apelación a Jacob como referencia paterna.
- source_word: δι’ ἀγγέλου αὐτοῦ
  english_pob_choice: through his angel
  chosen_spanish: por medio de su ángel
  alternatives_spanish:
  - mediante su ángel
  - a través de su ángel
  lexicon: LSJ
  rationale: Frase instrumental directa; 'por medio de' es la fórmula bíblica estándar para διά + genitivo.
- source_word: ἀπεκάλυψέ μοι τὴν κακίαν σου
  english_pob_choice: revealed your wickedness to me
  chosen_spanish: me reveló tu maldad
  alternatives_spanish:
  - me descubrió tu maldad
  - me dio a conocer tu malicia
  lexicon: LSJ
  rationale: κακία aquí es maldad/intención malvada; 'reveló' coincide con el lenguaje de revelación de ἀποκαλύπτω.
- source_word: ἐν τούτῳ ἐφύλαξα αὐτὸ εἰς ἔλεγχόν σου
  english_pob_choice: by this I preserved him for your conviction
  chosen_spanish: por esto la conservé para tu reprobación
  alternatives_spanish:
  - la guardé para tu convicción
  - la preservé como reproche tuyo
  - como prueba contra ti, para exponerte
  lexicon: LSJ
  rationale: 'ἔλεγχος puede significar exposición, prueba o reproche. ''Reprobación'' captura la fuerza tanto evidencial como de reprensión. Nota: el griego dice αὐτό (neutro = la comida); traduzco ''la'' refiriéndose a la comida.'
- source_word: εἴπως ἄρα ἰδοῦσα μετανοήσεις
  english_pob_choice: in hope that perhaps, seeing it, you might repent
  chosen_spanish: con la esperanza de que quizá, al verla, te arrepintieras
  alternatives_spanish:
  - por si acaso, al verlo, cambiaras de mente
  - esperando que tal vez, viéndolo, te arrepintieras
  lexicon: LSJ
  rationale: Conforme a la guía del proyecto, contextos de pecado específico favorecen 'arrepentirse'. Aquí José confronta un acto concreto de maldad y espera el giro moral.
theological_decisions:
- issue: Rendición de μετανοήσεις en la reprensión de José
  chosen_reading: arrepentir
  alternative_readings:
  - cambiar de mente
  - cambiar de pensamiento
  rationale: El contexto es una confrontación directa sobre intento de corrupción y posible asesinato/seducción; este es un contexto de pecado específico, así que 'arrepentirse' encaja mejor con la política del proyecto.
  doctrine_reference: 'DOCTRINE.md: μετανοέω → arrepentir en contextos de pecado específico'
translation_notes:
  revision_awareness: POB revisó la cláusula a 'by this I preserved him for your conviction' (más cercano a ἐν τούτῳ ἐφύλαξα αὐτὸ εἰς ἔλεγχόν σου) y simplificó la cláusula final. Cross-check 0.7 needs-revision en EN. El español apunta al sentido literal mientras retiene la nota léxica.
  spanish_consistency_notes:
  - μετανοέω en contextos de pecado específico → arrepentirse
  - Θεός → Dios
  - ἄγγελος → ángel
  - κακία → maldad
