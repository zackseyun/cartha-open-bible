base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/006/005.yaml
  text: And I said to her, “You have filled it with the sorcery of death. And how could you say, ‘I do not draw near to idols, but to the Lord alone’?”
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:21Z'
    unchanged: false
    changes_summary: Replaced 'Because you filled it with deadly sorcery' with 'You have filled it with the sorcery of death' to reflect the Greek more directly and naturally without adding a causal 'because.' Changed 'how did you say' to 'how could you say' for more idiomatic English in context.
translation:
  language: es
  text: 'Y le dije: «La has llenado con la hechicería de muerte[a]. ¿Y cómo pudiste decir: ‹No me acerco a los ídolos, sino solo al Señor›?».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'hechicería mortal' / 'magia letal'; el genitivo griego puede expresar cualidad o efecto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπλήρωσας αὐτὸ γοητείας θανάτου
  english_pob_choice: You have filled it with the sorcery of death
  chosen_spanish: La has llenado con la hechicería de muerte
  alternatives_spanish:
  - La llenaste de hechicería mortal
  - La has llenado de magia letal
  lexicon: LSJ
  rationale: El POB revisó a la lectura genitival más directa 'sorcery of death'. El español 'hechicería de muerte' refleja el genitivo griego sin domesticar.
- source_word: πῶς εἶπας
  english_pob_choice: how could you say
  chosen_spanish: cómo pudiste decir
  alternatives_spanish:
  - cómo dijiste
  - cómo es que dijiste
  lexicon: LSJ
  rationale: Sigue la revisión POB ('how could you say') que añade el matiz idiomático de incongruencia moral. 'Cómo pudiste' lo conserva en español.
- source_word: οὐ προσεγγίζω τοῖς εἰδώλοις
  english_pob_choice: I do not draw near to idols
  chosen_spanish: No me acerco a los ídolos
  alternatives_spanish:
  - No me aproximo a los ídolos
  - No me asocio con ídolos
  lexicon: LSJ
  rationale: προσεγγίζω es 'acercarse'; mantener el lenguaje espacial-religioso preserva el contraste con la devoción al Señor.
- source_word: Κυρίῳ μόνῳ
  english_pob_choice: the Lord alone
  chosen_spanish: solo al Señor
  alternatives_spanish:
  - únicamente al Señor
  - al Señor solamente
  lexicon: LSJ
  rationale: Español natural que preserva el reclamo de exclusividad.
translation_notes:
  revision_awareness: POB revisó 'Because you filled it with deadly sorcery' a 'You have filled it with the sorcery of death' para mayor literalidad griega y eliminación del 'because' causal añadido. También 'how did you say' → 'how could you say' para idiomática. El español sigue ambas decisiones.
  spanish_consistency_notes:
  - Κύριος → Señor
  - εἴδωλον → ídolo
  - γοητεία → hechicería (consistente)
