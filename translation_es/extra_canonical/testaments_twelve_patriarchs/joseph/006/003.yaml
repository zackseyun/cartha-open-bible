source:
  edition: Charles 1908 Greek Versions (pages 256-287, Joseph pilot)
  text: Καὶ ⸀ἐξελθόντος αὐτοῦ¹²⸀ *ἔκλαιον¹³, *μὴ γευσάμενος μήτε ἐκείνου μήτε ἄλλου τῶν ἐδεσμάτων αὐτῆς¹⁴.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/006/003.yaml
  text: And after he had gone out, I ate neither that food nor any of her other foods, but wept, not having tasted them.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:21Z'
    unchanged: false
    changes_summary: Changed 'So' to 'And' for closer alignment with Καὶ; retained singular 'food' for ἐκείνου and plural 'foods' for τῶν ἐδεσμάτων; revised 'without tasting them' to 'not having tasted them' to reflect μὴ γευσάμενος more formally.
translation:
  language: es
  text: Y después de que él hubo salido, no comí ni aquella comida ni ninguno de sus otros alimentos, sino que lloré, sin haberlos probado[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. 'no habiendo probado'; el participio griego enfatiza el rechazo deliberado de José.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξελθόντος αὐτοῦ
  english_pob_choice: after he had gone out
  chosen_spanish: después de que él hubo salido
  alternatives_spanish:
  - tras su salida
  - una vez que salió
  lexicon: LSJ
  rationale: Genitivo absoluto; 'después de que él hubo salido' refleja el aspecto pluscuamperfecto del aoristo participial.
- source_word: ἔκλαιον
  english_pob_choice: wept
  chosen_spanish: lloré
  alternatives_spanish:
  - sollocé
  - lloraba
  lexicon: LSJ
  rationale: Imperfecto; podría rendirse 'lloraba' por aspecto durativo, pero 'lloré' funciona en la secuencia narrativa española.
- source_word: μὴ γευσάμενος
  english_pob_choice: not having tasted them
  chosen_spanish: sin haberlos probado
  alternatives_spanish:
  - sin probarlos
  - no habiéndolos gustado
  lexicon: LSJ
  rationale: Participio específicamente de 'gustar/probar'; mantenerlo preserva el rechazo deliberado de José.
- source_word: ἐκείνου ... ἄλλου τῶν ἐδεσμάτων
  english_pob_choice: that food ... her other foods
  chosen_spanish: aquella comida ... ninguno de sus otros alimentos
  alternatives_spanish:
  - esa comida ... otras viandas suyas
  lexicon: LSJ
  rationale: Distinción entre la comida específica (singular) y los demás alimentos (plural), siguiendo la decisión POB de retener el contraste.
translation_notes:
  revision_awareness: POB revisó 'So' a 'And' (Καὶ), retuvo singular/plural alimentos, y cambió 'without tasting them' a 'not having tasted them'. El español refleja estas distinciones.
  spanish_consistency_notes:
  - βρῶμα singular → comida; ἐδέσματα plural → alimentos
  - γεύομαι → probar/gustar
