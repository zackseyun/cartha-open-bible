source:
  edition: Charles 1908 Greek Versions (pages 256-287, Joseph pilot)
  text: '*Ὡς δὲ⁴ ἦλθεν ὁ⁵ εὐνοῦχος ὁ κομίζων αὐτό⁶, *ἀνέβλεψα καὶ⁷ εἶδον *φοβερὸν ἄνδρα⁸ ἐπιδιδόντα μοι *μετὰ τοῦ τρυβλίου⁹ μάχαιραν· καὶ συνῆκα ὅτι¹⁰ *περιέργεια ἐστὶν εἰς ἀποπλάνησίν μου¹¹.'
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/006/002.yaml
  text: But when the eunuch who was bringing it came, I looked up and saw a terrifying man handing me a sword with the dish; and I understood that it was a scheme to lead me astray.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:20Z'
    unchanged: false
    changes_summary: Adjusted word order from 'handing me, together with the dish, a sword' to 'handing me a sword with the dish' for more natural English while preserving the Greek sense. No other changes.
translation:
  language: es
  text: Pero cuando vino el eunuco que la traía, alcé la vista y vi a un hombre aterrador[a] que me entregaba una espada con el plato; y comprendí que era una artimaña[b] para extraviarme.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El 'hombre aterrador' no se identifica en el texto griego; la figura puede ser visionaria, simbólica o relacionada con la hechicería intentada.
    reason: alternative_reading
  - marker: b
    text: O 'un truco' / 'una contrivancia mágica' para la frase traducida 'una artimaña para extraviarme'.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐνοῦχος ὁ κομίζων
  english_pob_choice: the eunuch who was bringing it
  chosen_spanish: el eunuco que la traía
  alternatives_spanish:
  - el eunuco que la llevaba
  - el eunuco portador
  lexicon: BDAG
  rationale: Participio sustantivado; 'que la traía' es natural en español.
- source_word: ἀνέβλεψα
  english_pob_choice: I looked up
  chosen_spanish: alcé la vista
  alternatives_spanish:
  - levanté los ojos
  - miré hacia arriba
  lexicon: LSJ
  rationale: Verbo de mirada hacia arriba; 'alzar la vista' es la expresión idiomática estándar.
- source_word: φοβερὸν ἄνδρα
  english_pob_choice: a terrifying man
  chosen_spanish: un hombre aterrador
  alternatives_spanish:
  - un hombre temible
  - un hombre que infundía terror
  lexicon: LSJ
  rationale: En contexto José ve una figura amenazante asociada al peligro y engaño; 'aterrador' transmite mejor la fuerza ominosa de φοβερός.
- source_word: τρύβλιον
  english_pob_choice: dish
  chosen_spanish: plato
  alternatives_spanish:
  - fuente
  - bandeja
  lexicon: LSJ
  rationale: Recipiente para comida; 'plato' es natural en español sin sobreespecificar la forma.
- source_word: μάχαιρα
  english_pob_choice: sword
  chosen_spanish: espada
  alternatives_spanish:
  - cuchillo
  - daga
  lexicon: LSJ
  rationale: Aunque puede cubrir un cuchillo grande, 'espada' preserva la amenaza visionaria propia de la escena simbólica.
- source_word: περιέργεια
  english_pob_choice: a scheme
  chosen_spanish: una artimaña
  alternatives_spanish:
  - un truco
  - una intriga
  - una práctica de magia
  lexicon: LSJ
  rationale: El sentido aquí no es mera curiosidad sino contrivancia manipuladora dirigida a la seducción; 'artimaña' comunica el engaño intencional.
- source_word: εἰς ἀποπλάνησίν μου
  english_pob_choice: to lead me astray
  chosen_spanish: para extraviarme
  alternatives_spanish:
  - para engañarme
  - para desviarme
  - para apartarme
  lexicon: LSJ
  rationale: El verbo ἀποπλανάω lleva matiz de desorientación moral/espiritual; 'extraviar' preserva esa fuerza ética en español.
translation_notes:
  revision_awareness: POB revisó el orden de palabras en inglés ('handing me, together with the dish, a sword' → 'handing me a sword with the dish') para naturalidad. El español sigue el orden natural castellano. Cross-check 0.84 minor-issues.
  spanish_consistency_notes:
  - φοβερός → aterrador (en visiones)
  - μάχαιρα → espada en contextos visionarios/simbólicos
  - ἀποπλάνησις → extravío
