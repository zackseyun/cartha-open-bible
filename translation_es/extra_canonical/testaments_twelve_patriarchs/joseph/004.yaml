  text: (III:9-10 continued.) 9. Καὶ νοήσας ἐγὼ⁵⁵ ἐλυπήθην ἕως θανάτου⁵⁶· *ἐξελθούσης δὲ⁵⁷ αὐτῆς ἦλθον εἰς ἐμαυτόν, καὶ ἐπένθησα⁵⁸ περὶ αὐτῆς⁵⁹ ἡμέρας πολλάς, *ὅτι ἔγνων τὸν δόλον αὐτῆς καὶ τὴν πλάνην⁶⁰. 10. Καὶ ἔλεγον *πρὸς αὐτὴν⁶¹ ῥήματα ὑψίστου, εἰ ἄρα ἐπιστρέψει⁶² ἀπὸ τῆς ἐπιθυμίας⁶³ τῆς πονηρᾶς⁶⁴. IV. *Πολλάκις οὖν¹ *ὡς ἁγίῳ ἀνδρὶ ἐν λόγοις² ἐκολάκευέ³ με⁴ καὶ⁵ μετὰ δόλου διὰ⁶ ῥημάτων ἐπαίνει⁷ *τὴν σωφροσύνην⁸ μου ἐνώπιον τοῦ ἀνδρὸς αὐτῆς⁹, βουλομένη *κατὰ μόνας¹⁰ ὑποσκελίσαι με. 2. *᾿Εδόξαζε ⌜γάρ⌝¹¹ με ὡς σώφρονα *φανερῶς, καὶ ἐν κρυφῇ¹² ἔλεγέ μοι· Μὴ φοβηθῇς τὸν ἄνδρα μου· καὶ γὰρ πέπεισται¹⁴ περὶ τῆς σωφροσύνης σου¹⁵· ὅτι κἂν *τις αὐτῷ εἴπῃ¹⁶ περὶ ἡμῶν, *οὐ πιστεύσει¹⁷. 3. *᾿Εν τούτοις πᾶσιν¹⁸ ἐγὼ¹⁹ *χαμοκοιτῶν ἐδεόμην τοῦ Θεοῦ²⁰ ὅπως *ῥύσεταί με²¹ ἐκ *τῆς δολιότητος αὐτῆς²². 4. Ὡς δὲ οὐδὲν ἴσχυσεν²³ *ἐν τούτῳ²⁴, πάλιν ἔτι²⁵ λόγῳ κατηχήσεως ἤρχετο²⁶ πρὸς με τοῦ²⁷ μαθεῖν²⁸ λόγον Θεοῦ²⁹. 5. καὶ λέγει³⁰ μοι³¹· Εἰ θέλῃς³² ἵνα καταλείψω³³ τὰ εἴδωλα, συγγενοῦς³⁴ μου, *κἀγὼ πείθω τὸν ἄνδρα
    μου³⁵ ἀποστῆναι ἀπὸ³⁶ τῶν εἰδώλων, *καὶ πορευσόμεθα †ἐνώπιον Κυρίου σου³⁷. 6. *Ἐγὼ δὲ πρὸς αὐτὴν ἔλεγον³⁸ *ὅτι οὐχ³⁹ ἐν ἀκαθαρσίᾳ θέλει⁴⁰ Κύριος τοὺς σεβομένους αὐτόν, οὔτε⁴¹ *τοῖς μοιχεύουσιν εὐδοκεῖ⁴², ⌈ἀλλὰ τοῖς ἐν καθαρᾷ καρδίᾳ καὶ στόμασιν ἀμίαντοις αὐτῷ προσερχομένοις⁴³. 7. *Κἀκείνη ἀντεφιλονείκει πληρῶσαι θέλουσα τὴν ἐπιθυμίαν αὐτῆς⁴⁴. 8. *Ἐγὼ δὲ⁴⁵ προσετιθέμην *νηστείαν καὶ⁴⁶ προσευχήν, ὅπως ῥύσεταί⁴⁷ με ὁ⁴⁸ Κύριος ἀπ᾽ αὐτῆς⁴⁹.
