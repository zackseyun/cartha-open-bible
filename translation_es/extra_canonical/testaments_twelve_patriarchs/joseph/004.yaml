  revised_spanish_text: "9. Y cuando lo entendí, quedé afligido hasta la muerte. Pero, después que ella salió, volví en mí y guardé duelo por ella durante muchos días, porque reconocí su engaño y su extravío.\n\n\n    10. Y le hablé palabras del Altísimo, para ver si acaso se volvería de su mal deseo.\n\n\n    11. Así que, muchas veces[b], como a un hombre santo, me halagó con palabras; y con engaño alabó mi dominio propio delante de su marido, queriendo hacerme tropezar cuando estábamos solos.\n\n\n    12. Porque públicamente me exaltaba como casta en el lecho[c], pero en secreto me decía: «No tengas miedo de mi marido; porque está persuadido acerca de tu pureza, y aunque alguien le hablara de nosotros, no lo creerá».\n\n\n    13. En todo esto, yo, postrado, seguía rogando al Dios de mis padres que me librara de su engaño.\n\n\n    14. Como nada logró en esto, otra vez comenzó a venir a mí con palabras de instrucción, queriendo aprender la palabra de Dios.\n\n\n    15. Y me dice: «Si quieres\
    \ que deje los ídolos, pariente mío, persuadiré a mi marido a que se aparte de los ídolos, e iremos delante de tu Señor[d]».\n\n\n    16. Pero yo le decía: «El Señor no quiere que los que lo reverencian estén en inmundicia, ni se complace en los adúlteros, sino en los que se acercan a él con corazón puro y labios sin mancha».\n\n\n    17. Pero ella seguía contendiendo, queriendo cumplir su deseo.\n\n\n    18. Y añadí ayuno y oración, para que el Señor me librara de ella."
