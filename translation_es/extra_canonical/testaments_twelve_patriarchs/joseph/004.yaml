base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/004.yaml
  text: '9[a]. And when I understood, I was grieved unto death. But after she had gone out, I came to myself and mourned over her for many days, because I recognized her deceit and her delusion.

    10. And I spoke to her words of the Most High, to see whether perhaps she might turn back from her evil desire.

    11. So then, many times[b], as to a holy man, she flattered me with words; and with deceit she praised my self-control before her husband, wishing to trip me up when we were alone.

    12. For she openly extolled me as chaste in bed, but in secret she said to me, “Do not be afraid of my husband; for he is persuaded concerning your purity, and even if someone should tell him about us, he will not believe it.”

    13. In all these things I, lying low, kept begging the God of my fathers that he would rescue me from her deceit.

    14. Since she accomplished nothing in this way, again she began to come to me with words of instruction, wanting to learn the word of God.

    15. And she says to me, “If you want me to leave behind the idols, I will persuade my husband to withdraw from them, and we will go before your Lord, walking in the law of your Lord.”

    16. But I said to her, “The Lord does not will that those who revere him should be in uncleanness, nor does he delight in adulterers, but in those who draw near to him with a pure heart and undefiled lips.”

    17. But she kept contending, wanting to fulfill her desire.

    18. And I added fasting and prayer[d][c], so that the Lord might rescue me from her.'
  footnotes:
  - marker: a
    text: The Greek at v. 13 is textually difficult in this OCR-normalized witness; 'the God of my fathers' reflects the likely patriarchal sense, though a shorter reading 'God' is possible.
    reason: textual_variant
  - marker: b
    text: Or 'came to my senses.'
    reason: lexical_alternative
  - marker: c
    text: '''Chaste with respect to the bed'' renders a phrase explicitly referring to sexual purity.'
    reason: lexical_alternative
  - marker: d
    text: The line 'walking in the law of your Lord' may reflect a fuller expansion in the Greek tradition; it is translated as transmitted here.
    reason: textual_variant
