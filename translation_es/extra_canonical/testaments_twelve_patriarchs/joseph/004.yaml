translation:
  language: es
  text: "9. Y cuando lo entendí, quedé afligido hasta la muerte. Pero, después que ella salió, volví en mí y guardé duelo por ella durante muchos días, porque reconocí su engaño y su extravío.\n\n\n    10. Y le hablé palabras del Altísimo, para ver si acaso se volvería de su mal deseo.\n\n\n    11. Así que, muchas veces[b], como a un hombre santo, me halagó con palabras; y con engaño alabó mi dominio propio delante de su marido, queriendo hacerme tropezar cuando estábamos solos.\n\n\n    12. Porque públicamente me exaltaba como casta en el lecho[c], pero en secreto me decía: «No tengas miedo de mi marido; porque está persuadido acerca de tu pureza, y aunque alguien le hablara de nosotros, no lo creerá».\n\n\n    13. En todo esto, yo, postrado, seguía rogando al Dios de mis padres que me librara de su engaño.\n\n\n    14. Como nada logró en esto, otra vez comenzó a venir a mí con palabras de instrucción, queriendo aprender la palabra de Dios.\n\n\n    15. Y me dice: «Si quieres que deje los\
    \ ídolos, pariente mío, persuadiré a mi marido a que se aparte de los ídolos, e iremos delante de tu Señor[d]».\n\n\n    16. Pero yo le decía: «El Señor no quiere que los que lo reverencian estén en inmundicia, ni se complace en los adúlteros, sino en los que se acercan a él con corazón puro y labios sin mancha».\n\n\n    17. Pero ella seguía contendiendo, queriendo cumplir su deseo.\n\n\n    18. Y añadí ayuno y oración, para que el Señor me librara de ella."
  philosophy: optimal-equivalence
  footnotes:
  - marker: b
    text: O 'volví a mis sentidos'.
    reason: lexical_alternative
  - marker: c
    text: La frase griega alude explícitamente a la pureza sexual en el lecho; 'casta en el lecho' conserva esa referencia.
    reason: lexical_alternative
  - marker: d
    text: El griego transmite aquí el posesivo de segunda persona; se traduce de manera directa como 'tu Señor'.
    reason: source_note
lexical_decisions:
- source_word: ἐλυπήθην ἕως θανάτου
  english_pob_choice: I was grieved unto death
  chosen_spanish: quedé afligido hasta la muerte
  alternatives_spanish:
  - estuve sumamente angustiado
  - estuve triste hasta la muerte
  lexicon: BDAG
  rationale: Conserva la intensidad elevada y el registro solemne del texto, evitando una paráfrasis más explicativa que debilite la fuerza idiomática.
- source_word: ἦλθον εἰς ἐμαυτόν
  english_pob_choice: I came to myself
  chosen_spanish: volví en mí
  alternatives_spanish:
  - recobré el juicio
  - volví a mis sentidos
  lexicon: BDAG
  rationale: Es un equivalente natural en español para el giro idiomático, manteniendo la idea de recuperación interior sin volverlo demasiado coloquial.
- source_word: δόλος / πλάνη
  english_pob_choice: deceit / delusion
  chosen_spanish: engaño y extravío
  alternatives_spanish:
  - astucia y error
  - engaño y seducción
  lexicon: BDAG
  rationale: 'Conserva la distinción moral: δόλος como engaño deliberado y πλάνη como desviación o extravío, sin perder la dureza del juicio.'
- source_word: ῥήματα ὑψίστου
  english_pob_choice: words of the Most High
  chosen_spanish: palabras del Altísimo
  alternatives_spanish:
  - palabras del Muy Alto
  - dichos del Altísimo
  lexicon: BDAG
  rationale: ‘Altísimo’ es la forma bíblica natural en español y conserva la referencia reverente al título divino.
- source_word: ἐπιθυμία
  english_pob_choice: desire
  chosen_spanish: mal deseo
  alternatives_spanish:
  - deseo malo
  - pasión perversa
  lexicon: BDAG
  rationale: Mantiene el sustantivo ‘deseo’ y deja que el adjetivo ‘mal’ cargue la evaluación moral, como hace el griego con la frase modificadora.
- source_word: σωφροσύνη
  english_pob_choice: self-control
  chosen_spanish: dominio propio
  alternatives_spanish:
  - autocontrol
  - prudencia
  lexicon: BDAG
  rationale: ‘Dominio propio’ comunica bien la virtud ética y sexual sin reducirla a solo castidad ni introducir un tono técnico excesivo.
- source_word: ὑποσκελίσαι
  english_pob_choice: to trip me up
  chosen_spanish: hacerme tropezar
  alternatives_spanish:
  - derribarme
  - hacerme caer
  lexicon: BDAG
  rationale: Conserva la metáfora de tropiezo y caída con una expresión clara y natural en español.
- source_word: κοίτων σώφρονα
  english_pob_choice: chaste with respect to the bed
  chosen_spanish: casta en el lecho
  alternatives_spanish:
  - casta respecto al lecho
  - pura en el lecho
  lexicon: LSJ
  rationale: La forma breve mantiene visible la referencia sexual del giro griego sin sonar forzada en español.
- source_word: χαμοκοιτῶν
  english_pob_choice: lying low
  chosen_spanish: postrado
  alternatives_spanish:
  - echado en el suelo
  - humillado
  lexicon: LSJ
  rationale: El participio sugiere una postura de abatimiento corporal; ‘postrado’ transmite humildad y súplica sin añadir un detalle físico no seguro.
- source_word: τοῦ Θεοῦ
  english_pob_choice: the God of my fathers
  chosen_spanish: el Dios de mis padres
  alternatives_spanish:
  - Dios
  - el Dios de mis padres
  lexicon: BDAG
  rationale: La lectura patriarcal se conserva de manera transparente en español y encaja con el contexto testamentario, sin suavizarla a un genérico.
- source_word: κατηχήσεως
  english_pob_choice: words of instruction
  chosen_spanish: palabras de instrucción
  alternatives_spanish:
  - instrucción
  - enseñanza
  lexicon: BDAG
  rationale: Evita el tono eclesiástico especializado de ‘catequesis’ y deja el sentido de discurso instructivo abierto y natural.
- source_word: ἀποστῆναι ἀπὸ τῶν εἰδώλων
  english_pob_choice: to withdraw from them
  chosen_spanish: apartarse de ellos
  alternatives_spanish:
  - alejarse de ellos
  - renunciar a los ídolos
  lexicon: BDAG
  rationale: El pronombre de la fuente se refiere a los ídolos ya mencionados; ‘apartarse de ellos’ conserva la relación sin sobreexplicar.
- source_word: ἐνώπιον Κυρίου σου
  english_pob_choice: before your Lord
  chosen_spanish: delante de tu Señor
  alternatives_spanish:
  - ante tu Señor
  - en presencia de tu Señor
  lexicon: BDAG
  rationale: Respeta el possessivo griego del testigo y evita normalizarlo a fórmulas bíblicas más conocidas que no son las del texto.
- source_word: ἀκαθαρσίᾳ
  english_pob_choice: uncleanness
  chosen_spanish: inmundicia
  alternatives_spanish:
  - impureza
  - contaminación
  lexicon: BDAG
  rationale: ‘Inmundicia’ conserva la carga moral y cultual del término en este contexto ético-testamentario.
- source_word: τοῖς μοιχεύουσιν εὐδοκεῖ
  english_pob_choice: does he delight in adulterers
  chosen_spanish: se complace en los adúlteros
  alternatives_spanish:
  - se deleita en los adúlteros
  - aprueba a los adúlteros
  lexicon: BDAG
  rationale: Mantiene la fuerza negativa y el paralelismo del enunciado sin endurecerlo más allá de la evidencia griega.
- source_word: ἐν καθαρᾷ καρδίᾳ καὶ στόμασιν ἀμίαντοις
  english_pob_choice: with a pure heart and undefiled lips
  chosen_spanish: con corazón puro y labios sin mancha
  alternatives_spanish:
  - con un corazón puro y labios inmaculados
  - con corazón limpio y labios sin mancha
  lexicon: BDAG
  rationale: Preserva el paralelismo interior/exterior y traduce στόμασιν de forma idiomática con ‘labios’, que en español comunica mejor la idea de habla pura.
- source_word: ἀντεφιλονείκει
  english_pob_choice: kept contending
  chosen_spanish: seguía disputando
  alternatives_spanish:
  - persistía en contender
  - continuaba discutiendo
  lexicon: LSJ
  rationale: Captura la insistencia y la oposición de ella, sin reducir el matiz a una simple conversación.
- source_word: προσετιθέμην νηστείαν καὶ προσευχήν
  english_pob_choice: I added fasting and prayer
  chosen_spanish: añadí ayuno y oración
  alternatives_spanish:
  - sumé ayuno y oración
  - me añadí a ayuno y oración
  lexicon: BDAG
  rationale: Sigue de cerca la construcción griega y conserva la yuxtaposición memorable de las dos disciplinas espirituales.
theological_decisions:
- issue: Lectura de la súplica en v. 13
  english_pob_reading: the God of my fathers
  chosen_spanish_reading: el Dios de mis padres
  alternative_spanish_readings:
  - Dios
  - el Dios
  rationale: La tradición textual es inestable, pero el contexto patriarcal favorece la referencia ancestral explícita. Se conserva sin armonizarla silenciosamente.
  doctrine_reference: Primacía del testimonio textual y reconocimiento de variante textual/restauración contextual.
- issue: Posesivo en ἐνώπιον Κυρίου σου
  english_pob_reading: before your Lord
  chosen_spanish_reading: delante de tu Señor
  alternative_spanish_readings:
  - delante del Señor
  - delante de tu Dios
  rationale: Se mantiene el posesivo de la fuente griega, aunque resulte menos habitual en español religioso, para no borrar el rasgo del testigo.
  doctrine_reference: Primacía de la lengua fuente sobre fórmulas litúrgicas heredadas.
- issue: Énfasis moral de la pureza en v. 16
  english_pob_reading: pure heart and undefiled lips
  chosen_spanish_reading: corazón puro y labios sin mancha
  alternative_spanish_readings:
  - corazón limpio y labios inmaculados
  - corazón puro y boca sin mancha
  rationale: Se preserva el paralelismo moral interno/externo sin convertir el texto en una abstracción doctrinal; ‘labios’ retiene mejor la referencia a la palabra hablada.
  doctrine_reference: Respeto al paralelismo retórico y al alcance ético del lenguaje bíblico.
translation_notes:
  revision_awareness: 'Se incorporó la revisión más reciente del audit trail: se evitó añadir ‘en el suelo’ a χαμοκοιτῶν, se mantuvo la construcción simple de ‘ayuno y oración’, y se ajustó la expresión del lecho para no sobrerrepresentar la frase griega. La redacción española intenta seguir esas correcciones sin perder el registro solemne.'
  spanish_consistency_notes:
  - Se usa ‘Altísimo’ para Ὕψιστος y ‘Señor’ para Κύριος, manteniendo consistencia con el texto fuente y el uso reverente en español.
  - Se traduce σωφροσύνη como ‘dominio propio’ en vez de ‘castidad’ para conservar el alcance ético general del término, aunque el contexto sea sexual.
  - Se mantiene la distinción entre ‘engaño’ (δόλος) y ‘extravío’ (πλάνη) para no fusionar dos nociones distintas.
  - ‘Labios’ se usa para στόμασιν porque en español transmite mejor la función de habla pura sin perder el paralelismo con el corazón.
  - Los marcadores de nota se anclan solo donde hay una alternativa significativa o una precisión textual requerida por el audit trail.
