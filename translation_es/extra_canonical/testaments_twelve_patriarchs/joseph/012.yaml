base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/012.yaml
  text: '3[a]. And the chief of them said to me, “You are not a slave, for your appearance also makes it plain.” But I told them plainly that I was their slave. 4. And when we had come into Egypt, they disputed concerning me, as to who would threaten the merchant and receive money for me. 5. So it seemed good to all of them to leave me in Egypt with the merchant of their trade until they should return bringing merchandise[b]. 6. But the Lord gave me favor in the eyes of the merchant, and he entrusted his house to me. 7. And God blessed him in my hands, and increased him on my account in gold and silver and work. 8. And I was with him three months.


    1. Now at that time the wife of Pentephri came down to Memphis with great display, because she had heard about me from her eunuchs. 2. And she said to her husband, “The merchant has grown rich by the hands of a certain young Hebrew; and they say that he was stolen from the land of Canaan. 3. Now therefore execute judgment concerning him, and take the young man into our house, and the God of the Hebrews will bless you[c], because grace from heaven is upon him.”'
  footnotes:
  - marker: a
    text: The Greek text is textually rough in this section; 'they disputed concerning me, as to who would deceive the merchant and receive money for me' may reflect a corrupt or compressed account of the brothers' sale of Joseph.
    reason: textual_variant
  - marker: b
    text: Or 'and increased him on my account in gold and silver and produce/business.' The final term is difficult in the witness used here.
    reason: lexical_alternative
  - marker: c
    text: Pentephri is the Greek form of the Egyptian name often associated with Potiphar/Potiphar's household in Genesis traditions.
    reason: cross_reference
