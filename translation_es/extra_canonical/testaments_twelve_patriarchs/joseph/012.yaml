translation:
  language: es
  text: '3[a]. Y el principal de ellos me dijo: «No eres esclavo, pues tu apariencia también lo deja claro». Pero yo les dije llanamente que era su esclavo. 4. Y cuando llegamos a Egipto, disputaron acerca de mí, sobre quién amenazaría al mercader y recibiría dinero por mí. 5. Así que a todos les pareció bien dejarme en Egipto con el mercader de su comercio hasta que regresaran trayendo mercaderías[b]. 6. Pero el Señor me dio favor a los ojos del mercader, y este me confió su casa. 7. Y Dios lo bendijo por mi mano, y lo multiplicó por mi causa en oro y plata y bienes. 8. Y estuve con él tres meses.



    1. En aquel tiempo, la mujer de Pentefri[c] descendió a Menfis con gran esplendor, porque había oído acerca de mí por sus eunucos. 2. Y le dijo a su marido: «El mercader se ha enriquecido por las manos de cierto joven hebreo, y dicen que fue robado de la tierra de Canaán. 3. Ahora pues, dicta sentencia respecto a él, y toma al joven en nuestra casa, y el Dios de los hebreos te bendecirá, porque hay gracia del cielo sobre él».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El texto griego es textualmente rugoso en esta sección; 'disputaron acerca de mí, sobre quién amenazaría al mercader y recibiría dinero por mí' puede reflejar un relato corrupto o comprimido de la venta de José por sus hermanos.
    reason: textual_variant
  - marker: b
    text: O 'y lo multiplicó por mi causa en oro y plata y producción/negocios.' El término final es difícil en el testigo usado aquí.
    reason: lexical_alternative
  - marker: c
    text: Pentefri es la forma griega del nombre egipcio frecuentemente asociado con Potifar/casa de Potifar en las tradiciones de Génesis.
    reason: cross_reference
lexical_decisions:
- source_word: δοῦλος
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - servidor
  lexicon: LSJ
  rationale: 'Política POB: δοῦλος → ''slave/esclavo'' donde la naturaleza de servidumbre forzada es saliente. Aquí el contexto es la venta de José y su estatus bajo propiedad.'
- source_word: ἡ ὄψις σου δηλοῖ
  english_pob_choice: your appearance also makes it plain
  chosen_spanish: tu apariencia también lo deja claro
  alternatives_spanish:
  - tu rostro lo muestra
  - tu aspecto lo revela
  lexicon: LSJ
  rationale: 'δηλόω: hacer evidente, revelar. ''Apariencia'' encaja con ὄψις y conserva la inferencia a partir del porte de José.'
- source_word: μετάβολος
  english_pob_choice: merchant
  chosen_spanish: mercader
  alternatives_spanish:
  - comerciante
  - tratante
  - negociante
  lexicon: LSJ
  rationale: En este capítulo el POB usa 'merchant'; en cap. 13 cambia a 'broker'. 'Mercader' es idiomático y elevado para el comerciante que trafica con personas y mercancías.
- source_word: ἐπίστευσέ μοι τὸν οἶκον αὐτοῦ
  english_pob_choice: he entrusted his house to me
  chosen_spanish: me confió su casa
  alternatives_spanish:
  - puso su casa a mi cargo
  - encomendó su casa a mí
  lexicon: LSJ
  rationale: El idioma transmite supervisión delegada del hogar; 'me confió su casa' es conciso y conserva el sentido de mayordomía.
- source_word: ἐν χειρί μου
  english_pob_choice: in my hand
  chosen_spanish: por mi mano
  alternatives_spanish:
  - en mi mano
  - a través de mí
  - bajo mi mano
  lexicon: LSJ
  rationale: Idioma bíblico recurrente de agencia y administración; 'por mi mano' conserva el matiz instrumental en estilo testamentario, siguiendo la revisión POB de 'hands' a 'hand' (singular griego).
- source_word: ἔργῳ
  english_pob_choice: goods
  chosen_spanish: bienes
  alternatives_spanish:
  - obra
  - hacienda
  - producción
  - negocios
  lexicon: LSJ
  rationale: El testigo OCR es difícil aquí, pero ἔργῳ probablemente amplía la lista más allá de metales preciosos hacia empresa productiva o actividad de hacienda; sigo la revisión POB de 'work' a 'goods' por contexto material; 'bienes' lo refleja en español.
- source_word: μετὰ δόξης πολλῆς
  english_pob_choice: with great splendor
  chosen_spanish: con gran esplendor
  alternatives_spanish:
  - con gran pompa
  - con mucha gloria
  lexicon: LSJ
  rationale: δόξα aquí denota magnificencia exterior, no gloria abstracta; 'esplendor' es más natural y formal que 'despliegue', siguiendo la revisión POB.
- source_word: εὐνοῦχοι
  english_pob_choice: eunuchs
  chosen_spanish: eunucos
  alternatives_spanish:
  - chambelanes
  - oficiales de la corte
  lexicon: LSJ
  rationale: El término griego literalmente denota eunucos, aunque puede extenderse a oficiales de la corte; el contexto cortesano egipcio sostiene el sentido literal.
- source_word: κρίσιν
  english_pob_choice: render judgment concerning him
  chosen_spanish: dicta sentencia respecto a él
  alternatives_spanish:
  - pronuncia juicio sobre él
  - abre proceso
  - lleva a cabo el juicio
  lexicon: LSJ
  rationale: La petición de la esposa es de adjudicación formal o acción legal sobre el estatus de José; 'dictar sentencia' conserva la fuerza judicial en registro elevado; sigo la revisión POB.
- source_word: χάρις ἐκ τοῦ οὐρανοῦ ἐστι πρὸς αὐτόν
  english_pob_choice: grace from heaven is upon him
  chosen_spanish: hay gracia del cielo sobre él
  alternatives_spanish:
  - el favor del cielo está con él
  - tiene gracia del cielo
  lexicon: LSJ
  rationale: χάρις aquí denota favor divino (glosario POB → 'gracia'); 'sobre él' refleja la fuerza direccional de πρός en español idiomático y conserva el sentido del favor celestial reposando sobre José.
- source_word: ὁ Κύριος / ὁ Θεὸς
  english_pob_choice: the Lord (v.6) / God (v.7)
  chosen_spanish: el Señor / Dios
  lexicon: BDAG
  rationale: El testigo griego distingue ὁ Κύριος y ὁ Θεὸς en versículos contiguos; conservo esa variación en español ('el Señor' / 'Dios') siguiendo la decisión teológica POB de no armonizar.
theological_decisions:
- issue: Rendición de κύριος / θεός en el ascenso providencial de José
  chosen_reading: Traducidos como 'el Señor' en v. 6 y 'Dios' en v. 7 según las formas griegas presentes.
  alternative_readings:
  - Armonizar ambos como 'Dios'
  - Armonizar ambos como 'el Señor Dios'
  rationale: El testigo griego distingue ὁ Κύριος y ὁ Θεός en versículos contiguos. Preservar esa variación respeta la fuente en lugar de suavizarla.
  doctrine_reference: 'DOCTRINE.md: traducir títulos y preservar las distinciones de la lengua original donde sea posible.'
- issue: Segmentación narrativa después de v. 8
  chosen_reading: Traducido el griego que sobrevive como capítulo continuo con una nueva escena que comienza en la unidad numerada siguiente.
  alternative_readings:
  - Intentar reconstruir el material conectivo perdido
  - Armonizar directamente con Génesis 39
  rationale: El testigo OCR es textualmente rugoso y parece cambiar de escena abruptamente. La traducción sigue el griego existente sin importar fraseo de Génesis o de traducciones posteriores.
  doctrine_reference: 'PHILOSOPHY.md: primacía y transparencia del idioma original en lugar de armonización silenciosa.'
translation_notes:
  revision_awareness: 'Sigo las revisiones POB del capítulo: (1) ''plainly told them'' → orden ajustado; (2) ''deceive the merchant'' → ''threaten the merchant'' por ἠπείλει; (3) ''stolen away by theft'' → simplificado a ''stolen'' (en español ''fue robado''); (4) ''execute judgment with him'' → ''render judgment concerning him'' (''dicta sentencia respecto a él''); (5) ''great display'' → ''great splendor'' (''gran esplendor''); (6) ''in my hands'' → ''in my hand'' (''por mi mano''); (7) ''work'' → ''goods'' (''bienes'').'
  spanish_consistency_notes:
  - '''esclavo'' para δοῦλος conforme política POB'
  - '''mercader'' para μετάβολος en cap. 12 (cap. 13 usará ''corredor/intermediario'')'
  - '''el Señor'' para Κύριος vs ''Dios'' para Θεός — preservar distinción'
  - '''por mi mano'' para ἐν χειρί μου'
  - '''gracia'' para χάρις (glosario POB)'
  - '''esplendor'' para δόξα material'
  - '''eunucos'' para εὐνοῦχοι'
  - '''dicta sentencia'' para ποίησον κρίσιν'
  - '''Pentefri'' transliteración estándar de Πεντεφρὶ'
