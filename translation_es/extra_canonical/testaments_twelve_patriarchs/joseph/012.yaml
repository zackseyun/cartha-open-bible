  text: (XI continued.)  2. *Ἐρχόμενος δὲ¹⁰ *μετὰ τῶν Ἰσμαϊλιτῶν¹¹ *ἐπηρώτων με λέγοντες· Δοῦλος εἶ; Κἀγὼ εἶπον¹² ὅτι δοῦλός¹³ εἰμι¹⁴ ἐξ οἴκου¹⁵, ἵνα μὴ αἰσχύνω τοὺς ἀδελφούς μου. 3. Λέγει δέ μοι ὁ μείζων αὐτῶν¹⁶· *Οὐκ εἶ δοῦλος¹⁷, ὅτι καὶ¹⁸ ἡ ὄψις σου δηλοῖ¹⁹. Ἐγὼ δὲ *λέγω αὐτοῖς²⁰ ὅτι¹⁸ δοῦλος ⌜αὐτῶν⌝ ὑπάρχω²¹. 4. Ὡς δὲ *εἰς Αἴγυπτον ἐφθάσαμεν ἐμάχοντο περὶ ἐμοῦ τὸ²² *τίς προδοὺς χρυσίον λάβῃ με²³. 5. Διὰ πᾶσιν ἔδοξεν *τοῦ εἶναι²⁴ με εἰς Αἴγυπτον πρὸς *τὸν μετάβολον τῆς ἐμπορίας²⁵ αὐτῶν, ἕως ὅτου²⁶ ἐπιστρέψουσιν²⁷ φέροντες²⁸ ἐμπορίαν²⁹. 6. *Ὁ δὲ Κύριος ἔδωκέ μοι³⁰ χάριν ἐν ὀφθαλμοῖς τοῦ μεταβόλου καὶ ἐπίστευσέ³¹ μοι τὸν οἶκον αὐτοῦ. 7. Καὶ εὐλόγησεν αὐτὸν *ὁ Θεὸς³² ἐν³³ χειρί μου, καὶ ἐπλήθυνεν *αὐτὸν ἐν χρυσίῳ καὶ ἀργυρίῳ³⁴ ⌜καὶ ἔργῳ³⁵⌝. 8. Καὶ ἤμην μετὰ αὐτοῦ³⁶ *μῆνας τρεῖς³⁷. XII. Κατ᾽ ἐκεῖνον δὲ¹ τὸν καιρὸν κατῆει² Μεμφίς³ †ἐν λαμπήνῃ†⁴ *ἡ γυνὴ⁵ τοῦ Πεντεφρὶ⁶ ⌜μετὰ δόξης πολλῆς, ὅτι ἤκουσε περὶ ἐμοῦ παρὰ τῶν εὐνούχων αὐτῆς⁷. 2. *Καὶ λέγει τῷ ἀνδρὶ αὐτῆς⁸, *ὅτι ἐπλούτησεν ὁ μετάβολος⁹
    ἐν χερσίν¹⁰ *τινος νέου¹¹ Ἑβραίου, λέγουσι¹² δὲ ὅτι ⌜καὶ¹³ κλοπῇ ἔκλεψαν¹⁴ αὐτὸν¹⁵ ἐκ γῆς¹⁶ Χαναάν. 3. Νῦν οὖν ποίησον μετ᾿ αὐτοῦ¹⁷ κρίσιν, καὶ ἀφελοῦ¹⁸ τὸν νεανίαν¹⁹ εἰς *τὸν οἶκον ἡμῶν²⁰, καὶ *εὐλογῆσαί σε ἔχει²¹ *ὁ Θεὸς τῶν Ἑβραίων²², ὅτι χάρις *ἐκ τοῦ²³ οὐρανοῦ ἐστι *πρὸς αὐτόν²⁴.
