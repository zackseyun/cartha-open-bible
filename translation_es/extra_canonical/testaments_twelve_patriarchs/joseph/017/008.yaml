source:
  edition: Charles 1908 Greek Versions (pages 256-287, Joseph pilot)
  text: Καὶ οὐχ ὕψωσα ἐμαυτὸν³⁹ ἐν αὐτοῖς ⌜ἐν ἀλαζονείᾳ⌉, διὰ τὴν ⌜κοσμικήν⌉ μου δόξαν⁴⁰, ⌜ἀλλ᾿⁴¹ ἤμην ἐν αὐτοῖς ὡς εἷς τῶν ἐλαχίστων⁴².
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/017/008.yaml
  text: And I did not exalt myself among them in arrogance because of my worldly glory, but I was among them as one of the least.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:42Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Y no me ensalcé[a] entre ellos con arrogancia a causa de mi gloria mundana, sino que estuve entre ellos como uno de los más pequeños.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente ''no me elevé/exalté''. El verbo ὑψόω en este caso es reflexivo: José niega haberse engreído ante sus hermanos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐχ ὕψωσα ἐμαυτὸν
  english_pob_choice: did not exalt myself
  chosen_spanish: no me ensalcé
  alternatives_spanish:
  - no me enaltecí
  - no me exalté
  lexicon: BDAG
  rationale: '''Ensalzar'' es el equivalente clásico-castellano más natural de ὑψόω en sentido reflexivo; ''exaltar'' sería igualmente válido pero más latinizante.'
- source_word: ἀλαζονεία
  english_pob_choice: arrogance
  chosen_spanish: arrogancia
  alternatives_spanish:
  - jactancia
  - ostentación
  - presunción
  lexicon: BDAG
  rationale: El término nombra la jactancia altiva. 'Arrogancia' es directo y se ajusta a la advertencia ejemplar de José.
- source_word: κοσμική δόξα
  english_pob_choice: worldly glory
  chosen_spanish: gloria mundana
  alternatives_spanish:
  - esplendor terrenal
  - honor mundano
  lexicon: LSJ
  rationale: La frase refiere al estatus externo y la magnificencia de José en Egipto. 'Gloria mundana' preserva tanto la grandeza como su carácter meramente mundano.
- source_word: ἐλαχίστων
  english_pob_choice: the least
  chosen_spanish: los más pequeños
  alternatives_spanish:
  - los menores
  - los más humildes
  - los ínfimos
  lexicon: BDAG
  rationale: El superlativo subraya la humildad de José entre sus hermanos. 'Uno de los más pequeños' es idiomático y preserva el contraste con su alto estatus.
translation_notes:
  revision_awareness: El pase de revisión inglés no introdujo cambios. Mantengo el contraste entre 'gloria mundana' y la humildad voluntaria.
  spanish_consistency_notes:
  - '''ensalzar'' para ὑψόω'
  - '''arrogancia'' para ἀλαζονεία'
  - '''gloria mundana'' para κοσμική δόξα'
  - '''los más pequeños'' para ἐλάχιστοι'
