id: T12P.JOS.17.3
reference: Testament of Joseph 17:3
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 256-287, Joseph pilot)
  text: Τέρπεται γὰρ⁸ ὁ θεὸς⁷ ⌜ἐπὶ⌉ *ὁμονοίᾳ ἀδελφῶν⁸ καὶ⁷ ἐπὶ προαιρέσει καρδίας⁹ ⌜ἀγαθῆς⌉¹⁰ †εὐδοκοῦσιν¹¹ εἰς ἀγαθόν¹².
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/017/003.yaml
  text: For God delights in the harmony of brothers and in the good intention of the heart.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:41Z'
    unchanged: false
    changes_summary: Simplified the final clause for closer alignment with the Greek, replacing the interpretive 'that intends what is good' with 'the good intention of the heart,' which more directly reflects προαιρέσει καρδίας ἀγαθῆς and avoids unnecessary expansion.
translation:
  language: es
  text: Pues Dios se deleita en la concordia de hermanos[a] y en la buena intención del corazón[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Concordia'' traduce ὁμόνοια, literalmente ''misma mente'' o ''unanimidad de pensamiento entre hermanos''.'
    reason: lexical_alternative
  - marker: b
    text: 'La cláusula sobre el ''propósito de un buen corazón'' es textualmente difícil en el testimonio griego; la traducción sigue el sentido ético aparente: un corazón dispuesto al bien.'
    reason: textual_variant
lexical_decisions:
- source_word: Τέρπεται
  english_pob_choice: delights
  chosen_spanish: se deleita
  alternatives_spanish:
  - se complace
  - se goza
  lexicon: BDAG
  rationale: '''Deleitarse'' captura la connotación de placer/gozo de τέρπομαι; ''se complace'' sería igualmente válido pero menos vívido.'
- source_word: ὁ θεὸς
  english_pob_choice: God
  chosen_spanish: Dios
  lexicon: BDAG
  rationale: 'Glosario POB estándar: θεός → Dios.'
- source_word: ὁμονοία ἀδελφῶν
  english_pob_choice: harmony of brothers
  chosen_spanish: concordia de hermanos
  alternatives_spanish:
  - armonía de hermanos
  - unanimidad de hermanos
  lexicon: BDAG
  rationale: '''Concordia'' es el equivalente clásico-castellano más exacto de ὁμόνοια (literalmente ''misma mente''); ''armonía'' sería más musical-metafórico.'
- source_word: προαίρεσις καρδίας ἀγαθῆς
  english_pob_choice: good intention of the heart
  chosen_spanish: buena intención del corazón
  alternatives_spanish:
  - buen propósito del corazón
  - buena disposición del corazón
  lexicon: BDAG
  rationale: Después de la revisión inglesa, se prefiere la formulación más cercana al griego ('buena intención del corazón') sobre la expansión interpretativa anterior.
theological_decisions:
- issue: Cláusula textualmente difícil en v. 3
  chosen_reading: Traducir el sentido como 'la buena intención del corazón'
  alternative_readings:
  - en una resolución de buen corazón complaciente para el bien
  - en la elección de un buen corazón que se complace en el bien
  rationale: 'El testimonio griego es algo inestable en esta cláusula, pero el sentido ético es claro: Dios se deleita en la concordia fraternal y en la intención interior dirigida al bien. La traducción preserva ese sentido sin reconstrucción excesiva, siguiendo la revisión inglesa que simplificó la versión anterior.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: El pase de revisión inglés simplificó la cláusula final, sustituyendo la interpretativa 'que se propone lo bueno' por 'la buena intención del corazón', más cercana al griego προαιρέσει καρδίας ἀγαθῆς. La traducción española sigue esa simplificación.
  spanish_consistency_notes:
  - '''Dios'' para θεός'
  - '''concordia'' para ὁμόνοια en este capítulo'
  - '''corazón'' para καρδία'
  - alineación con la revisión inglesa de 2026-04-23
