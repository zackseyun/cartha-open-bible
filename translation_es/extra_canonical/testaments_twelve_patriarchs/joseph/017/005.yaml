base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/017/005.yaml
  text: And after the death of Jacob my father, I loved them even more, and whatever they wanted I did for them beyond measure.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:41Z'
