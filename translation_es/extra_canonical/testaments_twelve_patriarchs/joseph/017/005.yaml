translation:
  language: es
  text: Y después de la muerte de Jacob, mi padre, los amé aún más, y todo lo que querían lo hacía por ellos sin medida[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego ὑπερεκπερισσοῦ es un adverbio intensivo poco común que subraya generosidad sobreabundante; 'sin medida' refleja esa fuerza.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰακώβ
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  lexicon: HALOT
  rationale: Forma castellana estándar del nombre patriarcal.
- source_word: περισσοτέρως ἠγάπησα
  english_pob_choice: I loved them even more
  chosen_spanish: los amé aún más
  alternatives_spanish:
  - los amé todavía más
  - los amé en mayor medida
  lexicon: BDAG
  rationale: '''Aún más'' captura el comparativo intensivo περισσοτέρως de manera natural y concisa.'
- source_word: ὑπερεκπερισσοῦ
  english_pob_choice: beyond measure
  chosen_spanish: sin medida
  alternatives_spanish:
  - en abundancia desbordante
  - sobreabundantemente
  - más allá de toda medida
  lexicon: BDAG
  rationale: Este adverbio intensivo enfatiza la generosidad extraordinaria. 'Sin medida' es idiomático en español y preserva el sentido de exceso superabundante.
- source_word: ἐποίουν αὐτοῖς
  english_pob_choice: I did for them
  chosen_spanish: lo hacía por ellos
  alternatives_spanish:
  - lo hacía para ellos
  - se lo realizaba
  lexicon: LSJ
  rationale: 'Imperfecto durativo: la acción se sostenía continuamente. ''Por ellos'' captura la dirección benefactiva del dativo griego.'
translation_notes:
  revision_awareness: El pase de revisión inglés no introdujo cambios. Conservo el contraste entre el imperfecto durativo (acción continuada) y el adverbio superlativo.
  spanish_consistency_notes:
  - '''Jacob'' para Ἰακώβ'
  - '''sin medida'' para ὑπερεκπερισσοῦ'
  - uso de imperfecto para acción habitual/continuada
