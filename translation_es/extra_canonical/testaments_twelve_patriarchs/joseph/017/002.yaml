source:
  edition: Charles 1908 Greek Versions (pages 256-287, Joseph pilot)
  text: Καὶ ὑμεῖς ⌜οὖν⌉ ἀγαπᾶτε ἀλλήλους, ⌜καὶ ἐν μακροθυμίᾳ⁴ *συγκρύπτετε ἀλλήλων⁵ τὰ ἐλαττώματα⁷.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/017/002.yaml
  text: You also, therefore, love one another, and with patience conceal one another’s shortcomings.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:40Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Por tanto, también ustedes ámense unos a otros, y con paciencia oculten[a] las faltas unos de otros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'cubran las fallas unos de otros'. El verbo griego sugiere no exponer duramente las faltas del hermano.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀγαπᾶτε ἀλλήλους
  english_pob_choice: love one another
  chosen_spanish: ámense unos a otros
  alternatives_spanish:
  - amaos los unos a los otros
  lexicon: BDAG
  rationale: Forma reflexiva-recíproca natural en español neutro latinoamericano; 'amaos' resulta peninsular/arcaico.
- source_word: μακροθυμία
  english_pob_choice: patience
  chosen_spanish: paciencia
  alternatives_spanish:
  - longanimidad
  - tolerancia
  lexicon: BDAG
  rationale: '''Paciencia'' es legible y moderno; el imperativo siguiente preserva el peso ético de la exhortación.'
- source_word: συγκρύπτετε
  english_pob_choice: conceal
  chosen_spanish: oculten
  alternatives_spanish:
  - cubran
  - encubran
  lexicon: LSJ
  rationale: '''Ocultar'' mantiene la fuerza exhortativa sin implicar engaño; se refiere a no exponer las faltas del hermano.'
- source_word: ἐλαττώματα
  english_pob_choice: shortcomings
  chosen_spanish: faltas
  alternatives_spanish:
  - defectos
  - fallas
  - deficiencias
  lexicon: LSJ
  rationale: '''Faltas'' encaja con la exhortación moral y evita lenguaje demasiado clínico o severo.'
theological_decisions:
- issue: Exhortación ética a 'ocultar' las faltas de los hermanos
  chosen_reading: Traducir συγκρύπτετε ἀλλήλων τὰ ἐλαττώματα como 'oculten las faltas unos de otros'
  alternative_readings:
  - cubran las fallas unos de otros
  - encubran las faltas mutuas
  rationale: La línea enseña la no-exposición paciente y fraterna de las faltas, no la negación del pecado. 'Ocultar' preserva la ética familiar de misericordia sin importar fórmulas doctrinales posteriores.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 4, 5
translation_notes:
  revision_awareness: El pase de revisión inglés no introdujo cambios. Se conserva la fuerza exhortativa fraterna.
  spanish_consistency_notes:
  - uso de 'ustedes'/imperativos en -an/-en (neutro latinoamericano)
  - '''paciencia'' para μακροθυμία'
  - '''ocultar'' para συγκρύπτω'
  - '''faltas'' para ἐλαττώματα'
