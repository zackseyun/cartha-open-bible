source:
  edition: Charles 1908 Greek Versions (pages 256-287, Joseph pilot)
  text: '*Ὅτε ⌜δὲ⌉¹³ ἦλθον οἱ ἀδελφοί μου εἰς Αἴγυπτον, αὐτοὶ¹⁴ γινώσκουσιν¹⁵ ὅτι *ἀπέστρεψα τὸ ἀργύριον αὐτοῖς¹⁶, καὶ οὐκ ὠνείδισα *αὐτούς, καὶ¹⁷ παρεκάλεσα¹⁸ ⌜αὐτούς⌉¹⁹.'
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/017/004.yaml
  text: And when my brothers came to Egypt, they themselves know that I returned their money to them, and did not reproach them, but encouraged them.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:40Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Y cuando mis hermanos vinieron a Egipto, ellos mismos saben que les devolví su dinero, y no los reproché, sino que los consolé[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Alternativamente 'los animé' o 'los exhorté'. El verbo griego παρακαλέω cubre todo el espectro de consuelo, ánimo y exhortación; el contexto de reconciliación favorece el sentido reasegurador.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέστρεψα τὸ ἀργύριον αὐτοῖς
  english_pob_choice: returned their money to them
  chosen_spanish: les devolví su dinero
  alternatives_spanish:
  - restituí su plata
  - regresé su dinero
  lexicon: LSJ
  rationale: '''Devolver'' es el verbo natural en español para esta acción; ''plata'' (por dinero) es regional y se evita en español neutro.'
- source_word: ὠνείδισα
  english_pob_choice: reproach
  chosen_spanish: reproché
  alternatives_spanish:
  - insulté
  - reprendí
  - vituperé
  lexicon: BDAG
  rationale: '''Reprochar'' encaja con el estilo testamentario elevado y mantiene el registro moral; José subraya que no avergonzó verbalmente a sus hermanos.'
- source_word: παρεκάλεσα
  english_pob_choice: encouraged
  chosen_spanish: consolé
  alternatives_spanish:
  - alenté
  - exhorté
  - animé
  lexicon: BDAG
  rationale: παρακαλέω puede significar consolar, exhortar o animar. En esta escena de reconciliación, 'consolar' captura mejor el trato tranquilizador y reasegurador de José hacia sus hermanos atemorizados.
translation_notes:
  revision_awareness: El pase de revisión inglés no introdujo cambios. Mantengo la lectura directa que destaca la conducta restauradora de José.
  spanish_consistency_notes:
  - '''reprochar'' para ὀνειδίζω'
  - '''consolar'' para παρακαλέω en contexto de reconciliación'
  - uso de pretérito simple para narración testamentaria
