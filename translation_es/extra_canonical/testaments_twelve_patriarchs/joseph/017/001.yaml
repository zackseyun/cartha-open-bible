translation:
  language: es
  text: Vean entonces, hijos míos, cuánto soporté para no avergonzar a mis hermanos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ὁρᾶτε
  english_pob_choice: See
  chosen_spanish: Vean
  alternatives_spanish:
  - Miren
  - Observen
  lexicon: LSJ
  rationale: Imperativo plural de ὁράω. Se usa 'vean' (ustedes) en español neutro latinoamericano, dirigido a los hijos del patriarca.
- source_word: τέκνα μου
  english_pob_choice: my children
  chosen_spanish: hijos míos
  alternatives_spanish:
  - mis hijos
  - mis pequeños
  lexicon: LSJ
  rationale: '''Hijos míos'' suena natural en discurso testamentario en español; conserva el vocativo afectuoso.'
- source_word: ὑπέμεινα
  english_pob_choice: I endured
  chosen_spanish: soporté
  alternatives_spanish:
  - aguanté
  - padecí
  lexicon: BDAG
  rationale: '''Soportar'' captura tanto la resistencia como el sufrimiento implícitos en ὑπομένω; ''aguanté'' sería demasiado coloquial.'
- source_word: αἰσχύνω
  english_pob_choice: put ... to shame
  chosen_spanish: avergonzar
  alternatives_spanish:
  - deshonrar
  - afrentar
  lexicon: BDAG
  rationale: '''Avergonzar'' preserva la fuerza relacional y la moderación moral de José mejor que ''deshonrar'', que sería más severo.'
translation_notes:
  revision_awareness: El pase de revisión inglés no introdujo cambios. La traducción mantiene la lectura directa.
  spanish_consistency_notes:
  - '''hijos míos'' como vocativo testamentario estándar'
  - '''avergonzar'' para αἰσχύνω en este capítulo'
  - uso de 'vean'/'ustedes' (Latin-American neutro) en lugar de 'vosotros'
