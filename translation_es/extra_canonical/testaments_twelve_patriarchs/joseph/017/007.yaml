source:
  edition: Charles 1908 Greek Versions (pages 256-287, Joseph pilot)
  text: ⌜Καὶ⌉³⁰ οἱ υἱοὶ *αὐτῶν υἱοί μου³¹, *καὶ οἱ υἱοί μου ὡς δοῦλοι αὐτῶν³², καὶ³³ ἡ ψυχὴ *αὐτῶν ψυχή μου³⁴, καὶ πᾶν ἄλγημα³⁵ αὐτῶν ἄλγημά μου³⁶, ⌜καὶ πᾶσα μαλακία αὐτῶν *ἀσθένειά μου, καὶ³⁷ ἡ βουλὴ³⁷⌉ αὐτῶν βουλή μου³⁸.
