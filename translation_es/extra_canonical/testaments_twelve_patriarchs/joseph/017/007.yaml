base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/017/007.yaml
  text: And their sons were my sons, and my sons were as slaves to them, and their souls were my soul, and every pain of theirs was my pain, and every weakness of theirs was my sickness, and their purpose was my purpose.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:42Z'
    unchanged: false
    changes_summary: Changed 'their soul was' to 'their souls were' to match the plural subject οἱ υἱοὶ αὐτῶν / αὐτῶν and improve grammatical agreement in English; otherwise retained the draft.
translation:
  language: es
  text: Y los hijos de ellos eran mis hijos, y mis hijos eran como esclavos[a] para ellos, y sus almas eran mi alma, y todo dolor de ellos era mi dolor, y toda enfermedad de ellos era mi padecimiento, y su voluntad era mi voluntad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Esclavos'' traduce el griego douloi. La formulación es deliberadamente fuerte y expresa la humildad de José y la subordinación de su propia casa ante sus hermanos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δοῦλοι
  english_pob_choice: slaves
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  lexicon: BDAG
  rationale: Conforme a la doctrina del proyecto, δοῦλος se traduce 'esclavo' donde el estatus de servidumbre es saliente. Aquí José enfatiza humildad radical y subordinación de su propia casa a sus hermanos.
- source_word: ψυχή
  english_pob_choice: soul
  chosen_spanish: alma
  alternatives_spanish:
  - vida
  - ser interior
  lexicon: BDAG
  rationale: '''Alma'' preserva el paralelismo enfático del texto. Ajustado en plural (''almas''/''alma'') tras la revisión inglesa que corrigió la concordancia gramatical.'
- source_word: ἄλγημα
  english_pob_choice: pain
  chosen_spanish: dolor
  alternatives_spanish:
  - sufrimiento
  - pesar
  lexicon: LSJ
  rationale: '''Dolor'' preserva el paralelismo y la identificación emocional (''todo dolor de ellos era mi dolor'').'
- source_word: μαλακία
  english_pob_choice: weakness
  chosen_spanish: enfermedad
  alternatives_spanish:
  - debilidad
  - flaqueza
  lexicon: BDAG
  rationale: En este contexto refiere a fragilidad física o dolencia, no a blandura moral. 'Enfermedad' empareja naturalmente con 'padecimiento' siguiente y es más natural en español que 'flaqueza'.
- source_word: ἀσθένεια
  english_pob_choice: sickness
  chosen_spanish: padecimiento
  alternatives_spanish:
  - dolencia
  - enfermedad
  lexicon: BDAG
  rationale: Como μαλακία ya cubre 'enfermedad', traducir ἀσθένεια como 'padecimiento' preserva la distinción retórica entre fragilidad y sufrimiento similar al de una dolencia.
- source_word: βουλή
  english_pob_choice: purpose
  chosen_spanish: voluntad
  alternatives_spanish:
  - propósito
  - consejo
  - designio
  lexicon: BDAG
  rationale: '''Voluntad'' captura la fuerza identificativa (''su voluntad era mi voluntad'') de manera concisa en español; ''propósito'' resultaría más abstracto.'
theological_decisions:
- issue: Traducción de δοῦλοι en v. 7
  chosen_reading: Usar 'esclavos' en lugar de 'siervos'
  alternative_readings:
  - siervos
  - servidores
  rationale: El texto presenta a los hijos de José en una posición de subordinación real ante sus hermanos, como expresión de humildad. La doctrina del proyecto prefiere 'esclavo' donde el estatus de servidumbre es activo y saliente.
  doctrine_reference: 'DOCTRINE.md §Contested terms: δοῦλος'
translation_notes:
  revision_awareness: El pase de revisión inglés cambió 'their soul was' a 'their souls were' para concordar con el sujeto plural οἱ υἱοὶ αὐτῶν / αὐτῶν. La traducción española mantiene 'sus almas eran mi alma' siguiendo la concordancia gramatical corregida.
  spanish_consistency_notes:
  - '''esclavos'' para δοῦλος conforme a la doctrina del proyecto'
  - concordancia plural en 'sus almas' (alineado con la revisión inglesa)
  - '''enfermedad''/''padecimiento'' para distinguir μαλακία/ἀσθένεια'
  - '''voluntad'' para βουλή'
