id: T12P.JOS.17.6
reference: Testament of Joseph 17:6
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 256-287, Joseph pilot)
  text: '*Καὶ οὐκ ἀφῆκα²⁵ αὐτοὺς²⁶ θλιβῆναι *ἕως μικροῦ πράγματος²⁷. καίγε πᾶν ὃ ἦν ἐν τῇ²⁸ χειρί μου αὐτοῖς δέδωκα²⁹.'
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/017/006.yaml
  text: And I did not allow them to be distressed even in the smallest matter; indeed, everything that was in my hand I gave to them.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:42Z'
    unchanged: false
    changes_summary: Replaced 'rather' with 'indeed' to reflect καίγε more accurately as an emphatic/additive particle rather than a contrastive one. Kept the rest unchanged as accurate and natural.
translation:
  language: es
  text: Y no permití que se afligieran[a] ni en el más mínimo asunto; en efecto, todo lo que estaba en mi mano se lo di.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'fueran afligidos'/'padecieran tribulación'. El verbo θλίβω abarca presión, opresión y tribulación.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐκ ἀφῆκα
  english_pob_choice: did not allow
  chosen_spanish: no permití
  alternatives_spanish:
  - no dejé
  - no consentí
  lexicon: BDAG
  rationale: '''No permití'' captura mejor la intencionalidad de José; ''no dejé'' sería igualmente válido pero menos formal.'
- source_word: θλιβῆναι
  english_pob_choice: be distressed
  chosen_spanish: se afligieran
  alternatives_spanish:
  - fueran afligidos
  - padecieran tribulación
  lexicon: BDAG
  rationale: El infinitivo pasivo aquí refiere a experimentar presión o aflicción. 'Afligirse' es lo bastante amplio para el contexto del cuidado práctico de José.
- source_word: ἕως μικροῦ πράγματος
  english_pob_choice: even in the smallest matter
  chosen_spanish: ni en el más mínimo asunto
  alternatives_spanish:
  - ni en lo más pequeño
  - hasta en una cosa pequeña
  lexicon: LSJ
  rationale: Idioma que expresa cuidado integral hasta los detalles menores. La versión escogida es clara y conserva el énfasis totalizador.
- source_word: καίγε
  english_pob_choice: indeed
  chosen_spanish: en efecto
  alternatives_spanish:
  - es más
  - y aun
  lexicon: BDAG
  rationale: Tras la revisión inglesa que cambió 'rather' a 'indeed', se usa 'en efecto' para reflejar καίγε como partícula enfática/aditiva, no contrastiva.
- source_word: δέδωκα
  english_pob_choice: I gave
  chosen_spanish: se lo di
  alternatives_spanish:
  - les entregué
  - les daba
  lexicon: BDAG
  rationale: Perfecto griego con sentido de acción cumplida y resultado permanente; 'se lo di' lo recoge en español de forma natural.
translation_notes:
  revision_awareness: El pase de revisión inglés cambió 'rather' por 'indeed' para reflejar καίγε como partícula enfática/aditiva, no contrastiva. La traducción española sigue ese cambio usando 'en efecto'.
  spanish_consistency_notes:
  - '''afligirse'' para θλίβομαι'
  - '''en efecto'' para καίγε (alineado con la revisión inglesa de 2026-04-23)'
  - '''se lo di'' para δέδωκα'
