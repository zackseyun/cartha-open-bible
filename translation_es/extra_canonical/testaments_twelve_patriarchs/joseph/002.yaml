base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/002.yaml
  text: And this man[a], Pharaoh’s chief cook, entrusted his house to me. And I struggled against a shameless woman who kept pressing me to transgress with her, but the God of my father rescued me from a burning flame. I was imprisoned, I was beaten, I was mocked; and the Lord gave me favor in the sight of the jailer. For the Lord does not abandon those who fear him, not in darkness, or chains, or afflictions, or distress[b]. For God is not ashamed like a man, nor does he grow fearful like a son of man, nor, like one born of earth, does he become weak or terrified. But in all these things he takes the lead[c], and in various ways he gives comfort.
  footnotes:
  - marker: a
    text: Some witnesses or interpreters understand ἀρχιμάγειρος as an official court title rather than a strictly culinary role; compare the Genesis narrative about Joseph in Egypt.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'from a burning flame' is likely metaphorical for the consuming danger of sexual temptation, though the Greek leaves the image itself unexpanded.
    reason: lexical_alternative
  - marker: c
    text: '''He stands over us'' may also be understood as ''he stands by us'' or ''he takes the lead for us''; the Greek verb can carry several related senses of leadership and care.'
    reason: alternative_reading
