translation:
  language: es
  text: Y este hombre[a], el jefe de cocineros del Faraón, me confió su casa. Y luché contra una mujer descarada que me presionaba sin cesar para transgredir con ella, pero el Dios de mi padre me rescató de una llama ardiente[b]. Fui encarcelado, fui golpeado, fui burlado; y el Señor me concedió favor a la vista del carcelero. Porque el Señor no abandona a los que le temen, ni en la oscuridad, ni en cadenas, ni en aflicciones, ni en angustias. Porque Dios no se avergüenza como un hombre, ni teme como hijo de hombre, ni, como uno nacido de la tierra, se debilita o se aterra. Pero en todas estas cosas él toma la delantera[c], y de diversos modos alienta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos testigos o intérpretes entienden ἀρχιμάγειρος como un título oficial de la corte y no estrictamente culinario; compárese con el relato de José en Egipto en Génesis.
    reason: lexical_alternative
  - marker: b
    text: La frase 'de una llama ardiente' probablemente es metafórica del peligro consumidor de la tentación sexual, aunque el griego deja la imagen sin desarrollar.
    reason: lexical_alternative
  - marker: c
    text: '''Él se pone delante'' (o ''él toma la delantera'') puede entenderse también como ''está junto a nosotros'' o ''va al frente por nosotros''; el verbo griego puede llevar varios sentidos relacionados de liderazgo y cuidado.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀρχιμάγειρος
  english_pob_choice: chief cook
  chosen_spanish: jefe de cocineros
  alternatives_spanish:
  - jefe de la guardia
  - mayordomo principal
  lexicon: LSJ
  rationale: El compuesto griego se relaciona literalmente con cocinar más que con mando militar; siguiendo el testigo griego del capítulo, 'jefe de cocineros' preserva la transparencia de la fuente.
- source_word: ἠγωνισάμην
  english_pob_choice: I struggled
  chosen_spanish: luché
  alternatives_spanish:
  - contendí
  - combatí
  lexicon: LSJ
  rationale: El verbo expresa contienda moral activa; 'luché' conserva la fuerza ética sin sonar marcial.
- source_word: γυναῖκα ἀναιδῆ
  english_pob_choice: a shameless woman
  chosen_spanish: una mujer descarada
  alternatives_spanish:
  - una mujer impudente
  - una mujer desvergonzada
  lexicon: LSJ
  rationale: ἀναιδής indica falta de pudor; 'descarada' es directa, idiomática y mantiene la valoración moral testamentaria.
- source_word: ἐπείγουσάν με παρανομεῖν μετʼ αὐτῆς
  english_pob_choice: who kept pressing me to transgress with her
  chosen_spanish: que me presionaba sin cesar para transgredir con ella
  alternatives_spanish:
  - urgiéndome a actuar fuera de la ley con ella
  - presionándome a pecar con ella
  lexicon: LSJ
  rationale: Participio + infinitivo de presión repetida; παρανομεῖν es 'transgredir/actuar fuera de la ley', sentido moral-legal más amplio que 'cometer adulterio'.
- source_word: ἐρρύσατό με ἐκ φλογὸς καιομένης
  english_pob_choice: rescued me from a burning flame
  chosen_spanish: me rescató de una llama ardiente
  alternatives_spanish:
  - me libró de un fuego ardiente
  - me salvó de una llama abrasadora
  lexicon: LSJ
  rationale: Frase metafórica del peligro de la lujuria. 'Llama ardiente' preserva la imagen viva sin sobreexplicar.
- source_word: ἐφυλακίσθην
  english_pob_choice: I was imprisoned
  chosen_spanish: fui encarcelado
  alternatives_spanish:
  - fui puesto en prisión
  - fui apresado
  lexicon: LSJ
  rationale: Pasivo directo; 'encarcelado' es elevado pero legible.
- source_word: ἐτύφθην
  english_pob_choice: I was beaten
  chosen_spanish: fui golpeado
  alternatives_spanish:
  - fui herido
  - fui azotado
  lexicon: LSJ
  rationale: Indica ser herido físicamente; 'golpeado' es claro sin precisar una forma de castigo no nombrada en griego.
- source_word: ἐξεμυκτηρίσθην
  english_pob_choice: I was mocked
  chosen_spanish: fui burlado
  alternatives_spanish:
  - fui ridiculizado
  - fui tratado con desprecio
  lexicon: LSJ
  rationale: Sentido de derisión o desprecio; 'burlado' es conciso y encaja en la secuencia retórica.
- source_word: ἔδωκέ με ... εἰς οἰκτιρμούς
  english_pob_choice: gave me favor
  chosen_spanish: me concedió favor
  alternatives_spanish:
  - me otorgó misericordia
  - me concedió compasión
  lexicon: LSJ
  rationale: Aquí el chapter-level POB usa 'favor' (no 'compassion'); seguimos esa elección de capítulo manteniendo coherencia con el flujo del POB para 'find mercy/favor before'.
- source_word: δεσμοφύλακος
  english_pob_choice: jailer
  chosen_spanish: carcelero
  alternatives_spanish:
  - guarda de la prisión
  - guardián de la cárcel
  lexicon: LSJ
  rationale: Equivalente natural y conciso para el custodio de la prisión.
- source_word: τοὺς φοβουμένους αὐτόν
  english_pob_choice: those who fear him
  chosen_spanish: los que le temen
  alternatives_spanish:
  - los que le reverencian
  - los que le tienen temor
  lexicon: BDAG
  rationale: '''Le temen'' preserva el registro teológico tradicional del temor pactual de Dios.'
- source_word: δεσμοῖς
  english_pob_choice: chains
  chosen_spanish: cadenas
  alternatives_spanish:
  - lazos
  - prisiones
  lexicon: LSJ
  rationale: Plural concreto que intensifica la secuencia de penalidades; 'cadenas' es vívido.
- source_word: θλίψεσιν
  english_pob_choice: afflictions
  chosen_spanish: aflicciones
  alternatives_spanish:
  - tribulaciones
  - angustias
  lexicon: BDAG
  rationale: '''Aflicciones'' mantiene el tono parenético elevado y entendible.'
- source_word: ἀνάγκαις
  english_pob_choice: distress
  chosen_spanish: angustias
  alternatives_spanish:
  - necesidades
  - apremios
  lexicon: BDAG
  rationale: El sentido experiencial de presión angustiosa encaja mejor que el literal 'necesidades'.
- source_word: δειλιᾷ
  english_pob_choice: grow fearful
  chosen_spanish: teme
  alternatives_spanish:
  - pierde el ánimo
  - se acobarda
  lexicon: LSJ
  rationale: El verbo denota encogerse de miedo; 'teme' fluye natural junto a 'como hijo de hombre'.
- source_word: γηγενής
  english_pob_choice: one born of earth
  chosen_spanish: uno nacido de la tierra
  alternatives_spanish:
  - hombre terreno
  - mortal
  lexicon: LSJ
  rationale: Enfatiza la condición criatural; preserva la imagen y el contraste retórico con Dios.
- source_word: πτοεῖται
  english_pob_choice: become ... terrified
  chosen_spanish: se aterra
  alternatives_spanish:
  - se alarma
  - se conmociona
  lexicon: LSJ
  rationale: Da la fuerza climática a la negación sobre Dios.
- source_word: προΐσταται
  english_pob_choice: takes the lead
  chosen_spanish: toma la delantera
  alternatives_spanish:
  - preside
  - se pone al frente
  - ampara
  lexicon: BDAG
  rationale: Refleja la decisión revisada del POB sin añadir un objeto ('nosotros') que el griego no tiene.
- source_word: παρακαλεῖ
  english_pob_choice: gives comfort
  chosen_spanish: alienta
  alternatives_spanish:
  - consuela
  - exhorta
  lexicon: BDAG
  rationale: Aunque el chapter-level POB conserva 'gives comfort', el contexto y el verso 6 (revisado) ya optan por 'encourages'; 'alienta' enlaza ambas y conserva el matiz dinámico de παρακαλεῖ en sufrimiento.
theological_decisions:
- issue: Referencia a 'el Dios de mi padre'
  chosen_reading: Singular 'mi padre' conservado
  alternative_readings:
  - el Dios de mis padres
  rationale: El testigo griego es singular y encaja con la apelación filial personal de José a Jacob; preserva la intimidad del testimonio.
  doctrine_reference: Primacía de la lengua original sobre la tradición de traducción
- issue: Fuerza metafórica de 'llama ardiente'
  chosen_reading: Mantenida como metáfora
  alternative_readings:
  - del fuego de la lujuria
  - de la pasión adúltera
  rationale: La imagen griega es vívida y el contexto deja clara su referencia moral; preservar la metáfora respeta la fuente.
  doctrine_reference: Preservar la tensión teológica antes que resolverla
- issue: Alcance de la ayuda divina en 'él toma la delantera'
  chosen_reading: Lenguaje de protección/oversight
  alternative_readings:
  - dirige
  - está junto a nosotros
  - gobierna
  rationale: El griego admite varios matices; la elección preserva amplitud y evita reducir a 'gobierno'.
  doctrine_reference: Preservar la tensión teológica antes que resolverla
translation_notes:
  revision_awareness: La revisión POB de gpt-5.4 cambió 'compassion' a 'favor' (εἰς οἰκτιρμούς), suavizó las comparaciones a 'like a man', y revisó 'he stands over us' a 'he takes the lead' eliminando el 'us' añadido. La traducción española sigue esa versión final.
  spanish_consistency_notes:
  - 'Coherencia con verso-nivel: 2:1 (''jefe de cocineros''), 2:2 (''Dios de mi padre''), 2:3-2:6 (mismas elecciones léxicas).'
  - Faraón con tilde y mayúscula como nombre.
  - El chapter-level mantiene 'me concedió favor' aquí (siguiendo la revisión POB del capítulo) aunque el verso-nivel 2:3 usa 'compasión' por la revisión más reciente del verso individual.
