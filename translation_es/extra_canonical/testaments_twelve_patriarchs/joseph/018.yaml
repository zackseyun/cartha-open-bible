base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/018.yaml
  text: '1[a]. If, then, you also walk in the commandments of the Lord, God will exalt you with good things forever[b].

    2. And if anyone wants to do evil to you, you, by doing good, pray for him, and you will be delivered from every evil by the Lord.

    3. For see, you yourselves know that through my humility and my long-suffering I took as my wife the daughter of the priest of Heliopolis, and a hundred talents of gold were given to me with her, and my Lord made them subject to me.

    4[d][c]. Even so'
  footnotes:
  - marker: a
    text: Or 'with blessings' for 'in good things'; the Greek phrase is broad and may include both material and moral good.
    reason: lexical_alternative
  - marker: b
    text: '''Long-suffering'' may also be rendered ''patience'' or ''forbearance.'''
    reason: lexical_alternative
  - marker: c
    text: The Greek witness supplied here breaks off at the start of verse 4 ('Even so ...'). The remainder is not translated because it is not present in the provided source text.
    reason: textual_variant
  - marker: d
    text: '''My Lord'' could be read as God, though some may understand it as Joseph''s earthly master in context.'
    reason: alternative_reading
