translation:
  language: es
  text: '1[a]. Si, pues, también ustedes andan en los mandamientos del Señor, Dios los exaltará con bienes[b] para siempre.


    2. Y si alguien quiere hacerles mal, ustedes, haciendo el bien, oren por él, y serán librados de todo mal por el Señor.


    3. Pues miren, ustedes mismos saben que por mi humildad y mi paciencia[c] tomé por esposa a la hija del sacerdote de Heliópolis, y cien talentos de oro me fueron dados con ella, y mi Señor[d] me los sometió.


    4. Aun así'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El testamento se traduce en su forma extant; el v. 4 queda incompleto en la fuente griega provista.
    reason: source_note
  - marker: b
    text: O 'con bendiciones'; la frase griega ἐν ἀγαθοῖς es amplia y puede incluir bien material y moral.
    reason: lexical_alternative
  - marker: c
    text: '''Paciencia'' (μακροθυμία) también puede traducirse ''longanimidad'' o ''tolerancia''.'
    reason: lexical_alternative
  - marker: d
    text: '''Mi Señor'' puede leerse como Dios, aunque algunos lo entienden como el amo terrenal de José en el contexto.'
    reason: alternative_reading
lexical_decisions:
- source_word: πορευθῆτε ἐν ταῖς ἐντολαῖς
  english_pob_choice: walk in the commandments
  chosen_spanish: andan en los mandamientos
  alternatives_spanish:
  - caminan en los mandamientos
  - viven según los mandamientos
  lexicon: LSJ
  rationale: '''Andar en'' conserva el idioma bíblico de la conducta como caminar, registro testamentario y escritural.'
- source_word: ὑψώσει
  english_pob_choice: will exalt
  chosen_spanish: exaltará
  alternatives_spanish:
  - levantará
  - elevará
  lexicon: LSJ
  rationale: '''Exaltar'' preserva el matiz de honor y elevación moral-religiosa.'
- source_word: ἐν ἀγαθοῖς
  english_pob_choice: with good things
  chosen_spanish: con bienes
  alternatives_spanish:
  - con bendiciones
  - con cosas buenas
  lexicon: LSJ
  rationale: '''Con bienes'' mantiene la amplitud del griego (material y moral) sin estrecharlo a prosperidad material.'
- source_word: κακοποιῆσαι
  english_pob_choice: to do evil to
  chosen_spanish: hacerles mal
  alternatives_spanish:
  - dañarles
  - maltratarles
  lexicon: LSJ
  rationale: Conserva el matiz moral del verbo, no solo daño físico.
- source_word: τῇ ἀγαθοεργείᾳ
  english_pob_choice: by doing good
  chosen_spanish: haciendo el bien
  alternatives_spanish:
  - con beneficencia
  - mediante buenas obras
  lexicon: LSJ
  rationale: Expresión natural en español que refleja la práctica activa de la beneficencia.
- source_word: λυτρωθήσεσθε
  english_pob_choice: you will be delivered
  chosen_spanish: serán librados
  alternatives_spanish:
  - serán redimidos
  - serán rescatados
  lexicon: LSJ
  rationale: '''Librados'' captura el rescate divino sin sobrecargar el término con especificidad soteriológica posterior.'
- source_word: ταπείνωσιν
  english_pob_choice: humility
  chosen_spanish: humildad
  alternatives_spanish:
  - bajeza
  - humillación
  lexicon: LSJ
  rationale: El sentido de virtud encaja con la autopresentación de José; 'humillación' enfatizaría pasividad.
- source_word: μακροθυμίαν
  english_pob_choice: long-suffering
  chosen_spanish: paciencia
  alternatives_spanish:
  - longanimidad
  - tolerancia
  lexicon: LSJ
  rationale: '''Paciencia'' es el equivalente natural moderno; ''longanimidad'' resulta arcaizante en español neutro.'
- source_word: κατεδούλωσεν
  english_pob_choice: made them subject to me
  chosen_spanish: me los sometió
  alternatives_spanish:
  - me los esclavizó
  - me los subyugó
  lexicon: LSJ
  rationale: Conserva el lenguaje de sujeción sin forzar una traducción demasiado literal donde el referente es textualmente incierto.
theological_decisions:
- issue: Referencia de 'mi Señor' (Κύριός μου) en v. 3
  chosen_reading: 'se entiende como Dios: ''mi Señor me los sometió'''
  alternative_readings:
  - '''mi amo'' refiriéndose al Faraón'
  - lectura adverbial variante en el aparato
  rationale: Dado el marco moral-teológico consistente del testamento y el contexto inmediato de vindicación divina, el título posesivo se entiende mejor como Dios. La frase se traduce de manera transparente sin armonización.
  doctrine_reference: 'DOCTRINE.md: κύριος → Señor'
translation_notes:
  revision_awareness: POB pasó de 'in good things' a 'with good things' por naturalidad inglesa; en español 'con bienes' refleja directamente esa elección y mantiene la amplitud del griego.
  spanish_consistency_notes:
  - κύριος → Señor
  - θεός → Dios
  - μακροθυμία → paciencia (no longanimidad, por estilo neutro moderno)
