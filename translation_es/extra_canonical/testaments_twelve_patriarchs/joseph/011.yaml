base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/joseph/011.yaml
  text: 'And so[a], my children, in every deed of yours keep the fear of God before your eyes, and honor your brothers; for everyone who does the law of the Lord will be loved by him.


    And when I was coming with the Ishmaelites, they kept asking me, saying[b], “Are you a slave?” And I said that I was a household slave, so that I might not put my brothers to shame.'
  footnotes:
  - marker: a
    text: Or, 'they asked me repeatedly.' The imperfect verb suggests continued questioning.
    reason: lexical_alternative
  - marker: b
    text: The phrase rendered 'household slave' reflects Greek ἐξ οἴκου, possibly indicating a domestic or homeborn slave rather than merely 'from a house.'
    reason: lexical_alternative
