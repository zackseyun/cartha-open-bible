translation:
  language: es
  text: 'Y así[a], hijos míos, en toda obra de ustedes tengan delante de sus ojos el temor de Dios, y honren a sus hermanos; porque todo el que hace la ley del Señor será amado por él.


    Y cuando venía con los ismaelitas, ellos me preguntaban[b], diciendo: “¿Eres esclavo?” Y yo dije que era esclavo de casa, para no avergonzar a mis hermanos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ellos me preguntaban repetidamente». El imperfecto sugiere una pregunta continuada.'
    reason: alternative_reading
  - marker: b
    text: La expresión traducida «esclavo de casa» refleja ἐξ οἴκου y puede indicar un esclavo doméstico o de casa, no solo «procedente de una casa».
    reason: lexical_alternative
lexical_decisions:
- source_word: φόβον
  english_pob_choice: fear
  chosen_spanish: temor de Dios
  alternatives_spanish:
  - miedo de Dios
  - reverencia de Dios
  lexicon: BDAG
  rationale: En la exhortación ética, φόβος θεοῦ conserva fuerza moral y pactual. «Temor de Dios» mantiene esa densidad sin suavizarla a una mera reverencia.
- source_word: πρὸ ὀφθαλμῶν ὑμῶν
  english_pob_choice: before your eyes
  chosen_spanish: delante de sus ojos
  alternatives_spanish:
  - ante sus ojos
  - en su vista
  lexicon: LSJ
  rationale: 'La imagen concreta de vigilancia moral se preserva mejor con una expresión visible y natural en español: «delante de sus ojos».'
- source_word: τιμᾶτε
  english_pob_choice: honor
  chosen_spanish: honren
  alternatives_spanish:
  - estimen
  - muestren respeto a
  lexicon: BDAG
  rationale: El imperativo pide una acción ética y relacional; «honren» comunica bien el peso moral y familiar del mandato.
- source_word: ἀδελφοὺς
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - parientes
  lexicon: BDAG
  rationale: El contexto patriarcal y fraterno del pasaje favorece «hermanos» como término literal y coherente con el auditorio narrativo.
- source_word: ποιῶν νόμον Κυρίου
  english_pob_choice: does the law of the Lord
  chosen_spanish: hace la ley del Señor
  alternatives_spanish:
  - guarda la ley del Señor
  - practica la ley del Señor
  lexicon: BDAG
  rationale: «Hacer la ley» conserva mejor la textura semítica y el contraste ético del griego que una formulación más explicativa.
- source_word: Κυρίου
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  - el Señor Dios
  lexicon: project terminology
  rationale: Aquí el griego cita una fórmula titular establecida en el texto fuente; en español, «el Señor» reproduce el audit trail de la fórmula del Señor sin introducir una aclaración no atestiguada en el pasaje griego.
- source_word: ἀγαπηθήσεται
  english_pob_choice: will be loved
  chosen_spanish: será amado
  alternatives_spanish:
  - será amado por él
  - será querido
  lexicon: BDAG
  rationale: 'La voz pasiva futura se vierte con naturalidad y sin perder la promesa personal: la persona obediente «será amada».'
- source_word: μετὰ τῶν Ἰσμαϊλιτῶν
  english_pob_choice: with the Ishmaelites
  chosen_spanish: con los ismaelitas
  alternatives_spanish:
  - entre los ismaelitas
  lexicon: LSJ
  rationale: El giro indica compañía durante el trayecto; «con los ismaelitas» es claro y fiel al movimiento narrativo.
- source_word: δοῦλος
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - criado
  lexicon: BDAG
  rationale: Se conserva la fuerza lexical de la condición servil/bondada. El relato trata del estatus de propiedad de José, por lo que «esclavo» es la opción más exacta.
- source_word: ἐξ οἴκου
  english_pob_choice: household slave
  chosen_spanish: esclavo de casa
  alternatives_spanish:
  - esclavo doméstico
  - esclavo del hogar
  lexicon: LSJ
  rationale: La expresión parece señalar pertenencia doméstica más que simple procedencia espacial. «Esclavo de casa» comunica ese matiz y deja visible la posible ambigüedad social.
- source_word: αἰσχύνω
  english_pob_choice: put ... to shame
  chosen_spanish: avergonzar
  alternatives_spanish:
  - poner en vergüenza
  - deshonrar
  lexicon: BDAG
  rationale: El verbo se centra en causar vergüenza; «avergonzar» es breve, directo y conserva el eje honor-vergüenza del pasaje.
theological_decisions:
- issue: Cómo verter δοῦλος en la auto-descripción de José
  english_pob_reading: slave / household slave
  chosen_spanish_reading: esclavo / esclavo de casa
  alternative_spanish_readings:
  - siervo / siervo de casa
  - criado / criado de casa
  rationale: El contexto social es el de José vendido y tratado como propiedad en tránsito. «Esclavo» conserva la fuerza lexical y evita suavizar una condición de servidumbre real.
  doctrine_reference: 'DOCTRINE.md: δοῦλος default rendering'
- issue: Finalidad de no avergonzar a sus hermanos
  english_pob_reading: Joseph suppresses his higher family status to avoid exposing or disgracing his brothers
  chosen_spanish_reading: José oculta su condición o identidad superior para no avergonzar a sus hermanos
  alternative_spanish_readings:
  - para no deshonrar a la casa de su padre
  - para no humillarse a sí mismo
  rationale: La mención explícita a «mis hermanos» orienta la lectura hacia el honor de los hermanos y la misericordia de José, sin añadir una generalización que no está en el griego.
  doctrine_reference: Narrative theology of brotherly forbearance in Testaments of the Twelve Patriarchs
translation_notes:
  revision_awareness: Se siguió la última revisión del audit trail al preferir «cuando venía con los ismaelitas» en vez de una formulación más general de desplazamiento, para alinearse más de cerca con Ἐρχόμενος ... μετὰ τῶν Ἰσμαϊλιτῶν. También se respetó la lectura de «household slave» como matiz doméstico, y se mantuvo la nota sobre la pregunta repetida por el imperfecto griego.
  spanish_consistency_notes:
  - Se mantuvo «esclavo» para δοῦλος conforme a la terminología doctrinal del proyecto.
  - Se evitó introducir «Cristo» o una cristología ajena al pasaje; el texto solo menciona «el Señor» y «Dios».
  - Se preservó el paralelismo honor-vergüenza con «honren» / «avergonzar».
  - Se usó «Señor» para Κύριος en la fórmula legal/ética del pasaje, sin forzar una sustitución por Yahvé en ausencia de un referente textual explícito dentro de esta cláusula.
