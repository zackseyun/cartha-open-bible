translation:
  language: es
  text: Porque yo sé que vuestros hijos se apartarán de él, y estarán en toda maldad, maltrato y corrupción lejos de Yahvé.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἐγὼ γὰρ ἔγνων
  english_pob_choice: Say these things also to your children
  chosen_spanish: Porque yo sé
  alternatives_spanish:
  - Porque he sabido
  - Pues yo he conocido
  lexicon: γινώσκω
  rationale: El griego expresa una afirmación de conocimiento/presagio; en español, «yo sé» comunica de forma natural la certeza del hablante sin añadir material inexistente en el fragmento griego. Se evita introducir el mandato expandido del borrador inglés anterior, ya corregido por la revisión.
- source_word: ἀποστήσονται
  english_pob_choice: Say these things also to your children
  chosen_spanish: se apartarán
  alternatives_spanish:
  - se desviarán
  - apostatarán
  lexicon: ἀφίστημι
  rationale: El verbo sugiere apartarse/alejarse; «se apartarán» conserva el movimiento de separación sin cargar de más con una lectura técnica. «Apostatarán» es posible, pero resulta más interpretativa y eclesial.
- source_word: τὰ τέκνα ὑμῶν
  english_pob_choice: Say these things also to your children
  chosen_spanish: vuestros hijos
  alternatives_spanish:
  - sus hijos
  - sus descendientes
  lexicon: τέκνον
  rationale: «Hijos» es la equivalencia directa y natural. Se mantiene el plural posesivo «vuestros» para reflejar el destinatario colectivo del fragmento.
- source_word: καὶ πάσῃ πονηρίᾳ καὶ κακώσει καὶ διαφθορᾷ
  english_pob_choice: Say these things also to your children
  chosen_spanish: en toda maldad, maltrato y corrupción
  alternatives_spanish:
  - en toda maldad, daño y corrupción
  - en toda perversidad, aflicción y corrupción
  lexicon: πονηρία / κακωσις / διαφθορά
  rationale: Los tres sustantivos forman una acumulación de desviación y daño. «Maldad» es el valor básico de πονηρία; «maltrato» intenta recoger la fuerza de κακωσις como daño/aflicción infligida; «corrupción» traduce διαφθορά de manera estable y clara. Se conserva la tríada sin suavizarla.
- source_word: ἀπὸ Κυρίου
  english_pob_choice: Say these things also to your children
  chosen_spanish: lejos de Yahvé
  alternatives_spanish:
  - apartados de Yahvé
  - separados de Yahvé
  lexicon: Κύριος
  rationale: Aunque el griego dice Κυρίου, en este corpus el nombre divino se representa normalmente como Yahvé. La frase final puede entenderse locativamente como separación/alejamiento de Dios; «lejos de Yahvé» conserva ese valor relacional sin forzar una formulación doctrinal que no está explícita en el fragmento.
theological_decisions:
- issue: Referencia al Señor / nombre divino en Κυρίου
  english_pob_reading: Say these things also to your children
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - el Señor
  rationale: La política del proyecto pide traducir יהוה/YHWH como «Yahvé». Aunque el texto griego usa Κυρίου, el contexto del fragmento y la práctica editorial del POB favorecen explicitar el nombre divino en español para no enmascararlo con un título genérico. La decisión se anota por la tensión entre la forma griega y la convención de salida.
  doctrine_reference: Nombre divino / tetragrámaton
translation_notes:
  revision_awareness: La revisión aplicada retiró material expandido no sustentado por el fragmento griego y dejó una frase breve centrada en la afirmación del hablante sobre el futuro apartamiento de los hijos. Esta versión española sigue ese recorte y no reintroduce exhortaciones ausentes del testimonio fuente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma del nombre divino en el texto principal.
  - Se evita «Cristo» porque no hay lenguaje cristológico en el fragmento.
  - Se conserva un registro sobrio y bíblico, sin expandir el contenido más allá del griego conservado.
