    rationale: The Greek text has Κυρίου, not a Hebrew source. Throughout the Gad testament, Κύριος is 'el Señor'. Switching to Yahvé here is inconsistent and not supported by the source language.
  - severity: medium
    issue: '''vuestros hijos'' — vosotros possessive; should be ''sus hijos'' for ustedes register.'
    rationale: Same register issue as 8:1; the corpus uses ustedes throughout.
