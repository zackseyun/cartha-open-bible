  source_alignment_summary: 'Greek 8:2: Ἐγὼ γὰρ ἔγνων, ὅτι ἀποστήσονται τὰ τέκνα ὑμῶν ἀπ᾽ αὐτοῦ, καὶ πάσῃ πονηρίᾳ καὶ κακώσει καὶ διαφθορᾷ ἔσονται ἀπὸ Κυρίου. The Spanish ''Porque yo sé que vuestros hijos se apartarán de él, y estarán en toda maldad, maltrato y corrupción lejos de Yahvé'' is largely faithful. Issues: (1) ''vuestros hijos'' uses vosotros possessive — should be ''sus hijos'' (ustedes register). (2) Κυρίου rendered as ''Yahvé'' — this is a deliberate POB decision noted in theological_decisions, with rationale that the project policy maps YHWH→Yahvé and the editor chose to explicit the divine name. However, the Greek here is Κυρίου, not a Hebrew YHWH — in this T12P Greek text, Κύριος is the standard Greek term. Throughout ch.7 and ch.6, the Spanish consistently uses ''el Señor'' for Κύριος. Switching to ''Yahvé'' at 8:2 breaks the internal consistency of the chapter-level Spanish for this book.'
  spanish_quality_summary: Good prose aside from the vosotros form and the Yahvé/Señor inconsistency. 'Maltrato' for κακωσις is reasonable. 'Corrupción' for διαφθορά is accurate.
