base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/gad/008/003.yaml
  text: Say these things, Gad, also you to your children,
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:55Z'
    unchanged: false
    changes_summary: 'Revised to match the source imperative and address: “Say these things” for Εἴπατε ταῦτα, retained the vocative name, and rendered ὑμεῖς … τοῖς τέκνοις ὑμῶν as “also you to your children.”'
translation:
  language: es
  text: Decid estas cosas, Gad, también vosotros a vuestros hijos,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Εἴπατε
  english_pob_choice: Say
  chosen_spanish: Decid
  alternatives_spanish:
  - Digan
  - Hablad
  lexicon: LSJ
  rationale: Imperativo plural de λέγω; se usa la forma vosotros para mantener registro digno y dirigirse al grupo de hijos.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  lexicon: LSJ
  rationale: Plural neutro; 'estas cosas' refleja el referente plural del discurso patriarcal anterior.
- source_word: τοῖς τέκνοις ὑμῶν
  english_pob_choice: to your children
  chosen_spanish: a vuestros hijos
  alternatives_spanish:
  - a sus hijos
  lexicon: LSJ
  rationale: Mantiene la concordancia de segunda persona plural usada en la exhortación testamentaria.
translation_notes:
  revision_awareness: El POB inglés fue revisado para ajustar la perícopa al imperativo griego Εἴπατε ταῦτα, conservando el vocativo Gad y la frase ὑμεῖς … τοῖς τέκνοις ὑμῶν como 'también vosotros a vuestros hijos'. La traducción al español sigue esa misma decisión.
  spanish_consistency_notes:
  - Se mantiene el imperativo en segunda persona plural ('vosotros') típico del registro patriarcal-testamentario.
  - El vocativo Gad se conserva sin alteración por ser nombre propio.
