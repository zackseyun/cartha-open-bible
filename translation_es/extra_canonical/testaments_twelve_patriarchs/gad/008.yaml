translation:
  language: es
  text: 'Decid estas cosas[a], vosotros también, a vuestros hijos:


    que honren a Leví y a Judá; porque de ellos el Señor levantará salvación para Israel.


    Y habladles acerca de José, que lo amen, porque en toda aflicción fue inocente,


    y guardó el mandamiento de Dios, sin devolver mal por mal.


    Porque mucho sufrió de parte de sus hermanos, y sin embargo los amó,


    y aunque conspiraron contra él, les habló pacíficamente.


    Y ahora, hijos míos, os mando: amaos los unos a los otros de corazón,


    y si alguno peca contra vosotros, habladle pacíficamente, y en vuestra alma no albergéis engaño;


    y si confiesa y se arrepiente, perdonadle.


    Pero si lo niega, no os enardezcáis discutiendo con él,


    no sea que, tras absorber veneno[b], comience a jurar y cometa así un doble pecado.


    Si alguno prospera más que vosotros, no os entristezcáis;


    sino orad también por él, para que sea hecho completo en todo bien.


    Si alguno es glorificado, no le envidiéis;


    si alguno se enriquece, no tengáis celos.


    Bendecid al Señor que da bienes a todos,


    porque el pobre, si está libre de envidia, es rico ante el Señor.


    No odiéis a una mujer hermosa por su apariencia,


    ni odiéis a un hombre por la abundancia de su gloria.


    Porque Dios da los bienes de la tierra a quien quiere.


    Buscad la rectitud en vuestras propias obras,


    y orad por vuestro prójimo, para que, si prospera en todo bien, no tengáis celos.


    Porque el que tiene celos siempre está turbado,


    y el que odia siempre está oscurecido.


    Amaos los unos a los otros en obra, en palabra y en la intención del alma.


    Porque yo también hablé pacíficamente con José, pero en mi corazón pretendía matarlo.


    El espíritu del odio es malvado, porque nunca está en paz con los hombres;


    siempre desea su caída.


    Debilita el cuerpo y perturba el alma,


    y pone ira sobre la mente.


    Por tanto, si alguno os hace mal, hacedle bien,


    y orad por él; y seréis redimidos por el Señor de todo mal.


    Porque si alguno prospera, y si es desvergonzado o sin ley, no tengáis celos;


    sino esperad el desenlace de parte del Señor.


    Porque o recibe su recompensa en esta vida,


    o, si es reservado para castigo, será retribuido en el juicio.


    Y si un pobre prospera y está sin envidia, aun cuando no sea rico,


    es bienaventurado más que todos los hombres, porque tiene el tesoro que no perece.


    Por tanto, desechad el odio[c], y amaos los unos a los otros en rectitud de corazón.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Honrar a Leví y a Judá'' refleja probablemente la prominencia tradicional de las líneas sacerdotal y real en Israel; la formulación se deja amplia en lugar de reducirla a una interpretación posterior particular.'
    reason: cross_reference
  - marker: b
    text: O 'no discutáis acaloradamente con él.' La imagen que sigue sugiere que la disputa contenciosa puede llevar al otro a una culpa compuesta.
    reason: lexical_alternative
  - marker: c
    text: '''Esperad el desenlace de parte del Señor'' puede significar aguardar el resultado final que el Señor asigne, sea en esta vida o en el juicio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τιμᾶν
  english_pob_choice: honor
  chosen_spanish: honrar
  alternatives_spanish:
  - respetar
  - venerar
  lexicon: LSJ
  rationale: '''Honrar'' captura el respeto filial y de pacto sin sobrecargar con la nota cultual.'
- source_word: σωτηρία
  english_pob_choice: salvation
  chosen_spanish: salvación
  alternatives_spanish:
  - liberación
  - rescate
  lexicon: BDAG
  rationale: Se conserva el peso teológico de rescate divino propio del contexto testamentario-profético.
- source_word: ἄκακος
  english_pob_choice: innocent
  chosen_spanish: inocente
  alternatives_spanish:
  - sin malicia
  - sin daño
  lexicon: LSJ
  rationale: Refleja la integridad moral de José bajo aflicción.
- source_word: ἀντὶ κακοῦ κακόν
  english_pob_choice: evil for evil
  chosen_spanish: mal por mal
  alternatives_spanish:
  - agravio por agravio
  lexicon: BDAG
  rationale: Mantiene la fórmula ética reconocible de no represalia.
- source_word: εἰρηνεύειν / εἰρηνικῶς λαλεῖν
  english_pob_choice: speak peaceably
  chosen_spanish: hablar pacíficamente
  alternatives_spanish:
  - hablar en paz
  - hablar con paz
  lexicon: LSJ
  rationale: Mantiene el sentido interpersonal activo y refleja el contraste repetido con el odio interno.
- source_word: δόλος
  english_pob_choice: deceit
  chosen_spanish: engaño
  alternatives_spanish:
  - dolo
  - astucia maliciosa
  lexicon: BDAG
  rationale: Español moderno legible que conserva la duplicidad interna.
- source_word: μετανοεῖν
  english_pob_choice: repents
  chosen_spanish: se arrepiente
  alternatives_spanish:
  - cambia de mente
  lexicon: BDAG
  rationale: 'En contexto de pecado interpersonal, se sigue la guía del proyecto: ''arrepentirse'' para ofensa moral y reconciliación.'
- source_word: θερμαίνεσθαι
  english_pob_choice: become heated
  chosen_spanish: enardecerse
  alternatives_spanish:
  - acalorarse
  - encolerizarse
  lexicon: LSJ
  rationale: Capta la escalada en la disputa sin reducirla a simple ira.
- source_word: φάρμακον
  english_pob_choice: poison
  chosen_spanish: veneno
  alternatives_spanish:
  - pócima
  - ponzoña
  lexicon: LSJ
  rationale: La metáfora 'absorber veneno' transmite vívidamente cómo la disputa engendra pecado compuesto.
- source_word: φθονεῖν
  english_pob_choice: be jealous
  chosen_spanish: tener celos
  alternatives_spanish:
  - envidiar
  lexicon: BDAG
  rationale: Usado junto a 'envidiar' para reflejar la rivalidad resentida; excepción documentada por legibilidad.
- source_word: λυπεῖσθαι
  english_pob_choice: be grieved
  chosen_spanish: entristecerse
  alternatives_spanish:
  - afligirse
  - sentirse abatido
  lexicon: BDAG
  rationale: Transmite el resentimiento doloroso ante la prosperidad ajena sin sobreinterpretación.
- source_word: τελειωθῇ
  english_pob_choice: be made complete
  chosen_spanish: ser hecho completo
  alternatives_spanish:
  - ser perfeccionado
  - alcanzar plenitud
  lexicon: BDAG
  rationale: Conserva el sentido de plenitud en el bien más que de mero éxito.
- source_word: δοξάζεσθαι
  english_pob_choice: is glorified
  chosen_spanish: es glorificado
  alternatives_spanish:
  - es honrado
  - es estimado
  lexicon: BDAG
  rationale: Mantiene el registro elevado y la connotación de honor conferido externamente.
- source_word: εὐθύτης
  english_pob_choice: uprightness
  chosen_spanish: rectitud
  alternatives_spanish:
  - integridad
  - rectitud de carácter
  lexicon: LSJ
  rationale: Coincide con el tema ético de singularidad de corazón y conducta recta.
- source_word: διάνοια / ἐπίνοια ψυχῆς
  english_pob_choice: intention of the soul
  chosen_spanish: intención del alma
  alternatives_spanish:
  - propósito del corazón
  - pensamiento del alma
  lexicon: LSJ
  rationale: Preserva la facultad moral interna enfatizada a lo largo del capítulo.
- source_word: πνεῦμα μίσους
  english_pob_choice: the spirit of hatred
  chosen_spanish: el espíritu del odio
  alternatives_spanish:
  - un espíritu de odio
  lexicon: LSJ
  rationale: Refleja el vicio como un poder activo o disposición, no un sentimiento pasajero. πνεῦμα como 'espíritu' por contexto.
- source_word: σκοτίζεσθαι
  english_pob_choice: is darkened
  chosen_spanish: está oscurecido
  alternatives_spanish:
  - está cegado
  - está obnubilado
  lexicon: BDAG
  rationale: Mantiene la imagen moral-psicológica sin forzar una metáfora más fuerte.
- source_word: λυτροῦσθαι
  english_pob_choice: be redeemed
  chosen_spanish: ser redimidos
  alternatives_spanish:
  - ser liberados
  - ser rescatados
  lexicon: BDAG
  rationale: Elegido por la resonancia teológica del rescate divino, ajustándose a la exhortación ética.
- source_word: ἀναμένειν τὸ τέλος παρὰ κυρίου
  english_pob_choice: wait for the end from the Lord
  chosen_spanish: esperad el desenlace de parte del Señor
  alternatives_spanish:
  - aguardad el final del Señor
  - esperad el fin del Señor
  lexicon: LSJ
  rationale: 'Preserva la ambigüedad escatológica y providencial: el desenlace final pertenece al Señor.'
- source_word: κρίσις
  english_pob_choice: judgment
  chosen_spanish: juicio
  alternatives_spanish:
  - condenación
  - justicia
  lexicon: BDAG
  rationale: Mantiene el sentido judicial amplio sin decidir el matiz punitivo exacto.
theological_decisions:
- issue: Línea profética 'honrar a Leví y a Judá' y la salvación que surge de ellos
  chosen_reading: 'Se traduce como una profecía testamentaria orientada al futuro: ''de ellos el Señor levantará salvación para Israel.'''
  alternative_readings:
  - de ellos surgirá salvación para Israel
  - de ellos el Señor traerá liberación a Israel
  rationale: Preserva la fuerza profética del griego y deja abierta la interpretación entre liderazgo sacerdotal-real amplio o expectativa mesiánica más específica. La traducción no resuelve la alusión.
  doctrine_reference: Preservar la tensión teológica antes que resolverla.
- issue: Instrucción ética sobre arrepentimiento y perdón
  chosen_reading: Se usa 'si confiesa y se arrepiente, perdonadle.'
  alternative_readings:
  - si lo admite y cambia de pensamiento, perdonadle
  rationale: El contexto es pecado interpersonal y reconciliación, donde la guía del proyecto favorece 'arrepentirse' sobre el más cognitivo 'cambio de mente.'
  doctrine_reference: DOCTRINE.md sobre μετανοέω
- issue: Recompensa divina al malvado próspero
  chosen_reading: Se presentan tanto la recompensa presente como el juicio futuro como posibilidades sin armonizarlas.
  alternative_readings:
  - ya recibió su recompensa
  - está reservado para castigo
  rationale: El testamento presenta dos posibles desenlaces divinos; la traducción preserva esa tensión en lugar de colapsarla en una doctrina única de retribución.
  doctrine_reference: Preservar la tensión teológica antes que resolverla.
translation_notes:
  revision_awareness: El POB tuvo una revisión inicial que truncó el versículo a 39 caracteres por error, y luego una segunda revisión (claude-sonnet-4-6-truncation-fix) que restauró el texto completo. La traducción al español refleja el texto restaurado completo del capítulo.
  spanish_consistency_notes:
  - Se usa 'vosotros/vuestros' coherente con vv.3-5 del mismo capítulo testamentario, registro elevado.
  - '''Mesías'' no aparece aquí; ''Señor'' (Κύριος) se traduce como ''Señor'' por convención del POB en literatura no canónica griega.'
  - '''Espíritu del odio'' con ''espíritu'' en minúscula porque se refiere a una disposición o vicio personificado, no al Espíritu de Dios.'
