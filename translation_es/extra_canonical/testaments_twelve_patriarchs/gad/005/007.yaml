id: T12P.GAD.5.7
reference: Testament of Gad 5:7
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 232-243, Gad pilot)
  text: 7. Ἡ γὰρ κατὰ Θεὸν ἀληθὴς⁵¹ μετάνοια⁵² [ἀναιρεῖ *τὴν ἄγνοιαν⁵³ καὶ] φυγαδεύει τὸ σκότος, καὶ φωτίζει τοὺς ὀφθαλμοὺς καὶ γνῶσιν παρέχει τῇ ψυχῇ, καὶ ὁδηγεῖ *τὸ διαβούλιον⁵⁴ *πρὸς σωτηρίαν⁵⁵.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/gad/005/007.yaml
  text: For true repentance according to God [removes ignorance and] puts darkness to flight, enlightens the eyes, gives knowledge to the soul, and guides the mind toward salvation.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:53Z'
    unchanged: false
    changes_summary: Changed 'purpose' to 'mind' for closer lexical correspondence to τὸ διαβούλιον; retained the rest as accurate and natural.
translation:
  language: es
  text: Pues el verdadero arrepentimiento[a] según Dios [quita la ignorancia y][b] hace huir las tinieblas, ilumina los ojos, da conocimiento al alma y guía la mente[c] hacia la salvación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘Verdadero arrepentimiento’ traduce μετάνοια en sentido moral-religioso pleno, no meramente cognitivo.
    reason: theological_note
  - marker: b
    text: El texto griego conserva esta frase entre corchetes por incertidumbre textual; se traduce y se mantienen los corchetes para preservar la transparencia.
    reason: textual_variant
  - marker: c
    text: ‘Mente’ traduce τὸ διαβούλιον (deliberación interna, propósito, consejo interior).
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀληθὴς μετάνοια
  english_pob_choice: true repentance
  chosen_spanish: verdadero arrepentimiento
  alternatives_spanish:
  - arrepentimiento auténtico
  - verdadero cambio de mente
  lexicon: LSJ
  rationale: En este contexto teológico, el sustantivo carga la fuerza moral-religiosa plena, por eso ‘arrepentimiento’ y no ‘cambio de mente’.
- source_word: κατὰ Θεὸν
  english_pob_choice: according to God
  chosen_spanish: según Dios
  alternatives_spanish:
  - conforme a Dios
  - según la voluntad de Dios
  lexicon: LSJ
  rationale: ‘Según Dios’ traduce literalmente la preposición y conserva la economía del giro griego.
- source_word: τὴν ἄγνοιαν
  english_pob_choice: ignorance
  chosen_spanish: la ignorancia
  alternatives_spanish:
  - el desconocimiento
  lexicon: LSJ
  rationale: Equivalente directo y estándar para ἄγνοια en contexto moral-cognitivo.
- source_word: φυγαδεύει τὸ σκότος
  english_pob_choice: puts darkness to flight
  chosen_spanish: hace huir las tinieblas
  alternatives_spanish:
  - aleja las tinieblas
  - ahuyenta la oscuridad
  lexicon: LSJ
  rationale: Conserva la imagen vívida de expulsión del verbo griego, en plural ‘las tinieblas’ por convención bíblica española.
- source_word: φωτίζει τοὺς ὀφθαλμοὺς
  english_pob_choice: enlightens the eyes
  chosen_spanish: ilumina los ojos
  alternatives_spanish:
  - alumbra los ojos
  lexicon: LSJ
  rationale: Forma idiomática del español bíblico para esta expresión.
- source_word: γνῶσιν παρέχει τῇ ψυχῇ
  english_pob_choice: gives knowledge to the soul
  chosen_spanish: da conocimiento al alma
  alternatives_spanish:
  - proporciona conocimiento al alma
  lexicon: LSJ
  rationale: ‘Dar’ es la traducción más natural y económica de παρέχω en este sentido.
- source_word: τὸ διαβούλιον
  english_pob_choice: the mind
  chosen_spanish: la mente
  alternatives_spanish:
  - el propósito
  - la deliberación
  - el consejo interior
  lexicon: LSJ
  rationale: El revision_pass del POB inglés cambió ‘the purpose’ por ‘the mind’ por mayor cercanía a διαβούλιον. ‘La mente’ recoge el ámbito de la deliberación interna, en línea con esa decisión.
- source_word: πρὸς σωτηρίαν
  english_pob_choice: toward salvation
  chosen_spanish: hacia la salvación
  alternatives_spanish:
  - a la salvación
  - hacia la liberación
  lexicon: LSJ
  rationale: ‘Hacia’ conserva el sentido direccional de πρός; ‘salvación’ retiene el peso teológico de σωτηρία.
theological_decisions:
- issue: Frase entre corchetes ‘[quita la ignorancia y]’ en el texto base
  chosen_reading: Se conserva entre corchetes en español, igual que en el griego y en el POB inglés.
  alternative_readings:
  - omitir como expansión secundaria
  - incluirla sin corchetes como texto plenamente integral
  rationale: La fuente griega presenta la frase entre corchetes señalando incertidumbre textual. Se traduce con honestidad pero se marca para preservar la transparencia, en lugar de omitirla silenciosamente o asimilarla por completo.
translation_notes:
  revision_awareness: El revision_pass del POB inglés cambió ‘purpose’ por ‘mind’ por mayor correspondencia léxica con τὸ διαβούλιον. La versión española recoge ese cambio (‘la mente’) y conserva los corchetes textuales.
  spanish_consistency_notes:
  - μετάνοια en contexto religioso → ‘arrepentimiento’.
  - Mantenimiento de los corchetes textuales para señalar incertidumbre.
  - ψυχή → ‘alma’.
  - σωτηρία → ‘salvación’.
