  text: 2. *Ταῦτα οὖν¹⁹ ἐκ πείρας²⁰ λέγω ὑμῖν, τέκνα μου, ὅπως ἐξώσητε²¹ τὸ μῖσος *τὸ διαβολικόν²², καὶ κολληθῆτε τῇ ἀγάπῃ τοῦ²³ Θεοῦ²⁴.
