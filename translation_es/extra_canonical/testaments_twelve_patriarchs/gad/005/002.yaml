base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/gad/005/002.yaml
  text: Therefore I say these things to you from experience, my children, so that you may drive out devilish hatred and cling to the love of God.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:51Z'
    unchanged: false
    changes_summary: Removed the article before 'devilish hatred' for more natural English while preserving the adjectival force of τὸ διαβολικόν; otherwise retained the draft as accurate and complete.
translation:
  language: es
  text: Por tanto, hijos míos, les digo estas cosas por experiencia, para que expulsen el odio diabólico y se adhieran al amor de Dios.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐκ πείρας
  english_pob_choice: from experience
  chosen_spanish: por experiencia
  alternatives_spanish:
  - a partir de la experiencia
  - tras haberlo experimentado
  lexicon: LSJ
  rationale: Idioma natural en español que conserva la fuerza testimonial del πείρα ('lo aprendido viviéndolo').
- source_word: ἐξώσητε
  english_pob_choice: drive out
  chosen_spanish: expulsen
  alternatives_spanish:
  - echen fuera
  - arrojen
  lexicon: LSJ
  rationale: Mantiene el sentido enfático de echar fuera con fuerza, sin volverse arcaico.
- source_word: τὸ διαβολικόν
  english_pob_choice: devilish
  chosen_spanish: diabólico
  alternatives_spanish:
  - del diablo
  lexicon: LSJ
  rationale: Adjetivo cognado natural en español; conserva la fuerza adjetival de τὸ διαβολικόν.
- source_word: κολληθῆτε
  english_pob_choice: cling to
  chosen_spanish: se adhieran
  alternatives_spanish:
  - se aferren
  - se peguen
  lexicon: LSJ
  rationale: El verbo κολλάω literalmente significa 'pegarse'; 'adherirse' conserva la imagen de unión firme en registro digno.
- source_word: ἀγάπῃ τοῦ Θεοῦ
  english_pob_choice: love of God
  chosen_spanish: amor de Dios
  alternatives_spanish:
  - amor divino
  lexicon: LSJ
  rationale: Frase tradicional bíblica que mantiene la ambigüedad del genitivo griego (amor hacia Dios y amor proveniente de Dios).
translation_notes:
  revision_awareness: El POB inglés retiró el artículo determinado en 'the devilish hatred' por naturalidad. La construcción española 'el odio diabólico' es necesaria porque en español el sustantivo abstracto con adjetivo lleva artículo de modo natural; no es un calco sino la forma estándar.
  spanish_consistency_notes:
  - '''odio'' consistente con el resto del Testamento de Gad'
  - '''amor de Dios'' como frase formular bíblica'
  - '''diabólico'' como cognado natural para διαβολικός'
