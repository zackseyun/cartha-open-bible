id: T12P.GAD.5.3
reference: Testament of Gad 5:3
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 232-243, Gad pilot)
  text: 3. Ἡ²⁵ δικαιοσύνη²⁶ ἐκβάλλει τὸ μῖσος²⁷, ἡ ταπείνωσις ἀναιρεῖ *τὸ ζῆλος²⁸. ὁ γὰρ δίκαιος καὶ ταπεινῶς αἰδεῖται ποιῆσαι ἄδικον²⁹, ⸀οὐχ ὑπ᾽ ἄλλου³⁰ καταγινωσκόμενος³¹ ἀλλ᾽³² ὑπὸ τῆς ἰδίας καρδίας³³, ὅτι Κύριος ἐπισκοπεῖ³⁴ *τὴν ψυχὴν³⁵ αὐτοῦ³⁶.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/gad/005/003.yaml
  text: Righteousness casts out hatred, and humility removes jealousy. For the righteous man, being humble, is ashamed to do what is unjust, not because he is condemned by another, but by his own heart, because the Lord watches over his soul.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:51Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: La justicia[a] expulsa el odio, y la humildad elimina los celos[b]. Pues el justo, siendo humilde, se avergüenza de hacer lo injusto, no porque otro lo condene, sino por su propio corazón, porque el Señor vela por su alma[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También ‘rectitud’; el término griego cubre tanto la cualidad moral interior como la conducta justa.
    reason: lexical_alternative
  - marker: b
    text: También ‘envidia’; el griego ζῆλος puede abarcar celos hostiles y rivalidad envidiosa.
    reason: lexical_alternative
  - marker: c
    text: Literalmente ‘vigila/inspecciona su alma’; ‘vela por’ recoge ambos sentidos de cuidado y escrutinio.
    reason: lexical_alternative
lexical_decisions:
- source_word: δικαιοσύνη
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  lexicon: LSJ
  rationale: ‘Justicia’ es la equivalencia más natural y conservadora para δικαιοσύνη en este contexto ético-personal; ‘rectitud’ se nota en la nota como alternativa válida.
- source_word: ἐκβάλλει
  english_pob_choice: casts out
  chosen_spanish: expulsa
  alternatives_spanish:
  - arroja
  - echa fuera
  lexicon: LSJ
  rationale: Conserva la fuerza activa y enérgica del verbo griego sin sonar arcaico.
- source_word: ταπείνωσις
  english_pob_choice: humility
  chosen_spanish: humildad
  alternatives_spanish:
  - bajeza
  - modestia
  lexicon: LSJ
  rationale: Equivalente estándar para la virtud, frente al sentido humillante que tendría ‘bajeza’.
- source_word: ζῆλος
  english_pob_choice: jealousy
  chosen_spanish: celos
  alternatives_spanish:
  - envidia
  - rivalidad
  lexicon: LSJ
  rationale: Sigue al POB en el sentido de hostilidad celosa interpersonal; la nota deja abierta ‘envidia’.
- source_word: δίκαιος
  english_pob_choice: the righteous man
  chosen_spanish: el justo
  alternatives_spanish:
  - el hombre justo
  - el recto
  lexicon: LSJ
  rationale: Forma habitual y económica del español bíblico moderno; conserva el masculino genérico del original.
- source_word: αἰδεῖται
  english_pob_choice: is ashamed
  chosen_spanish: se avergüenza
  alternatives_spanish:
  - siente reparo
  - rehúsa por respeto
  lexicon: LSJ
  rationale: Capta la vergüenza moral que detiene la acción injusta sin la sobrecarga del ‘reparo reverencial’.
- source_word: ἄδικον
  english_pob_choice: what is unjust
  chosen_spanish: lo injusto
  alternatives_spanish:
  - la injusticia
  - lo malo
  lexicon: LSJ
  rationale: Sustantivación neutra que conserva la generalidad del adjetivo griego.
- source_word: καταγινωσκόμενος
  english_pob_choice: condemned
  chosen_spanish: condene
  alternatives_spanish:
  - lo acuse
  - lo censure
  lexicon: LSJ
  rationale: ‘Condenar’ recoge la fuerza judicial-moral del participio griego en este contraste interno/externo.
- source_word: Κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Dueño
  lexicon: LSJ
  rationale: Equivalencia estándar en español bíblico para κύριος en referencia divina.
- source_word: ἐπισκοπεῖ τὴν ψυχὴν αὐτοῦ
  english_pob_choice: watches over his soul
  chosen_spanish: vela por su alma
  alternatives_spanish:
  - mira sobre su alma
  - examina su vida
  lexicon: LSJ
  rationale: ‘Velar por’ conserva tanto el cuidado como la supervisión; ‘alma’ traduce ψυχή en su sentido amplio.
translation_notes:
  revision_awareness: 'El revision_pass del POB inglés no introdujo cambios en este versículo (unchanged: true).'
  spanish_consistency_notes:
  - μῖσος → ‘odio’ a lo largo del capítulo.
  - δικαιοσύνη → ‘justicia’ (con nota sobre ‘rectitud’).
  - Κύριος → ‘el Señor’.
  - ψυχή → ‘alma’ por defecto.
