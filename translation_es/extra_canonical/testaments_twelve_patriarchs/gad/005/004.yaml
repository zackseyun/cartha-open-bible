translation:
  language: es
  text: No habla contra un varón santo[a], porque el temor de Dios mora en él[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘Varón santo’ traduce ὅσιος (santo, piadoso, devoto); el énfasis está en la conducta consagrada ante Dios.
    reason: lexical_alternative
  - marker: b
    text: Literalmente ‘habita en él’; el verbo οἰκέω implica residencia estable, no visita pasajera.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ καταλαλεῖ
  english_pob_choice: does not speak against
  chosen_spanish: no habla contra
  alternatives_spanish:
  - no calumnia
  - no murmura de
  lexicon: LSJ
  rationale: ‘Hablar contra’ recoge la prohibición amplia del discurso hostil sin reducirla a la calumnia formal, en línea con la decisión POB.
- source_word: ἀνδρὸς ὁσίου
  english_pob_choice: a holy man
  chosen_spanish: un varón santo
  alternatives_spanish:
  - un hombre piadoso
  - un hombre devoto
  lexicon: LSJ
  rationale: ‘Santo’ conserva el matiz ético-religioso fuerte de ὅσιος; ‘varón’ mantiene el registro formal del testamento.
- source_word: ὁ φόβος τοῦ Θεοῦ
  english_pob_choice: the fear of God
  chosen_spanish: el temor de Dios
  alternatives_spanish:
  - el temor a Dios
  - el respeto reverente a Dios
  lexicon: LSJ
  rationale: Forma estándar del español bíblico para esta expresión; ‘a Dios’ es alternativa moderna pero el genitivo ‘de Dios’ es más tradicional y conserva la ambigüedad reverencial.
- source_word: οἰκεῖ ἐν αὐτῷ
  english_pob_choice: dwells in him
  chosen_spanish: mora en él
  alternatives_spanish:
  - habita en él
  - reside en él
  lexicon: LSJ
  rationale: ‘Morar’ conserva el registro elevado y la connotación de habitación duradera del verbo griego.
translation_notes:
  revision_awareness: 'El revision_pass del POB inglés no introdujo cambios en este versículo (unchanged: true).'
  spanish_consistency_notes:
  - Θεός → ‘Dios’ por defecto.
  - ὅσιος → ‘santo’ (con nota explicativa).
  - Mantenimiento de la fórmula ‘temor de Dios’.
