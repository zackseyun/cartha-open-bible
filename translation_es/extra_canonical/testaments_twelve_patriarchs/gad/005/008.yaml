  text: 8. *Καὶ οὐκ ἔμαθεν ἀπὸ ἀνθρώπων τοῦτο ἀλλ᾽ οἶδε διὰ μετανοίας τοὺς ἐπιστρέφοντας δέχεσθαι⁵⁶.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/gad/005/008.yaml
  text: And he did not learn this from men, but through repentance he knows how to receive those who turn back.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:53Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Y esto no lo aprendió de hombres[a], sino que, mediante el arrepentimiento, sabe recibir a los que se vuelven[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘De hombres’ traduce ἀπὸ ἀνθρώπων en contraste implícito con un origen divino del conocimiento.
    reason: lexical_alternative
  - marker: b
    text: ‘A los que se vuelven’ traduce τοὺς ἐπιστρέφοντας, con la imagen del giro o retorno moral, próxima al lenguaje del arrepentimiento sin reducirse a ‘los convertidos’.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐκ ἔμαθεν ἀπὸ ἀνθρώπων
  english_pob_choice: did not learn this from men
  chosen_spanish: no lo aprendió de hombres
  alternatives_spanish:
  - no lo aprendió de seres humanos
  - no lo recibió por enseñanza humana
  lexicon: LSJ
  rationale: ‘De hombres’ conserva la economía del giro griego y su contraste implícito con la enseñanza divina.
- source_word: διὰ μετανοίας
  english_pob_choice: through repentance
  chosen_spanish: mediante el arrepentimiento
  alternatives_spanish:
  - por medio del arrepentimiento
  - a través del arrepentimiento
  lexicon: LSJ
  rationale: ‘Mediante’ es la fórmula instrumental natural en español formal, en línea con el sentido pleno de μετάνοια.
- source_word: οἶδε ... δέχεσθαι
  english_pob_choice: knows how to receive
  chosen_spanish: sabe recibir
  alternatives_spanish:
  - sabe acoger
  - tiene experiencia de recibir
  lexicon: LSJ
  rationale: ‘Saber + infinitivo’ es la construcción idiomática española para el griego οἶδα + infinitivo (‘saber cómo hacer X’).
- source_word: τοὺς ἐπιστρέφοντας
  english_pob_choice: those who turn back
  chosen_spanish: a los que se vuelven
  alternatives_spanish:
  - a los que retornan
  - a los que se convierten
  - a los arrepentidos
  lexicon: LSJ
  rationale: ‘Volverse’ conserva la imagen del giro físico/moral del verbo ἐπιστρέφω, sin precipitarse al término técnico ‘convertirse’.
theological_decisions:
- issue: Sujeto implícito en v. 8
  chosen_reading: 'Se entiende a Dios como sujeto: ‘mediante el arrepentimiento sabe recibir a los que se vuelven’.'
  alternative_readings:
  - el sujeto es la persona que se arrepiente y aprende a recibir a otros
  - lectura impersonal
  rationale: El sujeto más coherente y cercano en el contexto es Dios, prolongando la afirmación teológica sobre el arrepentimiento y la aceptación divina de quienes retornan.
translation_notes:
  revision_awareness: 'El revision_pass del POB inglés no introdujo cambios en este versículo (unchanged: true).'
  spanish_consistency_notes:
  - μετάνοια → ‘arrepentimiento’.
  - ἐπιστρέφω → ‘volverse’ con nota explicativa.
  - Mantenimiento del sujeto implícito (Dios) por contexto.
