id: T12P.GAD.5.6
reference: Testament of Gad 5:6
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 232-243, Gad pilot)
  text: 6. Ταῦτα *ἐγὼ ἔσχατον⁴⁷ ἔγνων μετὰ τὸ μετανοῆσαί⁴⁸ με περὶ⁴⁹ Ἰωσήφ⁵⁰.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/gad/005/006.yaml
  text: These things I learned at last after I repented concerning Joseph.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:53Z'
    unchanged: false
    changes_summary: Replaced 'learned fully only' with 'learned at last' to reflect ἔσχατον more naturally as 'finally/at last,' and changed 'changed my mind' to 'repented' for μετανοῆσαί, which is more accurate in this context.
translation:
  language: es
  text: Estas cosas las aprendí al fin[a], después de arrepentirme[b] respecto a José.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘Al fin’ traduce ἔσχατον (‘finalmente, por último’).
    reason: lexical_alternative
  - marker: b
    text: ‘Arrepentirme’ refleja la decisión de revisión (POB inglés) que prefiere el sentido moral pleno de μετανοέω en este contexto confesional, frente a un mero ‘cambiar de parecer’.
    reason: theological_note
lexical_decisions:
- source_word: ἔσχατον
  english_pob_choice: at last
  chosen_spanish: al fin
  alternatives_spanish:
  - finalmente
  - por último
  lexicon: LSJ
  rationale: ‘Al fin’ recoge bien el sentido temporal de ἔσχατον como ‘finalmente’, según el revision_pass POB.
- source_word: ἔγνων
  english_pob_choice: I learned
  chosen_spanish: las aprendí
  alternatives_spanish:
  - las llegué a conocer
  - las supe
  lexicon: LSJ
  rationale: ‘Aprender’ es natural en español para γινώσκω en aoristo, en sentido de adquisición de conocimiento; mantiene el matiz reflexivo del POB.
- source_word: μετανοῆσαί
  english_pob_choice: I repented
  chosen_spanish: arrepentirme
  alternatives_spanish:
  - cambiar de mente
  - cambiar de parecer
  lexicon: LSJ
  rationale: El revision_pass del POB cambió ‘changed my mind’ por ‘repented’ por mayor precisión en este contexto confesional. ‘Arrepentirme’ sigue esa decisión y la línea del proyecto para μετανοέω en contextos de pecado.
- source_word: περὶ Ἰωσήφ
  english_pob_choice: concerning Joseph
  chosen_spanish: respecto a José
  alternatives_spanish:
  - en cuanto a José
  - acerca de José
  lexicon: LSJ
  rationale: ‘Respecto a’ es la fórmula idiomática para περί + genitivo en este sentido relacional.
theological_decisions:
- issue: Renderización de μετανοῆσαί en este versículo confesional
  chosen_reading: ‘arrepentirme’
  alternative_readings:
  - ‘cambiar de parecer / cambiar de mente’ con énfasis cognitivo
  rationale: El revision_pass del POB inglés sustituyó la traducción cognitiva ‘changed my mind’ por la moralmente más fuerte ‘repented’, dado que Gad confiesa una conversión moral concreta respecto a José, no solo un cambio intelectual. La versión española sigue esa adjudicación y mantiene ‘arrepentirse’ en línea con la guía del proyecto para contextos de pecado.
  doctrine_reference: 'DOCTRINE.md: μετανοέω → arrepentirse en contextos de pecado; cambio de mente en contextos cognitivos'
translation_notes:
  revision_awareness: El revision_pass del POB inglés cambió ‘fully only’ → ‘at last’ y ‘changed my mind’ → ‘repented’, por mayor precisión léxica y contextual. La versión española recoge ambos cambios.
  spanish_consistency_notes:
  - μετανοέω en contexto de pecado → ‘arrepentirse’.
  - Ἰωσήφ → ‘José’ (forma castellana fija).
  - Concordancia léxica con la nota teológica.
