source:
  edition: Charles 1908 Greek Versions (pages 232-243, Gad pilot)
  text: 5. Φοβούμενος γὰρ⁴¹ μὴ προσκρούσαι⁴² Κυρίῳ⁴³, οὐ θέλει τὸ καθόλου⁴⁴ οὐδὲ⁴⁵ ἕως ἐννοίας⁴⁶ ἀδικῆσαι ἄνθρωπον.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/gad/005/005.yaml
  text: For, fearing lest he offend the Lord, he does not wish at all, not even in thought, to wrong a man.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:53Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Porque, temiendo ofender al Señor[a], no quiere en absoluto, ni siquiera con el pensamiento[b], dañar a un hombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘Ofender al Señor’ traduce un verbo que literalmente significa ‘chocar contra’ o ‘tropezar con’; aquí, en sentido idiomático, hacer falta o incurrir en culpa ante él.
    reason: lexical_alternative
  - marker: b
    text: ‘Ni siquiera con el pensamiento’ traduce ἕως ἐννοίας (‘hasta la intención/concepción interior’); subraya que la prohibición alcanza incluso al ámbito mental.
    reason: lexical_alternative
lexical_decisions:
- source_word: φοβούμενος
  english_pob_choice: fearing
  chosen_spanish: temiendo
  alternatives_spanish:
  - por temor a
  - con temor de
  lexicon: LSJ
  rationale: Participio adverbial natural en español, conserva la forma del original griego.
- source_word: προσκρούσαι Κυρίῳ
  english_pob_choice: offend the Lord
  chosen_spanish: ofender al Señor
  alternatives_spanish:
  - chocar contra el Señor
  - incurrir en falta contra el Señor
  lexicon: LSJ
  rationale: ‘Ofender’ es la forma idiomática para pecar contra el Señor en español, igual que en el inglés POB.
- source_word: οὐ θέλει τὸ καθόλου
  english_pob_choice: he does not wish at all
  chosen_spanish: no quiere en absoluto
  alternatives_spanish:
  - no desea de ningún modo
  - en modo alguno quiere
  lexicon: LSJ
  rationale: ‘En absoluto’ recoge el carácter total del rechazo expresado por τὸ καθόλου.
- source_word: ἕως ἐννοίας
  english_pob_choice: not even in thought
  chosen_spanish: ni siquiera con el pensamiento
  alternatives_spanish:
  - hasta en la intención
  - ni aun en concepto interior
  lexicon: LSJ
  rationale: Trae al castellano el alcance interior de la prohibición; ‘con el pensamiento’ es la fórmula más idiomática.
- source_word: ἀδικῆσαι ἄνθρωπον
  english_pob_choice: to wrong a man
  chosen_spanish: dañar a un hombre
  alternatives_spanish:
  - agraviar a un hombre
  - hacer injusticia a un hombre
  lexicon: LSJ
  rationale: ‘Dañar’ recoge bien la idea de causar perjuicio en sentido amplio; ‘agraviar’ se anota como alternativa más jurídica.
translation_notes:
  revision_awareness: 'El revision_pass del POB inglés no introdujo cambios en este versículo (unchanged: true).'
  spanish_consistency_notes:
  - Κύριος → ‘Señor’ a lo largo del capítulo.
  - ἄνθρωπος → ‘hombre’ con sentido genérico.
  - Mantenimiento de la fórmula interior ‘con el pensamiento’ para ἔννοια.
