translation:
  language: es
  text: Pues por las mismas cosas con que un hombre transgrede[a], por esas mismas es castigado[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘Transgrede’ traduce παρανομεῖ (literalmente ‘actuar al margen de la ley’).
    reason: lexical_alternative
  - marker: b
    text: 'Máxima de retribución correspondiente: el medio del pecado se vuelve medio del castigo.'
    reason: theological_note
lexical_decisions:
- source_word: δι’ ὧν ... δι’ ἐκείνων
  english_pob_choice: by ... through those
  chosen_spanish: por las mismas cosas con que ... por esas mismas
  alternatives_spanish:
  - por aquello con que ... por aquello mismo
  - por los mismos medios con los que ... por esos mismos
  lexicon: LSJ
  rationale: Conserva el paralelismo retórico de la máxima griega y la idea de retribución correspondiente.
- source_word: παρανομεῖ
  english_pob_choice: transgresses
  chosen_spanish: transgrede
  alternatives_spanish:
  - actúa contra la ley
  - peca
  - obra ilícitamente
  lexicon: LSJ
  rationale: ‘Transgredir’ mantiene el sentido de violación de la ley moral, ajustándose al carácter sentencioso del versículo.
- source_word: κολάζεται
  english_pob_choice: is punished
  chosen_spanish: es castigado
  alternatives_spanish:
  - recibe castigo
  - es disciplinado
  lexicon: LSJ
  rationale: Pasivo simple y económico, en línea con el carácter de máxima retributiva del dicho.
