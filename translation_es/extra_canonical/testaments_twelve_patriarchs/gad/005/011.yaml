id: T12P.GAD.5.11
reference: Testament of Gad 5:11
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 232-243, Gad pilot)
  text: 11. Ἐπεὶ Γοὖν⌉ ἔκειτο⁶⁵ τὰ ἥπατα μου ἀνιλεως⁶⁶ κατὰ τοῦ Ἰωσήφ, *τῷ ἥπατι⁶⁷ πάσχων⁶⁸ ἀνιλεως ἐκρινόμην ἐπὶ *χρόνους δέκα⁶⁹, καθ’ *ὃν χρόνον⁷⁰ ἐπείχον⁷¹ τῷ Ἰωσήφ⁷².
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/gad/005/011.yaml
  text: Since, then, my liver was pitilessly set against Joseph, I too, suffering in my liver, was judged pitilessly for ten years.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:55Z'
    unchanged: false
    changes_summary: Changed 'lay pitilessly set against' to 'was pitilessly set against' for more natural English, and corrected 'ten months' to 'ten years' for χρόνους δέκα.
translation:
  language: es
  text: Pues, ya que mi hígado estaba sin compasión[a] dispuesto contra José, también yo, sufriendo en el hígado, fui juzgado sin compasión durante diez años[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘Sin compasión’ traduce ἀνιλεως (‘sin piedad, despiadadamente’); el original lo emplea dos veces para subrayar la simetría retributiva.
    reason: lexical_alternative
  - marker: b
    text: ‘Diez años’ traduce χρόνους δέκα; literalmente ‘diez tiempos/períodos’. El revision_pass del POB inglés corrigió una traducción previa de ‘ten months’ a ‘ten years’, decisión que aquí se sigue.
    reason: alternative_reading
lexical_decisions:
- source_word: ἔκειτο ... κατὰ τοῦ Ἰωσήφ
  english_pob_choice: lay ... set against Joseph
  chosen_spanish: estaba ... dispuesto contra José
  alternatives_spanish:
  - yacía ... contra José
  - se hallaba fijo contra José
  lexicon: LSJ
  rationale: El revision_pass del POB inglés cambió ‘lay’ por ‘was’ por mayor naturalidad. ‘Estaba dispuesto contra’ recoge esa decisión y conserva la metáfora corporal-hostil.
- source_word: ἀνιλεως
  english_pob_choice: pitilessly
  chosen_spanish: sin compasión
  alternatives_spanish:
  - despiadadamente
  - sin piedad
  - implacablemente
  lexicon: LSJ
  rationale: ‘Sin compasión’ es la fórmula española idiomática para esta locución y se repite en el mismo versículo (paralelismo del POB ‘pitilessly... pitilessly’).
- source_word: τῷ ἥπατι πάσχων
  english_pob_choice: suffering in my liver
  chosen_spanish: sufriendo en el hígado
  alternatives_spanish:
  - padeciendo en el hígado
  - afligido en el hígado
  lexicon: LSJ
  rationale: Mantiene el dativo de localización griego y la conexión deliberada entre la hostilidad interna y la dolencia física.
- source_word: ἐκρινόμην
  english_pob_choice: was judged
  chosen_spanish: fui juzgado
  alternatives_spanish:
  - fui condenado
  - fui castigado
  lexicon: LSJ
  rationale: ‘Juzgado’ conserva el matiz judicial; el contexto deja implícita la dimensión punitiva sin sobre-especificar.
- source_word: χρόνους δέκα
  english_pob_choice: for ten years
  chosen_spanish: durante diez años
  alternatives_spanish:
  - por diez años
  - por diez períodos
  - por diez tiempos
  lexicon: LSJ
  rationale: El revision_pass del POB inglés corrigió ‘ten months’ a ‘ten years’ para χρόνους δέκα. La versión española sigue esa adjudicación.
translation_notes:
  revision_awareness: El revision_pass del POB inglés (1) cambió ‘lay pitilessly set against’ por ‘was pitilessly set against’ y (2) corrigió ‘ten months’ por ‘ten years’. La versión española recoge ambos cambios.
  spanish_consistency_notes:
  - ἥπατος / ἥπατι → ‘hígado’ a lo largo del capítulo.
  - ἀνιλεως → ‘sin compasión’ usado dos veces para conservar el paralelismo retórico.
  - Ἰωσήφ → ‘José’ (forma castellana fija).
