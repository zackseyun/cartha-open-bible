id: T12P.GAD.5.1
reference: Testament of Gad 5:1
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 232-243, Gad pilot)
  text: V. ⸀Κακὸν οὖν¹ ἐστι² τὸ μῖσος³, ὅτι *ἐνδελεχεῖ συνεχῶς³ *τῷ ψεύδει, λαλῶν⁴ κατὰ τῆς⁵ ἀληθείας, καὶ τὰ μικρὰ μεγάλα ποιεῖ⁶, τὸ *φῶς σκότος⁷ παρέχει⁸, καὶ⁹ τὸ γλυκὺ πικρὸν λέγει¹⁰, ⸀καὶ⸀ συκοφαντίαν¹¹ ἐκδιδάσκει *καὶ ὀργὴν¹² ⸀ἐκταράσσει⸀¹³ καὶ πόλεμον ⸀διεγείρει⸀¹⁴, καὶ ὕβριν¹⁵ καὶ πᾶσαν πλεονεξίαν, κακῶν¹⁶ καὶ¹⁷ ἰοῦ διαβολικοῦ τὴν καρδίαν ἐκπληροῖ¹⁸.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/gad/005/001.yaml
  text: Hatred, then, is evil, because it continually associates with falsehood, speaking against the truth; it makes small things great, presents light as darkness, and calls the sweet bitter. It teaches slander, stirs up wrath and war, and fills the heart with insolence and every greed, with evils and a devilish poison.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:51Z'
    unchanged: false
    changes_summary: Revised 'keeps company with falsehood continually' to 'continually associates with falsehood' for more natural English while preserving the sense of ἐνδελεχεῖ συνεχῶς τῷ ψεύδει. No other changes.
translation:
  language: es
  text: Por tanto, el odio es malo, porque continuamente se asocia[a] con la mentira, hablando contra la verdad; hace grandes las cosas pequeñas, presenta la luz como tinieblas y llama amargo a lo dulce. Enseña la calumnia, suscita la ira y la guerra, y llena el corazón de insolencia y de toda codicia, de males y de veneno diabólico.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. 'frecuenta sin cesar la mentira' o 'está continuamente con la mentira'. El doble adverbio del griego enfatiza la persistencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: μῖσος
  english_pob_choice: hatred
  chosen_spanish: odio
  alternatives_spanish:
  - aborrecimiento
  lexicon: LSJ
  rationale: Mantiene 'odio' por consistencia con el resto del Testamento de Gad.
- source_word: ἐνδελεχεῖ συνεχῶς τῷ ψεύδει
  english_pob_choice: continually associates with falsehood
  chosen_spanish: continuamente se asocia con la mentira
  alternatives_spanish:
  - está continuamente con la mentira
  - frecuenta sin cesar la mentira
  lexicon: LSJ
  rationale: Refleja el sentido de ἐνδελεχέω (estar continuamente con) sin sonar arcaico; el doble adverbio del griego se condensa en 'continuamente' por naturalidad.
- source_word: συκοφαντίαν ἐκδιδάσκει
  english_pob_choice: teaches slander
  chosen_spanish: enseña la calumnia
  alternatives_spanish:
  - enseña la difamación
  - instruye en la sicofancia
  lexicon: LSJ
  rationale: '''Calumnia'' es el equivalente español más natural y mantiene el matiz de acusación falsa de συκοφαντία.'
- source_word: ὀργὴν ἐκταράσσει
  english_pob_choice: stirs up wrath
  chosen_spanish: suscita la ira
  alternatives_spanish:
  - agita la ira
  - alborota la ira
  lexicon: LSJ
  rationale: Verbo que conserva el sentido activo de provocar y agitar la pasión interna.
- source_word: ὕβριν
  english_pob_choice: insolence
  chosen_spanish: insolencia
  alternatives_spanish:
  - soberbia
  - ultraje
  lexicon: LSJ
  rationale: '''Insolencia'' captura el orgullo desbordado y la ofensa hacia otros, central en ὕβρις.'
- source_word: πλεονεξίαν
  english_pob_choice: every greed
  chosen_spanish: toda codicia
  alternatives_spanish:
  - toda avaricia
  - todo afán de más
  lexicon: LSJ
  rationale: '''Codicia'' es la traducción tradicional para πλεονεξία; abarca el deseo desordenado de tener más.'
- source_word: ἰοῦ διαβολικοῦ
  english_pob_choice: a devilish poison
  chosen_spanish: veneno diabólico
  alternatives_spanish:
  - ponzoña diabólica
  - veneno del diablo
  lexicon: LSJ
  rationale: Mantiene la fuerza del adjetivo διαβολικός referido a la naturaleza del Diablo, sin sustituir por circunloquio.
translation_notes:
  revision_awareness: El POB inglés cambió 'keeps company with falsehood continually' por 'continually associates with falsehood' para naturalidad. Mi versión española usa 'continuamente se asocia con la mentira', alineada con el texto revisado.
  spanish_consistency_notes:
  - '''odio'' para μῖσος consistente con el cap. 4'
  - '''calumnia'' para συκοφαντία/calumniar verbal'
  - '''insolencia'' para ὕβρις en contextos de vicio'
