translation:
  language: es
  text: Pues Dios trajo sobre mí una enfermedad del hígado[a], y si las oraciones de mi padre[b] no me hubieran ayudado, casi habría desfallecido mi espíritu[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '‘Enfermedad del hígado’ se conserva literal: el capítulo conecta moralmente la hostilidad interior de Gad con la dolencia hepática.'
    reason: cultural_note
  - marker: b
    text: ‘Las oraciones de mi padre’ es lenguaje intercesorio típico (εὐχαί).
    reason: lexical_alternative
  - marker: c
    text: '‘Habría desfallecido mi espíritu’ traduce ἐξέλειπε τὸ πνεῦμα μου preservando el lenguaje antropológico de ‘espíritu/aliento’; alternativa más prosaica: ‘casi habría muerto’.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπήγαγε
  english_pob_choice: brought upon
  chosen_spanish: trajo sobre
  alternatives_spanish:
  - envió sobre
  - puso sobre
  lexicon: LSJ
  rationale: ‘Traer sobre’ recoge el sentido literal de ἐπάγω en construcciones de aflicción/castigo divino, conservando la imagen del peso impuesto.
- source_word: νόσον ἥπατος
  english_pob_choice: a disease of the liver
  chosen_spanish: una enfermedad del hígado
  alternatives_spanish:
  - una dolencia del hígado
  - una enfermedad hepática
  lexicon: LSJ
  rationale: Renderización literal porque el capítulo establece un nexo moral entre la hostilidad interior de Gad y la aflicción del hígado.
- source_word: αἱ εὐχαὶ τοῦ πατρός μου
  english_pob_choice: the prayers of my father
  chosen_spanish: las oraciones de mi padre
  alternatives_spanish:
  - las plegarias de mi padre
  - las súplicas de mi padre
  lexicon: LSJ
  rationale: ‘Oraciones’ es la equivalencia bíblica estándar para εὐχή en sentido intercesorio.
- source_word: ἐβοήθησάν μοι
  english_pob_choice: had not helped me
  chosen_spanish: no me hubieran ayudado
  alternatives_spanish:
  - no me hubieran socorrido
  - no hubieran venido en mi auxilio
  lexicon: LSJ
  rationale: ‘Ayudar’ recoge el sentido amplio de βοηθέω; el subjuntivo pluscuamperfecto preserva la condicionalidad contraria a los hechos del original.
- source_word: ὀλίγου δεῖν
  english_pob_choice: almost
  chosen_spanish: casi
  alternatives_spanish:
  - por poco
  - a punto estuvo de
  lexicon: LSJ
  rationale: ‘Casi’ es la equivalencia más natural y económica para esta locución griega.
- source_word: ἐξέλειπε τὸ πνεῦμα μου
  english_pob_choice: my spirit would almost have failed
  chosen_spanish: habría desfallecido mi espíritu
  alternatives_spanish:
  - mi aliento casi me habría dejado
  - habría expirado
  - casi habría muerto
  lexicon: LSJ
  rationale: Conserva el lenguaje antropológico ‘espíritu’ en lugar de aplanarlo a paráfrasis; ‘desfallecer’ recoge la idea de fallo vital sin afirmar muerte literal.
translation_notes:
  revision_awareness: 'El revision_pass del POB inglés no introdujo cambios en este versículo (unchanged: true).'
