translation:
  language: es
  text: '1[a]. Copia de las palabras de Gad, las cosas que habló a sus hijos en el año ciento veinticinco de su vida, diciéndoles:


    2. Escuchen las palabras de la verdad, hijos míos, y practiquen la justicia y toda la ley del Altísimo. No se desvíen tras el espíritu del odio, porque es maligno en todas las obras de los hombres.


    3. Lo que un hombre odia, eso no quiere verlo ni oírlo. Si alguno habla del Señor, lo odia como a quien lo reprende. Si alguno prospera, lo envidia. Si alguno es rico, no se complace en ello. Si alguno es valiente, no lo alaba. Calumnia al hombre veraz, le rehúsa lo bueno al hombre exitoso, y ama al arrogante y al inicuo. Pues el odio ciega su alma, como yo también vi respecto de José.


    4. Pues comencé a odiarlo desde el día en que le contó a nuestro padre que los hijos de Zilpa y Bilha estaban degollando lo mejor del rebaño y comiéndolo aparte de Judá y de José.


    5. Pues le dijo a nuestro padre que yo había dicho: "Vi un cordero que estaba siendo despedazado por un oso, y mientras corría tras el oso lo maté; pero al cordero lo degollé, porque no podía vivir, y nos lo comimos."


    6. Y por causa de esto me enojé con José hasta el día en que fue vendido.


    7. Y el espíritu del odio estaba en mí, y no quería ni oír a José con mis oídos ni verlo con mis ojos, porque nos reprendió cara a cara, diciendo que estábamos comiendo del rebaño aparte de Judá.


    8. Pues en todo lo que él decía a nuestro padre, este le creía.


    9. Confieso ahora mi pecado, hijos míos: muchas veces quise matarlo, porque lo odiaba de corazón.


    10. Y lo odié aún más por sus sueños; y quería borrarlo de la tierra[b], como un buey devora la hierba del campo.


    11. Por eso Judá y yo lo vendimos a los ismaelitas por treinta piezas de oro.


    12. Pero el Señor de nuestros padres no nos permitió actuar inicuamente con él, de modo que lo matáramos.


    13. Y ahora, hijos míos, les digo: ame cada uno a su hermano, y aparten el odio de sus corazones. Ámense unos a otros en hechos, en palabras y en la disposición del alma.


    14. Pues delante de mi padre yo hablaba pacíficamente con José, pero cuando había salido, el espíritu del odio oscurecía mi mente y agitaba mi alma para matarlo.


    15. Ámense unos a otros de corazón; y si alguno peca contra ti, háblale pacíficamente, y en tu alma no albergues engaño; y si confiesa y se arrepiente, perdónalo.


    16. Pero si lo niega, no te enardezcas con él, no sea que, recibiendo de él el veneno, jures y así peques doblemente.


    17. Que nadie escuche tus secretos cuando él esté en disputa contigo, no sea que te odie y se vuelva tu enemigo y cometa contra ti algún gran pecado; pues a menudo te habla con astucia, o se asocia contigo con un fin malvado.


    18. Y si lo niega y se avergüenza al ser reprendido, calla. Pues al negarlo se arrepiente, y ya no te hará mal; al contrario, te honrará y te respetará y estará en paz contigo.


    19. Pero si es desvergonzado y persiste en su mal hacer, aun así perdónalo de corazón, y deja la venganza a Dios.


    20. Si alguno se enriquece por medios injustos, no lo envidies; sino espera el fin señalado por el Señor.


    21. Pues si quita y devuelve el doble, no te perturbes; sé paciente hasta que el Señor ejecute juicio.


    22. Pues el pobre, si está libre de envidia, agrada al Señor en todas las cosas, y es bendito sobre todos los hombres, porque no tiene la fatiga de los hombres vanos.


    23. Por tanto, aparten la envidia de sus almas, y ámense unos a otros con rectitud de corazón.


    24. Cuenten estas cosas también a sus hijos, para que honren a Leví y a Judá; pues de ellos el Señor levantará salvación para Israel.


    25. Pues sé que al final se apartarán de él y caminarán inicuamente y harán violencia a Leví y pelearán contra Judá.


    26. Pero no prevalecerán contra ellos, porque un ángel del Señor los guía a ambos; pues por ellos Israel se mantendrá en pie.


    27. Y cuando se aparten del Señor, caminarán en toda obra mala y cometerán las abominaciones de las naciones, desviándose tras mujeres que practican la iniquidad, mientras que espíritus de maldad obran en ustedes con toda malicia.


    28. Pues he leído en el libro de Enoc el justo que su príncipe es Satanás, y que todos los espíritus de la inmoralidad sexual y de la arrogancia atenderán a los hijos de Leví, para hacerlos pecar delante del Señor.


    29. Y mis hijos se acercarán a Leví y pecarán con ellos en todas las cosas; y los hijos de Judá serán codiciosos, saqueando los bienes de otros como leones.


    30. Por eso serán llevados con ellos al cautiverio, y allí recibirán todas las plagas de Egipto y todos los males de las naciones.


    31. Por tanto, cuando se vuelvan al Señor, actúen con rectitud y toda justicia, y obren misericordia y verdad cada uno con su prójimo.


    32. Y si se vuelven al Señor con rectitud de corazón, y apartan el odio y la iniquidad, y se aman unos a otros de corazón, entonces habrá paz para ustedes.


    33. Y ningún hijo de hombre podrá prevalecer contra ustedes, porque el Dios del cielo estará entre ustedes, haciendo paz para ustedes y para todo Israel.


    34. Y ningún enemigo se alegrará sobre ustedes; y toda fiera salvaje los temerá, y el Señor los bendecirá en toda obra y en toda palabra.


    35. Y ahora, hijos míos, teman al Señor Dios del cielo, y guárdense de Satanás y de sus espíritus.


    36. Acérquense a Dios y al ángel que intercede por ustedes, porque él es mediador entre Dios y los hombres por la paz de Israel.


    37. Él se levantará contra el reino del enemigo; por eso el enemigo se afana en destruir a todos los que invocan al Señor.


    38. Pues sabe que en el día en que Israel se arrepienta, el reino del enemigo será llevado a su fin.


    39. Pues el mismísimo ángel de paz fortalecerá a Israel, para que no caiga en el extremo del mal.


    40. Y en el tiempo de la iniquidad de Israel, el Señor no se apartará de ellos, sino que los transformará en una nación que hace su voluntad; pues ningún ángel es igual a él.


    41. Y su nombre estará en todo lugar de Israel y entre las naciones.


    42. Guárdense, pues, hijos míos, de toda obra inicua, y aparten de ustedes todo odio y mentira, y amen la verdad y la longanimidad.


    43. Y todo lo que hayan oído de su padre, transmítanlo a sus hijos, para que el Salvador de las naciones los reciba; pues él es verdadero y longánime, manso y humilde, y enseña por sus obras la ley de Dios.


    44. Por tanto, apártense de toda injusticia y aférrense a la justicia de Dios, y su linaje será salvo para siempre.


    45. Y cuando les hubo ordenado estas cosas, les dijo que lo enterraran en Hebrón.


    46. Y se durmió un buen sueño, anciano y lleno de días.


    47. Y sus hijos hicieron como les había ordenado[d][c], y lo llevaron a Hebrón y lo enterraron con sus padres.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunas líneas de la sección narrativa de apertura presentan dificultades textuales en los testimonios griegos sobrevivientes; el sentido se refiere a la fuerza de Gad guardando el rebaño y al inicio de su resentimiento hacia José.
    reason: textual_variant
  - marker: b
    text: '''Treinta piezas de oro'' es la lectura de este testimonio; otras recensiones del relato de José hablan más comúnmente de veinte piezas.'
    reason: textual_variant
  - marker: c
    text: '''He leído en el libro de Enoc'' refleja la apelación del texto a la tradición enóquica como advertencia autoritativa.'
    reason: cross_reference
  - marker: d
    text: Las referencias finales al 'ángel que intercede,' al 'ángel de paz' y al 'Salvador de las naciones' pueden reflejar transmisión por capas. La traducción preserva el testimonio griego sin intentar armonizarlo.
    reason: alternative_reading
lexical_decisions:
- source_word: μῖσος / πνεῦμα τοῦ μίσους
  english_pob_choice: hatred / spirit of hatred
  chosen_spanish: odio / espíritu del odio
  alternatives_spanish:
  - aborrecimiento
  - espíritu aborrecedor
  lexicon: LSJ
  rationale: Vicio central del capítulo, rendido consistentemente para preservar la advertencia temática de Gad contra una fuerza moral-espiritual dominante en lugar de un sentimiento pasajero.
- source_word: δικαιοσύνη
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - integridad
  lexicon: LSJ
  rationale: Rendido por defecto del proyecto; en contextos exhortativos lleva fuerza moral-covenantal más amplia que la mera justicia forense.
- source_word: νόμος
  english_pob_choice: law
  chosen_spanish: ley
  alternatives_spanish:
  - instrucción
  lexicon: LSJ
  rationale: La parénesis testamentaria evoca lenguaje de obediencia covenantal judía; 'ley' preserva ese registro.
- source_word: ἐνεκότουν
  english_pob_choice: I was angry with
  chosen_spanish: me enojé con
  alternatives_spanish:
  - guardé rencor
  - me resentí
  lexicon: LSJ
  rationale: Verbo que indica resentimiento sostenido; 'enojarse' es legible y el contexto repetido preserva la intensidad.
- source_word: κατὰ πρόσωπον ἤλεγξεν
  english_pob_choice: rebuked us to our face
  chosen_spanish: nos reprendió cara a cara
  alternatives_spanish:
  - nos confrontó abiertamente
  lexicon: LSJ
  rationale: Conserva el sentido directo y confrontativo del modismo y encaja con el conflicto familiar.
- source_word: τὰ θρέμματα
  english_pob_choice: the flock
  chosen_spanish: el rebaño / el ganado
  alternatives_spanish:
  - los animales
  lexicon: LSJ
  rationale: Contexto pastoril; 'rebaño' o 'ganado' según naturalidad de cada cláusula.
- source_word: ἐμαλακίσθη ὑπὸ τοῦ καύσωνος
  english_pob_choice: was overcome by the heat
  chosen_spanish: fue debilitado por el calor
  alternatives_spanish:
  - desfalleció por el calor
  lexicon: LSJ
  rationale: Transmite la debilidad juvenil de José bajo el sol en español natural.
- source_word: δι᾽ ἀκοῆς ... δι᾽ ὀφθαλμῶν
  english_pob_choice: either to hear ... with my ears or to see ... with my eyes
  chosen_spanish: ni oír ... con mis oídos ni ver ... con mis ojos
  alternatives_spanish:
  - ni oírlo ni verlo
  lexicon: LSJ
  rationale: El fraseo más completo preserva el paralelismo retórico y la aversión corporal del griego.
- source_word: μετανοῇ / μετανοεῖ
  english_pob_choice: repents
  chosen_spanish: se arrepiente
  alternatives_spanish:
  - cambia de mente
  - se vuelve
  lexicon: LSJ
  rationale: En este contexto específico de pecado-perdón, la guía del proyecto prefiere 'arrepentirse'.
- source_word: μακροθυμία
  english_pob_choice: longsuffering
  chosen_spanish: longanimidad
  alternatives_spanish:
  - paciencia
  - tolerancia
  lexicon: LSJ
  rationale: Conserva el registro ético elevado del testamento; empareja bien con misericordia y verdad.
- source_word: ἄγγελος τῆς εἰρήνης
  english_pob_choice: angel of peace
  chosen_spanish: ángel de paz
  alternatives_spanish:
  - mensajero de paz
  lexicon: LSJ
  rationale: Agente personal celestial; 'ángel' no se desmitologiza.
- source_word: μεσίτης
  english_pob_choice: mediator
  chosen_spanish: mediador
  alternatives_spanish:
  - intermediario
  - intercesor
  lexicon: LSJ
  rationale: Preserva el rol teológico formal; 'intercede' se usa cerca para claridad.
- source_word: σωτήρ
  english_pob_choice: Savior
  chosen_spanish: Salvador
  alternatives_spanish:
  - libertador
  lexicon: LSJ
  rationale: Título con peso teológico en la exhortación final; capitalizado.
- source_word: γένος
  english_pob_choice: race
  chosen_spanish: linaje
  alternatives_spanish:
  - raza
  - descendencia
  lexicon: LSJ
  rationale: '''Linaje'' preserva el lenguaje genealógico mejor que ''raza'' (con connotaciones modernas problemáticas en español).'
theological_decisions:
- issue: Referencia a la salvación futura desde Leví y Judá
  chosen_reading: Traducido como 'de ellos el Señor levantará salvación para Israel' sin especificar identidad doctrinal posterior en el texto principal.
  alternative_readings:
  - Una referencia mesiánica enfocada solo en Judá
  - Una expectativa dual sacerdotal-real desde Leví y Judá
  - Una alusión cristianizada posterior a Cristo
  rationale: El griego nombra a Leví y a Judá. La traducción preserva la tensión textual.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
- issue: Angelología en la sección de cierre
  chosen_reading: 'Lenguaje de agente personal celestial retenido: ''ángel que intercede,'' ''mediador,'' y ''ángel de paz.'''
  alternative_readings:
  - Personificación simbólica de la providencia divina
  - Interpolación posterior a suavizar
  rationale: El testimonio griego presenta estos como agentes personales activos. La transparencia exige traducir el testimonio honestamente.
