base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/gad/006.yaml
  text: '1[a]. And now, my children, I urge you: let each one love his neighbor, and remove hatred from your hearts. Love one another in deed and word and purpose of soul.


    2. For I myself, in my father’s presence, spoke peaceably to Joseph; but when I went out from his presence, the spirit of hatred darkened my mind and disturbed my thoughts so that I wanted to kill him.


    3. Love one another from the heart; and if anyone sins against you[b], speak peace to him, and in your soul hold no deceit; and if he confesses and repents, forgive him.


    4. But if he denies it, do not contend with him, lest, when he swears an oath, you sin doubly.


    5. Do not let a stranger hear your secret in a quarrel, lest, hating you, he become your enemy and commit a great sin against you; for many times he either kills by treachery or entangles you in evils, having taken in from you the poison.


    6. But if he denies it and is ashamed when reproved, be still and do not reprove him further. For the one who denies it repents of having done wrong against you, so as not to wrong you again, and, being afraid, makes peace.


    7. But even if he is shameless and persists in evil, even so forgive him from the heart[c], and leave vengeance to God.'
  footnotes:
  - marker: a
    text: Verse 3 has textual variation around 'speak peace to him' and the placement of 'in your soul hold no deceit'; the sense of peaceful address without inward guile is secure.
    reason: textual_variant
  - marker: b
    text: Verse 5 is textually difficult. The warning concerns exposing a private matter during a quarrel, which may lead the other person to hostile and treacherous action; the final image uses 'poison' metaphorically for absorbed hatred.
    reason: textual_variant
  - marker: c
    text: Some witnesses in verse 6 differ in wording around the denier’s repentance and fear, but the overall sense is that shame may lead him to cease the offense and make peace.
    reason: textual_variant
