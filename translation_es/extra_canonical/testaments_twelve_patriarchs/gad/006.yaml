translation:
  language: es
  text: '1[a]. Y ahora, hijos míos, los exhorto: que cada uno ame a su prójimo, y quiten el odio de sus corazones. Ámense unos a otros en obra y en palabra y en el propósito del alma.


    2. Pues yo, en presencia de mi padre, hablaba pacíficamente a José; pero cuando salí de su presencia, el espíritu del odio oscurecía mi mente y perturbaba mis pensamientos hasta el punto de querer matarlo.


    3. Ámense unos a otros de corazón; y si alguno peca contra ti[b], háblale paz, y en tu alma no guardes engaño; y si confiesa y se arrepiente, perdónalo.


    4. Pero si lo niega, no contiendas con él, no sea que, cuando jure, peques doblemente.


    5. No dejes que un extraño escuche tu secreto en una disputa, no sea que, llegando a odiarte, se vuelva tu enemigo y cometa contra ti un gran pecado; porque muchas veces o te asesina con traición o te enreda en males, habiendo recibido de ti el veneno.


    6. Pero si lo niega y se avergüenza al ser reprendido, calla; no lo reprendas. Pues el que lo niega se arrepiente de haber pecado contra ti, para no obrar mal contra ti otra vez, y, lleno de temor, hace las paces.


    7. Pero aun si es desvergonzado y persiste en la maldad, aun así perdónalo de corazón[c], y entrega a Dios la venganza.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El versículo 3 presenta variación textual entre las recensiones (α y β/Α/S¹) en torno a 'háblale paz' y la ubicación del 'no guardar engaño en tu alma'; el sentido — palabra apacible sin doblez interior — es estable.
    reason: textual_variant
  - marker: b
    text: El versículo 5 es textualmente difícil. La advertencia trata de exponer un asunto privado durante una disputa, lo que puede llevar al otro a una acción hostil y traicionera; la imagen final usa 'veneno' metafóricamente del odio absorbido.
    reason: textual_variant
  - marker: c
    text: Algunas recensiones difieren en la redacción del versículo 6 acerca del arrepentimiento del que niega y de su temor; el sentido global es que la vergüenza puede llevarlo a cesar la ofensa y hacer las paces.
    reason: textual_variant
lexical_decisions:
- source_word: παραινῶ
  english_pob_choice: I urge
  chosen_spanish: los exhorto
  alternatives_spanish:
  - los aconsejo
  - les insto
  lexicon: LSJ
  rationale: '''Exhortar'' conserva la fuerza parenética testamentaria; ''los'' (ustedes) mantiene el registro latinoamericano neutro.'
- source_word: πλησίον
  english_pob_choice: neighbor
  chosen_spanish: prójimo
  alternatives_spanish:
  - semejante
  - vecino
  lexicon: BDAG
  rationale: Término ético tradicional con clara fuerza interpersonal, paralelo a 'neighbor' del POB.
- source_word: ἐξάρατε τὸ μῖσος
  english_pob_choice: remove hatred
  chosen_spanish: quiten el odio
  alternatives_spanish:
  - arranquen el odio
  - expulsen el odio
  lexicon: LSJ
  rationale: Refleja la expulsión decisiva del corazón en español natural sin caer en arcaísmos.
- source_word: διανοίᾳ ψυχῆς
  english_pob_choice: purpose of soul
  chosen_spanish: el propósito del alma
  alternatives_spanish:
  - la mente del alma
  - la intención interior
  lexicon: LSJ
  rationale: Conserva la interioridad griega en lugar de aplanarla a 'sinceramente'.
- source_word: εἰρηνικά
  english_pob_choice: peaceably
  chosen_spanish: pacíficamente
  alternatives_spanish:
  - palabras de paz
  - en paz
  lexicon: LSJ
  rationale: Adverbio que conserva el contraste entre la apariencia pacífica y el odio interior.
- source_word: τὸ πνεῦμα τοῦ μίσους
  english_pob_choice: the spirit of hatred
  chosen_spanish: el espíritu del odio
  alternatives_spanish:
  - un espíritu de odio
  - la fuerza del odio
  lexicon: LSJ
  rationale: Mantiene la fuerza personificada/moral; πνεῦμα → 'espíritu' (minúscula) por contexto no divino.
- source_word: νοῦν
  english_pob_choice: mind
  chosen_spanish: mente
  alternatives_spanish:
  - entendimiento
  - razón
  lexicon: BDAG
  rationale: Mejor pareja con 'oscurecía' en el registro español.
- source_word: λογισμόν
  english_pob_choice: thoughts
  chosen_spanish: pensamientos
  alternatives_spanish:
  - razonamiento
  - deliberación
  lexicon: BDAG
  rationale: Variado de 'mente' para evitar repetición rígida; refleja la facultad de razonamiento moral perturbada.
- source_word: εἰπὲ αὐτῷ εἰρήνην
  english_pob_choice: speak peace to him
  chosen_spanish: háblale paz
  alternatives_spanish:
  - dile palabras de paz
  - salúdalo en paz
  lexicon: LSJ
  rationale: Conserva la fórmula semitizante de 'hablar paz' propia de la tradición ética.
- source_word: δόλον
  english_pob_choice: deceit
  chosen_spanish: engaño
  alternatives_spanish:
  - doblez
  - fraude
  lexicon: BDAG
  rationale: '''Engaño'' captura la duplicidad interior en registro moderno claro.'
- source_word: μετανοήσας
  english_pob_choice: repents
  chosen_spanish: se arrepiente
  alternatives_spanish:
  - cambia de mente
  - se vuelve
  lexicon: BDAG
  rationale: 'Sigue la decisión revisada de POB (''repents''): contexto interpersonal de pecado → ''arrepentirse''.'
- source_word: φιλονείκει
  english_pob_choice: contend
  chosen_spanish: contiendas
  alternatives_spanish:
  - disputes
  - porfíes
  lexicon: LSJ
  rationale: '''Contender'' transmite la escalada contenciosa sin coloquializar la advertencia.'
- source_word: δισσῶς ἁμαρτάνεις
  english_pob_choice: you sin doubly
  chosen_spanish: peques doblemente
  alternatives_spanish:
  - cometas un doble pecado
  - peques dos veces
  lexicon: LSJ
  rationale: Compacto y proverbial, conservando la fuerza retórica.
- source_word: μυστήριόν σου
  english_pob_choice: your secret
  chosen_spanish: tu secreto
  alternatives_spanish:
  - tu asunto privado
  - tu confidencia
  lexicon: BDAG
  rationale: En este contexto interpersonal el sentido no es místico sino confidencial.
- source_word: δολοφονεῖ
  english_pob_choice: murders by treachery
  chosen_spanish: te asesina con traición
  alternatives_spanish:
  - te mata a traición
  - te mata por engaño
  lexicon: LSJ
  rationale: Hace explícito el sentido compuesto de matar por engaño.
- source_word: περιεργάζεται σε ἐν κακοῖς
  english_pob_choice: entangles you in evils
  chosen_spanish: te enreda en males
  alternatives_spanish:
  - maquina contra ti en mal
  - te involucra en cosas malas
  lexicon: LSJ
  rationale: Texto difícil; 'enredar en males' preserva el ardid hostil sin sobreinterpretar.
- source_word: τὸν ἰόν
  english_pob_choice: the poison
  chosen_spanish: el veneno
  alternatives_spanish:
  - la ponzoña
  - el tósigo
  lexicon: LSJ
  rationale: Mejor encaje para la metáfora del odio absorbido.
- source_word: αἰδεσθῇ ἐλεγχόμενος
  english_pob_choice: is ashamed when reproved
  chosen_spanish: se avergüenza al ser reprendido
  alternatives_spanish:
  - siente vergüenza cuando es expuesto
  - se ruboriza al ser reprochado
  lexicon: LSJ
  rationale: Capta la vergüenza moral implícita en el sentido pasivo/medio.
- source_word: ἡσύχασον
  english_pob_choice: be still
  chosen_spanish: calla
  alternatives_spanish:
  - aquiétate
  - guarda silencio
  lexicon: LSJ
  rationale: Imperativo claro para cesar de presionar el asunto.
- source_word: πλημμελῆσαι
  english_pob_choice: to have sinned
  chosen_spanish: haber pecado
  alternatives_spanish:
  - haber transgredido
  - haber faltado
  lexicon: LSJ
  rationale: 'Sigue la decisión revisada de POB (''sinned''): registro moral fuerte y claro.'
- source_word: εἰρηνεύει
  english_pob_choice: he makes peace
  chosen_spanish: hace las paces
  alternatives_spanish:
  - vive en paz
  - busca la paz
  lexicon: BDAG
  rationale: Sentido activo apto para el contexto de relaciones restauradas.
- source_word: ἀναιδής
  english_pob_choice: shameless
  chosen_spanish: desvergonzado
  alternatives_spanish:
  - insolente
  - descarado
  lexicon: BDAG
  rationale: Descriptor moral fuerte apropiado al tono de advertencia de Gad.
- source_word: ἐνίσταται τῇ κακίᾳ
  english_pob_choice: persists in evil
  chosen_spanish: persiste en la maldad
  alternatives_spanish:
  - permanece firme en el mal
  - continúa en la maldad
  lexicon: LSJ
  rationale: Comunica la perseverancia obstinada en el mal en español natural.
- source_word: ἀπὸ καρδίας
  english_pob_choice: from the heart
  chosen_spanish: de corazón
  alternatives_spanish:
  - desde el corazón
  - cordialmente
  lexicon: BDAG
  rationale: Conserva la dimensión interior y sincera que enmarca el capítulo.
- source_word: τὴν ἐκδίκησιν
  english_pob_choice: vengeance
  chosen_spanish: la venganza
  alternatives_spanish:
  - la retribución
  - la vindicación
  lexicon: BDAG
  rationale: Término ético-teológico más claro; la cláusula entrega el juicio retaliatorio a Dios.
- source_word: δὸς τῷ Θεῷ
  english_pob_choice: give to God
  chosen_spanish: entrega a Dios
  alternatives_spanish:
  - da a Dios
  - deja a Dios
  lexicon: BDAG
  rationale: Sigue la revisión de POB ('give') que refleja δὸς más directamente.
theological_decisions:
- issue: Rendering de μετανοήσας en contexto ético interpersonal
  chosen_reading: se arrepiente
  alternative_readings:
  - cambia de mente
  - se vuelve
  rationale: Aunque DOCTRINE.md prefiere 'cambio de mente' en contextos cognitivos, el revision_pass de POB optó por 'repents' por la seriedad moral del reconocimiento de pecado interpersonal; sigo esa adjudicación con 'arrepentirse'.
  doctrine_reference: 'DOCTRINE.md: μετανοέω → arrepentimiento/cambio de mente por contexto'
- issue: Cláusula final sobre la retribución
  chosen_reading: entrega a Dios la venganza
  alternative_readings:
  - deja a Dios la venganza
  - da a Dios la retribución
  rationale: El énfasis ético es de no-retaliación y entrega del juicio a Dios; 'venganza' conserva el peso teológico, y 'entrega' refleja δὸς más fielmente que 'deja'.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica en lugar de resolverla'
translation_notes:
  revision_awareness: 'El revision_pass de POB ajustó varias frases para mayor exactitud léxica: ''with the intention of the soul'' → ''purpose of soul'', ''when I had gone out from him'' → ''when I went out from his presence'', ''understanding'' → ''thoughts'', ''changes his mind'' → ''repents'', ''another'' → ''a stranger'', ''do not keep reproving him'' → ''do not reprove him'', ''persists in his wrongdoing'' → ''persists in evil'', y ''leave vengeance'' → ''give vengeance''. Todas estas decisiones se reflejan en el español.'
  spanish_consistency_notes:
  - Imperativos plurales en forma 'ustedes' (latinoamericano neutro).
  - πνεῦμα con minúscula como 'espíritu' cuando se refiere a una fuerza moral no divina; mayúscula reservada para el Espíritu de Dios.
  - δόλος → 'engaño' como rendering por defecto en este capítulo.
  - μετανοέω → 'arrepentirse' en contexto de pecado interpersonal, siguiendo el revision_pass de POB.
  - ἐκδίκησις → 'venganza' por defecto.
