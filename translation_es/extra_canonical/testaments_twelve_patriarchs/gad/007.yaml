base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/gad/007.yaml
  text: 1[a]. But if someone prospers more than you, do not be grieved; rather, pray for him, that he may be brought to completion. For in this way it is to your advantage. 2. And if he is exalted still more[b], do not envy him, remembering that all flesh will die. But offer hymns to the Lord, who gives good and profitable things to all people. 3. Examine the judgments of the Lord, and your purpose will be illumined and be at rest. 4. But if someone grows rich through evil, like Esau my father's brother, do not be jealous; rather, wait for the appointed limit of the Lord. 5. For if what was taken away in evil is taken from him, or if he repents, he is forgiven; but if he remains unrepentant, he is kept for eternal punishment. 6. For the poor man, if being free from envy in all things he is pleasing to the Lord, is richer than all, because he does not have the distraction of vain people. 7. Therefore cast out hatred from your souls[d][c], and love one another in deed and in word and in the
    disposition of your soul.
  footnotes:
  - marker: a
    text: Or 'that he may be perfected' for 'that he may be brought to completion.'
    reason: lexical_alternative
  - marker: b
    text: '''The appointed limit of the Lord'' may also be understood as ''the fixed time'' or ''the decree'' of the Lord.'
    reason: lexical_alternative
  - marker: c
    text: Or 'age-long punishment' for 'eternal punishment.'
    reason: alternative_reading
  - marker: d
    text: The Greek line after 'love one another' is cut off in the surviving OCR excerpt; the closing phrase is supplied in continuity with the extant wording and the chapter's exhortational flow.
    reason: textual_variant
