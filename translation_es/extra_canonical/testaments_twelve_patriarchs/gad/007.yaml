translation:
  language: es
  text: 1[a]. Pero si alguien prospera más que ustedes, no se entristezcan; más bien, oren por él, para que sea llevado a término. Porque así es para su provecho. 2. Y si es exaltado aún más[b], no le tengan envidia, recordando que toda carne morirá. Pero ofrezcan himnos al Señor, que da cosas buenas y provechosas a todos los hombres. 3. Examinen los juicios del Señor, y su propósito será iluminado y estará en reposo. 4. Pero si alguien se enriquece por medio del mal, como Esaú, el hermano de mi padre, no tengan celos; más bien, esperen el límite señalado por el Señor. 5. Porque si lo que fue quitado en medio del mal le es quitado, o si se arrepiente, le es perdonado; pero si permanece impenitente, es guardado para castigo eterno[c]. 6. Porque el pobre, si, libre de envidia en todo, agrada al Señor, es más rico que todos, porque no tiene la distracción de los hombres vanos. 7. Por tanto, echen fuera el odio de sus almas y ámense unos a otros en hechos y en palabra y en la disposición de
    su alma.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para que sea perfeccionado» para «para que sea llevado a término».
    reason: lexical_alternative
  - marker: b
    text: «Límite señalado por el Señor» también puede entenderse como «tiempo señalado» o «decreto» del Señor.
    reason: lexical_alternative
  - marker: c
    text: O «castigo de edad» para «castigo eterno».
    reason: alternative_reading
lexical_decisions:
- source_word: εὐοδοῦται
  english_pob_choice: prospers
  chosen_spanish: prospera
  alternatives_spanish:
  - tiene buen éxito
  - le va bien
  lexicon: LSJ
  rationale: En este contexto ético-social, el verbo expresa que alguien va mejor que otros o tiene éxito. «Prospera» conserva esa comparación y su tono moral.
- source_word: λυπεῖσθε
  english_pob_choice: be grieved
  chosen_spanish: se entristezcan
  alternatives_spanish:
  - se aflijan
  - se sientan dolidos
  lexicon: LSJ
  rationale: La prohibición apunta a la tristeza interior ante el bien ajeno. «Se entristezcan» mantiene ese matiz sin reducirlo solo a resentimiento.
- source_word: τελειωθῇ
  english_pob_choice: be brought to completion
  chosen_spanish: sea llevado a término
  alternatives_spanish:
  - sea perfeccionado
  - sea completado
  lexicon: LSJ
  rationale: La frase griega sugiere un desenlace pleno o consumado, no solo continuidad. «Sea llevado a término» conserva la idea de culminación sin imponer un tecnicismo posterior.
- source_word: συμφέρον
  english_pob_choice: to your advantage
  chosen_spanish: para su provecho
  alternatives_spanish:
  - para su bien
  - les resulta beneficioso
  lexicon: LSJ
  rationale: La cláusula explica por qué la oración es preferible a la envidia. «Para su provecho» traduce el beneficio de manera natural y sobria.
- source_word: ὑψοῦται
  english_pob_choice: is exalted
  chosen_spanish: es exaltado
  alternatives_spanish:
  - es levantado
  - es elevado
  lexicon: LSJ
  rationale: El verbo puede aludir a elevación social o de estatus. «Es exaltado» conserva el registro elevado del original.
- source_word: φθονεῖτε
  english_pob_choice: envy
  chosen_spanish: tengan envidia
  alternatives_spanish:
  - envidien
  - se consuman de envidia
  lexicon: LSJ
  rationale: Aquí el vicio es la envidia ante la prosperidad ajena. La forma directa mantiene la advertencia moral.
- source_word: σὰρξ
  english_pob_choice: flesh
  chosen_spanish: carne
  alternatives_spanish:
  - humanidad
  - carne mortal
  lexicon: LSJ
  rationale: La expresión πᾶσα σὰρξ funciona como fórmula de mortalidad. «Toda carne» conserva el tono bíblico y la solemnidad antropológica.
- source_word: ὕμνους προσφέρετε
  english_pob_choice: offer hymns
  chosen_spanish: ofrezcan himnos
  alternatives_spanish:
  - canten himnos
  - presenten himnos
  lexicon: LSJ
  rationale: «Ofrecer» retiene el matiz cuasi sacrificial del verbo προσφέρετε y el lenguaje de culto del pasaje.
- source_word: συμφέροντα
  english_pob_choice: profitable things
  chosen_spanish: provechosas
  alternatives_spanish:
  - beneficiosas
  - útiles
  lexicon: LSJ
  rationale: Se mantiene la repetición conceptual de συμφέρον con v. 1. «Provechosas» comunica bien la idea de beneficio sin perder el eco léxico.
- source_word: κρίματα Κυρίου
  english_pob_choice: judgments of the Lord
  chosen_spanish: juicios del Señor
  alternatives_spanish:
  - sentencias del Señor
  - decisiones del Señor
  lexicon: LSJ
  rationale: La expresión puede abarcar actos judiciales o disposiciones gobernantes de Dios. «Juicios» preserva la seriedad bíblica y la amplitud semántica.
- source_word: διαβούλιόν
  english_pob_choice: purpose
  chosen_spanish: propósito
  alternatives_spanish:
  - consejo
  - plan
  - deliberación
  lexicon: LSJ
  rationale: El término apunta al propósito o resolución interna de la persona. «Propósito» es claro en español y mantiene la dimensión interior.
- source_word: καταλάμψει
  english_pob_choice: will be illumined
  chosen_spanish: será iluminado
  alternatives_spanish:
  - será esclarecido
  - brillará
  lexicon: LSJ
  rationale: La imagen es de claridad obtenida al considerar los juicios del Señor. «Será iluminado» conserva la metáfora sin forzarla.
- source_word: ἡσυχάσει
  english_pob_choice: be at rest
  chosen_spanish: estará en reposo
  alternatives_spanish:
  - quedará en calma
  - se aquietará
  lexicon: LSJ
  rationale: El resultado es quietud interior tras el discernimiento. «Estará en reposo» suena natural y elevado.
- source_word: ζηλώσητε
  english_pob_choice: be jealous
  chosen_spanish: tengan celos
  alternatives_spanish:
  - envidien
  - sean celosos
  lexicon: LSJ
  rationale: En este versículo la idea es la rivalidad celosa ante la prosperidad lograda por el mal. «Tengan celos» distingue el verbo de la envidia del v. 2 sin alejarse del campo semántico.
- source_word: ὅρον Κυρίου
  english_pob_choice: the appointed limit of the Lord
  chosen_spanish: límite señalado por el Señor
  alternatives_spanish:
  - límite fijado por el Señor
  - decreto del Señor
  - tiempo señalado por el Señor
  lexicon: LSJ
  rationale: ὅρος puede expresar límite, medida o término fijado. «Límite señalado» conserva la idea de medida establecida por Dios sin reducirla solo a tiempo o decreto.
- source_word: ἐκδέξασθε
  english_pob_choice: wait for
  chosen_spanish: esperen
  alternatives_spanish:
  - aguarden
  - receban
  lexicon: LSJ
  rationale: El imperativo pide esperar activamente la acción o el término dispuesto por Dios. «Esperen» comunica esa paciencia de forma directa.
- source_word: μετανοήσαντι
  english_pob_choice: he repents
  chosen_spanish: se arrepiente
  alternatives_spanish:
  - cambia de mente
  - se vuelve
  lexicon: LSJ
  rationale: En este contexto de culpa y perdón, la opción más fiel y clara es «se arrepiente», que mantiene el matiz moral de la exhortación.
- source_word: ἀμετανόητος
  english_pob_choice: unrepentant
  chosen_spanish: impenitente
  alternatives_spanish:
  - sin arrepentimiento
  - no arrepentido
  lexicon: LSJ
  rationale: El contraste del pasaje es entre arrepentimiento y persistencia en el mal. «Impenitente» es una equivalencia precisa y digna para el registro eclesial.
- source_word: αἰωνίαν κόλασιν
  english_pob_choice: eternal punishment
  chosen_spanish: castigo eterno
  alternatives_spanish:
  - punición eterna
  - castigo de edad
  - castigo perpetuo
  lexicon: LSJ
  rationale: La expresión admite debate en torno a αἰώνιος, pero en este contexto exhortativo la lectura más natural es «castigo eterno». Se conserva la fuerza del juicio sin cerrar innecesariamente la discusión semántica.
- source_word: πένης
  english_pob_choice: poor man
  chosen_spanish: el pobre
  alternatives_spanish:
  - el hombre pobre
  - la persona pobre
  lexicon: LSJ
  rationale: El contraste con el rico del contexto hace que «el pobre» sea suficiente y fluido en español, sin perder el valor sustantivo del término.
- source_word: ἄφθονος
  english_pob_choice: free from envy
  chosen_spanish: libre de envidia
  alternatives_spanish:
  - sin envidia
  - no envidioso
  lexicon: LSJ
  rationale: Dado el hilo temático del capítulo, el adjetivo expresa ausencia de envidia más que mera generosidad. «Libre de envidia» captura mejor esa orientación moral.
- source_word: ὑπὲρ πάντας πλουτεῖ
  english_pob_choice: is richer than all
  chosen_spanish: es más rico que todos
  alternatives_spanish:
  - supera en riqueza a todos
  - es más rico que cualquiera
  lexicon: LSJ
  rationale: 'La paradoja es ética: la pobreza libre de envidia constituye verdadera riqueza. «Es más rico que todos» preserva esa inversión de valores.'
- source_word: περισπασμὸν
  english_pob_choice: distraction
  chosen_spanish: la distracción
  alternatives_spanish:
  - la preocupación
  - la dispersión
  - el afán
  lexicon: LSJ
  rationale: El sustantivo sugiere ser arrastrado por muchas cosas. «Distracción» transmite la pérdida de foco provocada por la vanidad social.
- source_word: ματαίων ἀνθρώπων
  english_pob_choice: vain people
  chosen_spanish: de los hombres vanos
  alternatives_spanish:
  - de personas vanas
  - de los hombres vacíos
  lexicon: LSJ
  rationale: Se conserva el giro del original y su tono moral. «Hombres vanos» comunica la vaciedad de sus preocupaciones.
- source_word: ἐξάρατε
  english_pob_choice: cast out
  chosen_spanish: echen fuera
  alternatives_spanish:
  - saquen
  - expulsen
  lexicon: LSJ
  rationale: El imperativo es enérgico y exhortativo. «Echen fuera» mantiene esa fuerza sin sonar demasiado técnico.
- source_word: μῖσος
  english_pob_choice: hatred
  chosen_spanish: el odio
  alternatives_spanish:
  - la enemistad
  lexicon: LSJ
  rationale: El término apunta al opuesto frontal del amor mandado al final del versículo. «Odio» es la opción más clara y directa.
- source_word: ἀγαπήσατε
  english_pob_choice: love
  chosen_spanish: ámense
  alternatives_spanish:
  - áense unos a otros
  - quieranse
  lexicon: LSJ
  rationale: El mandato es recíproco y práctico. «Ámense unos a otros» preserva el carácter comunitario de la exhortación.
theological_decisions:
- issue: Sentido de τελειωθῇ en la oración por el que prospera
  english_pob_reading: that he may be brought to completion
  chosen_spanish_reading: para que sea llevado a término
  alternative_spanish_readings:
  - para que sea perfeccionado
  - para que llegue a su plenitud
  rationale: La frase no obliga a un tecnicismo doctrinal de «perfección»; puede expresar una culminación completa bajo Dios. El español elegido conserva esa amplitud y la oración final del versículo.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Alcance de ὅρον Κυρίου frente a la prosperidad injusta
  english_pob_reading: the appointed limit of the Lord
  chosen_spanish_reading: límite señalado por el Señor
  alternative_spanish_readings:
  - tiempo señalado por el Señor
  - decreto del Señor
  rationale: El texto pide paciencia ante el éxito del mal. «Límite señalado» mantiene la idea de una medida fijada por Dios sin restringirla a cronología o a decreto jurídico solamente.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Interpretación de αἰωνίαν κόλασιν
  english_pob_reading: eternal punishment
  chosen_spanish_reading: castigo eterno
  alternative_spanish_readings:
  - castigo de edad
  - castigo perpetuo
  rationale: En este aviso moral, la traducción más natural y directa es «castigo eterno». Se deja abierta la discusión sobre αἰώνιος, pero sin oscurecer el juicio del pasaje.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios; esta versión conserva el sentido del texto griego y el trazado auditado en inglés, sin introducir ampliaciones doctrinales ajenas al pasaje.
  spanish_consistency_notes:
  - Se mantiene «Señor» para Κυρίῳ/Kυρίου siguiendo la convención del material fuente en este libro testamental.
  - Se conserva la diferencia entre «envidia» y «celos» para reflejar φθονεῖτε y ζηλώσητε con matices distintos.
  - «Carne» se usa en la fórmula de mortalidad πᾶσα σὰρξ para mantener el registro bíblico y antropológico.
  - Se traduce δοῦλος no aplica aquí; no se introducen términos de siervo/esclavo.
  - Se preserva el paralelismo de provecho/beneficio con «provecho» y «provechosas» para συμφέρον/συμφέροντα.
