id: T12P.GAD.7.4
reference: Testament of Gad 7:4
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 232-243, Gad pilot)
  text: 4. Ἐὰν δὲ¹⁵ ἐκ κακῶν¹⁶ τις πλουτήσει, ὡς Ἡσαῦ ὁ πατράδελφός¹⁷ μου, μὴ ζηλώσητε¹⁸· ὅρον¹⁹ γὰρ²⁰ Κυρίου ἐκδέξασθε²¹.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/gad/007/004.yaml
  text: But if someone becomes rich through evil, like Esau, my father's brother, do not be jealous; for await the limit of the Lord.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:00Z'
    unchanged: false
    changes_summary: Changed 'grows rich' to 'becomes rich' for a more direct rendering of πλουτήσει; added commas around the appositive 'my father's brother'; removed 'rather' as not in the source; revised 'wait for the appointed limit' to 'await the limit' to reflect ὅρον more literally without interpretive expansion.
translation:
  language: es
  text: Pero si alguno se hace rico mediante maldades, como Esaú, el hermano de mi padre, no tengan celos; pues aguarden el límite[a] del Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''El límite del Señor'' puede entenderse también como ''el plazo'' o ''el decreto'' del Señor; ὅρος denota tanto frontera como medida fijada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πλουτήσει
  english_pob_choice: becomes rich
  chosen_spanish: se hace rico
  alternatives_spanish:
  - se enriquece
  - llega a ser rico
  lexicon: LSJ
  rationale: Sigue la revisión POB ('becomes rich') por πλουτήσει; 'se hace rico' es el rendering directo.
- source_word: ἐκ κακῶν
  english_pob_choice: through evil
  chosen_spanish: mediante maldades
  alternatives_spanish:
  - por medio de males
  - a través de maldad
  lexicon: LSJ
  rationale: Conserva el sentido instrumental del griego sin sobreinterpretar.
- source_word: πατράδελφός
  english_pob_choice: father's brother
  chosen_spanish: el hermano de mi padre
  alternatives_spanish:
  - mi tío paterno
  - el hermano paterno
  lexicon: LSJ
  rationale: Conserva la construcción literal griega como aposición claramente identificable.
- source_word: ζηλώσητε
  english_pob_choice: be jealous
  chosen_spanish: tengan celos
  alternatives_spanish:
  - envidien
  - sean celosos
  lexicon: LSJ
  rationale: El matiz aquí son celos codiciosos ante la prosperidad inicua; varío de 'envidiar' (φθονεῖτε en v.2) para reflejar el verbo griego distinto.
- source_word: ὅρον Κυρίου
  english_pob_choice: the limit of the Lord
  chosen_spanish: el límite del Señor
  alternatives_spanish:
  - el plazo del Señor
  - el decreto del Señor
  - la frontera del Señor
  lexicon: LSJ
  rationale: ὅρος puede denotar frontera o medida fijada. Sigo la revisión POB ('the limit') que removió 'appointed' por mayor literalidad.
- source_word: ἐκδέξασθε
  english_pob_choice: await
  chosen_spanish: aguarden
  alternatives_spanish:
  - esperen
  - reciban
  lexicon: LSJ
  rationale: El imperativo llama a la espera paciente de la acción señalada por Dios, no a la mera recepción pasiva.
theological_decisions:
- issue: Fuerza de ὅρον Κυρίου frente a la prosperidad inicua
  chosen_reading: el límite del Señor
  alternative_readings:
  - el decreto del Señor
  - el plazo del Señor
  rationale: El contexto es paciencia ante la riqueza injusta. 'Límite' conserva tanto la frontera como la medida divinamente fijada, permitiendo que la tensión del texto permanezca en lugar de reducirla solo al tiempo. Sigo la revisión POB que prefirió 'limit' a 'appointed limit'.
  doctrine_reference: DOCTRINE.md §Filosofía de traducción 3
translation_notes:
  revision_awareness: El revision_pass de POB cambió 'grows rich' por 'becomes rich', removió 'rather' (no estaba en el griego), añadió comas al apósito 'mi padre's brother', y cambió 'wait for the appointed limit' por 'await the limit'; sigo todas estas decisiones.
  spanish_consistency_notes:
  - Forma 'ustedes' (plural neutro latinoamericano) para los imperativos dirigidos a los hijos.
  - Κύριος → 'el Señor' (mayúscula).
  - Conservar el contraste léxico entre φθονέω ('envidiar') y ζηλόω ('tener celos').
