id: T12P.GAD.7.1
reference: Testament of Gad 7:1
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 232-243, Gad pilot)
  text: VII. Ἐὰν *δὲ εἰς¹ ὑπὲρ ὑμᾶς εὐοδοῦται μὴ λυπεῖσθε², ἀλλ᾿³ εὔχεσθε ὑπὲρ αὐτοῦ⁴ ἵνα τελειωθῇ⁵. *οὕτως γὰρ ἐστιν ὑμῖν συμφέρον⁶.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/gad/007/001.yaml
  text: But if someone prospers more than you, do not be grieved; rather, pray for him, that he may be made complete. For in this way it is to your advantage.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:58Z'
    unchanged: false
    changes_summary: Changed 'be brought to completion' to 'be made complete' for a more natural and direct rendering of τελειωθῇ, while preserving the formal sense. No other changes needed.
translation:
  language: es
  text: Pero si alguno prospera más que ustedes, no se entristezcan; al contrario, oren por él, para que sea hecho completo[a]. Pues así les es de provecho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sea perfeccionado' / 'sea llevado a plenitud' por 'sea hecho completo'.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐοδοῦται
  english_pob_choice: prospers
  chosen_spanish: prospera
  alternatives_spanish:
  - le va bien
  - tiene éxito
  lexicon: LSJ
  rationale: En este contexto ético el verbo se refiere a alguien que prospera, no a un viaje literal; conserva el escenario social comparativo.
- source_word: λυπεῖσθε
  english_pob_choice: be grieved
  chosen_spanish: se entristezcan
  alternatives_spanish:
  - se aflijan
  - se apenen
  lexicon: LSJ
  rationale: La prohibición concierne a la tristeza interior ante el éxito ajeno; 'entristecerse' conserva la fuerza moral-psicológica sin sobreinterpretarlo solo como resentimiento.
- source_word: τελειωθῇ
  english_pob_choice: be made complete
  chosen_spanish: sea hecho completo
  alternatives_spanish:
  - sea perfeccionado
  - sea llevado a plenitud
  lexicon: LSJ
  rationale: Sigue la revisión POB ('be made complete'); preserva el matiz teleológico de τελειόω sin importar lenguaje técnico de perfección posterior.
- source_word: συμφέρον
  english_pob_choice: to your advantage
  chosen_spanish: les es de provecho
  alternatives_spanish:
  - es beneficioso para ustedes
  - les conviene
  lexicon: LSJ
  rationale: Lectura natural en español que mantiene la idea de beneficio.
theological_decisions:
- issue: Interpretación de τελειωθῇ en la oración por el prójimo que prospera
  chosen_reading: sea hecho completo
  alternative_readings:
  - sea perfeccionado
  - prospere plenamente
  rationale: El griego apunta más allá del mero éxito continuo, hacia un resultado pleno o maduro bajo Dios. La opción elegida preserva esta amplitud teológica sin importar lenguaje técnico de perfección.
  doctrine_reference: DOCTRINE.md §Filosofía de traducción 3
translation_notes:
  revision_awareness: El revision_pass de POB cambió 'be brought to completion' por 'be made complete' para una traducción más natural y directa de τελειωθῇ; sigo esta decisión en el español.
  spanish_consistency_notes:
  - Forma 'ustedes' (plural neutro latinoamericano) para los imperativos y referencias plurales.
  - τελειόω → 'hacer completo' en este contexto, conservando el matiz teleológico.
