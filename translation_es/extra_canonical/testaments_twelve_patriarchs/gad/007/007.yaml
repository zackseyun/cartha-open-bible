  - tengan amor entre ustedes
  lexicon: LSJ
  rationale: El imperativo debe permanecer directo y con peso ético. Forma 'ustedes' latinoamericana neutra.
- source_word: εὐθύτητι καρδίας
  english_pob_choice: disposition of your soul
  chosen_spanish: la disposición de su alma
  alternatives_spanish:
  - la rectitud del corazón
  - la integridad del corazón
  lexicon: LSJ
  rationale: POB optó por 'disposition of your soul' (probable expansión por el texto cortado en el OCR; ver footnote d del capítulo). Sigo esa elección, pero conservo la nota léxica para 'rectitud del corazón' que es la lectura literal de εὐθύτης καρδίας.
