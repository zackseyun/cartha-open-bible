lexical_decisions:
- source_word: Ἐξάρατε
  english_pob_choice: cast out
  chosen_spanish: expulsen
  alternatives_spanish:
  - quiten
  - arrojen
  - echen fuera
  lexicon: LSJ
  rationale: Imperativo enérgico que conserva la fuerza testamentaria parenética.
- source_word: μῖσος
  english_pob_choice: hatred
  chosen_spanish: el odio
  alternatives_spanish:
  - la enemistad
  - el aborrecimiento
  lexicon: LSJ
