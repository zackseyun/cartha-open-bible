base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/gad/007/007.yaml
  text: Therefore cast out hatred from your souls, and love one another in deed and in word and in the disposition of your soul.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:59Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Por tanto, expulsen el odio de sus almas, y ámense unos a otros en obra y en palabra y en la disposición[a] de su alma.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego literal εὐθύτης καρδίας significaría 'rectitud del corazón'; el texto griego se interrumpe en el OCR superviviente y POB conjetura la fórmula final 'in deed and in word and in the disposition of your soul' por continuidad con 6:1. La nota refleja la opción literal y la decisión de POB.
    reason: textual_variant
lexical_decisions:
- source_word: Ἐξάρατε
  english_pob_choice: cast out
  chosen_spanish: expulsen
  alternatives_spanish:
  - quiten
  - arrojen
  - echen fuera
  lexicon: LSJ
  rationale: Imperativo enérgico que conserva la fuerza testamentaria parenética.
- source_word: μῖσος
  english_pob_choice: hatred
  chosen_spanish: el odio
  alternatives_spanish:
  - la enemistad
  - el aborrecimiento
  lexicon: LSJ
  rationale: Este vicio es el opuesto directo del amor mandado a continuación; 'odio' es el rendering más fuerte y claro.
- source_word: ἀγαπήσατε ἀλλήλους
  english_pob_choice: love one another
  chosen_spanish: ámense unos a otros
  alternatives_spanish:
  - amaos unos a otros
  - tengan amor entre ustedes
  lexicon: LSJ
  rationale: El imperativo debe permanecer directo y con peso ético. Forma 'ustedes' latinoamericana neutra.
- source_word: εὐθύτητι καρδίας
  english_pob_choice: disposition of your soul
  chosen_spanish: la disposición de su alma
  alternatives_spanish:
  - la rectitud del corazón
  - la integridad del corazón
  lexicon: LSJ
  rationale: POB optó por 'disposition of your soul' (probable expansión por el texto cortado en el OCR; ver footnote d del capítulo). Sigo esa elección, pero conservo la nota léxica para 'rectitud del corazón' que es la lectura literal de εὐθύτης καρδίας.
translation_notes:
  revision_awareness: 'El revision_pass de POB no modificó este versículo (unchanged: true). El POB nota explícitamente que el final está cortado en el OCR y se completa en continuidad con la frase exhortativa de 6:1.'
  spanish_consistency_notes:
  - Forma 'ustedes' (plural neutro latinoamericano).
  - ἀγαπάω → 'amar' por defecto.
