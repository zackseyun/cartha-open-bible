  text: 7. Ἐξάρατε οὖν³⁸ τὸ †μῖσος³⁹ ἀπὸ τῶν ψυχῶν ὑμῶν, καὶ ἀγαπήσατε⁴⁰ ἀλλήλους ἐν εὐθύτητι καρδίας.
