  text: Por tanto, expulsen el odio de sus almas, y ámense unos a otros en rectitud de corazón[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego εὐθύτης καρδίας significa literalmente 'rectitud del corazón'. En el OCR superviviente el texto se interrumpe; la edición POB suple en el nivel de capítulo la fórmula 'en obra y en palabra y en la disposición del alma' por continuidad con 6:1. Este versículo restituye la lectura más cercana al texto extante.
