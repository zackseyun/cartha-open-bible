id: T12P.GAD.7.2
reference: Testament of Gad 7:2
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 232-243, Gad pilot)
  text: 2. Καὶ ἐὰν ἐπὶ πλεῖον ὑψοῦται, μὴ φθονεῖτε ⌜αὐτῷ⌝⁷, μνημονεύοντες ὅτι πᾶσα σὰρξ ἀποθανεῖται. Κυρίῳ δὲ ὕμνους⁸ προσφέρετε⁹ τῷ παρέχοντι τὰ καλὰ καὶ¹⁰ συμφέροντα *πᾶσιν ἀνθρώποις¹¹.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/gad/007/002.yaml
  text: And if he is exalted still more, do not envy him, remembering that all flesh will die. But offer hymns to the Lord, who provides good and beneficial things to all people.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:58Z'
    unchanged: false
    changes_summary: Changed 'gives' to 'provides' for παρέχοντι, and 'profitable' to 'beneficial' for more natural formal English with συμφέροντα.
translation:
  language: es
  text: Y si es exaltado aún más, no le envidien, recordando que toda carne morirá. Más bien, ofrezcan himnos al Señor, quien provee cosas buenas y beneficiosas[a] a todas las personas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'cosas provechosas' por 'cosas beneficiosas'; el griego συμφέροντα hace eco del συμφέρον del v.1.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑψοῦται
  english_pob_choice: is exalted
  chosen_spanish: es exaltado
  alternatives_spanish:
  - es elevado
  - es ensalzado
  lexicon: LSJ
  rationale: Conserva el registro elevado y la posibilidad de incremento de estatus social.
- source_word: φθονεῖτε
  english_pob_choice: envy
  chosen_spanish: envidien
  alternatives_spanish:
  - tengan envidia
  - le tengan celos
  lexicon: LSJ
  rationale: La envidia es tema-vicio central en este material testamentario; el imperativo simple mantiene el vocabulario de vicios estable.
- source_word: πᾶσα σὰρξ
  english_pob_choice: all flesh
  chosen_spanish: toda carne
  alternatives_spanish:
  - toda la humanidad
  - todo mortal
  lexicon: LSJ
  rationale: σάρξ → 'carne'; aquí πᾶσα σὰρξ es fórmula de mortalidad y conserva la expresión antropológica tradicional.
- source_word: ὕμνους προσφέρετε
  english_pob_choice: offer hymns
  chosen_spanish: ofrezcan himnos
  alternatives_spanish:
  - entonen alabanzas
  - presenten himnos
  lexicon: LSJ
  rationale: Conserva el matiz sacrificial de προσφέρετε y el lenguaje de culto.
- source_word: παρέχοντι
  english_pob_choice: provides
  chosen_spanish: provee
  alternatives_spanish:
  - da
  - concede
  lexicon: LSJ
  rationale: Sigue la revisión POB ('provides') por παρέχοντι; 'provee' refleja con mayor exactitud el sentido.
- source_word: συμφέροντα
  english_pob_choice: beneficial things
  chosen_spanish: cosas beneficiosas
  alternatives_spanish:
  - cosas provechosas
  - lo que es ventajoso
  lexicon: LSJ
  rationale: El adjetivo hace eco de συμφέρον en v.1; 'beneficiosas' conserva la repetición temática siguiendo la revisión POB.
- source_word: πᾶσιν ἀνθρώποις
  english_pob_choice: to all people
  chosen_spanish: a todas las personas
  alternatives_spanish:
  - a todos los hombres
  - a toda la humanidad
  lexicon: BDAG
  rationale: Inclusivo, refleja el universalismo del don divino, en español neutro.
translation_notes:
  revision_awareness: El revision_pass de POB cambió 'gives' por 'provides' (παρέχοντι) y 'profitable' por 'beneficial' (συμφέροντα); ambas decisiones se reflejan en el español.
  spanish_consistency_notes:
  - Forma 'ustedes' (plural neutro latinoamericano).
  - σάρξ → 'carne' por defecto; aquí en fórmula 'toda carne' como expresión de mortalidad.
  - Κύριος → 'el Señor' (mayúscula) cuando designa a Dios.
