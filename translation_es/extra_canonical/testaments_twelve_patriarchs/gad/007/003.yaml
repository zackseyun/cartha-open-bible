translation:
  language: es
  text: Examina los juicios del Señor, y tu propósito[a] será iluminado y descansará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'tu deliberación' / 'tu consejo interior' por 'tu propósito'; διαβούλιον denota el consejo o resolución interior.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐξέτασον
  english_pob_choice: Examine
  chosen_spanish: Examina
  alternatives_spanish:
  - Investiga
  - Considera
  lexicon: LSJ
  rationale: Imperativo singular natural que conserva el sentido de escudriñar con cuidado.
- source_word: κρίματα Κυρίου
  english_pob_choice: judgments of the Lord
  chosen_spanish: los juicios del Señor
  alternatives_spanish:
  - los decretos del Señor
  - las decisiones del Señor
  lexicon: LSJ
  rationale: La frase se refiere a los actos judiciales o decisiones gobernantes de Dios; 'juicios' conserva la dicción bíblica y la seriedad moral.
- source_word: καταλάμψει
  english_pob_choice: will be illumined
  chosen_spanish: será iluminado
  alternatives_spanish:
  - resplandecerá
  - se aclarará
  lexicon: LSJ
  rationale: Texto algo difícil; el sentido es que la reflexión sobre los juicios del Señor trae claridad. 'Será iluminado' conserva la metáfora.
- source_word: ἡσυχάσει
  english_pob_choice: be at rest
  chosen_spanish: descansará
  alternatives_spanish:
  - será aquietado
  - se calmará
  lexicon: LSJ
  rationale: El resultado es la quietud interior tras el discernimiento moral; 'descansará' es idiomático y suficientemente elevado.
- source_word: διαβούλιόν
  english_pob_choice: purpose
  chosen_spanish: propósito
  alternatives_spanish:
  - consejo interior
  - deliberación
  - plan
  lexicon: LSJ
  rationale: La palabra denota el consejo o resolución interior. 'Propósito' es legible y sigue la elección POB.
translation_notes:
  revision_awareness: 'El revision_pass de POB no introdujo cambios en este versículo (unchanged: true); mantengo el rendering directo en español.'
