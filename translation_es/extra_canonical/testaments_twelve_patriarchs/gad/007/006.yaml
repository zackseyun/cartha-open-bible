id: T12P.GAD.7.6
reference: Testament of Gad 7:6
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 232-243, Gad pilot)
  text: 6. Ὁ γὰρ πένης³², ἐὰν ἄφθονος ἐπὶ πᾶσι Κυρίῳ εὐαρεστῇ³³, οὗτος³⁴ *ὑπὲρ πάντας³⁵ †πλουτεῖ³⁶, ὅτι οὐκ ἔχει τὸν *περισπασμὸν τῶν ματαίων ἀνθρώπων³⁷.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/gad/007/006.yaml
  text: For the poor man, if being abundant in all things he is pleasing to the Lord, is richer than all, because he does not have the distraction of vain people.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:00Z'
    unchanged: false
    changes_summary: Replaced 'free from envy' with 'abundant in all things' to reflect ἄφθονος more accurately here; retained the rest of the structure and wording.
translation:
  language: es
  text: Pues el pobre, si siendo abundante en todo agrada al Señor, este es más rico que todos[a], porque no tiene la distracción[b] de las personas vanas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La paradoja es ética, no económica: el pobre que agrada al Señor sobrepasa a todos en verdadera riqueza.'
    reason: theological_note
  - marker: b
    text: O 'el agobio' / 'la preocupación' por 'la distracción'; περισπασμός sugiere la carga de ser arrastrado en muchas direcciones por afanes vanos.
    reason: lexical_alternative
lexical_decisions:
- source_word: πένης
  english_pob_choice: poor man
  chosen_spanish: el pobre
  alternatives_spanish:
  - el hombre pobre
  - el necesitado
  lexicon: LSJ
  rationale: El testamento se dirige a los hijos en estilo patriarcal; 'el pobre' encaja en el registro y contrasta con el rico del versículo previo. Forma neutra inclusiva en español.
- source_word: ἄφθονος
  english_pob_choice: abundant in all things
  chosen_spanish: siendo abundante en todo
  alternatives_spanish:
  - sin envidia
  - sin escasez
  - generoso
  lexicon: LSJ
  rationale: Sigue la revisión POB ('abundant in all things'); refleja ἄφθονος con mayor exactitud aquí, en el sentido de plenitud o suficiencia interior antes que mera ausencia de envidia.
- source_word: Κυρίῳ εὐαρεστῇ
  english_pob_choice: is pleasing to the Lord
  chosen_spanish: agrada al Señor
  alternatives_spanish:
  - es agradable al Señor
  - complace al Señor
  lexicon: BDAG
  rationale: Verbo natural y directo en español para εὐαρεστέω.
- source_word: ὑπὲρ πάντας πλουτεῖ
  english_pob_choice: is richer than all
  chosen_spanish: es más rico que todos
  alternatives_spanish:
  - abunda sobre todos
  - supera a todos en riqueza
  lexicon: LSJ
  rationale: 'La paradoja es ética, no económica: el pobre contento sobrepasa a los demás en verdadera riqueza.'
- source_word: περισπασμὸν
  english_pob_choice: distraction
  chosen_spanish: la distracción
  alternatives_spanish:
  - la ansiedad
  - la preocupación
  - el agobio
  lexicon: LSJ
  rationale: El sustantivo sugiere ser arrastrado en muchas direcciones. 'Distracción' capta la carga moral del afán social vano.
- source_word: ματαίων ἀνθρώπων
  english_pob_choice: vain people
  chosen_spanish: las personas vanas
  alternatives_spanish:
  - los hombres vanos
  - los hombres vacíos
  - los necios
  lexicon: LSJ
  rationale: El genitivo caracteriza la clase de personas cuyas preocupaciones generan tal distracción; 'personas vanas' es conciso y moralmente puntual, en español neutro inclusivo.
translation_notes:
  revision_awareness: El revision_pass de POB sustituyó 'free from envy' por 'abundant in all things' para reflejar ἄφθονος con mayor exactitud; sigo esa decisión en el español.
  spanish_consistency_notes:
  - Forma neutra-inclusiva 'las personas vanas' en lugar de 'los hombres vanos' para registro latinoamericano contemporáneo.
  - Κύριος → 'el Señor' (mayúscula).
