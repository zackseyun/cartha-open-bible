  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 232-243, Gad pilot)
  text: 5. Εἰ²² ἀφαιρεῖται²³ †αὐτὰ²⁴ *ἐν κακοῖς²⁵, ἢ μετανοήσαντι²⁶, ἀφίησι²⁷, ἢ²⁸ ἀμετανόητος²⁹ τηρεῖται³⁰ εἰς *αἰωνίαν κόλασιν³¹.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/gad/007/005.yaml
  text: For if what was taken away in evil is taken from him, or if he repents, he is forgiven; but if he remains unrepentant, he is kept for eternal punishment.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:59Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Pues si lo que fue tomado mediante maldades le es quitado, o si se arrepiente, es perdonado; pero si permanece sin arrepentirse, queda reservado para castigo eterno[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'castigo de las edades' / 'castigo perpetuo' por 'castigo eterno'; αἰώνιος admite varias lecturas en contextos amplios.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀφαιρεῖται
  english_pob_choice: is taken from him
  chosen_spanish: le es quitado
  alternatives_spanish:
  - le es arrebatado
  - se le retira
  lexicon: LSJ
  rationale: Pasivo natural en español que conserva la fuerza del griego.
- source_word: ἐν κακοῖς
  english_pob_choice: in evil
  chosen_spanish: mediante maldades
  alternatives_spanish:
  - en males
  - por medio de maldades
  lexicon: LSJ
  rationale: Mantiene el sentido instrumental coherente con v.4.
- source_word: μετανοήσαντι
  english_pob_choice: he repents
  chosen_spanish: se arrepiente
  alternatives_spanish:
  - cambia de mente
  - se vuelve
  lexicon: LSJ
  rationale: En este contexto de pecado específico la guía del proyecto favorece 'arrepentirse' antes que el más cognitivo 'cambiar de mente'.
- source_word: ἀφίησι
  english_pob_choice: is forgiven
  chosen_spanish: es perdonado
  alternatives_spanish:
  - se le perdona
  - se le concede perdón
  lexicon: BDAG
  rationale: Pasivo claro y directo en español.
- source_word: ἀμετανόητος
  english_pob_choice: unrepentant
  chosen_spanish: sin arrepentirse
  alternatives_spanish:
  - impenitente
  - no arrepentido
  lexicon: LSJ
  rationale: El contraste moral del versículo es entre arrepentimiento y persistencia en el mal; 'sin arrepentirse' es el equivalente más claro y mantiene la raíz μετανο-.
- source_word: τηρεῖται
  english_pob_choice: is kept
  chosen_spanish: queda reservado
  alternatives_spanish:
  - es guardado
  - es custodiado
  lexicon: LSJ
  rationale: '''Reservado'' transmite el sentido custodial-judicial de τηρέω en este contexto escatológico.'
- source_word: αἰωνίαν κόλασιν
  english_pob_choice: eternal punishment
  chosen_spanish: castigo eterno
  alternatives_spanish:
  - castigo de las edades
  - castigo perpetuo
  lexicon: LSJ
  rationale: La frase denota directamente el juicio punitivo duradero. 'Castigo eterno' es el rendering más natural; la alternativa se nota porque αἰώνιος puede debatirse en otros contextos.
theological_decisions:
- issue: Significado de αἰωνίαν κόλασιν
  chosen_reading: castigo eterno
  alternative_readings:
  - castigo de las edades
  - castigo perpetuo
  rationale: En este contexto parenético de advertencia, el español más directo es 'castigo eterno'. Como αἰώνιος puede discutirse más ampliamente, la alternativa se conserva en nota en lugar de borrarse.
  doctrine_reference: DOCTRINE.md §Filosofía de traducción 3
translation_notes:
  revision_awareness: 'El revision_pass de POB no modificó este versículo (unchanged: true); mantengo el rendering directo en español.'
  spanish_consistency_notes:
  - μετανοέω en contexto de pecado específico → 'arrepentirse'.
  - ἀμετανόητος → 'sin arrepentirse' (mantiene raíz léxica con μετανοέω).
  - αἰώνιος → 'eterno' por defecto, con nota léxica donde aplique.
